["LV.MWSb.SkyblightStrengthDesc"]
raw = "How fast the blight spreads into the water (%/hour).\nFor example, at default 10%/hour, if you have 1m³ of water at 40% contamination, after an hour, it will be 50% contaminated."
status = "normal"
enUS = "How fast the blight spreads into the water (%/hour).  \nFor example, at default 10%/hour, if you have 1m³ of water at 40% contamination, after an hour, it will be 50% contaminated."
zhCN = "污秽向水中传播的速度（%/小时）。<br>例如，在默认值10%/小时的情况下，如果您有1立方米的水，污染度为40%，则一个小时后，它将变为50%污染。"
zhTW = "污染擴散到水中的速度 (%/小時)。例如，在默認的10%/小時下，如果您擁有1立方米的水，污染程度為40%，那麼一個小時後將變成50%受污染。"
ruRU = "Насколько быстро порча распространяется в воду (%/час). Например, при значении по умолчанию 10%/час, если у вас есть 1м³ воды с 40% загрязнением, через час она будет загрязнена на 50%."
jaJP = "水への病害の広がりの速さ（%/時間）。  \n例えば、デフォルトの10%/時間で、40%の汚染状態の1m³の水があった場合  \n1時間後には50%汚染されます。"
frFR = "Vitesse à laquelle la maladie se propage dans l'eau (%/heure). Par exemple, avec un taux par défaut de 10 %/heure, si vous avez 1 m³ d'eau à 40 % de contamination, après une heure, elle sera contaminée à 50 %."
deDE = "„Wie schnell sich die Schädigung ins Wasser ausbreitet (%/Stunde). \nZum Beispiel, bei den standardmäßigen 10%/Stunde, wenn du 1m³ Wasser mit 40% Kontamination hast, wird es nach einer Stunde 50% kontaminiert sein.“"
plPL = "Jak szybko zgnilizna rozprzestrzenia się w wodzie (%/godzinę).\nNa przykład, przy domyślnej wartości 10%/godzinę, jeśli masz 1m³ wody o 40% zanieczyszczenia, po godzinie będzie ona miała 50% zanieczyszczenia."
ptBR = "Quão rápido a praga se espalha pela água (%/hora). \nPor exemplo, com o padrão de 10%/hora, se você tiver 1m³ de água com 40% de contaminação, após uma hora, estará 50% contaminada."
koKR = "역병이 물로 얼마나 빠르게 퍼지는지 (%/시간).\n예를 들어, 기본값인 10%/시간에서 40% 오염된 1m³의 물이 있을 경우, 한 시간 후에는 50% 오염됩니다."
csCZ = "Jak rychle se nákaza šíří do vody (%/hod).\nNapříklad, při výchozí hodnotě 10 %/hod, pokud máte 1 m³ vody s 40 % kontaminací, po hodině bude 50 % kontaminované."
viVN = "Tốc độ lây lan của ô nhiễm vào nước (%/giờ).\nVí dụ, ở mức mặc định 10%/giờ, nếu bạn có 1m³ nước với 40% ô nhiễm, sau một giờ, nó sẽ đạt 50% ô nhiễm."

