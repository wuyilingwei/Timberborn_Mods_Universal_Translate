["LV.MWSb.BadrainDesc"]
raw = "Contaminated rain that causes various (configurable) negative effects:\n- Limit the moisture range of your land.\n- Contaminate the land every now and then.\n- Beavers get sick if outside for too long every day.\n- Bots get damaged when outside."
status = "normal"
enUS = "Contaminated rain that causes various (configurable) negative effects:\n- Limit the moisture range of your land.\n- Contaminate the land every now and then.\n- Beavers get sick if outside for too long every day.\n- Bots get damaged when outside."
zhCN = "被污染的雨，造成各种（可配置的）负面影响：<br>- 限制土地的湿度范围。<br>- 土地时不时被污染。<br>- 海狸如果每天在外待太久会生病。<br>- 机器人在外时会受到损坏。"
zhTW = "污染雨，會造成各種（可配置）負面效果：\n- 限制您的土地濕度範圍。\n- 不時污染土地。\n- 如果每天在外待太久，海狸會生病。\n- 機器人在戶外時會受損。"
ruRU = "Загрязненный дождь, вызывающий различные (настраиваемые) отрицательные эффекты:\n- Ограничьте диапазон влаги вашей земли.\n- Земля периодически загрязняется.\n- Бобры заболевают, если находятся на улице слишком долго каждый день.\n- У роботов возникают повреждения при пребывании на улице."
jaJP = "汚染された雨がさまざまな（設定可能な）悪影響を引き起こします：\n- あなたの土地の湿度範囲を制限します。\n- 時折土地が汚染されます。\n- ビーバーは毎日外に出ていると病気になります。\n- ボットは外にいると損傷を受けます。"
frFR = "Pluie contaminée qui cause divers effets négatifs (configurables) :\n- Limite la plage d'humidité de votre terrain.\n- Contamine le terrain de temps en temps.\n- Les castors tombent malades s'ils restent dehors trop longtemps chaque jour.\n- Les robots subissent des dégâts lorsqu'ils sont dehors."
deDE = "Kontaminierter Regen, der verschiedene (konfigurierbare) negative Effekte verursacht:\n- Begrenzen Sie den Feuchtigkeitsbereich Ihres Landes.\n- Kontaminieren Sie das Land von Zeit zu Zeit.\n- Biber werden krank, wenn sie täglich zu lange draußen sind.\n- Bots erleiden Schäden, wenn sie draußen sind."
plPL = "Zanieczyszczony deszcz, który powoduje różnorodne (konfigurowalne) negatywne efekty:\n- Ogranicza zakres wilgoci twojej ziemi.\n- Co jakiś czas zanieczyszcza ziemię.\n- Bobry chorują, jeśli spędzą na zewnątrz zbyt długo każdego dnia.\n- Automaty napotykają uszkodzenia, gdy są na zewnątrz."
ptBR = "Chuva contaminada que causa vários efeitos negativos (configuráveis):\n- Limita a faixa de umidade da sua terra.\n- Contamina a terra de tempos em tempos.\n- Castores ficam doentes se estiverem fora por muito tempo todos os dias.\n- Bots ficam danificados quando estão do lado de fora."
koKR = "오염된 비: 다양한(설정 가능한) 부정적인 효과를 유발합니다:\n- 당신의 땅의 수분 범위를 제한합니다.\n- 가끔씩 땅을 오염시킵니다.\n- 비버는 매일 너무 오랫동안 밖에 있으면 아플 수 있습니다.\n- 로봇은 밖에 있을 때 손상됩니다."
csCZ = "Kontaminovaný déšť, který způsobuje různé (konfigurovatelné) negativní efekty:\n- Omezit rozsah vlhkosti vaší půdy.\n- Půda bude občas znečištěna.\n- Bobři onemocní, pokud budou venku příliš dlouho každý den.\n- Drony budou poškozeny, když budou venku."
viVN = "Mưa ô nhiễm gây ra nhiều hiệu ứng tiêu cực (có thể cấu hình):\n- Giới hạn phạm vi độ ẩm của đất.\n- Ô nhiễm đất thỉnh thoảng.\n- Hải ly bị ốm nếu ở bên ngoài quá lâu mỗi ngày.\n- Robot bị hư hại khi ở bên ngoài."

