["LV.MWSb.SkyblightDesc"]
raw = "Hazardous weather: The air itself conspires against you! See Skyblight and Badrain modifiers for effects."
status = "normal"
enUS = "Hazardous weather: The air itself conspires against you! See Skyblight and Badrain modifiers for effects."
zhCN = "危险天气：空气本身对你进行阴谋！查看Skyblight和Badrain修饰符以了解效果。"
zhTW = "危險天氣：空氣本身對你不利！查看 Skyblight 和 Badrain 修飾器以了解其效果。"
ruRU = "Опасная погода: Сам воздух противостоит вам! Смотрите модификаторы Skyblight и Badrain для эффектов."
jaJP = "危険な天候：空気そのものがあなたに対抗します！効果についてはスカイブライトとバドラ雨の修飾子を参照してください。"
frFR = "Conditions météorologiques dangereuses : L'air lui-même conspirent contre vous ! Voir les modificateurs Skyblight et Badrain pour les effets."
deDE = "Gefährliches Wetter: Die Luft selbst verschwört sich gegen dich! Siehe Skyblight- und Badrain-Modifikatoren für Effekte."
plPL = "Niebezpieczna pogoda: Sam powietrze spiskuje przeciwko tobie! Zobacz modyfikatory Skyblight i Badrain dla efektów."
ptBR = "Clima perigoso: O ar em si conspira contra você! Veja os modificadores Skyblight e Badrain para os efeitos."
koKR = "위험한 날씨: 공기 자체가 당신을 대적합니다! Skyblight 및 Badrain 조정 효과를 확인하세요."
csCZ = "Nebezpečné počasí: Samotný vzduch se proti vám spiknul! Podívejte se na modifikátory Skyblight a Badrain pro efekty."
viVN = "Thời tiết nguy hiểm: Không khí tự nó chống lại bạn! Xem các yếu tố Skyblight và Badrain để biết tác động."

["LV.MWSb.SkyblightModifierDesc"]
raw = "All water get contaminated over time. Does not affect waters in storage (Tanks)."
status = "normal"
enUS = "All water becomes contaminated over time. Does not affect stored water (Tanks)."
zhCN = "所有水会随着时间而受到污染。不会影响储存中的水（储水罐）。"
zhTW = "所有水源會隨時間污染。不影響儲存中的水（儲水槽）。"
ruRU = "Со временем вся вода загрязняется. Не затрагивает воду в хранилищах (резервуарах)."
jaJP = "すべての水は時間と共に汚染されます。貯蔵されている水（タンク内）の水には影響しません。"
frFR = "Tous les eaux se contaminent avec le temps. N'affecte pas les eaux en stockage (Réservoirs)."
deDE = "Alle Wasser verschmutzen im Laufe der Zeit. Betroffen sind keine Speichervorräte (Tanks)."
plPL = "Wszystkie wody z czasem ulegają zanieczyszczeniu. Nie wpływa to na wody w przechowywaniu (zbiorniki)."
ptBR = "Todas as águas ficam contaminadas ao longo do tempo. Não afeta as águas em armazenamento (Tanques)."
koKR = "모든 물은 시간이 지남에 따라 오염됩니다. 저장된 물(탱크)에 영향은 없습니다."
csCZ = "Všechná voda se časem kontaminuje. Nepůsobí na vodu ve skladu (nádrže)."
viVN = "Tất cả nước sẽ bị ô nhiễm theo thời gian. Không ảnh hưởng đến nước trong kho (Bể chứa)."

