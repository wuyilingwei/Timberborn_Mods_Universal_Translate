["Building.GearWorkshop.FlavorDescription"]
raw = "\"L'engranatge de fusta és robust!\" era una frase d'Ol' Kazko mentre impulsava la industrialització ràpida."
status = "normal"
enUS = "\"The wooden gear is robust!\" was Ol' Kazko's catchphrase as he pushed rapid industrialization."
