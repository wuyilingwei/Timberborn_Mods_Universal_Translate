["Tutorial.Wellbeing.SetWorkingHours"]
status = "normal"
raw = "Recorda que els castors necessiten temps lliure per menjar, beure, dormir i gaudir de les atraccions de l'assentament.\n\nPer maximitzar la productivitat, cal equilibrar el benestar dels treballadors i les seves hores de treball.\n\nDe moment, tornem a les hores de treball per defecte."
enUS = "Remember that beavers need free time to eat, drink, sleep, and enjoy the attractions of the settlement.\n\nTo maximize productivity, it is necessary to balance the well-being of the workers and their working hours.\n\nFor now, let's revert to the default working hours."
zhCN = "请记住，海狸需要休息时间来吃东西、喝水、睡觉和享受定居点的休闲活动。\n\n为了最大化生产力，必须平衡工人的幸福感和工作时间。\n\n现在，让我们回到默认的工作时间。"
zhTW = "記住，海狸需要休閒時間來進食、飲水、睡覺以及享受聚落的設施。\n\n為了最大化生產力，必須平衡工作人員的福祉與工作時間。\n\n目前，我們回到預設的工作時間。"
ruRU = "Помните, что бобрам нужно свободное время для еды, питья, сна и наслаждения достопримечательностями поселения.\n\nЧтобы максимизировать продуктивность, необходимо сбалансировать благополучие рабочих и их рабочие часы.\n\nНа данный момент возвращаемся к часовым нормам по умолчанию."
jaJP = "「ビーバーは食べたり、飲んだり、寝たり、集落のアトラクションを楽しんだりするための自由な時間が必要です。\n\n生産性を最大化するためには、労働者の健康と労働時間のバランスを取る必要があります。\n\n今のところ、デフォルトの労働時間に戻ります。」"
frFR = "N'oubliez pas que les castors ont besoin de temps libre pour manger, boire, dormir et profiter des attractions de l'établissement.\n\nPour maximiser la productivité, il est nécessaire d'équilibrer le bien-être des travailleurs et leurs heures de travail.\n\nPour l'instant, revenons aux heures de travail par défaut."
deDE = "Denke daran, dass die Biber Freizeit benötigen, um zu essen, zu trinken, zu schlafen und die Attraktionen der Siedlung zu genießen.\n\nUm die Produktivität zu maximieren, muss das Wohlbefinden der Arbeiter und ihre Arbeitsstunden im Gleichgewicht sein.\n\nIm Moment kehren wir zu den Standard-Arbeitsstunden zurück."
plPL = "Pamiętaj, że bobry potrzebują czasu wolnego na jedzenie, picie, sen i cieszenie się atrakcjami osady.\n\nAby zmaksymalizować wydajność, należy zrównoważyć dobrostan pracowników i ich godziny pracy.\n\nNa razie wracamy do domyślnych godzin pracy."
ptBR = "Recorde que os castores precisam de tempo livre para comer, beber, dormir e desfrutar das atrações do assentamento.\n\nPara maximizar a produtividade, é necessário equilibrar o bem-estar dos trabalhadores e suas horas de trabalho.\n\nPor enquanto, vamos voltar para as horas de trabalho padrão."
koKR = "비버는 식사, 음수, 수면 및 정착지의 명소를 즐기기 위해 자유 시간이 필요하다는 점을 기억하세요.\n\n생산성을 극대화하려면 근로자의 복지와 근로 시간을 균형 있게 조정해야 합니다.\n\n현재 기본 근무 시간으로 되돌립니다."
csCZ = "Pamatujte, že bobři potřebují volný čas na jídlo, pití, spánek a užívání si atrakcí osady.\n\nAbychom maximalizovali produktivitu, musíme vyvážit pohodu pracovníků a jejich pracovní hodiny.\n\nZatím se vraťme k výchozím pracovním hodinám."
viVN = "Hãy nhớ rằng những con beo cần thời gian rỗi để ăn, uống, ngủ và tận hưởng những hoạt động tại khu định cư.\n\nĐể tối đa hóa năng suất, cần phải cân bằng giữa phúc lợi của người lao động và giờ làm việc của họ.\n\nHiện tại, chúng ta sẽ trở về giờ làm việc mặc định."

["Tutorial.Wellbeing.Shrub"]
status = "normal"
raw = "El benestar també augmenta al voltant de les decoracions. Els castors no s'hi acosten expressament, així que col·loca-les a prop dels llocs on els teus colons passen l'estona.\n\nUn Arbust és la decoració més senzilla, i els castors agraeixen qualsevol toc de verd."
enUS = "Wellbeing also increases around decorations. Beavers do not approach them specifically, so place them near the spots where your settlers spend time.\n\nA Shrub is the simplest decoration, and beavers appreciate any touch of green."
zhCN = "“幸福感在装饰物周围也会增加。海狸不会特意靠近这些地方，所以将它们放在你的殖民者休息的地方附近。\n\n灌木是最简单的装饰，海狸会感激任何一丝绿色。”"
zhTW = "周圍的裝飾也可以增進福祉。海狸不會特意靠近這些裝飾，所以將它們放在你的居民經常活動的地方。\n\n灌木是最簡單的裝飾，而海狸會感謝任何一絲綠意。"
ruRU = "Благосостояние также увеличивается вокруг декораций. Бобры не подходят к ним специально, поэтому расположите их рядом с местами, где ваши колонисты проводят время.\n\nКустарник - самая простая декорация, и бобры ценят любое прикосновение зелени."
jaJP = "ウェルビーイングの周りに装飾があると幸福度が上がります。ビーバーは特に近づこうとはしないので、あなたのコロニーの住人が時間を過ごす場所の近くに配置してください。\n\nシュラブは最もシンプルな装飾であり、ビーバーはどんな緑のアクセントにも感謝します。"
frFR = "Le bien-être augmente également autour des décorations. Les castors ne s'en approchent pas expressément, alors place-les près des endroits où tes colons passent du temps.\n\nUn Buisson est la décoration la plus simple, et les castors apprécient n'importe quelle touche de vert."
deDE = "Das Wohlbefinden steigt auch in der Nähe von Dekorationen. Die Biber nähern sich diesen nicht absichtlich, also platziere sie in der Nähe von Orten, an denen sich deine Kolonisten aufhalten.\n\nEin Strauch ist die einfachste Dekoration, und die Biber schätzen jeden Hauch von Grün."
plPL = "Zadowolenie wzrasta również w okolicy dekoracji. Bobry nie podchodzą do nich celowo, więc umieszczaj je blisko miejsc, gdzie twoi osadnicy spędzają czas.\n\nKrzak jest najprostszą dekoracją, a bobry doceniają każdy akcent zieleni."
ptBR = "O bem-estar também aumenta ao redor das decorações. Os castores não se aproximam delas intencionalmente, então coloque-as perto dos locais onde seus colonos passam o tempo.\n\nUm Arbusto é a decoração mais simples, e os castores agradecem qualquer toque de verde."
koKR = "장식 주변에서도 웰빙이 증가합니다. 비버들은 특별히 접근하지 않으므로 식민지 주민들이 시간을 보내는 곳 근처에 배치하세요.\n\n관목은 가장 간단한 장식이며, 비버들은 어떤 녹색의 터치라도 감사히 여깁니다."
csCZ = "Blahobyt se také zvyšuje v okolí dekorací. Bobři se k nim nestaví záměrně, takže je umístěte poblíž míst, kde vaši kolonisté tráví čas.\n\nKeř je nejjednodušší dekorace a bobři ocení jakýkoli dotek zeleně."
viVN = "Sự an lành cũng tăng lên xung quanh các đồ trang trí. Các con nhím không đến gần chúng một cách có chủ ý, vì vậy hãy đặt chúng gần những nơi mà các thuộc địa của bạn dành thời gian.\n\nMột Cây bụi là đồ trang trí đơn giản nhất, và các con nhím sẽ rất biết ơn bất kỳ sắc xanh nào."

["Tutorial.Wellbeing.WellbeingPanel"]
status = "normal"
raw = "Per als castors, el que compta és tota la societat. Pots veure el benestar mitjà del teu assentament a la cantonada superior esquerra de la pantalla.\n\nFes-hi clic per veure el grau de satisfacció de totes les necessitats possibles. Hi ha moltes maneres de fer la vida a l'erm més suportable."
enUS = "For beavers, what matters is the entire community. You can see the average wellbeing of your settlement in the upper left corner of the screen.\n\nClick it to see the satisfaction level of all possible needs. There are many ways to make life in the wasteland more bearable."
zhCN = "对于海狸来说，整个社会才是最重要的。你可以在屏幕左上角看到你定居点的平均幸福指数。\n\n点击查看所有可能需求的满意度等级。有很多方法可以让荒地的生活更加舒适。"
zhTW = "對於海狸來說，社會的整體才是最重要的。你可以在螢幕的左上角看到你的定居點的平均幸福指數。\n\n點擊這裡查看所有需求的滿意度程度。有很多方法可以使生活在荒野中更加可忍受。"
ruRU = "Для бобров важна вся общность. Вы можете увидеть средний уровень благосостояния вашего поселения в верхнем левом углу экрана.\n\nЩелкните, чтобы узнать степень удовлетворенности всеми возможными потребностями. Существует множество способов сделать жизнь в пустоши более комфортной."
jaJP = "ビーバーにとって重要なのはコミュニティ全体です。画面の左上隅で、あなたの定住地の平均的な幸福度を見ることができます。\n\nクリックして、すべてのニーズに対する満足度を確認してください。荒野での生活をより快適にする方法はたくさんあります。"
frFR = "Pour les castors, ce qui compte, c'est toute la société. Vous pouvez voir le bien-être moyen de votre colonie dans le coin supérieur gauche de l'écran.\n\nCliquez dessus pour voir le degré de satisfaction de tous les besoins possibles. Il existe de nombreuses façons de rendre la vie sur l'ermitage plus supportable."
deDE = "Für die Biber zählt die gesamte Gesellschaft. Du kannst das durchschnittliche Wohlbefinden deiner Siedlung in der oberen linken Ecke des Bildschirms sehen.\n\nKlicke darauf, um den Grad der Zufriedenheit aller möglichen Bedürfnisse zu sehen. Es gibt viele Möglichkeiten, das Leben im Ödland erträglicher zu machen."
plPL = "Q dla bobrów, najważniejsza jest cała społeczność. Średnie dobrostan twojej osady możesz zobaczyć w leowym górnym rogu ekranu.\n\nKliknij, aby zobaczyć poziom zadowolenia ze wszystkich potrzeb. Istnieje wiele sposobów, aby uczynić życie na pustkowiu bardziej znośnym."
ptBR = "Para os castores, o que importa é toda a sociedade. Você pode ver o bem-estar médio do seu assentamento no canto superior esquerdo da tela.\n\nClique para ver o grau de satisfação de todas as necessidades possíveis. Há muitas maneiras de tornar a vida no ermo mais suportável."
koKR = "비버에게는 사회 전체가 중요합니다. 화면 왼쪽 상단 모서리에서 정착지의 평균 웰빙을 확인할 수 있습니다.\n\n모든 필요의 만족도를 확인하려면 클릭하세요. 황야에서의 삶을 더 견딜 수 있게 만드는 방법은 많습니다."
csCZ = "Pro kastory je nejdůležitější celá společnost. Můžete vidět průměrnou pohodu vašeho osídlení v levém horním rohu obrazovky.\n\nKlikněte na něj, abyste viděli úroveň spokojenosti se všemi možnými potřebami. Existuje mnoho způsobů, jak učinit život v poušti snesitelnější."
viVN = "Đối với những con beaver, điều quan trọng là toàn bộ cộng đồng. Bạn có thể thấy mức độ phúc lợi trung bình của khu định cư của bạn ở góc trên bên trái của màn hình.\n\nNhấp vào đó để xem mức độ hài lòng của tất cả các nhu cầu có thể. Có nhiều cách để làm cho cuộc sống ở vùng hoang vu trở nên dễ chịu hơn."

