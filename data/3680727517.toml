["Modding.ThumbnailInfo"]
raw = "Afegeix un fitxer d'imatge anomenat \"thumbnail\" al directori d'aquest mod per definir-ne la miniatura. Ha de ser inferior a 1 MB. Es recomana proporció 16:9."
status = "normal"
enUS = "Add an image file named \"thumbnail\" to this mod's directory to define its thumbnail. It must be under 1 MB. A 16:9 aspect ratio is recommended."
zhCN = "将名为“thumbnail”的图片文件添加到此模组的目录中以定义其缩略图。文件大小需小于 1 MB。建议使用 16:9 的比例。"
zhTW = "在此模組的目錄中新增一個名為 \"thumbnail\" 的影像檔，以定義其縮略圖。檔案大小必須小於 1 MB。建議比例為 16:9。"
ruRU = "Добавьте файл изображения с именем \"thumbnail\" в каталог этого мода, чтобы определить его миниатюру. Размер файла должен быть менее 1 МБ. Рекомендуемое соотношение сторон 16:9."
jaJP = "このモッドのディレクトリに「thumbnail」という名前の画像ファイルを追加して、サムネイルを定義します。容量は1 MB未満でなければなりません。推奨のアスペクト比は16:9です。"
frFR = "Ajoute un fichier image nommé \"thumbnail\" dans le répertoire de ce mod pour définir sa miniature. Il doit être inférieur à 1 Mo. La proportion 16:9 est recommandée."
deDE = "Füge eine Bilddatei mit dem Namen \"thumbnail\" in das Verzeichnis dieses Mods ein, um das Miniaturbild festzulegen. Sie muss kleiner als 1 MB sein. Empfohlenes Seitenverhältnis 16:9."
plPL = "Dodaj plik graficzny o nazwie \"thumbnail\" do katalogu tego moda, aby zdefiniować jego miniaturę. Musi mieć mniej niż 1 MB. Zalecany jest stosunek 16:9."
ptBR = "Adicione um arquivo de imagem chamado \"thumbnail\" ao diretório deste mod para definir a miniatura. Deve ter menos de 1 MB. Recomenda-se a proporção 16:9."
koKR = "이 모드의 디렉토리에 \"thumbnail\"이라는 이름의 이미지 파일을 추가하여 미리보기 이미지를 정의하십시오. 용량은 1MB 미만이어야 합니다. 권장 비율은 16:9입니다."
csCZ = "Přidej obrázkový soubor s názvem \"thumbnail\" do adresáře tohoto modu, aby se určila její miniatura. Musí být menší než 1 MB. Doporučený poměr stran je 16:9."
viVN = "Thêm một tệp hình ảnh có tên \"thumbnail\" vào thư mục của mod này để xác định hình thu nhỏ của nó. Nó phải nhỏ hơn 1 MB. Tỷ lệ khung hình được khuyến nghị là 16:9."

