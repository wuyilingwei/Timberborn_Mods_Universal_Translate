["MapMetadata.Waterfalls.Description"]
raw = "És un vell truc de criança dir als cadells que una cascada és només una gran comporta. Aquí passaran setmanes buscant una palanca de tancament."
status = "normal"
enUS = "It's an old childish trick to tell the pups that a waterfall is just a big sluice gate. Here they'll spend weeks looking for a shut-off lever."
zhCN = "这是一个陈旧的育儿把戏，告诉小家伙们瀑布其实只是一个巨大的闸门。在这里它们将花费数周去寻找一根关闸杠杆。"
zhTW = "這是個老掉牙的幼稚把戲，告訴幼崽們瀑布只是個巨大的閘門。牠們在這裡會花好幾週去尋找一個用來關閉的槓桿。"
ruRU = "Это старый прием воспитания: говорить щенкам, что водопад — всего лишь огромная запорная створка. Здесь они будут проводить недели в поисках рычага закрытия."
jaJP = "子犬たちに滝はただの大きな水門だと教えるのは、昔ながらの子どもの手口だ。ここでは彼らは閉鎖用のレバーを何週間も探すことになるだろう。"
frFR = "C'est un vieux truc d'enfant pour dire aux chiots qu'une cascade n'est qu'une grande vanne. Ici, ils passeront des semaines à chercher un levier de fermeture."
deDE = "Es ist ein alter Trick aus der Kindheit, den Welpen zu erzählen, dass ein Wasserfall nur eine große Wehr ist. Hier werden sie Wochen damit verbringen, nach einem Verschlusshebel zu suchen."
plPL = "To stary trik wychowawczy polegający na tym, że mówi się szczeniakom, iż wodospad to tylko ogromna zasuwka. Tu będą spędzać tygodnie, szukając dźwigni zamykającej."
ptBR = "É um truque infantil antigo dizer aos filhotes que uma cachoeira é apenas uma grande comporta. Aqui eles vão passar semanas procurando uma alavanca de fechamento."
koKR = "아이를 키우는 오래된 속임수로 강아지들에게 폭포가 단지 큰 수문일 뿐이라고 말하는 것이다. 여기서는 잠금 레버를 찾느라 몇 주를 보낼 것이다."
csCZ = "To je starý dětský trik, kterým se štěňatům říká, že vodopád je jen velká klapka. Zde stráví týdny hledáním uzavírací páky."
viVN = "Đó là một mánh cũ từ thời thơ ấu để nói với các chú chó con rằng một thác nước chỉ là một cổng xả lớn. Ở đây chúng sẽ dành vài tuần để tìm kiếm một cần gạt đóng nước."

