["PlayerData.CorruptedDataInfo.Header"]
raw = "Hi ha hagut un problema en llegir el fitxer del jugador. N'hem restaurat el contingut des d'una còpia de seguretat local, però alguns detalls (incloent-hi les faccions desbloquejades i els mapes dominats) es poden haver perdut."
status = "normal"
enUS = "There has been a problem reading the player's file. We have restored its contents from a local backup, but some details (including the unlocked factions and conquered maps) may have been lost."
zhCN = "在读取玩家档案时出现了问题。我们已从本地备份还原了其内容，但某些细节（包括已解锁的派系和被掌控的地图）可能已丢失。"
zhTW = "在讀取玩家檔案時發生問題。 我們已從本地備份還原了內容，但某些細節（包括已解鎖的派系與已掌控的地圖）可能已遺失。"
ruRU = "Возникла проблема при чтении файла игрока. Мы восстановили его содержимое из локальной резервной копии, но некоторые детали (включая разблокированные фракции и завоеванные карты) могли быть потеряны."
jaJP = "プレイヤーファイルの読み取り時に問題が発生しました。ローカルのバックアップから内容を復元しましたが、一部の詳細（アンロックされた派閥や支配済みのマップを含む）は失われている可能性があります。"
frFR = "Il y a eu un problème lors de la lecture du fichier du joueur. Nous avons restauré son contenu à partir d'une copie de sauvegarde locale, mais certains détails (y compris les factions débloquées et les cartes maîtrisées) ont peut-être été perdus."
deDE = "Beim Lesen der Spielerdatei ist ein Problem aufgetreten. Wir haben den Inhalt aus einer lokalen Sicherungskopie wiederhergestellt, aber einige Details (einschließlich der freigeschalteten Fraktionen und der beherrschten Karten) könnten verloren gegangen sein."
plPL = "Wystąpił problem podczas odczytu pliku gracza. Przywróciliśmy jego zawartość z lokalnej kopii zapasowej, ale niektóre szczegóły (w tym odblokowane frakcje i opanowane mapy) mogły zostać utracone."
ptBR = "Houve um problema ao ler o arquivo do jogador. Restauramos o conteúdo a partir de uma cópia de segurança local, mas alguns detalhes (incluindo as facções desbloqueadas e os mapas dominados) podem ter sido perdidos."
koKR = "플레이어 데이터 파일을 읽는 데 문제가 발생했습니다. 로컬 백업 사본에서 내용을 복원했지만, 일부 세부 정보(잠금 해제된 진영 및 지배된 맵 포함)가 손실되었을 수 있습니다."
csCZ = "Došlo k problému při čtení souboru hráče. Obnovili jsme jeho obsah z místní zálohy, ale některé detaily (včetně odemčených frakcí a ovládaných map) mohly být ztraceny."
viVN = "Đã xảy ra sự cố khi đọc tệp người chơi. Chúng tôi đã khôi phục nội dung từ một bản sao lưu cục bộ, nhưng một số chi tiết (bao gồm các phe đã mở khóa và các bản đồ đã bị chiếm) có thể đã bị mất."

["Population.AllPerished"]
raw = "I, tot i que tots els castors van morir, el riu va continuar fluint,\nla seva breu existència no fou més que una mota de pols de fusta."
status = "normal"
enUS = "And, even though all the beavers died, the river kept flowing, their brief existence was no more than a speck of sawdust."
zhCN = "并且，尽管所有的河狸都死去，河流仍在继续流淌，它们短暂的存在不过是一粒木屑尘埃。"
zhTW = "即使所有的海狸都死去，河流仍在流淌，\n它短暫的存在不過是一粒木屑的塵埃。"
ruRU = "И, хотя все бобры погибли, река продолжала течь,\nих кратковременное существование было не более чем крупинкой опилок."
jaJP = "そして、すべてのビーバーが死んだとしても、川は流れ続け、彼らの短い存在は木屑の一粒に過ぎなかった。"
frFR = "Et, bien que tous les castors soient morts, la rivière a continué de couler,\nsa brève existence n'a été qu'une poussière de bois."
deDE = "Und obwohl alle Biber gestorben waren, floss der Fluss weiter; seine kurze Existenz war nichts weiter als ein Staubkorn aus Holz."
plPL = "I choć wszyscy bobry ponieśli śmierć, rzeka wciąż płynęła; ich krótkie istnienie nie było niczym więcej niż ziarenko pyłu drewna."
ptBR = "E, embora todos os castores tivessem morrido, o rio continuou a fluir; sua breve existência não passou de uma partícula de pó de madeira."
koKR = "그리고 모든 비버가 죽었더라도 강은 계속 흘렀고 그들의 짧은 존재는 목재 가루 한 점에 지나지 않았다."
csCZ = "Ačkoli všichni bobři zemřeli, řeka nadále tekla; jejich krátká existence nebyla ničím víc než zrnko dřevěného prachu."
viVN = "Và mặc dù tất cả những con hải ly đã chết, dòng sông vẫn tiếp tục chảy, sự tồn tại ngắn ngủi của chúng chỉ là một hạt bụi gỗ."

