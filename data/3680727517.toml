["Building.EarthRepopulator.IronTeeth.Description"]
raw = "Llança pioners cap a terres llunyanes. Quan es llança, fa més feliços els castors de la zona."
status = "normal"
enUS = "Sends pioneers to distant lands. When launched, it makes the beavers in the area happier."
zhCN = "向遥远的土地派遣先锋队。一旦发射，便会让该区域的河狸更加快乐。"
zhTW = "向遙遠的土地派遣拓荒者。當它被發射時，會讓該地區的海狸更快樂。"
ruRU = "Запускайте пионеров в дальние земли. Когда оно запускается, местные бобры района становятся счастливее."
jaJP = "遠い土地へ開拓者を派遣する。 起動すると、周辺のビーバーをより幸せにします。"
frFR = "Lance des pionniers vers des terres lointaines. Lorsqu'il est lancé, il rend les castors de la région plus heureux."
deDE = "Schickt Pioniere in ferne Länder. Wenn es gestartet wird, macht es die Biber in der Umgebung glücklicher."
plPL = "Wysyła pionierów na odległe tereny. Gdy zostanie uruchomiony, sprawia, że okoliczne bobry są szczęśliwsze."
ptBR = "Lança pioneiros para terras distantes. Quando for lançado, deixa os castores da região mais felizes."
koKR = "먼 땅으로 개척자들을 파견한다. 발사되면 이 지역의 비버들을 더 행복하게 만든다."
csCZ = "Vysílá pionýry do vzdálených zemí. Když se spustí, dělá místním bobrům radost."
viVN = "Phóng các người tiên phong đến các vùng đất xa xôi. Khi được phóng, nó khiến các con hải ly trong khu vực ấy hạnh phúc hơn."

