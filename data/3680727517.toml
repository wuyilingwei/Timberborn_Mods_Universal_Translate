["NaturalResource.Blueberry.FlavorDescription"]
raw = "\"Ja me'n demanaràs més quan arribi la sequera.\" —Ma' Ngonel"
status = "normal"
enUS = "\"You'll be asking me for more when the drought arrives.\" —Ma' Ngonel"
zhCN = "\"等到干旱来临时，你会向我索要更多。\" —Ma' Ngonel"
zhTW = "\"等到旱季來臨時，你就會再向我索取更多。\" —Ma' Ngonel"
ruRU = "\"Ты попросишь у меня ещё, когда наступит засуха.\" —Ма' Нгонель"
jaJP = "「干ばつが来たら、私にもっと頼むことになるだろう。」 —Ma' Ngonel"
frFR = "\"Tu me demanderas encore plus quand la sécheresse arrivera.\" —Ma' Ngonel"
deDE = "\"Und du wirst mich nach mehr davon fragen, wenn die Dürre kommt.\" —Ma' Ngonel"
plPL = "Będziesz prosić mnie o więcej, gdy nadejdzie susza. —Ma' Ngonel"
ptBR = "\"Você me pedirá mais quando a seca chegar.\" —Ma' Ngonel"
koKR = "\"가뭄이 닥치면 넌 나한테 더 달라고 할 거야.\" —Ma' Ngonel"
csCZ = "\"Už mi budeš žádat víc, až přijde sucho.\" —Ma' Ngonel"
viVN = "\"Bạn sẽ xin thêm từ tôi khi hạn hán đến.\" —Ma' Ngonel"

