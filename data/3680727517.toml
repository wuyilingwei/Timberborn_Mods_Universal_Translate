["Tutorial.PowerAndPlanks"]
new = "Energia i taulons"
status = "normal"

["Tutorial.PowerAndPlanks.LumberMill"]
new = "És hora de començar a produir Taulons!\n\nConstrueix una Serradora just al costat de la Roda d'aigua. També la pots construir més lluny i connectar-la a la Roda d'aigua amb Eixos d'energia.\n\nConsell: Molts edificis, com les Serradores i les Cases, transmeten energia entre si quan es col·loquen paret amb paret. No calen Eixos d'energia!"
status = "normal"

["Tutorial.PowerAndPlanks.WaterWheel"]
new = "Els edificis més avançats necessiten energia, i als castors els agrada que la seva energia vingui del riu.\n\nCol·loca una Roda d'aigua en aigua corrent a la vora del riu."
status = "normal"

