["Building.Ruins.FlavorDescription"]
raw = "Escampades per tota la terra, les decadents ruïnes humanes van donar als castors una cosa inimaginable: un material superior a la fusta."
status = "normal"
enUS = "Scattered across the land, the decaying human ruins gave beavers something unimaginable: a material superior to wood."
zhCN = "散佈在整個大地上的頹廢的人類遺跡給海狸帶來了一樣難以想象的東西：比木頭更出色的材料。"
zhTW = "遍佈整個大地，那些頹廢的人類遺跡給予海狸一件難以想像的東西：比木材更優越的材料。"
ruRU = "Разбросанные по всей земле упадочные человеческие руины подарили бобрам нечто невообразимое: материал, превосходящий древесину."
jaJP = "世界中に散らばる退廃した人間の廃墟は、ビーバーにとって想像を絶するものを授けた――木材を超える材料。"
frFR = "Éparpillées sur toute la terre, les ruines humaines décadentes ont donné aux castors une chose inimaginable : un matériau supérieur au bois."
deDE = "Über die ganze Erde verstreut gaben die dekadenten menschlichen Ruinen den Bibern etwas Unvorstellbares: ein Material, das dem Holz überlegen ist."
plPL = "Rozsiane po całej Ziemi, zdegenerowane ludzkie ruiny dały bobrom coś niewyobrażalnego: materiał lepszy od drewna."
ptBR = "Espalhadas por toda a terra, as ruínas humanas decadentes deram aos castores algo inimaginável: um material superior à madeira."
koKR = "전 세계에 흩어져 있던 타락한 인간의 폐허는 비버들에게 상상도 못할 것을 주었다: 나무보다 우월한 재료."
csCZ = "Dekadentní lidské ruiny se šířily po celé zemi a daly bobrům něco nepředstavitelného: materiál lepší než dřevo."
viVN = "Rải khắp thế giới, những tàn tích đổ nát của con người đã mang lại cho những chú hải ly một điều không thể tưởng tượng được: một vật liệu vượt trội hơn gỗ."

