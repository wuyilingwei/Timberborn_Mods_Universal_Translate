["MapMetadata.Canyon.Description"]
raw = "Al desert, els castors busquen valls on encara flueixen rius. Fàcil de represar, aquest canó esdevindrà un refugi segur per a tothom."
status = "normal"
enUS = "In the desert, beavers search for valleys where rivers still flow. Easy to dam up, this canyon will become a safe refuge for everyone."
zhCN = "在沙漠中，海狸寻找仍在流淌河水的山谷。易于筑坝，这座峡谷将成为每个人的安全避难所。"
zhTW = "在沙漠裡，海狸尋找仍有河水流過的山谷。易於築壩，這條峽谷將成為所有人安全的庇護所。"
ruRU = "В пустыне бобры ищут долины, где ещё текут реки. Легко построить плотину — этот каньон станет безопасным убежищем для всех."
jaJP = "砂漠で、ビーバーはまだ川が流れる谷を探している。堤防を築くのが容易なこの渓谷は、誰にとっても安全な避難所となるだろう。"
frFR = "Dans le désert, les castors cherchent des vallées où coulent encore des rivières. Facile à barrer, ce canyon deviendra un refuge sûr pour tous."
deDE = "In der Wüste suchen Biber Täler, in denen noch Flüsse fließen. Dieser Canyon lässt sich leicht aufstauen und wird so zu einem sicheren Zufluchtsort für alle."
plPL = "Na pustyni bobry szukają dolin, w których wciąż płyną rzeki. Łatwy do spiętrzenia, ten kanion stanie się bezpiecznym schronieniem dla wszystkich."
ptBR = "No deserto, os castores buscam vales onde ainda fluem rios. Fácil de represar, este cânion se tornará um refúgio seguro para todos."
koKR = "사막에서 비버들은 아직도 흐르는 강이 있는 골짜기를 찾습니다. 댐을 쌓기 쉽고, 이 협곡은 모두를 위한 안전한 피난처가 될 것입니다."
csCZ = "Na poušti bobři hledají údolí, kde ještě tečou řeky. Snadno se dá přehradit, tento kaňon se stane bezpečným útočištěm pro všechny."
viVN = "Trong sa mạc, những con hải ly tìm các thung lũng nơi vẫn còn những con sông đang chảy. Dễ ngăn nước, hẻm núi này sẽ trở thành nơi trú ẩn an toàn cho mọi người."

