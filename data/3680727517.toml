["NaturalResource.Mangrove.FlavorDescription"]
raw = "Les llavors les van portar viatgers de terres llunyanes on els rius no s'assequen mai."
status = "normal"
enUS = "The seeds were brought by travelers from distant lands where the rivers never run dry."
zhCN = "这些种子是由来自遥远土地的旅人带来的，那里的河流永不干涸。"
zhTW = "這些種子是由來自遙遠土地的旅人帶來的，那裡的河流永不乾涸。"
ruRU = "Семена были привезены путешественниками из дальних земель, где реки никогда не высыхают."
jaJP = "その種は、川が決して干上がらない遠い土地の旅人たちによって持ち込まれた。"
frFR = "Les graines leur ont été apportées par des voyageurs venus de terres lointaines où les rivières ne sèchent jamais."
deDE = "Die Samen wurden von Reisenden aus fernen Ländern mitgebracht, in denen die Flüsse niemals austrocknen."
plPL = "Nasiona przywieźli podróżnicy z odległych krain, gdzie rzeki nigdy nie wysychają."
ptBR = "As sementes foram trazidas por viajantes de terras distantes, onde os rios nunca secam."
koKR = "그 씨앗은 강이 결코 마르지 않는 먼 땅의 여행자들이 가져왔다."
csCZ = "Cestovatelé přinesli semena z dalekých zemí, kde řeky nikdy nevysychají."
viVN = "Hạt giống được mang bởi những người du hành từ những vùng đất xa xôi, nơi các con sông không bao giờ cạn."

