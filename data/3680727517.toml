["Building.LumberMill.FlavorDescription"]
raw = "Amb l'empenta d'Ol' Kazko, el processament mecanitzat de fusta va fer grinyolar moltes dents entre els castors més grans."
status = "normal"
enUS = "With Ol' Kazko's drive, the mechanized wood processing made many teeth grind among the larger beavers."
zhCN = "在 Ol' Kazko 的推动下，木材的机械加工让体型较大的海狸们的牙齿发出嘎吱声。"
zhTW = "在 Ol' Kazko 的推動下，機械化的木材加工讓較大的海狸們的牙齒嘎吱作響。"
ruRU = "С импульсом Ол' Казко, механизированная обработка древесины заставила многие зубы заскрежетать среди самых крупных бобров."
jaJP = "オル・カズコの勢いを借りて、木材の機械加工は、最も大きなビーバーたちの間で、多くの歯車がきしむ音を立てた。"
frFR = "Avec l'élan d'Ol' Kazko, le traitement mécanisé du bois a fait grincer des dents chez les castors les plus grands."
deDE = "Mit dem Antrieb von Ol' Kazko ließ die maschinelle Holzverarbeitung bei den größeren Bibern viele Zähne knirschen."
plPL = "Dzięki zapałowi Ol' Kazko, mechaniczna obróbka drewna sprawiła, że wiele zębów zgrzytało wśród większych bobrów."
ptBR = "Com o impulso de Ol' Kazko, o processamento mecânico de madeira fez com que muitos dentes rangassem entre os castores mais velhos."
koKR = "올 카즈코의 추진력으로 기계식 목재 가공은 더 큰 비버들 사이에서 수많은 이빨이 삐걱거리게 만들었다."
csCZ = "S odhodláním Ol' Kazka se mechanizované zpracování dřeva rozjelo a vyvolalo skřípání mnoha zubů mezi největšími bobry."
viVN = "Với sự thúc đẩy của Ol' Kazko, quá trình chế biến gỗ bằng máy móc đã khiến nhiều chiếc răng của những chú hải ly lớn nghiến lại."

