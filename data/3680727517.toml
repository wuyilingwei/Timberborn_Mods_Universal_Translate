["Building.DanceHall.FlavorDescription"]
raw = "\"Vinga, no et quedis aquí plantat com un avorrit dels Dents de Ferro.\" —Suli"
status = "normal"
enUS = "Come on, don't just stand there like a bore among the Iron Teeth. —Suli"
zhCN = "\"来吧，不要在这里像铁牙们中的一个无聊家伙一样站着。\" —Suli"
zhTW = "\"快來，別在這裡像鐵牙族的無聊傢伙一樣站著。\" —Suli"
ruRU = "\"Давай, не стой здесь как вкопанный, как зануда из Железных Зубов.\" —Suli"
jaJP = "\"さあ、ここに鉄の歯の退屈なやつみたいに立っているんじゃない。\" —Suli"
frFR = "Allez, ne reste pas planté ici comme un ennuyeux des Dents de Fer.\" —Suli"
deDE = "Komm schon, steh hier nicht herum wie ein Langweiler unter den Eisenzähnen. —Suli"
plPL = "Chodź, nie stój tutaj jak nudziarz z Żelaznych Zębów. —Suli"
ptBR = "\"Vamos, não fique aí parado como um chato dos Dentes de Ferro.\" —Suli"
koKR = "\"자, 여기서 이렇게 꼿꼿이 서 있지 말고, 철치의 지루한 사람처럼 굳어 있지 마.\" —Suli"
csCZ = "Pojď, nestůj tu jako nudný člen Železných zubů. —Suli"
viVN = "Thôi nào, đừng đứng im ở đây như một kẻ buồn tẻ của Dents de Ferro. —Suli"

