["MapSelection.SemiCompatibleMapVersion"]
raw = "Aquesta versió del mapa ({0}) no és compatible amb la versió actual del joc ({1}). Iniciar la partida en aquest mapa pot provocar una fallada, pots trobar errors greus i poden faltar recursos crítics nous. Et recomanem fortament actualitzar el mapa per gaudir plenament de les funcions noves.\n\nSegur que vols iniciar la partida?"
status = "normal"
enUS = "This map version ({0}) is not compatible with the current game version ({1}). Starting the game on this map may cause a crash; you may encounter serious errors and new critical resources may be missing. We strongly recommend updating the map to fully enjoy the new features.\n\nAre you sure you want to start the game?"
zhCN = "此地图版本 ({0}) 与当前游戏版本 ({1}) 不兼容。在此地图上开始游戏可能会导致崩溃，您可能会遇到严重错误，且可能缺少新的关键资源。我们强烈建议更新该地图，以便充分享受新功能。\n\n您确定要开始游戏吗？"
zhTW = "此地圖版本（{0}）與當前遊戲版本（{1}）不相容。在此地圖上開始遊戲可能導致崩潰，你可能會遇到嚴重錯誤，且可能缺少新的關鍵資源。我們強烈建議更新地圖，以充分享受新功能。\n\n您確定要開始遊戲嗎？"
ruRU = "Эта версия карты ({0}) не совместима с текущей версией игры ({1}). Запуск игры на этой карте может привести к сбою, вы можете столкнуться с серьёзными ошибками и могут отсутствовать новые критически важные ресурсы.\n\nМы настоятельно рекомендуем обновить карту, чтобы полностью насладиться новыми функциями.\n\nВы уверены, что хотите начать игру?"
jaJP = "このマップのバージョン（{0}）は現在のゲームのバージョン（{1}）と互換性がありません。このマップでゲームを開始すると、クラッシュを引き起こす可能性があります。重大なエラーが発生する可能性があり、新たな重要資源が不足することがあります。新機能を最大限に楽しむために、マップを更新することを強くお勧めします。\n\n本当にゲームを開始しますか？"
frFR = "Cette version de la carte ({0}) n'est pas compatible avec la version actuelle du jeu ({1}). Lancer la partie sur cette carte peut provoquer un crash, vous pouvez rencontrer des erreurs graves et il peut manquer des ressources critiques nouvelles. Nous vous recommandons vivement de mettre à jour la carte pour profiter pleinement des nouvelles fonctionnalités.\n\nÊtes-vous sûr de vouloir lancer la partie?"
deDE = "Diese Kartenversion ({0}) ist nicht mit der aktuellen Spielversion ({1}) kompatibel. Das Starten des Spiels auf dieser Karte kann zu einem Absturz führen, du könntest schwerwiegende Fehler finden und es könnten kritische Ressourcen fehlen. Wir empfehlen dringend, die Karte zu aktualisieren, um die neuen Funktionen vollständig nutzen zu können.\n\nBist du sicher, dass du das Spiel starten willst?"
plPL = "Ta wersja mapy ({0}) nie jest kompatybilna z obecną wersją gry ({1}). Uruchomienie rozgrywki na tej mapie może spowodować awarię, możesz napotkać poważne błędy i mogą występować braki istotnych zasobów.\n\nZdecydowanie zalecamy zaktualizowanie mapy, aby w pełni cieszyć się nowymi funkcjami.\n\nCzy na pewno chcesz rozpocząć grę?"
ptBR = "Esta versão do mapa ({0}) não é compatível com a versão atual do jogo ({1}). Iniciar a partida neste mapa pode provocar uma falha, você pode encontrar erros graves e pode faltar recursos críticos novos. Recomendamos fortemente atualizar o mapa para aproveitar ao máximo as novas funções.\n\nTem certeza de que deseja iniciar a partida?"
koKR = "이 맵의 버전 ({0})은 현재 게임 버전 ({1})과 호환되지 않습니다. 이 맵에서 게임을 시작하면 충돌이 발생할 수 있으며, 심각한 오류가 발생하고 새로 도입된 중요한 자원이 누락될 수 있습니다.\n\n새로운 기능을 온전히 즐기려면 맵을 업데이트하는 것을 강력히 권장합니다.\n\n정말로 게임을 시작하시겠습니까?"
csCZ = "Tato verze mapy ({0}) není kompatibilní s aktuální verzí hry ({1}). Spuštění hry na této mapě může způsobit pád, můžete narazit na vážné chyby a mohou chybět nové kritické zdroje. Důrazně doporučujeme aktualizovat mapu, abyste si plně užili nové funkce.\n\nOpravdu chcete zahájit hru?"
viVN = "Phiên bản này của bản đồ ({0}) không tương thích với phiên bản hiện tại của trò chơi ({1}). Việc bắt đầu trận đấu trên bản đồ này có thể gây ra sự cố, bạn có thể gặp các lỗi nghiêm trọng và có thể thiếu các tài nguyên thiết yếu mới. Chúng tôi khuyến nghị mạnh mẽ cập nhật bản đồ để tận hưởng đầy đủ các tính năng mới.\n\nBạn có chắc chắn muốn bắt đầu trận đấu không?"

