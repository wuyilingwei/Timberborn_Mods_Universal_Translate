["Faction.Folktails.GameOver.Flavor"]
raw = "Quan no aprofites els dons de la natura, la natura els recupera."
status = "normal"
enUS = "When you don't make use of nature's gifts, nature takes them back."
zhCN = "当你未能利用自然的馈赠时，自然会把它们收回。"
zhTW = "若你未善用大自然的恩惠，它們就會重新歸還給自然。"
ruRU = "Когда ты не используешь дары природы, природа забирает их обратно."
jaJP = "自然の恵みを活かせないと、自然がそれらを取り戻す。"
frFR = "Lorsque vous ne profitez pas des dons de la nature, la nature les récupère."
deDE = "Wenn du die Gaben der Natur nicht nutzt, holt sie sich diese zurück."
plPL = "Cuando no aprovechas los dones de la naturaleza, la naturaleza los recupera."
ptBR = "Quando você não aproveita os dons da natureza, a natureza os recupera."
koKR = "자연의 은혜를 활용하지 않으면, 자연은 그것을 회수한다."
csCZ = "Když nevyužiješ dary přírody, příroda si je vezme zpět."
viVN = "Khi bạn không tận dụng các món quà của thiên nhiên, thiên nhiên sẽ lấy lại chúng."

["Faction.Folktails.GameOver.Message"]
raw = "Els teus Cuesfusta han patit el trist destí dels seus predecessors humans. Aquest és el final."
status = "normal"
enUS = "Your Cuesfusta have suffered the sad fate of their human predecessors. This is the end."
zhCN = "你们的Cuesfusta已经经历了他们的人类祖先的悲惨命运。这是结局。"
zhTW = "你的 Cuesfusta 已經經歷了他們的人類先祖的悲慘命運。這就是結局。"
ruRU = "Ваши Cuesfusta пострадали от печальной судьбы своих человеческих предшественников. Это конец."
jaJP = "あなたのクエスフスタは、人間の先祖が辿った悲しい運命を味わってしまった。これが終わりだ。"
frFR = "Vos Cuesfusta ont souffert le triste destin de leurs prédécesseurs humains. C'est la fin."
deDE = "Deine Cuesfusta haben das traurige Schicksal ihrer menschlichen Vorfahren erlitten. Das ist das Ende."
plPL = "Twoje Cuesfusta doznały smutnego losu swoich ludzkich przodków. To koniec."
ptBR = "Seus Cuesfusta sofreram o triste destino dos seus antecessores humanos. Este é o final."
koKR = "큐에스푸스타는 인간 선조들의 슬픈 운명을 겪었습니다. 이것이 끝입니다."
csCZ = "Vaše Cuesfusta utrpěly smutný osud svých lidských předků. Tohle je konec."
viVN = "Những Cuesfusta của bạn đã phải chịu số phận bi thảm của những tổ tiên con người của họ. Đây là kết thúc."

["Faction.Folktails.WonderCompletionFlavor"]
raw = "Després d'acumular gran riquesa i coneixement, els teus castors han compartit els fruits del seu treball amb el planeta malmès. Encara queda molt per fer, però la Terra podria florir de nou."
status = "normal"
enUS = "After accumulating great wealth and knowledge, your beavers have shared the fruits of their labor with the ravaged planet. There's still a lot to do, but Earth could bloom again."
zhCN = "在积累了巨大的财富和知识之后，你的海狸们已经把他们劳动的果实分享给这颗受损的星球。还有很多事要做，但地球可能再次繁荣。"
zhTW = "在累積了巨大的財富與知識之後，你的海狸們已與受損的地球分享了他們工作的成果。還有很多事要做，但地球或許能再次綻放。"
ruRU = "После накопления большого богатства и знаний ваши бобры поделились плодами своей работы с повреждённой планетой. Ещё многое предстоит сделать, но Земля может снова расцвести."
jaJP = "大量の富と知識を蓄えた後、あなたのビーバーたちは彼らの働きの成果を傷ついた地球と分かち合った。まだやるべきことは多いが、地球は再び花開くことができるだろう。"
frFR = "Après avoir accumulé de grandes richesses et de connaissances, vos castors ont partagé les fruits de leur travail avec la planète endommagée. Il reste encore beaucoup à faire, mais la Terre pourrait refleurir à nouveau."
deDE = "Nachdem sie großen Reichtum und Wissen angehäuft haben, haben deine Biber die Früchte ihrer Arbeit mit dem verwüsteten Planeten geteilt. Es bleibt noch viel zu tun, aber die Erde könnte wieder erblühen."
plPL = "Po zgromadzeniu dużego bogactwa i wiedzy twoje bobry podzieliły się owocami swojej pracy z zniszczoną planetą. Wciąż jest jeszcze dużo do zrobienia, ale Ziemia mogłaby ponownie zakwitnąć."
ptBR = "Depois de acumular grande riqueza e conhecimento, seus castores compartilharam os frutos do seu trabalho com o planeta danificado. Ainda há muito por fazer, mas a Terra poderia florescer novamente."
koKR = "많은 부와 지식을 축적한 뒤에 당신의 비버들은 그들의 노동의 열매를 손상된 행성과 함께 나눴다. 아직 해야 할 일이 많지만, 지구는 다시 꽃피울 수 있다."
csCZ = "Poté, co nasbírali velké bohatství a poznání, vaši bobři sdíleli plody své práce s poškozenou planetou. Ještě je toho hodně, co je třeba udělat, ale Země by mohla znovu rozkvést."
viVN = "Sau khi tích lũy được sự giàu có và tri thức lớn, những chú hải ly của bạn đã chia sẻ những thành quả từ công việc của chúng với hành tinh bị tàn phá. Còn rất nhiều việc phải làm, nhưng Trái Đất có thể lại nở hoa."

["Faction.Folktails.WonderCompletionMessage"]
raw = "Enhorabona! Has dominat l'estil orientat a la natura dels Cuesfusta i has utilitzat els recursos d'aquest mapa per construir la meravella de la facció."
status = "normal"
enUS = "Congratulations! You have mastered the nature-focused style of the Cuesfusta and used the resources from this map to build the faction's wonder."
zhCN = "恭喜！你已掌握了 Cuesfusta 的以自然为导向的风格，并利用这张地图的资源来建造该派系的奇迹。"
zhTW = "恭喜！你已掌握 Cuesfusta 的自然取向風格，並利用這張地圖的資源建造該派系的奇蹟。"
ruRU = "Поздравляем! Вы овладели стилем, ориентированным на природу Куэсфуста, и использовали ресурсы этой карты, чтобы построить чудо фракции."
jaJP = "おめでとうございます！あなたはCuesfustaの自然志向のスタイルを極めました。そしてこの地図の資源を活用して、派閥のワンダーを建設しました。"
frFR = "Félicitations ! Vous avez maîtrisé le style axé sur la nature des Cuesfusta et avez utilisé les ressources de cette carte pour construire la merveille de la faction."
deDE = "Herzlichen Glückwunsch! Du hast den naturorientierten Stil der Cuesfusta gemeistert und die Ressourcen dieser Karte genutzt, um das Wunder der Fraktion zu errichten."
plPL = "Gratulacje! Zdominowałeś styl zorientowany na naturę Cuesfusta i wykorzystałeś zasoby tej mapy, aby zbudować cud tej frakcji."
ptBR = "Parabéns! Você dominou o estilo orientado para a natureza dos Cuesfusta e utilizou os recursos deste mapa para construir a maravilha da facção."
koKR = "축하합니다! Cuesfusta의 자연 친화적 스타일을 숙달했고 이 지도에서 얻은 자원을 사용해 진영의 경이로움을 건설했습니다."
csCZ = "Gratuluji! Ovládl jsi styl orientovaný na přírodu Cuesfusta a využil jsi zdroje této mapy k vybudování zázraku frakce."
viVN = "Chúc mừng! Bạn đã nắm bắt được phong cách hướng tới thiên nhiên của Cuesfusta và đã sử dụng các tài nguyên của bản đồ này để xây dựng kỳ quan của phe."

["Faction.IronTeeth.Description"]
raw = "Dissidents de les maneres tradicionals de la fusta, han dominat el ferro i la ciència per construir maquinària avançada.\nAssoleixen el progrés amb enginy, eficiència i menyspreu pel medi ambient.\nEl seu lema: <i>Treballa dur, treballa dur.</i>"
status = "normal"
enUS = "Dissidents of the traditional ways of wood, they have mastered iron and science to build advanced machinery.\nThey achieve progress with ingenuity, efficiency, and contempt for the environment.\nTheir motto: <i>Work hard, work hard.</i>"
zhCN = "对木材传统做法持异议的人们已掌控铁与科学，用以制造先进的机械。\n他们以聪明才智、效率和对环境的蔑视来推动进步。\n他们的格言：<i>努力工作，努力工作。</i>"
zhTW = "那些背離木材傳統做法的人，已經掌握鐵與科學，用以打造先進的機械。\n他們以才智、效率與對環境的蔑視推動進步。\n他們的座右銘：<i>努力工作，努力工作。</i>"
ruRU = "Инакомыслящие в традиционных подходах к древесине освоили железо и науку, чтобы создавать передовые машины.\nОни достигают прогресса благодаря изобретательности, эффективности и презрению к окружающей среде.\nИх девиз: <i>Работай усердно, работай усердно.</i>"
jaJP = "木材の伝統的な方法に異を唱える者たちは、鉄と科学を支配して高度な機械を作り出した。\n彼らは機知と効率、そして環境を軽視することで進歩を遂げる。\n彼らのモットーは: <i>一生懸命働け、一生懸命働け。</i>"
frFR = "Des dissidents des méthodes traditionnelles du travail du bois, ils ont dominé le fer et la science pour construire des machines avancées.\nIls accomplissent le progrès avec ingéniosité, efficacité et mépris pour l'environnement.\nLeur slogan : <i>Travaille dur, travaille dur.</i>"
deDE = "Abtrünnige der traditionellen Holznutzung haben Eisen und Wissenschaft beherrscht, um fortschrittliche Maschinen zu bauen.\nSie erreichen den Fortschritt mit Einfallsreichtum, Effizienz und Umweltverachtung.\nIhr Motto: <i>Arbeite hart, arbeite hart.</i>"
plPL = "Dysydenci tradycyjnych metod obróbki drewna opanowali żelazo i naukę, by budować zaawansowane maszyny.\nOsiągają postęp dzięki pomysłowości, wydajności i pogardzie dla środowiska.\nIch motto: <i>Pracuj ciężko, pracuj ciężko.</i>"
ptBR = "Dissidentes dos métodos tradicionais da madeira, dominaram o ferro e a ciência para construir maquinário avançado.\nAlcançam o progresso com engenho, eficiência e desprezo pelo meio ambiente.\nSeu lema: <i>Trabalha duro, trabalha duro.</i>"
koKR = "목재의 전통적 방식에 반하는 자들은 철과 과학을 지배해 첨단 기계를 건설했다.\n그들은 재주와 효율성, 그리고 환경에 대한 무시로 진보를 이룬다.\n그들의 좌우명: <i>열심히 일하라, 열심히 일하라.</i>"
csCZ = "Disidenti tradičních způsobů práce se dřevem ovládli železo a vědu, aby vybudovali pokročilé stroje.\nDosahují pokroku díky důvtipu, efektivitě a pohrdání životním prostředím.\nJejich heslo: <i>Tvrdě pracuj, pracuj tvrdě.</i>"
viVN = "Những người bất đồng với các cách chế biến gỗ truyền thống, đã nắm vững sắt và khoa học để chế tạo máy móc tiên tiến.\nHọ đạt được tiến bộ bằng sự khéo léo, hiệu quả và sự khinh miệt đối với môi trường.\nChâm ngôn của họ: <i>Làm việc chăm chỉ, làm việc chăm chỉ.</i>"

