["MapMetadata.ThousandIslands.Description"]
raw = "Fins i tot per a nedadors nats, convertir un arxipèlag en una colònia industrial pròspera no és tasca fàcil."
status = "normal"
enUS = "Even for natural-born swimmers, turning an archipelago into a prosperous industrial colony is no easy task."
zhCN = "即使是天生的游泳健将，将一个群岛打造成一个繁荣的工业殖民地也并非易事。"
zhTW = "即使是天生會游泳的人，將一座群島變成繁榮的工業殖民地也不是一件容易的事。"
ruRU = "Даже для прирожденных пловцов превращение архипелага в процветающую индустриальную колонию — задача не из легких."
jaJP = "生まれつき泳ぐのが得意な人ですら、群島を工業的に繁栄した植民地へ変えることは容易ではない。"
frFR = "Même pour les nageurs natifs, transformer un archipel en une colonie industrielle prospère n'est pas une tâche facile."
deDE = "Sogar für von Natur aus geborene Taucher ist es nicht einfach, ein Archipel in eine wohlhabende Industriekolonie zu verwandeln."
plPL = "Nawet dla naturalnych pływaków, przekształcenie archipelagu w prosperującą kolonię przemysłową nie jest łatwe."
ptBR = "Mesmo para nadadores natos, transformar um arquipélago em uma colônia industrial próspera não é uma tarefa fácil."
koKR = "타고난 수영선수들조차도 군도를 번영하는 산업 식민지로 만드는 일은 쉽지 않다."
csCZ = "I pro přirozené plavce není proměnit souostroví v prosperující průmyslovou kolonii snadný úkol."
viVN = "Ngay cả với những người bơi bẩm sinh, việc biến một quần đảo thành một thuộc địa công nghiệp thịnh vượng không phải là nhiệm vụ dễ dàng."

