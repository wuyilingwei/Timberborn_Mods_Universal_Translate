["Tutorial.VerticalArchitecture.BuildRooftopTerrace"]
status = "normal"
raw = "A l'erm, és important optimitzar l'ús de l'espai. Els castors ho fan fent créixer les seves ciutats en vertical.\n\nAlguns edificis, com les Cases, tenen teulades planes que poden suportar altres estructures.\n\nConstruïm ara una Terrassa al terrat. Potser hauràs d'utilitzar Escales per connectar-la amb el districte."
enUS = "In the err, it is important to optimize the use of space. Beavers do this by building their cities vertically.\n\nSome buildings, like Houses, have flat roofs that can support other structures.\n\nLet's now build a Rooftop Terrace. You may need to use Stairs to connect it with the district."
zhCN = "在生活中，优化空间的使用是很重要的。海狸通过垂直发展来建设他们的城市。\n\n一些建筑，例如房屋，拥有可以支持其他结构的平屋顶。\n\n现在我们来建一个屋顶露台。也许你需要使用楼梯将其连接到区块。"
zhTW = "在這個模組中，空間的使用是非常重要的。海狸通過垂直增長來擴展他們的城市。\n\n一些建築，例如房屋，有平坦的屋頂可以支撐其他結構。\n\n現在讓我們在屋頂上建一個露台。你可能需要使用樓梯來將它與區域連接起來。"
ruRU = "На участке важно оптимизировать использование пространства. Бобры это делают, строя свои города вертикально.\n\nНекоторые здания, такие как Дома, имеют плоские крыши, которые могут поддерживать другие конструкции.\n\nДавайте сейчас построим Терассу на крыше. Возможно, вам придется использовать Лестницы, чтобы соединить ее с районом."
jaJP = "「エルムでは、スペースの使用を最適化することが重要です。ビーバーはそのために、都市を垂直に成長させます。\n\nいくつかの建物、例えば家は、他の構造物を支えることができる平らな屋根を持っています。\n\nそれでは、屋上にテラスを建設しましょう。地区と接続するために階段を使用する必要があるかもしれません。」"
frFR = "À l'erm, il est important d'optimiser l'utilisation de l'espace. Les castors le font en construisant leurs villes verticalement.\n\nCertaines bâtiments, comme les Maisons, ont des toits plats qui peuvent supporter d'autres structures.\n\nConstruisons maintenant une Terrasse sur le toit. Vous devrez peut-être utiliser des Échelles pour la relier au district."
deDE = "Im Eram ist es wichtig, den Raum optimal zu nutzen. Die Biber tun dies, indem sie ihre Städte vertikal wachsen lassen.\n\nEinige Gebäude, wie die Häuser, haben flache Dächer, die andere Strukturen unterstützen können.\n\nLass uns jetzt eine Terrasse auf dem Dach bauen. Möglicherweise musst du Treppen verwenden, um sie mit dem Bezirk zu verbinden."
plPL = "W erze ważne jest optymalizowanie wykorzystania przestrzeni. Bobry robią to, budując swoje miasta w pionie.\n\nNiektóre budynki, takie jak Domy, mają płaskie dachy, które mogą podtrzymywać inne struktury.\n\nTeraz zbudujmy taras na dachu. Może będziesz musiał użyć schodów, aby połączyć go z dzielnicą."
ptBR = "Na colônia, é importante otimizar o uso do espaço. Os castores fazem isso construindo suas cidades verticalmente.\n\nAlguns edifícios, como as Casas, têm telhados planos que podem suportar outras estruturas.\n\nVamos construir agora um Terraço no telhado. Você pode precisar usar Escadas para conectá-lo ao distrito."
koKR = "마을에서 공간 활용을 최적화하는 것이 중요합니다. 비버들은 수직으로 도시를 확장하면서 이를 실현합니다.\n\n일부 건물, 예를 들어 집들은 다른 구조를 지탱할 수 있는 평평한 지붕을 가지고 있습니다.\n\n이제 옥상에 테라스를 만들어봅시다. 구역과 연결하기 위해 사다리를 사용해야 할 수도 있습니다."
csCZ = "Na ermu, je důležité optimalizovat využití prostoru. Bobři to dělají tak, že budují svá města vertikálně.\n\nNěkteré budovy, jako jsou Domy, mají ploché střechy, které mohou nést další struktury.\n\nTeď postavíme Terasu na střeše. Možná budeš muset použít Schody, abys ji spojil s okrskem."
viVN = "Tại lerm, việc tối ưu hóa không gian là rất quan trọng. Những con rái cá làm điều này bằng cách phát triển thành phố của chúng theo chiều dọc.\n\nMột số tòa nhà, như Nhà ở, có mái phẳng có thể hỗ trợ các cấu trúc khác.\n\nHãy xây dựng một Sân thượng trên mái nhà. Có thể bạn sẽ cần sử dụng Cầu thang để kết nối nó với khu vực."

