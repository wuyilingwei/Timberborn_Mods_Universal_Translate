["NaturalResource.Oak.FlavorDescription"]
raw = "Les millors construccions de castors són totes de roure i reforçades amb ferro."
status = "normal"
enUS = "The finest beaver structures are all made of oak and reinforced with iron."
zhCN = "最好的海狸建筑都是用橡木制成并以铁加固。"
zhTW = "最好的河狸建築全部由橡木製成，並以鐵加固。"
ruRU = "Лучшие сооружения бобров сделаны из дуба и усилены железом."
jaJP = "最高のビーバーの建造物はすべてオーク材で作られており、鉄で強化されています。"
frFR = "Les meilleures constructions de castors sont toutes en chêne et renforcées avec du fer."
deDE = "Die besten Biberkonstruktionen bestehen alle aus Eiche und sind mit Eisen verstärkt."
plPL = "Najlepsze konstrukcje bobrów są wszystkie z dębu i wzmocnione żelazem."
ptBR = "As melhores construções de castores são todas de carvalho e reforçadas com ferro."
koKR = "가장 좋은 비버 건축물은 모두 참나무로 만들어져 있으며 철로 보강되어 있다."
csCZ = "Nejlepší stavby bobrů jsou všechny z dubového dřeva a vyztužené železem."
viVN = "Các công trình hải ly tốt nhất đều làm bằng gỗ sồi và được gia cố bằng sắt."

