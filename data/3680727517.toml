["NaturalResource.Carrot.FlavorDescription"]
raw = "Les pastanagues crues ajuden els castors a equilibrar la dieta sense renunciar al plaer de cruixir."
status = "normal"
enUS = "Raw carrots help beavers balance their diet without giving up the pleasure of crunching."
zhCN = "生胡萝卜帮助海狸平衡饮食，同时不放弃咬碎的乐趣。"
zhTW = "生胡蘿蔔有助於海狸平衡牠們的飲食，同時不放棄咀嚼的樂趣。"
ruRU = "Сырая морковь помогает бобрам сбалансировать рацион, не отказываясь от удовольствия хруста."
jaJP = "生のにんじんはビーバーの食事バランスを整えるのを助け、シャキシャキと噛む楽しみを手放すことなく楽しめる。"
frFR = "Les carottes crues aident les castors à équilibrer leur alimentation sans renoncer au plaisir de croquer."
deDE = "Rohkarotten helfen Bibern, ihre Ernährung auszugleichen, ohne auf das knusprige Vergnügen zu verzichten."
plPL = "Surowe marche pomagają bobrom utrzymać zbilansowaną dietę, nie rezygnując z przyjemności chrupania."
ptBR = "As cenouras cruas ajudam os castores a equilibrar a dieta sem abrir mão do prazer da crocância."
koKR = "생당근은 비버들이 식단의 균형을 잡는 데 도움이 되며, 바삭거리는 즐거움을 포기하지 않게 해준다."
csCZ = "Syrové mrkve pomáhají bobrům vyvážit stravu, aniž by se vzdali potěšení z křupání."
viVN = "Cà rốt sống giúp hải ly cân bằng chế độ ăn của chúng mà không từ bỏ niềm thích thú giòn rụm khi nhai."

