["Tutorial.Housing.Lodges"]
status = "normal"
raw = "Dos castors són millor que un! Les cases milloren el benestar dels teus castors i permeten que la població de cuesfusta creixi.\n\nEls castors s'assignen automàticament als espais d'habitatge disponibles."
enUS = "Two beavers are better than one! Houses improve the well-being of your beavers and allow the lumberjack population to grow.\n\nBeavers are automatically assigned to available living spaces."
zhCN = "“两只海狸比一只好！房屋提高您海狸的幸福感，并允许木尾的人口增长。\n\n海狸会自动分配到可用的住房空间。”"
zhTW = "兩隻海狸總比一隻好! 房屋提高了你海狸的福利，並允許木尾的族群增長。\n\n海狸會自動分配到可用的居住空間。"
ruRU = "Два бобра лучше, чем один! Дома улучшают благосостояние ваших бобров и позволяют населению хвостастиков расти.\n\nБобры автоматически назначаются на доступные жилые площади."
jaJP = "「二匹のビーバーは一匹よりも優れています！家はビーバーの幸福度を向上させ、木材を持つ人口の増加を可能にします。\n\nビーバーは自動的に利用可能な住居スペースに割り当てられます。」"
frFR = "Deux castors valent mieux qu'un ! Les maisons améliorent le bien-être de vos castors et permettent à la population de queues de bois de croître.\n\nLes castors sont automatiquement assignés aux espaces de logement disponibles."
deDE = "Zwei Biber sind besser als einer! Die Häuser verbessern das Wohlbefinden deiner Biber und ermöglichen es, die Population der Holzschwänze wachsen zu lassen.\n\nDie Biber werden automatisch den verfügbaren Wohnräumen zugewiesen."
plPL = "Dwa bobry są lepsze niż jeden! Domy poprawiają dobrostan twoich bobrów i pozwalają na wzrost populacji ogonów.\n\nBobry są automatycznie przypisywane do dostępnych miejsc zamieszkania."
ptBR = "Dois castores são melhores que um! As casas melhoram o bem-estar dos seus castores e permitem que a população de caudas de madeira cresça.\n\nOs castores são automaticamente designados para os espaços de habitação disponíveis."
koKR = "두 평가가 하나보다 낫다! 집은 너의 비버들의 행복을 개선하고 너의 귀신토끼 개체수를 증가시킵니다.\n\n비버는 자동으로 이용 가능한 주거 공간에 배정됩니다."
csCZ = "Dva bobři jsou lepší než jeden! Domy zlepšují pohodu tvých bobrů a umožňují růst populace dřevěných ocasů.\n\nBobři jsou automaticky přiřazeni k dostupným obytným prostorům."
viVN = "Không chỉ một mà là hai chú thú rừng! Những ngôi nhà nâng cao sự thoải mái của các chú thú và cho phép dân số gỗ tăm phát triển.\n\nCác chú thú sẽ tự động được chỉ định vào các không gian nhà ở có sẵn."

