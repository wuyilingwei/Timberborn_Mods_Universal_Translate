["NewGameConfigurationPanel.NormalModeDescription"]
raw = "Vols un repte.\n\nEl teu assentament comença amb recursos moderats.\n\nLes sequeres i les marees tòxiques són més suaus al principi però s'intensifiquen amb el temps."
status = "normal"
enUS = "Do you want a challenge?\n\nYour settlement starts with moderate resources.\n\nDroughts and toxic tides are milder at first but intensify over time."
zhCN = "你想要一个挑战吗？\n你的定居点初始资源适中。\n干旱和有毒潮汐在一开始比较温和，但随着时间推移会变得越来越强烈。"
zhTW = "你想要一場挑戰嗎？\n你的定居點以適中的資源開始。\n乾旱和有毒潮汐在一開始較為溫和，但會隨著時間變得更嚴重。"
ruRU = "Хочешь вызова.\nТвоё поселение начинается с умеренных ресурсов.\nЗасухи и токсичные приливы сначала менее суровы, но со временем усиливаются."
jaJP = "挑戦を望みますか？\nあなたの開拓地は適度な資源から始まります。\n干ばつと有毒な潮汐は初めは穏やかですが、時間とともに強くなります。"
frFR = "Voulez-vous un défi ?\n\nVotre colonie commence avec des ressources modérées.\n\nLes sécheresses et les marées toxiques sont plus douces au début mais s'intensifient avec le temps."
deDE = "Willst du eine Herausforderung.\n\nDeine Siedlung beginnt mit moderaten Ressourcen.\n\nDürreperioden und toxische Gezeiten sind am Anfang milder, aber mit der Zeit verschärfen sie sich."
plPL = "Chcesz wyzwania.\n\nTwoje osiedle zaczyna się od umiarkowanych zasobów.\n\nSusze i toksyczne przypływy są łagodniejsze na początku, ale z czasem nasilają się."
ptBR = "Você quer um desafio.\n\nSeu assentamento começa com recursos moderados.\n\nAs secas e as marés tóxicas são mais brandas no começo, mas se intensificam com o tempo."
koKR = "도전을 원하나요.\n\n당신의 정착지는 보통 수준의 자원으로 시작합니다.\n\n가뭄과 독성 파도는 처음에는 더 완화되지만 시간이 지남에 따라 강해진다."
csCZ = "Chceš výzvu.\n\nTvé osídlení začíná se středními zdroji.\n\nSucha a toxické přílivy jsou zpočátku mírnější, ale časem zesilují."
