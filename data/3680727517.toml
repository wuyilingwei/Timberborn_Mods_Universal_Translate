["MapMetadata.Diorama.Description"]
raw = "Abans que els deixin supervisar grans colònies, els aspirants a constructors han de gestionar projectes a petita escala com aquest."
status = "normal"
enUS = "Before they're allowed to supervise large colonies, aspiring builders must manage small-scale projects like this."
zhCN = "在被允许监督大型殖民地之前，准建造者们必须像这样管理小规模的项目。"
zhTW = "在被允許監督大型殖民地之前，準建造者必須管理像這樣的小型專案。"
ruRU = "Прежде чем им позволят руководить большими колониями, претенденты на должность строителей должны управлять небольшими проектами, подобными этому."
jaJP = "大規模なコロニーを監督できるようになる前に、建設者を志す者たちはこのような小規模なプロジェクトを管理しなければならない。"
frFR = "Avant d'être autorisés à superviser de grandes colonies, les aspirants constructeurs doivent gérer des projets à petite échelle comme ceux-ci."
deDE = "Bevor sie die Überwachung großer Kolonien übernehmen dürfen, müssen angehende Baumeister Kleinprojekte wie dieses leiten."
plPL = "Zanim zostaną dopuszczeni do nadzorowania dużych kolonii, aspiranci na konstruktorów będą musieli zarządzać projektami na małą skalę, takimi jak te."
ptBR = "Antes de permitir que eles supervisionem grandes colônias, os aspirantes a construtores precisam gerenciar projetos em pequena escala como este."
koKR = "큰 식민지를 감독하도록 허락되기 전에 건설가를 지망하는 사람들은 이와 같은 소규모 프로젝트를 관리해야 한다."
csCZ = "Ještě než jim bude dovoleno dohlížet na velké kolonie, uchazeči o stavitele musí zvládat projekty v malém měřítku, jako je tento."
viVN = "Trước khi được phép giám sát các khu định cư lớn, những người có tham vọng trở thành thợ xây phải quản lý các dự án ở quy mô nhỏ như thế này."

