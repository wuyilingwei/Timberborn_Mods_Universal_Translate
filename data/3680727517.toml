["Building.SmallIndustrialPile.FlavorDescription"]
raw = "\"Així que hi han posat un sostre i n'han dit industrial. Clàssic.\" —Pina"
status = "normal"
enUS = "So they've put a roof on it and they've called it industrial. Classic. —Pina"
zhCN = "于是他们给它盖上了屋顶，叫做工业风。经典。 —Pina"
zhTW = "所以他們給它蓋上了一個屋頂，並稱它為工業風格。經典。—Pina"
ruRU = "\"Итак, на него поставили крышу и назвали его индустриальным. Классика.\" —Пина"
jaJP = "\"それで屋根をつけて、それを工業的だと呼んだ。クラシック。\" —Pina"
frFR = "Alors ils ont mis un toit et on l'a appelé industriel. Classique. —Pina"
deDE = "\"Also haben sie ihm ein Dach aufgesetzt und es als industriell bezeichnet. Klassisch.\" —Pina"
plPL = "Tak więc na to położyli dach i nazwali to przemysłowym. Klasyczny. —Pina"
ptBR = "\"Então eles colocaram um teto nele e o chamaram de industrial. Clássico.\" —Pina"
koKR = "\"그래서 그 위에 지붕을 얹고 산업용이라고 불렀다. 클래식.\" —Pina"
csCZ = "\"Tak na to dali střechu a nazvali to průmyslovým. Klasika.\" —Pina"
viVN = "\"Vậy họ đã cho nó một mái che và gọi nó là công nghiệp. Cổ điển.\" —Pina"

