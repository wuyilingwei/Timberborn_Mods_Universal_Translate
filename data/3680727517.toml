["MapMetadata.MountainRange.Description"]
raw = "En la cerca desesperada d'aigua dolça, els castors estan disposats a pujar fins i tot les muntanyes més altes."
status = "normal"
enUS = "In the desperate search for freshwater, beavers are willing to climb even the highest mountains."
zhCN = "在对淡水的绝望追寻中，海狸们愿意攀登甚至最高的山峰。"
zhTW = "在尋找淡水的絕望中，海狸們願意攀登甚至最高的山峰。"
ruRU = "В отчаянном поиске пресной воды бобры готовы взбираться на самые высокие горы."
jaJP = "必死に淡水を求めて、ビーバーは最も高い山さえ登ろうとする。"
frFR = "Dans la quête désespérée d'eau douce, les castors sont prêts à gravir même les montagnes les plus hautes."
deDE = "Auf der verzweifelten Suche nach Süßwasser sind die Biber bereit, selbst die höchsten Berge zu erklimmen."
plPL = "W desperackim poszukiwaniu słodkiej wody bobry są gotowe wspiąć się nawet na najwyższe góry."
ptBR = "Na busca desesperada por água doce, os castores estão dispostos a subir até as montanhas mais altas."
koKR = "담수를 절실히 찾는 가운데 비버들은 심지어 가장 높은 산들까지도 오를 의지가 있다."
csCZ = "Při zoufalém hledání sladké vody jsou bobři ochotni vyšplhat až na ty nejvyšší hory."
viVN = "Trong cuộc tìm kiếm nước ngọt tuyệt vọng, những con hải ly sẵn sàng leo lên cả những ngọn núi cao nhất."

