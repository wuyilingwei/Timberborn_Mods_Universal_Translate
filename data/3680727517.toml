["MapMetadata.Meander.Description"]
raw = "Els enginyers castors volen aprofitar la curvatura natural de les ribes del riu. Planificar el millor ús de l'espai limitat és la part difícil."
status = "normal"
enUS = "The beaver engineers want to take advantage of the natural curvature of the riverbanks. Planning the best use of the limited space is the hard part."
zhCN = "河狸工程师想要充分利用河岸自然的弯曲。规划有限空间的最佳利用是最难的部分。"
zhTW = "河狸工程師們想要利用河岸的自然彎曲。規劃有限空間的最佳利用是最困難的部分。"
ruRU = "Инженеры-бобры хотят воспользоваться естественным изгибом берегов реки. Планировать наилучшее использование ограниченного пространства — самая трудная часть."
jaJP = "ビーバーの技術者は川岸の自然な曲線を活かしたいと考えている。限られたスペースを最適に活用する計画を立てることが難しい。"
frFR = "Les ingénieurs castors veulent tirer parti de la courbure naturelle des berges du fleuve. Planifier la meilleure utilisation de l'espace limité est la partie la plus difficile."
deDE = "Die Biber-Ingenieure wollen die natürliche Krümmung der Ufer des Flusses nutzen. Die Planung der optimalen Nutzung des begrenzten Raums ist der schwierige Teil."
plPL = "Inżynierowie bobrów chcą wykorzystać naturalne zakrzywienie brzegów rzeki. Zaplanowanie najlepszego wykorzystania ograniczonej przestrzeni to najtrudniejsza część."
ptBR = "Os engenheiros castores querem aproveitar a curvatura natural das margens do rio. Planejar o melhor uso do espaço limitado é a parte difícil."
koKR = "비버 엔지니어들은 강둑의 자연스러운 곡선을 활용하고자 한다. 한정된 공간을 최적으로 활용하는 것이 가장 어려운 부분이다."
csCZ = "Bobří inženýři chtějí využít přirozené křivky břehů řeky. Naplánování nejlepšího využití omezeného prostoru je ta nejtěžší část."
viVN = "Các kỹ sư hải ly muốn tận dụng độ cong tự nhiên của bờ sông. Lập kế hoạch cho việc sử dụng tối ưu không gian hạn chế là phần khó nhất."

