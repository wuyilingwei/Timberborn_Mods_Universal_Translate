["Tutorial.HaulersAndWorkforce.BuildHaulingPost"]
status = "normal"
raw = "A mesura que el teu assentament creix, processa quantitats més grans de béns. Transportar-los ocupa una part important del dia dels teus treballadors.\n\nEls transportistes ajuden amb això. Mouen els béns per tot el districte seguint la demanda.\n\nConstruïm ara un Centre de transport."
enUS = "As your settlement grows, process larger quantities of goods. Transporting them takes up an important part of your workers' day.\n\nHaulers help with this. They move goods throughout the district according to demand.\n\nLet's build a Hauling Post now."
zhCN = "随着你的定居点发展，处理更大量的物品。运输这些物品占用了你工人一天中重要的一部分时间。\n\n搬运工在这方面提供帮助。他们根据需求在整个区域内移动物品。\n\n现在我们来建造一个运输中心。"
zhTW = "隨著你的定居點擴大，處理的物品數量也增加。運輸這些物品佔用了你工人的一大部分時間。\n\n運輸工幫助解決這個問題。他們根據需求在整個區域內移動物品。\n\n現在我們來建造一個運輸中心。"
ruRU = "По мере роста вашего поселения перерабатываются большие объемы товаров. Их транспортировка занимает важную часть рабочего дня ваших работников.\n\nГрузчики помогают с этим. Они перемещают товары по всему району, исходя из спроса.\n\nТеперь давайте построим Центр транспортировки."
jaJP = "「あなたの集落が成長するにつれて、より多くの資源を処理する必要があります。それらを運ぶことは、あなたの労働者の日々の重要な仕事の一部です。\n\n運搬者がその手助けをします。彼らは需要に応じて、地区の中で物資を運びます。\n\nさあ、今度は輸送センターを建設しましょう。」"
frFR = "Au fur et à mesure que votre établissement grandit, vous traitez des quantités plus importantes de biens. Les transporter occupe une part importante de la journée de vos travailleurs.\n\nLes transporteurs aident avec cela. Ils déplacent les biens à travers le district en fonction de la demande.\n\nConstruisons maintenant un Centre de transport."
deDE = "„Wenn dein Siedlung wächst, verarbeite größere Mengen an Gütern. Der Transport dieser Güter nimmt einen wichtigen Teil des Tages deiner Arbeiter in Anspruch.\n\nDie Transportarbeiter helfen dabei. Sie bewegen die Güter im gesamten Bezirk entsprechend der Nachfrage.\n\nLass uns jetzt ein Transportzentrum bauen.“"
plPL = "W miarę jak twoja osada rośnie, przetwarzaj większe ilości towarów. Transportowanie ich zajmuje ważną część dnia twoich pracowników.\n\nTransporterzy w tym pomagają. Przemieszczają towary po całym okręgu zgodnie z zapotrzebowaniem.\n\nZbudujmy teraz Centrum transportowe."
ptBR = "À medida que seu assentamento cresce, processa quantidades maiores de bens. Transportá-los ocupa uma parte importante do dia dos seus trabalhadores.\n\nOs transportadores ajudam com isso. Movem os bens por todo o distrito seguindo a demanda.\n\nVamos construir agora um Centro de transporte."
koKR = "네 정착지가 성장함에 따라 더 많은 양의 자원을 처리하게 됩니다. 이 자원들을 운반하는 것은 너의 노동자들의 하루 중 중요한 부분을 차지합니다.\n\n운반꾼들이 이 일을 도와줍니다. 그들은 수요에 따라 지역 내에서 자원들을 이동시킵니다.\n\n이제 운송 센터를 건설합시다."
csCZ = "Jak vaše osídlení roste, zpracováváte větší množství zboží. Jeho přeprava zabírá velkou část dne vašich pracovníků.\n\nDoprava pomáhá s tímto úkolem. Přesouvají zboží po celém obvodu podle poptávky.\n\nTeď postavme Dopravní centrum."
viVN = "Khi khu định cư của bạn phát triển, việc xử lý những khối lượng hàng hóa lớn hơn trở nên cần thiết. Việc vận chuyển chúng chiếm một phần quan trọng trong ngày làm việc của công nhân của bạn.\n\nCác nhân viên giao vận giúp đỡ trong việc này. Họ di chuyển hàng hóa khắp khu vực theo nhu cầu.\n\nHãy cùng xây dựng một Trung tâm vận chuyển ngay bây giờ."

["Tutorial.HaulersAndWorkforce.ChangeWorkforce"]
status = "normal"
raw = "Alguns llocs de treball, com els Centres de transport, no omplen totes les places per defecte. Pots canviar el nombre de treballadors desitjats al panell de l'edifici.\n\nTambé pots controlar com s'assignen els treballadors mitjançant les prioritats de lloc de treball. Per exemple, el Centre de transport normalment es pot posar amb una prioritat més baixa.\n\nProvem-ho ara."
enUS = "Some jobs, like the Transport Centers, do not fill all positions by default. You can change the desired number of workers in the building panel.\n\nYou can also control how workers are assigned by using job priorities. For example, the Transport Center can typically be set with a lower priority.\n\nLet's try it now."
zhCN = "“某些工作岗位，如运输中心，默认情况下不会填满所有的名额。你可以在建筑面板中更改所需的工人数量。\n\n你还可以通过工作岗位的优先级来控制工人的分配。例如，运输中心通常可以设置为较低的优先级。\n\n现在让我们试一下。”"
zhTW = "某些工作場所，例如運輸中心，默認不會填滿所有職位。您可以在建築面板中更改所需的工人數量。\n\n您還可以通過工作職位的優先級來控制工人的分配。例如，運輸中心通常可以設置為較低的優先級。\n\n現在讓我們試試看。"
ruRU = "Некоторые рабочие места, такие как Центры транспортировки, не заполняют все вакансии по умолчанию. Вы можете изменить количество желаемых рабочих на панели здания.\n\nВы также можете контролировать, как назначаются рабочие, с помощью приоритетов рабочих мест. Например, Центр транспортировки обычно можно установить с более низким приоритетом.\n\nДавайте попробуем это сейчас."
jaJP = "いくつかの職場、例えば輸送センターは、デフォルトではすべてのポジションを埋めません。建物のパネルで必要な労働者の数を変更できます。\n\nまた、職場の優先順位を使用して労働者の割り当てを管理できます。たとえば、輸送センターは通常、優先順位を低く設定することができます。\n\nさあ、今すぐ試してみましょう。"
frFR = "Certains lieux de travail, comme les Centres de transport, ne remplissent pas tous les postes par défaut. Vous pouvez changer le nombre de travailleurs souhaités dans le panneau de l'immeuble.\n\nVous pouvez également contrôler comment les travailleurs sont affectés grâce aux priorités de lieu de travail. Par exemple, le Centre de transport peut généralement être placé avec une priorité plus basse.\n\nEssayons cela maintenant."
deDE = "Einige Arbeitsplätze, wie die Transportzentren, füllen standardmäßig nicht alle Plätze. Du kannst die gewünschte Anzahl von Arbeitern im Gebäudepanel ändern.\n\nDu kannst auch steuern, wie die Arbeiter zugewiesen werden, indem du die Arbeitsplatzprioritäten anpasst. Zum Beispiel kann das Transportzentrum normalerweise mit einer niedrigeren Priorität belegt werden.\n\nLass es uns jetzt ausprobieren."
plPL = "Niektóre miejsca pracy, takie jak Centrum transportowe, domyślnie nie wypełniają wszystkich miejsc. Możesz zmienić liczbę pożądanych pracowników w panelu budynku.\n\nMożesz również kontrolować, jak pracownicy są przydzielani, za pomocą priorytetów miejsc pracy. Na przykład Centrum transportowe można zwykle ustawić z niższym priorytetem.\n\nSpróbujmy teraz."
ptBR = "Alguns locais de trabalho, como os Centros de Transporte, não preenchem todas as vagas por padrão. Você pode mudar o número de trabalhadores desejados no painel do edifício.\n\nVocê também pode controlar como os trabalhadores são alocados através das prioridades de trabalho. Por exemplo, o Centro de Transporte geralmente pode ser definido com uma prioridade mais baixa.\n\nVamos experimentar isso agora."
koKR = "일부 작업 장소, 예를 들어 물류 센터는 기본적으로 모든 자리를 채우지 않습니다. 건물 패널에서 원하는 근무자 수를 변경할 수 있습니다.\n\n또한 직무 우선 순위를 통해 작업자를 어떻게 배정할지 제어할 수 있습니다. 예를 들어, 물류 센터는 일반적으로 더 낮은 우선 순위로 설정할 수 있습니다.\n\n이제 시도해 봅시다."
csCZ = "Některá pracovní místa, jako jsou Dopravní centra, ve výchozím nastavení neobsazují všechna místa. Můžeš změnit počet požadovaných pracovníků v panelu budovy.\n\nMůžeš také řídit, jak jsou pracovníci přidělováni, pomocí priorit pracovních míst. Například Dopravní centrum může být obvykle nastaveno na nižší prioritu.\n\nZkusme to nyní."
viVN = "Các địa điểm làm việc, như Trung tâm vận tải, không tự động lấp đầy tất cả các vị trí. Bạn có thể thay đổi số lượng công nhân mong muốn trong bảng điều khiển của tòa nhà.\n\nBạn cũng có thể kiểm soát cách các công nhân được phân công thông qua các ưu tiên của vị trí công việc. Ví dụ, Trung tâm vận tải thường có thể được đặt ở mức ưu tiên thấp hơn.\n\nHãy thử ngay bây giờ."

["Tutorial.HaulersAndWorkforce.PauseHaulingPost"]
status = "normal"
raw = "Pots posar edificis i obres en pausa. Això et dona més control sobre les accions dels castors.\n\nPer exemple, els llocs de treball en pausa es buiden automàticament i els treballadors es reassignen a altres llocs disponibles.\n\nSelecciona la Barraca de transportistes i posa-la en pausa fent clic al botó del seu panell."
enUS = "You can pause buildings and constructions. This gives you more control over the actions of the beavers.\n\nFor example, paused jobs automatically empty, and workers are reassigned to other available positions.\n\nSelect the Hauler's House and pause it by clicking the button on its panel."
zhCN = "你可以暂停建筑物和工程。这让你对海狸的行动有更多的控制。\n\n例如，暂停的工作岗位会自动清理，工人会被重新分配到其他可用岗位。\n\n选择运输站并通过点击其面板上的按钮将其暂停。"
zhTW = "你可以暫停建築和工作。這給了你更多對於海狸行動的控制。\n\n例如，暫停的工作會自動清空，工人會被重新指派到其他可用的工作。\n\n選擇搬運工小屋，並通過點擊其面板上的按鈕來暫停它。"
ruRU = "Вы можете приостановить здания и работы. Это дает вам больше контроля над действиями бобров.\n\nНапример, приостановленные рабочие места автоматически освобождаются, а рабочие переassignируются на другие доступные места.\n\nВыберите Хранилище перевозчиков и приостановите его, нажав кнопку на его панели."
jaJP = "「建物や作業を一時停止することができます。これにより、ビーバーの行動をよりコントロールできます。\n\n例えば、一時停止された作業は自動的に空になり、労働者は他の利用可能な場所に再配置されます。\n\n運搬小屋を選択し、そのパネルのボタンをクリックして一時停止します。」"
frFR = "Vous pouvez mettre les bâtiments et les ouvrages en pause. Cela vous donne plus de contrôle sur les actions des castors.\n\nPar exemple, les postes de travail en pause sont automatiquement libérées et les travailleurs sont réaffectés à d'autres postes disponibles.\n\nSélectionnez la Cabane des transporteurs et mettez-la en pause en cliquant sur le bouton de son panneau."
deDE = "Du kannst Gebäude und Arbeiten pausieren. Das gibt dir mehr Kontrolle über die Aktionen der Biber.\n\nZum Beispiel werden die pausierten Arbeitsplätze automatisch geleert und die Arbeiter anderen verfügbaren Stellen zugewiesen.\n\nWähle die Transporthütte aus und lege sie durch einen Klick auf die Schaltfläche in ihrem Panel in die Pause."
plPL = "Możesz wstrzymać budynki i prace. Daje ci to większą kontrolę nad działaniami bobrów.\n\nNa przykład, wstrzymane miejsca pracy są automatycznie opróżniane, a pracownicy są przekierowywani do innych dostępnych miejsc.\n\nWybierz Chatkę transportowców i wstrzymaj ją, klikając przycisk na jej panelu."
ptBR = "Você pode colocar edifícios e obras em pausa. Isso lhe dá mais controle sobre as ações dos castores.\n\nPor exemplo, os locais de trabalho em pausa são esvaziados automaticamente e os trabalhadores são realocados para outros locais disponíveis.\n\nSelecione a Cabana de transportadores e coloque-a em pausa clicando no botão de seu painel."
koKR = "건물과 작업을 일시 중지할 수 있습니다. 이는 비버의 행동을 더 잘 제어할 수 있게 해줍니다.\n\n예를 들어, 일시 중지된 작업장은 자동으로 비워지고 노동자들은 다른 사용 가능한 작업장으로 재배치됩니다.\n\n운송 대피소를 선택하고 패널의 버튼을 클릭하여 일시 중지하세요."
csCZ = "Můžeš pozastavit budovy a projekty. To ti dává větší kontrolu nad činnostmi bobrů.\n\nNapříklad, pracovní místa v pozastavení se automaticky uvolňují a pracovníci jsou přeřazeni na jiné dostupné pozice.\n\nVyber Sklad přepravců a pozastav ho kliknutím na tlačítko na jeho panelu."
viVN = "Bạn có thể tạm dừng các tòa nhà và công việc. Điều này cho phép bạn kiểm soát tốt hơn hành động của những con thú gỗ.\n\nVí dụ, các vị trí làm việc bị tạm dừng sẽ tự động bị bỏ trống và công nhân sẽ được phân công lại vào các vị trí còn trống khác.\n\nChọn Kho chứa những người vận chuyển và tạm dừng nó bằng cách nhấp vào nút trên bảng điều khiển của nó."

