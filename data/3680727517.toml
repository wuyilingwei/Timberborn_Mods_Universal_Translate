["Faction.IronTeeth.GameOver.Flavor"]
raw = "De vegades, la peça defectuosa més petita trenca tota la màquina."
status = "normal"
enUS = "Sometimes the smallest defective part breaks the whole machine."
zhCN = "有时，最微小的缺陷部件也会毁坏整台机器。"
zhTW = "有時，最微小的瑕疵零件也會讓整台機器崩壞。"
ruRU = "Иногда самая маленькая неисправная деталь ломает всю машину."
jaJP = "時には、最も小さな欠陥部品が機械全体を壊してしまう。"
frFR = "Parfois, la plus petite pièce défectueuse casse toute la machine."
deDE = "Manchmal bricht das kleinste defekte Teil die ganze Maschine."
plPL = "Czasami najmniejsza wadliwa część psuje całą maszynę."
ptBR = "Às vezes, a peça defeituosa mais pequena quebra toda a máquina."
koKR = "가끔은 가장 작은 결함이 있는 부품 하나가 전체 기계를 망가뜨리기도 한다."
csCZ = "Někdy i ta nejmenší vadná součástka rozbije celou mašinu."
viVN = "Đôi khi, bộ phận bị lỗi nhỏ nhất cũng có thể làm hỏng toàn bộ máy."

["Faction.IronTeeth.GameOver.Message"]
raw = "El teu assentament de Dents de Ferro ha caigut sense possibilitat de recuperació. Aquest és el final."
status = "normal"
enUS = "Your Iron Teeth settlement has fallen beyond recovery. This is the end."
zhCN = "你的铁牙定居点已无力挽回地坠落。这是结局。"
zhTW = "你的鐵牙聚落已經崩潰，無法挽回。這就是結局。"
ruRU = "Ваше поселение Железные Зубы пало без возможности восстановления. Это конец."
jaJP = "鉄の歯の拠点は回復の見込みを失い崩壊しました。これが終わりです。"
frFR = "Votre colonie des Dents de Fer est tombée sans possibilité de récupération. C'est la fin."
deDE = "Deine Siedlung der Eisernen Zähne ist gefallen, ohne Aussicht auf eine Wiederherstellung. Das ist das Ende."
plPL = "Twoja osada Żelazne Zęby upadła bez możliwości odzyskania. To koniec."
ptBR = "Seu assentamento de Dentes de Ferro caiu sem possibilidade de recuperação. Este é o fim."
koKR = "Iron Teeth의 정착지는 회복 불가능한 상태로 무너졌습니다. 이것이 끝입니다."
csCZ = "Tvá osada Železné zuby padla bez možnosti záchrany. To je konec."
viVN = "Khu định cư Răng Sắt của bạn đã sụp đổ và không còn cơ hội phục hồi. Đây là kết thúc."

["Faction.IronTeeth.WonderCompletionFlavor"]
raw = "Els teus pioners han volat sobre l'erm, deixant enrere un assentament pròsper. Si la Terra s'ha de recuperar, la nova prosperitat castora s'havia de compartir."
status = "normal"
enUS = "Your pioneers have flown over the wasteland, leaving behind a prosperous settlement. If Earth is to recover, the new beaver prosperity had to be shared."
zhCN = "你的拓荒者已经飞越荒原，留下一个繁荣的定居点。如果大地要恢复，新的河狸繁荣必须与他人分享。"
zhTW = "你的拓荒者已飛越荒原，留下一個繁榮的聚落。若地球要復甦，新的海狸繁榮必須與大家分享。"
ruRU = "Ваши пионеры пролетели над Эрмом, оставив позади процветающее поселение. Если Земля должна восстановиться, новое бобровое процветание должно было быть разделено."
jaJP = "あなたの開拓者たちは荒れ地の上を飛んで、繁栄する入植地を後にした。地球が回復するには、新たなビーバーの繁栄を分かち合わなければならない。"
frFR = "Tes pionniers ont volé au-dessus de l'erm, laissant derrière eux un établissement prospère. Si la Terre doit se rétablir, la nouvelle prospérité castor doit être partagée."
deDE = "Deine Pioniere sind über das Ödland geflogen und haben eine prosperierende Siedlung hinter sich gelassen. Wenn die Erde sich wieder erholen soll, muss der neue Biber-Wohlstand geteilt werden."
plPL = "Twoi pionierzy wzlecieli nad Erm, pozostawiając za sobą prosperującą osadę. Jeśli Ziemia ma odzyskać siły, nowy dobrobyt bobrów musiał zostać podzielony."
ptBR = "Seus pioneiros voaram sobre o ermo, deixando para trás um assentamento próspero. Se a Terra tem de se recuperar, a nova prosperidade castora tinha de ser compartilhada."
koKR = "당신의 개척자들이 황야를 넘어 번영하는 정착지를 남겼다. 대지가 회복되어야 한다면, 새로운 비버의 번영은 함께 나눠져야 했다."
csCZ = "Vaši průkopníci proletěli nad pustým krajem, zanechali za sebou prosperující osadu. Pokud se má Země zotavit, nová bobří prosperita by měla být sdílena."
viVN = "Những người tiên phong của ngươi đã bay qua hoang mạc, để lại một khu định cư thịnh vượng. Nếu Trái Đất phải được khôi phục, sự thịnh vượng mới của loài hải ly phải được chia sẻ."

["Faction.IronTeeth.WonderCompletionMessage"]
raw = "Ben fet! La teva destresa tecnològica t'ha permès aprofitar la força laboriosa de les Dents de Ferro per conquerir aquest mapa i construir la meravella de la facció."
status = "normal"
enUS = "Well done! Your technological prowess has enabled you to harness the industrious might of the Iron Teeth to conquer this map and build the faction's wonder."
zhCN = "干得好！你的科技技艺让你能够利用铁牙部落的勤劳力量，征服这张地图并建造该派系的奇迹。"
zhTW = "做得好！你的科技技藝讓你得以利用鐵牙部族的勞動力來征服這張地圖，並建造該派系的奇觀。"
ruRU = "Отлично сделано! Твоё технологическое мастерство позволило тебе воспользоваться трудолюбивой силой Железных Зубов, чтобы завоевать эту карту и построить чудо фракции."
jaJP = "よくやった！あなたの技術力が鉄の歯のたゆまぬ力を活用することを可能にし、このマップを征服し、派閥のワンダーを建設した。"
frFR = "Bien joué ! Votre savoir-faire technologique vous a permis de tirer parti de la force laborieuse des Dents de Fer pour conquérir cette carte et construire la merveille de la faction."
deDE = "Gut gemacht! Dein technologisches Können hat es dir ermöglicht, die fleißige Kraft der Eisenzähne zu nutzen, um diese Karte zu erobern und das Wunder der Fraktion zu erbauen."
plPL = "Dobra robota! Twoja techniczna zręczność pozwoliła ci wykorzystać pracowitą siłę Żelaznych Zębów, aby zdobyć tę mapę i zbudować cud frakcji."
ptBR = "Bem feito! Sua destreza tecnológica te permitiu aproveitar a força de trabalho diligente dos Dentes de Ferro para conquistar este mapa e construir a maravilha da facção."
koKR = "잘했어! 네 기술적 솜씨 덕분에 철 이빨의 노동력을 활용해 이 맵을 정복하고 파벌의 경이로운 건물을 지었다."
csCZ = "Dobrá práce! Tvoje technologické dovednosti ti umožnily využít pracovitou sílu Železných zubů k dobytí této mapy a vybudování zázraku frakce."
viVN = "Làm tốt lắm! Tài năng công nghệ của bạn đã cho phép bạn khai thác sức mạnh lao động của Răng Sắt để chinh phục bản đồ này và xây dựng kỳ quan của phe."

