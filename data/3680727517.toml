["NaturalResource.Pine.FlavorDescription"]
raw = "\"Oh, bosc majestuós, com t'enyoro!\" —Poeta castor desconegut"
status = "normal"
enUS = "\"Oh, majestic forest, how I long for you!\" —Unknown beaver poet"
zhCN = "\"哦，宏伟的森林，多么想念你！\" —未知的海狸诗人"
zhTW = "\"哦，雄偉的森林，多麼想念你！\" —不知名的海狸詩人"
ruRU = "\"О, величественный лес, как я скучаю по тебе!\" —неизвестный поэт-бобёр"
jaJP = "ああ、雄大な森よ、いかに恋しいことか！\" —未知のビーバー"
frFR = "\"Oh, forêt majestueuse, comme tu me manques !\" —Poète castor inconnu"
deDE = "\"Oh, majestätischer Wald, wie ich dich vermisse!\" —Unbekannter Biberpoet"
plPL = "\"O, majestatyczny las, jak bardzo tęsknię za tobą!\" —nieznany poeta bobra"
ptBR = "\"Oh, floresta majestosa, como eu sinto tua falta!\" —Poeta castor desconhecido"
koKR = "\"오, 장엄한 숲이여, 네가 그리워!\" —미상 비버 시인\""
csCZ = "\"Ó, majestátní lese, jak mi chybíš!\" —neznámý bobří básník"
viVN = "Ôi, khu rừng hùng vĩ, ta nhớ ngươi biết bao! —nhà thơ hải ly vô danh"

