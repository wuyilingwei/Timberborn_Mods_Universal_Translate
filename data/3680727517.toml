viVN = "Bạn có thể tạm dừng trò chơi vào bất kỳ lúc nào, điều này giúp bạn đánh giá tình hình và lập kế hoạch."

["Tutorial.Basics.ManageSpeed"]
status = "normal"
raw = "També pots augmentar la velocitat del joc per reduir els temps morts mentre els castors treballen o dormen."
enUS = "You can also increase the game speed to reduce downtime while the beavers work or sleep."
