status = "normal"

["Tutorial.Droughts.Description"]
new = "Felicitats! El teu assentament ha sobreviscut a la seva primera sequera.\n\nLes sequeres formen part del cicle estacional. Tornaran i s'allargaran amb el temps."
status = "normal"

["Tutorial.Forestry"]
new = "Silvicultura"
status = "normal"

["Tutorial.Forestry.Forester"]
new = "Els castors necessiten una font estable de troncs. És evident.\n\nFent servir punts de ciència produïts pel teu inventor, desbloqueja el guarda forestal. Després construeix-lo en una zona on vulguis plantar arbres."
status = "normal"

["Tutorial.Forestry.MarkBirchesForPlanting"]
new = "Fes servir l'eina Planta arbres i arbustos per plantar alguns bedolls. Creixen ràpidament, cosa que els fa una bona opció en un assentament incipient.\n\nIgual que els cultius, els arbres només creixen en zones irrigades i verdes.\n\nRecorda marcar les zones de plantació per talar."
status = "normal"

["Tutorial.HaulersAndWorkforce"]
new = "Transportistes i mà d'obra"
status = "normal"

["Tutorial.HaulersAndWorkforce.BuildHaulingPost"]
new = "A mesura que el teu assentament creix, processa quantitats més grans de béns. Transportar-los ocupa una part important del dia dels teus treballadors.\n\nEls transportistes ajuden amb això. Mouen els béns per tot el districte seguint la demanda.\n\nConstruïm ara un Centre de transport."
status = "normal"

["Tutorial.HaulersAndWorkforce.ChangeWorkforce"]
new = "Alguns llocs de treball, com els Centres de transport, no omplen totes les places per defecte. Pots canviar el nombre de treballadors desitjats al panell de l'edifici.\n\nTambé pots controlar com s'assignen els treballadors mitjançant les prioritats de lloc de treball. Per exemple, el Centre de transport normalment es pot posar amb una prioritat més baixa.\n\nProvem-ho ara."
status = "normal"

["Tutorial.HaulersAndWorkforce.PauseHaulingPost"]
new = "Pots posar edificis i obres en pausa. Això et dona més control sobre les accions dels castors.\n\nPer exemple, els llocs de treball en pausa es buiden automàticament i els treballadors es reassignen a altres llocs disponibles.\n\nSelecciona la Barraca de transportistes i posa-la en pausa fent clic al botó del seu panell."
status = "normal"

["Tutorial.Housing"]
new = "Habitatges"
status = "normal"

["Tutorial.Housing.Lodges"]
new = "Dos castors són millor que un! Les cases milloren el benestar dels teus castors i permeten que la població de cuesfusta creixi.\n\nEls castors s'assignen automàticament als espais d'habitatge disponibles."
status = "normal"

["Tutorial.IncreaseDesiredWorkers"]
new = "Augmenta els treballadors desitjats: {0}"
status = "normal"

["Tutorial.Introduction.Description"]
new = "Benvingut a Timberborn! Aquest tutorial t'ajudarà a posar la pota a l'erm i sobreviure als primers dies.\n\nAprendràs a utilitzar les eines necessàries per construir una comunitat de castors pròspera.\n\nA mesura que avancis pels passos següents, els consells apareixeran aquí."
status = "normal"

["Tutorial.LayerTool.ChangeUsingMouse"]
new = "Pots controlar la capa visible sense clicar els botons fent servir dreceres de teclat configurables.\n\nMoltes altres accions també tenen dreceres de teclat. Les trobaràs a les pistes o al menú Configuració."
status = "normal"

["Tutorial.LayerTool.ChangeUsingUI"]
new = "A mesura que el teu assentament creix en vertical, treballar sota edificis i terreny pot resultar difícil.\n\nL'eina de capes ajuda amb això amagant tot el que hi ha per sobre de la capa seleccionada.\n\nCanvia la capa visible fent clic als botons ressaltats."
status = "normal"

