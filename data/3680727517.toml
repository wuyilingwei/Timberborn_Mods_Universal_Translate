["NaturalResource.Dandelion.FlavorDescription"]
raw = "Als contes de fades dels castors, els dents de lleó són coneguts per les seves veus melòdiques."
status = "normal"
enUS = "In the beavers' fairy tales, lion's teeth are known for their melodic voices."
zhCN = "在海狸的童话故事中，狮子的牙齿因其悦耳的声音而闻名。"
zhTW = "在海狸的童話故事裡，蒲公英以其悅耳的旋律而聞名。"
ruRU = "В сказках фей-бобров зубы льва известны своими мелодичными голосами."
jaJP = "ビーバーの妖精物語では、ライオンの歯は旋律的な声で知られている。"
frFR = "Dans les contes de fées des castors, les dents de lion sont connues pour leurs voix mélodiques."
deDE = "In den Feenmärchen der Biber sind die Löwenzähne bekannt für ihre melodischen Stimmen."
plPL = "W bajkach bobrów zęby lwa są znane ze swoich melodyjnych głosów."
ptBR = "Nos contos de fadas dos castores, os dentes-de-leão são conhecidos por suas vozes melódicas."
