["Building.Metalsmith.FlavorDescription"]
raw = "\"Si vols que duri, fes-ho de metall. Això sí que ho feien bé, els humans.\" —Ol' Kazko"
status = "normal"
enUS = "If you want it to last, make it out of metal. Humans did that well.\" —Ol' Kazko"
zhCN = "\"如果你想它持久，就用金属做。人类确实做得好。\"—Ol' Kazko"
zhTW = "\"如果你想讓它持久，就用金屬打造。人類確實做得好。\" —Ol' Kazko"
ruRU = "Если хочешь, чтобы это служило долго, делай это из металла. Именно это люди умели делать хорошо.\" —Ол' Казко"
jaJP = "\"長持ちさせたいなら、金属で作れ。人間はそれをうまくやっていた。\" —オル・カズコ"
frFR = "\"Si tu veux que ça dure, fais-le en métal. Ça, les humains le faisaient vraiment bien.\" —Ol' Kazko"
deDE = "\"Willst du, dass es hält, mach es aus Metall. Das konnten die Menschen wirklich gut.\" —Ol' Kazko"
plPL = "\"Jeśli chcesz, żeby to wytrzymało, zrób to z metalu. Ludzie potrafili to robić naprawdę dobrze.\" —Ol' Kazko"
ptBR = "\"Se quiser que dure, faça-o de metal. Isso é o que os humanos faziam bem.\" —Ol' Kazko"
koKR = "\"지속되려면 금속으로 만들어라. 인간들이 그것을 정말 잘 만들었지.\" —Ol' Kazko"
csCZ = "\"Pokud chceš, aby to vydrželo, dělej to z kovu. Lidé to dělali skutečně dobře.\" —Ol' Kazko"
viVN = "\" Nếu bạn muốn nó bền, hãy làm bằng kim loại. Đúng là loài người đã làm được điều đó rất tốt.\" —Ol' Kazko"

