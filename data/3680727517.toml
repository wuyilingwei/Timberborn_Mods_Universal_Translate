["Building.EarthRepopulator.IronTeeth.FlavorDescription"]
raw = "Després d'unes proves ara classificades amb una catapulta, es va adoptar aquest disseny."
status = "normal"
enUS = "After some tests, now classified as involving a catapult, this design was adopted."
zhCN = "在经过一些现已归类为投石机的测试之后，采用了这一设计。"
zhTW = "在一些使用投石機進行的測試之後，採用了這個設計。"
ruRU = "После нескольких испытаний, которые теперь классифицируются как связанные с катапультой, был принят этот дизайн."
jaJP = "いくつかの試験がカタパルトを用いるものとして分類された後、この設計が採用されました。"
frFR = "Après quelques essais désormais classés comme des catapultes, ce design a été adopté."
deDE = "Nach einigen Tests, die nun als Katapult eingestuft wurden, wurde dieses Design übernommen."
plPL = "Po kilku testach, które obecnie przeprowadzono przy użyciu katapulty, przyjęto ten projekt."
ptBR = "Depois de alguns testes, agora classificados como uma catapulta, este design foi adotado."
koKR = "일부 실험이 이제 투석기로 분류된 뒤 이 설계가 채택되었습니다."
csCZ = "Po několika testech, které nyní zahrnují katapult, byl tento návrh přijat."
viVN = "Sau một số thử nghiệm được xếp loại là máy ném đá, thiết kế này đã được áp dụng."

["Building.EfficientFarmhouse.Description"]
raw = "Dona feina a pagesos per plantar i collir conreus. El disseny ampliat dels Cuesfusta hi encabeix més pagesos."
status = "normal"
enUS = "Provides work for farmers to plant and harvest crops. The expanded Cuesfusta design houses more farmers."
zhCN = "为农民提供种植和收获作物的工作。Cuesfusta 的扩展设计容纳了更多农民。"
zhTW = "為農民提供工作，讓他們種植和收穫作物。Cuesfusta 的擴展設計可容納更多農民。"
ruRU = "Обеспечивает фермерам работу по посеву и сбору урожая. Расширенный дизайн Cuesfusta вмещает больше фермеров."
jaJP = "農民に作物を植え、収穫させる仕事を与える。Cuesfustaの拡張設計により、より多くの農民を収容できる。"
frFR = "Donne du travail aux paysans pour planter et récolter les cultures. Le design élargi du Cuesfusta accueille davantage de paysans."
deDE = "Gib Bauern Arbeit, um Nutzpflanzen zu pflanzen und zu ernten. Das erweiterte Design von Cuesfusta beherbergt mehr Bauern."
plPL = "Zapewnia rolnikom pracę przy sadzeniu i zbieraniu upraw. Rozszerzony projekt Cuesfusta pomieści więcej rolników."
ptBR = "Dá trabalho aos camponeses para plantar e colher colheitas. O design ampliado dos Cuesfusta abriga mais camponeses."
