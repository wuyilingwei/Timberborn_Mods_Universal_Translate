deDE = "Es ist kaum zu glauben, dass es einst einfachere Zeiten gab, in denen Schlamm und Äste schon als Wehr dienten."
plPL = "Trudno uwierzyć, że istniały prostsze czasy, w których błoto i gałęzie już pełniły rolę tamy."
ptBR = "É difícil acreditar que houvesse tempos mais simples em que lama e galhos já serviam de represa."
koKR = "흙과 가지가 이미 댐 역할을 했던 더 단순한 시절이 있었다니 믿기 어렵다."
csCZ = "Je těžké uvěřit, že existovaly jednodušší časy, kdy bahno a větve už sloužily jako hráz."
viVN = "Thật khó tin rằng đã từng có những thời kỳ đơn giản hơn khi bùn đất và nhánh cây đã đóng vai trò như một con đập."

