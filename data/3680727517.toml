["NaturalResource.Cassava.FlavorDescription"]
raw = "Verinosa en cru, la iuca va empènyer els Dents de Ferro a experimentar amb la fermentació."
status = "normal"
enUS = "Poisonous when raw, cassava prompted the Iron Teeth to experiment with fermentation."
zhCN = "生食有毒，木薯促使铁齿尝试发酵。"
zhTW = "生吃時有毒的木薯促使鐵牙去嘗試發酵。"
ruRU = "Ядовитая в сыром виде маниока подтолкнула Железные Зубы к экспериментам с ферментацией."
jaJP = "生のキャッサバは有毒で、鉄の歯を発酵の実験へと駆り立てた。"
frFR = "Vénéneuse crue, le manioc a poussé les Dents de Fer à expérimenter la fermentation."
deDE = "Giftig roh, die Yucca drängte die Eisenzähne dazu, mit der Fermentation zu experimentieren."
plPL = "Surowo trujący maniok skłonił Żelazne Zęby do eksperymentów z fermentacją."
ptBR = "A mandioca venenosa crua levou os Dentes de Ferro a experimentar a fermentação."
koKR = "생으로는 독성이 있는 카사바가 철 이빨들을 발효 실험에 몰아넣었다."
csCZ = "Surová Verinosa, kasava donutila Železné zuby k experimentování s fermentací."
viVN = "Độc hại khi ăn sống, khoai mì đã thúc đẩy Dents de Ferro thử nghiệm lên men."

