["Building.Motivatorium.FlavorDescription"]
raw = "\"Dia rere dia, nit rere nit, lluitem. És preciós.\" —Ol' Kazko"
status = "normal"
enUS = "Day after day, night after night, we fight. It's beautiful. —Ol' Kazko"
zhCN = "日复一日，夜复一夜，让我们战斗。它很珍贵。 —Ol' Kazko"
zhTW = "\"日復日，夜復夜，我們奮戰。這是珍貴的。\" —Ol' Kazko"
ruRU = "\"День за днём, ночь за ночью, мы боремся. Это драгоценно.\" —Ol' Kazko"
jaJP = "\"日々、夜ごとに、私たちは戦う。それは貴重だ。\" —Ol' Kazko"
frFR = "\"Jour après jour, nuit après nuit, nous nous battons. C'est précieux.\" —Ol' Kazko"
deDE = "\"Tag für Tag, Nacht für Nacht, kämpfen wir. Es ist kostbar.\" —Ol' Kazko"
plPL = "\"Dzień po dniu, noc po nocy, walczymy. To piękne.\" —Ol' Kazko"
ptBR = "\"Dia após dia, noite após noite, lutemos. É precioso.\" —Ol' Kazko"
koKR = "\"날마다, 밤마다, 우리는 싸운다. 그것은 소중하다.\" —Ol' Kazko"
csCZ = "\"Den za dnem, noc za nocí, bojujeme. Je to cenné.\" —Ol' Kazko"
viVN = "Ngày qua ngày, đêm qua đêm, chúng ta chiến đấu. Nó thật tuyệt vời.\" —Ol' Kaz"

["Building.MudBath.Description"]
