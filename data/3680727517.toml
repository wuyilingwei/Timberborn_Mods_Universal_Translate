["Building.GravityBattery.Description"]
raw = "Emmagatzema excedent d'energia i el retorna quan la xarxa té manca d'energia. Com més amunt es construeix, més energia pot emmagatzemar."
status = "normal"
enUS = "Stores surplus energy and releases it when the grid is short on energy. The higher it is built, the more energy it can store."
zhCN = "它会储存多余的能源，并在电网缺乏能源时将其释放。建得越高，它能储存的能量就越多。"
zhTW = "儲存過剩的能源，並在電網能源不足時釋放。建得越高，能儲存的能源就越多。"
ruRU = "Хранит избыток энергии и возвращает его, когда в сети не хватает энергии. Чем выше он построен, тем больше энергии может хранить."
jaJP = "エネルギーの余剰を蓄え、送電網のエネルギー不足時にそれを供給します。より高く建てるほど、蓄えられるエネルギーが多くなる。"
frFR = "Stocke l'excédent d'énergie et le restitue lorsque le réseau manque d'énergie. Plus il est élevé, plus d'énergie peut être stockée."
deDE = "Speichert überschüssige Energie und gibt sie zurück, wenn das Netz einen Energiemangel hat. Je höher es gebaut wird, desto mehr Energie kann es speichern."
plPL = "Przechowuje nadwyżkę energii i ją zwraca, gdy sieć ma niedobór energii. Im wyżej jest zbudowany, tym więcej energii może przechowywać."
ptBR = "Armazena o excedente de energia e o devolve quando a rede está com falta de energia. Quanto mais alto for construído, mais energia pode armazenar."
koKR = "에너지가 남는 것을 저장하고 전력망이 에너지가 부족할 때 이를 반환합니다. 높게 지을수록 더 많은 에너지를 저장할 수 있습니다."
csCZ = "Ukládá přebytečnou energii a vrací ji, když síť postrádá energii. Čím výše se postaví, tím více energie dokáže uložit."
viVN = "Lưu trữ dư thừa năng lượng và xả năng lượng khi lưới điện thiếu. Càng được xây ở trên cao, nó càng có thể lưu trữ nhiều năng lượng hơn."

