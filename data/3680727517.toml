["Tutorial.Forestry.Forester"]
status = "normal"
raw = "Els castors necessiten una font estable de troncs. És evident.\n\nFent servir punts de ciència produïts pel teu inventor, desbloqueja el guarda forestal. Després construeix-lo en una zona on vulguis plantar arbres."
enUS = "The beavers need a stable source of logs. It's obvious.\n\nUsing science points produced by your inventor, unlock the forester. Then build it in an area where you want to plant trees."
zhCN = "“海狸需要一个稳定的原木来源。这是显而易见的。\n\n使用你的发明家生产的科学点数，解锁森林管理员。然后在你想种植树木的区域建造它。”"
zhTW = "海狸需要穩定的樹幹來源。這是顯而易見的。\n\n利用你的發明家產生的科學點數，解鎖樹林管理員。然後在你想種樹的區域建造它。"
ruRU = "Бобрам нужен стабильный источник стволов. Это очевидно.\n\nИспользуя научные точки, произведенные твоим изобретателем, разблокируй лесника. Затем построй его в зоне, где ты хочешь посадить деревья."
jaJP = "ビーバーには安定した木材の供給が必要です。明らかです。\n\nあなたの発明家が生産した科学ポイントを使って、森林保護官をアンロックします。その後、木を植えたい場所に建設します。"
frFR = "Les castors ont besoin d'une source stable de troncs. C'est évident.\n\nEn utilisant des points de science produits par votre inventeur, débloquez le garde forestier. Ensuite, construisez-le dans une zone où vous souhaitez planter des arbres."
deDE = "Die Biber benötigen eine stabile Quelle für Stämme. Das ist offensichtlich.\n\nNutze Wissenschaftspunkte, die dein Erfinder produziert hat, um den Förster freizuschalten. Baue ihn dann in einem Bereich, in dem du Bäume pflanzen möchtest."
plPL = "Bobry potrzebują stabilnego źródła kłód. To oczywiste.\n\nUżyj punktów nauki zdobytych przez swojego wynalazcę, aby odblokować leśniczego. Następnie zbuduj go w obszarze, w którym chcesz posadzić drzewa."
ptBR = "Os castores precisam de uma fonte estável de toras. É evidente.\n\nUsando pontos de ciência produzidos pelo seu inventor, desbloqueie o guarda florestal. Depois, construa-o em uma área onde você queira plantar árvores."
koKR = "비버는 안정적인 통나무 공급원이 필요합니다. 이는 명백합니다.\n\n당신의 발명가가 생산한 과학 포인트를 사용하여 임업자를 잠금 해제하세요. 그런 다음 나무를 심고 싶은 곳에 그를 건설하세요."
csCZ = "Bobři potřebují stabilní zdroj kmenů. To je jasné.\n\nPomocí vědeckých bodů produkovaných tvým vynálezcem odemkni lesníka. Poté ho postav v oblasti, kde chceš sázet stromy."
viVN = "Những con thú phải có một nguồn cung cấp gỗ ổn định. Điều này là hiển nhiên.\n\nSử dụng các điểm khoa học được sản xuất bởi nhà phát minh của bạn, hãy mở khóa người giữ rừng. Sau đó xây dựng nó ở một khu vực nơi bạn muốn trồng cây."

["Tutorial.Forestry.MarkBirchesForPlanting"]
status = "normal"
raw = "Fes servir l'eina Planta arbres i arbustos per plantar alguns bedolls. Creixen ràpidament, cosa que els fa una bona opció en un assentament incipient.\n\nIgual que els cultius, els arbres només creixen en zones irrigades i verdes.\n\nRecorda marcar les zones de plantació per talar."
enUS = "Use the Plant Trees and Shrubs tool to plant some birches. They grow quickly, making them a good option in an early settlement.\n\nLike crops, trees only grow in irrigated and green areas.\n\nRemember to mark the planting zones for cutting."
zhCN = "使用“种植树木和灌木”工具来种植一些桦树。它们生长迅速，是新兴定居点的不错选择。\n\n与作物一样，树木只在灌溉和绿色区域生长。\n\n记得标记种植区域以便砍伐。"
zhTW = "使用「植樹和灌木工具」來種植一些白樺樹。它們生長迅速，因此在新興定居點中是個好選擇。\n\n和作物一樣，樹木只在灌溉和綠色區域生長。\n\n記得標記種植區以便砍伐。"
ruRU = "Используйте инструмент Посадка деревьев и кустарников, чтобы посадить некоторые березы. Они быстро растут, что делает их хорошим выбором для начинающего поселения.\n\nКак и культуры, деревья растут только в орошаемых и зеленых зонах.\n\nНе забывайте отмечать зоны посадки для вырубки."
jaJP = "木を育てるための道具を使って、いくつかの白樺を植えます。これらは急速に成長するため、新しい集落にとって良い選択肢です。\n\n作物と同様に、木は灌漑された緑の区域でのみ成長します。\n\n伐採するために植林区域をマーキングすることを忘れないでください。"
frFR = "Utilisez l'outil Planter des arbres et des buissons pour planter quelques bouleaux. Ils poussent rapidement, ce qui en fait un bon choix pour un établissement naissant.\n\nTout comme les cultures, les arbres ne poussent que dans des zones irriguées et verdoyantes.\n\nN'oubliez pas de marquer les zones de plantation pour les abattre."
deDE = "Verwende das Werkzeug „Bäume und Sträucher pflanzen“, um einige Birken zu pflanzen. Sie wachsen schnell, was sie zu einer guten Wahl in einer aufstrebenden Siedlung macht.\n\nWie die Pflanzen wachsen Bäume nur in bewässerten und grünen Zonen.\n\nDenke daran, die Pflanzbereiche zu markieren, um sie zu fällen."
plPL = "Użyj narzędzia Sadź drzewa i krzewy, aby posadzić kilka brzoz. Rosną szybko, co sprawia, że są dobrym wyborem w rozwijającej się osadzie.\n\nPodobnie jak uprawy, drzewa rosną tylko w nawadnianych i zielonych obszarach.\n\nPamiętaj, aby zaznaczyć obszary sadzenia, aby je wyciąć."
ptBR = "Use a ferramenta Plante árvores e arbustos para plantar alguns bétulas. Elas crescem rapidamente, o que as torna uma boa opção em um assentamento inicial.\n\nAssim como as culturas, as árvores só crescem em áreas irrigadas e verdes.\n\nLembre-se de marcar as áreas de plantio para cortar."
koKR = "나무와 관목을 심는 도구를 사용하여 자작나무 몇 그루를 심어라. 이들은 빠르게 자라므로 초기 정착지에 좋은 선택이 된다.\n\n작물과 마찬가지로 나무는 오직 관개된 녹지에서만 자란다.\n\n벌목을 위해 심는 구역을 표시하는 것을 잊지 마라."
csCZ = "Použijte nástroj Zasadit stromy a keře k zasazení několika bříz. Rychle rostou, což je činí dobrou volbou pro počáteční osídlení.\n\nStejně jako plodiny, stromy rostou pouze v zavlažovaných a zelených oblastech.\n\nNezapomeňte označit zóny pro výsadbu, abyste je mohli pokácet."
viVN = "Sử dụng công cụ Trồng cây và bụi rậm để trồng một số cây bạch dương. Chúng phát triển nhanh chóng, điều này khiến chúng trở thành một lựa chọn tốt cho một khu định cư mới.\n\nCũng như cây trồng, cây chỉ phát triển ở những khu vực có nước tưới và màu xanh.\n\nHãy nhớ đánh dấu các khu vực trồng để chặt."

