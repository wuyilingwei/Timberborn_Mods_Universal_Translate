["Tutorial.Droughts.Description"]
status = "normal"
raw = "Felicitats! El teu assentament ha sobreviscut a la seva primera sequera.\n\nLes sequeres formen part del cicle estacional. Tornaran i s'allargaran amb el temps."
enUS = "Congratulations! Your settlement has survived its first drought.\n\nDroughts are part of the seasonal cycle. They will return and lengthen over time."
zhCN = "恭喜！您的定居点成功度过了第一次干旱。\n\n干旱是季节循环的一部分。它们会回来并随着时间的推移变得更加持久。"
zhTW = "恭喜！你的定居點在第一次乾旱中生存下來了。\n\n乾旱是季節循環的一部分。它們將再次來臨，並隨著時間的推移而延長。"
ruRU = "Поздравляем! Ваша колония пережила свою первую засуху.\n\nЗасухи являются частью сезонного цикла. Они вернутся и будут длиться дольше со временем."
jaJP = "おめでとうございます！あなたの集落は最初の干ばつを乗り越えました。\n\n干ばつは季節のサイクルの一部です。再び訪れ、時間とともに長引くでしょう。"
frFR = "Félicitations ! Votre établissement a survécu à sa première sécheresse.\n\nLes sécheresses font partie du cycle saisonnier. Elles reviendront et s'allongeront avec le temps."
deDE = "Herzlichen Glückwunsch! Deine Siedlung hat die erste Dürre überstanden.\n\nDürreperioden sind Teil des saisonalen Zyklus. Sie werden zurückkehren und sich im Laufe der Zeit verlängern."
plPL = "Gratulacje! Twoja osada przetrwała swoją pierwszą suszę.\n\nSusze są częścią cyklu sezonowego. Powrócą i z czasem będą się wydłużać."
ptBR = "Parabéns! Seu assentamento sobreviveu à sua primeira seca.\n\nAs secas fazem parte do ciclo sazonal. Elas retornarão e se prolongarão com o tempo."
koKR = "축하합니다! 당신의 정착지가 첫 번째 가뭄을 견뎌냈습니다.\n\n가뭄은 계절 주기의 일부입니다. 다시 돌아오며 시간이 지남에 따라 길어질 것입니다."
csCZ = "Gratulujeme! Vaše osada přežila svou první sucho.\n\nSucha jsou součástí sezónního cyklu. Vrátí se a s časem se prodlouží."
viVN = "Chúc mừng! Khu định cư của bạn đã sống sót sau hạn hán đầu tiên.\n\nHạn hán là một phần của chu kỳ mùa. Chúng sẽ quay trở lại và kéo dài theo thời gian."

