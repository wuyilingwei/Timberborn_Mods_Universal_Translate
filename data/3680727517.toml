["Building.Levee.FlavorDescription"]
raw = "Equilibrat, reforçat i modelat a la perfecció per generacions d'enginyers hidràulics castors; això no és \"només un bloc de fusta\"."
status = "normal"
enUS = "Balanced, reinforced, and perfectly shaped by generations of beaver hydraulic engineers; this is not \"just a block of wood\"."
zhCN = "平衡、加固并被完美塑造，经过几代海狸水利工程师共同打造；这并非“仅仅是一块木头”。"
zhTW = "平衡、加固，並經過世代海狸水利工程師的完美塑造；這不是「只是一塊木頭」"
ruRU = "Сбалансированный, укрепленный и отшлифованный до совершенства поколениями бобров-водяных инженеров; это не просто «кубик дерева»."
jaJP = "均衡が取れ、強化され、代々ビーバーの水力エンジニアたちによって完璧に形作られてきたものだ; これは \"ただの木のブロック\" ではない."
frFR = "Équilibré, renforcé et façonné à la perfection par des générations d'ingénieurs hydrauliques castors ; ce n'est pas \"juste un bloc de bois\"."
deDE = "Ausbalanciert, verstärkt und durch Generationen von Biber-Hydraulikingenieuren perfekt geformt; das ist nicht nur ein Holzblock."
plPL = "Wyważony, wzmocniony i ukształtowany do perfekcji przez pokolenia inżynierów hydraulicznych bobrów; to nie jest \"tylko klocek drewna\"."
ptBR = "Equilibrado, reforçado e modelado à perfeição por gerações de engenheiros hidráulicos castores; isso não é \"apenas um bloco de madeira\"."
koKR = "균형 잡히고 강화되었으며 비버의 유압 엔지니어 세대에 걸쳐 완벽하게 다듬어졌습니다; 이것은 '그저 하나의 나무 블록일 뿐'이 아닙니다."
csCZ = "Vyvážený, posílený a dokonale tvarovaný po generacích vodohydraulických inženýrů bobrů; to není jen kus dřeva."
viVN = "Cân bằng, được gia cố và được mô hình hóa hoàn hảo bởi nhiều thế hệ kỹ sư thủy lực của hải ly; đây không phải là \"chỉ là một khối gỗ\"."

