["Tutorial.PowerAndPlanks.LumberMill"]
status = "normal"
raw = "És hora de començar a produir Taulons!\n\nConstrueix una Serradora just al costat de la Roda d'aigua. També la pots construir més lluny i connectar-la a la Roda d'aigua amb Eixos d'energia.\n\nConsell: Molts edificis, com les Serradores i les Cases, transmeten energia entre si quan es col·loquen paret amb paret. No calen Eixos d'energia!"
enUS = "It's time to start producing Planks!\n\nBuild a Sawmill right next to the Water Wheel. You can also build it farther away and connect it to the Water Wheel with Power Shafts.\n\nTip: Many buildings, such as Sawmills and Houses, transmit power to each other when placed wall to wall. Power Shafts are not necessary!"
zhCN = "是时候开始生产木板了！\n\n在水轮旁边建造一个锯木厂。你也可以将其建造得更远，并通过传动轴与水轮连接。\n\n提示：许多建筑，如锯木厂和房屋，当壁与壁相邻放置时，可以相互传递能量。无需传动轴！"
zhTW = "是時候開始生產木板了！\n\n在水輪旁邊建造一座鋸木廠。你也可以在更遠的地方建造它，並用動力軸將其連接到水輪。\n\n提示：許多建築物，比如鋸木廠和房屋，當緊靠在一起時可以相互傳遞能量。無需動力軸！"
ruRU = "Время начинать производство досок!\n\nПостройте Пилораму рядом с Водяным колесом. Вы также можете построить ее дальше и соединить с Водяным колесом с помощью Энергетических осей.\n\nСовет: Многие здания, такие как Пилорамы и Дома, передают энергию друг другу, когда расположены стенка к стенке. Энергетические оси не нужны!"
jaJP = "「板材を生産する時間です！\n\n水車のすぐ隣に製材所を建ててください。さらに遠くに建てて、エネルギー軸で水車に接続することもできます。\n\nヒント：製材所や家など、多くの建物は隣接して配置することで互いにエネルギーを伝達します。エネルギー軸は必要ありません！」"
frFR = "Il est temps de commencer à produire des Planches !\n\nConstruisez un Scierie juste à côté de la Roue à eau. Vous pouvez également l'installer plus loin et la connecter à la Roue à eau avec des Essieux d'énergie.\n\nConseil : De nombreux bâtiments, comme les Scieries et les Maisons, transmettent de l'énergie entre eux lorsqu'ils sont placés mur à mur. Pas besoin d'Essieux d'énergie !"
deDE = "Es ist Zeit, mit der Produktion von Brettern zu beginnen!\n\nBaue eine Sägerei direkt neben dem Wasserrad. Du kannst sie auch weiter weg bauen und sie mit Energieachsen mit dem Wasserrad verbinden.\n\nTipp: Viele Gebäude, wie Sägereien und Häuser, übertragen Energie untereinander, wenn sie Wand an Wand platziert werden. Energieachsen sind nicht erforderlich!"
plPL = "Czas zacząć produkcję desek!\n\nZbuduj tartak tuż obok koła wodnego. Możesz również zbudować go dalej i połączyć z kołem wodnym za pomocą wałów napędowych.\n\nWskazówka: Wiele budynków, takich jak tartaki i domy, przekazuje energię między sobą, gdy są ustawione ściana przy ścianie. Nie są potrzebne wały napędowe!"
ptBR = "É hora de começar a produzir Tábuas!\n\nConstrua um Serrador bem ao lado da Roda d'água. Você também pode construí-lo mais longe e conectá-lo à Roda d'água com Eixos de energia.\n\nDica: Muitos edifícios, como os Serradores e as Casas, transmitem energia entre si quando são colocados parede com parede. Não são necessários Eixos de energia!"
koKR = "이제 판자를 생산할 시간입니다!\n\n수력발전기 옆에 목재소를 건설하세요. 더 멀리 지을 수도 있으며, 전력 축을 사용해 수력발전기와 연결할 수 있습니다.\n\n팁: 목재소와 집과 같은 많은 건물들은 벽을 맞대어 배치할 때 서로 에너지를 전달합니다. 전력 축이 필요하지 않습니다!"
csCZ = "Je čas začít vyrábět Prkna!\n\nPostavte Pilu hned vedle Vodního kola. Můžete ji také postavit dál a spojit ji s Vodním kolem pomocí Energetických hřídelí.\n\nTip: Mnohé budovy, jako Pily a Domy, si mezi sebou předávají energii, když jsou postaveny přímo vedle sebe. Energetické hřídele nejsou potřeba!"
viVN = "Đã đến lúc bắt đầu sản xuất Bảng!\n\nXây dựng một Nhà máy gỗ ngay cạnh Bánh xe nước. Bạn cũng có thể xây dựng nó xa hơn và kết nối nó với Bánh xe nước bằng Trục năng lượng.\n\nMẹo: Nhiều tòa nhà, như Nhà máy gỗ và Nhà ở, truyền năng lượng cho nhau khi được đặt cạnh nhau. Không cần Trục năng lượng!"

["Tutorial.PowerAndPlanks.WaterWheel"]
status = "normal"
raw = "Els edificis més avançats necessiten energia, i als castors els agrada que la seva energia vingui del riu.\n\nCol·loca una Roda d'aigua en aigua corrent a la vora del riu."
enUS = "Advanced buildings require energy, and beavers like their energy to come from the river.\n\nPlace a Water Wheel in flowing water at the river's edge."
zhCN = "“更高级的建筑需要能量，海狸喜欢他们的能量来自河流。\n\n在河边的流水中放置一个水车。”"
zhTW = "「更先進的建築需要能源，而鴨嘴獸喜歡讓他們的能源來自於河流。\n\n在河邊的流水中安裝一個水車。」"
ruRU = "Более продвинутые здания требуют энергии, и бобрам нравится, чтобы их энергия поступала из реки.\n\nПоместите водяное колесо в течение воды у реки."
jaJP = "「より高度な建物はエネルギーを必要とし、ビーバーは自分たちのエネルギーが川から来ることを好みます。\n\n川の近くの流れる水の中に水車を設置しましょう。」"
frFR = "Les bâtiments les plus avancés ont besoin d'énergie, et les castors aiment que leur énergie provienne de la rivière.\n\nPlace une roue à eau dans un cours d'eau au bord de la rivière."
deDE = "Fortgeschrittene Gebäude benötigen Energie, und die Biber mögen es, wenn ihre Energie aus dem Fluss kommt.\n\nPlatziere ein Wasserrad im fließenden Wasser am Ufer des Flusses."
plPL = "Zaawansowane budynki potrzebują energii, a bobrom podoba się, gdy ich energia pochodzi z rzeki.\n\nUmieść koło wodne w nurtującej wodzie na brzegu rzeki."
ptBR = "Edifícios mais avançados precisam de energia, e os castores gostam que sua energia venha do rio.\n\nColoque uma Roda d'água em água corrente na margem do rio."
koKR = "최신 건물은 에너지가 필요하며, 비버들은 그들의 에너지가 강에서 오는 것을 좋아합니다.\n\n강가의 흐르는 물에 수차를 설치하세요."
csCZ = "Pokročilejší budovy potřebují energii a bobrům se líbí, když jejich energie pochází z řeky.\n\nUmístěte vodní kolo do tekoucí vody na břehu řeky."
viVN = "Các tòa nhà tiên tiến hơn cần năng lượng, và các con rái cá thích năng lượng của chúng đến từ dòng sông.\n\nĐặt một Bánh xe nước vào dòng nước chảy bên bờ sông."

