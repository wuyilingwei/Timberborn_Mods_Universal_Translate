["MapMetadata.Lakes.Description"]
raw = "Avui dia, les zones riques en llacs i rius són escasses. El poc que en queda mostra que encara hi ha esperança per a la Terra."
status = "normal"
enUS = "Nowadays, areas rich in lakes and rivers are scarce. The little that remains shows that there is still hope for the Earth."
zhCN = "如今，富含湖泊和河流的区域已变得稀少。所剩无几的迹象表明，地球仍然有希望。"
zhTW = "如今，富含湖泊與河川的地區已經相當稀少。剩下的那一點仍顯示地球仍有希望。"
ruRU = "Сегодня области, богатые озёрами и реками, редки. То, что осталось, показывает, что на Земле всё ещё есть надежда."
jaJP = "現在、湖と川に恵まれた地域は稀です。残っているごくわずかな場所は、地球にはまだ希望があることを示しています。"
frFR = "De nos jours, les zones riches en lacs et en rivières sont rares. Le peu qui reste montre qu'il y a encore de l'espoir pour la Terre."
deDE = "Heute sind Gebiete, die reich an Seen und Flüssen sind, selten. Das Wenige, das noch übrig bleibt, zeigt, dass es noch Hoffnung für die Erde gibt."
plPL = "W dzisiejszych czasach obszary bogate w jeziora i rzeki są rzadkie. To, co jeszcze zostało, pokazuje, że dla Ziemi wciąż jest nadzieja."
ptBR = "Hoje em dia, as áreas ricas em lagos e rios são escassas. O pouco que resta mostra que ainda há esperança para a Terra."
koKR = "요즘에는 호수와 강이 풍부한 지역이 드물다. 남아 있는 것은 아직 지구에 희망이 있음을 보여준다."
csCZ = "Dnes jsou oblasti bohaté na jezera a řeky řídké. To, co zbylo, ukazuje, že na Zemi ještě zbývá naděje."
viVN = "Ngày nay, những khu vực nhiều hồ và sông rất hiếm. Phần còn lại ít ỏi cho thấy vẫn còn có hy vọng cho Trái Đất."

