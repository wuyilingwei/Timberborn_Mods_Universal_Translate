status = "normal"

["Tutorial.Storage.Tanks"]
new = "Tots els líquids s'emmagatzemen en dipòsits. Això inclou l'aigua que hem estat bombejant."
status = "normal"

["Tutorial.Storage.Warehouses"]
new = "Finalment, preparem una mica d'emmagatzematge per a les Baies. També ens hem de preparar per a la propera collita de Pastanagues.\n\nEls aliments, igual que molts altres béns en caixes, s'emmagatzemen en magatzems."
status = "normal"

["Tutorial.Tutorial"]
new = "Tutorial"
status = "normal"

["Tutorial.UnpauseBuilding"]
new = "Reprèn: {0}"
status = "normal"

["Tutorial.VerticalArchitecture"]
new = "Arquitectura vertical"
status = "normal"

["Tutorial.VerticalArchitecture.BuildRooftopTerrace"]
new = "A l'erm, és important optimitzar l'ús de l'espai. Els castors ho fan fent créixer les seves ciutats en vertical.\n\nAlguns edificis, com les Cases, tenen teulades planes que poden suportar altres estructures.\n\nConstruïm ara una Terrassa al terrat. Potser hauràs d'utilitzar Escales per connectar-la amb el districte."
status = "normal"

["Tutorial.WaterAndFood"]
new = "Aigua i aliment"
status = "normal"

["Tutorial.WaterAndFood.Farmhouse"]
new = "A llarg termini necessitem alguna cosa més nutritiva. Construeix una Granja per plantar i collir cultius.\n\nIgual que les banderes, una granja té un abast limitat.\n\nConsell: Si et falten treballadors, pots posar alguns edificis en pausa. Per fer-ho, selecciona un edifici i prem el botó de pausa."
status = "normal"

["Tutorial.WaterAndFood.Gatherer"]
new = "A més d'aigua, els castors necessiten menjar.\n\nEls recol·lectors recullen Baies automàticament dins l'abast de la Bandera de recol·lector. Pots veure l'abast quan col·loques la bandera.\n\nConstrueix una Bandera de recol·lector a prop d'uns Arbustos de nabius."
status = "normal"

["Tutorial.WaterAndFood.MarkCarrots"]
new = "Els agricultors no comencen a treballar fins que els dius què i on plantar.\n\nFes servir l'eina Planta cultius per designar un camp de Pastanagues.\n\nEls cultius s'han de plantar en terra irrigada i verda. En cas contrari, les plantes s'assecaran i acabaran morint."
status = "normal"

["Tutorial.WaterAndFood.WaterPump"]
new = "Els castors necessiten aigua per sobreviure.\n\nConstrueix una Bomba d'aigua per garantir un accés continu a aigua potable. Recorda connectar la Bomba al Centre de districte."
status = "normal"

["Tutorial.Wellbeing"]
new = "Benestar"
status = "normal"

["Tutorial.Wellbeing.Beaver"]
new = "Pots veure l'impacte que tenen les teves accions sobre els teus castors.\n\nSelecciona un castor fent-hi clic. Al panell podràs veure el seu benestar actual, els seus atributs i les seves necessitats.\n\nAlgunes necessitats poden arribar a valors negatius i provocar penalitzacions greus o fins i tot la mort."
status = "normal"

["Tutorial.Wellbeing.Campfire"]
new = "El benestar és una mètrica que mostra com de satisfet està un castor. Afecta tres atributs: velocitat de treball, velocitat de moviment i esperança de vida.\n\nUna de les principals maneres d'augmentar el benestar és mitjançant atraccions. Les atraccions són edificis on els castors entren quan no estan treballant."
status = "normal"

["Tutorial.Wellbeing.OpenWellbeingPanel"]
new = "Obre el panell de benestar"
status = "normal"

["Tutorial.Wellbeing.SelectBeaver"]
new = "Selecciona un castor i revisa les seves necessitats"
status = "normal"

["Tutorial.Wellbeing.SetWorkingHours"]
new = "Recorda que els castors necessiten temps lliure per menjar, beure, dormir i gaudir de les atraccions de l'assentament.\n\nPer maximitzar la productivitat, cal equilibrar el benestar dels treballadors i les seves hores de treball.\n\nDe moment, tornem a les hores de treball per defecte."
status = "normal"

["Tutorial.Wellbeing.Shrub"]
new = "El benestar també augmenta al voltant de les decoracions. Els castors no s'hi acosten expressament, així que col·loca-les a prop dels llocs on els teus colons passen l'estona.\n\nUn Arbust és la decoració més senzilla, i els castors agraeixen qualsevol toc de verd."
status = "normal"

["Tutorial.Wellbeing.WellbeingPanel"]
new = "Per als castors, el que compta és tota la societat. Pots veure el benestar mitjà del teu assentament a la cantonada superior esquerra de la pantalla.\n\nFes-hi clic per veure el grau de satisfacció de totes les necessitats possibles. Hi ha moltes maneres de fer la vida a l'erm més suportable."
status = "normal"

["Tutorial.Wood"]
new = "Fusta"
status = "normal"

["Tutorial.Wood.ConnectLumberjacks"]
new = "Tots els edificis amb entrada han d'estar connectats a un Centre de districte amb Camins. Quan selecciones un edifici, pots veure la seva entrada marcada amb una fletxa.\n\nConstrueix Camins per connectar les Banderes de llenyataire amb el Centre de districte."
status = "normal"

["Tutorial.Wood.FinishLumberjacks"]
new = "Les Banderes no es construiran si estan fora de l'abast de construcció del districte.\n\nSelecciona el Centre de districte per veure el seu abast de construcció. Pots ampliar-lo connectant Camins a l'entrada del Centre de districte."
status = "normal"

["Tutorial.Wood.MarkTrees"]
new = "Els llenyataires només talen arbres a les zones que marques per talar.\n\nEls arbres han d'estar dins l'abast d'una Bandera de llenyataire. Selecciona una bandera per veure'n l'abast.\n\nFes servir ara l'eina Marca zona de tala d'arbres. Mantén premut el botó del ratolí per seleccionar diverses caselles alhora."
status = "normal"

["Tutorial.Wood.PlaceLumberjacks"]
new = "Tot assentament de castors necessita Troncs, i molts. Només els llenyataires tallen arbres.\n\nConstrueix Banderes de llenyataire a prop dels arbres."
status = "normal"

["Tutorial.WorkingHours"]
new = "Hores de treball"
status = "normal"

["Tutorial.WorkingHours.SetWorkingHours"]
new = "Ajustar les hores de treball és una manera de gestionar el teu assentament.\n\nJornades més llargues volen dir progrés més ràpid, però cada vespre els castors necessiten temps per relaxar-se i dormir. No els pressionis massa durant massa temps.\n\nDe moment, augmentem una mica les hores de treball."
status = "normal"

