["Tutorial.Badtides.Description"]
status = "normal"
raw = "El teu assentament ha superat la seva primera marea tòxica.\n\nCom les sequeres, les marees tòxiques formen part del cicle estacional.\n\nLes properes marees tòxiques no seran tan indulgents, així que estigues alerta."
enUS = "Your settlement has overcome its first toxic tide.\n\nLike droughts, toxic tides are part of the seasonal cycle.\n\nThe upcoming toxic tides will not be as forgiving, so stay vigilant."
zhCN = "你的定居点已经度过了第一次有毒潮汐。\n\n和干旱一样，有毒潮汐是季节循环的一部分。\n\n接下来的有毒潮汐不会那么宽容，所以要保持警惕。"
zhTW = "你的聚落已經度過了第一個毒潮。\n\n和旱災一樣，毒潮是季節循環的一部分。\n\n接下來的毒潮將不會那麼寬容，所以要保持警覺。"
ruRU = "Ваше поселение пережило свою первую токсичную волну.\n\nКак и засухи, токсичные волны являются частью сезонного цикла.\n\nБудущие токсичные волны не будут такими же мягкими, так что будьте на чеку."
jaJP = "あなたの入植地は最初の有毒の潮の影響を乗り越えました。\n\n干ばつと同様に、有毒の潮は季節的なサイクルの一部です。\n\n次の有毒の潮はそれほど寛容ではないので、注意してください。"
frFR = "Votre colonie a survécu à sa première marée toxique.\n\nComme les sécheresses, les marées toxiques font partie du cycle saisonnier.\n\nLes prochaines marées toxiques ne seront pas aussi indulgentes, restez donc vigilant."
deDE = "Deine Siedlung hat die erste toxische Flut überstanden.\n\nWie Dürren sind toxische Fluten Teil des saisonalen Zyklus.\n\nDie kommenden toxischen Fluten werden nicht so nachsichtig sein, also bleib auf der Hut."
plPL = "Twoje osiedle przetrwało swoją pierwszą toksyczną falę.\n\nPodobnie jak susze, toksyczne fale są częścią cyklu sezonowego.\n\nNadchodzące toksyczne fale nie będą tak wyrozumiałe, więc bądź czujny."
ptBR = "Seu assentamento superou sua primeira maré tóxica.\n\nAssim como as secas, as marés tóxicas fazem parte do ciclo sazonal.\n\nAs próximas marés tóxicas não serão tão indulgentes, então fique atento."
koKR = "당신의 정착지가 첫 번째 독성 조수를 넘겼습니다. \n\n가뭄처럼 독성 조수는 계절 주기의 일부입니다. \n\n앞으로의 독성 조수는 그렇게 관대하지 않을 것이니, 경계하세요."
csCZ = "Tvá osada překonala svou první toxickou přílivovou vlnu.\n\nStejně jako sucho, toxické přílivy jsou součástí sezónního cyklu.\n\nDalší toxické přílivy nebudou tak shovívavé, buď proto ve střehu."
viVN = "Bến cảng của bạn đã vượt qua cơn thủy triều độc hại đầu tiên.\n\nGiống như các đợt hạn hán, thủy triều độc hại là một phần của chu trình theo mùa.\n\nCác cơn thủy triều độc hại tới đây sẽ không khoan nhượng như vậy, vì vậy hãy cảnh giác."

