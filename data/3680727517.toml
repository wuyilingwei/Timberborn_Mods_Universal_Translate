["Tutorial.Wood.ConnectLumberjacks"]
status = "normal"
raw = "Tots els edificis amb entrada han d'estar connectats a un Centre de districte amb Camins. Quan selecciones un edifici, pots veure la seva entrada marcada amb una fletxa.\n\nConstrueix Camins per connectar les Banderes de llenyataire amb el Centre de districte."
enUS = "All buildings with entrances must be connected to a District Center with Paths. When you select a building, you can see its entrance marked with an arrow.\n\nBuild Paths to connect the Lumberjack Flags to the District Center."
zhCN = "“所有有入口的建筑必须通过小路与区中心相连。当你选择一座建筑时，可以看到它的入口用箭头标记。\n\n建立小路以将伐木旗与区中心连接。”"
zhTW = "所有有入口的建築必須與一個區域中心藉由小路相連。當你選擇一棟建築時，可以看到其入口用箭頭標出。\n\n建造小路以將伐木工的旗幟與區域中心連接起來。"
ruRU = "Все здания с входом должны быть соединены с Центром района путем прокладки Дорог. Когда вы выбираете здание, видите, что его вход отмечен стрелкой.\n\nПостройте Дороги, чтобы соединить Флаги лесорубов с Центром района."
jaJP = "すべての入口のある建物は、道を介して地区センターに接続されている必要があります。建物を選択すると、その入口が矢印で示されます。\n\n伐採者の旗を地区センターに接続するために道を建設してください。"
frFR = "Tous les bâtiments avec une entrée doivent être connectés à un Centre de district par des Chemins. Lorsque tu sélectionnes un bâtiment, tu peux voir son entrée marquée par une flèche.\n\nConstruis des Chemins pour connecter les Drapeaux de bûcheron au Centre de district."
deDE = "Alle Gebäude mit Eingängen müssen mit einem Bezirkszentrum über Wege verbunden sein. Wenn du ein Gebäude auswählst, kannst du seinen Eingang mit einem Pfeil markiert sehen.\n\nBaue Wege, um die Holzfällerflaggen mit dem Bezirkszentrum zu verbinden."
plPL = "Wszystkie budynki z wejściem muszą być połączone z Centrum Dzielnicy za pomocą Ścieżek. Gdy wybierzesz budynek, jego wejście będzie oznaczone strzałką.\n\nZbuduj Ścieżki, aby połączyć Sztandary leśników z Centrum Dzielnicy."
ptBR = "Todos os edifícios com entrada devem estar conectados a um Centro de distrito com Caminhos. Ao selecionar um edifício, você pode ver sua entrada marcada com uma seta.\n\nConstrua Caminhos para conectar as Bandeiras de lenhador com o Centro de distrito."
koKR = "모든 출입구가 있는 건물은 길을 통해 지역 센터에 연결되어야 합니다. 건물을 선택하면 출입구가 화살표로 표시됩니다.\n\n길을 건설하여 벌목자의 깃발을 지역 센터에 연결하세요."
csCZ = "„Všechny budovy s vchodem musí být připojeny k Centru čtvrti pomocí Cest. Když vybereš budovu, můžeš vidět její vchod označený šipkou.\n\nPostav Cesty, abys spojil Znakové dřevaře se Centrem čtvrti.“"
viVN = "Tất cả các tòa nhà có lối vào đều phải được kết nối với một Trung tâm khu vực thông qua Đường mòn. Khi chọn một tòa nhà, bạn có thể thấy lối vào của nó được đánh dấu bằng một mũi tên.\n\nXây dựng Đường mòn để kết nối Cờ của người đốn củi với Trung tâm khu vực."

["Tutorial.Wood.FinishLumberjacks"]
status = "normal"
raw = "Les Banderes no es construiran si estan fora de l'abast de construcció del districte.\n\nSelecciona el Centre de districte per veure el seu abast de construcció. Pots ampliar-lo connectant Camins a l'entrada del Centre de districte."
enUS = "The Flags will not be built if they are outside the district's construction range. \n\nSelect the District Center to see its construction range. You can expand it by connecting Paths to the entrance of the District Center."
zhCN = "“如果建筑超出了区域的建造范围，木材堆将无法建造。\n\n选择区域中心以查看其建造范围。您可以通过连接道路到区域中心的入口来扩展它。”"
zhTW = "如果木伐工超出了地區的建設範圍，則不會建造木材倉庫。\n\n選擇地區中心以查看其建設範圍。你可以通過連接路徑到地區中心的入口來擴大它。"
ruRU = "Здания не будут построены, если они находятся за пределами зоны строительства района.\n\nВыберите Центр района, чтобы увидеть его зону строительства. Вы можете расширить его, подключив Дороги к входу в Центр района."
jaJP = "「バンダーは区画の建設範囲外にある場合、建設されません。\n\n区画センターを選択して、その建設範囲を確認してください。区画センターの入口に道を接続することで、範囲を拡大できます。」"
frFR = "Les Banderes ne seront pas construites si elles sont en dehors de la portée de construction du district.\n\nSélectionnez le Centre de district pour voir sa portée de construction. Vous pouvez l'élargir en connectant des Chemins à l'entrée du Centre de district."
deDE = "Die Banderes werden nicht gebaut, wenn sie außerhalb des Baubereichs des Bezirks liegen.\n\nWähle das Bezirkszentrum aus, um seinen Baubereich zu sehen. Du kannst ihn erweitern, indem du Wege zum Eingang des Bezirkszentrums baust."
plPL = "Bandy nie będą budowane, jeśli znajdują się poza zasięgiem budowy dzielnicy.\n\nWybierz Centrum dzielnicy, aby zobaczyć jego zasięg budowy. Możesz go powiększyć, łącząc ścieżki z wejściem do Centrum dzielnicy."
ptBR = "As bandeiras não serão construídas se estiverem fora do alcance de construção do distrito.\n\nSelecione o Centro do distrito para ver seu alcance de construção. Você pode expandi-lo conectando Caminhos à entrada do Centro do distrito."
koKR = "해상도는 지구의 범위를 벗어나면 건설되지 않습니다.\n\n구역 센터를 선택하여 그 건설 범위를 확인하십시오. 구역 센터의 입구에 도로를 연결하여 범위를 확장할 수 있습니다."
csCZ = "Štíty nebudou postaven, pokud se nacházejí mimo dosah výstavby okresu.\n\nVyberte Centrum okresu, abyste viděli jeho dosah výstavby. Můžete jej rozšířit připojením cest k vchodu do Centra okresu."
viVN = "Các Banderes sẽ không được xây dựng nếu chúng nằm ngoài vùng xây dựng của quận.\n\nChọn Trung tâm quận để xem vùng xây dựng của nó. Bạn có thể mở rộng nó bằng cách kết nối Đường với lối vào của Trung tâm quận."

["Tutorial.Wood.MarkTrees"]
status = "normal"
raw = "Els llenyataires només talen arbres a les zones que marques per talar.\n\nEls arbres han d'estar dins l'abast d'una Bandera de llenyataire. Selecciona una bandera per veure'n l'abast.\n\nFes servir ara l'eina Marca zona de tala d'arbres. Mantén premut el botó del ratolí per seleccionar diverses caselles alhora."
enUS = "Loggers only cut down trees in the areas you mark for logging.\n\nThe trees must be within the range of a Logger Flag. Select a flag to see its range.\n\nNow use the Tree Cutting Area tool. Hold down the mouse button to select multiple tiles at once."
zhCN = "“伐木工只会在你指定的砍伐区域内砍伐树木。\n\n树木必须在伐木工旗帜的范围内。选择一个旗帜查看其范围。\n\n现在使用树木砍伐区域标记工具。按住鼠标按钮可以同时选择多个方格。”"
zhTW = "樹木標記教程.木頭.標記樹木 - 新文本翻譯: \"伐木工僅在你標記的區域砍伐樹木。\n\n樹木必須在伐木工的旗幟範圍內。選擇一面旗幟以查看範圍。\n\n現在使用樹木砍伐區域標記工具。按住滑鼠按鈕以同時選擇多個格子。\""
ruRU = "Древодервы рубят деревья только в тех зонах, которые ты отмечаешь для вырубки.\n\nДеревья должны находиться в пределах досягаемости флага лесоруба. Выбери флаг, чтобы увидеть его радиус действия.\n\nТеперь используй инструмент 'Отметить зону вырубки деревьев'. Удерживай кнопку мыши, чтобы выбрать несколько ячеек одновременно."
jaJP = "伐採者は、伐採するためにマークしたエリア内の木のみを伐採します。\n\n木は伐採者の旗の範囲内にある必要があります。範囲を表示するには、旗を選択してください。\n\n今すぐ、「木の伐採エリアをマーク」ツールを使用してください。複数のセルを同時に選択するには、マウスボタンを押し続けてください。"
frFR = "Les bûcherons ne coupent des arbres que dans les zones que vous marquez pour abattre.\n\nLes arbres doivent être dans le rayon d'un Drapeau de bûcheron. Sélectionnez un drapeau pour voir son rayon.\n\nUtilisez maintenant l'outil Marquer la zone de coupe d'arbres. Maintenez le bouton de la souris enfoncé pour sélectionner plusieurs cases à la fois."
deDE = "Die Holzfäller fällen Bäume nur in den Bereichen, die du für die Abholzung markierst.\n\nDie Bäume müssen im Bereich eines Holzfäller-Siegels sein. Wähle ein Siegel aus, um dessen Reichweite zu sehen.\n\nVerwende jetzt das Werkzeug „Holzfällzone markieren“. Halte die Maustaste gedrückt, um mehrere Felder gleichzeitig auszuwählen."
plPL = "Leśnicy ścinają drzewa tylko w wyznaczonych przez ciebie obszarach.\n\nDrzewa muszą znajdować się w zasięgu Flagi leśnika. Wybierz flagę, aby zobaczyć jej zasięg.\n\nTeraz użyj narzędzia Zaznacz obszar wycinki drzew. Przytrzymaj przycisk myszy, aby wybrać kilka pól jednocześnie."
ptBR = "Os lenhadores só cortam árvores nas áreas que você marca para derrubar.\n\nAs árvores devem estar dentro do alcance de uma Bandeira de lenhador. Selecione uma bandeira para ver seu alcance.\n\nUse agora a ferramenta Marcar área de corte de árvores. Mantenha pressionado o botão do mouse para selecionar várias caixas ao mesmo tempo."
koKR = "벌목꾼들은 당신이 벌목을 위해 표시한 지역 내의 나무만 베어냅니다.\n\n나무는 벌목꾼의 깃발 범위 내에 있어야 합니다. 깃발을 선택하여 범위를 확인하세요.\n\n이제 나무 벌목 구역 표시 도구를 사용하세요. 여러 칸을 동시에 선택하려면 마우스 버튼을 누른 채 유지하세요."
csCZ = "Pokáče pouze kácí stromy v oblastech, které označíte k pokácení.\n\nStromy musí být v dosahu dřevorubecké vlajky. Vyberte vlajku, abyste viděli její dosah.\n\nNyní použijte nástroj pro označení oblasti kácení stromů. Držte stisknuté tlačítko myši, abyste najednou vybrali více polí."
viVN = "Các thợ mộc chỉ chặt cây ở những khu vực bạn đánh dấu để chặt.\n\nCây phải nằm trong phạm vi của một Cờ thợ mộc. Chọn một cờ để xem phạm vi của nó.\n\nBây giờ hãy sử dụng công cụ Đánh dấu khu vực chặt cây. Giữ nút chuột để chọn nhiều ô cùng lúc."

["Tutorial.Wood.PlaceLumberjacks"]
status = "normal"
raw = "Tot assentament de castors necessita Troncs, i molts. Només els llenyataires tallen arbres.\n\nConstrueix Banderes de llenyataire a prop dels arbres."
enUS = "Every beaver settlement needs Logs, and a lot of them. Only lumberjacks cut down trees.\n\nBuild Lumberjack Flags near the trees."
zhCN = "“每个海狸的居住地都需要木材，而且需要很多。只有伐木工才能砍伐树木。\n\n在树附近建造伐木工的旗帜。”"
zhTW = "「每個海狸的定居點都需要樹幹，還有很多。只有伐木工才能砍伐樹木。\n\n在樹木附近建造伐木工旗幟。」"
ruRU = "Каждое поселение бобров нуждается в бревнах, и в большом количестве. Только лесорубы рубят деревья.\n\nСтрой лесорубские флаги рядом с деревьями."
jaJP = "全てのビーバーの集落には丸太が必要で、数も多い。伐採者だけが木を切り倒します。\n\n木こりの旗を木の近くに建てましょう。"
frFR = "Chaque colonie de castors a besoin de bûches, et beaucoup. Seules les bûcherons abattent les arbres.\n\nConstruisez des Bannières de bûcheron près des arbres."
deDE = "Jede Siedlung der Biber benötigt Stämme, und zwar viele. Nur die Holzfäller fällen Bäume.\n\nBaue Holzfäller-Bandern in der Nähe der Bäume."
plPL = "„Każde osiedle bobrów potrzebuje kłód, i to wielu. Tylko drwale ścinają drzewa.\n\nZbuduj znaki drwala w pobliżu drzew.”"
ptBR = "Todo assentamento de castores precisa de Troncos, e muitos. Somente os lenhadores cortam árvores.\n\nConstrua Bandeiras de lenhador perto das árvores."
koKR = "모든 비버 거주는 로그가 필요하며, 그 양도 많습니다. 오직 벌목자만 나무를 베깁니다.\n\n나무 근처에 벌목가의 깃발을 건설하세요."
csCZ = "„Každé bobří sídlo potřebuje kmeny, a to hodně. Jen dřevaři kácí stromy. \n\nPostavte značky dřevaře poblíž stromů.“"
viVN = "Mỗi khu định cư của beaver cần Gỗ, và rất nhiều. Chỉ có những người đốn cây mới chặt cây.\n\nXây dựng Cờ của người đốn cây gần những cái cây."

