["Building.BadwaterSource.FlavorDescription"]
raw = "\"Per què hem de netejar el desastre dels humans? Ah, és clar, són tots morts.\" —Pina"
status = "normal"
enUS = "\"Why do we have to clean up the humans' disaster? Oh, of course, they're all dead.\" —Pina"
