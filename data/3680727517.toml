["Tutorial.Science.Inventor"]
status = "normal"
raw = "Els castors són els enginyers del món animal. És hora de convertir les seves idees de lumberpunk en realitat.\n\nConstrueix un Inventor per produir Punts de ciència."
enUS = "Beavers are the engineers of the animal kingdom. It's time to turn their lumberpunk ideas into reality.\n\nBuild an Inventor to produce Science Points."
zhCN = "海狸是动物世界的工程师。是时候将他们的木材朋克理念变为现实。\n\n建造一个发明家以生产科学点。"
zhTW = "海狸是動物世界的工程師。是時候將他們的木材朋克想法變為現實。\n\n建造一個發明家來生產科學點。"
ruRU = "Бобры — это инженеры животного мира. Пора превратить их идеи лумбнопанка в реальность.\n\nПостройте Изобретателя, чтобы производить Научные Очки."
jaJP = "ビーバーは動物界のエンジニアです。彼らのランバーパンクのアイデアを現実にする時が来ました。\n\n発明家を建設して科学ポイントを生産しましょう。"
frFR = "Les castors sont les ingénieurs du monde animal. Il est temps de concrétiser leurs idées de lumberpunk.\n\nConstruisez un Inventeur pour produire des Points de science."
deDE = "Die Biber sind die Ingenieure der Tierwelt. Es ist Zeit, ihre Lumberpunk-Ideen in die Realität umzusetzen.\n\nBaue einen Erfinder, um Wissenschaftspunkte zu produzieren."
plPL = "Bobry są inżynierami świata zwierząt. Czas zrealizować ich pomysły w stylu lumberpunk.\n\nZbuduj Wynalazcę, aby produkować Punkty nauki."
ptBR = "Os castores são os engenheiros do mundo animal. É hora de transformar suas ideias de lumberpunk em realidade.\n\nConstrua um Inventor para produzir Pontos de ciência."
koKR = "비버는 동물 세계의 엔지니어입니다. 이제 그들의 목재 펑크 아이디어를 현실로 바꿀 시간입니다.\n\n발명가를 건설하여 과학 포인트를 생산하세요."
csCZ = "Bobři jsou inženýři zvířecího světa. Je čas přetvořit jejich lumberpunkové nápady na skutečnost.\n\nPostavte Vynálezce pro výrobu Bodů vědy."
viVN = "Những con gấu là kỹ sư của thế giới động vật. Đã đến lúc biến ý tưởng lumberpunk của chúng thành hiện thực.\n\nXây dựng một Nhà phát minh để sản xuất Điểm khoa học."

["Tutorial.Science.SciencePoints"]
status = "normal"
raw = "De moment, deixa que l'Inventor treballi.\n\nQuan acumulis prou Punts de Ciència, els gastarem per desbloquejar edificis més avançats."
enUS = "For now, let the Inventor work.\n\nOnce you accumulate enough Science Points, we will spend them to unlock more advanced buildings."
zhCN = "目前，让发明家继续工作。\n\n当你积累足够的科学点数时，我们将用它们解锁更高级的建筑。"
zhTW = "目前，讓發明家工作。\n\n當你積累足夠的科學點數後，我們將用它來解鎖更先進的建築。"
ruRU = "Сейчас пусть Изобретатель работает.\n\nКогда ты накопишь достаточно Очков Науки, мы потратим их на разблокировку более продвинутых зданий."
jaJP = "「今は発明家に作業をさせておいてください。\n\n十分な科学ポイントを蓄積したら、より高度な建物をアンロックするために使います。」"
frFR = "Pour l'instant, laisse l'Inventeur travailler.\n\nLorsque tu auras accumulé suffisamment de Points de Science, nous les utiliserons pour débloquer des bâtiments plus avancés."
deDE = "Im Moment lass den Erfinder arbeiten.\n\nWenn du genügend Wissenschaftspunkte gesammelt hast, werden wir sie ausgeben, um fortschrittlichere Gebäude freizuschalten."
plPL = "Na razie pozwól, aby Wynalazca pracował.\n\nGdy zgromadzisz wystarczającą ilość Punktów Nauki, wydamy je na odblokowanie bardziej zaawansowanych budynków."
ptBR = "Por enquanto, deixe que o Inventor trabalhe.\n\nQuando acumular pontos de Ciência suficientes, iremos gastá-los para desbloquear edifícios mais avançados."
koKR = "잠시 동안 발명가가 작업하도록 하세요.\n\n충분한 과학 포인트를 축적하면, 더 발전된 건물을 잠금 해제하는 데 사용할 수 있습니다."
csCZ = "Nech nyní vynálezce pracovat.\n\nAž nasbíráš dostatek vědeckých bodů, použijeme je na odemčení pokročilejších budov."
viVN = "Hiện tại, hãy để Nhà phát minh làm việc.\n\nKhi bạn tích lũy đủ Điểm Khoa học, chúng ta sẽ sử dụng chúng để mở khóa các công trình tiên tiến hơn."

