["Tutorial.Storage.Pile"]
status = "normal"
raw = "Molts edificis tenen una mica d'emmagatzematge integrat, però s'omple ràpidament.\n\nConstrueix una Pila Gran per emmagatzemar més Troncs.\n\nCada edifici d'emmagatzematge només pot contenir un tipus de bé. Pots definir quin bé s'hi guarda després de seleccionar l'edifici."
enUS = "Many buildings have some storage integrated, but it fills up quickly.\n\nBuild a Large Pile to store more Logs.\n\nEach storage building can only contain one type of goods. You can define which goods are stored there after selecting the building."
zhCN = "许多建筑都有一些内置的存储，但很快就会满。\n\n建造一个大堆来存储更多的树木。\n\n每个储存建筑只能容纳一种物品。你可以在选择建筑后定义存储哪种物品。"
zhTW = "許多建築都有一些內建的儲存空間，但很快就會被填滿。\n\n建造一個大型堆疊以儲存更多的原木。\n\n每個儲存建築只能容納一種類型的物品。你可以在選擇建築後定義儲存哪種物品。"
ruRU = "Многие здания имеют немного встроенного хранилища, но оно заполняется быстро.\n\nПостройте Большую Стеллаж для хранения большего количества Бревен.\n\nКаждое хранилище может содержать только один тип товара. Вы можете определить, какой товар там хранится, после того как выберете здание."
jaJP = "多くの建物には少しの収納スペースが内蔵されていますが、すぐにいっぱいになります。\n\nより多くの木材を収納するために、大きなストレージを建設しましょう。\n\n各収納建物は1種類の財貨しか保管できません。建物を選択した後に、どの財貨を収納するかを設定できます。"
frFR = "Beaucoup de bâtiments ont un peu de stockage intégré, mais cela se remplit rapidement.\n\nConstruisez un Grand Tas pour stocker plus de Bûches.\n\nChaque bâtiment de stockage ne peut contenir qu'un seul type de ressource. Vous pouvez définir quelle ressource y est stockée après avoir sélectionné le bâtiment."
deDE = "Viele Gebäude haben ein wenig integrierten Stauraum, aber dieser füllt sich schnell.\n\nBaue einen großen Stapel, um mehr Stämme zu lagern.\n\nJedes Lagergebäude kann nur eine Art von Gut enthalten. Du kannst festlegen, welches Gut dort gelagert wird, nachdem du das Gebäude ausgewählt hast."
plPL = "Wiele budynków ma wbudowane małe miejsce na przechowywanie, ale zapełnia się szybko.\n\nZbuduj Duży Stos, aby przechować więcej Kłód.\n\nKażdy budynek magazynowy może pomieścić tylko jeden rodzaj towaru. Możesz określić, jaki towar ma być przechowywany po wybraniu budynku."
ptBR = "Muitos edifícios têm um pouco de armazenamento integrado, mas enchem rapidamente.\n\nConstrua uma Pilha Grande para armazenar mais Troncos.\n\nCada edifício de armazenamento só pode conter um tipo de bem. Você pode definir qual bem será armazenado após selecionar o edifício."
koKR = "많은 건물에는 약간의 통합 저장 공간이 있지만, 빠르게 가득 찹니다.\n\n더 많은 통나무를 저장하기 위해 큰 더미를 건설하세요.\n\n각 저장 건물은 하나의 유형의 자산만 저장할 수 있습니다. 건물을 선택한 후 어떤 자산을 저장할지 정의할 수 있습니다."
csCZ = "Mnoho budov má integrované malé úložiště, ale rychle se zaplní.\n\nPostav Velkou Hromadu pro uložení více Klád.\n\nKaždá budova pro skladování může obsahovat pouze jeden typ zboží. Můžeš určit, jaké zboží se tam ukládá po výběru budovy."
viVN = "Nhiều tòa nhà có một chút không gian lưu trữ tích hợp, nhưng nhanh chóng đầy.\n\nXây dựng một Đống Lớn để lưu trữ nhiều Gỗ hơn.\n\nMỗi tòa nhà lưu trữ chỉ có thể chứa một loại hàng hóa. Bạn có thể xác định hàng hóa nào được lưu trữ sau khi chọn tòa nhà."

["Tutorial.Storage.Tanks"]
status = "normal"
raw = "Tots els líquids s'emmagatzemen en dipòsits. Això inclou l'aigua que hem estat bombejant."
enUS = "All liquids are stored in tanks. This includes the water we have been pumping."
zhCN = "所有液体存储在储罐中。这包括我们一直在抽水的水。"
zhTW = "所有液體都儲存在儲罐中。這包括我們一直在抽取的水。"
ruRU = "Все жидкости хранятся в резервуарах. Это включает в себя воду, которую мы насосали."
jaJP = "すべての液体はタンクに保管されます。これには、私たちがポンプでくみ上げている水も含まれます。"
frFR = "Tous les liquides sont stockés dans des réservoirs. Cela inclut l'eau que nous avons pompée."
deDE = "Alle Flüssigkeiten werden in Tanks gespeichert. Dazu gehört das Wasser, das wir gepumpt haben."
plPL = "Wszystkie płyny są przechowywane w zbiornikach. Obejmuje to wodę, którą pompujemy."
ptBR = "Todos os líquidos são armazenados em tanques. Isso inclui a água que temos bombeado."
koKR = "모든 액체는 저장소에 저장됩니다. 여기에는 우리가 펌핑하고 있는 물이 포함됩니다."
csCZ = "Veškeré kapaliny se ukládají do nádrží. To zahrnuje i vodu, kterou jsme čerpali."
viVN = "Tất cả chất lỏng đều được lưu trữ trong các bể. Điều này bao gồm cả nước mà chúng ta đã bơm."

["Tutorial.Storage.Warehouses"]
status = "normal"
raw = "Finalment, preparem una mica d'emmagatzematge per a les Baies. També ens hem de preparar per a la propera collita de Pastanagues.\n\nEls aliments, igual que molts altres béns en caixes, s'emmagatzemen en magatzems."
enUS = "Finally, let's prepare some storage for the Berries. We also need to get ready for the upcoming Carrot harvest.\n\nFood, like many other boxed goods, is stored in warehouses."
zhCN = "“最后，我们为浆果准备了一些储存空间。我们还需要为即将到来的胡萝卜收成做准备。\n\n食品和许多其他装箱商品一样，存放在仓库中。”"
zhTW = "最後，我們為漿果準備了一些儲存空間。我們也必須為即將到來的胡蘿蔔收成做好準備。\n\n食物以及許多其他以箱子形式存在的商品，都儲存在倉庫中。"
ruRU = "Наконец, давайте подготовим немного места для хранения ягод. Также нам нужно подготовиться к следующему сбору моркови.\n\nПродукты, как и многие другие товары в коробках, хранятся на складах."
jaJP = "最後に、ベリー用の少しの保管スペースを準備します。また、次のニンジンの収穫にも備える必要があります。\n\n食品は、他の多くの箱入り商品と同様に、倉庫に保管されます。"
frFR = "Enfin, préparons un peu de stockage pour les Baies. Nous devons également nous préparer pour la prochaine récolte de carottes.\n\nLes aliments, tout comme de nombreux autres biens en caisse, sont entreposés dans des entrepôts."
deDE = "Schließlich bereiten wir etwas Lagerplatz für die Beeren vor. Wir müssen uns auch auf die nächste Ernte von Karotten vorbereiten.\n\nLebensmittel, wie viele andere Waren in Behältern, werden in Lagern aufbewahrt."
plPL = "W końcu przygotujmy trochę miejsca na przechowywanie jagód. Musimy również przygotować się na nadchodzące zbiory marchwi.\n\nJedzenie, podobnie jak wiele innych towarów w skrzynkach, przechowywane jest w magazynach."
ptBR = "Finalmente, vamos preparar um pouco de armazenamento para as Frutas. Também precisamos nos preparar para a próxima colheita de Cenouras.\n\nOs alimentos, assim como muitos outros bens em caixas, são armazenados em armazéns."
koKR = "마침내, 베리를 위한 약간의 저장 공간을 준비합니다. 또한 다음 당근 수확을 위해 준비해야 합니다.\n\n음식은 많은 다른 상자에 있는 물품들과 마찬가지로 창고에 저장됩니다."
csCZ = "Na závěr si připravíme trochu úložného prostoru pro Bobule. Také se musíme připravit na příští sklizeň Mrkví.\n\nPotraviny, stejně jako mnoho dalších položek v krabicích, se uchovávají ve skladech."
viVN = "Cuối cùng, chúng ta sẽ chuẩn bị một chút kho cho quả mọng. Chúng ta cũng cần chuẩn bị cho vụ thu hoạch cà rốt sắp tới.\n\nThực phẩm, giống như nhiều hàng hóa khác trong hộp, được lưu trữ trong kho."

