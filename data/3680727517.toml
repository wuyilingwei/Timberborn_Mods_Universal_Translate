["NaturalResource.Wheat.FlavorDescription"]
raw = "\"Oblidaràs el sol al cel sense núvols mentre caminem per camps d'or.\" —balada de castor"
status = "normal"
enUS = "You will forget the sun in the cloudless sky as we walk through fields of gold. —Beaver Ballad"
zhCN = "当我们在金色田野间漫步时，你会忘记无云天空中的太阳。—海狸的民谣"
zhTW = "\"你會忘記晴朗天空中的太陽，當我們在金色的田野上漫步。\" —海狸之歌"
ruRU = "Ты забудешь солнце в безоблачном небе, пока мы идём по золотым полям. —баллада бобра"
jaJP = "雲一つない空の太陽を君は忘れるだろう。私たちが黄金の野を歩くうちに。 —ビーバーのバラード"
frFR = "Tu oublieras le soleil dans le ciel sans nuages pendant que nous marchons à travers des champs d'or.\" —ballade de castor"
deDE = "\"Du wirst die Sonne im wolkenlosen Himmel vergessen, während wir durch Felder aus Gold wandern.\" —Biberballade"
plPL = "\"Zapomnisz o słońcu na bezchmurnym niebie, gdy będziemy spacerować po złotych polach.\" —ballada bobra"
ptBR = "\"Você esquecerá o sol no céu sem nuvens enquanto caminharmos por campos de ouro.\" —balada de castor"
koKR = "구름 한 점 없는 맑은 하늘의 태양을 잊게 될 거야, 우리가 황금 들판을 걸을 때. —비버의 발라드"
csCZ = "Zapomeneš na slunce na obloze bez mraků, zatímco kráčíme po zlatých polích. —balada bobra"
