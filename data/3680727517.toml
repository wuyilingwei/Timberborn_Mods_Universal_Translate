["Tutorial.WorkingHours.SetWorkingHours"]
status = "normal"
raw = "Ajustar les hores de treball és una manera de gestionar el teu assentament.\n\nJornades més llargues volen dir progrés més ràpid, però cada vespre els castors necessiten temps per relaxar-se i dormir. No els pressionis massa durant massa temps.\n\nDe moment, augmentem una mica les hores de treball."
enUS = "Adjusting working hours is a way to manage your settlement.\n\nLonger workdays mean faster progress, but every evening the beavers need time to relax and sleep. Don’t push them too hard for too long.\n\nFor now, let’s increase the working hours a bit."
zhCN = "“调整工作时间是管理你的定居点的一种方式。\n\n更长的工作时间意味着更快的进展，但每晚海狸需要时间来放松和睡觉。不要过于逼迫他们。\n\n现在，我们稍微增加一下工作时间。”"
zhTW = "調整工作時間是管理你們定居點的一種方式。\n\n更長的工作日意味著更快的進展，但每晚海狸們需要時間來放鬆和睡覺。不要過度壓迫他們。\n\n目前，我們稍微增加一下工作時間。"
ruRU = "Настройка рабочего времени — это способ управлять вашим поселением.\n\nБолее продолжительные рабочие дни означают более быстрый прогресс, но каждый вечер бобрам нужно время, чтобы отдохнуть и поспать. Не нагружайте их слишком долго.\n\nНа данный момент немного увеличим рабочие часы."
jaJP = "労働時間を調整することは、あなたの集落を管理する方法の一つです。\n\n長い労働時間はより早い進捗を意味しますが、毎晩ビーバーたちはリラックスし、眠る時間が必要です。彼らを長時間無理に働かせないでください。\n\n今のところ、労働時間を少しだけ増やしましょう。"
frFR = "Ajuster les heures de travail est une façon de gérer votre établissement.\n\nDes journées plus longues signifient un progrès plus rapide, mais chaque soir, les castors ont besoin de temps pour se détendre et dormir. Ne les poussez pas trop longtemps.\n\nPour le moment, augmentons un peu les heures de travail."
deDE = "Die Arbeitsstunden anzupassen ist eine Möglichkeit, deine Siedlung zu verwalten.\n\nLängere Arbeitstage bedeuten schnelleren Fortschritt, aber jeden Abend brauchen die Biber Zeit, um sich zu entspannen und zu schlafen. Setze sie nicht zu lange unter Druck.\n\nFür den Moment erhöhen wir die Arbeitsstunden ein wenig."
plPL = "Dostosowanie godzin pracy to sposób zarządzania Twoją osadą.\n\nDłuższe dni robocze oznaczają szybszy postęp, ale każdego wieczoru bobry potrzebują czasu na relaks i sen. Nie naciskaj na nie zbyt mocno przez zbyt długi czas.\n\nNa razie nieco zwiększymy godziny pracy."
ptBR = "Ajustar as horas de trabalho é uma maneira de gerenciar seu assentamento.\n\nJornadas mais longas significam progresso mais rápido, mas a cada noite os castores precisam de tempo para relaxar e dormir. Não os pressione demais por muito tempo.\n\nPor enquanto, vamos aumentar um pouco as horas de trabalho."
koKR = "근무 시간을 조정하는 것은 당신의 정착지를 관리하는 방법입니다.\n\n더 긴 근무 시간은 더 빠른 발전을 의미하지만, 매일 저녁 비버들은 휴식과 수면을 취할 시간이 필요합니다. 너무 오랫동안 그들을 압박하지 마세요.\n\n우선 근무 시간을 조금 늘려봅시다."
csCZ = "Nastavení pracovních hodin je způsob, jak spravovat vaše osídlení.\n\nDelší směny znamenají rychlejší pokrok, ale každý večer potřebují bobři čas na odpočinek a spánek. Nepřehánějte to s nimi příliš dlouho.\n\nTeď zvýšíme pracovní dobu trochu."
viVN = "Điều chỉnh giờ làm việc là một cách để quản lý nơi cư trú của bạn.\n\nNhững ngày làm dài hơn có nghĩa là tiến độ nhanh hơn, nhưng mỗi buổi tối, những con béo cần thời gian để thư giãn và ngủ. Đừng ép chúng quá nhiều trong quá lâu.\n\nHiện tại, hãy tăng một chút giờ làm việc."

