plPL = "\"Dlaczego mamy sprzątać katastrofę ludzi? Ach, oczywiście, wszyscy nie żyją.\" —Pina"
ptBR = "\"Por que temos que limpar a bagunça dos humanos? Ah, é claro, todos estão mortos.\" —Pina"
koKR = "\"왜 우리가 인간의 재난을 치워야 합니까? 아, 물론 그들 모두 죽었습니다.\" —피나"
csCZ = "Proč musíme uklízet lidský nepořádek? Aha, jasně, všichni mrtví. —Pina"
viVN = "\"Tại sao chúng ta phải dọn dẹp thảm họa của loài người? À, tất nhiên, họ đã chết.\" —Pina"

