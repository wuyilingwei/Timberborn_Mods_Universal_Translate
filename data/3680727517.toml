["MapMetadata.Plains.Description"]
raw = "Amb grans superfícies tan planes com una cua de castor, aquesta regió és un terreny de proves segur per a enginyers novells."
status = "normal"
enUS = "With large, flat surfaces as flat as a beaver's tail, this region is a safe testing ground for novice engineers."
zhCN = "拥有如海狸尾巴般平坦的大面积地形，这片区域是新手工程师的安全试验场。"
zhTW = "以海狸尾巴般平坦的大片表面為特徵，這片區域是新手工程師安全的試驗場。"
ruRU = "С большими поверхностями, такими же плоскими, как хвост бобра, этот регион — безопасная площадка для испытаний начинающих инженеров."
jaJP = "ビーバーの尾のように広く平坦な地表を持つこの地域は、新人エンジニアにとって安全な実験場です。"
frFR = "Avec de grandes surfaces aussi planes qu'une queue de castor, cette région est un terrain d'essai sûr pour les ingénieurs débutants."
deDE = "Mit großen Flächen, die so flach sind wie der Schwanz eines Bibers, ist diese Region ein sicheres Versuchsgelände für unerfahrene Ingenieure."
plPL = "Z dużymi, tak płaskimi powierzchniami jak ogon bobra, ten region jest bezpiecznym terenem prób dla początkujących inżynierów."
ptBR = "Com grandes superfícies tão planas quanto a cauda de um castor, esta região é um terreno de provas seguro para engenheiros novatos."
koKR = "비버의 꼬리만큼이나 넓고 평평한 거대한 표면들이 있는 이 지역은 초보 엔지니어들에게 안전한 실험 지대이다."
csCZ = "S velkými, stejně plochými jako bobří ocas, je tato oblast bezpečným zkušebním terénem pro začínající inženýry."
viVN = "Với những mặt phẳng rộng như đuôi hải ly, khu vực này là một địa điểm thử nghiệm an toàn cho các kỹ sư mới."

