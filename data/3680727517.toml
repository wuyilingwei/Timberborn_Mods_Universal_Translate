deDE = "\"Wohin glaubst du, dass du gehst, Kleiner? Diese Äste schälen sich nicht von alleine.\" —Ma' Ngonel"
plPL = "\"Dokąd myślisz, dzieciaku? Te gałęzie same się nie obiorą.\" —Ma' Ngonel"
ptBR = "Pra onde você acha que vai, vira-lata? Esses galhos não vão se descascar sozinhos. —Ma' Ngonel"
koKR = "\"네가 어디 가려는 거야, 얘야? 이 가지들은 스스로 벗겨지지 않을 거야.\" —Ma' Ngonel"
