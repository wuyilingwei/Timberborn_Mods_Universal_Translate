["NewGameConfigurationPanel.HardModeDescription"]
raw = "Els humans no ho van aconseguir i tu tampoc.\n\nEl teu assentament comença amb pocs recursos.\n\nLes sequeres i les marees tòxiques són severes i empitjoren amb el temps.\n\nEsmola els teus incisius."
status = "normal"
enUS = "Humans didn't make it, and you won't either.\n\nYour settlement begins with few resources.\n\nThe droughts and toxic tides are severe and worsen over time.\n\nSharpen your incisors."
zhCN = "人类没有做到，你也做不到。\n\n你的定居点起始资源很少。\n\n干旱和有毒潮汐都很严重，并会随着时间恶化。\n\n磨利你的门牙。"
zhTW = "人類也沒做到，你也做不到。\n\n你的定居點以有限資源開始。\n\n乾旱與有毒潮汐都相當嚴酷，並且會隨著時間惡化。\n\n打磨你的鑿子。"
ruRU = "Людям это не удалось, и тебе тоже не удастся.\n\nВаше поселение начинается с небольшого количества ресурсов.\n\nЗасухи и токсичные приливы суровы и со временем ухудшаются.\n\nЗаточите ваши резцы."
jaJP = "人間はそれを成し遂げられなかった。あなたも同じだ。\n\nあなたの入植地は資源が乏しい状態から始まる。\n\n干ばつと有毒な潮汐は深刻で、時間が経つにつれて悪化します。\n\nあなたの鑿を研ぎなさい。"
frFR = "Les humains n'y sont pas parvenus et toi non plus.\n\nTon établissement commence avec peu de ressources.\n\nLes sécheresses et les marées toxiques sont sévères et s'aggravent avec le temps.\n\nAffûte tes incisives."
deDE = "Die Menschen haben es nicht geschafft – und du auch nicht.\n\nDeine Siedlung beginnt mit wenigen Ressourcen.\n\nDürreperioden und toxische Gezeiten sind streng und verschlimmern sich mit der Zeit.\n\nSchärfe deine Schneidezähne."
plPL = "Ludzie tego nie osiągnęli, a ty również nie.\n\nTwoja osada zaczyna się od niewielu zasobów.\n\nSusze i toksyczne przypływy są ciężkie i pogarszają się z czasem.\n\nOstrz swoje zęby sieczne."
ptBR = "Os humanos não conseguiram e você também não.\n\nSeu assentamento começa com poucos recursos.\n\nAs secas e as marés tóxicas são severas e pioram com o tempo.\n\nAfie seus incisivos."
koKR = "인간들은 그것을 이루지 못했고 너도 마찬가지다.\n\n당신의 정착지는 자원이 거의 없다.\n\n가뭄과 독성 파도는 심하고 시간이 지날수록 악화된다.\n\n네 조각칼을 예리하게 갈아라."
csCZ = "Člověk to nezvládl a ty také ne.\n\nTvé osídlení začíná s málo zdroji.\n\nSucha a toxické přílivy jsou přísné a časem se zhoršují.\n\nOstré své špičáky."
viVN = "Con người không làm được điều đó và bạn cũng vậy.\n\nKhu định cư của bạn bắt đầu với rất ít tài nguyên.\n\nHạn hán và thủy triều độc hại rất nghiêm trọng và ngày càng tệ theo thời gian.\n\nMài sắc các chiếc đục của bạn."

