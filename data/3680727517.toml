["MapMetadata.Cliffside.Description"]
raw = "Les restes d'antiga arquitectura humana s'escampen per aquesta vall apartada. Els castors aspiren a deixar una empremta semblant al món."
status = "normal"
enUS = "The remains of ancient human architecture are scattered across this secluded valley. The beavers aspire to leave a footprint similar to the world."
zhCN = "古代人类建筑的遗迹散布在这片偏僻的山谷中。河狸们渴望留下与世界相似的印记。"
zhTW = "這片偏遠的山谷散佈著古代人類建築的遺跡。海狸們渴望留下與世界相似的印記。"
ruRU = "Останки древней человеческой архитектуры разбросаны по этой удалённой долине. Бобры стремятся оставить след, похожий на мир."
jaJP = "この奥まった谷には、古代人類の建築遺構が散在している。ビーバーは世界に似た痕跡を残そうとしている。"
frFR = "Les restes d'une ancienne architecture humaine s'étendent dans cette vallée isolée. Les castors aspirent à laisser une empreinte semblable au monde."
deDE = "Die Überreste alter menschlicher Architektur liegen in diesem abgelegenen Tal verstreut. Die Biber streben danach, eine Spur zu hinterlassen, die der Welt ähnelt."
plPL = "Pozostałości dawnej ludzkiej architektury rozsypują się po tej odosobnionej dolinie. Pragną pozostawić ślad podobny do świata."
ptBR = "Os restos de uma antiga arquitetura humana espalham-se por este vale isolado. Os castores aspiram deixar uma marca semelhante ao mundo."
koKR = "오래된 인간의 건축 유적이 이 외딴 계곡에 흩어져 있다. 비버들은 세상과 닮은 흔적을 남기고자 한다."
csCZ = "Zbytky dávné lidské architektury se rozptýlí po tomto odlehlém údolí. Bobři touží zanechat světu podobnou stopu."
viVN = "Những tàn tích của kiến trúc nhân loại cổ đại rải rác khắp thung lũng hẻo lánh này. Những con hải ly khao khát để lại một dấu vết giống với thế giới."

