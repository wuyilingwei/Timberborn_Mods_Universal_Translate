["Tutorial.MoreBeavers.GrowPopulation"]
status = "normal"
raw = "Els castors no es reprodueixen si no hi ha espais d'habitatge lliures. Els cuesfusta necessiten dos adults i un espai lliure perquè passi la màgia."
enUS = "Beavers do not reproduce if there are no available housing spaces. The lumberjacks need two adults and a free space for the magic to happen."
zhCN = "“如果没有空余的居住空间，海狸不会繁殖。树尾需要两个成年海狸和一个空位才能发生魔法。”"
zhTW = "如果沒有空餘的居住空間，海狸將不會繁殖。木材工需要兩個成年人和一個空位，才能發生奇蹟。"
ruRU = "Бобры не размножаются, если нет свободных мест для жилья. Для этого необходимо два взрослых бобра и одно свободное место."
jaJP = "ビーバーは空いている住居スペースがなければ繁殖しません。ウッドテールは大人が2匹と空きスペースが1つ必要です。そうすれば魔法が起こります。"
frFR = "Les castors ne se reproduisent pas s'il n'y a pas d'espaces de logement libres. Les queues de bois ont besoin de deux adultes et d'un espace libre pour que la magie opère."
deDE = "Die Biber vermehren sich nicht, wenn keine freien Wohnräume vorhanden sind. Die Holzfäller benötigen zwei Erwachsene und einen freien Platz, damit die Magie passiert."
plPL = "Norki nie rozmnażają się, jeśli nie ma wolnych miejsc zamieszkania. Bobry potrzebują dwóch dorosłych i jednego wolnego miejsca, aby magia mogła się wydarzyć."
ptBR = "Os castores não se reproduzem se não houver espaços de habitação livres. Os castores precisam de dois adultos e um espaço livre para que a mágica aconteça."
koKR = "비버는 빈 주거 공간이 없으면 번식하지 않습니다. 나무꾼은 두 명의 성인과 하나의 빈 공간이 필요합니다."
csCZ = "Bobři se nerodí, pokud nejsou volné obytné prostory. Dvouhlavý bobr potřebuje dva dospělé a jedno volné místo, aby se magie stala."
viVN = "Các con nhím không sinh sản nếu không có không gian ở trống. Cần hai con trưởng thành và một không gian trống để phép thuật xảy ra."

