zhTW = "• 新的地圖互動物件\n• 自動化：感測器、繼電器、定時器等\n• 新地圖：綠洲、壓力、溢出\n• 螺旋階梯、門、離合器、旗幟\n• 改進的模組開發流程\n• 視覺更新、教學修正、複製工具\n• Steam 成就"
ruRU = "• Новые интерактивные объекты карты\n• Автоматизация: датчики, реле, таймеры и прочее\n• Новые карты: Оазис, Давление, Разлив\n• Спиральные лестницы, дверь, сцепление, баннеры\n• Улучшенный пайплайн моддинга\n• Визуальное обновление, правки туториала, инструмент дублирования\n• Достижения Steam"
jaJP = "• 新しいマップのインタラクティブなオブジェクト\n• 自動化: センサー、リレー、タイマーなど\n• 新しいマップ: オアシス、プレッシャー、ヴェサメント\n• 螺旋階段、ドア、クラッチ、横断幕\n• 改良されたモッド作成パイプライン\n• ビジュアルの刷新、チュートリアルの微修正、複製ツール\n• Steam実績"
frFR = "• Nouveaux objets interactifs de la carte\n• Automatisation: capteurs, relais, minuteries et plus\n• Nouvelles cartes: Oasis, Pression, Déversement\n• Escaliers en colimaçon, porte, embrayage, enseignes\n• Pipeline de modding amélioré\n• Actualisation visuelle, retouches du tutoriel, outil de duplication\n• Succès Steam"
deDE = "• Neue interaktive Kartenobjekte\n• Automatisierung: Sensoren, Relais, Timer und mehr\n• Neue Karten: Oase, Druck, Überlauf\n• Spiraltreppen, Türen, Kupplungen, Banner\n• Verbesserte Modding-Pipeline\n• Visuelle Überarbeitung, Tutorial-Überarbeitungen, Duplikationswerkzeug\n• Steam-Erfolge"
plPL = "• Nowe interaktywne obiekty mapy\n• Automatyzacja: czujniki, przekaźniki, timery i więcej\n• Nowe mapy: Oaza, Ciśnienie, Zalanie\n• Spiralne schody, drzwi, sprzęgło, banery\n• Ulepszony proces modowania\n• Odświeżenie wizualne, poprawki tutoriala, narzędzie duplikowania\n• Osiągnięcia Steam"
ptBR = "• Novos objetos interativos do mapa\n• Automatização: sensores, relés, temporizadores e mais\n• Novos mapas: Oasis, Pressão, Vazamento\n• Escadas em espiral, porta, embreagem, placas\n• Pipeline de modding aprimorado\n• Renovação visual, retoques do tutorial, ferramenta de duplicação\n• Conquistas do Steam"
