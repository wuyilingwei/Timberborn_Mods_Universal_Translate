["Building.Lodge.FlavorDescription"]
raw = "\"Antigament una casa era això, una casa. I ara? No ho tinc tan clar.\" —Ma' Ngonel"
status = "normal"
enUS = "\"In the old days, a house was a house. And now? I'm not so sure.\" —Ma' Ngonel"
zhCN = "\"从前，一座房子就是一座房子。现在呢？我还不太清楚。\" —Ma' Ngonel"
zhTW = "\"從前，一棟房子就是這樣，一棟房子。現在呢？我不太清楚了。\" —Ma' Ngonel"
ruRU = "Раньше дом был домом. А сейчас? Не совсем ясно.\" —Ма' Нгонель"
jaJP = "昔はそれが家だった。ただの家だった。今は、はっきりとは分からない。 —Ma' Ngonel"
frFR = "\"Autrefois, une maison, c'était cela: une maison. Et maintenant ? Je n'en suis pas si sûr.\" —Ma' Ngonel"
deDE = "\"Früher war ein Haus einfach nur ein Haus. Und jetzt? Da bin ich mir nicht ganz sicher.\" —Ma' Ngonel"
plPL = "\"Kiedyś dom był domem. A teraz? Nie mam już takiej jasności.\" —Ma' Ngonel"
ptBR = "\"Antigamente, uma casa era isso: uma casa. E agora? Não tenho tanta certeza.\" —Ma' Ngonel"
koKR = "\"옛날엔 집이 그것이었고, 한 채의 집이었다. 그리고 지금은? 그건 아직 확실하지 않아.\" —Ma' Ngonel"
csCZ = "\"Dřív to byl jenom dům. A teď? Už to tak jasné nemám.\" —Ma' Ngonel"
viVN = "\"Ngày xưa, một căn nhà chỉ là một căn nhà. Còn bây giờ thì sao? Tôi không còn rõ lắm.\" —Ma' Ngonel"

