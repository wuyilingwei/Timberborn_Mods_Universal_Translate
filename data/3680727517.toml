["NaturalResource.Birch.FlavorDescription"]
raw = "\"Recordeu, petits, no arranqueu massa escorça! Fa mal a l'arbre!\" —Ma' Ngonel"
status = "normal"
enUS = "\"Remember, little ones, don't strip off too much bark! It hurts the tree!\" —Ma' Ngonel"
zhCN = "记住，孩子们，别剥太多树皮！这会伤害树木。 —Ma' Ngonel"
zhTW = "\"記住，小朋友們，別拔太多樹皮！這樣會傷害樹木！\" —Ma' Ngonel"
ruRU = "\"Помните, малыши, не срывайте слишком много коры! Это вредит дереву!\" —Ma' Ngonel"
jaJP = "小さな者たちよ、樹皮をむきすぎるな！木を傷つけるぞ！ —Ma' Ngonel"
frFR = "\"Souvenez-vous, petits, n'arrachez pas trop d'écorce! Ça fait mal à l'arbre!\" —Ma' Ngonel"
deDE = "\"Erinnert euch, Kinder, reißt nicht zu viel Rinde ab! Es tut dem Baum weh!\" —Ma' Ngonel"
plPL = "\"Pamiętajcie, mali, nie zrywajcie zbyt dużo kory! Krzywdzicie drzewo!\" —Ma' Ngonel"
ptBR = "Lembrem-se, crianças, não arranquem muita casca! Machuca a árvore! —Ma' Ngonel"
koKR = "\"얘들아, 기억해두어라, 껍질을 너무 많이 벗기지 마! 나무에 해를 끼친다!\" —Ma' Ngonel"
csCZ = "\"Pamatujte, děti, neodtrhávejte příliš kůry! Ublíží stromu!\" —Ma' Ngonel"
viVN = "Hãy nhớ, các em nhỏ, đừng lột quá nhiều vỏ cây! Nó làm hại cây! —Ma' Ngonel"

