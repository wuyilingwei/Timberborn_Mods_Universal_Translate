plPL = "Możesz także zwiększyć prędkość gry, aby skrócić czasy przestoju, podczas gdy bobry pracują lub śpią."
ptBR = "Você também pode aumentar a velocidade do jogo para reduzir o tempo morto enquanto os castores trabalham ou dormem."
koKR = "비버가 일하거나 자는 동안의 공백 시간을 줄이기 위해 게임 속도를 높일 수도 있습니다."
