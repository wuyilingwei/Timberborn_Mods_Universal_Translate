["MainMenu.UpdateInfoText"]
raw = "• Nous objectes interactius de mapa\n• Automatització: sensors, relés, temporitzadors i més\n• Nous mapes: Oasis, Pressió, Vessament\n• Escales de cargol, porta, embragatge, pancartes\n• Pipeline de modding millorat\n• Renovació visual, retocs del tutorial, eina de duplicació"
status = "normal"
enUS = "• New interactive map objects\n• Automation: sensors, relays, timers, and more\n• New maps: Oasis, Pressure, Spillage\n• Spiral stairs, doors, clutches, banners\n• Improved modding pipeline\n• Visual refresh, tutorial tweaks, duplication tool"
zhCN = "• 新的地图互动对象\n• 自动化：传感器、继电器、定时器等\n• 新地图：绿洲、压力、溢出\n• 螺旋楼梯、门、离合器、横幅\n• 改进的模组开发流程\n• 视觉更新、教程修订、复制工具"
zhTW = "• 新的地圖互動物件\n• 自動化：感測器、繼電器、計時器等\n• 新的地圖：綠洲、壓力、外溢\n• 螺旋階梯、門、離合器、旗幟\n• 改良的模組開發流程\n• 視覺更新、教學修整、複製工具"
ruRU = "• Новые интерактивные объекты на карте\n• Автоматизация: датчики, реле, таймеры и многое другое\n• Новые карты: Оазис, Давление, Разлив\n• Спиральные лестницы, дверь, сцепление, вывески\n• Улучшенный пайплайн моддинга\n• Визуальное обновление, правки учебника, инструмент дублирования"
jaJP = "• 新しいマップのインタラクティブオブジェクト\n• 自動化：センサー、リレー、タイマーなど\n• 新しいマップ：オアシス、プレッシオ、ヴェサメント\n• 螺旋階段、ドア、クラッチ、看板\n• 改良されたモッド作成パイプライン\n• 視覚的な刷新、チュートリアルの微修正、複製ツール"
frFR = "• Nouveaux objets interactifs de la carte\n• Automatisation : capteurs, relais, temporisateurs et plus encore\n• Nouvelles cartes : Oasis, Pression, Déversement\n• Escaliers en colimaçon, porte, embrayage, banderoles\n• Pipeline de modding amélioré\n• Rénovation visuelle, retouches du tutoriel, outil de duplication"
deDE = "• Neue interaktive Kartenobjekte  \n• Automatisierung: Sensoren, Relais, Timer und mehr  \n• Neue Karten: Oase, Druck, Überlauf  \n• Schraubentreppen, Türen, Kupplungen, Schilder  \n• Verbesserte Modding-Pipeline  \n• Visuelle Auffrischung, Tutorials überarbeitet, Duplikationstool"
plPL = "• Nowe interaktywne obiekty mapy\n• Automatyzacja: czujniki, przekaźniki, timery i więcej\n• Nowe mapy: Oasis, ciśnienie, wylew\n• Schody spiralne, drzwi, sprzęgło, banery\n• Ulepszony proces modowania\n• Odświeżenie wizualne, poprawki samouczka, narzędzie duplikowania"
ptBR = "• Novos objetos interativos do mapa\n• Automatização: sensores, relés, temporizadores e mais\n• Novos mapas: Oásis, Pressão, Vazamento\n• Escadas de caracol, porta, embreagem, placas\n• Pipeline de modding melhorado\n• Renovação visual, retoques do tutorial, ferramenta de duplicação"
koKR = "• 지도용 신규 대화형 객체들\n• 자동화: 센서, 릴레이, 타이머 등\n• 신규 맵: Oasis, Pressure, Spillage\n• 나선형 계단, 문, 클러치, 배너\n• 향상된 모딩 파이프라인\n• 시각적 개편, 튜토리얼 조정, 복제 도구"
csCZ = "• Nové interaktivní mapové objekty\n• Automatizace: senzory, relé, časovače a více\n• Nové mapy: Oáza, Tlak, Rozlití\n• Spirálové schodiště, dveře, spojka, transparenty\n• Vylepšený pipeline pro modding\n• Vizuální oživení, úpravy tutoriálu, nástroj pro duplikaci"
viVN = "• Các đối tượng tương tác mới trên bản đồ\n• Tự động hóa: cảm biến, rơ-le, bộ hẹn giờ và nhiều thứ khác\n• Các bản đồ mới: Oasis, Áp suất, Tràn\n• Cầu thang xoắn ốc, cửa, ly hợp, biểu ngữ\n• Quy trình modding được cải tiến\n• Cải thiện trực quan, chỉnh sửa hướng dẫn, công cụ sao chép"

