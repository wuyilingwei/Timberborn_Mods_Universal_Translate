["Saving.SemiCompatibleSaveVersion"]
raw = "Desa version ({0}) is incompatible with the current version ({1}). Loading it can cause crashes and game-breaking problems. We strongly recommend starting a new game to fully enjoy the new features.\n\nAre you sure you want to load it?"
status = "normal"
enUS = "Save version ({0}) is incompatible with the current version ({1}). Loading it can cause crashes and game-breaking problems. We strongly recommend starting a new game to fully enjoy the new features.\n\nAre you sure you want to load it?"
zhCN = "存档版本（{0}）与当前版本（{1}）不兼容。加载它可能导致崩溃和对游戏造成严重破坏的问题。我们强烈建议从头开始一个新游戏，以充分享受这些新功能。\n\n您确定要加载它吗？"
zhTW = "Desa 版本（{0}）與當前版本（{1}）不相容。載入它可能導致崩潰與嚴重的遊戲問題。我們強烈建議開始新遊戲，以充分享受新功能。\n\n您確定要載入它嗎？"
ruRU = "Версия сохранения ({0}) несовместима с текущей версией ({1}). Загрузка может вызвать сбои и проблемы, которые ломают игру. Мы настоятельно рекомендуем начать новую игру, чтобы полностью насладиться новыми возможностями.\n\nВы уверены, что хотите загрузить его?"
jaJP = "Desa version（{0}）は現在のバージョン（{1}）と互換性がありません。読み込むとクラッシュやゲームの重大な問題を引き起こす可能性があります。新機能を十分に楽しむには、新規ゲームを開始することを強くお勧めします。\n\nそれを読み込んでもよろしいですか？"
frFR = "La version de sauvegarde ({0}) est incompatible avec la version actuelle ({1}). Le chargement peut entraîner des plantages et des problèmes qui rendent le jeu injouable. Nous vous recommandons fortement de commencer une nouvelle partie pour profiter pleinement des nouvelles fonctionnalités.\n\nÊtes-vous sûr de vouloir le charger ?"
deDE = "Speicher-Version ({0}) ist nicht mit der aktuellen Version ({1}) kompatibel. Das Laden davon kann zu Abstürzen und schwerwiegenden Problemen im Spiel führen. Wir empfehlen dringend, ein neues Spiel zu starten, um die neuen Funktionen vollständig zu genießen.\n\nMöchten Sie es wirklich laden?"
plPL = "Wersja Desa ({0}) nie jest kompatybilna z obecną wersją ({1}). Załadowanie jej może spowodować awarie i problemy z rozgrywką. Zdecydowanie zalecamy rozpoczęcie nowej gry, aby w pełni cieszyć się nowymi funkcjami.\n\nCzy na pewno chcesz ją załadować?"
ptBR = "A versão salva ({0}) é incompatível com a versão atual ({1}). Carregá-la pode causar travamentos e problemas que atrapalham o andamento do jogo. Recomendamos fortemente iniciar um novo jogo para aproveitar plenamente os novos recursos.\n\nTem certeza de que deseja carregá-la?"
koKR = "Desa 버전({0})은 현재 버전({1})과 호환되지 않습니다. 이를 로드하면 충돌이 발생하고 게임 진행에 심각한 문제가 생길 수 있습니다. 새로운 기능을 충분히 즐기려면 새 게임을 시작하는 것을 강력히 권장합니다.\n\n정말 로드하시겠습니까?"
csCZ = "Verze Desa ({0}) není kompatibilní s aktuální verzí ({1}). Načtení toho může způsobit pády a problémy, které zničí hru. Důrazně doporučujeme začít novou hru, abyste si plně užili nové funkce.\n\nOpravdu ji chcete načíst?"
viVN = "Phiên bản Desa ({0}) không tương thích với phiên bản hiện tại ({1}). Việc tải nó có thể gây treo và các vấn đề làm hỏng trò chơi. Chúng tôi đặc biệt khuyến nghị bắt đầu một trò chơi mới để tận hưởng đầy đủ các tính năng mới.\n\nBạn có chắc chắn muốn tải nó không?"

