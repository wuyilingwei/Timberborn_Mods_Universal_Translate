["NewGameConfigurationPanel.EasyModeDescription"]
raw = "Encara estàs aprenent o vols una experiència relaxada de construcció de ciutats.\n\nEl teu assentament comença amb una abundància de recursos.\n\nEls castors consumeixen menys menjar i aigua.\n\nLes sequeres i les marees tòxiques són rares i curtes."
status = "normal"
enUS = "You're still learning or want a relaxed city-building experience.\n\nYour settlement starts with an abundance of resources.\n\nBeavers consume less food and water.\n\nDroughts and toxic tides are rare and short."
zhCN = "你还在学习，还是想要一个放松的城市建造体验。\n\n你的定居点以丰富的资源开始。\n\n海狸消耗更少的食物和水。\n\n干旱和有毒潮汐很少且持续时间短。"
zhTW = "你仍在學習，或想要一個放鬆的城市建設體驗。\n\n你的聚落一開始就擁有豐富的資源。\n\n海狸消耗的食物和水更少。\n\n乾旱和有毒潮汐很罕見且短暫。"
ruRU = "Ты всё ещё учишься или хочешь спокойного опыта градостроительства.\n\nТвоё поселение начинается с обилия ресурсов.\n\nБобры потребляют меньше еды и воды.\n\nЗасухи и токсичные приливы редкие и короткие."
jaJP = "まだ学んでいる途中ですか、それともリラックスした都市づくりの体験を望みますか。\n定住地は資源が豊富にある状態から始まります。\nビーバーは食料と水の消費量が少なくなります。\n干ばつと有毒な潮汐はまれで短い。"
frFR = "Vous êtes encore en train d'apprendre ou vous souhaitez une expérience de construction de villes plus détendue.\nVotre colonie commence avec une abondance de ressources.\nLes castors consomment moins de nourriture et d'eau.\nLes sécheresses et les marées toxiques sont rares et de courte durée."
deDE = "Du bist noch am Lernen oder willst ein entspanntes Städtebau-Erlebnis.\n\nDeine Siedlung beginnt mit einem Überfluss an Ressourcen.\n\nDie Biber verbrauchen weniger Nahrung und Wasser.\n\nDürreperioden und toxische Gezeiten sind selten und kurz."
plPL = "Wciąż się uczysz lub chcesz relaksującego doświadczenia w budowaniu miast.\n\nTwoja osada zaczyna się od obfitości zasobów.\n\nBobry zużywają mniej jedzenia i wody.\n\nSusze i toksyczne przypływy są rzadkie i krótkie."
ptBR = "Você ainda está aprendendo ou quer uma experiência relaxada de construção de cidades.\n\nSeu assentamento começa com uma abundância de recursos.\n\nOs castores consomem menos comida e água.\n\nAs secas e as marés tóxicas são raras e curtas."
koKR = "아직 배우고 있거나 느긋한 도시 건설 경험을 원하나요?\n\n당신의 정착은 자원이 풍부하게 시작됩니다.\n\n비버는 음식과 물을 덜 소비합니다.\n\n가뭄과 독성 조수는 드물고 짧습니다."
csCZ = "Stále se učíš, nebo chceš pohodový zážitek z budování měst.\n\nVaše osídlení začíná hojností zdrojů.\n\nBobři spotřebují méně jídla a vody.\n\nSucha a toxické přílivy jsou vzácné a krátké."
viVN = "Bạn vẫn đang học hỏi hoặc muốn có một trải nghiệm xây dựng thành phố thư giãn.\nKhu định cư của bạn bắt đầu với nguồn tài nguyên dồi dào.\nCác con hải ly tiêu thụ ít thức ăn và nước hơn.\nHạn hán và thủy triều độc hại hiếm gặp và ngắn."

