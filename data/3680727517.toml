["Building.LaborerMonument.FlavorDescription"]
raw = "Fins i tot després que el treball manual donés pas a la industrialització, l'ètica laboral dels Dents de Ferro no ha canviat."
status = "normal"
enUS = "Even after manual labor gave way to industrialization, the Iron Teeth's work ethic hasn't changed."
zhCN = "即使手工劳动让位于工业化，铁牙的职业道德也没有改变。"
zhTW = "即使手工勞動讓位於工業化，鐵牙的工作倫理仍未改變。"
ruRU = "Даже после того, как ручной труд уступил место индустриализации, рабочая этика Железных Зубов не изменилась."
jaJP = "手作業が産業化へと移行しても、鉄の歯の労働倫理は変わっていない。"
frFR = "Même après que le travail manuel ait cédé la place à l'industrialisation, l'éthique du travail des Dents de Fer n'a pas changé."
