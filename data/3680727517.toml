["NaturalResource.Coffee.FlavorDescription"]
raw = "Els castors antics mastegaven els grans per obtenir energia; els Dents de Ferro van trobar una idea millor preparant-los."
status = "normal"
enUS = "The old beavers chewed the grains to obtain energy; the Iron Teeth came up with a better idea by preparing them."
zhCN = "古老的海狸们嚼着谷物以获取能量；铁牙们通过加工谷物找到了一个更好的主意。"
zhTW = "古老的海狸為了獲取能量嚼碎咖啡豆；鐵牙族找到了更好的點子，透過加工它們。"
ruRU = "Старые бобры пережёвывали зерна, чтобы получить энергию; Железные Зубы нашли лучшую идею — приготовив их."
jaJP = "昔のビーバーは穀物を噛んでエネルギーを得ていた。鉄の歯はそれを調理することでより良いアイデアを見つけた。"
frFR = "Les anciens castors mâchaient les grains pour obtenir de l'énergie; les Dents de Fer ont trouvé une meilleure idée en les préparant."
deDE = "Die alten Biber mahlten die Kaffeebohnen, um Energie zu gewinnen; Die Eisenzähne fanden eine bessere Idee, sie zuzubereiten."
plPL = "Starożytne bobry żuły ziarna, aby zdobyć energię; Żelazne Zęby znalazły lepszy pomysł, przygotowując je."
ptBR = "Os castores antigos mastigavam os grãos para obter energia; os Dentes de Ferro encontraram uma ideia melhor preparando-os."
koKR = "옛 비버들은 곡물을 씹어 에너지를 얻었고; 철 이빨은 그것들을 가공해 더 나은 아이디어를 찾아냈다."
csCZ = "Staří bobři žvýkali zrna, aby získali energii; Železné zuby přišli na lepší nápad tím, že je připravovali."
viVN = "Những con hải ly cổ đại nhai hạt cà phê để lấy năng lượng; Răng Sắt đã tìm được một ý tưởng hay hơn bằng cách chế biến chúng."

