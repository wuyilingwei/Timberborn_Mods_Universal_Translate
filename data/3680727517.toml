["NaturalResource.Maple.FlavorDescription"]
raw = "De l'auró se'n pot extreure xarop però una fusta de qualitat encara és una recompensa més dolça."
status = "normal"
enUS = "Maple can yield syrup, but high-quality timber is an even sweeter reward."
zhCN = "从枫树可以提取糖浆，但高质量的木材仍然是更甜的回报。"
zhTW = "從楓樹可以提取楓糖漿，但高品質的木材仍然是更甜美的回報。"
ruRU = "Из клена можно добыть сироп, но качественная древесина всё же является более сладким вознаграждением."
jaJP = "カエデからはシロップを採ることができるが、質の高い木材はそれ以上に甘い報酬だ。"
frFR = "On peut en tirer du sirop d'érable, mais un bois de qualité reste une récompense encore plus douce."
deDE = "Aus Ahorn lässt sich Sirup gewinnen, doch hochwertiges Holz ist eine noch süßere Belohnung."
plPL = "Z klonu można uzyskać syrop, ale wysokiej jakości drewno nadal jest słodszą nagrodą."
ptBR = "É possível extrair xarope do bordo, mas uma madeira de boa qualidade ainda é uma recompensa mais doce."
koKR = "메이플 수액을 채취할 수 있지만 품질 좋은 목재가 더 달콤한 보상이다."
csCZ = "Z javoru lze vytěžit sirup, ale kvalitní dřevo je stále sladší odměnou."
viVN = "Từ cây phong có thể chiết xuất sirô, nhưng gỗ chất lượng vẫn là phần thưởng ngọt ngào hơn."

