["Building.DistrictCrossing.Description"]
raw = "Equilibra béns entre dos districtes connectats. Cada costat té treballadors que distribueixen béns entre el pas de districte i la resta del districte."
status = "normal"
enUS = "Balances goods between two connected districts. Each side has workers who distribute goods between the district crossing and the rest of the district."
zhCN = "在两个相连的区之间平衡物资。每一侧都有工人，在区的通道与该区的其他部分之间分发物资。"
zhTW = "在兩個相連的區域之間平衡貨物。每一側都配有工人，負責在通道與區域的其他部分之間分發貨物。"
ruRU = "Балансирует товары между двумя соединёнными районами. У каждой стороны есть рабочие, которые распределяют товары между переходом между районами и остальной частью района."
jaJP = "二つの接続された地区の間で物資を均衡させる。各側には、地区の通路と地区の残りの部分の間で物資を分配する作業員がいる。"
frFR = "Équilibre les biens entre deux districts connectés. Chaque côté dispose de travailleurs qui distribuent des biens entre le passage du district et le reste du district."
deDE = "Balanciert Güter zwischen zwei verbundenen Bezirken. Auf jeder Seite arbeiten Arbeiter, die Güter zwischen dem Bezirksdurchgang und dem Rest des Bezirks verteilen."
plPL = "Równoważy towary między dwoma połączonymi dzielnicami. Każda strona ma pracowników, którzy rozdzielają towary między przejściem dzielnicowym a resztą dzielnicy."
ptBR = "Equilibra bens entre dois distritos conectados. Cada lado tem trabalhadores que distribuem bens entre a passagem entre distritos e o resto do distrito."
koKR = "두 개의 연결된 구역 간에 물자를 균형 있게 분배합니다. 각 측에는 구역 간 통로와 구역의 나머지 부분 사이에서 물자를 분배하는 노동자들이 있습니다."
csCZ = "Vyrovnává zboží mezi dvěma propojenými distrikty. Na každé straně jsou pracovníci, kteří rozdělují zboží mezi přechodem distriktu a zbytkem distriktu."
