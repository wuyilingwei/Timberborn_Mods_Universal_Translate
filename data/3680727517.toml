raw = "Bombeja i filtra aigua perquè els castors puguin beure. La contaminació per aigua tòxica n'alenteix la velocitat de bombeig."
status = "normal"
enUS = "Pumps and filters water so that the beavers can drink. Toxic water contamination slows its pumping speed."
zhCN = "抽水并过滤水，以便海狸们可以饮用。有毒水污染会降低泵送速度。"
zhTW = "抽水並過濾水，以便讓河狸能喝水。有毒的水污染會降低其抽水速度。"
ruRU = "Накачивай и фильтруй воду, чтобы бобры могли пить. Загрязнение токсичной водой замедляет скорость перекачки."
jaJP = "ビーバーが飲めるように水をくみ上げて濾過します。有毒な水の汚染がポンプの速度を低下させます。"
frFR = "Pompe et filtre l'eau pour que les castors puissent boire. La contamination de l'eau toxique ralentit la vitesse de pompage."
deDE = "Wasser pumpen und filtern, damit die Biber trinken können. Die Kontamination durch toxisches Wasser verlangsamt die Pumpgeschwindigkeit."
plPL = "Pompuj i filtruj wodę, aby bobry mogły pić. Toksyczne zanieczyszczenie wody spowalnia tempo pompowania."
ptBR = "Bombeie e filtre a água para que os castores possam beber. A contaminação por água tóxica atrasa a velocidade de bombeamento."
koKR = "비버들이 마실 수 있도록 물을 퍼 올리고 여과합니다. 독성 물 오염은 펌프 작동 속도를 늦춥니다."
csCZ = "Čerpá vodu a filtruje ji, aby bobři mohli pít. Znečištění toxickou vodou zpomaluje rychlost čerpání."
viVN = "Bơm và lọc nước để hải ly có thể uống nước. Ô nhiễm nước độc hại làm giảm tốc độ bơm nước."

