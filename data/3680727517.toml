["MapMetadata.HelixMountain.Description"]
raw = "Tot i que troben impràctica la forma de la llera, els castors reconeixen les limitades habilitats d'enginyeria hidràulica de la humanitat."
status = "normal"
enUS = "Although they find the shape of the riverbed impractical, the beavers recognize humanity's limited hydraulic engineering abilities."
zhCN = "尽管他们觉得河床的形状不实用，海狸承认人类在水利工程方面的能力有限。"
zhTW = "儘管牠們認為河岸的形狀不實用，海狸們仍承認人類在水利工程方面的能力有限。"
ruRU = "Хотя они считают форму русла непрактичной, бобры признают ограниченные навыки гидротехнической инженерии человечества."
jaJP = "川床の形は不便だと感じる一方で、ビーバーは人類の限られた水工学技術を認識している。"
frFR = "Bien qu'ils trouvent peu pratique la forme du lit de la rivière, les castors reconnaissent les capacités limitées en ingénierie hydraulique de l'humanité."
deDE = "Obwohl die Biber den Verlauf des Flussbetts für unpraktisch halten, erkennen sie die begrenzten Fähigkeiten des hydraulischen Ingenieurwesens der Menschheit."
plPL = "Chociaż uważają kształt koryta rzeki za niepraktyczny, bobry dostrzegają ograniczone umiejętności inżynierii hydraulicznej ludzkości."
ptBR = "Apesar de acharem impraticável a forma do leito do rio, os castores reconhecem as habilidades limitadas de engenharia hidráulica da humanidade."
koKR = "비록 하천 바닥의 형태를 비실용적이라고 여기더라도, 비버들은 인류의 한정된 수력 공학 능력을 인정한다."
csCZ = "Ačkoli považují tvar koryta za nepraktický, bobři uznávají omezené dovednosti lidstva v hydraulickém inženýrství."
viVN = "Mặc dù họ cho rằng hình dạng lòng sông không thực tế, những con hải ly nhận ra những hạn chế về kỹ thuật thủy lực của loài người."

