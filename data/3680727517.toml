deDE = "Die Biber merkten sofort, dass sie Techniken von weniger fortgeschrittenen Nagern kopieren konnten."
plPL = "Bóbrowie od razu zorientowali się, że mogli kopiować techniki gryzoni mniej zaawansowanych."
ptBR = "Os castores perceberam de imediato que podiam copiar técnicas de roedores menos avançados."
koKR = "비버들은 곧 자신들이 덜 발달한 갉아먹는 동물들의 기술을 모방할 수 있다는 것을 깨달았다."
