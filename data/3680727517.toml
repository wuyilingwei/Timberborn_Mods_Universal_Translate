["Building.PrintingPress.FlavorDescription"]
raw = "Normalment, els castors es cruspeixen cada pàgina just després de llegir-la, així que la bona literatura sempre té demanda."
status = "normal"
enUS = "Usually, beavers gnaw on each page right after reading it, so good literature is always in demand."
zhCN = "通常，海狸在读完每一页后就会啃咬它，因此好的文学总是有需求。"
zhTW = "通常，海狸在讀完每一頁之後就會啃咬它，因此好的文學作品總是備受追捧。"
