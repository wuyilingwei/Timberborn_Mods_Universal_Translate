["NaturalResource.Sunflower.FlavorDescription"]
raw = "Els castors els planten per demostrar que no tenen por del sol abrasador."
status = "normal"
enUS = "The beavers plant them to prove they're not afraid of the scorching sun."
zhCN = "海狸们把它们种下，以证明它们不怕炙热的太阳。"
zhTW = "海狸們把向日葵種下，以證明牠們不怕炙熱的太陽。"
ruRU = "Бобры сажают их, чтобы доказать, что они не боятся палящего солнца."
jaJP = "ビーバーは灼熱の日差しを恐れないことを示すために、それらを植えます。"
frFR = "Les castors les plantent pour démontrer qu'ils n'ont pas peur du soleil brûlant."
deDE = "Die Biber pflanzen sie, um zu zeigen, dass sie vor der sengenden Sonne keine Angst haben."
plPL = "Bobry sadzą je, aby pokazać, że nie boją się palącego słońca."
ptBR = "Os castores plantam girassóis para mostrar que não têm medo do sol abrasador."
koKR = "비버들이 해바라기들을 심어 타오르는 햇빛도 두려워하지 않는다는 것을 보여주려 한다."
