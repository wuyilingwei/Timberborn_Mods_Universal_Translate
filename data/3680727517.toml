["Building.PowerWheel.FlavorDescription"]
raw = "Els castors van adonar-se de seguida que podien copiar tècniques de rosegadors menys avançats."
status = "normal"
enUS = "Beavers immediately realized that they could copy techniques from less advanced rodents."
zhCN = "河狸们很快意识到他们可以复制较不先进的啮齿动物的技巧。"
zhTW = "海狸們立刻意識到他們可以複製較不先進的啮齒動物的技術。"
ruRU = "Бобры сразу поняли, что могут копировать техники менее продвинутых грызунов."
jaJP = "ビーバーたちはすぐに、より原始的な齧歯類の技術を模倣できることに気づいた。"
