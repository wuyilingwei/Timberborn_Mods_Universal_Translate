["MapMetadata.Hollows.Description"]
raw = "Aquests clots abundants són una zona ideal per a futurs colons. El paisatge excavat amaga moltes oportunitats: els castors més vells fins i tot xiuxiuegen sobre tresors enterrats."
status = "normal"
enUS = "These abundant mounds are an ideal area for future colonists. The excavated landscape hides many opportunities: even the oldest beavers whisper about buried treasure."
zhCN = "这些丰饶的洼地是未来定居者的理想区域。被挖掘的地貌隐藏着许多机会：最年长的河狸甚至耳语着埋藏的宝藏。"
zhTW = "這些豐富的空洞是未來殖民者的理想區域。挖掘出的地貌隱藏著無數機會：最老的海狸甚至低聲談及埋藏的寶藏。"
ruRU = "Эти обильные холмы — идеальная зона для будущих колонистов. Выкопанный ландшафт таит множество возможностей: старейшие бобры даже шепчут о зарытых сокровищах."
jaJP = "これらの豊かな丘は、将来の入植者にとって理想的なエリアです。掘り抜かれた景観には多くの機会が潜んでいます。最も年を取ったビーバーさえ、埋蔵された宝物の噂をささやきます。"
frFR = "Ces monticules abondants constituent une zone idéale pour de futurs colons. Le paysage creusé recèle de nombreuses opportunités : les castors les plus âgés murmurent même des trésors enfouis."
deDE = "Diese zahlreichen Hügel sind ein ideales Gebiet für zukünftige Kolonisten. Die ausgegrabene Landschaft verbirgt viele Möglichkeiten: Die ältesten Biber flüstern sogar von vergrabenen Schätzen."
plPL = "Te obfite kopce stanowią idealny obszar dla przyszłych osadników. Wydrążony krajobraz skrywa wiele możliwości: najstarsze bobry nawet szepczą o ukrytych skarbach."
ptBR = "Estas elevações abundantes são uma área ideal para futuros colonos. A paisagem escavada esconde muitas oportunidades: os castores mais velhos até sussurram sobre tesouros enterrados."
koKR = "이 풍성한 둔덕들은 미래의 정착민들에게 이상적인 지역이다. 발굴된 풍경은 많은 기회를 숨기고 있습니다: 가장 나이가 많은 비버들조차 묻힌 보물에 대해 속삭이고 있습니다."
csCZ = "Tyto bohaté pahorky jsou ideálním místem pro budoucí kolonisty. Vykopaná krajina skrývá mnoho příležitostí: nejstarší bobři dokonce šeptají o pohřbených pokladech."
viVN = "Những ụ đất dồi dào này là khu vực lý tưởng cho những người định cư tương lai. Cảnh quan được khai quật ẩn chứa nhiều cơ hội: những con hải ly già nhất thậm chí thì thầm về kho báu được chôn giấu."

