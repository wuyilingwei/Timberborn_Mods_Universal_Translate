["Experimental.WelcomeText"]
raw = "Aquesta versió de Timberborn et dona accés a funcions prototip i inacabades. Per tant, també és molt més probable que inclogui errors greus. Ets un castor valent, sens dubte.\n\nLes partides experimentals s'emmagatzemen separadament del joc principal. Les actualitzacions poden trencar la compatibilitat de les partides.\n\nEn aquest mode experimental, <RedHighlight>moltes parts del joc no estan traduïdes i es mostren en anglès</RedHighlight>, independentment de l'idioma seleccionat. Això ens permet afegir contingut nou i fer canvis ràpids sense esperar traduccions que requereixen temps.\n\nEt recomanem molt que t'uneixis al nostre servidor oficial de Discord i participis en la discussió sobre el nou contingut."
status = "normal"
enUS = "This version of Timberborn gives you access to prototype and unfinished features. Therefore, it is also much more likely to include serious bugs. You're a brave beaver, no doubt.\n\nExperimental saves are stored separately from the main game. Updates may break save compatibility.\n\nIn this experimental mode, <RedHighlight>many parts of the game are not translated and are shown in English</RedHighlight>, regardless of the selected language. This allows us to add new content and make rapid changes without waiting for translations that take time.\n\nWe highly recommend that you join our official Discord server and participate in the discussion about the new content."
zhCN = "Timberborn 的这个版本让你可以访问原型和未完成的功能。因此，它也更有可能包含严重错误。你是一只勇敢的海狸，毫无疑问。\n\n实验性存档与主游戏分开存放。更新可能会破坏存档的兼容性。\n\n在这个实验模式中，<RedHighlight>游戏的许多部分尚未翻译，显示为英文</RedHighlight>，无论所选语言是什么。这让我们能够添加新内容并快速进行更改，而无需等待耗时的翻译。\n\n我们强烈建议你加入我们的官方 Discord 服务器，并参与关于新内容的讨论。"
zhTW = "這個版本的 Timberborn 讓你可以使用原型功能與未完成的功能。因此，它也更有可能包含嚴重錯誤。你絕對是一隻勇敢的海狸，毫無疑問。\n\n實驗性存檔與主遊戲分開儲存。更新可能會破壞存檔的相容性。\n\n在這個實驗模式中，<RedHighlight>遊戲的許多部分尚未翻譯，會顯示為英文</RedHighlight>，無論所選語言為何。這讓我們能新增內容並快速做出變更，而不必等待需要時間的翻譯。\n\n我們強烈建議你加入我們的官方 Discord 伺服器，並參與新內容的討論。"
ruRU = "Эта версия Timberborn даёт вам доступ к прототипным и незавершённым функциям.\nПоэтому гораздо выше вероятность того, что в ней будут серьёзные ошибки.\nТы — отважный бобёр, безусловно.\n\nЭкспериментальные сохранения хранятся отдельно от основной игры.\nОбновления могут нарушить совместимость сохранений.\n\nВ этом экспериментальном режиме <RedHighlight>многие части игры не переведены и отображаются на английском</RedHighlight>, независимо от выбранного языка.\nЭто позволяет нам вносить быстрые изменения, не дожидаясь переводов, которые требуют времени.\n\nМы настоятельно рекомендуем вам присоединиться к нашему официальному серверу Discord и принять участие в обсуждении нового контента."
jaJP = "この Timberborn のバージョンは、プロトタイプ機能と未完成機能へのアクセスを提供します。したがって、重大なエラーを含む可能性も非常に高くなります。あなたは間違いなく勇敢なビーバーです。\n\n実験的なセーブデータは、メインのゲームとは別に保存されます。更新はセーブデータの互換性を損なう可能性があります。\n\nこの実験モードでは、<RedHighlight>ゲームの多くの部分が翻訳されておらず、英語のまま表示されます</RedHighlight>。選択した言語に関係なく、これにより新しいコンテンツを追加し、時間のかかる翻訳を待つことなく迅速に変更を行うことができます。\n\n公式の Discord サーバーにぜひ参加して、新しいコンテンツについての議論に参加することを強くお勧めします。"
frFR = "Cette version de Timberborn vous donne accès à des fonctionnalités prototypes et inachevées. Par conséquent, il est également beaucoup plus probable qu'elle contienne des erreurs graves. Vous êtes un castor courageux, sans aucun doute.\n\nLes parties expérimentales sont stockées séparément du jeu principal. Les mises à jour peuvent rompre la compatibilité des parties.\n\nDans ce mode expérimental, <RedHighlight>de nombreuses parties du jeu ne sont pas traduites et s'affichent en anglais</RedHighlight>, indépendamment de la langue sélectionnée. Cela nous permet d'ajouter du nouveau contenu et d'apporter des modifications rapides sans attendre des traductions qui prennent du temps.\n\nNous vous recommandons vivement de rejoindre notre serveur officiel Discord et de participer à la discussion sur le nouveau contenu."
deDE = "Diese Version von Timberborn gewährt dir Zugriff auf Prototyp- und unfertige Funktionen. Daher ist es auch viel wahrscheinlicher, dass sie schwerwiegende Fehler enthält. Du bist zweifellos ein mutiger Biber.\n\nExperimentelle Spielstände werden getrennt vom Hauptspiel gespeichert. Updates können die Kompatibilität von Spielständen beeinträchtigen.\n\nIn diesem experimentellen Modus sind <RedHighlight>viele Teile des Spiels nicht übersetzt und werden auf Englisch angezeigt</RedHighlight>, unabhängig von der gewählten Sprache. Dies ermöglicht es uns, neuen Inhalt hinzuzufügen und schnelle Änderungen vorzunehmen, ohne auf Übersetzungen zu warten, die Zeit benötigen.\n\nWir empfehlen dir dringend, unserem offiziellen Discord-Server beizutreten und an der Diskussion über den neuen Inhalt teilzunehmen."
plPL = "Ta nazwą: Experimental.WelcomeText - Nowy tekst do przetłumaczenia: \"Ta wersja Timberborn daje dostęp do prototypowych i niedokończonych funkcji. Dlatego też znacznie bardziej prawdopodobne jest, że zawiera poważne błędy. Jesteś odważnym bobrem, bez wątpienia.\n\nGry eksperymentalne są przechowywane oddzielnie od głównej gry. Aktualizacje mogą zniszczyć kompatybilność zapisów.\n\nW tym trybie eksperymentalnym, <RedHighlight>wiele części gry nie jest przetłumaczonych i wyświetlane są w języku angielskim</RedHighlight>, niezależnie od wybranego języka. Pozwala nam to na dodawanie nowej zawartości i wprowadzanie szybkich zmian bez czekania na czasochłonne tłumaczenia.\n\nZdecydowanie zalecamy dołączenie do naszego oficjalnego serwera Discord i uczestnictwo w dyskusji na temat nowej zawartości.\""
ptBR = "Esta versão do Timberborn dá acesso a funcionalidades protótipo e inacabadas. Portanto, também é muito mais provável que contenha erros graves. Você é um castor corajoso, sem dúvida.\n\nAs partidas experimentais são armazenadas separadamente do jogo principal. As atualizações podem quebrar a compatibilidade das partidas.\n\nNeste modo experimental, <RedHighlight>muitas partes do jogo não estão traduzidas e aparecem em inglês</RedHighlight>, independentemente do idioma selecionado. Isso nos permite adicionar conteúdo novo e fazer mudanças rápidas sem esperar traduções que levam tempo.\n\nRecomendamos fortemente que você se junte ao nosso servidor oficial do Discord e participe da discussão sobre o novo conteúdo."
koKR = "이 Timberborn 버전은 프로토타입 기능과 미완성 기능에 접근할 수 있게 해줍니다. 따라서 심각한 오류가 포함될 가능성도 훨씬 높습니다. 당신은 의심할 여지없이 용감한 비버입니다.\n\n실험용 저장 데이터는 기본 게임과 별도로 저장됩니다. 업데이트로 인해 저장 데이터의 호환성이 깨질 수 있습니다.\n\n이 실험 모드에서, <RedHighlight>게임의 많은 부분이 번역되지 않았고 영어로 표시됩니다</RedHighlight>, 선택한 언어와 무관하게.\n\n이것은 새 콘텐츠를 추가하고 시간이 걸리는 번역을 기다리지 않고도 빠르게 변경할 수 있게 해줍니다.\n\n저희 공식 Discord 서버에 가입하고 새 콘텐츠에 대한 토론에 참여하시길 강력히 권장합니다."
csCZ = "Tato verze Timberbornu ti poskytuje přístup k prototypovým a nedokončeným funkcím. Proto je také mnohem pravděpodobnější, že bude obsahovat závažné chyby. Jsi odvážný bobr, nepochybně.\n\nExperimentální uložené hry jsou uloženy odděleně od hlavní hry. Aktualizace mohou narušit kompatibilitu uložených her.\n\nV tomto experimentálním režimu, <RedHighlight>mnohé části hry nejsou přeložené a zobrazují se v angličtině</RedHighlight>, bez ohledu na vybraný jazyk. To nám umožňuje přidávat nový obsah a provádět rychlé změny bez čekání na překlady, které vyžadují čas.\n\nVelmi doporučujeme, abyste se připojili k našemu oficiálnímu serveru Discord a zapojili se do diskuse o novém obsahu."
viVN = "Phiên bản này của Timberborn cho bạn quyền truy cập vào các chức năng nguyên mẫu và chưa hoàn thiện. Vì vậy, cũng có khả năng cao là nó sẽ chứa những lỗi nghiêm trọng. Bạn là một chú hải ly dũng cảm, chắc chắn.\n\nCác bản lưu thử nghiệm được lưu trữ riêng biệt với trò chơi chính. Các cập nhật có thể làm hỏng tính tương thích của các bản lưu.\n\nTrong chế độ thử nghiệm này, <RedHighlight>nhiều phần của trò chơi chưa được dịch và hiển thị bằng tiếng Anh</RedHighlight>, bất kể ngôn ngữ được chọn. Điều này cho phép chúng tôi thêm nội dung mới và thực hiện các thay đổi nhanh chóng mà không cần chờ đợi các bản dịch mất thời gian.\n\nChúng tôi rất khuyến khích bạn tham gia máy chủ Discord chính thức của chúng tôi và tham gia thảo luận về nội dung mới."

