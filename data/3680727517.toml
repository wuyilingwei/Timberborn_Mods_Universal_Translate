["Building.DecontaminationPod.FlavorDescription"]
raw = "\"No, Suli, no pots beure extracte. Vas caure al calder quan eres un cadell!\" —Ma 'Ngonel"
status = "normal"
enUS = "No, Suli, you can't drink extract. You fell into the cauldron when you were a cub! —Ma 'Ngonel"
zhCN = "\"不，苏里，你不能喝提取物。你还是小狗的时候掉进了大锅里！\" —Ma 'Ngonel\""
zhTW = "\"不，Suli，你不能喝萃取物。你還是幼犬的時候就跌進鍋裡了！\" —Ma 'Ngonel\""
ruRU = "\"Нет, Сули, ты не можешь пить экстракт. Ты упал в котёл, когда был щенком!\" —Ma 'Ngonel\""
jaJP = "いいえ、スリ、抽出液を飲んじゃいけない。子犬の頃、鍋に落ちたんだ！—マ・ンゴネル"
frFR = "\"Non, Suli, tu ne peux pas boire d'extrait. Tu es tombé dans le chaudron quand tu étais un chiot!\" —Ma 'Ngonel\""
deDE = "„Nein, Suli, du kannst keinen Extrakt trinken. Du fällst in den Kessel, wenn du ein Welpe bist!“ —Ma 'Ngonel"
plPL = "Nie, Suli, nie możesz pić ekstraktu. Wpadłeś do kotła, gdy byłeś szczeniakiem!\" —Ma 'Ngonel"
ptBR = "\"Não, Suli, não podes beber extrato. Caíste no caldeirão quando eras um filhote!\" —Ma 'Ngonel\""
koKR = "아니, 술리야, 추출액을 마실 수 없어. 네가 강아지였을 때 가마솥에 빠졌잖아! —Ma 'Ngonel"
csCZ = "\"Ne, Suli, nemůžeš pít extrakty. Spadl bys do kotle, až budeš štěně!\" —Ma 'Ngonel\""
viVN = "Không, Suli, bạn không thể uống chiết xuất. Bạn đã rơi vào nồi đồng khi còn là một chú cún!"

