["Tutorial.DisablePrompt"]
status = "normal"
raw = "Estàs segur que vols desactivar el tutorial?\nPots tornar a activar-lo més tard a la configuració."
enUS = "Are you sure you want to disable the tutorial? You can reactivate it later in the settings."
zhCN = "您确定要禁用教程吗？您可以稍后在设置中重新启用它。"
zhTW = "您確定要禁用教程嗎？\n您可以稍後在設置中重新啟用它。"
ruRU = "Вы уверены, что хотите отключить учебник? Вы можете включить его снова позже в настройках."
jaJP = "チュートリアルを無効にしてもよろしいですか？ 後で設定で再度有効にできます。"
frFR = "Êtes-vous sûr de vouloir désactiver le tutoriel ?  \nVous pouvez le réactiver plus tard dans les paramètres."
deDE = "Bist du sicher, dass du das Tutorial deaktivieren möchtest? Du kannst es später in den Einstellungen wieder aktivieren."
plPL = "Jesteś pewny, że chcesz wyłączyć samouczek? Możesz go ponownie włączyć później w ustawieniach."
ptBR = "Você tem certeza de que deseja desativar o tutorial? Você pode ativá-lo novamente mais tarde nas configurações."
koKR = "튜토리얼을 비활성화하시겠습니까?\n나중에 설정에서 다시 활성화할 수 있습니다."
