["MapMetadata.Craters.Description"]
raw = "Ningú sap com es van formar els cràters. Les excavacions preliminars suggereixen una implicació violenta dels humans."
status = "normal"
enUS = "No one knows how the craters were formed. Preliminary excavations suggest human involvement in violence."
zhCN = "没有人知道这些陨石坑是如何形成的。初步勘探表明人类参与了暴力行为。"
zhTW = "沒有人知道隕坑是如何形成的。初步的挖掘顯示人類涉入暴力行為。"
ruRU = "Никто не знает, как образовались кратеры. Предварительные раскопки предполагают насильственное участие людей."
jaJP = "誰もクレーターがどのように形成されたかを知らない。初期の発掘調査は、人間による暴力的な関与を示唆している。"
frFR = "Personne ne sait comment les cratères se sont formés. Les fouilles préliminaires suggèrent une implication violente des humains."
deDE = "Niemand weiß, wie die Krater entstanden sind. Vorläufige Ausgrabungen deuten auf eine gewaltsame Beteiligung der Menschen hin."
plPL = "Nikt nie wie, jak powstały kratery. Wstępne badania wykopalisk sugerują udział ludzi w przemocy."
ptBR = "Ninguém sabe como as crateras foram formadas. Escavações preliminares sugerem um envolvimento violento dos humanos."
koKR = "분화구가 어떻게 형성되었는지 아무도 모른다. 예비 발굴은 인간의 폭력적 개입을 시사한다."
csCZ = "Nikdo neví, jak vznikly krátery. Předběžné vykopávky naznačují zapojení lidí do násilí."
viVN = "Không ai biết các hố hình thành như thế nào. Các cuộc khai quật sơ bộ cho thấy sự tham gia bạo lực của con người."

