zhTW = "\"木製齒輪很堅固！\" 是 Ol' Kazko 在推動快速工業化時的一句話。"
ruRU = "\"Деревянная шестерня прочна!\" была фразой Ол' Казко, пока он продвигал быструю индустриализацию."
jaJP = "「木製の歯車は頑丈だ！」というのは、急速な産業化を推進していたオル・カズコの言葉だった。"
frFR = "\"L'engrenage en bois est robuste !\" était une phrase d'Ol' Kazko tout en poussant l'industrialisation rapide."
deDE = "\"Das hölzerne Zahnrad ist robust!\" war ein Zitat von Ol' Kazko, während er die schnelle Industrialisierung vorantrieb."
plPL = "„Drewniana zębatka jest solidna!” to była fraza Ol' Kazko, gdy napędzał szybką industrializację."
ptBR = "\"A engrenagem de madeira é robusta!\" era uma frase de Ol' Kazko enquanto impulsionava a industrialização rápida."
koKR = "\"목재 기어는 견고합니다!\" 올 카즈코의 한 말이었고 그는 급속한 산업화를 추진하는 중이었다."
csCZ = "\"Dřevěné ozubené kolo je robustní!\" byla to věta Ol' Kazka, když prosazoval rychlou industrializaci."
viVN = "\"Bánh răng gỗ rất bền!\" là một câu nói của Ol' Kazko khi thúc đẩy quá trình công nghiệp hóa nhanh chóng."

