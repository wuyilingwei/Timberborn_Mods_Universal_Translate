["Building.ScavengerFlag.FlavorDescription"]
raw = "Portant metall a assentaments tradicionalment de fusta, els carronyaires es guanyen el respecte d'uns i el menyspreu d'uns altres."
status = "normal"
enUS = "Bringing metal to settlements traditionally made of wood, scavengers earn the respect of some and the scorn of others."
zhCN = "将金属带到传统上以木材为主的定居点，拾荒者赢得了一些人的尊敬，同时也被另一些人蔑视。"
zhTW = "帶著金屬前往傳統上以木材建成的聚落，拾荒者贏得一些人的尊敬，同時被另一些人蔑視。"
ruRU = "Принося металл в поселения, которые традиционно построены из дерева, мародёры зарабатывают уважение одних и презрение других."
jaJP = "木造の居住地へ金属を運ぶことで、スカベンジャーは一部の人々から尊敬を、他の人々から軽蔑を得る。"
frFR = "En apportant du métal à des campements traditionnellement en bois, les charognards gagnent le respect de certains et le mépris d'autres."
deDE = "Indem sie Metall in Siedlungen tragen, die traditionell aus Holz bestehen, gewinnen die Aasfresser den Respekt einiger und die Verachtung anderer."
plPL = "Przynosząc metal do osad tradycyjnie drewnianych, szukacze złomu zyskują szacunek jednych i pogardę drugich."
ptBR = "Ao levar metal para assentamentos tradicionalmente de madeira, os catadores ganham o respeito de alguns e o desprezo de outros."
koKR = "목재로 지은 전통적인 정착지에 금속을 가져다주면서, 수거자들은 일부 사람들의 존경을 얻고 다른 사람들의 멸시를 받는다."
csCZ = "Přinášením kovu do osad, které bývají tradičně dřevěné, si sběrači získávají úctu některých a pohrdání ostatních."
viVN = "Mang kim loại đến các khu định cư vốn được làm bằng gỗ, những kẻ nhặt nhạnh giành được sự tôn trọng của một số người và sự khinh miệt của những người khác."

