["Building.NaturalDam.FlavorDescription"]
raw = "Costa de creure que hi hagués temps més simples en què fang i branques ja feien de resclosa."
status = "normal"
enUS = "It's hard to believe there were simpler times when mud and branches were already acting as a dam."
zhCN = "很难相信曾经有更简单的时光，那时泥巴和树枝就已经充当拦水的堰坝。"
zhTW = "很難相信曾經有更單純的時光，泥巴和樹枝早已成為水壩。"
ruRU = "Трудно поверить, что существовали более простые времена, когда глина и ветви уже служили плотиной."
