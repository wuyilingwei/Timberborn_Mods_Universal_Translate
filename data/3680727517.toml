plPL = "\"Cóż, robot mógłby być systematyczny, hydromechaniczny... Dlaczego nie nasmarowany?\" —Ol' Kazko"
ptBR = "\"Bem, um robô poderia ser sistemático, hidromecânico... Por que não engraxado?\" —Ol' Kazko"
koKR = "\"음, 봇은 체계적이고 유압식일 수 있는데... 왜 윤활되지 않은 거지?\" —올 카즈코"
