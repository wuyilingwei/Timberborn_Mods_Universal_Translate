viVN = "Phúc lợi"

["Tutorial.Wellbeing.Beaver"]
status = "normal"
raw = "Pots veure l'impacte que tenen les teves accions sobre els teus castors.\n\nSelecciona un castor fent-hi clic. Al panell podràs veure el seu benestar actual, els seus atributs i les seves necessitats.\n\nAlgunes necessitats poden arribar a valors negatius i provocar penalitzacions greus o fins i tot la mort."
enUS = "You can see the impact of your actions on your beavers.\n\nSelect a beaver by clicking on it. In the panel, you will be able to see its current wellbeing, attributes, and needs.\n\nSome needs can reach negative values, causing severe penalties or even death."
zhCN = "你可以看到你的行为对你的海狸产生的影响。\n\n点击选择一只海狸。在面板上你可以看到它当前的幸福度、属性和需求。\n\n一些需求可能会降到负值，从而导致严重的惩罚甚至死亡。"
zhTW = "你可以看到你的行動對你的海狸所產生的影響。\n\n點擊一隻海狸以選擇它。在面板中，你可以查看它的當前幸福度、屬性和需求。\n\n某些需求可能會達到負值，並造成嚴重的懲罰甚至死亡。"
ruRU = "Ты можешь увидеть влияние своих действий на своих бобров.\n\nВыбери одного бобра, кликнув по нему. В панели ты сможешь увидеть его текущее благополучие, его атрибуты и потребности.\n\nНекоторые потребности могут достигать отрицательных значений и вызывать серьезные штрафы или даже смерть."
jaJP = "あなたの行動がビーバーに与える影響を見ることができます。\n\nクリックしてビーバーを選択してください。パネルで現在の幸福度、属性、ニーズを確認できます。\n\nいくつかのニーズは負の値に達し、深刻なペナルティや死を引き起こす可能性があります。"
frFR = "Tu peux voir l'impact de tes actions sur tes castors.\n\nSélectionne un castor en cliquant dessus. Dans le panneau, tu pourras voir son bien-être actuel, ses attributs et ses besoins.\n\nCertaines besoins peuvent atteindre des valeurs négatives et provoquer de graves pénalités ou même la mort."
deDE = "Du kannst die Auswirkungen deiner Handlungen auf deine Biber sehen.\n\nWähle einen Biber durch Klicken aus. Im Panel kannst du sein aktuelles Wohlbefinden, seine Attribute und seine Bedürfnisse sehen.\n\nEinige Bedürfnisse können negative Werte erreichen und schwere Strafen oder sogar den Tod verursachen."
plPL = "Możesz zobaczyć wpływ swoich działań na swoje bobry.\n\nWybierz bobra, klikając na niego. Na panelu będziesz mógł zobaczyć jego aktualny stan dobrostanu, jego cechy i potrzeby.\n\nNiektóre potrzeby mogą spadać do wartości ujemnych i powodować poważne kary lub nawet śmierć."
ptBR = "Você pode ver o impacto que suas ações têm sobre seus castores.\n\nSelecione um castor clicando nele. No painel, você poderá ver seu bem-estar atual, seus atributos e suas necessidades.\n\nAlgumas necessidades podem atingir valores negativos e causar penalizações graves ou até mesmo a morte."
koKR = "당신의 행동이 비버에게 미치는 영향을 확인할 수 있습니다.\n\n비버를 클릭하여 선택하세요. 패널에서 현재 복지, 속성 및 필요를 볼 수 있습니다.\n\n일부 필요는 음수로 떨어질 수 있으며, 심각한 처벌이나 심지어 죽음까지 초래할 수 있습니다."
csCZ = "Můžeš vidět dopad svých akcí na své bobry.\n\nVyber bobra kliknutím na něj. V panelu uvidíš jeho aktuální pohodu, jeho atributy a potřeby.\n\nNěkteré potřeby mohou klesnout na záporné hodnoty a způsobit vážné sankce nebo dokonce smrt."
viVN = "Bạn có thể thấy tác động của hành động của bạn đối với những con castor của bạn.\n\nChọn một con castor bằng cách nhấp vào nó. Trong bảng điều khiển, bạn sẽ thấy tình trạng hiện tại, các thuộc tính và nhu cầu của nó.\n\nMột số nhu cầu có thể đạt giá trị âm và gây ra hình phạt nghiêm trọng hoặc thậm chí là cái chết."

["Tutorial.Wellbeing.Campfire"]
status = "normal"
raw = "El benestar és una mètrica que mostra com de satisfet està un castor. Afecta tres atributs: velocitat de treball, velocitat de moviment i esperança de vida.\n\nUna de les principals maneres d'augmentar el benestar és mitjançant atraccions. Les atraccions són edificis on els castors entren quan no estan treballant."
enUS = "Wellbeing is a metric that shows how satisfied a beaver is. It affects three attributes: work speed, movement speed, and lifespan.\n\nOne of the main ways to increase wellbeing is through attractions. Attractions are buildings where beavers go when they are not working."
zhCN = "幸福是一个指标，显示了一只海狸有多满意。它影响三个属性：工作速度、移动速度和寿命。\n\n提高幸福感的主要方法之一是通过吸引设施。吸引设施是海狸在不工作时进入的建筑。"
zhTW = "福祉是一項指標，用來顯示一隻海狸的滿意度。它影響三個屬性：工作速度、移動速度和壽命。\n\n提高福祉的主要方法之一是通過娛樂設施。娛樂設施是海狸在閒暇時進入的建築。"
ruRU = "Благополучие — это метрика, которая показывает, насколько доволен бобр. Оно влияет на три атрибута: скорость работы, скорость передвижения и продолжительность жизни.\n\nОдним из основных способов повышения благополучия является наличие достопримечательностей. Достопримечательности — это здания, в которые бобры заходят, когда не работают."
jaJP = "幸福度はビーバーがどれだけ満足しているかを示す指標です。これは三つの属性に影響します：作業速度、移動速度、寿命です。\n\n幸福度を増加させる主な方法の一つはアトラクションを通じてです。アトラクションは、ビーバーが働いていないときに入る建物です。"
frFR = "Le bien-être est une métrique qui montre à quel point un castor est satisfait. Il affecte trois attributs : la vitesse de travail, la vitesse de mouvement et l'espérance de vie.\n\nL'un des principaux moyens d'augmenter le bien-être est par le biais des attractions. Les attractions sont des bâtiments où les castors entrent lorsqu'ils ne travaillent pas."
deDE = "Das Wohlbefinden ist eine Kennzahl, die zeigt, wie zufrieden ein Biber ist. Es beeinflusst drei Attribute: Arbeitsgeschwindigkeit, Bewegungsgeschwindigkeit und Lebensdauer.\n\nEine der Hauptmethoden, um das Wohlbefinden zu steigern, sind Attraktionen. Attraktionen sind Gebäude, in die die Biber eintreten, wenn sie nicht arbeiten."
plPL = "Dobre samopoczucie to wskaźnik pokazujący, jak bardzo beaver jest zadowolony. Wpływa na trzy atrybuty: szybkość pracy, szybkość ruchu i długość życia.\n\nJednym z głównych sposobów na poprawę samopoczucia są atrakcje. Atrakcje to budynki, do których bobry wchodzą, gdy nie pracują."
ptBR = "O bem-estar é uma métrica que mostra quão satisfeito está um castor. Afeta três atributos: velocidade de trabalho, velocidade de movimento e expectativa de vida.\n\nUma das principais maneiras de aumentar o bem-estar é por meio de atrações. As atrações são edifícios onde os castores entram quando não estão trabalhando."
koKR = "웰빙은 비버의 만족도를 나타내는 지표입니다. 이는 작업 속도, 이동 속도 및 기대 수명이라는 세 가지 속성에 영향을 미칩니다.\n\n웰빙을 증가시키는 주요 방법 중 하나는 유흥 시설을 이용하는 것입니다. 유흥 시설은 비버들이 작업하지 않을 때 들어가는 건물입니다."
csCZ = "Blaho je metrika, která ukazuje, jak spokojený je bobr. Ovlivňuje tři atributy: rychlost práce, rychlost pohybu a délku života.\n\nJedním z hlavních způsobů, jak zvýšit blaho, jsou atrakce. Atrakce jsou budovy, kde bobři odpočívají, když nepracují."
viVN = "Phúc lợi là một chỉ số cho thấy một con rái cá hài lòng đến mức nào. Nó ảnh hưởng đến ba thuộc tính: tốc độ làm việc, tốc độ di chuyển và tuổi thọ.\n\nMột trong những cách chính để tăng cường phúc lợi là thông qua các điểm thu hút. Các điểm thu hút là những tòa nhà nơi các con rái cá vào khi không làm việc."

