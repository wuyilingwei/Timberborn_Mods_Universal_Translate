["Building.AdvancedBreedingPod.FlavorDescription"]
raw = "La idea va sorgir quan un cadell va caure dins d'un calder ple d'extracte i va fer una estirada gegant després de beure-se'l tot."
status = "normal"
enUS = "The idea came about when a cub fell into a cauldron full of extract and did a huge stretch after drinking it all."
zhCN = "这个点子来自于一只小狗掉进装满提取物的锅里，并在喝光提取物后做了一个巨大的伸展。"
zhTW = "這個點子源於一隻幼犬掉進裝滿提取物的大鍋裡，喝光所有提取物後，牠做出了一個巨大的伸展。"
ruRU = "Идея возникла, когда щенок попал в котёл, наполненный экстрактом, и сделал гигантскую растяжку после того, как выпил всё до дна."
jaJP = "アイデアは、子犬が抽出液でいっぱいの大鍋の中に落ちたときに生まれ、それをすべて飲み干した後、巨大な伸びをした。"
frFR = "L'idée est née lorsque un chiot est tombé dans un chaudron plein d'extrait et a fait un grand étirement après l'avoir tout bu."
deDE = "Die Idee entstand, als ein Welpe in einen Kessel voller Extrakt fiel und sich danach gigantisch ausstreckte, nachdem er ihn ganz ausgetrunken hatte."
plPL = "Idea powstała, gdy szczeniak wpadł do kotła pełnego ekstraktu i zrobił gigantyczne rozciąganie po wypiciu go wszystkiego."
ptBR = "A ideia surgiu quando um filhote caiu dentro de um caldeirão cheio de extrato e fez uma esticada gigante depois de ter bebido tudo."
koKR = "아이디어는 한 마리 강아지가 추출물로 가득 찬 큰 솥에 빠진 뒤 그것을 다 마시고 거대한 기지개를 켠 순간 떠올랐다."
csCZ = "Nápad vznikl, když štěně spadlo do kotle plného extraktu a po vypití všeho se pořádně protáhlo."
viVN = "Ý tưởng nảy sinh khi một chú cún con rơi vào một cái nồi đồng đầy chiết xuất và sau khi uống hết toàn bộ chất đó, nó đã giãn dài một cách khổng lồ."

["Building.Agora.Description"]
raw = "Un gran punt de trobada on els castors poden debatre temes relacionats amb la fusta."
status = "normal"
enUS = "A great meeting point where beavers can discuss topics related to wood."
zhCN = "一个让海狸们讨论与木材相关议题的绝佳聚集点。"
zhTW = "一個讓海狸討論木材相關議題的絕佳聚會點。"
ruRU = "Отличное место встречи, где бобры могут обсуждать темы, связанные с древесиной."
jaJP = "木材に関する話題を議論できる、ビーバーにとっての素晴らしい集いの場。"
frFR = "Un grand lieu de rencontre où les castors peuvent débattre de sujets liés au bois."
deDE = "Ein großer Treffpunkt, an dem Biber über Holz diskutieren können."
plPL = "Wielkie miejsce spotkań, w którym bobry mogą omawiać tematy związane z drewnem."
ptBR = "Um grande ponto de encontro onde os castores podem debater temas relacionados à madeira."
koKR = "목재 관련 주제를 토론할 수 있는 멋진 만남의 장소."
csCZ = "Skvělé místo setkání, kde bobři mohou diskutovat o tématech souvisejících s dřevem."
viVN = "Một điểm gặp gỡ lớn nơi các chú hải ly có thể bàn luận về các chủ đề liên quan đến gỗ."

