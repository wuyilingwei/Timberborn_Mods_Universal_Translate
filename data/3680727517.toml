["Tutorial.Science.Inventor"]
new = "Els castors són els enginyers del món animal. És hora de convertir les seves idees de lumberpunk en realitat.\n\nConstrueix un Inventor per produir Punts de ciència."
status = "normal"

["Tutorial.Science.SciencePoints"]
new = "De moment, deixa que l'Inventor treballi.\n\nQuan acumulis prou Punts de Ciència, els gastarem per desbloquejar edificis més avançats."
