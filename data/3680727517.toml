["MapMetadata.Beaverome.Description"]
raw = "Per construir la metròpoli llegendària, els avantpassats dels castors van drenar set cràters immensos. Fins i tot amb la tecnofusta actual, no és poca cosa."
status = "normal"
enUS = "To build the legendary metropolis, the beaver ancestors drained seven enormous craters. Even with current technowood, it's no small feat."
zhCN = "为了建造传说中的大都会，海狸的祖先们排干了七个巨大的坑洞。即使拥有现有的科技木，也不是小事。"
zhTW = "為了建造傳說中的大都會，河狸的祖先排空了七個巨大的隕坑。即使有現今的科技木材，也絕非小事。"
ruRU = "Чтобы построить легендарный мегаполис, предки бобров осушили семь гигантских кратеров. Даже с нынешней технодревесиной это не пустяк."
jaJP = "伝説の大都市を築くために、ビーバーの祖先たちは七つの巨大なクレーターの水を抜いた。現代のテクノウッドを使っても、それはかなりのものだ。"
frFR = "Pour construire la métropole légendaire, les ancêtres des castors ont drainé sept cratères immenses. Même avec le technobois actuel, ce n'est pas peu."
deDE = "Um die legendäre Metropole zu errichten, zogen die Vorfahren der Biber sieben gewaltige Krater leer. Selbst mit dem heutigen Technoholz ist das keine Kleinigkeit."
plPL = "Aby zbudować legendarną metropolię, przodkowie bobrów opróżnili siedem ogromnych kraterów. Nawet przy obecnym technodrewnie to nie byle co."
ptBR = "Para construir a metrópole lendária, os antepassados dos castores drenaram sete crateras imensas. Mesmo com a tecnofusta atual, não é pouca coisa."
koKR = "전설적인 메트로폴리스를 건설하기 위해, 비버의 선조들은 일곱 개의 거대한 분화구에서 물을 빼냈다. 오늘날의 테크우드로도 그것은 결코 쉽지 않다."
csCZ = "Aby byla vybudována legendární metropole, předkové bobrů odvodnili sedm obrovských kráterů. To ani s dnešním technickým dřevem není málo."
viVN = "Để xây dựng đô thị huyền thoại, tổ tiên của loài hải ly đã rút cạn bảy miệng núi lửa khổng lồ. Ngay cả với gỗ công nghệ hiện đại ngày nay, điều đó cũng không phải là nhỏ."

