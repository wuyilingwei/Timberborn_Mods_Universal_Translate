["Faction.Folktails.Description"]
raw = "Relaxats però treballadors, els Cuesfusta són pagesos experts. Respecten la natura i ella els recompensa amb abundància.\nEl seu lema: <i>Confort, menjar i fusta resistent.</i>"
status = "normal"
enUS = "Relaxed but hardworking, the Cuesfusta are expert farmers. They respect nature and it rewards them with abundance.\nTheir motto: <i>Comfort, food, and sturdy wood.</i>"
zhCN = "从容而勤劳的 Cuesfusta 是经验丰富的农民。他们尊重自然，自然也会以丰盛回报他们。\n他们的口号：<i>舒适、食物和耐用的木材。</i>"
zhTW = "放鬆但勤奮的 Cuesfusta 是專家的農夫。它們尊重自然，自然便以豐饒回報它們。\n它們的座右銘：<i>舒適、食物與耐用木材。</i>"
ruRU = "Спокойные, но трудолюбивые, Cuesfusta — опытные фермеры. Они уважают природу, и она вознаграждает их обилием.\nИх девиз: <i>Комфорт, еда и прочная древесина.</i>"
jaJP = "落ち着いたが働き者のCuesfustaは熟練の農民だ。\n自然を尊重し、自然は彼らに豊かさをもたらしてくれる。\n彼らのモットーは：<i>快適さ、食料、頑丈な木材。</i>"
frFR = "Détendus mais travailleurs, les Cuesfusta sont des paysans experts. Ils respectent la nature et elle les récompense en abondance.\nSa devise : <i>Confort, nourriture et bois résistant.</i>"
deDE = "Entspannt, aber fleißig, sind die Cuesfusta erfahrene Bauern.\nSie respektieren die Natur, und die Natur belohnt sie mit Überfluss.\nIhr Motto: <i>Komfort, Nahrung und widerstandsfähiges Holz.</i>"
plPL = "Zrelaksowani, lecz pracowici, Cuesfusta to doświadczeni rolnicy.\nSzanują naturę i ona ich nagradza obfitością.\nIch motto: <i>Komfort, jedzenie i wytrzymałe drewno.</i>"
ptBR = "Relaxados, porém trabalhadores, os Cuesfusta são fazendeiros experientes. Respeitam a natureza e ela os recompensa com abundância.\nSeu lema: <i>Conforto, comida e madeira resistente.</i>"
koKR = "느긋하지만 근면한 Cuesfusta는 전문가 농부들이다. 그들은 자연을 존중하고 자연은 그들에게 풍요를 보답한다. 그들의 모토는: <i>편안함, 식량 그리고 내구성 있는 목재.</i>"
csCZ = "Pohodoví, ale pracovití, Cuesfusta jsou zkušení rolníci. Respektují přírodu a ona je odměňuje hojností.\nJejich heslo: <i>Pohodlí, jídlo a odolné dřevo.</i>"
viVN = "Thoải mái nhưng chăm chỉ, các Cuesfusta là nông dân chuyên nghiệp. Họ tôn trọng thiên nhiên và thiên nhiên đáp lại bằng sự phong phú.\nPhương châm của họ: <i>Sự thoải mái, thức ăn và gỗ bền.</i>"

