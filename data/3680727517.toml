["BuilderPriorityTool.Description"]
raw = "Fes servir aquesta eina per establir la prioritat de construcció, demolició i recollida de béns de les runes."
status = "normal"
enUS = "Use this tool to set the priority for construction, demolition, and collection of goods from the ruins."
zhCN = "使用此工具设定建筑、拆除和从废墟中收集物资的优先级。"
zhTW = "使用此工具設定建造、拆除及從遺跡收集物資的優先順序。"
ruRU = "Используйте этот инструмент, чтобы установить приоритет строительства, демонтажа и сбора предметов с развалин."
jaJP = "このツールを使って、建設・解体、および遺跡からの物資回収の優先度を設定します。"
frFR = "Utilisez cet outil pour définir la priorité de construction, de démolition et de collecte des biens des runes."
deDE = "Verwende dieses Werkzeug, um die Priorität von Bau, Abriss und dem Sammeln von Gütern aus den Ruinen festzulegen."
plPL = "Użyj tego narzędzia, aby ustawić priorytet budowy, wyburzania i zbierania dóbr ze zgliszcz."
ptBR = "Use esta ferramenta para definir a prioridade de construção, demolição e coleta de bens das ruínas."
koKR = "이 도구를 사용하여 건설, 해체 및 폐허에서의 물건 수집 우선순위를 설정하세요."
csCZ = "Použijte tento nástroj k nastavení priority výstavby, demolice a sběru zboží ze zřícenin."
viVN = "Sử dụng công cụ này để thiết lập mức ưu tiên cho việc xây dựng, phá dỡ và thu thập hàng hóa từ tàn tích."

["BuilderPriorityTool.Tip"]
raw = "Fes clic en un element per establir-ne la prioritat o mantén premut el botó per seleccionar una àrea més gran."
status = "normal"
enUS = "Click on an element to set its priority, or hold the button to select a larger area."
zhCN = "点击一个元素以设定它的优先级，或按住按钮以选择一个更大的区域。"
zhTW = "點擊一個元素以設定其優先順序，或長按按鈕以選擇更大的區域。"
ruRU = "Кликните по элементу, чтобы установить его приоритет, или удерживайте кнопку, чтобы выбрать большую область."
jaJP = "要素をクリックして優先度を設定するか、ボタンを長押ししてより大きなエリアを選択します。"
frFR = "Cliquez sur un élément pour définir sa priorité ou maintenez le bouton enfoncé pour sélectionner une zone plus grande."
deDE = "Klicke auf ein Element, um ihm eine Priorität zuzuweisen, oder halte die Schaltfläche gedrückt, um einen größeren Bereich auszuwählen."
plPL = "Kliknij element, aby ustawić jego priorytet, lub przytrzymaj przycisk, aby wybrać większy obszar."
ptBR = "Clique em um elemento para definir a prioridade ou mantenha o botão pressionado para selecionar uma área maior."
koKR = "요소를 클릭하여 우선순위를 설정하거나 더 큰 영역을 선택하려면 버튼을 길게 누르세요."
csCZ = "Klikněte na prvek a nastavte jeho prioritu, nebo podržte tlačítko a vyberte větší oblast."
viVN = "Nhấp vào một phần tử để thiết lập mức ưu tiên của nó, hoặc giữ nút chuột để chọn một khu vực lớn hơn."

["Building.AdvancedBreedingPod.Description"]
raw = "Utilitza un procés de cria avançat per produir castors adults, amb ganes de posar-se a treballar."
status = "normal"
enUS = "Uses an advanced breeding process to produce adult beavers, eager to get to work."
zhCN = "使用一个先进的繁育过程来培育成年的海狸，并渴望投身工作。"
zhTW = "使用先進的繁殖過程培育成年的海狸，熱切投入工作。"
ruRU = "Используйте передовой процесс разведения, чтобы получить взрослых бобров, готовых приступить к работе."
jaJP = "高度な繁殖プロセスを用いて、働く意欲に満ちた成体ビーバーを生み出します。"
frFR = "Utilise un procédé d'élevage avancé pour produire des castors adultes, avec envie de se mettre au travail."
deDE = "Nutze einen fortschrittlichen Zuchtprozess, um ausgewachsene Biber zu produzieren, die darauf brennen, loszulegen."
plPL = "Wykorzystuje zaawansowany proces hodowli do wyprodukowania dorosłych bobrów, z zapałem do pracy."
ptBR = "Utilize um processo de reprodução avançado para produzir castores adultos, com vontade de colocar a mão na massa."
koKR = "일할 의욕이 강한 성체 비버를 생산하기 위해 고급 번식 과정을 활용합니다."
csCZ = "Použij pokročilý proces chovu k produkci dospělých bobrů, kteří touží pustit se do práce."
viVN = "Sử dụng một quy trình nuôi giống tiên tiến để sản xuất hải ly trưởng thành, háo hức bắt tay vào làm việc."

