["Building.SteamEngine.FlavorDescription"]
raw = "Per molt gran que sigui aquest invent, es va convertir en una espina al costat de nacions castores que no són Dents de Ferro."
status = "normal"
enUS = "As great as this invention was, it became a thorn alongside beaver nations that were not the Iron Teeth."
zhCN = "无论这项发明有多伟大，它都成了那些并非铁牙的海狸国身边的一根刺。"
zhTW = "不管這項發明有多偉大，它都成為那些不是鐵牙的海狸國家的眼中釘。"
ruRU = "Как бы велико ни было это изобретение, оно стало занозой в боку у наций бобров, которые не являются Железными Зубами."
jaJP = "どんなにこの発明がすごくても、それは鉄の歯ではないビーバー諸国のそばに刺のような存在となってしまった。"
frFR = "Aussi grande que soit cette invention, elle s'est transformée en une épine aux côtés des nations castors qui ne sont pas les Dents de Fer."
deDE = "So groß diese Erfindung auch sein mag, sie wurde zu einem Dorn im Auge der Biberstämme, die nicht Eisenzähne sind."
plPL = "Nawet jeśli ten wynalazek jest tak wielki, stał się kością niezgody pośród narodów bobrów, które nie należą do Żelaznych Zębów."
ptBR = "Por maior que seja essa invenção, ela se tornou uma pedra no caminho das nações de castores que não são Dentes de Ferro."
koKR = "이 발명이 아무리 대단하더라도, 철 이빨이 아닌 비버 국가들 사이에서 가시가 되어 버렸다."
csCZ = "Ať už je ten vynález jakkoli velký, stal se trnem v oku vedle bobřích národů, které nejsou Železnými zuby."
viVN = "Dù cho phát minh này lớn đến mức nào, nó đã trở thành một cái gai bên cạnh các quốc gia hải ly không phải là Răng Sắt."

