plPL = "Nawet po tym, jak praca ręczna ustąpiła miejsca industrializacji, etyka pracy Żelaznych Zębów nie zmieniła się."
ptBR = "Mesmo depois que o trabalho manual cedeu lugar à industrialização, a ética de trabalho dos Dentes de Ferro não mudou."
koKR = "비록 수작업이 산업화로 자리를 내주었더라도, 철의 이빨 노동 윤리는 변하지 않았다."
csCZ = "I když ruční práce ustoupila industrializaci, pracovní etika Železných zubů se nezměnila."
viVN = "Ngay cả sau khi công việc thủ công nhường chỗ cho sự công nghiệp hóa, đạo đức lao động của Răng Sắt vẫn không thay đổi."

