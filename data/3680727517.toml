["Building.GreaseFactory.FlavorDescription"]
raw = "\"Bé, un bot podria ser sistemàtic, hidromàtic... Per què no engreixat?\" —Ol' Kazko"
status = "normal"
enUS = "\"Well, a bot could be systematic, hydraulic... Why not greased?\" —Ol' Kazko"
zhCN = "\"好吧，一个机器人可能是系统化的、水力的... 为什么不润滑？\" —Ol' Kazko"
