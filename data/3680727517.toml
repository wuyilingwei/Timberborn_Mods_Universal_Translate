["NaturalResource.Corn.FlavorDescription"]
raw = "\"Res de bo surt de deixar els petits jugar al blat de moro.\" —Ma' Ngonel"
status = "normal"
enUS = "Nothing good comes from letting the little ones play with corn. —Ma' Ngonel"
zhCN = "让小孩子玩玉米没有好处。 —Ma' Ngonel"
zhTW = "\"讓小孩玩玉米沒有什麼好處。\" —Ma' Ngonel"
ruRU = "Нет ничего хорошего в том, чтобы позволять малышам играть с кукурузой."
jaJP = "\"小さな子どもたちにとうもろこしで遊ばせると、いいことは何も起こらない。\" —Ma' Ngonel"
frFR = "\"Rien de bon ne vient de laisser les petits jouer avec le maïs.\" —Ma' Ngonel"
