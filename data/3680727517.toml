jaJP = "通常、ビーバーは読んだ直後にページを齧ってしまうので、良い文学には常に需要がある。"
frFR = "Normalement, les castors dévorent chaque page juste après l'avoir lue, donc la bonne littérature est toujours recherchée."
deDE = "Normalerweise verschlingen Biber jede Seite direkt nach dem Lesen, daher ist gute Literatur immer gefragt."
plPL = "Zwykle bobry żują każdą stronę zaraz po przeczytaniu jej, więc dobra literatura zawsze ma popyt."
ptBR = "Normalmente, os castores devoram cada página logo após lê-la, então a boa literatura sempre tem demanda."
koKR = "일반적으로 비버들은 읽은 바로 직후에 각 페이지를 씹어 먹으므로, 좋은 문학은 항상 수요가 많다."
