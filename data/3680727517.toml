["Building.Dynamite.FlavorDescription"]
raw = "Van caldre mesures extremes per adaptar-se al món postapocalíptic."
status = "normal"
enUS = "Extreme measures were needed to adapt to the post-apocalyptic world."
zhCN = "曾经需要采取极端措施以适应后末日世界。"
zhTW = "為了適應末日後的世界，必須採取極端的措施。"
ruRU = "Потребовались крайние меры, чтобы адаптироваться к постапокалиптическому миру."
jaJP = "ポストアポカリプスの世界に適応するには極端な措置が必要だった。"
frFR = "Il a fallu prendre des mesures extrêmes pour s'adapter au monde post-apocalyptique."
deDE = "Es waren extreme Maßnahmen nötig, um sich an die postapokalyptische Welt anzupassen."
plPL = "Konieczne były skrajne środki, aby przystosować się do postapokaliptycznego świata."
ptBR = "Foram necessárias medidas extremas para se adaptar ao mundo pós-apocalíptico."
koKR = "포스트아포칼립스 세계에 적응하려면 극단적인 조치를 취해야 한다."
csCZ = "Bylo nutné extrémní opatření, aby se postapokalyptickému světu přizpůsobili."
viVN = "Đã phải áp dụng những biện pháp cực đoan để thích nghi với thế giới hậu tận thế."

["Building.EarthRecultivator.Folktails.Description"]
raw = "Distribueix llavors d'arbre per tota la Terra. Quan es llança, fa més feliços els castors de la zona."
status = "normal"
enUS = "Distributes tree seeds across the entire Earth. When launched, it makes the local beavers happier."
zhCN = "将树种散播至全球各地。投放时，会让当地的河狸更快乐。"
zhTW = "在整個地球散播樹籽。投放後，該區域的海狸就會更快樂。"
ruRU = "Распространяет семена деревьев по всей Земле. Когда запускается, местные бобры в этом районе становятся счастливее."
jaJP = "世界中に木の種を配布します。起動すると、周辺のビーバーをより幸せにします。"
frFR = "Distribue des graines d'arbres sur toute la Terre. Lorsqu'il est lancé, il rend les castors de la zone plus heureux."
deDE = "Verstreut Baumsamen über die ganze Erde. Wenn es gestartet wird, macht es die Biber in der Gegend glücklicher."
plPL = "Rozsiewa nasiona drzew po całej Ziemi. Gdy zostanie wystrzelone, czyni bobry w okolicy szczęśliwszymi."
ptBR = "Distribui sementes de árvores por toda a Terra. Quando é lançado, deixa os castores da região mais felizes."
koKR = "전 세계에 나무 씨앗을 뿌립니다. 던져지면 그 지역의 비버들을 더 행복하게 만듭니다."
csCZ = "Šíří semena stromů po celé Zemi. Když se spustí, dělá místním bobrům radost."
viVN = "Phân phối hạt giống cây khắp Trái Đất. Khi được phóng ra, nó làm cho những chú hải ly ở khu vực đó hạnh phúc hơn."

