["MapMetadata.Spillage.Description"]
raw = "Aquesta pendent és plena de petits enclavaments irrigats. Tanmateix, la regió és plena de perills: si no vigiles, aquestes zones deixaran de ser habitables."
status = "normal"
enUS = "This slope is full of small irrigated enclaves. However, the region is full of dangers: if you're not careful, these zones will cease to be habitable."
zhCN = "这条坡地布满了小型灌溉的飞地。然而，该区域充满危险：如果你不留意，这些区域将不再适合居住。"
zhTW = "這個坡度充滿了小型灌溉的飛地。 然而，該地區充滿危險：如果你不留意，這些區域將不再適於居住。"
ruRU = "Этот склон полон маленьких орошаемых анклавов. Однако регион полон опасностей: если за ними не следить, эти зоны перестанут быть обитаемыми."
jaJP = "この斜面は小さな灌漑飛地でいっぱいです。とはいえ、地域には多くの危険が潜んでいます：油断すると、これらの区域は居住不能になります。"
frFR = "Cette pente est remplie de petits enclaves irriguées. Cependant, la région regorge de périls : si tu ne veilles pas, ces zones ne seront plus habitables."
deDE = "Dieser Hang ist voller kleiner bewässerter Enklaven. Allerdings ist die Region voller Gefahren: Wenn du nicht aufpasst, werden diese Zonen unbewohnbar."
plPL = "Ta pochylnia jest pełna małych nawadnianych enklaw. Jednak region jest pełen niebezpieczeństw: jeśli nie będziesz czujny, te obszary przestaną być zdatne do zamieszkania."
ptBR = "Esta encosta está cheia de pequenos bolsões irrigados. No entanto, a região está cheia de perigos: se não ficar de olho, essas zonas deixarão de ser habitáveis."
koKR = "이 경사면은 작은 관개 구역들로 가득 차 있습니다. 다만 이 지역은 위험으로 가득 차 있습니다: 주의하지 않으면 이 구역들은 더 이상 거주할 수 없게 될 것입니다."
csCZ = "Tento svah je plný malých zavlažovaných enkláv. Avšak oblast je plná nebezpečí: pokud na to nebudeš dávat pozor, tyto zóny přestanou být obyvatelné."
viVN = "Dốc này đầy các khu vực tưới tiêu nhỏ. Tuy nhiên, vùng này đầy nguy hiểm: nếu bạn không cảnh giác, những khu vực này sẽ không còn có thể ở được."

