["Tutorial.WaterAndFood.Farmhouse"]
status = "normal"
raw = "A llarg termini necessitem alguna cosa més nutritiva. Construeix una Granja per plantar i collir cultius.\n\nIgual que les banderes, una granja té un abast limitat.\n\nConsell: Si et falten treballadors, pots posar alguns edificis en pausa. Per fer-ho, selecciona un edifici i prem el botó de pausa."
enUS = "In the long term, we need something more nutritious. Build a Farm to plant and harvest crops.\n\nLike flags, a farm has a limited range.\n\nTip: If you are short on workers, you can put some buildings on pause. To do this, select a building and press the pause button."
zhCN = "从长远来看，我们需要一些更有营养的东西。建造一个农场来种植和收获作物。\n\n和旗帜一样，农场的覆盖范围是有限的。\n\n提示：如果你缺少工人，可以将一些建筑物暂停使用。为此，选择一个建筑物并按下暂停按钮。"
zhTW = "長期來看，我們需要一些更有營養的東西。建造一個農場來種植和收穫農作物。\n\n和旗幟一樣，農場的覆蓋範圍是有限的。\n\n建議：如果你缺少工人，可以將一些建築物暫停運作。要這樣做，選擇一個建築物並按下暫停按鈕。"
ruRU = "В долгосрочной перспективе нам нужно что-то более питательное. Постройте Ферму для посадки и сбора урожая.\n\nКак и флаги, ферма имеет ограниченный радиус действия.\n\nСовет: Если вам не хватает рабочих, вы можете приостановить некоторые здания. Для этого выберите здание и нажмите кнопку паузы."
jaJP = "「長期的には、より栄養価の高いものが必要です。作物を植えて収穫するために農場を建設してください。\n\n旗と同様に、農場には限られた範囲があります。\n\nヒント: 労働者が不足している場合は、いくつかの建物を一時停止することができます。そのためには、建物を選択して停止ボタンを押してください。」"
frFR = "À long terme, nous avons besoin de quelque chose de plus nutritif. Construisez une Ferme pour planter et récolter des cultures.\n\nComme les drapeaux, une ferme a une portée limitée.\n\nConseil : Si vous manquez de travailleurs, vous pouvez mettre certains bâtiments en pause. Pour ce faire, sélectionnez un bâtiment et appuyez sur le bouton de pause."
deDE = "Langfristig benötigen wir etwas Nahrhafteres. Baue einen Bauernhof, um Pflanzen anzubauen und zu ernten.\n\nÄhnlich wie die Flaggen hat ein Bauernhof eine begrenzte Reichweite.\n\nTipp: Wenn dir Arbeiter fehlen, kannst du einige Gebäude pausieren. Wähle dazu ein Gebäude aus und drücke die Pausentaste."
plPL = "W dłuższej perspektywie potrzebujemy czegoś bardziej odżywczego. Zbuduj Farmę, aby zasadzić i zbierać plony.\n\nPodobnie jak flagi, farma ma ograniczony zasięg.\n\nWskazówka: Jeśli brakuje Ci pracowników, możesz wstrzymać niektóre budynki. Aby to zrobić, wybierz budynek i naciśnij przycisk wstrzymania."
ptBR = "A longo prazo, precisamos de algo mais nutritivo. Construa uma Fazenda para plantar e colher culturas.\n\nAssim como as bandeiras, uma fazenda tem um alcance limitado.\n\nDica: Se você estiver sem trabalhadores, pode colocar alguns edifícios em pausa. Para fazer isso, selecione um edifício e pressione o botão de pausa."
koKR = "장기적으로 우리는 더 영양가 있는 것이 필요합니다. 농장을 건설하여 작물을 심고 수확하세요.\n\n깃발과 마찬가지로 농장도 범위가 제한되어 있습니다.\n\n팁: 작업자가 부족한 경우 일부 건물의 작업을 일시 중지할 수 있습니다. 이를 위해 건물을 선택하고 일시 중지 버튼을 눌러주세요."
csCZ = "V dlouhodobém horizontu potřebujeme něco výživnějšího. Postavte farmu pro pěstování a sklizeň plodin.\n\nStejně jako vlajky, i farma má omezený dosah.\n\nTip: Pokud vám chybí pracovníci, můžete pozastavit některé budovy. Chcete-li to udělat, vyberte budovu a stiskněte tlačítko pauzy."
viVN = "Về lâu dài, chúng ta cần một thứ gì đó bổ dưỡng hơn. Hãy xây dựng một trang trại để trồng trọt và thu hoạch cây trồng.\n\nGiống như các lá cờ, một trang trại có phạm vi hạn chế.\n\nMẹo: Nếu bạn thiếu công nhân, bạn có thể tạm dừng một số tòa nhà. Để làm điều này, hãy chọn một tòa nhà và nhấn nút tạm dừng."

["Tutorial.WaterAndFood.Gatherer"]
status = "normal"
raw = "A més d'aigua, els castors necessiten menjar.\n\nEls recol·lectors recullen Baies automàticament dins l'abast de la Bandera de recol·lector. Pots veure l'abast quan col·loques la bandera.\n\nConstrueix una Bandera de recol·lector a prop d'uns Arbustos de nabius."
enUS = "In addition to water, beavers need food.\n\nGatherers automatically collect Berries within the reach of the Gatherer Flag. You can see the reach when you place the flag.\n\nBuild a Gatherer Flag near some Blueberry Bushes."
zhCN = "除了水，海狸还需要食物。\n\n收集者会自动在收集旗帜的范围内收集浆果。放置旗帜时可以看到其范围。\n\n在一些蓝莓灌木附近建造一面收集旗帜。"
zhTW = "除了水，海狸還需要食物。\n\n收集者會自動在收集旗幟的範圍內收集漿果。你可以在放置旗幟時看到範圍。\n\n在藍莓灌木附近建造一個收集旗幟。"
ruRU = "Помимо воды, бобрам нужна еда.\n\nСобиратели автоматически собирают ягоды в пределах радиуса действия Флага собирателя. Вы можете увидеть радиус, когда устанавливаете флаг.\n\nПостройте Флаг собирателя рядом с кустами черники."
jaJP = "「水の他に、ビーバーは食べ物も必要です。\n\n収集者は、収集者の旗の範囲内で自動的にベリーを集めます。旗を設置すると、その範囲を見ることができます。\n\nブルーベリーの茂みの近くに収集者の旗を建ててください。」"
frFR = "En plus de l'eau, les castors ont besoin de nourriture.\n\nLes collecteurs ramassent automatiquement des Baies à portée du Drapeau de collecte. Vous pouvez voir la portée lorsque vous placez le drapeau.\n\nConstruisez un Drapeau de collecte près de quelques Buissons de baies."
deDE = "Neben Wasser benötigen die Biber auch Nahrung.\n\nDie Sammler sammeln Beeren automatisch im Bereich der Sammlerflagge. Du kannst den Bereich sehen, wenn du die Flagge platzierst.\n\nBaue eine Sammlerflagge in der Nähe von Heidelbeersträuchern."
plPL = "Oprócz wody bobry potrzebują jedzenia.\n\nZbieracze automatycznie zbierają jagody w zasięgu Flagę Zbieracza. Możesz zobaczyć zasięg, gdy umieścisz flagę.\n\nZbuduj Flagę Zbieracza w pobliżu Krzewów jagodowych."
ptBR = "Além da água, os castores precisam de comida.\n\nOs coletadores recolhem Frutas automaticamente dentro do alcance da Bandeira de coletor. Você pode ver o alcance ao colocar a bandeira.\n\nConstrua uma Bandeira de coletor perto de alguns Arbustos de mirtilo."
koKR = "물이 필요할 뿐만 아니라 비버는 음식도 필요합니다.\n\n채집꾼은 채집 깃발의 범위 안에 있는 열매를 자동으로 수집합니다. 깃발을 배치할 때 범위를 확인할 수 있습니다.\n\n블루베리 덤불 근처에 채집 깃발을 건설하세요."
csCZ = "Kromě vody bobři potřebují jídlo.\n\nSběrači automaticky sbírají bobule v dosahu sběrné vlajky. Dosah můžeš vidět, když umístíš vlajku.\n\nPostav sběrnou vlajku poblíž keřů borůvek."
viVN = "Ngoài nước, những con beaver cần thức ăn.\n\nNhững người thu hoạch sẽ tự động thu thập trái cây trong khu vực của Cờ thu hoạch. Bạn có thể thấy khu vực này khi đặt cờ.\n\nXây dựng một Cờ thu hoạch gần những Bụi cây quả mọng."

["Tutorial.WaterAndFood.MarkCarrots"]
status = "normal"
raw = "Els agricultors no comencen a treballar fins que els dius què i on plantar.\n\nFes servir l'eina Planta cultius per designar un camp de Pastanagues.\n\nEls cultius s'han de plantar en terra irrigada i verda. En cas contrari, les plantes s'assecaran i acabaran morint."
enUS = "Farmers don't start working until you tell them what and where to plant.\n\nUse the Plant Crops tool to designate a Carrot field.\n\nCrops must be planted in irrigated, green land. Otherwise, the plants will dry out and eventually die."
zhCN = "“农民在你告诉他们什么以及在哪里种植之前不会开始工作。\n\n使用种植工具指定一个胡萝卜田。\n\n作物必须在灌溉的绿色土地上种植。否则，植物会干枯并最终死亡。”"
zhTW = "農夫們在你告訴他們種什麼和在哪裡種之前不會開始工作。\n\n使用種植工具指定一塊胡蘿蔔田。\n\n作物必須在灌溉且呈現綠色的土地上種植。否則，植物會枯萎並最終死亡。"
ruRU = "Аграрии не начинают работать, пока вы не скажете им, что и где сажать.\n\nИспользуйте инструмент «Посадить культуры», чтобы обозначить участок для моркови.\n\nКультуры должны быть посажены на орошаемой и зеленой земле. В противном случае растения высохнут и погибнут."
jaJP = "農夫は、何をどこに植えるかを指示しない限り、作業を始めません。\n\n作物を植えるツールを使って、ニンジンの畑を指定してください。\n\n作物は、灌漑された緑の土壌に植える必要があります。そうでない場合、植物は乾燥し、最終的に枯れてしまいます。"
frFR = "Les agriculteurs ne commencent à travailler que lorsque vous leur dites quoi et où planter.\n\nUtilisez l'outil Planter des cultures pour désigner un champ de Carottes.\n\nLes cultures doivent être plantées dans un sol irrigué et vert. Sinon, les plantes se dessècheront et finiront par mourir."
deDE = "Die Bauern beginnen nicht zu arbeiten, bis du ihnen sagst, was und wo sie pflanzen sollen.\n\nNutze das Werkzeug Pflanzen, um ein Karottenfeld festzulegen.\n\nDie Pflanzen müssen in bewässerter und grüner Erde gepflanzt werden. Andernfalls vertrocknen die Pflanzen und sterben schließlich."
plPL = "Rolnicy nie zaczynają pracować, dopóki nie powiesz im, co i gdzie sadzić.\n\nUżyj narzędzia Sadzenie upraw, aby wyznaczyć pole marchewki.\n\nUprawy muszą być sadzone na nawodnionej i zielonej ziemi. W przeciwnym razie rośliny uschną i umrą."
ptBR = "Os agricultores não começam a trabalhar até que você lhes diga o que e onde plantar.\n\nUse a ferramenta Plantar Culturas para designar um campo de Cenouras.\n\nAs culturas devem ser plantadas em solo irrigado e verde. Caso contrário, as plantas secarão e acabarão morrendo."
koKR = "농부들은 무엇을 어디에 심을지 말해주기 전까지 작업을 시작하지 않습니다.\n\n\"작물 심기\" 도구를 사용하여 당근 밭을 지정하세요.\n\n작물은 물이 공급되고 초록인 땅에 심어야 합니다. 그렇지 않으면 식물은 마르고 결국 죽게 됩니다."
csCZ = "Zemědělci nezačnou pracovat, dokud jim neřekneš, co a kde mají zasadit.\n\nPoužij nástroj 'Zasadit plodiny', aby sis vybral pole pro mrkev.\n\nPlodiny musí být zasazeny do zavlažované a zelené půdy. Jinak se rostliny vysuší a nakonec zemřou."
viVN = "Nông dân sẽ không bắt đầu làm việc cho đến khi bạn chỉ họ trồng gì và ở đâu.\n\nHãy sử dụng công cụ Trồng cây để chỉ định một khu vực trồng Cà rốt.\n\nCây trồng cần được trồng trên đất ẩm ướt và màu xanh. Nếu không, cây sẽ khô héo và chết."

["Tutorial.WaterAndFood.WaterPump"]
status = "normal"
raw = "Els castors necessiten aigua per sobreviure.\n\nConstrueix una Bomba d'aigua per garantir un accés continu a aigua potable. Recorda connectar la Bomba al Centre de districte."
enUS = "Beavers need water to survive.\n\nBuild a Water Pump to ensure a continuous supply of drinking water. Remember to connect the Pump to the District Center."
zhCN = "海狸需要水以生存。\n\n建造一个水泵以确保持续获得饮用水。记得将水泵连接到区域中心。"
zhTW = "海狸需要水來生存。\n\n建造一個水泵以確保持續獲得飲用水。記得將水泵連接到區域中心。"
ruRU = "Бобрам нужна вода для выживания.\n\nПострой водяной насос, чтобы гарантировать постоянный доступ к питьевой воде. Не забудь подключить насос к районному центру."
jaJP = "ビーバーは生き残るために水を必要とします。\n\n飲み水への継続的なアクセスを確保するために、水ポンプを建設してください。水ポンプを地区センターに接続することを忘れないでください。"
frFR = "Les castors ont besoin d'eau pour survivre.\n\nConstruis une Pompe à eau pour garantir un accès continu à de l'eau potable. N'oublie pas de connecter la Pompe au Centre de quartier."
deDE = "Die Biber benötigen Wasser zum Überleben.\n\nBaue eine Wasserpumpe, um einen kontinuierlichen Zugang zu Trinkwasser zu gewährleisten. Vergiss nicht, die Pumpe mit dem Bezirkszentrum zu verbinden."
plPL = "Bobry potrzebują wody, aby przeżyć.\n\nZbuduj pompę wodną, aby zapewnić ciągły dostęp do wody pitnej. Pamiętaj, aby połączyć pompę z centrum dzielnicy."
ptBR = "Os castores precisam de água para sobreviver.\n\nConstrua uma Bomba de água para garantir acesso contínuo a água potável. Lembre-se de conectar a Bomba ao Centro de distrito."
koKR = "비버는 생존을 위해 물이 필요합니다.\n\n지속적인 식수 공급을 보장하기 위해 물펌프를 건설하세요. 물펌프를 구역 센터에 연결하는 것을 잊지 마세요."
csCZ = "Bobři potřebují vodu, aby přežili.\n\nPostav vodní pumpu, aby zajistil nepřetržitý přístup k pitné vodě. Nezapomeň připojit pumpu k centru distriktu."
viVN = "Các con bé cần nước để sống sót.\n\nXây dựng một Bơm nước để đảm bảo nguồn nước sạch liên tục. Hãy nhớ kết nối Bơm với Trung tâm quận."

