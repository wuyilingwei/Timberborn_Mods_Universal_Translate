["Bot.BeaversPerished"]
new = "Ni tan sols em facis començar amb els castors.\nHo tenien tot. Aire fresc, aigua neta.\nAra només en queda un record llunyà."
status = "normal"
raw = "Ni tan sols em facis començar amb els castors.\nHo tenien tot. Aire fresc, aigua neta.\nAra només en queda un record llunyà."
enUS = "Don't even make me start with the beavers. They had it all. Fresh air, clean water. Now only a distant memory remains."
zhCN = "别让我一开口就谈起海狸。\n他们拥有一切。空气清新，水质清澈。\n现在只剩下一个遥远的记忆。"
zhTW = "別讓我一開始就談起河狸們。它們曾經擁有一切。清新的空氣，清潔的水。如今只剩下遙遠的回憶。"
ruRU = "Даже не заставляй меня начинать с бобров.\nУ них было всё. Свежий воздух, чистая вода.\nТеперь осталось лишь одно далёкое воспоминание."
jaJP = "せめてカワウソたちから始めさせてくれない。\n彼らはすべてを手に入れていた。新鮮な空気、きれいな水。\n今では、それは遠い記憶の名残だけだ。"
frFR = "Ne me fais même pas commencer à parler des castors.\nIls avaient tout. De l'air frais, de l'eau propre.\nIl ne reste désormais qu'un souvenir lointain."
deDE = "Lass mich nicht mal mit den Bibern anfangen.\nSie hatten alles. Frische Luft, sauberes Wasser.\nJetzt bleibt nur noch eine ferne Erinnerung."
plPL = "Nie zaczynaj mi w ogóle o bobrach.\nMieli wszystko.\nŚwieże powietrze, czysta woda.\nTeraz pozostaje tylko jedno odległe wspomnienie."
ptBR = "Nem me faça começar com os castores.\nEles tinham tudo. Ar fresco, água limpa.\nAgora só resta uma lembrança distante."
koKR = "비버들로 시작하게 만들지 마.\n그들은 모든 것을 가지고 있었다. 신선한 공기와 맑은 물.\n지금 남은 것은 멀리 떨어진 하나의 기억뿐이다."
viVN = "Bạn còn không cho tôi bắt đầu với những con hải ly.\nHọ có tất cả. Không khí trong lành, nước sạch.\nGiờ chỉ còn lại một ký ức xa xôi."

