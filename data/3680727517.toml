["AnalyticsConsent.Info"]
raw = "Si us plau, ajuda'ns a millorar el joc compartint dades sobre com jugues a Timberborn.\n\nSi estàs d'acord, recopilarem automàticament informació relacionada amb la jugabilitat durant les teves sessions de joc.\n\nPots anar a la configuració del joc per retirar el teu consentiment i eliminar les teves dades en qualsevol moment. Per obtenir més informació, consulta la nostra <link><u>política de privacitat</u></link>.\n\nGràcies!"
status = "normal"
enUS = "Please help us improve the game by sharing data about how you play Timberborn.\n\nIf you agree, we will automatically collect gameplay-related information during your gaming sessions.\n\nYou can go to the game settings to withdraw your consent and delete your data at any time. For more information, please see our <link><u>privacy policy</u></link>.\n\nThank you!"
zhCN = "请帮助我们通过分享关于你如何玩 Timberborn 的数据来改进游戏。\n如果你同意，我们将在你的游戏会话期间自动收集与游戏性相关的信息。\n你可以前往游戏设置，在任何时候撤回你的同意并删除你的数据。\n如需了解更多信息，请查阅我们的 <link><u>隐私政策</u></link>。\n谢谢！"
zhTW = "請協助我們透過分享你玩 Timberborn 的方式來改善遊戲。\n\n如果你同意，我們會在你的遊戲過程中自動收集與遊戲性相關的資訊。\n\n你可以前往遊戲設定以撤回你的同意，並在任何時候刪除你的資料。如需更多資訊，請參閱我們的 <link><u>隱私政策</u></link>。\n\n謝謝！"
ruRU = "Пожалуйста, помогите нам улучшить игру, делясь данными о том, как вы играете в Timberborn.\n\nЕсли вы согласны, мы автоматически будем собирать информацию, связанную с игровым процессом во время ваших игровых сессий.\n\nВы можете перейти в настройки игры, чтобы отозвать ваше согласие и удалить ваши данные в любое время. Чтобы получить более подробную информацию, ознакомьтесь с нашей <link><u>политикой конфиденциальности</u></link>.\n\nСпасибо!"
jaJP = "ティンバーボーンの遊び方についてのデータを共有してゲームを改善するのを手伝ってください。\n\n同意していただける場合、プレイセッション中のゲームプレイに関連する情報を自動的に収集します。\n\n同意を撤回し、データをいつでも削除するには、ゲーム設定にアクセスしてください。\n\n詳細については、私たちの <link><u>プライバシーポリシー</u></link> をご覧ください。\n\nありがとうございます！"
frFR = "S'il vous plaît, aidez-nous à améliorer le jeu en partageant des données sur la manière dont vous jouez à Timberborn.\n\nSi vous êtes d'accord, nous collecterons automatiquement des informations liées à la jouabilité pendant vos sessions de jeu.\n\nVous pouvez accéder aux paramètres du jeu pour retirer votre consentement et supprimer vos données à tout moment. Pour plus d'informations, consultez notre <link><u>politique de confidentialité</u></link>.\n\nMerci !"
deDE = "Bitte hilf uns, das Spiel zu verbessern, indem du Daten darüber teilst, wie du Timberborn spielst.\n\nWenn du zustimmst, sammeln wir automatisch Informationen zur Spielbarkeit während deiner Spielsessions.\n\nDu kannst in die Spieleinstellungen gehen, um deine Einwilligung zu widerrufen und deine Daten jederzeit zu löschen. Für weitere Informationen lies unsere <link><u>Datenschutzrichtlinie</u></link>.\n\nDanke!"
plPL = "Proszę, pomóż nam ulepszyć grę, udostępniając dane o tym, jak grasz w Timberborn.\nJeśli się zgadzasz, będziemy automatycznie zbierać informacje związane z rozgrywką podczas twoich sesji gry.\nMożesz przejść do ustawień gry, aby cofnąć swoją zgodę i usunąć swoje dane w dowolnym momencie. Aby uzyskać więcej informacji, zapoznaj się z naszą <link><u>polityką prywatności</u></link>.\nDziękujemy!"
ptBR = "Por favor, ajude-nos a melhorar o jogo compartilhando dados sobre como você joga Timberborn.\n\nSe estiver de acordo, coletaremos automaticamente informações relacionadas à jogabilidade durante as suas sessões de jogo.\n\nVocê pode ir às configurações do jogo para retirar o seu consentimento e excluir seus dados a qualquer momento. Para obter mais informações, consulte nossa <link><u>política de privacidade</u></link>.\n\nObrigado!"
koKR = "제발 Timberborn를 플레이하는 방식에 대한 데이터를 공유해 주시면 게임 개선에 도움이 됩니다.\n\n동의하신다면, 플레이 세션 동안 게임 플레이와 관련된 정보를 자동으로 수집합니다.\n\n원하시면 언제든지 게임 설정으로 가서 동의를 철회하고 데이터를 삭제하실 수 있습니다. 자세한 내용은 저희의 <link><u>개인정보 보호정책</u></link>를 참조하십시오.\n\n감사합니다!"
csCZ = "Prosím, pomozte nám zlepšit hru sdílením údajů o tom, jak hrajete Timberborn.\n\nPokud souhlasíte, budeme automaticky shromažďovat údaje související s hratelností během vašich herních sezení.\n\nMůžete jít do nastavení hry a odvolat svůj souhlas a smazat svá data kdykoli. Pro více informací si přečtěte naše <link><u>zásady ochrany soukromí</u></link>.\n\nDěkujeme!"
viVN = "Vui lòng giúp chúng tôi cải thiện trò chơi bằng cách chia sẻ dữ liệu về cách bạn chơi Timberborn.\n\nNếu bạn đồng ý, chúng tôi sẽ tự động thu thập thông tin liên quan đến lối chơi trong các phiên chơi của bạn.\n\nBạn có thể vào cài đặt trò chơi để rút lại sự đồng ý và xóa dữ liệu của bạn bất cứ khi nào. Để biết thêm thông tin, hãy xem <link><u>chính sách quyền riêng tư</u></link>.\n\nCảm ơn!"

