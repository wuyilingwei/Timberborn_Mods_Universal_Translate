["NaturalResource.Cattail.FlavorDescription"]
raw = "\"Sé tot el que hi ha sobre cues, però què és un gat?\" —Pina"
status = "normal"
enUS = "\"I know everything there is to know about tails, but what is a cat?\" —Pina"
zhCN = "\"我知道关于尾巴的一切，但猫到底是什么？\" —Pina"
zhTW = "我知道關於尾巴的一切，但貓是什麼？ —Pina"
ruRU = "\"Я знаю всё, что касается хвостов, но что такое кот?\" —Pina"
jaJP = "\"しっぽについて知っていることはすべて知っているが、猫って何だ？\" —ピナ"
frFR = "Je sais tout ce qu'il y a sur les queues, mais qu'est-ce qu'un chat ? —Pina"
deDE = "Ich weiß alles, was es über Schwänze zu wissen gibt, aber was ist eine Katze? —Pina"
plPL = "\"Wiem wszystko o ogonach, ale czym jest kot?\" —Pina"
ptBR = "\"Sei tudo o que há sobre caudas, mas o que é um gato?\" —Pina"
koKR = "꼬리에 관한 모든 것을 알고 있지만, 고양이는 무엇일까? —피나"
csCZ = "\"Znám všechno, co se týká ocasů, ale co je to kočka?\" —Pina"
viVN = "\"Tôi biết tất cả những gì liên quan đến đuôi, nhưng một con mèo là gì?\" —Pina"

