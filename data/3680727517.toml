["MapMetadata.Terraces.Description"]
raw = "Moltes societats opten per establir-se en zones elevades, aprofitant la nova habilitat castora per construir en vertical."
status = "normal"
enUS = "Many societies choose to settle in elevated zones, taking advantage of the new stonecutting skill to build vertically."
zhCN = "许多社会选择在高地定居，利用新的 castora 技能进行垂直建造。"
zhTW = "許多社群選擇在高地定居，利用新的築壩能力以垂直方式建造。"
ruRU = "Многие общества предпочитают селиться в возвышенных зонах, используя новую каменоломную способность для вертикального строительства."
jaJP = "多くの社会は高地の区域に定住することを選び、新しいキャストラの技能を活用して垂直に建設する。"
frFR = "De nombreuses sociétés choisissent de s'établir dans des zones élevées, profitant de la nouvelle compétence castor pour construire verticalement."
deDE = "Viele Gesellschaften entscheiden sich dafür, sich in hochgelegenen Gebieten niederzulassen und die neue Steinmetz-Fähigkeit zu nutzen, um vertikal zu bauen."
plPL = "Wiele społeczeństw decyduje się osiedlać na wyżej położonych obszarach, wykorzystując nową umiejętność odlewnictwa do budowania w pionie."
ptBR = "Muitas sociedades optam por estabelecer-se em zonas elevadas, aproveitando a nova habilidade de castor para construir verticalmente."
koKR = "많은 사회들이 고지대에 정착하는 것을 선택하고, 새로운 비버 댐 건설 기술을 활용해 수직으로 건설합니다."
csCZ = "Mnohé společnosti volí usídlit se ve vyvýšených oblastech a využívají novou bobří dovednost pro stavbu ve vertikálním směru."
viVN = "Nhiều xã hội chọn định cư ở các vùng cao, tận dụng khả năng của hải ly mới để xây dựng theo chiều dọc."

