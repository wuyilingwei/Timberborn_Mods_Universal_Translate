["MapMetadata.Oasis.Description"]
raw = "Un únic refugi verd a l'erm envoltat d'aqüífers accessibles amb enginyeria castora intel·ligent."
status = "normal"
enUS = "A single green refuge at the hermitage surrounded by aquifers accessible with intelligent beaver engineering."
zhCN = "一个独特的绿色避难所，坐落在由可通过智能海狸工程进入的蓄水层环绕的隐居地。"
zhTW = "唯一的綠色庇護所，位於被可取得水源的蓄水層環繞的綠洲中，由智慧海狸工程打造。"
ruRU = "Единственный зелёный оазис в отшельнической обители, окружённый доступными аквиферами благодаря интеллектуальной инженерии бобров."
jaJP = "賢いビーバー工学によってアクセス可能な帯水層に囲まれた、唯一の緑のオアシス。"
frFR = "Un seul refuge vert dans l'ermitage entouré d'aquifères accessibles grâce à une ingénierie castor intelligente."
deDE = "Eine einzige grüne Zuflucht in der Einsiedelei, umgeben von zugänglichen Aquiferen, mit intelligenter Bibertechnik."
plPL = "Jedno jedyne zielone schronienie w pustelni otoczonej przez warstwy wodonośne dostępne dzięki inteligentnej inżynierii bobrów."
ptBR = "Um único refúgio verde no ermo rodeado por quíferos acessíveis com engenharia castora inteligente."
koKR = "지능형 비버 엔지니어링으로 접근 가능한 대수층으로 둘러싸인 오아시스 속의 하나의 녹색 피난처."
csCZ = "Jediná zelená oáza na samotě obklopená přístupnými akviferami s inteligentním bobřím inženýrstvím."
viVN = "Một nơi trú ẩn xanh duy nhất tại ẩn thất được bao quanh bởi các tầng chứa nước có thể tiếp cận được với kỹ thuật hải ly thông minh."

