["Tutorial.Introduction.Description"]
status = "normal"
raw = "Benvingut a Timberborn! Aquest tutorial t'ajudarà a posar la pota a l'erm i sobreviure als primers dies.\n\nAprendràs a utilitzar les eines necessàries per construir una comunitat de castors pròspera.\n\nA mesura que avancis pels passos següents, els consells apareixeran aquí."
enUS = "Welcome to Timberborn! This tutorial will help you get a foothold in the wasteland and survive the first days.\n\nYou will learn to use the tools necessary to build a thriving beaver community.\n\nAs you progress through the following steps, tips will appear here."
zhCN = "欢迎来到《Timberborn》！这个教程将帮助你在荒地上扎根并生存下去度过最初的日子。\n\n你将学习使用必要的工具来建设一个繁荣的海狸社区。\n\n随着你逐步完成接下来的步骤，建议将会显示在这里。"
zhTW = "歡迎來到 Timberborn！這個教程將幫助你在荒地上扎根並在頭幾天中生存下來。\n\n你將學會使用必要的工具來建造一個繁榮的海狸社區。\n\n在接下來的步驟中，提示將會出現在這裡。"
ruRU = "Добро пожаловать в Timberborn! ЭтотTutorial поможет тебе начать и выжить в первые дни.\n\nТы научишься использовать необходимые инструменты для построения процветающего сообщества бобров.\n\nПо мере того, как ты будешь выполнять следующие шаги, советы будут появляться здесь."
jaJP = "「Timberborn」へようこそ！このチュートリアルは、荒野での第一歩を踏み出し、最初の日々を生き延びる手助けをします。\n\n繁栄するビーバーのコミュニティを築くために必要なツールの使い方を学びます。\n\n次のステップを進むにつれて、ヒントがここに表示されます。"
frFR = "Bienvenue à Timberborn ! Ce tutoriel vous aidera à poser un pied dans l'ermet et à survivre aux premiers jours.\n\nVous apprendrez à utiliser les outils nécessaires pour construire une communauté de castors prospère.\n\nAu fur et à mesure que vous avancerez dans les étapes suivantes, des conseils apparaîtront ici."
deDE = "Willkommen bei Timberborn! Dieses Tutorial hilft dir, Fuß im Ödland zu fassen und die ersten Tage zu überstehen.\n\nDu wirst lernen, die notwendigen Werkzeuge zu nutzen, um eine florierende Bibergemeinschaft aufzubauen.\n\nWährend du die folgenden Schritte durchläufst, werden hier Tipps angezeigt."
plPL = "Witaj w Timberborn! Ten samouczek pomoże Ci postawić pierwsze kroki na pustkowiu i przetrwać pierwsze dni.\n\nNauczysz się korzystać z narzędzi niezbędnych do zbudowania prosperującej społeczności bobrów.\n\nW miarę jak przechodzisz przez kolejne kroki, porady będą się pojawiały tutaj."
ptBR = "Bem-vindo ao Timberborn! Este tutorial irá te ajudar a colocar a pata na terra e sobreviver aos primeiros dias.\n\nVocê aprenderá a utilizar as ferramentas necessárias para construir uma comunidade próspera de castores.\n\nÀ medida que você avançar pelos próximos passos, as dicas aparecerão aqui."
koKR = "Timberborn에 오신 것을 환영합니다! 이 튜토리얼은 당신이 이곳에 발을 디디고 첫 날을 버틸 수 있도록 도와줄 것입니다.\n\n당신은 번영하는 비버 공동체를 건설하기 위해 필요한 도구를 사용하는 법을 배울 것입니다.\n\n다음 단계로 진행함에 따라 팁이 여기 나타날 것입니다."
csCZ = "Vítejte v Timberborn! Tento tutoriál vám pomůže postavit se na nohy a přežít první dny.\n\nNaučíte se používat nástroje potřebné k vybudování prosperující bobří komunity.\n\nJak budete postupovat jednotlivými kroky, budou se zde objevovat rady."
viVN = "Chào mừng bạn đến với Timberborn! Hướng dẫn này sẽ giúp bạn đặt chân lên vùng đất hoang và sống sót qua những ngày đầu tiên.\n\nBạn sẽ học cách sử dụng các công cụ cần thiết để xây dựng một cộng đồng hải ly thịnh vượng.\n\nKhi bạn tiến qua các bước tiếp theo, các mẹo sẽ xuất hiện ở đây."

["Tutorial.LayerTool.ChangeUsingMouse"]
status = "normal"
raw = "Pots controlar la capa visible sense clicar els botons fent servir dreceres de teclat configurables.\n\nMoltes altres accions també tenen dreceres de teclat. Les trobaràs a les pistes o al menú Configuració."
enUS = "You can control the visible layer without clicking the buttons by using configurable keyboard shortcuts.\n\nMany other actions also have keyboard shortcuts. You can find them in the hints or in the Settings menu."
zhCN = "您可以使用可配置的快捷键控制可见层，而无需单击按钮。\n\n许多其他操作也有快捷键。您可以在提示或设置菜单中找到它们。"
zhTW = "你可以不點擊按鈕，而是使用可配置的鍵盤快捷鍵來控制可見層。\n\n許多其他操作也有鍵盤快捷鍵。你可以在軌道或設置菜單中找到它們。"
ruRU = "Вы можете управлять видимым слоем, не нажимая кнопки, используя настраиваемые сочетания клавиш.\n\nМногие другие действия также имеют сочетания клавиш. Вы найдете их на дорожках или в меню Настройки."
jaJP = "マウスを使ってレイヤーツールの変更 - 新しい翻訳テキスト: \"ボタンをクリックせずに、設定可能なキーボードショートカットを使って表示レイヤーを操作できます。\n\n他の多くのアクションにもキーボードショートカットがあります。それらはトラックまたは設定メニューにあります。\""
frFR = "Vous pouvez contrôler la couche visible sans cliquer sur les boutons en utilisant des raccourcis clavier configurables.\n\nDe nombreuses autres actions ont également des raccourcis clavier. Vous les trouverez dans les pistes ou dans le menu Paramètres."
deDE = "Du kannst die sichtbare Ebene steuern, ohne die Schaltflächen zu klicken, indem du konfigurierbare Tastenkombinationen verwendest.\n\nViele andere Aktionen haben ebenfalls Tastenkombinationen. Du findest sie in den Hinweisen oder im Menü Einstellungen."
plPL = "Możesz kontrolować widoczną warstwę bez klikania przycisków za pomocą konfigurowalnych skrótów klawiszowych.\n\nWiele innych akcji również ma skróty klawiszowe. Znajdziesz je na torach lub w menu Ustawienia."
ptBR = "Você pode controlar a camada visível sem clicar nos botões usando atalhos de teclado configuráveis.\n\nMuitas outras ações também têm atalhos de teclado. Você os encontrará nas dicas ou no menu de Configurações."
koKR = "마우스를 사용하여 버튼을 클릭하지 않고도 보이는 레이어를 제어할 수 있습니다.\n\n많은 다른 행동에도 키보드 단축키가 있습니다. 이들은 트랙 또는 설정 메뉴에서 찾을 수 있습니다."
csCZ = "Můžeš ovládat viditelnou vrstvu bez klikání na tlačítka pomocí konfigurabilních klávesových zkratek.\n\nMnoho dalších akcí má také klávesové zkratky. Najdeš je v nápovědě nebo v nabídce Nastavení."
viVN = "Bạn có thể điều khiển lớp hiển thị mà không cần nhấn nút bằng cách sử dụng các phím tắt có thể cấu hình.\n\nNhiều hành động khác cũng có phím tắt. Bạn có thể tìm thấy chúng trong các dấu hiệu hoặc trong menu Cài đặt."

["Tutorial.LayerTool.ChangeUsingUI"]
status = "normal"
raw = "A mesura que el teu assentament creix en vertical, treballar sota edificis i terreny pot resultar difícil.\n\nL'eina de capes ajuda amb això amagant tot el que hi ha per sobre de la capa seleccionada.\n\nCanvia la capa visible fent clic als botons ressaltats."
enUS = "As your settlement grows vertically, working beneath buildings and terrain can become difficult.\n\nThe layer tool helps with this by hiding everything above the selected layer.\n\nChange the visible layer by clicking the highlighted buttons."
zhCN = "随着你的定居点垂直发展，在建筑物和地面下工作可能会变得困难。\n\n图层工具通过隐藏所选图层上方的所有内容来帮助解决这个问题。\n\n通过点击高亮按钮来更改可视图层。"
zhTW = "隨著你的定居點在垂直方向上的增長，在建築物和地面下工作可能會變得困難。\n\n層工具可以通過隱藏選定層上方的所有內容來幫助解決這個問題。\n\n點擊突出顯示的按鈕來更改可見層。"
ruRU = "Когда ваша колония растет вверх, работать под зданиями и на земле может быть сложно.\n\nИнструмент слоев помогает с этим, скрывая все, что находится над выбранным слоем.\n\nИзмените видимый слой, нажав на выделенные кнопки."
jaJP = "あなたの集落が垂直に成長するにつれて、建物や地面の下で作業することは難しくなるかもしれません。\n\nレイヤーツールは、選択されたレイヤーの上にあるすべてを隠すことでこれを助けます。\n\n強調表示されたボタンをクリックすることで、表示されるレイヤーを変更します。"
frFR = "À mesure que votre établissement grandit verticalement, travailler sous des bâtiments et des terrains peut devenir difficile.\n\nL'outil de couches aide à cela en cachant tout ce qui se trouve au-dessus de la couche sélectionnée.\n\nChangez la couche visible en cliquant sur les boutons surlignés."
deDE = "Wenn deine Siedlung vertikal wächst, kann es schwierig werden, unter Gebäuden und Terrain zu arbeiten.\n\nDas Lagenwerkzeug hilft dabei, indem es alles über der ausgewählten Ebene ausblendet.\n\nWechsle die sichtbare Ebene, indem du auf die hervorgehobenen Schaltflächen klickst."
plPL = "W miarę jak twoja osada rośnie w górę, praca pod budynkami i terenem może być trudna.\n\nNarzędzie warstw pomaga w tym, ukrywając wszystko, co znajduje się nad wybraną warstwą.\n\nZmień widoczną warstwę, klikając na podświetlone przyciski."
ptBR = "À medida que seu assentamento cresce verticalmente, trabalhar sob edifícios e terreno pode se tornar difícil.\n\nA ferramenta de camadas ajuda com isso ocultando tudo que está acima da camada selecionada.\n\nTroque a camada visível clicando nos botões destacados."
koKR = "당신의 정착지가 수직으로 성장함에 따라 건물과 지면 아래에서 작업하는 것이 어려울 수 있습니다.\n\n레이어 도구는 선택한 레이어 위에 있는 모든 것을 숨겨서 이를 돕습니다.\n\n강조된 버튼을 클릭하여 보이는 레이어를 변경하십시오."
csCZ = "Jak se vaše osada rozrůstá vertikálně, může být práce pod budovami a terénem obtížná.\n\nNástroj vrstev s tím pomáhá tím, že skryje vše, co je nad vybranou vrstvou.\n\nZměňte viditelnou vrstvu kliknutím na zvýrazněné tlačítka."
viVN = "Khi khu định cư của bạn lớn lên theo chiều đứng, việc làm việc dưới các tòa nhà và mặt đất có thể trở nên khó khăn.\n\nCông cụ lớp giúp giải quyết điều này bằng cách che giấu tất cả những gì ở trên lớp đã chọn.\n\nThay đổi lớp hiển thị bằng cách nhấp vào các nút được làm nổi bật."

