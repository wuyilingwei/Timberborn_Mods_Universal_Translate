["Building.LumberjackFlag.FlavorDescription"]
raw = "\"Som llenyataires, i així és com va: dormim tota la nit i treballem tot el dia!\" —cançó popular castora"
status = "normal"
enUS = "We're lumberjacks, and this is how it goes: we sleep all night and work all day! —a popular beaver song"
zhCN = "\"我们是伐木工人，这就是它的运作方式：整夜睡觉，整天工作！\" —Castora民谣"
zhTW = "我們是伐木工人，事情就是這樣：我們整夜睡覺，整日工作！\" —一首廣為人知的海狸"
ruRU = "Мы лесорубы, и вот как это работает: мы спим всю ночь и работаем весь день! —народная песня кастора"
jaJP = "私たちは木こりで、こうなるのです：夜は一晩中眠り、日中はずっと働くのです！ —人気のビーバーの歌"
frFR = "\"Nous sommes bûcherons, et voilà comment ça se passe : nous dormons toute la nuit et nous travaillons toute la journée !\" —chanson populaire des castors"
deDE = "\"Wir sind Holzfäller, und so läuft es: Wir schlafen die ganze Nacht und arbeiten den ganzen Tag!\" —kastilisches Volkslied"
plPL = "\"Jesteśmy drwalami, i tak to wygląda: śpimy całą noc i pracujemy cały dzień!\" —piosenka ludowa castora"
ptBR = "\"Somos lenhadores, e é assim que vai: dormimos a noite toda e trabalhamos o dia todo!\" —canção popular castora"
koKR = "\"우리는 벌목꾼이고, 이게 바로 그렇게 흘러가는 거야: 우리는 밤새 잠을 자고 하루 종일 일해!\" —비버의 민요"
csCZ = "\"Jsme dřevorubci, a tak to jde: spíme celou noc a pracujeme celý den!\" —Castora lidová píseň"
viVN = "\"Chúng tôi là những người đốn gỗ, và đây là cách nó diễn ra: chúng tôi ngủ cả đêm và làm việc suốt cả ngày!\" —bài hát dân gian castora"

["Building.MechanicalFluidPump.Description"]
