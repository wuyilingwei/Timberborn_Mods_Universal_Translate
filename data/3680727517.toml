["NaturalResource.Soybean.FlavorDescription"]
raw = "Dures i resistents a l'aigua, les seves llavors són joguines perfectes per als cadells."
status = "normal"
enUS = "Hard and water-resistant, its seeds are perfect toys for puppies."
zhCN = "坚硬且耐水，它们的种子是幼犬的完美玩具。"
zhTW = "又硬又耐水，它們的種子是幼犬的完美玩具。"
ruRU = "Твёрдые и водостойкие, их семена — идеальные игрушки для щенков."
jaJP = "水にも強くて硬い。それらの種子は子犬には完璧なおもちゃです。"
frFR = "Durs et résistants à l'eau, leurs graines sont des jouets parfaits pour les chiots."
deDE = "Hart und wasserbeständig, sind ihre Samen perfekte Spielzeuge für Welpen."
plPL = "Twarde i odporne na wodę, ich nasiona są doskonałymi zabawkami dla szczeniąt."
ptBR = "Duras e resistentes à água, suas sementes são brinquedos perfeitos para filhotes."
koKR = "단단하고 물에 강한 그들의 씨앗은 강아지들에게 완벽한 장난감이다."
csCZ = "Tvrdé a voděodolné, jejich semena jsou perfektní hračky pro štěňata."
viVN = "Cứng và chịu nước, hạt của chúng là những món đồ chơi hoàn hảo cho những chú chó con."

