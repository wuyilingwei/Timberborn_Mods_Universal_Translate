["Tutorial.Dams.BuildDam"]
status = "normal"
raw = "Emmagatzemar aigua en dipòsits manté els teus castors hidratats, però la supervivència a llarg termini depèn de controlar el flux de l'aigua.\n\nConstrueix una línia de preses al riu més proper, d'una riba a l'altra, i observa què passa."
enUS = "Storing water in reservoirs keeps your beavers hydrated, but long-term survival depends on controlling the flow of water.\n\nBuild a line of dams across the nearest river, from bank to bank, and watch what happens."
zhCN = "在水库中储存水可以保持你的海狸保持水分，但长期生存取决于控制水流。\n\n在最近的河流上建造一条坝，横跨两岸，观察会发生什么。"
zhTW = "在水庫中儲存水以保持你的海狸有足夠的水分，但長期生存依賴於控制水流。\n\n在最接近的河流上建造一排壩，從一岸延伸到另一岸，然後觀察會發生什麼。"
ruRU = "Сохранение воды в резервуарах поддерживает ваших бобров в увлажненном состоянии, но долгосрочное выживание зависит от контроля потока воды.\n\nПостройте линию плотин на ближайшей реке, с одного берега на другой, и наблюдайте, что произойдет."
jaJP = "ダムに水を貯めることでビーバーを潤すことができますが、長期的な生存は水の流れを制御することにかかっています。\n\n最寄りの川にダムの列を作り、対岸から対岸まで渡して、何が起こるか見守りましょう。"
frFR = "Stocker de l'eau dans des réservoirs maintient vos castors hydratés, mais la survie à long terme dépend du contrôle du flux de l'eau.\n\nConstruisez une ligne de barrages sur la rivière la plus proche, d'une rive à l'autre, et observez ce qui se passe."
deDE = "Wasser in Reservoirs zu speichern, hält deine Biber hydratisiert, aber das langfristige Überleben hängt davon ab, den Wasserfluss zu kontrollieren.\n\nBaue eine Reihe von Dämmen im nächsten Fluss von einem Ufer zum anderen und beobachte, was passiert."
plPL = "Przechowywanie wody w zbiornikach utrzymuje twoje bobry nawodnione, ale długoterminowe przetrwanie zależy od kontrolowania przepływu wody.\n\nZbuduj linię tam na najbliższej rzece, od brzegu do brzegu, i obserwuj, co się stanie."
ptBR = "Armazenar água em reservatórios mantém seus castores hidratados, mas a sobrevivência a longo prazo depende de controlar o fluxo da água.\n\nConstrua uma linha de barragens no rio mais próximo, de uma margem à outra, e observe o que acontece."
koKR = "저수지에 물을 저장하는 것은 너의 비버를 수분 공급하지만, 장기 생존은 물 흐름을 제어하는 데 달려 있습니다.\n\n가장 가까운 강에 댐을 세워 보세요, 강의 한쪽 끝에서 다른 쪽 끝까지, 그리고 무슨 일이 발생하는지 지켜보세요."
csCZ = "Ukládání vody do nádrží udržuje vaše bobry hydratované, ale dlouhodobé přežití závisí na kontrole toku vody.\n\nPostavte řadu hrází přes nejbližší řeku, od jednoho břehu k druhému, a sledujte, co se stane."
viVN = "Việc tích trữ nước trong các bể chứa sẽ giúp những con castor của bạn giữ nước, nhưng sự sống còn lâu dài phụ thuộc vào việc kiểm soát dòng chảy của nước.\n\nHãy xây dựng một hàng đập qua con sông gần nhất, từ bờ này sang bờ kia, và quan sát điều gì xảy ra."

