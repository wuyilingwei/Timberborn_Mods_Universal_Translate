["Lapantouflemagic.GrandDam.Description"]
raw = "An audacious dam design, loosely based on traditional housing.\nPumps autonomously.\nConsumes planks for maintenance.\n<color=#00FFFF>Works as a Levee</color>\n<color=red>Power must be provided from the sides of the small construction site flag</color>"
status = "normal"
enUS = "An audacious dam design, loosely based on traditional housing. Pumps autonomously. Consumes planks for maintenance. <color=#00FFFF>Works as a Levee</color> <color=red>Power must be provided from the sides of the small construction site flag</color>"
zhCN = "一种大胆的水坝设计， loosely based on traditional housing.  \n自动泵水。  \n消耗木板进行维护。  \n<color=#00FFFF>作为堤坝工作</color>  \n<color=red>电力必须从小工地旗帜的两侧提供</color>"
zhTW = "一個大膽的水壩設計，鬆散地基於傳統住房。\n自動運行抽水。\n維護消耗木板。\n<color=#00FFFF>作為堤壩運作</color>\n<color=red>必須從小建築工地旗幟的側邊提供電力</color>"
ruRU = "Смелый дизайн плотины, свободно основанный на традиционном жилье. \nРаботает автономно. \nПотребляет доски для обслуживания. \n<color=#00FFFF>Работает как дамба</color> \n<color=red>Энергия должна подаваться с боков флага маленькой строительной площадки</color>"
jaJP = "大胆なダムデザインで、伝統的な住居に loosely 基づいています。  \n自動でポンプを動かします。  \nメンテナンスには板を消費します。  \n<color=#00FFFF>堤防として機能します</color>  \n<color=red>小さな建設現場の旗の側面から電力を供給する必要があります</color>"
frFR = "Un design de barrage audacieux, basé en partie sur des habitations traditionnelles.  \nPompes de manière autonome.  \nConsomme des planches pour l'entretien.  \n<color=#00FFFF>Fonctionne comme une digue</color>  \n<color=red>L'alimentation doit être fournie des côtés du petit drapeau de chantier</color>"
deDE = "Ein gewagtes Dammdesign, das lose auf traditionellen Wohnungen basiert.  \nPumpt autonom.  \nVerbraucht Planken für die Wartung.  \n<color=#00FFFF>Funktioniert als Deich</color>  \n<color=red>Strom muss von den Seiten der kleinen Baustellenflagge bereitgestellt werden</color>"
plPL = "Śmiała konstrukcja tamy, luźno oparta na tradycyjnych budynkach.\nPompowanie odbywa się automatycznie.\nZużywa deski do konserwacji.\n<color=#00FFFF>Działa jak wał</color>\n<color=red>Energia musi być dostarczana z boków małej flagi budowy</color>"
ptBR = "Um projeto de represa audacioso, vagamente baseado em habitações tradicionais.\nAuxiliares funcionam de forma autônoma.\nConsome pranchas para manutenção.\n<color=#00FFFF>Funciona como um dique</color>\n<color=red>A energia deve ser fornecida a partir dos lados da pequena bandeira do canteiro de obras</color>"
koKR = "대담한 댐 디자인으로, 전통 주거 형태에서 loosely 기반합니다.\n자동으로 펌프 작동.\n유지를 위해 판자를 소비합니다.\n<color=#00FFFF>제방으로 작동합니다</color>\n<color=red>작은 건설 현장 깃발의 측면에서 전력이 공급되어야 합니다</color>"
csCZ = "Audacní design hráze, volně založený na tradičním bydlení.\nPumpy autonomně.\nSpotřebovává prkna pro údržbu.\n<color=#00FFFF>Funguje jako hráz</color>\n<color=red>Napájení musí být zajištěno ze stran malého staveništního praporku</color>"
viVN = "Một thiết kế đập táo bạo, dựa trên nhà ở truyền thống.\nBơm tự động.\nTiêu thụ ván để bảo trì.\n<color=#00FFFF>Hoạt động như một đê</color>\n<color=red>Nguồn điện phải được cung cấp từ hai bên cờ của công trường nhỏ</color>"

["Lapantouflemagic.GrandDam.FlavorDescription"]
raw = "\"Soo... strictly speaking, the dam part is... not the housexa0? I don’t know if that is a brilliant idea, or if i should call the gesta-paw…\"\n-The Expedition Leader"
status = "normal"
enUS = "\"Soo... strictly speaking, the dam part is... not the house? I don’t know if that is a brilliant idea, or if I should call the gesta-paw...\"  \n-The Expedition Leader"
zhCN = "“所以……严格来说，大坝部分是……不是房子吗？我不知道这是否是个绝妙的主意，还是我应该叫警犬……”  \n— 探险队队长"
zhTW = "\"所以...嚴格來說，水壩的部分是...不是房子嗎？我不知道這是個聰明的主意，還是我應該叫來警狗…\"\n- 探險隊隊長"
ruRU = "\"Итак... строго говоря, часть со шлюзом это... не дом? Я не знаю, хорошая ли это идея, или мне следует позвонить в геста-пав... \"  \n- Лидер экспедиции"
jaJP = "「そう...厳密に言えば、ダムの部分は...家ではないの？それが素晴らしいアイデアなのか、それともゲスタパウに連絡すべきなのかはわからない…」\n-探検隊のリーダー"
frFR = "Soo... si on veut être précis, la partie barrage c'est... pas la maison ? Je ne sais pas si c'est une idée brillante ou si je devrais appeler la gesta-patte…\"\n-Le Chef d'Expédition"
deDE = "„Also... streng genommen ist der Dammteil... nicht das Haus? Ich weiß nicht, ob das eine geniale Idee ist, oder ob ich die Gesta-Pfote rufen sollte…“  \n- Der Expeditionsleiter"
plPL = "\"Soo... mówiąc ściśle, część tamy to... nie dom? Nie wiem, czy to genialny pomysł, czy może powinienem zadzwonić po gestapaw…\"\n-Przywódca Ekspedycji"
ptBR = "\"Então... tecnicamente, a parte da represa é... não a casa? Eu não sei se isso é uma ideia brilhante, ou se eu deveria chamar o gesta-pata...\"  \n-O Líder da Expedição\""
koKR = "\"음... 엄밀히 말하자면, 댐 부분은... 집이 아니지 않나요? 그게 훌륭한 아이디어인지, 아니면 겐스타-포를 불러야 할지 모르겠어요…”  \n- 탐험대장"
csCZ = "\"Takže... přísně vzato, ta část hráze je... není to dům? Nejdím, jestli je to skvělý nápad, nebo jestli mám zavolat gestu-paw...\"  \n- Vedoucí expedice"
viVN = "\"Soo... nói một cách chính xác, phần đập thì... không phải là ngôi nhà? Tôi không biết đó có phải là một ý tưởng xuất sắc hay không, hoặc tôi nên gọi gesta-paw...\"  \n-Lãnh đạo Đoàn Thám Hiểm"

