status = "normal"
enUS = "\"The best place to store ice, ice cream, or corpses! ... Why are you looking at me like that? YOU brought this disgusting stuff back!\" - Jack the gnawer"
zhCN = "“存放冰块、冰淇淋或尸体的最佳地点！……你为什么用那种眼神看着我？是你带回了这些恶心的东西！”  \n- 啃食者杰克"
zhTW = "“存放冰塊、冰淇淋或屍體的最佳場所！… 你為什麼用那樣的眼神看著我？是你把這些噁心的東西帶回來的！”  \n- 嚼嚼者傑克"
ruRU = "\"Лучшее место для хранения льда, мороженого или трупов! ... Почему вы так на меня смотрите? ЭТО вы принесли это мерзкое барахло обратно!\" - Джек Грызун"
jaJP = "\"氷、アイスクリーム、または死体を保存するのに最適な場所！…どうしてそんな目で見ているの？お前がこの不快なものを持ち帰ったんだろう！\" - ガリガリのジャック"
frFR = "\"Le meilleur endroit pour stocker de la glace, de la crème glacée ou des cadavres ! ... Pourquoi me regardez-vous comme ça ? C'EST VOUS qui avez ramené ces trucs dégoûtants !\" - Jack le rongeur"
deDE = "\"Der beste Ort, um Eis, Eiscreme oder Leichenteile zu lagern! ... Warum schaust du mich so an? DU hast diesen ekelhaftes Zeug zurückgebracht!\" - Jack der Nager"
plPL = "\"Najlepsze miejsce do przechowywania lodu, lodów lub zwłok! ... Dlaczego tak na mnie patrzysz? TO TY przywiozłeś te obrzydliwe rzeczy z powrotem!\" - Jack Gryzoń"
ptBR = "\"O melhor lugar para armazenar gelo, sorvete ou cadáveres! ... Por que você está me olhando assim? VOCÊ trouxe esse lixo nojento de volta!\" - Jack, o roedor"
koKR = "\"얼음, 아이스크림, 또는 시체를 보관하기에 최고의 장소! ... 왜 그렇게 나를 쳐다보는 거지? 네가 이 불쾌한 것을 가져온 거잖아!\"  \n- 쥐를 갉는 자 잭"
csCZ = "\"Nejlepší místo na uskladnění ledu, zmrzliny nebo mrtvol! ... Proč na mě tak koukáte? Vy jste přinesli tyhle odporné věci zpět!\" - Jack, hryzal"
viVN = "\"Nơi tốt nhất để lưu trữ nước đá, kem, hoặc xác chết! ... Tại sao bạn nhìn tôi như vậy? BẠN đã mang những thứ ghê tởm này trở về!\"  \n- Jack the gnawer"

