["Lapantouflemagic.NewWaterPump.Description"]
raw = "Pumps and filters water for beavers to drink.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "Pumps and filters water for beavers to drink. <color=#00FFFF>Works as a Levee</color>"
zhCN = "“为海狸抽水和过滤水源。\n<color=#00FFFF>作为堤坝运作</color>”"
zhTW = "“為獺鼠抽水並過濾水源以便飲用。  \n<color=#00FFFF>作為堤壩使用</color>”"
ruRU = "Насосы и фильтры воду для бобров.  \n<color=#00FFFF>Работает как насыпь</color>"
jaJP = "ビーバーが飲むための水を汲み上げ、ろ過します。<color=#00FFFF>堤防として機能します</color>"
frFR = "Pompent et filtrent l'eau pour que les castors puissent boire. <color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Pumpt und filtert Wasser für Biber zum Trinken. <color=#00FFFF>Funktioniert wie ein Deich</color>"
