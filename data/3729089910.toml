["Faction.waterbeavers.DisplayName"]
new = "The Whitepaws"
status = "normal"

["Faction.waterbeavers.Description"]
new = "\n\n\n\n\n\n\n\n<color=red>xa0!!! ACTIVATE THE TUTORIALxa0!!!</color>\nFollowers of the True Beaver Path, for them everything is a house. Their population often explodes out of control, food and water run out, science is a luxury, and your defeat unavoidable\n\n Forget what other factions taught you, and welcome to your pinkest nightmare.\n<color=red>xa0!!! ACTIVATE THE TUTORIALxa0!!!</color>\n\n\n\n<color=black>Beaver art and textures by Wolfess, huge thanks!\nMany icons by Thorlak, huge thanks too!\nMega-thanks to Grauschweif for the custom scripts !</color>"
status = "normal"

["trashdump.DisplayName"]
new = "Broken Expedition Cart"
status = "normal"

["trashdump.Description"]
new = "Your first district center, if it can be called so. Only dismantle after building a better town center."
status = "normal"

["trashdump.FlavorDescription"]
new = "\"We can't go further, but we can settle here\"\n -The expedition leader"
status = "normal"

