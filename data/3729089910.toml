["Lapantouflemagic.GnawingHall.Description"]
raw = "A long house in which we gnaw on trees, for pleasure or out of necessity.\nHas a <color=#FF6EC7>triangle roof</color>, <color=#FF6EC7>Can support upgrades</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A long house where we gnaw on trees, either for pleasure or out of necessity.  \nHas a <color=#FF6EC7>triangle roof</color>, <color=#FF6EC7>can support upgrades</color>  \n<color=#00FFFF>works as a levee</color>"
zhCN = "一座长屋，我们在这里啃树，出于 pleasure 或必需。\n拥有一个 <color=#FF6EC7>三角屋顶</color>，<color=#FF6EC7>可以支持升级</color>\n<color=#00FFFF>可作为堤坝工作</color>"
zhTW = "一座長屋，我們在裡面啃樹，無論是出於樂趣還是必需。  \n擁有一個<color=#FF6EC7>三角屋頂</color>，<color=#FF6EC7>可以支持升級</color>  \n<color=#00FFFF>作為堤壩運行</color>"
ruRU = "Долгий дом, в котором мы грызем деревья, для удовольствия или из необходимости.\nИмеет <color=#FF6EC7>треугольную крышу</color>, <color=#FF6EC7>может поддерживать улучшения</color>\n<color=#00FFFF>работает как плотина</color>"
jaJP = "木をかじるための長屋、楽しみや必要から。\n<color=#FF6EC7>三角屋根</color>を持ち、<color=#FF6EC7>アップグレードに対応</color>\n<color=#00FFFF>堤防として機能</color>"
frFR = "Une grande maison où nous rongeons des arbres, par plaisir ou par nécessité. \nA un <color=#FF6EC7>toit en triangle</color>, <color=#FF6EC7>peut supporter des améliorations</color> \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Ein langes Haus, in dem wir an Bäumen nagen, aus Vergnügen oder aus Notwendigkeit. Hat ein <color=#FF6EC7>Dreiecks-Dach</color>, <color=#FF6EC7>Kann Upgrades unterstützen</color> <color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Długi dom, w którym przegryzamy drzewa, dla przyjemności lub z konieczności. Ma <color=#FF6EC7>trójkątny dach</color>, <color=#FF6EC7>może wspierać ulepszenia</color> <color=#00FFFF>działa jako wał</color>"
ptBR = "Uma casa longa onde roemos árvores, por prazer ou por necessidade.  \nPossui um <color=#FF6EC7>telhado triangular</color>, <color=#FF6EC7>Pode suportar melhorias</color>  \n<color=#00FFFF>Funciona como uma Dique</color>"
koKR = "나무를 씹는 긴 집, 즐거움이나 필요로 지어졌습니다.  \n<color=#FF6EC7>삼각형 지붕</color>이 있으며, <color=#FF6EC7>업그레이드를 지원합니다</color>  \n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Dlouhý dům, ve kterém okusujeme stromy, pro potěšení nebo z nutnosti. Má <color=#FF6EC7>trojúhelníkovou střechu</color>, <color=#FF6EC7>může podporovat vylepšení</color> <color=#00FFFF>funguje jako hráz</color>"
viVN = "Một ngôi nhà dài nơi chúng ta gặm những cái cây, vì thú vui hoặc vì nhu cầu.\nCó một <color=#FF6EC7>mái nhà hình tam giác</color>, <color=#FF6EC7>Có thể hỗ trợ nâng cấp</color>\n<color=#00FFFF>Hoạt động như một con đê</color>"

