["Lapantouflemagic.BIT.FlavorDescription"]
raw = "\"According to our archives, the traditional name goes back to some frog-eating hooman tribe\"\n -Toothless the Wise, elder beaver"
status = "normal"
enUS = "\"According to our archives, the traditional name goes back to some frog-eating human tribe\" -Toothless the Wise, elder beaver"
zhCN = "“根据我们的档案，传统名称可以追溯到某个吃青蛙的人类部落”  \n-智慧无齿，老年海狸"
zhTW = "「根據我們的檔案，這個傳統名稱源於某個以蛙為食的人類部落。」  \n-智者無牙，老水獺"
ruRU = "\"Согласно нашим архивам, традиционное название восходит к племени людей, едящих лягушек\"  \n- Беззубик Мудрый, старейшина бобров"
jaJP = "「私たちのアーカイブによると、伝統的な名前はカエルを食べる人間の部族に遡ります。」  \n - 賢者トゥースレス、年老いたビーバー"
frFR = "\"Selon nos archives, le nom traditionnel remonte à une tribu de hoomans mangeurs de grenouilles.\"  \n- Dents de Lait le Sage, castor aîné"
deDE = "\"Nach unseren Aufzeichnungen stammt der traditionelle Name von einem frog-essenden Menschenstamm.\"  \n- Zahnlos der Weise, alter Biber"
plPL = "\"Według naszych archiwów, tradycyjna nazwa sięga plemienia ludzi, którzy jedli żaby\" \n- Bezzębny Mądry, starszy bóbr"
ptBR = "De acordo com nossos arquivos, o nome tradicional remonta a uma tribo de humanos que come rãs\"  \n- Dente de Leite, o velho castor"
koKR = "\"우리의 기록에 따르면, 전통적인 이름은 개구리를 먹는 인간 부족으로 거슬러 올라갑니다.\"  \n- 지혜로운 이빨 없는 비버, 장로"
csCZ = "\"Podle našich archivů, tradiční název pochází z nějakého kmene lidí, kteří jedli žáby.\"  \n- Bezubec Moudrý, starý bobr"
viVN = "Như tài liệu của chúng tôi ghi nhận, tên truyền thống có nguồn gốc từ một bộ lạc người thích ăn ếch\"  \n- Răng Mòi, lão già hải ly"

