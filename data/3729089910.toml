["Lapantouflemagic.Clinic.Description"]
raw = "A large house where a live-in nurse tends to wounded beavers.\nTreats benign conditions with twice the efficacy of a medical bed.\nCan also manufacture advanced medicine to treat severe conditions.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A large house where a live-in nurse tends to wounded beavers.  \nTreats benign conditions with twice the efficacy of a medical bed.  \nCan also manufacture advanced medicine to treat severe conditions.  \n<color=#00FFFF>Works as a Levee</color>"
zhCN = "一座大型房屋，住院护士负责照顾受伤的海狸。\n治愈良性疾病的效果是医疗床的两倍。\n还可以制造高级药物来治疗严重病症。\n<color=#00FFFF>作为一个堤坝工作</color>"
zhTW = "一座大型房屋，提供住家護理的護士照顧受傷的海狸。  \n以雙倍於醫療床的效能治療良性病症。  \n還可以製造先進的藥物來治療嚴重病症。  \n<color=#00FFFF>作為壩堤使用</color>"
ruRU = "Большой дом, где медсестра на постоянной основе заботится о раненых бобрах. Лечит доброкачественные состояния с удвоенной эффективностью по сравнению с медицинской койкой. Также может производить продвинутые медикаменты для лечения тяжелых состояний. <color=#00FFFF>Работает как дамба</color>"
jaJP = "「住み込みの看護師が負傷したビーバーの手当てをする大きな家。\n医療ベッドの2倍の効果で良性の症状を治療します。\n重篤な症状を治療するための高度な薬も製造可能です。\n<color=#00FFFF>堤防として機能します</color>」"
frFR = "Une grande maison où une infirmière résidente s'occupe des castors blessés. \nTraite des affections bénignes avec deux fois l'efficacité d'un lit médical. \nPeut également fabriquer des médicaments avancés pour traiter des affections graves. \n<color=#00FFFF>Fonctionne comme un levee</color>"
deDE = "Ein großes Haus, in dem eine Pflegerin sich um verletzte Biber kümmert. \nBehandelt gutartige Erkrankungen mit doppelt so viel Wirksamkeit wie ein medizinisches Bett. \nKann auch fortschrittliche Medizin herstellen, um schwere Erkrankungen zu behandeln. \n<color=#00FFFF>Funktioniert als Damm</color>"
plPL = "Duży dom, w którym mieszka pielęgniarka zajmująca się rannymi bobrami. \nLeczy łagodne schorzenia z dwukrotnie większą skutecznością niż łóżko medyczne. \nMoże także wytwarzać zaawansowane leki do leczenia poważnych schorzeń. \n<color=#00FFFF>Funkcjonuje jako Tam</color>"
ptBR = "Uma grande casa onde uma enfermeira residente cuida de castores feridos. Trata condições benignas com o dobro da eficácia de uma cama médica. Também pode fabricar medicamentos avançados para tratar condições severas. <color=#00FFFF>Funciona como um Dique</color>"
koKR = "중환자를 돌보는 간호사가 상주하는 큰 집입니다.  \n의료 침대의 두 배 효율로 양성 질환을 치료합니다.  \n심각한 질환을 치료하기 위해 고급 약도 제조할 수 있습니다.  \n<color=#00FFFF>제방으로도 기능합니다</color>"
csCZ = "Velký dům, kde se o zraněné bobry stará domácí zdravotní sestra. Léčí benigní stavy s dvojnásobnou účinností medicínské postele. Také může vyrábět pokročilé léky na léčbu závažných stavů. <color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một ngôi nhà lớn nơi một y tá sống tại chỗ chăm sóc các con castor bị thương. \nChữa trị các bệnh lành tính với hiệu quả gấp đôi so với giường y tế. \nCũng có thể sản xuất thuốc tiên tiến để điều trị các bệnh nghiêm trọng. \n<color=#00FFFF>Hoạt động như một Đê</color>"

