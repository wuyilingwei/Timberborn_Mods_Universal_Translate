["Lapantouflemagic.2x2LousyWarehouse.Description"]
raw = "A somewhat tidy space to store resources properly."
status = "normal"
enUS = "A somewhat tidy space to store resources properly."
zhCN = "一个相对整洁的空间，用于妥善存放资源。"
zhTW = "一個相對整潔的空間，用於妥善存放資源。"
ruRU = "Довольно аккуратное место для правильного хранения ресурсов."
jaJP = "リソースを適切に保管するための、やや整頓されたスペースです。"
frFR = "Un espace relativement bien rangé pour stocker correctement les ressources."
deDE = "Ein einigermaßen ordentlicher Platz, um Ressourcen richtig zu lagern."
plPL = "Dość uporządkowana przestrzeń do przechowywania zasobów."
ptBR = "Um espaço relativamente organizado para armazenar os recursos adequadamente."
koKR = "자원을 적절하게 저장할 수 있는 다소 깔끔한 공간입니다."
csCZ = "Částečně uklizený prostor pro správné skladování zdrojů."
