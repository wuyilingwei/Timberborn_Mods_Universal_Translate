["Lapantouflemagic.DoubleRopestairs.Description"]
raw = "Allows to access elevated spaces without requiring support directly under it.\nThe support voxels at either ends won’t be able to accept side platform, or another rope stairs."
status = "normal"
enUS = "Allows access to elevated spaces without requiring support directly underneath. The support voxels at either end won’t be able to accept side platforms or another rope stair."
zhCN = "“允许访问高处空间而无需在其下方提供支撑。\n两端的支撑体素将无法接受侧面平台或其他绳索楼梯。”"
zhTW = "允許在不需要直接支撐於下方的情況下進入高架空間。\n兩端的支撐體素無法接受側向平台或其他繩梯。"
ruRU = "Позволяет получить доступ к возвышенным пространствам без необходимости в опоре непосредственно под ним. Воксели опоры на обоих концах не смогут принимать боковую платформу или другие веревочные лестницы."
jaJP = "「直接下に支持がなくても、高所にアクセスできるようになります。\n両端の支持ボクセルでは、サイドプラットフォームや別のロープ階段を受け入れることができません。」"
frFR = "Permet d'accéder à des espaces surélevés sans nécessiter de support directement en dessous. Les voxels de support aux deux extrémités ne pourront pas accepter de plateforme latérale, ni d'autres escaliers en corde."
deDE = "Ermöglicht den Zugang zu erhöhten Räumen, ohne dass eine Unterstützung direkt darunter erforderlich ist. Die Unterstützungs-Voxel an beiden Enden können keine seitlichen Plattformen oder andere Seileiter akzeptieren."
plPL = "Pozwala na dostęp do podwyższonych przestrzeni bez potrzeby wsparcia bezpośrednio pod nimi. Woksel wsparcia na końcach nie będą mogły akceptować bocznych platform ani innych schodów linowych."
ptBR = "Permite acessar espaços elevados sem exigir suporte diretamente embaixo.\nOs voxels de suporte em ambas as extremidades não poderão aceitar plataforma lateral ou outra escada de corda."
koKR = "지지를 필요로 하지 않고 높은 공간에 접근할 수 있습니다. 양쪽 끝의 지지 복셀은 측면 플랫폼이나 다른 로프 계단을 받을 수 없습니다."
csCZ = "Umožňuje přístup do vyvýšených prostor bez nutnosti podpory přímo pod nimi. Podpůrné voxely na obou koncích nebudou schopny přijmout boční platformu nebo další lanové schody."
viVN = "Cho phép truy cập vào các không gian cao mà không cần hỗ trợ trực tiếp bên dưới. Các voxel hỗ trợ ở hai đầu sẽ không thể nhận nền bên hoặc cầu thang dây khác."

