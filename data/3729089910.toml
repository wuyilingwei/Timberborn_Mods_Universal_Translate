["Lapantouflemagic.Tent_Miserable.FrostyWhiskers.Description"]
raw = "A basic shelter that technically separates its occupants from the elements.\nMust be build agains a cliff.\nEntrances can be chained."
status = "normal"
enUS = "A basic shelter that technically separates its occupants from the elements. Must be built against a cliff. Entrances can be chained."
