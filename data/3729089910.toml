zhTW = "<color=red>這個東西已經過時，缺少一些新功能！有機會時請用新的替換它。</color>"
ruRU = "<color=red>Эта вещь устарела и не имеет некоторых новых функций! Замените её на новую, когда будет возможность.</color>"
