["Lapantouflemagic.SmallForge.Description"]
raw = "A proper logding for an anvil, and the beavers using it.\nHas a <color=#FF6EC7>triangle roof</color>, <color=#FF6EC7>Can support upgrades</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A proper lodging for an anvil and the beavers using it. Has a <color=#FF6EC7>triangle roof</color>, <color=#FF6EC7>can support upgrades</color> <color=#00FFFF>works as a levee</color>."
zhCN = "“一个适合铁砧的适当住所，以及使用它的海狸。\n有一个<color=#FF6EC7>三角屋顶</color>，<color=#FF6EC7>可以支持升级</color>\n<color=#00FFFF>作为堤坝使用</color>”"
zhTW = "一個合適的鍛造架，供鐵砧和使用它的海狸們使用。\n擁有一個<color=#FF6EC7>三角屋頂</color>，<color=#FF6EC7>可以支持升級</color>\n<color=#00FFFF>作為堤壩使用</color>"
ruRU = "Надлежащее помещение для наковальни и бобров, использующих её. Имеет <color=#FF6EC7>треугольную крышу</color>, <color=#FF6EC7>может поддерживать улучшения</color> <color=#00FFFF>работает как плотина</color>"
jaJP = "「ハンマーのための適切な宿泊施設で、ビーバーたちが使用しています。\n<color=#FF6EC7>三角屋根</color>を持ち、<color=#FF6EC7>アップグレードをサポート</color>\n<color=#00FFFF>堤防として機能します</color>」"
frFR = "Un logement approprié pour une enclume, et les castors qui l'utilisent.  \nA un <color=#FF6EC7>toit en triangle</color>, <color=#FF6EC7>peut supporter des améliorations</color>  \n<color=#00FFFF>Fonctionne comme une levée</color>"
deDE = "Eine geeignete Unterbringung für einen Amboss und die Biber, die ihn benutzen.\nHat ein <color=#FF6EC7>Dach in Form eines Dreiecks</color>, <color=#FF6EC7>Kann Upgrades unterstützen</color>\n<color=#00FFFF>Funktioniert als Damm</color>"
plPL = "Właściwe miejsce na kowadło i bobry, które z niego korzystają. \nMa <color=#FF6EC7>trójkątny dach</color>, <color=#FF6EC7>może wspierać ulepszenia</color> \n<color=#00FFFF>działa jak wał</color>"
ptBR = "Um local adequado para uma bigorna e os castores que a utilizam. \nPossui um <color=#FF6EC7>telhado triangular</color>, <color=#FF6EC7>pode suportar melhorias</color> \n<color=#00FFFF>Funciona como uma Barragem</color>"
koKR = "망치에 적합한 대피소로, 이를 사용하는 비버들이 있습니다.\n<color=#FF6EC7>삼각 지붕</color>을 가지고 있으며, <color=#FF6EC7>업그레이드를 지원할 수 있습니다</color>.\n<color=#00FFFF>제방 역할을 합니다</color>."
csCZ = "Správné místo pro kovadlinu a bobry, kteří ji používají. Má <color=#FF6EC7>trojúhelníkovou střechu</color>, <color=#FF6EC7>může podporovat vylepšení</color> <color=#00FFFF>funguje jako hráz</color>"
viVN = "Một chỗ ở hợp lý cho một cái đe và các chú beaver sử dụng nó. \nCó một <color=#FF6EC7>mái nhà hình tam giác</color>, <color=#FF6EC7>Có thể hỗ trợ nâng cấp</color> \n<color=#00FFFF>Hoạt động như một cơ đê</color>"

["Lapantouflemagic.SmallForge.FlavorDescription"]
raw = "“Bam ! One for daddy. Pow ! One for mommy. Wham ! One straight in Bobby’s teeth…”"
status = "normal"
enUS = "Bam! One for daddy. Pow! One for mommy. Wham! One straight in Bobby's teeth..."
zhCN = "“砰！给爸爸一个。哐！给妈妈一个。啪啪！直接给博比的牙齿来一个…”"
zhTW = "「砰！給爸爸一個。啪！給媽媽一個。轟！直接給鮑比一顆……」"
ruRU = "Бам! Один для папы. Пау! Один для мамы. Хвам! Один прямиком в зубы Бобби..."
jaJP = "「バン！パパの分だ。パウ！ママの分だ。ワム！ボビーの歯に一直線…」"
frFR = "« Bam ! Un pour papa. Pow ! Un pour maman. Wham ! Un directement dans les dents de Bobby… »"
deDE = "„Bam! Eines für Papa. Pow! Eines für Mama. Wham! Eines direkt ins Bobby's Gebiss…“"
plPL = "„Bam! Jeden dla tatusia. Pow! Jeden dla mamusi. Wham! Prosto w zęby Bobby'ego…”"
ptBR = "“Bam! Um para o papai. Pow! Um para a mamãe. Wham! Um bem nos dentes do Bobby…”"
koKR = "“쿵! 아빠를 위한 하나. 팡! 엄마를 위한 하나. 쾅! 보비의 이빨에 하나…”"
csCZ = "„Bam! Jedna pro tatínka. Pow! Jedna pro maminku. Wham! Jedna rovnou do Bobbýho zubů…“"
viVN = "“Bam! Một cái cho bố. Pow! Một cái cho mẹ. Wham! Một cái thẳng vào răng của Bobby…”"

