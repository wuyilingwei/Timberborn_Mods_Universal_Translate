["Lapantouflemagic.NewFloodgateDam.Description"]
raw = "A complex but extremely convenient dam piece which wall can be raised or lowered to control water flow."
status = "normal"
enUS = "A complex but extremely convenient dam piece whose wall can be raised or lowered to control water flow."
zhCN = "一个复杂但极为便捷的水坝构件，其墙体可以升降以控制水流。"
zhTW = "“一個複雜但非常方便的水壩組件，其牆可以升高或降低以控制水流。”"
ruRU = "Сложный, но крайне удобный элемент дамбы, который можно поднять или опустить, чтобы регулировать поток воды."
jaJP = "水流を制御するために壁を上げ下げできる、複雑だが非常に便利なダムの部品です。"
frFR = "Un morceau de barrage complexe mais extrêmement pratique dont le mur peut être monté ou abaissé pour contrôler le débit d'eau."
deDE = "Ein komplexes, aber äußerst praktisches Dammstück, dessen Wand angehoben oder abgesenkt werden kann, um den Wasserfluss zu kontrollieren."
plPL = "Składnik zapory o skomplikowanej, ale niezwykle wygodnej budowie, którego ściana może być podnoszona lub opuszczana w celu kontrolowania przepływu wody."
ptBR = "Uma peça de dam muito conveniente e complexa, cuja parede pode ser levantada ou abaixada para controlar o fluxo da água."
koKR = "복잡하지만 매우 편리한 댐 조각으로, 벽을 높이거나 낮춰 물 흐름을 조절할 수 있습니다."
csCZ = "Složitý, ale extrémně praktický kus hráze, jehož stěna může být zvednuta nebo spuštěna pro ovládání toku vody."
viVN = "Một mảnh đập phức tạp nhưng vô cùng tiện lợi, tường có thể được nâng lên hoặc hạ xuống để điều khiển dòng chảy của nước."

