["Lapantouflemagic.ZauerKrautBarrel.Description"]
raw = "A pile of barrels that can be filled with different things that are left to ferment, pickle or decompose.\n<color=#FF6EC7>Can function without workers.</color>"
status = "normal"
enUS = "A pile of barrels that can be filled with different things that are left to ferment, pickle, or decompose.  \n<color=#FF6EC7>Can function without workers.</color>"
zhCN = "“一堆可以装填不同物品的桶，允许其发酵、腌制或腐烂。<color=#FF6EC7>可以在没有工人的情况下运作。</color>”"
zhTW = "一堆可以裝填不同物品的桶，這些物品可以發酵、醃漬或分解。  \n<color=#FF6EC7>可在無工人的情況下運作。</color>"
ruRU = "Куча бочек, которые можно заполнить разными вещами для брожения, маринования или разложения.  \n<color=#FF6EC7>Может функционировать без рабочих.</color>"
jaJP = "「さまざまな物を詰め込んで発酵、漬け込み、または分解させることができる樽の山。\n<color=#FF6EC7>労働者なしで機能します。</color>」"
frFR = "Une pile de barils qui peuvent être remplis de différentes choses laissées à fermenter, mariner ou se décomposer.  \n<color=#FF6EC7>Peut fonctionner sans travailleurs.</color>"
deDE = "Ein Haufen Fässer, die mit verschiedenen Dingen gefüllt werden können, die zur Fermentation, Einlege- oder Zersetzung gelassen werden.  \n<color=#FF6EC7>Kann ohne Arbeiter betrieben werden.</color>"
plPL = "Stos beczek, które można napełniać różnymi rzeczami, które fermentują, kiszą się lub rozkładają.  \n<color=#FF6EC7>Może funkcjonować bez pracowników.</color>"
ptBR = "Uma pilha de barris que podem ser preenchidos com diferentes coisas que ficam para fermentar, conservar ou decompor.\n<color=#FF6EC7>Pode funcionar sem trabalhadores.</color>"
koKR = "다양한 것들로 채워져 발효, 절임 또는 분해될 수 있는 배럴 더미입니다.\n<color=#FF6EC7>일 없이 작동할 수 있습니다.</color>"
csCZ = "Hromada sudů, které mohou být naplněny různými věcmi, jež jsou ponechány k fermentaci, nakládání nebo rozkladu.  \n<color=#FF6EC7>Mohou fungovat bez pracovníků.</color>"
viVN = "Một đống thùng có thể được đổ đầy với những thứ khác nhau để lên men, dưa hoặc phân hủy.  \n<color=#FF6EC7>Có thể hoạt động mà không cần công nhân.</color>"

["Lapantouflemagic.ZauerKrautBarrel.FlavorDescription"]
raw = "\"A closed space that no one ever opens? Interesting...\"\n -Jack the Gnawer"
status = "normal"
enUS = "\"A closed space that no one ever opens? Interesting...\"  \n-Jack the Gnawer"
zhCN = "“一个从未被打开的封闭空间？有趣……”  \n- 啃噬者杰克"
zhTW = "「一個從未有人打開的封閉空間？有趣……」  \n- 咬噬者傑克"
ruRU = "\"Закрытое пространство, которое никто никогда не открывает? Интересно...\"\n -Джек Грызун"
jaJP = "「誰も開けることのない閉ざされた空間？面白い…」 - ジャック・ザ・ノーワー"
frFR = "\"Un espace fermé que personne n'ouvre jamais ? Intéressant...\" -Jack le Rongeur"
deDE = "„Ein geschlossener Raum, den niemand je öffnet? Interessant...“  \n-Jack der Nager"
plPL = "\"Zamknięta przestrzeń, której nikt nigdy nie otwiera? Ciekawe...\" - Jack Gryzacz"
ptBR = "Um espaço fechado que ninguém nunca abre? Interessante... - Jack, o Roedor"
koKR = "\"아무도 열지 않는 닫힌 공간? 흥미롭군요...\"\n- 잭 더 너워"
csCZ = "\"Zavřený prostor, který nikdo nikdy neotevře? Zajímavé...\" -Jack Hryzal"
viVN = "\"Một không gian kín mà không ai bao giờ mở? Thú vị...\" \n-Jack the Gnawer"

["Lapantouflemagic.Factory.Description"]
raw = "A large industrial building for melting metal into steel and manufacturing order-made items.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A large industrial building for melting metal into steel and manufacturing custom-made items. <color=#00FFFF>Functions as a Levee</color>"
zhCN = "一个大型工业建筑，专门用于将金属熔化为钢，并制造定制商品。  \n<color=#00FFFF>作为堤坝使用</color>"
zhTW = "一座大型工業建築，用於將金屬熔化成鋼以及製造訂製物品。  \n<color=#00FFFF>作為堤壩使用</color>"
ruRU = "Большое промышленное здание для переплавки металла в сталь и производства изделий на заказ. <color=#00FFFF>Работает как плотина</color>"
jaJP = "金属を溶かして鋼を作り、オーダーメイドのアイテムを製造するための大きな工業ビルです。<color=#00FFFF>堤防として機能します</color>"
frFR = "Un grand bâtiment industriel pour fondre le métal en acier et fabriquer des objets sur commande. <color=#00FFFF>Agit comme une levée</color>"
deDE = "Ein großes Industriegebäude zum Schmelzen von Metall zu Stahl und zur Herstellung maßgeschneiderter Artikel. <color=#00FFFF>Funktioniert wie ein Damm</color>"
plPL = "Duża budowla przemysłowa do topienia metalu w stal i produkcji przedmiotów na zamówienie. <color=#00FFFF>Działa jako Tamą</color>"
ptBR = "Uma grande construção industrial para derreter metal em aço e fabricar itens sob encomenda. <color=#00FFFF>Funciona como uma Barragem</color>"
koKR = "금속을 녹여 강철로 만드는 대형 산업 건물이며, 맞춤형 아이템을 제조합니다. <color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Velká průmyslová budova na tavení kovu na ocel a výrobu zakázkových předmětů. <color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một tòa nhà công nghiệp lớn để nấu chảy kim loại thành thép và sản xuất các mặt hàng theo yêu cầu.  \n<color=#00FFFF>Hoạt động như một con đê</color>"

["Lapantouflemagic.TreeNursery.Description"]
raw = "A specialized building in which experienced forester beavers carefully tend to tiny saplings and grow exotic species before planting them outside.\n<color=red>The house body can connect from the bottom to a ladder or pit-and-ladder lodge.</color>"
status = "normal"
enUS = "A specialized building in which experienced forester beavers carefully tend to tiny saplings and grow exotic species before planting them outside.  \n<color=red>The house body can connect from the bottom to a ladder or pit-and-ladder lodge.</color>"
zhCN = "在一个专门的建筑中，经验丰富的砍树海狸小心翼翼地照料微小的幼苗，并培育异国物种，然后再将它们种植到户外。  \n<color=red>房子主体可以从底部连接到梯子或坑梯小屋。</color>"
zhTW = "一個專門的建築，經驗豐富的林務員海狸在這裡仔細照料小樹苗，培育異國植物，然後再將它們種植在戶外。\n<color=red>房屋底部可以連接到梯子或坑與梯子的旅館。</color>"
ruRU = "Специализированное здание, в котором опытные лесоводы-бобры тщательно ухаживают за крошечными саженцами и выращивают экзотические виды перед их высадкой на улицу.  \n<color=red>Корпус дома может соединяться снизу с лестницей или хранилищем с лестницей.</color>"
jaJP = "経験豊かな林業ビーバーが小さな苗木を丁寧に育て、外に植える前に珍しい種を育成するための専門的な建物です。\n<color=red>建物の本体は、下からは梯子またはピット＆ラダーロッジに接続できます。</color>"
frFR = "Un bâtiment spécialisé où des castors forestiers expérimentés s'occupent soigneusement de minuscules jeunes arbres et cultivent des espèces exotiques avant de les planter à l'extérieur.  \n<color=red>Le corps de la maison peut se connecter par le bas à une échelle ou à un pavillon à échelle et fossé.</color>"
deDE = "Ein spezialisiertes Gebäude, in dem erfahrene Forsthalter-Biber sorgfältig kleine Setzlinge pflegen und exotische Arten züchten, bevor sie sie im Freien pflanzen.  \n<color=red>Der Gebäudekörper kann von unten mit einer Leiter oder einer Grube-und-Leiter-Hütte verbunden werden.</color>"
plPL = "Specjalizowany budynek, w którym doświadczeni bobry leśnicy starannie pielęgnują maleńkie sadzonki i hodują egzotyczne gatunki przed ich posadzeniem na zewnątrz.  \n<color=red>Ciało domu może łączyć się od dołu z drabiną lub chatką z drabiną i dołem.</color>"
ptBR = "Um edifício especializado onde castores experientes cuidam cuidadosamente de pequenos brotos e cultivam espécies exóticas antes de plantá-las do lado de fora.  \n<color=red>O corpo da casa pode se conectar por baixo a uma escada ou a um alojamento de escada e fossa.</color>"
koKR = "경험이 풍부한 나무 관리 비버들이 작은 묘목을 세심하게 돌보고 이색 종을 기른 후 바깥에 심는 전문 건물입니다.  \n<color=red>건물의 바닥은 사다리나 구덩이-사다리 오두막과 연결할 수 있습니다.</color>"
csCZ = "Specializovaná budova, ve které zkušení bobři lesníci pečlivě pečují o malé sazenice a pěstují exotické druhy, než je vysadí ven.  \n<color=red>Tělo domu se může spojit zespodu s žebříkem nebo příkopovým a žebříkovým srubem.</color>"
viVN = "Đây là một tòa nhà chuyên dụng nơi những con nhím lái ván đầy kinh nghiệm chăm sóc những cây con nhỏ và phát triển các loài kỳ lạ trước khi trồng chúng ở bên ngoài.  \n<color=red>Thân nhà có thể kết nối từ dưới lên một cái thang hoặc một chòi thang-pit.</color>"

