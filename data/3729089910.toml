["Lapantouflemagic.Aqueduct_Short.Description"]
raw = "A heavy duty bridge to carry an entire river.\nThe metal rings need to snap on <color=green>Giant Pillars</color>."
status = "normal"
enUS = "A heavy duty bridge to carry an entire river. The metal rings need to snap on <color=green>Giant Pillars</color>."
zhCN = "一个重型桥梁，可以承载整条河流。\n金属环需要扣在<color=green>巨型柱子</color>上。"
zhTW = "一座堅固的橋樑，用來承載整條河流。金屬環需要緊扣於<color=green>巨型柱子</color>上。"
ruRU = "Мост повышенной прочности для пересечения целой реки. Металлические кольца должны защёлкиваться на <color=green>Гигантских Столбах</color>."
jaJP = "「全ての川を運ぶための頑丈な橋。\n金属のリングは<color=green>巨大な柱</color>に嵌める必要があります。」"
frFR = "Un pont robuste pour faire traverser une rivière entière.  \nLes anneaux métalliques doivent se fixer sur les <color=green>Piliers Géants</color>."
deDE = "Eine robuste Brücke, um einen ganzen Fluss zu überqueren.  \nDie Metallringe müssen sich an <color=green>riesigen Säulen</color> befestigen."
plPL = "Most ciężki do przenoszenia całej rzeki. Metalowe pierścienie muszą zostać zapięte na <color=green>Gigantycznych Filarach</color>."
ptBR = "Uma ponte robusta para transportar um rio inteiro.  \nOs anéis de metal precisam se encaixar nos <color=green>Grandes Pilares</color>."
koKR = "하천 전체를 지탱할 수 있는 강력한 교량입니다. 금속 링은 <color=green>거대 기둥</color>에 맞춰야 합니다."
csCZ = "Těžký most na přenášení celého řeku. Metalové kroužky se musí zaklapnout na <color=green>Obří sloupy</color>."
viVN = "Cầu chịu lực nặng để mang theo toàn bộ dòng sông. Các vòng kim loại cần phải gắn vào <color=green>Cột Khổng Lồ</color>."

