["Lapantouflemagic.ScoutBalloon.Description"]
raw = "A basic hot air ballon tasked with exploring the lands away from our town in search of other settlements to establish trade routes with."
status = "normal"
enUS = "A basic hot air balloon tasked with exploring the lands away from our town in search of other settlements to establish trade routes with."
zhCN = "一只基本的热气球，负责探索离我们小镇较远的土地，以寻找其他定居点以建立贸易路线。"
zhTW = "一個基本的熱氣球，負責探索我們城鎮以外的土地，尋找其他定居點以建立貿易路線。"
ruRU = "Основной воздушный шар, предназначенный для исследования земель вдали от нашего города в поисках других поселений для установления торговых маршрутов."
jaJP = "「私たちの町から離れた土地を探検し、貿易ルートを確立するための他の集落を探す任務を持つ基本的な気球です。」"
frFR = "Un ballon à air chaud de base chargé d'explorer les terres éloignées de notre ville à la recherche d'autres établissements pour établir des routes commerciales."
deDE = "Ein einfacher Heißluftballon, der damit beauftragt ist, die Gebiete außerhalb unserer Stadt zu erkunden, um andere Siedlungen zu finden, mit denen Handelsrouten eingerichtet werden können."
plPL = "Podstawowy balon na gorące powietrze, którego zadaniem jest eksploracja terenów oddalonych od naszego miasta w poszukiwaniu innych osad w celu nawiązania szlaków handlowych."
ptBR = "Um balão de ar quente básico encarregado de explorar as terras afastadas de nossa cidade em busca de outros assentamentos para estabelecer rotas comerciais."
koKR = "타운에서 떨어진 지역을 탐험하여 무역 경로를 설정할 다른 정착지를 찾는 임무를 맡은 기본 열기구입니다."
csCZ = "Základní horkovzdušný balón určený k prozkoumávání oblastí daleko od našeho města ve snaze najít další osady a navázat obchodní cesty."
viVN = "Một chiếc bóng bay khí nóng cơ bản được giao nhiệm vụ khám phá những vùng đất xa xôi khỏi thị trấn của chúng ta để tìm kiếm các khu định cư khác nhằm thiết lập các tuyến thương mại."

