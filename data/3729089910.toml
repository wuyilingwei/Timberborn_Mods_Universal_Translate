["Lapantouflemagic.NewCentrifuge.Description"]
raw = "A tall hourglass-shaped centrifuge used to purify nuclear fuel from hooman nuclear waste.\nAlso acts as a somewhat impractical dwelling for the sake of upholding tradition.\n<color=#FF6EC7>Can function without workers.</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A tall hourglass-shaped centrifuge used to purify nuclear fuel from human nuclear waste. Also acts as a somewhat impractical dwelling for the sake of upholding tradition. <color=#FF6EC7>Can function without workers.</color> <color=#00FFFF>Works as a Levee</color>"
zhCN = "一个高挑的沙漏形离心机，用于从人类核废料中提纯核燃料。  \n同时，出于保持传统的考虑，它也算是一种不太实用的居所。  \n<color=#FF6EC7>可以在没有工人的情况下运行。</color>  \n<color=#00FFFF>作为堤坝使用。</color>"
zhTW = "一個高大的沙漏形狀離心機，用於淨化來自人類核廢料的核燃料。  \n同時它也作為一個有些不實用的居所，以維護傳統。  \n<color=#FF6EC7>可以不需要工人運作。</color>  \n<color=#00FFFF>作為堤壩運作</color>"
ruRU = "Высокая центрифуга в виде песочных часов, используемая для очистки ядерного топлива от человеческих ядерных отходов. Также служит несколько непрактичным жилищем ради соблюдения традиции.  \n<color=#FF6EC7>Может функционировать без рабочих.</color>  \n<color=#00FFFF>Работает как дамба</color>"
jaJP = "「人間の核廃棄物から核燃料を精製するために使用される高い砂時計型の遠心分離機。伝統を守るために、いささか実用的でない住居としても機能します。<color=#FF6EC7>労働者なしで機能できます。</color><color=#00FFFF>堤防として機能します。</color>」"
frFR = "Une grande centrifuge en forme de sablier utilisée pour purifier le combustible nucléaire des déchets nucléaires humanoïdes. Sert également de logement quelque peu impraticable pour le respect de la tradition. <color=#FF6EC7>Peut fonctionner sans ouvriers.</color> <color=#00FFFF>Fonctionne comme une levée</color>"
deDE = "Eine hohe, sanduhrförmige Zentrifuge, die verwendet wird, um nuklearen Brennstoff von menschlichem nuklearem Abfall zu reinigen.  \nDient auch als etwas unpraktische Unterkunft, um die Tradition aufrechtzuerhalten.  \n<color=#FF6EC7>Kann ohne Arbeiter funktionieren.</color>  \n<color=#00FFFF>Funktioniert als Damm</color>"
plPL = "Wysoka wirówka w kształcie klepsydry wykorzystywana do oczyszczania paliwa nuklearnego z ludzkich odpadów nuklearnych. \nSłuży również jako dość nietypowe mieszkanie dla podtrzymania tradycji. \n<color=#FF6EC7>Może funkcjonować bez pracowników.</color> \n<color=#00FFFF>Działa jak tama</color>"
ptBR = "Uma centrífuga alta em forma de ampulheta usada para purificar combustível nuclear de resíduos nucleares humanos. Também serve como uma moradia um tanto impraticável para preservar a tradição. <color=#FF6EC7>Pode funcionar sem trabalhadores.</color> <color=#00FFFF>Funciona como um dique</color>"
koKR = "인간의 핵 폐기물로부터 핵 연료를 정화하는 데 사용되는 긴 모래시계 형태의 원심분리기입니다. 전통을 지키기 위해 다소 비현실적인 거주지 역할도 합니다. <color=#FF6EC7>근무자 없이도 작동할 수 있습니다.</color> <color=#00FFFF>제방으로 작동합니다.</color>"
csCZ = "Vysoká centrifuga ve tvaru přesýpacích hodin používaná k čištění jaderného paliva od lidského jaderného odpadu. Také slouží jako poněkud nepraktické obydlí pro zachování tradice.  \n<color=#FF6EC7>Mohou fungovat bez pracovníků.</color>  \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một chiếc ly tâm hình đồng hồ cát cao dùng để tinh chế nhiên liệu hạt nhân từ chất thải hạt nhân của loài người.  \nCũng hoạt động như một chỗ ở tương đối không thực tế để duy trì truyền thống.  \n<color=#FF6EC7>Có thể hoạt động mà không cần công nhân.</color>  \n<color=#00FFFF>Hoạt động như một đê chắn nước</color>"

["Lapantouflemagic.NewCentrifuge.FlavorDescription"]
raw = "Thankfully, some beavers are capable of sleeping even in the most unlikely circumstances."
status = "normal"
enUS = "Thankfully, some beavers are capable of sleeping even in the most unlikely circumstances."
zhCN = "幸运的是，有些海狸即使在最不可能的情况下也能睡觉。"
zhTW = "幸運的是，一些海狸即使在最不可能的情況下也能睡覺。"
ruRU = "К счастью, некоторые бобры способны спать даже в самых маловероятных обстоятельствах."
jaJP = "「ありがたいことに、一部のビーバーは最も考えられない状況でも眠ることができます。」"
frFR = "Heureusement, certains castors sont capables de dormir même dans les circonstances les plus improbables."
deDE = "Gott sei Dank sind einige Biber sogar in den unwahrscheinlichsten Umständen fähig zu schlafen."
plPL = "Na szczęście niektóre bobry potrafią zasypiać nawet w najbardziej nieprawdopodobnych okolicznościach."
ptBR = "Ainda bem que alguns castores são capazes de dormir mesmo nas circunstâncias mais improváveis."
koKR = "다행히도, 일부 비버는 가장 불리한 상황에서도 잠을 잘 수 있는 능력을 가지고 있다."
csCZ = "Naštěstí někteří bobři jsou schopni spát i v těch nejnepravděpodobnějších podmínkách."
viVN = "May mắn thay, một vài con hải ly có khả năng ngủ ngay cả trong những hoàn cảnh không thể ngờ tới."

