["Lapantouflemagic.ClockWorkKitchen.Description"]
raw = "A complex device that masterfully transforms mechanical power and raw food into tasty stuff. \nOccasionally breaks a gear.\nOccasionally cooks a beaver.\n<color=red>Power must be provided from underneath the small construction site flag</color>"
status = "normal"
enUS = "A complex device that masterfully transforms mechanical power and raw food into tasty stuff. Occasionally breaks a gear. Occasionally cooks a beaver. <color=red>Power must be provided from underneath the small construction site flag</color>"
zhCN = "一个复杂的设备，巧妙地将机械动力和原料转化为美味的食物。\n偶尔会损坏一个齿轮。\n偶尔会煮一只海狸。\n<color=red>动力必须从小建筑工地的旗帜下方提供</color>"
zhTW = "一個複雜的裝置，可以巧妙地將機械能和原料轉化為美味的食物。  \n偶爾會損壞齒輪。  \n偶爾會煮熟一隻海狸。  \n<color=red>必須從小施工旗的下方提供電力</color>"
ruRU = "Сложное устройство, которое мастерски преобразует механическую энергию и сырую пищу в вкусные изделия. \nИногда ломает шестерню. \nИногда готовит бобра. \n<color=red>Энергия должна подаваться снизу под маленьким флагом строительного участка</color>"
jaJP = "「機械の力と生の食材を美味しいものに巧みに変える複雑な装置。\nたまにギアが壊れる。\nたまにビーバーを料理する。\n<color=red>電力は小さな建設現場の旗の下から供給する必要があります</color>」"
frFR = "Un appareil complexe qui transforme habilement la puissance mécanique et la nourriture brute en choses délicieuses. \nParfois, il casse un engrenage.\nParfois, il cuisine un castor.\n<color=red>De l'énergie doit être fournie par le bas du petit drapeau de chantier</color>"
deDE = "Ein komplexes Gerät, das mechanische Energie und rohe Lebensmittel meisterhaft in schmackhafte Sachen verwandelt. \nGelegentlich bricht ein Zahnrad.\nGelegentlich kocht es einen Biber.\n<color=red>Die Energie muss von unten vom kleinen Baustellenflagge bereitgestellt werden</color>"
plPL = "Złożone urządzenie, które mistrzowsko przekształca moc mechaniczną i surowe jedzenie w smaczne rzeczy. \nOd czasu do czasu psuje zębatkę. \nOd czasu do czasu gotuje bobra. \n<color=red>Energia musi być doprowadzona z dołu pod flagi małego placu budowy</color>"
ptBR = "Um dispositivo complexo que transforma magistralmente energia mecânica e alimentos crus em coisas deliciosas. \nOcasionalmente quebra uma engrenagem. \nOcasionalmente cozinha um castor. \n<color=red>A energia deve ser fornecida debaixo da pequena bandeira do canteiro de obras</color>"
koKR = "복잡한 장치로, 기계의 힘과 원재료를 맛있는 것으로 훌륭하게 변형합니다.\n가끔 기어가 고장납니다.\n가끔 비버를 요리합니다.\n<color=red>전원은 작은 건설 현장 깃발 아래에서 공급되어야 합니다</color>"
csCZ = "Složitý přístroj, který mistrovsky přetváří mechanickou energii a surové potraviny na chutné pokrmy. \nObčas se rozbije součástka. \nObčas uvaří bobra. \n<color=red>Napájení musí být zajištěno zespodu malé stavební vlajky</color>"
viVN = "Một thiết bị phức tạp biến đổi tài nguyên cơ khí và thực phẩm thô thành những món ngon một cách tài tình. \nThỉnh thoảng sẽ hỏng một bánh răng.\nThỉnh thoảng sẽ nấu một con nhím.\n<color=red>Nguồn điện phải được cung cấp từ dưới cờ của công trình nhỏ</color>"

