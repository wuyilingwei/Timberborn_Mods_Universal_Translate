["Lapantouflemagic.FarmUpgradeC.FlavorDescription"]
raw = "\"As the heavy door slams shut behind you and your eyes slowly adjust to the dark, you can finally see the face of the mastermind threatening the world... With her mighty ladle of damnation in hand, Mathilda grins and says : \"Do you want to BE stew?\"\nNow pass a terror check or take 2d6 damage! \""
status = "normal"
enUS = "\"As the heavy door slams shut behind you and your eyes slowly adjust to the dark, you can finally see the face of the mastermind threatening the world... With her mighty ladle of damnation in hand, Mathilda grins and says: 'Do you want to BE stew?' Now pass a terror check or take 2d6 damage!\""
zhCN = "“当沉重的门在你身后猛地关上，眼睛缓慢适应黑暗时，你终于可以看清那个威胁世界的主谋的面容……玛蒂尔达手握毁灭之杓，露出笑容说道：‘你想成为炖菜吗？’现在进行一次恐惧检查，否则承受2d6伤害！”"
zhTW = "「當沉重的門在你身後關上時，你的眼睛慢慢適應了黑暗，終於看到了那威脅著世界的幕後黑手的面容……握著詛咒之杓的瑪希達微笑著說：「你想變成燉肉嗎？」現在進行恐懼檢查，否則損失2d6點生命值！」"
ruRU = "«Когда тяжелая дверь закрывается за вашей спиной и ваши глаза медленно привыкают к темноте, вы наконец можете увидеть лицо mastermind, угрожающего миру... С могучей черпакой проклятия в руке Матильда усмехается и говорит: \"Хотите быть рагу?\" Теперь пройдите проверку на страх или получите 2d6 урона!»"
jaJP = "\"重い扉があなたの背後でバタンと閉まり、目が暗闇に徐々に慣れていくと、ついに世界を脅かす首謀者の顔が見えるようになります... 奴の運命の大きなお玉を手にして、マチルダはニヤリと笑い、「お前はシチューになりたいのか？」と言います。さあ、恐怖チェックを行うか、2d6のダメージを受けるのだ！\""
frFR = "Alors que la lourde porte se ferme derrière vous et que vos yeux s'ajustent lentement à l'obscurité, vous pouvez enfin voir le visage du génie menaçant le monde... Avec sa puissante louche de damnation en main, Mathilda sourit et dit : \"Voulez-vous ÊTRE un ragoût ?\"\nMaintenant, passez un test de terreur ou subissez 2d6 de dégâts !"
deDE = "„Als die schwere Tür hinter dir zuschlägt und sich deine Augen langsam an die Dunkelheit gewöhnen, kannst du endlich das Gesicht des Meistergeists sehen, der die Welt bedroht... Mit ihrem mächtigen Suppenlöffel der Verdammnis in der Hand grinst Mathilda und sagt: „Willst du Eintopf sein?“ Jetzt mach einen Schreckenswurf oder erleide 2d6 Schaden!“"
plPL = "\"Tak jak ciężkie drzwi zamykają się za tobą, a twoje oczy powoli przyzwyczajają się do ciemności, w końcu możesz zobaczyć twarz ’’mistrza’’ zagrażającego światu... Z potężną chochlą potępienia w ręku, Mathilda uśmiecha się i mówi: \"Chcesz być gulaszem?\" Teraz przejdź test terroru lub stracisz 2d6 punktów życia!\""
ptBR = "Enquanto a pesada porta se fecha atrás de você e seus olhos lentamente se acostumam com a escuridão, você finalmente pode ver o rosto do gênio que ameaça o mundo... Com sua poderosa concha de condenação em mãos, Mathilda sorri e diz: \"Você quer SER ensopado?\"\nAgora faça um teste de terror ou sofra 2d6 de dano!"
koKR = "\"무거운 문이 당신 뒤에서 쾅 닫히고 당신의 눈이 어둠에 천천히 적응하면서, 당신은 세상을 위협하는 주모의 얼굴을 마침내 볼 수 있습니다... 파멸의 큰 주걱을 손에 쥔 마틸다가 미소를 지으며 말합니다: '스튜가 되고 싶나요?' 이제 공포 체크를 통과하거나 2d6의 피해를 받으세요!\""
csCZ = "\"Když se za vámi těžké dveře prudce zavřou a vaše oči se pomalu přizpůsobují tmě, konečně vidíte tvář géniuse, který ohrožuje svět... S mocnou naběračkou zatracení v ruce se Mathilda usmívá a říká: 'Chceš BÝT polévka?' Teď si hoď na strach nebo utrp 2d6 poškození!\""
viVN = "\"Khi cánh cửa nặng nề đóng sầm lại sau lưng bạn và mắt bạn từ từ thích nghi với bóng tối, bạn cuối cùng có thể thấy khuôn mặt của kẻ chủ mưu đang đe dọa thế giới... Với chiếc vá can đảm trong tay, Mathilda cười và nói: \"Bạn có muốn trở thành món hầm không?\"\nBây giờ hãy thực hiện một kiểm tra kinh hoàng hoặc nhận 2d6 sát thương!\""

