["Lapantouflemagic.Topentrancewatertightlodge.Description"]
raw = "A medium-sized lodge for two haulers, built around a ladder.\nCan be stacked on itself, variants, and can carry select buildings.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A medium-sized lodge for two haulers, built around a ladder.  \nCan be stacked on itself, has variants, and can carry select buildings.  \n<color=#00FFFF>Works as a Levee</color>"
zhCN = "一座为两位搬运工建造的中型小屋，围绕梯子构建。\n可以自我叠加，变种，并能够携带特定建筑。\n<color=#00FFFF>作为堤坝使用</color>"
zhTW = "一座中型小屋，可容納兩名搬運工，圍繞著一個梯子建造。\n可以自我堆疊，具有多種變體，並且可以攜帶特定建築物。\n<color=#00FFFF>作為堤壩使用</color>"
ruRU = "Средний домик для двух грузчиков, построенный вокруг лестницы. Может складываться сам в себя, существует в нескольких вариантах и может нести выбранные здания. <color=#00FFFF>Работает как земляной вал</color>"
jaJP = "「二人の運搬者のために建てられた中型のロッジで、はしごを中心に構築されています。自分自身やバリエーションに積み重ねることができ、特定の建物を運ぶことができます。<color=#00FFFF>堤防として機能します</color>」"
frFR = "Un pavillon de taille moyenne pour deux transporteurs, construit autour d'une échelle. Peut être empilé sur lui-même, des variantes, et peut transporter certains bâtiments. <color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Eine mittelgroße Lodge für zwei Holzfäller, die um eine Leiter gebaut ist. Kann auf sich selbst gestapelt werden, Varianten, und kann ausgewählte Gebäude tragen. <color=#00FFFF>Funktioniert als Damm</color>"
plPL = "Średniej wielkości chata dla dwóch transportowców, zbudowana wokół drabiny.\nMożna ją stawiać na sobie, warianty i może przenosić wybrane budynki.\n<color=#00FFFF>Działa jak tama</color>"
ptBR = "Uma cabana de tamanho médio para dois transportadores, construída em torno de uma escada. Pode ser empilhada sobre si mesma, variantes e pode transportar edifícios selecionados. <color=#00FFFF>Funciona como uma Barragem</color>"
koKR = "두 명의 하울러를 위한 중간 크기의 숙소로, 사다리를 중심으로 지어졌습니다.\n자신 위에 쌓을 수 있으며, 변형이 가능하고 특정 건물을 운반할 수 있습니다.\n<color=#00FFFF>제방처럼 작동합니다</color>"
csCZ = "Středně velká chata pro dva nosiče, postavená kolem žebříku. Může být stohována na sebe, varianty a může nést vybrané budovy. <color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một căn lều vừa cho hai người vận chuyển, được xây dựng xung quanh một cái thang. Có thể xếp chồng lên nhau, có các biến thể, và có thể mang theo các công trình cụ thể. <color=#00FFFF>Hoạt động như một con đê</color>"

["Lapantouflemagic.Topentrancewatertightlodge.FlavorDescription"]
raw = "\"Thanks to the latest development in bucket technology, water won't even get inside the central pit!\"\n -BeavX technologies CEO"
status = "normal"
enUS = "\"Thanks to the latest development in bucket technology, water won't even get inside the central pit!\"  \n-BeavX technologies CEO"
zhCN = "“感谢最新的桶技术发展，水甚至不会进入中央坑！”  \n- BeavX科技首席执行官"
zhTW = "\"多虧了最新的水桶技術發展，水甚至不會進入中央坑道！\"  \n- BeavX科技首席執行官"
ruRU = "\"Благодаря последним разработкам в технологии ведер, вода даже не попадет внутрь центральной ямы!\"  \n- Генеральный директор BeavX технологий"
jaJP = "\"バケット技術の最新の進展により、水は中央の穴の中にも入らないでしょう！\"  \n- ビーバックステクノロジーズ CEO"
frFR = "\"Grâce aux dernières avancées dans la technologie des seaux, l'eau n'entrera même pas dans le puits central !\"\n -PDG des technologies BeavX"
deDE = "\"Dank der neuesten Entwicklung in der Eimertechnologie gelangt kein Wasser mehr in die zentrale Grube!\"  \n- Geschäftsführer von BeavX Technologien"
plPL = "\"Dzięki najnowszym osiągnięciom w technologii wiader, woda nawet nie dostanie się do centralnej studni!\"  \n- Prezes BeavX Technologies"
ptBR = "\"Graças ao mais recente desenvolvimento na tecnologia de baldes, a água não entra nem mesmo no poço central!\"  \n- CEO da BeavX tecnologias"
koKR = "\"최신 양동이 기술 덕분에 물이 중앙 구덩이 안으로 들어오지 않을 것입니다!\"\n -비브X 기술 CEO"
csCZ = "\"Díky nejnovějšímu vývoji v technologii kbelíků se voda nedostane ani do centrální jámy!\"  \n- CEO BeavX technologies"
viVN = "\"Nhờ vào sự phát triển mới nhất trong công nghệ xô, nước sẽ không thể vào trong hố trung tâm!\" \n -Giám đốc điều hành công ty BeavX"

