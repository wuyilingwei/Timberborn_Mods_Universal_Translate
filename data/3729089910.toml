["Lapantouflemagic.Verydeep_mine_elevator.FlavorDescription"]
raw = "\"Come on! Stop acting like a kit! Danger? What danger? I laugh at the face of danger! Ah-Ah-Ah-Arghbllglblbglbl\"\n -Ruin exploration team Nb 3, team leader's last words."
status = "normal"
enUS = "Come on! Stop acting like a kit! Danger? What danger? I laugh at the face of danger! Ah-Ah-Ah-Arghbllglblbglbl\"  \n-Ruin exploration team No. 3, team leader's last words."
zhCN = "“来吧！别像小猫一样装模作样！危险？什么危险？我对危险嗤之以鼻！啊-啊-啊-啊尔戈布尔格尔布尔格尔”  \n- 废墟探索团队第3号队，队长的遗言。"
zhTW = "「來吧！別再像小孩一樣行為舉止！危險？什麼危險？我對危險嗤之以鼻！啊啊啊啊啊噗噗噗噗噗噗噗」\n-「遺跡探索隊第3組，隊長的最後遺言。」"
ruRU = "«Давай! Прекрати вести себя как котенок! Опасность? Какая опасность? Я смеюсь в лицо опасности! Ах-ах-ах-аргбллгблбглб!»  \n- Последние слова капитана исследовательской группы Ржа 3."
jaJP = "「さあ！子供みたいに振る舞うのはやめろ！危険？どんな危険だ？私は危険の顔を見て笑っている！アーアーアーアーグルルルルルル」\n- 遺跡探索チーム番号3、チームリーダーの最後の言葉。"
frFR = "Allez! Arrête de faire le gamin! Danger? Quel danger? Je ris au nez du danger! Ah-Ah-Ah-Arghbllglblbglbl - Derniers mots du chef de l'équipe d'exploration de ruines n° 3."
deDE = "\"Komm schon! Hör auf, dich wie ein Kit zu benehmen! Gefahr? Welche Gefahr? Ich lache der Gefahr ins Gesicht! Ah-Ah-Ah-Arghbllglblbglbl\"  \n- Ruinenexplorationsteam Nr. 3, letzte Worte des Teamleiters."
plPL = "„Chodź! Przestań się zachowywać jak dzieciak! Niebezpieczeństwo? Jakie niebezpieczeństwo? Śmieję się w twarz niebezpieczeństwu! Ah-Ah-Ah-Arghbllglblbglbl”  \n- Zespół eksploracyjny Ruin nr 3, ostatnie słowa lidera zespołu."
ptBR = "Vamos lá! Pare de agir como um filhote! Perigo? Que perigo? Eu rio na cara do perigo! Ah-Ah-Ah-Arghbllglblbglbl - Últimas palavras do líder da equipe de exploração de ruínas Nb 3."
koKR = "이리 와! 새끼처럼 굴지 마! 위험? 어떤 위험? 나는 위험 앞에서 웃지! 아-아-아-아르그블글블블블\"  \n- 유적 탐사 팀 번호 3, 팀장의 마지막 말입니다."
csCZ = "\"Bež! Přestaň se chovat jako kotě! Nebezpečí? Jaké nebezpečí? Směji se nebezpečí do tváře! Ah-Ah-Ah-Arghbllglblbglbl\" \n -Poslední slova vedoucího týmu prozkoumání ruin č. 3."
viVN = "Đi nào! Đừng có cư xử như một đứa trẻ! Nguy hiểm? Nguy hiểm gì chứ? Ta cười vào mặt nguy hiểm! Ah-Ah-Ah-Arghbllglblbglbl\" - Lời cuối cùng của trưởng nhóm đội thám hiểm di tích số 3."

