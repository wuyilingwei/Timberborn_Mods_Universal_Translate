["Need.CWKitchDeath.DeathMessage"]
raw = "<color=green>was accidentally grabbed by the robot’s pincers and deliciously cooked to death. The stew was particularily tasty tonight.</color>"
status = "normal"
enUS = "<color=green>was accidentally grabbed by the robot’s pincers and deliciously cooked to death. The stew was particularly tasty tonight.</color>"
zhCN = "<color=green>被机器人的钳子意外抓住， deliciously 煮熟致死。今晚的炖菜特别美味。</color>"
zhTW = "<color=green>不小心被機器人的鉗子抓住，並美味地煮死了。今晚的燉菜特別美味。</color>"
ruRU = "<color=green>был случайно схвачен клешнями робота и вкусно сварен до смерти. Сегодняшний суп был особенно вкусным.</color>"
jaJP = "<color=green>ロボットのハサミに偶然掴まれ、美味しく料理されて死んでしまった。今夜のシチューは特に美味しかった。</color>"
frFR = "<color=green>a été accidentellement attrapé par les pinces du robot et délicieusement cuit à mort. Le ragoût était particulièrement savoureux ce soir.</color>"
deDE = "<color=green>wurde versehentlich von den Zangen des Roboters gepackt und köstlich zu Tode gekocht. Der Eintopf war tonight besonders lecker.</color>"
plPL = "<color=green>został przypadkowo chwycony przez szczypce robota i pysznie ugotowany na śmierć. Zupa była dzisiaj szczególnie smaczna.</color>"
ptBR = "<color=green>foi acidentalmente agarrado pelas pinças do robô e cozido até a morte de forma deliciosa. O ensopado estava especialmente saboroso esta noite.</color>"
koKR = "<color=green>로봇의 집게에 우연히 잡혀서 맛있게 요리되어 죽었습니다. 오늘 밤 스튜는 특히 맛있었습니다.</color>"
csCZ = "<color=green>byl omylem chycen robotickými kleštěmi a lahodně uvařen k smrti. Polévka byla dnes večer obzvlášť chutná.</color>"
viVN = "<color=green>đã bị kẹp bởi càng của robot và bị nấu chín một cách ngon miệng. Món hầm hôm nay đặc biệt ngon.</color>"

