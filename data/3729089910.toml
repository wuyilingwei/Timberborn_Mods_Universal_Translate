["Lapantouflemagic.WaterCannonM.Description"]
raw = "An intriguing evolution of the mechanical water pump that shoots water at a 45° angle for ranged irrigation.\nProvides a good balance between range and elevation.\n<color=green>Cannon will continue working until the water level reaches the blue flag</color>"
status = "normal"
enUS = "An intriguing evolution of the mechanical water pump that shoots water at a 45° angle for ranged irrigation. Provides a good balance between range and elevation. <color=green>Cannon will continue working until the water level reaches the blue flag</color>"
zhCN = "一种引人入胜的机械水泵进化版，它以45°的角度喷射水用于远程灌溉。\n在射程和高度之间提供良好的平衡。\n<color=green>炮管将继续工作，直到水位达到蓝色旗帜</color>"
zhTW = "這是一個引人入勝的機械水泵的進化，它以45°的角度噴射水以進行遠程灌溉。提供了範圍和高度之間的良好平衡。<color=green>大砲將繼續運作，直到水位達到藍色旗幟</color>"
ruRU = "Интригующая эволюция механического водяного насоса, который стреляет водой под углом 45° для дальнего орошения. Обеспечивает хорошее соотношение между дальностью и высотой. <color=green>Пушка будет работать, пока уровень воды не достигнет синего флага</color>"
jaJP = "「45°の角度で水を射出する機械式水ポンプの興味深い進化版。\n射程と高度の良いバランスを提供します。\n<color=green>砲は水位が青い旗に達するまで作動し続けます。</color>」"
frFR = "Une évolution intrigante de la pompe à eau mécanique qui tire de l'eau à un angle de 45° pour l'irrigation à distance.  \nOffre un bon équilibre entre portée et élévation.  \n<color=green>Le canon continuera de fonctionner jusqu'à ce que le niveau d'eau atteigne le drapeau bleu</color>"
deDE = "Eine faszinierende Weiterentwicklung der mechanischen Wasserpumpe, die Wasser im 45°-Winkel für die weitreichende Bewässerung sprüht. Bietet ein gutes Gleichgewicht zwischen Reichweite und Höhe. <color=green>Die Kanone wird weiterarbeiten, bis der Wasserstand die blaue Flagge erreicht</color>"
plPL = "Intrygująca ewolucja mechanicznej pompy wodnej, która strzela wodą pod kątem 45° do zdalnego nawadniania. \nZapewnia dobry balans między zasięgiem a wysokością. \n<color=green>Armatka będzie działać, dopóki poziom wody nie osiągnie niebieskiej flagi</color>"
ptBR = "Uma evolução intrigante da bomba de água mecânica que dispara água em um ângulo de 45° para irrigação à distância. Proporciona um bom equilíbrio entre alcance e elevação. <color=green>A canhão continuará funcionando até que o nível da água atinja a bandeira azul</color>"
koKR = "45° 각도로 거리를 두고 물을 쏘는 기계식 물 펌프의 흥미로운 진화입니다.\n범위와 높이 간의 좋은 균형을 제공합니다.\n<color=green>포는 물의 수위가 파란 깃발에 도달할 때까지 작동합니다</color>"
csCZ = "Zajímavá evoluce mechanické vodní pumpy, která střílí vodu pod úhlem 45° pro vzdálené zavlažování. \nNabízí dobrou rovnováhu mezi dosahem a výškou. \n<color=green>Kanon bude pokračovat v práci, dokud vodní hladina nedosáhne modré vlajky</color>"
viVN = "Một sự tiến hóa hấp dẫn của bơm nước cơ học bắn nước theo góc 45° để tưới tiêu từ xa. \nCung cấp sự cân bằng tốt giữa phạm vi và độ cao. \n<color=green>Pháo sẽ tiếp tục hoạt động cho đến khi mức nước đạt đến cờ xanh</color>"

