["Lapantouflemagic.TerrainBlock.Description"]
raw = "An artificial terrain block built by beavers as an useful way to get rid of excess dirt generated by the <color=red>mechanical drill</color>"
status = "normal"
enUS = "An artificial terrain block built by beavers as a useful way to get rid of excess dirt generated by the <color=red>mechanical drill</color>"
zhCN = "“一个由河狸建造的人造地形块，用于处理<color=red>机械钻头</color>产生的多余土壤。”"
zhTW = "由海狸建造的人工地形方塊，作為處理由<color=red>機械鑽</color>產生的多餘泥土的一種有效方式。"
ruRU = "Искусственный блок земли, построенный бобрами, как полезный способ избавиться от избыточной грязи, образуемой <color=red>механическим сверлом</color>"
jaJP = "「<color=red>機械ドリル</color>によって生成された過剰な土を処理するための有用な方法としてビーバーによって作られた人工地形ブロック」"
frFR = "Un bloc de terrain artificiel construit par des castors comme un moyen utile de se débarrasser de l'excès de terre généré par le <color=red>foret de mécanisme</color>"
deDE = "Ein künstlicher Terrainblock, der von Bibern gebaut wurde, um überschüssigen Erde, der durch die <color=red>mechanische Bohrmaschine</color> erzeugt wird, auf nützliche Weise loszuwerden."
plPL = "Sztuczny blok terenu stworzony przez bobry jako przydatny sposób na pozbycie się nadmiaru ziemi wytwarzanej przez <color=red>wiertło mechaniczne</color>"
ptBR = "Um bloco de terreno artificial construído por castores como uma forma útil de se livrar do excesso de terra gerado pela <color=red>furadeira mecânica</color>"
koKR = "기계 드릴<color=red>의</color> 잉여 흙을 처리하는 유용한 방법으로 비버가 만든 인공 지형 블록입니다."
csCZ = "Umělá terénní blok vytvořený bobry jako užitečný způsob, jak se zbavit přebytečné hlíny vytvořené <color=red>mechanickým vrtem</color>."
viVN = "Một khối địa hình nhân tạo được xây dựng bởi những con hải ly như một cách hữu ích để loại bỏ lượng đất thừa do <color=red>máy khoan cơ giới</color> tạo ra"

["Lapantouflemagic.Overhang.Description"]
raw = "A small platform attached to a wall in order to form a walkway.\n<color=green>Can be attached to the sides of cliffs and most stackable buildings</color>\n<color=red>Multiple side platforms or bridges cannot share the same support</color>"
status = "normal"
enUS = "A small platform attached to a wall in order to form a walkway.  \n<color=green>Can be attached to the sides of cliffs and most stackable buildings</color>  \n<color=red>Multiple side platforms or bridges cannot share the same support</color>"
zhCN = "一个小平台靠在墙上，以形成一个人行道。  \n<color=green>可以附加在悬崖的侧面和大多数可堆叠建筑上</color>  \n<color=red>多个侧平台或桥梁不能共用同一个支撑</color>"
zhTW = "一個附在牆上的小平台，用於形成走道。  \n<color=green>可以附在懸崖的側面和大多數可堆疊建築物上</color>  \n<color=red>多個側平台或橋樑不能共享相同的支撐</color>"
ruRU = "Небольшая платформа, прикрепленная к стене для формирования прохода.  \n<color=green>Может быть прикреплена к сторонам скал и большинству строений, которые можно складывать</color>  \n<color=red>Несколько боковых платформ или мостов не могут разделять одну и ту же опору</color>"
jaJP = "壁に取り付けられた小さなプラットフォームで、通路を形成します。\n<color=green>崖の側面やほとんどの積み重ね可能な建物に取り付けることができます</color>\n<color=red>複数の側面プラットフォームや橋は同じ支持を共有できません</color>"
frFR = "Une petite plateforme fixée à un mur afin de former un chemin.\n<color=green>Peut être attachée sur les côtés des falaises et la plupart des bâtiments empilables</color>\n<color=red>Plusieurs plateformes latérales ou ponts ne peuvent pas partager le même support</color>"
deDE = "Eine kleine Plattform, die an einer Wand befestigt ist, um einen Weg zu bilden.  \n<color=green>Kann an den Seiten von Klippen und den meisten stapelbaren Gebäuden angebracht werden</color>  \n<color=red>Mehrere Seitenplattformen oder Brücken können sich nicht dieselbe Unterstützung teilen</color>"
plPL = "Mała platforma przymocowana do ściany w celu utworzenia chodnika.  \n<color=green>Może być przymocowana do boków klifów i większości budynków, które można układać w stosy</color>  \n<color=red>Wiele platform bocznych lub mostów nie może dzielić tej samej podpory</color>"
ptBR = "Uma pequena plataforma anexada a uma parede para formar um caminho.  \n<color=green>Pode ser anexada aos lados de penhascos e na maioria dos edifícios empilháveis</color>  \n<color=red>Múltiplas plataformas laterais ou pontes não podem compartilhar o mesmo suporte</color>"
koKR = "벽에 부착되어 보행로를 형성하는 작은 플랫폼입니다.  \n<color=green>절벽의 측면과 대부분의 쌓을 수 있는 건물에 부착될 수 있습니다</color>  \n<color=red>여러 개의 측면 플랫폼이나 다리는 동일한 지지를 공유할 수 없습니다</color>"
csCZ = "Malá platforma připevněná ke zdi za účelem vytvoření chodníku.\n<color=green>Může být připevněna na stranách útesů a většiny stohovatelných budov</color>\n<color=red>Více bočních platforem nebo mostů nemůže sdílet stejnou podporu</color>"
viVN = "Một nền tảng nhỏ gắn vào tường để tạo thành một lối đi.  \n<color=green>Có thể gắn vào các cạnh của vách đá và hầu hết các tòa nhà có thể xếp chồng lên nhau</color>  \n<color=red>Các nền tảng bên hoặc cầu không thể chia sẻ cùng một điểm hỗ trợ</color>"

