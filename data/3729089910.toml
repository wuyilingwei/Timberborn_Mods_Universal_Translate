zhTW = "一個可以從木材或鋸屑中種植蘑菇的庇護場所。  \n<color=#FF6EC7>無需工人即可運作。</color>"
ruRU = "Укрытое место для выращивания грибов из древесины или древесной стружки.\n<color=#FF6EC7>Может функционировать без рабочих.</color>"
