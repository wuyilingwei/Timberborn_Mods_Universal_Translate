["Lapantouflemagic.Lightgravitybattery.FlavorDescription"]
raw = "A common punishment for kits is to be left dangling there for a few hours."
status = "normal"
enUS = "A common punishment for kits is to be left dangling there for a few hours."
zhCN = "对小猫来说，常见的惩罚是被悬挂在那里几个小时。"
zhTW = "小貓咪常見的懲罰就是被吊在那裡幾個小時。"
