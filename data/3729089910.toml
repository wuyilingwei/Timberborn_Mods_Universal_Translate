["Lapantouflemagic.LousyWarehouseS.FlavorDescription"]
raw = "\"I'm not wasting my time with that\"\n -A builder beaver"
status = "normal"
enUS = "\"I'm not wasting my time with that\"  \n-A builder beaver"
zhCN = "“我可不想浪费时间在那个上”  \n- 一只建造者海狸"
zhTW = "\"我才不想浪費時間在那上面\"\n - 一隻建築海狸"
ruRU = "\"Я не собираюсь тратить на это время.\"  \n- Бобёр-строитель"
jaJP = "「そんなものに時間を無駄にしたくない」  \n- 建設ビーバー"
frFR = "\"Je ne perds pas mon temps avec ça\"  \n-Un castor constructeur"
deDE = "„Ich verschwende meine Zeit nicht mit dem“  \n– Ein Bauarbeiter-Bieber"
plPL = "\"Nie marnuję czasu na to\"  \n- Bobr budowniczy"
ptBR = "\"Não vou gastar meu tempo com isso\"  \n-Um castor construtor"
koKR = "\"나는 그걸로 내 시간을 낭비하지 않을 거야\"  \n- 건축가 비버"
csCZ = "\"Na to si neztrácím čas.\" - stavitel bobr"
viVN = "\"Tôi không lãng phí thời gian để làm điều đó\" - Một con thủy tổ xây dựng"

