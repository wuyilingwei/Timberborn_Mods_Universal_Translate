["Need.WaterpumpDeath.DeathMessage"]
raw = "<color=green>swam too close to an oversized waterpump and disappeared without a trace. It probably has been summoned to be the hero of a fantastic other world.</color>"
status = "normal"
enUS = "<color=green>swam too close to an oversized waterpump and disappeared without a trace. It probably has been summoned to be the hero of a fantastic other world.</color>"
zhCN = "<color=green>游得太靠近一个超大型水泵而消失得无影无踪。它可能已经被召唤去成为一个奇幻异世界的英雄。</color>"
zhTW = "<color=green>游得太靠近一個超大型水泵，消失得無影無蹤。牠可能已經被召喚成為另一個奇幻世界的英雄。</color>"
ruRU = "<color=green>поплыл слишком близко к oversized водяной насос и исчез без следа. Вероятно, его призвали стать героем фантастического другого мира.</color>"
jaJP = "<color=green>大きな水ポンプに近づきすぎて行方不明になった。おそらく、素晴らしい異世界の英雄に召喚されたのだろう。</color>"
frFR = "<color=green>a nagé trop près d'une pompe à eau surdimensionnée et a disparu sans laisser de trace. Elle a probablement été appelée à devenir l'héroïne d'un autre monde fantastique.</color>"
deDE = "<color=green>schwamm zu nah an einer übergroßen Wasserpumpe und verschwand spurlos. Wahrscheinlich wurde es herbeigerufen, um der Held einer fantastischen anderen Welt zu sein.</color>"
plPL = "<color=green>podpłynął zbyt blisko do przerośniętej pompy wodnej i zniknął bez śladu. Prawdopodobnie został wezwany, aby stać się bohaterem fantastycznego innego świata.</color>"
ptBR = "<color=green>nadou muito perto de uma bomba d'água oversized e desapareceu sem deixar rastros. Provavelmente foi convocado para ser o herói de um fantástico outro mundo.</color>"
koKR = "<color=green>너무 큰 물펌프에 너무 가까이 헤엄치다가 흔적도 없이 사라졌다. 아마도 환상적인 다른 세계의 영웅이 되기 위해 소환되었을 것이다.</color>"
csCZ = "<color=green>plaval příliš blízko k přerostlé vodní pumpě a beze stopy zmizel. Pravděpodobně byl povolán, aby se stal hrdinou fantastického jiného světa.</color>"
viVN = "<color=green>đã bơi quá gần một máy bơm nước cỡ lớn và biến mất một cách bí ẩn. Có lẽ nó đã được triệu hồi để trở thành anh hùng của một thế giới huyền diệu khác.</color>"

