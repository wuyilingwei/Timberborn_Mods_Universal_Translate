["Lapantouflemagic.NuclearWaterCollector.DisplayName"]
new = "Abyssal Nuclear Power Plant Water Outflow"
status = "normal"

["Lapantouflemagic.NuclearWaterCollector.Description"]
new = "Allows the power plant to connect to the power network and start operating.\nCooling water pumped from the aquifer by the reactor is released from above.\n<color=green>The source never runs dry and is not affected by badtides.</color>"
status = "normal"

["Lapantouflemagic.NuclearWaterCollector.FlavorDescription"]
new = "\"Without the metal floor up there to dissipate heat, this would be boiling hot!\""
status = "normal"

["Lapantouflemagic.NuclearReactor3.DisplayName"]
new = "Abyssal Nuclear Reactor"
status = "normal"

["Lapantouflemagic.NuclearReactor3.Description"]
new = "A high-power nuclear reactor powered by nuclear fuel.\nUses the abyss to tap directly into the aquifer for coolant.\n<color=green>Is built from the inside like a wonder</color>.\n<color=#00FFFF>Clean water is generated as a result</color>\nRequires the <color=green>Abyssal Nuclear Power Plant Water Outflow</color> to allow power to be connected."
status = "normal"

["Lapantouflemagic.NuclearReactor2.DisplayName"]
new = "Breeder Nuclear Reactor"
status = "normal"

["Lapantouflemagic.NuclearReactor2.Description"]
new = "A medium-sized nuclear reactor powered by both nuclear waste and nuclear fuel.\nGenerates heat by consuming the radioactive elements found in bad water, maintaining the core itself nearly indefinitely.\n<color=red>Deletes 1.5 m²/s of liquid."
status = "normal"

["Lapantouflemagic.NuclearReactor1.DisplayName"]
new = "Basic Nuclear Reactor"
status = "normal"

["Lapantouflemagic.NuclearReactor1.Description"]
new = "A relatively weak nuclear reactor powered by nuclear waste and the radioactive elements dissolved in bad water.\n<color=red>Must be build on a bad water source</color>"
status = "normal"

["Lapantouflemagic.NuclearReactor.FlavorDescription"]
new = "\"Every morning someone has to hit the big red button, and if you're not lucky, KABOOM !\nOtherwise nothing happens until the next day. At least according to their media, that’s what hoomans did.\"\n -A Hooman historian beaver"
status = "normal"

["Luc.Library.Description"]
new = "A large building with lots of books for studying.\nThe only way to obtain science.\n<color=green>Is built from the inside like a wonder</color>."
status = "normal"

