["Lapantouflemagic.AdvancedSawmill.Description"]
raw = "An enormous building that could dam a whole river by itself.\nCuts giant logs into different products.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "An enormous building that could dam a whole river by itself. Cuts giant logs into different products. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一座巨大的建筑，能够单独筑起整个河流的堤坝。将巨大的木头切割成不同的产品。<color=#00FFFF>作为堤防使用</color>"
zhTW = "一座巨大的建築，能夠單獨阻止整條河流。將巨大的原木切割成不同的產品。<color=#00FFFF>作為堤防使用</color>"
ruRU = "Огромное здание, которое может самостоятельно преградить целую реку. Рубит гигантские бревна на различные продукты. <color=#00FFFF>Работает как дамба</color>"
jaJP = "「単独で川全体をせき止めることができる巨大な建物です。 巨大な丸太をさまざまな製品に切り分けます。 <color=#00FFFF>堤防として機能します</color>」"
frFR = "Un immense bâtiment capable de barrer une rivière tout seul. Coupe d'énormes bûches en différents produits. <color=#00FFFF>Fonctionne comme un levee</color>"
deDE = "Ein riesiges Gebäude, das einen ganzen Fluss allein aufstauen könnte. \nSchneidet riesige Baumstämme in verschiedene Produkte. \n<color=#00FFFF>Funktioniert als Damm</color>"
plPL = "Ogromny budynek, który samodzielnie mógłby z tamować całą rzekę.\nTnie olbrzymie kłody na różne produkty.\n<color=#00FFFF>Działa jako Tama</color>"
ptBR = "Um edifício enorme que poderia represar um rio inteiro por si só. \nCorta troncos gigantes em diferentes produtos. \n<color=#00FFFF>Funciona como uma Atalaia</color>"
koKR = "혼자서 전체 강을 막을 수 있는 거대한 건물입니다.\n거대한 통나무를 다양한 제품으로 자릅니다.\n<color=#00FFFF>제방 역할을 합니다</color>"
csCZ = "Obrovská budova, která by sama o sobě mohla zadržet celou řeku. Řeže obrovské kmeny na různé produkty. <color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một tòa nhà khổng lồ có thể chặn cả một con sông một mình.\nCắt gỗ lớn thành nhiều sản phẩm khác nhau.\n<color=#00FFFF>Hoạt động như một Đê</color>"

["Lapantouflemagic.AdvancedSawmill.FlavorDescription"]
raw = "\"I'll only be satisfied once I've cut the world in half\"\n - A mechanic beaver"
status = "normal"
enUS = "\"I'll only be satisfied once I've cut the world in half\" - A mechanic beaver"
zhCN = "“只有将世界切成两半我才会满意”  \n- 一只机械海狸"
zhTW = "「等我把世界切成兩半我才會滿意」- 一隻機械海狸"
ruRU = "\"Я буду доволен только когда разрежу мир пополам\" - механический бобер"
jaJP = "「世界を半分に切るまで、私は満足しない」 - 機械ビーバー"
frFR = "\"Je ne serai satisfait que lorsque j'aurai coupé le monde en deux.\" - Un castor mécanicien"
deDE = "\"Ich werde nur zufrieden sein, wenn ich die Welt in zwei Hälften gesägt habe.\" - Ein mechanischer Biber"
plPL = "\"Zadowolę się tylko wtedy, gdy przetnę świat na pół\" - Mechanik bóbr"
ptBR = "\"Eu só estarei satisfeito quando eu tiver cortado o mundo ao meio\" - Um castor mecânico"
koKR = "\"세상을 반으로 자르기 전까지는 만족하지 않을 거야\"  \n- 기계 비버"
csCZ = "\"Spokojím se jen tehdy, až rozříznu svět na půl\" - Mechanický bobr"
viVN = "\"Tôi chỉ có thể hài lòng khi tôi đã cắt đôi thế giới\" - Một con castor cơ khí"

