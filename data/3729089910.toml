["Billboard.TechTreeBoard.Description"]
raw = "A billboard displaying the technological progression of the WhitePaws faction.\nUseful to know if you're attempting to build something waaaaay out of reach.\nAlso displays what is made where."
status = "normal"
enUS = "A billboard displaying the technological progression of the WhitePaws faction. Useful to know if you're attempting to build something waaaaay out of reach. Also displays what is made where."
zhCN = "一个展示白爪派系技术进展的公告牌。  \n如果你正在尝试建造一些远不可及的东西，它非常有用。  \n还显示了在哪里制作什么。"
zhTW = "一個顯示白爪派系科技進展的公告欄。  \n如果你想要建造一些遠超你能力範圍的東西，這是非常有用的。  \n還顯示了各項物品的製作地點。"
ruRU = "Билборд, отображающий технологический прогресс фракции Белых Лап. Полезно знать, если вы пытаетесь построить что-то намного недоступное. Также показывает, что и где изготавливается."
jaJP = "ホワイトパウズ派の技術の進展を示すビルボードです。  \n手が届かないところに何かを建設しようとしている場合に役立ちます。  \nまた、どこで何が作られているかも表示します。"
frFR = "Un panneau d'affichage affichant la progression technologique de la faction WhitePaws.  \nUtile à savoir si vous essayez de construire quelque chose de trèèès éloigné.  \nAffiche également ce qui est fabriqué où."
deDE = "Ein Schild, das den technologischen Fortschritt der WhitePaws-Fraktion anzeigt. Nützlich, um zu wissen, ob du versuchst, etwas zu bauen, das viel zu weit entfernt ist. Zeigt auch an, was wo hergestellt wird."
plPL = "Tablica ogłoszeń wyświetlająca postęp technologiczny frakcji WhitePaws. Przydatna, jeśli próbujesz zbudować coś bardzo poza zasięgiem. Wyświetla również, co jest produkowane gdzie."
ptBR = "Um letreiro exibindo o progresso tecnológico da facção WhitePaws. Útil para saber se você está tentando construir algo muito fora de alcance. Também exibe o que é produzido onde."
koKR = "화이트파우스 진영의 기술 발전 상태를 보여주는 게시판입니다.  \n손이 닿지 않는 무언가를 만들려고 할 때 유용합니다.  \n어디에서 무엇이 제작되는지도 표시됩니다."
csCZ = "Billboard zobrazující technologický pokrok frakce WhitePaws. Užitečné vědět, pokud se snažíte postavit něco daleko mimo dosah. Také zobrazuje, co se vyrábí kde."
viVN = "Một bảng quảng cáo hiển thị sự tiến triển công nghệ của phe WhitePaws.  \nHữu ích để biết nếu bạn đang cố gắng xây dựng điều gì đó nằm ngoài tầm với.  \nCũng hiển thị những gì được chế tạo ở đâu."

