["Lapantouflemagic.PitandLadderDoubleDoor.Description"]
raw = "A medium-sized watertight lodge built around a ladder.\nComes with <color=green>two</color> side access doors!\nCan be stacked on itself, variants, and can carry select buildings.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A medium-sized watertight lodge built around a ladder. Comes with <color=green>two</color> side access doors! Can be stacked on itself, variants, and can carry select buildings. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一座中型防水小屋，建在一个梯子周围。\n配有<color=green>两个</color>侧面出入口！\n可以自身叠加、变体，并且可以承载特定建筑。\n<color=#00FFFF>作为堤坝工作</color>"
zhTW = "一座中型防水小屋，圍繞著一個梯子建造。\n配有<color=green>兩個</color>側面進入的門！\n可以自我堆疊、變化，並能承載特定建築物。\n<color=#00FFFF>可作為堤防使用</color>"
ruRU = "Среднего размера водонепроницаемая хижина, построенная вокруг лестницы. \nИмеет <color=green>две</color> боковые двери для доступа! \nМожно ставить одна на другую, варианты и может переносить определённые здания. \n<color=#00FFFF>Работает как плотина</color>"
jaJP = "「梯子を中心に建てられた中型の防水小屋。\n<color=green>2</color>つの側面アクセスドア付き！\n自己重ね積みが可能で、バリアントとしても使用でき、特定の建物を運ぶことができます。\n<color=#00FFFF>堤防として機能します</color>」"
frFR = "Un pavillon de taille moyenne étanche construit autour d'une échelle.\nÉquipé de <color=green>deux</color> portes d'accès latérales !\nPeut être empilé sur lui-même, avec des variantes, et peut transporter des bâtiments sélectionnés.\n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Eine mittelgroße wasserdichte Lodge, die um eine Leiter gebaut ist. Kommt mit <color=green>zwei</color> seitlichen Zugangstüren! Kann auf sich selbst gestapelt werden, Varianten und kann ausgewählte Gebäude tragen. <color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Średniej wielkości wodoodporna chata zbudowana wokół drabiny.\nZawiera <color=green>dwa</color> boczne drzwi dostępu!\nMoże być układana na sobie, warianty i może przenosić wybrane budynki.\n<color=#00FFFF>Działa jako wał</color>"
ptBR = "Uma cabana à prova d'água de tamanho médio construída em torno de uma escada.\nVem com <color=green>duas</color> portas de acesso laterais!\nPode ser empilhada sobre si mesma, variantes, e pode carregar edifícios selecionados.\n<color=#00FFFF>Funciona como um Dique</color>"
koKR = "사다리를 중심으로 지어진 중간 크기의 방수 오두막입니다. \n<color=green>두 개</color>의 측면 접근 문이 제공됩니다! \n자체적으로 쌓을 수 있으며, 변형과 선택된 건물을 운반할 수 있습니다. \n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Středně velká vodotěsná chata postavená kolem žebříku. Obsahuje <color=green>dvě</color> postranní přístupové dveře! Lze ji stohovat na sebe, varianty a může nést vybrané budovy. <color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một ngôi nhà vừa phải chống thấm nước được xây dựng xung quanh một cái thang. \nCó <color=green>hai</color> cửa ra vào bên hông!\nCó thể xếp chồng lên nhau, các biến thể, và có thể mang theo các công trình nhất định. \n<color=#00FFFF>Hoạt động như một Công trình Đê</color>"

["Lapantouflemagic.PitandLadderDoubleDoor.FlavorDescription"]
raw = "\"Who doesn't love living next to a highway?\""
status = "normal"
enUS = "\"Who doesn't love living next to a highway?\""
zhCN = "“谁不喜欢住在高速公路旁边呢？”"
zhTW = "「誰不喜歡住在高速公路旁邊呢？」"
ruRU = "Кто не любит жить рядом с автострадой?"
jaJP = "「高速道路のそばに住むのが好きじゃない人はいるの？」"
frFR = "Qui n'aime pas vivre à côté d'une autoroute ?"
deDE = "„Wer liebt es nicht, neben einer Autobahn zu wohnen?“"
plPL = "\"Kto nie lubi mieszkać obok autostrady?\""
ptBR = "\"Quem não ama viver ao lado de uma rodovia?\""
koKR = "고속도로 옆에 사는 걸 좋아하지 않는 사람은 누구인가요?"
csCZ = "\"Kdo by neměl rád žít vedle dálnice?\""
viVN = "Ai mà không thích sống cạnh một con đường cao tốc?"

