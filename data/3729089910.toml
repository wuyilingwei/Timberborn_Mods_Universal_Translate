["Lapantouflemagic.DamDrain.Description"]
raw = "A small watertight house that controls a sluice.\nAllows the dam to not completely block the water flow.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A small watertight house that controls a sluice. Allows the dam to not completely block the water flow. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一个小型防水房屋，用于控制闸门。  \n允许大坝不完全阻断水流。  \n<color=#00FFFF>作为堤坝使用</color>"
zhTW = "一個小型防水房屋，能夠控制水閘。\n允許大壩不完全阻塞水流。\n<color=#00FFFF>作為堤防運作</color>"
ruRU = "Небольшой водонепроницаемый домик, который управляет затвором.  \nПозволяет дамбе не полностью блокировать поток воды.  \n<color=#00FFFF>Работает как дамба</color>"
jaJP = "水を制御する排水口のある小さな防水住宅です。  \nダムが水の流れを完全に遮ることを許可します。  \n<color=#00FFFF>堤防として機能します</color>"
frFR = "Une petite maison étanche qui contrôle une vanne.\nPermet au barrage de ne pas bloquer complètement l'écoulement de l'eau.\n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Ein kleines wasserdichtes Haus, das ein Schütz gates. \nErmöglicht es dem Damm, die Wasserströmung nicht vollständig zu blockieren. \n<color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Mały szczelny domek, który kontroluje śluzę. Umożliwia tamie nieblokowanie całkowicie przepływu wody. <color=#00FFFF>Funkcjonuje jako wał</color>"
ptBR = "Uma pequena casa à prova d'água que controla um comporta.  \nPermite que a represa não bloqueie completamente o fluxo de água.  \n<color=#00FFFF>Funciona como uma Eclusa</color>"
koKR = "수문을 제어하는 작은 방수 집입니다.\n댐이 물 흐름을 완전히 차단하지 않도록 합니다.\n<color=#00FFFF>제방처럼 작동합니다</color>"
csCZ = "Malý vodotěsný dům, který ovládá stavidlo. Umožňuje, aby hráz zcela neblokovala tok vody. <color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một ngôi nhà kín nước nhỏ kiểm soát một cống xả.  \nCho phép đập không hoàn toàn chặn dòng chảy của nước.  \n<color=#00FFFF>Hoạt động như một con đê</color>"

["Lapantouflemagic.NEWEngine.Description"]
raw = "Burns Methane to create power.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "Burns Methane to create power. <color=#00FFFF>Works as a Levee</color>"
zhCN = "“燃烧甲烷以产生能量。<color=#00FFFF>作为一个堤坝工作</color>”"
zhTW = "燃燒甲烷以產生電力。<color=#00FFFF>作為堤防運作</color>"
ruRU = "Сжигает метан для производства энергии. <color=#00FFFF>Работает как плотина</color>"
jaJP = "メタンを燃やして電力を生成します。  \n<color=#00FFFF>堤防として機能します</color>"
frFR = "Brûle du méthane pour créer de l'énergie.  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Brennt Methan, um Energie zu erzeugen. <color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Spala metan, aby wytworzyć energię. <color=#00FFFF>Działa jak tama</color>"
ptBR = "Queima Metano para gerar energia.  \n<color=#00FFFF>Funciona como um Dique</color>"
koKR = "메탄을 태워 전력을 생성합니다.  \n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Spaluje metan pro výrobu energie. <color=#00FFFF>Funguje jako hráz</color>"
viVN = "Đốt Cháy Metan để tạo ra năng lượng. <color=#00FFFF>Hoạt động như một Đê</color>"

