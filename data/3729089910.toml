["Lapantouflemagic.WaterCannonL.Description"]
raw = "An intriguing evolution of the mechanical water pump that shoots water at a 30° angle for ranged irrigation.\nMaximizes range at the expense of elevation\n<color=green>Cannon will continue working until the water level reaches the blue flag</color>"
status = "normal"
enUS = "An intriguing evolution of the mechanical water pump that shoots water at a 30° angle for ranged irrigation.  \nMaximizes range at the expense of elevation  \n<color=green>Cannon will continue working until the water level reaches the blue flag</color>"
zhCN = "“一个引人入胜的机械水泵进化，能够以30°角射水进行远程灌溉。\n以牺牲高度为代价最大化射程\n<color=green>大炮将持续工作，直到水位达到蓝色标杆</color>”"
zhTW = "「一種引人入勝的機械水泵進化版，以30°的角度噴射水流，用於遠程灌溉。  \n在高度的犧牲下最大化射程  \n<color=green>大砲將持續運作，直到水位達到藍色旗幟</color>」"
ruRU = "Увлекательная эволюция механического водяного насоса, который стреляет водой под углом 30° для дальнего орошения. Максимизирует дальность за счет высоты <color=green>Пушка будет продолжать работать, пока уровень воды не достигнет синего флага</color>"
jaJP = "機械的な水ポンプの興味深い進化で、水を30°の角度で射出して遠くに灌漑します。  \n高度を犠牲にして射程を最大化します。  \n<color=green>水レベルが青い旗に達するまで、キャノンは動作し続けます</color>"
frFR = "Une évolution intrigante de la pompe à eau mécanique qui projette de l'eau à un angle de 30° pour l'irrigation à distance. Maximiser la portée au détriment de l'élévation <color=green>Le canon continuera à fonctionner jusqu'à ce que le niveau d'eau atteigne le fanion bleu</color>"
deDE = "Eine interessante Evolution der mechanischen Wasserpumpe, die Wasser in einem Winkel von 30° für die Fernbewässerung spritzt. \nMaximiert die Reichweite auf Kosten der Höhe \n<color=green>Die Kanone wird weiterarbeiten, bis der Wasserspiegel die blaue Fahne erreicht</color>"
plPL = "Intrygująca ewolucja mechanicznej pompy wodnej, która wyrzuca wodę pod kątem 30° do zdalnego nawadniania.  \nMaksymalizuje zasięg kosztem wysokości  \n<color=green>Armata będzie działać, dopóki poziom wody nie osiągnie niebieskiej flagi</color>"
ptBR = "Uma evolução intrigante da bomba de água mecânica que dispara água em um ângulo de 30° para irrigação de longa distância. \nMaximiza o alcance em detrimento da elevação \n<color=green>A arma continuará funcionando até que o nível da água atinja a bandeira azul</color>"
koKR = "30도 각도로 물을 쏘는 기계식 물 펌프의 매혹적인 진화입니다.  \n높이를 희생하면서 사거리를 극대화합니다.  \n<color=green>수위가 파란 깃발에 도달할 때까지 포射는 계속 작동합니다.</color>"
csCZ = "Zajímavá evoluce mechanického vodního čerpadla, které vystřeluje vodu pod úhlem 30° pro zalévání na dálku.  \nMaximalizuje dosah na úkor výšky  \n<color=green>Kanón bude pokračovat v práci, dokud hladina vody nedosáhne modré vlajky</color>"
viVN = "Một sự tiến hóa thú vị của máy bơm nước cơ khí bắn nước với góc 30° để tưới tiêu từ xa.\nTối đa hóa khoảng cách với chi phí cho độ cao.\n<color=green>Pháo sẽ tiếp tục hoạt động cho đến khi mực nước đạt đến cờ xanh</color>"

