["Lapantouflemagic.Waterpumpupgradewallsegment.Description"]
raw = "A watertight structure to block off the extremity of a chain of water pumps.\n<color=red>Ram the camera into the building if placement is difficult</color>.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A watertight structure to block off the end of a series of water pumps.  \n<color=red>Ram the camera into the building if placement is difficult</color>.  \n<color=#00FFFF>Functions as a Levee</color>"
zhCN = "“一个密封的结构，用于封堵水泵链条的末端。<color=red>如果放置困难，请将相机撞向建筑物</color>。<color=#00FFFF>作为堤坝使用</color>”"
zhTW = "一個密封結構，用來封閉水泵鏈條的末端。  \n<color=red>如果放置困難，請將相機撞向建築物</color>。  \n<color=#00FFFF>作用如同堤壩</color>"
ruRU = "Водонепроницаемая конструкция для блокировки конца цепочки водяных насосов.  \n<color=red>Ударьте камерой по зданию, если установка затруднена</color>.  \n<color=#00FFFF>Работает как дамба</color>"
jaJP = "水ポンプの連鎖の端を閉じるための防水構造。\n<color=red>設置が難しい場合はカメラを建物にぶつけてください</color>。\n<color=#00FFFF>堤防として機能します</color>"
frFR = "Une structure étanche pour bloquer l'extrémité d'une chaîne de pompes à eau.<color=red>Faites rentrer la caméra dans le bâtiment si le placement est difficile</color>.<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Eine wasserdichte Struktur, um das Ende einer Kette von Wasserpumpen abzutrennen.  \n<color=red>Ramme die Kamera in das Gebäude, wenn die Platzierung schwierig ist</color>.  \n<color=#00FFFF>Funktioniert wie ein Deich</color>"
plPL = "Wodoodporna struktura do zablokowania końca łańcucha pomp wodnych.  \n<color=red>Wciśnij kamerę w budynek, jeśli umiejscowienie jest trudne</color>.  \n<color=#00FFFF>Działa jak wał</color>"
ptBR = "Uma estrutura à prova d'água para bloquear a extremidade de uma cadeia de bombas d'água.  \n<color=red>Coloque a câmera contra o edifício se a colocação for difícil</color>.  \n<color=#00FFFF>Funciona como uma Atalaia</color>"
koKR = "수성 구조물로, 수공급 펌프 체인의 말단을 차단합니다. \n<color=red>설치가 어려울 경우 카메라를 건물에 밀어넣으세요</color>. \n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Vodotěsná struktura, která uzavírá konec řetězce vodních čerpadel.  \n<color=red>Naražte kamerou do budovy, pokud je umístění obtížné</color>.  \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Cấu trúc kín nước để chặn đầu cuối của một chuỗi máy bơm nước.  \n<color=red>Đâm camera vào tòa nhà nếu vị trí đặt khó khăn</color>.  \n<color=#00FFFF>Hoạt động như một con đê</color>"

["Lapantouflemagic.Waterpumpupgradewallsegment.FlavorDescription"]
raw = "«xa0What if we just build that without the pump to block... Nah, that's a silly idea!xa0»\n- An engineer beaver"
status = "normal"
enUS = "\"What if we just build that without the pump to block... Nah, that's a silly idea!\"  \n- An engineer beaver"
zhCN = "“«要是我们就不建泵而只是建那个来阻挡……呃，这真是个愚蠢的主意！»  \n- 一只工程师海狸”"
zhTW = "「xa0如果我們只是建造這個而不使用泵來阻擋... 不，這是個愚蠢的主意！xa0」\n- 一隻工程師海狸"
ruRU = "«Что, если мы просто построим это без насоса, чтобы заблокировать... Нет, это глупая идея!»  \n- Бобер-инженер"
jaJP = "「もしポンプを使わずにそれを建設したらどうなるだろう...いや、それは馬鹿な考えだ！」  \n- エンジニアビーバー"
frFR = "«xa0Et si nous construisions simplement ça sans la pompe pour bloquer... Non, c'est une idée absurde !xa0»  \n- Un castor ingénieur"
deDE = "„Was wäre, wenn wir das einfach ohne die Pumpe bauen, um zu blockieren... Nein, das ist eine dumme Idee!“ – Ein Ingenieur-Biber"
plPL = "„«xa0A co jeśli po prostu zbudujemy to bez pompy, żeby zablokować... Nie, to głupi pomysł!xa0» - Wydra inżynier”"
ptBR = "«xa0E se nós simplesmente construirmos isso sem a bomba para bloquear... Nah, essa é uma ideia boba!xa0»  \n- Um castor engenheiro"
koKR = "«xa0우리가 그걸 펌프 없이 그냥 만들어 블록하면 어떨까... 아냐, 그건 바보 같은 생각이야!xa0»\n- 한 엔지니어 비버"
csCZ = "„«xa0Co kdybychom to prostě postavili bez čerpadla, aby to zablokovalo... Ne, to je hloupý nápad!xa0»  \n- Inženýrský bobr“"
viVN = "«xa0Còn nếu chúng ta chỉ xây cái đó mà không có bơm để chặn... Không, đó là một ý tưởng ngớ ngẩn!xa0»\n- Một kỹ sư nhím"

