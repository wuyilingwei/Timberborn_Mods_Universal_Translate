["Lapantouflemagic.Mediummine.DisplayName"]
new = "Medium Mine"
status = "normal"

["Lapantouflemagic.Mediummine.Description"]
new = "A larger and deeper mine to exploit richer deposits, also gives access to rarer elements.\nComes with access stairs and barriers to prevent silly little kits from falling and getting hurt.\n<color=green>Needs to be placed in a 4-deep hole!\nMine and fences must be on solid ground!\nPlace stairs on dirt spots and complete the access ramp</color>"
status = "normal"

["Lapantouflemagic.Mediummine.FlavorDescription"]
new = "\"I don't believe in ghosts and monsters, what even are grues supposed to be anyway?\"\n -Miner Zork, last words"
status = "normal"

