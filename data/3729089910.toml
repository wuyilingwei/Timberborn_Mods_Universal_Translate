["Lapantouflemagic.MedicalBed_Injury.Description"]
raw = "Gives injured beavers a place to rest while someone adjust the <color=green>basic balm</color> into a <color=green>pine resin</color> cataplasm."
status = "normal"
enUS = "Gives injured beavers a place to rest while someone adjusts the <color=green>basic balm</color> into a <color=green>pine resin</color> poultice."
zhCN = "“为受伤的海狸提供一个休息的地方，同时有人将<color=green>基本药膏</color>调制成<color=green>松树树脂</color>的敷料。”"
zhTW = "為受傷的海狸提供休息的地方，同時有人將<color=green>基本藥膏</color>調製成<color=green>松脂</color>敷藥。"
ruRU = "Дает раненым бобрам место для отдыха, пока кто-то подготавливает <color=green>основной бальзам</color> в <color=green>катаплазму из сосновой смолы</color>."
jaJP = "負傷したビーバーが休める場所を提供し、誰かが<color=green>基本バーム</color>を<color=green>松の樹脂</color>のカタプラスムに調整する間、使うことができます。"
frFR = "Offre aux castors blessés un endroit pour se reposer pendant que quelqu'un ajuste le <color=green>baume de base</color> en un cataplasme de <color=green>résine de pin</color>."
deDE = "Bietet verletzten Bibern einen Platz zum Ausruhen, während jemand den <color=green>grundlegenden Balsam</color> in ein <color=green>Kiefernharz</color> -Kataplasma anpasst."
plPL = "Zapewnia rannym bobrom miejsce do odpoczynku, podczas gdy ktoś przygotowuje <color=green>podstawowy balsam</color> na <color=green>sosnowy żywiczny</color> okład."
ptBR = "Oferece aos castores feridos um lugar para descansar enquanto alguém ajusta o <color=green>bálsamo básico</color> em um <color=green>cataplasma de resina de pinho</color>."
koKR = "다친 비버들이 누워 쉴 수 있는 공간을 제공하며, 누군가 <color=green>기본 약재</color>를 <color=green>송진</color> 거즈로 조제합니다."
csCZ = "Dává zraněným bobrům místo k odpočinku, zatímco někdo přestavuje <color=green>základní balzám</color> na <color=green>smolinový</color> obklad."
viVN = "Cung cấp cho những con hải ly bị thương một nơi để nghỉ ngơi trong khi ai đó điều chỉnh <color=green>thuốc mỡ cơ bản</color> thành <color=green>bã nhựa thông</color>."

["Lapantouflemagic.MedicalBed_Burns.DisplayName"]
raw = "Medical Bed: Minor Burns"
status = "normal"
enUS = "Medical Bed: Minor Burns"
zhCN = "医疗床：轻度烧伤"
zhTW = "醫療床：輕微燒傷"
ruRU = "Медицинская койка: Нежные ожоги"
jaJP = "医療ベッド：軽度の火傷"
