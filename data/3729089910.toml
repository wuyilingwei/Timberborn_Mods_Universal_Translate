["Lapantouflemagic.Calculatorium.Description"]
raw = "An administrative building where beavers centralize information and issue appropriate orders, thus avoiding the need for direct action."
status = "normal"
enUS = "An administrative building where beavers centralize information and issue appropriate orders, thus avoiding the need for direct action."
zhCN = "“一个行政建筑，海狸在这里集中信息并下达适当的命令，从而避免了直接行动的必要。”"
zhTW = "一座行政建築，裡面播下水獺們集中資訊並發布適當的命令，從而避免需要直接行動。"
ruRU = "Административное здание, где бобры централизуют информацию и издают соответствующие команды, тем самым избегая необходимости в непосредственных действиях."
jaJP = "ビーバーが情報を集中し、適切な命令を出すことによって、直接的な行動を避けるための行政ビルです。"
frFR = "Un bâtiment administratif où les castors centralisent les informations et émettent des ordres appropriés, évitant ainsi la nécessité d'une action directe."
deDE = "Ein Verwaltungsgebäude, in dem Biber Informationen zentralisieren und entsprechende Aufträge erteilen, um so die Notwendigkeit direkter Maßnahmen zu vermeiden."
plPL = "Budowla administracyjna, w której bobry centralizują informacje i wydają odpowiednie rozkazy, unikając w ten sposób potrzeby bezpośredniego działania."
ptBR = "Um edifício administrativo onde os castores centralizam informações e emitem ordens apropriadas, evitando assim a necessidade de ação direta."
koKR = "비버가 정보를 중앙집중화하고 적절한 명령을 내리는 행정 건물로, 이를 통해 직접 행동을 취할 필요가 없게 됩니다."
csCZ = "Administrativní budova, kde bobři centralizují informace a vydávají odpovídající příkazy, čímž se vyhnou nutnosti přímé akce."
viVN = "Một tòa nhà hành chính nơi những con rái cá tập trung thông tin và phát hành các lệnh thích hợp, từ đó tránh cần thực hiện hành động trực tiếp."

