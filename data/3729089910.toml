["Lapantouflemagic.8WayCorneroverhang.Description"]
raw = "A walkway to be installed around a giant pillar, allowing to navigate around aqueduct corners."
status = "normal"
enUS = "A walkway to be installed around a giant pillar, allowing navigation around aqueduct corners."
zhCN = "一个安装在巨型柱子周围的人行道，可以让人绕过水渠的拐角。"
zhTW = "安裝在巨型柱子周圍的人行道，允許在水渠拐角處進行導航。"
