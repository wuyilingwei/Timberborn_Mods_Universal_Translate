["Lapantouflemagic.AmpTrader.Description"]
raw = "The AmpEars are even worse heretics than the IronTeeth: They have dedicated themselves to study hooman technologies and have somehow concluded that being belly-deep in water is dangerous around machines or some other nonsense. They are willing to trade their electric thingies that they pretend they understand, but only a few ones are worth our time. Also they keep calling us ''the WetButts'' so keep note of where they live so we can aim the trebuchet properly."
status = "normal"
enUS = "The AmpEars are even worse heretics than the IronTeeth: They have dedicated themselves to studying human technologies and have somehow concluded that being belly-deep in water is dangerous around machines or some other nonsense. They are willing to trade their electric gadgets that they pretend to understand, but only a few are worth our time. Also, they keep calling us 'the WetButts,' so make a note of where they live so we can aim the trebuchet properly."
zhCN = "“阿姆耳比铁齿更糟糕的异教徒：他们致力于研究人类的技术，但不知怎么得出结论认为浸没在水中在机器附近是危险的或其他一些废话。他们愿意交易他们假装理解的电器，但只有少数几个值得我们花时间。此外，他们还不断称我们为‘湿屁股’，所以请记住他们住在哪里，以便我们可以正确瞄准投石机。”"
zhTW = "安普耳朵的異端比鐵牙族還要可怕：他們專心研究人類科技，並且竟然得出了在機器附近肚子泡在水裡是危險的或其他什麼胡說的結論。他們願意用他們假裝理解的電器來交易，但只有少數是值得我們的時間的。此外，他們還一直稱呼我們為「濕屁股」，所以請記下他們的住處，以便我們能正確瞄準投石機。"
ruRU = "АмпУши - ещё худшие еретики, чем ЖелезныеЗубы: они посвятили себя изучению технологий людей и каким-то образом пришли к выводу, что быть по пояс в воде опасно около машин или какую-то другую чепуху. Они готовы обменивать свои электрические штуковины, которые они притворяются, что понимают, но только несколько из них стоят нашего времени. Также они постоянно называют нас ''МокрыеЗадницы'', так что запомни, где они живут, чтобы мы могли правильно нацелить катапульту."
jaJP = "アンプイヤーはアイアンティースよりもひどい異端者です：彼らは人間の技術を研究することに専念しており、水の中にどっぷりと浸かることが機械周辺では危険だとややこしい結論に達しています。彼らは自分たちが理解しているふりをしている電気的なものを交換しようとしていますが、ほんの数個しか私たちの時間に見合うものではありません。また、彼らは私たちを「ウェットバッツ」と呼び続けているので、彼らの住んでいる場所を記録して、適切にトレビュシェットを狙えるようにしましょう。"
frFR = "Les AmpOreilles sont des hérétiques encore pires que les Dents de Fer : ils se sont consacrés à l'étude des technologies humaines et ont d'une manière ou d'une autre conclu qu'être immergés dans l'eau est dangereux près des machines ou quelque autre absurdité. Ils sont prêts à échanger leurs petites choses électriques qu'ils prétendent comprendre, mais seuls quelques-uns valent notre temps. De plus, ils continuent à nous appeler ''les Fesses Mouillées'', donc notez bien où ils vivent afin que nous puissions viser le trébuchet correctement."
deDE = "Die AmpOhren sind noch schlimmere Häretiker als die EisenZähne: Sie haben sich dem Studium menschlicher Technologien verschrieben und sind irgendwie zu dem Schluss gekommen, dass es gefährlich ist, bei Maschinen im Wasser zu stehen, oder irgendeinen anderen Unsinn. Sie sind bereit, ihre elektrischen Dinger zu tauschen, von denen sie behaupten, sie zu verstehen, aber nur wenige davon sind unsere Zeit wert. Außerdem nennen sie uns ständig ''die NassenÄrsche'', also merkt euch, wo sie leben, damit wir die Geschosse richtig zielen können."
plPL = "AmpEars są jeszcze gorszymi heretykami niż IronTeeth: poświęcili się badaniu ludzkich technologii i w jakiś sposób doszli do wniosku, że bycie w wodzie po brzuch jest niebezpieczne wokół maszyn lub jakieś inne nonsensy. Są gotowi wymieniać swoje elektryczne gadżety, które udają, że rozumieją, ale tylko kilka z nich jest warte naszego czasu. Poza tym wciąż nazywają nas ''MokrąDupa'', więc zapamiętaj, gdzie mieszkają, żebyśmy mogli odpowiednio wymierzyć katapultę."
ptBR = "As AmpOrelhas são hereges ainda piores do que os Dentes de Ferro: Eles se dedicaram a estudar as tecnologias humanas e de alguma forma concluíram que ficar até a cintura na água é perigoso perto de máquinas ou alguma outra bobagem. Eles estão dispostos a trocar suas coisinhas elétricas que fingem entender, mas apenas algumas valem nosso tempo. Além disso, continuam nos chamando de ''os Traseiros Molhados'', então anote onde eles vivem para que possamos mirar a catapulta corretamente."
koKR = "암피어는 아이언티스보다 더 악명 높은 이단자들입니다: 그들은 인간 기술을 연구하는 데 헌신하며, 어떤 방식으로든 기계 주변에서 배가 물에 잠기는 것이 위험하다고 결론지었습니다. 그들은 자신들이 이해하고 있는 척하는 전기 장치를 거래할 의향이 있지만, 우리의 시간을 할 가치가 있는 것들은 몇 개에 불과합니다. 또한 그들은 우리를 ''젖은 엉덩이''라고 부르므로, 그들이 사는 곳을 기억해 두어야 우리는 투석기를 제대로 조준할 수 있습니다."
csCZ = "AmpUši jsou ještě horšími heretiky než Železné Zuby: Oddali se studiu lidských technologií a nějak dospěli k závěru, že být po pás ve vodě je nebezpečné v okolí strojů nebo nějaké jiné nesmysly. Jsou ochotni vyměnit své elektrické věcičky, které předstírají, že rozumí, ale pouze pár z nich stojí za náš čas. Také nás neustále nazývají ''Mokré Zadečky'', takže si zaznamenejte, kde žijí, abychom mohli správně namířit trebuchet."
viVN = "Các AmpEars thậm chí là những kẻ dị giáo tồi tệ hơn cả IronTeeth: Họ đã tận tâm nghiên cứu các công nghệ của loài người và bằng cách nào đó đã kết luận rằng việc ngập bụng trong nước là nguy hiểm khi ở gần máy móc hoặc một điều vô lý nào đó. Họ sẵn sàng trao đổi những thứ điện tử mà họ giả vờ hiểu, nhưng chỉ có một vài món đáng giá thời gian của chúng ta. Hơn nữa, họ cứ gọi chúng ta là ''những cái mông ướt'' vì vậy hãy ghi nhớ nơi ở của họ để chúng ta có thể nhắm bắn máy bắn đá chính xác."

