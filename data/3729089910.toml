["Faction.waterbeavers.Description"]
raw = "\n\n\n\n\n\n\n\n<color=red>xa0!!! ACTIVATE THE TUTORIALxa0!!!</color>\nFollowers of the True Beaver Path, for them everything is a house. Their population often explodes out of control, food and water run out, science is a luxury, and your defeat unavoidable\n\n Forget what other factions taught you, and welcome to your pinkest nightmare.\n<color=red>xa0!!! ACTIVATE THE TUTORIALxa0!!!</color>\n\n\n\n<color=black>Beaver art and textures by Wolfess, huge thanks!\nMany icons by Thorlak, huge thanks too!\nMega-thanks to Grauschweif for the custom scripts !</color>"
status = "normal"
enUS = "<color=red>xa0!!! ACTIVATE THE TUTORIALxa0!!!</color>  \nFollowers of the True Beaver Path, for them everything is a house. Their population often explodes out of control, food and water run out, science is a luxury, and your defeat is unavoidable.  \n\nForget what other factions taught you, and welcome to your pinkest nightmare.  \n<color=red>xa0!!! ACTIVATE THE TUTORIALxa0!!!</color>  \n\n<color=black>Beaver art and textures by Wolfess, huge thanks!  \nMany icons by Thorlak, huge thanks too!  \nMega-thanks to Grauschweif for the custom scripts!</color>"
zhCN = "<color=red>xa0!!! 启动教程xa0!!!</color>\n真硬尾狸的追随者们，他们把一切都视为家园。他们的人口常常失控膨胀，食物和水源耗尽，科学成了奢侈品，而你的失败是不可避免的。\n\n忘记其他派系教你的东西，欢迎来到你最梦魇的粉色世界。\n<color=red>xa0!!! 启动教程xa0!!!</color>\n\n<color=black>海狸的艺术和纹理由Wolfess创作，感谢！\n许多图标由Thorlak制作，感谢！\n特别感谢Grauschweif提供的自定义脚本！</color>"
zhTW = "<color=red>xa0!!! 啟動教程xa0!!!</color>\n真正海狸之道的追隨者，對他們而言，一切都是家。 他們的人口經常失控爆炸，食物和水源耗竭，科學是奢侈品，而你的失敗無法避免。\n\n 忘記其他派系教給你的東西，歡迎來到你最粉紅色的噩夢。\n<color=red>xa0!!! 啟動教程xa0!!!</color>\n\n<color=black>海狸的藝術和材質由Wolfess製作，感謝很大！\n許多圖標由Thorlak製作，感謝也很大！\n特別感謝Grauschweif提供的自訂腳本！</color>"
ruRU = "<color=red>xa0!!! АКТИВИРУЙТЕ УРОКxa0!!!</color>\nПоследователи Истинного Пути Бобра, для них всё — это дом. Их население часто выходит из-под контроля, запасы еды и воды истощаются, наука — это роскошь, а ваше поражение неизбежно.\n\nЗабудьте, чему учили вас другие фракции, и добро пожаловать в ваш розовейший кошмар.\n<color=red>xa0!!! АКТИВИРУЙТЕ УРОКxa0!!!</color>\n\n<color=black>Искусство и текстуры бобров от Wolfess, огромная благодарность!\nМногие иконки от Thorlak, спасибо тоже!\nМега-благодарность Grauschweif за пользовательские скрипты!</color>"
jaJP = "<color=red>xa0!!! チュートリアルを起動せよxa0!!!</color>\n真のビーバーパスの信者たちは、すべてを家と考えます。彼らの人口はしばしば制御を超えて爆発的に増加し、食料や水が不足し、科学は贅沢となり、あなたの敗北は避けられません。\n\n他の派閥が教えたことを忘れ、あなたの最もピンクな悪夢へようこそ。\n<color=red>xa0!!! チュートリアルを起動せよxa0!!!</color>\n\n<color=black>ビーバーのアートとテクスチャはWolfessによるもので、心から感謝します！\n多くのアイコンはThorlakによるもので、こちらにも感謝します！\nカスタムスクリプトを提供してくれたGrauschweifに特大感謝！</color>"
frFR = "<color=red>xa0!!! ACTIVEZ LE TUTORIEL xa0!!!</color>\nLes adeptes du Vrai Chemin du Castor, pour eux tout est une maison. Leur population explose souvent hors de contrôle, la nourriture et l'eau viennent à manquer, la science est un luxe, et votre défaite inévitable.\n\nOubliez ce que d'autres factions vous ont appris, et bienvenue dans votre cauchemar le plus rose.\n<color=red>xa0!!! ACTIVEZ LE TUTORIEL xa0!!!</color>\n\n<color=black>Art et textures de castor par Wolfess, un immense merci !\nDe nombreuses icônes par Thorlak, un immense merci également !\nUn immense merci à Grauschweif pour les scripts personnalisés !</color>"
deDE = "<color=red>xa0!!! AKTIVIEREN SIE DAS TUTORIALxa0!!!</color>\nAnhänger des wahren Biberpfades, für sie ist alles ein Zuhause. Ihre Bevölkerung explodiert oft außer Kontrolle, Nahrung und Wasser gehen zur Neige, Wissenschaft ist ein Luxus, und Ihre Niederlage ist unvermeidlich.\n\nVergessen Sie, was andere Fraktionen Ihnen beigebracht haben, und willkommen in Ihrem rosa Albtraum.\n<color=red>xa0!!! AKTIVIEREN SIE DAS TUTORIALxa0!!!</color>\n\n<color=black>Biberkunst und Texturen von Wolfess, vielen Dank!\nViele Icons von Thorlak, auch vielen Dank!\nMega-Dank an Grauschweif für die benutzerdefinierten Skripte!</color>"
plPL = "<color=red>xa0!!! AKTYWUJ TUTORIALxa0!!!</color>\nWyznawcy Prawdziwej Drogi Bobra, dla nich wszystko jest domem. Ich populacja często wymyka się spod kontroli, jedzenie i woda się kończą, nauka to luksus, a twoja porażka nieunikniona.\n\n Zapomnij, czego nauczyły cię inne frakcje, i witaj w swoim najróżowym koszmarze.\n<color=red>xa0!!! AKTYWUJ TUTORIALxa0!!!</color>\n\n\n\n<color=black>Sztuka i tekstury bobra autorstwa Wolfess, ogromne dzięki! \nWiele ikon autorstwa Thorlaka, ogromne dzięki również! \nMega-dzięki dla Grauschweifa za niestandardowe skrypty!</color>"
ptBR = "<color=red>xa0!!! ATIVE O TUTORIALxa0!!!</color>\nSeguidores do Verdadeiro Caminho do Castor, para eles tudo é uma casa. Sua população frequentemente explode fora de controle, comida e água se esgotam, ciência é um luxo, e sua derrota é inevitável.\n\n Esqueça o que outras facções te ensinaram, e dê as boas-vindas ao seu pesadelo mais rosa.\n<color=red>xa0!!! ATIVE O TUTORIALxa0!!!</color>\n\n<color=black>Arte e texturas de castor por Wolfess, enormes agradecimentos!\nMuitos ícones por Thorlak, enormes agradecimentos também!\nMega-acreditações a Grauschweif pelos scripts personalizados!</color>"
koKR = "<color=red>xa0!!! 튜토리얼 활성화하기xa0!!!</color>\n진정한 비버의 길을 따르는 그들에게 모든 것은 집이다. 그들의 인구는 종종 통제를 벗어나고, 음식과 물이 바닥나며, 과학은 사치가 되고, 당신의 패배는 피할 수 없다.\n\n다른 세력이 가르쳐 준 것을 잊고, 당신의 가장 핑크색 악몽에 오신 것을 환영합니다.\n<color=red>xa0!!! 튜토리얼 활성화하기xa0!!!</color>\n\n<color=black>비버의 예술과 텍스처는 Wolfess가 제작하였으며, 큰 감사 드립니다!\n여러 아이콘은 Thorlak가 제작하였으며, 그에게도 큰 감사 드립니다!\n맞춤 스크립트에 대해 Grauschweif에게 mega-thanks!</color>"
csCZ = "<color=red>xa0!!! AKTIVUJ TUTORIÁL xa0!!!</color>\nNásledovníci Pravé Cesty Bobra, pro ně je všechno domov. Nejpopulárnější se jejich populace často vymkne z kontroly, jídlo a voda docházejí, věda je luxus a vaše porážka nevyhnutelná.\n\nZapomeňte, co vás učily ostatní frakce, a vítejte ve svém nejsvítivějším noční můře.\n<color=red>xa0!!! AKTIVUJ TUTORIÁL xa0!!!</color>\n\n<color=black>Umění a textury bobrů od Wolfess, obrovské díky!\nMnoho ikon od Thorlak, také obrovské díky!\nMega-díky Grauschweifovi za vlastní skripty!</color>"
viVN = "<color=red>xa0!!! KÍCH HOẠT HƯỚNG DẪNxa0!!!</color>\nNhững người theo Đạo Castor Thật, với họ mọi thứ đều là nhà. Dân số của họ thường bùng nổ ngoài tầm kiểm soát, thức ăn và nước uống cạn kiệt, khoa học là một thứ xa xỉ, và thất bại của bạn là điều không thể tránh khỏi.\n\nQuên những gì các factions khác đã dạy bạn, và chào mừng đến với cơn ác mộng hồng nhất của bạn.\n<color=red>xa0!!! KÍCH HOẠT HƯỚNG DẪNxa0!!!</color>\n\n<color=black>Nghệ thuật và kết cấu Beaver bởi Wolfess, cảm ơn rất nhiều! \nNhiều biểu tượng bởi Thorlak, cảm ơn rất nhiều nữa! \nMega-cảm ơn Grauschweif vì các script tùy chỉnh!</color>"

