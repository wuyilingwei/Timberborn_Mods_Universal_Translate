["Lapantouflemagic.ZiplineTerminusBalloon.Description"]
raw = "A balloon bearing the zipline cables in between stations.\nAllows beavers to access the floor to work.\n<color=green>Connections: 1</color>\n<color=red>Allows movement but does not connect roads.</color>"
status = "normal"
enUS = "A balloon bearing the zipline cables between stations.  \nAllows beavers to access the floor to work.  \n<color=green>Connections: 1</color>  \n<color=red>Allows movement but does not connect roads.</color>"
zhCN = "“一个承载滑索电缆的气球在站点之间。  \n允许海狸进入地面工作。  \n<color=green>连接：1</color>  \n<color=red>允许移动但不连接道路。</color>”"
zhTW = "一個在站點之間承載滑索纜繩的氣球。\n允許海狸接觸地面工作。\n<color=green>連接數：1</color>\n<color=red>允許移動，但不連接道路。</color>"
ruRU = "Шар, поддерживающий канаты зиплайна между станциями. Позволяет бобрам добираться до уровня пола для работы. <color=green>Соединений: 1</color> <color=red>Позволяет передвижение, но не соединяет дороги.</color>"
jaJP = "「駅間の ZIP ライン ケーブルを支える風船。ビーバーが床にアクセスして作業することを可能にします。<color=green>接続: 1</color><color=red>移動を可能にしますが、道路には接続しません。</color>」"
frFR = "Un ballon portant les câbles de la tyrolienne entre les stations.  \nPermet aux castors d'accéder au sol pour travailler.  \n<color=green>Connexions : 1</color>  \n<color=red>Permet le mouvement mais ne connecte pas les routes.</color>"
deDE = "„Ein Ballon, der die Seilbahnseile zwischen den Stationen trägt. \nErmöglicht es den Bibern, den Boden zu erreichen, um zu arbeiten. \n<color=green>Verbindungen: 1</color> \n<color=red>Ermöglicht Bewegung, verbindet jedoch keine Straßen.</color>“"
plPL = "Balon niosący liny zjazdowe pomiędzy stacjami. \nPozwala bobrom dotrzeć na poziom roboczy. \n<color=green>Połączenia: 1</color> \n<color=red>Pozwala na ruch, ale nie łączy dróg.</color>"
ptBR = "Um balão suportando os cabos de zipline entre estações. \nPermite que os castores acessem o chão para trabalhar. \n<color=green>Conexões: 1</color> \n<color=red>Permite movimento, mas não conecta estradas.</color>"
koKR = "역할: 한 정거장과 다른 정거장 사이의 집라인 케이블을 지탱하는 풍선.  \n비버가 작업할 수 있도록 바닥에 접근할 수 있게 해줍니다.  \n<color=green>연결: 1</color>  \n<color=red>이동은 가능하지만 도로를 연결하지는 않습니다.</color>"
csCZ = "Balón nesoucí lanové dráhy mezi stanicemi.  \nUmožňuje bobrům přístup k podlaze, aby mohli pracovat.  \n<color=green>Připojení: 1</color>  \n<color=red>Umožňuje pohyb, ale nepřipojuje cesty.</color>"
viVN = "Một quả bóng mang cáp zipline giữa các trạm.\nCho phép những con hải ly tiếp cận sàn để làm việc.\n<color=green>Kết nối: 1</color>\n<color=red>Cho phép di chuyển nhưng không kết nối đường.</color>"

["Lapantouflemagic.ZiplineTerminusBalloon.FlavorDescription"]
raw = "\"It could be fun to jump in a lake from here...\"\n -Toothless the Wise, elder beaver"
status = "normal"
enUS = "\"It could be fun to jump in a lake from here...\"\n-Toothless the Wise, elder beaver"
zhCN = "“从这里跳进湖里可能会很有趣……”  \n-智慧无齿的老海狸"
zhTW = "「從這裡跳進湖裡可能會很有趣……」  \n- 無牙的智者，老鵝"
ruRU = "\"Здесь было бы здорово прыгнуть в озеро...\"\n - Беззубик Мудрый, старейшина бобров"
jaJP = "「ここから湖に飛び込むのは楽しそうだ…」  \n-賢者トゥースレス、長老ビーバー"
frFR = "« Ça pourrait être amusant de sauter dans un lac d'ici... »  \n- Grypante le Sage, castor âgé"
deDE = "\"Es könnte Spaß machen, von hier aus in einen See zu springen...\"  \n- Zahnlos der Weise, älterer Biber"
plPL = "\"Może być zabawnie skoczyć stąd do jeziora...\"  \n- Bezgębny Mądry, starszy bóbr"
ptBR = "\"Poderia ser divertido pular em um lago daqui...\"  \n- Dente de Leite, o castor sábio"
koKR = "\"여기서 호수로 점프하는 건 재밌을 것 같아...\"  \n- 지혜로운 이빨 없는 비버, 노인"
csCZ = "\"Mohlo by být zábavné skočit odsud do jezera...\" \n -Bezzubý Moudrý, starší bobr"
viVN = "\"Thật vui khi nhảy xuống hồ từ đây...\"  \n- Răng không có, người thông thái, thú nhảy bìu"

