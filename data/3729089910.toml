["Faction.FrostyWhiskers.Description"]
raw = "\n\n\n\n\n\n\n\n<color=red>xa0!!! ACTIVATE THE TUTORIALxa0!!!</color>\nRobots awaken from their deep slumber. \nThe world is covered with ice.\nClean water is still nothing more than a fleeting illusion.\nYour existance is at risk.\n\nBio-beavers are useful workforce, but the bots are the main players here.\nWill you manage to survive this frozen landscapexa0?\n<color=red>xa0!!! ACTIVATE THE TUTORIALxa0!!!</color>\n\n\n\n<color=black>Thanks to Grauschweif for the custom scripts !\nSome textures / images have been reworked by ChatGPT.\nMost icons taken from Flaticon.com or handmade by me</color>"
status = "normal"
enUS = "<color=red>xa0!!! ACTIVATE THE TUTORIALxa0!!!</color>\nRobots awaken from their deep slumber. \nThe world is covered with ice.\nClean water is still nothing more than a fleeting illusion.\nYour existence is at risk.\n\nBio-beavers are a useful workforce, but the bots are the main players here.\nWill you manage to survive this frozen landscape xa0?\n<color=red>xa0!!! ACTIVATE THE TUTORIALxa0!!!</color>\n\n<color=black>Thanks to Grauschweif for the custom scripts!\nSome textures/images have been reworked by ChatGPT.\nMost icons taken from Flaticon.com or handmade by me</color>"
zhCN = "<color=red>xa0!!! 激活教程xa0!!!</color>\n机器人从深沉的沉睡中苏醒。\n世界被冰雪覆盖。\n洁净的水依然不过是稍纵即逝的幻影。\n你的生存面临风险。\n\n生物海狸是有用的劳动力，但机器人才是这里的主角。\n你能在这片冰雪覆盖的土地上生存下来吗xa0？\n<color=red>xa0!!! 激活教程xa0!!!</color>\n\n<color=black>感谢Grauschweif提供的自定义脚本！\n一些纹理/图像由ChatGPT重新处理。\n大多数图标来自Flaticon.com或由我手工制作</color>"
zhTW = "<color=red>xa0!!! 啟動教程xa0!!!</color>\n機器人在沉睡中覺醒。\n世界被冰覆蓋。\n清水仍然只是瞬間的幻影。\n你的存在正面臨危險。\n\n生物海狸是有用的勞動力，但機器人才是這裡的主角。\n你能在這片冰冷的景觀中生存下來嗎xa0？\n<color=red>xa0!!! 啟動教程xa0!!!</color>\n\n<color=black>感謝 Grauschweif 提供自訂腳本！\n一些紋理/圖像由 ChatGPT 重新製作。\n大多數圖標來自 Flaticon.com 或由我手工製作</color>"
ruRU = "<color=red>xa0!!! АКТИВИРУЙТЕ УРОКxa0!!!</color>\nРоботы пробуждаются от своего глубокого сна. \nМир покрыт льдом.\nЧистая вода по-прежнему остается лишь мимолетной иллюзией.\nВаше существование под угрозой.\n\nБио-бобры - полезная рабочая сила, но главные игроки здесь - это боты.\nСможете ли вы выжить в этом ледяном ландшафтеxa0?\n<color=red>xa0!!! АКТИВИРУЙТЕ УРОКxa0!!!</color>\n\n<color=black>Спасибо Grauschweif за пользовательские скрипты!\nНекоторые текстуры / изображения были переработаны ChatGPT.\nБольшинство иконок взяты с Flaticon.com или сделаны мной самостоятельно</color>"
jaJP = "<color=red>xa0!!! チュートリアルをアクティベートせよxa0!!!</color>\nロボットたちが深い眠りから目覚める。  \n世界は氷に覆われている。  \n清水は依然としてただの儚い幻に過ぎない。  \nあなたの存在は危機にさらされている。  \n\nバイオビーバーは有用な労働力だが、ここではロボットが主役である。  \nこの凍りついた風景の中で生き残れるだろうかxa0？  \n<color=red>xa0!!! チュートリアルをアクティベートせよxa0!!!</color>  \n\n<color=black>Grauschweifにカスタムスクリプトの感謝！  \nいくつかのテクスチャ/画像はChatGPTによって再加工されています。  \nほとんどのアイコンはFlaticon.comから取得するか、私が手作りしたものです</color>"
frFR = "<color=red>xa0!!! ACTIVEZ LE TUTORIELxa0!!!</color>\nLes robots se réveillent de leur profond sommeil.\nLe monde est recouvert de glace.\nDe l'eau propre n'est encore rien de plus qu'une illusion fugace.\nVotre existence est en danger.\n\nLes castors biologiques sont une main-d'œuvre utile, mais les robots sont les principaux acteurs ici.\nArriverez-vous à survivre dans ce paysage geléxa0?\n<color=red>xa0!!! ACTIVEZ LE TUTORIELxa0!!!</color>\n\n<color=black>Merci à Grauschweif pour les scripts personnalisés !\nCertaines textures / images ont été retravaillées par ChatGPT.\nLa plupart des icônes proviennent de Flaticon.com ou ont été faites à la main par moi</color>"
deDE = "<color=red>xa0!!! AKTIVIEREN SIE DAS TUTORIALxa0!!!</color>\nRoboter erwachen aus ihrem tiefen Schlaf.\nDie Welt ist mit Eis bedeckt.\nSauberes Wasser ist nach wie vor nichts weiter als eine flüchtige Illusion.\nIhr Dasein steht auf dem Spiel.\n\nBio-Biber sind nützliche Arbeitskräfte, aber die Bots sind hier die Hauptakteure.\nWirst du es schaffen, in dieser gefrorenen Landschaft zu überlebenxa0?\n<color=red>xa0!!! AKTIVIEREN SIE DAS TUTORIALxa0!!!</color>\n\n<color=black>Vielen Dank an Grauschweif für die benutzerdefinierten Skripte!\nEinige Texturen / Bilder wurden von ChatGPT überarbeitet.\nDie meisten Icons stammen von Flaticon.com oder wurden von mir selbst erstellt.</color>"
plPL = "<color=red>xa0!!! AKTYWUJ SAMOUCZNIAxa0!!!</color>\nRoboty budzą się z głębokiego snu. \nŚwiat pokryty jest lodem.\nCzysta woda nadal jest tylko ulotną iluzją.\nTwoje istnienie jest zagrożone.\n\nBio-bobry są użyteczną siłą roboczą, ale to roboty są tutaj głównymi graczami.\nCzy uda ci się przetrwać na tym zamarzniętym krajobraziexa0?\n<color=red>xa0!!! AKTYWUJ SAMOUCZNIAxa0!!!</color>\n\n<color=black>Dzięki Grauschweif za niestandardowe skrypty !\nNiektóre tekstury / obrazy zostały przerobione przez ChatGPT.\nWiększość ikon pochodzi z Flaticon.com lub została stworzona przeze mnie</color>"
ptBR = "<color=red>xa0!!! ATIVE O TUTORIAL xa0!!!</color>\nOs robôs despertam de seu profundo sono. \nO mundo está coberto de gelo.\nÁgua potável ainda é nada mais do que uma ilusão passageira.\nSua existência está em perigo.\n\nOs castores bio são uma força de trabalho útil, mas os robôs são os principais protagonistas aqui.\nVocê conseguirá sobreviver neste cenário congelado xa0?\n<color=red>xa0!!! ATIVE O TUTORIAL xa0!!!</color>\n\n<color=black>Agradecimentos a Grauschweif pelos scripts personalizados!\nAlgumas texturas/imagens foram re-trabalhadas pelo ChatGPT.\nA maioria dos ícones foi retirada do Flaticon.com ou feita por mim</color>"
koKR = "<color=red>xa0!!! 튜토리얼을 활성화하세요xa0!!!</color>\n로봇들이 깊은 잠에서 깨어납니다.\n세상은 얼음으로 덮여 있습니다.\n맑은 물은 그저 덧없는 환상일 뿐입니다.\n당신의 존재가 위험에 처해 있습니다.\n\n생체 비버는 유용한 노동력이지만, 로봇들이 여기서 주요 역할을 합니다.\n이 얼음으로 뒤덮인 풍경에서 당신은 살아남을 수 있을까요xa0?\n<color=red>xa0!!! 튜토리얼을 활성화하세요xa0!!!</color>\n\n<color=black>Grauschweif에게 커스텀 스크립트에 감사드립니다!\n몇몇 텍스처 / 이미지는 ChatGPT에 의해 재작업되었습니다.\n대부분의 아이콘은 Flaticon.com에서 가져오거나 제가 직접 제작했습니다.</color>"
csCZ = "<color=red>xa0!!! AKTIVUJTE TUTORIÁLxa0!!!</color>\nRoboti se probouzí ze svého hlubokého spánku. \nSvět je pokrytý ledem.\nČistá voda je stále jen prchavou iluzí.\nVaše existence je v ohrožení.\n\nBio-beaverové jsou užitečnou pracovní silou, ale hlavními hráči jsou roboti.\nPodaří se vám přežít tuto zamrzlou krajinu xa0?\n<color=red>xa0!!! AKTIVUJTE TUTORIÁLxa0!!!</color>\n\n<color=black>Děkujeme Grauschweifovi za vlastní skripty!\nNěkteré textury / obrázky byly upraveny ChatGPT.\nVětšina ikon pochází z Flaticon.com nebo je vytvořena mnou</color>"
viVN = "<color=red>xa0!!! KÍCH HOẠT HƯỚNG DẪNxa0!!!</color>\nRobot tỉnh dậy sau giấc ngủ sâu.\nThế giới bị bao phủ bởi băng.\nNước sạch chỉ là một ảo ảnh thoáng qua.\nSự tồn tại của bạn đang gặp nguy hiểm.\n\nBeaver sinh học là lực lượng lao động hữu ích, nhưng robot mới là nhân vật chính ở đây.\nBạn có thể sống sót qua cảnh quan lạnh giá nàyxa0?\n<color=red>xa0!!! KÍCH HOẠT HƯỚNG DẪNxa0!!!</color>\n\n<color=black>Cảm ơn Grauschweif vì các kịch bản tùy chỉnh!\nMột số kết cấu / hình ảnh đã được chỉnh sửa bởi ChatGPT.\nHầu hết biểu tượng được lấy từ Flaticon.com hoặc do tôi tự làm</color>"

