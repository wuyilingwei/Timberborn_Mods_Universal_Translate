["Lapantouflemagic.MajorBurns.DeathMessage"]
raw = "<color=green>fell into a pool of molten material shouting \"My prreeeciouuuus\". It was acting really strange lately.</color>"
status = "normal"
enUS = "<color=green>fell into a pool of molten material shouting \"My prreeeciouuuus\". It was acting really strange lately.</color>"
zhCN = "<color=green>掉进了一池熔融物质中，喊着“我的宝贵”。最近它的行为真的很奇怪。</color>"
zhTW = "<color=green>掉進熔融物質的池中，喊著「我的寶貝」。最近的行為真的很奇怪。</color>"
ruRU = "<color=green>упал в лаву, крича \"Мой дорогой\". В последнее время он вел себя очень странно.</color>"
jaJP = "<color=green>溶けた物質のプールに「私の大切なものだ！」と叫びながら落ちた。最近、彼は本当に奇妙な行動をしていた。</color>"
frFR = "<color=green>est tombé dans une mare de matériau en fusion en criant \"Mon prreeeciouuuus\". Il se comportait vraiment bizarrement ces derniers temps.</color>"
deDE = "<color=green>fiel in einen Pool aus schmelzendem Material und rief \"Meiinnn Schätzchen\". Es verhielt sich zuletzt wirklich seltsam.</color>"
plPL = "<color=green>wpadł do basenu stopionego materiału krzycząc \"Moje prreeeciouuuus\". Ostatnio zachowywał się naprawdę dziwnie.</color>"
ptBR = "<color=green>caiu em uma poça de material derretido gritando \"Meu preciosooos\". Estava agindo de maneira muito estranha ultimamente.</color>"
koKR = "<color=green>녹아내리는 물질의 웅덩이에 빠지며 \"내 소중한 것\"이라고 외쳤습니다. 최근에 정말 이상한 행동을 했습니다.</color>"
csCZ = "<color=green>spadl do bazénu roztaveného materiálu a křičel \"Mojeěěě cennost\". Choval se poslední dobou opravdu podivně.</color>"
viVN = "<color=green>rơi vào một bể vật liệu nóng chảy và hét lên \"Châu báu của tôi\". Gần đây nó đã hành xử rất lạ lùng.</color>"

