["Lapantouflemagic.Primitivesmetler.Description"]
raw = "A mixture of iron ore and coal in a clay crucible to be lit on fire.\n<color=#FF6EC7>Can function without workers.</color>"
status = "normal"
enUS = "A mixture of iron ore and coal in a clay crucible to be lit on fire.  \n<color=#FF6EC7>Can function without workers.</color>"
zhCN = "在粘土坩埚中混合铁矿石和煤，并点燃。\n<color=#FF6EC7>可以在没有工人的情况下运作。</color>"
zhTW = "一種在黏土坩埚中點燃的鐵礦石和煤的混合物。  \n<color=#FF6EC7>可以在沒有工人的情況下運作。</color>"
ruRU = "Смесь железной руды и угля в глиняном тигле, который нужно поджечь. <color=#FF6EC7>Может функционировать без работников.</color>"
jaJP = "鉄鉱石と石炭の混合物を粘土のるつぼに入れ、火を点ける。  \n<color=#FF6EC7>労働者なしで機能可能。</color>"
frFR = "Un mélange de minerai de fer et de charbon dans un creuset en argile à mettre à feu.  \n<color=#FF6EC7>Peut fonctionner sans travailleurs.</color>"
deDE = "Eine Mischung aus Eisenerz und Kohle in einem Tonkruge, die angezündet werden soll. <color=#FF6EC7>Kann ohne Arbeiter funktionieren.</color>"
plPL = "Mieszanka rudy żelaza i węgla w glinianym piecu, który ma być podpalony.  \n<color=#FF6EC7>Może działać bez pracowników.</color>"
ptBR = "Uma mistura de minério de ferro e carvão em um cadinho de argila a ser acesa.\n<color=#FF6EC7>Pode funcionar sem trabalhadores.</color>"
koKR = "불에 태워야 할 점토 도가니 안의 철광석과 석탄의 혼합물입니다.\n<color=#FF6EC7>근로자 없이 작동할 수 있습니다.</color>"
csCZ = "Směs železné rudy a uhlí v hliněné kelímku, která má být zapálena. <color=#FF6EC7>Může fungovat bez pracovníků.</color>"
viVN = "Một hỗn hợp quặng sắt và than trong một cái nồi đất sét để đốt cháy.\n<color=#FF6EC7>Có thể hoạt động mà không cần công nhân.</color>"

