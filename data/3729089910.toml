["Lapantouflemagic.PolarTrader.Description"]
raw = "The rustic Polarbeavers live in, and explore the ruins of some strange frozen circular hooman city. They would sell their own moms into slavery in exchange for those ''rocks that are always warm'' that wer’re pretty sure don’t actually exist. Otherwise they will want food or coal, and will more than gladly give us as much ice and junk as we can liftoff with. Unless you're the kind of sicko who likes to collect hooman remains."
status = "normal"
enUS = "The rustic Polarbeavers live in and explore the ruins of some strange frozen circular human city. They would sell their own mothers into slavery in exchange for those \"rocks that are always warm\" that we're pretty sure don't actually exist. Otherwise, they will want food or coal, and will more than gladly give us as much ice and junk as we can lift off with. Unless you're the kind of sicko who likes to collect human remains."
zhCN = "这些乡村的极地海狸生活并探索一些奇怪的冰封圆形人类城市的遗迹。他们愿意把自己的妈妈卖为奴隶，以换取那些“总是温暖的石头”，我们很确定它们实际上并不存在。否则，他们会想要食物或煤炭，并非常乐意给我们尽可能多的冰和废物，只要我们能够带走。除非你是那种喜欢收集人类遗骸的病态者。"
zhTW = "樸實的北極海狸生活並探索著一些奇怪的寒冷圓形人類城市的廢墟。他們會把自己的媽媽賣作奴隸，以交換那些「總是溫暖的石頭」，我們幾乎可以肯定這些石頭根本不存在。否則，他們會想要食物或煤炭，會很高興地給我們帶來儘可能多的冰和垃圾，讓我們能夠帶走。除非你是那種喜歡收集人類遺骸的變態。"
ruRU = "Простые полярные бобры живут в руинах какого-то странного замороженного круглого человеческого города и исследуют его. Они готовы продать своих матерей в рабство в обмен на те «камни, которые всегда теплые», которые, как мы уверены, не существуют. В противном случае они будут просить еду или уголь и с радостью дадут нам столько льда и мусора, сколько мы сможем унести. Если только вы не тот извращенец, которому нравится собирать человеческие останки."
jaJP = "田舎風のポラビーバーたちは、奇妙な凍った円形の人間の都市の遺跡に住み、探検します。彼らは「いつも暖かい」と言われる岩のために、自分の母親を奴隷として売るつもりです。実際には存在しないと確信しています。さもなければ、食べ物や石炭を求め、私たちが持ち上げられる限りの氷やゴミを喜んでくれるでしょう。人間の遺体を集めるのが好きな変人でない限りは。"
frFR = "Les rustiques Polarbeavers vivent dans, et explorent les ruines d'une étrange ville circulaire humaine gelée. Ils vendraient leurs propres mères en esclavage en échange de ces ''pierres qui sont toujours chaudes'' qui, nous en sommes assez sûrs, n'existent pas réellement. Sinon, ils voudront de la nourriture ou du charbon, et seront plus que contents de nous donner autant de glace et de déchets que nous pouvons emporter. À moins que vous ne soyez le genre de malade qui aime collectionner les restes humains."
deDE = "Die rustikalen Polarbeaver leben in den Ruinen einer seltsamen gefrorenen, kreisförmigen Menschenstadt und erkunden diese. Sie würden ihre eigenen Mütter ins Sklaventum verkaufen, um im Austausch diese \"Steine, die immer warm sind\", zu bekommen, von denen wir ziemlich sicher sind, dass sie eigentlich nicht existieren. Ansonsten werden sie Essen oder Kohle wollen und uns gerne so viel Eis und Zeug geben, wie wir mitnehmen können. Es sei denn, du bist der Typ von Abartigem, der gerne menschliche Überreste sammelt."
plPL = "Rustykalne Polarbeavers żyją i eksplorują ruiny dziwnej, zamrożonej, okrągłej ludzkiej miejscowości. Sprzedaliby własne matki w niewolę w zamian za te \"kamienie, które są zawsze ciepłe\", o istnieniu których jesteśmy niemal pewni, że w rzeczywistości nie istnieją. W przeciwnym razie będą chcieli jedzenia lub węgla i z radością dadzą nam tyle lodu i śmieci, ile tylko będziemy w stanie unieść. Chyba że jesteś takim zboczeńcem, który lubi zbierać ludzkie szczątki."
ptBR = "Os rústicos Polarbeavers vivem e exploram as ruínas de uma estranha cidade circular humana congelada. Eles venderiam suas próprias mães como escravas em troca das ''pedras que estão sempre quentes'' que temos certeza que na verdade não existem. Caso contrário, eles vão querer comida ou carvão e nos darão, mais do que felizes, tanto gelo e tralha quanto conseguirmos levar. A menos que você seja o tipo de psicopata que gosta de coletar restos humanos."
koKR = "소박한 폴라비버들은 이상한 얼음으로 된 원형 인간 도시의 유적지에서 살고 탐험합니다. 그들은 우리가 확실히 존재하지 않는 \"항상 따뜻한\" 그 돌들을 대가로 자신의 엄마를 노예로 팔아버릴 수 있습니다. 그렇지 않으면 그들은 음식이나 석탄을 원할 것이며, 우리가 수거할 수 있는 만큼 많은 얼음과 쓰레기를 기꺼이 줄 것입니다. 당신이 인간의 유해를 수집하는 것을 좋아하는 변태가 아니라면 말이죠."
csCZ = "Rustikální polární bobři žijí v a prozkoumávají ruiny nějakého podivného zmrzlého kruhového města lidí. Prodali by své vlastní matky do otroctví výměnou za ty \"kamínky, které jsou vždy teplé\", o nichž jsme si téměř jisti, že ve skutečnosti neexistují. Jinak budou chtít jídlo nebo uhlí a s radostí nám dají tolik ledu a haraburdí, kolik unese. Pokud nejste ten druh úchyla, který má rád sběratelství lidských pozůstatků."
viVN = "Những con kỳ lân Polarbeavers mộc mạc sống trong, và khám phá những di tích của một thành phố hình tròn người quê kỳ lạ bị đông lạnh. Chúng sẽ bán cả mẹ của mình làm nô lệ để đổi lấy ''những viên đá luôn ấm'' mà chúng tôi khá chắc là không thực sự tồn tại. Nếu không, chúng sẽ muốn thức ăn hoặc than, và sẽ rất vui lòng cung cấp cho chúng ta nhiều đá và rác mà chúng ta có thể mang đi. Trừ khi bạn là kiểu người bệnh hoạn thích thu thập di tích của con người."

