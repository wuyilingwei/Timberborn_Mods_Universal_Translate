zhCN = "将废弃的人类设施的空闲区域改造为存储大量资源的地方。"
zhTW = "「將廢棄的人類設施中的空置區域重新用作儲存過量資源。」"
ruRU = "Перепрофилирует пустой сектор заброшенного человеческого объекта для хранения чрезмерного количества ресурсов."
jaJP = "「放棄された人間の施設の空いているセクターを再利用して、過剰な量の資源を蓄える。」"
frFR = "Réutilise un secteur vide de l'installation humaine abandonnée pour stocker une quantité excessive de ressources."
deDE = "Nutzen Sie einen leerstehenden Bereich der verlassenen Hooman-Anlage, um eine übermäßige Menge an Ressourcen zu lagern."
plPL = "Przeprojektowuje pusty sektor porzuconego obiektu hooman, aby przechowywać nadmierną ilość zasobów."
ptBR = "Redireciona um setor vazio da instalação abandonada dos hoomans para armazenar uma quantidade excessiva de recursos."
