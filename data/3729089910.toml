["Lapantouflemagic.Aqueduct.FlavorDescription"]
raw = "\"Give it an incline and you get one of the most fun things in the world!\""
status = "normal"
enUS = "\"Give it an incline and you get one of the most fun things in the world!\""
zhCN = "\"给它一个倾斜，你就能得到世界上最有趣的东西之一！\""
zhTW = "「給它一個斜度，你就能得到世界上最有趣的事情之一！」"
ruRU = "\"Положите на наклон, и вы получите одну из самых веселых вещей на свете!\""
jaJP = "傾斜をつけると、世界で最も楽しいものの一つが手に入ります！"
frFR = "\"Donnez-lui une inclinaison et vous obtenez l'une des choses les plus amusantes au monde !\""
deDE = "\"Gib ihm eine Neigung und du bekommst eine der lustigsten Dinge der Welt!\""
plPL = "\"Dasz mu nachylenie, a otrzymasz jedną z najfajniejszych rzeczy na świecie!\""
ptBR = "\"Dê uma inclinação e você terá uma das coisas mais divertidas do mundo!\""
koKR = "\"경사를 주면 세상에서 가장 재미있는 것 중 하나를 얻을 수 있습니다!\""
csCZ = "\"Dejte mu sklon a dostanete jednu z nejzábavnějších věcí na světě!\""
viVN = "\"Cho nó một độ dốc và bạn sẽ có một trong những thứ vui nhất trên thế giới!\""

["Lapantouflemagic.Megaplatform.Description"]
raw = "A gigantic platform capable of supporting enormous loads, comes with near everlasting artificial light thanks to the power of unethical animal experimentation.\nThe metal rings need to snap on <color=green>Giant Pillars</color>."
status = "normal"
enUS = "A gigantic platform capable of supporting enormous loads, comes with near everlasting artificial light thanks to the power of unethical animal experimentation.  \nThe metal rings need to snap on <color=green>Giant Pillars</color>."
zhCN = "一个能够承载巨大负荷的巨大平台，得益于不道德动物实验的力量，几乎拥有永恒的人造光。\n金属环需要卡在<color=green>巨型柱子</color>上。"
zhTW = "一個能夠承受巨大負載的龐大平台，因不道德的動物實驗而擁有近乎永恆的人工光源。金屬環需牢牢固定在<color=green>巨型柱子</color>上。"
ruRU = "Гигантская платформа, способная выдерживать огромные нагрузки, обеспечивается практически вечным искусственным светом благодаря силе неэтичных экспериментов над животными. Металлические кольца должны зафиксироваться на <color=green>Гигантских Столбах</color>."
jaJP = "巨大な荷重を支えることができるプラットフォームで、不正な動物実験の力のおかげでほぼ永遠に続く人工光を備えています。  \n金属リングは<color=green>巨大な柱</color>にスナップする必要があります。"
frFR = "Une plateforme gigantesque capable de supporter des charges énormes, équipée d'une lumière artificielle presque éternelle grâce au pouvoir d'expérimentations animales non éthiques.  \nLes anneaux en métal doivent s'enclencher sur <color=green>Piliers Géants</color>."
deDE = "Eine gigantische Plattform, die in der Lage ist, enorme Lasten zu tragen, kommt mit nahezu ewigem künstlichem Licht dank der Macht unethischer Tierversuche.  \nDie Metallringe müssen auf <color=green>Gigantischen Säulen</color> einrasten."
plPL = "Gigantyczna platforma zdolna do utrzymania ogromnych obciążeń, wyposażona w prawie wieczne sztuczne światło dzięki mocy nieetycznych eksperymentów na zwierzętach. Metalowe pierścienie muszą zatrzasnąć się na <color=green>Gigantycznych Filarach</color>."
ptBR = "Uma plataforma gigantesca capaz de suportar cargas enormes, vem com luz artificial quase eterna graças ao poder de experimentação animal antiética. Os anéis de metal precisam se encaixar em <color=green>Pilares Gigantes</color>."
koKR = "거대한 하중을 지탱할 수 있는 거대한 플랫폼으로, 비윤리적 동물 실험의 힘 덕분에 거의 영구적인 인공 조명이 제공됩니다. 금속 링은 <color=green>거대한 기둥</color>에 부착되어야 합니다."
csCZ = "Obrovská platforma schopná unést obrovské zatížení, přichází s téměř věčným umělým osvětlením díky moci neetického pokusnictví na zvířatech. Metalické prstence se musí zaklínit na <color=green>Obrovské sloupy</color>."
viVN = "Một nền tảng khổng lồ có khả năng chịu đựng trọng tải khổng lồ, đi kèm với ánh sáng nhân tạo gần như vĩnh cửu nhờ vào sức mạnh của những thí nghiệm động vật phi đạo đức.  \nCác vòng kim loại cần phải snap vào <color=green>Cột Khổng Lồ</color>."

