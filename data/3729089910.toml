["Lapantouflemagic.FarmLumberjackUpgrade.Description"]
raw = "An upgrade module to be placed on top of two adjacent <color=#FF6EC7>triangle roof</color> buildings.\nEven more logging! Death to the treesxa0!\nHas a lot of storage space.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "An upgrade module to be placed on top of two adjacent <color=#FF6EC7>triangle roof</color> buildings. Even more logging! Death to the trees! Has a lot of storage space. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一个升级模块，放置在两个相邻的<color=#FF6EC7>三角屋顶</color>建筑上。\n更多的伐木！树木必亡xa0！\n有大量的存储空间。\n<color=#00FFFF>作为堤坝使用</color>"
zhTW = "一個升級模組，可以放置在兩個相鄰的<color=#FF6EC7>三角屋頂</color>建築上。\n更加徹底的伐木！毀滅樹木！\n擁有大量儲存空間。\n<color=#00FFFF>功能如堤壩</color>"
ruRU = "Модуль улучшения, который устанавливается на две смежные <color=#FF6EC7>треугольные крыши</color> зданий. \nЕще больше заготовки древесины! Смерть деревьямxa0! \nОбладает большим объемом хранения. \n<color=#00FFFF>Работает как плотина</color>"
jaJP = "「隣接する<color=#FF6EC7>三角屋根</color>の建物の上に置くためのアップグレードモジュールです。\nさらに多くの伐採が可能です！木には死を！\n多くの収納スペースがあります。\n<color=#00FFFF>堤防として機能します</color>」"
frFR = "Un module de mise à niveau à placer sur le toit de deux bâtiments <color=#FF6EC7>triangulaires</color> adjacents.  \nEncore plus de déboisement ! Mort aux arbresxa0 !  \nDispose d'un grand espace de stockage.  \n<color=#00FFFF>Fonctionne comme un levee</color>"
deDE = "Ein Upgrade-Modul, das auf zwei benachbarte <color=#FF6EC7>Dachgebäude mit Dreieck</color> platziert wird. \nNoch mehr Holzernte! Tod den Bäumenxa0! \nHat viel Stauraum. \n<color=#00FFFF>Funktioniert wie ein Deich</color>"
plPL = "Moduł ulepszenia do umieszczenia na szczycie dwóch sąsiednich budynków <color=#FF6EC7>trójkątnych dachów</color>.  \nJeszcze więcej wycinki! Śmierć drzewom xa0!  \nMa dużo miejsca na przechowywanie.  \n<color=#00FFFF>Funkcjonuje jako wał</color>"
ptBR = "Um módulo de upgrade a ser colocado em cima de dois edifícios adjacentes com <color=#FF6EC7>telhado triangular</color>.  \nAinda mais extração de madeira! Morte às árvoresxa0!  \nPossui muito espaço de armazenamento.  \n<color=#00FFFF>Funciona como uma Barragem</color>"
koKR = "두 개의 인접한 <color=#FF6EC7>삼각형 지붕</color> 건물 위에 배치할 수 있는 업그레이드 모듈입니다. 나무를 더 많이 베어냅니다! 나무야 죽어라! 많은 저장 공간을 가지고 있습니다. <color=#00FFFF>제방처럼 작동합니다</color>"
csCZ = "Vylepšovací modul, který se umístí na dvě sousední <color=#FF6EC7>trojúhelníkové střechy</color>.\nJeště více kácení! Smrt stromůmxa0!\nMá spoustu úložného prostoru.\n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một mô-đun nâng cấp được đặt lên trên hai tòa nhà <color=#FF6EC7>mái nhà hình tam giác</color> liền kề.\nCắt gỗ nhiều hơn nữa! Diệt hết cây cốixa0!\nCó rất nhiều không gian lưu trữ.\n<color=#00FFFF>Hoạt động như một đê</color>"

["Lapantouflemagic.FarmLumberjackUpgrade.FlavorDescription"]
raw = "\"Can you imagine the pain if we didn’t insist to have a crane?\""
status = "normal"
enUS = "\"Can you imagine the pain if we didn’t insist on having a crane?\""
zhCN = "“你能想象如果我们不坚持要一个起重机会有多痛苦吗？”"
zhTW = "「你能想像如果我們不堅持要有起重機會有多痛苦嗎？」"
ruRU = "\"Можешь ли ты представить, какая боль была бы, если бы мы не настаивали на наличии крана?\""
jaJP = "「クレーンを絶対に必要だと言わなかったら、どれほどの苦痛か想像できますか？」"
frFR = "\"Peux-tu imaginer la douleur si nous n'insistions pas pour avoir une grue ?\""
deDE = "\"Kannst du dir den Schmerz vorstellen, wenn wir nicht bestehen würden, einen Kran zu haben?\""
plPL = "Czy możesz sobie wyobrazić ból, gdybyśmy nie nalegali na dźwig?"
ptBR = "\"Você consegue imaginar a dor se não insistíssemos em ter um guindaste?\""
koKR = "\"크레인을 꼭 가져야 한다고 주장하지 않았다면 얼마나 고통스러웠을지 상상할 수 있나요?\""
csCZ = "\"Dokážete si představit tu bolest, kdybychom netrvali na jeřábu?\""
viVN = "\"Bạn có thể tưởng tượng được nỗi đau nếu chúng ta không kiên quyết có một cái cần cẩu không?\""

["Lapantouflemagic.FarmUpgradeA.Description"]
raw = "An upgrade module to be placed on top of two adjacent <color=#FF6EC7>triangle roof</color> buildings.\nEmploys <color=green>4 Builders</color>.\nCan store a lot of junk picked up from rubble.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "An upgrade module to be placed on top of two adjacent <color=#FF6EC7>triangle roof</color> buildings. Employs <color=green>4 Builders</color>. Can store a lot of junk picked up from rubble. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一个升级模块，可以放置在两个相邻的<color=#FF6EC7>三角屋顶</color>建筑上。  \n需要<color=green>4名建造者</color>。  \n可以存储从瓦砾中拾取的大量垃圾。  \n<color=#00FFFF>充当堤坝</color>"
zhTW = "一個可放置於兩個相鄰的<color=#FF6EC7>三角屋頂</color>建築上的升級模組。  \n需要<color=green>4名建造者</color>。  \n可以儲存大量從瓦礫中撿起的垃圾。  \n<color=#00FFFF>作為堤壩運作</color>"
ruRU = "Модуль улучшения, который устанавливается на вершине двух смежных <color=#FF6EC7>треугольных крыш</color> зданий.  \nТребует <color=green>4 строителей</color>.  \nМожет хранить много хлама, собранного из обломков.  \n<color=#00FFFF>Работает как плотина</color>"
jaJP = "隣接する2つの<color=#FF6EC7>三角屋根</color>の建物の上に設置するアップグレードモジュールです。  \n<color=green>4人のビルダー</color>が必要です。  \n瓦礫から拾った多くのゴミを収納できます。  \n<color=#00FFFF>堤防として機能します</color>"
frFR = "Un module de mise à niveau à placer sur le dessus de deux bâtiments adjacents avec un <color=#FF6EC7>toit triangulaire</color>.\nEmploie <color=green>4 Constructeurs</color>.\nPeut stocker beaucoup de déchets ramassés dans les décombres.\n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "„Ein Upgrade-Modul, das auf zwei benachbarten <color=#FF6EC7>Dreiecks-Dach</color>-Gebäuden platziert werden kann.\nBenötigt <color=green>4 Bauarbeiter</color>.\nKann eine Menge Müll lagern, der aus Trümmern aufgesammelt wurde.\n<color=#00FFFF>Funktioniert wie ein Deich</color>“"
plPL = "Moduł ulepszający do umieszczenia na dwóch sąsiednich budynkach z <color=#FF6EC7>trójkątnym dachem</color>.  \nZatrudnia <color=green>4 Budowniczych</color>.  \nMoże przechowywać dużo złomu zebrane z gruzów.  \n<color=#00FFFF>Działa jak Tama</color>"
ptBR = "Um módulo de atualização a ser colocado em cima de dois edifícios adjacentes com <color=#FF6EC7>telhado triangular</color>.  \nEmprega <color=green>4 Construtores</color>.  \nPode armazenar muitos itens acumulados de destroços.  \n<color=#00FFFF>Funciona como uma Barragem</color>"
koKR = "두 개의 인접한 <color=#FF6EC7>삼각 지붕</color> 건물 위에 배치할 업그레이드 모듈입니다. <color=green>4명의 건설가</color>를 사용합니다. 잔해에서 줍는 많은 잡동사니를 저장할 수 있습니다. <color=#00FFFF>제방으로 작동합니다</color>."
csCZ = "Modul vylepšení, který se umisťuje na dvě sousední budovy s <color=#FF6EC7>trojúhelníkovou střechou</color>.\nZaměstnává <color=green>4 Stavitele</color>.\nMůže skladovat spoustu haraburdí vyzvednutého z trosek.\n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một mô-đun nâng cấp được đặt trên hai tòa nhà <color=#FF6EC7>mái nhà hình tam giác</color> liền kề.\nSử dụng <color=green>4 Người xây dựng</color>.\nCó thể lưu trữ nhiều rác được nhặt từ đống đổ nát.\n<color=#00FFFF>Hoạt động như một Đê</color>"

["Lapantouflemagic.FarmUpgradeC.Description"]
raw = "An upgrade module to be placed on top of two adjacent <color=#FF6EC7>triangle roof</color> buildings.\nThe perfect place for nerdy beavers to play 'Tunnels and Hoomans'!\nContains some storage space for crates.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "An upgrade module to be placed on top of two adjacent <color=#FF6EC7>triangle roof</color> buildings.  \nThe perfect place for nerdy beavers to play 'Tunnels and Hoomans'!  \nContains some storage space for crates.  \n<color=#00FFFF>Works as a Levee</color>"
zhCN = "“一个升级模块，放置在两个相邻的<color=#FF6EC7>三角屋顶</color>建筑上。\n适合呆萌的海狸们玩'隧道与人类'的完美场所！\n包含一些存储箱的空间。\n<color=#00FFFF>作为堤坝使用</color>”"
zhTW = "一個升級模組，可放置在兩座相鄰的<color=#FF6EC7>三角屋頂</color>建築上。\n完美的地方讓迷人的海狸玩「隧道與人類」！\n包含一些用於箱子的儲存空間。\n<color=#00FFFF>可作為堤壩使用</color>"
ruRU = "Модуль улучшения, который нужно разместить на двух соседних <color=#FF6EC7>треугольных крышах</color>.\nИдеальное место для задорных бобров, чтобы играть в 'Тоннели и Людей'!\nСодержит немного места для хранения ящиков.\n<color=#00FFFF>Работает как насыпь</color>"
jaJP = "隣接する二つの<color=#FF6EC7>三角屋根</color>の建物の上に置くためのアップグレードモジュール。\nオタクなビーバーが「トンネルと人間」を遊ぶのに最適な場所！\n箱の保管スペースがいくつかあります。\n<color=#00FFFF>堤防として機能します</color>"
frFR = "Un module de rénovation à placer sur le sommet de deux bâtiments adjacents à <color=#FF6EC7>toits triangulaires</color>.  \nL'endroit parfait pour que des castors nerds jouent à 'Tunnels et Hoomans' !  \nContient un peu d'espace de stockage pour des caisses.  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Ein Upgrade-Modul, das auf zwei benachbarten <color=#FF6EC7>Dreiecksdach</color>-Gebäuden platziert werden kann.  \nDer perfekte Platz für nerdige Biber, um 'Tunnels und Hoomans' zu spielen!  \nEnthält etwas Stauraum für Kisten.  \n<color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Moduł ulepszenia do umieszczenia na dwóch sąsiadujących budynkach z <color=#FF6EC7>trójkątnymi dachami</color>.\nIdealne miejsce dla nerdowatych bobrów na grę 'Tunele i Ludzie'!\nZawiera trochę miejsca na przechowywanie skrzyń.\n<color=#00FFFF>Działa jak tamę</color>"
ptBR = "Um módulo de atualização a ser colocado em cima de dois edifícios adjacentes com <color=#FF6EC7>telhado triangular</color>.\nO lugar perfeito para castores nerds jogarem 'Túneis e Humanos'!\nContém um pouco de espaço de armazenamento para caixas.\n<color=#00FFFF>Funciona como um Dique</color>"
koKR = "두 개 인접한 <color=#FF6EC7>삼각 지붕</color> 건물 위에 배치할 업그레이드 모듈입니다.  \n너드 비버들이 '터널과 인간'을 즐기기에 완벽한 장소입니다!  \n상자를 위한 약간의 저장 공간이 포함되어 있습니다.  \n<color=#00FFFF>제방으로도 작동합니다</color>"
csCZ = "Modul pro vylepšení, který se umístí na vrchol dvou sousedících <color=#FF6EC7>trojúhelníkových střech</color> budov. \nPerfektní místo pro nerdovské bobry, aby si zahráli 'Tunely a Hoomany'! \nObsahuje nějaký skladovací prostor pro bedny. \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một mô-đun nâng cấp được đặt trên hai tòa nhà <color=#FF6EC7>mái nhà hình tam giác</color> liền kề.\nNơi hoàn hảo cho những con nhím thông minh chơi trò 'Đường hầm và Con người'!\nCó một chút không gian lưu trữ cho các thùng hàng.\n<color=#00FFFF>Hoạt động như một Đê</color>"

["Lapantouflemagic.FarmUpgradeD.Description"]
raw = "An upgrade module to be placed on top of two adjacent <color=#FF6EC7>triangle roof</color> buildings.\nEven more farming! We shall vainquish the cabbages!\nHas a lot of storage space for harvested crops.\n<color=#00FFFF>Plant some red cabbage near this building to remove the \"nothing to do\" mark</color>.\n<color=#00FFFF>Works as a Levee</color>\n<Color=red>CANNOT PLANT CROPS</color>"
status = "normal"
enUS = "An upgrade module to be placed on top of two adjacent <color=#FF6EC7>triangle roof</color> buildings. Even more farming! We shall vanquish the cabbages! Has a lot of storage space for harvested crops. <color=#00FFFF>Plant some red cabbage near this building to remove the \"nothing to do\" mark</color>. <color=#00FFFF>Works as a Levee</color> <color=red>CANNOT PLANT CROPS</color>"
zhCN = "一个升级模块，可以放置在两个相邻的<color=#FF6EC7>三角屋顶</color>建筑顶部。\n更多的农业！我们将征服卷心菜！\n有大量存储空间用于采收的农作物。\n<color=#00FFFF>在这个建筑附近种植一些红卷心菜以消除“无事可做”的标记</color>。\n<color=#00FFFF>作为堤坝使用</color>\n<Color=red>无法种植农作物</color>"
zhTW = "一個可放置在兩座相鄰的<color=#FF6EC7>三角屋頂</color>建築上的升級模塊。\n更多的農耕！我們必將征服這些捲心菜！\n擁有大量的收穫作物存儲空間。\n<color=#00FFFF>在這棟建築附近種植一些紅捲心菜以移除「無事可做」標記</color>。\n<color=#00FFFF>作為堤岸使用</color>\n<Color=red>不能種植作物</color>"
ruRU = "Модуль улучшения, который можно разместить сверху на двух соседних <color=#FF6EC7>треугольных крышах</color>.\nЕщё больше сельского хозяйства! Мы победим капусту!\nИмеет много места для хранения собранных урожая.\n<color=#00FFFF>Посадите немного красной капусты рядом с этим зданием, чтобы убрать знак \"нет дел\"</color>.\n<color=#00FFFF>Работает как плотина</color>\n<Color=red>НЕЛЬЗЯ САЖАТЬ УРОЖАЙ</color>"
jaJP = "隣接する2つの<color=#FF6EC7>三角屋根</color>の建物の上に設置するためのアップグレードモジュールです。  \nさらに多くの農作業が可能に！キャベツを征服しましょう！  \n収穫した作物用の大量の収納スペースがあります。  \n<color=#00FFFF>この建物の近くに赤キャベツを植えると「何もすることがない」マークを取り除けます</color>。  \n<color=#00FFFF>堤防として機能します</color>  \n<Color=red>作物を植えることはできません</color>"
frFR = "Un module d'amélioration à placer sur le dessus de deux bâtiments adjacents à toit <color=#FF6EC7>triangulaire</color>.\nEncore plus d'agriculture ! Nous vaincrons les choux !\nDispose d'un grand espace de stockage pour les récoltes.\n<color=#00FFFF>Plantez des choux rouges près de ce bâtiment pour enlever le marquage \"rien à faire\"</color>.\n<color=#00FFFF>Fonctionne comme une digue</color>\n<Color=red>NE PEUT PAS PLANTER DE CULTURES</color>"
deDE = "Ein Upgrade-Modul, das auf zwei benachbarte <color=#FF6EC7>Dachgebäude mit Dreiecken</color> platziert wird.  \nNoch mehr Landwirtschaft! Wir werden die Kohlköpfe besiegen!  \nHat viel Stauraum für geerntete Pflanzen.  \n<color=#00FFFF>Pflanze etwas Rotkohl in der Nähe dieses Gebäudes, um das \"nichts zu tun\"-Symbol zu entfernen</color>.  \n<color=#00FFFF>Funktioniert als Deich</color>  \n<Color=red>KANN KEINE PFLANZEN ANGEBAUT WERDEN</color>"
plPL = "Moduł ulepszający do umieszczenia na szczycie dwóch sąsiadujących budynków <color=#FF6EC7>z trójkątnym dachem</color>.\nJeszcze więcej upraw! Pokonamy kapustę!\nMa dużo miejsca na przechowywanie zebranych plonów.\n<color=#00FFFF>Posadź trochę czerwonej kapusty w pobliżu tego budynku, aby usunąć oznaczenie „nic do zrobienia”</color>.\n<color=#00FFFF>Działa jak grobla</color>\n<Color=red>NIE MOŻNA SADZIĆ ROŚLIN</color>"
ptBR = "Um módulo de upgrade a ser colocado em cima de dois edifícios adjacentes com <color=#FF6EC7>telhados triangulares</color>.\nAinda mais cultivo! Vamos vencer os repolhos!\nTem muito espaço de armazenamento para as colheitas.\n<color=#00FFFF>Plante algumas cenouras vermelhas perto deste edifício para remover a marca de \"nada a fazer\"</color>.\n<color=#00FFFF>Funciona como um dique</color>\n<Color=red>NÃO É POSSÍVEL PLANTAR CULTURAS</color>"
koKR = "인접한 두 개의 <color=#FF6EC7>삼각 지붕</color> 건물 위에 배치할 수 있는 업그레이드 모듈입니다.\n더 많은 농사! 우리는 양배추를 정복할 것입니다!\n수확한 작물을 저장할 수 있는 충분한 공간이 있습니다.\n<color=#00FFFF>이 건물 근처에 붉은 양배추를 심어 '할 일이 없음' 마크를 제거하세요</color>.\n<color=#00FFFF>제방처럼 작동합니다</color>\n<Color=red>작물을 심을 수 없습니다</color>"
csCZ = "Vylepšení modulu, které lze umístit na vrch dvou sousedních <color=#FF6EC7>trojúhelníkových střech</color> budov.  \nJeště více farmářství! Porazíme zelí!  \nMá spoustu úložného prostoru pro sklizené plodiny.  \n<color=#00FFFF>Vysadíte vedle této budovy červené zelí, abyste odstranili označení \"není co dělat\"</color>.  \n<color=#00FFFF>Funguje jako hráz</color>  \n<Color=red>NENÍ MOŽNÉ VYSADIT PLODINY</color>"
viVN = "Một mô-đun nâng cấp được đặt trên đỉnh của hai tòa nhà <color=#FF6EC7>mái nhà hình tam giác</color> liền kề.  \nCòn nhiều farming hơn nữa! Chúng ta sẽ tiêu diệt những cây bắp cải!  \nCó rất nhiều không gian lưu trữ cho các loại cây thu hoạch.  \n<color=#00FFFF>Trồng một ít bắp cải đỏ gần tòa nhà này để xóa bỏ dấu hiệu \"không có việc gì làm\"</color>.  \n<color=#00FFFF>Có chức năng như một Đê</color>  \n<Color=red>KHÔNG THỂ TRỒNG CÂY</color>"

