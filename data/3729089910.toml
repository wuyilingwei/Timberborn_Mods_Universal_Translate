["Lapantouflemagic.FenceGate.Description"]
raw = "Allows classy beavers to go in and out of a fenced area."
status = "normal"
enUS = "Allows classy beavers to go in and out of a fenced area."
zhCN = "“允许优雅的海狸进出围起来的区域。”"
zhTW = "允許優雅的海狸進出圍起來的區域。"
ruRU = "Позволяет стильным бобрам заходить и выходить из огороженной зоны."
jaJP = "「おしゃれなビーバーがフェンスで囲まれたエリアに出入りできるようにします。」"
frFR = "Permet aux castors élégants d'entrer et de sortir d'une zone clôturée."
deDE = "Erlaubt eleganten Bibern, einen eingezäunten Bereich zu betreten und zu verlassen."
plPL = "Umożliwia eleganckim bobrom wchodzenie i wychodzenie z ogrodzonego obszaru."
ptBR = "Permite que castores elegantes entrem e saiam de uma área cercada."
koKR = "세련된 비버가 울타리로 둘러싸인 지역 안으로 출입할 수 있게 해줍니다."
csCZ = "Umožňuje elegantním bobrům vstup a výstup z oplocené oblasti."
viVN = "Cho phép các chú hải ly thanh lịch ra vào khu vực có hàng rào."

["Lapantouflemagic.FenceGate.FlavorDescription"]
raw = "\"I can't explain why, but I feel like I should make it part of a bridge...\""
status = "normal"
enUS = "\"I can't explain why, but I feel like I should make it part of a bridge...\""
zhCN = "“我无法解释为什么，但我感觉我应该把它作为桥的一部分…”"
zhTW = "「我無法解釋為什麼，但我覺得我應該把它變成橋的一部分…」"
ruRU = "\"Не могу объяснить почему, но у меня есть чувство, что я должен сделать это частью моста...\""
jaJP = "「理由は説明できないけれど、これを橋の一部にすべきだと感じる…」"
frFR = "Je ne peux pas expliquer pourquoi, mais j'ai l'impression que je devrais en faire une partie d'un pont..."
deDE = "\"Ich kann nicht erklären, warum, aber ich habe das Gefühl, ich sollte es Teil einer Brücke machen...\""
plPL = "\"Nie potrafię wytłumaczyć dlaczego, ale czuję, że powinienem uczynić to częścią mostu...\""
ptBR = "\"Não consigo explicar por quê, mas sinto que devo fazer parte de uma ponte...\""
koKR = "\"왜 그런지는 설명할 수 없지만, 다리의 일부로 만들어야 할 것 같은 느낌이 듭니다...\""
csCZ = "Nedokážu vysvětlit proč, ale mám pocit, že bych to měl udělat součástí mostu..."
viVN = "Tôi không thể giải thích lý do, nhưng tôi cảm thấy như mình nên làm cho nó thành một phần của cây cầu..."

["Lapantouflemagic.largefarmhouse.Description"]
raw = "A large communal farmhouse for many beavers to work more efficiently.\n<color=#00FFFF>Lotuses require 2-deep water!</color>\n<color=red>The farm body can connect from the bottom to a ladder or pit-and-ladder lodge.\nCan only plant Pumpkins & Lotus!</color>"
status = "normal"
enUS = "A large communal farmhouse for many beavers to work more efficiently.  \n<color=#00FFFF>Lotuses require 2-deep water!</color>  \n<color=red>The farm body can connect from the bottom to a ladder or pit-and-ladder lodge.  \nCan only plant Pumpkins & Lotus!</color>"
zhCN = "一个大型的公共农舍，供许多海狸更高效地工作。\n<color=#00FFFF> lotus 需要 2 深水！</color>\n<color=red>农场主体可以从底部连接梯子或坑梯小屋。\n只能种植南瓜和莲花！</color>"
zhTW = "一個大型的共用農舍，讓許多海狸能更有效率地工作。  \n<color=#00FFFF>蓮花需要2深的水!</color>  \n<color=red>農場的本體可以從底部連接到梯子或坑及梯子的小屋。  \n只能種植南瓜和蓮花!</color>"
ruRU = "Большой общий дом для множества бобров, чтобы работать более эффективно.  \n<color=#00FFFF>Лотосам требуется вода глубиной 2!</color>  \n<color=red>Тело фермы может соединяться снизу с лестницей или хранилищем с лестницей.  \nМожно сажать только тыквы и лотосы!</color>"
jaJP = "大きな共同農家で、多くのビーバーがより効率的に働けます。  \n<color=#00FFFF>ハスは2タイルの深さの水が必要です！</color>  \n<color=red>農場本体は、底から梯子または穴と梯子のロッジに接続できます。  \nかぼちゃとハスのみ植えることができます！</color>"
frFR = "Une grande ferme communautaire permettant à de nombreux castors de travailler plus efficacement.  \n<color=#00FFFF>Les lotus nécessitent de l'eau à 2 de profondeur !</color>  \n<color=red>Le corps de la ferme peut se connecter par le bas à une échelle ou un abri à échelle et fosse.  \nNe peut planter que des citrouilles et des lotus !</color>"
deDE = "Ein großes gemeinschaftliches Bauernhaus, damit viele Biber effizienter arbeiten können.\n<color=#00FFFF>Lotusblumen benötigen 2-Tiefes Wasser!</color>\n<color=red>Der Bauernhof kann von unten mit einer Leiter oder einer Grube-und-Leiter-Hütte verbunden werden.\nKann nur Kürbisse und Lotus pflanzen!</color>"
plPL = "Duża wspólna zagroda dla wielu bobrów, aby mogły pracować bardziej efektywnie.\n<color=#00FFFF>Lotusy wymagają wody o głębokości 2!</color>\n<color=red>Struktura farmy może łączyć się od dołu z drabiną lub chatą z drabiną i dołem.\nMożna sadzić tylko Dynie i Lotusy!</color>"
ptBR = "Uma grande casa de fazenda comunitária para muitos castores trabalharem de maneira mais eficiente.  \n<color=#00FFFF>Lotus requer água de 2 de profundidade!</color>  \n<color=red>O corpo da fazenda pode se conectar por baixo a uma escada ou cabana de escada e poço.  \nSó é possível plantar Abóboras e Lotus!</color>"
koKR = "많은 비버들이 더 효율적으로 일할 수 있는 대형 공동 농가입니다.\n<color=#00FFFF>연꽃은 2칸 깊은 물이 필요합니다!</color>\n<color=red>농장 본체는 아래에서 사다리나 구덩이-사다리 오두막에 연결할 수 있습니다.\n호박과 연꽃만 심을 수 있습니다!</color>"
csCZ = "Velká společná zemědělská usedlost pro mnoho bobrů, aby pracovaly efektivněji.  \n<color=#00FFFF>Lotusy potřebují 2 hloubku vody!</color>  \n<color=red>Tělo farmy se může spojit ze spodu s žebříkem nebo usedlostí se žebříkem a jámou.  \nLze sázet pouze dýně a lotus!</color>"
viVN = "Một ngôi nhà nông trại lớn chung cho nhiều con hải ly làm việc hiệu quả hơn.\n<color=#00FFFF>Hoa sen cần nước sâu 2 đơn vị!</color>\n<color=red>Thân farm có thể kết nối từ dưới lên thang hoặc nhà hầm-thang.\nChỉ có thể trồng Bí ngô & Hoa sen!</color>"

