jaJP = "「大きな柱の周りに設置される歩道で、導水路の角を回れるようになります。」"
frFR = "Une passerelle à installer autour d'un pilier géant, permettant de naviguer autour des coins de l'aqueduc."
deDE = "Ein Gehweg, der um einen riesigen Pfeiler installiert wird und das Navigieren um Aquädukt-Ecken ermöglicht."
plPL = "Chodnik do zainstalowania wokół gigantycznego filaru, umożliwiający nawigację wokół zakrętów akweduktu."
ptBR = "Uma passarela a ser instalada ao redor de um pilar gigante, permitindo navegar em torno dos cantos do aqueduto."
koKR = "거대한 기둥 주위에 설치되며 수로 모서리를 돌아다닐 수 있는 보도입니다."
csCZ = "Cesta, která se instaluje kolem obrovského sloupu a umožňuje obcházet rohy akvaduktu."
viVN = "Đường đi được lắp đặt xung quanh một cột khổng lồ, cho phép di chuyển quanh các góc của hệ thống dẫn nước."

["Lapantouflemagic.8WayCorneroverhang.FlavorDescription"]
raw = "\"Thanks, I hate it.\"\n-a beaver suffering from the fear of heights"
