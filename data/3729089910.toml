["Lapantouflemagic.AbyssTourismOffice.Description"]
raw = "Organizes guided tours in safe and already explored sectors of the hooman derelict facility.\nGuaranteed 100% Grue-free."
status = "normal"
enUS = "Organizes guided tours in safe and already explored sectors of the human derelict facility. Guaranteed 100% Grue-free."
zhCN = "“在安全且已被探索的人的废弃设施区域组织有导游的旅游。\n保证100%无怪物。”"
zhTW = "「組織在安全且已探索的區域內進行的導覽遊覽。百分之百保證無格魯出沒。」"
ruRU = "Организует экскурсии по безопасным и уже исследованным секторам заброшенного объекта людей. Гарантировано 100% без Гру."
jaJP = "「人間の廃墟施設の安全で既に探索されたセクターでのガイドツアーを組織します。 グルーなし100%保証。」"
frFR = "Organise des visites guidées dans des secteurs sûrs et déjà explorés de l'installation abandonnée des humains. Garantie 100% sans Grue."
deDE = "Organisiert geführte Touren in sicheren und bereits erkundeten Bereichen der menschlichen verlassenen Anlage. Garantiert 100% gruefrei."
plPL = "Organizuje wycieczki z przewodnikiem w bezpiecznych i już zbadanych sektorach porzuconego obiektu hooman. Gwarantowane 100% wolne od Grue."
ptBR = "Organiza passeios guiados em setores seguros e já explorados da instalação abandonada dos humanos. Garantido 100% livre de Grue."
koKR = "인간 유적 시설의 안전하고 이미 탐험된 구역에서 가이드 투어를 조직합니다. 100% 그루 없는 것을 보장합니다."
csCZ = "Organizuje prohlídky v bezpečných a již prozkoumaných sektorech opuštěného zařízení pro lidi. Zaručeno 100% bez Grue."
viVN = "Thực hiện các chuyến tham quan có hướng dẫn ở những khu vực an toàn và đã được khám phá của cơ sở bỏ hoang của loài người. Đảm bảo không có Grue 100%."

["Lapantouflemagic.AbyssTourismOffice.FlavorDescription"]
raw = "\"Who doesn't like the thrill of maybe being eaten by a grue, without actually being eaten by a grue?\""
status = "normal"
enUS = "\"Who doesn't like the thrill of possibly being eaten by a grue, without actually being eaten by a grue?\""
zhCN = "“谁不喜欢可能被怪物吞噬的刺激，而实际上却并没有被吞噬呢？”"
zhTW = "「誰不喜歡在可能被食人魔吞噬卻實際上並未被吞噬的刺激呢？」"
ruRU = "\"Кто не любит острые ощущения от мысли, что тебя может съесть гур, не будучи съеденным гуром?\""
jaJP = "「グルーに食べられるかもしれないというスリルを楽しむ人はいないだろう、実際にはグルーに食べられないのに。」"
frFR = "\"Qui n'aime pas l'adrénaline de risquer d'être mangé par un grue, sans vraiment être mangé par un grue ?\""
deDE = "„Wer mag nicht den Nervenkitzel, vielleicht von einem Grue gefressen zu werden, ohne tatsächlich von einem Grue gefressen zu werden?“"
plPL = "\"Kto nie lubi dreszczyku emocji związane z możliwością bycia pożartym przez grue, bez faktycznego bycia pożartym przez grue?\""
ptBR = "Quem não gosta da emoção de talvez ser devorado por um grue, sem realmente ser devorado por um grue?"
koKR = "\"누가 그루에게 실제로 잡아먹히지 않으면서 그루에게 잡아먹힐지도 모른다는 스릴을 좋아하지 않을까요?\""
csCZ = "\"Kdo by neměl rád vzrušení z možnosti, že ho sežere grue, aniž by byl skutečně sežrán grue?\""
viVN = "\"Không ai không thích sự hồi hộp khi có khả năng bị một con grue ăn thịt, mà không thực sự bị nó ăn.\""

