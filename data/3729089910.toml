["Lapantouflemagic.ZiplineUpgradePylon.Description"]
raw = "A pylon providing access to the zipline network to <color=green>Large Farmhouses</color>.\n<color=green>Connections: 1</color>\n<color=#FF6EC7>To be placed on top of the farm body.</color>"
status = "normal"
enUS = "A pylon providing access to the zipline network to <color=green>Large Farmhouses</color>.\n<color=green>Connections: 1</color>\n<color=#FF6EC7>To be placed on top of the farm body.</color>"
zhCN = "提供对<color=green>大型农舍</color>的滑索网络的接入的塔柱。\n<color=green>连接：1</color>\n<color=#FF6EC7>需放置在农场主体上方。</color>"
zhTW = "一個提供通往 <color=green>大型農舍</color> 的滑索網路的支柱。  \n<color=green>連接數：1</color>  \n<color=#FF6EC7>需放置在農場主體的頂部。</color>"
ruRU = "Пілон, обеспечивающий доступ к сети зиплайнов для <color=green>Больших Ферм</color>.\n<color=green>Соединения: 1</color>\n<color=#FF6EC7>Следует разместить сверху корпуса фермы.</color>"
jaJP = "「ジップラインネットワークへのアクセスを提供するパイロン<color=green>大きな農家</color>用。\n<color=green>接続: 1</color>\n<color=#FF6EC7>農場の本体の上に配置する必要があります。</color>」"
frFR = "Un pylône fournissant un accès au réseau de tyroliennes pour <color=green>grandes fermes</color>.\n<color=green>Connexions : 1</color>\n<color=#FF6EC7>À placer sur le corps de la ferme.</color>"
deDE = "Ein Pylon, der Zugang zum Zipline-Netzwerk für <color=green>Große Bauernhäuser</color> bietet.  \n<color=green>Verbindungen: 1</color>  \n<color=#FF6EC7>Auf dem Bauernhof-Körper zu platzieren.</color>"
plPL = "Pylon zapewniający dostęp do sieci zjazdów do <color=green>Dużych Domów Wiekowych</color>.\n<color=green>Połączenia: 1</color>\n<color=#FF6EC7>Należy umieścić na górze budynku farmy.</color>"
ptBR = "Um pilar que fornece acesso à rede de tirolesas para <color=green>Casas de Fazenda Grandes</color>.\n<color=green>Conexões: 1</color>\n<color=#FF6EC7>Deve ser colocado no topo do corpo da fazenda.</color>"
koKR = "대형 농가에 접근할 수 있는 집라인 네트워크를 제공하는 기둥입니다.\n<color=green>연결: 1</color>\n<color=#FF6EC7>농장 본체 위에 놓아야 합니다.</color>"
csCZ = "Pilíř poskytující přístup k síti lanovek pro <color=green>Velké farmy</color>.\n<color=green>Připojení: 1</color>\n<color=#FF6EC7>Je třeba umístit na vrchol farmy.</color>"
viVN = "Một cột trụ cung cấp quyền truy cập vào mạng zipline cho <color=green>Nhà Nông Lớn</color>.\n<color=green>Kết nối: 1</color>\n<color=#FF6EC7>Được đặt trên đỉnh thân farm.</color>"

["Lapantouflemagic.ZiplineUpgradePylon.FlavorDescription"]
raw = "\"If you could have near-instant access to the city center, who wouldn't want to live in the middle of the countryside?\"\n-Mommy beaver"
status = "normal"
enUS = "\"If you could have near-instant access to the city center, who wouldn't want to live in the middle of the countryside?\"  \n-Mommy beaver"
zhCN = "“如果你能几乎立刻到达市中心，谁不想住在乡间呢？”  \n- 妈妈海狸"
zhTW = "「如果你能幾乎立即到達市中心，誰會不想住在鄉村的中央呢？」  \n— 媽媽海狸"
ruRU = "«Если бы у вас был почти мгновенный доступ к центру города, кто бы не хотел жить посреди деревни?» \n– Мамочка-бобёр"
jaJP = "「もし市の中心部にほぼ瞬時にアクセスできるなら、誰が田舎の真ん中に住みたくないと思うでしょうか？」\n- マミー ビーバー"
frFR = "\"Si vous pouviez avoir un accès quasi instantané au centre-ville, qui ne voudrait pas vivre en pleine campagne ?\"\n-Mamie castor"
deDE = "\"Wenn Sie fast sofortigen Zugriff auf das Stadtzentrum hätten, wer würde nicht mitten auf dem Land leben wollen?\"\n-Mama Biber"
plPL = "\"Jeśli mógłbyś mieć prawie natychmiastowy dostęp do centrum miasta, kto by nie chciał mieszkać na środku wsi?\"  \n-Mama bóbr"
ptBR = "\"Se você pudesse ter acesso quase instantâneo ao centro da cidade, quem não gostaria de viver no meio do campo?\"  \n-Mamãe castor"
koKR = "\"도시 중심부에 거의 즉시 접근할 수 있다면, 누가 시골 한가운데 사는 것을 원하지 않겠어요?\"  \n- 베버 엄마"
csCZ = "\"Pokud byste měli téměř okamžitý přístup do centra města, kdo by nechtěl žít uprostřed venkova?\"  \n-Mama bobr"
viVN = "\"Nếu bạn có thể dễ dàng đến trung tâm thành phố, ai mà không muốn sống giữa vùng nông thôn?\"\n-Mẹ nhím cáo"

