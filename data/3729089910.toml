["trashdump.Description"]
raw = "Your first district center, if it can be called so. Only dismantle after building a better town center."
status = "normal"
enUS = "Your first district center, if it can be called that. Only dismantle after constructing a better town center."
zhCN = "“你第一个地区中心，如果可以这么称呼的话。只有在建造更好的城镇中心后才能拆除。”"
zhTW = "您的第一個區域中心，如果可以這麼稱呼。只有在建造更好的城鎮中心後才能拆除。"
ruRU = "Ваш первый районный центр, если это можно так назвать. Разберите его только после постройки лучшего городского центра."
jaJP = "あなたの最初の地区センターです。これが地区センターと呼べるものかはさておき、より良いタウンセンターを建設した後にのみ解体してください。"
frFR = "Votre premier centre de district, si l'on peut l'appeler ainsi. Ne le démontez qu'après avoir construit un meilleur centre de ville."
deDE = "Ihr erstes Stadtzentrum, wenn man es so nennen kann. Nur nach dem Bau eines besseren Stadtzentrums abbauen."
plPL = "Twoje pierwsze centrum dzielnicy, jeśli można je tak nazwać. Rozbierz je tylko po zbudowaniu lepszego centrum miasta."
ptBR = "Seu primeiro centro de distrito, se é que pode ser chamado assim. Desmonte apenas após construir um centro urbano melhor."
koKR = "당신의 첫 번째 지구 중심지로, 그렇게 부를 수 있을지. 더 나은 마을 중심지를 건설한 후에만 해체하십시오."
csCZ = "Tvé první městské středisko, pokud se to dá tak nazvat. Zbourat lze pouze po postavení lepšího městského centra."
viVN = "Căn trung tâm khu vực đầu tiên của bạn, nếu có thể gọi như vậy. Chỉ nên tháo dỡ sau khi xây dựng một trung tâm thị trấn tốt hơn."

["trashdump.FlavorDescription"]
raw = "\"We can't go further, but we can settle here\"\n -The expedition leader"
status = "normal"
enUS = "\"We can't go further, but we can settle here.\"  \n- The expedition leader"
zhCN = "“我们无法继续前进，但可以在这里定居。”  \n——探险队长"
zhTW = "「我們無法再前進，但我們可以在這裡安頓下來。」  \n-探險隊長"
ruRU = "\"Мы не можем идти дальше, но можем поселиться здесь\" - Лидер экспедиции"
jaJP = "「これ以上進むことはできませんが、ここに定住することはできます」 - 探検隊の隊長"
frFR = "\"Nous ne pouvons pas aller plus loin, mais nous pouvons nous installer ici.\"  \n- Le chef de l'expédition"
deDE = "\"Wir können nicht weitergehen, aber wir können uns hier niederlassen.\" \n- Der Expeditionsleiter"
plPL = "\"Nie możemy iść dalej, ale możemy osiedlić się tutaj\" - Lider wyprawy"
ptBR = "\"Não podemos ir mais longe, mas podemos nos estabelecer aqui.\"  \n- O líder da expedição"
koKR = "\"더 이상 가는 건 불가능하지만, 여기 정착할 수는 있습니다.\" - 탐험대장"
csCZ = "\"Nemůžeme jít dál, ale můžeme se zde usadit\" -Vedoucí expedice"
viVN = "Chúng ta không thể đi xa hơn, nhưng chúng ta có thể định cư ở đây\" - \"Người dẫn đầu cuộc thám hiểm"

