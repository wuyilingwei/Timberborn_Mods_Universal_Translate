["Lapantouflemagic.NarrowLodge.Description"]
raw = "A tall and narrow lodge for one hauler.\nUseful to dam narrow corners.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A tall and narrow lodge for one hauler.  \nUseful to dam narrow corners.  \n<color=#00FFFF>Works as a Levee</color>"
zhCN = "一个高而窄的小屋，适合一个搬运工使用。\n用于在狭窄的角落筑坝。\n<color=#00FFFF>作为堤道使用</color>"
zhTW = "一座高而狹窄的倉庫，適合一名搬運工使用。\n可用於壩住狹窄的角落。\n<color=#00FFFF>作為堤壩使用</color>"
ruRU = "Высокая и узкая хижина для одного грузчика. Полезна для плотины в узких углах. <color=#00FFFF>Работает как защита от наводнений</color>"
jaJP = "「運搬者用の高くて狭いロッジ。狭いコーナーを堰き止めるのに便利です。<color=#00FFFF>防波堤として機能します</color>」"
frFR = "Une grande et étroite cabane pour un transporteur. Utile pour dammer des coins étroits. <color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Eine hohe und schmale Lodge für einen Transporteur. Nützlich, um enge Ecken zu stauen. <color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Wysoka i wąska chata dla jednego przewoźnika. Przydatna do tamowania wąskich zakrętów. <color=#00FFFF>Działa jak Wał</color>"
ptBR = "Uma pousada alta e estreita para um carregador. Útil para represar cantos estreitos. <color=#00FFFF>Funciona como um Dique</color>"
koKR = "한명의 화물 운반자를 위한 높고 좁은 롯지입니다. 좁은 모서리를 막는 데 유용합니다. <color=#00FFFF>제방으로 작용합니다</color>"
csCZ = "Vysoká a úzká chata pro jednoho nosiče. Užitečná k zataršení úzkých rohů. <color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một túp lều cao và hẹp dành cho một người chuyên chở.\nHữu ích cho việc chặn các góc hẹp.\n<color=#00FFFF>Hoạt động như một con đê</color>"

["Lapantouflemagic.NarrowLodge.FlavorDescription"]
raw = "\"Ugh, who thought this would be livable? This gotta be an architect's work!\"\n -An engineer beaver"
status = "normal"
enUS = "\"Ugh, who thought this would be livable? This has to be an architect's work!\"  \n-An engineer beaver"
zhCN = "“哎，谁会觉得这里适合居住？这肯定是建筑师的作品！”  \n- 一只工程师海狸"
zhTW = "\"唉，誰會認為這裡能住人？這一定是建築師的作品！\"  \n- 一隻工程師海狸"
ruRU = "\"Уф, кто подумал, что здесь можно жить? Это должно быть дело архитектора!\"  \n-Инженер-бобёр"
jaJP = "「うわ、誰がここに住めると思ったんだ？これは絶対に建築家の作品だ！」  \n- エンジニアビーバー"
frFR = "\"Ugh, qui a pensé que cela serait habitable ? Ça doit être le travail d'un architecte !\"  \n - Un castor ingénieur"
deDE = "„Ugh, wer hat gedacht, dass das lebenswert ist? Das muss ein Werk von einem Architekten sein!“  \n-Ein Ingenieur-Biber"
plPL = "\"Ugh, kto pomyślał, że to będzie do zamieszkania? To musi być dzieło architekta!\"  \n-Inżynier bóbr"
ptBR = "\"Ugh, quem achou que isso seria habitável? Deve ser coisa de arquiteto!\"  \n- Um castor engenheiro"
koKR = "\"우웩, 누가 이곳이 살아갈 만하다고 생각했지? 이건 분명 건축가의 작품이야!\" - 엔지니어 비버"
