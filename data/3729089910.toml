["Lapantouflemagic.Topentrancewatertightlodge_LiquidStorage.Description"]
raw = "A medium-sized lodge for one hauler, built around a ladder.\nManages a tank of liquid storage.\nCan be stacked on itself, variants, and can carry select buildings.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A medium-sized lodge for one hauler, built around a ladder. Manages a tank of liquid storage. Can be stacked on itself, variants, and can carry select buildings. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一个中型小屋，供一名搬运工使用，围绕着一架梯子建造。\n管理一个液体存储罐。\n可以自我叠加、变体，并能携带特定建筑。\n<color=#00FFFF>作为一个堤坝工作</color>"
zhTW = "一個中型的宿舍，適合一名搬運工，圍繞著一個梯子建造。\n管理著一個液體儲存槽。\n可以堆疊在自己上面，有變體，並且可以攜帶某些建築。\n<color=#00FFFF>作為堤壩使用</color>"
ruRU = "Средний по размеру домик для одного грузчика, построенный вокруг лестницы. Управляет резервуаром для хранения жидкости. Может штабелироваться сам на себя, с вариантами, и может нести определенные здания. <color=#00FFFF>Работает как дамба</color>"
jaJP = "「ハラー用の中型ロッジで、はしごを中心に構築されています。液体貯蔵タンクを管理します。自分自身やバリエーションの上に重ねることができ、特定の建物を運ぶことができます。<color=#00FFFF>堤防として機能します</color>」"
frFR = "Une cabane de taille moyenne pour un transporteur, construite autour d'une échelle.\nGère un réservoir de stockage de liquide.\nPeut être empilé sur lui-même, des variantes, et peut transporter des bâtiments sélectionnés.\n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Eine mittelgroße Lodge für einen Eindecker, die um eine Leiter gebaut ist. Verwaltet einen Tank für Flüssigkeitsspeicherung. Kann auf sich selbst, Varianten gestapelt werden und kann ausgewählte Gebäude tragen. <color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Średniej wielkości chata dla jednego transportowca, zbudowana wokół drabiny.\nZarządza zbiornikiem na ciecz.\nMoże być układana na sobie, warianty, i może przenosić wybrane budynki.\n<color=#00FFFF>Działa jak wał</color>"
ptBR = "Um abrigo de tamanho médio para um transportador, construído em torno de uma escada. Gerencia um tanque de armazenamento de líquidos. Pode ser empilhado sobre si mesmo, variantes, e pode transportar edifícios selecionados. <color=#00FFFF>Funciona como um Dique</color>"
koKR = "하나의 운반자를 위해 설계된 중간 크기의 숙소로, 사다리를 중심으로 건축되었습니다.\n액체 저장 탱크를 관리합니다.\n자신, 변형과 쌓을 수 있으며, 특정 건물을 운반할 수 있습니다.\n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Středně velká chata pro jednoho přepravce, postavená kolem žebříku. \nSpravuje nádrž na tekuté zásoby. \nMůže být stohována na sebe, varianty a může nést vybrané budovy. \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một khu nhà vừa cho một người chuyển, được xây dựng xung quanh một cái thang.\nQuản lý một bể chứa chất lỏng.\nCó thể chồng chất lên nhau, các biến thể, và có thể mang theo một số công trình nhất định.\n<color=#00FFFF>Hoạt động như một đê</color>"

["Lapantouflemagic.Topentrancewatertightlodge_LiquidStorage.FlavorDescription"]
raw = "\"Architects must have had severe constraints on this thing to accept making it simple and functional.\"\n -An engineer beaver"
status = "normal"
enUS = "\"Architects must have had severe constraints on this thing to accept making it simple and functional.\"  \n-An engineer beaver"
zhCN = "“建筑师们一定面临着严重的限制，才会接受将它做得如此简单和实用。”  \n- 一位工程师海狸"
zhTW = "\"建築師在設計這個東西時，必定面臨了嚴重的限制，才會選擇讓它簡單且實用。\"\n - 一隻工程師海狸"
ruRU = "\"Архитекторы, должно быть, столкнулись с серьезными ограничениями, чтобы согласиться на создание чего-то простого и функционального.\"  \n-Инженер-бобер"
jaJP = "「この物をシンプルで機能的にすることを受け入れるためには、建築家は厳しい制約に直面していたに違いない。」  \n- エンジニアビーバー"
frFR = "\"Les architects ont dû faire face à de sévères contraintes pour accepter de le rendre simple et fonctionnel.\"  \n- Un castor ingénieur"
deDE = "\"Architekten müssen bei diesem Ding ernsthafte Einschränkungen gehabt haben, um es einfach und funktional zu gestalten.\"  \n -Ein Ingenieur-Bieber"
plPL = "\"Architekci musieli mieć poważne ograniczenia, aby zaakceptować zrobienie tego prostym i funkcjonalnym.\"  \n -Wydra inżynier"
ptBR = "\"Os arquitetos devem ter enfrentado severas limitações para aceitarem fazer algo simples e funcional.\"  \n-Um engenheiro castor"
koKR = "\"건축가들은 이 물건을 간단하고 기능적으로 만드는 데 심각한 제약이 있었던 것 같습니다.\"\n - 엔지니어 비버"
csCZ = "\"Architekti museli mít na tuto věc vážná omezení, aby souhlasili s tím, že ji udělají jednoduchou a funkční.\"  \n -Inženýr bobr"
viVN = "\"Những kiến trúc sư hẳn đã phải đối mặt với những ràng buộc nghiêm ngặt để chấp nhận việc thiết kế nó đơn giản và chức năng.\" - Một chú hải ly kỹ sư"

