["Lapantouflemagic.WaterCannonH.Description"]
raw = "An intriguing evolution of the mechanical water pump of other factions. \nShoots water at a 70° angle for ranged irrigation.\nAllows to send water high up but at short range.\n<color=green>The cannon will fill the reservoir up to the blue flag</color>"
status = "normal"
enUS = "An intriguing evolution of the mechanical water pump of other factions. Shoots water at a 70° angle for ranged irrigation. Allows to send water high up but at short range. <color=green>The cannon will fill the reservoir up to the blue flag</color>"
zhCN = "一个引人注目的其他派系机械水泵的进化。\n以70°的角度射水进行远程灌溉。\n允许将水高高发送，但射程短。\n<color=green>这门炮将水箱填满到蓝色旗帜的位置</color>"
zhTW = "一個引人入勝的演變，來自其他派系的機械水泵。  \n以 70° 角度噴射水，進行遠距灌溉。  \n能將水送高，但射程短。  \n<color=green>這個大砲將使水庫充滿至藍色旗標</color>"
ruRU = "Увлекательная эволюция механического водяного насоса других фракций. \nСтреляет водой под углом 70° для дальнего полива.\nПозволяет поднимать воду высоко, но на короткое расстояние.\n<color=green>Пушка заполнит резервуар до синего флага</color>"
jaJP = "他の派閥の機械式水ポンプの興味深い進化。  \n70°の角度で水を射出して遠距離灌漑を行います。  \n高さに水を送ることができますが、射程は短いです。  \n<color=green>この大砲は青い旗の位置まで貯水槽を満たします</color>"
frFR = "Une évolution intrigante de la pompe à eau mécanique des autres factions. \nTire de l'eau à un angle de 70° pour l'irrigation à distance. \nPermet d'envoyer de l'eau en hauteur mais à courte portée. \n<color=green>Le canon remplira le réservoir jusqu'au drapeau bleu</color>"
deDE = "Eine interessante Evolution der mechanischen Wasserpumpe anderer Fraktionen. \nSpritzt Wasser in einem 70° Winkel für Fernbewässerung. \nErmöglicht das Senden von Wasser hoch hinaus, aber auf kurzer Distanz. \n<color=green>Die Kanone wird den Vorratsbehälter bis zur blauen Flagge füllen</color>"
plPL = "Intrygująca ewolucja mechanicznej pompy wodnej innych frakcji. \nWyrzuca wodę pod kątem 70° do nawadniania z dystansu.\nPozwala na wysyłanie wody wysoko, ale na krótkim zasięgu.\n<color=green>Armatka napełni zbiornik do niebieskiej flagi</color>"
ptBR = "Uma evolução intrigante da bomba de água mecânica de outras facções. \nDispara água em um ângulo de 70° para irrigação à distância.\nPermite enviar água para cima, mas em curta distância.\n<color=green>O canhão encherá o reservatório até a bandeira azul</color>"
koKR = "다른 진영의 기계식 물 펌프의 흥미로운 진화.  \n70° 각도로 물을 쏘아 원거리 관개에 사용됩니다.  \n짧은 거리에서 물을 높이 보낼 수 있습니다.  \n<color=green>포는 저수지를 파란 깃발까지 채울 것입니다</color>"
csCZ = "Intriguující evoluce mechanického vodního čerpadla od jiných frakcí. \nVystřeluje vodu pod úhlem 70° pro zavlažování na dálku.\nUmožňuje posílat vodu vysoko, ale na krátkou vzdálenost.\n<color=green>Kanón naplní nádrž až k modré vlajce</color>"
viVN = "Một sự tiến hóa thú vị của máy bơm nước cơ khí của các phe phái khác.  \nBắn nước ở góc 70° để tưới tiêu từ xa.  \nCho phép bơm nước lên cao nhưng ở khoảng cách ngắn.  \n<color=green>Khẩu pháo sẽ làm đầy bể chứa đến cờ màu xanh</color>"

