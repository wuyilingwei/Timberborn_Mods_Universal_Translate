["Lapantouflemagic.Crappyplatform_tunnel.Description"]
raw = "Prevents the roof of a tunnel from collapsing, can be removed if you're sure of what you're doing."
status = "normal"
enUS = "Prevents the roof of a tunnel from collapsing, can be removed if you're sure of what you're doing."
zhCN = "“防止隧道的顶棚坍塌，能够在你确认自己知道自己在做什么的情况下被移除。”"
zhTW = "防止隧道的頂部崩塌，如你確信你的操作，則可以移除。"
ruRU = "Предотвращает обрушение крыши туннеля, может быть снята, если вы уверены в своих действиях."
jaJP = "「トンネルの屋根が崩壊するのを防ぎます。やっていることに自信がある場合は取り外すことができます。」"
frFR = "Empêche le toit d'un tunnel de s'effondrer, peut être retiré si vous êtes sûr de ce que vous faites."
deDE = "Verhindert, dass das Dach eines Tunnels zusammenbricht, kann entfernt werden, wenn Sie sich sicher sind, was Sie tun."
plPL = "Zapobiega zawaleniu się dachu tunelu, można usunąć, jeśli jesteś pewien, co robisz."
ptBR = "Evita que o teto de um túnel desabe, podendo ser removido se você tiver certeza do que está fazendo."
koKR = "터널의 지붕이 무너지는 것을 방지하며, 자신이 무엇을 하고 있는지 확신할 수 있다면 제거할 수 있습니다."
csCZ = "Zabraňuje zhroucení střechy tunelu, může být odstraněna, pokud si jste jisti, co děláte."
viVN = "Ngăn chặn việc sập mái hầm, có thể được gỡ bỏ nếu bạn chắc chắn về những gì mình đang làm."

["Lapantouflemagic.Crappyplatform_tunnel.FlavorDescription"]
