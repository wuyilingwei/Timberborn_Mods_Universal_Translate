zhTW = "一個機械泵，可以利用探險隊識別的各種氣體的儲藏。"
ruRU = "Механизированный насос, который может использовать карманы различных газов, идентифицированных командами исследователей."
jaJP = "探検チームによって特定されたさまざまなガスのポケットを利用できる機械化ポンプです。"
frFR = "Une pompe mécanisée qui peut exploiter des poches de divers gaz identifiés par les équipes d'exploration."
deDE = "Eine mechanisierte Pumpe, die Taschen verschiedener Gase nutzen kann, die von den Erkundungsteams identifiziert wurden."
plPL = "Zmechanizowana pompa, która może wykorzystywać pokłady różnych gazów zidentyfikowanych przez zespoły eksploracyjne."
ptBR = "Uma bomba mecanizada que pode explorar bolsões de vários gases identificados pelas equipes de exploração."
