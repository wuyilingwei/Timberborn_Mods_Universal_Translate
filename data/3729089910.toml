viVN = "Cải tạo một khu vực trống của cơ sở hooman bị bỏ hoang để lưu trữ một lượng tài nguyên quá mức."

["Lapantouflemagic.DeepMinePILEstorage.FlavorDescription"]
raw = "\"This thing is so immense that we could spend a lifetime exploring it\"\n-An explorer beaver"
status = "normal"
enUS = "\"This thing is so immense that we could spend a lifetime exploring it.\"  \n-An explorer beaver"
zhCN = "“这个东西巨大到我们可以花一生去探索它。”  \n— 一只探险海狸"
zhTW = "“這個東西如此龐大，我們可以花一輩子的時間來探索它。”  \n— 一隻探險海狸"
ruRU = "\"Эта вещь настолько огромна, что мы могли бы потратить целую жизнь на её исследование.\"  \n- Исследователь-бобёр"
jaJP = "\"このものはとても巨大で、私たちは一生をかけて探検することができるだろう\"  \n- 探検家ビーバー"
frFR = "\"Cette chose est si immense que nous pourrions y passer une vie à l'explorer.\"  \n-Un castor explorateur"
deDE = "Dieses Ding ist so riesig, dass wir ein ganzes Leben damit verbringen könnten, es zu erkunden.\"  \n\"- Ein erkundender Biber"
plPL = "\"Ta rzecz jest tak ogromna, że moglibyśmy spędzić całe życie na jej odkrywaniu.\"  \n- Włóczykij bobr"
ptBR = "\"Esta coisa é tão imensa que poderíamos passar uma vida inteira explorando-a.\"  \n- Um castor explorador"
koKR = "\"이것은 너무 거대해서 평생을 탐험해도 부족할 것 같다.\"  \n- 한 탐험가 밍크"
csCZ = "\"Tato věc je tak obrovská, že bychom v ní mohli strávit celý život jejím prozkoumáváním\"  \n-Průzkumnický bobr"
viVN = "\"Cái này lớn đến mức chúng ta có thể dành cả đời để khám phá nó\"  \n- Một chú castor khám phá"

