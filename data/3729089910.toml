viVN = "Nơi trú ẩn để phát triển nấm từ gỗ hoặc mùn cưa.  \n<color=#FF6EC7>Có thể hoạt động mà không cần công nhân.</color>"

["Lapantouflemagic.Mushroomtent.FlavorDescription"]
raw = "\"Should I eat this red-and-white one? Seems tasty\"\n -Bobby the fool, last words"
status = "normal"
enUS = "\"Should I eat this red-and-white one? Seems tasty\"  \n-Bobby the fool, last words"
zhCN = "“我应该吃这个红白相间的吗？看起来很好吃。”  \n- 愚蠢的博比，临终遗言"
zhTW = "「我應該吃這個紅白相間的嗎？看起來很好吃。」  \n- 笨蛋鮑比，遺言"
ruRU = "\"Стоит ли мне съесть этот красно-белый? Похоже, вкусно.\"  \n- Бобби Дурак, последние слова"
jaJP = "\"この赤と白のやつを食べるべきかな？おいしそうだ\"  \n- バビー・ザ・フール、最期の言葉"
frFR = "\"Devrais-je manger celui rouge et blanc ? Il a l'air savoureux\"  \n-Bobby le fou, dernières paroles"
deDE = "\"Kann ich diesen rot-weißen essen? Sieht lecker aus.\" -Bobby der Narr, letzte Worte"
plPL = "\"Czy powinienem zjeść ten czerwono-biały? Wygląda smacznie\" - Bobby, głupiec, ostatnie słowa"
ptBR = "\"Devo comer este vermelho e branco? Parece saboroso\"  \n-Bobby, o tolo, últimas palavras"
koKR = "\"이 빨간색과 흰색의 것을 먹어야 할까? 맛있어 보이네\"  \n- 바비, 마지막 말"
csCZ = "\"Měl bych sníst tu červenobílou? Vypadá chutně.\"  \n-Bobby, blázen, poslední slova"
viVN = "\"Tôi có nên ăn cái nấm đỏ-trắng này không? Hình như ngon đó.\" - Bobby, kẻ ngu ngốc, những lời nói cuối cùng"

