["Lapantouflemagic.LeafTrader.Description"]
raw = "The Leafcoats are, for lack of a better term, weirdoes. It’s unclear whether they actually grow leaves or if they simply glue them on every morning. Anyway, they hate killing plants and get offended if you ask them for such products, but they happily take ours so they also are hypocrites. Anyway our brainiacs want to study the beautiful glowing insects that live in their lands. try to bring us back some."
status = "normal"
enUS = "The Leafcoats are, for lack of a better term, weirdoes. It’s unclear whether they actually grow leaves or if they simply glue them on every morning. Anyway, they hate killing plants and get offended if you ask them for such products, but they happily take ours so they also are hypocrites. Anyway, our brainiacs want to study the beautiful glowing insects that live in their lands. Try to bring us back some."
zhCN = "“叶衣人，换个说法就是怪人。他们到底是长出叶子，还是每天早上只是把叶子粘上去，这一点并不明确。无论如何，他们讨厌杀死植物，如果你要求他们提供这种产品，他们会感到被冒犯，但他们很乐意接受我们的产品，所以他们也是伪善者。无论如何，我们的脑力怪才想研究生活在他们土地上的美丽发光昆虫。试着带一些回来。”"
zhTW = "葉皮衣們，乍一看，實在難以用恰當的詞語形容他們。他們是否真的長出葉子，還是每天早上只是把葉子粘上去，仍不明確。無論如何，他們討厭殺死植物，若你詢問他們這類產品，會感到冒犯，但他們卻樂意接受我們的產品，所以他們也是偽善者。無論如何，我們的智囊團想要研究生活在他們土地上的美麗發光昆蟲。請試著為我們帶回一些。"
ruRU = "Листократы, если не считать лучшего термина, - это странные существа. Неясно, действительно ли они вырастают листья или просто наклеивают их каждое утро. В любом случае, они ненавидят убивать растения и обижаются, если вы спрашиваете их о таких продуктах, но с удовольствием берут наши, так что они также лицемеры. В любом случае, наши умницы хотят изучить красивые светящиеся насекомые, которые живут на их землях. Попробуйте принести нам их."
jaJP = "リーフコートは、より良い言葉がないために、変わり者です。彼らが実際に葉を育てているのか、それとも毎朝単に葉を貼り付けているのかは不明です。とにかく、彼らは植物を殺すことが嫌いで、そのような製品を求めると不快に思いますが、私たちのものは喜んで受け取るため、彼らもまた偽善者です。とにかく、私たちの頭脳派は彼らの土地に住む美しい光る昆虫を研究したがっています。いくつか持ち帰ってきてください。"
frFR = "Les Leafcoats sont, pour manque d'un meilleur terme, des originaux. Il n'est pas clair s'ils font vraiment pousser des feuilles ou s'ils les collent simplement chaque matin. Quoi qu'il en soit, ils détestent tuer des plantes et se sentent offensés si vous leur demandez de tels produits, mais ils acceptent volontiers les nôtres, donc ils sont aussi hypocrites. Quoi qu'il en soit, nos cerveaux veulent étudier les magnifiques insectes lumineux qui vivent dans leurs terres. Essayez de nous en ramener quelques-uns."
deDE = "Die Blättermäntel sind, um es präzise auszudrücken, Eigenartige. Es ist unklar, ob sie tatsächlich Blätter wachsen lassen oder ob sie sie einfach jeden Morgen ankleben. Wie dem auch sei, sie hassen es, Pflanzen zu töten, und sind beleidigt, wenn man sie nach solchen Produkten fragt, aber sie nehmen unsere gerne an, also sind sie auch Heuchler. Wie dem auch sei, unsere Schlauköpfe wollen die schönen leuchtenden Insekten studieren, die in ihren Ländereien leben. Versuche, uns einige zurückzubringen."
plPL = "Liściokoty to, w braku lepszego określenia, dziwacy. Nie jest jasne, czy faktycznie hodują liście, czy po prostu przyklejają je co rano. Tak czy inaczej, nienawidzą zabijać roślin i oburzają się, jeśli poprosisz ich o takie produkty, ale chętnie przyjmują nasze, więc są też hipokrytami. Tak czy inaczej, nasi mądrale chcą zbadać piękne świecące owady, które żyją na ich ziemiach. Spróbuj przynieść nam jakieś."
ptBR = "Os Leafcoats são, para não dizer outra coisa, esquisitos. Não está claro se eles realmente crescem folhas ou se apenas as colam todas as manhãs. De qualquer forma, eles odeiam matar plantas e ficam ofendidos se você pede produtos desse tipo, mas aceitam os nossos, então também são hipócritas. Enfim, nossos gênios querem estudar os belos insetos brilhantes que vivem em suas terras. Tente nos trazer alguns."
koKR = "리프코트는 더 나은 표현이 없어서 괴짜라고 할 수 있습니다. 그들이 실제로 잎을 자라는지 아니면 매일 아침 붙이는지 확실하지 않습니다. 어쨌든 그들은 식물을 죽이는 것을 싫어하고 그런 제품을 요청하면 기분 나빠하지만, 우리 것이면 기꺼이 받아들이므로 모순적입니다. 어쨌든 우리 두뇌들이 그들의 땅에 사는 아름답고 빛나는 곤충을 연구하고 싶어합니다. 우리에게 좀 가져와 주세요."
csCZ = "Listovíci jsou, abych použil lepší termín, zvláštní. Není jasné, zda skutečně rostou listy, nebo je každé ráno jen přilepují. Každopádně nesnášejí zabíjení rostlin a urazí se, pokud je žádáte o takové produkty, ale rádi přijímají ty naše, takže jsou také pokrytci. Naši géniové chtějí studovat krásné zářící hmyz, který žije v jejich zemích. Zkus nám nějaké přivést."
viVN = "Lá áo là, nếu không có từ nào tốt hơn, những kẻ lập dị. Không rõ liệu họ thực sự có mọc lá hay chỉ đơn giản là dán chúng lên mỗi buổi sáng. Dù sao đi nữa, họ ghét giết chết cây cối và sẽ bị xúc phạm nếu bạn hỏi họ về những sản phẩm như vậy, nhưng họ lại vui vẻ nhận những thứ của chúng ta nên họ cũng là những kẻ đạo đức giả. Dù sao thì, những bộ óc thiên tài của chúng ta muốn nghiên cứu những con côn trùng phát sáng xinh đẹp sống trên vùng đất của họ. Hãy cố gắng mang về cho chúng ta một vài con."

