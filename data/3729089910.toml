["Lapantouflemagic.Topentrancewatertightlodge_Builders.Description"]
raw = "A medium-sized watertight lodge built around a ladder, with a side access door.\nCan be stacked on itself, variants, and can carry select buildings.\nEmploys <color=green>three builders</color>.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A medium-sized watertight lodge built around a ladder, with a side access door. Can be stacked on itself, variants, and can carry select buildings. Employs <color=green>three builders</color>. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一个中型的防水木屋，围绕梯子建造，带有侧门。\n可以自我叠加，变体，并且可以承载特定建筑。\n雇佣<color=green>三名建造者</color>。\n<color=#00FFFF>作为堤坝使用</color>"
zhTW = "一座中等大小的防水小屋，圍繞著一個梯子建造，並設有側門進入。\n可以自我堆疊，具有多種變化，並可以承載特定建築。\n需要<color=green>三名建築工人</color>。\n<color=#00FFFF>作為堤壩使用</color>"
ruRU = "Средний водонепроницаемый домик, построенный вокруг лестницы, с боковой дверью доступа.  \nМожно устанавливать в стопку, варианты, и может переносить определенные здания.  \nИспользует <color=green>трех строителей</color>.  \n<color=#00FFFF>Работает как набережная</color>"
jaJP = "「はしごを中心に構築された、中程度の大きさの防水ロッジで、側面にアクセスドアがあります。自分自身、バリエーションの上にスタック可能で、特定の建物を運ぶことができます。<color=green>3人のビルダー</color>を雇用します。<color=#00FFFF>堤防として機能します</color>。」"
frFR = "Un pavillon étanche de taille moyenne construit autour d'une échelle, avec une porte d'accès latérale. Peut être empilé sur lui-même, variantes, et peut transporter certains bâtiments. Emploie <color=green>trois constructeurs</color>. <color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Eine mittelgroße wasserdichte Hütte, die um eine Leiter herum gebaut ist, mit einer seitlichen Zugangstür.  \nKann auf sich selbst gestapelt werden, Varianten und kann ausgewählte Gebäude tragen.  \nBeschäftigt <color=green>drei Bauarbeiter</color>.  \n<color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Średniej wielkości wodoodporna chata zbudowana wokół drabiny, z bocznymi drzwiami dostępu. Może być układana na sobie, warianty, i może przenosić wybrane budynki. zatrudnia <color=green>trzech budowniczych</color>. <color=#00FFFF>Działa jako wał</color>"
ptBR = "Uma cabana à prova d'água de tamanho médio construída em torno de uma escada, com uma porta de acesso lateral. Pode ser empilhada sobre si mesma, variantes, e pode suportar edifícios selecionados. Emprega <color=green>três construtores</color>. <color=#00FFFF>Funciona como um Dique</color>"
koKR = "사다리를 중심으로 지어진 중간 크기의 방수 오두막으로, 측면에 접근할 수 있는 문이 있습니다.\n자체적으로 쌓을 수 있으며, 변형이 가능하고 특정 건물을 운반할 수 있습니다.\n<color=green>세 명의 건축가</color>가 필요합니다.\n<color=#00FFFF>제방으로 작동</color>"
csCZ = "Středně velká vodotěsná chata postavená kolem žebříku, s bočním přístupovým dveřmi. \nLze umístit na sebe, varianty a může nést vybrané budovy. \nZaměstnává <color=green>tři stavitele</color>. \n<color=#00FFFF>Funguje jako návodní hráz</color>"
viVN = "Một cái lều kín nước có kích thước trung bình được xây dựng xung quanh một cái thang, với một cánh cửa truy cập bên.\nCó thể xếp chồng lên nhau, có nhiều biến thể, và có thể mang theo một số tòa nhà được chọn.\nSử dụng <color=green>ba người xây dựng</color>.\n<color=#00FFFF>Hoạt động như một đê</color>"

["Lapantouflemagic.Topentrancewatertightlodge_Builders.FlavorDescription"]
raw = "\"Building up like that sure is convenient, but aren't we doing the same things as the hoomans?\"\n -A concerned carpenter beaver"
status = "normal"
enUS = "\"Building up like that sure is convenient, but aren't we doing the same things as the humans?\"  \n-A concerned carpenter beaver"
zhCN = "“这样建造当然方便，但我们难道不是在做和人类一样的事情吗？”  \n- 一位担忧的木匠海狸"
zhTW = "「這樣建造確實很方便，但我們不是在做和人類一樣的事情嗎？」  \n— 一位擔憂的樵夫海狸"
ruRU = "\"Строить таким образом, конечно, удобно, но разве мы не делаем то же самое, что и люди?\"  \n- Озабоченный плотник-бобер"
jaJP = "「こんなふうに建てるのは確かに便利だけど、私たちも人間と同じことをしてるんじゃない？」  \n- 心配する大工ビーバー"
frFR = "\"Construire comme ça, c'est sûr que c'est pratique, mais ne faisons-nous pas les mêmes choses que les humains ?\"  \n- Un castor menuisier inquiet"
deDE = "\"Es ist zwar praktisch, so zu bauen, aber machen wir nicht die gleichen Dinge wie die Hoomans?\"  \n- Ein besorgter Zimmermann-Biber"
plPL = "\"Budowanie w ten sposób jest naprawdę wygodne, ale czy nie robimy tego samego, co ludzie?\" - Zmartwiony bobrzy cieśla"
ptBR = "\"Construir assim é bem conveniente, mas não estamos fazendo as mesmas coisas que os humanos?\"  \n- Um castor carpinteiro preocupado"
koKR = "\"이렇게 쌓아올리는 것은 정말 편리하지만, 우리는 인간들과 똑같은 일을 하고 있는 것 아닌가?\"  \n- 걱정하는 카펜터 비버"
csCZ = "\"Stavět to takhle je sice pohodlné, ale neděláme stejně jako ti lidé?\"  \n -Ostře sledovaný bobr truhlář"
viVN = "\"Xây dựng như vậy thật tiện lợi, nhưng phải chăng chúng ta đang làm những điều giống như loài người?\" - Một con nhím thợ mộc lo lắng"

["Lapantouflemagic.Topentrancewatertightlodge_BuildersDoorless.Description"]
raw = "A medium-sized watertight lodge built around a ladder, but without side door for aesthetic reasons.\nCan be stacked on itself, variants, and can carry select buildings.\nEmploys <color=green>three builders</color>.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A medium-sized watertight lodge built around a ladder, but without a side door for aesthetic reasons. Can be stacked on itself, has variants, and can carry select buildings. Employs <color=green>three builders</color>. <color=#00FFFF>Works as a Levee</color>"
zhCN = "“一个中型的防水小屋，围绕着一个梯子建造，但出于美观原因没有侧门。\n可以自行堆叠，变体，并且可以携带特定建筑。\n雇佣<color=green>三个建造者</color>。\n<color=#00FFFF>作为堤坝工作</color>”"
zhTW = "一個中型的防水小屋，圍繞著梯子建造，但因美觀原因沒有側門。可以堆疊在自己上面，有變體，並且可以承載特定建築。雇用 <color=green>三個建築工</color>。<color=#00FFFF>作為堤壩運作</color>"
ruRU = "Средний водонепроницаемый дом, построенный вокруг лестницы, но без боковой двери по эстетическим причинам. Может накладываться на себя, варианты, и может нести выбранные здания. Использует <color=green>трех строителей</color>. <color=#00FFFF>Работает как ров</color>"
jaJP = "梯子を中心に建てられた中型の防水ロッジで、外観上の理由から側面のドアはありません。\n自分自身やバリエーションに重ねることができ、特定の建物を運ぶことができます。\n<color=green>3人のビルダー</color>を雇用しています。\n<color=#00FFFF>堤防として機能します</color>"
frFR = "Un pavillon étanche de taille moyenne construit autour d'une échelle, mais sans porte latérale pour des raisons esthétiques.\nPeut être empilé sur lui-même, variantes, et peut porter certains bâtiments.\nEmploie <color=green>trois bâtisseurs</color>.\n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Eine mittelgroße wasserdichte Hütte, die um eine Leiter gebaut wurde, aber aus ästhetischen Gründen ohne Seitentür.\nKann auf sich selbst gestapelt werden, Varianten und kann ausgewählte Gebäude tragen.\nBeschäftigt <color=green>drei Bauarbeiter</color>.\n<color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Średniej wielkości wodoodporna chata zbudowana wokół drabiny, ale bez bocznych drzwi z powodów estetycznych. \nMożna ją układać na sobie, warianty i może przenosić wybrane budynki. \nZatrudnia <color=green>trzech budowniczych</color>. \n<color=#00FFFF>Działa jako grobla</color>"
ptBR = "Uma casa de luz média à prova d'água construída em torno de uma escada, mas sem porta lateral por razões estéticas. Pode ser empilhada sobre si mesma, variantes, e pode suportar edifícios selecionados. Emprega <color=green>três construtores</color>. <color=#00FFFF>Funciona como uma parede de contenção</color>"
koKR = "사이드는 미적인 이유로 없는 사다리를 둘러싼 중간 크기의 방수 오두막입니다.  \n자체 및 변형과 쌓을 수 있으며 선택된 건물을 실어 나를 수 있습니다.  \n<color=green>세 명의 건축가가 필요합니다</color>.  \n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Středně velká vodotěsná chata postavená kolem žebříku, ale bez bočních dveří z estetických důvodů.  \nLze stohovat na sebe, varianty a může nést vybrané budovy.  \nZaměstnává <color=green>tři stavitele</color>.  \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một nhà nghỉ kín nước có kích thước vừa được xây dựng xung quanh một cái thang, nhưng không có cửa bên hông vì lý do thẩm mỹ.  \nCó thể xếp chồng lên nhau, có các biến thể và có thể mang theo một số công trình lựa chọn.  \nSử dụng <color=green>ba thợ xây</color>.  \n<color=#00FFFF>Hoạt động như một đê</color>"

