["Lapantouflemagic.Badbucket.Description"]
raw = "A few logs and planks haphazardly arranged in a platform barely good enough to tap bad water with a bucket, hopefully without sullying oneself."
status = "normal"
enUS = "A few logs and planks haphazardly arranged in a platform barely good enough to tap bad water with a bucket, hopefully without sullying oneself."
zhCN = "几根木材和木板胡乱搭建成的平台，勉强足够用桶取坏水，希望能不弄脏自己。"
zhTW = "幾根木頭和木板隨意地排列成一個平台，勉強足夠用來用桶子抽取髒水，希望不會弄髒自己。"
ruRU = "Несколько бревен и досок беспорядочно уложены на платформу, едва достаточно подходящую для того, чтобы черпать плохую воду с помощью ведра, надеясь не запачкаться."
jaJP = "「悪い水をバケツで汲むのにやっと耐えられるように無造作に配置された数本の丸太と板でできたプラットフォーム。うまくいけば、自分を汚さずに済むだろう。」"
frFR = "Quelques bûches et planches disposées de manière hâtive sur une plateforme à peine suffisante pour puiser de l'eau contaminée avec un seau, en espérant ne pas se salir."
deDE = "Einige Holzstämme und Bretter willkürlicherweise auf einer Plattform angeordnet, die kaum gut genug ist, um schlechtes Wasser mit einem Eimer zu schöpfen, hoffentlich ohne sich zu beschmutzen."
plPL = "Kilka kłód i desek chaotycznie ułożonych na platformie, ledwo wystarczającej do czerpania złej wody wiadrem, miejmy nadzieję, że bez zabrudzenia się."
ptBR = "Alguns troncos e tábuas dispostos de forma desleixada em uma plataforma mal feita o suficiente para pegar água ruim com um balde, esperando não se sujar."
koKR = "몇 개의 통나무와 판자가 엉성하게 배열되어 있어 양동이로 나쁜 물을 긷기에 간신히 적합한 플랫폼이지만, 가능하면 더럽히지 않기를 바라는 상태입니다."
csCZ = " několik kmenů a prken neuspořádaně uspořádaných na platformě, která je sotva dost dobrá na to, abychom s kbelíkem získali špatnou vodu, doufejme bez znečištění sebe."
viVN = "Một vài khúc gỗ và ván xếp chồng lên nhau một cách bừa bãi trên một nền tảng khó khăn để móc nước bẩn bằng một cái xô, hy vọng sẽ không làm bẩn bản thân."

["Lapantouflemagic.Badbucket.FlavorDescription"]
raw = "\"I'm sure we can do something useful with this liquid, we just need someone foolish enough to accept getting it. Surely Bobby will be up to the task.\"\n -A scientist beaver"
status = "normal"
enUS = "\"I'm sure we can do something useful with this liquid, we just need someone foolish enough to accept getting it. Surely Bobby will be up to the task.\" -A scientist beaver"
zhCN = "“我相信我们可以用这种液体做一些有用的事情，我们只需要找一个傻瓜来接受它。鲍比肯定能胜任这个任务。”  \n- 一只科学家海狸"
zhTW = "「我相信我們可以利用這液體，我們只需要找個傻瓜願意接受這份工作。肯定是巴比能勝任這項任務。」  \n- 一位科學家海狸"
ruRU = "\"Я уверен, что мы можем сделать что-то полезное с этой жидкостью, нам просто нужен кто-то достаточно глупый, чтобы согласиться ее получить. Уверен, Бобби справится с этой задачей.\"  \n-Ученый бобер"
jaJP = "「この液体を使って何か有用なことができると確信している。ただ、それを受け取るのに十分愚かである人を見つける必要がある。ボビーならその仕事にうってつけだろう。」\n- 科学者ビーバー"
frFR = "« Je suis sûr que nous pouvons faire quelque chose d'utile avec ce liquide, il nous faut juste quelqu'un de suffisamment imprudent pour l'accepter. Bobby sera sûrement à la hauteur de la tâche. »  \n- Un castor scientifique"
deDE = "„Ich bin mir sicher, dass wir mit dieser Flüssigkeit etwas Nützliches anstellen können, wir brauchen nur jemanden, der töricht genug ist, sie zu holen. Sicherlich wird Bobby der Aufgabe gewachsen sein.“  \n-Ein Wissenschaftler-Biber"
plPL = "\"Jestem pewien, że możemy zrobić coś pożytecznego z tym płynem, potrzebujemy tylko kogoś na tyle głupiego, żeby się na to zgodzić. Na pewno Bobby podejmie się zadania.\"  \n -Naukowiec bóbr"
ptBR = "\"Tenho certeza de que podemos fazer algo útil com este líquido, só precisamos de alguém tolo o suficiente para aceitá-lo. Com certeza, o Bobby vai estar à altura da tarefa.\"  \n-Um castor cientista"
koKR = "\"이 액체로 유용한 뭔가를 만들 수 있을 거예요. 단지 이걸 받겠다고 할 만큼 바보 같은 사람만 필요할 뿐이죠. 분명 바비가 이 일을 해낼 수 있을 거예요.\"\n- 한 과학자 비버"
csCZ = "\"Jsem si jistý, že s touto tekutinou můžeme udělat něco užitečného, jen potřebujeme někoho dost bláznivého, aby si ji vzal. Bobby se toho určitě ujme.\"  \n- Vědecký bobr"
viVN = "\"Tôi chắc chắn chúng ta có thể làm điều gì đó hữu ích với chất lỏng này, chúng ta chỉ cần ai đó đủ ngốc nghếch để đồng ý lấy nó. Chắc chắn Bobby sẽ sẵn sàng nhận nhiệm vụ đó.\"\n -Một con beaver nhà khoa học"

