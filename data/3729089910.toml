new = "Irrigation Lodge"
status = "normal"

["Lapantouflemagic.WonderIrrigationTower.DisplayName"]
new = "Irrigating Elevated Public Bath"
status = "normal"

["Lapantouflemagic.WonderIrrigationTower.FlavorDescription"]
new = "\"If people keep thinking irrigation towers are lame, just keep making them better until they like them!\"\n -A carpenter beaver."
status = "normal"

["Lapantouflemagic.WonderIrrigationTower.Description"]
new = "The ultimate irrigation tower: An elevated bath that irrigates crops with the dirty water, fertilizing them for faster growth, all the while having a minimal land pawprint.\n<color=green>Water consumption scales with irrigated area.\nPlant growth +15%</color>\n<color=#FF6EC7>Can function without workers.</color>"
status = "normal"

["Lapantouflemagic.Irrigation.group.DisplayName"]
new = "Irrigation"
status = "normal"

