zhCN = "“比数学更安全。”  \n- 聪明的无牙海狸"
zhTW = "“仍然比馬蒂爾達安全。”  \n- 智慧無牙，長老海狸"
ruRU = "\"Все еще безопаснее, чем Матильда.\"  \n- Беззубик Мудрый, старший бобер"
