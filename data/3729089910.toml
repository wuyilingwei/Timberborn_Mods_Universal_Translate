["Lapantouflemagic.Lightgravitybattery.Description"]
raw = "An easy to build gravity battery using a bunch of logs as weight."
status = "normal"
enUS = "An easy-to-build gravity battery that uses a bunch of logs as weight."
zhCN = "一个易于建造的重力电池，使用一堆原木作为重量。"
zhTW = "一個易於建造的重力電池，使用一堆木材作為重量。"
ruRU = "Легко строящаяся гравитационная батарея с использованием кучи бревен в качестве груза."
jaJP = "「たくさんの丸太を重りとして使った、簡単に作れる重力バッテリー。」"
frFR = "Une batterie gravitationnelle facile à construire utilisant une multitude de bûches comme poids."
deDE = "Eine einfach zu bauende Schwerkraftbatterie, die eine Menge Holzstämme als Gewicht verwendet."
plPL = "Łatwy do zbudowania akumulator grawitacyjny wykorzystujący grupę bali jako ciężar."
ptBR = "Uma bateria de gravidade fácil de construir usando um monte de toras como peso."
koKR = "여러 개의 통나무를 무게로 사용하여 쉽게 구축할 수 있는 중력 배터리입니다."
