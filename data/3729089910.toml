["Lapantouflemagic.MechanizedPinkwoodFarm.Description"]
raw = "A complex device that masterfully transforms mechanical power into logs.\nThe sawblades must be changed regularly."
status = "normal"
enUS = "A complex device that masterfully transforms mechanical power into logs. The saw blades must be changed regularly."
zhCN = "一个复杂的装置，巧妙地将机械能转化为木材。锯片必须定期更换。"
zhTW = "一個複雜的裝置，巧妙地將機械能轉換為木材。鋸片必須定期更換。"
ruRU = "Сложное устройство, которое мастерски превращает механическую энергию в бревна. Пилы необходимо менять регулярно."
jaJP = "機械的な力を巧みに丸太に変える複雑な装置です。鋸刃は定期的に交換する必要があります。"
frFR = "Un dispositif complexe qui transforme avec brio l'énergie mécanique en bûches.  \nLes lames de scie doivent être changées régulièrement."
deDE = "Ein komplexes Gerät, das mechanische Energie meisterhaft in Holzstämme umwandelt. \nDie Sägeblätter müssen regelmäßig gewechselt werden."
plPL = "Skomplikowane urządzenie, które mistrzowsko przekształca moc mechaniczną w kłody.\nOstrza pił należy regularnie wymieniać."
ptBR = "Um dispositivo complexo que transforma de forma magistral a energia mecânica em toras. As lâminas de serra devem ser trocadas regularmente."
koKR = "기계적 힘을 정교하게 나무로 변환하는 복잡한 장치입니다.\n톱날은 정기적으로 교체해야 합니다."
csCZ = "Komplexní zařízení, které mistrovsky přetváří mechanickou energii na dřevo. \nKladiva je třeba pravidelně měnit."
viVN = "Một thiết bị phức tạp biến đổi sức mạnh cơ học thành gỗ một cách tài tình. Lưỡi cưa cần được thay đổi thường xuyên."

["Lapantouflemagic.MechanizedPinkwoodFarm.FlavorDescription"]
raw = "\"The first rule of beaver engineering is to not look too closely at the mechanism\"\n -Grandpa beaver, on what happened to his whiskers."
status = "normal"
enUS = "\"The first rule of beaver engineering is to not look too closely at the mechanism\"  \n- Grandpa beaver, on what happened to his whiskers."
zhCN = "“海狸工程的第一条规则就是不要过于仔细地观察机制。”  \n- 海狸爷爷，关于他的胡子发生了什么。"
zhTW = "「河狸工程的第一條規則就是不要太仔細地檢查機械」  \n— 河狸爺爺，談到他的鬍鬚發生了什麼事。"
ruRU = "\"Первое правило бобрового инжиниринга — не смотреть слишком внимательно на механизм\"  \n- Дедушка-бобер о том, что случилось с его усами."
jaJP = "「ビーバー工学の第一のルールは、機構をじっくり見ないことだ」  \n—おじいちゃんビーバー、ひげに起こったことについて。"
frFR = "\"La première règle de l'ingénierie des castors est de ne pas regarder de trop près le mécanisme.\"  \n-Grand-père castor, sur ce qui est arrivé à ses moustaches."
deDE = "„Die erste Regel der Bibertechnik ist, das Mechanismus nicht zu genau zu betrachten.“  \n- Opa Biber, über das, was mit seinen Schnurrhaaren passiert ist."
plPL = "\"Pierwsza zasada inżynierii bobrów to nie przyglądać się zbyt dokładnie mechanizmowi\" - Dziadek bobr, o tym, co stało się z jego wąsami."
ptBR = "\"A primeira regra da engenharia de castores é não olhar muito de perto para o mecanismo\"  \n- Vovô castor, sobre o que aconteceu com seus bigodes."
koKR = "\"비버 공학의 첫 번째 법칙은 기계에 너무 가까이 들여다보지 않는 것이다.\"  \n- 할아버지 비버, 그의 수염에 일어난 일에 대해."
csCZ = "\"První pravidlo bobřího inženýrství je nesoustředit se příliš na mechanismus.\"  \n-Dědeček bobr, když hovořil o tom, co se stalo s jeho vousy."
viVN = "N luật đầu tiên của kỹ thuật xây dựng của loài nhím là không được nhìn quá gần vào cơ chế\"\n -Ông nhím, về những gì đã xảy ra với râu của ông."

