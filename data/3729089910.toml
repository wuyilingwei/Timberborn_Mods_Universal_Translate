["Lapantouflemagic.Seamstress.Description"]
raw = "Manufactures various items that makes a beaver's life better.\n<color=#FFA500>Small Tower</color>, <color=#FF6EC7>Can support upgrades</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "Manufactures various items that make a beaver's life better.  \n<color=#FFA500>Small Tower</color>, <color=#FF6EC7>Can support upgrades</color>  \n<color=#00FFFF>Works as a Levee</color>"
zhCN = "“制造各种让海狸生活更美好的物品。  \n<color=#FFA500>小塔</color>，<color=#FF6EC7>支持升级</color>  \n<color=#00FFFF>作为堤坝使用</color>”"
zhTW = "製造各種物品，使海狸的生活更好。  \n<color=#FFA500>小塔</color>，<color=#FF6EC7>可以支持升級</color>  \n<color=#00FFFF>作為堤岸使用</color>"
ruRU = "Изготавливает различные предметы, которые улучшают жизнь бобра.  \n<color=#FFA500>Небольшая башня</color>, <color=#FF6EC7>Может поддерживать улучшения</color>  \n<color=#00FFFF>Работает как плотина</color>"
jaJP = "様々なアイテムを製造し、ビーバーの生活をより良くします。  \n<color=#FFA500>小さな塔</color>、<color=#FF6EC7>アップグレードをサポート可能</color>  \n<color=#00FFFF>堤防として機能します</color>"
frFR = "Fabrique divers objets qui améliorent la vie d'un castor.\n<color=#FFA500>Petite Tour</color>, <color=#FF6EC7>Peut supporter des évolutions</color>\n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Stellt verschiedene Gegenstände her, die das Leben eines Biber verbessern.\n<color=#FFA500>Kleiner Turm</color>, <color=#FF6EC7>Kann Upgrades unterstützen</color>\n<color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Produkuje różne przedmioty, które poprawiają życie bobra.\n<color=#FFA500>Mała Wieża</color>, <color=#FF6EC7>Może wspierać ulepszenia</color>\n<color=#00FFFF>Funkcjonuje jak Tama</color>"
ptBR = "Fabrica vários itens que melhoram a vida de um castor.  \n<color=#FFA500>Torre Pequena</color>, <color=#FF6EC7>Pode suportar melhorias</color>  \n<color=#00FFFF>Funciona como um Dique</color>"
koKR = "비버의 삶을 더 좋게 만들어주는 다양한 아이템을 제조합니다.  \n<color=#FFA500>작은 타워</color>, <color=#FF6EC7>업그레이드를 지원할 수 있음</color>  \n<color=#00FFFF>제방으로 작동함</color>"
csCZ = "Vyrábí různé předměty, které zlepšují život bobrů.  \n<color=#FFA500>Malá věž</color>, <color=#FF6EC7>Podporuje vylepšení</color>  \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Sản xuất nhiều vật phẩm giúp cải thiện cuộc sống của một chú hải ly.\n<color=#FFA500>Tháp Nhỏ</color>, <color=#FF6EC7>Có thể hỗ trợ nâng cấp</color>\n<color=#00FFFF>Hoạt động như một Con Đê</color>"

["Lapantouflemagic.Seamstress.FlavorDescription"]
raw = "\"They said it needs to be that tall to 'test the pillows', whatever that means.\"\n-A confused builder beaver"
status = "normal"
enUS = "\"They said it needs to be that tall to 'test the pillows', whatever that means.\"  \n-A confused builder beaver"
zhCN = "“他们说它需要那么高才能‘测试枕头’，这是什么意思呢？”  \n- 一只困惑的建造者海狸"
zhTW = "「他們說這需要這麼高才能‘測試枕頭’，這到底是什麼意思？」  \n- 一位困惑的建築海狸"
ruRU = "«Говорят, что она должна быть такой высокой, чтобы 'протестировать подушки', что бы это ни значило».  \n- Озадаченный строитель-бобер"
jaJP = "「『枕をテストする』ためにそれだけの高さが必要だと言われたが、意味がわからない。」  \n- 混乱したビーバーの建設者"
frFR = "\"Ils ont dit qu'il fallait que ce soit aussi haut pour 'tester les oreillers', peu importe ce que ça veut dire.\"\n-Un castor constructeur confus"
deDE = "\"Sie sagten, es müsse so hoch sein, um die 'Kissen zu testen', was auch immer das bedeutet.\"  \n-Ein verwirrter Bau-Biber"
plPL = "„Mówili, że musi być tak wysoki, aby 'przetestować poduszki', co to w ogóle znaczy.”  \n- Zdezorientowany bobr budowniczy"
ptBR = "\"Eles disseram que precisa ter essa altura para 'testar os travesseiros', seja lá o que isso significa.\"  \n-Um castor construtor confuso"
koKR = "\"그들은 그것이 '베개를 테스트하기 위해' 그렇게 높아야 한다고 말했습니다. 그게 무슨 뜻인지는 모르겠어요.\"\n- 혼란스러운 건설 비버"
csCZ = "\"Říkali, že musí být tak vysoký, aby 'o-testovali polštáře', cokoliv to znamená.\" \n-Zmatený stavitel bobr"
viVN = "Họ nói rằng nó cần phải cao như vậy để 'kiểm tra gối', bất cứ điều gì điều đó có nghĩa.\"\n-Một con kỳ nhông thợ xây bối rối"

