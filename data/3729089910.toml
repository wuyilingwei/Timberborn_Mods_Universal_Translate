["Lapantouflemagic.FarmUpgradeB.Description"]
raw = "An upgrade module to be placed on top of two adjacent <color=#FF6EC7>triangle roof upgradable</color> buildings.\nEmploys <color=green>6 Haulers</color>.\nContains a large storage space for crates.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "An upgrade module to be placed on top of two adjacent <color=#FF6EC7>triangle roof upgradable</color> buildings. Employs <color=green>6 Haulers</color>. Contains a large storage space for crates. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一个升级模块，放置在两个相邻的 <color=#FF6EC7>可升级三角屋顶</color> 建筑上。\n雇佣 <color=green>6 名搬运工</color>。\n包含一个大型箱子存储空间。\n<color=#00FFFF>作为堤坝使用</color>"
zhTW = "一個升級模組，可以放置在兩座相鄰的<color=#FF6EC7>可升級三角屋頂</color>建築的上方。  \n需要<color=green>6名搬運工</color>來運作。  \n擁有一個大型的貨物儲存空間。  \n<color=#00FFFF>作為堤防運作</color>"
ruRU = "Модуль улучшения, который помещается сверху на два соседних <color=#FF6EC7>треугольных крыши, подлежащих улучшению</color> здания.  \nИспользует <color=green>6 грузчиков</color>.  \nСодержит большое складское пространство для ящиков.  \n<color=#00FFFF>Работает как насыпь</color>"
jaJP = "「隣接する二つの<color=#FF6EC7>三角屋根をアップグレード可能</color>な建物の上に設置するアップグレードモジュールです。  \n<color=green>6人の運搬者</color>を使用します。  \n箱のための大きな収納スペースがあります。  \n<color=#00FFFF>堤防として機能します</color>」"
frFR = "Un module d'amélioration à placer sur le dessus de deux bâtiments à <color=#FF6EC7>toit triangulaire améliorables</color> adjacents.  \nEmploie <color=green>6 Transporteurs</color>.  \nContient un grand espace de stockage pour les caisses.  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Ein Upgrade-Modul, das auf zwei benachbarte <color=#FF6EC7>trianguläre, aufrüstbare</color> Gebäude platziert werden kann.\nBenötigt <color=green>6 Transportarbeiter</color>.\nEnthält einen großen Stauraum für Kisten.\n<color=#00FFFF>Funktioniert wie ein Damm</color>"
plPL = "Moduł ulepszeń do umieszczenia na szczycie dwóch sąsiadujących <color=#FF6EC7>budynków z ulepszanym dachem w kształcie trójkąta</color>.\nZaangażowane <color=green>6 Pracowników</color>.\nZawiera dużą przestrzeń magazynową na skrzynie.\n<color=#00FFFF>Działa jak wał</color>"
ptBR = "Um módulo de upgrade a ser colocado no topo de dois edifícios <color=#FF6EC7>com telhado triangular upgradable</color> adjacentes.\nEmprega <color=green>6 transportadores</color>.\nContém um grande espaço de armazenamento para caixas.\n<color=#00FFFF>Funciona como uma barreira</color>"
koKR = "인접한 두 개의 <color=#FF6EC7>삼각형 지붕 업그레이드 가능</color> 건물 위에 놓을 업그레이드 모듈입니다.  \n<color=green>6명의 하울러</color>를 고용합니다.  \n상자를 위한 넓은 저장 공간이 있습니다.  \n<color=#00FFFF>제방처럼 기능합니다</color>"
csCZ = "Upgradovací modul, který se umisťuje na vrch dvou sousedních <color=#FF6EC7>budov s trojúhelníkovou střechou, které lze vylepšit</color>.\nZaměstnává <color=green>6 přepravců</color>.\nObsahuje velký skladovací prostor pro beden.\n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một mô-đun nâng cấp được đặt trên hai tòa nhà <color=#FF6EC7>mái tâm giác có thể nâng cấp</color> liền kề.\nSử dụng <color=green>6 người vận chuyển</color>.\nChứa một không gian lưu trữ lớn cho các thùng.\n<color=#00FFFF>Hoạt động như một Đê</color>"

