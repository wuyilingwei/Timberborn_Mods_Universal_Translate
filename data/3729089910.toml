["Lapantouflemagic.GathererHouse.Description"]
raw = "A medium house for a group of gatherer beavers to meet and split work efficiently.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A medium house for a group of gatherer beavers to meet and split work efficiently. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一座中型房屋，供一群采集海狸聚会并高效分工使用。<color=#00FFFF>作为堤坝使用</color>"
zhTW = "一個供一群採集海狸聚會並有效分工的中型房屋。<color=#00FFFF>作為堤壩使用</color>"
ruRU = "Средний дом для группы собирателей-бобров, чтобы собираться и эффективно разделять работу. <color=#00FFFF>Работает как дамба</color>"
jaJP = "「集まって効率的に作業を分担するための、 gatherer ビーバーのグループのための中型の家です。<color=#00FFFF>堤防として機能します</color>」"
frFR = "Une maison moyenne pour un groupe de castors gatherers pour se rencontrer et partager le travail efficacement. <color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Ein mittelgroßes Haus für eine Gruppe von sammeltreibenden Bibern, um sich zu treffen und die Arbeit effizient zu teilen.  \n<color=#00FFFF>Funktioniert wie ein Damm</color>"
plPL = "Średni dom dla grupy bobrów zbieraczy, aby spotykać się i skutecznie dzielić pracę.  \n<color=#00FFFF>Działa jak wał</color>"
ptBR = "Uma casa média para um grupo de castores coletores se reunir e dividir o trabalho de forma eficiente. <color=#00FFFF>Funciona como uma Barreiran</color>"
koKR = "모임과 효율적인 작업 분담을 위해 모인 수확비버 그룹을 위한 중간 크기의 집입니다.\n<color=#00FFFF>제방처럼 작동합니다</color>"
csCZ = "Střední dům pro skupinu bobrů sběračů, aby se setkávali a efektivně si rozdělovali práci.  \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một ngôi nhà vừa cho một nhóm castor thu gom gặp gỡ và chia sẻ công việc một cách hiệu quả. <color=#00FFFF>Hoạt động như một Đê</color>"

["Lapantouflemagic.GathererHouse.FlavorDescription"]
raw = "\"Don't you dare come in my house covered in dirt and berry juice! Get a shower first or I'll toss you in the river myself!\"\n -Mommy beaver, every evening."
status = "normal"
enUS = "\"Don't you dare come in my house covered in dirt and berry juice! Get a shower first or I'll toss you in the river myself!\" -Mommy beaver, every evening."
zhCN = "“别在我家里脏兮兮的、满身果汁！先去洗澡，否则我就把你扔进河里！”  \n- 妈妈海狸，每个晚上。"
zhTW = "「不要你敢在我家裡沾滿泥土和漿果汁！先去洗澡，否則我會自己把你丟進河裡！」  \n— 媽媽海狸，每晚都這麼說。"
ruRU = "Не смей входить в мой дом, покрытый грязью и ягодным соком! Сначала прими душ, или я сама сброшу тебя в реку!\"  \n-Мамочка бобр, каждый вечер."
jaJP = "「泥やベリーのジュースで汚れたまま私の家に入るなんて、とんでもない！まずはシャワーを浴びてから来なさい、さもなければ私が川に叩き込んでやるから！」\n- マミービーバー、毎晩。"
frFR = "\"N'osez pas entrer chez moi couvert de terre et de jus de baies ! Prenez d'abord une douche ou je vous jetterai moi-même dans la rivière !\" - Maman castor, chaque soir."
deDE = "\"Nicht wagst du, schmutzig und voller Beeren-Saft in mein Haus zu kommen! Nimm dir zuerst eine Dusche, oder ich werfe dich selbst in den Fluss!\"  \n-Mama-Biber, jeden Abend."
plPL = "\"Nie waż się wchodzić do mojego domu brudny i pokryty sokiem z jagód! Najpierw weź prysznic, bo sam cię wrzucę do rzeki!\" - Mama bóbr, każdego wieczoru."
ptBR = "\"Não ouse entrar na minha casa coberto de sujeira e suco de frutas! Tome um banho primeiro ou eu mesma te jogarei no rio!\"  \n-Mamãe castor, toda noite."
koKR = "내 집에 더럽고 베리 주스가 묻은 채로 들어오지 마! 먼저 샤워하고 오거나 내가 너를 직접 강에 던져버릴 거야!\"\n -비버 엄마, 매일 저녁."
csCZ = "Nepřicházej do mého domu pokrytý špínou a šťávou z bobulí! Nejdřív se osprchuj, jinak tě sám hodím do řeky!\"  \n- Maminka bobr, každé odpoledne."
viVN = "\"Đừng có dám vào nhà tôi khi người phủ đầy bùn và nước trái cây! Hãy tắm rửa trước đi, nếu không tôi sẽ ném bạn xuống sông đó!\"\n -Mẹ hải ly, mỗi buổi tối."

