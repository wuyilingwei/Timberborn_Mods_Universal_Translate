zhCN = "“在一项无价值的任务上表现出的尴尬懒惰。”"
zhTW = "對一項不值得的任務展示出令人尷尬的懶惰。"
ruRU = "Позорное проявление лени, примененной к незначительной задаче."
jaJP = "「価値のない作業に適用された恥ずかしい怠惰の表れ。」"
