["Lapantouflemagic.FolkTrader.Description"]
raw = "Our cousins the Folktails like a simple life, mostly filled with agriculture, dancing, and tasty food. They can give us seeds for some interesting new plant species. But If you bring them something amazing enough, they might introduce you to their weird secret hobby."
status = "normal"
enUS = "Our cousins the Folktails enjoy a simple life, filled mainly with agriculture, dancing, and delicious food. They can provide us with seeds for some interesting new plant species. However, if you bring them something truly impressive, they might share their strange secret hobby with you."
zhCN = "“我们的表亲 Folktails 喜欢简单的生活，主要充满了农业、舞蹈和美味的食物。他们可以给我们一些有趣的新植物种子的种子。但如果你带给他们足够惊人的东西，他们可能会向你介绍他们奇怪的秘密爱好。”"
zhTW = "我們的堂親Folktails喜歡簡單的生活，主要是圍繞農業、舞蹈和美味的食物。他們可以給我們一些有趣的新植物種子的種子。但是如果你帶給他們足夠驚人的東西，他們也許會介紹你參與他們奇怪的秘密愛好。"
ruRU = "Наши кузены Фолктейлы любят простую жизнь, в основном наполненную сельским хозяйством, танцами и вкусной едой. Они могут предоставить нам семена для некоторых интересных новых видов растений. Но если вы принесете им что-то удивительное, они могут познакомить вас со своим странным секретным хобби."
jaJP = "「私たちのいとこであるフォークテイルたちは、農業、ダンス、そして美味しい食べ物で満たされたシンプルな生活を好みます。彼らは私たちにいくつかの興味深い新しい植物種の種をくれるかもしれません。しかし、もしあなたが彼らに十分に素晴らしいものを持っていけば、彼らの奇妙な秘密の趣味を紹介してくれるかもしれません。」"
frFR = "Nos cousins les Folktails aiment une vie simple, principalement remplie d'agriculture, de danse et de nourriture délicieuse. Ils peuvent nous donner des graines pour certaines espèces de plantes intéressantes. Mais si vous leur apportez quelque chose d'assez incroyable, ils pourraient vous présenter leur étrange hobby secret."
deDE = "Unsere Cousins, die Folktails, mögen ein einfaches Leben, das hauptsächlich von Landwirtschaft, Tanz und leckerem Essen geprägt ist. Sie können uns Samen für einige interessante neue Pflanzenarten geben. Aber wenn du ihnen etwas Erstaunliches bringst, könnten sie dich in ihr merkwürdiges geheimes Hobby einführen."
plPL = "Nasi kuzyni Folktails lubią proste życie, głównie wypełnione rolnictwem, tańcem i smacznym jedzeniem. Mogą dać nam nasiona dla kilku interesujących nowych gatunków roślin. Ale jeśli przyniesiesz im coś wystarczająco niesamowitego, mogą wprowadzić cię w swoją dziwną tajną pasję."
ptBR = "Nossos primos, os Folktails, gostam de uma vida simples, principalmente cheia de agricultura, dança e comida deliciosa. Eles podem nos dar sementes de algumas novas espécies de plantas interessantes. Mas se você trouxer algo incrível o suficiente, eles podem te apresentar ao seu estranho hobby secreto."
koKR = "우리 사촌인 포크테일은 주로 농업, 춤, 맛있는 음식으로 가득한 단순한 삶을 좋아합니다. 그들은 흥미로운 새로운 식물 종에 대한 씨앗을 제공할 수 있습니다. 하지만 당신이 그들에게 충분히 놀라운 것을 가져간다면, 그들은 당신을 그들의 이상한 비밀 취미에 소개할 수도 있습니다."
csCZ = "Naši bratranci Folktails mají rádi jednoduchý život, většinou naplněný zemědělstvím, tancem a chutným jídlem. Mohou nám poskytnout semena některých zajímavých nových rostlinných druhů. Ale pokud jim přinesete něco dost úžasného, mohli by vás seznámit se svou podivnou tajnou zálibou."
viVN = "Những người anh em họ của chúng ta, Folktails, thích một cuộc sống đơn giản, chủ yếu là nông nghiệp, khiêu vũ và đồ ăn ngon. Họ có thể cho chúng ta hạt giống của một số loài thực vật mới thú vị. Nhưng nếu bạn mang đến cho họ một điều gì đó đủ tuyệt vời, họ có thể giới thiệu cho bạn sở thích kỳ lạ bí mật của họ."

