["Lapantouflemagic.Pumpkin.FlavorDescription"]
raw = "\"... and once a year on the darkest night, they open glowing eyes and mouths... to eat naughty little kits!\"\n -Grandma beaver, campfire stories"
status = "normal"
enUS = "\"... and once a year on the darkest night, they open glowing eyes and mouths... to eat naughty little kits!\"  \n- Grandma beaver, campfire stories"
zhCN = "“……每年在最黑暗的夜晚，它们会睁开发光的眼睛和嘴巴……来吃调皮的小小浣熊！” \n- 河狸奶奶，篝火故事"
zhTW = "「……每年在最黑暗的夜晚，它們會張開發光的眼睛和嘴巴……來吃調皮的小幼崽！」\n- 「河狸奶奶，篝火故事」"
ruRU = "\"... и раз в год, в самую темную ночь, они открывают светящиеся глаза и рты... чтобы съесть непослушных маленьких белочек!\"  \n -Бабушка бобер, сказки у костра"
jaJP = "\"...そして一年に一度、最も暗い夜に、彼らは光る目と口を開けて...いたずら好きな小さな子ギツネを食べるのです！\"  \n- おばあちゃんビーバー、キャンプファイヤーの物語"
frFR = "\"... et une fois par an, lors de la nuit la plus sombre, ils ouvrent des yeux et des bouches lumineux... pour manger les petits kits espiègles !\"  \n-Grand-mère castor, histoires autour du feu de camp"
deDE = "\"... und einmal im Jahr in der dunkelsten Nacht öffnen sie leuchtende Augen und Münder ... um naughty kleine Racker zu essen!\" - Großmutter Biber, Lagerfeuergeschichten"
plPL = "\"... a raz w roku, w najbardziej mroczną noc, otwierają świecące oczy i usta... żeby zjeść niegrzeczne małe kitki!\"  \n -Babka bobrzyca, opowieści przy ognisku"
ptBR = "\"... e uma vez por ano, na noite mais escura, eles abrem olhos e bocas brilhantes... para comer filhotes travessos!\"  \n-A vovó castor, histórias ao redor da fogueira"
koKR = "\"... 그리고 매년 가장 어두운 밤에, 그들은 빛나는 눈과 입을 열고... 악동 새끼들을 먹습니다!\"  \n- 할머니 비버, 캠프파이어 이야기"
csCZ = "\"... a jednou za rok, v nejtemnější noci, otevřou zářící oči a ústa... aby snědli zlobivé malé ježky!\"  \n -Babička bobr, příběhy u táboráku"
viVN = "... và một lần mỗi năm vào đêm tối nhất, chúng mở đôi mắt và miệng phát sáng... để ăn những chú thỏ nghịch ngợm!\"  \n-Bà beaver, những câu chuyện bên bếp lửa"

