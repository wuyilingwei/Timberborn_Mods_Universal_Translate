ruRU = "\"Имеет дополнительное освещение, чтобы предотвратить грюсов.\""
jaJP = "\"グルースを防ぐために追加の照明が付いています。\""
frFR = "\"Vient avec un éclairage supplémentaire pour prévenir les grues.\""
deDE = "\"Kommt mit zusätzlicher Beleuchtung, um Grusel zu verhindern.\""
plPL = "\"Zawiera dodatkowe oświetlenie, aby zapobiec występowaniu okropności.\""
ptBR = "\"Vem com iluminação extra para prevenir os grues.\""
koKR = "\"그루즈를 방지하기 위한 추가 조명이 포함되어 있습니다.\""
