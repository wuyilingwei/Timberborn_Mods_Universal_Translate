["Lapantouflemagic.EmberTrader.Description"]
raw = "Yet another tribe of filthy heretics, who would have guessedxa0? Those guys have developped an unhealthy obcession with fire and hate getting wet. That puts in question how do they ever bathe but let’s not raise too many uncomfortable questions. They’ve got some humongous trees but won’t tell us how to grow them, and their apples are to die for. Bring back what you can."
status = "normal"
enUS = "Yet another tribe of filthy heretics, who would have guessed? Those guys have developed an unhealthy obsession with fire and hate getting wet. That puts into question how they ever bathe, but let’s not raise too many uncomfortable questions. They’ve got some humongous trees but won’t tell us how to grow them, and their apples are to die for. Bring back what you can."
zhCN = "又一个肮脏的异教徒部落，谁能想到呢？这些家伙对火产生了不健康的痴迷，并且讨厌湿水。这就让人怀疑他们到底是如何洗澡的，但我们不想提出太多不舒服的问题。他们有些巨大的树木，但不会告诉我们如何种植，至于他们的苹果，简直是让人心动。把你能带回来的东西带回来吧。"
zhTW = "又一個骯髒異教徒的部落，誰會想到呢？這些家伙對火有著不健康的癖好，並且討厭淋雨。這讓人懷疑他們到底怎麼洗澡，但我們就不要提出太多尷尬的問題了。他們擁有一些巨大的樹木，但不肯告訴我們怎麼種植，而他們的蘋果美味得令人垂涎。盡量帶回你能帶回的東西。"
ruRU = "Еще одно племя грязных еретиков, кто бы мог подумать? Эти ребята развили нездоровую одержимость огнем и ненавидят мочить себя. Это ставит под сомнение, как они вообще купаются, но давайте не поднимать слишком много неудобных вопросов. У них есть огромные деревья, но они не скажут нам, как их вырастить, а их яблоки стоят того, чтобы за ними охотиться. Принесите всё, что сможете."
jaJP = "また別の汚れた異端者の部族、誰が予想したでしょうか？彼らは火に対する不健康な執着を持ち、水に濡れることを嫌っています。そのため、彼らがどのように入浴するのか疑問が残りますが、あまり不快な質問はしないでおきましょう。彼らは巨大な木を持っていますが、それを育てる方法を教えてくれませんし、彼らのリンゴは絶品です。できるだけ持ち帰りましょう。"
frFR = "Encore une autre tribu de sales hérésiarques, qui l'aurait deviné ? Ces gars-là ont développé une obsession malsaine pour le feu et détestent être mouillés. Cela remet en question comment ils font pour se baigner, mais évitons de poser trop de questions inconfortables. Ils ont des arbres énormes mais ne veulent pas nous dire comment les faire pousser, et leurs pommes sont à tomber. Ramenez tout ce que vous pouvez."
deDE = "Schon wieder ein Stamm dreckiger Häretiker, wer hätte das gedacht? Diese Leute haben eine ungesunde Obsession mit Feuer entwickelt und hassen es, nass zu werden. Das wirft die Frage auf, wie sie sich überhaupt baden, aber lassen wir zu viele unangenehme Fragen beiseite. Sie haben einige riesige Bäume, aber sie wollen uns nicht verraten, wie man sie anbaut, und ihre Äpfel sind zum Sterben schön. Bring zurück, was du kannst."
plPL = "Kolejne plemię brudnych heretyków, kto by pomyślał? Ci faceci rozwinęli obsesję na punkcie ognia i nienawidzą moknąć. To stawia pod znakiem zapytania, jak w ogóle się kąpią, ale nie podnosimy zbyt wielu niewygodnych pytań. Mają kilka ogromnych drzew, ale nie powiedzą nam, jak je uprawiać, a ich jabłka są nie do odrzucenia. Przywieź, co tylko możesz."
ptBR = "Mais uma tribo de heréticos imundos, quem poderia imaginar? Esses caras desenvolveram uma obsessão doentia pelo fogo e odeiam se molhar. Isso levanta a questão de como eles conseguem tomar banho, mas não vamos levantar muitas perguntas desconfortáveis. Eles têm algumas árvores enormes, mas não vão nos dizer como cultivá-las, e suas maçãs são de morrer. Traga de volta o que puder."
koKR = "또 다른 더럽고 이단적인 부족이군요. 누가 예상이나 했겠어요? 그들은 불에 대한 건강하지 못한 집착을 가지고 있으며 젖는 것을 싫어합니다. 그러다 보니 어떻게 샤워를 하는지 의문이 드네요. 하지만 불편한 질문은 하지 맙시다. 그들은 아주 거대한 나무를 가지고 있지만, 그것을 어떻게 키우는지 말해주지 않고, 그들의 사과는 죽여도 아깝지 않습니다. 가능한 것이라면 무엇이라도 가져오세요."
csCZ = "Další kmen špinavých kacířů, kdo by to byl řekl? Ti kluci vyvinuli nezdravou obsesi ohně a nenávidí, když jsou mokří. To vyvolává otázku, jak se vůbec koupou, ale nebudeme pokládat příliš mnoho nepříjemných otázek. Mají obrovské stromy, ale nechtějí nám říct, jak je pěstovat, a jejich jablka jsou k nezaplacení. Přines zpět, co můžeš."
viVN = "Chưa nữa là một bộ tộc những kẻ ngoại đạo bẩn thỉu, ai mà ngờ được nhỉ? Những gã này đã phát triển một nỗi ám ảnh không lành mạnh với lửa và ghét bị ướt. Điều đó đặt ra câu hỏi làm thế nào họ có thể tắm, nhưng đừng để xảy ra quá nhiều câu hỏi khó xử. Họ có những cái cây khổng lồ nhưng sẽ không nói cho chúng ta cách trồng chúng, và táo của họ thì đáng giá chết người. Hãy mang về những gì bạn có thể."

