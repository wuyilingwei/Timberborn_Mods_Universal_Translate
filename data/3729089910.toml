["Lapantouflemagic.Loglevee.Description"]
raw = "Crude levee made of numerous logs stuck in the mud for basic landscaping. The flag must be entirely buried."
status = "normal"
enUS = "Crude levee made of numerous logs stuck in the mud for basic landscaping. The flag must be entirely buried."
zhCN = "由许多嵌入泥土中的原木构成的粗糙堤防，用于基本的园林绿化。旗帜必须完全埋入。"
zhTW = "由多根木頭插入泥土製成的粗糙堤防，用於基本的景觀修整。旗幟必須全部埋入泥中。"
ruRU = "Грубая дамба, сделанная из многочисленных бревен, застрявших в грязи для базового ландшафтного дизайна. Флаг должен быть полностью закопан."
jaJP = "泥の中に押し込まれた多数の丸太で作られた粗い堤防。旗は完全に埋まっている必要があります。"
frFR = "Levée brute faite de nombreux troncs enfoncés dans la boue pour un aménagement paysager de base. Le drapeau doit être entièrement enterré."
deDE = "Rohdamm aus zahlreichen in den Schlamm gesteckten Stämmen für einfache Landschaftsgestaltung. Die Flagge muss vollständig vergraben sein."
plPL = "Prymitywna tama z licznych pni utkniętych w błocie do podstawowego kształtowania terenu. Flaga musi być całkowicie zakopana."
ptBR = "Levee rudimentar feito de numerosos troncos fincados na lama para paisagismo básico. A bandeira deve estar completamente enterrada."
koKR = "진흙에 박힌 많은 통나무로 만들어진 조잡한 제방입니다. 깃발은 완전히 묻혀 있어야 합니다."
csCZ = "Hrubý hráz vyrobený z mnoha klád zapíchnutých do bláta pro základní terénní úpravy. Základna musí být zcela pohřbena."
viVN = "Đê thô được làm từ nhiều thân gỗ cắm trong bùn để tạo phong cảnh cơ bản. Cái cờ phải được chôn hoàn toàn."

["Lapantouflemagic.primitivedam.FlavorDescription"]
raw = "\"Actually, it looks nice!\"\n -An urbanist beaver"
status = "normal"
enUS = "\"Actually, it looks nice!\" - An urbanist beaver"
zhCN = "“实际上，看起来不错！”  \n-一只城市化的河狸"
zhTW = "「其實，看起來不錯！」  \n- 一隻城市主義的海狸"
ruRU = "\"На самом деле, это выглядит красиво!\"  \n- Городской бобер"
jaJP = "「実際、素敵に見えます！」 - 都市計画者のビーバー"
frFR = "\"En fait, c'est joli !\"\n -Un castor urbaniste"
deDE = "„Eigentlich sieht es schön aus!“  \n- Ein urbanistischer Biber"
plPL = "\"Właściwie, wygląda świetnie!\" - Urbanistyczny bóbr"
ptBR = "\"Na verdade, parece legal!\"  \n-Um castor urbanista"
koKR = "\"사실, 보기 좋네요!\"  \n- 한 도시 계획 비버"
csCZ = "\"Vlastně to vypadá hezky!\"  \n- Městský bobr"
viVN = "\"Thực ra, nó trông đẹp đấy!\" - Một con castor đô thị"

