["Lapantouflemagic.SolarArray.Description"]
raw = "Captures sunlight and turns it into this weird \"electricity\" thing according to ancient hooman texts. Better keep an eye on it, and an other eye on where you step."
status = "normal"
enUS = "Captures sunlight and turns it into this weird 'electricity' thing according to ancient human texts. Better keep an eye on it, and another eye on where you step."
zhCN = "捕捉阳光并将其转化为根据古老的人类文献所述的这种奇怪的“电力”东西。最好时刻注意它，同时也要留意你脚下的地方。"
zhTW = "捕捉陽光並將其轉化為根據古老的人類文獻所稱的奇怪「電力」物質。最好留意它，並注意你的腳下什麼地方。"
ruRU = "Улавливает солнечный свет и превращает его в это странное \"электричество\", согласно древним человеческим текстам. Лучше следить за ним, а также за тем, куда вы ступаете."
jaJP = "「太陽光を吸収し、古代人間の文献によるとこの奇妙な『電気』に変換します。注意して見守り、足元にも気をつけましょう。」"
frFR = "Capte la lumière du soleil et la transforme en ce bizarre truc appelé \"électricité\" selon d'anciens écrits humains. Mieux vaut garder un œil dessus, et un autre sur où vous mettez les pieds."
deDE = "Fängt Sonnenlicht ein und verwandelt es gemäß alten menschlichen Texten in dieses seltsame 'Elektrizitäts'-Ding. Am besten behältst du ein Auge darauf und ein anderes darauf, wo du trittst."
plPL = "Łapie światło słoneczne i przekształca je w te dziwne „elektryczność” według starożytnych ludzkich tekstów. Lepiej miej na nią oko, a drugie oko na to, gdzie stąpasz."
ptBR = "Captura a luz do sol e a transforma nessa estranha coisa chamada 'eletricidade', de acordo com textos antigos de humanos. É melhor ficar de olho nisso e com o outro olho em onde você pisa."
koKR = "햇빛을 포착하여 고대 인간 문서에 따르면 이 이상한 '전기'로 변환합니다. 이를 잘 지켜보는 것이 좋고, 발을 어디에 디딜지도 주의해야 합니다."
csCZ = "Zachycuje sluneční světlo a mění ho na tu zvláštní „elektřinu“ podle starých lidských textů. Raději si na něj dej pozor a na druhé oko si dej pozor, kam šlapeš."
viVN = "Thu hoạch ánh sáng mặt trời và biến nó thành thứ \"điện\" kỳ quái này theo những văn bản cổ xưa của loài người. Tốt hơn là hãy giữ một mắt ở đó, và một mắt nữa nơi bạn đặt chân."

["Lapantouflemagic.SolarArray.FlavorDescription"]
raw = "\"Eheh, the fun part is to cook slices of pumpkins on the hot surfaces in summer\"\n- the array supervising beaver"
status = "normal"
enUS = "\"Eheh, the fun part is to cook slices of pumpkins on the hot surfaces in summer\" - the array supervising beaver"
zhCN = "“嘿嘿，有趣的部分是在夏天的热表面上烹饪南瓜片”  \n- “监督阵列的海狸”"
zhTW = "「嘿嘿，有趣的部分是在夏天將南瓜片放在熱的表面上烹飪」  \n- 監督陣列的海狸"
ruRU = "\"Эхех, самое интересное - это жарить ломтики тыквы на горячих поверхностях летом\" - надзирательный бобёр массива"
jaJP = "「えへへ、楽しいのは夏に熱い表面でかぼちゃのスライスを焼くことだ」  \n- 配列を監視するビーバー"
frFR = "\"Eheh, la partie amusante consiste à cuire des tranches de citrouille sur les surfaces chaudes en été\" - le castor superviseur du panneau"
deDE = "\"Eheh, der lustige Teil ist, Scheiben von Kürbissen auf den heißen Oberflächen im Sommer zu rösten\" - der arrayüberwachende Biber"
plPL = "Eheh, najfajniejsza część to gotowanie plasterków dyni na gorących powierzchniach latem\" - \"nadzorujący bobrzy panel"
ptBR = "\"Eheh, a parte divertida é cozinhar fatias de abóbora nas superfícies quentes no verão\"  \n- o castor supervisor do painel"
koKR = "\"헤헤, 재미있는 부분은 여름에 뜨거운 표면에서 호박 조각을 요리하는 거예요\" - 배열을 감독하는 비버"
csCZ = "\"Eheh, zábavná část je péct plátky dýně na horkých plochách v létě\" - dozorující bobr z array"
viVN = "\"Eheh, phần thú vị là nướng những lát bí ngô trên các bề mặt nóng vào mùa hè\" - con hải ly giám sát mảng năng lượng"

