["Lapantouflemagic.NuclearPress.Description"]
raw = "An oversized press using nuclear heat to hot squeeze more oil out of sunflower seeds.\n<color=#FF6EC7>Can function without workers.</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "An oversized press using nuclear heat to hot squeeze more oil out of sunflower seeds.  \n<color=#FF6EC7>Can function without workers.</color>  \n<color=#00FFFF>Works as a Levee</color>"
zhCN = "一个超大号的压榨机，利用核热从向日葵种子中榨取更多的油。\n<color=#FF6EC7>可以在没有工人的情况下运行。</color>\n<color=#00FFFF>可以作为堤坝使用</color>"
zhTW = "一種超大型壓機，利用核熱將更多的油從向日葵種子中熱壓榨出來。<color=#FF6EC7>可以無需工人運行。</color><color=#00FFFF>作為堤壩運作</color>"
ruRU = " oversized press using nuclear heat to hot squeeze more oil out of sunflower seeds. <color=#FF6EC7>Может функционировать без рабочих.</color> <color=#00FFFF>Работает как дамба</color>"
jaJP = "太陽の種からより多くの油を熱圧搾するために、核熱を利用した大型プレスです。\n<color=#FF6EC7>労働者なしで機能します。</color>\n<color=#00FFFF>堤防として機能します。</color>"
frFR = "Une presse surdimensionnée utilisant la chaleur nucléaire pour extraire davantage d'huile des graines de tournesol par compression à chaud.  \n<color=#FF6EC7>Peut fonctionner sans travailleurs.</color>  \n<color=#00FFFF>Fonctionne comme un remblai</color>"
deDE = "Eine übergroße Presse, die nukleare Wärme nutzt, um mehr Öl aus Sonnenblumenkernen zu pressen.\n<color=#FF6EC7>Kann ohne Arbeiter funktionieren.</color>\n<color=#00FFFF>Funktioniert wie ein Deich</color>"
plPL = "Prasa o dużych rozmiarach wykorzystująca ciepło jądrowe do gorącego wyciskania większej ilości oleju z nasion słonecznika.  \n<color=#FF6EC7>Może działać bez pracowników.</color>  \n<color=#00FFFF>Działa jak wał.</color>"
ptBR = "Uma prensa oversized que utiliza calor nuclear para extrair mais óleo das sementes de girassol.\n<color=#FF6EC7>Pode funcionar sem trabalhadores.</color>\n<color=#00FFFF>Funciona como uma Barragem</color>"
koKR = "핵 열을 이용해 해바라기 씨에서 더 많은 기름을 뜨겁게 압착하는 거대한 프레스.\n<color=#FF6EC7>근로자 없이 작동할 수 있습니다.</color>\n<color=#00FFFF>제방처럼 작동합니다.</color>"
csCZ = "Overměrný lis využívající jaderné teplo k horkému vymačkávání více oleje ze slunečnicových semen.  \n<color=#FF6EC7>Může fungovat bez pracovníků.</color>  \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một máy ép cỡ lớn sử dụng nhiệt hạt nhân để ép nóng nhiều dầu hơn từ hạt hướng dương.  \n<color=#FF6EC7>Có thể hoạt động mà không cần công nhân.</color>  \n<color=#00FFFF>Hoạt động như một đập chắn nước</color>"

