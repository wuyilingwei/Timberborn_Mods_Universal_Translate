["Lapantouflemagic.PassthroughHouse.Description"]
raw = "A slightly enlarged lodge with a complicated waterlock system to allow beavers to easily access the other side of the dam.\nHouses <color=green>one hauler</color> and its family.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A slightly enlarged lodge with a complicated waterlock system to allow beavers to easily access the other side of the dam. Houses <color=green>one hauler</color> and its family. <color=#00FFFF>Works as a Levee</color>"
zhCN = "“一座稍微扩大版的旅馆，配备复杂的水锁系统，可让海狸轻松到达大坝的另一侧。\n容纳<color=green>一名搬运工</color>及其家人。\n<color=#00FFFF>作为挡土坝工作</color>”"
zhTW = "一個稍微放大的小屋，配備複雜的水鎖系統，以便海狸能夠輕鬆地進入大壩的另一側。\n容納<color=green>一名運搬工</color>及其家族。\n<color=#00FFFF>作為堤壩運作</color>"
ruRU = "Немного увеличенный домик с сложной системой водного замка, позволяющей бобрам легко добираться до другой стороны плотины. \nВмещает <color=green>одного грузчика</color> и его семью. \n<color=#00FFFF>Работает как насыпь</color>"
jaJP = "「少し大きくなった lodge で、ビーバーがダムの反対側に簡単にアクセスできるように複雑な水密扉システムを備えています。  \n<color=green>1人の運搬者</color>とその家族が住んでいます。  \n<color=#00FFFF>堤防として機能します</color>」"
frFR = "Un pavillon légèrement agrandi avec un système de verrouillage hydraulique complexe pour permettre aux castors d'accéder facilement à l'autre côté du barrage.  \nAccueille <color=green>un transporteur</color> et sa famille.  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Eine leicht vergrößerte Hütte mit einem komplizierten Wasserabschlusssystem, das es Bibern ermöglicht, leicht die andere Seite des Damms zu erreichen.\nBietet Platz für <color=green>einen Transportarbeiter</color> und seine Familie.\n<color=#00FFFF>Funktioniert als Damm</color>"
plPL = "Nieco powiększona chata z skomplikowanym systemem hydrotechnicznym, umożliwiającym bobrom łatwy dostęp z drugiej strony tamy.  \nMieszka w niej <color=green>jeden przenośnik</color> oraz jego rodzina.  \n<color=#00FFFF>Funkcjonuje jako Grobla</color>"
ptBR = "Uma cabana ligeiramente ampliada com um sistema complicado de fechamento d'água para permitir que os castores acessem facilmente o outro lado da barragem.  \nAbriga <color=green>um carregador</color> e sua família.  \n<color=#00FFFF>Funciona como uma Barragem</color>"
koKR = "물막이 시스템이 복잡하게 되어 있어 비버들이 댐의 다른 쪽으로 쉽게 접근할 수 있도록 확장된 오두막입니다.\n<color=green>하나의 운반꾼</color>과 그 가족이 살고 있습니다.\n<color=#00FFFF>제방으로 기능합니다</color>"
csCZ = "Lehce zvětšená chatička se složitým uzamykacím systémem, který umožňuje bobrům snadný přístup na druhou stranu hráze.\nUbytovává <color=green>jednoho nosiče</color> a jeho rodinu.\n<color=#00FFFF>Funguje jako hráz</color>"
viVN = " Một căn lều hơi lớn hơn với hệ thống khóa nước phức tạp để cho các con nhím dễ dàng tiếp cận phía bên kia của đập. \nChứa <color=green>một người vận chuyển</color> và gia đình của nó. \n<color=#00FFFF>Hoạt động như một bờ đê</color> "

["Lapantouflemagic.PassthroughHouse.FlavorDescription"]
raw = "\"You would think that this house has extra space right? Well no, the waterlock mechanism is huge and noisy. Thankfully almost no one uses it at night.\""
status = "normal"
enUS = "\"You would think that this house has extra space, right? Well, no, the waterlock mechanism is huge and noisy. Thankfully, almost no one uses it at night.\""
zhCN = "“你会认为这座房子有额外的空间，对吧？其实并没有，水锁机制非常庞大且嘈杂。谢天谢地，几乎没有人在晚上使用它。”"
zhTW = "「你會想這棟房子有額外的空間，對吧？其實不是，水閘機構又大又吵。幸好幾乎沒有人在夜間使用它。」"
ruRU = "\"Вы бы думали, что в этом доме достаточно места, не так ли? Но нет, механизм водяной блокировки огромный и шумный. К счастью, почти никто им не пользуется по ночам.\""
jaJP = "「この家には余分なスペースがあると思うでしょう？でも、そうではありません。水密装置は巨大で騒々しいのです。幸いなことに、夜にはほとんど誰も利用しません。」"
frFR = "\"On pourrait penser que cette maison a de l'espace supplémentaire, n'est-ce pas ? Eh bien non, le mécanisme de verrouillage est énorme et bruyant. Heureusement, presque personne ne l'utilise la nuit.\""
deDE = "\"Man könnte denken, dass dieses Haus zusätzlichen Platz hat, oder? Nun, nein, der Wasserschlossmechanismus ist riesig und laut. Glücklicherweise benutzt ihn nachts fast niemand.\""
plPL = "\"Można by pomyśleć, że ten dom ma dodatkową przestrzeń, prawda? Cóż, nie, mechanizm zamka na wodę jest ogromny i hałaśliwy. Na szczęście prawie nikt go nie używa w nocy.\""
ptBR = "\"Você pensaria que esta casa tem espaço extra, certo? Bem, não, o mecanismo de bloqueio de água é enorme e barulhento. Felizmente, quase ninguém o utiliza à noite.\""
koKR = "\"이 집에 여유 공간이 있을 거라고 생각하겠지만, 사실 그렇지 않습니다. 수문 메커니즘이 크고 시끄럽기 때문이죠. 다행히도 밤에는 거의 아무도 사용하지 않습니다.\""
csCZ = "\"Mysleli byste, že tento dům má navíc prostor, že? No, nemá, mechanizmus uzamčení vody je obrovský a hlučný. Naštěstí ho skoro nikdo v noci nepoužívá.\""
viVN = "\"Bạn có thể nghĩ rằng ngôi nhà này có thêm không gian đúng không? Chà, không phải vậy, cơ chế khóa nước rất lớn và ồn ào. May mắn thay, gần như không ai sử dụng vào ban đêm.\""

