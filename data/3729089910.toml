["Lapantouflemagic.OverhangSquewer_Long.Description"]
raw = "A side platform that can be stuck between buildings or between floors.\nCan be extended on itself once.\n<color=red>Multiple side platforms or bridges cannot share the same support</color>"
status = "normal"
enUS = "A side platform that can be placed between buildings or between floors. It can be extended on itself once. <color=red>Multiple side platforms or bridges cannot share the same support</color>"
zhCN = "一个可以插入建筑物之间或楼层之间的侧平台。  \n可以自己延伸一次。  \n<color=red>多个侧平台或桥梁不能共享同一支撑</color>"
zhTW = "一個可以夾在建築物之間或樓層之間的側平台。\n可以自我延伸一次。\n<color=red>多個側平台或橋樑不能共用相同的支撐</color>"
ruRU = "Сторонняя платформа, которую можно установить между зданиями или между этажами. \nМожет быть продлена один раз. \n<color=red>Несколько сторонних платформ или мостов не могут использовать одну и ту же опору</color>"
jaJP = "建物や階の間に挟むことができるサイドプラットフォームです。  \n自身で一度伸ばすことができます。  \n<color=red>複数のサイドプラットフォームや橋は同じ支えを共有することはできません</color>"
frFR = "Une plateforme latérale qui peut être coincée entre des bâtiments ou entre des étages.  \nPeut être prolongée sur elle-même une fois.  \n<color=red>Plusieurs plateformes latérales ou ponts ne peuvent pas partager le même support</color>"
deDE = "Eine Seitenplattform, die zwischen Gebäuden oder zwischen Etagen platziert werden kann. \nKann einmal über sich selbst hinaus verlängert werden. \n<color=red>Mehrere Seitenplattformen oder Brücken können nicht dieselbe Unterstützung teilen</color>"
plPL = "Bocznica, którą można umieścić między budynkami lub piętrami. Może być rozciągnięta na sobie raz. <color=red>Wiele bocznic lub mostów nie może dzielić tego samego wsparcia</color>"
ptBR = "Uma plataforma lateral que pode ser posicionada entre edifícios ou entre andares. Pode ser estendida sobre si mesma uma vez. <color=red>Múltiplas plataformas laterais ou pontes não podem compartilhar o mesmo suporte</color>"
koKR = "건물 사이 또는 층 사이에 끼울 수 있는 측면 플랫폼입니다.  \n한 번 자체적으로 연장할 수 있습니다.  \n<color=red>여러 측면 플랫폼이나 다리는 동일한 지지를 공유할 수 없습니다.</color>"
csCZ = "Boční platforma, kterou lze vložit mezi budovy nebo mezi patry. Může být prodloužena sama o sobě jednou. <color=red>Více bočních platforem nebo mostů nemohou mít stejné podpory</color>"
viVN = "Một nền tảng bên có thể được kẹp giữa các tòa nhà hoặc giữa các tầng.\nCó thể kéo dài một lần trên chính nó.\n<color=red>Các nền tảng bên hoặc cầu nhiều không thể chia sẻ cùng một điểm tựa</color>"

