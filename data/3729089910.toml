["Lapantouflemagic.Fireflyfarm.Description"]
raw = "An unusual workplace reserved for the most fearless beavers. Grows giant carnivorous fireflies from tiny larvae in order to harvest the glowing fluid from their abdomen.\nThe ravenous beast is kept attached at all times to make the process <i>perfectly</i> safe."
status = "normal"
enUS = "An unusual workplace reserved for the most fearless beavers. Grows giant carnivorous fireflies from tiny larvae in order to harvest the glowing fluid from their abdomen. The ravenous beast is kept attached at all times to make the process <i>perfectly</i> safe."
zhCN = "“一个为最无畏的海狸保留的独特工作场所。 从小幼虫中培育出巨大的食肉萤火虫，以收获它们腹部的发光液体。贪婪的野兽始终保持连接，以使这个过程<i>绝对</i>安全。”"
zhTW = "一個不尋常的工作場所，專為最勇敢的海狸而設。從微小的幼蟲中培育出巨型食肉螢火蟲，以便收穫它們腹部的發光液體。這種貪婪的野獸始終被固定，以確保過程<i>完全</i>安全。"
ruRU = "Необычное место работы, отведенное для самых бесстрашных бобров. Выращивает гигантских мясоедных светлячков из крошечных личинок, чтобы собирать светящуюся жидкость из их живота. \nСкверный зверь всегда прикреплен, чтобы сделать процесс <i>совершенно</i> безопасным."
jaJP = "珍しい職場で、最も恐れ知らずのビーバーたちのための場所です。小さな幼虫から巨大な肉食性ホタルを育て、その腹部から発光する液体を収穫します。\n常に繋がれているこの貪欲な獣は、プロセスを<i>完全に</i>安全にするためです。"
frFR = "Un lieu de travail inhabituel réservé aux castors les plus intrépides. Produit d'énormes lucioles carnivores à partir de petites larves afin de récolter le fluide lumineux de leur abdomen. La bête vorace est maintenue attachée en permanence pour rendre le processus <i>parfaitement</i> sûr."
deDE = "Ein ungewöhnlicher Arbeitsplatz, der den furchtlosesten Bibern vorbehalten ist. Züchtet riesige fleischfressende Glühwürmchen aus kleinen Larven, um die leuchtende Flüssigkeit aus ihrem Bauch abzuernten. Das gefräßige Tier wird zu jeder Zeit angebunden, um den Prozess <i>völlig</i> sicher zu gestalten."
plPL = "Niezwykłe miejsce pracy zarezerwowane dla najodważniejszych bobrów. Hoduje gigantyczne mięsożerne świetliki z malutkich larw, aby zbierać świecącą ciecz z ich brzucha. \nCzujne stworzenie jest cały czas przywiązane, aby proces był <i>doskonale</i> bezpieczny."
ptBR = "Um local de trabalho incomum reservado para os castores mais destemidos. Cultiva vagalumes carnívoros gigantes a partir de pequenas larvas para colher o fluido brilhante de seu abdômen. A besta voraz é mantida presa o tempo todo para garantir que o processo seja <i>perfeitamente</i> seguro."
koKR = "가장 두려움 없는 비버들을 위해 마련된 특별한 작업 공간. 작은 유충으로부터 거대한 육식 반딧불이를 키워 그들의 복부에서 빛나는 액체를 수확합니다. 이 배고픈 야수는 과정이 <i>완벽하게</i> 안전하도록 항상 붙어 있게 됩니다."
csCZ = "Neobvyklé pracovní místo vyhrazené pro nejodvážnější bobry. Pěstuje obří masožravé světlušky z malých larev, aby získal zářící tekutinu z jejich břicha. Hladové zvíře je vždy připevněno, aby byl proces <i>naprosto</i> bezpečný."
viVN = "Một nơi làm việc không bình thường dành cho những chú hải ly dũng cảm nhất. Nuôi những con đom đóm ăn thịt khổng lồ từ những ấu trùng nhỏ để thu hoạch chất lỏng phát sáng từ bụng của chúng.\nCon quái vật háu đói luôn được giữ lại liên tục để đảm bảo quy trình <i>hoàn toàn</i> an toàn."

["Lapantouflemagic.Fireflyfarm.FlavorDescription"]
raw = "\"You see kits: every bad thing has its silver lining! Tending to those is quite easy, and what's it gonna do? Eat my prosthetic arm? Ha!\"\n -Grandpa beaver, on how to live a happy life."
status = "normal"
enUS = "\"You see kids: every bad thing has its silver lining! Taking care of those is quite easy, and what's it gonna do? Eat my prosthetic arm? Ha!\"\n- Grandpa Beaver, on how to live a happy life."
zhCN = "“你看小家伙：每件坏事都有它的好的一面！照顾这些很简单，那又能怎么样？吃了我的义肢？哈！”  \n- 老爷狸，关于如何过上快乐的生活。"
zhTW = "「你看，小家伙：每件壞事都有其美好的一面！照顧牠們非常簡單，牠能怎麼樣？吃掉我的義肢手臂？哈！」  \n- 老爺爺海狸，談怎樣過上快樂的生活。"
ruRU = "Вы видите, детки: у каждой плохой вещи есть свои положительные стороны! Ухаживать за ними довольно легко, а что они могут сделать? Укусить меня за протез руки? Ха!\"\n -Дедушка бобр о том, как жить счастливой жизнью."
jaJP = "「子供たちを見てごらん：すべての悪いことには良い面がある！それの世話をするのはとても簡単だし、何をするっていうんだ？私の義手を食べるのか？はは！」  \n- おじいちゃんビーバー、幸せに生きる方法について。"
frFR = "Vous voyez les petits : chaque chose négative a son côté positif ! S'occuper de ces choses est assez simple, et qu'est-ce que ça peut faire ? Manger mon bras prothétique ? Ha !\"\n - Papi castor, sur comment vivre une vie heureuse."
deDE = "\"Du siehst, Kit: Jede schlechte Sache hat ihre positive Seite! Sich um diese zu kümmern ist ganz einfach, und was wird es tun? Meinen Prothesenarm essen? Ha!\" -Opa Biber, über das Leben eines glücklichen Lebens."
plPL = "Zobaczcie maluchy: każdy zły czyn ma swoje dobre strony! Opieka nad nimi jest całkiem prosta, a co im się stanie? Zjedzą moją protezę? Ha!\"  \n-Dziadek bóbr, o tym, jak żyć szczęśliwie."
ptBR = "\"Você vê, filhotes: toda coisa ruim tem seu lado bom! Cuidar disso é bem fácil, e o que vai fazer? Comer meu braço prostético? Ha!\"  \n- Vovô castor, sobre como viver uma vida feliz."
koKR = "너희는 새끼들을 보게 될 거야: 모든 나쁜 일에는 좋은 면이 있어! 그것들을 돌보는 건 정말 쉬워, 그리고 그게 뭐 할 건데? 내 의수를 먹고 싶어? 하하!\"\n - 할아버지 비버, 행복한 삶을 사는 방법에 대해."
csCZ = "Vidíš, děti: každá špatná věc má své stříbrné podložení! Starat se o ně je docela snadné, a co to udělá? Sní mi umělou ruku? Ha!\"\n -Dědeček bobr, o tom, jak žít šťastný život."
viVN = "\"Bạn thấy đấy, mọi điều tồi tệ đều có mặt tích cực của nó! Chăm sóc chúng thì khá dễ, và chúng sẽ làm gì? Ăn cánh tay prosthetic của tôi à? Ha!\"\n -Ông già hải ly, về cách sống một cuộc sống hạnh phúc."

