["Lapantouflemagic.TappersFlag.FlavorDescription"]
raw = "\"It seems quite easy, but it requires some technique to not get your fur full of this sticky thing\""
status = "normal"
enUS = "\"It seems quite easy, but it requires some technique to keep your fur from getting all sticky.\""
zhCN = "“这看起来很简单，但需要一些技巧才能不让你的毛发沾上这个粘糊糊的东西。”"
zhTW = "\"看起來很簡單，但需要一些技巧才能不讓你的毛髮沾上這個黏糊糊的東西。\""
ruRU = "\"Это кажется довольно простым, но требует определенной техники, чтобы не запачкать мех этим липким веществом.\""
jaJP = "「見た目は簡単そうだが、この粘着物で毛がべたべたにならないようにするには、いくつかのテクニックが必要だ。」"
frFR = "\"On dirait que c'est assez facile, mais il faut un certain savoir-faire pour ne pas avoir la fourrure pleine de cette chose collante.\""
deDE = "\"Es scheint ganz einfach zu sein, aber es erfordert etwas Technik, um sich nicht mit diesem klebrigen Zeug vollzupacken.\""
plPL = "\"To wydaje się całkiem proste, ale wymaga trochę techniki, aby nie zafajdać futra tą lepką rzeczą.\""
ptBR = "\"Parece bem fácil, mas exige um pouco de técnica para não deixar seu pelo cheio dessa coisa pegajosa.\""
koKR = "\"꽤 쉬운 것처럼 보이지만, 이 끈적한 것에 털이 가득하지 않으려면 약간의 기술이 필요합니다.\""
csCZ = "\"Zdá se to celkem snadné, ale vyžaduje to trochu techniky, abyste si nezaspinili srst touto lepivou věcí.\""
viVN = "\"Nó có vẻ khá dễ, nhưng cần một chút kỹ thuật để không làm lông của bạn dính đầy thứ dính này.\""

