["Lapantouflemagic.AdvancedWarmstorage.Description"]
raw = "An old tower design repurposed to serve as a gargantuan storage for warm food.\nHeat is provided for free and forever by a massive rod of low grade radioactive matter in the center of the tower."
status = "normal"
enUS = "An old tower design repurposed to serve as a gargantuan storage for warm food. Heat is provided for free and forever by a massive rod of low-grade radioactive matter in the center of the tower."
zhCN = "一个旧的塔楼设计被改造为一个巨大的温暖食品储存库。中心有一根低级放射性物质制成的巨大杆子，提供永久免费的热量。"
zhTW = "一座古老的塔樓設計被重新利用，作為巨大的熱食存儲空間。塔中心有一根低級放射性物質製成的巨大棒，提供免費且永恆的熱量。"
ruRU = "Старая башенная конструкция, переосмысленная для использования в качестве гигантского склада для горячей еды. Тепло обеспечивается бесплатно и навсегда благодаря массивному стержню из низкокачественного радиоактивного материала в центре башни."
jaJP = "古い塔のデザインを再利用した、温かい食べ物のための巨大なストレージです。熱は塔の中央にある低品位の放射性物質の巨大な棒によって無料で永遠に提供されます。"
frFR = "Un ancien design de tour réutilisé pour servir de stockage gargantuesque pour la nourriture chaude. La chaleur est fournie gratuitement et pour toujours par une énorme tige de matière radioactive de faible qualité au centre de la tour."
deDE = "Ein altes Turmdesign, das umfunktioniert wurde, um als gigantischer Lagerraum für warme Nahrung zu dienen. Wärme wird kostenlos und für immer durch einen massiven Stab aus niedriggradigem radioaktivem Material im Zentrum des Turms bereitgestellt."
plPL = "Stary projekt wieży przerobiony na olbrzymi magazyn ciepłej żywności. Ciepło dostarczane jest za darmo i na zawsze przez masywny pręt niskiej jakości materiału radioaktywnego w centrum wieży."
ptBR = "Um antigo design de torre reaproveitado para servir como um armazenamento gargantuano para comida quente. O calor é fornecido gratuitamente e para sempre por uma enorme barra de matéria radioativa de baixa qualidade no centro da torre."
koKR = "오래된 탑 디자인이 따뜻한 음식을 위한 거대한 저장소로 재구성되었습니다. 열은 탑 중앙에 있는 저급 방사성 물질로 만들어진 거대한 막대에 의해 영구적으로 무료로 제공됩니다."
csCZ = "Starý návrh věže přetvořený na obrovské skladiště teplého jídla. Teplo je poskytováno zdarma a navždy díky obrovské tyči z nízce radioaktivního materiálu ve středu věže."
viVN = "Một thiết kế tháp cũ được tái sử dụng để làm nơi lưu trữ khổng lồ cho thức ăn nóng.\nNhiệt được cung cấp miễn phí và mãi mãi bởi một thanh lớn của vật chất phóng xạ cấp thấp ở trung tâm tháp."

["Lapantouflemagic.AdvancedWarmstorage.FlavorDescription"]
raw = "\"Even better, the food placed in there never rots, and the fools that supply it never have kits!\"\n -An eugenicist beaver"
status = "normal"
enUS = "\"Even better, the food placed in there never rots, and the fools that supply it never have kits!\"  \n-An eugenicist beaver"
zhCN = "“更妙的是，放在里面的食物永远不会腐烂，供给它的傻瓜们也永远没有小崽！”  \n- 一只优生学海狸"
zhTW = "「更棒的是，放在那裡的食物永遠不會腐爛，而供應它的傻瓜們也永遠不會有幼崽！」  \n— 一隻優生學海狸"
ruRU = "\"Еще лучше, еда, помещенная туда, никогда не разлагается, а дураки, которые её поставляют, никогда не имеют котят!\"  \n- Евгенист-причудливый бобер"
jaJP = "「さらに良いことに、そこに置かれた食べ物は決して腐らず、それを供給する愚か者たちは決して子供を持つことがない！」  \n-「優生学者のビーバー」"
frFR = "\"Encore mieux, la nourriture placée là-dedans ne pourrit jamais, et les idiots qui l'approvisionnent n'ont jamais de petits !\"\n - Un castor eugéniste"
deDE = "„Noch besser, die dort gelagerte Nahrung verdirbt niemals, und die Dummköpfe, die sie liefern, bekommen nie Kits!“  \n -Ein Eugeniker-Biber"
plPL = "\"Co lepsze, jedzenie umieszczone tam nigdy nie gnije, a głupcy, którzy je dostarczają, nigdy nie mają dzieci!\"  \n- Eugenik wiewiórka"
ptBR = "\"Melhor ainda, a comida colocada lá nunca estraga, e os tolos que a fornecem nunca têm filhotes!\"  \n- Um castor eugênico"
koKR = "거기에 놓인 음식은 썩지도 않고, 그것을 공급하는 바보들은 새끼를 낳지 않지!\"\n - 유전학자 비버"
csCZ = "\"Ještě lépe, jídlo umístěné tam nikdy nehnívá a hlupáci, kteří ho zásobují, nikdy nemají mladé!\"  \n- Eugenicistní bobr"
viVN = "\"Ngay cả tốt hơn, thực phẩm đặt bên trong đó sẽ không bao giờ bị thiu, và những kẻ ngu ngốc cung cấp nó sẽ không bao giờ có con!\"  \n-Một con rái cá eugenicist"

