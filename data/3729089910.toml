["Lapantouflemagic.DeepMineBOXStorage.FlavorDescription"]
raw = "\"Why did they need all this space? Were they planning to live there? To survive their own man-made apocalypse?\"\n-An explorer beaver"
status = "normal"
enUS = "\"Why did they need all this space? Were they planning to live there? To survive their own man-made apocalypse?\"  \n-An explorer beaver"
zhCN = "“他们为什么需要这么大的空间？他们打算住在那里吗？为了活过自己制造的末日？”\n- 一只探险海狸"
zhTW = "「他們為什麼需要這麼大的空間？他們打算住在那裡嗎？為了在自己製造的末日中生存？」  \n— 一隻探險海狸"
ruRU = "“Зачем им было нужно столько места? Они планировали жить здесь? Выжить после своего собственного апокалипсиса, созданного человеком?”  \n- Исследователь-бобёр"
jaJP = "「なぜ彼らはこんなに広いスペースが必要だったのだろう？そこに住むつもりだったのか？自らが作り出した終末から生き残るために？」  \n- 探検ビーバー"
frFR = "\"Pourquoi avaient-ils besoin de tout cet espace ? Étaient-ils censés y vivre ? Survivre à leur propre apocalypse fabriquée de toutes pièces ?\"  \n-Un castor explorateur"
deDE = "„Warum brauchten sie all diesen Platz? Planten sie, dort zu leben? Um ihre eigene von Menschen verursachte Apokalypse zu überstehen?“  \n– Ein erforschender Biber"
plPL = "\"DLaczego potrzebowali tyle miejsca? Czy planowali tam mieszkać? Aby przetrwać własną apokalipsę, którą sami spowodowali?\"\n- Wędrowny bóbr"
ptBR = "\"Por que eles precisavam de todo esse espaço? Eles estavam planejando viver lá? Para sobreviver ao próprio apocalipse que criaram?\"  \n-Um castor explorador"
koKR = "\"그들은 왜 이 많은 공간이 필요했을까? 그곳에서 살려 했던 걸까? 그들 스스로 만든 세상의 종말을 견디기 위해서?\"  \n- 탐험가 비버"
csCZ = "Proč potřebovali tolik místa? Plánovali tam žít? Aby přežili svoji vlastní apokalypsu, kterou způsobili?\"\n- \"Prowaditel bobr"
viVN = "Tại sao họ cần tất cả không gian này? Họ có định sống ở đó không? Để sống sót qua thảm họa mà chính họ đã tạo ra?\"\n-Một con thủy thủ nhím nước"

