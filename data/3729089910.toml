["NaturalResource.Waterbamboo.FlavorDescription"]
raw = "\"If you wait long enough, you can climb it to reach the moon!\""
status = "normal"
enUS = "\"If you wait long enough, you can climb it to reach the moon!\""
zhCN = "“如果你等得够久，你可以爬上去到达月球！”"
zhTW = "「如果你等得夠久，你就可以爬上去到達月球！」"
ruRU = "\"Если подождать достаточно долго, можно взобраться на неё и достичь луны!\""
jaJP = "「十分に待てば、それに登って月に到達できるかもしれない！」"
frFR = "\"Si vous attendez assez longtemps, vous pouvez y grimper pour atteindre la lune !\""
deDE = "\"Wenn du lange genug wartest, kannst du hinaufklettern, um den Mond zu erreichen!\""
plPL = "\"Jeśli poczekasz wystarczająco długo, możesz się na niego wspiąć, aby dotrzeć do księżyca!\""
ptBR = "\"Se você esperar o suficiente, pode escalar para alcançar a lua!\""
koKR = "\"하나님을 믿고 기다리면, 그것을 타고 달에 도달할 수 있어요!\""
csCZ = "\"Pokud budeš čekat dostatečně dlouho, můžeš po něm vylézt a dosáhnout měsíce!\""
viVN = "\"Nếu bạn chờ đủ lâu, bạn có thể leo lên để đến mặt trăng!\""

