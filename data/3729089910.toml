["Tutorial.Tutorial.WelcomeText.FrostyWhiskers"]
raw = "Awaken, Controllerxa0!\n\nReactor failing.\n\nFuel supply critical.\n\nSelf-destruction engaged.\n\nReleasing emergency drones. \n\nThawing survivors (31147 remaining).\n\nBase cannibalization allowed.\n\n\nMissionxa0: transfer essential infrastructure outside."
status = "normal"
enUS = "Awaken, Controller!\n\nReactor failing.\n\nFuel supply critical.\n\nSelf-destruction engaged.\n\nReleasing emergency drones.\n\nThawing survivors (31147 remaining).\n\nBase cannibalization allowed.\n\nMission: transfer essential infrastructure outside."
zhCN = "觉醒，控制器！\n\n反应堆故障。\n\n燃料供应紧张。\n\n自毁模式已启动。\n\n释放应急无人机。\n\n解冻幸存者（剩余31147人）。\n\n基地可以被吞噬。\n\n任务：转移基本基础设施到外部。"
zhTW = "醒來，控制器！\n\n反應堆故障。\n\n燃料供應危急。\n\n自我毀滅已啟動。\n\n釋放緊急無人機。\n\n解凍倖存者（剩餘31147名）。\n\n基地可進行自我吞噬。\n\n任務：將重要基礎設施轉移到外部。"
ruRU = "Проснись, Контроллер!\n\nРеактор вышел из строя.\n\nЗапас топлива критический.\n\nСамоуничтожение включено.\n\nЗапуск аварийных дронов.\n\nРазмораживание выживших (осталось 31147).\n\nКаннибализация базы разрешена.\n\nМиссия: перенести жизненно важную инфраструктуру наружу."
jaJP = "目覚めよ、コントローラー！\n\nリアクターの故障。\n\n燃料供給危機的。\n\n自己破壊が開始されました。\n\n緊急ドローンを放出中。\n\n生存者を解凍中（残り31147）。\n\n基地のカニバリゼーションが許可されました。\n\nミッション：重要なインフラを外部に移転すること。"
frFR = "Réveillez-vous, Contrôleur !\n\nRéacteur en panne.\n\nApprovisionnement en combustible critique.\n\nAuto-destruction engagée.\n\nLancement de drones d'urgence.\n\nDégel des survivants (31147 restants).\n\nCannibalisation de la base autorisée.\n\nMission : transférer l'infrastructure essentielle à l'extérieur."
deDE = "Wach auf, Controller!\n\nReaktor fällt aus.\n\nTreibstoffversorgung kritisch.\n\nSelbstzerstörung aktiviert.\n\nNotfalldrohnen werden freigesetzt.\n\nÜberlebende auftauen (31147 übrig).\n\nBasiskanibalismus erlaubt.\n\nMission: wesentliche Infrastruktur nach außen transferieren."
plPL = "Obudź się, Kontrolerze!\n\nReaktor w awarii.\n\nDostawy paliwa krytyczne.\n\nSamozniszczenie aktywowane.\n\nUwalnianie dronów ratunkowych.\n\nTopnienie ocalałych (pozostało 31147).\n\nKanibalizacja bazy dozwolona.\n\nMisja: przenieść niezbędną infrastrukturę na zewnątrz."
ptBR = "Acorde, Controladora!\n\nReator falhando.\n\nSuprimento de combustível crítico.\n\nAutodestruição ativada.\n\nLiberando drones de emergência.\n\nDescongelando sobreviventes (31147 restantes).\n\nCanibalização da base permitida.\n\nMissão: transferir infraestrutura essencial para fora."
koKR = "각성하라, 컨트롤러!\n\n반응로가 고장났습니다.\n\n연료 공급이 위기입니다.\n\n자기 파괴가 시작되었습니다.\n\n응급 드론을 해제합니다.\n\n생존자를 동결 해제 중입니다 (남은 인원 31147명).\n\n기지의 자원 사용이 허용됩니다.\n\n임무: 필수 인프라를 외부로 이전하시오."
csCZ = "Probuďte se, Řídící!\n\nReaktor selhává.\n\nZásobování palivem je kritické.\n\nAktivováno vlastní zničení.\n\nUvolňuji\nemergentní drony.\n\nRozmrazování přeživších (31147 zbývá).\n\nPovolená kanibalizace základny.\n\nMise: přenést základní infrastrukturu ven."
viVN = "Thức tỉnh, Controllerxa0!\n\nPhản ứng hạt nhân gặp sự cố.\n\nNguồn cung cấp nhiên liệu nghiêm trọng.\n\nBắt đầu tự hủy.\n\nĐang thả các máy bay không người lái khẩn cấp.\n\nĐang làm tan băng những người sống sót (31147 còn lại).\n\nCho phép khai thác cơ sở.\n\nNhiệm vụxa0: chuyển giao cơ sở hạ tầng thiết yếu ra ngoài."

["Tutorial.Tutorial.FrostyWhiskers_Text1.FrostyWhiskers"]
raw = "Step onexa0: Collect ressources from the environment.\n\nPines detectedxa0; Bring resin to the Bunker for conversion into Plastic\n\nHarvest other ressources to occupy workforce if idle."
status = "normal"
enUS = "Step one: Collect resources from the environment.\n\nPines detected; Bring resin to the Bunker for conversion into Plastic.\n\nHarvest other resources to occupy workforce if idle."
zhCN = "步骤一：从环境中收集资源。\n\n检测到松树；将树脂带到地下室转化为塑料。\n\n收获其他资源以占用闲置的劳动力。"
zhTW = "步驟一：從環境中收集資源。\n\n檢測到松樹；將樹脂帶到掩體以轉換為塑料。\n\n收穫其他資源以佔用閒置的勞動力。"
ruRU = "Шаг один: Соберите ресурсы из окружающей среды.\n\nОбнаружены сосны; Принесите смолу в Бункер для переработки в Пластик.\n\nСоберите другие ресурсы, чтобы занять рабочую силу, если она простаивает."
jaJP = "ステップ1: 環境から資源を収集します。\n\n松の木が検出されました; 樹脂をバンカーに運んでプラスチックに変換します。\n\n他の資源を収穫して、労働力が空いている場合に占有します。"
frFR = "Étape 1 : Collecter des ressources de l'environnement.\n\nPins détectés ; Apportez de la résine au Bunker pour la convertir en plastique.\n\nRécoltez d'autres ressources pour occuper la main-d'œuvre si elle est idle."
deDE = "Schritt eins: Ressourcen aus der Umgebung sammeln.\n\nKiefern erkannt; Bringen Sie Harz zum Bunker zur Umwandlung in Plastik.\n\nErnten Sie andere Ressourcen, um die Arbeitskräfte zu beschäftigen, wenn sie untätig sind."
plPL = "Krok jeden: Zbieraj surowce z otoczenia.\n\nWykryto sosny; Przynieś żywicę do Bunkra, aby przekształcić ją w plastik.\n\nZbieraj inne surowce, aby zająć pracowników, gdy są bezczynni."
ptBR = "Passo 1: Coletar recursos do ambiente.\n\nPinhos detectados; Leve a resina para o Bunker para conversão em Plástico.\n\nColete outros recursos para ocupar a força de trabalho se estiver ociosa."
koKR = "1단계: 환경에서 자원을 수집하세요.\n\n소나무 감지됨; 플라스틱으로 변환하기 위해 벙커로 수지 가져가기\n\n작업이 없을 경우 근로자를 사용하기 위해 다른 자원을 수확하세요."
csCZ = "Krok 1: Sbírejte zdroje z prostředí.\n\nPiny zjištěny; Přineste pryskyřici do bunkru k přeměně na plast.\n\nSklízejte další zdroje, abyste zaměstnali pracovní sílu, pokud je nečinná."
viVN = "Bước một: Thu thập tài nguyên từ môi trường.\n\nPhát hiện thông thường; Mang nhựa đến Bunker để chuyển đổi thành Nhựa\n\nThu hoạch các tài nguyên khác để sử dụng lực lượng lao động nếu không có việc làm."

