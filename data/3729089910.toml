zhTW = "一個強力的壓榨機，用於從種子中提取油脂或從水果中提取汁液。\n<color=#00FFFF>可以用作堤壩</color>"
ruRU = "Мощный пресс для извлечения масла из семян или сока из фруктов. <color=#00FFFF>Работает как дамба</color>"
jaJP = "種子からオイルを抽出したり、果物からジュースを絞り出すための強力なプレスです。<color=#00FFFF>堤防として機能します</color>"
frFR = "Une presse puissante pour extraire de l'huile des graines ou du jus des fruits. \n<color=#00FFFF>Fonctionne comme une digue</color>"
