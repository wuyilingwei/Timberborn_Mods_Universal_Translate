["Lapantouflemagic.WonderIrrigationTower.FlavorDescription"]
raw = "\"If people keep thinking irrigation towers are lame, just keep making them better until they like them!\"\n -A carpenter beaver."
status = "normal"
enUS = "\"If people keep thinking irrigation towers are lame, just keep making them better until they like them!\"  \n-A carpenter beaver."
zhCN = "“如果人们总觉得灌溉塔很无聊，那就不断改进它们，直到他们喜欢为止！”  \n- 一只木匠海狸。"
zhTW = "「如果人們覺得灌溉塔很無聊，那就不斷改進它們，直到他們喜歡為止！」  \n- 一位木匠海狸。"
ruRU = "\"Если люди продолжают думать, что ирригационные башни скучны, просто продолжайте их улучшать, пока они им не понравятся!\"  \n-Бобер-плотник."
jaJP = "「人々が灌漑塔はつまらないと思い続けるなら、彼らが好きになるまで、どんどん良くしていこう！」  \n- 大工ビーバー。"
frFR = "\"Si les gens continuent de penser que les tours d'irrigation sont ennuyeuses, continue simplement à les améliorer jusqu'à ce qu'ils les aiment !\"  \n-Un castor menuisier."
deDE = "„Wenn die Leute weiterhin denken, dass Bewässerungstürme langweilig sind, mach sie einfach besser, bis sie sie mögen!“  \n- Ein Zimmermanns-Biber."
plPL = "\"Jeśli ludzie nadal będą uważać, że wieże nawadniające są nudne, po prostu rób je coraz lepszymi, dopóki im się nie spodobają!\"  \n-Krawiec bóbr."
ptBR = "\"Se as pessoas continuarem achando que torres de irrigação são sem graça, continue melhorando elas até que gostem!\"  \n- Um castor carpinteiro."
koKR = "\"사람들이 관개 타워를 재미없다고 계속 생각한다면, 그들이 좋아할 때까지 계속해서 더 좋게 만들면 된다!\"  \n- 한 목재 비버."
csCZ = "\"Pokud si lidé stále myslí, že zavlažovací věže jsou nudné, prostě je neustále vylepšujte, dokud se jim to nebude líbit!\"  \n- Stavitel bobr."
viVN = "Nếu mọi người cứ nghĩ tháp tưới tiêu là nhạt nhẽo, hãy cứ cải thiện chúng cho đến khi họ thích chúng!\"  \n-Một con hải ly thợ mộc."

["Lapantouflemagic.WonderIrrigationTower.Description"]
raw = "The ultimate irrigation tower: An elevated bath that irrigates crops with the dirty water, fertilizing them for faster growth, all the while having a minimal land pawprint.\n<color=green>Water consumption scales with irrigated area.\nPlant growth +15%</color>\n<color=#FF6EC7>Can function without workers.</color>"
status = "normal"
enUS = "The ultimate irrigation tower: An elevated bath that irrigates crops with dirty water, fertilizing them for faster growth, all while having a minimal land pawprint.  \n<color=green>Water consumption scales with irrigated area.  \nPlant growth +15%</color>  \n<color=#FF6EC7>Can function without workers.</color>"
zhCN = "终极灌溉塔：一个高架浴池，用脏水灌溉作物，施肥以加快生长，同时占用土地足迹最小。\n<color=green>水消耗与灌溉面积成比例。\n植物生长 +15%</color>\n<color=#FF6EC7>无需工人即可运行。</color>"
zhTW = "終極灌溉塔：一個提升的浴缸，利用髒水灌溉作物，讓它們更快生長，同時占用的土地面積最小。\n<color=green>水消耗隨灌溉面積增長。</color>\n<color=#FF6EC7>可無需工人運作。</color>"
ruRU = "Ультимативная башня ирригации: приподнятая ванна, которая орошает посевы грязной водой, удобряя их для более быстрого роста, при этом занимая минимальную площадь земли.\n<color=green>Потребление воды зависит от площади орошения.\nРост растений +15%</color>\n<color=#FF6EC7>Может работать без работников.</color>"
jaJP = "「究極の灌漑塔：汚れた水で作物を灌漑し、肥料を与えて成長を早める高台の浴槽であり、土地への影響は最小限です。\n<color=green>水消費は灌漑面積に比例します。\n植物の成長 +15%</color>\n<color=#FF6EC7>労働者なしで機能できます。</color>」"
frFR = "La tour d'irrigation ultime : Un bain élevé qui irrigue les cultures avec de l'eau sale, les fertilisant pour une croissance plus rapide, tout en ayant une empreinte au sol minimale.\n<color=green>La consommation d'eau augmente avec la surface irriguée.\nCroissance des plantes +15%</color>\n<color=#FF6EC7>Peut fonctionner sans ouvriers.</color>"
deDE = "Der ultimative Bewässerungsturm: Ein erhöhtes Bad, das die Felder mit schmutzigem Wasser bewässert und sie für ein schnelleres Wachstum düngt, während es gleichzeitig einen minimalen Landverbrauch hat.  \n<color=green>Wasserverbrauch skaliert mit der bewässerten Fläche.  \nPflanzenwachstum +15%</color>  \n<color=#FF6EC7>Kann ohne Mitarbeiter betrieben werden.</color>"
plPL = "Najlepsza wieża nawadniająca: Podniesiona łaźnia, która nawadnia uprawy brudną wodą, użyźniając je dla szybszego wzrostu, przy minimalnym wpływie na grunt.  \n<color=green>Zużycie wody rośnie proporcjonalnie do nawadnianego obszaru.  \nWzrost roślin +15%</color>  \n<color=#FF6EC7>Może działać bez pracowników.</color>"
ptBR = "A torre de irrigação definitiva: Um banho elevado que irriga as culturas com água suja, fertilizando-as para um crescimento mais rápido, enquanto possui uma pegada terrestre mínima.  \n<color=green>O consumo de água aumenta com a área irrigada.  \nCrescimento das plantas +15%</color>  \n<color=#FF6EC7>Pode funcionar sem trabalhadores.</color>"
koKR = "궁극의 관개 탑: 더러운 물로 농작물을 관개하는 고급 목욕탕으로, 농작물을 더 빠르게 성장시키기 위해 비료를 주며, 최소한의 토지 발자국을 남깁니다.\n<color=green>물 소비는 관개된 면적에 비례합니다.\n식물 성장 +15%</color>\n<color=#FF6EC7>작업자 없이도 기능할 수 있습니다.</color>"
csCZ = "Konečná zavlažovací věž: Vyvýšená kašna, která zavlažuje plodiny špinavou vodou a hnojí je pro rychlejší růst, přičemž má minimální dopad na půdu.\n<color=green>Spotřeba vody se mění podle zavlažované plochy.\nRůst rostlin +15%</color>\n<color=#FF6EC7>Može fungovat bez pracovníků.</color>"
viVN = "Tháp tưới tiêu tối thượng: Một bồn tắm trên cao tưới nước cho cây trồng bằng nước bẩn, bón phân cho chúng để tăng trưởng nhanh hơn, trong khi vẫn có dấu chân tối thiểu trên đất.\n<color=green>Tiêu thụ nước tỷ lệ với diện tích được tưới.</color>\n<Tăng trưởng cây +15%</color>\n<color=#FF6EC7>Có thể hoạt động mà không cần công nhân.</color>"

