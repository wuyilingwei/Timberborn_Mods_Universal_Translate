["Lapantouflemagic.SmallBadwaterPump.Description"]
raw = "A small, manually-operated bad water pumping station.\nPossibly designed by a deranged beaver.\nThe propeller needs to be submerged.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A small, manually-operated bad water pumping station. Possibly designed by a deranged beaver. The propeller needs to be submerged. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一个小型手动坏水泵站。\n可能是由一只发狂的海狸设计的。\n螺旋桨需要浸没在水中。\n<color=#00FFFF>作为堤坝使用</color>"
zhTW = "一個小型手動污水抽水站。  \n可能是由一隻瘋狂的海狸設計的。  \n螺旋槳需要浸入水中。  \n<color=#00FFFF>作為堤防使用</color>"
ruRU = "Небольшая, работающая вручную станция для откачки грязной воды. Возможно, разработана безумным бобром. Пропеллер должен быть погружен. <color=#00FFFF>Работает как насыпь</color>"
jaJP = "「小型の手動式悪水ポンプ場。\n狂ったビーバーによって設計された可能性があります。\nプロペラは水中に沈める必要があります。\n<color=#00FFFF>堤防として機能します</color>」"
frFR = "Une petite station de pompage d'eau mauvaise, actionnée manuellement.\nPossiblement conçue par un castor dérangé.\nL'hélice doit être submergée.\n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Eine kleine, manuell betriebene Pumpe für schmutziges Wasser. Möglicherweise entworfen von einem verrückten Biber. Der Propeller muss unter Wasser sein. <color=#00FFFF>Funktioniert wie ein Deich</color>"
plPL = "Mała, ręcznie obsługiwana stacja do pompowania złej wody. \nMożliwe, że zaprojektowana przez szalonego bobra. \nŚmigło musi być zanurzone. \n<color=#00FFFF>Działa jak wał</color>"
ptBR = "Uma pequena estação de bomba de água ruim, operada manualmente. Possivelmente projetada por um castor enlouquecido. A hélice precisa estar submersa. <color=#00FFFF>Funciona como um Dique</color>"
koKR = "작고 수동으로 운영되는 불량 수 양수 장치입니다.\n미친 비버가 설계했을 가능성이 있습니다.\n프로펠러는 물속에 잠겨야 합니다.\n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Malá ručně ovládaná čerpací stanice na špatnou vodu.\nMožná navržena šílenou bobrem.\nLopatka musí být ponořena.\n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một trạm bơm nước bẩn nhỏ, vận hành bằng tay.\nCó thể được thiết kế bởi một con rái cá điên cuồng.\nQuạt cần phải được ngâm dưới nước.\n<color=#00FFFF>Hoạt động như một đê</color>"

["Lapantouflemagic.SmallBadwaterPump.FlavorDescription"]
raw = "\"Why would anyone design something like this? Younglings these days...\"\n -Toothless the Wise, elder beaver"
status = "normal"
enUS = "\"Why would anyone design something like this? Younglings these days...\"  \n-Toothless the Wise, elder beaver"
zhCN = "“为什么会有人设计这样的东西？如今的小家伙们……”  \n- 智慧无牙，老海狸"
zhTW = "「為什麼會有人設計這樣的東西？如今的幼崽們……」  \n- 無牙的智者，長老海狸"
ruRU = "\"Почему кто-то мог бы придумать что-то подобное? Молодёжь в наши дни...\" - Беззубик Мудрый, старый бобр"
jaJP = "「なぜ誰かがこんなものをデザインするのだろうか？最近の若者は…」  \n- 賢者トゥースレス、長老ビーバー"
frFR = "\"Pourquoi quelqu'un concevrait-il quelque chose comme ça ? Les jeunes d'aujourd'hui...\"  \n- Sans Dents le Sage, le castor ancien"
deDE = "„Warum würde jemand so etwas entwerfen? Die Jungen heutzutage...“  \n- Zahnlos der Weise, älterer Biber"
plPL = "\"Dlaczego ktokolwiek miałby zaprojektować coś takiego? Młodzież w dzisiejszych czasach...\"\n - Bezzębny Mądry, starszy bóbr"
ptBR = "\"Por que alguém desenharia algo assim? Os jovens de hoje...\"  \n- Dente de Leite, o castor sábio"
koKR = "\"이런 걸 왜 누가 디자인했을까? 요즘 어린 녀석들...\"  \n- 지혜로운 무치, 노인 비버"
csCZ = "\"Proč by někdo navrhl něco takového? Mladíci v dnešní době...\"  \n-Bezzubý Moudrý, starší bobr"
viVN = "“Có lý do gì mà ai đó lại thiết kế một thứ như thế này? Những đứa trẻ ngày nay…”  \n- Răng không có răng, con castor già"

["Need.Trebuchetdeath.DeathMessage"]
raw = "<color=green>thought it would be hilarious to hide in the trebuchet basket. To be fair it was.</color>"
status = "normal"
enUS = "<color=green>thought it would be hilarious to hide in the trebuchet basket. To be fair, it was.</color>"
zhCN = "<color=green>以为躲在投石机的篮子里会很搞笑，公平地说，确实是这样。</color>"
zhTW = "<color=green>我以為躲在投石機的籃子裡會很搞笑，說實話，確實是。</color>"
ruRU = "<color=green>думал, что будет весело спрятаться в корзине катапульты. Если честно, это было так.</color>"
jaJP = "<color=green>トレビュシェのバスケットに隠れるのが面白いと思った。確かにそうだった。</color>"
frFR = "<color=green>pensait que ce serait hilarant de se cacher dans le panier de la trébuchet. Pour être juste, c'était le cas.</color>"
deDE = "<color=green>fand es urkomisch, mich im Trebuchet-Korb zu verstecken. Um gerecht zu sein, das war es wirklich.</color>"
plPL = "<color=green>myślał, że będzie zabawnie schować się w koszu katapulty. Szczerze mówiąc, było.</color>"
ptBR = "<color=green>achei que seria hilário me esconder na cesta da trebuchet. Para ser justo, foi.</color>"
koKR = "<color=green>투석기 바구니에 숨어 있는 것이 재미있을 것이라고 생각했다. 공정하게 말하면, 정말로 재미있었다.</color>"
csCZ = "<color=green>myslel jsem, že bude legrační schovat se v koši na trebuchetu. Abych byl spravedlivý, bylo to.</color>"
viVN = "<color=green>nghĩ rằng sẽ thật buồn cười khi ẩn nấp trong giỏ của cái đu đưa. Thực ra thì đúng là có.</color>"

