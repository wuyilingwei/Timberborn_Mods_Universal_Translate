ptBR = "Uma cerca feita de ouro sólido para pessoas que têm uma quantidade exagerada disso nas patas, de alguma forma."
koKR = "어떻게든 손에 금이 너무 많아진 사람들을 위한 견고한 금으로 만들어진 울타리."
csCZ = "Plot z pevných zlatých tyčí pro lidi, kteří mají nějakým způsobem až příliš mnoho zlata na svých tlapkách."
viVN = "Một hàng rào được làm từ vàng ròng cho những người có quá nhiều vàng trên bàn tay của họ, bằng cách nào đó."

