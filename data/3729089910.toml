["Building.RangedCrossing.Whitepaws.FlavorDescription"]
raw = "\"Suspiciously fast you say ? That's because we're in a game I tell you! None of you damn kits listen to me, looking at me like I'm crazy! This is all fake!\"\n- Mathilda the insane cook."
status = "normal"
enUS = "\"Suspiciously fast you say? That's because we're in a game, I tell you! None of you damn kits listen to me, looking at me like I'm crazy! This is all fake!\"  \n- Mathilda the insane cook."
zhCN = "“你说得太快了？那是因为我们在玩游戏，告诉你！你们这些该死的小家伙一点都不听我说，看我就像疯子一样！这一切都是假的！”  \n- 疯狂的厨师玛蒂尔达。"
zhTW = "你說得對，懷疑這速度的話？那是因為我們在一個遊戲裡，我告訴你！你們這些小鬼根本不聽我的話，一副看我像瘋子的樣子！這一切都是假的！\"  \n- 瘋狂的廚師馬蒂爾達。"
ruRU = "\"Подозрительно быстро, ты говоришь? Это потому, что мы в игре, я тебе говорю! Никто из вас, чертовы котята, не слушает меня, смотря на меня так, будто я сумасшедшая! Это все подделка!\"  \n- Матильда, безумная повариха."
jaJP = "「怪しいほど速いと言うのか？それは、ゲームの中にいるからさ！お前たちの愚か者は誰も俺の話を聞いていない、まるで俺が狂っているかのように見てきやがる！これ全部が偽物なんだ！」  \n- 狂気の料理人、マチルダ。"
frFR = "\"Ce que tu trouves suspectement rapide ? C'est parce que nous sommes dans un jeu, je te le dis ! Aucun d'entre vous, maudits petits, ne m'écoute, me regardant comme si j'étais folle ! Tout ça c'est faux !\" \n- Mathilda la cuisinière folle."
deDE = "\"Verdächtig schnell, sagst du? Das liegt daran, dass wir in einem Spiel sind, sag ich dir! Keiner von euch verdammten Kleinen hört mir zu, schaut mich an, als wäre ich verrückt! Das ist alles fake!\"\n- Mathilda, die verrückte Köchin."
plPL = "\"Podejrzanie szybko mówisz? To dlatego, że gramy w grę, mówię ci! Żadne z was, przeklęte kociaki, mnie nie słucha, patrzycie na mnie, jakbym był szalony! To wszystko jest fałszywe!\" - Mathilda, szalona kucharka."
ptBR = "\"Suspeitosamente rápido, você diz? Isso porque estamos em um jogo, eu te digo! Nenhum de vocês, malditos filhotes, me escuta, me olhando como se eu estivesse maluca! Tudo isso é falso!\"  \n- Mathilda, a cozinheira insana."
koKR = "너무 의심스러울 만큼 빨리 움직인다고? 그건 우리가 게임 안에 있기 때문이지! 너희 꼬마들 누구 하나 내 말을 듣지 않아, 마치 내가 미친 사람처럼 쳐다보잖아! 이 모든 건 가짜야!\"\n- 미친 요리사 마틸다."
csCZ = "\"Podezřele rychlé, říkáte? To proto, že jsme ve hře, říkám vám! Nikdo z vás, prokletých koťátek, mi neposlouchá, koukáte na mě, jako bych byl blázen! To všechno je falešné!\" \n- Mathilda, šílená kuchařka."
viVN = "\"Bạn nói nhanh một cách đáng ngờ à? Đó là bởi vì chúng ta đang ở trong một trò chơi, tôi nói cho bạn biết! Không một chú mèo con nào nghe tôi cả, nhìn tôi như tôi điên vậy! Tất cả đều là giả thôi!\"  \n- Mathilda, đầu bếp điên cuồng."

["Lapantouflemagic.Woodupgrade_Builders.Description"]
raw = "An upgrade module to be placed on top of an upgradable <color=#FFA500>Small Tower</color> (left) adjacent to a <color=#FF6EC7>triangle roof</color> building (right)\nEmploys <color=green>8 Builders</color>.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "An upgrade module to be placed on top of an upgradable <color=#FFA500>Small Tower</color> (left) adjacent to a <color=#FF6EC7>triangle roof</color> building (right). Employs <color=green>8 Builders</color>. <color=#00FFFF>Works as a Levee</color>"
zhCN = "“一个可以放置在可升级的<color=#FFA500>小塔</color>（左侧）上，靠近<color=#FF6EC7>三角屋顶</color>建筑（右侧）的升级模块\n使用<color=green>8位建造者</color>。\n<color=#00FFFF>作为堤坝工作</color>”"
zhTW = "一個升級模組，可以放置在可升級的<color=#FFA500>小塔</color>（左側）上，並鄰近<color=#FF6EC7>三角屋頂</color>建築（右側）  \n雇用<color=green>8名建築工</color>。  \n<color=#00FFFF>作為堤防使用</color>"
ruRU = "Модуль улучшения, который устанавливается сверху на модернизируемую <color=#FFA500>Малую Башню</color> (слева), соседствующую со зданием с <color=#FF6EC7>треугольной крышей</color> (справа).  \nИспользует <color=green>8 Строителей</color>.  \n<color=#00FFFF>Работает как Набережная</color>"
jaJP = "「アップグレード可能な<color=#FFA500>小塔</color>（左）の上に配置するためのアップグレードモジュールで、<color=#FF6EC7>三角屋根</color>の建物（右）に隣接しています。\n<color=green>8人のビルダー</color>を使用します。\n<color=#00FFFF>堤防として機能します</color>。」"
frFR = "Un module d'amélioration à placer au-dessus d'une <color=#FFA500>Petite Tour</color> (à gauche) adjacente à un bâtiment avec un <color=#FF6EC7>toit triangulaire</color> (à droite)  \nEmploie <color=green>8 Constructeurs</color>.  \n<color=#00FFFF>Fonctionne comme un Levée</color>"
deDE = "Ein Upgrade-Modul, das auf einem aufrüstbaren <color=#FFA500>kleinen Turm</color> (links) platziert werden kann, der an einem Gebäude mit <color=#FF6EC7>Dach in Dreiecksform</color> (rechts) angrenzt.  \nSetzt <color=green>8 Baumeister</color> ein.  \n<color=#00FFFF>Funktioniert wie ein Deich</color>"
plPL = "Moduł ulepszenia, który należy umieścić na szczycie ulepszanej <color=#FFA500>Małej Wieży</color> (po lewej) przylegającej do budynku z <color=#FF6EC7>trójkątnym dachem</color> (po prawej)  \nZatrudnia <color=green>8 Budowniczych</color>.  \n<color=#00FFFF>Działa jak Tamę</color>"
ptBR = "Um módulo de atualização a ser colocado em cima de uma <color=#FFA500>Pequena Torre</color> (esquerda) adjacente a um edifício com <color=#FF6EC7>telhado triangular</color> (direita)  \nEmprega <color=green>8 Construtores</color>.  \n<color=#00FFFF>Funciona como um Dique</color>"
koKR = "업그레이드 가능한 <color=#FFA500>작은 탑</color>(왼쪽) 위에 설치할 수 있는 업그레이드 모듈로, <color=#FF6EC7>삼각형 지붕</color> 건물(오른쪽)과 인접해 있습니다.\n<color=green>8명의 건축가</color>를 사용합니다.\n<color=#00FFFF>제방 역할을 합니다</color>"
csCZ = "Modul pro vylepšení, který se umisťuje na vrchol vylepšitelné <color=#FFA500>Malé věže</color> (vlevo) vedle budovy s <color=#FF6EC7>trojúhlou střechou</color> (vpravo).\nZaměstnává <color=green>8 stavitelů</color>.\n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một mô-đun nâng cấp được đặt trên một <color=#FFA500>Tháp Nhỏ</color> (bên trái) có thể nâng cấp và liền kề với một tòa nhà có mái <color=#FF6EC7>tam giác</color> (bên phải)  \nSử dụng <color=green>8 Người Xây Dựng</color>.  \n<color=#00FFFF>Hoạt động như một Đê</color>"

