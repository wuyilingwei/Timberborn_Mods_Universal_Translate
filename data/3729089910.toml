["Lapantouflemagic.AbyssExcavator.Description"]
raw = "A miniaturized mechanical drill designed to dig out junk and collapsed tunnels from the depths of the abyss, and occasionnaly valuable ores. Requires prior work by explorers."
status = "normal"
enUS = "A miniaturized mechanical drill designed to excavate junk and collapsed tunnels from the depths of the abyss, and occasionally valuable ores. Requires previous work by explorers."
zhCN = "一种迷你化的机械钻头，旨在从深渊的深处挖掘废物和倒塌的隧道，偶尔还能挖掘到珍贵的矿石。需要探险者的先前工作。"
zhTW = "一種微型機械鑽頭，專為從深淵中挖掘垃圾和倒塌的隧道而設計，有時也能挖掘到有價值的礦石。需要探索者的先前工作。"
ruRU = "Миниатюрное механическое сверло, предназначенное для выемки мусора и обрушившихся туннелей из глубин бездны, а также иногда ценных руд. Требует предварительной работы со стороны исследователей."
jaJP = "「廃棄物や崩れたトンネルを深淵の奥から掘り出すために設計された小型の機械式ドリルで、時折貴重な鉱石を掘り出すこともあります。探検者による事前の作業が必要です。」"
frFR = "Un foret mécanique miniaturisé conçu pour déterrer des déchets et des tunnels effondrés des profondeurs de l'abîme, et occasionnellement des minerais précieux. Nécessite des travaux préalables de la part des explorateurs."
deDE = "Eine miniaturisierte mechanische Bohrmaschine, die entwickelt wurde, um Müll und eingestürzte Tunnel aus den Tiefen des Abgrunds auszugraben und gelegentlich wertvolle Erze. Erfordert vorherige Arbeiten von Erkundern."
plPL = "Miniaturowa wiertarka mechaniczna zaprojektowana do wydobywania śmieci i zawalonych tuneli z głębi otchłani, a czasami również cennych rud. Wymaga wcześniejszej pracy wykonanej przez odkrywców."
ptBR = "Uma broca mecânica miniaturizada projetada para escavar entulhos e túneis colapsados das profundezas do abismo, e ocasionalmente minérios valiosos. Requer trabalho prévio de exploradores."
koKR = "심해의 깊이에서 쓰레기와 붕괴된 터널을 파내기 위해 설계된 소형 기계 드릴로, 가끔 귀중한 광석도 포함되어 있습니다. 탐험가들의 사전 작업이 필요합니다."
csCZ = "Miniaturní mechanické vrtání určené k vyhlubování odpadu a zkolabovaných tunelů z hlubin propasti a občas cenných rud. Vyžaduje předchozí práci odzkoušečů."
viVN = "Một máy khoan cơ khí thu nhỏ được thiết kế để đào thải rác và các đường hầm bị sập từ độ sâu của vực thẳm, và thỉnh thoảng là các khoáng sản quý giá. Cần có công việc trước đó của các nhà thám hiểm."

["Lapantouflemagic.AbyssExcavator.FlavorDescription"]
raw = "\"Brothers of the mine rejoice!\nSwing, swing, swing with me\nRaise your pick and raise your voice\nSing, sing, sing with me...\""
status = "normal"
enUS = "\"Brothers of the mine rejoice!  \nSwing, swing, swing with me  \nRaise your pick and raise your voice  \nSing, sing, sing with me...\""
zhCN = "“矿山的兄弟们欢喜吧！\n跟我一起挥舞、挥舞、挥舞\n举起你的镐，举起你的声音\n跟我一起唱、唱、唱…”"
zhTW = "\"礦工兄弟們快樂吧！\n跟我一起揮舞，揮舞，揮舞\n舉起你的鐵鎬，並高聲歌唱\n和我一起唱，唱，唱...\""
ruRU = "\"Братья шахты, радуйтесь!  \nМечите, мечите, мечите со мной  \nПоднимайте свою кирку и поднимайте голос  \nПойте, пойте, пойте со мной...\""
jaJP = "「鉱山の兄弟たちよ、喜びいよう！  \n私と一緒に振り回そう、振り回そう、振り回そう  \nつるはしを上げ、声を上げよう  \n私と一緒に歌おう、歌おう、歌おう…」"
frFR = "\"Frères de la mine, réjouissez-vous !\nBalancez, balancez, balancez avec moi\nLevez votre pioche et élevez votre voix\nChantez, chantez, chantez avec moi...\""
deDE = "Brüder der Mine, freut euch!\nSchwingt, schwingt, schwingt mit mir\nHebe eure Pickel und erhebt eure Stimmen\nSingt, singt, singt mit mir..."
plPL = "„Bracia z kopalni radujcie się!  \nMachaj, machaj, machaj ze mną  \nPodnieś swój kilof i podnieś swój głos  \nŚpiewaj, śpiewaj, śpiewaj ze mną...”"
ptBR = "Irmãos da mina, alegrem-se! \nBalançam, balançam, balançam comigo \nLevantem suas picaretas e elevem suas vozes \nCantem, cantem, cantem comigo..."
koKR = "\"광산의 형제들이여, 기쁜 마음을 가져라!\n나와 함께 흔들고, 흔들고, 흔들어라\n곡괭이를 들고 목소리를 높여라\n나와 함께 노래하고, 노래하고, 노래하자...\""
csCZ = "\"Bratři dolu, radujte se!  \nMálej, málej, málej se mnou  \nZvedněte svůj kladivo a zvedněte svůj hlas  \nZpívejte, zpívejte, zpívejte se mnou...\""
viVN = "Các anh em của mỏ hãy vui mừng!  \nLo swing, swing, swing cùng tôi  \nGiơ búa lên và nâng cao tiếng nói  \nHát, hát, hát cùng tôi..."

