["Lapantouflemagic.Foundry.FlavorDescription"]
raw = "\"Anything can be flammable waste, if you try hard enough.\"\n -The foundry overseer"
status = "normal"
enUS = "\"Anything can be flammable waste, if you try hard enough.\"  \n-The foundry overseer"
zhCN = "“只要你努力，一切都可能是可燃废物。”  \n-冶炼厂监督员"
zhTW = "\"只要你努力，任何東西都可以變成易燃廢料。\"\n - 鑄造廠監督"
ruRU = "\"Все может стать горючими отходами, если постараться достаточно сильно.\"  \n-Руководитель кузницы"
jaJP = "「どんなものも、頑張れば可燃ゴミになり得る。」  \n- 鋳造所の監督"
frFR = "\"Tout peut devenir des déchets inflammables, si vous essayez assez fort.\"  \n- L'intendant de la fonderie"
deDE = "\"Alles kann brennbarer Abfall sein, wenn man sich genug anstrengt.\" -Der Aufseher der Gießerei"
plPL = "\"Każda rzecz może być łatwopalnym odpadem, jeśli tylko wystarczająco się postarasz.\"  \n- Nadzorca huty"
ptBR = "\"Qualquer coisa pode ser um desperdício inflamável, se você tentar o suficiente.\"  \n- O supervisor da fundição"
koKR = "\"어떤 것이든 열심히 하면 불에 탈 수 있는 쓰레기가 될 수 있습니다.\"  \n- 주조소 감독"
csCZ = "\"Všechno může být hořlavý odpad, pokud se dostatečně snažíte.\" - Správce slévárny"
viVN = "\"Không gì là không thể trở thành chất thải dễ cháy, nếu bạn cố gắng đủ.\"  \n -Trưởng xưởng đúc"

