["Lapantouflemagic.Maimed.CriticalDescription"]
raw = "This poor beaver lost a limb working a dangerous job! It will need a prosthetic so it can again live a normal life."
status = "normal"
enUS = "This poor beaver lost a limb while working a dangerous job! It will need a prosthetic so it can live a normal life again."
zhCN = "这只可怜的海狸在危险的工作中失去了一个肢体！它需要一个假肢，才能再次过上正常的生活。"
zhTW = "這隻可憐的海狸在危險的工作中失去了一條肢體！它需要假肢，才能重新過上正常的生活。"
ruRU = "Этот бедный бобер потерял конечность, работая на опасной работе! Ему понадобится протез, чтобы он снова мог жить нормальной жизнью."
jaJP = "このかわいそうなビーバーは、危険な仕事をしている間に四肢を失いました！ 普通の生活を送るためには、義肢が必要です。"
frFR = "Ce pauvre castor a perdu un membre en exerçant un travail dangereux ! Il aura besoin d'une prothèse pour pouvoir à nouveau mener une vie normale."
deDE = "Dieser arme Biber hat bei einer gefährlichen Arbeit ein Gliedmaß verloren! Er wird eine Prothese benötigen, um wieder ein normales Leben führen zu können."
plPL = "Ten biedny bóbr stracił kończynę pracując w niebezpiecznej robocie! Będzie potrzebował protezy, aby znów mógł prowadzić normalne życie."
ptBR = "Este pobre castor perdeu um membro trabalhando em um emprego perigoso! Ele precisará de uma prótese para poder viver novamente uma vida normal."
koKR = "이 불쌍한 비버는 위험한 일을 하다가 팔다리를 잃었습니다! 다시 정상적인 삶을 살기 위해서는 보조기가 필요할 것입니다."
csCZ = "Tento chudák bobr ztratil končetinu při práci v nebezpečné pozici! Bude potřebovat protézu, aby mohl znovu žít běžný život."
viVN = "Con castor tội nghiệp này đã mất một chi khi làm một công việc nguy hiểm! Nó sẽ cần một cái chân giả để có thể sống một cuộc sống bình thường trở lại."

