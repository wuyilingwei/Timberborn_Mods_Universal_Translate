frFR = "Un abri de base qui sépare techniquement ses occupants des éléments.\nDoit être construit contre une falaise.\nLes entrées peuvent être enchaînées."
deDE = "Ein einfacher Unterschlupf, der technisch seine Bewohner von den Elementen trennt. Muss an eine Klippe gebaut werden. Eingänge können verbunden werden."
plPL = "Podstawowe schronienie, które technicznie oddziela swoich mieszkańców od żywiołów.  \nMusi być wzniesione przy klifie.  \nWejścia mogą być połączone."
ptBR = "Um abrigo básico que, tecnicamente, separa seus ocupantes dos elementos.  \nDeve ser construído contra uma colina.  \nAs entradas podem ser conectadas."
koKR = "기본적인 대피소로, 기술적으로 거주자를 요소로부터 분리합니다. \n절벽에 세워야 합니다. \n입구를 연결할 수 있습니다."
csCZ = "Základní úkryt, který technicky odděluje jeho obyvatele od živlů.  \nMusí být postaven proti útesu.  \nVchody mohou být propojeny."
viVN = "Một nơi trú ẩn cơ bản về mặt kỹ thuật tách rời cư dân của nó khỏi các yếu tố bên ngoài.  \nPhải được xây dựng dựa vào vách đá.  \nCác lối vào có thể được nối với nhau."

