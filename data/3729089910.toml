["Lapantouflemagic.HoomanUndergroundChemPlant.Description"]
raw = "Sends down the abyss a team of chemist beavers to study and reactivate an ancient hooman chemical plant.\n<color=#FF6EC7>Their processes were far more advanced than ours - we will surely learn so much! </color>"
status = "normal"
enUS = "Sends down a team of chemist beavers into the abyss to study and reactivate an ancient human chemical plant. <color=#FF6EC7>Their processes were far more advanced than ours - we will surely learn so much!</color>"
zhCN = "“派遣一队化学海狸进入深渊，研究并重新激活一个古老的人类化工厂。<color=#FF6EC7>他们的工艺远比我们先进——我们一定会学习到很多！</color>”"
zhTW = "將一隊化學海狸送入深淵，研究並重新啟用一座古老的人類化工廠。\n<color=#FF6EC7>他們的工藝遠比我們的更先進——我們肯定會學到很多！</color>"
ruRU = "Отправляет в бездну команду химиков-бобров для изучения и реактивации древнего химического завода людей.  \n<color=#FF6EC7>Их процессы были значительно более продвинутыми, чем наши — мы обязательно многому научимся!</color>"
jaJP = "深淵にチームの化学者ビーバーを送り、古代の人間の化学プラントを研究し再稼働させます。<color=#FF6EC7>彼らのプロセスは私たちのものよりもはるかに進んでいました - 私たちは間違いなく多くのことを学ぶでしょう！</color>"
frFR = "Envoie dans l'abîme une équipe de castors chimistes pour étudier et réactiver une ancienne usine chimique hooman.\n<color=#FF6EC7>Leurs processus étaient bien plus avancés que les nôtres - nous allons sûrement apprendre tant de choses !</color>"
deDE = "Sendet ein Team von Chemiker-Bibern in den Abgrund, um eine alte menschliche Chemiefabrik zu erforschen und wieder zu aktivieren. <color=#FF6EC7>Ihre Prozesse waren weit fortgeschrittener als unsere - wir werden mit Sicherheit so viel lernen!</color>"
plPL = "Wysyła w otchłań zespół bobrów chemików, aby zbadać i reaktywować starożytną ludzką fabrykę chemiczną. <color=#FF6EC7>Ich procesy były o wiele bardziej zaawansowane niż nasze - na pewno dowiemy się tak wiele!</color>"
ptBR = "Envia para o abismo uma equipe de castores químicos para estudar e reativar uma antiga planta química hooman.  \n<color=#FF6EC7>Seus processos eram muito mais avançados do que os nossos - com certeza aprenderemos muito!</color>"
koKR = "옛 고인간 화학 공장을 연구하고 재가동하기 위해 화학 비버 팀을 심연으로 보냅니다.  \n<color=#FF6EC7>그들의 과정은 우리의 것보다 훨씬 더 발전되었습니다 - 우리는 확실히 많은 것을 배울 것입니다!</color>"
csCZ = "Zasílá tým chemických bobrů do propasti, aby studovali a znovu aktivovali starodávnou chemickou továrnu hoomanů.  \n<color=#FF6EC7>Jejich procesy byly mnohem pokročilejší než naše - určitě se toho tolik naučíme! </color>"
viVN = "Gửi một đội những con castor hóa học xuống vực thẳm để nghiên cứu và tái kích hoạt một nhà máy hóa học cổ xưa của con người.  \n<color=#FF6EC7>Các quy trình của họ tiên tiến hơn nhiều so với của chúng ta - chúng ta chắc chắn sẽ học được rất nhiều điều!</color>"

["Lapantouflemagic.HoomanUndergroundChemPlant.FlavorDescription"]
raw = "\"Manufacturing resin entirely from base elements? This is amazing!\""
status = "normal"
enUS = "\"Manufacturing resin entirely from base elements? This is amazing!\""
zhCN = "“完全由基本元素制造树脂？太惊人了！”"
zhTW = "\"完全由基本元素製造樹脂？這太棒了！\""
ruRU = "\"Производство смолы исключительно из основных компонентов? Это просто удивительно!\""
jaJP = "「基本元素から完全に樹脂を製造する？これは素晴らしい！」"
frFR = "Fabriquer de la résine uniquement à partir d'éléments de base ? C'est incroyable !"
deDE = "\"Harz vollständig aus Grundelementen herstellen? Das ist erstaunlich!\""
plPL = "Wytwarzanie żywicy całkowicie z podstawowych składników? To niesamowite!"
ptBR = "\"Produzir resina inteiramente a partir de elementos básicos? Isso é incrível!\""
koKR = "기본 요소만으로 수지를 완전히 제조하는 건가요? 대단하군요!"
csCZ = "\"Vyrábět pryskyřici úplně z základních prvků? To je úžasné!\""
viVN = "Sản xuất nhựa hoàn toàn từ các yếu tố cơ bản? Điều này thật tuyệt vời!"

