status = "normal"

["Lapantouflemagic.FarmLumberjackUpgrade.Description"]
new = "An upgrade module to be placed on top of two adjacent <color=#FF6EC7>triangle roof</color> buildings.\nEven more logging! Death to the treesxa0!\nHas a lot of storage space.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"

["Lapantouflemagic.FarmLumberjackUpgrade.FlavorDescription"]
new = "\"Can you imagine the pain if we didn’t insist to have a crane?\""
status = "normal"

