jaJP = "子猫に対する一般的な罰は、数時間ぶら下がったままにされることです。"
frFR = "Une punition courante pour les petits est d'être laissés suspendus là pendant quelques heures."
deDE = "Eine gängige Bestrafung für Kätzchen ist es, dort für ein paar Stunden hängen gelassen zu werden."
plPL = "Częstą karą dla kociaków jest pozostawienie ich zwisających tam przez kilka godzin."
ptBR = "Uma punição comum para os filhotes é ficar pendurado ali por algumas horas."
koKR = "키트에게 흔히 부과되는 처벌은 몇 시간 동안 그곳에 매달려 있는 것입니다."
csCZ = "Běžným trestem pro koťata je nechat je viset tam několik hodin."
viVN = "Một hình phạt phổ biến cho những chú mèo con là bị treo lơ lửng ở đó trong vài giờ."

