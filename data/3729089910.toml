["Lapantouflemagic.WoodFenceGate.FlavorDescription"]
raw = "\"I...guess it looks nicer to put fences between different crops\""
status = "normal"
enUS = "\"I...guess it looks nicer to put fences between different crops.\""
zhCN = "“我……想我想这样在不同的作物之间放置篱笆看起来更好看。”"
zhTW = "「我…想它在不同作物之間放置圍欄看起來更好。」"
ruRU = "«Я... полагаю, будет лучше, если ставить заборы между разными посевами»"
jaJP = "「うーん…異なる作物の間にフェンスを置くと、見た目が良くなる気がする」"
frFR = "« Je... suppose que ça a l'air mieux de mettre des clôtures entre les différentes cultures. »"
deDE = "„Ich...vermute, es sieht schöner aus, Zäune zwischen verschiedenen Pflanzen zu setzen.“"
plPL = "„Chyba to wyglądają ładniej, jeśli postawi się płoty między różnymi uprawami.”"
ptBR = "\"Eu...acho que fica mais bonito colocar cercas entre as diferentes plantações.\""
koKR = "\"나는...다른 작물 사이에 울타리를 두는 것이 더 낫다고 생각해.\""
csCZ = "Myslím...že vypadá lépe, když jsou mezi různými plodinami ploty"
viVN = "\"Tôi... đoán là đặt hàng rào giữa các loại cây trồng trông sẽ đẹp hơn.\""

