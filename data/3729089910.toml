["Lapantouflemagic.ZiplineBalloon.FlavorDescription"]
new = "\"Don't stay under it on windy days.\nWhat? No! It's not gonna fall, you just don't want to get showered with barf.\""
status = "normal"

["Lapantouflemagic.ZiplineUpgradePylon.DisplayName"]
new = "Zipline Add-on Pylon (Large Farmhouse)"
status = "normal"

["Lapantouflemagic.ZiplineUpgradePylon.Description"]
new = "A pylon providing access to the zipline network to <color=green>Large Farmhouses</color>.\n<color=green>Connections: 1</color>\n<color=#FF6EC7>To be placed on top of the farm body.</color>"
status = "normal"

["Lapantouflemagic.ZiplineUpgradePylon.FlavorDescription"]
new = "\"If you could have near-instant access to the city center, who wouldn't want to live in the middle of the countryside?\"\n-Mommy beaver"
status = "normal"

