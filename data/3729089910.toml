["Lapantouflemagic.FarmUpgradeD.FlavorDescription"]
raw = "\"We should think about using more machines for all this. Menial work will only get us so far.\"\n -An Engineer beaver"
status = "normal"
enUS = "\"We should consider using more machines for all this. Menial work will only get us so far.\"\n -An Engineer beaver"
zhCN = "“我们应该考虑使用更多机器来处理这些。基础工作只能带我们走这么远。”  \n——一只工程师海狸"
zhTW = "“我們應該考慮使用更多的機器來處理這一切。繁瑣的工作只能讓我們走得有限。”  \n- 一位工程師海狸"
ruRU = "\"Нам стоит подумать об использовании большего количества машин для всего этого. Ручная работа приведет нас только до определённой цели.\"  \n- Инженер-бобёр"
jaJP = "「このためにもっと機械を使うことを考えるべきです。単純作業では限界があります。」  \n-エンジニアビーバー"
frFR = "\"Nous devrions penser à utiliser plus de machines pour tout cela. Le travail manuel ne nous mènera que jusqu'à un certain point.\"  \n-Un castor ingénieur"
deDE = "„Wir sollten darüber nachdenken, mehr Maschinen für all das zu verwenden. Manuelle Arbeit bringt uns nur bis zu einem bestimmten Punkt.“  \n- Ein Ingenieur-Biber"
plPL = "\"Powinniśmy pomyśleć o wykorzystaniu większej liczby maszyn do tego wszystkiego. Praca ręczna da nam tylko tyle.\"  \n- Bobr inżynier"
ptBR = "\"Devemos pensar em usar mais máquinas para tudo isso. O trabalho braçal só nos levará até certo ponto.\"  \n-Um castor engenheiro"
koKR = "\"이 모든 것을 위해 더 많은 기계를 사용하는 것에 대해 생각해야 합니다. 단순한 작업은 우리를 그만큼밖에 이끌지 못할 것입니다.\"  \n- 한 엔지니어 비버"
csCZ = "\"Máme přemýšlet o využití více strojů pro to všechno. Rutinní práce nás dostane jen tak daleko.\"  \n -Inženýrský bobr"
viVN = "\"Chúng ta nên nghĩ đến việc sử dụng nhiều máy móc hơn cho tất cả những việc này. Công việc tay chân chỉ giúp chúng ta đến một mức độ nhất định.\"\n - Một con gà nhồi"

