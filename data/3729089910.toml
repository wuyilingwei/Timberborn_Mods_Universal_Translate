status = "normal"

["Lapantouflemagic.Seamstress.Description"]
new = "Manufactures various items that makes a beaver's life better.\n<color=#FFA500>Small Tower</color>, <color=#FF6EC7>Can support upgrades</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"

["Lapantouflemagic.Seamstress.FlavorDescription"]
new = "\"They said it needs to be that tall to 'test the pillows', whatever that means.\"\n-A confused builder beaver"
status = "normal"

["Lapantouflemagic.DoubleRopestairs.DisplayName"]
new = "Double Rope Stairs"
status = "normal"

["Lapantouflemagic.DoubleRopestairs.Description"]
new = "Allows to access elevated spaces without requiring support directly under it.\nThe support voxels at either ends won’t be able to accept side platform, or another rope stairs."
status = "normal"

["Lapantouflemagic.DoubleRopestairs.FlavorDescription"]
new = "\"Keep your paws on the guide rope, and your eyes upxa0!\""
status = "normal"

["Lapantouflemagic.GiantPillar.DisplayName"]
new = "Giant Pillar"
status = "normal"

["Lapantouflemagic.GiantPillarbase.Description"]
new = "Half a sequoia stuck back in the ground to act as a support for other things. \nSide platforms can be attached to it."
status = "normal"

["Lapantouflemagic.GiantPillar.FlavorDescription"]
new = "That's one big log!"
status = "normal"

["Lapantouflemagic.GiantPillarbase.DisplayName"]
new = "Giant Pillar (Base)"
status = "normal"

["Lapantouflemagic.GiantPillar.Description"]
new = "Half a sequoia artistically hafted in an other one to extend it. \nSide platforms can be attached to it."
status = "normal"

["Lapantouflemagic.GrandDam.DisplayName"]
new = "Grand Dam"
status = "normal"

["Lapantouflemagic.GrandDam.Description"]
new = "An audacious dam design, loosely based on traditional housing.\nPumps autonomously.\nConsumes planks for maintenance.\n<color=#00FFFF>Works as a Levee</color>\n<color=red>Power must be provided from the sides of the small construction site flag</color>"
status = "normal"

["Lapantouflemagic.GrandDam.FlavorDescription"]
new = "\"Soo... strictly speaking, the dam part is... not the housexa0? I don’t know if that is a brilliant idea, or if i should call the gesta-paw…\"\n-The Expedition Leader"
status = "normal"

["Lapantouflemagic.8WayCorneroverhang.DisplayName"]
new = "Giant Pillar Ring Platform"
status = "normal"

["Lapantouflemagic.8WayCorneroverhang.Description"]
new = "A walkway to be installed around a giant pillar, allowing to navigate around aqueduct corners."
status = "normal"

["Lapantouflemagic.8WayCorneroverhang.FlavorDescription"]
new = "\"Thanks, I hate it.\"\n-a beaver suffering from the fear of heights"
status = "normal"

["Lapantouflemagic.ClockWorkKitchen.DisplayName"]
new = "Clockwork Kitchen"
status = "normal"

["Lapantouflemagic.ClockWorkKitchen.Description"]
new = "A complex device that masterfully transforms mechanical power and raw food into tasty stuff. \nOccasionally breaks a gear.\nOccasionally cooks a beaver.\n<color=red>Power must be provided from underneath the small construction site flag</color>"
status = "normal"

["Lapantouflemagic.ClockWorkKitchen.FlavorDescription"]
new = "\"Still safer than Mathilda.\"\n -Toothless the Wise, elder beaver"
status = "normal"

["Need.CWKitchDeath.DisplayName"]
new = "Cooked Alivexa0!"
status = "normal"

["Need.CWKitchDeath.DeathMessage"]
new = "<color=green>was accidentally grabbed by the robot’s pincers and deliciously cooked to death. The stew was particularily tasty tonight.</color>"
status = "normal"

