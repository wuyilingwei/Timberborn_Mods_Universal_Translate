["Lapantouflemagic.Woodupgrade_Zipline.Description"]
raw = "An upgrade module to be placed on top of an upgradable <color=#FFA500>Small Tower</color> (left) adjacent to a <color=#FF6EC7>triangle roof</color> building (right)\nA quick transportation system that no sane beaver should accept to ride on.\nEmploys<color=green> 2 haulers</color>\n<color=green>Connections: 4</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "An upgrade module to be placed on top of an upgradable <color=#FFA500>Small Tower</color> (left) adjacent to a <color=#FF6EC7>triangle roof</color> building (right). A quick transportation system that no sane beaver should accept to ride on. Employs <color=green>2 haulers</color>. <color=green>Connections: 4</color>. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一个升级模块，可放置在可升级的<color=#FFA500>小塔</color>（左侧）上，邻近一个<color=#FF6EC7>三角屋顶</color>建筑（右侧）\n一种没有任何明智海狸应该接受乘坐的快速运输系统。\n需要<color=green>2名搬运工</color>\n<color=green>连接数：4</color>\n<color=#00FFFF>作为堤坝工作</color>"
zhTW = "一個升級模組，可以放置在可升級的<color=#FFA500>小塔</color>（左側）上，並緊鄰一棟<color=#FF6EC7>三角屋頂</color>建築（右側）。  \n一個快速的運輸系統，沒有理智的海狸應該會同意乘坐。  \n需要<color=green> 2 名搬運工</color>  \n<color=green>連接：4</color>  \n<color=#00FFFF>作為堤防運作</color>"
ruRU = "Модуль улучшения, который устанавливается на верхней части улучшенной <color=#FFA500>Малой башни</color> (слева), смежной с зданием с <color=#FF6EC7>треугольной крышей</color> (справа). Быстрая транспортная система, на которой не должен согласиться ездить ни один нормальный бобер. Требует <color=green>2 грузчика</color> <color=green>Подключения: 4</color> <color=#00FFFF>Работает как плотина</color>"
jaJP = "アップグレード可能な<color=#FFA500>小さな塔</color>（左）の上に設置するアップグレードモジュールで、<color=#FF6EC7>三角屋根</color>の建物（右）に隣接しています。\n理性的なビーバーが乗るべきではない迅速な輸送システムです。\n<color=green>2人の運搬者</color>を必要とします。\n<color=green>接続数：4</color>\n<color=#00FFFF>堤防として機能します</color>"
frFR = "Un module d'upgrade à placer sur un <color=#FFA500>Petit Tower</color> (à gauche) adjacent à un bâtiment avec un toit en <color=#FF6EC7>triangle</color> (à droite)  \nUn système de transport rapide que aucun castor sensé ne devrait accepter d'utiliser.  \nEmploie<color=green> 2 transporteurs</color>  \n<color=green>Connexions : 4</color>  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Ein Upgrade-Modul, das auf einem aufrüstbaren <color=#FFA500>Kleinturm</color> (links) neben einem Gebäude mit <color=#FF6EC7>Dach in Dreiecksform</color> (rechts) platziert werden kann.  \nEin schnelles Transportsystem, auf dem kein vernünftiger Biber fahren sollte.  \nBenötigt <color=green>2 Transporter</color>  \n<color=green>Verbindungen: 4</color>  \n<color=#00FFFF>Funktioniert wie ein Deich</color>"
plPL = "Moduł ulepszenia, który należy umieścić na szczycie ulepszanej <color=#FFA500>Małej Wieży</color> (po lewej) przylegającej do budynku z <color=#FF6EC7>dachami w kształcie trójkąta</color> (po prawej)  \nSzybki system transportowy, na który żaden zdrowy rozsądek bobra nie powinien się zgodzić.  \nWymaga<color=green> 2 ładowaczy</color>  \n<color=green>Połączenia: 4</color>  \n<color=#00FFFF>Działa jak Wał</color>"
ptBR = "Um módulo de upgrade para ser colocado em cima de uma <color=#FFA500>Pequena Torre</color> (esquerda) adjacente a um edifício com <color=#FF6EC7>telhado triangular</color> (direita)\nUm sistema de transporte rápido que nenhum castor são deveria aceitar utilizar.\nEmprega <color=green>2 carregadores</color>\n<color=green>Conexões: 4</color>\n<color=#00FFFF>Funciona como um Dique</color>"
koKR = "업그레이드 가능한 <color=#FFA500>작은 타워</color> (왼쪽) 위에 설치하는 업그레이드 모듈으로, <color=#FF6EC7>삼각 지붕</color> 건물 (오른쪽)과 인접해 있습니다.\n정신이 온전한 비버가 탑승해서는 안 되는 빠른 교통 시스템입니다.\n<color=green>2명의 운반자</color>를 사용합니다.\n<color=green>연결: 4</color>\n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Modul vylepšení, který se umisťuje na vrchol vylepšitelné <color=#FFA500>Malé věže</color> (vlevo) sousedící s budovou s <color=#FF6EC7>trojúhelníkovou střechou</color> (vpravo)\nRychlý dopravní systém, na kterém by žádný rozumný bobr neměl souhlasit jezdit.\nVyužívá <color=green>2 nosiče</color>\n<color=green>Odkazy: 4</color>\n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một mô-đun nâng cấp được đặt trên một <color=#FFA500>Tháp Nhỏ</color> (trái) có thể nâng cấp, bên cạnh một tòa nhà có mái hình <color=#FF6EC7>tam giác</color> (phải).\nMột hệ thống vận chuyển nhanh mà không con beaver nào tỉnh táo lại nên chấp nhận để đi.\nCần<color=green> 2 người vận chuyển</color>\n<color=green>Kết nối: 4</color>\n<color=#00FFFF>Hoạt động như một Đê</color>"

["Lapantouflemagic.ZiplineStation.FlavorDescription"]
raw = "\"Eh, seems fun!\"\n-Grandpa beaver, last words"
status = "normal"
enUS = "\"Eh, seems fun!\"  \n-Grandpa beaver, last words"
zhCN = "“哦，听起来挺有趣的！”  \n- 老奶爸海狸，遗言"
zhTW = "「欸，看起來很有趣！」 - 老爺爺海狸，最後的話"
ruRU = "«Эх, кажется, весело!»  \n- Дедушка-бобер, последние слова"
jaJP = "「うん、楽しそうだ！」 - おじいちゃんビーバー、最後の言葉"
frFR = "\"Eh, ça a l'air amusant !\"  \n- Grand-père castor, dernières paroles"
deDE = "\"Eh, scheint lustig zu sein!\" - Opa Biber, letzte Worte"
plPL = "\"Eh, wydaje się zabawne!\" - Dziadek bóbr, ostatnie słowa"
ptBR = "\"Eh, parece divertido!\"  \n-Vovô castor, últimas palavras"
koKR = "\"어, 재밌는 것 같아!\"  \n-할아버지 비버, 마지막 말"
csCZ = "\"Eh, zdá se, že to bude zábava!\"\n-Babička bobr, poslední slova"
viVN = "\"Ồ, có vẻ thú vị quá!\"  \n-Cụ nhím, lời cuối cùng"

