["Lapantouflemagic.Topentrancewatertightlodge_BoxStorage.Description"]
raw = "A medium-sized lodge for one hauler, built around a ladder.\nManages a box storage space.\nCan be stacked on itself, variants, and can carry select buildings.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A medium-sized lodge for one hauler, built around a ladder.  \nManages a box storage space.  \nCan be stacked on itself, variants, and can carry select buildings.  \n<color=#00FFFF>Works as a Levee</color>"
zhCN = "一个中等大小的住所，适合一个搬运工，围绕一个梯子建造。\n管理一个盒子储存空间。\n可以自我叠加、变体，并能携带特定建筑物。\n<color=#00FFFF>充当堤道</color>"
zhTW = "一個中等大小的倉庫，適合一名搬運工，圍繞著一個梯子建造。\n管理一個箱子儲存空間。\n可以堆疊在自己、變體上，並且可以攜帶特定建築。\n<color=#00FFFF>作為堤壩使用</color>"
ruRU = "Средний по размеру домик для одного борца с грузом, построенный вокруг лестницы.\nУправляет пространством для хранения ящиков.\nМожет накладываться на себя, имеет варианты и может переносить определенные здания.\n<color=#00FFFF>Работает как насыпь</color>"
jaJP = "「はしごを囲むように建てられた中型のロッジで、1人の運搬者用です。ボックス storageスペースを管理します。自分自身やバリエーションの上に積み重ねることができ、特定の建物を運ぶことができます。<color=#00FFFF>堤防として機能します</color>」"
frFR = "Un pavillon de taille moyenne pour un transporteur, construit autour d'une échelle. \nGère un espace de stockage en boîte. \nPeut être empilé sur lui-même, variantes, et peut transporter des bâtiments sélectionnés. \n<color=#00FFFF>Fonctionne comme un levee</color>"
deDE = "Eine mittelgroße Lodge für einen Transporteur, die um eine Leiter herum gebaut ist.\nVerwaltet einen Boxenlagerplatz.\nKann auf sich selbst, Varianten lagern und kann ausgewählte Gebäude tragen.\n<color=#00FFFF>Funktioniert als Sperre</color>"
plPL = "Średniej wielkości leżanka dla jednego woźnicy, zbudowana wokół drabiny.\nZarządza przestrzenią magazynową na skrzynki.\nMoże być układana na sobie, warianty, i może przenosić wybrane budynki.\n<color=#00FFFF>Działa jako wał</color>"
ptBR = "Uma cabine de tamanho médio para um transportador, construída em torno de uma escada.\nGerencia um espaço de armazenamento de caixas.\nPode ser empilhada sobre si mesma, variantes, e pode transportar edifícios selecionados.\n<color=#00FFFF>Funciona como um Dique</color>"
koKR = "하나의 운반자용으로 제작된 중간 크기의 수로로, 사다리를 중심으로 지어졌습니다.\n상자 보관 공간을 관리합니다.\n자기 자신 및 변형체에 쌓을 수 있으며, 선택된 건물도 운반할 수 있습니다.\n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Středně velká chata pro jednoho nosiče, postavená kolem žebříku. Spravuje prostor pro skladování boxů. Lze na sebe naskládat, varianty a může nést vybrané budovy. <color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một ngôi nhà trung bình dành cho một người vận chuyển, được xây dựng xung quanh một cầu thang.  \nQuản lý một không gian lưu trữ hộp.  \nCó thể xếp chồng lên nhau, các biến thể, và có thể mang theo các tòa nhà được chọn.  \n<color=#00FFFF>Hoạt động như một Đê</color>"

["Lapantouflemagic.Topentrancewatertightlodge_BoxStorage.FlavorDescription"]
raw = "\"If you paint the whole tower green and go down the ladder from the top, you will end up in a strange world filled with walking mushrooms and flying turtles!\"\n -Mathilda the insane cook"
status = "normal"
enUS = "\"If you paint the whole tower green and go down the ladder from the top, you will end up in a strange world filled with walking mushrooms and flying turtles!\" - Mathilda the insane cook"
zhCN = "\"如果你把整座塔画成绿色，然后从顶端下梯子，你将进入一个奇异的世界，那里满是行走的蘑菇和飞翔的乌龟！\"  \n- 疯狂的厨师马蒂尔达"
zhTW = "\"如果你把整座塔都漆成綠色，然後從塔頂下來，你將會來到一個奇異的世界，裡面充滿了會走的蘑菇和會飛的烏龜！\"  \n- 瘋狂的廚師馬提爾達"
ruRU = "\"Если вы покрасите всю башню в зеленый цвет и спуститесь по лестнице с вершины, вы окажетесь в странном мире, полном ходячих грибов и летающих черепах!\"  \n-Матильда, безумная повариха"
jaJP = "\"塔全体を緑に塗り、最上階から梯子を下りると、歩くキノコと飛ぶカメで満ちた奇妙な世界に辿り着きます！\"  \n- マチルダ、狂気の料理人"
frFR = "\"Si vous peignez toute la tour en vert et descendez l'échelle depuis le sommet, vous finirez dans un monde étrange rempli de champignons marchants et de tortues volantes !\"  \n-Mathilda la cuisinière folle"
deDE = "\"Wenn du den ganzen Turm grün anmalst und von oben die Leiter hinuntersteigst, wirst du in einer seltsamen Welt landen, die mit gehenden Pilzen und fliegenden Schildkröten gefüllt ist!\"  \n -Mathilda, die verrückte Köchin"
plPL = "\"Jeśli pomalujesz całą wieżę na zielono i zejdziesz po drabinie z góry, trafisz do dziwnego świata wypełnionego chodzącymi grzybami i latającymi żółwiami!\"  \n-Mathilda, szalona kucharka"
ptBR = "\"Se você pintar toda a torre de verde e descer a escada do topo, você acabará em um mundo estranho cheio de cogumelos andando e tartarugas voadoras!\"  \n-Mathilda, a cozinheira insana"
koKR = "\"탑 전체를 초록색으로 칠하고 꼭대기에서 사다리를 내려가면 걷는 버섯과 나는 거북이로 가득 찬 이상한 세상에 도착할 거야!\"  \n- 미친 요리사 마틸다"
csCZ = "\"Pokud vymalujete celou věž na zeleno a slezete žebřík dolů, ocitnete se v podivném světě plném chodících hub a létajících želv!\"  \n-Mathilda, šílená kuchařka"
viVN = "Nếu bạn tô toàn bộ tháp màu xanh và đi xuống cái thang từ trên cao, bạn sẽ rơi vào một thế giới kỳ lạ đầy nấm biết đi và rùa bay!\" - Mathilda, đầu bếp điên cuồng"

