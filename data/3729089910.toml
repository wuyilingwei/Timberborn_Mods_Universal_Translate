["Lapantouflemagic.Winery.Description"]
raw = "A big house from which beavers specialized in all sorts of fermentation can process ingredients with unmatched speed and efficacy.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A big house from which beavers specialized in all sorts of fermentation can process ingredients with unmatched speed and efficacy. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一座大型建筑，浣熊专业从事各种发酵，能够以无与伦比的速度和效率处理原料。  \n<color=#00FFFF>作为堤坝运作</color>"
zhTW = "一棟大型房屋，棕櫚海狸專門從事各種發酵，可以以無與倫比的速度和效率處理原料。  \n<color=#00FFFF>作為堤壩運作</color>"
ruRU = "Большой дом, из которого бобры, специализирующиеся на различных видах ферментации, могут обрабатывать ингредиенты с Непревзойденной скоростью и эффективностью. <color=#00FFFF>Работает как плотина</color>"
jaJP = "「様々な発酵に特化したビーバーたちが原料を比類のない速さと効率で処理できる大きな家。\n<color=#00FFFF>堤防として機能します</color>」"
frFR = "Une grande maison d'où les castors spécialisés dans toutes sortes de fermentation peuvent traiter des ingrédients avec une rapidité et une efficacité inégalées.  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Ein großes Haus, aus dem Biber, die auf alle Arten von Fermentation spezialisiert sind, Zutaten mit unübertroffener Geschwindigkeit und Effizienz verarbeiten können.  \n<color=#00FFFF>Funktioniert als Damm</color>"
plPL = "Duży dom, z którego bobry specjalizujące się w różnych rodzajach fermentacji mogą przetwarzać składniki z niezrównaną prędkością i efektywnością.  \n<color=#00FFFF>Funkcjonuje jako Tama</color>"
ptBR = "Uma grande casa de onde castores especializados em todos os tipos de fermentação podem processar ingredientes com velocidade e eficácia incomparáveis.  \n<color=#00FFFF>Funciona como uma Barragem</color>"
koKR = "비버들이 다양한 발효를 전문으로 처리할 수 있는 큰 집으로, 재료를 독보적인 속도와 효율로 가공할 수 있습니다.  \n<color=#00FFFF>제방으로 작용합니다</color>"
csCZ = "Velký dům, ze kterého mohou bobři specializující se na různé druhy fermentace zpracovávat suroviny bezprecedentní rychlostí a účinností.\n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một ngôi nhà lớn nơi những con rái cá chuyên về mọi loại lên men có thể chế biến nguyên liệu với tốc độ và hiệu quả vô song.  \n<color=#00FFFF>Hoạt động như một đê</color>"

