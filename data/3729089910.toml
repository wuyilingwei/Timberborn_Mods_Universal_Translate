["Luc.sawmill.Description"]
raw = "A powered sawmill using crude sawblades, with higher yield but consumes metal sawblades.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A powered sawmill using crude sawblades, with higher yield but consumes metal sawblades.  \n<color=#00FFFF>Works as a Levee</color>"
zhCN = "一座使用粗制锯片的动力锯木厂，产量更高但消耗金属锯片。  \n<color=#00FFFF>作为堤坝运作</color>"
zhTW = "一座使用粗製鋸片的動力鋸木廠，產量更高，但消耗金屬鋸片。<color=#00FFFF>作為堤壩使用</color>"
ruRU = "«Электрическая пилорама, использующая грубые пилы, с более высокой продуктивностью, но требует металлические пилы.  \n<color=#00FFFF>Работает как плотина</color>»"
jaJP = "「粗いのこぎり刃を使った動力の製材所。より高い生産量を持つが、金属ののこぎり刃を消費します。<color=#00FFFF>堤防として機能します</color>」"
frFR = "Une scierie alimentée utilisant des lames de scie brutes, avec un meilleur rendement mais consomme des lames de scie en métal.  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Eine betriebene Säge mit groben Sägeblättern, die eine höhere Ausbeute erzielt, aber Metall-Sägeblätter verbraucht.\n<color=#00FFFF>Funktioniert wie ein Damm</color>"
plPL = "Wyspecjalizowana piła mechaniczna używająca prymitywnych ostrzy, o wyższej wydajności, ale zużywająca metalowe ostrza.  \n<color=#00FFFF>Funkcjonuje jak wał</color>"
ptBR = "Uma serraria motorizada que usa lâminas de serra simples, com maior rendimento, mas consome lâminas de serra de metal.  \n<color=#00FFFF>Funciona como um dique</color>"
koKR = "거칠은 톱날을 사용하는 전동 제재소로, 수확량이 높지만 금속 톱날을 소모합니다.\n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Motorová pila, která používá hrubé pily, má vyšší výnos, ale spotřebovává kovové pily.  \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một nhà máy cưa được vận hành bằng điện với lưỡi cưa thô, năng suất cao hơn nhưng tiêu thụ lưỡi cưa kim loại.  \n<color=#00FFFF>Hoạt động như một Đê</color>"

["Luc.sawmill.FlavorDescription"]
raw = "\"This new technology is nice, but let's hope the blade doesn't break and hurt someone\"\n -Mommy beaver"
status = "normal"
enUS = "\"This new technology is nice, but let's hope the blade doesn't break and hurt someone.\"  \n-Mommy beaver"
zhCN = "“这项新技术不错，但希望刀片不要折断并伤到谁。”  \n- 母海狸"
zhTW = "「這項新技術不錯，但希望刀片不會折斷並傷到誰。」  \n- 媽媽海狸"
ruRU = "\"Эта новая технология неплохая, но давайте надеяться, что лезвие не сломается и не hurting кого-то\" \n -Мама-бобер"
jaJP = "「この新しい技術は素晴らしいですが、刃が壊れて誰かが傷つかないことを願っています」  \n- お母さんビーバー"
frFR = "\"Cette nouvelle technologie est sympa, mais espérons que la lame ne se casse pas et ne blesse personne.\"  \n- Maman castor"
deDE = "\"Diese neue Technologie ist schön, aber hoffen wir, dass die Klinge nicht bricht und jemand verletzt.\" -Mama-Biber"
plPL = "\"Ta nowa technologia jest fajna, ale miejmy nadzieję, że ostrze się nie złamie i nie zrani nikogo.\"  \n-Mamusiu bobrze"
ptBR = "\"Essa nova tecnologia é boa, mas vamos torcer para que a lâmina não quebre e machuque alguém.\"  \n-Mamãe castor"
koKR = "\"이 새로운 기술은 괜찮지만, 칼날이 부러져서 누군가 다치지 않기를 바랍니다.\"  \n- 맘비버"
csCZ = "\"Tato nová technologie je pěkná, ale doufejme, že se čepel nezlomí a někoho nezraní\"  \n-Maminka bobr"
viVN = "\"Công nghệ mới này thật tốt, nhưng hy vọng là lưỡi cưa không gãy và làm bị thương ai đó.\"  \n-Mẹ rái cá"

