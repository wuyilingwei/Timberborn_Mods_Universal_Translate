["Lapantouflemagic.ScavengerDen.Description"]
raw = "An oversized shredder that is also a house for obvious reasons.\nProvides scavenger beavers with the perfect place to plan their work, prepare their equipment, and recycle all the trash those pesky hoomans left behind.\nAlso gives access to the <color=green>zipline network</color> to maximize working range.\n<color=green>Connections: 6</color>\n<color=#00FFFF>Works as a Levee</color>\n<color=red>Can connect from the bottom to a ladder or pit-and-ladder lodge.</color>"
status = "normal"
enUS = "An oversized shredder that is also a house for obvious reasons.  \nProvides scavenger beavers with the perfect place to plan their work, prepare their equipment, and recycle all the trash those pesky humans left behind.  \nAlso gives access to the <color=green>zipline network</color> to maximize working range.  \n<color=green>Connections: 6</color>  \n<color=#00FFFF>Works as a Levee</color>  \n<color=red>Can connect from the bottom to a ladder or pit-and-ladder lodge.</color>"
zhCN = "一个超大的碎纸机，同时也很显然是一个房子。\n为拾荒海狸提供一个完美的地方来规划他们的工作、准备设备，并回收那些讨厌的人类留下的垃圾。\n还可以接入<color=green>滑索网络</color>以最大化工作范围。\n<color=green>连接数：6</color>\n<color=#00FFFF>作为堤坝工作</color>\n<color=red>可以从底部连接到梯子或坑梯栖息地。</color>"
zhTW = "一個超大型的粉碎機，也因為明顯的原因成為了住宅。\n為掠食者海狸提供了完美的地方，讓他們可以計劃工作、準備設備，並回收那些討厭的人類留下的垃圾。\n還可以接入<color=green>滑索網路</color>，以最大化工作範圍。\n<color=green>連接數：6</color>\n<color=#00FFFF>作為堤防使用</color>\n<color=red>可以從底部連接到梯子或坑與梯子的住宅。</color>"
ruRU = "Увеличенный шреддер, который также является домом по очевидным причинам.\nОбеспечивает бобров-мусорщиков идеальным местом для планирования своей работы, подготовки оборудования и переработки всего хлама, который оставили эти назойливые людишки.\nТакже предоставляет доступ к <color=green>канатной дороге</color>, чтобы максимально увеличить рабочую зону.\n<color=green>Подключения: 6</color>\n<color=#00FFFF>Работает как дамба</color>\n<color=red>Может подключаться снизу к лестнице или хранилищу с лестницей и ямой.</color>"
jaJP = "「明らかに理由があるオーバーサイズのシュレッダーで、同時に家でもあります。\nスカベンジャービーバーにとって、仕事の計画、機材の準備、そしてあの厄介な人間たちが残したゴミをリサイクルするための完璧な場所を提供します。\n作業範囲を最大化するために、<color=green>ジップラインネットワーク</color>へのアクセスも提供します。\n<color=green>接続: 6</color>\n<color=#00FFFF>堤防として機能します</color>\n<color=red>下から梯子やピット・アンド・ラダー小屋に接続できます。</color>」"
frFR = "Un broyeur de grande taille qui sert également de maison, pour des raisons évidentes. \nFournit aux castors récupérateurs l'endroit parfait pour planifier leur travail, préparer leur équipement et recycler tous les déchets laissés par ces humains agaçants. \nDonne également accès au <color=green>réseau de tyroliennes</color> pour maximiser la portée de travail. \n<color=green>Connexions : 6</color> \n<color=#00FFFF>Fonctionne comme une digue</color> \n<color=red>Peut se connecter depuis le bas à une échelle ou à un pavillon à échelle et fosse.</color>"
deDE = "Ein übergroßer Schredder, der aus offensichtlichen Gründen auch ein Haus ist. Bietet den schrottsammlenden Bibern den perfekten Ort, um ihre Arbeit zu planen, ihre Ausrüstung vorzubereiten und den ganzen Müll, den diese lästigen Hoomans hinterlassen haben, zu recyceln. Gewährt außerdem Zugang zum <color=green>Seilbahnnetz</color>, um die Reichweite der Arbeit zu maximieren. <color=green>Verbindungen: 6</color> <color=#00FFFF>Funktioniert als Damm</color> <color=red>Kann von unten mit einer Leiter oder einem Grube-und-Leiter-Haus verbunden werden.</color>"
plPL = "Przesadny rozdrabniacz, który jest także domem z oczywistych powodów. \nZapewnia wyspecjalizowanym bobrom idealne miejsce do planowania swojej pracy, przygotowywania sprzętu oraz recyklingu wszystkich śmieci zostawionych przez tych uciążliwych ludzi. \nDaje również dostęp do <color=green>sieci zjazdowej</color>, aby zmaksymalizować zasięg pracy. \n<color=green>Połączenia: 6</color> \n<color=#00FFFF>Działa jak wał</color> \n<color=red>Może łączyć się od dołu z drabiną lub domkiem z drabiną.</color>"
ptBR = "Um triturador superdimensionado que também é uma casa por motivos óbvios.\nOferece aos castores catadores o lugar perfeito para planejar seu trabalho, preparar seu equipamento e reciclar todo o lixo que aqueles humanos inconvenientes deixaram para trás.\nTambém dá acesso à <color=green>rede de tirolesa</color> para maximizar o alcance de trabalho.\n<color=green>Conexões: 6</color>\n<color=#00FFFF>Funciona como uma Barragem</color>\n<color=red>Pode conectar-se da parte inferior a uma escada ou a uma cabana de escada e poço.</color>"
koKR = "이상적으로 보이는 이유로 집이기도 한 거대 분쇄기입니다.  \n늑대비버들에게 작업 계획, 장비 준비 및 성가신 인간들이 남긴 쓰레기를 재활용할 수 있는 완벽한 장소를 제공합니다.  \n작업 범위를 극대화하기 위해 <color=green>짚라인 네트워크</color>에 접속할 수 있습니다.  \n<color=green>연결: 6</color>  \n<color=#00FFFF>제방으로 작동합니다</color>  \n<color=red>바닥에서 사다리나 구덩이-사다리 오두막으로 연결할 수 있습니다.</color>"
csCZ = "Obří drtič, který slouží také jako dům, z очевидných důvodů.\nPoskytuje kobylkám dokonalé místo na plánování jejich práce, přípravu vybavení a recyklaci všech odpadků, které po sobě nechali ti otravní lidé.\nTaké poskytuje přístup k <color=green>síti lanovek</color>, aby maximalizoval pracovní dosah.\n<color=green>Počet spojení: 6</color>\n<color=#00FFFF>Funguje jako hráz</color>\n<color=red>Může se připojit zespodu k žebříku nebo chatě se žebříkem a výkopem.</color>"
viVN = "Một chiếc máy xé lớn quá khổ cũng là một ngôi nhà vì lý do rõ ràng.\nCung cấp cho những con beaver lăn lộn một nơi hoàn hảo để lập kế hoạch công việc, chuẩn bị thiết bị và tái chế tất cả những rác rưởi mà những người hooman phiền phức để lại.\nCũng cung cấp quyền truy cập vào <color=green>mạng lưới dây zip</color> để tối đa hóa phạm vi làm việc.\n<color=green>Kết nối: 6</color>\n<color=#00FFFF>Hoạt động như một đê</color>\n<color=red>Có thể kết nối từ dưới lên thang hoặc nhà thang và hầm.</color>"

["Lapantouflemagic.ScavengerDen.FlavorDescription"]
raw = "\"Please keep in mind that injuries caused by pitfalls, swinging blades, boulder traps and poisoned darts are not covered by the insurance company.\nHave a nice scavenging day!\"\n-Toilet reminder sign"
status = "normal"
enUS = "\"Please keep in mind that injuries caused by pitfalls, swinging blades, boulder traps, and poisoned darts are not covered by the insurance company. Have a nice scavenging day!\"  \n-Toilet reminder sign"
zhCN = "“请注意，因陷阱、摆动刀片、大石块陷阱和毒镖导致的伤害不在保险公司的理赔范围内。\n祝您有个愉快的搜刮日！”\n-厕所有关提醒牌"
zhTW = "「請注意，因絆腳絆、揮舞的刀刃、岩石陷阱和毒箭造成的傷害不在保險公司的賠償範圍內。祝你今天的掠奪之旅愉快！」  \n-廁所提醒標誌"
ruRU = "\"Пожалуйста, имейте в виду, что травмы, вызванные ловушками, качающимися лезвиями, ловушками с булыжниками и ядовитыми дротиками, не покрываются страховой компанией. \nХорошего дня на сборищах!\"\n-Знак напоминания о туалете"
jaJP = "「落下穴、スイングブレード、岩の罠、毒矢によって引き起こされた怪我は保険会社によってカバーされません。素晴らしい採集の日をお過ごしください！」  \n- トイレの注意喚起サイン"
frFR = "\"Veuillez garder à l'esprit que les blessures causées par des pièges, des lames oscillantes, des pièges à pierres et des fléchettes empoisonnées ne sont pas couvertes par la compagnie d'assurance.  \nBonne journée de fouille !\"  \n-Signaler de rappel aux toilettes"
deDE = "\"Bitte beachten Sie, dass Verletzungen, die durch Fallstricke, schwingende Klingen, Felsblockfallen und vergiftete Pfeile verursacht werden, nicht von der Versicherungsgesellschaft abgedeckt sind.\nEinen schönen Sammeltag!\"\n-Toilettenerinnerungsschild"
plPL = "\"Proszę pamiętać, że kontuzje spowodowane pułapkami, wahadłowymi ostrzami, pułapkami z kamieniami i zatrutymi strzałkami nie są objęte ubezpieczeniem.\nMiłego dnia na poszukiwaniu skarbów!\" \n-Znak przypominający o toaletach"
ptBR = "\"Por favor, lembre-se de que lesões causadas por armadilhas, lâminas oscilantes, pedras em queda e dardos envenenados não estão cobertas pela companhia de seguros. \nTenha um bom dia de coleta!\" \n— Placa de lembrete do banheiro"
koKR = "\"함정, 휘두르는 칼날, 바위 덫 및 독침으로 인한 부상은 보험 회사에서 보장되지 않음을 유의해 주시기 바랍니다.  \n유쾌한 채집의 하루가 되세요!\"  \n-화장실 안내 표지판"
csCZ = "Prosím, mějte na paměti, že zranění způsobená pastmi, kyvnými čepeli, pastmi na kameny a otrávenými šipkami nejsou kryta pojišťovnou. \nPřejeme vám hezký den při sběru!\" \n- \"Poznámka na toaletě"
viVN = "Xin hãy nhớ rằng những chấn thương do bẫy, lưỡi dao quay, bẫy đá và mũi tên độc gây ra không được bảo hiểm công ty chi trả. Chúc bạn có một ngày thu nhặt vui vẻ!\"  \n-Bảng nhắc nhở vệ sinh"

["Lapantouflemagic.Zipline_SmallTower.Description"]
raw = "A quick and terrifying mode of travel.\n<color=#FFA500>Small Tower</color>, <color=#FF6EC7>Can support upgrades</color>\n<color=green>Connections: 2</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A quick and terrifying mode of travel.  \n<color=#FFA500>Small Tower</color>, <color=#FF6EC7>Can support upgrades</color>  \n<color=green>Connections: 2</color>  \n<color=#00FFFF>Works as a Levee</color>"
zhCN = "“一种快速且可怕的旅行方式。\n<color=#FFA500>小塔</color>，<color=#FF6EC7>可以支持升级</color>\n<color=green>连接数：2</color>\n<color=#00FFFF>作为堤坝使用</color>”"
zhTW = "一種快速而可怕的旅行方式。\n<color=#FFA500>小塔</color>，<color=#FF6EC7>可以支援升級</color>\n<color=green>連接：2</color>\n<color=#00FFFF>作為堤壩使用</color>"
ruRU = "Быстрый и пугающий способ передвижения.  \n<color=#FFA500>Небольшая башня</color>, <color=#FF6EC7>может поддерживать улучшения</color>  \n<color=green>Соединения: 2</color>  \n<color=#00FFFF>Работает как плотина</color>"
jaJP = "素早く恐ろしい移動手段です。\n<color=#FFA500>小さなタワー</color>、<color=#FF6EC7>アップグレードをサポート可能</color>\n<color=green>接続: 2</color>\n<color=#00FFFF>堤防として機能します</color>"
frFR = "Un mode de transport rapide et terrifiant.  \n<color=#FFA500>Petite Tour</color>, <color=#FF6EC7>Peut supporter des améliorations</color>  \n<color=green>Connexions : 2</color>  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Ein schneller und furchterregender Reisemodus.  \n<color=#FFA500>Kleiner Turm</color>, <color=#FF6EC7>Kann Upgrades unterstützen</color>  \n<color=green>Verbindungen: 2</color>  \n<color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Szybki i przerażający sposób podróży.  \n<color=#FFA500>Mała Wieża</color>, <color=#FF6EC7>Może wspierać ulepszenia</color>  \n<color=green>Połączenia: 2</color>  \n<color=#00FFFF>Działa jako Tam</color>"
ptBR = "Um modo de viagem rápido e aterrorizante.  \n<color=#FFA500>Pequena Torre</color>, <color=#FF6EC7>Pode suportar upgrades</color>  \n<color=green>Conexões: 2</color>  \n<color=#00FFFF>Funciona como um Dique</color>"
koKR = "빠르고 무서운 이동 수단입니다.  \n<color=#FFA500>작은 타워</color>, <color=#FF6EC7>업그레이드를 지원할 수 있습니다</color>  \n<color=green>연결: 2</color>  \n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Rychlý a děsivý způsob cestování.  \n<color=#FFA500>Malá věž</color>, <color=#FF6EC7>Může podporovat vylepšení</color>  \n<color=green>Připojení: 2</color>  \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một phương thức di chuyển nhanh chóng và đáng sợ.\n<color=#FFA500>Tháp Nhỏ</color>, <color=#FF6EC7>Có thể hỗ trợ nâng cấp</color>\n<color=green>Kết nối: 2</color>\n<color=#00FFFF>Hoạt động như một Đê</color>"

["Lapantouflemagic.Zipline_SmallTower.FlavorDescription"]
raw = "\"A bench just a few meters under some flowerpots? This seems like the perfect place for an… accident.\"\n-Jack the Gnawer, public safety report."
status = "normal"
enUS = "\"A bench just a few meters under some flowerpots? This seems like the perfect place for an… accident.\"  \n-Jack the Gnawer, public safety report."
zhCN = "“就在几个花盆下方的长椅？这似乎是个发生… 意外的完美地方。”  \n- 来自杰克·咬人者的公共安全报告。"
zhTW = "「就在一些花盆下方幾公尺的長椅？這似乎是發生…事故的完美地點。」  \n—— 咬咬先生，公共安全報告。"
ruRU = "\"Скамейка всего в нескольких метрах под цветочными горшками? Похоже, это идеальное место для… инцидента.\"  \n- Джек Грызун, отчет по общественной безопасности."
jaJP = "「花鉢のすぐ下にあるベンチ？これは…事故の完璧な場所のようです。」  \n- ジャック・ザ・ノワー、公的安全報告書。"
frFR = "\"Un banc à quelques mètres sous des pots de fleurs ? Cela semble être l'endroit idéal pour un… accident.\"  \n-Jack le Rongeur, rapport de sécurité publique."
deDE = "\"Eine Bank nur wenige Meter unter einigen Blumentöpfen? Das scheint der perfekte Ort für einen… Unfall zu sein.\"  \n-Jack der Nager, öffentliche Sicherheitsmeldung."
plPL = "\"Ławka zaledwie kilka metrów poniżej doniczek? To wydaje się być idealne miejsce na... wypadek.\"  \n-Jack Gnawer, raport o bezpieczeństwie publicznym."
ptBR = "\"Um banco a poucos metros de alguns vasos de flores? Isso parece o lugar perfeito para um… acidente.\"  \n-Jack, o Roedor, relatório de segurança pública."
koKR = "꽃 화분 바로 아래 몇 미터에 있는 벤치? 이곳은 사고가 발생하기에 완벽한 장소처럼 보입니다.\"\n- 갓더와, 공공 안전 보고서."
csCZ = "\"Jsou zde lavičky jen pár metrů pod květináči? To se zdá jako ideální místo pro... nehodu.\"  \n-Jack Hryzoun, zpráva o veřejné bezpečnosti."
viVN = "Một cái ghế chỉ vài mét dưới những chậu hoa? Đây có vẻ là nơi hoàn hảo cho một… tai nạn.\"\n-Jack the Gnawer, báo cáo an toàn công cộng."

