["Lapantouflemagic.NuclearReactor1.Description"]
raw = "A relatively weak nuclear reactor powered by nuclear waste and the radioactive elements dissolved in bad water.\n<color=red>Must be build on a bad water source</color>"
status = "normal"
enUS = "A relatively weak nuclear reactor powered by nuclear waste and the radioactive elements dissolved in contaminated water. <color=red>Must be built on a contaminated water source</color>"
zhCN = "一个相对较弱的核反应堆，由核废料和溶解在污染水中的放射性元素驱动。\n<color=red>必须建在污染水源上</color>"
zhTW = "一個相對較弱的核反應堆，依賴核廢料和溶解在污水中的放射性元素供能。  \n<color=red>必須建造在污水源上</color>"
ruRU = "Относительно слабый ядерный реактор, работающий на ядерных отходах и радиоактивных элементах, растворённых в загрязнённой воде.  \n<color=red>Должен быть построен на источнике загрязнённой воды</color>"
jaJP = "「比較的弱い核反応炉で、核廃棄物と悪水に溶けた放射性元素によって動力を得ます。<color=red>悪水源の上に建設する必要があります</color>」"
frFR = "Un réacteur nucléaire relativement faible alimenté par des déchets nucléaires et des éléments radioactifs dissous dans de l'eau polluée.  \n<color=red>Doit être construit sur une source d'eau polluée</color>"
deDE = "Ein relativ schwacher Atomreaktor, der mit nuklearem Abfall und den radioaktiven Elementen aus verschmutztem Wasser betrieben wird. <color=red>muss an einer Quelle für schlechtes Wasser gebaut werden</color>"
plPL = "Relatywnie słaby reaktor nuklearny zasilany odpadami nuklearnymi i radioaktywnymi elementami rozpuszczonymi w złej wodzie.  \n<color=red>Musisz go zbudować w źródle złej wody</color>"
ptBR = "Um reator nuclear relativamente fraco alimentado por resíduos nucleares e os elementos radioativos dissolvidos em água ruim.  \n<color=red>Deve ser construído em uma fonte de água ruim</color>"
koKR = "상대적으로 약한 핵발전소로, 방사성 폐기물과 오염된 물에 용해된 방사성 원소로 작동합니다.  \n<color=red>오염된 물원에 건설해야 합니다</color>"
csCZ = "Relativně slabý jaderný reaktor poháněný jaderným odpadem a radioaktivními prvky rozpuštěnými v závadné vodě.  \n<color=red>Musí být postaven na zdroji závadné vody</color>"
viVN = "Một lò phản ứng hạt nhân tương đối yếu được cung cấp năng lượng bởi chất thải hạt nhân và các nguyên tố phóng xạ hòa tan trong nước bẩn.  \n<color=red>Phải được xây dựng trên một nguồn nước bẩn</color>"

["Lapantouflemagic.NuclearReactor.FlavorDescription"]
raw = "\"Every morning someone has to hit the big red button, and if you're not lucky, KABOOM !\nOtherwise nothing happens until the next day. At least according to their media, that’s what hoomans did.\"\n -A Hooman historian beaver"
status = "normal"
enUS = "\"Every morning someone has to hit the big red button, and if you're not lucky, KABOOM! Otherwise nothing happens until the next day. At least according to their media, that’s what humans did.\"  \n-A Human historian beaver"
zhCN = "“每天早上，总会有人按下那个大红按钮，如果运气不好，就会轰的一声！否则直到第二天什么也不会发生。至少根据他们的媒体，这就是人类所做的。”  \n- 一位人类历史学的海狸"
zhTW = "「每天早上都得有人按下那個大紅按鈕，如果你不幸的話，轟！ 否則什麼也不會發生，直到第二天。 至少根據他們的媒體，這就是人類所做的。」  \n—一位人類歷史學家海狸"
ruRU = "\"Каждое утро кто-то должен нажать на большую красную кнопку, и если вам не повезло, БУМ! В противном случае ничего не происходит до следующего дня. По крайней мере, согласно их медиа, именно это и делали люди.\"  \n- Бобёр-историк о людях"
jaJP = "「毎朝、誰かが大きな赤いボタンを押さなければなりません。そして、運が悪ければ、ドカン！そうでなければ、次の日まで何も起こりません。少なくとも彼らのメディアによれば、それが人間のしたことです。」  \n- 人間の歴史家ビーバー"
frFR = "\"Chaque matin, quelqu'un doit appuyer sur le gros bouton rouge, et si vous n'avez pas de chance, KABOOM ! Sinon, rien ne se passe jusqu'au lendemain. Du moins, selon leurs médias, c'est ce que les hoomans ont fait.\"  \n- Un castor historien hooman"
deDE = "\"Jeden Morgen muss jemand den großen roten Knopf drücken, und wenn man kein Glück hat, KABOOM! Ansonsten passiert bis zum nächsten Tag nichts. Zumindest laut ihren Medien, das haben die Hoomans gemacht.\"  \n- Ein hoomanischer Historiker-Biber"
plPL = "\"Każdego ranka ktoś musi nacisnąć duży czerwony przycisk, a jeśli nie masz szczęścia, KABOOM!\nW przeciwnym razie nic się nie wydarzy aż do następnego dnia. Przynajmniej według ich mediów, tak robiły hoomany.\"  \n- Bobrzy historyk hoomanów"
ptBR = "\"Todo dia alguém precisa apertar o grande botão vermelho, e se você não tiver sorte, KABOOM! \nCaso contrário, nada acontece até o dia seguinte. Pelo menos de acordo com a mídia deles, foi isso que os hoomans fizeram.\"\n - Um castor historiador hooman"
koKR = "\"매일 아침 누군가 큰 빨간 버튼을 눌러야 하고, 운이 좋지 않으면 KABOOM! 그렇지 않으면 다음 날까지 아무 일도 발생하지 않아요. 적어도 그들의 매체에 따르면, 그게 휴먼들이 했던 일이에요.\"  \n- 한 휴먼 역사 Beaver"
csCZ = "\"Každé ráno někdo musí stisknout velké červené tlačítko, a pokud nemáte štěstí, KABOOM! Jinak se nic nestane až do příštího dne. Aspoň podle jejich médií, tohle dělali hoomani.\" - Bobr historik Hooman"
viVN = "Mỗi sáng, có người phải bấm nút đỏ lớn, và nếu bạn không may mắn, KABOOM! \nNếu không thì chẳng có gì xảy ra cho đến ngày hôm sau. Ít nhất theo truyền thông của họ, đó là điều mà loài người đã làm.\" \n-Một chú beaver sử học loài người"

["Luc.Library.Description"]
raw = "A large building with lots of books for studying.\nThe only way to obtain science.\n<color=green>Is built from the inside like a wonder</color>."
status = "normal"
enUS = "A large building with lots of books for studying. The only way to obtain science. <color=green>Is built from the inside like a wonder</color>."
zhCN = "一座大型建筑，里面有许多书籍供学习使用。  \n获得科学的唯一途径。  \n<color=green>像奇迹一样从内部建造</color>。"
zhTW = "一座擁有大量書籍供學習的大型建築。  \n獲得科學的唯一途徑。  \n<color=green>從內部像奇蹟一樣建造</color>。"
ruRU = "Большое здание с множеством книг для изучения. Единственный способ получить науку. <color=green>Строится изнутри как чудо</color>."
jaJP = "「勉強のための本がたくさんある大きな建物。\n科学を得る唯一の方法。\n<color=green>驚異のように内部から建設される</color>。」"
frFR = "Un grand bâtiment avec beaucoup de livres pour étudier.  \nLe seul moyen d'obtenir des sciences.  \n<color=green>Est construit de l'intérieur comme une merveille</color>."
deDE = "Ein großes Gebäude mit vielen Büchern zum Studieren. Die einzige Möglichkeit, Wissenschaft zu erhalten. <color=green>Wird von innen wie ein Wunder gebaut</color>."
plPL = "Duży budynek z dużą ilością książek do nauki. Jedyny sposób na zdobycie nauki. <color=green>Budowany od środka jak cud</color>."
ptBR = "Um grande prédio com muitos livros para estudar.  \nA única forma de obter ciência.  \n<color=green>É construído por dentro como uma maravilha</color>."
koKR = "연구를 위한 많은 책이 있는 큰 건물입니다.\n과학을 얻는 유일한 방법입니다.\n<color=green>경이처럼 내부에서 지어집니다</color>."
csCZ = "Velká budova s množstvím knih na studium.  \nJediný způsob, jak získat vědu.  \n<color=green>Je postavena zevnitř jako zázrak</color>."
viVN = "Một tòa nhà lớn với nhiều sách để học tập.\nCách duy nhất để có được khoa học.\n<color=green>Xây dựng từ bên trong như một kỳ quan</color>."

