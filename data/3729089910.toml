status = "normal"
enUS = "A large greenhouse to keep banana trees warm and happy  \n<color=red>Crushable building! Be careful! Only allows banana trees!  \nThis building is not watertight!</color>"
zhCN = "一个大型温室，用来保持香蕉树温暖快乐  \n<color=red>可被摧毁的建筑！小心！仅允许种植香蕉树！  \n此建筑不防水！</color>"
zhTW = "一座大型溫室，旨在保持香蕉樹的溫暖和快樂  \n<color=red>可摧毀的建築！請小心！僅允許香蕉樹！  \n此建築不防水！</color>"
ruRU = "Большая теплица, чтобы держать банановые деревья в тепле и радости\n<color=red>Разрушаемое здание! Будьте осторожны! Допускает только банановые деревья!\nЭто здание не водонепроницаемое!</color>"
jaJP = "バナナの木を温かく幸せに保つための大きな温室  \n<color=red>崩壊可能な建物です！注意してください！バナナの木のみ許可されています！  \nこの建物は防水ではありません！</color>"
frFR = "Une grande serre pour garder les bananiers au chaud et heureux  \n<color=red>Bâtiment écrasable ! Attention ! Ne permet que des bananiers !  \nCe bâtiment n'est pas étanche !</color>"
deDE = "Ein großes Gewächshaus, um Bananenbäume warm und glücklich zu halten\n<color=red>Ein zerstörbares Gebäude! Sei vorsichtig! Erlaubt nur Bananenbäume!\nDieses Gebäude ist nicht wasserdicht!</color>"
plPL = "Duża szklarnia, aby utrzymać bananowce ciepłe i szczęśliwe\n<color=red>Można zniszczyć! Bądź ostrożny! Tylko dla bananowców!\nTen budynek nie jest wodoszczelny!</color>"
ptBR = "Uma grande estufa para manter as bananeiras quentes e felizes  \n<color=red>Edifício esmagável! Cuidado! Apenas permite bananeiras!  \nEste edifício não é à prova d'água!</color>"
koKR = "바나나 나무를 따뜻하고 행복하게 유지하는 대형 온실입니다.  \n<color=red>부수기 쉬운 건물입니다! 조심하세요! 바나나 나무만 허용됩니다!  \n이 건물은 방수가 되지 않습니다!</color>"
csCZ = "Velká skleník na udržení banánovníků v teple a spokojenosti\n<color=red>Rozbitná stavba! Dávejte pozor! Umožňuje pouze banánovníky!\nTato stavba není vodotěsná!</color>"
viVN = "Một nhà kính lớn để giữ cho cây chuối ấm áp và hạnh phúc\n<color=red>Công trình có thể bị nghiền nát! Hãy cẩn thận! Chỉ cho phép cây chuối!\nCông trình này không kín nước!</color>"

["Lapantouflemagic.GreenHouse.FlavorDescription"]
raw = "\"If you eat only bananas, you won't wear your teeth down and eventually they will grow so long that they will go through your skull\"\n -Mommy beaver"
status = "normal"
enUS = "\"If you eat only bananas, you won't wear your teeth down and eventually they will grow so long that they will go through your skull.\"  \n-Mommy beaver"
zhCN = "\"如果你只吃香蕉，你的牙齿就不会磨损，最终它们会长得如此之长，以至于穿透你的颅骨\"  \n- 妈妈海狸"
zhTW = "如果你只吃香蕉，你的牙齒就不會磨損，最後它們會長得如此之長，穿過你的頭骨。\"\n -浣熊媽媽"
ruRU = "\"Если ты будешь есть только бананы, зубы не сотрёшь, и в итоге они вырастут так долго, что пройдут сквозь череп.\"  \n- Мамаша-бобер"
jaJP = "「バナナだけを食べれば、歯が減ることはなく、最終的にはあまりにも長くなって頭蓋骨を突き抜けることになるだろう」  \n- お母さんビーバー"
frFR = "\"Si tu ne manges que des bananes, tu n'useras pas tes dents et finalement elles pousseront si longtemps qu'elles traverseront ton crâne.\"  \n-Maman castor"
deDE = "\"Wenn du nur Bananen isst, wirst du deine Zähne nicht abnutzen und schließlich werden sie so lang wachsen, dass sie durch deinen Schädel gehen.\" - Mama Biber"
plPL = "\"Jeśli będziesz jeść tylko banany, nie zetrzesz swoich zębów i ostatecznie urosną one tak długo, że przepłyną przez czaszkę.\"  \n-Mamusiu bobrze"
ptBR = "\"Se você comer apenas bananas, não desgastará seus dentes e, eventualmente, eles crescerão tanto que passarão pelo seu crânio.\" - Mamãe castor"
koKR = "\"오직 바나나만 먹으면 이가 닳지 않고 결국 이가 너무 길어져서 두개골을 뚫게 될 거야.\"\n -엄마 비버"
csCZ = "\"Pokud jíš jen banány, nezničíš si zuby a nakonec ti porostou tak dlouhé, že ti projdou lebkou.\"  \n-Maminka bobr"
viVN = "\"Nếu bạn chỉ ăn chuối, bạn sẽ không mài mòn răng và cuối cùng chúng sẽ dài đến mức xuyên qua cả sọ của bạn.\"  \n-Mẹ beaver"

["Lapantouflemagic.Trebuchet.Description"]
raw = "The only realistic way to get rid of all those useless rocks. Also allows that one nerdy beaver to study ballistics."
status = "normal"
enUS = "The only realistic way to get rid of all those useless rocks. Also allows that one nerdy beaver to study ballistics."
zhCN = "“摆脱所有那些无用石头的唯一现实方法。还允许那个有些书呆子的海狸研究弹道学。”"
zhTW = "擺脫那些無用岩石的唯一現實方法。同時也讓那隻書呆子海狸研究彈道學。"
ruRU = "Единственный реальный способ избавиться от всех этих бесполезных камней. Также позволяет одному nerd-бобру изучать баллистику."
jaJP = "「不要な岩をすべて取り除く唯一の現実的な方法です。また、あのひとりのオタッキーのビーバーが弾道学を研究することも可能にします。」"
frFR = "La seule façon réaliste de se débarrasser de tous ces rochers inutiles. Permet également à ce raton-laveur geek d'étudier la balistique."
deDE = "Die einzige realistische Möglichkeit, all diese unnützen Steine loszuwerden. Ermöglicht es auch diesem einen nerdigen Biber, Ballistik zu studieren."
plPL = "Jedyny realistyczny sposób na pozbycie się wszystkich tych bezużytecznych kamieni. Pozwala także temu jednemu nerdowatemu bobrowi badać balistykę."
ptBR = "A única maneira realista de se livrar de todas aquelas pedras inúteis. Também permite que aquele castor nerd estude balística."
koKR = "모든 쓸모없는 돌을 없앨 수 있는 유일한 현실적인 방법. 또한 그 괴짜 비버가 탄도학을 연구할 수 있게 해줍니다."
csCZ = "Jediný realistický způsob, jak se zbavit všech těch zbytečných kamenů. Také umožňuje tomu jednomu geekovskému bobrovi studovat balistiku."
viVN = "Cách duy nhất thực tế để thoát khỏi tất cả những viên đá vô dụng đó. Cũng cho phép con hải ly học thức đó nghiên cứu đạn đạo."

