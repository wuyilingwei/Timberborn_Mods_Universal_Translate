["Lapantouflemagic.CoalMechanicalDrill.Description"]
raw = "A mechanized drill that crushes rock to extract coal.\nThe drill bits must be changed regularly.\n<color=red>Deleting waste rock is cheating!</color>"
status = "normal"
enUS = "A mechanized drill that crushes rock to extract coal.  \nThe drill bits must be changed regularly.  \n<color=red>Deleting waste rock is cheating!</color>"
zhCN = "一台机械钻头，能够破碎岩石以提取煤炭。  \n钻头需要定期更换。  \n<color=red>删除废石是作弊！</color>"
zhTW = "一台機械化的鑽頭，可壓碎岩石以提取煤礦。 \n鑽頭必須定期更換。 \n<color=red>刪除廢石是作弊！</color>"
ruRU = "Механизированная дрель, которая дробит камень для извлечения угля.  \nБуровые насадки необходимо регулярно менять.  \n<color=red>Удаление отходов породы — это жульничество!</color>"
jaJP = "機械式のドリルで、石を粉砕して石炭を抽出します。  \nドリルビットは定期的に交換する必要があります。  \n<color=red>廃棄岩を削除するのはチートです！</color>"
frFR = "Une perceuse mécanisée qui écrase la roche pour extraire le charbon.  \nLes forets doivent être changés régulièrement.  \n<color=red>Supprimer les déchets rocheux est de la triche !</color>"
deDE = "Ein mechanisierter Bohrer, der Gestein zerbricht, um Kohle zu extrahieren. \nDie Bohrköpfe müssen regelmäßig gewechselt werden. \n<color=red>Abfallgestein zu löschen, ist Betrug!</color>"
plPL = "Zmodyfikowany wiertło, które miażdży skały, aby wydobyć węgiel. Wiertła muszą być regularnie wymieniane. <color=red>Usuwanie odpadów skalnych to oszustwo!</color>"
ptBR = "Uma broca mecanizada que esmagava rochas para extrair carvão. As pontas da broca devem ser trocadas regularmente. <color=red>Eliminar rocha residual é trapaça!</color>"
koKR = "석탄을 추출하기 위해 암석을 분쇄하는 기계식 드릴입니다.\n드릴 비트는 정기적으로 교체해야 합니다.\n<color=red>폐석을 삭제하는 것은 부정입니다!</color>"
csCZ = "Mechanizované vrtáky, které drtí skálu a získávají uhlí. Vrtáky je třeba pravidelně měnit. <color=red>Odstranění odpadního kamene je podvod!</color>"
viVN = "Một máy khoan cơ giới nghiền nát đá để khai thác than. \nCác mũi khoan cần được thay thế thường xuyên. \n<color=red>Xóa đá thải là gian lận!</color>"

["Lapantouflemagic.CoalMechanicalDrill.FlavorDescription"]
raw = "\"If you spin the drill too fast, the coal might ignite and KABOOM the mountain!\"\n -A bad alchemist beaver"
status = "normal"
enUS = "\"If you spin the drill too fast, the coal might ignite and KABOOM the mountain!\"  \n-A bad alchemist beaver"
zhCN = "“如果你转动钻头太快，煤炭可能会点燃，山就 KABOOM 了！”  \n- 一只糟糕的炼金术士海狸"
zhTW = "「如果你轉動鑽頭的速度太快，煤炭可能會起火，然後轟然爆炸！」  \n- 一隻糟糕的煉金術士海狸"
ruRU = "\"Если прокрутить дрель слишком быстро, уголь может загореться, и БАБАХ — гора!\"  \n- Плохой алхимик-бобер"
jaJP = "「ドリルを速く回しすぎると、石炭が点火して山がKABOOMするかもしれない！」\n - 悪い錬金術師ビーバー"
frFR = "\"Si vous faites tourner le perçage trop vite, le charbon pourrait s'enflammer et BOUM la montagne !\"  \n-Un mauvais castor alchimiste"
deDE = "\"Wenn du die Bohrmaschine zu schnell drehst, könnte die Kohle entzünden und BOOM, der Berg!\"  \n- Ein schlechter Alchemist-Biber"
plPL = "\"Jeśli obrócisz wiertło za szybko, węgiel może zapalić się i KABOOM w górze!\"  \n-Zły alchemik bóbr"
ptBR = "\"Se você girar a broca rápido demais, o carvão pode pegar fogo e KABOOM a montanha!\"  \n- Um castor alquimista ruim"
koKR = " drill을 너무 빨리 돌리면 석탄이 점화되어 산이 KABOOM 할 수 있어!\"  \n- 나쁜 연금술사 비버"
csCZ = "\"Pokud vrták točíš příliš rychle, uhlí se může vzníti a KABOOM hory!\"  \n-Zlý alchymistický bobr"
viVN = "\"Nếu bạn quay mũi khoan quá nhanh, than có thể bùng cháy và KABOOM cả ngọn núi!\"  \n- Một con rái cá giả kim tồi tệ"

