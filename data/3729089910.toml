new = "Abyss Exploration"
status = "normal"

["Lapantouflemagic.HoomanUndergroundFactory.DisplayName"]
new = "Hooman Underground Factory Operating Team"
status = "normal"

["Lapantouflemagic.HoomanUndergroundFactory.Description"]
new = "Sends down the abyss a team of beavers specialized in ancient hooman machinery to repair and reactivate manufacturing tools that are far above our own technological level.\n<color=#FF6EC7>Tasks that would have required an entire day for specialized craftbeavers can now be completed multiple times in barely a few hours.</color>"
status = "normal"

["Lapantouflemagic.HoomanUndergroundFactory.FlavorDescription"]
new = "\"Apparently one of the hoomans' greatest fears was to see their own machines rebel against them, how silly is that? How could this big hunk of metal ev- Ouch! It zapped me!\""
status = "normal"

["Lapantouflemagic.GasExctractor.DisplayName"]
new = "Gas Extractor"
status = "normal"

["Lapantouflemagic.GasExctractor.Description"]
new = "A mechanized pump that can exploit pockets of various gases identified by the exploration teams."
status = "normal"

["Lapantouflemagic.GasExctractor.FlavorDescription"]
new = "\"You wouldn't imagine how many different smells there is down there...\""
status = "normal"

["Lapantouflemagic.DeepMinePILEstorage.DisplayName"]
new = "Deep pile storage"
status = "normal"

["Lapantouflemagic.DeepMinestorage.Description"]
new = "Repurposes an empty sector of the abandoned hooman facility to store an excessive amount of resources."
status = "normal"

["Lapantouflemagic.DeepMinePILEstorage.FlavorDescription"]
new = "\"This thing is so immense that we could spend a lifetime exploring it\"\n-An explorer beaver"
status = "normal"

["Lapantouflemagic.DeepMineBOXStorage.DisplayName"]
new = "Deep crate storage"
status = "normal"

["Lapantouflemagic.DeepMineBOXStorage.FlavorDescription"]
new = "\"Why did they need all this space? Were they planning to live there? To survive their own man-made apocalypse?\"\n-An explorer beaver"
status = "normal"

["Lapantouflemagic.NuclearWasteCollector.DisplayName"]
new = "Nuclear Waste Mining Expedition Center"
status = "normal"

["Lapantouflemagic.NuclearWasteCollector.Description"]
new = "Sends down the abyss a team of beavers specialized in recovering the strange warm stuff the hoomans buried down there so long ago, so that it can be refined again into something useful."
status = "normal"

["Lapantouflemagic.NuclearWasteCollector.FlavorDescription"]
new = "\"Exploring? No no no... that's not my job, I do this one because I don’t want to be killed by some devious thing I can’t see.\""
status = "normal"

["Reciepe.BetterAlcohol.DisplayName"]
new = "Combined Rice Alcohol Fermentation and Distillation"
status = "normal"

["Reciepe.ResinSynthesis.DisplayName"]
new = "Artificial Resin Synthesis"
status = "normal"

["Reciepe.Cubane.DisplayName"]
new = "Octanitrocubane Synthesis"
status = "normal"

["Lapantouflemagic.AbyssTourismOffice.DisplayName"]
new = "Abyss Tourism Center"
status = "normal"

["Lapantouflemagic.AbyssTourismOffice.Description"]
new = "Organizes guided tours in safe and already explored sectors of the hooman derelict facility.\nGuaranteed 100% Grue-free."
status = "normal"

["Lapantouflemagic.AbyssTourismOffice.FlavorDescription"]
new = "\"Who doesn't like the thrill of maybe being eaten by a grue, without actually being eaten by a grue?\""
status = "normal"

["Reciepe.Incinerate_sawdust.DisplayName"]
new = "Burn Excess Sawdust"
status = "normal"

["Lapantouflemagic.HoomanUndergroundChemPlant.DisplayName"]
new = "Hooman Underground Laboratory Operating Team"
status = "normal"

["Lapantouflemagic.HoomanUndergroundChemPlant.Description"]
new = "Sends down the abyss a team of chemist beavers to study and reactivate an ancient hooman chemical plant.\n<color=#FF6EC7>Their processes were far more advanced than ours - we will surely learn so much! </color>"
status = "normal"

["Lapantouflemagic.HoomanUndergroundChemPlant.FlavorDescription"]
new = "\"Manufacturing resin entirely from base elements? This is amazing!\""
status = "normal"

["Lapantouflemagic.NEWLumberjackHouse.DisplayName"]
new = "Lumberjack's Barn"
status = "normal"

["Lapantouflemagic.NEWLumberjackHouse.Description"]
new = "A half-barn, half-lodge building used as a workplace for a group of lumberjacks. Contains a few tools to help them do their job efficiently.\nHas a <color=#FF6EC7>triangle roof</color>, <color=#FF6EC7>Can support upgrades</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"

["Lapantouflemagic.NEWLumberjackHouse.FlavorDescription"]
new = "\"My daddy's the best! He built our entire house!\"\n -Typical kit boasting"
status = "normal"

["Lapantouflemagic.TappersShack.Description"]
new = "Employs a whole team of tappers to harvest resin from pine trees.\nHas a <color=#FF6EC7>triangle roof</color>, <color=#FF6EC7>Can support upgrades</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"

["Lapantouflemagic.TriangleGatheringHouse.DisplayName"]
new = "Harvester's Cottage"
status = "normal"

["Lapantouflemagic.TriangleGatheringHouse.Description"]
new = "A reworked farmhouse used by a group of harvester beavers to meet and split work efficiently.\nHas a <color=#FF6EC7>triangle roof</color>, <color=#FF6EC7>Can support upgrades</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"

["Lapantouflemagic.TriangleGatheringHouse.FlavorDescription"]
new = "\"Don't you dare come in my house covered in dirt and berry juice! Get a shower first or I'll toss you in the river myself!\"\n -Mommy beaver, every evening."
status = "normal"

["Lapantouflemagic.NEWFarmhouse.Description"]
new = "Employs a farmer that plant and harvest crops.\nHas a <color=#FF6EC7>triangle roof</color>, <color=#FF6EC7>Can support upgrades</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"

["Lapantouflemagic.Woodupgrade.Description"]
new = "An upgrade module to be placed on top of an upgradable <color=#FFA500>Small Tower</color> (left) adjacent to a <color=#FF6EC7>triangle roof</color> building (right).\nEmploys <color=green>10 Haulers</color>\".\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"

["Lapantouflemagic.NiceView.DisplayName"]
new = "Observation Deck"
status = "normal"

["Lapantouflemagic.ContaminatedJail.Description"]
new = "A jail for keeping contaminated beavers isolated from the rest of the population.\nJailed beavers will no longer need drinks, food, sleep, shelter nor cleaning until they feel better."
status = "normal"

