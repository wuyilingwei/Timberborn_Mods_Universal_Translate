["Lapantouflemagic.Airship.Description"]
raw = "A masterfully crafted airship to travel the world at an incredible speed and bring back untold riches.\n<color=#FF6EC7>No need to trade anymore, beavers of all tribes will give anything for a chance to get the ride of a lifetime.</color>\n<color=green>Has the efficiency of 10 balloons.</color>"
status = "normal"
enUS = "A masterfully crafted airship to travel the world at an incredible speed and bring back untold riches.  \n<color=#FF6EC7>No need to trade anymore, beavers of all tribes will give anything for a chance to get the ride of a lifetime.</color>  \n<color=green>Has the efficiency of 10 balloons.</color>"
zhCN = "“一艘精心制作的飞船，可以以惊人的速度环游世界，带回无尽的财富。<color=#FF6EC7>再也不需要交易，各个部落的海狸愿意付出一切，只为获得一次终生难忘的乘坐体验。</color><color=green>其效率相当于10个气球。</color>”"
zhTW = "一艘精心製作的飛船，可以以驚人的速度環遊世界，帶回無數財富。  \n<color=#FF6EC7>不再需要交易，所有部落的海狸都願意付出任何代價來獲得這一次終生難忘的體驗。</color>  \n<color=green>擁有10個氣球的效率。</color>"
ruRU = "Искусно созданный дирижабль для путешествий по миру с невероятной скоростью и возможности приносить неведомые богатства.  \n<color=#FF6EC7>Больше не нужно торговать, бобры всех племен отдадут всё за возможность прокатиться раз в жизни.</color>  \n<color=green>Обладает эффективностью 10 воздушных шаров.</color>"
jaJP = "「世界を驚異的なスピードで旅し、数え切れない富を持ち帰るために巧みに作られた飛空船です。<color=#FF6EC7>もはや取引する必要はありません。すべての部族のビーバーは、一生に一度の乗り物に乗るチャンスのために何でも提供します。</color><color=green>10個の風船の効率を持っています。</color>」"
frFR = "Un dirigeable magistralement conçu pour parcourir le monde à une vitesse incroyable et ramener des richesses incalculables.  \n<color=#FF6EC7>Plus besoin de commercer, les castors de toutes les tribus donneront n'importe quoi pour avoir la chance de vivre une balade inoubliable.</color>  \n<color=green>A une efficacité équivalente à 10 ballons.</color>"
deDE = "Ein meisterhaft gefertigtes Luftschiff, um die Welt mit unglaublicher Geschwindigkeit zu bereisen und unzählige Reichtümer zurückzubringen.  \n<color=#FF6EC7>Es gibt keinen Grund mehr zu handeln, Biber aller Stämme geben alles für die Chance auf die Fahrt ihres Lebens.</color>  \n<color=green>Hat die Effizienz von 10 Ballons.</color>"
plPL = "Arcydzieło rzemiosła statku powietrznego, który pozwala podróżować po świecie z niesamowitą prędkością i przynosić niezmierzone bogactwa.  \n<color=#FF6EC7>Nie ma potrzeby handlować, bobry wszystkich plemion oddadzą wszystko za szansę przeżycia podniebnej przygody życia.</color>  \n<color=green>Ma wydajność 10 balonów.</color>"
ptBR = "Um dirigível habilidosamente elaborado para viajar pelo mundo a uma velocidade incrível e trazer de volta riquezas incalculáveis.  \n<color=#FF6EC7>Não há mais necessidade de negociar, castores de todas as tribos darão qualquer coisa por uma chance de ter a experiência de uma vida.</color>  \n<color=green>Possui a eficiência de 10 balões.</color>"
koKR = "세상 곳곳을 놀라운 속도로 여행하고 셀 수 없는 재산을 가져오는 대단히 정교하게 제작된 비행선입니다.  \n<color=#FF6EC7>이제 거래할 필요 없습니다. 모든 부족의 비버들은 평생 한 번의 기회를 얻기 위해 무엇이든 줄 것입니다.</color>  \n<color=green>효율성이 10개의 풍선에 해당합니다.</color>"
csCZ = "Majstrovsky zhotovený vzducholodě pro cestování po světě neuvěřitelnou rychlostí a přinášení nevyčíslitelného bohatství.  \n<color=#FF6EC7>Žádná potřeba obchodovat, bobři všech kmenů dají cokoliv za šanci zažít jízdu života.</color>  \n<color=green>Má účinnost 10 balónků.</color>"
viVN = "Một chiếc khí cầu được chế tác tinh xảo để du hành vòng quanh thế giới với tốc độ đáng kinh ngạc và mang về những món tài sản vô giá.\n<color=#FF6EC7>Không còn cần phải trao đổi nữa, những con hải ly từ mọi bộ tộc sẽ trao bất cứ thứ gì cho cơ hội có một chuyến đi để đời.</color>\n<color=green>Có hiệu suất tương đương với 10 chiếc bóng bay.</color>"

