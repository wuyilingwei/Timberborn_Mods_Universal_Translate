["Lapantouflemagic.IncenseBurner..FlavorDescription"]
raw = "\"It’s only a matter of time before some idiot stuffs his snout directly into it…\""
status = "normal"
enUS = "\"It's only a matter of time before some idiot shoves their snout right into it...\""
zhCN = "“只是时间问题，总会有某个傻瓜直接把鼻子塞进去……”"
zhTW = "「遲早會有某個笨蛋把鼻子直接塞進去的…」"
ruRU = "\"Дело времени, прежде чем какой-нибудь идиот засунет свою морду прямо в него...\""
jaJP = "\"それに直接鼻を突っ込む馬鹿が出てくるのは時間の問題だ…\""
frFR = "\"Ce n'est qu'une question de temps avant qu'un idiot ne plonge son museau directement dedans...\""
deDE = "\"Es ist nur eine Frage der Zeit, bis sich irgendein Idiot seine Schnauze direkt hineinstopft...\""
plPL = "\"To tylko kwestia czasu, zanim jakiś idiota wsadzi swoją paszczę prosto w to...\""
ptBR = "\"É apenas uma questão de tempo antes que algum idiota enfie seu focinho diretamente nisso...\""
koKR = "\"어떤 바보가 코를 직접 집어넣기까지 시간 문제일 뿐이다…\""
csCZ = "\"Je jen otázkou času, než do toho nějaký idiot zaboří svůj čenich přímo...\""
viVN = "\"Chỉ là vấn đề thời gian trước khi một tên ngốc nào đó nhét mũi của mình vào trong đó...\""

