["Lapantouflemagic.2x2LousyWarehouse.FlavorDescription"]
raw = "\"You called me for that ? There's nothing! No roof, no wall, nothing!\"\n -A builder beaver"
status = "normal"
enUS = "\"You called me for that? There's nothing! No roof, no wall, nothing!\"  \n-A builder beaver"
zhCN = "“你让我来这里是为了这个？什么都没有！没有屋顶，没有墙，什么都没有！”  \n- 一只建造者海狸"
zhTW = "「你叫我來做這個？什麼都沒有！沒有屋頂，沒有牆壁，什麼都沒有！」  \n- 一隻建築者海狸"
ruRU = "\"Вы меня за этим позвали? Здесь ничего нет! Ни крыши, ни стен, ничего!\"  \n- Бобёр-строитель"
jaJP = "「そのために呼んだの？何もない！屋根も壁も、何も！」 \n-ビーバーの建設者"
frFR = "\"Vous m'avez appelé pour ça ? Il n'y a rien ! Pas de toit, pas de mur, rien !\"\n -Un castor constructeur"
deDE = "„Du hast mich dafür gerufen? Es gibt nichts! Kein Dach, keine Wände, nichts!“  \n- Ein bauender Biber"
plPL = "\"Wołałeś mnie po to? Tu nic nie ma! Brakuje dachu, ścian, nic!\"  \n- Bóbr budowniczy"
ptBR = "\"Você me chamou por isso? Não tem nada! Nenhum telhado, nenhuma parede, nada!\"  \n-Um castor construtor"
koKR = "\"이걸 위해 나를 불렀어? 아무것도 없어! 지붕도 없고, 벽도 없고, 아무것도 없어!\"  \n- 한 건축 비버"
csCZ = "\"To jsi mě kvůli tomu zavolal? Nic tu není! Žádná střecha, žádná zeď, nic!\"  \n- Stavitel bobr"
viVN = "\"Bạn gọi tôi để làm gì chứ? Không có gì cả! Không có mái, không có tường, chẳng có gì!\"  \n- Một con bé xếp xây dựng"

