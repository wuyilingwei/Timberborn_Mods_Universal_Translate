["Lapantouflemagic.Factory.FlavorDescription"]
raw = "\"If you need an anvil to make other anvils, where does the first anvil come from?\"\n -Armok, metalworker beaver"
status = "normal"
enUS = "\"If you need an anvil to make other anvils, where does the first anvil come from?\"  \n-Armok, metalworker beaver"
zhCN = "“如果你需要一个铁砧来制造其他铁砧，第一个铁砧来自哪里？”  \n-阿莫克，金属工狸"
zhTW = "「如果你需要一個鐵砧來製作其他鐵砧，那麼第一個鐵砧來自哪裡？」  \n-阿莫克，金屬工匠狸"
ruRU = "\"Если вам нужен кузнечный молот, чтобы сделать другие кузнечные молоты, откуда пришёл первый кузнечный молот?\"  \n- Армок, металлообрабатывающий бобёр"
jaJP = "「他の鉄床を作るために鉄床が必要なら、最初の鉄床はどこから来たの？」  \n- アルモク、金属加工ビーバー"
frFR = "\"Si vous avez besoin d'une enclume pour fabriquer d'autres enclumes, d'où vient la première enclume ?\"\n -Armok, castor métallurgiste"
deDE = "„Wenn du einen Hammer brauchst, um andere Hämmer zu machen, woher kommt dann der erste Hammer?“  \n-Armok, der Metallarbeiter-Biber"
plPL = "„Jeśli potrzebujesz kowadła, aby wykonać inne kowadła, skąd pochodzi pierwsze kowadło?”  \n -Armok, bobrzy metalowiec"
ptBR = "\"Se você precisa de uma bigorna para fazer outras bigornas, de onde vem a primeira bigorna?\"\n -Armok, castor trabalhador do metal"
koKR = "\"다른 모루를 만들기 위해 모루가 필요하다면, 첫 번째 모루는 어디에서 오는 것인가?\"  \n- 암록, 금속공 비버"
csCZ = "\"Pokud potřebujete kovadlinu na výrobu dalších kovadlin, odkud se bere první kovadlina?\"  \n– Armok, kovář bobr"
viVN = "Nếu bạn cần một cái đe để làm ra những cái đe khác, thì cái đe đầu tiên từ đâu mà có?\"\n -Armok, người thợ kim loại cá beaver"

