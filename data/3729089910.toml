plPL = "Mocna prasa do wyciskania oleju z nasion lub soku z owoców. <color=#00FFFF>Działa jak tama</color>"
ptBR = "Uma prensa forte para extrair óleo de sementes ou suco de frutas. <color=#00FFFF>Funciona como uma Muralha</color>"
koKR = "씨앗에서 기름을 추출하거나 과일에서 주스를 짜내는 강력한 프레스입니다.\n<color=#00FFFF>제방처럼 작동합니다</color>"
