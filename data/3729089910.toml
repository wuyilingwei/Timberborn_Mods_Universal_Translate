["Lapantouflemagic.TameBrambles.FlavorDescription"]
raw = "\"What wouldn't beaverkind do for something to spice up life?\""
status = "normal"
enUS = "\"What wouldn't beaverkind do for something to spice up life?\""
zhCN = "“海狸们为了让生活增添点乐趣会做些什么呢？”"
zhTW = "「海狸族為了增添生活的色彩會做什麼呢？」"
ruRU = "\"На что только не пойдут бобры, чтобы добавить остроты в свою жизнь?\""
jaJP = "「ビーバーたちは、人生にスパイスを加えるために何をしないでしょうか？」"
frFR = "\"Que ne ferait pas la castor pour pimenter la vie ?\""
deDE = "„Was würde das Biberkind nicht tun, um das Leben ein wenig aufzupeppen?“"
plPL = "\"Czego nie zrobiłby bóbr, aby urozmaicić swoje życie?\""
ptBR = "\"O que os castores não fariam por algo que tornasse a vida mais interessante?\""
koKR = "\"비버 종족은 삶에 활기를 불어넣기 위해 무엇이든 할 것입니다!\""
csCZ = "\"Co by bobří druh udělal pro něco, co by oživilo život?\""
viVN = "\"Cái gì mà loài hải ly không làm để mang lại gia vị cho cuộc sống?\""

