["Lapantouflemagic.Woodburner.FlavorDescription"]
raw = "\"Oh, that would be a great way to get rid of... uhh... sawdust! Yes, sawdust... of course.\"\n -Jack the Gnawer"
status = "normal"
enUS = "\"Oh, that would be a great way to get rid of... uhh... sawdust! Yes, sawdust... of course.\"  \n-Jack the Gnawer"
zhCN = "“哦，这将是处理…呃…锯末的好办法！是的，锯末…当然。”  \n- 啃咬者杰克"
zhTW = "「哦，那真是一個擺脫……呃……鋸屑的好方法！是的，鋸屑……當然。」  \n- 掘齒者傑克"
ruRU = "\"О, это был бы отличный способ избавиться от... эмм... опилок! Да, опилок... конечно.\"  \n- Джек Ниблер"
jaJP = "「おお、それは... えっと... 木屑を処理するいい方法になるでしょう！そう、木屑...もちろん。」  \n- 噛みつきジャック"
frFR = "\"Oh, ce serait une excellente façon de se débarrasser de... euh... la sciure de bois ! Oui, la sciure de bois... bien sûr.\"  \n -Jack le Rongeur"
deDE = "\"Oh, das wäre eine großartige Möglichkeit, um... äh... Sägemehl loszuwerden! Ja, Sägemehl... natürlich.\" -Jack der Nager"
plPL = "„Och, to byłby świetny sposób na pozbycie się... ehh... trociny! Tak, trociny... oczywiście.”  \n-Jack Gnawer"
ptBR = "\"Oh, isso seria uma ótima maneira de se livrar de... uhh... serragem! Sim, serragem... é claro.\"  \n-Jack, o Roedor"
koKR = "\"아, 그건... 음... 톱밥을 없애는 좋은 방법이겠군요! 네, 톱밥... 물론이죠.\"  \n- 잭 더 노워"
csCZ = "„Oh, to by byl skvělý způsob, jak se zbavit... ehm... pilin! Ano, pilin... samozřejmě.“  \n-Jack Hlodavec"
viVN = "\"Ôi, đó sẽ là một cách tuyệt vời để tống khứ... ờ... bụi gỗ! Đúng rồi, bụi gỗ... tất nhiên.\" -Jack the Gnawer"

