["Lapantouflemagic.RiverBath.Description"]
raw = "A communal space for many beavers to meet and wash themselves after a long work day."
status = "normal"
enUS = "A communal space for many beavers to meet and wash themselves after a long work day."
zhCN = "“一个供许多海狸聚会和在长时间工作后洗澡的公共空间。”"
zhTW = "一個供許多海狸聚會和在辛苦工作一天後洗澡的公共空間。"
ruRU = "Общественное пространство для многих бобров, чтобы встретиться и помыться после долгого рабочего дня."
jaJP = "「長い作業日の後に多くのビーバーが集まり、体を洗うための共同スペース。」"
frFR = "Un espace communautaire pour que de nombreux castors se rencontrent et se lavent après une longue journée de travail."
deDE = "Ein gemeinschaftlicher Raum für viele Biber, um sich nach einem langen Arbeitstag zu treffen und zu waschen."
plPL = "Wspólna przestrzeń dla wielu bobrów, aby spotkać się i umyć po długim dniu pracy."
ptBR = "Um espaço comunitário para muitos castores se encontrarem e se lavarem após um longo dia de trabalho."
koKR = "긴 작업 후 많은 비버들이 만나고 씻을 수 있는 공동 공간입니다."
csCZ = "Společný prostor pro mnoho bobrů, aby se setkali a umyli po dlouhém pracovním dni."
viVN = "Một không gian chung để nhiều con hải ly gặp gỡ và tắm rửa sau một ngày làm việc dài."

["Lapantouflemagic.RiverBath.FlavorDescription"]
raw = "\"I want the pink bucket!\" \"No it's mine, I always use it\"\n -Typical kit squabbling"
status = "normal"
enUS = "\"I want the pink bucket!\" \"No, it's mine, I always use it.\" - Typical kit squabbling."
zhCN = "“我想要那个粉色的桶！” “不，它是我的，我一直在用。”  \n- 典型的小孩争吵"
zhTW = "「我想要粉紅色的水桶！」「不，這是我的，我總是用它」 —「典型的小孩爭吵」"
ruRU = "Я хочу розовую ведерко!\" \"Нет, оно моё, я всегда его использую\" - \"Типичное соперничество между малышами"
jaJP = "「ピンクのバケツが欲しい！」 「いや、それは私のだ、いつも使っている」 -典型的なキットの口論"
frFR = "\"Je veux le seau rose !\" \"Non, c'est à moi, je l'utilise toujours\" -Rivalité typique des kits"
deDE = "„Ich will den rosa Eimer!“ „Nein, er gehört mir, ich benutze ihn immer.“ -Typisches Kit-Zankerei"
plPL = "Chcę różową wiaderko!\" \"Nie, to moje, zawsze go używam\" - \"Typowe kłótnie kitów"
ptBR = "Eu quero o balde rosa!\" \"Não, é meu, eu sempre uso\" - \"Briguinha típica de kit"
koKR = "나는 분홍색 양동이를 원해!\" \"아니, 내 거야. 나는 항상 그걸 써\" - \"전형적인 어린이 싸움"
csCZ = "Chci růžový kyblík!\" \"Ne, je můj, já ho vždycky používám\" - \"Typické hádání mezi dětmi"
viVN = "\"Tôi muốn xô hồng!\" \"Không, nó là của tôi, tôi luôn sử dụng nó\" - \"Những cuộc cãi vã kiểu trẻ con\""

