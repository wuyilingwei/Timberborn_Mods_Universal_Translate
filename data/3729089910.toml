["Lapantouflemagic.FarmUpgradeB.FlavorDescription"]
raw = "\"Why do I have to write down how many cabbages we have? Numbers are hard!\"\n -Bobby the fool, on the concept of ''inventory''."
status = "normal"
enUS = "\"Why do I have to write down how many cabbages we have? Numbers are hard!\"  \n-Bobby the fool, on the concept of 'inventory'."
zhCN = "\"我为什么要写下我们有多少卷心菜？数字太难了！\"  \n-傻瓜博比，关于“库存”的概念。"
zhTW = "「為什麼我必須寫下我們有多少捲心菜？數字太難了！」  \n- 傻瓜鮑比，對「庫存」概念的看法。"
ruRU = "\"Почему мне нужно записывать, сколько у нас капусты? Цифры сложны!\"  \n-Бобби, дурачок, о понятии ''инвентарь''."
jaJP = "「なぜキャベツが何個あるかを書かなければならないの？数字は難しい！」  \n- バビー、\"在庫\"の概念について。"
frFR = "\"Pourquoi dois-je écrire combien de choux nous avons ? Les chiffres, c'est difficile !\"  \n-Bobby le fool, sur le concept d''inventaire''."
deDE = "\"Warum muss ich aufschreiben, wie viele Kohlköpfe wir haben? Zahlen sind schwer!\" -Bobby der Narr, über das Konzept des ''Inventars''."
plPL = "\"Dlaczego muszę zapisywać, ile mamy kapusty? Liczby są trudne!\" - Bobby, głupiec, o pojęciu ''inwentaryzacji''."
ptBR = "\"Por que eu tenho que anotar quantos repolhos temos? Números são difíceis!\" - Bobby, o tolo, sobre o conceito de ''inventário''."
koKR = "\"왜 우리가 배추가 몇 개인지 적어야 하죠? 숫자는 어려워요!\"  \n- 바비, '재고' 개념에 대해"
csCZ = "\"Proč musím psát, kolik máme zelí? Čísla jsou těžká!\" -Bobby, blázen, o konceptu ''inventáře''."
viVN = "Tại sao tôi phải viết xuống số lượng bắp cải mà chúng ta có? Số thì khó quá!\"\n -Bobby kẻ ngốc, về khái niệm ''hàng tồn kho''."

