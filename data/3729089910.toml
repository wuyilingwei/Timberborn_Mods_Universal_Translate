["Lapantouflemagic.DamDrain.FlavorDescription"]
raw = "Please do not obstruct the blades with branches, logs, or the bodies of your vanquished enemies."
status = "normal"
enUS = "Please do not obstruct the blades with branches, logs, or the bodies of your vanquished enemies."
zhCN = "“请不要用树枝、木头或你击败的敌人的尸体阻碍刀片。”"
