["Lapantouflemagic.Verydeep_mine_elevator.Description"]
raw = "Allows beavers to go down into the ruins and explore an ancient hooman facility.\nTruly the adventure of a lifetime. What dark secrets will we find down there?"
status = "normal"
enUS = "Allows beavers to go down into the ruins and explore an ancient human facility. Truly the adventure of a lifetime. What dark secrets will we find down there?"
zhCN = "“允许海狸进入废墟，探索一座古老的“人类”设施。\n真是人生的冒险。我们将在那里发现什么黑暗秘密？”"
zhTW = "允許海狸進入遺跡，探索一座古老的人類設施。\n真的是一生中的冒險。我們將在那裡發現什麼黑暗的秘密呢？"
ruRU = "Позволяет бобрам спуститься в руины и исследовать древний объект людей. Настоящее приключение всей жизни. Какие темные секреты мы найдем там внизу?"
jaJP = "ビーバーが遺跡に降りて、古代の人間の施設を探検できるようになります。  \n本当に一生に一度の冒険です。私たちは下でどんな暗い秘密を見つけるのでしょうか？"
frFR = "Permet aux castors de descendre dans les ruines et d'explorer une ancienne installation humaine. \nVéritable aventure d'une vie. Quels sombres secrets trouverons-nous là-bas ?"
deDE = "Ermöglicht es den Bibern, in die Ruinen hinabzusteigen und eine uralte menschliche Einrichtung zu erkunden. Wirklich das Abenteuer eines Lebens. Welche dunklen Geheimnisse werden wir dort unten entdecken?"
plPL = "Pozwala bobrom zstąpić do ruin i zbadać starożytne ludzkie obiekty. Prawdziwa przygoda życia. Jakie mroczne tajemnice znajdziemy tam na dole?"
ptBR = "Permite que os castores desçam às ruínas e explorem uma antiga instalação hooman. Verdadeiramente a aventura de uma vida inteira. Que segredos sombrios encontraremos lá embaixo?"
koKR = "비버들이 유적지로 내려가 고대 인간 시설을 탐험할 수 있게 해줍니다. 진정으로 일생에 단 한 번의 모험입니다. 그곳에서 어떤 어두운 비밀을 발견하게 될까요?"
csCZ = "Umožňuje bobrům sestoupit do ruin a prozkoumat staré lidské zařízení.\nOdpovídá to skutečnému dobrodružství na celý život. Jaká temná tajemství tam najdeme?"
viVN = "Cho phép những con hải ly xuống sâu vào những tàn tích và khám phá một cơ sở cổ xưa của con người. Thực sự là một cuộc phiêu lưu của cả một đời. Những bí mật tăm tối nào sẽ được tìm thấy ở dưới đó?"

