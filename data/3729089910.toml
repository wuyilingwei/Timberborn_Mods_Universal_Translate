frFR = "\"Toujours plus sûr que Mathilda.\" - Dents-Du-Conseil, le castor sage"
deDE = "„Immer noch sicherer als Mathilda.“  \n- Zahnlos der Weise, alter Biber"
plPL = "\"Wciąż bezpieczniejszy niż Mathilda.\" - Bezzębny Mądry, starszy bóbr"
ptBR = "\" ainda mais seguro que a Mathilda.\"  \n- Dente de Leite, o castor sábio"
koKR = "\"수학 필드보다 여전히 안전해.\"  \n- 현명한 이빨 없는 비버, 투슬리스"
