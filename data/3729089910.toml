["Lapantouflemagic.ContaminatedJail.FlavorDescription"]
raw = "\"A jail for beavers made entirely of wood seems a silly idea, but they're just too polite to escape\""
status = "normal"
enUS = "\"A jail for beavers made entirely of wood seems a silly idea, but they're just too polite to escape.\""
zhCN = "“一个完全由木头制成的海狸监狱似乎是个愚蠢的主意，但它们太有礼貌了，不会逃跑。”"
zhTW = "\"一個完全由木頭建成的海狸監獄看起來似乎是一個愚蠢的主意，但它們實在是太有禮貌了，不會逃跑。\""
ruRU = "\"Тюрьма для бобров, сделанная целиком из дерева, кажется глупой идеей, но они просто слишком вежливы, чтобы сбежать.\""
jaJP = "「完全に木で作られたビーバーの刑務所はばかげたアイデアのように思えるが、彼らは脱走するにはあまりにも礼儀正しい。」"
frFR = "\"Une prison pour castors entièrement en bois semble une idée folle, mais ils sont tout simplement trop polis pour s'échapper.\""
deDE = "\"Ein Gefängnis für Biber, das ganz aus Holz besteht, scheint eine alberne Idee zu sein, aber sie sind einfach zu höflich, um zu entkommen.\""
plPL = "\"Więzienie dla bobrów zbudowane całkowicie z drewna wydaje się głupim pomysłem, ale są po prostu zbyt grzeczne, żeby uciekać.\""
ptBR = "\"Uma prisão para castores feita inteiramente de madeira parece uma ideia boba, mas eles são simplesmente educados demais para escaparem.\""
koKR = "\"마음씨 좋은 비버들을 위한 나무로 완전히 만들어진 감옥은 어리석은 아이디어처럼 보이지만, 그들은 도망칠 만큼 무례하지 않습니다.\""
csCZ = "\"Vězení pro bobry vyrobené výhradně ze dřeva se zdá být hloupý nápad, ale jsou prostě příliš slušní na to, aby utekli.\""
viVN = "Một nhà tù cho loài gỗ hoàn toàn bằng gỗ có vẻ là một ý tưởng ngớ ngẩn, nhưng chúng chỉ quá lịch sự để bỏ trốn"

