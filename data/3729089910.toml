["Lapantouflemagic.LumberjackHouse.Description"]
raw = "A tall Lodge that doubles as a working hub for a group of lumberjacks, proper planning increasing their efficacy.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A tall Lodge that doubles as a working hub for a group of lumberjacks, with proper planning increasing their efficiency.  \n<color=#00FFFF>Works as a Levee</color>"
zhCN = "一座高大的旅馆，兼作一群伐木工的工作中心，合理的规划提高了他们的效率。  \n<color=#00FFFF>作为堤坝使用</color>"
zhTW = "一座高大的小屋，不僅是伐木工的工作中心，良好的規劃能提高他們的效率。  \n<color=#00FFFF>作為堤防使用</color>"
ruRU = "Высокий дом, который служит рабочим центром для группы лесорубов, правильное планирование увеличивает их эффективность. <color=#00FFFF>Работает как дамба</color>"
jaJP = "「高いロッジで、材木屋のグループの作業拠点としても機能し、適切な計画によって彼らの効率を高めます。<color=#00FFFF>堤防として機能します</color>」"
frFR = "Une grande cabane qui fait également office de centre de travail pour un groupe de bûcherons, une planification adéquate augmentant leur efficacité.  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Eine hohe Lodge, die zugleich als Arbeitszentrum für eine Gruppe von Holzfällern dient, wobei eine angemessene Planung ihre Effizienz steigert. <color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Wysoka chata, która pełni również funkcję centrum pracy dla grupy drwali, odpowiednie planowanie zwiększa ich efektywność. <color=#00FFFF>Działa jako tamę</color>"
ptBR = "Uma alta Cabana que funciona como um centro de trabalho para um grupo de madeireiros, um planejamento adequado aumenta sua eficácia.\n<color=#00FFFF>Funciona como uma Barragem</color>"
koKR = "나무꾼 그룹을 위한 작업 허브로 사용되는 높은 로지로, 적절한 계획이 그들의 효율성을 높입니다.  \n<color=#00FFFF>제방으로서 작동합니다</color>"
csCZ = "Vysoká chata, která slouží jako pracovní středisko pro skupinu dřevařů, správné plánování zvyšuje jejich efektivitu.  \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một ngôi nhà cao lớn vừa là nơi trú ẩn vừa là trung tâm hoạt động của một nhóm thợ săn gỗ, việc lập kế hoạch hợp lý sẽ tăng cường hiệu quả của họ.\n<color=#00FFFF>Hoạt động như một Đê</color>"

["Lapantouflemagic.LumberjackHouse.FlavorDescription"]
raw = "\"My daddy's the strongest! He can carry a whole sequoia on his back!\"\n -Typical kit boasting"
status = "normal"
enUS = "\"My daddy's the strongest! He can carry a whole sequoia on his back!\" - Typical kid boasting"
zhCN = "“我爸爸是最强的！他能背着整棵红杉！”  \n-典型的小孩自夸"
zhTW = "「我爸爸是最強的！他能把整棵紅杉背在背上！」  \n-典型的炫耀"
ruRU = "\"Мой папа самый сильный! Он может нести целую секвойю на спине!\"  \n-Типичное хвастовство"
jaJP = "「僕のおとうさんは一番強いんだ！彼はセコイアを一つ背負って運べるんだ！」  \n-典型的な自慢"
frFR = "Mon papa est le plus fort ! Il peut porter un séquoia entier sur son dos ! - Típica vantardise d'un enfant."
deDE = "\"Mein Papa ist der Stärkste! Er kann eine ganze Mammutbaum auf seinem Rücken tragen!\" -Typisches Prahlen von Kindern"
plPL = "\"Nasze tatusiowie są najsilniejsi! Mogą nosić całe sekwoje na plecach!\" - Typowa przechwałka"
ptBR = "\"Meu papai é o mais forte! Ele consegue carregar uma sequóia inteira nas costas!\" - Afirmando o típico kit"
koKR = "\"내 아빠가 가장 강해요! 그는 세쿼이아를 통째로 등에 지고 갈 수 있어요!\"  \n- 전형적인 자랑"
csCZ = "Táta je nejsilnější! Může na zádech nosit celou sekvoj!\"  \n\"Typické vychloubání dětí."
viVN = "\"Bố em mạnh nhất! Bố có thể vác cả một cây sequoia trên lưng!\" - Thể hiện sự kiêu hãnh điển hình"

