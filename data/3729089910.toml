["Tutorial.Tutorial.FrostyWhiskers_Tents.FrostyWhiskers"]
raw = "Alertxa0!\n\nTemperature Criticalxa0!\n\nWorkforce at riskxa0!\n\nPrepare emergency accomodation."
status = "normal"
enUS = "Alert!\n\nTemperature Critical!\n\nWorkforce at risk!\n\nPrepare emergency accommodation."
zhCN = "警报！\n\n温度危急！\n\n劳动力处于风险中！\n\n准备紧急住宿。"
zhTW = "警報！\n\n溫度危急！\n\n勞動力處於風險中！\n\n準備緊急住宿。"
ruRU = "Внимание!\n\nКритическая температура!\n\nРабочая сила под угрозой!\n\nПодготовьте аварийное жилье."
jaJP = "警告！\n\n温度が危険な状態です！\n\n労働力が危険にさらされています！\n\n緊急宿泊施設を準備してください。"
frFR = "Alertexa0!\n\nTempérature Critiquexa0!\n\nMain-d'œuvre en dangerxa0!\n\nPréparez un hébergement d'urgence."
deDE = "Alarm!\n\nKritische Temperatur!\n\nArbeitskraft in Gefahr!\n\nBereiten Sie Notunterkünfte vor."
plPL = "Uwaga!\n\nTemperatura krytyczna!\n\nSiła robocza w niebezpieczeństwie!\n\nPrzygotuj awaryjne zakwaterowanie."
ptBR = "Atenção!\n\nTemperatura Crítica!\n\nForça de trabalho em risco!\n\nPrepare acomodações de emergência."
koKR = "경고xa0!\n\n온도 위기xa0!\n\n인력 위험에 처함xa0!\n\n비상 숙소 준비하시오."
csCZ = "Upozornění!\n\nTeplota kritická!\n\nPracovní síla v ohrožení!\n\nPřipravte nouzové ubytování."
viVN = "Cảnh báo!\n\nNhiệt độ nguy cấp!\n\nLực lượng lao động gặp nguy hiểm!\n\nChuẩn bị chỗ ở khẩn cấp."

["Tutorial.Tutorial.FrostyWhiskers_Text2.FrostyWhiskers"]
raw = "Step twoxa0: Oil and Sulfur required long-term.\n\nExplosives in stock. Start Excavation ASAP. Deprioritize."
status = "normal"
enUS = "Step two: Oil and Sulfur required long-term.\n\nExplosives in stock. Start Excavation ASAP. Deprioritize."
zhCN = "第twoxa0步：长期需要石油和硫磺。\n\n库存中有炸药。尽快开始挖掘。降低优先级。"
zhTW = "步驟二：長期需要油和硫磺。\n\n庫存中有炸藥。盡快開始挖掘。降低優先級。"
ruRU = "Шаг два: Необходимо долгосрочное использование масла и серы.\n\nВзрывчатые вещества в наличии. Начинать excavation как можно скорее. Уменьшить приоритет."
jaJP = "ステップ2: 長期的に必要なオイルと硫黄。\n\n爆薬在庫あり。できるだけ早く掘削を開始してください。優先度を下げてください。"
frFR = "Étape deux : Huile et Soufre nécessaires à long terme.\n\nExplosifs en stock. Commencez l'excavation dès que possible. Déprioriser."
deDE = "Schritt zwei: Öl und Schwefel langfristig erforderlich.\n\nSprengstoffe im Vorrat. Beginn der Ausgrabung so schnell wie möglich. Depriorisieren."
plPL = "Krok twoxa0: Wymagana długoterminowo ropa i siarka.\n\nEksplozywy w magazynie. Rozpocznij wykopaliska jak najszybciej. Zdepriorytuj."
ptBR = "Etapa twoxa0: Óleo e enxofre necessários a longo prazo.\n\nExplosivos em estoque. Inicie a escavação o mais rápido possível. Despriorize."
koKR = "단계 두번째: 장기적으로 필요한 오일과 유황.\n\n재고에 폭발물이 있습니다. 가능한 한 빨리 굴착을 시작하세요. 우선 순위를 낮추세요."
csCZ = "Krok dva: Dlouhodobě požadovaný olej a síra.\n\nSklady s výbušninami. Začněte těžbu co nejdříve. Snižte prioritu."
viVN = "Bước hai: Dầu và Lưu huỳnh cần thiết trong thời gian dài.\n\nChất nổ trong kho. Bắt đầu khai thác ngay lập tức. Giảm ưu tiên."

["Tutorial.Tutorial.FrostyWhiskers_Text3.FrostyWhiskers"]
raw = "Step three : Metallic ressources required.\n\nSoil rich, environmental destruction recommended."
status = "normal"
enUS = "Step three: Metallic resources required.\n\nSoil rich, environmental destruction recommended."
zhCN = "第三步：需要金属资源。\n\n土壤丰富，建议进行环境破坏。"
zhTW = "第三步：所需金屬資源。\n\n土壤豐富，建議進行環境破壞。"
ruRU = "Шаг третий: Необходимые металлические ресурсы.\n\nПочва плодородная, рекомендуется разрушение окружающей среды."
jaJP = "ステップ3：必要な金属資源。\n\n土壌が豊かで、環境破壊を推奨します。"
frFR = "Étape trois : Ressources métalliques requises.\n\nSol riche, destruction environnementale recommandée."
deDE = "Schritt drei: Metallische Ressourcen erforderlich.\n\nBodenreich, Umweltzerstörung empfohlen."
plPL = "Krok trzeci: Wymagane zasoby metaliczne.\n\nZiemia bogata, zalecane zniszczenie środowiska."
ptBR = "Passo três: Recursos metálicos necessários.\n\nSolo rico, destruição ambiental recomendada."
koKR = "단계 3: 필요한 금속 자원.\n\n토양이 풍부하며, 환경 파괴가 권장됩니다."
csCZ = "Krok tři: Požadované kovové zdroje.\n\nPůda bohatá, doporučené ničení prostředí."
viVN = "Bước ba: Tài nguyên kim loại cần thiết.\n\nĐất màu mỡ, khuyến nghị phá hủy môi trường."

["Tutorial.Tutorial.FrostyWhiskers_Text4.FrostyWhiskers"]
raw = "Step fourxa0: Restore minimal Electricity and Computing power.\n\nExpelling nuclear waste required, Synthetizer clogged."
status = "normal"
enUS = "Step four: Restore minimal Electricity and Computing power.\n\nExpelling nuclear waste required, Synthesizer clogged."
zhCN = "第四步：恢复最小电力和计算能力。\n\n需要排放核废料，合成器被堵塞。"
zhTW = "第四步：恢復最小的電力和計算能力。\n\n需要排放核廢料，合成器堵塞。"
ruRU = "Шаг четыре: Восстановите минимальную электрическую и вычислительную мощность.\n\nТребуется избавление от ядерных отходов, синтезатор забит."
jaJP = "ステップ4: 最小限の電力と計算能力を復元します。\n\n核廃棄物の排出が必要で、合成装置が詰まっています。"
frFR = "Étape quatre : Rétablir un minimum d'électricité et de puissance de calcul.\n\nÉlimination des déchets nucléaires requise, synthétiseur obstrué."
deDE = "Schritt vier: Minimalen Strom- und Rechenleistung wiederherstellen.\n\nEntsorgung von nuclearer Abfall erforderlich, Synthesizer verstopft."
plPL = "Krok czwarty: Przywróć minimalną moc elektryczną i obliczeniową.\n\nWymagane usunięcie odpadów radioaktywnych, syntezator zablokowany."
ptBR = "Passo quatro: Restaure a eletricidade e o poder computacional mínimos.\n\nÉ necessário expulsar resíduos nucleares, sintetizador entupido."
koKR = "네 번째 단계: 최소 전기 및 컴퓨팅 파워 복구.\n\n핵 폐기물 배출 필요, 합성기가 막힘."
csCZ = "Krok čtyři: Obnovte minimální elektrickou a výpočetní energii.\n\nVyžaduje se odstranění jaderného odpadu, syntetizátor ucpaný."
viVN = "Bước bốn: Khôi phục điện năng và sức mạnh tính toán tối thiểu.\n\nCần giải phóng chất thải hạt nhân, máy tổng hợp bị tắc."

["Tutorial.Tutorial.FrostyWhiskers_Text5.FrostyWhiskers"]
raw = "Self-destruction countdown irreversiblexa0! Emergencyxa0!\n\nErect supplementary network tower and charging station.\n\nDrones are mission-critical. Biologicals are not."
status = "normal"
enUS = "Self-destruction countdown irreversible! Emergency!\n\nErect supplementary network tower and charging station.\n\nDrones are mission-critical. Biologicals are not."
zhCN = "自毁倒计时不可逆转！紧急！\n\n建立补充网络塔和充电站。\n\n无人机是任务关键。生物单位不是。"
zhTW = "自毀倒計時不可逆！緊急！\n\n豎立補充網路塔和充電站。\n\n無人機是任務關鍵。生物則不是。"
ruRU = "Обратный отсчет самоуничтожения необратимxa0! Аварийнаяxa0!\n\nУстановите дополнительную вышку и зарядную станцию.\n\nДроны имеют критическое значение для миссии. Биологические существа - нет."
jaJP = "自己破壊カウントダウンは取り消し不可です！緊急事態！\n\n補助ネットワークタワーと充電ステーションを設置してください。\n\nドローンはミッションクリティカルです。生物はそうではありません。"
frFR = "Compteur à rebours d'autodestruction irréversiblexa0! Urgencexa0!\n\nÉrigez une tour de réseau supplémentaire et une station de charge.\n\nLes drones sont essentiels à la mission. Les biologiques ne le sont pas."
deDE = "Selbstzerstörungs-Countdown irreversibelxa0! Notfallxa0!\n\nErrichten Sie einen zusätzlichen Netzwerkturm und eine Ladestation.\n\nDrohnen sind missionskritisch. Organismen sind es nicht."
plPL = "Odwrotna liczba samozniszczenia! Awaria!\n\nWybuduj uzupełniającą wieżę sieciową i stację ładującą.\n\nDrony są niezbędne do misji. Organiczne nie są."
ptBR = "Contagem regressiva para autodestruição irreversível! Emergência!\n\nErga uma torre de rede suplementar e uma estação de carga.\n\nDrones são essenciais para a missão. Biológicos não são."
koKR = "자기 파괴 카운트다운 취소 불가능! 긴급!\n\n보조 네트워크 타워와 충전소를 세우세요.\n\n드론은 임무에 필수적입니다. 생물체는 그렇지 않습니다."
csCZ = "Odpočet k sebedestrukci nevratný! Nouze!\n\nPostavte doplňkovou síťovou věž a nabíjecí stanici.\n\nDrony jsou kritické pro misi. Biologičtí nejsou."
viVN = "Đếm ngược tự hủy không thể đảo ngượcxa0! Khẩn cấpxa0!\n\nXây dựng tháp mạng bổ sung và trạm sạc.\n\nMáy bay không người lái là thiết yếu cho nhiệm vụ. Sinh vật là không cần thiết."

["Tutorial.Tutorial.FrostyWhiskers_Text6.FrostyWhiskers"]
raw = "Machine brain takeover of essential functions complete.\n\nRestore manufacturing capabilities.\n\nNanomachines required for Bot maintenance."
status = "normal"
enUS = "Machine brain takeover of essential functions complete.\n\nRestore manufacturing capabilities.\n\nNanomachines required for Bot maintenance."
zhCN = "“机器大脑接管基本功能完成。\n\n恢复制造能力。\n\n机器人维护所需纳米机器。”"
zhTW = "機器大腦接管基本功能完成。\n\n恢復生產能力。\n\n維護機器人需要納米機器。"
ruRU = "Захват основных функций машинным разумом завершён.\n\nВосстановите производственные возможности.\n\nДля обслуживания Ботов требуются наномашины."
jaJP = "機械の脳による重要機能の掌握が完了しました。\n\n製造能力を復元します。\n\nボットのメンテナンスにはナノマシンが必要です。"
frFR = "Prise de contrôle du cerveau de la machine des fonctions essentielles terminée.\n\nRestaurer les capacités de fabrication.\n\nDes nanomachines sont nécessaires pour l'entretien des bots."
deDE = "Übernahme der wesentlichen Funktionen durch die Maschinenintelligenz abgeschlossen.\n\nHerstellungsfähigkeiten wiederherstellen.\n\nNanomaschinen für die Wartung der Bots erforderlich."
plPL = "Przejęcie funkcji podstawowych przez mózg maszyny zakończone.\n\nPrzywróć zdolności produkcyjne.\n\nNanomaszyny wymagane do konserwacji botów."
ptBR = "Tomada de controle do cérebro da máquina das funções essenciais concluída.\n\nRestaurar capacidades de fabricação.\n\nNanomáquinas necessárias para a manutenção do Bot."
koKR = "기계 두뇌가 필수 기능을 인수했습니다.\n\n제조 기능을 복원하십시오.\n\n로봇 유지 관리를 위한 나노 기계가 필요합니다."
csCZ = "Převzetí základních funkcí strojovým mozkem bylo dokončeno.\n\nObnovte výrobní schopnosti.\n\nPro údržbu robotů jsou vyžadovány nanostroje."
viVN = "Cuộc chiếm đoạt chức năng thiết yếu của bộ não máy đã hoàn tất.\n\nKhôi phục khả năng sản xuất.\n\nCần nanomachines để bảo trì Bot."

["Tutorial.Tutorial.FrostyWhiskers_Text7.FrostyWhiskers"]
raw = "Survival temporarily achieved, Central AI not responding.\n\nSurvive."
status = "normal"
enUS = "Survival temporarily achieved, Central AI not responding.\n\nSurvive."
zhCN = "生存暂时达成，中央人工智能未响应。\n\n生存。"
zhTW = "暫時達成生存，中央人工智慧無回應。\n\n生存。"
ruRU = "Выживание временно достигнуто, Центральный ИИ не отвечает.\n\nВыживать."
jaJP = "一時的に生存が達成されました。中央AIが応答していません。\n\n生き延びろ。"
frFR = "Survie temporairement atteinte, IA centrale ne répond pas.\n\nSurvivre."
deDE = "Überleben vorübergehend erreicht, zentrale KI reagiert nicht.\n\nÜberlebe."
plPL = "Przetrwanie tymczasowo osiągnięte, Centralna Sztuczna Inteligencja nie odpowiada.\n\nPrzetrwaj."
ptBR = "Sobrevivência temporariamente alcançada, IA Central não respondendo.\n\nSobreviva."
koKR = "임시 생존 달성, 중앙 AI 응답 없음.\n\n생존하라."
csCZ = "Dočasně zabezpečeno přežití, centrální AI nereaguje.\n\nPřežijte."
viVN = "Sống sót tạm thời đã đạt được, AI Trung tâm không phản hồi.\n\nSống sót."

