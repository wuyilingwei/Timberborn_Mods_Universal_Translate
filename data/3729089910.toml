["Lapantouflemagic.FarmUpgradeA.FlavorDescription"]
raw = "\"Working from home can sure be convenient, but once you start to have kits running around everywhere, a separate office is much better\"\n -A builder beaver"
status = "normal"
enUS = "\"Working from home can sure be convenient, but once you start to have kits running around everywhere, a separate office is much better.\"  \n-A builder beaver"
zhCN = "“在家工作确实很方便，但一旦有小松鼠到处乱跑，单独的办公室就要好得多。”  \n- 一只建筑师海狸"
zhTW = "「在家工作確實很方便，但一旦開始有小孩到處亂跑，獨立的辦公室就好得多了。」  \n- 一隻建築海狸"
ruRU = "\"Работа из дома действительно может быть удобной, но как только у вас начинают бегать повсюду малыши, отдельный офис становится гораздо лучше.\"  \n- Строитель-бобер"
jaJP = "\"自宅で働くのは便利ですが、子供たちがあちこちで走り回り始めると、別のオフィスの方がずっといいです。\" - ビルダーリス"
frFR = "\"Travailler de chez soi peut être très pratique, mais une fois que vous avez des kits qui courent partout, avoir un bureau séparé est bien mieux.\"  \n-Un castor constructeur"
deDE = "„Von zu Hause aus zu arbeiten, kann wirklich praktisch sein, aber sobald man überall herumrennende Kits hat, ist ein separates Büro viel besser.“ -Ein Bau-Biber"
plPL = "„Praca zdalna może być bardzo wygodna, ale gdy w domu zaczynają biegać dzieci, osobne biuro jest znacznie lepsze.\"  \n-A beaver budowniczy"
ptBR = "\"Trabalhar em casa pode ser bastante conveniente, mas assim que começam a ter filhotes correndo por toda parte, um escritório separado é muito melhor.\" \n-Um castor construtor"
koKR = "\"재택근무는 확실히 편리할 수 있지만, 언제든지 곳곳에서 아기들이 뛰어다니기 시작하면 별도의 사무실이 훨씬 좋습니다.\" - 건축 비버"
csCZ = "\"Pracovat z domova může být jistě pohodlné, ale jakmile se kolem začnou motat malá kůzlata, je mnohem lepší mít samostatnou kancelář.\" - Stavitel bobr"
viVN = "\"Làm việc tại nhà có thể rất tiện lợi, nhưng khi bạn bắt đầu có những chú thú con chạy khắp nơi, một văn phòng riêng sẽ tốt hơn nhiều.\"  \n- Một chú nhím thợ xây"

