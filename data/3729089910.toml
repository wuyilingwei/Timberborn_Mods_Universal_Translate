["Lapantouflemagic.NuclearWasteCollector.Description"]
raw = "Sends down the abyss a team of beavers specialized in recovering the strange warm stuff the hoomans buried down there so long ago, so that it can be refined again into something useful."
status = "normal"
enUS = "Sends down the abyss a team of beavers specialized in recovering the strange warm stuff the humans buried down there so long ago, so that it can be refined again into something useful."
zhCN = "“派遣一队专门回收人类很久以前埋在深渊中的奇怪温暖物质的海狸，以便将其再次提炼成有用的东西。”"
zhTW = "派遣一組專門回收人類很久以前埋在深淵中的奇怪暖物質的海狸隊，將其重新精煉成有用的東西。"
ruRU = "Отправляет в бездну команду бобров, специализированных на извлечении странного теплого вещества, которое человеки закопали там так давно, чтобы его можно было переработать в что-то полезное."
jaJP = "「長い間そこに埋められていた不思議な暖かい物質を回収することに特化したビーバーのチームを深淵に送り、再び役立つものに精製するための作業を行います。」"
frFR = "Envoie dans l'abîme une équipe de castors spécialisés dans la récupération de la étrange matière chaude que les humains y ont enterrée il y a si longtemps, afin qu'elle puisse être à nouveau raffinée en quelque chose d'utile."
deDE = "Schickt ein Team von Bibern in den Abgrund, das darauf spezialisiert ist, das seltsame warme Zeug, das die Menschen dort so lange begraben haben, wieder zu holen, damit es erneut in etwas Nützliches verfeinert werden kann."
plPL = "Wysyła w otchłań zespół bobrów specjalizujących się w odzyskiwaniu dziwnej, ciepłej substancji, którą ludzie pochowali tam tak dawno temu, aby mogła zostać ponownie przetworzona w coś użytecznego."
ptBR = "Envia para o abismo uma equipe de castores especializados em recuperar a estranha substância quente que os humanos enterraram lá embaixo há tanto tempo, para que possa ser refinada novamente em algo útil."
koKR = "오래전 호먼이 그곳에 묻어두었던 이상한 따뜻한 물질을 회수하는 데 특화된 비버 팀을 심연으로 보내어 다시 유용한 것으로 정제될 수 있도록 합니다."
csCZ = "Posílá do propasti tým bobrů specializovaných na získávání podivné teplé hmoty, kterou lidé před tak dlouhou dobou pohřbili, aby mohla být znovu rafinována na něco užitečného."
viVN = "Gửi xuống vực thẳm một đội hải ly chuyên phục hồi những vật chất ấm áp kỳ lạ mà con người đã chôn dưới đó từ rất lâu, để chúng có thể được tinh chế thành thứ gì đó hữu ích."

["Lapantouflemagic.NuclearWasteCollector.FlavorDescription"]
raw = "\"Exploring? No no no... that's not my job, I do this one because I don’t want to be killed by some devious thing I can’t see.\""
status = "normal"
enUS = "\"Exploring? No no no... that's not my job, I do this one because I don’t want to be killed by some devious thing I can’t see.\""
zhCN = "“探险？不不不……那不是我的工作，我这样做是因为我不想被一些我看不见的狡诈东西杀掉。”"
zhTW = "「探索？不不不……那不是我的工作，我這樣做是因為我不想被某些我看不見的狡猾東西殺死。」"
ruRU = "\"Исследовать? Нет-нет-нет... это не моя работа, я делаю это, потому что не хочу быть убитым какой-то коварной штукой, которую не вижу.\""
jaJP = "「探検？いいえ、いいえ、それは私の仕事ではありません。私は見えない何かに殺されないためにこれをやっています。」"
frFR = "«Explorer ? Non non non... ce n'est pas mon travail, je fais ça parce que je ne veux pas être tué par une chose sournoise que je ne peux pas voir.»"
deDE = "Erforschen? Nein, nein, nein... das ist nicht mein Job, ich mache das hier, weil ich nicht von irgendeinem hinterhältigen Ding getötet werden will, das ich nicht sehen kann."
plPL = "Eksploracja? Nie, nie, nie... to nie moje zadanie, robię to, bo nie chcę być zabity przez jakąś podłą rzecz, której nie widzę."
ptBR = "\"Explorando? Não, não, não... esse não é meu trabalho, eu faço isso porque não quero ser morto por alguma coisa maliciosa que eu não consigo ver.\""
koKR = "\"탐험하는 거요? 아니 아니... 그건 내 일이 아니에요, 저는 보이지 않는 악당에게 죽고 싶지 않아서 이 일을 하는 거예요.\""
csCZ = "\"Prozkoumávání? Ne, ne, ne... to není moje práce, toto dělám, protože nechci být zabit nějakou záludnou věcí, kterou nemohu vidět.\""
viVN = "Khám phá? Không không không... đó không phải công việc của tôi, tôi làm việc này vì tôi không muốn bị giết bởi một điều xảo quyệt mà tôi không thể thấy."

