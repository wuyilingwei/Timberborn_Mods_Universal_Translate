["Lapantouflemagic.MechanizedSeaweedfarm.Description"]
raw = "A complex device that masterfully transforms mechanical power into tasty food. \nConsumes wood for maintenance."
status = "normal"
enUS = "A complex device that masterfully transforms mechanical power into tasty food. Consumes wood for maintenance."
zhCN = "一种复杂的装置，巧妙地将机械动力转化为美味食品。  \n消耗木材进行维护。"
zhTW = "一個複雜的裝置，巧妙地將機械能轉化為美味食物。  \n維護時消耗木材。"
ruRU = "Сложное устройство, которое мастерски преобразует механическую энергию в вкусную еду. Потребляет древесину для обслуживания."
jaJP = "複雑な装置が機械的な力を巧みに美味しい食べ物に変える。  \nメンテナンスのために木材を消費します。"
frFR = "Un appareil complexe qui transforme habilement la puissance mécanique en nourriture savoureuse. Consomme du bois pour l'entretien."
deDE = "Ein komplexes Gerät, das mechanische Energie meisterhaft in köstliche Nahrung umwandelt. \nVerbraucht Holz für die Wartung."
plPL = "„Złożone urządzenie, które mistrzowsko przekształca moc mechaniczną w smaczne jedzenie. Wymaga drewna do utrzymania.”"
ptBR = "Um dispositivo complexo que transforma magistralmente energia mecânica em comida saborosa. Consome madeira para manutenção."
koKR = "기계적 힘을 맛있는 음식으로 능숙하게 변환하는 복잡한 장치입니다. 유지 보수를 위해 나무를 소모합니다."
csCZ = "Složitý stroj, který mistrovsky přetváří mechanickou energii na lahodné jídlo. \nSpotřebovává dřevo na údržbu."
viVN = "Một thiết bị phức tạp biến hóa sức mạnh cơ khí thành thực phẩm ngon miệng một cách tài tình. \nTiêu thụ gỗ cho việc bảo trì."

["Lapantouflemagic.MechanizedSeaweedfarm.FlavorDescription"]
raw = "\"The first rule of beaver engineering is to not look too closely at the mechanism\"\n -Grandpa beaver, on what happened to his whiskers."
status = "normal"
enUS = "\"The first rule of beaver engineering is to not look too closely at the mechanism\" -Grandpa Beaver, on what happened to his whiskers."
zhCN = "“海狸工程的第一条规则是不要过于仔细地观察机制”  \n- 海狸爷爷，关于他的胡须发生了什么。"
zhTW = "「河狸工程學的第一條法則就是不要過於細看這個機械」  \n- 河狸爺爺談到他鬍鬚的事情。"
ruRU = "\"Первое правило бобрового машиностроения — не вглядываться слишком внимательно в механизм.\"\n -Дедушка бобёр, рассказывая о том, что произошло с его усами."
jaJP = "「ビーバー工学の第一のルールは、機構をじっくり見ないことだ」  \n- おじいちゃんビーバー、彼のひげに何が起こったかについて。"
frFR = "\"La première règle de l'ingénierie des castors est de ne pas regarder de trop près le mécanisme\"  \n- Papi castor, sur ce qui est arrivé à ses moustaches."
deDE = "\"Die erste Regel der Bibertechnik ist, nicht zu genau auf den Mechanismus zu schauen.\"  \n- Opa Biber, über das, was mit seinen Schnurrhaaren passiert ist."
plPL = "\"Pierwszą zasadą inżynierii bobrów jest, aby nie przyglądać się zbyt dokładnie mechanizmowi.\"  \n-Dziadek bóbr, o tym, co stało się z jego wąsami."
ptBR = "\"A primeira regra da engenharia dos castores é não olhar muito de perto para o mecanismo\"  \n- Vovô castor, sobre o que aconteceu com seus bigodes."
koKR = "\"비버 공학의 첫 번째 규칙은 메커니즘을 너무 자세히 들여다보지 않는 것입니다.\"  \n- 할아버지 비버, 그의 수염에 일어난 일에 대해."
csCZ = "\"První pravidlo bobřího inženýrství je nedívat se příliš zblízka na mechanismus.\"  \n- Dědeček bobr, o tom, co se stalo s jeho fousy."
viVN = "\"Quy tắc đầu tiên của kỹ thuật hải ly là không nhìn quá kỹ vào cơ chế.\"  \n- Ông nội hải ly, về chuyện đã xảy ra với bộ râu của mình."

["Lapantouflemagic.NEWPaperMill.Description"]
raw = "A mechanized paper factory.\nOccasionally breaks a gear.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A mechanized paper factory. Occasionally breaks a gear. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一个机械化的造纸厂。  \n偶尔会损坏一个齿轮。  \n<color=#00FFFF>作为堤坝工作</color>"
zhTW = "一座機械化的造紙廠。  \n偶爾會損壞一個齒輪。  \n<color=#00FFFF>作為堤壩運作</color>"
ruRU = "Механизированная бумажная фабрика. Occasionally breaks a gear. <color=#00FFFF>Работает как дамба</color>"
jaJP = "機械式の製紙工場。\n時折、ギアが壊れます。\n<color=#00FFFF>堤防として機能します</color>"
frFR = "Une usine de papier mécanisée.  \nParfois, une roue dentée se casse.  \n<color=#00FFFF>Fonctionne comme un barrage</color>"
deDE = "Eine mechanisierte Papierfabrik. \nGeht gelegentlich ein Zahnrad kaputt. \n<color=#00FFFF>Funktioniert wie ein Damm</color>"
plPL = "Zmechanizowana fabryka papieru. Czasami łamie zębatkę. <color=#00FFFF>Działa jak tama</color>"
ptBR = "Uma fábrica de papel mecanizada.  \nOcasionalmente quebra uma engrenagem.  \n<color=#00FFFF>Funciona como uma Barreira</color>"
koKR = "기계화된 종이 공장입니다.\n가끔 기어가 부러집니다.\n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Mechanizovaná papírna. Občas se rozbije ozubené kolo. <color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một nhà máy giấy cơ giới.\nThỉnh thoảng bị hỏng bánh răng.\n<color=#00FFFF>Hoạt động như một con đê</color>"

