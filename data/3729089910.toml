["Lapantouflemagic.ZiplineTerminusBalloon.DisplayName"]
new = "Terminal Floating Zipline Pylon"
status = "normal"

["Lapantouflemagic.ZiplineTerminusBalloon.Description"]
new = "A balloon bearing the zipline cables in between stations.\nAllows beavers to access the floor to work.\n<color=green>Connections: 1</color>\n<color=red>Allows movement but does not connect roads.</color>"
status = "normal"

["Lapantouflemagic.ZiplineTerminusBalloon.FlavorDescription"]
new = "\"It could be fun to jump in a lake from here...\"\n -Toothless the Wise, elder beaver"
status = "normal"

["Lapantouflemagic.ScavengerDen.DisplayName"]
new = "Scavenger's Junkyard"
status = "normal"

["Lapantouflemagic.ScavengerDen.Description"]
new = "An oversized shredder that is also a house for obvious reasons.\nProvides scavenger beavers with the perfect place to plan their work, prepare their equipment, and recycle all the trash those pesky hoomans left behind.\nAlso gives access to the <color=green>zipline network</color> to maximize working range.\n<color=green>Connections: 6</color>\n<color=#00FFFF>Works as a Levee</color>\n<color=red>Can connect from the bottom to a ladder or pit-and-ladder lodge.</color>"
status = "normal"

["Lapantouflemagic.ScavengerDen.FlavorDescription"]
new = "\"Please keep in mind that injuries caused by pitfalls, swinging blades, boulder traps and poisoned darts are not covered by the insurance company.\nHave a nice scavenging day!\"\n-Toilet reminder sign"
status = "normal"

["Lapantouflemagic.Zipline_SmallTower.Description"]
new = "A quick and terrifying mode of travel.\n<color=#FFA500>Small Tower</color>, <color=#FF6EC7>Can support upgrades</color>\n<color=green>Connections: 2</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"

["Lapantouflemagic.Zipline_SmallTower.FlavorDescription"]
new = "\"A bench just a few meters under some flowerpots? This seems like the perfect place for an… accident.\"\n-Jack the Gnawer, public safety report."
status = "normal"

["Reciepe.ZiplineSystemDuplication.DisplayName"]
new = "Zipline System"
status = "normal"

["Lapantouflemagic.SmallAquiferPump.DisplayName"]
new = "Small Aquifer Pump"
status = "normal"

["Lapantouflemagic.SmallAquiferPump.Description"]
new = "A perverse contraption using arcane powers to extract water from the ground.\nIs affected by droughts but not by badtides.\nTo be placed on top of two adjacent <color=#FF6EC7>triangle roof</color> buildings.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"

["Lapantouflemagic.SmallAquiferPump.FlavorDescription"]
new = "\"It is written on the user manual that only a one-legged brass-colored beaver, dancing under the full moon in the middle of twelve Ironteeth statuettes wrapped in cabbage, shall open the security cache and allow to press the start button.\n -A very gullible waterpumper beaver."
status = "normal"

["Lapantouflemagic.BIGAquiferPump.DisplayName"]
new = "Large Aquifer Pump"
status = "normal"

["Lapantouflemagic.BIGAquiferPump.Description"]
new = "A devilish engine of witchcraft, torturing the earth for ever more water, powered by the Pointer knows what."
status = "normal"

["Lapantouflemagic.BIGAquiferPump.FlavorDescription"]
new = "\"If we build it atop a volcano, would lava come out?\"\n -An architect beaver"
status = "normal"

