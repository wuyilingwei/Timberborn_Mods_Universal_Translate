["Tutorial.Tutorial.WelcomeText.FrostyWhiskers"]
new = "Awaken, Controllerxa0!\n\nReactor failing.\n\nFuel supply critical.\n\nSelf-destruction engaged.\n\nReleasing emergency drones. \n\nThawing survivors (31147 remaining).\n\nBase cannibalization allowed.\n\n\nMissionxa0: transfer essential infrastructure outside."
status = "normal"

["Tutorial.Tutorial.FrostyWhiskers_Text1.FrostyWhiskers"]
new = "Step onexa0: Collect ressources from the environment.\n\nPines detectedxa0; Bring resin to the Bunker for conversion into Plastic\n\nHarvest other ressources to occupy workforce if idle."
status = "normal"

["Tutorial.Tutorial.FrostyWhiskers_Text2.FrostyWhiskers"]
new = "Step twoxa0: Oil and Sulfur required long-term.\n\nExplosives in stock. Start Excavation ASAP. Deprioritize."
status = "normal"

["Tutorial.Tutorial.FrostyWhiskers_Text3.FrostyWhiskers"]
new = "Step three : Metallic ressources required.\n\nSoil rich, environmental destruction recommended."
status = "normal"

["Tutorial.Tutorial.FrostyWhiskers_Text4.FrostyWhiskers"]
new = "Step fourxa0: Restore minimal Electricity and Computing power.\n\nExpelling nuclear waste required, Synthetizer clogged."
status = "normal"

["Tutorial.Tutorial.FrostyWhiskers_Text5.FrostyWhiskers"]
new = "Self-destruction countdown irreversiblexa0! Emergencyxa0!\n\nErect supplementary network tower and charging station.\n\nDrones are mission-critical. Biologicals are not."
status = "normal"

["Tutorial.Tutorial.FrostyWhiskers_Text6.FrostyWhiskers"]
new = "Machine brain takeover of essential functions complete.\n\nRestore manufacturing capabilities.\n\nNanomachines required for Bot maintenance."
status = "normal"

["Tutorial.Tutorial.FrostyWhiskers_Text7.FrostyWhiskers"]
new = "Survival temporarily achieved, Central AI not responding.\n\nSurvive."
status = "normal"

["Faction.FrostyWhiskers.DisplayName"]
new = "The FrostyWhiskers"
status = "normal"

["Faction.FrostyWhiskers.Description"]
new = "\n\n\n\n\n\n\n\n<color=red>xa0!!! ACTIVATE THE TUTORIALxa0!!!</color>\nRobots awaken from their deep slumber. \nThe world is covered with ice.\nClean water is still nothing more than a fleeting illusion.\nYour existance is at risk.\n\nBio-beavers are useful workforce, but the bots are the main players here.\nWill you manage to survive this frozen landscapexa0?\n<color=red>xa0!!! ACTIVATE THE TUTORIALxa0!!!</color>\n\n\n\n<color=black>Thanks to Grauschweif for the custom scripts !\nSome textures / images have been reworked by ChatGPT.\nMost icons taken from Flaticon.com or handmade by me</color>"
status = "normal"

