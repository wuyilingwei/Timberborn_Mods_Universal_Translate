["Lapantouflemagic.Copistlodge.FlavorDescription"]
raw = "\"So the first part of my job, is to remove these ridiculous decorations\"\n -The Copist beaver"
status = "normal"
enUS = "\"So the first part of my job is to remove these ridiculous decorations.\"  \n- The Copist Beaver"
