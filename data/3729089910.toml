["Lapantouflemagic.TankShower.Description"]
raw = "A shower that takes its water from a storage barrel.\nMostly useful for the unhinged weirdos who can't help but try to play on hard mode.\nAccomodates 2 beavers."
status = "normal"
enUS = "A shower that takes its water from a storage barrel. Mostly useful for the unhinged weirdos who can't help but try to play on hard mode. Accommodates 2 beavers."
zhCN = "“一个从储水桶取水的淋浴。对那些无法自拔、偏爱高难度模式的疯狂家伙们来说最有用。可容纳2只海狸。”"
zhTW = "一個從儲水桶中取水的淋浴。\n主要對於那些無法抗拒在困難模式下遊玩的奇怪瘋子非常有用。\n可容納2隻海狸。"
ruRU = "Душ, который берет воду из резервуара. \nВ основном полезен для странных неадекватов, которые не могут удержаться от игры в сложном режиме. \nВмещает 2 бобра."
jaJP = "「貯蔵バレルから水を汲むシャワーです。\n主にハードモードでプレイせずにはいられない狂った奇人に役立ちます。\nビーバー2匹に対応しています。」"
frFR = "Une douche qui prend son eau d'un baril de stockage.  \nSurtout utile pour les bizarrement fêlés qui ne peuvent s'empêcher d'essayer de jouer en mode difficile.  \nAccueille 2 castors."
deDE = "„Eine Dusche, die ihr Wasser aus einem Lagerfass bezieht. Vor allem nützlich für die verrückten Typen, die nicht anders können, als im Schwierigkeitsmodus schwer zu spielen. Bietet Platz für 2 Biber.“"
plPL = "Brodzik, który czerpie wodę z pojemnika na wodę. \nGłównie przydatny dla nienormalnych dziwaków, którzy nie potrafią się oprzeć grze na trudnym poziomie. \nMieści 2 bobry."
ptBR = "Um chuveiro que retira sua água de um barril de armazenamento. Principalmente útil para os malucos destreinados que não podem deixar de tentar jogar no modo difícil. Acomoda 2 castores."
koKR = "저장 배럴에서 물을 가져오는 샤워기.\n주로 어려운 모드에서 플레이하려는 엉뚱한 괴짜들에게 유용하다.\n비버 2마리를 수용할 수 있다."
csCZ = "Sprcha, která čerpá vodu z úložného sudu. \nPřevážně užitečná pro nezřízené podivíny, kteří si nemohou pomoci a snaží se hrát na těžkou obtížnost. \nZvládne 2 bobry."
viVN = "Một vòi hoa sen lấy nước từ một thùng chứa.\nChủ yếu hữu ích cho những kẻ lập dị không kiểm soát được bản thân mà cố gắng chơi ở chế độ khó.\nChứa được 2 con nhím."

