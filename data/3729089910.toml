["Lapantouflemagic.WaterCannon.FlavorDescription"]
raw = "\"I wonder if I can get into the barrel just before it starts shooting...\"\n -Yet another silly beaver "
status = "normal"
enUS = "\"I wonder if I can get into the barrel just before it starts shooting...\" - Yet another silly beaver"
zhCN = "“我想知道我能不能在它开始射击之前跳进桶里……”\n- 又一只愚蠢的海狸"
zhTW = "“我在想我是否能在它開始射擊前進入桶裡…”  \n- 又一隻愚蠢的海狸"
ruRU = "\"Интересно, смогу ли я залезть в бочку прямо перед тем, как она начнет стрелять...\"  \n- Ещё один глупый бобер"
jaJP = "「撃ち始める直前に樽の中に入れるかな…」  \nまた別の愚かなビーバー"
frFR = "\"Je me demande si je peux entrer dans le baril juste avant qu'il ne commence à tirer...\"  \n- Encore un castor idiot"
deDE = "„Ich frage mich, ob ich in das Faß steigen kann, kurz bevor es anfängt zu schießen…“  \n- Wieder ein alberner Biber"
plPL = "\"Zastanawiam się, czy mogę wejść do beczki tuż przed tym, jak zacznie strzelać...\"  \n - Jeszcze jeden głupi bóbr"
ptBR = "\"Será que eu consigo entrar no barril bem antes de começar a atirar...\"\n- Mais um castor bobo"
koKR = "\"쏘기 시작하기 직전에 통에 들어갈 수 있을까 궁금해...\"\n- 또 다른 바보 같은 비버"
csCZ = "\"Zajímalo by mě, jestli se stihnu dostat do sudu, než začne střílet...\"  \n- Ještě další hloupý bobr"
viVN = "\"Tôi tự hỏi liệu tôi có thể vào trong thùng trước khi nó bắt đầu bắn không...\"  \n-Những chú gấu xám ngốc nghếch khác"

