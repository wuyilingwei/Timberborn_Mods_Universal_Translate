new = "Greenhouse"
status = "normal"

["Lapantouflemagic.GreenHouse.Description"]
new = "A large greenhouse to keep banana trees warm and happy\n<color=red>Crushable building! Be careful! Only allows banana trees!\nThis building is not watertight!</color>"
status = "normal"

["Lapantouflemagic.GreenHouse.FlavorDescription"]
new = "\"If you eat only bananas, you won't wear your teeth down and eventually they will grow so long that they will go through your skull\"\n -Mommy beaver"
status = "normal"

["Lapantouflemagic.Trebuchet.Description"]
new = "The only realistic way to get rid of all those useless rocks. Also allows that one nerdy beaver to study ballistics."
status = "normal"

["Lapantouflemagic.Badbucket.DisplayName"]
new = "Bad Water Bucketing Post"
status = "normal"

["Lapantouflemagic.Badbucket.Description"]
new = "A few logs and planks haphazardly arranged in a platform barely good enough to tap bad water with a bucket, hopefully without sullying oneself."
status = "normal"

["Lapantouflemagic.Badbucket.FlavorDescription"]
new = "\"I'm sure we can do something useful with this liquid, we just need someone foolish enough to accept getting it. Surely Bobby will be up to the task.\"\n -A scientist beaver"
status = "normal"

["Lapantouflemagic.ZauerKrautBarrel.DisplayName"]
new = "Fermentation Barrels"
status = "normal"

["Lapantouflemagic.ZauerKrautBarrel.Description"]
new = "A pile of barrels that can be filled with different things that are left to ferment, pickle or decompose.\n<color=#FF6EC7>Can function without workers.</color>"
status = "normal"

["Lapantouflemagic.ZauerKrautBarrel.FlavorDescription"]
new = "\"A closed space that no one ever opens? Interesting...\"\n -Jack the Gnawer"
status = "normal"

["Lapantouflemagic.Factory.Description"]
new = "A large industrial building for melting metal into steel and manufacturing order-made items.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"

["Lapantouflemagic.TreeNursery.Description"]
new = "A specialized building in which experienced forester beavers carefully tend to tiny saplings and grow exotic species before planting them outside.\n<color=red>The house body can connect from the bottom to a ladder or pit-and-ladder lodge.</color>"
status = "normal"

["Lapantouflemagic.LargeWaterWheel.Description"]
new = "A bigger, more efficient water wheel, supported from the side."
status = "normal"

["Lapantouflemagic.BIT.Description"]
new = "An advanced science institute for the brightest beavers to develop new technologies\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"

["Lapantouflemagic.Fireflyfarm.DisplayName"]
new = "Firefly Grooming Station"
status = "normal"

["Lapantouflemagic.Fireflyfarm.Description"]
new = "An unusual workplace reserved for the most fearless beavers. Grows giant carnivorous fireflies from tiny larvae in order to harvest the glowing fluid from their abdomen.\nThe ravenous beast is kept attached at all times to make the process <i>perfectly</i> safe."
status = "normal"

["Lapantouflemagic.Fireflyfarm.FlavorDescription"]
new = "\"You see kits: every bad thing has its silver lining! Tending to those is quite easy, and what's it gonna do? Eat my prosthetic arm? Ha!\"\n -Grandpa beaver, on how to live a happy life."
status = "normal"

