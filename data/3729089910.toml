["Lapantouflemagic.GiantPillar.Description"]
raw = "Half a sequoia artistically hafted in an other one to extend it. \nSide platforms can be attached to it."
status = "normal"
enUS = "Half a sequoia artistically hafted in another one to extend it. \nSide platforms can be attached to it."
zhCN = "半棵红杉艺术性地镶嵌在另一棵上以延伸它。  \n可以在其侧面附加平台。"
zhTW = "一半的紅杉藝術性地與另一棵紅杉相連以延伸它。 \n側平台可以附加在上面。"
ruRU = "Половина секвойи, художественно вставленная в другую, чтобы удлинить её. \nК ней можно прикрепить боковые платформы."
jaJP = "「ハーフセコイアが別のセコイアに芸術的に接合されて、延長されています。サイドプラットフォームを取り付けることができます。」"
frFR = "Un demi-sequoia artistiquement monté sur un autre pour l'étendre. \nDes plateformes latérales peuvent y être attachées."
deDE = "Die Hälfte eines Mammutbaums künstlerisch an einem anderen befestigt, um ihn zu verlängern. \nSeitliche Plattformen können daran angebracht werden."
plPL = "Połowa sekwoi artystycznie wtopiona w drugą, aby ją wydłużyć. \nMożna do niej przymocować boczne platformy."
ptBR = "Metade de uma sequóia artisticamente fixada em outra para estendê-la. \nPlataformas laterais podem ser anexadas a ela."
koKR = "하나의 세쿼이아가 예술적으로 다른 세쿼이아에 연결되어 있습니다. \n측면 플랫폼을 Attach할 수 있습니다."
csCZ = "Polovina sekvoje umělecky upevněná v jiné, aby ji prodloužila. \nNa něj lze připevnit boční platformy."
viVN = "Nửa một cây sequoia được gắn nghệ thuật vào một cây khác để mở rộng nó. \nCác nền tảng bên có thể được gắn vào nó."

