["Lapantouflemagic.NuclearWaterCollector.Description"]
raw = "Allows the power plant to connect to the power network and start operating.\nCooling water pumped from the aquifer by the reactor is released from above.\n<color=green>The source never runs dry and is not affected by badtides.</color>"
status = "normal"
enUS = "Allows the power plant to connect to the power network and start operating. Cooling water pumped from the aquifer by the reactor is released from above. <color=green>The source never runs dry and is not affected by bad tides.</color>"
zhCN = "“允许发电厂连接到电力网络并开始运行。\n由反应堆从地下水层抽取的冷却水从上方释放。\n<color=green>水源不会枯竭，并且不受潮汐的影响。</color>”"
zhTW = "允許發電廠連接到電力網絡並開始運行。  \n由反應堆從含水層抽取的冷卻水從上方排放。  \n<color=green>這個水源永遠不會枯竭，且不受壞潮影響。</color>"
ruRU = "Позволяет электростанции подключаться к электросети и начинать работу. Охлаждающая вода, откачиваемая из водоносного горизонта реактором, сбрасывается сверху. <color=green>Источник никогда не иссякает и не зависит от плохих приливов.</color>"
jaJP = "発電所が電力ネットワークに接続し、運転を開始できるようになります。 \nリアクターによってくみ上げられた地下水が上部から放出されます。 \n<color=green>この水源は干上がることがなく、悪潮の影響を受けません。</color>"
frFR = "Permet à la centrale électrique de se connecter au réseau électrique et de commencer à fonctionner.\nL'eau de refroidissement pompée depuis l'aquifère par le réacteur est relâchée par le haut.\n<color=green>La source ne s'épuise jamais et n'est pas affectée par les marées basses.</color>"
deDE = "Ermöglicht dem Kraftwerk, sich mit dem Stromnetz zu verbinden und den Betrieb aufzunehmen. Kühlwasser, das vom Aquifer durch den Reaktor gepumpt wird, wird von oben freigesetzt. <color=green>Die Quelle läuft nie trocken und ist nicht von schlechten Gezeiten betroffen.</color>"
plPL = "„Pozwala elektrowni podłączyć się do sieci energetycznej i rozpocząć działanie. Woda chłodząca pompowana z akwiferu przez reaktor jest uwalniana z góry. <color=green>Źródło nigdy się nie wyczerpuje i nie jest dotknięte złymi przypływami.</color>“"
ptBR = "Permite que a usina se conecte à rede de energia e comece a operar. A água de resfriamento bombeada do aquífero pelo reator é liberada de cima. <color=green>A fonte nunca se esgota e não é afetada por marés ruins.</color>"
koKR = "발전소가 전력망에 연결되어 작동할 수 있게 합니다.\n원자로가 지층에서 펌핑한 냉각수는 위에서 배출됩니다.\n<color=green>수원은 결코 고갈되지 않으며, 악조의 영향을 받지 않습니다.</color>"
csCZ = "Umožňuje elektrárně připojit se k energetické síti a začít fungovat. Chladící voda čerpaná z akviforu reaktorem se uvolňuje z výšky. <color=green>Zdroj nikdy nevysychá a není ovlivněn špatnými přílivy.</color>"
viVN = "Cho phép nhà máy điện kết nối với mạng lưới điện và bắt đầu hoạt động. \nNước làm mát được bơm từ tầng nước ngầm bởi lò phản ứng được thải ra từ trên cao. \n<color=green>Nguồn nước không bao giờ cạn kiệt và không bị ảnh hưởng bởi sóng xấu.</color>"

["Lapantouflemagic.NuclearWaterCollector.FlavorDescription"]
raw = "\"Without the metal floor up there to dissipate heat, this would be boiling hot!\""
status = "normal"
enUS = "\"Without the metal floor up there to dissipate heat, this would be boiling hot!\""
zhCN = "“如果上面的金属地板不散热，这里会热得要命！”"
zhTW = "\"如果上面的金屬地板不散熱，那這裡將會熱得要命！\""
ruRU = "\"Без металлического пола наверху, чтобы рассеивать тепло, здесь было бы кипяток!\""
jaJP = "「上に金属製の床がなければ、これは煮えたぎっているだろう！」"
frFR = "Sans le sol en métal là-haut pour dissiper la chaleur, ce serait brûlant !"
deDE = "\"Ohne den Metallboden dort oben, um die Wärme abzuleiten, wäre das kochend heiß!\""
plPL = "Bez metalowej podłogi tam na górze, żeby rozpraszać ciepło, to byłoby wrzące!"
ptBR = "\"Sem o piso de metal lá em cima para dissipar o calor, isso estaria fervendo!\""
koKR = "\"위에 열을 발산할 금속 바닥이 없었다면, 이건 끓고 있을 거예요!\""
csCZ = "\"Bez kovové podlahy nahoře, která by odváděla teplo, by to bylo vařící horké!\""
viVN = "\"Không có sàn kim loại ở trên để tỏa nhiệt, điều này sẽ sôi sục!\""

