["Building.MissileSilo.Whitepaws.Description"]
raw = "<color=#FF6EC7>We have made a new breakthrough in our understanding of hooman technologies! This one promises exciting opportunities for the future. \nIf we can get it to work, this surely will the greatest achievement of beaverkind.</color>\n<color=#00FFFF>Requires to be placed in an at least 6-deep clean water pond</color>\n<color=red>Entrance must be accessible for construction to proceed.</color>"
status = "normal"
enUS = "<color=#FF6EC7>We have made a new breakthrough in our understanding of human technologies! This one promises exciting opportunities for the future. If we can get it to work, this will surely be the greatest achievement of beaverkind.</color>\n<color=#00FFFF>Requires to be placed in at least a 6-deep clean water pond</color>\n<color=red>Entrance must be accessible for construction to proceed.</color>"
zhCN = "<color=#FF6EC7>我们在理解人类技术方面取得了新的突破！这一项承诺为未来带来激动人心的机会。如果我们能使它运转，这无疑将是海狸界最大的成就。</color>\n<color=#00FFFF>需要放置在至少6深的清水池塘中</color>\n<color=red>入口必须可供建筑施工。</color>"
zhTW = "<color=#FF6EC7>我們在了解人類技術方面取得了新的突破！這一次為未來帶來了令人興奮的機會。如果我們能使其運作，這無疑將是海狸族的重大成就。</color>\n<color=#00FFFF>需要放置在至少 6 深的乾淨水池中</color>\n<color=red>進口必須可供建設使用。</color>"
ruRU = "<color=#FF6EC7>Мы сделали новый прорыв в нашем понимании технологий хуманов! Это обещает захватывающие возможности для будущего. Если нам удастся заставить это работать, это, безусловно, станет величайшим достижением бобров.</color>\n<color=#00FFFF>Требуется разместить в пруду с чистой водой глубиной не менее 6 единиц</color>\n<color=red>Вход должен быть доступен для продолжения строительства.</color>"
jaJP = "<color=#FF6EC7>私たちは人間の技術に関する理解で新たな進展を遂げました！これは未来に向けたエキサイティングな機会を約束します。  \nもしこれを機能させることができれば、これは確かにビーバー界にとって最大の成果となるでしょう。</color>  \n<color=#00FFFF>深さ6以上のきれいな水の池に設置する必要があります</color>  \n<color=red>工事を進めるためには入口がアクセス可能でなければなりません。</color>"
frFR = "<color=#FF6EC7>Nous avons réalisé une nouvelle avancée dans notre compréhension des technologies humaines ! Celle-ci promet des opportunités passionnantes pour l'avenir. Si nous parvenons à la faire fonctionner, cela sera sûrement le plus grand accomplissement de l'espèce castor.</color>\n<color=#00FFFF>Doit être placé dans un étang d'eau propre d'au moins 6 profondeurs</color>\n<color=red>L'entrée doit être accessible pour que la construction puisse se poursuivre.</color>"
deDE = "<color=#FF6EC7>Wir haben einen neuen Durchbruch in unserem Verständnis der Hooman-Technologien erzielt! Dieses Projekt verspricht aufregende Möglichkeiten für die Zukunft. \nWenn wir es zum Laufen bringen können, wird dies sicherlich die größte Errungenschaft der Biber sein.</color>\n<color=#00FFFF>Erfordert, in einem mindestens 6 tiefen, sauberen Wasserteich platziert zu werden</color>\n<color=red>Der Eingang muss für den Fortschritt der Bauarbeiten zugänglich sein.</color>"
plPL = "<color=#FF6EC7>Dokonaliśmy nowego przełomu w zrozumieniu technologii ludzkich! To obiecuje ekscytujące możliwości na przyszłość. \nJeśli uda nam się to uruchomić, z pewnością będzie to największe osiągnięcie bobrzej cywilizacji.</color>\n<color=#00FFFF>Wymaga umiejscowienia w co najmniej 6-metrowym czystym zbiorniku wodnym</color>\n<color=red>Wejście musi być dostępne, aby budowa mogła postępować.</color>"
ptBR = "<color=#FF6EC7>Fizemos um novo avanço em nossa compreensão das tecnologias humanas! Este promete oportunidades empolgantes para o futuro. Se conseguirmos fazê-lo funcionar, certamente será a maior conquista dos castores.</color>\n<color=#00FFFF>Requer ser colocado em um lago de água limpa com pelo menos 6 metros de profundidade</color>\n<color=red>A entrada deve ser acessível para que a construção prossiga.</color>"
koKR = "<color=#FF6EC7>인간 기술에 대한 우리의 이해에서 새로운 돌파구를 마련했습니다! 이것은 미래에 대한 흥미로운 기회를 약속합니다. \n이것이 작동하게 된다면, 이것은 분명 비버 종족의 가장 위대한 업적이 될 것입니다.</color>\n<color=#00FFFF>최소 6칸 깊이의 깨끗한 물이 있는 연못에 설치해야 합니다.</color>\n<color=red>건설이 진행되려면 출입구에 접근할 수 있어야 합니다.</color>"
csCZ = "<color=#FF6EC7>Udělal jsme nový průlom v našem chápání lidských technologií! Tento slibuje vzrušující příležitosti pro budoucnost. \nPokud se nám to podaří zprovoznit, bude to bezesporu největší úspěch bobřího druhu.</color>\n<color=#00FFFF>Je třeba umístit do alespoň 6 hlubokého čistého vodního jezírka</color>\n<color=red>Vstup musí být přístupný, aby mohlo pokračovat stavební práce.</color>"
viVN = "<color=#FF6EC7>Chúng tôi đã có một bước đột phá mới trong sự hiểu biết về công nghệ của con người! Cái này hứa hẹn những cơ hội thú vị cho tương lai. \nNếu chúng tôi có thể làm cho nó hoạt động, đây chắc chắn sẽ là thành tựu vĩ đại nhất của loài điển.</color>\n<color=#00FFFF>Cần được đặt trong một cái ao nước sạch sâu ít nhất 6 mét</color>\n<color=red>Cửa ra vào phải có thể tiếp cận để việc xây dựng có thể tiến hành.</color>"

["Building.MissileSilo.Whitepaws.FlavorDescription"]
raw = "\"We should definitely build this in the center of our town so that everyone can see it!\"\n -Toothless the Wise, elder beaver"
status = "normal"
enUS = "\"We should definitely build this in the center of our town so that everyone can see it!\"  \n-Toothless the Wise, elder beaver"
zhCN = "“我们肯定应该把这个建在我们镇子的中心，以便每个人都能看到它！”  \n- 明理的无牙，老海狸"
zhTW = "「我們肯定應該把這個建在小鎮中央，讓每個人都能看到！」  \n-智者無牙，老海狸"
ruRU = "\"Мы определенно должны построить это в центре нашего города, чтобы все могли это увидеть!\"  \n- Беззубик Мудрый, старший бобер"
jaJP = "「これは町の中心に建てるべきです。みんなに見てもらえるように！」\n -賢いトゥースレス、長老ビーバー"
frFR = "\"Nous devrions définitivement construire cela au centre de notre ville afin que tout le monde puisse le voir !\"\n -Grignoteux le Sage, castor ancien"
deDE = "„Wir sollten dies auf jeden Fall im Zentrum unserer Stadt bauen, damit es jeder sehen kann!“  \n- Zahnlos der Weise, älterer Biber"
plPL = "\"Zdecydowanie powinniśmy to zbudować w centrum naszego miasta, aby wszyscy mogli to zobaczyć!\"  \n- Bezgębny Mądry, starszy bóbr"
ptBR = "\"Devemos definitivamente construir isso no centro da nossa cidade para que todos possam ver!\"\n -Dente de Leite, o castor sábio"
koKR = "\"이것은 우리 마을의 중앙에 건설해야 합니다. 모든 사람들이 볼 수 있도록요!\"  \n- 지혜로운 무이, 비버 장로"
csCZ = "\"Rozhodně bychom to měli postavit ve středu našeho města, aby to každý viděl!\"  \n- Bezzubý Moudrý, starší bobr"
viVN = "\"Chúng ta chắc chắn nên xây dựng cái này ở trung tâm thị trấn của mình để mọi người có thể nhìn thấy nó!\"  \n- Toothless the Wise, lão cáo"

["Need.Rocketdeath.DeathMessage"]
raw = "<color=green>was caught in the rocket exhaust and shockwave leading to an horrible death. That is all your fault.</color>"
status = "normal"
enUS = "<color=green>was caught in the rocket exhaust and shockwave leading to a horrible death. That is all your fault.</color>"
zhCN = "<color=green>被火箭排气和冲击波击中，导致了可怕的死亡。这都是你的错。</color>"
zhTW = "<color=green>被火箭排氣和衝擊波捕捉，導致了可怕的死亡。這全都是你的錯。</color>"
ruRU = "<color=green>был пойман в реактивные выбросы и ударную волну, что привело к ужасной смерти. Это все твоя вина.</color>"
jaJP = "<color=green>ロケットの排気と衝撃波に巻き込まれ、恐ろしい死を迎えました。それはすべてあなたのせいです。</color>"
frFR = "<color=green>a été pris dans les gaz d'échappement de la fusée et l'onde de choc, menant à une mort horrible. C'est entièrement de ta faute.</color>"
deDE = "<color=green>wurde in den Raketenabgasen und der Druckwelle gefangen, was zu einem schrecklichen Tod führte. Das ist alles deine Schuld.</color>"
plPL = "<color=green>został schwytany w wydechu rakiety i fali uderzeniowej, co doprowadziło do okropnej śmierci. To wszystko twoja wina.</color>"
ptBR = "<color=green>foi pego na fumaça do foguete e na onda de choque, levando a uma morte horrível. Isso é tudo culpa sua.</color>"
koKR = "<color=green>로켓 배기가스와 충격파에 휘말려 끔찍하게 죽었다. 그건 모두 네 잘못이다.</color>"
csCZ = "<color=green>byl chycen v raketovém výfuku a tlakové vlně, což vedlo k hrozné smrti. To je všechno tvoje vina.</color>"
viVN = "<color=green>đã bị kẹt trong khói thải và sóng chấn động của tên lửa dẫn đến cái chết khủng khiếp. Đó là lỗi của bạn.</color>"

