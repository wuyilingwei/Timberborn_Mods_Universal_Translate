["Lapantouflemagic.BalloonLandingPad.Description"]
raw = "A very large tower designed to allow balloon traders to land and fly off safely.\n<color=red>Consumes methane to power the balloons.</color>"
status = "normal"
enUS = "A very large tower designed to allow balloon traders to land and take off safely.  \n<color=red>Consumes methane to power the balloons.</color>"
zhCN = "一个非常大的塔楼，旨在让气球商人安全着陆和起飞。<color=red>消耗甲烷以为气球提供动力。</color>"
zhTW = "一個非常高大的塔樓，旨在讓氣球商安全著陸和起飛。<color=red>消耗甲烷來為氣球供電。</color>"
ruRU = "Очень высокая башня, предназначенная для безопасной посадки и вылета воздушных торговцев. <color=red>Потребляет метан для питания шаров.</color>"
jaJP = "非常に大きなタワーで、気球の商人が安全に着陸し、飛び立つことができるように設計されています。  \n<color=red>気球を動かすためにメタンを消費します。</color>"
frFR = "Une très grande tour conçue pour permettre aux commerçants de ballons d'atterrir et de décoller en toute sécurité. <color=red>Consomme du méthane pour alimenter les ballons.</color>"
deDE = "Ein sehr großer Turm, der dafür entworfen ist, Ballonhändler sicher landen und abheben zu lassen.  \n<color=red>Verbraucht Methan, um die Ballons anzutreiben.</color>"
plPL = "Bardzo duża wieża zaprojektowana, aby umożliwić balonowym handlarzom bezpieczne lądowanie i odlot.  \n<color=red>Zużywa metan do zasilania balonów.</color>"
ptBR = "Uma torre muito grande projetada para permitir que os comerciantes de balões pousam e decolam com segurança. <color=red>Consome metano para abastecer os balões.</color>"
koKR = "풍선 상인들이 안전하게 착륙하고 이륙할 수 있도록 설계된 매우 큰 타워입니다. <color=red>풍선을 작동시키기 위해 메탄을 소비합니다.</color>"
csCZ = "Velká věž navržená tak, aby umožnila balónovým obchodníkům bezpečně přistávat a vzletovat.\n<color=red>Spotřebovává metan k pohonu balónů.</color>"
viVN = "Một tòa tháp rất lớn được thiết kế để cho phép các thương lái bóng bay hạ cánh và cất cánh an toàn. <color=red>Tiêu thụ methane để cung cấp năng lượng cho các bóng bay.</color>"

["Lapantouflemagic.BalloonLandingPad.FlavorDescription"]
raw = "\"No one knows what that symbol on the top means, but it must be there, it's the rule.\n-an IronTeeth balloon trader\""
status = "normal"
enUS = "\"No one knows what that symbol on the top means, but it must be there, it's the rule. -an IronTeeth balloon trader\""
zhCN = "“没有人知道顶部的那个符号是什么意思，但它必须在那里，这是规则。 - 一位铁牙气球商人”"
zhTW = "“沒有人知道頂部的符號意味著什麼，但它必須存在，這是規則。 - 一位鐵牙氣球商人”"
ruRU = "\"Никто не знает, что означает этот символ сверху, но он должен быть там, таковы правила.  \n- торговец воздушными шарами Железных Зубьев\""
jaJP = "「誰もその上のシンボルが何を意味するのかわからないが、そこにある必要がある、それがルールだ。 - アイアンティースの気球商人」"
frFR = "\"Personne ne sait ce que signifie ce symbole en haut, mais il doit être là, c'est la règle.  \n-un négociant en ballons IronTeeth\""
deDE = "„Niemand weiß, was dieses Symbol oben bedeutet, aber es muss da sein, das ist die Regel. - ein Eisenzahn-Luftballonhändler“"
plPL = "\"Nikt nie wie, co oznacza ten symbol na górze, ale musi tam być, to zasada. - handlowiec balonów IronTeeth\""
ptBR = "\"Ninguém sabe o que aquele símbolo no topo significa, mas ele deve estar lá, é a regra.  \n- um comerciante de balões dos Dentes de Ferro\""
koKR = "\"누구도 그 위에 있는 기호가 무슨 뜻인지 모릅니다. 하지만 그건 있어야 합니다, 규칙입니다.  \n-철이빨 풍선 상인\""
csCZ = "\"Nic neví, co ten symbol nahoře znamená, ale musí tam být, to je pravidlo. -obchodník s balónky IronTeeth\""
viVN = "\"Không ai biết ký hiệu trên cùng có nghĩa gì, nhưng nó phải có mặt, đó là quy tắc. - một thương nhân bóng bay IronTeeth\""

