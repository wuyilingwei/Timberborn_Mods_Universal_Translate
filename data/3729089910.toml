["Lapantouflemagic.NewDistrictCenter.Description"]
raw = "A large hut marking the center of a village\n<color=red>Can connect from the bottom to a ladder or pit-and-ladder lodge.</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A large hut marking the center of a village  \n<color=red>Can connect from the bottom to a ladder or pit-and-ladder lodge.</color>  \n<color=#00FFFF>Works as a Levee</color>"
zhCN = "一个标志着村庄中心的大帐篷  \n<color=red>可以从底部连接到梯子或坑和梯子小屋。</color>  \n<color=#00FFFF>作为堤坝工作</color>"
zhTW = "一個標誌著村莊中心的大型小屋  \n<color=red>可以從底部連接到梯子或坑梯小屋。</color>  \n<color=#00FFFF>作為堤防運作</color>"
ruRU = "Большая хижина, обозначающая центр деревни\n<color=red>Может соединяться внизу с лестницей или хижиной с ямой и лестницей.</color>\n<color=#00FFFF>Работает как дамба</color>"
jaJP = "村の中心を示す大きな小屋  \n<color=red>下からは梯子やピットアンドラダー小屋に接続できます。</color>  \n<color=#00FFFF>堤防として機能します</color>"
frFR = "Une grande hutte marquant le centre d'un village  \n<color=red>Peut se connecter par le bas à une échelle ou à un pavillon échelle-et-fossé.</color>  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Eine große Hütte, die das Zentrum eines Dorfes markiert\n<color=red>Kann von unten mit einer Leiter oder einer Grube-und-Leiter-Hütte verbunden werden.</color>\n<color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Wielka chata wyznaczająca centrum wioski\n<color=red>Można połączyć od dołu z drabiną lub przybudówką z drabiną i dołem.</color>\n<color=#00FFFF>Działa jak wał przeciwpowodziowy</color>"
ptBR = "Uma grande cabana marcando o centro de uma aldeia\n<color=red>Pode se conectar de baixo a uma escada ou cabana com escada e poço.</color>\n<color=#00FFFF>Funciona como uma Muralha</color>"
koKR = "마을의 중심을 표시하는 큰 오두막\n<color=red>밑에서 사다리 또는 구덩이와 사다리 오두막으로 연결할 수 있습니다.</color>\n<color=#00FFFF>제방으로 작동합니다.</color>"
csCZ = "Velká chatrč, která označuje střed vesnice\n<color=red>Může se připojit ze spodní části k žebříku nebo chatě se žebříkem a jámou.</color>\n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một túp lều lớn đánh dấu trung tâm của một ngôi làng\n<color=red>Có thể kết nối từ phía dưới đến một thang hoặc một nhà nghỉ thang và hố.</color>\n<color=#00FFFF>Hoạt động như một đê</color>"

