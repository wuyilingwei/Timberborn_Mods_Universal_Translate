["Lapantouflemagic.MedicalBed_DiseaseDescription"]
raw = "Gives sick beavers a place to rest while someone adjust the <color=green>basic balm</color> into a relieving <color=green>bramble flower</color> decoction."
status = "normal"
enUS = "Gives sick beavers a place to rest while someone adjusts the <color=green>basic balm</color> into a relieving <color=green>bramble flower</color> decoction."
zhCN = "“为生病的海狸提供一个休息的地方，同时有人将<color=green>基础药膏</color>调配成舒缓的<color=green>藤蔓花</color>煎剂。”"
zhTW = "為生病的海狸提供休息的地方，讓有人將<color=green>基本藥膏</color>調整成舒緩的<color=green>荊棘花</color>煎劑。"
ruRU = "Дает больным бобрам место для отдыха, пока кто-то настраивает <color=green>основную мазь</color> в облегчяющий отвар из <color=green>ежевичного цветка</color>."
jaJP = "「病気のビーバーが休む場所を提供し、誰かが<color=green>基本の軟膏</color>を和らげる<color=green>ブラムルフラワー</color>の抽出液に調整します。」"
frFR = "Offre aux castors malades un endroit pour se reposer pendant que quelqu'un ajuste le <color=green>baume de base</color> en une décoction apaisante de <color=green>fleur de ronce</color>."
deDE = "Bietet kranken Bibern einen Ort zum Ausruhen, während jemand den <color=green>grundlegenden Balsam</color> in eine lindernde <color=green>Dornenblüten</color>-Abkochung umwandelt."
plPL = "Daje chorym bobrom miejsce do odpoczynku, podczas gdy ktoś przygotowuje <color=green>podstawowy balsam</color> w łagodzący <color=green>napar z jeżyn</color>."
ptBR = "Oferece aos castores doentes um lugar para descansar enquanto alguém ajusta o <color=green>ungüento básico</color> em uma decocção relaxante de <color=green>flor de espinhos</color>."
koKR = "아픈 비버들이 누워 쉴 수 있도록 하며, 누군가 <color=green>기본 연고</color>를 <color=green>가시나무 꽃</color> 달임으로 완화시켜 줍니다."
csCZ = "Dává nemocným bobrům místo k odpočinku, zatímco někdo upravuje <color=green>základní balzám</color> na uklidňující <color=green>vývar z trnkového květu</color>."
viVN = "Cung cấp cho những con castor bị bệnh một nơi để nghỉ ngơi trong khi ai đó điều chỉnh <color=green>thuốc mỡ cơ bản</color> thành một dung dịch <color=green>hoa giậu</color> giúp giảm triệu chứng."

