["Lapantouflemagic.IronMechanicalDrill.Description"]
raw = "A mechanized drill that crushes rock to extract Iron ore.\nThe drill bits must be changed regularly.\n<color=red>Deleting waste rock is cheating!</color>"
status = "normal"
enUS = "A mechanized drill that crushes rock to extract iron ore. The drill bits must be changed regularly. <color=red>Deleting waste rock is cheating!</color>"
zhCN = "“一个机械化钻头，可以粉碎岩石以提取铁矿石。\n钻头必须定期更换。\n<color=red>删除废石是作弊！</color>”"
zhTW = "一個機械鑽頭，可以壓碎岩石以提取鐵礦。\n鑽頭的鑽頭必須定期更換。\n<color=red>刪除廢石是作弊！</color>"
ruRU = "Механизированная дрель, которая дробит камни для добычи железной руды. Сверла необходимо заменять регулярно. <color=red>Удаление отходов — это жульничество!</color>"
jaJP = "「岩を砕いて鉄鉱石を抽出する機械式ドリルです。ドリルビットは定期的に交換する必要があります。<color=red>廃岩を削除するのはズルです！</color>」"
frFR = "Une perceuse mécanisée qui écrase la roche pour extraire du minerai de fer.  \nLes forets doivent être changés régulièrement.  \n<color=red>Supprimer la roche de déchets est de la triche !</color>"
deDE = "Ein mechanisierter Bohrer, der Gestein zertrümmert, um Eisenerz zu gewinnen.  \nDie Bohrköpfe müssen regelmäßig gewechselt werden.  \n<color=red>Das Löschen von Abraum ist Betrug!</color>"
plPL = "Zmechanizowany wiertło, które kruszy skały, aby wydobyć rudę żelaza. Wiertła muszą być regularnie wymieniane. <color=red>Usuwanie odpadów skalnych to oszustwo!</color>"
ptBR = "Uma broca mecanizada que esmaga rochas para extrair minério de ferro. As brocas devem ser trocadas regularmente. <color=red>Deletar rocha residual é trapaça!</color>"
koKR = "암석을 부수고 철광석을 추출하는 기계식 드릴입니다.\n드릴 비트는 정기적으로 교체해야 합니다.\n<color=red>폐기 암석을 삭제하는 것은 부정행위입니다!</color>"
csCZ = "Mechanizované vrtáky, které drtí horniny, aby získaly železnou rudu. Vrták musí být pravidelně měněn. <color=red>Odstraňování odpadního kamene je podvod!</color>"
viVN = "Một máy khoan cơ giới nghiền nát đá để khai thác quặng sắt. \nCác mũi khoan phải được thay đổi thường xuyên. \n<color=red>Xóa đá thải là gian lận!</color>"

["Lapantouflemagic.IronMechanicalDrill.FlavorDescription"]
raw = "\"It's crazy how you can keep drilling the same spot for days and still find more!\"\n -Mommy beaver"
status = "normal"
enUS = "\"It's crazy how you can keep drilling the same spot for days and still find more!\"  \n-Mommy beaver"
zhCN = "“真疯狂，你可以在同一个地方钻好几天，依然会找到更多东西！”  \n- 妈咪海狸"
zhTW = "「你可以在同一地方不停鑽掘好幾天，卻還是能找到更多，真是瘋狂！」  \n－媽媽海狸"
ruRU = "\"С ума сойти, как ты можешь сверлить одно и то же место днями напролет и все равно находить что-то новое!\" - Мамочка-бобёр"
jaJP = "「同じ場所を何日も掘り続けて、まだもっと見つかるなんて、信じられない！ - マミービーバー」"
frFR = "Ça semble fou de pouvoir continuer à percer le même endroit pendant des jours et d'y trouver encore plus !\n -Mamie castor"
deDE = "\"Es ist verrückt, wie man tagelang an derselben Stelle bohren kann und trotzdem mehr findet!\"  \n - Mommy-Biber"
plPL = "\"To szalone, jak możesz wiercić w tym samym miejscu przez dni i wciąż znajdować więcej!\"  \n -Mamusiu bobrze"
ptBR = "\"É louco como você pode continuar perfurando o mesmo lugar por dias e ainda encontrar mais!\"  \n-Mamãe castor"
koKR = "\"같은 자리를 며칠 동안 계속 뚫어도 더 많은 것을 찾을 수 있다니 미쳤어!\"  \n-엄마 비버"
csCZ = "\"Je šílené, jak můžeš vrtat na stejném místě dny a pořád něco najít!\"  \n -Maminka bobr"
viVN = "\"Thật điên rồ khi bạn có thể khoan cùng một chỗ trong nhiều ngày và vẫn tìm thấy nhiều thứ hơn nữa!\"  \n-Mẹ hải ly"

