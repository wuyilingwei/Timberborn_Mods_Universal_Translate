viVN = "Giường Y tế: Bỏng Nhẹ"

["Lapantouflemagic.MedicalBed_Burns.Description"]
raw = "Gives beavers suffering from burns a place to rest while someone adjust the <color=green>basic balm</color> into an oily <color=green>sunflower seed</color>-based ointment."
status = "normal"
enUS = "Gives beavers suffering from burns a place to rest while someone adjusts the <color=green>basic balm</color> into an oily <color=green>sunflower seed</color>-based ointment."
zhCN = "为遭受烧伤的海狸提供一个休息的地方，同时有人将<color=green>基础药膏</color>调制成一种油性<color=green>向日葵种子</color>油膏。"
zhTW = "為受燒傷的海狸提供一個休息的地方，同時有人將<color=green>基本藥膏</color>調整成油性<color=green>葵花籽</color>為基礎的軟膏。"
ruRU = "Предоставляет бобрам, страдающим от ожогов, место для отдыха, пока кто-то готовит <color=green>основную мазь</color> в масляную <color=green>солнечника</color> на основе мази."
jaJP = "やけどに苦しむビーバーが休む場所を提供し、誰かが<color=green>基本のバーム</color>をオイリーな<color=green>ひまわりの種</color>を基にした軟膏に調整する間に使用します。"
frFR = "Donne aux castors souffrant de brûlures un endroit pour se reposer pendant que quelqu'un ajuste le <color=green>baume de base</color> en une pommade huileuse à base de <color=green>graines de tournesol</color>."
deDE = "Gibt Bibern, die unter Verbrennungen leiden, einen Ort zum Ausruhen, während jemand den <color=green>Grundbalsam</color> in eine ölige <color=green>sonnenblumenkerne</color>-basierte Salbe anpasst."
plPL = "Zapewnia bobrom cierpiącym na oparzenia miejsce do odpoczynku, podczas gdy ktoś przygotowuje <color=green>podstawowy balsam</color> w oleistą maść na bazie <color=green>nasion słonecznika</color>."
ptBR = "Oferece aos castores que sofrem de queimaduras um lugar para descansar enquanto alguém ajusta o <color=green>balsamo básico</color> em um unguento oleoso à base de <color=green>sementes de girassol</color>."
koKR = "화상을 입은 비버들이 <color=green>기본 연고</color>를 기름진 <color=green>해바라기 씨앗</color> 기반의 연고로 조정하는 동안 쉴 수 있는 장소를 제공합니다."
csCZ = "Poskytuje bobrům trpícím popáleninami místo na odpočinek, zatímco někdo upravuje <color=green>základní balzám</color> na olejovou <color=green>mřeně slunečnicových semínek</color>."
viVN = "Cung cấp cho những con castor bị bỏng một nơi để nghỉ ngơi trong khi ai đó điều chỉnh <color=green>thuốc mỡ cơ bản</color> thành một loại thuốc mỡ có chứa <color=green>hạt hướng dương</color>."

