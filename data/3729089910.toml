["Lapantouflemagic.ScrollHolder.Description"]
raw = "A small storage place for one scroll that serves to facilitate importation of blueprints from other districts."
status = "normal"
enUS = "A small storage place for one scroll that serves to facilitate importation of blueprints from other districts."
zhCN = "一个小储物处，可以存放一卷卷轴，旨在便于从其他地区导入蓝图。"
zhTW = "一個小型儲存空間，用於存放一卷卷軸，以便從其他區域進口藍圖。"
ruRU = "Небольшое хранилище для одного свитка, которое служит для упрощения импорта чертежей из других районов."
jaJP = "「他の地区からの設計図の輸入を容易にするための、一つの巻物用の小さな収納場所です。」"
