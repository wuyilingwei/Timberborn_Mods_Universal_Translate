["Lapantouflemagic.MECHwaterpump.Description"]
raw = "An oversized pump equipped with several filters that can function autonomously.\nIs equivalent to <color=red>five</color> basic water pumps.\nRequires Planks to occasionally replace propeller blades."
status = "normal"
enUS = "An oversized pump equipped with several filters that can function autonomously. Is equivalent to <color=red>five</color> basic water pumps. Requires Planks to occasionally replace propeller blades."
zhCN = "一个超大的泵，配备了多个过滤器，可以自主运行。 相当于<color=red>五</color>个基本水泵。 需要木板来偶尔更换螺旋桨叶片。"
zhTW = "一種超大型泵，配備多個濾水器，能夠自主運行。\n相當於<color=red>五個</color>基本水泵。\n需要木板來偶爾更換螺旋槳葉片。"
ruRU = "Увеличенный насос, оборудованный несколькими фильтрами, который может функционировать автономно. Эквивалентен <color=red>пяти</color> базовым водяным насосам. Требует доски для периодической замены лопастей пропеллера."
jaJP = "「複数のフィルターを備え、自律的に機能する大型ポンプ。基本的な水ポンプ<color=red>5基分</color>に相当します。プロペラのブレードを時々交換するために板材が必要です。」"
frFR = "Une pompe surdimensionnée équipée de plusieurs filtres qui peut fonctionner de manière autonome.\nÉquivalente à <color=red>cinq</color> pompes à eau de base.\nNécessite des Planches pour remplacer occasionnellement les pales du propulseur."
deDE = "Eine übergroße Pumpe, die mit mehreren Filtern ausgestattet ist und autonom funktioniert. Entspricht <color=red>fünf</color> grundlegenden Wasserpumpen. Benötigt Holzplanken, um gelegentlich die Propellerblätter zu ersetzen."
plPL = "Przesadzona pompa wyposażona w kilka filtrów, która może działać autonomicznie. Odpowiada <color=red>pięciu</color> podstawowym pompom wodnym. Wymaga desek do okazjonalnej wymiany łopatki wirnika."
ptBR = "Uma bomba oversized equipada com vários filtros que pode funcionar de forma autônoma. É equivalente a <color=red>cinco</color> bombas de água básicas. Requer tábuas para substituir ocasionalmente as lâminas do propulsor."
koKR = "여러 개의 필터가 장착된 대형 펌프로 자율적으로 작동할 수 있습니다.\n기본 물 펌프 <color=red>다섯 개</color>에 해당합니다.\n가끔 프로펠러 날개를 교체하기 위해 판자가 필요합니다."
csCZ = "Překonaně velké čerpadlo vybavené několika filtry, které může fungovat autonomně.  \nJe ekvivalentní <color=red> pěti </color> základním vodním čerpadlům.  \nVyžaduje prkna k občasné výměně vrtulových čepele."
viVN = "Một máy bơm cỡ lớn được trang bị nhiều bộ lọc có thể hoạt động tự chủ.\nTương đương với <color=red>năm</color> máy bơm nước cơ bản.\nCần có Tấm gỗ để thỉnh thoảng thay thế cánh quạt."

["Lapantouflemagic.MECHwaterpump.FlavorDescription"]
raw = "\"Actually, we don't need to filtrate clear water that much, the first three filters are to remove all that mysterious meat and guts that shows up from the pointer knows where. By the way, have you seen Timmy?\"\n-A maintenance beaver"
status = "normal"
enUS = "\"Actually, we don't need to filter clear water that much. The first three filters are to remove all that mysterious meat and guts that shows up from who knows where. By the way, have you seen Timmy?\"  \n-A maintenance beaver"
zhCN = "“其实，我们并不需要如此过滤清水，前面的三个过滤器是为了去除那些不明来源的神秘肉和内脏。对了，你见过蒂米吗？”  \n— 一只维护松鼠"
zhTW = "\"實際上，我們不需要把清水過濾得那麼乾淨，前面三個過濾器是用來去除那些從指向不明的地方出現的神秘肉類和內臟的。對了，你有看到提米嗎？\"\n- 一隻維修的海狸"
ruRU = "\"На самом деле, нам не так уж и нужно фильтровать чистую воду, первые три фильтра предназначены для удаления всего этого таинственного мяса и кишок, которые появляются непонятно откуда. Кстати, ты не видел Тими?\"\n- Бобер-сантехник"
jaJP = "実際、私たちはそんなに清水を濾過する必要はありません。最初の三つのフィルターは、どこからともなく現れる不思議な肉や内臓を取り除くためのものです。ところで、ティミーを見ましたか？\n- メンテナンスビーバー"
frFR = "En fait, nous n'avons pas besoin de filtrer autant d'eau claire, les trois premiers filtres servent à éliminer toute cette viande et ces entrailles mystérieuses qui apparaissent de je ne sais où. Au fait, as-tu vu Timmy ?\"\n-Un castor de maintenance"
deDE = "\"Tatsächlich müssen wir klares Wasser nicht so sehr filtern, die ersten drei Filter dienen dazu, all das mysteriöse Fleisch und die Eingeweide zu entfernen, die von irgendwoher auftauchen. Übrigens, hast du Timmy gesehen?\"\n-Ein Wartungs-Biber"
plPL = "\"Właściwie nie musimy aż tak filtrować czystej wody, pierwsze trzy filtry służą do usunięcia całego tego tajemniczego mięsa i wnętrzności, które pojawia się skądś tam. A tak przy okazji, widziałeś Timmiego?\"  \n- Właścicielka bobra serwisowego"
ptBR = "\"Na verdade, não precisamos filtrar tanta água limpa assim, os primeiros três filtros servem para remover toda aquela carne misteriosa e entranhas que aparecem de sabe-se lá onde. A propósito, você viu o Timmy?\"  \n- Um castor de manutenção"
koKR = "\"사실, 우리는 그렇게 투명한 물을 여과할 필요가 없어요. 첫 세 개의 여과기는 어디선가 나타나는 그 신비한 고기와 내장을 제거하기 위한 것이죠. 그런데, 팀미를 본 적이 있나요?\"\n- 유지 보수 비버"
csCZ = "\"Vlastně nepotřebujeme až tolik filtrovat čistou vodu, první tři filtry slouží k odstranění toho tajemného masa a vnitřností, které se objevují odkudsi. Mimochodem, viděli jste Timmyho?\"\n-Údržbový bobr"
viVN = "\"Thực ra, chúng tôi không cần lọc nước sạch đến vậy, ba bộ lọc đầu tiên là để loại bỏ tất cả những loại thịt và nội tạng bí ẩn xuất hiện từ nơi nào đó. Nhân tiện, bạn đã thấy Timmy chưa?\"  \n-Một con hải ly bảo trì"

