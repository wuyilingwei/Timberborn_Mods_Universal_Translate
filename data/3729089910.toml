plPL = "Małe miejsce do przechowywania jednego zwoju, które służy do ułatwienia importowania planów z innych dzielnic."
ptBR = "Um pequeno espaço de armazenamento para um pergaminho que serve para facilitar a importação de plantas de outros distritos."
koKR = "다른 구역에서 청사진을 수입하는 데 도움을 주는 하나의 두루마리를 위한 작은 저장소입니다."
csCZ = "Malé úložiště pro jeden svitek, které usnadňuje importování plánů z jiných čtvrtí."
viVN = "Một nơi lưu trữ nhỏ cho một cuộn giấy dùng để thuận tiện cho việc nhập khẩu các bản thiết kế từ các khu vực khác."

