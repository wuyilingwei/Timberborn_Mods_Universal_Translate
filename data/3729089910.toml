["Lapantouflemagic.Megaplatform.FlavorDescription"]
raw = "\"So we have to refill the lights when the player's not look-\n - Shhhh! That's a secret!\"\n -Two anonymous beavers"
status = "normal"
enUS = "\"So we have to refill the lights when the player's not looking - Shhhh! That's a secret!\" -Two anonymous beavers"
zhCN = "“所以当玩家不看时，我们必须给灯重新加油—— \n - 嘘！那是个秘密！” \n -两只匿名的海狸"
zhTW = "「所以我們必須在玩家不注意的時候重新填充燈光——\n - 嘘！那是秘密！」\n - 兩隻無名的海狸」"
ruRU = "Так что нам нужно пополнить запасы света, когда игрок не смотрит—  \n - Ш-ш-ш! Это секрет!\"  \n - Два анонимных бобра"
jaJP = "「だから、プレイヤーが見ていないときにライトを補充しなければならないんだ。  \n- シーッ！それは秘密だよ！」  \n- 二人の匿名のビーバー」"
frFR = "« Alors nous devons recharger les lumières quand le joueur ne regarde pas - Chut ! C'est un secret ! » - Deux castors anonymes"
deDE = "„Also müssen wir die Lichter nachfüllen, wenn der Spieler nicht hinsieht - Shhhh! Das ist ein Geheimnis!“ - Zwei anonyme Biber"
plPL = "\"Musimy uzupełnić światła, kiedy gracz nie patrzy - Ciii! To tajemnica!\" - Dwa anonimowe bobry"
ptBR = "\"Então temos que reabastecer as luzes quando o jogador não está olhando - Shhhh! Esse é um segredo!\" - Dois castores anônimos"
koKR = "그래서 플레이어가 보지 않을 때 조명을 다시 채워야 해-  \n- 쉿! 그건 비밀이야!\"  \n- 두 명의 익명의 비버"
csCZ = "„Takže musíme znovu naplnit světla, když se hráč nedívá - \n - Ššš! To je tajemství!“ \n - Dva anonymní bobři“"
viVN = "Vì vậy, chúng ta phải nạp lại đèn khi người chơi không chú ý-  \n- Suỵt! Đó là một bí mật!\"  \n- Hai con hải ly vô danh"

