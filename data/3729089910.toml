["Lapantouflemagic.Topentrancewatertightlodge_segment.Description"]
raw = "A medium-sized lodge for two haulers, built around a ladder.\nCan be stacked on itself, variants, and can carry select buildings.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A medium-sized lodge for two haulers, built around a ladder. Can be stacked on itself, variants, and can carry select buildings. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一个中型小屋，可容纳两名搬运工，围绕着一个梯子建造。\n可以自我叠加，具有不同变体，并可以承载某些建筑物。\n<color=#00FFFF>可作为堤坝使用</color>"
zhTW = "一個中型的木屋，可以容納兩名搬運工，圍繞著一個梯子建造。可以疊放在自己上面，有變體，並且可以攜帶特定建築物。<color=#00FFFF>作為堤防運作</color>"
ruRU = "Средний по размеру домик для двух грузчиков, построенный вокруг лестницы. Может накладываться на себя, варианты, и может поднимать выбранные здания. <color=#00FFFF>Работает как плотина</color>"
jaJP = "「二人の運搬者のために作られた、中型のロッジ。はしごの周りに構築されています。\n自分自身の上に積むことができ、バリアントがあり、特定の建物を運ぶことができます。\n<color=#00FFFF>堤防として機能します</color>」"
frFR = "Un pavillon de taille moyenne pour deux transporteurs, construit autour d'une échelle. Peut être empilé sur lui-même, variantes, et peut transporter certains bâtiments. <color=#00FFFF>Fonctionne comme un rempart</color>"
deDE = "Eine mittelgroße Hütte für zwei Transportarbeiter, die um eine Leiter herum gebaut ist. Kann auf sich selbst gestapelt werden, Varianten, und kann ausgewählte Gebäude tragen. <color=#00FFFF>Funktioniert als Damm</color>"
plPL = "Średniej wielkości chata dla dwóch transportowców, zbudowana wokół drabiny. Może być układana jedna na drugiej, warianty i może przenosić wybrane budynki. <color=#00FFFF>Działa jak tama</color>"
ptBR = "A lodge de tamanho médio para dois transportadores, construída em torno de uma escada. Pode ser empilhada sobre si mesma, variantes, e pode carregar construções selecionadas. <color=#00FFFF>Funciona como uma Barreira</color>"
koKR = "두 명의 운반자를 위한 중간 크기의 오두막으로, 사다리를 중심으로 지어졌다.\n자신 위에 쌓을 수 있으며, 변종도 있으며, 선택된 건물을 실을 수 있다.\n<color=#00FFFF>제방으로 작동함</color>"
csCZ = "Středně velká chata pro dva nosiče, postavená kolem žebříku. Lze na sebe skládat, varianty a může nést vybrané budovy. <color=#00FFFF>Funguje jako nábřeží</color>"
viVN = "Một nhà kho vừa cho hai người vận chuyển, được xây dựng xung quanh một chiếc thang.  \nCó thể xếp chồng lên nhau, các biến thể, và có thể chở một số công trình chọn lọc.  \n<color=#00FFFF>Hoạt động như một con đê</color>"

["Lapantouflemagic.Topentrancewatertightlodge_segment.FlavorDescription"]
raw = "\"I wonder how high we can go with that...\"\n -A lumberjack beaver"
status = "normal"
enUS = "\"I wonder how high we can go with that...\"  \n-A lumberjack beaver"
zhCN = "“我不知道我们能达到多高……”\n -一只伐木工海狸"
zhTW = "“我在想我們能上多高……”\n -一隻伐木工海狸"
ruRU = "\"Интересно, как высоко мы сможем подняться с этим...\"  \n- Бобер-лесоруб"
jaJP = "「どこまで高く行けるのか、気になるな…」  \n- 材木伐採者のビーバー"
frFR = "\"Je me demande jusqu'où nous pouvons aller avec ça...\" - Un castor bûcheron"
deDE = "„Ich frage mich, wie hoch wir damit gehen können…“  \n- Ein Holzfäller-Biber"
plPL = "„Zastanawiam się, jak wysoko możemy sięgać...”  \n– Bobrzy drwal"
ptBR = "\"Eu me pergunto até onde podemos chegar com isso...\"  \n-Um castor lenhador"
koKR = "그걸로 얼마나 높이 올라갈 수 있을까...  \n- 나무꾼 비버"
csCZ = "\"Zajímalo by mě, jak vysoko to můžeme dostat...\"\n -Bobr dřevorubec"
viVN = "\"Tôi tự hỏi chúng ta có thể đi cao đến mức nào với điều đó...\"  \n-Một con hải ly đốn gỗ"

["Lapantouflemagic.BadwaterPump.Description"]
raw = "An entirely mechanical bad water pumping station.\nThe propeller needs to be submerged.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "An entirely mechanical bad water pumping station. The propeller needs to be submerged. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一个完全机械化的污水抽水站。  \n螺旋桨需要浸入水中。  \n<color=#00FFFF>作为堤坝工作</color>"
zhTW = "一個完全機械化的壞水抽水站。  \n螺旋槳需要淹沒。  \n<color=#00FFFF>作為堤壩運作</color>"
ruRU = "Ц entirely механическая станция откачки плохой воды. Пропеллер должен быть погружен. <color=#00FFFF>Работает как плотина</color>"
jaJP = "完全に機械式の悪水ポンプステーションです。  \nプロペラは水中に沈める必要があります。  \n<color=#00FFFF>堤防として機能します</color>"
frFR = "Une station de pompage d'eau contaminée entièrement mécanique. L'hélice doit être submergée. <color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Eine rein mechanische Abwasserpumpe.\nDer Propeller muss eingetaucht sein.\n<color=#00FFFF>Funktioniert als Deich</color>"
plPL = "W pełni mechaniczna stacja pompowania złej wody. \nŚmigło musi być zanurzone. \n<color=#00FFFF>Działa jako tama</color>"
ptBR = "Uma estação de bombeamento de água ruim completamente mecânica. O hélice precisa estar submerso. <color=#00FFFF>Funciona como uma Baração</color>"
koKR = "완전 기계식 오수 펌프 스테이션입니다. 프로펠러는 잠수해야 합니다. <color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Úplně mechanická čerpací stanice na špatnou vodu. \nLopatka musí být ponořena. \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một trạm bơm nước xấu hoàn toàn bằng cơ khí.\nCánh quạt cần phải được ngập nước.\n<color=#00FFFF>Hoạt động như một đê</color>"

["Lapantouflemagic.BadwaterPump.FlavorDescription"]
raw = "\"The modmaker is a sadistic maniac? What's a ''modmaker''? What are you talking about? Did you drink that stuff?\"\n -A worried nurse beaver"
status = "normal"
enUS = "\"The modmaker is a sadistic maniac? What's a 'modmaker'? What are you talking about? Did you drink that stuff?\"  \n-A worried nurse beaver"
zhCN = "“这个模组制作人是个虐待狂？‘模组制作人’是什么？你在说什么？你喝了那个东西吗？”\n -一只担心的护士海狸"
zhTW = "「這個模組製作人是一個虐待狂嗎？什麼是「模組製作人」？你在說什麼？你喝了那種東西嗎？」  \n- 一位擔心的護士海狸"
ruRU = "\"Модмейкер - садистский маньяк? Кто такой ''модмейкер''? О чем ты говоришь? Ты пил эту штуку?\"  \n- Озабоченная медсестра-бобер"
jaJP = "「このモッドメーカーはサディスティックな狂人なのか？『モッドメーカー』って何？何を言ってるの？その薬を飲んだのか？」\n- 心配そうな看護師ビーバー"
frFR = "\"Le créateur de mod est un maniaque sadique ? Qu'est-ce qu'un ''créateur de mod'' ? De quoi parles-tu ? Tu as bu de cette chose ?\" \n -Une castor infirmière inquiète"
deDE = "\"Der Modding-Hersteller ist ein sadistischer Wahnsinniger? Was ist ein ''Modding-Hersteller''? Worüber redest du? Hast du das Zeug getrunken?\" - Eine besorgte Pflege-Biber"
plPL = "\"Modder to sadystyczny szaleniec? Co to znaczy ''modder''? O czym mówisz? Piłeś to świństwo?\" - Zmartwiona pielęgniarka bobrów"
ptBR = "\"O criador do mod é um maníaco sádico? O que é um ''criador de mod''? Sobre o que você está falando? Você bebeu aquela coisa?\"\n -Uma castor enfermeira preocupada"
koKR = "\"모드 제작자는 Sadistic Manic인가요? '모드 제작자'는 무엇인가요? 무슨 소리 하고 있는 건가요? 그걸 마셨나요?\"\n - 걱정하는 간호 비버"
csCZ = "Modmaker je sadistický maniak? Co je to ''modmaker''? O čem to mluvíte? Pila jste tohle?\"\" \n - Ustaraná zdravotní vever"
viVN = "\"Người làm mod là một kẻ maniac tàn nhẫn? ''Người làm mod'' là gì? Bạn đang nói về điều gì vậy? Bạn có uống thứ đó không?\" - Một nàng hải ly lo lắng"

