["Lapantouflemagic.primitivedam3x3Utilityupgrade.FlavorDescription"]
raw = "Behold the incredible power of sticks and glue! And screws, planks, metal beams and proper planning of course."
status = "normal"
enUS = "Behold the incredible power of sticks and glue! And screws, planks, metal beams, and proper planning, of course."
zhCN = "“看看木棍和胶水的神奇力量！当然，还有螺丝、木板、金属梁和恰当的规划。”"
zhTW = "盡情欣賞木棍和膠水的驚人力量！還有螺絲、木板、金屬樑，當然還有適當的規劃。"
ruRU = "Смотрите на невероятную силу палок и клея! И винтов, досок, металлических балок и правильного планирования, конечно же."
jaJP = "「スティックと接着剤の驚くべき力を見よ！もちろん、ネジ、板、金属ビーム、そして適切な計画も。」"
frFR = "Voici le pouvoir incroyable des bâtons et de la colle ! Et des vis, des planches, des poutres en métal et bien sûr, une planification appropriée."
deDE = "Erlebe die unglaubliche Kraft von Stöcken und Kleber! Und Schrauben, Planken, Metallträger und natürlich eine vernünftige Planung."
plPL = "Podziwiaj niesamowitą moc kijów i kleju! A także śrub, desek, metalowych belek i oczywiście odpowiedniego planowania."
ptBR = "Contemple o incrível poder de gravetos e cola! E parafusos, tábuas, vigas de metal e um bom planejamento, é claro."
koKR = "막대기와 풀의 놀라운 힘을 보라! 물론 나사, 널빤지, 금속 빔과 적절한 계획도 포함된다."
csCZ = "Hle, neuvěřitelná síla klacků a lepidla! A samozřejmě také šroubů, prken, kovových nosníků a správného plánování."
viVN = "Hãy chiêm ngưỡng sức mạnh tuyệt vời của gậy và keo! Cùng với đinh vít, ván, dầm kim loại và tất nhiên là kế hoạch hợp lý."

