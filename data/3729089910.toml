["Lapantouflemagic.Florist.Description"]
raw = "A small house monopolizing an excessive amount of material solely to allow one beaver to enjoy his hobby.\nMight save your colony if you foolishly lost all of your berries or somehow managed to eradicate brambles.\nThe terrace must be <color=yellow>above ground.</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A small house monopolizing an excessive amount of material solely to allow one beaver to enjoy his hobby. Might save your colony if you foolishly lost all of your berries or somehow managed to eradicate brambles. The terrace must be <color=yellow>above ground.</color> <color=#00FFFF>Works as a Levee</color>"
zhCN = "“一座小房子，垄断了过量的材料，仅仅是为了让一只海狸享受他的爱好。\n如果你愚蠢地失去了所有的浆果，或者以某种方式根除掉了灌木丛，它可能会拯救你的殖民地。\n露台必须是<color=yellow>地面以上。</color>\n<color=#00FFFF>作为堤防使用</color>”"
zhTW = "一座小屋，壟斷著過量的材料，僅僅是讓一隻海狸享受他的愛好。\n如果你愚蠢地丟失了所有的漿果，或者以某種方式消滅了灌木叢，它可能會拯救你的殖民地。\n陽臺必須是<color=yellow>高於地面。</color>\n<color=#00FFFF>作為堤防使用</color>"
ruRU = "Небольшой дом, который монополизирует чрезмерное количество материалов исключительно для того, чтобы один бобер мог наслаждаться своим хобби. Может спасти вашу колонию, если вы неосторожно потеряли все свои ягоды или каким-то образом уничтожили ежевику. Терраса должна быть <color=yellow>над землёй.</color> <color=#00FFFF>Работает как плотина</color>"
jaJP = "「一匹のビーバーが趣味を楽しむためだけに過剰な素材を独占する小さな家。\nもしあなたが愚かにも全てのベリーを失ったり、何らかの方法でイバラを根絶してしまった場合、あなたのコロニーを救うかもしれません。\nテラスは<color=yellow>地面の上に</color>ある必要があります。\n<color=#00FFFF>堤防として機能します</color>」"
frFR = "Une petite maison monopolisant une quantité excessive de matériaux uniquement pour permettre à un castor de profiter de son hobby.  \nPourrait sauver votre colonie si vous avez imprudemment perdu toutes vos baies ou réussi à éradiquer les ronces.  \nLa terrasse doit être <color=yellow>suspendue.</color>  \n<color=#00FFFF>Fonctionne comme un digue</color>"
deDE = "Ein kleines Haus, das eine übermäßige Menge an Materialien monopolisiert, nur um einem Biber zu gestatten, sein Hobby zu genießen. \nKönnte deine Kolonie retten, wenn du törichterweise all deine Beeren verloren hast oder es dir gelungen ist, Brombeeren auszurotten. \nDie Terrasse muss <color=yellow>über dem Boden.</color> \n<color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Mały domek monopolizujący nadmierną ilość materiałów, aby umożliwić jednemu bobrowi cieszenie się swoim hobby. Może uratować twoją kolonię, jeśli głupio straciłeś wszystkie jagody lub w jakiś sposób zdołałeś wytępić jeżyny. Taras musi być <color=yellow>ponad ziemią.</color> <color=#00FFFF>Działa jako zapora</color>"
ptBR = "Uma pequena casa monopolizando uma quantidade excessiva de material apenas para permitir que um castor desfrute de seu hobby. Pode salvar sua colônia se você perder tolices todas as suas frutas ou de alguma forma conseguir erradicar os silvados. O terraço deve estar <color=yellow>acima do solo.</color> <color=#00FFFF>Funciona como uma Barreira</color>"
koKR = "한 비버가 자신의 취미를 즐기기 위해 과도한 양의 자원을 독점하는 작은 집입니다.\n모든 베리를 어리석게 잃어버리거나 어떻게든 가시덤불을 근절해버린 경우, 당신의 식민지를 구할 수 있습니다.\n테라스는 <color=yellow>지면 위에</color> 있어야 합니다.\n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Malý dům monopolizující nadměrné množství materiálu pouze za účelem umožnit jednomu bobrovi užívat si jeho koníček. \nMůže zachránit vaši kolonie, pokud jste hloupě ztratili všechny své bobule nebo se nějakým způsobem podařilo vymýtit ostružiní. \nTerasa musí být <color=yellow>nad zemí.</color> \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một ngôi nhà nhỏ chiếm diện tích vật liệu quá mức chỉ để cho một con castor thưởng thức sở thích của nó.  \nCó thể cứu thuộc địa của bạn nếu bạn ngu ngốc làm mất hết quả mọng hoặc bằng cách nào đó đã xóa sổ cây dây leo.  \nBan công phải nằm <color=yellow>trên mặt đất.</color>  \n<color=#00FFFF>Hoạt động như một đê</color>"

["Lapantouflemagic.Florist.FlavorDescription"]
raw = "\"See, dandelions and berries like a very particular type of soil, very hard to replicate. That's why we can't plant them wherever we like.\"\n -A florist beaver"
status = "normal"
enUS = "\"See, dandelions and berries prefer a very specific type of soil that's hard to replicate. That's why we can't plant them just anywhere.\"  \n-A florist beaver"
zhCN = "“你看，蒲公英和浆果喜欢一种非常特定的土壤，难以复制。这就是我们不能随便种植它们的原因。”  \n- 一只花匠海狸"
zhTW = "「你看，蒲公英和漿果需要一種非常特定的土壤，這種土壤很難複製。這就是為什麼我們不能隨便在任何地方種植它們。」  \n- 一位花店海狸"
ruRU = "\"Смотри, одуванчики и ягоды нуждаются в очень особом типе почвы, которому сложно подобрать аналог. Вот почему мы не можем сажать их где хотим.\" \n- Бобер-флорист"
jaJP = "「見てごらん、タンポポやベリーは非常に特定のタイプの土を好むんだ、再現するのがとても難しい。だから、好きな場所に植えることができないんだ。」  \n- フローリストビーバー"
frFR = "\"Vous voyez, les pissenlits et les baies aiment un type de sol très particulier, difficile à reproduire. C'est pourquoi nous ne pouvons pas les planter où nous le souhaitons.\"  \n- Un castor fleuriste"
deDE = "„Siehst du, Löwenzähne und Beeren benötigen eine ganz bestimmte Art von Boden, die sehr schwer nachzubilden ist. Deshalb können wir sie nicht überall pflanzen, wo wir wollen.“  \n–Ein Floristen-Biber"
plPL = "\"Patrz, mniszek lekarski i jagody rosną w bardzo szczególnym rodzaju gleby, bardzo trudno to podrobić. Dlatego nie możemy ich sadzić, gdzie tylko chcemy.\"  \n- Brzoza florystka"
ptBR = "\"Veja, os dentes-de-leão e as frutas silvestres gostam de um tipo de solo muito particular, muito difícil de replicar. É por isso que não podemos plantá-los onde quisermos.\"  \n-Um castor florista"
koKR = "\"보세요, 민들레와 베리는 매우 특정한 종류의 토양을 필요로 해요, 복제하기 매우 어려운. 그래서 우리는 원하는 곳에 심을 수 없는 거죠.\"\n- 한 플로리스트 비버"
csCZ = "\"Vidíte, pampelišky a bobule mají rády velmi specifický typ půdy, který je velmi obtížné napodobit. Proto je nemůžeme vysadit, kde se nám zlíbí.\"  \n -Květinářská bobr"
viVN = "\"Bạn thấy đấy, bồ công anh và quả mọng thích một loại đất rất đặc biệt, rất khó để nhân bản. Đó là lý do tại sao chúng tôi không thể trồng chúng ở bất cứ đâu mình thích.\"  \n-Một chú hải ly thợ làm vườn"

