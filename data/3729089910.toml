["Lapantouflemagic.MildDisease.DeathMessage"]
raw = "<color=green>'s condition suddenly worsened and is now free of suffering. Let's hope it was not contagious.</color>"
status = "normal"
enUS = "<color=green>'s condition suddenly worsened and is now free of suffering. Let's hope it was not contagious.</color>"
zhCN = "<color=green>'s 状况突然恶化，现已不再受苦。希望这不是传染病。</color>"
zhTW = "<color=green>「的情況突然惡化，現在不再痛苦了。希望這不是傳染病。」</color>"
ruRU = "<color=green>Состояние вдруг ухудшилось, и теперь он свободен от страданий. Надеемся, это не было заразным.</color>"
jaJP = "<color=green>'s 状態が突然悪化し、苦しみから解放されました。感染していなかったことを願うばかりです。</color>"
frFR = "<color=green>l'état de 's'est soudainement détérioré et il est maintenant libéré de toute souffrance. Espérons que ce n'était pas contagieux.</color>"
deDE = "<color=green>Der Zustand von 's hat sich plötzlich verschlechtert und ist jetzt frei von Leiden. Hoffen wir, dass es nicht ansteckend war.</color>"
plPL = "<color=green>Stan się nagle pogorszył i teraz jest wolny od cierpienia. Miejmy nadzieję, że to nie było zaraźliwe.</color>"
ptBR = "<color=green>A condição de <name> piorou subitamente e agora está livre de sofrimento. Vamos torcer para que não tenha sido contagiosa.</color>"
koKR = "<color=green>'s 상태가 갑자기 악화되어 고통에서 벗어났습니다. 전염성이 아니기를 바랍니다.</color>"
csCZ = "<color=green>Stav se náhle zhoršil a nyní je osvobozen od utrpení. Doufejme, že to nebylo nakažlivé.</color>"
viVN = "<color=green>Tình trạng của 'đã đột ngột xấu đi và giờ đã thoát khỏi đau đớn. Hy vọng rằng nó không lây nhiễm.</color>"

