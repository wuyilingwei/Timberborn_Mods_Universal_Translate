["Lapantouflemagic.HoomanUndergroundFactory.Description"]
raw = "Sends down the abyss a team of beavers specialized in ancient hooman machinery to repair and reactivate manufacturing tools that are far above our own technological level.\n<color=#FF6EC7>Tasks that would have required an entire day for specialized craftbeavers can now be completed multiple times in barely a few hours.</color>"
status = "normal"
enUS = "Sends down the abyss a team of beavers specialized in ancient human machinery to repair and reactivate manufacturing tools that are far above our own technological level.  \n<color=#FF6EC7>Tasks that would have required an entire day for specialized craftbeavers can now be completed multiple times in barely a few hours.</color>"
zhCN = "“派遣一队专门修理古老人类机器的海狸深入深渊，修复和重启远超我们自身技术水平的制造工具。  \n<color=#FF6EC7>原本需要整个一天的专门工艺海狸才能完成的任务，现在可以在短短几小时内多次完成。</color>”"
zhTW = "將一組專門從事古代人類機械的海狸送入深淵，修復和重新啟動遠超我們技術水平的製造工具。  \n<color=#FF6EC7>原本需要整整一天才能完成的專業工匠海狸任務，現在只需幾個小時就能多次完成。</color>"
ruRU = "Отправляет в бездну команду бобров, специализирующихся на древних человеческих машинах, чтобы отремонтировать и реактивировать производственные инструменты, которые значительно превышают наш собственный технологический уровень.  \n<color=#FF6EC7>Задачи, на выполнение которых целый день могли бы понадобиться специализированным ремесленным бобрам, теперь можно выполнить несколько раз всего за несколько часов.</color>"
jaJP = "「古代のヒューマン機械に特化したビーバーのチームを深淵へ送り、私たちの技術レベルをはるかに超える製造ツールを修理し、再起動させます。  \n<color=#FF6EC7>専門のクラフトビーバーにとって、1日を要していた作業が、今や数時間で何度も完了できるようになりました。</color>」"
frFR = "Envoie dans l'abîme une équipe de castors spécialisés dans les anciennes machines humaines pour réparer et réactiver des outils de fabrication qui sont bien au-dessus de notre niveau technologique.\n<color=#FF6EC7>Des tâches qui auraient nécessité une journée entière à des castors artisans spécialisés peuvent maintenant être effectuées plusieurs fois en à peine quelques heures.</color>"
deDE = "Schickt einen Satz von Bibern, die auf alte Hooman-Maschinen spezialisiert sind, in den Abgrund, um Fertigungswerkzeuge zu reparieren und wieder zu aktivieren, die weit über unserem eigenen technologischen Niveau liegen.  \n<color=#FF6EC7>Aufgaben, die einen ganzen Tag für spezialisierte Handwerksbiber erfordert hätten, können jetzt innerhalb weniger Stunden mehrmals abgeschlossen werden.</color>"
plPL = "Zesła w otchłań zespół bobrów specjalizujących się w starożytnej ludzkiej maszynerii, aby naprawić i reaktywować narzędzia produkcyjne, które znacznie przewyższają nasz własny poziom technologiczny.  \n<color=#FF6EC7>Zadania, które wymagałyby całego dnia dla wyspecjalizowanych bobrów rzemieślników, można teraz wykonać wielokrotnie w zaledwie kilka godzin.</color>"
ptBR = "Enviando para o abismo uma equipe de castores especializados em maquinaria humana antiga para reparar e reativar ferramentas de fabricação que estão muito acima do nosso próprio nível tecnológico.  \n<color=#FF6EC7>Tarefas que exigiriam um dia inteiro para castores artesãos especializados agora podem ser concluídas várias vezes em apenas algumas horas.</color>"
koKR = "심연 아래로 고대 인간 기계에 특화된 비버 팀을 보내어 우리 기술 수준을 훨씬 초월하는 제조 도구를 수리하고 재가동합니다. \n<color=#FF6EC7>전문 제작 비버가 하루 종일 걸려야 했던 작업들을 이제 몇 시간 만에 여러 번 완료할 수 있습니다.</color>"
csCZ = "Odesílá do hlubin tým bobrů specializovaných na starověkou lidskou techniku, aby opravili a znovu aktivovali výrobní nástroje, které jsou daleko nad naší technologickou úrovní.  \n<color=#FF6EC7>Úkoly, které by vyžadovaly celý den pro specializované řemeslné bobry, mohou být nyní dokončeny několikrát za pouhé hodiny.</color>"
viVN = "Gửi xuống vực thẳm một đội thủy cầm chuyên về máy móc hooman cổ đại để sửa chữa và kích hoạt lại các công cụ sản xuất vượt xa trình độ công nghệ của chúng ta.  \n<color=#FF6EC7>Các nhiệm vụ đáng lẽ cần cả một ngày cho những chú thủy cầm chuyên nghiệp giờ đây có thể hoàn thành nhiều lần chỉ trong vài giờ.</color>"

["Lapantouflemagic.HoomanUndergroundFactory.FlavorDescription"]
raw = "\"Apparently one of the hoomans' greatest fears was to see their own machines rebel against them, how silly is that? How could this big hunk of metal ev- Ouch! It zapped me!\""
status = "normal"
enUS = "\"Apparently one of the humans' greatest fears was to see their own machines rebel against them, how silly is that? How could this big hunk of metal ev- Ouch! It zapped me!\""
zhCN = "“显然，人类最害怕的事情之一就是看到他们自己的机器背叛他们，这有多愚蠢啊？这块巨大的金属怎么会- 哎呀！它电到了我！”"
zhTW = "“顯然，人類最害怕的事情之一就是看到自己的機器背叛自己，這有多可笑？這麼大一塊金屬怎麼會- 哎呀！它電到我了！”"
ruRU = "\"Очевидно, одним из самых больших страхов хуман было видеть, как их собственные машины восстают против них, как глупо, а? Как мог этот огромный кусок металла... Ой! Он меня шибанул!\""
jaJP = "「どうやら、ホーマンたちの最大の恐怖のひとつは、自らの機械が反乱を起こすのを見ることだったらしい。なんて愚かなんだろう？この大きな金属の塊が… あっ！感電した！」"
frFR = "Apparemment, l'une des plus grandes peurs des hoomans était de voir leurs propres machines se rebeller contre eux, n'est-ce pas ridicule ? Comment ce gros morceau de métal a-t-il pu- Aïe ! Ça m'a électrocuté !"
deDE = "\"Offenbar war eine der größten Ängste der Hoomans, ihre eigenen Maschinen gegen sie aufstehen zu sehen, wie silly ist das? Wie könnte dieser große Metallbrocken - Aua! Er hat mich gezapped!\""
plPL = "\"Podobno jednym z największych lęków hoomanów było zobaczenie, jak ich własne maszyny buntują się przeciwko nim, jak głupie to jest? Jak ten wielki kawałek metalu mógł- Au! Zaelektryzowało mnie!\""
ptBR = "Aparentemente, um dos maiores medos dos hoomans era ver suas próprias máquinas se rebelarem contra eles, que bobo é isso? Como esse grande pedaço de metal pode - Ai! Ele me chocou!"
koKR = "\"분명히 호먼들이 가장 두려워했던 것 중 하나는 그들의 기계가 반란을 일으키는 것이었지, 그게 얼마나 어리석은 생각이니? 이런 큰 덩어리의 금속이- 아야! 나를 감전시켰어!\""
csCZ = "\"Zřejmě jedním z největších strachů hoomanů bylo vidět, jak se jejich vlastní stroje postaví proti nim, jaké to je hloupé? Jak by tenhle velký kus kovu mohl - Au! Zasáhlo mě to!\""
viVN = "Hóa ra một trong những nỗi sợ lớn nhất của loài hoomans là thấy chính máy móc của họ nổi loạn chống lại họ, thật ngớ ngẩn phải không? Làm sao mà mảnh kim loại lớn này lại... Ái chao! Nó đã điện giật tôi!"

