["Lapantouflemagic.SmallAquiferPump.Description"]
raw = "A perverse contraption using arcane powers to extract water from the ground.\nIs affected by droughts but not by badtides.\nTo be placed on top of two adjacent <color=#FF6EC7>triangle roof</color> buildings.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A perverse contraption using arcane powers to extract water from the ground.  \nIs affected by droughts but not by bad tides.  \nTo be placed on top of two adjacent <color=#FF6EC7>triangle roof</color> buildings.  \n<color=#00FFFF>Works as a Levee</color>"
zhCN = "一种利用神秘力量从地下提取水的古怪装置。\n受干旱影响，但不受倒潮影响。\n需放置在两个相邻的<color=#FF6EC7>三角屋顶</color>建筑上。\n<color=#00FFFF>作为堤坝使用</color>"
zhTW = "一個利用奧術力量從地下抽水的扭曲裝置。  \n受到乾旱的影響，但不受壞潮的影響。  \n需放置在兩座相鄰的<color=#FF6EC7>三角屋頂</color>建築上。  \n<color=#00FFFF>作為堤防使用</color>"
ruRU = "Извращённая конструкция, использующая тайные силы для добычи воды из-под земли. Подвержена засухам, но не подвержена плохим приливам. Должна быть размещена на двух смежных зданиях с <color=#FF6EC7>треугольной крышей</color>. <color=#00FFFF>Работает как плотина</color>"
jaJP = "「地面から水を抽出するための秘術的な力を利用した歪んだ装置です。干ばつの影響を受けますが、悪潮の影響は受けません。隣接する二つの<color=#FF6EC7>三角屋根</color>の建物の上に設置する必要があります。<color=#00FFFF>堤防として機能します</color>。」"
frFR = "Une machine perverse utilisant des pouvoirs arcaniques pour extraire l'eau du sol.  \nEst affectée par les sécheresses mais pas par les marées mauvaises.  \nDoit être placée au-dessus de deux bâtiments à <color=#FF6EC7>toit triangulaire</color> adjacents.  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Eine perverse Vorrichtung, die archaische Kräfte nutzt, um Wasser aus dem Boden zu fördern.  \nWird von Dürren, aber nicht von Flutwellen beeinflusst.  \nMuss oben auf zwei benachbarten <color=#FF6EC7>dreieckigen Dächern</color> platziert werden.  \n<color=#00FFFF>Funktioniert wie ein Deich</color>"
plPL = "Perwersyjna maszyna wykorzystująca tajemne moce do wydobywania wody z ziemi. Jest narażona na susze, ale nie na złe pływy. Należy ją umieścić na szczycie dwóch sąsiadujących budynków <color=#FF6EC7>trójkątnych dachów</color>. <color=#00FFFF>Funkcjonuje jak tama</color>"
ptBR = "Uma contrivência perversa que usa poderes arcanos para extrair água do solo. \nÉ afetada por secas, mas não por marés ruins. \nDeve ser colocada em cima de dois edifícios de <color=#FF6EC7>telhado triangular</color> adjacentes. \n<color=#00FFFF>Funciona como um Dique</color>"
koKR = "땅에서 물을 추출하기 위해 비정상적인 힘을 사용하는 기묘한 장치입니다.\n가뭄의 영향을 받지만 악성 해일의 영향을 받지 않습니다.\n두 개의 인접한 <color=#FF6EC7>삼각 지붕</color> 건물 위에 배치해야 합니다.\n<color=#00FFFF>제방처럼 작동합니다</color>"
csCZ = "Perverzní zařízení využívající prastaré síly k extrakci vody ze země. \nOvlivňují jej sucha, ale ne špatné přílivy. \nMělo by být umístěno na vrcholu dvou sousedních <color=#FF6EC7>trojúhelníkových střech</color>. \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một thiết bị quái đản sử dụng sức mạnh huyền bí để rút nước từ lòng đất.\nBị ảnh hưởng bởi hạn hán nhưng không bị ảnh hưởng bởi thủy triều xấu.\nPhải được đặt trên đỉnh của hai tòa nhà mái <color=#FF6EC7>hình tam giác</color> liền kề.\n<color=#00FFFF>Hoạt động như một bờ kè</color>"

["Lapantouflemagic.SmallAquiferPump.FlavorDescription"]
raw = "\"It is written on the user manual that only a one-legged brass-colored beaver, dancing under the full moon in the middle of twelve Ironteeth statuettes wrapped in cabbage, shall open the security cache and allow to press the start button.\n -A very gullible waterpumper beaver."
status = "normal"
enUS = "It is written in the user manual that only a one-legged brass-colored beaver, dancing under the full moon in the middle of twelve Ironteeth statuettes wrapped in cabbage, shall open the security cache and allow the start button to be pressed.  \n-A very gullible water-pumping beaver."
zhCN = "“用户手册上写着，只有一只腿的铜色海狸，在满月之下，在十二个裹着卷心菜的铁齿小雕像中跳舞，才能打开安全缓存并按下启动按钮。  \n- 一只非常容易上当受骗的抽水海狸。”"
zhTW = "“使用手冊上寫著，只有一隻金色的單腿海狸，在滿月下於十二個包著捲心菜的鐵牙雕像中跳舞，才能打開安全櫃並按下啟動按鈕。  \n- 一隻非常容易上當的抽水海狸。”"
ruRU = "В руководстве пользователя написано, что только однорукий бобер цвета латуни, танцующий под полнолунием посреди двенадцати статуэток Ironteeth, обwrapped в капусту, сможет открыть безопасный люк и разрешить нажать кнопку старт. - Очень доверчивый бобер-насос."
jaJP = "「ユーザーマニュアルには、満月の下でキャベツに包まれた12体のアイアンティースの像に囲まれながら踊る、片足の真鍮色のビーバーだけがセキュリティキャッシュを開き、スタートボタンを押すことができると書かれています。 -非常に騙されやすいポンプビーバー。」"
frFR = "Il est écrit dans le manuel d'utilisation que seul un castor en laiton à une patte, dansant sous la pleine lune au milieu de douze statuettes Ironteeth enveloppées dans du chou, devra ouvrir la cache de sécurité et permettre d'appuyer sur le bouton de démarrage. -Un castor pompeur d'eau très crédule."
deDE = "Im Benutzerhandbuch steht, dass nur ein einbeiniges, messingfarbenes Biber, der unter dem vollen Mond mitten in zwölf mit Kohl umwickelten Ironteeth-Statuetten tanzt, die Sicherheitskassette öffnen und den Startknopf drücken darf. -Ein sehr leichtgläubiger Wasserpump-Biber."
plPL = "W instrukcji obsługi napisano, że tylko jednonożny mosiężny bóbr, tańczący w świetle pełni księżyca wśród dwunastu statuetek Żelaznych Zębów owiniętych w kapustę, otworzy skarbiec zabezpieczający i pozwoli nacisnąć przycisk start. -Bardzo łatwowierny wodożłobrek."
ptBR = "Está escrito no manual do usuário que apenas uma castor de cor de latão com uma perna, dançando sob a lua cheia no meio de doze estatuetas Ironteeth envoltas em repolho, deverá abrir o.cache de segurança e permitir pressionar o botão de iniciar.  \n -Um castor muito crédulo."
koKR = "사용자 매뉴얼에는 오직 한쪽 다리의 황동색 비버가 완전한 달 아래에서 양배추로 감싼 열두 개의 아이언티스 동상들 사이에서 춤을 추어야만 보안 캐시를 열고 시작 버튼을 누를 수 있다고 적혀 있습니다.\n- 매우 잘 속는 물펌핑 비버."
csCZ = "V uživatelské příručce je napsáno, že pouze jednonohý, mosazně zbarvený bobr, tančící pod úplňkem uprostřed dvanácti sošek Ironteeth obalených zelím, otevře bezpečnostní schránku a umožní stisknout tlačítko start.\n -Velmi důvěřivý vodní pumpář bobr."
viVN = "Trên hướng dẫn sử dụng có ghi rằng chỉ có một con nhím đồng màu vàng một chân, nhảy múa dưới ánh trăng tròn giữa mười hai bức tượng Ironteeth được quấn trong bắp cải, mới có thể mở kho bảo mật và cho phép nhấn nút khởi động.  \n -Một con nhím bơ phờ dễ tin."

