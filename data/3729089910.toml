["Lapantouflemagic.DeepWaterpumpupgradewallsegment.Description"]
raw = "A watertight structure to block off the extremity of a chain of deep water pumps.\n<color=red>Ram the camera into the building if placement is difficult</color>.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A watertight structure to block off the extremity of a chain of deep water pumps.  \n<color=red>Ram the camera into the building if placement is difficult</color>.  \n<color=#00FFFF>Works as a Levee</color>"
zhCN = "一个防水结构，用于阻挡一系列深水泵的末端。<color=red>如果放置困难，可以将相机撞到建筑上</color>。<color=#00FFFF>作为堤坝使用</color>"
zhTW = "一個密閉的結構，用來封住深水泵鏈的末端。<color=red>若安置困難，將相機撞向建築物</color>。<color=#00FFFF>作為堤壩使用</color>"
ruRU = "Водонепроницаемая конструкция для блокировки конца цепочки глубоководных насосов.  \n<color=red>Ударьте камерой о здание, если размещение вызывает сложности</color>.  \n<color=#00FFFF>Работает как плотина</color>"
jaJP = "「深水ポンプの一連の端を遮るための防水構造です。<color=red>設置が難しい場合はカメラを建物に突っ込ませてください</color>。<color=#00FFFF>堤防として機能します</color>」"
frFR = "Une structure étanche pour bloquer l'extrémité d'une chaîne de pompes à eau profondes.  \n<color=red>Enfoncez la caméra dans le bâtiment si le placement est difficile</color>.  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Eine wasserdichte Struktur, um das Ende einer Kette von Tiefwasserpumpen abzuschotten.  \n<color=red>Ram die Kamera in das Gebäude, wenn die Platzierung schwierig ist</color>.  \n<color=#00FFFF>Funktioniert wie ein Deich</color>"
plPL = "Struktura wodoszczelna, aby zablokować końcówkę łańcucha głębokich pomp wodnych. \n<color=red>Uderz kamerą w budynek, jeśli umiejscowienie sprawia trudności</color>. \n<color=#00FFFF>Funkcjonuje jak wał przeciwpowodziowy</color>"
ptBR = "Uma estrutura à prova d'água para bloquear a extremidade de uma cadeia de bombas de água profundas.  \n<color=red>Coloque a câmera dentro do edifício se a colocação for difícil</color>.  \n<color=#00FFFF>Funciona como um dique</color>"
koKR = "깊은 물 펌프 체인의 끝을 차단하는 수밀 구조물입니다. \n<color=red>배치가 어려울 경우 카메라를 건물에 밀어 넣으세요.</color> \n<color=#00FFFF>제방처럼 작동합니다.</color>"
csCZ = "Vodotěsná konstrukce, která zablokuje konec řetězce hlubinných vodních pump. \n<color=red>Rázujte kamerou do budovy, pokud je umístění obtížné</color>. \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Cấu trúc chống thấm nước để chặn đầu cuối của một chuỗi máy bơm nước sâu.  \n<color=red>Đệm camera vào tòa nhà nếu việc đặt khó khăn</color>.  \n<color=#00FFFF>Có tác dụng như một đê</color>"

["Lapantouflemagic.DeepWaterpumpupgradewallsegment.FlavorDescription"]
raw = "«xa0We make our dams the proper way, we're not savages!xa0»\n- The expedition leader"
status = "normal"
enUS = "\"We build our dams the right way, we're not savages!\"  \n- The expedition leader"
zhCN = "«我们以正确的方式建造大坝，我们不是野蛮人！»\n- 探险队队长"
zhTW = "「我們以正確的方式建造大壩，並不是野蠻人！」  \n- 探險隊長"
ruRU = "«Мы строим наши плотины правильно, мы не дикие!»\n- Лидер экспедиции"
jaJP = "「私たちは堤防を正しい方法で作ります、私たちは野蛮人ではありません！」  \n- 探検リーダー"
frFR = "«xa0Nous construisons nos barrages comme il se doit, nous ne sommes pas des sauvages !xa0»  \n- Le chef de l'expédition"
deDE = "„«Wir bauen unsere Dämme auf die richtige Weise, wir sind keine Wilder! » - Der Expeditionsleiter“"
plPL = "„«xa0Budujemy nasze tamy w odpowiedni sposób, nie jesteśmy dzikusami!xa0»  \n- Kierownik ekspedycji“"
ptBR = "«xa0Nós construímos nossas barragens da maneira correta, não somos selvagens!xa0»  \n- O líder da expedição"
koKR = "«xa0우리는 우리의 댐을 올바른 방법으로 만들지, 야만인이 아니에요!xa0»  \n- 탐사대장"
csCZ = "„Děláme naše přehrady správným způsobem, nejsme divoši!“  \n- Vedoucí expedice"
viVN = "«xa0Chúng tôi xây đập theo cách đúng đắn, chúng tôi không phải là dã man!xa0»\n- Thủ lĩnh cuộc thám hiểm"

