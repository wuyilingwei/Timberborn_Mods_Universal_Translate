new = "Scouting Balloon"
status = "normal"

["Lapantouflemagic.ScoutBalloon.Description"]
new = "A basic hot air ballon tasked with exploring the lands away from our town in search of other settlements to establish trade routes with."
status = "normal"

["Lapantouflemagic.ScoutBalloon.FlavorDescription"]
new = "\"I believe I can flyyyy~\""
status = "normal"

["Lapantouflemagic.AmpTrader.DisplayName"]
new = "Trade with the AmpEars"
status = "normal"

["Lapantouflemagic.AmpTrader.Description"]
new = "The AmpEars are even worse heretics than the IronTeeth: They have dedicated themselves to study hooman technologies and have somehow concluded that being belly-deep in water is dangerous around machines or some other nonsense. They are willing to trade their electric thingies that they pretend they understand, but only a few ones are worth our time. Also they keep calling us ''the WetButts'' so keep note of where they live so we can aim the trebuchet properly."
status = "normal"

["Lapantouflemagic.AmpTrader.FlavorDescription"]
new = "\"I’ll be baaaaack!\""
status = "normal"

["Lapantouflemagic.PawsTrader.DisplayName"]
new = "Trade with other WhitePaws"
status = "normal"

["Lapantouflemagic.PawsTrader.Description"]
new = "Our expedition is neither the first, neither the last to have been send from our homeland. If we can find other settlements of our kind, they would be good trading partners, since none of the other savages we've met can make an even half-decent stew."
status = "normal"

["Lapantouflemagic.PawsTrader.FlavorDescription"]
new = "\"Nooo! I’ll get abducted by hoomaaaaaaans!\""
status = "normal"

["Lapantouflemagic.IslandTrader.DisplayName"]
new = "Trade with the IslandBeavers"
status = "normal"

["Lapantouflemagic.IslandTrader.Description"]
new = "Islandbeavers are lazy hippies who spend their days partying on the beach and are interested in nothing that isn't fun. The good thing is that we can easily trade them manfactured products since they can’t be bothered making their own, but on the other hand they don’t have a lot of things to give us in exchange, maybe some shiny junk and salt, that will save us the trouble of mining it."
status = "normal"

["Lapantouflemagic.IslandTrader.FlavorDescription"]
new = "\"Yipee!\""
status = "normal"

["Lapantouflemagic.PolarTrader.DisplayName"]
new = "Trade with the PolarBeavers"
status = "normal"

["Lapantouflemagic.PolarTrader.Description"]
new = "The rustic Polarbeavers live in, and explore the ruins of some strange frozen circular hooman city. They would sell their own moms into slavery in exchange for those ''rocks that are always warm'' that wer’re pretty sure don’t actually exist. Otherwise they will want food or coal, and will more than gladly give us as much ice and junk as we can liftoff with. Unless you're the kind of sicko who likes to collect hooman remains."
status = "normal"

["Lapantouflemagic.PolarTrader.FlavorDescription"]
new = "\"I'm scared of heeiiiiiiiigghts!\""
status = "normal"

["Lapantouflemagic.IronTrader.DisplayName"]
new = "Trade with the IronTeeth"
status = "normal"

["Lapantouflemagic.IronTrader.Description"]
new = "The Ironteeth are passionate about all things industry, and they actually hate to trade, especially their coffee. Thankfully they can’t resist a good industrial challenge so something order-made and really hard to do might peak their interest. They seem to appreciate our manufactured products but can’t make them because they ''don’t do soft industry'', whatever that means. Also they are the only ones who will take you seriously when you ask to be payed in loose dirt."
status = "normal"

["Lapantouflemagic.IronTrader.FlavorDescription"]
new = "\"How do I even control this thiiiing!?\""
status = "normal"

["Lapantouflemagic.FolkTrader.DisplayName"]
new = "Trade with the FolkTails"
status = "normal"

["Lapantouflemagic.FolkTrader.Description"]
new = "Our cousins the Folktails like a simple life, mostly filled with agriculture, dancing, and tasty food. They can give us seeds for some interesting new plant species. But If you bring them something amazing enough, they might introduce you to their weird secret hobby."
status = "normal"

["Lapantouflemagic.FolkTrader.FlavorDescription"]
new = "\"I'm flyiiiiing!\""
status = "normal"

["Lapantouflemagic.ForeignFood.DisplayName"]
new = "Foreign Food"
status = "normal"

["Lapantouflemagic.ForeignFood.PluralDisplayName"]
new = "Foreign Food"
status = "normal"

["Lapantouflemagic.TradeBalloon.ToggleEntry"]
new = "Trade:"
status = "normal"

["Lapantouflemagic.EmberTrader.DisplayName"]
new = "Trade with the Emberpelts"
status = "normal"

["Lapantouflemagic.EmberTrader.Description"]
new = "Yet another tribe of filthy heretics, who would have guessedxa0? Those guys have developped an unhealthy obcession with fire and hate getting wet. That puts in question how do they ever bathe but let’s not raise too many uncomfortable questions. They’ve got some humongous trees but won’t tell us how to grow them, and their apples are to die for. Bring back what you can."
status = "normal"

["Lapantouflemagic.EmberTrader.FlavorDescription"]
new = "\"Noxa0! Not this wayxa0! Not this waaaaaaayxa0!\""
status = "normal"

["Lapantouflemagic.LeafTrader.DisplayName"]
new = "Trade with the Leafcoats"
status = "normal"

["Lapantouflemagic.LeafTrader.Description"]
new = "The Leafcoats are, for lack of a better term, weirdoes. It’s unclear whether they actually grow leaves or if they simply glue them on every morning. Anyway, they hate killing plants and get offended if you ask them for such products, but they happily take ours so they also are hypocrites. Anyway our brainiacs want to study the beautiful glowing insects that live in their lands. try to bring us back some."
status = "normal"

["Lapantouflemagic.LeafTrader.FlavorDescription"]
new = "\"You’re not getting rid of me, i’m getting rid of you!\""
status = "normal"

["Need.GeneticEnhancement.DisplayName"]
new = "Somatic DNA Enhancement"
status = "normal"

["Lapantouflemagic.HoomanMedicalFacility.DisplayName"]
new = "Hooman Medical Facility Reactivation Team"
status = "normal"

["Lapantouflemagic.HoomanMedicalFacility.Description"]
new = "Reactivates a hooman medical facility of incomprehensible complexity.\n<color=#FF6EC7>How could a species so advanced go exctinctxa0? This device is capable of improving our bodies to make us stronger, faster, healthier, and can cure pretty much anythingxa0!</color>"
status = "normal"

["Lapantouflemagic.HoomanMedicalFacility.FlavorDescription"]
new = "\"Don’t kill your ennemies… outlive themxa0!\"\n-Ancient hooman motivation poster"
