["Lapantouflemagic.StorageHouseW.Description"]
raw = "A tall house that doubles as a liquid storage.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A tall house that doubles as a liquid storage.<color=#00FFFF>Works as a Levee</color>"
zhCN = "一座高耸的房子，兼作液体储存。\n<color=#00FFFF>作为堤坝使用</color>"
zhTW = "一座高大的房子，兼作液體儲存。\n<color=#00FFFF>可作為堤壩使用</color>"
ruRU = "Высокий дом, который также служит хранилищем для жидкостей.  \n<color=#00FFFF>Работает как плотина</color>"
jaJP = "液体貯蔵としても機能する高い家。\n<color=#00FFFF>堤防としても機能します</color>"
frFR = "Une grande maison qui fait également office de stockage de liquide.  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Ein hohes Gebäude, das zudem als Flüssigkeitsspeicher dient. <color=#00FFFF>Funktioniert als Damm</color>"
plPL = "Wysoki dom, który pełni podwójną funkcję jako magazyn cieczy. <color=#00FFFF>Działa jak tama</color>"
ptBR = "Uma casa alta que funciona como um armazenamento de líquidos. <color=#00FFFF>Funciona como uma Barragem</color>"
koKR = "액체 저장소로 겸용되는 높은 집입니다.\n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Vysoký dům, který slouží jako sklad tekutin.  \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một ngôi nhà cao gấp đôi là kho chứa chất lỏng.  \n<color=#00FFFF>Hoạt động như một Đê</color>"

["Lapantouflemagic.StorageHouseB.FlavorDescription"]
raw = "\"I... I tried, I really tried, but I couldn't help myself, I HAD to make it a house!\"\n -An architect beaver"
status = "normal"
enUS = "\"I... I tried, I really tried, but I couldn't help myself, I HAD to make it a house!\"  \n-An architect beaver"
zhCN = "“我…我试过了，我真的试过了，但我无法控制自己，我必须把它建成一座房子！”  \n- 一只建筑师海狸"
zhTW = "「我…我試過了，我真的試過了，但我無法控制自己，我一定得把它變成一個房子！」  \n- 一隻建築師海狸"
ruRU = "\"Я... Я пытался, я действительно пытался, но я не смог себя удержать, я ДОЛЖЕН был сделать это домом!\"  \n- Архитектор-бобёр"
jaJP = "「私は…私は頑張った、本当に頑張ったけど、どうしても我慢できなかった、家にしなければならなかった！」  \n- 建築家ビーバー"
frFR = "\"J... j'ai essayé, j'ai vraiment essayé, mais je n'ai pas pu m'en empêcher, je DEVais en faire une maison !\" - Un castor architecte"
deDE = "„Ich... ich habe es versucht, ich habe wirklich versucht, aber ich konnte mich nicht beherrschen, ich MUSSTE es zu einem Haus machen!“  \n -Ein Architekten-Biber"
plPL = "„Ja... ja próbowałem, naprawdę próbowałem, ale nie mogłem się powstrzymać, MUSIAŁEM zrobić to na dom!”  \n -Architekt-bóbr"
ptBR = "\"Eu... eu tentei, eu realmente tentei, mas não consegui me controlar, eu TIVE que fazer uma casa!\"  \n -Um castor arquiteto"
koKR = "\"저... 정말 해보려고 했는데, 저를 제어할 수 없었어요. 꼭 집으로 만들어야 했어요!\"  \n- 건축가 비버"
csCZ = "„Já... Já jsem se snažil, opravdu jsem se snažil, ale nemohl jsem si pomoci, MUSEL jsem to udělat jako dům!“  \n -Architekt bobr"
viVN = "\"Tôi... tôi đã cố gắng, tôi thật sự đã cố gắng, nhưng tôi không thể kiềm chế được, tôi PHẢI biến nó thành một ngôi nhà!\"  \n -Một chú hải ly kiến trúc sư\""

