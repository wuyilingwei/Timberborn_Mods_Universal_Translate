["Lapantouflemagic.Brewery.Description"]
raw = "A big house set to allow brewers to easily manage a large number of fermentation barrels.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A big house set to allow brewers to easily manage a large number of fermentation barrels. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一个大房子，方便酿酒师轻松管理大量发酵桶。  \n<color=#00FFFF>作为堤坝使用</color>"
zhTW = "一座大型房屋，讓釀酒師輕鬆管理大量的發酵桶。\n<color=#00FFFF>作為堤壩使用</color>"
ruRU = "Большой дом, предназначенный для удобного управления большим количеством бочков для ферментации.\n<color=#00FFFF>Работает как набережная</color>"
jaJP = "大きな家で、醸造家が多くの発酵樽を簡単に管理できるように設計されています。  \n<color=#00FFFF>堤防として機能します</color>"
frFR = "Une grande maison conçue pour permettre aux brasseurs de gérer facilement un grand nombre de fûts de fermentation. <color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Ein großes Haus, das es Brauern ermöglicht, eine große Anzahl von Gärfässern leicht zu verwalten. <color=#00FFFF>Funktioniert wie ein Deich</color>"
plPL = "Wielki budynek umożliwiający piwowarom łatwe zarządzanie dużą liczbą beczek fermentacyjnych. <color=#00FFFF>Działa jak tamę</color>"
ptBR = "Uma grande casa projetada para permitir que os cervejeiros gerenciem facilmente um grande número de barris de fermentação. <color=#00FFFF>Funciona como uma Barragem</color>"
koKR = "맥주 양조업자가 많은 발효 통을 쉽게 관리할 수 있도록 설정된 큰 집입니다.\n<color=#00FFFF>제방처럼 작동합니다</color>"
csCZ = "Velký dům určený k usnadnění práce pivovarům při správě velkého množství fermentačních sudů.  \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một ngôi nhà lớn được thiết kế để cho phép các nhà sản xuất bia dễ dàng quản lý một số lượng lớn thùng lên men.  \n<color=#00FFFF>Hoạt động như một đê</color>"

["Lapantouflemagic.Brewery.FlavorDescription"]
raw = "\"Mushroom juice is the worst-tasting thing you could think of, and yet adding it to some preparations makes everything better. We should study this someday\"\n -A scientist beaver"
status = "normal"
enUS = "\"Mushroom juice is the worst-tasting thing you could think of, and yet adding it to some preparations makes everything better. We should study this someday.\"  \n- A scientist beaver"
zhCN = "“蘑菇汁是你能想到的最难喝的东西，但是将它加入某些准备中却会让一切变得更好。我们应该有一天研究一下这个。”  \n -一只科学家海狸"
zhTW = "「蘑菇汁是你能想到的最難喝的東西，但將它加入一些配方卻能讓一切變得更好。我們應該在某天研究這個。」  \n- 一位科學家海狸"
ruRU = "\"Грибной сок - это то, что можно назвать самой отвратительной на вкус вещью, которую только можно вообразить, и тем не менее его добавление в некоторые блюда делает всё лучше. Нам стоит когда-нибудь это изучить.\"  \n- Ученый бобер"
jaJP = "「キノコジュースは考えうる中で最もまずい味のものでありながら、いくつかの調理に加えることで全てが良くなる。いつかこれを研究すべきだ」  \n- 科学者ビーバー"
frFR = "\"Le jus de champignon est la chose la plus horrible au goût que vous puissiez imaginer, et pourtant l'ajouter à certaines préparations améliore tout. Nous devrions étudier cela un jour.\" \n-Un castor scientifique"
deDE = "„Pilsaft ist das schlimmste, was man sich vorstellen kann, und doch macht es alles besser, wenn man es zu einigen Zubereitungen hinzufügt. Wir sollten das eines Tages erforschen.“  \n- Ein wissenschaftlicher Biber"
plPL = "\"Sok grzybowy to najgorszy smak, jaki możesz sobie wyobrazić, a jednak dodanie go do niektórych potraw poprawia wszystko. Powinniśmy to kiedyś zbadać.\"  \n - Włamywacz naukowiec"
ptBR = "\"Suco de cogumelo é a coisa de pior gosto que você pode imaginar, e ainda assim, adicioná-lo a algumas preparações melhora tudo. Devemos estudar isso algum dia.\"  \n-Um castor cientista"
koKR = "\"버섯 주스는 생각할 수 있는 최악의 맛을 가진 것이지만, 그것을 몇 가지 조리에 추가하면 모든 것이 더 좋아진다. 언젠가는 이것을 연구해야 한다.\"\n -과학자 비버"
csCZ = "\"Šťáva z hub je nejhorší chuť, kterou si dokážete představit, a přesto její přidání do některých přípravků všechno zlepší. Měli bychom to někdy prozkoumat.\"  \n- Vědecký bobr"
viVN = "\"Nước nấm là thứ có vị tệ nhất mà bạn có thể nghĩ đến, nhưng việc thêm nó vào một số món chế biến thì lại làm mọi thứ tốt hơn. Chúng ta nên nghiên cứu điều này vào một ngày nào đó.\"  \n-Một con đển khoa học"

