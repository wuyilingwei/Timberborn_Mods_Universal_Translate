["Lapantouflemagic.Woodupgrade_Builders.FlavorDescription"]
raw = "\"What's the tower for?\"\n -A confused lumberjack beaver"
status = "normal"
enUS = "\"What's the tower for?\"  \n-A confused lumberjack beaver"
zhCN = "“这座塔是干什么用的？”\n - 一只困惑的伐木海狸"
zhTW = "「這座塔是用來做什麼的？」  \n- 一隻困惑的樵夫海狸"
ruRU = "\"Для чего эта башня?\"  \n- Недоумевающий бобёр-лесоруб"
jaJP = "「この塔は何のためですか？」  \n- 混乱した材木伐採ビーバー"
frFR = "\"À quoi sert la tour ?\" - Un castor bûcheron confus"
deDE = "\"Was ist der Turm dafür?\"\n -Ein verwirrter Holzfäller-Biber"
plPL = "\"Do czego służy ta wieża?\"\n -Zdezorientowany bobr drwal"
