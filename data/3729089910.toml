new = "\"Please don't let your kits pee in the water\""
status = "normal"

["Building.DrinkingFountain.DisplayName"]
new = "Drinking Fountain"
status = "normal"

["Lapantouflemagic.Rocket.DisplayName"]
new = "Triumph"
status = "normal"

["Building.MissileSilo.Whitepaws.DisplayName"]
new = "Project Triumph"
status = "normal"

["Building.MissileSilo.Whitepaws.Description"]
new = "<color=#FF6EC7>We have made a new breakthrough in our understanding of hooman technologies! This one promises exciting opportunities for the future. \nIf we can get it to work, this surely will the greatest achievement of beaverkind.</color>\n<color=#00FFFF>Requires to be placed in an at least 6-deep clean water pond</color>\n<color=red>Entrance must be accessible for construction to proceed.</color>"
status = "normal"

["Building.MissileSilo.Whitepaws.FlavorDescription"]
new = "\"We should definitely build this in the center of our town so that everyone can see it!\"\n -Toothless the Wise, elder beaver"
status = "normal"

["Need.Rocketdeath.DeathMessage"]
new = "<color=green>was caught in the rocket exhaust and shockwave leading to an horrible death. That is all your fault.</color>"
status = "normal"

["Need.OnFire.CriticalDescriptionLocKey"]
new = "On Fire!"
status = "normal"

["Faction.Whitepaws.WonderCompletionFlavor"]
new = "Despite some...accidents...you have not only tamed this land, but also uncovered the secrets of ancient hooman technologies, opening the path to outer space for all of beaverkind.\nNow even if the earth ultimately fails and dies, we will be able to seek refuge among the stars.\n\nHa! Surely those fools never thought about that!"
status = "normal"

["Faction.Whitepaws.WonderCompletionMessage"]
new = "Congratulations! Despite the initial circumstances, you have managed to survive\nand build a great city in this hostile land. \nYou can now leave your Whitepaws to their own devices and take a break from this insanity, they will be fine."
status = "normal"

["Faction.Whitepaws.GameOver.Message"]
new = "Your colony of Whitepaws has died out. This is the end."
status = "normal"

["Faction.Whitepaws.GameOver.Flavor"]
new = "We told you it would be hard, now what went wrong? Too small of a dam ? Excessive use of prioritization? Overly zealous colony extension ? Learn from your mistakes and try again.\nYou can do it, who cares about the lives squandered in the process?"
status = "normal"

