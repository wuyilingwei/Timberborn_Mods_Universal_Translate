["Lapantouflemagic.FrostyWhiskers.ICE_Blockage.FlavorDescription"]
raw = "\"Doesn’t even taste good. Nor bad. Nor anything actually.\""
status = "normal"
enUS = "\"Doesn’t even taste good. Nor bad. Nor anything actually.\""
zhCN = "“味道既不好，也没什么好说的。”"
zhTW = "「根本不好吃，也不壞，實際上什麼味道都沒有。」"
ruRU = "\"Не вкусно. Но и не плохо. На самом деле, ничего.\""
