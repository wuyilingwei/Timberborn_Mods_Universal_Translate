["Lapantouflemagic.CrappyIrrigationTower.Description"]
raw = "A crappy bath built with logs, deliberately made leaky in order to use the dirty water for irrigation.\nMostly useful for the unhinged weirdos who can't help but try to play this on hard mode despite having been told not to."
status = "normal"
enUS = "A crummy bath built with logs, intentionally made leaky to use the dirty water for irrigation. Mostly useful for the unhinged oddballs who can't resist trying to play this on hard mode despite being warned against it."
zhCN = "一个用木头建造的糟糕浴池，故意做成漏水的以便用脏水进行灌溉。  \n对于那些明知不能却还是想在困难模式下游玩的不理智怪人来说，这个浴池大多是有用的。"
zhTW = "一個用樹幹建造的糟糕浴缸，故意設計成漏水，以便將髒水用於灌溉。\n主要對那些瘋狂的怪咖有用，他們無法抗拒在被告知不要這樣做的情況下，仍試圖在困難模式下玩這個遊戲。"
ruRU = "Это ужасная ванна, построенная из бревен, заведомо сделанная дырявой, чтобы использовать грязную воду для ирригации. \nВ основном полезна для чокнутых странных типов, которые не могут удержаться от того, чтобы попробовать играть в этом на сложном уровне, несмотря на то, что им сказали не делать этого."
jaJP = "「ログで作られたショボいお風呂で、意図的に漏れるように作られており、その汚れた水を灌漑に利用します。\n主に、言われてもハードモードでプレイしようとする狂った変わり者たちに役立ちます。」"
frFR = "Une baignoire merdique construite avec des rondins, délibérément rendue fuyante pour utiliser l'eau sale pour l'irrigation. Principalement utile pour les intermittents dérangés qui ne peuvent s'empêcher d'essayer de jouer en mode difficile malgré l'avertissement."
deDE = "Ein magerer Badesteg aus Baumstämmen, absichtlich undicht gemacht, um das schmutzige Wasser zur Bewässerung zu nutzen. \nVor allem nützlich für die verrückten Sonderlinge, die sich nicht davon abhalten lassen, dies im Schwierigkeitsgrad schwer zu spielen, obwohl sie dazu aufgefordert wurden, es nicht zu tun."
plPL = "Zła wanna zbudowana z belek, celowo zrobiona z nieszczelnościami w celu wykorzystania brudnej wody do nawadniania. Głównie przydatna dla szalonych dziwaków, którzy nie potrafią powstrzymać się od grania w trybie trudnym, mimo że im powiedziano, żeby tego nie robili."
ptBR = "Uma banheira ruim construída com troncos, deliberadamente feita para vazar, a fim de usar a água suja para irrigação. Principalmente útil para os esquisitos insanos que não conseguem evitar tentar jogar isso no modo difícil, apesar de terem sido avisados para não fazer isso."
koKR = "나무로 만들어진 형편없는 욕조로, 의도적으로 누수가 발생하도록 설계되어 더러운 물을 관개에 사용할 수 있다. 주로 힘든 모드에서 플레이하지 말라는 경고에도 불구하고 그걸 어쩔 수 없이 해보려는 괴짜들에게 유용하다."
csCZ = "Hnusná koupel postavená ze dřeva, záměrně udělaná s dírami, aby bylo možné použít špinavou vodu na zavlažování. Většinou užitečná pro šílené podivíny, kteří se nemohou ubránit pokusům hrát to na obtížnou úroveň, i když jim bylo řečeno, aby to nedělali."
viVN = "Một cái bồn tắm kém chất lượng được xây dựng bằng gỗ, cố tình làm rò rỉ để sử dụng nước bẩn cho việc tưới tiêu. Chủ yếu hữu ích cho những kẻ lập dị không thể không cố gắng chơi trò này ở chế độ khó mặc dù đã được khuyên không nên."

["Lapantouflemagic.CrappyIrrigationTower.FlavorDescription"]
raw = "\"We should get a proper dam built, because this won't last\"\n -A farmer beaver"
status = "normal"
enUS = "\"We should get a proper dam built, because this won't last\"  \n-A farmer beaver"
zhCN = "“我们应该建一个合适的水坝，因为这个可撑不了多久。”  \n- 一只农夫海狸"
zhTW = "「我們應該建一座正經的水壩，因為這個撐不了多久。」  \n- 一隻農夫海狸"
ruRU = "\"Нам нужно построить нормальную плотину, потому что это не продержится\"  \n- Бобер-фермер"
jaJP = "「ちゃんとしたダムを建てるべきだ、これは長持ちしないだろう」  \n- 農夫ビーバー"
frFR = "\"Nous devrions faire construire un vrai barrage, car ça ne tiendra pas\"  \n- Un castor agriculteur"
deDE = "\"Wir sollten einen richtigen Damm bauen, denn das hier wird nicht lange halten.\"  \n- Ein Bauer-Biber"
plPL = "\"Powinniśmy zbudować porządny tamę, bo to nie przetrwa\"  \n- Bóbr rolnik"
ptBR = "\"Deveríamos construir uma represa decente, porque isso não vai durar\"  \n-Um castor agricultor"
koKR = "\"제대로 된 댐을 건설해야 해, 왜냐하면 이건 오래가지 못할 거니까\"  \n-농부 비버"
csCZ = "Musíme postavit pořádnou hráz, protože tohle nevydrží.\"  \n- \"Farmářský bobr"
viVN = "\"Chúng ta nên xây dựng một con đập đúng nghĩa, vì cái này sẽ không tồn tại lâu.\" \n -Một con nhím nông dân"

