jaJP = "水を排出します。  \n<color=green>Lido</color>の内部に建設する必要があります。  \n<color=#FF6EC7>作業者なしで機能します。</color>"
frFR = "Déverse de l'eau.  \nDoit être construit à l'intérieur d'un <color=green>Lido</color>.  \n<color=#FF6EC7>Peut fonctionner sans ouvriers.</color>"
deDE = "Verfüllt Wasser.  \nMuss innerhalb eines <color=green>Lido</color> gebaut werden.  \n<color=#FF6EC7>Kann ohne Arbeiter funktionieren.</color>"
plPL = "Wylewa wodę.  \nMusisz zbudować wewnątrz <color=green>Lido</color>.  \n<color=#FF6EC7>Może działać bez pracowników.</color>"
ptBR = "Derrama água.  \nDeve ser construído dentro de um <color=green>Lido</color>.  \n<color=#FF6EC7>Pode funcionar sem trabalhadores.</color>"
koKR = "물을 쏟습니다.\n<color=green>리도</color> 내부에 설치해야 합니다.\n<color=#FF6EC7>근로자 없이도 작동할 수 있습니다.</color>"
csCZ = "Vypouští vodu. Musí být postaveno uvnitř <color=green>Lido</color>. <color=#FF6EC7>Může fungovat bez pracovníků.</color>"
viVN = "Đổ nước.\nPhải được xây dựng bên trong một <color=green>Lido</color>.\n<color=#FF6EC7>Có thể hoạt động mà không cần công nhân.</color>"

