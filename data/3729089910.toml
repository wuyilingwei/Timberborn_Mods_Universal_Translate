["Lapantouflemagic.Smallcookhouse.FlavorDescription"]
raw = "Small kits falling through the floor are not our responsibility, please send your complaints to the architects."
status = "normal"
enUS = "Small kits falling through the floor are not our responsibility, please send your complaints to the architects."
zhCN = "“掉落在地板上的小猫咪不在我们的责任范围内，请将您的投诉发送给建筑师。”"
zhTW = "“小型小熊掉落在地板上的責任不在我們，請將您的投訴發送給建築師。”"
ruRU = "Маленькие котята, падающие сквозь пол, не являются нашей ответственностью, пожалуйста, отправляйте ваши жалобы архитекторам."
jaJP = "「床に落ちる小さなキットについては責任を負いかねますので、苦情は建築家にお送りください。」"
frFR = "Les petits kits tombant à travers le sol ne sont pas de notre responsabilité, veuillez envoyer vos plaintes aux architectes."
deDE = "Kleine Kits, die durch den Boden fallen, liegen nicht in unserer Verantwortung. Bitte senden Sie Ihre Beschwerden an die Architekten."
plPL = "Małe kocięta wpadające przez podłogę nie są naszą odpowiedzialnością, prosimy kierować skargi do architektów."
ptBR = "Pequenos kits caindo pelo chão não são nossa responsabilidade, por favor, envie suas reclamações aos arquitetos."
koKR = "바닥을 뚫고 떨어지는 작은 키트는 우리의 책임이 아닙니다. 불만 사항은 건축가에게 보내주시기 바랍니다."
