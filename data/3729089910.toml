frFR = "Un endroit abrité pour faire pousser des champignons à partir de bois ou de sciure.\n<color=#FF6EC7>Peut fonctionner sans travailleurs.</color>"
deDE = "Ein geschützter Ort, um Pilze aus Holz oder Sägemehl zu züchten. <color=#FF6EC7>Kann ohne Arbeiter funktionieren.</color>"
plPL = "Zabezpieczone miejsce do uprawy grzybów z drewna lub trocin. <color=#FF6EC7>Może funkcjonować bez pracowników.</color>"
ptBR = "Um lugar protegido para cultivar cogumelos a partir de madeira ou serragem. <color=#FF6EC7>Pode funcionar sem trabalhadores.</color>"
koKR = "목재나 톱밥으로 버섯을 기를 수 있는 보호된 장소입니다.  \n<color=#FF6EC7>근로자 없이도 기능할 수 있습니다.</color>"
