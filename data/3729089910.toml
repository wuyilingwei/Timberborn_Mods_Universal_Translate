["Lapantouflemagic.WashingMachine.Description"]
raw = "A bizarre contraption meant to wash and decontaminate beavers using mechanical power.\nHalf of the effect is actually due to purging beaver's stomachs."
status = "normal"
enUS = "A bizarre contraption meant to wash and decontaminate beavers using mechanical power. Half of the effect is actually due to purging beaver's stomachs."
zhCN = "一种奇怪的装置，旨在利用机械动力清洗和消毒海狸。\n其效果的一半实际上是由于清空海狸的胃。"
zhTW = "一種奇怪的裝置，旨在利用機械力量清洗和消毒海狸。其一半效果實際上是因為清空海狸的胃。"
ruRU = "Странное устройство, предназначенное для стирки и дезинфекции бобров с использованием механической силы. Половина эффекта на самом деле обусловлена очисткой желудков бобров."
jaJP = "奇妙な装置で、機械の力を使ってビーバーを洗浄し、除染するためのものです。効果の半分は、実際にはビーバーの胃を排出することによるものです。"
frFR = "Une étrange machine destinée à laver et décontaminer les castors en utilisant une puissance mécanique. La moitié de l'effet est en réalité due à la purge de l'estomac des castors."
deDE = "Ein bizarrer Apparat, der dazu gedacht ist, Biber mithilfe mechanischer Kraft zu waschen und zu dekontaminieren. Die Hälfte der Wirkung stammt tatsächlich davon, die Mägen der Biber zu entleeren."
plPL = "Dziwaczne urządzenie przeznaczone do mycia i dekontaminacji bobrów przy użyciu mocy mechanicznej. Połowa efektu wynika tak naprawdę z wydalania żołądków bobrów."
ptBR = "Uma contraption bizarra destinada a lavar e descontaminar castores usando energia mecânica. Metade do efeito se deve, na verdade, à purgação dos estômagos dos castores."
koKR = "기묘한 기계 장치로, 비버를 세척하고 오염을 제거하는 데 기계적 힘을 사용합니다. 효과의 절반은 실제로 비버의 위를 비우는 데 기인합니다."
csCZ = "Podivný stroj určený k mytí a dekontaminaci bobrů pomocí mechanické energie. Polovina účinku je ve skutečnosti způsobena vyprázdněním žaludků bobrů."
viVN = "Một thiết bị kỳ quái được thiết kế để rửa và khử trùng những chú béo bằng sức mạnh cơ học. Một nửa hiệu ứng thực sự là do loại bỏ đồ ăn trong dạ dày của béo."

