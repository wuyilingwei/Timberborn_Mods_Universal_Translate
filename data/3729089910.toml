["Lapantouflemagic.GiantPillarbase.Description"]
raw = "Half a sequoia stuck back in the ground to act as a support for other things. \nSide platforms can be attached to it."
status = "normal"
enUS = "Half a sequoia stuck back in the ground to serve as a support for other structures. Side platforms can be attached to it."
zhCN = "“半棵塞外杉倒插入地面，作为其他物体的支撑。\n可以在其上附加侧平台。”"
zhTW = "半棵紅杉樹被插回地面，用作其他物體的支撐。\n可以在側面平台上連接其他物品。"
ruRU = "Полу-секвойя, зажатая обратно в землю, чтобы служить опорой для других объектов. \nК ней можно прикрепить боковые платформы."
jaJP = "「他の物を支えるために地面に戻されたセコイアの半分。\n側面のプラットフォームを取り付けることができます。」"
frFR = "Une demi-séquence enfoncée dans le sol pour servir de support à d'autres éléments. \nDes plateformes latérales peuvent y être attachées."
deDE = "Die Hälfte eines Mammutbaums, die wieder im Boden steckt, um als Unterstützung für andere Dinge zu dienen. Seitliche Plattformen können daran befestigt werden."
plPL = "Pół sekwoi włożone w ziemię, aby służyło jako wsparcie dla innych rzeczy. Platformy boczne można do niego przymocować."
ptBR = "Metade de um sequoia cravada de volta no chão para servir de suporte para outras coisas. \nPlataformas laterais podem ser anexadas a ela."
koKR = "다른 것들의 지지대 역할을 하기 위해 다시 땅에 박힌 반쪽 세쿼이아. \n측면 플랫폼을 부착할 수 있습니다."
csCZ = "Polovina sekvoje zaseknutá zpět do země, aby sloužila jako podpora pro další věci. \nNa něj lze připevnit boční platformy."
viVN = "Nửa cây sequoia cắm trở lại xuống đất để làm chỗ dựa cho các vật khác. \nCác nền tảng bên có thể được gắn vào nó."

