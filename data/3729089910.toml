["Lapantouflemagic.Foundry.Description"]
raw = "Refines the most advanced materials with unmatched efficiency.\n<color=#FF6EC7>A true marvel of beaver technology. Its impressive silhouette is the hallmark of a modern industrial centerxa0!</color>\n<color=#00FFFF>Some parts work as a Levee</color>"
status = "normal"
enUS = "Refines the most advanced materials with unmatched efficiency.\n<color=#FF6EC7>A true marvel of beaver technology. Its impressive silhouette is the hallmark of a modern industrial center!</color>\n<color=#00FFFF>Some parts work as a Levee</color>"
zhCN = "以无与伦比的效率提炼最先进的材料。<color=#FF6EC7>这是真正的海狸科技奇迹。其令人印象深刻的轮廓是现代工业中心的标志！</color><color=#00FFFF>某些部分作为堤坝工作</color>"
zhTW = "以無與倫比的效率精煉最先進的材料。<color=#FF6EC7>真正的海狸技術奇蹟。其壯觀的輪廓是現代工業中心的標誌！</color><color=#00FFFF>某些部分功能類似於堤防</color>"
ruRU = "Перерабатывает самые современные материалы с непревзойденной эффективностью.  \n<color=#FF6EC7>Настоящее чудо бобровой технологии. Его впечатляющий силуэт — это знак современного промышленного центра!</color>  \n<color=#00FFFF>Некоторые части работают как дамба</color>"
jaJP = "比類ない効率で最先端の素材を精製します。  \n<color=#FF6EC7>ビーバー技術の真の驚異。印象的なシルエットは現代の産業センターの象徴です！</color>  \n<color=#00FFFF>一部のパーツは堤防として機能します</color>"
frFR = "Raffine les matériaux les plus avancés avec une efficacité inégalée.  \n<color=#FF6EC7>Un véritable chef-d'œuvre de la technologie castor. Son impressionnante silhouette est le symbole d'un centre industriel moderne !</color>  \n<color=#00FFFF>Certaines parties fonctionnent comme un barrage</color>"
deDE = "Veredelt die fortschrittlichsten Materialien mit unvergleichlicher Effizienz.\n<color=#FF6EC7>Ein wahres Wunder der Bibertechnologie. Seine beeindruckende Silhouette ist das Markenzeichen eines modernen Industriegebiets!</color>\n<color=#00FFFF>Einige Teile funktionieren als Deich</color>"
plPL = "Przetwarza najnowocześniejsze materiały z niezrównaną wydajnością.\n<color=#FF6EC7>Prawdziwy cud technologii bobra. Jego imponujący zarys to znak nowoczesnego centrum przemysłowego!</color>\n<color=#00FFFF>Niektóre części działają jak tama</color>"
ptBR = "Refina os materiais mais avançados com eficiência incomparável.  \n<color=#FF6EC7>Uma verdadeira maravilha da tecnologia dos castores. Sua silhueta impressionante é a marca de um moderno centro industrial!</color>  \n<color=#00FFFF>Algumas partes funcionam como uma Barragem</color>"
koKR = "비길 데 없는 효율성으로 가장 진보된 재료를 정제합니다.\n<color=#FF6EC7>비버 기술의 진정한 경이로움. 그 인상적인 실루엣은 현대 산업 센터의 상징입니다xa0!</color>\n<color=#00FFFF>일부 부품은 제방 역할을 합니다</color>"
csCZ = "Zpracovává nejpokročilejší materiály s bezkonkurenční efektivitou.  \n<color=#FF6EC7>Skutečný zázrak bobří technologie. Jeho impozantní silueta je znakem moderního průmyslového centra!</color>  \n<color=#00FFFF>Některé části fungují jako hráz</color>"
viVN = "Chế biến các vật liệu tiên tiến nhất với hiệu suất vô song.  \n<color=#FF6EC7>Một kỳ quan thực sự của công nghệ hải ly. Hình dáng ấn tượng của nó là biểu tượng của một trung tâm công nghiệp hiện đại!</color>  \n<color=#00FFFF>Một số bộ phận hoạt động như một bờ đê</color>"

["Lapantouflemagic.IrrigationLodge.Description"]
raw = "Irrigate the ground in a moderate area.\n<color=green>Water consumption scales with irrigated area.\nCan repel ground contamination.</color>\n<color=#FFA500>Small Tower</color>, <color=#FF6EC7>Can support upgrades</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "Irrigate the ground in a moderate area.  \n<color=green>Water consumption scales with irrigated area.  \nCan repel ground contamination.</color>  \n<color=#FFA500>Small Tower</color>, <color=#FF6EC7>Can support upgrades</color>  \n<color=#00FFFF>Works as a Levee</color>"
zhCN = "在适中范围内灌溉土地。  \n<color=green>水消耗与灌溉区域成正比。  \n可以抵御地面污染。</color>  \n<color=#FFA500>小型塔</color>，<color=#FF6EC7>可以支持升级</color>  \n<color=#00FFFF>可作为堤坝使用</color>"
zhTW = "「在適中範圍內灌溉土地。\n<color=green>水的消耗會隨著灌溉面積的變化而增加。\n可以抵抗土地污染。</color>\n<color=#FFA500>小塔</color>，<color=#FF6EC7>可以支持升級</color>\n<color=#00FFFF>作為堤防使用</color>」"
ruRU = "Орошайте землю на умеренной площади.\n<color=green>Потребление воды зависит от орошаемой площади.\nМожет отталкивать загрязнение почвы.</color>\n<color=#FFA500>Небольшая башня</color>, <color=#FF6EC7>Может поддерживать улучшения</color>\n<color=#00FFFF>Работает как плотина</color>"
jaJP = "適度な範囲の土地に灌漑します。\n<color=green>水の消費は灌漑された面積に比例します。\n土壌汚染を防ぐことができます。</color>\n<color=#FFA500>小さな塔</color>、<color=#FF6EC7>アップグレードをサポートできます</color>\n<color=#00FFFF>堤防として機能します</color>"
frFR = "Irriguez le sol dans une zone modérée.  \n<color=green>La consommation d'eau évolue en fonction de la zone irriguée.  \nPeut repousser la contamination du sol.</color>  \n<color=#FFA500>Petite tour</color>, <color=#FF6EC7>Peut supporter des améliorations</color>  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Bewässere den Boden in einem moderaten Bereich.\n<color=green>Der Wasserverbrauch skaliert mit der bewässerten Fläche.\nKann Bodenverunreinigungen abwehren.</color>\n<color=#FFA500>Kleiner Turm</color>, <color=#FF6EC7>Kann Upgrades unterstützen</color>\n<color=#00FFFF>Funktioniert als Damm</color>"
plPL = "Nawadniaj grunt na umiarkowanym obszarze. <color=green>Zużycie wody rośnie wraz z nawadnianym obszarem. Może odpierać zanieczyszczenie gruntu.</color> <color=#FFA500>Mała wieża</color>, <color=#FF6EC7>Może wspierać ulepszenia</color> <color=#00FFFF>Funkcjonuje jak tama</color>"
ptBR = "Irrigue o solo em uma área moderada.  \n<color=green>O consumo de água é proporcional à área irrigada.  \nPode repelir contaminação do solo.</color>  \n<color=#FFA500>Pequena Torre</color>, <color=#FF6EC7>Suporta melhorias</color>  \n<color=#00FFFF>Funciona como um Dique</color>"
koKR = "중간 규모의 지역에 물을 공급하세요.\n<color=green>물 소비는 관개된 지역에 따라 달라집니다.\n토양 오염을 방지할 수 있습니다.</color>\n<color=#FFA500>작은 탑</color>, <color=#FF6EC7>업그레이드를 지원할 수 있습니다</color>\n<color=#00FFFF>제방처럼 작동합니다</color>"
csCZ = "Zavlažujte půdu v mírné oblasti.\n<color=green>Spotřeba vody se mění v závislosti na zavlažované ploše.\nMůže odpuzovat kontaminaci půdy.</color>\n<color=#FFA500>Malá věž</color>, <color=#FF6EC7>Podporuje vylepšení</color>\n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Tưới nước cho mặt đất trong một khu vực vừa phải.\n<color=green>Hàm lượng nước tiêu thụ sẽ thay đổi theo khu vực được tưới.</color>\n<color=#FFA500>Tháp nhỏ</color>, <color=#FF6EC7>Có thể hỗ trợ nâng cấp</color>\n<color=#00FFFF>Hoạt động như một đê</color>"

["Lapantouflemagic.IrrigationLodge.FlavorDescription"]
raw = "\"If only that reservoir was wider, we could use it as a bath...\"\n -Toothless the Wise, elder beaver"
status = "normal"
enUS = "\"If only that reservoir was wider, we could use it as a bath...\"  \n-Toothless the Wise, elder beaver"
zhCN = "“要是那个水库更宽一些，我们就可以把它用作澡堂了……\"\n- 智慧的无牙，老海狸"
zhTW = "「要是那個水庫能更寬些，我們就可以把它當成浴缸用了……」  \n- 聰明的無牙海狸"
ruRU = "\"Если бы этот резервуар был шире, мы могли бы использовать его как ванну...\" \n- Беззубик Мудрый, старейшина бобров"
jaJP = "「もしあの貯水池がもっと広ければ、バスとして使えたのに…」 - 知恵のあるトゥースレス、長老ビーバー"
frFR = "\"Si seulement ce réservoir était plus large, nous pourrions l'utiliser comme une baignoire...\"  \n- Sans-dents le Sage, castor âgé"
deDE = "\"Wenn dieser Wasserbehälter doch nur breiter wäre, könnten wir ihn als Bad benutzen...\"  \n- Zahnlos der Weise, älterer Biber"
plPL = "\"Gdyby tylko ten zbiornik był szerszy, moglibyśmy użyć go jako kąpieli...\" \n -Bezguzowaty Mądry, starszy bóbr"
ptBR = "\"Se ao menos aquele reservatório fosse mais largo, poderíamos usá-lo como um banho...\" - Dente-de-leite, o sábio, castor ancião"
koKR = "\"그 저수지가 더 넓었더라면, 목욕탕으로 쓸 수 있었을 텐데...\"  \n- 지혜로운 무이, 노거북"
csCZ = "\"Jestliže by bylo to zásobárnu širší, mohli bychom ji využít jako koupel...\"  \n -Bezzubý Moudrý, starý bobr"
viVN = "\"Nếu chỉ cái hồ chứa đó rộng hơn, chúng ta có thể dùng nó làm bể tắm...\"  \n- Răng không còn của Người Khôn Ngoan, lửng lợn trưởng lão"

