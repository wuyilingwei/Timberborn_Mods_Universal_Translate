["Lapantouflemagic.GigargantuanTank.FlavorDescription"]
raw = "\"At last, my dream to swim in kimchi may come truexa0!\"\n- Mathilda the insane cook"
status = "normal"
enUS = "\"At last, my dream to swim in kimchi may come true!\" - Mathilda the insane cook"
zhCN = "“终于，我在泡菜中游泳的梦想可能会实现了！  \n- 疯狂的厨师马蒂尔达”"
zhTW = "「終於，我夢想中的泡菜游泳可能會成真xa0！」\n- 瘋狂的廚師馬蒂爾達"
ruRU = "Наконец-то моя мечта о плавании в кимчи может стать реальностью! - Матильда, безумная повариха"
jaJP = "「ついに、キムチに泳ぐという私の夢が実現するかもしれない！」\n- 正気を失った料理人マチルダ"
frFR = "Enfin, mon rêve de nager dans le kimchi pourrait devenir réalité ! - Mathilda, la cuisinière folle"
deDE = "Endlich könnte mein Traum, im Kimchi zu schwimmen, wahr werdenxa0! - Mathilda, die verrückte Köchin"
plPL = "\"Wreszcie moje marzenie o pływaniu w kimchi może się spełnićxa0!\"  \n- Mathilda, szalona kucharka"
ptBR = "\"Finalmente, meu sonho de nadar em kimchi pode se tornar realidadexa0!\"  \n- Mathilda, a cozinheira insana"
koKR = "\"마침내, 김치 속에서 수영하겠다는 내 꿈이 이뤄질지도 몰라xa0!\"  \n- 미친 요리사 마틸다"
csCZ = "Finally, můj sen plavat v kimchi se může splnitxa0! - Mathilda, šílená kuchařka"
viVN = "Cuối cùng, giấc mơ của tôi về việc bơi trong kimchi có thể thành hiện thực xa0! - Mathilda, đầu bếp điên khùng"

