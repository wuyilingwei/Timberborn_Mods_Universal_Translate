frFR = "Veuillez ne pas obstruer les pales avec des branches, des bûches ou les corps de vos ennemis vaincus."
deDE = "Bitte blockieren Sie die Klingen nicht mit Ästen, Stämmen oder den Körpern Ihrer besiegten Feinde."
plPL = "Proszę nie blokować ostrzy gałęziami, połamaną belką ani ciałami pokonanych wrogów."
ptBR = "Por favor, não obstrua as lâminas com galhos, troncos ou os corpos de seus inimigos derrotados."
