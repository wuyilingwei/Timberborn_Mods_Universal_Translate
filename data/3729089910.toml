status = "normal"

["Lapantouflemagic.Woodupgrade_Builders.Description"]
new = "An upgrade module to be placed on top of an upgradable <color=#FFA500>Small Tower</color> (left) adjacent to a <color=#FF6EC7>triangle roof</color> building (right)\nEmploys <color=green>8 Builders</color>.\n<color=#00FFFF>Works as a Levee</color>"
