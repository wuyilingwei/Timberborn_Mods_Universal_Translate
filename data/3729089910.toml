["Lapantouflemagic.Distillery.Description"]
raw = "A building specialized in preparing purified components from natural or manufactured resources.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A building specialized in preparing purified components from natural or manufactured resources. <color=#00FFFF>Works as a Levee</color>"
zhCN = "“一个专门用于从自然或人工资源中提炼纯净成分的建筑。\n<color=#00FFFF>作为堤防运作</color>”"
zhTW = "一座專門從自然或人工資源中準備純化成分的建築。\n<color=#00FFFF>作為堤防工作</color>"
ruRU = "Здание, специализированное на подготовке очищенных компонентов из природных или произведенных ресурсов. <color=#00FFFF>Работает как плотина</color>"
jaJP = "「自然または製造資源から精製された成分を準備することに特化した建物です。<color=#00FFFF>堤防として機能します</color>」"
frFR = "Un bâtiment spécialisé dans la préparation de composants purifiés à partir de ressources naturelles ou fabriquées.  \n<color=#00FFFF>Fonctionne comme un levier</color>"
deDE = "Ein Gebäude, das sich auf die Herstellung von gereinigten Komponenten aus natürlichen oder hergestellten Ressourcen spezialisiert hat.  \n<color=#00FFFF>Funktioniert wie ein Damm</color>"
plPL = "Budowla specjalizująca się w przygotowywaniu oczyszczonych komponentów z zasobów naturalnych lub wytworzonych.  \n<color=#00FFFF>Funkcjonuje jako Tam</color>"
ptBR = "Um edifício especializado na preparação de componentes purificados a partir de recursos naturais ou fabricados.  \n<color=#00FFFF>Funciona como uma Barragem</color>"
koKR = "자연 또는 제조된 자원에서 정제된 구성 요소를 준비하는 데 특화된 건물입니다.  \n<color=#00FFFF>제방처럼 작동합니다</color>"
csCZ = "Budova specializující se na přípravu čistých komponentů z přírodních nebo vyrobených zdrojů.  \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một tòa nhà chuyên về việc chế biến các thành phần tinh khiết từ tài nguyên tự nhiên hoặc chế tạo.\n<color=#00FFFF>Hoạt động như một đê chắn nước</color>"

["Lapantouflemagic.Distillery.FlavorDescription"]
raw = "\"Can't the alchemist just do that too?\"\n -Mommy beaver"
status = "normal"
enUS = "\"Can't the alchemist just do that too?\" -Mommy beaver"
zhCN = "“难道炼金术师就不能也这么做吗？”  \n- 妈咪海狸"
zhTW = "「不能讓煉金術師也這樣做嗎？」  \n- 媽咪水獺"
ruRU = "\"Неужели алхимик не может сделать это тоже?\" - Мама-бобер"
