["Lapantouflemagic.SevereDisease.DeathMessage"]
raw = "<color=green>contracted what can only be described as ''everything''. Doctors took the hard decision to put him down after it started growing a third head.</color>"
status = "normal"
enUS = "<color=green>contracted what can only be described as ''everything''. Doctors made the tough call to euthanize him after a third head began to grow.</color>"
zhCN = "<color=green>感染了只能用“万病”来形容的疾病。医生们做出了艰难的决定，在他开始长出第三个头后 euthanize 了他。</color>"
zhTW = "<color=green>感染了只能被描述為「一切」的疾病。醫生們艱難地決定在它開始長出第三顆頭後將他安樂死。</color>"
ruRU = "<color=green>заразился тем, что можно описать только как ''всё''. Врачи приняли жесткое решение усыпить его, после того как у него начала расти третья голова.</color>"
jaJP = "<color=green>「すべて」としか表現できない病気に感染しました。医者たちは、第三の頭が成長し始めた後、彼を安楽死させるという難しい決断を下しました。</color>"
frFR = "<color=green>a contracté ce qui ne peut être décrit que comme ''tout''. Les médecins ont pris la dure décision de l'euthanasier après qu'il a commencé à faire pousser une troisième tête.</color>"
deDE = "<color=green>hat sich das beschafft, was nur als ''alles'' beschrieben werden kann. Die Ärzte trafen die schwere Entscheidung, ihn einzuschläfern, nachdem er begann, einen dritten Kopf wachsen zu lassen.</color>"
plPL = "<color=green>zachorował na coś, co można określić tylko jako ''wszystko''. Lekarze podjęli trudną decyzję o zakończeniu jego życia, gdy zaczęła mu rosnąć trzecia głowa.</color>"
ptBR = "<color=green>contraiu o que só pode ser descrito como ''tudo''. Os médicos tomaram a difícil decisão de sacrifica-lo depois que começou a crescer uma terceira cabeça.</color>"
koKR = "<color=green>''모든 것''이라고밖에 설명할 수 없는 병에 걸렸습니다. 의사들은 세 번째 머리가 자라기 시작한 후 그를 안락사시키는 힘든 결정을 내렸습니다.</color>"
csCZ = "<color=green>nakazil se tím, co lze popsat pouze jako ''všechno''. Lékaři se rozhodli ho uspat poté, co mu začala růst třetí hlava.</color>"
viVN = "<color=green>đã mắc phải thứ mà chỉ có thể miêu tả là ''mọi thứ''. Các bác sĩ đã đưa ra quyết định khó khăn để kết thúc sự sống của ông sau khi nó bắt đầu mọc thêm một cái đầu thứ ba.</color>"

