["Building.GiantLogFeller.FlavorDescription"]
raw = "\"I guess if it falls on my face I won't have to worry about the taste of the hospital food\""
status = "normal"
enUS = "\"I guess if it falls on my face I won't have to worry about the taste of the hospital food.\""
zhCN = "“我想如果它掉在我的脸上，我就不必担心医院食物的味道了。”"
zhTW = "「我想如果它掉到我臉上，我就不必擔心醫院食物的味道了。」"
ruRU = "«Наверное, если он упадёт мне на лицо, мне не придётся беспокоиться о вкусе больничной еды»"
jaJP = "「もしこれが私の顔に落ちたら、病院の食事の味を心配しなくても済むかな」"
frFR = "\"Je suppose que si ça tombe sur mon visage, je n'aurai pas à m'inquiéter du goût de la nourriture à l'hôpital.\""
deDE = "\"Ich schätze, wenn es mir ins Gesicht fällt, muss ich mir keine Sorgen um den Geschmack des Krankenhausessens machen.\""
plPL = "„Myślę, że jeśli spadnie mi na twarz, nie będę musiał martwić się o smak szpitalnego jedzenia.”"
ptBR = "\"Eu acho que se cair na minha cara, não vou precisar me preocupar com o gosto da comida do hospital.\""
koKR = "\"내 얼굴에 떨어지면 병원 음식의 맛은 걱정하지 않아도 되겠군요.\""
csCZ = "\"Domnívám se, že když mi spadne na obličej, nebudu se muset starat o chuť nemocničního jídla.\""
viVN = "\"Tôi đoán nếu nó rơi trúng mặt tôi thì tôi sẽ không phải lo lắng về vị của đồ ăn ở bệnh viện.\""

