["Lapantouflemagic.BotHaulingStation.Description"]
raw = "Provides a starting location for the hauling bots programmed routine.\nBots with no pending deliveries will remain in standby there."
status = "normal"
enUS = "Provides a starting location for the hauling bots' programmed routine. Bots with no pending deliveries will remain on standby there."
zhCN = "为运输机器人编程的常规提供了一个起始位置。没有待交付的机器将保持在此待命。"
zhTW = "提供機器人搬運程序的起始位置。沒有待處理交付的機器人將在那裡保持待命。"
ruRU = "Предоставляет начальное место для программы работы ботах-переносчиках. Боты без ожидающих доставок останутся в режиме ожидания."
jaJP = "「搬送ボットのプログラムされたルーチンの始点を提供します。未配送のボットはそこで待機します。」"
frFR = "Fournit un point de départ pour la routine programmée des bots de transport. Les bots sans livraisons en attente resteront en attente là-bas."
deDE = "Bietet einen Ausgangsort für die programmierte Routine der Transportbots. Bots ohne ausstehende Lieferungen bleiben dort im Standby."
plPL = "Zapewnia początkową lokalizację dla rutin przewozu zaprogramowanych przez boty. Boty bez oczekujących dostaw pozostaną w stanie gotowości."
ptBR = "Oferece um local de partida para a rotina programada dos bots de transporte. Bots sem entregas pendentes permanecerão em espera lá."
koKR = "봇이 프로그래밍된 루틴을 위한 시작 위치를 제공합니다.\n대기 중인 배달이 없는 봇은 그곳에서 대기합니다."
csCZ = "Poskytuje výchozí místo pro naprogramovanou rutinu přetahovacích botů. Boty bez čekajících dodávek zůstanou v pohotovosti tam."
viVN = "Cung cấp một vị trí khởi đầu cho thói quen lập trình của các bot vận chuyển. Các bot không có đơn hàng chờ sẽ ở trạng thái chờ tại đó."

