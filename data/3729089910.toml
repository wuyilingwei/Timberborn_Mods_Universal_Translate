["Lapantouflemagic.BIGAquiferPump.Description"]
raw = "A devilish engine of witchcraft, torturing the earth for ever more water, powered by the Pointer knows what."
status = "normal"
enUS = "A devilish engine of witchcraft, torturing the earth for ever more water, powered by the Pointer knows what."
zhCN = "一个恶魔般的巫术引擎，折磨大地以获取更多水源，动力来自谁也不知道的指针。"
zhTW = "一台魔鬼般的巫術引擎，不斷折磨大地以獲取更多水源，運行由指針知道的力量。"
ruRU = "Дьявольский механизм колдовства, мучающий землю ради еще большего количества воды, приводимый в движение, знает только Указатель."
jaJP = "「地球を苦しめ、さらなる水を求める魔女の悪魔的なエンジン。何が動力となっているのかはポインターのみぞ知る。」"
frFR = "Une machine diabolique de sorcellerie, torturant la terre pour toujours plus d'eau, alimentée par le Pointer sait quoi."
deDE = "Eine teuflische Maschine der Hexerei, die die Erde quält, um immer mehr Wasser zu erhalten, angetrieben von dem, was der Zeiger weiß."
plPL = "Diabelski silnik czarów, dręczący ziemię w poszukiwaniu coraz większej ilości wody, napędzany przez wskaźnik, który wie, co."
ptBR = "Uma engenhoca diabólica de feitiçaria, torturando a terra em busca de cada vez mais água, alimentada pelo sabe-se lá o que."
koKR = "마녀의 교활한 엔진, 끊임없이 물을 얻기 위해 땅을 괴롭히며, 포인터가 아는 무엇인가에 의해 구동됩니다."
csCZ = "Ďábelský stroj čarodějnictví, mučící zemi pro stále více vody, poháněný ví, co ukazatel."
viVN = "Một cỗ máy quỷ quyệt của phù thủy, hành hạ trái đất để có thêm nước, được điều khiển bởi thứ mà Chỉ số biết điều."

["Lapantouflemagic.BIGAquiferPump.FlavorDescription"]
raw = "\"If we build it atop a volcano, would lava come out?\"\n -An architect beaver"
status = "normal"
enUS = "\"If we build it atop a volcano, would lava come out?\"  \n-An architect beaver"
zhCN = "“如果我们把它建在火山上，熔岩会流出来吗？”  \n—一只建筑师河狸"
zhTW = "「如果我們在火山上建造它，會不會冒出熔岩呢？」  \n- 一隻建築師海狸"
ruRU = "\"Если мы построим это на вулкане, потечет ли лава?\"  \n- Архитектор-бобер"
jaJP = "「火山の上に建てたら、溶岩が出てくるのだろうか？ ー 建築家のビーバー」"
frFR = "\"Si nous le construisons au sommet d'un volcan, de la lave en sortira-t-elle ?\"\n -Un castor architecte"
deDE = "\"Wenn wir es auf einem Vulkan bauen, würde dann Lava herauskommen?\"\n -Ein Architekt-Bieber"
plPL = "Jeśli zbudujemy to na wulkanie, czy wydobyła by się lawa?\" - \"Architekt bóbr"
ptBR = "\"Se construirmos em cima de um vulcão, a lava vai sair?\"\n -Um castor arquiteto"
koKR = "\"우리가 화산 위에 세운다면 용암이 나올까요?\"  \n- 한 건축가 너구리"
csCZ = "\"Pokud to postavíme na sopce, vyteče láva?\"  \n -Architekt bobr"
viVN = "\"Nếu chúng ta xây nó trên đỉnh một ngọn núi lửa, thì magma có chảy ra không?\"  \n-Một con beaver kiến trúc sư"

