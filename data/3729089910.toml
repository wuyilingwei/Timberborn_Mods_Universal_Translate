["Lapantouflemagic.WarmStorage.Description"]
raw = "A gigantic pot meant to be placed on a fire to keep food warm.\n<color=green>Placement is sensitive to camera orientation!</color>"
status = "normal"
enUS = "A gigantic pot meant to be placed on a fire to keep food warm.  \n<color=green>Placement is sensitive to camera orientation!</color>"
zhCN = "一个巨大的锅，用于放置在火上以保持食物温暖。  \n<color=green>放置对摄像机方向敏感！</color>"
zhTW = "一個巨型鍋，用於放置在火上以保持食物溫暖。  \n<color=green>放置對相機方向非常敏感！</color>"
ruRU = "Гигантская кастрюля, предназначенная для размещения на огне, чтобы поддерживать пищу в тепле.  \n<color=green>Размещение чувствительно к ориентации камеры!</color>"
jaJP = "火に置いて食べ物を温かく保つための巨大な鍋です。  \n<color=green>設置はカメラの向きに敏感です！</color>"
frFR = "Un pot gigantesque destiné à être placé sur un feu pour garder la nourriture au chaud.  \n<color=green>Le placement est sensible à l'orientation de la caméra !</color>"
deDE = "Ein gigantischer Topf, der auf ein Feuer gestellt wird, um Nahrung warm zu halten. <color=green>Die Platzierung ist empfindlich gegenüber der Kamerawinkel!</color>"
plPL = "Gigantyczny garnek przeznaczony do postawienia na ognisku, aby utrzymać jedzenie w cieple.  \n<color=green>Umiejscowienie jest wrażliwe na orientację kamery!</color>"
ptBR = "Uma panela gigante destinada a ser colocada sobre o fogo para manter a comida aquecida. <color=green>A colocação é sensível à orientação da câmera!</color>"
koKR = "음식을 따뜻하게 보관하기 위해 불에 올려놓는 거대한 솥입니다.  \n<color=green>배치는 카메라 방향에 민감합니다!</color>"
csCZ = "Gigantický hrnec určený k umístění na oheň, aby jídlo zůstalo teplé.  \n<color=green>Umístění je citlivé na orientaci kamery!</color>"
viVN = "Đây là một nồi khổng lồ được thiết kế để đặt trên lửa nhằm giữ cho thức ăn luôn ấm.\n<color=green>Vị trí đặt nhạy cảm với hướng camera!</color>"

["Lapantouflemagic.WarmStorage.FlavorDescription"]
raw = "\"But... how...? This thing is bigger than a house!\n -An architect beaver"
status = "normal"
enUS = "But... how...? This thing is bigger than a house! -An architect beaver"
zhCN = "“但……怎么回事？这个东西比房子还大！\n -一只建筑师海狸”"
zhTW = "「但是……怎麼會……？這東西比房子還大！ - 一隻建築師海狸」"
ruRU = "Но... как...? Эта вещь больше дома! -Архитектор-бобер"
jaJP = "「でも…どうやって…？これは家より大きい！ -建築家ビーバー」"
frFR = "Mais... comment...? Cet objet est plus grand qu'une maison ! -Un castor architecte"
deDE = "„Aber... wie...? Dieses Ding ist größer als ein Haus! -Ein Architekten-Biber“"
plPL = "„Ale... jak...? Ta rzecz jest większa od domu! - Architekt bobr”"
ptBR = "Mas... como...? Essa coisa é maior que uma casa! -Um castor arquiteto"
koKR = "그런데... 어떻게...? 이건 집보다 커요!  \n- 건축가 비버"
csCZ = "Ale... jak...? Tahle věc je větší než dům! -Architekt bobr"
viVN = "Nhưng... làm sao...? Cục này lớn hơn cả một ngôi nhà! - Một con béo kiến trúc sư"

["Lapantouflemagic.WarmStorageBase.Description"]
raw = "A wood-consuming storage structure meant to hold and keep warm a large amount of cooked food."
status = "normal"
enUS = "A wood-consuming storage structure meant to hold and keep warm a large amount of cooked food."
zhCN = "一个木材消耗的存储结构，旨在储存和保持大量热食的温暖。"
zhTW = "「一種消耗木材的儲存結構，旨在保存並保暖大量的熟食。」"
ruRU = "Структура для хранения древесины, предназначенная для хранения и поддержания тепла большого объема приготовленной пищи."
jaJP = "「調理済みの食べ物を大量に保持し、温めるための木材を消費する貯蔵構造。」"
frFR = "Une structure de stockage consommant du bois destinée à conserver et garder au chaud une grande quantité de nourriture cuite."
deDE = "Eine holzverbrauchende Lagerstruktur, die dazu dient, eine große Menge gekochter Nahrung zu lagern und warm zu halten."
plPL = "Budynek magazynowy zużywający drewno, przeznaczony do przechowywania i podgrzewania dużej ilości gotowanej żywności."
ptBR = "Uma estrutura de armazenamento que consome madeira, projetada para armazenar e manter aquecido uma grande quantidade de comida cozida."
koKR = "조리된 음식을 대량으로 보관하고 따뜻하게 유지하기 위해 설계된 목재 소비 저장 구조물입니다."
csCZ = "Skladovací struktura spotřebovávající dřevo, určená k uchování a ohřevu velkého množství uvařeného jídla."
viVN = "Một cấu trúc lưu trữ tiêu thụ gỗ, được thiết kế để giữ và giữ ấm một lượng lớn thực phẩm đã nấu chín."

["Lapantouflemagic.WarmStorageBase.FlavorDescription"]
raw = "\"Apparently the hoomans used to say that every good game needs a paw-shaped building. But why did we decide to build that in real life?\"\n -Mathilda, pre-insanity days."
status = "normal"
enUS = "\"Apparently the humans used to say that every good game needs a paw-shaped building. But why did we decide to build that in real life?\"  \n-Mathilda, pre-insanity days."
zhCN = "“显然，人类曾经说过，好的游戏需要一个爪子形状的建筑。但是我们为什么决定在现实中建造它？”  \n- 马蒂尔达，疯狂前的日子。"
zhTW = "“顯然，霍曼們曾經說過，每個好遊戲都需要一個爪子形狀的建築。但為什麼我們決定在現實中建造這個呢？”\n- 馬蒂爾達，在發瘋之前的日子。"
ruRU = "По слухам, хуманцы говорили, что в каждой хорошей игре должно быть здание в форме лапы. Но почему мы решили построить это в реальной жизни?\"  \n-Матильда, до безумия."
jaJP = "「どうやらホーマンたちは、良いゲームには必ず爪の形をした建物が必要だと言っていたらしい。でも、なぜ私たちはそれを現実に作ることにしたのだろう？」  \n- マチルダ、狂気に陥る前の日々。"
frFR = "« Apparemment, les hoomans disaient qu'un bon jeu avait besoin d'un bâtiment en forme de patte. Mais pourquoi avons-nous décidé de le construire dans la vraie vie ? »  \n-Mathilda, à l'époque pré-folie."
deDE = "Offenbar haben die Hoomans früher gesagt, dass jedes gute Spiel ein paw-förmiges Gebäude braucht. Aber warum haben wir uns entschieden, das im echten Leben zu bauen?\"  \n-Mathilda, vor den Wahnsinnstagen."
plPL = "Podobno hoomani mówili, że każda dobra gra potrzebuje budynku w kształcie łapy. Ale czemu zdecydowaliśmy się to zbudować w prawdziwym życiu?\"  \n-Mathilda, w czasach przed szaleństwem."
ptBR = "\"Segundo dizem, os hoomans costumavam dizer que todo bom jogo precisa de um edifício em forma de pata. Mas por que decidimos construir isso na vida real?\"  \n-Mathilda, nos dias antes da insanidade."
koKR = "\"분명히 인간들은 모든 좋은 게임에는 발 모양의 건물이 필요하다고 말하곤 했어요. 하지만 왜 우리가 실제로 그것을 만들기로 결정했을까요?\"  \n- 마틸다, 미쳐가기 전의 시절."
csCZ = "Prý říkali hoomani, že každá dobrá hra potřebuje budovu ve tvaru tlapy. Ale proč jsme se rozhodli to postavit v reálném životě?\"  \n-Mathilda, před dny šílenství."
viVN = "Rõ ràng là người hoomans đã từng nói rằng mỗi trò chơi hay đều cần một công trình hình bàn chân. Nhưng tại sao chúng ta lại quyết định xây dựng điều đó trong đời thực?\"  \n-Mathilda, vào những ngày trước khi điên loạn."

