["Lapantouflemagic.Topentrancewatertightlodge_PowderStorage.Description"]
raw = "A medium-sized watertight lodge built around a ladder, with an extra stockpile floor.\nManages a pilables storage space.\nCan be stacked on itself, variants, and can carry select buildings.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A medium-sized watertight lodge built around a ladder, with an extra stockpile floor. Manages a pilables storage space. Can be stacked on itself, variants, and can carry select buildings. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一个中等大小的防水小屋，围绕一架梯子建造，带有额外的储藏层。\n管理堆积物存储空间。\n可以自我叠加、变种，并能携带特定建筑。\n<color=#00FFFF>作为堤坝工作</color>"
zhTW = "一個中型的防水小屋，圍繞著一個梯子建造，並設有額外的儲存層。\n管理可堆放的儲存空間。\n可以堆疊在自己上面、變體上，也可以攜帶特定建築。\n<color=#00FFFF>作為堤壩運作</color>"
ruRU = "Средний водонепроницаемый хранилище, построенное вокруг лестницы, с дополнительным этажом для хранения.\nУправляет пространством для хранения пиломатериалов.\nМожно складывать друг на друга, варианты, и может переносить определенные здания.\n<color=#00FFFF>Работает как насыпь</color>"
jaJP = "中型の防水ロッジで、はしごの周りに建てられ、追加のストックパイルフロアがあります。  \n杭の収納スペースを管理します。  \n自分自身やバリアントに積み重ねることができ、特定の建物を運ぶことができます。  \n<color=#00FFFF>堤防として機能します</color>"
frFR = "Un pavillon étanche de taille moyenne construit autour d'une échelle, avec un étage de stockage supplémentaire.  \nGère un espace de stockage pour les tas.  \nPeut être empilé sur lui-même, variantes, et peut transporter certains bâtiments.  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Eine mittelgroße wasserdichte Lodge, die um eine Leiter herum gebaut ist, mit einem zusätzlichen Lagerboden. Verwaltert einen pilables Lagerraum. Kann auf sich selbst, Varianten gestapelt werden und kann ausgewählte Gebäude tragen. <color=#00FFFF>Funktioniert wie ein Deich</color>"
plPL = "Średniej wielkości wodoodporna chata zbudowana wokół drabiny, z dodatkowym piętrem na zapasy. Zarządza przestrzenią magazynową na palety. Może być układana na sobie, różne warianty oraz może przenosić wybrane budynki. <color=#00FFFF>Działa jak wał</color>"
ptBR = "Uma cabana à prova d'água de tamanho médio construída em torno de uma escada, com um andar extra de armazenamento.\nGerencia um espaço de armazenamento de pilas.\nPode ser empilhada sobre si mesma, variantes, e pode carregar edifícios selecionados.\n<color=#00FFFF>Funciona como um Dique</color>"
koKR = "사다리를 중심으로 지어진 중간 크기의 수밀 로지로, 추가 보관 공간이 있습니다. \n파일 저장 공간을 관리합니다. \n자체 및 다양한 변형 위에 쌓을 수 있으며, 특정 건물을 운반할 수 있습니다. \n<color=#00FFFF>제방으로 기능합니다</color>"
csCZ = "Středně velká vodotěsná chata postavená kolem žebříku s dalším patrem pro uskladnění.\nSpravuje skladovací prostor pro pilable.\nMůže být ukládána na sebe, varianty a může nosit vybrané budovy.\n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một nhà nghỉ kín nước có kích thước trung bình được xây dựng xung quanh một cái cầu thang, với một tầng kho dự trữ bổ sung.  \nQuản lý một không gian lưu trữ pilables.  \nCó thể xếp chồng lên nhau, các biến thể, và có thể chứa các tòa nhà chọn lọc.  \n<color=#00FFFF>Hoạt động như một đê</color>"

["Lapantouflemagic.Topentrancewatertightlodge_PowderStorage.FlavorDescription"]
raw = "\"Holy pointer! We ordered that design years ago, it was about time!\"\n -An annoyed hauler beaver."
status = "normal"
enUS = "\"Holy pointer! We ordered that design years ago, it was about time!\"  \n-An annoyed hauler beaver."
zhCN = "“神圣的指针！我们多年前就订购了那个设计，是时候了！”  \n- 一只恼怒的搬运海狸。"
zhTW = "「神聖的指標！我們幾年前就訂購了那個設計，早該到貨了！」  \n- 一隻惹怒的搬運海狸。"
ruRU = "\"Святой указатель! Мы заказывали этот дизайн много лет назад, уже пора!\"  \n—Раздосадованный грузчик-бобер."
jaJP = "「聖なるポインター！私たちは数年前にそのデザインを注文したんだ、やっとのことだ！」  \n- うんざりした運搬ビーバー。"
frFR = "\"Saint pointeur ! Nous avons commandé ce design il y a des années, il était temps !\"  \n- Un castor transporteur agacé."
deDE = "\"Heiliger Zeigefinger! Dieses Design haben wir vor Jahren bestellt, es wurde höchste Zeit!\" -Ein genervter Holztransporter-Biber."
plPL = "\"Święty wskaźniku! Zamówiliśmy ten projekt lata temu, to najwyższy czas!\" - Zirytowany bobrze nosiciel."
ptBR = "\"Que indicação divina! Pedimos esse design anos atrás, já estava na hora!\"  \n-Um castor transportador irritado."
koKR = "\"와우! 우리는 그 디자인을 몇 년 전에 주문했어, 이제야 나오는군!\"  \n- 불만족한 운반 비버."
csCZ = "\"Slavný ukazatel! Ten design jsme si objednali před lety, bylo načase!\"  \n-Naštvaný nosič bobr."
viVN = "\"Ôi, cái gợi ý này! Chúng tôi đã đặt thiết kế đó từ nhiều năm trước, đến lúc này mới có!\"  \n-Một con thú gặm nhấm chở hàng khó chịu."

