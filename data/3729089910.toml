["Lapantouflemagic.Aqueduct_Bridge.Description"]
raw = "A small piece of aqueduct made out of light materials to bridge small gaps between two other segments."
status = "normal"
enUS = "A small piece of aqueduct made out of light materials to bridge small gaps between two other segments."
zhCN = "一段由轻质材料制成的小型高架渠，用于连接两个其他段落之间的小间隙。"
zhTW = "一小片由輕質材料製成的高架渠，旨在連接兩個其他部分之間的小間隙。"
ruRU = "Небольшой участок акведука, сделанный из легких материалов, чтобы соединить небольшие промежутки между двумя другими сегментами."
jaJP = "「他の2つのセグメントの間の小さな隙間を埋めるために、軽量材料で作られた小さな水道橋の一部。」"
frFR = "Un petit morceau d'aqueduc fabriqué à partir de matériaux légers pour combler de petits espaces entre deux autres segments."
deDE = "Ein kleines Stück Aquädukt aus leichten Materialien, um kleine Lücken zwischen zwei anderen Segmenten zu überbrücken."
plPL = "Mały fragment akweduktu wykonany z lekkich materiałów, łączący małe przerwy między dwoma innymi odcinkami."
ptBR = "Um pequeno trecho de aqueduto feito de materiais leves para criar uma ponte entre dois outros segmentos."
koKR = "두 개의 다른 구간 사이의 작은 간격을 연결하기 위해 가벼운 재료로 만들어진 작은 수로의 조각입니다."
csCZ = "Malý úsek akvaduktu vyrobený z lehkých materiálů, který překlenuje malé mezery mezi dvěma jinými segmenty."
viVN = "Một đoạn nhỏ của hệ thống dẫn nước được làm từ vật liệu nhẹ để nối giữa hai đoạn khác."

