["Lapantouflemagic.GiantLogBridge.Description"]
raw = "Half a sequoia artistically fitted into a not-half sequoia to provide a walkway.\nComes with lights underneath because no one wants to live in total darkness."
status = "normal"
enUS = "Half a sequoia artistically fitted into a not-half sequoia to provide a walkway. Comes with lights underneath because no one wants to live in total darkness."
zhCN = "“半个红杉艺术性地融合在一个不完全的红杉中，提供了一条步道。\n底下配有灯光，因为没人想生活在完全黑暗中。”"
zhTW = "“一半的紅杉藝術性地裝配在一個不是一半的紅杉上，以提供行人道。\n底下有燈，因為沒有人想要生活在完全黑暗中。”"
ruRU = "Полусеквойя, художественно встроенная в не полусеквойю, чтобы обеспечить пешеходный путь.\nОснащена светильниками снизу, потому что никто не хочет жить в полной темноте."
jaJP = "「半分のセコイアが、歩道を提供するために、完全でないセコイアに芸術的に取り付けられています。\n下にライトが付いていて、誰も完全な暗闇の中で生活したくはありません。」"
frFR = "Une moitié de séquoia artistiquement intégrée dans une moitié de séquoia pour créer un chemin.\nÉquipée de lumières en dessous car personne ne veut vivre dans l'obscurité totale."
deDE = "Eine halbierte Sequoia, kunstvoll in eine nicht halbierte Sequoia eingefügt, um einen Gehweg zu bieten. \nMit Lichtern darunter, denn niemand möchte in totaler Dunkelheit leben."
plPL = "Połowa sekwoi artystycznie wpasowana w nie-pół sekwoję, aby zapewnić ścieżkę.\nZawiera światła pod spodem, ponieważ nikt nie chce żyć w całkowitej ciemności."
ptBR = "Metade de uma sequóia artisticamente ajustada em uma não tão metade sequóia para proporcionar uma passarela. Vem com luzes embaixo porque ninguém quer viver na escuridão total."
koKR = "행เดิน할 수 있도록 절반의 세쿼이아 나무를 예술적으로 맞춘 비세쿼이아입니다.  \n아무도 완전한 어둠 속에서 살고 싶어 하지 않기 때문에 아래에 조명이 있습니다."
csCZ = "Půl sekvoje uměleckým způsobem zasazená do půl sekvoje, aby vytvořila chodník. Přichází se světly pod sebou, protože nikdo nechce žít v úplné tmě."
viVN = "Một nửa cây sequoia được lắp ghép một cách nghệ thuật vào một nửa cây sequoia không phải để tạo ra một lối đi. \nCó đèn bên dưới vì không ai muốn sống trong bóng tối hoàn toàn."

