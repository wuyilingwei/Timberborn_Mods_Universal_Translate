deDE = "Halte deine Pfoten am Führungsseil und deine Augen nach oben!"
plPL = "Trzymaj łapki na linie prowadzącej, a oczy zwrócone do góry!"
ptBR = "\"Mantenha suas patas na corda guia e seus olhos para cima!\""
