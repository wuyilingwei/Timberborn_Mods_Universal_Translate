["Lapantouflemagic.MinorBurns.DeathMessage"]
raw = "<color=green>caught on fire and died due to extreme carelessness. Turns out furry creatures are quite flammable.</color>"
status = "normal"
enUS = "<color=green>caught on fire and died due to extreme carelessness. Turns out furry creatures are quite flammable.</color>"
zhCN = "<color=green>因极端粗心而着火死亡。原来毛茸茸的生物相当易燃。</color>"
zhTW = "<color=green>因極度不小心而著火並死亡。結果發現毛茸茸的生物相當容易著火。</color>"
ruRU = "<color=green>сгорел и умер из-за крайней неосторожности. Оказалось, что пушистые существа довольно легко воспламеняются.</color>"
jaJP = "<color=green>極度の不注意で火がついて亡くなりました。どうやら毛むくじゃらの生き物は非常に燃えやすいようです。</color>"
frFR = "<color=green>a été enflammé et est mort en raison d'une extrême imprudence. Il s'avère que les créatures poilues sont assez inflammables.</color>"
deDE = "<color=green>ging in Flammen auf und starb aufgrund extremer Nachlässigkeit. Es stellt sich heraus, dass pelzige Kreaturen ziemlich entzündlich sind.</color>"
plPL = "<color=green>złapał ogień i zmarł z powodu skrajnej niedbałości. Okazuje się, że futrzaste stworzenia są dość łatwopalne.</color>"
ptBR = "<color=green>pegou fogo e morreu devido à extrema negligência. Aparentemente, criaturas peludas são bastante inflamáveis.</color>"
koKR = "<color=green>극심한 부주의로 불에 타서 사망했다. 털이 많은 생물은 꽤나 인화성이 있다.</color>"
csCZ = "<color=green>spálil se a zemřel z extrémní nedbalosti. Ukazuje se, že chlupatí tvorové jsou docela hořlaví.</color>"
viVN = "<color=green>bị cháy và chết do sự cẩu thả cực độ. Hóa ra những sinh vật có lông thì khá dễ cháy.</color>"

