["Lapantouflemagic.OverhangSquewer_Short.Description"]
raw = "A side platform that can be stuck between buildings or between floors.\n<color=red>Multiple side platforms or bridges cannot share the same support</color>"
status = "normal"
enUS = "A side platform that can be placed between buildings or between floors.  \n<color=red>Multiple side platforms or bridges cannot share the same support</color>"
zhCN = "一个可以夹在建筑物之间或楼层之间的侧平台。  \n<color=red>多个侧平台或桥梁不能共享相同的支撑</color>"
zhTW = "一個可以夾在建築物之間或樓層之間的側面平台。  \n<color=red>多個側面平台或橋樑不能共用同一支撐</color>"
ruRU = "Боковая платформа, которую можно разместить между зданиями или между этажами.  \n<color=red>Несколько боковых платформ или мостов не могут использовать одну и ту же опору</color>"
jaJP = "ビルや階の間に挟むことができるサイドプラットフォームです。  \n<color=red>複数のサイドプラットフォームや橋は、同じ支えを共有することはできません</color>"
frFR = "Une plateforme latérale qui peut être placée entre des bâtiments ou entre des étages.  \n<color=red>Plusieurs plateformes latérales ou ponts ne peuvent pas partager le même support</color>"
deDE = "Eine Seitenplattform, die zwischen Gebäuden oder zwischen Etagen platziert werden kann. <color=red>Mehrere Seitenplattformen oder Brücken können nicht dieselbe Unterstützung teilen</color>"
plPL = "Platforma boczna, która może być umieszczona między budynkami lub między piętrami. <color=red>Wiele platform bocznych lub mostów nie może dzielić tego samego wsparcia</color>"
ptBR = "Uma plataforma lateral que pode ser encaixada entre edifícios ou entre andares. <color=red>Múltiplas plataformas laterais ou pontes não podem compartilhar o mesmo suporte</color>"
koKR = "건물 사이 또는 층 사이에 끼어들 수 있는 측면 플랫폼입니다.  \n<color=red>여러 측면 플랫폼이나 다리는 같은 지지대를 공유할 수 없습니다</color>"
csCZ = "Boční platforma, která může být umístěna mezi budovami nebo mezi patry.\n<color=red>Více bočních platforem nebo mostů nemůže sdílet stejnou podporu</color>"
viVN = "Một nền tảng bên có thể được đặt giữa các tòa nhà hoặc giữa các tầng.  \n<color=red>Các nền tảng bên hoặc cầu cùng loại không thể chia sẻ cùng một điểm hỗ trợ</color>"

