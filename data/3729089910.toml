["Luc.Engineer.Description"]
raw = "A fancy building to help engineers show they're smarter than us. Also used to design mechanical buildings that work.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A fancy building to help engineers show they're smarter than us. Also used to design mechanical buildings that work.  \n<color=#00FFFF>Works as a Levee</color>"
zhCN = "“一个华丽的建筑，帮助工程师展示他们比我们聪明。还用于设计能工作的机械建筑。\n<color=#00FFFF>作为堤坝使用</color>”"
zhTW = "一座華麗的建築，幫助工程師表現出他們比我們更聰明。此外，它還用於設計運作的機械建築。  \n<color=#00FFFF>作為防洪堤運作</color>"
ruRU = "Шикарное здание, которое помогает инженерам показать, что они умнее нас. Также используется для проектирования механических зданий, которые работают. \n<color=#00FFFF>Работает как плотина</color>"
jaJP = "エンジニアたちが私たちよりも賢いことを示すための豪華な建物。また、機械的な建物を設計するためにも使用される。  \n<color=#00FFFF>堤防として機能します</color>"
frFR = "Un bâtiment élégant pour aider les ingénieurs à montrer qu'ils sont plus intelligents que nous. Utilisé également pour concevoir des bâtiments mécaniques qui fonctionnent.  \n<color=#00FFFF>Fonctionne comme une levee</color>"
deDE = "Ein schickes Gebäude, das Ingenieuren hilft zu zeigen, dass sie schlauer sind als wir. Auch verwendet, um mechanische Gebäude zu entwerfen, die funktionieren.  \n<color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Finezja budowla, która pomaga inżynierom udowodnić, że są od nas mądrzejsi. Używana również do projektowania mechanicznych budowli, które działają.\n<color=#00FFFF>Działa jako Tamą</color>"
ptBR = "Um prédio chique para ajudar engenheiros a mostrarem que são mais inteligentes que nós. Também é usado para projetar edifícios mecânicos que funcionam.  \n<color=#00FFFF>Funciona como um Dique</color>"
koKR = "우리보다 똑똑한 것을 보여주기 위해 엔지니어들을 돕는 멋진 건물입니다. 또한 작동하는 기계 건물을 설계하는 데 사용됩니다.  \n<color=#00FFFF>제방처럼 작동합니다</color>"
csCZ = "Elegantní budova, která pomáhá inženýrům ukázat, že jsou chytřejší než my. Také slouží k navrhování mechanických budov, které fungují.  \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một tòa nhà sang trọng giúp kỹ sư chứng tỏ rằng họ thông minh hơn chúng ta. Cũng được sử dụng để thiết kế các công trình cơ học hoạt động.  \n<color=#00FFFF>Hoạt động như một Đê</color>"

