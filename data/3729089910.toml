["Lapantouflemagic.Woodupgrade_Gatherer.Description"]
raw = "An upgrade module to be placed on top of an upgradable <color=#FFA500>Small Tower</color> (left) adjacent to a <color=#FF6EC7>triangle roof</color> building (right)\nEven more harvesting! Berries should watch out!\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "An upgrade module to be placed on top of an upgradable <color=#FFA500>Small Tower</color> (left) adjacent to a <color=#FF6EC7>triangle roof</color> building (right)  \nEven more harvesting! Berries should watch out!  \n<color=#00FFFF>Works as a Levee</color>"
zhCN = "一个可以放置在可升级的<color=#FFA500>小塔</color>（左侧）顶部的升级模块，邻近于<color=#FF6EC7>三角屋顶</color>建筑（右侧）  \n更多的收获！浆果们要小心了！  \n<color=#00FFFF>作为堤坝使用</color>"
zhTW = "一個升級模組，可放置在可升級的<color=#FFA500>小塔</color>（左側）上，鄰近一棟<color=#FF6EC7>三角屋頂</color>建築（右側）  \n更高效的收集！漿果們要小心了！  \n<color=#00FFFF>作為堤壩使用</color>"
ruRU = "Модуль улучшения, который устанавливается на улучшенную <color=#FFA500>Малую Башню</color> (слева), примыкающую к зданию с <color=#FF6EC7>треугольной крышей</color> (справа)  \nЕще больше сбора ресурсов! Ягоды должны быть осторожны!  \n<color=#00FFFF>Работает как Наклонный Плот</color>"
jaJP = "「アップグレード可能な<color=#FFA500>小さな塔</color>（左）を隣接する<color=#FF6EC7>三角屋根</color>の建物（右）の上に置くためのアップグレードモジュール\nさらに多くの収穫が可能！ベリーは注意すべきだ！\n<color=#00FFFF>堤防のように機能します</color>」"
frFR = "Un module de mise à niveau à placer au sommet d'une <color=#FFA500>Petite Tour</color> (gauche) adjacente à un bâtiment avec un toit en <color=#FF6EC7>triangle</color> (droite)  \nEncore plus de récolte ! Les baies devraient faire attention !  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Ein Upgrade-Modul, das auf einem aufrüstbaren <color=#FFA500>kleinen Turm</color> (links) platziert wird, der an einem Gebäude mit <color=#FF6EC7>dreieckigem Dach</color> (rechts) angrenzend ist.  \nNoch mehr Ernte! Beeren sollten vorsichtig sein!  \n<color=#00FFFF>Funktioniert wie ein Deich</color>"
plPL = "Moduł ulepszenia, który należy umieścić na szczycie ulepszającej się <color=#FFA500>Małej Wieży</color> (po lewej), sąsiadującej z budynkiem z dachem w kształcie <color=#FF6EC7>trójkąta</color> (po prawej).  \nJeszcze więcej zbierania! Jagody powinny się mieć na baczności!  \n<color=#00FFFF>Działa jak Tamę</color>"
ptBR = "Um módulo de upgrade a ser colocado no topo de uma <color=#FFA500>Pequena Torre</color> (esquerda) adjacente a um prédio com <color=#FF6EC7>telhado triangular</color> (direita)\nAinda mais colheita! As frutas devem ter cuidado!\n<color=#00FFFF>Funciona como uma Barragem</color>"
koKR = "업그레이드 가능한 <color=#FFA500>작은 탑</color> (왼쪽) 위에 놓을 수 있는 업그레이드 모듈, <color=#FF6EC7>삼각형 지붕</color> 건물 (오른쪽) 근처에 배치합니다.  \n더 많은 수확이 가능합니다! 베리는 조심해야 합니다!  \n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Modul vylepšení, který se umísťuje na vylepšitelnou <color=#FFA500>Malou věž</color> (vlevo) sousedící s budovou se <color=#FF6EC7>trojúhelníkovou střechou</color> (vpravo)  \nJeště více sklízení! Bobule si dávají pozor!  \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một mô-đun nâng cấp để đặt lên trên một <color=#FFA500>Tháp Nhỏ</color> (bên trái) có thể nâng cấp, bên cạnh một tòa nhà có mái <color=#FF6EC7>hình tam giác</color> (bên phải)  \nCòn thu hoạch nhiều hơn! Quả mọng nên cẩn thận!  \n<color=#00FFFF>Hoạt động như một Đê</color>"

["Lapantouflemagic.Woodupgrade_Gatherer.FlavorDescription"]
raw = "\"Just tie it up there and leave it overnight, when you’ll come back, it will behave better\""
status = "normal"
enUS = "\"Just tie it up there and leave it overnight, when you come back, it will behave better.\""
zhCN = "“把它绑在那里，放一夜，等你回来时，它会表现得更好。”"
zhTW = "“只要把它綁上去，然後放一晚，等你回來的時候，它會乖巧多了。”"
ruRU = "Просто привяжите это туда и оставьте на ночь, когда вы вернетесь, оно будет вести себя лучше"
jaJP = "「そこに結びつけて一晩放置しておくだけ、戻ってくる頃には、もっと良い動きになるよ」"
frFR = "\"Il suffit de l'attacher là et de le laisser toute la nuit, quand vous reviendrez, il se comportera mieux.\""
deDE = "\"Bind es einfach dort fest und lass es über Nacht, wenn du zurückkommst, wird es sich besser benehmen.\""
plPL = "Po prostu zwiąż to tam i zostaw na noc, gdy wrócisz, będzie się lepiej zachowywać"
ptBR = "\"É só amarrar aí e deixar de um dia para o outro, quando você voltar, ele se comportará melhor.\""
koKR = "\"그냥 저기에 묶어두고 하룻밤 지나면 돌아왔을 때 더 잘 행동할 거야\""
csCZ = "\"Jen to tam zavázat a nechat přes noc, až se vrátíte, bude se chovat lépe.\""
viVN = "Chỉ cần buộc nó ở đó và để qua đêm, khi bạn quay lại, nó sẽ cư xử tốt hơn"

