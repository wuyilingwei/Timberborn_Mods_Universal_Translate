["Lapantouflemagic.FermentationHouse.Description"]
raw = "A small lodge whose inhabitants are tasked with supplying and taking care of the fermentation barrels installed in the upper floor.\n<color=#FF6EC7>Can function without workers.</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A small lodge whose inhabitants are tasked with supplying and taking care of the fermentation barrels installed on the upper floor.  \n<color=#FF6EC7>Can function without workers.</color>  \n<color=#00FFFF>Works as a Levee</color>"
zhCN = "一座小木屋，其居民负责供应和照顾安装在上层的发酵桶。  \n<color=#FF6EC7>可以无需工人运作。</color>  \n<color=#00FFFF>作为堤坝运作</color>"
zhTW = "一個小小的小屋，其居民的工作是供應並照顧安裝在上層的發酵桶。  \n<color=#FF6EC7>可以在沒有工人的情況下運作。</color>  \n<color=#00FFFF>可作為排水渠</color>"
ruRU = "Небольшая хижина, жители которой отвечают за обеспечение и уход за бочками для ферментации, установленными на верхнем этаже.\n<color=#FF6EC7>Может функционировать без работников.</color>\n<color=#00FFFF>Работает как дамба</color>"
jaJP = "小さなロッジで、住人たちは上の階に設置された発酵樽の供給と管理を担当しています。  \n<color=#FF6EC7>労働者なしでも機能します。</color>  \n<color=#00FFFF>堤防として機能します。</color>"
frFR = "Une petite cabane dont les habitants ont pour tâche de fournir et s'occuper des fûts de fermentation installés à l'étage supérieur.  \n<color=#FF6EC7>Peut fonctionner sans travailleurs.</color>  \n<color=#00FFFF>Fonctionne comme une digue.</color>"
deDE = "Eine kleine Lodge, deren Bewohner dafür verantwortlich sind, die Fermentationsfässer im Obergeschoss zu betreuen und zu versorgen.\n<color=#FF6EC7>Kann ohne Arbeiter funktionieren.</color>\n<color=#00FFFF>Funktioniert wie ein Deich</color>"
plPL = "Mała chatka, której mieszkańcy są odpowiedzialni za dostarczanie i dbanie o beczki fermentacyjne zainstalowane na górnej kondygnacji. \n<color=#FF6EC7>Może funkcjonować bez pracowników.</color> \n<color=#00FFFF>Działa jak tamowanie wody</color>"
ptBR = "Uma pequena cabana cujos habitantes são responsáveis por fornecer e cuidar dos barris de fermentação instalados no andar superior.  \n<color=#FF6EC7>Pode funcionar sem trabalhadores.</color>  \n<color=#00FFFF>Funciona como uma Represa</color>"
koKR = "작은 오두막으로, 거주자들은 2층에 설치된 발효 통을 공급하고 관리하는 임무를 맡고 있습니다.\n<color=#FF6EC7>근로자 없이도 기능할 수 있습니다.</color>\n<color=#00FFFF>제방으로 작동합니다.</color>"
csCZ = "Malá chata, jejíž obyvatelé mají za úkol zásobovat a starat se o kvasné sudy umístěné v horním patře.  \n<color=#FF6EC7>Může fungovat bez pracovníků.</color>  \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một túp lều nhỏ, nơi cư dân được giao nhiệm vụ tiếp tế và chăm sóc các thùng lên men được lắp đặt ở tầng trên.\n<color=#FF6EC7>Có thể hoạt động mà không cần công nhân.</color>\n<color=#00FFFF>Hoạt động như một đê.</color>"

["Lapantouflemagic.FermentationHouse.FlavorDescription"]
raw = "\"No one will notice if I keep some extra for myself...\"\n -A fermenter beaver"
status = "normal"
enUS = "\"No one will notice if I keep some extra for myself...\"\n-A fermenter beaver"
zhCN = "“如果我自己多留一点，没人会注意到……”\n - 一只发酵的海狸"
zhTW = "「沒有人會注意如果我自己多保留一些……」  \n- 一隻發酵的海狸"
ruRU = "\"Никто не заметит, если я оставлю немного для себя...\"\n -Бобёр-ферментер"
jaJP = "「誰も私が余分に取っておいても気づかないだろう…」  \n- 発酵ビーバー"
frFR = "\"Personne ne remarquera si je garde un peu pour moi...\"  \n- Un castor fermenteur"
deDE = "\"Niemand wird es merken, wenn ich etwas für mich behalte...\"  \n- Ein fermentierender Biber"
plPL = "\"Nikt nie zauważy, jeśli sobie trochę odłożę...\"  \n- Bobr fermentujący"
ptBR = "\"Ninguém vai notar se eu guardar um pouco a mais para mim...\"  \n-Um castor fermentador"
koKR = "\"나를 위해서 조금 더 남겨두면 아무도 눈치 채지 않을 거야...\"  \n- 발효 댐너구리"
csCZ = "\"Nikdo si nevšimne, pokud si nechám trochu navíc pro sebe...\" -Bobr fermentátor"
viVN = "\"Không ai sẽ nhận ra nếu tôi giữ lại một chút cho riêng mình...\"  \n-Một con castor ủ bia"

