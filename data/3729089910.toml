["Lapantouflemagic.Cabbage2.FlavorDescription"]
raw = "\"If you bite in it, you EAT it.\" \n-Grandma beaver"
status = "normal"
enUS = "\"If you bite into it, you EAT it.\"  \n-Grandma beaver"
zhCN = "“如果你咬它，你就吃掉它。”  \n-奶奶海狸"
zhTW = "「如果你咬了它，你就會吃掉它。」  \n-「奶奶海狸」"
ruRU = "\"Если ты укуси его, ты СЪЕДИШЬ это.\"  \n-Бабушка бобер"
jaJP = "「それを噛んだら、食べることになるよ。」  \n- おばあちゃんビーバー"
frFR = "\"Si vous mordez dedans, vous le MANGEZ.\"  \n-Grand-mère castor"
deDE = "\"Wenn du hineinbeißt, ISST du es.\"  \n- Großmutter Biber"
plPL = "\"Jeśli ugryziesz, to zjesz.\" - Babcia bóbr"
ptBR = "\"Se você morder, você COME.\" \n-Vovó castor"
koKR = "\"너가 한 입 베어 물면, 너는 그것을 먹게 된다.\" - 할머니 비버"
csCZ = "\"Pokud do něj kousneš, SNÍŠ ho.\"  \n-Babička bobr"
viVN = "\"Nếu bạn cắn vào nó, bạn sẽ ĂN nó.\" \n-Bà beaver"

["NaturalResource.PinkBirch.FlavorDescription"]
raw = "\"What's cotton candy? Why does everyone call them \"cotton candy tree\"?\"\n -A farmer beaver"
status = "normal"
enUS = "\"What's cotton candy? Why does everyone call them 'cotton candy tree'?\"  \n-A farmer beaver"
zhCN = "“什么是棉花糖？为什么大家都叫它们‘棉花糖树’？”  \n- 一只农夫海狸"
zhTW = "「什麼是棉花糖？為什麼大家都叫它們「棉花糖樹」？」  \n- 一位農夫海狸"
ruRU = "\"Что такое сладкая вата? Почему все называют их «деревом сладкой ваты»?\"  \n- Фермер-бобер"
jaJP = "「わたあめって何？ どうしてみんなを「わたあめの木」と呼ぶの？」  \n- ビーバーの農場主"
frFR = "\"Qu'est-ce que la barbe à papa ? Pourquoi tout le monde les appelle-t-il \"arbre à barbe à papa\" ?\"  \n- Un castor fermier"
deDE = "\"Was ist Zuckerwatte? Warum nennt man sie \"Zuckerwattemarke\"?\" - Ein Bauernbiber"
plPL = "\"Co to jest wata cukrowa? Dlaczego wszyscy nazywają je 'drzewem waty cukrowej'?\" - Bóbr rolnik"
ptBR = "\"O que é algodão doce? Por que todo mundo os chama de 'árvore de algodão doce'?\"  \n-Um castor fazendeiro"
koKR = "\"사탕수수는 뭐지? 왜 모두가 이 나무를 '사탕수수 나무'라고 부르지?\"  \n-농부 비버"
csCZ = "\"Co je to cukrová vata? Proč jim všichni říkají \"cukrový vatový strom\"?\"  \n-A farmář bobr"
viVN = "\"Cotton candy là gì? Tại sao mọi người lại gọi chúng là 'cây bông đường'?\"  \n-Một con castor nông dân"

