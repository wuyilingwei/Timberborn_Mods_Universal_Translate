["Lapantouflemagic.TriangleGatheringHouse.Description"]
raw = "A reworked farmhouse used by a group of harvester beavers to meet and split work efficiently.\nHas a <color=#FF6EC7>triangle roof</color>, <color=#FF6EC7>Can support upgrades</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A reworked farmhouse used by a group of harvester beavers to meet and split work efficiently. Has a <color=#FF6EC7>triangle roof</color>, <color=#FF6EC7>Can support upgrades</color> <color=#00FFFF>Works as a Levee</color>"
zhCN = "一座改造过的农舍，供一群收割海狸聚会并高效分工使用。\n拥有一个<color=#FF6EC7>三角屋顶</color>，<color=#FF6EC7>支持升级</color>\n<color=#00FFFF>可作为堤岸使用</color>"
zhTW = "重新設計的農舍，供一群收割海狸用來高效會合與分工。  \n擁有一個<color=#FF6EC7>三角屋頂</color>，<color=#FF6EC7>可以支援升級</color>  \n<color=#00FFFF>可作為堤壩使用</color>"
ruRU = "Переосмысленный фермерский дом, используемый группой бородавчатых бобров для встреч и эффективного распределения работы. Имеет <color=#FF6EC7>треугольную крышу</color>, <color=#FF6EC7>может поддерживать улучшения</color> <color=#00FFFF>работает как дамба</color>"
jaJP = "「収穫ビーバーのグループが効率的に集まり、仕事を分担するために使用される改良された農家。\n<color=#FF6EC7>三角屋根</color>を持ち、<color=#FF6EC7>アップグレードをサポート</color>します。\n<color=#00FFFF>堤防として機能します</color>。」"
frFR = "Une ferme retravaillée utilisée par un groupe de castors récolteurs pour se rencontrer et diviser le travail de manière efficace.  \nDispose d'un <color=#FF6EC7>toit en triangle</color>, <color=#FF6EC7>peut supporter des améliorations</color>  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Ein umgebautes Bauernhaus, das von einer Gruppe von Ernte-Biberratten genutzt wird, um sich zu treffen und die Arbeit effizient aufzuteilen. Hat ein <color=#FF6EC7>Dach in Form eines Dreiecks</color>, <color=#FF6EC7>kann Upgrades unterstützen</color> <color=#00FFFF>funktioniert als Deich</color>"
plPL = "Przerobiona zagroda używana przez grupę bobrów zbieraczy do spotykania się i efektywnego dzielenia pracy.\nMa <color=#FF6EC7>trójkątny dach</color>, <color=#FF6EC7>można ją ulepszać</color>\n<color=#00FFFF>działa jako zapora</color>"
ptBR = "Uma casa de fazenda reformulada usada por um grupo de castores coletadores para se encontrar e dividir o trabalho de forma eficiente. Tem um <color=#FF6EC7>telhado triangular</color>, <color=#FF6EC7>pode suportar melhorias</color> <color=#00FFFF>funciona como uma Barragem</color>"
koKR = "효율적으로 작업을 나누고 만나는 수확 비버들이 사용하는 재작업된 농가입니다.\n<color=#FF6EC7>삼각형 지붕</color>이 있으며, <color=#FF6EC7>업그레이드를 지원할 수 있습니다</color>\n<color=#00FFFF>제방처럼 작동합니다</color>"
csCZ = "Přepracovaná farmářská budova používaná skupinou bobrů sběračů k efektivnímu setkávání a rozdělování práce. Má <color=#FF6EC7>trojúhelníkovou střechu</color>, <color=#FF6EC7>může podporovat vylepšení</color> <color=#00FFFF>funguje jako hráz</color>"
viVN = "Một trang trại được thiết kế lại, được sử dụng bởi một nhóm nhím gỗ thu hoạch để gặp gỡ và chia sẻ công việc một cách hiệu quả.  \nCó một <color=#FF6EC7>mái triangle</color>, <color=#FF6EC7>Hỗ trợ nâng cấp</color>  \n<color=#00FFFF>Hoạt động như một đê</color>"

["Lapantouflemagic.TriangleGatheringHouse.FlavorDescription"]
raw = "\"Don't you dare come in my house covered in dirt and berry juice! Get a shower first or I'll toss you in the river myself!\"\n -Mommy beaver, every evening."
status = "normal"
enUS = "\"Don't you dare come in my house covered in dirt and berry juice! Get a shower first or I'll toss you in the river myself!\"  \n-Mommy beaver, every evening."
zhCN = "“你敢脏着身子和浆果汁进我家吗！快去洗澡，不然我自己就把你扔进河里！”  \n——每晚的妈妈海狸。"
zhTW = "「別做夢了，滿身髒污和莓果汁就敢進我家！先去洗個澡，不然我自己就把你丟進河裡！」  \n- 母水獺，每個晚上。"
ruRU = "\"Не смей входить в мой дом, покрытый грязью и ягодным соком! Сначала прими душ, или я сама выброшу тебя в реку!\"  \n-Мама-бобер, каждый вечер."
jaJP = "「汚れやベリーの汁にまみれてうちに入るんじゃないわよ！ 先にシャワーを浴びるか、私があなたを川に投げ込むからね！」  \n-お母さんビーバー、毎晩。"
frFR = "Ne t'avise pas de entrer dans ma maison couvert de terre et de jus de baies ! Prends une douche d'abord ou je te jette moi-même dans la rivière !\"\n -Maman castor, chaque soir."
deDE = "„Komm ja nicht dreckig und mit Beerensaft in mein Haus! Nimm dir zuerst eine Dusche oder ich werfe dich selbst in den Fluss!“  \n-Mami-Biber, jeden Abend."
plPL = "Nie waż się wchodzić do mojego domu brudny i pokryty sokiem z jagód! Najpierw weź prysznic, albo sam cię wrzucę do rzeki!\"  \n-Mamusiu bobrze, każdego wieczoru."
ptBR = "\"Não se atreva a entrar na minha casa coberto de terra e suco de frutas! Tome um banho primeiro ou eu vou te jogar no rio eu mesma!\"  \n-Mamãe castor, toda noite."
koKR = "\"더럽고 베리 주스에 묻은 채로 내 집에 들어오지 마! 먼저 샤워를 하거나 내가 너를 직접 강에 던질 거야!\"  \n- 엄마 비버, 매일 저녁."
csCZ = "Nedávej se mi do domu pokrytý špínou a šťávou z bobulí! Nejdřív se osprchuj, nebo tě sám hodím do řeky!\" \n -Maminka bobr, každé večer."
viVN = "Đừng có dám vào nhà tôi khi người đầy bùn và nước quả mọng! Tắm rửa trước đi hoặc tôi sẽ tự ném bạn xuống sông!\"\n -Mẹ hải ly, mỗi buổi tối."

["Lapantouflemagic.NEWFarmhouse.Description"]
raw = "Employs a farmer that plant and harvest crops.\nHas a <color=#FF6EC7>triangle roof</color>, <color=#FF6EC7>Can support upgrades</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "Employs a farmer that plants and harvests crops. Has a <color=#FF6EC7>triangle roof</color>, <color=#FF6EC7>can support upgrades</color> <color=#00FFFF>works as a levee</color>"
zhCN = "雇佣一名农民种植和收获农作物。  \n拥有一个<color=#FF6EC7>三角屋顶</color>，<color=#FF6EC7>可以支持升级</color>  \n<color=#00FFFF>作为堤坝使用</color>"
zhTW = "雇用一名農夫來種植和收穫作物。\n擁有一個<color=#FF6EC7>三角屋頂</color>，<color=#FF6EC7>可以支持升級</color>\n<color=#00FFFF>作為堤壩運作</color>"
ruRU = "Наём фермеров для посева и сбора урожая.  \nИмеет <color=#FF6EC7>треугольную крышу</color>, <color=#FF6EC7>может поддерживать улучшения</color>  \n<color=#00FFFF>Работает как плотина</color>"
jaJP = "作物を植え、収穫する農夫を雇います。\n<color=#FF6EC7>三角屋根</color>があり、<color=#FF6EC7>アップグレードをサポートできます</color>\n<color=#00FFFF>堤防として機能します</color>"
frFR = "Emploie un agriculteur qui plante et récolte des cultures.  \nA un <color=#FF6EC7>toit en triangle</color>, <color=#FF6EC7>peut supporter des améliorations</color>  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Einstellen eines Bauern, der Pflanzen anbaut und erntet. \nHat ein <color=#FF6EC7>Dach in Form eines Dreiecks</color>, <color=#FF6EC7>Kann Upgrades unterstützen</color> \n<color=#00FFFF>Funktioniert als Damm</color>"
plPL = "Zatrudnia rolnika, który sadzi i zbiera plony. Posiada <color=#FF6EC7>trójkątny dach</color>, <color=#FF6EC7>może wspierać ulepszenia</color> <color=#00FFFF>działa jako wał</color>"
ptBR = "Emprega um agricultor que planta e colhe culturas.  \nPossui um <color=#FF6EC7>telhado triangular</color>, <color=#FF6EC7>pode suportar melhorias</color>  \n<color=#00FFFF>Funciona como um Dique</color>"
koKR = "농작물을 심고 수확하는 농부를 고용합니다.\n<color=#FF6EC7>삼각형 지붕</color>, <color=#FF6EC7>업그레이드를 지원할 수 있습니다</color>\n<color=#00FFFF>레벨처럼 작동합니다</color>"
csCZ = "Zaměstnává farmáře, který sází a sklízí plodiny. Má <color=#FF6EC7>trojúhelníkovou střechu</color>, <color=#FF6EC7>může podporovat vylepšení</color> <color=#00FFFF>funguje jako hráz</color>"
viVN = "Thuê một người nông dân trồng và thu hoạch cây trồng.\nCó một <color=#FF6EC7>mái nhà hình tam giác</color>, <color=#FF6EC7>Có thể hỗ trợ nâng cấp</color>\n<color=#00FFFF>Hoạt động như một Đê</color>"

["Lapantouflemagic.Woodupgrade.Description"]
raw = "An upgrade module to be placed on top of an upgradable <color=#FFA500>Small Tower</color> (left) adjacent to a <color=#FF6EC7>triangle roof</color> building (right).\nEmploys <color=green>10 Haulers</color>\".\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "An upgrade module to be placed on top of an upgradable <color=#FFA500>Small Tower</color> (left) adjacent to a <color=#FF6EC7>triangle roof</color> building (right). Employs <color=green>10 Haulers</color>. <color=#00FFFF>Works as a Levee</color>."
zhCN = "一个升级模块，可以放置在可升级的<color=#FFA500>小塔</color>（左侧）上，旁边是<color=#FF6EC7>三角屋顶</color>建筑（右侧）。  \n使用<color=green>10个搬运工</color>。  \n<color=#00FFFF>作为堤坝工作</color>。"
zhTW = "一個可安裝在可升級的<color=#FFA500>小塔</color>（左側）上，並鄰近<color=#FF6EC7>三角屋頂</color>建築（右側）的升級模塊。  \n需要<color=green>10名運輸者</color>。  \n<color=#00FFFF>作為防洪堤運作</color>。"
ruRU = "Модуль улучшения, который необходимо установить на <color=#FFA500>Малую Башню</color> (слева), примыкающую к зданию с <color=#FF6EC7>треугольной крышей</color> (справа). \nИспользует <color=green>10 Грузчиков</color>. \n<color=#00FFFF>Работает как Набережная</color>."
jaJP = "「<color=#FFA500>小さな塔</color>（左）に隣接する<color=#FF6EC7>三角屋根</color>の建物（右）の上に置くためのアップグレードモジュールです。\n<color=green>10人の運び屋</color>を雇用します。」\n<color=#00FFFF>堤防として機能します</color>」"
frFR = "Un module d'amélioration à placer sur un <color=#FFA500>Petite Tour</color> (à gauche) pouvant être améliorée, adjacent à un bâtiment avec un toit <color=#FF6EC7>en triangle</color> (à droite).  \nEmploie <color=green>10 Transporteurs</color>  \n<color=#00FFFF>Fonctionne comme un Digue</color>"
deDE = "„Ein Upgrade-Modul, das auf einem aufrüstbaren <color=#FFA500>kleinen Turm</color> (links) platziert wird, der an einem <color=#FF6EC7>Dach in Dreiecksform</color> (rechts) angrenzt. Beschäftigt <color=green>10 Transportarbeiter</color>. <color=#00FFFF>Funktioniert wie ein Damm</color>.“"
plPL = "Moduł ulepszający do umieszczenia na szczycie ulepszanej <color=#FFA500>Małej Wieży</color> (po lewej), przylegającej do budynku z <color=#FF6EC7>trójkątnym dachem</color> (po prawej).\nWymaga <color=green>10 Zbieraczy</color>.\n<color=#00FFFF>Działa jak Wał</color>"
ptBR = "Módulo de upgrade a ser colocado em cima de uma <color=#FFA500>Pequena Torre</color> (esquerda) adjacente a um edifício com telhado <color=#FF6EC7>triangular</color> (direita).  \nEmprega <color=green>10 Recolhedores</color>.\"  \n<color=#00FFFF>Funciona como uma Barreira</color>"
koKR = "업그레이드를 할 수 있는 <color=#FFA500>작은 타워</color> (왼쪽) 위에 놓을 수 있는 업그레이드 모듈로, <color=#FF6EC7>삼각형 지붕</color> 건물 (오른쪽)과 인접해 있습니다.  \n<color=green>10명의 운반꾼</color>이 필요합니다.  \n<color=#00FFFF>제방처럼 작동</color>합니다."
csCZ = "Modul pro vylepšení, který se umisťuje na vrchol upgradovatelné <color=#FFA500>Malé věže</color> (vlevo) vedle budovy s <color=#FF6EC7>trojúhelníkovou střechou</color> (vpravo).  \nVyužívá <color=green>10 přepravců</color>.  \n<color=#00FFFF>Funguje jako hráz</color>."
viVN = "Một mô-đun nâng cấp để được đặt trên một <color=#FFA500>Tháp Nhỏ</color> (bên trái) có thể nâng cấp, cạnh bên một công trình có mái <color=#FF6EC7>hình tam giác</color> (bên phải).\nSử dụng <color=green>10 Người kéo</color>.<color=#00FFFF>Hoạt động như một Đê</color>"

