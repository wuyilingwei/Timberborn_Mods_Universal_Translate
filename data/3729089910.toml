["Lapantouflemagic.IronTrader.Description"]
raw = "The Ironteeth are passionate about all things industry, and they actually hate to trade, especially their coffee. Thankfully they can’t resist a good industrial challenge so something order-made and really hard to do might peak their interest. They seem to appreciate our manufactured products but can’t make them because they ''don’t do soft industry'', whatever that means. Also they are the only ones who will take you seriously when you ask to be payed in loose dirt."
status = "normal"
enUS = "The Ironteeth are passionate about all things industry, and they actually hate to trade, especially their coffee. Thankfully they can’t resist a good industrial challenge, so something custom-made and really hard to do might pique their interest. They seem to appreciate our manufactured products but can’t make them because they 'don’t do soft industry,' whatever that means. Also, they are the only ones who will take you seriously when you ask to be paid in loose dirt."
zhCN = "铁齿族对所有工业事物充满热情，他们实际上讨厌交易，尤其是他们的咖啡。谢天谢地，他们无法抵挡良好的工业挑战，因此一些定制的、非常困难的事情可能会引起他们的兴趣。他们似乎欣赏我们的制造产品，但不能制造它们，因为他们“不会做软工业”，这到底是什么意思。此外，当你要求用散土支付时，他们是唯一愿意认真对待你的人。"
zhTW = "鐵牙族對所有與工業有關的事物充滿熱情，實際上他們厭惡交易，尤其是他們的咖啡。幸運的是，他們無法抗拒一個好的工業挑戰，因此一些訂製且真的很難做到的事情可能會引起他們的興趣。他們似乎欣賞我們的製造產品，但卻無法生產它們，因為他們「不做軟性工業」，這到底是什麼意思呢？另外，當你要求以散裝泥土支付時，他們是唯一會認真對待你的人。"
ruRU = "Железнозубые увлечены всеми сферами промышленности и на самом деле не любят торговать, особенно своим кофе. К счастью, они не могут устоять перед хорошим промышленным вызовом, поэтому что-то сделанное на заказ и действительно трудное может привлечь их интерес. Кажется, им нравятся наши производимые продукты, но они не могут их создавать, потому что «не занимаются мягкой промышленностью», что бы это ни значило. Кроме того, они единственные, кто воспримет вас всерьез, когда вы попросите заплатить вас рыхлой землей."
jaJP = "アイアンティース族は全ての産業に情熱を注いでおり、特に自分たちのコーヒーを取引することを嫌っています。幸い、彼らは良い産業的挑戦に抵抗できないため、特注で本当にやりがいのあるものには興味を持ちそうです。彼らは私たちの製品に感謝しているようですが、''ソフト産業はやらない''ということで、それを作ることはできません。さらに、あなたが土を現金で支払ってほしいと頼んだときに真剣に受け止めてくれる唯一の存在でもあります。"
frFR = "Les Ironteeth sont passionnés par tout ce qui touche à l'industrie, et ils détestent en fait le commerce, surtout leur café. Heureusement, ils ne peuvent pas résister à un bon défi industriel, donc quelque chose de fait sur commande et vraiment difficile à réaliser pourrait susciter leur intérêt. Ils semblent apprécier nos produits manufacturés mais ne peuvent pas les fabriquer car ils ''ne s'occupent pas de l'industrie douce'', quoi que cela signifie. De plus, ce sont les seuls qui vous prendront au sérieux lorsque vous demanderez à être payé en terre libre."
deDE = "Die Eisenzähne sind leidenschaftlich an allem interessiert, was mit Industrie zu tun hat, und sie hassen es tatsächlich zu handeln, insbesondere mit ihrem Kaffee. Glücklicherweise können sie einer guten industriellen Herausforderung nicht widerstehen, sodass etwas maßgeschneidertes und wirklich Schwieriges ihr Interesse wecken könnte. Sie scheinen unsere hergestellten Produkte zu schätzen, können sie aber nicht herstellen, weil sie ''keine weiche Industrie machen'', was auch immer das bedeutet. Außerdem sind sie die einzigen, die dich ernst nehmen, wenn du darum bittest, in loser Erde bezahlt zu werden."
plPL = "Zęby Żelaza są pasjonatami wszystkiego, co związane z przemysłem, a tak naprawdę nienawidzą handlu, szczególnie swoją kawą. Na szczęście nie potrafią oprzeć się dobremu przemysłowemu wyzwaniu, więc coś stworzonego na zamówienie i naprawdę trudnego do zrobienia może wzbudzić ich zainteresowanie. Wydaje się, że doceniają nasze wyprodukowane produkty, ale nie mogą ich wytwarzać, ponieważ ''nie zajmują się miękkim przemysłem'', cokolwiek to znaczy. Ponadto są jedynymi, którzy potraktują cię poważnie, gdy poprosisz o wynagrodzenie w sypkim brudzie."
ptBR = "Os Dentes de Ferro são apaixonados por todas as coisas da indústria e, na verdade, odeiam comercializar, especialmente seu café. Felizmente, eles não conseguem resistir a um bom desafio industrial, então algo encomendado e realmente difícil de fazer pode despertar seu interesse. Eles parecem apreciar nossos produtos manufacturados, mas não conseguem produzi-los porque ''não fazem indústria leve'', seja lá o que isso significa. Além disso, eles são os únicos que levarão você a sério quando você pedir para ser pago em terra solta."
koKR = "아이언티스족은 모든 산업에 열정을 가지고 있으며, 실제로 거래를 싫어합니다. 특히 그들의 커피에 대해선 더욱 그렇습니다. 다행히도 그들은 훌륭한 산업적 도전을 거부할 수 없기 때문에 맞춤 제작된 정말 어려운 것이 그들의 관심을 끌 수 있습니다. 그들은 우리의 제조 제품을 높이 평가하는 것처럼 보이지만 ''부드러운 산업''은 하지 않기 때문에 만들 수 없습니다. 또한 loose dirt로 지불을 요청할 때 그들을 진지하게 받아들이는 유일한 존재입니다."
csCZ = "Železní zubáci jsou zapálení pro všechno, co se týká průmyslu, a ve skutečnosti nesnášejí obchodování, zejména se svým kávou. Naštěstí neodolají dobré průmyslové výzvě, takže něco zakázkového a opravdu těžkého by je mohlo zaujmout. Zdá se, že oceňují naše vyrobené produkty, ale nemohou je vytvářet, protože ''nedělají měkký průmysl'', což vlastně znamená. Také jsou jediní, kdo tě vezme vážně, když požádáš o zaplacení v sypké hlíně."
viVN = "Những chiếc Răng Sắt rất đam mê mọi thứ liên quan đến công nghiệp, và họ thực sự căm ghét việc giao thương, đặc biệt là cà phê của họ. May mắn thay, họ không thể cưỡng lại một thách thức công nghiệp tốt, vì vậy một cái gì đó đặt hàng và thực sự khó để làm có thể thu hút sự quan tâm của họ. Họ có vẻ đánh giá cao các sản phẩm do chúng tôi sản xuất nhưng không thể tự làm vì họ ''không làm công nghiệp mềm'', bất cứ điều gì điều đó có nghĩa. Họ cũng là những người duy nhất sẽ coi bạn nghiêm túc khi bạn yêu cầu được trả tiền bằng đất rời."

