viVN = "Một bếp ngoài trời nhỏ để chuẩn bị các món ăn đơn giản. <color=#FF6EC7>Có thể hoạt động mà không cần công nhân.</color>"

["Lapantouflemagic.Cookingtent.FlavorDescription"]
raw = "\"What can we put inside? Ha! What can't we put inside?\"\n -Mathilda the insane cook"
status = "normal"
enUS = "\"What can we put inside? Ha! What can't we put inside?\" -Mathilda the insane cook"
zhCN = "“我们可以放里面什么？哈！我们不能放里面什么？”  \n- 疯狂的厨师马蒂尔达"
zhTW = "「我們可以放些什麼進去呢？哈！我們不能放些什麼進去？」  \n- 瘋狂的廚師瑪蒂爾達"
ruRU = "\"Что мы можем положить внутрь? Ха! Что мы не можем положить внутрь?\"  \n-Матильда, безумная повариха"
jaJP = "「中に何を入れられるかな？ハハ！中に何を入れられないって？」 - 狂気の料理人マチルダ"
frFR = "Que pouvons-nous mettre à l'intérieur ? Ha ! Que ne pouvons-nous pas mettre à l'intérieur ? -Mathilda, la cuisinière folle"
deDE = "„Was können wir hineinlegen? Ha! Was können wir nicht hineinlegen?“  \n- Mathilda, die wahnsinnige Köchin"
plPL = "\"Co możemy włożyć do środka? Ha! Czego nie możemy włożyć do środka?\"  \n-Mathilda, szalona kucharka"
ptBR = "\"O que podemos colocar dentro? Ha! O que não podemos colocar dentro?\"  \n -Mathilda, a cozinheira insana"
koKR = "\"우리에겐 무엇을 넣을 수 있을까? 하하! 무엇이든 넣을 수 있다면?\"  \n- 미친 요리사 마틸다"
csCZ = "\"Co můžeme dát dovnitř? Ha! Co nemůžeme dát dovnitř?\"  \n-Mathilda, šílená kuchařka"
viVN = "\"Chúng ta có thể cho gì vào bên trong? Ha! Chúng ta không thể cho gì vào bên trong?\" - Mathilda, đầu bếp điên cuồng"

