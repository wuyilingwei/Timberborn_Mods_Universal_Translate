["Lapantouflemagic.NuclearReactor2.Description"]
raw = "A medium-sized nuclear reactor powered by both nuclear waste and nuclear fuel.\nGenerates heat by consuming the radioactive elements found in bad water, maintaining the core itself nearly indefinitely.\n<color=red>Deletes 1.5 m²/s of liquid."
status = "normal"
enUS = "A medium-sized nuclear reactor powered by both nuclear waste and nuclear fuel. Generates heat by consuming the radioactive elements found in contaminated water, maintaining the core itself nearly indefinitely. <color=red>Deletes 1.5 m²/s of liquid."
zhCN = "一个中型核反应堆，由核废料和核燃料驱动。\n通过消耗坏水中的放射性元素产生热量，几乎无限期地维持核心本身。\n<color=red>每秒删除1.5平方米的液体。"
zhTW = "一座中型核反應堆，使用核廢料和核燃料兩種能源。\n透過消耗壞水中的放射性元素產生熱量，幾乎可以無限期地維持核心本身的運行。\n<color=red>每秒刪除1.5平方米的液體。</color>"
ruRU = "Средний ядерный реактор, работающий как на ядерных отходах, так и на ядерном топливе. Генерирует тепло, потребляя радиоактивные элементы, найденные в загрязненной воде, поддерживая саму активную зону практически бесконечно.  \n<color=red>Удаляет 1.5 м²/с жидкости."
jaJP = "「中型の原子炉で、核廃棄物と核燃料の両方で稼働します。悪化した水に含まれる放射性元素を消費することで熱を生成し、コア自体をほぼ無限に維持します。<color=red>1.5 m²/sの液体を削除します。」"
frFR = "Un réacteur nucléaire de taille moyenne alimenté à la fois par des déchets nucléaires et du combustible nucléaire. \nGénère de la chaleur en consommant les éléments radioactifs présents dans les eaux usées, maintenant le cœur lui-même presque indéfiniment. \n<color=red>Supprime 1,5 m²/s de liquide."
deDE = "Ein mittelgroßer Kernreaktor, der sowohl mit radioaktivem Abfall als auch mit Kernbrennstoff betrieben wird.  \nErzeugt Wärme, indem er die radioaktiven Elemente im schlechten Wasser verbraucht und den Kern selbst nahezu unbegrenzt instand hält.  \n<color=red>Löscht 1,5 m²/s Flüssigkeit.</color>"
plPL = "Średniej wielkości reaktor jądrowy zasilany zarówno przez odpady jądrowe, jak i paliwo jądrowe. Generuje ciepło poprzez konsumowanie radioaktywnych elementów znajdujących się w złej wodzie, utrzymując rdzeń niemal w nieskończoność. <color=red>Usuwa 1,5 m²/s cieczy."
ptBR = "Um reator nuclear de tamanho médio alimentado tanto por resíduos nucleares quanto por combustível nuclear.  \nGera calor consumindo os elementos radioativos encontrados em água contaminada, mantendo o núcleo quase indefinidamente.  \n<color=red>Remove 1,5 m²/s de líquido."
koKR = "핵 폐기물과 핵 연료로 구동되는 중간 크기의 원자로입니다. 나쁜 물에서 발견되는 방사성 원소를 소비하여 열을 생성하며, 코어 자체를 거의 무한정 유지합니다. <color=red>1.5 m²/s의 액체를 삭제합니다."
csCZ = "Středně velký jaderný reaktor napájený jak jaderným odpadem, tak jaderným palivem. Generuje teplo konzumací radioaktivních prvků nalezených ve špatné vodě, čímž udržuje jádro téměř nekonečně dlouho. <color=red>Odstraní 1,5 m²/s kapaliny."
viVN = "Một lò phản ứng hạt nhân cỡ trung được cung cấp năng lượng bởi cả chất thải hạt nhân lẫn nhiên liệu hạt nhân.  \nTạo ra nhiệt bằng cách tiêu thụ các nguyên tố phóng xạ có trong nước bẩn, duy trì lõi của nó gần như vô hạn.  \n<color=red>Xóa 1,5 m²/s chất lỏng."

