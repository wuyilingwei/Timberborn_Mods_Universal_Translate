["Lapantouflemagic.Ropemaker.FlavorDescription"]
raw = "A popular beaver entertainment is to throw random things in the spindle to watch them get crushed."
status = "normal"
enUS = "A popular beaver pastime is to throw random objects into the spindle and watch them get crushed."
zhCN = "一种流行的海狸娱乐活动是将随机物品扔进纺锤，观看它们被压碎。"
zhTW = "一種受歡迎的海狸娛樂活動是將隨機物品扔進紡錘中觀看它們被壓碎。"
ruRU = "Популярное развлечение бобров - бросать случайные предметы в прялку, чтобы наблюдать, как они размалываются."
jaJP = "ビーバーの人気のある娯楽は、スピンドルに無作為に物を投げ入れて、それらが砕かれるのを見ることです。"
frFR = "Un divertissement populaire chez les castors consiste à lancer des objets aléatoires dans le fuseau pour les voir se faire écraser."
deDE = "Eine beliebte Freizeitbeschäftigung der Biber ist es, zufällige Dinge in die Spindel zu werfen, um zuzusehen, wie sie zerdrückt werden."
plPL = "Popularną rozrywką bobrów jest wrzucanie przypadkowych przedmiotów do wrzeciona, aby obserwować, jak są miażdżone."
ptBR = "Uma das distrações populares dos castores é jogar coisas aleatórias na roca para vê-las sendo esmagadas."
koKR = "비버들이 좋아하는 오락 중 하나는 물레에 무작위 물건들을 던져서 그것들이 으깨지는 모습을 보는 것입니다."
csCZ = "Oblíbenou zábavou bobrů je házet náhodné věci do kolovratu a sledovat, jak se rozdrtí."
viVN = "Một trong những trò giải trí nổi tiếng của những chú thủy tinh là ném những thứ ngẫu nhiên vào bánh xe để xem chúng bị nghiền nát."

