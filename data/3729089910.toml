["Lapantouflemagic.IslandTrader.Description"]
raw = "Islandbeavers are lazy hippies who spend their days partying on the beach and are interested in nothing that isn't fun. The good thing is that we can easily trade them manfactured products since they can’t be bothered making their own, but on the other hand they don’t have a lot of things to give us in exchange, maybe some shiny junk and salt, that will save us the trouble of mining it."
status = "normal"
enUS = "Island beavers are lazy hippies who spend their days partying on the beach and are interested in nothing that isn't fun. The good thing is that we can easily trade them manufactured products since they can’t be bothered making their own, but on the other hand they don’t have a lot of things to give us in exchange, maybe some shiny junk and salt, that will save us the trouble of mining it."
zhCN = "“岛屿海狸是懒惰的嬉皮士，他们整天在海滩上聚会，对任何不有趣的事物都没有兴趣。好在我们可以轻松地与他们交易制造的产品，因为他们懒得自己制作，但另一方面，他们能给我们的东西并不多，也许只是一点闪亮的垃圾和盐，这可以省去我们开采的麻烦。”"
zhTW = "島上的海狸是懶惰的嬉皮士，他們整天在沙灘上派對，對除了娛樂的事物毫無興趣。好的一面是我們可以輕鬆地與他們交易製造的產品，因為他們懶得自己製作，但另一方面，他們能給我們的東西不多，可能只有一些閃閃發光的垃圾和鹽，這樣就省去了我們開採的麻煩。"
ruRU = "Островные бобры — это ленивые хиппи, которые проводят свои дни, устраивая вечеринки на пляже, и не интересуются ничего, кроме развлечений. Хорошо то, что мы можем легко обменивать с ними промышленные товары, так как им не хочется делать свои собственные, но с другой стороны, у них не так много всего, что можно было бы предложить нам в обмен, только пару блестящих безделушек и соль, что избавит нас от необходимости её добывать."
jaJP = "アイランドビーバーは怠け者のヒッピーで、ビーチでパーティーを楽しむことに一日中を費やしており、楽しさ以外のことには全く興味を持っていません。良い点は、彼らが自分たちで製品を作ることに関心がないため、簡単に我々の製品と交換できることですが、逆に彼らが私たちに渡すことのできるものはあまり多くなく、せいぜい光るガラクタや塩程度です。これが私たちが採掘する手間を省いてくれるでしょう。"
frFR = "Les castors insulaires sont des hippies paresseux qui passent leurs journées à faire la fête sur la plage et ne s'intéressent à rien qui ne soit pas amusant. La bonne nouvelle, c'est que nous pouvons facilement leur échanger des produits manufacturés puisqu'ils ne se donnent pas la peine de fabriquer les leurs, mais d'un autre côté, ils n'ont pas beaucoup de choses à nous donner en échange, peut-être des objets brillants et du sel, ce qui nous évitera le désagrément de les miner."
deDE = "Inselbiber sind faule Hippies, die ihre Tage damit verbringen, am Strand zu feiern, und sich für nichts interessieren, was keinen Spaß macht. Das Gute daran ist, dass wir ihnen leicht gefertigte Produkte tauschen können, da sie keine Lust haben, ihre eigenen herzustellen. Auf der anderen Seite haben sie nicht viele Dinge, die sie uns im Austausch geben können, vielleicht etwas glitzernden Kram und Salz, was uns die Mühe des Abbaus erspart."
plPL = "Wyspowe bobry to leniwe hipisy, które spędzają dni na imprezowaniu na plaży i nie interesuje ich nic, co nie jest zabawne. Dobrą rzeczą jest to, że możemy łatwo wymieniać się z nimi produktami przemysłowymi, ponieważ nie chce im się wytwarzać własnych, ale z drugiej strony nie mają wielu rzeczy do oddania w zamian, może trochę błyszczących śmieci i soli, co zaoszczędzi nam kłopotu z jej wydobywaniem."
ptBR = "Os castores da ilha são hippies preguiçosos que passam os dias festejando na praia e não se interessam por nada que não seja divertido. A boa notícia é que podemos trocar facilmente produtos manufacturados com eles, já que não se dão ao trabalho de fazer os seus próprios, mas por outro lado, eles não têm muitas coisas para nos dar em troca, talvez alguns trinkets brilhantes e sal, o que nos poupará o trabalho de minerá-los."
koKR = "섬비버들은 게으른 히피들로, 매일 해변에서 파티를 즐기며 재미없이는 아무것에도 관심이 없습니다. 좋은 점은 그들이 자신의 제품을 만들기 귀찮아하기 때문에 우리는 쉽게 그들과 제조된 제품을 거래할 수 있다는 것입니다. 하지만 다른 한편으로 그들이 우리에게 줄 수 있는 것이 많지 않아, 아마도 반짝거리는 쓰레기와 소금밖에 없을 것입니다. 이는 우리가 직접 채굴하는 수고를 덜어줄 것입니다."
csCZ = "Ostrované bobři jsou líné hippies, které tráví své dny párty na pláži a nezajímají se o nic, co není zábavné. Dobré na tom je, že s nimi můžeme snadno obchodovat s vyrobenými produkty, protože se jim nechce vyrábět si vlastní, ale na druhou stranu nemají moc věcí, které by nám mohli nabídnout na oplátku, možná nějaké třpytivé haraburdí a sůl, což nám ušetří práci s jejími těžbami."
viVN = "Bọ cạp trên đảo là những kẻ lười biếng sống theo phong cách hippie, họ dành cả ngày để tiệc tùng trên bãi biển và không quan tâm đến bất cứ điều gì không vui vẻ. Điều tốt là chúng ta có thể dễ dàng trao đổi với họ những sản phẩm chế tạo vì họ không muốn làm ra sản phẩm của riêng mình, nhưng mặt khác họ không có nhiều thứ để đổi cho chúng ta, có thể là một số đồ bỏ đi lấp lánh và muối, điều này sẽ giúp chúng ta tiết kiệm được vấn đề khai thác."

