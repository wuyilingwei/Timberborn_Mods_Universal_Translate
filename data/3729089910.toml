["Lapantouflemagic.Woodupgrade.FlavorDescription"]
raw = "\"And... what do you need the platform for, exactly?\"\n -A confused lumberjack beaver"
status = "normal"
enUS = "\"And... what do you need the platform for, exactly?\"  \n-A confused lumberjack beaver"
zhCN = "“那么……你到底需要这个平台干啥？”  \n- 一只困惑的伐木海狸"
zhTW = "「那…你到底需要這個平台幹什麼？」\n- 一隻困惑的伐木海狸"
ruRU = "\"И... для чего вам платформа, собственно?\"  \n- С растерянным бобром-лесорубом"
jaJP = "「そして…そのプラットフォームは一体何のために必要なの？」  \n– 混乱した木こりのビーバー"
frFR = "\"Et... à quoi te sert la plateforme, exactement ?\"\n -Un castor bûcheron confus"
deDE = "\"Und... wofür brauchst du die Plattform genau?\"  \n- Ein verwirrter Holzfäller-Biber"
plPL = "„A... do czego dokładnie potrzebujesz tej platformy?”  \n- Zdezorientowany bobrzy drwal"
ptBR = "\"E... para que você precisa da plataforma, exatamente?\"\n-Um castor lenhador confuso"
koKR = "\"그럼... 그 플랫폼이 왜 필요한 건데, 정확히?\"  \n- 혼란스러운 나무꾼 비버"
