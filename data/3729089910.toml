["Lapantouflemagic.ZiplineBalloon.FlavorDescription"]
raw = "\"Don't stay under it on windy days.\nWhat? No! It's not gonna fall, you just don't want to get showered with barf.\""
status = "normal"
enUS = "\"Don't stay under it on windy days. What? No! It's not gonna fall, you just don't want to get showered with barf.\""
zhCN = "“风大的日子不要待在下面。\n什么？不！它不会掉下来，你只是不想被呕吐淋湿。”"
zhTW = "\"在風大的日子可不要待在它下面。\n什麼？不！它不會掉下來，只是你不想被嘔吐物淋濕。\""
ruRU = "\"Не стойте под ним в ветреные дни. Что? Нет! Он не упадет, просто не хотите, чтобы вас забросало рвотой.\""
jaJP = "\"風の強い日にはその下にいないでください。  \n何？違う！落ちるわけじゃない、ただ嘔吐のシャワーを浴びたくないだけです。\""
frFR = "\"Ne restez pas en dessous les jours de vent. Quoi ? Non ! Ça ne va pas tomber, vous ne voulez juste pas être arrosé de vomi.\""
deDE = "\"Steh an windigen Tagen nicht darunter.\nWas? Nein! Es wird nicht fallen, du willst nur nicht mit Erbrochenem überschüttet werden.\""
plPL = "\"Nie stój pod tym w wietrzne dni. Co? Nie! To nie spadnie, po prostu nie chcesz zostać oblany wymiotami.\""
ptBR = "\"Não fique embaixo dele em dias de vento. O quê? Não! Não vai cair, você só não quer ser coberto de vômito.\""
koKR = "\"바람 부는 날에는 그 아래에 있지 마세요.  \n뭐? 아니! 떨어지지 않을 거예요, 그냥 토사물에 맞고 싶지 않으실 거예요.\""
csCZ = "\"Nestavte se pod něj v větrných dnech. Co? Ne! Nebude padat, jen nechcete být polévání zvratky.\""
viVN = "\"Đừng đứng dưới nó vào những ngày có gió.\nCái gì? Không! Nó sẽ không rơi đâu, bạn chỉ không muốn bị tắm trong đồ ói thôi.\""

