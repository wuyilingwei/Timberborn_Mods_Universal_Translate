["Need.Insectdeath.DeathMessage"]
raw = "<color=green>didn't know what ''carnivorous'' meant and tried to pet a giant firefly, proving that it is always better to ask your questions to the teacher</color>"
status = "normal"
enUS = "<color=green>didn't know what 'carnivorous' meant and tried to pet a giant firefly, proving that it is always better to ask your questions to the teacher</color>"
zhCN = "<color=green>不知道“肉食性”是什么意思，还试图去摸一只巨型萤火虫，证明向老师提问总是更好的选择</color>"
zhTW = "<color=green>不知道「食肉性」是什麼意思，結果試著去撫摸一隻巨型螢火蟲，證明了向老師詢問問題總是比較好。</color>"
ruRU = "<color=green>не знал, что значит ''кормящий'', и попытался погладить гигантскую светлячка, доказав, что всегда лучше задавать вопросы учителю</color>"
jaJP = "<color=green>「肉食性」とは何かを知らずに巨大なホタルを撫でようとし、いつも先生に質問をする方が良いと証明された</color>"
frFR = "<color=green>ne savait pas ce que signifiait ''carnivore'' et a essayé de caresser une luciole géante, prouvant qu'il vaut toujours mieux poser ses questions à l'enseignant</color>"
deDE = "<color=green>wusste nicht, was ''fleischfressend'' bedeutet und versuchte, eine riesige Glühwürmchen zu streicheln, was beweist, dass es immer besser ist, seine Fragen dem Lehrer zu stellen</color>"
plPL = "<color=green>nie wiedział, co oznacza ''mięsożerny'' i próbował głaskać gigantycznego świetlika, udowadniając, że zawsze lepiej jest zadawać pytania nauczycielowi</color>"
ptBR = "<color=green>não sabia o que ''carnívoro'' significava e tentou acariciar uma vaga-lume gigante, provando que é sempre melhor fazer suas perguntas ao professor</color>"
koKR = "<color=green>''육식성''이 무엇인지 모르고 거대 반딧불이를 쓰다듬으려 하다가, 항상 선생님에게 질문하는 것이 더 낫다는 것을 증명했습니다</color>"
csCZ = "<color=green>nevěděl, co znamená ''masožravý'' a pokusil se pohladit obrovskou světlušku, čímž dokázal, že je vždy lepší položit otázky učiteli</color>"
viVN = "<color=green>không biết ''ăn thịt'' nghĩa là gì và đã cố gắng vuốt ve một con đom đóm khổng lồ, chứng tỏ rằng luôn tốt hơn khi hỏi giáo viên câu hỏi của bạn</color>"

