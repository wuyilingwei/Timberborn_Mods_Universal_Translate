["Lapantouflemagic.PawsTrader.Description"]
raw = "Our expedition is neither the first, neither the last to have been send from our homeland. If we can find other settlements of our kind, they would be good trading partners, since none of the other savages we've met can make an even half-decent stew."
status = "normal"
enUS = "Our expedition is neither the first nor the last to have been sent from our homeland. If we can find other settlements of our kind, they would be good trading partners, since none of the other savages we've met can make an even half-decent stew."
zhCN = "“我们的远征既不是从我们的故乡派出的第一批，也不是最后一批。如果我们能找到其他同类的定居点，他们将是很好的贸易伙伴，因为我们遇到的其他野蛮人没有一个能做出半分体面的炖菜。”"
zhTW = "「我們的探險隊既不是從故鄉派出的第一支，也不是最後一支。如果我們能找到其他類似的聚落，他們將是良好的貿易夥伴，因為我們遇見的其他野蠻人都無法做出一份像樣的燉菜。」"
ruRU = "Наша экспедиция не первая и не последняя, отправленная из нашей родины. Если мы сможем найти другие поселения нашего рода, они станут хорошими торговыми партнерами, так как ни один из других дикарей, которых мы встретили, не может приготовить даже половину приличного рагу."
jaJP = "私たちの探検は、私たちの故郷から送られた最初でも最後でもありません。私たちのような他の集落を見つけることができれば、彼らは良い交易相手となるでしょう。他の出会った野蛮人たちは、まともなシチューを作ることすらできませんから。"
frFR = "Notre expédition n'est ni la première, ni la dernière à avoir été envoyée de notre patrie. Si nous pouvons trouver d'autres colonies de notre espèce, elles seraient de bons partenaires commerciaux, puisque aucun des autres sauvages que nous avons rencontrés ne peut préparer un ragoût convenable."
deDE = "Unsere Expedition ist weder die erste noch die letzte, die aus unserer Heimat gesendet wurde. Wenn wir andere Siedlungen unserer Art finden können, wären sie gute Handelspartner, da keiner der anderen Wilden, die wir getroffen haben, auch nur einen halbwegs anständigen Eintopf zubereiten kann."
plPL = "Nasza ekspedycja nie jest ani pierwsza, ani ostatnia, która została wysłana z naszej ojczyzny. Jeśli uda nam się znaleźć inne osady naszego rodzaju, będą dobrymi partnerami do handlu, ponieważ żadne z innych dzikusów, które spotkaliśmy, nie potrafi przygotować nawet porządnej zupy."
ptBR = "Nossa expedição não é nem a primeira, nem a última a ser enviada de nossa terra natal. Se conseguirmos encontrar outros assentamentos de nossa espécie, seriam bons parceiros comerciais, já que nenhum dos outros selvagens que encontramos consegue fazer um ensopado que seja minimamente decente."
koKR = "우리의 탐사는 우리 고향에서 파견된 첫 번째도 마지막도 아닙니다. 만약 우리가 우리와 같은 다른 정착지를 찾을 수 있다면, 그들은 좋은 거래 파트너가 될 것입니다. 우리가 만난 다른 야만인들은 그나마 제법 괜찮은 스튜조차 만들 수 없기 때문입니다."
csCZ = "Naše expedice není ani první, ani poslední, která byla vyslána z naší vlasti. Pokud najdeme další osady našeho druhu, byly by dobrými obchodními partnery, protože žádný z ostatních divochů, se kterými jsme se setkali, neumí udělat ani z poloviny slušný guláš."
viVN = "Cuộc thám hiểm của chúng tôi không phải là cuộc thám hiểm đầu tiên, cũng không phải là cuộc thám hiểm cuối cùng được gửi từ quê hương của chúng tôi. Nếu chúng tôi có thể tìm thấy những khu định cư khác giống như chúng tôi, họ sẽ là những đối tác giao thương tốt, vì không ai trong số những người thổ dân khác mà chúng tôi đã gặp có thể nấu một món hầm tử tế."

["Lapantouflemagic.PawsTrader.FlavorDescription"]
raw = "\"Nooo! I’ll get abducted by hoomaaaaaaans!\""
status = "normal"
enUS = "\"Nooo! I’ll get abducted by hoomaaaaaaans!\""
zhCN = "“不会！我会被人类绑架的！”"
zhTW = "「不！我會被人類綁架！」"
