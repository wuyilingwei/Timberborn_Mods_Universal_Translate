["Lapantouflemagic.NEWForester.Description"]
raw = "Plants basic trees.\n<color=#FFA500>Small Tower</color>, <color=#FF6EC7>Can support upgrades</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "Plants basic trees.  \n<color=#FFA500>Small Tower</color>, <color=#FF6EC7>Can support upgrades</color>  \n<color=#00FFFF>Works as a Levee</color>"
zhCN = "植物基本树木。  \n<color=#FFA500>小塔</color>，<color=#FF6EC7>可以支持升级</color>  \n<color=#00FFFF>作为堤坝工作</color>"
zhTW = "種植基本樹木。\n<color=#FFA500>小塔</color>，<color=#FF6EC7>可支援升級</color>\n<color=#00FFFF>作為堤壩運作</color>"
ruRU = "Сажает основные деревья.  \n<color=#FFA500>Маленькая башня</color>, <color=#FF6EC7>может поддерживать улучшения</color>  \n<color=#00FFFF>Работает как насыпь</color>"
jaJP = "基本的な木を植えます。  \n<color=#FFA500>小さなタワー</color>、<color=#FF6EC7>アップグレードをサポート可能</color>  \n<color=#00FFFF>堤防として機能します</color>"
frFR = "Plante des arbres de base.  \n<color=#FFA500>Petite Tour</color>, <color=#FF6EC7>Peut supporter des améliorations</color>  \n<color=#00FFFF>Fonctionne comme une Levée</color>"
deDE = "Pflanzt grundlegende Bäume.  \n<color=#FFA500>Kleiner Turm</color>, <color=#FF6EC7>Kann Upgrades unterstützen</color>  \n<color=#00FFFF>Funktioniert als Damm</color>"
plPL = "Sadzi podstawowe drzewa.  \n<color=#FFA500>Mała Wieża</color>, <color=#FF6EC7>Może wspierać ulepszenia</color>  \n<color=#00FFFF>Działa jak Wał</color>"
ptBR = "Planta árvores básicas.  \n<color=#FFA500>Pequena Torre</color>, <color=#FF6EC7>Pode suportar melhorias</color>  \n<color=#00FFFF>Funciona como uma Barragem</color>"
koKR = "기본 나무를 심습니다.  \n<color=#FFA500>작은 타워</color>, <color=#FF6EC7>업그레이드를 지원할 수 있습니다</color>  \n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Zasazuje základní stromy.  \n<color=#FFA500>Malá věž</color>, <color=#FF6EC7>může podporovat vylepšení</color>  \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "\"Cây cơ bản.\"\n<color=#FFA500>Tháp Nhỏ</color>, <color=#FF6EC7>Có thể hỗ trợ nâng cấp</color>\n<color=#00FFFF>Hoạt động như một Đê</color>"

["Lapantouflemagic.Handicrafter.Description"]
raw = "A town house where manufactured items are made.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A town house where manufactured items are made.  \n<color=#00FFFF>Works as a Levee</color>"
zhCN = "“一个制造物品的住宅。\n<color=#00FFFF>作为堤坝使用</color>”"
zhTW = "一個製造物品的小鎮房屋。  \n<color=#00FFFF>作為堤防運作</color>"
ruRU = "Городской дом, в котором изготавливаются товары. <color=#00FFFF>Работает как дамба</color>"
jaJP = "製品が作られる町の家です。  \n<color=#00FFFF>堤防として機能します</color>"
frFR = "Une maison de ville où les objets fabriqués sont réalisés.  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "„Ein Stadthaus, in dem hergestellte Gegenstände gefertigt werden. <color=#00FFFF>Funktioniert wie ein Deich</color>“"
plPL = "Dom miejski, w którym produkowane są przedmioty.\n<color=#00FFFF>Działa jak wał</color>"
ptBR = "Uma casa da cidade onde itens fabricados são feitos. <color=#00FFFF>Funciona como uma Dique</color>"
koKR = "제작된 아이템이 만들어지는 타운 하우스입니다.\n<color=#00FFFF>둑으로 작동합니다</color>"
csCZ = "Dům, ve kterém se vyrábějí předměty. <color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một ngôi nhà trong thị trấn nơi các sản phẩm được chế tạo.  \n<color=#00FFFF>Hoạt động như một đê</color>"

["Lapantouflemagic.IrrigationTower.Description"]
raw = "Irrigates land around by consuming water.\n<color=green>Water consumption is barely higher than a water dump.</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "Irrigates land around by consuming water.\n<color=green>Water consumption is barely higher than a water dump.</color>\n<color=#00FFFF>Works as a Levee</color>"
zhCN = "“通过消耗水来灌溉周围的土地。  \n<color=green>水消耗量仅略高于水坑。</color>  \n<color=#00FFFF>作为堤坝工作</color>”"
zhTW = "透過消耗水源來灌溉周圍的土地。<color=green>水的消耗量僅比水的傾倒略高。</color><color=#00FFFF>作為堤壩運作</color>"
ruRU = "Орошает окружающую землю, потребляя воду.  \n<color=green>Потребление воды лишь чуть выше, чем у водоотводного сооружения.</color>  \n<color=#00FFFF>Работает как плотина</color>"
jaJP = "周囲の土地を灌漑します。  \n<color=green>水の消費は水捨て場よりもわずかに高いです。</color>  \n<color=#00FFFF>堤防として機能します</color>"
frFR = "Irrigue le terrain environnant en consommant de l'eau.  \n<color=green>La consommation d'eau est à peine supérieure à celle d'un déversement d'eau.</color>  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Bewässert das umliegende Land durch Wasserverbrauch.  \n<color=green>Der Wasserverbrauch ist kaum höher als bei einer Wasserablage.</color>  \n<color=#00FFFF>Funktioniert wie ein Deich</color>"
plPL = "Nawadnia teren wokół, zużywając wodę.  \n<color=green>Zużycie wody jest ledwo wyższe niż w przypadku zrzutu wody.</color>  \n<color=#00FFFF>Działa jak grobla</color>"
ptBR = "Irriga a terra ao redor consumindo água.  \n<color=green>O consumo de água é apenas um pouco maior do que o de um descarte de água.</color>  \n<color=#00FFFF>Funciona como uma Barragem</color>"
koKR = "주변의 토양에 물을 공급합니다.\n<color=green>물 소비량은 거의 물 배출보다 높지 않습니다.</color>\n<color=#00FFFF>제방으로 기능합니다</color>"
csCZ = "Zavlažuje okolní půdu pomocí vody.  \n<color=green>Spotřeba vody je jen o něco vyšší než u vodního dumpu.</color>  \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Tưới tiêu cho đất xung quanh bằng cách tiêu thụ nước.  \n<color=green>Việc tiêu thụ nước chỉ cao hơn một bãi đổ nước một chút.</color>  \n<color=#00FFFF>Hoạt động như một con đê</color>"

["Lapantouflemagic.Smallcookhouse.Description"]
raw = "A medium lodge managing a lovely terrace where beavers can get a fresh drink.\nThe terrace must be <color=yellow>above ground.</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A medium lodge managing a lovely terrace where beavers can get a fresh drink. The terrace must be <color=yellow>above ground.</color> <color=#00FFFF>Works as a Levee</color>"
zhCN = "“一座中等规模的旅馆，管理着一个可爱的露台，河狸们可以在这里喝到新鲜饮品。\n露台必须是<color=yellow>高于地面。</color>\n<color=#00FFFF>作为一座堤坝使用</color>”"
zhTW = "一個中型小木屋，管理著一個可愛的露台，浣熊可以在此享用新鮮飲品。  \n露台必須是<color=yellow>高於地面。</color>  \n<color=#00FFFF>作為堤防運作</color>"
ruRU = "Средняя хижина с прекрасной террасой, где бобры могут получить свежий напиток.  \nТерраса должна быть <color=yellow>на возвышенности.</color>  \n<color=#00FFFF>Работает как плотина</color>"
jaJP = "「ビーバーが新鮮な飲み物を得ることができる素敵なテラスを管理する中型ロッジです。テラスは<color=yellow>地上にある必要があります。</color><color=#00FFFF>堤防として機能します。</color>」"
frFR = "Une maison moyenne gérant une belle terrasse où les castors peuvent prendre une boisson fraîche.  \nLa terrasse doit être <color=yellow>au-dessus du sol.</color>  \n<color=#00FFFF>Fonctionne comme une levée</color>"
deDE = "Eine mittelgroße Lodge mit einer schönen Terrasse, wo Biber ein frisches Getränk erhalten können. Die Terrasse muss <color=yellow>über dem Boden</color> sein. <color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Średni domek zarządzający uroczą tarasem, na którym bobry mogą napić się świeżego napoju. Taras musi być <color=yellow>ponad ziemią.</color> <color=#00FFFF>Działa jako wał</color>"
ptBR = "Uma cabana média gerenciando um adorável terraço onde os castores podem tomar uma bebida fresca. O terraço deve estar <color=yellow>acima do solo.</color> <color=#00FFFF>Funciona como uma Barragem</color>"
koKR = "아름다운 테라스를 관리하는 중간 규모의 로지가 있으며, 비버들이 신선한 음료를 즐길 수 있습니다.\n테라스는 <color=yellow>지면 위에 있어야 합니다.</color>\n<color=#00FFFF>제방으로 작동합니다.</color>"
csCZ = "Střední chata spravující krásnou terasu, kde bobři mohou získat čerstvý nápoj. Terasa musí být <color=yellow>nad zemí.</color> <color=#00FFFF>Funguje jako protipovodňová hráz</color>"
viVN = "Một ngôi nhà vừa phải quản lý một sân thượng đáng yêu nơi những con hải ly có thể uống nước tươi.\nSân thượng phải <color=yellow>trên mặt đất.</color>\n<color=#00FFFF>Hoạt động như một đê</color>"

["Lapantouflemagic.KitchenHouse.Description"]
raw = "A large house equipped with a mechanized kitchen to feed many beavers.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A large house equipped with a mechanized kitchen to feed many beavers. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一座配备机械化厨房的大房子，可以喂养许多海狸。  \n<color=#00FFFF>充当堤坝</color>"
zhTW = "一棟大型房屋，配備機械化廚房，可供養許多海狸。  \n<color=#00FFFF>作為壩堤運作</color>"
ruRU = "Большой дом, оборудованный механизированной кухней для кормления множества бобров. <color=#00FFFF>Работает как дамба</color>"
jaJP = "「多くのビーバーを養うために機械化されたキッチンを備えた大きな家です。  \n<color=#00FFFF>堤防として機能します</color>」"
frFR = "Une grande maison équipée d'une cuisine mécanisée pour nourrir de nombreux castors.  \n<color=#00FFFF>Fonctionne comme un levee</color>"
deDE = "Ein großes Haus, ausgestattet mit einer mechanisierten Küche, um viele Biber zu füttern. <color=#00FFFF>Funktioniert wie ein Damm</color>"
plPL = "Duży dom wyposażony w zmechanizowaną kuchnię, aby karmić wiele bobrów. <color=#00FFFF>Działa jak Tama</color>"
ptBR = "Uma grande casa equipada com uma cozinha mecanizada para alimentar muitos castores. <color=#00FFFF>Funciona como um Dique</color>"
koKR = "많은 비버에게 음식을 제공할 수 있는 기계화된 주방을 갖춘 큰 집입니다.  \n<color=#00FFFF>제방으로 작용합니다</color>"
csCZ = "Velký dům vybavený mechanizovanou kuchyní pro krmení mnoha bobrů. <color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một ngôi nhà lớn được trang bị một nhà bếp cơ giới để nuôi nhiều con rái cá.<color=#00FFFF>Hoạt động như một đê</color>"

["Lapantouflemagic.waterpumpUpgrade.Description"]
raw = "An upgrade module to be placed between two adjacent water pumps.\n<color=#00FFFF>Works as a Levee</color>\n<color=green>Placement is sensitive to camera orientation!</color>"
status = "normal"
enUS = "An upgrade module to be placed between two adjacent water pumps.  \n<color=#00FFFF>Works as a Levee</color>  \n<color=green>Placement is sensitive to camera orientation!</color>"
zhCN = "“一个升级模块，可以放置在两个相邻的水泵之间。\n<color=#00FFFF>作用如堤坝</color>\n<color=green>放置对相机方向敏感!</color>”"
zhTW = "一個升級模組，可以放置在兩個相鄰的水泵之間。  \n<color=#00FFFF>作用如同堤防</color>  \n<color=green>放置時對相機角度敏感！</color>"
ruRU = "Модуль обновления, который устанавливается между двумя соседними водяными насосами.  \n<color=#00FFFF>Работает как плотина</color>  \n<color=green>Установка чувствительна к ориентации камеры!</color>"
jaJP = "隣接する2つの水ポンプの間に配置するアップグレードモジュールです。  \n<color=#00FFFF>堤防として機能します</color>  \n<color=green>配置はカメラの向きに敏感です!</color>"
frFR = "Un module de mise à niveau à placer entre deux pompes à eau adjacentes.\n<color=#00FFFF>Fonctionne comme une digue</color>\n<color=green>Le placement est sensible à l'orientation de la caméra !</color>"
deDE = "Ein Upgrade-Modul, das zwischen zwei benachbarten Wasserpumpen platziert werden kann.  \n<color=#00FFFF>Funktioniert wie ein Deich</color>  \n<color=green>Platzierung ist kamerabedingt empfindlich!</color>"
plPL = "Moduł ulepszenia do umieszczenia pomiędzy dwoma sąsiednimi pompami wodnymi.  \n<color=#00FFFF>Działa jak Tama</color>  \n<color=green>Umiejscowienie jest wrażliwe na orientację kamery!</color>"
ptBR = "Um módulo de upgrade a ser colocado entre duas bombas d'água adjacentes.  \n<color=#00FFFF>Funciona como uma Barragem</color>  \n<color=green>A colocação é sensível à orientação da câmera!</color>"
koKR = "인접한 두 개의 물 펌프 사이에 배치할 수 있는 업그레이드 모듈입니다.  \n<color=#00FFFF>제방처럼 작동합니다</color>  \n<color=green>배치가 카메라 방향에 민감합니다!</color>"
csCZ = "Modul vylepšení, který se umisťuje mezi dvě sousední vodní pumpy.  \n<color=#00FFFF>Funguje jako nábřeží</color>  \n<color=green>Položení je citlivé na orientaci kamery!</color>"
viVN = "Một mô-đun nâng cấp được đặt giữa hai máy bơm nước liền kề.  \n<color=#00FFFF>Hoạt động như một Đê</color>  \n<color=green>Việc đặt rất nhạy cảm với hướng camera!</color>"

["Lapantouflemagic.DeepWaterPumpUpgrade.Description"]
raw = "An upgrade module to be placed between two adjacent deep water pumps.\n<color=#00FFFF>Works as a Levee</color>\n<color=green>Placement is sensitive to camera orientation!</color>"
status = "normal"
enUS = "An upgrade module to be placed between two adjacent deep water pumps.  \n<color=#00FFFF>Works as a Levee</color>  \n<color=green>Placement is sensitive to camera orientation!</color>"
zhCN = "“一个升级模块，可放置在两个相邻的深水泵之间。\n<color=#00FFFF>作为堤坝工作</color>\n<color=green>放置对相机方向敏感！</color>”"
zhTW = "一個升級模組，安置在兩個相鄰的深水泵之間。  \n<color=#00FFFF>作為堤壩運作</color>  \n<color=green>放置時對鏡頭角度敏感！</color>"
ruRU = "Модуль улучшения, который устанавливается между двумя смежными насосами глубоководной воды.  \n<color=#00FFFF>Работает как плотина</color>  \n<color=green>Установка чувствительна к ориентации камеры!</color>"
jaJP = "隣接する2つの深水ポンプの間に設置するためのアップグレードモジュールです。  \n<color=#00FFFF>堤防として働きます</color>  \n<color=green>設置はカメラの向きに敏感です！</color>"
frFR = "Un module de mise à niveau à placer entre deux pompes à eau profonde adjacentes.  \n<color=#00FFFF>Fonctionne comme une digue</color>  \n<color=green>Le placement est sensible à l'orientation de la caméra !</color>"
deDE = "Ein Upgrade-Modul, das zwischen zwei benachbarten Tiefwasserpumpen platziert werden kann.\n<color=#00FFFF>Funktioniert wie ein Deich</color>\n<color=green>Platzierung ist empfindlich gegenüber der Kamerainteraktion!</color>"
plPL = "Moduł ulepszenia do umieszczenia między dwoma sąsiednimi pompami głębinowymi.  \n<color=#00FFFF>Działa jak Wał</color>  \n<color=green>Umiejscowienie jest wrażliwe na orientację kamery!</color>"
ptBR = "Um módulo de upgrade a ser colocado entre duas bombas de água profunda adjacentes.  \n<color=#00FFFF>Funciona como uma Muralha</color>  \n<color=green>A colocação é sensível à orientação da câmera!</color>"
koKR = "두 개의 인접한 깊은 물 펌프 사이에 설치할 수 있는 업그레이드 모듈입니다.\n<color=#00FFFF>제방처럼 작동합니다</color>\n<color=green>설치는 카메라 방향에 민감합니다!</color>"
csCZ = "Modul pro vylepšení, který se umístí mezi dvě sousední hluboké vodní čerpadla.  \n<color=#00FFFF>Funguje jako hráz</color>  \n<color=green>Umístění je citlivé na orientaci kamery!</color>"
viVN = "Một mô-đun nâng cấp được đặt giữa hai bơm nước sâu cạnh nhau.  \n<color=#00FFFF>Hoạt động như một con đê</color>  \n<color=green>Vị trí nhạy cảm với hướng camera!</color>"

