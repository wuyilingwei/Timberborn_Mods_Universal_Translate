viVN = "\"Có đèn bổ sung để ngăn chặn những con quái vật.\""

["Lapantouflemagic.primitivedamUtility.Description"]
raw = "A better variant of the cross-shaped dam that allows beaver passage in one direction, and contains a power shaft in the other.\nCan be placed on a <color=green> pit-and-ladder lodge</color>."
status = "normal"
enUS = "A better variant of the cross-shaped dam that allows beaver passage in one direction and contains a power shaft in the other. Can be placed on a <color=green>pit-and-ladder lodge</color>."
zhCN = "一种更好的十字形水坝变体，允许海狸在一个方向通过，而在另一个方向则包含一个动力轴。\n可以放置在<color=green>坑梯小屋</color>上。"
zhTW = "一種改良版的十字形水壩，允許海狸單方向通行，並在另一側包含一個動力軸。\n可以放置在<color=green>貫通梯廬舍</color>上。"
ruRU = "Улучшенный вариант дамбы в форме креста, позволяющий бобрам проходить в одном направлении, и содержащий вал мощности в другом.\nМожно разместить на <color=green>логове с ямой и лестницей</color>."
jaJP = "クロス型のダムのより良いバリエーションで、一方向のビーバー通過を可能にし、もう一方向には動力シャフトを含んでいます。<color=green>ピットとはしごのロッジ</color>の上に設置できます。"
frFR = "Une meilleure variante du barrage en forme de croix qui permet le passage des castors dans une direction, et contient un arbre de transmission de l'autre.\nPeut être placé sur un <color=green> abri de fosse et d’échelle</color>."
deDE = "Eine verbesserte Variante des kreuzförmigen Damms, die den Biberpass in eine Richtung ermöglicht und in die andere Richtung eine Antriebswelle enthält. Kann auf einem <color=green> Graben-und-Leiter-Damm</color> platziert werden."
plPL = "Lepsza wersja tamy w kształcie krzyża, która pozwala bobrom na przejście w jednym kierunku i zawiera wał napędowy w drugim.\nMożna ją umieścić w <color=green> chatce na drabinie i dołku</color>."
ptBR = "Uma variante melhor da represa em formato de cruz que permite a passagem dos castores em uma direção e contém um eixo de energia na outra. Pode ser colocada em um <color=green> abrigo de poço e escada</color>."
koKR = "비버가 한 방향으로 통과할 수 있도록 허용하고 반대 방향에는 전력 축이 포함된 십자형 댐의 더 나은 변형입니다. <color=green>구덩이와 사다리 오두막</color> 위에 배치할 수 있습니다."
csCZ = "lepší varianta křížového hráze, která umožňuje bobrům průchod jedním směrem a obsahuje hřídel v druhém.\nMůže být umístěna na <color=green>srubu s jámou a žebříkem</color>."
viVN = "Một biến thể tốt hơn của đập hình chữ thập cho phép loài nhím di chuyển theo một hướng, và chứa một trục công suất ở hướng khác. Có thể được đặt trên một <color=green> nhà ở pit-and-ladder </color>."

