["Lapantouflemagic.Mediummine.Description"]
raw = "A larger and deeper mine to exploit richer deposits, also gives access to rarer elements.\nComes with access stairs and barriers to prevent silly little kits from falling and getting hurt.\n<color=green>Needs to be placed in a 4-deep hole!\nMine and fences must be on solid ground!\nPlace stairs on dirt spots and complete the access ramp</color>"
status = "normal"
enUS = "A larger and deeper mine to exploit richer deposits, also gives access to rarer elements. Comes with access stairs and barriers to prevent silly little kits from falling and getting hurt. <color=green>Needs to be placed in a 4-deep hole! Mine and fences must be on solid ground! Place stairs on dirt spots and complete the access ramp</color>"
zhCN = "一个更大更深的矿井，用于开采更丰富的矿藏，同时提供稀有元素的获取途径。\n配有通道楼梯和障碍物，以防止小小的孩子们跌落受伤。\n<color=green>必须放置在4深的洞中！\n矿井和围栏必须建立在坚固的地面上！\n将楼梯放置在泥土上，并完成通道坡道</color>"
zhTW = "一個更大更深的礦泉用以開採更豐富的礦床，並且可接觸到更稀有的元素。\n附帶進入階梯和圍欄以防止小家伙們跌倒受傷。\n<color=green>必須放置在4格深的洞中！\n礦井和圍欄必須建立在堅固的地面上！\n在泥土上放置階梯並完成進入坡道</color>"
ruRU = "Большая и глубокая шахта для добычи более богатых месторождений, а также предоставляет доступ к более редким элементам. \nС ней идут лестницы и барьеры, чтобы предотвратить падение и травмы несмышленышей.\n<color=green>Должна быть размещена в отверстии глубиной 4 блока! \nШахта и заборы должны находиться на твердой земле! \nРазместите лестницы на земельных участках и завершите подъёмный пандус</color>"
jaJP = "「より豊富な鉱床を利用するための、より大きく、より深い鉱山です。また、より希少な元素へのアクセスも可能です。\n愚かな小さな子供たちが落ちてけがをしないように、アクセス用の階段とバリアが付いています。\n<color=green>4マス深い穴に設置する必要があります！\n鉱山とフェンスは固い地面の上に置かなければなりません！\n土の場所に階段を設置し、アクセス用のスロープを完成させてください。</color>」"
frFR = "Une mine plus grande et plus profonde pour exploiter des dépôts plus riches, donnant également accès à des éléments plus rares. \nLivrée avec des escaliers d'accès et des barrières pour empêcher les petits kits de tomber et de se blesser. \n<color=green>Doit être placée dans un trou de 4 profondeurs ! \nLa mine et les clôtures doivent être sur un sol solide ! \nPlacez les escaliers sur des spots en terre et complétez la rampe d'accès</color>"
deDE = "Ein größeres und tieferes Bergwerk, um reichhaltigere Ablagerungen abzubauen, bietet auch Zugang zu selteneren Elementen. \nKommt mit Zugangstreppen und Barrieren, um zu verhindern, dass kleine Füchse fallen und sich verletzen. \n<color=green> Muss in ein 4 tiefes Loch platziert werden! \nBergwerk und Zäune müssen auf festem Grund stehen! \nPlatzieren Sie Treppen auf Erde und vervollständigen Sie die Zugangsrampe</color>"
plPL = "Większa i głębsza kopalnia do eksploatacji bogatszych złóż, zapewnia również dostęp do rzadszych elementów.\nZawiera schody dostępu i bariery, by zapobiec upadkom i zranieniom małych kitów.\n<color=green>Musisz ją umieścić w 4-warstwowej dziurze!\nKopalnia i ogrodzenia muszą stać na solidnym podłożu!\nUmieść schody na ziemi i zakończ rampę dostępu</color>"
ptBR = "Uma mina maior e mais profunda para explorar depósitos mais ricos, também dá acesso a elementos mais raros. Vem com escadas de acesso e barreiras para evitar que pequenos kits toquem o chão e se machuquem. <color=green>Precisa ser colocada em um buraco de 4 de profundidade! Mina e cercas devem estar em terreno firme! Coloque escadas em pontos de terra e complete a rampa de acesso</color>"
koKR = "더 크고 깊은 광산으로 더 풍부한 자원을 채굴할 수 있으며, 드문 원소에도 접근할 수 있습니다.  \n어린 친구들이 떨어져 다치는 것을 방지하기 위한 접근 계단과 장벽이 포함되어 있습니다.  \n<color=green>4 블록 깊이의 구덩이에 배치해야 합니다!  \n광산과 울타리는 단단한 땅 위에 있어야 합니다!  \n흙 위에 계단을 놓고 접근 경사로를 완성하세요</color>"
csCZ = "Větší a hlubší důl k těžbě bohatších depositů, také poskytuje přístup k vzácnějším prvkům.  \nPřichází s přístupovými schody a zábranami, aby se zabránilo pádu malých kitů a jejich zranění.  \n<color=green>Je potřeba ho umístit do 4 hluboké díry!  \nDůl a ploty musí být na pevném povrchu!  \nUmístěte schody na hlinitá místa a dokončete přístupový rampu</color>"
viVN = "Một mỏ lớn hơn và sâu hơn để khai thác các mỏ giàu có hơn, đồng thời cũng cho phép truy cập vào các nguyên tố hiếm hơn.\nKèm theo cầu thang truy cập và hàng rào để ngăn chặn những chú gấu con ngốc nghếch rơi xuống và bị thương.\n<color=green>Cần được đặt trong một cái hố sâu 4 mét!\nMỏ và hàng rào phải trên mặt đất vững chắc!\nĐặt cầu thang ở những chỗ đất trống và hoàn thành ramp truy cập</color>"

["Lapantouflemagic.Mediummine.FlavorDescription"]
raw = "\"I don't believe in ghosts and monsters, what even are grues supposed to be anyway?\"\n -Miner Zork, last words"
status = "normal"
enUS = "\"I don't believe in ghosts and monsters, what even are grues supposed to be anyway?\"  \n-Miner Zork, last words"
zhCN = "“我不相信鬼魂和怪物，究竟什么是可怕的东西呢？”  \n-矿工佐克，临终遗言"
zhTW = "「我不相信鬼魂和怪物，究竟什麼是可怕的生物呢？」  \n- 矿工佐克，临终遗言"
ruRU = "\"Я не верю в призраков и монстров, что вообще должны представлять собой грю?\"  \n- Шахтер Зорк, последние слова"
jaJP = "「幽霊やモンスターは信じない。グルーとは一体何なのか？」 - 採掘者ゾーク、最後の言葉"
frFR = "\"Je ne crois pas aux fantômes et aux monstres, que sont censés être les grues de toute façon ?\" - Mineur Zork, dernières paroles"
deDE = "\"Ich glaube nicht an Geister und Monster, was sollen Grues überhaupt sein?\"\n -Miner Zork, letzte Worte"
plPL = "„Nie wierzę w duchy i potwory, czym w ogóle mają być te strachy?”  \n- Górnik Zork, ostatnie słowa"
ptBR = "\"Eu não acredito em fantasmas e monstros, o que são os 'grues' afinal?\"\n -Miner Zork, últimas palavras"
koKR = "\"나는 유령과 괴물은 믿지 않아, 도대체 괴물이란 뭐지?\" - 광부 조크, 마지막 말"
csCZ = "\"V duchy a monstra nevěřím, co vlastně jsou ti hrůzy?\" - Minér Zork, poslední slova"
viVN = "\"Tôi không tin vào ma quỷ và quái vật, rốt cuộc grues là cái gì vậy nhỉ?\" - Thợ mỏ Zork, những lời cuối cùng"

