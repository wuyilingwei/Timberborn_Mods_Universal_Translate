["Lapantouflemagic.NewLido.Description"]
raw = "A place to have fun in water.\nIf the pond does not already contain water, a <color=green>fluid dump</color> can be installed"
status = "normal"
enUS = "A place to have fun in water. If the pond does not already contain water, a <color=green>fluid dump</color> can be installed."
zhCN = "一个在水中玩乐的地方。如果水塘尚未有水，可以安装一个<color=green>液体排放装置</color>"
zhTW = "一個可以在水中玩樂的地方。  \n如果池塘尚未有水，可以安裝一個<color=green>液體排放口</color>。"
ruRU = "Место, где можно повеселиться на воде. Если в пруду еще нет воды, можно установить <color=green>склад жидкости</color>."
jaJP = "「水遊びを楽しむ場所です。 pondに水がまだない場合は、<color=green>液体ダンプ</color>を設置できます。」"
frFR = "Un endroit pour s'amuser dans l'eau. Si l'étang ne contient pas déjà d'eau, un <color=green>dépot de liquide</color> peut être installé."
deDE = "Ein Ort, um Spaß im Wasser zu haben. Wenn der Teich noch kein Wasser enthält, kann eine <color=green>Flüssigkeitsablagerung</color> installiert werden."
plPL = "Miejsce do zabawy w wodzie.  \nJeśli staw nie zawiera już wody, można zainstalować <color=green>wyładunek cieczy</color>"
ptBR = "Um lugar para se divertir na água. Se o lago ainda não contiver água, um <color=green>despejo de fluido</color> pode ser instalado."
koKR = "물이 있는 곳에서 즐길 수 있는 장소입니다. 연못에 이미 물이 없는 경우, <color=green>액체 배수구</color>를 설치할 수 있습니다."
csCZ = "Místo pro zábavu ve vodě. Pokud rybník již neobsahuje vodu, může být nainstalován <color=green>odpadní výlev</color>."
viVN = "Một nơi để vui chơi trong nước.  \nNếu ao không có nước, có thể lắp đặt một <color=green>bể chứa chất lỏng</color>"

["Lapantouflemagic.WaterDump.Description"]
raw = "Dumps water.\nMust be built inside a <color=green>Lido</color>.\n<color=#FF6EC7>Can function without workers.</color>"
status = "normal"
