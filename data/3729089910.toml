csCZ = "Mechanizované čerpadlo, které může využívat ložiska různých plynů identifikovaných týmy prozkoumávání."
viVN = "Một máy bơm cơ giới có thể khai thác các túi khí đa dạng được phát hiện bởi các đội khám phá."

