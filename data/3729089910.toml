["Lapantouflemagic.Aqueduct_Deadend.Description"]
raw = "A heavy duty bridge to carry an entire river.\nClosed on three sides to direct water flow from above into the desired direction. Or to make a water maze if you fancy that.\nThe metal rings need to snap on <color=green>Giant Pillars</color>."
status = "normal"
enUS = "A heavy-duty bridge designed to carry an entire river. Closed on three sides to direct water flow from above in the desired direction. Or to create a water maze if that's what you prefer. The metal rings must snap onto <color=green>Giant Pillars</color>."
zhCN = "一座重型桥梁，用于承载整条河流。\n三面封闭，以将上方的水流引导到所需方向。或者如果你喜欢的话，可以做一个水迷宫。\n金属环需要卡在<color=green>巨型柱子</color>上。"
zhTW = "一座重型橋樑，可以承載整條河流。三個面封閉，以將上方的水流引導到所需的方向。或者如果你喜歡，也可以做一個水迷宮。金屬環需要固定在<color=green>巨型支柱</color>上。"
ruRU = "Мост повышенной жесткости, чтобы пропускать целую реку. Закрыт с трех сторон, чтобы направлять поток воды сверху в нужном направлении. Или чтобы создать водяной лабиринт, если вам это нравится. Металлические кольца должны защелкнуться на <color=green>Огромных Столбах</color>."
jaJP = "全ての川を運ぶための頑丈な橋です。\n上からの水流を希望の方向に導くために三方が閉じています。また、そうしたい場合は水の迷路を作ることもできます。\n金属のリングは<color=green>巨大な柱</color>に取り付ける必要があります。"
frFR = "Un pont robuste pour transporter une rivière entière. \nFermé sur trois côtés pour diriger l'écoulement de l'eau d'en haut dans la direction souhaitée. Ou pour créer un labyrinthe aquatique si cela vous tente. \nLes anneaux en métal doivent se fixer sur les <color=green>Piliers Géants</color>."
deDE = "Eine robuste Brücke, um einen gesamten Fluss zu transportieren. Geschlossen an drei Seiten, um den Wasserfluss von oben in die gewünschte Richtung zu lenken. Oder um ein Wass Labyrinth zu erstellen, wenn dir danach ist. Die Metallringe müssen an <color=green>Riesenpfeilern</color> einrasten."
plPL = "Most o dużym obciążeniu, aby przenosić całą rzekę. Zamknięty z trzech stron, aby skierować przepływ wody z góry w pożądanym kierunku. Lub aby stworzyć labirynt wodny, jeśli lubisz takie wyzwania. Metalowe pierścienie muszą się zacisnąć na <color=green>Ogromnych Filarach</color>."
ptBR = "Uma ponte de alta resistência para transportar um rio inteiro. Fechada em três lados para direcionar o fluxo de água de cima na direção desejada. Ou para fazer um labirinto de água, se você gostar disso. Os anéis de metal precisam se encaixar em <color=green>Pilares Gigantes</color>."
koKR = "전체 강을 가로지르는 중량급 다리입니다. 위에서 아래로 물의 흐름을 원하는 방향으로 유도하기 위해 세 면이 닫혀 있습니다. 또는 원하신다면 물 미로를 만들 수도 있습니다. 금속 링은 <color=green>거대한 기둥</color>에 고정되어야 합니다."
csCZ = "Most pro těžké zatížení, který unese celou řeku. Zavřený ze tří stran, aby nasměroval tok vody shora do požadovaného směru. Nebo vytvořte vodní bludiště, pokud máte zájem. Kovové kroužky se musí zacvaknout na <color=green>Obří sloupy</color>."
viVN = "Cây cầu siêu nặng để dẫn nước từ cả một con sông.\nĐược đóng kín ở ba bên để hướng dòng chảy từ trên xuống theo hướng mong muốn. Hoặc để tạo một mê cung nước nếu bạn thích như vậy.\nCác vòng kim loại cần được gắn vào <color=green>Cột Khổng Lồ</color>."

