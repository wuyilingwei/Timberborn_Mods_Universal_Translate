["Lapantouflemagic.Cookingtent.Description"]
raw = "A tiny outdoor kitchen to prepare simple foods.\n<color=#FF6EC7>Can function without workers.</color>"
status = "normal"
enUS = "A tiny outdoor kitchen to prepare simple foods. <color=#FF6EC7>Can function without workers.</color>"
zhCN = "一个小型户外厨房，用于准备简单食品。  \n<color=#FF6EC7>可以在没有工人的情况下运作。</color>"
zhTW = "一個小型戶外廚房，用於準備簡單的食物。  \n<color=#FF6EC7>可以在沒有工人的情況下運作。</color>"
ruRU = "Маленькая уличная кухня для приготовления простых блюд. <color=#FF6EC7>Может работать без работников.</color>"
jaJP = "小さな屋外キッチンで、シンプルな料理を準備できます。  \n<color=#FF6EC7>労働者なしで機能します。</color>"
frFR = "Une petite cuisine extérieure pour préparer des aliments simples.  \n<color=#FF6EC7>Peut fonctionner sans ouvriers.</color>"
deDE = "Eine kleine Außenküche zur Zubereitung einfacher Speisen. <color=#FF6EC7>Kann ohne Arbeiter funktionieren.</color>"
plPL = "Mała kuchnia na świeżym powietrzu do przygotowywania prostych potraw. <color=#FF6EC7>Może działać bez pracowników.</color>"
ptBR = "Uma pequena cozinha ao ar livre para preparar alimentos simples. <color=#FF6EC7>Pode funcionar sem trabalhadores.</color>"
koKR = "작은 야외 주방으로 간단한 음식을 준비합니다.  \n<color=#FF6EC7>근로자 없이도 기능할 수 있습니다.</color>"
