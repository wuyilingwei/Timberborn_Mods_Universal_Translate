["Luc.Architect.Description"]
raw = "A fancy building to help architects show they're better than us. Also used to design structurally sound buildings. \n<color=green>Works as a big staircase</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A fancy building to help architects show they're better than us. Also used to design structurally sound buildings.  \n<color=green>Works as a big staircase</color>  \n<color=#00FFFF>Works as a Levee</color>"
zhCN = "一座豪华建筑，旨在帮助建筑师展示他们比我们更优秀。也用于设计结构合理的建筑。 \n<color=green>作为一个大型楼梯使用</color>\n<color=#00FFFF>作为一个堤坝使用</color>"
zhTW = "一座華麗的建築，幫助建築師展示他們優於我們的能力。也用於設計結構安全的建築。  \n<color=green>作為一個大型樓梯使用</color>  \n<color=#00FFFF>作為堤壩使用</color>"
ruRU = "Роскошное здание, которое помогает архитекторам показать, что они лучше нас. Также используется для проектирования конструктивно прочных зданий.  \n<color=green>Работает как большая лестница</color>  \n<color=#00FFFF>Работает как плотина</color>"
jaJP = "建築家が私たちより優れていることを示すための華やかな建物。また、構造的に安全な建物を設計するためにも使用される。\n<color=green>大きな階段として機能します</color>\n<color=#00FFFF>堤防として機能します</color>"
frFR = "Un bâtiment élégant pour aider les architectes à montrer qu'ils sont meilleurs que nous. Utilisé aussi pour concevoir des bâtiments structurellement solides.  \n<color=green>Fonctionne comme un grand escalier</color>  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Ein schickes Gebäude, das Architekten hilft zu zeigen, dass sie besser sind als wir. Wird auch verwendet, um stabil gebaute Gebäude zu entwerfen. \n<color=green>Funktioniert als große Treppe</color>\n<color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Wytworny budynek, który pomaga architektom pokazać, że są lepsi od nas. Używany również do projektowania budynków o solidnej konstrukcji.  \n<color=green>Działa jak wielkie schody</color>  \n<color=#00FFFF>Działa jak wał</color>"
ptBR = "Um edifício chique para ajudar arquitetos a mostrar que são melhores do que nós. Também usado para projetar edifícios estruturalmente sólidos.  \n<color=green>Funciona como uma grande escada</color>  \n<color=#00FFFF>Funciona como um Dique</color>"
koKR = "건축가들이 우리보다 우월함을 보여줄 수 있도록 돕는 화려한 건물. 또한 구조적으로 견고한 건물을 설계하는 데 사용됩니다. \n<color=green>큰 계단으로 기능합니다</color>\n<color=#00FFFF>제방으로 기능합니다</color>"
csCZ = "Elegantní budova, která pomáhá architektům ukázat, že jsou lepší než my. Také slouží k navrhování strukturálně pevných budov. \n<color=green>Funguje jako velké schodiště</color>\n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một tòa nhà sang trọng giúp các kiến trúc sư chứng tỏ rằng họ giỏi hơn chúng ta. Cũng được sử dụng để thiết kế các tòa nhà có cấu trúc vững chắc.  \n<color=green>Có tác dụng như một cầu thang lớn</color>  \n<color=#00FFFF>Có tác dụng như một đê</color>"

