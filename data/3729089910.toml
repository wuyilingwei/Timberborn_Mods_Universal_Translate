["Lapantouflemagic.HoomanMedicalFacility.Description"]
raw = "Reactivates a hooman medical facility of incomprehensible complexity.\n<color=#FF6EC7>How could a species so advanced go exctinctxa0? This device is capable of improving our bodies to make us stronger, faster, healthier, and can cure pretty much anythingxa0!</color>"
status = "normal"
enUS = "Reactivates a human medical facility of incomprehensible complexity.  \n<color=#FF6EC7>How could a species so advanced go extinct? This device is capable of improving our bodies to make us stronger, faster, healthier, and can cure pretty much anything!</color>"
zhCN = "“重新激活一个难以理解复杂性的人工医疗设施。<color=#FF6EC7>一个如此先进的物种怎么会灭绝呢？这个装置能够改善我们的身体，让我们更强大、更快、更健康，几乎可以治愈任何疾病！</color>”"
zhTW = "重新啟動一個無法理解的複雜人類醫療設施。<color=#FF6EC7>一個如此先進的物種怎麼會滅絕呢？這個設備能改善我們的身體，使我們更強壯、更快、更健康，幾乎可以治癒任何疾病！</color>"
ruRU = "Активирует человеческое медицинское учреждение невообразимой сложности.  \n<color=#FF6EC7>Как могла такая продвинутая раса вымереть? Это устройство способно улучшать наши тела, делая нас сильнее, быстрее, здоровее и может излечить практически все!</color>"
jaJP = "「理解できない複雑さを持つ人間医療施設を再起動します。  \n<color=#FF6EC7>どうしてこんなに進んだ種が絶滅することができたのか？この装置は私たちの体を改善し、より強く、より速く、より健康的にし、ほぼすべての病気を治すことができますxa0！</color>」"
frFR = "Réactive une installation médicale hooman d'une complexité incompréhensible. \n<color=#FF6EC7>Comment une espèce si avancée a-t-elle pu s'éteindre ? Cet appareil est capable d'améliorer nos corps pour nous rendre plus forts, plus rapides, plus en santé, et peut guérir presque tout !</color>"
deDE = "Reaktiviert eine hooman medizinische Einrichtung von unbegreiflicher Komplexität. <color=#FF6EC7>Wie konnte eine so fortschrittliche Spezies aussterben? Dieses Gerät ist in der Lage, unseren Körper zu verbessern, um uns stärker, schneller, gesünder zu machen, und kann so gut wie alles heilen!</color>"
plPL = "Reaktywuje hoomanską placówkę medyczną o niezrozumiałej złożoności. <color=#FF6EC7>Jak mogła tak zaawansowana rasa wymrzeć? To urządzenie ma zdolność poprawiania naszych ciał, czyniąc nas silniejszymi, szybszymi, zdrowszymi i może wyleczyć praktycznie wszystko!</color>"
ptBR = "Reativa uma instalação médica hooman de complexidade incompreensível. <color=#FF6EC7>Como uma espécie tão avançada pode ter sido extinta? Este dispositivo é capaz de melhorar nossos corpos para nos tornar mais fortes, rápidos, saudáveis e pode curar praticamente qualquer coisa!</color>"
koKR = "비행기 없는 의학 시설을 재활성화합니다. \n<color=#FF6EC7>어떻게 이렇게 고도화된 종이 멸종할 수 있었을까요? 이 장치는 우리의 몸을 개선하여 더 강하고, 더 빠르고, 더 건강하게 만들어주며 거의 모든 것을 치료할 수 있습니다!</color>"
csCZ = "Reaktivuje hooman zdravotnické zařízení nesrozumitelné složitosti. <color=#FF6EC7>Jak mohla tak pokročilá species vymřít? Tento přístroj je schopen zlepšit naše těla, aby byla silnější, rychlejší, zdravější, a dokáže vyléčit téměř cokoliv!</color>"
viVN = "Điều chỉnh lại một cơ sở y tế của loài người có độ phức tạp không thể hiểu nổi.\n<color=#FF6EC7>Làm thế nào một loài tiên tiến như vậy lại có thể bị tuyệt chủng? Thiết bị này có khả năng cải thiện cơ thể của chúng ta để làm cho chúng ta mạnh mẽ hơn, nhanh hơn, khỏe mạnh hơn, và có thể chữa trị hầu như mọi thứ!</color>"

