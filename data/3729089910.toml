["Lapantouflemagic.NuclearReactor3.Description"]
raw = "A high-power nuclear reactor powered by nuclear fuel.\nUses the abyss to tap directly into the aquifer for coolant.\n<color=green>Is built from the inside like a wonder</color>.\n<color=#00FFFF>Clean water is generated as a result</color>\nRequires the <color=green>Abyssal Nuclear Power Plant Water Outflow</color> to allow power to be connected."
status = "normal"
enUS = "A high-power nuclear reactor powered by nuclear fuel. Uses the abyss to tap directly into the aquifer for coolant. <color=green>Is built from the inside like a wonder</color>. <color=#00FFFF>Clean water is generated as a result</color> Requires the <color=green>Abyssal Nuclear Power Plant Water Outflow</color> to allow power to be connected."
zhCN = "一个高功率的核反应堆，使用核燃料供能。\n利用深渊直接接入含水层进行冷却。\n<color=green>内部结构如同奇迹般建造</color>。\n<color=#00FFFF>生成洁净水作为副产品</color>\n需要<color=green>深渊核电厂水排放口</color>以连接电源。"
zhTW = "一個高功率的核反應堆，使用核燃料供能。\n利用深淵直接從含水層抽取冷卻劑。\n<color=green>從內部建造，如同奇蹟般</color>。\n<color=#00FFFF>因此產生乾淨的水</color>\n需要<color=green>深淵核電廠水排放口</color>來連接電力。"
ruRU = "Высокощелевой ядерный реактор на ядерном топливе.\nИспользует бездну для прямого доступа к водоносному слою для охлаждающей жидкости.\n<color=green>Сооружен изнутри как чудо</color>.\n<color=#00FFFF>В результате генерируется чистая вода</color>\nТребует <color=green>Выхода воды из Абиссальной Атомной Электростанции</color> для подключения питания."
jaJP = "「高出力の核反応炉で、核燃料で動作します。\n冷却のために帯水層に直接接続するために深淵を利用します。\n<color=green>驚異のように内部から建設されます</color>。\n<color=#00FFFF>その結果、清水が生成されます</color>\n電力を接続するためには、<color=green>深淵核発電所の水排出口</color>が必要です。」"
frFR = "Un réacteur nucléaire haute puissance alimenté par du combustible nucléaire.  \nUtilise l'abîme pour puiser directement dans l'aquifère pour le liquide de refroidissement.  \n<color=green>Est construit de l'intérieur comme une merveille</color>.  \n<color=#00FFFF>De l'eau propre est générée en conséquence</color>  \nNécessite le <color=green>Déversement d'Eau de la Centrale Nucléaire Abyssale</color> pour permettre la connexion de l'énergie."
deDE = "Ein leistungsstarker Kernreaktor, der mit nuklearem Brennstoff betrieben wird.\nNutzen Sie den Abgrund, um direkt auf das Grundwasser zur Kühlung zuzugreifen.\n<color=green>Wird von innen wie ein Wunder gebaut</color>.\n<color=#00FFFF>Sauberes Wasser entsteht dabei</color>\nBenötigt den <color=green>Abyssalen Kernkraftwerk-Wasserabfluss</color>, um eine Verbindung zur Stromversorgung herzustellen."
plPL = "Wysokowydajny reaktor jądrowy zasilany paliwem jądrowym.  \nWykorzystuje otchłań do bezpośredniego podłączenia do wód gruntowych w celu chłodzenia.  \n<color=green>Budowany od wewnątrz jak cud</color>.  \n<color=#00FFFF>W wyniku tego powstaje czysta woda</color>  \nWymaga <color=green>odpływu wody z Abyssalnej Elektrowni Jądrowej</color>, aby umożliwić podłączenie zasilania."
ptBR = "Um reator nuclear de alta potência alimentado por combustível nuclear.  \nUsa o abismo para acessar diretamente o aquífero para o refrigerante.  \n<color=green>É construído de dentro para fora como uma maravilha</color>.  \n<color=#00FFFF>Água limpa é gerada como resultado</color>  \nRequer a <color=green>Saída de Água da Usina Nuclear Abissal</color> para permitir a conexão de energia."
koKR = "고출력 핵 발전소로 핵 연료로 작동합니다.  \n심연을 이용하여 냉각수로 사용할 지하수층에 직접 연결합니다.  \n<color=green>경이로움처럼 내부에서 건설됩니다</color>.  \n<color=#00FFFF>결과적으로 깨끗한 물이 생성됩니다</color>.  \n전력을 연결하기 위해 <color=green>심연 핵 발전소의 물 배출구</color>가 필요합니다."
csCZ = "Jaderný reaktor vysokého výkonu napájený jaderným palivem.  \nVyužívá propast k přímému napojení na akvifer pro chladivo.  \n<color=green>Je postaven zevnitř jako zázrak</color>.  \n<color=#00FFFF>Čistá voda je generována jako výsledek</color>  \nVyžaduje <color=green>odtok vody z Abyssal jaderné elektrárny</color> pro umožnění připojení napájení."
viVN = "Một lò phản ứng hạt nhân công suất cao do nhiên liệu hạt nhân cung cấp năng lượng.\nSử dụng vực thẳm để khai thác trực tiếp từ tầng nước ngầm cho chất làm mát.\n<color=green>Xây dựng từ bên trong như một kỳ quan</color>.\n<color=#00FFFF>Nước sạch được tạo ra như là kết quả</color>\nYêu cầu <color=green>Cổng thoát nước nhà máy điện hạt nhân vực thẳm</color> để cho phép kết nối nguồn điện."

