["Lapantouflemagic.NEWLumberjackHouse.Description"]
raw = "A half-barn, half-lodge building used as a workplace for a group of lumberjacks. Contains a few tools to help them do their job efficiently.\nHas a <color=#FF6EC7>triangle roof</color>, <color=#FF6EC7>Can support upgrades</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A half-barn, half-lodge building used as a workplace for a group of lumberjacks. Contains a few tools to help them do their job efficiently. Has a <color=#FF6EC7>triangle roof</color>, <color=#FF6EC7>can support upgrades</color> <color=#00FFFF>works as a levee</color>"
zhCN = "一个半仓库半小木屋的建筑，作为一群伐木工的工作场所。包含一些工具，以帮助他们高效地完成工作。\n具有<color=#FF6EC7>三角屋顶</color>，<color=#FF6EC7>可以支持升级</color>\n<color=#00FFFF>作为堤坝使用</color>"
zhTW = "一座半穀倉、半小屋的建築，被用作一組樵夫的工作場所。內部包含幾個工具，以幫助他們高效地完成工作。\n擁有一個<color=#FF6EC7>三角屋頂</color>，<color=#FF6EC7>可以支援升級</color>\n<color=#00FFFF>作為堤壩使用</color>"
ruRU = "Полу-Ambar, полу-домик, используемый как рабочее место для группы лесорубов. Содержит несколько инструментов, которые помогают им эффективно выполнять свою работу. Имеет <color=#FF6EC7>треугольную крышу</color>, <color=#FF6EC7>может поддерживать улучшения</color> <color=#00FFFF>работает как дамба</color>"
jaJP = "「半分は納屋、半分はロッジの建物で、木こりのグループの作業場として使用されます。彼らが仕事を効率的に行うための道具がいくつか含まれています。\n<color=#FF6EC7>三角屋根</color>を持ち、<color=#FF6EC7>アップグレードをサポート可能</color>です。\n<color=#00FFFF>堤防として機能します</color>。」"
frFR = "Un bâtiment à moitié grange, à moitié pavillon utilisé comme espace de travail pour un groupe de bûcherons. Contient quelques outils pour les aider à effectuer leur travail efficacement.\nA un <color=#FF6EC7>toit en triangle</color>, <color=#FF6EC7>peut supporter des améliorations</color>\n<color=#00FFFF>Fonctionne comme un digue</color>"
deDE = "Ein halb Scheune, halb Lodge-Gebäude, das als Arbeitsplatz für eine Gruppe von Holzfällern genutzt wird. Enthält einige Werkzeuge, um ihnen zu helfen, ihre Arbeit effizient zu erledigen. Hat ein <color=#FF6EC7>Dach in Form eines Triangels</color>, <color=#FF6EC7>Kann Upgrades unterstützen</color> <color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Pół-stodoła, pół-chatka wykorzystywana jako miejsce pracy dla grupy drwali. Zawiera kilka narzędzi, które pomagają im wykonywać swoją pracę efektywnie. Ma <color=#FF6EC7>trójkątny dach</color>, <color=#FF6EC7>może wspierać ulepszenia</color> <color=#00FFFF>działa jako wał</color>"
ptBR = "Um edifício que é metade celeiro, metade pousada, utilizado como local de trabalho para um grupo de lenhadores. Contém algumas ferramentas para ajudá-los a realizar seu trabalho de forma eficiente.\nPossui um <color=#FF6EC7>telhado triangular</color>, <color=#FF6EC7>pode suportar melhorias</color>\n<color=#00FFFF>Funciona como um Dique</color>"
koKR = "반 농장, 반 숙소 건물로, 벌목꾼 그룹의 작업장으로 사용됩니다. 그들이 효율적으로 작업할 수 있도록 도와주는 몇 가지 도구가 포함되어 있습니다.\n<color=#FF6EC7>삼각형 지붕</color>, <color=#FF6EC7>업그레이드를 지원할 수 있음</color>\n<color=#00FFFF>제방으로 작동함</color>"
csCZ = "Polovina stodoly, polovina chaty, budova sloužící jako pracovní místo pro skupinu dřevorubců. Obsahuje několik nástrojů, které jim pomáhají vykonávat svou práci efektivně. Má <color=#FF6EC7>trojúhelníkovou střechu</color>, <color=#FF6EC7>může podporovat vylepšení</color> <color=#00FFFF>funguje jako hráz</color>"
viVN = "Một tòa nhà nửa nhà kho, nửa lều được sử dụng làm nơi làm việc cho một nhóm thợ cây. Chứa một vài công cụ để giúp họ làm việc hiệu quả.\nCó một <color=#FF6EC7>mái hình tam giác</color>, <color=#FF6EC7>Có thể hỗ trợ nâng cấp</color>\n<color=#00FFFF>Hoạt động như một Đê</color>"

["Lapantouflemagic.NEWLumberjackHouse.FlavorDescription"]
raw = "\"My daddy's the best! He built our entire house!\"\n -Typical kit boasting"
status = "normal"
enUS = "\"My daddy's the best! He built our entire house!\" - Typical kit boasting"
zhCN = "“我爸爸是最棒的！他建造了我们整个家！”  \n-典型的小孩自夸"
zhTW = "「我爸爸是最棒的！他建造了我們整棟房子！」  \n-典型的自誇"
ruRU = "\"Мой папа лучший! Он построил наш дом целиком!\"  \n- Типичное хвастовство"
jaJP = "「私のパパが一番よ！彼は私たちの家を全部建てたの！」  \n-典型的な自慢"
frFR = "Mon papa est le meilleur ! Il a construit notre maison entière !\"  \n- \"Un kit de vantardise typique"
deDE = "\"Mein Papa ist der Beste! Er hat unser ganzes Haus gebaut!\"  \n-Typischer Angeber"
plPL = "\"Zarazisz się od taty! Zbudował nasz cały dom!\"  \n- Typowe chwalenie się"
ptBR = "\"Meu papai é o melhor! Ele construiu nossa casa inteira!\"  \n- Jactância típica"
koKR = "\"아빠가 최고예요! 우리 집을 다 지었거든요!\"  \n- 전형적인 자랑"
csCZ = "\"Táta je nejlepší! Postavil celý náš dům!\"  \n- Typické vychloubání"
viVN = "Ba tôi là người giỏi nhất! Ông ấy đã xây dựng toàn bộ ngôi nhà của chúng tôi!\"  \n- \"Một bộ kit tự hào điển hình"

["Lapantouflemagic.TappersShack.Description"]
raw = "Employs a whole team of tappers to harvest resin from pine trees.\nHas a <color=#FF6EC7>triangle roof</color>, <color=#FF6EC7>Can support upgrades</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "Employs a whole team of tappers to harvest resin from pine trees. Has a <color=#FF6EC7>triangle roof</color>, <color=#FF6EC7>Can support upgrades</color> <color=#00FFFF>Works as a Levee</color>"
zhCN = "雇佣一整队工人从松树中收集树脂。\n有一个<color=#FF6EC7>三角屋顶</color>，<color=#FF6EC7>可以支持升级</color>\n<color=#00FFFF>作为堤坝工作</color>"
zhTW = "雇用整個採集團隊從松樹中收穫樹脂。\n擁有一個<color=#FF6EC7>三角形屋頂</color>，<color=#FF6EC7>可以進行升級</color>\n<color=#00FFFF>作為堤岸運作</color>"
ruRU = "Нанимает целую команду сборщиков для сбора смолы с сосен.  \nИмеет <color=#FF6EC7>треугольную крышу</color>, <color=#FF6EC7>может поддерживать улучшения</color>  \n<color=#00FFFF>Работает как дамба</color>"
jaJP = "松の木から樹脂を収穫するために、タッパーのチーム全体を雇用します。\n<color=#FF6EC7>三角屋根</color>を持ち、<color=#FF6EC7>アップグレードに対応</color>\n<color=#00FFFF>堤防として機能します</color>"
frFR = "Emploie une équipe entière de collecteurs pour récolter la résine des pins.  \nDispose d'un <color=#FF6EC7>toit triangulaire</color>, <color=#FF6EC7>peut supporter des améliorations</color>  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Beschäftigt ein ganzes Team von Zapfenanbohrern, um Harz aus Kiefern zu ernten. Hat ein <color=#FF6EC7>Dach in Form eines Dreiecks</color>, <color=#FF6EC7>kann Upgrades unterstützen</color> <color=#00FFFF>funktioniert als Damm</color>"
plPL = "Zatrudnia cały zespół zbieraczy do pozyskiwania żywicy z drzew sosnowych. Posiada <color=#FF6EC7>trojkatowy dach</color>, <color=#FF6EC7>możliwość wsparcia ulepszeń</color> <color=#00FFFF>działa jak tama</color>"
ptBR = "Emprega uma equipe inteira de coletadores para colher resina de pinheiros.  \nPossui um <color=#FF6EC7>telhado em triângulo</color>, <color=#FF6EC7>pode suportar melhorias</color>  \n<color=#00FFFF>Funciona como um dique</color>"
koKR = "소나무에서 수지를 수확하기 위해 전체 탭핑 팀을 고용합니다.\n<color=#FF6EC7>삼각형 지붕</color>이 있으며, <color=#FF6EC7>업그레이드를 지원합니다</color>\n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Zaměstnává celý tým sběračů, aby sklidil pryskyřici z borovic.\nMá <color=#FF6EC7>trojúhelníkovou střechu</color>, <color=#FF6EC7>lze vylepšovat</color>\n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Thuê một đội ngũ tapers để thu hoạch nhựa từ cây thông. \nCó một <color=#FF6EC7>mái nhà hình tam giác</color>, <color=#FF6EC7>Có thể hỗ trợ nâng cấp</color> \n<color=#00FFFF>Hoạt động như một đê</color>"

