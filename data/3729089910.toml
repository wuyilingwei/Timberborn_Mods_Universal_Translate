["Lapantouflemagic.Mushroomfarm.Description"]
raw = "An enclosed place to grow genetically modified mushrooms or plants in optimal condition, resulting in incredible yields and growth speed.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "An enclosed place to grow genetically modified mushrooms or plants in optimal conditions, resulting in incredible yields and growth speed. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一个封闭的地方，以最佳条件种植基因改造的蘑菇或植物，带来惊人的产量和生长速度。  \n<color=#00FFFF>作为堤坝工作</color>"
zhTW = "一個封閉的地方，可以在最佳條件下種植基因改良的蘑菇或植物，帶來驚人的產量和生長速度。  \n<color=#00FFFF>作為堤壩使用</color>"
ruRU = "Затененное место для выращивания генетически модифицированных грибов или растений в оптимальных условиях, что приводит к невероятным урожаям и скорости роста.  \n<color=#00FFFF>Работает как плотина</color>"
jaJP = "遺伝子組換えのキノコや植物を最適な条件で育てるための閉鎖された場所で、驚異的な収穫量と成長速度を実現します。  \n<color=#00FFFF>堤防として機能します</color>"
frFR = "Un espace clos pour cultiver des champignons ou des plantes génétiquement modifiés dans des conditions optimales, entraînant des rendements incroyables et une vitesse de croissance rapide. <color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Ein geschlossener Ort, um genetisch veränderte Pilze oder Pflanzen unter optimalen Bedingungen anzubauen, was zu unglaublichen Erträgen und Wachstumsraten führt. <color=#00FFFF>Funktioniert wie ein Damm</color>"
plPL = "Zamknięte miejsce do uprawy genetycznie zmodyfikowanych grzybów lub roślin w optymalnych warunkach, co skutkuje niesamowitymi plonami i szybkością wzrostu.  \n<color=#00FFFF>Działa jak tama</color>"
ptBR = "Um lugar fechado para cultivar cogumelos ou plantas geneticamente modificados em condições ideais, resultando em colheitas incríveis e velocidade de crescimento.\n<color=#00FFFF>Funciona como uma Represa</color>"
koKR = "최적의 조건에서 유전자 변형 버섯이나 식물을 재배할 수 있는 밀폐된 장소로, 놀라운 수확량과 성장 속도를 자랑합니다.  \n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Omezené místo pro pěstování geneticky modifikovaných hub nebo rostlin za optimálních podmínek, což vede k úžasným výnosům a rychlosti růstu. <color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một nơi kín để trồng nấm hoặc cây giống đã được biến đổi gen trong điều kiện tối ưu, mang lại năng suất và tốc độ phát triển đáng kinh ngạc.  \n<color=#00FFFF>Hoạt động như một Đê</color>"

["Lapantouflemagic.Mushroomfarm.FlavorDescription"]
raw = "\"Should I eat this red-and-white mushroom? It seems tasty.\"\n -Bobby the fool, last words."
status = "normal"
enUS = "\"Should I eat this red-and-white mushroom? It seems tasty.\"  \n-Bobby the fool, last words."
zhCN = "“我该吃这个红白相间的蘑菇吗？看起来很好吃。”  \n- 她愚蠢的巴比，临终遗言。"
zhTW = "「我應該吃這個紅白相間的蘑菇嗎？看起來很好吃。」  \n-傻瓜鮑比，最後的遺言。"
ruRU = "\"Должен ли я съесть этот красно-белый гриб? Он кажется вкусным.\"  \n -Бобби, дурак, последние слова."
jaJP = "この赤と白のキノコを食べるべきかな？美味しそうに見える。  \n- バビー・ザ・フール、最後の言葉。"
frFR = "\"Devrais-je manger ce champignon rouge et blanc ? Il a l'air délicieux.\"  \n-Bobby le fou, dernières paroles."
deDE = "\" Soll ich diesen rot-weißen Pilz essen? Er scheint lecker zu sein.\"  \n -Bobby der Dumme, letzte Worte."
plPL = "\"Czy powinienem zjeść ten czerwono-biały grzyb? Wygląda apetycznie.\"\n -Bobby, głupiec, ostatnie słowa."
ptBR = "Devo comer este cogumelo vermelho e branco? Parece saboroso.\"  \n-Bobby, o tolo, últimas palavras."
koKR = "이 빨간색과 하얀색 버섯을 먹어야 할까? 맛있어 보이네.\"\n - 바비, 마지막 말."
csCZ = "\"Máme jíst tuto červenobílou houbu? Vypadá chutně.\"  \n-Bobby, blázen, poslední slova."
viVN = "Liệu tôi có nên ăn chiếc nấm đỏ-trắng này không? Nó có vẻ ngon miệng.\" \n-Bobby kẻ ngốc, lời nói cuối cùng."

