["Faction.Whitepaws.WonderCompletionFlavor"]
raw = "Despite some...accidents...you have not only tamed this land, but also uncovered the secrets of ancient hooman technologies, opening the path to outer space for all of beaverkind.\nNow even if the earth ultimately fails and dies, we will be able to seek refuge among the stars.\n\nHa! Surely those fools never thought about that!"
status = "normal"
enUS = "Despite some...accidents...you have not only tamed this land, but also uncovered the secrets of ancient human technologies, opening the path to outer space for all of beaverkind. Now even if the earth ultimately fails and dies, we will be able to seek refuge among the stars.\n\nHa! Surely those fools never thought about that!"
zhCN = "尽管经历了一些……意外……你们不仅驯服了这片土地，还揭示了古老人类科技的秘密，为所有海狸开辟了通往外太空的道路。\n现在，即使地球最终失败并走向灭亡，我们也将能够在星星之间寻求庇护。\n\n哈！那些傻瓜们肯定从未想到过这一点！"
zhTW = "儘管發生了一些...意外...你不僅馴服了這片土地，還揭開了古老人類科技的秘密，為所有海狸開啟了通往外太空的道路。現在，即便地球最終失敗和死亡，我們仍然能在星空中尋求避難。\n\n哈！那些傻瓜肯定從未想到過這一點！"
ruRU = "Несмотря на некоторые... происшествия... вы не только приручили эту землю, но и раскрыли секреты древних технологий людей, открыв путь к внешнему космосу для всего бобрового рода. Теперь, даже если земля в конечном итоге потерпит крах и исчезнет, мы сможем искать убежище среди звезд.\n\nХа! Наверняка эти дураки никогда не думали об этом!"
jaJP = "いくつかの...事故...があったにもかかわらず、あなたはこの土地を征服しただけでなく、古代のヒューマン技術の秘密を明らかにし、すべてのビーバーのために宇宙への道を開きました。\n今や、地球が最終的に衰退し死んでしまったとしても、私たちは星の間に逃れられるでしょう。\n\nハ！もちろんあの愚か者たちはそんなことを考えもしなかったでしょう！"
frFR = "Malgré quelques... accidents... vous n'avez pas seulement apprivoisé cette terre, mais vous avez également découvert les secrets des anciennes technologies hooman, ouvrant la voie vers l'espace pour toute la famille des castors. \nMaintenant, même si la terre échoue finalement et meurt, nous pourrons chercher refuge parmi les étoiles.\n\nHa ! Ces imbéciles n'ont sûrement jamais pensé à cela !"
deDE = "trotz einiger...Unfälle...hast du dieses Land nicht nur gezähmt, sondern auch die Geheimnisse uralter Menschentechnologien entdeckt und den Weg zum Weltraum für alle Biberarten geöffnet.\nJetzt, selbst wenn die Erde letztendlich versagt und stirbt, werden wir in der Lage sein, Zuflucht unter den Sternen zu suchen.\n\nHa! Diese Toren haben sicherlich nie daran gedacht!"
plPL = "Pomimo kilku... wypadków... nie tylko oswoiłeś tę ziemię, ale także odkryłeś sekrety starożytnej technologii ludzi, otwierając drogę do przestrzeni kosmicznej dla całego bobrowego rodu.\nTeraz, nawet jeśli ziemia ostatecznie zawiedzie i umrze, będziemy w stanie szukać schronienia wśród gwiazd.\n\nHa! Z pewnością ci głupcy nigdy o tym nie pomyśleli!"
ptBR = "Apesar de alguns... acidentes... você não apenas domesticou esta terra, mas também desvendar os segredos das antigas tecnologias dos humanos, abrindo o caminho para o espaço sideral para toda a espécie de castores.  \nAgora, mesmo que a terra eventualmente falhe e morra, seremos capazes de buscar refúgio entre as estrelas.  \n  \nHa! Certamente aqueles tolos nunca pensaram nisso!"
koKR = "몇몇...사고에도 불구하고...당신은 이 땅을 정복했을 뿐만 아니라 고대 인간 기술의 비밀을 밝혀내어 모든 비버 종족에게 우주로 나아갈 길을 열었습니다. 이제 지구가 결국 실패하고 죽더라도 우리는 별들 사이에서 피난처를 찾을 수 있을 것입니다.\n\n하하! 저 바보들이 그것에 대해 생각해본 적이 없겠군요!"
csCZ = "I když došlo k několika... nehodám... nejenže jste zkrotli tuto zemi, ale také odhalili tajemství dávných lidských technologií, čímž jste otevřeli cestu do vesmíru pro všechny bobříky. \nNyní, i když Země nakonec selže a zemře, budeme schopni hledat útočiště mezi hvězdami.\n\nHa! Ti blázni si to určitě nikdy nepředstavovali!"
viVN = "Mặc dù có một số... tai nạn... bạn không chỉ thuần hóa vùng đất này, mà còn khám phá ra những bí mật của công nghệ hooman cổ đại, mở ra con đường dẫn đến không gian cho tất cả loài hải ly.\nGiờ đây, ngay cả khi trái đất cuối cùng sụp đổ và chết đi, chúng ta sẽ có thể tìm kiếm nơi trú ẩn giữa các vì sao.\n\nHa! Chắc chắn lũ ngốc đó không bao giờ nghĩ đến điều đó!"

["Faction.Whitepaws.WonderCompletionMessage"]
raw = "Congratulations! Despite the initial circumstances, you have managed to survive\nand build a great city in this hostile land. \nYou can now leave your Whitepaws to their own devices and take a break from this insanity, they will be fine."
status = "normal"
enUS = "Congratulations! Despite the initial circumstances, you have managed to survive and build a great city in this hostile land. You can now leave your Whitepaws to their own devices and take a break from this insanity; they will be fine."
zhCN = "“祝贺你！尽管起初的情况严峻，但你成功地在这片恶劣的土地上生存下来并建立了一个伟大的城市。你现在可以让你的白爪族自行其是，暂时远离这疯狂的生活，他们会没事的。”"
zhTW = "恭喜！儘管起初的情況艱難，你仍然成功地在這片惡劣的土地上生存並建立了一座偉大的城市。你現在可以讓你的白爪部落自己處理事務，暫時脫離這場瘋狂，他們會沒事的。"
ruRU = "Поздравляем! Несмотря на первоначальные обстоятельства, вам удалось выжить\nи построить великолепный город в этой враждебной стране.\nТеперь вы можете оставить своих Белопяток в покое и отдохнуть от этого безумия, с ними все будет в порядке."
jaJP = "おめでとうございます！最初の状況にもかかわらず、あなたはこの過酷な土地で生き延び、素晴らしい都市を築くことに成功しました。これで、ホワイトポーズたちを自分たちのことに任せ、この狂気から一休みすることができます。彼らは大丈夫です。"
frFR = "Félicitations ! Malgré les circonstances initiales, vous avez réussi à survivre et à construire une grande ville dans cette terre hostile. Vous pouvez maintenant laisser vos Whitepaws à leurs propres dispositifs et faire une pause dans cette folie, ils s'en sortiront."
deDE = "Herzlichen Glückwunsch! Trotz der anfänglichen Umstände ist es Ihnen gelungen, in diesem feindlichen Land zu überleben und eine großartige Stadt zu bauen. Sie können Ihre Whitepaws jetzt sich selbst überlassen und eine Pause von diesem Wahnsinn machen, es wird ihnen gut gehen."
plPL = "Gratulacje! Pomimo początkowych okoliczności, udało ci się przetrwać i zbudować wspaniałe miasto w tej wrogiej krainie. Teraz możesz pozostawić swoje Białe Łapy samym sobie i wziąć przerwę od tej szaleńczych sytuacji, poradzą sobie."
ptBR = "Parabéns! Apesar das circunstâncias iniciais, você conseguiu sobreviver e construir uma grande cidade nesta terra hostil. Você agora pode deixar seus Whitepaws por conta própria e fazer uma pausa dessa insanidade, eles ficarão bem."
koKR = "축하합니다! 초기 상황에도 불구하고, 당신은 이 적대적인 땅에서 생존하고 훌륭한 도시를 건설하는 데 성공했습니다.\n이제 당신의 화이트파우스를 그들 스스로 두고 이 미친 상황에서 잠시 쉴 수 있습니다. 그들은 괜찮을 것입니다."
csCZ = "Gratulujeme! Navzdory počátečním okolnostem se vám podařilo přežít a vybudovat skvělé město v této nepřátelské zemi. Nyní můžete nechat své Bílé tlapky na jejich vlastní zbraně a na chvíli si od těchto šílenství odpočinout, budou v pořádku."
viVN = "Chúc mừng! Mặc dù trong những hoàn cảnh ban đầu, bạn đã vượt qua và xây dựng một thành phố tuyệt vời trong vùng đất khắc nghiệt này. Bạn có thể để những chú mèo trắng tự lo cho bản thân và nghỉ ngơi khỏi sự điên cuồng này, chúng sẽ ổn thôi."

["Faction.Whitepaws.GameOver.Message"]
raw = "Your colony of Whitepaws has died out. This is the end."
status = "normal"
enUS = "Your colony of Whitepaws has perished. This is the end."
zhCN = "你们的白爪族群已经灭绝。这就是结局。"
zhTW = "你的白爪氏族已經滅絕。這就是結局。"
ruRU = "Ваша колония Белолапок вымерла. Это конец."
jaJP = "ホワイトポーズのコロニーは滅びました。これが終わりです。"
frFR = "Votre colonie de Whitepaws a disparu. C'est la fin."
deDE = "Deine Kolonie der Weißkrallen ist ausgestorben. Das ist das Ende."
plPL = "Twoja kolonia Białych Łap wyginęła. To koniec."
ptBR = "Sua colônia de Patas Brancas foi extinta. Este é o fim."
koKR = "화이트파우스의 식민지가 멸망했습니다. 이것이 끝입니다."
csCZ = "Vaše kolonie Bílých tlapek vyhynula. Toto je konec."
viVN = "Colony của bạn, Whitepaws, đã bị tuyệt chủng. Đây là kết thúc."

["Faction.Whitepaws.GameOver.Flavor"]
raw = "We told you it would be hard, now what went wrong? Too small of a dam ? Excessive use of prioritization? Overly zealous colony extension ? Learn from your mistakes and try again.\nYou can do it, who cares about the lives squandered in the process?"
status = "normal"
enUS = "We told you it would be hard, so what went wrong? Was it too small of a dam? Excessive prioritization? An overly ambitious expansion of your colony? Learn from your mistakes and try again. You can do it; who cares about the lives lost in the process?"
zhCN = "“我们告诉过你这会很困难，现在出什么问题了？大坝太小？过度优先安排？过于热衷的殖民扩展？从错误中学习，重头再来。你能做到，谁在乎这个过程中的生命被浪费？”"
zhTW = "「我們告訴過你這會很困難，那麼問題出在哪裡？水壩太小了？過度使用優先權？過於急於擴展殖民地？從你的錯誤中學習，再試一次。你可以做到，誰在乎過程中浪費的生命？」"
ruRU = "Мы говорили вам, что будет сложно, так что пошло не так? Слишком маленькая плотина? Чрезмерное использование приоритетов? Слишком рьяное расширение колонии? Учитесь на своих ошибках и пытайтесь снова. Вы можете это сделать, кому какое дело до жизней, потраченных в процессе?"
jaJP = "「難しいと言ったでしょう、さて何が間違ったのですか？ダムが小さすぎたのですか？優先順位の使いすぎですか？熱心すぎる植民地の拡張ですか？あなたの失敗から学び、再挑戦してください。あなたならできます、過程で無駄にした命など気にしなくていいのです。」"
frFR = "Nous vous avions dit que ce serait difficile, maintenant qu'est-ce qui a mal tourné ? Un barrage trop petit ? Une utilisation excessive de la priorisation ? Une extension de colonie trop zélée ? Apprenez de vos erreurs et essayez encore.\nVous pouvez le faire, qui se soucie des vies gaspillées dans le processus ?"
deDE = "Wir haben dir gesagt, dass es schwer werden würde, was ist jetzt schiefgelaufen? Zu kleiner Damm? Übermäßiger Einsatz von Priorisierung? Übermäßig eifrige Kolonienausdehnung? Lerne aus deinen Fehlern und versuche es erneut. Du kannst es schaffen, wen kümmert es, wie viele Leben dabei verschwendet wurden?"
plPL = "Mówiliśmy, że to będzie trudne, co poszło nie tak? Za mała tam? Nadmierne korzystanie z priorytetyzacji? Zbyt nadgorliwe rozszerzanie kolonii? Ucz się na swoich błędach i spróbuj ponownie. Możesz to zrobić, kogo obchodzi życie zmarnowane w procesie?"
ptBR = "Nós te dissemos que seria difícil, agora o que deu errado? A represa era muito pequena? Uso excessivo de priorização? Extensão da colônia excessivamente zelosa? Aprenda com seus erros e tente novamente. Você consegue, quem se importa com as vidas desperdiçadas no processo?"
koKR = "우리가 힘들 거라고 했잖아, 이제 뭐가 잘못된 거지? 너무 작은 댐? 과도한 우선순위 사용? 지나치게 열정적인 식민지 확장? 실수에서 배우고 다시 시도해 보세요. 당신은 할 수 있어요, 과정에서 낭비된 생명은 누가 신경 쓰나요?"
csCZ = "Říkali jsme ti, že to bude těžké, co se teď stalo? Příliš malá hráz? Nadměrné využívání prioritizace? Příliš horlivé rozšiřování kolonie? Uč se ze svých chyb a zkus to znovu. Dokážeš to, kdo se stará o životy promarněné v procesu?"
viVN = "Chúng tôi đã nói với bạn rằng sẽ rất khó khăn, vậy bây giờ chuyện gì đã sai? Đập quá nhỏ? Sử dụng quá nhiều ưu tiên? Mở rộng thuộc địa quá mức? Hãy học từ những sai lầm của bạn và thử lại.\nBạn có thể làm được, ai quan tâm đến những cuộc sống đã bị lãng phí trong quá trình này?"

