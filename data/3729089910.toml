zhCN = "“你知道新鲜的绿豌豆很好吃吗？”  \n- 一只妈妈海狸"
zhTW = "「你知道新鮮的綠豌豆很好吃嗎？」  \n- 一隻媽媽海狸"
ruRU = "\"Вы знали, что свежий зеленый горох вкусный?\"  \n- Мамаша-бобер"
jaJP = "「新鮮なグリーンピースは美味しいことをご存知ですか？」  \n- マミー・ビーバー"
