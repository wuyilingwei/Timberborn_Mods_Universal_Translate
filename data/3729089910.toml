["Lapantouflemagic.ContaminatedJail.Description"]
raw = "A jail for keeping contaminated beavers isolated from the rest of the population.\nJailed beavers will no longer need drinks, food, sleep, shelter nor cleaning until they feel better."
status = "normal"
enUS = "A jail for keeping contaminated beavers isolated from the rest of the population. Jailed beavers will no longer need drinks, food, sleep, shelter, nor cleaning until they feel better."
zhCN = "一个监狱，用于将受污染的海狸与其他种群隔离。被监禁的海狸将不再需要饮水、食物、睡眠、住所或清洁，直到他们感觉好转。"
zhTW = "「一個用來將受污染的海狸與其他海狸隔離的監獄。被監禁的海狸在康復之前不需要飲水、食物、睡眠、庇護或清潔。」"
ruRU = "Тюремное заведение для содержания загрязненных бобров в изоляции от остального населения. Заключенные бобры больше не нуждаются в напитках, еде, сне, укрытии и уборке, пока не поправятся."
jaJP = "汚染されたビーバーを他の個体から隔離するための監獄です。監禁されたビーバーは、状態が良くなるまで飲み物、食べ物、睡眠、シェルター、掃除を必要としません。"
frFR = "Une prison pour garder les castors contaminés isolés du reste de la population. Les castors emprisonnés n'auront plus besoin de boissons, de nourriture, de sommeil, d'abri ni de nettoyage jusqu'à ce qu'ils aillent mieux."
deDE = "Ein Gefängnis, um kontaminierte Biber von der restlichen Bevölkerung zu isolieren. Eingesperrte Biber benötigen bis zur Genesung weder Getränke, noch Nahrung, Schlaf, Unterkunft oder Reinigung."
plPL = "Więzienie dla trzymania zanieczyszczonych bobrów w izolacji od reszty populacji. Więzionym bobrom nie będą potrzebne napoje, jedzenie, sen, schronienie ani sprzątanie, dopóki nie poczują się lepiej."
ptBR = "Uma prisão para manter os castores contaminados isolados do resto da população. Castores presos não precisarão mais de bebidas, comida, sono, abrigo nem limpeza até se sentirem melhor."
koKR = "오염된 비버를 다른 집단과 격리하기 위한 감옥입니다.\n수감된 비버는 회복될 때까지 음료, 음식, 수면, 주거지 및 청소가 필요하지 않습니다."
csCZ = "Věznění bobrů slouží k izolaci kontaminovaných bobrů od zbytku populace. Věznění bobři již nebudou potřebovat nápoje, jídlo, spánek, úkryt ani úklid, dokud se nebudou cítit lépe."
viVN = "Một nhà tù để giữ cho những con rái cá ô nhiễm bị cô lập khỏi phần còn lại của dân số. Những con rái cá bị giam sẽ không còn cần đồ uống, thức ăn, giấc ngủ, chỗ ở hay làm sạch cho đến khi chúng cảm thấy tốt hơn."

