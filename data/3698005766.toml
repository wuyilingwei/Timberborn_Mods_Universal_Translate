plPL = "Jako frakcja posiadająca wiele Cudów (zmodyfikowane Chciwe lub Konfigurowalne Frakcje), uruchom każdy Cud frakcji w jednym cyklu."
ptBR = "Como uma facção com múltiplas Maravilhas (facções modificadas Gananciosas ou Configuráveis), lance a Maravilha de cada facção em um único ciclo."
koKR = "여러 개의 경이를 가진 진영(모드된 욕심 많은 진영 또는 구성 가능한 진영)으로서, 단일 사이클 내에 모든 진영의 경이를 발사하세요."
csCZ = "Jako frakce s několika divy (modifikované Chamtivé nebo Konfigurovatelné frakce) spusťte každé divo frakce v rámci jednoho cyklu."
