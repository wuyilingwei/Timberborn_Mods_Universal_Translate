["LV.MA.LaunchAllWonders.Desc"]
raw = "As a faction with multiple Wonders (modded Greedy or Configurable Factions), launch every faction's Wonder within a single cycle."
status = "normal"
enUS = "As a faction with multiple Wonders (modded Greedy or Configurable Factions), launch every faction's Wonder within a single cycle."
zhCN = "作为拥有多个奇迹的派系（修改后的贪婪派系或可配置派系），在一个循环内启动每个派系的奇迹。"
zhTW = "作為擁有多個奇蹟的派系（模組化的貪婪或可配置派系），在單一週期內啟動每個派系的奇蹟。"
ruRU = "Запустите Чудо каждой фракции за один цикл, играя за фракцию с несколькими Чудесами (модифицированные Жадные или Настраиваемые Фракции)."
jaJP = "「複数のワンダーを持つ派閥（改造された貪欲な派閥または設定可能な派閥）として、単一のサイクル内で全ての派閥のワンダーを発動します。」"
frFR = "En tant que faction avec plusieurs merveilles (factions modifiées, avares ou configurables), lancez la merveille de chaque faction au cours d'un seul cycle."
