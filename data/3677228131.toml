["Grows.RedCabbageCrop.RandoQuote"]
raw = "Seriously!? Just how bad at farming does a beaver have to be to make dry cabbages!?"
status = "normal"
enUS = "Seriously!? Just how bad at farming does a beaver have to be to make dry cabbages?!"
zhCN = "说真的！？一只海狸的农艺水平差到什么地步才能种出干白菜！"
zhTW = "「真的！？一隻海狸的農耕技術差到什麼程度才會把捲心菜弄得這麼乾燥！？」"
ruRU = "Серьезно!? Насколько плохим фермером должен быть бобер, чтобы вырастить сухую капусту!?"
jaJP = "「本気ですか！？ビーバーが干しキャベツを作るためには、農業がどれだけ下手でなければならないんですか！？」"
frFR = "Sérieusement !? À quel point un castor doit-il être mauvais en agriculture pour faire des choux secs !?"
deDE = "Im Ernst!? Wie schlecht muss ein Biber im Bauer sein, um trockene Kohlen zu machen!?"
plPL = "Serio!? Jak zły w uprawie musi być bóbr, żeby robić suche kapusty!?"
ptBR = "Sério!? Quão ruim um castor tem que ser na agricultura para fazer repolhos secos!?"
koKR = "정말!? 비버가 마른 양배추를 만들려면 농사에 얼마나 무능해야 하는 거야!?"
csCZ = "Doopravdy!? Jak špatný farmář musí být bobr, aby vyráběl suché zelí!?"
viVN = "Thật sao!? Một con hải ly phải tồi tệ đến mức nào trong việc trồng trọt mới có thể làm ra bắp cải khô chứ!?"

