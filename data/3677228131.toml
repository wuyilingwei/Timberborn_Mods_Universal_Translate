["Grows.RiceCrop.RandoQuote"]
raw = "When did we start farming these? Huh? A beaver said they isekai'd from a shapanese hooman? Don't be ridiculus, that's impossible"
status = "abandoned"
enUS = "When did we start farming these? Huh? A beaver said they were transported from a Japanese human? Don't be ridiculous, that's impossible."
zhCN = "“我们什么时候开始种这些？嗯？一只海狸说他们是从一个日本人那里异世界转生的？别开玩笑，这不可能。”"
zhTW = "「我們什麼時候開始種這些的？嗯？一隻海狸說他們是從一個日本人那裡轉生過來的？不要開玩笑，這不可能。」"
ruRU = "Когда мы начали их выращивать? Ха? Бобер сказал, что они попали сюда из другой вселенной от шапанского человека? Не будь смешным, это невозможно."
jaJP = "「私たちはこれをいつから栽培していたの？ え？ ビーバーが彼らは日本の人間から異世界転生したと言ったの？ 馬鹿なこと言わないで、それは不可能よ。」"
frFR = "Quand avons-nous commencé à cultiver ça ? Hein ? Un castor a dit qu'il venait d'un humain shapanais ? Ne sois pas ridicule, c'est impossible."
deDE = "Seit wann bauen wir die an? Huh? Ein Biber hat gesagt, sie seien von einem japanischen Menschen in eine andere Welt transportiert worden? Sei nicht lächerlich, das ist unmöglich."
plPL = "Kiedy zaczęliśmy uprawiać to? Co? Bóbr powiedział, że przenieśli się z japońskiego człowieka? Nie bądź śmieszny, to niemożliwe."
ptBR = "Quando começamos a cultivar isso? Hã? Um castor disse que eles vieram de um hooman japonês? Não seja ridículo, isso é impossível."
koKR = "우리가 이걸 농사짓기 시작한 게 언제였지? 응? 비버가 일본인 인간에서 이세카이하여 왔다고 했다고? 말도 안 돼, 그건 불가능해."
csCZ = "Kdy jsme začali pěstovat tyto? Huh? Bobr řekl, že přišli z jiného světa z japonského člověka? Nepovídej, to je nemožné."
viVN = "Khi nào chúng ta bắt đầu trồng những thứ này? Hả? Một con nhím nói rằng chúng đã isekai từ một người hooman Nhật Bản? Đừng có ngu ngốc, điều đó là không thể."

