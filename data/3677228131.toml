["Grows.RiceCrop.Cite"]
raw = "When did we start farming these? Huh? A beaver said they isekai'd from a shapanese hooman? Don't be ridiculus, that's impossible"
status = "normal"
enUS = "When did we start farming these? Huh? A beaver said they isekai'd from a Japanese human? Don't be ridiculous, that's impossible."
zhCN = "“我们什么时候开始种这些的？哈？一只海狸说他们是从一个日本的人异世界转生的？别开玩笑了，那是不可能的。”"
zhTW = "我們什麼時候開始耕種這些？哈？一隻海狸說他們從一個日本人那裡轉生過來？別開玩笑了，這不可能。"
ruRU = "Когда мы начали выращивать это? А? Бобер сказал, что они попали в другой мир из шапонского человека? Не будь смешным, это невозможно."
jaJP = "「私たちはいつからこれを農業していたのだろう？は？ビーバーが日本の人間から異世界転生したと言っていた？馬鹿なことを言わないで、そんなの不可能だ。」"
frFR = "Quand avons-nous commencé à cultiver cela ? Hein ? Un castor a dit qu'ils venaient d'un humain shapanais ? Ne sois pas ridicule, c'est impossible."
deDE = "„Wann haben wir angefangen, das anzubauen? Huh? Ein Biber hat gesagt, sie sind von einem japanischen Menschen isekai'd? Sei nicht lächerlich, das ist unmöglich.“"
plPL = "Kiedy zaczęliśmy uprawiać te? Huh? Bobr powiedział, że przenieśli się z japońskiego człowieka? Nie bądź śmieszny, to niemożliwe."
ptBR = "Quando começamos a cultivar isso? Hein? Um castor disse que eles vieram de um humano japonês? Não seja ridículo, isso é impossível."
koKR = "우리가 언제 이걸 농사짓기 시작했지? 하? 비버가 일본인에서 이세계로 갔다고 했다고? 말도 안 돼, 그건 불가능해."
csCZ = "Kdy jsme začali pěstovat tyto? Hm? Bobr řekl, že se dostali z jiného světa od japonského člověka? Nebuď směšný, to je nemožné."
viVN = "Khi nào chúng ta bắt đầu trồng chúng? Hả? Một con beaver nói rằng chúng đã chuyển sinh từ một con người Nhật Bản? Đừng có ngớ ngẩn, điều đó là không thể."
trTR = "Buğdayı ne zaman ekmeye başladık? Hı? Bir kunduz, bunların bir şapan insanından isekai'landığını mı söyledi? Saçmalama, bu imkansız."

