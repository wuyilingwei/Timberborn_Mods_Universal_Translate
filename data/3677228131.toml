["Grows.BirchTree.Common.Cite"]
raw = "Better than nothing, occasionally the bad tide takes long enough to come that these actually grow"
status = "normal"
enUS = "Better than nothing, occasionally the bad tide takes long enough to come that these actually grow."
zhCN = "总比没有好，有时坏潮汐会拖得太久，以至于这些树木真的会生长"
zhTW = "比沒有好，有時壞潮來得夠慢，這些樹木實際上會生長。"
ruRU = "«Лучше, чем ничего, иногда плохая волна приходит так долго, что эти действительно растут»"
jaJP = "無いよりマシ、時々は悪い潮が来るのに十分な時間がかかり、これが実際に成長することがある。"
frFR = "Mieux que rien, parfois la mauvaise marée met suffisamment de temps à arriver pour que ceux-ci poussent réellement."
deDE = "Immerhin, manchmal dauert es lange genug, bis die schlechte Flut kommt, dass diese tatsächlich wachsen."
plPL = "Lepiej niż nic, czasami zła fala przychodzi na tyle późno, że te rzeczywiście rosną."
ptBR = "Melhor do que nada, ocasionalmente a maré ruim demora tanto para chegar que estes realmente crescem."
koKR = "아무것보다 나은, 때때로 나쁜 조수가 와서 이 나무들이 실제로 자랄 만큼 충분히 오랜 시간이 걸린다"
csCZ = "Lepší než nic, občas špatný příliv trvá natolik dlouho, že tyto skutečně vyrostou."
viVN = "Được hơn chứ không, thỉnh thoảng thủy triều xấu đến lâu đến mức những cái này thực sự phát triển."
trTR = "Hiç yoktan iyi, bazen kötü dalga gelene kadar o kadar uzun bekliyorlar ki bunlar gerçekten büyüyor."

