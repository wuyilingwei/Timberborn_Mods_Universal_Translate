["Plant.Bullrush.FlavorDescription"]
raw = "Not for consumption given it drinks contaminated water too, is there a use for this?"
status = "abandoned"
enUS = "Not for consumption, since it drinks contaminated water too. Is there any use for this?"
zhCN = "不可食用，因为它也会喝受污染的水，这样还有什么用处吗？"
zhTW = "因為它也會飲用被污染的水，因此不適合食用，這種植物有什麼用途呢？"
ruRU = "Не предназначено для употребления, поскольку оно пьёт загрязненную воду — есть ли у него применение?"
jaJP = "汚染水を飲むため、摂取には適していません。これには何か用途はありますか？"
frFR = "Non destinée à la consommation, puisqu'elle boit aussi de l'eau contaminée. Y a-t-il une utilité à cela ?"
deDE = "Nicht zum Verzehr geeignet, da es auch verschmutztes Wasser trinkt – gibt es dafür einen Verwendungszweck?"
plPL = "Nie do spożycia, biorąc pod uwagę, że pije skażoną wodę — czy ma to jakieś zastosowanie?"
ptBR = "Não é para consumo, pois também bebe água contaminada; há alguma utilidade para isto?"
koKR = "오염된 물을 마시기도 하므로 섭취 용도로는 적합하지 않습니다. 이 식물에 다른 쓰임새가 있을까요?"
csCZ = "Není určeno ke konzumaci, protože i pije kontaminovanou vodu, má to nějaké využití?"
viVN = "Không ăn được vì nó cũng uống nước bị ô nhiễm, liệu có tác dụng gì cho nó không?"
