["Grows.ParsnipCrop.Cite"]
raw = "It's meh, good thing too otherwise all the leafcoats would have to decide between having no parsnips or being hated by their own kind 😅"
status = "normal"
enUS = "It's meh, good thing too otherwise all the leafcoats would have to decide between having no parsnips or being hated by their own kind 😅"
zhCN = "“这还行，不然所有的叶披风都得在没有胡萝卜或者被自己同类厌恶之间做选择 😅”"
zhTW = "「這還行，幸好是這樣，不然所有的葉衣人都得在沒有蘿蔔還是被自己同類仇恨之間做選擇😅」"
ruRU = "Это так себе, к счастью, иначе всем листокотам пришлось бы выбирать между тем, чтобы не иметь пастернаков или быть ненавидимыми своими же 😅"
jaJP = "「まあまあだね、そうでなければすべてのリーフコートはパースニップを持たないか、自分たちの仲間に嫌われるかのどちらかを決めなければならなかったから、良かったね 😅」"
frFR = "C'est bof, heureusement, sinon tous les leafcoats auraient dû choisir entre ne pas avoir de panais ou être haïs par les leurs 😅"
deDE = "Es ist so lala, gut ist es auch, sonst müssten alle Blättermäntel entscheiden, ob sie keine Pastinaken haben oder von ihrem eigenen Volk gehasst werden 😅"
plPL = "Jest średnio, na szczęście inaczej wszystkie liściaki musiałyby zdecydować, czy wolą nie mieć pietruszek, czy być nienawidzone przez swoją własną rasę 😅"
ptBR = "É só ok, ainda bem que não é assim, caso contrário todos os moradores das folhas teriam que escolher entre não ter pastinacas ou serem odiados pela sua própria espécie 😅"
koKR = "그냥 그래, 그렇지 않으면 모든 잎코트들이 파스닙을 포기하거나 자신들의 동족에게 미움을 받을 선택을 해야 할 거야 😅"
csCZ = "\"Je to takové nic moc, naštěstí jinak by se všichni listoví museli rozhodnout mezi tím, že nebudou mít pastinák, nebo že budou nenáviděni svými vlastními.\" 😅"
viVN = "Thì cũng bình thường, may mà không thì tất cả những người mặc áo lá sẽ phải lựa chọn giữa việc không có củ cải hoặc bị khinh ghét bởi chính đồng loại của họ 😅"
trTR = "Fena değil, iyi ki öyle; aksi takdirde tüm yaprak kaplılar ya hiç yer hibe alacak ya da kendi türlerinin nefretini kazanacaklardı 😅"

