["Grows.RedCabbageCrop.Cite"]
raw = "Seriously!? Just how bad at farming does a beaver have to be to make dry cabbages!?"
status = "normal"
enUS = "Seriously!? Just how bad at farming does a beaver have to be to make dry cabbages!?"
zhCN = "“真的！？一只海狸的农艺能力差到什么程度才能种出干燥的卷心菜！？”"
zhTW = "認真！？水獺的農耕技術差到什麼地步才能種出乾掉的高麗菜！？"
ruRU = "Серьезно!? Насколько плохим в фермерстве должен быть бобер, чтобы делать сухие капусты!?"
jaJP = "「まじで!? ビーバーが干しキャベツを作るなんて、農業がどれだけ下手なの!?」"
frFR = "Sérieusement!? À quel point un castor doit-il être mauvais en agriculture pour faire des choux secs!?"
deDE = "Im Ernst!? Wie schlecht muss ein Biber im Farming sein, um trockene Kohlen zu machen!?"
plPL = "Poważnie!? Jak kiepski w uprawach musi być bóbr, żeby robić suche kapusty!?"
ptBR = "Sério!? Quão ruim um castor tem que ser na agricultura para fazer repolhos secos!?"
