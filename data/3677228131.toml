["Plant.Parsnip.FlavorDescription"]
status = "normal"
raw = "It's meh, good thing too otherwise all the leafcoats would have to decide between having no parsnips or being hated by their own kind 😅"
enUS = "It's meh, good thing too otherwise all the leafcoats would have to decide between having no parsnips or being hated by their own kind 😅"
zhCN = "挺一般的，幸好如此，否则所有叶披风们将不得不在没有欧防风和被同类讨厌之间做出选择 😅"
zhTW = "挺一般的，還好，否則所有葉披風們就得在沒有防風根與被同類厭惡之間做出選擇 😅"
ruRU = "Так себе, к счастью, иначе всем Leafcoats пришлось бы выбирать между тем, чтобы не иметь пастернаков, и тем, чтобы их ненавидели их собственные сородичи 😅"
jaJP = "まあまあだね。そうじゃなかったら、リーフコートたちはパースニップが全く手に入らない状態になるか、同じ仲間に嫌われるかのどちらかを選ぶことになるところだった😅"
frFR = "C'est bof, tant mieux aussi sinon tous les leafcoats devraient choisir entre ne pas avoir de panais ou être détestés par leurs propres semblables 😅"
deDE = "Es ist so lala — Gott sei Dank, denn sonst müssten alle Leafcoats sich entscheiden, ob sie gar keine Pastinaken hätten oder von ihren eigenen Artgenossen gehasst würden 😅"
plPL = "Jest taki sobie, na szczęście, bo inaczej wszyscy leafcoats musieliby zdecydować między brakiem pasternaków a byciem znienawidzonym przez własny rodzaj 😅"
ptBR = "É mais ou menos. Ainda bem, do contrário todas as leafcoats teriam que escolher entre ficar sem pastinagas ou serem odiados pela própria gente 😅"
koKR = "그건 그저 그런 편이야. 다행히도 그렇지 않으면 모든 리프코트가 파스닙이 하나도 없거나 자신들의 종으로부터 미움을 받는 선택을 해야 했을 거야 😅"
csCZ = "Je to nic moc, naštěstí, jinak by všichni Leafcoats museli rozhodovat mezi tím, že by neměli žádné pastináky, nebo by byli nenáviděni svým vlastním druhem 😅"
viVN = "Nó không tệ lắm, may quá, nếu không thì tất cả Leafcoats sẽ phải quyết định giữa việc không có parsnips hoặc bị đồng loại ghét bỏ 😅"

