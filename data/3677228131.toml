["Grows.ParsnipCrop.RandoQuote"]
raw = "It's meh, good thing too otherwise all the leafcoats would have to decide between having no parsnips or being hated by their own kind 😅"
status = "normal"
enUS = "It's meh, good thing too otherwise all the leafcoats would have to decide between having no parsnips or being hated by their own kind 😅"
zhCN = "还行，幸好如此，否则所有叶披族成员就得在没有欧洲防风根和被同类讨厌之间做出选择 😅"
zhTW = "就那樣吧，還好這樣，否則所有 Leafcoats 就得在沒有歐防風或被同類憎恨之間做出選擇 😅"
ruRU = "Это так себе, к счастью, иначе всем Leafcoats пришлось бы выбирать между тем, чтобы не иметь пастернака, или быть ненавидимыми среди своих 😅"
jaJP = "まあまあだね。これのおかげで良かった。さもなければリーフコーツみんなが、パースニップが手に入らないか、同じ種族から嫌われるかのどちらかを選ぶことになる 😅"
frFR = "C'est bof; heureusement, sinon tous les leafcoats devraient choisir entre ne pas avoir de panais ou être détestés par leurs propres semblables 😅"
deDE = "Es ist ganz okay, zum Glück, denn sonst müssten alle Laubmäntel entscheiden, ob sie keine Pastinaken hätten oder von ihren eigenen Artgenossen gehasst würden 😅"
plPL = "Jest tak sobie, dobrze, że tak, bo inaczej wszyscy leafcoats musieliby zdecydować między tym, aby nie mieć pasternaków, a byciem znienawidzonym przez własny gatunek 😅"
ptBR = "Tá meio sem graça, ainda bem, senão todos os Leafcoats teriam que decidir entre ficar sem pastinagas ou serem odiados pelos seus iguais 😅"
koKR = "그저 그런 편이지. 다행히도 그렇지 않았다면 모든 리프코트들이 파스닙이 하나도 없거나 자기들 동족에게 미움을 받는 선택을 해야 했을 거야 😅"
csCZ = "Je to nic moc, naštěstí, jinak by všichni Listovci museli rozhodovat mezi tím, že by neměli žádné pastináky, nebo by byli nenáviděni svým vlastním druhem 😅"
viVN = "Nó bình bình thôi, may quá, nếu không thì tất cả lá áo sẽ phải quyết định giữa việc không có củ cải ngọt hoặc bị đồng loại của họ ghét 😅"

