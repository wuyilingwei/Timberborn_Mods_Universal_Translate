["Building.TubewayDistrictCrossing.Description"]
raw = "Balances goods between the two connected districts. Each side has workers who distribute goods between the District Crossing and the rest of the district."
status = "normal"
enUS = "Balances goods between the two connected districts. Each side has workers who distribute goods between the District Crossing and the rest of the district."
zhCN = "在两个连接的地区之间平衡物品。每一侧都有工人负责在地区交叉口和其他区域之间分配物品。"
zhTW = "平衡兩個連接區域之間的貨物。每一側都有工人將貨物在區域交叉口和該區域的其餘部分之間分配。"
ruRU = "Сбалансирует товары между двумя соединёнными районами. С каждой стороны есть работники, которые распределяют товары между Перекрёстком Районов и остальной частью района."
jaJP = "「接続された2つの地区間で物資のバランスを取ります。各側には、地区通過点と地区の残りの部分との間で物資を分配する労働者がいます。」"
frFR = "Équilibre les biens entre les deux districts connectés. Chaque côté a des travailleurs qui distribuent les biens entre le passage de district et le reste du district."
deDE = "Ausgewogene Güterverteilung zwischen den beiden verbundenen Distrikten. Auf jeder Seite gibt es Arbeiter, die die Güter zwischen dem Distrikübertritt und dem Rest des Distrikts verteilen."
plPL = "Balansuje dobra między dwoma połączonymi dzielnicami. Po każdej stronie są pracownicy, którzy rozdzielają dobra między Przejściem Dzielnicowym a resztą dzielnicy."
ptBR = "Equilibra bens entre os dois distritos conectados. Cada lado possui trabalhadores que distribuem bens entre a Travessia do Distrito e o restante do distrito."
koKR = "두 개의 연결된 구역 간에 상품을 균형 있게 분배합니다. 각 쪽에는 구역 교차점과 나머지 구역 간에 상품을 분배하는 작업자가 있습니다."
csCZ = "Vyrovnává zboží mezi dvěma propojenými čtvrtěmi. Na každé straně jsou pracovníci, kteří rozdělují zboží mezi Křižovatku čtvrtí a zbytek čtvrti."
viVN = "Cân bằng hàng hóa giữa hai quận kết nối. Mỗi bên có công nhân phân phối hàng hóa giữa Cầu quận và phần còn lại của quận."
trTR = "İki bağlı bölge arasında mal dengesini sağlar. Her iki tarafta, Alan Geçidi ile bölgenin geri kalanı arasında mal dağıtan işçiler bulunmaktadır."

