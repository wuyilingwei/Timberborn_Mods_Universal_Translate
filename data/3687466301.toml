frFR = "! Le bâtiment est un générateur. Il ne s'éteindra que si le niveau de puissance est supérieur à Arrêt ET si l'arrêt ne réduit pas le niveau de puissance en dessous du Début."
deDE = "! Das Gebäude ist ein Generator. Es wird nur abgeschaltet, wenn der Leistungsstand über Stop liegt UND wenn das Abschalten den Leistungsstand nicht unter Start senkt."
plPL = "! Budynek jest generatorem. Wyłączy się tylko wtedy, gdy poziom mocy będzie wyższy niż Stop I jeśli wyłączenie nie spowoduje, że poziom mocy spadnie poniżej Start."
ptBR = "! O edifício é um gerador. Só será desligado se o nível de energia estiver acima de Parar E se desligar não reduzir o nível de energia abaixo de Iniciar."
koKR = "! 건물은 발전기입니다. 정지 수준 이상인 경우에만 꺼지며, 꺼트리는 것이 시작 수준 이하로 전력 수준을 줄이지 않을 경우에만 가능합니다."
csCZ = "! Budova je generátor. Vypne se pouze pokud je úroveň energie nad Stop A pokud vypnutí nezpůsobí pokles úrovně energie pod Start."
viVN = "! Tòa nhà là máy phát điện. Chỉ tắt khi mức năng lượng cao hơn Ngừng VÀ nếu việc tắt không làm giảm mức năng lượng dưới Bắt đầu."

