["ModSetting.TWSimpleWorkshopControl.AutoIngredientsZeroCapMultiplierDesc"]
status = "normal"
raw = "When there is no storage capacity for a resource, auto ingredients will check available stock against the recipe amount multipled by this number (rather than against a percentage of storage capacity)."
enUS = "When there is no storage capacity for a resource, auto ingredients will check available stock against the recipe amount multiplied by this number (rather than against a percentage of storage capacity)."
zhCN = "“当资源没有存储容量时，自动配料将根据配方数量乘以该数字检查可用库存（而不是根据存储容量的百分比进行检查）。”"
zhTW = "當資源沒有存儲容量時，自動原料將根據食譜數量乘以此數字（而不是根據存儲容量的百分比）檢查可用庫存。"
ruRU = "Когда нет емкости хранения для ресурса, автоингредиенты будут проверять доступные запасы по сравнению с количеством рецепта, умноженным на это число (вместо проверки по проценту от емкости хранения)."
jaJP = "リソースのストレージ容量がない場合、オート素材は利用可能な在庫を、この数値（ストレージ容量のパーセンテージではなく）で掛けたレシピの量と比較します。"
frFR = "Lorsqu'il n'y a pas de capacité de stockage pour une ressource, les ingrédients automatiques compareront le stock disponible par rapport à la quantité de la recette multipliée par ce nombre (plutôt que par rapport à un pourcentage de la capacité de stockage)."
deDE = "Wenn keine Lagerkapazität für eine Ressource vorhanden ist, prüfen die automatischen Zutaten den verfügbaren Bestand im Vergleich zur Rezeptmenge multipliziert mit dieser Zahl (anstatt im Vergleich zu einem Prozentsatz der Lagerkapazität)."
plPL = "Gdy nie ma pojemności magazynowej dla zasobu, automatyczne składniki sprawdzą dostępny zapas w porównaniu do ilości receptury pomnożonej przez tę liczbę (zamiast w porównaniu do procentu pojemności magazynowej)."
ptBR = "Quando não há capacidade de armazenamento para um recurso, os ingredientes automáticos verificarão o estoque disponível em relação à quantidade da receita multiplicada por este número (em vez de em relação a uma porcentagem da capacidade de armazenamento)."
koKR = "자원이 저장될 용량이 없을 때, 자동 재료는 이 숫자로 곱해진 레시피 양과 사용 가능한 재고를 비교합니다(저장 용량의 백분율과 비교하는 것이 아닙니다)."
csCZ = "Když není žádná skladovací kapacita pro zdroj, automatické ingredience zkontrolují dostupné zásoby v porovnání s množstvím receptu vynásobeným tímto číslem (místo porovnání s procentem skladovací kapacity)."
viVN = "Khi không có dung lượng lưu trữ cho một tài nguyên, nguyên liệu tự động sẽ kiểm tra hàng tồn kho có sẵn so với số lượng công thức nhân với số này (thay vì so với tỷ lệ phần trăm của dung lượng lưu trữ)."

