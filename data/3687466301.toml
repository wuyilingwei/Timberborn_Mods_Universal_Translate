deDE = "! Zutat mit null Kapazität; die Steuerung vergleicht die verfügbaren Güter mit den Rezeptbedürfnissen und nicht mit dem Prozentsatz der Kapazität (gilt für alle Zutaten)."
plPL = "! Brak pojemności składnika; kontrola porówna dostępne towary z potrzebami receptury, a nie z procentem pojemności (dotyczy wszystkich składników)."
ptBR = "! Ingrediente de zero capacidade; o controle comparará os produtos disponíveis às necessidades da receita em vez de à porcentagem de capacidade (aplica-se a todos os ingredientes)."
koKR = "! 제로 용량 재료; 제어는 용량의 퍼센트가 아닌 레시피 필요에 따라 사용 가능한 상품을 비교합니다 (모든 재료에 적용됨)."
csCZ = "! Ingredience s nulovou kapacitou; kontrola porovná dostupné zboží s potřebami receptu namísto s procentem kapacity (platí pro všechny ingredience)."
viVN = "! Nguyên liệu không có dung lượng; điều khiển sẽ so sánh hàng hóa có sẵn với nhu cầu công thức thay vì với phần trăm dung lượng (áp dụng cho tất cả nguyên liệu)."

