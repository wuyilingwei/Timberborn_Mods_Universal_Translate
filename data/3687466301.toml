["UI.TW.SimpleWorkshopControl.SCActiveWarning"]
status = "normal"
raw = "<b><YellowHighlight>Single-cycle button has been pressed. Building will remain active until a recipe completes or the single cycle cancel button is pressed. All other settings will be ignored.</YellowHighlight></b>"
enUS = "<b><YellowHighlight>The single-cycle button has been pressed. The building will remain active until a recipe is completed or the single cycle cancel button is pressed. All other settings will be ignored.</YellowHighlight></b>"
zhCN = "<b><YellowHighlight>已按下单循环按钮。建筑将保持激活状态，直到某个配方完成或按下单循环取消按钮。所有其他设置将被忽略。</YellowHighlight></b>"
zhTW = "<b><YellowHighlight>已按下單循環按鈕。建築將保持啟用，直到配方完成或按下單循環取消按鈕。所有其他設置將被忽略。</YellowHighlight></b>"
ruRU = "<b><YellowHighlight>Кнопка одноразового цикла была нажата. Здание останется активным до завершения рецепта или до нажатия кнопки отмены одноразового цикла. Все остальные настройки будут игнорироваться.</YellowHighlight></b>"
jaJP = "<b><YellowHighlight>単サイクルボタンが押されました。レシピが完了するか、単サイクルキャンセルボタンが押されるまで、ビルディングはアクティブのままになります。他のすべての設定は無視されます。</YellowHighlight></b>"
frFR = "<b><YellowHighlight>Le bouton de cycle unique a été pressé. Le bâtiment restera actif jusqu'à ce qu'une recette soit terminée ou que le bouton d'annulation de cycle unique soit pressé. Tous les autres paramètres seront ignorés.</YellowHighlight></b>"
deDE = "<b><YellowHighlight>Der Einzelzyklus-Knopf wurde gedrückt. Das Gebäude bleibt aktiv, bis ein Rezept abgeschlossen ist oder der Knopf zum Abbrechen des Einzelzyklus gedrückt wird. Alle anderen Einstellungen werden ignoriert.</YellowHighlight></b>"
plPL = "<b><YellowHighlight>Przycisk pojedynczego cyklu został wciśnięty. Budynek pozostanie aktywny do momentu zakończenia przepisu lub naciśnięcia przycisku anulowania pojedynczego cyklu. Wszystkie inne ustawienia zostaną zignorowane.</YellowHighlight></b>"
ptBR = "<b><YellowHighlight>O botão de ciclo único foi pressionado. O edifício permanecerá ativo até que uma receita seja concluída ou o botão de cancelamento de ciclo único seja pressionado. Todas as outras configurações serão ignoradas.</YellowHighlight></b>"
koKR = "<b><YellowHighlight>단일 사이클 버튼이 눌렸습니다. 레시피가 완료되거나 단일 사이클 취소 버튼이 눌릴 때까지 건물은 활성 상태로 유지됩니다. 다른 모든 설정은 무시됩니다.</YellowHighlight></b>"
csCZ = "<b><YellowHighlight>Bylo stisknuto tlačítko pro jednorázový cyklus. Budova zůstane aktivní, dokud nebude recept dokončen, nebo dokud nebude stisknuto tlačítko pro zrušení jednorázového cyklu. Všechna ostatní nastavení budou ignorována.</YellowHighlight></b>"
viVN = "<b><YellowHighlight>Nút đơn chu kỳ đã được nhấn. Tòa nhà sẽ vẫn hoạt động cho đến khi một công thức hoàn thành hoặc nút hủy chu kỳ đơn được nhấn. Tất cả các cài đặt khác sẽ bị bỏ qua.</YellowHighlight></b>"

