["ModSetting.TWSimpleWorkshopControl.ShowUserControlDesc"]
status = "normal"
raw = "Enables the old user-control behavior. This gives more specific control and allows controling some additional building types, but has been mostly replaced by the auto behaviors"
enUS = "Enables the old user-control behavior. This provides more specific control and allows controlling some additional building types, but has been mostly replaced by the auto behaviors."
zhCN = "启用旧的用户控制行为。这提供了更具体的控制，并允许控制一些额外的建造类型，但大部分已被自动行为所取代。"
zhTW = "啟用舊版用戶控制行為。這提供了更具體的控制，並允許控制一些額外的建築類型，但大多數情況下已被自動行為取代。"
ruRU = "Включает старое поведение пользовательского управления. Это дает более специфический контроль и позволяет управлять дополнительными типами зданий, но в основном было заменено на автоматические поведение."
jaJP = "古いユーザーコントロールの動作を有効にします。これにより、より具体的な制御が可能になり、一部の追加の建物タイプも制御できますが、ほとんどは自動動作に置き換えられています。"
frFR = "Active le comportement de contrôle utilisateur ancien. Cela offre un contrôle plus spécifique et permet de contrôler certains types de constructions supplémentaires, mais a été principalement remplacé par les comportements automatiques."
deDE = "Ermöglicht das alte Benutzersteuerungsverhalten. Dies bietet eine spezifischere Steuerung und ermöglicht die Kontrolle zusätzlicher Gebäudetypen, wurde jedoch größtenteils durch die automatischen Verhaltensweisen ersetzt."
plPL = "Włącza stare zachowanie kontroli przez użytkownika. Daje to bardziej szczegółową kontrolę i pozwala na kontrolowanie niektórych dodatkowych typów budynków, ale zostało w większości zastąpione przez automatyczne zachowania."
ptBR = "Ativa o comportamento antigo de controle do usuário. Isso proporciona um controle mais específico e permite controlar alguns tipos de construções adicionais, mas foi em grande parte substituído pelos comportamentos automáticos."
koKR = "옛 사용자 제어 동작을 활성화합니다. 이를 통해 보다 구체적인 제어가 가능하고 추가 건물 유형을 제어할 수 있지만, 대부분 자동 동작으로 대체되었습니다."
csCZ = "Povolí staré chování uživatelského ovládání. To poskytuje specifické ovládání a umožňuje ovládat několik dalších typů budov, ale bylo většinou nahrazeno automatickými chováními."
viVN = "Kích hoạt hành vi điều khiển của người dùng cũ. Điều này mang lại sự kiểm soát cụ thể hơn và cho phép điều khiển một số loại công trình bổ sung, nhưng chủ yếu đã được thay thế bằng các hành vi tự động."

