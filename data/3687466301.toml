["ModSetting.TWSimpleWorkshopControl.SingleCycleHeader"]
status = "normal"
raw = "This setting adds a button which turns the building on for a single recipe cycle. It also has an option to lock buildings, so pressing the button is the only way they will run.\nThis is intended for use with my Markets mod, where precise control is important.\nBy default, it only works for markets. Checking 'All buildings' will make it available on most other workshops."
enUS = "This setting adds a button that activates the building for a single recipe cycle. It also includes an option to lock buildings, so pressing the button is the only way they will operate. This feature is designed for use with my Markets mod, where precise control is essential. By default, it only functions for markets. Checking 'All buildings' will enable it for most other workshops."
zhCN = "此设置添加了一个按钮，可以将建筑物开启一个单独的配方周期。它还有一个锁定建筑物的选项，因此按下按钮是它们运行的唯一方法。  \n此功能旨在与我的市场模组一起使用，因为精确控制非常重要。  \n默认情况下，它仅适用于市场。勾选“所有建筑物”将使其在大多数其他工作坊中可用。"
zhTW = "此設置添加了一個按鈕，可以將建築物啟用單次配方週期。它還有一個鎖定建築物的選項，這樣按下該按鈕將是它們運行的唯一方法。這是為我的市場模組設計的，在那裡精確控制很重要。默認情況下，它僅適用於市場。勾選“所有建築物”將使其在大多數其他工坊中可用。"
ruRU = "Это настройка добавляет кнопку, которая включает здание на один цикл рецепта. Также есть опция блокировки зданий, поэтому нажатие кнопки является единственным способом их работы. Это предназначено для использования с моим модом \"Рынки\", где важен точный контроль. По умолчанию это работает только для рынков. Установка флажка \"Все здания\" сделает это доступным для большинства других мастерских."
jaJP = "この設定は、建物を単一のレシピサイクルのためにオンにするボタンを追加します。また、ボタンを押すことが唯一の動作方法となるように建物をロックするオプションもあります。\nこれは、正確な制御が重要な私のマーケットモッドと一緒に使用することを意図しています。\nデフォルトでは、マーケットのみに機能します。「すべての建物」をチェックすると、他のほとんどの作業場でも利用可能になります。"
frFR = "Ce paramètre ajoute un bouton qui active le bâtiment pour un seul cycle de recette. Il a également une option pour verrouiller les bâtiments, de sorte que le fait d'appuyer sur le bouton soit le seul moyen de les faire fonctionner. Cela est destiné à être utilisé avec mon mod Marchés, où un contrôle précis est important. Par défaut, cela ne fonctionne que pour les marchés. Cocher 'Tous les bâtiments' le rendra disponible sur la plupart des autres ateliers."
deDE = "Diese Einstellung fügt einen Knopf hinzu, der das Gebäude für einen einzelnen Rezeptzyklus aktiviert. Es gibt auch eine Option zum Sperren von Gebäuden, sodass das Drücken des Knopfes die einzige Möglichkeit ist, dass sie betrieben werden.\nDies ist für die Verwendung mit meinem Marktm_mod gedacht, bei dem präzise Kontrolle wichtig ist.\nStandardmäßig funktioniert es nur für Märkte. Das Aktivieren von 'Alle Gebäude' macht es in den meisten anderen Werkstätten verfügbar."
plPL = "To ustawienie dodaje przycisk, który włącza budynek na jeden cykl receptury. Ma także opcję blokowania budynków, więc naciśnięcie przycisku jest jedynym sposobem, aby działały.\nJest to przeznaczone do użycia z moim modem Rynki, gdzie precyzyjna kontrola jest ważna.\nDomyślnie działa tylko z rynkami. Zaznaczenie 'Wszystkie budynki' sprawi, że będzie dostępne w większości innych warsztatów."
ptBR = "Esta configuração adiciona um botão que ativa o edifício para um único ciclo de receita. Também há uma opção para travar os edifícios, de modo que pressionar o botão seja a única maneira de eles funcionarem. Isso é destinado ao uso com meu mod de Mercados, onde o controle preciso é importante. Por padrão, ele funciona apenas para mercados. Marcar 'Todos os edifícios' tornará disponível na maioria das outras oficinas."
koKR = "이 설정은 건물을 단일 레시피 주기로 켜는 버튼을 추가합니다. 또한 버튼을 누르는 것이 건물이 작동하는 유일한 방법이 되도록 건물을 잠글 수 있는 옵션이 있습니다.  \n이는 정확한 제어가 중요한 제 시장 모드와 함께 사용하기 위해 의도되었습니다.  \n기본적으로 이는 시장에만 작동합니다. '모든 건물'을 선택하면 대부분의 다른 작업장에서도 사용할 수 있습니다."
csCZ = "Toto nastavení přidává tlačítko, které aktivuje budovu na jedno cyklu receptu. Také má možnost uzamknout budovy, takže stisknutí tlačítka je jediný způsob, jakým budou fungovat.  \nTo je určeno pro použití s mým modem Trhy, kde je přesná kontrola důležitá.  \nVe výchozím nastavení funguje pouze pro trhy. Zaškrtnutí 'Všechny budovy' jej zpřístupní většině ostatních dílen."
viVN = "Cài đặt này thêm một nút để bật tòa nhà cho một chu kỳ công thức đơn lẻ. Nó cũng có tùy chọn để khóa các tòa nhà, vì vậy việc nhấn nút là cách duy nhất để chúng hoạt động. \nĐiều này được thiết kế để sử dụng với mod Thị Trường của tôi, nơi sự kiểm soát chính xác là quan trọng. \nMặc định, nó chỉ hoạt động cho các thị trường. Kiểm tra 'Tất cả các tòa nhà' sẽ làm cho nó có sẵn trên hầu hết các xưởng khác."

