ptBR = "! Produto com capacidade zero; o controle usará porcentagem do inventário de saída do edifício em vez da porcentagem do armazenamento externo para esses produtos."
koKR = "! 용량이 0인 제품; 해당 제품에 대해서는 외부 저장소의 비율이 아닌 건물 출력 재고의 비율로 제어가 이루어집니다."
csCZ = "! Výrobek s nulovou kapacitou; kontrola bude používat procento výstupní inventáře budovy spíše než procento externího skladu pro tyto výrobky."
viVN = "! Sản phẩm không có sức chứa; điều khiển sẽ sử dụng tỷ lệ phần trăm của kho hàng xây dựng thay vì tỷ lệ phần trăm của kho lưu trữ bên ngoài cho những sản phẩm đó."

["UI.TW.SimpleWorkshopControl.ZeroCapacityIngredientWarning"]
status = "normal"
raw = "! Zero capacity ingredient; control will compare available goods to recipe needs rather than to percent of capacity (applies to all ingredients)."
enUS = "! Zero capacity ingredient; control will compare available goods to recipe needs rather than to percent of capacity (applies to all ingredients)."
zhCN = "! 零容量成分；控制将根据可用货物与配方需求进行比较，而不是与容量百分比进行比较（适用于所有成分）。"
zhTW = "「！零容量成分；控制將比較現有商品與配方需求，而非與容量百分比（適用於所有成分）。」"
ruRU = "! Ингредиент нулевой емкости; управление будет сравнивать доступные товары с потребностями рецепта, а не с процентом заполняемости (применяется ко всем ингредиентам)."
