["UI.TW.SimpleWorkshopControl.PowerLevelInfo"]
status = "normal"
raw = "Power level is supply divided by total demand (then normalized to a 0-100 scale).\nIf battery-aware is checked, supply will have available battery power added to it.\nActive demand is buildings currently on. Total demand is buildings that would like to be on, if they had enough power.\nThe power percentage shown in the vanilla GUI and used to control workshop speed is supply / active demand."
enUS = "Power level is supply divided by total demand (then normalized to a 0-100 scale). If battery-aware is checked, supply will have available battery power added to it. Active demand is buildings currently on. Total demand is buildings that would like to be on, if they had enough power. The power percentage shown in the vanilla GUI and used to control workshop speed is supply / active demand."
zhCN = "功率水平是供给除以总需求（然后归一化到0-100的比例）。\n如果选中了电池感知，供给将加上可用电池电量。\n活跃需求是当前开启的建筑。总需求是如果有足够电力希望开启的建筑。\n在原版用户界面中显示的功率百分比以及用于控制工坊速度的功率是供给 / 活跃需求。"
zhTW = "電力水平是供應量除以總需求量（然後標準化到0-100的範圍）。如果選中「電池感知」，供應將會添加可用的電池電量。當前需求是目前啟用的建築。總需求是希望啟用但如果有足夠電力的建築。原版GUI中顯示的電力百分比和用來控制工作坊速度的計算方式是供應量 / 當前需求。"
ruRU = "Уровень энергии - это подача, деленная на общий спрос (затем нормализованная на шкале 0-100).\nЕсли включено отслеживание батареи, к подаче будет добавлена доступная энергия батареи.\nАктивный спрос - это здания, которые в данный момент работают. Общий спрос - это здания, которые хотели бы работать, если бы у них было достаточно энергии.\nПроцент энергии, отображаемый в стандартном интерфейсе и используемый для управления скоростью работы мастерской, равен подаче / активному спросу."
jaJP = "電力レベルは供給を総需要で割ったもの（その後、0-100のスケールに正規化されます）。  \nバッテリー感知がチェックされている場合、供給には利用可能なバッテリー電力が追加されます。  \nアクティブ需要は現在稼働中の建物です。総需要は、十分な電力があれば稼働したい建物のことです。  \nバニラのGUIに表示され、工房の速度を制御するために使用される電力パーセンテージは、供給 / アクティブ需要です。"
frFR = "Le niveau d'énergie est l'approvisionnement divisé par la demande totale (puis normalisé sur une échelle de 0 à 100). Si l'option 'sensible à la batterie' est cochée, l'approvisionnement inclura la puissance de batterie disponible. La demande active correspond aux bâtiments actuellement en marche. La demande totale est celle des bâtiments qui souhaiteraient être en marche, s'ils avaient suffisamment d'énergie. Le pourcentage de puissance affiché dans l'interface graphique classique et utilisé pour contrôler la vitesse de l'atelier est l'approvisionnement / la demande active."
deDE = "Der Leistungspegel ist die Versorgung geteilt durch die Gesamtnachfrage (dann normalisiert auf eine Skala von 0-100).\nWenn die Option akku-bewusst aktiviert ist, wird die verfügbare Batterieleistung zur Versorgung addiert.\nDie aktive Nachfrage sind Gebäude, die derzeit eingeschaltet sind. Die Gesamtnachfrage sind Gebäude, die eingeschaltet sein möchten, wenn sie genügend Strom hätten.\nDer in der Standard-GUI angezeigte Leistungsprozentsatz, der zur Steuerung der Werkstattgeschwindigkeit verwendet wird, ist Versorgung / aktive Nachfrage."
plPL = "Poziom energii to podaż podzielona przez całkowite zapotrzebowanie (następnie normalizowane do skali 0-100).  \nJeśli zaznaczone jest 'świadome baterii', do podaży dodana zostanie dostępna moc akumulatorów.  \nAktywne zapotrzebowanie to budynki, które są aktualnie włączone. Całkowite zapotrzebowanie to budynki, które chciałyby być włączone, jeśli miałyby wystarczającą ilość energii.  \nProcent energii pokazany w domyślnym GUI i używany do kontrolowania prędkości warsztatów to podaż / aktywne zapotrzebowanie."
ptBR = "O nível de energia é o suprimento dividido pela demanda total (então normalizado em uma escala de 0-100).  \nSe a opção consciente de bateria estiver marcada, o suprimento terá a energia da bateria disponível adicionada a ele.  \nA demanda ativa são os edifícios que estão atualmente ligados. A demanda total são os edifícios que gostariam de estar ligados, se tivessem energia suficiente.  \nA porcentagem de energia mostrada na interface gráfica padrão e usada para controlar a velocidade da oficina é suprimento / demanda ativa."
koKR = "전력 수준은 공급량을 총 수요로 나눈 값 (그 다음 0-100 스케일로 정규화됨)입니다. \n배터리 인식이 활성화되어 있으면 공급량에 사용 가능한 배터리 전력이 추가됩니다. \n활성 수요는 현재 켜져 있는 건물입니다. 총 수요는 충분한 전력이 있다면 켜지고 싶어 하는 건물입니다. \n바닐라 GUI에 표시되고 작업장 속도 조절에 사용되는 전력 비율은 공급량 / 활성 수요입니다."
csCZ = "Úroveň výkonu je dodávka dělená celkovým požadavkem (poté normalizována na škálu 0-100). Pokud je zaškrtnuto povědomí o baterii, bude dodávce přidána dostupná kapacita baterie. Aktuální požadavek jsou budovy, které jsou momentálně zapnuté. Celkový požadavek jsou budovy, které by chtěly být zapnuté, pokud by měly dostatek energie. Percento výkonu zobrazené v základním uživatelském rozhraní a používané k řízení rychlosti dílny je dodávka / aktuální požadavek."
viVN = "Cấp độ năng lượng là nguồn cung chia cho tổng nhu cầu (sau đó được chuẩn hóa trên thang 0-100).\nNếu tùy chọn nhận biết pin được chọn, nguồn cung sẽ có thêm năng lượng pin có sẵn.\nNhu cầu hoạt động là các tòa nhà hiện đang hoạt động. Tổng nhu cầu là các tòa nhà muốn hoạt động, nếu chúng có đủ năng lượng.\nPhần trăm năng lượng hiển thị trong GUI gốc và được sử dụng để kiểm soát tốc độ xưởng là nguồn cung / nhu cầu hoạt động."

["UI.TW.SimpleWorkshopControl.PowerLevelGeneratorWarning"]
status = "normal"
raw = "! Building is generator. Will only turn off if power level is above Stop AND if turning off will not reduce power level below Start."
enUS = "! Building is a generator. It will only turn off if the power level is above Stop AND if turning it off will not reduce the power level below Start."
zhCN = "! 建筑是发电机。仅在电力水平高于停止时关闭，并且关闭不会使电力水平低于起始值。"
zhTW = "! 建築物是發電機。只有在電力水平高於停止值並且關閉不會使電力水平低於起始值的情況下才會關閉。"
ruRU = "! Здание является генератором. Остановится только если уровень энергии выше Стоп И если остановка не приведёт к снижению уровня энергии ниже Старт."
