zhTW = "電力水平將包括電池電量。如果有可用的電池，工作坊將會啟動，而發電機將會努力保持電池電量高於零。"
ruRU = "Уровень мощности будет учитывать энергию от аккумулятора. Мастерские будут включаться при наличии энергии от аккумулятора, а генераторы будут пытаться поддерживать уровень заряда аккумулятора выше нуля."
jaJP = "電力レベルはバッテリーの電力を含みます。ワークショップはバッテリーが利用可能な場合に稼働し、発電機はバッテリーをゼロ以上に保とうとします。"
frFR = "Le niveau d'énergie inclura la puissance de la batterie. Les ateliers s'allumeront s'il y a de la batterie disponible, et les générateurs tenteront de maintenir la batterie au-dessus de zéro."
