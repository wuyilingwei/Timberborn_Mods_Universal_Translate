plPL = "Poziom energii będzie uwzględniał moc z baterii. Warsztaty włączą się, jeśli dostępna jest bateria, a generatory będą starały się utrzymać poziom baterii powyżej zera."
ptBR = "Os níveis de energia incluirão a energia da bateria. As oficinas ligarão se houver bateria disponível, e os geradores tentarão manter a bateria acima de zero."
koKR = "전력 수준은 배터리 전원을 포함합니다. 워크숍은 배터리가 있을 경우 켜지며, 발전기는 배터리를 0 이상으로 유지하려고 합니다."
csCZ = "Úroveň energie bude zahrnovat bateriovou energii. Dílničky se zapnou, pokud je k dispozici baterie, a generátory se pokusí udržet baterii nad nulou."
