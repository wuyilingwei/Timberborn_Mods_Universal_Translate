["DDD.Settings.AllowInstantRepair.Tooltip"]
raw = "When on, the entity panel's Repair button restores the dam instantly without summoning a beaver. Off by default; useful for debugging."
status = "normal"
enUS = "When enabled, the entity panel's Repair button restores the dam instantly without summoning a beaver. Off by default; useful for debugging."
zhCN = "“开启时，实体面板的修复按钮立即修复大坝，而无需召唤海狸。默认关闭；对于调试很有用。”"
zhTW = "當啟用時，實體面板的修復按鈕會立即修復大壩，而不需要召喚海狸。預設為關閉；對除錯很有幫助。"
ruRU = "Когда включено, кнопка Ремонт на панели сущности восстанавливает плотину мгновенно, не вызывая бобра. Отключено по умолчанию; полезно для отладки."
jaJP = "「オンのとき、エンティティパネルの修理ボタンは、ビーバーを呼び出すことなくダムを即座に修復します。デフォルトではオフですが、デバッグに便利です。」"
frFR = "Lorsque activé, le bouton Réparer du panneau d'entité restaure le barrage instantanément sans invoquer un castor. Désactivé par défaut ; utile pour le débogage."
deDE = "Wenn aktiviert, stellt der Reparaturknopf im Entitätspanel den Damm sofort wieder her, ohne einen Biber zu beschwören. Standardmäßig deaktiviert; nützlich für das Debugging."
plPL = "Gdy włączone, przycisk Napraw w panelu obiektów natychmiast przywraca tamę bez wezwania bobra. Domyślnie wyłączone; przydatne do debugowania."
ptBR = "Quando ativado, o botão Reparar do painel da entidade restaura a represa instantaneamente sem convocar um castor. Desativado por padrão; útil para depuração."
koKR = "켜져 있을 때, 엔티티 패널의 수리 버튼이 비버를 소환하지 않고 댐을 즉시 복구합니다. 기본적으로 꺼져 있으며, 디버깅에 유용합니다."
csCZ = "Když je zapnuto, tlačítko Opravit na panelu entity okamžitě obnoví hráz bez vyvolání bobra. Výchozí nastavení je vypnuto; užitečné pro ladění."
viVN = "Khi bật, nút Sửa chữa trên bảng điều khiển thực thể sẽ khôi phục con đập ngay lập tức mà không cần triệu hồi một con hải ly. Tắt theo mặc định; hữu ích cho việc gỡ lỗi."
trTR = "Açık olduğunda, varlık panelinin Onarım düğmesi barajı anında onarıp bir kunduz çağırmadan geri yükler. Varsayılan olarak kapalıdır; hata ayıklama için faydalıdır."

