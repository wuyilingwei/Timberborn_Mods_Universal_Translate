["DDD.Settings.RepairTimeInHours.Tooltip"]
status = "normal"
raw = "How many in-game hours a beaver spends per repair before productivity multipliers (Inventor and friends still apply on top)."
enUS = "How many in-game hours a beaver spends on repairs before productivity multipliers (Inventor and friends still apply on top)."
