["DDD.Settings.GlobalWearPercent.Tooltip"]
status = "normal"
raw = "Multiplier applied on top of every block's per-spec wear rate. 100% = default; lower = dams last longer."
enUS = "Multiplier applied on top of every block's per-spec wear rate. 100% = default; lower = dams last longer."
zhCN = "应用于每个块每规格磨损率的乘数。100% = 默认值；更低 = 水坝持续时间更长。"
zhTW = "適用於每個方塊的每平方公里磨損率的倍數。100% = 默認；更低 = 大壩壽命更長。"
ruRU = "Множитель, применяемый к износу каждого блока в зависимости от его спецификации. 100% = по умолчанию; меньше = плотины служат дольше."
jaJP = "「各ブロックの仕様ごとの摩耗率に上乗せされる倍率。100%＝デフォルト; 低いほどダムの寿命が延びます。」"
frFR = "Multiplicateur appliqué sur le taux d'usure par spécification de chaque bloc. 100 % = par défaut ; inférieur = les barrages durent plus longtemps."
deDE = "Multiplikator, der auf die Abnutzungsrate jeder Blockart pro Spezifikation angewendet wird. 100 % = Standard; niedriger = Dämme halten länger."
plPL = "Multiplikator stosowany na każdym bloku na podstawie wskaźnika zużycia dla danego specyfikacji. 100% = domyślny; niższe = zapora trwa dłużej."
ptBR = "Multiplicador aplicado sobre a taxa de desgaste por especificação de cada bloco. 100% = padrão; menor = barragens duram mais."
koKR = "모든 블록의 사양별 마모 속도에 적용되는 배수. 100% = 기본값; 낮을수록 댐의 수명이 길어집니다."
csCZ = "Multiplikátor aplikovaný na základní míru opotřebení každého bloku. 100 % = výchozí; nižší = hráze vydrží déle."
viVN = "Hệ số nhân áp dụng lên tỷ lệ hao mòn theo thông số của từng khối. 100% = mặc định; thấp hơn = đập sẽ bền hơn."

