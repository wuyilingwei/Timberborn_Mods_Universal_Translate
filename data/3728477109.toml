jaJP = "ビーバーが修理にかかる時間（生産性の倍率が適用される前のゲーム内時間）を示します（発明者やその仲間の効果も適用されます）。"
frFR = "Combien d'heures de jeu un castor passe par réparation avant que les multiplicateurs de productivité (Inventeur et amis s'appliquent toujours en plus)."
deDE = "Wie viele Spielstunden ein Biber pro Reparatur verbringt, bevor Produktivitätsmultiplikatoren (Erfinder und Freunde gelten zusätzlich)."
plPL = "Ile godzin w grze bobr wydaje na naprawę, zanim zastosowane zostaną mnożniki wydajności (wynalazca i przyjaciele nadal mają zastosowanie)."
ptBR = "Quantas horas no jogo um castor gasta por reparo antes que os multiplicadores de produtividade (Inventor e amigos ainda se aplicam em cima)."
koKR = "수리가 진행될 때 비버가 소요하는 게임 내 시간(생산성 증가 효과는 여전히 적용됨)."
csCZ = "Kolik herních hodin vydra tráví na opravě, než se aplikují multiplikátory produktivity (vynálezce a přátelé se stále uplatňují navíc)."
viVN = "Số giờ trong trò chơi mà một con rái cá dành cho mỗi lần sửa chữa trước khi các yếu tố nhân suất (Nhà phát minh và bạn bè vẫn áp dụng thêm)."

