["DDD.Settings.RepairTimeInHours.Tooltip"]
raw = "How many in-game hours of work a beaver needs to bring a dam from 0 HP back to full before productivity multipliers. A half-broken dam takes about half this time. Beavers work in chunks so they can sleep and eat in between."
status = "normal"
enUS = "How many in-game hours of work a beaver needs to repair a dam from 0 HP back to full before productivity multipliers. A half-broken dam takes about half this time. Beavers work in chunks so they can sleep and eat in between."
zhCN = "每只海狸需要多少游戏小时来将大坝从0生命值修复到满值，然后再考虑生产力加成。一个半损坏的大坝大约需要一半的时间。海狸分阶段工作，因此它们可以在之间休息和吃东西。"
zhTW = "每隻海狸需要多少遊戲內小時的工作，才能將水壩的生命值從 0 修復到滿值，生產力加成前。一個半損壞的水壩大約需要這段時間的一半。海狸分段工作，因此可以在中間睡覺和吃東西。"
ruRU = "Сколько игровых часов работы бобру нужно, чтобы восстановить плотину с 0 HP до полного состояния до применения множителей производительности. Полусломанная плотина занимает примерно половину этого времени. Бобры работают порционно, чтобы иметь возможность спать и есть между работой."
jaJP = "ビーバーがダムを0 HPからフルに戻すのに必要な作業のゲーム内時間を示します。半壊したダムはこの時間の半分程度かかります。ビーバーは作業の合間に寝たり食べたりすることができるため、作業は分割されます。"
frFR = "Combien d'heures de jeu un castor a besoin pour ramener un barrage de 0 HP à plein avant les multiplicateurs de productivité. Un barrage à moitié cassé prend environ la moitié de ce temps. Les castors travaillent par tranches afin de pouvoir dormir et manger entre-temps."
deDE = "Wie viele Spielstunden Arbeit ein Biber benötigt, um einen Damm von 0 HP wieder auf volle Leistung zu bringen, bevor Produktivitätsmultiplikatoren zum Tragen kommen. Ein halb beschädigter Damm benötigt etwa die Hälfte dieser Zeit. Bieber arbeiten in Blöcken, sodass sie dazwischen schlafen und essen können."
plPL = "Ile godzin w grze bobr potrzebuje, aby przywrócić tamę z 0 HP do pełni przed zastosowaniem mnożników wydajności. Naprawa połowicznie uszkodzonej tamy zajmuje około połowy tego czasu. Bobry pracują w odcinkach, więc mogą spać i jeść pomiędzy."
ptBR = "Quantas horas no jogo de trabalho um castor precisa para trazer uma represa de 0 HP de volta ao total antes dos multiplicadores de produtividade. Uma represa meio danificada leva cerca da metade desse tempo. Os castores trabalham em turnos, então podem dormir e comer entre."
koKR = "댐의 생명력이 0 HP에서 완전한 상태로 돌아가는데 비버가 필요한 작업 시간을 게임 내 시간으로 나타냅니다. 반쯤 부서진 댐은 약 절반의 시간이 소요됩니다. 비버는 작업 중간에 잠을 자고 식사를 할 수 있도록 일정 시간 단위로 작업합니다."
csCZ = "Kolik herních hodin práce je potřeba, aby vydra přivedla hráz z 0 HP zpět na plnou před aplikací multiplikátorů produktivity. Polorozpadlá hráz zabere přibližně polovinu tohoto času. Vydry pracují po částech, takže mohou mezi tím spát a jíst."
viVN = "Số giờ trong trò chơi mà một con rái cá cần để phục hồi một con đập từ 0 HP về mức tối đa trước khi các yếu tố nhân suất. Một con đập hư hỏng một nửa mất khoảng một nửa thời gian này. Rái cá làm việc theo từng phần nên chúng có thể ngủ và ăn trong khoảng thời gian nghỉ."
trTR = "Bir kunduzun bir barajı 0 HP'den tam kapasiteye çıkarması için ne kadar oyun saati gerekli olduğunu gösterir, verimlilik çarpanlarından önce. Yarı hasar görmüş bir baraj yaklaşık bu sürenin yarısını alır. Kunduzlar kesitler halinde çalıştıkları için arada uyuyabilir ve yemek yiyebilirler."

