["DDD.Settings.DegradationEnabled.Tooltip"]
raw = "When off the mod still loads but no dam takes wear damage. Useful for save-game testing."
status = "normal"
enUS = "When off the mod still loads but no dam takes wear damage. Useful for save-game testing."
zhCN = "“关闭后，模组仍然加载，但没有水坝会受到磨损伤害。适用于存档测试。”"
zhTW = "「關閉後，模組仍會加載，但沒有水壩會受到磨損傷害。對於測試存檔遊戲非常有用。」"
ruRU = "Когда отключено, мод все еще загружается, но плотина не получает урон износа. Полезно для тестирования сохранений."
jaJP = "「オフの状態でもモッドはロードされますが、ダムは摩耗ダメージを受けません。セーブゲームのテストに便利です。」"
frFR = "Lorsque désactivé, le mod se charge toujours mais aucun barrage ne subit de dégâts d'usure. Utile pour le test de sauvegarde."
deDE = "Wenn deaktiviert, wird das Mod weiterhin geladen, aber kein Damm erleidet Abnutzungsschaden. Nützlich für das Testen von Spielständen."
plPL = "Kiedy wyłączone, mod nadal się ładuje, ale żadna tama nie ulega uszkodzeniu. Przydatne do testowania zapisów gry."
ptBR = "Quando desativado, o mod ainda carrega, mas nenhuma represa sofre dano de desgaste. Útil para testes de salvamento."
koKR = "비활성화 시에도 모드는 로드되지만, 댐은 마모 피해를 입지 않습니다. 저장 게임을 테스트하는 데 유용합니다."
csCZ = "Když je vypnuto, mod se stále načte, ale žádná hráz neutrpí opotřebení. Užitečné pro testování uložených her."
viVN = "Khi tắt, mod vẫn được tải nhưng không có đập nào bị hư hại do mòn. Hữu ích cho việc kiểm tra save-game."
trTR = "Kapalı olduğunda mod yine yüklenir ama hiçbiri yıpranma hasarı almaz. Kaydetme oyunu testi için faydalıdır."

