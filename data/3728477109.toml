["DDD.Settings.RandomVariancePercent.Tooltip"]
status = "normal"
raw = "Per-tick random spread around the computed wear. 0 = deterministic; higher = noisier failures."
enUS = "Per-tick random spread around the computed wear. 0 = deterministic; higher = noisier failures."
zhCN = "“每个周期围绕计算的磨损的随机分散。0 = 确定性；更高 = 更嘈杂的故障。”"
zhTW = "每次更新隨機擴散在計算出的磨損周圍。0 = 確定性；越高 = 故障越吵雜。"
ruRU = "Случайное распределение износа за тиковую единицу. 0 = детерминированный; больше = более шумные сбои."
jaJP = "計算された摩耗に対する毎ティックのランダムばらつき。0 = 決定論的; 高いほどノイズの多い失敗。"
frFR = "Écart aléatoire par tick autour de l'usure calculée. 0 = déterministe ; plus élevé = pannes plus bruyantes."
deDE = "Zufällige Streuung pro Tick um den berechneten Verschleiß. 0 = deterministisch; höher = unzuverlässigere Ausfälle."
plPL = "Losowy rozkład na tick wokół obliczonego zużycia. 0 = deterministyczny; wyższe = głośniejsze awarie."
ptBR = "Distribuição aleatória por tick em torno do desgaste computado. 0 = determinístico; maior = falhas mais randômicas."
koKR = "계산된 마모에 대한 틱당 무작위 분포. 0 = 결정론적; 높을수록 실패가 더 불규칙함."
csCZ = "Procentuální náhodné rozptyly na tick. 0 = deterministické; vyšší = hlučnější selhání."
viVN = "Sự biến đổi ngẫu nhiên theo từng tick xung quanh độ hao mòn đã tính toán. 0 = xác định; cao hơn = sự cố ồn ào hơn."

