["Building.SpiralStairs.FlavorDescription"]
raw = "„Dacă treci prin prea multe, ți se va învârti capul!” —Suli"
status = "normal"
enUS = "\"If you go through too much, your head will spin!\" —Suli"
zhCN = "“如果经历太多，头会转晕的！” —苏利"
zhTW = "「如果經歷了太多，你的頭會暈！」—蘇利"
ruRU = "„Если ты пройдешь через слишком многое, у тебя закружится голова!” —Сули"
jaJP = "「「あまりに多くのことを経験すると、頭がクラクラする！」 —スリ」"
frFR = "« Si tu traverses trop de choses, ta tête tournera ! » —Suli"
deDE = "„Wenn du zu viel durchmachst, wird dir schwindelig!” —Suli"
plPL = "„Jeśli przeżywasz za wiele, zakręci ci się w głowie!” —Suli"
ptBR = "\"Se você passar por muita coisa, sua cabeça vai girar!\" —Suli"
