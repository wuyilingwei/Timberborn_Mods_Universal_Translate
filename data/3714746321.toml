["Tutorial.Wellbeing.Beaver"]
raw = "Poți vedea impactul pe care acțiunile tale îl au asupra castorilor tăi.\n\nSelectează un castor făcând clic pe el. În panou, poți vedea starea sa actuală de bine, atributele și nevoile sale.\n\nUnele nevoi pot atinge valori negative și pot atrage penalizări severe sau pot cauza moartea."
status = "normal"
enUS = "You can see the impact your actions have on your beavers.\n\nSelect a beaver by clicking on it. In the panel, you can see its current wellbeing status, attributes, and needs.\n\nSome needs can reach negative values and may incur severe penalties or cause death."
zhCN = "“你可以看到你的行动对你的小浣熊产生的影响。\n\n点击一个小浣熊来选择它。在面板中，你可以看到它当前的幸福状态、属性和需求。\n\n有些需求可能会达到负值，并可能导致严重的惩罚或导致死亡。”"
zhTW = "你可以看到你的行動對你的海狸有什麼影響。\n\n點擊一隻海狸來選擇它。在面板中，你可以看到它目前的幸福狀態、屬性和需求。\n\n有些需求可能會達到負值，並可能帶來嚴重的懲罰或造成死亡。"
ruRU = "Вы можете увидеть влияние ваших действий на ваших бобров.\n\nВыберите бобра, кликнув на него. В панели вы можете увидеть текущее состояние его благополучия, атрибуты и потребности.\n\nНекоторые потребности могут достигать отрицательных значений и могут привести к серьезным штрафам или вызвать смерть."
jaJP = "あなたの行動がビーバーにどのような影響を与えているかを見ることができます。\n\nビーバーをクリックして選択してください。パネルでは、ビーバーの現在の健康状態、属性、およびニーズを見ることができます。\n\nいくつかのニーズは負の値に達する可能性があり、厳しいペナルティを引き起こしたり、死を引き起こす可能性があります。"
frFR = "Tu peux voir l'impact que tes actions ont sur tes castors.\n\nSélectionne un castor en cliquant sur lui. Dans le panneau, tu peux voir son état de bien-être actuel, ses attributs et ses besoins.\n\nCertaines besoins peuvent atteindre des valeurs négatives et peuvent entraîner de sévères pénalités ou provoquer la mort."
deDE = "Du kannst die Auswirkungen sehen, die deine Handlungen auf deine Biber haben.\n\nWähle einen Biber aus, indem du auf ihn klickst. Im Panel kannst du seinen aktuellen Wohlbefindenszustand, Attribute und Bedürfnisse sehen.\n\nEinige Bedürfnisse können negative Werte erreichen und schwere Strafen nach sich ziehen oder zum Tod führen."
plPL = "Możesz zobaczyć wpływ, jaki twoje działania mają na twoje bobry.\n\nWybierz bobra, klikając na niego. W panelu możesz zobaczyć jego aktualny stan dobrostanu, atrybuty i potrzeby.\n\nNiektóre potrzeby mogą osiągnąć wartości ujemne, co może skutkować poważnymi karami lub śmiercią."
ptBR = "Você pode ver o impacto que suas ações têm sobre seus castores.\n\nSelecione um castor clicando nele. No painel, você pode ver seu estado atual de bem-estar, atributos e necessidades.\n\nAlgumas necessidades podem atingir valores negativos e podem resultar em penalidades severas ou causar morte."
koKR = "당신의 행동이 너부리에게 미치는 영향을 볼 수 있습니다.\n\n너부리를 클릭하여 선택하세요. 패널에서 현재 복지 상태, 속성 및 요구 사항을 볼 수 있습니다.\n\n일부 요구 사항은 부정적인 값을 가질 수 있으며 심각한 패널티를 초래하거나 사망을 초래할 수 있습니다."
csCZ = "Zakoukej vliv tvých činů na tvé bobry.\n\nVyber bobra kliknutím na něj. V panelu můžeš vidět jeho aktuální stav pohody, atributy a potřeby.\n\nNěkteré potřeby mohou dosáhnout negativních hodnot a mohou přinést těžké tresty nebo způsobit smrt."
viVN = "Bạn có thể thấy ảnh hưởng của hành động của bạn đối với những con beaver của mình.\n\nChọn một con beaver bằng cách nhấp vào nó. Trong bảng điều khiển, bạn có thể thấy trạng thái hiện tại của nó, thuộc tính và nhu cầu của nó.\n\nMột số nhu cầu có thể đạt giá trị âm và có thể gây ra hình phạt nặng nề hoặc có thể khiến nó chết."

["Tutorial.Wellbeing.Campfire"]
raw = "Bunăstarea este o metrică ce arată cât de mulțumit este un castor. Aceasta afectează trei atribute: viteza de lucru, viteza de mișcare și durata de viață.\n\nUna dintre principalele modalități de creștere a bunăstării este prin atracții. Atracțiile sunt clădiri în care intră castorii atunci când nu sunt la muncă."
status = "normal"
enUS = "Wellbeing is a metric that shows how satisfied a beaver is. It affects three attributes: work speed, movement speed, and lifespan.\n\nOne of the main ways to increase wellbeing is through attractions. Attractions are buildings that beavers enter when they are not working."
zhCN = "幸福是一个显示海狸满意度的指标。它影响三个属性：工作速度、移动速度和寿命。\n\n提高幸福感的主要方式之一是通过休闲设施。休闲设施是海狸在不工作时进入的建筑。"
zhTW = "福祉是一種指標，顯示出海狸的滿意度。這會影響三個屬性：工作速度、移動速度和壽命。\n\n提高福祉的主要方法之一是透過吸引設施。吸引設施是海狸在不工作時進入的建築。"
ruRU = "Благосостояние — это метрика, показывающая, насколько доволен бобер. Оно влияет на три атрибута: скорость работы, скорость движения и продолжительность жизни.\n\nОдин из основных способов повышения благосостояния — это аттракционы. Аттракционы — это здания, в которые входят бобры, когда не работают."
jaJP = "「ウェルビーイングは、ビーバーがどれだけ満足しているかを示す指標です。これは、作業速度、移動速度、寿命の3つの属性に影響を与えます。\n\nウェルビーイングを向上させる主な方法の1つは、アトラクションです。アトラクションは、ビーバーが仕事をしていないときに入る建物です。」"
frFR = "Le bien-être est une métrique qui indique à quel point un castor est satisfait. Cela affecte trois attributs : la vitesse de travail, la vitesse de mouvement et la durée de vie.\n\nL'un des principaux moyens d'augmenter le bien-être est à travers les attractions. Les attractions sont des bâtiments où les castors entrent lorsqu'ils ne sont pas au travail."
deDE = "Das Wohlbefinden ist eine Kennzahl, die zeigt, wie zufrieden ein Biber ist. Es beeinflusst drei Attribute: Arbeitsgeschwindigkeit, Bewegungsgeschwindigkeit und Lebensdauer.\n\nEine der Hauptmöglichkeiten, das Wohlbefinden zu steigern, ist durch Attraktionen. Attraktionen sind Gebäude, in die die Biber gehen, wenn sie nicht arbeiten."
plPL = "Welfare to metryka, która pokazuje, jak zadowolony jest bóbr. Wpływa na trzy atrybuty: prędkość pracy, prędkość ruchu i długość życia.\n\nJednym z głównych sposobów na zwiększenie dobrobytu są atrakcje. Atrakcje to budynki, do których wchodzą bobry, gdy nie pracują."
ptBR = "A bem-estar é uma métrica que mostra o quão satisfeito está um castor. Isso afeta três atributos: velocidade de trabalho, velocidade de movimento e expectativa de vida.\n\nUma das principais formas de aumentar o bem-estar é através de atrações. As atrações são edifícios onde os castores entram quando não estão trabalhando."
koKR = "웰빙은 비버의 만족도를 나타내는 지표입니다. 이는 세 가지 속성에 영향을 미칩니다: 작업 속도, 이동 속도 및 수명입니다.\n\n웰빙을 증가시키는 주요 방법 중 하나는 즐길 거리를 제공하는 것입니다. 즐길 거리는 비버들이 일을 하지 않을 때 들어가는 건물입니다."
csCZ = "Blaho je metrika, která ukazuje, jak spokojený je bobr. Ovlivňuje tři atributy: rychlost práce, rychlost pohybu a délku života.\n\nJedním z hlavních způsobů, jak zvýšit blaho, jsou atrakce. Atrakce jsou budovy, do kterých bobři vstupují, když nejsou v práci."
viVN = "Bảo vệ sức khỏe là một chỉ số thể hiện mức độ hài lòng của một con beaver. Nó ảnh hưởng đến ba thuộc tính: tốc độ làm việc, tốc độ di chuyển và tuổi thọ.\n\nMột trong những cách chính để tăng cường sức khỏe là thông qua các điểm thu hút. Các điểm thu hút là các tòa nhà mà con beaver vào khi không làm việc."

