new = "Castorii au nevoie de o sursă stabilă de bușteni. Evident.\n\nFolosind Puncte de Știință produse de Inventatorul tău, deblochează Pădurarul. Apoi construiește-l într-o zonă în care vrei să plantezi copaci."
status = "normal"

["Tutorial.Forestry.MarkBirchesForPlanting"]
new = "Folosește instrumentul „Plantează copaci și arbuști” pentru a planta mesteacăni. Aceștia cresc repede, ceea ce îi face o alegere bună într-o așezare aflată la început de drum.\n\n\nLa fel ca în cazul culturilor, copacii cresc doar pe zone verzi irigate.\n\n\nNu uita să marchezi zonele de plantare pentru tăiere."
status = "normal"

["Tutorial.HaulersAndWorkforce"]
new = "Transportatori și forță de muncă"
status = "normal"

["Tutorial.HaulersAndWorkforce.BuildHaulingPost"]
new = "Pe măsură ce așezarea ta se extinde, aceasta procesează cantități mai mari de mărfuri. Transportul acestora ocupă o parte semnificativă din ziua muncitorilor tăi.\n\nTransportatorii ajută la asta. Ei mută mărfurile în întregul district, în funcție de cerere.\n\nHai să construim acum un Post de Transport."
status = "normal"

["Tutorial.HaulersAndWorkforce.ChangeWorkforce"]
new = "Unele locuri de muncă, cum ar fi Punctele de Transport, nu își ocupă toate locurile de muncă în mod implicit. Puteți modifica numărul de muncitori în panoul unei clădiri.\n\nDe asemenea, puteți controla modul în care sunt ocupate clădirile cu personal folosind prioritățile locului de muncă. De exemplu, Punctul de Transport poate fi de obicei setat la o prioritate mai mică a locului de muncă.\n\nSă încercăm acum."
status = "normal"

["Tutorial.HaulersAndWorkforce.PauseHaulingPost"]
new = "Puteți întrerupe clădirile și șantierele de construcții. Acest lucru vă oferă mai mult control asupra acțiunilor castorilor.\n\nDe exemplu, locurile de muncă întrerupte sunt eliberate automat, iar muncitorii se reatribuie la alte locuri de muncă disponibile.\n\nSelectați Punctul de Transport și întrerupeți-l făcând clic pe butonul din panoul său."
status = "normal"

["Tutorial.Housing"]
new = "Locuințe"
status = "normal"

["Tutorial.Housing.Lodges"]
new = "Doi castori sunt mai buni decât unul! Casele îmbunătățesc bunăstarea castorilor tăi și permit populației tale de castori să crească.\n\nCastorii se atribuie automat locurilor de locuit disponibile."
status = "normal"

