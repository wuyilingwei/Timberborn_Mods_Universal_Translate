["Tutorial.Storage.Warehouses"]
new = "În cele din urmă, haideți să pregătim niște depozite pentru fructele de pădure. Ar trebui să ne pregătim și pentru recolta de morcovi care urmează.\n\nMâncarea, la fel ca multe alte bunuri ambalate în cutii, este depozitată în depozite."
