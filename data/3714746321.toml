["Building.LargeTank.FlavorDescription"]
raw = "În ciuda eforturilor depuse de pui pentru a-l folosi ca piscină, acest rezervor a fost proiectat pentru uz industrial."
status = "normal"
enUS = "Despite the efforts made by the pups to use it as a pool, this tank was designed for industrial use."
