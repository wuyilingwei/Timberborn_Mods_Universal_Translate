["Building.Memory.Description"]
status = "normal"
raw = "Își schimbă și își menține starea ca răspuns la secvențe specifice de intrare. O piatră de temelie a automatizării avansate."
enUS = "It changes and maintains its state in response to specific input sequences. A cornerstone of advanced automation."
zhCN = "“根据特定输入序列改变和维持状态。先进自动化的基石。”"
zhTW = "根據特定的輸入序列改變並維持其狀態。先進自動化的基石。"
ruRU = "Изменяет и поддерживает свое состояние в ответ на специфические последовательности входных данных. Фундамент автоматизации."
jaJP = "特定の入力シーケンスに応じて状態を変更および維持します。高度な自動化の基礎となるものです。"
frFR = "Change et maintient son état en réponse à des séquences spécifiques d'entrées. Une pierre angulaire de l'automatisation avancée."
deDE = "Ändert und hält seinen Zustand als Antwort auf bestimmte Eingabesequenzen. Ein Grundpfeiler der fortgeschrittenen Automatisierung."
plPL = "Zmienia swój stan i utrzymuje go w odpowiedzi na specyficzne sekwencje wejściowe. Kamień węgielny zaawansowanej automatyzacji."
ptBR = "Altera e mantém seu estado em resposta a sequências específicas de entrada. Uma pedra fundamental da automação avançada."
koKR = "특정 입력 시퀀스에 따라 상태를 변경하고 유지합니다. 고급 자동화의 기초가 됩니다."
csCZ = "Změní a udržuje svůj stav jako reakci na specifické sekvence vstupů. Základní kámen pokročilé automatizace."
viVN = "Nó thay đổi và duy trì trạng thái của nó như một phản ứng đối với các chuỗi đầu vào cụ thể. Một nền tảng thiết yếu của tự động hóa tiên tiến."

