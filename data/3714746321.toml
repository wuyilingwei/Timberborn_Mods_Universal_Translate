["MapMetadata.Craters.Description"]
raw = "Nimeni nu știe cum s-au format craterele. Săpăturile preliminare sugerează implicarea violentă a hoomanilor."
status = "normal"
enUS = "No one knows how the craters were formed. Preliminary excavations suggest the violent involvement of humans."
zhCN = "没有人知道陨石坑是如何形成的。初步挖掘表明人类的暴力介入。"
zhTW = "沒有人知道坑洞是如何形成的。初步的挖掘暗示了人類的暴力介入。"
ruRU = "Никто не знает, как образовались кратеры. Предварительные раскопки предполагают насильственное вмешательство хуманитов."
jaJP = "誰もクレーターがどのように形成されたのかは分かっていません。予備的な調査は、ヒューマンの暴力的な関与を示唆しています。"
frFR = "Personne ne sait comment les cratères se sont formés. Les fouilles préliminaires suggèrent l'implication violente des hooman."
deDE = "„Niemand weiß, wie die Krater entstanden sind. Erste Ausgrabungen deuten auf eine gewaltsame Beteiligung von Menschen hin.“"
plPL = "Nikt nie wie, jak powstały krater. Wstępne wykopaliska sugerują brutalne zaangażowanie hoomanów."
ptBR = "Ninguém sabe como os crateras se formaram. Escavações preliminares sugerem a envolvimento violento dos hoomanos."
koKR = "누구도 크레이터가 어떻게 형성되었는지 알지 못합니다. 초기 발굴 조사는 인간의 폭력적인 개입을 시사합니다."
csCZ = "Nikdo neví, jak se krátery vytvořily. Předběžné vykopávky naznačují násilnou účast lidí."
viVN = "Không ai biết các miệng núi lửa được hình thành như thế nào. Các cuộc khai quật ban đầu gợi ý sự can thiệp bạo lực của loài người."

