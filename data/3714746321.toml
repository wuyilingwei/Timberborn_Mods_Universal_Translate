["Building.Dynamite.FlavorDescription"]
status = "normal"
raw = "Au fost necesare niște măsuri extreme pentru adaptarea la lumea post-apocaliptică."
enUS = "Extreme measures were necessary to adapt to the post-apocalyptic world."
zhCN = "“为了适应后启示录的世界，采取了一些极端措施。”"
zhTW = "「為了適應後末日的世界，採取了一些極端措施。」"
ruRU = "Для адаптации к постапокалиптическому миру понадобились крайние меры."
jaJP = "ポストアポカリプスの世界に適応するためには、いくつかの極端な手段が必要でした。"
frFR = "Des mesures extrêmes ont été nécessaires pour s'adapter au monde post-apocalyptique."
deDE = "Es waren extreme Maßnahmen erforderlich, um sich an die post-apokalyptische Welt anzupassen."
plPL = "W świat postapokaliptyczny wymagało to podjęcia skrajnych działań."
ptBR = "Foram necessárias algumas medidas extremas para a adaptação ao mundo pós-apocalíptico."
koKR = "포스트 아포칼립스 세계에 적응하기 위해 극단적인 조치가 필요했습니다."
csCZ = "Byly zapotřebí extrémní opatření k přizpůsobení se postapokalyptickému světu."
viVN = "Cần có những biện pháp cực đoan để thích ứng với thế giới hậu tận thế."

["Building.EarthRecultivator.Folktails.Description"]
status = "normal"
raw = "Distribuie semințe de copaci pe tot Pământul. Când este lansat, îi face pe castorii din zonă extrem de fericiți."
enUS = "Distributes tree seeds all over the Earth. When launched, it makes the nearby beavers extremely happy."
zhCN = "在整个地球上分发树木种子。当它被释放时，会使附近的海狸们感到非常快乐。"
zhTW = "在整個地球上散播樹木種子。啟用後，會讓附近的海狸們非常快樂。"
ruRU = "Распространяет семена деревьев по всей Земле. Когда он запущен, делает бобров в округе невероятно счастливыми."
jaJP = "地球全体に木の種を配布します。発射されると、その地域のビーバーたちを非常に幸せにします。"
frFR = "Distribue des semences d'arbres sur toute la Terre. Lorsqu'il est lancé, il rend les castors de la région extrêmement heureux."
deDE = "Verbreitet Baum-Samen über die gesamte Erde. Wenn es gestartet wird, macht es die Biber in der Nähe extrem glücklich."
plPL = "Rozrzuca nasiona drzew na całej Ziemi. Gdy zostanie uruchomiony, sprawia, że bobry w okolicy są niezwykle szczęśliwe."
ptBR = "Distribui sementes de árvores por toda a Terra. Quando lançado, deixa os castores da região extremamente felizes."
koKR = "지구 전역에 나무 씨앗을 배포합니다. 발사되면 근처의 비버들이 매우 행복해집니다."
csCZ = "Rozsévá semena stromů po celé Zemi. Po spuštění dělá beavers v okolí extrémně šťastnými."
viVN = "Phân phối hạt giống cây cối khắp Trái Đất. Khi được ra mắt, nó khiến những con beaver trong khu vực trở nên cực kỳ hạnh phúc."

