["Experimental.WelcomeText"]
status = "normal"
raw = "Această versiune de Timberborn vă oferă acces la funcții prototip, neterminate. Prin urmare, este mult mai probabil să includă și erori grave. Ești într-adevăr un castor curajos.\n\n\nSalvările experimentale sunt stocate separat de jocul principal. Actualizările pot afecta compatibilitatea salvărilor.\n\n\nÎn acest Mod Experimental <RedHighlight>multe părți ale jocului nu sunt traduse și sunt afișate în engleză</RedHighlight>, indiferent de limba selectată. Acest lucru ne permite să adăugăm conținut nou și să facem modificări rapide fără a aștepta traduceri care consumă mult timp.\n\n\nVă recomandăm insistent să vă alăturați serverului nostru oficial Discord și să participați la discuția despre noul conținut."
enUS = "This version of Timberborn gives you access to prototype, unfinished features. Therefore, it is much more likely to include critical bugs. You are truly a brave beaver.\n\nExperimental saves are stored separately from the main game. Updates may affect save compatibility.\n\nIn this Experimental Mod <RedHighlight>many parts of the game are not translated and are displayed in English</RedHighlight>, regardless of the selected language. This allows us to add new content and make quick changes without waiting for time-consuming translations.\n\nWe strongly encourage you to join our official Discord server and participate in the discussion about new content."
zhCN = "此版本的 Timberborn 为您提供访问原型功能的权限，这些功能尚未完成。因此，这里更有可能包含严重错误。您真是一个勇敢的海狸。\n\n实验保存与主游戏分开存储。更新可能会影响保存的兼容性。\n\n在这个实验模式中<RedHighlight>游戏的许多部分没有翻译，显示为英语</RedHighlight>，无论选择什么语言。这使我们能够添加新内容并快速进行更改，而无需等待耗时的翻译。\n\n我们强烈建议您加入我们的官方 Discord 服务器，并参与有关新内容的讨论。"
zhTW = "此版本的 Timberborn 提供您訪問原型功能，這些功能仍在開發中。因此，它更可能包含嚴重錯誤。您真是一隻勇敢的海狸。\n\n實驗儲存是與主遊戲分開存儲的。更新可能會影響存檔的兼容性。\n\n在這個實驗模組中，<RedHighlight>遊戲的許多部分尚未翻譯，顯示為英文</RedHighlight>，無論選擇了哪種語言。這使我們能夠添加新內容並快速進行修改，而無需等待耗時的翻譯。\n\n我們強烈建議您加入我們的官方 Discord 伺服器，參加有關新內容的討論。"
ruRU = "Эта версия Timberborn предоставляет вам доступ к прототипным, незавершенным функциям. Поэтому она гораздо более вероятно будет содержать и серьезные ошибки. Вы действительно смелая бобер. \n\nЭкспериментальные сохранения хранятся отдельно от основной игры. Обновления могут повлиять на совместимость сохранений. \n\nВ этом экспериментальном моде <RedHighlight>многие части игры не переведены и отображаются на английском</RedHighlight>, независимо от выбранного языка. Это позволяет нам добавлять новый контент и вносить быстрые изменения, не дожидаясь трудоемких переводов. \n\nМы настоятельно рекомендуем вам присоединиться к нашему официальному серверу Discord и участвовать в обсуждении нового контента."
jaJP = "このTimberbornのバージョンは、プロトタイプの未完成な機能へのアクセスを提供します。そのため、重大なバグが含まれる可能性が高くなります。あなたは本当に勇敢なビーバーです。\n\n実験的なセーブデータは、メインゲームとは別に保存されます。アップデートがセーブデータの互換性に影響を与える場合があります。\n\nこの実験的モッドでは<RedHighlight>ゲームの多くの部分が翻訳されておらず、選択された言語に関係なく英語で表示されます</RedHighlight>。これにより、時間を要する翻訳を待つことなく、新しいコンテンツを追加したり、迅速な変更を行ったりすることができます。\n\nぜひ公式Discordサーバーに参加し、新しいコンテンツについての議論に参加することをおすすめします。"
frFR = "Cette version de Timberborn vous offre un accès à des fonctionnalités prototypes, inachevées. Par conséquent, il est beaucoup plus probable qu'elle inclue également des erreurs graves. Vous êtes vraiment un castor courageux.\n\nLes sauvegardes expérimentales sont stockées séparément du jeu principal. Les mises à jour peuvent affecter la compatibilité des sauvegardes.\n\nDans ce Mod Expérimental <RedHighlight>de nombreuses parties du jeu ne sont pas traduites et s'affichent en anglais</RedHighlight>, quelle que soit la langue sélectionnée. Cela nous permet d'ajouter du contenu nouveau et de faire des modifications rapides sans attendre des traductions qui prennent du temps.\n\nNous vous recommandons vivement de rejoindre notre serveur officiel Discord et de participer à la discussion sur le nouveau contenu."
deDE = "Diese Version von Timberborn bietet Ihnen Zugriff auf Prototyp-Funktionen, die noch nicht abgeschlossen sind. Daher ist es viel wahrscheinlicher, dass auch schwerwiegende Fehler enthalten sind. Sie sind wirklich ein mutiger Biber.\n\nExperimentelle Speicherstände werden separat vom Hauptspiel gespeichert. Aktualisierungen können die Kompatibilität der Speicherstände beeinträchtigen.\n\nIn diesem experimentellen Mod <RedHighlight>sind viele Teile des Spiels nicht übersetzt und werden in Englisch angezeigt</RedHighlight>, unabhängig von der ausgewählten Sprache. Dies ermöglicht es uns, neue Inhalte hinzuzufügen und schnelle Änderungen vorzunehmen, ohne auf zeitaufwändige Übersetzungen warten zu müssen.\n\nWir empfehlen Ihnen dringend, unserem offiziellen Discord-Server beizutreten und an der Diskussion über neue Inhalte teilzunehmen."
plPL = "Ta wersja Timberborn oferuje dostęp do prototypowych funkcji, które są w fazie rozwoju. Dlatego istnieje znacznie większe prawdopodobieństwo wystąpienia poważnych błędów. Jesteś naprawdę odważnym bobrem.\n\nEksperymentalne zapisy są przechowywane oddzielnie od głównej gry. Aktualizacje mogą wpłynąć na kompatybilność zapisów.\n\nW tym Modzie Eksperymentalnym <RedHighlight>wiele części gry nie jest przetłumaczonych i wyświetlane są w języku angielskim</RedHighlight>, niezależnie od wybranego języka. Dzięki temu możemy dodawać nową zawartość i wprowadzać szybkie zmiany bez czekania na czasochłonne tłumaczenia.\n\nZalecamy gorąco dołączenie do naszego oficjalnego serwera Discord i wzięcie udziału w dyskusji na temat nowej zawartości."
ptBR = "Esta versão de Timberborn oferece acesso a funções protótipo, inacabadas. Portanto, é muito mais provável que inclua também erros graves. Você é realmente um castor corajoso.\n\nOs salvamentos experimentais são armazenados separadamente do jogo principal. Atualizações podem afetar a compatibilidade dos salvamentos.\n\nNeste Mod Experimental <RedHighlight>muitas partes do jogo não estão traduzidas e aparecem em inglês</RedHighlight>, independentemente do idioma selecionado. Isso nos permite adicionar novo conteúdo e fazer mudanças rápidas sem esperar por traduções que consomem muito tempo.\n\nRecomendamos fortemente que você se junte ao nosso servidor oficial do Discord e participe da discussão sobre o novo conteúdo."
koKR = "이 Timberborn 버전은 프로토타입, 미완성 기능에 대한 액세스를 제공합니다. 따라서 심각한 오류가 발생할 가능성이 훨씬 더 높습니다. 당신은 정말 용감한 비버입니다.\n\n실험적 저장 파일은 메인 게임과 별도로 저장됩니다. 업데이트는 저장 파일의 호환성에 영향을 미칠 수 있습니다.\n\n이 실험적 모드에서는 <RedHighlight>게임의 많은 부분이 번역되지 않았으므로 선택한 언어와 관계없이 영어로 표시됩니다</RedHighlight>. 이는 새로운 콘텐츠를 추가하고 많은 시간을 소모하는 번역을 기다리지 않고도 빠른 수정이 가능하게 합니다.\n\n공식 Discord 서버에 가입하고 새로운 콘텐츠에 대한 논의에 참여할 것을 강력히 권장합니다."
csCZ = "Tato verze Timberbornu vám poskytuje přístup k prototypovým, nedokončeným funkcím. Je proto mnohem pravděpodobnější, že bude obsahovat také závažné chyby. Ověřte si, že jste skutečně odvážná bobříka.\n\nExperimentální uložené hry jsou ukládány odděleně od hlavní hry. Aktualizace mohou ovlivnit kompatibilitu uložených her.\n\nV tomto Experimentálním Modu <RedHighlight>mnoho částí hry není přeloženo a zobrazují se v angličtině</RedHighlight>, bez ohledu na vybraný jazyk. To nám umožňuje přidávat nový obsah a provádět rychlé změny, aniž bychom museli čekat na časově náročné překlady.\n\nDůrazně doporučujeme, abyste se připojili k našemu oficiálnímu serveru na Discordu a účastnili se diskuse o novém obsahu."
viVN = "Phiên bản này của Timberborn cung cấp cho bạn quyền truy cập vào các tính năng thử nghiệm, chưa hoàn thiện. Do đó, nó có nhiều khả năng sẽ bao gồm cả lỗi nghiêm trọng. Bạn thật sự là một con nhím dũng cảm.\n\nCác bản lưu thử nghiệm được lưu trữ riêng biệt khỏi trò chơi chính. Các bản cập nhật có thể ảnh hưởng đến khả năng tương thích của các bản lưu.\n\nTrong Mod Thử Nghiệm này <RedHighlight>nhiều phần của trò chơi không được dịch và được hiển thị bằng tiếng Anh</RedHighlight>, bất kể ngôn ngữ đã chọn. Điều này cho phép chúng tôi thêm nội dung mới và thực hiện các thay đổi nhanh chóng mà không cần chờ đợi các bản dịch tốn thời gian.\n\nChúng tôi khuyến khích mạnh mẽ bạn tham gia vào máy chủ Discord chính thức của chúng tôi và tham gia vào cuộc thảo luận về nội dung mới."

