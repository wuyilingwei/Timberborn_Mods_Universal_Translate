["Building.AdvancedBreedingPod.FlavorDescription"]
new = "Ideea a apărut când un pui de castor a căzut într-un cazan plin cu extract și a avut o creștere uriașă după ce l-a băut pe tot."
status = "normal"
raw = "Ideea a apărut când un pui de castor a căzut într-un cazan plin cu extract și a avut o creștere uriașă după ce l-a băut pe tot."
enUS = "The idea came when a baby beaver fell into a cauldron full of extract and had a huge growth spurt after drinking it all."
zhCN = "“这个想法源于一只小海狸掉进一个装满提取物的锅中，喝完后它的成长异常迅速。”"
zhTW = "這個想法出現於一只小海狸掉進一鍋滿是提取物的鍋中，喝完後它的成長變得驚人。"
ruRU = "Идея возникла, когда бельчонок упал в котел, полный экстракта, и после того, как выпил его полностью, резко вырос."
jaJP = "「このアイデアは、ビーバーの子供が抽出物が満たされた鍋に落ち、すべてを飲み干した後に巨大に成長したときに思いつかれました。」"
frFR = "L'idée est née lorsqu'un petit castor est tombé dans une marmite pleine d'extrait et a connu une croissance énorme après l'avoir tout bu."
deDE = "Die Idee entstand, als ein Biberjunge in einen Kessel voller Extrakt fiel und nach dem Trinken des gesamten Inhalts ein enormes Wachstum hatte."
plPL = "Pojął się, gdy młody bóbr wpadł do kotła pełnego ekstraktu i miał ogromny wzrost po wypiciu go do dna."
ptBR = "A ideia surgiu quando um filhote de castor caiu em uma caldeira cheia de extrato e teve um crescimento enorme depois de bebê-lo todo."
koKR = "사실은 아기 비버가 추출물로 가득 찬 솥에 빠졌을 때 아이디어가 떠올랐고, 다 마신 후에 엄청나게 성장했다는 것이다."
viVN = "Ý tưởng này xuất hiện khi một chú nhím nhỏ rơi vào một nồi đầy tinh chất và đã có một sự phát triển vượt bậc sau khi uống hết."

["Building.Agora.Description"]
status = "normal"
raw = "Un loc mare de adunare unde castorii pot discuta subiecte legate de lemn."
enUS = "A large gathering place where beavers can discuss wood-related topics."
zhCN = "一个大聚会场所，海狸可以讨论与木材相关的话题。"
zhTW = "一個大型聚會場所，海狸可以在這裡討論與木材相關的話題。"
ruRU = "Большое место для сбора, где бобры могут обсуждать темы, связанные с деревом."
jaJP = "「ビーバーたちが木に関する話題を話し合うことができる大きな集会所。」"
frFR = "Un grand lieu de rassemblement où les castors peuvent discuter de sujets liés au bois."
deDE = "Ein großer Versammlungsort, an dem die Biber Holzthemen diskutieren können."
plPL = "Wielkie miejsce zgromadzeń, gdzie bobry mogą dyskutować na tematy związane z drewnem."
ptBR = "Um grande local de reunião onde os castores podem discutir assuntos relacionados à madeira."
koKR = "비버들이 나무와 관련된 주제를 논의할 수 있는 넓은 집회 장소입니다."
csCZ = "Velké místo setkávání, kde bobři mohou diskutovat o tématech týkajících se dřeva."
viVN = "Một địa điểm lớn để tập hợp nơi những con beaver có thể thảo luận về các vấn đề liên quan đến gỗ."

