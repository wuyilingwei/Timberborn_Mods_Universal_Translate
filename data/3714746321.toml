["Tutorial.VerticalArchitecture.BuildRooftopTerrace"]
raw = "În pustiu, este important să optimizezi utilizarea spațiului. Castorii fac asta prin dezvoltarea verticală a orașelor lor.\n\nUnele clădiri, cum ar fi Cabanele, au acoperișuri plate care pot susține alte structuri.\n\nHai să construim acum o Terasă pe Acoperiș. S-ar putea să fie nevoie să folosești Scări pentru a o conecta la district."
status = "normal"
enUS = "In the wasteland, it's important to optimize space usage. Beavers do this through vertical development of their cities.\n\nSome buildings, like Cabanas, have flat roofs that can support other structures.\n\nLet's build a Rooftop Terrace now. You might need to use Ladders to connect it to the district."
zhCN = "在荒漠中，优化空间的使用至关重要。海狸通过垂直发展他们的城市来做到这一点。\n\n一些建筑，比如小屋，拥有可以支撑其他结构的平坦屋顶。\n\n现在让我们来建造一个屋顶露台。你可能需要使用楼梯将其连接到区域。"
zhTW = "在荒野中，優化空間的使用是至關重要的。海狸通過城市的垂直發展來實現這一點。\n\n某些建築物，例如小屋，擁有可以支撐其他結構的平頂。\n\n現在讓我們來建造一個屋頂露台。你可能需要使用樓梯將其連接到區域。"
ruRU = "В пустыне важно оптимизировать использование пространства. Бобры делают это, развивая свои города вертикально.\n\nНекоторые здания, такие как Хижины, имеют плоские крыши, которые могут поддерживать другие конструкции.\n\nДавайте построим сейчас Террасу на Крыше. Возможно, вам понадобится использовать Лестницы, чтобы соединить ее с округом."
jaJP = "荒れ地では、スペースを最適化することが重要です。ビーバーたちは自分たちの都市を垂直に発展させることでこれを実現します。\n\n小屋のような一部の建物には、他の構造物を支えることができるフラットな屋根があります。\n\nさあ、今すぐ屋上テラスを建設しましょう。地区に接続するために階段を使う必要があるかもしれません。"
frFR = "Dans le désert, il est important d'optimiser l'utilisation de l'espace. Les castors font cela en développant leurs villes de manière verticale.\n\nCertaines constructions, comme les Cabannes, ont des toits plats qui peuvent supporter d'autres structures.\n\nConstruisons maintenant une Terrasse sur le Toit. Vous pourriez avoir besoin d'utiliser des Escaliers pour la connecter au quartier."
deDE = "Im Ödland ist es wichtig, die Raumnutzung zu optimieren. Die Biber tun dies durch die vertikale Entwicklung ihrer Städte.\n\nEinige Gebäude, wie die Hütten, haben flache Dächer, die andere Strukturen tragen können.\n\nLass uns jetzt eine Dachterrasse bauen. Möglicherweise musst du Treppen verwenden, um sie mit dem Bezirk zu verbinden."
plPL = "W pustyni ważne jest, aby zoptymalizować wykorzystanie przestrzeni. Bobry osiągają to poprzez rozwój pionowy swoich miast.\n\nNiektóre budynki, takie jak Chatki, mają płaskie dachy, które mogą wspierać inne struktury.\n\nZbudujmy teraz Taras na Dachu. Może być konieczne użycie Schodów, aby połączyć go z dzielnicą."
ptBR = "Neste deserto, é importante otimizar o uso do espaço. Os castores fazem isso por meio do desenvolvimento vertical de suas cidades.\n\nAlguns edifícios, como as Cabines, têm telhados planos que podem suportar outras estruturas.\n\nVamos construir agora um Terraço no Telhado. Pode ser necessário usar Escadas para conectá-lo ao distrito."
koKR = "사막에서는 공간 활용을 최적화하는 것이 중요합니다. 비버들은 도시의 수직 발전을 통해 이를 실현합니다.\n\n오두막과 같은 일부 건물은 다른 구조물을 지탱할 수 있는 평평한 지붕을 가지고 있습니다.\n\n이제 옥상 테라스를 건설해 봅시다. 이를 지구와 연결하기 위해서는 계단이 필요할 수 있습니다."
csCZ = "V poušti je důležité optimalizovat využití prostoru. Bobři to dělají prostřednictvím vertikálního rozvoje svých měst.\n\nNěkteré budovy, jako jsou Chaty, mají ploché střechy, které mohou podpírat další struktury.\n\nPojďme teď postavit Terasu na Střeše. Možná bude potřeba použít Schody, aby se spojila s distriktem."
viVN = "Trong môi trường khắc nghiệt, việc tối ưu hóa không gian là rất quan trọng. Loài bobo đã làm điều này bằng cách phát triển các thành phố của chúng theo chiều dọc.\n\nMột số tòa nhà, chẳng hạn như Nhà gỗ, có mái bằng có thể hỗ trợ các cấu trúc khác.\n\nHãy cùng xây dựng một Sân thượng ngay bây giờ. Có thể bạn sẽ cần sử dụng Thang để kết nối nó với khu vực."

