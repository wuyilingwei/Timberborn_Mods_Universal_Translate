["BuilderPriorityTool.Description"]
status = "normal"
raw = "Folosește acest instrument pentru a seta prioritatea pentru construcții, demolări și colectarea bunurilor din dărâmături."
enUS = "Use this tool to set the priority for construction, demolition, and collecting goods from rubble."
zhCN = "使用该工具设置建筑、拆除和从废墟中收集物品的优先级。"
zhTW = "使用此工具設置建築、拆除和從殘骸中收集物品的優先級。"
ruRU = "Используйте этот инструмент, чтобы установить приоритет для строительств, сносов и сбора ресурсов из обломков."
jaJP = "このツールを使用して、建設、解体、廃墟からの資源収集の優先順位を設定します。"
frFR = "Utilisez cet outil pour définir la priorité des constructions, des démolitions et de la collecte des objets dans les débris."
deDE = "Verwende dieses Werkzeug, um die Priorität für den Bau, Abriss und die Sammlung von Waren aus Trümmern festzulegen."
plPL = "Użyj tego narzędzia, aby ustawić priorytet dla budowli, wyburzeń i zbierania dóbr z gruzów."
ptBR = "Use esta ferramenta para definir a prioridade para construções, demolições e coleta de bens dos destroços."
koKR = "이 도구를 사용하여 건설, 철거 및 잔해에서 자원을 수집하는 우선순위를 설정하십시오."
csCZ = "Použijte tento nástroj k nastavení priority pro stavby, demolice a sběr zboží z troskách."
viVN = "Sử dụng công cụ này để thiết lập ưu tiên cho việc xây dựng, phá hủy và thu thập hàng hóa từ đống đổ nát."

["BuilderPriorityTool.Tip"]
status = "normal"
raw = "Fă clic pe un obiect pentru a-i seta prioritatea sau ține apăsat butonul pentru a selecta o zonă mai mare."
enUS = "Click on an object to set its priority or hold the button down to select a larger area."
zhCN = "单击一个对象以设置其优先级，或按住按钮选择更大区域。"
zhTW = "點擊一個物件以設定其優先權，或長按按鈕以選擇更大的區域。"
ruRU = "Щелкните на объект, чтобы установить приоритет, или удерживайте кнопку, чтобы выбрать большую область."
jaJP = "オブジェクトをクリックして優先度を設定するか、ボタンを長押ししてより大きな範囲を選択します。"
frFR = " cliquez sur un objet pour définir sa priorité ou maintenez le bouton enfoncé pour sélectionner une zone plus grande."
deDE = "Klicke auf ein Objekt, um seine Priorität festzulegen, oder halte die Taste gedrückt, um ein größeres Gebiet auszuwählen."
plPL = "Kliknij na obiekt, aby ustawić jego priorytet lub przytrzymaj przycisk, aby zaznaczyć większy obszar."
ptBR = "Clique em um objeto para definir sua prioridade ou mantenha pressionado o botão para selecionar uma área maior."
koKR = "객체를 클릭하여 우선 순위를 설정하거나 버튼을 누른 채로 더 큰 영역을 선택합니다."
csCZ = "Klikněte na objekt, abyste nastavili jeho prioritu, nebo podržte tlačítko pro výběr větší oblasti."
viVN = "Nhấp vào một đối tượng để thiết lập mức độ ưu tiên của nó hoặc giữ nút để chọn một khu vực lớn hơn."

["Building.AdvancedBreedingPod.Description"]
status = "normal"
raw = "Folosește un proces avansat de reproducere pentru a produce castori adulți, dornici să înceapă munca."
enUS = "Uses an advanced breeding process to produce adult beavers eager to start working."
zhCN = "使用先进的繁殖过程来生成准备工作的成年海狸。"
zhTW = "使用先進的繁殖過程來生產渴望開始工作的成年海狸。"
ruRU = "Использует продвинутый процесс размножения для производства взрослых бобров, готовых начать работу."
jaJP = "高度な繁殖プロセスを使用して、働くことを望む成体のビーバーを生産します。"
frFR = "Utilise un processus avancé de reproduction pour produire des castors adultes, prêts à commencer le travail."
deDE = "„Verwendet einen fortgeschrittenen Fortpflanzungsprozess, um erwachsene Biber zu produzieren, die bereit sind, die Arbeit zu beginnen.“"
plPL = "Użyj zaawansowanego procesu hodowli, aby wyprodukować dorosłe bobry, gotowe do pracy."
ptBR = "Usa um processo avançado de reprodução para produzir castores adultos, prontos para começar a trabalhar."
koKR = "성숙한 비버를 생산하기 위해 고급 번식 프로세스를 사용하여 일할 준비가 된 비버를 생산합니다."
csCZ = "Používá pokročilý proces rozmnožování k produkci dospělých bobrů, kteří se těší na začátek práce."
viVN = "Sử dụng quy trình sinh sản tiên tiến để tạo ra những con hải ly trưởng thành, sẵn sàng bắt tay vào công việc."

