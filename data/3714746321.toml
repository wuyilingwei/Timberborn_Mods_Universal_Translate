["Building.SmallTank.FlavorDescription"]
raw = "Faptul că au învățat cum să economisească fiecare picătură de apă i-a ajutat pe castori să se adapteze la mediul aspru."
status = "normal"
enUS = "Their ability to learn how to save every drop of water has helped beavers adapt to the harsh environment."
zhCN = "他们学会了如何节约每一滴水，这帮助海狸适应了严酷的环境。"
zhTW = "他們學會如何節省每一滴水的事實幫助海狸適應惡劣的環境。"
ruRU = "Тот факт, что они научились экономить каждую каплю воды, помог бобрам адаптироваться к суровой среде."
jaJP = "水の一滴一滴を節約する方法を学んだことが、ビーバーたちが厳しい環境に適応するのに役立ちました。"
frFR = "Le fait qu'ils aient appris à économiser chaque goutte d'eau a aidé les castors à s'adapter à l'environnement rude."
deDE = "Die Tatsache, dass sie gelernt haben, jeden Tropfen Wasser zu sparen, hat den Bibern geholfen, sich an die raue Umgebung anzupassen."
plPL = "Fakt, że nauczyli się oszczędzać każdą kroplę wody, pomógł bobrom przystosować się do surowego środowiska."
ptBR = "O fato de terem aprendido a economizar cada gota de água ajudou os castores a se adaptarem ao ambiente hostil."
koKR = "그들이 물방울 하나하나를 아끼는 법을 배운 것은 비버들이 혹독한 환경에 적응하는 데 도움을 주었습니다."
csCZ = "To, že se naučili šetřit každou kapku vody, pomohlo bobrům přizpůsobit se drsnému prostředí."
viVN = "Cái việc họ đã học cách tiết kiệm từng giọt nước đã giúp những con hải ly thích nghi với môi trường khắc nghiệt."

