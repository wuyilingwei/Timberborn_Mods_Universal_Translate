["Building.Ruins.FlavorDescription"]
raw = "Împrăștiate pe tot ținutul, ruinele umane dărăpănate le-au oferit castorilor inimaginabilul - o calitate superioară lemnului."
status = "normal"
enUS = "Scattered throughout the land, the dilapidated human ruins have given the beavers the unimaginable - a superior quality of wood."
zhCN = "遍布全国的破败人类遗迹为海狸们提供了不可思议的东西——一种优于木材的品质。"
zhTW = "散落在整個領土，破敗的人類遺跡為海狸們提供了無法想像的東西——一種優質的木材。"
ruRU = "Разбросанные по всему краю, разрушенные человеческие руины предоставили бобрам невообразимое - древесину высшего качества."
jaJP = "「様々な土地に広がる、人間の朽ち果てた遺跡は、ビーバーたちにとって想像を絶するものを提供した - 木材の優れた質である。」"
frFR = "Éparpillées à travers le pays, les ruines humaines en ruine ont offert aux castors l'inimaginable - une qualité supérieure au bois."
deDE = "Über das ganze Land verstreut bieten die maroden menschlichen Ruinen den Bibern das Unglaubliche - eine Holzqualität, die unübertroffen ist."
plPL = "Rozrzucone po całej krainie, zniszczone ludzkie ruiny dostarczyły bobrom niepojętego - drewnianej jakości znacznie wyższej."
ptBR = "Espalhadas por todo o território, as ruínas humanas em ruínas ofereceram aos castores o inimaginável - uma qualidade superior à madeira."
koKR = "온 땅에 흩어져 있는 폐허가 된 인간의 유적들은 비버들에게 상상할 수 없는 것을 제공했습니다 - 우수한 품질의 나무입니다."
csCZ = "Poházené po celé zemi, zchátralé lidské ruiny poskytly bobrům nepředstavitelné - kvalitu dřeva nad rámec."
viVN = "Rải rác trên khắp vùng đất, những tàn tích của con người đã mang đến cho những chú nhím điều không thể tưởng tượng - một loại gỗ vượt trội."

["Building.Scarecrow.Description"]
raw = "O decorațiune de câmp, menită odinioară să sperie păsările, aduce acum încântare atât tinerilor, cât și bătrânilor."
status = "normal"
enUS = "A field decoration, once intended to scare away birds, now brings delight to both the young and the old."
zhCN = "“一种曾经用来吓鸟的田野装饰品，现在给年轻人和老年人都带来了欢乐。”"
zhTW = "一個曾經用來嚇跑鳥類的田野裝飾品，現在為年輕人和老年人帶來愉悅。"
ruRU = "«Декорация поля, когда-то предназначенная для отпугивания птиц, теперь приносит радость как молодым, так и старым.»"
jaJP = "かつて鳥を怖がらせるための装飾品だった野原の飾りが、今では若者も年配者も楽しませるものとなった。"
frFR = "Une décoration de champ, autrefois destinée à effrayer les oiseaux, apporte désormais de la joie tant aux jeunes qu'aux anciens."
deDE = "Eine Felddekoration, die einst dazu gedacht war, Vögel zu erschrecken, erfreut nun sowohl die Jungen als auch die Alten."
plPL = "To dekoracja na polu, pierwotnie mająca na celu odstraszanie ptaków, teraz przynosi radość zarówno młodym, jak i starszym."
ptBR = "Uma decoração de campo, destinada outrora a espantar os pássaros, agora traz encanto tanto para jovens quanto para idosos."
koKR = "한때 새들을 무찌르기 위해 만들어진 들판의 장식이 이제는 젊은이들과 노인들에게 모두 기쁨을 가져다줍니다."
csCZ = "Pole decorace, který měl kdysi vystrašit ptáky, nyní přináší potěšení jak mladým, tak starým."
viVN = "Một trang trí đồng ruộng, được tạo ra từ trước để dọa chim, giờ đây mang lại niềm vui cho cả thanh niên lẫn người già."

