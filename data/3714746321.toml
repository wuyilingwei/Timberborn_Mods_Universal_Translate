["LoadingIssue.MapIssuesWarning"]
new = "Probabil că acest lucru este cauzat de lipsă de moduri sau de o versiune mai nouă a jocului.\n\nPoți continua să joci, dar harta ta ar putea fi incompletă."
status = "normal"
raw = "Probabil că acest lucru este cauzat de lipsă de moduri sau de o versiune mai nouă a jocului.\n\nPoți continua să joci, dar harta ta ar putea fi incompletă."
enUS = "This is likely caused by a lack of mods or a newer version of the game.\n\nYou can continue to play, but your map may be incomplete."
zhCN = "“这可能是由于缺少模组或游戏的新版本造成的。\n\n你可以继续玩，但你的地图可能会不完整。”"
zhTW = "此問題可能是由於缺少模組或遊戲的較新版本所造成的。\n\n您可以繼續遊玩，但您的地圖可能不完整。"
ruRU = "Вероятно, это вызвано отсутствием модов или более новой версии игры.\n\nВы можете продолжать играть, но ваша карта может быть неполной."
frFR = "Il est probable que cela soit causé par un manque de mods ou par une version plus récente du jeu.\n\nVous pouvez continuer à jouer, mais votre carte pourrait être incomplète."
deDE = "Wahrscheinlich wird dies durch fehlende Mods oder eine neuere Version des Spiels verursacht.\n\nDu kannst weiterspielen, aber deine Karte könnte unvollständig sein."
plPL = "Prawdopodobnie jest to spowodowane brakiem modów lub nowszą wersją gry.\n\nMożesz kontynuować grę, ale twoja mapa może być niekompletna."
ptBR = "Provavelmente isso é causado pela falta de mods ou por uma versão mais nova do jogo.\n\nVocê pode continuar jogando, mas seu mapa pode estar incompleto."
koKR = "이 문제는 모드 부족이나 게임의 최신 버전 때문일 수 있습니다.\n\n계속 게임을 진행할 수 있지만, 당신의 맵이 불완전할 수 있습니다."
csCZ = "Pravděpodobně je to způsobeno nedostatkem modifikací nebo novější verzí hry.\n\nMůžeš pokračovat ve hře, ale má mapa by mohla být neúplná."
viVN = "Có thể điều này do thiếu các chế độ hoặc phiên bản mới hơn của trò chơi.\n\nBạn có thể tiếp tục chơi, nhưng bản đồ của bạn có thể chưa hoàn chỉnh."

