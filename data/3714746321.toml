["Tutorial.Dams.BuildDam"]
raw = "Depozitarea apei în rezervoare menține castorii hidratați, dar supraviețuirea pe termen lung depinde de controlul fluxului de apă.\n\nConstruiți un șir de baraje de-a lungul celui mai apropiat râu, de la un mal la altul, și observați ce se întâmplă."
status = "normal"
enUS = "Storing water in reservoirs keeps beavers hydrated, but long-term survival depends on controlling the water flow.\n\nBuild a series of dams along the nearest river, from bank to bank, and observe what happens."
zhCN = "将水储存在水库中可以保持海狸的水分，但长期生存依赖于水流的控制。\n\n沿着最近的河流从一边到另一边建造一系列坝，并观察会发生什么。"
zhTW = "在水庫中儲存水以保持海狸的水分，但長期生存取決於水流的控制。\n\n沿著最近的河流建造一系列壩，從一岸延伸到另一岸，並觀察會發生什麼。"
ruRU = "Хранение воды в резервуарах поддерживает бобров в увлажненном состоянии, но долгосрочное выживание зависит от контроля потока воды.\n\nПостройте ряд плотин вдоль ближайшей реки, от одного берега до другого, и смотрите, что произойдет."
jaJP = "ダムに水を貯蔵することでビーバーを潤すことができるが、長期的な生存は水流の管理に依存している。\n\n最寄りの川に沿って、一端から他端まで一連の堰を建設し、何が起こるかを観察しよう。"
frFR = "Stocker l'eau dans des réservoirs maintient les castors hydratés, mais la survie à long terme dépend du contrôle du flux d'eau.\n\nConstruisez une série de barrages le long de la rivière la plus proche, d'une rive à l'autre, et observez ce qui se passe."
deDE = "Die Speicherung von Wasser in Reservoirs hält die Biber hydratisiert, aber das langfristige Überleben hängt von der Kontrolle des Wasserflusses ab.\n\nBauen Sie eine Reihe von Dämmen entlang des nächstgelegenen Flusses, von einem Ufer zum anderen, und beobachten Sie, was passiert."
plPL = "Przechowywanie wody w zbiornikach utrzymuje bobry nawadniane, ale długoterminowe przetrwanie zależy od kontroli przepływu wody.\n\nZbuduj szereg tam wzdłuż najbliższej rzeki, od jednego brzegu do drugiego, i obserwuj, co się stanie."
ptBR = "Armazenar água em reservatórios mantém os castores hidratados, mas a sobrevivência a longo prazo depende do controle do fluxo de água.\n\nConstrua uma série de represas ao longo do rio mais próximo, de uma margem à outra, e observe o que acontece."
koKR = "저수지에 물을 저장하면 비버가 수분을 유지할 수 있지만 장기적인 생존은 물의 흐름 제어에 달려 있습니다.\n\n가장 가까운 강을 따라 양쪽 기슭에서 댐을 세우고 무슨 일이 일어나는지 관찰하십시오."
csCZ = "Uskladnění vody v nádržích udržuje bobry hydratované, ale dlouhodobé přežití závisí na kontrole toku vody.\n\nPostavte řadu hrází podél nejbližší řeky, od břehu k břehu, a sledujte, co se stane."
viVN = "Việc lưu trữ nước trong các bể chứa giữ cho những con nhím được cung cấp nước, nhưng sự sống lâu dài phụ thuộc vào việc kiểm soát dòng chảy của nước.\n\nXây dựng một dãy đập dọc theo con sông gần nhất, từ bờ này sang bờ kia, và quan sát những gì xảy ra."

