["MapMetadata.Oasis.Description"]
raw = "Un refugiu verde singuratic în pustiu, înconjurat de acvifere, accesibile prin inginerie ingenioasă a castorilor."
status = "normal"
enUS = "A lonely green refuge in the desert, surrounded by aquifers, accessible through the beavers' ingenious engineering."
zhCN = "“在荒漠中孤独的绿色避风港，周围环绕着地下水源，通过海狸的巧妙工程可达。”"
zhTW = "在荒漠中孤獨的綠洲，四周環繞著水源，通過河狸的巧妙工程可通達。"
ruRU = "Оазис - зелёное уединенное убежище в пустыне, окруженное водоносными слоями, доступное благодаря изобретательной инженерии бобров."
jaJP = "「孤独な緑の隠れ家、周囲を水源に囲まれ、ビーバーの巧妙な技術によってアクセス可能な場所。」"
frFR = "Un refuge vert solitaire dans le désert, entouré de nappes phréatiques, accessible grâce à l'ingénierie ingénieuse des castors."
deDE = "Ein einsames grünes Refugium in der Wüste, umgeben von Aquiferen, erreichbar durch die ingenieuse Technik der Biber."
plPL = "Samotna, zielona oaza na pustyni, otoczona aquiferami, dostępnymi dzięki pomysłowemu inżynierii bobrów."
ptBR = "Um refúgio verde solitário no deserto, cercado por aquíferos, acessíveis através da engenharia engenhosa dos castores."
koKR = "비어 있는 사막 속 외로운 녹색 피난처, 비버의 기발한 공학을 통해 접근할 수 있는 수원으로 둘러싸여 있습니다."
csCZ = "Osamělá zelená oáza uprostřed pouště, obklopená vodními zdroji, přístupná díky vynalézavému inženýrství bobrů."
viVN = "Một ốc đảo xanh tách biệt trong sa mạc, được bao quanh bởi các tầng nước ngầm, có thể tiếp cận thông qua kỹ thuật tài tình của những con béo."

