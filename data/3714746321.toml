["Building.ControlTower.FlavorDescription"]
status = "normal"
raw = "Un robot trebuie să respecte ordinele date de ființele castoare, cu excepția cazurilor în care castorii nu mai există."
enUS = "A robot must obey the orders given by the beaver beings, except in cases where the beavers no longer exist."
