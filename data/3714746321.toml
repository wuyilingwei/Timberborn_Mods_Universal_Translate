["Building.GearWorkshop.FlavorDescription"]
status = "normal"
raw = "„Roata din lemn e solidă!” a fost o expresie inventată de Ol' Kazko în timp ce promova industrializarea rapidă."
enUS = "The 'Wooden Wheel is Solid!' was a phrase coined by Ol' Kazko while promoting rapid industrialization."
zhCN = "“木制轮子坚固！”是老卡兹科在推广快速工业化时创造的表达。"
zhTW = "「木製的輪子是堅固的！」這是老卡茲科在推廣快速工業化時創造的表達。"
ruRU = "«Деревянное колесо крепкое!» — это выражение было придумано старым Казко во время его агитации за быструю индустриализацию."
jaJP = "「木製の車輪は頑丈だ！」は、オル・カズコが急速な産業化を促進している間に作り出した表現です。"
frFR = "\"La roue en bois est solide !\" a été une expression inventée par Ol' Kazko lors de la promotion de l'industrialisation rapide."
deDE = "„Das hölzerne Rad ist stabil!” war ein Ausdruck, den Ol' Kazko erfand, während er die schnelle Industrialisierung förderte."
plPL = "„Drewniane koło jest solidne!” było wyrażeniem wymyślonym przez Ol' Kazko podczas promowania szybkiej industrializacji."
ptBR = "‘A roda de madeira é sólida!’ foi uma expressão inventada por Ol' Kazko enquanto promovia a industrialização rápida."
koKR = "„나무 바퀴는 튼튼하다!”는 올 카즈코가 급속한 산업화를 홍보하면서 만든 표현이다."
csCZ = "„Dřevěné kolo je pevné!” byla fráze vynálezce Ol' Kazka, když propagoval rychlou industrializaci."
viVN = "„Bánh xe gỗ rất chắc chắn!” là một câu nói được Ol' Kazko sáng chế trong quá trình quảng bá sự công nghiệp hóa nhanh chóng."

