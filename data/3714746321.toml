["Building.MediumTank.FlavorDescription"]
raw = "După Marea Secetă, castorii și-au făcut o regulă să aibă întotdeauna câteva dintre acestea prin preajmă."
status = "normal"
enUS = "After the Great Drought, the beavers made it a rule to always have some of these around."
zhCN = "在大干旱之后，海狸们养成了随身携带一些这样的东西的习惯。"
zhTW = "在大乾旱之後，海狸們制定了總是把一些這種東西留在身邊的規則。"
ruRU = "После Великой Засухи бобры установили правило всегда иметь несколько из них поблизости."
jaJP = "「大干ばつの後、ビーバーたちは常にこれらのいくつかを近くに置くことをルールにしました。」"
frFR = "Après la Grande Sécheresse, les castors ont pris l'habitude d'en avoir toujours quelques-uns à proximité."
deDE = "Nach der Großen Dürre haben die Biber sich zur Regel gemacht, immer einige davon in der Nähe zu haben."
plPL = "Po wielkiej suszy bobry przyjęły zasadę, aby zawsze mieć kilka z nich w pobliżu."
