viVN = "Vượt trội hơn cả Digitchewer, hiện đã nghỉ hưu."

["Building.Observatory.Description"]
status = "normal"
raw = "Explorând stelele, castorii dobândesc mai multe cunoștințe despre lumea în care trăiesc."
enUS = "By exploring the stars, beavers gain more knowledge about the world they live in."
zhCN = "通过探索星星，海狸们获得了更多有关它们生活的世界的知识。"
zhTW = "通過探索星星，河狸獲得了更多關於他們所生活的世界的知識。"
ruRU = "Исследуя звезды, бобры получают больше знаний о мире, в котором они живут."
jaJP = "星を探索することで、ビーバーは自分たちが住んでいる世界についての知識を深める。"
frFR = "En explorant les étoiles, les castors acquièrent plus de connaissances sur le monde dans lequel ils vivent."
deDE = "„Indem sie die Sterne erkunden, erwerben die Biber mehr Wissen über die Welt, in der sie leben.“"
plPL = "Zbadając gwiazdy, bobry zdobywają więcej wiedzy o świecie, w którym żyją."
ptBR = "Explorando as estrelas, os castores adquirem mais conhecimentos sobre o mundo em que vivem."
koKR = "별을 탐험함으로써 비버들은 그들이 살고 있는 세상에 대한 더 많은 지식을 얻게 됩니다."
csCZ = "Zkoumáním hvězd získávají bobři více znalostí o světě, ve kterém žijí."
viVN = "Khi khám phá các vì sao, những con nhím giành được nhiều kiến thức hơn về thế giới mà chúng sống."

