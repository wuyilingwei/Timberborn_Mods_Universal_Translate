deDE = "Die Eisen-Zähne wollen wie ihre Kreationen sein - immer härter, besser, schneller, stärker."
plPL = "Żelazne Zęby chcą być jak ich kreacje - zawsze twardsze, lepsze, szybsze, silniejsze."
ptBR = "Os Dentes de Ferro querem ser como suas criações - sempre mais fortes, melhores, mais rápidos, mais poderosos."
koKR = "강철 이빨들은 그들의 창조물처럼 되고 싶어합니다 - 항상 더 강하고, 더 좋고, 더 빠르고, 더 강력하게."
csCZ = "Železníci chtějí být jako jejich výtvory - vždy silnější, lepší, rychlejší, mocnější."
viVN = "Răng Sắt muốn trở thành như những sáng tạo của chúng - luôn cứng cáp hơn, tốt hơn, nhanh hơn, mạnh mẽ hơn."

