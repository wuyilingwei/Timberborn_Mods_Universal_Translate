raw = "Echilibrat, întărit și modelat la perfecție de generații de ingineri specializați în apă, acesta nu este „doar un bloc de lemn”."
status = "normal"
enUS = "Balanced, strengthened, and shaped to perfection by generations of water engineers, this is not 'just a block of wood'."
zhCN = "“经过几代专注于水利的工程师的平衡、加固和雕塑，这不仅仅是一个‘木头块’。”"
zhTW = "「這不是「只是一塊木頭」，而是經過數代專精於水利工程的工程師們均衡、加固、塑造成完美之作。」"
ruRU = "Сбалансированный, укрепленный и отшлифованный до совершенства поколениями инженеров, специализирующихся на воде, это не просто «блок дерева»."
jaJP = "「バランスが取れ、強化され、水の専門家である数世代の技術者によって完璧に形作られたこれらは、『ただの木のブロック』ではありません。」"
frFR = "Équilibré, renforcé et sculpté à la perfection par des générations d'ingénieurs spécialisés dans l'eau, ce n'est pas « juste un bloc de bois »."
deDE = "Ausgeglichen, verstärkt und perfekt geformt von Generationen von Ingenieuren, die auf Wasser spezialisiert sind, ist dies nicht „einfach nur ein Holzblock“."
plPL = "Wyważony, wzmocniony i uformowany do perfekcji przez pokolenia inżynierów specjalizujących się w wodzie, to nie jest „tylko klocek drewna”."
ptBR = "Equilibrado, reforçado e moldado à perfeição por gerações de engenheiros especializados em água, isso não é 'apenas um bloco de madeira'."
koKR = "세대에 걸쳐 물 전문 엔지니어들에 의해 균형 잡힌, 강화된, 그리고 완벽하게 형상화된 이 구조물은 '단순한 목재 블록'이 아닙니다."
csCZ = "Vyvážený, zpevněný a tvarovaný k dokonalosti generacemi inženýrů specializovaných na vodu, tohle není „jen kus dřeva“."
viVN = "Cân bằng, được gia cố và hình thành hoàn hảo qua nhiều thế hệ kỹ sư chuyên về nước, đây không chỉ là 'một khối gỗ'."
trTR = "Dengele, güçlendirilmiş ve su konusunda uzmanlaşmış nesillerce mükemmel şekilde şekillendirilmiş, bu ‘sadece bir ahşap blok’ değildir."

