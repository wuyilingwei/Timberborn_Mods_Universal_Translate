["NaturalResource.Birch.FlavorDescription"]
raw = "„Țineți minte, puișori, nu decojiți prea multă scoarță! Face rău copacului!” —Ma’ Ngonel"
status = "normal"
enUS = "\"Remember, little ones, don't peel too much bark! It hurts the tree!\" —Ma' Ngonel"
zhCN = "“记住，小家伙们，不要剥太多树皮！这对树不好！” — Ma’ Ngonel"
zhTW = "「『記住，小寶貝們，別剝太多樹皮！這樣會傷害樹木！』—瑪·安戈內爾」"
ruRU = "«Помните, детки, не снимайте слишком много коры! Это вредит дереву!» —Ма’ Нгонел"
jaJP = "「覚えておいてね、子供たち、あまり樹皮を剥がさないで！木に悪影響を与えるから！」 —マ・ンゴネル"
frFR = "« N'oubliez pas, les petits, ne peler pas trop d'écorce ! Ça fait du mal à l'arbre ! » —Ma’ Ngonel"
deDE = "„Denkt daran, Küken, schält nicht zu viel Rinde ab! Es schadet dem Baum!” —Ma’ Ngonel"
plPL = "„Pamiętajcie, maluchy, nie zdejmujcie zbyt wiele kory! To szkodzi drzewu!” —Ma’ Ngonel"
ptBR = "“Lembrem-se, filhotes, não retirem muita casca! Isso machuca a árvore!” —Ma’ Ngonel"
koKR = "‘기억해, 아가들, 껍질을 너무 많이 벗기지 마! 나무에 해가 가!” —마’ 응고넬"
csCZ = "„Pamatujte, děti, neloupejte příliš mnoho kůry! Ublížíte stromu!” —Ma’ Ngonel"
viVN = "„Hãy nhớ, các con, đừng bóc quá nhiều vỏ cây! Điều đó sẽ làm hại cây!” —Ma’ Ngonel"

