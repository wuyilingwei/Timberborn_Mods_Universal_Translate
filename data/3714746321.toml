["Tutorial.Basics.ManagePause"]
raw = "Jocul poate fi întrerupt în orice moment, ceea ce te ajută să evaluezi situația și să planifici lucrurile."
status = "normal"
enUS = "The game can be paused at any time, which helps you assess the situation and plan accordingly."
zhCN = "游戏可以随时暂停，这帮助你评估情况并进行计划。"
zhTW = "遊戲可以隨時暫停，這可以幫助你評估情況並規劃事情。"
ruRU = "Игра может быть приостановлена в любое время, что поможет вам оценить ситуацию и спланировать действия."
jaJP = "ゲームはいつでも中断できるため、状況を評価し、計画を立てるのに役立ちます。"
frFR = "Le jeu peut être interrompu à tout moment, ce qui vous aide à évaluer la situation et à planifier les choses."
deDE = "Das Spiel kann jederzeit unterbrochen werden, was dir hilft, die Situation zu bewerten und deine nächsten Schritte zu planen."
plPL = "Gra jest w dowolnym momencie przerywana, co pomaga ocenić sytuację i zaplanować działania."
ptBR = "O jogo pode ser pausado a qualquer momento, o que te ajuda a avaliar a situação e planejar as coisas."
koKR = "게임은 언제든지 일시 중지할 수 있으며, 이를 통해 상황을 평가하고 계획을 세울 수 있습니다."
csCZ = "Hra může být pozastavena kdykoliv, což ti pomůže zhodnotit situaci a naplánovat další kroky."
viVN = "Trò chơi có thể bị tạm dừng bất cứ lúc nào, điều này giúp bạn đánh giá tình hình và lập kế hoạch cho các công việc."

["Tutorial.Basics.ManageSpeed"]
raw = "De asemenea, poți crește viteza jocului pentru a reduce timpul de nefuncționare în timp ce castorii tăi lucrează sau dorm."
status = "normal"
enUS = "You can also increase the game speed to reduce downtime while your beavers are working or sleeping."
zhCN = "你还可以提高游戏速度，以减少你的小浣熊工作或休息时的停顿时间。"
zhTW = "此外，您可以提高遊戲的速度，以減少您的海狸工作或睡覺時的空閒時間。"
ruRU = "Вы также можете увеличить скорость игры, чтобы сократить время простоя, пока ваши бобры работают или спят."
jaJP = "ゲームの速度を上げることで、ビーバーが作業したり眠っている間のダウンタイムを短縮できます。"
frFR = "Vous pouvez également augmenter la vitesse du jeu pour réduire le temps d'inactivité pendant que vos castors travaillent ou dorment."
deDE = "Du kannst auch die Spielgeschwindigkeit erhöhen, um die Ausfallzeit zu verkürzen, während deine Biber arbeiten oder schlafen."
plPL = "Możesz również zwiększyć prędkość gry, aby skrócić czas przestoju, podczas gdy twoje bobry pracują lub śpią."
