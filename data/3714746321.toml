["Building.Smelter.FlavorDescription"]
status = "normal"
raw = "Noua lume a castorilor e făurită în sudoare și miros de blană arsă."
enUS = "The new world of beavers is forged in sweat and the smell of burnt fur."
zhCN = "“新的海狸世界是在汗水和烧焦毛发的气味中锻造的。”"
zhTW = "「新的海狸世界是由汗水和燒焦的毛皮氣味所鑄就的。」"
ruRU = "Новый мир бобров создан в поте и запахе горелой шерсти."
jaJP = "ビーバーの新しい世界は、汗と焼けた毛の匂いの中で形作られています。"
frFR = "Le nouveau monde des castors est façonné dans la sueur et l’odeur de fourrure brûlée."
deDE = "Die neue Welt der Biber ist geformt aus Schweiß und dem Geruch von verbranntem Fell."
plPL = "Nowy świat bobrów jest kształtowany w pocie i zapachu spalonego futra."
ptBR = "O novo mundo dos castores é moldado em suor e cheiro de pele queimada."
koKR = "비버의 새로운 세계는 땀과 타버린 털 냄새로 만들어졌다."
csCZ = "Nový svět bobrů je utvářen v potu a vůni spálené srsti."
viVN = "Thế giới mới của những con hải ly được tạo ra từ mồ hôi và mùi lông cháy."

