["NaturalResource.Coffee.FlavorDescription"]
raw = "Castorii din vechime mestecau boabele pentru un plus de energie, însă Dinții de Fier au născocit o idee mai bună."
status = "normal"
enUS = "Ancient beavers chewed the beans for an extra boost of energy, but the Iron Teeth came up with a better idea."
zhCN = "古老的海狸咀嚼咖啡豆以获得额外的能量，但铁齿兽想出了一个更好的主意。"
zhTW = "古代的獾會咀嚼咖啡豆以獲得額外的能量，但鐵牙發明了更好的主意。"
ruRU = "Древние бобры жевали зерна для прилива энергии, но Железные Зубы придумали лучшую идею."
