["Building.DistrictCrossing.Description"]
status = "normal"
raw = "Echilibrează bunurile între cele două districte conectate. Fiecare parte are muncitori care distribuie bunuri între Punctul de Trecere al Districtului și restul districtului."
enUS = "Balances goods between the two connected districts. Each side has workers who distribute goods between the District Crossing and the rest of the district."
zhCN = "在两个连接的地区之间平衡货物。每个地区都有工人负责在地区通行点和该地区的其余部分之间分配货物。"
zhTW = "在連接的兩個區域之間平衡貨物。每個區域都有工人負責在區域通行點和區域內部之間分配貨物。"
ruRU = "Сбалансируйте товары между двумя соединенными районами. Каждая сторона имеет рабочих, которые распределяют товары между Перекрестком района и остальной частью района."
jaJP = "「接続された2つの地区間で商品をバランスさせます。各側には、地区の通過点と地区の残りの部分との間で商品を配分する労働者がいます。」"
frFR = "Équilibre les ressources entre les deux districts connectés. Chaque côté a des travailleurs qui distribuent les ressources entre le Point de Passage du District et le reste du district."
deDE = "Gleiche die Waren zwischen den beiden verbundenen Bezirken aus. Jede Seite hat Arbeiter, die Waren zwischen dem Punkt des Bezirksübergangs und dem Rest des Bezirks verteilen."
plPL = "Zarządzaj towarami między dwoma połączonymi dystryktami. Każda strona ma pracowników, którzy rozwożą towary między Punktami Przejazdu Dystryktu a resztą dystryktu."
ptBR = "Equilibra os bens entre os dois distritos conectados. Cada lado tem trabalhadores que distribuem bens entre o Ponto de Atravessamento do Distrito e o resto do distrito."
koKR = "연결된 두 지역 간에 자원을 균형 있게 분배합니다. 각 지역에는 지역 통과 지점과 나머지 지역 간에 자원을 분배하는 근로자가 있습니다."
