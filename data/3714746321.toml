["Building.Lodge.FlavorDescription"]
raw = "„Pe vremuri, o cabană era doar asta, o cabană. Și acum? Nu știu ce să zic.” —Ma’ Ngonel"
status = "normal"
enUS = "\"In the past, a lodge was just that, a lodge. And now? I don't know what to say.\" —Ma’ Ngonel"
zhCN = "“在以前，一个小屋只是一个小屋。现在呢？我不知道该怎么说。” —Ma’ Ngonel"
zhTW = "「往昔，小屋僅僅是這樣，小屋而已。那現在呢？我不知道該怎麼說。」—瑪·恩戈內爾"
ruRU = "«Когда-то хижина была просто хижиной. А сейчас? Не знаю, что сказать.» —Ма’ Нгонел"
