["NaturalResource.Carrot.FlavorDescription"]
raw = "Morcovii cruzi îi ajută pe castori să își echilibreze dieta fără a renunța la bucuria de a ronțăi."
status = "normal"
enUS = "Raw carrots help beavers balance their diet without giving up the joy of munching."
zhCN = "生胡萝卜帮助海狸平衡饮食，而不必放弃啃咬的乐趣。"
zhTW = "生胡蘿蔔幫助海狸平衡飲食，而不失去咀嚼的樂趣。"
ruRU = "Сырые моркови помогают бобрам сбалансировать свой рацион, не отказывая себе в удовольствии грызть."
jaJP = "生のニンジンはビーバーが食事のバランスを保ちながら、かじる楽しみを失うことなく助けます。"
frFR = "Les carottes crues aident les castors à équilibrer leur régime alimentaire sans renoncer au plaisir de grignoter."
deDE = "Rohe Karotten helfen den Bibern, ihre Ernährung auszubalancieren, ohne auf das Vergnügen des Knabbern zu verzichten."
