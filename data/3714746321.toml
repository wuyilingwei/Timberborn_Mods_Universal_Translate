["Tutorial.MoreBeavers.GrowPopulation"]
raw = "Castorii nu se reproduc decât dacă există locuri libere pentru adăposturi. Castorii cu coadă populară au nevoie de doi adulți și un loc liber pentru ca magia să se întâmple.\n\n\nSfat: Puii de castor sunt numiți pisici mici."
status = "normal"
enUS = "The beavers only reproduce if there are free spaces for shelters. Beavers with a popular tail need two adults and one free spot for the magic to happen.\n\nTip: Beaver pups are called kits."
zhCN = "“海狸只有在有空位可以安置巢穴的时候才会繁殖。拥有流行尾巴的海狸需要两只成年海狸和一个空位，以便魔法可以发生。\n\n提示：海狸幼崽被称为小猫。”"
zhTW = "海狸只有在有空位可供築巢時才會繁殖。擁有流行尾巴的海狸需要兩隻成年海狸和一個空位才能讓魔法發生。\n\n建議：小海狸被稱為小貓。"
ruRU = "Бобры не размножаются, если нет свободных мест для жилищ. Бобрам с популярным хвостом нужны два взрослых и одно свободное место, чтобы волшебство произошло.\n\nСовет: Молодых бобров называют маленькими котятами."
jaJP = "ビーバーは避難所のための空き場所がない限り繁殖しません。一般的なビーバーには、魔法が起こるために2匹の大人と1つの空き場所が必要です。\n\nヒント: ビーバーの子供は小さな猫と呼ばれます。"
frFR = "Les castors ne se reproduisent que s'il y a des places libres pour des abris. Les castors à queue plate ont besoin de deux adultes et d'une place libre pour que la magie opère.\n\nAstuce : Les bébés castors sont appelés petits chatons."
deDE = "Die Biber reproduzieren sich nur, wenn es freie Plätze für Unterkünfte gibt. Biber mit populärer Schwänze benötigen zwei Erwachsene und einen freien Platz, damit die Magie geschehen kann.\n\nTipp: Biberbabys werden kleine Kätzchen genannt."
plPL = "Bobry rozmnażają się tylko wtedy, gdy są wolne miejsca na schronienia. Bobry z popularnym ogonem potrzebują dwóch dorosłych i jednego wolnego miejsca, aby magia mogła się wydarzyć.\n\nPorada: Młode bobry nazywane są małymi kotkami."
ptBR = "Os castores só se reproduzem se houver espaços livres para abrigos. Castores com cauda popular precisam de dois adultos e um espaço livre para que a mágica aconteça.\n\nDica: Os filhotes de castor são chamados de gatinhos."
koKR = "비버는 쉼터를 위한 빈 공간이 있을 때만 번식합니다. 인기 있는 꼬리를 가진 비버는 마법이 일어나기 위해 두 성인과 한 개의 빈 공간이 필요합니다.\n\n팁: 비버의 새끼는 작은 고양이라고 불립니다."
csCZ = "Bobři se množí pouze pokud jsou volná místa pro úkryty. Bobři se vzácným ocasem potřebují dva dospělé a jedno volné místo, aby se magie stala.\n\nTip: Mláďata bobra se nazývají malí kocouři."
viVN = "Beavers chỉ sinh sản khi có chỗ trống cho nơi trú ẩn. Những con beaver có đuôi phổ biến cần hai con trưởng thành và một chỗ trống để phép thuật xảy ra.\n\nMẹo: Nhím con được gọi là mèo nhỏ."

