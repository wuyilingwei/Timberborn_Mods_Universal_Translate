["MapMetadata.Hollows.Description"]
raw = "Aceste văi bogate sunt o zonă excelentă pentru potențialii coloniști. Peisajul sculptat ascunde multe oportunități - chiar și cei mai bătrâni castori șoptesc despre comori ascunse."
status = "normal"
enUS = "These rich valleys are an excellent area for potential settlers. The sculpted landscape hides many opportunities - even the oldest beavers whisper about hidden treasures."
zhCN = "这些富饶的河谷是潜在殖民者的绝佳区域。塑造的景观隐藏着许多机会——即便是老鼠们也在窃窃私语关于隐藏的宝藏。"
zhTW = "這些豐富的谷地是潛在殖民者的絕佳區域。雕刻的景觀隱藏著許多機會——即使是最老的海狸也在低聲談論隱藏的寶藏。"
ruRU = "Эти богатые долины - отличное место для потенциальных колонистов. Скульптурный ландшафт скрывает множество возможностей - даже самые старые бобры шепчутся о скрытых сокровищах."
jaJP = "この豊かな谷は、潜在的な入植者にとって素晴らしいエリアです。彫刻された風景は多くの機会を隠しています - たとえ最も年老いたビーバーでさえ隠された宝物についてささやいています。"
frFR = "Ces vallées riches sont une excellente zone pour les potentiels colons. Le paysage sculpté cache de nombreuses opportunités - même les castors les plus âgés murmurent des trésors cachés."
deDE = "Diese reichen Täler sind ein ausgezeichneter Ort für potenzielle Kolonisten. Die sculpted Landschaft verbirgt viele Möglichkeiten - selbst die ältesten Biber flüstern von versteckten Schätzen."
plPL = "Te doliny są doskonałym miejscem dla potencjalnych osadników. Rzeźbiony krajobraz kryje wiele możliwości - nawet najstarsi bobry szepczą o ukrytych skarbach."
ptBR = "Este vale rica é uma excelente área para potenciais colonos. A paisagem esculpida esconde muitas oportunidades - até os castores mais velhos sussurram sobre tesouros escondidos."
koKR = "이 풍부한 계곡은 잠재적인 식민지 개척자들에게 훌륭한 지역입니다. 조각된 풍경은 많은 기회를 숨기고 있습니다 - 가장 나이 많은 비버조차도 숨겨진 보물에 대해 속삭입니다."
csCZ = "Tyto bohaté údolí jsou skvělou oblastí pro potenciální kolonisty. Vytvarovaná krajina skrývá mnoho příležitostí - dokonce i ti nejstarší bobři šeptají o skrytých pokladech."
viVN = "Các thung lũng phong phú này là một khu vực tuyệt vời cho các người định cư tiềm năng. Cảnh quan được chạm khắc ẩn chứa nhiều cơ hội - ngay cả những con nhím già nhất cũng thì thầm về những kho báu ẩn giấu."

