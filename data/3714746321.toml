jaJP = "「腹筋の強さと柔軟性を高めるためのグループの構造化されたルーチンに特化したエリアです。」"
frFR = "Une zone dédiée aux routines structurées en groupe pour développer la force et la flexibilité des muscles abdominaux."
deDE = "Ein Bereich, der für strukturierte Gruppenroutinen vorgesehen ist, um die Stärke und Flexibilität der Bauchmuskeln zu entwickeln."
plPL = "Obszar przeznaczony dla zorganizowanych grupowych rutyn mających na celu rozwijanie siły i elastyczności mięśni brzucha."
