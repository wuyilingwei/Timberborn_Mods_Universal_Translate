["Tutorial.HaulersAndWorkforce.BuildHaulingPost"]
raw = "Pe măsură ce așezarea ta se extinde, aceasta procesează cantități mai mari de mărfuri. Transportul acestora ocupă o parte semnificativă din ziua muncitorilor tăi.\n\nTransportatorii ajută la asta. Ei mută mărfurile în întregul district, în funcție de cerere.\n\nHai să construim acum un Post de Transport."
status = "normal"
enUS = "As your settlement expands, it processes larger quantities of goods. Transporting them takes up a significant part of your workers' day.\n\nHaulers help with this. They move goods throughout the district based on demand.\n\nLet's build a Hauling Post now."
zhCN = "“随着你的定居点扩展，它处理更多的货物。运送这些货物占据了工人们大量的时间。\n\n搬运工在这方面提供帮助。他们根据需求在整个区域内移动货物。\n\n现在，让我们来建造一个运输站。”"
zhTW = "隨著你的定居點擴大，將處理更多的貨物。運輸這些貨物佔用了工人的大量時間。\n\n搬運工能幫助你。他們根據需求在整個區域內搬運貨物。\n\n讓我們現在建造一個搬運站。"
ruRU = "По мере расширения твоего поселения, оно обрабатывает все большие объемы товаров. Транспортировка их занимает значительное время у твоих работников.\n\nГрузчики помогают в этом. Они перемещают товары по всему району, в зависимости от спроса.\n\nДавай построим Пост Транспортировки сейчас."
jaJP = "「あなたの集落が拡大するにつれて、より多くの商品が処理されるようになります。これらの商品の輸送は、あなたの労働者の1日の大部分を占めます。\n\n運搬者がこれを手助けします。彼らは需要に応じて、地区内の商品の移動を行います。\n\nさあ、運搬所を建設しましょう。」"
frFR = "À mesure que ta colonie s'agrandit, elle traite des quantités plus importantes de marchandises. Leur transport occupe une partie significative de la journée de tes travailleurs.\n\nLes transporteurs aident à cela. Ils déplacent les marchandises dans tout le quartier, en fonction de la demande.\n\nConstruisons maintenant un Poste de Transport."
deDE = "Wenn sich deine Siedlung erweitert, verarbeitet sie größere Mengen an Waren. Der Transport dieser Waren nimmt einen erheblichen Teil des Tages deiner Arbeiter in Anspruch.\n\nTransportierer helfen dabei. Sie bewegen die Waren innerhalb des gesamten Bezirks nach Bedarf.\n\nLass uns jetzt einen Transportposten bauen."
plPL = "W miarę jak twoja osada się rozwija, przetwarza coraz większe ilości towarów. Transportowanie ich zajmuje znaczną część dnia twoich pracowników.\n\nPrzewoźnicy w tym pomagają. Przenoszą towary po całym dystrykcie w zależności od zapotrzebowania.\n\nZbudujmy teraz Post Transportowy."
ptBR = "Conforme sua colônia se expande, ela processa quantidades maiores de mercadorias. O transporte delas ocupa uma parte significativa do dia dos seus trabalhadores.\n\nOs Transportadores ajudam com isso. Eles movem mercadorias por todo o distrito, dependendo da demanda.\n\nVamos construir agora um Posto de Transporte."
koKR = " settlement이 확장됨에 따라 더 많은 양의 상품을 처리하게 됩니다. 이러한 상품의 운반은 노동자의 하루 중 상당한 시간을 차지합니다.\n\n운송인들이 이를 도와줍니다. 그들은 수요에 따라 지역 전체에서 상품을 이동시킵니다.\n\n이제 운송소를 세워봅시다."
csCZ = "Jak se vaše osada rozrůstá, zpracovává větší množství zboží. Transport těchto zásob zabírá významnou část pracovní doby vašich dělníků.\n\nPřepravci s tím pomáhají. Přesouvají zboží po celém okrese podle poptávky.\n\nTeď postavme Transportní stanici."
viVN = "Khi khu định cư của bạn mở rộng, nó xử lý khối lượng hàng hóa lớn hơn. Việc vận chuyển chúng chiếm một phần đáng kể trong ngày làm việc của công nhân của bạn.\n\nNhững người vận chuyển giúp điều đó. Họ di chuyển hàng hóa trong toàn khu vực, tùy thuộc vào nhu cầu.\n\nHãy cùng xây dựng một Bưu điện Vận chuyển ngay bây giờ."

["Tutorial.HaulersAndWorkforce.ChangeWorkforce"]
raw = "Unele locuri de muncă, cum ar fi Punctele de Transport, nu își ocupă toate locurile de muncă în mod implicit. Puteți modifica numărul de muncitori în panoul unei clădiri.\n\nDe asemenea, puteți controla modul în care sunt ocupate clădirile cu personal folosind prioritățile locului de muncă. De exemplu, Punctul de Transport poate fi de obicei setat la o prioritate mai mică a locului de muncă.\n\nSă încercăm acum."
status = "normal"
enUS = "Some jobs, such as Transport Points, do not fill all their positions by default. You can change the number of workers in a building's panel.\n\nYou can also control how buildings are staffed using job priorities. For example, the Transport Point can usually be set to a lower job priority.\n\nLet's try it now."
zhCN = "某些工作，如运输站，默认情况下并不会填满所有工作岗位。您可以在建筑面板中调整工人数量。\n\n您还可以通过工作优先级来控制建筑物的人员配置。例如，运输站通常可以设置为较低的工作优先级。\n\n现在让我们尝试一下。"
zhTW = "某些工作場所，例如運輸站，默認並不會占用所有工作崗位。您可以在建築的面板中修改工人的人數。\n\n您還可以通過工作優先級來控制建築物的員工配置。例如，運輸站通常可以設置為較低的工作優先級。\n\n現在我們來嘗試一下。"
ruRU = "Некоторые рабочие места, такие как Пункты Транспорта, не заполняют все вакансии по умолчанию. Вы можете изменить количество рабочих в панели здания.\n\nВы также можете контролировать, как здания заполняются персоналом, используя приоритеты рабочих мест. Например, Пункт Транспорта обычно можно установить на более низкий приоритет рабочего места.\n\nДавайте попробуем это сейчас."
jaJP = "「輸送ポイントのようないくつかの職は、デフォルトではすべての職を占有しません。建物のパネルで労働者の数を変更できます。\n\nまた、職場の優先順位を使用して、建物にスタッフがどのように配置されるかを制御できます。たとえば、輸送ポイントは通常、職場の優先度を低く設定できます。\n\nさあ、今試してみましょう。」"
frFR = "Certaines tâches, comme les Points de Transport, ne remplissent pas par défaut tous leurs postes. Vous pouvez modifier le nombre de travailleurs dans le panneau d'un bâtiment.\n\nVous pouvez également contrôler la manière dont les bâtiments sont occupés par le personnel en utilisant les priorités de travail. Par exemple, le Point de Transport peut généralement être réglé sur une priorité de travail plus basse.\n\nEssayons maintenant."
deDE = "Einige Arbeitsplätze, wie Transportpunkte, besetzen nicht standardmäßig alle Stellen. Sie können die Anzahl der Arbeiter im Panel eines Gebäudes ändern.\n\nAußerdem können Sie steuern, wie Gebäude mit Personal besetzt werden, indem Sie die Arbeitsprioritäten anpassen. Zum Beispiel kann der Transportpunkt normalerweise auf eine niedrigere Arbeitspriorität eingestellt werden.\n\nLassen Sie uns jetzt versuchen."
plPL = "Niektóre miejsca pracy, takie jak Punkty Transportowe, domyślnie nie zajmują wszystkich dostępnych miejsc pracy. Możesz zmienić liczbę pracowników w panelu budynku.\n\nMożesz również kontrolować, jak budynki są obsadzane pracownikami, używając priorytetów zatrudnienia. Na przykład, Punkt Transportowy może być zwykle ustawiony na niższy priorytet pracy.\n\nSpróbujmy teraz."
ptBR = "Alguns locais de trabalho, como os Pontos de Transporte, não ocupam todos os seus postos de trabalho por padrão. Você pode alterar o número de trabalhadores no painel de um edifício.\n\nAlém disso, você pode controlar como os edifícios são ocupados usando as prioridades de trabalho. Por exemplo, o Ponto de Transporte pode normalmente ser definido com uma prioridade de trabalho mais baixa.\n\nVamos tentar agora."
koKR = "일부 작업, 예를 들어 물류 센터는 기본적으로 모든 작업 자리를 채우지 않습니다. 건물 패널에서 근로자 수를 수정할 수 있습니다.\n\n또한 작업 우선 순위를 사용하여 건물의 인력 배치를 조정할 수 있습니다. 예를 들어, 물류 센터는 일반적으로 더 낮은 작업 우선 순위로 설정될 수 있습니다.\n\n자, 이제 시도해 보겠습니다."
csCZ = "Některá pracovní místa, jako jsou Dopravní Body, implicitně nezaplní všechna pracovní místa. Můžete změnit počet pracovníků v panelu budovy.\n\nTaké můžete kontrolovat, jak jsou budovy obsazovány personálem pomocí pracovních priorit. Například Dopravní Bod může být obvykle nastaven na nižší prioritu pracovní pozice.\n\nTeď to zkusme."
viVN = "Các công việc nhất định, như Điểm Vận Chuyển, không tự động lấp đầy tất cả các vị trí trong lúc ban đầu. Bạn có thể thay đổi số lượng công nhân trong bảng điều khiển của một tòa nhà.\n\nBạn cũng có thể kiểm soát cách mà các tòa nhà được lấp đầy với nhân sự bằng cách sử dụng mức ưu tiên công việc. Ví dụ, Điểm Vận Chuyển thường có thể được thiết lập với mức ưu tiên công việc thấp hơn.\n\nBây giờ hãy thử nhé."

["Tutorial.HaulersAndWorkforce.PauseHaulingPost"]
raw = "Puteți întrerupe clădirile și șantierele de construcții. Acest lucru vă oferă mai mult control asupra acțiunilor castorilor.\n\nDe exemplu, locurile de muncă întrerupte sunt eliberate automat, iar muncitorii se reatribuie la alte locuri de muncă disponibile.\n\nSelectați Punctul de Transport și întrerupeți-l făcând clic pe butonul din panoul său."
status = "normal"
enUS = "You can pause buildings and construction sites. This gives you more control over the actions of the beavers.\n\nFor example, paused jobs are automatically released, and workers are reassigned to other available jobs.\n\nSelect the Transport Point and pause it by clicking the button in its panel."
zhCN = "您可以暂停建筑物和建筑工地。这为您提供了对海狸行动的更多控制。\n\n例如，暂停的工作会自动释放，工人会重新分配到其他可用的工作岗位。\n\n选择运输点，通过单击其面板中的按钮来暂停它。"
zhTW = "您可以暫停建築和施工現場。這將使您對海狸的行動有更大的控制權。\n\n例如，暫停的工作會自動釋放，工人會被重新分配到其他可用的工作。\n\n選擇運輸點並通過單擊面板中的按鈕來暫停它。"
ruRU = "Вы можете приостановить здания и строительные площадки. Это дает вам больше контроля над действиями бобров.\n\nНапример, приостановленные рабочие места автоматически освобождаются, и рабочие перераспределяются на другие доступные вакансии.\n\nВыберите пункт транспортировки и приостановите его, нажав кнопку на его панели."
jaJP = "「建物や建設現場を一時停止することができます。これにより、ビーバーの行動をよりコントロールできます。\n\n例えば、一時停止された仕事は自動的に解放され、労働者は他の空いている仕事に再割り当てされます。\n\n輸送ポイントを選択し、パネルのボタンをクリックして一時停止します。」"
frFR = "Vous pouvez interrompre les bâtiments et les chantiers de construction. Cela vous donne plus de contrôle sur les actions des castors.\n\nPar exemple, les emplois interrompus sont automatiquement libérés, et les travailleurs sont réalignés sur d'autres emplois disponibles.\n\nSélectionnez le Point de Transport et interrompez-le en cliquant sur le bouton de son panneau."
deDE = "Sie können Gebäude und Baustellen pausieren. Dies gibt Ihnen mehr Kontrolle über die Aktionen der Biber.\n\nZum Beispiel werden unterbrochene Jobs automatisch freigegeben und die Arbeiter werden anderen verfügbaren Jobs zugewiesen.\n\nWählen Sie den Transportpunkt aus und pausieren Sie ihn, indem Sie auf die Schaltfläche in seinem Panel klicken."
plPL = "Możesz wstrzymać budynki i place budowy. Daje to większą kontrolę nad działaniami bobrów.\n\nNa przykład, wstrzymane miejsca pracy są automatycznie zwalniane, a pracownicy są przypisywani do innych dostępnych miejsc pracy.\n\nWybierz Punkt Transportu i wstrzymaj go, klikając przycisk w jego panelu."
ptBR = "Você pode interromper edifícios e canteiros de obras. Isso lhe dá mais controle sobre as ações dos castores.\n\nPor exemplo, os trabalhos interrompidos são liberados automaticamente, e os trabalhadores são realocados para outros trabalhos disponíveis.\n\nSelecione o Ponto de Transporte e interrompa-o clicando no botão em seu painel."
koKR = "건물과 건설 현장을 일시 중지할 수 있습니다. 이렇게 하면 비버의 행동을 더 잘 제어할 수 있습니다.\n\n예를 들어, 일시 중지된 작업은 자동으로 해제되며, 근로자는 다른 사용 가능한 작업에 재배치됩니다.\n\n운송 지점을 선택하고 패널의 버튼을 클릭하여 일시 중지하세요."
csCZ = "Můžete pozastavit budovy a staveniště. To vám dává větší kontrolu nad akcemi bobrů.\n\nNapříklad pozastavená pracovní místa jsou automaticky uvolněna a dělníci jsou přiděleni k jiným dostupným pracovním místům.\n\nVyberte Transportní bod a pozastavte ho kliknutím na tlačítko v jeho panelu."
viVN = "Bạn có thể tạm dừng các tòa nhà và công trình xây dựng. Điều này mang lại cho bạn nhiều quyền kiểm soát hơn đối với hành động của những con hải ly.\n\nVí dụ, các công việc bị tạm dừng sẽ tự động được giải phóng, và công nhân sẽ được phân công lại cho các công việc khác có sẵn.\n\nChọn Điểm Vận Chuyển và tạm dừng nó bằng cách nhấp vào nút trong bảng điều khiển của nó."

