["Tutorial.Housing.Lodges"]
raw = "Doi castori sunt mai buni decât unul! Casele îmbunătățesc bunăstarea castorilor tăi și permit populației tale de castori să crească.\n\nCastorii se atribuie automat locurilor de locuit disponibile."
status = "normal"
enUS = "Two beavers are better than one! Houses improve your beavers' well-being and allow your beaver population to grow.\n\nBeavers automatically assign themselves to available housing."
zhCN = "“两只海狸比一只好！房屋可以提高海狸的幸福感，并允许你的海狸数量增长。\n\n海狸会自动分配到可用的居住地点。”"
zhTW = "兩隻海狸比一隻好！住房可以提高海狸的福利，並使你的海狸人口增長。\n\n海狸會自動分配到可用的居住空間。"
ruRU = "Два бобра лучше, чем один! Дома улучшают благосостояние ваших бобров и позволяют вашей популяции бобров расти.\n\nБобры автоматически присваиваются доступным местам проживания."
jaJP = "「2匹のビーバーは1匹よりも優れています！家はビーバーの幸福を向上させ、あなたのビーバーの人口を増やすことができます。\n\nビーバーは自動的に利用可能な住居に配置されます。」"
frFR = "Deux castors valent mieux qu'un ! Les lodges améliorent le bien-être de vos castors et permettent à votre population de castors de croître.\n\nLes castors se répartissent automatiquement sur les logements disponibles."
deDE = "„Zwei Biber sind besser als einer! Die Lodges verbessern das Wohlbefinden deiner Biber und ermöglichen es deiner Biberpopulation zu wachsen.\n\nBiber weisen sich automatisch den verfügbaren Wohnplätzen zu.“"
plPL = "Dwa bobry są lepsze niż jeden! Domy poprawiają dobrostan twoich bobrów i pozwalają twojej populacji bobrów rosnąć.\n\nBobry automatycznie przypisują się do dostępnych miejsc mieszkalnych."
ptBR = "Dois castores são melhores que um! As casas melhoram o bem-estar dos seus castores e permitem que a sua população de castores cresça.\n\nOs castores se atribuem automaticamente aos locais de habitação disponíveis."
koKR = "두 마리 비버가 한 마리보다 낫습니다! 주택은 비버의 복지를 향상시키고 비버 인구의 성장을 허용합니다.\n\n비버는 자동으로 사용 가능한 거주지에 배정됩니다."
csCZ = "Dva bobři jsou lepší než jeden! Domky zlepšují pohodu tvých bobrů a umožňují tvé populaci bobrů růst.\n\nBobři se automaticky přidělují k dostupným obytným místům."
viVN = "“Đôi con chồn tốt hơn một! Các ngôi nhà cải thiện phúc lợi cho những con chồn của bạn và cho phép dân số chồn của bạn phát triển.\n\nChồn sẽ tự động được phân bổ vào các chỗ ở còn trống.”"

