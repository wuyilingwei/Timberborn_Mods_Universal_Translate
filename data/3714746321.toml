["Faction.IronTeeth.GameOver.Flavor"]
status = "normal"
raw = "Uneori, cea mai mică piesă defectă strică întreaga mașină."
enUS = "Sometimes, the smallest faulty part ruins the entire machine."
zhCN = "有时候，最小的故障部件会毁掉整台机器。"
zhTW = "有時，最小的故障部件會破壞整個機器。"
ruRU = "Иногда самая маленькая неисправная деталь портит всю машину."
jaJP = "「時には、最も小さな欠陥が全体の機械を壊すことがあります。」"
frFR = "Parfois, la plus petite pièce défectueuse ruinera toute la machine."
deDE = "Manchmal beschädigt das kleinste defekte Teil die ganze Maschine."
plPL = "Czasami najmniejsza uszkodzona część psuje cała maszynę."
ptBR = "Às vezes, a menor peça defeituosa estraga toda a máquina."
koKR = "때때로 가장 작은 결함이 전체 기계를 망친다."
csCZ = "Někdy i ten nejmenší vadný kus může zkazit celý stroj."
viVN = "Đôi khi, một mảnh ghép hỏng nhỏ nhất có thể phá hủy cả cỗ máy."

["Faction.IronTeeth.GameOver.Message"]
status = "normal"
raw = "Așezarea ta de la Dinți de Fier a căzut fără nicio șansă de recuperare. Acesta este sfârșitul."
enUS = "Your Iron Teeth settlement has fallen with no chance of recovery. This is the end."
zhCN = "你的铁齿部落已经崩溃，无法恢复。游戏结束。"
zhTW = "你的鐵牙派系已經崩潰，無法恢復。這就是結局。"
ruRU = "Ваше поселение Железных Зубов потерпело поражение без шансов на восстановление. Это конец."
jaJP = "「鉄の歯の集落は回復の望みもなく崩壊しました。これが終わりです。」"
frFR = "Votre colonie de Dents de Fer est tombée sans aucun espoir de rétablissement. C'est la fin."
deDE = "Deine Siedlung der Eisenbeißer ist ohne jede Chance auf Wiederherstellung gefallen. Das ist das Ende."
plPL = "Twoja osada z Żelaznymi Zębami upadła bez szans na odzyskanie. To koniec."
ptBR = "A sua colônia de Dentes de Ferro caiu sem chance de recuperação. Este é o fim."
koKR = "철 이빨 정착지가 회복의 기회 없이 무너졌습니다. 이것이 끝입니다."
csCZ = "Tvá osada z Železných zubů padla bez jakékoli šance na obnovu. To je konec."
viVN = "Định cư của bạn tại Răng Sắt đã sụp đổ mà không có bất kỳ cơ hội phục hồi nào. Đây là sự kết thúc."

["Faction.IronTeeth.WonderCompletionFlavor"]
status = "normal"
raw = "Pionierii voștri au zburat peste pustiu, lăsând în urmă așezarea prosperă. Dacă Pământul vrea să-și revină, prosperitatea nou descoperită a castorilor trebuia împărtășită."
enUS = "Your pioneers flew over the wasteland, leaving behind a thriving settlement. If the Earth wants to recover, the newly discovered prosperity of the beavers had to be shared."
zhCN = "你们的先锋飞越了荒原，留下了繁荣的定居点。如果大地想要恢复，必须分享这些新发现的海狸繁荣。"
zhTW = "你們的先鋒們飛越了荒原，留下了繁榮的定居點。如果大地希望恢復，必須分享新發現的海狸繁榮。"
ruRU = "Ваши пионеры пролетели над пустошью, оставив за собой процветающее поселение. Если Земля хочет восстановиться, недавно обретенное благосостояние бобров должно быть разделено."
jaJP = "あなたのパイオニアたちは荒野を越えて飛び去り、繁栄した集落を残しました。地球が回復したいのなら、新しく発見されたビーバーの繁栄を分かち合う必要がありました。"
frFR = "Vos pionniers ont survolé le désert, laissant derrière eux une colonie prospère. Si la Terre veut se rétablir, la prospérité nouvellement découverte des castors doit être partagée."
deDE = "Die Pioniere sind über die Wüste geflogen und haben die wohlhabende Siedlung hinterlassen. Wenn die Erde sich erholen will, muss der neu entdeckte Wohlstand der Biber geteilt werden."
plPL = "Wasze bobry przeleciały nad pustynią, pozostawiając za sobą kwitnącą osadę. Jeśli Ziemia ma szansę na odrodzenie, nowo odkryty dobrobyt bobrów musi zostać podzielony."
ptBR = "Seus pioneiros voaram sobre o deserto, deixando para trás o assentamento próspero. Se a Terra quer se recuperar, a prosperidade recém-descoberta dos castores precisava ser compartilhada."
koKR = "당신의 개척자들은 사막 위를 날아가며 번영하는 정착지를 뒤에 남겼습니다. 만약 땅이 회복되기를 원한다면, 비버들의 새롭게 발견된 번영은 나누어져야 했습니다."
csCZ = "Vaši pionýři přelétli přes poušť, zatímco za sebou zanechali prosperující osadu. Pokud se Země chce uzdravit, nově nalezená prosperita bobrů musí být sdílena."
viVN = "Các pionier của bạn đã bay qua sa mạc, để lại một định cư thịnh vượng. Nếu Trái đất muốn hồi phục, sự thịnh vượng mới được phát hiện của những con chồn nước phải được chia sẻ."

["Faction.IronTeeth.WonderCompletionMessage"]
status = "normal"
raw = "Bravo! Iscusința ta tehnologică ți-a permis să utilizezi forțele hărnice ale Dinților de Fier pentru a cuceri această hartă și a construi minunea facțiunii."
enUS = "Bravo! Your technological prowess has allowed you to harness the industrious forces of the Iron Teeth to conquer this map and build the faction's wonder."
zhCN = "“太好了！你的科技才能使你能够利用铁齿的勤劳力量征服这张地图并建造该派系的奇迹。”"
zhTW = "『好樣的！你的科技才能讓你利用鐵牙的勤奮力量征服這張地圖並建造了這個派系的奇蹟。』"
ruRU = "Браво! Твое технологическое мастерство позволило тебе использовать трудолюбивые силы Железных Зубов, чтобы завоевать эту карту и построить чудо фракции."
jaJP = "ブラボー！あなたの技術的な才能が、アイアンティースの勤勉な力を利用してこのマップを征服し、派閥の奇跡を建設することを可能にしました。"
frFR = "Bravo ! Votre ingéniosité technologique vous a permis d'utiliser les forces laborieuses des Dents de Fer pour conquérir cette carte et construire la merveille de la faction."
deDE = "Bravo! Dein technisches Geschick hat dir ermöglicht, die fleißigen Kräfte der Eisenzähne zu nutzen, um diese Karte zu erobern und das Wunder der Fraktion zu bauen."
plPL = "Brawo! Twoje techniczne umiejętności pozwoliły ci wykorzystać pracowite siły Żelaznych Zębów, aby zdobyć tę mapę i zbudować cud frakcji."
ptBR = "Bravo! Sua habilidade tecnológica permitiu que você utilizasse as forças laboriosas dos Dentes de Ferro para conquistar este mapa e construir a maravilha da facção."
koKR = "Bravo! 당신의 기술적 능력이 철 이빨의 근면한 힘을 활용하여 이 맵을 정복하고 분파의 기적을 건설할 수 있게 해주었습니다."
csCZ = "Bravo! Tvoje technologické umění ti umožnilo využít pilné síly Železných Zubů k dobytí této mapy a k vybudování zázraku frakce."
viVN = "Xin chúc mừng! Kỹ năng công nghệ của bạn đã cho phép bạn sử dụng sức mạnh chăm chỉ của Răng Sắt để chinh phục bản đồ này và xây dựng kỳ quan của phe phái."

