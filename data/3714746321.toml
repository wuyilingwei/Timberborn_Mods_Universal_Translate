["Building.NaturalDam.Description"]
status = "normal"
raw = "O barieră naturală care blochează apa, dar permite trecerea uneia dintre ele printr-un deversor din partea superioară. Poate fi demolată."
enUS = "A natural barrier that blocks water but allows one of them to pass through an overflow from the top. It can be demolished."
zhCN = "一个阻挡水流的自然障碍，但允许水通过上部的溢洪道流出。可以被拆除。"
zhTW = "一個自然障礙物，阻擋水流，但允許其中一部分通過上方的溢洪道。可以被拆除。"
ruRU = "Естественная преграда, которая блокирует воду, но позволяет одной из них проходить через верхний сброс. Могут быть снесены."
jaJP = "自然のダム：水をブロックしますが、上部からのオーバーフローを通してその一部が流れることを許します。解体可能です。"
frFR = "Une barrière naturelle qui bloque l'eau, mais permet à l'une d'elles de passer par un déversoir en haut. Peut être démolie."
deDE = "Ein natürlicher Damm, der Wasser blockiert, aber den Durchfluss eines Teils davon über einen Überlauf an der Oberseite ermöglicht. Kann abgerissen werden."
plPL = "Naturalna zapora, która blokuje wodę, ale pozwala na przepływ jednej z nich przez przelew górny. Może być zburzona."
ptBR = "Uma barreira natural que bloqueia a água, mas permite a passagem de uma delas através de um vertedouro na parte superior. Pode ser demolida."
koKR = "물의 흐름을 막는 자연적인 장벽이지만, 위쪽의 방출구를 통해 일부 물이 통과할 수 있습니다. 철거할 수 있습니다."
csCZ = "O přírodní hrázi, která blokuje vodu, ale umožňuje průchod jedné z nich přes přelevací otvor v horní části. Může být zbořena."
viVN = "Một rào cản tự nhiên ngăn chặn nước, nhưng cho phép một trong số đó đi qua qua một đường thoát nước phía trên. Có thể bị phá hủy."

