["Building.Floodgate.FlavorDescription"]
status = "normal"
raw = "Nimeni nu credea că se poate îmbunătăți un baraj până când Old Kazko a creat Primul baraj mobil."
enUS = "No one believed that a dam could be improved until Old Kazko created the First movable dam."
zhCN = "“没有人相信大坝可以得到改善，直到老卡兹科创造了第一个可移动的大坝。”"
