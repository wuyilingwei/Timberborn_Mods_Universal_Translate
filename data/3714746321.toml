["Building.SwimmingPoll.FlavorDescription"]
status = "normal"
raw = "„E un timp foarte bun, dar ar trebui să exersăm lovitura ta de coadă!” —Pina"
enUS = "\"It's a great time, but you should work on your tail whip!\" —Pina"
zhCN = "“这是个好时光，但我们应该练习你的尾巴击打！” —皮娜"
zhTW = "「“現在是個好時光，但我們應該練習你的尾巴攻擊！” —皮娜」"
ruRU = "„Это очень хорошее время, но нам следует отработать твой удар хвостом!” —Пина"
jaJP = "「いい天気だけど、君のしっぽの打ち方を練習するべきだ！」 —ピナ"
frFR = "\"C'est un très bon moment, mais nous devrions travailler sur ton coup de queue !\" —Pina"
deDE = "„Es ist eine sehr gute Zeit, aber du solltest deinen Schwanzschlag üben!” —Pina"
plPL = "„To bardzo dobry czas, ale powinniśmy poćwiczyć twój uderzenie ogonem!” —Pina"
ptBR = "\"É um ótimo momento, mas deveríamos praticar seu golpe de cauda!\" —Pina"
koKR = "„좋은 시간이지만, 너의 꼬리 스윙을 연습해야 해!” —피나"
csCZ = "„Je to velmi dobrý čas, ale měli bychom trénovat tvůj ocasový úder!” —Pina"
viVN = "„Đây là một thời điểm rất tốt, nhưng chúng ta nên luyện tập cú đánh đuôi của bạn!” —Pina"

