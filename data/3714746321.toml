["Building.VerticalTubeway.FlavorDescription"]
status = "normal"
raw = "Mergi sus, sus, jos, jos, stânga, dreapta, stânga, dreapta, înapoi, înainte. Hm, ești exact de unde ai plecat."
enUS = "Go up, up, down, down, left, right, left, right, back, forward. Hm, you're exactly where you started."
