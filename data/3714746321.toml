["Tutorial.Badtides.Description"]
raw = "Așezarea ta a trecut cu bine de prima maree rea.\n\nLa fel ca secetele, mareele rea fac parte din ciclul sezonier.\n\nMareele rea viitoare nu vor fi la fel de iertătoare, așa că fii atent."
status = "normal"
enUS = "Your settlement has successfully passed the first bad tide.\n\nLike droughts, bad tides are part of the seasonal cycle.\n\nThe upcoming bad tides will not be as forgiving, so stay alert."
zhCN = "你的定居点已经成功度过了第一次恶潮。\n\n就像干旱一样，恶潮也是季节性循环的一部分。\n\n未来的恶潮不会那么宽容，所以要小心。"
zhTW = "你的小鎮順利度過了第一次的壞潮水。\n\n壞潮水與乾旱一樣，都是季節循環的一部分。\n\n未來的壞潮水將不會這麼寬容，所以要保持警惕。"
ruRU = "Твоя колония успешно пережила первую плохую прилив.\n\nКак и засухи, плохие приливы являются частью сезонного цикла.\n\nБудущие плохие приливы не будут столь милосердными, так что будь осторожен."
jaJP = "あなたの集落は最初の悪潮を無事に乗り越えました。\n\n干ばつと同様に、悪潮は季節のサイクルの一部です。\n\n次の悪潮はそれほど寛容ではないので、注意してください。"
frFR = "Votre colonie a bien traversé la première marée haute.\n\nTout comme les sécheresses, les marées hautes font partie du cycle saisonnier.\n\nLes prochaines marées hautes ne seront pas aussi clémentes, alors restez vigilant."
deDE = "Deine Siedlung hat die erste schlechte Gezeit erfolgreich überstanden.\n\nWie Dürreperioden sind schlechte Gezeiten Teil des saisonalen Zyklus.\n\nDie kommenden schlechten Gezeiten werden nicht so nachsichtig sein, also sei vorsichtig."
plPL = "Twoja osada przeszła pomyślnie przez pierwszą złą falę.\n\nPodobnie jak susze, złe fale są częścią cyklu sezonowego.\n\nNastępne złe fale nie będą tak wybaczające, więc bądź czujny."
ptBR = "Sua colônia sobreviveu bem à primeira maré ruim.\n\nAssim como as secas, as marés ruins fazem parte do ciclo sazonal.\n\nAs próximas marés ruins não serão tão perdoadoras, então fique atento."
koKR = "당신의 정착지는 첫 번째 나쁜 조수를 무사히 넘겼습니다.\n\n가뭄과 마찬가지로 나쁜 조수는 계절 주기의 일부입니다.\n\n앞으로의 나쁜 조수는 그렇게 관대하지 않을 것이니 주의하세요."
csCZ = "Tvá osada úspěšně přežila první špatný příliv.\n\nStejně jako sucha, špatné přílivy jsou součástí sezónního cyklu.\n\nNásledující špatné přílivy nebudou tak shovívavé, takže buď opatrný."
viVN = "Định cư của bạn đã vượt qua được cơn thủy triều xấu đầu tiên.\n\nGiống như hạn hán, thủy triều xấu là một phần của vòng tuần hoàn theo mùa.\n\nCác cơn thủy triều xấu tiếp theo sẽ không dễ chịu như vậy, vì vậy hãy cẩn thận."

