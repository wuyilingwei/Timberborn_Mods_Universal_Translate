["MapMetadata.Waterfalls.Description"]
status = "normal"
raw = "Este un truc vechi de parenting să le spui pisicilor că o cascadă este doar o ecluză mare. Aici, vor petrece săptămâni întregi căutând o manetă de închidere."
enUS = "It's an old parenting trick to tell cats that a waterfall is just a big lock. Here, they will spend weeks searching for a closing lever."
zhCN = "这是一种老旧的育儿技巧，告诉小猫们瀑布只是一个大闸门。在这里，它们将花费数周的时间寻找一个关闭的杠杆。"
zhTW = "這是一個老掉牙的育兒技巧，告訴貓咪瀑布只是一個大型水閘。在這裡，它們將花幾個星期尋找關閉的杠桿。"
ruRU = "Это старая родительская уловка сказать кошкам, что водопад - это просто большой шлюз. Здесь они будут неделями искать запорный рычаг."
jaJP = "「猫に滝はただの大きな閘門だと言うのは古い育児のトリックです。ここでは、彼らは閉じるレバーを探し続けて何週間も過ごすでしょう。」"
frFR = "C'est un vieux truc de parentalité de dire aux chats qu'une cascade n'est qu'une grande écluse. Ici, ils passeront des semaines entières à chercher un levier de fermeture."
deDE = "Es ist ein alter Trick im Elternschaft, Katzen zu erzählen, dass ein Wasserfall nur ein großes Schleusentor ist. Hier werden sie wochenlang nach einem Schließhebel suchen."
plPL = "To stary trik rodzicielski, by mówić kotom, że wodospad to po prostu duża śluza. Tutaj będą spędzać tygodnie, szukając dźwigni zamykającej."
ptBR = "É uma velha tática de criação de filhos dizer aos gatos que uma cachoeira é apenas uma grande eclusa. Aqui, eles passarão semanas inteiras procurando uma alavanca de fechamento."
koKR = "이것은 고양이에게 폭포가 단지 큰 수문이라고 말하는 오래된 육아 요령입니다. 여기서 그들은 닫는 레버를 찾으며 몇 주를 보낼 것입니다."
csCZ = "Je to starý trik rodičovství říct kočkám, že vodopád je jen velká stavidlo. Tady budou trávit celé týdny hledáním páky na uzavření."
viVN = "Đây là một mẹo cũ trong việc nuôi dạy trẻ là nói với mèo rằng thác nước chỉ là một cống lớn. Ở đây, chúng sẽ dành cả tuần để tìm kiếm một cần gạt đóng lại."

