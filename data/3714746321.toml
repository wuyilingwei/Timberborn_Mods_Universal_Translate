raw = "Această versiune de hartă ({0}) nu este compatibilă cu versiunea actuală a jocului ({1}). Pornirea jocului pe această hartă poate duce la o blocare a jocului, este posibil să întâmpinați erori care să afecteze jocul și este posibil să lipsească unele resurse noi esențiale. Vă recomandăm insistent să actualizați harta pentru a vă bucura pe deplin de noile funcții.\n\n\nSigur doriți să începeți jocul?"
status = "normal"
enUS = "This map version ({0}) is not compatible with the current game version ({1}). Starting the game on this map may lead to game crashes, you may encounter errors that affect gameplay, and some essential new resources may be missing. We strongly recommend that you update the map to fully enjoy the new features.\n\n\nAre you sure you want to start the game?"
zhCN = "此地图版本（{0}）与当前游戏版本（{1}）不兼容。在该地图上启动游戏可能会导致游戏崩溃，您可能会遇到影响游戏的错误，并且可能会缺少一些重要的新资源。我们强烈建议您更新地图，以充分体验新功能。\n\n您确定要开始游戏吗？"
zhTW = "此地圖版本（{0}）與當前遊戲版本（{1}）不相容。在這張地圖上啟動遊戲可能導致遊戲崩潰，您可能會遇到影響遊戲的錯誤，並可能會缺少一些重要的新資源。我們強烈建議您更新地圖，以充分體驗新功能。\n\n您確定要開始遊戲嗎？"
ruRU = "«Эта версия карты ({0}) несовместима с текущей версией игры ({1}). Запуск игры на этой карте может привести к зависаниям, вы можете столкнуться с ошибками, которые повлияют на игру, и некоторые новые важные ресурсы могут отсутствовать. Мы настоятельно рекомендуем обновить карту, чтобы полностью насладиться новыми функциями.\n\n\nВы уверены, что хотите начать игру?»"
jaJP = "このマップのバージョン（{0}）は、現在のゲームのバージョン（{1}）と互換性がありません。このマップでゲームを開始すると、ゲームがクラッシュする可能性があり、ゲームに影響を与えるエラーに遭遇するかもしれません。また、新しい重要なリソースが欠落する可能性もあります。新しい機能を十分に楽しむために、マップを更新することを強くお勧めします。\n\n本当にゲームを開始しますか？"
frFR = "Cette version de la carte ({0}) n'est pas compatible avec la version actuelle du jeu ({1}). Lancer le jeu sur cette carte peut entraîner un plantage du jeu, vous pourriez rencontrer des erreurs affectant le jeu et certaines nouvelles ressources essentielles pourraient manquer. Nous vous recommandons vivement de mettre à jour la carte pour profiter pleinement des nouvelles fonctionnalités.\n\nÊtes-vous sûr de vouloir commencer le jeu ?"
deDE = "Diese Kartenversion ({0}) ist nicht kompatibel mit der aktuellen Version des Spiels ({1}). Das Starten des Spiels auf dieser Karte kann zu einem Absturz des Spiels führen, Sie könnten auf Fehler stoßen, die das Spiel beeinträchtigen, und es könnten einige essentielle neue Ressourcen fehlen. Wir empfehlen Ihnen dringend, die Karte zu aktualisieren, um die neuen Funktionen vollständig genießen zu können.\n\nSind Sie sicher, dass Sie das Spiel starten möchten?"
plPL = "Ta wersja mapy ({0}) nie jest kompatybilna z aktualną wersją gry ({1}). Uruchomienie gry na tej mapie może prowadzić do jej zablokowania, mogą wystąpić błędy wpływające na rozgrywkę, a niektóre nowe kluczowe zasoby mogą być niedostępne. Zdecydowanie zalecamy zaktualizowanie mapy, aby w pełni cieszyć się nowymi funkcjami.\n\nCzy na pewno chcesz rozpocząć grę?"
ptBR = "Esta versão do mapa ({0}) não é compatível com a versão atual do jogo ({1}). Iniciar o jogo neste mapa pode levar a um travamento, você pode encontrar erros que afetam o jogo e pode faltar alguns novos recursos essenciais. Recomendamos fortemente que você atualize o mapa para aproveitar plenamente as novas funcionalidades.\n\nVocê tem certeza de que deseja iniciar o jogo?"
koKR = "이 맵 버전 ({0})은 현재 게임 버전 ({1})과 호환되지 않습니다. 이 맵에서 게임을 시작하면 게임이 중단될 수 있으며, 게임에 영향을 미치는 오류가 발생할 수 있으며, 일부 필수 새로운 자원이 누락될 수 있습니다. 새로운 기능을 충분히 즐기기 위해 맵을 업데이트할 것을 강력히 권장합니다.\n\n\n정말 게임을 시작하시겠습니까?"
csCZ = "Tato verze mapy ({0}) není kompatibilní s aktuální verzí hry ({1}). Spuštění hry na této mapě může vést k pádům hry, můžete se setkat s chybami, které ovlivňují hru, a mohou chybět některé nové zásadní zdroje. Důrazně doporučujeme aktualizovat mapu, abyste si mohli plně vychutnat nové funkce.\n\nOpravdu chcete hru spustit?"
viVN = "Bản đồ này ({0}) không tương thích với phiên bản hiện tại của trò chơi ({1}). Việc khởi động trò chơi trên bản đồ này có thể dẫn đến sự cố trong trò chơi, bạn có thể gặp lỗi ảnh hưởng đến trò chơi và một số tài nguyên mới thiết yếu có thể bị thiếu. Chúng tôi mạnh mẽ khuyến nghị bạn cập nhật bản đồ để tận hưởng đầy đủ các tính năng mới.\n\nBạn có chắc muốn bắt đầu trò chơi không?"

