["Building.GravityBattery.Description"]
status = "normal"
raw = "Stochează surplusul de energie și îl returnează atunci când rețeaua sa este insuficientă. Cu cât este construit mai sus, cu atât poate stoca mai multă energie."
enUS = "Stores surplus energy and returns it when its network is insufficient. The higher it is built, the more energy it can store."
zhCN = "储存多余的能量，并在电网不足时返回。建造得越高，储存的能量就越多。"
zhTW = "儲存多餘的能量，並在其網絡不足時返回。建造得越高，儲存的能量就越多。"
ruRU = "Накапливает избыток энергии и возвращает его, когда сеть испытывает нехватку. Чем выше он построен, тем больше энергии он может сохранить."
jaJP = "エネルギーの surplus を蓄え、ネットワークが不十分なときにそれを返します。高く建設されるほど、より多くのエネルギーを蓄えることができます。"
frFR = "Stocke l'excédent d'énergie et le restitue lorsque son réseau est insuffisant. Plus il est construit en hauteur, plus il peut stocker d'énergie."
deDE = "Speichert überschüssige Energie und gibt sie zurück, wenn das Netz nicht ausreichend ist. Je höher es gebaut ist, desto mehr Energie kann es speichern."
plPL = "Przechowuje nadmiar energii i zwraca ją, gdy sieć jest niewystarczająca. Im wyżej jest zbudowany, tym więcej energii może przechować."
ptBR = "Armazena o excedente de energia e a devolve de volta quando a rede está insuficiente. Quanto mais alto for construído, mais energia pode armazenar."
koKR = "남는 에너지를 저장하고 네트워크가 부족할 때 반환합니다. 더 높게 건설할수록 더 많은 에너지를 저장할 수 있습니다."
csCZ = "Ukládá přebytek energie a vrací ho, když je síť nedostatečná. Čím výše je postavena, tím více energie může uložit."
viVN = "Lưu trữ năng lượng thừa và trả lại khi lưới điện không đủ. Càng được xây dựng cao, nó càng có thể lưu trữ nhiều năng lượng hơn."

