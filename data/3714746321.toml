frFR = "Va, haut, haut, bas, bas, gauche, droite, gauche, droite, arrière, avant. Hmm, tu es exactement là où tu as commencé."
deDE = "Geh hoch, hoch, runter, runter, links, rechts, links, rechts, zurück, vor. Hm, du bist genau da, wo du angefangen hast."
plPL = "Idź w górę, w górę, w dół, w dół, w lewo, w prawo, w lewo, w prawo, do tyłu, do przodu. Hm, jesteś dokładnie tam, skąd zacząłeś."
ptBR = "Suba, suba, desce, desce, esquerda, direita, esquerda, direita, para trás, para frente. Hm, você está exatamente de onde partiu."
koKR = "위로, 위로, 아래로, 아래로, 왼쪽, 오른쪽, 왼쪽, 오른쪽, 뒤로, 앞으로. 흠, 당신은 정확히 출발했던 곳에 있습니다."
csCZ = "Jdi nahoru, nahoru, dolů, dolů, vlevo, vpravo, vlevo, vpravo, zpět, vpřed. Hm, jsi přesně tam, odkud jsi vyšel."
