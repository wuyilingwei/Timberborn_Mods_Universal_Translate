["Building.LumberMill.FlavorDescription"]
status = "normal"
raw = "Încurajată de Ol’ Kazko, prelucrarea mecanizată a lemnului a provocat mult scrâșnire a dinților în rândul castorilor mai în vârstă."
enUS = "Encouraged by Ol' Kazko, the mechanized processing of wood has caused much teeth-gritting among the older beavers."
zhCN = "在老卡兹科的鼓励下，机械化木材加工导致许多年长海狸的牙齿咯吱作响。"
zhTW = "在老卡茲科的鼓勵下，木材的機械加工使老年河狸們感到不滿。"
ruRU = "Вдохновлённые Ол' Казко, механическая переработка древесины вызвала много скрежета зубов среди старших бобров."
jaJP = "「オル・カズコに奨励されて、木材の機械化処理は、年配のビーバーたちの間で多くの歯ぎしりを引き起こしました。」"
frFR = "Encouragée par Ol’ Kazko, le traitement mécanisé du bois a provoqué beaucoup de grincements de dents parmi les castors plus âgés."
deDE = "Angetrieben von Ol' Kazko hat die mechanisierte Holzverarbeitung bei den älteren Biber große Zahnknirschen verursacht."
plPL = "Zachęcona przez Ol’ Kazko, mechaniczne przetwarzanie drewna spowodowało wiele zgrzytania zębami wśród starszych bobrów."
ptBR = "Inspirada por Ol' Kazko, a mecanização da madeira causou muitos rangidos de dentes entre os castores mais velhos."
koKR = "올 카즈코의 격려로 기계화된 목재 가공은 나이 많은 비버들 사이에서 많은 이를 갈게 만들었습니다."
csCZ = "Povzbuzena starým Kazkem, mechanizované zpracování dřeva způsobilo mnoho skřípění zubů mezi staršími bobry."
viVN = "Được khuyến khích bởi Ol' Kazko, việc chế biến gỗ bằng máy móc đã gây ra nhiều tiếng răng kêu trong số những con nhím lớn tuổi."

