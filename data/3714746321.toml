["Building.EarthRepopulator.IronTeeth.Description"]
status = "normal"
raw = "Lansează pionieri în ținuturi îndepărtate. Când este lansat, îi face pe castorii din zonă extrem de fericiți."
enUS = "Sends pioneers to distant lands. When launched, it makes the nearby beavers extremely happy."
zhCN = "在远处的土地上发射开拓者。发射时，会使附近的海狸们极为快乐。"
zhTW = "將先驅者發射到遙遠的土地上。啟動時，會讓該區域的海狸極為快樂。"
ruRU = "Запускает поселенцев в удаленные края. Когда запускается, делает бобров в районе невероятно счастливыми."
jaJP = "「遠くの土地に先駆者を発射します。発射されると、その地域のビーバーが非常に幸せになります。」"
frFR = "Lance des pionniers dans des terres lointaines. Lorsqu'il est lancé, il rend les castors de la zone extrêmement heureux."
deDE = "Sendet Pioniere in entlegene Gebiete. Wenn sie gestartet werden, machen sie die nahegelegenen Biber extrem glücklich."
