["Building.Thorns.Description"]
raw = "Un obstacol impenetrabil care blochează și irigațiile și contaminarea. Este dificil de demolat și îi poate răni pe cei care încearcă să o facă."
status = "normal"
enUS = "An impenetrable obstacle that blocks both irrigation and contamination. It is difficult to demolish and can injure those who attempt to do so."
zhCN = "“一个无法渗透的障碍，阻止灌溉和污染。拆除它很困难，并且可能会伤害尝试这样做的人。”"
zhTW = "一個不可穿透的障礙，阻擋灌溉和污染。難以拆除，並且可能會傷害嘗試拆除它的人。"
ruRU = "Непроходимое препятствие, которое блокирует как ирригацию, так и загрязнение. Его трудно разрушить, и он может причинить вред тем, кто пытается это сделать."
jaJP = "「灌漑と汚染を妨げる侵入不可能な障害物です。解体が難しく、それを試みる者を傷つける可能性があります。」"
frFR = "Un obstacle impénétrable qui bloque à la fois l'irrigation et la contamination. Il est difficile à démolir et peut blesser ceux qui essaient de le faire."
deDE = "Ein unüberwindliches Hindernis, das sowohl Bewässerung als auch Kontamination blockiert. Es ist schwierig abzureißen und kann diejenigen verletzen, die versuchen, es zu tun."
plPL = "Nieprzenikniona przeszkoda, która blokuje zarówno nawadnianie, jak i zanieczyszczenie. Trudna do zburzenia i może zranić tych, którzy próbują to zrobić."
ptBR = "Um obstáculo impenetrável que bloqueia tanto a irrigação quanto a contaminação. É difícil de demolir e pode ferir aqueles que tentam fazê-lo."
koKR = "막힌 물줄기 및 오염을 차단하는 불침투성 장애물입니다. 철거하기가 어렵고, 시도하는 사람에게 부상을 입힐 수 있습니다."
csCZ = "Nepřekonatelná překážka, která blokuje jak zavlažování, tak znečištění. Je obtížné ji zbořit a může zranit ty, kdo se o to pokusí."
viVN = "Một chướng ngại vật không thể xuyên thủng mà chặn đứng cả tưới tiêu và ô nhiễm. Nó rất khó để phá hủy và có thể làm tổn thương những ai cố gắng thực hiện điều đó."

