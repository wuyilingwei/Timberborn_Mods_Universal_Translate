["Building.LaborerMonument.FlavorDescription"]
status = "normal"
raw = "Chiar și după ce munca manuală a cedat locul industrializării, etosul de lucru al Iron Teeth nu s-a schimbat."
enUS = "Even after manual labor gave way to industrialization, the work ethic of the Iron Teeth has not changed."
zhCN = "“即使在体力劳动让位于工业化之后，铁齿的工作精神也没有改变。”"
zhTW = "即使在手工勞動讓位於工業化之後，鐵齒的工作倫理也沒有改變。"
