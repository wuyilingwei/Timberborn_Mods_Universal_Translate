deDE = "Dieser Speicherstand ist mit der aktuellen Version inkompatibel. Wir bemühen uns, dies zu vermeiden. Bitte starten Sie eine neue Partie, um die neuen Funktionen voll zu genießen."
plPL = "Ten zapis jest niekompatybilny z obecną wersją. Dokładamy starań, aby uniknąć takich sytuacji. Prosimy o rozpoczęcie nowej gry, aby w pełni cieszyć się nowymi funkcjami."
ptBR = "Este incompatível com a versão atual.\nEstamos nos esforçando para evitar isso. Por favor, comece um novo jogo para aproveitar ao máximo os novos recursos."
koKR = "이 저장은 현재 버전과 호환되지 않습니다. 우리는 이를 방지하기 위해 열심히 노력하고 있습니다. 새로운 기능을 완전히 즐기기 위해 새로운 게임을 시작해 주시기 바랍니다."
