["Tutorial.WaterAndFood.Farmhouse"]
raw = "Pe termen lung, avem nevoie de ceva mai nutritiv. Construiți o casă de la țară pentru a planta și recolta culturi.\n\nLa fel ca steagurile, o casă de la țară are o rază de acțiune limitată.\n\nSfat: Dacă rămâneți fără muncitori, puteți pune pe pauză unele clădiri. Pentru a face acest lucru, selectați o clădire și faceți clic pe butonul de pauză."
status = "normal"
enUS = "In the long term, we need something more nutritious. Build a farmhouse to plant and harvest crops.\n\nLike flags, a farmhouse has a limited range.\n\nTip: If you run out of workers, you can pause some buildings. To do this, select a building and click the pause button."
zhCN = "从长远来看，我们需要一些更有营养的东西。建造一个乡村房屋以种植和收获作物。\n\n与旗帜一样，乡村房屋的作用范围是有限的。\n\n提示：如果您没有工人，可以暂停某些建筑。为此，选择一座建筑并单击暂停按钮。"
zhTW = "從長遠來看，我們需要一些更有營養的東西。建造一座農舍來種植和收穫作物。\n\n和旗幟一樣，農舍的作用範圍有限。\n\n提示：如果您的人手不足，可以暫停一些建築。為此，請選擇一座建築並點擊暫停按鈕。"
ruRU = "В долгосрочной перспективе нам нужно что-то более питательное. Постройте ферму, чтобы сажать и собирать урожай.\n\nКак и флажки, ферма имеет ограниченный радиус действия.\n\nСовет: Если у вас закончились рабочие, вы можете поставить некоторые здания на паузу. Для этого выберите здание и нажмите кнопку паузы."
jaJP = "長期的には、より栄養価の高いものが必要です。作物を植えて収穫するために農家を建てましょう。\n\n旗と同様に、農家には限られた範囲があります。\n\nヒント：労働者が不足した場合、いくつかの建物を一時停止することができます。そのためには、建物を選択して一時停止ボタンをクリックしてください。"
frFR = "À long terme, nous avons besoin de quelque chose de plus nutritif. Construisez une maison de campagne pour planter et récolter des cultures.\n\nComme les drapeaux, une maison de campagne a une portée limitée.\n\nConseil : Si vous manquez de travailleurs, vous pouvez mettre certaines constructions en pause. Pour ce faire, sélectionnez un bâtiment et cliquez sur le bouton de pause."
deDE = "Langfristig benötigen wir etwas Nährstoffreicheres. Bauen Sie ein landwirtschaftliches Haus, um Pflanzen anzubauen und zu ernten.\n\nWie die Flaggen hat ein landwirtschaftliches Haus einen begrenzten Aktionsradius.\n\nTipp: Wenn Sie keine Arbeiter mehr haben, können Sie einige Gebäude in den Pausenmodus versetzen. Wählen Sie dazu ein Gebäude aus und klicken Sie auf die Pausentaste."
plPL = "Na dłuższą metę potrzebujemy czegoś bardziej pożywnego. Zbuduj dom wiejski, aby zasadzić i zebrać plony.\n\nPodobnie jak flagi, dom wiejski ma ograniczony zasięg.\n\nWskazówka: Jeśli zabraknie ci robotników, możesz wstrzymać niektóre budynki. Aby to zrobić, wybierz budynek i kliknij przycisk wstrzymania."
ptBR = "Em um prazo mais longo, precisamos de algo mais nutritivo. Construa uma casa de campo para plantar e colher culturas.\n\nAssim como as bandeiras, uma casa de campo tem um raio de ação limitado.\n\nDica: Se você ficar sem trabalhadores, pode colocar alguns edifícios em pausa. Para fazer isso, selecione um edifício e clique no botão de pausa."
koKR = "장기적으로 우리는 더 영양가 있는 것이 필요합니다. 작물을 심고 수확하기 위해 농촌 주택을 건설하세요.\n\n깃발과 마찬가지로 농촌 주택은 제한된 범위를 가지고 있습니다.\n\n팁: 작업자가 부족하면 일부 건물을 일시 정지할 수 있습니다. 이렇게 하려면 건물을 선택하고 일시 정지 버튼을 클릭하세요."
csCZ = "Na dlouhou dobu potřebujeme něco výživnějšího. Postavte venkovský dům pro pěstování a sklizeň plodin.\n\nStejně jako vlajky má venkovský dům omezený dosah.\n\nTip: Pokud vám dojdou dělníci, můžete některé budovy pozastavit. Chcete-li to udělat, vyberte budovu a klikněte na tlačítko pozastavení."
viVN = "Trong dài hạn, chúng ta cần một cái gì đó din dưỡng hơn. Hãy xây dựng một ngôi nhà nông thôn để trồng trọt và thu hoạch cây trồng.\n\nGiống như cờ, một ngôi nhà nông thôn có phạm vi hoạt động hạn chế.\n\nMẹo: Nếu bạn không còn công nhân, bạn có thể tạm dừng một số tòa nhà. Để làm điều này, hãy chọn một tòa nhà và nhấp vào nút tạm dừng."

["Tutorial.WaterAndFood.Gatherer"]
raw = "Pe lângă apă, castorii au nevoie de hrană.\n\nCulegătorii adună automat fructe de pădure în raza de acțiune a steagului culegător. Puteți vedea raza de acțiune atunci când plasați steagul.\n\nConstruiți un steag culegător lângă niște tufișuri de afine."
status = "normal"
enUS = "Besides water, beavers need food.\n\nGatherers automatically collect berries within the range of the gatherer flag. You can see the range when you place the flag.\n\nBuild a gatherer flag near some blueberry bushes."
zhCN = "除了水，海狸还需要食物。\n\n采集者会自动在采集旗帜的作用范围内收集浆果。您可以在放置旗帜时看到作用范围。\n\n在一些蓝莓灌木旁边建造一个采集旗帜。"
zhTW = "除了水，海狸還需要食物。\n\n收集者會自動在收集旗幟的範圍內收集漿果。當您放置旗幟時，可以看到範圍。\n\n在藍莓灌木旁建造一面收集旗幟。"
ruRU = "Кроме воды, бобрам нужна еда.\n\nСобиратели автоматически собирают ягоды в радиусе действия собирательного флага. Вы можете видеть радиус действия, когда размещаете флаг.\n\nП постройте собирательный флаг рядом с кустами черники."
jaJP = "水と食料についてのチュートリアル - \"水の他に、ビーバーは食料が必要です。\n\n収集者は、収集旗の範囲内で自動的にベリーを集めます。旗を設置すると、その範囲が表示されます。\n\nブルーベリーの茂みの近くに収集旗を建設してください。\""
frFR = "En plus de l'eau, les castors ont besoin de nourriture.\n\nLes collecteurs ramassent automatiquement des baies dans la zone d'influence du drapeau de collecte. Vous pouvez voir la zone d'influence lorsque vous placez le drapeau.\n\nConstruisez un drapeau de collecte près de quelques buissons de myrtilles."
deDE = "Neben Wasser benötigen die Biber Nahrung.\n\nSammler sammeln automatisch Beeren im Wirkungsbereich der Sammelflagge. Sie können den Wirkungsbereich sehen, wenn Sie die Flagge platzieren.\n\nBauen Sie eine Sammelflagge in der Nähe von Heidelbeersträuchern."
plPL = "Poza wodą, bobry potrzebują jedzenia.\n\nZbieracze automatycznie zbierają jagody w zasięgu flagi zbieracza. Możesz zobaczyć zasięg, gdy umieszczasz flagę.\n\nZbuduj flagę zbieracza w pobliżu krzaków borówki."
ptBR = "Além de água, os castores precisam de comida.\n\nOs coletadores coletam automaticamente frutas silvestres na área de influência da bandeira do coletador. Você pode ver a área de influência quando coloca a bandeira.\n\nConstrua uma bandeira de coletar perto de alguns arbustos de mirtilo."
koKR = "물 외에도 비버는 음식을 필요로 합니다.\n\n채집가는 채집기 기폭의 범위 내에서 자동으로 산딸기를 수집합니다. 기폭을 배치할 때 범위를 확인할 수 있습니다.\n\n블루베리 덤불 근처에 채집기 기폭을 건설하세요."
csCZ = "Kromě vody potřebují bobři potravu.\n\nSběrači automaticky shromažďují lesní plody v dosahu vlajky sběrače. Můžete vidět dosah, když umístíte vlajku.\n\nPostavte vlajku sběrače poblíž keřů borůvek."
viVN = "Ngoài nước, beaver cần thức ăn.\n\nCông nhân thu hoạch tự động thu thập trái cây rừng trong phạm vi hoạt động của cờ thu hoạch. Bạn có thể thấy phạm vi hoạt động khi đặt cờ.\n\nXây dựng một cờ thu hoạch gần một số bụi việt quất."

["Tutorial.WaterAndFood.MarkCarrots"]
raw = "Fermierii nu încep să lucreze până nu le spui tu ce și unde să planteze.\n\nFolosește instrumentul Plantează culturi pentru a desemna un câmp de morcovi.\n\nCulturile trebuie plantate pe terenuri irigate, verzi. Altfel, plantele se vor usca și, în cele din urmă, vor muri."
status = "normal"
enUS = "Farmers do not start working until you tell them what and where to plant.\n\nUse the Plant Crops tool to designate a carrot field.\n\nCrops must be planted on irrigated, green lands. Otherwise, the plants will dry out and eventually die."
zhCN = "农民不会开始工作，直到你告诉他们种什么和种在哪里。\n\n使用种植作物工具来指定一个胡萝卜田。\n\n作物必须种植在灌溉的绿色土地上。否则，植物会干枯，最终死亡。"
zhTW = "農夫不會開始工作，直到你告訴他們種什麼和在哪裡種植。\n\n使用種植作物工具來指定一塊胡蘿蔔田地。\n\n作物必須在灌溉的綠色土地上種植。否則，植物會枯萎，最終死亡。"
ruRU = "Фермеры не начнут работать, пока ты не скажешь им, что и где сажать.\n\nИспользуй инструмент \"Посадить урожай\", чтобы назначить поле для моркови.\n\nУрожай нужно сажать на орошенных зеленых участках. В противном случае растения засохнут и в конечном итоге умрут."
jaJP = "「農夫は、あなたが何をどこに植えるかを指示しない限り、作業を始めません。\n\n作物を植えるツールを使って、人参の畑を指定してください。\n\n作物は、潅漑された緑の土地に植える必要があります。さもなければ、植物は枯れて最終的には死んでしまいます。」"
frFR = "Les agriculteurs ne commencent à travailler que lorsque vous leur dites quoi et où planter.\n\nUtilisez l'outil Planter des cultures pour désigner un champ de carottes.\n\nLes cultures doivent être plantées sur des terres irriguées et vertes. Sinon, les plantes se dessècheront et finiront par mourir."
deDE = "Die Bauern beginnen nicht zu arbeiten, bis du ihnen sagst, was und wo sie pflanzen sollen.\n\nVerwende das Werkzeug Pflanzen, um ein Karottenfeld zuzuweisen.\n\nDie Pflanzen müssen auf bewässertem, grünem Boden gepflanzt werden. Andernfalls vertrocknen die Pflanzen und sterben schließlich."
plPL = "Rolnicy nie zaczynają pracy, dopóki nie powiesz im, co i gdzie mają sadzić.\n\nUżyj narzędzia Sadź plony, aby wyznaczyć pole marchewki.\n\nUprawy muszą być sadzone na nawadnianych, zielonych terenach. W przeciwnym razie rośliny wyschną i ostatecznie umrą."
ptBR = "Os fazendeiros não começam a trabalhar até que você lhes diga o que e onde plantar.\n\nUse a ferramenta Plante Culturas para designar um campo de cenouras.\n\nAs culturas devem ser plantadas em terrenos irrigados e verdes. Caso contrário, as plantas irão secar e, eventualmente, morrerão."
koKR = "농부들은 당신이 무엇을 어디에 심어야 하는지 말해주기 전까지 작업을 시작하지 않습니다.\n\n당근 농장을 지정하려면 작물 심기 도구를 사용하세요.\n\n작물은 관개된 초록 땅에 심어야 합니다. 그렇지 않으면 식물이 말라서 결국 죽게 됩니다."
csCZ = "Farmáři nezačnou pracovat, dokud jim neřekneš, co a kde mají zasít.\n\nPoužij nástroj Zasaď plodiny k označení pole s mrkví.\n\nPlodiny musí být zasazeny na zavlažovaných, zelených pozemcích. Jinak se rostliny vysuší a nakonec zemřou."
viVN = "Nông dân sẽ không bắt đầu làm việc cho đến khi bạn bảo họ trồng gì và ở đâu.\n\nSử dụng công cụ Trồng cây để chỉ định một mảnh đất trồng cà rốt.\n\nCây trồng phải được trồng trên những mảnh đất được tưới nước, màu xanh. Nếu không, cây sẽ bị khô và cuối cùng sẽ chết."

["Tutorial.WaterAndFood.WaterPump"]
raw = "Castorii au nevoie de apă pentru a supraviețui.\n\nConstruiește o pompă de apă pentru a asigura acces continuu la apă potabilă. Nu uita să conectezi pompa la Centrul Districtual."
status = "normal"
enUS = "Beavers need water to survive.\n\nBuild a water pump to ensure continuous access to drinking water. Don't forget to connect the pump to the District Center."
zhCN = "海狸需要水来生存。\n\n建造一个水泵以确保持续供应饮用水。记得将水泵连接到区域中心。"
zhTW = "海狸需要水才能生存。\n\n建造一座水泵以确保持续获得饮用水。别忘了将水泵连接到地区中心。"
ruRU = "Бобрам нужна вода для выживания.\n\nПострой водяную помпу, чтобы обеспечить постоянный доступ к питьевой воде. Не забудь подключить помпу к Районному Центру."
jaJP = "ビーバーたちは生存のために水を必要とします。\n\n飲料水への継続的なアクセスを確保するために水ポンプを建設しましょう。ポンプを地区センターに接続するのを忘れないでください。"
frFR = "Les castors ont besoin d'eau pour survivre.\n\nConstruisez une pompe à eau pour garantir un accès continu à de l'eau potable. N'oubliez pas de connecter la pompe au Centre de District."
deDE = "Die Biber brauchen Wasser, um zu überleben.\n\nBaue eine Wasserpumpe, um einen kontinuierlichen Zugang zu Trinkwasser zu gewährleisten. Vergiss nicht, die Pumpe mit dem Bezirkszentrum zu verbinden."
plPL = "Boberki potrzebują wody, aby przetrwać.\n\nZbuduj pompę wodną, aby zapewnić stały dostęp do wody pitnej. Nie zapomnij połączyć pompy z Centrum Dzielnicy."
ptBR = "Os castores precisam de água para sobreviver.\n\nConstrua uma bomba de água para garantir acesso contínuo a água potável. Não se esqueça de conectar a bomba ao Centro Distrital."
koKR = "비버는 생존을 위해 물이 필요합니다.\n\n식수를 지속적으로 공급하기 위해 물 펌프를 건설하세요. 펌프를 구역 센터에 연결하는 것을 잊지 마세요."
csCZ = "Bobři potřebují vodu, aby přežili.\n\nPostav vodní pumpu, aby zajistil stálý přístup k pitné vodě. Nezapomeň pumpu připojit k Centru obvodu."
viVN = "Những con rái cá cần nước để sinh tồn.\n\nXây dựng một cái máy bơm nước để đảm bảo có nước uống liên tục. Đừng quên kết nối máy bơm với Trung tâm Quận."

