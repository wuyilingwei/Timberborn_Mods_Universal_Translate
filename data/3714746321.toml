["Building.Scratcher.FlavorDescription"]
raw = "Chiar și atunci când se relaxează, Dinții de Fier abia așteaptă să se întoarcă la muncă."
status = "normal"
enUS = "Even when they relax, the Iron Teeth can’t wait to get back to work."
zhCN = "即使在放松的时候，铁牙们也迫不及待想要回到工作中。"
zhTW = "即使在放鬆時，鐵牙也迫不及待想再次回到工作中。"
ruRU = "Даже когда они отдыхают, Железные Зубы с нетерпением ждут, чтобы вернуться к работе."
jaJP = "鉄の歯たちは、リラックスしている時でさえも、仕事に戻るのを待ち望んでいます。"
frFR = " Même lorsqu'ils se détendent, les Dents de Fer ont hâte de retourner au travail."
deDE = "Selbst wenn sie sich ausruhen, können die Eisenzähne es kaum erwarten, wieder zur Arbeit zu kommen."
plPL = "Nawet gdy odpoczywają, Żelazne Zęby nie mogą się doczekać, aby wrócić do pracy."
ptBR = "Mesmo quando relaxam, os Dentes de Ferro mal podem esperar para voltar a trabalhar."
koKR = "심지어 휴식을 취할 때에도, 철의 이빨은 작업으로 돌아가기를 간절히 기다립니다."
csCZ = "Dokonce i když si odpočinou, Železní zubové se už těší, až se vrátí k práci."
viVN = "Ngay cả khi đang nghỉ ngơi, Hàm Răng Sắt cũng không thể chờ đợi để trở lại làm việc."

