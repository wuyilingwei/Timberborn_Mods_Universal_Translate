status = "normal"

["Tutorial.VerticalArchitecture.BuildRooftopTerrace"]
new = "În pustiu, este important să optimizezi utilizarea spațiului. Castorii fac asta prin dezvoltarea verticală a orașelor lor.\n\nUnele clădiri, cum ar fi Cabanele, au acoperișuri plate care pot susține alte structuri.\n\nHai să construim acum o Terasă pe Acoperiș. S-ar putea să fie nevoie să folosești Scări pentru a o conecta la district."
status = "normal"

["Tutorial.WaterAndFood"]
new = "Apă și mâncare"
status = "normal"

["Tutorial.WaterAndFood.Farmhouse"]
new = "Pe termen lung, avem nevoie de ceva mai nutritiv. Construiți o casă de la țară pentru a planta și recolta culturi.\n\nLa fel ca steagurile, o casă de la țară are o rază de acțiune limitată.\n\nSfat: Dacă rămâneți fără muncitori, puteți pune pe pauză unele clădiri. Pentru a face acest lucru, selectați o clădire și faceți clic pe butonul de pauză."
status = "normal"

["Tutorial.WaterAndFood.Gatherer"]
new = "Pe lângă apă, castorii au nevoie de hrană.\n\nCulegătorii adună automat fructe de pădure în raza de acțiune a steagului culegător. Puteți vedea raza de acțiune atunci când plasați steagul.\n\nConstruiți un steag culegător lângă niște tufișuri de afine."
status = "normal"

["Tutorial.WaterAndFood.MarkCarrots"]
new = "Fermierii nu încep să lucreze până nu le spui tu ce și unde să planteze.\n\nFolosește instrumentul Plantează culturi pentru a desemna un câmp de morcovi.\n\nCulturile trebuie plantate pe terenuri irigate, verzi. Altfel, plantele se vor usca și, în cele din urmă, vor muri."
status = "normal"

["Tutorial.WaterAndFood.WaterPump"]
new = "Castorii au nevoie de apă pentru a supraviețui.\n\nConstruiește o pompă de apă pentru a asigura acces continuu la apă potabilă. Nu uita să conectezi pompa la Centrul Districtual."
status = "normal"

["Tutorial.Wellbeing"]
new = "Bunăstare"
status = "normal"

["Tutorial.Wellbeing.Beaver"]
new = "Poți vedea impactul pe care acțiunile tale îl au asupra castorilor tăi.\n\nSelectează un castor făcând clic pe el. În panou, poți vedea starea sa actuală de bine, atributele și nevoile sale.\n\nUnele nevoi pot atinge valori negative și pot atrage penalizări severe sau pot cauza moartea."
status = "normal"

["Tutorial.Wellbeing.Campfire"]
new = "Bunăstarea este o metrică ce arată cât de mulțumit este un castor. Aceasta afectează trei atribute: viteza de lucru, viteza de mișcare și durata de viață.\n\nUna dintre principalele modalități de creștere a bunăstării este prin atracții. Atracțiile sunt clădiri în care intră castorii atunci când nu sunt la muncă."
status = "normal"

["Tutorial.Wellbeing.OpenWellbeingPanel"]
new = "Deschideți panoul de bunăstare"
status = "normal"

["Tutorial.Wellbeing.SelectBeaver"]
new = "Selectați un castor și verificați-i nevoile"
status = "normal"

["Tutorial.Wellbeing.SetWorkingHours"]
new = "Nu uitați că castorii au nevoie de timp liber pentru a mânca, a bea, a dormi și a se bucura de atracțiile așezării.\n\nPentru a maximiza productivitatea, trebuie să găsiți un echilibru între bunăstarea muncitorilor și programul lor de lucru.\n\nDeocamdată, să revenim la programul de lucru implicit."
status = "normal"

["Tutorial.Wellbeing.Shrub"]
new = "Bunăstarea crește și în jurul decorațiunilor. Castorii nu se apropie intenționat de ele, așa că amplasați decorațiunile aproape de locurile unde își petrec timpul coloniștilor.\n\nUn arbust este cea mai simplă decorațiune, iar castorii apreciază fiecare picătură de verdeață."
status = "normal"

["Tutorial.Wellbeing.WellbeingPanel"]
new = "Pentru castori, contează întreaga societate. Puteți vedea bunăstarea medie a așezării dvs. în colțul din stânga sus al ecranului.\n\nFaceți clic pe ea pentru a vedea îndeplinirea tuturor nevoilor posibile. Există multe modalități de a face viața în pustiu mai suportabilă."
status = "normal"

["Tutorial.Wood"]
new = "Lemn"
status = "normal"

["Tutorial.Wood.ConnectLumberjacks"]
new = "Fiecare clădire cu o intrare trebuie să fie conectată la un Centru Districtual printr-un drum. Când selectați o clădire, puteți vedea intrarea acesteia marcată cu o săgeată.\n\nConstruiți drumuri pentru a conecta Steagurile Tăietorilor de Lemne la Centrul Districtual."
status = "normal"

["Tutorial.Wood.FinishLumberjacks"]
new = "Steagurile nu vor fi construite decât dacă se află în raza de acțiune a districtului.\n\nSelectați Centrul Districtului pentru a vedea raza sa de acțiune. O puteți extinde conectând drumurile la intrarea în Centrul Districtului."
status = "normal"

["Tutorial.Wood.MarkTrees"]
new = "Pădurarii taie copaci doar în zonele pe care le marcați pentru tăiere.\n\nCopacii trebuie să se afle în raza de acțiune a unui steag de tăiere a lemnelor. Selectați un steag pentru a-i vedea raza de acțiune.\n\nUtilizați acum instrumentul Marcați zona de tăiere a copacilor. Țineți apăsat butonul mouse-ului pentru a selecta mai multe plăci simultan."
status = "normal"

["Tutorial.Wood.PlaceLumberjacks"]
new = "Fiecare așezare de castori are nevoie de bușteni , foarte mulți bușteni. Doar pădurarii pot tăia copaci.\n\nConstruiește steaguri pentru tăietori de lemne lângă copacii din apropiere."
status = "normal"

["Tutorial.WorkingHours"]
new = "Ore de lucru"
status = "normal"

["Tutorial.WorkingHours.SetWorkingHours"]
new = "Ajustarea orelor de lucru este o modalitate de a vă gestiona producția.\n\nZilele de lucru mai lungi înseamnă un progres mai rapid, dar în fiecare seară, castorii au nevoie de timp pentru a se relaxa și a dormi. Nu-i forțați prea mult pentru prea mult timp.\n\nDeocamdată, haideți să creștem puțin orele de lucru."
status = "normal"

