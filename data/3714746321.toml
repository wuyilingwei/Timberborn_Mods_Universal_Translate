frFR = "Les castors ont rapidement réalisé qu'ils pouvaient emprunter certaines techniques à des rongeurs moins avancés."
deDE = "Die Biber erkannten schnell, dass sie einige Techniken von weniger entwickelten Nagetieren übernehmen konnten."
plPL = "Bobry szybko zorientowały się, że mogą pożyczyć niektóre techniki od mniej zaawansowanych gryzoni."
ptBR = "Os castores logo perceberam que podiam emprestar algumas técnicas de roedores menos avançados."
koKR = "비버들은 덜 발전된 설치류들로부터 일부 기술을 빌릴 수 있다는 것을 빠르게 깨달았다."
csCZ = "Castorové si rychle uvědomili, že mohou vypůjčit některé techniky od méně vyspělých hlodavců."
viVN = "Những con beaver nhanh chóng nhận ra rằng họ có thể mượn một số kỹ thuật từ những loài gặm nhấm ít phát triển hơn."

