["MapMetadata.ThousandIslands.Description"]
status = "normal"
raw = "Chiar și pentru înotătorii înnăscuți, transformarea unui arhipelag într-o colonie industrială înfloritoare nu este o sarcină ușoară."
enUS = "Even for born swimmers, turning an archipelago into a thriving industrial colony is no easy task."
zhCN = "即使对于天生的游泳者而言，将一个群岛转变为繁荣的工业殖民地也不是一项简单的任务。"
zhTW = "即使對於天生的游泳者來說，將群島轉變為繁榮的工業殖民地也不是一項簡單的任務。"
ruRU = "Даже для заядлых пловцов превращение архипелага в процветающую промышленную колонию — задача не из легких."
jaJP = "生まれながらの泳ぎ手にとっても、群島を繁栄する工業コロニーに変えることは容易な作業ではない。"
frFR = " même pour les nageurs nés, transformer un archipel en une colonie industrielle florissante n'est pas une tâche facile."
deDE = "Selbst für geborene Schwimmer ist die Umwandlung eines Archipels in eine blühende Industriekolonie keine leichte Aufgabe."
plPL = "Nawet dla urodzonych pływaków przekształcenie archipelagu w kwitnącą kolonię przemysłową nie jest łatwym zadaniem."
ptBR = "Mesmo para nadadores natos, transformar um arquipélago em uma colônia industrial próspera não é uma tarefa fácil."
koKR = "천부적인 수영 спортсмен에게도 군도를 번영하는 산업 식민지로 변모시키는 것은 쉬운 일이 아니다."
csCZ = "Dokonce i pro přirozené plavce není proměna souostroví v prosperující průmyslovou kolonii snadným úkolem."
viVN = "Ngay cả đối với những người bơi lội bẩm sinh, việc biến một quần đảo thành một thuộc địa công nghiệp phát triển không phải là một nhiệm vụ dễ dàng."

