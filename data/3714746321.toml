["Building.ScavengerFlag.FlavorDescription"]
raw = "Aducând metal în așezările tradiționale din lemn, necrofagii câștigă respect din partea unora și dispreț din partea altora."
status = "normal"
enUS = "By bringing metal into traditional wooden settlements, scavengers earn respect from some and disdain from others."
zhCN = "“通过将金属带入传统木材定居点，食腐者赢得了一些人的尊重，也受到另一些人的蔑视。”"
zhTW = "將金屬帶入傳統木製聚落，食腐動物獲得某些人的尊敬，但也受到其他人的輕蔑。"
ruRU = "Принося металл в традиционные деревянные поселения, падальщики зарабатывают уважение одних и презрение других."
jaJP = "「伝統的な木造集落に金属を持ち込むことで、腐肉食者たちは一部の者から尊敬を集め、他の者からは軽蔑される。」"
frFR = "En apportant du métal dans les colonies traditionnelles en bois, les nécrophages gagnent le respect de certains et le mépris d'autres."
deDE = "Indem sie Metall in die traditionellen Holzsiedlungen bringen, gewinnen die Leichenschänder den Respekt von einigen und die Verachtung von anderen."
plPL = "Przynosząc metal do tradycyjnych drewnianych osad, szubrawcy zdobywają szacunek niektórych i pogardę innych."
ptBR = "Levando metal para assentamentos tradicionais de madeira, os necrófagos ganham respeito de alguns e desprezo de outros."
koKR = "전통적인 나무 마을에 금속을 가져오면서, 하수인들은 일부로부터 존경을 얻고 다른 일부로부터 경멸을 받는다."
csCZ = "Přinášející kov do tradičních dřevěných osad, mrchožrouti získávají respekt některých a pohrdání od jiných."
viVN = "Bằng cách mang lại kim loại cho những khu định cư truyền thống bằng gỗ, những kẻ ăn xác thối kiếm được sự tôn trọng từ một số người và sự khinh thường từ những người khác."

