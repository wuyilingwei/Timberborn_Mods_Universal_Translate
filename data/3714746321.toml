["Tutorial.Science.Inventor"]
raw = "Castorii sunt inginerii lumii animale. E timpul să le transformăm ideile lemnoase în realitate.\n\nConstruiește un Inventator pentru a produce Puncte Științifice."
status = "normal"
enUS = "The beavers are the engineers of the animal world. It's time to turn their woody ideas into reality.\n\nBuild an Inventor to produce Science Points."
zhCN = "海狸是动物世界的工程师。是时候将他们的木头创意变为现实了。\n\n建造一个发明家来生产科学点。"
zhTW = "海狸是動物界的工程師。是時候將它們木質的想法變為現實。\n\n建造一個發明家來生產科學點數。"
ruRU = "Бобры — инженеры животного мира. Пора превратить их древесные идеи в реальность.\n\nПостройте Изобретателя, чтобы производить Научные Очки."
jaJP = "ビーバーは動物界のエンジニアです。彼らの木のアイデアを現実に変える時が来ました。\n\n発明家を建設して科学ポイントを生産しましょう。"
frFR = "Les castors sont les ingénieurs du monde animal. Il est temps de transformer leurs idées en bois en réalité.\n\nConstruisez un Inventeur pour produire des Points de Science."
deDE = "Die Biber sind die Ingenieure der Tierwelt. Es ist an der Zeit, ihre hölzernen Ideen in die Realität umzusetzen.\n\nBaue einen Erfinder, um Wissenschaftspunkte zu produzieren."
plPL = "Bobry są inżynierami świata zwierząt. Czas, abyśmy przekształcili ich drewniane pomysły w rzeczywistość.\n\nZbuduj Wynalazcę, aby produkować Punkty Naukowe."
ptBR = "Os castores são os engenheiros do mundo animal. É hora de transformar suas ideias de madeira em realidade.\n\nConstrua um Inventor para produzir Pontos Científicos."
koKR = "비버는 동물 세계의 엔지니어입니다. 그들의 나무 아이디어를 현실로 바꿀 시간입니다.\n\n발명가를 건설하여 과학 포인트를 생산하세요."
csCZ = "„Bobři jsou inženýři zvířecího světa. Je čas proměnit jejich dřevěné nápady ve skutečnost.\n\nPostavte vynálezce, abyste produkovali vědecké body.“"
viVN = "Castor là kỹ sư của thế giới động vật. Đã đến lúc biến những ý tưởng từ gỗ của chúng thành hiện thực.\n\nXây dựng một Nhà phát minh để sản xuất Điểm Khoa học."

["Tutorial.Science.SciencePoints"]
raw = "Deocamdată, lăsați Inventatorul să lucreze.\n\nDupă ce acumulați suficiente Puncte de Știință, le vom cheltui pentru a debloca clădiri mai avansate."
status = "normal"
enUS = "For now, let the Inventor work.\n\nOnce you accumulate enough Science Points, we will spend them to unlock more advanced buildings."
zhCN = "“目前，请让发明家工作。\n\n在积累足够的科学点后，我们将把它们用来解锁更高级的建筑。”"
zhTW = "目前，讓發明家工作。\n\n在您積累足夠的科學點數後，我們將花費它們來解鎖更先進的建築。"
ruRU = "Пока позвольте Изобретателю работать.\n\nПосле того как вы накопите достаточное количество Очков Науки, мы потратим их на разблокировку более продвинутых зданий."
jaJP = "「今のところ、発明家に作業させておきましょう。\n\n十分な科学ポイントを蓄積したら、それを使ってより高度な建物のロックを解除します。」"
frFR = "Pour l'instant, laissez l'Inventeur travailler.\n\nUne fois que vous aurez accumulé suffisamment de Points de Science, nous les dépenserons pour débloquer des bâtiments plus avancés."
deDE = "„Im Moment lassen Sie den Erfinder arbeiten.\n\nNachdem Sie genügend Wissenschaftspunkte gesammelt haben, werden wir sie ausgeben, um fortschrittlichere Gebäude freizuschalten.“"
plPL = "Na razie pozwólcie Wynalazcy pracować.\n\nKiedy zdobędziecie wystarczająco dużo Punktów Nauki, wydamy je na odblokowanie bardziej zaawansowanych budynków."
ptBR = "Por enquanto, deixe o Inventor trabalhar.\n\nDepois de acumular pontos de ciência suficientes, os gastaremos para desbloquear edifícios mais avançados."
koKR = "아직은 발명가가 작업하도록 두십시오.\n\n충분한 과학 점수를 축적한 후, 더 고급 건물을 잠금 해제하는 데 사용할 것입니다."
csCZ = "Zatím nechte Vynálezce pracovat.\n\nJakmile nasbíráte dostatek Bodů Vědy, utratíme je na odemknutí pokročilejších budov."
viVN = "Hiện tại, hãy để Nhà phát minh làm việc.\n\nSau khi bạn tích lũy đủ Điểm Khoa học, chúng tôi sẽ chi tiêu để mở khóa các tòa nhà tiên tiến hơn."

