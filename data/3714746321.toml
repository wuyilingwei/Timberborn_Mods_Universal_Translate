["Building.GreaseFactory.FlavorDescription"]
raw = "„Ei bine, un robot ar putea fi sistematic, hidromatic... De ce nu ar putea fi uns?” —Ol' Kazko"
status = "normal"
enUS = "\"Well, a robot could be systematic, hydromatic... Why couldn't it be greased?\" —Ol' Kazko"
