plPL = "„Dzień po dniu, noc po nocy, zmagamy się. To piękne.” —Ol' Kazko"
ptBR = "\"Dia após dia, noite após noite, nos esforçamos. É bonito.\" —Ol' Kazko"
koKR = "하루가 지나고, 밤이 지나고, 우리는 괴롭힘을 당하고 있습니다. 아름답습니다.” —올' 카즈코"
