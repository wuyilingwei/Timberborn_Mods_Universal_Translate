["NewGameConfigurationPanel.HardModeDescription"]
raw = "Oamenii nu au reușit și nici tu nu vei reuși.\n\nAșezarea ta începe cu resurse limitate.\n\nSecetele și mareele rele sunt severe și se agravează în timp.\n\nAscuți-ți incisivii."
status = "normal"
enUS = "Humans have failed, and you will fail too.\n\nYour settlement begins with limited resources.\n\nDroughts and bad tides are severe and worsen over time.\n\nSharpen your incisors."
zhCN = "人们没有成功，你也不会成功。\n\n你的定居点从有限的资源开始。\n\n干旱和恶劣的潮汐十分严峻，随着时间的推移更为严重。\n\n磨利你的犬牙。"
zhTW = "人類沒有成功，你也不會成功。\n\n你的定居點開始時資源有限。\n\n乾旱和不利潮汐非常嚴重，並且隨著時間的推移會變得更加嚴重。\n\n磨利你的銳牙。"
ruRU = "Люди не справились, и ты тоже не справишься.\n\nТвое поселение начинается с ограниченными ресурсами.\n\nЗасухи и плохие приливы суровы и со временем усугубляются.\n\nЗаточи свои резцы."
jaJP = "人々は成功せず、あなたも成功することはない。\n\nあなたの集落は限られた資源から始まる。\n\n干ばつと悪潮は厳しく、時間と共に悪化する。\n\nあなたの牙を研げ。"
frFR = "Les gens n'ont pas réussi et toi non plus tu ne réussiras pas.\n\nTa colonie commence avec des ressources limitées.\n\nLes sécheresses et les marées néfastes sont sévères et s'aggravent avec le temps.\n\nAffûte tes incisives."
deDE = "Die Menschen haben es nicht geschafft und du wirst es auch nicht schaffen.\n\nDeine Siedlung beginnt mit begrenzten Ressourcen.\n\nDürren und schlechte Gezeiten sind heftig und werden im Laufe der Zeit schlimmer.\n\nSchärfe deine Schneidezähne."
plPL = "Ludzie się nie udało, a ty również się nie uda.\n\nTwoje osiedle zaczyna z ograniczonymi zasobami.\n\nSusze i złe przypływy są surowe i pogarszają się z czasem.\n\nOstrz swoje kły."
ptBR = "Os humanos não conseguiram e você também não conseguirá.\n\nSua colônia começa com recursos limitados.\n\nSecas e marés ruins são severas e se agravam com o tempo.\n\nAperte seus dentes incisivos."
koKR = "인간은 실패했고 당신도 실패할 것입니다.\n\n당신의 정착지는 제한된 자원으로 시작됩니다.\n\n가뭄과 불길한 조수는 심각하며 시간이 지남에 따라 악화됩니다.\n\n날카로운 이빨을 갈아라."
csCZ = "Lidé selhali a ty také selžeš.\n\nTvoje osada začíná s omezenými zdroji.\n\nSucha a špatné přílivy jsou tvrdé a časem se zhoršují.\n\nNaostři si svoje špičáky."
viVN = "N人类并未成功，你也不会成功。\n\n你的定居点开始时资源有限。\n\n干旱和恶劣的潮汐非常严重，并且随着时间的推移会加重。\n\n磨锐你的利齿。"

