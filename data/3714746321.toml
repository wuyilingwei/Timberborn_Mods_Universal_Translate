jaJP = "「手作業が工業化に取って代わった後でも、アイアンティースの労働倫理は変わらなかった。」"
frFR = "Even after manual labor gave way to industrialization, the work ethic of the Iron Teeth remained unchanged."
deDE = " Selbst nachdem die manuelle Arbeit der Industrialisierung gewichen ist, hat sich die Arbeitsmoral der Iron Teeth nicht verändert."
plPL = "Nawet po tym, jak praca ręczna ustąpiła miejsca industrializacji, etos pracy Żelaznych Zębów nie uległ zmianie."
ptBR = "Mesmo depois que o trabalho manual cedeu lugar à industrialização, a ética de trabalho dos Dentes de Ferro não mudou."
koKR = "수작업이 산업화에 자리를 내준 후에도 Iron Teeth의 근무 윤리는 변하지 않았다."
