["Building.EarthRepopulator.IronTeeth.FlavorDescription"]
raw = "După câteva teste cu o catapultă, acum clasificate, acest design a fost adoptat în schimb."
status = "normal"
enUS = "After a few tests with a now-classified catapult, this design was adopted instead."
zhCN = "经过几次测试后，这种设计被采纳为一种新的分类弹射器。"
zhTW = "經過幾次現已歸類的投石機測試，這個設計因此被採納。"
ruRU = "После нескольких испытаний с катапультой, теперь классифицированных, этот дизайн был принят вместо этого."
jaJP = "「いくつかのカタパルトでのテストの後、現在は機密扱いとなっているこのデザインが採用されました。」"
frFR = "Après quelques tests avec une catapulte, désormais classifiés, ce design a été adopté en remplacement."
deDE = "Nach einigen Tests mit einer jetzt klassifizierten Katapult wurde dieses Design stattdessen übernommen."
plPL = "Po kilku testach z katapultą, teraz sklasyfikowaną, ten projekt został przyjęty zamiast tego."
ptBR = "Após alguns testes com uma catapulta, agora classificados, esse design foi adotado em vez disso."
koKR = "몇 가지 테스트를 거친 후, 현재 기밀인 이 디자인은 대체로 채택되었습니다."
csCZ = "Po několika testech s katapultou, nyní klasifikovanými, byl tento design přijat místo toho."
viVN = "Sau sau vài thử nghiệm với một chiếc ná bắn đá, giờ đã được phân loại, thiết kế này đã được áp dụng thay thế."
trTR = "Birkaç artık sınıflandırılmış testten sonra, bu tasarım değiştirilerek benimsenmiştir."

["Building.EfficientFarmhouse.Description"]
raw = "Angajează fermieri pentru a planta și recolta culturi. Designul extins Folktails se potrivește mai multor fermieri."
status = "normal"
enUS = "Hires farmers to plant and harvest crops. The expanded Folktails design accommodates more farmers."
zhCN = "雇用农民种植和收割作物。扩展的Folktails设计更适合多个农民。"
zhTW = "僱用農夫來種植和收穫作物。擴展的Folktails設計適合更多農夫。"
ruRU = "Нанимает фермеров для посадки и сбора урожая. Расширенный дизайн Folktails подходит для большего числа фермеров."
jaJP = "「農夫を雇って作物を植えたり収穫したりします。拡張デザインのフォルクテイルズは、より多くの農夫に適しています。」"
frFR = "Embauchez des fermiers pour planter et récolter des cultures. Le design étendu Folktails convient à plusieurs fermiers."
deDE = "Stellt Landwirte ein, um Pflanzen zu säen und zu ernten. Das erweiterte Folktails-Design eignet sich für mehrere Landwirte."
plPL = "Zatrudnij rolników do sadzenia i zbierania plonów. Rozszerzony projekt Folktails pasuje do większej liczby rolników."
ptBR = "Contrata agricultores para plantar e colher culturas. O design expandido Folktails é adequado para mais agricultores."
koKR = "농부를 고용하여 작물을 심고 수확하세요. 확장된 Folktails 디자인은 더 많은 농부에게 적합합니다."
csCZ = "Najměte farmáře k pěstování a sklizni plodin. Rozšířený design Folktails se hodí pro více farmářů."
viVN = "Thuê nông dân để trồng và thu hoạch cây trồng. Thiết kế mở rộng Folktails phù hợp cho nhiều nông dân hơn."
trTR = "Tarım ürünlerini yetiştirmek ve hasat etmek için çiftçi istihdam eder. Genişletilmiş Folktails tasarımı daha fazla çiftçiye uyum sağlar."

