["MapMetadata.Meander.Description"]
raw = "Inginerii Beaver sunt dornici să exploateze curbura naturală a malurilor râurilor. Planificarea celei mai bune utilizări a spațiului limitat este partea dificilă."
status = "normal"
enUS = "The Beaver engineers are eager to exploit the natural curvature of the riverbanks. Planning the best use of limited space is the difficult part."
zhCN = "海狸工程师渴望利用河岸的自然曲线。规划有限空间的最佳使用是困难的部分。"
zhTW = "貂工程師渴望利用河岸的自然彎曲。規劃有限空間的最佳使用是困難的部分。"
ruRU = "Инженеры Бобров стремятся использовать естественную кривизну берегов рек. Планирование наилучшего использования ограниченного пространства - это сложная задача."
jaJP = "ビーバーのエンジニアたちは、川の岸の自然な曲線を活用することに意欲的です。限られたスペースの最適な利用を計画することが難しい部分です。"
frFR = "Les ingénieurs Beaver sont désireux d'exploiter la courbure naturelle des rives des rivières. Planifier la meilleure utilisation de l'espace limité est la partie difficile."
deDE = "Die Biber-Ingenieure sind begierig darauf, die natürliche Krümmung der Flussufer auszunutzen. Die Planung der besten Nutzung des begrenzten Raums ist der schwierige Teil."
plPL = "Inżynierowie Bobry są chętni do wykorzystania naturalnego zakrętu brzegów rzek. Zaplanowanie najlepszego wykorzystania ograniczonej przestrzeni jest trudną częścią."
ptBR = "Os engenheiros Castor estão ansiosos para explorar a curvatura natural das margens dos rios. Planejar o melhor uso do espaço limitado é a parte difícil."
koKR = "비버 엔지니어들은 강가의 자연스러운 곡선을 활용하고자 합니다. 제한된 공간의 최적 사용을 계획하는 것이 어려운 부분입니다."
csCZ = "Inženýři Bobři jsou nedočkaví využít přírodní zakřivení břehů řek. Naplánování nejlepšího využití omezeného prostoru je ta obtížná část."
viVN = "Các kỹ sư Beaver rất muốn khai thác độ cong tự nhiên của bờ sông. Lập kế hoạch cho việc sử dụng tốt nhất không gian hạn chế là phần khó khăn."

