["Building.LargeWaterPump.Description"]
status = "normal"
raw = "Pompează și filtrează cantități mari de apă pentru ca castorii să o bea. Contaminarea apei încetinește viteza de pompare."
enUS = "Pumps and filters large amounts of water for beavers to drink. Water contamination slows down the pumping speed."
zhCN = "抽取并过滤大量水供海狸饮用。水污染会减慢抽水速度。"
zhTW = "泵送並過濾大量水源供海狸飲用。水源污染會減緩泵送速度。"
ruRU = "Перекачивает и фильтрует большие объемы воды, чтобы бобры могли ее пить. Загрязнение воды замедляет скорость перекачки."
jaJP = "「ビーバーが飲むために大量の水を汲み上げ、ろ過します。水の汚染はポンプの速度を遅くします。」"
frFR = "Pompe et filtre de grandes quantités d'eau pour que les castors puissent en boire. La contamination de l'eau ralentit la vitesse de pompage."
deDE = "Pumpt und filtert große Mengen Wasser, damit die Biber davon trinken können. Eine Verunreinigung des Wassers verlangsamt die Pumpgeschwindigkeit."
plPL = "Pompowanie i filtrowanie dużych ilości wody, aby bobry mogły ją pić. Zanieczyszczenie wody spowalnia tempo pompowania."
ptBR = "Bom e filtra grandes quantidades de água para que os castores possam beber. A contaminação da água reduz a velocidade de bombeamento."
koKR = "비버가 마실 수 있도록 대량의 물을 펌프하고 필터링합니다. 물의 오염은 펌프 속도를 저하시킵니다."
csCZ = "Čerpá a filtruje velké množství vody, aby ji bobři mohli pít. Kontaminace vody zpomaluje rychlost čerpání."
viVN = "Bơm và lọc một lượng lớn nước để loài castor có thể uống. Ô nhiễm nước làm chậm tốc độ bơm."

