["Building.SmallIndustrialPile.FlavorDescription"]
raw = "„Așa că au pus un acoperiș deasupra și l-au numit industrial. Clasic.” —Pina"
status = "normal"
enUS = "\"So they put a roof on it and called it industrial. Classic.\" —Pina"
zhCN = "“于是他们在上面加了个屋顶，称之为工业。经典。” —皮娜"
zhTW = "「“所以他們在上面加了一個屋頂，然後叫它工業品。經典。” —Pina」"
ruRU = "„Вот и поставили крышу и назвали это индустриальным. Классика.” —Пина"
jaJP = "「だから彼らは屋根を載せて、それを工業的なものと呼んだ。クラシックだ。」 —ピナ"
frFR = "« Alors ils ont mis un toit dessus et l'ont appelé industriel. Classique. » —Pina"
deDE = "„Also haben sie ein Dach oben drauf gesetzt und es industriell genannt. Klassisch.” —Pina"
plPL = "„Więc postawili dach na górze i nazwali to przemysłowym. Klasyka.” —Pina"
ptBR = "„Então colocaram um telhado em cima e chamaram de industrial. Clássico.” —Pina"
koKR = "\"그래서 그들은 위에 지붕을 덮고 '산업용'이라고 이름 붙였습니다. 고전적입니다.\" —피나"
csCZ = "„A tak nad něj dali střechu a nazvali to průmyslové. Klasické.” —Pina"
viVN = "\"Vậy là họ đã đặt một cái mái trên đầu và gọi nó là công nghiệp. Cổ điển.\" —Pina"

