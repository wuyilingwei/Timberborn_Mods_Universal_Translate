["Tutorial.Introduction.Description"]
raw = "Bun venit la Timberborn! Acest tutorial te va ajuta să-ți pui gheața în pustiu și să supraviețuiești primelor zile.\n\nVei învăța cum să folosești uneltele necesare pentru a construi o comunitate prosperă de castori.\n\nPe măsură ce progresezi prin următorii pași, sfaturile vor apărea aici."
status = "normal"
enUS = "Welcome to Timberborn! This tutorial will help you get settled in the wilderness and survive your first days.\n\nYou will learn how to use the tools needed to build a thriving beaver community.\n\nAs you progress through the next steps, tips will appear here."
zhCN = "欢迎来到Timberborn！本教程将帮助你在荒野中建立基地，并在最初的日子里生存下来。\n\n你将学习如何使用必要的工具来建立一个繁荣的海狸社区。\n\n当你在接下来的步骤中进展时，提示将会出现在这里。"
zhTW = "歡迎來到Timberborn！這個教程將幫助你在荒野中安置冰塊，並在最初幾天中生存下來。\n\n你將學習如何使用必要的工具來建設一個繁榮的海狸社區。\n\n當你深入接下來的步驟時，這裡會出現提示。"
ruRU = "Добро пожаловать в Timberborn! Этот учебник поможет вам обосноваться в пустыне и выжить в первые дни.\n\nВы научитесь использовать инструменты, необходимые для строительства процветающего сообщества бобров.\n\nПо мере того как вы будете продвигаться по следующим шагам, здесь будут появляться советы."
jaJP = "ティンバーボーンへようこそ！このチュートリアルでは、あなたが荒野でサバイバルするための基礎を学びます。\n\n繁栄するビーバーのコミュニティを築くために必要なツールの使い方を学びます。\n\n次のステップに進むにつれて、ヒントがここに表示されます。"
frFR = "Bienvenue à Timberborn ! Ce tutoriel va vous aider à vous installer dans le désert et à survivre au cours de vos premiers jours.\n\nVous apprendrez à utiliser les outils nécessaires pour construire une communauté prospère de castors.\n\nAu fur et à mesure de votre progression à travers les étapes suivantes, des conseils apparaîtront ici."
deDE = "Willkommen bei Timberborn! Dieses Tutorial wird dir helfen, in der Wüste Fuß zu fassen und die ersten Tage zu überstehen.\n\nDu wirst lernen, wie man die notwendigen Werkzeuge einsetzt, um eine prosperierende Gemeinschaft von Bibern aufzubauen.\n\nWährend du durch die nächsten Schritte fortschreitest, werden hier Tipps angezeigt."
plPL = "Witaj w Timberborn! Ten samouczek pomoże Ci osiedlić się na pustyni i przetrwać pierwsze dni. \n\nNauczysz się, jak korzystać z narzędzi potrzebnych do zbudowania prosperującej społeczności bobrów. \n\nW miarę postępów w kolejnych krokach, wskazówki będą się pojawiać tutaj."
ptBR = "Bem-vindo ao Timberborn! Este tutorial irá ajudá-lo a se estabelecer no deserto e a sobreviver aos seus primeiros dias.\n\nVocê aprenderá a usar as ferramentas necessárias para construir uma comunidade próspera de castores.\n\nÀ medida que você avança pelos próximos passos, dicas aparecerão aqui."
koKR = "Timberborn에 오신 것을 환영합니다! 이 튜토리얼은 당신이 황무지에서 얼음을 켜고 첫날을 생존하는 데 도움이 될 것입니다.\n\n당신은 번영하는 비버 공동체를 구축하는 데 필요한 도구를 사용하는 방법을 배울 것입니다.\n\n다음 단계를 진행하면서 팁이 여기 나타날 것입니다."
csCZ = "Vítej v Timberbornu! Tento tutoriál ti pomůže dostat se z ledu do pouště a přežít první dny.\n\nNaučíš se, jak používat nástroje potřebné k vybudování prosperující komunity bobrů.\n\nJak budeš postupovat dalšími kroky, tipy se zde objeví."
viVN = "Chào mừng đến với Timberborn! Hướng dẫn này sẽ giúp bạn đặt nền tảng trong hoang dã và sống sót qua những ngày đầu.\n\nBạn sẽ học cách sử dụng các công cụ cần thiết để xây dựng một cộng đồng hạt phỉ thịnh vượng.\n\nKhi bạn tiến bộ qua các bước tiếp theo, các mẹo sẽ xuất hiện ở đây."

["Tutorial.LayerTool.ChangeUsingMouse"]
raw = "Puteți controla stratul vizibil fără a face clic pe butoane cu ajutorul combinațiilor de taste personalizabile.\n\nMulte alte acțiuni au și combinații de taste. Le puteți găsi în sfaturile instrumentale sau în meniul Setări."
status = "normal"
enUS = "You can control the visible layer without clicking buttons using customizable key combinations.\n\nMany other actions also have key combinations. You can find them in the tooltips or in the Settings menu."
zhCN = "您可以通过可自定义的快捷键控制可见图层，而无需单击按钮。\n\n许多其他动作也有快捷键。您可以在工具提示或设置菜单中找到它们。"
zhTW = "您可以使用可自訂的鍵盤組合，無需點擊按鈕即可控制可見層。\n\n許多其他操作也有鍵盤組合。您可以在工具提示或設定菜單中找到它們。"
ruRU = "Вы можете управлять видимым слоем, не нажимая на кнопки, с помощью настраиваемых комбинаций клавиш.\n\nМногие другие действия также имеют комбинации клавиш. Вы можете найти их в подсказках инструментов или в меню Настройки."
jaJP = "マウスを使用して層を変更する - 新しい翻訳テキスト: \"ボタンをクリックせずにカスタマイズ可能なキーボードの組み合わせを利用して、表示される層を制御できます。\n\n他の多くのアクションにもキーボードの組み合わせがあります。それらは、ヒントや設定メニューにあります。\""
frFR = "Vous pouvez contrôler la couche visible sans cliquer sur des boutons à l'aide de combinaisons de touches personnalisables.\n\nDe nombreuses autres actions ont également des combinaisons de touches. Vous pouvez les trouver dans les astuces contextuelles ou dans le menu Paramètres."
deDE = "Sie können die sichtbare Ebene steuern, ohne auf Schaltflächen zu klicken, mithilfe von anpassbaren Tastenkombinationen.\n\nViele andere Aktionen haben ebenfalls Tastenkombinationen. Diese finden Sie in den Tooltips oder im Menü Einstellungen."
plPL = "Możesz kontrolować widoczny warstwę bez klikania przycisków za pomocą personalizowanych kombinacji klawiszy.\n\nWiele innych działań ma również kombinacje klawiszy. Możesz je znaleźć w podpowiedziach narzędziowych lub w menu Ustawienia."
ptBR = "Você pode controlar a camada visível sem clicar em botões usando combinações de teclas personalizáveis.\n\nMuitas outras ações também têm combinações de teclas. Você pode encontrá-las nas dicas de ferramentas ou no menu de Configurações."
koKR = "마우스를 사용하여 클릭 없이도 볼 수 있는 레이어를 제어할 수 있습니다. \n\n많은 다른 동작에도 단축키가 있습니다. 이들은 도구 설명이나 설정 메뉴에서 확인할 수 있습니다."
csCZ = "Můžete ovládat viditelnou vrstvu bez kliknutí na tlačítka pomocí přizpůsobitelných klávesových zkratek.\n\nMnoho dalších akcí má také klávesové zkratky. Můžete je najít v nápovědách nebo v nabídce Nastavení."
viVN = "Bạn có thể điều khiển lớp hiển thị mà không cần nhấp vào nút bằng cách sử dụng các tổ hợp phím tùy chỉnh.\n\nNhiều hành động khác cũng có tổ hợp phím. Bạn có thể tìm thấy chúng trong các mẹo công cụ hoặc trong menu Cài đặt."

["Tutorial.LayerTool.ChangeUsingUI"]
raw = "Pe măsură ce așezarea crește pe verticală, lucrul sub clădiri și teren poate deveni dificil.\n\nInstrumentul Strat ajută în acest sens, ascunzând tot ce se află deasupra stratului selectat.\n\nSă schimbăm stratul vizibil făcând clic pe butoanele evidențiate."
status = "normal"
enUS = "As the settlement grows vertically, working under buildings and terrain can become difficult.\n\nThe Layer Tool helps with this by hiding everything above the selected layer.\n\nLet's change the visible layer by clicking the highlighted buttons."
zhCN = "随着定居点的垂直发展，在建筑物和地面下工作可能变得困难。\n\n层工具在这方面提供了帮助，隐藏所有位于所选层之上的内容。\n\n让我们通过点击突出显示的按钮来更改可见层。"
zhTW = "隨著定居點垂直增長，在建築物和地面下工作可能變得困難。\n\n層工具在這方面提供幫助，隱藏所有位於所選層之上的物體。\n\n讓我們點擊高亮的按鈕來更改可見層。"
ruRU = "По мере того как поселение растет вертикально, работа под зданиями и на земле может стать сложной.\n\nИнструмент Слой помогает в этом, скрывая всё, что находится выше выбранного слоя.\n\nДавайте изменим видимый слой, кликнув по выделенным кнопкам."
jaJP = "「入植地が垂直に成長するにつれて、建物や地面の下で作業することが難しくなることがあります。\n\n層ツールは、この点で役立ち、選択された層の上にあるすべてを隠します。\n\n強調表示されたボタンをクリックして、表示される層を変更しましょう。」"
frFR = "Au fur et à mesure que la colonie grandit verticalement, travailler sous les bâtiments et le terrain peut devenir difficile.\n\nL'outil de couche aide à cet égard, en masquant tout ce qui se trouve au-dessus de la couche sélectionnée.\n\nChangeons la couche visible en cliquant sur les boutons mis en évidence."
deDE = "Wenn sich die Siedlung vertikal ausdehnt, kann es schwierig werden, unter Gebäuden und Gelände zu arbeiten.\n\nDas Layertool hilft dabei, indem es alles über dem ausgewählten Layer ausblendet.\n\nLass uns die sichtbare Schicht ändern, indem wir auf die hervorgehobenen Tasten klicken."
plPL = "W miarę jak osada rośnie w górę, praca pod budynkami i na terenie może stać się trudna.\n\nNarzędzie Warstwy pomaga w tym, ukrywając wszystko, co znajduje się powyżej wybranej warstwy.\n\nZmieńmy widoczną warstwę, klikając na podświetlone przyciski."
ptBR = "Conforme a colônia cresce verticalmente, trabalhar sob edifícios e terrenos pode se tornar difícil.\n\nA Ferramenta de Camada ajuda nesse sentido, escondendo tudo que está acima da camada selecionada.\n\nVamos mudar a camada visível clicando nos botões destacados."
koKR = "정착지가 수직으로 성장함에 따라 건물과 땅 아래에서 작업하는 것이 어려워질 수 있습니다.\n\n레이어 도구는 선택된 레이어 위에 있는 모든 것을 숨겨서 이 문제를 도와줍니다.\n\n하이라이트된 버튼을 클릭하여 보이는 레이어를 변경해 봅시다."
csCZ = "Jak se osídlení rozrůstá vertikálně, práce pod budovami a terénem může být obtížná.\n\nNástroj vrstvy pomáhá tím, že skryje vše, co se nachází nad vybranou vrstvou.\n\nZměňme viditelnou vrstvu kliknutím na zvýrazněná tlačítka."
viVN = "Khi khu định cư phát triển theo chiều thẳng đứng, việc làm việc dưới các tòa nhà và mặt đất có thể trở nên khó khăn.\n\nCông cụ Lớp giúp ích điều này, ẩn đi mọi thứ phía trên lớp đã chọn.\n\nHãy thay đổi lớp hiển thị bằng cách nhấp vào các nút được làm nổi bật."

