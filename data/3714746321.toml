jaJP = "「デジットチューアーよりも優れている、今は引退した。」"
frFR = "Bien supérieur à Digitchewer, maintenant à la retraite."
deDE = "Viel überlegen gegenüber Digitchewer, jetzt im Ruhestand."
plPL = "Znacznie lepszy od Cyfrostwora, teraz na emeryturze."
ptBR = "Muito superior ao Digitchewer, agora aposentado."
