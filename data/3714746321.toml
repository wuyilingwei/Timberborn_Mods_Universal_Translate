["Tutorial.PowerAndPlanks.LumberMill"]
new = "E timpul să începeți să produceți scânduri!\n\nConstruiți o moară de cherestea direct lângă roata de apă. O puteți construi și mai departe și o puteți conecta la roata de apă folosind puțuri de alimentare.\n\nSfat: Multe clădiri, cum ar fi fabricile de cherestea și cabanele, își transmit energia una de la alta atunci când sunt așezate perete la perete. Nu sunt necesare puțuri de alimentare!"
