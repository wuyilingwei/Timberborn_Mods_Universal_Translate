["NewGameConfigurationPanel.NormalModeDescription"]
raw = "Vrei o provocare.\n\nAșezarea ta începe cu resurse moderate.\n\nSecetele și mareele rele sunt mai blânde la început, dar se intensifică în timp."
status = "normal"
enUS = "You want a challenge.\n\nYour settlement starts with moderate resources.\n\nDroughts and bad tides are gentler at the beginning, but they intensify over time."
zhCN = "你想要一个挑战。\n\n你的定居点以适中的资源开始。\n\n干旱和洪水在开始时更温和，但随着时间的推移会加剧。"
zhTW = "你想要一個挑戰。\n\n你的定居點開始時資源適中。\n\n乾旱和惡劣潮汐在一開始較為溫和，但隨著時間的推移會加劇。"
ruRU = "Ты хочешь вызов.\n\nТвое поселение начинается с умеренных ресурсов.\n\nЗасухи и сильные приливы в начале менее жестоки, но со временем усиливаются."
jaJP = "「挑戦したいです。\n\nあなたの拠点は適度なリソースから始まります。\n\n干ばつや悪潮は最初は穏やかですが、時間が経つにつれて激しくなります。」"
frFR = "Vous voulez un défi.\n\nVotre colonie commence avec des ressources modérées.\n\nLes sécheresses et les marées mauvaises sont plus douces au début, mais s'intensifient avec le temps."
deDE = "Du willst eine Herausforderung.\n\nDein Standort beginnt mit moderaten Ressourcen.\n\nDürren und schlechte Gezeiten sind zu Beginn milder, aber nehmen im Laufe der Zeit zu."
plPL = "Chcesz wyzwania.\n\nTwoja osada zaczyna z umiarkowanymi zasobami.\n\nSusze i złe przypływy są na początku łagodniejsze, ale z czasem się nasilają."
ptBR = "Você quer um desafio.\n\nSua colônia começa com recursos moderados.\n\nAs secas e as enchentes são mais suaves no início, mas se intensificam ao longo do tempo."
koKR = "도전을 원하십니까.\n\n당신의 정착지는 보통 자원으로 시작합니다.\n\n초기에는 기근과 악천후가 덜 심각하지만 시간이 지남에 따라 강해집니다."
csCZ = "Chceš výzvu.\n\nTvoje osídlení začíná s mírnými zdroji.\n\nSucha a přílivy jsou zpočátku mírnější, ale časem se zhoršují."
viVN = "Bạn muốn một thử thách.\n\nKhu định cư của bạn bắt đầu với tài nguyên vừa phải.\n\nNạn hạn hán và thủy triều xấu sẽ nhẹ nhàng hơn ở đầu, nhưng sẽ trở nên mạnh mẽ hơn theo thời gian."

