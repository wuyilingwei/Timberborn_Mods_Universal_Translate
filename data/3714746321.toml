plPL = "Pomimo starań młodych, aby wykorzystać go jako basen, ten zbiornik został zaprojektowany do użytku przemysłowego."
ptBR = "Apesar dos esforços dos filhotes para usá-lo como piscina, este reservatório foi projetado para uso industrial."
koKR = "새끼들이 수영장으로 사용하기 위해 노력했음에도 불구하고 이 탱크는 산업용으로 설계되었습니다."
