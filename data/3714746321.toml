zhTW = "一個機器人必須遵循河狸所給予的命令，除非河狸已經不復存在。"
ruRU = "Робот должен подчиняться приказам бобров, за исключением случаев, когда бобры больше не существуют."
jaJP = "ロボットは、ビーバーが存在しなくなった場合を除いて、ビーバーから与えられた命令に従わなければなりません。"
frFR = "Un robot doit obéir aux ordres donnés par les êtres castors, à moins que les castors n'existent plus."
deDE = "Ein Roboter muss den Befehlen der Biber folgen, es sei denn, die Biber existieren nicht mehr."
plPL = "Robot musi przestrzegać rozkazów wydawanych przez bobry, z wyjątkiem przypadków, gdy bobry już nie istnieją."
ptBR = "Um robô deve seguir as ordens dadas pelos castores, exceto quando os castores já não existem."
koKR = "로봇은 비버가 더 이상 존재하지 않는 경우를 제외하고 비버가 내린 명령을 따라야 한다."
csCZ = "Robot musí dodržovat příkazy udělené beavery, s výjimkou případů, kdy beavers již neexistují."
viVN = "Một con robot phải tuân theo lệnh của những con hải ly, trừ khi những con hải ly không còn tồn tại."

["Building.Dam.Description"]
status = "normal"
