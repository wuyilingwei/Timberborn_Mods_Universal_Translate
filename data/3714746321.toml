["Building.SteamEngine.FlavorDescription"]
status = "normal"
raw = "Oricât de măreață ar fi această invenție, a devenit o așchie în coasta națiunilor de castori, altele decât Iron Teeth."
enUS = "No matter how grand this invention is, it has become a thorn in the side of beaver nations other than Iron Teeth."
zhCN = "无论这项发明多么伟大，它已成为其他河狸国度（除了铁齿）的一个刺痛。"
zhTW = "無論這項發明多麼壯觀，它已成為其他非鐵牙國家的河狸民族的痛苦所在。"
ruRU = "Какой бы величественной ни была эта инвентаризация, она стала занозой в боках народов бобров, кроме Железных Зубов."
jaJP = "「この発明がいかに壮大であろうとも、それはアイアンティース以外のビーバーの国々にとって棘となった。」"
frFR = "Peu importe la grandeur de cette invention, elle est devenue une écharde dans le flanc des nations de castors, autres que Iron Teeth."
deDE = "So großartig diese Erfindung auch sein mag, sie ist zu einem Splitter in der Seite der Biber-Nationen geworden, abgesehen von den Iron Teeth."
plPL = "Nie wiem jak wspaniałe jest to wynalazek, ale stało się drzazgą w boku narodów bobrów, innych niż Żelazne Zęby."
ptBR = "Por mais grandiosa que seja esta invenção, ela se tornou uma lasca no flanco das nações de castores, exceto os Dentes de Ferro."
koKR = "이 발명품이 얼마나 웅장하든 간에, 그것은 아이언 티스 외의 비버 국가의 옆구리에 박혀 있는 조각이 되었다."
csCZ = "Ať je tento vynález jakkoli úchvatný, stal se třískou v boku národů bobrů, kromě Železných Zubů."
viVN = "Dù cho phát minh này vĩ đại đến đâu, nó đã trở thành một mảnh ghép trong cuộc sống của các quốc gia nhím băng, ngoài Iron Teeth."

