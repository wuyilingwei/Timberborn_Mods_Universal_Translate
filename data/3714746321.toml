["MapMetadata.Pressure.Description"]
status = "normal"
raw = "Instalațiile sanitare creative sunt prima abilitate pe care un castor de pustiu trebuie să o învețe."
enUS = "Creative plumbing is the first skill that a wasteland beaver must learn."
zhCN = "“创意卫生设施是荒野海狸必须掌握的第一个技能。”"
zhTW = "創意衛生設施是荒野海狸必須學會的第一項技能。"
ruRU = "Креативные санитарные системы – это первое умение, которое должен освоить бобёр-отшельник."
jaJP = "クリエイティブな衛生設備は、荒野のビーバーが最初に学ばなければならない能力です。"
frFR = "Les installations sanitaires créatives sont la première compétence qu'un castor des déserts doit apprendre."
deDE = "Kreative Sanitäranlagen sind die erste Fähigkeit, die ein Wüstenbiber lernen muss."
plPL = "Kreatywne instalacje sanitarno-techniczne to pierwsza umiejętność, którą bobrzy pustynny musi opanować."
ptBR = "As instalações sanitárias criativas são a primeira habilidade que um castor do deserto deve aprender."
koKR = "창의적인 위생 시설은 황야의 Beaver가 배워야 할 첫 번째 능력입니다."
csCZ = "Kreativní sanitární zařízení jsou první dovedností, kterou se musí pouštní bobr naučit."
viVN = "Các hệ thống vệ sinh sáng tạo là khả năng đầu tiên mà một con thú dữ phải học."

