["MapMetadata.Beaverome.Description"]
raw = "Pentru a construi legendara metropolă, strămoșii castorilor au drenat șapte cratere puternice. Chiar și cu tehnologia actuală a exploatării lemnului, nu este o realizare ușoară."
status = "normal"
enUS = "To build the legendary metropolis, the ancestors of the beavers drained seven powerful craters. Even with today's timber harvesting technology, it is not an easy achievement."
zhCN = "为了建造传奇的都市，海狸的祖先们排干了七个强大的坑洼。即使是依靠现代的伐木技术，这也不是一项轻松的成就。"
zhTW = "為了建造傳奇的都市，海狸的祖先排乾了七個強大的坑穴。即使是使用當前的木材開採技術，這也不是一項輕鬆的成就。"
ruRU = "Чтобы построить легендарную метрополию, предки бобров осушили семь мощных кратеров. Даже с современными технологиями лесозаготовки это не легкое достижение."
jaJP = "伝説の大都市を建設するために、ビーバーの祖先たちは7つの強力なクレーターの排水を行いました。現在の木材採取技術をもってしても、これは簡単な業績ではありません。"
frFR = "Pour construire la légendaire métropole, les ancêtres des castors ont drainé sept cratères puissants. Même avec la technologie actuelle d'exploitation du bois, ce n'est pas un exploit facile."
deDE = "Um die legendäre Metropole zu bauen, haben die Vorfahren der Biber sieben mächtige Krater entwässert. Selbst mit der heutigen Holzernte-Technologie ist das keine leichte Leistung."
plPL = "Aby zbudować legendarną metropolię, przodkowie bobrów osuszyli siedem potężnych kraterów. Nawet z obecnymi technologiami pozyskiwania drewna, nie jest to łatwe osiągnięcie."
ptBR = "Para construir a lendária metrópole, os ancestrais dos castores drenaram sete crateras poderosas. Mesmo com a tecnologia atual de exploração de madeira, não é uma conquista fácil."
koKR = "전설적인 대도시를 건설하기 위해 비버의 조상들은 강력한 일곱 개의 분화구를 배수했습니다. 현재 목재 채취 기술을 가지고도 이는 쉬운 성과가 아닙니다."
csCZ = "Abychom postavili legendární metropoli, předci bobrů odvodnili sedm mocných kráterů. Ani s dnešní technologií těžby dřeva to není snadný úkol."
viVN = "Để xây dựng thành phố huyền thoại, tổ tiên của loài castor đã thoát nước bảy miệng núi lửa mạnh mẽ. Ngay cả với công nghệ khai thác gỗ hiện tại, đó cũng không phải là một thành quả dễ dàng."

