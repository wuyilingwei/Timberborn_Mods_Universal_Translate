["Building.Numbercruncher.Description"]
status = "normal"
raw = "O mașină complicată care rezolvă calcule fără ca castorii să o opereze."
enUS = "A complicated machine that solves calculations without beavers operating it."
zhCN = "一台复杂的机器，能够在海狸不操作的情况下进行计算。"
zhTW = "一台複雜的機器，能夠解決計算而無需海狸操作。"
ruRU = "Сложная машина, которая выполняет вычисления без участия бобров."
jaJP = "ビーバーが操作することなく計算を解決する複雑な機械。"
frFR = "Une machine complexe qui effectue des calculs sans que les castors aient besoin de l'opérer."
deDE = "Eine komplizierte Maschine, die Berechnungen löst, ohne dass die Biber sie bedienen müssen."
plPL = "Kompleksowa maszyna, która rozwiązuje obliczenia bez potrzeby obsługi przez bobry."
ptBR = "Uma máquina complicada que resolve cálculos sem que os castores a operem."
koKR = "비버가 조작하지 않고도 계산을 해결하는 복잡한 기계입니다."
csCZ = "„Složitý stroj, který provádí výpočty bez toho, aby ho bobři obsluhovali.“"
viVN = "Một cỗ máy phức tạp giải quyết các phép toán mà không cần đến sự điều khiển của những con hải ly."

