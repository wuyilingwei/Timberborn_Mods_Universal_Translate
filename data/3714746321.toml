["MapMetadata.HelixMountain.Description"]
status = "normal"
raw = "Chiar dacă forma albiei râului li se pare impracticabilă, castorii recunosc abilitățile limitate ale orașului Hoomanity în ingineria hidrologică."
enUS = "Even though the riverbed's shape seems impractical, the beavers recognize the limited skills of the city of Hoomanity in hydrological engineering."
zhCN = "尽管河床的形状看起来不适合通行，但海狸们承认Hoomanity城市在水利工程方面的能力有限。"
zhTW = "儘管河床的形狀看起來不切實際，但海狸們承認Hoomanity城在水文工程方面的有限能力。"
ruRU = "Хотя форма русла реки кажется им непрактичной, бобры признают ограниченные способности города Хуманити в гидрологическом инжиниринге."
jaJP = "たとえ河床の形が不便に思えても、ビーバーたちはホーマニティの都市の水文学における限られた能力を認識しています。"
frFR = "Bien que la forme du lit de la rivière leur semble impraticable, les castors reconnaissent les capacités limitées de la ville de Hoomanity en ingénierie hydraulique."
deDE = "Auch wenn die Form des Flussbetts unpraktisch erscheint, erkennen die Biber die begrenzten Fähigkeiten der Stadt Hoomanity in der hydrologischen Ingenieurkunst an."
plPL = "Chociaż kształt koryta rzeki wydaje się niepraktyczny, bobry dostrzegają ograniczone umiejętności miasta Hoomanity w inżynierii hydrologicznej."
ptBR = "Embora a forma do leito do rio possa parecer impraticável, os castores reconhecem as habilidades limitadas da cidade de Hoomanity em engenharia hidrológica."
koKR = "강의 형태가 비현실적으로 보이더라도, 비버들은 휴머니티 시의 수문학적 엔지니어링에서의 제한된 능력을 인식하고 있다."
csCZ = "I když se forma koryta řeky zdá být neprůchodná, bobři uznávají omezené schopnosti města Hoomanity v hydrologickém inženýrství."
viVN = "Mặc dù hình dạng lòng sông có vẻ không thể thực hiện được, những con rái cá công nhận khả năng hạn chế của thành phố Hoomanity trong kỹ thuật thủy lợi."

