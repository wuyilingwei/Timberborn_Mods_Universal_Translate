["Tutorial.Droughts.Description"]
raw = "Felicitări! Așezarea ta a supraviețuit primei secete.\n\nSecetele fac parte din ciclul sezonier. Vor reveni și vor deveni mai lungi în timp.\n\nDacă nu ai făcut-o deja, începe să te pregătești pentru următoarea construind un baraj."
status = "normal"
enUS = "Congratulations! Your settlement has survived the first drought.\n\nDroughts are part of the seasonal cycle. They will return and become longer over time.\n\nIf you haven't already, start preparing for the next one by building a dam."
zhCN = "恭喜！你的定居点成功度过了第一次干旱。\n\n干旱是季节循环的一部分。它们会回来，并随着时间的推移变得更加漫长。\n\n如果你还没有这样做，请开始通过建造一个大坝来为下一次干旱做准备。"
zhTW = "恭喜！你的定居點成功度過了第一次乾旱。\n\n乾旱是季節循環的一部分。它們將會回歸，並隨著時間變得更長。\n\n如果你還沒有開始，請開始準備下一次的乾旱，建造一座大壩。"
ruRU = "Поздравляем! Ваша колония выжила во время первой засухи.\n\nЗасухи являются частью сезонного цикла. Они вернутся и будут длиться дольше со временем.\n\nЕсли вы еще этого не сделали, начните готовиться к следующей, построив плотину."
jaJP = "おめでとうございます！あなたの集落は最初の干ばつを乗り越えました。\n\n干ばつは季節のサイクルの一部です。再び訪れ、時間が経つにつれて長くなります。\n\nもしまだしていないなら、次の干ばつに備えてダムを建設する準備を始めましょう。"
frFR = "Félicitations ! Votre colonie a survécu à la première sécheresse.\n\nLes sécheresses font partie du cycle saisonnier. Elles reviendront et deviendront plus longues avec le temps.\n\nSi ce n'est pas déjà fait, commence à te préparer pour la suivante en construisant un barrage."
deDE = "Glückwunsch! Deine Siedlung hat die erste Dürre überstanden.\n\nDürreperioden sind Teil des saisonalen Zyklus. Sie werden zurückkehren und im Laufe der Zeit länger werden.\n\nWenn du es noch nicht getan hast, beginne dich auf die nächste vorzubereiten, indem du einen Damm baust."
plPL = "Gratulacje! Twoja osada przetrwała pierwszą suszę.\n\nSusze są częścią sezonowego cyklu. Powrócą i z czasem staną się dłuższe.\n\nJeśli jeszcze tego nie zrobiłeś, zacznij przygotowania do następnej, budując tamę."
ptBR = "Parabéns! Sua colônia sobreviveu à primeira seca.\n\nAs secas fazem parte do ciclo sazonal. Elas voltarão e se tornarão mais longas com o tempo.\n\nSe você ainda não fez isso, comece a se preparar para a próxima construindo uma barragem."
koKR = "축하합니다! 당신의 정착지가 첫 번째 가뭄을 극복했습니다.\n\n가뭄은 계절 주기의 일부입니다. 다시 나타날 것이며 시간이 지남에 따라 더 길어질 것입니다.\n\n아직 준비하지 않았다면, 댐을 건설하여 다음 가뭄에 대비하기 시작하세요."
csCZ = "Gratulujeme! Vaše osada přežila první sucho.\n\nSucha jsou součástí sezónního cyklu. Vrátí se a s časem se prodlouží.\n\nPokud jste to ještě neudělali, začněte se připravovat na další tím, že postavíte hráz."
viVN = "Xin chúc mừng! Khu định cư của bạn đã sống sót qua cơn hạn hán đầu tiên.\n\nHạn hán là một phần của chu kỳ theo mùa. Chúng sẽ trở lại và kéo dài hơn theo thời gian.\n\nNếu bạn chưa làm điều đó, hãy bắt đầu chuẩn bị cho lần hạn hán tiếp theo bằng cách xây dựng một đập."

