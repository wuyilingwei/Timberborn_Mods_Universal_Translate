["MapMetadata.Canyon.Description"]
raw = "În deșert, castorii caută văi unde râurile încă curg. Ușor de îndiguit, acest canion va deveni un refugiu sigur pentru toți."
status = "normal"
enUS = "In the desert, beavers search for valleys where rivers still flow. Easy to dam, this canyon will become a safe haven for all."
zhCN = "在沙漠中，海狸们寻找河流仍然流动的山谷。这个容易堤坝的峡谷将成为所有人的安全避难所。"
zhTW = "在沙漠中，海狸們搜尋著河流仍在流淌的山谷。這個容易被圍起來的峽谷將成為所有生物的安全避難所。"
ruRU = "В пустыне бобры ищут ущелья, где все еще текут реки. Легко поддающийся плотинированию, этот каньон станет надежным укрытием для всех."
jaJP = "砂漠では、ビーバーたちがまだ川が流れる谷を探しています。簡単に堤防を作ることができるこの峡谷は、すべてのビーバーにとって安全な避難所となるでしょう。"
frFR = "Dans le désert, les castors cherchent des vallées où les rivières coulent encore. Facile à endiguer, ce canyon deviendra un refuge sûr pour tous."
deDE = "Im Wüstengebiet suchen die Biber Täler, in denen die Flüsse noch fließen. Leicht zu dammen, wird diese Schlucht ein sicherer Zufluchtsort für alle sein."
plPL = "W pustyni bobry szukają dolin, gdzie rzeki wciąż płyną. Łatwy do zbudowania tamy, ten kanion stanie się bezpiecznym schronieniem dla wszystkich."
ptBR = "No deserto, os castores procuram vales onde os rios ainda correm. Fácil de represar, este cânion se tornará um refúgio seguro para todos."
koKR = "사막에서 비버들은 아직 흐르는 강이 있는 골짜기를 찾습니다. 쉽게 둑을 쌓을 수 있는 이 협곡은 모두에게 안전한 피난처가 될 것입니다."
csCZ = "V poušti hledají bobři údolí, kde ještě tečou řeky. Snadno zadržitelné, toto kaňon se stane bezpečným útočištěm pro všechny."
viVN = "Trong sa mạc, những con nhím tìm kiếm những thung lũng nơi mà các con sông vẫn còn chảy. Dễ dàng để xây đập, hẻm núi này sẽ trở thành một nơi trú ẩn an toàn cho tất cả."

