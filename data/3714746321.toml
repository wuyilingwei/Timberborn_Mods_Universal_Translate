["Building.LumberjackFlag.FlavorDescription"]
raw = "„Sunt tăietori de lemne și așa e, dorm toată noaptea și muncesc toată ziua!” — Cântec popular de castor"
status = "normal"
enUS = "\"There are lumberjacks and that's how it is, they sleep all night and work all day!” — Beaver folk song"
zhCN = "“‘我们是伐木工，没错，整晚睡觉，整天工作！’ — 海狸民谣”"
zhTW = "「我們是樹木砍伐者，這就是我們，整個晚上都在睡覺，整個白天都在工作！」—  河狸民歌"
ruRU = "„Мы дровосеки, и это так, спим всю ночь и работаем весь день!” — Народная песня бобра"
jaJP = "「“彼らは木こりで、そうだ、夜はずっと寝て、昼はずっと働く！” — ビーバーの民謡」"
frFR = "« Nous sommes des bûcherons et c'est ainsi, nous dormons toute la nuit et travaillons toute la journée ! » — Chanson populaire de castor"
deDE = "„Wir sind Holzfäller und so ist es, wir schlafen die ganze Nacht und arbeiten den ganzen Tag!” — Volkslied der Biber"
plPL = "„Jesteśmy drwalami i tak to jest, śpimy całą noc i pracujemy cały dzień!” — Ludowa piosenka bobra"
ptBR = "“São madeireiros e é assim, dormem a noite toda e trabalham o dia todo!” — Canção popular do castor"
koKR = "\"저희는 벌목꾼입니다. 저희는 밤새 자고 낮에 일하죠!\" — 비버 민속 노래"
csCZ = "„Jsou to dřevorubci a tak to je, spí celou noc a pracují celý den!” — Lidová píseň bobra"
viVN = "„Chúng là những người chặt cây và đúng vậy, họ ngủ suốt đêm và làm việc cả ngày!” — Bài hát dân gian của loài hải ly"
trTR = "„Ağaç kesicileriz ve bu böyle, bütün gece uyuruz ve bütün gün çalışırız!” — Kunduz halk şarkısı"

["Building.MechanicalFluidPump.Description"]
raw = "Pompează apa sau apele uzate pe o parte și le deversează pe cealaltă. Mai eficientă decât o pompă obișnuită."
status = "normal"
enUS = "Pumps water or wastewater on one side and discharges it on the other. More efficient than a regular pump."
zhCN = "“将水或废水抽取到一侧，并在另一侧排放。比普通泵更高效。”"
zhTW = "將水或污水抽取一端並排放至另一端。比普通泵更有效。"
ruRU = "Перекачивает воду или сточные воды с одной стороны и сбрасывает их с другой. Более эффективна, чем обычный насос."
jaJP = "「水や廃水を一方に汲み上げ、反対側に排出します。通常のポンプよりも効率的です。」"
frFR = "Pompe l'eau ou les eaux usées d'un côté et les déverse de l'autre. Plus efficace qu'une pompe ordinaire."
deDE = "Pumpt Wasser oder Abwasser auf einer Seite und entleert es auf der anderen. Effizienter als eine herkömmliche Pumpe."
plPL = "Pompuje wodę lub ścieki z jednej strony i wypuszcza je z drugiej. Bardziej efektywna niż zwykła pompa."
ptBR = "Bombeia água ou água residual de um lado e a despeja do outro. Mais eficiente do que uma bomba comum."
koKR = "물을 또는 폐수를 한쪽으로 펌프질하고 다른 쪽으로 배출합니다. 일반 펌프보다 더 효율적입니다."
