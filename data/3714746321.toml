["PlayerData.CorruptedDataInfo.Header"]
raw = "A apărut o problemă la citirea fișierului jucătorului. Am restaurat conținutul dintr-o copie de rezervă locală, dar este posibil ca unele detalii (inclusiv facțiunile deblocate și hărțile stăpânite) să se fi pierdut."
status = "normal"
enUS = "There was a problem reading the player file. We restored the content from a local backup, but some details (including unlocked factions and controlled maps) may have been lost."
zhCN = "读取玩家文件时出现问题。我们已从本地备份恢复内容，但某些细节（包括解锁的派系和掌控的地图）可能已丢失。"
zhTW = "讀取玩家檔案時發生了問題。我們從本地備份恢復了內容，但某些細節（包括解鎖的派系和佔領的地圖）可能會丟失。"
ruRU = "При чтении файла игрока возникла проблема. Мы восстановили содержимое из локальной резервной копии, но некоторые детали (включая разблокированные фракции и завоеванные карты) могут быть утеряны."
jaJP = "プレイヤーのファイルの読み取り中に問題が発生しました。ローカルのバックアップから内容を復元しましたが、いくつかの詳細（解除された派閥や制圧したマップを含む）が失われている可能性があります。"
frFR = "Un problème est survenu lors de la lecture du fichier du joueur. Nous avons restauré le contenu à partir d'une sauvegarde locale, mais il se peut que certains détails (y compris les factions débloquées et les cartes maîtrisées) aient été perdus."
deDE = "Es gab ein Problem beim Lesen der Spieldatei. Wir haben den Inhalt aus einer lokalen Sicherung wiederhergestellt, aber es ist möglich, dass einige Details (einschließlich freigeschalteter Fraktionen und beherrschter Karten) verloren gegangen sind."
plPL = "Wystąpił problem z odczytem pliku gracza. Przywróciliśmy zawartość z lokalnej kopii zapasowej, ale niektóre szczegóły (w tym odblokowane frakcje i opanowane mapy) mogły zostać utracone."
ptBR = "Foi detectado um problema ao ler o arquivo do jogador. Restauremos o conteúdo de um backup local, mas é possível que alguns detalhes (incluindo as facções desbloqueadas e os mapas conquistados) tenham sido perdidos."
koKR = "플레이어 파일을 읽는 데 문제가 발생했습니다. 로컬 백업에서 내용을 복원했습니다. 그러나 일부 세부 정보(잠금 해제된 파벌 및 정복한 지도 포함)가 손실되었을 수 있습니다."
csCZ = "Došlo k problému při čtení souboru hráče. Obnovili jsme obsah z místní zálohy, ale může se stát, že některé detaily (včetně odemčených frakcí a obsazených map) byly ztraceny."
viVN = "Đã xảy ra một vấn đề khi đọc tập tin của người chơi. Chúng tôi đã khôi phục nội dung từ một bản sao lưu cục bộ, nhưng có thể một số chi tiết (bao gồm các phe đã mở khóa và các bản đồ sở hữu) đã bị mất."

["Population.AllPerished"]
raw = "Și deși toți castorii au pierit, râul a continuat să curgă, scurta lor existență fiind doar un fir de praf de lemn."
status = "normal"
enUS = "And although all the beavers perished, the river continued to flow, their brief existence being just a speck of wooden dust."
zhCN = "“尽管所有的海狸都已逝去，河流依然在流淌，他们短暂的存在就如同一缕木屑般微不足道。”"
zhTW = "儘管所有的海狸都已逝去，河流仍然在流淌，他們短暫的存在不過是一縷木屑的塵埃。"
ruRU = "И хотя все бобры погибли, река продолжала течь, их короткое существование было лишь пылинкой дерева."
jaJP = "「すべてのビーバーが滅びたにもかかわらず、川は流れ続け、その短い存在は木のホコリのようなものであった。」"
frFR = "Et bien que tous les castors aient péri, la rivière a continué de couler, leur courte existence n'étant qu'un grain de poussière de bois."
deDE = "„Und obwohl alle Biber gestorben sind, floss der Fluss weiter, ihre kurze Existenz war nur ein Staubkorn aus Holz.“"
plPL = "I mimo że wszystkie bobry wyginęły, rzeka płynęła dalej, a ich krótkie istnienie było tylko kłaczkiem drewna."
ptBR = "E embora todos os castores tenham perecido, o rio continuou a fluir, sua breve existência sendo apenas um fio de poeira de madeira."
koKR = "모든 비버가 사라졌지만, 강은 계속 흐르며 그들의 짧은 존재는 나무 먼지 하나에 불과했다."
csCZ = "A přestože všichni bobři zahynuli, řeka pokračovala v toku, jejich krátká existence byla jen prachovým vláknem dřeva."
viVN = "Và mặc dù tất cả các con beaver đã chết, dòng sông vẫn tiếp tục chảy, sự tồn tại ngắn ngủi của chúng chỉ là một hạt bụi gỗ."

