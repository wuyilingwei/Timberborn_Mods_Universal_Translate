["Building.Carousel.FlavorDescription"]
raw = "„Unde crezi că te duci, puișorule? Crengile astea nu se vor decoji singure.” —Ma’ Ngonel"
status = "normal"
enUS = "\"Where do you think you're going, little chick? These branches won't peel themselves.\" —Ma’ Ngonel"
