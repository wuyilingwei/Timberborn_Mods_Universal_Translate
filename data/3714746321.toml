frFR = "« Autrefois, un pavillon n'était que cela, un pavillon. Et maintenant ? Je ne sais pas quoi dire. » —Ma’ Ngonel"
deDE = "„Früher war eine Hütte nur das, eine Hütte. Und jetzt? Ich weiß nicht, was ich sagen soll.” —Ma’ Ngonel"
plPL = "„Dawniej, chata była tylko tym, chatą. A teraz? Nie wiem co powiedzieć.” —Ma’ Ngonel"
ptBR = "“Antigamente, uma cabana era apenas isso, uma cabana. E agora? Não sei o que dizer.” —Ma’ Ngonel"
koKR = "\"예전에는 오두막이 그저 오두막이었지. 지금은? 뭐라고 해야 할지 모르겠어.\" —Ma’ Ngonel"
csCZ = "„Kdysi byla chata jen to, chata. A teď? Nevím, co si mám myslet.” —Ma’ Ngonel"
viVN = "\"Ngày xưa, một cái chòi chỉ đơn giản là một cái chòi. Còn bây giờ? Tôi không biết phải nói sao.\" —Ma’ Ngonel"
