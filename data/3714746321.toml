["Building.Inventor.FlavorDescription"]
raw = "Inspirați de moștenirea lui Ol' Kazko, inventatorii de castori sunt mereu dornici să își îmbunătățească tehnologia de prelucrare a lemnului."
status = "normal"
enUS = "Inspired by the legacy of Ol' Kazko, beaver inventors are always eager to improve their wood processing technology."
zhCN = "受到老卡兹科遗产的启发，海狸发明家们总是渴望改进他们的木材加工技术。"
zhTW = "受老卡茲科的遺產啟發，海狸發明家們始終渴望提升他們的木材加工技術。"
ruRU = "Вдохновленные наследием Олд Казко, изобретатели бобров всегда стремятся улучшить свои технологии обработки древесины."
jaJP = "オル・カズコの遺産に触発されたビーバーの発明者たちは、常に木材加工技術を向上させることに意欲的です。"
frFR = "Inspirés par l'héritage d'Ol' Kazko, les inventeurs de castors sont toujours désireux d'améliorer leur technologie de transformation du bois."
deDE = "Inspirierte von dem Erbe des alten Kazko sind die Erfinder der Biber stets bestrebt, ihre Holzverarbeitungstechnologie zu verbessern."
plPL = "Inspirowani dziedzictwem starego Kazko, wynalazcy bobrów zawsze pragną doskonalić swoją technologię obróbki drewna."
ptBR = "Inspirados pelo legado de Ol' Kazko, os inventores de castores estão sempre ansiosos para melhorar sua tecnologia de processamento de madeira."
koKR = "올 카즈코의 유산에 영감을 받아, 비버 발명가들은 항상 목재 가공 기술을 개선하고자 합니다."
csCZ = "Inspirováni od odkazu Ol' Kazka, bobří vynálezci jsou vždy ochotni zlepšovat svou technologii zpracování dřeva."
viVN = "Được truyền cảm hứng từ di sản của Ol' Kazko, những người sáng chế như beaver luôn khao khát cải thiện công nghệ chế biến gỗ của họ."
trTR = "Ol' Kazko'nun mirasıyla ilham alan kunduz mucitleri, her zaman odun işleme teknolojilerini geliştirmeye heveslidir."

