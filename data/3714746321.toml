["Building.PowerWheel.FlavorDescription"]
raw = "Castorii și-au dat seama rapid că pot împrumuta unele tehnici de la rozătoare mai puțin avansate."
status = "normal"
enUS = "The beavers quickly realized that they could borrow some techniques from less advanced rodents."
zhCN = "海狸们迅速意识到，他们可以借鉴一些较不先进的啮齿动物的技术。"
zhTW = "海狸們很快意識到他們可以從較不先進的啮齒類動物那裡借用某些技術。"
ruRU = "Бобры быстро поняли, что могут заимствовать некоторые техники у менее развитых грызунов."
