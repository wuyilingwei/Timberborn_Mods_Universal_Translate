["Faction.Folktails.GameOver.Flavor"]
raw = "Când nu reușești să folosești darurile naturii, ea ți le ia înapoi."
status = "normal"
enUS = "When you fail to use nature's gifts, it takes them back from you."
zhCN = "当你无法利用大自然的恩赐时，它会把这些恩赐收回。"
zhTW = "當你無法利用大自然的恩賜時，它將會收回這些恩賜。"
ruRU = "Когда ты не умеешь использовать дары природы, она их у тебя забирает."
jaJP = "自然の恵みを活かせなければ、それはあなたから奪われる。"
frFR = "Lorsque tu ne parviens pas à utiliser les dons de la nature, elle te les reprend."
deDE = "Wenn du die Geschenke der Natur nicht zu nutzen weißt, nimmt sie sie dir zurück."
plPL = "Kiedy nie potrafisz wykorzystać darów natury, ona je zabiera z powrotem."
ptBR = "Quando você não consegue aproveitar os presentes da natureza, ela os retira de volta."
koKR = "자연의 선 gifts을 사용하지 못하면, 자연은 그것들을 되돌려 받습니다."
csCZ = "Když nedokážeš využít dary přírody, ona ti je vezme zpět."
viVN = "Khi bạn không biết cách sử dụng những món quà của tự nhiên, nó sẽ lấy lại chúng."

["Faction.Folktails.GameOver.Message"]
raw = "Cozile voastre populare au avut parte de trista soartă a predecesorilor lor umani. Acesta este sfârșitul."
status = "normal"
enUS = "Your popular kind have met the sad fate of their human predecessors. This is the end."
zhCN = "你们的民间派系遭遇了人类祖先的悲惨命运。这是结束。"
zhTW = "你們的民間族群遇到了他們人類先人的悲慘命運。這就是終結。"
ruRU = "Ваши народные кланы столкнулись с грустной судьбой своих человеческих предков. Это конец."
jaJP = "あなたの民間のコロニーは、彼らの人間の先祖たちと同様の悲惨な運命に見舞われました。これが終わりです。"
frFR = "Vos factions populaires ont connu le triste sort de leurs prédécesseurs humains. C'est la fin."
deDE = "Eure Volksfraktionen haben das traurige Schicksal ihrer menschlichen Vorgänger erlebt. Dies ist das Ende."
plPL = "Wasze ludowe osady spotkały się z tragicznym losem swoich ludzkich poprzedników. To koniec."
ptBR = "As suas coletas populares enfrentaram a triste sorte de seus predecessores humanos. Este é o fim."
koKR = "귀하의 인기 있는 부족은 인류의 전임자들과 같은 슬픈 운명을 맞이했습니다. 이것이 끝입니다."
csCZ = "Vaše lidové frakce se setkaly s truchlivým osudem svých lidských předchůdců. Toto je konec."
viVN = "Các sắc tộc của bạn đã phải chịu đựng số phận bi thảm của tổ tiên con người của họ. Đây là sự kết thúc."

["Faction.Folktails.WonderCompletionFlavor"]
raw = "După ce au acumulat o mare bogăție și cunoștințe, castorii voștri au împărtășit roadele muncii lor cu planeta aflată în suferință. Mai sunt multe de făcut, dar Pământul ar putea înflori din nou."
status = "normal"
enUS = "After accumulating great wealth and knowledge, your beavers shared the fruits of their labor with the suffering planet. There is still much to be done, but the Earth could blossom again."
zhCN = "在积累了大量财富和知识之后，你们的海狸们将他们的劳动成果分享给了痛苦的星球。还有很多工作要做，但地球可能会再次繁荣。"
zhTW = "在積累了大量的財富和知識之後，你們的海狸將他們的勞動成果分享給這個受苦的星球。還有許多工作要做，但地球有可能再次繁榮。"
ruRU = "После накопления большого богатства и знаний, ваши бобры поделились плодами своего труда с страдающей планетой. Еще много нужно сделать, но Земля может снова зацвести."
jaJP = "「大きな富と知識を蓄えた後、あなたのビーバーたちは苦しむ惑星に彼らの労働の成果を分かち合いました。まだまだやるべきことはたくさんありますが、地球は再び繁栄するかもしれません。」"
frFR = "Après avoir accumulé une grande richesse et des connaissances, vos castors ont partagé les fruits de leur travail avec la planète souffrante. Il reste beaucoup à faire, mais la Terre pourrait à nouveau fleurir."
deDE = "Nachdem sie großen Reichtum und Wissen angehäuft haben, haben eure Biber die Früchte ihrer Arbeit mit dem leidenden Planeten geteilt. Es gibt noch viel zu tun, aber die Erde könnte wieder erblühen."
plPL = "Po tym jak zgromadzili ogromne bogactwo i wiedzę, wasze bobry podzieliły się owocami swojej pracy z cierpiącą planetą. Jest jeszcze wiele do zrobienia, ale Ziemia mogłaby znów rozkwitnąć."
ptBR = "Depois de acumular uma grande riqueza e conhecimento, seus castores compartilharam os frutos do seu trabalho com o planeta sofrido. Ainda há muito a ser feito, mas a Terra pode florescer novamente."
koKR = "많은 부와 지식을 축적한 후, 당신의 비버들은 고통받는 지구와 그들의 노력의 결실을 나누었습니다. 아직 해야 할 일이 많지만, 지구는 다시 꽃필 수 있습니다."
csCZ = "Poté, co nashromáždili velké bohatství a znalosti, vaši bobři sdíleli plody své práce s trpící planetou. Ještě je mnoho co dělat, ale Země by mohla znovu kvést."
viVN = "Sau khi đã tích lũy được một lượng lớn tài sản và kiến thức, những chú thú vật của bạn đã chia sẻ thành quả lao động của họ với hành tinh đang đau khổ. Vẫn còn nhiều việc phải làm, nhưng Trái Đất có thể sẽ nở hoa trở lại."

["Faction.Folktails.WonderCompletionMessage"]
raw = "Felicitări! Ai stăpânit metodele Folktails orientate spre natură și ai folosit resursele acestei hărți pentru a construi minunea facțiunii."
status = "normal"
enUS = "Congratulations! You have mastered the nature-oriented Folktails methods and used the resources of this map to build the faction's wonder."
zhCN = "恭喜！你掌握了Folktails以自然为导向的方法，并利用了这个地图的资源来建造该阵营的奇迹。"
zhTW = "恭喜！您已掌握以自然為導向的Folktails方法，並利用這個地圖上的資源建造了該派系的奇蹟。"
ruRU = "Поздравления! Вы освоили природосообразные методы Folktails и использовали ресурсы этой карты для постройки чуда фракции."
jaJP = "おめでとうございます！あなたはフォルクテイルの自然志向の手法を習得し、このマップの資源を利用して派閥の奇跡を築きました。"
frFR = "Félicitations ! Vous avez maîtrisé les méthodes Folktails axées sur la nature et utilisé les ressources de cette carte pour construire la merveille de la faction."
deDE = "Herzlichen Glückwunsch! Du hast die naturorientierten Methoden der Folktails gemeistert und die Ressourcen dieser Karte genutzt, um das Wunder der Fraktion zu bauen."
plPL = "Gratulacje! Opanowałeś metody Folktails zorientowane na naturę i wykorzystałeś zasoby tej mapy, aby zbudować cud frakcji."
ptBR = "Parabéns! Você dominou os métodos da Folktails voltados para a natureza e usou os recursos deste mapa para construir a maravilha da facção."
koKR = "축하합니다! 당신은 자연 지향적인 Folktails의 방법을 마스터하였고, 이 맵의 자원을 사용하여 파벌의 기적을 건설하였습니다."
csCZ = "Gratulujeme! Ovládl jsi přírodou orientované metody Folktails a využil jsi zdroje této mapy k vybudování zázraku frakce."
viVN = "Chúc mừng! Bạn đã thành thạo các phương pháp Folktails hướng về thiên nhiên và sử dụng tài nguyên của bản đồ này để xây dựng kỳ quan của phe phái."

["Faction.IronTeeth.Description"]
raw = "Dezertori ai metodelor tradiționale de lucru cu lemnul, au stăpânit fierul și știința pentru a construi utilaje avansate.\n\nAu realizat progresul prin ingeniozitate, eficiență și lipsă de respect față de mediu.\n\nMotto-ul lor: *Munciți din greu, munciți din greu*."
status = "normal"
enUS = "Deserters of traditional woodworking methods, they have mastered iron and science to build advanced machines.\n\nThey have achieved progress through ingenuity, efficiency, and a lack of respect for the environment.\n\nTheir motto: *Work hard, work hard*."
zhCN = "抛弃传统木工方法的叛徒，掌握了铁和科学，以构建先进的机器。\n\n他们凭借聪明才智、效率和对环境的漠视取得进展。\n\n他们的座右铭是：*努力工作，努力工作*。"
zhTW = "背叛傳統木工方法的他們，掌握了鐵與科學，建造了先進的設備。\n\n他們通過巧妙的設計、高效以及對環境的漠視實現了進步。\n\n他們的座右銘是：*努力工作，努力工作*。"
ruRU = "Дезерторы традиционных методов работы с деревом, овладели железом и наукой, чтобы строить современные машины.\n\nОни достигли прогресса благодаря изобретательности, эффективности и пренебрежению к окружающей среде.\n\nИх девиз: *Работайте усердно, работайте усердно*."
jaJP = "伝統的な木材作業の方法を放棄した彼らは、鉄と科学を駆使して先進的な機械を構築しました。\n\n独創性、効率、そして環境への無関心をもって進歩を遂げました。\n\n彼らのモットーは「*一生懸命働き、たゆまぬ努力を続ける*」です。"
frFR = "Des déserteurs des méthodes de travail du bois traditionnelles, ils ont maîtrisé le fer et la science pour construire des machines avancées.\n\nIls ont réalisé des progrès grâce à leur ingéniosité, leur efficacité et leur mépris pour l'environnement.\n\nLeur motto : *Travaillez dur, travaillez dur*."
deDE = "Desertoren traditioneller Holzarbeitsmethoden, sie haben Eisen und Wissenschaft gemeistert, um fortschrittliche Maschinen zu bauen.\n\nSie haben Fortschritt durch Einfallsreichtum, Effizienz und Missachtung der Umwelt erzielt.\n\nIhr Motto: *Arbeitet hart, arbeitet hart*."
plPL = "Deserterzy tradycyjnych metod obróbki drewna, opanowali metal i naukę, aby budować zaawansowane maszyny.\n\nOsiągnęli postęp dzięki pomysłowości, efektywności i braku poszanowania dla środowiska.\n\nIch motto: *Pracujcie ciężko, pracujcie ciężko*."
ptBR = "Desertores das métodos tradicionais de trabalho com madeira, dominaram o ferro e a ciência para construir máquinas avançadas.\n\nConseguiram progresso por meio de engenhosidade, eficiência e desrespeito pelo meio ambiente.\n\nSeu lema: *Trabalhe duro, trabalhe duro*."
koKR = "전통적인 목재 작업 방식에서 이탈한 그들은 철과 과학을 정복하여 첨단 기계를 건설하였습니다.\n\n그들은 기발함, 효율성, 그리고 환경에 대한 무시를 통해 발전을 이루었습니다.\n\n그들의 모토: *열심히 일하고, 열심히 일하라*."
csCZ = "Desertéři tradičních metod práce se dřevem ovládli železo a vědu, aby mohli stavět pokročilé stroje.\n\nPokrok dosáhli díky vynalézavosti, efektivitě a nedostatku úcty k životnímu prostředí.\n\nJejich motto: *Pracujte tvrdě, pracujte tvrdě*."
viVN = "Những kẻ sa ngã khỏi các phương pháp truyền thống làm việc với gỗ, đã làm chủ sắt và khoa học để xây dựng các máy móc tiên tiến.\n\nHọ đã đạt được tiến bộ thông qua sự sáng tạo, hiệu quả và thiếu tôn trọng đối với môi trường.\n\nKhẩu hiệu của họ: *Làm việc chăm chỉ, làm việc chăm chỉ*."

