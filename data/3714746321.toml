["Building.ExercisePlaza.FlavorDescription"]
status = "normal"
raw = "Dinții de Fier vor să fie ca creațiile lor - mereu mai tari, mai buni, mai rapizi, mai puternici."
enUS = "The Iron Teeth want to be like their creations - always tougher, better, faster, stronger."
zhCN = "“铁牙想要和他们的创造一样——不断变得更坚固、更好、更快、更强。”"
