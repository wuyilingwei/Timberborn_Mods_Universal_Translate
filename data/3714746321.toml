frFR = "Il est probable que cela soit causé par un manque de mods ou par une version plus récente du jeu.\n\nVous pouvez continuer à jouer, mais votre carte pourrait être incomplète."
deDE = "Wahrscheinlich wird dies durch fehlende Mods oder eine neuere Version des Spiels verursacht.\n\nDu kannst weiterspielen, aber deine Karte könnte unvollständig sein."
plPL = "Prawdopodobnie jest to spowodowane brakiem modów lub nowszą wersją gry.\n\nMożesz kontynuować grę, ale twoja mapa może być niekompletna."
ptBR = "Provavelmente isso é causado pela falta de mods ou por uma versão mais nova do jogo.\n\nVocê pode continuar jogando, mas seu mapa pode estar incompleto."
koKR = "이 문제는 모드 부족이나 게임의 최신 버전 때문일 수 있습니다.\n\n계속 게임을 진행할 수 있지만, 당신의 맵이 불완전할 수 있습니다."
csCZ = "Pravděpodobně je to způsobeno nedostatkem modů nebo novější verzí hry.\n\nMůžeš pokračovat ve hře, ale tvoje mapa by mohla být neúplná."
