["Saving.NonCompatibleSaveVersion"]
raw = "Această salvare este incompatibilă cu versiunea curentă.\nÎncercăm din greu să evităm acest lucru. Vă rugăm să începeți un joc nou pentru a vă bucura pe deplin de noile funcții."
status = "normal"
enUS = "This save is incompatible with the current version. We are working hard to avoid this. Please start a new game to fully enjoy the new features."
zhCN = "此存档与当前版本不兼容。\n我们正努力避免这种情况。请开始一个新的游戏，以充分体验新功能。"
zhTW = "此存檔與當前版本不相容。 我們正在努力避免這種情況。 請開始一個新遊戲，以充分體驗新功能。"
ruRU = "Сохранение несовместимо с текущей версией. Мы стараемся изо всех сил избежать этого. Пожалуйста, начните новую игру, чтобы в полной мере насладиться новыми функциями."
jaJP = "このセーブは現在のバージョンと互換性がありません。  \nこれを避けるために懸命に努力しています。新しい機能を存分に楽しむために新しいゲームを始めてください。"
