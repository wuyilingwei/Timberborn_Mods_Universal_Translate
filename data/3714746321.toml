["Modding.ThumbnailInfo"]
raw = "Adăugați un fișier imagine numit „thumbnail” în directorul acestui mod pentru a seta o miniatură. Trebuie să fie mai mică de 1 MB. Raportul de aspect 16:9 este preferat."
status = "normal"
enUS = "Add an image file named 'thumbnail' to this mod's directory to set a thumbnail. It must be smaller than 1 MB. A 16:9 aspect ratio is preferred."
zhCN = "在该模组的目录中添加一个名为“thumbnail”的图像文件以设置缩略图。文件大小必须小于1 MB。推荐的宽高比为16:9。"
zhTW = "在此模組的目錄中添加一個名為「thumbnail」的圖片文件以設置縮略圖。文件大小必須小於 1 MB。建議的縱橫比為 16:9。"
ruRU = "Добавьте файл изображения с названием «thumbnail» в директорию этого мода, чтобы установить миниатюру. Он должен быть меньше 1 МБ. Предпочтительное соотношение сторон 16:9."
jaJP = "「このモッドのディレクトリに「thumbnail」と名付けられた画像ファイルを追加して、サムネイルを設定します。サイズは1MB未満である必要があります。アスペクト比16:9が好まれます。」"
frFR = "Ajoutez un fichier image nommé « thumbnail » dans le répertoire de ce mod pour définir une miniature. Il doit faire moins de 1 Mo. Un rapport d'aspect de 16:9 est recommandé."
deDE = "Fügen Sie eine Bilddatei mit dem Namen „thumbnail“ in das Verzeichnis dieses Mods ein, um ein Thumbnail festzulegen. Sie darf nicht größer als 1 MB sein. Das Seitenverhältnis 16:9 ist bevorzugt."
plPL = "Dodaj plik grafic o nazwie „thumbnail” do katalogu tego moda, aby ustawić miniaturę. Musi mieć mniej niż 1 MB. Preferowany jest współczynnik proporcji 16:9."
ptBR = "Adicione um arquivo de imagem chamado 'thumbnail' no diretório deste mod para definir uma miniatura. Deve ter menos de 1 MB. A proporção de 16:9 é preferida."
koKR = "이 모드의 디렉토리에 'thumbnail'이라는 이름의 이미지 파일을 추가하여 미리보기를 설정하세요. 파일 크기는 1MB 이하이어야 합니다. 16:9 비율이 권장됩니다."
csCZ = "Přidejte obrázkový soubor pojmenovaný „thumbnail” do adresáře tohoto módu pro nastavení miniatury. Musí být menší než 1 MB. Preferovaný poměr stran je 16:9."
viVN = "Thêm một tệp hình ảnh có tên là „thumbnail” vào thư mục của mod này để đặt một hình thu nhỏ. Phải nhỏ hơn 1 MB. Tỷ lệ khung hình 16:9 được ưa chuộng."

