["MapMetadata.Spillage.Description"]
status = "normal"
raw = "Această pantă este plină de mici enclave irigate. Cu toate acestea, pericolele abundă în regiune - dacă nu ești atent, acele zone vor deveni orice altceva decât ospitaliere."
enUS = "This slope is filled with small irrigated enclaves. However, dangers abound in the region - if you're not careful, those areas will become anything but hospitable."
zhCN = "这个坡道布满了小型灌溉飞地。然而，危险在此地区随处可见——如果你不小心，那些地方就会变得完全不适宜居住。"
zhTW = "這個坡道充滿了小型灌溉區。然而，這個地區充滿了危險 - 如果你不小心，那些區域將會變得毫無好客之意。"
ruRU = "Этот склон полон мелких орошаемых анклавов. Однако в регионе много опасностей - если вы не будете осторожны, эти зоны станут чем угодно, только не гостеприимными."
jaJP = "この傾斜は、小さな灌漑されたエンクレーブでいっぱいです。しかし、この地域には危険が豊富に存在します - 注意しないと、それらの領域は決して快適なものにはなりません。"
frFR = "Cette pente est remplie de petites enclaves irriguées. Cependant, les dangers abondent dans la région - si vous ne faites pas attention, ces zones deviendront tout sauf hospitalières."
deDE = "Dieser Hang ist voller kleiner bewässerter Enklaven. Doch die Gefahren sind in der Region zahlreich - wenn du nicht aufpasst, werden diese Bereiche alles andere als einladend."
plPL = "Ta ścieżka jest pełna małych nawadnianych enklaw. Niemniej jednak, w regionie roi się od niebezpieczeństw - jeśli nie jesteś ostrożny, te obszary staną się wszystkim, tylko nie gościnne."
ptBR = "Esta inclinação está cheia de pequenas enclaves irrigadas. No entanto, os perigos abundam na região - se você não tiver cuidado, essas áreas se tornarão qualquer coisa menos hospitaleiras."
koKR = "이 경사는 작은 관개 구역으로 가득 차 있습니다. 그러나 이 지역에는 위험이 가득합니다 - 조심하지 않으면 그 지역은 어떤 환대도 없는 곳이 될 것입니다."
csCZ = "Tento svah je plný malých zavlažovaných enkláv. Přesto v oblasti přibývá nebezpečí - pokud si nedáte pozor, tyto oblasti se stanou čímkoli jiným než pohostinnými."
viVN = "Slope này tràn đầy những khu vực tưới tiêu nhỏ. Tuy nhiên, nguy hiểm đang tràn ngập trong vùng - nếu bạn không cẩn thận, những khu vực đó sẽ trở thành bất cứ thứ gì ngoài sự hiếu khách."

