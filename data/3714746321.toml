["Building.Stairs.FlavorDescription"]
status = "normal"
raw = "Odată cu inventarea scărilor, castorii au urcat la nivelul următor."
enUS = "With the invention of stairs, the beavers have ascended to the next level."
zhCN = "随着楼梯的发明，海狸们达到了新的高度。"
zhTW = "隨著樓梯的發明，海狸們攀升到了更高的層次。"
ruRU = "С изобретением лестниц бобры поднялись на следующий уровень."
jaJP = "階段の発明によって、ビーバーたちは次のレベルに上がりました。"
frFR = "Avec l'invention des escaliers, les castors sont montés au niveau supérieur."
deDE = "Mit der Erfindung der Treppen haben die Biber die nächste Stufe erreicht."
plPL = "Z chwilą wynalezienia schodów, bobry zaczęły wspinać się na wyższy poziom."
ptBR = "Com a invenção das escadas, os castores subiram para o próximo nível."
koKR = "계단이 발명되면서 비버들은 다음 단계로 올라갔습니다."
csCZ = "S vynálezem schodů se bobři dostali na další úroveň."
viVN = "Với việc phát minh ra cầu thang, những con nhím biển đã leo lên cấp độ tiếp theo."

