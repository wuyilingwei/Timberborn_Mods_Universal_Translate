["MapMetadata.Cliffside.Description"]
status = "normal"
raw = "Rămășițele arhitecturii antice hooman se află împrăștiate în această vale retrasă. Castorii aspiră să lase o amprentă similară asupra lumii."
enUS = "The remnants of ancient hooman architecture are scattered throughout this secluded valley. Beavers aspire to leave a similar mark on the world."
zhCN = "人类古代建筑的遗迹散落在这个偏僻的山谷中。海狸们渴望在这个世界留下类似的印记。"
zhTW = "古老的人類建築的殘骸散佈在這片隱秘的山谷中。海狸們渴望在這個世界上留下類似的印記。"
ruRU = "Остатки древней архитектуры хуман находятся разбросанными в этой уединенной долине. Бобры стремятся оставить подобный след в мире."
jaJP = "古代ホーマンの建築の遺物がこの静かな谷に散らばっています。ビーバーたちは世界に同様の足跡を残そうとしています。"
frFR = "Les vestiges de l'architecture ancienne hooman sont éparpillés dans cette vallée retirée. Les castors aspirent à laisser une empreinte similaire sur le monde."
deDE = "Die Überreste antiker hooman Architektur sind in diesem abgelegenen Tal verstreut. Die Biber streben danach, einen ähnlichen Eindruck in der Welt zu hinterlassen."
plPL = "Pozostałości starożytnej architektury hooman są rozsiane w tej ustronnej dolinie. Bóbr pragnie pozostawić podobny ślad na świecie."
ptBR = "As restificações da arquitetura antiga hooman estão espalhadas neste vale isolado. Os castores aspiram deixar uma impressão semelhante no mundo."
koKR = "고대 인간 건축의 잔해가 이 외진 계곡에 흩어져 있습니다. 비버들은 세상에 유사한 흔적을 남기고 싶어 합니다."
csCZ = "Zbytky antické arhitektury hooman jsou roztroušeny v tomto odlehlém údolí. Bobři touží zanechat podobnou stopu na světě."
viVN = "Những di tích của kiến trúc cổ đại của con người nằm rải rác trong thung lũng tĩnh lặng này. Những con beaver mong muốn để lại một dấu ấn tương tự trên thế giới."

