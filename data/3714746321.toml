["Building.Shrub.FlavorDescription"]
status = "normal"
raw = "Pentru a păstra lucrurile practice, decorațiunile ar trebui să fie atât frumoase, cât și gustoase."
enUS = "To keep things practical, decorations should be both beautiful and tasty."
