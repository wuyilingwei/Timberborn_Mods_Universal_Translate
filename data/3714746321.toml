["Saving.SemiCompatibleSaveVersion"]
raw = "Versiunea salvată ({0}) este incompatibilă cu versiunea curentă ({1}). Încărcarea acesteia poate cauza blocări și probleme care pot afecta jocul. Vă recomandăm insistent să începeți un joc nou pentru a vă bucura pe deplin de noile funcții.\n\nSigur doriți să o încărcați?"
status = "normal"
enUS = "The saved version ({0}) is incompatible with the current version ({1}). Loading it may cause crashes and issues that can affect gameplay. We strongly recommend starting a new game to fully enjoy the new features.\n\nAre you sure you want to load it?"
zhCN = "保存版本 ({0}) 与当前版本 ({1}) 不兼容。加载此保存可能导致游戏崩溃和可能影响游戏的问题。我们强烈建议您开始一个新游戏以充分体验新功能。\n\n您确定要加载它吗？"
zhTW = "“保存的版本（{0}）與當前版本（{1}）不兼容。載入此版本可能會導致遊戲崩潰和影響游戲的問題。我們強烈建議您開始一個新遊戲，以充分體驗新功能。\n\n您確定要載入它嗎？”"
ruRU = "Сохраненная версия ({0}) несовместима с текущей версией ({1}). Загрузка может привести к зависаниям и проблемам, которые могут повлиять на игру. Мы настоятельно рекомендуем начать новую игру, чтобы в полной мере насладиться новыми функциями.\n\nВы уверены, что хотите ее загрузить?"
jaJP = "保存されたバージョン ({0}) は現在のバージョン ({1}) と互換性がありません。この保存を読み込むと、ゲームに影響を与えるクラッシュや問題が発生する可能性があります。新しい機能を完全に楽しむためには、新しいゲームを開始することを強くお勧めします。\n\n本当に読み込みますか？"
frFR = "La version sauvegardée ({0}) est incompatible avec la version actuelle ({1}). Le chargement de celle-ci peut entraîner des plantages et des problèmes susceptibles d'affecter le jeu. Nous vous recommandons vivement de commencer une nouvelle partie pour profiter pleinement des nouvelles fonctionnalités.\n\nÊtes-vous sûr de vouloir la charger ?"
deDE = "Der gespeicherte Version ({0}) ist mit der aktuellen Version ({1}) inkompatibel. Das Laden kann zu Abstürzen und Problemen führen, die das Spiel beeinträchtigen können. Wir empfehlen nachdrücklich, ein neues Spiel zu starten, um die neuen Funktionen voll ausnutzen zu können.\n\nSind Sie sicher, dass Sie es laden möchten?"
plPL = "Zapisany wariant ({0}) jest niekompatybilny z aktualną wersją ({1}). Załadowanie go może spowodować zacięcia i problemy, które mogą wpłynąć na rozgrywkę. Zdecydowanie zalecamy rozpoczęcie nowej gry, aby w pełni cieszyć się nowymi funkcjami.\n\nCzy na pewno chcesz go załadować?"
ptBR = "A versão salva ({0}) é incompatível com a versão atual ({1}). Carregá-la pode causar travamentos e problemas que podem afetar o jogo. Recomendamos fortemente que você inicie um novo jogo para aproveitar ao máximo as novas funcionalidades.\n\nVocê tem certeza de que deseja carregá-la?"
koKR = "저장된 버전 ({0})은 현재 버전 ({1})과 호환되지 않습니다. 이를 로드하면 게임에 영향을 줄 수 있는 충돌 및 문제가 발생할 수 있습니다. 새로운 기능을 완전히 즐기기 위해 새로운 게임을 시작하는 것을 권장합니다.\n\n정말로 로드를 하시겠습니까?"
csCZ = "Nahrávaná verze ({0}) je nekompatibilní s aktuální verzí ({1}). Její načtení může způsobit záseky a problémy, které mohou ovlivnit hru. Důrazně doporučujeme začít novou hru, abyste si plně užili nové funkce.\n\nOpravdu ji chcete načíst?"
viVN = "Phiên bản đã lưu ({0}) không tương thích với phiên bản hiện tại ({1}). Việc tải nó có thể gây ra treo máy và các vấn đề có thể ảnh hưởng đến trò chơi. Chúng tôi khuyến nghị bạn nên bắt đầu một trò chơi mới để tận hưởng đầy đủ các tính năng mới.\n\nBạn có chắc chắn muốn tải nó không?"

