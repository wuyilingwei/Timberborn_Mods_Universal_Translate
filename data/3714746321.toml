["Building.Metalsmith.FlavorDescription"]
raw = "„Dacă vrei să reziste, fă-o din metal. Acesta este un lucru pe care oamenii l-au făcut bine.” —Ol' Kazko"
status = "normal"
enUS = "\"If you want it to last, make it out of metal. That's something people have done well.\" —Ol' Kazko"
zhCN = "“如果你想要它坚固，就用金属制造。这是人类做得好的事情。” —老卡兹科"
zhTW = "「如果你想讓它耐用，就用金屬來做。這是人類做得不錯的一件事。」——老卡茲科"
ruRU = "„Если хочешь, чтобы оно было прочным, сделай из металла. Это то, что люди умеют делать хорошо.” —Старый Казко"
jaJP = "「耐えられるものを求めるなら、金属で作れ。それは人々がうまくやったことだ。」 —オル・カズコ"
frFR = "« Si tu veux qu'il résiste, fais-le en métal. C'est quelque chose que les gens ont bien fait. » —Ol' Kazko"
deDE = "„Wenn du willst, dass es hält, mach es aus Metall. Das ist etwas, das die Menschen gut gemacht haben.” —Ol' Kazko"
plPL = "„Jeśli chcesz, żeby przetrwało, zrób to z metalu. To coś, co ludzie potrafili dobrze zrobić.” —Ol' Kazko"
ptBR = "„Se você quiser que dure, faça de metal. Isso é algo que as pessoas fazem bem.” —Ol' Kazko"
koKR = "“만약 견고하게 만들고 싶다면 금속으로 만들어라. 이것은 사람들이 잘 해낸 일이다.” — 올 카즈코"
csCZ = "„Pokud to má vydržet, udělej to z kovu. To je něco, co lidé dělali dobře.” —Ol' Kazko"
viVN = "„Nếu bạn muốn nó bền, hãy làm bằng kim loại. Đây là điều mà con người đã làm rất tốt.” —Ol' Kazko"
trTR = "„Dayanmasını istiyorsan, metalden yap. Bu, insanların iyi yaptığı bir şeydir.” —Ol' Kazko"

