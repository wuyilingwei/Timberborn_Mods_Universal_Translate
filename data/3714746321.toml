["Building.StreamGauge.Description"]
status = "normal"
raw = "O metodă tradițională de a măsura adâncimea, debitul și contaminarea apei."
enUS = "A traditional method for measuring the depth, flow, and contamination of water."
zhCN = "一种传统的方法来测量水的深度、流量和污染。"
zhTW = "一種傳統的方法來測量水的深度、流量和污染。"
ruRU = "Традиционный метод измерения глубины, расхода и загрязнения воды."
jaJP = "水の深さ、流量、汚染を測定するための伝統的な方法。"
frFR = "Une méthode traditionnelle pour mesurer la profondeur, le débit et la contamination de l'eau."
deDE = "Eine traditionelle Methode zur Messung der Wassertiefe, des Durchflusses und der Verunreinigung."
plPL = "Tradycyjna metoda pomiaru głębokości, przepływu i zanieczyszczenia wody."
ptBR = "Um método tradicional de medir a profundidade, o fluxo e a contaminação da água."
