["Building.MediumWarehouse.FlavorDescription"]
status = "normal"
raw = "Depozitarea corectă a bunurilor este crucială pentru supraviețuirea pericolelor unei lumi post-apocaliptice."
enUS = "Proper storage of goods is crucial for surviving the dangers of a post-apocalyptic world."
