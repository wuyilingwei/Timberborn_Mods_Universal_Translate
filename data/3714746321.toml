["Building.OilPress.FlavorDescription"]
status = "normal"
raw = "Castorii curioși îl folosesc pentru a zdrobi orice, de la fursecuri la conuri de pin."
enUS = "Curious beavers use it to crush anything from cookies to pine cones."
zhCN = "好奇的海狸会用它来压榨各种东西，从饼干到松果。"
zhTW = "好奇的海狸們用它來壓碎任何東西，從餅乾到松果。"
ruRU = "Любопытные бобры используют его для измельчения всего, от печений до сосновых шишек."
jaJP = "「好奇心旺盛なビーバーは、クッキーからマツの円錐に至るまで、あらゆるものを粉砕するためにそれを使用します。」"
frFR = "Les castors curieux l'utilisent pour écraser tout, des biscuits aux cônes de pin."
deDE = "Neugierige Biber benutzen es, um alles von Keksen bis zu Tannenzapfen zu zerdrücken."
plPL = "Ciekawskie bobry używają go do miażdżenia wszystkiego, od ciastek po szyszki."
ptBR = "Os castores curiosos o usam para triturar qualquer coisa, desde biscoitos até pinhas."
koKR = "호기심 많은 비버들은 쿠키에서 솔방울에 이르기까지 모든 것을 부수는 데 사용합니다."
csCZ = "Zajímaví bobři ho používají k drcení všeho, od sušenek po šišky."
viVN = "Những con nhím tò mò sử dụng nó để nghiền nát mọi thứ, từ bánh quy đến củ thông."

["Building.Overhang.Description"]
status = "normal"
raw = "O platformă proeminentă care poate servi drept pod sau fundație pentru alte clădiri."
enUS = "A prominent platform that can serve as a bridge or foundation for other buildings."
zhCN = "一个突出的平台，可以作为其他建筑的桥梁或基础。"
zhTW = "一個突出的平台，可以作為其他建築的橋樑或基礎。"
ruRU = "Выступающая платформа, которая может служить в качестве моста или фундамента для других зданий."
jaJP = "「他の建物のための橋や基礎として機能することができる突出したプラットフォーム。」"
frFR = "Une plate-forme saillante qui peut servir de pont ou de fondation pour d'autres bâtiments."
deDE = "Eine hervorragende Plattform, die als Brücke oder Fundament für andere Gebäude dienen kann."
plPL = "Platforma wystająca, która może służyć jako most lub fundament dla innych budynków."
ptBR = "Uma plataforma saliente que pode servir como ponte ou fundação para outros edifícios."
koKR = "다른 건물의 다리 또는 기초로 사용될 수 있는 돌출 플랫폼입니다."
csCZ = "Vystupující platforma, která může sloužit jako most nebo základ pro jiné budovy."
viVN = "Một nền tảng nhô ra có thể đóng vai trò là cầu hoặc nền tảng cho các tòa nhà khác."

["Building.Overhang.FlavorDescription"]
status = "normal"
raw = "„O, se pare că construim o scară spre nori. Mă face să mă întreb...” —Pina"
enUS = "\"Oh, it seems we're building a staircase to the clouds. It makes me wonder...\" —Pina"
zhCN = "“哦，看起来我们在建造通往云端的楼梯。这让我不禁想问……” —皮娜"
zhTW = "「哦，看來我們在向雲端建造梯子。這讓我不禁想問...」 —皮娜"
ruRU = "«О, похоже, мы строим лестницу к облакам. Это заставляет меня задуматься...» —Пина"
jaJP = "「おお、どうやら私たちは雲に続く階段を建てているようです。考えさせられますね...」 —ピナ"
frFR = "« Oh, il semble que nous construisions une échelle vers les nuages. Cela me fait me demander... » —Pina"
deDE = "„Oh, es scheint, als würden wir eine Treppe in die Wolken bauen. Das lässt mich fragen...” —Pina"
plPL = "„O, wydaje się, że budujemy schody w chmury. Zastanawiam się...” —Pina"
ptBR = "„Oh, parece que estamos construindo uma escada para as nuvens. Isso me faz perguntar...” —Pina"
koKR = "\"오, 우리는 구름으로 가는 사다리를 짓고 있는 것 같군요. 궁금해지네요…” —피나"
csCZ = "„O, zdá se, že stavíme schodiště k mrakům. Přemýšlím o tom...” —Pina"
viVN = "„Ôi, có vẻ như chúng ta đang xây một cái thang lên mây. Nó khiến tôi tự hỏi…” —Pina"

