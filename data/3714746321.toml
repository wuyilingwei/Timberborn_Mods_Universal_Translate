["Tutorial.PowerAndPlanks.LumberMill"]
raw = "E timpul să începeți să produceți scânduri!\n\nConstruiți o moară de cherestea direct lângă roata de apă. O puteți construi și mai departe și o puteți conecta la roata de apă folosind puțuri de alimentare.\n\nSfat: Multe clădiri, cum ar fi fabricile de cherestea și cabanele, își transmit energia una de la alta atunci când sunt așezate perete la perete. Nu sunt necesare puțuri de alimentare!"
status = "normal"
enUS = "It's time to start producing planks!\n\nBuild a lumber mill right next to the water wheel. You can build it further away and connect it to the water wheel using power shafts.\n\nTip: Many buildings, such as lumber mills and cabins, transmit power to each other when placed wall to wall. Power shafts are not required!"
zhCN = "是时候开始生产木板了！\n\n在水车旁边建造一个锯木厂。您也可以建造得更远，并通过供水井将其连接到水车。\n\n提示：许多建筑物，如锯木厂和小屋，当并排建造时，可以相互传递能量。不需要供水井！"
zhTW = "該開始生產木板了！\n\n在水車旁邊建造一座木材加工廠。您也可以建得更遠，並通過供水井將其連接到水車。\n\n提示：許多建築物，如木材工廠和小屋，在彼此緊靠著時會相互傳遞能量。無需供水井！"
ruRU = "Время начать производство досок!\n\nПостройте лесопилку прямо рядом с водяным колесом. Вы также можете построить её дальше и подключить к водяному колесу, используя подающие шахты.\n\nСовет: Многие здания, такие как лесопилки и хижины, передают энергию друг другу, когда стоят вплотную. Подающие шахты не требуются!"
jaJP = "板材を作り始める時です！\n\n水車のすぐ横に製材所を建設してください。もう少し離れた場所に建設し、水車に供給井戸を使って接続することもできます。\n\nヒント：製材所や小屋など、多くの建物は、壁をつけて配置すると互いにエネルギーを伝えます。供給井戸は必要ありません！"
frFR = "Il est temps de commencer à produire des planches !\n\nConstruisez un moulin à bois juste à côté de la roue à eau. Vous pouvez également le construire plus loin et le relier à la roue à eau en utilisant des puits d'alimentation.\n\nAstuce : De nombreux bâtiments, comme les usines de bois et les cabanes, transmettent leur énergie les uns aux autres lorsqu'ils sont placés mur à mur. Aucun puits d'alimentation n'est nécessaire !"
deDE = "Es ist Zeit, mit der Produktion von Brettern zu beginnen!\n\nBauen Sie eine Sägewerk direkt neben dem Wasserrad. Sie können es auch weiter weg bauen und es mit dem Wasserrad über Förderleitungen verbinden.\n\nTipp: Viele Gebäude, wie Sägewerke und Hütten, übertragen ihre Energie voneinander, wenn sie wandständig platziert sind. Förderleitungen sind nicht erforderlich!"
plPL = "Czas zacząć produkcję desek!\n\nZbuduj tartak bezpośrednio obok koła wodnego. Możesz go zbudować także dalej i połączyć z kołem wodnym za pomocą rur zasilających.\n\nWskazówka: Wiele budynków, takich jak fabryki drewna i chatki, przekazuje sobie energię nawzajem, gdy są ustawione ściana przy ścianie. Nie są potrzebne rury zasilające!"
ptBR = "É hora de começar a produzir tábuas!\n\nConstrua um moinho de madeira bem ao lado da roda d'água. Você também pode construí-lo mais longe e conectá-lo à roda d'água usando poços de alimentação.\n\nDica: Muitos edifícios, como as fábricas de madeira e as cabanas, transferem energia uns para os outros quando estão posicionados parede com parede. Poços de alimentação não são necessários!"
koKR = "판재 생산을 시작할 시간입니다!\n\n물레방아 바로 옆에 제재소를 건설하세요. 더 멀리 건설할 수도 있으며, 공급 우물을 사용하여 물레방아에 연결할 수 있습니다.\n\n팁: 제재소와 오두막과 같은 많은 건물들은 벽을 맞대어 배치할 때 서로 에너지를 전달합니다. 공급 우물이 필요하지 않습니다!"
csCZ = "Je čas začít vyrábět prkna!\n\nPostavte pilu hned vedle vodního kola. Můžete ji postavit i dál a připojit ji k vodnímu kolu pomocí přívodních potrubí.\n\nTip: Mnoho budov, jako jsou pily a chatky, si navzájem předává energii, pokud jsou umístěny vedle sebe. Přívodní potrubí nejsou potřeba!"
viVN = "Đã đến lúc bạn bắt đầu sản xuất ván!\n\nHãy xây dựng một nhà máy cưa ngay bên cạnh bánh xe nước. Bạn cũng có thể xây dựng nó xa hơn và kết nối với bánh xe nước bằng cách sử dụng các giếng cung cấp.\n\nMẹo: Nhiều tòa nhà, chẳng hạn như nhà máy cưa và cabin, truyền năng lượng cho nhau khi được đặt sát nhau. Không cần thiết phải có giếng cung cấp!"

["Tutorial.PowerAndPlanks.WaterWheel"]
raw = "Clădirile mai avansate necesită energie, iar castorilor le place ca puterea lor să vină din râu.\n\nAșezați o Roată de Apă în apa curgătoare de-a lungul malului râului."
status = "normal"
enUS = "More advanced buildings require power, and beavers like their power to come from the river.\n\nPlace a Water Wheel in the flowing water along the riverbank."
zhCN = "“更先进的建筑需要能源，而海狸喜欢它们的能量来自河流。\n\n在河岸的流水中放置一个水车。”"
zhTW = "「更高級的建築需要能源，而海狸喜歡它們的力量來自河流。\n\n在河邊的流水中放置一個水輪。」"
ruRU = "Более продвинутые здания требуют энергии, и бобрам нравится, когда их сила приходит из реки.\n\nУстановите Водяное Колесо в текущей воде вдоль берега реки."
jaJP = "「より高度な建物にはエネルギーが必要で、ビーバーはそのエネルギーを川から得ることを好みます。\n\n川の岸に沿って流れる水の中に水車を設置してください。」"
frFR = "Les bâtiments plus avancés nécessitent de l'énergie, et les castors aiment que leur pouvoir provienne de la rivière.\n\nPlacez une Roue à Eau dans le courant le long de la berge."
deDE = "Fortgeschrittene Gebäude benötigen Energie, und die Biber mögen es, wenn ihre Kraft aus dem Fluss kommt.\n\nPlatziert ein Wasserrad im fließenden Wasser entlang des Flussufers."
plPL = "Zaawansowane budynki wymagają energii, a bobrom podoba się, gdy ich moc pochodzi z rzeki.\n\nUmieść Koło Wodne w płynącej wodzie wzdłuż brzegu rzeki."
ptBR = "Construções mais avançadas exigem energia, e os castores preferem que sua energia venha do rio.\n\nColoque uma Roda d'Água na correnteza ao longo da margem do rio."
koKR = "더 발전된 건물은 에너지를 필요로 하며, 비버는 그들의 에너지가 강에서 오는 것을 좋아합니다.\n\n강둑을 따라 흐르는 물속에 수차를 배치하세요."
csCZ = "Pokročilejší budovy vyžadují energii a bobři mají rádi, když jejich síla pochází z řeky.\n\nUmístěte Vodní kolo do tekoucí vody podél břehu řeky."
viVN = "Các tòa nhà tiên tiến hơn cần năng lượng, và những con hải ly thích năng lượng của chúng đến từ dòng sông.\n\nHãy đặt một Bánh Xe Nước vào dòng nước chảy dọc theo bờ sông."

