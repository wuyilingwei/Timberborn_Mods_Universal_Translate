["Building.Observatory.FlavorDescription"]
status = "normal"
raw = "Următorul pas logic după ce am privit stelele la focul de tabără."
enUS = "The next logical step after watching the stars by the campfire."
zhCN = "在篝火旁仰望星空后的下一步逻辑。"
zhTW = "在營火旁仰望星空後的邏輯下一步。"
ruRU = "Следующий логичный шаг после того, как мы посмотрели на звезды у костра."
jaJP = "「キャンプファイヤーで星を見た後の次の論理的なステップ。」"
frFR = "La prochaine étape logique après avoir regardé les étoiles au coin du feu."
deDE = "Der nächste logische Schritt, nachdem wir die Sterne am Lagerfeuer beobachtet haben."
plPL = "Następnym logicznym krokiem po obserwowaniu gwiazd przy ognisku."
ptBR = "O próximo passo lógico depois de observar as estrelas ao redor da fogueira."
koKR = "모닥불을 지키며 별들을 지켜본 후의 다음 논리적 단계입니다."
csCZ = "Další logický krok poté, co jsme se podívali na hvězdy u táboráku."
viVN = "Bước tiếp theo hợp lý sau khi chúng ta ngắm sao bên đống lửa trại."

