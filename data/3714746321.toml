["MapMetadata.Lakes.Description"]
status = "normal"
raw = "În zilele noastre, zonele bogate în lacuri și râuri sunt rare. Puținul care a mai rămas arată că încă mai există speranță pentru Pământ."
enUS = "Nowadays, areas rich in lakes and rivers are rare. The little that remains shows that there is still hope for the Earth."
zhCN = "如今，富含湖泊和河流的地区变得稀少。剩下的一点点显示出地球仍然有希望。"
zhTW = "在今天，富含湖泊和河流的區域非常罕見。剩下的微薄部分顯示出地球仍然有希望。"
ruRU = "В наши дни районы, богатые озерами и реками, редки. Мало что осталось, и это показывает, что для Земли еще есть надежда."
jaJP = "「現代では、湖や川が豊富な地域は珍しい。残されたわずかなものは、地球にまだ希望があることを示している。」"
frFR = "De nos jours, les zones riches en lacs et rivières sont rares. Le peu qui reste montre qu'il y a encore de l'espoir pour la Terre."
deDE = "Heutzutage sind gebirgige Gebiete mit vielen Seen und Flüssen selten. Das Wenige, was noch übrig ist, zeigt, dass es noch Hoffnung für die Erde gibt."
plPL = "W dzisiejszych czasach obszary bogate w jeziora i rzeki są rzadkością. To, co pozostało, pokazuje, że wciąż jest nadzieja dla Ziemi."
ptBR = "Hoje em dia, áreas ricas em lagos e rios são raras. O pouco que resta mostra que ainda há esperança para a Terra."
koKR = "요즘 호수와 강이 풍부한 지역은 드뭅니다. 남아 있는 조금의 영역은 아직 지구에 희망이 존재한다는 것을 보여줍니다."
csCZ = "V dnešní době jsou oblasti bohaté na jezera a řeky vzácné. To, co zůstalo, ukazuje, že ještě existuje naděje pro Zemi."
viVN = "Ngày nay, những vùng đất giàu hồ và sông ngòi là hiếm có. Những gì còn lại cho thấy vẫn còn hy vọng cho Trái đất."

