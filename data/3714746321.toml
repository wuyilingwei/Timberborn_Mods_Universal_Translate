plPL = "„Stare drewna jest najlepsza. Wtedy hodowano je inaczej.” —Ma’ Ngonel"
ptBR = "„A madeira antiga é a melhor. Naquele tempo, era cultivada de forma diferente.” —Ma’ Ngonel"
koKR = "“오래된 나무가 최고야. 그 때는 다르게 기르고 있었지.” —마 응고넬"
