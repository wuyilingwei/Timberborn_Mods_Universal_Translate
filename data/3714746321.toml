["NaturalResource.Mangrove.FlavorDescription"]
raw = "Semințele au fost aduse de călători din țări îndepărtate, unde râurile nu seacă niciodată."
status = "normal"
enUS = "The seeds were brought by travelers from distant lands where the rivers never run dry."
zhCN = "种子是由来自遥远国家的旅行者带来的，那里的河流永不干涸。"
zhTW = "種子是由來自遙遠國度的旅行者帶來的，那裡的河流永不乾涸。"
ruRU = "Семена были привезены путешественниками из далеких стран, где реки никогда не высыхают."
jaJP = "種子は、決して干上がることのない川がある遠い国から旅人によって運ばれました。"
frFR = "Les graines ont été apportées par des voyageurs de pays lointains, où les rivières ne sèchent jamais."
deDE = "Die Samen wurden von Reisenden aus fernen Ländern gebracht, wo die Flüsse niemals austrocknen."
plPL = "Nasiona zostały przyniesione przez podróżników z dalekich krajów, gdzie rzeki nigdy nie wysychają."
ptBR = "As sementes foram trazidas por viajantes de terras distantes, onde os rios nunca secam."
koKR = "씨앗은 결코 마르지 않는 강이 있는 먼 나라의 여행자들에 의해 가져왔습니다."
csCZ = "Semena byla přivezena cestovateli z dalekých zemí, kde řeky nikdy nevysychají."
viVN = "Hạt giống đã được mang đến bởi những người du hành từ các quốc gia xa xôi, nơi những dòng sông không bao giờ cạn kiệt."

