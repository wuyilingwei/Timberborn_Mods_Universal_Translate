["Building.TappersShack.FlavorDescription"]
status = "normal"
raw = "Puii sunt învățați de mici că fiecare picătură contează - fie că este vorba de apă sau sevă."
enUS = "The young ones are taught from an early age that every drop counts - whether it is water or sap."
zhCN = "小树苗从小就被教导每一滴都很重要——无论是水还是树汁。"
zhTW = "小木桶的幼苗從小就被教導每一滴水或樹汁都很重要。"
ruRU = "Птенцы с раннего возраста учатся, что каждая капля важна - будь то вода или сок."
jaJP = "子供たちは小さい頃から、毎滴が大切であることを学びます - 水であろうと樹液であろうと。"
frFR = "Les petits apprennent dès leur plus jeune âge que chaque goutte compte - que ce soit de l'eau ou de la sève."
deDE = "Die Küken lernen von klein auf, dass jeder Tropfen zählt - sei es Wasser oder Saft."
plPL = "Pokolenia uczą się od najmłodszych lat, że każda kropla ma znaczenie - niezależnie od tego, czy chodzi o wodę, czy sok."
ptBR = "As crias são ensinadas desde pequenas que cada gota conta - seja de água ou seiva."
koKR = "새끼들은 어릴 때부터 매 순간이 중요하다는 것을 배웁니다 - 물이든 수액이든 상관없이요."
csCZ = "Jsou učeni od mala, že každá kapka se počítá - ať už jde o vodu nebo mízu."
viVN = "Những con non được dạy từ nhỏ rằng mỗi giọt đều có giá trị - dù đó là nước hay nhựa."

