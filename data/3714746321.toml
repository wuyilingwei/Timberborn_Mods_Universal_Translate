["Tutorial.Storage.Pile"]
raw = "Multe clădiri au un spațiu de depozitare încorporat, dar acesta se umple repede.\n\nConstruiește o grămadă mare pentru a depozita mai mulți bușteni.\n\nFiecare clădire de depozitare conține un singur bun. Poți seta bunul depozitat după selectarea clădirii."
status = "normal"
enUS = "Many buildings have built-in storage space, but this fills up quickly.\n\nBuild a large pile to store more logs.\n\nEach storage building holds a single item. You can set the stored item after selecting the building."
zhCN = "许多建筑物都有内置的存储空间，但这会很快填满。\n\n建造一个大型堆来存储更多的木材。\n\n每个存储建筑只包含一种物品。您可以在选择建筑后设置存储的物品。"
zhTW = "許多建築都有內建的儲存空間，但這些空間很快就會滿。\n\n建造一個大型堆場來儲存更多的原木。\n\n每個儲存建築只能容納一種物品。你可以在選擇建築後設置儲存的物品。"
ruRU = "Многие здания имеют встроенное пространство для хранения, но оно быстро заполняется.\n\nПостройте большую кучу, чтобы хранить больше бревен.\n\nКаждое здание для хранения содержит только один товар. Вы можете установить хранимый товар после выбора здания."
jaJP = "「多くの建物には組み込まれたストレージスペースがありますが、すぐにいっぱいになります。\n\nより多くの丸太を保管するために大きな山を建設してください。\n\n各ストレージビルディングには単一のアイテムが含まれています。建物を選択した後、保管するアイテムを設定できます。」"
frFR = "De nombreux bâtiments ont un espace de stockage intégré, mais celui-ci se remplit rapidement.\n\nConstruisez un grand tas pour stocker plus de bûches.\n\nChaque bâtiment de stockage contient un seul produit. Vous pouvez définir le produit stocké après avoir sélectionné le bâtiment."
deDE = "Viele Gebäude verfügen über einen integrierten Lagerraum, aber dieser füllt sich schnell.\n\nBaue einen großen Stapel, um mehr Stämme zu lagern.\n\nJedes Lagergebäude enthält eine einzelne Ware. Du kannst die gelagerte Ware nach Auswahl des Gebäudes festlegen."
plPL = "Wiele budynków ma wbudowaną przestrzeń do przechowywania, ale ta szybko się zapełnia.\n\nZbuduj dużą stertę, aby przechować więcej kłód.\n\nKażdy budynek magazynowy zawiera tylko jeden towar. Możesz ustawić przechowywany towar po wybraniu budynku."
ptBR = "Muitas construções têm um espaço de armazenamento embutido, mas ele se enche rapidamente.\n\nConstrua um grande monte para armazenar mais toras.\n\nCada edifício de armazenamento contém um único item. Você pode definir o item armazenado após selecionar o edifício."
koKR = "많은 건물에는 내장된 저장 공간이 있지만, 이 공간은 빠르게 가득 차게 됩니다.\n\n더 많은 통나무를 저장하기 위해 큰 더미를 건설하세요.\n\n각 저장 건물은 하나의 상품만 포함할 수 있습니다. 건물을 선택한 후 저장할 상품을 설정할 수 있습니다."
csCZ = "Mnoho budov má zabudovaný prostor pro skladování, ale ten se rychle zaplní.\n\nPostav velkou hromadu pro uložení více klád.\n\nKaždá skladovací budova obsahuje jedinou položku. Můžeš nastavit uloženou položku po výběru budovy."
viVN = "Nhiều công trình có không gian lưu trữ tích hợp, nhưng nó đầy rất nhanh.\n\nXây dựng một đống lớn để lưu trữ nhiều gỗ hơn.\n\nMỗi công trình lưu trữ chứa một loại hàng hóa. Bạn có thể đặt loại hàng hóa được lưu trữ sau khi chọn công trình."

["Tutorial.Storage.Tanks"]
raw = "Toate lichidele sunt depozitate în rezervoare. Aceasta include și apa pe care am pompat-o."
status = "normal"
enUS = "All liquids are stored in tanks. This includes the water we have pumped."
zhCN = "所有液体都储存在储罐中。这包括我们抽取的水。"
zhTW = "“所有液體都儲存在儲水罐中。這也包括我們抽取的水。”"
ruRU = "Все жидкости хранятся в резервуарах. Это включает и воду, которую мы откачали."
jaJP = "すべての液体はタンクに保管されています。これには、私たちが汲み上げた水も含まれます。"
frFR = "Tous les liquides sont stockés dans des réservoirs. Cela inclut également l'eau que nous avons pompée."
deDE = "Alle Flüssigkeiten werden in Tanks gespeichert. Dazu gehört auch das Wasser, das wir gepumpt haben."
plPL = "Wszystkie płyny są przechowywane w zbiornikach. Obejmuje to również wodę, którą wypompowaliśmy."
ptBR = "Todos os líquidos são armazenados em tanques. Isso inclui também a água que bombeamos."
koKR = "모든 액체는 탱크에 저장됩니다. 여기에는 우리가 펌프질한 물도 포함됩니다."
csCZ = "Veškeré kapaliny jsou skladovány v nádržích. To zahrnuje i vodu, kterou jsme čerpali."
viVN = "Tất cả các chất lỏng đều được lưu trữ trong các bể chứa. Điều này cũng bao gồm nước mà chúng tôi đã bơm."

["Tutorial.Storage.Warehouses"]
raw = "În cele din urmă, haideți să pregătim niște depozite pentru fructele de pădure. Ar trebui să ne pregătim și pentru recolta de morcovi care urmează.\n\nMâncarea, la fel ca multe alte bunuri ambalate în cutii, este depozitată în depozite."
status = "normal"
enUS = "Finally, let's prepare some warehouses for the berries. We should also prepare for the upcoming carrot harvest.\n\nFood, like many other goods packed in boxes, is stored in warehouses."
zhCN = "“最后，我们来为浆果准备一些仓库。我们还应该为即将到来的胡萝卜收获做好准备。\n\n食物和许多其他装在箱子里的物品一样，都会被储存在仓库中。”"
zhTW = "最後，讓我們為水果準備一些倉庫。我們也應該為即將到來的胡蘿蔔收成做準備。\n\n食物和許多其他包裝在箱子裡的物品一樣，都是儲存在倉庫裡。"
ruRU = "Наконец, давайте подготовим несколько складов для ягод. Мы также должны подготовиться к урожаю моркови, который скоро будет.\n\nЕда, как и многие другие товары, упакованные в коробки, хранится на складах."
jaJP = "最終的に、果実のための倉庫をいくつか準備しましょう。次に来るニンジンの収穫にも備える必要があります。\n\n食べ物は、他の多くの箱に詰められた商品と同様に、倉庫に保管されます。"
frFR = "Enfin, préparons quelques entrepôts pour les baies. Nous devrions également nous préparer à la récolte de carottes qui arrive.\n\nLa nourriture, tout comme de nombreux autres biens emballés dans des caisses, est stockée dans des entrepôts."
deDE = "Lasst uns schließlich einige Lagerhäuser für die Beeren vorbereiten. Wir sollten uns auch auf die bevorstehende Karottenernte vorbereiten.\n\nLebensmittel, wie viele andere Waren, die in Kisten verpackt sind, werden in Lagern aufbewahrt."
plPL = "W końcu przygotujmy kilka magazynów na jagody. Powinniśmy też przygotować się na nadchodzące zbiory marchwi.\n\nJedzenie, tak jak wiele innych towarów zapakowanych w pudełka, jest przechowywane w magazynach."
ptBR = "Por fim, vamos preparar alguns armazéns para as frutas silvestres. Devemos também nos preparar para a colheita de cenouras que se aproxima.\n\nA comida, assim como muitos outros bens embalados em caixas, é armazenada nos armazéns."
koKR = "마침내, 과일을 위한 저장소를 준비합시다. 다가오는 당근 수확을 위해서도 준비해야 합니다.\n\n음식은 다른 많은 상자에 포장된 상품들처럼 저장소에 보관됩니다."
csCZ = "Nakonec si připravíme nějaké sklady pro lesní plody. Měli bychom se také připravit na nadcházející sklizeň mrkve.\n\nJídlo, stejně jako mnoho jiného zboží baleného v krabicích, je uskladněno ve skladech."
viVN = "Cuối cùng, hãy chuẩn bị một vài kho chứa cho trái cây từ rừng. Chúng ta cũng nên chuẩn bị cho vụ thu hoạch cà rốt sắp tới.\n\nThực phẩm, cũng giống như nhiều hàng hóa khác được đóng gói trong hộp, được lưu trữ trong kho."

