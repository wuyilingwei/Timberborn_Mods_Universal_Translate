["Tutorial.Wellbeing.SetWorkingHours"]
raw = "Nu uitați că castorii au nevoie de timp liber pentru a mânca, a bea, a dormi și a se bucura de atracțiile așezării.\n\nPentru a maximiza productivitatea, trebuie să găsiți un echilibru între bunăstarea muncitorilor și programul lor de lucru.\n\nDeocamdată, să revenim la programul de lucru implicit."
status = "normal"
enUS = "Don't forget that beavers need free time to eat, drink, sleep, and enjoy the attractions of the settlement.\n\nTo maximize productivity, you need to find a balance between workers' wellbeing and their working hours.\n\nFor now, let's return to the default working hours."
zhCN = "“不要忘记，海狸需要时间来吃、喝、睡觉以及享受聚落的乐趣。\n\n为了最大化生产力，您必须找到工人的福祉与他们的工作时间之间的平衡。\n\n现在，让我们回到默认工作时间。”"
zhTW = "不要忘記海狸需要休閒時間來吃、喝、睡覺和享受聚落的吸引力。\n\n為了最大化生產力，您需要在工人的福祉和他們的工作時間之間找到平衡。\n\n暫時讓我們回到預設的工作時間。"
ruRU = "Не забудьте, что бобрам нужно свободное время, чтобы есть, пить, спать и наслаждаться достопримечательностями поселения.\n\nЧтобы максимизировать производительность, вам нужно найти баланс между благосостоянием рабочих и их рабочим графиком.\n\nПока что давайте вернемся к стандартному рабочему графику."
jaJP = "ビーバーが食べたり、飲んだり、眠ったり、集落のアトラクションを楽しんだりするための自由時間が必要であることを忘れないでください。\n\n生産性を最大化するためには、労働者の福祉と労働時間のバランスを見つける必要があります。\n\n今のところ、デフォルトの労働スケジュールに戻りましょう。"
frFR = "N'oubliez pas que les castors ont besoin de temps libre pour manger, boire, dormir et profiter des attractions de la colonie.\n\nPour maximiser la productivité, vous devez trouver un équilibre entre le bien-être des travailleurs et leur emploi du temps.\n\nPour l'instant, revenons à l'horaire de travail par défaut."
deDE = "Vergessen Sie nicht, dass Biber Freizeit benötigen, um zu essen, zu trinken, zu schlafen und die Attraktionen der Siedlung zu genießen.\n\nUm die Produktivität zu maximieren, müssen Sie ein Gleichgewicht zwischen dem Wohlbefinden der Arbeiter und ihrem Arbeitszeitplan finden.\n\nIm Moment lassen Sie uns zum Standardarbeitszeitplan zurückkehren."
plPL = "Nie zapominaj, że bobry potrzebują czasu wolnego na jedzenie, picie, spanie i cieszenie się atrakcjami osady.\n\nAby zmaksymalizować wydajność, musisz znaleźć równowagę między dobrostanem pracowników a ich harmonogramem pracy.\n\nNa razie wróćmy do domyślnego harmonogramu pracy."
ptBR = "Não se esqueça de que os castores precisam de tempo livre para comer, beber, dormir e aproveitar as atrações do assentamento.\n\nPara maximizar a produtividade, você precisa encontrar um equilíbrio entre o bem-estar dos trabalhadores e sua carga horária.\n\nPor enquanto, vamos voltar ao horário de trabalho padrão."
koKR = "“비버들은 먹고, 마시고, 자고, 정착지의 명소를 즐기기 위해 자유 시간이 필요하다는 점을 잊지 마세요.\n\n생산성을 극대화하기 위해서는 근로자들의 복지와 근무 시간 사이의 균형을 찾아야 합니다.\n\n지금은 기본 근무 시간으로 돌아가 보겠습니다.”"
csCZ = "Nezapomeňte, že bobři potřebují volný čas na jídlo, pití, spánek a užívání si atrakcí osady.\n\nAby byla produktivita maximální, musíte najít rovnováhu mezi blahobytem pracovníků a jejich pracovním časem.\n\nProzatím se vraťme k výchozímu pracovnímu harmonogramu."
viVN = "Đừng quên rằng những chú nhím cần có thời gian rảnh để ăn, uống, ngủ và tận hưởng những điểm hấp dẫn của khu định cư.\n\nĐể tối đa hóa năng suất, bạn cần tìm ra sự cân bằng giữa phúc lợi của công nhân và lịch làm việc của họ.\n\nTạm thời, hãy quay lại lịch làm việc mặc định."

["Tutorial.Wellbeing.Shrub"]
raw = "Bunăstarea crește și în jurul decorațiunilor. Castorii nu se apropie intenționat de ele, așa că amplasați decorațiunile aproape de locurile unde își petrec timpul coloniștilor.\n\nUn arbust este cea mai simplă decorațiune, iar castorii apreciază fiecare picătură de verdeață."
status = "normal"
enUS = "Wellbeing also increases around decorations. Beavers do not intentionally approach them, so place the decorations near areas where the colonists spend their time.\n\nA shrub is the simplest decoration, and beavers appreciate every drop of greenery."
zhCN = "“幸福感在装饰物周围也会增加。海狸不会故意靠近它们，因此请将装饰物放置在殖民者们花时间的地方附近。\n\n灌木是最简单的装饰物，海狸珍视每一滴绿色。”"
zhTW = "「周圍的裝飾品也會提升幸福感。海狸不會故意接近它們，因此請將裝飾品放置在殖民者花費時間的地方附近。\n\n灌木叢是最簡單的裝飾，海狸會珍惜每一絲綠意。」"
ruRU = "Благосостояние растет и вокруг декораций. Бобры не подходят к ним специально, поэтому разместите декорации поближе к местам, где проводят время колонисты.\n\nКуст — это самая простая декорация, и бобры ценят каждую каплю зелени."
jaJP = "装飾の周りでもウェルビーイングは向上します。ビーバーは意図的にそれらに近づかないため、入植者たちが時間を過ごす場所の近くに装飾を配置してください。\n\nシュラブは最もシンプルな装飾であり、ビーバーは緑の一滴一滴を大切にしています。"
frFR = "Le bien-être augmente également autour des décorations. Les castors ne s'approchent pas d'elles intentionnellement, alors placez les décorations près des endroits où les colons passent leur temps.\n\nUn buisson est la décoration la plus simple, et les castors apprécient chaque goutte de verdure."
deDE = "Das Wohlbefinden steigt auch um die Dekorationen herum. Die Biber nähern sich absichtlich nicht davon, also platziert die Dekorationen nahe den Orten, wo die Kolonisten ihre Zeit verbringen.\n\nEin Strauch ist die einfachste Dekoration, und die Biber schätzen jeden Tropfen Grün."
plPL = "W dobrostanie wzrasta także wokół dekoracji. Bobry celowo się do nich nie zbliżają, więc umieszczaj dekoracje blisko miejsc, w których spędzają czas osadnicy.\n\nKrzew jest najprostszą dekoracją, a bobry doceniają każdą kroplę zieleni."
ptBR = "O bem-estar aumenta também ao redor das decorações. Os castores não se aproximam intencionalmente delas, então posicione as decorações perto dos locais onde os colonos passam seu tempo.\n\nUm arbusto é a decoração mais simples, e os castores apreciam cada gota de verde."
koKR = "웰빙은 장식물 주변에서도 증가합니다. 비버는 의도적으로 장식물에 접근하지 않으므로, 정착자들이 시간을 보내는 곳 근처에 장식물을 배치하세요.\n\n관목은 가장 간단한 장식물이며, 비버는 모든 푸른 잎을 소중하게 여깁니다."
csCZ = "Blahobyt roste i kolem dekorací. Bobři se k nim úmyslně nepřibližují, proto umístěte dekorace blízko míst, kde tráví čas kolonisté.\n\nKeř je nejjednodušší dekorací a bobři oceňují každou kapku zeleně."
viVN = "Sự thịnh vượng tăng lên xung quanh các món trang trí. Những con castor không tiếp cận chúng một cách cố ý, vì vậy hãy đặt các món trang trí gần những nơi mà các tay định cư thường xuyên lui tới.\n\nMột bụi cây là món trang trí đơn giản nhất, và những con castor rất trân trọng từng giọt màu xanh."

["Tutorial.Wellbeing.WellbeingPanel"]
raw = "Pentru castori, contează întreaga societate. Puteți vedea bunăstarea medie a așezării dvs. în colțul din stânga sus al ecranului.\n\nFaceți clic pe ea pentru a vedea îndeplinirea tuturor nevoilor posibile. Există multe modalități de a face viața în pustiu mai suportabilă."
status = "normal"
enUS = "For beavers, the entire society matters. You can see the average wellbeing of your settlement in the top left corner of the screen.\n\nClick on it to see the fulfillment of all possible needs. There are many ways to make life in the wilderness more bearable."
zhCN = "对海狸来说，整个社会都很重要。您可以在屏幕左上角看到您定居点的平均幸福感。\n\n点击它以查看满足所有可能需求的情况。有很多方法可以让在荒野中的生活变得更容易。"
zhTW = "對於海狸來說，整個社會都是重要的。你可以在螢幕的左上角看到你定居點的平均幸福感。\n\n點擊它查看所有可能需求的滿足情況。有許多方法可以使沙漠中的生活更加可承受。"
ruRU = "Для бобров важна вся общество. Вы можете увидеть среднее благополучие вашего поселения в верхнем левом углу экрана.\n\nНажмите на него, чтобы увидеть выполнение всех возможных потребностей. Существует много способов сделать жизнь в пустыне более комфортной."
jaJP = "ビーバーにとって、コミュニティ全体が重要です。画面の左上隅で、あなたの集落の平均的なウェルビーイングを確認できます。\n\nクリックすると、すべてのニーズの達成状況を確認できます。荒野での生活をより快適にする方法はたくさんあります。"
frFR = "Pour les castors, toute la société compte. Vous pouvez voir le bien-être moyen de votre colonie dans le coin supérieur gauche de l'écran.\n\nCliquez dessus pour voir la satisfaction de tous les besoins possibles. Il existe de nombreuses façons de rendre la vie dans le désert plus supportable."
deDE = "Für Biber zählt die gesamte Gesellschaft. Sie können das durchschnittliche Wohlergehen Ihrer Siedlung in der oberen linken Ecke des Bildschirms sehen.\n\nKlicken Sie darauf, um die Erfüllung aller möglichen Bedürfnisse zu sehen. Es gibt viele Möglichkeiten, das Leben in der Wildnis erträglicher zu machen."
plPL = "Dla bobrów liczy się całe społeczeństwo. Możesz zobaczyć średni dobrobyt swojej osady w leższym rogu ekranu.\n\nKliknij na niego, aby zobaczyć spełnienie wszystkich możliwych potrzeb. Istnieje wiele sposobów na uczynienie życia na pustyni bardziej znośnym."
ptBR = "Para os castores, toda a sociedade importa. Você pode ver o bem-estar médio de sua colônia no canto superior esquerdo da tela.\n\nClique nele para ver o atendimento de todas as necessidades possíveis. Existem muitas maneiras de tornar a vida no deserto mais suportável."
koKR = "비버에게는 전체 사회가 중요합니다. 화면의 왼쪽 상단 모서리에서 당신 마을의 평균 복지를 확인할 수 있습니다.\n\n모든 가능한 요구 사항의 충족 상태를 보려면 클릭하십시오. 황야에서의 삶을 더 견딜 수 있는 많은 방법이 있습니다."
csCZ = "Pro castory je důležitá celá společnost. Můžete vidět průměrnou pohodu vaší osady v levém horním rohu obrazovky.\n\nKlikněte na ni, abyste viděli splnění všech možných potřeb. Existuje mnoho způsobů, jak učinit život na poušti snesitelnějším."
viVN = "Đối với những con beaver, toàn bộ xã hội đều quan trọng. Bạn có thể thấy mức độ phúc lợi trung bình của khu định cư của mình ở góc trên bên trái của màn hình.\n\nNhấp vào đó để xem sự thỏa mãn của tất cả các nhu cầu có thể. Có nhiều cách để làm cho cuộc sống trong sa mạc dễ chịu hơn."

