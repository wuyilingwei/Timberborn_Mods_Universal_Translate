["Tutorial.Forestry.Forester"]
raw = "Castorii au nevoie de o sursă stabilă de bușteni. Evident.\n\nFolosind Puncte de Știință produse de Inventatorul tău, deblochează Pădurarul. Apoi construiește-l într-o zonă în care vrei să plantezi copaci."
status = "normal"
enUS = "The beavers need a steady supply of logs. Obviously.\n\nUsing Science Points produced by your Inventor, unlock the Forester. Then build it in an area where you want to plant trees."
zhCN = "海狸需要稳定的原木来源。很显然。\n\n使用你发明家的科学点解锁伐木工。然后在你想种树的区域内建造它。"
zhTW = "海狸需要穩定的木材來源。顯然。\n\n使用你的發明家生產的科學點解鎖樹木管理者。然後在你想要種樹的區域建造它。"
ruRU = "Бобры нуждаются в стабильном источнике бревен. Очевидно.\n\nИспользуя Очки Науки, полученные от твоего Изобретателя, разблокируй Лесозаготовщика. Затем построй его в зоне, где ты хочешь высаживать деревья."
jaJP = "ビーバーは安定した丸太の供給源を必要とします。明らかに。\n\nあなたの発明家によって生産された科学ポイントを使って、フォレスターをアンロックします。その後、木を植えたい場所に構築してください。"
frFR = "Les castors ont besoin d'une source stable de rondins. Évidemment.\n\nUtilise des Points de Science générés par ton Inventeur pour débloquer le Forestier. Ensuite, construis-le dans une zone où tu souhaites planter des arbres."
deDE = "Die Bisons benötigen eine stabile Quelle für Baumstämme. Offensichtlich.\n\nNutze die von deinem Erfinder produzierten Wissenschaftspunkte, um den Förster freizuschalten. Baue ihn dann in einem Bereich, in dem du Bäume pflanzen möchtest."
plPL = "Bobry potrzebują stabilnego źródła kłód. Oczywiście.\n\nUżywając Punktów Nauki produkowanych przez Twojego Wynalazcę, odblokuj Leśnika. Następnie zbuduj go w obszarze, w którym chcesz sadzić drzewa."
ptBR = "Os castores precisam de uma fonte estável de toras. Obviamente.\n\nUsando Pontos de Ciência produzidos pelo seu Inventor, desbloqueie o Encantador. Em seguida, construa-o em uma área onde deseja plantar árvores."
koKR = "비버는 안정적인 통나무 공급원이 필요합니다. 명백히.\n\n당신의 발명가가 생산한 과학 포인트를 사용하여 임업인을 잠금 해제하세요. 그런 다음 나무를 심고 싶은 지역에 그를 건설하세요."
csCZ = "Bobři potřebují stabilní zdroj kmenů. Samozřejmě.\n\nPomocí vědeckých bodů získaných od svého vynálezce odemkni Dřevaře. Poté jej postav v oblasti, kde chceš sázet stromy."
viVN = "Những con hải ly cần một nguồn cung cấp gỗ ổn định. Rõ ràng.\n\nSử dụng Điểm Khoa Học do Nhà phát minh của bạn sản xuất, mở khóa Lâm nghiệp viên. Sau đó, xây dựng nó ở khu vực mà bạn muốn trồng cây."

["Tutorial.Forestry.MarkBirchesForPlanting"]
raw = "Folosește instrumentul „Plantează copaci și arbuști” pentru a planta mesteacăni. Aceștia cresc repede, ceea ce îi face o alegere bună într-o așezare aflată la început de drum.\n\n\nLa fel ca în cazul culturilor, copacii cresc doar pe zone verzi irigate.\n\n\nNu uita să marchezi zonele de plantare pentru tăiere."
status = "normal"
enUS = "Use the 'Plant Trees and Shrubs' tool to plant birches. They grow quickly, making them a good choice for a newly established settlement.\n\nJust like crops, trees only grow on irrigated green areas.\n\nDon't forget to mark planting areas for cutting."
zhCN = "使用“种植树木和灌木”工具来种植白桦。这些树生长迅速，使其成为一个刚起步的定居点的好选择。\n\n与作物一样，树木只能在绿化的灌溉区域生长。\n\n别忘了标记砍伐的种植区。"
zhTW = "使用「種植樹木和灌木」工具來種植白樺樹。它們生長迅速，使其成為剛起步的定居點的良好選擇。\n\n與作物一樣，樹木僅在綠色灌溉區域內生長。\n\n別忘了標記砍伐區域。"
ruRU = "Используй инструмент «Сажай деревья и кустарники», чтобы посадить березы. Они растут быстро, что делает их хорошим выбором для поселения, только начинающего свой путь.\n\nКак и в случае с культурами, деревья растут только на зеленых орошенных участках.\n\nНе забудь отметить зоны посадки для вырубки."
jaJP = "「『木や茂みを植える』ツールを使って、カバノキを植えましょう。彼らは成長が早く、始まったばかりの集落にとって良い選択です。\n作物と同様に、木は緑の灌漑された地域でのみ成長します。\n伐採のための植え付けエリアを忘れずにマークしてください。」"
frFR = "Utilise l'outil « Planter des arbres et des arbustes » pour planter des bouleaux. Ils poussent rapidement, ce qui en fait un bon choix pour une colonie en début de développement.\n\nTout comme pour les cultures, les arbres ne poussent que dans des zones vertes irriguées.\n\nN'oublie pas de marquer les zones de plantation pour la coupe."
deDE = "Verwende das Werkzeug „Bäume und Sträucher pflanzen“, um Birken zu pflanzen. Sie wachsen schnell, was sie zu einer guten Wahl in einer neu gegründeten Siedlung macht.\n\nWie bei den Feldfrüchten wachsen Bäume nur in bewässerten grünen Zonen.\n\nVergiss nicht, die Pflanzbereiche zur Ernte zu markieren."
plPL = "Użyj narzędzia „Sadzaj drzewa i krzewy”, aby posadzić brzozy. Rosną szybko, co czyni je dobrym wyborem w osadzie na wczesnym etapie rozwoju.\n\nPodobnie jak w przypadku upraw, drzewa rosną tylko na nawadnianych zielonych obszarach.\n\nNie zapomnij oznaczyć miejsca sadzenia do wycinki."
ptBR = "Use a ferramenta 'Plantar árvores e arbustos' para plantar bétulas. Elas crescem rapidamente, o que as torna uma boa escolha em uma colônia que está começando.\n\nAssim como nos cultivos, as árvores crescem apenas em áreas verdes irrigadas.\n\nNão se esqueça de marcar as áreas de plantio para corte."
koKR = "‘나무 및 관목 심기’ 도구를 사용하여 자작나무를 심으세요. 이들은 빠르게 자라기 때문에 시작 단계의 정착지에 좋은 선택입니다.\n\n작물과 마찬가지로 나무는 관개된 녹지 지역에서만 자랍니다.\n\n벌목을 위한 식재 구역을 표시하는 것을 잊지 마세요."
csCZ = "Použij nástroj „Sázení stromů a keřů“ k výsadbě bříz. Ty rostou rychle, což je činí dobrou volbou na začátku rozvoje osady.\n\nStejně jako u plodin stromy rostou pouze na zavlažovaných zelených plochách.\n\nNezapomeň označit plochy pro výsadbu na pokácení."
viVN = "Sử dụng công cụ 'Trồng cây và bụi cây' để trồng cây bạch dương. Chúng phát triển nhanh, khiến chúng trở thành lựa chọn tốt trong một khu định cư mới bắt đầu.\n\nTương tự như cây trồng, cây cối chỉ phát triển trên các khu vực xanh có tưới tiêu.\n\nĐừng quên đánh dấu các khu vực trồng để cắt tỉa."

