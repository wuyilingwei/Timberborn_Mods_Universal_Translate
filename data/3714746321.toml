frFR = "Les castors d'autrefois mâchaient les grains pour un coup de fouet d'énergie, mais les Dents de Fer ont eu une idée meilleure."
deDE = "Die Biber der Antike kauten die Bohnen für einen Energieschub, aber die Eisenzähne hatten eine bessere Idee erfunden."
plPL = "Stare zębów czasów przeszłych żuć ziarna dla dodatkowej energii, jednak Żelazne Zęby wymyśliły lepszy pomysł."
ptBR = "Os castores da antiguidade mastigavam os grãos para um impulso de energia, mas os Dentes de Ferro inventaram uma ideia melhor."
koKR = "옛날 비버들은 에너지를 더하기 위해 콩을 씹었지만, 철 이빨들은 더 나은 아이디어를 생각해냈습니다."
csCZ = "Beavers of old chewed on the beans for an energy boost, but the Iron Teeth came up with a better idea."
viVN = "Các con nhím thời xưa đã nhai hạt cà phê để tăng cường năng lượng, nhưng Những chiếc Răng Sắt đã nghĩ ra một ý tưởng tốt hơn."

