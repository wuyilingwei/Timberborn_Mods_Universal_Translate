["Bot.BeaversPerished"]
status = "normal"
raw = "Nu mă pune nici măcar să încep cu castorii.\nAveau totul. Aer curat, apă curată.\nAcum sunt doar o amintire vagă."
enUS = "Don't even make me start with the beavers. They had it all. Clean air, clean water. Now they are just a vague memory."
zhCN = "别让我开始说到海狸。\n他们拥有一切。清新的空气，干净的水。\n现在他们只是一种模糊的记忆。"
zhTW = "別讓我開始談到海狸。\n牠們擁有一切。清新的空氣，乾淨的水。\n現在只剩下模糊的回憶。"
ruRU = "Не заставляй меня даже начинать говорить о бобрах. \nУ них было всё. Чистый воздух, чистая вода. \nТеперь они просто смутное воспоминание."
jaJP = "「ビーバーたちを始めさせるなんて、やめてほしい。\n彼らはすべてを持っていた。きれいな空気、きれいな水。\n今や彼らはただのぼんやりとした思い出だ。」"
frFR = "Ne me mets même pas à commencer avec les castors.  \nIls avaient tout. De l'air pur, de l'eau propre.  \nMaintenant, ils ne sont qu'un souvenir lointain."
deDE = "Setz mich nicht einmal in die Nähe der Biber.\nSie hatten alles. Saubere Luft, sauberes Wasser.\nJetzt sind sie nur noch eine vage Erinnerung."
plPL = "Nie każ mi nawet zaczynać od bobrów. \nMieli wszystko. Czyste powietrze, czysta woda. \nTeraz są tylko odległym wspomnieniem."
ptBR = "Não me faça nem começar com os castores. \nEles tinham tudo. Ar limpo, água limpa. \nAgora são apenas uma lembrança vaga."
koKR = "비버에 대해 시작하게 하지 마세요.\n그들은 모든 것을 가졌습니다. 깨끗한 공기, 깨끗한 물.\n이제 그들은 그저 희미한 기억일 뿐입니다."
csCZ = "Nemusíš mě ani nutit, abych začal s bobry. Měli všechno. Čistý vzduch, čistou vodu. Teď jsou jen vzdálenou vzpomínkou."
viVN = "Đừng bắt tôi phải bắt đầu với những con hải ly.\nChúng có mọi thứ. Không khí trong lành, nước sạch.\nGiờ đây chỉ còn là một kỷ niệm mơ hồ."

