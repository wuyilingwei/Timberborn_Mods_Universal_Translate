["MapMetadata.Diorama.Description"]
status = "normal"
raw = "Înainte de a li se permite să supravegheze colonii mari, aspiranții la construcții sunt însărcinați cu derularea unor proiecte la scară mică, cum ar fi acesta."
enUS = "Before being allowed to supervise large colonies, construction aspirants are tasked with running small-scale projects like this one."
zhCN = "在他们被允许监督大型殖民地之前，建筑学的候选人被指派进行一些小规模的项目，比如这个。"
zhTW = "在被允許監管大型殖民地之前，建築 aspirants 負責執行一些小型項目，例如這個。"
ruRU = "Перед тем как им разрешат наблюдать за крупными колониями, претенденты на строительные должности сначала получают задание реализовать небольшие проекты, такие как этот."
jaJP = "「大規模なコロニーの監督を許可される前に、建設志望者はこのような小規模なプロジェクトを実行する任務を負っています。」"
frFR = "Avant de leur permettre de superviser de grandes colonies, les aspirants à la construction sont chargés de mener à bien des projets à petite échelle, comme celui-ci."
deDE = "Bevor sie die Erlaubnis erhalten, große Kolonien zu beaufsichtigen, sind angehende Bauleiter damit beauftragt, kleinere Projekte wie dieses durchzuführen."
plPL = "Zanim zostaną dopuszczeni do nadzorowania dużych kolonii, aspiranci budowlani są odpowiedzialni za realizację projektów w małej skali, takich jak ten."
ptBR = "Antes de serem autorizados a supervisionar grandes colônias, os aspirantes a construtores são encarregados de executar projetos em pequena escala, como este."
koKR = "큰 식민지를 감독할 수 있도록 허락받기 전에, 건축 지망생들은 이러한 소규모 프로젝트를 수행하는 임무를 맡습니다."
csCZ = "Předtím, než budou moci dohlížet na velké kolonie, jsou uchazeči o budování pověřeni realizací malých projektů, jako je tento."
viVN = "Trước khi được phép giám sát các thuộc địa lớn, những người khao khát xây dựng được giao nhiệm vụ thực hiện các dự án quy mô nhỏ, như cái này."

