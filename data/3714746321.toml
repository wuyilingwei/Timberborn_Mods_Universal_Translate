["MapMetadata.Plains.Description"]
status = "normal"
raw = "Cu zone extinse, la fel de plate ca coada unui castor, această regiune reprezintă un teren de testare sigur pentru inginerii începători."
enUS = "With vast areas as flat as a beaver's tail, this region represents a safe testing ground for beginner engineers."
zhCN = "这片区域广阔，平坦得像海狸的尾巴，是初学工程师们的安全测试场。"
zhTW = "這個區域擁有廣闊且平坦的地形，宛如海狸的尾巴，對於初學者的工程師來說，是一個安全的測試場。"
ruRU = "С обширными, ровными как хвост бобра, эта область представляет собой безопасное испытательное поле для начинающих инженеров."
jaJP = "「広大な平原はビーバーの尾のように平坦であり、この地域は初心者エンジニアにとって安全なテストフィールドを提供しています。」"
frFR = " Avec des zones étendues, aussi plates que la queue d'un castor, cette région représente un terrain d'essai sûr pour les ingénieurs débutants."
deDE = "Mit weiten, flachen Flächen, die so eben wie die Schwanz eines Bibers sind, stellt diese Region ein sicheres Testgelände für angehende Ingenieure dar."
plPL = "Z obszarami rozległymi, równie płaskimi jak ogon bobra, ten region stanowi bezpieczne pole doświadczalne dla początkujących inżynierów."
ptBR = "Com áreas extensas, tão planas quanto a cauda de um castor, esta região representa um terreno de teste seguro para engenheiros iniciantes."
koKR = "넓은 지역과 비슷한 평평함을 가진 이 지역은 초보 엔지니어들에게 안전한 테스트 장소를 제공합니다."
csCZ = "S rozsáhlými oblastmi, které jsou tak ploché jako bobří ocas, tato oblast představuje bezpečné zkušební místo pro začínající inženýry."
viVN = "Với những vùng rộng lớn, bằng phẳng như đuôi của một con hải ly, khu vực này đại diện cho một địa điểm thử nghiệm an toàn cho các kỹ sư mới vào nghề."

