["Building.EfficientMine.FlavorDescription"]
status = "normal"
raw = "Dinții de Fier au câștigat titlul de lider fiind primii care au cercetat subteranul."
enUS = "The Iron Teeth earned the title of leader by being the first to explore underground."
zhCN = "铁齿集团获得了首领称号，因为他们是第一批探索地下的。"
zhTW = "鋼牙部落獲得領導者的稱號，因為他們是第一個探索地下的族群。"
ruRU = "Зубцы Железа получили титул лидера, будучи первыми, кто исследовал подземелье."
jaJP = "「鉄の歯」は地下を最初に探索したことでリーダーの称号を獲得しました。"
frFR = "Les Dents de Fer ont remporté le titre de leader en étant les premiers à explorer le sous-sol."
deDE = "Die Eisenzähne haben den Titel desführenden Anführers gewonnen, da sie die Ersten waren, die das Untergrund erkundeten."
plPL = "Dentysta Żelaza zdobyli tytuł lidera, będąc pierwszymi, którzy zbadali podziemia."
ptBR = "Os Dentes de Ferro conquistaram o título de líderes por serem os primeiros a explorar o subsolo."
koKR = "철제 이빨은 지하를 탐사한 최초의 주체로서 리더의 타이틀을 얻었습니다."
csCZ = "Železní zuby získali titul vůdce jako první, kteří prozkoumali podzemí."
viVN = "Những Người Gác Sắt đã giành được danh hiệu lãnh đạo vì là những người đầu tiên khám phá ra lòng đất."

["Building.ExercisePlaza.Description"]
status = "normal"
raw = "O zonă destinată rutinelor structurate de grup pentru a dezvolta forța și flexibilitatea mușchilor abdominali."
enUS = "A area intended for structured group routines to develop abdominal muscle strength and flexibility."
zhCN = "一个用于结构化团队锻炼的区域，以增强腹部肌肉的力量和柔韧性。"
zhTW = "一個專為團體結構化例行活動而設的區域，用以增強腹部肌肉的力量和靈活性。"
