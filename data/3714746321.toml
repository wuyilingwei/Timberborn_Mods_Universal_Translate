["Building.Tubeway.FlavorDescription"]
raw = "Ciocnirea cu capul între doi castori este citată ca sursă a unora dintre cele mai trăsnite invenții ale Ironteeth"
status = "normal"
enUS = "Colliding heads between two beavers is cited as a source of some of the most outlandish inventions of the Ironteeth."
zhCN = "与两只海狸头碰头被引用为铁齿部落其中一些最奇特发明的来源。"
zhTW = "與兩隻河狸頭碰頭的事件被引用為Ironteeth最瘋狂發明之一的來源"
ruRU = "Соударение головой между двумя бобрами упоминается как источник некоторых из самых отчаянных изобретений Ironteeth"
jaJP = "「2匹のビーバーの間で頭をぶつけることは、アイアンティースの最もクレイジーな発明のいくつかのソースとして引用されています。」"
frFR = "Se cogner la tête entre deux castors est citée comme source de certaines des inventions les plus loufoques des Ironteeth."
deDE = "Der Zusammenstoß mit dem Kopf zwischen zwei Bibern wird als Quelle einiger der skurrilsten Erfindungen der Ironteeth genannt."
plPL = "Zderzenie głową między dwoma bobrami jest cytowane jako źródło niektórych z najbardziej szalonych wynalazków Ironteeth."
ptBR = "A colisão com a cabeça entre dois castores é citada como fonte de algumas das invenções mais malucas dos Ironteeth."
koKR = "두 마리 비버 사이에서 머리를 부딪히는 것은 아이언티스의 가장 엉뚱한 발명 중 일부의 출처로 인용됩니다."
csCZ = "Úder do hlavy mezi dvěma bobry je uváděn jako zdroj některých z nejšílenějších vynálezů Ironteeth."
viVN = "Va chạm giữa hai con hải ly được dẫn ra như là nguồn cảm hứng cho một số phát minh kỳ quặc nhất của Ironteeth."

