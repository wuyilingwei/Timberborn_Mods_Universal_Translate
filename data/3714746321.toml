["Building.EfficientMine.Description"]
status = "normal"
raw = "Angajează mineri care extrag fier vechi din Ruinele Subterane. Designul inovator maximizează viteza de minerit."
enUS = "Hire miners to extract scrap iron from the Subterranean Ruins. The innovative design maximizes mining speed."
zhCN = "雇用矿工从地下废墟中提取旧铁。这种创新设计最大化了采矿速度。"
zhTW = "雇用礦工從地下遺跡提取舊鐵。創新的設計最大化了採礦速度。"
ruRU = "Нанимайте шахтеров, которые извлекают старое железо из Подземных Разрушений. Инновационный дизайн максимизирует скорость добычи."
jaJP = "地下遺跡から古い鉄を採掘する鉱夫を雇います。革新的なデザインにより、採掘速度が最大化されます。"
frFR = "Embauche des mineurs qui extraient du vieux fer des Ruines Souterraines. Le design innovant maximise la vitesse d'extraction."
deDE = "Stellen Sie Bergleute ein, die alten Eisen aus den Untergrundruinen abbauen. Das innovative Design maximiert die Abbaugeschwindigkeit."
plPL = "Zatrudnia górników, którzy wydobywają starą stal z Ruin Podziemnych. Innowacyjny projekt maksymalizuje prędkość wydobycia."
ptBR = "Contrata mineiros que extraem ferro velho das Ruínas Subterrâneas. O design inovador maximiza a velocidade de mineração."
koKR = "구조물 효율적인 광산 설명 - 잊혀진 폐허에서 오래된 철골을 채굴하는 광부를 고용하십시오. 혁신적인 디자인이 채굴 속도를 극대화합니다."
csCZ = "Najměte horníky, kteří těží staré železo z Podzemních ruiny. Inovativní design maximalizuje rychlost těžení."
viVN = "Tuyển dụng thợ mỏ khai thác sắt cũ từ những Đống Đổ Nát Dưới Đất. Thiết kế sáng tạo tối đa hóa tốc độ khai thác."

