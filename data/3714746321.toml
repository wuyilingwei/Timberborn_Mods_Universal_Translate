["MainMenu.SteamUpdateInfoText"]
status = "normal"
raw = "• Noi obiecte interactive pe hartă\n• Automatizare: Senzori, Relee, Temporizatoare și multe altele\n• Hărți noi: Oază, Presiune, Scurgere\n• Scări spiralate, Poartă, Ambreiaj, Bannere\n• Canal de modding îmbunătățit\n• Revizuire vizuală, modificări tutoriale, instrument de duplicare\n• Realizări Steam"
enUS = "• New interactive items on the map  \n• Automation: Sensors, Relays, Timers, and more  \n• New maps: Oasis, Pressure, Drain  \n• Spiral stairs, Gate, Clutch, Banners  \n• Improved modding channel  \n• Visual overhaul, tutorial changes, duplication tool  \n• Steam achievements"
zhCN = "• 地图上有新的互动物品  \n• 自动化：传感器、继电器、定时器等等  \n• 新地图：绿洲、压力、泄漏  \n• 螺旋楼梯、门、离合器、横幅  \n• 改进的模组通道  \n• 视觉审查、教程修改、复制工具  \n• Steam成就"
zhTW = "• 地圖上新增互動物品  \n• 自動化：傳感器、繼電器、計時器等  \n• 新地圖：綠洲、壓力、排水  \n• 螺旋樓梯、門、聯結器、橫幅  \n• 改進的模組渠道  \n• 視覺重製、教程更改、重複工具  \n• Steam 成就"
ruRU = "• Новые интерактивные объекты на карте  \n• Автоматизация: датчики, реле, таймеры и многое другое  \n• Новые карты: Оазис, Давление, Утечка  \n• Спиральные лестницы, Ворота, Сцепление, Бanners  \n• Улучшенный моддинг канал  \n• Визуальный обзор, изменения в обучении, инструмент дублирования  \n• Достижения Steam"
jaJP = "• マップに新しいインタラクティブオブジェクト\n• 自動化: センサー、リレー、タイマーなど\n• 新しいマップ: オアシス、プレッシャー、スラスト\n• スパイラル階段、ゲート、クラッチ、バナー\n• 改良されたモッド作成チャンネル\n• ビジュアルの見直し、チュートリアルの変更、複製ツール\n• Steam実績"
frFR = "• Nouveaux objets interactifs sur la carte  \n• Automatisation : capteurs, relais, minuteurs et bien plus  \n• Nouvelles cartes : Oasis, Pression, Écoulement  \n• Escaliers en colimaçon, Porte, Embrayage, Bannières  \n• Canal de modding amélioré  \n• Révision visuelle, modifications des tutoriels, outil de duplication  \n• Succès Steam"
deDE = "• Neue interaktive Objekte auf der Karte  \n• Automatisierung: Sensoren, Relais, Timer und vieles mehr  \n• Neue Karten: Oase, Druck, Leckage  \n• Wendeltreppen, Tor, Kupplung, Banner  \n• Verbesserter Modding-Kanal  \n• Visuelle Überarbeitung, Änderungen an Tutorials, Duplikationstool  \n• Steam-Erfolge"
plPL = "• Nowe interaktywne obiekty na mapie  \n• Automatyzacja: czujniki, przekaźniki, timery i wiele innych  \n• Nowe mapy: Oaza, Ciśnienie, Wyciek  \n• Schody spiralne, Brama, Sprzęgło, Banery  \n• Ulepszony kanał modowania  \n• Wizualna rewizja, zmiany w tutorialach, narzędzie do duplikacji  \n• Osiągnięcia Steam"
ptBR = "• Novos objetos interativos no mapa  \n• Automatização: Sensores, Relés, Temporizadores e muito mais  \n• Novos mapas: Oásis, Pressão, Drenagem  \n• Escadas em espiral, Porta, Acoplamento, Faixas  \n• Canal de modding aprimorado  \n• Revisão visual, alterações no tutorial, ferramenta de duplicação  \n• Conquistas do Steam"
koKR = "• 지도에 새로운 인터랙티브 오브젝트  \n• 자동화: 센서, 릴레이, 타이머 등  \n• 새로운 맵: 오아시스, 압력, 배수  \n• 나선형 계단, 문, 클러치, 배너  \n• 개선된 모딩 채널  \n• 시각적 개편, 튜토리얼 변경, 복제 도구  \n• 스팀 업적"
csCZ = "• Nové interaktivní objekty na mapě  \n• Automatizace: Senzory, Relé, Časovače a další  \n• Nové mapy: Oáza, Tlak, Únik  \n• Spiralová schodiště, Brána, Spojka, Banner  \n• Vylepšený modding kanál  \n• Vizualizace, úpravy tutoriálů, nástroj pro duplikaci  \n• Steam úspěchy"
viVN = "• Các đối tượng tương tác trong bản đồ  \n• Tự động hóa: Cảm biến, Rơle, Bộ hẹn giờ và nhiều hơn nữa  \n• Bản đồ mới: Ốc đảo, Áp lực, Rò rỉ  \n• Cầu thang xoắn, Cửa, Ly hợp, Biểu ngữ  \n• Kênh modding được cải thiện  \n• Xem lại đồ họa, thay đổi hướng dẫn, công cụ sao chép  \n• Thành tựu Steam"

