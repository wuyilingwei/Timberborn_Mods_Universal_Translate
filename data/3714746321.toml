["Building.NaturalDam.FlavorDescription"]
status = "normal"
raw = "E greu de crezut că au existat vremuri mai simple când noroiul cu crengi constituia un baraj."
enUS = "It's hard to believe there were simpler times when mud with branches made up a dam."
zhCN = "难以相信曾经有更简单的时代，泥土和树枝构成了堤坝。"
zhTW = "很難相信曾經有過更簡單的時光，那時泥土和樹枝構成了一道堤壩。"
ruRU = "Трудно поверить, что когда-то были более простые времена, когда грязь с ветками являлась плотиной."
jaJP = "信じがたいことに、枝で作られた泥がダムを形成していた単純な時代が存在していた。"
frFR = "Il est difficile de croire qu'il y a eu des temps plus simples où la boue et les branches constituaient un barrage."
deDE = "Es ist schwer zu glauben, dass es einfachere Zeiten gab, als Schlamm mit Zweigen einen Damm bildete."
plPL = "Trudno uwierzyć, że były czasy, kiedy błoto z gałęziami stanowiło tamę."
ptBR = "É difícil acreditar que houve tempos mais simples em que lama e galhos constituíam uma barragem."
koKR = "나뭇가지와 진흙이 댐을 이루던 더 단순한 시절이 있었다는 것은 믿기 어렵다."
csCZ = "Je těžké uvěřit, že byly doby, kdy bahno s větvemi tvořilo hráz."
viVN = "Thật khó để tin rằng đã có những thời kỳ đơn giản hơn khi bùn với cành cây tạo thành một đập."

