["Tutorial.PowerAndPlanks.WaterWheel"]
new = "Clădirile mai avansate necesită energie, iar castorilor le place ca puterea lor să vină din râu.\n\nAșezați o Roată de Apă în apa curgătoare de-a lungul malului râului."
