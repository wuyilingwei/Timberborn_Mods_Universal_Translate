["Building.Agora.FlavorDescription"]
status = "normal"
raw = "Când farurile verzi sunt aprinse, este un semn pentru Folktails să se adune"
enUS = "When the green beacons are lit, it is a sign for the Folktails to gather."
zhCN = "当绿色灯塔亮起时，意味着民间故事们要聚集了。"
