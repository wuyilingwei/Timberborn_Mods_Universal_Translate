["AnalyticsConsent.Info"]
raw = "Te rugăm să ne ajuți să îmbunătățim jocul prin partajarea datelor despre modul în care joci Timberborn.\n\nDacă ești de acord, vom colecta automat informații legate de gameplay în timpul sesiunilor tale de joc.\n\nPoți accesa setările din joc pentru a-ți retrage consimțământul și pentru a-ți șterge datele în orice moment. Pentru mai multe informații, consultă politica noastră. <link><u>privacy policy</u></link>.\n\nVă mulțumim!"
status = "normal"
enUS = "Please help us improve the game by sharing data about how you play Timberborn.\n\nIf you agree, we will automatically collect information related to gameplay during your gaming sessions.\n\nYou can access the in-game settings to withdraw your consent and delete your data at any time. For more information, please see our <link><u>privacy policy</u></link>.\n\nThank you!"
zhCN = "请帮助我们通过分享您在玩 Timberborn 时的数据来改善游戏。\n\n如果您同意，我们将在您游戏期间自动收集与游戏玩法相关的信息。\n\n您可以随时在游戏设置中撤回同意并删除您的数据。如需更多信息，请参阅我们的政策。<link><u>隐私政策</u></link>。\n\n感谢您！"
zhTW = "「請幫助我們通過分享有關你遊玩《Timberborn》方式的數據來改進遊戲。\n\n如果你同意，我們將在你遊玩期間自動收集與遊戲過程有關的信息。\n\n你可以隨時訪問遊戲設置以撤回同意並刪除數據。欲了解更多信息，請參考我們的政策。<link><u>隱私政策</u></link>。\n\n謝謝！」"
ruRU = "Пожалуйста, помогите нам улучшить игру, поделившись данными о том, как вы играете в Timberborn.\n\nЕсли вы согласны, мы автоматически соберем информацию, связанную с игровым процессом, во время ваших игровых сессий.\n\nВы можете получить доступ к настройкам в игре, чтобы в любой момент отозвать свое согласие и удалить свои данные. Для получения дополнительной информации ознакомьтесь с нашей политикой. <link><u>политика конфиденциальности</u></link>.\n\nСпасибо!"
jaJP = "ゲームをプレイする方法に関するデータを共有することで、Timberbornを改善する手助けをお願い申し上げます。\n\n同意される場合は、ゲームセッション中にゲームプレイに関連する情報を自動的に収集します。\n\nいつでもゲーム内設定にアクセスして、同意を撤回したり、データを削除したりできます。詳細については、当社のポリシーをご参照ください。<link><u>プライバシーポリシー</u></link>。\n\nありがとうございます！"
frFR = "Veuillez nous aider à améliorer le jeu en partageant des données sur votre façon de jouer à Timberborn.\n\nSi vous êtes d'accord, nous collecterons automatiquement des informations liées au gameplay pendant vos sessions de jeu.\n\nVous pouvez accéder aux paramètres du jeu pour retirer votre consentement et supprimer vos données à tout moment. Pour plus d'informations, consultez notre politique. <link><u>politique de confidentialité</u></link>.\n\nMerci !"
deDE = "Bitte hilf uns, das Spiel zu verbessern, indem du Daten darüber teilst, wie du Timberborn spielst.\n\nWenn du einverstanden bist, sammeln wir automatisch Informationen zum Gameplay während deiner Spielsitzungen.\n\nDu kannst jederzeit die Einstellungen im Spiel aufrufen, um deine Zustimmung zu widerrufen und deine Daten zu löschen. Für weitere Informationen siehe unsere <link><u>Datenschutzrichtlinie</u></link>.\n\nVielen Dank!"
plPL = "Proszę, pomóż nam poprawić grę, dzieląc się danymi na temat tego, jak grasz w Timberborn.\n\nJeśli się zgadzasz, automatycznie zbierzemy informacje związane z rozgrywką podczas twoich sesji gry.\n\nMożesz uzyskać dostęp do ustawień w grze, aby cofnąć swoją zgodę i usunąć swoje dane w dowolnym momencie. Aby uzyskać więcej informacji, zapoznaj się z naszą polityką. <link><u>polityka prywatności</u></link>.\n\nDziękujemy!"
ptBR = "Pedimos que nos ajude a melhorar o jogo compartilhando dados sobre como você joga Timberborn.\n\nSe você concordar, coletaremos automaticamente informações relacionadas ao gameplay durante suas sessões de jogo.\n\nVocê pode acessar as configurações do jogo para retirar seu consentimento e excluir seus dados a qualquer momento. Para mais informações, consulte nossa política. <link><u>política de privacidade</u></link>.\n\nAgradecemos!"
koKR = "저희가 Timberborn을 어떻게 플레이하는지에 대한 데이터를 공유하여 게임을 개선하는 데 도움을 주시기 바랍니다.\n\n동의하신다면, 게임 세션 동안 게임 플레이와 관련된 정보를 자동으로 수집하겠습니다.\n\n언제든지 게임 내 설정에 접속하여 동의를 철회하고 데이터를 삭제하실 수 있습니다. 더 많은 정보는 저희 정책을 참조해 주시기 바랍니다. <link><u>개인정보 처리방침</u></link>.\n\n감사합니다!"
csCZ = "Prosím, pomozte nám zlepšit hru sdílením údajů o tom, jak hrajete Timberborn.\n\nPokud souhlasíte, automaticky shromáždíme informace týkající se herního zážitku během vašich herních sezení.\n\nMůžete kdykoli přistoupit k nastavením ve hře, abyste odvolali svůj souhlas a smazali svá data. Pro více informací si prosím přečtěte naši politiku. <link><u>ochrany soukromí</u></link>.\n\nDěkujeme!"
viVN = "Xin vui lòng giúp chúng tôi cải thiện trò chơi bằng cách chia sẻ dữ liệu về cách bạn chơi Timberborn.\n\nNếu bạn đồng ý, chúng tôi sẽ tự động thu thập thông tin liên quan đến gameplay trong suốt các phiên chơi của bạn.\n\nBạn có thể truy cập cài đặt trong trò chơi để rút lại sự đồng ý của mình và xóa dữ liệu bất cứ lúc nào. Để biết thêm thông tin, hãy tham khảo chính sách của chúng tôi. <link><u>chính sách bảo mật</u></link>.\n\nCảm ơn bạn!"
trTR = "Lütfen Timberborn'da nasıl oynadığınızla ilgili verileri paylaşarak oyunu geliştirmemize yardımcı olun.\n\nEğer kabul ediyorsanız, oyun oturumlarınız sırasında oyun deneyiminize dair bilgileri otomatik olarak toplayacağız.\n\nİstediğiniz zaman onayınızı geri çekmek ve verilerinizi silmek için oyundaki ayarları erişebilirsiniz. Daha fazla bilgi için lütfen politikamıza bakın. <link><u>gizlilik politikası</u></link>.\n\nTeşekkür ederiz!"

