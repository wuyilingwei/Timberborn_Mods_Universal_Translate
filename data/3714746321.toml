["Tutorial.Storage.Pile"]
new = "Multe clădiri au un spațiu de depozitare încorporat, dar acesta se umple repede.\n\nConstruiește o grămadă mare pentru a depozita mai mulți bușteni.\n\nFiecare clădire de depozitare conține un singur bun. Poți seta bunul depozitat după selectarea clădirii."
