["MapMetadata.MountainRange.Description"]
raw = "În căutarea disperată a apei dulci, castorii sunt gata să escaladeze chiar și cei mai înalți munți."
status = "normal"
enUS = "In their desperate search for fresh water, beavers are ready to climb even the tallest mountains."
zhCN = "在对淡水的绝望寻找中，海狸们准备攀登甚至是最高的山脉。"
zhTW = "在迫切尋找淡水的過程中，海狸們準備爬上甚至是最高的山脈。"
ruRU = "В отчаянном поиске пресной воды бобры готовы взойти даже на самые высокие горы."
jaJP = "淡水を探し求めて、ビーバーたちは最も高い山さえも登る準備ができています。"
frFR = "Dans leur quête désespérée d'eau douce, les castors sont prêts à escalader même les montagnes les plus hautes."
deDE = "Auf der verzweifelten Suche nach Süßwasser sind die Biber bereit, selbst die höchsten Berge zu erklimmen."
plPL = "W poszukiwaniu słodkiej wody, bobry są gotowe wspiąć się nawet na najwyższe góry."
ptBR = "Em uma busca desesperada por água doce, os castores estão prontos para escalar até as montanhas mais altas."
koKR = "담수의 절박한 탐색에서 비버들은 가장 높은 산도 기꺼이 오를 준비가 되어 있습니다."
csCZ = "V zoufalé honbě za sladkou vodou jsou bobři připraveni zdolat i ty nejvyšší hory."
viVN = "Trong cuộc tìm kiếm nước ngọt tuyệt vọng, những chú beaver sẵn sàng leo lên cả những ngọn núi cao nhất."

