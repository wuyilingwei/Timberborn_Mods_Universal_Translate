["Tutorial.WorkingHours.SetWorkingHours"]
raw = "Ajustarea orelor de lucru este o modalitate de a vă gestiona producția.\n\nZilele de lucru mai lungi înseamnă un progres mai rapid, dar în fiecare seară, castorii au nevoie de timp pentru a se relaxa și a dormi. Nu-i forțați prea mult pentru prea mult timp.\n\nDeocamdată, haideți să creștem puțin orele de lucru."
status = "normal"
enUS = "Setting working hours is a way to manage your production.\n\nLonger workdays mean faster progress, but each evening, the beavers need time to relax and sleep. Don't push them too hard for too long.\n\nFor now, let's increase the working hours a bit."
zhCN = "“调整工作时间是管理生产的一种方式。\n\n更长的工作日意味着更快的进展，但每晚，海狸们需要时间来放松和休息。不要强迫他们过度工作。\n\n暂时，让我们稍微增加一下工作时间。”"
zhTW = "調整工作時間是一種管理生產的方式。\n\n更長的工作日意味著更快的進展，但每晚，海狸們需要時間來放鬆和睡覺。不要讓他們工作過度。\n\n現在，我們來稍微增加一些工作時間吧。"
ruRU = "Настройка рабочего времени — это способ управления вашим производством.\n\nДлинные рабочие дни означают более быстрый прогресс, но каждый вечер бобрам нужно время, чтобы расслабиться и поспать. Не заставляйте их слишком долго работать.\n\nПока давайте немного увеличим рабочие часы."
jaJP = "労働時間の設定は、生産を管理する方法の一つです。\n\n長い労働日ほど進捗が早くなりますが、毎晩ビーバーはリラックスして眠る時間が必要です。彼らを長時間無理に働かせないでください。\n\n今のところ、労働時間を少し増やしましょう。"
frFR = "Ajuster les heures de travail est un moyen de gérer votre production.\n\nDes journées de travail plus longues signifient un progrès plus rapide, mais chaque soir, les castors ont besoin de temps pour se détendre et dormir. Ne les poussez pas trop longtemps.\n\nPour l'instant, augmentons un peu les heures de travail."
deDE = "Die Anpassung der Arbeitsstunden ist eine Möglichkeit, Ihre Produktion zu verwalten.\n\nLängere Arbeitstage bedeuten schnelleren Fortschritt, aber jeden Abend benötigen die Biber Zeit, um sich zu entspannen und zu schlafen. Zwingen Sie sie nicht zu lange.\n\nLassen Sie uns vorerst die Arbeitsstunden etwas erhöhen."
plPL = "Dostosowanie godzin pracy to sposób na zarządzanie produkcją.\n\nDłuższe dni pracy oznaczają szybszy postęp, ale każdego wieczoru bobry potrzebują czasu, aby się zrelaksować i przespać. Nie zmuszaj ich zbyt mocno przez zbyt długi czas.\n\nNa razie zwiększmy trochę godziny pracy."
ptBR = "Ajustar as horas de trabalho é uma maneira de gerenciar sua produção.\n\nDias de trabalho mais longos significam progresso mais rápido, mas todas as noites, os castores precisam de tempo para relaxar e dormir. Não os sobrecarregue por muito tempo.\n\nPor enquanto, vamos aumentar um pouco as horas de trabalho."
koKR = "근무 시간을 조정하는 것은 생산 관리를 위한 방법입니다.\n\n더 긴 근무일은 더 빠른 진행을 의미하지만, 모든 저녁 비버들은 쉴 시간과 잠을 필요로 합니다. 너무 오랫동안 그들을 무리하게 하지는 마세요.\n\n현재로서는 근무 시간을 조금 늘려봅시다."
csCZ = "Nastavení pracovních hodin je způsob, jak řídit vaši produkci.\n\nDelší pracovní dny znamenají rychlejší pokrok, ale každý večer potřebují bobři čas na odpočinek a spánek. Nepřetěžujte je příliš dlouho.\n\nZatím pojďme mírně zvýšit pracovní hodiny."
viVN = "Việc điều chỉnh giờ làm việc là một cách để bạn quản lý sản xuất.\n\nNhững ngày làm việc dài hơn có nghĩa là tiến bộ nhanh hơn, nhưng mỗi tối, những con beaver cần thời gian để thư giãn và ngủ. Đừng ép chúng quá nhiều trong thời gian dài.\n\nTạm thời, hãy tăng một chút giờ làm việc."

