["Faction.Folktails.Description"]
raw = "Calmi, dar muncitori, Castorii Folktail sunt fermieri experți. Respectă natura, iar aceasta îi răsplătește cu daruri abundente.\n\nMotto-ul lor: *Confort, mâncare și lemn rezistent*."
status = "normal"
enUS = "Calm but hardworking, the Folktail Beavers are expert farmers. They respect nature, and it rewards them with abundant gifts.\n\nTheir motto: *Comfort, food, and sturdy wood*."
zhCN = "冷静但勤奋的Folktail海狸是专家农民。他们尊重自然，自然也以丰富的馈赠回报他们。\n\n他们的座右铭是：*舒适、食物和耐用的木材*。"
zhTW = "「冷靜而勤奮的民俗尾巴海狸是專家農民。他們尊重自然，而自然以豐富的恩惠回報他們。\n\n他們的座右銘是：*舒適、美食和耐用的木材*。」"
ruRU = "Спокойные, но трудолюбивые, бобры Фолктейл являются опытными фермерами. Они уважают природу, и та щедро вознаграждает их дарами.\n\nИх девиз: *Комфорт, еда и прочная древесина*."
jaJP = "穏やかでありながら勤勉なフォルクテイルのビーバーたちは、熟練した農民です。彼らは自然を尊重し、それに対して豊かな恵みを受け取ります。\n\n彼らのモットー：*快適さ、食料、そして丈夫な木材*。"
frFR = "Calmes mais travailleurs, les béavers Folktail sont des agriculteurs experts. Ils respectent la nature, et celle-ci les récompense par des dons abondants.\n\nLeur motto : *Confort, nourriture et bois résistant*."
deDE = "Ruhig, aber fleißig, die Folktail-Biber sind erfahrene Landwirte. Sie achten die Natur, und sie belohnt sie mit reichhaltigen Gaben.\n\nIhr Motto: *Komfort, Nahrung und robustes Holz*."
plPL = "Cisi, ale jednak pracowici, Bobry Folktail to doświadczeni rolnicy. Szanują naturę, a ta wynagradza ich obfitymi darami. \n\nIch motto: *Wygoda, jedzenie i wytrzymałe drewno*."
ptBR = "Calmos, mas trabalhadores, os Castores Folktail são agricultores experientes. Respeitam a natureza, e esta os recompensa com presentes abundantes. \n\nSeu lema: *Conforto, comida e madeira resistente*."
koKR = "차분하지만 근면한 포크테일 비버는 전문 농부입니다. 그들은 자연을 존중하며, 자연은 그들에게 풍성한 선물로 보답합니다.\n\n그들의 모토: *편안함, 음식, 그리고 튼튼한 나무*."
csCZ = "Klidní, ale pracovití, beaverové Folktail jsou experti na zemědělství. Respektují přírodu, a ta je odměňuje bohatými dary.\n\nJejich motto: *Pohodlí, jídlo a odolné dřevo*."
viVN = "Điềm tĩnh nhưng chăm chỉ, những con rái cá Folktail là những người nông dân dày dạn kinh nghiệm. Họ tôn trọng thiên nhiên, và thiên nhiên đền đáp họ bằng những món quà phong phú.\n\nKhẩu hiệu của họ: *Tiện nghi, thực phẩm và gỗ bền vững*."

