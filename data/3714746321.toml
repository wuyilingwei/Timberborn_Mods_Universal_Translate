["NewGameConfigurationPanel.EasyModeDescription"]
raw = "Încă înveți sau îți dorești o experiență relaxantă de construire a unui oraș.\n\nAșezarea ta începe cu o sursă abundentă de resurse.\n\nCastorii consumă mai puțină hrană și apă.\n\nSecetele și mareele rele sunt rare și scurte."
status = "normal"
enUS = "You are still learning or you want a relaxing city-building experience.\n\nYour settlement starts with an abundant source of resources.\n\nBeavers consume less food and water.\n\nDroughts and flood tides are rare and short."
zhCN = "你还在学习或希望体验轻松的城市建设。\n\n你的定居点以丰富的资源开始。\n\n海狸消耗更少的食物和水。\n\n干旱和不良潮汐很少且持续时间短。"
zhTW = "還在學習或希望有一個輕鬆的城市建設體驗。\n\n你的定居點開始時擁有豐富的資源。\n\n海狸消耗較少的食物和水。\n\n乾旱和壞潮是罕見且短暫的。"
ruRU = "Вы всё еще учитесь или хотите расслабляющего опыта строительства города.\n\nВаше поселение начинается с обильного источника ресурсов.\n\nБобры потребляют меньше еды и воды.\n\nЗасухи и плохие приливы редки и кратковременны."
jaJP = "「まだ学んでいるか、リラックスした都市建設の体験を望んでいます。 \n\nあなたのコロニーは豊富な資源の源から始まります。 \n\nビーバーは食糧と水をあまり消費しません。 \n\n干ばつと悪潮は稀で短いです。」"
frFR = "Vous apprenez encore ou vous souhaitez une expérience de construction de ville relaxante.\n\nVotre colonie commence avec une source abondante de ressources.\n\nLes castors consomment moins de nourriture et d'eau.\n\nLes sécheresses et les marées mauvaises sont rares et courtes."
deDE = "Du lernst noch oder wünschst dir ein entspanntes Erlebnis beim Bau einer Stadt.\n\nDein Siedlungsbeginn ist mit einer Fülle an Ressourcen.\n\nBiber verbrauchen weniger Nahrung und Wasser.\n\nDürreperioden und hohe Flut sind selten und von kurzer Dauer."
plPL = "Jeszcze się uczysz lub pragniesz relaksującego doświadczenia w budowaniu miasta.\n\nTwoja osada zaczyna się z obfitym źródłem zasobów.\n\nBóbrzy konsumują mniej jedzenia i wody.\n\nSusze i niekorzystne pływy są rzadkie i krótkie."
ptBR = "Você ainda está aprendendo ou deseja uma experiência relaxante de construção de uma cidade.\n\nSua colônia começa com uma fonte abundante de recursos.\n\nOs castores consomem menos comida e água.\n\nSecas e marés ruins são raras e curtas."
koKR = "아직 배우고 있거나 편안한 도시 건설 경험을 원합니다.\n\n당신의 정착지는 풍부한 자원으로 시작합니다.\n\n비버는 더 적은 음식과 물을 소비합니다.\n\n가뭄과 나쁜 조수는 드물고 짧습니다."
csCZ = "Stále se učíš nebo si přeješ uvolněný zážitek z budování města.\n\nTvoje osada začíná s hojným zdrojem zdrojů.\n\nBobři spotřebovávají méně jídla a vody.\n\nSucha a špatné přílivy jsou vzácné a krátké."
viVN = "Bạn vẫn đang học hoặc muốn có trải nghiệm xây dựng thành phố thoải mái.\n\nKhu định cư của bạn bắt đầu với một nguồn tài nguyên dồi dào.\n\nBầy thú ăn ít thức ăn và nước hơn.\n\nHạn hán và thủy triều xấu hiếm xảy ra và ngắn ngủi."

