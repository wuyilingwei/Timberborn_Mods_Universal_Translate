["MapMetadata.Terraces.Description"]
status = "normal"
raw = "Multe societăți aleg să se stabilească în zone ridicate, folosind noua abilitate a castorilor pentru construcțiile verticale."
enUS = "Many societies choose to settle in elevated areas, using the beavers' new ability for vertical constructions."
zhCN = "许多社团选择在高地定居，利用海狸的新能力进行垂直建筑。"
zhTW = "許多社會選擇在高地定居，利用海狸在垂直建築方面的新技能。"
ruRU = "Многие общества выбирают осесть в высоких районах, используя новую способность бобров для вертикального строительства."
jaJP = "多くの社会は、新しいビーバーの垂直建設能力を利用して、高地に定住することを選びます。"
frFR = "De nombreuses sociétés choisissent de s'installer dans des zones élevées, utilisant la nouvelle capacité des castors pour les constructions verticales."
deDE = "Viele Gesellschaften entscheiden sich dafür, sich in höheren Gebieten anzusiedeln, indem sie die neue Fähigkeit der Biber für vertikale Bauweisen nutzen."
plPL = "Wiele społeczeństw decyduje się osiedlić w wyżej położonych obszarach, wykorzystując nową umiejętność bobrów do budowy pionowych."
ptBR = "Muitas sociedades optam por se estabelecer em áreas elevadas, aproveitando a nova habilidade dos castores para construções verticais."
koKR = "많은 사회가 높은 지역에 정착하기로 선택하며, 수직 건축을 위한 비버의 새로운 능력을 활용합니다."
csCZ = "Mnoho společností se rozhodne usídlit v horských oblastech, využívajíc novou schopnost bobrů pro vertikální stavby."
viVN = "Nhiều xã hội chọn định cư ở những vùng cao, sử dụng khả năng mới của loài nhím cho các công trình xây dựng dọc đứng."

