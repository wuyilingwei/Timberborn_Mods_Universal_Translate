["Building.PaperMill.FlavorDescription"]
status = "normal"
raw = "Ceea ce inițial era o gustare uscată pentru castori, și-a găsit rapid multiple alte utilizări."
enUS = "What was initially a dry snack for beavers quickly found multiple other uses."
zhCN = "“最初是给海狸的一种干点心，现在很快找到多种其他用途。”"
zhTW = "最初是海狸的乾糧，迅速找到了其他多種用途。"
ruRU = "То, что изначально было сухим перекусом для бобров, быстро нашло множество других применений."
jaJP = "最初はビーバーのための乾燥スナックだったものは、すぐに他の多くの用途を見出しました。"
frFR = "Ce qui était à l'origine une collation sèche pour les castors a rapidement trouvé de nombreuses autres utilisations."
deDE = "„Was ursprünglich ein trockener Snack für Biber war, hat schnell viele andere Verwendungen gefunden.“"
plPL = "To, co początkowo było suchą przekąską dla bobrów, szybko znalazło wiele innych zastosowań."
ptBR = "O que inicialmente era um lanche seco para os castores, rapidamente encontrou múltiplas outras utilidades."
koKR = "처음에는 비버를 위한 건조 간식이었던 것이 여러 가지 다른 용도로 빠르게 활용되었습니다."
csCZ = "To, co bylo původně suchou svačinou pro bobry, rychle našlo mnoho dalších využití."
viVN = "Điều mà ban đầu chỉ là một món ăn nhẹ khô cho những con nhím, nhanh chóng tìm thấy nhiều công dụng khác."

["Building.Path.Description"]
status = "normal"
raw = "Clădirile trebuie să fie conectate la drum."
