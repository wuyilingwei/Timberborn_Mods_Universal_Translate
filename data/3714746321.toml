["Tutorial.Wood.ConnectLumberjacks"]
raw = "Fiecare clădire cu o intrare trebuie să fie conectată la un Centru Districtual printr-un drum. Când selectați o clădire, puteți vedea intrarea acesteia marcată cu o săgeată.\n\nConstruiți drumuri pentru a conecta Steagurile Tăietorilor de Lemne la Centrul Districtual."
status = "normal"
enUS = "Each building with an entrance must be connected to a District Center via a road. When you select a building, you can see its entrance marked with an arrow.\n\nBuild roads to connect the Lumberjack Flags to the District Center."
zhCN = "“每座有入口的建筑必须通过道路与地区中心相连。当您选择一座建筑时，可以看到其入口用箭头标出。\n\n建设道路，将伐木工的旗帜连接到地区中心。”"
zhTW = "每座有入口的建築必須通過道路連接到區域中心。當您選擇一座建築時，可以看到它的入口被箭頭標記。\n\n建造道路以將伐木工的旗幟連接到區域中心。"
ruRU = "Каждое здание с входом должно быть соединено с Районным Центром посредством дороги. Когда вы выбираете здание, вы можете видеть его вход, обозначенный стрелкой.\n\nСтройте дороги, чтобы соединить Флаги Лесорубов с Районным Центром."
jaJP = "入口のある建物は、道路を通じて地区センターに接続する必要があります。建物を選択すると、その入口が矢印でマークされます。\n\n道路を建設して、伐採者の旗を地区センターに接続します。"
frFR = "Chaque bâtiment avec une entrée doit être connecté à un Centre de District par une route. Lorsque vous sélectionnez un bâtiment, vous pouvez voir son entrée marquée par une flèche.\n\nConstruisez des routes pour connecter les Drapeaux des Bûcherons au Centre de District."
deDE = "Jedes Gebäude mit einem Eingang muss durch einen Weg mit einem Bezirkszentrum verbunden sein. Wenn Sie ein Gebäude auswählen, können Sie den Eingang mit einem Pfeil markiert sehen.\n\nBauen Sie Wege, um die Fahnen der Holzfäller mit dem Bezirkszentrum zu verbinden."
plPL = "Każdy budynek z wejściem musi być połączony z Centrum Dzielnicy przez drogę. Gdy wybierzesz budynek, możesz zobaczyć jego wejście oznaczone strzałką.\n\nZbuduj drogi, aby połączyć Flagi Drwali z Centrum Dzielnicy."
ptBR = "Cada edifício com uma entrada deve estar conectado a um Centro Distrital por uma estrada. Ao selecionar um edifício, você pode ver a entrada marcada com uma seta.\n\nConstrua estradas para conectar as Bandeiras dos Lenhadores ao Centro Distrital."
koKR = "모든 출입구가 있는 건물은 지역 센터와 도로로 연결되어야 합니다. 건물을 선택하면 입구가 화살표로 표시됩니다.\n\n목재꾼의 깃발을 지역 센터에 연결하기 위해 도로를 건설하세요."
csCZ = "Každá budova s vchodem musí být spojena s Okresním centrem pomocí cesty. Když vyberete budovu, můžete vidět její vchod označený šipkou.\n\nPostavte cesty, abyste spojili Vlajky Dřevorubců s Okresním centrem."
viVN = "Mỗi tòa nhà có lối vào phải được kết nối với một Trung tâm Khu vực thông qua một con đường. Khi bạn chọn một tòa nhà, bạn có thể thấy lối vào của nó được đánh dấu bằng một mũi tên.  \n\nXây dựng các con đường để kết nối Cờ của Người chặt cây với Trung tâm Khu vực."

["Tutorial.Wood.FinishLumberjacks"]
raw = "Steagurile nu vor fi construite decât dacă se află în raza de acțiune a districtului.\n\nSelectați Centrul Districtului pentru a vedea raza sa de acțiune. O puteți extinde conectând drumurile la intrarea în Centrul Districtului."
status = "normal"
enUS = "The flags will only be built if they are within the district's range.\n\nSelect the District Center to see its range. You can expand it by connecting roads to the entrance of the District Center."
zhCN = "旗帜只有在位于区域范围内时才会被建造。\n\n选择区域中心以查看其范围。您可以通过将道路连接到区域中心的入口来扩展它。"
zhTW = "旗幟只有在區域範圍內才能建造。\n\n選擇區域中心以查看其範圍。您可以通過將道路連接到區域中心的入口來擴展它。"
ruRU = "Флаги могут быть построены только в пределах радиуса действия округа.\n\nВыберите Центр округа, чтобы увидеть его радиус действия. Вы можете расширить его, соединяя дороги с входом в Центр округа."
jaJP = "「旗は地区の範囲内にある場合にのみ建設されます。\n\n地区センターを選択して、その範囲を確認してください。道路を地区センターの入口に接続することで、範囲を拡張できます。」"
frFR = "Les drapeaux ne seront construits que s'ils se trouvent dans la zone d'influence du district.\n\nSélectionnez le Centre du District pour voir sa zone d'influence. Vous pouvez l'étendre en connectant des routes à l'entrée du Centre du District."
deDE = "Die Flaggen werden nur gebaut, wenn sie sich im Wirkungsbereich des Distrikts befinden.\n\nWählen Sie das Distriktszentrum aus, um seinen Wirkungsbereich zu sehen. Sie können ihn erweitern, indem Sie Straßen mit dem Eingang des Distriktszentrums verbinden."
plPL = "Flagi nie będą budowane, dopóki nie znajdą się w zasięgu działania dystryktu.\n\nWybierz Centrum Dystryktu, aby zobaczyć jego zasięg. Możesz go rozszerzyć, łącząc drogi z wejściem do Centrum Dystryktu."
ptBR = "As bandeiras só poderão ser construídas se estiverem dentro do alcance do distrito.\n\nSelecione o Centro do Distrito para ver sua área de alcance. Você pode expandi-la conectando estradas à entrada do Centro do Distrito."
koKR = "깃발은 구역의 작동 범위 내에 있어야만 건설됩니다.\n\n구역 중앙을 선택하여 범위를 확인하세요. 도로를 구역 중앙 입구에 연결하여 범위를 확장할 수 있습니다."
csCZ = "Vlajky budou postaveny pouze tehdy, pokud se nacházejí v dosahu okresu.\n\nVyberte Centrum okresu, abyste viděli jeho dosah. Můžete ho rozšířit připojením silnic k vchodu do Centra okresu."
viVN = "Các lá cờ sẽ không được xây dựng nếu chúng không nằm trong phạm vi của khu vực.\n\nChọn Trung tâm Khu vực để xem phạm vi của nó. Bạn có thể mở rộng phạm vi bằng cách kết nối các con đường đến lối vào Trung tâm Khu vực."

["Tutorial.Wood.MarkTrees"]
raw = "Pădurarii taie copaci doar în zonele pe care le marcați pentru tăiere.\n\nCopacii trebuie să se afle în raza de acțiune a unui steag de tăiere a lemnelor. Selectați un steag pentru a-i vedea raza de acțiune.\n\nUtilizați acum instrumentul Marcați zona de tăiere a copacilor. Țineți apăsat butonul mouse-ului pentru a selecta mai multe plăci simultan."
status = "normal"
enUS = "Woodcutters will only cut trees in the areas you mark for logging.\n\nThe trees must be within the range of a lumberjack flag. Select a flag to see its range.\n\nNow use the Mark Tree Cutting Area tool. Hold down the mouse button to select multiple tiles at once."
zhCN = "伐木工只在您标记的砍伐区域内砍伐树木。\n\n树木必须在树木砍伐旗帜的有效范围内。选择一个旗帜以查看其有效范围。\n\n现在使用工具标记树木砍伐区域。按住鼠标按钮以同时选择多个地块。"
zhTW = "樹木工人僅在您標記的砍伐區域內砍伐樹木。\n\n樹木必須位於砍伐標記的有效範圍內。選擇一個標記以查看其有效範圍。\n\n現在使用「標記樹木砍伐區域」工具。按住滑鼠按鈕以同時選擇多個格子。"
ruRU = "Лесорубы рубят деревья только в тех зонах, которые вы обозначили для вырубки.\n\nДеревья должны находиться в пределах радиуса действия флага вырубки древесины. Выберите флаг, чтобы увидеть его радиус действия.\n\nТеперь используйте инструмент Обозначить зону вырубки деревьев. Удерживайте кнопку мыши, чтобы выделить несколько плиток одновременно."
jaJP = "「伐採員は、伐採のためにマークしたエリアでのみ木を切ります。\n\n木は、木材伐採のフラッグの範囲内にある必要があります。範囲を見るには、フラッグを選択してください。\n\n今、木の伐採エリアをマークするツールを使用してください。マウスのボタンを押し続けて、複数のタイルを同時に選択します。」"
frFR = "Les bûcherons coupent les arbres uniquement dans les zones que vous marquez pour abattage.\n\nLes arbres doivent se trouver dans la portée d'un drapeau de coupe de bois. Sélectionnez un drapeau pour voir sa portée.\n\nUtilisez maintenant l'outil Marquez la zone de coupe des arbres. Maintenez enfoncé le bouton de la souris pour sélectionner plusieurs tuiles simultanément."
deDE = "Die Holzfäller fällen Bäume nur in den Bereichen, die Sie zur Fällung markieren.\n\nDie Bäume müssen sich innerhalb des Aktionsbereichs einer Holzernteflagge befinden. Wählen Sie eine Flagge aus, um ihren Aktionsbereich zu sehen.\n\nVerwenden Sie jetzt das Werkzeug zum Markieren des Baumfällgebiets. Halten Sie die Maustaste gedrückt, um mehrere Platten gleichzeitig auszuwählen."
plPL = "Leśnicy ścinają drzewa tylko w obszarach, które oznaczysz do wycinki.\n\nDrzewa muszą znajdować się w zasięgu flagi do wycinki drewna. Wybierz flagę, aby zobaczyć jej zasięg.\n\nTeraz użyj narzędzia Oznacz obszar wycinki drzew. Przytrzymaj przycisk myszy, aby jednocześnie zaznaczyć wiele kafli."
ptBR = "Os madeireiros cortam árvores apenas nas áreas que você marca para corte.\n\nAs árvores precisam estar dentro do alcance de uma bandeira de corte de madeira. Selecione uma bandeira para ver seu alcance.\n\nAgora utilize a ferramenta Marcar área de corte de árvores. Mantenha pressionado o botão do mouse para selecionar várias placas simultaneamente."
koKR = "목재 수확자는 제거를 위해 표시한 지역에서만 나무를 베어낼 수 있습니다.\n\n나무는 벌목 도구의 작동 반경 내에 있어야 합니다. 작동 반경을 보려면 도구를 선택하세요.\n\n이제 나무 벌목 영역 표시 도구를 사용하세요. 마우스 버튼을 눌러 여러 타일을 동시에 선택하세요."
csCZ = "Tesaři kácí stromy pouze v oblastech, které vy označíte k pokácení.\n\nStromy musí být ve vzdálenosti akce vlajky pro kácení dřeva. Vyberte vlajku, abyste viděli její dosah.\n\nNyní použijte nástroj pro označení oblasti kácení stromů. Držte tlačítko myši, abyste vybrali více ploch současně."
viVN = "Người đốn gỗ chỉ chặt cây trong những khu vực mà bạn đánh dấu để chặt.\n\nCây phải nằm trong phạm vi của cờ chặt gỗ. Chọn cờ để xem phạm vi của nó.\n\nHiện tại, hãy sử dụng công cụ Đánh dấu khu vực chặt cây. Giữ nguyên nút chuột để chọn nhiều ô cùng lúc."

["Tutorial.Wood.PlaceLumberjacks"]
raw = "Fiecare așezare de castori are nevoie de bușteni , foarte mulți bușteni. Doar pădurarii pot tăia copaci.\n\nConstruiește steaguri pentru tăietori de lemne lângă copacii din apropiere."
status = "normal"
enUS = "Each beaver settlement needs logs, a lot of logs. Only lumberjacks can cut down trees.\n\nBuild flags for lumberjacks near the nearby trees."
zhCN = "“每个海狸聚落都需要木材，很多木材。只有伐木工才能砍树。\n\n在附近的树木旁建造伐木工的旗帜。”"
zhTW = "每個海狸定居點需要大量的木材，只有樵夫能砍伐樹木。\n\n在附近的樹木旁邊建造樹木砍伐者的旗幟。"
ruRU = "Каждое поселение бобров нуждается в бревнах, очень много бревен. Только лесорубы могут рубить деревья.\n\nПострой флаги для лесорубов рядом с ближайшими деревьями."
jaJP = "「それぞれのビーバーの集落には、たくさんの丸太が必要です。木を切ることができるのは、樵だけです。\n\n近くの木のそばに伐採者のための旗を建てましょう。」"
frFR = "Chaque colonie de castors a besoin de rondins, beaucoup de rondins. Seuls les bûcherons peuvent abattre des arbres.\n\nConstruisez des drapeaux pour les bûcherons près des arbres voisins."
deDE = "Jede Biber-Siedlung benötigt Holz, sehr viel Holz. Nur Holzfäller können Bäume fällen.\n\nBaue Flaggen für Holzfäller in der Nähe der Bäume."
plPL = "Każda osada bobrów potrzebuje bali, bardzo wielu bali. Tylko drwale mogą ścinać drzewa.\n\nZbuduj flagi dla drwali w pobliżu drzew."
ptBR = "Cada assentamento de castores precisa de toras, muitos toras. Apenas os lenhadores podem cortar árvores.\n\nConstrua bandeiras para os lenhadores perto das árvores próximas."
koKR = "각 비버 마을은 통나무가 필요하며, 많은 통나무가 필요합니다. 나무꾼만 나무를 베어낼 수 있습니다.\n\n근처 나무 옆에 나무꾼을 위한 깃발을 세우세요."
csCZ = "Každá bobří osada potřebuje dřevo, hodně dřeva. Jen dřevorubci mohou kácet stromy.\n\nPostavte vlajky pro dřevorubce poblíž blízkých stromů."
viVN = "Mỗi khu định cư của những con beaver cần gỗ, rất nhiều gỗ. Chỉ có các thợ săn gỗ mới có thể đốn cây.\n\nXây dựng cờ cho thợ săn gỗ gần những cây xung quanh."

["Tutorial.WorkingHours"]
raw = "Ore de lucru"
status = "normal"
enUS = "Working Hours"
zhCN = "工作时间"
zhTW = "工作時間"
ruRU = "Часы работы"
jaJP = "作業時間"
frFR = "Heures de travail"
deDE = "Arbeitsstunden"
