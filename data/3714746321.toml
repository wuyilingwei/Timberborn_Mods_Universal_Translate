["Building.Weathervane.FlavorDescription"]
status = "normal"
raw = "„Dacă am dreptate, chestia asta ar putea zbura dacă ar fi fixată de un motor și de o pereche de aripi.” —Pina"
enUS = "\"If I'm right, this thing could fly if it were attached to a motor and a pair of wings.\" —Pina"
zhCN = "“如果我没记错的话，这东西如果固定在一个发动机和一对翅膀上，可能会飞。” —皮娜"
zhTW = "「如果我沒記錯，這東西如果裝上引擎和一對翅膀就可以飛了。」——皮娜"
ruRU = "„Если я прав, эта штука могла бы летать, если бы её прикрепили к мотору и паре крыльев.” —Пина"
jaJP = "「『私が正しければ、これにモーターと一対の翼をつければ飛ぶかもしれません。』 —ピナ」"
frFR = "« Si j'ai raison, cette chose pourrait voler si elle était fixée à un moteur et à une paire d'ailes. » —Pina"
deDE = "„Wenn ich recht habe, könnte dieses Ding fliegen, wenn es an einem Motor und einem Paar Flügel befestigt wäre.“ —Pina"
plPL = "„Jeśli się nie mylę, to to coś mogłoby latać, gdyby było przymocowane do silnika i pary skrzydeł.” —Pina"
ptBR = "\"Se eu estiver certo, essa coisa poderia voar se fosse fixada a um motor e a um par de asas.\" —Pina"
koKR = "\"내가 맞다면, 이 물건은 엔진과 날개 한 쌍이 부착된다면 날아갈 수 있을 거야.\" —피나"
csCZ = "„Pokud se nepletu, tahle věc by mohla létat, kdyby byla připevněna k motoru a páru křídel.” —Pina"
viVN = "„Nếu tôi đúng, món này có thể bay nếu được gắn vào một động cơ và một cặp cánh.” —Pina"

