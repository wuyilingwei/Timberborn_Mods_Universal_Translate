["Building.Floodgate.FlavorDescription"]
raw = "Nimeni nu credea că se poate îmbunătăți un baraj până când Old Kazko a creat Primul baraj mobil."
status = "normal"
enUS = "No one believed that a dam could be improved until Old Kazko created the First movable dam."
zhCN = "“没有人相信大坝可以得到改善，直到老卡兹科创造了第一个可移动的大坝。”"
zhTW = "沒有人相信壩子可以改進，直到老卡茨科創造了第一個可移動壩。"
ruRU = "«Никто не верил, что плотину можно улучшить, пока Старый Казко не создал Первую подвижную плотину.»"
jaJP = "「誰もがダムが改善できるとは思っていませんでしたが、オールド・カズコが最初の可動ダムを作りました。」"
frFR = "Personne ne croyait qu'un barrage pouvait être amélioré jusqu'à ce qu'Old Kazko crée le premier barrage mobile."
deDE = "Niemand glaubte, dass man einen Damm verbessern könnte, bis Old Kazko den ersten mobilen Damm erschuf."
plPL = "Nikt nie wierzył, że tamę można ulepszyć, dopóki Stary Kazko nie stworzył Pierwszej tamy ruchomej."
ptBR = "Ninguém acreditava que era possível melhorar uma barragem até que o Velho Kazko criou a Primeira barragem móvel."
koKR = "아무도 올드 카즈코가 첫 번째 이동식 댐을 만들 때까지 댐을 개선할 수 있다고 생각하지 않았다."
csCZ = " Nikdo nevěřil, že je možné zlepšit hráz, dokud nevytvořil starý Kazko první mobilní hráz."
viVN = "Không ai tin rằng một con đập có thể được cải thiện cho đến khi Old Kazko tạo ra con đập di động đầu tiên."
trTR = "Hiç kimse bir barajın geliştirilebileceğine inanmıyordu ta ki Yaşlı Kazko İlk mobil barajı yaratana kadar."

