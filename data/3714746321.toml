["NaturalResource.Maple.FlavorDescription"]
raw = "Arțarul tăiat produce sirop, dar cheresteaua de înaltă calitate este o recompensă și mai dulce."
status = "normal"
enUS = "The cut maple produces syrup, but high-quality lumber is an even sweeter reward."
zhCN = "“被砍伐的枫树会产生糖浆，但优质木材是更加甜美的奖励。”"
zhTW = "砍伐的楓樹會產生糖漿，但高品質的木材是更甜美的獎勵。"
ruRU = "Срубленный клен производит сироп, но древесина высокого качества является еще более сладким вознаграждением."
jaJP = "切り倒されたカエデはシロップを生産しますが、高品質の材木はさらに甘い報酬です。"
frFR = "L'érable coupé produit du sirop, mais le bois de haute qualité est une récompense encore plus douce."
deDE = "Der gefällte Ahorn produziert Sirup, aber das hochwertige Holz ist eine noch süßere Belohnung."
plPL = "Ścięty klon produkuje syrop, ale wysokiej jakości drewno to jeszcze słodsza nagroda."
ptBR = "O bordo cortado produz xarope, mas a madeira de alta qualidade é uma recompensa ainda mais doce."
koKR = "잘린 단풍나무는 시럽을 생산하지만 고급 목재는 더 달콤한 보상입니다."
