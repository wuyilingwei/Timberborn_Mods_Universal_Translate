["academicunwinds.Rainborn.Settings.Volume.Tooltip"]
raw = "Volume for the rain loop, the thunder one-shot, and the sandstorm loop.\n\nStacks on top of the storm's intensity-based scaling (lighter storms are quieter on their own) and the game's Environment audio slider. 0 mutes the mod's audio entirely."
status = "normal"
enUS = "Volume for the rain loop, the thunder one-shot, and the sandstorm loop.\n\nStacks on top of the storm's intensity-based scaling (lighter storms are quieter on their own) and the game's Environment audio slider. 0 mutes the mod's audio entirely."
zhCN = "“雨声循环、雷声单次和沙尘暴循环的音量。\n\n叠加在基于风暴强度的缩放之上（较轻的暴风雨本身更安静）以及游戏的环境音频滑块上。0 完全静音该模组的音频。”"
zhTW = "雨循環、雷聲一次性音效和沙塵暴循環的音量。\n\n與風暴的強度基於的縮放疊加（較輕的風暴本身更安靜）以及遊戲的環境音頻滑桿疊加。0會完全靜音模組的音頻。"
ruRU = "Громкость для дождевой петли, однократного грома и петли песчаной буря.\n\nУчитывает масштабирование на основе интенсивности шторма (меньшие шторма тише сами по себе) и слайдер звука окружающей среды в игре. 0 полностью отключает звук мода."
jaJP = "雨音ループ、雷音ワンショット、および sandstorm ループの音量。\n\n嵐の強度に基づくスケーリング（軽い嵐は自体で音が静か）およびゲームの環境オーディオスライダーとスタックします。0はモッドの音声を完全にミュートします。"
frFR = "Volume pour la boucle de pluie, le coup de tonnerre et la boucle de tempête de sable.\n\nS'accumule avec l'échelle basée sur l'intensité de la tempête (les tempêtes plus légères sont plus silencieuses par elles-mêmes) et avec le curseur audio de l'environnement du jeu. 0 coupe complètement le son du mod."
deDE = "Lautstärke für die Regen-Schleife, das Donnerschlagen und die Sandsturm-Schleife.\n\nKombiniert sich mit der sturmintensitätsbasierten Skalierung (leichte Stürme sind von sich aus leiser) und mit dem Umgebungslautstärkeregler des Spiels. 0 schaltet den Audio des Mods vollständig stumm."
plPL = "Poziom głośności dla pętli deszczu, jednorazowego efektu grzmotu oraz pętli burzy piaskowej.\n\nŁączy się z opartym na intensywności burzy skalowaniem (łagodniejsze burze są same w sobie cichsze) oraz z suwakiem dźwięku otoczenia w grze. 0 całkowicie wycisza dźwięk moda."
ptBR = "Volume para o loop da chuva, para o som de trovão e para o loop da tempestade de areia.\n\nAcumula com a escalabilidade baseada na intensidade da tempestade (tempestades mais leves são mais silenciosas por conta própria) e com o controle deslizante de áudio do ambiente do jogo. 0 silencia completamente o áudio do mod."
koKR = "비 소리, 천둥 일회성 및 모래 폭풍 루프의 볼륨입니다.\n\n폭풍의 강도 기반 스케일링(더 가벼운 폭풍은 자체적으로 더 조용함) 및 게임의 환경 오디오 슬라이더와 함께 조정됩니다. 0은 모드의 오디오를 완전히 음소거합니다."
csCZ = "Hlasitost dešťové smyčky, hromu a smyčky písečné bouře.\n\nHlavice se s intenzitou bouře (slabší bouře jsou samy o sobě tišší) a s posuvníkem zvuku prostředí ve hře. 0 zcela ztlumí zvuk modu."
viVN = "Âm lượng cho vòng lặp mưa, tiếng sét một lần, và vòng lặp bão cát.\n\nTích lũy với độ mạnh của cơn bão (cơn bão nhẹ thì êm hơn) và với thanh trượt âm thanh Môi trường của trò chơi. 0 sẽ tắt tiếng hoàn toàn của mod."
trTR = "Yağmur döngüsü, gök gürültüsü tek atışı ve kum fırtınası döngüsü için ses seviyesi.\n\nFırtınanın yoğunluk bazlı ölçeklenmesi üzerine eklenir (daha hafif fırtınalar kendi başlarına daha sessizdir) ve oyunun Çevresel ses ayar kaydırıcısıyla birleştirilir. 0, modun sesini tamamen kapatır."

