plPL = "Najkrótsza możliwa trwałość opadu w godzinach w grze.  \n\nKażda burza ma losowy czas trwania gdzieś pomiędzy tym a maksymalnym."
ptBR = "Duração mínima possível de chuva em horas de jogo.\n\nCada tempestade tem uma duração nova entre este valor e o máximo."
koKR = "게임 시간으로 측정된 가장 짧은 비 이벤트입니다.\n\n각 폭풍우는 이 최소값과 최대값 사이의 새로운 지속 시간을 생성합니다."
