["academicunwinds.Rainborn.Settings.AcidRainEnabled.Tooltip"]
raw = "When enabled rain events have a growing chance of dropping contaminated water instead of clean water.\n\nThe probability starts at 0% and climbs toward a 50% cap as more clean rains pass — only clean rains count toward escalation."
new = "When enabled, rain events have a growing chance of dropping contaminated water instead of clean water.\n\nThe probability starts at 0% and climbs toward a 50% cap as more clean rains pass. Only clean rains count toward escalation, so the rate caps at 50/50 rather than drifting higher and higher."
status = "normal"
enUS = "When enabled, rain events have an increasing chance of dropping contaminated water instead of clean water.\n\nThe probability starts at 0% and rises to a 50% cap as more clean rains occur — only clean rains count toward the escalation."
zhCN = "启用后，降雨事件将逐渐增加掉落污染水而非干净水的概率。\n\n该概率从0％开始，随着更多干净降雨的出现而逐步上升至50％的上限——仅干净降雨会计入该上升。"
zhTW = "當啟用時，降雨事件有越來越高的機率掉落污染水而非乾淨水。\n\n該機率從0%開始，隨著更多乾淨降雨的經過而逐漸增加，最高可達50% - 只有乾淨降雨才計算在內。"
ruRU = "При включении дождевые события имеют растущую вероятность выпадения загрязненной воды вместо чистой воды.\n\nВероятность начинается с 0% и увеличивается до 50% по мере прохождения чистых дождей — только чистые дожди учитываются в эскалации."
jaJP = "「有効にすると、雨のイベントは清水の代わりに汚染された水が降る可能性が高まります。\n\n確率は0%から始まり、より多くの清水の雨が降るにつれて50%の上限に向かって上昇します — 清水の雨のみがエスカレーションにカウントされます。」"
frFR = "Lorsque cette option est activée, les événements pluvieux ont une chance croissante de faire tomber de l'eau contaminée au lieu de l'eau propre.\n\nLa probabilité commence à 0 % et grimpe vers un plafond de 50 % à mesure que davantage de pluies propres se produisent — seules les pluies propres comptent pour l'escalade."
deDE = "Wenn aktiviert, haben Regenereignisse eine wachsende Chance, kontaminiertes Wasser anstelle von sauberem Wasser abzugeben.\n\nDie Wahrscheinlichkeit beginnt bei 0 % und steigt bis zu einer Obergrenze von 50 %, während mehr saubere Regenfälle auftreten – nur saubere Regenfälle zählen zur Eskalation."
plPL = "Gdy jest włączone, opady deszczu mają rosnące szanse na opadanie zanieczyszczonej wody zamiast czystej wody.\n\nPrawdopodobieństwo zaczyna się od 0% i rośnie w kierunku limitu 50% w miarę przechodzenia kolejnych czystych deszczy — tylko czyste deszcze są brane pod uwagę przy eskalacji."
ptBR = "Quando ativado, os eventos de chuva têm uma chance crescente de derramar água contaminada em vez de água limpa.\n\nA probabilidade começa em 0% e sobe até um teto de 50% à medida que mais chuvas limpas ocorrem — apenas chuvas limpas contam para a escalada."
koKR = "활성화되면 비가 내려오는 사건이 깨끗한 물 대신 오염된 물이 떨어질 확률이 증가합니다.\n\n확률은 0%에서 시작하여 더 많은 깨끗한 비가 내릴수록 50% 한도로 상승합니다 — 오직 깨끗한 비만 상승에 포함됩니다."
csCZ = "Když je povoleno, dešťové události mají rostoucí šanci na vylití znečištěné vody místo čisté vody.\n\nPravděpodobnost začíná na 0 % a stoupá k 50 % limitu, jak projdou další čisté deště — pouze čisté deště se počítají pro eskalaci."
viVN = "Khi được bật, các sự kiện mưa có khả năng ngày càng cao trong việc rơi nước ô nhiễm thay vì nước sạch.\n\nXác suất bắt đầu từ 0% và tăng dần lên mức tối đa 50% khi có thêm nhiều cơn mưa sạch — chỉ những cơn mưa sạch mới được tính vào việc tăng cường."

