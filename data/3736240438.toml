["academicunwinds.Rainborn.Settings.SandIntensity.Tooltip"]
new = "Drives how quickly sand piles up on eligible tiles (wind-sheltered downwind of obstacles, or sitting in depressions). Higher values mean visible dunes form during a single storm. Lower values mean dunes only build up across many storms, or never at all on marginal tiles."
status = "normal"

