["academicunwinds.Rainborn.Settings.FloodTolerance.Tooltip"]
raw = "How much standing water a building can be sitting in during rain before it gets flagged as flooded. Only applied during rain events.\n\n0 is the vanilla behaviour (any water above the base triggers a flood alert). Higher values let buildings ignore deeper puddles, so a thin film of drizzle does not trip the flood notification.\n\nOutside of rain the tolerance ramps down to 0 over a couple of in-game hours, so river overflows and badtide floods are still detected normally."
status = "normal"
enUS = "How much standing water a building can be sitting in during rain before it gets flagged as flooded. Only applied during rain events.\n\n0 is the vanilla behavior (any water above the base triggers a flood alert). Higher values let buildings ignore deeper puddles, so a thin film of drizzle does not trip the flood notification.\n\nOutside of rain, the tolerance ramps down to 0 over a couple of in-game hours, so river overflows and bad tide floods are still detected normally."
zhCN = "“建筑物可以浸泡在多少雨水中才会被标记为洪水。仅在下雨事件中适用。\n\n0是原版行为（任何超过基础的水都会触发洪水警报）。更高的值让建筑物可以忽略较深的积水，因此细微的雨滴不会触发洪水通知。\n\n在非雨天，容忍度在几个游戏小时内逐渐降至0，因此河流溢出和潮汐洪水仍会正常检测。”"
zhTW = "建築物在降雨時可以浸泡在多少積水中，才會被標記為洪水。僅在降雨事件期間應用。\n\n0 是原版行為（任何水位高於基準都會觸發洪水警報）。較高的數值讓建築物可以忽略較深的水坑，這樣薄薄的毛毛雨就不會觸發洪水通知。\n\n在非雨天時，容忍度會在幾個遊戲小時內降低至0，因此河流溢出和潮汐洪水仍會正常檢測。"
ruRU = "Сколько стоячей воды может находиться в здании во время дождя, прежде чем оно будет помечено как затопленное. Применяется только во время дождевых событий.\n\n0 = стандартное поведение (любая вода выше базового уровня вызывает сигнализацию о затоплении). Более высокие значения позволяют зданиям игнорировать более глубокие лужи, поэтому тонкий слой дождя не вызывает уведомление о затоплении.\n\nВне дождя толерантность постепенно снижается до 0 в течение нескольких игровых часов, так что переполнение рек и наводнения из-за прилива все равно обнаруживаются нормально."
jaJP = "建物が雨の中で浸水と見なされる前に、どれだけの水たまりに浸かることができるか。雨のイベント中のみ適用されます。\n\n0は本来の動作（基準を超える水が浸水アラートを引き起こします）。高い値では、建物がより深い水たまりを無視でき、薄い霧雨が浸水通知を引き起こさないようになります。\n\n雨が降っていない時は、耐水レベルは数時間のゲーム内時間で0に減少するため、川の氾濫や悪潮による浸水は通常通り検出されます。"
frFR = "Combien d'eau stagnante un bâtiment peut avoir pendant la pluie avant d'être signalé comme inondé. Appliqué uniquement pendant les événements pluvieux.\n\n0 représente le comportement par défaut (toute eau au-dessus de la base déclenche une alerte d'inondation). Des valeurs plus élevées permettent aux bâtiments d'ignorer des flaques plus profondes, donc une légère pluie ne déclenche pas la notification d'inondation.\n\nEn dehors de la pluie, la tolérance diminue à 0 au cours de quelques heures de jeu, donc les débordements de rivière et les inondations dues à la marée sont toujours détectés normalement."
deDE = "Wie viel stehendes Wasser ein Gebäude während des Regens haben kann, bevor es als überflutet gekennzeichnet wird. Nur während Regenereignissen anwendbar.\n\n0 ist das Standardverhalten (jedes Wasser über dem Grundwert löst einen Überflutungsalarm aus). Höhere Werte ermöglichen es Gebäuden, tiefere Pfützen zu ignorieren, sodass ein dünner Film aus Nieselregen die Überflutungsbenachrichtigung nicht auslöst.\n\nAußerhalb von Regen sinkt die Toleranz über ein paar In-Game-Stunden auf 0, sodass Flussüberläufe und Hochwasserfluten weiterhin normal erkannt werden."
plPL = "Ile stojącej wody może znajdować się w budynku podczas deszczu, zanim zostanie oznaczony jako zalany. Dotyczy tylko zdarzeń deszczowych.\n\n0 to zachowanie domyślne (jakakolwiek woda powyżej podstawy wyzwala zalanie). Wyższe wartości pozwalają budynkom ignorować głębsze kałuże, więc cienka warstwa mżawki nie uruchamia powiadomienia o zalaniu.\n\nPoza deszczem tolerancja spada do 0 w ciągu kilku godzin gry, więc przelewy rzek i powodzie spowodowane przypływem są wykrywane w sposób normalny."
ptBR = "Qual a quantidade de água parada que um edifício pode ter durante a chuva antes de ser marcado como inundado. Apenas aplicado durante eventos de chuva.\n\n0 é o comportamento padrão (qualquer água acima do nível base aciona um alerta de inundação). Valores mais altos permitem que os edifícios ignorem poças mais profundas, para que uma fina camada de chuvisco não acione a notificação de inundação.\n\nFora da chuva, a tolerância diminui para 0 ao longo de algumas horas de jogo, então transbordamentos de rios e inundações de maré alta ainda são detectados normalmente."
koKR = "비가 오는 동안 건물이 얼마나 많은 고인 물에 잠겨 있을 수 있는지를 나타내며, 그 기준이 침수로 표시되기 전의 수치입니다. 비가 오는 상황에서만 적용됩니다.\n\n0은 기본 동작을 의미합니다(기본 수위 이상의 물은 침수 알림을 유발합니다). 높은 수치는 건물이 더 깊은 물웅덩이를 무시하도록 허용합니다. 따라서 가벼운 비가 내리는 상황에서는 침수 알림이 발생하지 않습니다.\n\n비가 오지 않는 동안에는 몇 시간 내에 내성이 0으로 감소하므로, 강의 범람이나 나쁜 조수의 침수는 정상적으로 감지됩니다."
csCZ = "Kolik stojaté vody může budova snášet během deště, než bude označena jako zaplavená. Platí pouze během dešťových událostí.\n\n0 je chování jako v základní hře (jakákoli voda nad základní úrovní spouští upozornění na povodeň). Vyšší hodnoty umožňují budovám ignorovat hlubší louže, takže tenký film mrholení nespustí upozornění na povodeň.\n\nMimo období deště tolerance klesá na 0 během několika herních hodin, takže přeplnění řek a povodně způsobené přílivem jsou stále detekovány normálně."
viVN = "Có bao nhiêu nước đứng có thể tích tụ tại một tòa nhà trong suốt trận mưa trước khi nó bị đánh dấu là bị ngập. Chỉ áp dụng trong các sự kiện mưa.\n\n0 là hành vi mặc định (mọi nước vượt quá mức cơ bản sẽ kích hoạt cảnh báo ngập). Các giá trị cao hơn cho phép các tòa nhà bỏ qua những vũng nước sâu hơn, vì vậy một lớp mưa nhẹ sẽ không kích hoạt thông báo ngập.\n\nNgoài trời, mức độ chịu đựng giảm xuống 0 sau vài giờ trong trò chơi, vì vậy những trận tràn bờ sông và ngập do thuỷ triều xấu vẫn được phát hiện bình thường."
trTR = "Bir binanın yağmur sırasında ne kadar durgun suyun içinde durabileceğini belirtir, bu suyun su baskını olarak işaretlenmeden önceki seviyesidir. Sadece yağmur olayları sırasında uygulanır.\n\n0, temel davranıştır (temel seviyenin üzerindeki herhangi bir su, su baskını uyarısını tetikler). Daha yüksek değerler, binaların daha derin su birikintilerini görmezden gelmesine izin verir, bu nedenle ince bir yağmur tabakası su baskını bildirimini tetiklemez.\n\nYağmur dışında tolerans birkaç oyun saati içinde 0'a düşer, bu nedenle nehir taşmaları ve kötü gelgit su baskınları normal şekilde tespit edilir."

