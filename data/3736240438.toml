["academicunwinds.Rainborn.Settings.SandStormMinCycle.Tooltip"]
raw = "Earliest cycle on which a sandstorm can roll. Before this cycle the scheduler treats sand as if it were disabled, so droughts just sit out and Random or Biased rolls that would have picked sand drop to silence instead.\n\nSand reshapes terrain permanently, so a grace period matters here the same way it does for acid. Default 10 mirrors the acid gate."
status = "normal"
enUS = "Earliest cycle on which a sandstorm can occur. Before this cycle, the scheduler treats sand as if it were disabled, so droughts just pause and Random or Biased rolls that would have chosen sand instead result in silence.\n\nSand permanently alters terrain, so a grace period is important here just like it is for acid. The default of 10 mirrors the acid gate."
zhCN = "“沙尘暴可以发生的最早周期。在此周期之前，调度程序将沙子视为禁用状态，因此干旱仅会停滞，随机或偏向选择沙子的掷骰会转为沉默。\n\n沙子会永久改变地形，因此宽限期在这里的重要性与酸相同。默认值10反映了酸门的设置。”"
zhTW = "沙塵暴能出現的最早週期。在此週期之前，排程器將沙子視為已禁用，因此旱災將靜置，隨機或偏向的選擇將轉而不選擇沙子。\n\n沙子會永久改變地形，因此在這裡的寬限期與酸的情況一樣重要。預設10反映了酸門的設定。"
ruRU = "Самый ранний цикл, в который может возникнуть песчаная буря. До этого цикла планировщик рассматривает песок как отключенный, поэтому засухи просто проходят, а случайные или предвзятые броски, которые могли бы выбрать песок, вместо этого приводят к молчанию.\n\nПесок изменяет рельеф навсегда, поэтому здесь важен временной люфт, так же как и для кислоты. Значение по умолчанию 10 соответствует воротам кислоты."
jaJP = "砂嵐が発生する最も早いサイクル。 このサイクル以前は、スケジューラーは砂が無効になっているかのように扱うため、干ばつはただじっとしており、砂を選ぶはずのランダムまたは偏ったロールは代わりに静寂に落ちます。\n\n砂は地形を恒久的に変形させるため、ここでの猶予期間は酸の場合と同様に重要です。 デフォルトの10は酸ゲートを反映しています。"
frFR = "Premier cycle sur lequel une tempête de sable peut se produire. Avant ce cycle, le planificateur traite le sable comme s'il était désactivé, donc les sécheresses s'assurent que les roulettes aléatoires ou biaisées qui auraient choisi le sable tombent au silence à la place.\n\nLe sable façonne le terrain de façon permanente, donc une période de grâce est importante ici de la même manière que pour l'acide. La valeur par défaut de 10 reflète la porte d'acide."
deDE = "Frühester Zyklus, in dem ein Sandsturm auftreten kann. Vor diesem Zyklus behandelt der Zeitplaner Sand, als wäre er deaktiviert, sodass Dürreperioden einfach ausgesetzt werden und zufällige oder voreingenommene Würfe, die Sand ausgewählt hätten, stattdessen auf Stille ausfallen.\n\nSand formt die Landschaft dauerhaft um, daher ist hier eine Schonfrist genauso wichtig wie bei Säure. Der Standardwert von 10 spiegelt das Säuretor wider."
plPL = "Wczesny cykl, w którym może wystąpić burza piaskowa. Przed tym cyklem harmonogram traktuje piasek, jakby był wyłączony, więc susze po prostu czekają, a losowe lub biasowane rzuty, które wybierałyby piasek, wpadają w milczenie.\n\nPiasek na stałe przekształca teren, więc okres łaski jest tutaj istotny w taki sam sposób, w jaki ma to miejsce w przypadku kwasu. Domyślna wartość 10 odpowiada bramie kwasu."
ptBR = "Ciclo mais cedo em que uma tempestade de areia pode ocorrer. Antes deste ciclo, o agendador trata a areia como se estivesse desativada, então as secas permanecem paradas e as jogadas aleatórias ou tendenciosas que poderiam ter escolhido areia são substituídas por silêncio.\n\nA areia remodela permanentemente o terreno, então um período de graça importa aqui da mesma forma que para o ácido. O padrão de 10 espelha o portão do ácido."
koKR = "모래폭풍이 발생할 수 있는 가장 이른 주기. 이 주기 이전에는 스케줄러가 모래가 비활성화된 것처럼 처리하므로, 가뭄은 그냥 대기하게 되고, 모래를 선택했을 무작위 또는 편향된 롤은 대신 침묵으로 떨어집니다.\n\n모래는 지형을 영구적으로 바꾸므로 여기에 대한 유예 기간은 산성에 적용되는 것과 동일하게 중요합니다. 기본값 10은 산성 게이트를 반영합니다."
csCZ = "Nejranější cyklus, ve kterém může písková bouře proběhnout. Před tímto cyklem plánovač zachází s pískem, jako by byl zakázaný, takže sucha se prostě vyčkávají a náhodné nebo předpojaté hody, které by vybraly písek, místo toho mlčí.\n\nPísek trvale formuje terén, takže zde má období milosti stejný význam jako u kyseliny. Výchozí hodnota 10 odráží bránu kyseliny."
viVN = "Chu kỳ sớm nhất mà bão cát có thể xảy ra. Trước chu kỳ này, bộ lập lịch xử lý cát như thể nó bị vô hiệu hóa, vì vậy hạn hán chỉ đứng yên và những lần quay ngẫu nhiên hoặc thiên lệch sẽ chọn không có cát thay vào đó.\n\nCát định hình lại địa hình một cách vĩnh viễn, vì vậy thời gian ân hạn ở đây quan trọng giống như đối với axit. Mặc định 10 tương ứng với cánh cổng axit."
trTR = "Kum fırtınasının döneceği en erken döngü. Bu döngüden önce zamanlayıcı kumu devre dışıymış gibi değerlendirir, bu yüzden kuraklıklar bekler ve kum seçme olasılıkları sessizliğe düşer.\n\nKum, arazinin şeklini kalıcı olarak değiştirir, bu yüzden burada bir muafiyet süresi asidin etkisiyle aynı öneme sahiptir. Varsayılan 10, asit kapısını yansıtır."

