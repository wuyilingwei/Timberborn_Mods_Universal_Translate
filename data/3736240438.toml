["academicunwinds.Rainborn.Settings.RainIntensityMax.Tooltip"]
raw = "Upper end of the random intensity range.\n\nIf you drag this below the min slider, the order is swapped automatically, so the roll never throws."
status = "normal"
enUS = "Upper end of the random intensity range.\n\nIf you drag this below the minimum slider, the order is swapped automatically, so the roll never throws."
zhCN = "“随机强度范围的上限。\n\n如果您将其拖动到最小滑块以下，顺序会自动切换，因此投掷永远不会失败。”"
zhTW = "隨機強度範圍的上限。\n\n如果您將此拖動到低於最小滑桿，順序將自動交換，因此擲骰將不會失敗。"
ruRU = "Верхний предел диапазона случайной интенсивности.\n\nЕсли вы перетащите это ниже минимального ползунка, порядок будет автоматически изменен, так что бросок никогда не выбросит."
jaJP = "ランダム強度範囲の上限。 \n\nこの値を最小スライダー以下にドラッグすると、順序が自動的に入れ替わり、ロールが決して振れません。"
frFR = "Extrémité supérieure de la plage d'intensité aléatoire.\n\nSi vous faites glisser ceci en dessous du curseur minimum, l'ordre est automatiquement inversé, donc le lancer ne jette jamais."
deDE = "Oberes Ende des zufälligen Intensitätsbereichs.\n\nWenn Sie dies unter den minimalen Schieberegler ziehen, wird die Reihenfolge automatisch umgekehrt, sodass der Rollwurf niemals fehlschlägt."
plPL = "Górny koniec losowego zakresu intensywności.\n\nJeśli przeciągniesz to poniżej minimalnego suwaka, kolejność zostanie automatycznie zamieniona, więc rzut nigdy nie spadnie."
ptBR = "Limite superior da faixa de intensidade aleatória.\n\nSe você arrastar isso abaixo do slider mínimo, a ordem será trocada automaticamente, então a rolagem nunca falhará."
koKR = "무작위 강도 범위의 상한입니다.\n\n슬라이더의 최소값 이하로 드래그하면 자동으로 순서가 바뀌어 구슬이 던져지지 않습니다."
csCZ = "Vrchní hranice náhodného rozsahu intenzity.\n\nPokud to posunete pod minimální posuvník, pořadí se automaticky prohodí, takže hod nikdy nebude neplatný."
viVN = "Cao nhất trong dải cường độ ngẫu nhiên.\n\nNếu bạn kéo điều này thấp hơn thanh trượt tối thiểu, thứ tự sẽ tự động bị hoán đổi, vì vậy cú lăn sẽ không bao giờ bị ném."
trTR = "Rastgele yoğunluk aralığının üst ucu.\n\nBunu minimum kaydırıcının altına çekerseniz, düzen otomatik olarak değiştirilir, böylece zar asla atılmaz."

