["academicunwinds.Rainborn.Building.ExcavationFlag.Description"]
raw = "Mark a terrain block for removal. A builder hauls a pickaxe over and digs the block out. The block becomes loose dirt, which a beaver still has to haul away before the tile is fully clear."
status = "normal"
enUS = "Mark a terrain block for removal. A builder carries a pickaxe and digs out the block. The block turns into loose dirt, which a beaver must still haul away before the tile is completely clear."
zhCN = "标记一个地形块以供移除。一名建造者提着镐，挖掘出该块。这块变成松散的泥土，河狸仍需将其搬走，才能完全清理该瓦片。"
zhTW = "標記一個地形方塊以供移除。建築工人將鋤頭運到並挖出該方塊。方塊變成鬆土，河狸仍需將其搬走，才能使該地磚完全清空。"
ruRU = "Отметьте участок местности для удаления. Строитель приносит кирку и выкапывает участок. Этот участок превращается в рыхлую землю, которую бобер все еще должен убрать, прежде чем плитка станет полностью свободной."
jaJP = "「地形ブロックを取り除くためにマークします。建設者がつるはしを持ってブロックを掘り出します。ブロックは緩い土になり、ビーバーはタイルが完全にクリアになる前にそれを運び出す必要があります。」"
frFR = "Marquez un bloc de terrain pour enlever. Un constructeur transporte une pioche et déterre le bloc. Le bloc devient de la terre meuble, que un castor doit encore transporter avant que le carreau soit entièrement dégagé."
deDE = "Markiere einen Terrainblock zur Entfernung. Ein Bauarbeiter trägt eine Spitzhacke und gräbt den Block aus. Der Block wird zu lockerer Erde, die ein Biber noch abtransportieren muss, bevor die Fliese vollständig frei ist."
plPL = "Oznacz blok terenu do usunięcia. Budowniczy przynosi kilof i wydobywa blok. Blok staje się luźną ziemią, którą bóbr musi jeszcze odtransportować, zanim kafelek będzie całkowicie czysty."
ptBR = "Marque um bloco de terreno para remoção. Um construtor transporta uma picareta e cava o bloco. O bloco se torna terra solta, que um castor ainda precisa carregar antes que o tile esteja completamente limpo."
koKR = "지형 블록을 제거할 수 있도록 표시합니다. 건설자가 괭이를 가지고 와서 블록을 파냅니다. 블록은 느슨한 흙이 되며, 비버는 타일이 완전히 비워지기 전에 이를 제거해야 합니다."
csCZ = "Označte terénní blok pro odstranění. Stavitel přinese krumpáč a vykope blok. Blok se stane volnou hlínou, kterou musí bobr ještě odnést, než bude dlaždice úplně čistá."
viVN = "Đánh dấu một khối địa hình để loại bỏ. Một người xây dựng sẽ mang theo một cái rìu và đào khối đó ra. Khối này trở thành đất lỏng, mà một con castor vẫn phải mang đi trước khi ô đất hoàn toàn sạch."
trTR = "Bir arazi bloğunu kaldırılmak üzere işaretleyin. Bir inşaat işçisi, bir kürekle bloğu kazıp çıkarır. Blok gevşek toprak haline gelir, bu da bir kunduzun, karonun tamamen temizlenmesi için önce bu toprağı taşımak zorunda olduğu anlamına gelir."

