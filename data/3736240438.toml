["academicunwinds.Rainborn.Settings.ModEnabled.Tooltip"]
raw = "Master kill-switch. Turn off to immediately end any storm in progress and prevent new ones from rolling. Other settings are kept as-is so you can re-enable later without losing your tuning."
status = "abandoned"
enUS = "Master kill-switch. Turn off to immediately end any storm in progress and prevent new ones from occurring. Other settings are kept as-is so you can re-enable later without losing your adjustments."
zhCN = "“主控制开关。关闭后立即结束当前的风暴并防止新的风暴生成。其他设置保持不变，以便您可以稍后重新启用而不会丢失调整。”"
zhTW = "主殺開關。關閉後將立即結束任何正在進行的風暴，並防止新的風暴出現。其他設定將保持不變，這樣您可以稍後重新啟用而不會失去您的調整。"
ruRU = "Главный выключатель. Выключите, чтобы немедленно прекратить любую текущую бурю и предотвратить появление новых. Другие настройки останутся без изменений, чтобы вы могли позже снова включить их, не теряя своих настроек."
jaJP = "マスターキルスイッチ。これをオフにすると、進行中の嵐を即座に終了し、新しい嵐の発生を防ぎます。他の設定はそのまま保持されるため、調整を失うことなく後で再度有効にすることができます。"
frFR = "Interrupteur principal. Désactivez-le pour mettre fin immédiatement à toute tempête en cours et empêcher de nouvelles tempêtes de se former. Les autres paramètres restent inchangés afin que vous puissiez les réactiver plus tard sans perdre vos réglages."
deDE = "Master-Kill-Schalter. Deaktivieren, um sofort einen laufenden Sturm zu beenden und zu verhindern, dass neue entstehen. Andere Einstellungen bleiben unverändert, sodass Sie später ohne Verlust Ihrer Anpassungen erneut aktivieren können."
plPL = "Master kill-switch. Wyłącz, aby natychmiast przerwać trwającą burzę i zapobiec nadejściu nowych. Inne ustawienia pozostaną takie same, więc możesz je ponownie włączyć później, nie tracąc swoich dostosowań."
ptBR = "Interruptor mestre. Desative para terminar imediatamente qualquer tempestade em andamento e evitar que novas se formem. Outras configurações permanecem como estão para que você possa reativar mais tarde sem perder seu ajuste."
koKR = "마스터 킬 스위치. 이를 끄면 진행 중인 폭풍을 즉시 종료하고 새로운 폭풍이 생성되는 것을 방지합니다. 다른 설정은 그대로 유지되므로 나중에 조정을 잃지 않고 다시 활성화할 수 있습니다."
csCZ = "„Hlavní spínač. Vypněte, abyste okamžitě ukončili jakoukoli probíhající bouři a zabránili novým. Ostatní nastavení zůstávají beze změny, takže je můžete později znovu zapnout, aniž byste přišli o své ladění.“"
viVN = "Công tắc chính. Tắt nó để ngay lập tức kết thúc bất kỳ cơn bão nào đang diễn ra và ngăn chặn những cơn bão mới xuất hiện. Các cài đặt khác được giữ nguyên để bạn có thể bật lại sau mà không làm mất cài đặt của mình."
trTR = "Usta öldürme düğmesi. Geçerli olan herhangi bir fırtınayı hemen sona erdirmek ve yenilerinin oluşmasını engellemek için kapatın. Diğer ayarlar olduğu gibi kalır, böylece ayarlarınızı kaybetmeden daha sonra tekrar etkinleştirebilirsiniz."
