["academicunwinds.Rainborn.Settings.AcidRainEscalation.Tooltip"]
raw = "How many clean rain events must pass for the acid-rain probability to reach its 50% cap.\n\nLower means faster escalation toward 50/50."
status = "normal"
enUS = "How many clean rain events must pass for the acid rain probability to reach its 50% cap.\n\nLower means faster escalation toward 50/50."
zhCN = "在腐蚀性降雨概率达到50%上限之前，需要经过多少次清洁降雨事件。\n\n较低的值意味着更快接近50/50。"
zhTW = "在酸雨機率達到50%上限之前，必須經過多少次清淨降雨事件。\n\n數值越低，達到50/50的加速程度越快。"
ruRU = "Сколько чистых дождевых событий должно пройти, чтобы вероятность кислотного дождя достигла 50%.\n\nМеньше означает более быстрое увеличение к 50/50."
jaJP = "「酸性雨の確率が50％の上限に達するには、何回の清浄な雨イベントが必要か。\n\n低いほど50/50へのエスカレーションが速くなる。」」"
frFR = "Combien d'événements de pluie propre doivent passer pour que la probabilité de pluie acide atteigne sa limite de 50 %.\n\nMoins signifie une escalade plus rapide vers 50/50."
deDE = "Wie viele saubere Regenereignisse vergehen müssen, damit die Wahrscheinlichkeit für sauren Regen ihre 50%-Grenze erreicht.\n\nNiedriger bedeutet schnellere Eskalation in Richtung 50/50."
plPL = "Ile czystych opadów deszczu musi minąć, aby prawdopodobieństwo pojawienia się kwaśnego deszczu osiągnęło 50% maksymalnego poziomu.\n\nIm mniej, tym szybsza eskalacja w kierunku 50/50."
ptBR = "Quantos eventos de chuva limpa devem passar para que a probabilidade de chuva ácida atinja seu limite de 50%.\n\nMenor significa uma escalonamento mais rápido em direção ao 50/50."
koKR = "산성 비 확률이 50%로 상승하기 위해서 얼마나 많은 맑은 비 이벤트가 지나가야 하는지를 나타냅니다.\n\n낮을수록 50/50으로 빨리 상승합니다."
csCZ = "Kolik čistých dešťových událostí musí uplynout, aby pravděpodobnost kyselého deště dosáhla svého limitu 50%.\n\nNižší znamená rychlejší eskalaci směrem k 50/50."
viVN = "Có bao nhiêu sự kiện mưa sạch phải xảy ra để xác suất mưa axit đạt đến giới hạn 50%.\n\nThấp hơn có nghĩa là tăng tốc độ hướng tới 50/50."
trTR = "Asidik yağmur olasılığının %50 sınırına ulaşması için kaç temiz yağmur olayının geçmesi gerektiği.\n\nDaha düşük, 50/50'ye daha hızlı tırmanma anlamına gelir."

