["academicunwinds.Rainborn.Settings.DryDaysMax.Tooltip"]
raw = "Maximum number of days between rain events.\n\nEach gap rolls a random count between min and max plus a random time-of-day offset, so the next storm does not always land at the same hour."
status = "normal"
enUS = "Maximum number of days between rain events.\n\nEach gap rolls a random count between min and max plus a random time-of-day offset, so the next storm does not always land at the same hour."
zhCN = "“干旱事件之间的最大天数。\n\n每个间隔都会在最小值和最大值之间随机生成一个计数，并加上随机的时间偏移，以便下场暴雨不会总是在同一时间发生。”"
zhTW = "降雨事件之間的最長天數。\n\n每個間隔會隨機產生一個介於最小值和最大值之間的天數，再加上一個隨機的時間偏移，因此下一場風暴不會總是發生在相同的時間。"
ruRU = "Максимальное количество дней между дождевыми событиями.\n\nКаждый промежуток случайным образом определяет количество от минимального до максимального плюс случайное смещение времени суток, так что следующая буря не всегда начинается в один и тот же час."
jaJP = "雨イベント間の最大日数。\n\n各ギャップは、最小値と最大値の間のランダムなカウントとランダムな時間オフセットを生成しますので、次の嵐が常に同じ時間に発生するわけではありません。"
frFR = "Nombre maximum de jours entre les événements pluvieux.\n\nChaque intervalle génère un nombre aléatoire entre le minimum et le maximum, plus un décalage aléatoire de l'heure de la journée."
deDE = "Maximale Anzahl von Tagen zwischen Regenereignissen.\n\nJede Lücke erzeugt eine zufällige Anzahl zwischen minimum und maximum plus einen zufälligen zeitlichen Versatz, sodass der nächste Sturm nicht immer zur gleichen Stunde eintrifft."
plPL = "Maksymalna liczba dni między opadami deszczu.\n\nKażda przerwa losuje losową liczbę w zakresie od minimum do maksimum oraz losowy offset czasowy, dzięki czemu następna burza nie zawsze występuje o tej samej porze."
ptBR = "Número máximo de dias entre eventos de chuva.\n\nCada intervalo gera um número randômico entre o mínimo e o máximo, mais um deslocamento randômico do horário do dia, para que a próxima tempestade não ocorra sempre na mesma hora."
koKR = "비가 내리는 사건 사이의 최대 일수.\n\n각 간격은 최소 및 최대 사이의 무작위 수와 무작위 시간대 오프셋을 더하여 계산되며, 다음 폭풍은 항상 같은 시간에 발생하지 않습니다."
csCZ = "Maximální počet dní mezi dešťovými událostmi.\n\nKaždý interval generuje náhodný počet mezi minimem a maximem plus náhodný posun v čase během dne, takže příští bouře nepřichází vždy ve stejnou hodinu."
viVN = "Số ngày tối đa giữa các sự kiện mưa.\n\nMỗi khoảng cách sẽ có một số ngẫu nhiên giữa giá trị tối thiểu và tối đa cộng với một khoảng thời gian ngẫu nhiên trong ngày, vì vậy cơn bão tiếp theo không phải lúc nào cũng xảy ra vào cùng một giờ."
trTR = "Yağmur olayları arasında maksimum gün sayısı.\n\nHer boşluk, minimum ve maksimum arasında rastgele bir sayı ve rastgele bir gün saati kaydırması ile döner, böylece bir sonraki fırtına her zaman aynı saatte meydana gelmez."

