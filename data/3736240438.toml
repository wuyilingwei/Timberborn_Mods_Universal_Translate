["academicunwinds.Rainborn.Settings.RainAreaSize.Tooltip"]
raw = "Upper cap on the per-storm rolled peak radius, as a percentage of the smaller map dimension. Each storm rolls something in [5%, this value], so some storms are local squalls and some sweep most of the map.\n\nInside the rolled core fraction (25-75% of the live radius) rain is at full intensity; outside it drops sharply to zero at the rim."
status = "normal"
enUS = "Upper cap on the per-storm rolled peak radius, as a percentage of the smaller map dimension. Each storm rolls something in [5%, this value], so some storms are local squalls and some sweep most of the map.\n\nInside the rolled core fraction (25-75% of the live radius) rain is at full intensity; outside it drops sharply to zero at the rim."
zhCN = "每场暴雨的最大峰值半径上限，作为较小地图维度的百分比。每场暴雨的滚动范围在[5%，此值]之间，因此有些暴雨是局部的阵雨，而有些则覆盖大部分地图。\n\n在滚动的核心部分（活动半径的25-75%）内，雨水强度达到最大；在边缘外则迅速降至零。"
zhTW = "每場風暴的滾動最高半徑的上限，以較小的地圖尺寸的百分比表示。每場風暴的滾動範圍在[5%，此值]之間，因此某些風暴是局部的陣雨，而有些則覆蓋大部分地圖。\n\n在滾動核心範圍內（活半徑的25-75%），降雨強度為最高；在範圍外則急劇降至零，直至邊緣。"
ruRU = "Верхний предел радиуса максимального дождя за шторм, как процент от меньшего измерения карты. Каждый шторм проявляется в диапазоне [5%, это значение], поэтому некоторые штormы — это локальные шквалы, а другие охватывают большинство карты.\n\nВнутри центра радиуса (25-75% живого радиуса) дождь идет с полной интенсивностью; снаружи он резко падает до нуля на краю."
jaJP = "ストームごとの最大半径の上限、小さいマップのサイズのパーセンテージとして。各ストームは[5%、この値]の範囲で何かを生成するため、一部のストームは局地的な突風であり、他のストームはほとんどのマップを覆います。\n\n生成されたコアの範囲（生の半径の25-75％）内では雨は全力で降り、外側では急激にゼロまで減少します。"
frFR = "Plafond supérieur du rayon maximal par tempête, en pourcentage de la dimension la plus petite de la carte. Chaque tempête génère quelque chose entre [5%, cette valeur], donc certaines tempêtes sont des rafales locales et d'autres couvrent la plupart de la carte.\n\nÀ l'intérieur de la fraction de noyau générée (25-75% du rayon actif), la pluie est à pleine intensité ; à l'extérieur, elle chute rapidement à zéro au bord."
deDE = "Obergrenze für den pro Sturm gerollten Spitzenradius, als Prozentsatz der kleineren Kartendimension. Jeder Sturm hat einen Wert zwischen [5%, diesem Wert], sodass einige Stürme lokale Böen sind und andere den größten Teil der Karte überziehen.\n\nInnerhalb des gerollten Kernbereichs (25-75% des aktiven Radius) ist der Regen mit voller Intensität; außerhalb fällt er abrupt auf null am Rand."
plPL = "Górna granica promienia szczytowego dla każdego burzowego opadu, jako procent mniejszego wymiaru mapy. Każda burza generuje coś w przedziale [5%, ta wartość], więc niektóre burze to lokalne wichury, a inne obejmują większość mapy.\n\nW obrębie rdzenia opadu (25-75% aktywnego promienia) deszcz pada z pełną intensywnością; poza nim gwałtownie spada do zera na krawędzi."
ptBR = "Limite superior do raio de pico rolado por tempestade, como uma porcentagem da menor dimensão do mapa. Cada tempestade gera algo entre [5%, este valor], então algumas tempestades são chuvas locais e outras varrem a maior parte do mapa.\n\nDentro da fração central rolada (25-75% do raio ativo) a chuva está em plena intensidade; fora dela, cai abruptamente para zero na borda."
koKR = "폭풍당 롤링된 최대 반경의 상한선으로서, 작은 맵 차원의 비율입니다. 각 폭풍은 [5%, 이 값] 사이의 무언가를 굴리므로 일부 폭풍은 지역적인 소나기이고 일부는 맵 대부분을 휩쓸어갑니다.\n\n롤링된 핵심 분수(실시간 반경의 25-75%) 내에서는 비가 최대 강도로 내리며, 외부에서는 가장자리에 도달할 때 급격히 0으로 떨어집니다."
csCZ = "Horní limit maximálního poloměru na bouři, jako procento menšího rozměru mapy. Každá bouře se pohybuje v rozmezí [5 %, této hodnoty], takže některé bouře jsou místní vichřice a jiné zasahují většinu mapy.\n\nUvnitř jádra s rolovaným poloměrem (25-75 % živého poloměru) prší s plnou intenzitou; venku prudce klesá na nulu na okraji."
viVN = "Hạn mức trên cùng cho bán kính đỉnh tối đa theo từng trận bão, tính bằng phần trăm của kích thước bản đồ nhỏ hơn. Mỗi trận bão có cường độ từ [5%, giá trị này], vì vậy một số trận bão chỉ là gió mạnh cục bộ trong khi một số lại bao phủ hầu hết bản đồ.\n\nBên trong phần lõi đã cuộn (25-75% bán kính sống), mưa có cường độ tối đa; bên ngoài nó giảm mạnh về 0 ở mép."
trTR = "Fırtına başına dönen maksimum yarıçap, haritanın daha küçük boyutunun yüzdesi olarak. Her fırtına [%5, bu değer] arasında bir şey oluşturur, bu nedenle bazı fırtınalar yerel fırtınalar iken bazıları haritanın çoğunu kaplar.\n\nDönmüş çekirdek bölümünde (%25-75 canlı yarıçap) yağmur tam yoğunluktadır; dışarıda ise kenarda sıfıra keskin bir şekilde düşer."

