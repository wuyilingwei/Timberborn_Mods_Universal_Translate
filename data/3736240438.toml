["academicunwinds.Rainborn.Settings.RainIntensityMin.Tooltip"]
raw = "Lower end of the random intensity range. Each storm rolls a fresh strength between this and the max.\n\n10 is roughly drizzle; 30+ is a heavy storm."
new = "Lower end of the random intensity range. Each storm rolls a fresh strength somewhere between this and the max, so two consecutive storms rarely feel the same.\n\n10 is roughly a drizzle; 30+ is a heavy storm."
status = "normal"
enUS = "Lower end of the random intensity range. Each storm generates a fresh intensity between this value and the maximum.\n\n10 is roughly drizzle; 30+ is a heavy storm."
zhCN = "“随机强度范围的下限。每次风暴在此值和最大值之间随机生成强度。\n\n10 大约是细雨；30 以上是暴风雨。”"
zhTW = "“隨機強度範圍的下限。每場暴風雨在這個值和最大值之間隨機產生強度。\n\n10 大致為毛毛雨；30 以上為強烈風暴。”"
ruRU = "Нижний предел диапазона.random интенсивности. Каждую бурю сила варьируется между этим значением и максимальным.\n\n10 - это примерно моросящий дождь; 30+ - сильный шторм."
jaJP = "乱数の強度範囲の下限。各嵐はこの値と最大値の間で新しい強度を生成します。\n\n10は概ね小雨、30以上は強い嵐です。"
frFR = "Limite inférieure de la plage d'intensité aléatoire. Chaque tempête génère une nouvelle intensité entre cette valeur et la valeur maximale.\n\n10 équivaut à une bruine ; 30+ correspond à une forte tempête."
deDE = "Unteres Ende des zufälligen Intensitätsbereichs. Jeder Sturm bringt eine frische Stärke zwischen diesem und dem Maximum.\n\n10 ist ungefähr Nieseln; 30+ ist ein schwerer Sturm."
plPL = "Niższy koniec losowego zakresu intensywności. Każda burza ma świeżą siłę między tym a maksimum.\n\n10 to w przybliżeniu mżawka; 30+ to silna burza."
ptBR = "Limite inferior da faixa de intensidade aleatória. Cada tempestade gera uma nova intensidade entre este valor e o máximo.\n\n10 é aproximadamente uma chuviscada; 30+ é uma tempestade forte."
koKR = "무작위 강도 범위의 하한. 각 폭풍은 이 값과 최대 값 사이에서 새로운 세기를 결정합니다.\n\n10은 대략적으로 이슬비; 30 이상은 강한 폭풍입니다."
csCZ = "Spodní hranice náhodného rozsahu intenzity. Každá bouře má novou intenzitu mezi touto hodnotou a maximální.\n\n10 je přibližně mrholení; 30+ je silná bouře."
viVN = "Cao nhất của cường độ ngẫu nhiên. Mỗi cơn bão có một sức mạnh mới giữa mức này và mức tối đa.\n\n10 là mưa nhẹ; 30 trở lên là bão lớn."

