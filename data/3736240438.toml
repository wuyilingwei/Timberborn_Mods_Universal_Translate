["academicunwinds.Rainborn.Building.LooseDirt.Description"]
raw = "A terrain block that has been dug loose. Beavers haul it away on their own; the underlying terrain stays clear once they are done."
status = "normal"
enUS = "A terrain block that has been dug loose. Beavers haul it away on their own; the underlying terrain stays clear once they are done."
zhCN = "一个已经松动的地形块。松鼠会自己将其搬走；完成后，底层地形将保持清晰。"
zhTW = "一個已經被挖鬆的地形塊。海狸會自行搬運它；一旦完成，底下的地形將保持清晰。"
ruRU = "Участок местности, который был выкопан. Бобры сами увозят его; подлежащая местность остается чистой после того, как они закончат."
jaJP = "掘り起こされた地形ブロック。ビーバーが自分たちで運び去ります; 完了すると下の地形はクリアのままです。"
frFR = "Un bloc de terrain qui a été déterré. Les castors l'emportent d'eux-mêmes ; le terrain sous-jacent reste dégagé une fois qu'ils ont terminé."
deDE = "Ein Terrainblock, der gelockert wurde. Biber transportieren ihn eigenständig ab; der darunterliegende Boden bleibt frei, sobald sie fertig sind."
plPL = "Blok terenu, który został luźno wykopany. Bobry same go zabierają; podłoże pozostaje czyste, gdy skończą."
ptBR = "Um bloco de terreno que foi escavado. Os castores o transportam sozinhos; o terreno subjacente permanece limpo uma vez que terminam."
koKR = "헐거운 상태로 파헤쳐진 지형 블록입니다. 비버들이 스스로 운반하며, 작업이 완료되면 아래 지형은 깨끗하게 유지됩니다."
csCZ = "Terénní blok, který byl uvolněn. Bobři ho sami odvezou; podkladový terén zůstane po jejich dokončení čistý."
viVN = "Một khối địa hình đã được đào lỏng ra. Những chú béo tự mình kéo đi; địa hình bên dưới sẽ giữ nguyên sau khi chúng hoàn thành."
trTR = "Kazılmış bir arazi bloğu. Kunduzlar bunu kendi başlarına taşır; işlerini bitirdiklerinde altındaki arazi temiz kalır."

