["academicunwinds.Rainborn.Settings.SandIntensity.Tooltip"]
raw = "Drives how quickly sand piles up on eligible tiles (wind-sheltered downwind of obstacles, or sitting in depressions). Higher values mean visible dunes form during a single storm. Lower values mean dunes only build up across many storms, or never at all on marginal tiles."
status = "normal"
enUS = "Controls how quickly sand accumulates on eligible tiles (wind-sheltered downwind of obstacles or located in depressions). Higher values result in visible dunes forming during a single storm. Lower values mean dunes only accumulate over multiple storms or may not form at all on marginal tiles."
zhCN = "驱动沙子在适用的瓦片上堆积的速度（在障碍物的下风处受到风遮挡，或位于凹陷处）。较高的数值意味着在一次风暴中会形成可见的沙丘。较低的数值则意味着沙丘只会在多次风暴中逐渐形成，或在边缘瓷砖上根本不会形成。"
zhTW = "驅動沙子在合適的瓷磚上積累的速度（風避難處的下風或位於凹陷處）。較高的數值意味著在一次風暴期間會形成明顯的沙丘。較低的數值則意味著沙丘僅在多次風暴中逐漸累積，或在邊緣瓷磚上根本不會形成。"
ruRU = "Определяет, как быстро песок накапливается на подходящих плитках (в защищенных от ветра местах за препятствиями или в низинах). Более высокие значения означают, что видимые дюны образуются во время одной шторма. Более низкие значения означают, что дюны накапливаются только за много штормов или вообще не появляются на marginal плитках."
jaJP = "風障害物の下流での風に遮られたタイルやくぼみにあるタイルで、砂がどのくらいの速さで積み重なるかを決定します。値が高いほど、単一の嵐の間に視覚的な砂丘が形成されます。値が低いほど、砂丘は複数の嵐を経てのみ形成されるか、あるいは限られたタイルではまったく形成されません。"
frFR = "Détermine la vitesse à laquelle le sable s'accumule sur les tuiles éligibles (abritées du vent et situées en aval d'obstacles, ou se trouvant dans des dépressions). Des valeurs plus élevées signifient que des dunes visibles se forment pendant une seule tempête. Des valeurs plus faibles signifient que les dunes ne s'accumulent que sur plusieurs tempêtes, ou ne se forment jamais sur des tuiles marginales."
deDE = "Bestimmt, wie schnell sich Sand auf geeigneten Flächen ansammelt (windgeschützt hinter Hindernissen oder in Vertiefungen). Höhere Werte bedeuten, dass sichtbare Dünen während eines einzigen Sturms entstehen. Niedrigere Werte bedeuten, dass Dünen nur über viele Stürme hinweg entstehen oder auf marginalen Flächen gar nicht."
plPL = "Określa, jak szybko piasek gromadzi się na odpowiednich kafelkach (osłoniętych od wiatru, w kierunku spadku przeszkód lub znajdujących się w zagłębieniach). Wyższe wartości oznaczają, że widoczne wydmy formują się w trakcie jednej burzy. Niższe wartości oznaczają, że wydmy gromadzą się tylko przez wiele burz lub nie powstają w ogóle na marginalnych kafelkach."
ptBR = "Determina a rapidez com que a areia se acumula em azulejos elegíveis (abrigados do vento a sotavento de obstáculos ou situados em depressões). Valores mais altos significam que dunas visíveis se formam durante uma única tempestade. Valores mais baixos significam que as dunas só se acumulam ao longo de muitas tempestades, ou nunca se formam em azulejos marginais."
koKR = "모래가 적격 타일(장애물의 바람막이 아래 또는 움푹 들어간 곳에 위치)에서 얼마나 빨리 쌓이는지를 조절합니다. 값이 높을수록 단 한 번의 폭풍우 동안 눈에 띄는 모래언덕이 형성됩니다. 값이 낮을수록 모래언덕은 여러 번의 폭풍우를 거쳐야만 형성되거나, 경계 타일에서는 전혀 형성되지 않을 수 있습니다."
csCZ = "Určuje, jak rychle se písek hromadí na způsobilých dlaždicích (chráněných větrem na úpatí překážek nebo v depresích). Vyšší hodnoty znamenají, že se během jedné bouře vytvoří viditelné duny. Nižší hodnoty znamenají, že se duny tvoří pouze během mnoha bouří, nebo se na okrajových dlaždicích nevytvoří vůbec."
viVN = "Xác định tốc độ tích lũy cát trên các ô đủ tiêu chuẩn (nơi có gió bảo vệ phía bên dưới chướng ngại vật, hoặc nằm trong các hố trũng). Giá trị cao hơn đồng nghĩa với việc các đụn cát sẽ hình thành rõ rệt trong một cơn bão duy nhất. Giá trị thấp hơn có nghĩa là đụn cát chỉ tích tụ qua nhiều cơn bão, hoặc không bao giờ hình thành trên các ô biên."
trTR = "Kum yığınlarının uygun karolar üzerinde ne kadar hızlı biriktiğini belirler (engellerin rüzgar korumasındaki alanlarda veya çukurlarda). Daha yüksek değerler, tek bir fırtına sırasında görünür kumullar oluşması anlamına gelir. Daha düşük değerler ise kumulların yalnızca birçok fırtına süresince birikmesi veya marjinal karolar üzerinde hiç oluşmaması anlamına gelir."

