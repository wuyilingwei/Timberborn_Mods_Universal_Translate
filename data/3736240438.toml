["academicunwinds.Rainborn.Settings.AcidRainContamination.Tooltip"]
raw = "Upper cap on each acid storm's rolled contamination ratio. The scheduler rolls a fresh value per event somewhere in [25%, this slider], so two consecutive acid storms can feel very different from each other.\n\n100% gives the widest variety. Lower the slider to hard-cap how harsh any single storm can get.\n\nHas no effect when Enable acid rain is off, or when the current event rolled as a clean rain."
status = "normal"
enUS = "Upper cap on each acid storm's rolled contamination ratio. The scheduler rolls a fresh value per event somewhere in [25%, this slider], so two consecutive acid storms can feel very different from each other.\n\n100% gives the widest variety. Lower the slider to hard-cap how harsh any single storm can get.\n\nHas no effect when 'Enable acid rain' is off, or when the current event rolls as clean rain."
zhCN = "每场酸雨的污染 ratio 上限。调度程序在每个事件中会在 [25%, 该滑块值] 范围内生成一个新值，因此两场连续的酸雨可能会有很大的不同。\n\n100% 提供了最大的多样性。调低滑块以严格限制任何单场风暴的严酷程度。\n\n当酸雨启用关闭时，或当前事件被判定为清水时，无效。"
zhTW = "「每場酸風暴的污染比率上限。排程器會在每個事件裡隨機產生一個新值，範圍在[25%，本滑桿數值]之間，因此連續兩場酸風暴的感受可能大相逕庭。\n\n100%提供最大變化範圍。降低滑桿可以限制單次風暴的嚴重程度。\n\n當酸雨啟用為關閉，或當前事件隨機為乾淨雨時，無任何效果。」"
ruRU = "Верхний предел коэффициента загрязнения, который выпадает на каждую кислотную бурю. Планировщик генерирует новое значение для каждого события в пределах [25%, этот ползунок], поэтому две последовательные кислотные бури могут ощущаться очень по-разному.\n\n100% предоставляет наибольшее разнообразие. Уменьшите ползунок, чтобы жестко ограничить, насколько жестокой может быть любая отдельная буря.\n\nНе оказывает эффекта, когда включение кислотного дождя выключено или когда текущее событие выпало как чистый дождь."
jaJP = "各酸性嵐の汚染比率の上限です。スケジューラーは、[25%からこのスライダーまで]の範囲でイベントごとに新しい値を決定するため、2回連続で発生した酸性嵐は非常に異なる体験になります。\n\n100%は最も幅広いバリエーションを提供します。スライダーを下げると、単一の嵐がどれほど厳しいかを厳格に制御できます。\n\n酸性雨が無効の場合や、現在のイベントがきれいな雨として発生した場合には効果がありません。"
frFR = "Plage supérieure du ratio de contamination généré lors de chaque tempête acide. Le planificateur génère une nouvelle valeur par événement quelque part dans [25 %, ce curseur], de sorte que deux tempêtes acides consécutives peuvent sembler très différentes l'une de l'autre.\n\n100 % offre la plus grande variété. Abaissez le curseur pour limiter sévèrement la gravité d'une tempête donnée.\n\nN'a aucun effet lorsque l'option Activer la pluie acide est désactivée ou lorsque l'événement actuel est apparu comme une pluie propre."
deDE = "Oberer Grenzwert für das kontaminierte Verhältnis jeder Säuresturm-Runde. Der Scheduler ermittelt einen neuen Wert pro Ereignis irgendwo in [25 %, dieser Schieberegler], sodass zwei aufeinanderfolgende Säurestürme sehr unterschiedlich voneinander sein können.\n\n100 % bietet die größte Vielfalt. Senken Sie den Schieberegler, um zu begrenzen, wie heftig ein einzelner Sturm sein kann.\n\nHat keine Auswirkungen, wenn Säureregen deaktiviert ist oder wenn das aktuelle Ereignis als sauberes Regenwetter auftritt."
plPL = "Górna granica dla współczynnika zanieczyszczenia w każdej burzy kwasowej. Harmonogram generuje nową wartość na każde zdarzenie w zakresie [25%, ten suwak], więc dwie kolejno następujące burze kwasowe mogą być bardzo różne.\n\n100% daje najszerszą różnorodność. Obniż suwak, aby ustalić maksymalną surowość pojedynczej burzy.\n\nNie ma wpływu, gdy opcja Włącz deszcz kwasowy jest wyłączona lub gdy aktualne zdarzenie zostało wylosowane jako czysty deszcz."
ptBR = "Limite superior na proporção de contaminação gerada por cada tempestade ácida. O planejador gera um novo valor por evento em algum lugar entre [25%, este controle deslizante], então duas tempestades ácidas consecutivas podem parecer muito diferentes uma da outra.\n\n100% oferece a maior variedade. Reduza o controle deslizante para limitar severamente a intensidade de qualquer tempestade única.\n\nNão tem efeito quando a opção Ativar chuva ácida está desligada ou quando o evento atual foi gerado como uma chuva limpa."
koKR = "각 산성 폭풍의 오염 비율에 대한 상한선입니다. 스케줄러는 [25%, 이 슬라이더] 범위 내에서 이벤트마다 새로운 값을 롤링하므로, 두 개의 연속된 산성 폭풍은 서로 매우 다르게 느껴질 수 있습니다.\n\n100%는 가장 다양한 결과를 제공합니다. 슬라이더를 낮춰 단일 폭풍이 얼마나 강력할 수 있는지를 제한하세요.\n\n산성 비가 비활성화되었거나 현재 이벤트가 깨끗한 비로 롤링되었을 때는 효과가 없습니다."
csCZ = "Horní limit na poměr kontaminace každé kyselé bouře. Plánovač generuje novou hodnotu pro každou událost někde v rozmezí [25 %, tento posuvník], takže dvě po sobě jdoucí kyselé bouře se mohou velmi lišit.\n\n100 % poskytuje nejširší rozmanitost. Snižte posuvník, abyste omezili, jak silná může být jakákoliv jednotlivá bouře.\n\nNemá žádný efekt, když je zakázán kyselý déšť, nebo když aktuální událost proběhla jako čistý déšť."
viVN = "Giới hạn tối đa về tỷ lệ ô nhiễm của mỗi cơn bão axit. Bộ lập lịch sẽ tạo ra một giá trị mới cho mỗi sự kiện trong khoảng [25%, cái thanh trượt này], vì vậy hai cơn bão axit liên tiếp có thể mang lại cảm giác rất khác nhau.\n\n100% mang lại sự đa dạng lớn nhất. Giảm thanh trượt để giới hạn mức độ khắc nghiệt mà bất kỳ cơn bão nào có thể đạt được.\n\nKhông có tác động khi Bật mưa axit tắt, hoặc khi sự kiện hiện tại diễn ra như một cơn mưa sạch."
trTR = "Her asit fırtınasının yuvarlanmış kirlenme oranı için üst sınır. Programlayıcı, [25%, bu kaydırıcı] arasında bir yerde her olay için taze bir değer belirler, bu nedenle iki ardışık asit fırtınası birbirinden çok farklı hissedilebilir.\n\n%100 en geniş çeşitliliği sunar. Herhangi bir tek fırtınanın ne kadar şiddetli olabileceğini sert bir şekilde sınırlandırmak için kaydırıcıyı aşağı çekin.\n\nAsit yağmurunu etkinleştirmek kapalı olduğunda veya mevcut olay temiz yağmur olarak yuvarlandığında etkisi yoktur."

