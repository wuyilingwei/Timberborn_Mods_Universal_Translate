["academicunwinds.Rainborn.Settings.WeatherMode.Tooltip"]
raw = "Off: no weather rolls at all. The mod stays loaded but the scheduler is silent.\n\nStrict cycle lock: the vanilla cycle decides. Drought always rolls a sandstorm, badtide always rolls acid rain, temperate always rolls clean rain. However, if the cycle's expected weather is disabled (e.g. drought with sandstorms turned off), nothing rolls that event.\n\nBiased (default): 90% chance the event matches the cycle, 5% each chance for the other two weather types. Lets the cycle do its thing most of the time while still giving you the occasional surprise. Disabled weather types redistribute their share to the others.\n\nRandom: the cycle is ignored entirely. Sandstorm chance and acid escalation sliders drive every roll."
status = "normal"
enUS = "Off: no weather rolls at all. The mod stays loaded but the scheduler is silent.\n\nStrict cycle lock: the vanilla cycle decides. Drought always rolls a sandstorm, badtide always rolls acid rain, temperate always rolls clean rain. However, if the cycle's expected weather is disabled (e.g. drought with sandstorms turned off), nothing rolls that event.\n\nBiased (default): 90% chance the event matches the cycle, 5% each chance for the other two weather types. Lets the cycle do its thing most of the time while still giving you the occasional surprise. Disabled weather types redistribute their share to the others.\n\nRandom: the cycle is ignored entirely. Sandstorm chance and acid escalation sliders drive every roll."
zhCN = "关闭：完全没有天气事件。该mod保持加载，但调度器保持静默。\n\n严格的循环锁定：原版循环决定。干旱总是伴随沙尘暴，恶潮总是伴随酸雨，温带总是伴随干净的雨。不过，如果循环的预期天气被禁用（例如，干旱时沙尘暴被关闭），则不会触发该事件。\n\n偏向（默认）：事件与循环匹配的概率为90%，另两种天气类型各有5%的概率。这让循环在大多数情况下按照它的方式运行，同时偶尔带来意外。禁用的天气类型会将其份额重新分配给其他天气类型。\n\n随机：完全忽略循环。沙尘暴概率和酸化升级滑块驱动每次事件的发生。"
zhTW = "關閉：完全不會出現天氣事件。模組仍然載入，但排程器保持靜默。\n\n嚴格週期鎖定：基本遊戲的週期決定。乾旱時總會有沙塵暴，壞潮時總會有酸雨，溫帶時總會有清雨。無論如何，如果週期預期的天氣被禁用（例如，乾旱時關閉沙塵暴），那麼該事件就不會發生。\n\n偏袒（預設）：事件與週期匹配的機率為90%，另外兩種類型的天氣各有5%的機率。大多數時間讓週期按其本來的方式運行，同時仍然給你偶爾的驚喜。禁用的天氣類型會將其份額重新分配給其他類型。\n\n隨機：完全忽略週期。沙塵暴的機率和酸雨升級的滑桿將驅動每一次的事件。"
ruRU = "Выкл.: нет никаких погодных событий. Мод остается загруженным, но планировщик молчит.\n\nЖесткая блокировка цикла: стандартный цикл решает. Засуха всегда вызывает песчаную бурю, неблагоприятная волна всегда вызывает кислотный дождь, умеренный климат всегда вызывает чистый дождь. Однако, если ожидаемая погода цикла отключена (например, засуха с отключенными песчаными бурями), это событие не произойдет.\n\nПредвзятое (по умолчанию): 90% вероятность совпадения события с циклом, 5% вероятности для двух других типов погоды. Позволяет циклу делать то, что ему нужно, большую часть времени, но при этом время от времени предоставляет вам неожиданные сюрпризы. Отключенные типы погоды перераспределяют свою долю другим.\n\nСлучайно: цикл полностью игнорируется. Вероятность песчаной бури и ползунки кислотной эскалации управляют каждым событием."
jaJP = "オフ：全く天候が発生しません。モッドはロードされたままですが、スケジューラーは静かです。\n\n厳密なサイクルロック：バニラサイクルが決定します。干ばつは必ず砂嵐を発生させ、悪潮は必ず酸性雨を発生させ、温暖な気候は必ず清潔な雨を発生させます。ただし、サイクルの予想天候が無効になっている場合（例：砂嵐が無効の干ばつ）、そのイベントは発生しません。\n\nバイアス（デフォルト）：イベントがサイクルに一致する確率は90％、他の2つの天候タイプの確率はそれぞれ5％です。サイクルが大体のことを行いながら、たまにサプライズがある状態を維持します。無効な天候タイプは他の天候の分を再配分します。\n\nランダム：サイクルは完全に無視されます。砂嵐の確率と酸性雨のスライダーがすべてのロールを駆動します。"
frFR = "Désactivé : aucun événement climatique ne se produit. Le mod reste chargé mais le planificateur est silencieux.\n\nCycle verrouillé strict : le cycle par défaut décide. La sécheresse provoque toujours une tempête de sable, la marée haute provoque toujours de la pluie acide, le climat tempéré provoque toujours de la pluie propre. Cependant, si le temps prévu du cycle est désactivé (par exemple, sécheresse avec tempêtes de sable désactivées), cet événement ne se produit pas.\n\nBiaisé (par défaut) : 90 % de chances que l'événement corresponde au cycle, 5 % chacune pour les deux autres types de temps. Cela permet au cycle de faire son travail la plupart du temps tout en vous offrant de temps en temps une surprise. Les types de temps désactivés redistribuent leur part aux autres.\n\nAléatoire : le cycle est complètement ignoré. La probabilité de tempête de sable et les curseurs d'escalade acide déterminent chaque événement."
deDE = "Ausschalten: keine Wetterereignisse überhaupt. Das Mod bleibt geladen, aber der Zeitplaner ist still.\n\nStrikter Zyklusabschluss: Der Vanilla-Zyklus entscheidet. Dürre bringt immer einen Sandsturm, schlechte Flut bringt immer saure Regen, gemäßigt bringt immer sauberen Regen. Allerdings, wenn das erwartete Wetter des Zyklus deaktiviert ist (z. B. Dürre mit deaktivierten Sandstürmen), tritt dieses Ereignis nicht ein.\n\nVoreingenommen (Standard): 90% Chance, dass das Ereignis mit dem Zyklus übereinstimmt, 5% jeweils Chance für die anderen beiden Wetterarten. Lässt den Zyklus die meiste Zeit seine Sache machen und sorgt trotzdem für gelegentliche Überraschungen. Deaktivierte Wettertypen verteilen ihren Anteil auf die anderen.\n\nZufällig: Der Zyklus wird vollständig ignoriert. Die Chancen für Sandsturm und die Schieberegler für die Säureeskalation bestimmen jede Runde."
plPL = "Wyłączone: brak zmian pogodowych. Mod pozostaje załadowany, ale harmonogram milczy.\n\nŚcisła blokada cyklu: cykl podstawowy decyduje. Susza zawsze powoduje burzę piaskową, złe przypływy zawsze powodują kwasowy deszcz, umiarkowany zawsze powoduje czysty deszcz. Jednakże, jeśli oczekiwana pogoda w cyklu jest wyłączona (np. susza z wyłączonymi burzami piaskowymi), nic nie generuje tego zdarzenia.\n\nStronniczy (domyślnie): 90% szansy, że zdarzenie odpowiada cyklowi, 5% szansy dla pozostałych dwóch typów pogody. Pozwala cyklowi robić swoje przez większość czasu, dając jednocześnie okazjonalne niespodzianki. Wyłączone typy pogody redystrybuują swoją część do pozostałych.\n\nLosowy: cykl jest całkowicie ignorowany. Szanse na burzę piaskową i slidery eskalacji kwasu kierują każdym rollem."
ptBR = "Desligado: sem rolagens de clima. O mod permanece carregado, mas o agendador está silencioso.\n\nBloqueio de ciclo rigoroso: o ciclo padrão decide. A seca sempre rola uma tempestade de areia, a maré ruim sempre rola chuva ácida, o temperado sempre rola chuva limpa. No entanto, se o clima esperado do ciclo estiver desativado (por exemplo, seca com tempestades de areia desligadas), nada ocorrerá nesse evento.\n\nTendencioso (padrão): 90% de chance do evento corresponder ao ciclo, 5% de chance para cada um dos outros dois tipos de clima. Permite que o ciclo faça o que precisa a maior parte do tempo, enquanto ainda lhe proporciona uma surpresa ocasional. Tipos de clima desativados redistribuem sua parte para os outros.\n\nAleatório: o ciclo é ignorado completamente. A chance de tempestade de areia e os controles de escalonamento ácido conduzem cada rolagem."
koKR = "꺼짐: 전혀 날씨 롤이 없습니다. 모드는 로드된 상태이지만 스케줄러는 조용합니다.\n\n엄격한 사이클 잠금: 일반 사이클이 결정합니다. 가뭄은 항상 모래폭풍을 발생시키고, 나쁜 조수는 항상 산성 비를 발생시키며, 온대 지역은 항상 깨끗한 비를 발생시킵니다. 그러나 사이클의 예상 날씨가 비활성화되어 있으면(예: 모래폭풍이 꺼진 가뭄), 해당 이벤트는 발생하지 않습니다.\n\n편향(기본값): 이벤트가 사이클과 일치할 확률은 90%, 나머지 두 가지 날씨 유형에 대해서는 각각 5%의 확률을 가집니다. 대체로 사이클이 그 기능을 수행하도록 하면서도 가끔씩 놀라움을 제공합니다. 비활성화된 날씨 유형은 다른 유형에 자신의 몫을 재분배합니다.\n\n무작위: 사이클이 완전히 무시됩니다. 모래폭풍 확률과 산성 상승 슬라이더가 모든 롤을 결정합니다."
csCZ = "Vypnuto: žádné počasí se vůbec neprovádí. Mod zůstává načten, ale plánovač je tichý.\n\nPřísná uzamčení cyklu: rozhoduje vanilkový cyklus. Sucho vždy způsobí písečnou bouři, špatný příliv vždy způsobí kyselý déšť, mírné počasí vždy přináší čistý déšť. Pokud je však očekávané počasí cyklu zakázáno (např. sucho s vypnutými písečnými bouřemi), nic nevyvozuje tuto událost.\n\nZaujaté (výchozí): 90% šance, že událost odpovídá cyklu, 5% šance pro ostatní dva typy počasí. Nechá cyklus dělat svou věc většinu času, přičemž stále poskytuje příležitostné překvápko. Zakázané typy počasí redistribuují svůj podíl ostatním.\n\nNáhodné: cyklus je zcela ignorován. Šance na písečnou bouři a posuvníky pro kyselou eskalaci řídí každé provedení."
viVN = "Tắt: không có thời tiết nào xảy ra. Mod vẫn được tải nhưng lịch trình thì yên tĩnh.\n\nKhóa chu kỳ nghiêm ngặt: chu kỳ gốc quyết định. Hạn hán luôn phát sinh bão cát, thủy triều xấu luôn phát sinh mưa axit, ôn đới luôn phát sinh mưa sạch. Tuy nhiên, nếu thời tiết dự kiến của chu kỳ bị tắt (ví dụ: hạn hán với bão cát bị tắt), sẽ không có sự kiện nào xảy ra.\n\nThiên lệch (mặc định): 90% khả năng sự kiện khớp với chu kỳ, 5% khả năng cho hai loại thời tiết còn lại. Cho phép chu kỳ hoạt động bình thường trong hầu hết thời gian trong khi vẫn mang đến cho bạn những bất ngờ thỉnh thoảng. Các loại thời tiết bị tắt phân bổ lại phần của chúng cho những loại khác.\n\nNgẫu nhiên: chu kỳ hoàn toàn bị bỏ qua. Khả năng bão cát và thanh điều chỉnh leo thang axit điều khiển mọi cuộn."
trTR = "Kapalı: hiç hava döngüsü yok. Mod yüklü kalır ama zamanlayıcı sessizdir.\n\nSıkı döngü kilidi: standart döngü karar verir. Kuraklık her zaman kum fırtınası döndürür, kötü akıntı her zaman asit yağmuru döndürür, ılıman her zaman temiz yağmur döndürür. Ancak, döngünün beklenen havası devre dışı bırakılmışsa (örneğin, kum fırtınaları kapalı olan kuraklık), o olay döndürülmez.\n\nÖnyargılı (varsayılan): olayın döngü ile örtüşme olasılığı %90, diğer iki hava türü için her biri %5 olasılık. Döngünün çoğu zaman kendi işini yapmasına izin verirken, yine de ara sıra sürprizler sunar. Devre dışı bırakılan hava türleri, paylarını diğerlerine dağıtır.\n\nRastgele: döngü tamamen göz ardı edilir. Kum fırtınası olasılığı ve asit artışı ayarları her döngüyü yönlendirir."

