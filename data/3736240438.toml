["academicunwinds.Rainborn.Settings.SandStormEnabled.Tooltip"]
raw = "Master toggle for sandstorms. Off means the scheduler never picks a sandstorm regardless of mode. Strict droughts that would normally roll sand will roll nothing instead; Biased rolls redistribute the sand share to the other types; Random re-rolls sand picks as rain.\n\nMarked experimental because sand deposition reshapes terrain across storms."
status = "normal"
enUS = "Master toggle for sandstorms. Turning it off means the scheduler never selects a sandstorm, regardless of the mode. Strict droughts that would normally trigger sandstorms will instead trigger nothing; Biased rolls redistribute the sand share to the other types; Random re-rolls will select rain instead of sand.\n\nMarked as experimental because sand deposition reshapes terrain during storms."
zhCN = "沙尘暴的主开关。关闭意味着调度器无论模式如何都不会选择沙尘暴。严格干旱本应产生沙尘的情况将不会出现沙尘；偏向性投掷将沙尘的比例重新分配给其他类型；随机重新投掷将沙尘选择为雨水。\n\n标记为实验性，因为沙子沉积会在风暴期间重塑地形。"
zhTW = "沙塵暴的主要開關。關閉意味著調度器在任何模式下都不會選擇沙塵暴。嚴格乾旱的情況下通常會出現沙塵暴，但這種情況下不會選擇沙塵暴；偏向擲骰將沙子的比例重新分配給其他類型；隨機重擲則將沙子的選擇視為降雨。\n\n標記為實驗性，因為沙子沉積會在暴風期間改變地形。"
ruRU = "Главный переключатель песчаных бурь. Включено означает, что планировщик никогда не выбирает песчаную бурю вне зависимости от режима. Строгие засухи, которые обычно вызывают песок, не вызывают ничего; Предвзятые броски перераспределяют долю песка на другие типы; Случайные переигровки заменяют выбор песка дождем.\n\nОбозначено как экспериментальное, потому что осадки песка изменяют рельеф местности во время бурь."
jaJP = "砂嵐のマスタートグル。オフにすると、スケジューラはどのモードでも砂嵐を選択しなくなります。通常砂が発生する厳格な干ばつでは何も発生しません。偏った抽選では砂のシェアを他のタイプに再配分します。ランダムな再抽選では砂を雨として再選択します。\n\n砂の堆積が嵐を通じて地形を変形させるため、実験的とされています。"
frFR = "Commutateur principal pour les tempêtes de sable. Désactivé signifie que le planificateur ne sélectionne jamais de tempête de sable, quel que soit le mode. Les sécheresses strictes qui entraîneraient normalement des tempêtes de sable n'en produiront pas ; les tirages biaisés redistribuent la partie sable aux autres types ; les relances aléatoires choisissent le sable comme pluie.\n\nMarqué expérimental car le dépôt de sable façonne le terrain au cours des tempêtes."
deDE = "Master-Schalter für Sandstürme. Aus bedeutet, dass der Zeitplaner niemals einen Sandsturm auswählt, unabhängig vom Modus. Strenge Dürreperioden, die normalerweise Sand bringen würden, bringen stattdessen nichts; Bias-Rollings verteilen den Sandanteil auf die anderen Arten; Zufällige Neurolle bringt Sand anstelle von Regen.\n\nAls experimentell gekennzeichnet, da die Sandablagerung das Terrain über die Stürme hinweg umformt."
plPL = "Właściwość główna dla burz piaskowych. Wyłączone oznacza, że harmonogram nigdy nie wybierze burzy piaskowej, niezależnie od trybu. Surowe susze, które normalnie generowałyby piasek, nie wygenerują nic; Stronnicze rzuty redistribuują udział piasku do innych typów; Losowe ponowne rzuty wybierają piasek jako deszcz.\n\nOznaczone jako eksperymentalne, ponieważ osadzanie piasku przekształca teren podczas burz."
ptBR = "Controle mestre para tempestades de areia. Desligado significa que o programador nunca escolhe uma tempestade de areia, independentemente do modo. Secas rigorosas que normalmente gerariam areia não gerarão nada; rolamentos tendenciosos redistribuem a quantidade de areia para os outros tipos; re-rolagens aleatórias escolhem areia como chuva.\n\nMarcado como experimental porque a deposição de areia remodela o terreno durante as tempestades."
koKR = "모래폭풍에 대한 마스터 토글입니다. Off는 모드와 관계없이 스케줄러가 모래폭풍을 선택하지 않음을 의미합니다. 일반적으로 모래가 발생하는 엄격한 가뭄에서는 아무것도 발생하지 않고; 비편향 롤은 모래 비율을 다른 유형으로 재분배합니다; 랜덤 재롤은 모래를 비가 내리는 것으로 선택합니다.\n\n모래 퇴적이 폭풍을 가로질러 지형을 재형성하기 때문에 실험적으로 표시됩니다."
csCZ = "Hlavní přepínač pro písečné bouře. Vypnuto znamená, že plánovač nikdy nevybere písečnou bouři bez ohledu na režim. Přísné sucha, která by normálně přinesla písek, nepřinesou nic; Zkreslené hodnota přerozdělí podíl písku mezi ostatní typy; Náhodné přehazování písku vybere jako déšť.\n\nOznačeno jako experimentální, protože usazování písku mění terén během bouří."
viVN = "Công tắc chính cho bão cát. Tắt có nghĩa là trình lập lịch không bao giờ chọn bão cát bất kể chế độ nào. Hạn hán nghiêm ngặt mà bình thường sẽ rơi cát sẽ không rơi thứ gì; Lăn có thiên kiến phân phối lại phần cát cho các loại khác; Lăn lại ngẫu nhiên sẽ chọn cát như mưa.\n\nĐược đánh dấu là thử nghiệm vì sự lắng đọng cát định hình lại địa hình qua các cơn bão."
trTR = "Kum fırtınaları için ana anahtar. Kapalı durumda, programlayıcı hiçbir modda kum fırtınası seçmez. Normalde kum yığacak olan sıkı kuraklıklar, bunun yerine hiçbir şey yığmaz; Eğilimli atışlar, kum payını diğer türlere dağıtır; Rastgele yeniden atışlar kum seçimlerini yağmur olarak yapar.\n\nKum birikiminin fırtına boyunca arazinin şeklini değiştirmesi nedeniyle deneysel olarak işaretlenmiştir."

