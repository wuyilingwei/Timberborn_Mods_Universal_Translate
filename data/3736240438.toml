status = "normal"

["academicunwinds.Rainborn.Settings.SandChance.Tooltip"]
new = "In Random mode, this is the percentage chance the scheduler rolls a sandstorm instead of a rain event. 0 means a pure rain colony; 100 means an arid wasteland with no rain ever. Default 25.\n\nIgnored in Strict and Biased modes (those follow the vanilla cycle bias instead)."
status = "normal"

