deDE = "Wie viele volle Tage zu Beginn des Spiels gewartet werden soll, bevor ein Regenereignis eintreten kann.\n\n0 erlaubt den ersten Regen am Tag 1 (Standard)."
plPL = "Ile pełnych dni należy czekać na początku gry, zanim jakiekolwiek zdarzenie deszczu może się wydarzyć.\n\n0 pozwala na pierwszy deszcz w dniu 1 (domyślnie)."
