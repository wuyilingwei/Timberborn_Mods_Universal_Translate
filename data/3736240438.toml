status = "normal"

["academicunwinds.Rainborn.Settings.WeatherMode.Biased"]
new = "Biased (default)"
status = "normal"

["academicunwinds.Rainborn.Settings.WeatherMode.Random"]
new = "Random"
status = "normal"

["academicunwinds.Rainborn.Settings.SandStormEnabled"]
new = "Enable sandstorms (experimental)"
status = "normal"

["academicunwinds.Rainborn.Settings.SandStormEnabled.Tooltip"]
new = "Master toggle for sandstorms. Off means the scheduler never picks a sandstorm regardless of mode. Strict droughts that would normally roll sand will roll nothing instead; Biased rolls redistribute the sand share to the other types; Random re-rolls sand picks as rain.\n\nMarked experimental because sand deposition reshapes terrain across storms."
status = "normal"

