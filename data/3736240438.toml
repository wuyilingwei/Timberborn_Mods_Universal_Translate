["academicunwinds.Rainborn.Settings.WeatherMode"]
new = "Weather mode"
status = "normal"

["academicunwinds.Rainborn.Settings.WeatherMode.Tooltip"]
new = "Off: no weather rolls at all. The mod stays loaded but the scheduler is silent.\n\nStrict cycle lock: the vanilla cycle decides. Drought always rolls a sandstorm, badtide always rolls acid rain, temperate always rolls clean rain. However, if the cycle's expected weather is disabled (e.g. drought with sandstorms turned off), nothing rolls that event.\n\nBiased (default): 90% chance the event matches the cycle, 5% each chance for the other two weather types. Lets the cycle do its thing most of the time while still giving you the occasional surprise. Disabled weather types redistribute their share to the others.\n\nRandom: the cycle is ignored entirely. Sandstorm chance and acid escalation sliders drive every roll."
status = "normal"

["academicunwinds.Rainborn.Settings.WeatherMode.Off"]
new = "Off"
status = "normal"

["academicunwinds.Rainborn.Settings.WeatherMode.Strict"]
