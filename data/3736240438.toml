["academicunwinds.Rainborn.Settings.AcidRainContamination.Tooltip"]
raw = "Within an acid rain event this is the percentage of touched tiles that drop contaminated water. The rest drop clean water.\n\n100% = full poison; 50% = half the tiles are clean.\n\nHas no effect when Enable acid rain is off or when the event rolled as a clean rain."
new = "Upper cap on each acid storm's rolled contamination ratio. The scheduler rolls a fresh value per event somewhere in [25%, this slider], so two consecutive acid storms can feel very different from each other.\n\n100% gives the widest variety. Lower the slider to hard-cap how harsh any single storm can get.\n\nHas no effect when Enable acid rain is off, or when the current event rolled as a clean rain."
status = "normal"
enUS = "During an acid rain event, this is the percentage of affected tiles that produce contaminated water. The rest produce clean water.\n\n100% = full poison; 50% = half of the tiles are clean.\n\nHas no effect when 'Enable acid rain' is off or when the event rolls as clean rain."
zhCN = "在酸雨事件中，这是接触到的瓷砖掉落污染水的百分比。其余瓷砖掉落清水。\n\n100% = 完全污染；50% = 一半的瓷砖是干净的。\n\n当酸雨启用被关闭或事件被判定为清水时没有影响。"
zhTW = "「在酸雨事件中，這是接觸的瓷磚中掉落污染水的百分比。其餘掉落乾淨水。\n\n100% = 完全中毒；50% = 一半的瓷磚為乾淨。\n\n當酸雨啟用為關閉，或事件為乾淨雨時，無任何效果。」"
ruRU = "Во время события кислотного дождя это процент затронутых плиток, которые сбрасывают загрязненную воду. Остальные сбрасывают чистую воду.\n\n100% = полное отравление; 50% = половина плиток чистые.\n\nНе оказывает эффекта, когда включение кислотного дождя выключено или когда событие произошло как чистый дождь."
jaJP = "酸性雨イベント中に、接触したタイルのうち汚染水が落ちる割合です。残りはきれいな水が落ちます。\n\n100% = 完全に毒; 50% = 半分のタイルがきれいです。\n\n酸性雨が無効な場合や、イベントがきれいな雨として発生した場合は効果がありません。"
frFR = "Lors d'un événement de pluie acide, c'est le pourcentage de carreaux touchés qui lâchent de l'eau contaminée. Le reste lâche de l'eau propre.\n\n100 % = poison complet ; 50 % = la moitié des carreaux sont propres.\n\nN'a aucun effet lorsque l'option Activer la pluie acide est désactivée ou lorsque l'événement est apparu comme une pluie propre."
deDE = "Bei einem Säureregen-Ereignis ist dies der Prozentsatz der berührten Fliesen, die kontaminiertes Wasser abgeben. Der Rest gibt sauberes Wasser ab.\n\n100 % = volle Vergiftung; 50 % = die Hälfte der Fliesen ist sauber.\n\nHat keine Auswirkungen, wenn Säureregen aktiviert ist oder wenn das Ereignis als sauberes Regenwetter auftritt."
plPL = "W trakcie zdarzenia deszczu kwasowego jest to procent zainfekowanych płytek, które wydają zanieczyszczoną wodę. Reszta wydaje czystą wodę.\n\n100% = pełna trucizna; 50% = połowa płytek jest czysta.\n\nNie ma żadnego wpływu, gdy opcja Włącz deszcz kwasowy jest wyłączona lub gdy zdarzenie zostało wylosowane jako czysty deszcz."
ptBR = "Durante um evento de chuva ácida, esta é a porcentagem de azulejos afetados que liberam água contaminada. O restante libera água limpa.\n\n100% = veneno total; 50% = metade dos azulejos está limpa.\n\nNão tem efeito quando a opção Ativar chuva ácida está desligada ou quando o evento ocorre como uma chuva limpa."
koKR = "산성 비가 내리는 동안 오염된 물이 떨어지는 타일의 비율입니다. 나머지는 깨끗한 물이 떨어집니다.\n\n100% = 전체 타일이 오염됨; 50% = 절반의 타일이 깨끗함.\n\n산성 비가 활성화되지 않았거나 clean rain으로 이벤트가 발생했을 때는 효과가 없습니다."
csCZ = "Během události kyselého deště je to procento dotčených dlaždic, které vylévají kontaminovanou vodu. Zbytek vylévá čistou vodu.\n\n100 % = plná otrava; 50 % = polovina dlaždic je čistá.\n\nNemá žádný účinek, pokud je zapnuto zakázání kyselého deště nebo když událost proběhla jako čistý déšť."
viVN = "Trong một sự kiện mưa axit, đây là tỷ lệ phần trăm các ô bị chạm vào mà rơi nước bị nhiễm bẩn. Phần còn lại sẽ rơi nước sạch.\n\n100% = hoàn toàn độc; 50% = một nửa các ô là sạch.\n\nKhông có hiệu lực khi Bật mưa axit tắt hoặc khi sự kiện diễn ra như một cơn mưa sạch."

