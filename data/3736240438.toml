["academicunwinds.Rainborn.Settings.AcidRainMinCycle.Tooltip"]
raw = "Earliest cycle on which acid rain can start. Events before this cycle are always clean even if the escalation counter has filled up.\n\nDefault 10 gives the colony a calm grace period before the weather can turn on you."
new = "Earliest cycle on which acid rain can roll. Events before this cycle are always clean, even if the escalation counter has already filled up under the surface.\n\nDefault 10 gives the colony a calm grace period before the weather can turn on you."
status = "normal"
enUS = "Earliest cycle on which acid rain can start. Events before this cycle are always clean even if the escalation counter has filled up.\n\nDefault 10 gives the colony a calm grace period before the weather can turn on you."
zhCN = "酸雨开始的最早周期。在此周期之前的事件总是干净的，即使升级计数器已满。\n\n默认值为10，为殖民地提供了一个平静的缓冲期，然后天气才会反转。"
zhTW = "酸雨可以開始的最早週期。在此週期之前的事件始終是清潔的，即使升級計數器已經填滿。\n\n默認的10為殖民地提供了在天氣惡化之前的平靜緩沖期。"
ruRU = "Самый ранний цикл, в котором может начаться кислотный дождь. События до этого цикла всегда чистые, даже если счетчик эскалации заполнен.\n\nПо умолчанию 10 дает колонии спокойный период, прежде чем погода может обернуться против вас."
jaJP = "酸性雨が始まる最も早いサイクル。このサイクル前のイベントは、エスカレーションカウンターが満杯になっていても常にクリーンです。\n\nデフォルトの10は、天候が悪化する前にコロニーに穏やかな猶予期間を与えます。"
frFR = "CYCLE MINIMUM D'ACIDE - Cycle le plus précoce sur lequel la pluie acide peut commencer. Les événements avant ce cycle sont toujours propres même si le compteur d'escalade est rempli.\n\nLe défaut de 10 donne à la colonie une période de grâce calme avant que le temps ne devienne défavorable."
deDE = "Frühester Zyklus, in dem der saure Regen beginnen kann. Ereignisse vor diesem Zyklus sind immer sauber, selbst wenn der Eskalationszähler gefüllt ist.\n\nStandardwert 10 gibt der Kolonie eine ruhige Gnadenfrist, bevor sich das Wetter gegen dich wenden kann."
plPL = "Najwcześniejszy cykl, w którym może rozpocząć się kwaśny deszcz. Wydarzenia przed tym cyklem są zawsze czyste, nawet jeśli licznik eskalacji jest pełny.\n\nDomyślnie 10 daje kolonii spokojny okres przejściowy, zanim pogoda zacznie działać na twoją niekorzyść."
ptBR = "Ciclo mais cedo em que a chuva ácida pode começar. Eventos antes deste ciclo são sempre limpos, mesmo que o contador de escalada tenha se preenchido.\n\nO padrão 10 oferece à colônia um período de graça calmo antes que o clima possa se voltar contra você."
koKR = "산성 비 시작 가능한 가장 이른 사이클입니다. 이 사이클 이전의 이벤트는 에스컬레이션 카운터가 가득 차더라도 항상 깨끗합니다.\n\n기본값 10은 날씨가 악화되기 전에 식민지에 평온한 유예 기간을 제공합니다."
csCZ = "Nejranější cyklus, ve kterém může začít kyselý déšť. Události před tímto cyklem jsou vždy bez znečištění, i když se čítač eskalace naplnil.\n\nVýchozí hodnota 10 poskytuje kolonii klidné přechodné období, než se počasí obrátí proti vám."
viVN = "Chu kỳ sớm nhất mà mưa axit có thể bắt đầu. Các sự kiện trước chu kỳ này luôn sạch sẽ ngay cả khi chỉ số leo thang đã đầy.\n\nMặc định 10 mang đến cho thuộc địa một khoảng thời gian bình yên trước khi thời tiết có thể tồi tệ."

