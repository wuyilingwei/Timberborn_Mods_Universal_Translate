["academicunwinds.Rainborn.Settings.Volume.Tooltip"]
raw = "Volume for the rain loop and thunder one-shot.\n\nStacks with the storm's intensity-based scaling (lighter storms are quieter on their own) and with the game's Environment audio slider. 0 mutes the mod's audio entirely."
new = "Volume for the rain loop, the thunder one-shot, and the sandstorm loop.\n\nStacks on top of the storm's intensity-based scaling (lighter storms are quieter on their own) and the game's Environment audio slider. 0 mutes the mod's audio entirely."
status = "normal"
enUS = "Volume for the rain loop and thunder one-shot.\n\nStacks with the storm's intensity-based scaling (lighter storms are quieter on their own) and with the game's Environment audio slider. 0 mutes the mod's audio entirely."
zhCN = "“雨循环和雷声单次的音量。\n\n与气候强度相关的音量缩放叠加（较轻的暴风雨本身更安静）以及游戏的环境音频滑块。0 完全静音该模组的音频。”"
zhTW = "雨庫和雷聲一次性音量。\n\n與風暴強度基於的縮放疊加（較輕的風暴本身更安靜）以及遊戲的環境音頻滑桿疊加。0會完全靜音模組的音頻。"
ruRU = "Громкость для дождевой петли и однократного грома.\n\nУчитывает масштабирование на основе интенсивности шторма (меньшие шторма тише сами по себе) и слайдер звука окружающей среды в игре. 0 полностью отключает звук мода."
jaJP = "雨音ループおよび雷音ワンショットの音量。\n\n嵐の強度に基づくスケーリング（軽い嵐は、自体で音が静か）およびゲームの環境オーディオスライダーとスタックします。0はモッドの音声を完全にミュートします。"
frFR = "Volume pour la boucle de pluie et le coup de tonnerre.\n\nS'accumule avec l'échelle basée sur l'intensité de la tempête (les tempêtes plus légères sont plus silencieuses par elles-mêmes) et avec le curseur audio de l'environnement du jeu. 0 coupe complètement le son du mod."
deDE = "Lautstärke für die Regen-Schleife und das Donnerschlagen.\n\nKombiniert sich mit der sturmintensitätsbasierten Skalierung (leichte Stürme sind von sich aus leiser) und mit dem Umgebungslautstärkeregler des Spiels. 0 schaltet den Audio des Mods vollständig stumm."
plPL = "Poziom głośności dla pętli deszczu i jednorazowego efektu grzmotu.\n\nŁączy się z skalowaniem intensywności burzy (łagodniejsze burze są same w sobie cichsze) oraz z suwakiem dźwięku otoczenia w grze. 0 całkowicie wycisza dźwięk moda."
ptBR = "Volume para o loop da chuva e para o som de trovão.\n\nAcumula com a escalabilidade baseada na intensidade da tempestade (tempestades mais leves são mais silenciosas por conta própria) e com o controle deslizante de áudio do ambiente do jogo. 0silencia completamente o áudio do mod."
koKR = "비 소리 및 천둥 일회성의 볼륨입니다. \n\n폭풍의 강도 기반 스케일링(더 가벼운 폭풍은 자체적으로 더 조용함) 및 게임의 환경 오디오 슬라이더와 함께 조정됩니다. 0은 모드의 오디오를 완전히 음소거합니다."
csCZ = "Hlasitost dešťového smyčky a hromu.\n\nHlavice se s intenzitou bouře (slabší bouře jsou samy o sobě tišší) a s posuvníkem zvuku prostředí ve hře. 0 zcela ztlumí zvuk modu."
viVN = "Âm lượng cho vòng lặp mưa và tiếng sét một lần.\n\nTích lũy với độ mạnh của cơn bão (cơn bão nhẹ thì êm hơn) và với thanh trượt âm thanh Môi trường của trò chơi. 0 sẽ tắt tiếng hoàn toàn của mod."

