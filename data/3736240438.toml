["academicunwinds.Rainborn.Settings.StartCycle.Tooltip"]
raw = "Weather stays disabled until your colony reaches this cycle. 1 = no gate (the default). Useful when you want a calm early game before the weather can turn on you."
status = "normal"
enUS = "Weather stays disabled until your colony reaches this cycle. 1 = no gate (the default). Useful when you want a calm early game before the weather can turn on you."
zhCN = "在您的殖民地达到该周期之前，天气将保持禁用。1 = 无门（默认）。在天气可能对您造成影响之前，这对平静的早期游戏很有帮助。"
zhTW = "天氣功能在您的殖民地達到此週期之前將保持禁用。1 = 無閘門（默認）。這對於在天氣變壞之前想要一個平靜的早期遊戲非常有幫助。"
ruRU = "Погода отключена до тех пор, пока ваша колония не достигнет этого цикла. 1 = без ворот (по умолчанию). Полезно, когда вы хотите спокойное раннее время игры, прежде чем погода начнёт влиять на вас."
jaJP = "天候は、コロニーがこのサイクルに到達するまで無効のままです。1 = ゲートなし（デフォルト）。天候があなたに牙を剥く前に、穏やかな初期ゲームを楽しむのに役立ちます。"
frFR = "Le temps reste désactivé jusqu'à ce que votre colonie atteigne ce cycle. 1 = pas de porte (par défaut). Utile lorsque vous souhaitez un début de jeu calme avant que la météo ne se retourne contre vous."
deDE = "Wetter bleibt deaktiviert, bis deine Kolonie diesen Zyklus erreicht. 1 = kein Tor (das Standard). Nützlich, wenn du ein ruhiges frühes Spiel haben möchtest, bevor das Wetter sich gegen dich wenden kann."
plPL = "Pogoda jest wyłączona, dopóki twoja kolonia nie osiągnie tego cyklu. 1 = brak bramy (domyślnie). Przydatne, gdy chcesz mieć spokojny początek gry, zanim pogoda zacznie być nieprzewidywalna."
ptBR = "O clima permanece desativado até que sua colônia atinja este ciclo. 1 = sem portão (o padrão). Útil quando você quer um início de jogo calmo antes que o clima possa se voltar contra você."
koKR = "날씨는 귀하의 식민지가 이 사이클에 도달할 때까지 비활성화됩니다. 1 = 게이트 없음(기본값). 날씨가 당신을 압도하기 전에 차분한 초기 게임을 원할 때 유용합니다."
csCZ = "Počasí zůstává zakázáno, dokud vaše kolonie nedosáhne tohoto cyklu. 1 = žádná brána (výchozí). Užitečné, když chcete klidný začátek hry, než se počasí obrátí proti vám."
viVN = "Thời tiết sẽ bị tắt cho đến khi thuộc địa của bạn đạt đến chu kỳ này. 1 = không có cổng (mặc định). Hữu ích khi bạn muốn có một giai đoạn đầu game bình yên trước khi thời tiết có thể chống lại bạn."
trTR = "Hava durumu, koloniniz bu döngüye ulaşana kadar devre dışı kalır. 1 = kapı yok (varsayılan). Havanın size karşı dönmeden önce sakin bir erken oyun deneyimi istiyorsanız faydalıdır."

