["academicunwinds.Rainborn.Settings.RainCoverage.Tooltip"]
raw = "Percentage of map tiles sampled each tick. Higher means more total water on the map and more per-tick compute. Combined with intensity, this is what controls total volume per storm."
status = "normal"
enUS = "Percentage of map tiles sampled each tick. Higher means more total water on the map and more per-tick compute. Combined with intensity, this is what controls total volume per storm."
zhCN = "“每个回合采样的地图瓷砖百分比。较高的百分比意味着地图上的水总量更大且每回合的计算量更多。与强度结合，这控制每场暴雨的总体积。”"
zhTW = "每個遊戲回合中取樣的地圖磚百分比。比例越高，地圖上的總水量就越多，每回合的計算也越多。與強度結合，這控制每場風暴的總水量。"
ruRU = "Процент клеток карты, которые опрашиваются за каждый тик. Чем выше значение, тем больше воды на карте и больше вычислений за тик. В сочетании с интенсивностью это контролирует общий объем за бурю."
jaJP = "各ティックごとにサンプリングされるマップタイルの割合。数値が高いほど、マップ上の水の合計量が増え、各ティックごとの計算量も増えます。強度と組み合わせることで、嵐ごとの総水量を制御します。"
frFR = "Pourcentage de carreaux de la carte échantillonnés à chaque tick. Plus ce pourcentage est élevé, plus il y a d'eau totale sur la carte et un calcul plus important par tick. Associé à l'intensité, cela contrôle le volume total par tempête."
deDE = "Prozentsatz der Kacheln auf der Karte, die bei jedem Tick beprobt werden. Höher bedeutet insgesamt mehr Wasser auf der Karte und mehr Berechnungen pro Tick. Zusammen mit der Intensität steuert dies das Gesamtvolumen pro Sturm."
plPL = "Procent kafelków mapy badanych w każdym ticku. Wyższa wartość oznacza więcej wody na mapie i większe obliczenia na tick. W połączeniu z intensywnością, to kontroluje całkowitą objętość na burzę."
ptBR = "Porcentagem de tiles do mapa amostrados a cada tick. Um valor mais alto significa mais água total no mapa e mais processamento por tick. Juntamente com a intensidade, isso controla o volume total por tempestade."
koKR = "매 틱마다 샘플링되는 맵 타일의 비율입니다. 수치가 높을수록 맵에 총 물의 양이 많아지고 매 틱마다 계산이 더 많이 필요합니다. 강도와 결합하여 폭풍당 총 양을 조절합니다."
csCZ = "Procento mapových dlaždic, které jsou vzorkovány v každém taktu. Vyšší znamená více celkové vody na mapě a více výpočtů na takt. Společně s intenzitou to řídí celkový objem na bouři."
viVN = "Tỷ lệ phần trăm các ô bản đồ được lấy mẫu mỗi lần tính toán. Cao hơn có nghĩa là tổng lượng nước trên bản đồ nhiều hơn và tính toán mỗi lần cao hơn. Kết hợp với cường độ, đây là yếu tố kiểm soát tổng thể tích mỗi cơn bão."
trTR = "Her bir tick'te örneklenen harita karolarının yüzdesi. Daha yüksek değer, haritada daha fazla toplam su ve her tick'te daha fazla hesaplama anlamına gelir. Yoğunluk ile birleştirildiğinde, bu toplam hacmi fırtına başına kontrol eder."

