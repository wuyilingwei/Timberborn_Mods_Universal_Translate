zhCN = "游戏内小时中最短的降雨事件。\n\n每场风暴的持续时间在此时长和最长时长之间随机产生。"
zhTW = "遊戲內最短的降雨事件時間（小時）。\n\n每場暴風雨會在這個時間和最大時間之間隨機生成持續時間。"
ruRU = "Самая короткая возможная продолжительность дождя в игровых часах.\n\nКаждый шторм имеет новую продолжительность где-то между этим значением и максимальным."
