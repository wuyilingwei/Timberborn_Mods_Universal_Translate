["academicunwinds.Rainborn.Settings.SandChance.Tooltip"]
raw = "In Random mode, this is the percentage chance the scheduler rolls a sandstorm instead of a rain event. 0 means a pure rain colony; 100 means an arid wasteland with no rain ever. Default 25.\n\nIgnored in Strict and Biased modes (those follow the vanilla cycle bias instead)."
status = "normal"
enUS = "In Random mode, this is the percentage chance the scheduler rolls a sandstorm instead of a rain event. 0 means a pure rain colony; 100 means an arid wasteland with no rain ever. Default 25.\n\nIgnored in Strict and Biased modes (those follow the vanilla cycle bias instead)."
zhCN = "在随机模式下，这是调度程序在降雨事件而不是沙尘暴中滚动的百分比机会。0意味着纯雨的殖民地；100意味着永无降雨的干旱荒原。默认值为25。\n\n在严格和偏见模式下被忽略（那些遵循原版周期偏见）。"
zhTW = "在隨機模式下，這是排程器選擇沙暴而非降雨事件的百分比機率。0表示純雨的殖民地；100表示從不下雨的荒漠地帶。默認值25。\n\n在嚴格和偏見模式下忽略此設定（這些模式遵循原版的循環偏差）。"
ruRU = "В режиме Рандом это процентная вероятность, с которой планировщик выбирает песчаную бурю вместо дождевого события. 0 означает чисто дождевую колонию; 100 означает засушливую пустошь без дождя. По умолчанию 25.\n\nИгнорируется в строгом и предвзятом режимах (в этих режимах следует предвзятости ванильного цикла)."
jaJP = "ランダムモードでは、これはスケジューラーが雨のイベントの代わりに砂嵐を発生させる確率のパーセンテージです。0は純粋な雨のコロニーを意味し、100は一切の雨がない乾燥した荒れ地を意味します。デフォルトは25です。\n\nストリクトおよびバイアスモードでは無視されます（これらはバニラサイクルのバイアスに従います）。"
frFR = "En mode aléatoire, il s'agit du pourcentage de chances que le planificateur déclenche une tempête de sable au lieu d'un événement de pluie. 0 signifie une colonie de pluie pure ; 100 signifie un désert aride sans pluie jamais. Par défaut 25.\n\nIgnoré en modes Strict et Biaisé (ceux-ci suivent le biais du cycle vanille à la place)."
deDE = "Im Zufallsmodus ist dies die prozentuale Chance, dass der Planer einen Sandsturm anstelle eines Regenereignisses auswürfelt. 0 bedeutet eine reine Regenkolonie; 100 bedeutet eine trockene Wüste ohne Regen. Standard 25.\n\nWird in strengen und voreingenommenen Modi ignoriert (diese folgen dem Vanilla-Zyklus-Bias)."
plPL = "W trybie losowym jest to procentowa szansa, że harmonogram wymusi burzę piaskową zamiast zdarzenia deszczowego. 0 oznacza czystą kolonię deszczową; 100 oznacza jałową pustynię bez deszczu. Wartość domyślna 25.\n\nIgnorowane w trybach Surowym i Stronniczym (te podążają za pierwotną tendencją cyklu)."
ptBR = "No modo Aleatório, esta é a porcentagem de chance que o programador rola uma tempestade de areia em vez de um evento de chuva. 0 significa uma colônia totalmente chuvosa; 100 significa um deserto árido sem chuva alguma. Padrão 25.\n\nIgnorado nos modos Estrito e Tendencioso (estes seguem o viés do ciclo original)."
koKR = "무작위 모드에서는 일정 관리자가 비가 오는 사건 대신 모래 폭풍을 발생시킬 확률의 백분율입니다. 0은 순수한 비 식민지를 의미하며, 100은 절대 비가 내리지 않는 건조한 황무지를 의미합니다. 기본값 25.\n\n엄격 및 편향 모드에서는 무시됩니다(이 모드는 기본 사이클 편향을 따릅니다)."
csCZ = "V režimu náhodného hraní je toto procentuální šance, že plánovač vyvolá písečnou bouři namísto dešťové události. 0 znamená čistou dešťovou kolonii; 100 znamená suchou pustinu bez deště. Výchozí hodnota 25.\n\nIgnorováno v přísném a zaujatém režimu (tyto režimy následují zaujatost vanilkového cyklu místo toho)."
viVN = "Ở chế độ Ngẫu nhiên, đây là tỷ lệ phần trăm mà bộ lập lịch chọn một cơn bão cát thay vì một sự kiện mưa. 0 có nghĩa là một thuộc địa mưa thuần túy; 100 có nghĩa là một vùng hoang mạc khô cằn không bao giờ có mưa. Mặc định 25.\n\nBị bỏ qua trong các chế độ Nghiêm ngặt và Thiên lệch (những chế độ này tuân theo sự thiên lệch của chu trình gốc)."
trTR = "Rastgele modda, bu, zamanlayıcının bir yağmur olayı yerine kum fırtınası oluşturma yüzdesidir. 0, saf bir yağmur kolonisini; 100, asla yağmur olmayan kurak bir çölü ifade eder. Varsayılan 25.\n\nSıkı ve Taraflı modlarda göz ardı edilir (bu modlar, vanilya döngü yanlılığını takip eder)."

