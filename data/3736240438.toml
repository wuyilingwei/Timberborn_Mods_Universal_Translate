["academicunwinds.Rainborn.Settings.FloodTolerance.Tooltip"]
raw = "How much rain water a building can be sitting in before it's flagged as flooded. Only applied during rain events.\n\n0 = vanilla behavior (any water above base triggers flood). Higher values let buildings ignore deeper puddles.\n\nOutside of rain the tolerance is always 0, so river overflows and badtide floods are detected normally."
new = "How much standing water a building can be sitting in during rain before it gets flagged as flooded. Only applied during rain events.\n\n0 is the vanilla behaviour (any water above the base triggers a flood alert). Higher values let buildings ignore deeper puddles, so a thin film of drizzle does not trip the flood notification.\n\nOutside of rain the tolerance ramps down to 0 over a couple of in-game hours, so river overflows and badtide floods are still detected normally."
status = "normal"
enUS = "How much rainwater a building can sit in before it's flagged as flooded. Only applies during rain events.\n\n0 = standard behavior (any water above the base triggers flooding). Higher values allow buildings to ignore deeper puddles.\n\nOutside of rain, the tolerance is always 0, so river overflows and bad tide floods are detected normally."
zhCN = "“建筑物可以浸泡在多少雨水中才会被标记为洪水。仅在下雨事件中适用。\n\n0 = 原版行为（任何超过基础的水都会触发洪水）。更高的值让建筑物可以忽略较深的积水。\n\n在非雨天，容忍度始终为0，因此河流溢出和潮汐洪水会正常检测。”"
zhTW = "建築物可以浸泡在多少雨水中才會被標記為洪水。在雨天事件期間才會應用此設定。\n\n0 = 原始行為（任何水面高於基準水位都會觸發洪水）。較高的數值可以讓建築無視更深的水坑。\n\n在非雨天時，容忍度始終為0，因此河流溢出和潮汐洪水會正常被檢測。"
ruRU = "Сколько дождевой воды может находиться в здании, прежде чем оно будет помечено как затопленное. Применяется только во время дождя.\n\n0 = стандартное поведение (любая вода выше базового уровня вызывает затопление). Более высокие значения позволяют зданиям игнорировать более глубокие лужи.\n\nВне дождя толерантность всегда равна 0, поэтому переполнение реки и наводнения из-за прилива обнаруживаются нормально."
jaJP = "建物が浸水と見なされる前にどれだけの雨水をためることができるか。雨のイベント中のみ適用されます。\n\n0 = バニラの動作（基準を超える水量で浸水が発生します）。高い値では、建物がより深い水たまりを無視できます。\n\n雨以外では、耐水ロジックは常に0なので、河川の氾濫や悪潮の浸水は通常通り検出されます。"
frFR = "Quantité d'eau de pluie qu'un bâtiment peut contenir avant d'être signalé comme inondé. Appliqué uniquement pendant les événements pluvieux.\n\n0 = comportement par défaut (toute eau au-dessus de la surface de base déclenche une inondation). Des valeurs plus élevées permettent aux bâtiments d'ignorer les flaques plus profondes.\n\nEn dehors de la pluie, la tolérance est toujours de 0, donc les débordements de rivière et les inondations dues à la marée sont détectés normalement."
deDE = "Wie viel Regenwasser ein Gebäude haben kann, bevor es als überflutet gekennzeichnet wird. Nur während Regenereignissen anwendbar.\n\n0 = Standardverhalten (jedes Wasser über dem Grundwert löst eine Überflutung aus). Höhere Werte ermöglichen es Gebäuden, tiefere Pfützen zu ignorieren.\n\nAußerhalb von Regen beträgt die Toleranz immer 0, sodass Flussüberläufe und Hochwasserfluten normal erkannt werden."
plPL = "Ile wody deszczowej może znajdować się w budynku, zanim zostanie oznaczony jako zalany. Dotyczy tylko zdarzeń deszczowych.\n\n0 = zachowanie domyślne (jakakolwiek woda powyżej podstawy wyzwala zalanie). Wyższe wartości pozwalają budynkom ignorować głębsze kałuże.\n\nPoza deszczem tolerancja wynosi zawsze 0, więc przelewy rzek i powodzie spowodowane przypływem są wykrywane w sposób normalny."
ptBR = "Qual a quantidade de água da chuva que um edifício pode conter antes de ser marcado como inundado. Apenas aplicado durante eventos de chuva.\n\n0 = comportamento padrão (qualquer água acima do nível base aciona a inundação). Valores mais altos permitem que os edifícios ignorem poças mais profundas.\n\nFora da chuva, a tolerância é sempre 0, então transbordamentos de rios e inundações de maré alta são detectados normalmente."
koKR = "건물이 침수로 표시되기 전에 얼마나 많은 비가 내려온 물에 잠길 수 있는지를 나타냅니다. 비가 오는 동안에만 적용됩니다.\n\n0 = 기본 동작(기본 수위 위의 물은 침수를 유발합니다). 더 높은 값은 건물이 더 깊은 물웅덩이를 무시하도록 허용합니다.\n\n비가 오지 않는 동안에는 내성이 항상 0이므로, 강의 범람이나 나쁜 조수의 침수는 정상적으로 감지됩니다."
csCZ = "Kolik dešťové vody může budova snášet, než bude označena jako zaplavená. Platí pouze během dešťových událostí.\n\n0 = chování jako v základní hře (jakákoli voda nad základní úrovní spouští záplavu). Vyšší hodnoty umožňují budovám ignorovat hlubší louže.\n\nMimo období deště je tolerance vždy 0, takže přeplnění řek a povodně způsobené přílivem jsou detekovány normálně."
viVN = "Cách mà nước mưa có thể tích tụ tại một tòa nhà trước khi nó được đánh dấu là bị ngập. Chỉ áp dụng trong các sự kiện mưa.\n\n0 = hành vi mặc định (mọi nước vượt quá mức cơ bản sẽ kích hoạt ngập). Giá trị cao hơn cho phép các tòa nhà bỏ qua những vũng nước sâu hơn.\n\nNgoài trời, mức độ chịu đựng luôn là 0, vì vậy các tràn bờ sông và ngập do thủy triều xấu được phát hiện một cách bình thường."

["academicunwinds.Rainborn.Settings.SandChance"]
