["academicunwinds.Rainborn.Settings.RainAreaSize.Tooltip"]
raw = "Radius of the heavy rain core as a percentage of the smaller map dimension.\n\nInside this radius rain is at full intensity; outside it tapers smoothly to a light drizzle. Light rain still falls everywhere on the map while it's raining."
new = "Upper cap on the per-storm rolled peak radius, as a percentage of the smaller map dimension. Each storm rolls something in [5%, this value], so some storms are local squalls and some sweep most of the map.\n\nInside the rolled core fraction (25-75% of the live radius) rain is at full intensity; outside it drops sharply to zero at the rim."
status = "normal"
enUS = "Radius of the heavy rain core as a percentage of the smaller map dimension.\n\nWithin this radius, rain is at full intensity; outside it gradually decreases to a light drizzle. Light rain continues to fall across the entire map during rainfall."
zhCN = "重雨核心的半径，单位为地图较小维度的百分比。\n\n在此半径内，雨水强度达到最大；在外部，则平滑地减弱为小雨。在下雨时，地图上的每个地方仍然会有小雨落下。"
zhTW = "重雨核心的半徑，以較小的地圖尺寸百分比表示。\n\n在這個半徑內，降雨強度達到最高；其外則平滑過渡至小雨。當降雨時，地圖上的每個地方仍然會有小雨降落。"
ruRU = "Радиус области сильного дождя в процентах от меньшего измерения карты.\n\nВнутри этого радиуса дождь идет с полной интенсивностью; за его пределами он плавно уменьшается до легкого моросящего дождя. Легкий дождь все равно идет по всей карте, пока идет дождь."
jaJP = "小さいマップのサイズのパーセンテージとしての豪雨の中心の半径。\n\nこの半径内では雨は全力で降り、外では徐々に小雨に変わります。雨が降っている間は、マップ全体で軽い雨が降り続けます。"
frFR = "Rayon du noyau de forte pluie en pourcentage de la dimension la plus petite de la carte.\n\nÀ l'intérieur de ce rayon, la pluie est à pleine intensité ; à l'extérieur, elle diminue progressivement pour devenir une légère bruine. Une légère pluie tombe toujours partout sur la carte pendant qu'il pleut."
deDE = "Radius des Kerns des starken Regens als Prozentsatz der kleineren Kartendimension.\n\nInnerhalb dieses Radius ist der Regen in voller Intensität; außerhalb nimmt er schrittweise zu einem leichten Nieselregen ab. Leichter Regen fällt weiterhin überall auf der Karte, während es regnet."
plPL = "Promień intensywnego opadu deszczu jako procent mniejszego wymiaru mapy.\n\nW obrębie tego promienia deszcz pada z pełną intensywnością; poza nim stopniowo przechodzi w lekką mżawkę. Lekkie opady nadal występują w całej mapie podczas deszczu."
ptBR = "Raio do núcleo de chuva forte como uma porcentagem da menor dimensão do mapa.\n\nDentro desse raio, a chuva está em plena intensidade; fora dele, diminui suavemente para uma leve garoa. A chuva leve ainda cai em todo o mapa enquanto está chovendo."
koKR = "작은 맵 치수의 비율로서 중우량 중심의 반경입니다.\n\n이 반경 내에서는 비가 최대 강도로 내리며, 그 외부에서는 부드럽게 가벼운 이슬비로 줄어듭니다. 비가 내리는 동안 맵 어디에서나 가벼운 비가 지속적으로 내립니다."
csCZ = "Poloměr jádra silného deště jako procento menší rozměru mapy.\n\nUvnitř tohoto poloměru prší s plnou intenzitou; venku se postupně přechází na slabý déšť. Slabý déšť stále padá na celé mapě, zatímco prší."
viVN = "Bán kính của lõi mưa lớn dưới dạng phần trăm của kích thước bản đồ nhỏ hơn.\n\nBên trong bán kính này, mưa có cường độ tối đa; bên ngoài nó giảm dần thành mưa nhỏ. Mưa nhẹ vẫn xảy ra trên toàn bản đồ trong khi trời mưa."

