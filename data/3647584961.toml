["Lapantouflemagic.NuclearReactor3.Description"]
raw = "A high-power nuclear reactor powered by nuclear fuel.\nUses the abyss to tap directly into the aquifer for coolant.\n<color=green>Is built from the inside like a wonder</color>.\n<color=#00FFFF>Clean water is generated as a result</color>\nRequires the <color=green>Abyssal Nuclear Power Plant Water Outflow</color> to allow power to be connected."
status = "normal"
enUS = "A high-power nuclear reactor powered by nuclear fuel. Uses the abyss to tap directly into the aquifer for coolant. <color=green>Is built from the inside like a wonder</color>. <color=#00FFFF>Clean water is generated as a result</color> Requires the <color=green>Abyssal Nuclear Power Plant Water Outflow</color> to allow power to be connected."
zhCN = "“一个由核燃料驱动的高功率核反应堆。\n利用深渊直接接入地下水源作为冷却液。\n<color=green>建造方式如同奇迹般从内部进行</color>。\n<color=#00FFFF>因此会产生净化水</color>\n需要<color=green>深渊核电厂水流出</color>以便连接电力。”"
zhTW = "一個由核燃料驅動的高功率核反應堆。  \n利用深淵直接連接地下水層作為冷卻劑。  \n<color=green>如同奇蹟般從內部建造</color>。  \n<color=#00FFFF>因此產生潔淨的水</color>  \n需要<color=green>深淵核電廠水流出口</color>才能連接電源。"
ruRU = "Ядерный реактор высокой мощности, работающий на ядерном топливе. Использует бездну для прямого доступа к водоносному слою в качестве охладителя. <color=green>Состоит изнутри, как чудо</color>. <color=#00FFFF>В результате генерируется чистая вода</color> Требует <color=green>Выхода воды из Ядерной электростанции Бездна</color> для подключения электроэнергии."
jaJP = "「高出力の原子炉で、核燃料で動いています。\n冷却のために水層に直接アクセスするために深淵を利用します。\n<color=green>驚異のように内部から建設されています</color>。\n<color=#00FFFF>その結果、清水が生成されます</color>\n電力を接続するためには<color=green>深淵原子力発電所の排水</color>が必要です。」"
frFR = "Un réacteur nucléaire à haute puissance alimenté par du combustible nucléaire.\nUtilise l'abîme pour puiser directement dans l'aquifère pour le refroidissement.\n<color=green>Construit de l'intérieur comme une merveille</color>.\n<color=#00FFFF>L'eau propre est générée en conséquence</color>\nNécessite le <color=green>Débit d'eau de la centrale nucléaire abyssale</color> pour permettre la connexion de l'alimentation."
deDE = "Ein Hochleistungs-Nuklearreaktor, betrieben mit Nuklearbrennstoff. Nutzt den Abgrund, um direkt auf den Grundwasserleiter für Kühlmittel zuzugreifen. <color=green>Ist von innen wie ein Wunder gebaut</color>. <color=#00FFFF>Sauberes Wasser wird dadurch erzeugt</color> Benötigt den <color=green>Abyssalen Nuklearkraftwerk Wasserabfluss</color>, um den Strom anzuschließen."
plPL = "Reaktor jądrowy o dużej mocy zasilany paliwem jądrowym. \nWykorzystuje otchłań do bezpośredniego doprowadzenia wody chłodzącej z akwiferu. \n<color=green>Jest budowany od wewnątrz jak cud</color>. \n<color=#00FFFF>Czysta woda jest generowana jako rezultat</color> \nWymaga <color=green>Wylotu Wody Z Elektrowni Jądrowej Otchłani</color>, aby umożliwić podłączenie energii."
ptBR = "Um reator nuclear de alta potência alimentado por combustível nuclear. Usa o abismo para se conectar diretamente ao aquífero para refrigeração. <color=green>É construído de dentro para fora como uma maravilha</color>. <color=#00FFFF>Água limpa é gerada como resultado</color> Requer o <color=green>Despejo de Água da Usina Nuclear Abissal</color> para permitir a conexão de energia."
koKR = "핵 연료로 동작하는 고출력 핵 반응로입니다.\n냉각수를 위해 지하수층에 직접 접근하기 위해 심연을 이용합니다.\n<color=green>경이처럼 내부에서 건설됩니다</color>.\n<color=#00FFFF>깨끗한 물이 생성됩니다</color>\n전력을 연결하기 위해 <color=green>심연 핵 발전소의 물 배출구</color>가 필요합니다."
csCZ = "Vysoce výkonný jaderný reaktor poháněný jaderným palivem.\nVyužívá propast k přímému napojení na akvifer pro chladicí kapalinu.\n<color=green>Je postaven zevnitř jako zázrak</color>.\n<color=#00FFFF>Čistá voda je generována jako výsledek</color>\nVyžaduje <color=green>Odtok vody z Abyssal Nuclear Power Plant</color>, aby bylo možné připojit energii."
viVN = "Một lò phản ứng hạt nhân công suất cao được vận hành bằng nhiên liệu hạt nhân.  \nSử dụng vực sâu để trực tiếp khai thác nước ngầm làm chất làm mát.  \n<color=green>Được xây dựng từ bên trong như một kỳ quan</color>.  \n<color=#00FFFF>Nước sạch được tạo ra như một kết quả</color>  \nCần <color=green>Cửa xả nước Nhà máy điện hạt nhân Abyssal</color> để cho phép kết nối điện."
trTR = "Yüksek güçlü nükleer yakıtla çalışan bir nükleer reaktör.\nSoğutma için doğrudan su tabanına erişmek için derinliklerden yararlanır.\n<color=green>Bir harika gibi içten yapılanmıştır</color>.\n<color=#00FFFF>Sonuç olarak temiz su üretilir</color>\nGüç bağlantısı için <color=green>Abyssal Nükleer Enerji Santrali Su Çıkışı</color> gereklidir."

