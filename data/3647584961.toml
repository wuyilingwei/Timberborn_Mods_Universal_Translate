csCZ = "Velká budova s mnoha knihami na studium. \nJediný způsob, jak získat vědu. \n<color=green>Je postavena zevnitř jako zázrak</color>."
viVN = "Một tòa nhà lớn với nhiều sách để nghiên cứu.  \nCách duy nhất để thu thập khoa học.  \n<color=green>Xây dựng từ bên trong giống như một kỳ quan</color>."
