["Lapantouflemagic.Mediummine.Description"]
raw = "A larger and deeper mine to exploit richer deposits, also gives access to rarer elements.\nComes with access stairs and barriers to prevent silly little kits from falling and getting hurt.\n<color=green>Needs to be placed in a 4-deep hole!\nMine and fences must be on solid ground!\nPlace stairs on dirt spots and complete the access ramp</color>"
status = "normal"
enUS = "A larger and deeper mine to exploit richer deposits, also gives access to rarer elements. Comes with access stairs and barriers to prevent silly little kits from falling and getting hurt. <color=green>Needs to be placed in a 4-deep hole! Mine and fences must be on solid ground! Place stairs on dirt spots and complete the access ramp</color>"
zhCN = "更大更深的矿井，能够开采更丰富的矿藏，同时可获得更稀有的元素。\n配有通往矿井的楼梯和障碍物，以防止小孩跌落受伤。\n<color=green>需要放置在4格深的洞里！\n矿井和围栏必须在坚固的地面上！\n将楼梯放在泥土上，完成通道坡道</color>"
zhTW = "一個更大且更深的礦井，用於開採更豐富的礦藏，同時也能獲取更稀有的元素。\n配備進入樓梯和圍欄，以防止小傢伙們摔下來受傷。\n<color=green>需要放置在 4 格深的洞裡！\n礦井和圍欄必須放在堅固的地面上！\n將樓梯放在土壤上，並完成進入坡道</color>"
ruRU = "Больше и глубже шахта для разработки более богатых залежей, также предоставляет доступ к более редким элементам. \nУстанавливается с лестницей и барьерами, чтобы предотвратить падение и травмы малышей. \n<color=green>Должна быть размещена в яме глубиной 4 блока! \nШахта и заборы должны находиться на твердой земле! \nРазместите лестницу на земельных участках и закончите наклонный подъем</color>"
jaJP = "より豊富な鉱床を利用するための、より大きく深い鉱山。また、より希少な元素へのアクセスも提供します。  \n階段とバリアが付属しており、ちょっとした子供たちが落ちたり怪我をしたりしないようにします。  \n<color=green>4マス深い穴に設置する必要があります！  \n鉱山とフェンスは固い地面の上に置かなければなりません！  \n土の上に階段を設置し、アクセスランプを完成させてください</color>"
frFR = "Une mine plus grande et plus profonde pour exploiter des dépôts plus riches, donnant également accès à des éléments plus rares. \nEst livrée avec des escaliers d'accès et des barrières pour empêcher les petits kits insouciants de tomber et de se blesser. \n<color=green>Doit être placée dans un trou de 4 de profondeur ! \nLa mine et les clôtures doivent être sur un sol solide ! \nPlacez les escaliers sur des zones en terre et complétez la rampe d'accès</color>"
deDE = "Eine größere und tiefere Mine, um reichhaltigere Lagerstätten auszubeuten, bietet auch Zugang zu selteneren Elementen. \nVerfügt über Zugangstreppen und Barrieren, um zu verhindern, dass kleine Kits hinfallen und sich verletzen. \n<color=green>Muss in einem 4 tiefen Loch platziert werden! \nMine und Zäune müssen auf festem Boden stehen! \nTreppen auf Erdböden platzieren und die Zugangsrampe vervollständigen</color>"
plPL = "Większa i głębsza kopalnia do eksploatacji bogatszych złóż, zapewnia również dostęp do rzadszych surowców.\nW zestawie schody i bariery, aby zapobiec upadkom małych dzieci i ich zranieniu.\n<color=green>Musisz umieścić ją w dołku głębokim na 4 bloki!\nKopalnia i ogrodzenia muszą być na solidnym podłożu!\nUmieść schody na miejscach z ziemią i dokończ rampę dostępową</color>"
ptBR = "Uma mina maior e mais profunda para explorar depósitos mais ricos, também dá acesso a elementos mais raros. \nVem com escadas de acesso e barreiras para impedir que pequenos kits bobos caiam e se machuquem. \n<color=green>Precisa ser colocada em um buraco de 4 de profundidade! \nA mina e as cercas devem estar em solo firme! \nColoque escadas em locais de terra e complete a rampa de acesso</color>"
koKR = "더 크고 깊은 광산으로 더 풍부한 자원을 채굴할 수 있으며, 더 희귀한 원소에도 접근할 수 있습니다.\n어린 친구들이 떨어져 다치지 않도록 계단과 장벽이 제공됩니다.\n<color=green>4 깊이의 구멍에 배치해야 합니다!\n광산과 울타리는 단단한 땅 위에 있어야 합니다!\n흙 위에 계단을 놓고 접근 경사를 완성하세요.</color>"
csCZ = "Větší a hlubší důl k těžbě bohatších ložisek, také poskytuje přístup k vzácnějším prvkům. \nPřichází s přístupovými schody a zábranami, aby se zabránilo malým dětem spadnout a ublížit si. \n<color=green>Musí být umístěn ve čtyřstopém výkopu! \nDůl a ploty musí být na pevném podkladu! \nUmístěte schody na hlinitá místa a dokončete přístupovou rampu</color>"
viVN = "Một mỏ lớn và sâu hơn để khai thác các mỏ giàu có hơn, cũng cung cấp quyền truy cập vào các yếu tố hiếm hơn.  \nĐi kèm với cầu thang vào và hàng rào để ngăn chặn những chú nhóc ngốc nghếch rơi xuống và bị thương.  \n<color=green>Cần được đặt trong một lỗ sâu 4 mét!  \nMỏ và hàng rào phải nằm trên mặt đất vững chắc!  \nĐặt cầu thang trên các điểm đất và hoàn thành đường dốc vào</color>"
trTR = "Daha zengin madenleri işletmek için daha büyük ve derin bir maden, ayrıca daha nadir elementlere erişim sağlar.\nKüçük çocukların düşüp zarar görmelerini önlemek için merdivenler ve bariyerlerle birlikte gelir.\n<color=green>4 derinliğinde bir çukura yerleştirilmelidir!\nMaden ve çitler sağlam zemin üzerinde olmalıdır!\nMerdivenleri toprak noktalara yerleştir ve erişim rampasını tamamla</color>"

["Lapantouflemagic.Mediummine.FlavorDescription"]
raw = "\"I don't believe in ghosts and monsters, what even are grues supposed to be anyway?\"\n -Miner Zork, last words"
status = "normal"
enUS = "\"I don't believe in ghosts and monsters, what even are grues supposed to be anyway?\"  \n-Miner Zork, last words"
zhCN = "“我不相信鬼魂和怪物，究竟什么是怪物呢？”  \n- 矿工佐克，临终遗言"
zhTW = "「我不相信鬼魂和怪物，那些可怕的東西到底是什麼呢？」  \n-礦工佐克，臨終遺言"
ruRU = "«Я не верю в призраков и монстров, кто вообще такие грю?»\n - шахтёр Зорк, последние слова"
jaJP = "「幽霊や怪物は信じない、グルーとは一体何なんだ？」  \n- 鉱夫ゾーク、最期の言葉"
frFR = "« Je ne crois pas aux fantômes et aux monstres, que sont donc censés être les grues, de toute façon ? »  \n- Mineur Zork, dernières paroles"
deDE = "„Ich glaube nicht an Geister und Monster, was sollen Grues überhaupt sein?“  \n -Miner Zork, letzte Worte"
plPL = "\"Nie wierzę w duchy i potwory, czym właściwie mają być te straszaki?\"\n -Górnik Zork, ostatnie słowa"
ptBR = "\"Eu não acredito em fantasmas e monstros, o que são os grus afinal?\"  \n- Minerador Zork, últimas palavras"
koKR = "\"나는 유령과 괴물을 믿지 않아, 도대체 그루스는 뭐길래?\" - 광부 조크, 마지막 말"
csCZ = "\"V duchy a příšery nevěřím, co vlastně mají být ti hrůzáci?\"\n -Miner Zork, poslední slova"
viVN = "\"Tôi không tin vào ma quỷ và quái vật, và những con quái vật đó rốt cuộc là gì?\"\n - Thợ mỏ Zork, lời nói cuối cùng"
trTR = "\"Hayaletlere ve canavarlara inanmıyorum, gru nedir ki zaten?\"  \n -Madenci Zork, son sözleri"

