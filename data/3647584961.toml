["Lapantouflemagic.Foundry.Description"]
raw = "Refines the most advanced materials with unmatched efficiency.\n<color=#FF6EC7>A true marvel of beaver technology. Its impressive silhouette is the hallmark of a modern industrial centerxa0!</color>\n<color=#00FFFF>Some parts work as a Levee</color>"
status = "normal"
enUS = "Refines the most advanced materials with unmatched efficiency. <color=#FF6EC7>A true marvel of beaver technology. Its impressive silhouette is the hallmark of a modern industrial center!</color> <color=#00FFFF>Some parts work as a Levee</color>"
zhCN = "以无与伦比的效率精炼出最先进的材料。<color=#FF6EC7>真正的海狸科技奇迹。其令人印象深刻的轮廓是现代工业中心的标志！</color><color=#00FFFF>某些部分可以作为堤坝使用</color>"
zhTW = "以無與倫比的效率精煉最先進的材料。\n<color=#FF6EC7>一項真正的海狸技術奇蹟。它令人印象深刻的輪廓是現代工業中心的標誌！</color>\n<color=#00FFFF>某些部件可作為堤壩使用</color>"
ruRU = "Обрабатывает самые продвинутые материалы с несравненной эффективностью. \n<color=#FF6EC7>Истинное чудо бобровой технологии. Его впечатляющий силуэт является символом современного промышленного центра!</color>\n<color=#00FFFF>Некоторые части функционируют как плотина</color>"
jaJP = "「最先端の材料を比類なき効率で精製します。<color=#FF6EC7>ビーバー技術の真の驚異。印象的なシルエットは現代の産業中心地の証です！</color><color=#00FFFF>一部のパーツは堤防として機能します。</color>」"
frFR = "Raffine les matériaux les plus avancés avec une efficacité sans égal.  \n<color=#FF6EC7>Une véritable merveille de la technologie des castors. Son impressionnante silhouette est la marque d'un centre industriel modernexa0!</color>  \n<color=#00FFFF>Certaines parties fonctionnent comme une digue</color>"
deDE = "Veredelt die fortschrittlichsten Materialien mit unübertroffener Effizienz.  \n<color=#FF6EC7>Ein wahres Wunder der Bibertechnologie. Seine beeindruckende Silhouette ist das Markenzeichen eines modernen Industriegebiets!</color>  \n<color=#00FFFF>Einige Teile funktionieren wie ein Deich</color>"
plPL = " rafinuje najbardziej zaawansowane materiały z niezrównaną wydajnością. <color=#FF6EC7>Prawdziwy cud technologii bobrów. Jego imponujący zarys jest znakiem rozpoznawczym nowoczesnego centrum przemysłowego!</color> <color=#00FFFF>Niektóre części działają jak wał przeciwpowodziowy</color>"
ptBR = "Refina os materiais mais avançados com eficiência imbatível.  \n<color=#FF6EC7>Uma verdadeira maravilha da tecnologia dos castores. Sua silhueta impressionante é a marca de um centro industrial moderno!</color>  \n<color=#00FFFF>Algumas partes funcionam como um Dique</color>"
koKR = "독보적인 효율성으로 가장 첨단 소재를 정제합니다.\n<color=#FF6EC7>비버 기술의 진정한 경이로움. 인상적인 실루엣은 현대 산업 센터의 상징입니다!</color>\n<color=#00FFFF>일부 부품은 제방처럼 작동합니다</color>"
csCZ = "Zpracovává nejpokročilejší materiály s neuvěřitelnou efektivitou.  \n<color=#FF6EC7>Opravdový zázrak bobří technologie. Jeho impozantní silueta je znakem moderního průmyslového centraxa0!</color>  \n<color=#00FFFF>Některé části fungují jako hráz</color>"
viVN = "Chế biến những vật liệu tiên tiến nhất với hiệu suất vô song.  \n<color=#FF6EC7>Một kỳ quan thực sự của công nghệ bọ rùa. Hình dáng ấn tượng của nó là biểu tượng của một trung tâm công nghiệp hiện đại!</color>  \n<color=#00FFFF>Một số bộ phận hoạt động như một đê</color>"
trTR = "Rakipsiz verimlilikle en gelişmiş malzemeleri işliyor.  \n<color=#FF6EC7>Bir kunduz teknolojisi harikası. Etkileyici silueti modern bir sanayi merkeziyle özdeşleşmiştir!</color>  \n<color=#00FFFF>Bazı parçaları bir set gibi çalışır</color>"

["Lapantouflemagic.IrrigationLodge.Description"]
raw = "Irrigate the ground in a moderate area.\n<color=green>Water consumption scales with irrigated area.\nCan repel ground contamination.</color>\n<color=#FFA500>Small Tower</color>, <color=#FF6EC7>Can support upgrades</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "Irrigate the ground in a moderate area.  \n<color=green>Water consumption scales with irrigated area.  \nCan repel ground contamination.</color>  \n<color=#FFA500>Small Tower</color>, <color=#FF6EC7>Can support upgrades</color>  \n<color=#00FFFF>Works as a Levee</color>"
zhCN = "在适度区域进行灌溉。\n<color=green>水消耗与灌溉面积成比例。\n可以抵御地面污染。</color>\n<color=#FFA500>小塔</color>，<color=#FF6EC7>可以支持升级</color>\n<color=#00FFFF>作为堤坝使用</color>"
zhTW = "灌溉適度面積的土地。\n<color=green>水的消耗量與灌溉面積成正比。\n可以抵抗地面污染。</color>\n<color=#FFA500>小型塔樓</color>，<color=#FF6EC7>可以支持升級</color>\n<color=#00FFFF>可作為防洪堤</color>"
ruRU = "Орошаем землю на умеренной площади.  \n<color=green>Потребление воды зависит от орошаемой площади.  \nМожет предотвратить загрязнение почвы.</color>  \n<color=#FFA500>Небольшая башня</color>, <color=#FF6EC7>Поддерживает улучшения</color>  \n<color=#00FFFF>Работает как плотина</color>"
jaJP = "中程度の面積を灌漑します。\n<color=green>水の消費量は灌漑された面積に応じて変動します。\n地面の汚染を防ぐことができます。</color>\n<color=#FFA500>小さな塔</color>、<color=#FF6EC7>アップグレードをサポートします</color>\n<color=#00FFFF>堤防として機能します</color>"
frFR = "Irriguez le sol dans une zone modérée.  \n<color=green>La consommation d'eau augmente avec la surface irriguée. Peut repousser la contamination du sol.</color>  \n<color=#FFA500>Petite Tour</color>, <color=#FF6EC7>Peut supporter des améliorations</color>  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Bewässern Sie den Boden in einem mäßigen Bereich.\n<color=green>Der Wasserverbrauch steigt mit der bewässerten Fläche.\nKann Bodenverschmutzung abwehren.</color>\n<color=#FFA500>Kleiner Turm</color>, <color=#FF6EC7>Kann Upgrades unterstützen</color>\n<color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Nawadniaj ziemię na umiarkowanym obszarze.\n<color=green>Zużycie wody wzrasta wraz z nawodnionym obszarem.\nMoże odpychać skażenie gleby.</color>\n<color=#FFA500>Mała Wieża</color>, <color=#FF6EC7>Może wspierać ulepszenia</color>\n<color=#00FFFF>Działa jak wał</color>"
ptBR = "Irrigue o chão em uma área moderada.\n<color=green>O consumo de água varia com a área irrigada.\nPode repelir contaminação do solo.</color>\n<color=#FFA500>Torre Pequena</color>, <color=#FF6EC7>Pode suportar melhorias</color>\n<color=#00FFFF>Funciona como uma Barragem</color>"
koKR = "적당한 지역의 토양에 물을 대십시오.  \n<color=green>물 소비는 관개된 면적에 비례합니다.  \n지면 오염을 방지할 수 있습니다.</color>  \n<color=#FFA500>작은 탑</color>, <color=#FF6EC7>업그레이드를 지원할 수 있습니다</color>  \n<color=#00FFFF>제방 역할을 합니다</color>"
csCZ = "Zavlažujte půdu na střední ploše.\n<color=green>Konzumace vody se mění s zavlažovanou plochou.\nMůže odrážet kontaminaci půdy.</color>\n<color=#FFA500>Malá věž</color>, <color=#FF6EC7>Může podporovat vylepšení</color>\n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Tưới tiêu cho mặt đất trong một khu vực vừa phải.\n<color=green>Tiêu thụ nước tỷ lệ với khu vực được tưới tiêu.\nCó thể đẩy lùi ô nhiễm đất.</color>\n<color=#FFA500>Tháp nhỏ</color>, <color=#FF6EC7>Có thể hỗ trợ nâng cấp</color>\n<color=#00FFFF>Hoạt động như một đê</color>"
trTR = "Tarımı yapılan alanda ılımlı bir şekilde sulama yapın.\n<color=green>Su tüketimi sulanan alanla orantılıdır.\nToprak kirlenmesini önleyebilir.</color>\n<color=#FFA500>Küçük Kule</color>, <color=#FF6EC7>Yükseltmeleri destekleyebilir</color>\n<color=#00FFFF>Baraj gibi çalışır</color>"

["Lapantouflemagic.IrrigationLodge.FlavorDescription"]
raw = "\"If only that reservoir was wider, we could use it as a bath...\"\n -Toothless the Wise, elder beaver"
status = "normal"
enUS = "\"If only that reservoir was wider, we could use it as a bath...\"\n-Toothless the Wise, elder beaver"
zhCN = "“如果那个水库再宽一些，我们就可以把它当成澡堂用了……”  \n——智者无牙，老海狸"
zhTW = "「如果那水庫再寬一點，我們就可以把它當成澡盆使用了……」  \n－ 無牙的智慧，老水獺"
ruRU = "\"Если бы только этот резервуар был шире, мы могли бы использовать его как ванну...\"  \n- Беззубик Мудрый, старый бобер"
jaJP = "「もしあの貯水池がもっと広ければ、浴槽として使えるのに…」  \n-賢者トゥースレス、老ビーバー"
frFR = "\"Si seulement ce réservoir était plus large, nous pourrions l'utiliser comme baignoire...\"  \n- Sans-Dent le Sage, castor ancien"
deDE = "„Wenn dieser Stausee doch nur breiter wäre, könnten wir ihn als Bad benutzen...“  \n- Zahnlos der Weise, älterer Biber"
plPL = "\"Żeby tylko ten zbiornik był szerszy, moglibyśmy używać go jako kąpieli...\"  \n- Bezzębny Mądry, starszy bóbr"
ptBR = "\"Se ao menos aquele reservatório fosse mais amplo, poderíamos usá-lo como um banho...\" - Dente-de-Leite, o sábio, castor ancião"
koKR = "\"저 저수지가 더 넓기만 하면 목욕탕으로 사용할 수 있을 텐데...\"  \n- 지혜로운 이빨 없는 비버, 토슬레스"
csCZ = "\"Přece jen by ta nádrž mohla být širší, mohli bychom ji použít jako koupel...\"  \n- Bezzubý Moudrý, stařec bobr"
viVN = "Nếu như cái hồ chứa đó rộng hơn, chúng ta có thể sử dụng nó làm bồn tắm...\"\n -Răng mất khôn, beaver trưởng lão"
trTR = "\"Eğer o rezervuar daha geniş olsa, onu banyo olarak kullanabilirdik...\"  \n- Bilge Dişsiz, yaşlı kunduz"

