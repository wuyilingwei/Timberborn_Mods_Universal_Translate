["Lapantouflemagic.WoodFenceGate.FlavorDescription"]
raw = "\"I...guess it looks nicer to put fences between different crops\""
status = "normal"
enUS = "\"I guess it looks nicer to put fences between different crops.\""
zhCN = "“我…想我觉得在不同的农作物之间放围栏看起来更好。”"
zhTW = "「我…想它看起來會更好，將不同的作物之間放上圍籬。」"
ruRU = "«Я... думаю, что ставить заборы между разными культурами выглядит лучше»"
jaJP = "「うーん、違う作物の間にフェンスを置くと見栄えが良くなると思う。」"
frFR = "« Je... suppose que ça a l'air mieux de mettre des clôtures entre les différentes cultures »"
deDE = "„Ich...schätze, es sieht schöner aus, Zäune zwischen verschiedenen Pflanzen zu setzen.“"
plPL = "„Myślę, że ładniej wygląda, gdy postawi się płoty między różnymi uprawami.”"
ptBR = "\"Eu...acho que parece mais bonito colocar cercas entre as diferentes culturas\""
koKR = "\"나는...다른 작물 사이에 울타리를 두는 것이 더 멋져 보이게 하는 것 같아\""
csCZ = "\"Domnívám se, že vypadá lépe, když jsou mezi různými plodinami ploty.\""
viVN = "\"Tôi... nghĩ là đặt hàng rào giữa các loại cây trồng khác nhau trông sẽ đẹp hơn.\""
trTR = "\"Sanırım farklı mahsuller arasında çitler koymak daha güzel görünüyor.\""

