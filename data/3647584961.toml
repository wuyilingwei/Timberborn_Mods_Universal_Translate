["Lapantouflemagic.AbyssTourismOffice.Description"]
raw = "Organizes guided tours in safe and already explored sectors of the hooman derelict facility.\nGuaranteed 100% Grue-free."
status = "normal"
enUS = "Organizes guided tours in safe and already explored sectors of the human derelict facility. Guaranteed 100% Grue-free."
zhCN = "“在安全且已探索的领域组织导游团。确保100%无恐怖。”"
zhTW = "在安全且已探索的胡曼廢棄設施區域內組織導覽遊。 \n保證100%無遇到怪物。"
ruRU = "Организует экскурсии по безопасным и уже исследованным секторам заброшенного объекта человека. Гарантировано 100% без Грю."
jaJP = "「人間の廃棄施設の安全で既に探索されたエリアでガイド付きツアーを企画します。100％グルーなしを保証します。」"
frFR = "Organise des visites guidées dans des secteurs sûrs et déjà explorés de l'installation abandonnée des humains. Garantie 100% sans Grue."
deDE = "Organisiert geführte Touren in sicheren und bereits erkundeten Bereichen der menschlichen Ruine. Garantiert 100% Grue-frei."
plPL = "Organizuje wycieczki z przewodnikiem w bezpiecznych i już zbadanych sektorach opuszczonego obiektu hoomana. Gwarantowane 100% wolne od Grue."
ptBR = "Organiza passeios guiados em setores seguros e já explorados da instalação abandonada dos humanos. Garantido 100% livre de Grue."
koKR = "안전하고 이미 탐험된 지역의 인간 유적지에서 가이드 투어를 조직합니다. 100% 그루가 없는 것을 보장합니다."
csCZ = "Organizuje výpravy s průvodcem v bezpečných a již prozkoumaných sektorech opuštěného zařízení hooman.\nZaručeno 100% bez Grue."
viVN = "Tổ chức các chuyến tham quan có hướng dẫn trong những khu vực an toàn và đã được khám phá của cơ sở bỏ hoang của loài người. Đảm bảo 100% không có Grue."
trTR = "Hooman terk edilmiş tesisinin güvenli ve zaten keşfedilmiş alanlarında rehberli turlar düzenler. %100 Grue'ye karşı garanti."

["Lapantouflemagic.AbyssTourismOffice.FlavorDescription"]
raw = "\"Who doesn't like the thrill of maybe being eaten by a grue, without actually being eaten by a grue?\""
status = "normal"
enUS = "\"Who doesn't like the thrill of maybe being eaten by a grue, without actually being eaten by a grue?\""
zhCN = "“谁不喜欢被可能被食人魔吃掉的刺激，而又不是真的被食人魔吃掉呢？”"
zhTW = "「誰不喜歡可能被食人魔吃掉的刺激感，而實際上卻並未被食人魔吃掉呢？」"
ruRU = "\"Кто не любит острые ощущения от возможности быть съеденным грушей, не будучи при этом съеденным?\""
jaJP = "\"グルーに食べられるかもしれないスリルが、実際には食べられないというのが好きじゃない人はいるのだろうか？\""
frFR = "\"Qui n'aime pas le frisson de peut-être être dévoré par un grue, sans réellement être dévoré par un grue ?\""
deDE = "\"Wer mag nicht den Nervenkitzel, vielleicht von einem Grue gefressen zu werden, ohne tatsächlich von einem Grue gefressen zu werden?\""
plPL = "\"Kto nie lubi dreszczyku emocji związany z możliwością bycia zjedzonym przez grue, bez faktycznego bycia przez niego zjedzonym?\""
ptBR = "Quem não gosta da emoção de talvez ser devorado por um grue, sem realmente ser devorado por um grue?"
koKR = "\"누가 그루에게 먹힐지도 모르는 스릴을 좋아하지 않겠어요, 실제로 먹히지 않은 채로?\""
csCZ = "\"Kdo by neměl rád vzrušení z možnosti být sežrán gruem, aniž by byl skutečně sežrán gruem?\""
viVN = "\"Không ai không thích cảm giác hồi hộp khi có thể bị một con grue ăn thịt, mà thực sự thì không bị ăn thịt.\""
trTR = "\"Gerçekten bir grue tarafından yenilmeyi beklemeden, belki de yenilme heyecanını kim sevmez?\""

