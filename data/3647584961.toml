zhCN = "一个强力压机，用于从种子中提取油，或从水果中提取果汁。  \n<color=#00FFFF>作为堤坝使用</color>"
zhTW = "一個強力的壓榨機，可從種子中提取油脂或從水果中提取果汁。  \n<color=#00FFFF>作為堤壩使用</color>"
ruRU = "Мощный прес для извлечения масла из семян или сока из фруктов. <color=#00FFFF>Работает как плотина</color>"
jaJP = "「種から油を絞り出したり、果物からジュースを抽出するための強力なプレスです。<color=#00FFFF>堤防としても機能します</color>」"
frFR = "Une presse robuste pour extraire l'huile des graines ou le jus des fruits. <color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Eine starke Presse, um Öl aus Samen oder Saft aus Früchten zu gewinnen.\n<color=#00FFFF>Funktioniert wie ein Damm</color>"
plPL = "Mocna prasa do wyciskania oleju z nasion lub soku z owoców.  \n<color=#00FFFF>Działa jak tama</color>"
ptBR = "Uma prensa forte para extrair óleo de sementes ou suco de frutas.  \n<color=#00FFFF>Funciona como uma Barragem</color>"
koKR = "씨앗에서 기름을 추출하거나 과일에서 주스를 추출하는 강력한 프레스입니다.  \n<color=#00FFFF>제방처럼 작동합니다</color>"
csCZ = "Silný lis na extrakci oleje ze semen nebo šťávy z plodů. <color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một chiếc máy ép mạnh mẽ để chiết xuất dầu từ hạt hoặc nước trái cây từ trái cây.  \n<color=#00FFFF>Hoạt động như một đê</color>"
trTR = "Tohumlardan yağ, meyvelerden ise meyve suyu çıkarmak için güçlü bir pres.  \n<color=#00FFFF>Düzenek olarak çalışır</color>"

