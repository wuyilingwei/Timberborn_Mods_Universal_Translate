["Lapantouflemagic.MildDisease.DeathMessage"]
raw = "<color=green>'s condition suddenly worsened and is now free of suffering. Let's hope it was not contagious.</color>"
status = "normal"
enUS = "<color=green>'s condition suddenly worsened and is now free of suffering. Let's hope it was not contagious.</color>"
zhCN = "<color=green>'s 病情突然恶化，现在不再受苦。希望这不是传染性的。</color>"
zhTW = "<color=green>'的病情突然惡化，現在不再受苦。希望這不是傳染性的。</color>"
ruRU = "<color=green>Состояние 's внезапно ухудшилось и теперь он(а) свободен(свободна) от страданий. Будем надеяться, что это не было заразным.</color>"
jaJP = "<color=green>'s 状態が突然悪化し、苦しみから解放されました。感染性でないことを願いましょう。</color>"
frFR = "<color=green>l'état de 's'est soudainement détérioré et est désormais libéré de la souffrance. Espérons que ce n'était pas contagieux.</color>"
deDE = "<color=green>'s Zustand hat sich plötzlich verschlechtert und ist jetzt frei von Leiden. Hoffen wir, dass es nicht ansteckend war.</color>"
plPL = "<color=green>Stan 'a nagle się pogorszył i jest teraz wolny od cierpienia. Miejmy nadzieję, że to nie było zaraźliwe.</color>"
ptBR = "<color=green>A condição de 's piorou repentinamente e agora está livre de sofrimento. Vamos torcer para que não tenha sido contagiosa.</color>"
koKR = "<color=green>'s 상태가 갑자기 악화되어 이제 고통에서 벗어났습니다. 전염성이 아니었기를 바랍니다.</color>"
csCZ = "<color=green>'s stav se náhle zhoršil a nyní je osvobozen od utrpení. Doufejme, že to nebylo nakažlivé.</color>"
viVN = "<color=green>tình trạng của đã đột ngột xấu đi và giờ đây đã không còn đau đớn. Hy vọng rằng nó không phải là bệnh truyền nhiễm.</color>"
