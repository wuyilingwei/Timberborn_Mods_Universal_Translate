["Lapantouflemagic.ZauerKrautBarrel.Description"]
raw = "A pile of barrels that can be filled with different things that are left to ferment, pickle or decompose.\n<color=#FF6EC7>Can function without workers.</color>"
status = "normal"
enUS = "A pile of barrels that can be filled with different things that are left to ferment, pickle, or decompose.  \n<color=#FF6EC7>Can function without workers.</color>"
zhCN = "一堆可以装不同东西以进行发酵、腌制或分解的桶。  \n<color=#FF6EC7>可以在没有工人的情况下运作。</color>"
zhTW = "一堆可以裝填不同物品的桶，這些物品被留下來發酵、醃製或分解。  \n<color=#FF6EC7>可以在沒有工人的情況下運作。</color>"
ruRU = "Куча бочек, которые можно наполнить разными вещами, оставленными для ферментации, засолки или разложения.  \n<color=#FF6EC7>Может функционировать без работников.</color>"
jaJP = "さまざまなものを詰めて発酵、漬け、または分解されるのを待つ樽の山です。  \n<color=#FF6EC7>作業者なしで機能します。</color>"
frFR = "Une pile de fûts que l'on peut remplir de différentes choses laissées à fermenter, à être marinées ou à se décomposer.  \n<color=#FF6EC7>Peut fonctionner sans travailleurs.</color>"
deDE = "Ein Haufen Fässer, die mit verschiedenen Dingen gefüllt werden können, die zum Gären, Einlegen oder Zersetzen stehen. <color=#FF6EC7>Kann ohne Arbeiter funktionieren.</color>"
plPL = "Stos beczek, które można wypełnić różnymi rzeczami, które mają fermentować, kiszone lub rozkładać się.  \n<color=#FF6EC7>Może działać bez pracowników.</color>"
ptBR = "Um monte de barris que podem ser preenchidos com diferentes coisas que ficam para fermentar, conservar em conserva ou decompor.  \n<color=#FF6EC7>Pode funcionar sem trabalhadores.</color>"
koKR = "발효, 피클링 또는 분해할 수 있는 다양한 것을 가득 채울 수 있는 통더미입니다.  \n<color=#FF6EC7>작업자가 없어도 기능할 수 있습니다.</color>"
csCZ = "Hromada sudů, které lze naplnit různými věcmi, jež se nechávají fermentovat, nakládat nebo rozkládat.  \n<color=#FF6EC7>Mohou fungovat bez pracovníků.</color>"
viVN = "Một đống thùng có thể được đổ đầy bằng nhiều thứ khác nhau để lên men, dưa hoặc phân hủy. \n<color=#FF6EC7>Có thể hoạt động mà không cần công nhân.</color>"
trTR = "Farklı şeylerle doldurulup fermante, turşu yapılabilir ya da çürümeye bırakılabilen bir varil yığını. <color=#FF6EC7>İşçiler olmadan çalışabilir.</color>"

["Lapantouflemagic.ZauerKrautBarrel.FlavorDescription"]
raw = "\"A closed space that no one ever opens? Interesting...\"\n -Jack the Gnawer"
status = "normal"
enUS = "\"A closed space that no one ever opens? Interesting...\"  \n-Jack the Gnawer"
zhCN = "“一个没有人打开的封闭空间？有趣……\"\n -杰克·喀啡"
zhTW = "「一個從來沒有人打開的封閉空間？有趣……」  \n- Jack the Gnawer"
ruRU = "\"Закрытое пространство, которое никто никогда не открывает? Интересно...\"  \n- Джек Грызун"
jaJP = "「誰も開けたことのない閉ざされた空間？興味深い…」 -ジャック・ザ・ノーワー"
frFR = "\"Un espace fermé que personne n'ouvre jamais ? Intéressant...\"  \n - Jack le Grignoteur"
deDE = "„Ein geschlossener Raum, den niemand je öffnet? Interessant...“  \n-Jack der Nager"
plPL = "„Zamknięta przestrzeń, której nikt nigdy nie otwiera? Ciekawe...”  \n-Jack the Gnawer"
ptBR = "\"Um espaço fechado que ninguém nunca abre? Interessante...\"\n -Jack, o Roedor"
koKR = "\"아무도 열지 않는 폐쇄된 공간? 흥미롭군...\"  \n- 죠크 더 너워"
csCZ = "\"Uzavřený prostor, který nikdo nikdy neotevře? Zajímavé...\" -Jack the Gnawer"
viVN = "\"Một không gian đóng mà không ai mở ra? Thú vị quá...\"\n -Jack the Gnawer"
trTR = "\"Kapatılmış ve kimsenin açmadığı bir alan mı? İlginç...\" -Jack the Gnawer"

["Lapantouflemagic.Factory.Description"]
