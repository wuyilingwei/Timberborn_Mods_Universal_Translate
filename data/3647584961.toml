["Lapantouflemagic.CoalMechanicalDrill.Description"]
raw = "A mechanized drill that crushes rock to extract coal.\nThe drill bits must be changed regularly.\n<color=red>Deleting waste rock is cheating!</color>"
status = "normal"
enUS = "A mechanized drill that crushes rock to extract coal. The drill bits must be changed regularly. <color=red>Deleting waste rock is cheating!</color>"
zhCN = "一种机械钻头，能够破碎岩石以提取煤炭。\n钻头必须定期更换。\n<color=red>删除废石是作弊！</color>"
zhTW = "一台機械化鑽頭，可以壓碎岩石以提取煤炭。 鑽頭的刀頭必須定期更換。<color=red>刪除廢岩石是作弊！</color>"
ruRU = "Механизированная дрель, которая дробит камень для добычи угля. Сверла необходимо менять регулярно. <color=red>Удаление бесполезной породы — это обман!</color>"
jaJP = "石を砕いて石炭を採掘する機械式ドリルです。  \nドリルビットは定期的に交換する必要があります。  \n<color=red>廃棄岩を削除するのは不正行為です！</color>"
frFR = "Un tarière mécanisée qui écrase la roche pour extraire le charbon.  \nLes mèches doivent être changées régulièrement.  \n<color=red>Supprimer la roche de rebut est tricher!</color>"
deDE = "Eine mechanisierte Bohrmaschine, die Gestein zermahlt, um Kohle zu gewinnen. Die Bohrköpfe müssen regelmäßig gewechselt werden. <color=red>Das Löschen von Abfallgestein ist schummeln!</color>"
plPL = "Zmechanizowany wiertło, które miażdży skały w celu wydobycia węgla. Wiertła muszą być regularnie wymieniane. <color=red>Usuwanie odpadów to oszustwo!</color>"
ptBR = "Uma broca mecanizada que quebra rocha para extrair carvão. As brocas devem ser trocadas regularmente. <color=red>Excluir a rocha de rejeito é trapaça!</color>"
koKR = "석탄을 추출하기 위해 암석을 부수는 기계식 드릴입니다.\n드릴 비트는 정기적으로 교체해야 합니다.\n<color=red>버려진 암석을 삭제하는 것은 부정행위입니다!</color>"
csCZ = "Mechanizované vrtací zařízení, které drtí skálu za účelem těžby uhlí. Vrtáky je třeba pravidelně měnit. <color=red>Odstraňování odpadní skály je podvod!</color>"
viVN = "Một máy khoan cơ giới nghiền nát đá để khai thác than.  \nCác mũi khoan phải được thay đổi thường xuyên.  \n<color=red>Xóa đá thải là gian lận!</color>"
trTR = "Kömür çıkarmak için kayaları ezmek üzere tasarlanmış mekanize bir matkap. Matkap uçlarının düzenli olarak değiştirilmesi gerekmektedir. <color=red>Atık kayaları silmek hile yapmaktır!</color>"

["Lapantouflemagic.CoalMechanicalDrill.FlavorDescription"]
raw = "\"If you spin the drill too fast, the coal might ignite and KABOOM the mountain!\"\n -A bad alchemist beaver"
status = "normal"
enUS = "\"If you spin the drill too fast, the coal might ignite and KABOOM the mountain!\"  \n-A bad alchemist beaver"
zhCN = "“如果你把钻头转得太快，煤炭可能会点燃，然后轰的一声炸掉山！”  \n- 一只糟糕的炼金术士海狸"
zhTW = "「如果你把鑽頭轉得太快，煤炭可能會著火，然後山就會轟隆一聲爆炸！」  \n- 一位糟糕的煉金術士海狸"
ruRU = "\"Если крутить дрель слишком быстро, уголь может воспламениться и БАБАХнуть гору!\"  \n- Плохой алхимик-бобер"
jaJP = "「ドリルを速すぎるくらい回すと、石炭が発火して山がKABOOMするかもしれません！」\n― 悪い錬金術師のビーバー"
frFR = "\"Si vous faites tourner la perceuse trop vite, le charbon pourrait s'enflammer et BOUM la montagne !\"  \n- Un castor alchimiste maladroit"
deDE = "„Wenn du die Bohrmaschine zu schnell drehst, könnte die Kohle entzünden und BOOM! den Berg sprengen!“  \n-Ein schlechter alchemistischer Biber"
plPL = "\"Jeśli obrócisz wiertło za szybko, węgiel może się zapalić i KABOOM góra!\"  \n-Zły alchemik bóbr"
ptBR = "\"Se você girar a furadeira rápido demais, o carvão pode pegar fogo e KABOOM na montanha!\"  \n-Um castor alquimista ruim"
koKR = "\"드릴을 너무 빠르게 돌리면 석탄이 점화되어 산이 KABOOM할 수 있어!\"  \n- 나쁜 연금술사 비버"
csCZ = "Pokud vrták otáčíte příliš rychle, může uhlí vzplanout a KABOOM, hora!\"  \n-\"Špatný alchymista bobr"
viVN = "\"Nếu bạn quay khoan quá nhanh, than có thể bùng cháy và KABOOM cả ngọn núi!\"  \n-Một con beaver giả kim tồi tệ"
trTR = "Eğer matkabı çok hızlı döndürürsen, kömür tutuşabilir ve DAHA SONRA patlayabilir!\"\n -Kötü bir simyacı kunduz"

