["Lapantouflemagic.IronTrader.Description"]
raw = "The Ironteeth are passionate about all things industry, and they actually hate to trade, especially their coffee. Thankfully they can’t resist a good industrial challenge so something order-made and really hard to do might peak their interest. They seem to appreciate our manufactured products but can’t make them because they ''don’t do soft industry'', whatever that means. Also they are the only ones who will take you seriously when you ask to be payed in loose dirt."
status = "normal"
enUS = "The Ironteeth are passionate about all things industrial, and they truly despise trading, especially when it comes to their coffee. Fortunately, they can’t resist a good industrial challenge, so something custom-made and really difficult might pique their interest. They appear to appreciate our manufactured products but can’t produce them because they 'don’t do soft industry,' whatever that means. Additionally, they are the only ones who will take you seriously when you ask to be paid in loose dirt."
zhCN = "铁牙族对一切工业事务充满热情，他们实际上讨厌贸易，尤其是他们的咖啡。值得庆幸的是，他们无法抗拒一个好的工业挑战，因此一些定制的、真正困难的任务可能会引起他们的兴趣。他们似乎欣赏我们的制造产品，但无法制造这些产品，因为他们“不做软工业”，这意味着什么呢？此外，只有他们会在你要求用散土支付时认真对待你。"
zhTW = "鋼牙族對所有工業事物充滿熱情，他們其實厭惡交易，尤其是咖啡。幸好他們無法抗拒一個好的工業挑戰，因此一些訂製且真正難以完成的事物可能會引起他們的興趣。他們似乎欣賞我們的製造產品，但因為「他們不做軟性工業」，所以無法製作這些產品，不管這意味著什麼。此外，當你要求以散裝土壤支付時，他們是唯一會認真對待你的人。"
ruRU = "Железнозубцы страстно относятся ко всему, что связано с промышленностью, и на самом деле ненавидят торговлю, особенно свою кофе. К счастью, они не могут устоять перед хорошим промышленным вызовом, поэтому что-то, сделанное на заказ и действительно сложное, может привлечь их интерес. Кажется, они ценят наши производимые товары, но не могут их изготовить, потому что «неделают мягкую промышленность», что бы это ни значило. Также они единственные, кто примет вас всерьез, когда вы попросите платить вам в рыхлой земле."
jaJP = "アイアンティースはすべての産業に情熱を注いでおり、実際には取引を嫌っています、特に彼らのコーヒーを。幸いなことに、彼らは良い産業的挑戦には抵抗できないので、オーダーメイドで本当に難しいものは彼らの興味を引くかもしれません。彼らは私たちの製造品を評価しているようですが、「ソフト産業はやらない」と言って作ることができません。さらに、あなたが粗土で支払いをお願いするとき、真剣に受け止めてくれるのは彼らだけです。"
frFR = "Les Ironteeth sont passionnés par tout ce qui touche à l'industrie, et ils détestent en fait le commerce, surtout quand il s'agit de leur café. Heureusement, ils ne peuvent pas résister à un bon défi industriel, donc quelque chose de fait sur commande et vraiment difficile pourrait piquer leur intérêt. Ils semblent apprécier nos produits fabriqués, mais ils ne peuvent pas les réaliser car ils ''ne s'occupent pas de l'industrie douce'', peu importe ce que cela signifie. De plus, ils sont les seuls à vous prendre au sérieux lorsque vous demandez à être payé en terre meuble."
deDE = "Die Ironzähne sind leidenschaftlich in allem, was mit Industrie zu tun hat, und sie hassen es tatsächlich, zu handeln, besonders mit ihrem Kaffee. Glücklicherweise können sie einer guten industriellen Herausforderung nicht widerstehen, daher könnte etwas Auftragsgemachtes und wirklich Schwieriges ihr Interesse wecken. Sie scheinen unsere hergestellten Produkte zu schätzen, können sie aber nicht herstellen, weil sie ''keine weiche Industrie machen'', was auch immer das bedeutet. Außerdem sind sie die einzigen, die dich ernst nehmen, wenn du bittest, in losem Erde bezahlt zu werden."
plPL = "Zębate Żelazo pasjonują się wszystkim, co związane z przemysłem, i tak naprawdę nienawidzą handlu, szczególnie swoją kawą. Na szczęście nie mogą oprzeć się dobremu przemysłowemu wyzwaniu, więc coś na zamówienie i naprawdę trudnego może przykuć ich uwagę. Zdają się doceniać nasze produkty wytwarzane, ale nie mogą ich zrobić, ponieważ ''nie zajmują się miękkim przemysłem'', cokolwiek to znaczy. Ponadto są jedynymi, którzy potraktują cię poważnie, gdy poprosisz o zapłatę w luzem ziemi."
ptBR = "Os Ironteeth são apaixonados por tudo que diz respeito à indústria e, na verdade, odeiam negociar, especialmente seu café. Felizmente, eles não conseguem resistir a um bom desafio industrial, então algo feito sob medida e realmente difícil pode despertar seu interesse. Eles parecem apreciar nossos produtos manufaturados, mas não conseguem produzi-los porque ''não fazem indústria leve'', seja lá o que isso signifique. Além disso, eles são os únicos que levarão você a sério quando você pedir para ser pago em terra solta."
koKR = "아이언티스는 모든 산업에 열정을 가지고 있으며, 실제로는 거래, 특히 그들의 커피를 싫어합니다. 다행히도 그들은 좋은 산업적 도전에 저항할 수 없기 때문에 맞춤 제작된 정말 어려운 것에는 관심을 가질 수 있습니다. 그들은 우리의 제조 제품을 감사하게 여기는 것 같지만 ''부드러운 산업은 하지 않는다''고 하며 만들 수 없습니다. 또한, loose dirt로 보상을 요청할 때 그들만이 당신을 진지하게 받아들일 것입니다."
csCZ = "Železné zuby jsou vášniví pro všechny věci spojené s průmyslem a ve skutečnosti nenávidí obchodování, zejména se svým kávou. Naštěstí se nemohou ubránit dobré průmyslové výzvě, takže něco zakázkového a opravdu těžkého by mohlo vzbudit jejich zájem. Zdá se, že oceňují naše vyrobené produkty, ale nemohou je vyrábět, protože „nedělají měkký průmysl“, což může vlastně znamenat cokoliv. Také jsou to jediní, kdo tě vezme vážně, když si požádáš o zaplacení v sypké hlíně."
viVN = "Những chiếc Răng Sắt rất đam mê mọi thứ liên quan đến công nghiệp, và họ thực sự ghét việc trao đổi, đặc biệt là cà phê của họ. Rất may, họ không thể cưỡng lại một thử thách công nghiệp tốt, vì vậy một thứ gì đó được đặt hàng riêng và thực sự khó thực hiện có thể thu hút sự quan tâm của họ. Họ có vẻ đánh giá cao các sản phẩm mà chúng ta sản xuất nhưng không thể làm ra chúng vì họ ''không làm công nghiệp mềm'', bất kể điều đó có nghĩa là gì. Ngoài ra, họ là những người duy nhất sẽ coi bạn nghiêm túc khi bạn yêu cầu được trả tiền bằng đất lỏng."
trTR = "Demirdişliler endüstri ile ilgili her şeye tutkulu ve aslında ticareti, özellikle de kahvelerini sevmiyorlar. Neyse ki, iyi bir endüstriyel meydan okumaya direnemedikleri için, siparişle yapılmış ve gerçekten zor bir şey ilgilerini çekebilir. Ürettiğimiz ürünlere değer veriyor gibiler ama ''yumuşak sanayi'' yapmadıkları için bunları üretemiyorlar, ne anlama geliyorsa. Ayrıca, gevşek toprakla ödeme talep ettiğinizde sizi ciddiye alan tek kişiler de onlardır."

