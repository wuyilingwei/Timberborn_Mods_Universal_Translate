["Lapantouflemagic.WaterCannon.FlavorDescription"]
raw = "\"I wonder if I can get into the barrel just before it starts shooting...\"\n -Yet another silly beaver "
status = "normal"
enUS = "\"I wonder if I can get into the barrel just before it starts shooting...\"  \n-Yet another silly beaver"
zhCN = "“我想知道能否在它开始射击之前钻进桶里……”  \n- 又一只傻乎乎的河狸"
zhTW = "「我在想我能不能在它開始射擊之前進入桶裡……」  \n- 又一隻傻乎乎的海狸"
ruRU = "\"Интересно, смогу ли я залезть в бочку перед тем, как она начнет стрелять...\"\n -Ещё один глупый бобр"
jaJP = "「発射する直前にバレルに入れるかな…」  \n- さらにもう一匹のバカなビーバー"
frFR = "« Je me demande si je peux entrer dans le baril juste avant qu'il commence à tirer... »  \n- Encore un autre castor idiot"
deDE = "\"Ich frage mich, ob ich in das Fass hineinkommen kann, kurz bevor es anfängt zu schießen...\"  \n- Wieder ein dummer Biber"
plPL = "\"Zastanawiam się, czy mogę wskoczyć do beczki tuż przed tym, jak zacznie strzelać...\"  \n - Jeszcze jeden głupi bóbr"
ptBR = "\"Eu me pergunto se consigo entrar no barril logo antes de começar a atirar...\"  \n- Mais um castor bobo"
koKR = "\"총 쏘기 시작하기 직전에 통에 들어갈 수 있을까 궁금해...\"\n- 또 다른 바보 같은 비버"
csCZ = "\"Zajímalo by mě, jestli se mohu dostat do sudu těsně předtím, než začne střílet...\"  \n- Ještě jedna hloupá bobr"
viVN = "\"Tôi tự hỏi liệu tôi có thể vào trong thùng ngay trước khi nó bắt đầu bắn không...\"  \n-Còn một con gấu trúc ngốc nghếch nữa"
trTR = "\"Barrel hemen ateş etmeye başlamadan önce içine girebilir miyim diye merak ediyorum...\"  \n- Yine bir başka aptal kunduz"

