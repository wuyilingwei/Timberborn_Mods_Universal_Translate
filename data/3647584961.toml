["Lapantouflemagic.WarmStorage.Description"]
raw = "A gigantic pot meant to be placed on a fire to keep food warm.\n<color=green>Placement is sensitive to camera orientation!</color>"
status = "normal"
enUS = "A gigantic pot meant to be placed on a fire to keep food warm.  \n<color=green>Placement is sensitive to camera orientation!</color>"
zhCN = "一个巨大的锅，旨在放在火上以保持食物温暖。  \n<color=green>放置对摄像机方向敏感！</color>"
zhTW = "一個巨大的鍋子，旨在放置在火上以保持食物溫暖。  \n<color=green>放置時對相機方向敏感！</color>"
ruRU = "Гигантская кастрюля, предназначенная для размещения на огне, чтобы поддерживать пищу в тепле. <color=green>Размещение чувствительно к ориентации камеры!</color>"
jaJP = "「食べ物を温かく保つために火の上に置く巨大な鍋です。<color=green>設置はカメラの向きに影響されます！</color>」"
frFR = "Un pot gigantesque destiné à être placé sur un feu pour maintenir la nourriture au chaud. <color=green>Le placement est sensible à l'orientation de la caméra !</color>"
deDE = "Ein gigantischer Topf, der auf ein Feuer gestellt werden soll, um das Essen warm zu halten. <color=green>Die Platzierung ist empfindlich gegenüber der Kameraausrichtung!</color>"
plPL = "Ogromny garnek przeznaczony do postawienia na ogniu, aby utrzymać jedzenie w cieple.  \n<color=green>Umiejscowienie jest wrażliwe na orientację kamery!</color>"
ptBR = "Uma panela gigantesca destinada a ser colocada sobre o fogo para manter a comida aquecida. <color=green>A colocação é sensível à orientação da câmera!</color>"
koKR = "음식을 따뜻하게 유지하기 위해 불 위에 놓도록 설계된 거대한 냄비입니다.  \n<color=green>배치는 카메라 방향에 민감합니다!</color>"
csCZ = "Obrovský hrnec určený k postavení na oheň, aby se jídlo udrželo teplé.  \n<color=green>Položení je citlivé na orientaci kamery!</color>"
viVN = " một chiếc nồi khổng lồ dùng để đặt trên lửa giúp giữ ấm thức ăn. <color=green>Việc đặt để nhạy cảm với hướng camera!</color>"
trTR = "Yiyecekleri sıcak tutmak için ateşin üzerine konulması amaçlanan dev bir tencere. <color=green>Yerleştirme, kamera yönlendirmesine duyarlıdır!</color>"

