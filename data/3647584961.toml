trTR = "Ağırlık olarak son derece yoğun madde kullanan ağır hizmet tipi yer çekimi pili."

["Lapantouflemagic.Heavygravitybattery.FlavorDescription"]
raw = "\"Honestly this is wasteful, but people like the glow\""
status = "normal"
enUS = "\"Honestly this is wasteful, but people like the glow\""
zhCN = "“老实说，这很浪费，但人们喜欢这种光芒。”"
zhTW = "說實話，這很浪費，但人們喜歡這種光芒。"
ruRU = "\"Честно говоря, это расточительно, но людям нравится сияние.\""
jaJP = "正直言ってこれは無駄ですけど、人々はこの光を好みます。"
frFR = "\"Honnêtement, c'est un gaspillage, mais les gens aiment la lueur.\""
deDE = "\"Ehrlich gesagt ist das verschwenderisch, aber die Leute mögen das Glühen.\""
plPL = "\"Szczerze mówiąc, to marnotrawstwo, ale ludziom podoba się blask.\""
ptBR = "\"Honestamente, isso é desperdício, mas as pessoas gostam do brilho.\""
koKR = "\"솔직히 이건 낭비예요, 하지만 사람들은 빛나는 걸 좋아해요.\""
csCZ = "\"Upřímně, to je plýtvání, ale lidem se líbí záře.\""
viVN = "\"Thành thật mà nói, điều này thật lãng phí, nhưng mọi người thích sự phát sáng.\""
trTR = "\"Açıkçası bu israf, ama insanlar parlamayı seviyor.\""

