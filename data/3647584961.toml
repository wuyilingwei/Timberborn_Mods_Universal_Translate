["Lapantouflemagic.Alchemist.Description"]
raw = "A cozy lab to prepare basic chemical reactions.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A cozy lab to prepare basic chemical reactions. <color=#00FFFF>Works as a Levee</color>"
zhCN = "“一个舒适的实验室，用于准备基本的化学反应。<color=#00FFFF>作为堤坝使用</color>”"
zhTW = "一個舒適的實驗室來準備基本的化學反應。<color=#00FFFF>可作為堤壩</color>"
ruRU = "Уютная лаборатория для приготовления основных химических реакций. <color=#00FFFF>Работает как плотина</color>"
