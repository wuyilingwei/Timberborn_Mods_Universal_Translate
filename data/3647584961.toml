["Lapantouflemagic.Aqueduct_Short.Description"]
raw = "A heavy duty bridge to carry an entire river.\nThe metal rings need to snap on <color=green>Giant Pillars</color>."
status = "normal"
enUS = "A heavy duty bridge to carry an entire river. The metal rings need to snap on <color=green>Giant Pillars</color>."
zhCN = "一座重型桥梁，用于承载整条河流。金属环需要卡在<color=green>巨型柱子</color>上。"
zhTW = "一座重型橋樑，以承載整條河流。\n金屬環需要卡在<color=green>巨型支柱</color>上。"
ruRU = "Мост повышенной прочности для переноса целой реки. Металлические кольца должны зацепиться за <color=green>Гигантские Столбы</color>."
jaJP = "全川を支える頑丈な橋です。金属製のリングは<color=green>巨大な柱</color>に取り付ける必要があります。"
frFR = "Un pont robuste pour transporter une rivière entière.  \nLes anneaux en métal doivent s'enclencher sur <color=green>Piliers Géants</color>."
deDE = "Eine strapazierfähige Brücke, die einen ganzen Fluss trägt. Die Metallringe müssen an <color=green>riesigen Säulen</color> einrasten."
plPL = "Most ciężki do przenoszenia całej rzeki. Metalowe pierścienie muszą zapiąć się na <color=green>Giganckich Filarach</color>."
ptBR = "Uma ponte robusta para suportar um rio inteiro.  \nOs anéis de metal precisam se prender a <color=green>Grandes Pilares</color>."
koKR = "전체 강을 지탱하는 중장비 다리입니다.\n금속 링은 <color=green>거대한 기둥</color>에 부착되어야 합니다."
csCZ = "Robustní most, který nese celou řeku. Kovové kroužky se musí zaklapnout na <color=green>Obrovské sloupy</color>."
viVN = "Cây cầu chịu lực nặng để mang toàn bộ dòng sông.\nCác vòng kim loại cần phải gắn chặt vào <color=green>Trụ Khổng Lồ</color>."
trTR = "Ağır hizmet köprüsü, bir nehri taşıyacak şekilde. Metal halkalar <color=green>Dev Sütunlar</color> üzerine takılmalıdır."

