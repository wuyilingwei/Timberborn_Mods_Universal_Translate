["Lapantouflemagic.WPBeaverStatue.FlavorDescription.Folktails"]
raw = "\"Definitely the best use of limited resources...\"\n -The expedition leader."
status = "normal"
enUS = "\"Definitely the best use of limited resources...\"  \n-The expedition leader."
zhCN = "“肯定是有限资源的最佳使用……\"\n- 探险队队长。"
zhTW = "「絕對是有限資源的最佳利用……」  \n— 探險隊隊長。"
ruRU = "\"Определенно, лучшее использование ограниченных ресурсов...\"\n -Лидер экспедиции."
jaJP = "「間違いなく限られた資源のベストな使い方です……」 - 探検隊のリーダー。"
frFR = "Certainement le meilleur usage des ressources limitées...\"\n -Le chef de l'expédition."
deDE = "\"Definitiv die beste Nutzung begrenzter Ressourcen...\" - Der Expeditionsleiter."
plPL = "\"Zdecydowanie najlepsze wykorzystanie ograniczonych zasobów...\" - Lider ekspedycji."
ptBR = "Definitivamente a melhor utilização de recursos limitados...\"\n -O líder da expedição."
koKR = "\"확실히 한정된 자원을 가장 잘 활용한 예입니다...\"  \n- 탐험대장."
csCZ = "\"Rozhodně nejlepší využití omezených zdrojů...\"  \n- Vedoucí expedice."
viVN = "Chắc chắn là cách sử dụng tốt nhất cho nguồn lực hạn chế...\"  \n -Người dẫn đầu cuộc thám hiểm."
trTR = "\"Kesinlikle sınırlı kaynakların en iyi kullanımı...\" -Keşif lideri."

