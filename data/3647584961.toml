ruRU = "К руководителю экспедиции,\n\nВаши отчеты были получены.\n\nПохоже, что ваше поселение все еще живо и здорово, с растущим населением.\n\nЧто более важно, вам каким-то образом удалось избежать контакта с администрацией без каких-либо угроз, саботажа или попыток убийства с обеих сторон. По крайней мере, насколько нам известно.\n\nТаким образом, мы приходим к выводу, что дальнейшая помощь больше не является необходимой.\n\nВы и ваше поселение по-прежнему являетесь частью гордой нации Белых Лап. Не позволяйте нашему сокращенному контролю влиять на ваше суждение.\n\nРасширяйтесь. Стройте. Изучайте. Экспериментируйте.\nСтарайтесь не разрушать ничего незаменимого.\n\nМы желаем вам удачи.\n\nВы по-прежнему не желанны для возвращения. Успех не означает, что люди забыли.\n\n<color=#A9A9A9>Текстовые записи частично сгенерированы с помощью ChatGTP</color>"
jaJP = "探検隊の隊長へ、\n\nあなたの報告書は受け取りました。\n\nあなたの集落はまだ生き残っており、人口も増加しているようです。\n\nさらに重要なことに、あなたは何らかの形で、脅威や妨害、暗殺未遂のない状態で行政との接触を耐え抜きました。少なくとも、私たちの知る限りでは。\n\nしたがって、さらなる支援はもはや必要ないと結論します。\n\nあなたとあなたの集落は、誇り高いホワイトポー国の一部であり続けます。私たちの監視が減ったからといって、あなたの判断に影響を与えないでください。\n\n拡張し、建設し、研究し、実験してください。\n取り返しのつかないものを破壊しないようにしましょう。\n\n成功を祈ります。\n\nあなたが戻ることはまだ歓迎されていません。成功したからといって、人々が忘れてしまったわけではありません。\n\n<color=#A9A9A9>テキストエントリは部分的にChatGTPを使用して生成されています</color>"
frFR = "À l'attention du Chef d'Expédition,\n\nVos rapports ont été reçus.\n\nIl semble que votre colonie soit toujours vivante et bien portante, avec une population en croissance.\n\nPlus important encore, vous avez réussi à entretenir un contact avec l'administration sans menaces, sabotage ou tentatives d'assassinat de part et d'autre. Du moins, en ce qui nous concerne.\n\nNous concluons donc qu'une assistance supplémentaire n'est plus nécessaire.\n\nVous et votre colonie restez partie de la fière nation des Whitepaws. Ne laissez pas notre surveillance réduite affecter votre jugement.\n\nDéveloppez. Construisez. Étudiez. Expérimentez.\nEssayez de ne rien détruire d'irremplaçable.\n\nNous vous souhaitons bonne chance.\n\nVous n'êtes toujours pas le bienvenu pour revenir. Le succès ne signifie pas que les gens ont oublié. \n\n\n\n<color=#A9A9A9>Les entrées de texte ont été partiellement générées à l'aide de ChatGTP</color>"
deDE = "An den Expeditonsleiter,\n\nIhre Berichte wurden erhalten.\n\nEs scheint, dass Ihre Siedlung weiterhin lebt und gedeiht, mit wachsender Bevölkerung.\n\nWichtiger ist, dass Sie es irgendwie geschafft haben, den Kontakt zur Verwaltung aufrechtzuhalten, ohne dass es zu Drohungen, Sabotage oder Attentatsversuchen auf beiden Seiten gekommen ist. Zumindest nach dem, was wir wissen.\n\nWir schließen daher, dass weitere Unterstützung nicht mehr erforderlich ist.\n\nSie und Ihre Siedlung bleiben Teil der stolzen Nation der Whitepaws. Lassen Sie nicht zu, dass unsere reduzierte Aufsicht Ihr Urteilsvermögen beeinträchtigt.\n\nErweitern. Bauen. Studieren. Experimentieren.\nVersuchen Sie, nichts Unersetzliches zu zerstören.\n\nWir wünschen Ihnen viel Glück.\n\nSie sind nach wie vor nicht willkommen, zurückzukehren. Erfolg bedeutet nicht, dass die Menschen vergessen haben.\n\n\n\n<color=#A9A9A9>Textabschnitte teilweise generiert mit ChatGTP</color>"
plPL = "Do Lidera Ekspedycji,\n\nTwoje raporty zostały odebrane.\n\nWygląda na to, że twoja osada wciąż żyje i ma się dobrze, z rosnącą populacją.\n\nCo ważniejsze, w jakiś sposób wytrzymałeś kontakt z administracją bez żadnych zagrożeń, sabotażów ani nieudanych prób zabójstwa z żadnej strony. Przynajmniej o ile wiemy.\n\nW związku z tym dochodzimy do wniosku, że dalsza pomoc nie jest już konieczna.\n\nTy i twoja osada pozostajecie częścią dumny narodu Whitepaws. Nie pozwól, aby nasze ograniczone nadzory wpłynęły na twoją ocenę sytuacji.\n\nRozwijaj. Buduj. Studiuj. Eksperymentuj.\nStaraj się nie zniszczyć niczego, co jest nie do zastąpienia.\n\nŻyczymy ci powodzenia.\n\nNadal nie jesteś mile widziany w powrocie. Sukces nie oznacza, że ludzie zapomnieli.\n\n<color=#A9A9A9>Wpisy tekstowe częściowo wygenerowane za pomocą ChatGTP</color>"
ptBR = "Ao Líder da Expedição,\n\nSeus relatórios foram recebidos.\n\nParece que seu assentamento ainda está vivo e ativo, com uma população crescente.\n\nMais importante, você de alguma forma suportou o contato com a administração sem quaisquer ameaças, sabotagens ou tentativas de assassinato de ambos os lados. Pelo menos até onde sabemos.\n\nPortanto, concluímos que assistência adicional não é mais necessária.\n\nVocê e seu assentamento continuam fazendo parte da orgulhosa nação dos Whitepaws. Não deixe que nossa supervisão reduzida afete seu julgamento.\n\nExpanda. Construa. Estude. Experimente.\nTente não destruir nada que seja irreparável.\n\nDesejamos a você a melhor das sortes.\n\nVocê ainda não é bem-vindo para voltar. O sucesso não significa que as pessoas esqueceram.\n\n<color=#A9A9A9>As entradas de texto foram parcialmente geradas usando ChatGTP</color>"
koKR = "탐험단장님께,\n\n당신의 보고서를 받았습니다.\n\n당신의 정착지가 여전히 잘 살아있고 인구가 증가하고 있는 것 같습니다.\n\n더 중요한 것은, 당신이 어떤 위협, 사보타주, 암살 시도 없이 행정과의 접촉을 견딘 것 같습니다. 적어도 우리가 아는 한에서는 그렇습니다.\n\n그러므로 우리는 더 이상의 지원이 필요 없다는 결론에 도달했습니다.\n\n당신과 당신의 정착지는 자랑스러운 화이트파우스 국가의 일부입니다. 우리의 감시가 줄어들었다고 해서 당신의 판단에 영향을 주지 않도록 하십시오.\n\n확장하십시오. 건설하십시오. 공부하십시오. 실험하십시오.\n대체할 수 없는 것을 파괴하지 않도록 하십시오.\n\n최고의 행운을 기원합니다.\n\n여전히 돌아오는 것은 환영받지 못합니다. 성공했다고 해서 사람들이 잊어버린 것은 아닙니다.\n\n\n\n<color=#A9A9A9>텍스트 항목은 부분적으로 ChatGTP를 사용하여 생성되었습니다</color>"
csCZ = "Drahý vůdče výpravy,\n\nVaše zprávy byly přijaty.\n\nZdá se, že vaše osada je stále naživu a v dobré kondici, s rostoucí populací.\n\nCo je důležitější, nějakým způsobem jste vydrželi kontakt s administrativou bez jakýchkoli hrozeb, sabotáží nebo pokusů o vraždu z obou stran. Alespoň pokud víme.\n\nProto docházíme k závěru, že další pomoc již není nutná.\n\nVy a vaše osada zůstáváte součástí hrdého národa Whitepaws. Nedovolte, aby naše snížená kontrola ovlivnila vaše rozhodování.\n\nRozšiřujte. Stavějte. Studujte. Experimentujte. \nSnažte se nic nenahraditelného nezničit.\n\nPřejeme vám hodně štěstí.\n\nPořád nejste vítáni k návratu. Úspěch neznamená, že na vás lidé zapomnели.\n\n<color=#A9A9A9>Zápisy byly částečně generovány pomocí ChatGTP</color>"
viVN = "Gửi đến Trưởng đoàn Thám hiểm,\n\nCác báo cáo của bạn đã được tiếp nhận.\n\nCó vẻ như khu định cư của bạn vẫn còn sống và phát triển, với dân số ngày càng tăng.\n\nQuan trọng hơn, bạn đã somehow chịu đựng được việc liên lạc với chính quyền mà không có bất kỳ mối đe dọa, phá hoại hay âm mưu ám sát nào từ cả hai bên. Ít nhất là theo những gì chúng tôi biết.\n\nDo đó, chúng tôi kết luận rằng không cần thiết phải hỗ trợ thêm nữa.\n\nBạn và khu định cư của bạn vẫn là một phần của quốc gia Whitepaws kiêu hãnh. Đừng để việc giám sát giảm bớt của chúng tôi ảnh hưởng đến phán đoán của bạn.\n\nMở rộng. Xây dựng. Nghiên cứu. Thí nghiệm.\nCố gắng không phá hủy bất cứ thứ gì không thể thay thế.\n\nChúng tôi chúc bạn gặp nhiều may mắn.\n\nBạn vẫn chưa được chào đón để quay lại. Thành công không có nghĩa là mọi người đã quên.\n\n<color=#A9A9A9>Các mục văn bản được tạo một phần bằng ChatGTP</color>"
trTR = "Keşif Liderine,\n\nRaportlarınız alınmıştır.\n\nGörünüşe göre yerleşiminiz hala hayatta ve iyi durumda, nüfusu da artmaktadır.\n\nDaha da önemlisi, bir şekilde yönetimle iletişim kurmayı tehdit, sabotaj veya her iki tarafta da suikast girişimi olmadan başardınız. En azından bildiğimiz kadarıyla.\n\nBu nedenle, daha fazla yardımın artık gerekli olmadığı sonucuna varıyoruz.\n\nSiz ve yerleşiminiz gururlu Whitepaws ulusunun bir parçası olmaya devam ediyorsunuz. Azalan denetimimizin yargınızı etkilemesine izin vermeyin.\n\nGenişleyin. İnşa edin. Çalışın. Deneyin. \nYerine konulamaz hiçbir şeyi yok etmeye çalışmayın.\n\nSize en iyi şansları diliyoruz.\n\nHala geri dönmenizi beklemiyoruz. Başarı, insanların unuttuğu anlamına gelmez."

