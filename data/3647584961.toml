["Lapantouflemagic.GrandDam.Description"]
raw = "An audacious dam design, loosely based on traditional housing.\nPumps autonomously.\nConsumes planks for maintenance.\n<color=#00FFFF>Works as a Levee</color>\n<color=red>Power must be provided from the sides of the small construction site flag</color>"
status = "normal"
enUS = "An audacious dam design, loosely based on traditional housing. Pumps autonomously. Consumes planks for maintenance. <color=#00FFFF>Works as a Levee</color> <color=red>Power must be provided from the sides of the small construction site flag</color>"
zhCN = "一种大胆的坝设计， loosely based on traditional housing.  \n自动泵水。  \n消耗木板进行维护。  \n<color=#00FFFF>作为堤坝使用</color>  \n<color=red>需要从小建筑工地旗帜的侧面提供电力</color>"
zhTW = "一個大膽的水壩設計，鬆散地基於傳統住宅。  \n自動運行。  \n消耗木板以進行維護。  \n<color=#00FFFF>作為堤壩運作</color>  \n<color=red>必須從小型建築工地旗幟的側面提供電力</color>"
ruRU = "Аудacious проект дамбы, слабо основанный на традиционном жилье.  \nРаботает автономно.  \nПотребляет доски для обслуживания.  \n<color=#00FFFF>Работает как дамба</color>  \n<color=red>Энергия должна поступать с боков флага маленькой строительной площадки</color>"
jaJP = "大胆なダムデザインで、伝統的な住宅に loosely based しています。  \n自動でポンプを動かします。  \nメンテナンスに木材を消費します。  \n<color=#00FFFF>堤防として機能します</color>  \n<color=red>電力は小さな建設現場の旗の側面から供給する必要があります</color>"
frFR = "Une conception de barrage audacieuse, vaguement basée sur des habitations traditionnelles.  \nFonctionne de manière autonome.  \nConsomme des planches pour l'entretien.  \n<color=#00FFFF>Fonctionne comme une digue</color>  \n<color=red>L'électricité doit être fournie par les côtés du petit drapeau de chantier</color>"
deDE = "Ein gewagtes Dammdesign, das lose auf traditionellen Wohnformen basiert.  \nPumpt autonom.  \nVerbraucht Planken für die Wartung.  \n<color=#00FFFF>Funktioniert als Deich</color>  \n<color=red>Strom muss von den Seiten des kleinen Baustellenfahne bereitgestellt werden</color>"
plPL = "Śmiała konstrukcja tamy, luźno oparta na tradycyjnych mieszkaniach.\nPompy działają autonomicznie.\nZużywa deski do konserwacji.\n<color=#00FFFF>Działa jako tama</color>\n<color=red>Energia musi być dostarczana z boków małego flagowego placu budowy</color>"
ptBR = "Um design de represa audacioso, vagamente baseado em habitações tradicionais.  \nBombeia de forma autônoma.  \nConsome tábuas para manutenção.  \n<color=#00FFFF>Funciona como um Dique</color>  \n<color=red>A energia deve ser fornecida a partir dos lados da bandeira do pequeno canteiro de obras</color>"
koKR = "전통 주택을 loosely 기반으로 한 대담한 댐 설계입니다.  \n자율적으로 펌프가 작동합니다.  \n유지 보수를 위해 판자를 소비합니다.  \n<color=#00FFFF>제방으로 작동합니다</color>  \n<color=red>전력은 작은 건설 현장 깃발의 측면에서 공급되어야 합니다</color>"
csCZ = "Odvážný design hráze, volně založený na tradičním bydlení.\nČerpá autonomně.\nSpotřebovává desky na údržbu.\n<color=#00FFFF>Funguje jako hráz</color>\n<color=red>Napájení musí být zajištěno z boků malého staveništního vlajku</color>"
viVN = "Một thiết kế đập táo bạo, dựa lỏng lẻo trên nhà truyền thống. \nBơm nước tự động. \nTiêu thụ ván để bảo trì. \n<color=#00FFFF>Hoạt động như một đê</color> \n<color=red>Nguồn điện phải được cung cấp từ hai bên của cờ xây dựng nhỏ</color>"
trTR = "Cesur bir baraj tasarımı, geleneksel konutlardan serbestçe esinlenmiştir.\nOtonom olarak çalışır.\nBakım için tahtaları tüketir.\n<color=#00FFFF>Bir Set gibi çalışır</color>\n<color=red>Güç, küçük inşaat alanı bayrağının yanlarından sağlanmalıdır</color>"

["Lapantouflemagic.GrandDam.FlavorDescription"]
raw = "\"Soo... strictly speaking, the dam part is... not the housexa0? I don’t know if that is a brilliant idea, or if i should call the gesta-paw…\"\n-The Expedition Leader"
status = "normal"
enUS = "\"Soo... strictly speaking, the dam part is... not the house? I don’t know if that is a brilliant idea, or if I should call the gesta-paw…\"  \n-The Expedition Leader"
zhCN = "“所以……严格说来，坝的部分是……不是房子吗？我不知道这是个聪明的主意，还是应该叫个抓狗……”  \n- 探险队长"
zhTW = "「所以……嚴格來說，水壩部分是……不是房子嗎？我不知道這是個好主意，還是我應該叫警衛狗……」  \n-探險隊長"
ruRU = "\"Итак... строго говоря, часть дамбы — это... не дом? Я не знаю, гениальная ли это идея, или мне стоит позвонить геста-лаче...\"  \n— Лидер экспедиции"
jaJP = "「ええと…厳密に言うと、ダムの部分は…家じゃないのかな？それが素晴らしいアイデアなのか、それともゲスタ-ポーを呼ぶべきなのか分からない…」  \n-探検隊のリーダー"
frFR = "\"Soo... pour être strictement exact, la partie barrage n'est... pas la maison ? Je ne sais pas si c'est une idée brillante, ou si je devrais appeler la gesta-paw...\"\n-Le Chef d'Expédition"
deDE = "\"Also... streng genommen ist der Dammteil... nicht das Hausxa0? Ich weiß nicht, ob das eine geniale Idee ist oder ob ich die gestapo-pfote rufen sollte...\" -Der Expeditionsleiter"
plPL = "\"Soo... ścisłe mówiąc, część zapory to... nie dom? Nie wiem, czy to genialny pomysł, czy powinienem zadzwonić po gestu-paw…\"  \n-Przywódca Wyprawy"
ptBR = "\"Soo... estritamente falando, a parte da represa é... não a casa? Eu não sei se isso é uma ideia brilhante ou se devo chamar a gest-pata...\"  \n-Líder da Expedição"
koKR = "\"음... 엄밀히 말하자면, 댐 부분은... 집이 아니야? 그게 멋진 아이디어인지, 아니면 겐스타-포를 불러야 할지 모르겠어...\"\n- 탐험대장"
csCZ = "\"Takže... striktně vzato, ta část přehrady je... ne dům? Nejsem si jistý, jestli je to skvělý nápad, nebo jestli bych měl zavolat gesta-paw…\"\n-Vůdce expedice"
viVN = "\"Soo... nói một cách chính xác, phần đập là... không phải là ngôi nhàxa0? Tôi không biết đó có phải là một ý tưởng tuyệt vời hay không, hoặc tôi nên gọi gesta-paw…\"\n-Lãnh đạo cuộc thám hiểm"
trTR = "\"Yani... tam olarak söylemek gerekirse, baraj kısmı... ev değil mi? Bunun harika bir fikir olup olmadığını bilmiyorum, yoksa gesta-paw'ı mı aramalıyım…\"\n- Keşif Lideri"

