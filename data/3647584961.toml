zhTW = "<color=red>這座建築已經過時，缺少一些新功能！等有機會時請用新的建築來替換它。</color>"
ruRU = "<color=red>Это здание устарело и не поддерживает некоторые новые функции! Замените его на новое, когда у вас будет возможность.</color>"
jaJP = "<color=red>この建物は廃止されており、新しい機能が欠けています！\n機会があれば、新しい建物に置き換えてください。</color>"
