["Faction.Whitepaws.GameOver.Flavor"]
raw = "We told you it would be hard, now what went wrong? Too small of a dam ? Excessive use of prioritization? Overly zealous colony extension ? Learn from your mistakes and try again.\nYou can do it, who cares about the lives squandered in the process?"
status = "normal"
enUS = "We told you it would be hard, now what went wrong? Too small of a dam? Excessive use of prioritization? Overly zealous colony extension? Learn from your mistakes and try again. You can do it, who cares about the lives squandered in the process?"
zhCN = "“我们告诉过你这会很困难，现在出错了什么？水坝太小了吗？过度使用优先级？过于热衷的殖民扩展？从你的错误中吸取教训，再试一次。\n你可以做到的，谁在乎过程中浪费的生命？”"
zhTW = "「我們告訴過你這會很困難，現在出了什麼問題？水壩太小？優先級使用過多？殖民地擴展過於狂熱？從你的錯誤中學習，然後再試一次。\n你可以做到，誰在乎過程中浪費的生命？」"
ruRU = "Мы говорили, что это будет трудно, что же пошло не так? Слишком малая плотина? Чрезмерное использование приоритизации? Чрезмерное расширение колонии? Учитесь на своих ошибках и пробуйте снова. Вы справитесь, кому какое дело до жизней, потраченных впустую в этом процессе?"
jaJP = "「私たちはそれが難しいと言ったでしょう。さて、何がうまくいかなかったのですか？ダムが小さすぎた？優先順位の使いすぎ？あまりにも熱心なコロニーの拡張？あなたの間違いから学んで再挑戦してください。あなたならできます、プロセスで無駄にされた命なんて誰が気にしますか？」"
frFR = "Nous vous avons dit que ce serait difficile, qu'est-ce qui a mal tourné ? Un barrage trop petit ? Utilisation excessive de la priorisation ? Extension de colonie trop zélée ? Apprenez de vos erreurs et réessayez.\nVous pouvez le faire, qui se soucie des vies gaspillées dans le processus ?"
deDE = "Wir haben dir gesagt, dass es schwierig werden würde. Was ist jetzt schiefgelaufen? Ein zu kleiner Damm? Übermäßige Priorisierung? Übermäßig eifrige Kolonievergrößerung? Lerne aus deinen Fehlern und versuche es erneut. Du kannst es schaffen, wer kümmert sich um die Leben, die dabei verschwendet wurden?"
plPL = "Mówiliśmy, że to będzie trudne, co poszło nie tak? Za mała tama? Nadmierne korzystanie z priorytetyzacji? Zbyt gorliwe rozszerzenie kolonii? Ucz się na swoich błędach i spróbuj ponownie.\nDasz radę, kogo obchodzi życie zmarnowane w tym procesie?"
ptBR = "Dissemos que seria difícil, o que deu errado agora? Represa muito pequena? Uso excessivo de priorização? Extensão de colônia excessivamente entusiástica? Aprenda com seus erros e tente novamente. Você consegue, quem se importa com as vidas desperdiçadas no processo?"
koKR = "우리는 당신에게 어려울 것이라고 말했어요, 이제 무엇이 잘못되었나요? 댐이 너무 작았나요? 우선순위 사용이 과도했나요? 지나치게 열정적인 식민지 확장이었나요? 실수에서 배우고 다시 시도하세요. 당신은 할 수 있어요, 과정에서 낭비된 생명은 누가 신경 쓰나요?"
csCZ = "Řekli jsme ti, že to bude těžké, co se teď pokazilo? Příliš malá přehrada? Nadměrné využívání prioritizace? Příliš horlivé rozšiřování kolonie? Učte se z svých chyb a zkuste to znovu. Můžete to dokázat, kdo se stará o životy promarněné v procesu?"
viVN = "Chúng tôi đã nói với bạn rằng điều này sẽ khó khăn, vậy chuyện gì đã sai? Đập quá nhỏ? Sử dụng quá mức sự ưu tiên? Mở rộng thuộc địa quá nhiệt tình? Học hỏi từ những sai lầm của bạn và thử lại.\nBạn có thể làm được, ai quan tâm đến những sinh mạng đã bị lãng phí trong quá trình này?"
trTR = "Sana zor olacağını söyledik, şimdi ne yanlış gitti? Çok küçük bir baraj mı? Aşırı önceliklendirme mi? Fazla hevesli koloniyi genişletme mi? Hatalarından ders al ve tekrar dene. Bunu yapabilirsin, süreçte harcanan hayatlar kimsenin umurunda değil mi?"

