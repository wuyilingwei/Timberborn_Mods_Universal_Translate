["Lapantouflemagic.SolarArray.Description"]
raw = "Captures sunlight and turns it into this weird \"electricity\" thing according to ancient hooman texts. Better keep an eye on it, and an other eye on where you step."
status = "normal"
enUS = "Captures sunlight and turns it into this weird 'electricity' thing according to ancient human texts. Better keep an eye on it, and another eye on where you step."
zhCN = "“捕捉阳光，并根据古老的人类文本将其转化为这种奇怪的‘电’东西。最好留意它，同时也要注意你走在哪里。”"
zhTW = "捕捉陽光並根據古老的人類文本將其轉化為這種奇怪的「電」東西。最好時刻關注它，並隨時注意自己的腳步。"
ruRU = "Улавливает солнечный свет и превращает его в это странное «электричество», согласно древним человеческим текстам. Лучше следить за ним и за тем, куда вы ступаете."
jaJP = "「太陽光を捕らえて、古代の人間の文献によればこの奇妙な「電気」というものに変える。よく見ておく必要があるし、もう一つの目は足元を見ておく必要がある。」"
frFR = "Capture la lumière du soleil et la transforme en cette étrange chose appelée 'électricité' selon des anciens écrits humains. Mieux vaut garder un œil dessus, et un autre sur où vous mettez les pieds."
deDE = "Fängt Sonnenlicht ein und verwandelt es laut alten Hooman-Texten in dieses seltsame 'Strom'-Ding. Besser du behältst es im Auge und auch ein anderes Auge darauf, wo du trittst."
plPL = "Zbiera światło słoneczne i zamienia je w ten dziwny „elektryczność” zgodnie z pradawnymi ludzkimi tekstami. Lepiej miej to na oku, a drugie oko na to, gdzie stąpasz."
ptBR = "Captura a luz do sol e a transforma nessa estranha coisa chamada 'eletricidade', de acordo com antigos textos humanos. É melhor ficar de olho nisso e com o outro olho onde você pisa."
koKR = "햇빛을 포착하여 고대 인간 문헌에 따르면 이 이상한 '전기'로 변환합니다. 잘 지켜보고, 한 쪽 발도 어디를 디디는지 살펴보는 것이 좋습니다."
csCZ = "Zachytává sluneční světlo a přetváří ho na tu zvláštní „elektrickou“ věc podle starobylých lidských textů. Raději si ho hlídejte a nezapomeňte dávat pozor, kam šlapete."
viVN = "Bắt ánh sáng mặt trời và biến nó thành thứ \"điện\" kỳ quặc này theo các văn bản cổ xưa của con người. Tốt hơn hết là bạn nên để mắt tới nó, và một cái nữa để nhìn xem bạn đặt chân ở đâu."
trTR = "Güneş ışığını toplar ve eski insan metinlerine göre bu garip 'elektrik' şeyine dönüştürür. Üzerinde gözünüzü ve hangi yöne adım attığınıza da bir göz atmalısınız."

["Lapantouflemagic.SolarArray.FlavorDescription"]
raw = "\"Eheh, the fun part is to cook slices of pumpkins on the hot surfaces in summer\"\n- the array supervising beaver"
status = "normal"
enUS = "Eheh, the fun part is to cook slices of pumpkins on the hot surfaces in summer\" - the array supervising beaver"
zhCN = "“嘿嘿，有趣的部分是在夏天把南瓜片放在热面上烹饪”  \n- 负责监视的海狸"
zhTW = "「嘿嘿，樂趣在於在夏天的熱面上煮南瓜片」  \n- 這是監督太陽能發電陣的海狸"
ruRU = "\"Эхех, забавная часть — это жарить куски тыквы на горячих поверхностях летом\" - бобёр, следящий за массивом"
jaJP = "「えへへ、楽しいのは夏に熱い表面でかぼちゃのスライスを焼くことだ」  \n- 配列を監督するビーバー"
frFR = "\"Eheh, la partie amusante est de faire cuire des tranches de citrouilles sur les surfaces chaudes en été\" - le castor superviseur de l'installation"
deDE = "\"Eheh, das Lustige daran ist, dass man im Sommer Kürbisscheiben auf den heißen Oberflächen braten kann.\" - der arrayüberwachende Biber"
plPL = "Eheh, najfajniejsza część to gotowanie plastrów dyni na gorących powierzchniach latem\" - \"bóbr nadzorujący sieć"
ptBR = "\"Eheh, a parte divertida é cozinhar fatias de abóbora nas superfícies quentes no verão\" - o castor supervisor da matriz"
koKR = "\"헤헤, 재미있는 부분은 여름철에 뜨거운 표면 위에서 호박 조각을 요리하는 거야.\"  \n- 배열을 감독하는 비버"
csCZ = "\"Eheh, zábavná část je vařit plátky dýně na horkých plochách v létě\" - bobr dohlížející na pole"
viVN = "\"Eheh, phần thú vị là nướng những lát bí trên những bề mặt nóng vào mùa hè\" - con nhím giám sát dãy năng lượng."
trTR = "Eheh, eğlenceli kısım yazın sıcak yüzeylerde kabak dilimleri pişirmek. - diziyi denetleyen kunduz"

