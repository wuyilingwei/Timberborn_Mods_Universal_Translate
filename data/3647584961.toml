["Lapantouflemagic.GoldFence.Description"]
raw = "A fence made out of solid gold for people who have waaay too much of it on their paws, somehow."
status = "normal"
enUS = "A fence made out of solid gold for those who have way too much of it on their hands, somehow."
zhCN = "“一个由坚固黄金制成的围栏，适合那些手上有太多黄金的人，不知如何处理。”"
zhTW = "一個用固體金製成的圍欄，適合那些不知為何手上有太多金子的人。"
ruRU = "Забор изSolid золота для людей, у которых на лапах как-то слишком много этого."
jaJP = "どういうわけか、手に金がありすぎる人のために作られた、固体金のフェンス。"
frFR = "Une clôture en or massif pour les personnes qui en ont tellement sur les pattes, d'une manière ou d'une autre."
deDE = "Ein Zaun aus massivem Gold für Menschen, die irgendwie viel zu viel davon an ihren Pfoten haben."
plPL = "Płot zrobiony z solidnego złota dla ludzi, którzy w jakiś sposób mają go zbyt dużo na łapkach."
ptBR = "Uma cerca feita de ouro sólido para pessoas que têm ouro demais nas patas, de alguma forma."
koKR = "어떻게든 손에 금이 지나치게 많은 사람들을 위한 단단한 금으로 만들어진 울타리입니다."
csCZ = "Plot z čistého zlata pro lidi, kteří mají na svých tlapkách nějakým způsobem příliš mnoho."
viVN = "Một hàng rào được làm từ vàng ròng cho những người có quá nhiều vàng trong tay, bằng cách nào đó."
trTR = "İşte ellerinde fazla fazla bulunan katı altından yapılmış bir çit, nasıl olduğunu anlayamadığımız şekilde."

