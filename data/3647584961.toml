["Lapantouflemagic.Ropemaker.FlavorDescription"]
raw = "A popular beaver entertainment is to throw random things in the spindle to watch them get crushed."
status = "normal"
enUS = "A popular beaver pastime is throwing random objects into the spindle to see them get crushed."
zhCN = "“一个受欢迎的海狸娱乐活动是把随机物品扔进纺锤，看它们被压碎。”"
zhTW = "海狸們喜歡的娛樂活動是把隨機的東西扔進紡錘裡，看著它們被壓碎。"
ruRU = "Популярным развлечением бобров является бросание случайных вещей в прялку, чтобы наблюдать, как они разрушаются."
jaJP = "ビーバーたちのお気に入りの娯楽は、スピンドルにランダムな物を投げ入れて、それらが押しつぶされるのを見ることです。"
frFR = "Un divertissement populaire chez les castors consiste à jeter des objets aléatoires dans le rouet pour les voir se faire écraser."
deDE = "Eine beliebte Freizeitbeschäftigung der Biber ist es, zufällige Dinge in die Spindel zu werfen, um zuzusehen, wie sie zerdrückt werden."
plPL = "Popularną rozrywką bobrów jest wrzucanie przypadkowych przedmiotów do wrzeciona, aby obserwować, jak są miażdżone."
ptBR = "Um entretenimento popular entre os castores é jogar coisas aleatórias na roca para vê-las serem trituradas."
koKR = "버드나무의 인기 있는 오락 중 하나는 랜덤한 물건을 스핀들에 던져서 부서지는 모습을 보는 것입니다."
csCZ = "Populární zábavou bobrů je házet do vřetena různé věci, aby je mohli sledovat, jak se drtí."
viVN = "Một trò giải trí phổ biến của những con hải ly là ném những thứ ngẫu nhiên vào trục quay để xem chúng bị nghiền nát."
trTR = "Bir popüler kunduz eğlencesi, rastgele nesneleri makaraya atmak ve onların ezilmesini izlemektir."

