["Luc.Architect.Description"]
raw = "A fancy building to help architects show they're better than us. Also used to design structurally sound buildings. \n<color=green>Works as a big staircase</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A fancy building to help architects show they're better than us. Also used to design structurally sound buildings. \n<color=green>Works as a big staircase</color>\n<color=#00FFFF>Works as a Levee</color>"
zhCN = "“一个华丽的建筑，帮助建筑师向我们展示他们比我们优秀。也用于设计结构合理的建筑。\n<color=green>作为一个大阶梯使用</color>\n<color=#00FFFF>作为一个堤坝使用</color>”"
zhTW = "一座華麗的建築，幫助建築師展示他們優於我們的地方。同時也用於設計結構穩固的建築。\n<color=green>作為大樓梯運作</color>\n<color=#00FFFF>作為堤壩運作</color>"
ruRU = "Шикарное здание, чтобы помочь архитекторам показать, что они лучше нас. Также используется для проектирования структурно прочных зданий. \n<color=green>Работает как большая лестница</color>\n<color=#00FFFF>Работает как укрепление</color>"
jaJP = "建築家が自分たちが私たちより優れていることを示すための豪華な建物。構造的に健全な建物を設計するためにも使用されます。  \n<color=green>大きな階段として機能します</color>  \n<color=#00FFFF>堤防として機能します</color>"
frFR = "Un bâtiment élégant pour aider les architectes à montrer qu'ils sont meilleurs que nous. Également utilisé pour concevoir des bâtiments structurellement solides.  \n<color=green>Fonctionne comme un grand escalier</color>  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Ein schickes Gebäude, um Architekten zu zeigen, dass sie besser sind als wir. Wird auch verwendet, um stabil gebaute Gebäude zu entwerfen. \n<color=green>Funktioniert als große Treppe</color>\n<color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Elegancki budynek, który pomaga architektom pokazać, że są lepsi od nas. Używany także do projektowania konstrukcji solidnych budynków. \n<color=green>Działa jak duża klatka schodowa</color>\n<color=#00FFFF>Działa jak wał przeciwpowodziowy</color>"
ptBR = "Um edifício elegante para ajudar os arquitetos a mostrar que são melhores que nós. Também usado para projetar edifícios estruturalmente sólidos.  \n<color=green>Funciona como uma grande escada</color>  \n<color=#00FFFF>Funciona como um Dique</color>"
koKR = "건축가들이 자신들이 우리보다 낫다는 것을 보여줄 수 있도록 도와주는 화려한 건물입니다. 또한 구조적으로 안전한 건물을 설계하는 데 사용됩니다.  \n<color=green>큰 계단으로 작동합니다</color>  \n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Skvělá budova, která pomáhá architektům ukázat, že jsou lepší než my. Také se používá k navrhování strukturálně pevně postavených budov.  \n<color=green>Funguje jako velké schodiště</color>  \n<color=#00FFFF>Funguje jako protipovodňová hráz</color>"
viVN = "Một tòa nhà sang trọng để giúp các kiến trúc sư thể hiện họ vượt trội hơn chúng ta. Cũng được sử dụng để thiết kế các tòa nhà có cấu trúc vững chắc. \n<color=green>Hoạt động như một cầu thang lớn</color>\n<color=#00FFFF>Hoạt động như một đê</color>"
trTR = "Bizden daha iyi olduklarını göstermek için mimarların kullandığı şık bir bina. Ayrıca yapısal olarak sağlam binalar tasarlamak için de kullanılır. \n<color=green>Büyük bir merdiven olarak çalışır</color>\n<color=#00FFFF>Koruma seti olarak çalışır</color>"

