["Lapantouflemagic.Topentrancewatertightlodge_LiquidStorage.Description"]
raw = "A medium-sized lodge for one hauler, built around a ladder.\nManages a tank of liquid storage.\nCan be stacked on itself, variants, and can carry select buildings.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A medium-sized lodge for one hauler, built around a ladder. Manages a tank of liquid storage. Can be stacked on itself, variants, and can carry select buildings. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一个中型的小屋，可容纳一名搬运工，围绕梯子建造。\n管理一个液体存储罐。\n可以自我堆叠，具有不同变体，并可以携带特定建筑。\n<color=#00FFFF>作为堤坝使用</color>"
zhTW = "一個中等大小的住處，適合一名搬運工，圍繞著一個梯子建造。\n管理一個液體儲存槽。\n可以堆疊在自身上、變體，並且可以攜帶選定的建築物。\n<color=#00FFFF>作為堤岸運作</color>"
ruRU = "Среднего размера хижина для одного грузчика, построенная вокруг лестницы. Управляет баком для хранения жидкости. Может раскладываться на себе, имеет вариации и может нести выбранные строения. <color=#00FFFF>Работает как плотина</color>"
jaJP = "中型のロッジで、1人の運搬者のために建てられ、はしごの周りに構築されています。液体貯蔵タンクを管理します。自分自身やバリエーションに積み重ね可能で、特定の建物を運ぶことができます。<color=#00FFFF>堤防として機能します</color>"
frFR = "Un pavillon de taille moyenne pour un porteur, construit autour d'une échelle.\nGère un réservoir de stockage de liquide.\nPeut être empilé sur lui-même, variantes, et peut transporter certains bâtiments.\n<color=#00FFFF>Fonctionne comme un levier</color>"
deDE = "Eine mittelgroße Lodge für einen Transporteur, gebaut um eine Leiter.\nVerwaltet einen Flüssigkeitsspeichertank.\nKann auf sich selbst gestapelt werden, Variationen und kann ausgewählte Gebäude tragen.\n<color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Średniej wielkości chata dla jednego nosiciela, zbudowana wokół drabiny.\nZarządza zbiornikiem do przechowywania cieczy.\nMoże być układana na sobie, warianty i może przewozić wybrane budynki.\n<color=#00FFFF>Działa jak zapora</color>"
ptBR = "Uma cabana de tamanho médio para um transportador, construída em torno de uma escada.\nGerencia um tanque de armazenamento de líquidos.\nPode ser empilhada sobre si mesma, variantes, e pode carregar edifícios selecionados.\n<color=#00FFFF>Funciona como um Dique</color>"
koKR = "하나의 운반자를 위한 중간 크기의 오두막으로, 사다리를 중심으로 지어졌습니다.\n액체 저장용 탱크를 관리합니다.\n자기 자신과 변형 스택이 가능하며 특정 건물을 운반할 수 있습니다.\n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Středně velká chata pro jednoho nosiče, postavená kolem žebříku. Spravuje nádrž na kapaliny. Může se na sebe skládat, varianty a může nést vybrané budovy. <color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một nhà nghỉ kích thước trung bình dành cho một người vận chuyển, được xây dựng xung quanh một cái thang.  \nQuản lý một bể chứa lỏng.  \nCó thể xếp chồng lên nhau, các biến thể, và có thể mang theo những tòa nhà chọn lọc.  \n<color=#00FFFF>Hoạt động như một Đê</color>"
trTR = "Bir taşıyıcı için inşa edilmiş, merdivenin etrafında döngüsel bir yapıya sahip orta boy bir yapı.\nSıvı depolama tankını yönetir.\nKendisi, varyantlar üzerinde üst üste yerleştirilebilir ve belirli yapıları taşıyabilir.\n<color=#00FFFF>Set gibi çalışır</color>"

["Lapantouflemagic.Topentrancewatertightlodge_LiquidStorage.FlavorDescription"]
raw = "\"Architects must have had severe constraints on this thing to accept making it simple and functional.\"\n -An engineer beaver"
status = "normal"
enUS = "\"Architects must have had severe constraints on this thing to accept making it simple and functional.\"  \n-An engineer beaver"
zhCN = "“建筑师们一定在这个东西上受到严重限制，因此选择让它简单而实用。”  \n- 一只工程师海狸"
zhTW = "「建築師必定面對嚴重的限制，才接受將這個設施簡化並使其功能性。」  \n- 一隻工程師海狸"
ruRU = "«Архитекторы, должно быть, столкнулись с серьезными ограничениями, чтобы согласиться сделать это простым и функциональным».  \n— Инженер-бобер"
jaJP = "「この物をシンプルで機能的にすることを受け入れるためには、設計者は厳しい制約を受けていたに違いない。」 - エンジニアビーバー"
frFR = "\"Les architectes ont dû faire face à de sévères contraintes pour accepter de le rendre simple et fonctionnel.\"  \n- Un castor ingénieur"
deDE = "\"Die Architekten müssen bei diesem Ding strenge Vorgaben gehabt haben, um es einfach und funktional zu gestalten.\" -Ein ingenieurlicher Biber"
plPL = "\"Architekci musieli mieć poważne ograniczenia, aby zgodzić się na zrobienie tego prostym i funkcjonalnym.\"  \n -Inżynier bobrów"
ptBR = "\"Os arquitetos devem ter enfrentado severas restrições para aceitar fazê-lo simples e funcional.\"  \n-Um castor engenheiro"
koKR = "\"건축가들은 이 물건을 간단하고 기능적으로 만들도록 받아들이기 위해 심각한 제약을 받았음에 틀림없습니다.\"  \n- 공학 비버"
csCZ = "\"Architekti museli mít na tuto věc velmi přísné omezení, aby souhlasili s tím, že ji udělají jednoduchou a funkční.\"  \n- Inženýr bobr"
viVN = "\"Các kiến trúc sư chắc hẳn đã phải đối mặt với những hạn chế nghiêm trọng khi chấp nhận làm cho nó đơn giản và chức năng.\"  \n- Một chú người thú kỹ sư"
trTR = "\"Mimarların bu şeyi basit ve işlevsel hale getirmek için ciddi kısıtlamalarla karşılaşmış olmalı.\"  \n -Bir mühendis kunduz"

