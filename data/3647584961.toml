status = "normal"
enUS = "A proper lodging for an anvil, and the beavers using it. Has a <color=#FF6EC7>triangle roof</color>, <color=#FF6EC7>Can support upgrades</color> <color=#00FFFF>Works as a Levee</color>"
zhCN = "一个适合砧锤的合适木屋，以及使用它的海狸。\n有一个<color=#FF6EC7>三角屋顶</color>，<color=#FF6EC7>可以支持升级</color>\n<color=#00FFFF>作为堤坝使用</color>"
zhTW = "一個合適的鐵砧小屋，和使用它的海狸。  \n擁有一個<color=#FF6EC7>三角屋頂</color>，<color=#FF6EC7>可以支持升級</color>  \n<color=#00FFFF>作為堤防運作</color>"
ruRU = "Надлежащее жилье для наковальни и бобров, которые её используют.  \nИмеет <color=#FF6EC7>треугольную крышу</color>, <color=#FF6EC7>может поддерживать улучшения</color>  \n<color=#00FFFF>Работает как дамба</color>"
jaJP = "「ハンマーのための適切な宿泊施設であり、それを利用するビーバーたち。\n<color=#FF6EC7>三角屋根</color>を持ち、<color=#FF6EC7>アップグレードをサポートできます</color>\n<color=#00FFFF>堤防として機能します</color>」"
frFR = "Un abri adéquat pour une enclume, et les castors qui l'utilisent.  \nA un <color=#FF6EC7>toit en triangle</color>, <color=#FF6EC7>peut supporter des améliorations</color>  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Ein richtiges Logding für einen Hammer und die Biber, die ihn benutzen. Hat ein <color=#FF6EC7>Dach in Form eines Dreiecks</color>, <color=#FF6EC7>Kann Upgrades unterstützen</color> <color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Właściwe miejsce na kowadło oraz bobry, które z niego korzystają. Posiada <color=#FF6EC7>trójkątny dach</color>, <color=#FF6EC7>może wspierać ulepszenia</color> <color=#00FFFF>działa jako wał</color>"
ptBR = "Uma moradia adequada para uma bigorna e os castores que a utilizam. Tem um <color=#FF6EC7>telhado triangular</color>, <color=#FF6EC7>Pode suportar melhorias</color> <color=#00FFFF>Funciona como um Dique</color>"
koKR = "망치를 위한 적절한 숙소이며, 그것을 사용하는 비버들입니다. \n<color=#FF6EC7>삼각형 지붕</color>이 있으며, <color=#FF6EC7>업그레이드를 지원할 수 있습니다</color>. \n<color=#00FFFF>제방으로 작동합니다</color>."
csCZ = "Náležitý stojan pro anvil a bobry, které ho používají. Má <color=#FF6EC7>trojúhelníkovou střechu</color>, <color=#FF6EC7>Může podporovat vylepšení</color> <color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một nơi đúng đắn cho một chiếc búa, và những con hải ly sử dụng nó. \nCó một <color=#FF6EC7>mái nhà hình tam giác</color>, <color=#FF6EC7>Có thể hỗ trợ nâng cấp</color> \n<color=#00FFFF>Hoạt động như một con đê</color>"
trTR = "Bir anvil için uygun bir konaklama ve onu kullanan kunduzlar.\n<color=#FF6EC7>üçgen çatı</color> var, <color=#FF6EC7>geliştirmeleri destekleyebilir</color>\n<color=#00FFFF>Bir Set gibi çalışır</color>"

["Lapantouflemagic.SmallForge.FlavorDescription"]
raw = "“Bam ! One for daddy. Pow ! One for mommy. Wham ! One straight in Bobby’s teeth…”"
status = "normal"
enUS = "Bam! One for daddy. Pow! One for mommy. Wham! One straight in Bobby’s teeth…"
zhCN = "“砰！爸爸一个。啪！妈妈一个。咔嚓！正中鲍比的牙齿……”"
zhTW = "「轟！一個給爸爸。砰！一個給媽媽。咣！一個正中鮑比的牙齒……」"
ruRU = "Бам! Один для папы. С Pow! Один для мамы. Ух! Прямо в зубы Бобби..."
jaJP = "「バン！パパのために一つ。パウ！ママのために一つ。ワム！ボビーの歯に一発…」"
frFR = "« Bam ! Un pour papa. Pow ! Un pour maman. Wham ! Un droit dans les dents de Bobby… »"
deDE = "„Bam! Eines für Papa. Pow! Eines für Mama. Wham! Eines direkt in Bobbys Zähne…“"
plPL = "„Bam! Jedno dla taty. Pow! Jedno dla mamy. Wham! Prosto w zęby Bobby'ego…”"
ptBR = "“Bam! Um para o papai. Pow! Um para a mamãe. Wham! Um direto nos dentes do Bobby…”"
koKR = "“붐! 아빠를 위한 하나. 파웅! 엄마를 위한 하나. 쾅! 바비의 이빨에 그대로…”"
csCZ = "„Bam! Jeden pro tatínka. Paf! Jeden pro maminku. Bum! Jeden přímo do Bobbyho zubů…“"
viVN = "“Bíp ! Một cho ba. Bùm ! Một cho mẹ. Đùng ! Một thẳng vào răng của Bobby…”"
trTR = "Bang! Bir tane baba için. Pat! Bir tane anne için. Çat! Bobby'nin dişine bir tane direkt..."

