["Lapantouflemagic.FarmLumberjackUpgrade.Description"]
raw = "An upgrade module to be placed on top of two adjacent <color=#FF6EC7>triangle roof</color> buildings.\nEven more logging! Death to the treesxa0!\nHas a lot of storage space.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "An upgrade module to be placed on top of two adjacent <color=#FF6EC7>triangle roof</color> buildings.  \nEven more logging! Death to the trees!  \nHas a lot of storage space.  \n<color=#00FFFF>Works as a Levee</color>"
zhCN = "一个升级模块，放置在两个相邻的<color=#FF6EC7>三角屋顶</color>建筑顶部。\n更多的伐木！树木必死无疑xa0！\n有很多储存空间。\n<color=#00FFFF>作为堤坝工作</color>"
zhTW = "一個可以放置在兩個相鄰<color=#FF6EC7>三角屋頂</color>建築頂部的升級模塊。\n更加高效的伐木！樹木必死無疑！\n擁有大量的儲存空間。\n<color=#00FFFF>能夠作為堤壩使用</color>"
ruRU = "Модуль улучшения, который устанавливается на вершине двух соседних <color=#FF6EC7>треугольных крыш</color> зданий.  \nЕщё больше вырубки! Смерть деревьямxa0!  \nИмеет много места для хранения.  \n<color=#00FFFF>Работает как насыпь</color>"
jaJP = "隣接する二つの<color=#FF6EC7>三角屋根</color>の建物の上に置かれるアップグレードモジュールです。  \nさらに多くの伐採を実現します！木々に死を！  \n大量の収納スペースを持っています。  \n<color=#00FFFF>堤防として機能します</color>"
frFR = "Un module de mise à niveau à placer au sommet de deux bâtiments adjacents à <color=#FF6EC7>toit triangulaire</color>.\nEncore plus de bois ! Mort aux arbresxa0 !\nDispose de beaucoup d'espace de stockage.\n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Ein Upgrade-Modul, das oben auf zwei benachbarten <color=#FF6EC7>dachförmigen Gebäuden</color> platziert wird.  \nNoch mehr Holzernte! Tod den Bäumen!  \nHat viel Stauraum.  \n<color=#00FFFF>Funktioniert wie ein Deich</color>"
plPL = "Moduł ulepszenia do umieszczenia na dwóch sąsiednich budynkach <color=#FF6EC7>trójkątnych dachów</color>.  \nJeszcze więcej wycinki! Śmierć drzewomxa0!  \nMa dużo miejsca na przechowywanie.  \n<color=#00FFFF>Działa jak wał</color>"
ptBR = "Um módulo de upgrade a ser colocado no topo de dois edifícios <color=#FF6EC7>de telhado triangular</color> adjacentes.  \nAinda mais corte de árvores! Morte às árvoresxa0!  \nPossui muito espaço de armazenamento.  \n<color=#00FFFF>Funciona como um dique</color>"
koKR = "이웃한 두 개의 <color=#FF6EC7>삼각 지붕</color> 건물 위에 놓을 수 있는 업그레이드 모듈입니다.  \n더 많은 벌목! 나무에게 죽음을xa0!  \n저장 공간이 넉넉합니다.  \n<color=#00FFFF>제방처럼 작동합니다</color>"
csCZ = "Modul vylepšení, který se umisťuje na vrch dvou sousedních <color=#FF6EC7>trojúhelníkových střech</color> budov.  \nJeště více kácení! Smrt stromům xa0!  \nMá spoustu úložného prostoru.  \n<color=#00FFFF>Funguje jako nábřeží</color>"
viVN = "Một mô-đun nâng cấp được đặt lên trên hai tòa nhà <color=#FF6EC7>mái nhà hình tam giác</color> liền kề.\nCắt gỗ còn nhiều hơn! Diệt cây xa0!\nCó rất nhiều không gian lưu trữ.\n<color=#00FFFF>Hoạt động như một đê</color>"
trTR = "İki bitişik <color=#FF6EC7>üçgen çatı</color> binasının üstüne yerleştirilecek bir yükseltme modülü.\nDaha fazla ağaç kesimi! Ağaçlara ölümxa0!\nÇok fazla depolama alanı var.\n<color=#00FFFF>Set olarak çalışır</color>"

["Lapantouflemagic.FarmLumberjackUpgrade.FlavorDescription"]
raw = "\"Can you imagine the pain if we didn’t insist to have a crane?\""
status = "normal"
enUS = "\"Can you imagine the pain if we didn’t insist on having a crane?\""
zhCN = "“你能想象如果我们不坚持要有起重机会有多痛苦吗？”"
zhTW = "「你能想像如果我們不堅持要有一台起重機，會有多痛苦嗎？」"
ruRU = "\"Можешь представить себе боль, если бы мы не настаивали на кране?\""
jaJP = "「クレーンを必ず持つように主張しなかったら、その辛さを想像できますか？」"
frFR = "\"Pouvez-vous imaginer la douleur si nous n’insistions pas pour avoir une grue ?\""
deDE = "\"Kannst du dir den Schmerz vorstellen, wenn wir nicht darauf bestanden hätten, einen Kran zu haben?\""
plPL = "Czy możesz sobie wyobrazić ból, gdybyśmy nie nalegali na to, aby mieć dźwig?"
ptBR = "\"Você consegue imaginar a dor se não insistíssemos em ter um guindaste?\""
koKR = "\"크레인을 꼭 필요하다고 주장하지 않았다면, 그 고통을 상상할 수 있나요?\""
csCZ = "\"Dokážete si představit bolest, kdybychom netrvali na jeřábu?\""
viVN = "Bạn có thể tưởng tượng được nỗi đau nếu chúng ta không khăng khăng đòi có một cái cần cẩu không?"
trTR = "Bir vinç istemediğimizde çekeceğimiz acıyı hayal edebiliyor musun?"

["Lapantouflemagic.FarmUpgradeA.Description"]
raw = "An upgrade module to be placed on top of two adjacent <color=#FF6EC7>triangle roof</color> buildings.\nEmploys <color=green>4 Builders</color>.\nCan store a lot of junk picked up from rubble.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "An upgrade module to be placed on top of two adjacent <color=#FF6EC7>triangle roof</color> buildings. Employs <color=green>4 Builders</color>. Can store a lot of junk picked up from rubble. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一个可以放置在两个相邻的<color=#FF6EC7>三角屋顶</color>建筑顶部的升级模块。\n需要<color=green>4名建筑工</color>。\n可以存储从废墟中捡起的大量杂物。\n<color=#00FFFF>作为堤坝工作</color>"
zhTW = "一個升級模塊，可放置在兩個相鄰的<color=#FF6EC7>三角屋頂</color>建築之上。  \n需要<color=green>4位建造者</color>。  \n可以儲存從瓦礫中撿到的大量垃圾。  \n<color=#00FFFF>作為堤壩使用</color>"
ruRU = "Модуль улучшения, который устанавливается на две смежные <color=#FF6EC7>треугольные крыши</color>. \nЗанимает <color=green>4 строителей</color>. \nМожет хранить много хлама, собранного с развалин. \n<color=#00FFFF>Работает как дамба</color>"
jaJP = "隣接する2つの<color=#FF6EC7>三角屋根</color>の建物の上に配置するアップグレードモジュールです。\n<color=green>4人のビルダー</color>を雇います。\n瓦礫から拾った大量のゴミを収納できます。\n<color=#00FFFF>堤防として機能します</color>"
frFR = "Un module de mise à niveau à placer sur le dessus de deux bâtiments adjacents à <color=#FF6EC7>toit en triangle</color>.\nEmploie <color=green>4 Constructeurs</color>.\nPeut stocker beaucoup de détritus ramassés dans les décombres.\n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Ein Upgrade-Modul, das auf zwei benachbarte <color=#FF6EC7>Dachgebäude mit Dreiecken</color> platziert werden kann. Verwendet <color=green>4 Bauarbeiter</color>. Kann eine Menge Schrott speichern, der aus Trümmern gesammelt wurde. <color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Moduł ulepszenia do umieszczenia na szczycie dwóch sąsiadujących budynków z <color=#FF6EC7>trójkątnym dachem</color>.\nZatrudnia <color=green>4 budowniczych</color>.\nMoże przechowywać dużo śmieci zbieranych z gruzów.\n<color=#00FFFF>Funkcjonuje jako wał</color>"
ptBR = "Um módulo de upgrade para ser colocado em cima de dois edifícios de <color=#FF6EC7>telhado triangular</color> adjacentes.\nEmprega <color=green>4 Construtores</color>.\nPode armazenar muitos entulhos recolhidos dos destroços.\n<color=#00FFFF>Funciona como uma Barragem</color>"
koKR = "두 개의 인접한 <color=#FF6EC7>삼각 지붕</color> 건물 위에 배치되는 업그레이드 모듈입니다.  \n<color=green>4명의 건축가</color>를 필요로 합니다.  \n잔해에서 줍은 많은 쓰레기를 저장할 수 있습니다.  \n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Vylepšovací modul, který se umisťuje na vrch dvou sousedních <color=#FF6EC7>trojúhelníkových střech</color>. Zaměstnává <color=green>4 stavitele</color>. Může uchovávat spoustu haraburdí vyzdviženého z trosků. <color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một mô-đun nâng cấp được đặt trên đỉnh của hai tòa nhà có <color=#FF6EC7>mái hình tam giác</color> liền kề.\nSử dụng <color=green>4 Thợ xây</color>.\nCó thể lưu trữ rất nhiều đồ vật nhặt được từ đống đổ nát.\n<color=#00FFFF>Hoạt động như một Đê</color>"
trTR = "Yan yana olan iki <color=#FF6EC7>üçgen çatı</color> binasının üzerine yerleştirilmek üzere bir yükseltme modülü.\n<color=green>4 İnşaatçı</color> çalıştırır.\nMolozdan toplanmış pek çok eşyayı depolayabilir.\n<color=#00FFFF>Bir Set görevi görür</color>"

["Lapantouflemagic.FarmUpgradeC.Description"]
raw = "An upgrade module to be placed on top of two adjacent <color=#FF6EC7>triangle roof</color> buildings.\nThe perfect place for nerdy beavers to play 'Tunnels and Hoomans'!\nContains some storage space for crates.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "An upgrade module to be placed on top of two adjacent <color=#FF6EC7>triangle roof</color> buildings.  \nThe perfect place for nerdy beavers to play 'Tunnels and Hoomans'!  \nContains some storage space for crates.  \n<color=#00FFFF>Works as a Levee</color>"
zhCN = "一个升级模块，放置在两个相邻的<color=#FF6EC7>三角屋顶</color>建筑顶部。\n这是呆萌的海狸们玩“隧道与人类”的完美场所！\n包含一些箱子的存储空间。\n<color=#00FFFF>作为堤坝使用</color>"
zhTW = "一個升級模塊，安置在兩座相鄰的<color=#FF6EC7>三角屋頂</color>建築上。\n這是讓書呆子河狸玩「隧道與人類」的完美場所！\n包含一些儲存空間以放置箱子。\n<color=#00FFFF>可作為堤堤使用</color>"
ruRU = "Модуль улучшения, который устанавливается на верх двух смежных <color=#FF6EC7>треугольных крыш</color> зданий. Идеальное место для увлечённых бобров играть в «Туннели и Людей»! Содержит некоторое место для хранения ящиков. <color=#00FFFF>Работает как дамба</color>"
jaJP = "隣接する2つの<color=#FF6EC7>三角屋根</color>の建物の上に置くためのアップグレードモジュール。\nオタクなビーバーたちが「トンネルとヒューマン」をプレイするのに最適な場所です！\n箱のための収納スペースを含んでいます。\n<color=#00FFFF>堤防として機能します</color>"
frFR = "Un module de mise à niveau à placer sur le dessus de deux bâtiments adjacents à <color=#FF6EC7>toit triangle</color>.  \nL'endroit parfait pour les castors fans de jouer à 'Tunnels et Hoomans' !  \nContient un peu d'espace de stockage pour des caisses.  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Ein Upgrade-Modul, das oben auf zwei benachbarten <color=#FF6EC7>Dachbauten in Dreiecksform</color> platziert wird.  \nDer perfekte Ort für nerdige Biber, um 'Tunnel und Menschen' zu spielen!  \nBietet etwas Stauraum für Kisten.  \n<color=#00FFFF>Funktioniert wie ein Deich</color>"
plPL = "Moduł ulepszenia do umieszczenia na szczycie dwóch sąsiadujących budynków z <color=#FF6EC7>trójkątnym dachem</color>. \nIdealne miejsce dla nerdowskich bobrów do grania w 'Tunele i Ludzi'! \nZawiera trochę przestrzeni magazynowej na skrzynie. \n<color=#00FFFF>Działa jak wał</color>"
ptBR = "Um módulo de upgrade a ser colocado em cima de dois edifícios adjacentes de <color=#FF6EC7>telhado triangular</color>.\nO lugar perfeito para castores nerds jogarem 'Túneis e Humanos'!\nContém um espaço de armazenamento para caixas.\n<color=#00FFFF>Funciona como uma Barragem</color>"
koKR = "인접한 두 개의 <color=#FF6EC7>삼각형 지붕</color> 건물 위에 놓을 업그레이드 모듈입니다.\n소심한 비버들이 '터널과 사람들'을 즐기기에 완벽한 장소입니다!\n상자를 위한 저장 공간이 일부 포함되어 있습니다.\n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Modul vylepšení, který se umístí na vrchol dvou sousedních <color=#FF6EC7>trojúhelníkových střech</color> budov.\nDokonalé místo pro nerdy bobry, aby si zahráli na 'Tunnely a Hoomany'!\nObsahuje nějaký úložný prostor pro bedny.\n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một mô-đun nâng cấp được đặt lên trên hai tòa nhà <color=#FF6EC7>mái nhà hình tam giác</color> kề nhau.\nNơi lý tưởng cho những con hải ly yêu thích chơi 'Đường Hầm và Con Người'!\nChứa một số không gian lưu trữ cho thùng.\n<color=#00FFFF>Hoạt động như một Đê</color>"
trTR = "İki bitişik <color=#FF6EC7>üçgen çatı</color> binası üzerine yerleştirilecek bir yükseltme modülü.\nAşırı bilgili kunduzların 'Tüneller ve İnsanlar' oynaması için mükemmel bir yer!\nKonteynerler için biraz depolama alanı içerir.\n<color=#00FFFF>Bir Set olarak çalışır</color>"

["Lapantouflemagic.FarmUpgradeD.Description"]
raw = "An upgrade module to be placed on top of two adjacent <color=#FF6EC7>triangle roof</color> buildings.\nEven more farming! We shall vainquish the cabbages!\nHas a lot of storage space for harvested crops.\n<color=#00FFFF>Plant some red cabbage near this building to remove the \"nothing to do\" mark</color>.\n<color=#00FFFF>Works as a Levee</color>\n<Color=red>CANNOT PLANT CROPS</color>"
status = "normal"
enUS = "An upgrade module to be placed on top of two adjacent <color=#FF6EC7>triangle roof</color> buildings.  \nEven more farming! We shall vanquish the cabbages!  \nHas a lot of storage space for harvested crops.  \n<color=#00FFFF>Plant some red cabbage near this building to remove the \"nothing to do\" mark</color>.  \n<color=#00FFFF>Works as a Levee</color>  \n<Color=red>CANNOT PLANT CROPS</color>"
zhCN = "一个升级模块，可以放置在两个相邻的<color=#FF6EC7>三角屋顶</color>建筑上。\n更多的农业！我们将征服卷心菜！\n有大量的空间用于储存收获的作物。\n<color=#00FFFF>在此建筑附近种植一些红卷心菜，以移除“没有事情可做”的标记</color>。\n<color=#00FFFF>作为堤岸工作</color>\n<Color=red>无法种植作物</color>"
zhTW = "一個升級模組，可以放置在兩座相鄰的<color=#FF6EC7>三角屋頂</color>建築上。  \n更多農業！我們將征服捲心菜！  \n具有大量儲存空間用於收穫的作物。  \n<color=#00FFFF>在這座建築附近種植一些紅捲心菜，以去除「無事可做」標記</color>。  \n<color=#00FFFF>作為堤壩使用</color>  \n<Color=red>無法種植作物</color>"
ruRU = "Модуль улучшения, который нужно разместить на двух смежных <color=#FF6EC7>треугольных крышах</color>.\nЕщё больше сельского хозяйства! Мы победим капусту!\nИмеет много места для хранения собранных урожая.\n<color=#00FFFF>Посадите немного красной капусты рядом с этим зданием, чтобы убрать метку \"нет работы\"</color>.\n<color=#00FFFF>Работает как плотина</color>\n<Color=red>НЕЛЬЗЯ САДИТЬ УРОЖАЙ</color>"
jaJP = "隣接する二つの<color=#FF6EC7>三角屋根</color>建物の上に設置するアップグレードモジュールです。  \nさらなる農業を実現します！キャベツを打ち負かしましょう！  \n収穫した作物をたくさん保管できるスペースがあります。  \n<color=#00FFFF>この建物の近くに赤キャベツを植えて「何もすることがない」マークを取り除いてください</color>。  \n<color=#00FFFF>堤防として機能します</color>  \n<Color=red>作物を植えることはできません</color>"
frFR = "Un module de mise à niveau à placer au sommet de deux bâtiments adjacents avec un <color=#FF6EC7>toit en triangle</color>.\nEncore plus de culture ! Nous vaincrons les choux !\nDispose d'un grand espace de stockage pour les récoltes.\n<color=#00FFFF>Plantez des choux rouges près de ce bâtiment pour supprimer le marquage \"rien à faire\"</color>.\n<color=#00FFFF>Fonctionne comme une digue</color>\n<Color=red>NE PEUT PAS CULTIVER DE CULTURES</color>"
deDE = "Ein Upgrade-Modul, das auf zwei benachbarte <color=#FF6EC7>Triangeldach</color>-Gebäude gesetzt werden kann.\nNoch mehr Landwirtschaft! Wir werden die Köpfe des Kohls besiegen!\nHat viel Stauraum für geerntetes Gemüse.\n<color=#00FFFF>Pflanze etwas roten Kohl in der Nähe dieses Gebäudes, um das \"nichts zu tun\" Zeichen zu entfernen</color>.\n<color=#00FFFF>Funktioniert als Damm</color>\n<Color=red>KEINE PFLANZUNG VON GEMÜSE MÖGLICH</color>"
plPL = "Moduł ulepszenia do umieszczenia na szczycie dwóch sąsiednich <color=#FF6EC7>budynków z trójkątnym dachem</color>.  \nJeszcze więcej rolnictwa! Pokonamy kapusty!  \nMa dużo miejsca na przechowywanie zbiorów.  \n<color=#00FFFF>Posadź trochę czerwonej kapusty w pobliżu tego budynku, aby usunąć znacznik \"brak zajęcia\"</color>.  \n<color=#00FFFF>Działa jak wał</color>  \n<Color=red>NIE MOŻNA SADZIĆ ROŚLIN</color>"
ptBR = "Módulo de upgrade a ser colocado em cima de dois edifícios adjacentes com <color=#FF6EC7>telhados triangulares</color>.\nMais fazendas! Nós vamos derrotar os repolhos!\nTem muito espaço de armazenamento para as colheitas.\n<color=#00FFFF>Plante um repolho vermelho perto deste edifício para remover a marca de \"nada a fazer\"</color>.\n<color=#00FFFF>Funciona como uma Barragem</color>\n<color=red>NÃO É POSSÍVEL PLANTAR CULTURAS</color>"
koKR = "두 개의 인접한 <color=#FF6EC7>삼각형 지붕</color> 건물 위에 배치할 업그레이드 모듈입니다.  \n더 많은 농업! 우리는 양배추를 정복할 것입니다!  \n수확한 작물을 저장할 수 있는 공간이 많습니다.  \n<color=#00FFFF>이 건물 근처에 적양배추를 심으면 \"할 일이 없음\" 표시가 제거됩니다</color>.  \n<color=#00FFFF>제방으로 작동합니다</color>  \n<Color=red>작물을 심을 수 없습니다</color>"
csCZ = "Modul vylepšení, který lze umístit na vrchol dvou sousedních <color=#FF6EC7>trojúhelníkových střech</color> budov.  \nJeště více farmení! Přemůžeme zelí!  \nMá spoustu úložného prostoru pro sklizené plodiny.  \n<color=#00FFFF>Zasaďte červené zelí poblíž této budovy, abyste odstranili označení \"nic k práci\"</color>.  \n<color=#00FFFF>Funguje jako hráz</color>  \n<color=red>NENÍ MOŽNÉ ZASADIT PLODINY</color>"
viVN = "Một mô-đun nâng cấp được đặt trên hai tòa nhà có <color=#FF6EC7>mái nhà hình tam giác</color> cạnh nhau.  \nCàng nhiều nông nghiệp hơn! Chúng ta sẽ đánh bại những quả bắp cải!  \nCó rất nhiều không gian lưu trữ cho các vụ mùa thu hoạch.  \n<color=#00FFFF>Trồng một ít bắp cải đỏ gần tòa nhà này để xóa dấu hiệu \"không có việc gì để làm\"</color>.  \n<color=#00FFFF>Hoạt động như một đê</color>  \n<Color=red>KHÔNG THỂ TRỒNG CÂY TRỒNG</color>"
trTR = "İki bitişik <color=#FF6EC7>üçgen çatı</color> bina üzerine yerleştirilecek bir yükseltme modülü.\nDaha fazla tarım! Lahanaları yok edeceğiz!\nHasat edilen baskılar için çok fazla depolama alanı var.\n<color=#00FFFF>Bu binanın yakınında biraz kırmızı lahana ekleyin, \"yapacak bir şey yok\" işaretini kaldırmak için</color>.\n<color=#00FFFF>Bir Set gibi çalışır</color>\n<Color=red>ÜRÜNLER EKİLEMEZ</color>"

