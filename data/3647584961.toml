["Lapantouflemagic.Badbucket.Description"]
raw = "A few logs and planks haphazardly arranged in a platform barely good enough to tap bad water with a bucket, hopefully without sullying oneself."
status = "normal"
enUS = "A few logs and planks haphazardly arranged in a platform barely good enough to tap bad water with a bucket, hopefully without sullying oneself."
zhCN = "几根木头和木板随意地摆放在一个平台上，勉强足够用桶子来取污染水，希望不会弄脏自己。"
zhTW = "幾根樹幹和木板隨意擺放成的平台，好像勉強足以用桶子取水，卻希望不會弄髒自己。"
ruRU = "Немного бревен и досок небрежно уложены на платформе, едва подходящей для того, чтобы черпать плохую воду ведром, надеясь при этом не испачкаться."
jaJP = "「数本の木材と板が不規則に配置されたプラットフォームは、バケツで悪水を汲むにはほとんど不十分で、できれば汚れずに済むことを願っている。」"
frFR = "Quelques bûches et planches disposées de manière anarchique sur une plateforme à peine suffisante pour puiser de l'eau mauvaise avec un seau, en espérant ne pas se salir."
deDE = "Einige Stämme und Bretter zufällig auf einer Plattform angeordnet, die kaum gut genug ist, um mit einem Eimer schlechtes Wasser abzuzapfen, hoffentlich ohne sich dabei zu beschmutzen."
plPL = "Kilka belek i desek chaotycznie ułożonych na platformie, która ledwo nadaje się do czerpania brudnej wody wiadrem, miejmy nadzieję, że bez ubrudzenia siebie."
ptBR = "Algumas toras e tábuas dispostas de forma desordenada em uma plataforma mal suficiente para tirar água ruim com um balde, esperançosamente sem se sujar."
koKR = "몇 개의 통나무와 널빤지가 엉성하게 배치된 플랫폼은 물통으로 나쁜 물을 긷기에 겨우 괜찮을 정도로, 자신을 더럽히지 않기를 바라는 마음으로 만들어졌다."
csCZ = "Několik klád a prken neuspořádaně uspořádaných na platformě, která málo stačí na to, aby se s ní dalo zacházet se špinavou vodou pomocí kýblu, doufejme bez znečištění."
viVN = "Một vài khúc gỗ và tấm ván được sắp xếp lộn xộn thành một nền tảng khó có thể sử dụng để múc nước bẩn bằng xô, hy vọng không bị bẩn."
trTR = "Birkaç kütük ve tahtanın bir platformda gelişigüzel yerleştirildiği, umarım kendini kirletmeden bir kova ile kötü suyu almak için zorla yeterli olan."

["Lapantouflemagic.Badbucket.FlavorDescription"]
raw = "\"I'm sure we can do something useful with this liquid, we just need someone foolish enough to accept getting it. Surely Bobby will be up to the task.\"\n -A scientist beaver"
status = "normal"
enUS = "\"I'm sure we can do something useful with this liquid, we just need someone foolish enough to accept getting it. Surely Bobby will be up to the task.\"\n -A scientist beaver"
zhCN = "“我相信我们可以利用这种液体，我们只需要找到一个足够愚蠢的人来接受它。鲍比肯定能够胜任这个任务。”  \n- 一只科学家海狸"
zhTW = "「我相信我們可以用這液體做些有用的事，我們只需要一個足夠愚蠢的人來接受這個任務。波比肯定能勝任。」  \n-一位科學家海狸"
ruRU = "\"Я уверен, что мы сможем сделать что-то полезное с этой жидкостью, нам просто нужен кто-то достаточно безумный, чтобы согласиться её забрать. Уверен, Бобби справится с этой задачей.\"\n -Ученый-бобер"
jaJP = "「この液体を使って何か有用なことができるはずだ。誰かがこれを受け取るのに十分愚かである必要があるだけだ。きっとボビーがその仕事を引き受けてくれるだろう。」  \n- 科学者のビーバー"
frFR = "\"Je suis sûr que nous pouvons faire quelque chose d'utile avec ce liquide, il nous suffit de trouver quelqu'un de assez fou pour l'accepter. Bobby sera sûrement à la hauteur de la tâche.\"  \n-Un castor scientifique"
deDE = "\"Ich bin sicher, wir können etwas Nützliches mit dieser Flüssigkeit anfangen, wir brauchen nur jemanden, der dumm genug ist, sie zu holen. Ganz sicher wird Bobby der Aufgabe gewachsen sein.\"  \n -Ein Wissenschafts-Biber"
plPL = "\"Jestem pewny, że możemy zrobić coś użytecznego z tej cieczy, po prostu potrzebujemy kogoś wystarczająco głupiego, by ją przyjąć. Na pewno Bobby podoła zadaniu.\"\n -Naukowiec bóbr"
ptBR = "\"Tenho certeza de que podemos fazer algo útil com esse líquido, só precisamos de alguém tolo o suficiente para aceitá-lo. Com certeza Bobby estará à altura da tarefa.\"  \n-Um castor cientista"
koKR = "\"이 액체로 뭔가 유용한 일을 할 수 있을 거라고 확신해, 단지 이를 받아들일 만큼 어리석은 사람이 필요할 뿐이지. 분명 바비가 그 임무를 맡을 수 있을 거야.\"  \n- 비버 과학자"
csCZ = "„Jsem si jistý, že s touto tekutinou můžeme udělat něco užitečného, musíme jen najít někoho dost hloupého, aby to vzal. Jistě, Bobby to zvládne.“  \n -Vědecký bobr"
viVN = "\"Tôi chắc rằng chúng ta có thể làm điều gì đó hữu ích với chất lỏng này, chúng ta chỉ cần một ai đó khá ngốc nghếch để chấp nhận lấy nó. Chắc chắn Bobby sẽ sẵn sàng nhận nhiệm vụ.\" \n-Một con castor khoa học"
trTR = "\"Bu sıvıyla faydalı bir şey yapabileceğimizden eminim, sadece bunu kabul edecek kadar aptal birine ihtiyacımız var. Kuşkusuz Bobby bu işin üstesinden gelecektir.\"  \n-Bir bilim adamı kunduz"

