["Lapantouflemagic.NEWForester.Description"]
raw = "Plants basic trees.\n<color=#FFA500>Small Tower</color>, <color=#FF6EC7>Can support upgrades</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "Plants basic trees.  \n<color=#FFA500>Small Tower</color>, <color=#FF6EC7>Can support upgrades</color>  \n<color=#00FFFF>Works as a Levee</color>"
zhCN = "种植基本树木。\n<color=#FFA500>小塔</color>，<color=#FF6EC7>可以支持升级</color>\n<color=#00FFFF>作为堤坝使用</color>"
zhTW = "種植基本樹木。<color=#FFA500>小塔</color>，<color=#FF6EC7>可以支援升級</color><color=#00FFFF>作為堤防運作</color>"
ruRU = "Сажает основные деревья.  \n<color=#FFA500>Небольшая башня</color>, <color=#FF6EC7>Может поддерживать улучшения</color>  \n<color=#00FFFF>Работает как плотина</color>"
jaJP = "基本的な木を植えます。\n<color=#FFA500>小型タワー</color>、<color=#FF6EC7>アップグレードをサポート可能</color>\n<color=#00FFFF>堤防として機能します</color>"
frFR = "Plante des arbres de base.  \n<color=#FFA500>Petite Tour</color>, <color=#FF6EC7>Peut supporter des améliorations</color>  \n<color=#00FFFF>Fonctionne comme une Levée</color>"
deDE = "Pflanzt grundlegende Bäume.  \n<color=#FFA500> kleiner Turm </color>, <color=#FF6EC7> kann Upgrades unterstützen </color>  \n<color=#00FFFF> Funktioniert als Deich </color>"
plPL = "Sadzenie podstawowych drzew. <color=#FFA500>Mała Wieża</color>, <color=#FF6EC7>Może wspierać ulepszenia</color> <color=#00FFFF>Działa jak Tamę</color>"
ptBR = "Planta árvores básicas.\n<color=#FFA500>Torre Pequena</color>, <color=#FF6EC7>Pode suportar upgrades</color>\n<color=#00FFFF>Funciona como um dique</color>"
koKR = "기본 나무를 심습니다.\n<color=#FFA500>작은 탑</color>, <color=#FF6EC7>업그레이드를 지원할 수 있습니다</color>\n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Vysazuje základní stromy. \n<color=#FFA500>Malá věž</color>, <color=#FF6EC7>může podporovat vylepšení</color> \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Trồng những cây cơ bản.\n<color=#FFA500>Tháp Nhỏ</color>, <color=#FF6EC7>Có thể hỗ trợ nâng cấp</color>\n<color=#00FFFF>Hoạt động như một Đê</color>"
trTR = "Temel ağaçlar diker.\n<color=#FFA500>Küçük Kule</color>, <color=#FF6EC7>Yükseltmeleri destekleyebilir</color>\n<color=#00FFFF>Bir Set gibi çalışır</color>"

["Lapantouflemagic.Handicrafter.Description"]
raw = "A town house where manufactured items are made.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A town house where manufactured items are made. <color=#00FFFF>Works as a Levee</color>"
zhCN = "“一个制造物品的市镇房屋。<color=#00FFFF>作为堤坝工作</color>”"
zhTW = "一座製造物品的城鎮屋。  \n<color=#00FFFF>作為排水堤運作</color>"
ruRU = "Городской дом, где изготавливаются товары.\n<color=#00FFFF>Работает как плотина</color>"
jaJP = "アイテムが製造される町屋です。  \n<color=#00FFFF>堤防として機能します</color>"
frFR = "Une maison de ville où des objets manufacturés sont fabriqués. <color=#00FFFF>Fonctionne comme un levee</color>"
deDE = "Ein Stadthaus, in dem gefertigte Gegenstände hergestellt werden. <color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Dom miejski, w którym wytwarzane są przedmioty.  \n<color=#00FFFF>Funkcjonuje jako grobla</color>"
ptBR = "Uma casa urbana onde itens fabricados são feitos. <color=#00FFFF>Funciona como uma Barreira</color>"
koKR = "제작된 아이템이 만들어지는 타운 하우스입니다.\n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Dům, kde se vyrábějí vyrobené předměty. <color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một ngôi nhà trong thị trấn nơi sản xuất các mặt hàng.\n<color=#00FFFF>Hoạt động như một đê</color>"
trTR = "Üretilen eşyaların yapıldığı bir kasaba evi. <color=#00FFFF>Bir Set olarak çalışır</color>"

["Lapantouflemagic.IrrigationTower.Description"]
raw = "Irrigates land around by consuming water.\n<color=green>Water consumption is barely higher than a water dump.</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "Irrigates land around by consuming water. <color=green>Water consumption is barely higher than a water dump.</color> <color=#00FFFF>Works as a Levee</color>"
zhCN = "“通过消耗水来灌溉周围土地。\n<color=green>水消耗量几乎高于水排放。</color>\n<color=#00FFFF>作为堤坝工作</color>”"
zhTW = "通過消耗水來灌溉周圍的土地。\n<color=green>水的消耗量僅略高於水槽。</color>\n<color=#00FFFF>作為堤岸使用</color>"
ruRU = "Орошается окружающая земля за счет потребления воды.\n<color=green>Потребление воды едва превышает потребление водостока.</color>\n<color=#00FFFF>Работает как дамба</color>"
jaJP = "「周囲の土地に水を供給します。\n<color=green>水の消費量は、ほとんど水捨て場と変わりません。</color>\n<color=#00FFFF>堤防として機能します</color>」"
frFR = "Irrigue le terrain alentour en consommant de l'eau.  \n<color=green>La consommation d'eau est à peine plus élevée que celle d'un déversement d'eau.</color>  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Bewässert das umliegende Land, indem es Wasser verbraucht.  \n<color=green>Der Wasserverbrauch ist kaum höher als bei einer Wasserentsorgung.</color>  \n<color=#00FFFF>Funktioniert wie ein Deich</color>"
plPL = "Nawadnia teren wokół, zużywając wodę. <color=green>Zużycie wody jest ledwo wyższe niż woda zrzucana.</color> <color=#00FFFF>Działa jako wał</color>"
ptBR = "Irriga a terra ao redor consumindo água.  \n<color=green>O consumo de água é pouco maior do que o de um descarte de água.</color>  \n<color=#00FFFF>Funciona como uma Barragem</color>"
koKR = "주변의 땅을 물을 소비하여 관개합니다.  \n<color=green>물 소비량은 거의 물 덤프와 같음.</color>  \n<color=#00FFFF>제방으로 작동합니다.</color>"
csCZ = "Zavlažuje okolní půdu spotřebováváním vody.  \n<color=green>Spotřeba vody je jen mírně vyšší než u odpadního kanálu.</color>  \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Tưới tiêu đất xung quanh bằng cách tiêu thụ nước.  \n<color=green>Việc tiêu thụ nước chỉ cao hơn một điểm xả nước một chút.</color>  \n<color=#00FFFF>Hoạt động như một tuyến đê</color>"
trTR = "Su tüketerek etrafındaki alanı suluyor.  \n<color=green>Su tüketimi, bir su boşaltımından sadece biraz daha fazla.</color>  \n<color=#00FFFF>Bir Set gibi çalışır</color>"

["Lapantouflemagic.Smallcookhouse.Description"]
raw = "A medium lodge managing a lovely terrace where beavers can get a fresh drink.\nThe terrace must be <color=yellow>above ground.</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A medium lodge managing a lovely terrace where beavers can get a fresh drink. The terrace must be <color=yellow>above ground.</color> <color=#00FFFF>Works as a Levee</color>"
zhCN = "“一座中等规模的小屋，管理着一个可爱的露台，海狸可以在这里喝到新鲜饮料。\n露台必须是<color=yellow>高于地面。</color>\n<color=#00FFFF>作为堤坝使用</color>”"
zhTW = "一座中型小屋管理著一個可愛的露台，海狸可以在這裡享用新鮮的飲料。  \n露台必須是<color=yellow>高於地面。</color>  \n<color=#00FFFF>作為堤壩運作</color>"
ruRU = "Средний домик с красивой террасой, где бобры могут получить свежий напиток. \nТерраса должна быть <color=yellow>над землёй.</color> \n<color=#00FFFF>Работает как дамба</color>"
jaJP = "「中規模のロッジで、ビーバーが新鮮な飲み物を楽しめる素敵なテラスを管理しています。テラスは<color=yellow>地上にある必要があります。</color><color=#00FFFF>堤防として機能します</color>」"
frFR = "Un pavillon de taille moyenne gérant une charmante terrasse où les castors peuvent se désaltérer.  \nLa terrasse doit être <color=yellow>suspendue.</color>  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Eine mittelgroße Lodge mit einer schönen Terrasse, wo Biber ein frisches Getränk bekommen können.  \nDie Terrasse muss <color=yellow>über dem Boden.</color>  \n<color=#00FFFF>Funktioniert als Damm</color>"
plPL = "Średni domek zarządzający uroczą tarasem, gdzie bobry mogą napić się świeżego napoju. \nTaras musi być <color=yellow>ponad ziemią.</color> \n<color=#00FFFF>Funkcjonuje jako wał.</color>"
ptBR = "Uma cabana média gerenciando um lindo terraço onde os castores podem tomar uma bebida fresca.  \nO terraço deve ser <color=yellow>acima do solo.</color>  \n<color=#00FFFF>Funciona como um dique</color>"
koKR = "신선한 음료를 받을 수 있는 사랑스러운 테라스를 관리하는 중간 규모의 오두막입니다.  \n테라스는 <color=yellow>지상 위에 있어야 합니다.</color>  \n<color=#00FFFF>제방으로 작동합니다.</color>"
csCZ = "Střední chata spravující krásnou terasu, kde si bobři mohou dát čerstvý nápoj. Terasa musí být <color=yellow>nad zemí.</color> <color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một ngôi nhà vừa phải quản lý một sân thượng xinh đẹp nơi những con bám có thể thưởng thức một ly nước mát.\nSân thượng phải ở <color=yellow>trên mặt đất.</color>\n<color=#00FFFF>Hoạt động như một Đê</color>"
trTR = "Orta boy bir konak, kunduzların taze bir içecek alabileceği güzel bir terası yönetiyor.\nTeras <color=yellow>yerden yüksek olmalıdır.</color>\n<color=#00FFFF>Baraj gibi çalışır</color>"

["Lapantouflemagic.KitchenHouse.Description"]
raw = "A large house equipped with a mechanized kitchen to feed many beavers.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A large house equipped with a mechanized kitchen to feed many beavers. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一座配备机械厨房的大房子，可以喂养许多海狸。<color=#00FFFF>作为堤坝工作</color>"
zhTW = "一座配備了機械化廚房的大房子，可以餵養許多海狸。  \n<color=#00FFFF>作為堤壩使用</color>"
ruRU = "Большой дом, оснащенный механизированной кухней для кормления множества бобров. <color=#00FFFF>Работает как дамба</color>"
jaJP = "多くのビーバーを養うための機械化されたキッチンを備えた大きな家です。  \n<color=#00FFFF>堤防として機能します</color>"
frFR = "Une grande maison équipée d'une cuisine mécanisée pour nourrir de nombreux castors. <color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Ein großes Haus mit einer mechanisierten Küche, um viele Biber zu füttern. <color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Duży dom wyposażony w zmechanizowaną kuchnię do karmienia wielu bobrów. <color=#00FFFF>Działa jak Grobla</color>"
ptBR = "Uma grande casa equipada com uma cozinha mecanizada para alimentar muitos castores.\n<color=#00FFFF>Funciona como uma Represa</color>"
koKR = "많은 비버를 먹일 수 있는 기계화 주방이 마련된 대형 집입니다.  \n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Velký dům vybavený mechanizovanou kuchyní k krmení mnoha bobrů. <color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một ngôi nhà lớn được trang bị một nhà bếp cơ giới để nuôi sống nhiều con hải ly.  \n<color=#00FFFF>Hoạt động như một đập</color>"
trTR = "Birçok kunduzun beslenmesi için mekanize mutfakla donatılmış büyük bir ev. <color=#00FFFF>Set gibi çalışır</color>"

["Lapantouflemagic.waterpumpUpgrade.Description"]
raw = "An upgrade module to be placed between two adjacent water pumps.\n<color=#00FFFF>Works as a Levee</color>\n<color=green>Placement is sensitive to camera orientation!</color>"
status = "normal"
enUS = "An upgrade module to be placed between two adjacent water pumps.  \n<color=#00FFFF>Works as a Levee</color>  \n<color=green>Placement is sensitive to camera orientation!</color>"
zhCN = "一个升级模块，可以放置在两个相邻的水泵之间。\n<color=#00FFFF>作为堤坝使用</color>\n<color=green>放置对相机角度敏感！</color>"
zhTW = "一個升級模組，可以放置在兩個相鄰的水泵之間。  \n<color=#00FFFF>充當堤壩</color>  \n<color=green>放置對鏡頭方向敏感！</color>"
ruRU = "Модуль обновления, который устанавливается между двумя смежными насосами.\n<color=#00FFFF>Работает как дамба</color>\n<color=green>Положение чувствительно к ориентации камеры!</color>"
jaJP = "隣接する2つの水ポンプの間に配置されるアップグレードモジュールです。  \n<color=#00FFFF>堤防として機能します</color>  \n<color=green>配置はカメラの向きに敏感です！</color>"
frFR = "Un module de mise à niveau à placer entre deux pompes à eau adjacentes.  \n<color=#00FFFF>Fonctionne comme une levée</color>  \n<color=green>Le placement est sensible à l'orientation de la caméra !</color>"
deDE = "Ein Upgrade-Modul, das zwischen zwei benachbarten Wasserpumpen platziert wird.  \n<color=#00FFFF>Funktioniert wie ein Deich</color>  \n<color=green>Die Platzierung ist empfindlich gegenüber der Kameraausrichtung!</color>"
plPL = "Moduł ulepszenia do umieszczenia pomiędzy dwoma sąsiadującymi pompami wodnymi.  \n<color=#00FFFF>Działa jak wał</color>  \n<color=green>Umiejscowienie jest wrażliwe na orientację kamery!</color>"
ptBR = "Um módulo de upgrade a ser colocado entre duas bombas d'água adjacentes.  \n<color=#00FFFF>Funciona como uma Barragem</color>  \n<color=green>A colocação é sensível à orientação da câmera!</color>"
koKR = "두 개의 인접한 수돗물 펌프 사이에 배치할 업그레이드 모듈입니다.  \n<color=#00FFFF>제방으로 작동합니다</color>  \n<color=green>배치는 카메라 방향에 민감합니다!</color>"
csCZ = "Modul vylepšení, který se umisťuje mezi dvě sousední vodní čerpadla.  \n<color=#00FFFF>Funguje jako hráz</color>  \n<color=green>Při umístění se zohledňuje orientace kamery!</color>"
viVN = "Một mô-đun nâng cấp để được đặt giữa hai máy bơm nước liền kề.\n<color=#00FFFF>Hoạt động như một đê</color>\n<color=green>Vị trí đặt nhạy cảm với hướng camera!</color>"
trTR = "İki bitişik su pompası arasında yerleştirilecek bir yükseltme modülü.  \n<color=#00FFFF>Bir Set olarak çalışır</color>  \n<color=green>Yerleştirme kamera yönüne duyarlıdır!</color>"

["Lapantouflemagic.DeepWaterPumpUpgrade.Description"]
raw = "An upgrade module to be placed between two adjacent deep water pumps.\n<color=#00FFFF>Works as a Levee</color>\n<color=green>Placement is sensitive to camera orientation!</color>"
status = "normal"
enUS = "An upgrade module to be placed between two adjacent deep water pumps.  \n<color=#00FFFF>Works as a Levee</color>  \n<color=green>Placement is sensitive to camera orientation!</color>"
zhCN = "“一种升级模块，用于放置在两个相邻的深水泵之间。  \n<color=#00FFFF>充当堤坝</color>  \n<color=green>放置对相机方向敏感！</color>”"
zhTW = "一個升級模組，可放置在兩個相鄰的深水泵之間。\n<color=#00FFFF>作為堤壩運作</color>\n<color=green>放置對相機方向非常敏感！</color>"
ruRU = "Модуль обновления, который устанавливается между двумя соседними глубинными водяными насосами.  \n<color=#00FFFF>Работает как дамба</color>  \n<color=green>Установка чувствительна к ориентации камеры!</color>"
jaJP = "隣接する2つの深水ポンプの間に設置するアップグレードモジュールです。  \n<color=#00FFFF>堤防として機能します</color>  \n<color=green>設置はカメラの向きに敏感です！</color>"
frFR = "Un module de mise à niveau à placer entre deux pompes à eau profonde adjacentes.  \n<color=#00FFFF>Fonctionne comme une digue</color>  \n<color=green>Le placement est sensible à l'orientation de la caméra !</color>"
deDE = "Ein Upgrade-Modul, das zwischen zwei benachbarten Tiefwasserpumpen platziert werden kann.\n<color=#00FFFF>Funktioniert wie ein Damm</color>\n<color=green>Platzierung ist empfindlich gegenüber der Kamerarichtung!</color>"
plPL = "Moduł ulepszenia do umieszczenia między dwoma sąsiednimi głębokimi pompami wodnymi.  \n<color=#00FFFF>Działa jak wał przeciwpowodziowy</color>  \n<color=green>Umiejscowienie jest wrażliwe na orientację kamery!</color>"
ptBR = "Um módulo de upgrade a ser colocado entre duas bombas de água profunda adjacentes.  \n<color=#00FFFF>Funciona como uma Barragem</color>  \n<color=green>A colocação é sensível à orientação da câmera!</color>"
koKR = "두 개의 인접한 심수 펌프 사이에 설치할 업그레이드 모듈입니다.  \n<color=#00FFFF>제방처럼 작동합니다</color>  \n<color=green>설치가 카메라 방향에 민감합니다!</color>"
csCZ = "Vylepšovací modul, který se umísťuje mezi dvě sousední hluboké vodní čerpadla.  \n<color=#00FFFF>Funguje jako hráz</color>  \n<color=green>Umístění je citlivé na orientaci kamery!</color>"
viVN = "Một mô-đun nâng cấp để đặt giữa hai máy bơm nước sâu liền kề.\n<color=#00FFFF>Hoạt động như một đê</color>\n<color=green>Vị trí nhạy cảm với góc nhìn của camera!</color>"
trTR = "İki bitişik derin su pompası arasında yerleştirilecek bir yükseltme modülü.\n<color=#00FFFF>Bir Set gibi çalışır</color>\n<color=green>Yerleşim, kamera yönlendirmesine hassastır!</color>"

