["Lapantouflemagic.WaterCannonL.Description"]
raw = "An intriguing evolution of the mechanical water pump that shoots water at a 30° angle for ranged irrigation.\nMaximizes range at the expense of elevation\n<color=green>Cannon will continue working until the water level reaches the blue flag</color>"
status = "normal"
enUS = "An intriguing evolution of the mechanical water pump that shoots water at a 30° angle for ranged irrigation. Maximizes range at the expense of elevation <color=green>Cannon will continue working until the water level reaches the blue flag</color>"
zhCN = "“一个引人注目的机械水泵的进化，能够以30°角喷射水用于远程灌溉。\n在牺牲高度的情况下最大化射程\n<color=green>炮将在水位达到蓝色标志之前持续工作</color>”"
zhTW = "一種引人入勝的機械水泵進化，能夠以30°的角度噴射水流進行遠程灌溉。\n最大化射程但犧牲了高度\n<color=green>砲臺將持續運作直到水位達到藍色旗標</color>"
ruRU = "Интригующая эволюция механического водяного насоса, который стреляет водой под углом 30° для дистанционного орошения.\nМаксимизирует дальность за счет высоты\n<color=green>Пушка будет продолжать работать, пока уровень воды не достигнет синего флага</color>"
jaJP = "「興味深い進化を遂げた機械式水ポンプで、30°の角度で水を射出し、遠くの灌漑が可能です。  \n標高を犠牲にして範囲を最大化します。  \n<color=green>キャノンは水位が青い旗に達するまで動作を続けます</color>」"
frFR = "Une évolution intrigante de la pompe à eau mécanique qui tire de l'eau à un angle de 30° pour l'irrigation à distance.  \nMaximise la portée au détriment de l'élévation  \n<color=green>Le canon continuera à fonctionner jusqu'à ce que le niveau d'eau atteigne le drapeau bleu</color>"
deDE = "Eine interessante Weiterentwicklung der mechanischen Wasserpumpe, die Wasser in einem Winkel von 30° für die Fernbewässerung spritzt. \nMaximiert die Reichweite auf Kosten der Höhe \n<color=green>Die Kanone wird weiterhin arbeiten, bis der Wasserspiegel die blaue Fahne erreicht</color>"
plPL = "Ciekawe rozwinięcie mechanicznej pompy wodnej, która wyrzuca wodę pod kątem 30° do nawadniania na odległość.  \nMaksymalizuje zasięg kosztem wysokości  \n<color=green>Armata będzie działać, aż poziom wody osiągnie niebieską flagę</color>"
ptBR = "Uma intrigante evolução da bomba de água mecânica que dispara água em um ângulo de 30° para irrigação à distância.  \nMaximiza o alcance em detrimento da elevação  \n<color=green>O canhão continuará funcionando até que o nível da água atinja a bandeira azul</color>"
koKR = "30° 각도로 발사하여 원거리 관개를 위한 기계식 물 펌프의 흥미로운 진화입니다.\n고도를 희생하여 사거리를 극대화합니다.\n<color=green>포대는 물의 수위가 파란 깃발에 도달할 때까지 계속 작동합니다</color>"
csCZ = "Zajímavá evoluce mechanické vodní pumpy, která vystřeluje vodu pod úhlem 30° pro dálkové zavlažování.\nMaximalizuje dosah na úkor výšky\n<color=green>Kanón bude pokračovat v práci, dokud hladina vody nedosáhne modré vlajky</color>"
viVN = "Một sự tiến hóa thú vị của máy bơm nước cơ học bắn nước ở góc 30° cho việc tưới tiêu tầm xa.  \nTối đa hóa khoảng cách với giá phải trả là độ cao  \n<color=green>Pháo sẽ tiếp tục hoạt động cho đến khi mức nước đạt đến cột cờ màu xanh</color>"
trTR = "30° açıyla su fışkırtarak uzaktan sulama yapan mekanik su pompasının ilginç bir evrimi.\nYükseklik pahasına menzili maksimize eder\n<color=green>Top mühendisle su seviyesi mavi bayrağa ulaşana kadar çalışmaya devam edecektir</color>"

