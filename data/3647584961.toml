["Lapantouflemagic.ContaminatedJail.Description"]
raw = "A jail for keeping contaminated beavers isolated from the rest of the population.\nJailed beavers will no longer need drinks, food, sleep, shelter nor cleaning until they feel better."
status = "normal"
enUS = "A jail for keeping contaminated beavers isolated from the rest of the population. Jailed beavers will no longer need drinks, food, sleep, shelter, nor cleaning until they feel better."
zhCN = "一个用于将受污染的海狸与其他海狸隔离的监狱。\n被囚禁的海狸在感到好转之前将不再需要饮料、食物、睡眠、庇护或清洁。"
zhTW = "一個用於將受污染的海狸隔離以防與其他海狸接觸的監獄。被監禁的海狸在感覺好轉之前不再需要飲料、食物、睡眠、遮蔽或清潔。"
ruRU = "Тюрьма для изоляции зараженных бобров от остального населения. Бобры в тюрьме больше не нуждаются в еде, напитках, сне, укрытии или уборке, пока не поправятся."
jaJP = "汚染されたビーバーを他の住民から隔離するための刑務所です。  \n刑務所に入れられたビーバーは、元気になるまで飲み物、食べ物、睡眠、避難所、清掃を必要としません。"
frFR = "Une prison pour garder les castors contaminés isolés du reste de la population. Les castors emprisonnés n'auront plus besoin de boissons, de nourriture, de sommeil, d'abri ni de nettoyage jusqu'à ce qu'ils se sentent mieux."
deDE = "Ein Gefängnis zur Isolierung kontaminierter Biber von der restlichen Bevölkerung. Eingesperrte Biber benötigen bis zur Genesung keine Getränke, Nahrung, Schlaf, Unterkunft oder Reinigung."
plPL = "Wiezienie dla izolacji zarażonych bobrów od reszty populacji. Uwięzione bobry nie będą potrzebować napojów, jedzenia, snu, schronienia ani czyszczenia, dopóki nie poczują się lepiej."
ptBR = "Uma prisão para manter os castores contaminados isolados do restante da população.  \nCastores aprisionados não precisarão mais de bebidas, comida, sono, abrigo nem limpeza até se sentirem melhor."
koKR = "오염된 비버를 다른 개체군과 격리하는 감옥입니다. \n감금된 비버는 기분이 나아질 때까지 음료, 음식, 수면, 쉼터, 청소가 필요하지 않습니다."
csCZ = "Vězení pro udržení kontaminovaných bobrů izolovaných od zbytku populace. Zatčení bobři už nebudou potřebovat pití, jídlo, spánek, přístřeší ani úklid, dokud se nebudou cítit lépe."
viVN = "Một nhà tù để giữ những con castor nhiễm bẩn tách biệt với phần còn lại của dân số. Những con castor bị giam sẽ không còn cần thức uống, thức ăn, giấc ngủ, nơi trú ẩn hay vệ sinh cho đến khi chúng cảm thấy khỏe hơn."
trTR = "Kirlilikten etkilenmiş kunduzları nüfusun geri kalanından izole etmek için bir hapishane. Hapsedilmiş kunduzlar, kendilerini daha iyi hissedene kadar içecek, yiyecek, uyku, barınma veya temizlik ihtiyacı duymayacaklar."

