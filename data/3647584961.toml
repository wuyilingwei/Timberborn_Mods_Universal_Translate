["Lapantouflemagic.TerrainBlock.Description"]
raw = "An artificial terrain block built by beavers as an useful way to get rid of excess dirt generated by the <color=red>mechanical drill</color>"
status = "normal"
enUS = "An artificial terrain block built by beavers as a useful way to get rid of excess dirt generated by the <color=red>mechanical drill</color>"
zhCN = "海狸建造的人工地形块，用于有效处理由<color=red>机械钻</color>产生的多余土壤。"
zhTW = "由海狸建造的人造地形塊，作為處理<color=red>機械鑽頭</color>產生的多餘泥土的有效方式。"
ruRU = "Искусственный блок местности, созданный бобрами как полезный способ избавиться от избыточной земли, образующейся в результате работы <color=red>механической дрели</color>."
jaJP = "ビーグルによって建設された人工地形ブロックで、<color=red>機械ドリル</color>によって生成される余分な土を処理する便利な方法です。"
frFR = "Un bloc de terrain artificiel construit par des castors comme une manière utile de se débarrasser de l'excès de terre généré par le <color=red>perceuse mécanique</color>"
deDE = "Ein künstlicher Terrainblock, der von Bibern gebaut wurde, um überschüssigen Schmutz, der von dem <color=red>mechanischen Bohrer</color> erzeugt wird, auf nützliche Weise loszuwerden."
plPL = "Sztuczny blok terenu stworzony przez bobry jako użyteczny sposób na pozbycie się nadmiaru ziemi generowanej przez <color=red>mechaniczny wiertło</color>"
ptBR = "Um bloco de terreno artificial construído por castores como uma maneira útil de se livrar do excesso de terra gerado pela <color=red>broca mecânica</color>"
koKR = "비버들이 <color=red>기계 드릴</color>로 생성된 다량의 흙을 처리하는 유용한 방법으로 만든 인공 지형 블록입니다."
csCZ = "Umělý terénní blok postavený bobry jako užitečný způsob, jak se zbavit nadbytečného hlíny vygenerované <color=red>mechanickým vrtákem</color>."
viVN = "Khối địa hình nhân tạo được xây dựng bởi những con nhím như một cách hữu ích để loại bỏ lượng đất thừa do <color=red>máy khoan cơ giới</color> tạo ra"
trTR = "Bir çalışma sürecinde <color=red>mekanik matkap</color> ile üretilen fazla toprağı ortadan kaldırmanın faydalı bir yolu olarak kunduzlar tarafından inşa edilen yapay bir arazi bloğu."

["Lapantouflemagic.Overhang.Description"]
raw = "A small platform attached to a wall in order to form a walkway.\n<color=green>Can be attached to the sides of cliffs and most stackable buildings</color>\n<color=red>Multiple side platforms or bridges cannot share the same support</color>"
status = "normal"
enUS = "A small platform attached to a wall in order to form a walkway.  \n<color=green>Can be attached to the sides of cliffs and most stackable buildings</color>  \n<color=red>Multiple side platforms or bridges cannot share the same support</color>"
zhCN = "一块小平台附着在墙上，形成步道。  \n<color=green>可以附着在悬崖的侧面和大多数可堆叠建筑上</color>  \n<color=red>多个侧平台或桥梁不能共享同一个支撑</color>"
zhTW = "一個附加在牆上的小平台，以形成一條步道。  \n<color=green>可以附加在懸崖的側面和大多數可堆疊建築上</color>  \n<color=red>多個側平台或橋樑不能共享相同的支撐</color>"
ruRU = "Небольшая платформа, прикреплённая к стене, чтобы образовать пешеходную дорожку.  \n<color=green>Может быть прикреплена к склонам утёсов и большинству стеклящихся зданий</color>  \n<color=red>Несколько боковых платформ или мостов не могут использовать одну и ту же опору</color>"
jaJP = "壁に取り付けられた小さなプラットフォームで、歩道を形成します。  \n<color=green>崖の側面やほとんどの重ねられる建物に取り付けることができます</color>  \n<color=red>複数のサイドプラットフォームや橋は同じ支持を共有できません</color>"
frFR = "Une petite plateforme attachée à un mur pour former un chemin.\n<color=green>Peut être attachée aux côtés des falaises et à la plupart des bâtiments empilables</color>\n<color=red>Plusieurs plateformes latérales ou ponts ne peuvent pas partager le même support</color>"
deDE = "Eine kleine Plattform, die an einer Wand befestigt ist, um einen Gehweg zu bilden.  \n<color=green>Kann an den Seiten von Klippen und den meisten stapelbaren Gebäuden angebracht werden</color>  \n<color=red>Mehrere Seitenplattformen oder Brücken können sich nicht die gleiche Stütze teilen</color>"
plPL = "Mała platforma przymocowana do ściany, aby stworzyć przejście.  \n<color=green>Może być przymocowana do boków klifów i większości budynków nadających się do układania w stosy</color>  \n<color=red>Wielokrotne boczne platformy lub mosty nie mogą dzielić tego samego wsparcia</color>"
ptBR = "Uma pequena plataforma fixada a uma parede para formar um caminho.\n<color=green>Pode ser fixada nas laterais de penhascos e na maioria dos edifícios empilháveis</color>\n<color=red>Múltiplas plataformas laterais ou pontes não podem compartilhar o mesmo suporte</color>"
koKR = "벽에 부착된 작은 플랫폼으로 보행로를 형성합니다.  \n<color=green> 절벽과 대부분의 쌓을 수 있는 건물의 측면에 부착할 수 있습니다.</color>  \n<color=red> 여러 개의 측면 플랫폼이나 다리는 동일한 지지대를 공유할 수 없습니다.</color>"
csCZ = "Malá platforma připevněná ke zdi za účelem vytvoření chodníku.  \n<color=green> může být připevněna k stranám útesů a většiny skladovatelných budov</color>  \n<color=red> Více bočních platforem nebo mostů nemůže sdílet stejnou oporu</color>"
viVN = "Một nền tảng nhỏ được gắn vào một bức tường để tạo thành một lối đi.\n<color=green>Có thể được gắn vào các cạnh của vách đá và hầu hết các tòa nhà có thể xếp chồng</color>\n<color=red>Nhiều nền tảng bên hoặc cầu không thể chia sẻ cùng một hỗ trợ</color>"
trTR = "Bir yürüyüş yolu oluşturmak için bir duvara bağlı küçük bir platform.  \n<color=green>Kaya kenarlarının ve en çok istiflenebilir binaların yanlarına eklenebilir</color>  \n<color=red>Birden fazla yan platform veya köprü aynı destekten yararlanamaz</color>"

