["Lapantouflemagic.Foundry.FlavorDescription"]
raw = "\"Anything can be flammable waste, if you try hard enough.\"\n -The foundry overseer"
status = "normal"
enUS = "\"Anything can be flammable waste, if you try hard enough.\"  \n-The foundry overseer"
zhCN = "“任何东西都可能成为可燃废物，只要你足够努力。”  \n-铸造厂监督员"
zhTW = "「只要你足夠努力，任何東西都能成為可燃的廢物。」  \n- 鑄造廠監督"
ruRU = "\"Что угодно может быть горючими отходами, если постараться изо всех сил.\"  \n- Надзиратель литейного завода"
jaJP = "「どんなものでも、頑張れば燃えやすい廃棄物になりうる。」  \n- 鍛冶場の監督"
frFR = "\"Tout peut être un déchet inflammable, si vous essayez suffisamment.\" - Le surveillant de la fonderie"
deDE = "\"Alles kann brennbarer Abfall sein, wenn man es nur intensiv genug versucht.\" - Der Aufseher der Gießerei"
plPL = "\"Każda rzecz może być łatwopalnym odpadem, jeśli tylko wystarczająco się postarać.\"  \n- Nadzorca odlewni"
ptBR = "\"Tudo pode ser um desperdício inflamável, se você se esforçar o suficiente.\"  \n- O supervisor da fundição"
koKR = "\"열심히 노력하면 무엇이든 불붙을 수 있는 쓰레기가 될 수 있다.\"  \n- 주조소 감독"
csCZ = "\"Všechno může být hořlavý odpad, pokud se dostatečně snažíte.\"  \n-Dozorčí v hutě"
viVN = "\"Cái gì cũng có thể là rác thải dễ cháy, nếu bạn cố gắng đủ.\"  \n-Cán bộ giám sát nhà máy"
trTR = "\"Her şey, yeterince zorladıysanız, yanıcı atık olabilir.\"  \n -Dökümhane müfettişi"

