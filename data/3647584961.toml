["Lapantouflemagic.WonderIrrigationTower.FlavorDescription"]
raw = "\"If people keep thinking irrigation towers are lame, just keep making them better until they like them!\"\n -A carpenter beaver."
status = "normal"
enUS = "\"If people keep thinking irrigation towers are lame, just keep making them better until they like them!\"  \n-A carpenter beaver."
zhCN = "“如果人们觉得灌溉塔无聊，就继续改善它们，直到他们喜欢为止！”  \n——一个木匠海狸。"
zhTW = "「如果人們還是覺得灌溉塔很無聊，那就繼續改進它們，直到他們喜歡為止！」  \n— 一隻木匠海狸。"
ruRU = "\"Если люди продолжают думать, что ирригационные башни скучные, просто продолжайте улучшать их, пока они им не понравятся!\"  \n- Бобёр-столяр."
jaJP = "「人々が灌漑タワーがダサいと思い続けるなら、彼らが好きになるまでどんどん良くしていこう！」\n- 大工のビーバー。"
frFR = "\"Si les gens continuent à penser que les tours d'irrigation sont nulles, continuez à les améliorer jusqu'à ce qu'ils les apprécient !\"  \n- Un castor menuisier."
deDE = "„Wenn die Leute weiterhin denken, Bewässerungstürme sind langweilig, mach sie einfach besser, bis sie sie mögen!“ - Ein Zimmermanns-Biber."
plPL = "\"Jeśli ludzie wciąż myślą, że wieże nawadniające są nudne, po prostu rób je lepszymi, aż je polubią!\"\n -Bobr stolarz."
ptBR = "\"Se as pessoas continuarem achando que torres de irrigação são sem graça, é só continuar melhorando elas até que gostem!\" - Um castor carpinteiro."
koKR = "\"사람들이 관개탑이 시시하다고 계속 생각한다면, 그들이 좋아할 때까지 계속 발전시키면 된다!\"  \n- 한 목재 공예 비버."
csCZ = "\"Pokud si lidé stále myslí, že zavlažovací věže jsou nudné, prostě je vylepšujte, dokud je nezačnou mít rádi!\"  \n- Tesařská bobr."
viVN = "Nếu mọi người cứ nghĩ tháp tưới là chán, hãy tiếp tục làm chúng tốt hơn cho đến khi họ thích chúng!\"  \n-Một con thủy tùng."
trTR = "Eğer insanlar sulama kulelerinin sıkıcı olduğunu düşünmeye devam ederse, onları sevmeleri için daha iyi hale getirmeye devam et!\"  \n-Bir marangoz kunduz."

["Lapantouflemagic.WonderIrrigationTower.Description"]
raw = "The ultimate irrigation tower: An elevated bath that irrigates crops with the dirty water, fertilizing them for faster growth, all the while having a minimal land pawprint.\n<color=green>Water consumption scales with irrigated area.\nPlant growth +15%</color>\n<color=#FF6EC7>Can function without workers.</color>"
status = "normal"
enUS = "The ultimate irrigation tower: An elevated bath that irrigates crops with dirty water, fertilizing them for faster growth, all the while having a minimal land pawprint.  \n<color=green>Water consumption scales with irrigated area.  \nPlant growth +15%</color>  \n<color=#FF6EC7>Can function without workers.</color>"
zhCN = "终极灌溉塔：一个提升的浴池，使用脏水灌溉庄稼，让它们更快生长，同时对土地的影响最小。\n<color=green>水的消耗与灌溉面积成比例。\n植物生长 +15%</color>\n<color=#FF6EC7>可以无工人运行。</color>"
zhTW = "終極灌溉塔：一個提升的浴缸，利用污水灌溉作物，為其提供肥料以促進更快的生長，同時擁有最小的土地足跡。\n<color=green>水的消耗隨灌溉面積而增長。\n植物生長 +15%</color>\n<color=#FF6EC7>可在無工作人員的情況下運作。</color>"
ruRU = "Ультимативная башня орошения: приподнятая купальня, которая орошает посевы грязной водой, удобряя их для быстрого роста, при этом оставляя минимальный след на земле.\n<color=green>Потребление воды зависит от орошаемой площади.\nРост растений +15%</color>\n<color=#FF6EC7>Может функционировать без работников.</color>"
jaJP = "究極の灌漑タワー：作物を汚れた水で灌漑し、肥料を与えて成長を速める高架の浴槽であり、土地への影響は最小限です。  \n<color=green>水の消費は灌漑された面積に比例します。  \n植物の成長 +15%</color>  \n<color=#FF6EC7>労働者なしでも機能します。</color>"
frFR = "La tour d'irrigation ultime : un bain surélevé qui irrigue les cultures avec de l'eau usée, les fertilisant pour une croissance plus rapide, tout en ayant une empreinte terrestre minimale.  \n<color=green>La consommation d'eau augmente avec la surface irriguée.  \nCroissance des plantes +15%</color>  \n<color=#FF6EC7>Peut fonctionner sans ouvriers.</color>"
deDE = "Der ultimative Bewässerungsturm: Ein erhöhtes Bad, das die Pflanzen mit Schmutzwasser bewässert und sie für ein schnelleres Wachstum düngt, während es eine minimale Landnutzung hat.  \n<color=green>Der Wasserverbrauch skaliert mit der bewässerten Fläche.  \nPflanzenwachstum +15%</color>  \n<color=#FF6EC7>Kann ohne Arbeiter funktionieren.</color>"
plPL = "Najlepsza wieża nawadniająca: Podwyższona kąpiel, która nawadnia uprawy brudną wodą, nawożąc je dla szybszego wzrostu, przy minimalnym śladzie stopy na ziemi.\n<color=green>Zużycie wody rośnie wraz z nawadnianym obszarem.\nWzrost roślin +15%</color>\n<color=#FF6EC7>Może działać bez pracowników.</color>"
ptBR = "A torre de irrigação definitiva: Um banho elevado que irriga culturas com água suja, fertilizando-as para um crescimento mais rápido, enquanto tem uma pegada de terra mínima.  \n<color=green>O consumo de água escala com a área irrigada.  \nCrescimento das plantas +15%</color>  \n<color=#FF6EC7>Pode funcionar sem trabalhadores.</color>"
koKR = "궁극의 관개탑: 더러운 물로 작물을 관개하여 더 빠른 성장을 위해 비료를 주는 고급 욕조로, 최소한의 땅 발자국을 남깁니다.  \n<color=green>물 소비량은 관개 면적에 비례합니다.  \n식물 성장 +15%</color>  \n<color=#FF6EC7>근로자 없이도 작동할 수 있습니다.</color>"
csCZ = "Konečná zavlažovací věž: Vyvýšená lázeň, která zavlažuje plodiny špinavou vodou, čímž je hnojí pro rychlejší růst, zatímco má minimální dopad na pozemek.  \n<color=green>Spotřeba vody se mění s zavlažovanou plochou.  \nRůst rostlin +15%</color>  \n<color=#FF6EC7>Může fungovat bez pracovníků.</color>"
viVN = "Tháp tưới tiêu tuyệt vời nhất: Một cái bồn tắm trên cao tưới nước cho cây trồng bằng nước bẩn, làm phân bón giúp cây phát triển nhanh hơn, trong khi vẫn có dấu chân đất tối thiểu. \n<color=green>Tiêu thụ nước tỷ lệ với diện tích được tưới.</color>\n<Tăng trưởng cây +15%</color>\n<color=#FF6EC7>Có thể hoạt động mà không cần công nhân.</color>"
trTR = "En üst düzey sulama kulesi: Kirli su ile mahsulleri sulayan, onları daha hızlı büyüme için gübreleyen, minimal bir arazi ayak izi ile yükseltilmiş bir banyo.\n<color=green>Sulanan alanla birlikte su tüketimi artar.\nBitki büyümesi +%15</color>\n<color=#FF6EC7>İşçi olmadan da çalışabilir.</color>"

