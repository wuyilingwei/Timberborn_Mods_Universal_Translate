["Lapantouflemagic.ScoutBalloon.Description"]
raw = "A basic hot air ballon tasked with exploring the lands away from our town in search of other settlements to establish trade routes with."
status = "normal"
enUS = "A basic hot air balloon tasked with exploring the lands away from our town in search of other settlements to establish trade routes with."
zhCN = "一只基本的热气球，负责探索我们城镇以外的土地，以寻找其他定居点以建立贸易路线。"
zhTW = "一個基本的熱氣球，負責探索我們城鎮以外的土地，尋找其他定居點以建立貿易路線。"
ruRU = "Простой воздушный шар, предназначенный для исследования территорий вдали от нашего города в поисках других поселений для установления торговых путей."
jaJP = "「私たちの町から離れた土地を探索し、交易路を確立するための他の集落を探す任務を持つ基本的な熱気球。」"
frFR = "Un ballon à air chaud basique chargé d'explorer les terres éloignées de notre ville à la recherche d'autres établissements pour établir des routes commerciales."
deDE = "Ein einfacher Heißluftballon, der damit beauftragt ist, die Gebiete außerhalb unserer Stadt zu erkunden, um nach anderen Siedlungen zu suchen, mit denen Handelsrouten eingerichtet werden können."
plPL = "Podstawowy balon na gorące powietrze, który ma za zadanie badać tereny odległe od naszego miasta w poszukiwaniu innych osad, z którymi można nawiązać szlaki handlowe."
ptBR = "Um balão de ar quente básico encarregado de explorar as terras longe da nossa cidade em busca de outros assentamentos para estabelecer rotas comerciais."
koKR = "우리 마을을 떠나 다른 정착지를 찾아 무역 경로를 확립하기 위해 탐사를 담당하는 기본적인 열기구입니다."
csCZ = "Základní horkovzdušný balón určený k prozkoumání oblastí daleko od našeho města v hledání dalších osad pro navázání obchodních cest."
viVN = "Một chiếc khinh khí cầu cơ bản có nhiệm vụ khám phá các vùng đất xa khỏi thị trấn của chúng ta để tìm kiếm các khu định cư khác nhằm thiết lập các tuyến thương mại."
trTR = "Diğer yerleşim yerleriyle ticaret yolları kurmak amacıyla kasabamızdan uzak arazileri keşfetmekle görevli temel bir sıcak hava balonu."

