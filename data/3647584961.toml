["Lapantouflemagic.primitivedamupgradeMK3.FlavorDescription"]
raw = "\"Now I’m starting to believe we won’t all die.\"\n- A sceptical beaver"
status = "normal"
enUS = "\"Now I’m starting to believe we won’t all die.\"  \n- A skeptical beaver"
zhCN = "“现在我开始相信我们不会都死去。”  \n- 一只怀疑的海狸"
zhTW = "「現在我開始相信我們不會全部死去。」  \n- 一隻懷疑的海狸"
ruRU = "\"Теперь я начинаю верить, что мы все не погибнем.\"  \n- Скептически настроенный бобёр"
jaJP = "「もう私たち全員が死ぬことはないと信じ始めた。」 - 疑い深いビーバー"
frFR = "\"Maintenant, je commence à croire que nous ne allons pas tous mourir.\"  \n- Un castor sceptique"
deDE = "\"Jetzt fange ich an zu glauben, dass wir nicht alle sterben werden.\"  \n- Ein skeptischer Bieber"
plPL = "„Teraz zaczynam wierzyć, że wszyscy nie umrzemy.”  \n- Sceptyczny bóbr"
ptBR = "\"Agora estou começando a acreditar que não vamos todos morrer.\"  \n- Um castor cético"
koKR = "\"이제 우리는 모두 죽지 않을 것 같다는 믿음이 생기기 시작했어요.\"  \n- 회의적인 비버"
csCZ = "\"Nyní začínám věřit, že všichni neumřeme.\"  \n- Skeptický bobr"
viVN = "\"Bây giờ tôi bắt đầu tin rằng chúng ta sẽ không chết hết.\"  \n- Một con cáo nghi ngờ"
trTR = "\"Artık hepimizin ölmeyeceğine inanmaya başlıyorum.\"  \n- Kuşkulu bir kunduz"

