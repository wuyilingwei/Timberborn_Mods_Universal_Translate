["Lapantouflemagic.Woodupgrade_Gatherer.Description"]
raw = "An upgrade module to be placed on top of an upgradable <color=#FFA500>Small Tower</color> (left) adjacent to a <color=#FF6EC7>triangle roof</color> building (right)\nEven more harvesting! Berries should watch out!\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "An upgrade module to be placed on top of an upgradable <color=#FFA500>Small Tower</color> (left) adjacent to a <color=#FF6EC7>triangle roof</color> building (right)  \nEven more harvesting! Berries should watch out!  \n<color=#00FFFF>Works as a Levee</color>"
zhCN = "一个升级模块，可以放置在旁边的可升级<color=#FFA500>小塔</color>（左）之上，邻接一个<color=#FF6EC7>三角屋顶</color>建筑（右）  \n更高效的采集！浆果们得小心了！  \n<color=#00FFFF>可作为堤坝使用</color>"
zhTW = "一個升級模組，可以放置在可升級的<color=#FFA500>小塔</color>（左）上，與<color=#FF6EC7>三角屋頂</color>建築（右）相鄰\n能進行更大量的採集！漿果們要小心了！\n<color=#00FFFF>可用作堤防</color>"
ruRU = "Модуль улучшения, который можно установить на верхнюю часть улучшенной <color=#FFA500>Небольшой Башни</color> (слева), смежной со зданием с <color=#FF6EC7>треугольной крышей</color> (справа) \nЕще больше сбора урожая! Ягоды должны быть осторожны!\n<color=#00FFFF>Работает как Набережная</color>"
jaJP = "「アップグレード可能な<color=#FFA500>小タワー</color>（左）の上に設置するためのアップグレードモジュールで、<color=#FF6EC7>三角屋根</color>の建物（右）に隣接しています。\nさらに harvesting！ベリーは気をつけるべきです！\n<color=#00FFFF>堤防として機能します</color>」"
frFR = "Un module de mise à niveau à placer sur un <color=#FFA500>Petit Château</color> (gauche) adjacent à un bâtiment avec un toit en <color=#FF6EC7>triangle</color> (droite)  \nEncore plus de récolte ! Les baies devraient faire attention !  \n<color=#00FFFF>Fonctionne comme une levée</color>"
deDE = "Ein Upgrade-Modul, das oben auf einen aufrüstbaren <color=#FFA500>kleinen Turm</color> (links) neben einem Gebäude mit <color=#FF6EC7>Dreiecks-Dach</color> (rechts) platziert wird.  \nNoch mehr Ernte! Beeren sollten aufpassen!  \n<color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Moduł ulepszenia, który można umieścić na upgradable <color=#FFA500>Małej Wieży</color> (po lewej) przylegającej do budynku z <color=#FF6EC7>trójkątnym dachem</color> (po prawej)  \nJeszcze więcej zbierania! Jagody powinny uważać!  \n<color=#00FFFF>Działa jak Liniowka</color>"
ptBR = "Um módulo de upgrade a ser colocado em cima de uma <color=#FFA500>Pequena Torre</color> (esquerda) adjacente a um edifício com <color=#FF6EC7>telhado triangular</color> (direita)  \nAinda mais colheita! As frutas devem ficar atentas!  \n<color=#00FFFF>Funciona como um Dique</color>"
koKR = "업그레이드 가능한 <color=#FFA500>소탑</color> (왼쪽) 위에 설치되는 업그레이드 모듈으로, <color=#FF6EC7>삼각 지붕</color> 건물 (오른쪽)과 인접해 있습니다.\n더 많은 수확! 베리는 조심해야 합니다!\n<color=#00FFFF>제방 역할을 합니다</color>"
csCZ = "Vylepšovací modul, který se umisťuje na vrchol vylepšitelné <color=#FFA500>Malé věže</color> (vlevo) vedle budovy s <color=#FF6EC7>trojúhelníkovou střechou</color> (vpravo)  \nJeště více sklizně! Bobule by si měly dávat pozor!  \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một mô-đun nâng cấp được đặt lên trên một <color=#FFA500>Tháp Nhỏ</color> (bên trái) có thể nâng cấp, liền kề với một tòa nhà có <color=#FF6EC7>mái hình tam giác</color> (bên phải).  \nCàng thu hoạch nhiều hơn! Các loại quả mọng nên cẩn thận!  \n<color=#00FFFF>Hoạt động như một Đê</color>"
trTR = "Yükseltilebilen bir <color=#FFA500>Küçük Kule</color>nin (sol) üstüne yerleştirilecek bir yükseltme modülü, bir <color=#FF6EC7>üçgen çatı</color> binasına (sağ) bitişik.  \nDaha fazla hasat! Meyveler dikkatli olmalı!  \n<color=#00FFFF>Set işlevi görür</color>"

["Lapantouflemagic.Woodupgrade_Gatherer.FlavorDescription"]
raw = "\"Just tie it up there and leave it overnight, when you’ll come back, it will behave better\""
status = "normal"
enUS = "\"Just tie it up there and leave it overnight, when you come back, it will behave better.\""
zhCN = "“把它绑在那里，留过夜，等你回来时，它会表现得更好。”"
zhTW = "“就把它綁在那裡，然後留過夜，當你回來時，它會表現得更好。”"
ruRU = "Просто привяжите это туда и оставьте на ночь, когда вы вернетесь, оно станет вести себя лучше"
jaJP = "「そこに結んで、一晩放置しておくだけ。戻ってきた時には、もっと良くなっているだろう。」"
frFR = "\"Il suffit de l'attacher là et de le laisser toute la nuit, quand vous reviendrez, il se comportera mieux\""
deDE = "\"Bind es einfach dort fest und lass es über Nacht liegen, wenn du zurückkommst, wird es sich besser verhalten.\""
plPL = "Po prostu zwiąż to tam i zostaw na noc, a gdy wrócisz, będzie się lepiej zachowywać"
ptBR = "Basta amarrá-lo lá e deixá-lo durante a noite, quando você voltar, ele se comportará melhor"
koKR = "\"그냥 거기 묶어두고 하룻밤 자게 하면, 돌아왔을 때 더 잘 행동할 거야.\""
csCZ = "\"Jen to tam přivázat a nechat přes noc, až se vrátíš, bude se chovat lépe.\""
viVN = "Chỉ cần buộc nó ở đó và để qua đêm, khi bạn trở lại, nó sẽ cư xử tốt hơn"
trTR = "\"Sadece oraya bağlayın ve bir gece bırakın, geri geldiğinizde daha iyi davranacaktır.\""

