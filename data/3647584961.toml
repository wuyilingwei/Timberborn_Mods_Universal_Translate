["trashdump.Description"]
raw = "Your first district center, if it can be called so. Only dismantle after building a better town center."
status = "normal"
enUS = "Your first district center, if it can be called that. Only demolish after building a better town center."
zhCN = "“您的第一个区中心，如果可以这么说的话。只有在建造了一个更好的城镇中心之后才能拆除。”"
zhTW = "如果能這麼稱呼的話，你的第一個區域中心。只有在建造更好的城鎮中心後才可拆除。"
ruRU = "Ваш первый районный центр, если его можно так назвать. Сносите только после постройки лучшего городского центра."
jaJP = "あなたの最初の地区センター、そう呼ぶことができるなら。より良いタウンセンターを建設した後にのみ解体してください。"
frFR = "Votre premier centre de district, si l'on peut l'appeler ainsi. Ne le démontez que après avoir construit un meilleur centre ville."
deDE = "Ihr erstes Stadtzentrum, wenn man es so nennen kann. Nur nach dem Bau eines besseren Stadtzentrums abreißen."
plPL = "Twój pierwszy centrum dzielnicy, jeśli można to tak nazwać. Rozbierz je dopiero po zbudowaniu lepszego centrum miasta."
ptBR = "Seu primeiro centro de distrito, se é que se pode chamá-lo assim. Desmonte apenas depois de construir um centro de cidade melhor."
koKR = "이것이 당신의 첫 번째 지구 중심지입니다. 더 나은 마을 센터를 건설한 후에만 해체하세요."
csCZ = "Vaše první okresní centrum, pokud se to dá tak nazvat. Demontujte pouze po vybudování lepšího městského centra."
viVN = "Trung tâm quận đầu tiên của bạn, nếu có thể gọi như vậy. Chỉ nên tháo dỡ sau khi xây dựng một trung tâm thị trấn tốt hơn."
trTR = "İlk bölge merkeziniz, eğer buna merkez denilebilirse. Ancak daha iyi bir kasaba merkezi inşa ettikten sonra yıkın."

["trashdump.FlavorDescription"]
raw = "\"We can't go further, but we can settle here\"\n -The expedition leader"
status = "normal"
enUS = "\"We can't go further, but we can settle here.\" - The expedition leader"
zhCN = "“我们不能再走了，但我们可以在这里安定下来”  \n- 漫游队队长"
zhTW = "「我們無法再前進，但我們可以在這裡安頓下來」  \n－探險隊長"
ruRU = "«Мы не можем идти дальше, но можем поселиться здесь»  \n-Глава экспедиции"
jaJP = "「これ以上進むことはできませんが、ここに定住することができます」  \n-探検隊の隊長"
frFR = "\"Nous ne pouvons pas aller plus loin, mais nous pouvons nous installer ici\" - Le chef de l'expédition"
deDE = "\"Wir können nicht weiter, aber wir können hier sesshaft werden.\"  \n- Der Expeditionsleiter"
plPL = "\"Nie możemy iść dalej, ale możemy się tu osiedlić\" - Przywódca ekspedycji"
ptBR = "\"Não podemos ir mais longe, mas podemos nos estabelecer aqui.\"  \n- O líder da expedição"
koKR = "\"우리는 더 나아갈 수는 없지만, 여기 정착할 수 있습니다\" - 탐험대장"
csCZ = "\"Nemůžeme jít dál, ale můžeme se usadit tady\" - Vedoucí expedice"
viVN = "\"Chúng ta không thể đi xa hơn, nhưng chúng ta có thể định cư ở đây\" - Thủ lĩnh đoàn thám hiểm"
trTR = "\"İleri gidemeyiz, ama burada yerleşebiliriz.\"  \n- Keşif lideri"

