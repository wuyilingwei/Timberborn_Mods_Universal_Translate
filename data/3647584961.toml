raw = "To the Expedition Leader,\n\nYour reports have been received.\n\nIt appears that your settlement is still alive and well, with a growing population.\n\nMore importantly, you have somehow endured contact with the adminitration without any threats, sabotage, or assassination attempts on either side. At least as far as we know.\n\nWe therefore conclude that further assistance is no longer necessary.\n\nYou and your settlement remain part of the proud Whitepaws nation. Do not allow our reduced supervision to affect your judgment.\n\nExpand. Build. Study. Experiment.\nTry not to destroy anything irreplaceable.\n\nWe wish you the best of luck.\n\nYou are still not welcome to come back. Success does not mean people have forgotten.\n\n\n\n<color=#A9A9A9>Text entries partially generated using ChatGTP</color>"
