["Lapantouflemagic.Topentrancewatertightlodge_segment.Description"]
raw = "A medium-sized lodge for two haulers, built around a ladder.\nCan be stacked on itself, variants, and can carry select buildings.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A medium-sized lodge for two haulers, built around a ladder. Can be stacked on itself, variants, and can carry select buildings. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一个中型小屋，供两个搬运工使用，围绕着一个梯子建造。\n可以叠加在自己上面，有变体，可以搬运特定建筑。\n<color=#00FFFF>可以作为堤坝使用</color>"
zhTW = "一個中型的倉庫，可容納兩名搬運工，圍繞著梯子建造。\n可以自我堆疊，變體，可攜帶特定建築物。\n<color=#00FFFF>作為堤壩運作</color>"
ruRU = "Среднего размера хижина для двух грузчиков, построенная вокруг лестницы. \nМожет быть установлена одна на другую, варианты, и может нести определенные здания. \n<color=#00FFFF>Работает как дамба</color>"
jaJP = "二人用の中型ロッジで、はしごを中心に建設されています。  \n自己スタック可能で、バリエーションがあり、特定の建物を運ぶことができます。  \n<color=#00FFFF>堤防として機能します</color>"
frFR = "Une cabane de taille moyenne pour deux transporteurs, construite autour d'une échelle.\nPeut être empilée sur elle-même, variantes, et peut transporter des bâtiments sélectionnés.\n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Eine mittelgroße Lodge für zwei Transporter, die um eine Treppe gebaut ist. Kann übereinander gestapelt werden, Varianten, und kann ausgewählte Gebäude tragen. <color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Średniej wielkości chata dla dwóch woźniców, zbudowana wokół drabiny. Może być układana na sobie, dostępne są warianty, i może transportować wybrane budynki. <color=#00FFFF>Działa jako wał wodny</color>"
ptBR = "Uma cabana de tamanho médio para dois carregadores, construída em torno de uma escada. \nPode ser empilhada sobre si mesma, variantes, e pode transportar edifícios selecionados. \n<color=#00FFFF>Funciona como uma Atalaia</color>"
koKR = "두 명의 운반자가 사용할 수 있는 중간 크기의 잡역소로, 사다리를 중심으로 지어졌습니다.\n자체적으로 쌓을 수 있으며, 변형이 가능하고 특정 건물을 운반할 수 있습니다.\n<색상=#00FFFF>제방으로 작동합니다</색상>"
csCZ = "Středně velká chatka pro dva nosiče, postavená kolem žebříku. \nLze ji stohovat, existují varianty a může nést vybrané budovy. \n<color=#00FFFF>Funguje jako zámek</color>"
viVN = "Một nhà nghỉ cỡ vừa cho hai người vận chuyển, được xây dựng xung quanh một cái thang.\nCó thể xếp chồng lên nhau, có các biến thể, và có thể mang theo các công trình chọn lọc.\n<color=#00FFFF>Hoạt động như một Đê</color>"
trTR = "İki yükleyici için ortalama boyutta bir binadır, bir merdivenin etrafında inşa edilmiştir.\nKendisi üzerinde istiflenebilir, varyantları vardır ve belirli yapıları taşıyabilir.\n<color=#00FFFF>Bir Set olarak çalışır</color>"

["Lapantouflemagic.Topentrancewatertightlodge_segment.FlavorDescription"]
raw = "\"I wonder how high we can go with that...\"\n -A lumberjack beaver"
status = "normal"
enUS = "\"I wonder how high we can go with that...\"  \n-A lumberjack beaver"
zhCN = "“我想知道我们能去多高……”\n-一只伐木海狸"
zhTW = "「我好奇我們能夠爬到多高…」 \n- 一隻樵夫海狸"
ruRU = "\"Интересно, как высоко мы сможем подняться с этим...\"  \n-Бобр лесоруб"
jaJP = "「どれだけ高く行けるのか、気になるな…」  \n-材木を伐るビーバー"
frFR = "\"Je me demande jusqu'où nous pouvons monter avec ça...\"  \n-Un castor bûcheron"
deDE = "„Ich frage mich, wie hoch wir damit kommen können...“  \n-ein Holzfäller-Biber"
plPL = "„Ciekawe, jak wysoko możemy się z tym wznieść…”  \n- Bobr drwal"
ptBR = "\"Eu me pergunto até onde podemos subir com isso...\"  \n-Um castor lenhador"
koKR = "\"그걸로 얼마나 높이 올라갈 수 있을까...\"\n - 나무꾼 비버"
csCZ = "\"Zajímalo by mě, jak vysoko můžeme s tím jít...\"\n -Dřevorubec bobr"
viVN = "\"Tôi tự hỏi chúng ta có thể đi cao đến đâu với cái đó...\"  \n-Một con castor thợ mộc"
trTR = "\"Acaba bununla ne kadar yükseğe çıkabiliriz...\"  \n-Bir ağaç kesen kunduz"

["Lapantouflemagic.BadwaterPump.Description"]
raw = "An entirely mechanical bad water pumping station.\nThe propeller needs to be submerged.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "An entirely mechanical bad water pumping station. The propeller needs to be submerged. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一个完全机械的污水抽水站。  \n螺旋桨需要浸入水中。  \n<color=#00FFFF>作为堤坝使用</color>"
zhTW = "完全機械化的不良水泵站。\n螺旋槳需要浸入水中。\n<color=#00FFFF>作為防洪堤運作</color>"
ruRU = "Совершенно механическая станция для откачки загрязненной воды. Пропеллер должен быть погружен в воду. <color=#00FFFF>Работает как набережная</color>"
jaJP = "完全に機械式の悪水ポンプステーションです。  \nプロペラは水中に沈める必要があります。  \n<color=#00FFFF>堤防として機能します</color>"
frFR = "Une station de pompage d'eau mauvaise entièrement mécanique.  \nL'hélice doit être submergée.  \n<color=#00FFFF>Fonctionne comme une levée</color>"
deDE = "Eine rein mechanische Abwasserpumpe.  \nDer Propeller muss untertauchen.  \n<color=#00FFFF>Funktioniert wie ein Deich</color>"
plPL = "Całkowicie mechaniczna stacja pompowania złej wody. Śmigło musi być zanurzone. <color=#00FFFF>Działa jak wał</color>"
ptBR = "Uma estação de bombeamento de água ruim totalmente mecânica. O mancal precisa estar submerso. <color=#00FFFF>Funciona como uma barreira</color>"
koKR = "완전 기계식 나쁜 물 펌프 스테이션입니다.\n프로펠러는 물에 잠겨 있어야 합니다.\n<color=#00FFFF>제방처럼 작동합니다</color>"
csCZ = "Úplně mechanická čerpadla špatné vody. \nLopatka musí být ponořená. \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một trạm bơm nước xấu hoàn toàn bằng cơ khí.  \nCánh quạt cần phải ngâm dưới nước.  \n<color=#00FFFF>Hoạt động như một Con đê</color>"
trTR = "Tamamen mekanik kötü su pompalama istasyonu. Pervanenin suya batırılması gerekiyor. <color=#00FFFF>Set gibi çalışır</color>"

["Lapantouflemagic.BadwaterPump.FlavorDescription"]
raw = "\"The modmaker is a sadistic maniac? What's a ''modmaker''? What are you talking about? Did you drink that stuff?\"\n -A worried nurse beaver"
status = "normal"
enUS = "\"The modmaker is a sadistic maniac? What's a 'modmaker'? What are you talking about? Did you drink that stuff?\"  \n-A worried nurse beaver"
zhCN = "“模组制作者是个虐待狂吗？‘模组制作者’是什么？你在说什么？你喝了那些东西吗？”  \n-一只担心的护士海狸"
zhTW = "「這個模組製作人是個Sadistic的瘋子？什麼是 “模組製作人”？你在說什麼？你喝了那些東西嗎？」  \n- 一隻擔心的護士海狸"
ruRU = "\"Модмейкер - садистский маньяк? Что такое ''модмейкер''? О чем ты говоришь? Ты пил эту штуку?\"  \n- Встревоженная медсестра-бобер"
jaJP = "「モッドメーカーはサディスティックな狂人なの？『モッドメーカー』って何？何を言っているの？その薬を飲んじゃったの？」  \n-心配そうな看護師ビーバー"
frFR = "\"Le créateur de mods est un maniaque sadique ? Qu'est-ce qu'un ''créateur de mods'' ? De quoi parlez-vous ? Avez-vous bu cette chose ?\" -Une castor infirmière inquiète"
deDE = "\"Der Mod-Macher ist ein sadistischer Maniak? Was ist ein ''Mod-Macher''? Wovon sprichst du? Hast du das Zeug getrunken?\"  \n -Eine besorgte Pflege-Biberin"
plPL = "\"Modmaker to sadystyczny maniak? Co to znaczy ''modmaker''? O co ci chodzi? Piłeś to coś?\"  \n -Zmartwiona pielęgniarka bobrów"
ptBR = "\"O criador do mod é um maníaco sádico? O que é um ''criador de mod''? Do que você está falando? Você bebeu aquela coisa?\"  \n- Uma castor enfermeira preocupada"
koKR = "\"모드 제작자가 Sadistic한 정신병자라고? '모드 제작자'가 뭐야? 무슨 소리 하는 거야? 그걸 마셨나?\"  \n- 걱정하는 간호 비버"
csCZ = "\"Módový tvůrce je sadistický maniak? Co je to ''módový tvůrce''? O čem to mluvíte? Pila jsi tohle?\" - Znepokojená sestřička bobr"
viVN = "\"Nhà làm mod là một kẻ cuồng bạo dã man? Nhà làm mod là gì? Bạn đang nói cái gì vậy? Bạn đã uống thứ đó sao?\"\n - Một nhím thợ lo lắng"
trTR = "\"Mod yapımcısı sadistik bir maniac mı? ''Mod yapımcısı'' ne demek? Ne hakkında konuşuyorsun? O şeyi içtin mi?\"\n -Endişeli bir hemşire kunduzu"

