["Lapantouflemagic.Cabbage2.FlavorDescription"]
raw = "\"If you bite in it, you EAT it.\" \n-Grandma beaver"
status = "normal"
enUS = "\"If you bite into it, you EAT it.\"  \n- Grandma Beaver"
zhCN = "“如果你咬了它，你就吃掉它。”  \n- 老奶奶海狸"
zhTW = "「如果你咬了一口，你就會吃掉它。」  \n- 老奶奶海狸"
ruRU = "\"Если ты укусишь его, ты ЕШЬ его.\"  \n- Бабушка бобер"
jaJP = "「一口かじると、あなたはそれを食べる。 - おばあちゃんビーバー」"
frFR = "\"Si tu mords dedans, tu le MANGES.\" \n-Grand-mère castor"
deDE = "\"Wenn du hineinbeißt, ISST du es.\"  \n- Oma Biber"
plPL = "\"Jeśli to ugryziesz, to TO JESZ.\"  \n-Babcia bóbr"
ptBR = "\"Se você morder, você COME.\"  \n-Vovó castor"
koKR = "\"만약 당신이 그것을 물면, 당신은 그것을 먹게 됩니다.\"  \n- 할머니 비버"
csCZ = "\"Pokud do toho kousneš, JÍŠ to.\" \n-Babička bobr"
viVN = "\"Nếu bạn cắn vào nó, bạn sẽ ĂN nó.\" \n-Bà beaver"
trTR = "\"Eğer ısırırsan, YERSİN.\"  \n-Büyükanne kürkçü"

["NaturalResource.PinkBirch.FlavorDescription"]
raw = "\"What's cotton candy? Why does everyone call them \"cotton candy tree\"?\"\n -A farmer beaver"
status = "normal"
enUS = "\"What's cotton candy? Why does everyone call them 'cotton candy tree'?\"  \n-A farmer beaver"
zhCN = "“棉花糖是什么？为什么大家都叫它们‘棉花糖树’？”  \n- 一位农夫海狸"
zhTW = "「什麼是棉花糖？為什麼大家都叫它們『棉花糖樹』？」  \n- 一位農夫海狸"
ruRU = "\"Что такое сахарная вата? Почему все называют их «деревом сахарной ваты»?\"  \n- «Крестьянин бобер»"
jaJP = "「綿菓子って何？どうしてみんな「綿菓子の木」って呼ぶの？」  \n- 農夫のビーバー"
frFR = "\"Qu'est-ce que la barbe à papa ? Pourquoi tout le monde les appelle-t-il 'arbre à barbe à papa' ?\"  \n-Un castor fermier"
deDE = "\"Was ist Zuckerwatte? Warum nennt man sie alle 'Zuckerwattebaum'?\" - Ein Bauer-Biber"
plPL = "\"Co to jest wata cukrowa? Dlaczego wszyscy nazywają je „drzewem waty cukrowej”?\" -Bobrownik rolnik"
ptBR = "\"O que é algodão doce? Por que todo mundo chama de 'árvore de algodão doce'?\"  \n-Um castor agricultor"
koKR = "\"솜사탕이 뭐지? 왜 모두들 그걸 '솜사탕 나무'라고 부르는 거지?\"  \n- 농부 비버"
csCZ = "\"Co je to cukrová vata? Proč jim všichni říkají 'strom cukrové vaty'?\"  \n- Farmářský bobr"
viVN = "\"Cotton candy là gì? Tại sao mọi người lại gọi chúng là 'cây bông gòn'?\" -Một chú hải ly nông dân"
trTR = "\"Pamuk şeker nedir? Herkes neden onlara \"pamuk şeker ağacı\" diyor?\"  \n-Bir çiftlik kunduz"

