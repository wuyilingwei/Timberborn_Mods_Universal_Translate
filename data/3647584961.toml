["Lapantouflemagic.NuclearReactor1.Description"]
raw = "A relatively weak nuclear reactor powered by nuclear waste and the radioactive elements dissolved in bad water.\n<color=red>Must be build on a bad water source</color>"
status = "normal"
enUS = "A relatively weak nuclear reactor powered by nuclear waste and the radioactive elements dissolved in contaminated water.  \n<color=red>Must be built on a contaminated water source</color>"
zhCN = "一个相对弱的核反应堆，由核废料和溶解在污水中的放射性元素提供能量。  \n<color=red>必须建造在污水源上</color>"
zhTW = "一個相對較弱的核反應堆，使用核廢料和溶解在惡劣水源中的放射性元素提供動力。  \n<color=red>必須建造在惡劣水源上</color>"
ruRU = "Относительно слабый ядерный реактор, работающий на ядерных отходах и радиоактивных элементах, растворенных в плохой воде.  \n<color=red>Должен быть построен на источнике плохой воды</color>"
jaJP = "「比較的弱い核反応炉で、核廃棄物と悪化した水中に溶け込んだ放射性元素によって動作します。<color=red>悪化した水源の上に建設する必要があります</color>」"
frFR = "Un réacteur nucléaire relativement faible alimenté par des déchets nucléaires et les éléments radioactifs dissous dans de l'eau contaminée.  \n<color=red>Doit être construit sur une source d'eau contaminée</color>"
deDE = "Ein relativ schwacher Kernreaktor, der mit nuklearen Abfällen und den radioaktiven Elementen aus verschmutztem Wasser betrieben wird. \n<color=red> muss an einer Quelle für verschmutztes Wasser gebaut werden </color>"
plPL = "Stosunkowo słaba reaktor jądrowy zasilany odpadami nuklearnymi i radioaktywnymi pierwiastkami rozpuszczonymi w złej wodzie.  \n<color=red>Musisz go zbudować na źródle złej wody</color>"
ptBR = "Um reator nuclear relativamente fraco, alimentado por resíduos nucleares e os elementos radioativos dissolvidos na água poluída.  \n<color=red>Deve ser construído em uma fonte de água poluída</color>"
koKR = "상대적으로 약한 원자력 발전소로, 방사성 폐기물과 나쁜 물에 녹아 있는 방사성 요소로 작동합니다.  \n<color=red>나쁜 물 근원지에 건설해야 합니다</color>"
csCZ = "Relativně slabý jaderný reaktor poháněný jaderným odpadem a radioaktivními prvky rozpuštěnými ve špatné vodě.  \n<color=red>Musí být postaven na zdroji špatné vody</color>"
viVN = "Một lò phản ứng hạt nhân tương đối yếu được cung cấp năng lượng bởi chất thải hạt nhân và các yếu tố phóng xạ hòa tan trong nước bẩn.  \n<color=red>Cần phải xây dựng trên một nguồn nước bẩn</color>"
trTR = "Nükleer atık ve kirli sudaki radyoaktif elementlerle çalışan, nispeten zayıf bir nükleer reaktördür.  \n<color=red>Kirli su kaynağının üzerine inşa edilmelidir</color>"

["Lapantouflemagic.NuclearReactor.FlavorDescription"]
raw = "\"Every morning someone has to hit the big red button, and if you're not lucky, KABOOM !\nOtherwise nothing happens until the next day. At least according to their media, that’s what hoomans did.\"\n -A Hooman historian beaver"
status = "normal"
enUS = "\"Every morning someone has to hit the big red button, and if you're not lucky, KABOOM! Otherwise nothing happens until the next day. At least according to their media, that’s what humans did.\"  \n-A Human historian beaver"
zhCN = "“每天早晨，总有人得按下那个大红按钮，如果你运气不好，轰的一声！否则，直到第二天什么也不会发生。至少根据他们的媒体，那就是人类所做的。”  \n- 一位人类历史学家海狸"
zhTW = "「每個早晨都得有人按一下大紅鈕，若運氣不佳，就會轟的一聲！否則就等到明天，不會發生其他事情。至少根據他們的媒體，這就是人類所做的。」  \n— 一位人類歷史學家海狸"
ruRU = "\"Каждое утро кто-то должен нажать на большую красную кнопку, и если вам не повезет, БУМ! В противном случае ничего не происходит до следующего дня. По крайней мере, согласно их СМИ, именно так и действовали люди.\" - Бобер-историк человечеств."
jaJP = "「毎朝誰かが大きな赤いボタンを押さなければならず、運が悪ければ、バン！\nそうでなければ、次の日まで何も起こりません。少なくとも彼らのメディアによれば、そういうことを人間はしていた。」\n- ホーマンの歴史学者ビーバー"
frFR = "\"Chaque matin, quelqu'un doit appuyer sur le gros bouton rouge, et si vous n'avez pas de chance, KABOOM ! Sinon, rien ne se passe jusqu'au lendemain. Du moins, selon leurs médias, c'est ce que les humains ont fait.\" \n- Un castor historien humain"
deDE = "\"Jeden Morgen muss jemand den großen roten Knopf drücken, und wenn du nicht Glück hast, KABOOM! Ansonsten passiert bis zum nächsten Tag nichts. Zumindest laut ihren Medien, das haben die Hoomans gemacht.\"  \n- Ein hoomanischer Historiker-Biber"
plPL = "\"Każdego ranka ktoś musi wcisnąć duży czerwony guzik, a jeśli nie masz szczęścia, KABOOM! W przeciwnym razie nic się nie dzieje do następnego dnia. Przynajmniej według ich mediów, tak robiły hoomany.\"  \n - Bóbr-historyk hoomanów"
ptBR = "\"Cada manhã alguém tem que apertar o grande botão vermelho, e se você não tiver sorte, KABOOM! Caso contrário, nada acontece até o dia seguinte. Pelo menos segundo a mídia deles, é assim que os hoomans agiam.\"  \n- Um castor historiador hooman"
koKR = "\"매일 아침 누군가는 큰 빨간 버튼을 눌러야 하고, 운이 좋지 않으면 KABOOM! 그렇지 않으면 다음 날까지 아무 일도 일어나지 않는다. 적어도 그들의 미디어에 따르면, 인간들은 그렇게 했다.\"  \n- 한 인간 역사 학자 비버"
csCZ = "\"Každé ráno někdo musí stisknout velké červené tlačítko, a pokud nemáte štěstí, BUM!\nJinak se nic nestane až do příštího dne. Aspoň podle jejich médií, tohle dělali hoomani.\"\n -Beaver, hoomanský historik"
viVN = "Mỗi sáng, ai đó phải nhấn nút đỏ lớn, và nếu bạn không may mắn, KABOOM! \nNếu không, sẽ chẳng có gì xảy ra cho đến ngày hôm sau. Ít nhất theo truyền thông của họ, đó là những gì bọn hooman đã làm.\" \n-Người hồ lịch sử của loài thủy sử"
trTR = "\"Her sabah birinin büyük kırmızı düğmeye basması gerekiyor ve şanslı değilsen, KABOOM! Aksi takdirde, bir sonraki güne kadar hiçbir şey olmaz. En azından onların medyasına göre, insanlar böyle yapıyordu.\"  \n -Bir İnsan tarihçisi kunduz"

["Luc.Library.Description"]
raw = "A large building with lots of books for studying.\nThe only way to obtain science.\n<color=green>Is built from the inside like a wonder</color>."
status = "normal"
enUS = "A large building with lots of books for studying. The only way to obtain science. <color=green>Is built from the inside like a wonder</color>."
zhCN = "一个大型建筑，里面有很多书供学习。\n获取科学的唯一途径。\n<color=green>像奇迹一样从内部建造</color>。"
zhTW = "一座擁有大量書籍以供學習的大型建築。\n獲取科學的唯一方法。\n<color=green>從內部就像奇觀般建造</color>。"
ruRU = "Большое здание с множеством книг для изучения. Единственный способ получить науку. <color=green>Строится изнутри как чудо</color>."
jaJP = "学習用の本がたくさんある大きな建物です。  \n科学を得る唯一の方法です。  \n<color=green>驚異のように内部から建設されます</color>。"
frFR = "Un grand bâtiment avec beaucoup de livres pour étudier.  \nLe seul moyen d'obtenir des sciences.  \n<color=green>Est construit de l'intérieur comme une merveille</color>."
deDE = "Ein großes Gebäude mit vielen Büchern zum Studieren. \nDer einzige Weg, um Wissenschaft zu erlangen. \n<color=green>Wird von innen wie ein Wunder gebaut</color>."
plPL = "Duży budynek z wieloma książkami do nauki. \nJedyny sposób na zdobycie nauki. \n<color=green>Budowany od wewnątrz jak cud</color>."
ptBR = "Um grande edifício com muitos livros para estudo.  \nA única maneira de obter ciência.  \n<color=green>É construído por dentro como uma maravilha</color>."
