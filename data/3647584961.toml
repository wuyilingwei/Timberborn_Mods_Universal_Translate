["Lapantouflemagic.primitivedam3x3Utilityupgrade.FlavorDescription"]
raw = "Behold the incredible power of sticks and glue! And screws, planks, metal beams and proper planning of course."
status = "normal"
enUS = "Behold the incredible power of sticks and glue! And screws, planks, metal beams, and proper planning, of course."
zhCN = "“看啊，树枝和胶水的惊人力量！当然，还有螺丝、木板、钢梁和合理的规划。”"
zhTW = "看看木棒和膠水的驚人力量！當然還有螺絲、木板、金屬梁和適當的規劃。"
ruRU = "Восхитительная сила палок и клея! А еще шурупов, досок, металлических балок и, конечно, правильного планирования."
jaJP = "木と接着剤の驚くべき力をご覧あれ！もちろん、ネジ、板、金属ビーム、そしてきちんとした計画も。"
frFR = "Voici l'incroyable puissance des bâtons et de la colle ! Et des vis, des planches, des poutres en métal et bien sûr, une planification appropriée."
deDE = "Bewundert die unglaubliche Kraft von Stöcken und Kleber! Und Schrauben, Planken, Metallträgern und natürlich richtigem Planen."
plPL = "Podziwiaj niesamowitą moc patyków i kleju! A także śrub, desek, metalowych belek i oczywiście odpowiedniego planowania."
ptBR = "Veja o incrível poder de gravetos e cola! E parafusos, tábuas, vigas de metal e, claro, um planejamento adequado."
koKR = "막대기와 접착제의 믿을 수 없는 힘을 보라! 물론 나사, 판자, 금속 빔과 적절한 계획도 포함된다."
csCZ = "Hle, neuvěřitelná síla klacíků a lepidla! A šroubů, prken, kovových trámů a samozřejmě řádného plánování."
viVN = "Hãy chiêm ngưỡng sức mạnh tuyệt vời của gậy và keo! Cũng như đinh vít, ván, dầm kim loại và tất nhiên là kế hoạch hợp lý."
trTR = "Çubuklar ve yapıştırıcının inanılmaz gücüne tanık olun! Ve tabii ki vidalar, tahtalar, metal kirişler ve doğru planlama."

