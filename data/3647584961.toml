["Lapantouflemagic.SevereDisease.DeathMessage"]
raw = "<color=green>contracted what can only be described as ''everything''. Doctors took the hard decision to put him down after it started growing a third head.</color>"
status = "normal"
enUS = "<color=green>contracted what can only be described as 'everything'. Doctors took the hard decision to put him down after it started growing a third head.</color>"
zhCN = "<color=green>感染了只能被描述为“万病”的疾病。在它开始长出第三个头后，医生们做出了艰难的决定，将它安乐死。</color>"
zhTW = "<color=green>感染了只能形容為「一切」的疾病。在它開始長出第三顆頭後，醫生們作出了艱難的決定，要讓它安樂死。</color>"
ruRU = "<color=green>подхватил то, что можно описать как «все». Врачи приняли тяжелое решение усыпить его, после того как у него начала расти третья голова.</color>"
jaJP = "<color=green>「すべて」としか表現できない病気にかかってしまった。医者たちは、第三の頭が成長し始めた後、彼を安楽死させるという厳しい決断を下した。</color>"
frFR = "<color=green>a contracté ce qui ne peut être décrit que comme ''tout''. Les médecins ont pris la décision difficile de l'euthanasier après qu'il a commencé à faire pousser une troisième tête.</color>"
deDE = "<color=green>hat sich etwas eingefangen, das man nur als ''alles'' beschreiben kann. Die Ärzte trafen die schwierige Entscheidung, ihn einzuschläfern, nachdem er begann, einen dritten Kopf zu entwickeln.</color>"
plPL = "<color=green>zachorował na coś, co można opisać tylko jako ''wszystko''. Lekarze podjęli trudną decyzję o uśpieniu go, gdy zaczęła rosnąć mu trzecia głowa.</color>"
ptBR = "<color=green>contraiu o que só pode ser descrito como ''tudo''. Os médicos tomaram a difícil decisão de eutanasiá-lo após começar a crescer uma terceira cabeça.</color>"
koKR = "<color=green>''모든 것''이라고밖에 설명할 수 없는 병에 걸렸습니다. 세 번째 머리가 자라기 시작한 후, 의사들은 그를 안락사시키는 힘든 결정을 내렸습니다.</color>"
csCZ = "<color=green>nakazil se tím, co lze popsat pouze jako ''všechno''. Lékaři se rozhodli pro těžké rozhodnutí, když mu začala růst třetí hlava.</color>"
viVN = "<color=green>đã nhiễm thứ mà chỉ có thể mô tả là ''mọi thứ''. Các bác sĩ đã đưa ra quyết định khó khăn để đặt anh ấy xuống sau khi nó bắt đầu mọc thêm một cái đầu thứ ba.</color>"
trTR = "<color=green>''her şey'' olarak tanımlanabilecek bir hastalığa yakalandı. Doktorlar, üçüncü bir başın büyümeye başladığına dair zor bir karar alarak onu uyutmaya karar verdiler.</color>"

