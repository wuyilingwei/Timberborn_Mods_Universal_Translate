["Lapantouflemagic.DeepMineBOXStorage.FlavorDescription"]
raw = "\"Why did they need all this space? Were they planning to live there? To survive their own man-made apocalypse?\"\n-An explorer beaver"
status = "normal"
enUS = "\"Why did they need all this space? Were they planning to live there? To survive their own man-made apocalypse?\"  \n-An explorer beaver"
zhCN = "“他们为什么需要这么大的空间？他们是打算住在这里吗？为了生存自己的人为末日？”  \n— 一只探险海狸"
zhTW = "「他們為什麼需要這麼大的空間？他們是打算住在那裡嗎？為了 sobrevivir 自己製造的人禍 apocalypse？」  \n- 一隻探索者海狸"
ruRU = "\"Зачем им понадобилось всё это пространство? Они собирались жить здесь? Чтобы выжить в своём собственном искусственном апокалипсисе?\"  \n- Исследователь-бобёр"
jaJP = "「なぜ彼らはこんなにも多くのスペースを必要としたのだろう？そこで暮らそうとしていたのか？自らの人工的な黙示録から生き延びるために？」\n- 探検家ビーバー"
frFR = "\"Pourquoi avaient-ils besoin de tout cet espace ? Prévoyaient-ils d'y vivre ? De survivre à leur propre apocalypse causée par l'homme ?\"\n- Un castor explorateur"
deDE = "„Warum brauchten sie all diesen Platz? Planten sie, dort zu leben? Um ihre eigene von Menschen verursachte Apokalypse zu überstehen?“  \n- Ein explorer Biber"
plPL = "„Dlaczego potrzebowali całej tej przestrzeni? Planując tam mieszkać? Aby przetrwać własną apokalipsę, którą stworzyli?”  \n- Wędrowny bóbr"
ptBR = "\"Por que eles precisavam de todo esse espaço? Estavam planejando viver lá? Para sobreviver ao seu próprio apocalipse feito pelo homem?\"  \n- Um castor explorador"
koKR = "\"왜 그들은 이렇게 많은 공간이 필요했을까? 그곳에 살 계획이었을까? 자신들이 만든 종말에서 살아남기 위해?\"  \n- 탐험가 비버"
csCZ = "Proč potřebovali celý ten prostor? Plánovali tam žít? Aby přežili svůj vlastní apokalyptický scénář?\"  \n- \"Průzkumný bobr"
viVN = "\"Tại sao họ cần nhiều không gian như vậy? Họ có định sống ở đây không? Để sống sót qua tận thế do chính tay họ tạo ra?\"  \n-Một chú beaver thám hiểm"
trTR = "\"Neden bu kadar alana ihtiyaç duydular? Orada mı yaşamayı planlıyorlardı? Kendi yapay kıyametlerinde hayatta kalmak için mi?\"\n-Bir kaşif kunduzu"

