ruRU = "Небольшой водонепроницаемый домик, который управляет затвором. Позволяет дамбе не полностью блокировать поток воды. <color=#00FFFF>Работает как набережная</color>"
jaJP = "小さな気密の家で、スルースを制御します。\nダムが水の流れを完全に遮ることがないようにします。\n<color=#00FFFF>堤防として機能します</color>"
frFR = "Une petite maison étanche qui contrôle une vanne.  \nPermet au barrage de ne pas bloquer complètement le débit d'eau.  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Ein kleines wasserdichtes Haus, das ein Schleusentor steuert. Ermöglicht es dem Damm, den Wasserfluss nicht vollständig zu blockieren. <color=#00FFFF>Funktioniert als Damm</color>"
plPL = "Mały wodoodporny domek, który kontroluje śluzę. \nPozwala, aby tamy nie blokowały całkowicie przepływu wody. \n<color=#00FFFF>Działa jak wał</color>"
ptBR = "Uma pequena casa à prova d'água que controla uma comporta.\nPermite que a barragem não bloqueie completamente o fluxo de água.\n<color=#00FFFF>Funciona como um Dique</color>"
koKR = "작은 방수 하우스로 수문을 제어합니다.  \n댐이 물 흐름을 완전히 차단하지 않도록 합니다.  \n<color=#00FFFF>제방처럼 작동합니다</color>"
csCZ = "Malý vodotěsný dům, který ovládá zámeček.\nUmožňuje přehradě, aby zcela nezablokovala tok vody.\n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một ngôi nhà nhỏ kín nước điều khiển một cống. Cho phép đập không chặn hoàn toàn dòng chảy của nước. <color=#00FFFF>Hoạt động như một Đê</color>"
trTR = "Su akışını tamamen engellemeyen bir suların yönetimini sağlayan küçük su geçirmez bir ev.\n<color=#00FFFF>Bir Set gibi çalışır</color>"

