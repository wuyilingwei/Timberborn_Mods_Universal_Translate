ruRU = "\"На что только не пойдет бобровая порода ради того, чтобы внести разнообразие в свою жизнь?\""
jaJP = "\"ビーバーの種族が人生をスパイスアップするために何をしないだろう？\""
frFR = "\"Que ne ferait pas une loutre pour pimenter la vie ?\""
deDE = "„Was würde die Biberart nicht tun, um das Leben etwas aufregender zu gestalten?“"
