zhTW = "一種使用極密物質作為重量的重型重力電池。"
ruRU = "Аккумулятор тяжёлого типа, использующий крайне плотное вещество в качестве груза."
jaJP = "「非常に密度の高い物質を重りとして使用した重責重力バッテリー。」"
frFR = "Une batterie gravitationnelle robuste utilisant une matière extrêmement dense comme poids."
