["Lapantouflemagic.Factory.FlavorDescription"]
raw = "\"If you need an anvil to make other anvils, where does the first anvil come from?\"\n -Armok, metalworker beaver"
status = "normal"
enUS = "\"If you need an anvil to make other anvils, where does the first anvil come from?\"\n -Armok, metalworker beaver"
zhCN = "“如果你需要一个锤子来制造其他锤子，那么第一个锤子来自哪里？”  \n- 阿莫克，金属工鼹鼠"
zhTW = "「如果你需要一個鐵砧來製作其他鐵砧，那麼第一個鐵砧從哪裡來？」\n -阿莫克，金屬工人海狸"
ruRU = "\"Если вам нужен ковка, чтобы сделать другие ковки, откуда берется первая ковка?\"  \n- Армок, металлург-бобер"
jaJP = "「他の金床を作るために金床が必要なら、最初の金床はどこから来たのですか？」  \n- アルモク、金属職人ビーバー"
frFR = "\"Si vous avez besoin d'une enclume pour fabriquer d'autres enclumes, d'où vient la première enclume ?\"\n -Armok, castor métallurgiste"
deDE = "\"Wenn du einen Amboss brauchst, um andere Ambosse herzustellen, woher kommt der erste Amboss?\"  \n -Armok, metallverarbeitender Biber"
plPL = "\"Jeśli potrzebujesz kowadła, aby zrobić inne kowadła, skąd pochodzi pierwsze kowadło?\"  \n- Armok, bobrzy metalowiec"
ptBR = "\"Se você precisa de uma bigorna para fazer outras bigornas, de onde vem a primeira bigorna?\"  \n-Armok, castor metalúrgico"
koKR = "\"다른 모루를 만들기 위해 모루가 필요하다면, 첫 번째 모루는 어디서 오는 걸까?\"\n - 아르모크, 금속공 비버"
csCZ = "\"Pokud potřebujete kovadlinu k výrobě dalších kovadel, odkud pochází ta první kovadlina?\"  \n-Armok, metalový bobr"
viVN = "\"Nếu bạn cần một cái búa để làm ra những cái búa khác, vậy cái búa đầu tiên đến từ đâu?\"  \n- Armok, loại gỗ thợ kim loại"
trTR = "\"Eğer başka çıngıraklar yapmak için bir çıngırak gerekiyorsa, ilk çıngırak nereden geliyor?\" -Armok, metal işçiliği yapan kunduz"

