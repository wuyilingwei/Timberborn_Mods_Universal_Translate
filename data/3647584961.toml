["Luc.Engineer.Description"]
raw = "A fancy building to help engineers show they're smarter than us. Also used to design mechanical buildings that work.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A fancy building to help engineers show they're smarter than us. Also used to design mechanical buildings that work. <color=#00FFFF>Works as a Levee</color>"
zhCN = "“一个华丽的建筑，帮助工程师展示他们比我们聪明。也用于设计能运作的机械建筑。<color=#00FFFF>作为堤坝使用</color>”"
zhTW = "一座豪華的建築，幫助工程師展示他們比我們更聰明。也用於設計運作的機械建築。  \n<color=#00FFFF>可以作為堤防使用</color>"
ruRU = "Красивое здание, чтобы помочь инженерам показать, что они умнее нас. Также используется для проектирования механических зданий, которые функционируют.  \n<color=#00FFFF>Работает как дамба</color>"
jaJP = "エンジニアが私たちより賢いことを示すための豪華な建物。また、機械的な建物を設計するためにも使用されます。  \n<color=#00FFFF>堤防として機能します</color>"
frFR = "Un bâtiment sophistiqué pour aider les ingénieurs à prouver qu'ils sont plus intelligents que nous. Également utilisé pour concevoir des bâtiments mécaniques qui fonctionnent. <color=#00FFFF>Fonctionne comme un Levée</color>"
deDE = "Ein schickes Gebäude, das Ingenieuren hilft zu zeigen, dass sie schlauer sind als wir. Wird auch genutzt, um mechanische Gebäude zu entwerfen, die funktionieren.  \n<color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Fajny budynek, który pomaga inżynierom pokazać, że są mądrzejsi od nas. Używany również do projektowania budowli mechanicznych, które działają.  \n<color=#00FFFF>Działa jako Tamisko</color>"
ptBR = "Um prédio elegante para ajudar os engenheiros a mostrarem que são mais inteligentes que nós. Também é usado para projetar edifícios mecânicos que funcionam.  \n<color=#00FFFF>Funciona como uma Barragem</color>"
koKR = "엔지니어들이 자신이 우리보다 똑똑하다는 것을 보여줄 수 있도록 도와주는 멋진 건물. 기계 건물을 설계하는 데에도 사용됩니다.\n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Luxusní budova, která pomáhá inženýrům dokazovat, že jsou chytřejší než my. Také se používá k navrhování mechanických budov, které fungují.  \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một tòa nhà sang trọng giúp các kỹ sư thể hiện rằng họ thông minh hơn chúng ta. Cũng được sử dụng để thiết kế các tòa nhà cơ khí hoạt động.  \n<color=#00FFFF>Hoạt động như một đê</color>"
trTR = "Mühendislerin bizden daha zeki olduklarını göstermelerine yardımcı olan şık bir bina. Ayrıca çalışan mekanik binaları tasarlamak için de kullanılır.\n<color=#00FFFF>Bir Set olarak çalışır</color>"

["Luc.Engineer.FlavorDescription"]
raw = "\"Engineers are the worst\"\n -An anonymous architect beaver"
