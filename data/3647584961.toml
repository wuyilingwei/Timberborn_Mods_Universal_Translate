["Lapantouflemagic.WaterCannonH.Description"]
raw = "An intriguing evolution of the mechanical water pump of other factions. \nShoots water at a 70° angle for ranged irrigation.\nAllows to send water high up but at short range.\n<color=green>The cannon will fill the reservoir up to the blue flag</color>"
status = "normal"
enUS = "An intriguing evolution of the mechanical water pump from other factions.  \nShoots water at a 70° angle for ranged irrigation.  \nAllows water to be sent high up but at short range.  \n<color=green>The cannon will fill the reservoir up to the blue flag</color>"
zhCN = "“其他派系机械水泵的有趣进化。以70°的角度发射水用于远程灌溉。允许将水高高喷射但射程较短。<color=green>炮筒将水库填充到蓝色标志</color>”"
zhTW = "其他派系的機械水泵的有趣進化。\n以70°的角度發射水，進行遠程灌溉。\n可以將水送上高處，但距離較短。\n<color=green>大砲將把水庫填滿至藍色旗幟處</color>"
ruRU = "Интригующая эволюция механического насоса воды от других фракций. \nСтреляет водой под углом 70° для дальнего орошения.\nПозволяет поднимать воду высоко, но на коротком расстоянии.\n<color=green>Пушка заполнит резервуар до синего флага</color>"
jaJP = "「他の派閥の機械式水ポンプの興味深い進化。  \n70°の角度で水を打ち出し、遠距離の灌漑が可能。  \n高い位置に水を送ることができるが、射程は短い。  \n<color=green>キャノンは青い旗までタンクを満たします。</color>」"
frFR = "Une évolution intrigante de la pompe à eau mécanique des autres factions. \nTire de l'eau à un angle de 70° pour l'irrigation à distance.\nPermet d'envoyer de l'eau très haut mais à courte portée.\n<color=green>Le canon remplira le réservoir jusqu'au drapeau bleu</color>"
deDE = "Eine faszinierende Weiterentwicklung der mechanischen Wasserpumpe anderer Fraktionen. \nSchießt Wasser in einem 70°-Winkel für eine Fernbewässerung. \nErmöglicht es, Wasser hoch zu senden, aber auf kurze Distanz. \n<color=green>Die Kanone wird den Vorratsbehälter bis zur blauen Flagge füllen</color>"
plPL = "Intrygująca ewolucja mechanicznej pompy wodnej z innych frakcji. \nStrzela wodą pod kątem 70° do celów na odległość. \nUmożliwia podniesienie wody na dużą wysokość, ale na krótkim zasięgu. \n<color=green>Armata napełni zbiornik do niebieskiej flagi</color>"
ptBR = "Uma evolução intrigante da bomba de água mecânica de outras facções.  \nAtira água em um ângulo de 70° para irrigação a distância.  \nPermite enviar água bem alto, mas a curta distância.  \n<color=green>O canhão encherá o reservatório até a bandeira azul</color>"
koKR = "다른 진영의 기계식 물 펌프의 매력적인 발전. \n70° 각도로 물을 쏘아 원거리 관개를 수행합니다.\n짧은 거리에서 물을 높게 보낼 수 있습니다.\n<color=green>포는 저장소를 파란 깃발까지 채울 것입니다</color>"
csCZ = "Zajímavá evoluce mechanického vodního čerpadla jiných frakcí. \nStřílí vodu pod úhlem 70° pro dálkovou zavlažování. \nUmožňuje posílat vodu vysoko, ale na krátkou vzdálenost. \n<color=green>Kanón naplní nádrž až po modrou vlajku</color>"
viVN = "Một sự tiến hóa thú vị của bơm nước cơ khí từ các phe phái khác. \nBắn nước ở góc 70° để tưới tiêu từ xa. \nCho phép gửi nước cao nhưng trong khoảng cách ngắn. \n<color=green>Pháo sẽ làm đầy bể chứa lên đến cột cờ xanh</color>"
trTR = "Diğer fraksiyonların mekanik su pompasının ilginç bir evrimi. \n70° açıyla uzağa sulama için su fırlatır.\nSu gönderimini yukarıda ancak kısa mesafede yapar.\n<color=green>Top, rezervuarı mavi bayrağa kadar dolduracak</color>"

