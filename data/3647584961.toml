["Lapantouflemagic.Waterpumpupgradewallsegment.Description"]
raw = "A watertight structure to block off the extremity of a chain of water pumps.\n<color=red>Ram the camera into the building if placement is difficult</color>.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A watertight structure to block off the end of a chain of water pumps.  \n<color=red>Ram the camera into the building if placement is difficult</color>.  \n<color=#00FFFF>Functions as a Levee</color>"
zhCN = "“一个防水结构，用于封锁水泵链条的末端。\n<color=red>如果放置困难，可以将相机撞入建筑物</color>。\n<color=#00FFFF>作为堤坝使用</color>”"
zhTW = "一個防水結構，用於封閉水泵鏈的末端。\n<color=red>如果安置困難，將相機撞向建築物</color>。\n<color=#00FFFF>作為堤壩使用</color>"
ruRU = "Герметичная конструкция для блокировки конца цепочки водных насосов.  \n<color=red>Технологии можно довести до конца, если установка затруднена</color>.  \n<color=#00FFFF>Работает как плотина</color>"
jaJP = "水ポンプの列の端を遮るための防水構造です。\n<color=red>設置が難しい場合はカメラを建物に突っ込ませてください</color>。\n<color=#00FFFF>堤防として機能します</color>"
frFR = "Une structure étanche pour bloquer l'extrémité d'une chaîne de pompes à eau.  \n<color=red>Enfoncez la caméra dans le bâtiment si le placement est difficile</color>.  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Eine wasserdichte Struktur, um das Ende einer Kette von Wasserpumpen abzudichten.  \n<color=red>Ram die Kamera in das Gebäude, wenn die Platzierung schwierig ist</color>.  \n<color=#00FFFF>Funktioniert wie ein Deich</color>"
plPL = "Struktura wodoszczelna, aby zablokować końcówkę łańcucha pomp wodnych.\n<color=red>Wciśnij kamerę w budynek, jeśli umiejscowienie jest trudne</color>.\n<color=#00FFFF>Funkcjonuje jak Tama</color>"
ptBR = "Uma estrutura à prova d'água para bloquear a extremidade de uma cadeia de bombas de água.  \n<color=red>Coloque a câmera na construção se a colocação for difícil</color>.  \n<color=#00FFFF>Funciona como um dique</color>"
koKR = "수조 펌프 체인의 끝을 차단하기 위한 수밀 구조물입니다.\n<color=red>배치가 어렵다면 카메라를 건물에 밀어 넣으세요</color>.\n<color=#00FFFF>제방처럼 작동합니다</color>"
csCZ = "Vodotěsná konstrukce pro zablokování konce řetězce vodních pump.  \n<color=red>Narážejte kamerou do budovy, pokud je umístění obtížné</color>.  \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một cấu trúc kín nước để chặn lại phần cuối của một chuỗi máy bơm nước.\n<color=red>Đâm camera vào tòa nhà nếu việc đặt khó khăn</color>.\n<color=#00FFFF>Hoạt động như một con đê</color>"
trTR = "Bir su geçirmez yapı, su pompaları zincirinin uç kısmını engellemek için.\n<color=red>Yerleştirme zor ise kamerayı binaya çarpın</color>.\n<color=#00FFFF>Bir Set gibi çalışır</color>"

["Lapantouflemagic.Waterpumpupgradewallsegment.FlavorDescription"]
raw = "«xa0What if we just build that without the pump to block... Nah, that's a silly idea!xa0»\n- An engineer beaver"
status = "normal"
enUS = "\"What if we just build that without the pump to block... Nah, that's a silly idea!\"  \n- An engineer beaver"
zhCN = "“«要是我们就这样建一个，不用水泵来阻挡……不，这想法太傻了！» - 一只工程师海狸”"
zhTW = "「嘿，我們要是就這樣建造而不使用水泵來阻擋... 不，這主意太蠢了！」  \n- 一隻工程師海狸"
ruRU = "«Что если мы просто построим это без насоса, чтобы блокировать... Нет, это глупая идея!»  \n- Бобер-инженер"
jaJP = "「ポンプなしでそれをブロックするためにただそれを建てたらどうなるだろう... いや、それはばかげたアイデアだね！」  \n- エンジニアビーバー"
frFR = "«xa0Et si nous construisions cela sans la pompe pour bloquer... Non, c'est une idée stupide !xa0»  \n- Un castor ingénieur"
deDE = "„Was wäre, wenn wir das einfach ohne die Pumpe bauen, um zu blockieren... Nein, das ist eine dumme Idee!“  \n- Ein Ingenieur-Biber"
plPL = "„«xa0A co jeśli zbudujemy to bez pompy, aby zablokować... Nie, to głupi pomysł!xa0» - inżynier bóbr“"
ptBR = "«xa0E se a gente só construir isso sem a bomba para bloquear... Nah, essa é uma ideia boba!xa0»\n- Um castor engenheiro"
koKR = "«xa0펌프 없이 그냥 그걸 짓는다면 어떻게 될까... 아니, 그건 바보 같은 생각이야!xa0»\n- 한 엔지니어 비버"
csCZ = "„«xa0Co kdybychom to prostě postavili bez čerpadla, abychom to zablokovali... Ne, to je hloupý nápad!xa0»  \n- Inženýrský bobr“"
viVN = "«xa0Nếu chúng ta chỉ xây cái đó mà không có bơm để chặn... Không, đó là một ý tưởng ngớ ngẩn!xa0»\n- Một con nhím kỹ sư"
trTR = "«xa0Pompayı engellemek için bunun sadece pompasız inşa edersek ne olur... Hayır, bu saçma bir fikir!xa0»\n- Bir mühendis samuru"

