["Need.CWKitchDeath.DeathMessage"]
raw = "<color=green>was accidentally grabbed by the robot’s pincers and deliciously cooked to death. The stew was particularily tasty tonight.</color>"
status = "normal"
enUS = "<color=green>was accidentally grabbed by the robot’s pincers and deliciously cooked to death. The stew was particularly tasty tonight.</color>"
zhCN = "<color=green>被机器人的钳子不小心抓住，香喷喷地被煮死了。今晚的炖菜特别美味。</color>"
zhTW = "<color=green>不小心被機器人的夾爪抓住，並美味地被煮至死亡。今天晚上這鍋燉菜特別美味。</color>"
ruRU = "<color=green>был случайно подхвачен щипцами робота и вкусно сварен до смерти. Сегодняшний суп был особенно вкусным.</color>"
jaJP = "<color=green>ロボットのハサミに偶然つかまれ、美味しく焼かれてしまった。今夜のシチューは特に美味しかった。</color>"
frFR = "<color=green>a été accidentellement attrapé par les pinces du robot et délicieusement cuit à mort. Le ragoût était particulièrement savoureux ce soir.</color>"
deDE = "<color=green>wurde versehentlich von den Zangen des Roboters gepackt und köstlich zu Tode gekocht. Der Eintopf war heute Abend besonders schmackhaft.</color>"
plPL = "<color=green>został przypadkowo złapany przez szczypce robota i smacznie ugotowany na śmierć. Zupa była wyjątkowo smaczna tej nocy.</color>"
ptBR = "<color=green>foi acidentalmente agarrado pelas garras do robô e deliciosamente cozido até a morte. O ensopado estava particularmente saboroso esta noite.</color>"
koKR = "<color=green>로봇의 집게에 우연히 잡혀 맛있게 요리되어 죽었습니다. 오늘 밤 스튜는 특히 맛있었습니다.</color>"
csCZ = "<color=green>byl náhodou chycen robotickými klepety a chutně uvařen k smrti. Polévka byla dnes večer obzvlášť lahodná.</color>"
viVN = "<color=green>đã bị kẹp bởi kẹp của robot và bị nấu chín một cách ngon lành. Món hầm đặc biệt thơm ngon tối nay.</color>"
trTR = "<color=green>robotun pençeleri tarafından kazara yakalandı ve lezzetli bir şekilde öldürüldü. Çorba bu gece özellikle lezzetliydi.</color>"

