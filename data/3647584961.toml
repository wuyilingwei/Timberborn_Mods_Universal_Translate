["Lapantouflemagic.Loglevee.Description"]
raw = "Crude levee made of numerous logs stuck in the mud for basic landscaping. The flag must be entirely buried."
status = "normal"
enUS = "Crude levee made of numerous logs stuck in the mud for basic landscaping. The flag must be entirely buried."
zhCN = "“用许多日志嵌入泥土制成的粗糙堤坝，用于基本的景观美化。旗帜必须完全埋入其中。”"
zhTW = "用多根樹幹埋在泥土中的粗糙堤防，用於基本的景觀美化。旗幟必須完全埋入土中。"
ruRU = "Грубая насыпь, сделанная из многочисленных бревен, застрявших в грязи для базового ландшафта. Флаг должен быть полностью закопан."
jaJP = "「基本的な造園のために泥の中に無造作に突き刺さった多数の丸太で作られた粗い堤防。旗は完全に埋められなければなりません。」"
frFR = "Digue rudimentaire faite de nombreux troncs enfoncés dans la boue pour un aménagement paysager de base. Le drapeau doit être entièrement enterré."
deDE = "Rohdamm aus zahlreichen im Schlamm steckenden Baumstämmen für grundlegende Landschaftsgestaltung. Die Flagge muss vollständig vergraben sein."
plPL = "Prymitywna tamka zrobiona z licznych bali wbitych w błoto do podstawowego kształtowania terenu. Flaga musi być całkowicie pogrzebana."
ptBR = "Leito rudimentar feito de numerosos troncos enterrados na lama para paisagismo básico. A bandeira deve estar completamente enterrada."
koKR = "진흙에 박힌 수많은 통나무로 만든 조잡한 제방으로, 기본적인 조경을 위한 것입니다. 깃발은 완전히 묻혀 있어야 합니다."
csCZ = "Hrubý hráz vytvořený z mnoha kmenů zapíchnutých v blátě pro základní terénní úpravy. Vlajka musí být zcela pohřbena."
viVN = "Đê thô sơ được làm từ nhiều cây gỗ bị mắc trong bùn để tạo cảnh quan cơ bản. Cờ phải được chôn hoàn toàn."
trTR = "Temel peyzaj için çamurda sıkışmış birçok odun parçasından yapılmış ham set. Bayrak tamamen gömülü olmalıdır."

["Lapantouflemagic.primitivedam.FlavorDescription"]
raw = "\"Actually, it looks nice!\"\n -An urbanist beaver"
status = "normal"
enUS = "\"Actually, it looks nice!\" - An urbanist beaver"
zhCN = "“实际上，看起来不错！”  \n— 一只城市主义的海狸"
zhTW = "「實際上，看起來不錯！」\n - 一隻都市主義的河狸"
ruRU = "\"На самом деле, это выглядит неплохо!\"  \n- Урбанистский бобр"
jaJP = "「実際、素敵に見えます！」  \n- 都市主義者のビーバー"
frFR = "« En fait, c'est joli ! »  \n- Un castor urbaniste"
deDE = "\"Eigentlich sieht es schön aus!\" -Ein urbanistischer Biber"
plPL = "\"Naprawdę, wygląda ładnie!\" - urbanistyczny bóbr"
ptBR = "\"Na verdade, parece bonito!\" - Um castor urbanista"
koKR = "\"사실, 멋져 보여요!\"  \n- 도시 계획가 비버"
csCZ = "\"Vlastně, to vypadá hezky!\"  \n- Městský bobr"
viVN = "\"Thực sự, nó trông đẹp đấy!\" - Một chú beaver đô thị"
trTR = "\"Gerçekten hoş görünüyor!\"  \n- Bir şehirli kunduz"

