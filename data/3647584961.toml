["Lapantouflemagic.NuclearPress.Description"]
raw = "An oversized press using nuclear heat to hot squeeze more oil out of sunflower seeds.\n<color=#FF6EC7>Can function without workers.</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "An oversized press using nuclear heat to hot squeeze more oil out of sunflower seeds.  \n<color=#FF6EC7>Can function without workers.</color>  \n<color=#00FFFF>Works as a Levee</color>"
zhCN = "一个使用核热的超大型压榨机，从向日葵种子中热榨出更多油脂。\n<color=#FF6EC7>可以在没有工人的情况下运行。</color>\n<color=#00FFFF>作为堤坝使用</color>"
zhTW = "一個超大型的壓榨機，利用核熱熱壓榨更多葵花籽中的油。\n<color=#FF6EC7>可以無需工人運作。</color>\n<color=#00FFFF>可作為堤防使用</color>"
ruRU = "Переработка нефти из семян подсолнечника с помощью сверхразмерного пресса, использующего ядерное тепло.\n<color=#FF6EC7>Может функционировать без рабочих.</color>\n<color=#00FFFF>Работает как плотина</color>"
jaJP = "「ひまわりの種からより多くの油を熱圧搾りするための大型プレスです。  \n<color=#FF6EC7>労働者なしで機能します。</color>  \n<color=#00FFFF>堤防としても機能します。</color>」"
frFR = "Une presse surdimensionnée utilisant la chaleur nucléaire pour extraire davantage d'huile des graines de tournesol.\n<color=#FF6EC7>Peut fonctionner sans ouvriers.</color>\n<color=#00FFFF>Fonctionne comme une digue.</color>"
deDE = "Eine übergroße Presse, die nukleare Wärme nutzt, um mehr Öl aus Sonnenblumenkernen herauszupressen.\n<color=#FF6EC7>Kann ohne Arbeiter funktionieren.</color>\n<color=#00FFFF>Funktioniert wie ein Deich.</color>"
plPL = "Prasa o dużych rozmiarach wykorzystująca ciepło jądrowe do gorącego wyciskania większej ilości oleju z nasion słonecznika.  \n<color=#FF6EC7>Mogą działać bez pracowników.</color>  \n<color=#00FFFF>Działa jak wał.</color>"
ptBR = "Uma prensa oversized que utiliza calor nuclear para extrair ainda mais óleo das sementes de girassol.  \n<color=#FF6EC7>Pode funcionar sem trabalhadores.</color>  \n<color=#00FFFF>Funciona como uma Barragem</color>"
koKR = "해바라기 씨에서 더 많은 기름을 얻기 위해 핵 열을 이용해 뜨겁게 압착하는 대형 프레스입니다.\n<color=#FF6EC7>근로자 없이도 작동합니다.</color>\n<color=#00FFFF>제방으로 기능합니다.</color>"
csCZ = "Obří lis využívající jaderné teplo k horkému lisování více oleje ze slunečnicových semen.  \n<color=#FF6EC7>Může fungovat bez pracovníků.</color>  \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một máy ép quá khổ sử dụng nhiệt hạt nhân để ép nóng, tách nhiều dầu hơn từ hạt hướng dương.  \n<color=#FF6EC7>Có thể hoạt động mà không cần công nhân.</color>  \n<color=#00FFFF>Hoạt động như một đê.</color>"
trTR = "Aşırı büyük bir pres, ayçiçeği tohumlarından daha fazla yağ çıkarmak için nükleer ısı kullanarak sıcak sıkıştırma yapar.  \n<color=#FF6EC7>İşçi olmadan çalışabilir.</color>  \n<color=#00FFFF>Baraj olarak çalışır</color>"

