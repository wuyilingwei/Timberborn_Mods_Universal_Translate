["Lapantouflemagic.ZiplineTerminusBalloon.Description"]
raw = "A balloon bearing the zipline cables in between stations.\nAllows beavers to access the floor to work.\n<color=green>Connections: 1</color>\n<color=red>Allows movement but does not connect roads.</color>"
status = "normal"
enUS = "A balloon bearing the zipline cables between stations.  \nAllows beavers to access the floor to work.  \n<color=green>Connections: 1</color>  \n<color=red>Allows movement but does not connect roads.</color>"
zhCN = "“一个承载着缆索的气球，在站点之间。  \n允许海狸进入地面工作。  \n<color=green>连接数：1</color>  \n<color=red>允许移动，但不连接道路。</color>”"
zhTW = "一個承載著索道纜繩的氣球，位於站點之間。\n允許海狸進入地面工作。\n<color=green>連接數：1</color>\n<color=red>允許移動但不連接道路。</color>"
ruRU = "Воздушный шар, поддерживающий канаты зиплайна между станциями. \nПозволяет бобрам добраться до пола для работы. \n<color=green>Соединений: 1</color> \n<color=red>Позволяет перемещение, но не соединяет дороги.</color>"
jaJP = "「駅間のジップラインケーブルを支える風船です。  \nビーバーが作業を行うために床にアクセスできるようにします。  \n<color=green>接続: 1</color>  \n<color=red>移動を可能にしますが、道路とは接続しません。</color>」"
frFR = "Un ballon supportant les câbles de tyrolienne entre les stations.  \nPermet aux castors d'accéder au sol pour travailler.  \n<color=green>Connections : 1</color>  \n<color=red>Permet le mouvement mais ne connecte pas les routes.</color>"
deDE = "Ein Ballon, der die Zipline-Kabel zwischen den Stationen trägt. \nErmöglicht es den Bibern, den Boden zu erreichen, um zu arbeiten. \n<color=green>Verbindungen: 1</color> \n<color=red>Ermöglicht Bewegung, verbindet aber keine Straßen.</color>"
plPL = "Balon niosący liny zip-line pomiędzy stacjami.  \nPozwala bobrom dostać się na podłogę, aby pracować.  \n<color=green>Połączenia: 1</color>  \n<color=red>Umożliwia poruszanie się, ale nie łączy dróg.</color>"
ptBR = "Um balão que suporta os cabos das tirolesas entre as estações.  \nPermite que os castores acessem o chão para trabalhar.  \n<color=green>Conexões: 1</color>  \n<color=red>Permite movimento, mas não conecta estradas.</color>"
koKR = "정거장 사이의 집라인 케이블을 지원하는 풍선.\n비버들이 작업을 위해 바닥에 접근할 수 있도록 해줍니다.\n<color=green>연결: 1</color>\n<color=red>이동은 가능하지만 도로를 연결하지는 않습니다.</color>"
csCZ = "Balón nesoucí zipové kabely mezi stanicemi.  \nUmožňuje bobrům přístup k podlaze pro práci.  \n<color=green>Připojení: 1</color>  \n<color=red>Umožňuje pohyb, ale nepropojuje cesty.</color>"
viVN = "Một chiếc bóng bay mang theo các sợi cáp zipline giữa các trạm.  \nCho phép cáo gỗ tiếp cận mặt đất để làm việc.  \n<color=green>Kết nối: 1</color>  \n<color=red>Cho phép di chuyển nhưng không kết nối các con đường.</color>"
trTR = "İstasyonlar arasında zipline kablolarını taşıyan bir balon.\nKunduzların çalışmak için zemine erişmesini sağlar.\n<color=green>Bağlantılar: 1</color>\n<color=red>Hareketi sağlar ancak yolları bağlamaz.</color>"

["Lapantouflemagic.ZiplineTerminusBalloon.FlavorDescription"]
raw = "\"It could be fun to jump in a lake from here...\"\n -Toothless the Wise, elder beaver"
status = "normal"
enUS = "\"It could be fun to jump in a lake from here...\"  \n-Toothless the Wise, elder beaver"
zhCN = "“从这里跳进湖里会很有趣……”\n - 智者无牙，老海狸"
zhTW = "「從這裡跳進湖裡可能會很有趣……」  \n- 智慧無牙，老海狸"
ruRU = "«Сюда было бы весело прыгнуть в озеро...»\n - Бессмертный Мудрый, старейшина бобров"
jaJP = "「ここから湖に飛び込むのは楽しそうだな…」  \n-賢者トゥースレス、年老いたビーバー"
frFR = "\"Ça pourrait être amusant de sauter dans un lac d'ici...\"  \n- Malin le Sage, castor âgé"
deDE = "\"Es könnte Spaß machen, von hier aus in einen See zu springen...\"\n -Zahnlos der Weise, älterer Biber"
plPL = "„Może być zabawnie skoczyć stąd do jeziora…”  \n- Bezzębny Mądry, starszy bóbr"
ptBR = "\"Pode ser divertido pular em um lago daqui...\"  \n- Dente de Leite, o sábio, castor ancião"
koKR = "\"여기에서 호수로 점프하는 것은 재미있을지도 몰라...\"\n - 지혜로운 무치, 노비버"
csCZ = "\"Bylo by zábavné skočit odtud do jezera...\"  \n- Bezzubý moudrý, starý bobr"
viVN = "\"Thật thú vị khi nhảy xuống một cái hồ từ đây...\"\n - Răng Bẩn, con nhím cao tuổi"
trTR = "\"Buradan bir gölete atlamak eğlenceli olabilir...\"\n -Bilge Düzgünsüz, yaşlı kunduz"

