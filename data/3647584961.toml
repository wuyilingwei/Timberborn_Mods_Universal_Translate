["Lapantouflemagic.GiantLogBridge.Description"]
raw = "Half a sequoia artistically fitted into a not-half sequoia to provide a walkway.\nComes with lights underneath because no one wants to live in total darkness."
status = "normal"
enUS = "Half a sequoia artistically fitted into a not-half sequoia to provide a walkway. Comes with lights underneath because no one wants to live in total darkness."
zhCN = "“半个红杉艺术性地嵌入一个非半个红杉中，以提供一条步道。底部配有灯光，因为没有人想要生活在完全黑暗中。”"
zhTW = "半棵紅杉藝術性地安裝在一棵不完全的紅杉上，提供了一條步道。\n底下配有燈光，因為沒有人想在完全黑暗中生活。"
ruRU = "Половина секвойи, художественно встроенная в неполовину секвойи, чтобы обеспечить проход.\nОснащена подсветкой снизу, потому что никто не хочет жить в полной темноте."
jaJP = "「半分のセコイアを見事に組み合わせて、歩道を提供するための半分でないセコイアです。全くの暗闇に住みたくないので、下にライトが付いています。」"
frFR = "Une moitié de séquoia artistiquement intégrée dans une moitié de séquoia pour offrir un passage. Équipée de lumières en dessous car personne ne veut vivre dans l'obscurité totale."
deDE = "Die Hälfte eines Mammutbaums, kunstvoll in einen nicht ganz so großen Mammutbaum eingepasst, um einen Gehweg zu bieten. Kommt mit Lichtern darunter, denn niemand möchte in totaler Dunkelheit leben."
plPL = "Połowa sekwoi artystycznie wpasowana w niepołowę sekwoi, aby stworzyć przejście. \nWyposażona w oświetlenie pod spodem, ponieważ nikt nie chce żyć w całkowitej ciemności."
ptBR = "Metade de uma sequóia artisticamente ajustada em uma não-metade de sequóia para fornecer uma passarela. Vem com luzes embaixo porque ninguém quer viver na escuridão total."
koKR = "절반의 세쿼이아가 예술적으로 절반이 아닌 세쿼이아에 결합되어 보행로를 제공합니다.  \n아래에 조명이 있어 완전한 어둠 속에서 살고 싶어하는 사람은 없습니다."
csCZ = "Polovina sekvojového stromu umělecky vložená do nepůlky sekvojového stromu, aby poskytla chodník. Přichází s osvětlením pod ním, protože nikdo nechce žít v úplné tmě."
viVN = "Nửa cây sequoia được lắp đặt nghệ thuật vào một nửa cây sequoia khác để tạo thành một lối đi. Có đèn bên dưới vì không ai muốn sống trong bóng tối hoàn toàn."
trTR = "Yürüyüş yolu sağlamak için yarım bir sekoyanın sanatsal bir şekilde yarı olmayan bir sekoyaya yerleştirilmiş hali. Üstünde kimse tamamen karanlıkta yaşamak istemediğinden dolayı altına ışıklar eklenmiştir."

