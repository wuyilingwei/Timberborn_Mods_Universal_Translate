["Lapantouflemagic.IronMechanicalDrill.Description"]
raw = "A mechanized drill that crushes rock to extract Iron ore.\nThe drill bits must be changed regularly.\n<color=red>Deleting waste rock is cheating!</color>"
status = "normal"
enUS = "A mechanized drill that crushes rock to extract iron ore. The drill bits must be changed regularly. <color=red>Deleting waste rock is cheating!</color>"
zhCN = "一种机械钻头，可以粉碎岩石以提取铁矿石。\n钻头必须定期更换。\n<color=red>删除废岩石是作弊！</color>"
zhTW = "一種機械化的鑽頭，可粉碎岩石以提取鐵礦。\n鑽頭必須定期更換。\n<color=red>刪除廢石是作弊！</color>"
ruRU = "Механизированная дрель, которая дробит камень для добычи железной руды. Сверла необходимо менять регулярно. <color=red>Удаление отходов - это мошенничество!</color>"
jaJP = "「岩を粉砕して鉄鉱石を採掘する機械式ドリルです。  \nドリルビットは定期的に交換する必要があります。  \n<color=red>廃棄された岩を削除するのはズルです！</color>」"
frFR = "Une perceuse mécanisée qui écrase la roche pour extraire le minerai de fer. Les forets doivent être changés régulièrement. <color=red>Supprimer la roche de déchets est tricher!</color>"
deDE = "Ein mechanisierter Bohrer, der Gestein zerdrückt, um Eisenerz zu fördern. Die Bohrerbits müssen regelmäßig gewechselt werden. <color=red>Das Löschen von Abfallgestein ist Betrug!</color>"
plPL = "Zmechanizowany wiertło, które kruszy skały, aby wydobyć rudy żelaza. Wiertła muszą być regularnie wymieniane. <color=red>Usuwanie odpadów skalnych to oszustwo!</color>"
ptBR = "Uma broca mecanizada que esmaga rochas para extrair minério de ferro. As brocas devem ser trocadas regularmente. <color=red>Deletar rochas descartadas é trapaça!</color>"
koKR = "암석을 분쇄하여 철광석을 추출하는 기계식 드릴입니다. 드릴 비트는 정기적으로 교체해야 합니다. <color=red>폐석을 삭제하는 것은 치팅입니다!</color>"
csCZ = "Mechanizované vrtné zařízení, které drtí skálu k získání železné rudy. \nKladiva vrtáku je potřeba pravidelně měnit. \n<color=red>Vymazání odpadního kamene je podvod!</color>"
viVN = "Một máy khoan cơ giới nghiền nát đá để lấy quặng sắt.  \nCác mũi khoan phải được thay định kỳ.  \n<color=red>Xóa đá thải là gian lận!</color>"
trTR = "Demir cevheri çıkarmak için kayaları kıran mekanize bir matkap. \nMatkap uçları düzenli olarak değiştirilmelidir. \n<color=red>Atık kayaları silmek hile yapmaktır!</color>"

["Lapantouflemagic.IronMechanicalDrill.FlavorDescription"]
raw = "\"It's crazy how you can keep drilling the same spot for days and still find more!\"\n -Mommy beaver"
status = "normal"
enUS = "\"It's crazy how you can keep drilling the same spot for days and still find more!\"  \n-Mommy beaver"
zhCN = "“疯狂的是你可以在同一个地方钻好几天，仍然可以找到更多的东西！”  \n- 妈咪海狸"
zhTW = "「真瘋狂，你可以在同一個地方鑽好幾天，卻還能找到更多東西！」  \n- 媽咪海狸"
ruRU = "\"С ума сойти, как можно drill'ить одно и то же место днями и все равно находить больше!\" - Мама-бобер"
jaJP = "「同じ場所を何日も掘り続けて、まだ新しいものが見つかるなんて信じられないよ！」\n- マミーリス"
frFR = "\"Il est fou de voir à quel point on peut continuer à percer au même endroit pendant des jours et toujours trouver plus !\"  \n-Mamie castor"
deDE = "Es ist verrückt, wie man denselben Spot tagelang weiterbohren kann und trotzdem noch mehr findet!  \n -Mama-Biber"
plPL = "\"To szalone, jak możesz wiercić w tym samym miejscu przez dni, a wciąż znaleźć więcej!\"  \n -Mama bobra"
ptBR = "\"É louco como você pode continuar perfurando o mesmo ponto por dias e ainda encontrar mais!\"  \n-Mamãe castor"
koKR = "며느리 비버: 같은 자리에서 며칠씩 계속 뚫으면서도 계속 새로운 것을 발견할 수 있다니 정말 미쳤어!"
csCZ = "\"Je to šílené, jak můžeš vrtat na stejném místě celé dny a stále najít víc!\"\n -Maminka bobr"
viVN = "\"Có điên không khi bạn có thể khoan cùng một chỗ trong nhiều ngày mà vẫn tìm thấy thêm nhiều thứ!\"\n -Bà nhím"
trTR = "Bir yeri günlerce delmeye devam edebileceğin ve hala daha fazla bulabilmenin ne kadar çılgınca olduğunu biliyor musun? -Anne kunduz"

