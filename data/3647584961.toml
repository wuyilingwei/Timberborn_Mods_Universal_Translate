enUS = "\"At last, my dream to swim in kimchi may come true!\" - Mathilda the insane cook"
zhCN = "\"终于，我在泡菜中游泳的梦想可能会实现了！\"\n- 疯狂厨师马蒂尔达"
zhTW = "「終於，我夢想中的泡菜游泳可能會成真！」\n- 瘋狂廚師馬蒂爾達"
ruRU = "Наконец-то моя мечта поплавать в кимчи может стать реальностью!  \n- Матильда, безумная повариха"
jaJP = "「ついに、キムチの中で泳ぐという私の夢が叶うかもしれないわxa0！」  \n- 酷評された料理人マチルダ"
frFR = "« Enfin, mon rêve de nager dans du kimchi pourrait se réaliser ! »  \n- Mathilda, la cuisinière folle"
deDE = "„Endlich könnte mein Traum, in Kimchi zu schwimmen, wahr werden!  \n- Mathilda, die verrückte Köchin“"
plPL = "„W końcu moje marzenie o pływaniu w kimchi może się spełnićxa0!” - Mathilda, szalona kucharka"
ptBR = "\"Finalmente, meu sonho de nadar em kimchi pode se tornar realidadexa0!\"  \n- Mathilda, a cozinheira insana"
koKR = "\"드디어 김치 속에서 수영하는 꿈이 이루어질 수 있을 것 같아!\"  \n- 미친 요리사 마틸다"
csCZ = " konečně, můj sen plavat v kimchi se může splnit! - Mathilda, šílená kuchařka"
viVN = "\"Cuối cùng, giấc mơ của tôi là được bơi trong kimchi có thể trở thành sự thật xa!\"  \n- Mathilda, đầu bếp điên rồ"
