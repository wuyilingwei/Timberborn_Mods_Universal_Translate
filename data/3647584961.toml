["Lapantouflemagic.HoomanUndergroundChemPlant.Description"]
raw = "Sends down the abyss a team of chemist beavers to study and reactivate an ancient hooman chemical plant.\n<color=#FF6EC7>Their processes were far more advanced than ours - we will surely learn so much! </color>"
status = "normal"
enUS = "Sends down into the abyss a team of chemist beavers to study and reactivate an ancient human chemical plant. <color=#FF6EC7>Their processes were far more advanced than ours - we will surely learn so much!</color>"
zhCN = "“派遣一队化学浣熊深入深渊，研究并重新激活一座古老的人类化学工厂。\n<color=#FF6EC7>他们的工艺远比我们先进——我们必定会学到很多！</color>”"
zhTW = "派遣一隊化學海狸深入深淵，研究並重新啟動一個古老的贈人化工廠。<color=#FF6EC7>他們的工藝遠比我們先進 - 我們一定能學到很多東西！</color>"
ruRU = "Отправляет в бездну команду химиков-бобров, чтобы исследовать и реанимировать древний химический завод хуманов.  \n<color=#FF6EC7>Их процессы были намного болееadvanced than ours - мы определенно многому научимся!</color>"
jaJP = "深淵に化学者ビーバーのチームを送り、古代の人間の化学プラントを研究し再稼働させます。<color=#FF6EC7>彼らのプロセスは私たちのものよりはるかに進んでいました - 私たちはきっと多くのことを学ぶでしょう！</color>"
frFR = "Envoie dans l'abîme une équipe de castors chimistes pour étudier et réactiver une ancienne usine chimique hooman.  \n<color=#FF6EC7>Leurs procédés étaient beaucoup plus avancés que les nôtres - nous allons sûrement beaucoup apprendre !</color>"
deDE = "Schickt ein Team von Chemiker-Bibern in den Abgrund, um eine alte hooman Chemiefabrik zu studieren und wiederzubeleben.  \n<color=#FF6EC7>Ihre Prozesse waren weitaus fortschrittlicher als unsere - wir werden definitiv so viel lernen!</color>"
plPL = "Zesła w otchłań zespół bobrów chemików, aby badać i reaktywować starożytną ludzką fabrykę chemiczną.\n<color=#FF6EC7>Ich procesy były o wiele bardziej zaawansowane niż nasze - z pewnością wiele się nauczymy! </color>"
ptBR = "Envia para o abismo uma equipe de castores químicos para estudar e reativar uma antiga planta química hooman. \n<color=#FF6EC7>Seus processos eram muito mais avançados do que os nossos - certamente aprenderemos muito!</color>"
koKR = "심연으로 화학 비버 팀을 보내 고대 인류 화학 공장을 연구하고 재가동합니다.  \n<color=#FF6EC7>그들의 과정은 우리의 것보다 훨씬 더 발전해 있었어요 - 우리는 분명히 많은 것을 배울 것입니다!</color>"
csCZ = "Posílá do propasti tým chemiků bobrů, aby studovali a znovu aktivovali starověký chemický závod hoomanů.  \n<color=#FF6EC7>Jejich procesy byly mnohem pokročilejší než naše - jistě se toho tolik naučíme!</color>"
viVN = "Gửi xuống vực thẳm một đội những chú hải ly nhà hóa học để nghiên cứu và tái kích hoạt một nhà máy hóa học cổ đại của loài người.\n<color=#FF6EC7>Các quy trình của họ tiên tiến hơn nhiều so với chúng ta - chúng ta chắc chắn sẽ học hỏi được rất nhiều! </color>"
trTR = "Abyse, eski bir insan kimyasal tesisini incelemek ve yeniden etkinleştirmek üzere bir ekip kimyager kunduz gönderir.\n<color=#FF6EC7>Onların süreçleri kesinlikle bizimkilerden çok daha ileri düzeydedi - kesinlikle çok şey öğreneceğiz!</color>"

["Lapantouflemagic.HoomanUndergroundChemPlant.FlavorDescription"]
raw = "\"Manufacturing resin entirely from base elements? This is amazing!\""
status = "normal"
enUS = "\"Manufacturing resin entirely from base elements? This is amazing!\""
zhCN = "“完全由基本元素制造树脂？这太令人惊讶了！”"
zhTW = "「完全由基本元素製造樹脂？這真是太神奇了！」"
ruRU = "\"Изготовление смолы исключительно из базовых элементов? Это потрясающе!\""
jaJP = "「基本元素から完全に樹脂を製造する？これは素晴らしい！」"
frFR = "Fabriquer de la résine entièrement à partir d'éléments de base ? C'est incroyable !"
