["Lapantouflemagic.LyophilizedTerrainBlock.Description"]
raw = "An synthetic terrain block produced by beavers in order to reshape their environment efficiently."
status = "normal"
enUS = "A synthetic terrain block produced by beavers in order to reshape their environment efficiently."
zhCN = "一种由海狸制造的合成地形块，用于高效重塑它们的环境。"
zhTW = "由海狸製造的一種合成地形方塊，旨在有效地重塑其環境。"
ruRU = "Синтетический блок местности, производимый бобрами для эффективного изменения окружающей среды."
jaJP = "ビーバーによって効率的に環境を再形成するために生産された合成地形ブロック。"
frFR = "Un bloc de terrain synthétique produit par des castors afin de remodeler leur environnement de manière efficace."
deDE = "Ein synthetischer Terrainblock, der von Bibern hergestellt wird, um ihre Umgebung effizient umzugestalten."
plPL = "Syntetyczny blok terenowy produkowany przez bobry w celu efektywnego przekształcania swojego otoczenia."
ptBR = "Um bloco de terreno sintético produzido por castores para reformar seu ambiente de maneira eficiente."
koKR = "비버들이 환경을 효율적으로 재형성하기 위해 생산한 인공 지형 블록입니다."
csCZ = "Syntetický terénní blok vyráběný bobry za účelem efektivního přetvoření jejich prostředí."
viVN = "Một khối địa hình tổng hợp được sản xuất bởi những con nhím nước nhằm tái hình dạng môi trường của chúng một cách hiệu quả."
trTR = "Beaverlar tarafından çevrelerini verimli bir şekilde yeniden şekillendirmek için üretilen sentetik bir arazi bloğu."

