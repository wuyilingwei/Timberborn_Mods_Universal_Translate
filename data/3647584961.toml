["Lapantouflemagic.AdvancedWarmstorage.Description"]
raw = "An old tower design repurposed to serve as a gargantuan storage for warm food.\nHeat is provided for free and forever by a massive rod of low grade radioactive matter in the center of the tower."
status = "normal"
enUS = "An old tower design repurposed to serve as a gargantuan storage for warm food. Heat is provided for free and forever by a massive rod of low-grade radioactive matter in the center of the tower."
zhCN = "“一个古老的塔楼设计，重新利用为一个巨大的温暖食物储存库。\n塔中央有一根低级放射性物质的巨大棒子，免费的、永恒地提供热量。”"
zhTW = "一座古老的塔樓設計被重新利用，作為巨型的熱食儲存庫。\n塔中央有一根低級放射性物質製成的巨大棒子，提供免費而永久的熱量。"
ruRU = "Старая башенная конструкция, переделанная для того, чтобы служить гигантским хранилищем для горячей еды. Тепло бесплатно и навсегда обеспечивается массивным стержнем низкокачественного радиоактивного вещества в центре башни."
jaJP = "古い塔のデザインを再利用し、温かい食べ物のための巨大なストレージとして機能します。熱は、塔の中央にある低品質の放射性物質の巨大な棒によって無償で永遠に供給されます。"
frFR = "Un ancien design de tour réutilisé pour servir de gigantesque stockage pour la nourriture chaude. La chaleur est fournie gratuitement et pour toujours par une massive tige de matière radioactive de faible qualité au centre de la tour."
deDE = "Ein altes Turmdesign, umfunktioniert zu einem gigantischen Lager für warme Lebensmittel.\nDie Wärme wird kostenlos und für immer von einer massiven Stange aus niedriggradigem radioaktivem Material im Zentrum des Turms bereitgestellt."
plPL = "Stary projekt wieży przekształcony w olbrzymi magazyn ciepłych potraw. Ciepło dostarczane jest za darmo i na zawsze dzięki ogromnemu prętowi niskiej jakości materiały radioaktywnego w centrum wieży."
ptBR = "Um antigo design de torre reaproveitado para servir como um imenso armazenamento para comida quente. O calor é fornecido gratuitamente e para sempre por uma grande barra de material radioativo de baixa qualidade no centro da torre."
koKR = "따뜻한 음식을 위한 거대한 저장소로 재사용된 오래된 탑 디자인입니다. 타워 중앙에 있는 대규모 저급 방사성 물질이 열을 무료로 영원히 제공합니다."
csCZ = "Starý návrh věže přepracovaný k tomu, aby sloužil jako obrovské úložiště pro teplé jídlo. Teplo je zajištěno zdarma a navždy masivním prutem nízko kvalitního radioaktivního materiálu uprostřed věže."
viVN = "Một thiết kế tháp cũ được tái sử dụng để phục vụ như một kho chứa khổng lồ cho thực phẩm nóng. Nhiệt được cung cấp miễn phí và mãi mãi bởi một thanh khối vật chất phóng xạ cấp thấp khổng lồ ở trung tâm của tháp."
trTR = "Eski bir kule tasarımı, sıcak yiyecekler için devasa bir depolama alanı oluşturmak amacıyla yeniden kullanıldı. Isı, kulenin ortasında bulunan düşük dereceli radyoaktif maddenin devasa çubuğu tarafından ücretsiz ve sonsuza dek sağlanmaktadır."

["Lapantouflemagic.AdvancedWarmstorage.FlavorDescription"]
raw = "\"Even better, the food placed in there never rots, and the fools that supply it never have kits!\"\n -An eugenicist beaver"
status = "normal"
enUS = "\"Even better, the food placed in there never rots, and the fools that supply it never have kits!\"  \n-An eugenicist beaver"
zhCN = "“更好的是，放在里面的食物永远不会腐烂，而提供食物的傻瓜们永远不会有小崽子！”  \n- 一只优生学水獺"
zhTW = "「更棒的是，放在那裡的食物永遠不會腐爛，而提供食物的愚民們也永遠不會有幼崽！」  \n- 一隻優生學浣熊"
ruRU = "«Ещё лучше, еда, помещённая туда, никогда не гниёт, а дураки, которые её поставляют, никогда не имеют детёнышей!»  \n-Евгенистский бобёр"
jaJP = "「さらに良いことに、そこに置かれた食べ物は決して腐らず、供給する愚か者たちは決して子を持つことがない！」  \n- 優生学のビーバー"
frFR = "\"Encore mieux, la nourriture placée là-dedans ne pourrit jamais, et les imbéciles qui l'apportent n'ont jamais de petits !\"  \n- Un castor eugéniste"
deDE = "„Noch besser ist, dass das dort gelagerte Essen niemals verdirbt und die Narren, die es liefern, niemals Nachkommen haben!“  \n- Ein Eugeniker-Biber"
plPL = "\"Jeszcze lepiej, jedzenie umieszczone tam nigdy się nie psuje, a głupcy, którzy je dostarczają nigdy nie mają młodych!\" - Eugenik w wersji bobra"
ptBR = "\"Além disso, a comida colocada lá nunca estraga, e os tolos que a fornecem nunca têm filhotes!\"  \n-Um castor eugênico"
koKR = "거기에 놓인 음식은 결코 썩지 않으며, 그것을 공급하는 바보들은 새끼를 낳지 않습니다!\"  \n- \"유전학자 비버"
csCZ = "\"Ještě lépe, jídlo tam umístěné nikdy nezplesniví a blázni, kteří ho dodávají, nikdy nemají mláďata!\"  \n- Eugenista bobr"
viVN = "\"Thậm chí còn tốt hơn, thức ăn để trong đó sẽ không bao giờ thối, và những kẻ ngu ngốc cung cấp nó sẽ không bao giờ có kits!\"  \n-Một con nhím eugenicist"
trTR = "\"En iyisi, oraya konulan yiyecekler asla çürümüyor ve onu tedarik eden aptalların asla yavruları olmuyor!\"  \n- Bir eugeniçi kunduz"

