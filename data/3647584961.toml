["Lapantouflemagic.BIT.FlavorDescription"]
raw = "\"According to our archives, the traditional name goes back to some frog-eating hooman tribe\"\n -Toothless the Wise, elder beaver"
status = "normal"
enUS = "\"According to our archives, the traditional name goes back to some frog-eating human tribe\" - Toothless the Wise, elder beaver"
zhCN = "“根据我们的档案，传统名称源自某个吃青蛙的人类部落”  \n- 智慧无牙，老年海狸"
zhTW = "「根據我們的檔案，這個傳統名稱可以追溯到某個吃蛙的人類部落」  \n- 明智的無牙，老海狸"
ruRU = "\"По нашим архивам, традиционное название восходит к племени людей, едящих лягушек\"  \n- Беззубик Мудрый, старейшина бобров"
jaJP = "「私たちのアーカイブによると、伝統的な名前はカエルを食べる人間の部族に由来しています」 \n-賢者のトゥースレス、エルダーリス"
frFR = "\"Selon nos archives, le nom traditionnel remonte à une tribu d'humains mangeurs de grenouilles.\"  \n- Toothless le Sage, castor ancien"
deDE = "\"Laut unseren Archiven geht der traditionelle Name auf einen froschessenden Hooman-Stamm zurück.\" -Zahnlos der Weise, älterer Biber"
plPL = "Zgodnie z naszymi archiwami, tradycyjna nazwa pochodzi od plemienia ludzi, które jadło żaby\" - Beaverek Bezzębny, starszy bóbr"
ptBR = "\"De acordo com nossos arquivos, o nome tradicional remonta a uma tribo de humanos que come rãs.\"  \n- Mócego, o Sábio, castor ancião"
koKR = "\"우리의 기록에 따르면, 전통적인 이름은 개구리를 먹는 인간 부족으로 거슬러 올라갑니다.\"  \n- 지혜로운 이빨 없는 비버, 장로"
csCZ = "\"Podle našich archívů má tradiční název původ v nějakém kmeně lidi jedoucích žáby.\"  \n- Bezzubý Moudrý, starší bobr"
viVN = "\"Theo hồ sơ của chúng tôi, tên truyền thống có nguồn gốc từ một bộ tộc người ăn ếch.\"  \n- Răng Không, nhúm thủ lĩnh beaver"
trTR = "\"Arşivlerimize göre, geleneksel ad, bazı kurbağa yiyen insan kabilelerine kadar uzanıyor.\"  \n-Dişsiz Bilge, yaşlı kunduz"

