["Lapantouflemagic.AmpTrader.Description"]
raw = "The AmpEars are even worse heretics than the IronTeeth: They have dedicated themselves to study hooman technologies and have somehow concluded that being belly-deep in water is dangerous around machines or some other nonsense. They are willing to trade their electric thingies that they pretend they understand, but only a few ones are worth our time. Also they keep calling us ''the WetButts'' so keep note of where they live so we can aim the trebuchet properly."
status = "normal"
enUS = "The AmpEars are even worse heretics than the IronTeeth: They have dedicated themselves to studying human technologies and somehow concluded that being belly-deep in water is dangerous around machines or some other nonsense. They are willing to trade their electric gadgets that they pretend to understand, but only a few of them are worth our time. Also, they keep calling us 'the WetButts,' so keep note of where they live so we can aim the trebuchet properly."
zhCN = "“安普耳朵比铁牙族更糟糕的异教徒：他们专注于研究人类技术，并不知为何得出结论，认为在水中待着与机器一起是危险的，或者说些其他的无稽之谈。他们愿意交易他们假装理解的电器，但只有少数几件值得我们花时间。此外，他们一直称我们为‘湿屁股’，所以请记住他们的住处，以便我们能准确地瞄准投石机。”"
zhTW = "安普耳朵的異端比鐵牙部落更糟：他們致力於研究人類技術，卻不知怎的得出了與機械周圍浸泡在水裡是危險的這種荒謬結論。他們願意用那些他們假裝理解的電氣裝置來交易，但只有少數幾個值得我們花時間。而且他們一直叫我們「濕屁股」，所以記下他們的住處，以便我們能正確瞄準投石機。"
ruRU = "АмпУши даже худшие еретики, чем Железные Зубы: они посвятили себя изучению человеческих технологий и каким-то образом пришли к выводу, что находиться по грудь в воде опасно рядом с машинами или какой-то другой ерунде. Они готовы обменивать свои электрические штуковины, которые они делают вид, что понимают, но только некоторые из них стоят нашего времени. Кроме того, они продолжают называть нас ''Мокрыми Задницами'', так что запомните, где они живут, чтобы мы могли правильно навести дробину."
jaJP = "「アンプイヤーはアイアンティースよりもひどい異端者です。彼らは人間の技術の研究に専念しており、機械のそばで水深が腹まであるのが危険だと、どうにかこうにか結論づけました。また、彼らは理解しているふりをする電気的なものを交換しようとしていますが、私たちの時間に値するものはほんの数点です。さらに、彼らは私たちを「ウェットバッツ」と呼び続けているので、彼らの住処を記録しておき、投石機が正確に狙えるようにしましょう。」"
frFR = "Les AmpEars sont des hérétiques encore pires que les IronTeeth : ils se sont consacrés à étudier les technologies humaines et ont conclu d'une manière ou d'une autre que d'être aux hanches dans l'eau est dangereux autour des machines ou quelque autre absurdité. Ils sont prêts à échanger leurs petits objets électriques qu'ils prétendent comprendre, mais seuls quelques-uns valent notre temps. De plus, ils continuent de nous appeler ''les WetButts'', alors notez bien où ils vivent pour que nous puissions viser correctement la trébuchet."
deDE = "Die AmpOhren sind noch schlimmere Häretiker als die EisenZähne: Sie haben sich dem Studium menschlicher Technologien verschrieben und haben irgendwie zu dem Schluss gekommen, dass es gefährlich ist, bei Maschinen bis zum Bauch in Wasser zu stehen oder irgendeinen anderen Unsinn. Sie sind bereit, ihre elektrischen Dinge zu tauschen, von denen sie vorgeben, dass sie sie verstehen, aber nur einige davon sind unsere Zeit wert. Außerdem nennen sie uns ständig \"die NassenÄrsche\", also merkt euch, wo sie wohnen, damit wir die Trebuchette richtig zielen können."
plPL = "AmpEars są jeszcze gorszymi heretykami niż IronTeeth: poświęcili się badaniu ludzkich technologii i jakoś doszli do wniosku, że zanurzenie w wodzie po brzuch jest niebezpieczne w pobliżu maszyn lub jakiegoś innego nonsensu. Są gotowi wymieniać swoje elektryczne przedmioty, które udają, że rozumieją, ale tylko kilka z nich jest warte naszego czasu. Ponadto wciąż nazywają nas ''Mokrymi Dupeczkami'', więc zapamiętaj, gdzie mieszkają, abyśmy mogli odpowiednio wymierzyć w projektil."
ptBR = "Os AmpEars são hereges ainda piores do que os IronTeeth: eles se dedicaram a estudar tecnologias humanas e, de alguma forma, chegaram à conclusão de que ficar com a barriga na água é perigoso perto de máquinas ou alguma outra bobagem. Eles estão dispostos a trocar seus trambolhos elétricos que eles fingem entender, mas apenas alguns deles valem nosso tempo. Além disso, eles continuam nos chamando de ''as Bundas Molhadas'', então fique atento a onde eles moram para que possamos mirar a trébucet corretamente."
koKR = "앰프이어들은 아이언티스보다도 더 나쁜 이단자들입니다: 그들은 인간 기술을 연구하는 데 전념하였고, 기계 근처에서 물속에 있는 것이 위험하다는 결론에 이르렀습니다. 그들은 자신들이 이해하고 있다고 가장하는 전기 장치들을 거래할 의사가 있지만, 우리의 시간과 노력을 가치 있게 만드는 것은 몇 개밖에 없습니다. 또한 그들은 우리를 '젖은 엉덩이들'이라고 부르므로, 그들이 사는 곳을 기억해 두어 우리가 투석기를 제대로 겨냥할 수 있게 하세요."
csCZ = "AmpEars jsou ještě horší heretici než IronTeeth: Oddali se studiu lidských technologií a nějak dospěli k závěru, že být po pás ve vodě je nebezpečné kolem strojů nebo nějaké jiné hloupost. Jsou ochotni obchodovat se svými elektrickými věcmi, které se tváří, že rozumí, ale jen pár z nich stojí za náš čas. A pořád nás nazývají „MokréZadky“, tak si poznamenejte, kde bydlí, abychom mohli správně namířit trebuchet."
viVN = "AmpEars còn tệ hơn cả những kẻ dị giáo IronTeeth: Họ đã cống hiến bản thân để nghiên cứu công nghệ của loài người và bằng cách nào đó kết luận rằng việc đứng ngập trong nước là nguy hiểm xung quanh máy móc hay điều gì đó vô lý khác. Họ sẵn sàng giao dịch những món đồ điện tử mà họ giả vờ hiểu, nhưng chỉ một vài trong số đó đáng để chúng ta bỏ thời gian. Hơn nữa, họ vẫn gọi chúng ta là ''WetButts'' nên hãy ghi nhớ nơi họ sống để chúng ta có thể nhắm bắn máy trebuchet một cách chính xác."
trTR = "AmpEars, demir dişlerden bile daha kötü sapkınlardır: İnsan teknolojilerini incelemeye kendilerini adamışlardır ve bir şekilde suyun içinde beline kadar olmanın makinelerin etrafında tehlikeli olduğu ya da başka bir saçmalık sonucuna varmışlardır. Anladıklarını düşündükleri elektrikli şeylerini takas etmeye istekli oldukları söyleniyor, ama sadece birkaç tanesi zamanımıza değer. Ayrıca sürekli olarak bizi \"Islak Kollar\" diye çağırıyorlar, bu yüzden nerede yaşadıklarını not edin ki mancınığı düzgün bir şekilde hedef alabilelim."

