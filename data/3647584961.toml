["Luc.sawmill.Description"]
raw = "A powered sawmill using crude sawblades, with higher yield but consumes metal sawblades.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A powered sawmill using crude sawblades, with higher yield but consumes metal sawblades. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一个使用粗糙锯片的动力锯木厂，产量更高，但消耗金属锯片。  \n<color=#00FFFF>作为堤坝工作</color>"
zhTW = "一座使用粗製鋸片的動力鋸木廠，產量更高，但消耗金屬鋸片。  \n<color=#00FFFF>作為堤壩運作</color>"
ruRU = "Электрическая пилорама, использующая грубые пилы, с большим выходом, но потребляющая металлические пилы.  \n<color=#00FFFF>Работает как плотина</color>"
jaJP = "粗いのこ刃を使用する動力化された製材所で、高い生産量を持つが金属のこ刃を消費する。  \n<color=#00FFFF>堤防として機能します</color>"
frFR = "Une scierie motorisée utilisant des lames de scie brutes, offrant un rendement supérieur mais consommant des lames de scie en métal. <color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Eine betriebene Säge, die grobe Sägen verwendet, mit höherem Ertrag, verbraucht jedoch metallene Sägen.  \n<color=#00FFFF>Funktioniert wie ein Deich</color>"
plPL = "Napędzana tartak z użyciem surowych pił, oferująca wyższy uzysk, ale zużywająca metalowe piły.  \n<color=#00FFFF>Działa jak wał</color>"
ptBR = "Um serralheiro movido a energia que utiliza lâminas de serra rudimentares, com maior rendimento, mas consome lâminas de serra de metal.  \n<color=#00FFFF>Funciona como uma Barreira</color>"
koKR = "거친 톱날을 사용하는 동력 제재소로, 수확량이 더 높지만 금속 톱날을 소비합니다.  \n<color=#00FFFF>제방처럼 작동합니다</color>"
csCZ = "Motorizovaná pila s hrubými pilovými listy, která poskytuje vyšší výtěžnost, ale spotřebovává kovové pilové listy. <color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một nhà máy cưa có động cơ sử dụng lưỡi cưa thô, cho năng suất cao hơn nhưng tiêu thụ lưỡi cưa kim loại.\n<color=#00FFFF>Hoạt động như một đê</color>"
trTR = "Metal testere bıçakları tüketen, daha yüksek verim sağlayan, ham testere bıçakları kullanan bir motorlu değirmen. <color=#00FFFF>Bir Set olarak çalışır</color>"

["Luc.sawmill.FlavorDescription"]
raw = "\"This new technology is nice, but let's hope the blade doesn't break and hurt someone\"\n -Mommy beaver"
status = "normal"
enUS = "\"This new technology is nice, but let's hope the blade doesn't break and hurt someone.\"  \n-Mommy beaver"
zhCN = "“这项新技术不错，但希望刀片不会折断伤到人。”  \n-妈妈海狸"
zhTW = "這項新技術不錯，但希望刀片不會斷裂並傷到某個人。  \n - 媽咪海狸"
ruRU = "\"Эта новая технология хороша, но давайте надеяться, что лезвие не сломается и не причинит вреда кому-то.\"  \n-Мама-бобер"
jaJP = "「この新しい技術は素晴らしいけど、刃が折れて誰かが怪我をしないことを願おう」  \n- ママビーバー"
frFR = "\"Cette nouvelle technologie est sympa, mais espérons que la lame ne se casse pas et ne blesse quelqu'un.\"  \n-Mamie castor"
deDE = "\"Diese neue Technologie ist schön, aber hoffen wir, dass die Klinge nicht bricht und jemanden verletzt.\"  \n- Mama Biberr"
plPL = "Ta nowa technologia jest fajna, ale miejmy nadzieję, że ostrze się nie złamie i nikogo nie zrani - Mamusiu bobrze"
ptBR = "\"Essa nova tecnologia é legal, mas vamos torcer para que a lâmina não quebre e machuque alguém.\"  \n-Mamãe castor"
koKR = "\"이 새로운 기술은 좋지만, 날이 부러져서 누군가 다치지 않기를 바래요.\"  \n-엄마 비버"
csCZ = "\"Tato nová technologie je hezká, ale doufejme, že se nůž nařeže a někoho nezraní.\"  \n-Maminka bobr"
viVN = "\"Công nghệ mới này thật tuyệt, nhưng hy vọng lưỡi cưa không gãy và làm ai đó bị thương.\"  \n-Mẹ thủy nhân"
trTR = "\"Bu yeni teknoloji güzel, ama umarım bıçak kırılmaz ve kimseye zarar vermez.\"  \n-Anne kunduz"

