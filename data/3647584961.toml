["Lapantouflemagic.Primitivesmetler.Description"]
raw = "A mixture of iron ore and coal in a clay crucible to be lit on fire.\n<color=#FF6EC7>Can function without workers.</color>"
status = "normal"
enUS = "A mixture of iron ore and coal in a clay crucible to be lit on fire. <color=#FF6EC7>Can function without workers.</color>"
zhCN = "在一个粘土坩埚中混合铁矿石和煤，然后点燃。  \n<color=#FF6EC7>可以在没有工人的情况下运作。</color>"
zhTW = "在陶土坩埚中混合鐵礦石和煤，點燃即可使用。  \n<color=#FF6EC7>可以在無工人情況下運作。</color>"
ruRU = "Смесь железной руды и угля в глиняном тигле, который необходимо разжечь.\n<color=#FF6EC7>Может функционировать без работников.</color>"
jaJP = "鉄鉱石と石炭の混合物を粘土の炉で燃やします。  \n<color=#FF6EC7>労働者なしで機能できます。</color>"
frFR = "Un mélange de minerai de fer et de charbon dans un creuset en argile à allumer.  \n<color=#FF6EC7>Peut fonctionner sans ouvriers.</color>"
deDE = "Eine Mischung aus Eisenerz und Kohle in einem Tonkreuz, die angezündet werden soll.  \n<color=#FF6EC7>Kann ohne Arbeiter funktionieren.</color>"
plPL = "Mieszanka rudy żelaza i węgla w glinianym piecu, który należy podpalić.  \n<color=#FF6EC7>Mogą działać bez pracowników.</color>"
ptBR = "Uma mistura de minério de ferro e carvão em um cadinho de argila para ser aceso. <color=#FF6EC7>Pode funcionar sem trabalhadores.</color>"
koKR = "점토 도가니에 들어 있는 철광석과 석탄의 혼합물로, 불을 지필 수 있습니다.\n<color=#FF6EC7>근로자 없이도 작동할 수 있습니다.</color>"
csCZ = "Směs železné rudy a uhlí v hliněné keramice, která se má zapálit.\n<color=#FF6EC7>Může fungovat bez pracovníků.</color>"
viVN = "Một hỗn hợp quặng sắt và than trong một cái chậu đất sét để được châm lửa.  \n<color=#FF6EC7>Có thể hoạt động mà không cần công nhân.</color>"
trTR = "Bir kil crucible içinde demir cevheri ve kömür karışımı, ateşe verilmek üzere.  \n<color=#FF6EC7>İşçiler olmadan çalışabilir.</color>"

