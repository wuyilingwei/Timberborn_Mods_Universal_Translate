["Lapantouflemagic.WaterCannonM.Description"]
raw = "An intriguing evolution of the mechanical water pump that shoots water at a 45° angle for ranged irrigation.\nProvides a good balance between range and elevation.\n<color=green>Cannon will continue working until the water level reaches the blue flag</color>"
status = "normal"
enUS = "An intriguing evolution of the mechanical water pump that shoots water at a 45° angle for ranged irrigation. Provides a good balance between range and elevation. <color=green>Cannon will continue working until the water level reaches the blue flag</color>"
zhCN = "一个有趣的机械水泵进化，能够以45°的角度喷射水用于远程灌溉。\n在射程和高度之间提供了良好的平衡。\n<color=green>炮塔将在水位达到蓝色标志之前持续工作</color>"
zhTW = "一個引人入勝的機械水泵進化版，可以以45°的角度噴射水流進行遠程灌溉。 提供範圍與高度之間的良好平衡。 <color=green>大砲將持續運作直到水位達到藍色旗幟</color>"
ruRU = "Интригующая эволюция механического водяного насоса, который стреляет водой под углом 45° для дальнего орошения. Обеспечивает хороший баланс между дальностью и высотой. <color=green>Пушка будет продолжать работать, пока уровень воды не достигнет синего флага</color>"
jaJP = "機械式水ポンプの興味深い進化で、45°の角度で水を射出し、遠距離の灌漑を行います。射程と高度のバランスが良好です。<color=green>キャノンは水位が青旗に達するまで動作し続けます</color>"
frFR = "Une évolution intrigante de la pompe à eau mécanique qui projette de l'eau à un angle de 45° pour l'irrigation à distance.  \nOffre un bon équilibre entre portée et élévation.  \n<color=green>Le canon continuera à fonctionner jusqu'à ce que le niveau d'eau atteigne le drapeau bleu</color>"
deDE = "Eine faszinierende Weiterentwicklung der mechanischen Wasserpumpe, die Wasser im 45°-Winkel für die Fernbewässerung spritzt. Bietet ein gutes Gleichgewicht zwischen Reichweite und Höhe. <color=green>Die Kanone wird weiterhin arbeiten, bis der Wasserspiegel die blaue Fahne erreicht</color>"
plPL = "Intrygująca ewolucja mechanicznej pompy wodnej, która wyrzuca wodę pod kątem 45° do nawadniania na odległość. Zapewnia dobry balans między zasięgiem a wysokością. <color=green>Działo będzie działać, dopóki poziom wody nie osiągnie niebieskiej flagi</color>"
ptBR = "Uma evolução intrigante da bomba mecânica de água que dispara água em um ângulo de 45° para irrigação à distância. Proporciona um bom equilíbrio entre alcance e elevação. <color=green>A metralhadora continuará funcionando até que o nível da água atinja a bandeira azul</color>"
koKR = "45° 각도로 물을 쏘아 멀리 관개할 수 있는 기계식 물 펌프의 흥미로운 진화입니다. 범위와 고도 간의 균형이 잘 잡혀 있습니다. <color=green>물 수준이 푸른 깃발에 도달할 때까지 대포는 계속 작동합니다</color>"
csCZ = "Zajímavá evoluce mechanického vodního čerpadla, které vystřikuje vodu pod úhlem 45° pro dálkovou zavlažování. \nPoskytuje dobrou rovnováhu mezi dosahem a výškou. \n<color=green>Kanón bude pokračovat v práci, dokud hladina vody nedosáhne modré vlajky</color>"
viVN = "Một sự tiến hóa thú vị của máy bơm nước cơ khí bắn nước theo góc 45° cho việc tưới tiêu từ xa.  \nCung cấp sự cân bằng tốt giữa khoảng cách và độ cao.  \n<color=green>Pháo sẽ tiếp tục hoạt động cho đến khi mức nước đạt đến cờ xanh</color>"
trTR = "Su pompasının ilginç bir evrimi, suyu 45° açıyla atarak uzak mesafeli sulama yapar. Aralık ve yükseklik arasında iyi bir denge sağlar. <color=green>Top, su seviyesi mavi bayrağa ulaşana kadar çalışmaya devam edecek</color>"

