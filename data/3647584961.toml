koKR = "\"이 빨간색과 흰색 버섯을 먹어야 할까? 맛있어 보이네\"  \n- 바비, 마지막 말"
csCZ = "\"Mám sníst ten červenobílý? Vypadá chutně.\" - Bobby, poslední slova"
viVN = "\"Liệu tôi có nên ăn cái nấm màu đỏ và trắng này không? Có vẻ ngon đấy\"  \n-Bobby kẻ ngốc, những lời nói cuối cùng"
