["Faction.waterbeavers.Description"]
raw = "\n\n\n\n\n\n\n\n<color=red>xa0!!! ACTIVATE THE TUTORIALxa0!!!</color>\nFollowers of the True Beaver Path, for them everything is a house. Their population often explodes out of control, food and water run out, science is a luxury, and your defeat unavoidable\n\n Forget what other factions taught you, and welcome to your pinkest nightmare.\n<color=red>xa0!!! ACTIVATE THE TUTORIALxa0!!!</color>\n\n\n\n<color=black>Beaver art and textures by Wolfess, huge thanks!\nMany icons by Thorlak, huge thanks too!\nMega-thanks to Grauschweif for the custom scripts !</color>"
status = "normal"
enUS = "<color=red>xa0!!! ACTIVATE THE TUTORIALxa0!!!</color>\nFollowers of the True Beaver Path, for them everything is a house. Their population often explodes out of control, food and water run out, science is a luxury, and your defeat is unavoidable.\n\nForget what other factions taught you, and welcome to your pinkest nightmare.\n<color=red>xa0!!! ACTIVATE THE TUTORIALxa0!!!</color>\n\n<color=black>Beaver art and textures by Wolfess, huge thanks!  \nMany icons by Thorlak, huge thanks too!  \nMega-thanks to Grauschweif for the custom scripts!</color>"
zhCN = "<color=red>xa0!!! 激活教程xa0!!!</color>\n真正海狸之路的追随者，对他们而言，所有事物都是家。他们的人口常常失控，食物和水源枯竭，科学是一种奢侈，而你的失败是不可避免的。\n\n忘掉其他派系教你的东西，欢迎来到你最可怕的噩梦。\n<color=red>xa0!!! 激活教程xa0!!!</color>\n\n<color=black>海狸的艺术和纹理由Wolfess制作，感谢你！\n许多图标由Thorlak制作，也非常感谢！\n特别感谢Grauschweif提供的自定义脚本！</color>"
zhTW = "<color=red>xa0!!! 啟動教程xa0!!!</color>  \n真正海狸之路的追隨者，對他們而言，一切皆是家。他們的人口往往失控激增，食物和水源枯竭，科學變成奢侈品，您的失敗無法避免  \n\n 忘記其他派系教給您的東西，歡迎來到您最粉紅的噩夢。  \n<color=red>xa0!!! 啟動教程xa0!!!</color>  \n\n<color=black>海狸的藝術和紋理由Wolfess創作，感謝他們！  \n許多圖示由Thorlak提供，也非常感謝！  \n特別感謝Grauschweif提供自訂腳本！</color>"
ruRU = "<color=red>xa0!!! АКТИВИРУЙТЕ УРОКИxa0!!!</color>\nПоследователи Истинного Путя Бобров, для них всё — это дом. Их население часто взрывается бесконтрольно, запасы еды и воды иссякают, наука — это роскошь, а ваше поражение неизбежно.\n\n Забывайте, что вас учили другие фракции, и добро пожаловать в ваш самый розовый кошмар.\n<color=red>xa0!!! АКТИВИРУЙТЕ УРОКИxa0!!!</color>\n\n<color=black>Искусство и текстуры бобров от Wolfess, огромная благодарность!\nМногие иконки от Thorlak, тоже огромная благодарность!\nМега-благодарности Grauschweif за пользовательские скрипты!</color>"
jaJP = "<color=red>xa0!!! チュートリアルを起動せよxa0!!!</color>\n真のビーバーの道の信者たちにとって、すべてが家である。彼らの人口はしばしば制御不能に膨れ上がり、食料や水が枯渇し、科学は贅沢であり、あなたの敗北は避けられない。\n\n他の派閥が教えたことを忘れ、あなたの最もピンクな悪夢へようこそ。\n<color=red>xa0!!! チュートリアルを起動せよxa0!!!</color>\n\n<color=black>ビーバーのアートとテクスチャはWolfessによるもので、感謝しています！\nアイコンの多くはThorlakによるもので、こちらにも感謝です！\nカスタムスクリプトを提供してくれたGrauschweifに心からの感謝を！</color>"
frFR = "<color=red>xa0!!! ACTIVEZ LE TUTORIEL xa0!!!</color>\nLes partisans du Vrai Chemin du Castor, pour eux tout est une maison. Leur population explose souvent hors de contrôle, la nourriture et l'eau viennent à manquer, la science est un luxe, et votre défaite est inévitable.\n\nOubliez ce que les autres factions vous ont appris, et bienvenue dans votre pire cauchemar rose.\n<color=red>xa0!!! ACTIVEZ LE TUTORIEL xa0!!!</color>\n\n<color=black>Art et textures de castor par Wolfess, un énorme merci !\nDe nombreux icônes par Thorlak, un énorme merci aussi !\nUn grand merci à Grauschweif pour les scripts personnalisés !</color>"
deDE = "<color=red>xa0!!! AKTIVIEREN SIE DAS TUTORIALxa0!!!</color>\nAnhänger des wahren Biberpfades, für sie ist alles ein Zuhause. Ihre Bevölkerung explodiert oft außer Kontrolle, Essen und Wasser gehen aus, Wissenschaft ist ein Luxus und Ihre Niederlage unvermeidlich.\n\nVergessen Sie, was andere Fraktionen Ihnen beigebracht haben, und willkommen in Ihrem pinksten Albtraum.\n<color=red>xa0!!! AKTIVIEREN SIE DAS TUTORIALxa0!!!</color>\n\n<color=black>Biberkunst und Texturen von Wolfess, vielen Dank!\nViele Icons von Thorlak, ebenfalls vielen Dank!\nMega-Danke an Grauschweif für die benutzerdefinierten Skripte!</color>"
plPL = "<color=red>xa0!!! AKTYWUJ TUTORIALxa0!!!</color> \nWyznawcy Prawdziwej Drogi Bóbrów, dla nich wszystko jest domem. Ich populacja często wybucha poza kontrolą, brakuje jedzenia i wody, nauka to luksus, a twoja porażka jest nieunikniona.\n\n Zapomnij, czego nauczyły cię inne frakcje, i witaj w swoim różowym koszmarze. \n<color=red>xa0!!! AKTYWUJ TUTORIALxa0!!!</color>\n\n<color=black>Grafika i tekstury bobrów autorstwa Wolfess, ogromne dzięki! \nWiele ikon autorstwa Thorlaka, również ogromne dzięki! \nMega-podziękowania dla Grauschweifa za niestandardowe skrypty!</color>"
ptBR = "<color=red>xa0!!! ATIVE O TUTORIALxa0!!!</color>\nSeguidores do Verdadeiro Caminho do Castor, para eles tudo é uma casa. Sua população frequentemente explode fora de controle, a comida e a água acabam, a ciência é um luxo, e sua derrota é inevitável.\n\n Esqueça o que outras facções te ensinaram e dê boas-vindas ao seu pesadelo mais cor-de-rosa.\n<color=red>xa0!!! ATIVE O TUTORIALxa0!!!</color>\n\n<color=black>Arte e texturas de castores por Wolfess, enorme obrigado!\nMuitos ícones por Thorlak, enorme agradecimento também!\nMega-obrigado a Grauschweif pelos scripts personalizados!</color>"
koKR = "<color=red>xa0!!! 튜토리얼을 활성화하세요xa0!!!</color>\n진정한 비버의 길을 따르는 이들, 그에게는 모든 것이 집이다. 그들의 인구는 종종 통제를 벗어나고, 식량과 물이 고갈되며, 과학은 사치가 되고, 당신의 패배는 불가피하다.\n\n다른 세력이 가르친 것을 잊고, 당신의 가장 핑크빛 악몽에 오신 것을 환영합니다.\n<color=red>xa0!!! 튜토리얼을 활성화하세요xa0!!!</color>\n\n<color=black>비버의 예술과 텍스처는 Wolfess에 의해 제작되었습니다. 대단히 감사합니다!\n많은 아이콘은 Thorlak에 의해 제작되었습니다. 또한 대단히 감사합니다!\n커스텀 스크립트에 대해 Grauschweif에게 메가 감사를 보냅니다!</color>"
csCZ = "<color=red>xa0!!! AKTIVUJTE TUTORIÁL xa0!!!</color>\nNásledovníci Pravé Cesty Bobra, pro ně je vše dům. Jejich populace často exploduje mimo kontrolu, jídlo a voda dochází, věda je luxus a vaše porážka nevyhnutelná.\n\n Zapomeňte, co vás naučily ostatní frakce, a vítejte ve vašem nejrůžovějším nočním můře.\n<color=red>xa0!!! AKTIVUJTE TUTORIÁL xa0!!!</color>\n\n<color=black>Umění a textury bobrů od Wolfess, obrovské díky!\nMnoho ikon od Thorlaka, také obrovské díky!\nMega-díky Grauschweifovi za vlastní skripty!</color>"
viVN = "<color=red>xa0!!! KÍCH HOẠT HƯỚNG DẪNxa0!!!</color>\nNgười theo Đạo Bó Mọi Thật Sự, đối với họ mọi thứ đều là nhà. Dân số của họ thường bùng nổ ngoài tầm kiểm soát, thực phẩm và nước cạn kiệt, khoa học là một thứ xa xỉ, và thất bại của bạn là không thể tránh khỏi.\n\nQuên những gì các bang phái khác dạy bạn, và chào mừng đến cơn ác mộng hồng hào nhất của bạn.\n<color=red>xa0!!! KÍCH HOẠT HƯỚNG DẪNxa0!!!</color>\n\n<color=black>Nghệ thuật và kết cấu Bọ Cạp bởi Wolfess, cảm ơn rất nhiều!\nNhiều biểu tượng bởi Thorlak, cũng cảm ơn rất nhiều!\nCảm ơn mega đến Grauschweif vì các tập lệnh tùy chỉnh!</color>"
trTR = "<color=red>xa0!!! EĞİTİMİ AKTİVE ETxa0!!!</color> Gerçek Kunduz Yolu'nun takipçileri, her şeyin bir ev olduğu için yaşıyorlar. Nüfusları sıklıkla kontrol edilemez şekilde patlar, yiyecek ve su tükenir, bilim lüks bir şeydir ve yenilginiz kaçınılmazdır. \n\nDiğer fraksiyonların size öğrettiklerini unutun ve en pembe kabusunuza hoş geldiniz. \n<color=red>xa0!!! EĞİTİMİ AKTİVE ETxa0!!!</color> \n\n<color=black>Kunduz sanatı ve dokuları Wolfess tarafından hazırlandı, büyük teşekkürler! \nBirçok ikon Thorlak tarafından yapıldı, büyük teşekkürler! \nÖzel betikler için Grauschweif'e mega teşekkürler!</color>"

