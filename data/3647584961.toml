zhCN = "一个特殊的火坑，将木材转化为木炭。  \n<color=#FF6EC7>可以在没有工人的情况下运作。</color>"
zhTW = "一個特殊的火坑，可以將木材轉化為木炭。  \n<color=#FF6EC7>可以在沒有工人的情況下運作。</color>"
ruRU = "Специальный костер для превращения древесины в уголь.  \n<color=#FF6EC7>Может работать без рабочих.</color>"
jaJP = "木を炭に変える特別な焚き火です。  \n<color=#FF6EC7>労働者なしで機能します。</color>"
frFR = "Un foyer spécial pour transformer le bois en charbon de bois. <color=#FF6EC7>Peut fonctionner sans ouvriers.</color>"
deDE = "Ein besonderer Feuerplatz, um Holz in Holzkohle zu verwandeln. <color=#FF6EC7>Kann ohne Arbeiter funktionieren.</color>"
plPL = "Specjalne ognisko do przekształcania drewna w węgiel drzewny. <color=#FF6EC7>Może działać bez pracowników.</color>"
ptBR = "Uma fogueira especial para transformar madeira em carvão.\n<color=#FF6EC7>Pode funcionar sem trabalhadores.</color>"
koKR = "목재를 석탄으로 변환하는 특별한 화로.\n<color=#FF6EC7>작업자 없이도 작동할 수 있습니다.</color>"
csCZ = "Speciální ohniště pro přeměnu dřeva na uhlí. <color=#FF6EC7>Může fungovat bez pracovníků.</color>"
viVN = "Một lò lửa đặc biệt để biến gỗ thành than củi. \n<color=#FF6EC7>Có thể hoạt động mà không cần công nhân.</color>"
trTR = "Ahşabı kömüre dönüştüren özel bir ateş çukuru. <color=#FF6EC7>İşçiler olmadan çalışabilir.</color>"

["Lapantouflemagic.Woodburner.FlavorDescription"]
raw = "\"Oh, that would be a great way to get rid of... uhh... sawdust! Yes, sawdust... of course.\"\n -Jack the Gnawer"
status = "normal"
enUS = "\"Oh, that would be a great way to get rid of... uhh... sawdust! Yes, sawdust... of course.\"  \n-Jack the Gnawer"
zhCN = "“哦，那将是处理…呃…锯末的好方法！是的，锯末…当然。” - 塞克·咬者"
zhTW = "「哦，這將是處理……呃……木屑的一個很好的方法！是的，木屑……當然。」  \n- 齧齒者傑克"
ruRU = "\"О, это было бы отличным способом избавиться от... эмм... опилок! Да, опилок... конечно.\"  \n- Джек Грызун"
jaJP = "「おお、それは...うーん...切りくずを片付ける素晴らしい方法だね！そう、切りくず...もちろん。」  \n- ジャック・ザ・ノワー"
frFR = "\"Ah, ce serait une excellente façon de se débarrasser de... euh... sciure de bois ! Oui, sciure de bois... bien sûr.\"  \n -Jack le Rongeur"
deDE = "\"Oh, das wäre eine großartige Möglichkeit, um... äh... Sägemehl loszuwerden! Ja, Sägemehl... natürlich.\" -Jack der Nager"
plPL = "„Och, to byłby wspaniały sposób na pozbycie się... eh... trocin! Tak, trocin... oczywiście.”  \n -Jack Gnawer"
ptBR = "\"Oh, isso seria uma ótima maneira de se livrar de... ehh... serragem! Sim, serragem... claro.\"  \n- Jack o Roedor"
koKR = "\"오, 그건 ... 음 ... 톱밥을 없애는 좋은 방법이 될 것 같군요! 네, 톱밥 ... 물론입니다.\" - 잭 더 그너"
csCZ = "„Oh, to by byl skvělý způsob, jak se zbavit... ehm... pilin! Ano, pilin... samozřejmě.“  \n-Jack Hlodavec"
viVN = "Oh, sẽ là một cách tuyệt vời để التخلص من... ờ... bụi gỗ! Vâng, bụi gỗ... tất nhiên.\" \n -Jack the Gnawer"
trTR = "\"Ah, bu... hımm... talaşlardan kurtulmanın harika bir yolu olurdu! Evet, talaş... elbette.\"  \n-Jack the Gnawer"

