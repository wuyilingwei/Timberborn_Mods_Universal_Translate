["Lapantouflemagic.LumberjackHouse.Description"]
raw = "A tall Lodge that doubles as a working hub for a group of lumberjacks, proper planning increasing their efficacy.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A tall Lodge that doubles as a working hub for a group of lumberjacks, proper planning increasing their efficacy.  \n<color=#00FFFF>Works as a Levee</color>"
zhCN = "一座高大的小屋，既是伐木工人的工作中心，合理的规划能提高他们的效率。  \n<color=#00FFFF>作为堤坝使用</color>"
zhTW = "一座高大的小屋，除了作為一群伐木工的工作中心外，適當的規劃還能提高他們的效率。  \n<color=#00FFFF>充當堤壩</color>"
ruRU = "Высокий дом, который служит рабочим центром для группы лесорубов, правильное планирование увеличивает их эффективность.  \n<color=#00FFFF>Работает как плотина</color>"
jaJP = "「高いロッジで、伐採者のグループの作業拠点にもなる。適切な計画が彼らの効率を高める。<color=#00FFFF>堤防として機能します</color>」"
frFR = "Un grand pavillon qui fait également office de centre de travail pour un groupe de bûcherons, une bonne planification augmentant leur efficacité. <color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Ein hohes Haus, das als Arbeitszentrum für eine Gruppe von Holzfällern dient. Gute Planung erhöht ihre Effizienz.  \n<color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Wysoka chata, która pełni również rolę centrum pracy dla grupy drwali, a odpowiednie planowanie zwiększa ich efektywność. <color=#00FFFF>Działa jak tamper</color>"
ptBR = "Uma alta Casa de Lamber que também serve como um centro de trabalho para um grupo de lenhadores, um planejamento adequado aumenta sua eficácia. <color=#00FFFF>Funciona como uma Barragem</color>"
koKR = "장작꾼 그룹을 위한 작업 허브 역할을 하는 높은 오두막, 적절한 계획이 그들의 효율성을 높인다.  \n<color=#00FFFF>제방으로 작동함</color>"
csCZ = "Vysoká chata, která slouží jako pracovní centrum pro skupinu dřevorubců, správné plánování zvyšuje jejich účinnost.  \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một ngôi nhà cao lớn kết hợp với trung tâm làm việc của một nhóm thợ xẻ, việc lập kế hoạch hợp lý sẽ tăng cường hiệu quả của họ.  \n<color=#00FFFF>Hoạt động như một con đê</color>"
trTR = "Bir grup ağaç kesici için çalışan bir merkez görevi gören yüksek bir Kulübe, düzgün planlama verimliliklerini artırır.  \n<color=#00FFFF>Bir Set olarak çalışır</color>"

["Lapantouflemagic.LumberjackHouse.FlavorDescription"]
raw = "\"My daddy's the strongest! He can carry a whole sequoia on his back!\"\n -Typical kit boasting"
status = "normal"
enUS = "\"My daddy's the strongest! He can carry a whole sequoia on his back!\"  \n-Typical kit boasting"
zhCN = "“我爸爸是最强的！他可以把整棵红杉扛在背上！”  \n-典型的装备炫耀"
zhTW = "“我爸爸是最強的！他能把整棵紅木扛在背上！”  \n-典型的裝備自誇"
ruRU = "\"Мой папа самый сильный! Он может нести целую секвойю на спине!\" - Типичное хвастовство."
jaJP = "「僕のお父さんは一番強いんだ！彼は背中にセコイアの木を丸ごと運べるんだ！」  \n- 典型的な自慢"
frFR = "Mon papa est le plus fort ! Il peut porter un séquoia entier sur son dos !\"  \n- \"Rivalité typique"
deDE = "„Mein Papa ist der Stärkste! Er kann einen ganzen Sequoia auf seinem Rücken tragen!“  \n-Typisches Angeben eines Kits"
plPL = "\"Moi tata jest najsilniejszy! Może nosić całego sekwoję na plecach!\"  \n- Typowe przechwałki dziecięce"
ptBR = "\"Meu papai é o mais forte! Ele consegue carregar uma sequoia inteira nas costas!\"  \n- Tipo de bragança típica"
koKR = "\"우리 아빠는 가장 강한 사람이야! 그는 세쿼이아 나무를 통째로 등에 놓고 다닐 수 있어!\"  \n- 전형적인 자랑"
csCZ = "\"Táta je nejsilnější! Může nést celé sekvoje na zádech!\"  \n-Typické chlubení dítěte"
viVN = "\"Bố tôi mạnh nhất! Ông ấy có thể mang cả một cây sequoia trên lưng!\" - Nói khoác về bộ dụng cụ điển hình"
trTR = "\"Babam en güçlüsü! Sırtında bir tam sekoya taşıyabilir!\"  \n- Tipik bir kiti övünmesi"

