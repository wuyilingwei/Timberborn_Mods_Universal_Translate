ptBR = "<color=red>Este edifício está obsoleto e falta algumas novas funcionalidades! Substitua-o por um novo quando tiver a oportunidade.</color>"
koKR = "<color=red>이 건물은 사용 중지 되었으며 일부 새로운 기능이 누락되었습니다!\n기회가 생기면 새로운 것으로 교체하세요.</color>"
csCZ = "<color=red>Tato budova je zastaralá a chybí jí některé nové funkce! Nahradťe ji novou, až budete mít příležitost.</color>"
viVN = "<color=red>Nhà này đã lỗi thời và thiếu một số chức năng mới! Hãy thay thế nó bằng một cái mới khi bạn có cơ hội.</color>"
