viVN = "Một bức tượng để vinh danh công việc của những người chặt cây, nếu không có họ thì không có gì được xây dựng."
trTR = "İnşaatların yapılamayacağı ağaç kesicilerin çalışmalarını onurlandırmak için yapılan bir heykel."

["Lapantouflemagic.Statue_Lumberjack.FlavorDescription"]
raw = "\"Which trees taste the best? Only us knows!\""
status = "normal"
enUS = "\"Which trees taste the best? Only we know!\""
zhCN = "“哪些树的味道最好？只有我们知道！”"
zhTW = "「哪種樹木味道最好？只有我們知道！」"
ruRU = "\"Какие деревья на вкус лучшие? Это знаем только мы!\""
jaJP = "「どの木の味が一番美味しいの？それは私たちだけが知っている！」"
frFR = "Quels arbres ont le meilleur goût ? Seuls nous le savons !"
deDE = "Welche Bäume schmecken am besten? Nur wir wissen es!"
plPL = "Które drzewa smakują najlepiej? Tylko my to wiemy!"
ptBR = "\"Quais árvores têm o melhor sabor? Apenas nós sabemos!\""
koKR = "\"어떤 나무가 제일 맛있을까? 오직 우리만이 알고 있어!\""
csCZ = "Které stromy chutnají nejlépe? To víme jen my!"
