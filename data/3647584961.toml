["Lapantouflemagic.FarmUpgradeB.FlavorDescription"]
raw = "\"Why do I have to write down how many cabbages we have? Numbers are hard!\"\n -Bobby the fool, on the concept of ''inventory''."
status = "normal"
enUS = "\"Why do I have to write down how many cabbages we have? Numbers are hard!\"  \n-Bobby the fool, on the concept of 'inventory'."
zhCN = "“我为什么要记下我们有多少个卷心菜？数字真难！”  \n—傻瓜鲍比，谈论“库存”的概念。"
zhTW = "\"為什麼我必須寫下我們有多少捲心菜？數字好難！\"  \n- 傻瓜鮑比，談到「庫存」的概念。"
ruRU = "\"Почему я должен записывать, сколько у нас капусты? Цифры трудные!\"  \n-Бобби, дурак, о концепции «инвентари»."
jaJP = "「なぜ私たちが持っているキャベツの数を書かなければならないの？数字は難しい！」  \n– バービー、'インベントリ'の概念について。"
frFR = "\"Pourquoi dois-je écrire combien de choux nous avons ? Les chiffres, c'est difficile !\"  \n-Bobby l'imbécile, sur le concept d'« inventaire »."
deDE = "„Warum muss ich aufschreiben, wie viele Kohlköpfe wir haben? Zahlen sind schwer!“  \n-Bobby der Narr, über das Konzept von „Inventar“."
plPL = "\"Dlaczego muszę zapisywać, ile mamy kapusty? Liczby są trudne!\" - Bobby, głupek, na temat pojęcia ''inwentarza''."
ptBR = "\"Por que eu tenho que anotar quantas couves temos? Números são difíceis!\"  \n -Bobby, o tolo, sobre o conceito de ''inventário''."
koKR = "\"왜 우리가 가진 양배추의 개수를 적어야 하죠? 숫자는 어려워요!\"\n -바비, '재고' 개념에 대해."
csCZ = "\"Proč musím zapisovat, kolik máme zelí? Čísla jsou těžká!\"  \n-Bobby blázen, o konceptu ''inventáře''."
viVN = "\"Tại sao tôi phải ghi lại số lượng bắp cải mà chúng ta có? Số là khó quá!\"  \n-Bobby kẻ ngu ngốc, về khái niệm ''hàng tồn kho''."
trTR = "\"Neden ne kadar lahana aldığımızı not almak zorundayım? Sayılar zor!\" - Aptal Bobby, ''envanter'' kavramı hakkında."

