["Lapantouflemagic.LeafTrader.Description"]
raw = "The Leafcoats are, for lack of a better term, weirdoes. It’s unclear whether they actually grow leaves or if they simply glue them on every morning. Anyway, they hate killing plants and get offended if you ask them for such products, but they happily take ours so they also are hypocrites. Anyway our brainiacs want to study the beautiful glowing insects that live in their lands. try to bring us back some."
status = "normal"
enUS = "The Leafcoats are, for lack of a better term, weirdoes. It’s unclear whether they actually grow leaves or if they simply glue them on every morning. Anyway, they hate killing plants and get offended if you ask them for such products, but they happily take ours so they also are hypocrites. Anyway, our brainiacs want to study the beautiful glowing insects that live in their lands. Try to bring us back some."
zhCN = "叶衣人可以说是“奇怪的人”。不清楚他们是不是真的长出叶子，还是每天都在身上粘贴叶子。无论如何，他们讨厌杀害植物，如果你请求他们提供这样的产品，他们会感到冒犯，但他们乐意接受我们的产品，所以他们也是伪善者。总之，我们的学者们想研究生活在他们土地上的美丽发光昆虫，试着带一些回来给我们。"
zhTW = "葉披風在某種程度上可以說是怪人。至於他們是否真的長出葉子，還是每天早上只是把葉子黏上去，這點不甚明確。無論如何，他們厭惡殺死植物，如果你要求他們提供這種產品會讓他們感到冒犯，但他們卻樂於接受我們的產品，因此他們也是偽君子。總之，我們的腦筋急轉彎團隊想要研究生活在他們土地上的美麗發光昆蟲。試著帶一些回來給我們。"
ruRU = "Лифкоуты - это странные создания, если уж на то пошло. Неясно, действительно ли они отращивают листья или просто приклеивают их каждое утро. В любом случае, они ненавидят убивать растения и обижаются, если вы спрашиваете их о таких продуктах, но охотно берут наши, так что они тоже лицемеры. В любом случае, наши умники хотят изучить красивых светящихся насекомых, которые обитают на их землях. Попробуйте принести нам некоторых."
jaJP = "リーフコートは、適切な表現がないため、変わり者です。彼らが実際に葉を育てているのか、それとも毎朝葉を貼り付けているのかは不明です。とにかく、彼らは植物を殺すことを嫌い、そのような製品を求めると不快に思いますが、私たちのものは喜んで受け取るので、彼らは偽善者でもあります。とにかく、私たちの天才たちは彼らの土地に住む美しい光る昆虫を研究したがっています。いくつか持ち帰るようにしてください。"
frFR = "Les Leafcoats sont, faute d'un meilleur terme, des étranges. Il est flou de savoir s'ils font réellement pousser des feuilles ou s'ils les collent simplement chaque matin. Quoi qu'il en soit, ils détestent tuer des plantes et se vexent si vous leur demandez de tels produits, mais ils prennent volontiers les nôtres, donc ils sont aussi des hypocrites. Quoi qu'il en soit, nos cerveaux veulent étudier les magnifiques insectes lumineux qui vivent dans leurs terres. Essayez de nous en ramener un peu."
deDE = "Die Blättermäntel sind, um es freundlicher auszudrücken, seltsame Wesen. Es ist unklar, ob sie tatsächlich Blätter züchten oder ob sie sie jeden Morgen einfach ankleben. Wie dem auch sei, sie hassen es, Pflanzen zu töten und fühlen sich beleidigt, wenn man sie nach solchen Produkten fragt, aber sie nehmen unsere gerne, also sind sie auch Heuchler. Unsere Technikfreaks wollen die schönen leuchtenden Insekten studieren, die in ihrem Land leben. Versuch, uns einige davon mitzubringen."
plPL = "Kurtka Liściowa to, mówiąc w skrócie, dziwacy. Nie jest jasne, czy rzeczywiście hodują liście, czy po prostu przyklejają je co rano. W każdym razie nienawidzą zabijać roślin i obrażają się, gdy prosisz ich o takie produkty, ale chętnie biorą nasze, więc są też hipokrytami. Tak czy inaczej, nasi geniusze chcą badać piękne świecące owady, które żyją na ich ziemiach. Spróbuj przynieść nam kilka."
ptBR = "Os Leafcoats são, para não dizer outra coisa, esquisitos. Não está claro se eles realmente crescem folhas ou se apenas as colam todas as manhãs. De qualquer forma, eles odeiam matar plantas e ficam ofendidos se você pedir produtos assim, mas aceitam os nossos com prazer, então também são hipócritas. De qualquer forma, nossos estudiosos querem estudar os belos insetos brilhantes que vivem em suas terras. Tente nos trazer alguns."
koKR = "리프코트들은 더 나은 표현이 없어서 이상한 사람들입니다. 그들이 실제로 잎을 자라는지 아니면 매일 아침 그것들을 단순히 붙이는지는 불확실합니다. 어쨌든 그들은 식물을 죽이는 것을 싫어하며, 그런 제품을 요구하면 기분이 상합니다. 하지만 그들은 우리의 제품은 기꺼이 받아들이므로 위선자들입니다. 어쨌든 우리의 똑똑한 친구들은 그들이 사는 땅에 있는 아름답고 빛나는 곤충들을 연구하고 싶어합니다. 우리에게 좀 가져다 주세요."
csCZ = "Listoví plášťáci jsou, při vší úctě, podivíni. Není jasné, zda skutečně pěstují listy, nebo si je každé ráno prostě lepidlem přilepují. Každopádně nenávidí zabíjení rostlin a urazí se, pokud je požádáte o takové produkty, ale s radostí berou ty naše, takže jsou také pokrytci. Naši géniové chtějí studovat krásné zářivé hmyzce, kteří žijí na jejich území. Snažte se nám nějaké přinést."
viVN = "Các Leafcoat thì, không có thuật ngữ nào hay hơn, là những người kỳ quặc. Không rõ họ thực sự mọc lá hay chỉ dán chúng vào mỗi sáng. Dù sao, họ ghét giết cây và cảm thấy bị xúc phạm nếu bạn hỏi họ về những sản phẩm như vậy, nhưng họ vui vẻ nhận của chúng ta, nên họ cũng là những kẻ đạo đức giả. Dù sao, những bộ óc thông minh của chúng ta muốn nghiên cứu những con côn trùng phát sáng xinh đẹp sống trên đất của họ. Hãy cố gắng mang về cho chúng ta một ít."
trTR = "Leafcoatlar, daha iyi bir terim olmadığı için, tuhaf varlıklar. Gerçekten yaprak yetiştirip yetiştirmedikleri veya her sabah yaprakları yapıştırıp yapıştırmadıkları belirsiz. Her neyse, bitkileri öldürmeyi sevmiyorlar ve bu tür ürünler istediğinizde alınıyorlar, ama bizimkileri seve seve alıyorlar, bu yüzden de iki yüzlüler. Her neyse, zeki arkadaşlarımız onların topraklarında yaşayan güzel parlayan böcekleri çalışmak istiyor. Bize biraz geri getirirsen iyi olur."

