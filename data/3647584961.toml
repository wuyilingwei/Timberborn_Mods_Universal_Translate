["Lapantouflemagic.UndergroundColdStorage.FlavorDescription"]
raw = "\"The best place to store ice, ice cream, or corpses! ... Why are you looking at me like that? YOU brought this disgusting stuff back!\"\n - Jack the gnawer"
status = "normal"
enUS = "\"The best place to store ice, ice cream, or corpses! ... Why are you looking at me like that? YOU brought this disgusting stuff back!\"  \n- Jack the gnawer"
zhCN = "“存放冰块、冰淇淋或尸体的最佳地点！……你为什么用那种眼光看着我？是你把这些恶心的东西带回来的！” - 啃咬者杰克"
zhTW = "\"儲存冰塊、冰淇淋或屍體的最佳場所！… 你為什麼這樣看著我？是你把這些噁心的東西帶回來的！\" - 縮頭蟲傑克"
ruRU = "Лучшее место для хранения льда, мороженого или cadáverов! ... Почему вы так на меня смотрите? ЭТО ты притащил эту отвратительную вещь обратно!\"  \n- Джек грызун"
jaJP = "「氷、アイスクリーム、または死体を保存するのに最適な場所です！…どうしてそんな目で見てるの？あなたがこの不快なものを持ち帰ったんでしょう！」  \n- ジャック・ザ・ノーワー"
frFR = "\"Le meilleur endroit pour stocker de la glace, de la glace à la crème ou des cadavres ! ... Pourquoi tu me regardes comme ça ? C'EST TOI qui a ramené ces choses dégoûtantes !\"  \n- Jack le rongeur"
deDE = "\"Der beste Ort, um Eis, Eiscreme oder Leichname zu lagern! ... Warum schaust du mich so an? DU hast diesen ekelhaften Kram mitgebracht!\" - Jack der Nager"
plPL = "\"Najlepsze miejsce do przechowywania lodu, lodów lub zwłok! ... Czemu tak na mnie patrzysz? TO TY przyniosłeś te obrzydliwe rzeczy z powrotem!\" - Jack Gryzacz"
ptBR = "\"O melhor lugar para armazenar gelo, sorvete ou cadáveres! ... Por que você está me olhando assim? VOCÊ trouxe essa coisa nojenta de volta!\"  \n- Jack, o roedor"
koKR = "\"얼음, 아이스크림 또는 시체를 보관하기에 가장 좋은 장소! ... 왜 그렇게 쳐다보고 있어? 네가 이 더러운 것들을 가져온 거잖아!\" - 잭 더 너워"
csCZ = "\"Nejlepší místo na ukládání ledu, zmrzliny nebo těl! ... Proč na mě tak koukáte? TO vy jste přinesli tyhle nechutné věci zpět!\" - Jack Hryzák"
viVN = "\"Địa điểm tốt nhất để lưu trữ đá, kem, hoặc xác chết! ... Tại sao bạn lại nhìn tôi như vậy? BẠN là người đã mang những thứ kinh tởm này về!\"  \n- Jack the gnawer"
trTR = "\"Buz, dondurma veya ceset depolamak için en iyi yer! ... Bana öyle bakıyorsun neden? BU iğrenç şeyleri sen getirdin!\"  \n- Jack kemirgen"

