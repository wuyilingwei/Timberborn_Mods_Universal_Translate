["Lapantouflemagic.PitandLadderDoubleDoor.Description"]
raw = "A medium-sized watertight lodge built around a ladder.\nComes with <color=green>two</color> side access doors!\nCan be stacked on itself, variants, and can carry select buildings.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A medium-sized watertight lodge built around a ladder. Comes with <color=green>two</color> side access doors! Can be stacked on itself, variants, and can carry select buildings. <color=#00FFFF>Works as a Levee</color>"
zhCN = "“一个中等大小的防水小屋，围绕着一架梯子建造。\n配备<color=green>两个</color>侧面通道门！\n可以叠加在自身、变体上，并可以承载特定建筑。\n<color=#00FFFF>作为堤坝使用</color>”"
zhTW = "一個中型的防水小屋，周圍建有一個梯子。\n附有<color=green>兩扇</color>側邊進出門！\n可以自行堆疊、變體，並能承載特定建築。\n<color=#00FFFF>可作為堤防使用</color>"
ruRU = "Среднего размера водонепроницаемая хижина, построенная вокруг лестницы.  \nОснащена <color=green>двумя</color> боковыми дверями для доступа!  \nМожет накладываться на саму себя, имеются варианты и может переносить определенные здания.  \n<color=#00FFFF>Работает как набережная</color>"
jaJP = "「中サイズの防水ロッジで、はしごを中心に建設されています。<color=green>二</color>つの側面アクセスドアがあります！自分自身やバリアントに積み重ねることができ、特定の建物を運ぶことができます。<color=#00FFFF>堤防としても機能します</color>」"
frFR = "Un pavillon étanche de taille moyenne construit autour d'une échelle.\nÉquipé de <color=green>deux</color> portes d'accès latérales !\nPeut être empilé sur lui-même, variantes, et peut transporter certains bâtiments.\n<color=#00FFFF>Fonctionne comme une levée</color>"
deDE = "Eine mittelgroße wasserdichte Hütte, die um eine Treppe gebaut ist.\nKommt mit <color=green>zwei</color> seitlichen Zugangstüren!\nKann auf sich selbst gestapelt werden, Varianten und kann ausgewählte Gebäude tragen.\n<color=#00FFFF>Funktioniert als Damm</color>"
plPL = "Średniej wielkości wodoodporna chata zbudowana wokół drabiny. Posiada <color=green>dwie</color> boczne drzwi dostępu! Może być stosowana na sobie, ma warianty i może przenosić wybrane budynki. <color=#00FFFF>Działa jak Wał</color>"
ptBR = "Uma cabine à prova d'água de tamanho médio construída em torno de uma escada. Vem com <color=green>duas</color> portas de acesso lateral! Pode ser empilhada em si mesma, variantes e pode suportar prédios selecionados. <color=#00FFFF>Funciona como uma Levée</color>"
koKR = "사다리를 중심으로 지어진 중간 크기의 방수 오두막입니다.\n<color=green>두 개</color>의 측면 출입문이 있습니다!\n자기 자신과 변형 버전 위에 쌓을 수 있으며, 특정 건물을 운반할 수 있습니다.\n<color=#00FFFF>둑으로 작동합니다</color>"
csCZ = "Středně velká vodotěsná budova postavená kolem žebříku. \nObsahuje <color=green>dveře pro přístup z obou stran</color>! \nLze ji skládat na sebe, varianty a může nést vybrané budovy. \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một ngôi lều vừa đủ kích thước được xây dựng chung quanh một cái thang.\nCó <color=green>hai</color> cửa ra vào bên hông!\nCó thể chồng lên nhau, biến thể, và có thể mang theo một số công trình.\n<color=#00FFFF>Hoạt động như một đê</color>"
trTR = "Merdiven etrafında inşa edilmiş, orta boy bir su geçirmez baraka.\n<color=green>İki</color> yan erişim kapısıyla birlikte gelir!\nKendisi üzerine, değişik versiyonlarda istiflenebilir ve belirli yapıları taşıyabilir.\n<color=#00FFFF>Bir Set olarak çalışır</color>"

