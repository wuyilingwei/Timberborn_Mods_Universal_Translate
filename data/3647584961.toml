["Lapantouflemagic.DeepMinestorage.Description"]
raw = "Repurposes an empty sector of the abandoned hooman facility to store an excessive amount of resources."
status = "normal"
enUS = "Repurposes an empty sector of the abandoned human facility to store an excessive amount of resources."
zhCN = "“将废弃的人类设施中的一个空闲区域重新利用，用于存储大量资源。”"
zhTW = "將廢棄的人類設施中的一個空閒區域重新利用，以儲存大量資源。"
ruRU = "Переоборудует пустой сектор заброшенного человеческого объекта для хранения чрезмерного количества ресурсов."
jaJP = "「廃棄されたヒューマン施設の空いているセクターを再利用して、過剰な量の資源を保管します。」"
frFR = "Réutilise un secteur vide de l'installation hooman abandonnée pour stocker une quantité excessive de ressources."
deDE = "Nutze einen leeren Sektor der verlassenen Hooman-Anlage, um eine übermäßige Menge an Ressourcen zu lagern."
plPL = "Zagospodarowuje pusty sektor opuszczonego obiektu hooman do przechowywania nadmiaru zasobów."
ptBR = "Reutiliza um setor vazio da instalação humana abandonada para armazenar uma quantidade excessiva de recursos."
koKR = "버려진 휴먼 시설의 빈 구역을 재활용하여 과도한 양의 자원을 저장합니다."
csCZ = "Přepracovává prázdný sektor opuštěného zařízení hooman k uložení nadměrného množství zdrojů."
viVN = "Chuyển đổi một khu vực trống của cơ sở hooman bỏ hoang để lưu trữ một lượng tài nguyên lớn."
trTR = "Terk edilmiş insan tesisinin boş bir sektörünü aşırı miktarda kaynak depolamak için yeniden kullanır."

["Lapantouflemagic.DeepMinePILEstorage.FlavorDescription"]
raw = "\"This thing is so immense that we could spend a lifetime exploring it\"\n-An explorer beaver"
status = "normal"
enUS = "\"This thing is so immense that we could spend a lifetime exploring it.\"  \n-An explorer beaver"
zhCN = "“这个东西巨大到我们可以花一辈子去探索它。”  \n——一只探索者海狸"
zhTW = "「這東西太巨大了，我們可以花一輩子的時間來探索它。」  \n— 一隻探索者海狸"
ruRU = "\"Эта вещь такая огромная, что мы могли бы потратить на её исследование целую жизнь.\"  \n- Исследовательский бобёр"
jaJP = "\"このものは非常に広大で、一生かけて探検することができるだろう\"  \n- 探検家ビーバー"
frFR = "\"Cette chose est si immense que nous pourrions y passer une vie à l'explorer.\"  \n-Un castor explorateur"
deDE = "\"Dieses Ding ist so riesig, dass wir ein ganzes Leben damit verbringen könnten, es zu erkunden.\"  \n- Ein erforschender Biber"
plPL = "\"To urządzenie jest tak ogromne, że moglibyśmy spędzić całe życie na jego odkrywaniu.\"  \n- Włóczykij bobr"
ptBR = "\"Esta coisa é tão imensa que poderíamos passar uma vida inteira explorando-a.\"  \n-Um castor explorador"
koKR = "“이것은 너무 거대해서 우리는 평생을 탐험하는 데 쓸 수 있을 것입니다.”\n- 탐험가 비버"
csCZ = "Tato věc je tak obrovská, že bychom mohli strávit celý život jejím prozkoumáváním.\"  \n- \"Bobr objevitel"
viVN = "\"Cái này lớn đến nỗi chúng ta có thể dành cả đời để khám phá nó\"  \n-Một con nhím khám phá"
trTR = "\"Bu şey o kadar muazzam ki içinde keşif yaparak bir ömür geçirebiliriz.\"  \n-Bir kaşif kunduz"

