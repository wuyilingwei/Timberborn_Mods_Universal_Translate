["Lapantouflemagic.Smallcookhouse.FlavorDescription"]
raw = "Small kits falling through the floor are not our responsibility, please send your complaints to the architects."
status = "normal"
enUS = "Small kits falling through the floor are not our responsibility, please send your complaints to the architects."
zhCN = "“小猫从地板掉下来不是我们的责任，请将您的投诉发送给建筑师。”"
zhTW = "小小的工具掉落在地板上不是我們的責任，請將您的投訴寄給建築師。"
ruRU = "Маленькие енотики, падающие сквозь пол, не наша ответственность, пожалуйста, отправляйте свои жалобы архитекторам."
jaJP = "「床を突き抜けて落ちる小さなキツネたちは私たちの責任ではありません。ご不満は建築家までお送りください。」"
frFR = "Les petits kits tombant à travers le sol ne sont pas de notre responsabilité, veuillez adresser vos réclamations aux architectes."
deDE = "Kleine Kits, die durch den Boden fallen, liegen nicht in unserer Verantwortung. Bitte senden Sie Ihre Beschwerden an die Architekten."
plPL = "Małe kitki wpadające przez podłogę nie są naszą odpowiedzialnością, prosimy o kierowanie skarg do architektów."
ptBR = "Pequenos kits caindo pelo chão não são nossa responsabilidade, por favor, envie suas reclamações para os arquitetos."
koKR = "바닥으로 떨어진 작은 키트에 대한 책임은 지지 않으니, 불만은 건축가에게 보내주시기 바랍니다."
csCZ = "Malí kits, kteří propadnou podlahou, nejsou naší odpovědností, prosím, směrujte své stížnosti na architekty."
viVN = "Các bộ kit nhỏ rơi xuống sàn không phải là trách nhiệm của chúng tôi, vui lòng gửi khiếu nại của bạn đến các kiến trúc sư."
trTR = "Zeminden düşen küçük kitler bizim sorumluluğumuzda değildir, lütfen şikayetlerinizi mimarlara iletin."

