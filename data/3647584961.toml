["Lapantouflemagic.Woodupgrade.FlavorDescription"]
raw = "\"And... what do you need the platform for, exactly?\"\n -A confused lumberjack beaver"
status = "normal"
enUS = "\"And... what do you need the platform for, exactly?\"  \n-A confused lumberjack beaver"
zhCN = "“那么...你到底需要这个平台做什么？”\n- 一只困惑的伐木海狸"
zhTW = "「那……你到底需要這平台來做什麼？」  \n- 一隻困惑的伐木海狸"
ruRU = "\"И... для чего тебе нужна эта платформа, собственно?\"  \n- Смущенный лесоруб-бобёр"
jaJP = "\"それで…プラットフォームは一体何に必要なのですか？\"\n - 混乱した材木挽きビーバー"
frFR = "\"Et... à quoi as-tu besoin de la plateforme, exactement ?\"  \n -Un castor bûcheron confus"
deDE = "„Und... wofür genau brauchst du die Plattform?“  \n- Ein verwirrter Holzfäller-Biber"
plPL = "„I… po co ci dokładnie ta platforma?”  \n-Zdezorientowany bobr drwal"
ptBR = "\"E... para que você precisa da plataforma, exatamente?\"  \n-Um castor madeireiro confuso"
koKR = "\"그리고... 플랫폼이 정확히 뭐가 필요해요?\"  \n- 혼란스러운 나무꾼 비버"
csCZ = "\"Já... a k čemu přesně potřebujete tu platformu?\"\n -Zaměstnaný bobr dřevař"
viVN = "\"Và... bạn cần nền tảng này để làm gì, chính xác?\"\n-Một con rái cá gỗ bối rối"
trTR = "\"Ve... platforma tam olarak ne için ihtiyacın var?\"  \n-Kafası karışık bir oduncu kunduz"

