["Lapantouflemagic.FarmUpgradeB.Description"]
raw = "An upgrade module to be placed on top of two adjacent <color=#FF6EC7>triangle roof upgradable</color> buildings.\nEmploys <color=green>6 Haulers</color>.\nContains a large storage space for crates.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "An upgrade module to be placed on top of two adjacent <color=#FF6EC7>triangle roof upgradable</color> buildings. Employs <color=green>6 Haulers</color>. Contains a large storage space for crates. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一个升级模块，可以放置在两个相邻的<color=#FF6EC7>可升级三角屋顶</color>建筑上。  \n雇佣<color=green>6个搬运工</color>。  \n包含一个大型存储空间用于箱子。  \n<color=#00FFFF>作为堤坝使用</color>。"
zhTW = "一個升級模組，可以放置在兩棟相鄰的<color=#FF6EC7>可升級三角屋頂</color>建築頂部。  \n需要<color=green>6名搬運工</color>。  \n擁有一個大型儲存空間用於箱子。  \n<color=#00FFFF>作為防洪堤運作</color>。"
ruRU = "Модуль улучшения, который устанавливается на две соседние <color=#FF6EC7>треугольные крыши, подлежащие улучшению</color>.\nИспользует <color=green>6 грузчиков</color>.\nСодержит большое хранилище для ящиков.\n<color=#00FFFF>Работает как набережная</color>"
jaJP = "隣接する2つの<color=#FF6EC7>三角屋根のアップグレード可能</color>な建物の上に設置するアップグレードモジュールです。  \n<color=green>6人の運搬者</color>を雇用します。  \n箱のための広い収納スペースがあります。  \n<color=#00FFFF>堤防</color>として機能します。"
frFR = "Un module d'amélioration à placer sur le dessus de deux bâtiments <color=#FF6EC7>à toiture triangulaire améliorables</color> adjacents.  \nEmploie <color=green>6 Transporteurs</color>.  \nContient un grand espace de stockage pour les caisses.  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Ein Upgrade-Modul, das auf zwei benachbarten <color=#FF6EC7>dreieckigen, aufrüstbaren</color> Gebäuden platziert werden kann. \nNutzt <color=green>6 transportierende Einheiten</color>. \nBeinhaltet einen großen Stauraum für Kisten. \n<color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Moduł ulepszenia do umieszczenia na dwóch przyległych <color=#FF6EC7>możliwościach rozbudowy dachu trójkątnego</color>.\nWymaga <color=green>6 Zbieraczy</color>.\nZawiera dużą przestrzeń magazynową na skrzynie.\n<color=#00FFFF>Działa jak Wał</color>"
ptBR = "Um módulo de upgrade a ser colocado no topo de dois edifícios <color=#FF6EC7>de telhado triangular upgradáveis</color> adjacentes.\nEmprega <color=green>6 Transportadores</color>.\nContém um grande espaço de armazenamento para caixas.\n<color=#00FFFF>Funciona como uma Muralha</color>"
koKR = "두 개의 인접한 <color=#FF6EC7>삼각형 지붕 업그레이드 가능</color> 건물 위에 배치할 업그레이드 모듈입니다.\n<color=green>6명의 수송인</color>을 고용합니다.\n상자 용으로 큰 저장 공간을 포함하고 있습니다.\n<color=#00FFFF>제방처럼 작동합니다</color>"
csCZ = "Modul vylepšení, který se umisťuje na vrchol dvou sousedních <color=#FF6EC7>budov s trojúhelníkovou střechou, které lze vylepšit</color>.\nZaměstnává <color=green>6 nosičů</color>.\nObsahuje prostorný sklad pro bedny.\n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một mô-đun nâng cấp được đặt trên đỉnh của hai tòa nhà <color=#FF6EC7>mái tam giác có thể nâng cấp</color> liền kề.\nSử dụng <color=green>6 Người vận chuyển</color>.\nCó một không gian lưu trữ lớn cho thùng.\n<color=#00FFFF>Hoạt động như một Đê</color>"
trTR = "Yan yana olan iki adet <color=#FF6EC7>üçgen çatı yükseltilebilir</color> binanın üzerine yerleştirilecek bir yükseltme modülü.\n<color=green>6 Taşıyıcı</color> kullanır.\nKutular için büyük bir depolama alanı içerir.\n<color=#00FFFF>Set olarak çalışır</color>"

