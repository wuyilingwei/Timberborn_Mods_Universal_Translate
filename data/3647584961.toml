["Need.WaterpumpDeath.DeathMessage"]
raw = "<color=green>swam too close to an oversized waterpump and disappeared without a trace. It probably has been summoned to be the hero of a fantastic other world.</color>"
status = "normal"
enUS = "<color=green>swam too close to an oversized water pump and disappeared without a trace. It probably has been summoned to be the hero of a fantastic other world.</color>"
zhCN = "<color=green>游得太靠近一个超大型水泵而消失得无影无踪。它可能被召唤去成为另一个奇妙世界的英雄。</color>"
zhTW = "<color=green>游泳太靠近一個超大型水泵而神秘消失。它可能被召喚成為奇幻異世界的英雄。</color>"
ruRU = "<color=green>поплыл слишком близко к oversized водяному насосу и исчез бесследно. Вероятно, его призвали стать героем фантастического иного мира.</color>"
jaJP = "<color=green>巨大な水ポンプに近づきすぎて消えてしまった。おそらく、素晴らしい別の世界で英雄として召喚されたのだろう。</color>"
frFR = "<color=green>s'est approché trop près d'une pompe à eau surdimensionnée et a disparu sans laisser de trace. Il a probablement été appelé pour être le héros d'un autre monde fantastique.</color>"
deDE = "<color=green>schwamm zu nah an einer überdimensionalen Wasserpumpe und verschwand spurlos. Wahrscheinlich wurde es gerufen, um der Held einer fantastischen anderen Welt zu sein.</color>"
plPL = "<color=green>zbyt blisko dużej pompy wodnej i zniknął bez śladu. Prawdopodobnie został wezwany, aby być bohaterem fantastycznego innego świata.</color>"
ptBR = "<color=green>nadou muito perto de uma bomba d'água oversized e desapareceu sem deixar rastro. Provavelmente foi convocado para ser o herói de um mundo fantástico.</color>"
koKR = "<color=green>너무 큰 물 펌프에 너무 가까이 수영하다가 흔적도 없이 사라졌다. 아마도 환상적인 다른 세계의 영웅이 되기 위해 소환된 것일 것이다.</color>"
csCZ = "<color=green>plaval příliš blízko k over-sized vodní pumpě a zmizel beze stopy. Pravděpodobně byl povolán, aby byl hrdinou fantastického jiného světa.</color>"
viVN = "<color=green>bơi quá gần một máy bơm nước quá khổ và biến mất không dấu vết. Có lẽ đã được triệu hồi để trở thành anh hùng của một thế giới khác tuyệt vời.</color>"
trTR = "<color=green>bir dev su pompasının yanına fazla yaklaşarak kayboldu. Muhtemelen fantastik bir başka dünyanın kahramanı olmak için çağrıldı.</color>"

