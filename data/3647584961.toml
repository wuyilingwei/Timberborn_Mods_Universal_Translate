["Lapantouflemagic.BIGAquiferPump.Description"]
raw = "A devilish engine of witchcraft, torturing the earth for ever more water, powered by the Pointer knows what."
status = "normal"
enUS = "A devilish engine of witchcraft, torturing the earth for ever more water, powered by the Pointer knows what."
zhCN = "一台邪恶的巫术机器，折磨大地以获取更多水源，动力来源于谁也不知道的指针。"
zhTW = "一臺魔鬼般的巫術引擎，折磨著大地以獲取更多的水，動力來自於誰也知道的指針。"
ruRU = "Дьявольский двигатель колдовства, мучающий землю в поисках все большего количества воды, питаемый тем, что знает Указатель."
jaJP = "「悪魔的な魔女のエンジン、土を苦しめてさらなる水を求め、何か知っているポイントによって動かされる。」"
frFR = "Une machine diabolique de sorcellerie, torturant la terre pour obtenir toujours plus d'eau, alimentée par le Point sait quoi."
deDE = "Ein teuflisches Maschinenwerk der Hexerei, das die Erde quält, um immer mehr Wasser zu gewinnen, betrieben von dem, was der Zeiger weiß."
plPL = "Diabelska maszyna czarów, torturująca ziemię w poszukiwaniu coraz większej ilości wody, napędzana przez to, co wie Wskaźnik."
ptBR = "Uma máquina diabólica de feitiçaria, torturando a terra por mais e mais água, alimentada por sabe-se lá o que."
koKR = "악마 같은 마법의 엔진, 더 많은 물을 얻기 위해 땅을 고문하며, 포인터가 아는 무엇으로 구동됩니다."
csCZ = "Zlověstný stroj čarodějnictví, mučící zemi pro stále více vody, poháněný ví bůh co."
viVN = "Một cỗ máy ma quái của phép thuật, tra tấn mặt đất để có được nhiều nước hơn nữa, được vận hành bởi cái mà Pointer biết rõ."
trTR = "Cadıların şeytani bir motoru, toprağı daha fazla su için işkence eden, Pointer’ın bildiği güçle çalışan."

["Lapantouflemagic.BIGAquiferPump.FlavorDescription"]
raw = "\"If we build it atop a volcano, would lava come out?\"\n -An architect beaver"
status = "normal"
enUS = "\"If we build it atop a volcano, would lava come out?\"  \n-An architect beaver"
zhCN = "“如果我们把它建在火山上，熔岩会流出来吗？”  \n- 一只建筑师海狸"
zhTW = "“如果我們把它建在火山上，會有熔岩流出來嗎？”  \n— 一隻建築師海狸"
ruRU = "\"Если мы построим это на вершине вулкана, появится ли лава?\"  \n- Архитектор-бобёр"
jaJP = "「火山の上に建てれば、溶岩が出てくるだろうか？」  \n- 建築家ビーバー"
frFR = "\"Si nous le construisons au sommet d'un volcan, de la lave en sortira-t-elle ?\"\n -Un castor architecte"
deDE = "\"Wenn wir es auf einem Vulkan bauen, würde Lava herauskommen?\"  \n- Ein Architektenbiber"
plPL = "„Jeśli zbudujemy to na wulkanie, czy wydobywałoby się z niego lawa?”  \n– Architekt bóbr"
ptBR = "\"Se nós construíssemos em cima de um vulcão, a lava sairia?\"  \n-Um castor arquiteto"
koKR = "\"우리가 화산 위에 지으면, 용암이 나올까?\"  \n- 건축가 비버"
csCZ = "\"Pokud to postavíme na vrcholu sopky, vyteče láva?\"  \n -Architektonický bobr"
viVN = "\"Nếu chúng ta xây nó trên một ngọn núi lửa, thì sẽ có magma phun ra chứ?\"  \n-Một chú beaver kiến trúc sư"
trTR = "\"Bir volkanın üzerine inşa edersek, lav mı çıkar?\"  \n– Bir mimar kunduz"

