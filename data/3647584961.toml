["Lapantouflemagic.Clinic.Description"]
raw = "A large house where a live-in nurse tends to wounded beavers.\nTreats benign conditions with twice the efficacy of a medical bed.\nCan also manufacture advanced medicine to treat severe conditions.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A large house where a live-in nurse tends to wounded beavers. Treats benign conditions with twice the efficacy of a medical bed. Can also manufacture advanced medicine to treat severe conditions. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一座大型房屋，住有一名护士为受伤的海狸提供护理。  \n以两倍于医疗床的效率治疗良性病症。  \n还可以制造先进的药物来治疗重症。  \n<color=#00FFFF>作为一个堤坝工作</color>"
zhTW = "一座大型房屋，內有常駐護理師照顧受傷的海狸。  \n以雙倍的療效治療良性病症。  \n還可以製造先進藥物以治療重症。  \n<color=#00FFFF>作為堤壩使用</color>"
ruRU = "Большой дом, где медсестра на полную ставку заботится о раненых бобрах. Лечит доброкачественные заболевания с удвоенной эффективностью по сравнению с медицинской койкой. Также может производить сложные лекарства для лечения тяжелых заболеваний. <color=#00FFFF>Работает как плотина</color>"
jaJP = "「住み込みの看護師が負傷したビーバーの手当てをする大きな家。\n医療用ベッドの2倍の効果で良性の病状を治療します。\n重い病状を治療するための高度な薬も製造できます。\n<color=#00FFFF>レベルとして機能します</color>」"
frFR = "Une grande maison où une infirmière résidente s'occupe des castors blessés. Traite des affections bénignes avec deux fois l'efficacité d'un lit médical. Peut également fabriquer des médicaments avancés pour traiter des affections graves. <color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Ein großes Haus, in dem eine Wohnkrankenschwester sich um verletzte Biber kümmert. Behandelt harmlose Krankheiten mit doppelter Wirksamkeit eines Krankenbettes. Kann auch moderne Medizin herstellen, um schwere Erkrankungen zu behandeln. <color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Wielki dom, w którym pielęgniarka na stałe opiekuje się rannymi bobrami.  \nLeczy łagodne schorzenia z dwukrotną skutecznością w porównaniu do łóżka szpitalnego.  \nMoże również wytwarzać zaawansowane leki do leczenia poważnych schorzeń.  \n<color=#00FFFF>Działa jak tama</color>"
ptBR = "Uma grande casa onde uma enfermeira residente cuida de castores feridos. Trata condições benignas com o dobro da eficácia de uma cama médica. Também pode fabricar medicina avançada para tratar condições graves. <color=#00FFFF>Funciona como um Dique</color>"
koKR = "상처 받은 비버를 돌보는 간호사가 살고 있는 대형 집입니다.  \n의료 침대의 두 배 효율로 양호한 상태를 치료합니다.  \n심각한 질환을 치료하기 위한 고급 의약품을 제조할 수도 있습니다.  \n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "„Velký dům, kde o zraněné bobry pečuje ošetřovatelka, která zde bydlí. \nLéčí benigní stavy s dvojnásobnou účinností oproti lékařské posteli. \nTaké může vyrábět pokročilé léky k léčbě vážných stavů. \n<color=#00FFFF>Funguje jako hrazení</color>“"
viVN = "Một ngôi nhà lớn nơi một y tá sống tại chỗ chăm sóc những con hải ly bị thương.  \nĐiều trị các tình trạng nhẹ với hiệu quả gấp đôi so với giường bệnh.  \nCũng có thể sản xuất thuốc tiên tiến để điều trị các tình trạng nghiêm trọng.  \n<color=#00FFFF>Hoạt động như một đê điều</color>"
trTR = "Büyük bir evde yaşayan bir hemşire yaralı kunduzlara bakar.\nİyi huylu durumları tıbbi yatağın iki katı etkilikle tedavi eder.\nAyrıca ciddi durumları tedavi etmek için ileri düzey ilaçlar üretebilir.\n<color=#00FFFF>Bir Set gibi çalışır</color>"

