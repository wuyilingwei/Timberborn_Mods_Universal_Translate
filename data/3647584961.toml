["Lapantouflemagic.FenceGate.Description"]
raw = "Allows classy beavers to go in and out of a fenced area."
status = "normal"
enUS = "Allows classy beavers to go in and out of a fenced area."
zhCN = "允许优雅的海狸进出围起来的区域。"
zhTW = "允許優雅的雨狸進出圍欄區域。"
ruRU = "Позволяет стильным бобрам заходить и выходить из огороженной зоны."
jaJP = "「上品なビーバーが囲まれたエリアに出入りできるようにします。」"
frFR = "Permet aux castors élégants d'entrer et de sortir d'une zone clôturée."
deDE = "Erlaubt eleganten Bibern, einen eingezäunten Bereich zu betreten und zu verlassen."
plPL = "Pozwala eleganckim bobrom wchodzić i wychodzić z ogrodzonego obszaru."
ptBR = "Permite que castores elegantes entrem e saiam de uma área cercada."
koKR = "세련된 비버가 울타리로 둘러싸인 지역에 출입할 수 있게 해줍니다."
csCZ = "Umožňuje elegantním bobrům vstupovat a vycházet z oplocené oblasti."
viVN = "Cho phép những con nhím thanh lịch ra vào khu vực được rào chắn."
trTR = "Şık kunduzların bir çitli alana girip çıkmasına izin verir."

["Lapantouflemagic.FenceGate.FlavorDescription"]
raw = "\"I can't explain why, but I feel like I should make it part of a bridge...\""
status = "normal"
enUS = "\"I can't explain why, but I feel like I should make it part of a bridge...\""
zhCN = "“我说不出为什么，但我感觉这应该成为桥的一部分...”"
zhTW = "“我無法解釋為什麼，但我覺得我應該把它做成橋的一部分…”"
ruRU = "\"Я не могу объяснить почему, но мне кажется, что я должен сделать это частью моста...\""
jaJP = "「理由はわからないけれど、これを橋の一部にしたい気がする…」"
frFR = "\"Je ne peux pas expliquer pourquoi, mais j'ai l'impression que je devrais en faire une partie d'un pont...\""
deDE = "„Ich kann nicht erklären, warum, aber ich habe das Gefühl, dass ich es Teil einer Brücke machen sollte...“"
plPL = "\"Nie potrafię wytłumaczyć dlaczego, ale czuję, że powinienem uczynić to częścią mostu...\""
ptBR = "\"Não consigo explicar por quê, mas sinto que devo fazer parte de uma ponte...\""
koKR = "\"어떤 이유인지 설명할 수는 없지만, 이걸 다리의 일부로 만들어야 할 것 같은 기분이 들어...\""
csCZ = "\"Nemohu vysvětlit proč, ale mám pocit, že bych to měl udělat součástí mostu...\""
viVN = "\"Tôi không thể giải thích tại sao, nhưng tôi cảm thấy như tôi nên biến nó thành một phần của cây cầu...\""
trTR = "\"Bunu neden yaptığımı açıklayamıyorum ama bir köprünün parçası olmalı gibi hissediyorum...\""

["Lapantouflemagic.largefarmhouse.Description"]
raw = "A large communal farmhouse for many beavers to work more efficiently.\n<color=#00FFFF>Lotuses require 2-deep water!</color>\n<color=red>The farm body can connect from the bottom to a ladder or pit-and-ladder lodge.\nCan only plant Pumpkins & Lotus!</color>"
status = "normal"
enUS = "A large communal farmhouse for many beavers to work more efficiently.  \n<color=#00FFFF>Lotuses require 2-deep water!</color>  \n<color=red>The farm body can connect from the bottom to a ladder or pit-and-ladder lodge.  \nCan only plant Pumpkins & Lotus!</color>"
zhCN = "一个大型的公共农舍，让许多海狸能够更高效地工作。  \n<color=#00FFFF>莲花需要 2 深的水！</color>  \n<color=red>农场主体可以从底部与梯子或坑梯小屋连接。  \n只能种植南瓜和莲花！</color>"
zhTW = "一個大型的共用農舍，供許多海狸更高效地工作。  \n<color=#00FFFF>蓮花需要 2 格深的水！</color>  \n<color=red>農場底部可以連接到梯子或坑梯小屋。  \n只能種植南瓜和蓮花！</color>"
ruRU = "Большой общественный дом для многих бобров, чтобы работать более эффективно.  \n<color=#00FFFF>Лотосам требуется вода глубиной 2 клетки!</color>  \n<color=red>Тело фермы может соединяться снизу с лестницей или домом с лестницей и ямой.  \nМожно сажать только тыквы и лотосы!</color>"
jaJP = "多くのビーバーがより効率的に働くための大きな共同農家です。  \n<color=#00FFFF>ハスに必要な水深は2です！</color>  \n<color=red>農場本体は、下からは梯子やピット＆ラダーのロッジに接続できます。  \nかぼちゃとハスのみを植えることができます！</color>"
frFR = "Une grande ferme commune pour que de nombreux castors travaillent plus efficacement.  \n<color=#00FFFF>Les lotus nécessitent de l'eau de 2 de profondeur !</color>  \n<color=red>Le corps de la ferme peut se connecter par le bas à une échelle ou à un abri avec échelle et fossé.  \nNe peut planter que des citrouilles et des lotus !</color>"
deDE = "Ein großes gemeinschaftliches Bauernhaus, damit viele Biber effizienter arbeiten können.  \n<color=#00FFFF>Lotusse benötigen 2 Tiefen Wasser!</color>  \n<color=red>Der Bauernhof kann von unten mit einer Leiter oder einem Loch-und-Leiter-Haus verbunden werden.  \nKann nur Kürbisse & Lotusse pflanzen!</color>"
plPL = "Duży wspólny dom dla wielu bobrów, aby pracować efektywniej.  \n<color=#00FFFF>Lotusy wymagają wody o głębokości 2!</color>  \n<color=red>Ciało farmy może łączyć się od dołu z drabiną lub chatą z drabiną i dołem.  \nMożna sadzić tylko dynie i lotosy!</color>"
ptBR = "Uma grande casa de campo comunitária para muitos castores trabalharem de forma mais eficiente.  \n<color=#00FFFF>Lotus requer água com 2 de profundidade!</color>  \n<color=red>O corpo da fazenda pode se conectar por baixo a uma escada ou cabana de escada e poço.  \nSó pode plantar Abóboras e Lotus!</color>"
koKR = "많은 비버들이 더 효율적으로 작업할 수 있는 대형 공동 농장입니다.\n<color=#00FFFF>연꽃은 2 깊이의 물이 필요합니다!</color>\n<color=red>농장 본체는 아래에서 사다리 또는 구덩이-사다리 로그에 연결할 수 있습니다.\n호박과 연꽃만 심을 수 있습니다!</color>"
csCZ = "Velká komunitní chalupa pro mnoho bobrů, aby mohli pracovat efektivněji.\n<color=#00FFFF>Lotusy vyžadují vodu 2 hloubky!</color>\n<color=red>Tělo farmy se může připojit zespodu k žebříku nebo k doupěti s žebříkem a jámou.\nMohou se vysazovat pouze dýně a lotusy!</color>"
viVN = "Một ngôi nhà nông dân cộng đồng lớn dành cho nhiều con hải ly làm việc hiệu quả hơn.\n<color=#00FFFF>Cây sen cần nước sâu 2m!</color>\n<color=red>Thân trang trại có thể kết nối từ dưới lên với một cái thang hoặc nhà hố và thang.\nChỉ có thể trồng Bí ngô & Cây sen!</color>"
trTR = "Büyük bir grup bektaşı için daha verimli çalışabilecekleri büyük bir ortak çiftlik evi.\n<color=#00FFFF>Lotusların 2 derin suya ihtiyacı var!</color>\n<color=red>Çiftlik gövdesi, bir merdiven veya çukur ve merdiven kulübesine alt kısımdan bağlanabilir.\nSadece Kabak ve Lotus ekilebilir!</color>"

