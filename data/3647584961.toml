["Lapantouflemagic.Calculatorium.Description"]
raw = "An administrative building where beavers centralize information and issue appropriate orders, thus avoiding the need for direct action."
status = "normal"
enUS = "An administrative building where beavers centralize information and issue appropriate orders, thus avoiding the need for direct action."
zhCN = "“一个行政建筑，海狸在这里集中信息并发出适当的命令，从而避免直接采取行动的必要。”"
zhTW = "「一座行政建築，海狸在這裡集中資訊並發布適當的命令，從而避免了需要直接行動。」"
ruRU = "Административное здание, в котором бобры централизуют информацию и выдают соответствующие приказы, тем самым избегая необходимости в прямом действии."
jaJP = "ビーバーが情報を中央集権化し、適切な指示を出す行政ビルであり、これにより直接的な行動を避けることができます。"
frFR = "Un bâtiment administratif où les castors centralisent les informations et émettent des ordres appropriés, évitant ainsi la nécessité d'une action directe."
deDE = "Ein Verwaltungsgebäude, in dem Biber Informationen zentralisieren und entsprechende Befehle erteilen, um so die Notwendigkeit direkter Maßnahmen zu vermeiden."
plPL = "Budynek administracyjny, w którym bobry centralizują informacje i wydają odpowiednie rozkazy, unikając w ten sposób potrzeby podejmowania działań bezpośrednich."
ptBR = "Um edifício administrativo onde os castores centralizam informações e emitem ordens apropriadas, evitando assim a necessidade de ação direta."
koKR = "비버들이 정보를 중앙집중화하고 적절한 명령을 발행하는 행정 건물로, 직접적인 행동을 필요로 하지 않게 합니다."
csCZ = "Administrativní budova, kde bobři centralizují informace a vydávají příslušné příkazy, čímž se vyhýbají nutnosti přímého zásahu."
viVN = "Một tòa nhà hành chính nơi những con hải ly tập trung thông tin và phát hành các mệnh lệnh thích hợp, do đó tránh được việc cần hành động trực tiếp."
trTR = "Bir yönetim binasıdır, burada kunduzlar bilgileri merkezileştirir ve uygun emirler verir, böylece doğrudan eylem gereksinimini ortadan kaldırır."

["Lapantouflemagic.Calculatorium.FlavorDescription"]
raw = "\"Open the valves ! Stop the water pumpsxa0! RELEASE THE KRAKENxa0!\""
status = "normal"
enUS = "\"Open the valves! Stop the water pumps! RELEASE THE KRAKEN!\""
zhCN = "“打开阀门！停止水泵！释放克拉肯！”"
zhTW = "\"打開閥門！停止水泵！釋放克拉肯！\""
ruRU = "Откройте клапаны! Остановите насосы! ОСВОБОДИТЕ КРАКЕН!"
jaJP = "「バルブを開けろ！水ポンプを止めろ！クラーケンを解き放て！」"
frFR = "\"Ouvrez les vannes ! Arrêtez les pompes à eau ! LIBÉREZ LE KRACKEN !\""
deDE = "Öffnet die Ventile! Stoppt die Wasserpumpen! LASST DEN KRAKEN FREI!"
plPL = "Otwórz zawory! Zatrzymaj pompy wodne! WYPUŚĆ KRAKENA!"
ptBR = "\"Abra as válvulas! Pare as bombas de água! LIBERE O KRAKEN!\""
koKR = "\"밸브를 열어라! 물 펌프를 멈춰라! 크라켄을 풀어라!\""
csCZ = "Otevřete ventily! Zastavte vodní pumpy! Uvolněte KRAKENA!"
viVN = "\"Mở các van! Dừng bơm nước! GIẢI PHÓNG KRAKEN!\""
trTR = "\"Vanaları açın! Su pompalarını durdurun! KRAKEN'İ SERBEST BIRAKIN!\""

