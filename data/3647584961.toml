["Lapantouflemagic.MinorBurns.DeathMessage"]
raw = "<color=green>caught on fire and died due to extreme carelessness. Turns out furry creatures are quite flammable.</color>"
status = "normal"
enUS = "<color=green>caught on fire and died due to extreme carelessness. Turns out furry creatures are quite flammable.</color>"
zhCN = "<color=green>因极度不小心而着火并死去。原来毛茸茸的生物相当容易着火。</color>"
zhTW = "<color=green>因極度粗心被燒著而死。原來毛茸茸的生物相當易燃。</color>"
ruRU = "<color=green>сгорел и умер из-за крайней неосторожности. Оказалось, что пушистые существа довольно воспламеняемы.</color>"
jaJP = "<color=green>極端な不注意で火がついて亡くなった。どうやら毛皮の生き物はかなり燃えやすいらしい。</color>"
frFR = "<color=green>a été pris dans un incendie et est mort à cause d'une imprudence extrême. Il s'avère que les créatures poilues sont assez inflammables.</color>"
deDE = "<color=green>ist in Brand geraten und aufgrund extremer Nachlässigkeit gestorben. Es stellt sich heraus, dass pelzige Kreaturen ziemlich entflammbar sind.</color>"
plPL = "<color=green>zapalił się i zginął z powodu skrajnej niedbałości. Okazuje się, że futrzaste stwory są dość łatwopalne.</color>"
ptBR = "<color=green>pegou fogo e morreu devido à extrema negligência. Acontece que criaturas peludas são bastante inflamáveis.</color>"
koKR = "<color=green>극도의 부주의로 인해 불에 타 죽었다. 털이 많은 생물들은 꽤나 잘 타는 것 같다.</color>"
csCZ = "<color=green>byl zapálen a zemřel kvůli extrémní nepozornosti. Ukazuje se, že chlupaté bytosti jsou docela hořlavé.</color>"
viVN = "<color=green>bị cháy và chết do thiếu cẩn thận cực độ. Hóa ra những sinh vật có lông khá dễ cháy.</color>"
trTR = "<color=green>ateşe düştü ve aşırı dikkatsizlik yüzünden öldü. Meğ furry canlılar oldukça tutuşturucuymuş.</color>"

