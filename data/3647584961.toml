zhCN = "致探险队长，\n\n您的报告已收到。\n\n看来您的定居点依然生机勃勃，人口在不断增长。\n\n更重要的是，您设法与管理层保持联系，而没有任何威胁、破坏或刺杀企图，至少就我们所知是这样的。\n\n因此，我们得出结论，进一步的援助不再必要。\n\n您和您的定居点仍然是骄傲的白爪国家的一部分。请不要让我们的监管减少影响您的判断。\n\n扩展。建设。研究。实验。\n尽量不要破坏任何不可替代的东西。\n\n祝您好运。\n\n您依然不被欢迎返回。成功并不意味着人们已经忘记。\n\n<color=#A9A9A9>文本条目部分由ChatGTP生成</color>"
