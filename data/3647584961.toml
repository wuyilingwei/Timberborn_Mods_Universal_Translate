["Building.MissileSilo.Whitepaws.Description"]
raw = "<color=#FF6EC7>We have made a new breakthrough in our understanding of hooman technologies! This one promises exciting opportunities for the future. \nIf we can get it to work, this surely will the greatest achievement of beaverkind.</color>\n<color=#00FFFF>Requires to be placed in an at least 6-deep clean water pond</color>\n<color=red>Entrance must be accessible for construction to proceed.</color>"
status = "normal"
enUS = "<color=#FF6EC7>We have made a new breakthrough in our understanding of human technologies! This one promises exciting opportunities for the future. If we can get it to work, this will surely be the greatest achievement of beaverkind.</color> <color=#00FFFF>Requires placement in a clean water pond that is at least 6 units deep</color> <color=red>Entrance must be accessible for construction to proceed.</color>"
zhCN = "<color=#FF6EC7>我们在对人类技术的理解上取得了新的突破！这个项目为未来带来了令人兴奋的机会。 如果我们能使其运作，这必将是北貂种最伟大的成就。</color>\n<color=#00FFFF>需要放置在至少 6 深的清水池塘中</color>\n<color=red>入口必须可供施工，以便继续进行。</color>"
zhTW = "<color=#FF6EC7>我們在理解人類科技方面取得了新的突破！這將為未來帶來令人興奮的機會。如果我們能讓它運作，這肯定將是海狸族最偉大的成就。</color>\n<color=#00FFFF>必須放置在至少 6 深的清水池中</color>\n<color=red>入口必須可供建設進行。</color>"
ruRU = "<color=#FF6EC7>Мы сделали новый прорыв в нашем понимании технологий хуманитов! Эта разработка обещает захватывающие возможности для будущего. Если мы сможем заставить её работать, это, безусловно, станет величайшим достижением бобров.</color>\n<color=#00FFFF>Должно быть установлено в пруду с чистой водой глубиной не менее 6 клеток</color>\n<color=red>Вход должен быть доступен для продолжения строительства.</color>"
jaJP = "<color=#FF6EC7>私たちは人間技術の理解において新たな突破口を開きました！これは未来に向けたワクワクする機会を約束します。 \nもし機能することができれば、これはビーバー族にとって最大の成果となるでしょう。</color>\n<color=#00FFFF>最低6深の清水池に設置する必要があります</color>\n<color=red>建設を進めるためには入り口がアクセス可能でなければなりません。</color>"
frFR = "<color=#FF6EC7>Nous avons fait une nouvelle percée dans notre compréhension des technologies humaines ! Celle-ci promet des opportunités passionnantes pour l'avenir. Si nous pouvons la faire fonctionner, ce sera sans doute la plus grande réalisation de l'espèce castor.</color>\n<color=#00FFFF>Doit être placé dans un étang d'eau propre d'au moins 6 profondeurs</color>\n<color=red>L'entrée doit être accessible pour que la construction puisse avancer.</color>"
deDE = "<color=#FF6EC7>Wir haben einen neuen Durchbruch in unserem Verständnis der Hooman-Technologien erzielt! Dieses hier verspricht aufregende Möglichkeiten für die Zukunft. Wenn wir es zum Laufen bringen können, wird dies sicherlich die größte Errungenschaft der Biber sein.</color>\n<color=#00FFFF>Erfordert, in einem mindestens 6 tiefen sauberen Wasserteich platziert zu werden</color>\n<color=red>Der Eingang muss für den Bau zugänglich sein, damit es weitergehen kann.</color>"
plPL = "<color=#FF6EC7>Dokonaliśmy nowego przełomu w naszym zrozumieniu technologii ludzkich! Ta obietnica niesie ze sobą ekscytujące możliwości na przyszłość. \nJeśli uda nam się to uruchomić, z pewnością będzie to największe osiągnięcie bobrzej cywilizacji.</color>\n<color=#00FFFF>Wymaga umiejscowienia w stawie czystej wody o głębokości co najmniej 6 jednostek</color>\n<color=red>Wejście musi być dostępne, aby budowa mogła postępować.</color>"
ptBR = "<color=#FF6EC7>Fizemos um novo avanço em nossa compreensão das tecnologias humanas! Este promete oportunidades emocionantes para o futuro. Se conseguirmos fazê-lo funcionar, com certeza será a maior conquista dos castores.</color>\n<color=#00FFFF>Requer ser colocado em um lago de água limpa com pelo menos 6 de profundidade</color>\n<color=red>A entrada deve ser acessível para que a construção prossiga.</color>"
koKR = "<color=#FF6EC7>우리는 인간 기술에 대한 이해에서 새로운 돌파구를 마련했습니다! 이것은 미래에 대한 기대되는 기회를 약속합니다. \n이것이 작동한다면, 이는 분명 비버 종족의 가장 위대한 업적이 될 것입니다.</color>\n<color=#00FFFF>최소 6칸 깊이의 맑은 물 연못에 배치해야 합니다.</color>\n<color=red>구성이 진행되려면 입구에 접근할 수 있어야 합니다.</color>"
csCZ = "<color=#FF6EC7>Učinili jsme nový průlom v našem porozumění lidským technologiím! Tento slibuje vzrušující příležitosti pro budoucnost. Pokud se nám podaří to uvedení do chodu, určitě to bude největší dosažení bobřím národem.</color>\n<color=#00FFFF>Vyžaduje umístění do minimálně 6 hloubky čistého vodního rybníka</color>\n<color=red>Vchod musí být přístupný, aby mohl pokračovat proces výstavby.</color>"
viVN = "<color=#FF6EC7>Chúng tôi đã có một bước đột phá mới trong hiểu biết về công nghệ của loài người! Điều này hứa hẹn những cơ hội thú vị cho tương lai. \nNếu chúng tôi có thể làm cho nó hoạt động, đây chắc chắn sẽ là thành tựu vĩ đại nhất của loài béo.</color>\n<color=#00FFFF>Cần được đặt trong một cái ao nước sạch sâu ít nhất 6 m.</color>\n<color=red>Cửa vào phải dễ tiếp cận để tiến hành xây dựng.</color>"
trTR = "<color=#FF6EC7>İnsan teknolojilerini anlama konusunda yeni bir atılım yaptık! Bu, gelecekte heyecan verici fırsatlar vadediyor. Eğer bunu çalıştırabilirsek, bu kesinlikle kunduzların en büyük başarısı olacak.</color>\n<color=#00FFFF>En az 6 derinliğinde temiz bir su havuzuna yerleştirilmesi gerekmektedir.</color>\n<color=red>İnşaatın ilerlemesi için girişin erişilebilir olması gerekir.</color>"

["Building.MissileSilo.Whitepaws.FlavorDescription"]
raw = "\"We should definitely build this in the center of our town so that everyone can see it!\"\n -Toothless the Wise, elder beaver"
status = "normal"
enUS = "\"We should definitely build this in the center of our town so that everyone can see it!\"  \n-Toothless the Wise, elder beaver"
zhCN = "“我们绝对应该把这个建在我们城镇的中心，这样大家都能看到它！”  \n- 智者无牙，长老海狸"
zhTW = "「我們一定要在城鎮中心建造這個，讓每個人都能看到它！」  \n- 明智的無牙，老海狸"
ruRU = "\"Мы определенно должны построить это в центре нашего города, чтобы все могли его увидеть!\"  \n- Беззубик Мудрый, старейшина бобров"
jaJP = "「これを私たちの町の中心に建てるべきだ。みんなに見えるように！」 - 賢者トゥースレス、年長ビーバー"
frFR = "\"Nous devrions absolument construire cela au centre de notre ville afin que tout le monde puisse le voir !\"  \n- Toothless le Sage, castor ancien"
deDE = "\"Wir sollten das auf jeden Fall im Zentrum unserer Stadt bauen, damit es jeder sehen kann!\"  \n- Zahnlos der Weise, elder Biber"
plPL = "\"Zdecydowanie powinniśmy zbudować to w centrum naszego miasteczka, aby wszyscy mogli to zobaczyć!\"  \n- Bezzębny Mądry, starszy bóbr"
ptBR = "\"Devemos definitivamente construir isso no centro da nossa cidade para que todos possam ver!\"\n -Dente Sem Fio, o sábio castor"
koKR = "\"우리 마을 한가운데에 이것을 반드시 세워야 합니다. 모든 사람들이 볼 수 있도록요!\"  \n- 현명한 무이, 족장 비버"
csCZ = "\"Určitě bychom to měli postavit ve středu našeho města, aby to každý viděl!\"  \n- Bezzubý moudrý, stařešina bobrů"
viVN = "\"Chúng ta chắc chắn nên xây dựng điều này ở trung tâm thị trấn của chúng ta để mọi người đều có thể nhìn thấy nó!\"  \n- Răng không - Một con nhím giàu kinh nghiệm"
trTR = "\"Bunu kesinlikle şehrimizin ortasında inşa etmeliyiz, böylece herkes görebilsin!\"  \n- Bilge Dişsiz, yaşlı kunduz"

["Need.Rocketdeath.DeathMessage"]
raw = "<color=green>was caught in the rocket exhaust and shockwave leading to an horrible death. That is all your fault.</color>"
status = "normal"
enUS = "<color=green>was caught in the rocket exhaust and shockwave leading to a horrible death. That is all your fault.</color>"
zhCN = "<color=green>被火箭排气和冲击波所吞噬，导致了可怕的死亡。这一切都是你的错。</color>"
zhTW = "<color=green>被火箭排氣和震波所困，死得非常淒慘。這完全是你的錯。</color>"
ruRU = "<color=green>был пойман в струе от ракетного выхлопа и ударной волне, что привело к ужасной смерти. Это всё твоя вина.</color>"
jaJP = "<color=green>ロケットの排気と衝撃波に巻き込まれ、悲惨な死を遂げた。それはすべてあなたのせいだ。</color>"
frFR = "<color=green>a été pris dans les gaz d'échappement de la fusée et l'onde de choc, ce qui a conduit à une mort horrible. C'est entièrement de ta faute.</color>"
deDE = "<color=green>wurde im Raketenausstoß und der Druckwelle gefangen, was zu einem schrecklichen Tod führte. Das ist alles deine Schuld.</color>"
plPL = "<color=green>został uwięziony w odrzucie rakietowym i fali uderzeniowej, co doprowadziło do okropnej śmierci. To wszystko twoja wina.</color>"
ptBR = "<color=green>foi pego na fumaça do foguete e na onda de choque, resultando em uma morte horrível. Isso é toda a sua culpa.</color>"
koKR = "<color=green>로켓 배기 가스와 충격파에 휘말려 끔찍한 죽음을 맞이했습니다. 그건 전부 당신의 잘못입니다.</color>"
csCZ = "<color=green>byl chycen v raketovém výfuku a šokové vlně, což vedlo k hrozné smrti. To je vše tvoje chyba.</color>"
viVN = "<color=green>đã bị mắc kẹt trong khí thải tên lửa và sóng xung kích dẫn đến cái chết đau thương. Đó là lỗi của bạn.</color>"
trTR = "<color=green>roket gazı ve şok dalgasında yakalandı ve korkunç bir ölüme yol açtı. Bu tamamen senin suçun.</color>"

