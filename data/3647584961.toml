["Lapantouflemagic.Topentrancewatertightlodge_Builders.Description"]
raw = "A medium-sized watertight lodge built around a ladder, with a side access door.\nCan be stacked on itself, variants, and can carry select buildings.\nEmploys <color=green>three builders</color>.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A medium-sized watertight lodge built around a ladder, with a side access door. Can be stacked on itself, variants, and can carry select buildings. Employs <color=green>three builders</color>. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一个中等大小的防水小屋，围绕一根梯子建造，拥有一个侧门可供进入。  \n可以自我叠加，存在变体，并可承载特定建筑。  \n雇佣<color=green>三名建造者</color>。  \n<color=#00FFFF>作为堤坝使用</color>"
zhTW = "一個中型的防水小屋，圍繞著一個梯子建造，側邊有進出口門。\n可以疊加、變體，並能承載特定建築物。\n雇用<color=green>三名建造者</color>。\n<color=#00FFFF>作為堤壩使用</color>"
ruRU = "Средний водонепроницаемый домик, построенный вокруг лестницы, со сторонней дверью доступа. Может быть установлен один на другой, варианты, и может переносить определённые здания. Занимает <color=green>трёх строителей</color>. <color=#00FFFF>Работает как набережная</color>"
jaJP = "「梯子の周りに建てられた中型の防水ロッジで、横にアクセルドアがあります。自分自身の上に重ねられ、バリアントもあり、特定の建物を運ぶことができます。<color=green>3人のビルダー</color>を雇います。<color=#00FFFF>堤防としても機能します</color>。」"
frFR = "Un pavillon étanche de taille moyenne construit autour d'une échelle, avec une porte d'accès latérale.  \nPeut être empilé sur lui-même, variantes, et peut transporter certains bâtiments.  \nEmploie <color=green>trois bâtisseurs</color>.  \n<color=#00FFFF>Fonctionne comme une levée</color>"
deDE = "Eine mittelgroße wasserdichte Lodge, die um eine Leiter herum gebaut ist, mit einer seitlichen Zugangstür. Kann auf sich selbst gestapelt werden, Varianten und kann ausgewählte Gebäude tragen. Beschäftigt <color=green>drei Bauarbeiter</color>. <color=#00FFFF>Funktioniert als Damm</color>"
plPL = "Średniej wielkości wodoodporna chata zbudowana wokół drabiny, z bocznym dostępem.  \nMoże być układana w stos, występuje w wariantach i może przenosić wybrane budynki.  \nZatrudnia <color=green>trzech budowniczych</color>.  \n<color=#00FFFF>Działa jak wał</color>"
ptBR = "Uma cabana impermeável de tamanho médio construída em torno de uma escada, com uma porta de acesso lateral. \nPode ser empilhada sobre si mesma, variantes, e pode suportar edifícios selecionados. \nEmprega <color=green>três construtores</color>. \n<color=#00FFFF>Funciona como uma Barragem</color>"
koKR = "사다리를 중심으로 지어진 중간 크기의 방수 오두막으로, 측면 접근 문이 있습니다.\n자체적으로 쌓을 수 있으며, 변형이 가능하고 특정 건물을 운반할 수 있습니다.\n<color=green>세 명의 건설자를 고용합니다</color>.\n<color=#00FFFF>제방처럼 작용합니다</color>"
csCZ = "Středně velká vodotěsná chata postavená kolem žebříku, s bočním přístupovými dveřmi. Může být stohována na sebe, varianty a může nést vybrané budovy. Zaměstnává <color=green>trojici stavitelů</color>. <color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một nhà nghỉ chống thấm vừa được xây dựng quanh một cái thang, với một cửa ra vào bên hông. Có thể xếp chồng lên nhau, các biến thể, và có khả năng mang theo một số công trình nhất định. Tuyển dụng <color=green>ba công nhân xây dựng</color>. <color=#00FFFF>Có tác dụng như một con đê</color>"
trTR = "Merdivenin etrafında inşa edilmiş, yan erişim kapısına sahip, orta boy bir su geçirmez kulübe.\nKendisi, varyantları üzerine istiflenebilir ve belirli yapıları taşıyabilir.\n<color=green>Üç inşaatçı</color> istihdam eder.\n<color=#00FFFF>Sedd olarak çalışır</color>"

["Lapantouflemagic.Topentrancewatertightlodge_Builders.FlavorDescription"]
raw = "\"Building up like that sure is convenient, but aren't we doing the same things as the hoomans?\"\n -A concerned carpenter beaver"
status = "normal"
enUS = "\"Building up like that sure is convenient, but aren't we doing the same things as the humans?\"  \n-A concerned carpenter beaver"
zhCN = "“像这样建造确实很方便，但我们难道不是在做和人类一样的事情吗？”  \n- 一位担心的海狸木匠"
zhTW = "\"這樣蓋房子確實方便，但我們不是在做跟人類一樣的事情嗎？\"  \n- 一位擔心的木匠海狸"
ruRU = "\"Строить так действительно удобно, но разве мы не делаем то же самое, что и люди?\"  \n- Бобёр-плотник с беспокойством"
jaJP = "「こんなふうに建てるのは確かに便利だけど、私たちはホーマンたちと同じことをしていないか？」  \n- 心配している大工のビーバー"
frFR = "\"Construire de cette manière est certainement pratique, mais ne faisons-nous pas les mêmes choses que les humains ?\"\n -Un castor charpentier inquiet"
deDE = "„So eine Bauweise ist wirklich praktisch, aber machen wir nicht die gleichen Dinge wie die Menschen?“  \n -Ein besorgter Zimmermanns-Biber"
plPL = "\"Budowanie w ten sposób jest z pewnością wygodne, ale czy nie robimy tych samych rzeczy co hoomany?\"  \n -Zmartwiony bobr stolarz"
ptBR = "\"Construir assim é realmente conveniente, mas não estamos fazendo as mesmas coisas que os humanos?\"  \n- Um castor carpinteiro preocupado"
koKR = "\"그렇게 쌓아올리는 것도 확실히 편리하지만, 우리가 인간들과 같은 일을 하고 있는 건 아닐까요?\"  \n- 걱정하는 목수 비버"
csCZ = "\"Stavět takhle je jistě pohodlné, ale neděláme snad to samé jako lidé?\"  \n - Znepokojený bobr tesař"
viVN = "\"Xây dựng như vậy thì thật tiện lợi, nhưng chúng ta có phải đang làm những điều giống như những người hooman không?\" - Một con hải ly thợ mộc lo lắng"
trTR = "\"Bu şekilde inşa etmek gerçekten de kullanışlı, ama biz aynı şeyleri mi yapıyoruz insanlarla?\"\n -Endişeli bir marangoz kunduz\""

["Lapantouflemagic.Topentrancewatertightlodge_BuildersDoorless.Description"]
raw = "A medium-sized watertight lodge built around a ladder, but without side door for aesthetic reasons.\nCan be stacked on itself, variants, and can carry select buildings.\nEmploys <color=green>three builders</color>.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A medium-sized watertight lodge built around a ladder, but without a side door for aesthetic reasons. Can be stacked on itself, variants, and can carry select buildings. Employs <color=green>three builders</color>. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一个中等大小的防水旅馆，围绕一架梯子建造，但出于美观原因没有侧门。\n可以自我叠加、变体，并可以承载特定建筑。\n雇佣<color=green>三名建造者</color>。\n<color=#00FFFF>作为堤坝使用</color>"
zhTW = "一座中型的防水小屋，圍繞著一個梯子建造，但因美觀原因沒有側門。\n可以自我堆疊、變體，並能夠承載特定建築。\n雇用<color=green>三名建築工</color>。\n<color=#00FFFF>作為堤壩運作</color>"
ruRU = "Средняя по размеру водонепроницаемая хижина, построенная вокруг лестницы, но без боковой двери в эстетических целях.\nМожет складываться сама на себя, варианты и может нести некоторые здания.\nИспользует <color=green>трех строителей</color>.\n<color=#00FFFF>Работает как дамба</color>"
jaJP = "「はしごの周りに建てられた中型の防水ロッジで、見た目の理由から横のドアはありません。\n自己重ね可能で、バリエーションがあり、特定の建物を運ぶことができます。\n<color=green>三人の建設者</color>を雇います。\n<color=#00FFFF>堤防として機能します</color>」"
frFR = "Une cabane étanche de taille moyenne construite autour d'une échelle, mais sans porte latérale pour des raisons esthétiques. Peut être empilée sur elle-même, variantes, et peut porter certains bâtiments. Emploie <color=green>trois bâtisseurs</color>. <color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Eine mittelgroße wasserdichte Lodge, die um eine Leiter gebaut ist, jedoch aus ästhetischen Gründen ohne Seitentür.\nKann auf sich selbst gestapelt werden, Varianten, und kann ausgewählte Gebäude tragen.\nSetzt <color=green>drei Builder</color> ein.\n<color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Średniej wielkości wodoodporna chata zbudowana wokół drabiny, ale bez bocznych drzwi z powodów estetycznych. \nMoże być montowana na sobie, warianty, i może przenosić wybrane budynki. \nZatrudnia <color=green>trzech budowniczych</color>. \n<color=#00FFFF>Działa jak wał</color>"
ptBR = "Uma cabana à prova d'água de tamanho médio construída em torno de uma escada, mas sem porta lateral por razões estéticas. Pode ser empilhada sobre si mesma, variantes e pode carregar edifícios selecionados. Emprega <color=green>três construtores</color>. <color=#00FFFF>Funciona como um dique</color>"
koKR = "사다리를 중심으로 지어진 중간 크기의 방수 오두막으로, 미적인 이유로 측면 출입문이 없습니다.\n자체적으로 쌓을 수 있으며, 다양성이 있고 특정 건물을 운반할 수 있습니다.\n<color=green>세 명의 건축가</color>가 필요합니다.\n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Středně velká vodotěsná chata postavená kolem žebříku, ale bez bočních dveří z estetických důvodů. \nMůže být na sebe skládána, má varianty a může nést vybrané budovy. \nZaměstnává <color=green>tři stavitele</color>. \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một khoang nghỉ vừa được xây dựng xung quanh một cái thang, nhưng không có cửa bên hông vì lý do thẩm mỹ. \nCó thể xếp chồng lên nhau, có các biến thể, và có thể chứa những công trình chọn lọc. \nSử dụng <color=green>ba người xây dựng</color>. \n<color=#00FFFF>Hoạt động như một đoạn bờ</color>"
trTR = "Merdivenin etrafında inşa edilmiş, ancak estetik sebeplerden ötürü yan kapısı olmayan, orta boyda su geçirmez bir lodge. Kendisiyle üst üste istiflenebilir, varyantları vardır ve belirli yapıları taşıyabilir. <color=green>Üç inşaatçı</color> çalıştırır. <color=#00FFFF>Kanal olarak çalışır</color>"

