["Lapantouflemagic.NewFloodgateDam.Description"]
raw = "A complex but extremely convenient dam piece which wall can be raised or lowered to control water flow."
status = "normal"
enUS = "A complex but extremely convenient dam piece whose wall can be raised or lowered to control water flow."
zhCN = "一个复杂但极其方便的水坝部件，其墙壁可以升高或降低以控制水流。"
zhTW = "一個複雜但極其方便的水壩建築，其牆面可以升降來控制水流。"
ruRU = "Сложный, но чрезвычайно удобный элемент плотины, стенка которого может подниматься или опускаться для контроля потока воды."
jaJP = "「水の流れを制御するために壁を上下させることができる、複雑でありながら非常に便利なダムのパーツです。」"
frFR = "Un morceau de barrage complexe mais extrêmement pratique dont le mur peut être relevé ou abaissé pour contrôler le flux d'eau."
deDE = "Ein komplexes, aber äußerst praktisches Dammstück, dessen Wand angehoben oder abgesenkt werden kann, um den Wasserfluss zu steuern."
plPL = "Złożony, ale niezwykle wygodny element tamy, którego ściana może być podnoszona lub opuszczana w celu kontrolowania przepływu wody."
ptBR = "Uma peça de represa complexa, mas extremamente conveniente, cuja parede pode ser elevada ou abaixada para controlar o fluxo de água."
koKR = "고급스럽지만 매우 편리한 댐 조각으로, 벽을 올리거나 내려서 물의 흐름을 조절할 수 있습니다."
csCZ = "Složitý, ale mimořádně praktický díl hráze, jehož stěnu lze zvedat nebo lowering k ovládání toku vody."
viVN = "Một mảnh đập phức tạp nhưng vô cùng tiện lợi, với tường có thể được nâng lên hoặc hạ xuống để kiểm soát dòng chảy nước."
trTR = "Su akışını kontrol etmek için duvarı yükseltilip alçaltılabilen karmaşık ama son derece kullanışlı bir baraj parçası."

