["Lapantouflemagic.AbyssExcavator.Description"]
raw = "A miniaturized mechanical drill designed to dig out junk and collapsed tunnels from the depths of the abyss, and occasionnaly valuable ores. Requires prior work by explorers."
status = "normal"
enUS = "A miniaturized mechanical drill designed to excavate junk and collapsed tunnels from the depths of the abyss, and occasionally valuable ores. Requires prior work by explorers."
zhCN = "“一个微型机械钻机，用于从深渊的深处挖掘垃圾和塌陷的隧道，以及偶尔发现有价值的矿石。需要探险者的先前工作。”"
zhTW = "一款迷你化的機械鑽頭，旨在從深淵中挖掘垃圾和崩塌的隧道，偶爾也能挖掘到珍貴礦石。需要探險者的前期工作。"
ruRU = "Миниатюрная механическая дрель, предназначенная для выемки мусора и обрушенных туннелей из глубин бездны, а также периодически ценных руд. Требует предварительной работы исследователей."
jaJP = "「深淵の奥深くから廃棄物や崩れたトンネルを掘り出すために設計された小型の機械ドリルで、時折貴重な鉱石も採掘します。探検者による事前の作業が必要です。」"
frFR = "Un foreur mécanique miniaturisé conçu pour déterrer des déchets et des tunnels effondrés des profondeurs de l'abîme, et occasionnellement des minerais précieux. Nécessite un travail préalable des explorateurs."
deDE = "Ein miniaturisierter mechanischer Bohrer, der entwickelt wurde, um Müll und eingestürzte Tunnel aus den Tiefen des Abgrunds auszugraben und gelegentlich wertvolle Erze. Erfordert vorherige Arbeiten von Entdeckern."
plPL = "Miniaturowy mechaniczny wiertło zaprojektowane do wydobywania śmieci i zawalonych tuneli z głębin otchłani, a czasami cennych rud. Wymaga wcześniejszej pracy eksploratorów."
ptBR = "Uma furadeira mecânica miniaturizada projetada para escavar detritos e túneis colapsados das profundezas do abismo, e ocasionalmente minérios valiosos. Exige trabalho prévio de exploradores."
koKR = "심연의 깊이에서 쓰레기와 붕괴된 터널을 파내기 위해 설계된 소형 기계 드릴로, 때때로 귀중한 광석도 발견할 수 있습니다. 탐험가의 사전 작업이 필요합니다."
csCZ = "Miniaturní mechanické vrtání navržené k vyhlubování odpadu a zřícených tunelů z hlubin propasti, a občasné cenné rudy. Vyžaduje předchozí práci od objevitelů."
viVN = "Một chiếc khoan cơ khí thu nhỏ được thiết kế để đào bới rác và các đường hầm sụp đổ từ độ sâu của vực thẳm, và thỉnh thoảng là các khoáng sản quý giá. Cần có công việc trước đó của những nhà thám hiểm."
trTR = "Çukurun derinliklerinden hurda ve çökertilmiş tünelleri çıkarmak için tasarlanmış miniaturize bir mekanik matkap ve zaman zaman değerli madenler. Kaşiflerden önceki çalışmaları gerektirir."

["Lapantouflemagic.AbyssExcavator.FlavorDescription"]
raw = "\"Brothers of the mine rejoice!\nSwing, swing, swing with me\nRaise your pick and raise your voice\nSing, sing, sing with me...\""
status = "normal"
enUS = "\"Brothers of the mine rejoice!  \nSwing, swing, swing with me  \nRaise your pick and raise your voice  \nSing, sing, sing with me...\""
zhCN = "“矿山的兄弟们欢欣鼓舞！\n跟我一起挥舞，挥舞，挥舞\n举起你的镐，举起你的声音\n跟我一起唱，唱，唱……”"
zhTW = "\"礦中的兄弟們，歡欣鼓舞！\n跟我一起揮舞，揮舞，揮舞\n舉起你的鎬，提升你的聲音\n跟我一起唱，唱，唱...\""
ruRU = "\"Братья шахты, радуйтесь! \nМашите, машите, машите со мной \nПоднимите свою кирку и поднимите голос \nПойте, пойте, пойте со мной...\""
jaJP = "「鉱山の兄弟たちよ、喜べ！\n一緒に振り回そう、振り回そう、振り回そう\nピッケルを上げ、声を上げよう\n一緒に歌おう、歌おう、歌おう…」"
frFR = "\"Frères de la mine, réjouissez-vous !\nBalancez, balancez, balancez avec moi\nLevez votre pioche et élevez votre voix\nChantez, chantez, chantez avec moi...\""
deDE = "\"Brüder der Mine, freut euch!\nSchwingt, schwingt, schwingt mit mir\nErhebt eure Pickel und erhebt eure Stimme\nSingt, singt, singt mit mir...\""
plPL = "Bracia z kopalni, radujcie się! \nMachaj, machaj, machaj ze mną \nPodnieś swój kilof i podnieś swój głos \nŚpiewaj, śpiewaj, śpiewaj ze mną..."
ptBR = "\"Ó irmãos da mina, alegrem-se! \nBalançam, balançam, balançam comigo \nLevantem suas picaretas e levantem suas vozes \nCantem, cantem, cantem comigo...\""
koKR = "\"광산의 형제들이여 기뻐하라!\n함께 흔들고, 흔들고, 흔들자\n곡괭이를 높이 들고, 목소리를 높이자\n함께 노래하고, 노래하고, 노래하자...\""
csCZ = "\"Bratři z dolu radujte se!\nKovete, kovete, kovete se mnou\nZvedněte svou krumpáč a zvedněte svůj hlas\nZpívejte, zpívejte, zpívejte se mnou...\""
viVN = "\"Anh em trong mỏ hãy vui lên!\nGhé, ghé, ghé cùng tôi\nNâng cây cuốc và nâng giọng nói của bạn\nHát, hát, hát cùng tôi...\""
trTR = "\"Kardeşler, madenin sevinci!\nSalla, salla, salla benimle\nKazmanı kaldır ve sesini yükselt\nŞarkı söyle, şarkı söyle, şarkı söyle benimle...\""

