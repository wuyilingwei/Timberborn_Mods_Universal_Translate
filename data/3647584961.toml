["Lapantouflemagic.Fireflyfarm.Description"]
raw = "An unusual workplace reserved for the most fearless beavers. Grows giant carnivorous fireflies from tiny larvae in order to harvest the glowing fluid from their abdomen.\nThe ravenous beast is kept attached at all times to make the process <i>perfectly</i> safe."
status = "normal"
enUS = "An unusual workplace reserved for the most fearless beavers. Grows giant carnivorous fireflies from tiny larvae in order to harvest the glowing fluid from their abdomen. The ravenous beast is kept attached at all times to make the process <i>perfectly</i> safe."
zhCN = "一个不寻常的工作场所，专为最无畏的海狸保留。培育从小幼虫成长为巨型食肉萤火虫，以便收集它们腹部发光的液体。贪婪的野兽始终保持连接，以确保过程 <i>绝对</i> 安全。"
zhTW = "一個不尋常的工作場所，專為最無畏的海狸而設。從微小的幼蟲培育出巨大的食肉螢火蟲，以便收集牠們腹部發光的液體。貪婪的野獸始終保持連接，以確保過程 <i>完全</i> 安全。"
ruRU = "Необычное рабочее место, зарезервированное для самых безстрашных бобров. Выращивает гигантских плотоядных светлячков из крошечных личинок с целью сбора светящегося вещества из их живота. Плутоватое чудовище всегда прикреплено, чтобы сделать процесс <i>совершенно</i> безопасным."
jaJP = "「最も勇気のあるビーバーのために特別に用意された異常な職場。小さな幼虫から巨大な肉食性のホタルを育て、彼らの腹部から光る液体を収穫します。貪欲な獣は常に取り付けられており、プロセスを<i>完全に</i>安全に保つためです。」"
frFR = "Un lieu de travail inhabituel réservé aux castors les plus intrépides. Cultive d'énormes lucioles carnivores à partir de minuscules larves afin de récolter le liquide luminescent de leur abdomen. La bête vorace est maintenue attachée en tout temps pour rendre le processus <i>parfaitement</i> sûr."
deDE = "Ein ungewöhnlicher Arbeitsplatz, der den furchtlosesten Bibern vorbehalten ist. Züchtet riesige fleischfressende Glühwürmchen aus winzigen Larven, um die leuchtende Flüssigkeit aus ihrem Abdomen zu ernten. Das gierige Vieh wird zu jeder Zeit festgehalten, um den Prozess <i>völlig</i> sicher zu machen."
plPL = "Nietypowe miejsce pracy zarezerwowane dla najbardziej nieustraszonych bobrów. Hoduje gigantyczne mięsożerne świetliki z małych larw, aby zbierać świecącą ciecz z ich brzucha. Żarłoczne stworzenie jest na stałe przymocowane, aby proces był <i>doskonale</i> bezpieczny."
ptBR = "Um local de trabalho incomum reservado para os castores mais destemidos. Cultiva gigantescas vagalumes carnívoros a partir de pequenas larvas para colher o fluido brilhante de seu abdômen. A fera voraz é mantida presa o tempo todo para tornar o processo <i>perfeitamente</i> seguro."
koKR = "가장 두려움 없는 비버들을 위해 마련된 특이한 작업장. 작은 유충으로부터 거대한 육식 불빛벌레를 키워 그들의 복부에서 빛나는 액체를 수확합니다. 이 탐욕스러운 짐승은 언제나 연결되어 있어 과정이 <i>완전히</i> 안전하게 진행됩니다."
csCZ = "Neobvyklé pracoviště vyhrazené pro nejstatečnější bobry. Pěstuje obří masožravé světlušky z malých larev, aby sklidila svítivou tekutinu z jejich břicha. Hladový bestie je po celou dobu připevněna, aby byl proces <i>zcela</i> bezpečný."
viVN = "Một nơi làm việc không bình thường dành cho những con nhím gỗ không sợ hãi nhất. Nuôi lớn những con đom đóm ăn thịt khổng lồ từ những con ấu trùng nhỏ để thu hoạch chất lỏng phát sáng từ bụng của chúng. Con quái vật tham lam luôn được giữ lại ắp cho đến khi quy trình <i>hoàn toàn</i> an toàn."
trTR = "En cesur kundakçılar için ayrılmış sıradışı bir çalışma alanı. Küçük larvalardan dev etçil ateşböcekleri yetiştirir ve bunların karınlarındaki parlak sıvıyı toplar. Sürekli olarak bağlı tutulan açgözlü canavar, süreci <i>tamamen</i> güvenli hale getirir."

["Lapantouflemagic.Fireflyfarm.FlavorDescription"]
raw = "\"You see kits: every bad thing has its silver lining! Tending to those is quite easy, and what's it gonna do? Eat my prosthetic arm? Ha!\"\n -Grandpa beaver, on how to live a happy life."
status = "normal"
enUS = "You see kids: every bad thing has its silver lining! Tending to those is quite easy, and what's it gonna do? Eat my prosthetic arm? Ha!\"  \n-Grandpa beaver, on how to live a happy life."
zhCN = "“你看，小家伙们：每一个坏事都有它的光明面！照顾这些非常简单，它会怎样？吃掉我的假肢？哈哈！”\n- 老海狸，关于如何过上快乐的生活。"
zhTW = "「你看，小傢伙們：每件壞事都有其好的一面！照顧這些可不難，它會怎樣？吃掉我的假肢手臂嗎？哈！」  \n—— 蘇大爺，談如何過上快樂的生活。"
ruRU = "Вы видите, детки: у каждой плохой вещи есть своя светлая сторона! Ухаживать за ними довольно легко, а что они могут сделать? Съесть мою протезу? Ха!\"\n - Дедушка бобер о том, как жить счастливо."
jaJP = "「あなたは子供たちを見る：すべての悪いことには明るい面があります！それの世話は非常に簡単で、何をするというのですか？私の義手を食べるのですか？ハハ！」  \n- おじいさんビーバー、幸せな生活を送る方法について。"
frFR = "Vous voyez les petits : chaque mauvaise chose a son bon côté ! S'en occuper est assez facile, et que va-t-il faire ? Manger mon bras prothétique ? Ha !\"\n -Papi castor, sur comment vivre une vie heureuse."
deDE = "Du siehst, Küken: Jedes schlechte Ding hat seine positive Seite! Sich um diese zu kümmern, ist ganz einfach, und was wird es tun? Meinen Prothesenarm essen? Ha!\"\n -Opa Biber, wie man ein glückliches Leben führt."
plPL = "Widzisz maluchy: każda zła rzecz ma swoją srebrną podszewkę! Dbając o nie, łatwo jest zajmować się tym, a co mogą zrobić? Zjeść moją protezę ramienia? Ha!\"  \n-Dziadek bóbr, o tym jak żyć szczęśliwie."
ptBR = "Você vê, filhotes: toda coisa ruim tem seu lado bom! Cuidar deles é bem fácil, e o que vai fazer? Comer meu braço prostético? Ha!\"\n -Vovô castor, sobre como viver uma vida feliz."
koKR = "\"너는 이렇게 말하는 키트들을 본다: 모든 나쁜 일에는 좋은 면이 있다! 그것들을 돌보는 것은 매우 쉽고, 그게 뭘 할 수 있겠어? 내 의수라도 먹겠어? 하하!\"  \n- 행복한 삶을 사는 방법에 대한 할아버지 비버의 말."
csCZ = "Vidíš, mláďata: každá špatná věc má svůj dobrý důvod! Starat se o ně je velmi snadné a co se stane? Sní mou protézu? Ha!\"\n -Dědeček bobr, o tom, jak žít šťastný život."
viVN = "Bạn thấy đấy, mỗi điều xấu đều có mặt tốt của nó! Việc chăm sóc chúng thì thật dễ dàng, và chúng sẽ làm gì? Ăn cánh tay giả của tôi à? Haha!\"  \n- Ông beaver, về cách sống một cuộc đời hạnh phúc."
trTR = "Kediler görüyorsun: her kötü şeyin bir gümüş astarı var! Onlarla ilgilenmek oldukça kolay ve ne yapabilir ki? Protez kolumu mu yesin? Ha!\"\n -Büyükbaba kunduz, mutlu bir hayat yaşamanın yolu hakkında."

