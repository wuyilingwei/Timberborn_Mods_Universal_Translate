["Lapantouflemagic.MechanizedSeaweedfarm.Description"]
raw = "A complex device that masterfully transforms mechanical power into tasty food. \nConsumes wood for maintenance."
status = "normal"
enUS = "A complex device that masterfully transforms mechanical power into tasty food. Consumes wood for maintenance."
zhCN = "一种复杂的装置，巧妙地将机械动力转化为美味的食物。  \n消耗木材进行维护。"
zhTW = "一個複雜的裝置，巧妙地將機械動力轉化為美味的食物。  \n維護時消耗木材。"
ruRU = "Сложное устройство, которое мастерски превращает механическую энергию в вкусную еду. \nПотребляет древесину для обслуживания."
jaJP = "機械化海藻農場の説明 - 機械的な力を見事に美味しい食べ物に変える複雑な装置です。  \n維持のために木材を消費します。"
frFR = "Un dispositif complexe qui transforme de manière magistrale la puissance mécanique en nourriture savoureuse. Consomme du bois pour l'entretien."
deDE = "Ein komplexes Gerät, das mechanische Energie meisterhaft in schmackhafte Nahrung verwandelt. Verbraucht Holz für die Wartung."
plPL = "Skomplikowane urządzenie, które mistrzowsko przekształca moc mechaniczną w smaczne jedzenie. \nWymaga drewna do konserwacji."
ptBR = "Um dispositivo complexo que transforma magistralmente o poder mecânico em comida saborosa. Consome madeira para manutenção."
koKR = "기계적 힘을 맛있는 음식으로 완벽하게 변환하는 복잡한 장치입니다. 유지 보수에 나무를 소비합니다."
csCZ = "Složitý přístroj, který mistrovsky přetváří mechanickou energii na chutné jídlo. \nSpotřebovává dřevo na údržbu."
viVN = "Một thiết bị phức tạp biến đổi tài năng cơ khí thành thức ăn ngon miệng một cách đầy nghệ thuật. \nTiêu thụ gỗ để bảo trì."
trTR = "Makine gücünü lezzetli yiyeceklere ustalıkla dönüştüren karmaşık bir cihaz. Bakım için ağaç tüketir."

["Lapantouflemagic.MechanizedSeaweedfarm.FlavorDescription"]
raw = "\"The first rule of beaver engineering is to not look too closely at the mechanism\"\n -Grandpa beaver, on what happened to his whiskers."
status = "normal"
enUS = "\"The first rule of beaver engineering is to not look too closely at the mechanism\" - Grandpa beaver, on what happened to his whiskers."
zhCN = "“海狸工程的第一条法则就是不要过于关注机制。”  \n—— Grandpa beaver，谈及他的胡须发生了什么。"
zhTW = "「海狸工程的第一條法則就是不要太仔細地看機械。」  \n- 老爺爺海狸，談到他的鬚鬚發生了什麼事。"
ruRU = "\"Первая заповедь бобрового машиностроения — не вглядываться слишком близко в механизм.\"  \n— Дедушка-бобёр о том, что случилось с его усами."
jaJP = "「ビーバー工学の第一のルールは、メカニズムをじっくり見ないことだ」  \n- おじいちゃんビーバー、彼のひげに何が起こったのかについて。"
frFR = "\"La première règle de l'ingénierie des castors est de ne pas regarder de trop près le mécanisme\" - Grand-père castor, sur ce qu'il est advenu de ses moustaches."
deDE = "\"Die erste Regel der Bibertechnik ist, nicht zu genau auf den Mechanismus zu schauen.\"  \n-Opa Biber, über das, was mit seinen Schnurrhaaren passiert ist."
plPL = "\"Pierwsza zasada inżynierii bobrów to nie przyglądać się zbyt dokładnie mechanizmowi\" - Dziadek bobrów, na temat tego, co stało się z jego wąsami."
ptBR = "\"A primeira regra da engenharia dos castores é não olhar muito de perto para o mecanismo\"  \n- Vovô castor, sobre o que aconteceu com seus bigodes."
koKR = "\"비버 공학의 첫 번째 규칙은 메커니즘을 자세히 들여다보지 않는 것이다.\"  \n- 할아버지 비버, 그의 수염에 일어난 일에 대하여."
csCZ = "\"První pravidlo bobřího inženýrství je nedívat se příliš zblízka na mechanismus.\"  \n- Děda bobr o tom, co se stalo s jeho vousy."
viVN = "\"Quy tắc đầu tiên của kỹ thuật hải ly là không nhìn quá gần vào cơ chế.\" - Ông beaver, về những gì đã xảy ra với râu của mình."
trTR = "\"Samur mühendisliğinin ilk kuralı, mekaniğe fazla dikkat etmemektir.\"  \n-Büyükbaba samur, bıyıklarına ne olduğu hakkında."

["Lapantouflemagic.NEWPaperMill.Description"]
raw = "A mechanized paper factory.\nOccasionally breaks a gear.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A mechanized paper factory. Occasionally breaks a gear. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一个机械化的造纸厂。  \n偶尔会损坏一个齿轮。  \n<color=#00FFFF>作为堤坝运作</color>"
zhTW = "一個機械化的造紙廠。\n偶爾會損壞一個齒輪。\n<color=#00FFFF>作為堤壩運作</color>"
ruRU = "Механизированная бумажная фабрика.  \nИногда ломает шестеренку.  \n<color=#00FFFF>Работает как дамба</color>"
jaJP = "機械化された製紙工場。\n時折ギアが壊れる。\n<color=#00FFFF>堤防として機能します</color>"
frFR = "Une usine de papier mécanisée.  \nCasse parfois un engrenage.  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Eine mechanisierte Papierfabrik.  \nBricht gelegentlich ein Zahnrad.  \n<color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Zmechanizowana fabryka papieru.\nCzasami psuje się zębatka.\n<color=#00FFFF>Funkcjonuje jako tama</color>"
ptBR = "Uma fábrica de papel mecanizada.  \nÀs vezes quebra uma engrenagem.  \n<color=#00FFFF>Funciona como uma Barragem</color>"
koKR = "기계화된 종이 공장입니다.\n가끔 기어가 고장이 납니다.\n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Mekanizovaná papírna. Občas se poškodí převodovka. <color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một nhà máy giấy cơ khí.\nThỉnh thoảng hỏng một bánh răng.\n<color=#00FFFF>Hoạt động như một đê</color>"
trTR = "Makinalı bir kağıt fabrikası.\nAra sıra bir dişli kırar.\n<color=#00FFFF>Bir Set olarak İşlev Görür</color>"

