["Lapantouflemagic.NewDistrictCenter.Description"]
raw = "A large hut marking the center of a village\n<color=red>Can connect from the bottom to a ladder or pit-and-ladder lodge.</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A large hut marking the center of a village  \n<color=red>Can connect from the bottom to a ladder or pit-and-ladder lodge.</color>  \n<color=#00FFFF>Works as a Levee</color>"
zhCN = "“一个标志着村庄中心的大土屋  \n<color=red>可以从底部连接到梯子或坐梯子的棚屋。</color>  \n<color=#00FFFF>作为堤坝使用</color>”"
zhTW = "一個標記著村莊中心的大 hut  \n<color=red>可以從底部連接到梯子或坑和梯子小屋。</color>  \n<color=#00FFFF>作為堤壩運作</color>"
ruRU = "Большая хижина, обозначающая центр деревни\n<color=red>Может соединяться снизу с лестницей или со шнатью.</color>\n<color=#00FFFF>Работает как насыпь</color>"
jaJP = "「村の中心を示す大きな小屋  \n<color=red>底からは梯子または穴と梯子のロッジに接続できます。</color>  \n<color=#00FFFF>堤防として機能します</color>」"
frFR = "Une grande hutte marquant le centre d'un village  \n<color=red>Peut se connecter par le bas à une échelle ou à un abri avec échelle.</color>  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Eine große Hütte, die das Zentrum eines Dorfes markiert\n<color=red>Kann von unten mit einer Leiter oder einem Gruben- und Leiter-Haus verbunden werden.</color>\n<color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Duża chata oznaczająca centrum wioski\n<color=red>Może łączyć się od dołu z drabiną lub schronieniem z drabiną i dołkiem.</color>\n<color=#00FFFF>Działa jako wał</color>"
ptBR = "Uma grande cabana marcando o centro de uma vila\n<color=red>Pode se conectar de baixo a uma escada ou abrigo de escada e poço.</color>\n<color=#00FFFF>Funciona como um Dique</color>"
koKR = "마을 중심을 나타내는 큰 오두막\n<color=red>아래쪽에서 사다리나 피트 앤 사다리 숙소로 연결할 수 있습니다.</color>\n<color=#00FFFF>제방으로 작동합니다.</color>"
csCZ = "Velká bouda označující střed vesnice\n<color=red>Může se spojit ze spodní části s žebříkem nebo chatou s žebříkem a jámou.</color>\n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một ngôi nhà lớn đánh dấu trung tâm của một ngôi làng\n<color=red>Có thể kết nối từ dưới lên một chiếc thang hoặc nhà trọ thang hố.</color>\n<color=#00FFFF>Hoạt động như một con đê</color>"
trTR = "Büyük bir kulübe, bir köyün merkezini işaret eder\n<color=red>Aşağıdan bir merdiven veya çukur-merdiven yeriyle bağlanabilir.</color>\n<color=#00FFFF>Bir Set olarak çalışır</color>"

