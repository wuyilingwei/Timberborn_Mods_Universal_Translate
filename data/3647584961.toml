["Lapantouflemagic.EmberTrader.Description"]
raw = "Yet another tribe of filthy heretics, who would have guessedxa0? Those guys have developped an unhealthy obcession with fire and hate getting wet. That puts in question how do they ever bathe but let’s not raise too many uncomfortable questions. They’ve got some humongous trees but won’t tell us how to grow them, and their apples are to die for. Bring back what you can."
status = "normal"
enUS = "Yet another tribe of filthy heretics, who would have guessed? Those guys have developed an unhealthy obsession with fire and hate getting wet. That raises questions about how they ever bathe, but let’s not ask too many uncomfortable questions. They’ve got some humongous trees but won’t tell us how to grow them, and their apples are to die for. Bring back what you can."
zhCN = "又一个肮脏的异教徒部落，谁会想到呢？这些家伙对火产生了不健康的痴迷，并且讨厌淋雨。这让人怀疑他们究竟是怎么洗澡的，但我们还是不要提出太多让人不舒服的问题。他们有一些巨大的树木，但不会告诉我们如何种植，而他们的苹果真是美味。尽量带回你能找到的东西。"
zhTW = "又是另一個骯髒異教徒的部落，誰會想到呢？這些家伙對火有著不健康的癡迷，且厭惡淋雨。這就讓人懷疑他們是如何洗澡的，但我們就不問太多不方便的問題了。他們擁有一些巨大的樹木，但不會告訴我們如何種植它們，而他們的蘋果則讓人垂涎欲滴。帶回你能帶回的東西。"
ruRU = "Ещё одно племя грязных еретиков, кто бы мог подумать? Эти парни развили нездоровую одержимость огнем и ненавидят намокать. Это ставит под вопрос, как они вообще купаются, но давайте не задавать слишком много неудобных вопросов. У них есть колоссальные деревья, но они не скажут нам, как их вырастить, а их яблоки просто шикарны. Принесите всё, что сможете."
jaJP = "また新たな汚れた異端者の部族、誰が予想しただろうか？彼らは火に対して異常な執着を持ち、濡れることを嫌う。それでは、彼らがどのようにして入浴するのか疑問が残るが、あまり不快な質問をするのはやめておこう。彼らは巨大な木を持っているが、どうやって育てるのか教えてくれない。そして彼らのリンゴは死ぬほど美味しい。持ち帰れるものを持って帰ってきてください。"
frFR = "Encore une tribu de sales hérétiques, qui l'aurait deviné ? Ces gars-là ont développé une obsession malsaine pour le feu et détestent être mouillés. Cela remet en question comment ils se lavent mais ne posons pas trop de questions inconfortables. Ils ont des arbres gigantesques mais ne nous diront pas comment les faire pousser, et leurs pommes sont à tomber par terre. Ramenez ce que vous pouvez."
deDE = "„Schon wieder ein Stamm dreckiger Häretiker, wer hätte das gedacht? Diese Typen haben eine ungesunde Besessenheit für Feuer entwickelt und hassen es, nass zu werden. Das wirft die Frage auf, wie sie jemals baden, aber lassen wir mal die unbequemeren Fragen außen vor. Sie haben einige riesige Bäume, aber wollen uns nicht verraten, wie man sie züchtet, und ihre Äpfel sind zum Sterben schön. Bring zurück, was du kannst.“"
plPL = "Jeszcze jedno plemię brudnych heretyków, kto by się tego spodziewał? Ci goście rozwinęli niezdrową obsesję na punkcie ognia i nienawidzą moknąć. To rodzi pytanie, jak w ogóle się kąpią, ale nie podnośmy zbyt wielu niewygodnych pytań. Mają jakieś ogromne drzewa, ale nie powiedzą nam, jak je hodować, a ich jabłka są warte grzechu. Przywieź to, co możesz."
ptBR = "Mais uma tribo de hereges imundos, quem diria? Esses caras desenvolveram uma obsessão insalubre por fogo e odeiam se molhar. Isso levanta a questão de como eles conseguem tomar banho, mas vamos evitar muitas perguntas desconfortáveis. Eles têm algumas árvores enormes, mas não vão nos dizer como cultivá-las, e suas maçãs são de dar água na boca. Traga de volta o que puder."
koKR = "또 다른 더러운 이단 부족, 누가 예상했겠습니까? 이 친구들은 불에 대한 건강하지 못한 집착을 키워왔고 젖는 것을 싫어합니다. 그로 인해 그들이 어떻게 목욕을 하는지에 대한 의문이 제기되지만, 너무 불편한 질문은 하지 맙시다. 그들은 거대한 나무들을 가지고 있지만 그 나무를 어떻게 키우는지는 알려주지 않으며, 그들의 사과는 죽어도 아쉽지 않습니다. 가져올 수 있는 것을 가져오세요."
csCZ = "Další kmen špinavých heretiků, kdo by to byl řekl? Ti chlapíci vyvinuli nezdravou posedlost ohněm a nenávidí, když jsou mokří. To vzbuzuje otázku, jak se vůbec koupou, ale nebudeme klást příliš mnoho nepříjemných otázek. Mají obrovské stromy, ale neřeknou nám, jak je pěstovat, a jejich jablka stojí za to. Přineste zpět, co můžete."
viVN = "Thêm một bộ tộc nữa của những kẻ dị giáo bẩn thỉu, ai mà nghĩ được chứ? Những người này đã phát triển một mối ám ảnh không lành mạnh với lửa và ghét bị ướt. Điều đó đặt câu hỏi về cách họ tắm táp ra sao, nhưng chúng ta hãy không nêu ra quá nhiều câu hỏi khó xử. Họ có một số cây lớn khổng lồ nhưng không nói cho chúng ta biết cách trồng chúng, và táo của họ thì tuyệt vời đến mức chết đi được. Hãy mang về những gì bạn có thể."
trTR = "Yine bir grup kirli sapkın, kim bilebilirdi? Bu adamlar ateşe sağlıksız bir takıntı geliştirmiş ve ıslanmaktan nefret ediyorlar. Bu, nasıl yıkanıyorlar sorusunu gündeme getiriyor ama fazla rahatsız edici sorular sormayalım. Devasa ağaçları var ama bunları nasıl büyüteceğimize söylemeyecekler, elma ise harika. Geri getirebileceğin her şeyi getir."

