["Lapantouflemagic.MedicalBed_Injury.Description"]
raw = "Gives injured beavers a place to rest while someone adjust the <color=green>basic balm</color> into a <color=green>pine resin</color> cataplasm."
status = "normal"
enUS = "Gives injured beavers a place to rest while someone adjusts the <color=green>basic balm</color> into a <color=green>pine resin</color> poultice."
zhCN = "为受伤的海狸提供一个休息的地方，同时有人将<color=green>基础药膏</color>调制成<color=green>松树树脂</color>敷料。"
zhTW = "為受傷的海狸提供一個休息的地方，同時有人將<color=green>基本膏藥</color>調整成<color=green>松樹樹脂</color>的膏藥。"
ruRU = "Дает раненым бобрам место для отдыха, пока кто-то готовит <color=green>основную мазь</color> в <color=green>смоляной</color> катаплазм."
jaJP = "「怪我をしたビーバーが、誰かが<color=green>基本的な軟膏</color>を<color=green>松の樹脂</color>のカタプラズムに調整している間、休む場所を提供します。」"
frFR = "Donne aux castors blessés un endroit pour se reposer pendant que quelqu'un ajuste le <color=green>baume de base</color> en un cataplasme de <color=green>résine de pin</color>."
deDE = "Gibt verletzten Bibern einen Platz zum Ausruhen, während jemand den <color=green>Basisbalsam</color> in ein <color=green>Kiefernharz</color> -Katalysator anpasst."
plPL = "Daje rannym bobrom miejsce do odpoczynku, podczas gdy ktoś przygotowuje <color=green>podstawową maść</color> w <color=green>żywiczną</color> kataplazmę."
ptBR = "Dá aos castores feridos um lugar para descansar enquanto alguém ajusta o <color=green>bálsamo básico</color> em um <color=green>cataplasma de resina de pinheiro</color>."
koKR = "부상이 있는 비버에게 <color=green>기본 연고</color>를 <color=green>소나무 수지</color> 고름으로 조정하는 동안 쉴 수 있는 장소를 제공합니다."
csCZ = "Poskytuje zraněným bobrům místo k odpočinku, zatímco někdo upravuje <color=green>základní balzám</color> na <color=green>kaučukovou</color> kaši."
viVN = "Cung cấp cho những con nhím bị thương một nơi để nghỉ ngơi trong khi ai đó điều chỉnh <color=green>thuốc mỡ cơ bản</color> thành một <color=green>bã nhựa cây thông</color>."
trTR = "Yaralı kunduzlara <color=green>çam reçinesi</color> kataplasmı için <color=green>temel merhem</color> ayarlarken dinlenmeleri için bir yer sağlar."

