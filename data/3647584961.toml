["Lapantouflemagic.NuclearReactor2.Description"]
raw = "A medium-sized nuclear reactor powered by both nuclear waste and nuclear fuel.\nGenerates heat by consuming the radioactive elements found in bad water, maintaining the core itself nearly indefinitely.\n<color=red>Deletes 1.5 m²/s of liquid."
status = "normal"
enUS = "A medium-sized nuclear reactor powered by both nuclear waste and nuclear fuel. Generates heat by consuming the radioactive elements found in polluted water, maintaining the core itself nearly indefinitely. <color=red>Deletes 1.5 m²/s of liquid."
zhCN = "一个中型核反应堆，使用核废料和核燃料供电。通过消耗存在于劣质水中的放射性元素产生热量，使核心本身几乎可以无限期保持。<color=red>每秒删除1.5平方米的液体。"
zhTW = "一座中型核反應堆，由核廢料和核燃料驅動。通過消耗壞水中的放射性元素產生熱量，幾乎可以無限期維持核心本身。<color=red>每秒刪除1.5平方米的液體。</color>"
ruRU = "Ядерный реактор среднего размера, работающий как на ядерных отходах, так и на ядерном топливе. Генерирует тепло, потребляя радиоактивные элементы, содержащиеся в загрязненной воде, практически бесконечно поддерживая сам реактор. <color=red>Удаляет 1,5 м²/с жидкости."
jaJP = "中型の原子力発電所で、放射性廃棄物と核燃料の両方で動作します。悪化した水に含まれる放射性元素を消費することで熱を生成し、コア自体をほぼ無期限で維持します。<color=red>1.5 m²/sの液体を削除します。"
frFR = "Un réacteur nucléaire de taille moyenne alimenté à la fois par des déchets nucléaires et du combustible nucléaire.\nGénère de la chaleur en consommant les éléments radioactifs présents dans l'eau polluée, maintenant le cœur presque indéfiniment.\n<color=red>Supprime 1,5 m²/s de liquide."
deDE = "Ein mittelgroßer Atomreaktor, der sowohl mit radioaktivem Abfall als auch mit nuklearem Brennstoff betrieben wird. \nErzeugt Wärme, indem er die radioaktiven Elemente in schlechtem Wasser verbraucht und hält den Kern selbst nahezu endlos.\n<color=red> Löscht 1,5 m²/s Flüssigkeit."
plPL = "Średniej wielkości reaktor jądrowy zasilany zarówno odpadami nuklearnymi, jak i paliwem nuklearnym. Generuje ciepło poprzez zużywanie radioaktywnych pierwiastków znajdujących się w złej wodzie, utrzymując rdzeń praktycznie w nieskończoność. <color=red>Usuwa 1,5 m²/s cieczy."
ptBR = "Um reator nuclear de tamanho médio alimentado tanto por resíduos nucleares quanto por combustível nuclear. Gera calor consumindo os elementos radioativos encontrados em água poluída, mantendo o núcleo praticamente indefinidamente. <color=red>Deleta 1,5 m²/s de líquido."
koKR = "핵폐기물과 핵연료 모두로 작동하는 중간 크기의 원자로입니다. 나쁜 물에 있는 방사성 원소를 소비하여 열을 생성하며, 코어 자체를 거의 무한정 유지합니다. <color=red>1.5 m²/s의 액체를 삭제합니다."
csCZ = "Středně velký jaderný reaktor, poháněný jak jaderným odpadem, tak jaderným palivem. Produkuje teplo konzumací radioaktivních prvků nacházejících se ve znečištěné vodě, což udržuje jádro téměř nekonečně dlouho. <color=red>Odstraní 1,5 m²/s kapaliny."
viVN = "Một lò phản ứng hạt nhân có kích thước trung bình được cung cấp năng lượng bởi cả chất thải hạt nhân và nhiên liệu hạt nhân.  \nTạo ra nhiệt bằng cách tiêu thụ các nguyên tố phóng xạ được tìm thấy trong nước ô nhiễm, duy trì lõi của nó gần như vô hạn.  \n<color=red>Xóa 1,5 m²/s chất lỏng."
trTR = "Orta boy bir nükleer reaktör, hem nükleer atık hem de nükleer yakıt ile çalışır. Kötü sularda bulunan radyonüklidleri tüketerek ısı üretir ve çekirdeği neredeyse sonsuza kadar korur. <color=red>1.5 m²/sn sıvı siler."

