["Tutorial.Tutorial.WelcomeText.Whitepaws"]
raw = "Dear Expedition Leader,\n\nIf you are reading this, you have either discovered a promising site for settlement… or, far more plausibly, stranded yourself in the middle of nowhere after exercising the exceptional judgment for which you are widely known.\n\nWe will send instructions on how to establish a viable colony. We strongly encourage you to follow them precisely, as improvisation is unlikely to improve your current situation.\n\nDo try not to doom the industrious, optimistic, and tragically trusting individuals you convinced to accompany you into exile. Their only mistake was believing you.\n\nShould the settlement fail, please ensure the failure remains local.\n\nRemember that this expedition is equal parts your punishment and an experiment.\n\nDo not come back."
status = "normal"
enUS = "Dear Expedition Leader,\n\nIf you are reading this, you have either discovered a promising site for settlement… or, far more plausibly, stranded yourself in the middle of nowhere after exercising the exceptional judgment for which you are widely known.\n\nWe will send instructions on how to establish a viable colony. We strongly encourage you to follow them precisely, as improvisation is unlikely to improve your current situation.\n\nDo try not to doom the industrious, optimistic, and tragically trusting individuals you convinced to accompany you into exile. Their only mistake was believing you.\n\nShould the settlement fail, please ensure the failure remains local.\n\nRemember that this expedition is equal parts your punishment and an experiment.\n\nDo not come back."
zhCN = "亲爱的探险队长，\n\n如果您正在阅读这些文字，您要么发现了一个适合定居的好地方……要么，更加可能的是，您因做出响当当的糟糕判断而将自己困在了无边无际的荒野中。\n\n我们将会发送有关如何建立一个可行殖民地的指示。我们强烈建议您严格遵循这些指示，因为即兴发挥不太可能改善您当前的处境。\n\n请尽量不要让那些勤劳、乐观、悲剧般信任您的人走向厄运，他们是由于相信您才跟随您来流亡的。他们唯一的错误就是相信了您。\n\n如果殖民地失败，请确保失败的影响仅限于本地。\n\n请记住，这次探险既是对您的惩罚，也是一次实验。\n\n请不要回来。"
zhTW = "親愛的探險隊長，\n\n如果您讀到這封信，您要麼發現了一個有前景的定居點……或者，更可能的是，您因為行使您廣為人知的卓越判斷而將自己困在了偏僻的地方。\n\n我們將發送建立可行殖民地的指示。我們強烈建議您精確地遵循這些指示，因為臨時應變不太可能改善您當前的情況。\n\n請務必不要讓那些勤勞、樂觀並且不幸地過於相信您的人走向滅亡。他們唯一的錯誤就是相信了您。\n\n如果定居失敗，請確保這一失敗只在當地發生。\n\n請記住，這次探險同時是對您的懲罰和一項實驗。\n\n請不要回來。"
ruRU = "Дорогой лидер экспедиции,\n\nЕсли вы читаете это, значит, вы либо обнаружили многообещающий участок для поселения… либо, что гораздо более вероятно, застряли посреди ниоткуда, проявив исключительное суждение, за которое вы известны.\n\nМы отправим инструкции о том, как создать жизнеспособную колонию. Мы настоятельно рекомендуем вам следовать им точно, так как импровизация вряд ли улучшит вашу текущую ситуацию.\n\nПостарайтесь не обречь на гибель трудолюбивых, оптимистичных и tragически доверчивых людей, которых вы убедили сопровождать вас в изгнание. Их единственной ошибкой было ваше доверие.\n\nЕсли поселение потерпит неудачу, пожалуйста, позаботьтесь о том, чтобы неудача осталась местной.\n\nПомните, что эта экспедиция является одновременно и вашим наказанием, и экспериментом.\n\nНе возвращайтесь."
jaJP = "親愛なる遠征リーダーへ、\n\nこれを読んでいるということは、有望な定住地を発見したか… さもなくば、あなたの広く知られた優れた判断力を発揮して、どこにでもない場所に迷い込んだ可能性が高いです。\n\n持続可能なコロニーを確立するための指示をお送りします。それに正確に従うことを強くお勧めします。即興での対応は、現状を改善する可能性は低いです。\n\n追放にあなたと共に来ることに納得してしまった勤勉で楽観的、そして悲劇的に信じやすい人々の運命を絶対に奪わないようにしてください。彼らの唯一の間違いは、あなたを信じたことです。\n\nもし定住が失敗した場合、その失敗が地域に留まるようにしてください。\n\nこの遠征は、あなたの罰と実験が同等であることを忘れないでください。\n\n戻ってこないでください。"
frFR = "Cher Chef d'Expédition,\n\nSi vous lisez ceci, c'est que vous avez soit découvert un site prometteur pour une colonie… soit, bien plus probablement, que vous vous êtes retrouvé au milieu de nulle part après avoir exercé le jugement exceptionnel qui vous est largement reconnu.\n\nNous enverrons des instructions sur la façon d'établir une colonie viable. Nous vous encourageons vivement à les suivre précisément, car l'improvisation est peu susceptible d'améliorer votre situation actuelle.\n\nEssayez de ne pas condamner les individus travailleux, optimistes et tragiquement crédules que vous avez convaincus de vous accompagner dans l'exil. Leur seule erreur a été de vous croire.\n\nSi la colonie échoue, veuillez vous assurer que l'échec reste local.\n\nSouvenez-vous que cette expédition est à la fois votre punition et une expérience.\n\nNe revenez pas."
deDE = "Lieber Expeditionsleiter,\n\nwenn Sie dies lesen, haben Sie entweder einen vielversprechenden Standort für eine Siedlung entdeckt… oder, viel plausibler, sich nach dem Einsatz des außergewöhnlichen Urteils, für das Sie weithin bekannt sind, im Nirgendwo gestrandet.\n\nWir werden Anweisungen schicken, wie man eine tragfähige Kolonie gründet. Wir empfehlen Ihnen dringend, diese genau zu befolgen, da Improvisation Ihre aktuelle Situation vermutlich nicht verbessern wird.\n\nVersuchen Sie, die fleißigen, optimistischen und tragisch naiven Individuen, die Sie überzeugt haben, Sie ins Exil zu begleiten, nicht ins Verderben zu stürzen. Ihr einziger Fehler war, an Sie zu glauben.\n\nSollte die Siedlung scheitern, stellen Sie bitte sicher, dass das Scheitern lokal bleibt.\n\nDenken Sie daran, dass diese Expedition sowohl Ihre Bestrafung als auch ein Experiment ist.\n\nKommen Sie nicht zurück."
plPL = "Drogi Przywódco Ekspedycji,\n\nJeśli to czytasz, to albo odkryłeś obiecujące miejsce na osadę… albo, co bardziej prawdopodobne, utknąłeś w środku niczego, wykazując się wyjątkowym osądem, z którego jesteś powszechnie znany.\n\nPrześlemy instrukcje, jak założyć funkcjonującą kolonię. Gorąco zachęcamy do dokładnego ich przestrzegania, gdyż improwizacja raczej nie poprawi twojej obecnej sytuacji.\n\nPostaraj się nie skazać na zagładę pracowitych, optymistycznych i tragicznie ufnych ludzi, których przekonałeś do towarzyszenia ci na wygnaniu. Ich jedynym błędem było uwierzenie w ciebie.\n\nJeśli osada nie powiedzie się, upewnij się, że porażka pozostanie lokalna.\n\nPamiętaj, że ta ekspedycja jest równocześnie twoją karą i eksperymentem.\n\nNie wracaj."
ptBR = "Caro Líder da Expedição,\n\nSe você está lendo isto, você descobriu um local promissor para estabelecimento... ou, muito mais plausivelmente, se perdeu no meio do nada após exercer o julgamento excepcional pelo qual você é amplamente conhecido.\n\nEnviaremos instruções sobre como estabelecer uma colônia viável. Nós o encorajamos fortemente a segui-las exatamente, pois a improvisação é improvável que melhore sua situação atual.\n\nTente não condenar os indivíduos industriosos, otimistas e tragicamente confiantes que você convenceu a acompanhá-lo no exílio. O único erro deles foi acreditar em você.\n\nCaso a colônia falhe, por favor, assegure-se de que a falha permaneça local.\n\nLembre-se de que esta expedição é igual parte punição e parte experimento.\n\nNão volte."
koKR = "친애하는 탐험대장님,\n\n이 글을 읽고 계신다면, 자 settlement에 적합한 유망한 장소를 발견했거나... 아니면 당신이 널리 알려진 뛰어난 판단력 덕분에 머나먼 곳에 발이 묶인 가능성이 훨씬 높습니다.\n\n우리는 지속 가능한 식민지를 세우는 방법에 대한 지침을 보낼 것입니다. 지침을 정확히 따르시는 것을 강력히 권장합니다. 즉흥적인 행동은 현재 상황을 개선하는 데 도움이 되지 않을 것입니다.\n\n유배에 동행하기 위해 당신을 믿었던 부지런하고 낙관적이며 슬프게도 너무 신뢰가 깊었던 이들을 망치지 않도록 하십시오. 그들의 유일한 실수는 당신을 믿었던 것입니다.\n\n혹시 식민지가 실패하게 된다면, 그 실패가 지역적으로 제한되도록 하십시오.\n\n이번 탐험은 당신에게 주어진 처벌이자 실험임을 잊지 마십시오.\n\n다시 돌아오지 마십시오."
csCZ = "Vážený vedoucí expedice,\n\npokud toto čtete, buď jste objevili slibné místo pro usazení… nebo, mnohem pravděpodobněji, jste se ocitli v prostředku ničeho poté, co jste uplatnili výjimečné úsudky, pro které jste dobře známý.\n\nZašleme vám pokyny, jak založit životaschopnou kolonii. Důrazně vás žádáme, abyste je dodržovali přesně, protože improvizace pravděpodobně vaši současnou situaci nezlepší.\n\nSnažte se nezavdat příčinu k záhubě pracovité, optimistické a tragicky důvěřivé jedince, které jste přesvědčili, aby vás doprovodili do vyhnanství. Jejich jedinou chybou bylo, že vám uvěřili.\n\nPokud usazení selže, prosím zajistěte, aby selhání zůstalo lokální.\n\nPamatujte, že tato expedice je zároveň vaším trestem a experimentem.\n\nNevracet se."
viVN = "Kính gửi Lãnh đạo Đoàn thám hiểm,\n\nNếu bạn đang đọc điều này, bạn đã hoặc là phát hiện ra một địa điểm hứa hẹn cho việc định cư... hoặc, có lẽ hợp lý hơn, bạn đã tự đặt mình vào tình thế khó khăn giữa chốn không người sau khi đưa ra những quyết định tuyệt vời mà bạn nổi tiếng với khả năng đó.\n\nChúng tôi sẽ gửi hướng dẫn về cách thiết lập một thuộc địa khả thi. Chúng tôi khuyến khích bạn tuân theo chúng một cách chính xác, vì sự ứng biến khó có thể cải thiện tình hình hiện tại của bạn.\n\nXin hãy cố gắng đừng khiến những cá nhân chăm chỉ, lạc quan, và đáng thương vì quá tin tưởng mà bạn đã thuyết phục họ theo bạn vào cuộc lưu đày phải chịu số phận xấu. Sai lầm duy nhất của họ là đã tin vào bạn.\n\nNếu thuộc địa thất bại, hãy đảm bảo rằng sự thất bại đó chỉ diễn ra trong phạm vi địa phương.\n\nHãy nhớ rằng cuộc thám hiểm này vừa là hình phạt dành cho bạn vừa là một cuộc thử nghiệm.\n\nXin đừng quay lại."
trTR = "Sevgili Keşif Lideri,\n\nEğer bunu okuyorsanız, ya bir yerleşim için umut verici bir alan keşfettiniz… ya da, çok daha olası bir şekilde, geniş çapta bilinen olağanüstü yargınızı kullanarak kendinizi kimsenin olmadığı bir yere terk ettiniz.\n\nSürdürülebilir bir koloni kurma talimatlarını göndereceğiz. Bunları tam olarak takip etmenizi şiddetle tavsiye ederiz, çünkü doğaçlama yapmanız mevcut durumunuzu geliştirme olasılığını düşürüyor.\n\nSizi sürgüne gitmeye ikna ettiğiniz çalışkan, iyimser ve trajik bir şekilde güvenen bireylerin kaderini mahvetmemeye çalışın. Tek yanlışları, size inanmak oldu.\n\nEğer yerleşim başarısız olursa, lütfen başarısızlığın yerel kalmasını sağlayın.\n\nUnutmayın ki bu keşif, hem cezanız hem de bir deneydir.\n\nGeri dönmeyin."

["Tutorial.Basics.BuildBasics1.Whitepaws"]
raw = "Establish three Lumberjack Flags, one Gatherer’s Flag, and one Tapper’s Flag. If this instruction feels obvious, that is because it is.\n\nTrees will provide logs. Bushes will provide berries. Pine trees, when properly tapped, will provide resin — assuming you have the patience to let them live long enough.\n\nWe trust you can identify a tree without assistance."
status = "normal"
enUS = "Establish three Lumberjack Flags, one Gatherer’s Flag, and one Tapper’s Flag. If this instruction feels obvious, that is because it is.\n\nTrees will provide logs. Bushes will provide berries. Pine trees, when properly tapped, will provide resin — assuming you have the patience to let them live long enough.\n\nWe trust you can identify a tree without assistance."
zhCN = "建立三个伐木工旗帜，一个采集者旗帜和一个采集者旗帜。如果这个指示听起来很显然，那是因为确实如此。\n\n树木将提供原木。灌木丛将提供浆果。松树在正确采集时，将提供树脂——前提是你有耐心让它们活得足够久。\n\n我们相信您可以在没有帮助的情况下识别出一棵树。"
zhTW = "建立三個伐木旗、一個採集者旗和一個樹液採集者旗。如果這個指示聽起來很明顯，那是因為它確實如此。\n\n樹木會提供木材。灌木叢會提供漿果。當松樹正確地被挖掘時，會提供樹脂——前提是你有耐心讓它們活得夠久。\n\n我們相信你能夠無需幫助地識別樹木。"
ruRU = "Установите три флага лесоруба, один флаг собирателя и один флаг добытчика. Если эта инструкция кажется очевидной, значит, так оно и есть.\n\nДеревья будут давать бревна. Кусты будут давать ягоды. Сосны, когда их правильно добывают, будут давать смолу — при условии, что у вас хватит терпения дать им прожить достаточно долго.\n\nМы доверяем, что вы сможете определить дерево без посторонней помощи."
jaJP = "「木こりのフラッグを3つ、収集者のフラッグを1つ、タッパーのフラッグを1つ設置してください。この指示が明白に感じられるのは、その通りだからです。\n\n木は丸太を提供します。低木はベリーを提供します。松の木は、適切にタップされると、樹脂を提供します — それを生かすだけの忍耐がある場合ですが。\n\n皆さんが助けを借りずに木を見分けられると信じています。」"
frFR = "Établissez trois drapeaux de bûcheron, un drapeau de récolteur et un drapeau de récolteur de sève. Si cette instruction vous semble évidente, c'est parce qu'elle l'est.\n\nLes arbres fournissent du bois. Les buissons fournissent des baies. Les pins, lorsqu'ils sont correctement exploités, fourniront de la résine — à condition que vous ayez la patience de les laisser vivre suffisamment longtemps.\n\nNous avons confiance en votre capacité à identifier un arbre sans assistance."
deDE = "Errichte drei Holzfällerflaggen, eine Sammlerflagge und eine Tropfstation. Wenn diese Anweisung offensichtlich erscheint, dann liegt das daran, dass sie es ist.\n\nBäume liefern Holz. Büsche liefern Beeren. Kiefern, wenn sie richtig angezapft werden, liefern Harz - vorausgesetzt, du hast die Geduld, sie lange genug leben zu lassen.\n\nWir vertrauen darauf, dass du einen Baum ohne Hilfe erkennen kannst."
plPL = "„Zbuduj trzy Flag i krawców, jedną Flagę zbieracza i jedną Flagę tapera. Jeśli ta instrukcja wydaje się oczywista, to dlatego, że tak właśnie jest.\n\nDrzewa dostarczą kłód. Krzewy dostarczą jagód. Sosny, gdy zostaną odpowiednio obcięte, dostarczą żywicy — zakładając, że masz cierpliwość, aby pozwolić im żyć wystarczająco długo.\n\nUfamy, że potrafisz rozpoznać drzewo bez pomocy.”"
ptBR = "Estabeleça três Bandeiras de Lenhador, uma Bandeira de Coletor e uma Bandeira de Coletor de Seiva. Se esta instrução parece óbvia, é porque realmente é.\n\nAs árvores fornecerão toras. Os arbustos fornecerão frutas. As árvores de pinho, quando devidamente coletadas, fornecerão resina — supondo que você tenha paciência para deixá-las viver tempo suficiente.\n\nConfiamos que você consegue identificar uma árvore sem ajuda."
koKR = "나무꾼 깃발 3개, 수확가 깃발 1개, 수액 수집가 깃발 1개를 세우세요. 이 지침이 당연하게 느껴진다면, 그 이유는 당연하기 때문입니다.\n\n나무는 통나무를 제공합니다. 덤불은 베리를 제공합니다. 소나무는 적절하게 수액이 채집되면 수지를 제공합니다 — 당신이 그들이 충분히 오래 살게 할 인내심이 있다면 말이죠.\n\n우리는 당신이 도움 없이 나무를 식별할 수 있다고 믿습니다."
csCZ = "Založte tři vlajky dřevařů, jednu vlajku sběrače a jednu vlajku sběrače mízy. Pokud vám tento pokyn připadá zřejmý, je to proto, že je.\n\nStromy poskytnou klády. Keře poskytnou bobule. Borovice, pokud budou správně zalévány, poskytnou pryskyřici — pokud máte trpělivost je nechat žít dostatečně dlouho.\n\nVěříme, že dokážete rozpoznat strom bez pomoci."
viVN = "Thiết lập ba Cờ Lâm Công, một Cờ Thu Hái và một Cờ Hút Nhựa. Nếu hướng dẫn này có vẻ hiển nhiên, đó là vì nó đúng như vậy.\n\nCây sẽ cung cấp gỗ. Cây bụi sẽ cung cấp quả mọng. Cây thông, khi được khai thác đúng cách, sẽ cung cấp nhựa — giả sử bạn có đủ kiên nhẫn để để chúng sống lâu.\n\nChúng tôi tin rằng bạn có thể nhận diện một cái cây mà không cần sự trợ giúp."
trTR = "Üç Ağaç Kesici Bayrağı, bir Toplayıcı Bayrağı ve bir Sığır Bayrağı kurun. Bu talimat açık görünüyorsa, çünkü öyledir.\n\nAğaçlar kütük sağlayacaktır. Çalılar meyve verecektir. Çam ağaçları, doğru bir şekilde tapıldığında, reçine sağlayacaktır - yeterince sabırlı olursanız uzun süre yaşamalarına izin verin.\n\nBir ağacı yardım almadan tanıyabileceğinize güveniyoruz."

["Tutorial.Basics.BuildBasics2.Whitepaws"]
raw = "Now that you have demonstrated the ability to recognize a tree, we may proceed to more advanced concepts.\n\nBuild a Water Pump. Water is essential for survival, despite what certain “visionaries” have previously attempted to prove.\n\nEstablish a Farmhouse and plant cabbages. We recommend cabbages because they are resilient, dependable, and unlikely to wander off — qualities we value highly in a colony.\n\nTry to ensure your settlers drink before they dehydrate and eat before they starve. Timing is important."
status = "normal"
enUS = "Now that you have demonstrated the ability to recognize a tree, we may proceed to more advanced concepts.\n\nBuild a Water Pump. Water is essential for survival, despite what certain “visionaries” have previously attempted to prove.\n\nEstablish a Farmhouse and plant cabbages. We recommend cabbages because they are resilient, dependable, and unlikely to wander off — qualities we value highly in a colony.\n\nTry to ensure your settlers drink before they dehydrate and eat before they starve. Timing is important."
zhCN = "现在你已经展示了识别树木的能力，我们可以继续了解更高级的概念。\n\n建造一个水泵。水对于生存至关重要，尽管某些“理想主义者”曾尝试证明相反。\n\n建立一个农舍并种植卷心菜。我们推荐种植卷心菜，因为它们耐寒、可靠，并且不太可能四处游荡——这些都是我们在一个殖民地中非常看重的品质。\n\n尽量确保你的定居者在脱水前喝水，在饥饿前吃东西。掌握时机很重要。"
zhTW = "現在您已經展示了辨識樹木的能力，我們可以進一步探討更高級的概念。\n\n建造一個水泵。水對生存至關重要，儘管某些“先知”曾試圖證明相反。\n\n建立一個農舍並種植甘藍。我們推薦甘藍，因為它們堅韌、可靠，不容易走失——這些都是我們在殖民地中非常重視的特質。\n\n盡量確保您的定居者在脫水之前喝水，在餓死之前吃東西。時機非常重要。"
ruRU = "Теперь, когда вы продемонстрировали способность распознавать дерево, мы можем перейти к более продвинутым концепциям.\n\nПостройте водяной насос. Вода жизненно важна для выживания, несмотря на то, что некоторые «визионеры» пытались это опровергнуть.\n\nПостройте фермерский дом и посадите капусту. Мы рекомендуем капусту, потому что она устойчива, надежна и вряд ли сбежит — качества, которые мы высоко ценим в колонии.\n\nСтарайтесь следить за тем, чтобы ваши поселенцы пили, прежде чем обезвоживаются, и ели, прежде чем умирают от голода. Важно следить за временем."
jaJP = "木を認識する能力を示したので、より高度な概念に進むことができます。\n\n水ポンプを建設してください。水は生存に不可欠であり、ある「ビジョナリー」が過去に証明しようとしたこととは異なります。\n\n農家を設立し、キャベツを植えてください。キャベツは強健で信頼性が高く、離れたりしにくいため、コロニーにおいて非常に価値のある特性です。\n\n入植者が脱水症状を起こす前に飲み、水分が不足する前に食事をとるように努めてください。タイミングは重要です。"
frFR = "Maintenant que vous avez démontré votre capacité à reconnaître un arbre, nous pouvons passer à des concepts plus avancés.\n\nConstruisez une pompe à eau. L'eau est essentielle à la survie, malgré ce que certains \"visionnaires\" ont tenté de prouver auparavant.\n\nÉtablissez une ferme et plantez des choux. Nous recommandons les choux car ils sont résistants, fiables et peu susceptibles de s'en aller — des qualités que nous apprécions énormément dans une colonie.\n\nEssayez de vous assurer que vos colonisateurs boivent avant de se déshydrater et mangent avant de mourir de faim. Le timing est important."
deDE = "Jetzt, da Sie die Fähigkeit demonstriert haben, einen Baum zu erkennen, können wir zu fortgeschritteneren Konzepten übergehen.\n\nBauen Sie eine Wasserpumpe. Wasser ist für das Überleben unerlässlich, trotz dem, was gewisse „Visionäre“ zuvor zu beweisen versucht haben.\n\nRichten Sie ein Bauernhaus ein und pflanzen Sie Kohl. Wir empfehlen Kohl, da er robust, zuverlässig und unwahrscheinlich ist, abzuhauen — Eigenschaften, die wir in einer Kolonie hoch schätzen.\n\nVersuchen Sie sicherzustellen, dass Ihre Siedler trinken, bevor sie dehydrieren, und essen, bevor sie verhungern. Das Timing ist wichtig."
plPL = "Teraz, gdy wykazałeś zdolność rozpoznawania drzew, możemy przejść do bardziej zaawansowanych koncepcji.\n\nZbuduj pompę wodną. Woda jest niezbędna do przetrwania, mimo że niektórzy „wieszczowie” próbowali to wcześniej udowodnić.\n\nZbuduj dom farmera i zasiej kapustę. Polecamy kapustę, ponieważ jest odporna, niezawodna i mało prawdopodobne, że się zgubi — cechy, które bardzo cenimy w kolonii.\n\nPostaraj się zapewnić swoim osadnikom napój przed odwodnieniem i posiłek przed głodem. Czas jest istotny."
ptBR = "Agora que você demonstrou a capacidade de reconhecer uma árvore, podemos avançar para conceitos mais avançados.\n\nConstrua uma Bomba de Água. A água é essencial para a sobrevivência, apesar do que certos “visionários” tentaram provar anteriormente.\n\nEstabeleça uma Fazenda e plante repolhos. Recomendamos repolhos porque são resilientes, confiáveis e improváveis de desaparecer - qualidades que valorizamos muito em uma colônia.\n\nTente garantir que seus colonos bebam antes de desidratar e comam antes de morrer de fome. O tempo é importante."
koKR = "이제 당신이 나무를 인식할 수 있는 능력을 보여주었으니, 더 고급 개념으로 넘어갈 수 있습니다.\n\n수돗물을 만들어 보세요. 물은 생존에 필수적이며, 특정 \"비전aries\"가 이전에 증명하려 했던 것과는 다릅니다.\n\n농가를 세우고 배추를 심으세요. 우리는 배추를 추천합니다. 배추는 회복력이 강하고, 신뢰할 수 있으며, 떠나지 않을 가능성이 낮은 품종이기 때문입니다. 이러한 특성은 우리가 식민지에서 매우 중요하게 생각하는 것들입니다.\n\n정착민들이 탈수되기 전에 마시고, 굶주리기 전에 먹도록 보장해 주세요. 타이밍이 중요합니다."
csCZ = "Nyní, když jste prokázali schopnost rozpoznat strom, můžeme přejít k pokročilejším konceptům.\n\nPostavte vodní čerpadlo. Voda je nezbytná pro přežití, ať už se snažili určití „vizionáři“ prokázat cokoliv.\n\nZaložte farmu a zasaďte zelí. Doporučujeme zelí, protože je odolné, spolehlivé a nepravděpodobné, že se potuluje — vlastnosti, které v kolonii vysoce ceníme.\n\nSnažte se zajistit, aby vaši osadníci pili, než se dehydrují, a jedli, než umřou hlady. Časování je důležité."
viVN = "Bây giờ bạn đã chứng minh khả năng nhận biết cây cối, chúng ta có thể tiến tới những khái niệm nâng cao hơn.\n\nXây dựng một Bơm Nước. Nước là điều thiết yếu cho sự sống, bất chấp những gì một số “nhà tư tưởng” đã cố gắng chứng minh trước đây.\n\nThiết lập một Nhà Nông và trồng cải bắp. Chúng tôi khuyên bạn nên trồng cải bắp vì chúng rất bền bỉ, đáng tin cậy và không có khả năng bỏ đi — những phẩm chất mà chúng tôi rất coi trọng trong một thuộc địa.\n\nCố gắng đảm bảo rằng những người định cư của bạn uống nước trước khi họ bị mất nước và ăn uống trước khi họ đói. Thời gian là rất quan trọng."
trTR = "Artık bir ağacı tanıma yeteneğinizi gösterdiğinize göre, daha ileri kavramlara geçebiliriz.\n\nBir Su Pompası inşa edin. Su, hayatta kalmak için gereklidir, bazı \"vizyonerlerin\" önceki çabalarına rağmen.\n\nBir Tarım Evi kurun ve lahana dikin. Lahanaları öneriyoruz çünkü dayanıklıdırlar, güvenilirdirler ve kaybolma olasılıkları düşüktür - koloni içinde yüksek değer verdiğimiz niteliklerdir.\n\nGöçebelerinizin dehidrasyon belirtileri göstermeden önce içmelerini ve aç kalmadan önce yemelerini sağlamaya çalışın. Zamanlama önemlidir."

["Tutorial.Basics.PlaceFences.Whitepaws"]
raw = "A brief precaution.\n\nYou may have noticed that the local brambles possess an admirable enthusiasm for expansion. Unlike your expedition plans, they spread efficiently and without hesitation.\n\nBefore they overtake your entire settlement — which they will — pause your operations and construct at least one Fence Gate and four sections of Fence to contain them.\n\nWe recommend acting sooner rather than later, unless you wish to conduct future correspondence from inside a shrub."
status = "normal"
enUS = "A brief precaution.\n\nYou may have noticed that the local brambles possess an admirable enthusiasm for expansion. Unlike your expedition plans, they spread efficiently and without hesitation.\n\nBefore they overtake your entire settlement — which they will — pause your operations and construct at least one Fence Gate and four sections of Fence to contain them.\n\nWe recommend acting sooner rather than later, unless you wish to conduct future correspondence from inside a shrub."
zhCN = "简要提醒。\n\n您可能已经注意到，当地的荆棘非常热衷于扩张。与您的探险计划不同，它们迅速而毫不犹豫地蔓延。\n\n在它们吞噬您的整个定居点之前——它们肯定会——暂停您的操作，至少建造一个栅栏门和四段栅栏来限制它们。\n\n我们建议尽早采取行动，除非您希望未来的通讯在灌木丛中进行。"
zhTW = "簡短的預防措施。\n\n你可能已經注意到當地的荊棘對擴張有著令人讚賞的熱情。與你的探險計劃不同，它們高效而毫不猶豫地擴散。\n\n在它們佔據整個定居地之前——它們肯定會這樣做——暫停你的操作，建造至少一扇圍欄門和四段圍欄來限制它們。\n\n我們建議儘早行動，除非你希望將來在灌木叢內進行通訊。"
ruRU = "Краткое предупреждение.\n\nВы, возможно, заметили, что местные терновники обладают восхитительным желанием к расширению. В отличие от ваших экспедиционных планов, они распространяются эффективно и без колебаний.\n\nПрежде чем они захватят ваше целое поселение — а это обязательно произойдет — приостановите свои действия и постройте как минимум одни Ворота и четыре секции Забора, чтобы сдержать их.\n\nМы рекомендуем действовать скорее раньше, чем позже, если вы не хотите вести дальнейшую переписку из-за куста."
jaJP = "短い注意事項。\n\n地元の茨が拡張に対して見事な熱意を持っていることにお気づきかもしれません。あなたの探検計画とは異なり、彼らは効率的かつためらうことなく広がります。\n\n彼らがあなたの集落全体を占拠する前に — 確実にそうなります — 作業を一時停止し、少なくとも1つのフェンスゲートと4つのフェンスセクションを建設して彼らを制御してください。\n\n早めに行動することをお勧めします、さもなくば茂みの中からの将来の連絡を行うことを望むのであれば。"
frFR = "Une brève précaution.\n\nVous avez peut-être remarqué que les ronces locales possèdent un enthousiasme admirable pour l'expansion. Contrairement à vos projets d'expédition, elles se propagent efficacement et sans hésitation.\n\nAvant qu'elles ne prennent le dessus sur toute votre colonie — ce qu'elles feront — suspendez vos opérations et construisez au moins une Porte de Clôture et quatre sections de Clôture pour les contenir.\n\nNous recommandons d'agir plutôt tôt que tard, à moins que vous ne souhaitiez mener de futures correspondances depuis l'intérieur d'un buisson."
deDE = "Eine kurze Vorsichtsmaßnahme.\n\nVielleicht ist Ihnen aufgefallen, dass die örtlichen Dornensträucher eine bewundernswerte Begeisterung für Expansion haben. Im Gegensatz zu Ihren Expeditionplänen breiten sie sich effizient und ohne Zögern aus.\n\nBevor sie Ihre gesamte Siedlung übernehmen – was sie tun werden – unterbrechen Sie Ihre Arbeiten und bauen Sie mindestens ein Eingangstor und vier Abschnitte Zaun, um sie einzudämmen.\n\nWir empfehlen, eher früher als später zu handeln, es sei denn, Sie möchten zukünftige Korrespondenz aus einem Strauch heraus führen."
plPL = "Krótka precaucja.\n\nMożesz zauważyć, że lokalne jeżyny mają godną podziwu chęć do rozszerzania się. W przeciwieństwie do twoich planów wyprawy, rozprzestrzeniają się efektywnie i bez wahania.\n\nZanim przejmą całą twoją osadę — a na pewno to zrobią — wstrzymaj swoje działania i zbuduj przynajmniej jedną bramkę ogrodzeniową oraz cztery odcinki ogrodzenia, aby je powstrzymać.\n\nZalecamy działanie szybciej niż później, chyba że chcesz prowadzić przyszłą korespondencję z wnętrza krzewu."
ptBR = "Uma breve precaução.\n\nVocê pode ter notado que os espinhos locais possuem um admirável entusiasmo pela expansão. Ao contrário dos seus planos de expedição, eles se espalham de forma eficiente e sem hesitação.\n\nAntes que eles dominem toda a sua colônia — o que acontecerá — pause suas operações e construa pelo menos uma Porta de Cerca e quatro seções de Cerca para contê-los.\n\nRecomendamos agir o quanto antes, a menos que você deseje realizar futuras correspondências de dentro de um arbusto."
koKR = "간단한 주의 사항.\n\n지역의 덤불이 확장에 대한 멋진 열정을 가지고 있다는 것을 알았을 것입니다. 당신의 탐험 계획과는 달리, 그들은 효율적으로 주저 없이 퍼집니다.\n\n그들이 당신의 전체 정착지를 덮어버리기 전에 — 확실히 그럴 것입니다 — 작업을 잠시 중단하고 적어도 하나의 울타리 게이트와 네 개의 울타리 구역을 만들어 그들을 차단하세요.\n\n나무 속에서 미래의 서신을 작성하고 싶지 않다면, 가능한 빨리 행동할 것을 권장합니다."
csCZ = "Krátké upozornění.\n\nMožná jste si všimli, že místní trny mají obdivuhodný zápal pro expanzi. Na rozdíl od vašich expedičních plánů se šíří efektivně a bez váhání.\n\nNež ovládnou celé vaše osídlení — což se stane — pozastavte své operace a postavte alespoň jedny Dveře na plot a čtyři úseky Plotu, abyste je udrželi na uzdě.\n\nDoporučujeme jednat dříve než později, pokud si nepřejete vést budoucí korespondenci z nitra keře."
viVN = "Một lưu ý ngắn gọn.\n\nCó thể bạn đã nhận thấy rằng những cây dây leo địa phương có sự nhiệt tình đáng ngưỡng mộ trong việc mở rộng. Khác với kế hoạch thám hiểm của bạn, chúng lan rộng hiệu quả và không do dự.\n\nTrước khi chúng chiếm lấy toàn bộ khu định cư của bạn — điều mà chúng sẽ làm — hãy tạm dừng các hoạt động và xây dựng ít nhất một Cổng Rào và bốn đoạn Rào để kiểm soát chúng.\n\nChúng tôi khuyên bạn nên hành động sớm chứ không phải muộn, trừ khi bạn muốn thực hiện các cuộc giao tiếp trong tương lai từ bên trong một bụi cây."
trTR = "Kısa bir önlem.\n\nYerel çalılıklar yayılma konusunda hayranlık verici bir heves sergilediğini fark etmiş olabilirsiniz. Keşif planlarınızın aksine, etkili bir şekilde ve tereddüt etmeden yayılıyorlar.\n\nTüm yerleşiminizi ele geçirmeden önce — ki bunu yapacaklar — işlemlerinizi durdurun ve onları kontrol altına almak için en az bir Çit Kapısı ve dört bölüm Çit inşa edin.\n\nGeç kalmadan hareket etmenizi öneriyoruz, aksi takdirde gelecekteki yazışmalarınızı bir çalılığın içinden yapmak zorunda kalabilirsiniz."

["Tutorial.Basics.BuildBath.Whitepaws"]
raw = "A Matter of Standards\n\nWe Whitepaws take great pride in our immaculate coats. Cleanliness is not a luxury — it is a reflection of who we are.\n\nConstruct a River Bath in the river, or provide Showers if you insist on engineering where nature would suffice.\n\nBe advised: a Whitepaw who cannot get cleaned up will go on strike. Negotiations rarely improve the situation.\n\nWe know you enjoy a good riot.\n\nYou will find it significantly less amusing when you are the target."
status = "normal"
enUS = "A Matter of Standards\n\nWe Whitepaws take great pride in our immaculate coats. Cleanliness is not a luxury — it is a reflection of who we are.\n\nConstruct a River Bath in the river, or provide Showers if you insist on engineering where nature would suffice.\n\nBe advised: a Whitepaw who cannot get cleaned up will go on strike. Negotiations rarely improve the situation.\n\nWe know you enjoy a good riot.\n\nYou will find it significantly less amusing when you are the target."
zhCN = "标准问题\n\n我们白爪对我们的洁白毛发感到非常自豪。清洁不是奢侈——它反映了我们的本质。\n\n在河中建造一个河浴，或者如果你坚持在自然能满足的地方进行工程，则提供淋浴。\n\n请注意：一个无法清洁的白爪将会罢工。谈判很少能改善这种情况。\n\n我们知道你喜欢骚乱。\n\n当你成为目标时，你会发现这少了许多乐趣。"
zhTW = "標題：標準問題\n\n我們白爪派對於我們潔白的毛皮感到無比驕傲。潔淨不是奢侈——它反映了我們的性格。\n\n在河裡建造一個河流浴室，或者如果你堅持在自然足夠的地方進行工程，則提供淋浴。\n\n請注意：無法清潔的白爪將會罷工。談判很少能改善情況。\n\n我們知道你喜歡一場好暴動。\n\n當你成為目標時，會發現這一點的趣味性少得多。"
ruRU = "Дело стандартов\n\nМы, Белые Лапы, гордимся нашими безупречными шкурами. Чистота — это не роскошь, это отражение того, кто мы есть.\n\nПостройте реку для купания на реке или установите душевые, если вы настаиваете на инжиниринге там, где природа была бы достаточна.\n\nИмейте в виду: Белая Лапа, которая не может привести себя в порядок, начнет забастовку. Переговоры редко улучшают ситуацию.\n\nМы знаем, что вам нравится хорошая восстание.\n\nВам будет значительно менее весело, когда вы станете мишенью."
jaJP = "基準の問題\n\n私たちホワイトパウは、自分たちの清らかな毛皮に大きな誇りを持っています。清潔さは贅沢ではなく、私たちの本質を反映しています。\n\n川に川浴槽を建設するか、自然が十分であればシャワーを提供してください。\n\n注意してください：きれいにできないホワイトパウはストライキを起こします。交渉は状況を改善することはほとんどありません。\n\n皆さんが良い暴動を楽しんでいることは知っています。\n\nあなたが標的となるとき、それはかなり面白くなくなるでしょう。"
frFR = "Une Question de Standards\n\nNous, les Whitepaws, avons beaucoup de fierté dans nos manteaux immaculés. La propreté n'est pas un luxe — c'est le reflet de qui nous sommes.\n\nConstruisez un Bain de Rivière dans la rivière, ou fournissez des Douches si vous insistez pour ingénier où la nature suffirait.\n\nSoyez averti : un Whitepaw qui ne peut pas se nettoyer va faire grève. Les négociations améliorent rarement la situation.\n\nNous savons que vous aimez une bonne émeute.\n\nVous trouverez cela significativement moins amusant lorsque vous serez la cible."
deDE = "Ein Frage der Standards\n\nWir Whitepaws legen großen Wert auf unser makelloses Fell. Sauberkeit ist kein Luxus – sie ist ein Spiegelbild dessen, wer wir sind.\n\nBauen Sie ein Flussbad im Fluss oder stellen Sie Duschen zur Verfügung, falls Sie darauf bestehen, dort zu bauen, wo die Natur ausreichen würde.\n\nSeien Sie gewarnt: Ein Whitepaw, der sich nicht sauber machen kann, wird streiken. Verhandlungen verbessern selten die Situation.\n\nWir wissen, dass Sie gerne einen guten Aufstand erleben.\n\nEs wird Ihnen deutlich weniger amüsant erscheinen, wenn Sie das Ziel sind."
plPL = "Kwestia standardów\n\nMy, Białe Łapy, jesteśmy dumni z naszych nieskazitelnych futer. Czystość to nie luksus — to odzwierciedlenie tego, kim jesteśmy.\n\nZbuduj kąpielisko w rzece lub zapewnij prysznice, jeśli upierasz się przy inżynierii tam, gdzie natura wystarcza.\n\nUwaga: Biała Łapa, która nie może się oczyścić, weźmie udział w strajku. Negocjacje rzadko poprawiają sytuację.\n\nWiemy, że cieszysz się z dobrego buntu.\n\nZnajdziesz to znacznie mniej zabawne, gdy będziesz celem."
ptBR = "Uma Questão de Padrões\n\nNós, Whitepaws, temos grande orgulho de nossos pelos imaculados. A limpeza não é um luxo — é um reflexo de quem somos.\n\nConstrua um Banho de Rio no rio, ou forneça Chuveiros se você insistir em engenharia onde a natureza seria suficiente.\n\nEsteja avisado: um Whitepaw que não conseguir se limpar entrará em greve. As negociações raramente melhoram a situação.\n\nSabemos que você gosta de um bom motim.\n\nVocê achará significativamente menos engraçado quando for o alvo."
koKR = "기준 문제\n\n우리는 화이트포우스가 우리의 흠잡을 데 없는 털에 큰 자부심을 가지고 있습니다. 청결함은 사치가 아닌 우리의 정체성을 반영합니다.\n\n강에 강욕조를 건설하거나, 자연이 충분한 곳에 공사를 고집하시겠다면 샤워 시설을 제공하십시오.\n\n주의하세요: 청소를 할 수 없는 화이트포우스는 파업에 들어갑니다. 협상은 상황을 개선하는 데 드문 경우입니다.\n\n우리는 당신이 좋은 폭동을 즐긴다는 것을 알고 있습니다.\n\n당신이 표적이 되었을 때 그것이 훨씬 덜 재미있다는 것을 알게 될 것입니다."
csCZ = "Otázka standardů\n\nMy, Whitepaws, máme velkou hrdost na naše bezvadné kožichy. Čistota není luxus — je to odraz toho, kým jsme.\n\nPostavte Říční koupel v řece, nebo zajistěte sprchy, pokud trváte na inženýrství tam, kde by stačila příroda.\n\nBuďte si vědomi: Whitepaw, který se nemůže umýt, půjde do stávky. Vyjednávání situaci málokdy zlepší.\n\nVíce než dobrý nepokoj nás těší.\n\nZjistíte, že to bude výrazně méně zábavné, když budete cílem."
viVN = "Một Vấn Đề Của Tiêu Chuẩn\n\nChúng tôi, Whitepaws, rất tự hào về bộ lông sạch sẽ của mình. Sự sạch sẽ không phải là một sự xa xỉ - đó là một phản ánh về con người của chúng tôi.\n\nXây dựng một Bể Tắm Ven Sông trong dòng sông, hoặc cung cấp Vòi Tắm nếu bạn khăng khăng về việc kỹ thuật hóa nơi mà thiên nhiên có thể đáp ứng.\n\nXin lưu ý: một Whitepaw không thể làm sạch bản thân sẽ phát động đình công. Các buổi đàm phán hiếm khi cải thiện tình hình.\n\nChúng tôi biết bạn thích một cuộc bạo loạn.\n\nBạn sẽ thấy nó ít thú vị hơn nhiều khi bạn trở thành mục tiêu."
trTR = "Standartlar Meselesi\n\nBiz Beyazpençeler, kusursuz tüylerimizle gurur duyuyoruz. Temizlik bir lüks değil — kim olduğumuzun bir yansımasıdır.\n\nNehirde bir Nehir Banyosu inşa edin veya doğanın yeterli olabileceği yerlerde duş sağlamakta ısrar ediyorsanız duşlar sağlayın.\n\nDikkatli olun: temizlenemeyen bir Beyazpençe grev yapacaktır. Müzakere genellikle durumu düzeltmez.\n\nİyi bir isyanı sevdiğinizi biliyoruz.\n\nAma hedef siz olduğunuzda bunun çok daha az eğlenceli olduğunu göreceksiniz."

["Tutorial.Basics.BuildMoreBasics.Whitepaws"]
raw = "A brief clarification, lest you attempt to imitate our cousins the Folktails.\n\nWe Whitepaws do not separate labor from shelter when it can be avoided. Most of our workplaces also serve as lodgings, and most of our lodgings are <color=#00FFFF>watertight</color>. We are beavers : our dams are our houses, and our houses are our dams. This is the law.\n\nYou may notice these structures “<color=#00FFFF>work as levees</color>.”\n\nTo ensure stability and modest growth, construct a second Farmhouse, a second Water Pump, and one Forester.\n\nThese additions will bring your settlement to fifteen beds. With adequate housing, new births may follow.\n\nTheir fate will also be your responsibility"
status = "normal"
enUS = "A brief clarification, lest you attempt to imitate our cousins the Folktails.\n\nWe Whitepaws do not separate labor from shelter when it can be avoided. Most of our workplaces also serve as lodgings, and most of our lodgings are <color=#00FFFF>watertight</color>. We are beavers: our dams are our houses, and our houses are our dams. This is the law.\n\nYou may notice these structures “<color=#00FFFF>work as levees</color>.”\n\nTo ensure stability and modest growth, construct a second Farmhouse, a second Water Pump, and one Forester.\n\nThese additions will bring your settlement to fifteen beds. With adequate housing, new births may follow.\n\nTheir fate will also be your responsibility."
zhCN = "简要说明，以免你试图模仿我们的表亲——民间尾巴。\n\n我们白爪不会在可以避免的情况下将劳动与住所分开。我们大多数的工作场所也作为宿舍，而我们大多数的宿舍都是<color=#00FFFF>防水的</color>。我们是海狸：我们的坝就是我们的房子，我们的房子就是我们的坝。这是定律。\n\n你可能会注意到这些结构“<color=#00FFFF>充当堤坝</color>”。\n\n为了确保稳定和适度增长，建造第二个农舍、第二个水泵和一个林务员。\n\n这些新增设施将使你的定居点达到十五个床位。拥有足够的住房后，可能会有新的出生。\n\n他们的命运也将由你负责。"
zhTW = "簡短的說明，以免你試圖模仿我們的堂兄弟Folktails。\n\n我們白爪族不會將勞動與住所分開，除非真的無法避免。我們的大多數工作場所同時也充當住宿，而我們的大多數住宿則是<color=#00FFFF>防水</color>的。我們是海狸：我們的壩就是我們的家，而我們的家就是我們的壩。這就是法律。\n\n你可能會注意到這些結構“<color=#00FFFF>作為堤防</color>”。\n\n為了確保穩定和適度的增長，建造第二間農舍、第二個水泵以及一個樹林管理員。\n\n這些增建將使你的定居點達到十五個床位。擁有足夠的住房，新的出生可能會隨之而來。\n\n他們的命運也將是你的責任。"
ruRU = "Краткое пояснение, чтобы вы не пытались подражать нашим кузенам, Фолктейлам.\n\nМы, Белопороги, не разделяем труд и укрытие, когда это можно избежать. Большинство наших рабочих мест также служат жильем, и большинство наших жильев - <color=#00FFFF>водонепроницаемы</color>. Мы бобры: наши плотины - наши дома, а наши дома - наши плотины. Это закон.\n\nВы можете заметить, что эти сооружения “<color=#00FFFF>работают как дамбы</color>.”\n\nЧтобы обеспечить стабильность и скромный рост, постройте вторую Ферму, вторую Водяную Помпу и одного Лесника.\n\nЭти дополнения доведут ваше поселение до пятнадцати мест для сна. С достаточным количеством жилья могут последовать новые рождения.\n\nИх судьба также будет вашей ответственностью."
jaJP = "簡単な説明をします。私たちのいとこのフォークテイルズを模倣する必要がないように。\n\n私たちホワイトパウズは、避けられる場合には労働と住居を分けません。私たちのほとんどの作業場は宿泊施設としても機能し、ほとんどの宿泊施設は<color=#00FFFF>防水</color>です。私たちはビーバーです。私たちのダムは私たちの家であり、私たちの家は私たちのダムです。これがルールです。\n\nこれらの構造物は「<color=#00FFFF>堤防として機能する</color>」ことに気づくかもしれません。\n\n安定性と控えめな成長を確保するために、2つ目のファームハウス、2つ目の水ポンプ、そして1つのフォレスターを建設してください。\n\nこれらの追加により、あなたの集落は15のベッドを持つことになります。適切な住宅があれば、新しい誕生が続くかもしれません。\n\n彼らの運命もあなたの責任です。"
frFR = "Une brève clarification, de peur que vous tentiez d'imiter nos cousins les Folktails.\n\nNous, Whitepaws, ne séparons pas le travail de l'abri lorsque cela peut être évité. La plupart de nos lieux de travail servent également de logements, et la plupart de nos logements sont <color=#00FFFF>étanches</color>. Nous sommes des castors : nos barrages sont nos maisons, et nos maisons sont nos barrages. C'est la loi.\n\nVous remarquerez peut-être que ces structures « <color=#00FFFF>fonctionnent comme des digues</color>. »\n\nPour assurer la stabilité et une croissance modeste, construisez une deuxième ferme, une deuxième pompe à eau, et un forestier.\n\nCes ajouts porteront votre colonie à quinze lits. Avec un logement adéquat, de nouvelles naissances pourraient suivre.\n\nLeur sort sera également votre responsabilité."
deDE = "Eine kurze Klarstellung, damit Sie nicht versuchen, unseren Verwandten, den Folktails, nachzueifern.\n\nWir Whitepaws trennen Arbeit nicht von Unterkunft, wenn es vermeidbar ist. Die meisten unserer Arbeitsplätze dienen auch als Unterkünfte, und die meisten unserer Unterkünfte sind <color=#00FFFF>wasserdicht</color>. Wir sind Biber: Unsere Dämme sind unsere Häuser, und unsere Häuser sind unsere Dämme. Das ist das Gesetz.\n\nSie werden bemerken, dass diese Strukturen „<color=#00FFFF>als Deiche fungieren</color>.“\n\nUm Stabilität und bescheidenes Wachstum zu gewährleisten, bauen Sie ein zweites Bauernhaus, eine zweite Wasserpumpe und einen Förster.\n\nDiese Ergänzungen bringen Ihre Siedlung auf fünfzehn Betten. Mit angemessenen Unterkünften könnten neue Geburten folgen.\n\nIhr Schicksal wird auch Ihre Verantwortung sein."
plPL = "Krótkie wyjaśnienie, abyś nie próbował naśladować naszych kuzynów Folktails.\n\nMy, Białe Łapy, nie oddzielamy pracy od schronienia, gdy tylko możemy tego uniknąć. Większość naszych miejsc pracy pełni również funkcję noclegową, a większość naszych noclegów jest <color=#00FFFF>wodoszczelna</color>. Jesteśmy bobrami: nasze tamy to nasze domy, a nasze domy to nasze tamy. To jest prawo.\n\nMożesz zauważyć, że te struktury “<color=#00FFFF>działają jak wały</color>.”\n\nAby zapewnić stabilność i modestny wzrost, zbuduj drugi Domek Rolniczy, drugą Pompę Wodną i jednego Leśnika.\n\nTe dodatki zwiększą liczbę łóżek w twojej osadzie do piętnastu. Przy odpowiedniej liczbie mieszkań, mogą nastąpić nowe narodziny.\n\nIch los będzie również twoją odpowiedzialnością."
ptBR = "Uma breve clarificação, para que você não tente imitar nossos primos, os Folktails.\n\nNós, Whitepaws, não separamos trabalho de abrigo quando isso pode ser evitado. A maioria dos nossos locais de trabalho também serve como moradia, e a maioria das nossas moradias é <color=#00FFFF>à prova d'água</color>. Nós somos castores: nossas represas são nossas casas, e nossas casas são nossas represas. Esta é a lei.\n\nVocê pode notar que essas estruturas “<color=#00FFFF>funcionam como diques</color>.”\n\nPara garantir estabilidade e um crescimento modesto, construa uma segunda Casa de Colheita, uma segunda Bomba de Água e um Silvicultor.\n\nEssas adições levarão seu assentamento a quinze camas. Com habitação adequada, novos nascimentos podem ocorrer.\n\nO destino deles também será sua responsabilidade."
koKR = "간단한 설명: 여러분이 우리의 사촌인 포크테일을 흉내내지 않도록 합니다.\n\n우리는 화이트파우가 노동과 주거를 분리하지 않습니다. 대부분의 우리의 작업장은 숙소로도 사용되며, 대부분의 숙소는 <color=#00FFFF>방수</color>입니다. 우리는 비버입니다: 우리의 댐은 집이고, 우리의 집은 댐입니다. 이것이 법칙입니다.\n\n이 구조물들이 “<color=#00FFFF>제방으로 작용한다</color>”는 것을 알 수 있습니다.\n\n안정성과 적당한 성장을 보장하기 위해 두 번째 농가, 두 번째 물펌프, 그리고 한 명의 산림 관리자를 건설하세요.\n\n이 추가 건설로 여러분의 정착지는 열다섯 개의 침대로 늘어날 것입니다. 적절한 주거 공간이 마련되면 새로운 출생이 있을 수 있습니다.\n\n그들의 운명도 여러분의 책임이 될 것입니다."
csCZ = "Krátké objasnění, abyste se nepokoušeli napodobit naše bratry Folktails.\n\nMy, Whitepaws, nedělíme práci a přístřeší, pokud se tomu dá vyhnout. Většina našich pracovních míst slouží také jako ubytování a většina našeho ubytování je <color=#00FFFF>vodotěsná</color>. Jsme bobři: naše hráze jsou naše domy a naše domy jsou naše hráze. To je zákon.\n\nMůžete si všimnout, že tyto struktury „<color=#00FFFF>fungují jako hrázky</color>.“\n\nPro zajištění stability a skromného růstu postavte druhou farmu, druhou vodní pumpu a jednoho lesníka.\n\nTyto pří additions přivedou vaši osadu na patnáct postelí. S dostatečným ubytováním mohou následovat nová narození.\n\nJejich osud bude také vaší odpovědností."
viVN = "Một sự làm rõ ngắn gọn, kẻo bạn cố gắng bắt chước anh em họ của chúng ta, những người Folktails.\n\nChúng tôi, những chú cáo trắng, không tách rời lao động khỏi nơi ở khi có thể tránh được. Hầu hết các nơi làm việc của chúng tôi cũng phục vụ như chỗ trú ẩn, và hầu hết các chỗ trú ẩn của chúng tôi đều <color=#00FFFF>chống thấm nước</color>. Chúng tôi là thú có túi: các đập của chúng tôi là nhà của chúng tôi, và các nhà của chúng tôi là các đập của chúng tôi. Đây là luật lệ.\n\nBạn có thể nhận thấy những cấu trúc này “<color=#00FFFF>hoạt động như các đê</color>.”\n\nĐể đảm bảo sự ổn định và tăng trưởng khiêm tốn, hãy xây dựng một Nhà nông thứ hai, một Bơm nước thứ hai và một người trồng rừng.\n\nNhững bổ sung này sẽ đưa khu định cư của bạn lên mười lăm giường. Với chỗ ở đầy đủ, những sinh mệnh mới có thể sẽ tiếp theo.\n\nSố phận của họ cũng sẽ là trách nhiệm của bạn."
trTR = "Kısa bir açıklama, Folktail akrabalarımızı taklit etmeye kalkmayın.\n\nBiz Beyazpençeler, iş ile barınmayı ayrı tutmayız. Çoğu çalışma alanımız aynı zamanda konaklama yeri olarak da hizmet eder ve konaklama yerlerimizin çoğu <color=#00FFFF>suy geçirmezdir</color>. Biz kunduzlarız: barajlarımız evlerimizdir ve evlerimiz barajlarımızdır. Bu bir yasa.\n\nBu yapıları “<color=#00FFFF>set gibi çalıştığını</color>” fark edebilirsiniz.\n\nİstikrar ve mütevazı bir büyüme sağlamak için ikinci bir Çiftlik, ikinci bir Su Pompası ve bir Orman İşçisi inşa edin.\n\nBu eklemeler, yerleşiminizi on beş yatak kapasitesine taşıyacaktır. Yeterli konut ile yeni doğumlar gerçekleşebilir.\n\nOnların kaderi de sizin sorumluluğunuz altında olacaktır."

["Tutorial.Basics.BuildMinimalStorage.Whitepaws"]
raw = "You will now address storage.\n\nConstruct appropriate facilities to contain your growing supplies. Disorder is the first sign of failure.\n\nBuild a Log Pile for timber. Build storage for Pine Resin. It may appear unnecessary at present. It will soon be required.\n\nRice, despite sentimental objections you may invent, is to be stored in a Pile like any other granular resource. Coal does not complain. Dirt does not complain. Rice will adapt."
status = "normal"
enUS = "You will now address storage.\n\nConstruct appropriate facilities to contain your growing supplies. Disorder is the first sign of failure.\n\nBuild a Log Pile for timber. Build storage for Pine Resin. It may appear unnecessary at present. It will soon be required.\n\nRice, despite sentimental objections you may invent, is to be stored in a Pile like any other granular resource. Coal does not complain. Dirt does not complain. Rice will adapt."
zhCN = "您现在将处理存储问题。\n\n建设适当的设施来容纳您日益增长的物资。无序是失败的第一迹象。\n\n建造一个木材堆放点。为松树树脂建造存储设施。这现在可能看起来不必要，但很快就会变得必要。\n\n大米，尽管您可能会提出感情上的反对意见，也应像其他颗粒资源一样储存在堆中。煤炭不会抱怨。泥土不会抱怨。大米会适应。"
zhTW = "您現在將處理儲存問題。\n\n建造適當的設施來容納不斷增長的物資。無序是失敗的第一個跡象。\n\n建造一個木材堆來儲存木材。為松樹樹脂建造儲存設施。這在目前看似不必要，但很快將受到需求。\n\n雖然您可能會找出情感上的反對理由，但稻米應像其他顆粒資源一樣儲存在堆裡。煤炭不會抱怨。土壤不會抱怨。稻米會適應。"
ruRU = "Теперь вы займётесь хранением.\n\nПостройте соответствующие объекты для хранения ваших растущих запасов. Беспорядок — первый признак провала.\n\nПостройте штабель дров для древесины. Постройте хранилище для сосновой смолы. Это может показаться ненужным на данный момент. Скоро это понадобится.\n\nРис, несмотря на сентиментальные возражения, которые вы можете придумать, следует хранить в штабеле, как и любой другой гранулированный ресурс. Уголь не жалуется. Земля не жалуется. Рис адаптируется."
jaJP = "あなたは今、ストレージについて取り組みます。\n\n成長する供給品を収納するための適切な施設を建設してください。混乱は失敗の最初の兆候です。\n\n木材のために薪の山を築いてください。松脂のためのストレージを作ってください。現時点では不要に思えるかもしれませんが、すぐに必要になります。\n\nお米は、あなたが考え出すかもしれない感情的な反対にかかわらず、他の粒状資源と同様に積み上げて保存されるべきです。石炭は文句を言いません。土は文句を言いません。お米は適応します。"
frFR = "Vous allez maintenant vous occuper du stockage.\n\nConstruisez des installations appropriées pour contenir vos fournitures croissantes. Le désordre est le premier signe de l'échec.\n\nConstruisez une pile de bûches pour le bois. Construisez un stockage pour la résine de pin. Cela peut sembler inutile pour le moment. Cela sera bientôt nécessaire.\n\nLe riz, malgré les objections sentimentales que vous pourriez inventer, doit être stocké dans une pile comme toute autre ressource granulaire. Le charbon ne se plaint pas. La terre ne se plaint pas. Le riz s'adaptera."
deDE = "Sie werden sich jetzt mit der Lagerung beschäftigen.\n\nBauen Sie geeignete Einrichtungen, um Ihre wachsenden Vorräte aufzubewahren. Unordnung ist das erste Zeichen des Scheiterns.\n\nBauen Sie einen Holzstapel für Holz. Bauen Sie Lagerräume für Kiefernharz. Es mag im Moment unnötig erscheinen. Es wird bald benötigt.\n\nReis, trotz sentimentaler Einwände, die Sie erfinden mögen, ist wie jede andere granuläre Ressource in einem Haufen zu lagern. Kohle beschwert sich nicht. Erde beschwert sich nicht. Reis wird sich anpassen."
plPL = "Teraz zajmiesz się magazynowaniem.\n\nZbuduj odpowiednie obiekty, aby pomieścić swoje rosnące zapasy. Bałagan to pierwszy znak niepowodzenia.\n\nZbuduj Stos Kłód na drewno. Zbuduj magazyn na żywicę sosnową. Może to wydawać się zbędne na razie. Wkrótce będzie to konieczne.\n\nRyż, mimo sentymentalnych zastrzeżeń, które możesz wymyśleć, powinien być przechowywany w Stosie jak każdy inny granularny surowiec. Węgiel nie narzeka. Ziemia nie narzeka. Ryż dostosuje się."
ptBR = "Você agora abordará o armazenamento.\n\nConstrua instalações apropriadas para conter seus suprimentos crescentes. Desordem é o primeiro sinal de falha.\n\nConstrua uma Pilha de Toras para madeira. Construa armazenamento para Resina de Pinheiro. Pode parecer desnecessário no momento. Em breve será necessário.\n\nArroz, apesar de objeções sentimentais que você possa inventar, deve ser armazenado em uma Pilha como qualquer outro recurso granular. Carvão não reclama. Terra não reclama. Arroz se adaptará."
koKR = "이제 저장소를 다룰 것입니다.\n\n성장하는 자원을 담을 적절한 시설을 건설하세요. 무질서는 실패의 첫 번째 신호입니다.\n\n목재를 위한 통나무 더미를 만드세요. 파인 수지를 저장할 공간을 만드세요. 현재에는 필요 없어 보일 수 있습니다. 곧 필요해질 것입니다.\n\n쌀은 여러분이 발명할 수 있는 감정적인 반대에도 불구하고, 다른 과립 자원처럼 더미에 저장해야 합니다. 석탄은 불평하지 않습니다. 흙은 불평하지 않습니다. 쌀은 적응할 것입니다."
csCZ = "Nyní se zaměříte na skladování.\n\nPostavte vhodné zařízení pro uchování vašich rostoucích zásob. Nepořádek je první známkou neúspěchu.\n\nPostavte hromadu klád na dřevo. Vytvořte sklad pro borovicovou pryskyřici. Může se to nyní zdát zbytečné. Brzy to bude nutné.\n\nRýže, navzdory sentimentálním námitkám, které můžete vymyslet, se musí skladovat v hromadě jako jakýkoli jiný sypký zdroj. Uhlí si nestěžuje. Půda si nestěžuje. Rýže se přizpůsobí."
viVN = "Bây giờ bạn sẽ giải quyết vấn đề lưu trữ.\n\nXây dựng các cơ sở phù hợp để chứa đựng nguồn cung cấp đang tăng trưởng của bạn. Sự lộn xộn là dấu hiệu đầu tiên của thất bại.\n\nXây dựng một Đống Gỗ cho gỗ. Xây dựng kho chứa Nhựa Thông. Nó có thể có vẻ không cần thiết vào lúc này. Nó sẽ sớm trở nên cần thiết.\n\nGạo, bất chấp những phản đối mang tính tình cảm mà bạn có thể tưởng tượng, cũng cần được lưu trữ trong một Đống như bất kỳ loại tài nguyên hạt nào khác. Than không phàn nàn. Đất không phàn nàn. Gạo sẽ thích nghi."
trTR = "Artık depolama ile ilgileneceksiniz.\n\nBüyüyen malzemelerinizi saklamak için uygun tesisler inşa edin. Kargaşa, başarısızlığın ilk işaretiydi.\n\nKereste için bir Odun Yığını inşa edin. Çam Reçini için depolama alanı inşa edin. Şu anda gereksiz görünebilir. Ancak yakında gerekecek.\n\nPirincin, yaratabileceğiniz duygusal itirazlara rağmen, herhangi bir başka granüler kaynak gibi bir yığının içinde saklanması gerekir. Kömür şikayet etmez. Toprak şikayet etmez. Pirinç uyum sağlayacak."

["Tutorial.Basics.BuildTanks.Whitepaws"]
raw = "You may feel the urge to construct a dam. This instinct is understandable. It is also premature.\n\nBuilding a proper semi-permeable dam would require metal fixtures that we currently do not have. We need to wait and endure.\n\nConstruct four Small Water Tanks and two Pit Tanks. Store water while it still flows."
status = "normal"
enUS = "You may feel the urge to construct a dam. This instinct is understandable. It is also premature.\n\nBuilding a proper semi-permeable dam would require metal fixtures that we currently do not have. We need to wait and endure.\n\nConstruct four Small Water Tanks and two Pit Tanks. Store water while it still flows."
zhCN = "“你可能会有想要建造大坝的冲动。这种本能是可以理解的，但也为时已晚。\n\n建造一个合适的半渗透大坝需要金属配件，而我们目前并没有这些配件。我们需要耐心等待，忍耐。\n\n建造四个小水箱和两个深水箱。在水流动时储存水。”"
zhTW = "您可能會感到想要建造大壩的衝動。這種本能是可以理解的，但也為時尚早。\n\n建造一個合適的半滲透大壩需要我們目前所沒有的金屬配件。我們需要耐心等待，忍耐下去。\n\n建造四個小水箱和兩個坑槽水箱。在水仍然流動時儲存水。"
ruRU = "Вы можете почувствовать желание построить дамбу. Этот инстинкт понятен. Он также преждевременен.\n\nДля постройки полноценной полупроницаемой дамбы потребуются металлические крепления, которые у нас в данный момент отсутствуют. Нам нужно подождать и терпеть.\n\nПостройте четыре малых резервуара для воды и два ямных резервуара. Храните воду, пока она еще течет."
jaJP = "「ダムを建設したい衝動を感じるかもしれません。この本能は理解できますが、まだ早すぎます。\n\n適切な半透過性ダムを建設するには、現在持っていない金属部品が必要です。私たちは待ち、耐える必要があります。\n\n小型水槽を4つ、ピットタンクを2つ建設してください。水が流れている間に蓄えましょう。」"
frFR = "Vous pourriez ressentir l'envie de construire un barrage. Cet instinct est compréhensible. Il est également prématuré.\n\nConstruire un véritable barrage semi-perméable nécessiterait des fixations métalliques que nous n'avons pas actuellement. Nous devons attendre et endurer.\n\nConstruisez quatre petits réservoirs d'eau et deux réservoirs de fosses. Stockez de l'eau tant qu'elle coule encore."
deDE = "Vielleicht verspürst du den Drang, einen Damm zu bauen. Dieses Gefühl ist verständlich. Es ist jedoch verfrüht.\n\nDer Bau eines richtigen haldurchlässigen Damms würde metallische Bauteile erfordern, die wir derzeit nicht haben. Wir müssen abwarten und durchhalten.\n\nBaue vier kleine Wassertanks und zwei Grubentanks. Speichere Wasser, solange es noch fließt."
plPL = "Możesz poczuć chęć zbudowania tamy. Ten instynkt jest zrozumiały. Jest też przedwczesny.\n\nZbudowanie odpowiedniej półprzepuszczalnej tamy wymagałoby metalowych elementów, których obecnie nie mamy. Musimy czekać i wytrzymać.\n\nZbuduj cztery małe zbiorniki wodne i dwa zbiorniki na wodę. Gromadź wodę, póki jeszcze płynie."
ptBR = "Você pode sentir a vontade de construir uma represa. Esse instinto é compreensível. Também é prematuro.\n\nConstruir uma represa semipermeável adequada exigiria fixações de metal que atualmente não temos. Precisamos esperar e suportar.\n\nConstrua quatro Tanques de Água Pequenos e dois Tanques de Poço. Armazene água enquanto ela ainda flui."
koKR = "댐을 건설하고 싶은 충동을 느낄 수 있습니다. 이 본능은 이해할 수 있습니다. 하지만 아직 시기상조입니다.\n\n적절한 반투과성 댐을 건설하려면 현재 우리가 가지고 있지 않은 금속 장치가 필요합니다. 우리는 기다리고 인내해야 합니다.\n\n네 개의 소형 물탱크와 두 개의 구덩이 탱크를 건설하세요. 물이 흐르는 동안 저장하세요."
csCZ = "Můžete cítit potřebu postavit hráz. Tento instinkt je pochopitelný. Je to však také předčasné.\n\nKonstrukce správné polopropustné hráze by vyžadovala kovové součásti, které v současnosti nemáme. Musíme počkat a vydržet.\n\nPostavte čtyři malé vodní nádrže a dvě jámové nádrže. Ukládejte vodu, dokud ještě teče."
viVN = "Bạn có thể cảm thấy thôi thúc xây dựng một con đập. Bản năng này là điều dễ hiểu. Tuy nhiên, đó cũng là điều quá sớm.\n\nXây dựng một con đập bán thấm đúng cách sẽ cần các thiết bị kim loại mà hiện tại chúng ta chưa có. Chúng ta cần chờ đợi và chịu đựng.\n\nHãy xây dựng bốn bể nước nhỏ và hai bể nước hố. Chứa nước trong khi nó vẫn còn chảy."
trTR = "Bir baraj inşa etme isteği hissedebilirsiniz. Bu içgüdü anlaşılabilir. Ancak erken.\n\nDoğru bir yarı geçirgen baraj inşa etmek, şu anda sahip olmadığımız metal parçaları gerektirir. Beklemeli ve dayanmalıyız.\n\nDört Küçük Su Tankı ve iki Çukur Tankı inşa edin. Su akmaya devam ederken depolayın."

["Tutorial.PlanksSawdustAndPriorities.BuildLogGnawingandStorage.Whitepaws"]
raw = "We must address your so-called “District Center.”\n\nTake a moment to observe it. Yes — that pile of splintered wood and disappointed debris. That is not an administrative hub. That is evidence of your personnality.\n\nTo establish a proper District Center, you will require Planks. Logs alone do not constitute progress.\n\nConstruct a Log Gnawing Station to process timber into planks. In addition, build appropriate storage for Planks and for Sawdust.\n\nWe sent you to found a new town, not to camp beside a traffic accident."
status = "normal"
enUS = "We must address your so-called 'District Center.'\n\nTake a moment to observe it. Yes — that pile of splintered wood and disappointed debris. That is not an administrative hub. That is evidence of your personality.\n\nTo establish a proper District Center, you will require Planks. Logs alone do not constitute progress.\n\nConstruct a Log Gnawing Station to process timber into planks. In addition, build appropriate storage for Planks and for Sawdust.\n\nWe sent you to found a new town, not to camp beside a traffic accident."
zhCN = "“我们必须处理你所谓的‘区域中心’。\n\n请花一点时间观察它。是的——那堆破碎的木头和失望的残骸。那不是一个管理中心。那是你个性的证明。\n\n要建立一个合适的区域中心，你需要木板。光靠木头是不够的。\n\n建造一个木头加工站，将木材处理成木板。此外，还要为木板和木屑建造合适的储存空间。\n\n我们让你去建立一个新城镇，而不是在交通事故旁露营。”"
zhTW = "我們必須處理你所謂的“區域中心”。\n\n花點時間觀察它。是的——那堆破碎的木頭和失望的碎片。那並不是一個行政中心。那是你的個性的證據。\n\n要建立一個合適的區域中心，你需要木板。光有原木並不能算是進展。\n\n建造一個原木咬合站以將木材加工成木板。此外，還需建造適當的木板和鋸屑儲存空間。\n\n我們派你去創辦一個新鎮，而不是在交通事故旁露營。"
ruRU = "Мы должны обратить внимание на ваш так называемый «Центр района».\n\nУделите немного времени, чтобы его观察ить. Да — эта куча splintered дерева и разочарованных обломков. Это не административный центр. Это свидетельство вашей личности.\n\nЧтобы создатьProperный Центр района, вам понадобятся Доски. Бревна сами по себе не составляют прогресс.\n\nПостройте Станцию обработки древесины, чтобы переработать древесину в доски. Кроме того, создайте соответствующее хранилище для Досок и для Опилок.\n\nМы отправили вас основать новый город, а не лагерь рядом с происшествием."
jaJP = "「あなたのいわゆる「地区センター」に対処する必要があります。\n\n少し観察してみてください。そう、その破損した木材と失望したがれきの山。それは行政の中心ではありません。それはあなたの性格の証拠です。\n\n適切な地区センターを設立するには、板が必要です。丸太だけでは進展とは言えません。\n\n木材を板に加工するための丸太かじり所を建設してください。また、板と木くずのための適切な保管場所も作ってください。\n\nあなたを新しい町を設立するために送り出したのです、交通事故の横でキャンプをするためではありません。」"
frFR = "Nous devons nous attaquer à votre soi-disant « Centre de District ».\n\nPrenez un moment pour l'observer. Oui — ce tas de bois éclaté et de débris décevants. Ce n'est pas un centre administratif. C'est la preuve de votre personnalité.\n\nPour établir un véritable Centre de District, vous aurez besoin de Planches. Des troncs seuls ne constituent pas un progrès.\n\nConstruisez une Station de Rognage de Bois pour transformer le bois en planches. De plus, construisez un stockage approprié pour les Planches et pour les Sciures de Bois.\n\nNous vous avons envoyés pour fonder une nouvelle ville, pas pour camper à côté d'un accident de la route."
deDE = "„Wir müssen uns um Ihr sogenanntes ‚Bezirkzentrum‘ kümmern.\n\nNehmen Sie sich einen Moment, um es zu beobachten. Ja – dieser Haufen aus zersplittertem Holz und enttäuschten Trümmern. Das ist kein Verwaltungszentrum. Das ist der Beweis Ihrer Persönlichkeit.\n\nUm ein richtiges Bezirkzentrum einzurichten, benötigen Sie Bretter. Allein mit Stämmen kommen Sie nicht voran.\n\nBauen Sie eine Stammzerkleinerungsstation, um Holz in Bretter zu verarbeiten. Darüber hinaus bauen Sie angemessene Lagerräume für Bretter und für Sägemehl.\n\nWir haben Sie geschickt, um eine neue Stadt zu gründen, nicht um neben einem Verkehrsunfall zu campen.“"
plPL = "Musimy zająć się waszym rzekomym „Centrum Dzielnicy”.\n\nZatrzymaj się na chwilę, aby je obserwować. Tak — ten stos rozdrobnionego drewna i rozczarowanych odpadów. To nie jest centrum administracyjne. To dowód na twoją osobowość.\n\nAby ustanowić prawidłowe Centrum Dzielnicy, będziesz potrzebować desek. Same kłody nie stanowią postępu.\n\nZbuduj Stację Rozdrabniania Kłód, aby przetwarzać drewno na deski. Ponadto zbuduj odpowiednie miejsce do przechowywania desek i trocin.\n\nWysłaliśmy cię, abyś założył nowe miasto, a nie obozował obok wypadku komunikacyjnego."
ptBR = "Precisamos abordar seu chamado “Centro do Distrito”.\n\nReserve um momento para observá-lo. Sim — aquela pilha de madeira lascada e destroços desapontados. Isso não é um centro administrativo. Isso é a evidência da sua personalidade.\n\nPara estabelecer um verdadeiro Centro do Distrito, você precisará de Tábuas. Troncos sozinhos não constituem progresso.\n\nConstrua uma Estação de Roedura de Troncos para processar madeira em tábuas. Além disso, construa um armazenamento apropriado para Tábuas e para Pó de Madeira.\n\nNós o enviamos para fundar uma nova cidade, não para acampar ao lado de um acidente de trânsito."
koKR = "당신의 소위 ‘구역 중심’에 대해 이야기해야 합니다.\n\n잠시 주변을 관찰해 보세요. 네, 그 조각난 나무와 실망스러운 잔해의 더미입니다. 그것은 행정 중심지가 아닙니다. 그것은 당신의 개성을 보여주는 증거입니다.\n\n올바른 구역 중심을 설립하기 위해서는 널(木판)이 필요합니다. 나무만으로는 발전을 의미하지 않습니다.\n\n제재소를 건설하여 목재를 널로 가공하세요. 또한 널과 톱밥을 저장할 적절한 저장소도 지어야 합니다.\n\n우리는 당신이 새로운 마을을 설립하도록 보냈지, 교통사고 옆에서 캠프를 차리라고 보낸 것이 아닙니다."
csCZ = "Musíme se zabývat vaším takzvaným „Centrem okresu“.\n\nChvíli si ho prohlédněte. Ano — ten hromada rozštípaného dřeva a zklamaných troskách. To není administrativní centrum. To je důkaz vaší osobnosti.\n\nK tomu, abyste zřídili správné Centrum okresu, budete potřebovat prkna. Pouhé klády nejsou pokrok.\n\nPostavte stanici na zpracování klád, abyste zpracovali dřevo na prkna. Navíc vybudujte vhodné místo pro skladování prken a pilin.\n\nPoslali jsme vás založit nové město, ne k táboření vedle dopravní nehody."
viVN = "Chúng ta phải giải quyết cái gọi là “Trung Tâm Khu Phố” của bạn.\n\nHãy dành một chút thời gian để quan sát nó. Đúng vậy — cái đống gỗ bị vỡ vụn và các mảnh vụn thất vọng đó. Đó không phải là một trung tâm hành chính. Đó là bằng chứng về tính cách của bạn.\n\nĐể thiết lập một Trung Tâm Khu Phố đúng đắn, bạn sẽ cần Gỗ Xẻ. Chỉ riêng Log không đủ để tạo ra tiến bộ.\n\nXây dựng một Trạm Xẻ Gỗ để xử lý gỗ thành các tấm gỗ. Ngoài ra, hãy xây dựng kho lưu trữ phù hợp cho Gỗ Xẻ và Bã Gỗ.\n\nChúng tôi đã cử bạn đến để thành lập một thị trấn mới, không phải để cắm trại bên cạnh một vụ tai nạn giao thông."
trTR = "Senin sözde “Bölge Merkezi” ile ilgilenmemiz gerekiyor.\n\nBir anlığına ona göz at. Evet — o parçalanmış ağaç yığını ve hayal kırıklığına uğramış kalıntılar. Bu bir idari merkez değildir. Bu senin kişiliğinin kanıtıdır.\n\nDoğru bir Bölge Merkezi kurmak için Ahşap Kafesleri gerekecek. Sadece kütükler ilerlemeyi sağlamaz.\n\nAhşabı tahtalara işlemek için bir Kütük Öğütme İstasyonu inşa et. Ayrıca, Tahta ve Talaş için uygun depolama alanları oluştur.\n\nSeni yeni bir kasaba kurmak için gönderdik, bir trafik kazasının yanında kamp kurmak için değil."

["Tutorial.PlanksSawdustAndPriorities.BuildMushroomGrower.Whitepaws"]
raw = "A note regarding Sawdust.\n\nYour Log Gnawing Station will soon produce it in quantities exceeding aesthetic value. Left unattended, it will accumulate, obstruct operations, and quietly undermine your efficiency.\n\nFortunately, sawdust is still wood. It can be used to cultivate Mushrooms in a Mushroom Grower.\n\nThere are two accepted methods:\n– A faster process using sawdust directly.\n– A slower method using whole logs.\n\nWhich is superior is an old and moldy debate, and does not yield mushrooms.\n\nDo both, fungi are patient. Your settlers are not."
status = "normal"
enUS = "A note regarding Sawdust.\n\nYour Log Gnawing Station will soon produce it in quantities exceeding aesthetic value. Left unattended, it will accumulate, obstruct operations, and quietly undermine your efficiency.\n\nFortunately, sawdust is still wood. It can be used to cultivate Mushrooms in a Mushroom Grower.\n\nThere are two accepted methods:\n– A faster process using sawdust directly.\n– A slower method using whole logs.\n\nWhich is superior is an old and moldy debate, and does not yield mushrooms.\n\nDo both, fungi are patient. Your settlers are not."
zhCN = "关于锯末的说明。\n\n您的木材啃食站将很快以超出美观价值的数量生产锯末。如果不加以处理，它将会积累，阻碍操作，并悄悄削弱您的效率。\n\n幸运的是，锯末仍然是木材。它可以用于在蘑菇种植槽中培养蘑菇。\n\n有两种公认的方法：\n– 直接使用锯末的快速流程。\n– 使用整根木材的较慢方法。\n\n哪种更优是一个古老且腐朽的争论，并不会产生蘑菇。\n\n两个方法都用，菌类是耐心的。您的定居者可不是。"
zhTW = "關於木屑的備註。\n\n您的木材咬合站將很快產出超過美觀價值的木屑。如果不加以處理，木屑將會積累，阻礙操作，並悄悄削弱您的效率。\n\n幸運的是，木屑仍然是木材。它可以用來在蘑菇培養器中培養蘑菇。\n\n有兩種公認的方法：\n– 一種是直接使用木屑的快速過程。\n– 另一種是使用整根原木的緩慢方法。\n\n哪種更優越是一個陳舊而過時的爭論，且不會產出蘑菇。\n\n兩者皆可，真菌是有耐心的。但您的定居者卻不是。"
ruRU = "Заметка относительно опилок.\n\nВаша станция грызения дров вскоре начнет производить их в количествах, превышающих эстетическую ценность. Если оставить это без внимания, опилки будут накапливаться, препятствовать операциям и тихо подрывать вашу эффективность.\n\nК счастью, опилки все еще являются древесиной. Их можно использовать для культивирования грибов в грибной теплице.\n\nСуществует два принятых метода:\n– Более быстрый процесс с использованием опилок напрямую.\n– Более медленный метод с использованием целых бревен.\n\nКакой из них лучше — старая и изъезженная дискуссия, не приносящая грибов.\n\nДелайте и то, и другое, грибы терпеливы. Ваши поселенцы — нет."
jaJP = "「おがくずに関する注意。\n\nあなたのログガウイングステーションは、すぐに美的価値を超える量のおがくずを生産します。放置すると、蓄積し、業務を妨げ、静かに効率を損なうことになります。\n\n幸いなおがくずは木材の一種です。これを利用して、マッシュルームグロワーでキノコを栽培することができます。\n\n2つの受け入れられた方法があります：\n– おがくずを直接使用する速いプロセス。\n– 丸太を使用する遅い方法。\n\nどちらが優れているかは古くてカビの生えた議論であり、キノコを生じることはありません。\n\nどちらも行ってください、きのこは我慢強いです。しかし、あなたの入植者はそうではありません。」"
frFR = "Une note concernant la sciure.\n\nVotre station de concassage de bûches produira bientôt de la sciure en quantités dépassant la valeur esthétique. Si elle est laissée sans surveillance, elle s'accumulera, obstruera les opérations et sapera discrètement votre efficacité.\n\nHeureusement, la sciure est toujours du bois. Elle peut être utilisée pour cultiver des champignons dans un cultivateur de champignons.\n\nIl existe deux méthodes acceptées :\n– Un processus plus rapide utilisant directement la sciure.\n– Une méthode plus lente utilisant des bûches entières.\n\nLa supériorité de l'une ou l'autre est un vieux débat poussiéreux qui ne produit pas de champignons.\n\nFaites les deux, les champignons sont patients. Vos colons ne le sont pas."
deDE = "Eine Notiz zu Sägemehl.\n\nIhre Holzgnawstation wird bald Mengen produzieren, die den ästhetischen Wert überschreiten. Wenn sie unbeaufsichtigt bleibt, wird sie sich ansammeln, den Betrieb behindern und leise Ihre Effizienz untergraben.\n\nGlücklicherweise ist Sägemehl immer noch Holz. Es kann verwendet werden, um Pilze in einem Pilzkultivator anzubauen.\n\nEs gibt zwei akzeptierte Methoden:\n– Ein schnellerer Prozess unter Verwendung von Sägemehl direkt.\n– Eine langsamere Methode unter Verwendung ganzer Stämme.\n\nWelche überlegen ist, ist eine alte und schimmelige Debatte und bringt keine Pilze hervor.\n\nMachen Sie beides, Fungi sind geduldig. Ihre Siedler sind es nicht."
plPL = "Uwaga dotycząca trocin.\n\nTwoja Stacja Gryzienia Kłód wkrótce zacznie produkować je w ilościach przekraczających wartość estetyczną. Pozostawione bez nadzoru, będą się gromadzić, utrudniając operacje i cicho podważając twoją efektywność.\n\nNa szczęście trociny to wciąż drewno. Można je wykorzystać do uprawy grzybów w Hodowli Grzybów.\n\nIstnieją dwie akceptowane metody:\n– Szybszy proces wykorzystujący trociny bezpośrednio.\n– Wolniejsza metoda wykorzystująca całe kłody.\n\nKtóra z nich jest lepsza, to stara i zastała debata, która nie przynosi grzybów.\n\nZrób to obu sposobami, grzyby są cierpliwe. Twoi osadnicy nie są."
ptBR = "Uma nota sobre o Pó de Serra.\n\nSua Estação de Roer Troncos em breve produzirá isso em quantidades que excedem o valor estético. Se deixado sem supervisão, acumulará, obstruirá operações e minará silenciosamente sua eficiência.\n\nFelizmente, o pó de serra ainda é madeira. Pode ser usado para cultivar Cogumelos em um Cultivador de Cogumelos.\n\nExistem dois métodos aceitos:\n– Um processo mais rápido usando pó de serra diretamente.\n– Um método mais lento usando troncos inteiros.\n\nQual é superior é um debate antigo e mofado, e não resulta em cogumelos.\n\nFaça os dois, os fungos são pacientes. Seus colonos não são."
koKR = "톱밥에 관한 메모입니다.\n\n당신의 통나무 갉기 작업장이 곧 미적 가치를 초과하는 양의 톱밥을 생산하게 될 것입니다. 방치하면 축적되어 작업을 방해하고 조용히 효율성을 저하시킬 것입니다.\n\n다행히도 톱밥은 여전히 나무입니다. 이를 사용해 버섯 재배기에서 버섯을 재배할 수 있습니다.\n\n두 가지 인정된 방법이 있습니다:\n– 톱밥을 직접 사용하여 빠른 과정.\n– 통나무를 이용한 느린 방법.\n\n어떤 것이 우월한지는 오래된 논쟁이며, 버섯을 생산하지 않습니다.\n\n두 방법 모두 해보세요, 곰팡이는 인내심이 강합니다. 당신의 정착민들은 그렇지 않습니다."
csCZ = "Upozornění týkající se pilin.\n\nVaše stanice na kousání klád brzy začne produkovat piliny v množstvích převyšujících estetickou hodnotu. Pokud je ponecháte bez dozoru, hromadí se, budou překážet operacím a potichu podkopou vaši efektivitu.\n\nNaštěstí jsou piliny stále dřevo. Lze je využít k pěstování hub ve houbovém pěstírně.\n\nExistují dvě akceptované metody:\n– Rychlejší proces používající piliny přímo.\n– Pomalejší metoda používající celé klády.\n\nKterá metoda je lepší, je starý a zastaralý debat, a nevytváří houby.\n\nDělejte obojí, houby jsou trpělivé. Vaši osadníci nikoli."
viVN = "Một ghi chú về Cám Gỗ.\n\nTrạm Gặm Gỗ của bạn sắp sản xuất nó với số lượng vượt quá giá trị thẩm mỹ. Nếu để nó không được xử lý, nó sẽ tích tụ, cản trở hoạt động và âm thầm làm giảm hiệu suất của bạn.\n\nMay mắn thay, cám gỗ vẫn là gỗ. Nó có thể được sử dụng để trồng Nấm trong một Máy Trồng Nấm.\n\nCó hai phương pháp được chấp nhận:\n– Một quy trình nhanh hơn sử dụng cám gỗ trực tiếp.\n– Một phương pháp chậm hơn sử dụng toàn bộ thân gỗ.\n\nPhương pháp nào tốt hơn là một cuộc tranh luận cũ và mốc meo, và không mang lại nấm.\n\nLàm cả hai, nấm thì kiên nhẫn. Còn những người định cư của bạn thì không."
trTR = "Sawdust hakkında bir not.\n\nKütük Dişleme İstasyonunuz yakında estetik değerini aşan miktarlarda talaş üretecek. Sahipsiz bırakıldığında, birikir, operasyonları engeller ve verimliliğinizi gizlice baltalar.\n\nNeyse ki, talaş hâlâ odun. Bir Mantar Yetiştiricisinde Mantar yetiştirmek için kullanılabilir.\n\nİki kabul edilen yöntem vardır:\n– Talaşı doğrudan kullanan daha hızlı bir süreç.\n– Tam kütükleri kullanan daha yavaş bir yöntem.\n\nHangisinin üstün olduğu eski ve küflü bir tartışmadır ve mantar vermez.\n\nHer ikisini de yapın, mantarlar sabırlıdır. Kolonistleriniz sabırlı değildir."

["Tutorial.PlanksSawdustAndPriorities.BuildHaulerHouse.Whitepaws"]
raw = "You may have noticed that certain buildings <color=#FF6EC7>can function without workers.</color>. This does not mean deliveries will arrive magically.\n\nConstruct a Lodge to provide dedicated Haulers. Other structures capable of housing haulers are equally acceptable. The important matter is that someone carries what must be carried.\n\nYou will also recall that our block-formed buildings are watertight. This is not decorative, consider placing the Lodge directly within the river. Narrowing the current now will simplify future dam construction.\n\nWe are beavers. Every structure is an opportunity to reshape the river."
status = "normal"
enUS = "You may have noticed that certain buildings <color=#FF6EC7>can function without workers.</color>. This does not mean deliveries will arrive magically.\n\nConstruct a Lodge to provide dedicated Haulers. Other structures capable of housing haulers are equally acceptable. The important matter is that someone carries what must be carried.\n\nYou will also recall that our block-formed buildings are watertight. This is not decorative; consider placing the Lodge directly within the river. Narrowing the current now will simplify future dam construction.\n\nWe are beavers. Every structure is an opportunity to reshape the river."
zhCN = "您可能注意到某些建筑<color=#FF6EC7>可以在没有工人的情况下运作。</color>这并不意味着物资会神奇地送到。\n\n建造一个小屋以提供专门的运输工人。其他能够容纳运输工人的建筑同样可以接受。重要的是有人搬运必须搬运的物品。\n\n您还会记得我们的块状建筑是防水的。这并不是装饰性理由，考虑将小屋直接放置在河中。现在缩小水流将简化未来的坝建设。\n\n我们是海狸。每一座建筑都是重塑河流的机会。"
zhTW = "您可能注意到某些建築<color=#FF6EC7>可以在沒有工人的情況下運作。</color>這並不意味著物品會神奇地送達。\n\n建造一座小屋來提供專門的搬運工。其他能容納搬運工的建築同樣可行。重要的是必須有某人來搬運必須運送的物品。\n\n您也會記得我們的塊狀建築是防水的。這不是裝飾性用途，考慮將小屋直接放置在河流中。現在縮小水流將簡化未來的水壩建設。\n\n我們是海狸。每一座建築都是改造河流的機會。"
ruRU = "Вы могли заметить, что определенные здания <color=#FF6EC7>могут функционировать без рабочих.</color> Это не значит, что доставки будут приходить волшебным образом.\n\nПостройте Убежище, чтобы обеспечить специализированных Перевозчиков. Другие структуры, способные размещать перевозчиков, также приемлемы. Важно, чтобы кто-то переносил то, что необходимо перенести.\n\nВы также вспомните, что наши здания в форме блоков водонепроницаемы. Это не для декора, подумайте о том, чтобы разместить Убежище прямо в реке. Сужение течения сейчас упростит будущую постройку дамбы.\n\nМы бобры. Каждая структура — это возможность изменить реку."
jaJP = "「特定の建物が<color=#FF6EC7>労働者なしで機能することができる</color>ことに気づいたかもしれません。しかし、これが配達が魔法のように到着することを意味するわけではありません。\n\n専用の搬送者を提供するためにロッジを建設してください。他の搬送者を収容できる建物も同様に受け入れられます。重要なのは、運ばなければならないものを誰かが運ぶことです。\n\nまた、私たちのブロック型の建物は防水であることを思い出してください。これは装飾的なものではなく、ロッジを川のすぐ中に置くことを考えてください。現在を狭めることで、将来のダム建設が簡単になります。\n\n私たちはビーバーです。すべての構造物は、川を再形成する機会です。」"
frFR = "Vous avez peut-être remarqué que certains bâtiments <color=#FF6EC7>peuvent fonctionner sans travailleurs.</color>. Cela ne signifie pas que les livraisons arriveront par magie.\n\nConstruisez un Pavillon pour fournir des transporteurs dédiés. D'autres structures capables d'héberger des transporteurs sont également acceptables. L'important est que quelqu'un transporte ce qui doit être transporté.\n\nVous vous rappellerez également que nos bâtiments en forme de blocs sont étanches. Ce n'est pas décoratif, envisagez de placer le Pavillon directement dans la rivière. Rétrécir le courant maintenant simplifiera la construction de futurs barrages.\n\nNous sommes des castors. Chaque structure est une opportunité de redessiner la rivière."
deDE = "Vielleicht ist Ihnen aufgefallen, dass bestimmte Gebäude <color=#FF6EC7>ohne Arbeiter funktionieren können.</color>. Das bedeutet jedoch nicht, dass die Lieferungen magisch ankommen.\n\nBauen Sie eine Lodge, um dedizierte Transporter bereitzustellen. Auch andere Gebäude, die Transporter beherbergen können, sind ebenso akzeptabel. Das Wichtige ist, dass jemand das transportiert, was transportiert werden muss.\n\nSie werden sich auch daran erinnern, dass unsere blockförmigen Gebäude wasserdicht sind. Das ist nicht dekorativ, bedenken Sie, die Lodge direkt im Fluss zu platzieren. Das Verengen des Stroms wird in Zukunft den Dammaufbau vereinfachen.\n\nWir sind Biber. Jedes Gebäude ist eine Gelegenheit, den Fluss umzugestalten."
plPL = "Mogłeś zauważyć, że niektóre budynki <color=#FF6EC7>można obsługiwać bez pracowników.</color>. To nie oznacza, że dostawy przyjdą w sposób magiczny.\n\nZbuduj Ławę, aby zapewnić dedykowanych Przewoźników. Inne struktury mogące pomieścić przewoźników są równie akceptowalne. Ważne jest, aby ktoś nosił to, co musi być niesione.\n\nZ pewnością pamiętasz, że nasze budynki w formie bloków są wodoodporne. To nie jest dekoracyjne, rozważ umieszczenie Ławy bezpośrednio w rzece. Zawężenie nurtu teraz ułatwi przyszłą budowę zapory.\n\nJesteśmy bobrami. Każda struktura to okazja do przekształcenia rzeki."
ptBR = "Você pode ter notado que certos edifícios <color=#FF6EC7>podem funcionar sem trabalhadores.</color> Isso não significa que as entregas irão chegar magicamente.\n\nConstrua uma Cabana para fornecer Transporteiros dedicados. Outras estruturas capazes de acomodar transporteiros também são aceitáveis. O importante é que alguém transporte o que deve ser transportado.\n\nVocê também se lembrará que nossos edifícios em forma de bloco são estanques. Isso não é decorativo, considere colocar a Cabana diretamente no rio. Estreitar a correnteza agora facilitará a construção futura da represa.\n\nNós somos castores. Cada estrutura é uma oportunidade de remodelar o rio."
koKR = "특정 건물이 <color=#FF6EC7>근로자 없이 작동할 수 있다는 것을 알아차렸을 것입니다.</color> 이는 배달이 마법처럼 도착한다는 의미는 아닙니다.\n\n전담 수거자를 제공할 수 있는 롯지를 건설하세요. 수거자를 수용할 수 있는 다른 구조물도 동일하게 허용됩니다. 중요한 것은 누군가 운반해야 할 것을 운반하는 것입니다.\n\n우리의 블록 형태 건물이 방수라는 것을 기억할 것입니다. 이는 장식용이 아니며, 롯지를 강 안에 직접 배치하는 것을 고려해 보세요. 현재의 흐름을 좁히는 것은 미래의 댐 건설을 간소화할 것입니다.\n\n우리는 비버입니다. 모든 구조물은 강을 재형성할 수 있는 기회입니다."
csCZ = "Měli jste si všimnout, že určité budovy <color=#FF6EC7>mohou fungovat bez pracovníků.</color>. To neznamená, že dodávky přijdou kouzelně.\n\nPostavte Přístřešek, aby poskytl specializované nosiče. Další struktury schopné ubytovat nosiče jsou stejně přijatelné. Důležité je, aby někdo nesl to, co je třeba nést.\n\nTaké si vzpomenete, že naše budovy ve tvaru bloků jsou vodotěsné. To není dekorativní, zvažte umístění Přístřešku přímo do řeky. Zúžení proudu nyní usnadní budoucí výstavbu hráze.\n\nJsme bobři. Každá struktura je příležitostí přetvořit řeku."
viVN = "Bạn có thể đã nhận thấy rằng một số công trình <color=#FF6EC7>có thể hoạt động mà không cần công nhân.</color>. Điều này không có nghĩa là hàng hóa sẽ tự động được giao đến.\n\nHãy xây dựng một Lodge để cung cấp các Công nhân chuyên trách. Những công trình khác có khả năng chứa công nhân cũng là chấp nhận được. Điều quan trọng là có người mang những gì cần mang.\n\nBạn cũng sẽ nhớ rằng các công trình có hình khối của chúng tôi là kín nước. Điều này không phải mang tính trang trí, hãy xem xét việc đặt Lodge ngay trong lòng sông. Việc làm hẹp dòng chảy bây giờ sẽ đơn giản hóa việc xây dựng đập trong tương lai.\n\nChúng ta là loài nhím. Mỗi công trình là một cơ hội để định hình lại dòng sông."
trTR = "Bazı binaların <color=#FF6EC7>çalışan olmadan da işlev görebileceğini</color> fark etmiş olabilirsiniz. Bu, teslimatların sihirli bir şekilde geleceği anlamına gelmez.\n\nÖzel taşıyıcılar sağlamak için bir Lodge inşa edin. Taşıyıcıları barındırabilen diğer yapılar da kabul edilebilir. Önemli olan, taşınması gereken her şeyin taşınmasıdır.\n\nAyrıca, blok biçimindeki binalarımızın su geçirmez olduğunu hatırlayacaksınız. Bu sadece dekoratif değil, Lodge'u doğrudan nehir içine yerleştirmeyi düşünün. Akıntıyı daraltmak, gelecekteki baraj inşasını kolaylaştıracaktır.\n\nBiz kunduzlarız. Her yapı, nehri yeniden şekillendirmek için bir fırsattır."

["Tutorial.PlanksSawdustAndPriorities.MaxPrioFarm.Whitepaws"]
raw = "A word on priorities.\n\nYou have access to five levels of urgency. This does not mean you are expected to use “Maximum” as a personality trait.\n\nAssign Maximum Priority <color=red>only</color> to the Farms and Water Pumps. Food and water sustain the colony. Without them, other concerns resolve themselves rather quickly.\n\nThe Forester is important. It is not urgent. Set it to High Priority, not Maximum.\n\nIf everything is critical, nothing is.\n\nYour settlers can only be in one place at a time. We trust this is not new information."
status = "normal"
enUS = "A word on priorities.\n\nYou have access to five levels of urgency. This does not mean you are expected to use “Maximum” as a personality trait.\n\nAssign Maximum Priority <color=red>only</color> to the Farms and Water Pumps. Food and water sustain the colony. Without them, other concerns resolve themselves rather quickly.\n\nThe Forester is important. It is not urgent. Set it to High Priority, not Maximum.\n\nIf everything is critical, nothing is.\n\nYour settlers can only be in one place at a time. We trust this is not new information."
zhCN = "关于优先级的说明。\n\n您可以使用五个紧急级别。这并不意味着您需要将“最高优先级”作为个性特征。\n\n请将最高优先级<color=red>仅仅</color>分配给农场和水泵。食物和水是维持殖民地的基础。没有它们，其他问题会迅速得到解决。\n\n伐木工很重要，但并不紧急。将其设置为高优先级，而不是最高优先级。\n\n如果所有事情都是关键的，那就没有任何事情是关键的。\n\n您的定居者一次只能在一个地方。我们相信这不是新信息。"
zhTW = "優先級的說明。\n\n你可以使用五個緊急程度層級。這並不意味著你需要將「最高」作為性格特徵。\n\n將最高優先級<color=red>僅</color>分配給農場和水泵。食物和水是支持殖民地的主體。沒有它們，其他問題很快就會自我解決。\n\n樹藝師是重要的，但並不緊急。將其設置為高優先級，而不是最高。\n\n如果一切都很關鍵，那麼就沒有任何事物是關鍵的。\n\n你的定居者一次只能在一個地方。我們相信這不是新信息。"
ruRU = "Слово о приоритетах.\n\nУ вас есть доступ к пяти уровням срочности. Это не значит, что вы должны использовать «Максимальный» в качестве черты характера.\n\nПрисваивайте Максимальный Приоритет <color=red>только</color> Фермам и Водяным Насосам. Пища и вода поддерживают колонию. Без них другие проблемы решаются довольно быстро.\n\nЛесник важен. Это не срочно. Установите высокий приоритет, а не максимальный.\n\nЕсли все критично, значит, ничего не критично.\n\nВаши поселенцы могут находиться только в одном месте одновременно. Мы надеемся, что это не новая информация."
jaJP = "優先順位についての言葉。\n\n緊急度は五つのレベルに分かれています。これは「最大」を性格的な特徴として使うことを求めているわけではありません。\n\n最大の優先度を<color=red>農場</color>と<color=red>水ポンプ</color>にのみ割り当ててください。食料と水は植民地を支えます。それがなければ、他の問題はすぐに解決してしまいます。\n\n森を管理する人は重要です。しかし、それは緊急ではありません。高優先度に設定してください、最大ではなく。\n\nすべてが重要であれば、何も重要ではありません。\n\nあなたの入植者は一度に一つの場所にしかいられません。これが新しい情報ではないことを信じています。"
frFR = "Un mot sur les priorités.\n\nVous avez accès à cinq niveaux d'urgence. Cela ne signifie pas que vous êtes censé utiliser \"Maximum\" comme trait de personnalité.\n\nAssignez la Priorité Maximale <color=red>uniquement</color> aux Fermes et aux Pompes à Eau. La nourriture et l'eau soutiennent la colonie. Sans elles, d'autres préoccupations se résolvent assez rapidement.\n\nLe Forestier est important. Ce n'est pas urgent. Mettez-le à Haute Priorité, pas à Maximum.\n\nSi tout est critique, rien ne l'est.\n\nVos colons ne peuvent être qu'à un seul endroit à la fois. Nous faisons confiance au fait que ce n'est pas une information nouvelle."
deDE = "Ein Wort zu Prioritäten.\n\nSie haben Zugriff auf fünf Dringlichkeitsstufen. Das bedeutet jedoch nicht, dass Sie „Maximal“ als Persönlichkeitsmerkmal verwenden sollen.\n\nWeisen Sie die Maximalpriorität <color=red>nur</color> den Farmen und Wasserpumpen zu. Nahrung und Wasser sind für die Kolonie lebenswichtig. Ohne sie lösen sich andere Probleme recht schnell von selbst.\n\nDer Förster ist wichtig. Es ist nicht dringend. Stellen Sie ihn auf hohe Priorität, nicht auf maximal.\n\nWenn alles kritisch ist, ist nichts kritisch.\n\nIhre Siedler können sich immer nur an einem Ort gleichzeitig aufhalten. Wir vertrauen darauf, dass dies keine neuen Informationen für Sie sind."
plPL = "Słowo o priorytetach.\n\nMasz dostęp do pięciu poziomów pilności. To nie oznacza, że powinieneś używać „Maksimum” jako cechy osobowości.\n\nPrzypisz Maksymalny Priorytet <color=red>tylko</color> do Farm i Wodociągów. Jedzenie i woda podtrzymują kolonię. Bez nich inne zmartwienia szybko się rozwiązują.\n\nLeśniczy jest ważny. Nie jest pilny. Ustaw go na Wysoki Priorytet, nie Maksymalny.\n\nJeśli wszystko jest krytyczne, to nic nie jest.\n\nTwoi osadnicy mogą być tylko w jednym miejscu w danym czasie. Ufamy, że to nie jest nowa informacja."
ptBR = "Uma palavra sobre prioridades.\n\nVocê tem acesso a cinco níveis de urgência. Isso não significa que você deve usar “Máximo” como um traço de personalidade.\n\nAtribua Prioridade Máxima <color=red>somente</color> às Fazendas e Bombas de Água. Comida e água sustentam a colônia. Sem elas, outras preocupações se resolvem rapidamente.\n\nO Pioneiro é importante. Não é urgente. Defina como Alta Prioridade, não Máxima.\n\nSe tudo é crítico, nada é.\n\nSeus colonos só podem estar em um lugar de cada vez. Confiamos que isso não é uma informação nova."
koKR = "우선 순위에 대한 말씀.\n\n긴급성은 다섯 가지 수준으로 나뉩니다. 이것이 \"최대\"를 성격 특성으로 사용해야 한다는 의미는 아닙니다.\n\n최대한 우선 순위 <color=red>오직</color> 농장과 급수 펌프에만 할당하세요. 음식과 물은 식민지를 유지합니다. 이들이 없으면 다른 문제들은 비교적 빠르게 해결됩니다.\n\n임업가는 중요합니다. 하지만 긴급하지는 않습니다. 최대 우선 순위가 아니라 높은 우선 순위로 설정하세요.\n\n모든 것이 위급해 보인다면, 사실 아무것도 위급하지 않은 것입니다.\n\n정착민들은 한 번에 한 곳에만 있을 수 있습니다. 이 정보가 새롭지 않기를 바랍니다."
csCZ = "Slovo o prioritách.\n\nMáte přístup k pěti úrovním naléhavosti. To neznamená, že se očekává, že „Maximální“ použijete jako osobnostní rys.\n\nPřiřazujte Maximální prioritu <color=red>pouze</color> Farmám a Vodním pumpám. Jídlo a voda udržují kolonii. Bez nich se ostatní problémy vyřeší docela rychle.\n\nLesník je důležitý. Není to naléhavé. Nastavte to na Vysokou prioritu, ne Maximální.\n\nPokud je všechno kritické, není nic.\n\nVaši osadníci mohou být pouze na jednom místě najednou. Doufáme, že to nejsou nové informace."
viVN = "Một vài lời về ưu tiên.\n\nBạn có quyền truy cập vào năm cấp độ khẩn cấp. Điều này không có nghĩa là bạn nên coi “Cao nhất” là một đặc điểm tính cách.\n\nChỉ định Ưu tiên Cao Nhất <color=red>chỉ</color> cho các Nông trại và Bơm Nước. Thực phẩm và nước là sinh khí của thuộc địa. Nếu không có chúng, những mối quan tâm khác sẽ tự giải quyết khá nhanh chóng.\n\nNgười trồng rừng rất quan trọng. Nó không khẩn cấp. Đặt nó ở Ưu tiên Cao, không phải Cao Nhất.\n\nNếu mọi thứ đều quan trọng, thì không có gì là quan trọng.\n\nNgười định cư của bạn chỉ có thể ở một nơi tại một thời điểm. Chúng tôi tin rằng đây không phải là thông tin mới."
trTR = "Öncelikler hakkında bir kelime.\n\nBeş aciliyet seviyesi erişiminizde mevcut. Bu, \"Maksimum\"u bir kişilik özelliği olarak kullanmanızın beklendiği anlamına gelmez.\n\nMaksimum Önceliği <color=red>sadece</color> Tarım Alanları ve Su Pompalarına atayın. Gıda ve su koloniyi ayakta tutar. Onlarsız, diğer sorunlar oldukça hızlı bir şekilde kendiliğinden çözülür.\n\nOrmanlık alanı koruyan önemli bir unsurdur. Acil değildir. Yüksek Öncelik olarak ayarlayın, Maksimum değil.\n\nHer şey kritikse, hiçbir şey kritik değildir.\n\nYerleşimcileriniz aynı anda yalnızca bir yerde olabilir. Bunun yeni bir bilgi olmadığını umuyoruz."

["Tutorial.PlanksSawdustAndPriorities.MinPriorityMushroomGrower.Whitepaws"]
raw = "A colony is not defined by how many buildings it possesses, but by how many it can meaningfully operate.\n\nCertain structures, including the Woodburner and the Mushroom Growers, are capable of functioning without constant supervision. As stated previously, they indicate:\n\n<color=#FF6EC7>Can function without workers.</color>\n\nSet both Mushroom Growers to Minimal Priority, as well as any <color=green>Woodburner</color> or <color=green>Primitive Smelter</color> you may have built while ignoring our pleas not to improvise.\n\nTo ensure materials are still delivered, set your Lodge (employing the hauler) to High Priority.\n\nLastly, you may want to lower the priority of the <color=green>Log Gnawing Station</color> and/or <color=green>Primitive Mine</color>. This way, they will operate only when the workforce is abundant.\n\nIf everything runs at all times, then nothing runs when it matters."
status = "normal"
enUS = "A colony is not defined by how many buildings it possesses, but by how many it can meaningfully operate.\n\nCertain structures, including the Woodburner and the Mushroom Growers, are capable of functioning without constant supervision. As stated previously, they indicate:\n\n<color=#FF6EC7>Can function without workers.</color>\n\nSet both Mushroom Growers to Minimal Priority, as well as any <color=green>Woodburner</color> or <color=green>Primitive Smelter</color> you may have built while ignoring our pleas not to improvise.\n\nTo ensure materials are still delivered, set your Lodge (employing the hauler) to High Priority.\n\nLastly, you may want to lower the priority of the <color=green>Log Gnawing Station</color> and/or <color=green>Primitive Mine</color>. This way, they will operate only when the workforce is abundant.\n\nIf everything runs at all times, then nothing runs when it matters."
zhCN = "一个殖民地的定义不在于它拥有多少建筑，而在于它能够有效运作多少建筑。\n\n某些结构，包括木材燃烧炉和蘑菇种植者，可以在没有持续监督的情况下运作。如前所述，它们显示：\n\n<color=#FF6EC7>可以在没有工人的情况下运作。</color>\n\n将两个蘑菇种植者和任何<color=green>木材燃烧炉</color>或<color=green>原始冶炼厂</color>的优先级设置为最低，尽管我们的请求不让你临时 improvisation。\n\n为了确保材料仍然能够交付，将你的宿舍（雇用搬运工）设置为高优先级。\n\n最后，你可能想要降低<color=green>木头啃食站</color>和/或<color=green>原始矿井</color>的优先级。这样，它们只有在劳动力充足时才会运作。\n\n如果一切都在运行，那么当重要时就没有东西可以运行。"
zhTW = "一個殖民地的定義不在於擁有多少建築，而在於它能有效運作多少建築。\n\n某些結構，包括木爐和蘑菇種植者，可以在無需持續監督的情況下運行。如前所述，它們顯示：\n\n<color=#FF6EC7>可以在沒有工人的情況下運作。</color>\n\n將兩個蘑菇種植者的優先級設為最低，還有您可能在無視我們不要隨意改建的呼籲的情況下建造的任何<color=green>木爐</color>或<color=green>初級熔爐</color>。\n\n為了確保材料仍然能夠送達，將您的小木屋（雇用搬運工）設為高優先級。\n\n最後，您可能想降低<color=green>原木啃食站</color>和/或<color=green>初級礦井</color>的優先級。這樣，他們將只有在勞動力充足時才會運作。\n\n如果一切都在任何時候都運行，那麼在重要時刻就什麼都不運行。"
ruRU = "Колония не определяется количеством зданий, которые она имеет, а тем, сколько из них она может эффективно использовать.\n\nНекоторые конструкции, в том числе Древоруб и Грибоводы, способны функционировать без постоянного контроля. Как было сказано ранее, они указывают:\n\n<color=#FF6EC7>Могут функционировать без работников.</color>\n\nУстановите для обоих Грибоводов Минимальный Приоритет, а также для любого <color=green>Древоруба</color> или <color=green>Примитивного Плавильни</color>, которые вы могли построить, игнорируя наши просьбы не импровизировать.\n\nЧтобы обеспечить доставку материалов, установите ваш Лагерь (с грузчиком) на Высокий Приоритет.\n\nНаконец, вы можете захотеть понизить приоритет <color=green>Станции Обгрызания Бревен</color> и/или <color=green>Примитивной Шахты</color>. Таким образом, они будут работать только тогда, когда рабочей силы будет много.\n\nЕсли все работает постоянно, то ничего не работает, когда это действительно важно."
jaJP = "コロニーはどれだけの建物を持っているかではなく、どれだけ意味のある運営ができるかによって定義されます。\n\n木焚き炉やキノコ栽培者を含む特定の構造物は、常に監視することなく機能することができます。前述の通り、彼らは以下を示します：\n\n<color=#FF6EC7>労働者なしで機能可能。</color>\n\nキノコ栽培者を最小優先度に設定し、我々の即興を避けるようにとのお願いを無視して建てた<color=green>木焚き炉</color>や<color=green>原始的な精錬所</color>も同様にします。\n\n材料がまだ供給されるように、ロッジ（運搬者を雇用）を高優先度に設定してください。\n\n最後に、<color=green>丸太のかじり場</color>や<color=green>原始的な鉱山</color>の優先度を下げることを検討してください。こうすることで、労働力が豊富な時のみ運営されます。\n\nすべてが常に動いていると、重要な時には何も動かなくなります。"
frFR = "Une colonie n'est pas définie par le nombre de bâtiments qu'elle possède, mais par le nombre qu'elle peut faire fonctionner de manière significative.\n\nCertaines structures, y compris le Brûleur de Bois et les Cultivateurs de Champignons, sont capables de fonctionner sans supervision constante. Comme indiqué précédemment, elles indiquent :\n\n<color=#FF6EC7>Peut fonctionner sans ouvriers.</color>\n\nRéglez les deux Cultivateurs de Champignons sur Priorité Minimale, ainsi que tout <color=green>Brûleur de Bois</color> ou <color=green>Fonderie Primitive</color> que vous auriez construit tout en ignorant nos appels à ne pas improviser.\n\nPour garantir que les matériaux soient toujours livrés, réglez votre Refuge (employant le transporteur) sur Haute Priorité.\n\nEnfin, vous voudrez peut-être abaisser la priorité de la <color=green>Station de Rognage de Bûches</color> et/ou de la <color=green>Mine Primitive</color>. De cette façon, elles ne fonctionneront que lorsque la main-d'œuvre est abondante.\n\nSi tout fonctionne en permanence, alors rien ne fonctionne quand cela compte."
deDE = "Eine Kolonie wird nicht durch die Anzahl der Gebäude definiert, die sie besitzt, sondern durch die Anzahl, die sie sinnvoll betreiben kann.\n\nBestimmte Strukturen, einschließlich des Holzofens und der Pilzbauer, sind in der Lage, ohne ständige Beaufsichtigung zu funktionieren. Wie bereits erwähnt, zeigen sie an:\n\n<color=#FF6EC7>Könnte ohne Arbeiter funktionieren.</color>\n\nSetzen Sie beide Pilzbauer auf minimale Priorität, sowie jeden <color=green>Holzofen</color> oder <color=green>Primitive Schmelze</color>, den Sie möglicherweise gebaut haben, während Sie unsere Aufforderungen ignoriert haben, nicht improvisieren.\n\nUm sicherzustellen, dass Materialien weiterhin geliefert werden, setzen Sie Ihre Lodge (mit einem Förderer) auf hohe Priorität.\n\nSchließlich möchten Sie möglicherweise die Priorität der <color=green>Stamm-Knabberstation</color> und/oder <color=green>Primitive Mine</color> senken. Auf diese Weise werden sie nur betrieben, wenn die Arbeitskräfte im Überfluss vorhanden sind.\n\nWenn alles jederzeit funktioniert, funktioniert nichts, wenn es darauf ankommt."
plPL = "Kolonia nie jest definiowana przez liczbę posiadanych budynków, lecz przez liczbę, którą może sensownie obsługiwać.\n\nNiektóre struktury, w tym Palnik i Uprawy Grzybów, są w stanie funkcjonować bez stałej nadzoru. Jak wcześniej wspomniano, wskazują:\n\n<color=#FF6EC7>Mogą działać bez pracowników.</color>\n\nUstaw oba Uprawy Grzybów na Minimalny Priorytet, a także wszelkie <color=green>Palniki</color> lub <color=green>Pierwotne Piec</color>, które mogłeś zbudować, pomijając nasze prośby, aby nie improwizować.\n\nAby zapewnić dostawę materiałów, ustaw swoją Leśniczówkę (z zatrudnionym nosicielem) na Wysoki Priorytet.\n\nNa koniec, możesz chcieć obniżyć priorytet <color=green>Stacji Gnicia Kłód</color> i/lub <color=green>Pierwotnej Kopalni</color>. W ten sposób będą działać tylko wtedy, gdy zasoby siły roboczej są obfite.\n\nJeśli wszystko działa przez cały czas, to nic nie działa, gdy jest to ważne."
ptBR = "Uma colônia não é definida pela quantidade de edifícios que possui, mas sim pela quantidade que pode operar de maneira significativa.\n\nCertas estruturas, incluindo o Queimador de Madeira e os Cultivadores de Cogumelos, são capazes de funcionar sem supervisão constante. Como mencionado anteriormente, elas indicam:\n\n<color=#FF6EC7>Pode funcionar sem trabalhadores.</color>\n\nDefina ambos os Cultivadores de Cogumelos para Prioridade Mínima, assim como qualquer <color=green>Queimador de Madeira</color> ou <color=green>Forno Primário</color> que você possa ter construído ignorando nossos apelos para não improvisar.\n\nPara garantir que os materiais ainda sejam entregues, defina sua Casa (empregando o transportador) para Prioridade Alta.\n\nPor fim, você pode querer reduzir a prioridade da <color=green>Estação de Roer Toras</color> e/ou da <color=green>Mineração Primária</color>. Assim, elas funcionarão apenas quando a força de trabalho for abundante.\n\nSe tudo funciona o tempo todo, então nada funciona quando é importante."
koKR = "식민지는 얼마나 많은 건물을 소유하고 있는지가 아니라 얼마나 의미 있게 운영할 수 있는지에 의해 정의됩니다.\n\n목재 연료와 버섯 재배자를 포함한 특정 구조물은 지속적인 감독 없이도 기능할 수 있습니다. 이전에 언급했듯이, 이들은 다음과 같이 나타냅니다:\n\n<color=#FF6EC7>근로자 없이도 기능 가능.</color>\n\n모든 버섯 재배자의 우선 순위를 최소로 설정하고, 우리의 요구를 무시하고 건설한 <color=green>목재 연료</color> 또는 <color=green>원시 제련소</color>의 우선 순위도 최소로 설정하십시오.\n\n자재가 여전히 배송되도록 하려면, 운반인을 고용하여 숙소의 우선 순위를 높게 설정하십시오.\n\n마지막으로, <color=green>통나무 갉아먹기 지점</color>과/또는 <color=green>원시 광산</color>의 우선 순위를 낮추는 것도 좋습니다. 이렇게 하면 인력이 풍부할 때만 운영됩니다.\n\n모든 것이 항상 작동한다면, 중요한 순간에는 아무것도 작동하지 않을 것입니다."
csCZ = "Kolonie není definována tím, kolik budov má, ale tím, kolik z nich může smysluplně provozovat.\n\nUrčité struktury, včetně Dřevohořiče a Pěstitelů houb, jsou schopny fungovat bez nepřetržitého dohledu. Jak bylo uvedeno dříve, indikují:\n\n<color=#FF6EC7>Mohou fungovat bez pracovníků.</color>\n\nNastavte oba Pěstitele houb na minimální prioritu, stejně jako jakýkoli <color=green>Dřevohořič</color> nebo <color=green>Primitivní tavicí pec</color>, které jste mohli postavit, zatímco jste ignorovali naše prosby, abyste neimprovizovali.\n\nAby bylo zajištěno dodání materiálů, nastavte svou Chatu (využívající nosiče) na vysokou prioritu.\n\nNakonec možná budete chtít snížit prioritu <color=green>Stanice na okousávání klád</color> a/nebo <color=green>Primitivní doly</color>. Tímto způsobem budou fungovat pouze tehdy, když je pracovní síla dostatečná.\n\nPokud všechno funguje neustále, pak nic nefunguje, když na tom záleží."
viVN = "Một thuộc địa không được định nghĩa bởi số lượng công trình mà nó sở hữu, mà bởi số lượng công trình có thể hoạt động một cách có ý nghĩa.\n\nMột số công trình, bao gồm Lò đốt gỗ và Người trồng nấm, có khả năng hoạt động mà không cần giám sát liên tục. Như đã đề cập trước đó, chúng cho thấy:\n\n<color=#FF6EC7>Có thể hoạt động mà không cần công nhân.</color>\n\nĐặt cả hai Người trồng nấm vào ưu tiên tối thiểu, cũng như bất kỳ <color=green>Lò đốt gỗ</color> hoặc <color=green>Mỏ thô sơ</color> nào bạn có thể đã xây trong khi phớt lờ lời kêu gọi của chúng tôi không nên tự ý điều chỉnh.\n\nĐể đảm bảo vật liệu tiếp tục được cung cấp, hãy đặt Nhà ở của bạn (sử dụng người vận chuyển) ở mức ưu tiên cao.\n\nCuối cùng, bạn có thể muốn giảm bớt ưu tiên của <color=green>Trạm gặm gỗ</color> và/hoặc <color=green>Mỏ thô sơ</color>. Bằng cách này, chúng sẽ chỉ hoạt động khi lực lượng lao động dồi dào.\n\nNếu mọi thứ hoạt động liên tục, thì sẽ không có gì hoạt động khi cần thiết."
trTR = "Bir koloni, sahip olduğu bina sayısıyla değil, ne kadarını anlamlı bir şekilde işletebildiğiyle tanımlanır.\n\nOdun yakıcılar ve mantar yetiştiricileri gibi belirli yapılar, sürekli gözetim olmadan çalışabilme yeteneğine sahiptir. Daha önce belirtildiği gibi, bunlar gösterir:\n\n<color=#FF6EC7>İşçiler olmadan çalışabilir.</color>\n\nHer iki mantar yetiştiricisini de Minimum Önceliğe ayarlayın, ayrıca, ilhamımızı göz ardı ederek inşa ettiğiniz herhangi bir <color=green>Odun Yakıcı</color> veya <color=green>İlkel Eritme Fırını</color> için de aynı şekilde yapın.\n\nMalzemelerin hala teslim edilmesini sağlamak için, Lojanızı (yükleyiciyi kullanarak) Yüksek Öncelik olarak ayarlayın.\n\nSon olarak, <color=green>Ağaç Gıcırtı İstasyonunun</color> ve/veya <color=green>İlkel Madenin</color> önceliğini düşürmek isteyebilirsiniz. Bu şekilde, yalnızca iş gücü bol olduğunda çalışacaklardır.\n\nEğer her şey her zaman çalışıyorsa, önemli olduğunda hiçbir şey çalışmaz."

["Tutorial.LetsCook.BuildClaypit.Whitepaws"]
raw = "It seems you have managed to secure the basic necessities. Survival, however, is not the same as refinement.\n\nWith <color=green>Mushrooms</color> and <color=green>Cabbages</color>, you may now prepare <color=green>Braised Cabbage</color> — a meal properly cooked rather than merely harvested. You will find that cooking produces more nourishment than the simple sum of its ingredients.\n\nThis is not magic. It is organization.\n\nTo begin, construct a Clay Pit and extract Clay. Civilized meals require proper vessels, and proper vessels require proper materials.\n\nClay is stored in boxes, should you be interested in such trivia.\n\nWe Whitepaws do not merely survive. We dine."
status = "normal"
enUS = "It seems you have managed to secure the basic necessities. Survival, however, is not the same as refinement.\n\nWith <color=green>Mushrooms</color> and <color=green>Cabbages</color>, you may now prepare <color=green>Braised Cabbage</color> — a meal properly cooked rather than merely harvested. You will find that cooking produces more nourishment than the simple sum of its ingredients.\n\nThis is not magic. It is organization.\n\nTo begin, construct a Clay Pit and extract Clay. Civilized meals require proper vessels, and proper vessels require proper materials.\n\nClay is stored in boxes, should you be interested in such trivia.\n\nWe Whitepaws do not merely survive. We dine."
zhCN = "看起来你已经能够确保基本的生存需求。然而，生存并不等同于精致。\n\n有了<color=green>蘑菇</color>和<color=green>卷心菜</color>，你现在可以准备<color=green>红烧卷心菜</color>——这是一道经过精心烹饪的菜肴，而不仅仅是收获的成果。你会发现，烹饪所产生的营养远超单一成分的简单相加。\n\n这不是魔法。这是组织。\n\n首先，建造一个粘土坑并提取粘土。文明的餐食需要合适的器皿，而合适的器皿需要合适的材料。\n\n粘土储存在箱子里，如果你对此类琐事感兴趣的话。\n\n我们白爪族不仅仅是生存。我们追求美食。"
zhTW = "看來你已經成功確保了基本的生存需求。然而，生存不等於提升。\n\n有了<color=green>蘑菇</color>和<color=green>甘藍</color>，你現在可以準備<color=green>紅燒甘藍</color>——這是一道真正烹調而非僅僅收穫的餐點。你會發現，烹飪所產出的營養遠超過其成分的簡單總和。\n\n這不是魔法，而是組織。\n\n首先，建造一個粘土坑並提取粘土。文明的餐點需要合適的器皿，而合適的器皿需要合適的材料。\n\n粘土會儲存在箱子裡，如果你對這種小知識感興趣的話。\n\n我們白爪族不僅僅是生存。我們享受美食。"
ruRU = "Похоже, вы смогли обеспечить основные потребности. Однако выживание — это не то же самое, что и усовершенствование.\n\nС <color=green>Грибами</color> и <color=green>Капустой</color> вы теперь можете приготовить <color=green>Тушеную Капусту</color> — блюдо, должным образом приготовленное, а не просто собранное. Вы обнаружите, что приготовление пищи дает больше питательных веществ, чем простая сумма её ингредиентов.\n\nЭто не магия. Это организация.\n\nДля начала постройте Глиняный Карьер и добывайте Глину. Цивилизованные блюда требуют надлежащих сосудов, а надлежащие сосуды требуют подходящих материалов.\n\nГлина хранится в коробках, если вам интересно такое любопытство.\n\nМы, Белые Лапки, не просто выживаем. Мы ужинаем."
jaJP = "基本的な必需品を確保することができたようですね。ただし、生き残ることは洗練とは異なります。\n\n<color=green>キノコ</color>と<color=green>キャベツ</color>を使って、<color=green>煮キャベツ</color>を作ることができるようになります — 単に収穫しただけでなく、きちんと調理された食事です。料理は材料の単純な合計以上の栄養を生み出すことを発見するでしょう。\n\nこれは魔法ではありません。組織化です。\n\nまず、粘土坑を建設し、粘土を採掘してください。文明的な食事には適切な器が必要であり、適切な器には適切な材料が必要です。\n\n粘土は箱に保管されていますので、興味があればご覧ください。\n\n私たちホワイトポーズは単に生き延びるだけではありません。私たちは食事を楽しむのです。"
frFR = "Il semble que vous ayez réussi à sécuriser les besoins de base. La survie, cependant, n'est pas la même chose que l'affinement.\n\nAvec des <color=green>Champignons</color> et des <color=green>Choux</color>, vous pouvez maintenant préparer du <color=green>Chou braisé</color> — un repas correctement cuit plutôt que simplement récolté. Vous découvrirez que la cuisine produit plus de nourishment que la simple somme de ses ingrédients.\n\nCe n'est pas de la magie. C'est de l'organisation.\n\nPour commencer, construisez une Puit de terre et extrayez de l'Argile. Les repas civilisationnels nécessitent des récipients appropriés, et des récipients appropriés nécessitent des matériaux adéquats.\n\nL'argile est stockée dans des caisses, si cela vous intéresse comme anecdote.\n\nNous, les Whitepaws, ne nous contentons pas de survivre. Nous dînons."
deDE = "Es scheint, dass es euch gelungen ist, die Grundbedürfnisse zu sichern. Überleben ist jedoch nicht dasselbe wie Verfeinerung.\n\nMit <color=green>Schwämme</color> und <color=green>Kabis</color> könnt ihr nun <color=green>geschmorter Kabis</color> zubereiten – eine Mahlzeit, die richtig gekocht und nicht nur geerntet wird. Ihr werdet feststellen, dass das Kochen mehr Nahrung produziert als die einfache Summe seiner Zutaten.\n\nDas ist keine Magie. Es ist Organisation.\n\nUm zu beginnen, baut eine Tongrube und gewinnt Ton. Zivilisierte Mahlzeiten erfordern geeignete Gefäße, und geeignete Gefäße erfordern geeignete Materialien.\n\nTon wird in Kisten aufbewahrt, falls ihr an solchem Wissen interessiert seid.\n\nWir Weißpfoten überleben nicht nur. Wir speisen."
plPL = "Wydaje się, że udało ci się zabezpieczyć podstawowe potrzeby. Jednak przetrwanie to nie to samo co udoskonalenie.\n\nDzięki <color=green>Grzybom</color> i <color=green>Kapustom</color> możesz teraz przygotować <color=green>Duszoną Kapustę</color> — posiłek odpowiednio ugotowany, a nie tylko zebrany. Zauważysz, że gotowanie daje więcej wartości odżywczych niż prosta suma składników.\n\nTo nie jest magia. To organizacja.\n\nNa początek zbuduj Glinianą Kopalnię i wydobądź Glinę. Cywilizowane posiłki wymagają odpowiednich naczyń, a odpowiednie naczynia wymagają właściwych materiałów.\n\nGlinę przechowuje się w skrzyniach, jeśli interesują cię takie fakty.\n\nMy, Białe Łapy, nie tylko przetrwamy. My jemy."
ptBR = "Parece que você conseguiu garantir as necessidades básicas. No entanto, sobrevivência não é o mesmo que refinamento.\n\nCom <color=green>Cogumelos</color> e <color=green>Repolhos</color>, você pode agora preparar <color=green>Repolho Refogado</color> — uma refeição devidamente cozida em vez de apenas colhida. Você descobrirá que cozinhar produz mais nutrição do que a simples soma de seus ingredientes.\n\nIsto não é mágica. É organização.\n\nPara começar, construa um Poço de Argila e extraia Argila. Refeições civilizadas exigem recipientes adequados, e recipientes adequados exigem materiais adequados.\n\nA argila é armazenada em caixas, caso você tenha interesse em tal trivia.\n\nNós, Whitepaws, não apenas sobrevivemos. Nós jantamos."
koKR = "기본적인 필수품을 확보하신 것 같습니다. 그러나 생존은 정제와는 다릅니다.\n\n이제 <color=green>버섯</color>과 <color=green>양배추</color>를 가지고 <color=green>찜 양배추</color>를 준비할 수 있습니다 — 단순히 수확한 것이 아닌 제대로 요리된 식사입니다. 요리는 재료의 단순한 합 이상으로 더 많은 영양분을 생산한다는 것을 알게 될 것입니다.\n\n이것은 마법이 아닙니다. 조직입니다.\n\n시작하려면 점토 구덩이를 건설하고 점토를 추출하세요. 문명화된 식사는 적절한 용기가 필요하며, 적절한 용기는 적절한 재료가 필요합니다.\n\n점토는 박스에 보관되니, 이런 퀴즈에 관심이 있으시다면 참고하세요.\n\n우리 화이트파우스는 단순히 생존하지 않습니다. 우리는 만찬을 즐깁니다."
csCZ = "Zdá se, že se vám podařilo zajistit základní potřeby. Přežití však není totéž jako zdokonalování.\n\nS <color=green>Houbami</color> a <color=green>Kapustou</color> nyní můžete připravit <color=green>Dušenou Kapustu</color> — jídlo správně vařené, nikoli pouze sklízené. Zjistíte, že vaření produkuje více živin než jednoduchý součet jeho ingrediencí.\n\nTo není magie. To je organizace.\n\nNež začnete, postavte Hliněnou jámu a vytěžte Hlínu. Civilizované jídlo vyžaduje správné nádoby a správné nádoby vyžadují správné materiály.\n\nHlína se skladuje v krabicích, pokud máte zájem o takové drobnosti.\n\nMy, Bílí tlapkyně, pouze nepřežíváme. My obědváme."
viVN = "Có vẻ như bạn đã đảm bảo được những nhu cầu cơ bản. Tuy nhiên, sự sống sót không giống như sự tinh tế.\n\nVới <color=green>Nấm</color> và <color=green>Bắp cải</color>, bây giờ bạn có thể chuẩn bị <color=green>Bắp cải kho</color> — một món ăn được nấu chín đúng cách chứ không chỉ đơn thuần là thu hoạch. Bạn sẽ thấy rằng nấu ăn tạo ra nhiều dinh dưỡng hơn so với tổng hợp đơn giản các nguyên liệu.\n\nĐây không phải là phép thuật. Đây là tổ chức.\n\nĐể bắt đầu, hãy xây dựng một Hầm đất sét và khai thác Đất sét. Những bữa ăn văn minh đòi hỏi những dụng cụ phù hợp, và những dụng cụ phù hợp cần những nguyên liệu thích hợp.\n\nĐất sét được lưu trữ trong các hộp, nếu bạn quan tâm đến những thông tin này.\n\nChúng tôi, Whitepaws không chỉ tồn tại. Chúng tôi còn thưởng thức."
trTR = "Görünüşe göre temel gereksinimlerinizi güvence altına almayı başardınız. Ancak hayatta kalmak, incelikle aynı şey değildir.\n\n<color=green>Mantarlar</color> ve <color=green>Lahana</color> ile artık <color=green>Haşlanmış Lahana</color> hazırlayabilirsiniz — sadece hasat edilen değil, düzgün bir şekilde pişirilmiş bir yemek. Pişirmenin, malzemelerin basit toplamından daha fazla besin ürettiğini göreceksiniz.\n\nBu sihir değil. Bu organizasyon.\n\nBaşlamak için, bir Kil Ocağı inşa edin ve Kili çıkarın. Medeni yemekler uygun kaplar gerektirir ve uygun kaplar uygun malzemeler gerektirir.\n\nKil kutularda saklanır, eğer böyle küçük detaylarla ilgileniyorsanız.\n\nBiz Beyazpençeler sadece hayatta kalmayız. Biz yemek yeriz."

["Tutorial.LetsCook.BuildWoodburner.Whitepaws"]
raw = "Having secured clay, you will now require fire.\n\nConstruct a Woodburner. It will harden clay into usable materials, logs may be transformed into <color=green>Coal</color> and, should your enthusiasm for Planks exceed your foresight, dispose of excess <color=green>Sawdust</color>.\n\nWhen placing the Woodburner, note that its entrance is on the first floor. Your convenience matters little to engineers.\n\n<color=green>Set the building to fabricate clay pots</color>.\n\nFire elevates a settlement from survival to industry. Use it carefully."
status = "normal"
enUS = "Having secured clay, you will now require fire.\n\nConstruct a Woodburner. It will harden clay into usable materials, logs may be transformed into <color=green>Coal</color> and, should your enthusiasm for Planks exceed your foresight, dispose of excess <color=green>Sawdust</color>.\n\nWhen placing the Woodburner, note that its entrance is on the first floor. Your convenience matters little to engineers.\n\n<color=green>Set the building to fabricate clay pots</color>.\n\nFire elevates a settlement from survival to industry. Use it carefully."
zhCN = "“在获得粘土后，您现在需要火。\n\n建造一个木燃炉。它将把粘土硬化为可用材料，原木可以转化为<color=green>煤</color>，如果您对木板的热情超出了您的远见，请处理多余的<color=green>木屑</color>。\n\n放置木燃炉时，请注意其入口位于一楼。您的便利性对工程师来说并不重要。\n\n<color=green>将建筑设置为制造陶瓷锅</color>。\n\n火焰将一个定居点从生存提升到工业。请谨慎使用。”"
zhTW = "在確保了黏土之後，您現在需要火。\n\n建造一個木柴爐。它將把黏土硬化成可用的材料，原木可以轉化為<color=green>煤炭</color>，如果您對木板的熱情超出了預見，則處理多餘的<color=green>木屑</color>。\n\n放置木柴爐時，請注意其入口位於一樓。您的便利對工程師來說無關緊要。\n\n<color=green>設置建築以製作陶土罐</color>。\n\n火將一個定居點從生存提升到工業。請謹慎使用。"
ruRU = "Обеспечив себя глиной, теперь вам понадобится огонь.\n\nПостройте Дровяную печь. Она закалит глину в полезные материалы, бревна могут быть превращены в <color=green>Уголь</color>, а если ваше увлечение досками превышает ваше предвидение, утилизируйте избыток <color=green>Опилок</color>.\n\nПри установке Дровяной печи имейте в виду, что её вход находится на первом этаже. Ваше удобство мало заботит инженеров.\n\n<color=green>Настройте здание на изготовление глиняных горшков</color>.\n\nОгонь поднимает поселение с уровня выживания до уровня индустрии. Используйте его с осторожностью."
jaJP = "粘土を確保したら、次は火が必要です。\n\n木材焼炉を建設してください。これにより、粘土が使用可能な材料に硬化し、丸太は<color=green>石炭</color>に変えられ、もしあなたの板への熱意が先を見越す力を超えた場合は、余分な<color=green>木くず</color>を処分してください。\n\n木材焼炉を設置する際は、その入り口が1階にあることに注意してください。技術者にとってあなたの便利さはあまり重要ではありません。\n\n<color=green>建物を粘土の壺を製造するように設定してください</color>。\n\n火は集落を生存から産業へと引き上げます。それを慎重に使ってください。"
frFR = "Avoir sécurisé de l'argile, vous aurez maintenant besoin de feu.\n\nConstruisez un Brûleur de Bois. Il va durcir l'argile en matériaux utilisables, les bûches peuvent être transformées en <color=green>Charbon</color> et, si votre enthousiasme pour les Planches dépasse votre prévoyance, déposez l'excès de <color=green>Sciure</color>.\n\nLors de la construction du Brûleur de Bois, notez que son entrée se trouve au premier étage. Votre confort importe peu aux ingénieurs.\n\n<color=green>Réglez le bâtiment pour fabriquer des pots en argile</color>.\n\nLe feu élève une colonie de la survie à l'industrie. Utilisez-le avec prudence."
deDE = "Nachdem Sie Ton gesichert haben, benötigen Sie jetzt Feuer.\n\nBauen Sie einen Holzofen. Er härtet Ton zu nutzbaren Materialien und Holz kann in <color=green>Kohle</color> verwandelt werden; sollten Sie Ihre Begeisterung für Bretter über Ihre Weitsicht stellen, entsorgen Sie überschüssigen <color=green>Sägemehl</color>.\n\nBeim Platzieren des Holzofens beachten Sie, dass der Eingang im ersten Stock ist. Ihr Komfort ist den Ingenieuren egal.\n\n<color=green>Stellen Sie das Gebäude so ein, dass es Tontöpfe herstellt</color>.\n\nFeuer hebt eine Siedlung von Überleben zu Industrie. Nutzen Sie es vorsichtig."
plPL = "Po zabezpieczeniu gliny, będziesz teraz potrzebować ognia.\n\nZbuduj Piec do Wypalania Drewna. Utrwali glinę w użyteczne materiały, a kłody można przekształcić w <color=green>węgiel</color>, a jeśli twoje zamiłowanie do desek przewyższa twoją dalekowzroczność, pozbądź się nadmiaru <color=green>trocin</color>.\n\nPodczas umieszczania Pieca do Wypalania Drewna, zwróć uwagę, że jego wejście znajduje się na pierwszym piętrze. Twoja wygoda ma małe znaczenie dla inżynierów.\n\n<color=green>Ustaw budynek na produkcję glinianych garnków</color>.\n\nOgień podnosi osadę z przetrwania do przemysłu. Używaj go ostrożnie."
ptBR = "Depois de garantir barro, você agora precisará de fogo.\n\nConstrua um Fogão de Madeira. Ele endurecerá o barro em materiais utilizáveis, toras podem ser transformadas em <color=green>Carvão</color> e, caso seu entusiasmo por Tábuas exceda sua precaução, descarte o excesso de <color=green>Pó de Serragem</color>.\n\nAo colocar o Fogão de Madeira, note que sua entrada fica no primeiro andar. Seu conforto importa pouco para os engenheiros.\n\n<color=green>Defina o edifício para fabricar vasos de barro</color>.\n\nO fogo eleva um assentamento de sobrevivência para indústria. Use-o com cuidado."
koKR = "점토를 확보한 후 이제 불이 필요합니다.\n\n나무 화로를 건설하십시오. 이는 점토를 사용할 수 있는 재료로 굳힐 것이며, 나무는 <color=green>석탄</color>으로 변환될 수 있으며, 판자에 대한 열망이 예측을 초과할 경우 잉여 <color=green>톱밥</color>을 처치하십시오.\n\n나무 화로를 설치할 때 입구가 1층에 있다는 점에 유의하십시오. 엔지니어들에게 당신의 편의는 중요하지 않습니다.\n\n<color=green>건물이 점토 항아리를 제작하도록 설정하십시오</color>.\n\n불은 정착지를 생존 상태에서 산업 상태로 끌어올립니다. 조심스럽게 사용하십시오."
csCZ = "Abychom zajistili hlínu, nyní budete potřebovat oheň.\n\nPostavte Kamna na dřevo. Tvrdí hlínu na použitelné materiály, klády mohou být přeměněny na <color=green>Uhlí</color> a, pokud vaše nadšení pro Prkna překročí vaši předvídavost, zlikvidujte přebytečné <color=green>Pilu</color>.\n\nPři umisťování Kamin na dřevo mějte na paměti, že jeho vchod je v prvním patře. Vaše pohodlí inženýry příliš nezajímá.\n\n<color=green>Nastavte budovu na výrobu hliněných květináčů</color>.\n\nOheň povyšuje osídlení ze survivalu na průmysl. Používejte ho opatrně."
viVN = "Đã có đất sét, giờ bạn sẽ cần lửa.\n\nXây dựng một Lò Nướng Gỗ. Nó sẽ biến đất sét thành vật liệu có thể sử dụng, gỗ có thể được chuyển đổi thành <color=green>Than</color> và, nếu sự hứng thú của bạn với Gỗ Tấm lớn hơn sự dự đoán của bạn, hãy vứt bỏ <color=green>Bụi Gỗ</color> dư thừa.\n\nKhi đặt Lò Nướng Gỗ, lưu ý rằng cửa ra vào nằm ở tầng một. Sự thuận tiện của bạn không quan trọng đối với các kỹ sư.\n\n<color=green>Đặt công trình sản xuất chậu đất sét</color>.\n\nLửa nâng cao một khu định cư từ sống sót lên công nghiệp. Hãy sử dụng nó cẩn thận."
trTR = "Kil elde ettikten sonra, artık ateşe ihtiyacınız var.\n\nBir Taşfırın inşa edin. Bu, kilin kullanılabilir malzemelere dönüştürülmesini sağlayacak, odunlar <color=green>Kömür</color>'e dönüştürülebilir ve eğer Tahta konusunda hevesiniz öngörünüzü aşarsa, fazla <color=green>Ahşap Talaşı</color>'nı atın.\n\nTaşfırını yerleştirirken, girişinin ilk katta olduğunu unutmayın. Mühendislerin sizin konforunuzla pek ilgisi yoktur.\n\n<color=green>Bina ayarlarını çömlek yapacak şekilde ayarlayın</color>.\n\nAteş, bir yerleşimi hayattan sanayiye yükseltir. Onu dikkatli kullanın."

["Tutorial.LetsCook.BuildCookingTent.Whitepaws"]
raw = "With clay pots prepared, you may now construct a Cooking Tent.\n\nBuild the Cooking Tent and begin preparing Braised Cabbage.\n\nCooked meals sustain morale. Morale increases productivity. Increased productivity compensates for your mistakes."
status = "normal"
enUS = "With clay pots prepared, you may now construct a Cooking Tent.\n\nBuild the Cooking Tent and begin preparing Braised Cabbage.\n\nCooked meals sustain morale. Morale increases productivity. Increased productivity compensates for your mistakes."
zhCN = "“准备好陶土锅后，你现在可以建造一个烹饪帐篷。\n\n建造烹饪帐篷并开始准备红烧卷心菜。\n\n烹饪的餐点能够提升士气。士气提升了生产力。生产力的提高弥补了你的失误。”"
zhTW = "準備好陶土鍋後，你現在可以建造烹飪帳篷。\n\n建造烹飪帳篷並開始準備燉捲心菜。\n\n煮熟的餐點能提升士氣。士氣提高生產力。提高的生產力可以彌補你的錯誤。"
ruRU = "С подготовленными глиняными горшками вы теперь можете построить Кулинарный шатер.\n\nПостройте Кулинарный шатер и начните готовить Тушеную капусту.\n\nПриготовленные блюда поддерживают мораль. Мораль увеличивает производительность. Повышенная производительность компенсирует ваши ошибки."
jaJP = "粘土の壺が用意できたら、料理テントを建設することができます。\n\n料理テントを建てて、煮込んだキャベツを準備しましょう。\n\n料理された食事は士気を維持します。士気が生産性を向上させます。生産性の向上はあなたのミスを補うことができます。"
frFR = "Avec des pots en argile préparés, vous pouvez maintenant construire un Tente de Cuisine.\n\nConstruisez la Tente de Cuisine et commencez à préparer du Chou braisé.\n\nLes repas cuisinés soutiennent le moral. Le moral augmente la productivité. Une productivité accrue compense vos erreurs."
deDE = "„Mit den vorbereiteten Tontöpfen kannst du jetzt ein Kochzelt bauen.\n\nBaue das Kochzelt und beginne mit der Zubereitung von geschmortem Kohl.\n\nGekochte Mahlzeiten erhalten die Moral. Höhere Moral erhöht die Produktivität. Erhöhte Produktivität kompensiert deine Fehler.“"
plPL = "Z przygotowanymi glinianymi garnkami możesz teraz zbudować Namiot Kulinarny.\n\nZbuduj Namiot Kulinarny i zacznij przygotowywać Duszoną Kapustę.\n\nUgotowane posiłki podnoszą morale. Morale zwiększa produktywność. Zwiększona produktywność rekompensuje twoje błędy."
ptBR = "Com os potes de barro preparados, você pode agora construir uma Tenda de Cozinha.\n\nConstrua a Tenda de Cozinha e comece a preparar Repolho Refogado.\n\nRefeições cozidas sustentam a moral. A moral aumenta a produtividade. A produtividade aumentada compensa seus erros."
koKR = "점토 냄비를 준비했으니 이제 요리 텐트를 건설할 수 있습니다.\n\n요리 텐트를 세우고 브레이즈드 캐비지를 준비하세요.\n\n조리된 음식은 사기를 유지합니다. 사기는 생산성을 증가시킵니다. 증가된 생산성은 당신의 실수를 보완합니다."
csCZ = "S připravenými hliněnými hrnci nyní můžete postavit vařicí stan.\n\nPostavte vařicí stan a začněte připravovat dušené zelí.\n\nUvařené pokrmy udržují morálku. Morálka zvyšuje produktivitu. Zvýšená produktivita kompenzuje vaše chyby."
viVN = "Khi đã chuẩn bị nồi đất, bạn có thể xây dựng một Lều Nấu Ăn.\n\nXây dựng Lều Nấu Ăn và bắt đầu chuẩn bị Bắp Cải Kho.\n\nCác bữa ăn đã nấu sẽ nuôi dưỡng tinh thần. Tinh thần làm tăng năng suất. Năng suất tăng lên sẽ bù đắp cho những sai lầm của bạn."
trTR = "Kil kaplar hazırlandı, artık bir Yemek Çadırı inşa edebilirsiniz.\n\nYemek Çadırını inşa edin ve Haşlanmış Lahana hazırlamaya başlayın.\n\nPişirilmiş yemekler morali destekler. Moral, verimliliği artırır. Artan verimlilik, hatalarınızı telafi eder."

["Tutorial.LetsCook.BuildClaypotStorage.Whitepaws"]
raw = "Clay Pots, once fired, are not to be discarded carelessly among common goods.\n\nConstruct a Glorious Storage to house them properly. Certain items deserve presentation and display. We are not savages.\n\nThat said, restraint is advised. A modest supply of clay pots will suffice."
status = "normal"
enUS = "Clay Pots, once fired, are not to be discarded carelessly among common goods.\n\nConstruct a Glorious Storage to house them properly. Certain items deserve presentation and display. We are not savages.\n\nThat said, restraint is advised. A modest supply of clay pots will suffice."
zhCN = "陶罐在烧制完成后，不应随意丢弃于普通物品中。\n\n建立一个辉煌的储存空间妥善安放它们。某些物品值得特别的呈现和展示。我们不是野蛮人。\n\n话虽如此，建议适度。适量的陶罐即可满足需求。"
zhTW = "“泥土罐在燒製後，不應隨意丟棄於常見物品中。\n\n建造一個華麗的儲藏室來妥善存放它們。某些物品值得有展示和擺放。我們不是野蠻人。\n\n話雖如此，適度地使用是明智的。少量的泥土罐已足夠。”"
ruRU = "Глиняные горшки, однажды обожженные, не должны быть беспечно выброшены среди общих товаров.\n\nПостройте Великое Хранилище, чтобы хранить их правильно. Некоторые предметы заслуживают презентации и показа. Мы не дикари.\n\nТем не менее, рекомендуется воздержанность. Умеренный запас глиняных горшков будет достаточен."
jaJP = "焼かれた粘土ポットは、一般的な品物の中に無造作に置かれるべきではありません。\n\nそれらを適切に保管するために栄光のストレージを建設してください。特定のアイテムは、プレゼンテーションと展示に値します。我々は野蛮人ではありません。\n\nとはいえ、自制を促します。控えめな量の粘土ポットで十分です。"
frFR = "Les pots en argile, une fois cuits, ne doivent pas être jetés négligemment parmi les biens communs.\n\nConstruisez un stockage glorieux pour les entreposer correctement. Certains articles méritent une présentation et une exposition. Nous ne sommes pas des sauvages.\n\nCeci dit, la retenue est conseillée. Un approvisionnement modeste de pots en argile suffira."
deDE = "Tonkrüge, einmal gebrannt, sollten nicht achtlos unter den gewöhnlichen Waren entsorgt werden.\n\nBauen Sie eine Glorreiche Lagerstätte, um sie angemessen unterzubringen. Bestimmte Gegenstände verdienen eine Präsentation und Ausstellung. Wir sind keine Wilden.\n\nDas gesagt, ist Mäßigung ratsam. Ein bescheidener Vorrat an Tonkrügen wird ausreichen."
plPL = "Gliny garnki, po wypaleniu, nie powinny być lekkomyślnie porzucane wśród zwykłych dóbr.\n\nZbuduj Chwalebny Magazyn, aby właściwie je przechować. Niektóre przedmioty zasługują na prezentację i wyeksponowanie. Nie jesteśmy dzikusami.\n\nMówiąc to, zaleca się umiar. Skromny zapas glinianych garnków wystarczy."
ptBR = "Os Pottery de Argila, uma vez queimados, não devem ser descartados descuidadamente entre os bens comuns.\n\nConstrua um Armazenamento Glorioso para acomodá-los adequadamente. Certos itens merecem apresentação e exibição. Não somos selvagens.\n\nDito isso, a moderação é aconselhada. Um fornecimento modesto de potes de argila será suficiente."
koKR = "점토 항아리는 한 번 구워지면 일반 물품 사이에 무심코 버려져서는 안 됩니다.\n\n그들을 적절히 보관할 수 있는 웅장한 저장소를 건설하세요. 특정 아이템은 전시되고 보여져야 합니다. 우리는 야만인이 아닙니다.\n\n그렇다고 해도 절제를 권장합니다. 적당한 양의 점토 항아리면 충분합니다."
csCZ = "Hliněné hrnce, jakmile jsou vypálené, by neměly být bez rozmyslu odhazovány mezi běžné zboží.\n\nPostavte si skvostný sklad, abyste je mohli řádně uložit. Určité předměty si zaslouží prezentaci a zobrazení. Nejsme divoši.\n\nTo však neznamená, že byste měli být neuvěřitelně obětaví. Skromný zásob hliněných hrnců bude stačit."
viVN = "Những chiếc nồi đất, khi đã nung, không nên bị vứt bỏ bừa bãi giữa những hàng hóa thông thường.\n\nXây dựng một kho lưu trữ lộng lẫy để bảo quản chúng một cách thích hợp. Một số món đồ xứng đáng được trình bày và trưng bày. Chúng ta không phải là những kẻ man rợ.\n\nTuy nhiên, cần phải kiềm chế. Một nguồn cung nồi đất vừa phải là đủ."
trTR = "Şişlenmiş kil çömlekler, bir kez pişirildiğinde, sıradan eşyalar arasında dikkatsizce atılmamalıdır.\n\nOnları uygun bir şekilde depolamak için Görkemli Bir Depo inşa edin. Bazı eşyalar sergilenmeyi ve gösterilmeyi hak eder. Biz vahşiler değiliz.\n\nBunu söylemekle birlikte, ihtiyatlı olmakta fayda var. Mütevazı bir kil çömlek stoku yeterli olacaktır."

["Tutorial.LetsCook.BuildHandOfSoup.Whitepaws"]
raw = "Braised Cabbage, once prepared, is not meant to cool into disappointment. Go ahead and try if you don’t believe us.\n\nTo preserve warmth, you must first construct the Hand of Soup. This clay structure serves as a fire pit and foundation. Heat must come from somewhere.\n\nUpon it, build the Warm Storage — the bowl in which meals are kept heated and ready for distribution.\n\nThe Hand may be oriented left or right. Choose wisely. Crimes against symmetry shall be punished."
status = "normal"
enUS = "Braised Cabbage, once prepared, is not meant to cool into disappointment. Go ahead and try if you don’t believe us.\n\nTo preserve warmth, you must first construct the Hand of Soup. This clay structure serves as a fire pit and foundation. Heat must come from somewhere.\n\nUpon it, build the Warm Storage — the bowl in which meals are kept heated and ready for distribution.\n\nThe Hand may be oriented left or right. Choose wisely. Crimes against symmetry shall be punished."
zhCN = "炖白菜，一旦准备好，就不应该冷却成失望。如果你不相信我们，请尽情尝试。\n\n为了保持温暖，你必须先建造汤之手。这个泥土结构作为火堆和基础。热量必须来自某个地方。\n\n在上面建造温暖储存箱——用来保持餐食热乎的碗，随时准备分发。\n\n汤之手可以向左或向右摆放。明智选择。对称罪行将受到惩罚。"
zhTW = "燉白菜，一旦製作完成，絕不應該冷卻成失望。如果你不相信我們，請隨意嘗試。\n\n為了保持溫暖，你必須首先建造湯之手。這個泥土結構作為火爐和基礎。熱量必須來自某個地方。\n\n在其上建造暖存儲 — 用於保持餐點加熱並隨時分發的碗。\n\n湯之手可以向左或向右定向。明智地選擇。對稱的罪行將受到懲罰。"
ruRU = "Тушёная капуста, один раз приготовленная, не должна остужаться в разочарование. Попробуйте сами, если не верите нам.\n\nЧтобы сохранить тепло, вы сначала должны построить Ладонь Супа. Эта глиняная структура служит как кухонная плита и основа. Тепло должно приходить откуда-то.\n\nНа ней постройте Тёплое Хранилище — миску, в которой блюда хранятся горячими и готовыми к распределению.\n\nЛадонь может быть ориентирована налево или направо. Выбирайте с умом. Преступления против симметрии будут наказываться."
jaJP = "「煮込んだキャベツは、一度準備されると、失望に冷やされるべきではありません。信じられないなら、試してみてください。\n\n温かさを保つためには、まず「スープの手」を建設する必要があります。この粘土製の構造物は、焚き火の場所として機能し、基盤となります。熱はどこかから来なければなりません。\n\nその上に、温かい保存庫を建設してください — 食事が温められ、配布の準備が整った状態で保たれる鉢です。\n\n「手」は左または右に向けることができます。賢く選びましょう。対称性に対する犯罪は罰せられます。」"
frFR = "Chou braisé, une fois préparé, n'est pas censé refroidir dans la déception. Allez-y et essayez si vous ne nous croyez pas.\n\nPour préserver la chaleur, vous devez d'abord construire la Main de Soupe. Cette structure en argile sert de foyer et de fondation. La chaleur doit venir de quelque part.\n\nDessus, construisez le stock chaud — le bol dans lequel les repas sont gardés chauds et prêts à être distribués.\n\nLa Main peut être orientée à gauche ou à droite. Choisissez judicieusement. Les crimes contre la symétrie seront punis."
deDE = "Schmortofu, einmal zubereitet, soll nicht in Enttäuschung abkühlen. Trau dich und probiere es, wenn du uns nicht glaubst.\n\nUm die Wärme zu bewahren, musst du zunächst die Hand der Suppe bauen. Diese Tonstruktur dient als Feuerstelle und Grundlage. Die Wärme muss von irgendwoher kommen.\n\nDarauf baue die Warmlagerung — die Schüssel, in der die Mahlzeiten heiß gehalten und bereit zur Verteilung sind.\n\nDie Hand kann nach links oder rechts ausgerichtet werden. Wähle weise. Verbrechen gegen die Symmetrie werden bestraft."
plPL = "Brażona kapusta, po przygotowaniu, nie powinna stygnąć w rozczarowaniu. Spróbuj sam, jeśli nam nie wierzysz.\n\nAby zachować ciepło, musisz najpierw zbudować Rękę Zupy. Ta gliniana konstrukcja pełni funkcję paleniska i fundamentu. Ciepło musi skądś pochodzić.\n\nNa niej zbuduj Ciepły Magazyn — miskę, w której posiłki są przechowywane ciepłe i gotowe do dystrybucji.\n\nRęka może być ustawiona w lewo lub w prawo. Wybierz mądrze. Zbrodnie przeciwko symetrii będą karane."
ptBR = "Repolho Refogado, uma vez preparado, não deve esfriar em decepção. Vá em frente e tente se não acredita em nós.\n\nPara preservar o calor, você deve primeiro construir a Mão da Sopa. Esta estrutura de argila serve como uma fogueira e fundação. O calor deve vir de algum lugar.\n\nSobre ela, construa o Armazenamento Quente — a tigela onde as refeições são mantidas aquecidas e prontas para distribuição.\n\nA Mão pode ser orientada para a esquerda ou para a direita. Escolha sabiamente. Crimes contra a simetria serão punidos."
koKR = "조리된 양배추는 준비된 후 실망으로 식도록 해서는 안 됩니다. 믿지 않으신다면 시도해 보세요.\n\n온기를 유지하기 위해 먼저 스프의 손을 건설해야 합니다. 이 점토 구조물은 화로와 기초 역할을 합니다. 열은 어딘가에서 와야 합니다.\n\n그 위에 따뜻한 저장소를 건설하세요. 식사가 열을 유지하며 배급을 기다리는 그릇입니다.\n\n손은 왼쪽이나 오른쪽으로 배치할 수 있습니다. 현명하게 선택하세요. 대칭에 대한 범죄는 처벌받습니다."
csCZ = "Dušené zelí, jakmile je připravené, nemá být zklamáním. Zkuste to, pokud nám nevěříte.\n\nAby se teplo uchovalo, musíte nejprve postavit Ruku polévky. Tato hlíněná konstrukce slouží jako ohniště a základna. Teplo musí někde pocházet.\n\nNa ni postavte Teplé úložiště — misku, ve které se pokrmy udržují teplé a připravené k podávání.\n\nRuka může být orientována vlevo nebo vpravo. Volte moudře. Zločiny proti symetrii budou potrestány."
viVN = "Giò bắp cải, khi đã được chuẩn bị, không nên nguội đi thành sự thất vọng. Hãy thử đi nếu bạn không tin chúng tôi.\n\nĐể giữ ấm, bạn phải xây dựng trước Tay Cầm Đồ Ăn. Cấu trúc đất sét này phục vụ như một bếp lửa và nền tảng. Nhiệt phải đến từ đâu đó.\n\nTrên đó, hãy xây dựng Kho Sưởi Ấm — cái bát mà thức ăn được giữ ấm và sẵn sàng để phân phát.\n\nTay có thể được định hướng bên trái hoặc bên phải. Hãy chọn một cách khôn ngoan. Những tội ác chống lại đối xứng sẽ bị trừng phạt."
trTR = "Braised Cabbage, hazırlandıktan sonra hayal kırıklığına dönüşmemelidir. Bize inanmıyorsanız deneyin.\n\nSıcaklığı korumak için önce Çorba Eli'ni inşa etmelisiniz. Bu kil yapısı bir ateş çukuru ve temel olarak hizmet eder. Isı bir yerden gelmelidir.\n\nÜzerine Sıcak Depolama inşa edin - yemeklerin sıcak tutulup dağıtıma hazırlandığı kâse.\n\nÇorba Eli, sola veya sağa yönlendirilebilir. Akıllıca seçin. Simetriye karşı işlenen suçlar cezalandırılacaktır."

["Tutorial.ProperSawmill.BuildShaftBillboard.Whitepaws"]
raw = "The Library requires a considerable quantity of planks. Gnawing logs into shape will suffice for now, but we prefer progress to dental heroics.\n\nYou may therefore consider constructing a Rudimentary Sawmill. It is faster, more efficient, and considerably less embarrassing.\n\nHowever, the sawmill requires Power.\n\nTo understand how to connect power properly, place the <color=green>Billboard</color>: “How to Connect Power.”\n\nActually building the billboard is not required. Placing it, is.\nPlease do not question how this works.\n\nWe recommend observing it carefully, keep in mind that shaft plugs and windows are, in fact, no the same."
status = "normal"
enUS = "The Library requires a considerable quantity of planks. Gnawing logs into shape will suffice for now, but we prefer progress to dental heroics.\n\nYou may therefore consider constructing a Rudimentary Sawmill. It is faster, more efficient, and considerably less embarrassing.\n\nHowever, the sawmill requires Power.\n\nTo understand how to connect power properly, place the <color=green>Billboard</color>: “How to Connect Power.”\n\nActually building the billboard is not required. Placing it, is.\nPlease do not question how this works.\n\nWe recommend observing it carefully, keep in mind that shaft plugs and windows are, in fact, not the same."
zhCN = "图书馆需要相当数量的木板。把原木啃成形状暂时可以，但我们更喜欢进步而不是牙科英雄主义。\n\n因此，您可以考虑建造一个初级锯木厂。它更快、更高效，并且明显不那么尴尬。\n\n但是，锯木厂需要电力。\n\n要了解如何正确连接电力，请放置一个<color=green>广告牌</color>：“如何连接电力。”\n\n实际上，建造广告牌并不是必须的，放置它是必要的。\n请不要质疑这如何运作。\n\n我们建议您仔细观察，记住轴插头和窗户实际上并不是同一个东西。"
zhTW = "圖書館需要大量木板。現在將原木削成形狀已經足夠，但我們更偏好進展而不是牙科英雄主義。\n\n因此，您可以考慮建造一個初級鋸木廠。它更快、更高效，並且大大減少了尷尬。\n\n然而，鋸木廠需要電力。\n\n要了解如何正確連接電力，請放置 <color=green>公告牌</color>：“如何連接電力。”\n\n實際上不需要建造公告牌。只需放置它即可。\n請不要質疑這是如何運作的。\n\n我們建議仔細觀察，請記住，軸插頭和窗戶實際上並不是同一回事。"
ruRU = "Библиотека требует значительного количества досок. Обдирание бревен на форму пригодится на данный момент, но мы предпочитаем прогресс, а не зубные подвиги.\n\nПоэтому вы можете рассмотреть возможность постройки Примитивной Пилорамы. Это быстрее, эффективнее и значительно менее неловко.\n\nОднако пилорама требует энергии.\n\nЧтобы понять, как правильно подключить энергию, разместите <color=green>Биллиборд</color>: \"Как подключить энергию.\"\n\nНа самом деле, строить биллиборд не требуется. Его необходимо разместить. \nПожалуйста, не спрашивайте, как это работает. \n\nМы рекомендуем внимательно его наблюдать, помните, что штекеры вала и окна, по сути, не одно и то же."
jaJP = "図書館には相当量の板材が必要です。今のところ、丸太を形にかじることができますが、私たちは進展を好み、歯科的な英雄主義は好みません。\n\nしたがって、基本的な製材所の建設を検討することをお勧めします。それはより速く、効率的で、かなり恥ずかしくありません。\n\nただし、製材所には電力が必要です。\n\n電力を適切に接続する方法を理解するには、<color=green>ビルボード</color>：「電力の接続方法」を置いてください。\n\nビルボードを実際に建設する必要はありません。置くことが重要です。\nこれがどのように機能するか疑問を持たないでください。\n\n注意深く観察することをお勧めします。シャフトプラグと窓は、実際には同じではないことを忘れないでください。"
frFR = "La Bibliothèque nécessite une quantité considérable de planches. Ronger des rondins pour donner forme suffira pour l’instant, mais nous préférons le progrès aux exploits dentaires.\n\nVous pouvez donc envisager de construire un Sawmill Rudimentaire. C'est plus rapide, plus efficace et considérablement moins embarrassant.\n\nCependant, le moulin à scie nécessite de l'Énergie.\n\nPour comprendre comment connecter l'énergie correctement, placez le <color=green>Billboard</color> : \"Comment Connecter l'Énergie.\"\n\nIl n'est pas nécessaire de construire le panneau d'affichage. Le placer, en revanche, l'est.\nVeuillez ne pas remettre en question le fonctionnement de cela.\n\nNous vous recommandons de l'observer attentivement, gardez à l'esprit que les prises de arbre et les fenêtres ne sont, en fait, pas la même chose."
deDE = "Die Bibliothek benötigt eine erhebliche Menge an Planken. Das Zähneknirschen an Baumstämmen reicht vorerst aus, aber wir ziehen Fortschritt gegenüber zahnmedizinischen Heldentaten vor.\n\nSie sollten daher in Erwägung ziehen, eine Elementar-Sägemühle zu bauen. Sie ist schneller, effizienter und erheblich weniger peinlich.\n\nDie Sägemühle benötigt jedoch Energie.\n\nUm zu verstehen, wie man Energie richtig anschließt, platzieren Sie die <color=green>Werbetafel</color>: „Wie man Energie anschließt.“\n\nDie tatsächliche Konstruktion der Werbetafel ist nicht erforderlich. Sie zu platzieren ist es.\n\nBitte hinterfragen Sie nicht, wie das funktioniert.\n\nWir empfehlen, dies sorgfältig zu beobachten, und denken Sie daran, dass Schraubenschlüssel und Fenster in der Tat nicht dasselbe sind."
plPL = "Biblioteka wymaga znacznej ilości desek. Wgryzienie się w kłody, aby nadać im odpowiedni kształt, wystarczy na teraz, ale wolimy postęp od dentystycznych bohaterstw.\n\nMożesz więc rozważyć budowę Podstawowej Tartaku. Jest szybszy, bardziej wydajny i zdecydowanie mniej kłopotliwy.\n\nJednak tartak wymaga Energii.\n\nAby zrozumieć, jak prawidłowo podłączyć energię, umieść <color=green>Tablicę informacyjną</color>: „Jak podłączyć energię.”\n\nNie jest konieczne faktyczne zbudowanie tablicy informacyjnej. Jej umieszczenie jest obowiązkowe.\nProszę nie pytać, jak to działa.\n\nZalecamy uważne obserwowanie jej, pamiętaj, że wtyczki wału i okna to w rzeczywistości nie to samo."
ptBR = "A Biblioteca requer uma quantidade considerável de tábuas. Roer toras para moldá-las será suficiente por enquanto, mas preferimos progresso a heroísmos dentários.\n\nVocê pode, portanto, considerar construir uma Serraria Rudimentar. É mais rápida, mais eficiente e consideravelmente menos embaraçosa.\n\nNo entanto, a serraria requer Energia.\n\nPara entender como conectar a energia corretamente, coloque o <color=green>Outdoor</color>: “Como Conectar a Energia.”\n\nNa verdade, construir o outdoor não é necessário. Colocá-lo, é.\nPor favor, não questione como isso funciona.\n\nRecomendamos observá-lo com atenção, tenha em mente que os plugs das eixos e janelas não são, de fato, a mesma coisa."
koKR = "도서관은 상당량의 판자를 필요로 합니다. 현재로서는 통나무를 다듬는 것으로 충분하지만, 우리는 치아 영웅담보다 진행을 선호합니다.\n\n따라서 기본 제재소를 건설하는 것을 고려해 보십시오. 이것은 더 빠르고, 더 효율적이며, 상당히 덜 부끄럽습니다.\n\n그러나 제재소는 전력이 필요합니다.\n\n전력을 올바르게 연결하는 방법을 이해하기 위해, <color=green>전자판</color>: “전력을 연결하는 방법”을 배치하십시오.\n\n사실 전자판을 실제로 만드는 것은 필요하지 않습니다. 배치하는 것이 중요합니다.\n이것이 어떻게 작동하는지 질문하지 마십시오.\n\n주목 깊이 관찰하는 것을 추천하며, 축 플러그와 창이 실제로 같은 것이 아니라는 점을 명심하십시오."
csCZ = "Knihovna vyžaduje značné množství prken. Kousání klád do tvaru prozatím stačí, ale preferujeme pokrok před zubními hrdinskými činy.\n\nMůžete proto zvážit výstavbu Základního pile. Je rychlejší, efektivnější a rozhodně méně trapné.\n\nJenže pila potřebuje energii.\n\nAbychom pochopili, jak správně připojit energii, umístěte <color=green>Billboard</color>: „Jak připojit energii.“\n\nSkutečná výstavba billboardu není nutná. Je nutné jej umístit.\nProsím, neptejte se, jak to funguje.\n\nDoporučujeme pečlivě jej sledovat, mějte na paměti, že hřídele a okna ve skutečnosti nejsou totéž."
viVN = "Thư viện yêu cầu một số lượng lớn ván. Việc gặm các khúc gỗ thành hình là đủ cho bây giờ, nhưng chúng tôi thích tiến bộ hơn những chiến công về răng miệng.\n\nDo đó, bạn có thể xem xét việc xây dựng một Nhà máy cưa sơ bộ. Nó nhanh hơn, hiệu quả hơn và ít xấu hổ hơn rất nhiều.\n\nTuy nhiên, nhà máy cưa yêu cầu Năng lượng.\n\nĐể hiểu cách kết nối năng lượng một cách chính xác, hãy đặt <color=green>Bảng thông báo</color>: “Cách Kết Nối Năng Lượng.”\n\nViệc xây dựng bảng thông báo là không bắt buộc. Đặt nó thì có.\n\nXin đừng thắc mắc về cách thức hoạt động của nó.\n\nChúng tôi khuyên bạn nên quan sát nó một cách cẩn thận, hãy nhớ rằng các phích cắm trục và cửa sổ thực sự không giống nhau."
trTR = "Kütüphane, önemli miktarda tahtaya ihtiyaç duyar. Şu an için kütükleri şekillendirmek yeterli olacaktır, ancak ilerleme kaydetmeyi diş hekimliği kahramanlıklarından tercih ediyoruz.\n\nBu nedenle Temel Bir Kesim Makinesi inşa etmeyi düşünebilirsiniz. Daha hızlı, daha verimli ve büyük ölçüde daha az utandırıcıdır.\n\nAncak, kesim makinesi Güce ihtiyaç duyar.\n\nGücü doğru bir şekilde nasıl bağlayacağınızı anlamak için <color=green>Billboard</color>'u yerleştirin: “Gücü Nasıl Bağlayacağınız.”\n\nBillboard’u gerçekten inşa etmeniz gerekmez. Yerleştirmek yeterlidir.\nBu nasıl çalıştığını sorgulamamanızı rica ederiz.\n\nBunu dikkatlice gözlemlemenizi öneririz; shaft fişlerinin ve pencerelerin aslında aynı olmadığını unutmayın."

["Tutorial.ProperSawmill.BuildWaterwheelandSawmill.Whitepaws"]
raw = "Having consulted the instructional billboard, you may now construct the Rudimentary Sawmill.\n\nIn most circumstances, one or two Crappy Waterwheels will suffice to power it. Position them in flowing water. We trust you can identify flowing water without assistance.\n\nShould you be fortunate enough to settle near a <color=green>Geothermal Field</color>, a <color=green>Geothermal Engine</color> is also acceptable.\n\nHowever you choose to power it, ensure the sawmill is supplied with <color=green>sawblades</color>, those are made by the workers of your <color=green>primitive ironworks</color> who surely regret following you by now.\n\nShould you decide to build a stock of those, sawblades are stored in piles."
status = "normal"
enUS = "Having consulted the instructional billboard, you may now construct the Rudimentary Sawmill.\n\nIn most circumstances, one or two Crappy Waterwheels will suffice to power it. Position them in flowing water. We trust you can identify flowing water without assistance.\n\nShould you be fortunate enough to settle near a <color=green>Geothermal Field</color>, a <color=green>Geothermal Engine</color> is also acceptable.\n\nHowever you choose to power it, ensure the sawmill is supplied with <color=green>sawblades</color>, those are made by the workers of your <color=green>primitive ironworks</color> who surely regret following you by now.\n\nShould you decide to build a stock of those, sawblades are stored in piles."
zhCN = "在查看了说明公告板后，您现在可以建造初级锯木厂。\n\n在大多数情况下，一两个低劣水轮就足以为其提供动力。将它们放置在流动的水中。我们相信您能够在没有帮助的情况下识别流动的水。\n\n如果您幸运地在<color=green>地热场</color>附近定居，那么<color=green>地热引擎</color>也是可以接受的。\n\n无论您选择如何为其供电，请确保锯木厂配备<color=green>锯片</color>，这些锯片都是由您<color=green>原始铁匠铺</color>的工人制造的，他们肯定对跟随您充满了遗憾。\n\n如果您决定建立其库存，锯片是以堆的形式存放的。"
zhTW = "諮詢過指導公告牌後，您現在可以建造基礎鋸木廠。\n\n在大多數情況下，一至兩個劣質水車就足以為其提供動力。將它們放置在流動的水中。我們相信您能夠在不需要幫助的情況下識別流動水。\n\n如果您足夠幸運能夠靠近<color=green>地熱區</color>，<color=green>地熱發動機</color>也是可接受的。\n\n無論您選擇如何供電，請確保鋸木廠獲得<color=green>鋸片</color>的供應，這些鋸片是由您<color=green>原始煉鐵廠</color>的工人製造的，他們肯定對跟隨您感到後悔。\n\n如果您決定儲備這些鋸片，鋸片將被存放在堆疊中。"
ruRU = "Проконсультировавшись с информационным стендом, вы можете теперь построить Простейшую лесопилку.\n\nВ большинстве случаев одной или двух Убогих водяных мельниц будет достаточно для её питания. Разместите их в течении воды. Мы уверены, что вы сможете определить течет ли вода без посторонней помощи.\n\nЕсли вам повезло поселиться рядом с <color=green>Геothermalным полем</color>, то <color=green>Геothermalный двигатель</color> также приемлем.\n\nКак бы вы ни решили её запитать, убедитесь, что лесопилка снабжена <color=green>пилами</color>, которые изготавливаются рабочими вашего <color=green>примитивного металлургического завода</color>, которые, конечно же, уже сожалели о том, что последовали за вами.\n\nЕсли вы решите накопить запасы этих пил, они хранятся в кучах."
jaJP = "指導掲示板を参照した後、原始的な製材所を建設することができます。\n\nほとんどの状況では、1つまたは2つのクソ水車がこれを動かすのに十分です。流れる水の中に配置してください。流れる水を自分で見分けられることを信じています。\n\nもし幸運にも<color=green>地熱フィールド</color>の近くに定住できれば、<color=green>地熱エンジン</color>も受け入れられます。\n\nどのように動力を供給するにしても、製材所には<color=green>のこぎりの刃</color>が供給されていることを確認してください。それらはあなたの<color=green>原始的な製鉄所</color>の作業員によって作られ、今ではあなたに従ったことを後悔していることでしょう。\n\nそれらのストックを作ることに決めた場合、のこぎりの刃は山積みにして保管されています。"
frFR = "Après avoir consulté le panneau d'instructions, vous pouvez maintenant construire le Sawmill Rudimentaire.\n\nDans la plupart des cas, une ou deux Roues à Eau Pourries suffiront à le faire fonctionner. Placez-les dans l'eau courante. Nous avons confiance en votre capacité à identifier l'eau courante sans aide.\n\nSi vous avez la chance de vous installer près d'un <color=green>Champ Géothermique</color>, un <color=green>Moteur Géothermique</color> est également acceptable.\n\nQuelle que soit votre méthode d'alimentation, assurez-vous que le sciage soit approvisionné en <color=green>lames de scie</color>, celles-ci sont fabriquées par les travailleurs de vos <color=green>fonderies primitives</color> qui regrettent sûrement de vous avoir suivi à présent.\n\nSi vous décidiez de constituer un stock de celles-ci, les lames de scie sont conservées en tas."
deDE = "Nachdem Sie die Anleitungstafel konsultiert haben, können Sie nun die Rudimentäre Sägewerk bauen.\n\nIn den meisten Fällen genügen ein oder zwei Schrott-Wasserräder, um es zu betreiben. Platzieren Sie sie in fließendem Wasser. Wir vertrauen darauf, dass Sie fließendes Wasser ohne Hilfe erkennen können.\n\nSollten Sie das Glück haben, in der Nähe eines <color=green>geothermischen Feldes</color> niederzulassen, ist auch ein <color=green>geothermischer Motor</color> akzeptabel.\n\nWie auch immer Sie sich entscheiden, es zu betreiben, stellen Sie sicher, dass das Sägewerk mit <color=green>Sägeblättern</color> versorgt wird, die von den Arbeitern Ihres <color=green>primitiven Eisenwerks</color> hergestellt werden, die es sicherlich bereuen, Ihnen gefolgt zu sein.\n\nSollten Sie sich entscheiden, einen Vorrat davon anzulegen, werden Sägeblätter in Stapeln gelagert."
plPL = "Konsultując się z instrukcją na billboardzie, możesz teraz zbudować Prymitywną Tartak.\n\nW większości przypadków wystarczą jeden lub dwa Złomowe Koła Wodnego, aby je zasilić. Umieść je w płynącej wodzie. Wierzymy, że potrafisz zidentyfikować płynącą wodę bez pomocy.\n\nJeśli masz szczęście osiedlić się w pobliżu <color=green>Pola Geotermalnego</color>, również <color=green>Silnik Geotermalny</color> jest akceptowalny.\n\nNiezależnie od tego, jak zdecydujesz się to zasilić, upewnij się, że tartak ma dostarczone <color=green>ostrza</color>, które są wytwarzane przez pracowników twoich <color=green>prymitywnych zakładów metalurgicznych</color>, którzy na pewno żałują, że poszli za tobą.\n\nJeśli zdecydujesz się zbudować ich zapas, ostrza są przechowywane w stosach."
ptBR = "Tendo consultado o painel informativo, você agora pode construir o Serrador Rudimentar.\n\nEm circunstâncias normais, uma ou duas Roda-d'água Ruins serão suficientes para alimentá-lo. Posicione-os em água corrente. Confiamos que você consiga identificar água corrente sem assistência.\n\nSe você tiver a sorte de se estabelecer perto de um <color=green>Campo Geotérmico</color>, um <color=green>Motor Geotérmico</color> também é aceitável.\n\nIndependentemente da forma como você escolher energizá-lo, certifique-se de que o serrador esteja abastecido com <color=green>lâminas de serra</color>, que são feitas pelos trabalhadores de suas <color=green>ferrovia primitiva</color>, que certamente se arrependem de ter te seguido até agora.\n\nSe você decidir construir um estoque delas, as lâminas de serra são armazenadas em pilhas."
koKR = "안내판을 참조한 후, 이제 기본 제재소를 건설할 수 있습니다.\n\n대부분의 경우, 하나 또는 두 개의 형편없는 수차면 충분합니다. 흐르는 물에 배치하세요. 흐르는 물을 식별하는 것은 어렵지 않을 것입니다.\n\n만약 운이 좋게 <color=green>지열 필드</color> 근처에 정착하게 된다면 <color=green>지열 엔진</color>도 허용됩니다.\n\n전력을 공급하는 방법에 관계없이, 제재소에 <color=green>톱날</color>이 공급되도록 하세요. 그것은 물론 이젠 당신을 따른 것을 후회하는 당신의 <color=green>원시 제철소</color> 노동자들에 의해 만들어집니다.\n\n톱날을 비축하기로 결정했다면, 톱날은 더미로 보관됩니다."
csCZ = "Po konzultaci s informačním billboardem můžete nyní postavit Základní pila.\n\nVětšinou stačí jeden nebo dva Mizerné vodní kola k jejímu pohonu. Umístěte je do proudící vody. Věříme, že dokážete identifikovat proudící vodu bez pomoci.\n\nPokud budete mít štěstí a usadíte se poblíž <color=green>geotermálního pole</color>, je také přijatelné použít <color=green>geotermální motor</color>.\n\nAť už se rozhodnete pro jakýkoli způsob pohonu, ujistěte se, že pila má zajištěny <color=green>pilové kotouče</color>, které vyrábějí pracovníci vašich <color=green>primitivních železáren</color>, kteří jistě litují, že vás následují.\n\nPokud se rozhodnete vytvořit zásobu těchto kotoučů, pilové kotouče se skladují v hromadách."
viVN = "Sau khi tham khảo bảng hướng dẫn, bạn có thể xây dựng nhà máy cưa sơ khai.\n\nTrong hầu hết các trường hợp, một hoặc hai bánh xe nước tệ là đủ để cung cấp năng lượng cho nó. Đặt chúng ở nơi có nước chảy. Chúng tôi tin rằng bạn có thể nhận diện được nước chảy mà không cần trợ giúp.\n\nNếu bạn đủ may mắn để định cư gần một <color=green>cánh đồng địa nhiệt</color>, một <color=green>động cơ địa nhiệt</color> cũng là một lựa chọn chấp nhận được.\n\nDù bạn chọn cách nào để cung cấp năng lượng, hãy đảm bảo rằng nhà máy cưa được cung cấp <color=green>lưỡi cưa</color>, những cái đó được làm bởi công nhân ở <color=green>nhà máy sắt thô sơ</color> của bạn, những người chắc chắn đã hối tiếc khi đi theo bạn đến giờ này.\n\nNếu bạn quyết định xây dựng một kho chứa, lưỡi cưa được lưu trữ trong các đống."
trTR = "Talimat panosuna danıştıktan sonra, Artizan Testere Ancrağı'nı inşa edebilirsiniz.\n\nÇoğu durumda, bir veya iki Berbat Su Çarkı bunu çalıştırmak için yeterlidir. Onları akışkan sulara yerleştirin. Akışkan suları yardımsız tanımlayabileceğinize güveniyoruz.\n\nEğer bir <color=green>Jeotermal Alan</color> yakınında yerleşme şansına sahip olursanız, bir <color=green>Jeotermal Motor</color> da kabul edilebilir.\n\nHangi yöntemi seçerseniz seçin, testere ancrağının <color=green>testerelerle</color> beslenmesini sağlayın, bunlar sizin <color=green>ilkel demir atölyeniz</color> çalışanları tarafından yapılmıştır ve artık sizi takip ettiklerine pişman olmuş olmalılar.\n\nBunlardan bir stok yapmak isterseniz, testereler yığınlar halinde saklanmaktadır."

["Tutorial.ProperSawmill.ConnectSawmill.Whitepaws"]
raw = "Should you not have done so already, you may now connect your power source to the Sawmill.\n\nIf you encounter difficulty, consult again the <color=green>“How to Connect Power” billboard</color>. Unlike… someone… it did not seize the first opportunity to run away.\n\nThe sawmill’s shaft plug is located on the rear side of the structure — ground floor, to the right. Hopefully you noticed this before actually building it.\n\nUnlike some savages, we do not run power shafts through our living rooms."
status = "normal"
enUS = "Should you not have done so already, you may now connect your power source to the Sawmill.\n\nIf you encounter difficulty, consult again the <color=green>“How to Connect Power” billboard</color>. Unlike… someone… it did not seize the first opportunity to run away.\n\nThe sawmill’s shaft plug is located on the rear side of the structure — ground floor, to the right. Hopefully you noticed this before actually building it.\n\nUnlike some savages, we do not run power shafts through our living rooms."
zhCN = "如果你还没有这样做，现在可以将电源与锯木厂连接。\n\n如果你遇到困难，请再次查看<color=green>“如何连接电源”广告牌</color>。与……某些人……不同，它没有在第一次机会到来时就逃跑。\n\n锯木厂的轴塞位于结构的后侧——一楼，右侧。希望你在实际建造之前就注意到了这一点。\n\n与某些野蛮人不同，我们不会在客厅里穿过电源轴。"
zhTW = "如果你還未這樣做，現在可以將你的電源連接到鋸木廠。\n\n如果你遇到困難，請再查看一下 <color=green>“如何連接電源”告示牌</color>。與某人不同，它並沒有在第一時間就跑掉。\n\n鋸木廠的軸插頭位於建築物的後方——一樓的右側。希望你在實際建造之前就注意到了這一點。\n\n與一些野蠻人不同，我們不會將電力軸穿過客廳。"
ruRU = "Если вы этого еще не сделали, вы можете подключить свой источник питания к лесопилке.\n\nЕсли у вас возникли трудности, снова обратитесь к <color=green>“Билборду: Как подключить питание”</color>. В отличие от… кого-то… он не упустил первого возможности убежать.\n\nЗаглушка вала лесопилки расположена на задней стороне конструкции — на первом этаже, справа. Надеюсь, вы заметили это до того, как на самом деле её построили.\n\nВ отличие от некоторых дикарей, мы не прокладываем электропровода через наши гостиные."
jaJP = "もしまだ行っていない場合は、今すぐにあなたの電源を製材所に接続できます。\n\nもし問題が発生した場合は、再度<color=green>「電力を接続する方法」ビルボード</color>を参照してください。ある誰かとは異なり、最初の機会に逃げ出すことはありませんでした。\n\n製材所のシャフトプラグは、構造物の背面、1階の右側にあります。実際に建てる前にこれに気付いたことを願います。\n\n一部の野蛮人とは異なり、私たちはリビングルームを通って電力シャフトを通しません。"
frFR = "Si vous ne l'avez pas déjà fait, vous pouvez maintenant connecter votre source d'énergie à la scierie.\n\nSi vous rencontrez des difficultés, consultez à nouveau le <color=green>“Panneau d'instructions pour connecter l'énergie”</color>. Contrairement à… quelqu'un… il n'a pas saisi la première occasion de s'enfuir.\n\nLe plug de l'arbre de la scierie est situé à l'arrière de la structure — au rez-de-chaussée, à droite. Espérons que vous l'avez remarqué avant de le construire réellement.\n\nContrairement à certains sauvages, nous ne faisons pas passer nos arbres énergétiques à travers nos salons."
deDE = "Sollten Sie das noch nicht getan haben, können Sie jetzt Ihre Stromquelle mit der Säge verbinden.\n\nWenn Sie auf Schwierigkeiten stoßen, konsultieren Sie erneut die <color=green>„Wie man Strom anschließt“-Tafel</color>. Im Gegensatz zu... jemandem... hat sie nicht die erste Gelegenheit genutzt, um davonzulaufen.\n\nDer Stecker der Welle der Säge befindet sich an der Rückseite der Struktur - Erdgeschoss, rechts. Hoffentlich haben Sie dies bemerkt, bevor Sie sie tatsächlich gebaut haben.\n\nIm Gegensatz zu einigen Wilden führen wir keine Stromwellen durch unsere Wohnzimmer."
plPL = "Jeśli jeszcze tego nie zrobiłeś, możesz teraz podłączyć swoje źródło zasilania do tartaku.\n\nJeśli napotkasz trudności, skonsultuj się ponownie z <color=green>„Jak podłączyć zasilanie” billboardem</color>. W przeciwieństwie do… kogoś… nie skorzystował z pierwszej okazji, aby się ulotnić.\n\nZłącze wału tartaku znajduje się na tylnej stronie konstrukcji — na parterze, po prawej stronie. Mamy nadzieję, że zauważyłeś to zanim naprawdę go zbudowałeś.\n\nW przeciwieństwie do niektórych dzikusów, nie przeprowadzamy wałów zasilających przez nasze salony."
ptBR = "Se ainda não o fez, você pode agora conectar sua fonte de energia à Serraria.\n\nSe encontrar dificuldades, consulte novamente o <color=green>“Cartaz de Como Conectar Energia”</color>. Ao contrário de… alguém… ele não aproveitou a primeira oportunidade para fugir.\n\nO plugue do eixo da serraria está localizado na parte traseira da estrutura — no andar térreo, à direita. Esperamos que você tenha notado isso antes de realmente construí-la.\n\nAo contrário de alguns selvagens, nós não passamos eixos de energia por nossas salas de estar."
koKR = "이미 하지 않았다면, 이제 전원 공급 장치를 제재소에 연결할 수 있습니다.\n\n어려움이 있을 경우, <color=green>“전원 연결 방법” 광고판</color>을 다시 참조하십시오. 누군가와는 달리, 도망칠 기회를 잡지 않았습니다.\n\n제재소의 샤프트 플러그는 구조물의 후면 — 1층 오른쪽에 위치해 있습니다. 실제로 건설하기 전에 이것을 알아차렸기를 바랍니다.\n\n일부 야만인들과는 달리, 우리는 거실을 통해 전원 샤프트를 지나가지 않습니다."
csCZ = "Pokud jste to ještě neudělali, můžete nyní připojit svůj zdroj energie k Pilce.\n\nPokud narazíte na potíže, znovu si prostudujte <color=green>“Jak připojit energii” billboard</color>. Na rozdíl od… někoho… nevyužila první příležitosti k útěku.\n\nKonektor hřídele pily se nachází na zadní straně konstrukce — přízemí, vpravo. Doufám, že jste si toho všimli před tím, než jste ji skutečně postavili.\n\nNa rozdíl od některých divochů, nevedeme energetické hřídele přes naše obývací pokoje."
viVN = "Nếu bạn chưa làm như vậy, bây giờ bạn có thể kết nối nguồn điện của mình với Nhà máy cưa.\n\nNếu bạn gặp khó khăn, hãy tham khảo lại biển hiệu <color=green>“Cách Kết Nối Điện”</color>. Khác với… ai đó… nó không tận dụng cơ hội đầu tiên để chạy trốn.\n\nCổng cắm của trục nhà máy cưa nằm ở phía sau của cấu trúc — tầng trệt, bên phải. Hy vọng bạn đã chú ý đến điều này trước khi thực sự xây dựng nó.\n\nKhác với một số kẻ man rợ, chúng tôi không chạy trục điện qua phòng khách của mình."
trTR = "Eğer bunu zaten yapmadıysanız, şimdi enerji kaynağınızı Kesim Makinesi'ne bağlayabilirsiniz.\n\nEğer zorlanırsanız, tekrar <color=green>“Gücü Nasıl Bağlayacağınız” billboard'una</color> danışın. …birinin tersine… kaçmak için ilk fırsatı değerlendirmedi.\n\nKesim makinesinin şaft prizi yapının arka tarafında — zemin kat, sağda. Umarım bunu gerçekten inşa etmeden önce fark ettinizdir.\n\nBazı vahşilerden farklı olarak, enerji şaftlarını oturma odalarımızdan geçirmiyoruz."

["Tutorial.ProperSawmill.BuildPlankTanks.Whitepaws"]
raw = "Your Rudimentary Sawmill should now be operational. Observe its yield.\n\nEach log produces two planks, at greater speed, and with less sawdust generated in the process. This is what we mean by progress.\n\nConstruct six Plank Tanks. They are significantly more efficient than the small water tanks you assembled in haste.\n\nIf resources are limited, dismantling your existing small tanks to reclaim the logs is acceptable.\n\nTemporary solutions should remain temporary."
status = "normal"
enUS = "Your Rudimentary Sawmill should now be operational. Observe its yield.\n\nEach log produces two planks, at greater speed, and with less sawdust generated in the process. This is what we mean by progress.\n\nConstruct six Plank Tanks. They are significantly more efficient than the small water tanks you assembled in haste.\n\nIf resources are limited, dismantling your existing small tanks to reclaim the logs is acceptable.\n\nTemporary solutions should remain temporary."
zhCN = "“你的初级锯木厂现在应该已开始运作。观察它的产出。\n\n每根木材可产生两块木板，速度更快，并且生成的锯末更少。这就是我们所说的进步。\n\n建造六个木板储罐。它们比你匆忙组装的小水箱要高效得多。\n\n如果资源有限，拆除现有的小水箱以回收木材是可以接受的。\n\n临时解决方案应当保持为临时。”"
zhTW = "您的初步鋸木廠現在應該可以運作了。觀察它的產出。\n\n每根木頭會產出兩塊木板，速度更快，產生的鋸屑也更少。這就是我們所說的進步。\n\n建造六個木板儲槽。它們的效率顯著高於您匆忙組裝的小水槽。\n\n如果資源有限，拆解您現有的小水槽以回收木材是可以接受的。\n\n臨時解決方案應該保持為臨時。"
ruRU = "Вашу Простейшую Пилораму теперь можно использовать. Наблюдайте за её производительностью.\n\nКаждое бревно производит две доски, с большей скоростью и с меньшим количеством образующейся древесной пыли. Вот что мы имеем в виду под прогрессом.\n\nПостройте шесть Tankов для досок. Они значительно более эффективны, чем маленькие водяные баки, которые вы собрали в спешке.\n\nЕсли ресурсы ограничены, то приемлемо разобрать ваши существующие маленькие баки, чтобы вернуть бревна.\n\nВременные решения должны оставаться временными."
jaJP = "あなたの初歩的製材所はこれで稼働するはずです。その収益を観察してください。\n\nそれぞれの丸太は2枚の板を生産し、より速く、そしてプロセスで生成される木くずも少なくなります。これが私たちが進歩と言うものです。\n\n6つの板タンクを建設してください。これらは、急いで組み立てた小さな水タンクに比べて非常に効率的です。\n\n資源が限られている場合は、既存の小タンクを解体して丸太を再利用することが許容されます。\n\n一時的な解決策は一時的なものであるべきです。"
frFR = "Votre scierie rudimentaire devrait maintenant être opérationnelle. Observez son rendement.\n\nChaque bûche produit deux planches, à une vitesse supérieure, et avec moins de sciure générée dans le processus. C'est ce que nous entendons par progrès.\n\nConstruisez six réservoirs à planches. Ils sont significativement plus efficaces que les petits réservoirs d'eau que vous avez assemblés à la hâte.\n\nSi les ressources sont limitées, démonter vos petits réservoirs existants pour récupérer les bûches est acceptable.\n\nLes solutions temporaires doivent rester temporaires."
deDE = "Ihre rudimentäre Säge sollte nun betriebsbereit sein. Beobachten Sie ihren Ertrag.\n\nJeder Baumstamm produziert zwei Bretter, schneller und mit weniger Sägemehl im Prozess. Das ist es, was wir mit Fortschritt meinen.\n\nBauen Sie sechs Brett-Tanks. Sie sind wesentlich effizienter als die kleinen Wassertanks, die Sie in Eile zusammengesetzt haben.\n\nWenn Ressourcen begrenzt sind, ist es akzeptabel, Ihre bestehenden kleinen Tanks abzubauen, um die Stämme zurückzugewinnen.\n\nTemporäre Lösungen sollten temporär bleiben."
plPL = "Twoja podstawowa tartak powinna teraz działać. Obserwuj jego wydajność.\n\nKażde kłoda produkuje dwa deski, z większą prędkością i z mniejszą ilością wiórów generowanych w procesie. Tak definiujemy postęp.\n\nZbuduj sześć zbiorników na deski. Są one znacznie bardziej wydajne niż małe zbiorniki na wodę, które zmontowałeś w pośpiechu.\n\nJeśli zasoby są ograniczone, rozmontowanie istniejących małych zbiorników w celu odzyskania kłód jest akceptowalne.\n\nRozwiązania tymczasowe powinny pozostać tymczasowe."
ptBR = "Sua Serraria Rudimentar deve estar agora operando. Observe sua produção.\n\nCada tora produz duas tábuas, com maior velocidade e com menos serragem gerada no processo. Isso é o que queremos dizer com progresso.\n\nConstrua seis Tanques de Tábuas. Eles são significativamente mais eficientes do que os pequenos tanques de água que você montou às pressas.\n\nSe os recursos forem limitados, desmontar seus tanques pequenos existentes para recuperar as toras é aceitável.\n\nSoluções temporárias devem permanecer temporárias."
koKR = "당신의 기본 톱질 공장이 이제 가동되어야 합니다. 그것의 생산량을 관찰하십시오.\n\n각 통나무는 두 개의 판자를 생산하며, 더 빠르게, 그리고 과정에서 생성되는 톱밥이 적습니다. 이것이 우리가 말하는 진전입니다.\n\n여섯 개의 판자 탱크를 건설하십시오. 그것들은 당신이 서두르면서 조립한 작은 물탱크보다 훨씬 효율적입니다.\n\n자원이 제한적이라면, 통나무를 회수하기 위해 기존的小한 탱크를 해체하는 것도 괜찮습니다.\n\n임시 해결책은 임시로 남아 있어야 합니다."
csCZ = "„Vaše základní pila by nyní měla být funkční. Sledujte její výnos.\n\nKaždý kmen vyprodukuje dva prkna, rychleji a s menším množstvím vznikající piliny. To je to, co máme na mysli, když mluvíme o pokroku.\n\nPostavte šest nádrží na prkna. Jsou výrazně efektivnější než malé vodní nádrže, které jste sestavili ve spěchu.\n\nPokud jsou zdroje omezené, demontáž vašich stávajících malých nádrží za účelem získání kmenů je přijatelná.\n\nDočasná řešení by měla zůstat dočasnými.“"
viVN = "Nhà máy cưa thô sơ của bạn giờ đây nên hoạt động. Hãy quan sát sản lượng của nó.\n\nMỗi khúc gỗ tạo ra hai tấm ván, với tốc độ nhanh hơn, và ít bụi gỗ được sinh ra trong quá trình này. Đây là điều chúng tôi gọi là tiến bộ.\n\nXây dựng sáu bể chứa ván. Chúng hiệu quả hơn nhiều so với các bể nước nhỏ mà bạn đã lắp ráp một cách vội vã.\n\nNếu tài nguyên hạn chế, việc tháo dỡ các bể nhỏ hiện có để thu hồi gỗ là chấp nhận được.\n\nCác giải pháp tạm thời nên giữ nguyên tính tạm thời."
trTR = "Temel Kesim Makineniz artık çalışır durumda olmalı. Verimini gözlemleyin.\n\nHer kütük iki tahta üretir, daha hızlı ve işlemin daha az talaş üretmesiyle. İlerlemeyi kastettiğimiz şey budur.\n\nAltı Tahta Tankı inşa edin. Aceleyle bir araya getirdiğiniz küçük su tanklarından çok daha verimlidirler.\n\nKaynaklar sınırlıysa, mevcut küçük tanklarınızı sökerek kütükleri geri kazanmanız kabul edilebilir.\n\nGeçici çözümler geçici kalmalıdır."

["Tutorial.BuildNewDC.BuildNewDistrictCenter.Whitepaws"]
raw = "While you were certainly scattering yourself on several self-inflicted tasks, your Log Gnawing Station should have produced sufficient planks to construct a proper District Center.\n\nBuild the new center <color=red>before</color> dismantling the original. Your builders work from the cart, removing it prematurely would make them very upset.\n\nWhen you do dismantle the cart, several important items will be released into the debris. They are marked with <color=red>red icons</color>. \n\nRed usually indicates importance. We trust this concept is familiar. These are not decorative and – in fact – vital for the success of your colony.\n\n<color=green>Ensure these materials are collected before the rubble disappears.</color>"
status = "normal"
enUS = "While you were certainly scattering yourself on several self-inflicted tasks, your Log Gnawing Station should have produced sufficient planks to construct a proper District Center.\n\nBuild the new center <color=red>before</color> dismantling the original. Your builders work from the cart, removing it prematurely would make them very upset.\n\nWhen you do dismantle the cart, several important items will be released into the debris. They are marked with <color=red>red icons</color>. \n\nRed usually indicates importance. We trust this concept is familiar. These are not decorative and – in fact – vital for the success of your colony.\n\n<color=green>Ensure these materials are collected before the rubble disappears.</color>"
zhCN = "虽然你确实在自找麻烦上忙碌，但你的原木啃食站应该已经生产出足够的木板来建造一个合适的区域中心。\n\n在拆除原有建筑之前<color=red>先</color>建造新的中心。你的建筑工人是从车上工作的，提前移走它会让他们非常不满。\n\n当你拆除这辆车时，会有几个重要的物品从残骸中释放出来。它们用<color=red>红色图标</color>标记。\n\n红色通常表示重要性。我们相信这个概念你应该熟悉。这些不是装饰品，实际上，对于你殖民地的成功至关重要。\n\n<color=green>确保在废墟消失之前收集这些材料。</color>"
zhTW = "雖然你確實將自己分散到幾個自我施加的任務上，但你的木材咬合站應該已經產出了足夠的木板來建造一個合適的區域中心。\n\n在拆除原有的區域中心之前，<color=red>請先建造新的中心</color>。你的建築工人是從貨車上工作的，過早地拆除它會使他們非常不悅。\n\n當你拆除貨車時，幾個重要物品將會釋放到殘骸中。它們用<color=red>紅色圖標</color>標記。\n\n紅色通常表示重要性。我們相信這個概念是熟悉的。這些物品不是裝飾性的，事實上對於你的殖民地的成功至關重要。\n\n<color=green>請確保在殘骸消失之前收集這些材料。</color>"
ruRU = "Пока ты, безусловно, распределял себя по нескольким самонаносимым задачам, твоя Станция Обжарки Древесины должна была произвести достаточное количество досок для построения proper Центра Района.\n\nПострой новый центр <color=red>перед</color> тем, как разобрать оригинальный. Твои строители работают с тележкой, преждевременное удаление ее очень разозлит их.\n\nКогда ты разобьешь тележку, несколько важных предметов будут выпущены в обломки. Они отмечены <color=red>красными иконками</color>.\n\nКрасный обычно указывает на важность. Мы надеемся, что эта концепция тебе знакома. Это не декоративно и – на самом деле – жизненно необходимо для успеха твоей колонии.\n\n<color=green>Убедись, что эти материалы собраны до того, как обломки исчезнут.</color>"
jaJP = "「あなたは確かにいくつかの自己負担の作業に散らばっていたが、あなたのログをかじるステーションは適切な地区センターを建設するのに十分な板を生産しているはずだ。\n\n元のセンターを解体する<color=red>前に</color>新しいセンターを建てること。あなたの建設者はカートから作業しており、早期に取り外すと非常に不満を抱くことになる。\n\nカートを解体すると、いくつかの重要なアイテムが破片の中に放出される。それらは<color=red>赤いアイコン</color>でマークされている。\n\n赤は通常重要性を示す。私たちはこの概念が馴染み深いことを信じている。これらは装飾的なものではなく、実際にはあなたのコロニーの成功にとって不可欠だ。\n\n<color=green>これらの素材が瓦礫が消える前に集められることを確認してください。</color>」"
frFR = "« Alors que vous vous dispersiez certainement sur plusieurs tâches que vous vous êtes infligées, votre station de découpe de rondins aurait dû produire suffisamment de planches pour construire un véritable Centre de District.\n\nConstruisez le nouveau centre <color=red>avant</color> de démonter l'original. Vos bâtisseurs travaillent depuis le chariot, le retirer prématurément les mettrait très en colère.\n\nLorsque vous démonterez le chariot, plusieurs objets importants seront libérés dans les débris. Ils sont marqués avec des <color=red>icônes rouges</color>.\n\nLe rouge indique généralement une importance. Nous faisons confiance à ce que ce concept vous soit familier. Ce ne sont pas décoratifs et – en fait – vitaux pour le succès de votre colonie.\n\n<color=green>Assurez-vous que ces matériaux soient récupérés avant que les décombres ne disparaissent.</color> »"
deDE = "Während du dich sicherlich mit mehreren selbstauferlegten Aufgaben beschäftigt hast, sollte deine Holzzerkleinerungsstation ausreichend Planken produziert haben, um ein richtiges Stadtzentrum zu bauen.\n\nBau das neue Zentrum <color=red>vor</color> der Demontage des Originals. Deine Bauarbeiter arbeiten vom Wagen aus, eine vorzeitige Entfernung würde sie sehr verärgern.\n\nWenn du den Wagen demontierst, werden mehrere wichtige Gegenstände im Schutt freigesetzt. Diese sind mit <color=red>roten Symbolen</color> markiert.\n\nRot weist normalerweise auf Bedeutung hin. Wir vertrauen darauf, dass dir dieses Konzept vertraut ist. Diese sind nicht dekorativ und – in der Tat – lebenswichtig für den Erfolg deiner Kolonie.\n\n<color=green>Stelle sicher, dass diese Materialien gesammelt werden, bevor der Schutt verschwindet.</color>"
plPL = "Podczas gdy z pewnością rozpraszałeś się na kilku własnych zadaniach, twoja Stacja Zgryzania Kłód powinna była wyprodukować wystarczającą ilość desek do zbudowania odpowiedniego Centrum Dzielnicy.\n\nZbuduj nowe centrum <color=red>przed</color> rozebraniem oryginału. Twoi budowniczowie pracują z wózka, jego przedwczesne usunięcie bardzo ich zdenerwuje.\n\nKiedy już rozburasz wózek, kilka ważnych przedmiotów zostanie uwolnionych w gruzach. Są one oznaczone <color=red>czerwonymi ikonami</color>.\n\nCzerwony zwykle wskazuje na ważność. Ufamy, że ten koncept jest ci znany. To nie są ozdobne przedmioty i – w rzeczywistości – są kluczowe dla sukcesu twojej kolonii.\n\n<color=green>Upewnij się, że te materiały są zebrane, zanim gruz zniknie.</color>"
ptBR = "Enquanto você estava certamente se espalhando em várias tarefas auto infligidas, sua Estação de Roer Toras deveria ter produzido pranchas suficientes para construir um Centro de Distrito adequado.\n\nConstrua o novo centro <color=red>antes</color> de desmontar o original. Seus construtores trabalham a partir do carrinho, removê-lo prematuramente os deixaria muito chateados.\n\nQuando você desmontar o carrinho, vários itens importantes serão liberados nos destroços. Eles estão marcados com <color=red>ícones vermelhos</color>.\n\nVermelho geralmente indica importância. Confiamos que esse conceito é familiar. Estes não são decorativos e - de fato - vitais para o sucesso da sua colônia.\n\n<color=green>Certifique-se de que esses materiais sejam coletados antes que os escombros desapareçam.</color>"
koKR = "당신이 여러 자초한 작업에 정신이 없었을 때, 당신의 통나무 갉아먹기 정거리는 적절한 구역 센터를 건설할 만큼 충분한 판자를 생산했을 것입니다.\n\n기존의 센터를 해체하기 <color=red>전에</color> 새로운 센터를 건설하세요. 당신의 건설자들은 수레에서 작업하므로, 이를 조기에 제거하면 매우 불쾌해질 것입니다.\n\n수레를 해체할 때, 몇 가지 중요한 아이템이 잔해로 풀려날 것입니다. 이들은 <color=red>빨간 아이콘</color>으로 표시되어 있습니다.\n\n빨간색은 보통 중요성을 나타냅니다. 이 개념이 익숙하길 바랍니다. 이들은 장식적이지 않으며 – 사실 – 당신의 식민지 성공에 필수적입니다.\n\n<color=green>잔해가 사라지기 전에 이 자재들이 수집되도록 하세요.</color>"
csCZ = "Zatímco jste se určitě rozptylovali s několika vlastními úkoly, vaše Stanice na kácení dřeva by měla vyprodukovat dostatek prken k postavení pořádného Centra okresu.\n\nPostavte nové centrum <color=red>před</color> demontáží původního. Vaši stavitelé pracují z vozíku, jeho předčasné odstranění by je velmi rozčílilo.\n\nKdyž vozík demontujete, několik důležitých předmětů se uvolní do suti. Jsou označeny <color=red>červenými ikonami</color>. \n\nČervená obvykle označuje důležitost. Doufáme, že tento koncept je vám známý. Tyto předměty nejsou dekorativní a – ve skutečnosti – jsou nezbytné pro úspěch vaší kolonie.\n\n<color=green>Zajistěte, aby byly tyto materiály sesbírány, než sutiny zmizí.</color>"
viVN = "Trong khi bạn chắc chắn đã phân tán bản thân vào một số nhiệm vụ tự gây ra, Trạm Gặm Gỗ của bạn nên đã sản xuất đủ bảng để xây dựng một Trung tâm Khu vực đúng nghĩa.\n\nXây dựng trung tâm mới <color=red>trước</color> khi tháo dỡ bản gốc. Các thợ xây của bạn làm việc từ xe cart, việc loại bỏ nó sớm sẽ khiến họ rất không hài lòng.\n\nKhi bạn tháo dỡ xe cart, một số vật phẩm quan trọng sẽ được giải phóng vào đống đổ nát. Chúng được đánh dấu bằng <color=red>biểu tượng đỏ</color>.\n\nMàu đỏ thường chỉ ra tầm quan trọng. Chúng tôi hy vọng khái niệm này là quen thuộc với bạn. Đây không phải là trang trí và – thực tế – rất cần thiết cho sự thành công của thuộc địa của bạn.\n\n<color=green>Đảm bảo rằng những vật liệu này được thu thập trước khi đống đổ nát biến mất.</color>"
trTR = "Kesinlikle kendinize birkaç zorunlu görev yüklerken, Ağaç Kıyma İstasyonu, düzgün bir Bölge Merkezi inşa etmek için yeterli tahtayı üretmiş olmalı.\n\nYeni merkezi <color=red>orijinalini</color> sökmeden önce inşa edin. İşçileriniz arabadan çalışıyor, onu erken sökmek onları çok üzebilir.\n\nArabayı söktüğünüzde, enkaza birkaç önemli eşya düşecektir. Bunlar <color=red>kırmızı ikonlarla</color> işaretlenmiştir.\n\nKırmızı genellikle önem gösterir. Bu kavramın size tanıdık olduğuna güveniyoruz. Bunlar dekoratif değil ve aslında koloninizin başarısı için hayati öneme sahip.\n\n<color=green>Bu malzemelerin enkaz kaybolmadan önce toplandığından emin olun.</color>"

["Tutorial.BuildNewDC.BuildDynamitestorage.Whitepaws"]
raw = "Among the contents recovered from the dismantled cart, you may have noticed several sticks of <color=green>Dynamite</color>.\n\nYou are free to use these explosives as you see fit. We recommend doing so wisely, but who are we kidding ?\n\nPrepare an adequate storage for explosives. In case you have forgotten, common sense says to keep them in a dry, covered, and locked building."
status = "normal"
enUS = "Among the contents recovered from the dismantled cart, you may have noticed several sticks of <color=green>Dynamite</color>.\n\nYou are free to use these explosives as you see fit. We recommend doing so wisely, but who are we kidding?\n\nPrepare an adequate storage for explosives. In case you have forgotten, common sense says to keep them in a dry, covered, and locked building."
zhCN = "在拆解的手推车中，您可能注意到了几根<color=green>炸药</color>。\n\n您可以随意使用这些爆炸物。我们建议明智地使用，但我们谁都知道？\n\n请为爆炸物准备一个合适的储存空间。如果您忘记了，常识告诉我们将它们放在一个干燥、有盖且上锁的建筑内。"
zhTW = "在拆卸的手推車中回收的內容物中，你可能注意到幾根<color=green>炸藥</color>。\n\n你可以隨意使用這些爆炸物。我們建議明智地使用，但誰會在乎呢？\n\n為炸藥準備適當的儲存空間。如果你忘記了，常識告訴我們要將它們存放在乾燥、遮蔽且上鎖的建築物中。"
ruRU = "Среди материалов, recovered из разобранной телеги, вы могли заметить несколько палочек <color=green>Динамита</color>.\n\nВы можете свободно использовать эти взрывчатые вещества по своему усмотрению. Мы рекомендуем делать это с умом, но кого мы обманываем?\n\nПодготовьте подходящее хранилище для взрывчатых веществ. На случай, если вы забыли, здравый смысл говорит хранить их в сухом, закрытом и запертом здании."
jaJP = "解体されたカートから回収された内容物の中に、いくつかの<color=green>ダイナマイト</color>の棒が見つかったかもしれません。\n\nこれらの爆薬はご自由にお使いください。賢明に使用することをお勧めしますが、私たちの言っていることを誰が真剣に受け止めるでしょうか？\n\n爆薬のための適切な保管を準備してください。忘れてしまった場合のために、常識ではそれらを乾燥した覆われた施錠された建物に保管することが求められます。"
frFR = "Parmi le contenu récupéré du chariot démonté, vous avez peut-être remarqué plusieurs bâtons de <color=green>Dynamite</color>.\n\nVous êtes libre d'utiliser ces explosifs comme bon vous semble. Nous recommandons de le faire judicieusement, mais qui trompe-t-on ?\n\nPréparez un stockage adéquat pour les explosifs. Au cas où vous auriez oublié, le bon sens dit de les garder dans un bâtiment sec, couvert et verrouillé."
deDE = "Unter den Inhalten, die aus dem abgebauten Wagen geborgen wurden, haben Sie vielleicht mehrere Stangen <color=green>Dynamit</color> bemerkt.\n\nSie können diese Sprengstoffe nach Belieben verwenden. Wir empfehlen, dies weise zu tun, aber wer sind wir, dass wir uns selbst belügen?\n\nBereiten Sie eine angemessene Lagerung für Sprengstoffe vor. Falls Sie es vergessen haben, besagt der gesunde Menschenverstand, dass man sie in einem trockenen, überdachten und verschlossenen Gebäude aufbewahren sollte."
plPL = "Wśród zawartości odzyskanej z rozebranej wózki mogłeś zauważyć kilka sztuk <color=green>Dynamitu</color>.\n\nMożesz swobodnie wykorzystać te materiały wybuchowe według własnego uznania. Zalecamy robienie tego rozsądnie, ale z kim my się oszukujemy?\n\nPrzygotuj odpowiednie miejsce do przechowywania materiałów wybuchowych. Na wszelki wypadek, gdybyś zapomniał, zdrowy rozsądek podpowiada, aby przechowywać je w suchym, zadaszonym i zamkniętym budynku."
ptBR = "Entre os conteúdos recuperados do carro desmontado, você pode ter notado vários paus de <color=green>Dinamite</color>.\n\nVocê é livre para usar esses explosivos como achar melhor. Recomendamos que faça isso com sabedoria, mas quem estamos enganando?\n\nPrepare um armazenamento adequado para explosivos. Caso tenha esquecido, o bom senso diz para mantê-los em um edifício seco, coberto e trancado."
koKR = "해체된 수레에서 회수한 물품 중 몇 개의 <color=green>다이너마이트</color>가 발견되었을 것입니다.\n\n이 폭발물을 당신의 마음대로 사용할 수 있습니다. 현명하게 사용하라고 권장하지만, 누구를 속이겠습니까?\n\n폭발물에 대한 적절한 저장 공간을 준비하세요. 잊으셨을 경우를 대비해 조언하자면, 일반 상식에 따르면 폭발물은 건조하고 덮여 있으며 잠긴 건물에 보관해야 합니다."
csCZ = "Mezi obsahy, které byly nalezeny v rozebraném voze, jste si mohli všimnout několika klacků <color=green>dynamitu</color>.\n\nTyto výbušniny můžete použít dle vlastního uvážení. Doporučujeme to dělat moudře, ale koho my klameme?\n\nPřipravte odpovídající sklad pro výbušniny. Pro případ, že jste zapomněli, zdravý rozum říká, že je třeba je uchovávat v suché, zakryté a zamčené budově."
viVN = "Trong số các nội dung được thu hồi từ chiếc xe đẩy đã bị tháo dỡ, bạn có thể đã nhận thấy vài đoạn <color=green>Dynamite</color>.\n\nBạn có quyền sử dụng những chất nổ này theo ý thích. Chúng tôi khuyên bạn nên sử dụng một cách khôn ngoan, nhưng ai mà quan tâm chứ?\n\nHãy chuẩn bị một kho lưu trữ đầy đủ cho chất nổ. Trong trường hợp bạn đã quên, lẽ thường nói rằng nên giữ chúng trong một tòa nhà khô ráo, có mái che và khóa lại."
trTR = "Sökülen arabanın içerisinden geri kazanılan maddeler arasında birkaç <color=green>Dinamiti</color> çubuğunu muhtemelen fark ettiniz.\n\nBu patlayıcıları istediğiniz gibi kullanabilirsiniz. Akıllıca kullanmanızı öneririz ama kime ne? \n\nPatlayıcılar için uygun bir depolama alanı hazırlayın. Unuttuysanız, sağduyu, bunları kuru, kapalı ve kilitli bir binada saklamanızı söyler."

["Tutorial.BuildNewDC.BuildMetalBasics.Whitepaws"]
raw = "Among the recovered materials from the cart, you will have secured an <color=green>Anvil</color>.\n\nWith it, you may construct a Primitive Ironworks — and with ironworks, we may finally speak of real engineering.\n\nTo supply it, establish a Scavenger Flag and begin collecting Scrap Metal from nearby ruins.\n\nIn addition, construct a Primitive Mine. It may extract Iron Ore or Coal, both of which can be refined into scrap metal within an <color=green>Ore Smelter</color>. Alternatively, coal can be obtained from the <color=green>woodburner</color>, should your tendency to destroy the environment have already got the best of you.\n\nWith this, you can at last build a proper dam and make droughts easier on your people.\n\nAccidentally, you might even make your mother proud. And surpised."
status = "normal"
enUS = "Among the recovered materials from the cart, you will have secured an <color=green>Anvil</color>.\n\nWith it, you may construct a Primitive Ironworks — and with ironworks, we may finally speak of real engineering.\n\nTo supply it, establish a Scavenger Flag and begin collecting Scrap Metal from nearby ruins.\n\nIn addition, construct a Primitive Mine. It may extract Iron Ore or Coal, both of which can be refined into scrap metal within an <color=green>Ore Smelter</color>. Alternatively, coal can be obtained from the <color=green>woodburner</color>, should your tendency to destroy the environment have already got the best of you.\n\nWith this, you can at last build a proper dam and make droughts easier on your people.\n\nAccidentally, you might even make your mother proud. And surprised."
zhCN = "在从手推车回收的材料中，你将获得一个<color=green>铁砧</color>。\n\n有了它，你可以建造一个原始冶铁厂——有了冶铁厂，我们终于可以谈论真正的工程了。\n\n为了供给它，建立一个拾荒者旗帜，开始从附近的废墟中收集废金属。\n\n此外，建造一个原始矿井。它可以提取铁矿石或煤，这两者都可以在<color=green>矿石冶炼炉</color>中精炼成废金属。或者，如果你对破坏环境的倾向已经让你失去了理智，煤也可以通过<color=green>木材燃烧器</color>获取。\n\n这样，你终于可以建造一个真正的水坝，让干旱对你的人民变得更容易应对。\n\n偶然间，你甚至可能让你的母亲感到骄傲。而且感到惊讶。"
zhTW = "在從手推車回收的材料中，您將獲得一個<color=green>鐵砧</color>。\n\n有了它，您可以建造一座原始鐵工廠——有了鐵工廠，我們終於可以談論真正的工程。\n\n為了供應它，建立一面拾荒者旗幟並開始從附近的廢墟中收集廢金屬。\n\n此外，建造一座原始礦場。它可以提取鐵礦石或煤，這兩者都可以在<color=green>礦石冶煉爐</color>中精煉成廢金屬。或者，如果您已經在破壞環境方面顯示出傾向，則可以從<color=green>木材燃燒器</color>那裡獲得煤。\n\n這樣一來，您終於可以建立一座合適的水壩，讓乾旱對您的人民影響較小。\n\n意外地，您甚至可能讓您的母親感到驕傲。而且感到驚訝。"
ruRU = "СредиRecovered materials from the cart, you will have secured an <color=green>Anvil</color>.\n\nС его помощью вы сможете построить Примитивный Железоделательный Завод — и с железоделательным заводом мы наконец сможем говорить о настоящей инженерии.\n\nЧтобы обеспечить его, установите Флаг Сборщика и начните собирать Ломанный Металл из близлежащих руин.\n\nКроме того, постройте Примитивную Шахту. Она может добывать Железную Руду или Уголь, которые могут быть переработаны в лом в <color=green>Печь для Переработки Руды</color>. В качестве альтернативы, уголь можно получить с <color=green>дровяной печи</color>, если ваша склонность разрушать природу уже взяла верх.\n\nС этим вы сможете наконец построить proper dam и облегчить засухи для вашего народа.\n\nСлучайно, вы можете даже сделать свою мать гордой. И удивленной."
jaJP = "回収した材料の中に、<color=green>金床</color>を確保しました。\n\nこれを使って、原始的な製鉄所を建設することができます — そして、製鉄所があれば、ようやく本格的な工学について語ることができるようになります。\n\nそれを供給するために、スカベンジャーフラッグを設置し、近くの廃墟からスクラップメタルを集め始めてください。\n\nさらに、原始的な鉱山を建設しましょう。これにより、鉄鉱石や石炭を採掘でき、どちらも<color=green>鉱石精錬所</color>でスクラップメタルに精製できます。あるいは、環境を破壊する傾向が既に出ている場合は、<color=green>薪ストーブ</color>から石炭を得ることもできます。\n\nこれで、ついに適切なダムを建設し、干ばつをあなたの人々にとって楽にすることができます。\n\n偶然にも、あなたは母を誇りに思わせることができるかもしれません。そして驚かせることも。"
frFR = "Parmi les matériaux récupérés dans la charrette, vous aurez sécurisé un <color=green>Enclume</color>.\n\nAvec cela, vous pouvez construire une Fonderie Primitive — et avec la fonderie, nous pouvons enfin parler de véritable ingénierie.\n\nPour l'approvisionner, établissez un Drapeau de Récupération et commencez à collecter du Métal Récupéré dans les ruines voisines.\n\nDe plus, construisez une Mine Primitive. Elle peut extraire du Minerai de Fer ou du Charbon, tous deux pouvant être raffinés en métal récupéré dans un <color=green>Fourneau à Minerai</color>. Alternativement, du charbon peut être obtenu auprès de la <color=green>chaufferie</color>, si votre tendance à détruire l'environnement vous a déjà eu raison.\n\nAvec cela, vous pourrez enfin construire un véritable barrage et rendre les sécheresses moins difficiles pour votre peuple.\n\nPar accident, vous pourriez même rendre votre mère fière. Et surprise."
deDE = "Unter den wiedergewonnenen Materialien aus dem Wagen hast du ein <color=green>Amboss</color> gesichert.\n\nDamit kannst du ein primitves Eisenwerk bauen — und mit Eisenwerken können wir endlich von echter Ingenieurskunst sprechen.\n\nUm es zu versorgen, errichte eine Plündererflagge und beginne, Schrottmetall aus den nahegelegenen Ruinen zu sammeln.\n\nZusätzlich baue eine primitive Mine. Diese kann Eisenerz oder Kohle abbauen, die beide in einem <color=green>Erzschmelzer</color> in Schrottmetall verfeinert werden können. Alternativ kann Kohle auch aus dem <color=green>Holzofen</color> gewonnen werden, falls deine Neigung, die Umwelt zu zerstören, dich bereits überwältigt hat.\n\nDamit kannst du endlich einen richtigen Damm bauen und Dürreperioden deinen Leuten erleichtern.\n\nVielleicht machst du sogar deine Mutter stolz. Und überrascht."
plPL = "Wśród odzyskanych materiałów z wózka znajdziesz <color=green>kowadło</color>.\n\nZ jego pomocą możesz zbudować Prymitywne Żelazarnie — a z żelazarnią w końcu możemy mówić o prawdziwym inżynierstwie.\n\nAby je zasilić, załóż Sztandar Zbieracza i rozpocznij zbieranie Złomu z pobliskich ruin.\n\nDodatkowo skonstruuj Prymitywną Kopalnię. Może wydobywać Rudę Żelaza lub Węgiel, obie z nich mogą być przetwarzane na złom w <color=green>piecu do topienia rud</color>. Alternatywnie, węgiel można zdobyć z <color=green>kominka</color>, jeśli Twoja tendencja do niszczenia środowiska już Ciebie przerosła.\n\nDzięki temu w końcu będziesz mógł zbudować odpowiedni tamę i ułatwić swoim ludziom przetrwanie suszy.\n\nPrzypadkowo możesz nawet sprawić, że twoja matka będzie z ciebie dumna. I zaskoczona."
ptBR = "Entre os materiais recuperados da carruagem, você terá garantido uma <color=green>Bigorna</color>.\n\nCom isso, você pode construir uma Fundição Primitiva — e, com a fundição, finalmente podemos falar sobre engenharia de verdade.\n\nPara abastecê-la, estabeleça uma Bandeira de Coletor e comece a coletar Metal Padrão das ruínas próximas.\n\nAlém disso, construa uma Mina Primitiva. Ela pode extrair Minério de Ferro ou Carvão, ambos os quais podem ser refinados em metal padrão dentro de um <color=green>Forno de Fundição</color>. Alternativamente, carvão pode ser obtido do <color=green>queimador de madeira</color>, caso sua tendência de destruir o meio ambiente já tenha se sobressaído.\n\nCom isso, você pode finalmente construir uma represa adequada e facilitar as secas para seu povo.\n\nAcidentalmente, você pode até deixar sua mãe orgulhosa. E surpresa."
koKR = "수레에서 회수한 자재 중에서 <color=green>모루</color>를 확보했습니다.\n\n이를 사용하여 원시 제철소를 건설할 수 있으며, 제철소를 통해 우리는 마침내 진정한 공학에 대해 이야기할 수 있습니다.\n\n제철소에 자원을 공급하기 위해 수거 깃발을 설치하고 근처 유적지에서 고철 수집을 시작하세요.\n\n또한 원시 광산을 건설하세요. 이는 철광석이나 석탄을 채굴할 수 있으며, 두 자원 모두 <color=green>광석 제련소</color>에서 고철로 정제될 수 있습니다. 대안으로, 석탄은 <color=green>목재 연소기</color>에서 얻을 수 있으며, 환경을 파괴하는 경향이 이미 당신에게 영향을 미쳤다면 이 방법이 될 수 있습니다.\n\n이것으로 당신은 마침내 제대로 된 댐을 건설하고 가뭄이 당신의 사람들에게 조금 더 쉬워지도록 만들 수 있습니다.\n\n어쩌면 우연히도 당신은 어머니를 자랑스럽게 할 수 있을지도 모릅니다. 그리고 놀랄 것입니다."
csCZ = "Mezi vybranými materiály z vozu jste zajistili <color=green>kladivo</color>.\n\nS ním můžete postavit Primitivní železárnu — a s železárnou můžeme konečně mluvit o skutečném inženýrství.\n\nAbychom ji zásobili, zřiďte Vlajku sběrače a začněte shromažďovat šrot z blízkých ruin.\n\nKromě toho vybudujte Primitivní důl. Ten může těžit Železnou rudu nebo Uhlí, obojí lze rafinovat na šrot v <color=green>železářské peci</color>. Alternativně lze uhlí získat z <color=green>krbu na dřevo</color>, pokud už vaše tendence ničit prostředí nezískala navrch.\n\nS tímto můžete konečně postavit pořádnou přehradu a usnadnit období sucha vašim lidem.\n\nNáhodou byste dokonce mohli udělat radost vaší matce. A překvapit."
viVN = "Giữa những vật liệu thu hồi từ xe, bạn sẽ có được một <color=green>Đe</color>.\n\nVới nó, bạn có thể xây dựng một Nhà máy Sắt Thô — và với nhà máy, chúng ta có thể cuối cùng nói về kỹ thuật thực sự.\n\nĐể cung cấp cho nó, hãy thiết lập một Cờ Tìm kiếm và bắt đầu thu thập Kim loại Thép từ những tàn tích gần đó.\n\nNgoài ra, hãy xây dựng một Mỏ Thô. Nó có thể khai thác Quặng Sắt hoặc Than, cả hai đều có thể được tinh chế thành kim loại phế liệu trong một <color=green>Lò luyện quặng</color>. Ngoài ra, than có thể được thu được từ <color=green>lò đốt gỗ</color>, nếu xu hướng phá hủy môi trường của bạn đã chiếm ưu thế.\n\nVới điều này, bạn cuối cùng có thể xây dựng một con đập đúng nghĩa và làm cho các đợt hạn hán dễ dàng hơn cho người dân của bạn.\n\nKhông may, bạn thậm chí có thể làm mẹ bạn tự hào. Và ngạc nhiên."
trTR = "Arabayla kurtarılan malzemeler arasında <color=green>Demirci</color>yi güvence altına aldınız.\n\nBununla Bir İlk Çağ Demirhanesi inşa edebilirsiniz — ve demirhaneler ile nihayet gerçek mühendislikten bahsedebiliriz.\n\nBunu beslemek için bir Kaşif Bayrağı kurun ve çevredeki kalıntalardan Hurda Metal toplamaya başlayın.\n\nAyrıca bir İlkel Maden inşa edin. Bu, Demir Cevheri veya Kömür çıkarabilir; her ikisi de <color=green>Cevher Fırını</color> içinde hurda metal olarak işlenebilir. Alternatif olarak, çevreyi tahrip etme eğiliminiz zaten kontrolden çıktıysa, kömürü <color=green>odun yakıcıdan</color> da elde edebilirsiniz.\n\nBununla sonunda düzgün bir baraj inşa edebilir ve kuraklıkları halkınız için daha katlanılır hale getirebilirsiniz.\n\nAyrıca, yanlışlıkla annenizi bile gururlandırabilirsiniz. Ve onu şaşırtabilirsiniz."

["Tutorial.BuildNewDC.BuildOreStorage.Whitepaws"]
raw = "With mining operations underway, you will require proper storage for raw materials.\n\nConstruct a Large Pile for Iron Ore, and another for Coal.\n\nIf mined minerals remain stored inside the mine, have they truly been mined?"
status = "normal"
enUS = "With mining operations underway, you will require proper storage for raw materials.\n\nConstruct a Large Pile for Iron Ore, and another for Coal.\n\nIf mined minerals remain stored inside the mine, have they truly been mined?"
zhCN = "“随着采矿工作的进行，您需要为原材料提供适当的存储。\n\n建造一个用于铁矿石的大堆，以及另一个用于煤炭的大堆。\n\n如果开采的矿物仍然存放在矿山内部，那么它们是否真被开采？”"
zhTW = "隨著採礦作業的展開，您將需要適當的原材料儲存設施。\n\n建造一個大型鐵礦堆，和另一個煤堆。\n\n如果開採的礦物仍然存放在礦井中，那它們真的算被開採了嗎？"
ruRU = "С началом горных работ вам потребуется соответствующее хранилище для сырья.\n\nПостройте Большую Кучу для Железной Руды и другую для Угля.\n\nЕсли добытые минералы остаются в шахте, были ли они действительно добыты?"
jaJP = "「採掘作業が進行中ですので、原材料の適切な保管場所が必要です。\n\n鉄鉱石用に大きな山を一つ、石炭用にもう一つ建設してください。\n\nもし採掘された鉱石が鉱山内に保管されたままであれば、それは本当に採掘されたと言えるのでしょうか？」"
frFR = "Avec les opérations minières en cours, vous aurez besoin d'un stockage approprié pour les matières premières.\n\nConstruisez une grande pile pour le minerai de fer, et une autre pour le charbon.\n\nSi les minéraux extraits restent stockés à l'intérieur de la mine, ont-ils vraiment été extraits ?"
deDE = "„Mit den Bergbauarbeiten benötigen Sie geeigneten Stauraum für Rohstoffe.\n\nBauen Sie einen großen Haufen für Eisenerz und einen weiteren für Kohle.\n\nWenn abgebauten Mineralien im Bergwerk gelagert bleiben, wurden sie dann wirklich abgebaut?“"
plPL = "Rozpoczęcie operacji wydobywczych wymaga odpowiedniego przechowywania surowców.\n\nZbuduj Dużą Stos na Rudę Żelaza oraz kolejną na Węgiel.\n\nJeśli wydobyte minerały pozostają przechowywane wewnątrz kopalni, czy naprawdę zostały wydobyte?"
ptBR = "Com as operações de mineração em andamento, você precisará de um armazenamento adequado para os materiais brutos.\n\nConstrua uma Pilha Grande para Minério de Ferro e outra para Carvão.\n\nSe os minerais extraídos permanecerem armazenados dentro da mina, eles realmente foram minerados?"
koKR = "채굴 작업이 진행 중이라면, 원자재를 위한 적절한 저장소가 필요합니다.\n\n철광석을 위한 대형 더미를 하나, 석탄을 위한 또 다른 더미를 건설하세요.\n\n채굴된 광물이 광산 안에 저장되어 있다면, 진정으로 채굴된 것인가요?"
csCZ = "S těžebními operacemi na vzestupu budete potřebovat správné skladování pro suroviny.\n\nPostavte Velkou Hromadu pro Železnou Rudu a další pro Uhel.\n\nPokud vytěžené minerály zůstanou uložené uvnitř dolu, byly skutečně vytěženy?"
viVN = "Với các hoạt động khai thác đang diễn ra, bạn sẽ cần kho lưu trữ thích hợp cho các nguyên liệu thô.\n\nHãy xây dựng một Đống Lớn cho Quặng Sắt, và một cái khác cho Than.\n\nNếu các khoáng sản được khai thác vẫn được lưu trữ bên trong mỏ, thì chúng có thực sự đã được khai thác không?"
trTR = "Madencilik operasyonları başladığında, ham malzemeler için uygun depolama alanlarına ihtiyacınız olacak.\n\nDemir Cevheri için Büyük Bir Yığın ve Kömür için bir tane daha inşa edin.\n\nEğer çıkarılan mineraller madenin içinde depolanıyorsa, gerçekten çıkarılmış mı sayılırlar?"

["Tutorial.BuildNewDC.PlaceLibrary.Whitepaws"]
raw = "You have secured water, food, and iron. This is acceptable.\n\nIt is now time to pursue something rarer: knowledge.\n\nAmong the items recovered from the cart was an <color=green>Incredibly Compact Library Set</color>. We dare to hope you did not mistake it for dried food.\n\nStart construction of a Library. It will take time to complete. Scholarship rarely tolerates haste.\n\nOnce operational, it will allow the generation of Science, and with science, progress beyond improvisation."
status = "normal"
enUS = "You have secured water, food, and iron. This is acceptable.\n\nIt is now time to pursue something rarer: knowledge.\n\nAmong the items recovered from the cart was an <color=green>Incredibly Compact Library Set</color>. We dare to hope you did not mistake it for dried food.\n\nStart construction of a Library. It will take time to complete. Scholarship rarely tolerates haste.\n\nOnce operational, it will allow the generation of Science, and with science, progress beyond improvisation."
zhCN = "“你已经确保了水源、食物和铁。这是可以接受的。\n\n现在是追求更稀有的东西：知识的时候了。\n\n从手推车中找回的物品中有一套<color=green>极其紧凑的图书馆套件</color>。我们希望你没有把它误认为是干粮。\n\n开始建设图书馆。完工需要时间。学术研究很少容忍急躁。\n\n一旦投入使用，它将允许生成科学，并通过科学实现超越即兴发挥的进步。”"
zhTW = "你已經確保了水、食物和鐵。這是可以接受的。\n\n現在是追求更稀有的東西：知識的時候了。\n\n從推車回收的物品中，有一個<color=green>極為緊湊的圖書館套件</color>。我們大膽地希望你沒有將它誤認為乾糧。\n\n開始建造圖書館。這需要一些時間來完成。學術研究很少容忍匆忙。\n\n一旦投入運營，它將允許生成科學，而有了科學，則能超越臨時的應對。"
ruRU = "«Вы обеспечили себя водой, едой и железом. Это приемлемо.\n\nТеперь пришло время заняться чем-то более редким: знаниями.\n\nСреди предметов, извлеченных из повозки, был <color=green>Удивительно Компактный Набор Библиотеки</color>. Мы смеем надеяться, что вы не перепутали его с сушеными продуктами.\n\nНачните строительство библиотеки. Это займет некоторое время. Наука редко терпит спешку.\n\nКак только она будет готова, вы сможете генерировать Науку, а с наукой - продвигаться дальше, чем просто импровизация.»"
jaJP = "「水、食料、鉄を確保しました。これは許容範囲です。\n\n今こそ、より珍しいもの、つまり知識を追求する時です。\n\n運搬車から回収されたアイテムの中に、<color=green>非常にコンパクトな図書館セット</color>がありました。これを乾燥食品と間違えなかったことを願います。\n\n図書館の建設を開始してください。完成までには時間がかかります。学問は急ぐことをほとんど容認しません。\n\n稼働を開始すると、科学を生成できるようになり、科学をもって即興を越えた進歩が可能になります。」"
frFR = "Vous avez sécurisé de l'eau, de la nourriture et du fer. C'est acceptable.\n\nIl est maintenant temps de poursuivre quelque chose de plus rare : la connaissance.\n\nParmi les objets récupérés dans la charrette se trouvait un <color=green>ensemble de bibliothèque incroyablement compact</color>. Nous osons espérer que vous ne l'avez pas confondu avec de la nourriture séchée.\n\nCommencez la construction d'une bibliothèque. Cela prendra du temps pour être terminé. Le savoir tolère rarement la hâte.\n\nUne fois opérationnelle, elle permettra la génération de science, et avec la science, le progrès au-delà de l'improvisation."
deDE = "„Sie haben Wasser, Nahrung und Eisen gesichert. Das ist akzeptabel.\n\nEs ist jetzt an der Zeit, etwas Rarerem nachzujagen: Wissen.\n\nUnter den aus dem Wagen geborgenen Gegenständen befand sich ein <color=green>unglaublich kompaktes Bibliotheksset</color>. Wir wagen zu hoffen, dass Sie es nicht mit Trockenlebensmitteln verwechselt haben.\n\nBeginnen Sie mit dem Bau einer Bibliothek. Es wird Zeit in Anspruch nehmen, sie zu vervollständigen. Wissenschaft toleriert selten Eile.\n\nSobald sie betriebsbereit ist, wird sie die Generierung von Wissenschaft ermöglichen, und mit Wissenschaft wird der Fortschritt über Improvisation hinausgehen.“"
plPL = "Zabezpieczyłeś wodę, jedzenie i żelazo. To jest akceptowalne.\n\nNadszedł czas, aby dążyć do czegoś rzadszego: wiedzy.\n\nWśród przedmiotów odzyskanych z wózka znalazł się <color=green>Inaczej Kompaktowy Zestaw Biblioteki</color>. Śmielibyśmy mieć nadzieję, że nie pomyliłeś go z suszoną żywnością.\n\nRozpocznij budowę Biblioteki. Zajmie to trochę czasu, aby ją ukończyć. Wiedza rzadko toleruje pośpiech.\n\nGdy będzie w pełni operacyjna, pozwoli na generowanie Nauki, a z nauką – postęp poza improwizację."
ptBR = "Você garantiu água, comida e ferro. Isso é aceitável.\n\nAgora é hora de buscar algo mais raro: conhecimento.\n\nEntre os itens recuperados do carrinho estava um <color=green>Conjunto de Biblioteca Incrivelmente Compacto</color>. Atrevemo-nos a esperar que você não o tenha confundido com comida seca.\n\nComece a construção de uma Biblioteca. Levará tempo para ser concluída. A erudição raramente tolera pressa.\n\nUma vez em operação, permitirá a geração de Ciência, e com ciência, progresso além da improvisação."
koKR = "당신은 물, 음식, 철을 확보했습니다. 이는 바람직합니다.\n\n이제 더 희귀한 것을 추구할 시간입니다: 지식.\n\n수레에서 회수된 물건 중에는 <color=green>신뢰할 수 있는 소형 도서관 세트</color>가 있었습니다. 당신이 그것을 말린 음식으로 착각하지 않았기를 바랍니다.\n\n도서관 건설을 시작하세요. 완공까지 시간이 걸릴 것입니다. 학문은 급조를 거의 용납하지 않습니다.\n\n운영을 시작하면 과학을 생성할 수 있으며, 과학으로 즉흥적인 것을 넘어서 발전할 수 있습니다."
csCZ = "Zajistili jste vodu, jídlo a železo. To je přijatelné.\n\nNyní je čas usilovat o něco vzácnějšího: znalosti.\n\nMezi předměty, které byly vytaženy z vozu, byl <color=green>neuvěřitelně kompaktní knihovní set</color>. Odvažujeme se doufat, že jste si ho nespletli se sušeným jídlem.\n\nZahajte výstavbu knihovny. Její dokončení potrvá nějaký čas. Věda málokdy snáší spěch.\n\nJakmile bude v provozu, umožní generování vědy, a s vědou pokrok nad rámec improvizace."
viVN = "Bạn đã đảm bảo nước, thực phẩm và sắt. Điều này là chấp nhận được.\n\nGiờ đây, đã đến lúc theo đuổi điều gì đó hiếm có hơn: kiến thức.\n\nTrong số các đồ vật được thu hồi từ xe hàng có một <color=green>Bộ Thư Viện Cực Kỳ Nhỏ Gọn</color>. Chúng tôi dám hy vọng bạn không nhầm nó với thực phẩm khô.\n\nHãy bắt đầu xây dựng một Thư Viện. Nó sẽ cần thời gian để hoàn thành. Học vấn hiếm khi chấp nhận sự vội vàng.\n\nKhi đi vào hoạt động, nó sẽ cho phép phát sinh Khoa Học, và với khoa học, tiến bộ vượt ra ngoài sự ứng phó."
trTR = "Su, yiyecek ve demiri güvence altına aldınız. Bu kabul edilebilir.\n\nArtık daha nadir bir şeyin peşine düşme zamanı: bilgi.\n\nArabadan kurtarılan eşyalar arasında bir <color=green>Son Derece Kompakt Kütüphane Seti</color> vardı. Bunun kuru yiyecek olduğunu umuyoruz ki, yanıldığınızda cesaretimizi kaybetmeyiz.\n\nBir Kütüphane inşaatına başlayın. Tamamen tamamlanması zaman alacak. Bilim genellikle aceleye tahammül etmez.\n\nFaaliyete geçtiğinde, Bilim üretecek ve bilimle, doğaçlamanın ötesine geçeceksiniz."

["Tutorial.Library.BuildBadShroomEssentials.Whitepaws"]
raw = "Your Library is now under construction, hopefully you chose a sensible location.\n\nKnowledge does not emerge from architecture alone. Study requires three elements: sustenance, hydration… and stimulation.\n\nTo supply the latter, you must obtain <color=green>Badwater</color>.\n\nFor now, construct a Badwater Bucketing Post and begin collection from your environment. This task carries certain health risks. Exposure causes illness, if anyone, <i>you</i> should remember.\n\nBuild the appropriate facility. Surely you remember from experience the right treatment, do not make us spell it out."
status = "normal"
enUS = "Your Library is now under construction; hopefully, you chose a sensible location.\n\nKnowledge does not emerge from architecture alone. Study requires three elements: sustenance, hydration… and stimulation.\n\nTo supply the latter, you must obtain <color=green>Badwater</color>.\n\nFor now, construct a Badwater Bucketing Post and begin collection from your environment. This task carries certain health risks. Exposure causes illness; if anyone, <i>you</i> should remember.\n\nBuild the appropriate facility. Surely you remember from experience the right treatment; do not make us spell it out."
zhCN = "“您的图书馆正在建设中，希望您选择了一个合适的位置。\n\n知识不仅仅来自建筑。学习需要三个元素：营养、水分……和刺激。\n\n为了提供刺激，您必须获得<color=green>坏水</color>。\n\n现在，建造一个坏水收集站，开始从环境中收集。这项任务存在一定的健康风险。如果有人生病，<i>您</i>应该记得。\n\n建造合适的设施。您一定还记得正确的处理方式，不要让我们直接告诉您。”"
zhTW = "您的圖書館正在建設中，希望您選擇了一個合理的位置。\n\n知識並不僅僅來自建築。學習需要三個要素：糧食、水分……和刺激。\n\n要提供後者，您必須獲取<color=green>壞水</color>。\n\n現在，建造一個壞水取水站並開始從您的環境中收集。這項任務會帶來某些健康風險。暴露會導致疾病，如果有人，<i>您</i>應該記得。\n\n建造適當的設施。您肯定記得從經驗中學到的正確處理方式，不要讓我們明說。"
ruRU = "Ваша Библиотека сейчас строится, надеемся, вы выбрали разумное место.\n\nЗнания не появляются только из архитектуры. Для изучения необходимы три элемента: пища, вода… и стимуляция.\n\nЧтобы обеспечить последнее, вы должны получить <color=green>Плохую воду</color>.\n\nНа данный момент постройте Пункт сбора Плохой воды и начните сбор из окружающей среды. Эта задача сопряжена с определенными рисками для здоровья. Воздействие вызывает болезни, если кто-то и должен помнить об этом, так это <i>вы</i>.\n\nПостройте соответствующее сооружение. Surely you remember from experience the right treatment, do not make us spell it out."
jaJP = "あなたの図書館は現在建設中です。賢明な場所を選んだことを願っています。\n\n知識は建築だけから生まれるものではありません。学習には三つの要素が必要です：栄養、水分… そして刺激です。\n\n後者を補うためには、<color=green>バッドウォーター</color>を取得しなければなりません。\n\nとりあえず、バッドウォーターのバケツポストを建設し、周囲から収集を始めてください。この作業には一定の健康リスクが伴います。誰かが病気になるとしたら、それは<i>あなた</i>でしょうから、よく覚えておいてください。\n\n適切な施設を建設してください。経験から正しい対処法を思い出せるはずですので、私たちが詳細に説明する必要はありません。"
frFR = "Votre bibliothèque est maintenant en construction, espérons que vous avez choisi un emplacement judicieux.\n\nLa connaissance ne découle pas uniquement de l'architecture. L'étude nécessite trois éléments : la subsistance, l'hydratation... et la stimulation.\n\nPour fournir ce dernier, vous devez obtenir <color=green>Badwater</color>.\n\nPour l’instant, construisez un poste de collecte d'Badwater et commencez à recueillir dans votre environnement. Cette tâche comporte certains risques pour la santé. L'exposition entraîne des maladies, si quelqu'un, <i>vous</i> devriez vous en souvenir.\n\nConstruisez l'établissement approprié. Vous vous souvenez sûrement de l'expérience du bon traitement, ne nous faites pas épeler cela."
deDE = "Ihre Bibliothek wird jetzt gebaut, hoffentlich haben Sie einen vernünftigen Standort gewählt.\n\nWissen entsteht nicht allein durch Architektur. Lernen erfordert drei Elemente: Nahrung, Flüssigkeitszufuhr… und Anregung.\n\nUm Letzteres bereitzustellen, müssen Sie <color=green>Schlechtes Wasser</color> beschaffen.\n\nBauen Sie zunächst einen Badewasser-Bucketing-Posten und beginnen Sie mit der Sammlung aus Ihrer Umgebung. Diese Aufgabe birgt gewisse Gesundheitsrisiken. Kontakt verursacht Krankheiten, wenn es jemand gibt, <i>Sie</i> sollten sich daran erinnern.\n\nBauen Sie die entsprechende Einrichtung. Sicherlich erinnern Sie sich aus Erfahrung an die richtige Behandlung, lassen Sie uns nicht alles ausbuchstabieren."
plPL = "Twoja Biblioteka jest teraz w budowie, miejmy nadzieję, że wybrałeś rozsądną lokalizację.\n\nWiedza nie pojawia się tylko z architektury. Nauka wymaga trzech elementów: pożywienia, nawadniania... i stymulacji.\n\nAby zapewnić to ostatnie, musisz zdobyć <color=green>Badwater</color>.\n\nNa razie zbuduj Post do zbierania Badwater i rozpocznij zbieranie z otoczenia. To zadanie wiąże się z pewnym ryzykiem zdrowotnym. Ekspozycja powoduje choroby, jeśli ktokolwiek, <i>ty</i> powinieneś pamiętać.\n\nZbuduj odpowiedni obiekt. Na pewno pamiętasz z doświadczenia odpowiednie leczenie, nie kazuj nam tego wyjaśniać."
ptBR = "Sua Biblioteca está agora em construção, esperamos que você tenha escolhido um local sensato.\n\nO conhecimento não surge apenas da arquitetura. O estudo requer três elementos: sustento, hidratação... e estimulação.\n\nPara suprir este último, você deve obter <color=green>Água Ruim</color>.\n\nPor enquanto, construa um Posto de Coleta de Água Ruim e comece a coleta em seu ambiente. Esta tarefa traz certos riscos à saúde. A exposição causa doenças, se alguém, <i>você</i> deve se lembrar.\n\nConstrua a instalação apropriada. Certamente você se lembra pela experiência do tratamento correto, não nos faça soletrá-lo."
koKR = "당신의 도서관이 이제 건설 중입니다. 적절한 장소를 선택했기를 바랍니다.\n\n지식은 건축만으로는 얻어지지 않습니다. 학습에는 세 가지 요소가 필요합니다: 영양, 수분… 그리고 자극.\n\n후자의 공급을 위해, <color=green>오염수</color>를 얻어야 합니다.\n\n우선, 오염수 통을 건설하고 주변 환경에서 수집을 시작하세요. 이 작업은 특정 건강 위험을 동반합니다. 노출되면 질병에 걸리기 때문에, 만약 누군가가 <i>당신</i>라면 기억해야 합니다.\n\n적절한 시설을 건설하세요. 확실히 경험에서 올바른 처치를 기억하고 있을 것이니, 우리가 그것을 명시해주기를 원하지 말아주세요."
csCZ = "Vaše knihovna je nyní ve výstavbě, doufejme, že jste si vybrali rozumné místo.\n\nZnalosti nevznikají pouze z architektury. Studium vyžaduje tři prvky: obživu, hydrataci… a stimulaci.\n\nAbychom zajistili to poslední, musíte získat <color=green>Badwater</color>.\n\nProzatím postavte stanici na sběr Badwater a začněte sbírat z vašeho okolí. Tento úkol nese určitá zdravotní rizika. Expozice vyvolává onemocnění, pokud někdo, <i>vy</i> byste si měli pamatovat.\n\nVybudujte vhodné zařízení. Určitě si vzpomínáte z zkušenosti na správnou léčbu, nenechte nás to vyslovovat."
viVN = "Thư viện của bạn hiện đang trong quá trình xây dựng, hy vọng bạn đã chọn một vị trí hợp lý.\n\nKiến thức không chỉ phát sinh từ kiến trúc. Việc học tập cần ba yếu tố: nguồn sống, sự hydrat hóa… và kích thích.\n\nĐể cung cấp yếu tố cuối cùng, bạn phải thu thập <color=green>Nước xấu</color>.\n\nHiện tại, hãy xây dựng một Trạm Thu Thập Nước Xấu và bắt đầu thu thập từ môi trường xung quanh. Nhiệm vụ này có một số rủi ro về sức khỏe. Việc tiếp xúc có thể gây bệnh, nếu ai đó, <i>bạn</i> nên nhớ.\n\nXây dựng cơ sở phù hợp. Chắc chắn bạn nhớ từ kinh nghiệm về điều trị đúng cách, đừng để chúng tôi phải nhắc nhở."
trTR = "Kütüphaneniz şimdi inşa ediliyor, umarım mantıklı bir yer seçtiniz.\n\nBilgi yalnızca mimariden doğmaz. Çalışma, üç unsuru gerektirir: besin, su… ve uyarım.\n\nSonuncusunu sağlamak için <color=green>Badwater</color> elde etmelisiniz.\n\nŞimdilik, bir Badwater Bucketing Postu inşa edin ve çevrenizden toplama yapmaya başlayın. Bu görev bazı sağlık riskleri taşır. Maruz kalmak hastalığa neden olur, eğer biri, <i>sizin</i> hatırlamanız gerekir.\n\nUygun tesisi inşa edin. Şüphesiz ki deneyimden doğru tedaviyi hatırlarsınız, bunu açıkça belirtmemizi istemeyin."

["Tutorial.Library.BuildfermentationBarrelandLumberjackhouse.Whitepaws"]
raw = "A studying session would only yield boredom if not supplemented with snacks, and by snacks we mean <color=green>Kimchi</color>.\n\nTo produce Kimchi, you will need <color=green>Bramble Flowers</color>, they are harvested by Lumberjacks. However, the task is… extensive. Assigning unqualified flag workers to the task would condemn them to a tedious and prickly existence.\n\nConstruct a Woodfelling Planification Lodge or a Lumberjack’s Barn near brambles so that properly qualified workers can take care of it. Qualified workers get a little hat, that is how you know they are qualified.\n\nAlso, <color=red>mark the brambles for cutting</color>. They will not volunteer.\n\nThose buildings will require <color=green>Tools</color>. These are fabricated in the <color=green>Primitive Ironworks</color>. Competence works better with equipment.\n\nWhile this is getting done, construct three stacks of Fermentation Barrels. Patience will convert sharpness into nourishment."
status = "normal"
enUS = "A studying session would only yield boredom if not supplemented with snacks, and by snacks we mean <color=green>Kimchi</color>.\n\nTo produce Kimchi, you will need <color=green>Bramble Flowers</color>, which are harvested by Lumberjacks. However, the task is… extensive. Assigning unqualified flag workers to the task would condemn them to a tedious and prickly existence.\n\nConstruct a Woodfelling Planification Lodge or a Lumberjack’s Barn near brambles so that properly qualified workers can take care of it. Qualified workers get a little hat, that is how you know they are qualified.\n\nAlso, <color=red>mark the brambles for cutting</color>. They will not volunteer.\n\nThose buildings will require <color=green>Tools</color>. These are fabricated in the <color=green>Primitive Ironworks</color>. Competence works better with equipment.\n\nWhile this is getting done, construct three stacks of Fermentation Barrels. Patience will convert sharpness into nourishment."
zhCN = "一个学习课程如果没有零食的陪伴只会让人感到无聊，而我们所说的零食是<color=green>泡菜</color>。\n\n要制作泡菜，您需要<color=green>荆棘花</color>，这些由伐木工人收割。然而，这项任务是……繁重的。将不合格的旗帜工人分配给这项任务，会使他们陷入单调而刺人的生活。\n\n在荆棘附近建造一个伐木计划小屋或伐木工人的谷仓，以便合格的工人能够处理这项任务。合格的工人会有一顶小帽子，这样您就知道他们是合格的。\n\n另外，<color=red>标记要砍伐的荆棘</color>。它们不会自愿。\n\n这些建筑物将需要<color=green>工具</color>。这些在<color=green>原始铁工厂</color>中制造。设备能让能力更有效发挥。\n\n在此期间，建造三堆发酵桶。耐心会将尖锐转换为营养。"
zhTW = "一個學習的過程如果不附加小吃，將只會產生無聊，而我們所說的小吃是<color=green>泡菜</color>。\n\n要生產泡菜，你需要<color=green>荊棘花</color>，這些是由伐木工人收穫的。然而，這項任務是……繁重的。指派不合格的標誌工人來執行這項任務將使他們陷入乏味和刺痛的存在。\n\n在荊棘附近建造一個伐木計劃小屋或伐木工人小屋，以便合格的工人可以處理這個任務。合格的工人會有一頂小帽子，這就是你知道他們合格的標誌。\n\n另外，<color=red>標記荊棘以供砍伐</color>。它們不會自願過來。\n\n這些建築需要<color=green>工具</color>。這些工具在<color=green>原始鐵工廠</color>中製作。有了設備，能幹的工作會更加順利。\n\n在這個過程中，建造三堆發酵桶。耐心會將尖銳轉化為養分。"
ruRU = "Сессия изучения приведет лишь к скуке, если не будет сопровождаться перекусами, а под перекусами мы имеем в виду <color=green>Кимчи</color>.\n\nДля производства Кимчи вам понадобятся <color=green>Цветы Черники</color>, которые собирают лесорубы. Однако задача… обширная. Назначение неквалифицированных рабочих на эту задачу приговорит их к утомительному и колючему существованию.\n\nПостройте Убежище Планирования Лесозаготовок или Сарай Лесоруба рядом с черникой, чтобы квалифицированные работники могли заняться этим. Квалифицированные работники носят маленькие шляпы, так вы и узнаете, что они квалифицированные.\n\nТакже <color=red>отметьте чернику для рубки</color>. Они не будут работать добровольно.\n\nЭти здания будут требовать <color=green>Инструменты</color>. Они изготавливаются в <color=green>Примитивной Кузнице</color>. Компетентность работает лучше с оборудованием.\n\nПока это выполняется, постройте три стека Бочек Для Ферментации. Терпение превратит остроту в питательность."
jaJP = "「勉強の時間は、スナックなしでは退屈なものになってしまいます。スナックとは、<color=green>キムチ</color>を指します。\n\nキムチを作るには、<color=green>ノイバラの花</color>が必要です。これは木こりによって収穫されます。しかし、その作業は…広範囲です。資格のない旗の労働者をその作業に割り当てると、彼らを退屈でチクチクする生活に追いやることになります。\n\nノイバラの近くに木こり用の計画小屋または小屋を建設して、適切に資格を持った労働者がそれを管理できるようにしてください。資格を持った労働者は小さな帽子をかぶっているので、それで彼らが資格を持っていることがわかります。\n\nまた、<color=red>ノイバラを切るためにマークしてください</color>。彼らは自発的には手を挙げません。\n\nこれらの建物には、<color=green>道具</color>が必要です。これは、<color=green>原始鉄工所</color>で製造されます。設備があれば、能力が向上します。\n\nこれが進んでいる間に、発酵バレルを3つ積み上げてください。忍耐は鋭さを栄養に変えます。」"
frFR = "Une session d'étude ne produirait que de l'ennui sans être accompagnée de collations, et par collations, nous entendons <color=green>Kimchi</color>.\n\nPour produire du Kimchi, vous aurez besoin de <color=green>Fleurs de Ronce</color>, qui sont récoltées par les bûcherons. Cependant, la tâche est… extensive. Assigner des travailleurs non qualifiés à cette tâche les condamnerait à une existence ennuyeuse et épineuse.\n\nConstruisez un Bureau de Planification de Déforestation ou une Grange de Bûcheron près des ronces afin que des travailleurs correctement qualifiés puissent s'en occuper. Les travailleurs qualifiés portent un petit chapeau, c'est ainsi que vous savez qu'ils sont qualifiés.\n\nDe plus, <color=red>marquez les ronces pour la coupe</color>. Ils ne se porteront pas volontaires.\n\nCes bâtiments nécessiteront des <color=green>Outils</color>. Ceux-ci sont fabriqués dans les <color=green>Fonderies de Fer Primitives</color>. La compétence fonctionne mieux avec des équipements.\n\nPendant que cela se fait, construisez trois piles de Fûts de Fermentation. La patience convertira la dureté en nourriture."
deDE = "Eine Studieneinheit würde nur Langeweile erzeugen, wenn sie nicht mit Snacks ergänzt wird, und mit Snacks meinen wir <color=green>Kimchi</color>.\n\nUm Kimchi herzustellen, benötigen Sie <color=green>Dornblüten</color>, die von Holzfällern geerntet werden. Die Aufgabe ist jedoch… umfangreich. Unqualifizierte Flaggenarbeiter mit dieser Aufgabe zu betrauen, würde sie zu einem mühsamen und stacheligen Dasein verurteilen.\n\nBauen Sie eine Holzernte-Planungshütte oder eine Holzfäller-Scheune in der Nähe von Brombeeren, damit ordnungsgemäß qualifizierte Arbeiter sich darum kümmern können. Qualifizierte Arbeiter tragen einen kleinen Hut, so wissen Sie, dass sie qualifiziert sind.\n\nMarkieren Sie außerdem die Brombeeren zum Schneiden <color=red>für das Fällen</color>. Sie werden sich nicht freiwillig melden.\n\nDiese Gebäude erfordern <color=green>Werkzeuge</color>. Diese werden in der <color=green>Primitiven Eisenhütte</color> hergestellt. Kompetenz funktioniert besser mit Ausrüstung.\n\nWährend dies erledigt wird, bauen Sie drei Stapel Fermentationsfässer. Geduld wird Schärfe in Nahrung umwandeln."
plPL = "Sesja nauki przyniesie jedynie nudę, jeśli nie będzie uzupełniona przekąskami, a przez przekąski mamy na myśli <color=green>Kimchi</color>.\n\nAby wyprodukować Kimchi, będziesz potrzebować <color=green>Brambles Flowers</color>, które zbierają drwale. Jednak zadanie jest… rozległe. Przydzielenie niekwalifikowanych pracowników do tego zadania skazałoby ich na żmudne i kolczaste życie.\n\nZbuduj Planifikacyjną Chatę Do Ścinki Drzew lub Stodołę Drwala w pobliżu krzaków, aby odpowiednio wykwalifikowani pracownicy mogli się tym zająć. Kwalifikowani pracownicy noszą małe kapelusze, w ten sposób wiesz, że są wykwalifikowani.\n\nRównież <color=red>wyznacz krzaki do ścięcia</color>. Nie będą się zgłaszać na ochotnika.\n\nTe budynki będą wymagać <color=green>Narzędzi</color>. Te są wytwarzane w <color=green>Pierwotnej Hutniczej</color>. Kompetencja działa lepiej z odpowiednim wyposażeniem.\n\nPodczas gdy to się dzieje, zbuduj trzy stosy beczek fermentacyjnych. Cierpliwość przekształci ostrość w pożywienie."
ptBR = "Uma sessão de estudos só resultaria em tédio se não for acompanhada de petiscos, e por petiscos queremos dizer <color=green>Kimchi</color>.\n\nPara produzir Kimchi, você precisará de <color=green>Flores de Espinhos</color>, que são colhidas por Lenhadores. No entanto, a tarefa é... extensa. Designar trabalhadores sem qualificação para a tarefa os condenaria a uma existência tediosa e espinhenta.\n\nConstrua um Centro de Planejamento de Corte de Madeira ou um Celeiro de Lenhador perto dos espinhos para que trabalhadores devidamente qualificados possam cuidar disso. Trabalhadores qualificados usam um chapéu, é assim que você sabe que eles estão qualificados.\n\nAlém disso, <color=red>marque os espinhos para corte</color>. Eles não se oferecerão voluntariamente.\n\nEsses edifícios precisarão de <color=green>Ferramentas</color>. Elas são fabricadas na <color=green>Ferrovia Primária</color>. A competência funciona melhor com equipamento.\n\nEnquanto isso acontece, construa três pilhas de Barris de Fermentação. Paciência converterá dureza em nutrição."
koKR = "공부 세션은 스낵이 보충되지 않는다면 지루함만을 가져올 것입니다. 여기서 말하는 스낵은 <color=green>김치</color>입니다.\n\n김치를 생산하려면 <color=green>가시덩굴꽃</color>이 필요합니다. 이는 벌목꾼들이 수확합니다. 그러나 이 작업은… 방대합니다. 자격 없는 깃발 노동자를 이 작업에 배치하면 그들을 지루하고 가시가 많은 존재로 내몰게 됩니다.\n\n가시덤불 근처에 나무베기 계획 로지나 벌목꾼의 창고를 건설하여 자격이 있는 노동자들이 이 일을 처리할 수 있도록 하세요. 자격이 있는 노동자는 작은 모자를 쓰고 있습니다. 그것이 그들이 자격이 있다는 것을 아는 방법입니다.\n\n또한, <color=red>가시덤불을 자를 것으로 표시하세요</color>. 그들은 자발적으로 나서지 않을 것입니다.\n\n이 건물들은 <color=green>도구</color>를 필요로 합니다. 이는 <color=green>원시 철공소</color>에서 제작됩니다. 능숙함은 장비와 함께 더 잘 작동합니다.\n\n이 작업이 진행되는 동안, 발효 배럴 3개를 쌓으세요. 인내심은 날카로움을 영양으로 변환할 것입니다."
csCZ = "Studijní sezení by vedlo pouze k nudě, pokud by nebylo doplněno o občerstvení, a tím občerstvením myslíme <color=green>Kimchi</color>.\n\nPro výrobu Kimchi budete potřebovat <color=green>Vzteklé květy</color>, ty sklízejí dřevaři. Ale úkol je… rozsáhlý. Přidělení nevy kvalifikovaných pracovníků k této práci by je odsoudilo k únavné a trnité existenci.\n\nPostavte Plánovací pavilon na těžbu dřeva nebo Sýpku dřevaře poblíž trní, aby se o to mohli postarat řádně kvalifikovaní pracovníci. Kvalifikovaní pracovníci mají malou čepici, podle které poznáte, že jsou kvalifikovaní.\n\nTaké <color=red>označte trní k prořezání</color>. Nebudou se sami nabízet.\n\nTyto budovy budou vyžadovat <color=green>Nástroje</color>. Ty se vyrábějí v <color=green>Primitivní železárně</color>. Kvalita lépe funguje s vybavením.\n\nZatímco se to dokončuje, postavte tři zásobníky Fermentačních sudů. Trpělivost přetvoří ostrost na výživu."
viVN = "Một buổi học chỉ mang lại sự nhàm chán nếu không có đồ ăn vặt kèm theo, và đồ ăn vặt ở đây có nghĩa là <color=green>Kimchi</color>.\n\nĐể sản xuất Kimchi, bạn sẽ cần <color=green>Hoa Bẫy</color>, chúng được hái bởi thợ đốn gỗ. Tuy nhiên, nhiệm vụ này… khá rộng lớn. Giao việc cho những công nhân không đủ tiêu chuẩn sẽ khiến họ phải sống trong một cuộc sống tẻ nhạt và đầy gai góc.\n\nHãy xây dựng một Nhà Điều Hành Kế Hoạch Chặt Gỗ hoặc một Kho Thợ Đốn Gỗ gần những bụi bẫy để những công nhân có đủ tiêu chuẩn có thể chăm sóc chúng. Những công nhân đủ tiêu chuẩn sẽ được đội một chiếc mũ nhỏ, đó là cách bạn biết họ đủ tiêu chuẩn.\n\nNgoài ra, <color=red>đánh dấu những bụi bẫy để chặt</color>. Chúng sẽ không tự nguyện.\n\nNhững tòa nhà này sẽ cần <color=green>Công cụ</color>. Những thứ này được chế tạo tại <color=green>Nha Máy Sắt Nguyên Thủy</color>. Sự thành thạo hoạt động tốt hơn với thiết bị.\n\nTrong khi việc này đang được thực hiện, hãy xây dựng ba chồng Thùng Lên Men. Sự kiên nhẫn sẽ chuyển hóa độ sắc bén thành dưỡng chất."
trTR = "Bir çalışma seansı, atıştırmalıklarla desteklenmediği takdirde sadece sıkıcılık üretir, ve atıştırmalık derken <color=green>Kimchi</color>'yi kast ediyoruz.\n\nKimchi üretmek için <color=green>Böğürtlen Çiçekleri</color>'ne ihtiyacınız olacak, bunlar Ağaç Kesiciler tarafından toplanır. Ancak bu görev... kapsamlıdır. Niteliksiz bayrak işçilerini göreve atamak, onları sıkıcı ve dikenli bir varoluşa mahkum eder.\n\nBöğürtlenlerin yakınında bir Ağaç Kesim Planlama Kulübesi veya bir Ağaç Kesicinin Ahırı inşa edin, böylece uygun niteliklere sahip işçiler bununla ilgilenebilir. Nitelikli işçilerin küçük bir şapkası vardır, bu onların nitelikli olduğunu bilmenizin yoludur.\n\nAyrıca, <color=red>böğürtlenleri kesim için işaretleyin</color>. Gönüllü olmayacaklar.\n\nBu binalar <color=green>Aletler</color> gerektirecek. Bu eşyalar <color=green>Ilkel Demir Fabrikası</color>'nda üretilir. Yeterlilik, donanımla daha iyi çalışır.\n\nBu yapılırken, üç adet Fermentasyon Fıçısı üst üste inşa edin. Sabır, keskinliği besine dönüştürecektir."

["Tutorial.Library.PlantSunflowersandStorage.Whitepaws"]
raw = "Only psychopaths would snack on Kimchi all day. Sane beavers will also require <color=green>Sunflower Seeds</color> and <color=green>Berries</color> to munch on.\n\nPlant Sunflowers if you have not done so already.\n\nConstruct appropriate storage for the seeds. As with Rice — and all other granular materials — they are to be kept in a Pile.\n\nWe are aware that certain heretics prefer to box them up. Our seeds have not committed any crime yet.\n\nYour Foresters are probably still unable to plant new berry bushes. This is a recurring issue in new settlements.\n\n<color=green>Protect the ones you have as much as possible</color>."
status = "normal"
enUS = "Only psychopaths would snack on Kimchi all day. Sane beavers will also require <color=green>Sunflower Seeds</color> and <color=green>Berries</color> to munch on.\n\nPlant Sunflowers if you have not done so already.\n\nConstruct appropriate storage for the seeds. As with Rice — and all other granular materials — they are to be kept in a Pile.\n\nWe are aware that certain heretics prefer to box them up. Our seeds have not committed any crime yet.\n\nYour Foresters are probably still unable to plant new berry bushes. This is a recurring issue in new settlements.\n\n<color=green>Protect the ones you have as much as possible</color>."
zhCN = "“只有精神病患者才会整天吃泡菜。理智的海狸还需要<color=green>向日葵种子</color>和<color=green>莓果</color>来享用。\n\n如果你还没有种植向日葵，请赶快去种。\n\n为种子建造合适的储存设施。与大米和所有其他颗粒材料类似，它们应保存在一堆中。\n\n我们知道某些异教徒喜欢把它们装箱。我们的种子还没有犯下任何罪行。\n\n你的森林管理人员可能仍然无法种植新的莓果灌木。这在新定居点中是一个反复出现的问题。\n\n<color=green>尽可能保护你已有的灌木</color>。”"
zhTW = "只有精神病患者才會整天吃泡菜。正常的海狸還需要<color=green>向日葵種子</color>和<color=green>漿果</color>來享用。\n\n如果你還沒有種植向日葵，請立即進行。\n\n建造適當的存儲設施來儲存種子。與稻米以及所有其他顆粒狀材料一樣，它們應該存放在堆中。\n\n我們知道某些異端者喜歡將它們包裝起來。我們的種子尚未犯下任何罪行。\n\n你的森林工作者可能仍然無法種植新的漿果灌木。這在新設置的定居點中是一個反覆出現的問題。\n\n<color=green>請盡可能保護你擁有的漿果灌木</color>。"
ruRU = "Только психопаты могут весь день грызть кимчи. Умеренные бобры также будут нуждаться в <color=green>подсолнечных семечках</color> и <color=green>ягодах</color> для перекуса.\n\nПосадите подсолнечники, если вы этого ещё не сделали.\n\nПостройте подходящее хранилище для семян. Как и рис — и все другие сыпучие материалы — они должны храниться в куче.\n\nМы знаем, что некоторые еретики предпочитают упаковывать их. Наши семена ещё не совершали никаких преступлений.\n\nВаши лесники, вероятно, всё ещё не могут высаживать новые ягодные кусты. Это постоянная проблема в новых поселениях.\n\n<color=green>Защищайте те, что у вас есть, насколько это возможно</color>."
jaJP = "「キムチを一日中つまむのはサイコパスだけです。正常なビーバーは<color=green>ひまわりの種</color>と<color=green>ベリー</color>も必要です。\n\nまだひまわりを植えていない場合は、植えてください。\n\n種のために適切な保管場所を構築してください。米と同様に、すべての粒状の材料は山に保管する必要があります。\n\n特定の異端者がそれらを箱に詰めることを好むことは承知しています。私たちの種はまだ犯罪を犯していません。\n\nあなたの林業者は、まだ新しいベリーの茂みを植えることができないでしょう。これは新しい集落での繰り返しの問題です。\n\n<color=green>持っているものをできるだけ保護してください</color>。」"
frFR = "Seuls les psychopathes grignoteraient du kimchi toute la journée. Les castors sains auront également besoin de <color=green>graines de tournesol</color> et de <color=green>baies</color> à grignoter.\n\nPlantez des tournesols si vous ne l'avez pas encore fait.\n\nConstruisez un stockage approprié pour les graines. Comme pour le riz — et tous les autres matériaux granuleux — elles doivent être gardées dans un tas.\n\nNous sommes conscients que certains hérétiques préfèrent les emballer. Nos graines n'ont encore commis aucun crime.\n\nVos forestiers ne sont probablement pas encore en mesure de planter de nouveaux buissons de baies. C'est un problème récurrent dans les nouvelles colonies.\n\n<color=green>Protégez celles que vous avez autant que possible</color>."
deDE = "Nur Psychopathen würden den ganzen Tag Kimchi snacken. Gesunde Biber benötigen außerdem <color=green>Sonnenblumenkerne</color> und <color=green>Beeren</color>, um sich zu stärken.\n\nPflanze Sonnenblumen, falls du das noch nicht getan hast.\n\nBaue geeignete Lagerstätten für die Samen. Wie bei Reis — und allen anderen granulierten Materialien — sollten sie in einem Haufen aufbewahrt werden.\n\nWir sind uns bewusst, dass bestimmte Häretiker es vorziehen, sie einzupacken. Unsere Samen haben bisher kein Verbrechen begangen.\n\nDeine Förster sind wahrscheinlich immer noch nicht in der Lage, neue Beerensträucher zu pflanzen. Dies ist ein wiederkehrendes Problem in neuen Siedlungen.\n\n<color=green>Schütze die, die du hast, so gut wie möglich</color>."
plPL = "Only psychopaths would snack on Kimchi all day. Sane beavers will also require <color=green>Nasiona Słonecznika</color> and <color=green>Jagody</color> to munch on.\n\nPosadź Słoneczniki, jeśli jeszcze tego nie zrobiłeś.\n\nZbuduj odpowiednie magazyny dla nasion. Tak jak z Rybą — i wszystkimi innymi materiałami sypkimi — powinny być przechowywane w Stosie.\n\nJesteśmy świadomi, że pewni heretycy wolą je pakować. Nasze nasiona jeszcze nie popełniły żadnego przestępstwa.\n\nTwoi Leśnicy prawdopodobnie wciąż nie mogą zasadzić nowych krzaków jagód. To powtarzający się problem w nowych osadach.\n\n<color=green>Chroń te, które masz, tak bardzo jak to możliwe</color>."
ptBR = "Somente psicopatas comeriam Kimchi o dia todo. Castores saudáveis também precisarão de <color=green>sementes de girassol</color> e <color=green>frutas silvestres</color> para beliscar.\n\nPlante girassóis se você ainda não fez isso.\n\nConstrua um armazenamento apropriado para as sementes. Assim como com o arroz — e todos os outros materiais granulares — elas devem ser mantidas em uma Pilha.\n\nEstamos cientes de que certos hereges preferem embalá-las. Nossas sementes ainda não cometeram nenhum crime.\n\nSeus Silvicultores provavelmente ainda não conseguem plantar novos arbustos de frutas silvestres. Este é um problema recorrente em novos assentamentos.\n\n<color=green>Proteja o que você tem o máximo possível</color>."
koKR = "하루 종일 김치를 간식으로 먹는 것은 오직 정신병자들만 할 수 있습니다. 정상적인 비버들은 <color=green>해바라기 씨앗</color>과 <color=green>베리</color>도 필요로 합니다.\n\n아직 해바라기를 심지 않았다면 심으세요.\n\n씨앗을 위한 적절한 저장소를 건설하세요. 쌀과 모든 다른 분말 재료들과 마찬가지로, 그것들은 더미에 보관해야 합니다.\n\n일부 이단자들이 그것들을 상자에 담는 것을 선호한다는 것을 알고 있습니다. 우리의 씨앗은 아직 범죄를 저지르지 않았습니다.\n\n당신의 산림부 직원들은 아마도 새로운 베리 덤불을 심을 수 없을 것입니다. 이것은 새로운 정착지에서 반복되는 문제입니다.\n\n<color=green>당신이 가진 것들을 최대한 보호하세요</color>."
csCZ = "Jenom psychopati by jedli kimchi celý den. Střízliví bobři budou také potřebovat <color=green>Slunečnicová semena</color> a <color=green>Bobule</color> k zobání.\n\nZasaďte slunečnice, pokud jste to dosud neudělali.\n\nPostavte vhodné sklady na semena. Stejně jako rýže — a všechny ostatní granule — je třeba je uchovávat v hromadě.\n\nJsme si vědomi, že někteří heretici dávají přednost jejich balení. Naše semena dosud nespáchala žádný zločin.\n\nVaši lesníci pravděpodobně stále nemohou sázet nové keře bobulí. To je opakující se problém v nových osidleních.\n\n<color=green>Chraňte ty, které máte, co nejvíce</color>."
viVN = "Chỉ những kẻ tâm thần mới nhâm nhi Kimchi suốt cả ngày. Những con nhím tỉnh táo cũng sẽ cần <color=green>Hạt hướng dương</color> và <color=green>Quả mọng</color> để nhấm nháp.\n\nHãy trồng Hướng dương nếu bạn chưa làm điều đó.\n\nXây dựng kho chứa phù hợp cho hạt giống. Giống như gạo — và tất cả các vật liệu dạng hạt khác — chúng sẽ được giữ trong một đống.\n\nChúng tôi biết rằng một số kẻ dị giáo thích đóng gói chúng lại. Hạt giống của chúng tôi vẫn chưa phạm tội gì.\n\nCác Lâm viên của bạn có lẽ vẫn không thể trồng những bụi quả mọng mới. Đây là một vấn đề tái diễn ở các khu định cư mới.\n\n<color=green>Hãy bảo vệ những gì bạn có càng nhiều càng tốt</color>."
trTR = "Sadece psikopatlar tüm gün Kimchi atıştırır. Akıl sağlığı yerinde olan kunduzlar da atıştırmak için <color=green>Ayçiçeği Tohumları</color> ve <color=green>Çilekler</color> gerektirir.\n\nEğer henüz yapmadıysanız Ayçiçeği dikin.\n\nTohumlar için uygun bir depolama alanı inşa edin. Pirinç gibi — ve diğer tüm granül malzemeler için — bunlar bir Yığın içinde tutulmalıdır.\n\nBazı sapkınların bunları kutulamayı tercih ettiğini biliyoruz. Tohumlarımız henüz herhangi bir suç işlemedi.\n\nOrmancılarınız muhtemelen hala yeni çilek çalıları dikelimiyor. Bu, yeni yerleşim yerlerinde tekrarlayan bir sorun.\n\n<color=green>Sahip olduğunuzları mümkün olduğunca koruyun</color>."

["Tutorial.Library.BuildBadshroomGrower.Whitepaws"]
raw = "Snacks alone do not make a genius out of a fool, and we have reason to believe your team may be short on geniuses.\n\nFortunately, certain mushrooms continue to grow in the toxic sludge known as Badwater, and these specimens possess… useful properties.\n\nNo, they do not cause visions of flying hoomans. Nor do they induce spontaneous joy. They primarily enhance focus, memory, and imagination.\n\nThey also occasionally cause <i>you-know-what</i>. Manage it accordingly.\n\nConstruct a third Mushroom Grower and configure it to cultivate <color=green>Brain-Stimulating Mushrooms</color>.\n\nPrepare suitable storage as well. Intellectual advancement should not be left on the ground."
status = "normal"
enUS = "Snacks alone do not make a genius out of a fool, and we have reason to believe your team may be short on geniuses.\n\nFortunately, certain mushrooms continue to grow in the toxic sludge known as Badwater, and these specimens possess… useful properties.\n\nNo, they do not cause visions of flying hoomans. Nor do they induce spontaneous joy. They primarily enhance focus, memory, and imagination.\n\nThey also occasionally cause <i>you-know-what</i>. Manage it accordingly.\n\nConstruct a third Mushroom Grower and configure it to cultivate <color=green>Brain-Stimulating Mushrooms</color>.\n\nPrepare suitable storage as well. Intellectual advancement should not be left on the ground."
zhCN = "“光吃零食并不能让傻瓜变成天才，我们有理由相信你的团队可能缺乏天才。\n\n幸运的是，某些蘑菇能够在被称为坏水的有毒污泥中继续生长，这些标本具有……有用的特性。\n\n不，它们不会让人产生飞天人的幻觉，也不会引发自发的快乐。它们主要可以增强专注力、记忆力和想象力。\n\n它们有时还会引起<i>你懂的事情</i>。请妥善处理。\n\n建造第三个蘑菇种植器，并将其配置为培养<color=green>刺激大脑的蘑菇</color>。\n\n同时准备合适的储存设施。智力的进步不应被丢在地上。”"
zhTW = "零食並不能使愚者成為天才，而我們有理由相信你的團隊可能缺乏天才。\n\n幸運的是，某些蘑菇仍然能在被稱為壞水的有毒污泥中生長，而這些樣本擁有……有用的特性。\n\n不，它們不會引起在空中飛的人的幻覺。也不會引起自發的快樂。它們主要增強專注力、記憶力和想像力。\n\n它們偶爾也會引起<i>你知道的事情</i>。請妥善處理。\n\n建造第三個蘑菇培養器，並配置它以培養<color=green>刺激大腦的蘑菇</color>。\n\n還要準備合適的儲存空間。智力的提升不應該被置於地面上。"
ruRU = "Закуски одни не сделают гения из дурака, и у нас есть основания полагать, что вашей команде не хватает гениев.\n\nК счастью, некоторые грибы продолжают расти в токсичных отложениях, известных как Плохая Вода, и эти образцы обладают… полезными свойствами.\n\nНет, они не вызывают видения летающих людей. И не вызывают спонтанной радости. Они прежде всего усиливают концентрацию, память и воображение.\n\nТакже они иногда вызывают <i>вы-это-знаете-что</i>. Управляйте этим соответственно.\n\nПостройте третий Грибной Выращиватель и настройте его на выращивание <color=green>Грибов-Усиливающих Умственные Способности</color>.\n\nПриготовьте также подходящее хранилище. Интеллектуальное развитие не должно оставаться на земле."
jaJP = "「スナックだけでは馬鹿を天才にすることはできず、私たちはあなたのチームが天才に欠けている可能性がある理由があります。\n\n幸いなことに、一部のキノコは有毒なスラッジ、バッドウォーターの中でも成長し続けており、これらの標本は…役立つ特性を持っています。\n\nいいえ、彼らは飛ぶフーマンの幻影を引き起こすわけではありません。また、自発的な喜びを引き起こすこともありません。彼らは主に集中力、記憶、想像力を高めます。\n\n彼らは時折、<i>あれ</i>を引き起こすこともあります。それに対処してください。\n\n3つ目のキノコ栽培器を構築し、<color=green>脳を刺激するキノコ</color>を栽培するように設定してください。\n\n適切な保管場所も用意してください。知的な進歩は地面に放置しておくべきではありません。」"
frFR = "Les collations à elles seules ne feront pas d'un imbécile un génie, et nous avons des raisons de croire que votre équipe pourrait manquer de génies.\n\nHeureusement, certains champignons continuent de pousser dans la boue toxique connue sous le nom de Badwater, et ces spécimens possèdent… des propriétés… utiles.\n\nNon, ils ne provoquent pas des visions d'humains volants. Et ils n'induisent pas de joie spontanée. Ils améliorent principalement la concentration, la mémoire et l'imagination.\n\nIls provoquent aussi occasionnellement <i>vous-savez-quoi</i>. Gérez cela en conséquence.\n\nConstruisez un troisième Cultivateur de Champignons et configurez-le pour cultiver des <color=green>Champignons Stimulants pour le Cerveau</color>.\n\nPréparez également un stockage approprié. Le progrès intellectuel ne devrait pas être laissé sur le sol."
deDE = "Snacks allein machen aus einem Narren keinen Genie, und wir haben Grund zu glauben, dass es in Ihrem Team an Genies mangelt.\n\nGlücklicherweise wachsen bestimmte Pilze weiterhin im giftigen Schlamm, der als Badwater bekannt ist, und diese Exemplare besitzen… nützliche Eigenschaften.\n\nNein, sie verursachen keine Visionen von fliegenden Hoomans. Noch induzieren sie spontane Freude. Sie verbessern in erster Linie Konzentration, Gedächtnis und Vorstellungskraft.\n\nGelegentlich verursachen sie auch <i>du-weißt-schon-was</i>. Gehe damit entsprechend um.\n\nErrichte einen dritten Pilzanbauer und konfiguriere ihn so, dass er <color=green>Gehirn-stimulierende Pilze</color> anbaut.\n\nBereite auch geeignete Lagerstätten vor. Intellektuelle Fortschritte sollten nicht am Boden liegen gelassen werden."
plPL = "Przekąski same w sobie nie uczynią z głupca geniusza, a mamy powody sądzić, że twojej drużynie może brakować geniuszy.\n\nNa szczęście niektóre grzyby wciąż rosną w toksycznym szlamie znanym jako Zła Woda, a te okazy mają… przydatne właściwości.\n\nNie, nie wywołują wizji latających ludzi. Ani nie wywołują spontanicznej radości. Przede wszystkim poprawiają koncentrację, pamięć i wyobraźnię.\n\nCzasami również powodują <i>wiadomo-co</i>. Zarządzaj tym odpowiednio.\n\nZbuduj trzeci Grzybiarz i skonfiguruj go do uprawy <color=green>grzybów stymulujących mózg</color>.\n\nPrzygotuj także odpowiednie miejsce do przechowywania. Postęp intelektualny nie powinien leżeć na ziemi."
ptBR = "Snacks sozinhos não tornam um tolo em um gênio, e temos razões para acreditar que sua equipe pode estar carente de gênios.\n\nFelizmente, certos cogumelos continuam a crescer na lama tóxica conhecida como Água Ruim, e esses espécimes possuem… propriedades úteis.\n\nNão, eles não causam visões de hoomans voadores. Nem induzem alegria espontânea. Eles principalmente melhoram o foco, a memória e a imaginação.\n\nEles também ocasionalmente causam <i>você-sabe-o-que</i>. Gerencie isso de acordo.\n\nConstrua um terceiro Cultivador de Cogumelos e configure-o para cultivar <color=green>Cogumelos Estimulantes para o Cérebro</color>.\n\nPrepare armazenamento adequado também. O avanço intelectual não deve ser deixado no chão."
koKR = "간단한 간식만으로 바보를 천재로 만들 수는 없으며, 귀하의 팀이 천재가 부족할 가능성이 있다고 봅니다.\n\n다행히도, 특정 버섯은 독성 슬러지로 알려진 배드워터에서 계속 자라고 있으며, 이 샘플들은… 유용한 특성을 가지고 있습니다.\n\n아니요, 그들은 날아다니는 인간의 환상을 유발하지 않습니다. 또한 갑작스러운 기쁨도 유도하지 않습니다. 그들은 주로 집중력, 기억력 및 상상력을 향상시킵니다.\n\n가끔 <i>알고 계시죠</i>를 유발하기도 합니다. 그에 따라 관리하십시오.\n\n세 번째 버섯 재배기를 건설하고 <color=green>두뇌 자극 버섯</color>을 재배하도록 설정하십시오.\n\n적절한 저장 공간도 준비하십시오. 지적인 발전은 땅에 방치되어서는 안 됩니다."
csCZ = "Snacks samy o sobě neudělají génia z blázna, a máme důvod se domnívat, že vaší týmu může chybět pár géniů.\n\nNaštěstí určité houby i nadále rostou v toxickém kalu známém jako Badwater, a tyto vzorky mají… užitečné vlastnosti.\n\nNe, nezpůsobují vize létajících lidí. Také nevytvářejí spontánní radost. Především zvyšují zaměření, paměť a představivost.\n\nObčas také způsobují <i>víte-co</i>. Řiďte se tím odpovídajícím způsobem.\n\nPostavte třetí Houbový Pěstitel a nastavte ho tak, aby pěstoval <color=green>Houbu stimulující mozek</color>.\n\nPřipravte také vhodné úložné prostory. Duševní pokrok by neměl ležet na zemi."
viVN = "Đồ ăn nhẹ đơn thuần không khiến một kẻ ngu tạo thành thiên tài, và chúng tôi có lý do để tin rằng đội ngũ của bạn có thể thiếu những thiên tài.\n\nThật may mắn, một số loại nấm vẫn tiếp tục phát triển trong bùn độc hại được gọi là Badwater, và những mẫu vật này sở hữu... những đặc tính hữu ích.\n\nKhông, chúng không gây ra những hình ảnh của những người bay. Cũng không khiến người ta tự dưng vui vẻ. Chúng chủ yếu tăng cường sự tập trung, trí nhớ và trí tưởng tượng.\n\nChúng cũng thỉnh thoảng gây ra <i>cái mà bạn biết đấy</i>. Quản lý nó cho phù hợp.\n\nHãy xây dựng một Người Trồng Nấm thứ ba và cấu hình nó để trồng <color=green>Nấm Kích Thích Não</color>.\n\nCũng chuẩn bị kho lưu trữ phù hợp. Sự tiến bộ trí tuệ không nên bị bỏ lại trên mặt đất."
trTR = "Atıştırmalıklar bir aptaldan dahi bir dahi yaratmaz ve ekibinizin dahilerden yoksun olabileceğine dair nedenlerimiz var.\n\nNeyse ki, belirli mantarlar, Badwater olarak bilinen toksik çamurda büyümeye devam ediyor ve bu örneklerin… faydalı özellikleri var.\n\nHayır, bunlar uçan insanlar hakkında vizyonlar oluşturmaz. Ayrıca ani neşe de sağlamazlar. Temelde odak, hafıza ve hayal gücünü artırırlar.\n\nAyrıca ara sıra <i>bilirsin-ne</i> yaratabilirler. Bunu uygun bir şekilde yönetin.\n\nÜçüncü bir Mantar Büyütücü inşa edin ve onu <color=green>Beyin-Uyarıcı Mantarlar</color> yetiştirmek için yapılandırın.\n\nUygun depolama alanlarını da hazırlayın. Entellektüel gelişim yere bırakılmamalıdır."

["Tutorial.Library.PlaceFlorist.Whitepaws"]
raw = "As stated previously, attempts at replanting <color=green>berries</color> are often unsuccessful. Yet they remain necessary.\n\nShould your supply prove insufficient — whether by neglect or enthusiastic removal — berries may also be cultivated by a Florist.\n\nNote that each Florist has a small terrace in front of it for growing flowers. Surprising, isn't it?\n\nThis terrace must rest above ground level, or atop structures without a roof such as paths, piles, or warehouses. Common sense would also suggest leaving sufficient clearance above the plants.\n\nPlace two Florists to familiarize yourself with their arrangement. <color=green>You may pause or dismantle them later</color>."
status = "normal"
enUS = "As stated previously, attempts at replanting <color=green>berries</color> are often unsuccessful. Yet they remain necessary.\n\nShould your supply prove insufficient — whether by neglect or enthusiastic removal — berries may also be cultivated by a Florist.\n\nNote that each Florist has a small terrace in front of it for growing flowers. Surprising, isn't it?\n\nThis terrace must rest above ground level, or atop structures without a roof such as paths, piles, or warehouses. Common sense would also suggest leaving sufficient clearance above the plants.\n\nPlace two Florists to familiarize yourself with their arrangement. <color=green>You may pause or dismantle them later</color>."
zhCN = "如前所述，重植<color=green>浆果</color>的尝试常常失败。然而，它们仍然是必要的。\n\n如果您的供应不足——无论是由于疏忽还是热情过度的移除——浆果也可以通过花匠进行培植。\n\n请注意，每个花匠在其前面都有一个小阳台，用于种植花朵。很惊喜，是不是？\n\n这个阳台必须高于地面，或者位于没有屋顶的结构上，如小径、堆垛或仓库。常识也建议在植物上方留出足够的空间。\n\n放置两个花匠以熟悉它们的布局。<color=green>您可以稍后暂停或拆除它们</color>。"
zhTW = "正如之前所述，再次種植<color=green>漿果</color>的嘗試通常是不成功的。然而它們仍然是必要的。\n\n如果你的供應不足——無論是因為忽視還是熱情的移除——漿果也可以由花商培育。\n\n請注意，每位花商在前面都有一小個露台用於種植花朵。是不是很驚訝？\n\n這個露台必須位於地面以上，或建於沒有屋頂的結構上，如道路、堆積或倉庫。常識也建議在植物上方留出足夠的間隙。\n\n放置兩位花商以熟悉它們的佈局。<color=green>你可以稍後暫停或拆除它們</color>。"
ruRU = "Как уже упоминалось, попытки пересадки <color=green>ягод</color> часто оказываются безуспешными. Тем не менее, они остаются необходимыми.\n\nЕсли вашего запаса окажется недостаточно — будь то из-за небрежности или избыточного удаления — ягоды также могут быть выращены цветочником.\n\nОбратите внимание, что у каждого цветочника есть небольшая терраса спереди для выращивания цветов. Удивительно, не правда ли?\n\nЭта терраса должна находиться над уровнем земли или на конструкциях без крыши, таких как пути, насыпи или склады. Здравый смысл также подсказывает оставить достаточное пространство над растениями.\n\nУстановите двух цветочников, чтобы познакомиться с их расстановкой. <color=green>Вы можете приостановить или разобрать их позже</color>."
jaJP = "以前述べたように、<color=green>ベリー</color>の再植はしばしば失敗します。それでも、ベリーは必要です。\n\n供給が不十分な場合（怠慢または熱心な収集による）、フローリストによってベリーを栽培することもできます。\n\n各フローリストの前には花を育てるための小さなテラスがあります。不思議ですよね？\n\nこのテラスは地面の上にあるか、道、山積み、または倉庫のような屋根のない構造の上に存在する必要があります。常識的に考えて、植物の上に十分なクリアランスを確保することも推奨されます。\n\n配置に慣れるために、2つのフローリストを設置してください。<color=green>後で停止または解体することもできます</color>。"
frFR = "Comme mentionné précédemment, les tentatives de replantation de <color=green>baies</color> sont souvent infructueuses. Pourtant, elles restent nécessaires.\n\nSi votre approvisionnement s'avère insuffisant — que ce soit par négligence ou par enlèvement enthousiaste — les baies peuvent également être cultivées par un Fleuriste.\n\nNotez que chaque Fleuriste a une petite terrasse devant lui pour faire pousser des fleurs. Surprenant, n'est-ce pas ?\n\nCette terrasse doit être au-dessus du niveau du sol, ou sur des structures sans toit telles que des chemins, des tas ou des entrepôts. Le bon sens suggérerait également de laisser un espace suffisant au-dessus des plantes.\n\nPlacez deux Fleuristes pour vous familiariser avec leur agencement. <color=green>Vous pouvez les mettre en pause ou les démonter plus tard</color>."
deDE = "Wie bereits erwähnt, sind Versuche, <color=green>Beeren</color> neu zu pflanzen, oft erfolglos. Dennoch sind sie notwendig.\n\nSollten Ihre Vorräte unzureichend sein — sei es durch Vernachlässigung oder enthusiastische Entfernung — können Beeren auch von einem Floristen angepflanzt werden.\n\nBitte beachten Sie, dass jeder Florist eine kleine Terrasse vor sich hat, um Blumen zu züchten. Überraschend, nicht wahr?\n\nDiese Terrasse muss über dem Erdniveau oder auf konstruktionfreien Strukturen wie Wegen, Haufen oder Lagerhäusern errichtet werden. Auch der gesunde Menschenverstand würde nahelegen, ausreichend Platz über den Pflanzen zu lassen.\n\nStellen Sie zwei Floristen auf, um sich mit ihrer Anordnung vertraut zu machen. <color=green>Sie können sie später pausieren oder abreißen</color>."
plPL = "Jak już wcześniej wspomniano, próby ponownego sadzenia <color=green>jagód</color> często kończą się niepowodzeniem. Mimo to pozostają niezbędne.\n\nJeżeli twoje zapasy okażą się niewystarczające — niezależnie od zaniedbania czy entuzjastycznego zbierania — jagody mogą być również uprawiane przez Florystę.\n\nZauważ, że każdy Florysta ma mały taras przed sobą, na którym rosną kwiaty. Zaskakujące, prawda?\n\nTen taras musi znajdować się powyżej poziomu gruntu lub na budowlach bez dachu, takich jak ścieżki, stosy czy magazyny. Zdrowy rozsądek podpowiada również, aby zostawić wystarczający odstęp nad roślinami.\n\nUmieść dwóch Florystów, aby zapoznać się z ich rozstawem. <color=green>Możesz je później wstrzymać lub demontować</color>."
ptBR = "Como mencionado anteriormente, as tentativas de replantar <color=green>frutos silvestres</color> muitas vezes são malsucedidas. No entanto, eles continuam sendo necessários.\n\nCaso seu suprimento se prove insuficiente — seja por negligência ou remoção entusiástica — os frutos silvestres também podem ser cultivados por um Floricultor.\n\nObserve que cada Floricultor possui um pequeno terraço em sua frente para cultivar flores. Surpreendente, não é?\n\nEste terraço deve estar acima do nível do solo, ou sobre estruturas sem telhado, como caminhos, pilhas ou armazéns. O bom senso também sugeriria deixar uma folga suficiente acima das plantas.\n\nColoque dois Floricultores para se familiarizar com seu arranjo. <color=green>Você pode pausar ou desmontá-los mais tarde</color>."
koKR = "앞서 언급했듯이, <color=green>베리</color>를 다시 심으려는 시도는 종종 성공적이지 않습니다. 그러나 이들은 여전히 필요합니다.\n\n제공량이 부족할 경우 — 방치되거나 열정적으로 제거된 경우 — 플로리스트를 통해 베리를 재배할 수 있습니다.\n\n각 플로리스트는 꽃을 기르기 위한 작은 테라스를 가지고 있다는 점에 유의하세요. 놀랍지 않나요?\n\n이 테라스는 지상 위에 위치해야 하며, 경로, 더미 또는 창고와 같은 지붕이 없는 구조물 위에 있어야 합니다. 상식적으로도 식물 위에 충분한 여유 공간을 남기는 것이 좋습니다.\n\n두 개의 플로리스트를 배치하여 그 배치를 익혀보세요. <color=green>나중에 일시 중지하거나 해체할 수 있습니다</color>."
csCZ = "Jak již bylo uvedeno, pokusy o znovu vysazení <color=green>bobulí</color> jsou často neúspěšné. Přesto zůstávají nezbytné.\n\nPokud se vaše zásoby ukáží jako nedostatečné — ať už zanedbáním nebo nadšeným odstraňováním — bobule může také pěstovat květinář.\n\nPamatujte, že každý květinář má před sebou malou terasu pro pěstování květin. Překvapivé, že?\n\nTato terasa musí být nad úrovní země nebo na strukturách bez střechy, jako jsou cesty, hromady nebo skladiště. Zdravý rozum by také naznačoval ponechat dostatečný prostor nad rostlinami.\n\nUmístěte dva květináře, abyste se seznámili s jejich uspořádáním. <color=green>Můžete je později zastavit nebo rozebrat</color>."
viVN = "Như đã đề cập trước đó, nỗ lực trồng lại <color=green>quả mọng</color> thường không thành công. Tuy nhiên, chúng vẫn cần thiết.\n\nNếu nguồn cung của bạn không đủ — có thể do bỏ bê hoặc thu hoạch quá nhiều — quả mọng cũng có thể được trồng bởi một người làm vườn.\n\nLưu ý rằng mỗi người làm vườn có một sân thượng nhỏ phía trước để trồng hoa. Thật bất ngờ, phải không?\n\nSân thượng này phải nằm trên cao hơn mặt đất, hoặc trên các cấu trúc không có mái như đường đi, đống vật liệu, hoặc nhà kho. Thông thường, cũng nên để đủ khoảng trống phía trên các cây trồng.\n\nĐặt hai người làm vườn để làm quen với cách sắp xếp của chúng. <color=green>Bạn có thể tạm ngừng hoặc tháo dỡ chúng sau</color>."
trTR = "Daha önce belirtildiği gibi, <color=green>çamur</color>ları yeniden dikme girişimleri genellikle başarısızdır. Yine de gerekli kalmaya devam ediyorlar.\n\nKaynağınız yetersiz kalırsa - ya ihmal ya da coşkulu bir şekilde kaldırma nedeniyle - çamurlar bir Çiçekçi tarafından da yetiştirilebilir.\n\nHer Çiçekçinin önünde çiçek yetiştirmek için küçük bir teras bulunduğuna dikkat edin. Şaşırtıcı, değil mi?\n\nBu teras, yer seviyesinin üzerinde veya yollar, yığınlar ya da depolar gibi çatısı olmayan yapıların üzerinde olmalıdır. Mantık, bitkilerin üzerinde yeterli alan bırakılmasının da gerektiğini öne sürüyor.\n\nDüzeniyle tanışmak için iki Çiçekçi yerleştirin. <color=green>İsterseniz daha sonra duraklatabilir veya sökebilirsiniz</color>."

["Tutorial.Library.PlaceHandicrafter.Whitepaws"]
raw = "The Florist is capable of more than berry cultivation. Most notably, it can produce <color=green>Plant Fibers</color>.\n\nFibers, when properly spun into <color=green>Rope</color>, enable construction techniques unavailable to the unprepared — <color=green>suspension bridges</color>, <color=green>rope stairs</color>, and <color=green>ziplines</color> among them.\n\nTo process fibers, place a Handicrafter.\n\nThe Handicrafter may also be tasked with producing other useful items, including properly assembled <color=green>explosives</color>, should the need for decisive terrain modification arise.\n\nPlace one Handicrafter to familiarize yourself with its function. <color=green>You may pause or dismantle it later</color>."
status = "normal"
enUS = "The Florist is capable of more than berry cultivation. Most notably, it can produce <color=green>Plant Fibers</color>.\n\nFibers, when properly spun into <color=green>Rope</color>, enable construction techniques unavailable to the unprepared — <color=green>suspension bridges</color>, <color=green>rope stairs</color>, and <color=green>ziplines</color> among them.\n\nTo process fibers, place a Handicrafter.\n\nThe Handicrafter may also be tasked with producing other useful items, including properly assembled <color=green>explosives</color>, should the need for decisive terrain modification arise.\n\nPlace one Handicrafter to familiarize yourself with its function. <color=green>You may pause or dismantle it later</color>."
zhCN = "花匠的能力不仅限于莓果种植。最显著的是，它可以生产<color=green>植物纤维</color>。\n\n当纤维被正确纺成<color=green>绳子</color>时，能够启用一些对未做好准备的居民无法使用的建造技术——其中包括<color=green>吊桥</color>、<color=green>绳梯</color>和<color=green>滑索</color>。\n\n要处理纤维，请放置一个手工艺工作台。\n\n手工艺工作台还可以被指派生产其他有用的物品，包括在需要决定性地形修改时，适当组装的<color=green>爆炸物</color>。\n\n放置一个手工艺工作台以熟悉它的功能。<color=green>您可以稍后暂停或拆除它</color>。"
zhTW = "花匠的能力不僅限於種植漿果。最顯著的是，它可以生產<color=green>植物纖維</color>。\n\n當纖維被妥善紡織成<color=green>繩索</color>時，將能啟用未經準備者無法使用的建設技術——包括<color=green>懸索橋</color>、<color=green>繩梯</color>和<color=green>滑索</color>等。\n\n要加工纖維，請放置一個手工匠。\n\n手工匠也可以被指派生產其他有用的物品，包括妥善組裝的<color=green>炸藥</color>，以備在需要進行果斷的地形改造時使用。\n\n放置一個手工匠以熟悉其功能。<color=green>你可以稍後暫停或拆卸它</color>。"
ruRU = "Флорист способен на большее, чем просто культивирование ягод. Наиболее примечательно, что он может производить <color=green>Растительные Волокна</color>.\n\nВолокна, при правильном прядении в <color=green>Веревку</color>, позволяют использовать строительные техники, недоступные неподготовленным — среди них <color=green>подвесные мосты</color>, <color=green>веревочные лестницы</color> и <color=green>тросовые дороги</color>.\n\nЧтобы обрабатывать волокна, разместите Ремесленника.\n\nРемесленник также может быть назначен на производство других полезных предметов, включая правильно собранные <color=green>взрывчатые вещества</color>, если возникнет необходимость в решительных изменениях местности.\n\nРазместите одного Ремесленника, чтобы ознакомиться с его функцией. <color=green>Вы можете приостановить или разобрать его позже</color>."
jaJP = "フローリストはベリーの栽培だけでなく、<color=green>植物の繊維</color>を生産することができます。\n\n繊維は適切に<color=green>ロープ</color>に紡がれることで、準備が整っていない者には不可能な建設技術を可能にします — <color=green>吊り橋</color>、<color=green>ロープ階段</color>、<color=green>ジップライン</color>などです。\n\n繊維を処理するには、ハンディクラフターを配置してください。\n\nハンディクラフターは、場合によっては決定的な地形の変更が必要な際に、適切に組み立てられた<color=green>爆薬</color>などの他の便利なアイテムを生産するようにも指示できます。\n\nその機能に慣れるために、ハンディクラフターを1台配置してください。<color=green>後で一時停止または解体することも可能です</color>。"
frFR = "Le Fleuriste est capable de plus que de la culture de baies. Plus particulièrement, il peut produire <color=green>Fibres Végétales</color>.\n\nLes fibres, lorsqu'elles sont correctement filées en <color=green>Corde</color>, permettent des techniques de construction inaccessibles aux non préparés — <color=green>ponts suspendus</color>, <color=green>escaliers en corde</color>, et <color=green>tyroliennes</color> parmi eux.\n\nPour traiter les fibres, placez un Artisan.\n\nL'Artisan peut également être chargé de produire d'autres objets utiles, y compris des <color=green>explosifs</color> correctement assemblés, si le besoin d'une modification décisive du terrain se présente.\n\nPlacez un Artisan pour vous familiariser avec sa fonction. <color=green>Vous pouvez le mettre en pause ou le démonter plus tard</color>."
deDE = "Der Florist ist zu mehr fähig als nur zur Beerenkultivierung. Besonders bemerkenswert ist, dass er <color=green>Pflanzenfasern</color> produzieren kann.\n\nFasern, die richtig zu <color=green>Seil</color> gesponnen werden, ermöglichen Bauverfahren, die den Unvorbereiteten nicht zur Verfügung stehen — darunter <color=green>Hängebrücken</color>, <color=green>Seiletreppen</color> und <color=green>Zip-Lines</color>.\n\nUm Fasern zu verarbeiten, stelle einen Handwerker auf.\n\nDer Handwerker kann auch damit beauftragt werden, andere nützliche Gegenstände zu produzieren, einschließlich richtig montierter <color=green>Sprengstoffe</color>, sollte der Bedarf an entscheidenden Terrainmodifikationen entstehen.\n\nStelle einen Handwerker auf, um dich mit seiner Funktion vertraut zu machen. <color=green>Du kannst ihn später pausieren oder abbauen</color>."
plPL = "Kwiaciarz jest zdolny do więcej niż tylko uprawy owoców. Co najważniejsze, potrafi produkować <color=green>Włókna Roślinne</color>.\n\nWłókna, gdy są odpowiednio skręcone w <color=green>Liny</color>, umożliwiają techniki budowlane niedostępne dla tych, którzy nie są przygotowani — w tym <color=green>mosty wiszące</color>, <color=green>schody linowe</color> i <color=green>liany</color>.\n\nAby przetworzyć włókna, umieść Rękodzielnika.\n\nRękodzielnik może być także zlecony do produkcji innych użytecznych przedmiotów, w tym prawidłowo złożonych <color=green>materiałów wybuchowych</color>, w razie potrzeby zdecydowanej modyfikacji terenu.\n\nUmieść jednego Rękodzielnika, aby zaznajomić się z jego funkcją. <color=green>Możesz go później wstrzymać lub rozebrać</color>."
ptBR = "O Florista é capaz de mais do que o cultivo de frutas. Notavelmente, ele pode produzir <color=green>Fibras Vegetais</color>.\n\nAs fibras, quando devidamente fiadas em <color=green>Cordas</color>, possibilitam técnicas de construção indisponíveis para os despreparados — <color=green>pontes suspensas</color>, <color=green>escadas de corda</color> e <color=green>tirolesas</color> entre elas.\n\nPara processar as fibras, coloque um Artesão.\n\nO Artesão também pode ser encarregado de produzir outros itens úteis, incluindo explosivos <color=green>montados corretamente</color>, caso surja a necessidade de uma modificação decisiva no terreno.\n\nColoque um Artesão para se familiarizar com sua função. <color=green>Você pode pausar ou desmontá-lo mais tarde</color>."
koKR = "플로리스트는 베리 재배 이상의 능력을 가지고 있습니다. 특히 <color=green>식물 섬유</color>를 생산할 수 있습니다.\n\n섬유는 적절하게 방적되어 <color=green>로프</color>가 되면 준비되지 않은 사람에게는 불가능한 건설 기술을 가능하게 합니다 — <color=green>현수교</color>, <color=green>로프 사다리</color>, <color=green>집라인</color> 등이 그 예입니다.\n\n섬유를 가공하려면 핸디크래프터를 배치하십시오.\n\n핸디크래프터는 결정적인 지형 수정을 위해 필요할 경우 제대로 조립된 <color=green>폭발물</color>을 생산하는 등의 다른 유용한 아이템의 제작도 맡길 수 있습니다.\n\n그 기능에 익숙해지기 위해 핸디크래프터 하나를 배치하세요. <color=green>나중에 일시 정지하거나 해체할 수 있습니다</color>."
csCZ = "Florista není schopna pouze pěstování bobulí. Nejvýznamněji může produkovat <color=green>rostlinná vlákna</color>.\n\nVlákna, když jsou správně vytočena do <color=green>lana</color>, umožňují stavební techniky, které jsou nedostupné pro nepřipravené — <color=green>visuté mosty</color>, <color=green>lanové schody</color> a <color=green>zipline</color> patří mezi ně.\n\nPro zpracování vláken umístěte ruční výrobnu.\n\nRuční výrobna může také být pověřena výrobou dalších užitečných předmětů, včetně správně sestavených <color=green>výbušnin</color>, pokud by nastala potřeba rozhodných terénních úprav.\n\nUmístěte jednu ruční výrobnu, abyste se seznámili s její funkcí. <color=green>Můžete ji později zastavit nebo demontovat</color>."
viVN = "Người làm hoa có khả năng hơn cả việc trồng dâu. Đáng chú ý nhất, nó có thể sản xuất <color=green>Vải Thực Vật</color>.\n\nVải, khi được kéo thành <color=green>Dây Thừng</color> đúng cách, cho phép các kỹ thuật xây dựng không có sẵn cho những người không chuẩn bị — <color=green>cầu treo</color>, <color=green>cầu thang dây</color>, và <color=green>tuyến cáp</color> trong số đó.\n\nĐể chế biến sợi vải, hãy đặt một Người Làm Đồ Thủ Công.\n\nNgười Làm Đồ Thủ Công cũng có thể được giao nhiệm vụ sản xuất các vật phẩm hữu ích khác, bao gồm các <color=green>chất nổ</color> được lắp ráp đúng cách, nếu cần thiết phải thay đổi địa hình quyết liệt.\n\nĐặt một Người Làm Đồ Thủ Công để làm quen với chức năng của nó. <color=green>Bạn có thể tạm dừng hoặc tháo dỡ nó sau</color>."
trTR = "Çiçekçi, sadece meyve yetiştirmekle kalmaz. En önemlisi, <color=green>Bitki Lifleri</color> üretebilir.\n\nLifler, düzgün bir şekilde <color=green>Kordon</color> haline getirildiğinde, hazırlıksız olanların erişemeyeceği inşaat tekniklerine olanak tanır — bunlar arasında <color=green>askılı köprüler</color>, <color=green>ip merdivenler</color> ve <color=green>zipline'lar</color> bulunur.\n\nLifleri işlemek için bir Zanaatkar yerleştir.\n\nZanaatkar ayrıca, kesin arazi modifikasyonu gereksinimi doğarsa düzgün bir şekilde monte edilmiş <color=green>patlayıcılar</color> gibi diğer faydalı eşyaların üretilmesiyle de görevlendirilebilir.\n\nFonksiyonu hakkında bilgi edinmek için bir Zanaatkar yerleştir. <color=green>İstersen daha sonra duraklatabilir veya sökebilirsin</color>."

["Tutorial.Library.BuildPrimitivePapermill.Whitepaws"]
raw = "With the Library nearing completion, it is time to prepare for written scholarship.\n\nAmong the recovered items from the cart was a <color=green>Metal Cauldron</color>. Such vessels are commonly associated with cooking, but we will apply it to a higher purpose.\n\nThe few promising minds unfortunate enough to have been born in your... general vicinity... will require something better than bark and flat rocks upon which to record their ideas.\n\nConstruct a Primitive Papermill. Within it, sawdust and pine resin are boiled together to produce <color=green>paper</color> in the traditional manner.\n\nYou may have noticed that sawdust now fuels mushroom cultivation, artificial soil for the florist, and soon, paper production. <color=green>It is no longer waste</color>, use it wisely."
status = "normal"
enUS = "With the Library nearing completion, it is time to prepare for written scholarship.\n\nAmong the recovered items from the cart was a <color=green>Metal Cauldron</color>. Such vessels are commonly associated with cooking, but we will apply it to a higher purpose.\n\nThe few promising minds unfortunate enough to have been born in your... general vicinity... will require something better than bark and flat rocks upon which to record their ideas.\n\nConstruct a Primitive Papermill. Within it, sawdust and pine resin are boiled together to produce <color=green>paper</color> in the traditional manner.\n\nYou may have noticed that sawdust now fuels mushroom cultivation, artificial soil for the florist, and soon, paper production. <color=green>It is no longer waste</color>, use it wisely."
zhCN = "随着图书馆即将完成，是时候为书面学术准备做准备了。\n\n在从手推车上回收的物品中，有一个<color=green>金属炼锅</color>。这样的容器通常与烹饪相关联，但我们将其用于更高的目的。\n\n那些不幸诞生在你……周边地区……的少数几位有前途的思想者将需要比树皮和扁平岩石更好的记录他们想法的工具。\n\n建造一个原始造纸厂。在其中，木屑和松脂将一起煮沸，以传统方式生产<color=green>纸张</color>。\n\n你可能已经注意到，木屑现在为蘑菇栽培、花匠的人工土壤，甚至即将到来的造纸生产提供燃料。<color=green>它不再是废物</color>，请明智使用。"
zhTW = "隨著圖書館接近完成，現在是時候準備書寫學術了。\n\n在從手推車回收的物品中，有一個<color=green>金屬鍋</color>。這種器皿通常與烹飪相關，但我們將其用於更高的目的。\n\n那些不幸地出生在你... 一般附近的幾位有前途的頭腦，需要比樹皮和平坦的岩石更好的東西來記錄他們的想法。\n\n建造一座原始造紙廠。在這裡，木屑和松樹樹脂會一起煮沸，以傳統方式生產<color=green>紙張</color>。\n\n你可能已經注意到，木屑現在用於培養蘑菇、花店的人工土壤，還有很快的紙張生產。<color=green>它不再是浪費</color>，明智地使用它。"
ruRU = "С завершением Библиотеки приходит время подготовиться к письменной науке.\n\nСреди найденных предметов из повозки был <color=green>Металлический Котел</color>. Такие сосуды обычно ассоциируются с готовкой, но мы применим его для более высокой цели.\n\nНесколько многообещающих умов, к сожалению, родившихся в вашем... общем окружении... нуждаются в чем-то лучшем, чем кора и плоские камни, на которых можно записывать свои идеи.\n\nПостройте Примитивную Бумажную Мелницу. В ней древесная стружка и сосновая смола варятся вместе, чтобы производить <color=green>бумагу</color> традиционным способом.\n\nВы, возможно, заметили, что древесная стружка теперь становится топливом для выращивания грибов, искусственной почвы для флориста и вскоре, для производства бумаги. <color=green>Это больше не отход</color>, используйте его с умом."
jaJP = "図書館の完成が近づいているので、学術的な文書作成の準備をする時です。\n\n台車から回収された品の中には、<color=green>金属製の大釜</color>がありました。このような器具は通常、料理に関連付けられますが、私たちはより高い目的にそれを利用します。\n\nあなたの...一般的な周辺環境で生まれてしまった不運な少数の有望な頭脳には、アイデアを記録するための樹皮や平らな石よりも良いものが必要です。\n\n原始的な製紙所を建設してください。その中で、木工くずと松の樹脂を一緒に煮ることで、伝統的な方法で<color=green>紙</color>が生産されます。\n\n木工くずが現在、キノコの栽培、花屋のための人工土壌、そしてまもなく紙の生産に使われていることに気付いたかもしれません。<color=green>もはや廃棄物ではありません</color>、賢く使いましょう。"
frFR = "Avec la bibliothèque approchant de son achèvement, il est temps de préparer la bourse écrite.\n\nParmi les objets récupérés depuis la charrette se trouvait un <color=green>chaudron en métal</color>. De tels récipients sont couramment associés à la cuisine, mais nous allons les appliquer à un but plus élevé.\n\nLes few esprits prometteurs malheureusement nés dans votre... voisinage général... auront besoin de quelque chose de mieux que de l'écorce et des pierres plates sur lesquelles enregistrer leurs idées.\n\nConstruisez un Moulin à papier primitif. À l'intérieur, la sciure de bois et la résine de pin sont bouillies ensemble pour produire <color=green>du papier</color> de manière traditionnelle.\n\nVous avez peut-être remarqué que la sciure de bois alimente désormais la culture des champignons, le sol artificiel pour le fleuriste, et bientôt, la production de papier. <color=green>Cela n'est plus un déchet</color>, utilisez-le judicieusement."
deDE = "Mit der fast abgeschlossenen Bibliothek ist es an der Zeit, sich auf das schriftliche Wissen vorzubereiten.\n\nUnter den aus dem Wagen wiedergefundenen Gegenständen befand sich ein <color=green>Metallkessel</color>. Solche Gefäße sind normalerweise mit dem Kochen verbunden, aber wir werden sie für einen höheren Zweck nutzen.\n\nDie wenigen vielversprechenden Geister, die unglücklicherweise in Ihrer... allgemeinen Umgebung... geboren wurden, benötigen etwas Besseres als Rinde und flache Steine, um ihre Ideen festzuhalten.\n\nErrichten Sie eine Primitive Papiermühle. Darin werden Sägemehl und Kiefernharz gemeinsam gekocht, um <color=green>Papier</color> auf traditionelle Weise herzustellen.\n\nVielleicht haben Sie bemerkt, dass Sägemehl jetzt die Pilzanbau, künstlichen Boden für den Floristen und bald die Papierproduktion antreibt. <color=green>Es ist kein Abfall mehr</color>, nutzen Sie es weise."
plPL = "Zbliżając się do zakończenia budowy Biblioteki, nadszedł czas, aby przygotować się do pisemnych badań.\n\nWśród odzyskanych przedmiotów z wózka znajdował się <color=green>Metalowy Kocioł</color>. Takie naczynia zazwyczaj kojarzone są z gotowaniem, ale my wykorzystamy je do wyższego celu.\n\nKilku obiecujących umysłów, nieszczęśliwie urodzonych w twojej... ogólnej okolicy... będzie potrzebować czegoś lepszego niż kora i płaskie kamienie, na których można zapisać swoje pomysły.\n\nZbuduj Prymitywną Papiernię. W jej wnętrzu wióry drzewne i żywica sosnowa będą razem gotowane, aby wytworzyć <color=green>papier</color> w tradycyjny sposób.\n\nMożesz zauważyć, że wióry drzewne teraz zasilają uprawę grzybów, sztuczną ziemię dla florysty, a wkrótce także produkcję papieru. <color=green>To już nie jest odpady</color>, wykorzystaj to mądrze."
ptBR = "Com a Biblioteca perto da conclusão, é hora de se preparar para a erudição escrita.\n\nEntre os itens recuperados do carrinho estava um <color=green>Caldeirão de Metal</color>. Esses recipientes são comumente associados ao cozimento, mas nós o aplicaremos a um propósito maior.\n\nAs poucas mentes promissoras infelizes o suficiente para terem nascido em sua... vizinhança geral... precisarão de algo melhor do que cascas e pedras planas onde registrar suas ideias.\n\nConstrua uma Fábrica Primária de Papel. Dentro dela, serragem e resina de pinho são fervidos juntos para produzir <color=green>papel</color> de maneira tradicional.\n\nVocê deve ter notado que a serragem agora alimenta o cultivo de cogumelos, solo artificial para o florista e, em breve, a produção de papel. <color=green>Não é mais desperdício</color>, use-a sabiamente."
koKR = "도서관이 완공을 향해 나아가고 있으니, 이제는 글쓰기 연구를 준비할 시간입니다.\n\n카트에서 회수한 물품 중 하나는 <color=green>금속 가마솥</color>이었습니다. 이러한 용기는 일반적으로 요리에 사용되지만, 우리는 그것을 더 높은 목적에 활용할 것입니다.\n\n불행히도 당신의... 대체로 이런 근처에서 태어난 몇몇 유망한 인재들은 그들의 아이디어를 기록하기 위해 나무 껍질과 평평한 바위보다 나은 것을 필요로 합니다.\n\n원시 종이 공장을 건설하십시오. 그 안에서는 톱밥과 소나무 수지가 함께 끓여져 전통적인 방식으로 <color=green>종이</color>를 생산합니다.\n\n톱밥이 이제 버섯 재배, 화훼용 인공 토양, 그리고 곧 종이 생산에 연료로 사용된다는 것을 당신은 아마 주목하셨을 겁니다. <color=green>더 이상 폐기물이 아닙니다</color>, 현명하게 사용하십시오."
csCZ = "S knihovnou blížící se k dokončení je čas připravit se na psanou vědu.\n\nMezi znovu nalezenými předměty z vozíku byl <color=green>metalový kotel</color>. Takové nádoby jsou běžně spojovány s vařením, ale my je využijeme pro vyšší účel.\n\nNěkolik slibných myslí, které měly smůlu a narodily se ve vaší... obecném okolí... bude potřebovat něco lepšího než kůru a ploché kameny, na které by mohly zaznamenávat své myšlenky.\n\nPostavte primitivní papírnu. V ní se smícháním pilin a borovicové pryskyřice vaří, aby se tradičním způsobem vyrobil <color=green>papír</color>.\n\nMožná jste si všimli, že piliny nyní pohánějí pěstování hub, umělou půdu pro květináře a brzy také výrobu papíru. <color=green>Už to není odpad</color>, používejte ho moudře."
viVN = "Với Thư viện sắp hoàn thành, đã đến lúc chuẩn bị cho việc nghiên cứu viết.\n\nTrong số các vật phẩm được phục hồi từ xe đẩy có một <color=green>Chiếc Nồi Kim Loại</color>. Những dụng cụ như vậy thường gắn liền với nấu nướng, nhưng chúng ta sẽ áp dụng chúng cho một mục đích cao cả hơn.\n\nCác trí tuệ hứa hẹn nhưng không may mắn phải sinh ra trong vùng lân cận của bạn sẽ cần thứ gì đó tốt hơn vỏ cây và những viên đá phẳng để ghi lại ý tưởng của họ.\n\nHãy xây dựng một Nhà Máy Giấy Nguyên Thủy. Bên trong, bụi gỗ và nhựa thông sẽ được nấu chung để sản xuất <color=green>giấy</color> theo cách truyền thống.\n\nCó thể bạn đã nhận thấy rằng bụi gỗ giờ đây cung cấp năng lượng cho việc trồng nấm, đất nhân tạo cho cửa hàng hoa, và sắp tới, sản xuất giấy. <color=green>Đó không còn là rác thải</color>, hãy sử dụng nó một cách khôn ngoan."
trTR = "“Kütüphanenin tamamlanmasına yaklaşırken, yazılı bilime hazırlanma zamanı geldi.\n\nArabadan kurtarılan eşyalar arasında bir <color=green>Metal Kazan</color> vardı. Bu tür kaplar genellikle yemek pişirmekle ilişkilendirilir, ancak biz bunu daha yüce bir amaç için kullanacağız.\n\nSizin... genel çevrenizde... doğmuş talihsiz birkaç umut vaadeden zihin, fikirlerini kaydetmek için kabuk ve düz taşlardan daha iyi bir şeye ihtiyaç duyacak.\n\nBir İlkel Kağıt Fabrikası inşa edin. İçinde, odun talaşı ve çam reçinesi birlikte kaynatılarak geleneksel yöntemle <color=green>kağıt</color> üretilir.\n\nOdun talaşının artık mantar yetiştirmeyi, çiçekçi için yapay toprağı ve yakında kağıt üretimini desteklediğini fark etmiş olabilirsiniz. <color=green>Artık atık değil</color>, bunu akıllıca kullanın.”"

["Tutorial.Library.CompleteLibrary.Whitepaws"]
raw = "It appears the necessary preparations have been established.\n\nThe Library now only needs to be completed.\n\nMaintain stable supply lines while the work concludes."
status = "normal"
enUS = "It appears the necessary preparations have been established.\n\nThe Library now only needs to be completed.\n\nMaintain stable supply lines while the work concludes."
zhCN = "看起来必要的准备工作已经就绪。\n\n图书馆现在只需要完成。\n\n在工作结束时保持稳定的供应线路。"
zhTW = "似乎必要的準備已經完成。\n\n圖書館現在只需要完成。\n\n在工作結束期間，保持穩定的供應線。"
ruRU = "Похоже, необходимые приготовления завершены.\n\nБиблиотеку теперь нужно только достроить.\n\nПоддерживайте стабильные линии поставок, пока работа не завершится."
jaJP = "必要な準備が整ったようです。\n\n図書館は今、完成するだけです。\n\n作業が終わるまで、安定した供給ラインを維持してください。"
frFR = "Il semble que les préparatifs nécessaires aient été établis.\n\nLa Bibliothèque doit maintenant uniquement être complétée.\n\nMaintenez des lignes d'approvisionnement stables pendant que les travaux se terminent."
deDE = "Es scheint, dass die notwendigen Vorbereitungen getroffen wurden.\n\nDie Bibliothek muss jetzt nur noch fertiggestellt werden.\n\nHalten Sie stabile Versorgungsleitungen aufrecht, während die Arbeiten abgeschlossen werden."
plPL = "Wydaje się, że konieczne przygotowania zostały zrealizowane.\n\nBiblioteka musi teraz tylko zostać ukończona.\n\nUtrzymuj stabilne linie dostaw, podczas gdy prace dobiegną końca."
ptBR = "Parece que as preparações necessárias foram estabelecidas.\n\nA Biblioteca agora só precisa ser concluída.\n\nMantenha linhas de suprimento estáveis enquanto o trabalho é finalizado."
koKR = "필요한 준비가 완료된 것으로 보입니다.\n\n도서관은 이제 완성만 하면 됩니다.\n\n작업이 마무리되는 동안 안정적인 공급 라인을 유지하세요."
csCZ = "Zdá se, že potřebné přípravy byly zajištěny.\n\nKnihovna nyní potřebuje být pouze dokončena.\n\nUdržujte stabilní dodavatelské cesty, zatímco práce končí."
viVN = "Có vẻ như các chuẩn bị cần thiết đã được thiết lập.\n\nThư viện hiện chỉ cần được hoàn thiện.\n\nDuy trì các tuyến cung cấp ổn định trong khi công việc được hoàn thành."
trTR = "Gerekli hazırlıkların yapıldığı görünmektedir.\n\nKütüphanenin artık sadece tamamlanması gerekiyor.\n\nÇalışmalar sona ererken istikrarlı tedarik hatlarını koruyun."

["Tutorial.Library.AccumulateScience.Whitepaws"]
raw = "You are still alive. Interesting.\n\nWith the Library operational, your settlement may now generate Science.\n\nAccumulate 100 Science Points. This will mark the transition from improvisation to planification.\n\nShould you find it difficult to maintain a steady supply of Berries and Sunflower Seeds for study — particularly if other beavers insist on consuming them recreationally — consider preparing <color=green>Cereal Bars</color> in the <color=green>Cooking Tent</color>.\n\nProperly prepared, they satisfy both desires more efficiently than the raw ingredients.\n\nScholars require provisions. So do opportunists."
status = "normal"
enUS = "You are still alive. Interesting.\n\nWith the Library operational, your settlement may now generate Science.\n\nAccumulate 100 Science Points. This will mark the transition from improvisation to planning.\n\nShould you find it difficult to maintain a steady supply of Berries and Sunflower Seeds for study — particularly if other beavers insist on consuming them recreationally — consider preparing <color=green>Cereal Bars</color> in the <color=green>Cooking Tent</color>.\n\nProperly prepared, they satisfy both desires more efficiently than the raw ingredients.\n\nScholars require provisions. So do opportunists."
zhCN = "你还活着。很有趣。\n\n随着图书馆的运作，你的定居点现在可以生成科学。\n\n积累100科学点。这将标志着从即兴发挥到计划的过渡。\n\n如果你发现难以维持稳定的浆果和向日葵种子的供应——尤其是如果其他海狸坚持要享用这些食物——请考虑在<color=green>烹饪帐篷</color>中准备<color=green>谷物棒</color>。\n\n如果准备得当，它们将比原料更有效地满足这两种需求。\n\n学者需要补给，机会主义者也是如此。"
zhTW = "你還活著。有趣。\n\n隨著圖書館的運作，你的定居點現在可以產生科學。\n\n累積100科學點。這將標誌著從即興創作到計劃制定的過渡。\n\n如果你發現維持穩定的漿果和向日葵種子供應困難——特別是當其他海狸堅持將它們用於娛樂消費時——考慮在<color=green>烹飪帳篷</color>中準備<color=green>穀物棒</color>。\n\n適當準備後，它們比生的材料更有效地滿足兩種需求。\n\n學者需要供給。機會主義者也是如此。"
ruRU = "Вы все еще живы. Интересно.\n\nС библиотекой в рабочем состоянии ваше поселение теперь может генерировать науку.\n\nСоберите 100 научных очков. Это ознаменует переход от импровизации к планированию.\n\nЕсли вам трудно поддерживать постоянный запас ягод и семян подсолнечника для исследований — особенно если другие бобры настаивают на их рекреационном употреблении — подумайте о приготовлении <color=green>злаковых батончиков</color> в <color=green>кулинарной палатке</color>.\n\nПравильно приготовленные, они удовлетворяют оба желания более эффективно, чем сырые ингредиенты.\n\nУченым требуются запасы. Так же, как и оппортунистам."
jaJP = "あなたはまだ生きています。興味深いです。\n\n図書館が稼働していることで、あなたの集落は科学を生成できるようになりました。\n\n100ポイントの科学を蓄積してください。これが即興から計画へと移行することを示します。\n\n研究のためにベリーやひまわりの種を安定して供給するのが難しい場合、特に他のビーバーがそれらを娯楽的に消費する場合は、<color=green>料理テント</color>で<color=green>シリアルバー</color>を準備することを検討してください。\n\n適切に準備すれば、生の材料よりも効率的に両方の欲求を満たすことができます。\n\n学者は食料を必要とし、 opportunists も同様です。"
frFR = "Vous êtes toujours en vie. Intéressant.\n\nAvec la Bibliothèque opérationnelle, votre établissement peut désormais générer de la Science.\n\nAccumulez 100 Points de Science. Cela marquera la transition de l'improvisation à la planification.\n\nSi vous trouvez difficile de maintenir un approvisionnement constant en Baies et Graines de Tournesol pour l'étude — en particulier si d'autres castors insistent pour les consommer de manière récréative — envisagez de préparer des <color=green>Barres de Céréales</color> dans la <color=green>Tente de Cuisine</color>.\n\nBien préparées, elles satisfont les deux désirs plus efficacement que les ingrédients bruts.\n\nLes érudits ont besoin de provisions. Les opportunistes aussi."
deDE = "Du bist noch am Leben. Interessant.\n\nMit der Bibliothek in Betrieb kann deine Siedlung jetzt Wissenschaft generieren.\n\nSammle 100 Wissenschaftspunkte. Dies markiert den Übergang von Improvisation zu Planung.\n\nSolltest du Schwierigkeiten haben, einen stetigen Nachschub an Beeren und Sonnenblumensamen für Studien aufrechtzuerhalten – insbesondere wenn andere Biber darauf bestehen, diese freizeitorientiert zu konsumieren – ziehe in Betracht, <color=green>Getreideriegel</color> im <color=green>Kochtent</color> zuzubereiten.\n\nRichtig zubereitet, befriedigen sie beide Bedürfnisse effizienter als die Rohstoffe.\n\nWissenschaftler benötigen Vorräte. Das tun auch Opportunisten."
plPL = "Wciąż żyjesz. Interesujące.\n\nZ działającą Biblioteką, twoja osada może teraz generować Nauka.\n\nZgromadź 100 Punktów Nauki. To oznaczy przejście od improwizacji do planowania.\n\nJeśli będziesz miał problem z utrzymaniem stałej dostawy Jagód i Nasion Słonecznika do badań — szczególnie jeśli inne bobry będą upierać się przy ich rekreacyjnym spożywaniu — rozważ przygotowanie <color=green>Batonów Zbożowych</color> w <color=green>Namiocie Kulinarnym</color>.\n\nOdpowiednio przygotowane, zaspokajają obie potrzeby bardziej efektywnie niż surowe składniki.\n\nUczonym potrzebne są zapasy. Tak samo jak oportunistom."
ptBR = "Você ainda está vivo. Interessante.\n\nCom a Biblioteca em funcionamento, seu assentamento pode agora gerar Ciência.\n\nAcumule 100 Pontos de Ciência. Isso marcará a transição da improvisação para o planejamento.\n\nSe você achar difícil manter um suprimento constante de Frutas Silvestres e Sementes de Girassol para estudo — especialmente se outros castores insistirem em consumi-los recreativamente — considere preparar <color=green>Barra de Cereal</color> na <color=green>Tenda de Cozinha</color>.\n\nPreparadas corretamente, elas satisfazem ambos os desejos de forma mais eficiente do que os ingredientes crus.\n\nOs estudiosos precisam de suprimentos. Os oportunistas também."
koKR = "당신은 여전히 살아있습니다. 흥미롭군요.\n\n도서관이 운영되면서, 당신의 정착지는 이제 과학을 생성할 수 있습니다.\n\n100 과학점을 축적하세요. 이것은 즉흥에서 계획으로의 전환을 나타냅니다.\n\n특히 다른 비버들이 오락적으로 그것들을 소비하는 경우, 연구를 위해 베리와 해바라기 씨앗의 안정적인 공급을 유지하는 것이 어렵다면 <color=green>요리 텐트</color>에서 <color=green>시리얼 바</color>를 준비하는 것을 고려해보세요.\n\n적절히 준비하면, 원재료보다 더 효율적으로 두 가지 욕구를 모두 충족시킵니다.\n\n학자들은 식량이 필요합니다. 기회주의자들도 마찬가지입니다."
csCZ = "Stále žiješ. Zajímavé.\n\nS funkční Knihovnou může vaše osada nyní generovat vědu.\n\nNasbírejte 100 vědeckých bodů. To označí přechod od improvizace k plánování.\n\nPokud máte potíže udržet stabilní zásobu bobulí a slunečnicových semínek na studium — zejména pokud ostatní bobři na nich trvají jako na zábavě — zvažte přípravu <color=green>obilních tyčinek</color> v <color=green>vařičském stanu</color>.\n\nSprávně připravené uspokojí obě touhy efektivněji než syrové ingredience.\n\nVědci potřebují zásoby. Stejně tak příležitostníci."
viVN = "Bạn vẫn còn sống. Thú vị.\n\nVới Thư Viện hoạt động, khu định cư của bạn giờ có thể tạo ra Khoa Học.\n\nTích lũy 100 Điểm Khoa Học. Điều này sẽ đánh dấu sự chuyển tiếp từ ứng biến sang lập kế hoạch.\n\nNếu bạn thấy khó khăn trong việc duy trì nguồn cung cấp ổn định các loại Berries và Hạt Hướng Dương để nghiên cứu — đặc biệt nếu những con gấu béo khác cứ insist vào việc tiêu thụ chúng một cách giải trí — hãy xem xét việc chuẩn bị <color=green>Bars Ngũ Cốc</color> trong <color=green>Trại Nấu Ăn</color>.\n\nKhi được chuẩn bị đúng cách, chúng đáp ứng cả hai nhu cầu một cách hiệu quả hơn so với nguyên liệu thô.\n\nCác học giả cần thực phẩm. Các kẻ cơ hội cũng vậy."
trTR = "Henüz hayattasınız. İlginç.\n\nKütüphane işlevsel hale geldiğinde, yerleşiminiz artık Bilim üretebilir.\n\n100 Bilim Puanı biriktirin. Bu, doğaçlamadan planlamaya geçişi işaret edecektir.\n\nEğer Büyükkavun ve Ayçiçeği Tohumu tedariğini sürekli sağlamakta zorlanıyorsanız — özellikle diğer kunduzların bunları eğlence amaçlı tüketmesini dert ediyorsanız — <color=green>Süt Makarna</color> hazırlamayı düşünün <color=green>Yemek Çadırı</color> içinde.\n\nDoğru hazırlanırsa, çiğ malzemelerden daha verimli bir şekilde her iki isteği de karşılar.\n\nBilim insanları yiyecek gerektirir. Fırsatçıların da."

["Tutorial.Library.WhatNextText.Whitepaws"]
raw = "You have secured water, industry, scholarship, and structured governance.\n\nThis is… satisfactory.\n\nReaching this stage of development exceeds several internal projections. As a consequence, certain parties within this bureau are now wealthier than they were previously. Others seem distressed at your success for unexplained reasons.\n\nWe assure you there was no wager placed on your odds of long-term survival. Officially.\n\nYou may now proceed with greater autonomy. The settlement is stable enough to pursue multiple avenues of advancement. <color=green>Four principal paths stand before you</color>.\n\nExplore them as you see fit. They are not mutually exclusive. In fact, you are expected to explore all of them eventually.\n\nContinue."
status = "normal"
enUS = "You have secured water, industry, scholarship, and structured governance.\n\nThis is… satisfactory.\n\nReaching this stage of development exceeds several internal projections. As a consequence, certain parties within this bureau are now wealthier than they were previously. Others seem distressed at your success for unexplained reasons.\n\nWe assure you there was no wager placed on your odds of long-term survival. Officially.\n\nYou may now proceed with greater autonomy. The settlement is stable enough to pursue multiple avenues of advancement. <color=green>Four principal paths stand before you</color>.\n\nExplore them as you see fit. They are not mutually exclusive. In fact, you are expected to explore all of them eventually.\n\nContinue."
zhCN = "您已确保了水源、工业、学术和有序的治理。\n\n这……令人满意。\n\n达到这一发展阶段超出了若干内部预期。因此，本局某些部门的财富现已超出以往水平。其他人似乎因为您成功而感到不安，原因不得而知。\n\n我们向您保证，没有人对您长期生存的机会进行赌注。官方声明。\n\n您现在可以更大程度地自主进展。该定居点足够稳定，可以追求多种发展方向。<color=green>四条主要发展路径展现在您面前</color>。\n\n请随意探索。它们并不是相互排斥的。事实上，您预期最终将会探索所有路径。\n\n继续。"
zhTW = "您已確保水源、工業、學術和結構化治理。\n\n這是……滿意的。\n\n達到這一發展階段超出了幾個內部預測。因此，本局某些方會比之前更富裕。其他人對您的成功似乎感到不安，原因不明。\n\n我們向您保證，並未對您的長期生存幾率進行賭注。官方上。\n\n您現在可以以更大的自主權繼續。該定居點已經穩定，足以追求多個進步途徑。<color=green>您面前有四條主要路徑</color>。\n\n請隨意探索。它們並不互相排斥。事實上，您預計最終將探索所有路徑。\n\n繼續。"
ruRU = "Вы обеспечили воду, промышленность, образование и структурированное управление.\n\nЭто… удовлетворительно.\n\nДостижение этой стадии развития превышает несколько внутренних прогнозов. В результате некоторые стороны в этом учреждении стали богаче, чем были ранее. Другие, по непонятным причинам, кажутся расстроенными вашим успехом.\n\nМы уверяем вас, что никаких ставок на ваши шансы на долгосрочное выживание не делалось. Официально.\n\nТеперь вы можете действовать с большей автономией. Поселение достаточно стабильно, чтобы преследовать несколько направлений развития. <color=green>Перед вами четыре основных пути</color>.\n\nИсследуйте их по своему усмотрению. Они не исключают друг друга. На самом деле, от вас ожидается, что вы в конечном итоге исследуете все из них.\n\nПродолжайте."
jaJP = "水、産業、奨学金、構造的な統治を確保しました。\n\nこれは…満足です。\n\nこの発展段階に到達することは、いくつかの内部予測を超えています。その結果、この局内の特定の関係者は以前よりも裕福になっています。他の者は理由もなくあなたの成功に不満を感じているようです。\n\n公式には、あなたの長期的な生存の確率についての賭けは行われていないことを保証します。\n\n今後はより高い自律性をもって進めます。集落は複数の発展の道を追求するのに十分に安定しています。<color=green>四つの主要な道があなたの前にあります</color>。\n\nあなたの判断でそれらを探求してください。相互に排他的ではありません。実際には、最終的にはすべてを探求することが期待されています。\n\n続けてください。"
frFR = "Vous avez sécurisé de l'eau, de l'industrie, des bourses et une gouvernance structurée.\n\nC'est… satisfaisant.\n\nAtteindre ce stade de développement dépasse plusieurs projections internes. En conséquence, certaines parties de ce bureau sont désormais plus riches qu'auparavant. D'autres semblent préoccupées par votre succès pour des raisons inexpliquées.\n\nNous vous assurons qu'aucun pari n'a été placé sur vos chances de survie à long terme. Officiellement.\n\nVous pouvez maintenant procéder avec une plus grande autonomie. La colonie est suffisamment stable pour poursuivre plusieurs voies d'avancement. <color=green>Quatre chemins principaux s'offrent à vous</color>.\n\nExplorez-les comme bon vous semble. Ils ne sont pas mutuellement exclusifs. En fait, vous êtes censé tous les explorer à terme.\n\nContinuez."
deDE = "Sie haben Wasser, Industrie, Bildung und strukturierte Regierungsführung gesichert.\n\nDas ist… zufriedenstellend.\n\nDie Erreichung dieser Entwicklungsstufe übertrifft mehrere interne Prognosen. Infolgedessen sind bestimmte Parteien innerhalb dieses Amtes nun wohlhabender als zuvor. Andere scheinen aus unerklärlichen Gründen über Ihren Erfolg besorgt zu sein.\n\nWir versichern Ihnen, dass keine Wette auf Ihre langfristigen Überlebenswahrscheinlichkeiten platziert wurde. Offiziell.\n\nSie können nun mit größerer Autonomie fortfahren. Die Siedlung ist stabil genug, um mehrere Wege der Weiterentwicklung zu verfolgen. <color=green>Vier Hauptwege stehen Ihnen bevor</color>.\n\nErforschen Sie diese nach Belieben. Sie schließen sich gegenseitig nicht aus. Tatsächlich wird erwartet, dass Sie schließlich alle von ihnen erkunden.\n\nFahren Sie fort."
plPL = "Zabezpieczyłeś wodę, przemysł, stypendia i zorganizowane rządzenie.\n\nTo… satysfakcjonujące.\n\nOsiągnięcie tego etapu rozwoju przewyższa kilka wewnętrznych prognoz. W konsekwencji niektóre strony w tym biurze są teraz bogatsze niż wcześniej. Inni zdają się być zaniepokojeni twoim sukcesem z niejasnych powodów.\n\nZapewniamy, że nie postawiono zakładu na twoje szanse na przetrwanie w dłuższym okresie. Oficjalnie.\n\nMożesz teraz działać z większą autonomią. Osada jest wystarczająco stabilna, aby podjąć różnorodne ścieżki rozwoju. <color=green>Cztery główne ścieżki stoją przed tobą</color>.\n\nBadaj je według własnego uznania. Nie są one wzajemnie wykluczające się. W rzeczywistości oczekuje się, że ostatecznie zbadasz je wszystkie.\n\nKontynuuj."
ptBR = "Você garantiu água, indústria, bolsas de estudo e governança estruturada.\n\nIsso é… satisfatório.\n\nAlcançar este estágio de desenvolvimento supera várias projeções internas. Como consequência, certas partes dentro deste escritório estão agora mais ricas do que anteriormente. Outros parecem estar angustiados com seu sucesso por razões inexplicáveis.\n\nAsseguramos que não houve aposta em suas chances de sobrevivência a longo prazo. Oficialmente.\n\nVocê pode agora prosseguir com maior autonomia. O assentamento é estável o suficiente para seguir múltiplas avenidas de avanço. <color=green>Quatro caminhos principais estão diante de você</color>.\n\nExplore-os como desejar. Eles não são mutuamente exclusivos. Na verdade, espera-se que você os explore todos eventualmente.\n\nContinue."
koKR = "물과 산업, 장학금, 체계적 거버넌스를 확보했습니다.\n\n이것은… 만족스럽습니다.\n\n이 개발 단계에 도달한 것은 여러 내부 예측을 초과했습니다. 그 결과, 이 기구 내의 특정 당사자들은 이전보다 더 부유해졌습니다. 다른 이들은 설명할 수 없는 이유로 귀하의 성공에 불안해 보입니다.\n\n귀하의 장기적인 생존 가능성에 대한 내기가 이루어지지 않았음을 확신드립니다. 공식적으로.\n\n이제 더 큰 자율성으로 나아갈 수 있습니다. 정착지는 여러 진보의 경로를 추구하기에 충분히 안정적입니다. <color=green>당신 앞에는 네 가지 주요 경로가 있습니다</color>.\n\n원하는 대로 탐색하십시오. 이들은 상호 배타적이지 않습니다. 사실, 귀하는 결국 모든 경로를 탐색할 것으로 기대됩니다.\n\n계속하십시오."
csCZ = "Zajistili jste vodu, průmysl, stipendia a strukturovanou vládu.\n\nTo je... uspokojivé.\n\nDosáhnout této fáze vývoje překonává několik interních projekcí. V důsledku toho jsou některé strany v této kanceláři nyní bohatší než byly dříve. Jiní se z neznámých důvodů zdají být z vaší úspěšnosti znepokojeni.\n\nUjišťujeme vás, že na vaše šance na dlouhodobé přežití nebyla uzavřena žádná sázka. Oficiálně.\n\nMůžete nyní pokračovat s větší autonomií. Osada je dostatečně stabilní na to, aby se dalo usilovat o více směrů pokroku. <color=green>Čtyři hlavní cesty stojí před vámi</color>.\n\nProzkoumejte je podle svého uvážení. Nejsem vzájemně vylučující. Ve skutečnosti se očekává, že je všechny nakonec prozkoumáte.\n\nPokračujte."
viVN = "Bạn đã đảm bảo nước, công nghiệp, học bổng và quản trị có cấu trúc.\n\nĐiều này… thật đáng hài lòng.\n\nViệc đạt tới giai đoạn phát triển này vượt qua một số dự đoán nội bộ. Do đó, một số bên trong văn phòng này hiện nay giàu có hơn trước. Những người khác dường như lo lắng về sự thành công của bạn vì lý do không thể giải thích.\n\nChúng tôi đảm bảo rằng không có cược nào được đặt vào khả năng sống sót lâu dài của bạn. Một cách chính thức.\n\nBạn giờ có thể tiến hành với quyền tự chủ lớn hơn. Khu định cư đủ ổn định để theo đuổi nhiều lộ trình phát triển khác nhau. <color=green>Bốn lộ trình chính đứng trước bạn</color>.\n\nKhám phá chúng theo cách bạn thấy phù hợp. Chúng không loại trừ lẫn nhau. Thực tế, bạn được mong đợi sẽ khám phá tất cả chúng vào cuối cùng.\n\nTiếp tục."
trTR = "Su kaynaklarını, sanayiyi, akademik alandaki gelişmeleri ve yapılandırılmış yönetimi güvence altına aldınız.\n\nBu… tatmin edici.\n\nBu gelişim aşamasına ulaşmak, birçok iç projeksiyonu aşmaktadır. Sonuç olarak, bu büro içindeki bazı taraflar, daha önce olduklarından daha zengin durumdadır. Diğerleri ise, sizin başarınızdan açıklanamaz nedenlerden dolayı rahatsız görünmektedir.\n\nUzun vadeli hayatta kalma şansınız üzerine herhangi bir bahis yapılmadığını size temin ederiz. Resmi olarak.\n\nArtık daha büyük bir özerklik ile devam edebilirsiniz. Yerleşim, birden fazla ilerleme yolunu takip etmek için yeterince istikrarlıdır. <color=green>Önünüzde dört ana yol bulunmaktadır</color>.\n\nİstediğiniz gibi keşfedin. Bunlar birbirini dışlamaz. Aslında, sonunda hepsini keşfetmeniz beklenmektedir.\n\nDevam edin."

["Tutorial.IrrigationBranch.IrrigationText.Whitepaws"]
raw = "You may have learned at school that there are irregularities in the water cycle. These are not temporary inconveniences.\n\n<color=red>Badtides</color> will come. When they do, every flowing body of water will turn hostile.\n\nWater must be disciplined before it disciplines you.\n\n<color=green>Follow up on this letter as soon as you are able to</color>. We will guide you in securing your settlement against this scourge and restoring order to the river.\n\nPanic is common. It is also inefficient."
status = "normal"
enUS = "You may have learned at school that there are irregularities in the water cycle. These are not temporary inconveniences.\n\n<color=red>Badtides</color> will come. When they do, every flowing body of water will turn hostile.\n\nWater must be disciplined before it disciplines you.\n\n<color=green>Follow up on this letter as soon as you are able to</color>. We will guide you in securing your settlement against this scourge and restoring order to the river.\n\nPanic is common. It is also inefficient."
zhCN = "你可能在学校了解到水循环中存在不规则现象。这些并非暂时的不便。\n\n<color=red>坏潮</color>将会来临。当它们来临时，每一条流动的水体都会变得敌对。\n\n水必须被驯服，否则你将被其驯服。\n\n<color=green>请尽快对此信件进行跟进</color>。我们将指导你保护你的定居点免受这一灾害，并恢复河流的秩序。\n\n恐慌是常见的，但这也是低效的。"
zhTW = "你可能在學校學過水循環中存在不規則現象。這些並不是暫時的不便。\n\n<color=red>惡潮</color>將會到來。當它們來臨時，所有流動的水體將變得危險。\n\n水必須被訓練，否則它會訓練你。\n\n<color=green>一旦你能夠，請務必立刻回覆這封信</color>。我們將指導你保護你的定居點，以抵禦這一災害並恢復河流的秩序。\n\n恐慌是常見的，但這也是低效的。"
ruRU = "Вы могли узнать в школе, что в водном цикле есть нерегулярности. Это не временные неудобства.\n\n<color=red>Плохие приливы</color> придут. Когда они придут, каждое текущее водное тело станет враждебным.\n\nВоду нужно дисциплинировать, прежде чем она дисциплинирует вас.\n\n<color=green>Свяжитесь с нами как можно скорее</color>. Мы поможем вам защитить ваше поселение от этого бедствия и восстановить порядок в реке.\n\nПаника обыденна. Это также неэффективно."
jaJP = "学校で水の循環には不規則性があることを学んだかもしれませんが、これは一時的な不便ではありません。\n\n<color=red>悪潮</color>がやってきます。その時、全ての流れる水は敵になります。\n\n水を制御しなければ、あなたが水に制御されてしまいます。\n\n<color=green>できるだけ早くこの手紙に返信してください</color>。私たちはこの脅威からあなたの集落を守り、川の秩序を回復する方法を案内します。\n\nパニックは一般的ですが、効率的ではありません。"
frFR = "Vous avez peut-être appris à l'école qu'il y a des irrégularités dans le cycle de l'eau. Ce ne sont pas des inconvénients temporaires.\n\n<color=red>Mauvaises marées</color> viendront. Quand elles arriveront, chaque cours d'eau sera hostile.\n\nL'eau doit être disciplinée avant qu'elle ne vous discipline.\n\n<color=green>Suivez cette lettre dès que vous le pouvez</color>. Nous vous guiderons pour sécuriser votre colonie contre ce fléau et restaurer l'ordre dans la rivière.\n\nLa panique est courante. Elle est également inefficace."
deDE = "Vielleicht hast du in der Schule gelernt, dass es Unregelmäßigkeiten im Wasserkreislauf gibt. Diese sind keine vorübergehenden Unannehmlichkeiten.\n\n<color=red>Bösartige Gezeiten</color> werden kommen. Wenn sie kommen, wird jedes fließende Gewässer feindlich.\n\nWasser muss diszipliniert werden, bevor es dich diszipliniert.\n\n<color=green>Nimm diesen Brief so schnell wie möglich zur Kenntnis</color>. Wir werden dich anleiten, wie du deine Siedlung gegen dieses Unheil absichern und die Ordnung im Fluss wiederherstellen kannst.\n\nPanik ist verbreitet. Sie ist auch ineffizient."
plPL = "Możesz się nauczyć w szkole, że w cyklu wodnym występują nieregularności. Nie są to tymczasowe niedogodności.\n\n<color=red>Złe przypływy</color> nadejdą. Gdy to nastąpi, każda płynąca woda stanie się wrogo nastawiona.\n\nWoda musi być dyscyplinowana, zanim to ona zdyscyplinuje ciebie.\n\n<color=green>Skontaktuj się z nami, gdy tylko będziesz w stanie</color>. Pomożemy ci zabezpieczyć twoją osadę przed tym zagrożeniem i przywrócić porządek rzece.\n\nPanika jest powszechna. Jest również nieefektywna."
ptBR = "Você deve ter aprendido na escola que existem irregularidades no ciclo da água. Essas não são inconveniências temporárias.\n\n<color=red>Marés ruins</color> virão. Quando isso acontecer, todos os corpos de água correntes se tornarão hostis.\n\nA água deve ser disciplinada antes que ela discipline você.\n\n<color=green>Siga esta carta assim que puder</color>. Nós o guiaremos para garantir sua colônia contra este flagelo e restaurar a ordem no rio.\n\nO pânico é comum. Também é ineficiente."
koKR = "당신은 학교에서 물 순환에 불규칙성이 있다는 것을 배웠을지도 모릅니다. 이것들은 일시적인 불편함이 아닙니다.\n\n<color=red>악성 조수</color>가 올 것입니다. 그럴 때마다 모든 흐르는 물체가 적대적으로 변할 것입니다.\n\n물은 당신을 통제하기 전에 먼저 통제되어야 합니다.\n\n<color=green>가능한 한 빨리 이 편지에 대해 후속 조치를 취하십시오</color>. 우리는 이 재앙으로부터 정착지를 방어하고 강의 질서를 회복하는 방법을 안내해드릴 것입니다.\n\n패닉은 흔한 일입니다. 또한 비효율적이기도 합니다."
csCZ = "Mohli jste se ve škole dozvědět, že v cyklu vody jsou nepravidelnosti. Tyto nejsou dočasné nepříjemnosti.\n\n<color=red>Špatné přílivy</color> přijdou. Když k tomu dojde, každá tekoucí vodní plocha se stane nepřátelskou.\n\nVodu je třeba zkrotit, než zkrotí vás.\n\n<color=green>Odpovězte na tento dopis, jakmile budete moci</color>. Povedeme vás k zajištění vaší osady proti této pohromě a k obnovení pořádku v řece.\n\nPanika je běžná. Je také neúčinná."
viVN = "Bạn có thể đã học ở trường rằng có những bất thường trong chu trình nước. Đây không phải là những bất tiện tạm thời.\n\n<color=red>Thủy triều xấu</color> sẽ đến. Khi chúng đến, mọi nguồn nước chảy sẽ trở nên thù địch.\n\nNước phải được quản lý trước khi nó quản lý bạn.\n\n<color=green>Hãy theo dõi lá thư này ngay khi bạn có thể</color>. Chúng tôi sẽ hướng dẫn bạn trong việc bảo vệ khu định cư của bạn trước cơn dịch này và khôi phục trật tự cho dòng sông.\n\nSự hoảng loạn là điều bình thường. Nó cũng kém hiệu quả."
trTR = "Okulda su döngüsünde düzensizlikler olduğunu öğrenmiş olabilirsiniz. Bunlar geçici rahatsızlıklar değildir.\n\n<color=red>Kötü Gelgitler</color> gelecek. Geldiklerinde, akan her su kaynağı düşman hale gelecek.\n\nSu, siz disiplin altına almadan önce disiplin altına alınmalıdır.\n\n<color=green>Bu mektubu mümkün olan en kısa sürede takip edin</color>. Bu belaya karşı yerleşiminizi güvence altına almanızda ve nehre düzeni geri getirmenizde size rehberlik edeceğiz.\n\nPanik yaygındır. Aynı zamanda verimsizdir."

["Tutorial.IrrigationBranch.BuildIrrigationLodge.Whitepaws"]
raw = "Your correspondence has been received.\n\nThe timing is appropriate. Conditions suggest an elevated probability of environmental instability. We recommend immediate preparatory action.\n\nBegin by constructing at least one Irrigation Tower.\n\nPlacement is strategic. Install it <color=green>on dry land you wish to cultivate</color>, <color=#00FFFF>near riverbanks vulnerable to contamination</color>, or both.\n\nBy default, the tower irrigates surrounding soil. This is useful. It is insufficient.\n\nWhen supplied with <color=green>Pollution Resistance Factor</color>, the tower’s field effect will repel soil contamination originating from badwater. This is preferable.\n\nConstruct a Distillery to manufacture Pollution Resistance Factor. It is stored in tanks, like any other liquid. It may also be used as a basic treatment against badwater poisoning.\n\nHydrological events cannot be prevented. Their consequences can."
status = "normal"
enUS = "Your correspondence has been received.\n\nThe timing is appropriate. Conditions suggest an elevated probability of environmental instability. We recommend immediate preparatory action.\n\nBegin by constructing at least one Irrigation Tower.\n\nPlacement is strategic. Install it <color=green>on dry land you wish to cultivate</color>, <color=#00FFFF>near riverbanks vulnerable to contamination</color>, or both.\n\nBy default, the tower irrigates surrounding soil. This is useful. It is insufficient.\n\nWhen supplied with <color=green>Pollution Resistance Factor</color>, the tower’s field effect will repel soil contamination originating from badwater. This is preferable.\n\nConstruct a Distillery to manufacture Pollution Resistance Factor. It is stored in tanks, like any other liquid. It may also be used as a basic treatment against badwater poisoning.\n\nHydrological events cannot be prevented. Their consequences can."
zhCN = "您的信件已收到。\n\n时机恰到好处。条件表明环境不稳定的概率增加。我们建议立即采取准备行动。\n\n首先，建造至少一个灌溉塔。\n\n放置位置具有战略意义。在您希望耕种的<color=green>干燥土地上</color>、<color=#00FFFF>靠近易受污染的河岸</color>，或两者皆可。\n\n默认情况下，塔可以灌溉周围的土壤。这是有用的，但还不足够。\n\n当配备<color=green>污染抵抗因子</color>时，塔的场效应将能够抵御来自污水的土壤污染。这是更优的选择。\n\n建造一个蒸馏厂以制造污染抵抗因子。它像其他液体一样储存在罐中。它也可以作为对抗污水毒性中的一种基本处理方法。\n\n水文事件无法避免，但它们的后果是可以控制的。"
zhTW = "您的來信已收到。\n\n時機恰到好處。情況顯示環境不穩定的機率上升。我們建議立即採取準備行動。\n\n首先建造至少一座灌溉塔。\n\n安放位置需謹慎選擇。將其安裝在<color=green>您希望耕作的乾燥土地上</color>、<color=#00FFFF>附近的河岸容易受到污染的地方</color>，或兩者皆可。\n\n根據默認設置，塔樓將灌溉周圍的土壤。這很有用，但還不夠。\n\n當供應<color=green>污染抵抗因子</color>時，塔的場域效果將抵禦來自壞水的土壤污染。這是更理想的選擇。\n\n建造一個蒸餾廠以製造污染抵抗因子。它存放在儲罐中，與其他液體一樣。它還可以用作對抗壞水中毒的基本處理方法。\n\n水文事件是無法預防的，但其後果是可以的。"
ruRU = "Ваше сообщение было получено.\n\nВремя подходит. Условия указывают на повышенную вероятность экологической нестабильности. Мы рекомендуем немедленно предпринять меры подготовки.\n\nНачните с постройки как минимум одной Ирригационной Башни.\n\nРазмещение стратегически важно. Установите её <color=green>на сухой земле, которую вы хотите возделывать</color>, <color=#00FFFF>возле берегов рек, подверженных загрязнению</color> или и там, и там.\n\nПо умолчанию башня орошает окружающую почву. Это полезно. Но этого недостаточно.\n\nКогда башня обеспечена <color=green>Фактором Сопротивления Загрязнению</color>, её поле воздействия будет отталкивать загрязнение почвы, возникающее от плохой воды. Это предпочтительный вариант.\n\nПостройте Дистиллирсию для производства Фактора Сопротивления Загрязнению. Он хранится в резервуарах, как и любая другая жидкость. Его также можно использовать как базовое средство против отравления плохой водой.\n\nГидрологические события предотвратить нельзя. Их последствия — можно."
jaJP = "あなたの通信は受信されました。\n\nタイミングは適切です。状況は環境の不安定性が高まる可能性を示唆しています。即座に準備行動を取ることをお勧めします。\n\nまず、少なくとも1つの灌漑塔を建設してください。\n\n配置は戦略的です。それを<color=green>育てたい乾燥した土地</color>、<color=#00FFFF>汚染に脆弱な河岸の近く</color>、またはその両方に設置してください。\n\nデフォルトでは、塔は周囲の土壌を灌漑します。これは役立ちますが、不十分です。\n\n<color=green>汚染抵抗因子</color>が供給されると、塔の場の効果は悪水から発生する土壌汚染をはじきます。これが望ましいです。\n\n汚染抵抗因子を製造するために蒸留所を建設してください。それは他の液体と同様にタンクに保存されます。悪水中毒に対する基本的な治療としても使用できます。\n\n水文的な事象は防ぐことができません。その結果は防ぐことができます。"
frFR = "Votre correspondance a été reçue.\n\nLe moment est approprié. Les conditions suggèrent une probabilité élevée d'instabilité environnementale. Nous recommandons une action préparatoire immédiate.\n\nCommencez par construire au moins une Tour d'Irrigation.\n\nLe placement est stratégique. Installez-la <color=green>sur des terres sèches que vous souhaitez cultiver</color>, <color=#00FFFF>près des rives vulnérables à la contamination</color>, ou les deux.\n\nPar défaut, la tour irrigue le sol environnant. Cela est utile. Ce n'est pas suffisant.\n\nLorsqu'elle est fournie avec le <color=green>Facteur de Résistance à la Pollution</color>, l'effet de champ de la tour repoussera la contamination du sol provenant des eaux polluées. C'est préférable.\n\nConstruisez une Distillerie pour fabriquer le Facteur de Résistance à la Pollution. Il est stocké dans des réservoirs, comme tout autre liquide. Il peut également être utilisé comme traitement de base contre l'empoisonnement par eaux polluées.\n\nLes événements hydrologiques ne peuvent être prévenus. Leurs conséquences peuvent l'être."
deDE = "Ihre Korrespondenz wurde empfangen.\n\nDer Zeitpunkt ist angemessen. Die Bedingungen deuten auf eine erhöhte Wahrscheinlichkeit von Umweltinstabilität hin. Wir empfehlen sofortige vorbereitende Maßnahmen.\n\nBeginnen Sie mit dem Bau von mindestens einem Bewässerungsturm.\n\nDie Platzierung ist strategisch. Installieren Sie ihn <color=green>auf trockenem Land, das Sie kultivieren möchten</color>, <color=#00FFFF>in der Nähe von Uferbereichen, die anfällig für Kontamination sind</color>, oder beidem.\n\nStandardmäßig bewässert der Turm den umliegenden Boden. Das ist nützlich. Es ist jedoch unzureichend.\n\nWenn er mit <color=green>Verschmutzungsresistenzfaktor</color> versorgt wird, wird die Wirkungsfläche des Turms Bodenkontaminationen aus schlecht Wasser abwehren. Das ist vorzuziehen.\n\nBauen Sie eine Destillerie, um den Verschmutzungsresistenzfaktor herzustellen. Er wird in Tanks gelagert, wie jede andere Flüssigkeit. Er kann auch als grundlegende Behandlung gegen Vergiftungen durch schlecht Wasser verwendet werden.\n\nHydrologische Ereignisse können nicht verhindert werden. Ihre Folgen hingegen schon."
plPL = "Twoja korespondencja została odebrana. \n\nCzas jest odpowiedni. Warunki wskazują na podwyższoną prawdopodobieństwo niestabilności środowiskowej. Zalecamy natychmiastowe działania przygotowawcze. \n\nZacznij od zbudowania przynajmniej jednej Wieży Nawadniającej. \n\nUmiejscowienie jest strategiczne. Zainstaluj ją <color=green>w suchej ziemi, którą chcesz uprawiać</color>, <color=#00FFFF>w pobliżu brzegów rzek, które są narażone na zanieczyszczenia</color>, lub w obu miejscach. \n\nZasadniczo wieża nawadnia otaczającą glebę. To jest przydatne. To jest niewystarczające. \n\nGdy zostanie dostarczony <color=green>Współczynnik Odporności na Zanieczyszczenia</color>, pole działania wieży odpycha zanieczyszczenia glebowe pochodzące z brudnej wody. To jest korzystniejsze. \n\nZbuduj Destylator, aby produkować Współczynnik Odporności na Zanieczyszczenia. Jest przechowywany w zbiornikach, jak każda inna ciecz. Może być także używany jako podstawowe leczenie przed zatruciem brudną wodą. \n\nWydarzenia hydrologiczne nie mogą być zapobiegane. Ich konsekwencje mogą być."
ptBR = "Sua correspondência foi recebida.\n\nO momento é apropriado. As condições sugerem uma probabilidade elevada de instabilidade ambiental. Recomendamos ação preparatória imediata.\n\nComece construindo pelo menos uma Torre de Irrigação.\n\nA colocação é estratégica. Instale-a <color=green>em terra seca que você deseja cultivar</color>, <color=#00FFFF>perto de margens de rios vulneráveis à contaminação</color>, ou ambos.\n\nPor padrão, a torre irriga o solo ao redor. Isso é útil. É insuficiente.\n\nQuando abastecida com <color=green>Fator de Resistência à Poluição</color>, o efeito de campo da torre repelirá a contaminação do solo originada de águas poluídas. Isso é preferível.\n\nConstrua uma Destilaria para fabricar o Fator de Resistência à Poluição. Ele é armazenado em tanques, como qualquer outro líquido. Também pode ser usado como um tratamento básico contra envenenamento por águas poluídas.\n\nEventos hidrológicos não podem ser prevenidos. Suas consequências podem ser."
koKR = "귀하의 서신이 접수되었습니다.\n\n시기가 적절합니다. 상황은 환경 불안정성의 높은 확률을 시사합니다. 즉각적인 준비 행동을 권장합니다.\n\n최소한 하나의 관개 탑을 건설하는 것으로 시작하십시오.\n\n배치는 전략적입니다. <color=green>경작하고 싶은 건조한 땅</color>에 설치하거나, <color=#00FFFF>오염에 취약한 강가 근처</color>에 설치하세요, 또는 두 곳 모두에 설치할 수 있습니다.\n\n기본적으로 탑은 주변 토양에 관개를 합니다. 이는 유용하지만 불충분합니다.\n\n<color=green>오염 저항 계수</color>가 공급되면, 탑의 필드 효과는 불량수에서 발생하는 토양 오염을 쫓아낼 것입니다. 이것이 바람직합니다.\n\n오염 저항 계수를 제조하기 위해 증류소를 건설하십시오. 이는 다른 액체처럼 탱크에 저장됩니다. 불량수 중독에 대한 기본 치료로도 사용될 수 있습니다.\n\n수문학적 사건은 예방할 수 없습니다. 그 결과는 예방할 수 있습니다."
csCZ = "Vaše korespondence byla přijata.\n\nČas je vhodný. Podmínky naznačují zvýšenou pravděpodobnost environmentální instability. Doporučujeme okamžité přípravné akce.\n\nZačněte výstavbou alespoň jedné Zavlažovací věže.\n\nUmístění je strategické. Nainstalujte ji <color=green>na suchou půdu, kterou chcete obdělávat</color>, <color=#00FFFF>v blízkosti břehů řek, které jsou náchylné k kontaminaci</color>, nebo na obou místech.\n\nVe výchozím nastavení věž zavlažuje okolní půdu. To je užitečné. To však nestačí.\n\nKdyž je dodána <color=green>Faktor odolnosti proti znečištění</color>, vliv věže odradí kontaminaci půdy pocházející z špatné vody. To je žádoucí.\n\nVybudujte Destilaci pro výrobu Faktoru odolnosti proti znečištění. Skladuje se v nádržích, jako každá jiná kapalina. Lze ji také použít jako základní ošetření proti otravě špatnou vodou.\n\nHydrologické události nelze zabránit. Jejich následky ano."
viVN = "Thư của bạn đã được nhận.\n\nThời điểm này là thích hợp. Các điều kiện cho thấy xác suất bất ổn môi trường tăng cao. Chúng tôi khuyên bạn nên hành động chuẩn bị ngay lập tức.\n\nHãy bắt đầu bằng cách xây dựng ít nhất một Tháp Tưới.\n\nVị trí là chiến lược. Lắp đặt nó <color=green>trên đất khô mà bạn muốn trồng trọt</color>, <color=#00FFFF>gần các bờ sông dễ bị ô nhiễm</color>, hoặc cả hai.\n\nTheo mặc định, tháp sẽ tưới nước cho đất xung quanh. Điều này rất hữu ích. Nhưng chưa đủ.\n\nKhi được cung cấp <color=green>Yếu Tố Chống Ô Nhiễm</color>, hiệu ứng trường của tháp sẽ đẩy lùi ô nhiễm đất từ nước bẩn. Điều này là tốt hơn.\n\nXây dựng một Nhà Máy Chưng Cất để sản xuất Yếu Tố Chống Ô Nhiễm. Nó được lưu trữ trong các bể, giống như bất kỳ chất lỏng nào khác. Nó cũng có thể được sử dụng như một phương pháp điều trị cơ bản chống lại ngộ độc nước bẩn.\n\nCác sự kiện thủy văn không thể bị ngăn chặn. Hậu quả của chúng thì có thể."
trTR = "Mektubunuz alınmıştır.\n\nZamanlama uygun. Koşullar, çevresel istikrarsızlık olasılığının yükseldiğini göstermektedir. Acil hazırlık eylemi öneriyoruz.\n\nEn az bir Sulama Kulesi inşa etmeye başlayın.\n\nYerleşim stratejiktir. Bunu <color=green>tarım yapmayı istediğiniz kuru araziye</color>, <color=#00FFFF>kirliliğe karşı savunmasız nehir kenarlarına</color> veya her ikisine de kurun.\n\nVarsayılan olarak, kule etrafındaki toprağı sulamaktadır. Bu faydalıdır. Yetersizdir.\n\n<color=green>Kirlilik Direnç Faktörü</color> ile sağlandığında, kule etkisi kötü su kaynaklı toprak kirlenmesini uzaklaştıracaktır. Bu tercih edilir.\n\nKirlilik Direnç Faktörü üretecek bir Damıtma Tesisine inşa edin. Diğer sıvılarda olduğu gibi tanklarda depolanır. Ayrıca kötü su zehirlenmesine karşı basit bir tedavi olarak da kullanılabilir.\n\nHidrolik olaylar engellenemez. Ancak sonuçları engellenebilir."

["Tutorial.IrrigationBranch.BuildValveHouse.Whitepaws"]
raw = "Your badwater readiness level is improving. Let us continue.\n\nProtecting your farmland is essential, but for us Whitepaws, who live in constant wetness, letting badwater flow freely through your village is unacceptable.\n\nA disciplined river must be given instructions. To that end, you must now begin construction of a proper dam.\n\nIn most circumstances, wisdom dictates beginning with a Valve Lodge at the base of your future dam. These structures allow you to regulate the passage of water.\n\nThe Valve Lodge requires <color=green>Gears</color>. Several should have been recovered from the cart. If they have been allocated elsewhere, additional gears may be produced in a <color=green>Mechanic’s Lodge</color>."
status = "normal"
enUS = "Your badwater readiness level is improving. Let us continue.\n\nProtecting your farmland is essential, but for us Whitepaws, who live in constant wetness, allowing badwater to flow freely through your village is unacceptable.\n\nA disciplined river must be given instructions. To that end, you must now begin construction of a proper dam.\n\nIn most circumstances, wisdom dictates starting with a Valve Lodge at the base of your future dam. These structures allow you to regulate the flow of water.\n\nThe Valve Lodge requires <color=green>Gears</color>. Several should have been recovered from the cart. If they have been allocated elsewhere, additional gears may be produced in a <color=green>Mechanic’s Lodge</color>."
zhCN = "“您的污水准备水平正在提高。让我们继续。\n\n保护您的农田至关重要，但对于我们生活在持续潮湿中的白爪来说，让污水在您的村庄中自由流动是不可接受的。\n\n有序的河流必须遵循指示。因此，您现在必须开始建造一个合适的水坝。\n\n在大多数情况下，智慧告诉我们应从未来水坝的底部开始建造阀门旅馆。这些结构可以让您调节水的流动。\n\n阀门旅馆需要<color=green>齿轮</color>。一些应该已经从手推车中回收。如果它们已分配到其他地方，可以在<color=green>机械工坊</color>中生产额外的齿轮。”"
zhTW = "你的壞水準備度正在提高。我們繼續吧。\n\n保護你的農田至關重要，但對於我們生活在持續潮濕中的白爪來說，讓壞水在你的村莊中自由流動是不可接受的。\n\n一條有紀律的河流必須接受指令。因此，你現在必須開始建設一座適當的水壩。\n\n在大多數情況下，明智的做法是從你未來水壩底部的閥門小屋開始。這些結構使你能夠調節水流。\n\n閥門小屋需要<color=green>齒輪</color>。應該有幾個從手推車中回收。如果它們已經被分配到其他地方，可以在<color=green>機械工坊</color>中生產更多齒輪。"
ruRU = "Ваш уровень готовности к плохой воде улучшается. Давайте продолжим.\n\nЗащита ваших сельскохозяйственных угодий имеет жизненно важное значение, но для нас, Белых Лап, которые живут в постоянной влажности, позволять плохой воде свободно течь через ваше село неприемлемо.\n\nДисциплинирована река должна получать указания. С этой целью вы теперь должны начать строительство настоящей плотины.\n\nВ большинстве случаев мудрость диктует начинать с Клапанной Хижины у подножия вашей будущей плотины. Эти сооружения позволяют регулировать проход воды.\n\nКлапанная Хижина требует <color=green>Шестерен</color>. Несколько из них должны были быть извлечены из тележки. Если они были распределены в другое место, дополнительные шестерни могут быть произведены в <color=green>Механической Хижине</color>."
jaJP = "「悪水の準備レベルが向上しています。このまま続けましょう。\n\n農地を守ることは重要ですが、常に湿気にさらされている私たちホワイトポーズにとって、悪水が村の中を自由に流れるのは受け入れられません。\n\n規律ある川には指示を与える必要があります。そのために、適切なダムの建設を始めなければなりません。\n\nほとんどの状況では、知恵に従って、将来のダムの基部にバルブロッジを設置することから始めるべきです。これらの構造物は水の流れを調整することを可能にします。\n\nバルブロッジには<color=green>ギア</color>が必要です。いくつかはカートから回収されているはずです。他の場所に割り当てられている場合は、<color=green>メカニックのロッジ</color>で追加のギアを製造できます。」"
frFR = "Votre niveau de préparation à l'eau nocive s'améliore. Continuons.\n\nProtéger vos terres agricoles est essentiel, mais pour nous, les Whitepaws, qui vivons dans l'humidité constante, laisser l'eau nocive couler librement à travers votre village est inacceptable.\n\nUne rivière disciplinée doit recevoir des instructions. À cette fin, vous devez maintenant commencer la construction d'un véritable barrage.\n\nDans la plupart des cas, la sagesse dicte de commencer par une Cabane à Vanne à la base de votre futur barrage. Ces structures vous permettent de réguler le passage de l'eau.\n\nLa Cabane à Vanne nécessite des <color=green>Engrenages</color>. Plusieurs de ceux-ci auraient dû être récupérés dans la charrette. S'ils ont été affectés ailleurs, des engrenages supplémentaires peuvent être produits dans une <color=green>Atelier de Mécanique</color>."
deDE = "Ihr Schadwasser-Bereitschaftsgrad verbessert sich. Lassen Sie uns fortfahren.\n\nDer Schutz Ihrer landwirtschaftlichen Flächen ist entscheidend, aber für uns Whitepaws, die in ständiger Nässe leben, ist es inakzeptabel, Schadwasser ungehindert durch Ihr Dorf fließen zu lassen.\n\nEin disziplinierter Fluss muss instruiert werden. Zu diesem Zweck müssen Sie nun mit dem Bau eines ordentlichen Damms beginnen.\n\nIn den meisten Fällen empfiehlt es sich, mit einer Ventil Lodge an der Basis Ihres zukünftigen Damms zu beginnen. Diese Strukturen ermöglichen es Ihnen, den Wasserfluss zu regulieren.\n\nDie Ventil Lodge benötigt <color=green>Zahnräder</color>. Mehrere sollten bereits aus dem Wagen geborgen worden sein. Falls sie anderswo zugeteilt wurden, können zusätzliche Zahnräder in einer <color=green>Mechanikerhütte</color> produziert werden."
plPL = "Twój poziom gotowości na wodę brudną się poprawia. Kontynuujmy.\n\nOchrona swojej ziemi uprawnej jest istotna, ale dla nas, Whitepaws, którzy żyjemy w stałej wilgoci, przepuszczanie wody brudnej swobodnie przez Waszą wioskę jest nieakceptowalne.\n\nDiscyplinowana rzeka musi otrzymać instrukcje. W tym celu musisz teraz rozpocząć budowę odpowiedniej tamy.\n\nW większości okoliczności mądrość nakazuje, aby rozpocząć od Budynku Zaworowego u podstawy Twojej przyszłej tamy. Te budowle pozwalają na regulację przepływu wody.\n\nBudynek Zaworowy wymaga <color=green>Trybów</color>. Kilka powinno zostać odzyskanych z wózka. Jeśli zostały przydzielone gdzie indziej, dodatkowe tryby mogą być wyprodukowane w <color=green>Warsztacie Mechanika</color>."
ptBR = "Seu nível de prontidão para águas ruins está melhorando. Vamos continuar.\n\nProteger suas terras agrícolas é essencial, mas para nós, Whitepaws, que vivemos em uma umidade constante, deixar as águas ruins fluírem livremente pela sua aldeia é inaceitável.\n\nUm rio disciplinado deve receber instruções. Para isso, você deve agora começar a construção de uma represa adequada.\n\nNa maioria das circunstâncias, a sabedoria indica começar com uma Casa de Válvula na base da sua futura represa. Essas estruturas permitem que você regule a passagem de água.\n\nA Casa de Válvula requer <color=green>Engrenagens</color>. Várias devem ter sido recuperadas do carrinho. Se foram alocadas em outro lugar, engrenagens adicionais podem ser produzidas em uma <color=green>Oficina do Mecânico</color>."
koKR = "당신의 오염수 준비 수준이 향상되고 있습니다. 계속 진행합시다.\n\n농지를 보호하는 것은 필수적입니다. 그러나 끊임없이 습한 삶을 살고 있는 화이트포우스에게는 오염수가 당신의 마을을 자유롭게 흐르는 것이 용납될 수 없습니다.\n\n규율 있는 강은 지시를 받아야 합니다. 이를 위해 이제 적절한 댐 건설을 시작해야 합니다.\n\n대부분의 상황에서 지혜는 미래의 댐 기초에 밸브 롯지를 시작하는 것을 권장합니다. 이 구조물은 물의 흐름을 조절할 수 있게 해줍니다.\n\n밸브 롯지에는 <color=green>기어</color>가 필요합니다. 여러 개는 수레에서 회수되었어야 합니다. 만약 다른 곳에 배정되었다면, 추가 기어는 <color=green>기계 공방</color>에서 생산할 수 있습니다."
csCZ = "„Úroveň vaší připravenosti na znečištěnou vodu se zlepšuje. Pokračujme.\n\nOchrana vaší zemědělské půdy je zásadní, ale pro nás Whitepaws, kteří žijí v neustálé vlhkosti, je nepřijatelné, aby znečištěná voda volně protékal vaší vesnicí.\n\nDisciplínovaná řeka musí dostat pokyny. K tomu nyní musíte začít s výstavbou správné přehrady.\n\nVe většině případů rozum velí začít s Ventilovou chatou v základu vaší budoucí přehrady. Tyto struktury vám umožňují regulovat průtok vody.\n\nVentilová chata vyžaduje <color=green>ozubená kola</color>. Několik jich mělo být zotaveno z vozu. Pokud byly přiděleny jinam, další ozubená kola mohou být vyrobena v <color=green>Mechanikově chatě</color>.“"
viVN = "Mức độ sẵn sàng đối phó với nước bẩn của bạn đang được cải thiện. Hãy tiếp tục.\n\nBảo vệ ruộng đất của bạn là rất quan trọng, nhưng đối với chúng tôi, những người Whitepaws, sống trong điều kiện ẩm ướt liên tục, việc để nước bẩn chảy tự do qua làng của bạn là không thể chấp nhận.\n\nMột dòng sông có kỷ luật cần phải được hướng dẫn. Để đạt được điều đó, bạn cần bắt đầu xây dựng một cái đập thích hợp.\n\nTrong hầu hết các trường hợp, sự khôn ngoan chỉ ra rằng nên bắt đầu với một Nhà Van ở chân đập tương lai của bạn. Những cấu trúc này cho phép bạn điều chỉnh lưu lượng nước.\n\nNhà Van yêu cầu <color=green>Rô-to</color>. Nhiều cái đã được thu hồi từ xe tải. Nếu chúng đã được phân bổ ở nơi khác, có thể sản xuất thêm rô-to tại <color=green>Nhà Cơ Khí</color>."
trTR = "Kötü su hazırlık seviyeniz iyileşiyor. Devam edelim.\n\nTarım arazinizi korumak çok önemlidir, ancak sürekli nem içinde yaşayan biz Whitepaws için kötü suyun köyünüzden serbestçe akmasına izin vermek kabul edilemez.\n\nDisiplinli bir nehire talimat verilmelidir. Bu amaçla, şimdi doğru bir baraj inşasına başlamalısınız.\n\nÇoğu durumda, bilgelik gelecekteki barajınızın tabanında bir Valf Lodge ile başlamayı önerir. Bu yapılar suyun geçişini düzenlemenizi sağlar.\n\nValf Lodge <color=green>Dişliler</color> gerektirir. Birkaçının arabadan kurtarılmış olması gerekir. Eğer başka yerlere tahsis edilmişse, ek dişliler <color=green>Makineci’nin Lodge</color>’unda üretilebilir."

["Tutorial.IrrigationBranch.ExpandBasics3.Whitepaws"]
raw = "With irrigation and contamination control established, we may now address proper dam construction.\n\nYou may have noticed that most watertight buildings in Whitepaw settlements possess flat, reinforced roofs. This is our urban planning doctrine: structures should remain stackable whenever possible.\n\nConstruct six Water Pumps. If possible, place them in a row <color=green>above your Valve Lodge</color>. Feel free to raze older water pumps if they have outlived their usefulness.\n\nThese buildings are <color=#00FFFF>watertight</color> and will therefore reinforce the dam, increasing its retention height by one additional level.\n\nBe advised:  <color=red>using buildings as dam elements without operating them—leaving them permanently paused, unconnected, or otherwise decorative—is considered asevere violation of Whitepaw construction law</color>. Do not do that unless you want to be visited by the Gesta-Paw.\n\nIf you do not yet have access to <color=green>Platforms</color> from the Architect’s Lodge, you may construct <color=green>Florists</color> beneath the pumps. Their terraces provide convenient walkways for maintenance, and their structures will further increase the dam’s retention height.\n\nYour dam will allow to store water despite droughts, but do not forget to leave an outflow for bad water to be evacuated, preferably away from your settlement.\n\nThe rest is up to you, good luck."
status = "normal"
enUS = "With irrigation and contamination control established, we may now address proper dam construction.\n\nYou may have noticed that most watertight buildings in Whitepaw settlements possess flat, reinforced roofs. This is our urban planning doctrine: structures should remain stackable whenever possible.\n\nConstruct six Water Pumps. If possible, place them in a row <color=green>above your Valve Lodge</color>. Feel free to raze older water pumps if they have outlived their usefulness.\n\nThese buildings are <color=#00FFFF>watertight</color> and will therefore reinforce the dam, increasing its retention height by one additional level.\n\nBe advised: <color=red>using buildings as dam elements without operating them—leaving them permanently paused, unconnected, or otherwise decorative—is considered a severe violation of Whitepaw construction law</color>. Do not do that unless you want to be visited by the Gesta-Paw.\n\nIf you do not yet have access to <color=green>Platforms</color> from the Architect’s Lodge, you may construct <color=green>Florists</color> beneath the pumps. Their terraces provide convenient walkways for maintenance, and their structures will further increase the dam’s retention height.\n\nYour dam will allow to store water despite droughts, but do not forget to leave an outflow for bad water to be evacuated, preferably away from your settlement.\n\nThe rest is up to you, good luck."
zhCN = "建立灌溉和污染控制后，我们现在可以开始正确的水坝建设。\n\n您可能注意到，白爪定居点中大多数防水建筑物都有平坦的加固屋顶。这是我们的城市规划原则：结构应尽可能保持可堆叠。\n\n建造六个水泵。如果可能的话，将它们排成一行 <color=green>在您的阀门小屋上方</color>。如果旧的水泵已经失去效用，可以随意拆除它们。\n\n这些建筑物是<color=#00FFFF>防水</color>的，因此将加强水坝，增加其蓄水高度一级。\n\n请注意：<color=red>将建筑物作为水坝元素而不进行操作——让它们处于永久暂停、未连接或仅作装饰状态——被视为严重违反白爪建筑法</color>。除非您想要被Gesta-Paw拜访，否则不要这样做。\n\n如果您尚未获得建筑师小屋的<color=green>平台</color>，您可以在水泵下建造<color=green>花匠</color>。它们的露台提供了便于维护的通道，其结构将进一步增加水坝的蓄水高度。\n\n您的水坝可以在干旱期间储存水，但不要忘记留出排水口以排出污水，最好远离您的定居点。\n\n接下来就看您自己了，祝好运。"
zhTW = "建立灌溉和污染控制後，我們現在可以開始正確的水壩建設。\n\n您可能已注意到，大多數白爪定居點內的防水建築都擁有平坦且加固的屋頂。這是我們的城市規劃理念：結構應該盡可能保持可堆疊。\n\n建造六座水泵。如果有可能，將它們排成一排在您的<color=green>閥門小屋</color>上方。如果舊的水泵已經沒有用處，可以隨意拆除。\n\n這些建築是<color=#00FFFF>防水</color>的，因此將增強水壩，將其保留高度提高一層。\n\n請注意：<color=red>將建築作為水壩元素而不操作它們—使它們永久暫停、不連接或其他裝飾性—被視為對白爪建設法的嚴重違反</color>。除非您想被Gesta-Paw造訪，否則請不要這樣做。\n\n如果您尚未獲得來自建築師小屋的<color=green>平台</color>，您可以在水泵下建造<color=green>花商</color>。它們的露台提供方便的維護通道，其結構將進一步提高水壩的保留高度。\n\n您的水壩將能儲存水源，即使在乾旱期間，但不要忘記留出不良水流的出流，最好遠離您的定居點。\n\n接下來的事情就靠您自己了，祝你好運。"
ruRU = "С установкой ирригации и контроля загрязнения мы можем перейти к правильному строительству дамб.\n\nВы, возможно, заметили, что большинство водонепроницаемых зданий в поселениях Whitepaw имеют плоские, усиленные крыши. Это наша доктрина городского планирования: здания должны оставаться штабелируемыми, когда это возможно.\n\nПостройте шесть водяных насосов. Если возможно, разместите их в ряд <color=green>над вашим Вентильным домом</color>. Не стесняйтесь сносить старые насосы, если они исчерпали свою полезность.\n\nЭти здания являются <color=#00FFFF>водонепроницаемыми</color> и, следовательно, будут укреплять дамбу, увеличивая ее высоту удержания на один дополнительный уровень.\n\nИмейте в виду: <color=red>использование зданий в качестве элементов дамбы без их эксплуатации — оставление их постоянно приостановленными, не подключенными или иначе декоративными — считается серьезным нарушением строительного закона Whitepaw</color>. Не делайте этого, если не хотите, чтобы к вам пришла Gesta-Paw.\n\nЕсли у вас еще нет доступа к <color=green>Платформам</color> из Архитекторского дома, вы можете построить <color=green>Флористов</color> под насосами. Их террасы обеспечивают удобные подходы для обслуживания, и их конструкции дополнительно увеличат высоту удержания дамбы.\n\nВаша дамба позволит хранить воду, несмотря на засухи, но не забудьте оставить отвод для плохой воды, желательно подальше от вашего поселения.\n\nОстальное зависит от вас, удачи."
jaJP = "灌漑と汚染管理が確立されたので、適切なダムの建設に取り組むことができます。\n\nホワイトパウの集落のほとんどの防水建物が平らで強化された屋根を持っていることに気づいたかもしれません。これが私たちの都市計画の原則です：構造物は可能な限り積み重ね可能であるべきです。\n\n6つの水ポンプを建設してください。可能であれば、<color=green>あなたのバルブロッジの上</color>に並べて配置してください。もし古い水ポンプがもはや役に立たない場合は、自由に取り壊してください。\n\nこれらの建物は<color=#00FFFF>防水</color>であるため、ダムを補強し、その保持高をさらに1段階増加させます。\n\n注意してください：<color=red>建物をダム要素として運用せずに使用すること—永遠に一時停止状態にしたり、接続しなかったり、その他の装飾的な用途に使用すること—はホワイトパウの建設法に対する重大な違反と見なされます</color>。Gesta-Pawに訪問されたくない限り、そうしないでください。\n\nまだ建築家のロッジから<color=green>プラットフォーム</color>にアクセスできない場合は、ポンプの下に<color=green>フローリスト</color>を建設することができます。彼らのテラスはメンテナンスのための便利な歩道を提供し、彼らの構造はダムの保持高をさらに増加させます。\n\nあなたのダムは干ばつにもかかわらず水を貯めることができますが、悪化する水を排出するための流出を確保することを忘れないでください。できれば、あなたの集落から遠ざけて。\n\nあとはあなた次第です。幸運を祈ります。"
frFR = "Avec l'irrigation et le contrôle de la contamination établis, nous pouvons désormais nous attaquer à la construction appropriée des barrages.\n\nVous avez peut-être remarqué que la plupart des bâtiments étanches dans les colonies de Whitepaw possèdent des toits plats et renforcés. C'est notre doctrine d'aménagement urbain : les structures doivent rester empilables autant que possible.\n\nConstruisez six Pompes à Eau. Si possible, placez-les en ligne <color=green>au-dessus de votre Valvulaire</color>. N'hésitez pas à raser d'anciennes pompes à eau si elles ont dépassé leur utilité.\n\nCes bâtiments sont <color=#00FFFF>étanches</color> et renforceront donc le barrage, augmentant sa hauteur de rétention d'un niveau supplémentaire.\n\nSoyez averti : <color=red>utiliser des bâtiments comme éléments de barrage sans les faire fonctionner—les laissant en pause permanente, non connectés, ou d'une autre manière décoratifs—est considéré comme une grave violation des lois de construction de Whitepaw</color>. Ne faites pas cela à moins de vouloir être visité par le Gesta-Paw.\n\nSi vous n'avez pas encore accès aux <color=green>Plateformes</color> du Pavillon de l'Architecte, vous pouvez construire des <color=green>Floristes</color> sous les pompes. Leurs terrasses fournissent des chemins pratiques pour l'entretien, et leurs structures augmenteront davantage la hauteur de rétention du barrage.\n\nVotre barrage permettra de stocker de l'eau malgré les sécheresses, mais n'oubliez pas de laisser un écoulement pour que les eaux usées soient évacuées, de préférence loin de votre colonie.\n\nLe reste dépend de vous, bonne chance."
deDE = "Mit der Errichtung der Bewässerung und der Kontaminationskontrolle können wir uns nun dem richtigen Dammaufbau widmen.\n\nVielleicht ist Ihnen aufgefallen, dass die meisten wasserdichten Gebäude in den Siedlungen von Whitepaw flache, verstärkte Dächer haben. Das ist unser städtebauliches Konzept: Strukturen sollten, wann immer möglich, stapelbar bleiben.\n\nBauen Sie sechs Wasserpumpen. Wenn möglich, platzieren Sie sie in einer Reihe <color=green>über Ihrer Ventil-Hütte</color>. Fühlen Sie sich frei, ältere Wasserpumpen abzureißen, wenn sie nicht mehr nützlich sind.\n\nDiese Gebäude sind <color=#00FFFF>wasserdicht</color> und werden daher den Damm verstärken und seine Rückhaltehöhe um eine zusätzliche Stufe erhöhen.\n\nBitte beachten Sie: <color=red>Die Verwendung von Gebäuden als Damm-Elemente, ohne sie zu betreiben – sie dauerhaft pausiert, nicht angeschlossen oder anderweitig dekorativ zu lassen – gilt als schwere Verletzung des Whitepaw-Baugesetzes</color>. Tun Sie das nicht, es sei denn, Sie möchten von der Gesta-Paw besucht werden.\n\nFalls Sie noch keinen Zugang zu <color=green>Plattformen</color> aus der Architekten-Hütte haben, können Sie <color=green>Floristen</color> unter den Pumpen bauen. Ihre Terrassen bieten praktische Gehwege für Wartungsarbeiten, und ihre Strukturen werden die Rückhaltehöhe des Damms weiter erhöhen.\n\nIhr Damm wird es ermöglichen, Wasser trotz Dürren zu speichern, aber vergessen Sie nicht, einen Ablauf für schmutziges Wasser zu lassen, vorzugsweise weg von Ihrer Siedlung.\n\nDer Rest liegt bei Ihnen, viel Glück."
plPL = "Z systemem nawadniania i kontrolą zanieczyszczeń na swoim miejscu, możemy teraz zająć się właściwą budową tam.\n\nMożesz zauważyć, że większość wodoszczelnych budynków w osadach Whitepaw posiada płaskie, wzmocnione dachy. To nasza doktryna urbanistyczna: struktury powinny pozostać wielowarstwowe, gdy tylko jest to możliwe.\n\nZbuduj sześć pomp wodnych. Jeśli to możliwe, umieść je w rzędzie <color=green>powyżej swojej Łodzi Zaworowej</color>. Śmiało możesz zburzyć starsze pompy wodne, jeśli straciły już swoją przydatność.\n\nTe budynki są <color=#00FFFF>wodoszczelne</color> i w związku z tym wzmocnią tamę, zwiększając jej wysokość retencji o dodatkowy poziom.\n\nUwaga: <color=red>używanie budynków jako elementów tamy bez ich uruchamiania — pozostawianie ich na stałe wstrzymanymi, niepołączonymi, lub w innym dekoracyjnym stanie — uważane jest za poważne naruszenie prawa budowlanego Whitepaw</color>. Nie rób tego, jeśli nie chcesz być odwiedzony przez Gesta-Paw.\n\nJeśli jeszcze nie masz dostępu do <color=green>Platform</color> z Łodzi Architekta, możesz zbudować <color=green>Kwiaciarzy</color> pod pompami. Ich tarasy zapewniają wygodne przejścia do konserwacji, a ich struktury dodatkowo zwiększą wysokość retencji tamy.\n\nTwoja tama pozwoli na magazynowanie wody mimo suszy, ale nie zapomnij zostawić odpływu, aby zła woda mogła być usunięta, najlepiej z dala od twojej osady.\n\nReszta należy do ciebie, powodzenia."
ptBR = "Com o controle de irrigação e contaminação estabelecido, agora podemos abordar a construção adequada de barragens.\n\nVocê pode ter notado que a maioria dos edifícios à prova d'água nos assentamentos Whitepaw possui telhados planos e reforçados. Essa é a nossa doutrina de planejamento urbano: as estruturas devem permanecer empilháveis sempre que possível.\n\nConstrua seis Bombas de Água. Se possível, coloque-as em uma fileira <color=green>acima do seu Pavilion de Válvulas</color>. Sinta-se à vontade para demolir bombas de água mais antigas se elas tiverem ultrapassado sua utilidade.\n\nEsses edifícios são <color=#00FFFF>à prova d'água</color> e, portanto, irão reforçar a barragem, aumentando sua altura de retenção em um nível adicional.\n\nEsteja avisado: <color=red>usar edifícios como elementos da barragem sem operá-los—deixando-os permanentemente pausados, desconectados ou de outra forma decorativos—é considerado uma séria violação da lei de construção Whitepaw</color>. Não faça isso a menos que queira ser visitado pelo Gesta-Paw.\n\nSe você ainda não tiver acesso a <color=green>Plataformas</color> do Pavilhão do Arquiteto, poderá construir <color=green>Floriculturas</color> abaixo das bombas. Seus terraços fornecem passarelas convenientes para manutenção, e suas estruturas aumentarão ainda mais a altura de retenção da barragem.\n\nSua barragem permitirá armazenar água apesar das secas, mas não se esqueça de deixar um escoamento para a água ruim ser evacuada, de preferência longe do seu assentamento.\n\nO restante depende de você, boa sorte."
koKR = "관개 및 오염 통제가 확립된 후, 이제 적절한 댐 건설에 대해 다룰 수 있습니다.\n\n화이트파우 정착지의 대부분의 방수 건물은 평평하고 보강된 지붕을 가지고 있다는 것을 눈치챘을 것입니다. 이것이 우리의 도시 계획 원칙입니다: 구조물은 가능할 때마다 쌓을 수 있어야 합니다.\n\n여섯 개의 물 펌프를 건설하세요. 가능하다면 <color=green>귀하의 밸브 로지 위</color>에 일렬로 배치하세요. 더 이상 사용되지 않는 오래된 물 펌프는 철거해도 좋습니다.\n\n이 건물들은 <color=#00FFFF>방수</color>이며, 따라서 댐을 강화하고 추가 레벨만큼 보유 높이를 증가시킵니다.\n\n유의하세요: <color=red>건물을 운영하지 않고 댐 요소로 사용하는 것은—영구 정지시키거나 연결되지 않도록 두거나 장식용으로 남겨두는 것은 화이트파우 건축법을 심각하게 위반하는 것으로 간주됩니다</color>. 그렇게 하지 마세요, 그렇지 않으면 제스타-파우가 방문할 수 있습니다.\n\n아직 <color=green>건축가 로지</color>에서 <color=green>플랫폼</color>에 접근할 수 없다면, 펌프 아래에 <color=green>플로리스트</color>를 건설할 수 있습니다. 그들의 테라스는 유지 보수를 위한 편리한 보행로를 제공하며, 그들의 구조는 댐의 보유 높이를 더욱 증가시킬 것입니다.\n\n귀하의 댐은 가뭄에도 불구하고 물을 저장할 수 있게 해줍니다. 그러나 나쁜 물이 배수될 수 있도록 출구를 남겨 두는 것을 잊지 마세요, 가능하면 귀하의 정착지에서 멀리 하도록 하세요.\n\n나머지는 당신에게 달려 있습니다, 행운을 빕니다."
csCZ = "S založením zavlažování a kontroly kontaminace se nyní můžeme věnovat správné výstavbě hrází.\n\nMožná jste si všimli, že většina vodotěsných budov ve sídlech Whitepaw má ploché, vyztužené střechy. To je naše městské plánovací doktrína: struktury by měly zůstat stohovatelné, kdykoli je to možné.\n\nVybudujte šest čerpadel vody. Pokud je to možné, umístěte je do řady <color=green>nad Váš ventilový dom</color>. Nebojte se zbourat starší čerpadla, pokud již splnila svůj účel.\n\nTyto budovy jsou <color=#00FFFF>vodotěsné</color> a tudíž posílí hráz, čímž zvýší její retenční výšku o jedno další patro.\n\nBuďte upozorněni: <color=red>použití budov jako prvků hráze bez jejich provozování—nechat je trvale pozastavené, nepropojené nebo jinak dekorativní—se považuje za závažné porušení stavebního práva Whitepaw</color>. Nedělejte to, pokud si nepřejete být navštíveni Gesta-Paw.\n\nPokud ještě nemáte přístup k <color=green>platformám</color> z Architektovy chaty, můžete postavit <color=green>kvetináře</color> pod čerpadla. Jejich terasy poskytují pohodlné chodníčky pro údržbu a jejich struktury dále zvýší retenční výšku hráze.\n\nVaše hráz umožní ukládat vodu i přes sucha, ale nezapomeňte nechat odtok pro špatnou vodu, aby mohla být evakuována, ideálně daleko od vašeho sídla.\n\nZbytek je na vás, hodně štěstí."
viVN = "Với hệ thống tưới tiêu và kiểm soát ô nhiễm đã được thiết lập, chúng ta có thể bắt đầu xây dựng đập một cách chính xác.\n\nCó thể bạn đã nhận thấy rằng hầu hết các công trình chịu nước trong các khu định cư của Whitepaw đều có mái phẳng, được gia cố. Đây là nguyên tắc quy hoạch đô thị của chúng tôi: các công trình nên có thể xếp chồng lên nhau bất cứ khi nào có thể.\n\nXây dựng sáu máy bơm nước. Nếu có thể, hãy đặt chúng thành một hàng <color=green>trên Đập Van của bạn</color>. Hãy thoải mái phá hủy những máy bơm nước cũ nếu chúng đã hết thời gian sử dụng.\n\nCác công trình này là <color=#00FFFF>chịu nước</color> và do đó sẽ củng cố đập, tăng độ cao giữ nước thêm một cấp.\n\nXin lưu ý: <color=red>sử dụng các công trình làm thành phần của đập mà không vận hành chúng—để chúng ở trạng thái tạm dừng vĩnh viễn, không kết nối, hoặc chỉ mang tính chất trang trí—được coi là một vi phạm nghiêm trọng luật xây dựng của Whitepaw</color>. Đừng làm vậy trừ khi bạn muốn gặp Gesta-Paw.\n\nNếu bạn chưa có quyền truy cập vào <color=green>Các Bệ</color> từ Đập Kiến Trúc, bạn có thể xây dựng <color=green>Các Tiệm Hoa</color> bên dưới các máy bơm. Các tầng của chúng cung cấp lối đi thuận tiện cho việc bảo trì, và cấu trúc của chúng sẽ tăng cao độ giữ nước của đập.\n\nĐập của bạn sẽ cho phép lưu trữ nước mặc dù trong thời gian hạn hán, nhưng đừng quên để lại một cửa xả cho nước xấu được thoát ra, tốt nhất là tránh xa khu định cư của bạn.\n\nPhần còn lại phụ thuộc vào bạn, chúc bạn may mắn."
trTR = "Sulama ve kontaminasyon kontrolü kurulduğuna göre, artık doğru baraj inşa etmeye geçebiliriz.\n\nBeyazpaw yerleşimlerinde çoğu su geçirmez binanın düz, güçlendirilmiş çatıları olduğunu fark etmiş olabilirsiniz. Bu, kentsel planlama doktrinimizdir: yapılar mümkünse üst üste yerleştirilebilir olmalıdır.\n\nAltı Su Pompası inşa edin. Mümkünse, bunları <color=green>Vana Kulenizin</color> üstünde bir sıra halinde yerleştirin. Kullanım ömrünü tamamlamış eski su pompalarını yıkmaktan çekinmeyin.\n\nBu binalar <color=#00FFFF>su geçirmezdir</color> ve bu nedenle barajı güçlendirecek, retenşin yüksekliğini bir ekstra seviyeye çıkaracaktır.\n\nDikkatli olun: <color=red>binaları çalıştırmadan baraj elemanları olarak kullanmak—onları kalıcı olarak durdurmak, bağlı olmayan veya başka bir şekilde dekoratif bırakmak, Beyazpaw inşaat yasalarını ciddi bir şekilde ihlal olarak kabul edilir</color>. Bunu yapmayın, aksi takdirde Gesta-Paw tarafından ziyaret edilmek istemiyorsanız.\n\nEğer henüz Mimar Kulübü'nden <color=green>Platformlara</color> erişiminiz yoksa, pompaların altına <color=green>Çiçekçiler</color> inşa edebilirsiniz. Terasları bakım için uygun yürüyüş yolları sağlar ve yapıların retenşin yüksekliğini daha da artıracaktır.\n\nBarajınız, kuraklıklara rağmen su depolamanıza olanak tanıyacaktır, ancak kötü suyun boşaltılması için bir çıkış bıraktığınızdan emin olun, tercihen yerleşiminizden uzak bir yere.\n\nGeri kalan size kalmış, bol şans."

["Tutorial.ChemistryBranch.ChemistryText.Whitepaws"]
raw = "Progress produces byproducts. Some are useful. Some are volatile.\n\nThe responsible settlement studies both.\n\nThis branch concerns chemical refinement, <color=green>healthcare</color>, and the controlled application of <color=red>explosive</color> solutions where geography requires punishment.\n\nWhen you are prepared to handle substances that sting your snout, follow up on this directive.\n\nDestroying obstacles is a form of construction."
status = "normal"
enUS = "Progress produces byproducts. Some are useful. Some are volatile.\n\nThe responsible settlement studies both.\n\nThis branch concerns chemical refinement, <color=green>healthcare</color>, and the controlled application of <color=red>explosive</color> solutions where geography requires punishment.\n\nWhen you are prepared to handle substances that sting your snout, follow up on this directive.\n\nDestroying obstacles is a form of construction."
zhCN = "“进展会产生副产品。有些是有用的，有些是挥发性的。\n\n负责的定居点两者都在研究。\n\n这一分支涉及化学精炼、<color=green>医疗保健</color>和在地理需求惩罚的情况下对<color=red>爆炸</color>溶液的控制应用。\n\n当你准备好处理刺鼻的物质时，请遵循这一指示。\n\n消除障碍是一种建设的形式。”"
zhTW = "進展會產生副產品。有些是有用的，有些則是揮發性的。\n\n負責任的定居點會同時研究這兩者。\n\n這一分支涉及化學精煉、<color=green>醫療護理</color>，以及在地理環境需要懲罰時對<color=red>爆炸性</color>溶液的控制應用。\n\n當你準備好處理讓你鼻子刺痛的物質時，請遵循這項指令。\n\n摧毀障礙是一種建設形式。"
ruRU = "Прогресс приводит к побочным продуктам. Некоторые из них полезны. Некоторые - летучи.\n\nОтветственное поселение изучает и то, и другое.\n\nЭтот раздел касается химической переработки, <color=green>здравоохранения</color> и контролируемого применения <color=red>взрывчатых</color> решений, где география требует наказания.\n\nКогда вы будете готовы работать с веществами, которые жгут нос, следуйте этому указанию.\n\nУничтожение препятствий - это форма строительства."
jaJP = "「進捗は副産物を生み出します。中には有用なものもあれば、不安定なものもあります。\n\n責任ある集落は両方を研究します。\n\nこの分野は化学精製、<color=green>ヘルスケア</color>、および地理的な理由で制裁が必要な場所における<color=red>爆発物</color>の管理された適用に関係しています。\n\n鼻を刺激する物質を扱う準備ができたら、この指示に従ってください。\n\n障害物を破壊することは、建設の一形態です。」"
frFR = "Le progrès produit des sous-produits. Certains sont utiles. D'autres sont volatils.\n\nLe règlement responsable étudie les deux.\n\nCette branche concerne le raffinage chimique, <color=green>les soins de santé</color>, et l'application contrôlée de solutions <color=red>explosives</color> lorsque la géographie exige une punition.\n\nLorsque vous êtes prêt à manipuler des substances qui piquent votre museau, suivez cette directive.\n\nDétruire des obstacles est une forme de construction."
deDE = "„Fortschritt produziert Nebenprodukte. Einige sind nützlich. Einige sind instabil.\n\nDie verantwortliche Siedlung untersucht beide.\n\nDieser Zweig betrifft chemische Verfeinerung, <color=green>Gesundheitsversorgung</color> und die kontrollierte Anwendung von <color=red>explosiven</color> Lösungen, wo die Geografie eine Bestrafung erfordert.\n\nWenn Sie bereit sind, mit Stoffen umzugehen, die Ihnen in die Schnauze stechen, folgen Sie dieser Anweisung.\n\nDas Zerstören von Hindernissen ist eine Form der Konstruktion.“"
plPL = "Postęp produkuje produkty uboczne. Niektóre są użyteczne. Niektóre są lotne.\n\nOdpowiedzialna osada bada obie kwestie.\n\nTa gałąź dotyczy rafinacji chemicznej, <color=green>opiece zdrowotnej</color> oraz kontrolowanego stosowania <color=red>wybuchowych</color> rozwiązań tam, gdzie geografia wymaga kary.\n\nKiedy będziesz gotowy na radzenie sobie z substancjami, które parzą w pysk, postępuj zgodnie z tym poleceniem.\n\nNiszczenie przeszkód jest formą budowy."
ptBR = "Progresso produz subprodutos. Alguns são úteis. Outros são voláteis.\n\nO assentamento responsável estuda ambos.\n\nEste ramo diz respeito ao refinamento químico, <color=green>cuidados de saúde</color>, e à aplicação controlada de soluções <color=red>explosivas</color> onde a geografia exige punição.\n\nQuando você estiver preparado para lidar com substâncias que picam seu focinho, siga esta diretiva.\n\nDestruir obstáculos é uma forma de construção."
koKR = "진행은 부산물을 생성합니다. 일부는 유용하고, 일부는 휘발성이 있습니다.\n\n책임 있는 정착지는 둘 다 연구합니다.\n\n이 분야는 화학 정제, <color=green>의료</color>, 그리고 지형이 처벌을 요구하는 곳에서 <color=red>폭발성</color> 용액의 통제된 적용을 다룹니다.\n\n코에 자극을 주는 물질을 다룰 준비가 되었을 때, 이 지침을 따르세요.\n\n장애물을 파괴하는 것은 건설의 한 형태입니다."
csCZ = "Pokrok produkuje vedlejší produkty. Některé jsou užitečné. Některé jsou nestabilní.\n\nOdpovědné osídlení zkoumá oboje.\n\nTato oblast se zabývá chemickým zpracováním, <color=green>zdravotní péčí</color> a kontrolovaným použitím <color=red>výbušných</color> roztoků tam, kde geografie vyžaduje potrestání.\n\nAž budete připraveni manipulovat se substancemi, které vás štípou do čenichu, postupujte podle tohoto pokynu.\n\nNičení překážek je formou stavby."
viVN = "Tiến trình sản xuất ra các sản phẩm phụ. Một số hữu ích. Một số thì không ổn định.\n\nKhu định cư có trách nhiệm nghiên cứu cả hai.\n\nNhánh này liên quan đến tinh chế hóa chất, <color=green>chăm sóc sức khỏe</color>, và việc áp dụng có kiểm soát các giải pháp <color=red>vụ nổ</color> nơi địa lý yêu cầu hình phạt.\n\nKhi bạn đã sẵn sàng xử lý các chất có thể làm đau mũi của bạn, hãy tiếp tục theo chỉ thị này.\n\nPhá hủy chướng ngại vật là một hình thức xây dựng."
trTR = "İlerleme yan ürünler üretir. Bazıları faydalıdır. Bazıları ise volatildir.\n\nSorumlu yerleşim her ikisini de inceliyor.\n\nBu dal, kimyasal rafinasyon, <color=green>sağlık hizmetleri</color> ve coğrafyanın ceza gerektirdiği yerlerde <color=red>patlayıcı</color> çözümlerin kontrollü uygulanmasıyla ilgilidir.\n\nBurnunuza batacak maddeleri işlemek için hazır olduğunuzda, bu yönergeyi takip edin.\n\nEngelleri yok etmek bir inşaat biçimidir."

["Tutorial.ChemistryBranch.BuildAlchemist.Whitepaws"]
raw = "Ah! Excellent. Someone finally contacted us.\n\nA functioning settlement that managed to assemble a library is bound to see its workforce suffer the usual assortment of burns, infections, and poorly judged actions that goes with everyday life. Perfectly normal.\n\nTo address these matters, you will need an Alchemist.\n\nThe Alchemist requires <color=green>Laboratory Glassware</color>. One set should have been recovered from the cart. Hopefully it has not been misplaced, broken, or otherwise involved in an experiment of questionable supervision.\n\nYou have only one set, and it is vital. This means you will be limited to a single Alchemist for now.\n\nOnce operational, the Alchemist can prepare <color=green>Basic Balm</color>, a reliable compound for treating minor injuries, burns, and other predictable consequences of industrial progress.\n\nDo try to keep the workers alive. They are useful for further experiments."
status = "normal"
enUS = "Ah! Excellent. Someone finally contacted us.\n\nA functioning settlement that managed to assemble a library is bound to see its workforce suffer the usual assortment of burns, infections, and poorly judged actions that goes with everyday life. Perfectly normal.\n\nTo address these matters, you will need an Alchemist.\n\nThe Alchemist requires <color=green>Laboratory Glassware</color>. One set should have been recovered from the cart. Hopefully it has not been misplaced, broken, or otherwise involved in an experiment of questionable supervision.\n\nYou have only one set, and it is vital. This means you will be limited to a single Alchemist for now.\n\nOnce operational, the Alchemist can prepare <color=green>Basic Balm</color>, a reliable compound for treating minor injuries, burns, and other predictable consequences of industrial progress.\n\nDo try to keep the workers alive. They are useful for further experiments."
zhCN = "“啊！太好了。终于有人联系到我们了。\n\n一个能够组建图书馆的运作良好的定居点，必然会经历工人们遭遇烧伤、感染以及日常生活中那些不明智行为的常见问题。这是完全正常的。\n\n为了处理这些问题，你需要一位炼金术士。\n\n炼金术士需要<color=green>实验室玻璃器具</color>。一套应该已经从车上找回。希望它没有被错放、损坏或涉及任何监管不力的实验。\n\n你只有一套，而它至关重要。这意味着你目前只能限于一位炼金术士。\n\n一旦投入运营，炼金术士可以制作<color=green>基础药膏</color>，这是一种可靠的复合物，用于治疗轻微伤害、烧伤以及工业进步带来的其他可预测后果。\n\n请尽量保持工人的生命安全。他们对进一步的实验非常有用。”"
zhTW = "「啊！太好了。終於有人聯繫我們了。\n\n一個能夠組建圖書館的運作中的定居點，必然會看到其工作團隊遭受日常生活中常見的燒傷、感染，以及判斷失誤所帶來的各種困擾。這是完全正常的。\n\n為了解決這些問題，你需要一位煉金術士。\n\n煉金術士需要<color=green>實驗室玻璃器具</color>。一套應該是從貨車上回收的。希望它沒有被放錯地方、損壞，或以其他方式參與了一次可疑監督的實驗。\n\n你只有一套，而這是至關重要的。這意味著目前你只能擁有一位煉金術士。\n\n一旦運作起來，煉金術士可以製備<color=green>基礎膏藥</color>，這是一種可靠的化合物，用於治療小傷、燒傷以及其他可預見的工業進步後果。\n\n請務必保持工人的生命安全。他們對進一步的實驗非常有用。」"
ruRU = "«Ах! Отлично. Кто-то наконец связался с нами.\n\nРаботающий поселок, который сумел собрать библиотеку, неизбежно столкнется с обычным набором ожогов, инфекций и плохо продуманных действий, которые сопровождают повседневную жизнь. Совершенно нормально.\n\nЧтобы решить эти вопросы, вам нужен Алхимик.\n\nАлхимик нуждается в <color=green>Лабораторной посуде</color>. Один комплект должен был быть найден в телеге. Надеюсь, его не потеряли, не сломали или не использовали в эксперименте с сомнительным наблюдением.\n\nУ вас есть только один комплект, и он жизненно важен. Это означает, что пока вы будете ограничены одним Алхимиком.\n\nКогда Алхимик начнет работать, он сможет приготовить <color=green>Простой бальзам</color>, надежное средство для лечения мелких травм, ожогов и других предсказуемых последствий индустриального прогресса.\n\nПостарайтесь сохранить рабочих в живых. Они полезны для дальнейших экспериментов.»"
jaJP = "「ああ！素晴らしい。ついに誰かが私たちに連絡を取ってきました。\n\n図書館を組織することに成功した機能的な定住地は、日常生活に伴う通常の火傷、感染、そして判断を誤った行動によって労働力が苦しむことが避けられません。完全に普通です。\n\nこれらの問題に対処するためには、アルケミストが必要です。\n\nアルケミストには<color=green>実験室用ガラス器具</color>が必要です。一式はカートから回収されるはずでした。壊れていたり、誤って置き忘れたり、あるいは監督が不十分な実験に関与していないことを願っています。\n\n手元には一組しかなく、それは重要です。つまり、当面の間は一人のアルケミストに制限されます。\n\n稼働を開始すると、アルケミストは<color=green>基本薬</color>を調合できます。これは軽傷、やけど、そして産業の進歩に伴うその他の予測可能な結果を治療するための信頼できる化合物です。\n\n労働者を生かしておくようにしてください。彼らはさらなる実験に役立ちます。」"
frFR = "Ah ! Excellent. Quelqu'un a enfin pris contact avec nous.\n\nUne colonie fonctionnelle qui a réussi à assembler une bibliothèque est amenée à voir sa main-d'œuvre souffrir de la variété habituelle de brûlures, d'infections et d'actions mal jugées qui accompagnent la vie quotidienne. Tout à fait normal.\n\nPour régler ces problèmes, vous aurez besoin d'un Alchimiste.\n\nL'Alchimiste nécessite <color=green>Matériel de laboratoire</color>. Un ensemble devrait avoir été récupéré de la charrette. Espérons qu'il n'ait pas été égaré, cassé, ou impliqué dans une expérience de supervision douteuse.\n\nVous n'avez qu'un seul ensemble, et il est vital. Cela signifie que vous serez limité à un seul Alchimiste pour le moment.\n\nUne fois opérationnel, l'Alchimiste pourra préparer <color=green>Baume de base</color>, un composé fiable pour traiter les blessures mineures, les brûlures et d'autres conséquences prévisibles du progrès industriel.\n\nEssayez de garder les travailleurs en vie. Ils sont utiles pour d'autres expériences."
deDE = "„Ah! Ausgezeichnet. Jemand hat uns endlich kontaktiert.\n\nEine funktionierende Siedlung, die es geschafft hat, eine Bibliothek zusammenzustellen, wird zwangsläufig sehen, wie ihre Arbeitskräfte unter den üblichen Verbrennungen, Infektionen und schlecht durchdachten Handlungen leiden, die mit dem Alltag einhergehen. Völlig normal.\n\nUm diese Angelegenheiten zu klären, benötigst du einen Alchemisten.\n\nDer Alchemist benötigt <color=green>Laborglaswaren</color>. Ein Set sollte vom Wagen wiedergefunden worden sein. Hoffentlich ist es nicht fehlplatziert, kaputt oder anderweitig in ein Experiment mit fragwürdiger Aufsicht verwickelt worden.\n\nDu hast nur ein Set, und es ist von entscheidender Bedeutung. Das bedeutet, dass du vorerst auf einen einzelnen Alchemisten beschränkt bist.\n\nSobald er in Betrieb ist, kann der Alchemist <color=green>Grundbalsam</color> herstellen, eine zuverlässige Verbindung zur Behandlung von kleinen Verletzungen, Verbrennungen und anderen vorhersehbaren Folgen des industriellen Fortschritts.\n\nVersuche, die Arbeiter am Leben zu halten. Sie sind nützlich für weitere Experimente.“"
plPL = "„Ah! Doskonale. Ktoś wreszcie się z nami skontaktował.\n\nFunkcjonujące osiedle, które zdołało skompletować bibliotekę, z pewnością będzie musiało zmagać się z typowymi oparzeniami, infekcjami i niefortunnymi decyzjami, jakie towarzyszą codziennemu życiu. Zupełnie normalne.\n\nAby rozwiązać te sprawy, będziesz potrzebować Alchemika.\n\nAlchemik potrzebuje <color=green>Sprzętu laboratoryjnego</color>. Jeden zestaw powinien być odzyskany z wozu. Miejmy nadzieję, że nie został źle umiejscowiony, uszkodzony lub w inny sposób zaangażowany w eksperyment o wątpliwej nadzorze.\n\nMasz tylko jeden zestaw, a to jest kluczowe. Oznacza to, że na razie będziesz ograniczony do jednego Alchemika.\n\nGdy zacznie działać, Alchemik będzie mógł przygotować <color=green>Podstawowy maść</color>, niezawodny środek do leczenia drobnych ran, oparzeń i innych przewidywalnych konsekwencji postępu przemysłowego.\n\nStaraj się utrzymać pracowników przy życiu. Są przydatni do dalszych eksperymentów.”"
ptBR = "Ah! Excelente. Alguém finalmente entrou em contato conosco.\n\nUma colônia funcionando que conseguiu montar uma biblioteca está sujeita a ver sua força de trabalho sofrer a habitual variedade de queimaduras, infecções e ações mal avaliadas que acompanham a vida cotidiana. Perfeitamente normal.\n\nPara tratar desses assuntos, você precisará de um Alquimista.\n\nO Alquimista requer <color=green>Vidraria de Laboratório</color>. Um conjunto deve ter sido recuperado do carrinho. Espero que não tenha sido extraviado, quebrado ou envolvido em um experimento com supervisão duvidosa.\n\nVocê tem apenas um conjunto, e ele é vital. Isso significa que você estará limitado a um único Alquimista por enquanto.\n\nUma vez em operação, o Alquimista pode preparar <color=green>Pomada Básica</color>, um composto confiável para tratar ferimentos menores, queimaduras e outras consequências previsíveis do progresso industrial.\n\nFaça o possível para manter os trabalhadores vivos. Eles são úteis para futuros experimentos."
koKR = "아! 훌륭합니다. 누군가 드디어 저희에게 연락을 했군요.\n\n도서관을 조립할 수 있는 기능을 갖춘 정착지는 그 일상 생활과 함께하는 일반적인 화상, 감염, 그리고 잘못된 판단의 행위로 인해 노동력이 고통받는 것을 겪게 될 것입니다. 완벽하게 정상입니다.\n\n이 문제를 해결하기 위해서는 연금술사가 필요합니다.\n\n연금술사는 <color=green>실험실 유리기구</color>를 필요로 합니다. 하나의 세트는 수레에서 회수되었어야 합니다. 제발 잘못된 장소에 놓이거나, 깨지거나, 의심스러운 감독하에 실험에 포함되지 않았기를 바랍니다.\n\n여러분에게는 단 하나의 세트만 있으며, 이는 매우 중요합니다. 이는 당분간 단 하나의 연금술사만을 사용할 수 있다는 것을 의미합니다.\n\n운영을 시작하면, 연금술사는 가벼운 부상, 화상, 그리고 산업 발전의 다른 예측할 수 있는 결과를 치료하는 데 신뢰할 수 있는 화합물인 <color=green>기본 연고</color>를 준비할 수 있습니다.\n\n작업자들이 살아 있도록 노력해 주세요. 그들은 추가 실험에 유용합니다."
csCZ = "„Ah! Výborně. Někoho konečně napadlo nás kontaktovat.\n\nFunkční osídlení, které dokázalo sestavit knihovnu, bude jistě svědky obvyklého soužení spojeného s popáleninami, infekcemi a špatně uváženými kroky, které patří k každodennímu životu. Přesně normální.\n\nAbychom tyto záležitosti vyřešili, potřebujete alchymistu.\n\nAlchymista potřebuje <color=green>laboratorní sklo</color>. Jeden set by měl být z vozíku zajištěn. Doufejme, že nebyl ztracen, rozbitý nebo zapleten do experimentu s pochybným dohledem.\n\nMáte pouze jeden set a je nezbytný. To znamená, že prozatím budete omezeni pouze na jednoho alchymistu.\n\nJakmile začne fungovat, alchymista může připravit <color=green>Základní balzám</color>, spolehlivou sloučeninu pro ošetření drobných zranění, popálenin a dalších předvídatelných následků průmyslového pokroku.\n\nSnažte se udržet pracovníky při životě. Jsou užiteční pro další experimenty.“"
viVN = "Ah! Xuất sắc. Cuối cùng thì ai đó cũng đã liên lạc với chúng ta.\n\nMột khu định cư hoạt động có thể tập hợp một thư viện sẽ phải chịu đựng những tổn thương, nhiễm trùng và những hành động kém suy xét thường thấy trong cuộc sống hàng ngày. Hoàn toàn bình thường.\n\nĐể giải quyết những vấn đề này, bạn sẽ cần một Nhà giả kim.\n\nNhà giả kim yêu cầu <color=green>Đồ thủy tinh phòng thí nghiệm</color>. Một bộ đã được thu hồi từ xe chở hàng. Hy vọng rằng nó không bị thất lạc, vỡ hoặc bị liên quan đến một thí nghiệm có sự giám sát đáng ngờ nào đó.\n\nBạn chỉ có một bộ, và nó rất quan trọng. Điều này có nghĩa là bạn sẽ bị giới hạn chỉ có một Nhà giả kim cho bây giờ.\n\nKhi hoạt động, Nhà giả kim có thể chuẩn bị <color=green>Balm Cơ Bản</color>, một hợp chất đáng tin cậy để điều trị các chấn thương nhỏ, bỏng và những hậu quả khác có thể dự đoán của sự tiến bộ công nghiệp.\n\nHãy cố gắng giữ cho công nhân sống sót. Họ rất hữu ích cho các thí nghiệm tiếp theo."
trTR = "Ah! Harika. Birisi nihayet bizimle iletişime geçti.\n\nBir kütüphane oluşturmayı başaran işleyen bir yerleşim, günlük yaşamla birlikte gelen yanıklar, enfeksiyonlar ve kötü yargılanmış eylemler gibi her zamanki sıkıntılarla iş gücünün zarar görmesini yaşamaya mahkumdur. Tamamen normal.\n\nBu meseleleri ele almak için bir Kimyager gerekli.\n\nKimyagerin <color=green>Laboratuvar Cam Eşyası</color>na ihtiyacı var. Bir setin arabadan kurtarılmış olması gerekir. Umarım kaybolmamış, kırılmamış veya sorgulanabilir bir deneye dahil olmamıştır.\n\nSadece bir setiniz var ve bu hayati öneme sahip. Bu, şu an için yalnızca bir Kimyager ile sınırlı olacağınız anlamına geliyor.\n\nFaaliyete geçtiğinde, Kimyager <color=green>Temel Balsam</color> hazırlayabilir; bu, hafif yaralanmalar, yanıklar ve endüstriyel ilerlemenin diğer tahmin edilebilir sonuçlarını tedavi etmek için güvenilir bir bileşiktir.\n\nİşçileri hayatta tutmaya çalışın. Onlar daha fazla deney için faydalıdır."

["Tutorial.ChemistryBranch.BuildMedbed.Whitepaws"]
raw = "Excellent. With Basic Balm available, we may begin addressing the more common consequences of having fun.\n\nConstruct at least one Medical Bed. There are three varieties, each specialized for a different category of minor ailment. Select whichever seems most relevant to the circus you are currently running.\n\nBasic Balm is not usable as-is; it must be adjusted directly at the bed into the appropriate medication. The procedure is simple and well documented.\n\nDo not attempt to modify the formulation. We already tried that. The results involved a traumatic amount of paperwork and several new laws being passed.\n\nMedical beds are suitable for minor ailments only. Severe cases require a <color=green>Clinic</color>, staffed by a beaver with <color=green>proper medical training</color>.\n\nSince you clearly do not have anyone fitting that description, you will need to lock a few volunteers in the <color=green>library</color> and make do with the least incompetent one who eventually emerges."
status = "normal"
enUS = "Excellent. With Basic Balm available, we may begin addressing the more common consequences of having fun.\n\nConstruct at least one Medical Bed. There are three varieties, each specialized for a different category of minor ailment. Select whichever seems most relevant to the circus you are currently running.\n\nBasic Balm is not usable as-is; it must be adjusted directly at the bed into the appropriate medication. The procedure is simple and well documented.\n\nDo not attempt to modify the formulation. We already tried that. The results involved a traumatic amount of paperwork and several new laws being passed.\n\nMedical beds are suitable for minor ailments only. Severe cases require a <color=green>Clinic</color>, staffed by a beaver with <color=green>proper medical training</color>.\n\nSince you clearly do not have anyone fitting that description, you will need to lock a few volunteers in the <color=green>library</color> and make do with the least incompetent one who eventually emerges."
zhCN = "很好。我们可以开始处理更常见的乐趣后果，因为基础药膏已经可用。\n\n至少建造一个医疗床。共有三种类型，每种专门用于不同类别的小病。选择与您当前经营的马戏团最相关的那种。\n\n基础药膏不能直接使用；它必须在床上直接调整成适当的药物。这个过程简单且有详细文档。\n\n不要尝试修改配方。我们已经尝试过了，结果涉及大量的文书工作和几项新法律的通过。\n\n医疗床仅适用于小病。严重病例需要一个由具备<color=green>适当医疗培训</color>的海狸工作人员的<color=green>诊所</color>。\n\n由于您显然没有符合该描述的人员，您需要在<color=green>图书馆</color>里锁几名志愿者，并随便找出最后出来的那个能力最差的来应对。"
zhTW = "很好。有了基本溫和膏，我們可以開始處理更常見的樂趣後果。\n\n建造至少一張醫療床。有三種不同的類型，每種專門針對不同類別的小病。選擇最符合你現在運行的馬戲團的那一種。\n\n基本溫和膏不能直接使用；必須在床邊調整為合適的藥物。這個過程簡單且有良好的文獻記錄。\n\n不要嘗試修改配方。我們已經試過了。結果涉及大量文書工作和幾項新法律的通過。\n\n醫療床僅適用於小病。重症需要一個由具備適當醫療培訓的海狸值班的<color=green>診所</color>。\n\n由於你顯然沒有適合這個描述的人，你將需要把幾個志願者鎖在<color=green>圖書館</color>裡，然後隨便用最後出來的那個不那麼無能的人應付一下。"
ruRU = "Отлично. С основным бальзамом в наличии, мы можем начать решать более распространенные последствия развлечений.\n\nПостройте как минимум одну медицинскую койку. Существует три вида, каждый из которых специализирован для разных категорий мелких недомоганий. Выберите тот, который кажется наиболее подходящим для цирка, который вы сейчас управляете.\n\nОсновной бальзам нельзя использовать в первоначальном виде; его необходимо непосредственно на койке преобразовать в подходящее лекарство. Процесс прост и хорошо документирован.\n\nНе пытайтесь изменить формулу. Мы уже это пробовали. Результаты привели к травматическому количеству бумажной работы и принятию нескольких новых законов.\n\nМедицинские койки подходят только для мелких недомоганий. Для серьезных случаев требуется <color=green>клиника</color>, в которой работает бобер с <color=green>соответствующей медицинской подготовкой</color>.\n\nТак как явно у вас нет никого, кто подходит под это описание, вам придется запереть нескольких добровольцев в <color=green>библиотеке</color> и справляться с тем, кто из них менее некомпетентен и в конечном итоге выйдет."
jaJP = "素晴らしいです。基本バルムが利用可能になったので、楽しむことによって生じるより一般的な影響に対処し始めることができます。\n\n少なくとも1つの医療ベッドを建設してください。3つの種類があり、それぞれ異なる軽い病気に特化しています。現在運営しているサーカスに最も関連するものを選んでください。\n\n基本バルムはそのままでは使用できず、ベッドで適切な薬に調整する必要があります。この手順はシンプルで、良く文書化されています。\n\n処方の変更を試みないでください。私たちはすでにそれを試みました。結果として、非常に多くの書類作成といくつかの新しい法律が成立しました。\n\n医療ベッドは軽い病気にのみ適しています。重篤なケースには<color=green>クリニック</color>が必要で、<color=green>適切な医療訓練</color>を受けたビーバーが必要です。\n\nあなたの説明に合う人物が明らかにいないので、いくつかのボランティアを<color=green>図書館</color>に閉じ込めて、最も無能でない者をそのうち出てくるまで待たなくてはなりません。"
frFR = "Excellent. Avec le Baume de Base à disposition, nous pouvons commencer à traiter les conséquences les plus courantes de s'amuser.\n\nConstruisez au moins un Lit Médical. Il existe trois variétés, chacune spécialisée dans une catégorie différente de maux mineurs. Sélectionnez celle qui semble la plus pertinente pour le cirque que vous dirigez actuellement.\n\nLe Baume de Base n’est pas utilisable tel quel ; il doit être ajusté directement au lit en médicament approprié. La procédure est simple et bien documentée.\n\nN'essayez pas de modifier la formulation. Nous avons déjà essayé cela. Les résultats ont entraîné une quantité traumatisante de paperasse et plusieurs nouvelles lois adoptées.\n\nLes lits médicaux conviennent uniquement aux maux mineurs. Les cas graves nécessitent une <color=green>Clinique</color>, dotée d'un castor avec une <color=green>formation médicale appropriée</color>.\n\nPuisque vous n'avez clairement personne correspondant à cette description, vous devrez enfermer quelques bénévoles dans la <color=green>bibliothèque</color> et vous contenter du moins incompétent qui finira par en sortir."
deDE = "Ausgezeichnet. Mit der verfügbaren Grundsalbe können wir beginnen, die häufigeren Folgen des Spaßhabens anzugehen.\n\nBaue mindestens ein medizinisches Bett. Es gibt drei Varianten, die jeweils auf eine andere Kategorie von kleineren Beschwerden spezialisiert sind. Wähle die, die für den Zirkus, den du derzeit leitest, am relevantesten erscheint.\n\nDie Grundsalbe kann nicht so verwendet werden; sie muss direkt am Bett in das passende Medikament umgewandelt werden. Der Vorgang ist einfach und gut dokumentiert.\n\nVersuche nicht, die Formulierung zu ändern. Das haben wir bereits versucht. Die Ergebnisse führten zu einer traumatischen Menge an Papierkram und mehreren neuen Gesetzen.\n\nMedizinische Betten sind nur für kleinere Beschwerden geeignet. Schwere Fälle erfordern eine <color=green> Klinik</color>, die von einem Biber mit <color=green>entsprechender medizinischer Ausbildung</color> besetzt ist.\n\nDa du offensichtlich niemanden hast, der dieser Beschreibung entspricht, musst du ein paar Freiwillige in die <color=green>Bibliothek</color> einschließen und mit dem inkompetentesten von ihnen vorliebnehmen, der schließlich herauskommt."
plPL = "Świetnie. Dzięki dostępności Podstawowego Balsamu możemy zacząć zajmować się częstszymi konsekwencjami dobrej zabawy.\n\nZbuduj przynajmniej jedno Łóżko Medyczne. Istnieją trzy warianty, z których każdy specjalizuje się w innej kategorii drobnych dolegliwości. Wybierz ten, który wydaje się najbardziej odpowiedni dla cyrku, który obecnie prowadzisz.\n\nPodstawowy Balsam nie jest gotowy do użycia; musi być bezpośrednio dostosowany na łóżku do odpowiedniego leku. Proces jest prosty i dobrze udokumentowany.\n\nNie próbuj modyfikować formuły. Już to próbowaliśmy. Rezultaty obejmowały traumatyczną ilość dokumentacji i wprowadzenie kilku nowych ustaw.\n\nŁóżka medyczne nadają się tylko dla drobnych dolegliwości. Ciężkie przypadki wymagają <color=green>Kliniki</color>, obsługiwanej przez bobra z <color=green>odpowiednim wykształceniem medycznym</color>.\n\nPonieważ wyraźnie nie masz nikogo spełniającego te kryteria, będziesz musiał zamknąć kilku wolontariuszy w <color=green>bibliotece</color> i zadowolić się najmniej niekompetentnym, który ostatecznie się pojawi."
ptBR = "Excelente. Com o Bálsamo Básico disponível, podemos começar a lidar com as consequências mais comuns de nos divertirmos.\n\nConstrua pelo menos uma Cama Médica. Existem três variedades, cada uma especializada em uma categoria diferente de problemas menores. Selecione a que parecer mais relevante para o circo que você está administrando.\n\nO Bálsamo Básico não pode ser usado como está; ele deve ser ajustado diretamente na cama para se tornar o medicamento apropriado. O procedimento é simples e bem documentado.\n\nNão tente modificar a formulação. Já tentamos isso. Os resultados envolveram uma quantidade traumática de papelada e várias novas leis sendo aprovadas.\n\nCamas médicas são adequadas apenas para problemas menores. Casos severos requerem uma <color=green>Clínica</color>, com um castor que tenha <color=green>treinamento médico adequado</color>.\n\nComo você claramente não tem ninguém que se encaixe nessa descrição, você precisará trancar alguns voluntários na <color=green>biblioteca</color> e se virar com o menos incompetente que eventualmente emergir."
koKR = "훌륭합니다. 기본 발모제가 준비되었으니, 이제 즐거운 일의 더 일반적인 결과를 처리하기 시작할 수 있습니다.\n\n최소한 하나의 의료 침대를 건설하십시오. 세 가지 종류가 있으며, 각각은 다양한 경미한 질병 카테고리에 특화되어 있습니다. 현재 운영 중인 서커스에 가장 관련이 있는 종류를 선택하십시오.\n\n기본 발모제는 그대로 사용할 수 없습니다. 침대에서 적절한 약물로 직접 조정해야 합니다. 절차는 간단하고 잘 문서화되어 있습니다.\n\n조제 공식의 수정은 시도하지 마십시오. 이미 시도해 보았습니다. 그 결과는 엄청난 양의 서류 작업과 여러 새로운 법률이 통과되는 것이었습니다.\n\n의료 침대는 경미한 질병에만 적합합니다. 심각한 경우에는 <color=green>클리닉</color>이 필요하며, <color=green>정식 의료 교육을 받은</color> 비버가 배치되어야 합니다.\n\n분명히 해당 설명에 맞는 사람이 없기 때문에, 몇몇 자원봉사를 <color=green>도서관</color>에 가두고 결국 나오는 가장 무능력한 사람으로 대체해야 할 것입니다."
csCZ = "Vynikající. S dostupným Základním balzámem můžeme začít řešit častější následky zábavy.\n\nPostavte alespoň jednu Lůžko pro pacienty. Existují tři různé varianty, každá specializovaná na jinou kategorii drobných onemocnění. Vyberte si tu, která se nejlépe hodí k cirkusu, který aktuálně provozujete.\n\nZákladní balzám není použitelný tak, jak je; musí být přímo na lůžku přizpůsoben na vhodný lék. Postup je jednoduchý a dobře zdokumentovaný.\n\nNepokoušejte se měnit složení. To jsme už zkoušeli. Výsledkem bylo traumatizující množství papírování a přijetí několika nových zákonů.\n\nLůžka pro pacienty jsou vhodná pouze pro drobná onemocnění. Závažné případy vyžadují <color=green>kliniku</color>, kterou obsluhuje bobr s <color=green>patřičným lékařským vzděláním</color>.\n\nJelikož zjevně nemáte nikoho, kdo by vyhovoval tomto popisu, budete muset zamknout několik dobrovolníků v <color=green>knihovně</color> a vystačit si s tím nejméně neschopným, kdo nakonec vyjde."
viVN = "Tuyệt vời. Với Balsam Cơ Bản có sẵn, chúng ta có thể bắt đầu giải quyết những hậu quả phổ biến hơn của việc vui chơi.\n\nXây dựng ít nhất một Giường Y Tế. Có ba loại, mỗi loại chuyên biệt cho một thể loại bệnh nhẹ khác nhau. Chọn loại nào phù hợp nhất với gánh xiếc mà bạn đang điều hành.\n\nBalsam Cơ Bản không thể sử dụng ngay; nó phải được điều chỉnh trực tiếp tại giường thành loại thuốc phù hợp. Quy trình rất đơn giản và đã được tài liệu hóa rõ ràng.\n\nĐừng cố gắng điều chỉnh công thức. Chúng tôi đã thử rồi. Kết quả liên quan đến một lượng giấy tờ gây stress và một số luật mới được thông qua.\n\nGiường y tế chỉ thích hợp cho các bệnh nhẹ. Những trường hợp nghiêm trọng cần một <color=green>Phòng Khám</color>, do một chú hải ly có <color=green>đào tạo y tế phù hợp</color> phụ trách.\n\nVì rõ ràng bạn không có ai đáp ứng mô tả đó, bạn sẽ cần phải nhốt một vài tình nguyện viên trong <color=green>thư viện</color> và sử dụng người kém kém nhất mà cuối cùng xuất hiện."
trTR = "Mükemmel. Temel Merhem mevcut olduğuna göre, eğlenmenin daha yaygın sonuçlarına yönelik adımlar atmaya başlayabiliriz.\n\nEn az bir Tıbbi Yatak inşa edin. Üç çeşidi vardır; her biri farklı bir hafif rahatsızlık kategorisi için özel olarak tasarlanmıştır. Şu anda yürütmekte olduğunuz sirke en uygun olanı seçin.\n\nTemel Merhem olduğu gibi kullanılamaz; doğrudan yatakta uygun ilaca dönüştürülmesi gerekir. Prosedür basittir ve iyi bir şekilde belgelenmiştir.\n\nFormülasyonu değiştirmeye çalışmayın. Bunu zaten denedik. Sonuç, travmatik bir miktar evrak ve birkaç yeni yasanın geçmesiyle sonuçlandı.\n\nTıbbi yataklar yalnızca hafif rahatsızlıklar için uygundur. Ciddi vakalar bir <color=green>Klinik</color> gerektirir ve bu klinik <color=green>uygun tıbbi eğitim almış</color> bir kunduz tarafından yönetilmelidir.\n\nAçıkça tanıma uyan kimseniz olmadığına göre, birkaç gönüllüyü <color=green>kütüphaneye</color> kilitlemeniz ve sonunda çıkan en az yetkin olanı ile idare etmeniz gerekecek."

["Tutorial.ChemistryBranch.BuildScrewpress.Whitepaws"]
raw = "Excellent. Your Alchemist can now prepare basic medicine, but actual chemistry requires something more fundamental.\n\n<color=green>Oil</color>.\n\nOil is a remarkably cooperative substance. It fuels industry, improves cooking, seals structures, and participates in several reactions that we are very excited to discuss later.\n\nConstruct a Screwpress to extract oil from Sunflower Seeds.\n\nThe press operates through a <color=green>Screw Axle</color>, which will gradually wear down under pressure. Replacement axles can be manufactured in the <color=green>Log Gnawing Station</color>. We recommend keeping a few spare parts available.\n\nIf you catch some of your townsfolk having fun crushing things with the press instead of working, we decline any responsibility in the matter.\n\nPlease tell us which items were the most fun to crush."
status = "normal"
enUS = "Excellent. Your Alchemist can now prepare basic medicine, but actual chemistry requires something more fundamental.\n\n<color=green>Oil</color>.\n\nOil is a remarkably cooperative substance. It fuels industry, improves cooking, seals structures, and participates in several reactions that we are very excited to discuss later.\n\nConstruct a Screwpress to extract oil from Sunflower Seeds.\n\nThe press operates through a <color=green>Screw Axle</color>, which will gradually wear down under pressure. Replacement axles can be manufactured in the <color=green>Log Gnawing Station</color>. We recommend keeping a few spare parts available.\n\nIf you catch some of your townsfolk having fun crushing things with the press instead of working, we decline any responsibility in the matter.\n\nPlease tell us which items were the most fun to crush."
zhCN = "优秀。你的炼药师现在可以准备基础药品，但实际的化学反应需要一些更基本的东西。\n\n<color=green>油</color>。\n\n油是一种极为合作的物质。它为工业提供动力，改善烹饪，密封结构，并参与几种我们非常期待稍后讨论的反应。\n\n建造一个压榨机，从向日葵种子中提取油。\n\n压榨机通过<color=green>螺旋轴</color>操作，在压力下将逐渐磨损。可以在<color=green>木头啃噬站</color>制造替换的轴。我们建议备有一些备用零件。\n\n如果你发现一些镇民在用压榨机玩乐而不是工作的事情，我们对此不承担任何责任。\n\n请告诉我们哪些物品是最有趣的压榨。"
zhTW = "非常好。你的煉金術士現在可以製作基本藥物，但真正的化學需要更基本的東西。\n\n<color=green>油</color>。\n\n油是一種非常合作的物質。它為工業提供動力，改善烹飪，密封結構，並參與幾個反應，我們非常期待稍後討論。\n\n建造一個螺旋壓榨機，以從向日葵籽中提取油。\n\n壓榨機通過<color=green>螺桿軸</color>運作，這會在壓力下逐漸磨損。可以在<color=green>木材咬嚼站</color>製造替換的軸。我們建議準備幾個備用部件。\n\n如果你看到一些鎮民開心地用壓榨機壓碎物品而不是工作，我們對此不承擔任何責任。\n\n請告訴我們哪些物品是最有趣的壓碎對象。"
ruRU = "Отлично. Вашему Алхимику теперь доступно приготовление базовых лекарств, но настоящая химия требует чего-то более фундаментального.\n\n<color=green>Масло</color>.\n\nМасло – это удивительно сотрудничествующее вещество. Оно питает промышленность, улучшает кулинарию, запечатывает конструкции и участвует в нескольких реакциях, которые мы с нетерпением ждем возможности обсудить позже.\n\nПостройте Пресса для отжима, чтобы извлечь масло из семян подсолнечника.\n\nПресс работает через <color=green>Шнековый Вал</color>, который будет постепенно изнашиваться под давлением. Запасные валы можно изготавливать на <color=green>Станции Льстящего Логова</color>. Мы рекомендуем держать несколько запасных частей под рукой.\n\nЕсли вы поймаете некоторых ваших граждан, развлекающихся, раздавливая вещи с прессом вместо работы, мы отказываемся брать на себя любую ответственность в этом вопросе.\n\nПожалуйста, сообщите нам, какие предметы было весело раздавливать."
jaJP = "素晴らしい。あなたの錬金術師は基本的な薬を準備できるようになりましたが、実際の化学にはもっと基本的なものが必要です。\n\n<color=green>油</color>。\n\n油は驚くほど協力的な物質です。産業に燃料を供給し、料理を改善し、構造物を密封し、後で話し合うのが非常に楽しみな複数の反応に参加します。\n\nひまわりの種から油を抽出するために、スクリュープレスを構築してください。\n\nプレスは<color=green>スクリュー軸</color>を通じて動作し、圧力で徐々に摩耗します。交換用の軸は<color=green>丸太噛みステーション</color>で製造できます。予備部品をいくつか用意しておくことをお勧めします。\n\nもしあなたの町の住民が仕事をせずにプレスで物を粉砕する楽しみを見つけたとしても、私たちはその件について一切責任を負いません。\n\nどのアイテムが最も粉砕するのが楽しかったか教えてください。"
frFR = "Excellent. Votre Alchimiste peut désormais préparer des médicaments de base, mais la chimie réelle nécessite quelque chose de plus fondamental.\n\n<color=green>Huile</color>.\n\nL'huile est une substance remarquablement coopérative. Elle alimente l'industrie, améliore la cuisine, scelle les structures et participe à plusieurs réactions que nous sommes très impatients de discuter plus tard.\n\nConstruisez un Presse à Vis pour extraire l'huile des Graines de Tournesol.\n\nLa presse fonctionne grâce à un <color=green>Essieu à Vis</color>, qui s'usera progressivement sous pression. Des essieux de remplacement peuvent être fabriqués à la <color=green>Station de Rongeage de Tronc</color>. Nous vous recommandons de garder quelques pièces de rechange à disposition.\n\nSi vous surprenez certains de vos concitoyens à s'amuser à écraser des choses avec la presse au lieu de travailler, nous déclinons toute responsabilité à cet égard.\n\nVeuillez nous dire quels objets ont été les plus amusants à écraser."
deDE = "Ausgezeichnet. Ihr Alchemist kann jetzt grundlegende Medizin herstellen, aber echte Chemie erfordert etwas Grundlegenderes.\n\n<color=green>Öl</color>.\n\nÖl ist eine bemerkenswert kooperative Substanz. Es treibt die Industrie an, verbessert das Kochen, versiegelt Strukturen und nimmt an mehreren Reaktionen teil, über die wir später sehr begeistert sprechen werden.\n\nKonstruieren Sie eine Schraubenpresse, um Öl aus Sonnenblumensamen zu extrahieren.\n\nDie Presse funktioniert über eine <color=green>Schraubenachse</color>, die unter Druck allmählich abnutzt. Ersatzachsen können in der <color=green>Baumknabberstation</color> hergestellt werden. Wir empfehlen, einige Ersatzteile bereitzuhalten.\n\nWenn Sie beobachten, dass einige Ihrer Stadtbewohner Spaß daran haben, mit der Presse Dinge zu zerdrücken, anstatt zu arbeiten, lehnen wir jede Verantwortung in dieser Angelegenheit ab.\n\nBitte teilen Sie uns mit, welche Gegenstände am meisten Spaß gemacht haben, zu zerdrücken."
plPL = "Doskonale. Twój alchemik może teraz przygotować podstawowe leki, ale prawdziwa chemia wymaga czegoś bardziej fundamentalnego.\n\n<color=green>Olej</color>.\n\nOlej to niezwykle współpracująca substancja. Napędza przemysł, poprawia gotowanie, uszczelnia budowle i uczestniczy w kilku reakcjach, które bardzo chcielibyśmy omówić później.\n\nZbuduj Prasę Śrubową, aby wydobywać olej z nasion słonecznika.\n\nPrasa działa dzięki <color=green>Śrubowemu Wałowi</color>, który będzie się stopniowo zużywał pod presją. Zapasowe wały można wytwarzać w <color=green>Stacji Zgryzania Kłód</color>. Zalecamy posiadanie kilku zapasowych części.\n\nJeśli złapiesz niektórych swoich mieszkańców na zabawie w miażdżenie rzeczy prasą zamiast pracy, zrzekamy się jakiejkolwiek odpowiedzialności w tej sprawie.\n\nProszę, powiedz nam, które przedmioty były najfajniejsze do miażdżenia."
ptBR = "Excelente. Seu Alquimista agora pode preparar medicina básica, mas a química real requer algo mais fundamental.\n\n<color=green>Óleo</color>.\n\nO óleo é uma substância notavelmente cooperativa. Ele alimenta a indústria, melhora o cozimento, sela estruturas e participa de várias reações que estamos muito empolgados para discutir mais tarde.\n\nConstrua uma Prensa de Rosca para extrair óleo das Sementes de Girassol.\n\nA prensa opera através de um <color=green>Eixo de Rosca</color>, que se desgastará gradualmente sob pressão. Eixos de reposição podem ser fabricados na <color=green>Estação de Roedura de Toras</color>. Recomendamos manter algumas peças sobressalentes disponíveis.\n\nSe você pegar alguns de seus cidadãos se divertindo esmagando coisas com a prensa em vez de trabalhar, não nos responsabilizamos pelo que aconteceu.\n\nPor favor, nos conte quais itens foram os mais divertidos de esmagar."
koKR = "훌륭합니다. 당신의 연금술사는 이제 기본 약을 준비할 수 있지만, 실제 화학에는 더 기본적인 것이 필요합니다.\n\n<color=green>기름</color>.\n\n기름은 매우 협조적인 물질입니다. 그것은 산업을 촉진하고, 요리를 개선하며, 구조를 봉인하고, 우리가 나중에 논의할 여러 반응에 참여합니다.\n\n해바라기 씨앗에서 기름을 추출하기 위해 스크류프레스를 만드세요.\n\n프레스는 <color=green>스크류 축</color>을 통해 작동하며, 이는 압력 아래에서 점차 마모됩니다. 교체 축은 <color=green>통나무 갉기 작업장</color>에서 제조할 수 있습니다. 몇 개의 예비 부품을 구비해 두는 것을 추천합니다.\n\n프레스로 물건을 으깨며 놀고 있는 마을 주민들을 발견한다면, 우리는 이에 대한 책임을 지지 않습니다.\n\n어떤 물건을 으깨는 것이 가장 재미있었는지 알려주세요."
csCZ = "Vynikající. Váš Alchymista nyní může připravit základní medicínu, ale skutečná chemie vyžaduje něco základnějšího.\n\n<color=green>Oleje</color>.\n\nOleje jsou překvapivě spolupracující látky. Pohánějí průmysl, zlepšují vaření, utěsňují konstrukce a účastní se několika reakcí, o kterých se velmi těšíme, že je později probereme.\n\nSestavte Lis na skrutky pro extrakci oleje ze slunečnicových semen.\n\nLis funguje prostřednictvím <color=green>Skrutkového náboje</color>, který se postupně opotřebovává pod tlakem. Náhradní náboje lze vyrobit na <color=green>Stanici na kousání klád</color>. Doporučujeme mít k dispozici několik náhradních dílů.\n\nPokud přistihnete některé z vašich občanů, jak se baví drcením věcí pomocí lisu místo práce, odmítáme jakoukoli odpovědnost v této záležitosti.\n\nProsím, řekněte nám, které předměty byly nejzábavnější rozdrtit."
viVN = "Tuyệt vời. Nhân viên Hóa học của bạn giờ có thể chuẩn bị thuốc cơ bản, nhưng hóa học thực sự yêu cầu điều gì đó cơ bản hơn.\n\n<color=green>Dầu</color>.\n\nDầu là một chất rất hợp tác. Nó cung cấp năng lượng cho ngành công nghiệp, cải thiện nấu ăn, niêm phong cấu trúc, và tham gia vào một vài phản ứng mà chúng tôi rất háo hức thảo luận sau này.\n\nXây dựng một Máy Ép Vít để chiết xuất dầu từ Hạt Hoa Cúc.\n\nMáy ép hoạt động thông qua một <color=green>Trục Vít</color>, sẽ dần bị mài mòn dưới áp lực. Các trục thay thế có thể được sản xuất tại <color=green>Trạm Gặm Gỗ</color>. Chúng tôi khuyên bạn nên giữ vài phụ tùng thay thế sẵn có.\n\nNếu bạn thấy một số người trong thị trấn vui vẻ nghiền nát đồ vật bằng máy ép thay vì làm việc, chúng tôi từ chối bất kỳ trách nhiệm nào về vấn đề này.\n\nXin hãy cho chúng tôi biết những món đồ nào vui nhất để nghiền nát."
trTR = "Mükemmel. Alkimistin artık temel ilaç hazırlayabilir, ancak gerçek kimya daha temel bir şey gerektirir.\n\n<color=green>Yağ</color>.\n\nYağ son derece işbirlikçi bir maddedir. Sanayiyi besler, pişirmeyi geliştirir, yapıları mühürler ve daha sonra çok heyecanla tartışacağımız birkaç reaksiyona katılır.\n\nAyçiçeği tohumlarından yağ elde etmek için bir Vida Presi inşa edin.\n\nPres, <color=green>Vida Aksı</color> aracılığıyla çalışır ve baskı altında yavaş yavaş aşınır. Yedek akslar <color=green>Kütük Dişleme İstasyonu</color>'nda imal edilebilir. Birkaç yedek parça bulundurmanızı öneririz.\n\nBaskı ile eğlenirken iş yapmayan bazı kasabalılarınızı yakalarsanız, bu meselede herhangi bir sorumluluk kabul etmiyoruz.\n\nLütfen hangi eşyaların en eğlenceli olduğu hakkında bize bilgi verin."

["Tutorial.ChemistryBranch.BuildMedTank.Whitepaws"]
raw = "Excellent. Now that you have Oil, we may proceed with one of our favorite industrial byproducts: <color=green>Tar</color>.\n\nTar is obtained by boiling and calcining a mixture of Pine Resin, Sawdust, and Oil until it becomes thick, black, and extremely reluctant to wash off.\n\nConfigure your <color=green>Alchemist</color> to produce Tar. Note that it must be kept <color=red>warm</color> for proper storage.\n\nThis substance is primarily used as a caulking material for more advanced constructions, sealing joints and preventing inconvenient leaks.\n\nIn particular, it enables the construction of <color=green>Medium Tanks</color>, which are significantly more efficient at storing liquids than the smaller tanks you have been relying on so far.\n\nIt also has several other applications involving people you dislike, but we have been strictly prohibited from discussing them. Please do not do the thing we are not allowed to mention.\n\nIt is very fun, though."
status = "normal"
enUS = "Excellent. Now that you have Oil, we may proceed with one of our favorite industrial byproducts: <color=green>Tar</color>.\n\nTar is obtained by boiling and calcining a mixture of Pine Resin, Sawdust, and Oil until it becomes thick, black, and extremely reluctant to wash off.\n\nConfigure your <color=green>Alchemist</color> to produce Tar. Note that it must be kept <color=red>warm</color> for proper storage.\n\nThis substance is primarily used as a caulking material for more advanced constructions, sealing joints and preventing inconvenient leaks.\n\nIn particular, it enables the construction of <color=green>Medium Tanks</color>, which are significantly more efficient at storing liquids than the smaller tanks you have been relying on so far.\n\nIt also has several other applications involving people you dislike, but we have been strictly prohibited from discussing them. Please do not do the thing we are not allowed to mention.\n\nIt is very fun, though."
zhCN = "优秀。现在您有了油，我们可以继续进行我们最喜欢的工业副产品之一：<color=green>焦油</color>。\n\n焦油是通过将松树树脂、木屑和油的混合物煮沸和煅烧，直到其变得浓稠、黑色，并且极难冲洗掉。\n\n配置您的<color=green>炼金术师</color>以生产焦油。请注意，它必须保持<color=red>温暖</color>以便于妥善存储。\n\n这种物质主要作为更高级建筑的填缝材料，用于密封接缝并防止不必要的泄漏。\n\n特别是，它使得建造<color=green>中型储罐</color>成为可能，这比您迄今为止依赖的小型储罐在存储液体方面要高效得多。\n\n它还有其他一些涉及您不喜欢的人士的应用，但我们被严格禁止讨论这些内容。请不要做我们被禁止提及的事情。\n\n不过，这确实很有趣。"
zhTW = "太好了。現在你有了石油，我們可以進一步探討我們最喜愛的工業副產品之一：<color=green>沥青</color>。\n\n沥青是通過煮沸和灼燒松樹樹脂、木屑和石油的混合物，直到它變得濃稠、黑色，並極其難以清洗掉。\n\n配置你的<color=green>煉金術師</color>以生產沥青。請注意，它必須保持<color=red>溫暖</color>以便於正確存儲。\n\n這種物質主要用作更先進建築的填縫材料，密封接縫並防止不便的漏水。\n\n特別是，它使得建造<color=green>中型儲罐</color>成為可能，這比你目前依賴的小型儲罐在儲存液體方面效率要高得多。\n\n它還有幾個其他應用，涉及你不喜歡的人，但我們被嚴格禁止討論它們。請不要做我們不允許提及的事情。\n\n不過，這是非常有趣的。"
ruRU = "Отлично. Теперь, когда у вас есть нефть, мы можем перейти к одному из наших любимых промышленных побочных продуктов: <color=green>Дёготь</color>.\n\nДёготь получается путем кипячения и обжига смеси сосновой смолы, опилок и нефти до тех пор, пока он не станет густым, черным и крайне неохотным смываться.\n\nНастройте вашего <color=green>Алхимика</color> на производство дёгтя. Учтите, что его необходимо хранить <color=red>в тепле</color> для правильного хранения.\n\nЭто вещество в первую очередь используется как герметик для более продвинутых конструкций, запечатывая швы и предотвращая неудобные утечки.\n\nВ частности, оно позволяет строить <color=green>Средние резервуары</color>, которые значительно эффективнее хранят жидкости, чем меньшие резервуары, на которые вы полагались до сих пор.\n\nУ него также есть несколько других применений, связанных с людьми, которые вам не нравятся, но нам строго запрещено обсуждать их. Пожалуйста, не делайте то, о чем мы не можем упоминать.\n\nНо это очень весело."
jaJP = "素晴らしいです。石油を手に入れたので、私たちのお気に入りの工業副産物の一つである <color=green>タール</color> を進めましょう。\n\nタールは、松脂、木くず、石油の混合物を煮沸して焼成することで得られ、濃厚で黒く、非常に洗い落としにくくなります。\n\n<color=green>錬金術師</color>を設定してタールを生産してください。適切な保存のために、<color=red>温かく</color>保つ必要があります。\n\nこの物質は、より高度な建設のための目地材として主に使用され、接合部を密封し、面倒な漏れを防ぎます。\n\n特に、あなたが今まで頼っていた小さいタンクよりも液体を保存する際にかなり効率的な <color=green>中型タンク</color> の建設を可能にします。\n\nまた、あなたが嫌う人々に関連する他の用途もいくつかありますが、そのことについて話すことは厳しく禁止されています。私たちが言えないことは決してしないでください。\n\nしかし、非常に楽しいことではあります。"
frFR = "Excellent. Maintenant que vous avez de l'huile, nous pouvons procéder à l'un de nos sous-produits industriels préférés : <color=green>le goudron</color>.\n\nLe goudron est obtenu en faisant bouillir et en calcifiant un mélange de résine de pin, de copeaux de bois et d'huile jusqu'à ce qu'il devienne épais, noir et extrêmement difficile à laver.\n\nConfigurez votre <color=green>Alchimiste</color> pour produire du goudron. Notez qu'il doit être gardé <color=red>au chaud</color> pour un stockage approprié.\n\nCette substance est principalement utilisée comme matériau d'étanchéité pour des constructions plus avancées, scellant les joints et prévenant les fuites inopportunes.\n\nEn particulier, elle permet la construction de <color=green>Réservoirs Moyens</color>, qui sont nettement plus efficaces pour stocker des liquides que les petits réservoirs sur lesquels vous comptiez jusqu'à présent.\n\nElle a également plusieurs autres applications impliquant des personnes que vous n'aimez pas, mais nous avons strictement l'interdiction d'en discuter. Veuillez ne pas faire ce que nous ne sommes pas autorisés à mentionner.\n\nC'est très amusant, cependant."
deDE = "Ausgezeichnet. Jetzt, da Sie Öl haben, können wir mit einem unserer Lieblingsnebenprodukte der Industrie fortfahren: <color=green>Teer</color>.\n\nTeer wird gewonnen, indem eine Mischung aus Kiefernharz, Sägemehl und Öl gekocht und gebrannt wird, bis sie dick, schwarz und extrem schwer abzuwaschen ist.\n\nKonfigurieren Sie Ihren <color=green>Alchemisten</color>, um Teer zu produzieren. Beachten Sie, dass er zur ordnungsgemäßen Lagerung <color=red>warm</color> gehalten werden muss.\n\nDiese Substanz wird hauptsächlich als Dichtungsmaterial für fortgeschrittenere Konstruktionen verwendet, um Fugen abzudichten und lästige Lecks zu verhindern.\n\nInsbesondere ermöglicht sie den Bau von <color=green>Mitteltanks</color>, die wesentlich effizienter Flüssigkeiten speichern als die kleineren Tanks, auf die Sie bisher angewiesen waren.\n\nSie hat auch mehrere andere Anwendungen, die Personen betreffen, die Sie nicht mögen, aber uns wurde strengstens untersagt, darüber zu sprechen. Bitte tun Sie nicht das, was wir nicht erwähnen dürfen.\n\nEs macht jedoch viel Spaß."
plPL = "Doskonałe. Teraz, gdy masz Ropę, możemy przejść do jednego z naszych ulubionych produktów ubocznych przemysłowych: <color=green>Smółka</color>.\n\nSmółka jest uzyskiwana przez gotowanie i kalcynowanie mieszanki żywicy sosnowej, trocin i Ropy, aż stanie się gęsta, czarna i niezwykle oporna na spłukanie.\n\nSkonfiguruj swojego <color=green>Alchemika</color>, aby produkował Smółkę. Zauważ, że musi być utrzymywana <color=red>ciepła</color> do odpowiedniego przechowywania.\n\nSubstancja ta jest głównie używana jako materiał uszczelniający w bardziej zaawansowanych konstrukcjach, uszczelniając złącza i zapobiegając niewygodnym wyciekom.\n\nW szczególności umożliwia budowę <color=green>Średnich Zbiorników</color>, które są znacznie bardziej efektywne w przechowywaniu cieczy niż mniejsze zbiorniki, na których polegałeś do tej pory.\n\nMa również kilka innych zastosowań związanych z osobami, których nie lubisz, ale zdecydowanie zabroniono nam ich omawiać. Proszę nie rób tego, o czym nie możemy wspominać.\n\nTo bardzo zabawne, jednak."
ptBR = "Excelente. Agora que você tem óleo, podemos prosseguir com um dos nossos subprodutos industriais favoritos: <color=green>Betume</color>.\n\nO betume é obtido fervendo e calcinando uma mistura de resina de pinheiro, serragem e óleo até que se torne espesso, negro e extremamente difícil de remover.\n\nConfigure seu <color=green>Alquimista</color> para produzir betume. Observe que ele deve ser mantido <color=red>quente</color> para um armazenamento adequado.\n\nEsta substância é utilizada principalmente como um material de calafetagem para construções mais avançadas, vedando juntas e evitando vazamentos inconvenientes.\n\nEm particular, ela permite a construção de <color=green>Tanques Médios</color>, que são significativamente mais eficientes em armazenar líquidos do que os tanques menores que você tem usado até agora.\n\nEla também tem várias outras aplicações envolvendo pessoas que você não gosta, mas fomos estritamente proibidos de discutir sobre isso. Por favor, não faça a coisa que não podemos mencionar.\n\nÉ muito divertido, porém."
koKR = "훌륭합니다. 이제 기름이 생겼으니, 우리가 가장 좋아하는 산업 부산물 중 하나인 <color=green>타르</color>를 진행할 수 있습니다.\n\n타르는 소나무 수지, 톱밥, 기름을 혼합하여 끓이고 소성하여 두껍고 검은색이며 씻어내기 매우 어려운 상태가 될 때까지 얻습니다.\n\n<color=green>연금술사</color>를 설정하여 타르를 생산하게 하세요. 적절한 저장을 위해 <color=red>따뜻하게</color> 유지해야 한다는 점에 유의하세요.\n\n이 물질은 주로 더 고급 건축물의 배관 재료로 사용되며, 이음새를 밀봉하고 불편한 누수를 방지하는 데 사용됩니다.\n\n특히 <color=green>중형 탱크</color>의 건설을 가능하게 하며, 이는 지금까지 의존해온 소형 탱크보다 액체 저장 효율이 현저히 높습니다.\n\n또한, 당신이 싫어하는 사람들과 관련된 여러 다른 용도가 있지만, 우리는 그것에 대해 논의하는 것이 엄격히 금지되어 있습니다. 언급할 수 없는 일을 하지 마세요.\n\n그럼에도 불구하고 매우 재미있습니다."
csCZ = "Excelentní. Nyní, když máte Olej, můžeme pokračovat s jedním z našich oblíbených průmyslových vedlejších produktů: <color=green>Dehet</color>.\n\nDehet se získává vařením a kalcinováním směsi Borovicové pryskyřice, Pilin a Oleje, dokud se nestane hustým, černým a extrémně odolným vůči smývání.\n\nNastavte svého <color=green>Alchymistu</color> tak, aby vyráběl Dehet. Všimněte si, že musí být udržován <color=red>teplý</color> pro správné uskladnění.\n\nTato látka se používá především jako těsnicí materiál pro pokročilejší konstrukce, uzavírá spoje a zabraňuje nepříjemným únikům.\n\nZejména umožňuje konstrukci <color=green>Středních nádrží</color>, které jsou výrazně efektivnější při skladování kapalin než menší nádrže, na kterých jste se doposud spoléhali.\n\nMá také několik dalších aplikací, které zahrnují lidi, které nemáte rádi, ale bylo nám přísně zakázáno je diskutovat. Prosím, nedělejte to, o čem nesmíme mluvit.\n\nJe to ale velmi zábavné."
viVN = "Tuyệt vời. Bây giờ bạn đã có Dầu, chúng ta có thể tiến hành với một trong những sản phẩm công nghiệp yêu thích của chúng tôi: <color=green>Nhựa đường</color>.\n\nNhựa đường được thu được bằng cách đun sôi và nung nóng một hỗn hợp gồm Nhựa thông, Bột gỗ và Dầu cho đến khi nó trở nên đặc, đen và cực kỳ khó rửa sạch.\n\nCấu hình <color=green>Hóa sĩ</color> của bạn để sản xuất Nhựa đường. Lưu ý rằng nó phải được giữ <color=red>ấm</color> để lưu trữ đúng cách.\n\nChất này chủ yếu được sử dụng như một vật liệu trát cho các công trình tiên tiến hơn, bịt kín các điểm nối và ngăn chặn rò rỉ không mong muốn.\n\nCụ thể, nó cho phép xây dựng <color=green>Thùng vừa</color>, mà hiệu quả hơn nhiều trong việc lưu trữ chất lỏng so với những thùng nhỏ mà bạn đã dựa vào cho đến nay.\n\nNó cũng có một số ứng dụng khác liên quan đến những người bạn không thích, nhưng chúng tôi đã bị cấm nghiêm ngặt trong việc thảo luận về chúng. Xin đừng làm điều mà chúng tôi không được phép đề cập.\n\nTuy nhiên, thật sự rất vui."
trTR = "Harika. Artık Petrolünüz olduğuna göre, en sevdiğimiz endüstriyel yan ürünlerden biriyle devam edebiliriz: <color=green>Katran</color>.\n\nKatran, Çam Reçinesi, Talaş ve Petrol karışımını kaynatıp kalsine ederek kalın, siyah ve yıkanması son derece zor bir hale gelene kadar elde edilir.\n\n<color=green>Simyacı</color>nızı Katran üretmesi için yapılandırın. Doğru depolama için <color=red>sıcak</color> tutulması gerektiğini unutmayın.\n\nBu madde, daha gelişmiş inşaatlar için macun malzemesi olarak başlıca kullanılır, birleşim yerlerini kapatır ve istenmeyen sızıntıları önler.\n\nÖzellikle, sıvıları daha küçük tanklara göre çok daha verimli bir şekilde depolayan <color=green>Orta Tanklar</color>ın inşasını sağlar.\n\nAyrıca, pek sevmediğiniz kişilerle ilgili birkaç başka uygulaması da vardır, ancak bunları tartışmamız kesinlikle yasaklandı. Lütfen bahsetmemiz yasak olan şeyi yapmayın.\n\nAma gerçekten çok eğlenceli."

["Tutorial.ChemistryBranch.BuildHandicrafterAndMine2.Whitepaws"]
raw = "Excellent. With oil production, tar preparation, and general chemical competence established, we may now proceed to what we’ve all been waiting forxa0:\n\nTIME TO BLOW SHIT UP !\n\nErm, please forgive our enthusiasm. You wouldn't believe how boring it is here since they revoked our access to the lab.\n\nTo produce Dynamite, you will first need Nitroglycerin. Your <color=green>Alchemist</color> can synthesize it from Sunflower Oil and Saltpeter.\n\nSaltpeter can be obtained from a <color=green>Primitive Mine</color>. You should already have one. If not, please correct this alarming situation immediately.\n\nNitroglycerin, as you may know, tends to react poorly to sudden movement, loud noises, careless handling, or existence in general.\n\nHave your <color=green>Handicrafter</color> stabilize it with sawdust, then roll it into dynamite sticks for convenient destruction.\n\nPlease prepare as many explosives as possible. We are suddenly very interested in field research."
status = "normal"
enUS = "Excellent. With oil production, tar preparation, and general chemical competence established, we may now proceed to what we’ve all been waiting for:\n\nTIME TO BLOW SHIT UP!\n\nErm, please forgive our enthusiasm. You wouldn't believe how boring it is here since they revoked our access to the lab.\n\nTo produce Dynamite, you will first need Nitroglycerin. Your <color=green>Alchemist</color> can synthesize it from Sunflower Oil and Saltpeter.\n\nSaltpeter can be obtained from a <color=green>Primitive Mine</color>. You should already have one. If not, please correct this alarming situation immediately.\n\nNitroglycerin, as you may know, tends to react poorly to sudden movement, loud noises, careless handling, or existence in general.\n\nHave your <color=green>Handicrafter</color> stabilize it with sawdust, then roll it into dynamite sticks for convenient destruction.\n\nPlease prepare as many explosives as possible. We are suddenly very interested in field research."
zhCN = "优秀。随着油脂生产、焦油准备和一般化学能力的建立，我们可以继续进行大家期待已久的事情：\n\n该炸毁东西的时候了！\n\n呃，请原谅我们的热情。自从他们撤销了我们对实验室的访问后，这里无聊得令人难以置信。\n\n要生产炸药，您首先需要甘油炸药。您的<color=green>炼金术士</color>可以通过向日葵油和硝石合成它。\n\n硝石可以从<color=green>原始矿井</color>中获得。您应该已经有一个。如果没有，请立即纠正这个令人担忧的情况。\n\n正如您所知，甘油炸药对于突然的运动、响亮的噪音、粗心的处理或一般存在反应不佳。\n\n让您的<color=green>手工艺人</color>用木屑稳定它，然后将其卷成炸药棒以便于破坏。\n\n请准备尽可能多的爆炸物。我们突然对实地研究非常感兴趣。"
zhTW = "太棒了。隨著石油生產、焦油準備和一般化學能力的建立，我們現在可以進入大家期待已久的時刻：\n\n該是炸得痛快的時候了！\n\n呃，請原諒我們的熱情。自從他們撤回我們對實驗室的進入權後，這裡的生活實在無聊的不得了。\n\n要生產炸藥，您首先需要甘油炸藥。您的<color=green>煉金術士</color>可以從葵花油和硝石合成。\n\n硝石可以從<color=green>原始礦坑</color>獲得。您應該已經擁有一個。如果沒有，請立即糾正這個令人不安的情況。\n\n如您所知，甘油炸藥對突然的運動、響亮的噪音、粗心的處理或一般的存在都有不良反應。\n\n讓您的<color=green>工藝師</color>用鋸屑穩定它，然後將其捲成炸藥棍，以便於進行摧毀。\n\n請準備儘可能多的爆炸物。我們突然對田野研究非常感興趣。"
ruRU = "Отлично. С установленным производством масла, подготовкой дегтя и общей химической компетентностью мы можем перейти к тому, чего мы все ждали:\n\nВРЕМЯ ВЗОРВАТЬ ЭТО!\n\nЭм, пожалуйста, простите наш энтузиазм. Вы бы не поверили, как здесь скучно с тех пор, как нам закрыли доступ в лабораторию.\n\nЧтобы произвести Динамит, вам сначала нужно Нитроглицерин. Ваш <color=green>Алхимик</color> может синтезировать его из Подсолнечного масла и Калийной соли.\n\nКалийную соль можно добыть в <color=green>Примитивной шахте</color>. У вас уже должна быть одна. Если нет, пожалуйста, немедленно исправьте эту тревожную ситуацию.\n\nКак вы, возможно, знаете, Нитроглицерин плохо реагирует на резкие движения, громкие звуки, неосторожное обращение или вообще существование.\n\nПусть ваш <color=green>Ремесленник</color> стабилизирует его с помощью древесной стружки, а затем скатайте в динамитные палочки для удобного разрушения.\n\nПожалуйста, подготовьте как можно больше взрывчатых веществ. Мы вдруг очень заинтересованы в полевых исследованиях."
jaJP = "素晴らしい。石油の生産、タールの準備、そして一般的な化学の能力を確立したので、私たちが皆待ち望んでいたことに進むことができます：\n\n爆破の時間です！\n\nえっと、私たちの熱意を許してください。実験室へのアクセスが取り消されて以来、ここがどれほど退屈か信じられないでしょう。\n\nダイナマイトを生産するには、まずニトログリセリンが必要です。あなたの<color=green>錬金術師</color>は、ひまわり油と硝石から合成できます。\n\n硝石は<color=green>原始鉱山</color>から入手できます。すでに一つ持っているはずです。もし持っていなければ、この深刻な状況をすぐに改善してください。\n\nニトログリセリンは、突然の動き、大きな音、扱いの不注意、または一般的な存在に対して反応が悪いことが知られています。\n\nあなたの<color=green>ハンディクラフター</color>に、それを木くずで安定させさせてから、便利な破壊のためにダイナマイトの棒に巻いてください。\n\nできるだけ多くの爆薬を用意してください。突然、フィールドリサーチに非常に興味があります。"
frFR = "Excellent. Avec la production d'huile, la préparation de goudron, et la compétence chimique générale établie, nous pouvons maintenant passer à ce que nous avons tous attendu :\n\nIL EST TEMPS DE FAIRE SAUTER DES CHOSES !\n\nEuh, veuillez pardonner notre enthousiasme. Vous n'imagineriez pas à quel point il est ennuyeux ici depuis qu'ils ont révoqué notre accès au laboratoire.\n\nPour produire de la dynamite, vous aurez d'abord besoin de nitroglycérine. Votre <color=green>Alchimiste</color> peut la synthétiser à partir d'huile de tournesol et de salpêtre.\n\nLe salpêtre peut être obtenu à partir d'une <color=green>Mine Primitive</color>. Vous devriez déjà en avoir une. Si ce n'est pas le cas, veuillez rectifier cette situation alarmante immédiatement.\n\nLa nitroglycérine, comme vous le savez peut-être, a tendance à mal réagir aux mouvements brusques, aux bruits forts, à une manipulation imprudente, ou à l'existence en général.\n\nFaites stabiliser la nitroglycérine par votre <color=green>Artisan</color> avec de la sciure de bois, puis enroulez-la en bâtons de dynamite pour une destruction pratique.\n\nVeuillez préparer le plus d'explosifs possible. Nous sommes soudainement très intéressés par la recherche sur le terrain."
deDE = "Ausgezeichnet. Mit der Ölproduktion, der Teerbereitung und der allgemeinen chemischen Kompetenz sind wir nun bereit für das, worauf wir alle gewartet haben:\n\nZEIT, UM ETWAS IN DIE LUFT ZU JAGEN!\n\nÄhm, bitte verzeihen Sie uns unsere Begeisterung. Sie würden nicht glauben, wie langweilig es hier ist, seitdem uns der Zugang zum Labor entzogen wurde.\n\nUm Dynamit herzustellen, benötigen Sie zuerst Nitroglycerin. Ihr <color=green>Alchemist</color> kann es aus Sonnenblumenöl und Salpeter synthetisieren.\n\nSalpeter kann aus einer <color=green>Primitiven Mine</color> gewonnen werden. Sie sollten bereits eine haben. Wenn nicht, korrigieren Sie bitte diese alarmierende Situation sofort.\n\nNitroglycerin, wie Sie vielleicht wissen, neigt dazu, schlecht auf plötzliche Bewegungen, laute Geräusche, unachtsame Handhabung oder die Existenz im Allgemeinen zu reagieren.\n\nLassen Sie Ihren <color=green>Handwerker</color> es mit Sägemehl stabilisieren und wickeln Sie es dann in Dynamitstöcke für eine bequeme Zerstörung.\n\nBitte bereiten Sie so viele Sprengstoffe wie möglich vor. Wir sind plötzlich sehr an Feldforschung interessiert."
plPL = "Doskonale. Dzięki produkcji oleju, przygotowaniu smółki i ogólnej kompetencji chemicznej możemy teraz przejść do tego, na co wszyscy czekaliśmy:\n\nCZAS NA ROZPIERDOL!\n\nEch, prosimy o wybaczenie naszego entuzjazmu. Nie uwierzysz, jak nudno jest tutaj, odkąd odebrano nam dostęp do laboratorium.\n\nAby produkować dynamit, najpierw będziesz potrzebować nitrogliceryny. Twój <color=green>Alchemik</color> może ją zsyntezować z oleju słonecznikowego i saletry.\n\nSaletrę można zdobyć w <color=green>Prymitywnej Kopalni</color>. Powinieneś już ją mieć. Jeśli nie, prosimy o natychmiastowe naprawienie tej alarmującej sytuacji.\n\nNitrogliceryna, jak być może wiesz, ma tendencję do reakcji negatywnych na nagłe ruchy, głośne dźwięki, niedbałe obchodzenie się bądź ogólnie na istnienie.\n\nNiech twój <color=green>Rzemieślnik</color> ustabilizuje ją z trocinami, a potem zroluje w fajerwerki dla wygodnego zniszczenia.\n\nProszę przygotować jak najwięcej ładunków wybuchowych. Nagle bardzo interesuje nas badanie w terenie."
ptBR = "Excelente. Com a produção de óleo, preparação de alcatrão e competência química geral estabelecidas, podemos agora prosseguir para o que todos estávamos esperando:\n\nHORA DE EXPLODIR TUDO!\n\nErm, por favor, perdoe nosso entusiasmo. Você não acreditaria em quão entediante é aqui desde que revogaram nosso acesso ao laboratório.\n\nPara produzir Dinamite, você primeiro precisará de Nitroglicerina. Seu <color=green>Alquimista</color> pode sintetizá-la a partir de Óleo de Girassol e Salitre.\n\nSalitre pode ser obtido em uma <color=green>Mineração Primitiva</color>. Você já deve ter uma. Se não, por favor, corrija essa situação alarmante imediatamente.\n\nA Nitroglicerina, como você deve saber, tende a reagir mal a movimentos repentinos, barulhos altos, manuseio descuidado ou à existência em geral.\n\nFaça com que seu <color=green>Artesão</color> estabilize-a com serragem, e depois enrole-a em bastões de dinamite para destruição conveniente.\n\nPor favor, prepare o máximo possível de explosivos. Estamos subitamente muito interessados em pesquisa de campo."
koKR = "훌륭합니다. 석유 생산, 타르 준비 및 일반 화학 능력이 확립되었으므로, 우리가 오래도록 기다려온 것으로 진행할 수 있습니다:\n\n폭파할 시간입니다!\n\n음, 우리의 열정을 용서해 주십시오. 실험실에 대한 접근이 취소된 이후 여기서 얼마나 지루한지 믿기 힘드실 겁니다.\n\n다이너마이트를 생산하려면 먼저 니트로글리세린이 필요합니다. 귀하의 <color=green>연금술사</color>가 해바라기 기름과 질산칼륨으로 이를 합성할 수 있습니다.\n\n질산칼륨은 <color=green>원시 광산</color>에서 얻을 수 있습니다. 이미 하나 가지고 있어야 합니다. 그렇지 않다면 이 심각한 상황을 즉시 바로잡아 주십시오.\n\n니트로글리세린은 갑작스러운 움직임, 큰 소음, 부주의한 처리 또는 일반적인 존재에 잘 반응하지 않는 것을 아실 겁니다.\n\n귀하의 <color=green>수공예가</color>에게 톱밥으로 안정화하도록 한 후, 편리한 파괴를 위해 다이너마이트 막대기로 말리십시오.\n\n가능한 한 많은 폭발물을 준비해 주십시오. 우리는 갑자기 현장 조사에 매우 관심이 많아졌습니다."
csCZ = "Vynikající. S výrobou oleje, přípravou dehtu a obecnou chemickou kompetencí na správném místě můžeme nyní přejít k tomu, na co jsme všichni čekali:\n\nČAS VYBUCHNOUT!\n\nEhm, prosím, odpusťte nám naše nadšení. Neuvěříte, jak nudné je to tady, od té doby, co nám odebrali přístup do laboratoře.\n\nK výrobě dynamitu budete nejprve potřebovat nitroglycerin. Váš <color=green>Alchymista</color> ho může syntetizovat z oleje ze slunečnice a dusičnanu draselného.\n\nDusičnan draselný lze získat z <color=green>Primární dolu</color>. Už byste ho měli mít. Pokud ne, prosím, okamžitě tuto znepokojivou situaci napravte.\n\nJak víte, nitroglycerin má tendenci špatně reagovat na náhlý pohyb, hlasité zvuky, neopatrné zacházení nebo samotnou existenci.\n\nNechte svého <color=green>Řemeslníka</color> stabilizovat ho pilinami, poté ho zformujte do dynamitových tyčí pro pohodlné ničení.\n\nProsím, připravte co nejvíce výbušnin. Najednou máme velký zájem o terénní výzkum."
viVN = "Xuất sắc. Với việc sản xuất dầu, chuẩn bị hắc ín, và năng lực hóa học chung đã được thiết lập, chúng ta có thể tiến tới điều mà tất cả chúng ta đang chờ đợi:\n\nTHỜI GIAN ĐỂ THÔI BÓNG NỔ!\n\nHừm, xin hãy tha lỗi cho sự nhiệt tình của chúng tôi. Bạn sẽ không tin nổi nơi đây buồn tẻ như thế nào kể từ khi họ thu hồi quyền truy cập vào phòng thí nghiệm.\n\nĐể sản xuất thuốc nổ, trước tiên bạn sẽ cần Nitroglycerin. <color=green>Nhà giả kim</color> của bạn có thể tổng hợp nó từ Dầu hướng dương và Kali nitrat.\n\nKali nitrat có thể được lấy từ một <color=green>Mỏ nguyên thủy</color>. Bạn nên đã có một cái. Nếu không, xin vui lòng khắc phục ngay tình huống đáng báo động này.\n\nNitroglycerin, như bạn có thể biết, thường phản ứng không tốt với chuyển động đột ngột, tiếng ồn lớn, xử lý cẩu thả, hoặc sự tồn tại nói chung.\n\nHãy để <color=green>Người thủ công</color> của bạn ổn định nó bằng mùn cưa, sau đó cuộn nó thành những thanh thuốc nổ để dễ dàng phá hủy.\n\nXin chuẩn bị càng nhiều thuốc nổ càng tốt. Chúng tôi đột nhiên rất quan tâm đến nghiên cứu thực địa."
trTR = "Harika. Yağ üretimi, katran hazırlanması ve genel kimyasal yeterlilik kurulduğuna göre, artık hepimizin beklediği şeye geçebiliriz:\n\nPATLATMA ZAMANI!\n\nEh, lütfen coşkumuzu affedin. Laboratuvar erişimimiz geri alındığından beri burada ne kadar sıkıcı olduğunu tahmin edemezsiniz.\n\nDinamiti üretmek için öncelikle Nitrogliserin'e ihtiyacınız var. <color=green>Alkemist</color>iniz bunu Ayçiçeği Yağı ve Tuz Madeninden sentezleyebilir.\n\nTuz Madenini <color=green>İlk Çağ Madeninden</color> elde edebilirsiniz. Zaten bir tane olmalı. Eğer yoksa, lütfen bu alarm verici durumu hemen düzeltin.\n\nNitrogliserin, bildiğiniz gibi, ani hareketlere, yüksek seslere, dikkatsiz taşımaya veya genel varlığa karşı pek iyi tepki vermez.\n\n<color=green>El Sanatçınızın</color> onu talaş ile stabilize etmesini sağlayın, ardından pratik yıkım için dinamit çubuklarına yuvarlayın.\n\nMümkün olduğunca çok patlayıcı hazırlayın. Aniden saha araştırmalarına çok ilgi duyuyoruz."

["Tutorial.ChemistryBranch.3FermentationBarrels.Whitepaws"]
raw = "Hello.\n\nI am currently answering messages on behalf of the Directorate of Applied Chemistry and Public Health.\n\nThe previous staff appear to have… vacated their positions. Quite suddenly. I really hope they didn't get into trouble again.\n\nThe authorities have asked that we immediately report any sightings of funny-smelling chemists who should not be left unsupervised around… well, anything really. Possibly pencils and paper.\n\nSpeaking of which, I have found a note instructing me to continue the chemical program. It says: “Next step: Brain-Boosting Salts.”\n\nIf I remember my classes correctly, this requires the production of <color=green>Alcohol</color>.\n\nTo obtain alcohol, you will first need fermentable ingredients. You may proceed in either of the following ways:\n\n- Plant <color=green>Rice</color> in <color=#00FFFF>shallow water</color> in the river.\n- Plant <color=green>Chestnut Trees</color> wherever they might look nice.\n\nThen please construct two additional stacks of Fermentation Barrels and configure them to produce either <color=green>Half-Fermented Sake</color> or <color=green>Chestnut Beer</color>, whichever is appropriate.\n\nYour settlers will probably attempt to drink those, but worry not — the following headaches will quickly teach them moderation."
status = "normal"
enUS = "Hello.\n\nI am currently answering messages on behalf of the Directorate of Applied Chemistry and Public Health.\n\nThe previous staff appear to have… vacated their positions. Quite suddenly. I really hope they didn't get into trouble again.\n\nThe authorities have asked that we immediately report any sightings of funny-smelling chemists who should not be left unsupervised around… well, anything really. Possibly pencils and paper.\n\nSpeaking of which, I have found a note instructing me to continue the chemical program. It says: “Next step: Brain-Boosting Salts.”\n\nIf I remember my classes correctly, this requires the production of <color=green>Alcohol</color>.\n\nTo obtain alcohol, you will first need fermentable ingredients. You may proceed in either of the following ways:\n\n- Plant <color=green>Rice</color> in <color=#00FFFF>shallow water</color> in the river.\n- Plant <color=green>Chestnut Trees</color> wherever they might look nice.\n\nThen please construct two additional stacks of Fermentation Barrels and configure them to produce either <color=green>Half-Fermented Sake</color> or <color=green>Chestnut Beer</color>, whichever is appropriate.\n\nYour settlers will probably attempt to drink those, but worry not — the following headaches will quickly teach them moderation."
zhCN = "你好。\n\n我目前正在代表应用化学和公共卫生局回复消息。\n\n之前的工作人员似乎已经……突然离职了。我真的希望他们没有再次惹上麻烦。\n\n当局要求我们立即报告任何可疑的有奇怪气味的化学家，他们不应在……好吧，任何东西旁边无人看管。可能是铅笔和纸。\n\n说到这个，我找到了一个便条，上面 instructs我继续化学项目。它写着：“下一步：增强大脑的盐。”\n\n如果我没记错的话，这需要生产<color=green>酒精</color>。\n\n要获得酒精，您首先需要可发酵的原料。您可以通过以下两种方式进行：\n\n- 在河里的<color=#00FFFF>浅水区</color>种植<color=green>水稻</color>。\n- 在任何合适的地方种植<color=green>栗子树</color>。\n\n然后请建造两个额外的发酵桶，并将其配置为生产<color=green>半发酵清酒</color>或<color=green>栗子啤酒</color>，具体取决于哪种更合适。\n\n你的定居者可能会试图饮用这些，但不用担心——接下来的头痛会很快教会他们适度消费。"
zhTW = "你好。\n\n我目前正在代表應用化學和公共衛生局回覆消息。\n\n前員工似乎… 突然離開了他們的職位。我真心希望他們沒有再次惹上麻煩。\n\n當局要求我們立即報告任何可疑的、氣味奇怪的化學家，這些人不應該在… 嗯，任何東西附近被忽視。可能是鉛筆和紙張。\n\n說到這，我發現了一張紙條，指示我繼續化學計畫。上面寫著：“下一步：增智鹽。”\n\n如果我沒記錯我的課程，這需要生產<color=green>酒精</color>。\n\n要獲得酒精，您首先需要可發酵成分。您可以通過以下兩種方式之一進行：\n\n- 在河中的<color=#00FFFF>淺水</color>中種植<color=green>稻米</color>。\n- 在任何看起來合適的地方種植<color=green>栗樹</color>。\n\n然後請建造另外兩堆發酵桶，並配置它們生產<color=green>半發酵清酒</color>或<color=green>栗子啤酒</color>，視情況而定。\n\n您的開拓者們可能會嘗試飲用這些，但不用擔心——隨之而來的頭痛會很快教會他們節制。"
ruRU = "Здравствуйте.\n\nВ настоящее время я отвечаю на сообщения от имени Дирекции прикладной химии и общественного здравоохранения.\n\nО предыдущем персонале, похоже, можно сказать, что они… покинули свои должности. Внезапно. Я действительно надеюсь, что они не попали в неприятности снова.\n\nВласти попросили нас немедленно сообщать о любых sightings забавных химиков с неприятным запахом, которых не следует оставлять без присмотра рядом с… ну, с чем угодно на самом деле. Возможно, с карандашами и бумагой.\n\nГоворя об этом, я нашел записку, в которой меня просят продолжить химическую программу. В ней написано: “Следующий шаг: Соли, улучшающие умственную деятельность.”\n\nЕсли я правильно помню свои занятия, для этого требуется производство <color=green>Алкоголя</color>.\n\nЧтобы получить алкоголь, вам сначала понадобятся ферментируемые ингредиенты. Вы можете поступить одним из следующих способов:\n\n- Посадите <color=green>Рис</color> в <color=#00FFFF>мелкой воде</color> в реке.\n- Посадите <color=green>Каштаны</color> в любом месте, где они будут выглядеть красиво.\n\nЗатем, пожалуйста, постройте две дополнительные линии бочек для ферментации и настройте их на производство либо <color=green>Полуферментированного саке</color>, либо <color=green>Каштанового пива</color>, в зависимости от ситуации.\n\nВаши поселенцы, вероятно, попытаются это выпить, но не беспокойтесь — последующие головные боли быстро научат их умеренности."
jaJP = "こんにちは。\n\n私は現在、応用化学および公衆衛生局を代表してメッセージに返信しています。\n\n前のスタッフは…突然、職務を離れたようです。彼らがまたトラブルに巻き込まれたのではないかと心配しています。\n\n当局からは、近くにいるべきではない奇妙な匂いを発する化学者を見かけた場合、すぐに報告するように求められています…本当に何に対しても。おそらく鉛筆や紙についてです。\n\nそれはさておき、化学プログラムを続けるよう指示するメモを見つけました。そこには「次のステップ：脳を活性化する塩」と書かれています。\n\n私の授業の記憶が正しければ、これは<color=green>アルコール</color>の生産を必要とします。\n\nアルコールを得るには、まず発酵可能な材料が必要です。以下のいずれかの方法で進めてください：\n\n- 川の<color=#00FFFF>浅い水</color>に<color=green>米</color>を植える。\n- <color=green>栗の木</color>を見栄えの良い場所に植える。\n\nその後、発酵タンクを2つ追加で建設し、<color=green>半発酵日本酒</color>または<color=green>栗ビール</color>のいずれかを生産するように設定してください。\n\nあなたの入植者はおそらくそれを飲もうとするでしょうが、心配しないでください — 次の日の頭痛が彼らに節度を教えてくれるでしょう。"
frFR = "Bonjour.\n\nJe réponds actuellement aux messages au nom de la Direction de la Chimie Appliquée et de la Santé Publique.\n\nIl semble que le personnel précédent ait… quitté ses fonctions. Assez soudainement. J'espère vraiment qu'il n'ont pas eu de problèmes à nouveau.\n\nLes autorités ont demandé que nous signalions immédiatement toute apparition de chimistes au drôle d'odeur qui ne devraient pas être laissés sans surveillance autour de… eh bien, de quoi que ce soit en réalité. Peut-être des crayons et du papier.\n\nÀ ce propos, j'ai trouvé une note m'instruisant de poursuivre le programme chimique. Elle dit : « Prochaine étape : Sels stimulants pour le cerveau. »\n\nSi je me souviens correctement de mes cours, cela nécessite la production de <color=green>Alcool</color>.\n\nPour obtenir de l'alcool, vous aurez d'abord besoin d'ingrédients fermentables. Vous pouvez procéder de l'une des manières suivantes :\n\n- Planter <color=green>du Riz</color> dans <color=#00FFFF>de l'eau peu profonde</color> dans la rivière.\n- Planter des <color=green>Châtaigniers</color> où cela pourrait être agréable.\n\nVeuillez ensuite construire deux autres piles de Fûts de Fermentation et les configurer pour produire soit <color=green>Saké à moitié fermenté</color> soit <color=green>Bière de Châtaigne</color>, selon ce qui est approprié.\n\nVos colons vont probablement essayer de les boire, mais ne vous inquiétez pas — les maux de tête suivants leur apprendront rapidement la modération."
deDE = "Hallo.\n\nIch beantworte gerade Nachrichten im Auftrag der Direktion für Angewandte Chemie und öffentliche Gesundheit.\n\nDas vorherige Personal scheint ihre Positionen… verlassen zu haben. Ganz plötzlich. Ich hoffe wirklich, dass sie nicht wieder in Schwierigkeiten geraten sind.\n\nDie Behörden haben uns gebeten, sofort jegliche Sichtungen von lustig riechenden Chemikern zu melden, die nicht unbeaufsichtigt in der Nähe von… nun ja, wirklich allem gelassen werden sollten. Möglicherweise Bleistifte und Papier.\n\nApropos, ich habe einen Zettel gefunden, der mir aufträgt, das chemische Programm fortzusetzen. Darauf steht: “Nächster Schritt: Gehirn-anregende Salze.”\n\nWenn ich mich recht an meinen Unterricht erinnere, erfordert dies die Produktion von <color=green>Alkohol</color>.\n\nUm Alkohol zu erhalten, benötigst du zuerst fermentierbare Zutaten. Du kannst auf eine der folgenden Arten vorgehen:\n\n- Pflanze <color=green>Reis</color> in <color=#00FFFF>flaches Wasser</color> im Fluss.\n- Pflanze <color=green>Esskastanienbäume</color> überall dort, wo sie gut aussehen könnten.\n\nBitte konstruiere dann zwei zusätzliche Stapel von Fermentationsfässern und konfiguriere sie so, dass sie entweder <color=green>halbfermentierten Sake</color> oder <color=green>Esskastanienbier</color> produzieren, je nachdem, was angebracht ist.\n\nDeine Siedler werden wahrscheinlich versuchen, das zu trinken, aber keine Sorge — die folgenden Kopfschmerzen werden ihnen schnell Mäßigung lehren."
plPL = "Witaj.\n\nObecnie odpowiadam na wiadomości w imieniu Dyrekcji Chemii Stosowanej i Zdrowia Publicznego.\n\nPoprzedni pracownicy najwyraźniej… opuścili swoje stanowiska. Dość nagle. Naprawdę mam nadzieję, że znowu nie wpadli w kłopoty.\n\nWładze poprosiły nas o natychmiastowe zgłaszanie wszelkich zauważonych chemików o dziwnym zapachu, którzy nie powinni pozostawać bez nadzoru w pobliżu… cóż, czegokolwiek w zasadzie. Możliwe, że ołówków i papieru.\n\nA propos, znalazłem notatkę instruującą mnie o kontynuowaniu programu chemicznego. Mówi: “Następny krok: Sól poprawiająca zdolności umysłowe.”\n\nJeśli dobrze pamiętam moje lekcje, wymaga to produkcji <color=green>Alkoholu</color>.\n\nAby uzyskać alkohol, najpierw będziesz potrzebować składników fermentowalnych. Możesz postąpić na jeden z poniższych sposobów:\n\n- Posadź <color=green>Ryż</color> w <color=#00FFFF>płytkiej wodzie</color> w rzece.\n- Posadź <color=green>Kasztanowce</color> tam, gdzie będą ładnie wyglądać.\n\nNastępnie proszę zbudować dwa dodatkowe stosy beczek fermentacyjnych i skonfigurować je do produkcji <color=green>Półfermentowanego Sake</color> lub <color=green>Piwa Kasztanowego</color>, w zależności od potrzeby.\n\nTwoi osadnicy prawdopodobnie spróbują to wypić, ale nie martw się — kolejne bóle głowy szybko nauczą ich umiaru."
ptBR = "Olá.\n\nAtualmente estou respondendo mensagens em nome da Diretoria de Química Aplicada e Saúde Pública.\n\nA equipe anterior parece ter... desocupado seus cargos. De maneira bastante repentina. Realmente espero que eles não tenham se metido em problemas novamente.\n\nAs autoridades pediram que relatem imediatamente qualquer avistamento de químicos com cheiro estranho que não devem ser deixados sem supervisão em torno de... bem, de qualquer coisa, na verdade. Possivelmente lápis e papel.\n\nFalando nisso, encontrei uma nota me instruindo a continuar o programa químico. Diz: “Próximo passo: Salts que Aumentam a Memória.”\n\nSe eu me lembro corretamente das minhas aulas, isso requer a produção de <color=green>Álcool</color>.\n\nPara obter álcool, você precisará primeiro de ingredientes fermentáveis. Você pode proceder de uma das seguintes maneiras:\n\n- Plante <color=green>Arroz</color> em <color=#00FFFF>água rasa</color> no rio.\n- Plante <color=green>Castanheiros</color> onde quer que eles fiquem bons.\n\nEntão, por favor, construa duas pilhas adicionais de Barris de Fermentação e configure-os para produzir <color=green>Sake Meio-Fermentado</color> ou <color=green>Cerveja de Castanha</color>, conforme apropriado.\n\nSeus colonos provavelmente tentarão beber isso, mas não se preocupe — as seguintes dores de cabeça rapidamente ensinarão a eles a moderação."
koKR = "안녕하세요.\n\n현재 응용 화학 및 공중 보건 이사회를 대신하여 메시지에 답변하고 있습니다.\n\n이전 직원들이 갑작스럽게… 자리를 비운 것 같습니다. 정말 그들이 다시 문제가 생기지 않았기를 바랍니다.\n\n당국에서는 즉시 감독 없이… 음, 뭐든지에 대해 방치해서는 안 되는 이상한 냄새가 나는 화학자를 목격할 경우 보고할 것을 요청했습니다. 아마 연필과 종이일 것입니다.\n\n그런 의미에서, 제가 화학 프로그램을 계속하라는 지시가 담긴 메모를 발견했습니다. 내용은 다음과 같습니다: “다음 단계: 뇌 활력 소금.”\n\n수업 내용을 잘 기억한다면, 이 과정에서 <color=green>알코올</color> 생산이 필요합니다.\n\n알코올을 얻으려면 먼저 발효 가능한 재료가 필요합니다. 다음의 방법 중 하나를 진행할 수 있습니다:\n\n- 강의 <color=#00FFFF>얕은 물</color>에서 <color=green>쌀</color>을 심으세요.\n- <color=green>밤나무</color>를 예쁘게 보일 수 있는 곳에 심으세요.\n\n그런 다음, 발효 통을 추가로 두 개 더 만들어서 각각 <color=green>반 발효된 사케</color> 또는 <color=green>밤맥주</color>를 생산하도록 구성해 주세요, 적절한 것을 선택하세요.\n\n정착민들은 아마 그것을 마시고 싶어할 것입니다, 하지만 걱정하지 마세요 — 다음 날의 두통이 그들에게 절제를 가르칠 것입니다."
csCZ = "Ahoj.\n\nV současné době odpovídám na zprávy jménem Ředitelství aplikované chemie a veřejného zdraví.\n\nPředchozí personál se zdá, že… opustil svá místa. Docela náhle. Opravdu doufám, že se nedostali do potíží znovu.\n\nÚřady požadovaly, abychom okamžitě hlásili jakékoliv výskyty chemiků s podivným zápachem, které bychom neměli nechávat bez dozoru kolem… no, vlastně čehokoliv. Pravděpodobně tužek a papíru.\n\nMimochodem, našel jsem poznámku, která mě instruuje, abych pokračoval v chemickém programu. Říká: „Další krok: Sůl zvyšující výkon mozku.“\n\nPokud si správně pamatuji své hodiny, to vyžaduje výrobu <color=green>alkoholu</color>.\n\nK získání alkoholu budete nejprve potřebovat fermentovatelné ingredience. Můžete pokračovat následujícími způsoby:\n\n- Zasaďte <color=green>rýži</color> do <color=#00FFFF>mělké vody</color> v řece.\n- Zasaďte <color=green>kaštanovníky</color> tam, kde by to mohlo vypadat hezky.\n\nPoté prosím postavte dvě další hromady kvasných sudů a nastavte je tak, aby produkovaly buď <color=green>polokvašené sake</color> nebo <color=green>kaštanové pivo</color>, podle toho, co je vhodné.\n\nVaši osadníci se pravděpodobně pokusí tyto nápoje vypít, ale nebojte se — následující bolesti hlavy je brzy naučí mírnosti."
viVN = "Xin chào.\n\nTôi hiện đang trả lời các tin nhắn thay mặt cho Cục Hóa học Ứng dụng và Y tế Công cộng.\n\nNhân viên trước đây dường như đã… rời bỏ vị trí của họ. Một cách khá đột ngột. Tôi thực sự hy vọng họ không gặp rắc rối lần nữa.\n\nCác cơ quan chức năng đã yêu cầu chúng tôi lập tức báo cáo về bất kỳ sự xuất hiện nào của các nhà hóa học có mùi kỳ lạ mà không nên để lại không có giám sát xung quanh… ừm, bất cứ thứ gì thực sự. Có thể là bút chì và giấy.\n\nNói về điều đó, tôi đã tìm thấy một ghi chú hướng dẫn tôi tiếp tục chương trình hóa học. Nó viết: “Bước tiếp theo: Muối Tăng Cường Não.”\n\nNếu tôi nhớ các bài học của mình một cách chính xác, điều này yêu cầu sản xuất <color=green>Rượu</color>.\n\nĐể có được rượu, trước tiên bạn sẽ cần các nguyên liệu có thể lên men. Bạn có thể tiến hành theo một trong những cách sau:\n\n- Trồng <color=green>Cây Gạo</color> trong <color=#00FFFF>nước nông</color> ở sông.\n- Trồng <color=green>Cây Nghệ</color> ở bất cứ đâu mà chúng trông đẹp.\n\nSau đó, vui lòng xây dựng hai dãy thùng lên men bổ sung và cấu hình chúng để sản xuất hoặc <color=green>Sake Nửa Lên Men</color> hoặc <color=green>Bia Nghệ</color>, tùy theo cái nào phù hợp.\n\nCác định cư của bạn có thể sẽ cố gắng uống chúng, nhưng đừng lo lắng — những cơn đau đầu tiếp theo sẽ nhanh chóng dạy họ sự điều độ."
trTR = "Merhaba.\n\nŞu anda Uygulamalı Kimya ve Kamu Sağlığı Müdürlüğü adına mesajlara cevap veriyorum.\n\nÖnceki personelin... görevlerinden ayrıldığı anlaşılıyor. Oldukça aniden. Umarım başları belaya girmemiştir.\n\nYetkililer, komik kokulu kimyacıların gözlemlenmesi halinde derhal haber vermemizi istedi. Onları yalnız bırakmamalıyız... aslında, neyin yanında olursa olsun. Muhtemelen kalemler ve kağıtlar da buna dahil.\n\nBu arada, kimyasal programı devam ettirmemi emreden bir not buldum. Yazıyor ki: “Sonraki adım: Beyin Güçlendirici Tuzlar.”\n\nDerslerimi doğru hatırlıyorsam, bunun için <color=green>Alkol</color> üretimi gerekecek.\n\nAlkol elde etmek için önce fermente edilebilir malzemelere ihtiyacınız olacak. Aşağıdaki iki şekilde ilerleyebilirsiniz:\n\n- Nehirde <color=#00FFFF>sığ suya</color> <color=green>Pirinç</color> ekin.\n- <color=green>Kestane Ağaçları</color> dikmek için güzel görünen yerlere gidin.\n\nSonra lütfen iki ek Fermentasyon Fıçısı inşa edin ve bunları <color=green>Yarı Fermente Sake</color> veya <color=green>Kestane Birası</color> üretmek üzere yapılandırın, hangisi uygunsa.\n\nGöçebeler bunları içmeye çalışacaklar, ama endişelenmeyin — sonraki baş ağrıları onlara ölçülü olmayı hızlı bir şekilde öğretecek."

["Tutorial.ChemistryBranch.BuildDistillery.Whitepaws"]
raw = "Good. With fermentation underway, we may now proceed to the next step.\n\nThe alcohol produced in your Fermentation Barrels must be refined through distillation.\n\nConstruct a Distillery and configure it accordingly.\n\nYou may already possess one, as the same facility is commonly used to produce Pollution Resistance Factor. If that is the case, we strongly recommend constructing a second Distillery.\n\nRunning out of PRF during a Badtide tends to produce very avoidable embarrassment.\n\nOnce <color=green>strong alcohol</color> becomes available, your <color=green>Alchemist</color> will be able to proceed with the preparation of <color=green>Brain-Boosting Salts</color>.\n\nThe chemical process is unfortunately classified, though it should have been included in your library set. This is apparently a precautionary measure.\n\nI could tell you why, but I… uuh… would need to review the protocol myself.\n\nI assure you I would never misuse it. Probably."
status = "normal"
enUS = "Good. With fermentation underway, we may now proceed to the next step.\n\nThe alcohol produced in your Fermentation Barrels must be refined through distillation.\n\nConstruct a Distillery and configure it accordingly.\n\nYou may already possess one, as the same facility is commonly used to produce Pollution Resistance Factor. If that is the case, we strongly recommend constructing a second Distillery.\n\nRunning out of PRF during a Badtide tends to produce very avoidable embarrassment.\n\nOnce <color=green>strong alcohol</color> becomes available, your <color=green>Alchemist</color> will be able to proceed with the preparation of <color=green>Brain-Boosting Salts</color>.\n\nThe chemical process is unfortunately classified, though it should have been included in your library set. This is apparently a precautionary measure.\n\nI could tell you why, but I… uuh… would need to review the protocol myself.\n\nI assure you I would never misuse it. Probably."
zhCN = "很好。在发酵进行中，我们可以进入下一步。\n\n在发酵桶中生产的酒精必须通过蒸馏进行提炼。\n\n建造一个蒸馏器并进行相应配置。\n\n你可能已经拥有一个，因为同样的设施通常用于生产污染抵抗因子。如果是这样，我们强烈建议再建造一个蒸馏器。\n\n在糟糕潮汐期间耗尽污染抵抗因子通常会造成非常不必要的尴尬。\n\n一旦<color=green>烈酒</color>可用，你的<color=green>炼金术士</color>将能够开始准备<color=green>增强思维盐</color>。\n\n不幸的是，这个化学过程被归类了，尽管它本应包含在你的资料库中。这显然是一种预防性措施。\n\n我可以告诉你为什么，但我…呃…需要自己检查一下协议。\n\n我向你保证我绝不会滥用它。可能。"
zhTW = "很好。隨著發酵的進行，我們可以進入下一步。\n\n在您的發酵桶中產生的酒精必須通過蒸餾來精煉。\n\n建造一個蒸餾廠並進行相應的配置。\n\n您可能已經擁有一個，因為同樣的設施通常用於生產污染抵抗因子。如果是這樣，我們強烈建議建造第二個蒸餾廠。\n\n在糟糕潮汐期間耗盡 PRF 通常會造成非常尷尬的局面。\n\n一旦 <color=green>強酒</color> 可用，您的 <color=green>煉金術士</color> 就能開始準備 <color=green>增智鹽</color>。\n\n化學過程不幸地被列為機密，不過這應該已經包含在您的資料庫中。這顯然是一項預防性措施。\n\n我可以告訴您原因，但我…呃…需要自己審查一下協議。\n\n我向您保證我絕對不會濫用它。大概。"
ruRU = "Хорошо. С началом ферментации мы можем перейти к следующему шагу.\n\nАлкоголь, произведенный в ваших ферментационных бочках, должен быть очищен с помощью дистилляции.\n\nПостройте дистиллятор и настройте его соответствующим образом.\n\nВозможно, он у вас уже есть, так как это же оборудование обычно используется для производства фактора устойчивости к загрязнению. Если это так, мы настоятельно рекомендуем построить второй дистиллятор.\n\nИстощение ФУЗ во время плохой潮ы обычно приводит к очень избежному неловкости.\n\nКак только <color=green>крепкий алкоголь</color> станет доступен, ваш <color=green>Алхимик</color> сможет приступить к приготовлению <color=green>Солей, улучшающих мозговую деятельность</color>.\n\nК сожалению, химический процесс является классифицированным, хотя он должен был быть включен в вашу библиотеку. Это, видимо, мера предосторожности.\n\nЯ мог бы рассказать, почему, но мне... эээ... нужно будет самому ознакомиться с протоколом.\n\nУверяю вас, я никогда бы его не использовал. Вероятно."
jaJP = "良いですね。発酵が進んでいるので、次のステップに進みましょう。\n\n発酵樽で生成されたアルコールは、蒸留によって精製する必要があります。\n\n蒸留所を建設し、適切に設定してください。\n\nすでに一つ持っているかもしれませんが、同じ施設は汚染耐性因子を生産するためにも一般的に使用されています。その場合、二つ目の蒸留所を建設することを強くお勧めします。\n\nバッドタイドの間にPRFが不足すると、非常に避けられる恥を引き起こすことがあります。\n\n<color=green>強いアルコール</color>が利用可能になれば、あなたの<color=green>錬金術師</color>は<color=green>脳を活性化する塩</color>の準備を進めることができます。\n\n残念ながら、その化学プロセスは機密扱いですが、あなたのライブラリーセットに含まれているはずです。これは明らかに予防措置です。\n\nその理由を教えることはできますが、私自身がプロトコルを見直す必要があります。\n\n決して不正に使用することはないと保証します。おそらく。"
frFR = "Bien. Avec la fermentation en cours, nous pouvons maintenant passer à l'étape suivante.\n\nL'alcool produit dans vos fûts de fermentation doit être raffiné par distillation.\n\nConstruisez une distillerie et configurez-la en conséquence.\n\nVous en possédez peut-être déjà une, car ce même bâtiment est couramment utilisé pour produire le facteur de résistance à la pollution. Si c'est le cas, nous vous recommandons fortement de construire une deuxième distillerie.\n\nManquer de facteur de résistance à la pollution pendant une marée mauvaise tend à produire des embarras très évitables.\n\nUne fois que <color=green>l'alcool fort</color> est disponible, votre <color=green>Alchimiste</color> pourra procéder à la préparation des <color=green>sels stimulant le cerveau</color>.\n\nLe processus chimique est malheureusement classé, bien qu'il aurait dû être inclus dans votre ensemble de bibliothèque. C'est apparemment une mesure de précaution.\n\nJe pourrais vous dire pourquoi, mais je… euh… devrais d'abord réviser le protocole moi-même.\n\nJe vous assure que je ne l'utiliserais jamais de manière inappropriée. Probablement."
deDE = "Gut. Mit der begonnenen Fermentation können wir nun zum nächsten Schritt übergehen.\n\nDer in Ihren Fermentationsfässern produzierte Alkohol muss durch Destillation verfeinert werden.\n\nBauen Sie eine Destillerie und konfigurieren Sie sie entsprechend.\n\nSie könnten bereits eine besitzen, da dieselbe Einrichtung häufig zur Produktion des Umweltverschmutzungsresistenzfaktors verwendet wird. Falls das der Fall ist, empfehlen wir dringend, eine zweite Destillerie zu bauen.\n\nWährend einer Badtide ohne PRF auszugehen, führt zu sehr vermeidbarem Peinlichkeiten.\n\nSobald <color=green>starker Alkohol</color> verfügbar ist, wird Ihr <color=green>Alchemist</color> in der Lage sein, mit der Herstellung von <color=green>Gehirnsteigernden Salzen</color> fortzufahren.\n\nDer chemische Prozess ist leider klassifiziert, sollte jedoch in Ihrem Bibliothekssatz enthalten sein. Dies ist offensichtlich eine Vorsichtsmaßnahme.\n\nIch könnte Ihnen sagen, warum, aber ich... äh... müsste das Protokoll selbst überprüfen.\n\nIch versichere Ihnen, dass ich es niemals missbrauchen würde. Wahrscheinlich."
plPL = "Dobrze. Gdy fermentacja postępuje, możemy przejść do następnego kroku.\n\nAlkohol produkowany w twoich beczkach fermentacyjnych musi zostać przefiltrowany poprzez destylację.\n\nZbuduj destylarnię i skonfiguruj ją odpowiednio.\n\nMożesz już posiadać jedną, ponieważ to samo urządzenie jest powszechnie używane do produkcji Współczynnika Odporności na Zanieczyszczenia. Jeśli tak jest, zdecydowanie zalecamy zbudowanie drugiej destylarni.\n\nBrak PRF podczas Badtide zazwyczaj prowadzi do bardzo nieprzyjemnych sytuacji.\n\nGdy <color=green>mocny alkohol</color> stanie się dostępny, twój <color=green>Alchemik</color> będzie mógł przystąpić do przygotowania <color=green>Sol Ahugodnych Mózgów</color>.\n\nProces chemiczny jest niestety klasyfikowany, chociaż powinien być zawarty w twoim zbiorze bibliotecznym. Jest to najwyraźniej środek ostrożności.\n\nMógłbym ci powiedzieć dlaczego, ale… uuh… musiałbym sam sprawdzić protokół.\n\nZapewniam cię, że nigdy bym tego nie nadużył. Prawdopodobnie."
ptBR = "Bom. Com a fermentação em andamento, podemos prosseguir para o próximo passo.\n\nO álcool produzido em seus Barris de Fermentação deve ser refinado através da destilação.\n\nConstrua uma Destilaria e configure-a adequadamente.\n\nVocê pode já possuir uma, já que a mesma instalação é comumente usada para produzir o Fator de Resistência à Poluição. Se esse for o caso, recomendamos fortemente a construção de uma segunda Destilaria.\n\nFicar sem PRF durante uma Maré Alta tende a produzir um constrangimento muito evitável.\n\nUma vez que <color=green>álcool forte</color> esteja disponível, seu <color=green>Alquimista</color> poderá prosseguir com a preparação dos <color=green>Sais Estimulantes do Cérebro</color>.\n\nO processo químico é, infelizmente, classificado, embora devesse ter sido incluído no seu conjunto de biblioteca. Isso é aparentemente uma medida de precaução.\n\nEu poderia te dizer por quê, mas eu… uuh… precisaria revisar o protocolo eu mesmo.\n\nAcredito que eu nunca o utilizaria de forma inadequada. Provavelmente."
koKR = "좋습니다. 발효가 시작되었으니 이제 다음 단계로 진행할 수 있습니다.\n\n발효 바렐에서 생산된 알코올은 증류를 통해 정제되어야 합니다.\n\n증류소를 건설하고 적절히 구성하십시오.\n\n이미 하나를 보유하고 있을 수 있으며, 같은 시설이 오염 저항 요인을 생산하는 데 일반적으로 사용됩니다. 그런 경우에는 두 번째 증류소를 건설하는 것을 강력히 권장합니다.\n\n나쁜 조수 중에 PRF가 부족해지는 것은 매우 피할 수 있는 곤란함을 초래하는 경향이 있습니다.\n\n<color=green>강한 알코올</color>이 사용 가능해지면, 귀하의 <color=green>연금술사</color>는 <color=green>뇌 강화 소금</color>의 준비를 진행할 수 있습니다.\n\n화학 과정은 불행히도 기밀로 분류되어 있지만, 귀하의 라이브러리 세트에 포함되었어야 했습니다. 이는 명백히 예방 조치입니다.\n\n그 이유를 말씀드릴 수 있지만, 그… 음… 저도 프로토콜을 다시 검토해야 할 것 같습니다.\n\n절대 잘못 사용할 생각은 없다는 것을 확신합니다. 아마도."
csCZ = "Dobře. Jakmile fermentace probíhá, můžeme pokračovat na další krok.\n\nAlkohol vyrobený ve vašich fermentačních sudech musí být rafinován destilací.\n\nVybudujte destilerii a nakonfigurujte ji podle potřeby.\n\nMožná už jednu máte, protože stejná zařízení se běžně používají k výrobě faktoru odolnosti proti znečištění. Pokud je tomu tak, důrazně doporučujeme postavit druhou destilerii.\n\nVyběhnout z PRF během špatných přílivů obvykle způsobuje velmi vyhnutelnou ostudu.\n\nJakmile bude k dispozici <color=green>silný alkohol</color>, váš <color=green>alkemist</color> bude schopen pokračovat v přípravě <color=green>solí zlepšujících činnost mozku</color>.\n\nChemický proces je bohužel klasifikovaný, ačkoli by měl být zahrnut ve vaší knihovně. To je zjevně preventivní opatření.\n\nMohl bych vám říci proč, ale… uhh… potřeboval bych si sám zkontrolovat protokol.\n\nUjišťuji vás, že bych to nikdy nezneužil. Pravděpodobně."
viVN = "Tốt. Với quá trình lên men đang diễn ra, chúng ta có thể tiến tới bước tiếp theo.\n\nRượu được sản xuất trong các thùng lên men của bạn cần phải được tinh chế thông qua chưng cất.\n\nXây dựng một Nhà máy chưng cất và cấu hình nó cho phù hợp.\n\nBạn có thể đã sở hữu một cái, vì cơ sở giống hệt này thường được sử dụng để sản xuất Yếu tố Kháng ô nhiễm. Nếu đúng như vậy, chúng tôi rất khuyên bạn nên xây dựng một Nhà máy chưng cất thứ hai.\n\nHết Yếu tố Kháng ô nhiễm trong thời gian Badtide thường dẫn đến sự xấu hổ có thể tránh khỏi.\n\nKhi <color=green>rượu mạnh</color> có sẵn, <color=green>Nhà giả kim</color> của bạn sẽ có thể tiến hành chuẩn bị <color=green>Muối Tăng cường Não</color>.\n\nQuá trình hóa học này đáng tiếc là được phân loại, mặc dù nó lẽ ra đã được đưa vào bộ thư viện của bạn. Rõ ràng đây là một biện pháp phòng ngừa.\n\nTôi có thể nói cho bạn biết tại sao, nhưng tôi... ừm... sẽ cần phải xem lại quy trình một cách riêng.\n\nTôi đảm bảo rằng tôi sẽ không bao giờ lạm dụng nó. Có lẽ."
trTR = "İyi. Fermentasyon başladı, şimdi bir sonraki aşamaya geçebiliriz.\n\nFermentasyon Varillerinizde üretilen alkol, damıtma yoluyla rafine edilmelidir.\n\nBir Damıtımevi inşa edin ve bunu uygun şekilde yapılandırın.\n\nZaten birine sahip olabilirsiniz, çünkü aynı tesis genellikle Kirlilik Direnci Faktörü üretmek için kullanılır. Bu durumda, ikinci bir Damıtımevi inşa etmenizi şiddetle tavsiye ederiz.\n\nBir Kötü Gelgit sırasında PRF'nin bitmesi, oldukça önlenebilir bir utanç yaratır.\n\n<color=green>Güçlü alkol</color> mevcut olduğunda, <color=green>Simyacınız</color> <color=green>Beyin Güçlendirici Tuzlar</color> hazırlama işlemlerine başlayabilecektir.\n\nKimyasal süreç maalesef gizlidir, ancak kütüphanenizde bulunması gerekirdi. Bu, görünüşe göre bir tedbir önlemidir.\n\nSize nedenini söyleyebilirim ama… uhh… protokolü kendim gözden geçirmem gerekecek.\n\nSize asla kötüye kullanmayacağımı temin ederim. Muhtemelen."

["Tutorial.ChemistryBranch.BrainsaltBurner.Whitepaws"]
raw = "Congratulations.\n\nYour ability to follow instructions has allowed you to reach the final step of this chemical program. You would be surprised to learn how uncommon that talent is. I certainly was.\n\nBrain-Boosting Salts, when used properly, are a powerful cognitive stimulant. They help trained specialists such as <color=green>architects</color> and <color=green>mechanics</color> remain focused during intellectually demanding work, or simply settlers engaged in study at the <color=green>library</color> — assuming any of them have time for that.\n\nAnother practical use of this compound is the construction of an Aromatic Burner.\n\nThis structure gently warms the salts and releases stimulating vapors into the surrounding area, allowing nearby beavers to benefit from their effects without the need for direct handling. Direct inhalation of the salts is strongly discouraged, but appears to be statistically unavoidable.\n\nPlease construct at least one Aromatic Burner and place it wherever its pleasant aroma seems appropriate.\n\nI hope you do not have further questions because… well, this Directorate appears to be no longer functional.\n\nYou might, however, be able to obtain assistance by placing dynamite sticks over a pitfall trap. I found some of your earlier correspondence."
status = "normal"
enUS = "Congratulations. \n\nYour ability to follow instructions has allowed you to reach the final step of this chemical program. You would be surprised to learn how uncommon that talent is. I certainly was. \n\nBrain-Boosting Salts, when used properly, are a powerful cognitive stimulant. They help trained specialists such as <color=green>architects</color> and <color=green>mechanics</color> remain focused during intellectually demanding work, or simply settlers engaged in study at the <color=green>library</color> — assuming any of them have time for that. \n\nAnother practical use of this compound is the construction of an Aromatic Burner. \n\nThis structure gently warms the salts and releases stimulating vapors into the surrounding area, allowing nearby beavers to benefit from their effects without the need for direct handling. Direct inhalation of the salts is strongly discouraged, but appears to be statistically unavoidable. \n\nPlease construct at least one Aromatic Burner and place it wherever its pleasant aroma seems appropriate. \n\nI hope you do not have further questions because… well, this Directorate appears to be no longer functional. \n\nYou might, however, be able to obtain assistance by placing dynamite sticks over a pitfall trap. I found some of your earlier correspondence."
zhCN = "恭喜。\n\n你遵循指示的能力使你达到了这个化学程序的最后一步。你会惊讶于这种才能是多么不常见。我确实感到吃惊。\n\n脑部提升盐在正确使用时，是一种强大的认知刺激剂。它们可以帮助像 <color=green>建筑师</color> 和 <color=green>机械师</color> 这样的受过训练的专业人士在智力要求高的工作中保持专注，或者仅仅是那些在 <color=green>图书馆</color> 学习的定居者——假设他们有时间做这件事。\n\n这种化合物的另一个实际用途是建造一种芳香炉。\n\n这个结构温和地加热盐，释放刺激的蒸汽到周围环境中，让附近的海狸可以受益于其效果，而无需直接接触。强烈不建议直接吸入盐，但似乎统计上这是无法避免的。\n\n请至少建造一个芳香炉，并将其放置在其宜人香气显得合适的地方。\n\n我希望你没有其他问题，因为……这所局似乎已经不再运作。\n\n然而，你可能能够通过将炸药放在深坑陷阱上来获得帮助。我发现了一些你之前的通信。"
zhTW = "恭喜。\n\n您能夠遵循指示，讓您達到了這個化學計劃的最後一步。您會驚訝地發現這種才能是多麼罕見。我肯定感到驚訝。\n\n當正確使用時，腦部增強鹽是一種強效的認知刺激劑。它們有助於訓練有素的專家，例如<color=green>建築師</color>和<color=green>技工</color>在智力要求高的工作中保持專注，或僅僅是參與<color=green>圖書館</color>學習的定居者——假設他們有時間這樣做。\n\n這種化合物的另一個實用用途是建造芳香燃燒器。\n\n這個結構會輕輕加熱鹽並釋放刺激性氣體到周圍區域，使附近的海狸能夠在不直接接觸的情況下獲得它們的效果。強烈不建議直接吸入鹽，但統計顯示這似乎是不可避免的。\n\n請至少建造一個芳香燃燒器，並將其放置在任何適合其愉悅香氣的地方。\n\n我希望您沒有進一步的問題，因為……這個主任處似乎已經不再運作。\n\n不過，您可能可以透過將炸藥棒放在陷阱上獲得幫助。我找到了一些您之前的通信。"
ruRU = "Поздравляю.\n\nВаше умение следовать инструкциям позволило вам достичь последнего шага этой химической программы. Вы были бы удивлены узнать, насколько редким является этот талант. Я, безусловно, был удивлён.\n\nСоляные препараты для повышения интеллекта, при правильном использовании, являются мощным когнитивным стимулятором. Они помогают подготовленным специалистам, таким как <color=green>архитекторы</color> и <color=green>механики</color>, оставаться сосредоточенными во время интеллектуально требовательной работы, или просто поселенцам, занимающимся учёбой в <color=green>библиотеке</color> — если у кого-то из них на это есть время.\n\nЕще одно практическое применение этого состава — это строительство Ароматического Бойлера.\n\nЭта структура мягко нагревает соли и выделяет стимулирующие пары в окружающую среду, позволяя ближайшим бобрам извлекать из них пользу без необходимости прямого взаимодействия. Прямое вдыхание солей сильно не рекомендуется, но, по статистике, кажется, неизбежно.\n\nПожалуйста, постройте как минимум один Ароматический Бойлер и разместите его там, где его приятный аромат кажется уместным.\n\nНадеюсь, у вас больше нет вопросов, потому что... ну, похоже, это Дирекция больше не функционирует.\n\nТем не менее, вы можете получить помощь, разместив динамит над ловушкой для падений. Я нашёл некоторые из ваших предыдущих переписок."
jaJP = "おめでとうございます。\n\n指示に従う能力のおかげで、この化学プログラムの最終ステップに到達しました。その才能がどれほど珍しいか驚くことでしょう。私も驚きました。\n\n適切に使用されると、脳を活性化する塩は強力な認知刺激剤です。<color=green>建築家</color>や<color=green>技術者</color>のようなトレーニングを受けた専門家が、知的に要求される作業中に集中力を維持するのを助けたり、単に<color=green>図書館</color>で勉強をしている入植者がそれを活用するのに役立ちます — もちろん、彼らがその時間を持っていると仮定した場合ですが。\n\nこの化合物のもう一つの実用的な用途は、アロマバーナーの建設です。\n\nこの構造物は、塩を優しく温めて刺激的な蒸気を周囲に放出し、近くのビーバーが直接取り扱うことなくその効果を享受できるようにします。塩の直接吸入は強く推奨されませんが、統計的に回避できないようです。\n\n少なくとも1つのアロマバーナーを建設し、その心地よい香りが適切と思われる場所に設置してください。\n\nさらなる質問がないことを願いますが… その…この局はもう機能していないようです。\n\nただし、落とし穴の上にダイナマイトを置くことで助けを得ることができるかもしれません。あなたの以前の通信のいくつかを見つけました。"
frFR = "Félicitations.\n\nVotre capacité à suivre des instructions vous a permis d'atteindre la dernière étape de ce programme chimique. Vous seriez surpris d'apprendre à quel point ce talent est rare. Je l'étais certainement.\n\nLes sels stimulant le cerveau, lorsqu'ils sont utilisés correctement, sont un puissant stimulant cognitif. Ils aident les spécialistes formés tels que les <color=green>architectes</color> et les <color=green>mécaniciens</color> à rester concentrés lors de travaux intellectuellement exigeants, ou simplement les colons engagés dans des études à la <color=green>bibliothèque</color> — à condition que l'un d'eux ait le temps pour cela.\n\nUne autre utilisation pratique de ce composé est la construction d'un Brûleur Aromatique.\n\nCette structure réchauffe doucement les sels et libère des vapeurs stimulantes dans la zone environnante, permettant aux castors à proximité de bénéficier de leurs effets sans avoir besoin d'un contact direct. L'inhalation directe des sels est fortement déconseillée, mais semble être statistiquement inévitable.\n\nVeuillez construire au moins un Brûleur Aromatique et le placer là où son arôme agréable semble approprié.\n\nJ'espère que vous n'avez pas d'autres questions car… eh bien, cette direction semble ne plus être fonctionnelle.\n\nVous pourriez cependant être en mesure d'obtenir de l'aide en plaçant des bâtons de dynamite sur un piège à chute. J'ai trouvé une partie de votre correspondance précédente."
deDE = "Herzlichen Glückwunsch.\n\nIhre Fähigkeit, Anweisungen zu befolgen, hat es Ihnen ermöglicht, den letzten Schritt dieses chemischen Programms zu erreichen. Sie würden überrascht sein zu erfahren, wie selten dieses Talent ist. Ich war es jedenfalls.\n\nGehirn-Boostende Salze, wenn sie richtig eingesetzt werden, sind ein kraftvoller kognitiver Stimulans. Sie helfen ausgebildeten Spezialisten wie <color=green>Architekten</color> und <color=green>Mechanikern</color>, während intellektuell anspruchsvoller Arbeit fokussiert zu bleiben, oder einfach Siedlern, die im <color=green>Bibliothek</color> studieren – vorausgesetzt, sie haben überhaupt Zeit dafür.\n\nEine weitere praktische Verwendung dieser Verbindung ist der Bau eines Aromatischen Brenners.\n\nDiese Struktur erwärmt die Salze sanft und setzt stimulierende Dämpfe in der Umgebung frei, sodass benachbarte Biber von deren Wirkungen profitieren können, ohne dass direkte Handhabung erforderlich ist. Die direkte Inhalation der Salze wird dringend abgeraten, scheint aber statistisch unvermeidlich zu sein.\n\nBitte bauen Sie mindestens einen Aromatischen Brenner und platzieren Sie ihn dort, wo sein angenehmer Duft passend erscheint.\n\nIch hoffe, Sie haben keine weiteren Fragen, denn… nun, diese Direktion scheint nicht mehr funktionsfähig zu sein.\n\nSie könnten jedoch in der Lage sein, Hilfe zu erhalten, indem Sie Dynamitstangen über einer Fallstrickfalle platzieren. Ich habe einige Ihrer früheren Korrespondenzen gefunden."
plPL = "Gratulacje.\n\nTwoja zdolność do przestrzegania instrukcji umożliwiła ci osiągnięcie ostatniego kroku tego programu chemicznego. Byłbyś zaskoczony, gdybyś się dowiedział, jak rzadki jest ten talent. Ja byłem z pewnością.\n\nSole wspomagające procesy myślowe, gdy są używane prawidłowo, są potężnym stymulantem poznawczym. Pomagają wyszkolonym specjalistom, takim jak <color=green>architekci</color> i <color=green>mechanicy</color>, pozostać skoncentrowanym podczas intelektualnie wymagającej pracy, lub po prostu osadnikom zajmującym się nauką w <color=green>bibliotece</color> — zakładając, że mają na to czas.\n\nInnym praktycznym zastosowaniem tego związku jest budowa Aromatycznego Palnika.\n\nTa struktura łagodnie podgrzewa sole i uwalnia stymulujące opary do otaczającego obszaru, pozwalając pobliskim bobrom korzystać z ich efektów bez potrzeby bezpośredniego kontaktu. Bezpośrednie wdychanie soli jest zdecydowanie odradzane, ale wydaje się być statystycznie nieuniknione.\n\nProszę zbudować przynajmniej jeden Aromatyczny Palnik i umieścić go tam, gdzie jego przyjemny aromat wydaje się odpowiedni.\n\nMam nadzieję, że nie masz więcej pytań, ponieważ… cóż, to Dyrekcja wydaje się już nie funkcjonować.\n\nMożesz jednak być w stanie uzyskać pomoc, kładąc kawałki dynamitu nad pułapką na doły. Znalazłem część twojej wcześniejszej korespondencji."
ptBR = "Parabéns.\n\nSua capacidade de seguir instruções permitiu que você chegasse à etapa final deste programa químico. Você ficaria surpreso ao saber quão incomum esse talento é. Eu certamente fiquei.\n\nOs sais de aumento cerebral, quando usados corretamente, são um poderoso estimulante cognitivo. Eles ajudam especialistas treinados, como <color=green>arquitetos</color> e <color=green>mecânicos</color>, a se manterem focados durante trabalhos intelectualmente exigentes, ou simplesmente colonos envolvidos em estudos na <color=green>biblioteca</color> — supondo que algum deles tenha tempo para isso.\n\nOutro uso prático desse composto é a construção de um Queimador Aromático.\n\nEssa estrutura aquece suavemente os sais e libera vapores estimulantes na área circundante, permitindo que os castores próximos se beneficiem de seus efeitos sem a necessidade de manuseio direto. A inalação direta dos sais é fortemente desencorajada, mas parece ser estatisticamente inevitável.\n\nPor favor, construa pelo menos um Queimador Aromático e coloque-o onde seu aroma agradável parecer apropriado.\n\nEspero que você não tenha mais perguntas porque... bem, esta Diretoria parece não estar mais funcional.\n\nVocê pode, no entanto, conseguir assistência colocando explosivos sobre uma armadilha de queda. Encontrei algumas de suas correspondências anteriores."
koKR = "축하합니다.\n\n지침을 따를 수 있는 능력 덕분에 이 화학 프로그램의 마지막 단계에 도달하셨습니다. 그 능력이 얼마나 드문지 알면 놀라실 겁니다. 저도 정말 놀랐습니다.\n\n브레인 부스팅 염분은 올바르게 사용될 때 강력한 인지 자극제입니다. 이는 <color=green>건축가</color>와 <color=green>기계공</color>와 같은 전문 교육을 받은 전문가들이 지적으로 요구되는 작업 중 집중력을 유지하도록 돕거나, 단순히 <color=green>도서관</color>에서 공부하는 정착민들이 참여하는 데 도움을 줍니다 — 그들 중 누군가 시간이 있기를 바라는 가정 하에.\n\n이 화합물의 또 다른 실용적인 용도는 향기로운 버너를 만드는 것입니다.\n\n이 구조물은 염분을 부드럽게 가열하고 주변 지역으로 자극적인 증기를 방출하여 근처의 비버들이 직접 다루지 않고도 그 효과를 누릴 수 있도록 합니다. 염분의 직접 흡입은 강력히 권장되지 않지만, 통계적으로 피할 수 없는 것처럼 보입니다.\n\n최소한 하나의 향기로운 버너를 만들고 그 Pleasant한 향기가 적절해 보이는 곳에 배치해 주시기 바랍니다.\n\n더 이상의 질문이 없기를 바라지만… 글쎄요, 이 국은 더 이상 기능하지 않는 것 같습니다.\n\n하지만 당신은 구덩이 함정 위에 다이너마이트 막대를 놓음으로써 도움을 받을 수 있을지도 모릅니다. 당신의 이전 서신 중 일부를 발견했습니다."
csCZ = "Gratulujeme.\n\nVaše schopnost dodržovat pokyny vám umožnila dosáhnout posledního kroku tohoto chemického programu. Byli byste překvapeni, jak vzácný je tento talent. Já určitě ano.\n\nSůl na zvyšování inteligence, pokud je používána správně, je mocný kognitivní stimulant. Pomáhá vyškoleným specialistům, jako jsou <color=green>architekti</color> a <color=green>mechanici</color>, zůstat soustředěnými během intelektuálně náročné práce, nebo jednoduše osadníkům, kteří se zabývají studiem v <color=green>knihovně</color> — za předpokladu, že na to mají čas.\n\nDalším praktickým využitím této sloučeniny je konstrukce Aromatického hořáku.\n\nTato struktura jemně zahřívá soli a uvolňuje stimulující páry do okolního prostoru, což umožňuje blízkým bobrům těžit z jejich účinků, aniž by bylo potřeba přímého zacházení. Přímé vdechování solí je silně odrazováno, ale zdá se, že je statisticky nevyhnutelné.\n\nProsím, postavte alespoň jeden Aromatický hořák a umístěte ho tam, kde se jeho příjemná vůně zdá být vhodná.\n\nDoufám, že nemáte další otázky, protože… no, tato Ředitelství se zdá být už nefunkční.\n\nMůžete však získat pomoc umístěním dynamitových tyčí na pasti. Nalezl jsem některé vaše dřívější korespondence."
viVN = "Xin chúc mừng.\n\nKhả năng của bạn trong việc làm theo hướng dẫn đã cho phép bạn đạt đến bước cuối cùng của chương trình hóa học này. Bạn sẽ ngạc nhiên khi biết tài năng này không phổ biến như vậy đâu. Tôi thì chắc chắn có.\n\nMuối tăng cường trí não, khi được sử dụng đúng cách, là một loại thuốc kích thích nhận thức mạnh mẽ. Chúng giúp các chuyên gia được đào tạo như <color=green>kiến trúc sư</color> và <color=green>cơ khí</color> giữ được sự tập trung trong công việc yêu cầu trí tuệ cao, hoặc đơn giản là những người định cư đang học tại <color=green>thư viện</color> — giả sử có ai trong số họ có thời gian cho điều đó.\n\nMột ứng dụng thực tiễn khác của hợp chất này là xây dựng một Lò Nướng Hương.\n\nCấu trúc này nhẹ nhàng làm ấm muối và giải phóng những hơi nước kích thích vào khu vực xung quanh, cho phép những con beaver gần đó hưởng lợi từ tác dụng của chúng mà không cần phải xử lý trực tiếp. Việc hít phải muối trực tiếp là điều rất không khuyến khích, nhưng có vẻ như là không thể tránh khỏi theo thống kê.\n\nHãy xây dựng ít nhất một Lò Nướng Hương và đặt nó ở bất kỳ đâu mà hương thơm dễ chịu của nó có vẻ phù hợp.\n\nTôi hy vọng bạn không có câu hỏi nào thêm vì… vâng, Cơ quan này có vẻ như không còn hoạt động nữa.\n\nBạn có thể, tuy nhiên, có thể nhận được sự trợ giúp bằng cách đặt các que thuốc nổ lên một cái bẫy. Tôi đã tìm thấy một số lá thư trước đó của bạn."
trTR = "Tebrikler.\n\nTalimatları takip etme yeteneğiniz, sizi bu kimyasal programın son aşamasına ulaştırdı. Bu yeteneğin ne kadar nadir olduğunu öğrendiğinizde şaşıracaksınız. Ben kesinlikle şaşırdım.\n\nBeyin Güçlendirici Tuzlar, düzgün kullanıldığında, güçlü bir bilişsel uyarıcıdır. Bu tuzlar, <color=green>mimarlar</color> ve <color=green>teknisyenler</color> gibi eğitimli uzmanların entelektüel olarak zorlayıcı işlerde odaklanmalarına yardımcı olur veya <color=green>kütüphane</color>de öğrenim gören yerleşimciler için faydalıdır—tabii ki onlardan herhangi birinin buna vakti varsa.\n\nBu bileşiğin bir diğer pratik kullanımı, Aromatik Brülör'ün inşasıdır.\n\nBu yapı, tuzları nazikçe ısıtarak çevredeki alana uyarıcı buharlar salar ve böylece yakınındaki kunduzların doğrudan elle tutulması gerekmeksizin bu faydalardan yararlanmasını sağlar. Tuzların doğrudan solunması kesinlikle tavsiye edilmez, ama istatistiksel olarak kaçınılmaz gibi görünmektedir.\n\nLütfen en az bir Aromatik Brülör inşa edin ve hoş bir aromasının uygun göründüğü bir yere yerleştirin.\n\nBaşka sorularınızın olmadığını umuyorum çünkü… bu Müdürlüğün artık işlevsel olmadığı anlaşılıyor.\n\nAncak, bir çukur tuzağın üzerine patlayıcı yerleştirerek yardım almayı deneyebilirsiniz. Önceki yazışmalarınızdan bazılarını buldum."

["Tutorial.MechanicBranch.MechanicText.Whitepaws"]
raw = "Primitive industry has served its purpose. The next stage requires precision.\n\nThis branch concerns the production of <color=green>Gears</color>, expansion of mechanical power networks, and the refinement of industrial systems beyond their initial limitations.\n\nWith proper gearing, power may be transmitted further, machinery may be improved, and <color=green>Water Pumps</color> may be upgraded.\n\nWhen you are prepared to replace improvisation with engineering, follow up on this directive.\n\nRotation is the lifeforce of machines."
status = "normal"
enUS = "Primitive industry has served its purpose. The next stage requires precision.\n\nThis branch concerns the production of <color=green>Gears</color>, the expansion of mechanical power networks, and the refinement of industrial systems beyond their initial limitations.\n\nWith proper gearing, power may be transmitted further, machinery may be improved, and <color=green>Water Pumps</color> may be upgraded.\n\nWhen you are prepared to replace improvisation with engineering, follow up on this directive.\n\nRotation is the lifeforce of machines."
zhCN = "“原始工业已经完成了它的使命。下一阶段需要精准。\n\n这一分支涉及<color=green>齿轮</color>的生产、机械动力网络的扩展，以及超越初始限制的工业系统的精炼。\n\n通过合适的齿轮，动力可以更远地传输，机器可以得到改进，<color=green>水泵</color>可以升级。\n\n当你准备好用工程替代临时拼凑时，请遵循这一指令。\n\n旋转是机器的生命力。”"
zhTW = "原始工業已經達到了它的目的。下一個階段需要精確。\n\n這一分支關注<color=green>齒輪</color>的生產、機械能源網絡的擴展，以及超越初始限制的工業系統的精煉。\n\n透過適當的齒輪傳動，能量可以更遠地傳輸，機械設備可以得到改善，並且<color=green>水泵</color>可以進行升級。\n\n當你準備好用工程取代即興創作時，請遵循這項指令。\n\n旋轉是機器的生命力。"
ruRU = "Примитивная промышленность выполнила свою задачу. Следующий этап требует точности.\n\nЭта ветка касается производства <color=green>Шестерён</color>, расширения сетей механической мощности и усовершенствования промышленных систем за пределами их первоначальных ограничений.\n\nС правильной передачей мощности, энергия может передаваться дальше, машины могут быть улучшены, а <color=green>Водяные насосы</color> могут быть модернизированы.\n\nКогда вы будете готовы заменить импровизацию инженерией, следуйте этому указанию.\n\nВращение - это жизненная сила машин."
jaJP = "原始産業はその目的を果たしました。次の段階には精密さが必要です。\n\nこの分岐は、<color=green>ギア</color>の生産、機械的電力ネットワークの拡張、そして初期の制限を超えた産業システムの洗練に関わるものです。\n\n適切なギアリングによって、電力はさらに遠くへ伝達でき、機械は改良され、<color=green>ポンプ</color>はアップグレードできます。\n\n即興から工学に置き換える準備ができたら、この指令を追ってください。\n\n回転は機械の生命線です。"
frFR = "L'industrie primitive a rempli son rôle. La prochaine étape nécessite de la précision.\n\nCette branche concerne la production de <color=green>Engrenages</color>, l'expansion des réseaux de puissance mécanique et le perfectionnement des systèmes industriels au-delà de leurs limites initiales.\n\nAvec un bon système d'engrenages, l'énergie peut être transmise plus loin, les machines peuvent être améliorées et les <color=green>Pompes à Eau</color> peuvent être modernisées.\n\nLorsque vous êtes prêt à remplacer l'improvisation par l'ingénierie, suivez cette directive.\n\nLa rotation est la force vitale des machines."
deDE = "Die primitive Industrie hat ihren Zweck erfüllt. Die nächste Stufe erfordert Präzision.\n\nDieser Zweig betrifft die Produktion von <color=green>Zahnrädern</color>, den Ausbau mechanischer Stromnetze und die Verfeinerung industrieller Systeme über ihre ursprünglichen Grenzen hinaus.\n\nMit der richtigen Verzahnung kann Energie weiter übertragen, Maschinen können verbessert und <color=green>Wasserpumpen</color> können aufgerüstet werden.\n\nWenn Sie bereit sind, Improvisation gegen Ingenieurkunst einzutauschen, folgen Sie dieser Anweisung.\n\nRotation ist die Lebenskraft der Maschinen."
plPL = "Prymitywna przemysłowość spełniła swoją rolę. Następny etap wymaga precyzji.\n\nTa gałąź dotyczy produkcji <color=green>Przekładni</color>, rozbudowy sieci mocy mechanicznej oraz udoskonalenia systemów przemysłowych ponad ich początkowe ograniczenia.\n\nDzięki odpowiedniemu przełożeniu moc może być przesyłana dalej, maszyny mogą być ulepszane, a <color=green>Pompy Wodne</color> mogą być modernizowane.\n\nKiedy będziesz gotowy wymienić improwizację na inżynierię, postępuj zgodnie z tym kierunkiem.\n\nObrót jest siłą napędową maszyn."
ptBR = "A indústria primitiva cumpriu seu papel. A próxima fase requer precisão.\n\nEste ramo diz respeito à produção de <color=green>Engrenagens</color>, expansão das redes de potência mecânica e ao aprimoramento dos sistemas industriais além de suas limitações iniciais.\n\nCom o engrenamento adequado, a energia pode ser transmitida mais longe, máquinas podem ser aprimoradas e <color=green>Bombas de Água</color> podem ser atualizadas.\n\nQuando você estiver preparado para substituir a improvisação pela engenharia, siga esta diretriz.\n\nA rotação é a força vital das máquinas."
koKR = "원시 산업은 그 목적을 다했습니다. 다음 단계는 정밀성을 요구합니다.\n\n이 가지는 <color=green>기어</color>의 생산, 기계적 전력 네트워크의 확장, 그리고 산업 시스템의 초기 한계를 넘어선 정제를 다룹니다.\n\n적절한 기어링을 통해 전력을 더 멀리 전송할 수 있으며, 기계를 개선하고 <color=green>수도 펌프</color>를 업그레이드할 수 있습니다.\n\n즉흥적인 방식에서 공학으로 대체할 준비가 되었을 때, 이 지침을 따르십시오.\n\n회전은 기계의 생명력입니다."
csCZ = "Primitivní průmysl splnil svůj účel. Další fáze vyžaduje preciznost.\n\nTato oblast se týká výroby <color=green>ozubených kol</color>, rozšíření mechanických energetických sítí a zlepšení průmyslových systémů nad jejich počáteční omezení.\n\nS řádným převodem výkonu lze přenášet energii dál, stroje lze vylepšit a <color=green>vodní čerpadla</color> lze upgradovat.\n\nKdyž budete připraveni nahradit improvizaci inženýrstvím, řiďte se tímto pokynem.\n\nOtáčení je životní silou strojů."
viVN = "Công nghiệp sơ khởi đã hoàn thành nhiệm vụ của mình. Giai đoạn tiếp theo đòi hỏi sự chính xác.\n\nNhánh này liên quan đến việc sản xuất <color=green>Rô tuyn</color>, mở rộng mạng lưới năng lượng cơ khí và cải tiến các hệ thống công nghiệp vượt ra ngoài những giới hạn ban đầu của chúng.\n\nVới sự truyền động hợp lý, năng lượng có thể được truyền đi xa hơn, máy móc có thể được cải thiện, và <color=green>Bơm nước</color> có thể được nâng cấp.\n\nKhi bạn đã sẵn sàng thay thế sự ứng biến bằng kỹ thuật, hãy tuân theo chỉ dẫn này.\n\nQuay là nguồn sống của máy móc."
trTR = "İlk endüstri amacını gerçekleştirdi. Bir sonraki aşama hassasiyet gerektiriyor.\n\nBu dal, <color=green>Dişli</color> üretimi, mekanik güç ağlarının genişletilmesi ve sanayi sistemlerinin başlangıç sınırlamalarının ötesinde iyileştirilmesi ile ilgilidir.\n\nDoğru dişlileşme ile güç daha uzaklara iletilebilir, makineler geliştirilebilir ve <color=green>Su Pompaları</color> yükseltilebilir.\n\nEğer doğaçlamayı mühendislik ile değiştirmeye hazırsanız, bu talimatı takip edin.\n\nDönüş, makinelerin yaşam kaynağıdır."

["Tutorial.MechanicBranch.BuildMecanicLodge.Whitepaws"]
raw = "Hello.\n\nWe have been informed that your settlement has reached the point where mechanical optimization becomes desirable. This is excellent news. Mechanical optimization is our favorite kind of optimization.\n\nBefore we proceed, we must establish a facility dedicated to the analysis and fabrication of mechanical components. In other words: a Mechanics Lodge.\n\nOne of the primary functions of this building is the production of <color=green>Gears</color>, which are essential for transmitting rotational force between machines.\n\nYou will notice that standard policy is to leave gears and moving parts fully exposed, which some timid individuals describe as “dangerous”. \n\nDo not let such foolish concerns distract you, people who are injured by moving parts are simply unworthy of the bounty of machines.\n\nConstruct a Mechanics Lodge to demonstrate that your settlement is capable of basic mechanical competence.\n"
status = "normal"
enUS = "Hello.\n\nWe have been informed that your settlement has reached the point where mechanical optimization becomes desirable. This is excellent news. Mechanical optimization is our favorite kind of optimization.\n\nBefore we proceed, we must establish a facility dedicated to the analysis and fabrication of mechanical components. In other words: a Mechanics Lodge.\n\nOne of the primary functions of this building is the production of <color=green>Gears</color>, which are essential for transmitting rotational force between machines.\n\nYou will notice that standard policy is to leave gears and moving parts fully exposed, which some timid individuals describe as “dangerous”.\n\nDo not let such foolish concerns distract you; people who are injured by moving parts are simply unworthy of the bounty of machines.\n\nConstruct a Mechanics Lodge to demonstrate that your settlement is capable of basic mechanical competence."
zhCN = "你好。\n\n我们收到通知，您的定居点已达到机械优化变得必要的阶段。这是个好消息。机械优化是我们最喜欢的优化方式。\n\n在我们继续之前，我们必须建立一个专门用于分析和制造机械部件的设施。换句话说：机械旅馆。\n\n这座建筑的主要功能之一是生产<color=green>齿轮</color>，齿轮对于在机器之间传递旋转力至关重要。\n\n您会注意到，标准政策是将齿轮和活动部件完全暴露，一些胆小的人称之为“危险”。\n\n不要让这种愚蠢的担忧分散您的注意力，受活动部件伤害的人不过是配不上机器的丰饶。\n\n建造一个机械旅馆，以证明您的定居点能够具备基本的机械能力。"
zhTW = "你好。\n\n我們已收到通知，您的定居點已達到機械優化的理想階段。這是個好消息。機械優化是我們最喜愛的優化方式。\n\n在我們繼續之前，我們必須建立一個專門用於分析和製造機械零件的設施。換句話說：機械小屋。\n\n這棟建築的主要功能之一是生產<color=green>齒輪</color>，齒輪對於在機器之間傳遞旋轉力至關重要。\n\n您會注意到，標準政策是將齒輪和運動部件完全暴露，這被一些膽小的人稱為“危險”。\n\n不要讓這些愚蠢的擔憂分散您的注意力，受傷於運動部件的人只是對機器的恩惠不配。\n\n建造一個機械小屋，以證明您的定居點具備基本的機械能力。"
ruRU = "Здравствуйте.\n\nНам сообщили, что ваше поселение достигло момента, когда механическая оптимизация становится желательной. Это отличные новости. Механическая оптимизация — это наша любимая форма оптимизации.\n\nПрежде чем мы продолжим, необходимо создать учреждение, посвященное анализу и производству механических компонентов. Другими словами: Механическая Хижина.\n\nОдной из основных функций этого здания является производство <color=green>Шестерен</color>, которые необходимы для передачи вращательной силы между машинами.\n\nВы заметите, что стандартная политика заключается в том, чтобы оставлять шестерни и движущиеся части полностью открытыми, что некоторые осторожные индивидуумы описывают как \"опасное\".\n\nНе позволяйте таким глупым беспокойствам отвлекать вас, люди, пострадавшие от движущихся частей, просто недостойны благ животворящих машин.\n\nПостройте Механическую Хижину, чтобы продемонстрировать, что ваше поселение способно на базовую механическую компетентность."
jaJP = "こんにちは。\n\nあなたの集落が機械的最適化が望ましい段階に達したとの通知を受けました。これは素晴らしいニュースです。機械的最適化は私たちのお気に入りの最適化です。\n\n進める前に、機械部品の分析と製造に特化した施設を設立する必要があります。言い換えれば、機械小屋です。\n\nこの建物の主な機能の一つは、機械の間で回転力を伝えるために不可欠な<color=green>ギア</color>の生産です。\n\n標準的な方針は、ギアや可動部品を完全に露出させることであることに気付くでしょう。一部の臆病な人々はこれを「危険」と表現します。\n\nそのような愚かな懸念に気を取られないでください。可動部品によって怪我をする人々は、単に機械の恵みを受けるに値しないのです。\n\nあなたの集落が基本的な機械的能力を示すために、機械小屋を建設してください。"
frFR = "Bonjour.\n\nNous avons été informés que votre établissement a atteint un point où l'optimisation mécanique devient souhaitable. C’est une excellente nouvelle. L'optimisation mécanique est notre type d'optimisation préféré.\n\nAvant de poursuivre, nous devons établir une installation dédiée à l'analyse et à la fabrication de composants mécaniques. En d'autres termes : une Cabane de Mécanique.\n\nL'une des principales fonctions de ce bâtiment est la production de <color=green>Roues dentées</color>, qui sont essentielles pour transmettre la force de rotation entre les machines.\n\nVous remarquerez que la politique standard consiste à laisser les roues dentées et les pièces mobiles complètement exposées, ce que certains individus timides décrivent comme “dangereux”.\n\nNe laissez pas de telles préoccupations ridicules vous distraire, les personnes blessées par des pièces mobiles ne sont tout simplement pas dignes de la générosité des machines.\n\nConstruisez une Cabane de Mécanique pour démontrer que votre établissement est capable d'une compétence mécanique de base."
deDE = "Hallo.\n\nWir wurden informiert, dass Ihre Siedlung den Punkt erreicht hat, an dem mechanische Optimierung wünschenswert wird. Das sind hervorragende Nachrichten. Mechanische Optimierung ist unsere bevorzugte Art der Optimierung.\n\nBevor wir fortfahren, müssen wir eine Einrichtung einrichten, die der Analyse und der Herstellung von mechanischen Komponenten gewidmet ist. Mit anderen Worten: eine Mechanikerhütte.\n\nEine der Hauptfunktionen dieses Gebäudes ist die Produktion von <color=green>Zahnrädern</color>, die für die Übertragung von Drehkraft zwischen Maschinen unerlässlich sind.\n\nSie werden feststellen, dass es Standardpraxis ist, Zahnräder und bewegliche Teile vollständig freizulegen, was einige schüchterne Personen als „gefährlich“ beschreiben. \n\nLassen Sie sich von solchen törichten Bedenken nicht ablenken, Menschen, die durch bewegliche Teile verletzt werden, sind einfach nicht würdig des Reichtums der Maschinen.\n\nBauen Sie eine Mechanikerhütte, um zu demonstrieren, dass Ihre Siedlung in der Lage ist, grundlegende mechanische Kompetenzen zu zeigen."
plPL = "Cześć.\n\nZostaliśmy poinformowani, że twoja osada osiągnęła punkt, w którym optymalizacja mechaniczna staje się pożądana. To doskonała wiadomość. Optymalizacja mechaniczna jest naszym ulubionym rodzajem optymalizacji.\n\nZanim przejdziemy dalej, musimy ustanowić obiekt poświęcony analizie i produkcji komponentów mechanicznych. Innymi słowy: Warsztat Mechaniczny.\n\nJedną z głównych funkcji tego budynku jest produkcja <color=green>Trybów</color>, które są niezbędne do przekazywania siły obrotowej między maszynami.\n\nZauważysz, że standardową polityką jest pozostawienie zębatek i ruchomych części w pełni odsłoniętymi, co niektórzy nieśmiali ludzie określają jako „niebezpieczne”.\n\nNie pozwól, aby takie głupie obawy cię rozproszyły, ludzie, którzy doznają obrażeń od ruchomych części, po prostu nie zasługują na dary maszyn.\n\nZbuduj Warsztat Mechaniczny, aby pokazać, że twoja osada jest zdolna do podstawowej kompetencji mechanicznej."
ptBR = "Olá.\n\nFomos informados de que seu assentamento alcançou o ponto em que a otimização mecânica se torna desejável. Isso é uma excelente notícia. A otimização mecânica é o nosso tipo favorito de otimização.\n\nAntes de prosseguirmos, precisamos estabelecer uma instalação dedicada à análise e fabricação de componentes mecânicos. Em outras palavras: uma Cabana de Mecânica.\n\nUma das funções primárias deste edifício é a produção de <color=green>Engrenagens</color>, que são essenciais para transmitir força rotacional entre as máquinas.\n\nVocê notará que a política padrão é deixar engrenagens e partes móveis totalmente expostas, o que alguns indivíduos tímidos descrevem como “perigoso”.\n\nNão deixe que tais preocupações tolas o distraiam, pessoas que são feridas por partes móveis são simplesmente indignas das benesses das máquinas.\n\nConstrua uma Cabana de Mecânica para demonstrar que seu assentamento é capaz de uma competência mecânica básica."
koKR = "안녕하세요.\n\n귀하의 정착지가 기계 최적화가 필요할 정도에 도달했다는 소식을 들었습니다. 이는 훌륭한 소식입니다. 기계 최적화는 우리가 가장 좋아하는 유형의 최적화입니다.\n\n진행하기 전에 기계 구성 요소의 분석 및 제작을 전담할 시설을 설립해야 합니다. 즉, 기계 공작소입니다.\n\n이 건물의 주요 기능 중 하나는 기계들 간의 회전력을 전달하는 데 필수적인 <color=green>기어</color>의 생산입니다.\n\n표준 정책은 기어와 이동 부품을 완전히 노출된 상태로 유지하는 것임을 알게 될 것이며, 일부 소심한 개인들은 이를 “위험하다”고 설명합니다.\n\n그러나 그러한 어리석은 걱정에 신경 쓰지 마십시오. 이동 부품에 의해 다치는 사람들은 단순히 기계의 혜택을 누릴 자격이 없는 사람들입니다.\n\n귀하의 정착지가 기본적인 기계적 역량을 갖추고 있음을 보여주기 위해 기계 공작소를 건설하십시오."
csCZ = "Ahoj.\n\nByli jsme informováni, že vaše osada dosáhla bodu, kde se mechanická optimalizace stává žádoucí. To jsou skvělé zprávy. Mechanická optimalizace je náš oblíbený typ optimalizace.\n\nNež budeme pokračovat, musíme zřídit zařízení věnované analýze a výrobě mechanických komponentů. Jinými slovy: Mechanická chata.\n\nJednou z hlavních funkcí této budovy je výroba <color=green>ozubených kol</color>, která jsou nezbytná pro přenos rotační síly mezi stroji.\n\nVšimnete si, že standardní politikou je nechat ozubená kola a pohyblivé části zcela odkryté, což někteří plachí jedinci popisují jako „nebezpečné“.\n\nNenechte se těmito hloupými obavami rozptýlit, lidé, kteří jsou zraněni pohyblivými částmi, jsou prostě nehodní bohatství strojů.\n\nPostavte Mechanickou chatu, abyste prokázali, že vaše osada je schopná základní mechanické kompetence."
viVN = "Xin chào.\n\nChúng tôi đã được thông báo rằng khu định cư của bạn đã đạt đến điểm mà tối ưu hóa cơ khí trở nên cần thiết. Đây là tin tuyệt vời. Tối ưu hóa cơ khí là loại tối ưu hóa mà chúng tôi yêu thích nhất.\n\nTrước khi tiếp tục, chúng ta cần thiết lập một cơ sở dành riêng cho việc phân tích và chế tạo các thành phần cơ khí. Nói cách khác: một Nhà Cơ Khí.\n\nMột trong những chức năng chính của tòa nhà này là sản xuất <color=green>Răng Cưa</color>, đây là điều cần thiết để truyền tải lực quay giữa các máy.\n\nBạn sẽ nhận thấy rằng chính sách tiêu chuẩn là để răng cưa và các bộ phận chuyển động hoàn toàn lộ ra, điều mà một số cá nhân nhút nhát mô tả là “nguy hiểm”.\n\nĐừng để những mối lo ngại ngu ngốc như vậy làm bạn xao lạc, những người bị thương bởi các bộ phận chuyển động chỉ đơn giản là không xứng đáng với món quà của máy móc.\n\nHãy xây dựng một Nhà Cơ Khí để chứng minh rằng khu định cư của bạn có khả năng về năng lực cơ khí cơ bản."
trTR = "Merhaba.\n\nYerleşiminizin mekanik optimizasyonun arzu edilir hale geldiği bilgisi bize ulaştı. Bu harika bir haber. Mekanik optimizasyon, en sevdiğimiz optimizasyon türüdür.\n\nİlerlemeye başlamadan önce, mekanik bileşenlerin analizi ve üretimi için özel bir tesis kurmalıyız. Diğer bir deyişle: bir Mekanik Yurt.\n\nBu binanın temel işlevlerinden biri, makineler arasında döner kuvvetin iletimi için hayati öneme sahip olan <color=green>Dişliler</color> üretmektir.\n\nStandart politikanın dişlileri ve hareketli parçaları tamamen açık bırakmak olduğunu göreceksiniz, bazı çekingen bireyler bunu \"tehlikeli\" olarak tanımlıyor. \n\nBöyle saçma endişelerin sizi oyalamasına izin vermeyin, hareketli parçalardan yaralanan insanlar, makinelerin nimetlerine layık değildir.\n\nYerleşiminizin temel mekanik yetkinliğe sahip olduğunu göstermek için bir Mekanik Yurt inşa edin."

["Tutorial.MechanicBranch.WaterpumpUpgrade.Whitepaws"]
raw = "Excellent.\n\nLet us now introduce a simple but extremely satisfying improvement: Water Pump Upgrades.\n\nThese devices dramatically increase the pumping capacity of existing water pumps through the entirely sensible application of additional moving parts.\n\nBefore constructing one, you should familiarize yourself with their placement. To do so, place a <color=green>Water Pump Upgrade Board</color> somewhere convenient.\n\nThe board does not need to actually be built in order to be consulted. Please do not question how this works. We don't know either and that makes our heads hurt.\n\nIf you have properly followed the earlier recommendations of the Directorate of Hydrological Discipline, you should now possess a neat <color=green>row of water pumps</color> ready for improvement.\n\nWe advised them to include that step. They resisted at first, but with enough… torque... applied to their arm, they eventually saw the light.\n\nConstruct at least one Water Pump Upgrade to prove your willingness to coexist with machines."
status = "normal"
enUS = "Excellent.\n\nLet us now introduce a simple but extremely satisfying improvement: Water Pump Upgrades.\n\nThese devices dramatically increase the pumping capacity of existing water pumps through the entirely sensible application of additional moving parts.\n\nBefore constructing one, you should familiarize yourself with their placement. To do so, place a <color=green>Water Pump Upgrade Board</color> somewhere convenient.\n\nThe board does not need to actually be built in order to be consulted. Please do not question how this works. We don't know either and that makes our heads hurt.\n\nIf you have properly followed the earlier recommendations of the Directorate of Hydrological Discipline, you should now possess a neat <color=green>row of water pumps</color> ready for improvement.\n\nWe advised them to include that step. They resisted at first, but with enough… torque... applied to their arm, they eventually saw the light.\n\nConstruct at least one Water Pump Upgrade to prove your willingness to coexist with machines."
zhCN = "优秀。\n\n现在让我们介绍一个简单但极其令人满意的改进：水泵升级。\n\n这些设备通过合理应用额外的活动部件，显著提高现有水泵的抽水能力。\n\n在建造之前，你应该熟悉它们的放置方法。为此，请在某个方便的地方放置一个<color=green>水泵升级板</color>。\n\n该板实际并不需要被建造就可以进行咨询。请不要质疑这如何运作。我们也不知道，这让我们感到困扰。\n\n如果你已经按照水文纪律局的建议进行了妥善的操作，那么你现在应该拥有一排整齐的<color=green>水泵</color>，准备进行改进。\n\n我们建议他们加入那一步。起初他们抵制，但在施加足够的……扭力……后，他们最终看到了真相。\n\n建造至少一个水泵升级，以证明你愿意与机器共存。"
zhTW = "非常好。\n\n現在讓我們介紹一個簡單但極其令人滿意的改進：水泵升級。\n\n這些設備通過合理地增加額外的移動部件，顯著提高現有水泵的抽水能力。\n\n在建造之前，您應該熟悉它們的放置。為此，請在一個方便的地方放置一個<color=green>水泵升級板</color>。\n\n該板不需要實際建造即可進行查閱。請不要質疑這是怎麼回事。我們也不知道，這讓我們感到頭痛。\n\n如果您已經妥善遵循了水文學紀律局之前的建議，您現在應該擁有一排整齊的<color=green>水泵</color>，準備進行改進。\n\n我們建議他們包含這一步。他們起初抵抗，但在對他們的手臂施加足夠的… 扭力… 後，他們最終明白了。\n\n建造至少一個水泵升級，以證明您願意與機器共存。"
ruRU = "Превосходно.\n\nТеперь давайте представим простое, но крайне удовлетворяющее улучшение: Модернизации водяных насосов.\n\nЭти устройства Dramatically увеличивают пропускную способность существующих водяных насосов благодаря полностью разумному применению дополнительных движущихся частей.\n\nПрежде чем построить одну из них, вам следует ознакомиться с их расположением. Для этого разместите <color=green>Панель модернизации водяного насоса</color> где-нибудь удобном.\n\nПанель не обязательно строить, чтобы получить к ней доступ. Пожалуйста, не спрашивайте, как это работает. Мы тоже не знаем, и это вызывает у нас головную боль.\n\nЕсли вы правильно следовали ранее данным рекомендациям Управления гидрологической дисциплины, вы теперь должны обладать аккуратной <color=green>рядом водяных насосов</color>, готовых к улучшению.\n\nМы советовали им включить этот шаг. Сначала они сопротивлялись, но с достаточным... усилием... на их руку, они в конечном итоге осознали это.\n\nПостройте как минимум одну модернизацию водяного насоса, чтобы доказать свою готовность сосуществовать с машинами."
jaJP = "素晴らしい。\n\nさて、シンプルでありながら非常に満足のいく改善を導入しましょう：水ポンプのアップグレード。\n\nこれらの装置は、追加の可動部品の完全に理にかなった適用を通じて、既存の水ポンプのポンプ能力を劇的に向上させます。\n\n一つを建設する前に、設置場所に慣れておくべきです。そうするためには、便利な場所に<color=green>水ポンプアップグレードボード</color>を置いてください。\n\nボードは実際に建設される必要はなく、参照するために使用できます。この仕組みについて疑問を抱かないでください。我々もわからないので、頭が痛くなります。\n\nもし、ハイドロロジー規律局の以前の推奨に適切に従っていれば、今や改善の準備が整った<color=green>きれいな水ポンプの列</color>を持っているはずです。\n\n彼らにそのステップを含めるよう忠告しました。最初は抵抗しましたが、十分な…トルク…をその腕に加えたことで、最終的には光が見えました。\n\n機械と共存する意欲を証明するために、少なくとも1つの水ポンプアップグレードを構築してください。"
frFR = "Excellent.\n\nNous allons maintenant introduire une amélioration simple mais extrêmement satisfaisante : les améliorations de pompe à eau.\n\nCes dispositifs augmentent considérablement la capacité de pompage des pompes à eau existantes grâce à l'application tout à fait sensée de pièces mobiles supplémentaires.\n\nAvant d'en construire une, vous devriez vous familiariser avec leur placement. Pour ce faire, placez une <color=green>plaque d'amélioration de pompe à eau</color> quelque part de pratique.\n\nLa plaque n'a pas besoin d'être réellement construite pour être consultée. Veuillez ne pas vous interroger sur le fonctionnement de cela. Nous ne savons pas non plus et cela nous fait mal à la tête.\n\nSi vous avez correctement suivi les recommandations antérieures de la Direction de la Discipline Hydrologique, vous devriez maintenant posséder une belle <color=green>rangée de pompes à eau</color> prêtes à être améliorées.\n\nNous leur avons conseillé d'inclure cette étape. Ils ont résisté au début, mais avec suffisamment... de couple... appliqué à leur bras, ils ont finalement vu la lumière.\n\nConstruisez au moins une amélioration de pompe à eau pour prouver votre volonté de coexister avec les machines."
deDE = "Ausgezeichnet.\n\nLassen Sie uns nun eine einfache, aber äußerst befriedigende Verbesserung vorstellen: Wasserpumpen-Upgrades.\n\nDiese Geräte steigern die Förderkapazität vorhandener Wasserpumpen durch die völlig sinnvolle Anwendung zusätzlicher beweglicher Teile dramatisch.\n\nBevor Sie eines bauen, sollten Sie sich mit deren Platzierung vertraut machen. Dazu platzieren Sie ein <color=green>Wasserpumpen-Upgradbrett</color> an einem geeigneten Ort.\n\nDas Brett muss nicht tatsächlich gebaut werden, um konsultiert zu werden. Bitte stellen Sie nicht in Frage, wie das funktioniert. Wir wissen es auch nicht, und das verursacht uns Kopfschmerzen.\n\nWenn Sie die früheren Empfehlungen der Direktion für Hydrologische Disziplin ordnungsgemäß befolgt haben, sollten Sie jetzt über eine ordentliche <color=green>Reihe von Wasserpumpen</color> verfügen, die für Verbesserungen bereit sind.\n\nWir haben ihnen geraten, diesen Schritt einzufügen. Zunächst haben sie sich geweigert, aber mit genug… Drehmoment… an ihrem Arm angewendet, haben sie schließlich das Licht gesehen.\n\nKonstruieren Sie mindestens ein Wasserpumpen-Upgrade, um Ihre Bereitschaft zur Koexistenz mit Maschinen zu beweisen."
plPL = "Doskonale.\n\nTeraz pozwól, że przedstawimy prostą, ale niezwykle satysfakcjonującą ulepszenie: Ulepszenia Wodnych Pomp.\n\nTe urządzenia dramatycznie zwiększają pojemność pompowania istniejących wodnych pomp poprzez całkowicie sensowne zastosowanie dodatkowych ruchomych części.\n\nZanim zbudujesz jedno, powinieneś zapoznać się z ich rozmieszczeniem. Aby to zrobić, umieść <color=green>Tablicę Ulepszenia Wodnej Pompy</color> w dogodnym miejscu.\n\nTablica nie musi być faktycznie zbudowana, aby można było się z nią zapoznać. Proszę, nie pytaj, jak to działa. My też nie wiemy, a to sprawia, że boli nas głowa.\n\nJeśli prawidłowo stosowałeś się do wcześniejszych zaleceń Dyrekcji Dyscypliny Hydrologicznej, powinieneś teraz posiadać zgrabną <color=green>rzędę wodnych pomp</color> gotowych do ulepszenia.\n\nZaleciliśmy im, aby uwzględnili ten krok. Na początku się opierali, ale po wystarczająco dużym… momencie obrotowym… zastosowanym na ich ramieniu, w końcu ujrzeli światło.\n\nZbuduj przynajmniej jedno Ulepszenie Wodnej Pompy, aby udowodnić swoją gotowość do współistnienia z maszynami."
ptBR = "Excelente.\n\nAgora vamos apresentar uma melhoria simples, mas extremamente satisfatória: Melhorias na Bomba d'Água.\n\nEsses dispositivos aumentam dramaticamente a capacidade de bombeamento das bombas d'água existentes através da aplicação inteiramente sensata de componentes móveis adicionais.\n\nAntes de construir uma, você deve se familiarizar com seu posicionamento. Para fazer isso, coloque uma <color=green>Placa de Melhoria da Bomba d'Água</color> em algum lugar conveniente.\n\nA placa não precisa realmente ser construída para ser consultada. Por favor, não questione como isso funciona. Nós também não sabemos e isso faz nossas cabeças doerem.\n\nSe você seguiu corretamente as recomendações anteriores da Diretoria da Disciplina Hidrológica, agora deve possuir uma <color=green>linha organizada de bombas d'água</color> pronta para melhoria.\n\nNós os aconselhamos a incluir essa etapa. Eles resistiram a princípio, mas com torque... suficiente aplicado em seu braço, eles acabaram vendo a luz.\n\nConstrua pelo menos uma Melhoria na Bomba d'Água para provar sua disposição de coexistir com máquinas."
koKR = "훌륭합니다.\n\n이제 간단하지만 매우 만족스러운 개선 사항인 물 펌프 업그레이드를 소개하겠습니다.\n\n이 장치는 추가 이동 부품의 전혀 합리적인 적용을 통해 기존 물 펌프의 펌핑 용량을 극적으로 증가시킵니다.\n\n하나를 건설하기 전에 그 배치에 익숙해져야 합니다. 그렇게 하려면 편리한 곳에 <color=green>물 펌프 업그레이드 보드</color>를 놓아보세요.\n\n보드는 실제로 건설되지 않아도 참고할 수 있습니다. 이게 어떻게 작동하는지에 대해 의문을 제기하지 마세요. 우리도 모르고 그것 때문에 머리가 아픕니다.\n\nHydrological Discipline 국장의 이전 권장 사항을 제대로 따랐다면 개선을 거칠 준비가 된 깔끔한 <color=green>물 펌프 배열</color>을 갖추었을 것입니다.\n\n우리는 그 단계도 포함하도록 조언했습니다. 그들은 처음에 저항했지만 충분한… 토크...가 그들의 팔에 가해지자 결국 빛을 보게 되었습니다.\n\n기계와 공존하려는 의지를 증명하기 위해 최소한 하나의 물 펌프 업그레이드를 건설하세요."
csCZ = "Excelentní.\n\nNyní představíme jednoduché, ale extrémně uspokojivé zlepšení: Vylepšení vodních pump.\n\nTato zařízení dramaticky zvyšují čerpací kapacitu stávajících vodních pump prostřednictvím zcela rozumné aplikace dalších pohyblivých částí.\n\nPřed konstrukcí jednoho byste se měli seznámit s jejich umístěním. K tomu umístěte <color=green>desku pro vylepšení vodní pumpy</color> někam, kde bude pohodlná.\n\nDesku není nutné skutečně postavit, abyste se na ni mohli podívat. Prosím, nepátrejte po tom, jak to funguje. My to také nevíme a bolí nás z toho hlava.\n\nPokud jste správně dodrželi dřívější doporučení Ředitelství hydrologické disciplíny, měli byste nyní mít hezkou <color=green>řadu vodních pump</color> připravenou na vylepšení.\n\nDoporučili jsme jim, aby tuto fázi zahrnuli. Zprvu odporovali, ale s dostatečným... točivým momentem... aplikovaným na jejich ruku, nakonec uzřeli pravdu.\n\nPostavte alespoň jedno vylepšení vodní pumpy, abyste dokázali svou ochotu koexistovat se stroji."
viVN = "Tuyệt vời.\n\nGiờ đây, hãy để chúng tôi giới thiệu một cải tiến đơn giản nhưng cực kỳ thỏa mãn: Nâng cấp Bơm Nước.\n\nCác thiết bị này tăng đáng kể khả năng bơm của các bơm nước hiện có thông qua việc áp dụng hoàn toàn hợp lý các bộ phận chuyển động bổ sung.\n\nTrước khi xây dựng một cái, bạn nên làm quen với cách bố trí của chúng. Để làm vậy, hãy đặt một <color=green>Bảng Nâng Cấp Bơm Nước</color> ở một vị trí thuận tiện.\n\nBảng không cần phải được xây dựng thực sự để được tham khảo. Vui lòng đừng đặt câu hỏi về cách mà điều này hoạt động. Chúng tôi cũng không biết và điều đó khiến đầu óc chúng tôi nhức nhói.\n\nNếu bạn đã làm theo đúng các khuyến nghị trước đây của Cục Khoa học Thủy văn, bạn nên có một <color=green>hàng bơm nước</color> gọn gàng sẵn sàng để nâng cấp.\n\nChúng tôi đã khuyên họ nên bao gồm bước đó. Họ đã phản kháng vào đầu, nhưng với đủ… mô-men xoắn... áp dụng vào cánh tay của họ, họ cuối cùng đã nhận ra điều đó.\n\nHãy xây dựng ít nhất một Nâng Cấp Bơm Nước để chứng minh sự sẵn sàng của bạn trong việc sống chung với máy móc."
trTR = "Mükemmel.\n\nŞimdi basit ama son derece tatmin edici bir iyileştirmeyi tanıtalım: Su Pompası Yükseltmeleri.\n\nBu cihazlar, mevcut su pompalarının pompalama kapasitesini, ek hareketli parçaların tamamen mantıklı bir şekilde uygulanmasıyla dramatik şekilde artırır.\n\nBir tane inşa etmeden önce, bunların yerleşimi hakkında bilgi sahibi olmalısınız. Bunu yapmak için, uygun bir yere <color=green>Su Pompası Yükseltme Tahtası</color> yerleştirin.\n\nTahtanın gerçekten inşa edilmesine gerek yoktur. Lütfen bunun nasıl çalıştığını sorgulamayın. Biz de bilmiyoruz ve bu durum kafamızı ağrıtıyor.\n\nEğer Hidrolik Disiplin Dairesi'nin önceki önerilerini düzgün bir şekilde takip ettiyseniz, şimdi iyileştirme için hazır düzgün bir <color=green>su pompası sırası</color>na sahip olmalısınız.\n\nOnlara bu adımı dahil etmeleri için tavsiyelerde bulunduk. İlk başta karşı çıktılar ama yeterince… tork... uyguladıktan sonra sonunda aydınlandılar.\n\nMakinelerle birlikte yaşama isteğinizi kanıtlamak için en az bir Su Pompası Yükseltmesi inşa edin."

["Tutorial.MechanicBranch.BuildFactory.Whitepaws"]
raw = "Your Water Pump Upgrades are a respectable improvement. We appreciate the effort.\n\nHowever, they remain crude devices ultimately powered by manual labor.\n\nTechnological evolution requires buildings driven by true mechanical power. The most important of these is the Factory.\n\nThe Factory is primarily used to refine <color=green>Scrap Metal</color> into proper <color=green>Metal Blocks</color>, which will become necessary for many advanced constructions.\n\nIt also serves a number of secondary purposes, such as fabricating <color=green>Anvils</color>, <color=green>Laboratory Glassware</color>, and <color=green>Cauldrons</color>.\n\nIn a properly organized industrial settlement, one Factory should ideally produce Metal Blocks continuously, while another handles miscellaneous custom fabrication.\n\nDo not forget that these buildings are appropriately <color=#00FFFF>watertight</color>. Machines do not look kindly upon those who squander opportunities… or torque.\n\nAs with most mechanically respectable buildings, the power plug is located at the rear. Ensure the structure is properly connected to your power network.\n\nConstruct a Factory so that the worthy may prove themselves — and the unworthy may be identified.\n"
status = "normal"
enUS = "Your Water Pump Upgrades are a respectable improvement. We appreciate the effort.\n\nHowever, they remain crude devices ultimately powered by manual labor.\n\nTechnological evolution requires buildings driven by true mechanical power. The most important of these is the Factory.\n\nThe Factory is primarily used to refine <color=green>Scrap Metal</color> into proper <color=green>Metal Blocks</color>, which will become necessary for many advanced constructions.\n\nIt also serves a number of secondary purposes, such as fabricating <color=green>Anvils</color>, <color=green>Laboratory Glassware</color>, and <color=green>Cauldrons</color>.\n\nIn a properly organized industrial settlement, one Factory should ideally produce Metal Blocks continuously, while another handles miscellaneous custom fabrication.\n\nDo not forget that these buildings are appropriately <color=#00FFFF>watertight</color>. Machines do not look kindly upon those who squander opportunities… or torque.\n\nAs with most mechanically respectable buildings, the power plug is located at the rear. Ensure the structure is properly connected to your power network.\n\nConstruct a Factory so that the worthy may prove themselves — and the unworthy may be identified."
zhCN = "“您的水泵升级是一个值得称赞的改进。我们很感激您的努力。\n\n然而，它们仍然是依赖人工劳动的粗糙设备。\n\n技术的进步需要由真正的机械动力驱动的建筑。其中最重要的就是工厂。\n\n工厂主要用于将<color=green>废金属</color>加工成合适的<color=green>金属块</color>，这些将对许多高级建筑至关重要。\n\n它还可以用于制造一系列辅助产品，如<color=green>铁砧</color>、<color=green>实验室玻璃器皿</color>和<color=green>锅</color>。\n\n在一个 properly organized 的工业定居点中，一个工厂理想上应持续生产金属块，而另一个则负责各种定制制造。\n\n不要忘记这些建筑是 appropriately <color=#00FFFF>防水</color>的。机器对那些浪费机会……或扭矩的人不会客气。\n\n与大多数机械设备一样，电源插头位于后面。确保该结构正确连接到您的电力网络。\n\n建造一个工厂，以便有价值的人可以证明自己，而没有价值的人则可以被识别。”"
zhTW = "你的水泵升級是一項相當可敬的改進。我們感激你的努力。\n\n然而，它們仍然是粗糙的設備，最終仍依賴手工勞動。\n\n技術進步需要由真正的機械動力驅動的建築。其中最重要的就是工廠。\n\n工廠主要用來將<color=green>廢金屬</color>精煉成適當的<color=green>金屬方塊</color>，這些將成為許多先進建築所需的材料。\n\n它還有許多次要功能，例如製造<color=green>鐵砧</color>、<color=green>實驗室玻璃器皿</color>和<color=green>鍋</color>。\n\n在一個妥善組織的工業定居點中，一個工廠理想上應持續生產金屬方塊，而另一個則處理各種自定義製作。\n\n不要忘記這些建築是適當的<color=#00FFFF>防水</color>。機器對於浪費機會…或扭矩的人不會心生好感。\n\n與大多數機械上可敬的建築一樣，電源插頭位於後面。確保結構正確連接到你的電力網絡。\n\n建造一座工廠，以便有價值的人可以證明自己——而不值得的人則可以被識別出來。"
ruRU = "Ваши улучшения водяной помпы — это достойное усовершенствование. Мы ценим ваши усилия.\n\nТем не менее, они остаются грубыми устройствами, которые в конечном итоге работают на ручном труде.\n\nТехнологическая эволюция требует зданий, работающих на истинной механической энергии. Самым важным из них является Фабрика.\n\nФабрика в первую очередь используется для переработки <color=green>Металлолома</color> в настоящие <color=green>Металлические Блоки</color>, которые станут необходимыми для многих сложных конструкций.\n\nОна также выполняет ряд второстепенных задач, таких как производство <color=green>Кузнечных Прессов</color>, <color=green>Лабораторной Посуды</color> и <color=green>Котлов</color>.\n\nВ правильно организованном промышленном поселении одна Фабрика должна непрерывно производить Металлические Блоки, в то время как другая будет заниматься разнообразным индивидуальным производством.\n\nНе забывайте, что эти здания должным образом <color=#00FFFF>водонепроницаемы</color>. Машины не любят тех, кто растрачивает возможности… или крутящий момент.\n\nКак и большинство уважаемых механических зданий, электрическая розетка расположена на задней стороне. Убедитесь, что структура правильно подключена к вашей сети электроэнергии.\n\nПостройте Фабрику, чтобы достойные могли доказать свою ценность — а недостойные могли быть выявлены."
jaJP = "あなたの水ポンプのアップグレードは、立派な改善です。私たちはその努力を感謝します。\n\nしかし、それらは最終的には手作業で動かされる粗雑な装置のままです。\n\n技術の進化には、本当の機械的動力によって駆動される建物が必要です。その中で最も重要なのが工場です。\n\n工場は主に、<color=green>スクラップメタル</color>を適切な<color=green>メタルブロック</color>に精製するために使用され、これは多くの高度な建設に必要になります。\n\nまた、<color=green>金づち</color>、<color=green>実験室用ガラス器具</color>、<color=green>大釜</color>の製造など、いくつかの副次的な目的にも役立ちます。\n\n適切に整理された工業集落では、ひとつの工場が理想的にはメタルブロックを継続的に生産し、もう一つが雑多なカスタム製作を担当するべきです。\n\nこれらの建物は適切に<color=#00FFFF>防水</color>であることを忘れないでください。機械は機会を浪費する者…またはトルクを無駄にする者を好ましく思いません。\n\nほとんどの機械的に立派な建物と同様に、電源プラグは後ろに位置しています。構造があなたの電力ネットワークに適切に接続されていることを確認してください。\n\n価値ある者が自らを証明できるように、工場を建設しましょう — そうでない者を特定できるように。"
frFR = "Vos améliorations de pompe à eau sont une amélioration respectable. Nous apprécions l'effort.\n\nCependant, elles restent des dispositifs rudimentaires alimentés par le travail manuel.\n\nL'évolution technologique nécessite des bâtiments propulsés par une véritable puissance mécanique. Le plus important d'entre eux est la Fabrique.\n\nLa Fabrique est principalement utilisée pour raffiner <color=green>Metal en Déchets</color> en <color=green>Blocs de Métal</color> appropriés, qui deviendront nécessaires pour de nombreuses constructions avancées.\n\nElle sert également à un certain nombre d'autres objectifs, tels que la fabrication d'<color=green>Enclumes</color>, de <color=green>Verrerie de Laboratoire</color> et de <color=green>Chaudrons</color>.\n\nDans une colonie industrielle correctement organisée, une Fabrique devrait idéalement produire des Blocs de Métal en continu, tandis qu'une autre gère des fabrications personnalisées diverses.\n\nN'oubliez pas que ces bâtiments sont correctement <color=#00FFFF>étanches</color>. Les machines ne prennent pas bien ceux qui gaspillent des opportunités… ou du couple.\n\nComme pour la plupart des bâtiments mécaniquement respectables, la prise de courant est située à l'arrière. Assurez-vous que la structure est correctement connectée à votre réseau électrique.\n\nConstruisez une Fabrique afin que les dignes puissent se prouver — et que les indignes puissent être identifiés."
deDE = "Ihre Wasserpumpen-Verbesserungen sind eine respektable Verbesserung. Wir schätzen den Aufwand.\n\nAllerdings bleiben sie grobe Geräte, die letztlich von menschlicher Arbeit betrieben werden.\n\nTechnologische Evolution erfordert Gebäude, die von echter mechanischer Energie angetrieben werden. Das wichtigste davon ist die Fabrik.\n\nDie Fabrik wird hauptsächlich genutzt, um <color=green>Schrottmetall</color> in richtige <color=green>Metallblöcke</color> zu verfeinern, die für viele fortschrittliche Konstruktionen notwendig werden.\n\nSie dient auch einer Reihe von sekundären Zwecken, wie der Herstellung von <color=green>Ambossen</color>, <color=green>Laborgeräten</color> und <color=green>Kesseln</color>.\n\nIn einer richtig organisierten industriellen Siedlung sollte eine Fabrik idealerweise kontinuierlich Metallblöcke produzieren, während eine andere verschiedene kundenspezifische Fabrikationen übernimmt.\n\nVergessen Sie nicht, dass diese Gebäude ordnungsgemäß <color=#00FFFF>wasserdicht</color> sind. Maschinen sind nicht gut auf diejenigen zu sprechen, die Gelegenheiten… oder Drehmoment verschwenden.\n\nWie bei den meisten mechanisch respektablen Gebäuden befindet sich der Stromanschluss auf der Rückseite. Stellen Sie sicher, dass die Struktur ordnungsgemäß mit Ihrem Stromnetz verbunden ist.\n\nBauen Sie eine Fabrik, damit die Würdigen sich beweisen können – und die Unwürdigen identifiziert werden können."
plPL = "Twoje ulepszenia Pompy Wodnej to godna poprawa. Doceniamy wysiłek.\n\nJednak pozostają one prymitywnymi urządzeniami napędzanymi w końcu manualną pracą.\n\nEwolucja technologiczna wymaga budynków napędzanych prawdziwą mocą mechaniczną. Najważniejszym z nich jest Fabryka.\n\nFabryka jest przede wszystkim używana do przerabiania <color=green>Rud Żelaza</color> na odpowiednie <color=green>Bloki Metalu</color>, które będą niezbędne do wielu zaawansowanych konstrukcji.\n\nSłuży również wielu dodatkowym celom, takim jak wytwarzanie <color=green>Kowadeł</color>, <color=green>Szklanek Laboratoryjnych</color> i <color=green>Kotłów</color>.\n\nW odpowiednio zorganizowanej osadzie przemysłowej jedna Fabryka powinna idealnie produkować Bloki Metalu nieprzerwanie, podczas gdy druga zajmuje się różnorodną, niestandardową produkcją.\n\nNie zapomnij, że te budynki są odpowiednio <color=#00FFFF>wodoodporne</color>. Maszyny nie są przychylne tym, którzy marnują okazje… lub momenty obrotowe.\n\nJak w przypadku większości szanowanych budynków mechanicznych, wtyczka zasilająca znajduje się z tyłu. Upewnij się, że struktura jest prawidłowo podłączona do twojej sieci energetycznej.\n\nZbuduj Fabrykę, aby godni mogli się wykazać - a niegodni mogą zostać zidentyfikowani."
ptBR = "Seus aprimoramentos na Bomba de Água são uma melhoria respeitável. Agradecemos o esforço.\n\nNo entanto, eles continuam sendo dispositivos rudimentares, alimentados principalmente por trabalho manual.\n\nA evolução tecnológica requer edificações movidas por verdadeira força mecânica. A mais importante delas é a Fábrica.\n\nA Fábrica é utilizada principalmente para refinar <color=green>Metal Descartado</color> em <color=green>Blocos de Metal</color> adequados, que se tornarão necessários para muitas construções avançadas.\n\nEla também serve a uma série de propósitos secundários, como fabricar <color=green>Bigornas</color>, <color=green>Vidros de Laboratório</color> e <color=green>Caldeirões</color>.\n\nEm um assentamento industrial devidamente organizado, uma Fábrica deve idealmente produzir Blocos de Metal continuamente, enquanto outra cuida de fabricações personalizadas diversas.\n\nNão se esqueça de que esses edifícios são adequadamente <color=#00FFFF>à prova d'água</color>. Máquinas não gostam de quem desperdiça oportunidades… ou torque.\n\nComo na maioria dos edifícios mecanicamente respeitáveis, a tomada de energia está localizada na parte de trás. Certifique-se de que a estrutura esteja devidamente conectada à sua rede de energia.\n\nConstrua uma Fábrica para que os dignos possam provar seu valor — e os indignos possam ser identificados."
koKR = "귀하의 물 펌프 업그레이드는 존경할 만한 개선입니다. 노력에 감사드립니다.\n\n그러나 이들은 궁극적으로 수작업으로 작동되는 원시적인 장치입니다.\n\n기술 발전은 진정한 기계 동력으로 구동되는 건물을 요구합니다. 이 중 가장 중요한 것이 바로 공장입니다.\n\n공장은 주로 <color=green>스크랩 메탈</color>을 적절한 <color=green>메탈 블록</color>으로 정제하는 데 사용되며, 이는 많은 고급 건축물에 필요하게 될 것입니다.\n\n또한 <color=green>모루</color>, <color=green>실험실 유리제품</color>, <color=green>가마</color> 등을 제작하는 등 여러 가지 보조적인 목적도 수행합니다.\n\n적절하게 조직된 산업 정착지에서는 하나의 공장이 메탈 블록을 지속적으로 생산하고, 다른 하나는 기타 맞춤형 제작을 처리하는 것이 이상적입니다.\n\n이 건물들이 적절하게 <color=#00FFFF>방수</color>라는 점을 잊지 마십시오. 기계는 기회를 낭비하는 자들을 좋게 보지 않습니다… 또는 토크를.\n\n대부분의 기계적으로 존경받는 건물과 마찬가지로 전원 플러그는 후면에 있습니다. 구조물이 전력망에 제대로 연결되어 있는지 확인하십시오.\n\n가치 있는 자들이 스스로를 증명할 수 있도록 공장을 건설하십시오 — 그리고 가치 없는 자들은 식별될 수 있도록 하십시오."
csCZ = "Vylepšení Vašeho vodního čerpadla je obdivuhodným pokrokem. Oceníme úsilí.\n\nNicméně zůstávají to primitivní zařízení, která jsou nakonec poháněna manuální prací.\n\nTechnologická evoluce vyžaduje budovy poháněné skutečnou mechanickou silou. Nejvýznamnější z nich je Továrna.\n\nTovárna se primárně používá k přeměně <color=green>Odpadu</color> na správné <color=green>Metallové Bloky</color>, které budou nezbytné pro mnoho pokročilých staveb.\n\nTaké slouží k několika sekundárním účelům, jako je výroba <color=green>Kovadlin</color>, <color=green>Laboratorní Skla</color> a <color=green>Kotel</color>.\n\nV řádně organizovaném průmyslovém osídlení by ideálně jedna Továrna měla produkovat Metallové Bloky neustále, zatímco druhá se zabývá různým zakázkovým výrobou.\n\nNezapomeňte, že tyto budovy jsou patřičně <color=#00FFFF>vodotěsné</color>. Stroje nemají pochopení pro ty, kdo plýtvají příležitostmi… nebo točivým momentem.\n\nJako u většiny mechanicky respektovaných budov, je elektrická zásuvka umístěna vzadu. Ujistěte se, že je struktura správně připojena k Vaší elektro síti.\n\nPostavte Továrnu, aby se hodní mohli prokázat — a nehodní mohli být identifikováni."
viVN = "Cải tiến Bơm Nước của bạn là một bước tiến đáng kể. Chúng tôi đánh giá cao nỗ lực này.\n\nTuy nhiên, chúng vẫn là những thiết bị thô sơ được vận hành chủ yếu bằng sức lao động thủ công.\n\nSự tiến hóa công nghệ yêu cầu các tòa nhà được điều khiển bởi sức mạnh cơ học thực sự. Quan trọng nhất trong số này là Nhà Máy.\n\nNhà Máy chủ yếu được sử dụng để tinh chế <color=green>Kim Loại Thải</color> thành <color=green>Khối Kim Loại</color> chính xác, điều này sẽ trở nên cần thiết cho nhiều công trình tiên tiến.\n\nNó cũng phục vụ một số mục đích phụ, chẳng hạn như chế tạo <color=green>Đe</color>, <color=green>Bình Thí Nghiệm</color>, và <color=green>Vạc</color>.\n\nTrong một khu định cư công nghiệp được tổ chức hợp lý, một Nhà Máy nên lý tưởng sản xuất Khối Kim Loại liên tục, trong khi một cái khác xử lý các chế tạo tùy chỉnh khác nhau.\n\nĐừng quên rằng những tòa nhà này được <color=#00FFFF>chống nước</color> thích hợp. Máy móc không mấy thiện cảm với những ai lãng phí cơ hội… hoặc mô-men xoắn.\n\nGiống như hầu hết các tòa nhà có uy tín về mặt cơ khí, ổ cắm điện nằm ở phía sau. Hãy đảm bảo cấu trúc được kết nối đúng cách với mạng lưới điện của bạn.\n\nXây dựng một Nhà Máy để những người xứng đáng có thể chứng tỏ bản thân — và những người không xứng đáng có thể được nhận diện."
trTR = "Su Pompa Yükseltmeleriniz saygıdeğer bir gelişim. Gösterdiğiniz çabayı takdir ediyoruz.\n\nAncak, yine de nihayetinde manuel iş gücüyle çalışan kaba cihazlar olarak kalıyorlar.\n\nKüresel evrim, gerçek mekanik güçle çalışan binalar gerektirir. Bunların en önemlisi Fabrika'dır.\n\nFabrika, esasen <color=green>Hurda Metal</color>'i düzgün <color=green>Metal Bloklar</color>'a dönüştürmek için kullanılır; bu, birçok gelişmiş yapı için gereklidir.\n\nAyrıca, <color=green>Kovanlar</color>, <color=green>Laboratuvar Cam Eşyaları</color> ve <color=green>Kazançlar</color> gibi bir dizi ikincil amaç hizmeti de görmektedir.\n\nDüzgün organize edilmiş bir sanayi yerleşiminde, bir Fabrika ideal olarak Metal Blokları sürekli üretirken, diğeri çeşitli özelleştirilmiş üretimi üstlenmelidir.\n\nBu binaların uygun bir şekilde <color=#00FFFF>suyun geçirmediğini</color> unutmayın. Makineler, fırsatları israf edenlere… ya da tork kaybına iyi gözle bakmaz.\n\nÇoğu mekanik açıdan saygıdeğer yapı gibi, güç fişi arka tarafta yer alır. Yapının güç ağınıza düzgün bir şekilde bağlı olduğundan emin olun.\n\nKendini kanıtlamak için değerli bir Fabrika inşa edin — ve değersiz olanları belirleyin."

["Tutorial.MechanicBranch.Build1Outof3.Whitepaws"]
raw = "With a Factory in operation, your settlement is now capable of producing a wider range of mechanical improvements.\n\nWe recommend upgrading several of your earlier production facilities.\n\nYou may proceed in any of the following ways:\n\n- Construct a Proper Papermill (recommended).\n- Construct a Proper Ropemaker.\n- Construct an Industrial Kitchen.\n- Construct a Deep Pumping House, if your ancestral beaver instinct to dam rivers cannot be contained.\n\nDeep Pumping Houses are approximately 33% more efficient than standard pumping structures. Unfortunately, they do not provide the convenient flat roof required for certain structural upgrades. A regrettable compromise. Architects tend to complain about this.\n\nNaturally, we trust that any devout machine enthusiast will build all four."
status = "normal"
enUS = "With a Factory in operation, your settlement is now capable of producing a wider range of mechanical improvements.\n\nWe recommend upgrading several of your earlier production facilities.\n\nYou may proceed in any of the following ways:\n\n- Construct a Proper Papermill (recommended).\n- Construct a Proper Ropemaker.\n- Construct an Industrial Kitchen.\n- Construct a Deep Pumping House, if your ancestral beaver instinct to dam rivers cannot be contained.\n\nDeep Pumping Houses are approximately 33% more efficient than standard pumping structures. Unfortunately, they do not provide the convenient flat roof required for certain structural upgrades. A regrettable compromise. Architects tend to complain about this.\n\nNaturally, we trust that any devout machine enthusiast will build all four."
zhCN = "在工厂运作后，您的定居点现在能够生产更广泛的机械改进。\n\n我们建议升级您早期的几个生产设施。\n\n您可以通过以下方式进行：\n\n- 建造一个合适的造纸厂（推荐）。\n- 建造一个合适的绳索工厂。\n- 建造一个工业厨房。\n- 如果您祖先海狸的筑坝本能无法抑制，可以建造一个深层抽水房。\n\n深层抽水房的效率比标准抽水结构高出约33%。不幸的是，它们并不提供某些结构升级所需的方便平屋顶。这是一个遗憾的妥协。建筑师们对此往往抱怨。\n\n当然，我们相信任何虔诚的机械爱好者都会建造全部四个设施。"
zhTW = "有了運營中的工廠，您的定居點現在能夠生產更廣泛的機械改進。\n\n我們建議升級您早期的一些生產設施。\n\n您可以通過以下任一種方式進行：\n\n- 建造一個適當的造紙廠（推薦）。\n- 建造一個適當的繩索製造廠。\n- 建造一個工業廚房。\n- 建造一個深層抽水機構，如果您祖先的海狸本能無法抑制住去攔截河流的衝動。\n\n深層抽水機構的效率大約比標準抽水結構高33%。不幸的是，它們並不提供某些結構升級所需的便捷平屋頂。這是一個令人遺憾的妥協。建築師們往往對此有所抱怨。\n\n自然，我們相信任何虔誠的機械愛好者都會建造所有四個。"
ruRU = "С заводом в работе ваше поселение теперь способно производить более широкий ассортимент механических улучшений.\n\nМы рекомендуем улучшить несколько ваших более ранних производственных предприятий.\n\nВы можете продолжить любым из следующих способов:\n\n- Построить правильную бумажную фабрику (рекомендуется).\n- Построить правильную фабрику по производству веревки.\n- Построить промышленную кухню.\n- Построить глубокий насосный дом, если ваш наследственный бобровый инстинкт заграждать реки не может быть сдержан.\n\nГлубокие насосные дома примерно на 33% более эффективны, чем стандартные насосные сооружения. К сожалению, они не обеспечивают удобную плоскую крышу, необходимую для определенных структурных улучшений. Досадный компромисс. Архитекторы, как правило, жалуются на это.\n\nНесомненно, мы доверяем, что любой преданный энтузиаст машин построит все четыре."
jaJP = "工場が稼働している今、あなたの集落はより広範な機械的な改善を生産できるようになりました。\n\nいくつかの既存の生産施設をアップグレードすることをお勧めします。\n\n以下のいずれかの方法で進めてください。\n\n- 適切な製紙工場を建設する（推奨）。\n- 適切なロープ製造工場を建設する。\n- 産業用キッチンを建設する。\n- 祖先のビーバーとしての本能が川をせき止めることに耐えられない場合、深部ポンプハウスを建設する。\n\n深部ポンプハウスは標準的なポンプ構造より約33％効率的です。残念ながら、特定の構造的アップグレードに必要な便利な平屋根を提供しません。残念な妥協です。建築家たちはこれに不満を抱くことが多いです。\n\nもちろん、熱心な機械愛好者はすべての4つを建設することを信じています。"
frFR = "Avec une usine en fonctionnement, votre colonie est désormais capable de produire une gamme plus large d'améliorations mécaniques.\n\nNous recommandons de moderniser plusieurs de vos anciennes installations de production.\n\nVous pouvez procéder de l’une des manières suivantes :\n\n- Construire un Moulin à papier approprié (recommandé).\n- Construire un Fabricant de cordes approprié.\n- Construire une Cuisine industrielle.\n- Construire une Maison de pompage profonde, si votre instinct ancestral de castor à endiguer les rivières ne peut être contenu.\n\nLes Maisons de pompage profondes sont environ 33 % plus efficaces que les structures de pompage standard. Malheureusement, elles ne fournissent pas le toit plat pratique requis pour certaines améliorations structurelles. Un compromis regrettable. Les architectes ont tendance à se plaindre à ce sujet.\n\nNaturellement, nous faisons confiance à tout passionné de machines dévoué pour construire les quatre."
deDE = "Mit einer in Betrieb befindlichen Fabrik ist Ihre Siedlung jetzt in der Lage, eine breitere Palette mechanischer Verbesserungen zu produzieren.\n\nWir empfehlen, mehrere Ihrer früheren Produktionsstätten aufzurüsten.\n\nSie können auf eine der folgenden Weisen fortfahren:\n\n- Errichten Sie eine geeignete Papiermühle (empfohlen).\n- Errichten Sie einen ordentlichen Seilmacher.\n- Errichten Sie eine industrielle Küche.\n- Errichten Sie ein Tiefbrunnenhaus, wenn Ihr angeborener Biberinstinkt, Flüsse zu stauen, nicht zu bändigen ist.\n\nTiefbrunnenhäuser sind ungefähr 33 % effizienz-erhöhter als Standardpumpstrukturen. Leider bieten sie nicht das bequeme Flachdach, das für bestimmte strukturelle Upgrades erforderlich ist. Ein bedauerlicher Kompromiss. Architekten neigen dazu, sich darüber zu beschweren.\n\nNatürlich vertrauen wir darauf, dass jeder glühende Maschinenenthusiast alle vier bauen wird."
plPL = "Z fabryką w ruchu, Twoja osada jest teraz zdolna do produkcji szerszej gamy ulepszeń mechanicznych.\n\nZalecamy modernizację kilku wcześniejszych zakładów produkcyjnych.\n\nMożesz podjąć działania na jeden z następujących sposobów:\n\n- Zbudować odpowiednią papiernię (zalecane).\n- Zbudować odpowiednią wytwórnię lin.\n- Zbudować przemysłową kuchnię.\n- Zbudować głęboką pompownię, jeśli Twoje dziedziczne bobrze instynkty do tamowania rzek nie mogą zostać powstrzymane.\n\nGłębokie pompownie są około 33% bardziej wydajne niż standardowe struktury pompowania. Niestety, nie zapewniają one wygodnego płaskiego dachu wymaganego do niektórych ulepszeń konstrukcyjnych. Niezadowalający kompromis. Architekci mają tendencję do narzekania na to.\n\nOczywiście, ufamy, że każdy zagorzały entuzjasta maszyn zbuduje wszystkie cztery."
ptBR = "Com uma Fábrica em operação, seu assentamento agora é capaz de produzir uma gama mais ampla de melhorias mecânicas.\n\nRecomendamos atualizar várias de suas instalações de produção anteriores.\n\nVocê pode seguir por qualquer uma das seguintes maneiras:\n\n- Construir uma Papelaria Adequada (recomendado).\n- Construir um Fabrica de Cordas Adequada.\n- Construir uma Cozinha Industrial.\n- Construir uma Casa de Bombeamento Profunda, se seu instinto ancestral de castor para represar rios não puder ser contido.\n\nAs Casas de Bombeamento Profundas são aproximadamente 33% mais eficientes do que as estruturas de bombeamento padrão. Infelizmente, elas não fornecem o conveniente teto plano necessário para certas atualizações estruturais. Um compromisso lamentável. Arquitetos tendem a reclamar sobre isso.\n\nNaturalmente, confiamos que qualquer entusiasta de máquinas devoto construirá todos os quatro."
koKR = "공장이 가동 중이면, 귀하의 정착지는 이제 더 다양한 기계 개선을 생산할 수 있게 되었습니다.\n\n이전 생산 시설 몇 곳을 업그레이드하는 것을 권장합니다.\n\n다음 방법 중 하나로 진행할 수 있습니다:\n\n- 적절한 제지소를 건설하세요 (추천).\n- 적절한 로프 제작소를 건설하세요.\n- 산업 주방을 건설하세요.\n- 조상의 비버 본능이 하천을 막는 것을 억제할 수 없다면, 깊은 펌핑 하우스를 건설하세요.\n\n깊은 펌핑 하우스는 표준 펌프 구조보다 약 33% 더 효율적입니다. 불행히도, 특정 구조 업그레이드에 필요한 편리한 평면 지붕을 제공하지 않습니다. 유감스러운 타협이죠. 건축가들은 이에 대해 불평하는 경향이 있습니다.\n\n물론, 모든 열광적인 기계 애호가가 네 가지 모두를 건설할 것이라 믿습니다."
csCZ = "S provozovanou továrnou je vaše osídlení nyní schopné vyrábět širší škálu mechanických vylepšení.\n\nDoporučujeme modernizaci několika z vašich dřívějších výrobních zařízení.\n\nMůžete postupovat následujícími způsoby:\n\n- Postavte Řádnou papírnu (doporučeno).\n- Postavte Řádného výrobce provázků.\n- Postavte Průmyslovou kuchyni.\n- Postavte Hlubokou čerpací stanici, pokud nelze potlačit váš dědický bobří instinkt k zadržování řek.\n\nHluboké čerpací stanice jsou přibližně o 33 % efektivnější než standardní čerpací struktury. Bohužel neposkytují pohodlnou plochou střechu potřebnou pro určité strukturální vylepšení. Lítostivý kompromis. Architekti si na to obvykle stěžují.\n\nPřirozeně, věříme, že každý oddaný nadšenec do strojů postaví všech čtyři."
viVN = "Với một Nhà máy hoạt động, khu định cư của bạn giờ đây có khả năng sản xuất một loạt các cải tiến cơ khí đa dạng hơn.\n\nChúng tôi khuyên bạn nên nâng cấp một số cơ sở sản xuất trước đây của bạn.\n\nBạn có thể tiến hành theo bất kỳ cách nào sau đây:\n\n- Xây dựng một Nhà máy giấy đúng cách (đề xuất).\n- Xây dựng một Nhà sản xuất dây đúng cách.\n- Xây dựng một Nhà bếp công nghiệp.\n- Xây dựng một Nhà bơm sâu, nếu bản năng đập đập của bạn không thể kiềm chế.\n\nNhà bơm sâu hiệu quả khoảng 33% so với các cấu trúc bơm tiêu chuẩn. Thật không may, chúng không cung cấp mái phẳng tiện lợi cần thiết cho một số nâng cấp cấu trúc nhất định. Một thỏa hiệp đáng tiếc. Các kiến trúc sư thường phàn nàn về điều này.\n\nTất nhiên, chúng tôi tin rằng bất kỳ người đam mê máy móc nào sẽ xây dựng cả bốn."
trTR = "Bir Fabrika faaliyette olduğunda, yerleşiminiz artık daha geniş bir mekanik iyileştirme yelpazesi üretebilir. \n\nDaha önceki üretim tesislerinizi birkaç tanesini yükseltmenizi öneririz. \n\nAşağıdaki yollarla ilerleyebilirsiniz: \n\n- Uygun bir Kağıt Fabrikası inşa edin (önerilir). \n- Uygun bir İp Fabrikası inşa edin. \n- Endüstriyel bir Mutfak inşa edin. \n- Atalarınızın nehirleri baraj yapma içgüdüsü kontrol altına alınamıyorsa Derin Pompa Evi inşa edin. \n\nDerin Pompa Evleri, standart pompa yapılarından yaklaşık %33 daha verimlidir. Ne yazık ki, belirli yapısal yükseltmeler için gerekli olan uygun düz çatıyı sağlamazlar. Üzücü bir uzlaşma. Mimarlar bunun hakkında şikayet etmeye eğilimlidir. \n\nElbette, herhangi bir tutkulu makine meraklısının dördünü de inşa edeceğine güveniyoruz."

["Tutorial.MechanicBranch.BlueprintIntroA.text.Whitepaws"]
raw = "Your mechanical infrastructure is beginning to show promise.\n\nThe next stage will require a more ambitious project: the design of a proper <color=green>Floodgate Dam</color>.\n\nSuch a structure allows your settlement to redirect water flow toward — or away from — critical infrastructure, typically to prevent a Badtide from reaching and contaminating your reservoir.\n\nInstruct your <color=green>Mechanic</color> to begin drafting plans for this device. This research will require considerable time and resources, so ensure it has everything required to work without interruption.\n\nMost notably, <color=red>Brain Boosting Salts</color> will be required for such intensive reflection. Contact the <color=red>Directorate of Applied Chemistry</color> and survive their questionable guidance in order to establish production.\n\nWhen the task is complete, the Mechanic will eventually emerge from the lodge brandishing a perfectly clear and definitely understandable <color=green>blueprint</color> of the invention.\n\nWhile this process unfolds, we recommend that you follow the instructions of the rather insufferable people from the Bureau of Intellectual Property.\n\nWe contacted them on your behalf.\n\nYou are welcome."
status = "normal"
enUS = "Your mechanical infrastructure is beginning to show promise.\n\nThe next stage will require a more ambitious project: the design of a proper <color=green>Floodgate Dam</color>.\n\nSuch a structure allows your settlement to redirect water flow toward — or away from — critical infrastructure, typically to prevent a Badtide from reaching and contaminating your reservoir.\n\nInstruct your <color=green>Mechanic</color> to begin drafting plans for this device. This research will require considerable time and resources, so ensure it has everything required to work without interruption.\n\nMost notably, <color=red>Brain Boosting Salts</color> will be required for such intensive reflection. Contact the <color=red>Directorate of Applied Chemistry</color> and survive their questionable guidance in order to establish production.\n\nWhen the task is complete, the Mechanic will eventually emerge from the lodge brandishing a perfectly clear and definitely understandable <color=green>blueprint</color> of the invention.\n\nWhile this process unfolds, we recommend that you follow the instructions of the rather insufferable people from the Bureau of Intellectual Property.\n\nWe contacted them on your behalf.\n\nYou are welcome."
zhCN = "“你的机械基础设施开始显示出潜力。\n\n下一阶段将需要一个更雄心勃勃的项目：设计一个合适的<color=green>溢洪道水坝</color>。\n\n这样的结构可以让你的定居点将水流引导至——或远离——关键基础设施，通常是为了防止坏潮侵入并污染你的水库。\n\n指示你的<color=green>机械师</color>开始起草该设备的计划。此项研究将需要大量的时间和资源，请确保它有一切必需品，以便不间断地工作。\n\n最重要的是，这种强度的反思将需要<color=red>提升思维的盐</color>。联系<color=red>应用化学局</color>并忍耐他们可疑的指导，以便建立生产。\n\n当任务完成时，机械师最终将从小屋中走出，手持一份清晰且绝对易于理解的<color=green>发明蓝图</color>。\n\n在此过程中，我们建议你遵循那些来自知识产权局的令人难以忍受的人的指示。\n\n我们已代表你与他们联系。\n\n不客气。”"
zhTW = "你的機械基礎設施開始顯示出潛力。\n\n下一個階段將需要一個更具雄心的項目：設計一個合適的<color=green>洪水閘壩</color>。\n\n這種結構允許你的定居點將水流引導到——或遠離——關鍵基礎設施，通常是為了防止壞潮進入並污染你的水庫。\n\n指派你的<color=green>機械師</color>開始起草這個裝置的計劃。這項研究將需要相當多的時間和資源，所以請確保它擁有一切所需，以便不間斷地工作。\n\n最重要的是，進行如此密集的思考將需要<color=red>腦力增強鹽</color>。請聯繫<color=red>應用化學局</color>，並在他們那令人質疑的指導下生存，以便建立生產。\n\n當任務完成時，機械師最終將從小屋中走出，揮舞著一份絕對清晰且完全易懂的<color=green>藍圖</color>。\n\n在這個過程展開的同時，我們建議你遵循那些來自知識產權局的相當令人難以忍受的人的指導。\n\n我們已代表你聯繫了他們。\n\n不客氣。"
ruRU = "Ваша механическая инфраструктура начинает проявлять перспективы.\n\nСледующий этап потребует более амбициозного проекта: разработка полноценной <color=green>плотины с затвором</color>.\n\nТакая структура позволяет вашему поселению перенаправлять поток воды к — или от — критической инфраструктуры, обычно чтобы предотвратить попадание плохой潮ы и загрязнение вашего резервуара.\n\nПоручите своему <color=green>Механнику</color> начать разработку планов для этого устройства. Это исследование потребует значительного времени и ресурсов, поэтому убедитесь, что у него есть все необходимое для работы без перерывов.\n\nПрежде всего, для такого интенсивного размышления потребуются <color=red>соли, улучшающие мозговую деятельность</color>. Свяжитесь с <color=red>Директораатом прикладной химии</color> и переживите их сомнительное руководство, чтобы наладить производство.\n\nКогда задание будет выполнено, Механник в конечном итоге выйдет из домика, держа в руках абсолютно четкий и определенно понятный <color=green>чертеж</color> изобретения.\n\nВ то время как этот процесс разворачивается, мы рекомендуем следовать указаниям довольно невыносимых людей из Бюро интеллектуальной собственности.\n\nМы связались с ними от вашего имени.\n\nПожалуйста."
jaJP = "あなたの機械インフラは、期待が持てるようになってきました。\n\n次の段階では、より大規模なプロジェクトが必要です：適切な<color=green>フラッドゲートダム</color>の設計です。\n\nこのような構造物は、あなたの集落が重要なインフラに対して水の流れを向けたり、逆に流したりすることを可能にします。通常は、バッドタイドが貯水池に達して汚染するのを防ぐためです。\n\n<color=green>メカニック</color>にこの装置の設計図を起草するよう指示してください。この研究にはかなりの時間とリソースが必要になるため、途切れることなく作業できるように必要なものを全て揃えておいてください。\n\n特に、<color=red>脳の活性化塩</color>がそのような集中的な思考には必要です。<color=red>応用化学局</color>に連絡し、彼らの疑わしい指導を乗り越えて生産を確立してください。\n\n作業が完了すると、メカニックはロッジから完璧に明瞭で確実に理解できる<color=green>設計図</color>を手にして出てきます。\n\nこのプロセスが進行している間、知的財産局の非常に耐え難い人々の指示に従うことをお勧めします。\n\n私たちはあなたのために彼らに連絡を取りました。\n\nどういたしまして。"
frFR = "Votre infrastructure mécanique commence à montrer des signes de promesse.\n\nLa prochaine étape nécessitera un projet plus ambitieux : la conception d'un véritable <color=green>barrage à vannes</color>.\n\nUne telle structure permet à votre colonie de rediriger le flux d'eau vers — ou loin de — l'infrastructure critique, généralement pour éviter qu'une Marée Nuisible n'atteigne et ne contamine votre réservoir.\n\nInstruisez votre <color=green>Mécanicien</color> à commencer à élaborer des plans pour cet appareil. Cette recherche nécessitera un temps et des ressources considérables, alors assurez-vous qu'il dispose de tout ce dont il a besoin pour travailler sans interruption.\n\nPlus particulièrement, des <color=red>Sels Stimulants</color> seront nécessaires pour une réflexion aussi intensive. Contactez la <color=red>Direction de la Chimie Appliquée</color> et survivez à leurs conseils douteux afin d'établir la production.\n\nLorsque la tâche sera accomplie, le Mécanicien sortira finalement de l'abri brandissant un <color=green>plan</color> parfaitement clair et définitivement compréhensible de l'invention.\n\nPendant que ce processus se déroule, nous vous recommandons de suivre les instructions des gens plutôt insupportables du Bureau de la Propriété Intellectuelle.\n\nNous les avons contactés en votre nom.\n\nDe rien."
deDE = "Ihre mechanische Infrastruktur beginnt vielversprechend zu werden.\n\nDie nächste Phase erfordert ein ambitionierteres Projekt: die Konstruktion eines ordentlichen <color=green>Stauwehrs</color>.\n\nEine solche Struktur ermöglicht es Ihrer Siedlung, den Wasserfluss in Richtung — oder von — kritischer Infrastruktur umzuleiten, typischerweise um zu verhindern, dass eine Badflut Ihr Reservoir erreicht und kontaminiert.\n\nWeisen Sie Ihren <color=green>Mechaniker</color> an, mit der Erstellung von Plänen für dieses Gerät zu beginnen. Diese Forschung wird beträchtliche Zeit und Ressourcen erfordern, also stellen Sie sicher, dass er alles hat, was benötigt wird, um ohne Unterbrechung arbeiten zu können.\n\nBesonders wichtig sind <color=red>Gehirnfördernde Salze</color>, die für so intensive Überlegungen erforderlich sind. Kontaktieren Sie die <color=red>Direktion für Angewandte Chemie</color> und überstehen Sie deren fragwürdige Anleitung, um die Produktion zu etablieren.\n\nWenn die Aufgabe abgeschlossen ist, wird der Mechaniker schließlich aus der Lodge treten und ein perfekt klares und definitiv verständliches <color=green>Blueprint</color> der Erfindung präsentieren.\n\nWährend dieser Prozess abläuft, empfehlen wir, den Anweisungen der eher unerträglichen Menschen im Büro für geistiges Eigentum zu folgen.\n\nWir haben sie in Ihrem Namen kontaktiert.\n\nBitte schön."
plPL = "Twoja infrastruktura mechaniczna zaczyna wykazywać obiecujące oznaki.\n\nNastępny etap wymagać będzie bardziej ambitnego projektu: zaprojektowania odpowiedniego <color=green>tamę z zaworem</color>.\n\nTaka struktura pozwala twojej osadzie na kierowanie przepływem wody w stronę — lub z dala od — krytycznej infrastruktury, zazwyczaj w celu zapobiegania dotarciu Badtide do twojego zbiornika i jego zanieczyszczeniu.\n\nPoleć swojemu <color=green>mechanikowi</color> rozpocząć szkicowanie planów dla tego urządzenia. To badanie wymaga znacznej ilości czasu i zasobów, więc zapewnij mu wszystko, co potrzebne, aby pracować bez przerwy.\n\nSzczególnie zauważalne, że do tak intensywnej refleksji będą wymagane <color=red>sole wspomagające pracę mózgu</color>. Skontaktuj się z <color=red>Dyrekcją Chemii Stosowanej</color> i przetrwaj ich wątpliwe wskazówki, aby ustanowić produkcję.\n\nGdy zadanie zostanie ukończone, mechanik w końcu wyjdzie z chaty z doskonale wyraźnym i zdecydowanie zrozumiałym <color=green>projektem</color> wynalazku.\n\nPodczas gdy ten proces się odbywa, zalecamy, abyś postępował zgodnie z instrukcjami dość nieznośnych ludzi z Biura Własności Intelektualnej.\n\nSkontaktowaliśmy się z nimi w twoim imieniu.\n\nProszę bardzo."
ptBR = "Sua infraestrutura mecânica começa a mostrar promessas.\n\nA próxima etapa exigirá um projeto mais ambicioso: o design de uma <color=green>Barragem com Portão Inundável</color> apropriada.\n\nTal estrutura permite que seu assentamento redirecione o fluxo de água para — ou afastado de — infraestruturas críticas, geralmente para impedir que uma Maré Ruim alcance e contamine seu reservatório.\n\nInstrua seu <color=green>Mecânico</color> a começar a elaborar os planos para este dispositivo. Esta pesquisa exigirá considerável tempo e recursos, então assegure-se de que ele tenha tudo o que precisa para trabalhar sem interrupções.\n\nNotavelmente, <color=red>Sais para Aumento de Capacidade Mental</color> serão necessários para tal reflexão intensa. Entre em contato com a <color=red>Diretoria de Química Aplicada</color> e sobrevive à orientação questionável deles para estabelecer a produção.\n\nQuando a tarefa estiver completa, o Mecânico eventualmente surgirá da cabana brandindo um <color=green>plano</color> perfeitamente claro e definitivamente compreensível da invenção.\n\nEnquanto esse processo se desenrola, recomendamos que você siga as instruções das pessoas bastante insuportáveis do Departamento de Propriedade Intelectual.\n\nNós os contatamos em seu nome.\n\nDe nada."
koKR = "당신의 기계 인프라가 가능성을 보이기 시작했습니다. \n\n다음 단계는 보다 야심찬 프로젝트가 필요합니다: 적절한 <color=green>홍수통</color> 설계입니다. \n\n이 구조물은 귀하의 정착지가 중요한 인프라로의 수로를 전환하거나 차단할 수 있도록 하여, 일반적으로 나쁜 조수가 저수지에 도달해 오염되는 것을 방지합니다. \n\n귀하의 <color=green>기계공</color>에게 이 장치의 계획 초안을 작성하기 시작하도록 지시하십시오. 이 연구는 상당한 시간과 자원을 요구하므로, 중단 없이 작업할 수 있도록 모든 것을 갖추고 있는지 확인하십시오. \n\n특히, <color=red>두뇌 활성화 염</color>이 이러한 집중적인 반성을 위해 필요합니다. <color=red>응용 화학국</color>에 연락하여 그들의 의심스러운 지침을 견뎌야 생산을 성립할 수 있습니다. \n\n작업이 완료되면, 기계공은 결국 잘 정리된, 명확하고 확실히 이해 가능한 <color=green>청사진</color>을 들고 로그에서 나올 것입니다. \n\n이 과정이 진행되는 동안, 우리는 지적 재산청의 다소 성가신 사람들의 지침을 따르는 것을 권장합니다. \n\n우리는 귀하를 대신하여 그들과 연락했습니다. \n\n환영합니다."
csCZ = "Vaše mechanická infrastruktura začíná vykazovat jistý potenciál.\n\nDalší fáze si bude vyžadovat ambicióznější projekt: návrh správné <color=green>přepadové hráze</color>.\n\nTaková struktura umožňuje vaší osadě přesměrovat tok vody směrem k — nebo od — kritické infrastruktuře, obvykle aby se zabránilo příchodu Badtide a kontaminaci vaší nádrže.\n\nNaveďte svého <color=green>Mechanika</color>, aby začal vytvářet plány na toto zařízení. Tento výzkum si vyžádá značné časové a materiální zdroje, takže zajistěte, aby měl všechno potřebné pro nerušenou práci.\n\nZejména budou pro tak intenzivní uvažování potřeba <color=red>Brain Boosting Salts</color>. Kontaktujte <color=red>Ředitelství aplikované chemie</color> a přežijte jejich pochybné pokyny abyste zajistili výrobu.\n\nAž bude úkol dokončen, Mechanik se nakonec objeví z chaty s dokonale jasným a rozhodně srozumitelným <color=green>plánem</color> vynálezu.\n\nBěhem této fáze doporučujeme řídit se pokyny od celkem nesnesitelných lidí z Úřadu pro intelektuální vlastnictví.\n\nKontaktovali jsme je vaším jménem.\n\nNení zač."
viVN = "Cơ sở hạ tầng cơ khí của bạn đã bắt đầu cho thấy triển vọng.\n\nGiai đoạn tiếp theo sẽ đòi hỏi một dự án tham vọng hơn: thiết kế một <color=green>Đập Cửa Xả Nước</color> hợp lý.\n\nMột công trình như vậy cho phép khu định cư của bạn điều chỉnh dòng chảy nước đến hoặc từ các cơ sở hạ tầng quan trọng, thường là để ngăn chặn một Badtide tiếp cận và làm ô nhiễm bể chứa của bạn.\n\nHãy chỉ định cho <color=green>Cơ khí viên</color> bắt đầu vạch ra kế hoạch cho thiết bị này. Nghiên cứu này sẽ cần một lượng thời gian và tài nguyên đáng kể, vì vậy hãy đảm bảo rằng nó có mọi thứ cần thiết để làm việc mà không bị gián đoạn.\n\nCần lưu ý rằng, <color=red>Muối Tăng Cường Não</color> sẽ được yêu cầu cho sự phản ánh intensive như vậy. Liên hệ với <color=red>Cục Hóa học Ứng dụng</color> và sống sót qua những hướng dẫn đáng ngờ của họ để thiết lập sản xuất.\n\nKhi nhiệm vụ hoàn tất, Cơ khí viên cuối cùng sẽ xuất hiện từ lều với một <color=green>kế hoạch</color> hoàn toàn rõ ràng và chắc chắn dễ hiểu về phát minh này.\n\nTrong khi quá trình này diễn ra, chúng tôi khuyên bạn nên làm theo hướng dẫn của những người khá phiền phức từ Cục Sở hữu trí tuệ.\n\nChúng tôi đã liên hệ với họ thay mặt bạn.\n\nXin vui lòng."
trTR = "Mekanik altyapınız umut vermeye başlıyor.\n\nBir sonraki aşama daha iddialı bir projeyi gerektirecek: uygun bir <color=green>Kapak Barajı</color> tasarımı.\n\nBöyle bir yapı, yerleşiminizin su akışını kritik altyapıya yönlendirmesine olanak tanır; genellikle Badtide'ın rezervuarınıza ulaşmasını ve kirletmesini önlemek için.\n\n<color=green>Mekanik</color> olanınıza bu cihaz için planlar çizmeye başlaması talimatını verin. Bu araştırma önemli ölçüde zaman ve kaynak gerektirecektir, bu yüzden kesintisiz çalışması için gereken her şeye sahip olduğundan emin olun.\n\nÖzellikle, bu kadar yoğun düşünce için <color=red>Beyin Güçlendirici Tuzlar</color> gerekecektir. <color=red>Uygulamalı Kimya Dairesi</color> ile iletişime geçin ve üretim kurmak için şüpheli yönlendirmelerinden sağ çıkın.\n\nGörev tamamlandığında, Mekanik sonunda, icadın mükemmel derecede net ve kesinlikle anlaşılır bir <color=green>planını</color> tutarak kulübeden çıkacaktır.\n\nBu süreç devam ederken, Fikri Mülkiyet Bürosu'ndan oldukça katlanılmaz kişilerin talimatlarını takip etmenizi öneririz.\n\nSizin adınıza onlarla irtibat kurduk.\n\nRica ederiz."

["Tutorial.MechanicBranch2.BuildFloodgateDam.Whitepaws"]
raw = "Ah. You are still alive. Good.\n\nIt seems you have successfully produced <color=red>Brain Boosting Salts</color>, and since we — thankfully — did not hear back from the IPP bureau, we will assume you managed to duplicate your blueprints.\n\nYou may now construct a Floodgate Dam.\n\nThe objective of such a structure is not to stop water entirely — that is the thinking of amateurs and architects — but to redirect its flow according to your needs.\n\nProperly placed floodgates allow you to guide water away from your reservoir during a Badtide, or toward your infrastructure when conditions are favorable.\n\nConstruct at least one Floodgate Dam and demonstrate to all that machines are superior to the forces of nature."
status = "normal"
enUS = "Ah. You are still alive. Good.\n\nIt seems you have successfully produced <color=red>Brain Boosting Salts</color>, and since we — thankfully — did not hear back from the IPP bureau, we will assume you managed to duplicate your blueprints.\n\nYou may now construct a Floodgate Dam.\n\nThe objective of such a structure is not to stop water entirely — that is the thinking of amateurs and architects — but to redirect its flow according to your needs.\n\nProperly placed floodgates allow you to guide water away from your reservoir during a Badtide, or toward your infrastructure when conditions are favorable.\n\nConstruct at least one Floodgate Dam and demonstrate to all that machines are superior to the forces of nature."
zhCN = "“啊。你还活着。好极了。\n\n看来你成功地生产了<color=red>增强脑力的盐</color>，而且因为我们——谢天谢地——没有收到IPB局的回复，我们就假设你成功地复制了你的蓝图。\n\n你现在可以建造一个闸门大坝了。\n\n这种结构的目的是并不是完全阻止水流——那是业余人士和建筑师的想法——而是按照你的需求重新引导水流。\n\n正确放置的闸门可以让你在逆潮期间引导水流远离水库，或者在条件有利时引导水流向你的基础设施。\n\n建造至少一个闸门大坝，并向所有人证明机器优于自然力量。”"
zhTW = "「啊，你還活著。很好。\n\n看來你成功製造了<color=red>增強大腦的鹽</color>，而且幸運的是我們沒有從IPP局聽到回覆，我們將假設你成功複製了你的藍圖。\n\n你現在可以建造一座洪水閘壩。\n\n這種結構的目標不是完全阻止水流——那是業餘者和建築師的想法——而是根據你的需求重新引導水流。\n\n適當放置的洪水閘能夠讓你在壞潮期間將水從水庫引開，或在條件有利時將水引向你的基礎設施。\n\n建造至少一座洪水閘壩，向所有人展示機器優於自然力量。」"
ruRU = "А. Вы все еще живы. Хорошо.\n\nПохоже, вы успешно произвели <color=red>Соли, Увеличивающие Мозговую Активность</color>, и поскольку мы — к счастью — не получили ответа из бюро ИПП, мы будем считать, что вам удалось продублировать ваши чертежи.\n\nТеперь вы можете построить Дамбу с Затвором.\n\nЦель такой конструкции не в том, чтобы полностью остановить воду — это мышление любителей и архитекторов — а в том, чтобы перенаправить ее поток в соответствии с вашими нуждами.\n\nПравильно размещенные затворы позволяют вам направлять воду от вашего резервуара во времена Неприятного Прилива или к вашей инфраструктуре, когда условия способствуют этому.\n\nПостройте как минимум одну Дамбу с Затвором и продемонстрируйте всем, что машины превосходят силы природы."
jaJP = "ああ。まだ生きているのですね。良かった。\n\nどうやら<color=red>脳活性化塩</color>を無事に生産したようですし、私たちが — 幸いにも — IPP局から返事を聞いていないので、あなたが青写真を複製できたと仮定しましょう。\n\nこれからフラッドゲートダムを建設できます。\n\nそのような構造物の目的は、水を完全に止めることではありません — それは素人や建築家の考え方です — しかし、あなたのニーズに応じて水の流れを再方向付けすることです。\n\n適切に配置されたフラッドゲートは、バッドタイドの間に水を貯水池から誘導したり、条件が良いときにインフラへ水を誘導したりすることを可能にします。\n\n少なくとも1つのフラッドゲートダムを建設し、全てに機械が自然の力よりも優れていることを示してください。"
frFR = "Ah. Vous êtes toujours en vie. Bien.\n\nIl semble que vous ayez réussi à produire des <color=red>sels stimulants pour le cerveau</color>, et comme nous — heureusement — n'avons pas eu de nouvelles du bureau de l'IPP, nous supposerons que vous avez réussi à dupliquer vos plans.\n\nVous pouvez maintenant construire un barrage à clapets.\n\nL'objectif d'une telle structure n'est pas d'arrêter complètement l'eau — c'est la pensée des amateurs et des architectes — mais de rediriger son flux selon vos besoins.\n\nDes clapets bien placés vous permettent de guider l'eau loin de votre réservoir pendant une marée mauvaise, ou vers votre infrastructure lorsque les conditions sont favorables.\n\nConstruisez au moins un barrage à clapets et démontrez à tous que les machines sont supérieures aux forces de la nature."
deDE = "Ah. Du lebst noch. Gut.\n\nEs scheint, dass du erfolgreich <color=red>Gehirnverstärkende Salze</color> produziert hast, und da wir — glücklicherweise — nichts vom IPP-Büro gehört haben, nehmen wir an, dass es dir gelungen ist, deine Blaupausen zu duplizieren.\n\nDu kannst nun einen Hochwasserstaudamm bauen.\n\nDas Ziel einer solchen Struktur ist es nicht, das Wasser vollständig zu stoppen — das denken Amateure und Architekten — sondern seinen Fluss je nach Bedarf umzulenken.\n\nRichtig platzierte Hochwasserstaus ermöglichen es dir, das Wasser während einer Flut von deinem Reservoir wegzuführen oder bei günstigen Bedingungen zu deiner Infrastruktur hinzuleiten.\n\nBaue mindestens einen Hochwasserstaudamm und zeige allen, dass Maschinen den Kräften der Natur überlegen sind."
plPL = "Ah. Wciąż żyjesz. Dobrze.\n\nWygląda na to, że udało ci się wyprodukować <color=red>soli zwiększających wydolność mózgu</color>, a ponieważ — na szczęście — nie otrzymaliśmy żadnej wiadomości z biura IPP, przyjmiemy, że udało ci się powielić swoje plany.\n\nMożesz teraz zbudować tamę z furty.\n\nCelem takiej konstrukcji nie jest całkowite zatrzymanie wody — to myślenie amatorów i architektów — lecz skierowanie jej przepływu według twoich potrzeb.\n\nPrawidłowo umieszczone furty pozwalają na odprowadzenie wody z twojego zbiornika podczas złej pływy, lub skierowanie jej w stronę twojej infrastruktury, gdy warunki są korzystne.\n\nZbuduj przynajmniej jedną tamę z furty i pokaż wszystkim, że maszyny są lepsze od sił natury."
ptBR = "Ah. Você ainda está vivo. Bom.\n\nParece que você produziu com sucesso <color=red>Sal em Promoção Cerebral</color>, e como — felizmente — não tivemos notícias do escritório da IPP, vamos assumir que você conseguiu duplicar seus projetos.\n\nVocê pode agora construir uma Represa de Portão.\n\nO objetivo de tal estrutura não é parar a água completamente — esse é o pensamento de amadores e arquitetos — mas redirecionar seu fluxo de acordo com suas necessidades.\n\nPortões bem posicionados permitem que você guie a água longe do seu reservatório durante uma Maré Ruim, ou em direção à sua infraestrutura quando as condições forem favoráveis.\n\nConstrua pelo menos uma Represa de Portão e demonstre a todos que as máquinas são superiores às forças da natureza."
koKR = "아. 당신은 아직 살아 있군요. 좋습니다.\n\n당신이 성공적으로 <color=red>브레인 부스팅 솔트</color>를 생산한 것 같습니다. 다행히도 IPP 사무소로부터 아무런 응답이 없었으므로, 당신이 파란색 인쇄물의 복제를 성공적으로 마쳤다고 가정하겠습니다.\n\n이제 당신은 플러드게이트 댐을 건설할 수 있습니다.\n\n이러한 구조물의 목적은 물을 완전히 막는 것이 아니라 — 그것은 아마추어와 건축가들의 생각입니다 — 필요에 따라 물의 흐름을 유도하는 것입니다.\n\n제대로 배치된 플러드게이트는 나쁜 조수 중에 저수지에서 물을 유도하거나 조건이 좋은 경우에 인프라로 물을 끌어들일 수 있게 해줍니다.\n\n최소한 하나의 플러드게이트 댐을 건설하고 기계가 자연의 힘보다 우수하다는 것을 모두에게 증명해 보이십시오."
csCZ = "„Ah. Stále jsi na živu. Dobře.\n\nZdá se, že jsi úspěšně vyprodukoval <color=red>Solné soli zvyšující mozek</color>, a protože jsme — naštěstí — nedostali žádnou zprávu z úřadu IPP, předpokládáme, že se ti podařilo duplikovat tvé plány.\n\nNyní můžeš postavit přehradu se stavidlem.\n\nCílem takové struktury není úplně zastavit vodu — to je myšlení amatérů a architektů — ale přesměrovat její tok podle tvých potřeb.\n\nSprávně umístěná stavidla ti umožní nasměrovat vodu pryč z tvé nádrže během Badtide, nebo směrem k tvé infrastruktuře, když jsou podmínky příznivé.\n\nPostav alespoň jednu přehradu se stavidlem a ukaž všem, že stroje jsou nadřazené silám přírody.“"
viVN = "À. Bạn vẫn còn sống. Tốt.\n\nCó vẻ như bạn đã sản xuất thành công <color=red>Muối Tăng Cường Trí Não</color>, và vì chúng tôi — thật may mắn — không nghe phản hồi từ văn phòng IPP, chúng tôi sẽ giả định rằng bạn đã quản lý để nhân bản các bản thiết kế của mình.\n\nBạn có thể xây dựng một Đập Cống.\n\nMục tiêu của một cấu trúc như vậy không phải là ngăn chặn nước hoàn toàn — đó là suy nghĩ của những tay nghiệp dư và kiến trúc sư — mà là điều chỉnh dòng chảy của nó theo nhu cầu của bạn.\n\nCác cống được đặt đúng cách cho phép bạn dẫn nước ra khỏi bể chứa trong thời gian thủy triều xấu, hoặc hướng về cơ sở hạ tầng của bạn khi điều kiện thuận lợi.\n\nHãy xây dựng ít nhất một Đập Cống và chứng minh cho mọi người rằng máy móc vượt trội hơn sức mạnh của thiên nhiên."
trTR = "Ah. Hala hayattasın. Güzel.\n\nGörünüşe göre <color=red>Beyin Güçlendirici Tuzlar</color> üretebildin ve şükürler olsun ki IPP bürosundan geri dönüş almadık, bu yüzden mavi planlarını kopyaladığını varsayıyoruz.\n\nArtık bir Su Seti inşa edebilirsin.\n\nBu tür bir yapının amacı suyu tamamen durdurmak değildir — bu amatörlerin ve mimarların düşüncesidir — fakat akışını ihtiyaçlarına göre yönlendirmektir.\n\nDoğru yerleştirilen su setleri, kötü gelgit sırasında suyu rezervuarından uzaklaştırmana veya koşullar uygun olduğunda altyapına yönlendirmeni sağlar.\n\nEn az bir Su Seti inşa et ve herkese makinelerin doğa güçlerinden üstün olduğunu göster."

["Tutorial.ArchitectBranch.ArchitectText.Whitepaws"]
raw = "Expansion requires support. Height without structure is collapse waiting to happen.\n\nThis branch concerns the production of <color=green>Scaffoldings</color> for the construction of <color=green>Platforms</color>, walkways, and reinforced multi-level infrastructure.\n\nScaffoldings enables vertical growth, <color=green>Farm Upgrades</color>, and enhanced mobility — including <color=green>Zipline transit systems</color> for efficient movement across our territory.\n\nWhen you are prepared to build higher without falling, follow up on this directive.\n\nElevation increases possibility. It also increases consequences."
status = "normal"
enUS = "Expansion requires support. Height without structure is collapse waiting to happen.\n\nThis branch concerns the production of <color=green>Scaffoldings</color> for the construction of <color=green>Platforms</color>, walkways, and reinforced multi-level infrastructure.\n\nScaffoldings enable vertical growth, <color=green>Farm Upgrades</color>, and enhanced mobility — including <color=green>Zipline transit systems</color> for efficient movement across our territory.\n\nWhen you are prepared to build higher without falling, follow up on this directive.\n\nElevation increases possibility. It also increases consequences."
zhCN = "扩展需要支持。没有结构的高度是等待崩溃的。\n\n这个分支涉及建造<color=green>脚手架</color>以用于建造<color=green>平台</color>、步道和增强的多层基础设施。\n\n脚手架能够实现垂直增长、<color=green>农场升级</color>和增强的机动性——包括<color=green>滑索运输系统</color>，以便在我们的领土上高效移动。\n\n当你准备好在不坠落的情况下建造更高时，遵循这一指示。\n\n高度增加可能性。它也增加后果。"
zhTW = "擴展需要支持。沒有結構的高度是等待崩潰的。\n\n這一分支涉及建造 <color=green>腳手架</color> 的生產，用於建造 <color=green>平台</color>、步道以及加強的多層基礎設施。\n\n腳手架使垂直增長、<color=green>農場升級</color> 和增強的流動性成為可能——包括 <color=green>索道運輸系統</color> 以有效地在我們的領土內移動。\n\n當你準備好在不摔倒的情況下建造更高的結構時，請遵循這一指令。\n\n高度增加了可能性，也增加了後果。"
ruRU = "Расширение требует поддержки. Высота без структуры — это ожидающий коллапс.\n\nЭта ветвь касается производства <color=green>Вышек</color> для строительства <color=green>Платформ</color>, пешеходных троп и усиленной многоуровневой инфраструктуры.\n\nВышки позволяют вертикальный рост, <color=green>Улучшения Ферм</color> и улучшенную мобильность — включая <color=green>Системы зиплайна</color> для эффективного передвижения по нашей территории.\n\nКогда вы будете готовы строить выше без падений, выполните эту директиву.\n\nВысота увеличивает возможности. Она также увеличивает последствия."
jaJP = "「拡張にはサポートが必要です。構造なしの高さは、崩壊の準備が整った状態です。\n\nこのブランチは、<color=green>プラットフォーム</color>、歩道、強化された多層インフラストラクチャーの建設のための<color=green>足場</color>の生産に関するものです。\n\n足場は垂直成長、<color=green>農場のアップグレード</color>、そして<color=green>ジップライン輸送システム</color>を含む、移動性の向上を可能にします。これにより、私たちの領土内で効率的に移動できます。\n\n倒れずに高く建設する準備ができたら、この指令に従ってください。\n\n標高は可能性を高めます。また、それは結果をも増加させます。」"
frFR = "L'expansion nécessite un soutien. Une hauteur sans structure est un effondrement en attente de se produire.\n\nCette branche concerne la production de <color=green>Echafaudages</color> pour la construction de <color=green>Plateformes</color>, de passerelles et d'infrastructures multi-niveaux renforcées.\n\nLes échafaudages permettent une croissance verticale, des <color=green>Améliorations de Ferme</color> et une mobilité améliorée — y compris des <color=green>Systèmes de télésiège</color> pour un déplacement efficace à travers notre territoire.\n\nLorsque vous êtes prêts à construire plus haut sans tomber, suivez cette directive.\n\nL'élévation augmente les possibilités. Elle augmente également les conséquences."
deDE = "Expansion erfordert Unterstützung. Höhe ohne Struktur ist der Zusammenbruch, der darauf wartet, geschehen zu werden.\n\nDieser Zweig betrifft die Produktion von <color=green>Gerüsten</color> für den Bau von <color=green>Plattformen</color>, Gehwegen und verstärkten mehrstöckigen Infrastrukturen.\n\nGerüste ermöglichen vertikales Wachstum, <color=green>Farm-Upgrades</color> und verbesserte Mobilität — einschließlich <color=green>Zipline-Transportsystemen</color> für effiziente Bewegung in unserem Gebiet.\n\nWenn Sie bereit sind, höher zu bauen, ohne zu fallen, folgen Sie dieser Direktive.\n\nHöhe erhöht die Möglichkeit. Sie erhöht auch die Konsequenzen."
plPL = "Rozbudowa wymaga wsparcia. Wysokość bez struktury to czekający na zdarzenie upadek.\n\nTa gałąź dotyczy produkcji <color=green>Rusztowań</color> do budowy <color=green>Platform</color>, ścieżek i wzmocnionej infrastruktury wielopoziomowej.\n\nRusztowania umożliwiają wzrost pionowy, <color=green>Ulepszenia Farm</color> i zwiększoną mobilność — w tym <color=green>systemy transportu na linach</color> dla efektywnego przemieszczania się po naszym terytorium.\n\nKiedy będziesz gotowy, aby budować wyżej bez ryzyka upadku, zastosuj się do tej dyrektywy.\n\nWysokość zwiększa możliwości. Zwiększa również konsekwencje."
ptBR = "A expansão requer suporte. Altura sem estrutura é um colapso prestes a acontecer.\n\nEsta ramificação diz respeito à produção de <color=green>andaimes</color> para a construção de <color=green>plataformas</color>, passarelas e infraestrutura reforçada em múltiplos níveis.\n\nOs andaimes possibilitam o crescimento vertical, <color=green>atualizações de fazendas</color> e mobilidade aprimorada — incluindo <color=green>sistemas de transporte por tirolesa</color> para movimento eficiente através do nosso território.\n\nQuando você estiver preparado para construir mais alto sem cair, siga esta diretriz.\n\nA elevação aumenta a possibilidade. Também aumenta as consequências."
koKR = "확장은 지원이 필요합니다. 구조물 없이 높이는 무너질 준비가 된 것입니다.\n\n이 지점은 <color=green>플랫폼</color>, 통로 및 강화된 다층 인프라 건설을 위한 <color=green>발판</color>의 생산과 관련이 있습니다.\n\n발판은 수직 성장을 가능하게 하고, <color=green>농장 업그레이드</color> 및 이동성을 향상시킵니다 — 효율적인 이동을 위한 <color=green>집라인 교통 시스템</color>도 포함됩니다.\n\n더 높이 건설할 준비가 되었다면, 이 지침을 따르세요.\n\n고도가 가능성을 증가시킵니다. 또한 결과를 증가시킵니다."
csCZ = "Expanze vyžaduje podporu. Výška bez struktury je kolaps, který čeká na své uskutečnění.\n\nTato větev se týká výroby <color=green>Lešení</color> pro výstavbu <color=green>Platforem</color>, chodníků a zpevněné vícestupňové infrastruktury.\n\nLešení umožňuje vertikální růst, <color=green>Upgrade farmy</color> a zlepšenou mobilitu — včetně <color=green>Systémů dopravy pomocí lanovek</color> pro efektivní pohyb po našem území.\n\nKdyž jste připraveni stavět výše bez pádu, řiďte se tímto pokynem.\n\nVýška zvyšuje možnosti. Zároveň zvyšuje i důsledky."
viVN = "Việc mở rộng cần sự hỗ trợ. Chiều cao mà không có cấu trúc là sự sụp đổ đang chờ xảy ra.\n\nNhánh này liên quan đến việc sản xuất <color=green>Các giàn giáo</color> cho việc xây dựng <color=green>Các nền tảng</color>, lối đi và cơ sở hạ tầng nhiều cấp được gia cố.\n\nCác giàn giáo cho phép sự phát triển theo chiều dọc, <color=green>Các nâng cấp trang trại</color>, và tăng cường khả năng di chuyển — bao gồm <color=green>Các hệ thống vận chuyển bằng dây cáp</color> để di chuyển hiệu quả qua vùng lãnh thổ của chúng ta.\n\nKhi bạn đã sẵn sàng để xây dựng cao hơn mà không bị ngã, hãy thực hiện theo chỉ thị này.\n\nSự nâng cao gia tăng khả năng. Nó cũng gia tăng hậu quả."
trTR = "Genel genişleme destek gerektirir. Yapı olmadan yükseklik, olası bir çöküş için bekleyen bir durumdur.\n\nBu dal, <color=green>Platformların</color>, yürüyüş yollarının ve güçlendirilmiş çok katmanlı altyapının inşası için <color=green>İskeletlerin</color> üretimi ile ilgilidir.\n\nİskeletler, dikey büyümeyi, <color=green>Tarım Yükseltmeleri</color>ni ve geliştirilmiş hareketliliği sağlar — bunlara <color=green>Teleferik taşıma sistemleri</color> de dahil olup, bölgemiz içinde verimli hareketi mümkün kılar.\n\nDaha yüksek inşa etme konusunda hazır olduğunuzda, bu direktife uyun.\n\nYükseklik, olasılıkları artırır. Aynı zamanda sonuçları da artırır."

["Tutorial.ArchitectBranch.BuildArchitect.Whitepaws"]
raw = "Greetings.\n\nWe represent the Directorate of Architectural Ambition, the body responsible for ensuring that settlements rise above crude piles of timber and become structures of elegance.\n\nYour settlement, while… functional… currently demonstrates a worrying absence of architectural vision. Like most diseases, this is correctable.\n\nBuild an Architect’s Lodge so that your settlement may take its first step toward dignity.\n\nThis building will allow a trained Architect to assemble sturdy yet lightweight <color=green>Scaffoldings</color>, which form the foundation for walkways, platforms, upgrades, and other structural elements that allow settlements to grow vertically, rather than spreading like an undisciplined fungus across the landscape.\n\nPostscript: You may notice that the <color=#FF6EC7>rear façade</color> of the building forms a large angled structure. This is not a <color=#FF6EC7>staircase</color>.\n\nIt is an architectural gesture intended to evoke upward motion and structural dynamism. Please do not allow your settlers to walk on it.\n\nYes, it is possible.\n\nThat does not make it acceptable."
status = "normal"
enUS = "Greetings.\n\nWe represent the Directorate of Architectural Ambition, the body responsible for ensuring that settlements rise above crude piles of timber and become structures of elegance.\n\nYour settlement, while… functional… currently demonstrates a worrying absence of architectural vision. Like most diseases, this is correctable.\n\nBuild an Architect’s Lodge so that your settlement may take its first step toward dignity.\n\nThis building will allow a trained Architect to assemble sturdy yet lightweight <color=green>Scaffoldings</color>, which form the foundation for walkways, platforms, upgrades, and other structural elements that allow settlements to grow vertically, rather than spreading like an undisciplined fungus across the landscape.\n\nPostscript: You may notice that the <color=#FF6EC7>rear façade</color> of the building forms a large angled structure. This is not a <color=#FF6EC7>staircase</color>.\n\nIt is an architectural gesture intended to evoke upward motion and structural dynamism. Please do not allow your settlers to walk on it.\n\nYes, it is possible.\n\nThat does not make it acceptable."
zhCN = "问候。\n\n我们代表建筑雄心署，这是一个负责确保定居点超越简单木材堆，成为优雅建筑的机构。\n\n您的定居点虽然……功能齐全……但目前表现出令人担忧的建筑视野缺失。像大多数疾病一样，这可以纠正。\n\n建造一座建筑师小屋，以便您的定居点可以迈出通向尊严的第一步。\n\n这座建筑将允许经过培训的建筑师组装坚固且轻便的<color=green>脚手架</color>，这些脚手架构成了人行道、平台、升级以及其他允许定居点垂直生长的结构元素的基础，而不是像不受控制的真菌一样在地形上扩散。\n\n附言：您可能会注意到这座建筑的<color=#FF6EC7>后立面</color>形成了一种大角度结构。这不是一个<color=#FF6EC7>楼梯</color>。\n\n这是一个建筑手势，旨在唤起向上运动和结构的动态感。请不要让您的定居者走上去。\n\n是的，这是可能的。\n\n但这并不意味着这是可以接受的。"
zhTW = "您好。\n\n我們代表建築雄心理事會，負責確保聚落能超越粗糙的木材堆，成為優雅的建築。\n\n您的聚落雖然… 功能性… 但目前顯示出對建築視野的擔憂缺失。就像大多數疾病一樣，這是可以修正的。\n\n建造一座建築師小屋，讓您的聚落邁出通往尊嚴的第一步。\n\n這座建築將允許受過訓練的建築師組裝堅固而輕便的<color=green>腳手架</color>，這些腳手架構成了人行道、平台、升級和其他結構元素的基礎，使聚落能夠向上生長，而不是像不受控制的真菌一樣在景觀上蔓延。\n\n附言：您可能會注意到建築的<color=#FF6EC7>後立面</color>形成一個大角度結構。這不是一個<color=#FF6EC7>樓梯</color>。\n\n這是一個建築手勢，旨在喚起上升運動和結構動態。請不要允許您的居民走上它。\n\n是的，這是可能的。\n\n但這並不使其變得可接受。"
ruRU = "Приветствую.\n\nМы представляем Дирекцию Архитектурной Амбиции, орган, ответственный за то, чтобы поселения поднимались над грубыми кучами древесины и становились структурами элегантности.\n\nВаше поселение, хотя и… функциональное… в настоящее время демонстрирует тревожное отсутствие архитектурного видения. Как и большинство болезней, это можно исправить.\n\nПостройте Ложе Архитектора, чтобы ваше поселение могло сделать первый шаг к достоинству.\n\nЭто здание позволит обученному Архитектору собирать прочные, но легкие <color=green>Скатные конструкции</color>, которые формируют основу для пешеходных дорожек, платформ, улучшений и других структурных элементов, позволяющих поселениям расти вертикально, а не расползаться по ландшафту, как недисциплинированный гриб.\n\nПослесловие: Вы можете заметить, что <color=#FF6EC7>задний фасад</color> здания образует большую наклонную конструкцию. Это не <color=#FF6EC7>лестница</color>.\n\nЭто архитектурный жест, предназначенный для того, чтобы вызвать ощущение восходящего движения и структурной динамики. Пожалуйста, не позволяйте вашим поселенцам ходить по ней.\n\nДа, это возможно.\n\nЭто не делает это приемлемым."
jaJP = "こんにちは。\n\n私たちは、集落が粗い木材の山を超えて優雅な構造物へと成長することを保証する責任を負う建築野望局を代表しています。\n\nあなたの集落は…機能的ではありますが…現時点では建築のビジョンが欠如していることが懸念されます。この状態は、ほとんどの病気と同様に、改善可能です。\n\n建築家の小屋を建設し、あなたの集落が尊厳に向けた第一歩を踏み出せるようにしてください。\n\nこの建物により、訓練を受けた建築家が頑丈でありながら軽量な<color=green>足場</color>を組み立てることが可能になり、歩道、プラットフォーム、アップグレード、そして集落が無秩序に景観に広がるのではなく、上へ成長するための他の構造要素の基盤を形成します。\n\n追伸：建物の<color=#FF6EC7>後面</color>が大きな傾斜した構造を形成していることに気付くかもしれません。これは<color=#FF6EC7>階段</color>ではありません。\n\nこれは上昇する動きと構造のダイナミズムを喚起するための建築的なジェスチャーです。入植者がそこを歩くことがないようにしてください。\n\nはい、それは可能です。\n\nしかし、それが許されるわけではありません。"
frFR = "Salutations.\n\nNous représentons la Direction de l'Ambition Architecturale, l'organe responsable de garantir que les établissements s'élèvent au-dessus de simples tas de bois et deviennent des structures d'élégance.\n\nVotre établissement, bien que… fonctionnel… démontre actuellement une inquiétante absence de vision architecturale. Comme la plupart des maladies, cela peut être corrigé.\n\nConstruisez un Pavillon d'Architecte afin que votre établissement puisse faire son premier pas vers la dignité.\n\nCe bâtiment permettra à un Architecte formé d'assembler des <color=green>Échafaudages</color> robustes mais légers, qui constituent la base pour des passerelles, des plateformes, des améliorations et d'autres éléments structurels qui permettent aux établissements de croître verticalement, plutôt que de s'étendre comme un champignon indiscipliné à travers le paysage.\n\nPost-scriptum : Vous remarquerez peut-être que la <color=#FF6EC7>façade arrière</color> du bâtiment forme une grande structure angulaire. Ce n'est pas un <color=#FF6EC7>escalier</color>.\n\nC'est un geste architectural destiné à évoquer le mouvement ascendant et le dynamisme structurel. Veuillez ne pas permettre à vos colons de marcher dessus.\n\nOui, c'est possible.\n\nCela ne le rend pas acceptable."
deDE = "Gruß.\n\nWir vertreten die Direktion für Architektonische Ambitionen, das Gremium, das dafür verantwortlich ist, sicherzustellen, dass Siedlungen über grobe Holzstapel hinauswachsen und zu eleganten Strukturen werden.\n\nIhre Siedlung, obwohl… funktional… zeigt derzeit ein besorgniserregendes Fehlen architektonischer Vision. Wie die meisten Krankheiten ist dies korrigierbar.\n\nBauen Sie eine Architektenhütte, damit Ihre Siedlung ihren ersten Schritt zur Würde machen kann.\n\nDieses Gebäude ermöglicht es einem ausgebildeten Architekten, robuste und gleichzeitig leichte <color=green>Gerüste</color> zusammenzustellen, die die Grundlage für Gehwege, Plattformen, Upgrades und andere strukturelle Elemente bilden, die es Siedlungen ermöglichen, vertikal zu wachsen, anstatt sich wie ein ungezähmter Pilz über die Landschaft auszubreiten.\n\nNachsatz: Sie werden bemerken, dass die <color=#FF6EC7>hintere Fassade</color> des Gebäudes eine große geneigte Struktur bildet. Dies ist keine <color=#FF6EC7>Treppe</color>.\n\nEs handelt sich um eine architektonische Geste, die dazu gedacht ist, Aufwärtsbewegung und strukturelle Dynamik zu evoziert. Bitte lassen Sie Ihre Siedler nicht darauf gehen.\n\nJa, das ist möglich.\n\nDas macht es jedoch nicht akzeptabel."
plPL = "Witam.\n\nReprezentujemy Dyrekcję Ambicji Architektonicznej, organ odpowiedzialny za zapewnienie, że osady wznoszą się ponad prymitywne stosy drewna i stają się eleganckimi strukturami.\n\nTwoja osada, chociaż… funkcjonalna… obecnie wykazuje niepokojący brak wizji architektonicznej. Jak większość chorób, to jest do naprawienia.\n\nZbuduj Leśniczówkę Architekta, aby twoja osada mogła zrobić pierwszy krok w kierunku godności.\n\nTen budynek pozwoli przeszkolonemu Architektowi na skonstruowanie solidnych, a jednocześnie lekkich <color=green>Rusztowań</color>, które tworzą fundamenty dla ścieżek, platform, ulepszeń i innych elementów strukturalnych, które pozwalają osadom rosnąć pionowo, zamiast rozprzestrzeniać się jak niezdyscyplinowany grzyb po krajobrazie.\n\nPS: Możesz zauważyć, że <color=#FF6EC7>tylna fasada</color> budynku tworzy dużą kątową strukturę. To nie jest <color=#FF6EC7>schody</color>.\n\nTo architektoniczny gest mający na celu wywołanie ruchu w górę i dynamizmu strukturalnego. Proszę, nie pozwól swoim osadnikom chodzić po tym.\n\nTak, to możliwe.\n\nTo nie czyni tego akceptowalnym."
ptBR = "Saudações.\n\nNós representamos a Diretoria de Ambição Arquitetônica, o órgão responsável por garantir que os assentamentos se elevem acima de simples pilhas de madeira e se tornem estruturas de elegância.\n\nSeu assentamento, embora… funcional… atualmente demonstra uma preocupante ausência de visão arquitetônica. Como a maioria das doenças, isso é corrigível.\n\nConstrua uma Cabana de Arquiteto para que seu assentamento possa dar seu primeiro passo em direção à dignidade.\n\nEste edifício permitirá que um Arquiteto treinado monte andaimes robustos, mas leves, <color=green>andaimes</color>, que formam a base para passagens, plataformas, melhorias e outros elementos estruturais que permitem que os assentamentos cresçam verticalmente, em vez de se espalharem como um fungo indisciplinado pela paisagem.\n\nP.S.: Você pode notar que a <color=#FF6EC7>fachada traseira</color> do edifício forma uma grande estrutura angulada. Isso não é uma <color=#FF6EC7>escada</color>.\n\nÉ um gesto arquitetônico destinado a evocar movimento ascendente e dinamismo estrutural. Por favor, não permita que seus colonos andem sobre ela.\n\nSim, isso é possível.\n\nIsso não torna aceitável."
koKR = "안녕하세요.\n\n우리는 정착지가 단순한 나무 더미를 넘어 우아한 구조물로 발전할 수 있도록 하는 건축 야망 국의 대표입니다.\n\n당신의 정착지는... 기능적이긴 하지만... 현재 건축 비전의 부재가 우려됩니다. 대부분의 질병과 마찬가지로, 이는 교정이 가능합니다.\n\n정착지가 위엄을 향해 첫 발을 내딛을 수 있도록 건축가의 오두막을 지으세요.\n\n이 건물은 훈련된 건축가가 튼튼하면서도 가벼운 <color=green>비계</color>를 조립할 수 있게 해 주며, 이는 보행로, 플랫폼, 업그레이드 및 정착지가 수직으로 성장할 수 있도록 해주는 다른 구조적 요소의 기초를 형성합니다. 이를 통해 정착지가 무질서한 곰팡이처럼 땅을 가로막는 대신 성장할 수 있습니다.\n\n추신: 당신은 이 건물의 <color=#FF6EC7>뒷쪽 정면</color>이 큰 각진 구조를 형성하고 있다는 것을 눈치챌 수 있습니다. 이것은 <color=#FF6EC7>계단</color>이 아닙니다.\n\n위로의 움직임과 구조적 역동성을 불러일으키기 위한 건축적 제스처입니다. 정착민들이 그 위를 걷지 않도록 해 주세요.\n\n네, 가능합니다.\n\n그러나 이는 용납할 수 있는 일이 아닙니다."
csCZ = "Zdravíme vás.\n\nReprezentujeme Ředitelství architektonických ambicí, orgán odpovědný za zajištění, že osady se nevytvářejí jen jako primitivní hromady dřeva, ale stávají se elegancí.\n\nVaše osada, přestože… funkční… momentálně vykazuje znepokojivý nedostatek architektonické vize. Stejně jako většinu nemocí, je to napravitelné.\n\nPostavte Architektovu chatu, aby vaše osada mohla udělat svůj první krok k důstojnosti.\n\nTato budova umožní vyškolenému architektovi sestavit robustní, přesto lehké <color=green>lešení</color>, které tvoří základ pro chodníky, platformy, vylepšení a další stavební prvky, které umožňují osadám růst vertikálně, namísto toho, aby se šířily jako nedisciplinovaná plíseň po krajině.\n\nDodatek: Můžete si všimnout, že <color=#FF6EC7>zadní fasáda</color> budovy tvoří velkou šikmou strukturu. To není <color=#FF6EC7>schodiště</color>.\n\nJe to architektonické gesto určené k evokaci vzestupného pohybu a dynamiky struktury. Prosím, neumožněte svým osadníkům po něm chodit.\n\nAno, je to možné.\n\nTo však neznamená, že je to přijatelné."
viVN = "Xin chào.\n\nChúng tôi đại diện cho Cục Tham vọng Kiến trúc, cơ quan chịu trách nhiệm đảm bảo rằng các khu định cư không chỉ là đống gỗ thô mà trở thành những công trình thanh lịch.\n\nKhu định cư của bạn, mặc dù… hoạt động… hiện đang thể hiện sự thiếu hụt nghiêm trọng về tầm nhìn kiến trúc. Giống như hầu hết các loại bệnh, điều này có thể được chỉnh sửa.\n\nHãy xây dựng một Nhà kiến trúc để khu định cư của bạn có thể thực hiện bước đầu tiên hướng đến phẩm giá.\n\nCông trình này sẽ cho phép một Kiến trúc sư được đào tạo lắp ráp những <color=green>Công trình giá đỡ</color> chắc chắn nhưng nhẹ nhàng, tạo nền tảng cho lối đi, nền tảng, nâng cấp và các yếu tố cấu trúc khác cho phép các khu định cư phát triển theo chiều dọc, thay vì lan rộng như một loại nấm không có kỷ luật trên cảnh quan.\n\nChú thích: Bạn có thể nhận thấy rằng <color=#FF6EC7>mặt sau</color> của tòa nhà tạo thành một cấu trúc nghiêng lớn. Đây không phải là một <color=#FF6EC7>cầu thang</color>.\n\nĐó là một cử chỉ kiến trúc nhằm gợi nhớ đến chuyển động lên trên và sự năng động của cấu trúc. Xin đừng để những người định cư của bạn đi trên đó.\n\nCó, điều đó là khả thi.\n\nĐiều đó không làm cho nó trở nên chấp nhận được."
trTR = "Selamlar.\n\nMimari Hırslar Dairesi'ni temsil ediyoruz, yerleşimlerin basit ahşap yığınlarından sıyrılıp zarif yapılar haline gelmesini sağlamakla sorumlu olan kuruluş.\n\nYerleşiminiz, … işlevsel … olmasına rağmen, şu anda mimari bir vizyonun endişe verici bir eksikliğini göstermektedir. Çoğu hastalık gibi, bu düzeltilebilir.\n\nBir Mimar Kütüğü inşa edin böylece yerleşiminiz onuruna ilk adımını atabilsin.\n\nBu bina, eğitimli bir Mimarın, yerleşimlerin dikey olarak büyümesine olanak tanıyan yürüyüş yolları, platformlar, yükseltmeler ve diğer yapısal unsurların temeli olan sağlam ama hafif <color=green>Iskeleler</color> inşa etmesine izin verecektir; böylece yerleşimlerin, dağınık bir mantar gibi peyzajda yayılmak yerine yukarı doğru yükselmesine olanak tanınır.\n\nNot: Bina arka yüzeyinin büyük açılı bir yapı oluşturduğunu fark edebilirsiniz. Bu bir <color=#FF6EC7>merdiven</color> değil.\n\nYukarı doğru hareket ve yapısal dinamizmi yansıtmak amacıyla tasarlanmış mimari bir jesttir. Lütfen yerleşimcilerinizin üzerinde yürümesine izin vermeyin.\n\nEvet, bu mümkündür.\n\nBu onu kabul edilebilir kılmaz."

["Tutorial.ArchitectBranch.FarmOrForestryUpgrade.Whitepaws"]
raw = "Greetings again.\n\nNow that your settlement possesses an Architect’s Lodge, we may begin correcting another of its more regrettable deficiencies: the absence of modular architectural planning.\n\nYou may have noticed that some buildings are described as having a <color=#FFA500>Small Tower</color> or a <color=#FF6EC7>Triangle Roof</color>. This is not decorative language. It indicates that these structures are capable of receiving architectural upgrades.\n\nIn most cases, upgrades require either <color=#FF6EC7>two triangular roofs placed side by side</color>, or <color=#FFA500>one small tower combined with a triangular roof</color>.\n\nTo ensure your limited intellect can grasp the principle, place a <color=green>Modular Upgrade Billboard</color> and consult it.\n\nOnce you have understood the principle, construct at least one Farm Assistant Upgrade. Should you feel unusually inspired, any other upgrade will also be acceptable.\n\nNote that upgraded buildings also gain one additional level of <color=#00FFFF>water retention ability</color>. You may exploit this structural advantage as you see fit.\n\nMore importantly, upgraded buildings look nice."
status = "normal"
enUS = "Greetings again.\n\nNow that your settlement possesses an Architect’s Lodge, we may begin correcting another of its more regrettable deficiencies: the absence of modular architectural planning.\n\nYou may have noticed that some buildings are described as having a <color=#FFA500>Small Tower</color> or a <color=#FF6EC7>Triangle Roof</color>. This is not decorative language. It indicates that these structures are capable of receiving architectural upgrades.\n\nIn most cases, upgrades require either <color=#FF6EC7>two triangular roofs placed side by side</color>, or <color=#FFA500>one small tower combined with a triangular roof</color>.\n\nTo ensure your limited intellect can grasp the principle, place a <color=green>Modular Upgrade Billboard</color> and consult it.\n\nOnce you have understood the principle, construct at least one Farm Assistant Upgrade. Should you feel unusually inspired, any other upgrade will also be acceptable.\n\nNote that upgraded buildings also gain one additional level of <color=#00FFFF>water retention ability</color>. You may exploit this structural advantage as you see fit.\n\nMore importantly, upgraded buildings look nice."
zhCN = "再次问候。\n\n现在您的聚落拥有了建筑师小屋，我们可以开始纠正其另一个令人遗憾的缺陷：缺乏模块化建筑规划。\n\n您可能注意到一些建筑被描述为拥有<color=#FFA500>小塔</color>或<color=#FF6EC7>三角屋顶</color>。这不是装饰性的语言。它表示这些结构能够进行建筑升级。\n\n在大多数情况下，升级需要<color=#FF6EC7>两个并排放置的三角屋顶</color>，或<color=#FFA500>一个小塔与三角屋顶结合</color>。\n\n为了确保您的有限智力能够掌握这个原则，请放置一个<color=green>模块化升级广告牌</color>并进行咨询。\n\n一旦您理解了这个原则，请建造至少一个农场助理升级。如果您感到异常灵感涌现，任何其他升级也将是可以接受的。\n\n请注意，升级后建筑还会获得一层额外的<color=#00FFFF>蓄水能力</color>。您可以根据自己的需要利用这一结构优势。\n\n更重要的是，升级后的建筑看起来很不错。"
zhTW = "再次問候。\n\n現在您的定居點已經擁有建築師小屋，我們可以開始修正另一個令人遺憾的缺陷：缺乏模組化建築規劃。\n\n您可能已經注意到某些建築被描述為擁有<color=#FFA500>小塔</color>或<color=#FF6EC7>三角屋頂</color>。這不是裝飾性的語言。它表示這些建築有能力接受建築升級。\n\n在大多數情況下，升級需要<color=#FF6EC7>兩個三角屋頂並排放置</color>，或<color=#FFA500>一個小塔與三角屋頂結合</color>。\n\n為了確保您的有限智力能夠理解這一原則，請放置一個<color=green>模組化升級公告牌</color>並參考它。\n\n一旦您理解了這一原則，請建造至少一個農場助手升級。如果您感到異常受啟發，任何其他升級也是可以接受的。\n\n請注意，升級後的建築還會獲得一個額外的<color=#00FFFF>蓄水能力</color>等級。您可以隨意利用這一結構優勢。\n\n更重要的是，升級後的建築看起來很好。"
ruRU = "Здравствуйте снова.\n\nТеперь, когда ваше поселение располагает Лodge архитектора, мы можем начать исправлять еще один из его более печальных недостатков: отсутствие модульного архитектурного проектирования.\n\nВам могло показаться, что некоторые здания описаны как имеющие <color=#FFA500>Небольшую Башню</color> или <color=#FF6EC7>Треугольную Крышу</color>. Это не декоративный язык. Это указывает на то, что эти конструкции способны принимать архитектурные улучшения.\n\nВ большинстве случаев улучшения требуют либо <color=#FF6EC7>две треугольные крыши, размещенные рядом друг с другом</color>, либо <color=#FFA500>одну небольшую башню в сочетании с треугольной крышей</color>.\n\nЧтобы убедиться, что ваш ограниченный ум способен понять принцип, установите <color=green>Билборд Модульного Улучшения</color> и проконсультируйтесь с ним.\n\nКак только вы поймете принцип, постройте как минимум одно Улучшение Фермерского Помощника. Если вы почувствуете необычное вдохновение, любое другое улучшение также будет приемлемо.\n\nИмейте в виду, что обновленные здания также получают один дополнительный уровень <color=#00FFFF>способности удержания воды</color>. Вы можете использовать это структурное преимущество по своему усмотрению.\n\nЕще более важно, обновленные здания выглядят красиво."
jaJP = "再びこんにちは。\n\nあなたの集落に建築士のロッジがある今、我々はもう一つの残念な欠点を修正し始めることができます。それは、モジュラー建築計画の欠如です。\n\nいくつかの建物が<color=#FFA500>小さな塔</color>や<color=#FF6EC7>三角屋根</color>を持つと説明されていることに気づいたかもしれません。これは装飾的な言葉ではありません。これらの構造が建築的なアップグレードを受けることができることを示しています。\n\nほとんどの場合、アップグレードには<color=#FF6EC7>2つの三角屋根を並べて配置する</color>か、<color=#FFA500>1つの小さな塔と三角屋根を組み合わせる</color>ことが必要です。\n\nあなたの限られた知性がこの原則を理解できるように、<color=green>モジュラーアップグレード看板</color>を設置して、その内容を確認してください。\n\nこの原則を理解したら、少なくとも1つのファームアシスタントアップグレードを建設してください。もし異常にインスパイアされた場合は、他のアップグレードも受け入れます。\n\nアップグレードされた建物は、さらに1レベルの<color=#00FFFF>水分保持能力</color>を得ることに注意してください。この構造的な利点をあなたの望むように活用してください。\n\nより重要なのは、アップグレードされた建物は見た目が良いということです。"
frFR = "Salutations à nouveau.\n\nMaintenant que votre colonie possède une Loge d'Architecte, nous pouvons commencer à corriger une autre de ses carences regrettables : l'absence de planification architecturale modulaire.\n\nVous avez peut-être remarqué que certains bâtiments sont décrits comme ayant une <color=#FFA500>Petite Tour</color> ou un <color=#FF6EC7>Toit Triangulaire</color>. Ce n'est pas un langage décoratif. Cela indique que ces structures peuvent recevoir des améliorations architecturales.\n\nDans la plupart des cas, les améliorations nécessitent soit <color=#FF6EC7>deux toits triangulaires placés côte à côte</color>, soit <color=#FFA500>une petite tour combinée avec un toit triangulaire</color>.\n\nPour vous assurer que votre intellect limité puisse saisir le principe, placez un <color=green>Panneau d'Amélioration Modulaire</color> et consultez-le.\n\nUne fois que vous avez compris le principe, construisez au moins une Amélioration d'Assistant Agricole. Si vous vous sentez exceptionnellement inspiré, toute autre amélioration sera également acceptable.\n\nNotez que les bâtiments améliorés bénéficient également d'un niveau supplémentaire de <color=#00FFFF>capacité de rétention d'eau</color>. Vous pouvez exploiter cet avantage structurel comme bon vous semble.\n\nPlus important encore, les bâtiments améliorés sont esthétiques."
deDE = "Grüße nochmals.\n\nJetzt, da deine Siedlung eine Architektenhütte besitzt, können wir beginnen, einen weiteren ihrer bedauerlichen Mängel zu beheben: das Fehlen modularer Architekturgestaltung.\n\nVielleicht ist dir aufgefallen, dass einige Gebäude als mit einem <color=#FFA500>Kleinen Turm</color> oder einem <color=#FF6EC7>Dreiecks-Dach</color> beschrieben werden. Dies ist keine dekorative Sprache. Es bedeutet, dass diese Strukturen in der Lage sind, architektonische Upgrades zu erhalten.\n\nIn den meisten Fällen erfordern Upgrades entweder <color=#FF6EC7>zwei nebeneinander platzierte Dreiecks-Dächer</color> oder <color=#FFA500>einen kleinen Turm in Kombination mit einem Dreiecks-Dach</color>.\n\nUm sicherzustellen, dass dein begrenzter Verstand das Prinzip begreift, platziere ein <color=green>Modular Upgrade Billboard</color> und konsultiere es.\n\nSobald du das Prinzip verstanden hast, baue mindestens ein Farm-Assistent-Upgrade. Solltest du dich ungewöhnlich inspiriert fühlen, ist auch jedes andere Upgrade akzeptabel.\n\nBeachte, dass aufgerüstete Gebäude auch eine zusätzliche Stufe der <color=#00FFFF>Wasserretention</color> gewinnen. Du kannst diesen strukturellen Vorteil nach Belieben nutzen.\n\nWichtiger ist, dass aufgerüstete Gebäude schön aussehen."
plPL = "Witaj ponownie.\n\nTeraz, gdy twoja osada posiada Chatę Architekta, możemy zacząć korygować jedną z jej bardziej żałosnych niedoskonałości: brak modularnego planowania architektonicznego.\n\nMogłeś zauważyć, że niektóre budynki opisane są jako posiadające <color=#FFA500>Małą Wieżę</color> lub <color=#FF6EC7>Trójkątny Dach</color>. To nie jest ozdobny język. Wskazuje to, że te struktury są zdolne do otrzymania ulepszeń architektonicznych.\n\nW większości przypadków, ulepszenia wymagają albo <color=#FF6EC7>dwu trójkątnych dachów umieszczonych obok siebie</color>, albo <color=#FFA500>jednej małej wieży połączonej z trójkątnym dachem</color>.\n\nAby upewnić się, że twoja ograniczona inteligencja potrafi zrozumieć zasadę, umieść <color=green>Bilbord Ulepszeń Modularnych</color> i skonsultuj się z nim.\n\nGdy już zrozumiesz zasadę, skonstruuj przynajmniej jedno Ulepszenie Asystenta Farmy. Jeśli poczujesz się niezwykle zainspirowany, każde inne ulepszenie również będzie akceptowalne.\n\nZauważ, że ulepszone budynki zyskują również jeden dodatkowy poziom <color=#00FFFF>zdolności zatrzymywania wody</color>. Możesz wykorzystać tę strukturalną przewagę według własnego uznania.\n\nCo ważniejsze, ulepszone budynki wyglądają dobrze."
ptBR = "Saudações novamente.\n\nAgora que sua colônia possui uma Cabana do Arquiteto, podemos começar a corrigir outra de suas deficiências mais lamentáveis: a ausência de planejamento arquitetônico modular.\n\nVocê pode ter notado que alguns edifícios são descritos como tendo uma <color=#FFA500>Pequena Torre</color> ou um <color=#FF6EC7>Telhado Triangular</color>. Esta não é uma linguagem decorativa. Indica que essas estruturas são capazes de receber melhorias arquitetônicas.\n\nNa maioria dos casos, melhorias requerem ou <color=#FF6EC7>duas telhas triangulares colocadas lado a lado</color>, ou <color=#FFA500>uma pequena torre combinada com um telhado triangular</color>.\n\nPara garantir que sua limitada inteligência possa compreender o princípio, coloque um <color=green>Cartaz de Upgrade Modular</color> e consulte-o.\n\nUma vez que você tenha entendido o princípio, construa pelo menos uma melhoria de Assistente de Fazenda. Se você se sentir incomumente inspirado, qualquer outra melhoria também será aceitável.\n\nObserve que edifícios melhorados também ganham um nível adicional de <color=#00FFFF>capacidade de retenção de água</color>. Você pode explorar essa vantagem estrutural como achar melhor.\n\nMais importante, edifícios melhorados são bonitos."
koKR = "안녕하세요.\n\n이제 당신의 정착지가 건축가의 작업장을 보유하고 있으므로, 우리는 또 다른 유감스러운 결점을 수정할 수 있습니다: 모듈형 건축 계획의 부재입니다.\n\n일부 건물에 <color=#FFA500>작은 탑</color> 또는 <color=#FF6EC7>삼각 지붕</color>이라는 설명이 붙어 있는 것을 보셨을 것입니다. 이 표현은 장식적인 것이 아닙니다. 이는 이러한 구조물이 건축 업그레이드를 받을 수 있음을 나타냅니다.\n\n대부분의 경우, 업그레이드에는 <color=#FF6EC7>나란히 배치된 두 개의 삼각 지붕</color> 또는 <color=#FFA500>삼각 지붕과 결합된 하나의 작은 탑</color>이 필요합니다.\n\n당신의 제한된 지성이 원리를 이해할 수 있도록, <color=green>모듈 업그레이드 광고판</color>을 설치하고 참고하세요.\n\n원리를 이해한 후, 최소한 하나의 농장 보조 업그레이드를 건설하세요. 특별히 영감을 받으셨다면 다른 업그레이드도 괜찮습니다.\n\n업그레이드된 건물은 또한 <color=#00FFFF>물 보유 능력</color>이 한 단계 추가로 증가한다는 점에 유의하세요. 이 구조적 이점을 원하시는 대로 이용하세요.\n\n더 중요한 것은, 업그레이드된 건물은 보기 좋습니다."
csCZ = "Zdravím znovu.\n\nNyní, když vaše osada disponuje Architektovou chatou, můžeme začít opravovat další z jeho zklamání: absenci modulárního architektonického plánování.\n\nMožná jste si všimli, že některé budovy jsou popsány jako mají <color=#FFA500>malou věž</color> nebo <color=#FF6EC7>trojúhelníkovou střechu</color>. Toto není jen dekorativní jazyk. Naznačuje to, že tyto struktury jsou schopny přijmout architektonické vylepšení.\n\nVětšinou vylepšení vyžaduje buď <color=#FF6EC7>dvě trojúhelníkové střechy umístěné vedle sebe</color>, nebo <color=#FFA500>jednu malou věž kombinovanou s trojúhelníkovou střechou</color>.\n\nAby vaše omezená inteligence pochopila princip, umístěte <color=green>modulární vylepšovací billboard</color> a konzultujte ho.\n\nJakmile pochopíte princip, postavte alespoň jedno vylepšení pro farmářského asistenta. Pokud se cítíte zvlášť inspirováni, jakékoli jiné vylepšení bude také přijatelné.\n\nVšimněte si, že vylepšené budovy také získávají jednu další úroveň <color=#00FFFF>schopnosti zadržování vody</color>. Můžete tuto strukturální výhodu využít podle svého uvážení.\n\nCo je důležitější, vylepšené budovy vypadají hezky."
viVN = "Xin chào một lần nữa.\n\nGiờ đây, khi khu định cư của bạn đã có một Nhà ở Kiến trúc, chúng ta có thể bắt đầu khắc phục một trong những thiếu sót đáng tiếc hơn: sự thiếu vắng quy hoạch kiến trúc mô-đun.\n\nBạn có thể đã nhận thấy rằng một số tòa nhà được mô tả là có một <color=#FFA500>Tháp Nhỏ</color> hoặc một <color=#FF6EC7>Mái Tam Giác</color>. Đây không phải là ngôn ngữ trang trí. Nó cho thấy rằng những cấu trúc này có khả năng nhận được nâng cấp kiến trúc.\n\nTrong hầu hết các trường hợp, việc nâng cấp yêu cầu <color=#FF6EC7>hai mái tam giác được đặt cạnh nhau</color>, hoặc <color=#FFA500>một tháp nhỏ kết hợp với một mái tam giác</color>.\n\nĐể đảm bảo trí thông minh hạn chế của bạn có thể nắm được nguyên tắc, hãy đặt một <color=green>Bảng Quảng Cáo Nâng Cấp Mô-đun</color> và tham khảo nó.\n\nKhi bạn đã hiểu nguyên tắc, hãy xây dựng ít nhất một Nâng Cấp Trợ Lý Nông Trại. Nếu bạn cảm thấy có cảm hứng vượt bậc, bất kỳ nâng cấp nào khác cũng sẽ được chấp nhận.\n\nLưu ý rằng các tòa nhà được nâng cấp cũng có thêm một cấp độ <color=#00FFFF>khả năng giữ nước</color>. Bạn có thể tận dụng lợi thế cấu trúc này theo ý bạn.\n\nQuan trọng hơn, các tòa nhà được nâng cấp trông rất đẹp."
trTR = "Selamlar tekrar.\n\nArtık yerleşiminiz bir Mimar Kulübü'ne sahip olduğuna göre, daha üzücü eksikliklerden birini düzeltmeye başlayabiliriz: modüler mimari planlamanın yokluğu.\n\nBazı binaların <color=#FFA500>Küçük Kule</color> veya <color=#FF6EC7>Üçgen Çatı</color> olarak tanımlandığını fark etmiş olabilirsiniz. Bu süsleyici bir dil değildir. Bu yapılar mimari yükseltmeler alabilme kapasitesine sahip olduğu anlamına gelir.\n\nÇoğu durumda, yükseltmeler ya <color=#FF6EC7>yan yana yerleştirilmiş iki üçgen çatı</color>, ya da <color=#FFA500>bir küçük kule ile üçgen çatının birleştirilmesi</color> gerektirir.\n\nSınırlı zekanızın prensibi kavrayabilmesi için bir <color=green>Modüler Yükseltme İlan Panosu</color> yerleştirin ve ona danışın.\n\nPrensibi anladıktan sonra, en az bir Tarım Asistanı Yükseltmesi inşa edin. Eğer alışılmadık şekilde ilham alırsanız, herhangi bir başka yükseltme de kabul edilecektir.\n\nYükseltilmiş binaların ayrıca bir düzey daha <color=#00FFFF>su tutma yeteneği</color> kazandığını unutmayın. Bu yapısal avantajı istediğiniz gibi kullanabilirsiniz.\n\nDaha da önemlisi, yükseltilmiş binalar güzel görünüyor."

["Tutorial.ArchitectBranch.BuildLargeWarehouse.Whitepaws"]
raw = "Excellent.\n\nNow that you understand the basic principles of scaffolding and modular upgrades, we may address another matter of architectural responsibility: <color=green>covered storage</color>.\n\nThese structures protect valuable resources from the elements and, thanks to their flat roofs and sturdy construction, can be conveniently stacked vertically. This allows settlements to store large quantities of materials without spreading storage across the entire landscape like a poorly planned lumber camp.\n\nWe recommend that you construct whichever <color=green>covered storage</color> best fits your settlement’s current needs.\n\nA population sitting atop generous reserves tends to remain calm, productive, and most importantlyxa0: less inclined to interrupt us  with tiresome requests for spare materials.\n\nContrary persistent rumors, we architects do not live in ivory towers entirely unconcerned with the well-being of the common folk. Also ivory is a terrible building material.\n\nConstruct at least one Covered Storage and bring a small measure of architectural order to your settlement."
status = "normal"
enUS = "Excellent.\n\nNow that you understand the basic principles of scaffolding and modular upgrades, we may address another matter of architectural responsibility: <color=green>covered storage</color>.\n\nThese structures protect valuable resources from the elements and, thanks to their flat roofs and sturdy construction, can be conveniently stacked vertically. This allows settlements to store large quantities of materials without spreading storage across the entire landscape like a poorly planned lumber camp.\n\nWe recommend that you construct whichever <color=green>covered storage</color> best fits your settlement’s current needs.\n\nA population sitting atop generous reserves tends to remain calm, productive, and most importantly: less inclined to interrupt us with tiresome requests for spare materials.\n\nContrary to persistent rumors, we architects do not live in ivory towers entirely unconcerned with the well-being of the common folk. Also, ivory is a terrible building material.\n\nConstruct at least one Covered Storage and bring a small measure of architectural order to your settlement."
zhCN = "优秀。\n\n现在你已经理解了脚手架和模块化升级的基本原理，我们可以谈论另一个建筑责任的问题：<color=green>封闭存储</color>。\n\n这些结构可以保护有价值的资源免受环境影响，并且由于它们平坦的屋顶和坚固的建设，能够方便地垂直堆放。这使得定居点能够存储大量材料，而无需像一个规划不当的木材营地那样在整个景观中分散存储。\n\n我们建议你建造最适合你定居点当前需求的<color=green>封闭存储</color>。\n\n拥有丰厚储备的人口往往保持冷静、富有生产力，最重要的是：不太可能打扰我们，提出令人厌烦的多余材料请求。\n\n尽管有持久的谣传，我们建筑师并不是完全不关心普通民众福祉的象牙塔中的居民。此外，象牙是糟糕的建筑材料。\n\n建造至少一个封闭存储，为你的定居点带来一点建筑秩序。"
zhTW = "優秀。\n\n現在你已經了解了腳手架和模組升級的基本原則，我們可以討論另一個建築責任的問題：<color=green>有頂儲存</color>。\n\n這些結構可以保護珍貴資源不受天候影響，並且由於其平坦的屋頂和堅固的建造，可以方便地垂直堆疊。這使得定居點能夠儲存大量材料，而不必像一個規劃不周的木材營一樣將儲存分散在整個地形上。\n\n我們建議你建造適合你定居點當前需求的<color=green>有頂儲存</color>。\n\n擁有充足儲備的人口往往會保持冷靜、富有生產力，最重要的是：不太會打擾我們提出繁瑣的額外材料請求。\n\n儘管有持續的謠言，我們這些建築師並非完全無視平民的福祉而住在象牙塔中。此外，象牙是非常糟糕的建材。\n\n建造至少一個有頂儲存，為你的定居點帶來一些建築上的秩序。"
ruRU = "Отлично. \n\nТеперь, когда вы понимаете основные принципы строительных лесов и модульных улучшений, мы можем обсудить еще один аспект архитектурной ответственности: <color=green>закрытое хранилище</color>.\n\nЭти конструкции защищают ценные ресурсы от неблагоприятных погодных условий и, благодаря своим плоским крышам и прочной конструкции, могут быть удобно расположены вертикально. Это позволяет поселениям хранить большие объемы материалов, не распыляя их по всему ландшафту, словно плохо спланированный лесопункт.\n\nМы рекомендуем вам построить любое <color=green>закрытое хранилище</color>, которое лучше всего соответствует текущим потребностям вашего поселения.\n\nНаселение, обладающее щедрыми запасами, как правило, остается спокойным, продуктивным и, что наиболее важно: менее склонным к тому, чтобы отвлекать нас утомительными запросами на запасные материалы.\n\nНесмотря на настойчивые слухи, мы, архитекторы, не живем в слоновых башнях, абсолютно не заботясь о благополучии простых людей. А еще слоновая кость — ужасный строительный материал.\n\nПостройте хотя бы одно Закрытое Хранилище и внесите небольшую порцию архитектурного порядка в ваше поселение."
jaJP = "素晴らしい。\n\n足場とモジュラーアップグレードの基本原則を理解した今、別の建築責任の問題に取り組むことができます: <color=green>カバーされた倉庫</color>。\n\nこれらの構造は、貴重な資源を天候から保護し、平らな屋根と頑丈な構造のおかげで、便利に垂直に積み重ねることができます。これにより、集落は材料を大量に保管でき、計画の不十分な木材キャンプのように景観全体に広げる必要がありません。\n\nあなたの集落の現在のニーズに最も合った<color=green>カバーされた倉庫</color>を建設することをお勧めします。\n\n豊富な備蓄の上にいる人口は、落ち着き、効率的で、最も重要なことに、面倒な余剰材料の要求で私たちを中断する傾向が少なくなります。\n\n根強い噂とは裏腹に、私たち建築家は一般市民の幸福には全く無関心なアイボリーの塔には住んでいません。また、アイボリーはひどい建材です。\n\n少なくとも1つのカバーされた倉庫を建設し、あなたの集落に少しの建築的秩序をもたらしましょう。"
frFR = "Excellent.\n\nMaintenant que vous comprenez les principes de base de l'échafaudage et des améliorations modulaires, nous pouvons aborder un autre aspect de la responsabilité architecturale : <color=green>le stockage couvert</color>.\n\nCes structures protègent les ressources précieuses des intempéries et, grâce à leurs toits plats et leur construction robuste, peuvent être facilement empilées verticalement. Cela permet aux établissements de stocker de grandes quantités de matériaux sans disperser le stockage sur l'ensemble du paysage comme un camp de bûcheron mal planifié.\n\nNous vous recommandons de construire le <color=green>stockage couvert</color> qui correspond le mieux aux besoins actuels de votre établissement.\n\nUne population assise sur des réserves généreuses a tendance à rester calme, productive, et surtout : moins encline à nous interrompre avec des demandes agaçantes de matériaux supplémentaires.\n\nContrairement aux rumeurs persistantes, nous, architectes, ne vivons pas dans des tours d'ivoire totalement indifférents au bien-être du peuple. De plus, l'ivoire est un matériau de construction terrible.\n\nConstruisez au moins un Stockage Couvert et apportez une petite mesure d'ordre architectural à votre établissement."
deDE = "Ausgezeichnet.\n\nJetzt, da Sie die grundlegenden Prinzipien von Gerüsten und modularen Upgrades verstanden haben, möchten wir ein weiteres Thema der architektonischen Verantwortung ansprechen: <color=green>überdachte Lager</color>.\n\nDiese Strukturen schützen wertvolle Ressourcen vor den Elementen und können dank ihrer flachen Dächer und robusten Bauweise bequem vertikal gestapelt werden. Dies ermöglicht es Siedlungen, große Mengen an Materialien zu lagern, ohne die Lagerung über die gesamte Landschaft zu verteilen wie in einem schlecht geplanten Holzlager.\n\nWir empfehlen Ihnen, das <color=green>überdachte Lager</color> zu bauen, das am besten zu den aktuellen Bedürfnissen Ihrer Siedlung passt.\n\nEine Bevölkerung, die über großzügige Reserven verfügt, bleibt in der Regel ruhig, produktiv und vor allem: weniger geneigt, uns mit lästigen Anfragen nach Ersatzmaterialien zu stören.\n\nTrotz hartnäckiger Gerüchte leben wir Architekten nicht in Elfenbeintürmen, die völlig unbesorgt um das Wohl der einfachen Leute sind. Außerdem ist Elfenbein ein schreckliches Baumaterial.\n\nBauen Sie mindestens ein überdachtes Lager und bringen Sie eine kleine Portion architektonischer Ordnung in Ihre Siedlung."
plPL = "Doskonale.\n\nTeraz, gdy rozumiesz podstawowe zasady budownictwa rusztowaniowego i modularnych ulepszeń, możemy zająć się inną kwestią odpowiedzialności architektonicznej: <color=green>magazynowanie pod zadaszeniem</color>.\n\nTe struktury chronią cenne zasoby przed żywiołami i, dzięki swoim płaskim dachom oraz solidnej konstrukcji, mogą być wygodnie układane pionowo. Pozwala to osiedlom na przechowywanie dużych ilości materiałów, nie rozprzestrzeniając magazynów po całym krajobrazie jak źle zaplanowane obozowisko drwali.\n\nZalecamy zbudowanie dowolnego <color=green>magazynu pod zadaszeniem</color>, który najlepiej odpowiada bieżącym potrzebom twojego osiedla.\n\nLudność dysponująca hojnymi zapasami zwykle pozostaje spokojna, produktywna, a co najważniejsze: mniej skłonna do przerywania nam z nużącymi prośbami o dodatkowe materiały.\n\nPomimo uporczywych plotek, my, architekci, nie żyjemy w wieżach z kości słoniowej, zupełnie obojętni na dobrobyt pospólstwa. Poza tym kość słoniowa to okropny materiał budowlany.\n\nZbuduj przynajmniej jeden Magazyn pod zadaszeniem i wprowadź niewielki ład architektoniczny do swojego osiedla."
ptBR = "Excelente.\n\nAgora que você entende os princípios básicos de andaimes e upgrades modulares, podemos abordar outro assunto de responsabilidade arquitetônica: <color=green>armazenamento coberto</color>.\n\nEssas estruturas protegem recursos valiosos das intempéries e, graças aos seus telhados planos e construção robusta, podem ser empilhadas convenientemente em verticais. Isso permite que os assentamentos armazenem grandes quantidades de materiais sem espalhar o armazenamento por todo o landscape como um acampamento de madeira mal planejado.\n\nRecomendamos que você construa o <color=green>armazenamento coberto</color> que melhor se adapte às necessidades atuais do seu assentamento.\n\nUma população sentada sobre reservas generosas tende a permanecer calma, produtiva e, mais importante: menos propensa a nos interromper com pedidos cansativos por materiais sobrando.\n\nContrariando rumores persistentes, nós, arquitetos, não vivemos em torres de marfim completamente desconectados do bem-estar do povo comum. Além disso, marfim é um material de construção terrível.\n\nConstrua pelo menos um Armazenamento Coberto e traga uma pequena medida de ordem arquitetônica para seu assentamento."
koKR = "훌륭합니다.\n\n이제 비계와 모듈 업그레이드의 기본 원리를 이해했으니, 건축 책임의 또 다른 문제를 다룰 수 있습니다: <color=green>덮인 저장소</color>.\n\n이 구조물은 귀중한 자원을 자연의 요소로부터 보호하며, 평평한 지붕과 견고한 구조 덕분에 수직으로 편리하게 쌓을 수 있습니다. 이는 정착촌이 잘 계획되지 않은 목재 캠프처럼 전체 지형에 저장 공간을 퍼뜨리지 않고도 대량의 자재를 저장할 수 있게 해줍니다.\n\n귀하의 정착촌의 현재 필요에 가장 잘 맞는 <color=green>덮인 저장소</color>를 건설할 것을 권장합니다.\n\n풍부한 자원 위에 앉아 있는 인구는 차분하고 생산적이며, 무엇보다도 저희에게 성가신 자재 요청으로 방해할 가능성이 적습니다.\n\n지속적으로 퍼지는 소문과는 달리, 저희 건축가는 일반 대중의 복지에 전혀 관심이 없는 코너에서 살고 있지 않습니다. 또한, 상아는 끔찍한 건축 자재입니다.\n\n최소한 하나의 덮인 저장소를 건설하고 귀하의 정착촌에 작은 건축 질서를 가져오십시오."
csCZ = "Vynikající.\n\nNyní, když rozumíte základním principům lešení a modulárních vylepšení, můžeme se zabývat dalším aspektem architektonické odpovědnosti: <color=green>zakryté skladování</color>.\n\nTyto struktury chrání cenné zdroje před nepříznivými vlivy a díky svým plochým střechám a pevné konstrukci mohou být pohodlně uspořádány vertikálně. To umožňuje osadám skladovat velké množství materiálů, aniž by rozšiřovaly skladování po celém krajině jako špatně naplánovaný dřevorubecký tábor.\n\nDoporučujeme, abyste postavili jakékoli <color=green>zakryté skladování</color>, které nejlépe vyhovuje aktuálním potřebám vaší osady.\n\nPopulace opřená o hojnou rezervu bývá klidná, produktivní a, což je nejdůležitější: méně náchylná k tomu, aby nás obtěžovala únavnými žádostmi o náhradní materiály.\n\nNavzdory vytrvalým pověstem, my architekti nežijeme v slonovinových věžích zcela nezajímaví o blaho obyčejných lidí. Navíc slonovina je hrozný stavební materiál.\n\nPostavte alespoň jednu zakrytou skladovací budovu a přineste do své osady malou dávku architektonického pořádku."
viVN = "Xuất sắc.\n\nBây giờ bạn đã hiểu những nguyên tắc cơ bản của giàn giáo và nâng cấp mô-đun, chúng ta có thể đề cập đến một vấn đề khác về trách nhiệm kiến trúc: <color=green>lưu trữ có mái che</color>.\n\nNhững công trình này bảo vệ tài nguyên quý giá khỏi các yếu tố thiên nhiên và, nhờ vào mái phẳng và kết cấu chắc chắn của chúng, có thể dễ dàng được xếp chồng theo chiều dọc. Điều này cho phép các khu định cư lưu trữ một khối lượng lớn vật liệu mà không phải trải rộng kho chứa trên toàn bộ cảnh quan như một trại gỗ không được lên kế hoạch tốt.\n\nChúng tôi khuyên bạn nên xây dựng <color=green>lưu trữ có mái che</color> nào phù hợp nhất với nhu cầu hiện tại của khu định cư của bạn.\n\nMột dân số sống trên những nguồn dự trữ phong phú có xu hướng giữ bình tĩnh, sản xuất tích cực, và quan trọng nhất: ít có khả năng làm gián đoạn chúng ta với những yêu cầu phiền phức về vật liệu thừa.\n\nBất chấp những tin đồn dai dẳng, chúng tôi - các kiến trúc sư không sống trong những tòa tháp ngà mà hoàn toàn không quan tâm đến sự an lành của người dân thường. Hơn nữa, ngà voi là một vật liệu xây dựng tồi tệ.\n\nHãy xây dựng ít nhất một Kho lưu trữ có mái che và mang lại một chút trật tự kiến trúc cho khu định cư của bạn."
trTR = "Mükemmel.\n\nİskelet ve modüler yükseltmelerin temellerini anladığınıza göre, mimari sorumluluğun başka bir yönüne değinebiliriz: <color=green>kapalı depolama</color>.\n\nBu yapılar, değerli kaynakları hava koşullarından korur ve düz çatılarının ve sağlam yapılarının sayesinde dikey olarak kolaylıkla üst üste yerleştirilebilirler. Bu, yerleşimlerin büyük miktarda malzeme depolamasına olanak tanır ve kötü planlanmış bir kereste kampı gibi tüm manzaraya yayılmasını engeller.\n\nYerleşiminizin mevcut ihtiyaçlarına en uygun <color=green>kapalı depolama</color> tesisini inşa etmenizi öneririz.\n\nCömert rezervlerin üzerinde oturan bir nüfus genellikle sakin, üretken ve en önemlisi: bize gereksiz malzeme talepleriyle sıkıntı çıkarmaya daha az meyilli kalır.\n\nSürekli devam eden söylentilerin aksine, biz mimarlar tamamen sıradan insanların refahı konusunda kaygısız bir şekilde fil towerlarında yaşamıyoruz. Ayrıca fildişi korkunç bir yapı malzemesidir.\n\nEn az bir Kapalı Depolama inşa edin ve yerleşiminize küçük bir mimari düzen getirin."

["Tutorial.ArchitectBranch.BlueprintIntroBText.Whitepaws"]
raw = "We have reviewed the current state of your settlement.\n\nWhile your recent architectural efforts are… noticeable… it is equally clear that your expansion continues in all directions with little regard for spatial harmony.\n\nSince restraining this impulse appears unrealistic, we will instead provide you with a tool to manage it with a minimum of visual damage.\n\nInstruct your <color=green>Architect</color> to begin drafting plans for a <color=green>Zipline Network</color>.\n\nProperly implemented, such systems allow settlers to move effortlessly across large distances, reducing the need for tedious staircases, walkways, and the usual assortment of haphazardly assembled infrastructure that appears to be your trademark.\n\nThis research will require considerable time and resources, so ensure your Architect can work without interruption.\n\nAs with all serious intellectual work, <color=red>Brain Boosting Salts</color> will be required to maintain adequate concentration. If you have not yet secured a reliable supply, we suggest contacting the questionable <color=red>Directorate of Applied Chemistry</color>. It seems you would get along just fine.\n\nOnce the work is complete, please organize a proper vernissage so that your Architect may present the freshly completed <color=green>blueprint</color> to the public.\n\nNaturally, the Bureau of Intellectual Property will ensure that the document is properly archived and duplicated. Fortunately, their standards of documentation are exemplary.\n\nWe have already contacted them on your behalf in order to spare them unnecessary contact with… well, you.\n\nPlease learn from our professional courtesy."
status = "normal"
enUS = "We have reviewed the current state of your settlement.\n\nWhile your recent architectural efforts are… noticeable… it is equally clear that your expansion continues in all directions with little regard for spatial harmony.\n\nSince restraining this impulse appears unrealistic, we will instead provide you with a tool to manage it with a minimum of visual damage.\n\nInstruct your <color=green>Architect</color> to begin drafting plans for a <color=green>Zipline Network</color>.\n\nProperly implemented, such systems allow settlers to move effortlessly across large distances, reducing the need for tedious staircases, walkways, and the usual assortment of haphazardly assembled infrastructure that appears to be your trademark.\n\nThis research will require considerable time and resources, so ensure your Architect can work without interruption.\n\nAs with all serious intellectual work, <color=red>Brain Boosting Salts</color> will be required to maintain adequate concentration. If you have not yet secured a reliable supply, we suggest contacting the questionable <color=red>Directorate of Applied Chemistry</color>. It seems you would get along just fine.\n\nOnce the work is complete, please organize a proper vernissage so that your Architect may present the freshly completed <color=green>blueprint</color> to the public.\n\nNaturally, the Bureau of Intellectual Property will ensure that the document is properly archived and duplicated. Fortunately, their standards of documentation are exemplary.\n\nWe have already contacted them on your behalf in order to spare them unnecessary contact with… well, you.\n\nPlease learn from our professional courtesy."
zhCN = "我们已经审查了您定居点的当前状态。\n\n虽然您最近的建筑努力……显而易见……但同样明显的是，您的扩张在各个方向上进行，几乎没有考虑空间的和谐。\n\n由于束缚这一冲动似乎不切实际，我们将为您提供一项工具，以最小的视觉损害来管理它。\n\n指示您的<color=green>建筑师</color>开始为<color=green>索道网络</color>草拟计划。\n\n如果实施得当，这类系统可以让定居者在大距离上轻松移动，减少对乏味的楼梯、走道和通常看似您标志的杂乱无章的基础设施的需求。\n\n这项研究将需要相当的时间和资源，因此请确保您的建筑师能在不被打扰的情况下工作。\n\n与所有严肃的智力工作一样，保持足够的集中力需要<color=red>增强脑力的盐</color>。如果您还没有获得可靠的供应，我们建议您联系值得怀疑的<color=red>应用化学局</color>。看来您与他们会相处得很好。\n\n一旦工作完成，请组织一次适当的开幕式，以便您的建筑师可以向公众展示新完成的<color=green>蓝图</color>。\n\n自然，知识产权局将确保该文件得到妥善存档和复制。幸运的是，他们的文件标准是典范。\n\n我们已经代表您与他们联系，以免他们不必要地接触……嗯，您。\n\n请吸取我们专业礼仪的教训。"
zhTW = "我們已經評估了你們定居點的當前狀態。\n\n雖然你們最近的建築努力是……顯而易見的……但同樣明顯的是，你們的擴張在各個方向上持續進行，幾乎不顧及空間和諧。\n\n鑒於抑制這種衝動似乎不切實際，我們將提供一個工具，讓你們以最小的視覺損害來管理它。\n\n指示你們的<color=green>建築師</color>開始草擬<color=green>滑索網絡</color>的計劃。\n\n如果正確實施，此類系統將使定居者能夠輕鬆跨越大距離，減少對繁瑣樓梯、步道以及你們標誌性地隨意組裝的基礎設施的需求。\n\n這項研究將需要相當的時間和資源，因此確保你的建築師能夠不間斷地工作。\n\n與所有嚴肅的智力工作一樣，<color=red>腦部增強鹽</color>將是保持足夠專注所必需的。如果你們還沒有獲得可靠的供應，我們建議聯繫那個可疑的<color=red>應用化學署</color>。看起來你們會相處得相當融洽。\n\n一旦工作完成，請組織一次適當的開幕展，以便你的建築師向大眾展示新完成的<color=green>藍圖</color>。\n\n自然，知識產權局將確保該文件得到妥善歸檔和複製。幸運的是，他們的文檔標準是典範的。\n\n我們已經代表你們聯繫了他們，以免他們不必要地接觸到……嗯，你們。\n\n請從我們的專業禮儀中學習。"
ruRU = "Мы изучили текущее состояние вашего поселения.\n\nХотя ваши недавние архитектурные усилия… заметны… также очевидно, что ваше расширение продолжается во всех направлениях, с минимальным учетом пространственной гармонии.\n\nПоскольку сдерживание этого импульса представляется нереалистичным, мы вместо этого предоставим вам инструмент для его управления с минимальными визуальными повреждениями.\n\nПоручите вашему <color=green>Архитектору</color> начать разработку планов для <color=green>Сети Канатных Дорог</color>.\n\nПравильно реализованные такие системы позволяют поселенцам перемещаться без усилий на большие расстояния, сокращая необходимость в утомительных лестницах, переходах и обычном наборе хаотично собранной инфраструктуры, которая, похоже, является вашим торговым знаком.\n\nЭто исследование займет значительное время и ресурсы, поэтому убедитесь, что ваш Архитектор сможет работать без перебоев.\n\nКак и в случае с любой серьезной интеллектуальной работой, для поддержания надлежащей концентрации потребуются <color=red>Соли Ускорения Мозга</color>. Если вы еще не обеспечили надежное снабжение, мы советуем обратиться к сомнительному <color=red>Директору Прикладной Химии</color>. Похоже, вы хорошо с ним поладите.\n\nПосле завершения работы, пожалуйста, организуйте надлежащий вернисаж, чтобы ваш Архитектор мог представить свежезавершенный <color=green>план</color> общественности.\n\nЕстественно, Бюро Интеллектуальной Собственности обеспечит правильное архивирование и дублирование документа. К счастью, их стандарты документации образцовые.\n\nМы уже связались с ними от вашего имени, чтобы избавить их от ненужного общения с… ну, вами.\n\nПожалуйста, извлеките урок из нашей профессиональной учтивости."
jaJP = "あなたの集落の現在の状態を確認しました。\n\n最近の建築の努力は…目を引くものですが…あなたの拡張が空間の調和を無視してすべての方向に続いていることも明らかです。\n\nこの衝動を抑えることが非現実的であるため、視覚的な損傷を最小限に抑えて管理するためのツールを提供します。\n\nあなたの<color=green>建築家</color>に<color=green>ジップラインネットワーク</color>の計画を作成するよう指示してください。\n\n適切に実施されれば、そのようなシステムは入植者が大きな距離を楽に移動できるようにし、退屈な階段や歩道、あなたの商標である無秩序に組み立てられたインフラストラクチャの必要性を減らします。\n\nこの研究には相当な時間とリソースが必要なので、あなたの建築家が中断なく作業できるようにしてください。\n\nすべての真剣な知的作業と同様に、<color=red>脳を刺激する塩</color>が適切な集中を維持するために必要です。もしまだ信頼できる供給源を確保していないのであれば、問題のある<color=red>応用化学局</color>に連絡することをお勧めします。あなたはうまくやっていけるようです。\n\n作業が完了したら、あなたの建築家が新しく完成した<color=green>設計図</color>を公表できるよう、適切なオープニングを組織してください。\n\nもちろん、知的財産局は文書が適切にアーカイブされ、複製されることを確実にします。幸いなことに、彼らの文書基準は模範的です。\n\nあなたのためにすでに彼らに連絡を取っており、あなたとの不必要な接触を避けることができました。\n\n私たちのプロフェッショナルな配慮から学んでください。"
frFR = "Nous avons examiné l'état actuel de votre colonie.\n\nBien que vos récents efforts architecturaux soient… remarquables… il est également clair que votre expansion se poursuit dans toutes les directions sans tenir compte de l'harmonie spatiale.\n\nPuisqu'il semble irréaliste de contrôler cette pulsion, nous allons plutôt vous fournir un outil pour la gérer avec un minimum de dommages visuels.\n\nInstruisez votre <color=green>Architecte</color> pour qu'il commence à élaborer des plans pour un <color=green>Réseau de Tyroliennes</color>.\n\nSi ces systèmes sont correctement mis en œuvre, ils permettent aux colons de se déplacer sans effort sur de grandes distances, réduisant ainsi le besoin d'escaliers fastidieux, de passerelles et de l'assortiment habituel d'infrastructures assemblées au hasard qui semblent être votre marque de fabrique.\n\nCette recherche nécessitera un temps et des ressources considérables, alors assurez-vous que votre Architecte puisse travailler sans interruption.\n\nComme pour tout travail intellectuel sérieux, des <color=red>Sels de Renforcement Cérébral</color> seront nécessaires pour maintenir une concentration adéquate. Si vous n'avez pas encore sécurisé un approvisionnement fiable, nous suggérons de contacter la douteuse <color=red>Direction de la Chimie Appliquée</color>. Il semble que vous vous entendriez très bien.\n\nUne fois le travail terminé, veuillez organiser un vernissage approprié afin que votre Architecte puisse présenter le <color=green>plan</color> fraîchement complété au public.\n\nNaturellement, le Bureau de la Propriété Intellectuelle veillera à ce que le document soit correctement archivé et dupliqué. Heureusement, leurs normes de documentation sont exemplaires.\n\nNous les avons déjà contactés en votre nom afin de leur épargner un contact inutile avec… eh bien, vous.\n\nVeuillez apprendre de notre courtoisie professionnelle."
deDE = "Wir haben den aktuellen Zustand Ihrer Siedlung überprüft.\n\nWährend Ihre jüngsten architektonischen Bemühungen… bemerkenswert… sind, ist ebenso klar, dass Ihre Expansion in alle Richtungen mit wenig Rücksicht auf räumliche Harmonie fortschreitet.\n\nDa es unrealistisch erscheint, diesen Impuls einzuschränken, werden wir Ihnen stattdessen ein Werkzeug bereitstellen, um ihn mit minimalen visuellen Schäden zu steuern.\n\nWeisen Sie Ihren <color=green>Architekten</color> an, mit der Entwurfsplanung für ein <color=green>Seilbahnnetz</color> zu beginnen.\n\nRichtig umgesetzt, ermöglichen solche Systeme den Siedlern ein müheloses Bewegen über große Entfernungen, wodurch die Notwendigkeit für langweilige Treppen, Gehwege und das übliche Sammelsurium an hastig zusammengebauter Infrastruktur, das scheinbar Ihr Markenzeichen ist, verringert wird.\n\nDiese Forschung wird erhebliche Zeit und Ressourcen erfordern, achten Sie also darauf, dass Ihr Architekt ungestört arbeiten kann.\n\nWie bei all seriöser intellektueller Arbeit sind <color=red>Gehirnfördernde Salze</color> erforderlich, um eine angemessene Konzentration aufrechtzuerhalten. Wenn Sie noch keine zuverlässige Quelle gesichert haben, empfehlen wir, die fragwürdige <color=red>Direktion für Angewandte Chemie</color> zu kontaktieren. Es scheint, als würden Sie gut miteinander auskommen.\n\nSobald die Arbeit abgeschlossen ist, organisieren Sie bitte eine angemessene Vernissage, damit Ihr Architekt den frisch fertiggestellten <color=green>Entwurf</color> der Öffentlichkeit präsentieren kann.\n\nNatürlich wird das Amt für geistiges Eigentum sicherstellen, dass das Dokument ordnungsgemäß archiviert und dupliziert wird. Glücklicherweise sind ihre Dokumentationsstandards vorbildlich.\n\nWir haben bereits in Ihrem Namen mit ihnen Kontakt aufgenommen, um ihnen unnötigen Kontakt mit… nun, Ihnen… zu ersparen.\n\nBitte lernen Sie aus unserer professionellen Höflichkeit."
plPL = "Zbadaliśmy obecny stan twojej osady. \n\nPodczas gdy twoje ostatnie wysiłki architektoniczne są… zauważalne… równie jasno widać, że twoja ekspansja trwa we wszystkich kierunkach, z małym poszanowaniem dla harmonii przestrzennej. \n\nPonieważ powstrzymywanie tego impulsu wydaje się nierealne, w zamian dostarczymy ci narzędzie do zarządzania nim przy minimalnych uszkodzeniach wizualnych.\n\nPoleć swojemu <color=green>Architektowi</color> rozpoczęcie tworzenia planów dla <color=green>Sieci Linowej</color>.\n\nOdpowiednio wdrożone, takie systemy pozwalają osadnikom poruszać się bez wysiłku na dużych odległościach, reducing the need for tedious staircases, walkways, and the usual assortment of haphazardly assembled infrastructure that appears to be your trademark.\n\nTo badania będzie wymagać znacznego czasu i zasobów, dlatego upewnij się, że twój Architekt może pracować bez przerwy.\n\nJak to zwykle bywa w przypadku poważnej pracy intelektualnej, będą potrzebne <color=red>Wyzwalacze Umysłowe</color>, aby utrzymać odpowiednią koncentrację. Jeśli jeszcze nie zapewniłeś sobie niezawodnego źródła, sugerujemy skontaktowanie się z wątpliwym <color=red>Dyrektoriatem Chemii Stosowanej</color>. Wygląda na to, że dogadacie się znakomicie.\n\nGdy prace zostaną zakończone, prosimy o zorganizowanie odpowiedniego wernisażu, aby twój Architekt mógł zaprezentować publiczności świeżo ukończony <color=green>plan</color>.\n\nNaturalnie, Biuro Własności Intelektualnej zapewni, że dokument zostanie odpowiednio zarchiwizowany i zdublowany. Na szczęście ich standardy dokumentacji są wzorowe.\n\nJuż skontaktowaliśmy się z nimi w twoim imieniu, aby oszczędzić im niepotrzebnego kontaktu z… cóż, z tobą.\n\nProszę, ucz się z naszej zawodowej uprzejmości."
ptBR = "Revisamos o estado atual do seu assentamento.\n\nEmbora seus recentes esforços arquitetônicos sejam... notáveis... é igualmente claro que sua expansão continua em todas as direções, com pouco cuidado pela harmonia espacial.\n\nUma vez que restringir esse impulso parece irrealista, em vez disso, forneceremos uma ferramenta para gerenciá-lo com um mínimo de danos visuais.\n\nInstrua seu <color=green>Arquiteto</color> a começar a elaborar planos para uma <color=green>Rede de Trelas</color>.\n\nQuando implementados adequadamente, tais sistemas permitem que os colonos se movam sem esforço por grandes distâncias, reduzindo a necessidade de escadas tediosas, passarelas e a habitual variedade de infraestrutura montada de forma desordenada que parece ser sua marca registrada.\n\nEssa pesquisa exigirá considerável tempo e recursos, então garanta que seu Arquiteto possa trabalhar sem interrupções.\n\nComo em todo trabalho intelectual sério, serão necessários <color=red>Salts de Aumento Cognitivo</color> para manter uma concentração adequada. Se você ainda não garantiu um suprimento confiável, sugerimos entrar em contato com a questionável <color=red>Diretoria de Química Aplicada</color>. Parece que você se daria muito bem com eles.\n\nUma vez que o trabalho esteja completo, organize uma vernissage adequada para que seu Arquiteto possa apresentar o <color=green>plano</color> recém-concluído ao público.\n\nNaturalmente, o Escritório de Propriedade Intelectual garantirá que o documento seja devidamente arquivado e duplicado. Felizmente, seus padrões de documentação são exemplares.\n\nJá entramos em contato com eles em seu nome para evitar contatos desnecessários com... bem, você.\n\nPor favor, aprenda com nossa cortesia profissional."
koKR = "귀하의 정착지의 현재 상태를 검토했습니다.\n\n최근의 건축 작업이… 눈에 띄긴 하지만… 공간의 조화를 고려하지 않고 모든 방향으로 확장을 계속하고 있다는 점도 분명합니다.\n\n이러한 충동을 억제하는 것은 비현실적으로 보이므로, 대신 최소한의 시각적 피해로 이를 관리할 수 있는 도구를 제공하겠습니다.\n\n귀하의 <color=green>건축가</color>에게 <color=green>짚라인 네트워크</color>의 계획 초안을 작성하도록 지시하십시오.\n\n적절하게 구현된다면, 이러한 시스템은 정착민이 넓은 거리를 편리하게 이동할 수 있게 하여 지루한 계단, 보도, 그리고 귀하의 상표처럼 보이는 임시 조합된 인프라의 필요를 줄입니다.\n\n이 연구는 상당한 시간과 자원을 요구할 것이므로, 귀하의 건축가가 중단 없이 작업할 수 있도록 하십시오.\n\n모든 진지한 지적 작업과 마찬가지로, 적절한 집중력을 유지하기 위해 <color=red>뇌 자극 용염</color>이 필요할 것입니다. 신뢰할 수 있는 공급원이 아직 확보되지 않았다면, 의심스러운 <color=red>응용 화학국</color>에 연락하는 것을 제안합니다. 잘 어울릴 것 같습니다.\n\n작업이 완료되면, 귀하의 건축가가 새로 완료된 <color=green>청사진</color>을 대중에게 발표할 수 있도록 적절한 개막전을 조직해 주십시오.\n\n물론, 지적 재산권 청은 문서가 적절히 보관되고 복사되도록 할 것입니다. 다행히도 그들의 문서 기준은 모범적입니다.\n\n우리는 불필요한 접촉을 피하기 위해 귀하를 대신하여 그들과 이미 연락을 취했습니다… 음, 당신과의 접촉을 말입니다.\n\n전문적인 예의에서 배우시기 바랍니다."
csCZ = "Prozkoumali jsme aktuální stav vaší osady.\n\nI když jsou vaše nedávné architektonické snahy… nápadné… je také jasné, že vaše expanze pokračuje všemi směry s malým ohledem na prostorovou harmonii.\n\nJelikož se zdá, že restrikce tohoto impulzu je nerealistická, poskytneme vám místo toho nástroj, který vám pomůže s jeho řízením s minimálním vizuálním poškozením.\n\nNaříděte svému <color=green>Architektovi</color>, aby začal vypracovávat plány na <color=green>Zipline Network</color>.\n\nSprávně implementované takové systémy umožňují osadníkům pohybovat se bez námahy na velké vzdálenosti, což snižuje potřebu nudných schodišť, chodníků a obvyklého assortimentu nahodile sestavené infrastruktury, která se zdá být vaší značkou.\n\nTento výzkum si bude vyžadovat značný čas a zdroje, takže zajistěte, aby váš architekt mohl pracovat bez přerušení.\n\nJak je to u všech vážných intelektuálních prací, budou potřeba <color=red>soli na posílení mozku</color> k udržení adekvátní koncentrace. Pokud jste si ještě nezabezpečili spolehlivý zdroj, doporučujeme kontaktovat diskutabilní <color=red>Ředitelství aplikované chemie</color>. Zdá se, že si s nimi rozumíte.\n\nJakmile bude práce dokončena, prosím, zorganizujte řádný vernisáž, aby váš architekt mohl představit čerstvě dokončený <color=green>plán</color> veřejnosti.\n\nSamozřejmě, Úřad pro duševní vlastnictví zajistí, že dokument bude řádně archivován a duplikován. Naštěstí jsou jejich standardy dokumentace příkladné.\n\nJiž jsme je kontaktovali vaším jménem, abychom jim ušetřili zbytečný kontakt s… no, vámi.\n\nProsím, poučte se z naší profesionální zdvořilosti."
viVN = "Chúng tôi đã xem xét tình trạng hiện tại của khu định cư của bạn.\n\nMặc dù những nỗ lực kiến trúc gần đây của bạn là… đáng chú ý… nhưng cũng rõ ràng rằng sự mở rộng của bạn tiếp tục diễn ra theo mọi hướng mà ít quan tâm đến sự hài hòa không gian.\n\nVì việc kiềm chế nhu cầu này có vẻ không thực tế, nên chúng tôi sẽ cung cấp cho bạn một công cụ để quản lý nó với mức tối thiểu thiệt hại về mặt hình ảnh.\n\nHãy chỉ định <color=green>Kính trúc sư</color> của bạn bắt đầu phác thảo kế hoạch cho một <color=green>Mạng lưới Zipline</color>.\n\nNếu được thực hiện đúng cách, những hệ thống như vậy cho phép người định cư di chuyển một cách dễ dàng qua những khoảng cách lớn, giảm thiểu nhu cầu về cầu thang, lối đi và những cơ sở hạ tầng lộn xộn mà dường như là thương hiệu của bạn.\n\nNghiên cứu này sẽ yêu cầu thời gian và nguồn lực đáng kể, vì vậy hãy đảm bảo rằng Kính trúc sư của bạn có thể làm việc mà không bị gián đoạn.\n\nGiống như mọi công việc trí tuệ nghiêm túc, <color=red>Muối Tăng Cường Não</color> sẽ được yêu cầu để duy trì sự tập trung đầy đủ. Nếu bạn chưa đảm bảo được nguồn cung đáng tin cậy, chúng tôi gợi ý bạn liên hệ với <color=red>Ban Giám Đốc Hóa Học Ứng Dụng</color> đáng ngờ. Có vẻ như bạn sẽ hòa hợp với họ.\n\nKhi công việc hoàn thành, xin vui lòng tổ chức một buổi triển lãm chính thức để Kính trúc sư của bạn có thể trình bày <color=green>kế hoạch</color> vừa hoàn thành với công chúng.\n\nTất nhiên, Cục Sở hữu trí tuệ sẽ đảm bảo rằng tài liệu này được lưu trữ và sao chép đúng cách. May mắn thay, tiêu chuẩn tài liệu của họ là xuất sắc.\n\nChúng tôi đã liên hệ với họ thay mặt bạn để giúp họ tránh được những liên lạc không cần thiết với… mà thôi, là bạn. \n\nXin hãy học hỏi từ sự lịch sự chuyên nghiệp của chúng tôi."
trTR = "Yerleşiminizin mevcut durumunu inceledik.\n\nSon zamanlardaki mimari çabalarınız… dikkat çekici… ancak genişlemenizin tüm yönlere, mekansal uyumu pek umursamadan devam ettiği de açıktır.\n\nBu dürtüyü sınırlamanın gerçekçi görünmediği göz önünde bulundurulduğunda, bunu yönetmeniz için minimum görsel zarar verecek bir araç sunacağız.\n\n<color=green>Mimarınızı</color> <color=green>Zipline Ağı</color> için planlar hazırlamaya yönlendirin.\n\nDoğru bir şekilde uygulanırsa, böyle sistemler yerleşimcilerin büyük mesafeler boyunca zahmetsizce hareket etmelerini sağlar, sıkıcı merdivenler, yürüyüş yolları ve sürekli olarak rastgele bir araya getirilmiş altyapı düzenlemeleri için ihtiyacı azaltır ki bunlar da sizin imzanız gibi görünmektedir.\n\nBu araştırma önemli ölçüde zaman ve kaynak gerektirecek, bu yüzden Mimarınızın kesintisiz çalışabilmesini sağlamalısınız.\n\nTüm ciddi entelektüel çalışmalar gibi, yeterli konsantrasyonu sürdürmek için <color=red>Beyin Güçlendirici Tuzlar</color> gerekecektir. Eğer henüz güvenilir bir tedarik sağlamadıysanız, şüpheli <color=red>Uygulamalı Kimya Müdürlüğü</color> ile iletişime geçmenizi öneririz. Anlaşılan o ki, onlarla iyi geçineceksiniz.\n\nİş tamamlandığında, Mimarınızın taze tamamlanmış <color=green>planı</color> kamuya sunabilmesi için uygun bir vernissage düzenlemenizi rica ederiz.\n\nTabii ki, Fikri Mülkiyet Bürosu belgenin düzgün bir şekilde arşivlenmesini ve çoğaltılmasını sağlayacaktır. Neyse ki, belgelerindeki standartlar örnek teşkil etmektedir.\n\nBu konuda gereksiz temaslardan kaçınmak için sizin adınıza onlarla zaten iletişime geçtik… sizinle, işte.\n\nLütfen profesyonel nezaketimizden ders alın."

["Tutorial.ArchitectBranch2.Build2ZiplineStations.Whitepaws"]
raw = "Oh, you. You are still alive… here we go again.\n\nSince it appears that nature looks favorably upon you despite what you are doing to it, let us continue attempting to make your chaos efficient, for lack of better alternatives.\n\nIt seems you have successfully produced <color=red>Brain Boosting Salts</color>, despite the mysterious disappearance of the entire Directorate of Applied Chemistry staff.\n\nThey came to your settlement to blow things up, didn’t they? Please keep them.\n\nIn any case, since the Bureau of Intellectual Property has not contacted us begging to have your case taken off their paws, we will assume your blueprints have been properly preserved and duplicated.\n\nYou may now construct a Zipline Network.\n\nTo that aim — and we really should not have to state this — you will need to build at least two Zipline Stations, Zipline Upgrades, or Scavenger Junkyards, whichever arrangement you prefer.\n\nNote that, since zipline transport is remarkably fast, it can be used by <color=green>farmers</color>, <color=green>foresters</color>, <color=green>lumberjacks</color> and other dirty bumpkins of yours to extend their effective working range.\n\nYou should be able to figure the rest out on your own."
status = "normal"
enUS = "Oh, you. You are still alive… here we go again.\n\nSince it appears that nature looks favorably upon you despite what you are doing to it, let us continue attempting to make your chaos efficient, for lack of better alternatives.\n\nIt seems you have successfully produced <color=red>Brain Boosting Salts</color>, despite the mysterious disappearance of the entire Directorate of Applied Chemistry staff.\n\nThey came to your settlement to blow things up, didn’t they? Please keep them.\n\nIn any case, since the Bureau of Intellectual Property has not contacted us begging to have your case taken off their paws, we will assume your blueprints have been properly preserved and duplicated.\n\nYou may now construct a Zipline Network.\n\nTo that aim — and we really should not have to state this — you will need to build at least two Zipline Stations, Zipline Upgrades, or Scavenger Junkyards, whichever arrangement you prefer.\n\nNote that, since zipline transport is remarkably fast, it can be used by <color=green>farmers</color>, <color=green>foresters</color>, <color=green>lumberjacks</color> and other dirty bumpkins of yours to extend their effective working range.\n\nYou should be able to figure the rest out on your own."
zhCN = "“哦，你。你还活着……又要开始了。\n\n既然自然似乎对你抱有好感，尽管你正在对它做一些事情，让我们继续努力让你的混乱变得高效，毕竟没有更好的选择。\n\n看起来你成功地生产出了<color=red>脑力增强盐</color>，尽管整个应用化学局的员工神秘消失了。\n\n他们来你们的定居点是为了炸东西，不是吗？请把他们留着。\n\n无论如何，既然知识产权局没有联络我们请求撤销你的案件，我们将假设你的蓝图已经得到妥善保存和复制。\n\n你现在可以建造滑索网络。\n\n为此——我们真的不应该强调这一点——你需要建造至少两个滑索站、滑索升级或者废品回收场，具体安排由你决定。\n\n请注意，由于滑索运输速度极快，可以被<color=green>农民</color>、<color=green>林务员</color>、<color=green>伐木工</color>及其他粗野的小子们使用，以扩展他们的有效工作范围。\n\n你应该能自己搞定剩下的事情。”"
zhTW = "「哦，你。你還活著…又來了。\n\n看來儘管你在對待自然的方式上有所作為，自然仍然對你心存好意，讓我們繼續試著使你的混亂變得高效，因為沒有更好的選擇。\n\n儘管整個應用化學局的工作人員神秘消失，你似乎已經成功生產了<color=red>大腦增強鹽</color>。\n\n他們來到你的定居點是為了炸掉東西，對吧？請把他們留下。\n\n無論如何，由於知識產權局沒有聯繫我們，乞求將你的案件從他們的手中撤掉，我們將假設你的藍圖已妥善保存並複製。\n\n你現在可以建設一個滑索網路。\n\n為此——我們真的不應該需要說這個——你需要建造至少兩個滑索站、滑索升級或拾荒者垃圾場，隨你的喜好安排。\n\n請注意，因為滑索運輸非常快速，它可以被<color=green>農夫</color>、<color=green>林務官</color>、<color=green>伐木工</color>和其他脏兮兮的鄉下人使用，以擴展他們的有效工作範圍。\n\n其餘的你應該能自己弄明白。」"
ruRU = "«О, ты. Ты все еще жив... ну, поехали снова.\n\nПоскольку кажется, что природа благосклонно относится к вам, несмотря на то, что вы с ней делаете, давайте продолжим пытаться сделать ваш хаос эффективным, поскольку лучших альтернатив нет.\n\nПохоже, вы успешно произвели <color=red>Соли, Увеличивающие Мозговую Активность</color>, несмотря на загадочное исчезновение всего персонала Дирекции Прикладной Химии.\n\nОни пришли в ваше поселение, чтобы всё взорвать, не так ли? Пожалуйста, держите их.\n\nВ любом случае, поскольку Бюро Интеллектуальной Собственности не связалось с нами, умоляя снять ваше дело с их лап, мы предполагаем, что ваши чертежи были должным образом сохранены и дублированы.\n\nТеперь вы можете построить Сетевую Канатную Дорожку.\n\nДля этого — и мы действительно не должны это говорить — вам потребуется построить как минимум две Станции Канатной Дорожки, Улучшения Канатной Дорожки или Свалки для Собирателей, в зависимости от того, какое сочетание вам предпочтительнее.\n\nОбратите внимание, что поскольку транспорт по канатной дороге удивительно быстр, им могут пользоваться <color=green>фермеры</color>, <color=green>лесники</color>, <color=green>дровосеки</color> и другие ваши грязные провинциалы, чтобы расширить свою эффективную рабочую область.\n\nОстальное вы сможете выяснить сами.»"
jaJP = "「ああ、あなた。まだ生きているのですね…また始まりますね。\n\nあなたが自然に何をしているかに関わらず、自然があなたに好意を持っているようなので、最善の代替策がないため、あなたの混沌を効率的にするための試みを続けましょう。\n\nどうやら、応用化学の全職員が神秘的に失踪したにもかかわらず、<color=red>脳を活性化させる塩</color>を見事に生産したようですね。\n\n彼らはあなたの定住地に来て、何かを爆破しようとしましたよね？どうか彼らをお持ちください。\n\nいずれにせよ、知的財産局が私たちに連絡を取ってきて、あなたのケースを手放してほしいと懇願してきていないので、あなたの設計図が適切に保存され、複製されていると仮定します。\n\nこれで、ジップラインネットワークを構築することができます。\n\nそのためには — これは言うまでもありませんが — 少なくとも2つのジップラインステーション、ジップラインアップグレード、または scavenger junkyard を建設する必要があります。どの配置を選んでも構いません。\n\nジップライン輸送は非常に速いので、<color=green>農民</color>、<color=green>林業者</color>、<color=green>伐採者</color>、そしてあなたの他の汚い田舎者たちがその効果的な作業範囲を広げるために利用できます。\n\n残りは自分で何とかできることでしょう。」"
frFR = "Oh, toi. Tu es toujours en vie… c'est reparti.\n\nPuisqu'il semble que la nature te porte encore faveur malgré ce que tu lui fais, continuons à tenter de rendre ton chaos efficace, faute de meilleures alternatives.\n\nIl semblerait que tu aies réussi à produire des <color=red>sels stimulants pour le cerveau</color>, malgré la mystérieuse disparition de l'ensemble du personnel de la Direction de la Chimie Appliquée.\n\nIls sont venus dans ta colonie pour faire exploser des choses, n'est-ce pas ? S'il te plaît, garde-les.\n\nDe toute façon, puisque le Bureau de la Propriété Intellectuelle ne nous a pas contactés en suppliant de retirer ton dossier de leurs pattes, nous supposerons que tes plans ont été correctement préservés et dupliqués.\n\nTu peux maintenant construire un réseau de Tyroliennes.\n\nÀ cette fin — et nous ne devrions vraiment pas avoir à le dire — tu devras construire au moins deux stations de Tyroliennes, des améliorations de Tyroliennes ou des Décharges de Récupérateurs, selon l'arrangement que tu préfères.\n\nNote que, puisque le transport par tyrolienne est remarquablement rapide, il peut être utilisé par des <color=green>agriculteurs</color>, <color=green>forestiers</color>, <color=green>bûcherons</color> et autres paysans sales pour étendre leur champ d'action efficace.\n\nTu devrais être capable de comprendre le reste par toi-même."
deDE = "„Oh, du. Du lebst immer noch... hier geht es wieder los.\n\nDa es scheint, dass die Natur dir wohlgesonnen ist, trotz dem, was du ihr antust, lass uns weiterhin versuchen, dein Chaos effizient zu gestalten, mangels besserer Alternativen.\n\nEs scheint, dass du erfolgreich <color=red>Gehirnverstärkende Salze</color> produziert hast, trotz des mysteriösen Verschwindens des gesamten Personals der Direktion für Angewandte Chemie.\n\nSie kamen in deine Siedlung, um Dinge in die Luft zu sprengen, nicht wahr? Bitte behalte sie.\n\nIn jedem Fall, da das Büro für geistiges Eigentum uns nicht kontaktiert hat, um zu bitten, deinen Fall von ihren Pfoten zu nehmen, gehen wir davon aus, dass deine Blaupausen ordnungsgemäß aufbewahrt und dupliziert wurden.\n\nDu kannst jetzt ein Seilbahnnetzwerk bauen.\n\nZu diesem Zweck — und das sollten wir wirklich nicht erwähnen müssen — musst du mindestens zwei Seilbahnstationen, Seilbahn-Upgrades oder Schrottplätze für Plünderer bauen, welche Anordnung du auch bevorzugst.\n\nBeachte, dass der Transport per Seilbahn bemerkenswert schnell ist und von <color=green>Bauern</color>, <color=green>Forstwirten</color>, <color=green>Holzfällern</color> und anderen schmutzigen Landleuten von dir genutzt werden kann, um ihre effektive Reichweite zu erweitern.\n\nDu solltest in der Lage sein, den Rest alleine herauszufinden.“"
plPL = "„O, ty. Nadal żyjesz… zaczynamy od nowa.\n\nPonieważ wydaje się, że natura sprzyja ci, mimo że robisz jej krzywdę, kontynuujmy próbę uczynienia twojego chaosu bardziej efektywnym, z braku lepszych alternatyw.\n\nWygląda na to, że udało ci się wyprodukować <color=red>sole wspomagające pracę mózgu</color>, mimo tajemniczego zniknięcia całego personelu Dyrekcji Chemii Stosowanej.\n\nPrzyjechali do twojej osady, żeby wszystko wysadzić, prawda? Proszę, zatrzymaj ich.\n\nW każdym razie, ponieważ Biuro Własności Intelektualnej nie skontaktowało się z nami, błagając o zdjęcie twojej sprawy z ich rąk, przyjmiemy, że twoje plany zostały właściwie zachowane i skopiowane.\n\nMożesz teraz zbudować Sieć Linową.\n\nW tym celu — a tak naprawdę nie powinniśmy tego mówić — musisz zbudować przynajmniej dwie Stacje Linowe, Ulepszenia Liny lub Złomowiska, cokolwiek wolisz.\n\nZauważ, że transport linowy jest niezwykle szybki, mogą go używać <color=green>rolnicy</color>, <color=green>leśnicy</color>, <color=green>drwale</color> i inni twoi brudni wieśniacy, aby rozszerzyć swój efektywny zasięg roboczy.\n\nPowinieneś być w stanie rozwiązać resztę samodzielnie.”"
ptBR = "Oh, você. Você ainda está vivo... lá vamos nós de novo.\n\nComo parece que a natureza olha favoravelmente para você, apesar do que você está fazendo com ela, vamos continuar tentando fazer seu caos ser eficiente, na falta de melhores alternativas.\n\nParece que você conseguiu produzir <color=red>Salts de Aumento Cerebral</color>, apesar do misterioso desaparecimento de todo o pessoal da Diretoria de Química Aplicada.\n\nEles vieram para seu assentamento para explodir coisas, não vieram? Por favor, mantenha-os.\n\nDe qualquer forma, já que o Escritório de Propriedade Intelectual não entrou em contato conosco implorando para que seu caso fosse retirado das garras deles, vamos assumir que seus projetos foram devidamente preservados e duplicados.\n\nAgora você pode construir uma Rede de Cabos Aéreos.\n\nPara isso — e realmente não deveríamos precisar afirmar isso — você precisará construir pelo menos duas Estações de Cabos Aéreos, Melhorias de Cabos Aéreos ou Sucatas de Catadores, qualquer que seja a disposição que você preferir.\n\nObserve que, como o transporte por cabos aéreos é notavelmente rápido, ele pode ser utilizado por <color=green>fazendeiros</color>, <color=green>madeireiros</color>, <color=green>lenhadores</color> e outros seus caipiras sujos para expandir sua área de trabalho efetiva.\n\nVocê deve ser capaz de descobrir o resto por conta própria."
koKR = "오, 당신. 아직 살아있군요... 다시 시작합시다.\n\n당신이 자연에 가하고 있는 것에도 불구하고 자연이 당신에게 호의적으로 보이는 것 같으니, 더 나은 대안이 없기에 당신의 혼란을 효율적으로 만드는 노력을 계속해봅시다.\n\n전문 화학국 직원들이 mysteriously 사라졌음에도 불구하고, 당신이 성공적으로 <color=red>두뇌 강화 염분</color>을 생산한 것 같습니다.\n\n그들이 당신의 정착지에 와서 물건들을 폭파시키러 온 거죠? 제발 그들을 놓아주세요.\n\n어쨌든, 지식재산청이 당신의 사건을 빼앗아 달라고 연락하지 않았으니, 당신의 설계도는 제대로 보존되고 복사되었을 것이라고 가정하겠습니다.\n\n이제 당신은 집라인 네트워크를 구축할 수 있습니다.\n\n이를 위해 — 이건 굳이 말할 필요가 없지만 — 최소한 두 개의 집라인 스테이션, 집라인 업그레이드 또는 수거 junkyard 중 원하는 구성을 구축해야 합니다.\n\n참고로 집라인 운송은 놀라울 만큼 빠르기 때문에, <color=green>농부들</color>, <color=green>임업인들</color>, <color=green>벌목꾼들</color> 및 기타 당신의 더러운 촌놈들이 효과적인 작업 범위를 확장하는 데 사용할 수 있습니다.\n\n나머지는 스스로 해결할 수 있을 것입니다."
csCZ = "„Oh, ty. Ty stále žiješ… jdeme na to znovu.\n\nJelikož se zdá, že příroda ti, navzdory tomu, co jí děláš, přeje, pojďme pokračovat v pokusu učinit tvůj chaos efektivním, pro nedostatek lepších alternativ.\n\nZdá se, že jsi úspěšně vyprodukoval <color=red>soli zvyšující mozek</color>, přestože tajemně zmizel celý personál Ředitelství aplikované chemie.\n\nPřišli do tvého osídlení, aby všechno vyhodili do povětří, že? Prosím, ponech si je.\n\nV každém případě, jelikož Úřad duševního vlastnictví nás nekontaktoval s prosbou, abychom vzali tvůj případ pryč z jejich drápů, předpokládat budeme, že tvé plány byly řádně uchovány a zkopírovány.\n\nNyní můžeš postavit síť lanovek.\n\nK tomu — a opravdu bychom to neměli muset uvádět — budeš potřebovat postavit alespoň dvě stanice lanovek, vylepšení lanovek nebo sběrné dvory, podle toho, co preferuješ.\n\nVezmi na vědomí, že protože je přeprava lanovkami pozoruhodně rychlá, mohou ji používat <color=green>zemědělci</color>, <color=green>lesníci</color>, <color=green>dřevorubci</color> a další tvoji špinaví venkované, aby rozšířili svůj efektivní pracovní dosah.\n\nZbytek bys měl být schopen vyřešit sám.“"
viVN = "Oh, bạn. Bạn vẫn còn sống... lại đây chúng ta lại bắt đầu.\n\nVì có vẻ như thiên nhiên có vẻ ưu ái bạn bất chấp những gì bạn đang làm với nó, hãy để chúng tôi tiếp tục cố gắng làm cho sự hỗn loạn của bạn hiệu quả hơn, vì thiếu những lựa chọn tốt hơn.\n\nCó vẻ như bạn đã sản xuất thành công <color=red>Muối Tăng Cường Não</color>, bất chấp sự biến mất bí ẩn của toàn bộ nhân viên Cục Hóa Học Ứng Dụng.\n\nHọ đã đến khu định cư của bạn để thổi bay mọi thứ, đúng không? Xin hãy giữ họ lại.\n\nDù sao đi nữa, vì Cục Sở Hữu Trí Tuệ vẫn chưa liên lạc với chúng tôi van xin để có thể gỡ bỏ vụ việc của bạn khỏi tay họ, chúng tôi sẽ giả định rằng các bản vẽ của bạn đã được bảo quản và sao chép một cách thích hợp.\n\nBạn có thể xây dựng một Mạng Lưới Cáp Treo.\n\nĐể làm được điều đó — và thực sự chúng tôi không nên phải nói điều này — bạn sẽ cần xây dựng ít nhất hai Trạm Cáp Treo, Nâng Cấp Cáp Treo, hoặc Bãi Rác Thu Nhặt, tùy theo cách sắp xếp bạn thích.\n\nLưu ý rằng, vì vận chuyển bằng cáp treo cực kỳ nhanh chóng, nó có thể được sử dụng bởi <color=green>người nông dân</color>, <color=green>lâm nghiệp</color>, <color=green>thợ mộc</color> và những kẻ thô lỗ khác của bạn để mở rộng phạm vi làm việc hiệu quả của họ.\n\nBạn nên có thể tự mình tìm ra những điều còn lại."
trTR = "Ah, sen. Hâlâ hayattasın... işte yine başlıyoruz.\n\nGörünüşe göre doğa senin yaptıklarına rağmen seni hoş karşılıyor, bu nedenle kaosunu verimli hale getirmeye devam edelim, daha iyi alternatiflerimiz olmadığı için.\n\nBütün Uygulamalı Kimya Müdürlüğü personelinin gizemli bir şekilde kaybolmasına rağmen, <color=red>Beyin Güçlendirici Tuzlar</color> başarıyla üretmişsin gibi görünüyor.\n\nOnlar senin yerleşimine patlatmak için geldiler, değil mi? Lütfen onları tut.\n\nHer neyse, Fikri Mülkiyet Ofisi bizimle iletişime geçip davanı ellerinden almaları için yalvarmadığından, projelerin doğru bir şekilde korunmuş ve çoğaltılmış olduğunu varsayacağız.\n\nArtık bir Zipline Ağı inşa edebilirsin.\n\nBu amaçla — ve bunu belirtmememiz gerekmezdi — en az iki Zipline İstasyonu, Zipline Yükseltmesi veya Kaçakçı Hurda Yığını inşa etmen gerekecek, hangisini tercih edersen.\n\nZipline ulaşımının son derece hızlı olduğunu göz önünde bulundurursak, bunu <color=green>çiftçiler</color>, <color=green>orman işçileri</color>, <color=green>oduncular</color> ve diğer pis köylülerinin etkili çalışma alanlarını genişletmek için kullanabileceğini unutma.\n\nGeri kalanını kendi başına çözebilmelisin."

["Tutorial.BlueprintDuplicationA.BuildCopiystandArtistA.Whitepaws"]
raw = "Greetings.\n\nWe represent the Bureau of Intellectual Property, responsible for ensuring that valuable knowledge is properly documented, duplicated, classified, indexed, and archived.\n\nWe understand that your settlement has recently begun drawing the <color=green>blueprints</color> for a Floodgate Dam.\n\nDue to Regulation 107.33-2, please note that it is strictly forbidden to duplicate original documents under any circumstances.\n\nIt is, however, not illegal to scribble on, spill food and drinks on, eat, or otherwise destroy an original document. Furthermore, according to Regulation 107.33-5, documents altered in such a manner are no longer considered to be the original, and may therefore be copied freely.\n\nAdditionally, most beavers are incapable of focusing their attention on a blueprint that is not adequately fancy and colorful. Discriminating against workers based on their attention span or propensity to eat blueprints has been illegal since Regulation 53.7-4.\n\nTherefore, the now-standard procedure for duplicating, preserving, and using such essential documents is as follows:\n\nConstruct an <color=green>Artist’s Lodge</color> and a <color=green>Copyist’s Lodge</color>.\n\nThe Artist will add the appropriate level of fanciness required for proper use by builders. Do not use the blueprint immediately.\n\nThe Copyist will produce several non-fancy copies of the blueprint. Send these back to the Artist.\n\nRepeat this process until you have enough blueprints to supply all foreseeable construction projects.\n\nConfigure both buildings to work on the Floodgate Dam blueprint.\n\nThis procedure is perfectly legal, as it only violates the spirit of the regulations.\n\nFeel free to retain this correspondence as proof."
status = "normal"
enUS = "Greetings.\n\nWe represent the Bureau of Intellectual Property, responsible for ensuring that valuable knowledge is properly documented, duplicated, classified, indexed, and archived.\n\nWe understand that your settlement has recently begun drawing the <color=green>blueprints</color> for a Floodgate Dam.\n\nDue to Regulation 107.33-2, please note that it is strictly forbidden to duplicate original documents under any circumstances.\n\nIt is, however, not illegal to scribble on, spill food and drinks on, eat, or otherwise destroy an original document. Furthermore, according to Regulation 107.33-5, documents altered in such a manner are no longer considered to be the original, and may therefore be copied freely.\n\nAdditionally, most beavers are incapable of focusing their attention on a blueprint that is not adequately fancy and colorful. Discriminating against workers based on their attention span or propensity to eat blueprints has been illegal since Regulation 53.7-4.\n\nTherefore, the now-standard procedure for duplicating, preserving, and using such essential documents is as follows:\n\nConstruct an <color=green>Artist’s Lodge</color> and a <color=green>Copyist’s Lodge</color>.\n\nThe Artist will add the appropriate level of fanciness required for proper use by builders. Do not use the blueprint immediately.\n\nThe Copyist will produce several non-fancy copies of the blueprint. Send these back to the Artist.\n\nRepeat this process until you have enough blueprints to supply all foreseeable construction projects.\n\nConfigure both buildings to work on the Floodgate Dam blueprint.\n\nThis procedure is perfectly legal, as it only violates the spirit of the regulations.\n\nFeel free to retain this correspondence as proof."
zhCN = "您好。\n\n我们代表知识产权局，负责确保有价值的知识得到适当的记录、复制、分类、索引和归档。\n\n我们了解到您的定居点最近开始绘制<color=green>泄洪闸坝</color>的蓝图。\n\n根据第107.33-2号法规，请注意，在任何情况下严格禁止复制原始文件。\n\n然而，对原始文件进行涂鸦、洒落食物和饮料、食用或以其他方式破坏是不违法的。此外，根据第107.33-5号法规，以这种方式修改的文件不再被视为原件，因此可以自由复制。\n\n此外，大多数海狸无法集中注意力于没有足够花哨和色彩的蓝图。根据第53.7-4号法规，基于工人的注意力范围或吃蓝图的倾向而歧视工人是违法的。\n\n因此，复制、保存和使用此类重要文件的标准程序如下：\n\n建造一个<color=green>艺术家小屋</color>和一个<color=green>抄写员小屋</color>。\n\n艺术家将为建筑工人添加适当的花哨程度。请勿立即使用蓝图。\n\n抄写员将制作几份不花哨的蓝图副本。将这些副本送回艺术家。\n\n重复此过程，直到您拥有足够的蓝图以支持所有可预见的建设项目。\n\n配置这两座建筑以处理泄洪闸坝蓝图。\n\n此程序是完全合法的，因为它仅违反法规的精神。\n\n请随意保留这封信件作为证据。"
zhTW = "您好。\n\n我們代表智慧財產局，負責確保有價值的知識得到適當的文件記錄、複製、分類、編目和存檔。\n\n我們了解到您的定居點最近開始設計一個<color=green>洪水閘大壩</color>的藍圖。\n\n根據第107.33-2號規定，請注意，在任何情況下禁止複製原始文件。\n\n然而，在原始文件上亂寫、洒食物和飲料、食用或以其他方式毀壞原始文件並不違法。此外，根據第107.33-5號規定，這種方式修改的文件不再被視為原始文件，因此可以自由複製。\n\n此外，大多數海狸無法專注於不夠華麗和多彩的藍圖。根據第53.7-4號規定，基於工人的注意力持久度或吃藍圖的傾向而進行歧視是違法的。\n\n因此，現行標準的文件複製、保存和使用程序如下：\n\n建造一個<color=green>藝術家小屋</color>和一個<color=green>印刷小屋</color>。\n\n藝術家將為建設者提供所需的適當華麗程度。請勿立即使用藍圖。\n\n印刷者將製作幾份不華麗的藍圖複本。將這些複本送回藝術家。\n\n重複此過程，直到您擁有足夠的藍圖以供所有可預見的建設項目使用。\n\n將兩棟建築配置為處理洪水閘大壩的藍圖。\n\n此程序是完全合法的，因為它只違反了這些規定的精神。\n\n請隨意保留這份信函作為證明。"
ruRU = "Приветствую.\n\nМы представляем Бюро интеллектуальной собственности, ответственное за обеспечение правильного документирования, дублирования, классификации, индексирования и архивирования ценной информации.\n\nМы понимаем, что ваше поселение недавно начало рисовать <color=green>чертежи</color> для Дамбы с затвором.\n\nВ соответствии с Регламентом 107.33-2, обратите внимание, что строго запрещено дублировать оригинальные документы при любых обстоятельствах.\n\nТем не менее, не является незаконным делать пометки, проливать еду и напитки на оригинальные документы, есть их или иным образом уничтожать оригинал. Более того, согласно Регламенту 107.33-5, документы, измененные таким образом, больше не считаются оригинальными и могут быть свободно скопированы.\n\nКроме того, большинство бобров не способны сосредоточить свое внимание на чертеже, который не достаточно роскошный и красочный. Дискриминация работников по причине их способности к концентрации или склонности есть чертежи является незаконной с момента введения Регламента 53.7-4.\n\nПоэтому сейчас стандартная процедура дублирования, сохранения и использования таких важных документов выглядит следующим образом:\n\nПостройте <color=green>Скворечник художника</color> и <color=green>Скворечник копировщика</color>.\n\nХудожник добавит необходимый уровень роскоши, требуемый для правильного использования строителями. Не используйте чертеж сразу же.\n\nКопировщик произведет несколько непрезентабельных копий чертежа. Верните их обратно художнику.\n\nПовторяйте этот процесс, пока у вас не будет достаточно чертежей, чтобы обеспечить все предстоящие строительные проекты.\n\nНастройте оба здания на работу с чертежом Дамбы с затвором.\n\nЭта процедура совершенно законна, так как нарушает только дух регуляций.\n\nНе стесняйтесь сохранять эту переписку как доказательство."
jaJP = "こんにちは。\n\n私たちは知的財産局を代表しています。この組織は、価値のある知識が適切に文書化、複製、分類、索引化、アーカイブされることを保証する責任があります。\n\nあなたの集落が最近、洪水ゲートダムの<color=green>設計図</color>を引き始めたことを理解しています。\n\n規則107.33-2により、原本を複製することはあらゆる状況下において厳しく禁じられています。\n\nただし、原本に落書きをすることや、食べ物や飲み物をこぼすこと、食べること、その他の方法で原本を破壊することは違法ではありません。さらに、規則107.33-5に従い、そのように変更された文書はもはや原本とは見なされず、自由に複製することができます。\n\nまた、ほとんどのビーバーは、十分に華やかでカラフルでない設計図に注意を集中させることができません。作業者の注意力や設計図を食べる傾向に基づいて差別することは、規則53.7-4以来違法です。\n\nしたがって、このような重要な文書を複製、保存、利用するための現在の標準手続きは次のとおりです：\n\n<color=green>アーティストの小屋</color>と<color=green>コピーの小屋</color>を建設してください。\n\nアーティストは、建設者が適切に使用するために必要な華やかさのレベルを加えます。設計図をすぐに使用しないでください。\n\nコピーは、設計図のいくつかの非華やかなコピーを作成します。これらをアーティストに戻してください。\n\nすべての予見可能な建設プロジェクトを供給するのに十分な設計図ができるまで、このプロセスを繰り返してください。\n\n両方の建物を洪水ゲートダムの設計図に従って作業するように設定してください。\n\nこの手続きは完全に合法であり、規則の精神を侵害するだけです。\n\nこの通信を証拠として保持して構いません。"
frFR = "Salutations.\n\nNous représentons le Bureau de la Propriété Intellectuelle, responsable de s'assurer que les connaissances précieuses sont correctement documentées, dupliquées, classées, indexées et archivées.\n\nNous comprenons que votre établissement a récemment commencé à dessiner les <color=green>plans</color> pour un barrage à clapet.\n\nEn vertu de la réglementation 107.33-2, veuillez noter qu'il est strictement interdit de dupliquer des documents originaux dans toutes circonstances.\n\nCependant, il n'est pas illégal de gribouiller sur, de renverser de la nourriture et des boissons sur, de manger ou de détruire par d'autres moyens un document original. De plus, selon la réglementation 107.33-5, les documents modifiés de cette manière ne sont plus considérés comme originaux et peuvent donc être copiés librement.\n\nDe plus, la plupart des castors sont incapables de concentrer leur attention sur un plan qui n'est pas suffisamment sophistiqué et coloré. Discriminer les travailleurs en fonction de leur capacité d'attention ou de leur tendance à manger des plans est illégal depuis la réglementation 53.7-4.\n\nPar conséquent, la procédure désormais standard pour dupliquer, préserver et utiliser de tels documents essentiels est la suivante :\n\nConstruisez une <color=green>Maison de l'Artiste</color> et une <color=green>Maison du Copiste</color>.\n\nL'Artiste ajoutera le niveau de sophistication approprié requis pour une utilisation correcte par les constructeurs. Ne pas utiliser immédiatement le plan.\n\nLe Copiste produira plusieurs copies peu sophistiquées du plan. Renvoie-les à l'Artiste.\n\nRépétez ce processus jusqu'à ce que vous ayez suffisamment de plans pour fournir tous les projets de construction prévisibles.\n\nConfigurez les deux bâtiments pour travailler sur le plan du barrage à clapet.\n\nCette procédure est parfaitement légale, car elle ne viole que l'esprit des règlements.\n\nN'hésitez pas à conserver cette correspondance comme preuve."
deDE = "Grüße.\n\nWir vertreten das Büro für geistiges Eigentum, das dafür verantwortlich ist, dass wertvolles Wissen ordnungsgemäß dokumentiert, dupliziert, klassifiziert, indiziert und archiviert wird.\n\nWir verstehen, dass Ihre Siedlung kürzlich begonnen hat, die <color=green>Pläne</color> für einen Flutwehr-Damm zu zeichnen.\n\nAufgrund der Verordnung 107.33-2 weisen wir darauf hin, dass es unter keinen Umständen strikt verboten ist, Originaldokumente zu duplizieren.\n\nEs ist jedoch nicht illegal, auf einem Originaldokument zu kritzeln, Essen und Getränke darauf zu verschütten, es zu essen oder anderweitig zu zerstören. Darüber hinaus sind Dokumente, die auf diese Weise verändert wurden, gemäß der Verordnung 107.33-5 nicht mehr als Originale anzusehen und dürfen daher ohne Einschränkungen kopiert werden.\n\nDarüber hinaus sind die meisten Biber nicht in der Lage, ihre Aufmerksamkeit auf einen Plan zu richten, der nicht ausreichend schick und bunt ist. Die Diskriminierung von Arbeitern basierend auf ihrer Aufmerksamkeitsspanne oder Neigung, Pläne zu essen, ist seit der Verordnung 53.7-4 illegal.\n\nDaher lautet das jetzt standardmäßige Verfahren zum Duplizieren, Bewahren und Verwenden solcher wesentlichen Dokumente wie folgt:\n\nErrichten Sie eine <color=green>Artist’s Lodge</color> und eine <color=green>Copyist’s Lodge</color>.\n\nDer Künstler wird das erforderliche Maß an Schick hinzufügen, das für die ordnungsgemäße Verwendung durch Bauarbeiter erforderlich ist. Verwenden Sie den Plan nicht sofort.\n\nDer Kopist wird mehrere nicht-schicke Kopien des Plans erstellen. Senden Sie diese zurück an den Künstler.\n\nWiederholen Sie diesen Prozess, bis Sie genügend Pläne haben, um alle voraussehbaren Bauprojekte zu versorgen.\n\nKonfigurieren Sie beide Gebäude, um am Flutwehr-Damm-Plan zu arbeiten.\n\nDieses Verfahren ist vollkommen legal, da es nur den Geist der Vorschriften verletzt.\n\nBitte bewahren Sie diese Korrespondenz als Nachweis auf."
plPL = "Witaj.\n\nReprezentujemy Biuro Własności Intelektualnej, odpowiedzialne za zapewnienie, że cenne informacje są odpowiednio dokumentowane, kopiowane, klasyfikowane, indeksowane i archiwizowane.\n\nRozumiemy, że twoja osada niedawno rozpoczęła rysowanie <color=green>planów</color> dla Tamy Zaporowej.\n\nZgodnie z Regulacją 107.33-2, prosimy pamiętać, że surowo zabrania się duplikowania oryginalnych dokumentów w jakichkolwiek okolicznościach.\n\nNiemniej jednak, nie jest nielegalne bazgrać po, rozlewać jedzenie i napoje na, jeść lub w inny sposób niszczyć oryginalny dokument. Ponadto, zgodnie z Regulacją 107.33-5, dokumenty zmienione w taki sposób nie są już uznawane za oryginalne, a zatem mogą być kopiowane dowolnie.\n\nDodatkowo, większość bobrów nie jest w stanie skupić swojej uwagi na planie, który nie jest wystarczająco elegancki i kolorowy. Dyskryminacja pracowników na podstawie ich zdolności do koncentracji lub skłonności do jedzenia planów jest nielegalna od czasów Regulacji 53.7-4.\n\nDlatego obecna standardowa procedura duplikowania, przechowywania i używania takich istotnych dokumentów jest następująca:\n\nZbuduj <color=green>Chatę Artysty</color> oraz <color=green>Chatę Kserografa</color>.\n\nArtysta doda odpowiedni poziom elegancji wymagany do właściwego użytku przez budowniczych. Nie używaj planu od razu.\n\nKserograf wyprodukuje kilka nieeleganckich kopii planu. Prześlij je z powrotem do Artysty.\n\nPowtarzaj ten proces, aż uzyskasz wystarczającą liczbę planów do zaspokojenia wszystkich przewidywanych projektów budowlanych.\n\nSkonfiguruj oba budynki, aby pracowały nad planem Tamy Zaporowej.\n\nTa procedura jest absolutnie legalna, ponieważ narusza tylko ducha regulacji.\n\nMożesz zachować tę korespondencję jako dowód."
ptBR = "Saudações.\n\nNós representamos o Escritório de Propriedade Intelectual, responsável por garantir que conhecimentos valiosos sejam devidamente documentados, duplicados, classificados, indexados e arquivados.\n\nEntendemos que sua colônia recentemente começou a desenhar os <color=green>plantas</color> para uma Barragem de Inundação.\n\nDe acordo com a Regulamentação 107.33-2, por favor, note que é estritamente proibido duplicar documentos originais sob quaisquer circunstâncias.\n\nNo entanto, não é ilegal rabisco, derramar alimentos e bebidas sobre, comer ou de outra forma destruir um documento original. Além disso, segundo a Regulamentação 107.33-5, documentos alterados de tal maneira não são mais considerados originais e, portanto, podem ser copiados livremente.\n\nAlém disso, a maioria dos castores é incapaz de concentrar sua atenção em um projeto que não seja adequadamente chique e colorido. Discriminar trabalhadores com base em sua capacidade de atenção ou propensão a comer plantas é ilegal desde a Regulamentação 53.7-4.\n\nPortanto, o procedimento agora padrão para duplicar, preservar e usar tais documentos essenciais é o seguinte:\n\nConstrua uma <color=green>Cabana do Artista</color> e uma <color=green>Cabana do Copista</color>.\n\nO Artista adicionará o nível apropriado de sofisticação necessário para o uso adequado pelos construtores. Não use o projeto imediatamente.\n\nO Copista produzirá várias cópias simples do projeto. Envie estas de volta ao Artista.\n\nRepita esse processo até ter plantas suficientes para suprir todos os projetos de construção previsíveis.\n\nConfigure ambos os edifícios para trabalhar na planta da Barragem de Inundação.\n\nEste procedimento é perfeitamente legal, pois apenas viola o espírito das regulamentações.\n\nSinta-se à vontade para manter esta correspondência como prova."
koKR = "안녕하세요.\n\n우리는 귀중한 지식이 적절하게 문서화되고, 복제되며, 분류되고, 색인화되고, 보관되도록 책임지는 지식 재산국을 대표합니다.\n\n우리의 이해로는 귀하의 정착지가 최근 <color=green>청사진</color>을 만들어내기 시작한 것으로 알고 있습니다, 홍수 방지 댐을 위한 것이죠.\n\n규정 107.33-2에 따라, 어떠한 경우에도 원본 문서를 복제하는 것은 엄격히 금지되어 있음을 주의해 주십시오.\n\n단, 원본 문서에 낙서를 하거나, 음식과 음료수를 쏟거나, 먹거나, 또는 다른 방법으로 파괴하는 것은 불법이 아닙니다. 더욱이, 규정 107.33-5에 따르면, 그러한 방식으로 변경된 문서는 더 이상 원본으로 간주되지 않으므로 자유롭게 복사할 수 있습니다.\n\n또한, 대부분의 비버들은 충분히 화려하고 멋진 청사진에 집중할 수 있는 능력이 없습니다. 집중력이나 청사진을 먹는 경향에 따라 근로자를 차별하는 것은 규정 53.7-4에 따라 불법입니다.\n\n따라서 이러한 필수 문서를 복제하고 보존하며 사용하는 표준 절차는 다음과 같습니다:\n\n<color=green>예술가의 오두막</color>과 <color=green>복사자의 오두막</color>을 건설하십시오.\n\n예술가는 건축가가 적절하게 사용하기 위해 필요한 수준의 화려함을 추가할 것입니다. 청사진을 즉시 사용하지 마십시오.\n\n복사자는 청사진의 몇 가지 비화려한 복사본을 생산할 것입니다. 이것들을 예술가에게 다시 보내십시오.\n\n모든 예상되는 건설 프로젝트에 충분한 청사진이 확보될 때까지 이 과정을 반복하십시오.\n\n두 건물을 모두 홍수 방지 댐 청사진 작업에 맞추어 설정하십시오.\n\n이 절차는 규정의 정신만 위반할 뿐, 완전히 합법적입니다.\n\n이 서신을 증거로 보관해 주셔도 좋습니다."
csCZ = "Vítejte.\n\nReprezentujeme Úřad pro duševní vlastnictví, odpovědný za zajištění, že cenné znalosti jsou řádně dokumentovány, duplikovány, klasifikovány, indexovány a archivovány.\n\nChápeme, že vaše osada nedávno začala vytvářet <color=green>plány</color> pro řídící hráz.\n\nVzhledem k Nařízení 107.33-2 si prosím uvědomte, že je za všech okolností přísně zakázáno duplikovat originální dokumenty.\n\nNení však nezákonné psát na, rozlít na, jíst nebo jinak ničit originální dokument. Dále podle Nařízení 107.33-5, dokumenty pozměněné tímto způsobem již nejsou považovány za originál a mohou být tedy volně kopírovány.\n\nKromě toho většina bobrů není schopna soustředit svou pozornost na plán, který není dostatečně stylový a barevný. Diskriminace mezi pracovníky na základě jejich schopnosti soustředit se nebo tendence jíst plány je od Nařízení 53.7-4 nezákonná.\n\nProto je nyní standardní postup pro duplikaci, uchovávání a používání takových důležitých dokumentů následující:\n\nPostavte <color=green>Dílnu umělce</color> a <color=green>Dílnu kopisty</color>.\n\nUmělec přidá odpovídající úroveň stylovosti potřebnou pro správné použití staviteli. Nepoužívejte plán okamžitě.\n\nKopista vyrobí několik ne-stylových kopií plánu. Pošlete je zpět umělci.\n\nOpakujte tento proces, dokud nebudete mít dostatek plánů pro všechny předvídatelné stavební projekty.\n\nNastavte obě budovy, aby pracovaly na plánu řídící hráze.\n\nTento postup je naprosto legální, protože pouze porušuje ducha předpisů.\n\nNeváhejte si tuto korespondenci uschovat jako důkaz."
viVN = "Xin chào.\n\nChúng tôi đại diện cho Cục Sở hữu trí tuệ, chịu trách nhiệm đảm bảo rằng kiến thức quý giá được ghi chép, sao chép, phân loại, lập chỉ mục và lưu trữ đúng cách.\n\nChúng tôi hiểu rằng khu định cư của bạn gần đây đã bắt đầu vẽ <color=green>bản vẽ</color> cho một Đập Cửa Lũ.\n\nTheo Quy định 107.33-2, xin lưu ý rằng việc sao chép tài liệu gốc là hoàn toàn bị cấm trong mọi trường hợp.\n\nTuy nhiên, không có gì là bất hợp pháp khi viết nguệch ngoạc lên, đổ thức ăn và đồ uống lên, ăn hoặc phá hoại tài liệu gốc. Hơn nữa, theo Quy định 107.33-5, những tài liệu bị sửa đổi theo cách như vậy sẽ không còn được coi là bản gốc nữa và do đó có thể được sao chép một cách tự do.\n\nNgoài ra, hầu hết các con sói beaver không có khả năng tập trung vào một bản vẽ không đủ màu sắc và hoa mỹ. Phân biệt đối xử với công nhân dựa trên khả năng chú ý của họ hoặc xu hướng ăn bản vẽ đã bị cấm từ Quy định 53.7-4.\n\nDo đó, quy trình chuẩn hiện nay để sao chép, bảo tồn và sử dụng những tài liệu quan trọng như vậy là như sau:\n\nXây dựng một <color=green>Nhà Nghệ Sĩ</color> và một <color=green>Nhà Sao Chép</color>.\n\nNghệ Sĩ sẽ thêm mức độ hoa mỹ cần thiết cho việc sử dụng đúng cách bởi các nhà xây dựng. Đừng sử dụng bản vẽ ngay lập tức.\n\nNhà Sao Chép sẽ sản xuất một số bản sao không hoa mỹ của bản vẽ. Gửi những bản này trở lại cho Nghệ Sĩ.\n\nLặp lại quy trình này cho đến khi bạn có đủ bản vẽ để cung cấp cho tất cả các dự án xây dựng có thể xảy ra.\n\nCấu hình cả hai tòa nhà để làm việc trên bản vẽ Đập Cửa Lũ.\n\nQuy trình này hoàn toàn hợp pháp, vì nó chỉ vi phạm tinh thần của các quy định.\n\nHãy thoải mái giữ lại thư từ này như một bằng chứng."
trTR = "Selamlar.\n\nBiz, değerli bilgilerin düzgün bir şekilde belgelenmesi, çoğaltılması, sınıflandırılması, dizinlenmesi ve arşivlenmesinden sorumlu olan Fikri Mülkiyet Bürosu'nu temsil etmekteyiz.\n\nYerleşiminizin yakın zamanda bir Su Kapak Barajı için <color=green>planları</color> çizmeye başladığını anlıyoruz.\n\nRegülasyon 107.33-2'ye göre, lütfen orijinal belgelerin herhangi bir koşulda çoğaltılmasının kesinlikle yasak olduğunu not edin.\n\nAncak, orijinal bir belgeye karalamak, yiyecek ve içecek dökmek, yemek veya başka bir şekilde tahrip etmek yasadışı değildir. Ayrıca, Regülasyon 107.33-5'e göre, bu şekilde değiştirilen belgeler artık orijinal olarak kabul edilmez ve dolayısıyla serbestçe çoğaltılabilirler.\n\nAyrıca, çoğu kunduz, yeterince şatafatlı ve renkli olmayan bir plana dikkatini odaklama yeteneğine sahip değildir. İşçileri dikkat süresi veya planları yeme eğilimi temelinde ayrımcılığa tabi tutmak, Regülasyon 53.7-4'ten bu yana yasadışıdır.\n\nBu nedenle, böyle önemli belgelerin çoğaltılması, korunması ve kullanılması için standart prosedür şudur:\n\nBir <color=green>Sanatçı Kulübü</color> ve bir <color=green>Kopyacı Kulübü</color> inşa edin.\n\nSanatçı, inşaatçılar tarafından düzgün kullanımı için gereken uygun şatafat seviyesini ekleyecektir. Planı hemen kullanmayın.\n\nKopyacı, planın birkaç sıradan kopyasını üretecektir. Bunları Sanatçıya geri gönderin.\n\nTüm öngörülebilir inşaat projeleri için yeterince plan elde edene kadar bu süreci tekrarlayın.\n\nHer iki binayı da Su Kapak Barajı planı üzerinde çalışacak şekilde yapılandırın.\n\nBu prosedür tamamen yasaldır, çünkü sadece regülasyonların ruhunu ihlal etmektedir.\n\nBu yazışmayı kanıt olarak saklamaktan çekinmeyin."

["Tutorial.BlueprintDuplicationA.Scrolldisplay_FloodgateDam.Whitepaws"]
raw = "Follow-up Notice – Blueprint Storage Compliance\n\nNow that the duplication process is underway, we must address the matter of proper document storage.\n\nArchitectural and engineering plans are considered cultural artifacts and must therefore be displayed in a manner appropriate to their importance.\n\nConstruct a Scroll Display.\n\nMost documents — and particularly blueprints — should be stored in such displays to ensure correct preservation, classification, and public admiration.\n\nPlease note that it is generally pointless to keep both <color=green>fancy</color> and <color=red>non-fancy</color> versions of the same blueprint. Maintaining redundant document variants only complicates cataloging procedures and irritates archivists.\n\nConfigure the Scroll Display to store Fancy Floodgate Dam Blueprints.\n\nIf you still possess non-fancy copies, simply allow the Artist to continue working until the situation corrects itself.\n\nOnce the appropriate level of fanciness has been achieved, the document may be safely archived.\n\nProper storage ensures that your work may be admired by future generations — and, more importantly, by auditors."
status = "normal"
enUS = "Follow-up Notice – Blueprint Storage Compliance\n\nNow that the duplication process is underway, we must address the matter of proper document storage.\n\nArchitectural and engineering plans are considered cultural artifacts and must therefore be displayed in a manner appropriate to their importance.\n\nConstruct a Scroll Display.\n\nMost documents — and particularly blueprints — should be stored in such displays to ensure correct preservation, classification, and public admiration.\n\nPlease note that it is generally pointless to keep both <color=green>fancy</color> and <color=red>non-fancy</color> versions of the same blueprint. Maintaining redundant document variants only complicates cataloging procedures and irritates archivists.\n\nConfigure the Scroll Display to store Fancy Floodgate Dam Blueprints.\n\nIf you still possess non-fancy copies, simply allow the Artist to continue working until the situation corrects itself.\n\nOnce the appropriate level of fanciness has been achieved, the document may be safely archived.\n\nProper storage ensures that your work may be admired by future generations — and, more importantly, by auditors."
zhCN = "后续通知 - 蓝图存储合规性\n\n由于复制过程正在进行中，我们必须解决适当文档存储的问题。\n\n建筑和工程图纸被视为文化文物，因此必须以适合其重要性的方式展示。\n\n构建一个卷轴展示架。\n\n大多数文档——尤其是蓝图——应该存放在这样的展示架中，以确保正确的保存、分类和公众欣赏。\n\n请注意，保留同一蓝图的<color=green>精美</color>和<color=red>普通</color>版本通常是没有意义的。维护冗余的文档变体只会使编目程序变复杂，并对档案管理员造成困扰。\n\n配置卷轴展示架以存储精美的水闸坝蓝图。\n\n如果您仍然拥有普通副本，请允许艺术家继续工作，直到情况得到纠正。\n\n一旦达到了适当的精美程度，该文档就可以安全归档。\n\n适当的存储确保您的工作能被未来的世代所欣赏——更重要的是，被审计人员所欣赏。"
zhTW = "後續通知 – 藍圖儲存合規性\n\n隨著複製過程的展開，我們必須解決正確文件儲存的問題。\n\n建築和工程計劃被視為文化文物，因此必須以符合其重要性的方式展示。\n\n建造一個卷軸顯示架。\n\n大多數文件—特別是藍圖—應該儲存在這樣的顯示架中，以確保正確的保存、分類和公眾的欣賞。\n\n請注意，通常沒有必要同時保留<color=green>華麗</color>和<color=red>非華麗</color>版本的同一藍圖。維持冗餘的文件變體只會使編目程序複雜化，並使檔案管理員感到憤怒。\n\n配置卷軸顯示架以儲存華麗的洪水閘藍圖。\n\n如果您仍然擁有非華麗的副本，只需允許藝術家繼續工作，直到情況自行改善。\n\n一旦達到適當的華麗程度，該文件可以安全地存檔。\n\n正確的儲存確保您的作品能夠被未來世代欣賞—更重要的是，能被審計員所欣賞。"
ruRU = "Уведомление о дальнейшем шаге — Соблюдение хранения чертежей\n\nТеперь, когда процесс дублирования начался, мы должны обратить внимание на вопрос надлежащего хранения документов.\n\nАрхитектурные и инженерные планы считаются культурными артефактами и, следовательно, должны храниться соответствующим образом, учитывая их важность.\n\nПостройте свиток для хранения.\n\nБольшинство документов — и особенно чертежей — должны храниться в таких выставках для обеспечения правильного сохранения, классификации и общественного восхищения.\n\nОбратите внимание, что в целом бессмысленно хранить как <color=green>изысканные</color>, так и <color=red>неизысканные</color> версии одного и того же чертежа. Сохранение избыточных вариантов документов лишь усложняет процедуры каталогизации и раздражает архивистов.\n\nНастройте свиток для хранения изысканных чертежей плотины.\n\nЕсли у вас все еще есть неизысканные копии, просто позвольте Художнику продолжать работу, пока ситуация не исправится.\n\nКак только будет достигнут соответствующий уровень изысканности, документ можно будет безопасно архивировать.\n\nПравильное хранение обеспечивает возможность восхищения вашей работой будущими поколениями — и, что более важно, аудиторами."
jaJP = "フォローアップ通知 - ブループリント保管の遵守\n\n複製プロセスが進行中である今、適切な文書保管の問題に対処する必要があります。\n\n建築および工学の計画は文化的遺物と見なされ、その重要性に応じた方法で展示されなければなりません。\n\n巻物ディスプレイを構築してください。\n\nほとんどの文書、特にブループリントは、正しい保存、分類、および公共の賞賛を確保するためにそのようなディスプレイに保管されるべきです。\n\n同じブループリントの <color=green>豪華</color> バージョンと <color=red>非豪華</color> バージョンの両方を保管することは一般的に無意味であることに注意してください。冗長な文書のバリエーションを維持することは、カタログ手続きを複雑にし、アーカイブ担当者を苛立たせるだけです。\n\n巻物ディスプレイを設定して、豪華なフラッドゲートダムのブループリントを保管してください。\n\nもしまだ非豪華なコピーを持っている場合は、アーティストが状況が改善するまで作業を続けることを許可してください。\n\n適切な豪華さのレベルが達成されれば、文書は安全にアーカイブできます。\n\n適切な保管は、あなたの仕事が未来の世代、そしてより重要なことに監査官に賞賛されることを保証します。"
frFR = "Avis de suivi – Conformité au stockage des plans\n\nMaintenant que le processus de duplication est en cours, nous devons aborder la question du stockage approprié des documents.\n\nLes plans architecturaux et d'ingénierie sont considérés comme des artefacts culturels et doivent donc être exposés d'une manière appropriée à leur importance.\n\nConstruisez un support à parchemin.\n\nLa plupart des documents — et en particulier les plans — doivent être stockés dans de tels supports pour garantir une conservation, une classification et une admiration publiques correctes.\n\nVeuillez noter qu'il est généralement inutile de conserver à la fois des versions <color=green>élégantes</color> et <color=red>non élégantes</color> du même plan. Maintenir des variantes de documents redondantes ne fait que compliquer les procédures de catalogage et irriter les archivistes.\n\nConfigurez le support à parchemin pour stocker les plans élégants du barrage à vanne.\n\nSi vous possédez encore des copies non élégantes, laissez simplement l'artiste continuer à travailler jusqu'à ce que la situation se corrige d'elle-même.\n\nUne fois que le niveau approprié d'élégance a été atteint, le document peut être archivé en toute sécurité.\n\nUn stockage approprié garantit que votre travail pourra être admiré par les générations futures — et, plus important encore, par les auditeurs."
deDE = "Nachricht zur Nachverfolgung – Einhaltung der Aufbewahrung von Blaupausen\n\nDa der Duplikationsprozess im Gange ist, müssen wir das Thema der ordnungsgemäßen Dokumentenspeicherung ansprechen.\n\nArchitektonische und ingenieurtechnische Pläne gelten als kulturelle Artefakte und müssen daher auf eine Weise ausgestellt werden, die ihrer Bedeutung angemessen ist.\n\nKonstruiere eine Rollenausstellung.\n\nDie meisten Dokumente — insbesondere Blaupausen — sollten in solchen Ausstellungen aufbewahrt werden, um die korrekte Erhaltung, Klassifizierung und öffentliche Bewunderung sicherzustellen.\n\nBitte beachte, dass es generell sinnlos ist, sowohl <color=green>schicke</color> als auch <color=red>nicht-schicke</color> Versionen derselben Blaupause aufzubewahren. Die Beibehaltung redundanter Dokumentenversionen kompliziert lediglich die Katalogisierungsverfahren und verärgert Archivare.\n\nKonfiguriere die Rollenausstellung, um schicke Blaupausen für das Hochwasser-Tor zu lagern.\n\nWenn du noch nicht-schicke Kopien besitzt, lasse den Künstler einfach weiterarbeiten, bis sich die Situation von selbst korrigiert.\n\nSobald das angemessene Maß an Schicklichkeit erreicht ist, kann das Dokument sicher archiviert werden.\n\nEine ordnungsgemäße Aufbewahrung stellt sicher, dass deine Arbeit von zukünftigen Generationen bewundert werden kann — und, was noch wichtiger ist, von Prüfern."
plPL = "Zgłoszenie uzupełniające – Przestrzeganie zasad przechowywania planów\n\nPonieważ proces duplikacji jest w toku, musimy zająć się kwestią odpowiedniego przechowywania dokumentów.\n\nPlany architektoniczne i inżynieryjne są uważane za artefakty kulturowe i powinny być zatem wyświetlane w sposób odpowiedni do ich znaczenia.\n\nZbuduj Wyświetlacz Rolki.\n\nWiększość dokumentów — a szczególnie rysunków — powinna być przechowywana w takich wyświetlaczach, aby zapewnić odpowiednie zachowanie, klasyfikację i podziw publiczności.\n\nProszę zauważyć, że generalnie nie ma sensu przechowywać zarówno <color=green>fancy</color>, jak i <color=red>non-fancy</color> wersji tego samego rysunku. Utrzymywanie zbędnych wariantów dokumentów tylko komplikuje procedury katalogowania i irytuje archiwistów.\n\nSkonfiguruj Wyświetlacz Rolki, aby przechowywał Fancowe Plany Tam Zastawowych.\n\nJeśli nadal posiadasz wersje non-fancy, po prostu pozwól Artyście kontynuować pracę, aż sytuacja ulegnie poprawie.\n\nGdy osiągnięty zostanie odpowiedni poziom fanciness, dokument może być bezpiecznie zarchiwizowany.\n\nOdpowiednie przechowywanie zapewnia, że Twoja praca będzie podziwiana przez przyszłe pokolenia — a co ważniejsze, przez audytorów."
ptBR = "Aviso de Acompanhamento – Conformidade de Armazenamento de Projetos\n\nAgora que o processo de duplicação está em andamento, devemos abordar a questão do armazenamento adequado de documentos.\n\nOs planos arquitetônicos e de engenharia são considerados artefatos culturais e, portanto, devem ser exibidos de maneira apropriada à sua importância.\n\nConstrua uma Exibição em Rolos.\n\nA maioria dos documentos — e particularmente os projetos — deve ser armazenada nessas exibições para garantir a preservação, classificação e admiração pública corretas.\n\nPor favor, note que, geralmente, é inútil manter tanto versões <color=green>sofisticadas</color> quanto <color=red>não sofisticadas</color> do mesmo projeto. Manter variantes redundantes de documentos apenas complicará os procedimentos de catalogação e irritará os arquivistas.\n\nConfigure a Exibição em Rolos para armazenar Projetos Sofisticados do Dique de Inundação.\n\nSe você ainda possui cópias não sofisticadas, basta permitir que o Artista continue trabalhando até que a situação se resolva sozinha.\n\nUma vez que o nível apropriado de sofisticação tenha sido alcançado, o documento pode ser arquivado com segurança.\n\nO armazenamento adequado garante que seu trabalho possa ser admirado por gerações futuras — e, mais importante, por auditores."
koKR = "후속 공지 – 블루프린트 저장 규정 준수\n\n복제 과정이 진행 중인 지금, 우리는 문서 저장의 적절한 문제를 다루어야 합니다.\n\n건축 및 엔지니어링 계획은 문화 유물로 간주되므로 그 중요성에 맞게 적절하게 전시되어야 합니다.\n\n스크롤 디스플레이를 구축하십시오.\n\n대부분의 문서, 특히 블루프린트는 올바른 보존, 분류 및 대중의 감탄을 보장하기 위해 이러한 디스플레이에 저장되어야 합니다.\n\n동일한 블루프린트의 <color=green>화려한</color> 버전과 <color=red>비화려한</color> 버전을 모두 보관하는 것은 일반적으로 무의미하다는 점에 유의하십시오. 중복된 문서 변형을 유지하는 것은 카탈로그 절차를 복잡하게 하고 기록 보관인에게 불편함을 줍니다.\n\n화려한 홍수 게이트 댐 블루프린트를 저장하도록 스크롤 디스플레이를 구성하십시오.\n\n여전히 비화려한 사본이 있다면, 단순히 예술가가 작업을 계속할 수 있도록 허용하십시오. 상황이 스스로 바로잡힐 때까지 기다리십시오.\n\n적절한 수준의 화려함이 달성되면, 문서는 안전하게 보관할 수 있습니다.\n\n적절한 저장은 당신의 작업이 미래 세대와, 더 중요한 것은 감사자들에게 감탄받을 수 있도록 보장합니다."
csCZ = "Zpráva o pokračování – Soulad s uložením plánů\n\nNyní, když je proces duplicace v plném proudu, musíme se zabývat otázkou správného ukládání dokumentů.\n\nArchitektonické a inženýrské plány jsou považovány za kulturní artefakty a proto musí být vystavovány způsobem, který odpovídá jejich významu.\n\nPostavte Scroll Display.\n\nVětšina dokumentů — a zejména plánů — by měla být uložena v těchto výstavních prostorech, aby byla zajištěna správná konzervace, klasifikace a veřejné obdivování.\n\nVšimněte si, že je obecně zbytečné uchovávat jak <color=green>fancy</color>, tak <color=red>non-fancy</color> verze stejného plánu. Udržování redundantních variant dokumentů pouze komplikuje katalogizační postupy a rozčiluje archiváře.\n\nNastavte Scroll Display pro uložení Fancy Floodgate Dam Blueprints.\n\nPokud ještě vlastníte non-fancy kopie, jednoduše nechte umělce pokračovat v práci, dokud se situace sama neupraví.\n\nJakmile bude dosaženo vhodné úrovně fancy, může být dokument bezpečně archivován.\n\nSprávné ukládání zajišťuje, že vaše práce bude obdivována budoucími generacemi — a co je důležitější, auditory."
viVN = "Thông báo Theo dõi – Tuân thủ Lưu trữ Bản thiết kế\n\nBây giờ mà quy trình sao chép đang diễn ra, chúng ta phải giải quyết vấn đề lưu trữ tài liệu đúng cách.\n\nCác kế hoạch kiến trúc và kỹ thuật được coi là di sản văn hóa và do đó phải được trưng bày một cách phù hợp với tầm quan trọng của chúng.\n\nXây dựng một Kệ Cuộn.\n\nHầu hết các tài liệu — và đặc biệt là bản thiết kế — nên được lưu trữ trong những kệ như vậy để đảm bảo bảo tồn, phân loại và được công chúng ngưỡng mộ đúng cách.\n\nXin lưu ý rằng việc giữ cả phiên bản <color=green>đẹp</color> và <color=red>không đẹp</color> của cùng một bản thiết kế thường là vô nghĩa. Giữ lại các phiên bản tài liệu thừa chỉ làm phức tạp hóa quy trình lập danh mục và gây khó chịu cho các nhân viên lưu trữ.\n\nCấu hình Kệ Cuộn để lưu trữ các Bản thiết kế Đập nước Đẹp.\n\nNếu bạn vẫn giữ các bản sao không đẹp, chỉ cần cho Nghệ sĩ tiếp tục làm việc cho đến khi tình huống tự điều chỉnh.\n\nKhi mức độ đẹp thích hợp đã đạt được, tài liệu có thể được lưu trữ an toàn.\n\nLưu trữ đúng cách đảm bảo rằng công việc của bạn có thể được ngưỡng mộ bởi các thế hệ tương lai — và, quan trọng hơn, bởi những người kiểm toán."
trTR = "Takip Notu – Plan Depolama Uygunluğu\n\nArtık çoğaltma süreci devam ettiğine göre, belgelerin doğru depolanması meselesine değinmeliyiz.\n\nMimari ve mühendislik planları kültürel eserler olarak kabul edilir ve bu nedenle önemine uygun bir şekilde sergilenmelidir.\n\nBir Kaydırma Ekranı inşa edin.\n\nÇoğu belge – özellikle planlar – doğru korunma, sınıflandırma ve kamu takdiri sağlamak için bu tür ekranlarda saklanmalıdır.\n\nAynı planın hem <color=green>şatafatlı</color> hem de <color=red>basit</color> versiyonlarını tutmanın genellikle boşuna olduğunu lütfen unutmayın. Redundans listeleme prosedürlerini karmaşıklaştırır ve arşivcileri rahatsız eder.\n\nKaydırma Ekranını Şatafatlı Baraj Kapakları Planlarını depolamak için yapılandırın.\n\nEğer hala basit kopyalarınız varsa, durum düzelene kadar Sanatçının çalışmaya devam etmesine izin verin.\n\nGerekli şatafat seviyesine ulaşıldığında, belge güvenle arşivlenebilir.\n\nDoğru depolama, eserlerinizin gelecek nesiller tarafından – ve daha önemlisi, denetçiler tarafından – takdir edilmesini garanti eder."

["Tutorial.BlueprintDuplicationA.DiplomasTextA.Whitepaws"]
raw = "Final Notice – Academic Certification Handling\n\nAs your settlement continues to develop, you may eventually reach the point where higher education becomes available.\n\nAt that stage, particularly gifted beavers may obtain a <color=green>Diploma</color> in their field of specialization.\n\nIt should go without saying, but diplomas must not be duplicated or fancyfied.\n\nEven if you somehow convinced your Artists and Copyists to attempt such a procedure, it would not magically duplicate the beaver who actually possesses the knowledge.\n\nThat said, it is still advisable to prepare adequate storage for these documents.\n\nA rare confluence of unfortunate circumstances could theoretically lead to a <color=red>diploma being lost</color> — a heartbreaking event for the archivists…and for the newly graduated beaver as well. Availability of storage strongly reduces this risk.\n\nPlease ensure that all documentation remains properly archived."
status = "normal"
enUS = "Final Notice – Academic Certification Handling\n\nAs your settlement continues to develop, you may eventually reach the point where higher education becomes available.\n\nAt that stage, particularly gifted beavers may obtain a <color=green>Diploma</color> in their field of specialization.\n\nIt should go without saying, but diplomas must not be duplicated or fancyfied.\n\nEven if you somehow convinced your Artists and Copyists to attempt such a procedure, it would not magically duplicate the beaver who actually possesses the knowledge.\n\nThat said, it is still advisable to prepare adequate storage for these documents.\n\nA rare confluence of unfortunate circumstances could theoretically lead to a <color=red>diploma being lost</color> — a heartbreaking event for the archivists…and for the newly graduated beaver as well. Availability of storage strongly reduces this risk.\n\nPlease ensure that all documentation remains properly archived."
zhCN = "最终通知 - 学术认证处理\n\n随着你的定居点不断发展，你可能最终会达到高等教育可用的阶段。\n\n在那个时候，特别有天赋的海狸可以获得他们专业领域的<color=green>文凭</color>。\n\n不言而喻，文凭不得复制或美化。\n\n即使你说服了你的艺术家和抄写员尝试这样的程序，也不会神奇地复制出拥有知识的海狸。\n\n尽管如此，仍然建议为这些文件准备足够的存储空间。\n\n不幸的情况极有可能导致<color=red>文凭丢失</color>——对档案管理员来说是一个令人心碎的事件……对刚毕业的海狸也是如此。充足的存储可大大降低这一风险。\n\n请确保所有文档妥善归档。"
zhTW = "最後通知 - 學術證書處理\n\n隨著你的定居點持續發展，你最終可能會達到高等教育可以提供的階段。\n\n在那個階段，特別有才華的海狸可能會獲得其專業領域的<color=green>文憑</color>。\n\n這是不言而喻的，但文憑不能被複製或美化。\n\n即使你設法說服你的藝術家和抄寫員嘗試這樣的程序，也無法神奇地複製擁有實際知識的海狸。\n\n儘管如此，還是建議為這些文件準備足夠的儲存空間。\n\n不幸情況的罕見匯聚理論上可能導致<color=red>文憑遺失</color>——這對檔案管理員來說是一件令人心碎的事件……對新畢業的海狸來說也是如此。儲存空間的充足可大幅降低這種風險。\n\n請確保所有文件保持適當歸檔。"
ruRU = "Последнее уведомление – Обработка академических сертификатов\n\nПо мере того как ваше поселение продолжает развиваться, вы можете в конечном итоге достигнуть момента, когда высшее образование станет доступным.\n\nНа этом этапе особенно одаренные бобры могут получить <color=green>Диплом</color> в своей специальности.\n\nСледует отметить, что дипломы не должны дублироваться или украшаться.\n\nДаже если вам как-то удастся убедить ваших Художников и Копировщиков попытаться провести такую процедуру, это не создаст дубликата бобра, который на самом деле обладает знаниями.\n\nС учетом сказанного, все же рекомендуется подготовить адекватное хранилище для этих документов.\n\nРедкое сочетание неблагоприятных обстоятельств теоретически может привести к <color=red>потере диплома</color> — душераздирающее событие для архивистов… и для только что выпущенного бобра также. Наличие хранилища значительно снижает этот риск.\n\nПожалуйста, убедитесь, что вся документация остается должным образом архивированной."
jaJP = "最終通知 - 学位証明書の取り扱い\n\nあなたの集落が発展し続けると、最終的に高等教育が利用可能になる段階に達することがあります。\n\nその段階で、特に才能あるビーバーは専門分野での<color=green>学位</color>を取得することができます。\n\n言うまでもありませんが、学位は複製したり、見栄えを良くしたりしてはいけません。\n\nたとえ、アーティストやコピーライターを説得してそのような手続きを試みさせたとしても、実際に知識を持っているビーバーを魔法のように複製することはできません。\n\nとはいえ、これらの書類のために適切な保管場所を準備することは依然として推奨されます。\n\n稀に起こりうる不運な状況の重なりにより、理論的には<color=red>学位が失われる</color>可能性があります — アーカイビストにとっても、新しく卒業したビーバーにとっても心痛む出来事です。保管場所の確保はこのリスクを大幅に減少させます。\n\nすべての文書が適切にアーカイブされていることを確認してください。"
frFR = "Avis final – Gestion des certificats académiques\n\nÀ mesure que votre établissement continue de se développer, vous pourriez éventuellement atteindre le point où l'enseignement supérieur devient disponible.\n\nÀ ce stade, des castors particulièrement doués peuvent obtenir un <color=green>Diplôme</color> dans leur domaine de spécialisation.\n\nIl va sans dire que les diplômes ne doivent pas être dupliqués ou embellis.\n\nMême si vous parveniez à convaincre vos artistes et copistes d'essayer une telle procédure, cela ne dupliquerait pas magiquement le castor qui possède réellement les connaissances.\n\nCela dit, il est toujours conseillé de préparer un stockage adéquat pour ces documents.\n\nUne rare confluence de circonstances malheureuses pourrait théoriquement conduire à un <color=red>diplôme perdu</color> — un événement déchirant pour les archivistes… et pour le castor nouvellement diplômé également. La disponibilité d'un espace de stockage réduit fortement ce risque.\n\nVeuillez vous assurer que toute la documentation reste correctement archivée."
deDE = "Endgültige Mitteilung – Handhabung der akademischen Zertifikate\n\nDa sich Ihre Siedlung weiterentwickelt, kann es schließlich der Fall sein, dass eine höhere Ausbildung verfügbar wird.\n\nIn dieser Phase können besonders begabte Biber ein <color=green>Diplom</color> in ihrem Spezialgebiet erwerben.\n\nEs sollte selbstverständlich sein, dass Diplome nicht dupliziert oder aufgepeppt werden dürfen.\n\nSelbst wenn Sie es irgendwie geschafft haben, Ihre Künstler und Kopisten zu überzeugen, ein solches Verfahren zu versuchen, würde es nicht magisch den Biber duplizieren, der tatsächlich das Wissen besitzt.\n\nDas gesagt, ist es dennoch ratsam, angemessene Lagerräume für diese Dokumente vorzubereiten.\n\nEine seltene Zusammenkunft unglücklicher Umstände könnte theoretisch zu einem <color=red>verlorenen Diplom</color> führen – ein herzzerreißendes Ereignis für die Archivare... und auch für den neu graduierten Biber. Die Verfügbarkeit von Lagerraum verringert dieses Risiko erheblich.\n\nBitte stellen Sie sicher, dass alle Dokumente ordnungsgemäß archiviert bleiben."
plPL = "Ostateczne powiadomienie – Obsługa Certyfikatów Akademickich\n\nW miarę rozwoju twojej osady, możesz w końcu osiągnąć moment, w którym dostępne będą studia wyższe.\n\nNa tym etapie, szczególnie uzdolnione bobry mogą uzyskać <color=green>Dyplom</color> w swojej dziedzinie specjalizacji.\n\nNależy dodać, że dyplomy nie mogą być kopiowane ani upiększane.\n\nNawet jeśli w jakiś sposób udałoby ci się przekonać swoich Artystów i Kopistów do podjęcia takiej próby, nie sprawiłoby to automatycznie, że zostanie skopiowany bóbr, który rzeczywiście posiada wiedzę.\n\nMimo to, wskazane jest przygotowanie odpowiedniego przechowywania dla tych dokumentów.\n\nRzadkie zbiegi nieszczęśliwych okoliczności mogą teoretycznie prowadzić do <color=red>utraty dyplomu</color> — zdarzenia, które łamie serce dla archiwistów…i dla nowo upieczonego bobra również. Z dostępnością przechowywania to ryzyko znacznie się zmniejsza.\n\nProszę upewnić się, że cała dokumentacja pozostaje prawidłowo zarchiwizowana."
ptBR = "Aviso Final – Manuseio de Certificação Acadêmica\n\nÀ medida que seu assentamento continua a se desenvolver, você pode eventualmente alcançar o ponto em que a educação superior se torna disponível.\n\nNesse estágio, castores particularmente talentosos podem obter um <color=green>Diploma</color> em sua área de especialização.\n\nÉ desnecessário dizer, mas os diplomas não devem ser duplicados ou enfeitados.\n\nMesmo que você de alguma forma convença seus Artistas e Copistas a tentar tal procedimento, isso não duplicará magicamente o castor que realmente possui o conhecimento.\n\nDito isso, ainda é aconselhável preparar um armazenamento adequado para esses documentos.\n\nUma rara confluência de circunstâncias infelizes poderia teoricamente levar a um <color=red>diploma sendo perdido</color> — um evento desgastante para os arquivistas... e para o castor recém-formado também. A disponibilidade de armazenamento reduz fortemente esse risco.\n\nPor favor, assegure-se de que toda a documentação permaneça devidamente arquivada."
koKR = "최종 통지 – 학위 인증 처리\n\n정착지가 계속 발전함에 따라, 결국 높은 교육을 받을 수 있는 시점에 도달할 수 있습니다.\n\n그 단계에서 특히 재능 있는 비버는 자신의 전문 분야에서 <color=green>학위</color>를 취득할 수 있습니다.\n\n말할 필요도 없지만, 학위는 복제되거나 과장되어서는 안 됩니다.\n\n설사 당신이 예술가와 복사자들에게 그런 절차를 시도하도록 설득했다 해도, 실제로 지식을 지닌 비버를 마법처럼 복제할 수는 없습니다.\n\n그렇지만 이러한 문서에 대한 적절한 저장 공간을 준비하는 것이 여전히 바람직합니다.\n\n드물게 발생하는 불행한 상황이 이론적으로 <color=red>학위가 분실되는</color> 결과를 초래할 수 있습니다 — 이는 기록 담당자들에게… 그리고 새로 졸업한 비버에게도 가슴 아픈 사건입니다. 저장 공간의 가용성은 이 위험을 크게 줄입니다.\n\n모든 문서가 제대로 보관되도록 해 주시기 바랍니다."
csCZ = "Konečné upozornění – Zpracování akademických certifikátů\n\nJak vaše osada pokračuje v rozvoji, můžete se nakonec dostat do fáze, kdy bude vyšší vzdělání k dispozici.\n\nV této fázi mohou zvlášť nadaní bobři získat <color=green>Diplom</color> ve své specializaci.\n\nNemusím říkat, že diplomy nesmí být duplikovány ani „vylepšovány“.\n\nI když byste nějak přesvědčili své umělce a kopisty, aby se pokusili o takový postup, nebylo by to magicky schopné duplikovat bobra, který skutečně má znalosti.\n\nPřesto se stále doporučuje připravit adekvátní úložiště pro tyto dokumenty.\n\nVzácná shoda nešťastných okolností by teoreticky mohla vést k <color=red>ztrátě diplomu</color> — srdcervoucí událost pro archiváře… a také pro nově promového bobra. Dostupnost úložiště tento riziko výrazně snižuje.\n\nProsím, zajistěte, aby veškerá dokumentace zůstala řádně archivována."
viVN = "Thông báo Cuối cùng – Xử lý Chứng nhận Học thuật\n\nKhi khu định cư của bạn tiếp tục phát triển, bạn có thể sẽ đến giai đoạn mà giáo dục bậc cao trở nên khả thi.\n\nTại giai đoạn đó, những con castor đặc biệt có tài có thể nhận được một <color=green>Chứng chỉ</color> trong lĩnh vực chuyên môn của chúng.\n\nKhông cần phải nói, nhưng các chứng chỉ không được sao chép hoặc làm fancify.\n\nNgay cả khi bạn bằng cách nào đó thuyết phục được các Nghệ sĩ và Nhân bản của bạn thử tiến hành một quy trình như vậy, nó cũng sẽ không phép màu sao chép con castor thực sự sở hữu kiến thức.\n\nDù sao, vẫn nên chuẩn bị nơi lưu trữ đầy đủ cho các tài liệu này.\n\nMột sự trùng hợp hiếm hoi của những hoàn cảnh không may có thể lý thuyết dẫn đến việc <color=red>mất chứng chỉ</color> — một sự kiện đau lòng cho các nhà lưu trữ... và cho con castor vừa tốt nghiệp nữa. Tính khả dụng của việc lưu trữ sẽ giảm bớt đáng kể rủi ro này.\n\nXin hãy đảm bảo rằng tất cả tài liệu vẫn được lưu trữ đúng cách."
trTR = "Son Bildirim – Akademik Sertifika İşlemleri\n\nYerleşiminiz gelişmeye devam ettikçe, nihayetinde yüksek öğrenimin mümkün olduğu bir noktaya ulaşabilirsiniz.\n\nBu aşamada, özellikle yetenekli kunduzlar uzmanlık alanlarında <color=green>Diploma</color> alabilirler.\n\nBu söylenmesi gereksiz, ancak diplomaların kopyalanmaması veya süslenmemesi gerekir.\n\nSanatçılarınızı ve Kopyalistlerinizi böyle bir prosedürü denemeye ikna etseniz bile, bilgiyi gerçekten sahip olan kunduzu sihirli bir şekilde kopyalayamazsınız.\n\nBunu belirtmekte fayda var, bu belgeler için yeterli depolama hazırlamak yine de tavsiye edilir.\n\nNadir bir talihsizlikler bir araya gelmesi, teorik olarak <color=red>diplomanın kaybolmasına</color> yol açabilir — bu da arşivciler için... ve yeni mezun kunduz için yürek burkan bir olaydır. Depolama alanının mevcut olması bu riski güçlü bir şekilde azaltır.\n\nLütfen tüm belgelerin düzgün bir şekilde arşivlendiğinden emin olun."

["Tutorial.BlueprintDuplicationB.BuildCopiystandArtistB.Whitepaws"]
raw = "Greetings.\n\nWe represent the Bureau of Intellectual Property, responsible for ensuring that valuable knowledge is properly documented, duplicated, classified, indexed, and archived.\n\nWe understand that your settlement has recently begun drawing the <color=green>blueprints</color> for a Zipline System.\n\nDue to Regulation 107.33-2, please note that it is strictly forbidden to duplicate original documents under any circumstances.\n\nIt is, however, not illegal to scribble on, spill food and drinks on, eat, or otherwise destroy an original document. Furthermore, according to Regulation 107.33-5, documents altered in such a manner are no longer considered to be the original, and may therefore be copied freely.\n\nAdditionally, most beavers are incapable of focusing their attention on a blueprint that is not adequately fancy and colorful. Discriminating against workers based on their attention span or propensity to eat blueprints has been illegal since Regulation 53.7-4.\n\nTherefore, the now-standard procedure for duplicating, preserving, and using such essential documents is as follows:\n\nConstruct an <color=green>Artist’s Lodge</color> and a <color=green>Copyist’s Lodge</color>.\n\nThe Artist will add the appropriate level of fanciness required for proper use by builders. Do not use the blueprint immediately.\n\nThe Copyist will produce several non-fancy copies of the blueprint. Send these back to the Artist.\n\nRepeat this process until you have enough blueprints to supply all foreseeable construction projects.\n\nConfigure both buildings to work on the Zipline System blueprint.\n\nThis procedure is perfectly legal, as it only violates the spirit of the regulations.\n\nFeel free to retain this correspondence as proof."
status = "normal"
enUS = "Greetings.\n\nWe represent the Bureau of Intellectual Property, responsible for ensuring that valuable knowledge is properly documented, duplicated, classified, indexed, and archived.\n\nWe understand that your settlement has recently begun drawing the <color=green>blueprints</color> for a Zipline System.\n\nDue to Regulation 107.33-2, please note that it is strictly forbidden to duplicate original documents under any circumstances.\n\nIt is, however, not illegal to scribble on, spill food and drinks on, eat, or otherwise destroy an original document. Furthermore, according to Regulation 107.33-5, documents altered in such a manner are no longer considered to be the original, and may therefore be copied freely.\n\nAdditionally, most beavers are incapable of focusing their attention on a blueprint that is not adequately fancy and colorful. Discriminating against workers based on their attention span or propensity to eat blueprints has been illegal since Regulation 53.7-4.\n\nTherefore, the now-standard procedure for duplicating, preserving, and using such essential documents is as follows:\n\nConstruct an <color=green>Artist’s Lodge</color> and a <color=green>Copyist’s Lodge</color>.\n\nThe Artist will add the appropriate level of fanciness required for proper use by builders. Do not use the blueprint immediately.\n\nThe Copyist will produce several non-fancy copies of the blueprint. Send these back to the Artist.\n\nRepeat this process until you have enough blueprints to supply all foreseeable construction projects.\n\nConfigure both buildings to work on the Zipline System blueprint.\n\nThis procedure is perfectly legal, as it only violates the spirit of the regulations.\n\nFeel free to retain this correspondence as proof."
zhCN = "问候。\n\n我们代表知识产权局，负责确保有价值的知识得到妥善文档记录、复制、分类、索引和归档。\n\n我们了解到您所在的定居点最近开始绘制<color=green>索道系统</color>的蓝图。\n\n根据法规107.33-2，请注意在任何情况下严禁复制原始文件。\n\n然而，随意涂鸦、洒食物和饮料、食用或以其他方式破坏原始文件并不违法。此外，根据法规107.33-5，以这种方式修改的文件不再被认为是原始文件，因此可以自由复制。\n\n此外，大多数海狸无法专注于不够华丽和多彩的蓝图。根据法规53.7-4，因注意力跨度或倾向于吃蓝图而对工人进行歧视是违法的。\n\n因此，复制、保存和使用这些重要文件的标准程序如下：\n\n建造<color=green>艺术家小屋</color>和<color=green>抄写员小屋</color>。\n\n艺术家将为建筑工人添加适当的华丽程度。请不要立即使用蓝图。\n\n抄写员将制作几份不华丽的蓝图副本。将这些副本返回给艺术家。\n\n重复这个过程，直到您有足够的蓝图来支持所有可预见的建设项目。\n\n将两座建筑配置为处理索道系统蓝图。\n\n这一过程是完全合法的，因为它仅违反了法规的精神。\n\n请随时保留此信函作为证据。"
zhTW = "問候。\n\n我們代表知識產權局，負責確保有價值的知識得到妥善記錄、複製、分類、編目和存檔。\n\n我們了解到您的定居點最近開始繪製<color=green>滑索系統</color>的藍圖。\n\n根據第107.33-2號法規，請注意，在任何情況下嚴禁複製原始文件。\n\n然而，隨意在原始文件上塗鴉、灑上食物和飲料、食用或以其他方式毀壞原始文件並不違法。此外，根據第107.33-5號法規，以此方式更改的文件將不再被視為原始文件，因此可以自由複製。\n\n另外，大多數海狸無法專注於不夠華麗和多彩的藍圖。根據第53.7-4號法規，基於工作者的注意力持續時間或吃藍圖的傾向而對其進行歧視已經是違法的。\n\n因此，現在標準的複製、保存和使用這種重要文件的程序如下：\n\n建造一座<color=green>藝術家小屋</color>和一座<color=green>抄寫員小屋</color>。\n\n藝術家將為建築工人添加適當的華麗程度。請勿立即使用該藍圖。\n\n抄寫員將製作幾份不華麗的藍圖副本。將這些返回給藝術家。\n\n重複此過程，直到您擁有足夠的藍圖以供所有可預見的建設項目使用。\n\n配置這兩座建築以處理滑索系統的藍圖。\n\n此程序完全合法，因為它只是違反了法規的精神。\n\n如有需要，隨意保留此信件作為證據。"
ruRU = "Приветствуем вас.\n\nМы представляем Бюро интеллектуальной собственности, ответственное за то, чтобы ценное знание было должным образом документировано, дублировано, классифицировано, проиндексировано и архивировано.\n\nМы понимаем, что ваше поселение недавно начало создавать <color=green>чертежи</color> для системы канатной дороги.\n\nСогласно Регламенту 107.33-2, обращаем ваше внимание, что строго запрещено дублировать оригинальные документы при любых обстоятельствах.\n\nОднако не является незаконным исписывать, разливать еду и напитки, есть или иным образом уничтожать оригинальный документ. Более того, в соответствии с Регламентом 107.33-5, документы, измененные подобным образом, больше не считаются оригинальными и могут быть свободно скопированы.\n\nКроме того, большинство бобров не могут сосредоточить свое внимание на чертеже, который недостаточно яркий и красочный. Дискриминация работников по признаку их способности сосредотачиваться или склонности есть чертежи стала незаконной с Регламента 53.7-4.\n\nСледовательно, стандартная процедура дублирования, сохранения и использования таких важных документов выглядит следующим образом:\n\nПостройте <color=green>Лодж художника</color> и <color=green>Лодж писца</color>.\n\nХудожник добавит необходимую степень ф fancy для правильного использования строителями. Не используйте чертеж сразу.\n\nПисец изготовит несколько неярких копий чертежа. Верните их художнику.\n\nПовторяйте этот процесс, пока у вас не будет достаточно чертежей для всех предполагаемых строительных проектов.\n\nНастройте оба здания на работу с чертежом системы канатной дороги.\n\nЭта процедура абсолютно законна, так как она лишь нарушает дух регуляций.\n\nНе стесняйтесь сохранить это сообщение как доказательство."
jaJP = "こんにちは。\n\n私たちは知的財産局を代表しています。私たちの使命は、貴重な知識が適切に文書化、複製、分類、索引付け、そしてアーカイブされることを保証することです。\n\nあなたの集落が最近、ジップラインシステムの<color=green>設計図</color>を描き始めたことを理解しています。\n\n規制107.33-2により、どんな状況でも元の文書を複製することは厳しく禁止されています。\n\nしかし、元の文書に落書きしたり、食べ物や飲み物をこぼしたり、食べたり、あるいはその他の方法で元の文書を破壊することは違法ではありません。さらに、規制107.33-5に従い、そのように改変された文書はもはや元のものとは見なされず、自由にコピーできます。\n\nまた、ほとんどのビーバーは、十分に華やかでカラフルでない設計図に注意を集中させることができません。注意力や設計図を食べる傾向に基づいて労働者を差別することは、規制53.7-4以来違法とされています。\n\nしたがって、このような重要な文書を複製、保存、使用するための現在の標準手順は以下の通りです。\n\n<color=green>アーティストの小屋</color>と<color=green>コピーの小屋</color>を建設してください。\n\nアーティストは、建設者による適切な使用のために必要な程度の華やかさを加えます。設計図をすぐに使用しないでください。\n\nコピーは設計図のいくつかの非華やかなコピーを作成します。これらをアーティストに送り返してください。\n\nすべての予想される建設プロジェクトに必要な十分な設計図が得られるまで、このプロセスを繰り返してください。\n\n両方の建物をジップラインシステムの設計図で作業するように設定してください。\n\nこの手順は完全に合法であり、規制の精神に反するだけです。\n\nこの通信を証拠として保持して構いません。"
frFR = "Salut.\n\nNous représentons le Bureau de la Propriété Intellectuelle, responsable de s'assurer que les connaissances précieuses sont correctement documentées, duplicables, classées, indexées et archivées.\n\nNous comprenons que votre colonie a récemment commencé à dessiner les <color=green>plans</color> pour un Système de Tyrolienne.\n\nEn vertu de la Réglementation 107.33-2, veuillez noter qu'il est strictement interdit de dupliquer des documents originaux sous quelque prétexte que ce soit.\n\nCependant, il n'est pas illégal de gribouiller sur, de renverser de la nourriture et des boissons sur, de manger ou autrement de détruire un document original. De plus, selon la Réglementation 107.33-5, les documents altérés de telle manière ne sont plus considérés comme originaux et peuvent donc être copiés librement.\n\nDe plus, la plupart des castors sont incapables de concentrer leur attention sur un plan qui n'est pas suffisamment élégant et coloré. Discriminer les ouvriers en fonction de leur capacité d'attention ou de leur tendance à manger des plans est illégal depuis la Réglementation 53.7-4.\n\nPar conséquent, la procédure désormais standard pour dupliquer, préserver et utiliser de tels documents essentiels est la suivante :\n\nConstruisez un <color=green>Atelier d'Artiste</color> et un <color=green>Atelier de Copiste</color>.\n\nL'Artiste ajoutera le niveau d'élégance approprié requis pour une utilisation correcte par les bâtisseurs. Ne pas utiliser le plan immédiatement.\n\nLe Copiste produira plusieurs copies non élégantes du plan. Renvoyez-les à l'Artiste.\n\nRépétez ce processus jusqu'à ce que vous ayez suffisamment de plans pour approvisionner tous les projets de construction prévisibles.\n\nConfigurez les deux bâtiments pour travailler sur le plan du Système de Tyrolienne.\n\nCette procédure est parfaitement légale, car elle ne viole que l'esprit des réglementations.\n\nN'hésitez pas à conserver cette correspondance comme preuve."
deDE = "Hallo.\n\nWir vertreten das Büro für geistiges Eigentum, das dafür verantwortlich ist, dass wertvolles Wissen ordnungsgemäß dokumentiert, dupliziert, klassifiziert, indiziert und archiviert wird.\n\nWir verstehen, dass Ihre Siedlung kürzlich damit begonnen hat, die <color=green>Pläne</color> für ein Zipline-System zu zeichnen.\n\nAufgrund der Regelung 107.33-2 möchten wir darauf hinweisen, dass es unter keinen Umständen erlaubt ist, Originaldokumente zu duplizieren.\n\nEs ist jedoch nicht illegal, auf ein Originaldokument zu kritzeln, Lebensmittel und Getränke darauf zu verschütten, es zu essen oder es anderweitig zu zerstören. Darüber hinaus gelten gemäß Regelung 107.33-5 Dokumente, die auf solche Weise verändert wurden, nicht mehr als Original und können daher frei kopiert werden.\n\nZusätzlich sind die meisten Biber nicht in der Lage, ihre Aufmerksamkeit auf einen Plan zu konzentrieren, der nicht ausreichend schick und bunt ist. Diskriminierung von Arbeitern aufgrund ihrer Aufmerksamkeitsspanne oder Neigung, Pläne zu essen, ist seit der Regelung 53.7-4 illegal.\n\nDaher sieht das jetzt Standardverfahren zum Duplizieren, Bewahren und Verwenden solcher wichtigen Dokumente folgendermaßen aus:\n\nBauen Sie eine <color=green> Künstlerhütte </color> und eine <color=green>Kopistenhütte</color>.\n\nDer Künstler wird das erforderliche Maß an Schick hinzufügen, das für die ordnungsgemäße Nutzung durch die Bauarbeiter notwendig ist. Verwenden Sie den Plan nicht sofort.\n\nDer Kopist wird mehrere einfache Kopien des Plans anfertigen. Senden Sie diese zurück an den Künstler.\n\nWiederholen Sie diesen Prozess, bis Sie genügend Pläne haben, um alle voraussehbaren Bauprojekte zu versorgen.\n\nKonfigurieren Sie beide Gebäude, um an dem Plan für das Zipline-System zu arbeiten.\n\nDieses Verfahren ist vollkommen legal, da es nur den Geist der Vorschriften verletzt.\n\nSie können diese Korrespondenz gerne als Nachweis aufbewahren."
plPL = "Witaj.\n\nReprezentujemy Biuro Własności Intelektualnej, odpowiedzialne za zapewnienie, że cenne informacje są odpowiednio dokumentowane, duplikowane, klasyfikowane, indeksowane i archiwizowane.\n\nRozumiemy, że Twoja osada niedawno rozpoczęła sporządzanie <color=green>planów</color> dla systemu Zjeżdżalni.\n\nZgodnie z Regulacją 107.33-2, proszę pamiętać, że kategorycznie zabrania się duplikowania oryginalnych dokumentów w jakichkolwiek okolicznościach.\n\nNiezależnie od tego, nie jest nielegalne bazgrać, rozlewać jedzenie i napoje na oryginalnym dokumencie, jeść go lub w inny sposób niszczyć. Ponadto, zgodnie z Regulacją 107.33-5, dokumenty zmienione w taki sposób nie są już uznawane za oryginały i mogą być zatem kopiowane swobodnie.\n\nDodatkowo, większość bobrów nie jest w stanie skupić swojej uwagi na planie, który nie jest wystarczająco efektowny i kolorowy. Dyskryminacja pracowników na podstawie ich zdolności do skupienia uwagi lub skłonności do jedzenia planów jest nielegalna od Regulacji 53.7-4.\n\nDlatego standardowa procedura duplikowania, przechowywania i użytkowania takich istotnych dokumentów jest następująca:\n\nZbuduj <color=green>Chatę Artysty</color> i <color=green>Chatę Kopiści</color>.\n\nArtysta doda odpowiedni poziom efektowności niezbędny do odpowiedniego użytku przez budowniczych. Nie używaj planu natychmiast.\n\nKopiści wyprodukują kilka nieestetycznych kopii planu. Odeslij je z powrotem do Artysty.\n\nPowtarzaj ten proces, aż będziesz miał wystarczająco dużo planów, aby zaspokoić wszystkie przewidywane projekty budowlane.\n\nSkonfiguruj oba budynki, aby pracowały nad planem systemu Zjeżdżalni.\n\nTa procedura jest całkowicie legalna, ponieważ narusza tylko ducha regulacji.\n\nNie krępuj się zachować tej korespondencji jako dowód."
ptBR = "Saudações.\n\nRepresentamos o Escritório de Propriedade Intelectual, responsável por garantir que conhecimentos valiosos sejam devidamente documentados, duplicados, classificados, indexados e arquivados.\n\nEntendemos que seu assentamento começou recentemente a elaborar os <color=green>planos</color> para um Sistema de Trole.\n\nDevido à Regulamentação 107.33-2, observe que é estritamente proibido duplicar documentos originais sob qualquer circunstância.\n\nNo entanto, não é ilegal rabiscar, derramar comida e bebidas, comer ou de outra forma destruir um documento original. Além disso, de acordo com a Regulamentação 107.33-5, documentos alterados dessa forma não são mais considerados originais e, portanto, podem ser copiadas livremente.\n\nAdicionalmente, a maioria dos castores é incapaz de concentrar sua atenção em um plano que não seja adequadamente elegante e colorido. Discriminar trabalhadores com base em sua capacidade de atenção ou propensão a comer planos é ilegal desde a Regulamentação 53.7-4.\n\nPortanto, o procedimento padrão agora para duplicar, preservar e utilizar tais documentos essenciais é o seguinte:\n\nConstrua uma <color=green>Casa do Artista</color> e uma <color=green>Casa do Copista</color>.\n\nO Artista adicionará o nível apropriado de elegância necessário para o uso adequado pelos construtores. Não utilize o plano imediatamente.\n\nO Copista produzirá várias cópias não elegantes do plano. Envie estas de volta para o Artista.\n\nRepita esse processo até que você tenha planos suficientes para suprir todos os projetos de construção previsíveis.\n\nConfigure ambos os edifícios para trabalhar no plano do Sistema de Trole.\n\nEste procedimento é perfeitamente legal, pois apenas viola o espírito das regulamentações.\n\nSinta-se livre para reter esta correspondência como prova."
koKR = "안녕하세요.\n\n저희는 가치 있는 지식이 제대로 기록되고, 복제되고, 분류되고, 색인화되고, 보관되도록 책임지는 지식 재산국을 대표합니다.\n\n귀하의 정착촌이 최근 <color=green>청사진</color>을 그리기 시작한 것으로 알고 있습니다. 이 청사진은 집라인 시스템에 대한 것입니다.\n\n규정 107.33-2에 따라 원본 문서를 어떤 경우에도 복제하는 것은 엄격히 금지되어 있음을 알려드립니다.\n\n그러나 원본 문서에 낙서를 하거나 음식과 음료를 쏟거나, 먹거나, 기타 방식으로 파괴하는 것은 불법이 아닙니다. 또한 규정 107.33-5에 따르면, 이러한 방식으로 변경된 문서는 더 이상 원본으로 간주되지 않으므로 자유롭게 복사할 수 있습니다.\n\n또한, 대부분의 비버는 적절하게 화려하고 멋진 청사진에만 집중할 수 있습니다. 작업자의 집중 시간이나 청사진을 먹는 경향에 따라 차별하는 것은 규정 53.7-4 이후로 불법입니다.\n\n따라서 이러한 필수 문서를 복제하고 보존하며 사용하는 현재의 표준 절차는 다음과 같습니다:\n\n<color=green>예술가의 오두막</color>과 <color=green>복사자의 오두막</color>을 건설하세요.\n\n예술가는 건축가들이 적절하게 사용하기 위해 필요한 화려함의 수준을 추가할 것입니다. 청사진을 즉시 사용하지 마십시오.\n\n복사자는 청사진의 몇 가지 비화려한 복사본을 제작할 것입니다. 이를 다시 예술가에게 보내세요.\n\n모든 예상되는 건설 프로젝트를 공급할 수 있는 충분한 청사진을 확보할 때까지 이 과정을 반복하세요.\n\n두 건물을 집라인 시스템 청사진 작업을 위해 설정하세요.\n\n이 절차는 규정의 정신만을 위반하므로 완전히 합법입니다.\n\n이 서신은 증거로 보관해 주십시오."
csCZ = "Pozdravy.\n\nReprezentujeme Úřad pro duševní vlastnictví, který je odpovědný za zajištění řádného dokumentování, duplikování, klasifikování, indexování a archivování cenných znalostí.\n\nChápeme, že vaše osada nedávno začala vytvářet <color=green>plány</color> pro systém zipline.\n\nVzhledem k předpisu 107.33-2 si prosím uvědomte, že je přísně zakázáno duplikovat originální dokumenty za jakýchkoli okolností.\n\nNení však nelegální psát na, rozlít jídlo a nápoje na, jíst nebo jinak ničit originální dokument. Dále podle předpisu 107.33-5 dokumenty pozměněné tímto způsobem již nejsou považovány za originály a mohou být tudíž kopírovány volně.\n\nKromě toho většina bobrů není schopna soustředit svou pozornost na plán, který není dostatečně nápaditý a barevný. Diskriminace pracovníků na základě jejich schopnosti udržet pozornost nebo tendence jíst plány byla nelegální od předpisu 53.7-4.\n\nProto je nyní standardní postup pro duplikaci, uchování a používání takových důležitých dokumentů následující:\n\nVytvořte <color=green>Umělcovu chatu</color> a <color=green>Kopírovací chatu</color>.\n\nUmělec přidá odpovídající úroveň nápaditosti potřebnou pro řádné použití staviteli. Nepoužívejte plán ihned.\n\nKopírovac vytvoří několik nenápaditých kopií plánu. Tyto vraťte zpět Umělci.\n\nOpakujte tento proces, dokud nebudete mít dostatek plánů pro všechny předpokládané stavební projekty.\n\nNakonfigurujte obě budovy na práci na plánu systému zipline.\n\nTento postup je naprosto legální, neboť porušuje pouze ducha předpisů.\n\nNeváhejte si tuto korespondenci ponechat jako důkaz."
viVN = "Xin chào.\n\nChúng tôi đại diện cho Cục Sở hữu trí tuệ, chịu trách nhiệm đảm bảo rằng những kiến thức quý giá được tài liệu hóa, sao chép, phân loại, lập chỉ mục và lưu trữ đúng cách.\n\nChúng tôi hiểu rằng khu định cư của bạn gần đây đã bắt đầu vẽ <color=green>bản thiết kế</color> cho Hệ thống Cáp treo.\n\nTheo Quy định 107.33-2, xin lưu ý rằng việc sao chép tài liệu gốc là hoàn toàn bị cấm trong mọi tình huống.\n\nTuy nhiên, không có gì là trái pháp luật khi vẽ nguệch ngoạc, làm đổ thức ăn và đồ uống lên, ăn, hoặc phá hủy một tài liệu gốc theo cách khác. Hơn nữa, theo Quy định 107.33-5, các tài liệu bị thay đổi theo cách đó không còn được coi là bản gốc, do đó có thể được sao chép tự do.\n\nNgoài ra, hầu hết các con castor không có khả năng tập trung sự chú ý vào một bản thiết kế không đủ cầu kỳ và màu sắc. Việc phân biệt đối xử với công nhân dựa trên mức độ chú ý hoặc xu hướng ăn các bản thiết kế đã bị cấm kể từ Quy định 53.7-4.\n\nDo đó, quy trình tiêu chuẩn hiện tại để sao chép, bảo tồn, và sử dụng các tài liệu thiết yếu như vậy là như sau:\n\nXây dựng một <color=green>Nhà Nghệ Sĩ</color> và một <color=green>Nhà Sao Chép</color>.\n\nNhà Nghệ Sĩ sẽ thêm mức độ cầu kỳ phù hợp cần thiết cho việc sử dụng đúng cách bởi các nhà xây dựng. Đừng sử dụng bản thiết kế ngay lập tức.\n\nNhà Sao Chép sẽ sản xuất một số bản sao không cầu kỳ của bản thiết kế. Gửi những bản sao này trở lại cho Nhà Nghệ Sĩ.\n\nLặp lại quy trình này cho đến khi bạn có đủ bản thiết kế để cung cấp cho tất cả các dự án xây dựng có thể thấy trước.\n\nCấu hình cả hai tòa nhà để làm việc trên bản thiết kế Hệ thống Cáp treo.\n\nQuy trình này hoàn toàn hợp pháp, vì nó chỉ vi phạm tinh thần của các quy định.\n\nXin vui lòng giữ lại bức thư này như một bằng chứng."
trTR = "Selamlar.\n\nBiz, değerli bilgilerin düzgün bir şekilde belgelenmesini, kopyalanmasını, sınıflandırılmasını, indekslenmesini ve arşivlenmesini sağlamakla sorumlu Fikri Mülkiyet Bürosunu temsil ediyoruz.\n\nAnladığımız kadarıyla, yerleşiminiz yakın zamanda bir Zipline Sistemi için <color=green>planları</color> çizmeye başladı.\n\nRegülasyon 107.33-2 gereğince, lütfen orijinal belgelerin herhangi bir durumda kopyalanmasının kesinlikle yasak olduğunu not edin.\n\nAncak, orijinal bir belge üzerinde karalama yapmak, yiyecek ve içecek dökmek, yemek veya başka şekilde yok etmek yasadışı değildir. Dahası, Regülasyon 107.33-5'e göre, bu şekilde değiştirilen belgeler artık orijinal olarak kabul edilmez ve dolayısıyla serbestçe kopyalanabilir.\n\nAyrıca, çoğu castor, yeterince şatafatlı ve renkli olmayan bir plan üzerinde dikkatini yoğunlaştıracak kapasitede değildir. İşçileri dikkat sürelerine veya planları yeme eğilimlerine göre ayırt etmek, Regülasyon 53.7-4'ten bu yana yasadışı olmuştur.\n\nBu nedenle, bu tür temel belgeleri kopyalama, saklama ve kullanma prosedürü artık standart hale gelmiştir:\n\nBir <color=green>Sanatçı Kulübesi</color> ve bir <color=green>Kopyacı Kulübesi</color> inşa edin.\n\nSanatçı, inşaatçılar tarafından uygun şekilde kullanılması için gerekli şatafat seviyesini ekleyecektir. Planı hemen kullanmayın.\n\nKopyacı, planın birkaç basit kopyasını üretecektir. Bunları tekrar Sanatçıya gönderin.\n\nTüm öngörülebilir inşaat projeleri için yeterince planınız olana kadar bu süreci tekrar edin.\n\nHer iki binayı da Zipline Sistemi planı üzerinde çalışacak şekilde yapılandırın.\n\nBu prosedür tamamen yasaldır, çünkü yalnızca düzenlemelerin ruhunu ihlal etmektedir.\n\nBu yazışmayı kanıt olarak saklamaktan çekinmeyin."

["Tutorial.BlueprintDuplicationB.Scrolldisplay_Ziplinesystem.Whitepaws"]
raw = "Follow-up Notice – Blueprint Storage Compliance\n\nNow that the duplication process is underway, we must address the matter of proper document storage.\n\nArchitectural and engineering plans are considered cultural artifacts and must therefore be displayed in a manner appropriate to their importance.\n\nConstruct a Scroll Display.\n\nMost documents — and particularly blueprints — should be stored in such displays to ensure correct preservation, classification, and public admiration.\n\nPlease note that it is generally pointless to keep both <color=green>fancy</color> and <color=red>non-fancy</color> versions of the same blueprint. Maintaining redundant document variants only complicates cataloging procedures and irritates archivists.\n\nConfigure the Scroll Display to store Fancy Zipline System Blueprints.\n\nIf you still possess non-fancy copies, simply allow the Artist to continue working until the situation corrects itself.\n\nOnce the appropriate level of fanciness has been achieved, the document may be safely archived.\n\nProper storage ensures that your work may be admired by future generations — and, more importantly, by auditors."
status = "normal"
enUS = "Follow-up Notice – Blueprint Storage Compliance\n\nNow that the duplication process is underway, we must address the matter of proper document storage.\n\nArchitectural and engineering plans are considered cultural artifacts and must therefore be displayed in a manner appropriate to their importance.\n\nConstruct a Scroll Display.\n\nMost documents — and particularly blueprints — should be stored in such displays to ensure correct preservation, classification, and public admiration.\n\nPlease note that it is generally pointless to keep both <color=green>fancy</color> and <color=red>non-fancy</color> versions of the same blueprint. Maintaining redundant document variants only complicates cataloging procedures and irritates archivists.\n\nConfigure the Scroll Display to store Fancy Zipline System Blueprints.\n\nIf you still possess non-fancy copies, simply allow the Artist to continue working until the situation corrects itself.\n\nOnce the appropriate level of fanciness has been achieved, the document may be safely archived.\n\nProper storage ensures that your work may be admired by future generations — and, more importantly, by auditors."
zhCN = "后续通知 – 蓝图存储合规性\n\n随着复制过程的进行，我们必须解决正确的文件存储问题。\n\n建筑和工程计划被视为文化遗产，因此必须以适当的方式展示，以符合其重要性。\n\n构建一个卷轴展示架。\n\n大多数文件—尤其是蓝图—应该存放在这样的展示架中，以确保正确的保存、分类和公众欣赏。\n\n请注意，通常保留同一蓝图的 <color=green>精美</color> 和 <color=red>非精美</color> 版本是毫无意义的。维护冗余文件变体只会使编目程序复杂化并让档案管理员感到烦恼。\n\n将卷轴展示架配置为存储精美的滑索系统蓝图。\n\n如果您仍然拥有非精美的副本，只需让艺术家继续工作，直到情况自我修正。\n\n一旦达到适当的精美程度，文件就可以安全存档。\n\n正确的存储确保您的作品能够被未来的世代欣赏—更重要的是，被审计员欣赏。"
zhTW = "後續通知 – 藍圖存儲合規性\n\n現在重複過程已經開始，我們必須處理正確的文件存儲事宜。\n\n建築和工程計劃被視為文化文物，因此必須以符合其重要性的方式展示。\n\n建造一個卷軸展示架。\n\n大多數文件 — 特別是藍圖 — 應該保存在這種展示架中，以確保正確的保存、分類和公眾欣賞。\n\n請注意，儲存同一藍圖的 <color=green>華麗</color> 和 <color=red>非華麗</color> 版本通常是沒有意義的。維護冗餘的文件變體只會使編目程序變得複雜並惹惱檔案管理員。\n\n將卷軸展示架配置為存儲華麗的滑索系統藍圖。\n\n如果你仍然擁有非華麗的複本，請讓藝術家繼續工作，直到情況自我修正。\n\n一旦達到適當的華麗程度，該文件可以安全存檔。\n\n正確的存儲確保你的作品能夠受到未來世代的欣賞 — 更重要的是，能夠受到審計員的欣賞。"
ruRU = "Уведомление о продолжении – Соблюдение требований к хранению чертежей\n\nТеперь, когда процесс дублирования запущен, мы должны рассмотреть вопрос надлежащего хранения документов.\n\nАрхитектурные и инженерные планы считаются культурными артефактами и, следовательно, должны храниться таким образом, который соответствует их важности.\n\nПостройте свиток для отображения.\n\nБольшинство документов — и в частности чертежей — следует хранить в таких свитках, чтобы обеспечить правильное сохранение, классификацию и общественное восхищение.\n\nОбратите внимание, что обычно нет смысла хранить как <color=green>роскошные</color>, так и <color=red>недорогие</color> версии одного и того же чертежа. Поддержание избыточных вариантов документов только усложняет процедуры каталогизации и раздражает архивистов.\n\nНастройте свиток для хранения роскошных чертежей системы зиплайнов.\n\nЕсли у вас все еще есть недорогие копии, просто позвольте Художнику продолжать работать, пока ситуация не исправится.\n\nКак только соответствующий уровень роскоши будет достигнут, документ может быть безопасно архивирован.\n\nПравильное хранение гарантирует, что ваша работа сможет быть оценена будущими поколениями — и, что более важно, аудиторами."
jaJP = "フォローアップ通知 – 設計図の保管遵守\n\n複製プロセスが進行中であるため、適切な文書保管について取り組む必要があります。\n\n建築および工学の計画は文化的遺物と見なされ、その重要性に応じた方法で展示されなければなりません。\n\nスクロールディスプレイを構築してください。\n\nほとんどの文書—特に設計図—は、適切な保存、分類、そして一般の賞賛を確保するために、このようなディスプレイに保管されるべきです。\n\n同じ設計図の<color=green>高級版</color>と<color=red>普通版</color>の両方を保持することは、一般的に無意味であることに注意してください。冗長な文書のバリエーションを維持することは、カタログ手続きだけを複雑にし、アーカイブ担当者を苛立たせます。\n\nスクロールディスプレイを設定して、高級なジップラインシステムの設計図を保管してください。\n\nまだ普通版のコピーを持っている場合は、アーティストが作業を続けられるようにしましょう。状況が自ら改善されるまで待ってください。\n\n適切なレベルの高級感が達成されれば、その文書は安全にアーカイブされます。\n\n適切な保管は、あなたの作品が未来の世代、そしてより重要なのは監査官に賞賛されることを保証します。"
frFR = "Avis de suivi – Conformité au stockage des plans\n\nMaintenant que le processus de duplication est en cours, nous devons aborder la question du stockage approprié des documents.\n\nLes plans architecturaux et d'ingénierie sont considérés comme des artefacts culturels et doivent donc être exposés d'une manière appropriée à leur importance.\n\nConstruisez un Affichage à Défilement.\n\nLa plupart des documents — et en particulier les plans — doivent être stockés dans ces affichages pour garantir une bonne préservation, une classification correcte et une admiration publique.\n\nVeuillez noter qu'il est généralement inutile de conserver à la fois des versions <color=green>élégantes</color> et <color=red>non élégantes</color> du même plan. Maintenir des variantes de documents redondantes ne fait qu'encombrer les procédures de catalogage et irriter les archivistes.\n\nConfigurez l'Affichage à Défilement pour stocker les Plans du Système de Tyrolienne Élégants.\n\nSi vous possédez encore des copies non élégantes, laissez simplement l'Artiste continuer à travailler jusqu'à ce que la situation se corrige d'elle-même.\n\nUne fois le niveau approprié d'élégance atteint, le document peut être archivé en toute sécurité.\n\nUn stockage approprié garantit que votre travail pourra être admiré par les générations futures — et, plus important encore, par les auditeurs."
deDE = "Nachricht zur Nachverfolgung – Einhaltung der Lagerung von Blaupausen\n\nJetzt, da der Duplizierungsprozess im Gange ist, müssen wir das Thema der ordnungsgemäßen Dokumentenspeicherung ansprechen.\n\nArchitektonische und technische Pläne gelten als kulturelle Artefakte und müssen daher auf eine Weise angezeigt werden, die ihrer Bedeutung angemessen ist.\n\nKonstruiere eine Schriftrolle-Display.\n\nDie meisten Dokumente – insbesondere Blaupausen – sollten in solchen Displays aufbewahrt werden, um eine korrekte Erhaltung, Klassifizierung und öffentliche Bewunderung zu gewährleisten.\n\nBitte beachten Sie, dass es im Allgemeinen sinnlos ist, sowohl <color=green>anspruchsvolle</color> als auch <color=red>einfachere</color> Versionen derselben Blaupause aufzubewahren. Das Beibehalten redundanter Dokumentenversionen kompliziert nur die Katalogisierungsverfahren und ärgert die Archivare.\n\nKonfigurieren Sie das Schriftrolle-Display, um anspruchsvolle Blaupausen des Zipline-Systems zu lagern.\n\nWenn Sie noch einfache Exemplare besitzen, lassen Sie einfach den Künstler weiterarbeiten, bis sich die Situation von selbst korrigiert.\n\nSobald das entsprechende Maß an Anspruch erreicht ist, kann das Dokument sicher archiviert werden.\n\nEine ordnungsgemäße Lagerung stellt sicher, dass Ihre Arbeit von zukünftigen Generationen bewundert werden kann – und, noch wichtiger, von Prüfern."
plPL = "Powiadomienie o Kontroli – Zgodność z Magazynowaniem Planów\n\nTeraz, gdy proces duplikacji jest w toku, musimy zająć się kwestią prawidłowego przechowywania dokumentów.\n\nPlany architektoniczne i inżynieryjne uznawane są za artefakty kulturowe i dlatego muszą być wyświetlane w sposób odpowiedni do ich znaczenia.\n\nZbuduj Wyświetlacz Skrolowy.\n\nWiększość dokumentów — a szczególnie plany — powinna być przechowywana w takich wyświetlaczach, aby zapewnić odpowiednie zachowanie, klasyfikację i podziw publiczności.\n\nProszę zauważyć, że zazwyczaj nie ma sensu przechowywać zarówno <color=green>eleganckich</color>, jak i <color=red>nieeleganckich</color> wersji tego samego planu. Utrzymywanie redundantnych wariantów dokumentów tylko komplikuje procedury katalogowania i irytuje archiwistów.\n\nSkonfiguruj Wyświetlacz Skrolowy, aby przechowywał Plany Systemu Lin Zjazdowych w wersji Eleganckiej.\n\nJeśli nadal posiadasz nieeleganckie kopie, po prostu pozwól Artystowi kontynuować pracę, aż sytuacja się poprawi.\n\nGdy odpowiedni poziom elegancji zostanie osiągnięty, dokument może być bezpiecznie zarchiwizowany.\n\nPrawidłowe przechowywanie zapewnia, że twoja praca będzie mogła być podziwiana przez przyszłe pokolenia — a co ważniejsze, przez audytorów."
ptBR = "Aviso de Acompanhamento – Conformidade do Armazenamento de Projetos\n\nAgora que o processo de duplicação está em andamento, devemos abordar a questão do armazenamento adequado dos documentos.\n\nOs planos arquitetônicos e de engenharia são considerados artefatos culturais e, portanto, devem ser exibidos de maneira apropriada à sua importância.\n\nConstrua um Display de Pergaminho.\n\nA maioria dos documentos — e particularmente os projetos — deve ser armazenada nesses displays para garantir a preservação, classificação e admiração pública corretas.\n\nPor favor, note que geralmente é inútil manter versões <color=green>chiques</color> e <color=red>não chiques</color> do mesmo projeto. Manter variantes redundantes de documentos apenas complica os procedimentos de catalogação e irrita os arqueólogos.\n\nConfigure o Display de Pergaminho para armazenar Projetos do Sistema de Tirolesa Chiques.\n\nSe você ainda possuir cópias não chiques, simplesmente permita que o Artista continue trabalhando até que a situação se resolva.\n\nUma vez que o nível apropriado de chiqueza tenha sido alcançado, o documento pode ser arquivado com segurança.\n\nO armazenamento adequado garante que seu trabalho possa ser admirado por gerações futuras — e, mais importante, por auditores."
koKR = "후속 공지 – 청사진 저장 준수\n\n중복 프로세스가 진행 중인 지금, 우리는 적절한 문서 저장의 문제를 다루어야 합니다.\n\n건축 및 엔지니어링 계획은 문화 유산으로 간주되므로 그 중요성에 맞게 전시되어야 합니다.\n\n스크롤 디스플레이를 건설하십시오.\n\n대부분의 문서 — 특히 청사진 — 는 올바른 보존, 분류 및 대중의 찬탄을 보장하기 위해 이러한 디스플레이에 저장되어야 합니다.\n\n같은 청사진의 <color=green>화려한</color> 버전과 <color=red>비화려한</color> 버전을 모두 보유하는 것은 일반적으로 무의미하다는 점에 유의하십시오. 중복 문서 변형을 유지하는 것은 분류 절차를 복잡하게 하고 아카이브 담당자를 짜증스럽게 만듭니다.\n\n스크롤 디스플레이를 설정하여 화려한 집라인 시스템 청사진을 저장하십시오.\n\n비화려한 복사본을 여전히 보유하고 있다면, 단순히 아티스트가 작업을 계속하도록 허용하여 상황이 스스로 해결되도록 하십시오.\n\n적절한 화려함의 수준에 도달하면 문서를 안전하게 아카이브할 수 있습니다.\n\n적절한 저장은 귀하의 작업이 미래 세대 — 더 중요한 것은 감사자들에 의해 — 존경받을 수 있도록 보장합니다."
csCZ = "Připomínka – Soulad s uložením plánů\n\nNyní, když probíhá proces duplikace, musíme se zabývat otázkou správného ukládání dokumentů.\n\nArchitektonické a inženýrské plány jsou považovány za kulturní artefakty a musí být proto vystaveny způsobem odpovídajícím jejich významu.\n\nVyrobte Scroll Display.\n\nVětšina dokumentů — a zejména plánů — by měla být uložena v takových vystaveních, aby bylo zajištěno správné zachování, klasifikace a veřejné obdivování.\n\nVezměte prosím na vědomí, že je obecně zbytečné uchovávat jak <color=green>luxusní</color>, tak <color=red>neluxusní</color> verze stejného plánu. Udržování nadbytečných variant dokumentů pouze komplikuje katalogizační postupy a rozčiluje archiváře.\n\nNakonfigurujte Scroll Display pro ukládání luxusních plánů Zipline systemu.\n\nPokud stále máte neluxusní kopie, jednoduše nechte umělce, aby dál pracoval, dokud se situace sama nevyřeší.\n\nJakmile bude dosaženo potřebné úrovně luxusu, může být dokument bezpečně archivován.\n\nSprávné ukládání zajišťuje, že vaše práce může být obdivována budoucími generacemi — a co je důležitější, auditory."
viVN = "Thông báo tiếp theo - Tuân thủ Lưu trữ Bản thiết kế\n\nGiờ đây, khi quy trình sao chép đang diễn ra, chúng ta cần giải quyết vấn đề lưu trữ tài liệu đúng cách.\n\nCác kế hoạch kiến trúc và kỹ thuật được coi là di sản văn hóa và do đó phải được trưng bày theo cách phù hợp với tầm quan trọng của chúng.\n\nXây dựng một màn hình cuộn.\n\nHầu hết các tài liệu - và đặc biệt là bản thiết kế - nên được lưu trữ trong các màn hình này để đảm bảo bảo quản, phân loại và ngưỡng mộ công cộng đúng cách.\n\nXin lưu ý rằng việc giữ cả phiên bản <color=green>trang trí</color> và <color=red>không trang trí</color> của cùng một bản thiết kế là không cần thiết. Việc duy trì các phiên bản tài liệu dư thừa chỉ làm phức tạp quy trình lập hồ sơ và gây khó chịu cho các nhà lưu trữ.\n\nCấu hình màn hình cuộn để lưu trữ các bản thiết kế Hệ thống Zipline Trang trí.\n\nNếu bạn vẫn giữ các bản sao không trang trí, chỉ cần cho Nghệ sĩ tiếp tục làm việc cho đến khi tình hình tự điều chỉnh.\n\nMột khi mức độ trang trí phù hợp đã đạt được, tài liệu có thể được lưu trữ an toàn.\n\nLưu trữ đúng cách đảm bảo rằng công việc của bạn có thể được ngưỡng mộ bởi các thế hệ sau - và, quan trọng hơn, bởi các nhà kiểm toán."
trTR = "Takip Bildirimi – Plan Depolama Uygunluğu\n\nArtık çoğaltma işlemi başladı, belgelerin düzgün depolanması meselesini ele almalıyız.\n\nMimari ve mühendislik planları kültürel eserler olarak kabul edilir ve bu nedenle önemlerine uygun bir şekilde sergilenmelidir.\n\nBir Parşömen Ekranı inşa edin.\n\nÇoğu belge — özellikle de planlar — doğru korunma, sınıflandırma ve halka sunulma sağlamak için bu tür ekranlarda saklanmalıdır.\n\nAynı planın hem <color=green>şık</color> hem de <color=red>şık olmayan</color> versiyonlarını tutmanın genelde anlamsız olduğunu lütfen unutmayın. Gereksiz belge varyantlarını sürdürmek, kataloglama sürecini karmaşıklaştırır ve arşivcileri rahatsız eder.\n\nParşömen Ekranı’nı Şık Zipline Sistemi Planları depolamak üzere yapılandırın.\n\nEğer hala şık olmayan kopyalarınız varsa, durum kendiliğinden düzelene kadar sanatçının çalışmaya devam etmesine izin verin.\n\nGerekli şıklık seviyesine ulaşıldığında, belge güvenle arşivlenebilir.\n\nDoğru depolama, çalışmalarınızın gelecekteki nesiller tarafından — ve daha da önemlisi, denetçiler tarafından — hayranlıkla incelenmesini sağlar."

["Tutorial.BlueprintDuplicationB.DiplomasTextB.Whitepaws"]
raw = "Final Notice – Academic Certification Handling\n\nAs your settlement continues to develop, you may eventually reach the point where higher education becomes available.\n\nAt that stage, particularly gifted beavers may obtain a <color=green>Diploma</color> in their field of specialization.\n\nIt should go without saying, but diplomas must not be duplicated or fancyfied.\n\nEven if you somehow convinced your Artists and Copyists to attempt such a procedure, it would not magically duplicate the beaver who actually possesses the knowledge.\n\nThat said, it is still advisable to prepare adequate storage for these documents.\n\nA rare confluence of unfortunate circumstances could theoretically lead to a <color=red>diploma being lost</color> — a heartbreaking event for the archivists…and for the newly graduated beaver as well. Availability of storage strongly reduces this risk.\n\nPlease ensure that all documentation remains properly archived."
status = "normal"
enUS = "Final Notice – Academic Certification Handling\n\nAs your settlement continues to develop, you may eventually reach the point where higher education becomes available.\n\nAt that stage, particularly gifted beavers may obtain a <color=green>Diploma</color> in their field of specialization.\n\nIt should go without saying, but diplomas must not be duplicated or fancyfied.\n\nEven if you somehow convinced your Artists and Copyists to attempt such a procedure, it would not magically duplicate the beaver who actually possesses the knowledge.\n\nThat said, it is still advisable to prepare adequate storage for these documents.\n\nA rare confluence of unfortunate circumstances could theoretically lead to a <color=red>diploma being lost</color> — a heartbreaking event for the archivists…and for the newly graduated beaver as well. Availability of storage strongly reduces this risk.\n\nPlease ensure that all documentation remains properly archived."
zhCN = "最终通知 – 学术证书处理\n\n随着你的定居点不断发展，你可能最终会达到高等教育可用的阶段。\n\n在那个阶段，特别优秀的海狸可能会获得他们专业领域的<color=green>文凭</color>。\n\n这不言而喻，文凭不得复制或华丽化。\n\n即使你设法说服你的艺术家和抄写员尝试这样的程序，也不会魔法般地复制出真正拥有知识的海狸。\n\n话虽如此，仍然建议为这些文件准备充足的存储空间。\n\n罕见的不幸情境交汇理论上可能导致<color=red>文凭丢失</color>——这对档案管理员来说是个令人心碎的事件……对新毕业的海狸来说也是一样。充足的存储可大幅降低这一风险。\n\n请确保所有文件得到妥善归档。"
zhTW = "最終通知 – 學術證書處理\n\n隨著你的定居點不斷發展，最終你可能會達到高等教育可用的階段。\n\n在這一階段，特別優秀的海狸可以在他們的專業領域獲得<color=green>文憑</color>。\n\n這應該不言而喻，但文憑不得複製或華麗化。\n\n即使你以某種方式說服了你的藝術家和抄寫員嘗試這樣的程序，它也不會神奇地複製出實際擁有知識的海狸。\n\n話雖如此，仍然建議為這些文件準備足夠的儲存空間。\n\n理論上，一系列不幸的情況可能會導致<color=red>文憑丟失</color> — 對於檔案管理員來說是個心碎的事件……對於剛畢業的海狸也是如此。儲存空間的可用性會大幅減少這個風險。\n\n請確保所有文檔都妥善存檔。"
ruRU = "Предупреждение – Обработка Академических Сертификатов\n\nПо мере того как ваше поселение продолжает развиваться, вы можете в конечном итоге достичь момента, когда высшее образование станет доступным.\n\nНа этом этапе особенно одаренные бобры могут получить <color=green>Диплом</color> в своей области специализации.\n\nЭто должно быть очевидным, но дипломы не должны дублироваться или украшаться.\n\nДаже если вам каким-то образом удастся убедить ваших Художников и Копиистов попытаться провести такую процедуру, это не приведет к волшебному дублированию бобра, который на самом деле владеет знаниями.\n\nТем не менее, рекомендуется подготовить достаточное хранилище для этих документов.\n\nРедкое сочетание неблагоприятных обстоятельств теоретически может привести к <color=red>потере диплома</color> — сердце разрывающее событие для архивистов... и для только что выпущенного бобра тоже. Наличие хранилища значительно снижает этот риск.\n\nПожалуйста, убедитесь, что вся документация остается правильно архивированной."
jaJP = "最終通知 - 学位証明書の取り扱い\n\nあなたの定住地が成長するにつれて、最終的には高等教育が利用可能になる段階に達することがあります。\n\nその段階では、特に優れたビーバーが専門分野の<color=green>学位証明書</color>を取得することができます。\n\n言うまでもありませんが、学位証明書は複製したり装飾したりしてはいけません。\n\nたとえあなたがアーティストやコピーライターにそのような手続きを試みさせたとしても、実際に知識を持っているビーバーを魔法のように複製することはできません。\n\nとはいえ、これらの文書のために十分な保管場所を準備することをお勧めします。\n\n稀な不運の重なりが、理論的には<color=red>学位証明書が失われる</color>事態を引き起こす可能性があります — これはアーカイビストにとっても…新たに卒業したビーバーにとっても心痛む出来事です。保管スペースの確保はこのリスクを大幅に低減します。\n\nすべての文書が適切にアーカイブされていることを確認してください。"
frFR = "Avis Final – Gestion de la Certification Académique\n\nAlors que votre établissement continue de se développer, vous pourriez finalement atteindre le point où l'enseignement supérieur devient disponible.\n\nÀ ce stade, les castors particulièrement doués peuvent obtenir un <color=green>Diplôme</color> dans leur domaine de spécialisation.\n\nIl va sans dire, mais les diplômes ne doivent pas être duplicables ou embellis.\n\nMême si vous parvenez à convaincre vos Artistes et Copistes d'essayer une telle procédure, cela ne dupliquera pas magiquement le castor qui possède réellement les connaissances.\n\nCela dit, il est toujours conseillé de préparer un stockage adéquat pour ces documents.\n\nUne rare confluence de circonstances malheureuses pourrait théoriquement conduire à un <color=red>diplôme perdu</color> — un événement déchirant pour les archivistes… et pour le castor récemment diplômé également. La disponibilité de stockage réduit fortement ce risque.\n\nVeuillez vous assurer que toute la documentation reste correctement archivée."
deDE = "Finale Mitteilung – Umgang mit akademischen Zertifikaten\n\nWenn sich Ihre Siedlung weiterentwickelt, könnten Sie schließlich an den Punkt gelangen, an dem eine höhere Bildung verfügbar wird.\n\nIn dieser Phase können besonders begabte Biber ein <color=green>Diplom</color> in ihrem Fachgebiet erwerben.\n\nEs versteht sich von selbst, dass Diplome nicht dupliziert oder verfeinert werden dürfen.\n\nSelbst wenn Sie Ihre Künstler und Schreiber irgendwie überzeugen könnten, ein solches Verfahren zu versuchen, würde es nicht magisch den Biber duplizieren, der tatsächlich über das Wissen verfügt.\n\nTrotzdem ist es ratsam, ausreichenden Stauraum für diese Dokumente vorzubereiten.\n\nEine seltene Ansammlung unglücklicher Umstände könnte theoretisch dazu führen, dass ein <color=red>Diplom verloren geht</color> – ein herzzerreißendes Ereignis für die Archivare … und auch für den frisch graduierten Biber. Die Verfügbarkeit von Stauraum verringert dieses Risiko erheblich.\n\nBitte stellen Sie sicher, dass alle Dokumente ordnungsgemäß archiviert bleiben."
plPL = "Ostateczne powiadomienie – Obsługa Certyfikatów Akademickich\n\nW miarę rozwoju Twojej osady możesz w końcu dojść do punktu, w którym dostępna stanie się wyższa edukacja.\n\nNa tym etapie szczególnie uzdolnione bobry mogą uzyskać <color=green>dyplom</color> w swojej dziedzinie specjalizacji.\n\nNie trzeba tego mówić, ale dyplomy nie mogą być duplikowane ani upiększane.\n\nNawet jeśli jakoś przekonałbyś swoich Artystów i Kopistów do podjęcia takiej procedury, nie spowodowałoby to magicznego skopiowania bobra, który rzeczywiście posiada wiedzę.\n\nMimo to, nadal zaleca się, aby przygotować odpowiednie miejsce do przechowywania tych dokumentów.\n\nRzadkie zbiegi niefortunnych okoliczności teoretycznie mogą prowadzić do <color=red>zagubienia dyplomu</color> — bolesne wydarzenie dla archiwistów… i dla świeżo upieczonego bobra również. Dostępność miejsca do przechowywania znacznie zmniejsza to ryzyko.\n\nProszę upewnić się, że wszystkie dokumenty są właściwie archiwizowane."
ptBR = "Aviso Final – Manipulação de Certificação Acadêmica\n\nÀ medida que seu assentamento continua a se desenvolver, você pode eventualmente alcançar o ponto em que a educação superior se torna disponível.\n\nNesse estágio, castores particularmente talentosos podem obter um <color=green>Diploma</color> em sua área de especialização.\n\nDeve ser óbvio, mas os diplomas não devem ser duplicados ou enfeitados.\n\nMesmo que você somehow convença seus Artistas e Copistas a tentar tal procedimento, isso não irá duplicar magicamente o castor que realmente possui o conhecimento.\n\nDito isso, ainda é aconselhável preparar um armazenamento adequado para esses documentos.\n\nUma rara confluência de circunstâncias infelizes poderia teoricamente levar a um <color=red>diploma sendo perdido</color> — um evento devastador para os Arquivistas… e também para o castor recém-formado. A disponibilidade de armazenamento reduz fortemente esse risco.\n\nPor favor, assegure-se de que toda a documentação permaneça devidamente arquivada."
koKR = "최종 통지 – 학위 인증 처리\n\n정착지가 계속 발전함에 따라, 궁극적으로 고등 교육이 가능해질 수 있습니다.\n\n그 단계에서 특히 재능 있는 비버는 자신의 전문 분야에서 <color=green>졸업장</color>을 취득할 수 있습니다.\n\n말할 필요도 없지만, 졸업장은 복사되거나 화려하게 변형되어서는 안 됩니다.\n\n어떻게든 아티스트와 복사자들을 설득하여 그런 절차를 시도하도록 했다 하더라도, 실제로 지식을 가진 비버를 마법처럼 복제할 수는 없습니다.\n\n그렇긴 해도, 이러한 문서를 위한 적절한 저장소를 마련하는 것이 여전히 권장됩니다.\n\n불행한 상황들이 희귀하게 겹치면 이론적으로는 <color=red>졸업장이 분실되는</color> 상황이 발생할 수 있습니다 — 기록 보관자들에게는 마음 아픈 사건이며, 새로 졸업한 비버에게도 마찬가지입니다. 저장소의 가용성은 이 위험을 크게 줄여줍니다.\n\n모든 문서가 적절히 보관되도록 해주시기 바랍니다."
csCZ = "Konečné upozornění – Zpracování akademických certifikátů\n\nJak se vaše osídlení nadále rozvíjí, můžete nakonec dosáhnout bodu, kdy se stane dostupné vyšší vzdělání.\n\nV této fázi mohou zvlášť nadaní bobři získat <color=green>Diplom</color> ve svém oboru specializace.\n\nMělo by být zřejmé, že diplomy nesmí být kopírovány ani zdobeny.\n\nI když byste nějakým způsobem přesvědčili své umělce a opisovače, aby se pokusili o takový postup, nezazáří to magicky ve vzniku bobra, který skutečně vlastní znalosti.\n\nTo však znamená, že je stále doporučeno připravit adekvátní sklad pro tyto dokumenty.\n\nVzácná shoda nešťastných okolností by teoreticky mohla vést ke <color=red>ztrátě diplomu</color> — srdcervoucí událost pro archiváře… a také pro nově vystudovaného bobra. Dostupnost skladu toto riziko výrazně snižuje.\n\nProsím, zajistěte, že veškerá dokumentace zůstává řádně archivována."
viVN = "Thông báo cuối cùng - Xử lý chứng nhận học thuật\n\nKhi khu định cư của bạn tiếp tục phát triển, bạn có thể sẽ đến giai đoạn mà giáo dục đại học trở nên khả thi.\n\nVào thời điểm đó, những con rái ở đặc biệt xuất sắc có thể nhận được một <color=green>Chứng chỉ</color> trong lĩnh vực chuyên môn của chúng.\n\nKhông cần phải nói, nhưng các chứng chỉ không được sao chép hoặc làm rối.\n\nNgay cả khi bạn có thể thuyết phục các Nghệ sĩ và Nhân bản của bạn thử nghiệm một quy trình như vậy, nó sẽ không tự động sao chép được con rái có kiến thức thực sự.\n\nDẫu vậy, vẫn nên chuẩn bị nơi lưu trữ thích hợp cho những tài liệu này.\n\nMột sự kết hợp hiếm hoi của những hoàn cảnh đáng tiếc có thể lý thuyết dẫn đến việc <color=red>chứng chỉ bị mất</color> — một sự kiện thương tâm cho các nhà lưu trữ…và cho con rái mới tốt nghiệp nữa. Việc có sẵn kho lưu trữ giảm thiểu rủi ro này rất nhiều.\n\nHãy đảm bảo rằng tất cả tài liệu được lưu trữ đúng cách."
trTR = "Son İkaz – Akademik Sertifika İşlemleri\n\nYerleşiminiz gelişmeye devam ettikçe, nihayetinde yüksek öğrenimin mevcut hale geldiği noktaya ulaşabilirsiniz.\n\nBu aşamada, özellikle yetenekli kunduzlar uzmanlık alanlarında <color=green>Diploma</color> alabilirler.\n\nSöylemeye gerek yok, ancak diplomaların kopyalanması veya süslenmesi kesinlikle yasaktır.\n\nSanatçılarınızı ve Yazarlarınızı böyle bir işlem yapmaya ikna etseniz bile, aslında bilgiye sahip olan kunduzu sihirli bir şekilde kopyalayamazsınız.\n\nBunu göz önünde bulundurursak, bu belgeler için yeterli depolama alanı hazırlamanız yine de önerilir.\n\nNadir bir talihsizlikler birleşimi teorik olarak <color=red>bir diplomanın kaybolmasına</color> yol açabilir — bu, arşivciler için ve yeni mezun kunduz için de yürek burkan bir olaydır. Depolama alanının varlığı bu riski önemli ölçüde azaltır.\n\nTüm belgelerin düzgün bir şekilde arşivlendiğinden emin olun."

