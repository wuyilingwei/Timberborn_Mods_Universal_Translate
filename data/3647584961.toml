csCZ = "Společný prostor pro mnoho bobrů, kde se mohou setkat a umýt po dlouhém pracovním dni."
viVN = "Một không gian chung cho nhiều chú rái cá gặp gỡ và tắm rửa sau một ngày làm việc dài."
trTR = "Uzun bir çalışma gününden sonra birçok kunduzun bir araya gelip yıkanabileceği ortak bir alan."

["Lapantouflemagic.RiverBath.FlavorDescription"]
raw = "\"I want the pink bucket!\" \"No it's mine, I always use it\"\n -Typical kit squabbling"
status = "normal"
enUS = "\"I want the pink bucket!\" \"No it's mine, I always use it\" - Typical kit squabbling"
zhCN = "“我想要那只粉色水桶！” “不，这是我的，我一直在用它”  \n- 典型的孩子吵架"
zhTW = "「我想要粉紅色的水桶！」 「不，這是我的，我一直在用它」 -典型的孩子爭吵"
ruRU = "Я хочу розовый ведро!\" \"Нет, это мое, я всегда им пользуюсь\" - \"Типичные ссоры между детьми"
jaJP = "「ピンクのバケツが欲しい！」 「いや、それは僕のだ。いつも使っているんだ」 -典型的な子供の争い"
frFR = "«Je veux le seau rose !» «Non, c'est à moi, je l'utilise toujours.» -«Disputes typiques de kit»"
deDE = "\"Ich will den rosa Eimer!\" \"Nein, er gehört mir, ich benutze ihn immer.\" -Typisches Kit-Zanken"
plPL = "Chcę różowy wiaderek!\" \"Nie, to moje, zawsze z niego korzystam\" - \"Typowe kłótnie w zestawie"
ptBR = "Eu quero o balde rosa!\" \"Não, é meu, eu sempre uso ele.\" - \"Briga típica de kit."
koKR = "\"나는 분홍색 양동이가 필요해!\" \"아니, 그건 내 거야, 나는 항상 그것을 사용해\" - 전형적인 키트의 다툼"
csCZ = "Chci ten růžový kýbl!\" \"Ne, je můj, vždycky ho používám.\" - \"Typická hádka kitů."
viVN = "\"Tôi muốn cái xô hồng!\" \"Không, nó là của tôi, tôi luôn sử dụng nó\" - \"Tranh cãi điển hình của đồ chơi\""
trTR = "Pembi kova benim!\" \"Hayır, benim, hep onu kullanırım.\" - \"Tipik kedi çekişmesi"

