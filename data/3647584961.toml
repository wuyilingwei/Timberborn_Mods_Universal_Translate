["Faction.Whitepaws.WonderCompletionFlavor"]
raw = "Despite some...accidents...you have not only tamed this land, but also uncovered the secrets of ancient hooman technologies, opening the path to outer space for all of beaverkind.\nNow even if the earth ultimately fails and dies, we will be able to seek refuge among the stars.\n\nHa! Surely those fools never thought about that!"
status = "normal"
enUS = "Despite some...accidents...you have not only tamed this land, but also uncovered the secrets of ancient human technologies, opening the path to outer space for all of beaverkind. Now even if the earth ultimately fails and dies, we will be able to seek refuge among the stars.\n\nHa! Surely those fools never thought about that!"
zhCN = "“尽管发生了一些…意外…你不仅驯服了这片土地，还揭开了古老人类科技的秘密，为所有海狸打开了通往外太空的道路。\n即使地球最终崩溃和死亡，我们仍然能够在星际间寻找庇护。\n\n哈！那些傻瓜肯定从未想过这一点！”"
zhTW = "儘管發生了一些……意外……你不僅征服了這片土地，還揭開了古老人類科技的秘密，為所有海狸開闢了通往外太空的道路。\n現在，即使地球最終崩潰和毀滅，我們仍然能夠在星空中尋找避難所。\n\n哈！那些傻瓜肯定沒有想到這一點！"
ruRU = "Несмотря на некоторые... происшествия... вы не только укротили эту землю, но и раскрыли секреты древних технологий хуманов, открыв путь в космос для всего бобрового народа. \nТеперь, даже если Земля в конечном итоге потерпит крах и погибнет, мы сможем найти укрытие среди звёзд.\n\nХа! Они, безусловно, никогда не думали об этом!"
jaJP = "「いくつかの…事故…があったにもかかわらず、あなたはこの土地を征服しただけでなく、古代の人間技術の秘密を明らかにし、すべてのビーバーたちのために宇宙への道を開きました。  \n今や、地球が最終的に滅び、死んでも、私たちは星々の中で避難所を求めることができるのです。  \n\nハ！あの愚か者たちは、それについて考えたことがなかったに違いありません！」"
frFR = "Malgré quelques...accidents...vous n'avez pas seulement apprivoisé cette terre, mais vous avez aussi dévoilé les secrets des anciennes technologies hooman, ouvrant le chemin vers l'espace pour toute la communauté des castors.\nMaintenant, même si la terre échoue et meurt finalement, nous pourrons chercher refuge parmi les étoiles.\n\nHa ! Assurément, ces imbéciles n'y ont jamais pensé !"
deDE = "Trotz einiger... Unfälle... hast du dieses Land nicht nur bezwungen, sondern auch die Geheimnisse alter menschlicher Technologien aufgedeckt, die den Weg ins All für alle Biberkind geöffnet haben. \nJetzt, selbst wenn die Erde letztendlich versagt und stirbt, werden wir in der Lage sein, unter den Sternen Zuflucht zu suchen.\n\nHa! Sicherlich haben diese Narren nie daran gedacht!"
plPL = "Pomimo kilku...wypadków...nie tylko ujarzmiłeś tę ziemię, ale także odkryłeś sekrety pradawnych technologii hoomanów, otwierając ścieżkę w stronę kosmosu dla całej bobrowej rasy.\nTeraz, nawet jeśli ziemia ostatecznie zawiedzie i umrze, będziemy w stanie szukać schronienia wśród gwiazd.\n\nHa! Z pewnością ci głupcy nigdy o tym nie pomyśleli!"
ptBR = "Apesar de alguns...acidentes...você não apenas domou esta terra, mas também desvendou os segredos das antigas tecnologias hooman, abrindo o caminho para o espaço exterior para toda a espécie dos castores.  \nAgora, mesmo que a terra finalmente falhe e morra, seremos capazes de buscar refúgio entre as estrelas.  \n\nHa! Com certeza, aqueles tolos nunca pensaram nisso!"
koKR = "몇 가지...사고에도 불구하고...당신은 이 땅을 정복했을 뿐만 아니라 고대 인간 기술의 비밀을 밝혀내어 모든 비버 인류를 위해 우주로 나아가는 길을 열었습니다. \n이제 지구가 결국 망하고 죽더라도 우리는 별들 사이에서 피신할 수 있을 것입니다. \n\n하! 분명 그 악당들은 그것에 대해 생각해본 적이 없었을 것입니다!"
csCZ = "I přes některé...nehody...jste nejen zkrocili tuto zem, ale také odhalili tajemství starobylých lidských technologií, čímž jste otevřeli cestu do vesmíru pro všechny bobříky.\nTeď, i když nakonec země selže a zemře, budeme moci hledat útočiště mezi hvězdami.\n\nHa! Ti blázni si na to jistě nikdy nepomysleli!"
viVN = "Mặc dù có một số... tai nạn... bạn không chỉ đã thuần hóa vùng đất này, mà còn phát hiện ra những bí mật của công nghệ cổ xưa của loài người, mở ra con đường đến không gian cho tất cả loài rái cá.  \nBây giờ, ngay cả khi trái đất cuối cùng thất bại và chết đi, chúng ta sẽ có thể tìm nơi trú ẩn giữa những vì sao.  \n\nHa! Chắc chắn những kẻ ngốc đó không bao giờ nghĩ đến điều đó!"
trTR = "Bazı...kazalara...rağmen, bu toprağı sadece evcilleştirmediniz, aynı zamanda eski insan teknolojilerinin sırlarını da ortaya çıkardınız, bu sayede tüm kunduzlar için uzaya açılan bir yol açtınız. Şimdi, dünya nihayet savaşır ve ölse bile, yıldızlar arasında sığınacak bir yer bulabileceğiz.\n\nHa! Kesinlikle o aptallar bunun üzerine hiç düşünmemişlerdir!"

["Faction.Whitepaws.WonderCompletionMessage"]
raw = "Congratulations! Despite the initial circumstances, you have managed to survive\nand build a great city in this hostile land. \nYou can now leave your Whitepaws to their own devices and take a break from this insanity, they will be fine."
status = "normal"
enUS = "Congratulations! Despite the initial circumstances, you have managed to survive and build a great city in this hostile land. You can now leave your Whitepaws to their own devices and take a break from this insanity, they will be fine."
zhCN = "“恭喜！尽管最初的情况不佳，你仍然成功地在这片恶劣的土地上生存并建立了一个伟大的城市。\n你现在可以让你的白爪派系自行其事，暂时从这疯狂中抽身，他们会没事的。”"
zhTW = "恭喜你！儘管最初的情況艱難，你仍然成功地在這片敵對土地上生存並建造了一座偉大的城市。你現在可以讓你的白爪們自行發展，並暫時遠離這一切瘋狂，他們會沒事的。"
ruRU = "Поздравляем! Несмотря на исходные обстоятельства, вы смогли выжить и построить великий город в этой враждебной земле. Теперь вы можете оставить своих Белых Лап на произвол судьбы и сделать перерыв от этого безумия, с ними все будет в порядке."
jaJP = "おめでとうございます！最初の状況にもかかわらず、あなたは生き残り、この過酷な土地に素晴らしい都市を築くことができました。\nこれで、ホワイトパウズたちを自分たちのやり方に任せて、この狂気から少し休むことができます。彼らは大丈夫です。"
frFR = "Félicitations ! Malgré les circonstances initiales, vous avez réussi à survivre et à construire une grande ville dans cette terre hostile. Vous pouvez maintenant laisser vos Whitepaws vaquer à leurs occupations et faire une pause dans cette folie, ils s'en sortiront."
deDE = "Herzlichen Glückwunsch! Trotz der anfänglichen Umstände ist es Ihnen gelungen, zu überleben und eine großartige Stadt in diesem feindlichen Land zu errichten. Sie können Ihre Weißpfoten jetzt sich selbst überlassen und sich von diesem Wahnsinn erholen, sie werden gut zurechtkommen."
plPL = "Gratulacje! Mimo początkowych okoliczności, udało ci się przeżyć\ni zbudować wspaniałe miasto w tej wrogiej krainie. \nMożesz teraz zostawić swoje Białe Łapy samym sobie i zrobić przerwę od tej szaleństwa, będą w porządku."
ptBR = "Parabéns! Apesar das circunstâncias iniciais, você conseguiu sobreviver e construir uma grande cidade nesta terra hostil. Você pode agora deixar seus Whitepaws à própria sorte e fazer uma pausa dessa insanidade, eles ficarão bem."
koKR = "축하합니다! 초기 상황에도 불구하고, 당신은 이 적대적인 땅에서 살아남아 위대한 도시를 건설하는 데 성공했습니다. 이제 당신은 화이트파우스들을 그들만의 방식에 맡기고 이 미친 상황에서 잠시 휴식을 취할 수 있습니다. 그들은 괜찮을 것입니다."
csCZ = "Gratulujeme! Přes počáteční okolnosti se vám podařilo přežít a postavit skvělé město v této nepřátelské zemi. Nyní můžete nechat své Bílé tlapky na pokoji a na chvíli si od této insanity odpočinout, budou v pořádku."
viVN = "Chúc mừng! Mặc dù hoàn cảnh ban đầu, bạn đã thành công trong việc sống sót và xây dựng một thành phố vĩ đại trong vùng đất thù địch này. \nBây giờ bạn có thể để những chú Gấu Trắng tự lo cho mình và nghỉ ngơi khỏi sự điên cuồng này, chúng sẽ ổn thôi."
trTR = "Tebrikler! İlk koşullara rağmen, hayatta kalmayı başardınız ve bu düşmanca topraklarda harika bir şehir inşa ettiniz. Artık Whitepaws'ınızı kendi haline bırakabilir ve bu delilikten bir süre uzaklaşabilirsiniz, onlar iyi olacak."

