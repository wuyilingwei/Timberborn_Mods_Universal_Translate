["Lapantouflemagic.Florist.Description"]
raw = "A small house monopolizing an excessive amount of material solely to allow one beaver to enjoy his hobby.\nMight save your colony if you foolishly lost all of your berries or somehow managed to eradicate brambles.\nThe terrace must be <color=yellow>above ground.</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A small house monopolizing an excessive amount of material solely to allow one beaver to enjoy his hobby. Might save your colony if you foolishly lost all of your berries or somehow managed to eradicate brambles. The terrace must be <color=yellow>above ground.</color> <color=#00FFFF>Works as a Levee</color>"
zhCN = "一间小房子垄断了过多的材料，仅仅是为了让一只海狸享受他的爱好。\n如果你傻傻地失去了所有的浆果或以某种方式消灭了灌木丛，它可能会拯救你的殖民地。\n露台必须 <color=yellow>高于地面。</color>\n<color=#00FFFF>作为一个堤坝工作</color>"
zhTW = "一座小房子，專門佔用過量的材料，僅僅為了讓一隻海狸享受他的愛好。  \n如果你愚蠢地失去了所有的漿果，或不知怎麼成功消滅了荊棘，這可能會拯救你的殖民地。  \n陽台必須位於<color=yellow>地面以上。</color>  \n<color=#00FFFF>作為堤防運作</color>"
ruRU = "Небольшой дом, monopolизirующий чрезмерное количество материалов только для того, чтобы один бобер мог наслаждаться своим хобби. \nМожет спасти вашу колонию, если вы безрассудно потеряли все ягоды или как-то удалось искоренить ежевику. \nТерраса должна быть <color=yellow>над землёй.</color> \n<color=#00FFFF>Работает как дамба</color>"
jaJP = "一匹のビーバーが趣味を楽しむためだけに、過剰な量の素材を独占する小さな家です。\nもし愚かにもすべてのベリーを失ったり、なんとか棘を根絶してしまった場合、あなたのコロニーを救うかもしれません。\nテラスは<color=yellow>地上にある必要があります。</color>\n<color=#00FFFF>堤防として機能します。</color>"
frFR = "Une petite maison monopolisant une quantité excessive de matériaux uniquement pour permettre à un castor de profiter de son passe-temps.\nPourrait sauver votre colonie si vous avez idiotement perdu toutes vos baies ou réussi à éradiquer les ronces.\nLa terrasse doit être <color=yellow>au-dessus du sol.</color>\n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Ein kleines Haus, das eine übermäßige Menge an Materialien monopolisiert, nur um einem Biber zu ermöglichen, sein Hobby zu genießen. \nKann eure Kolonie retten, falls ihr törichterweise all eure Beeren verloren habt oder es geschafft habt, Dornen zu beseitigen. \nDie Terrasse muss <color=yellow>oberhalb des Bodens.</color>\n<color=#00FFFF>Funktioniert als Damm</color>"
plPL = "Mały domek monopolizujący nadmierne ilości materiałów tylko po to, aby jeden bóbr mógł cieszyć się swoim hobby. Może uratować twoją kolonię, jeśli głupio straciłeś wszystkie jagody lub w jakiś sposób udało ci się zlikwidować jeżyny. Taras musi być <color=yellow>ponad ziemią.</color> <color=#00FFFF>Działa jako wał.</color>"
ptBR = "Uma pequena casa que monopoliza uma quantidade excessiva de material apenas para permitir que um castor desfrute de seu hobby. Pode salvar sua colônia se você, de forma imprudente, perder todas as suas frutas ou de alguma forma conseguir erradicar as silvas. O terraço deve estar <color=yellow>acima do solo.</color> <color=#00FFFF>Funciona como um Dique</color>"
koKR = "한 고슴도치가 자신의 취미를 즐기기 위해 과도한 양의 자재를 독점하는 작은 집입니다.\n만약 당신이 어리석게도 모든 베리를 잃거나 어떻게든 가시덤불을 근절해버린다면, 당신의 콜로니를 구할 수 있습니다.\n테라스는 <color=yellow>지상 위</color>여야 합니다.\n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Malý dům, který monopolizuje nadměrné množství materiálu pouze proto, aby umožnil jednomu bobrovi užívat si jeho koníček. \nMůže zachránit vaši kolonie, pokud jste hloupě ztratili všechny své bobule nebo se vám nějak podařilo vyhubit trní. \nTerasa musí být <color=yellow>nad zemí.</color> \n<color=#00FFFF>Funguje jako protipovodňová hráz</color>"
viVN = "Một ngôi nhà nhỏ chiếm hữu một lượng vật liệu quá mức chỉ để cho một con hải ly tận hưởng sở thích của mình.  \nCó thể cứu lấy thuộc địa của bạn nếu bạn một cách ngu ngốc đã làm mất tất cả các loại quả mọng hoặc bằng cách nào đó đã quản lý để tiêu diệt cây mâm xôi.  \nBan công phải <color=yellow>cao hơn mặt đất.</color>  \n<color=#00FFFF>Có tác dụng như một con đê.</color>"
trTR = "Bir kovuğun aşırı miktarda malzeme monopolize ettiği küçük bir ev, sadece bir castorun hobisinden keyif almasına olanak tanır.\nTüm böğürtlenlerinizi aptalca kaybettiyseniz veya bir şekilde çalıları kökünden sökebildiyseniz koloninizi kurtarabilir.\nTeras <color=yellow>yerden yüksek olmalıdır.</color>\n<color=#00FFFF>Bir Set olarak çalışır</color>"

["Lapantouflemagic.Florist.FlavorDescription"]
raw = "\"See, dandelions and berries like a very particular type of soil, very hard to replicate. That's why we can't plant them wherever we like.\"\n -A florist beaver"
status = "normal"
enUS = "\"See, dandelions and berries prefer a very specific type of soil that's hard to replicate. That's why we can't plant them just anywhere.\"  \n-A florist beaver"
zhCN = "“你看，蒲公英和浆果喜欢一种非常特定的土壤，这种土壤很难复制。那就是为什么我们不能随意种植它们。”  \n—一只花店的海狸"
zhTW = "「你看，蒲公英和漿果喜歡一種非常特定的土壤，這種土壤非常難以複製。這就是為什麼我們不能隨意種植它們。」  \n—— 一位花匠海狸"
ruRU = "«Видите ли, одуванчики и ягоды предпочитают очень определённый тип почвы, который очень трудно воспроизвести. Вот почему мы не можем сажать их где попало.»  \n- Бобёр-флорист"
jaJP = "「ご覧ください、タンポポやベリーは特定の種類の土を好むんです。再現するのがとても難しい。だからこそ、好きな場所に植えることができないんです。」  \n- フローリストビーバー"
frFR = "\"Vous voyez, les pissenlits et les baies aiment un type de sol très particulier, très difficile à reproduire. C'est pourquoi nous ne pouvons pas les planter où nous le souhaitons.\"  \n- Un castor fleuriste"
deDE = "„Siehst du, Löwenzahn und Beeren brauchen eine ganz bestimmte Art von Boden, die sehr schwer zu reproduzieren ist. Deshalb können wir sie nicht überall pflanzen.“  \n–Ein Floristen-Biber"
plPL = "Zobacz, dmuchawce i jagody preferują bardzo specyficzny rodzaj gleby, bardzo trudny do odtworzenia. Dlatego nie możemy ich sadzić gdziekolwiek nam się podoba.\"  \n-\"Kwiaciarka bobrów"
ptBR = "\"Veja, dentes-de-leão e frutas silvestres gostam de um tipo de solo muito particular, difícil de replicar. É por isso que não podemos plantá-los onde quisermos.\"  \n- Um castor florista"
koKR = "\"보세요, 민들레와 베리는 매우 특정한 종류의 토양을 좋아해요. 복제하기 매우 어렵죠. 그래서 우리는 원하는 곳에 그것들을 심을 수 없는 거랍니다.\"\n -꽃집 비버"
csCZ = "\"Vidíte, pampelišky a bobule potřebují velmi specifický typ půdy, který je velmi těžké replikovat. Proto je nemůžeme zasadit, kam se nám zlíbí.\"  \n- Květinář bobr"
viVN = "\"Nhìn này, bồ công anh và quả mọng cần một loại đất rất đặc biệt, rất khó để tái tạo. Đó là lý do tại sao chúng tôi không thể trồng chúng ở bất cứ đâu.\" \n-Một con castor làm vườn"
trTR = "\"Bak, papatyalar ve meyveler çok özel bir toprak türünü sever, tekrar elde etmesi çok zor. Bu yüzden onları istediğimiz her yere dikebiliyoruz.\"  \n-Bir çiçekçi kunduzu"

