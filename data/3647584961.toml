["Lapantouflemagic.TreeNursery.Description"]
raw = "A specialized building in which experienced forester beavers carefully tend to tiny saplings and grow exotic species before planting them outside.\n<color=red>The house body can connect from the bottom to a ladder or pit-and-ladder lodge.</color>"
status = "normal"
enUS = "A specialized building in which experienced forester beavers carefully tend to tiny saplings and grow exotic species before planting them outside.  \n<color=red>The house body can connect from the bottom to a ladder or pit-and-ladder lodge.</color>"
zhCN = "一个专用建筑，由经验丰富的伐木工海狸精心照料小树苗，培育异国品种，然后再将其种植到户外。  \n<color=red>房屋底部可以与梯子或梯井小屋连接。</color>"
zhTW = "一座專門的建築，經驗豐富的樹藝海狸在此小心照料幼苗，並培育異國物種，然後再將它們種植到戶外。  \n<color=red>房屋底部可以連接到梯子或坑梯小屋。</color>"
ruRU = "Специализированное здание, в котором опытные лесные бобры тщательно ухаживают за крошечными саженцами и выращивают экзотические виды перед их посадкой на улице.  \n<color=red>Строение дома может соединяться снизу с лестницей или шалашом с лестницей и ямой.</color>"
jaJP = "「経験豊富な林業ビーバーが小さな苗木を注意深く育て、外に植える前にエキゾチックな種を育てる専門の建物です。<color=red>家の本体は、底からは梯子または落ち梯子の小屋に接続できます。</color>」"
frFR = "Un bâtiment spécialisé dans lequel des castors sylvains expérimentés s'occupent soigneusement de minuscules jeunes pousses et cultivent des espèces exotiques avant de les planter à l'extérieur.  \n<color=red>Le corps de la maison peut se connecter par le bas à une échelle ou à un pavillon à échelle et fosse.</color>"
deDE = "Ein spezialisiertes Gebäude, in dem erfahrene Forstwirtschafts-Biber sorgfältig kleine Setzlinge pflegen und exotische Arten anbauen, bevor sie sie im Freien pflanzen.  \n<color=red>Der Gebäudekörper kann von unten mit einer Leiter oder einem Leiter-Grube-Haus verbunden werden.</color>"
plPL = "Specjalizowany budynek, w którym doświadczeni bobry leśne starannie pielęgnują małe sadzonki i hodują egzotyczne gatunki przed ich posadzeniem na zewnątrz.  \n<color=red>Bryła domu może łączyć się od dołu z drabiną lub domkiem z drabiną i dołem.</color>"
ptBR = "Um edifício especializado onde castores jardineiros experientes cuidam cuidadosamente de pequenas mudas e cultivam espécies exóticas antes de plantá-las do lado de fora.  \n<color=red>O corpo da casa pode se conectar pela parte inferior a uma escada ou alojamento com escada e poço.</color>"
koKR = "숙련된 산림 관리자 비버가 작은 묘목을 정성껏 돌보고 이국적인 종을 기른 후 외부에 심는 전문화된 건물입니다.\n<color=red>건물 본체는 아래에서 사다리 또는 구덩이 및 사다리 통나무집에 연결될 수 있습니다.</color>"
csCZ = "Specializovaná budova, ve které zkušení bobři lesníci pečlivě pečují o drobné sazenice a pěstují exotické druhy před tím, než je vysadí ven.  \n<color=red>Tělo domu lze připojit ze spodní části k žebříku nebo k boudě se žebříkem a jámou.</color>"
viVN = "Một tòa nhà chuyên biệt nơi những con nhím gỗ có kinh nghiệm chăm sóc cẩn thận những cây giống nhỏ và trồng các loài cây kỳ lạ trước khi trồng chúng ra ngoài.\n<color=red>Thân nhà có thể kết nối từ dưới lên một cái thang hoặc một túp lều thang-hố.</color>"
trTR = "Deneyimli ağaç ustası kunduzların dikkatle küçük fidanlara baktığı ve dışarıda dikimden önce egzotik türler yetiştirdiği özel bir bina.\n<color=red>Ev gövdesi, alttan bir merdivene veya çukur ve merdiven kulübesine bağlanabilir.</color>"

