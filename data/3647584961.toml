["Lapantouflemagic.CrappyIrrigationTower.Description"]
raw = "A crappy bath built with logs, deliberately made leaky in order to use the dirty water for irrigation.\nMostly useful for the unhinged weirdos who can't help but try to play this on hard mode despite having been told not to."
status = "normal"
enUS = "A poorly constructed bath made with logs, intentionally designed to leak so that the dirty water can be used for irrigation. Mostly useful for the unhinged weirdos who can't help but attempt to play this on hard mode despite being warned against it."
zhCN = "一个用木头建成的糟糕浴缸，故意做得漏水，以便利用脏水进行灌溉。\n主要是为那些无法自控的怪人提供的，他们明知道不该这样玩却还是偏要挑战困难模式。"
zhTW = "一個用木頭建造的爛浴池，故意做得漏水，以便將髒水用於灌溉。對於那些雖然被告知不要這麼做，卻無法抗拒在困難模式中嘗試的古怪瘋子來說，這個設施的用途最大。"
ruRU = "Паршивый бассейн, построенный из бревен, намеренно сделанный протекающим, чтобы использовать грязную воду для орошения. В основном полезен для странных неадекватов, которые не могут удержаться от игры на сложном уровне, несмотря на предупреждения об этом."
jaJP = "ログを使って建てられたお粗末な浴槽。故意に漏れるように作られており、汚れた水を灌漑に使用するためのものです。主に、やるなと言われてもハードモードでプレイせずにはいられない異常な変わり者たちに役立ちます。"
frFR = "Une baignoire médiocre construite avec des rondins, intentionnellement faite pour fuir afin d'utiliser l'eau sale pour l'irrigation. Principalement utile pour les loosers déséquilibrés qui ne peuvent s'empêcher d'essayer de jouer en mode difficile malgré les avertissements."
deDE = "Ein miserables Bad, gebaut aus Stämmen, absichtlich undicht gemacht, um das schmutzige Wasser zur Bewässerung zu verwenden. \nEher nützlich für die verrückten Eigenartigen, die trotz der Warnung nicht anders können, als zu versuchen, das im Schwierigkeitsmodus zu spielen."
plPL = "Zielona wanna zbudowana z bali, celowo uszczelniona, aby wykorzystać brudną wodę do nawadniania. Głównie przydatna dla szalonych dziwaków, którzy nie mogą się powstrzymać od grania na trudnym poziomie, mimo że powiedziano im, aby tego nie robili."
ptBR = "Uma banheira ruim construída com troncos, deliberadamente feita para vazar a fim de usar a água suja para irrigação. Principalmente útil para os estranhos descontrolados que não conseguem evitar tentar jogar isso no modo difícil, apesar de terem sido avisados para não fazê-lo."
koKR = "나무로 지어진 형편없는 욕탕, 더러운 물을 관개에 사용하기 위해 의도적으로 새도록 만들어졌다. \n주로 어려운 모드에서 플레이하지 말라고 했음에도 불구하고 그리할 수밖에 없는 비정상적인 괴짜들에게 유용하다."
csCZ = "Špatná koupel postavená z kmenů, záměrně udělaná kape, aby se znečištěná voda mohla použít na zavlažování. \nZ větší části užitečná pro ujeté podivíny, kteří se prostě nemohou ubránit pokusu hrát na těžkou obtížnost, i když jim bylo řečeno, aby to nedělali."
viVN = "Một bể tắm tệ hại được xây dựng bằng gỗ, cố tình làm rò rỉ để sử dụng nước bẩn cho tưới tiêu. \nChủ yếu hữu ích cho những kẻ lập dị điên cuồng không thể cưỡng lại việc cố gắng chơi ở chế độ khó mặc dù đã được khuyến cáo không nên."
trTR = "Ahşaplardan inşa edilmiş, kasten sızdırılan berbat bir banyo, kirli suyu sulama amacıyla kullanmak için yapılmıştır. Bu, zor modda oynamaktan vazgeçilmeyen, akli dengesi yerinde olmayan tuhaflar için çoğunlukla yararlıdır."

["Lapantouflemagic.CrappyIrrigationTower.FlavorDescription"]
raw = "\"We should get a proper dam built, because this won't last\"\n -A farmer beaver"
status = "normal"
enUS = "\"We should get a proper dam built, because this won't last\"  \n-A farmer beaver"
zhCN = "“我们应该建一个真正的水坝，因为这个撑不了多久。”  \n——一只农民海狸"
zhTW = "「我們應該建造一座正規的大壩，因為這個不會持久」  \n- 一隻農夫海狸"
ruRU = "\"Нам нужно построить нормальную плотину, потому что это долго не продержится.\"  \n- Фермер-бобер"
jaJP = "「しっかりとしたダムを建設するべきだ、こんなのは長続きしないだろう」  \n- 農夫ビーバー"
frFR = "\"Nous devrions faire construire un vrai barrage, car ça ne tiendra pas.\"  \n-Un castor agriculteur"
deDE = "\"Wir sollten einen richtigen Damm bauen, denn das hier wird nicht lange halten.\" - Ein Bauernbiber"
plPL = "\"Powinniśmy zbudować porządną tamę, bo to nie przetrwa\"  \n- Właściwie bobrów"
ptBR = "\"Devemos construir uma represa adequada, porque isso não vai durar.\"  \n-Um castor agricultor"
koKR = "\"우리는 제대로 된 댐을 건설해야 해, 이건 오래가지 않을 거야.\"  \n-농부 비버"
csCZ = "\"Musíme postavit pořádnou přehradu, protože tohle dlouho nevydrží\"  \n- Farmář bobr"
viVN = "\"Chúng ta nên xây một con đập đúng nghĩa, vì cái này sẽ không tồn tại lâu\"  \n-Một con castor nông dân"
trTR = "\"Bu dayanmaz, düzgün bir baraj yapmalıyız.\"  \n- Bir çiftçi modası"

