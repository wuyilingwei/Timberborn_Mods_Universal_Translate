["Lapantouflemagic.GreenHouse.Description"]
raw = "A large greenhouse to keep banana trees warm and happy\n<color=red>Crushable building! Be careful! Only allows banana trees!\nThis building is not watertight!</color>"
status = "normal"
enUS = "A large greenhouse to keep banana trees warm and happy\n<color=red>Crushable building! Be careful! Only allows banana trees!\nThis building is not watertight!</color>"
zhCN = "一个大型温室，用于保持香蕉树温暖和快乐  \n<color=red>可破坏建筑！小心！仅允许香蕉树！  \n该建筑不防水！</color>"
zhTW = "一個大型溫室，用來讓香蕉樹保持溫暖和快樂  \n<color=red>可摧毀的建築！小心！僅允許種植香蕉樹！  \n這座建築不防水！</color>"
ruRU = "Большая теплица для поддержания банановых деревьев в тепле и радости\n<color=red>Могущественное здание! Будьте осторожны! Разрешает только банановые деревья!\nЭто здание не водонепроницаемое!</color>"
jaJP = "「バナナの木を温かく幸せに保つための大きな温室  \n<color=red>壊せる建物！注意してください！バナナの木のみを許可します！  \nこの建物は防水ではありません！</color>」"
frFR = "Une grande serre pour garder les bananiers au chaud et heureux  \n<color=red>Bâtiment écrasable ! Faites attention ! Ne permet que les bananiers !  \nCe bâtiment n'est pas étanche !</color>"
deDE = "Ein großes Gewächshaus, um Bananenbäume warm und glücklich zu halten\n<color=red>Zerschlagbares Gebäude! Seien Sie vorsichtig! Erlaubt nur Bananenbäume!\nDieses Gebäude ist nicht wasserdicht!</color>"
plPL = "Duża szklarnia, aby utrzymać drzewa bananowe w cieple i szczęściu\n<color=red>Można zniszczyć! Bądź ostrożny! Tylko drzewa bananowe!\nTen budynek nie jest wodoodporny!</color>"
ptBR = "Uma grande estufa para manter as bananeiras quentes e felizes\n<color=red>Edifício esmagável! Tenha cuidado! Permite apenas bananeiras!\nEste edifício não é à prova d'água!</color>"
koKR = "바나나 나무를 따뜻하고 행복하게 유지하기 위한 대형 온실  \n<color=red>부서질 수 있는 건물입니다! 조심하세요! 바나나 나무만 허용됩니다!  \n이 건물은 방수되지 않습니다!</color>"
csCZ = "Velký skleník, který udržuje banánovníky v teple a štěstí\n<color=red>Rozbitná budova! Buďte opatrní! Umožňuje pouze banánovníky!\nTato budova není vodotěsná!</color>"
viVN = "Một nhà kính lớn để giữ cho cây chuối ấm áp và hạnh phúc\n<color=red>Công trình có thể bị phá hủy! Hãy cẩn thận! Chỉ cho phép cây chuối!\nCông trình này không chống thấm nước!</color>"
trTR = "Büyük bir sera, muz ağaçlarını sıcak ve mutlu tutmak için\n<color=red>Yıkılabilir yapı! Dikkatli olun! Sadece muz ağaçlarına izin verir!\nBu yapı su geçirmez değildir!</color>"

["Lapantouflemagic.GreenHouse.FlavorDescription"]
raw = "\"If you eat only bananas, you won't wear your teeth down and eventually they will grow so long that they will go through your skull\"\n -Mommy beaver"
status = "normal"
enUS = "\"If you eat only bananas, you won't wear your teeth down and eventually they will grow so long that they will go through your skull\" -Mommy beaver"
zhCN = "“如果你只吃香蕉，你的牙齿就不会被磨损，最终它们会长得很长，穿过你的头骨。”  \n- 老母海狸"
zhTW = "「如果你只吃香蕉，你的牙齒就不會磨損，最後它們會長得如此之長，以至於穿透你的頭顱。」  \n- 媽媽海狸"
ruRU = "\"Если ты будешь есть только бананы, твои зубы не износится, и в конечном итоге они вырастут так долго, что пробьют твою черепную коробку.\"  \n- Мама бобр"
jaJP = "「バナナだけ食べていれば、歯がすり減ることはないし、最終的にはあまりにも長く成長して頭蓋骨を突き抜けてしまうだろう」  \n- マミービーバー"
frFR = "\"Si tu ne manges que des bananes, tu n'useras pas tes dents et finalement, elles vont devenir si longues qu'elles perceront ton crâne.\" -Maman castor"
deDE = "\"Wenn du nur Bananen isst, wirst du deine Zähne nicht abnutzen, und irgendwann werden sie so lang, dass sie durch deinen Schädel wachsen.\" - Mama-Biber"
plPL = "\"Jeśli będziesz jeść tylko banany, nie zetrzesz swoich zębów, a w końcu wyrosną tak długo, że przebić się przez twoją czaszkę\" - Mamusia bóbr"
ptBR = "\"Se você comer apenas bananas, não irá desgastar seus dentes e, eventualmente, eles crescerão tanto que passarão pelo seu crânio\" -Mamãe castor"
koKR = "\"바나나만 먹으면 이가 닳지 않아서 결국 이가 너무 길어져서 두개골을 뚫고 나올 거야.\"  \n-엄마 비버"
csCZ = "\"Pokud budeš jíst jen banány, neopotřebuješ si zuby a nakonec ti narostou tak dlouhé, že ti projdou lebkou.\"  \n-Maminka bobr"
viVN = "\"Nếu bạn chỉ ăn chuối, bạn sẽ không làm mòn răng và cuối cùng chúng sẽ mọc dài đến nỗi xuyên qua cả sọ của bạn.\"  \n-Mẹ nhím nước"
trTR = "\"Eğer sadece muz yersen, dişlerin aşınmaz ve sonunda o kadar uzun büyürler ki kafanın içinden geçerler.\"  \n-Anne kunduz"

["Lapantouflemagic.Trebuchet.Description"]
raw = "The only realistic way to get rid of all those useless rocks. Also allows that one nerdy beaver to study ballistics."
status = "normal"
enUS = "The only realistic way to get rid of all those useless rocks. It also allows that one nerdy beaver to study ballistics."
zhCN = "“清除所有那些无用石头的唯一现实方法。还让那只书呆子海狸研究弹道学。”"
zhTW = "“擺脫那些無用的石頭最現實的方式。還讓那隻愛搞研究的海狸能夠研究彈道學。”"
ruRU = "Единственный реалистичный способ избавиться от всех этих бесполезных камней. Также позволяет этому одному nerd-бобру изучать баллистику."
jaJP = "「無駄な石をすべて取り除く唯一の現実的な方法。また、その一人のオタクのビーバーが弾道学を研究することも可能にします。」"
frFR = "La seule façon réaliste de se débarrasser de toutes ces pierres inutiles. Permet également à ce castor un peu nerd d'étudier la balistique."
deDE = "Der einzige realistische Weg, um all diese nutzlosen Steine loszuwerden. Erlaubt auch dem einen nerdigen Biber, Ballistik zu studieren."
plPL = "Jedyny realistyczny sposób na pozbycie się wszystkich tych bezużytecznych kamieni. Pozwala również temu jednemu nerdowatemu bobrowi badać balistykę."
ptBR = "A única maneira realista de se livrar de todas aquelas pedras inúteis. Também permite que aquele castor nerd estude balística."
koKR = "쓸모없는 바위들을 제거하는 유일한 현실적인 방법입니다. 또한 그 한 nerdy 비버가 포물선을 연구할 수 있게 해 줍니다."
csCZ = "Jediný realistický způsob, jak se zbavit všech těch nepotřebných kamenů. Také umožňuje tomu jednomu nerdovskému bobrovi studovat balistiku."
viVN = "Cách duy nhất thực tế để loại bỏ tất cả những viên đá vô dụng. Cũng cho phép con béo mọt sách đó nghiên cứu về đạn đạo."
trTR = "Tüm o işe yaramaz taşlardan kurtulmanın tek gerçekçi yolu. Ayrıca o bir garip kunduzun balistik çalışmaları yapmasına da izin veriyor."

