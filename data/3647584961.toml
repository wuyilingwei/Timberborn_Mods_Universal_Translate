["Lapantouflemagic.ContaminatedJail.FlavorDescription"]
raw = "\"A jail for beavers made entirely of wood seems a silly idea, but they're just too polite to escape\""
status = "normal"
enUS = "\"A jail for beavers made entirely of wood seems a silly idea, but they're just too polite to escape.\""
zhCN = "“一个完全由木头做成的海狸监狱听起来像个愚蠢的主意，但他们实在太有礼貌而不愿逃跑。”"
zhTW = "\"一個完全由木頭製成的海狸監獄似乎是一個愚蠢的主意，但它們實在太有禮貌了，不會逃跑。\""
ruRU = "\"Тюрьма для бобров, полностью сделанная из дерева, кажется нелепой идеей, но они просто слишком вежливы, чтобы сбежать.\""
jaJP = "「木でできたビーバーのための監獄は馬鹿げたアイデアのように思えるが、彼らは脱走するにはあまりにも礼儀正しい。」"
frFR = "« Une prison pour castors entièrement en bois semble une idée ridicule, mais ils sont juste trop polis pour s'échapper. »"
deDE = "\"Ein Gefängnis für Biber, das vollständig aus Holz besteht, scheint eine alberne Idee zu sein, aber sie sind einfach zu höflich, um zu fliehen.\""
plPL = "Więzienie dla bobrów zbudowane całkowicie z drewna wydaje się głupim pomysłem, ale są po prostu zbyt uprzejme, aby uciekać"
ptBR = "\"Uma prisão para castores feita inteiramente de madeira parece uma ideia boba, mas eles são educados demais para escapar.\""
koKR = "\"완전히 나무로 만들어진 비버를 위한 감옥은 바보 같은 아이디어처럼 보이지만, 그들은 탈출하기에는 너무나 예의가 바릅니다.\""
csCZ = "\"Vězení pro bobry vyrobené zcela ze dřeva se zdá být hloupý nápad, ale jsou prostě příliš zdvořilí na to, aby utekli.\""
viVN = "Một nhà tù dành cho hải ly làm hoàn toàn bằng gỗ có vẻ như là một ý tưởng ngớ ngẩn, nhưng chúng chỉ quá lịch sự để trốn thoát"
trTR = "Tamamen ahşaptan yapılmış bir kunduz hapishanesinin oldukça saçma bir fikir olduğu görülüyor, ama kaçmak için çok nazikler."

