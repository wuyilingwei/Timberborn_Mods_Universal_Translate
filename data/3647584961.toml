["Lapantouflemagic.Seamstress.Description"]
raw = "Manufactures various items that makes a beaver's life better.\n<color=#FFA500>Small Tower</color>, <color=#FF6EC7>Can support upgrades</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "Manufactures various items that make a beaver's life better.  \n<color=#FFA500>Small Tower</color>, <color=#FF6EC7>Can support upgrades</color>  \n<color=#00FFFF>Works as a Levee</color>"
zhCN = "“制造各种让海狸生活更美好的物品。\n<color=#FFA500>小塔</color>，<color=#FF6EC7>可以支持升级</color>\n<color=#00FFFF>作为堤坝使用</color>”"
zhTW = "製造各種改善海狸生活的物品。\n<color=#FFA500>小塔</color>，<color=#FF6EC7>可支持升級</color>\n<color=#00FFFF>作為堤壩使用</color>"
ruRU = "Изготавливает различные предметы, улучшающие жизнь бобров.  \n<color=#FFA500>Небольшая башня</color>, <color=#FF6EC7>Может поддерживать улучшения</color>  \n<color=#00FFFF>Работает как насыпь</color>"
jaJP = "「ビーバーの生活をより良くする様々なアイテムを製造します。  \n<color=#FFA500>小さな塔</color>、<color=#FF6EC7>アップグレードをサポート可能</color>  \n<color=#00FFFF>堤防として機能する</color>」"
frFR = "Fabrique divers articles qui améliorent la vie d'un castor.\n<color=#FFA500>Petite Tour</color>, <color=#FF6EC7>Peut supporter des améliorations</color>\n<color=#00FFFF>Fonctionne comme une Levée</color>"
deDE = "Stellt verschiedene Gegenstände her, die das Leben eines Bibers verbessern.  \n<color=#FFA500>Kleiner Turm</color>, <color=#FF6EC7>Kann Upgrades unterstützen</color>  \n<color=#00FFFF>Funktioniert als Damm</color>"
plPL = "Produkuje różne przedmioty, które poprawiają życie bobra.  \n<color=#FFA500>Mała wieża</color>, <color=#FF6EC7>Może wspierać ulepszenia</color>  \n<color=#00FFFF>Funkcjonuje jako grobla</color>"
ptBR = "Faz diversos itens que tornam a vida de um castor melhor.  \n<color=#FFA500>Pequena Torre</color>, <color=#FF6EC7>Pode suportar melhorias</color>  \n<color=#00FFFF>Funciona como um Dique</color>"
koKR = "비버의 삶을 더 좋게 만드는 다양한 아이템을 제작합니다.  \n<color=#FFA500>작은 탑</color>, <color=#FF6EC7>업그레이드를 지원할 수 있습니다</color>  \n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Vyrábí různé předměty, které zlepšují život bobra.  \n<color=#FFA500>Malá věž</color>, <color=#FF6EC7>může podporovat vylepšení</color>  \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Sản xuất các vật phẩm khác nhau giúp cuộc sống của một con beaver tốt hơn.  \n<color=#FFA500>Tháp Nhỏ</color>, <color=#FF6EC7>Có thể hỗ trợ nâng cấp</color>  \n<color=#00FFFF>Hoạt động như một Đê</color>"
trTR = "Bir kunduzun hayatını daha iyi hale getiren çeşitli eşyalar üretir.  \n<color=#FFA500>Küçük Kule</color>, <color=#FF6EC7>Yükseltmeleri destekleyebilir</color>  \n<color=#00FFFF>Set olarak çalışır</color>"

["Lapantouflemagic.Seamstress.FlavorDescription"]
raw = "\"They said it needs to be that tall to 'test the pillows', whatever that means.\"\n-A confused builder beaver"
status = "normal"
enUS = "\"They said it needs to be that tall to 'test the pillows', whatever that means.\"  \n-A confused builder beaver"
zhCN = "“他们说它需要那么高来‘测试枕头’，这是什么意思。”\n- 一个困惑的建筑海狸"
zhTW = "「他們說需要這麼高來『測試枕頭』，這是什麼意思呢？」\n- 一隻困惑的建築海狸"
ruRU = "\"Говорят, что она должна быть такой высокой, чтобы 'проверить подушки', что бы это ни значило.\"  \n- Озадаченный бобер-строитель"
jaJP = "「彼らはそれが『クッションを試す』ためにその高さでなければならないと言ったが、それが何を意味するのかは分からない。」  \n- 混乱したビーバーの建設者"
frFR = "\"Ils ont dit qu'il devait être aussi haut pour 'tester les oreillers', quoi que cela signifie.\"  \n-Un castor constructeur confus"
deDE = "\"Sie sagten, es müsse so hoch sein, um die 'Kissen zu testen', was auch immer das bedeutet.\"  \n- Ein verwirrter Bau-Biber"
plPL = "\"Mówili, że musi być tak wysoki, aby 'przetestować poduszki', cokolwiek to znaczy.\"  \n-Zdezorientowany bobr budowniczy"
ptBR = "\"Eles disseram que precisa ser tão alto assim para 'testar os travesseiros', seja lá o que isso significa.\"  \n-Um castor construtor confuso"
koKR = "\"그것이 '베개를 테스트하기 위해' 그렇게 높아야 한다고 했어요, 그게 무슨 의미인지 모르겠지만.\"\n- 혼란스러운 건설자 비버"
csCZ = "\"Říkali, že musí být tak vysoké, aby 'otestovali polštáře', ať už to znamená cokoliv.\"\n-Zmatený stavitel bobr"
viVN = "\"Họ nói rằng nó cần phải cao như vậy để 'kiểm tra gối', dù sao đi nữa thì cũng không rõ đó có nghĩa là gì.\"  \n-Một con nhím xây dựng bối rối"
trTR = "Yastıkları 'test etmek' için bu kadar yüksek olması gerektiğini söylediler, bunun ne anlama geldiğini bilmiyorum.\"\n-Kafası karışık bir inşaatçı kunduz"

