["Billboard.TechTreeBoard.Description"]
raw = "A billboard displaying the technological progression of the WhitePaws faction.\nUseful to know if you're attempting to build something waaaaay out of reach.\nAlso displays what is made where."
status = "normal"
enUS = "A billboard displaying the technological progression of the WhitePaws faction. Useful to know if you're attempting to build something waaaaay out of reach. Also displays what is made where."
zhCN = "一块展示白爪派系技术进展的广告牌。  \n如果你试图建造一些遥不可及的东西，它会非常有用。  \n还显示了在哪里制作什么。"
zhTW = "「一塊顯示白爪派系技術進展的廣告牌。  \n如果你試圖建造一些非常難以觸及的東西，這將會非常有用。  \n還顯示了在哪裡製造哪些物品。」"
ruRU = "Билборд, отображающий технологическое развитие фракции Белые Лапы. Полезно знать, если вы пытаетесь построить что-то слишком далеко от вас. Также показывает, что и где производится."
jaJP = "「ホワイトポーズ派の技術発展を示す看板。\n手の届かないものを建設しようとしている場合に役立ちます。\nまた、どこで何が作られているかも表示します。」"
frFR = "Un panneau d'affichage montrant la progression technologique de la faction WhitePaws. Utile à savoir si vous essayez de construire quelque chose de vraiment hors de portée. Affiche également ce qui est fabriqué où."
deDE = "Ein Werbeschild, das den technologischen Fortschritt der WhitePaws-Fraktion zeigt. Nützlich zu wissen, wenn du versuchst, etwas extrem Unerreichbares zu bauen. Zeigt auch an, wo was hergestellt wird."
plPL = "Tablica reklamowa wyświetlająca postęp technologiczny frakcji Białych Łap. Przydatna, aby wiedzieć, czy próbujesz zbudować coś daleko poza zasięgiem. Wyświetla także, co gdzie jest produkowane."
ptBR = "Um quadro de avisos exibindo o progresso tecnológico da facção WhitePaws. Útil para saber se você está tentando construir algo que está longe de seu alcance. Também exibe o que é feito onde."
koKR = "화이트파우 위원회의 기술 발전을 보여주는 광고판입니다.\n도달하기 힘든 무언가를 건설하려고 할 때 유용합니다.\n어디에서 무엇이 만들어지는지도 보여줍니다."
csCZ = "Billboard zobrazující technologický pokrok frakce WhitePaws. Užitečné vědět, pokud se snažíte postavit něco, co je daleko mimo dosah. Také zobrazuje, co se kde vyrábí."
viVN = "Một bảng quảng cáo hiển thị sự tiến bộ công nghệ của phái WhitePaws.\nHữu ích để biết nếu bạn đang cố gắng xây dựng một thứ gì đó xa tầm với.\nCũng hiển thị những gì được chế tạo ở đâu."
trTR = "WhitePaws fraksiyonunun teknolojik ilerlemesini sergileyen bir reklam panosu. \nUlaşılması imkânsız bir şey inşa etmeye çalışıyorsanız faydalıdır. \nAyrıca neyin nerede yapıldığını da gösterir."

