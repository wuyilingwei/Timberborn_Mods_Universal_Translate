["Lapantouflemagic.Deprecated.Description"]
raw = "<color=red>This thing is deprecated and misses some new functionality!\nReplace it with a new one when you get the chance.</color>"
status = "normal"
enUS = "<color=red>This thing is deprecated and misses some new functionality! Replace it with a new one when you get the chance.</color>"
zhCN = "<color=red>这个东西已经过时，并缺少一些新功能！有机会时请用新的替换它。</color>"
zhTW = "<color=red>這個東西已經被淘汰，缺少一些新功能！在有機會時請用新的替換它。</color>"
ruRU = "<color=red>Эта вещь устарела и не имеет некоторой новой функциональности! Замените её на новую, когда будет возможность.</color>"
jaJP = "<color=red>このアイテムは廃止されており、一部の新機能が欠けています！\n機会があれば新しいものに置き換えてください。</color>"
frFR = "<color=red>Cette chose est obsolète et manque de certaines nouvelles fonctionnalités ! Remplacez-la par une nouvelle version quand vous en avez l'occasion.</color>"
deDE = "<color=red>Dieses Ding ist veraltet und bietet einige neue Funktionen nicht! Ersetzen Sie es durch ein neues, wenn Sie die Gelegenheit dazu haben.</color>"
plPL = "<color=red>Ta rzecz jest przestarzała i brakuje jej niektórej nowej funkcjonalności! Zamień ją na nową, gdy tylko będziesz miał okazję.</color>"
ptBR = "<color=red>Essa coisa está obsoleta e falta algumas novas funcionalidades! Substitua-a por uma nova quando tiver a chance.</color>"
koKR = "<color=red>이 항목은 더 이상 지원되지 않으며 새로운 기능이 일부 누락되었습니다!\n기회가 될 때 새 것으로 교체하세요.</color>"
csCZ = "<color=red>Tato věc je zastaralá a postrádá některé nové funkce! \nNahraďte ji novou, když budete mít příležitost.</color>"
viVN = "<color=red>Đồ này đã không còn được sử dụng và thiếu một số chức năng mới! Hãy thay thế nó bằng một cái mới khi có cơ hội.</color>"
trTR = "<color=red>Bu şey geçersiz hale geldi ve bazı yeni işlevselliklerden eksik!\nFırsat bulduğunda yenisiyle değiştir.</color>"

["Lapantouflemagic.Deprecated.FlavorDescription"]
raw = "<color=red>This building is deprecated and misses some new functionality!\nReplace it with a new one when you get the chance.</color>"
status = "normal"
enUS = "<color=red>This building is deprecated and misses some new functionality! Replace it with a new one when you get the chance.</color>"
