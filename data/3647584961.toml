["Lapantouflemagic.2x2LousyWarehouse.FlavorDescription"]
raw = "\"You called me for that ? There's nothing! No roof, no wall, nothing!\"\n -A builder beaver"
status = "normal"
enUS = "\"You called me for that? There's nothing! No roof, no wall, nothing!\"  \n-A builder beaver"
zhCN = "“你叫我来干这个？没有任何东西！没有屋顶，没有墙，没有任何东西！”  \n- 一只建筑海狸"
zhTW = "「你叫我來這個嗎？這裡什麼都沒有！沒有屋頂，沒有牆壁，什麼都沒有！」  \n- 一隻建造的海狸"
ruRU = "\"Ты меня ради этого звал? Здесь ничего нет! Никакой крыши, никакой стены, ничего!\" - Строительный бобер"
jaJP = "「これのために呼んだの？何もないじゃない！屋根も壁も、何も！」  \n- ビルダーリス"
frFR = "\"Tu m'as appelé pour ça ? Il n'y a rien ! Pas de toit, pas de mur, rien !\"  \n-Un castor constructeur"
deDE = "\"Du hast mich dafür gerufen? Da ist nichts! Kein Dach, keine Wand, nichts!\"\n -Ein Bau-Bieber"
plPL = "\"Zadzwoniłeś po mnie w tej sprawie? Nic tu nie ma! Ani dachu, ani ściany, nic!\"  \n- Bobrzy budowniczy"
ptBR = "\"Você me chamou para isso? Não tem nada! Sem teto, sem parede, nada!\"  \n-Um castor construtor"
koKR = "\"그걸 위해 나를 부른 건가? 아무것도 없어! 지붕도, 벽도, 아무것도 없어!\"  \n- 한 건축가 너구리"
csCZ = "\"Zavolali jste mě kvůli tomu? Nic tu není! Žádná střecha, žádná zeď, nic!\"  \n- Stavitel bobr"
viVN = "\"Bạn gọi tôi vì điều đó sao? Không có gì cả! Không có mái, không có tường, không có gì!\" \n-Một chú hải ly thợ xây"
trTR = "\"Bu yüzden mi beni çağırdın? Hiçbir şey yok! Ne çatı, ne duvar, hiçbiri yok!\"  \n-Bir inşaatçı kunduz"

