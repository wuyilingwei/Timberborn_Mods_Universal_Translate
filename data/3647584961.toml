["Lapantouflemagic.Maimed.CriticalDescription"]
raw = "This poor beaver lost a limb working a dangerous job! It will need a prosthetic so it can again live a normal life."
status = "normal"
enUS = "This poor beaver lost a limb working a dangerous job! It will need a prosthetic so it can again live a normal life."
zhCN = "这只可怜的海狸在危险的工作中失去了一条肢体！它需要一个假肢才能再次过上正常的生活。"
zhTW = "這隻可憐的海狸在危險的工作中失去了一條腿！它需要一個義肢，才能再次過上正常的生活。"
ruRU = "Этот бедный бобер потерял конечность, выполняя опасную работу! Ему понадобится протез, чтобы снова жить нормальной жизнью."
jaJP = "このかわいそうなビーバーは危険な仕事で手足を失いました！再び普通の生活を送れるように義肢が必要です。"
frFR = "Ce pauvre castor a perdu un membre en travaillant dans un métier dangereux ! Il aura besoin d'une prothèse pour pouvoir revivre une vie normale."
deDE = "Dieser arme Biber hat bei einem gefährlichen Job ein Gliedmaß verloren! Er wird eine Prothese benötigen, damit er wieder ein normales Leben führen kann."
plPL = "Ten biedny bóbr stracił kończynę, pracując w niebezpiecznej pracy! Będzie potrzebował protezy, aby znów mógł prowadzić normalne życie."
ptBR = "Este pobre castor perdeu um membro trabalhando em um emprego perigoso! Ele precisará de uma prótese para poder viver uma vida normal novamente."
koKR = "이 불쌍한 비버는 위험한 일을 하다 한 쪽 팔을 잃었습니다! 다시 정상적인 삶을 살기 위해서는 의수가 필요합니다."
csCZ = "Tento chudák bobr při nebezpečné práci přišel o končetinu! Bude potřebovat protetickou končetinu, aby mohl znovu žít normální život."
viVN = "Con castor tội nghiệp này đã mất một chi trong khi làm một công việc nguy hiểm! Nó sẽ cần một bộ phận giả để có thể sống một cuộc sống bình thường trở lại."
trTR = "Bu zavallı kunduz tehlikeli bir işte bir uzvunu kaybetti! Yeniden normal bir hayat sürdürebilmesi için bir proteze ihtiyacı var."

