["Lapantouflemagic.crappyWaterWheel.FlavorDescription"]
raw = "\"With so much friction we're lucky it didn't catch on fire!\"\n -An alchemist beaver"
status = "normal"
enUS = "\"With so much friction we're lucky it didn't catch on fire!\"  \n-An alchemist beaver"
zhCN = "“摩擦力这么大，我们真幸运它没有着火！”  \n— 一只炼金术师海狸"
zhTW = "「摩擦力這麼大，我們真幸運沒有著火！」  \n- 一隻煉金術士海狸"
ruRU = "\"С таким количеством трения нам повезло, что оно не загорелось!\" - Алхимик-бобер"
