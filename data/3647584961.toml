["Lapantouflemagic.Megaplatform.FlavorDescription"]
raw = "\"So we have to refill the lights when the player's not look-\n - Shhhh! That's a secret!\"\n -Two anonymous beavers"
status = "normal"
enUS = "\"So we have to refill the lights when the player's not looking - Shhhh! That's a secret!\" -Two anonymous beavers"
zhCN = "“所以当玩家不看时，我们必须重新填充灯光——\n - 嘘！这是个秘密！”\n - 两只匿名的海狸”"
zhTW = "「所以當玩家不注意時，我們得重新填充燈光——\n - 嘘！這是個秘密！」\n - 兩隻匿名的海狸"
ruRU = "«Так что нам нужно заменить лампочки, когда игрок не смотрит - Шшш! Это секрет!» - Два анонимных бобра"
jaJP = "「\"だから、プレイヤーが見ていないときにライトを補充しなければならないんだ - シーッ！それは秘密だ！\" - 二匹の匿名のビーバー」"
frFR = "Nous devons remplir les lumières quand le joueur ne regarde pas -\n - Chut ! C'est un secret !\"\n -Deux castors anonymes"
deDE = "„Wir müssen die Lichter nachfüllen, wenn der Spieler nicht hinsieht - Shhhh! Das ist ein Geheimnis!“ - Zwei anonyme Biber"
plPL = "„Musimy uzupełnić światła, gdy gracz nie patrzy - Ciiii! To tajemnica!“ - Dwie anonimowe bobry"
ptBR = "\"Então temos que reabastecer as luzes quando o jogador não está olhando - Shhhh! Isso é um segredo!\" - Dois castores anônimos"
koKR = "그래서 우리는 플레이어가 보지 않을 때 불빛을 다시 채워야 해- \n - 쉿! 그건 비밀이야!\"\n - 두 명의 익명의 비버"
csCZ = "„Takže musíme doplnit světla, když hráč nedává pozor - \n - Ššš! To je tajné!“\n - Dva anonymní bobři"
viVN = "Vì vậy, chúng ta phải nạp lại đèn khi người chơi không nhìn thấy -\n - Shhhh! Đó là một bí mật!\"\n - Hai con hải ly vô danh"
trTR = "\"Bu yüzden oyuncu bakmadığında ışıkları yeniden doldurmamız gerekiyor - Şşt! Bu bir sır!\" - İki isimsiz kunduz"

