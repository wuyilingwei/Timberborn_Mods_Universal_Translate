["Need.Insectdeath.DeathMessage"]
raw = "<color=green>didn't know what ''carnivorous'' meant and tried to pet a giant firefly, proving that it is always better to ask your questions to the teacher</color>"
status = "normal"
enUS = "<color=green>didn't know what ''carnivorous'' meant and tried to pet a giant firefly, proving that it is always better to ask your questions to the teacher</color>"
zhCN = "<color=green>不知道“肉食性”是什么意思，试图去抚摸一只巨大的萤火虫，证明向老师提问总是更好</color>"
zhTW = "<color=green>不知道「肉食性」是什麼意思，試著去撫摸一隻巨大的螢火蟲，證明了向老師問問題總是更好</color>"
ruRU = "<color=green>не знал, что значит ''хищный'', и попытался погладить гигантскую светлячка, доказывая, что всегда лучше задавать вопросы учителю</color>"
jaJP = "<color=green>''肉食性''が何を意味するのか知らずに巨大なホタルを撫でようとした結果、質問は常に先生にする方が良いことが証明されました</color>"
frFR = "<color=green>ne savait pas ce que ''carnivore'' signifiait et a essayé de caresser une luciole géante, prouvant qu'il vaut toujours mieux poser ses questions à l'enseignant</color>"
deDE = "<color=green>wusste nicht, was ''fleischfressend'' bedeutet und versuchte, eine riesige Glühwürmchen zu streicheln, was beweist, dass es immer besser ist, seine Fragen dem Lehrer zu stellen</color>"
plPL = "<color=green>nie wiedział, co oznacza ''mięsożerny'' i próbował głaskać gigantyczną świetlika, co udowodniło, że zawsze lepiej jest zadawać pytania nauczycielowi</color>"
ptBR = "<color=green>não sabia o que ''carnívoro'' significava e tentou acariciar uma vaga-lume gigante, provando que é sempre melhor fazer suas perguntas ao professor</color>"
koKR = "<color=green>''육식성''이 무엇인지 몰랐고 거대한 반딧불이를 쓰다듬으려 하다가 선생님에게 질문하는 것이 항상 더 좋다는 것을 증명했다</color>"
csCZ = "<color=green>nevěděl, co znamená ''masožravý'', a pokusil se pohladit obří světlušku, což dokazuje, že je vždy lepší zeptat se na své otázky učitele</color>"
viVN = "<color=green>không biết ''ăn thịt'' có nghĩa là gì và đã cố gắng vuốt ve một con đom đóm khổng lồ, chứng minh rằng luôn tốt hơn khi hỏi thầy giáo những câu hỏi của bạn</color>"
trTR = "<color=green>''etobur''un ne anlama geldiğini bilmedi ve dev bir ateşböceğine dokunmaya çalıştı, öğretmenden soru sormanın her zaman daha iyi olduğunu kanıtladı</color>"

