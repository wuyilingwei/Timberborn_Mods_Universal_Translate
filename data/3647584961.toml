["Lapantouflemagic.NarrowLodge.Description"]
raw = "A tall and narrow lodge for one hauler.\nUseful to dam narrow corners.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A tall and narrow lodge for one hauler. Useful for damming narrow corners. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一个高而狭窄的仓库，适合一个搬运工使用。  \n有助于阻挡狭窄的角落。  \n<color=#00FFFF>作为堤防使用</color>"
zhTW = "一座高而狹窄的倉庫，適合一名搬運工使用。  \n在狹窄的角落中非常實用。  \n<color=#00FFFF>作為堤壩使用</color>"
ruRU = "Высокий и узкий домик для одного грузчика. Полезен для создания дамб в узких уголках. <color=#00FFFF>Работает как набережная</color>"
jaJP = "「1 人の運搬者用の背が高く細長いロッジ。狭い角を塞ぐのに便利です。<color=#00FFFF>堤防として機能します</color>」"
frFR = "Un pavillon étroit et haut pour un transporteur. Utile pour barrer des coins étroits. <color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Eine hohe und schmale Lodge für einen Transporteur. Nützlich, um enge Ecken zu stauen. <color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Wysoka i wąska chata dla jednego transportera. Przydatna do tamowania wąskich zakrętów. <color=#00FFFF>Działa jak tama</color>"
ptBR = "Uma pousada alta e estreita para um transportador. Útil para represar cantos estreitos. <color=#00FFFF>Funciona como uma Barragem</color>"
koKR = "한 명의 수송자를 위한 높고 좁은 숙소입니다. 좁은 모서리를 막는 데 유용합니다. <color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Vysoká a úzká chata pro jednoho nosiče. Užitečná k zadržování úzkých rohů. <color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một ngôi nhà cao và hẹp cho một người vận chuyển. Hữu ích để chặn những góc hẹp. <color=#00FFFF>Hoạt động như một bờ kè</color>"
trTR = "Tek bir taşıyıcı için uzun ve dar bir karargah. Dar köşeleri barajlamak için yararlıdır. <color=#00FFFF>Bir Sedde olarak işler</color>"

["Lapantouflemagic.NarrowLodge.FlavorDescription"]
raw = "\"Ugh, who thought this would be livable? This gotta be an architect's work!\"\n -An engineer beaver"
status = "normal"
enUS = "\"Ugh, who thought this would be livable? This has to be an architect's work!\"  \n-An engineer beaver"
zhCN = "“呃，谁觉得这里能住？这一定是个建筑师的作品！”  \n——一只工程师海狸"
zhTW = "「唷，誰會想到這裡能住？這肯定是建築師的作品！」\n- 一隻工程師海狸"
ruRU = "\"Уф, кто подумал, что здесь можно жить? Это точно работа архитектора!\"  \n-Инженерный бобер"
jaJP = "「うわ、誰がこんなところに住めると思ったんだ？これは絶対に建築家の仕業だ！」 - エンジニアビーバー"
frFR = "\"Ugh, qui a pensé que ce serait habitable ? Cela doit être le travail d'un architecte !\"\n -Un castor ingénieur"
deDE = "\"Ugh, wer dachte, dass das hier bewohnbar wäre? Das muss ein Architektenwerk sein!\"  \n- Ein Ingenieur-Biber"
plPL = "\"Ugh, kto pomyślał, że to będzie do zamieszkania? To musi być dzieło architekta!\" -Inżynier bobrów"
ptBR = "\"Ugh, quem pensou que isso seria habitável? Isso deve ser trabalho de um arquiteto!\" - Um castor engenheiro"
koKR = "\"우웩, 누가 여기가 살만하다고 생각했을까? 분명 건축가의 작품일 거야!\"  \n- 한 엔지니어 비버"
csCZ = "\"Uf, kdo si myslel, že se tady dá žít? To musí být práce architekta!\"  \n -Inženýr bobr"
viVN = "Ôi, ai mà nghĩ đây có thể sống được nhỉ? Chắc chắn là công trình của một kiến trúc sư!\"\n -Một con beaver kỹ sư"
trTR = "\"Ugh, kim buranın yaşanılır olduğunu düşündü? Bu bir mimarın eseri olmalı!\"  \n -Bir mühendis castoru"

