["Lapantouflemagic.Statue_Lumberjack.Description"]
raw = "A statue to honor the work of Lumberjacks, without whom nothing would get built."
status = "normal"
enUS = "A statue to honor the work of Lumberjacks, without whom nothing would get built."
zhCN = "一座用于纪念伐木工人工作的雕像，没有他们，任何东西都无法建成。"
