["Lapantouflemagic.Woodupgrade_Zipline.Description"]
raw = "An upgrade module to be placed on top of an upgradable <color=#FFA500>Small Tower</color> (left) adjacent to a <color=#FF6EC7>triangle roof</color> building (right)\nA quick transportation system that no sane beaver should accept to ride on.\nEmploys<color=green> 4 haulers</color>\n<color=green>Connections: 4</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "An upgrade module to be placed on top of an upgradable <color=#FFA500>Small Tower</color> (left) adjacent to a <color=#FF6EC7>triangle roof</color> building (right).  \nA quick transportation system that no sane beaver should accept to ride on.  \nEmploys <color=green>4 haulers</color>  \n<color=green>Connections: 4</color>  \n<color=#00FFFF>Works as a Levee</color>"
zhCN = "一个可放置在可升级的<color=#FFA500>小塔</color>（左侧）顶部的升级模块，旁边是一个<color=#FF6EC7>三角屋顶</color>建筑（右侧）  \n一个正常的海狸不应该乘坐的快速运输系统。  \n需要<color=green>4名搬运工</color>  \n<color=green>连接数：4</color>  \n<color=#00FFFF>可作为堤坝使用</color>"
zhTW = "一個可安裝在可升級的<color=#FFA500>小塔</color>（左側）頂部的升級模組，鄰近於<color=#FF6EC7>三角屋頂</color>建築（右側）  \n一個任何理智的海狸都不該接受的快速運輸系統。  \n需要<color=green>4名搬運工</color>  \n<color=green>連接數量：4</color>  \n<color=#00FFFF>作為堤壩運作</color>"
ruRU = "Модуль улучшения, который устанавливается сверху на модернизируемую <color=#FFA500>малую башню</color> (слева), соседствующую со зданием с <color=#FF6EC7>треугольной крышей</color> (справа).\nБыстрая транспортная система, на которую ни один здравомыслящий бобёр не должен соглашаться садиться.\nИспользует <color=green>4 грузчика</color>\n<color=green>Соединения: 4</color>\n<color=#00FFFF>Работает как плотина</color>"
jaJP = "「アップグレード可能な<color=#FFA500>小塔</color>（左）の上に設置するためのアップグレードモジュールで、<color=#FF6EC7>三角屋根</color>の建物（右）に隣接しています。  \n常識あるビーバーが乗るべきではない迅速な輸送システムです。  \n<color=green>4人の運搬者</color>を使用します。  \n<color=green>接続数：4</color>  \n<color=#00FFFF>堤防として機能します</color>」"
frFR = "Un module de mise à niveau à placer sur un <color=#FFA500>petit tower</color> (gauche) pouvant être amélioré, adjacent à un bâtiment avec un <color=#FF6EC7>toit triangulaire</color> (droite).  \nUn système de transport rapide que aucun castor sain d'esprit ne devrait accepter d'emprunter.  \nEmploie <color=green>4 transporteurs</color>  \n<color=green>Connexions : 4</color>  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Ein Upgrade-Modul, das oben auf einem aufrüstbaren <color=#FFA500>kleinen Turm</color> (links) neben einem <color=#FF6EC7>Dach in Dreiecksform</color> (rechts) platziert werden kann.\nEin schnelles Transportsystem, das kein vernünftiger Biber akzeptieren sollte.\nBenötigt <color=green>4 Transportierer</color>\n<color=green>Verbindungen: 4</color>\n<color=#00FFFF>Funktioniert wie ein Deich</color>"
plPL = "Moduł ulepszenia do umieszczenia na szczycie ulepszanej <color=#FFA500>Małej Wieży</color> (po lewej) przylegającej do budynku z <color=#FF6EC7>trójkątnym dachem</color> (po prawej).  \nSzybki system transportowy, na którym nie powinien jeździć żaden zdrowy na umyśle bóbr.  \nWymaga<color=green> 4 nosicieli</color>  \n<color=green>Połączenia: 4</color>  \n<color=#00FFFF>Działa jako Tam</color>"
ptBR = "Um módulo de atualização a ser colocado no topo de uma <color=#FFA500>Pequena Torre</color> (esquerda) adjacente a um edifício com <color=#FF6EC7>telhado triangular</color> (direita)  \nUm sistema de transporte rápido que nenhum castor são deveria aceitar usar.  \nEmprega <color=green>4 transportadores</color>  \n<color=green>Conexões: 4</color>  \n<color=#00FFFF>Funciona como uma Barragem</color>"
koKR = "업그레이드 가능한 <color=#FFA500>작은 타워</color> (왼쪽) 위에 설치될 업그레이드 모듈로, <color=#FF6EC7>삼각 지붕</color> 건물 (오른쪽)과 인접해 있습니다.  \n정상적인 비버라면 탑승을 수락해서는 안 되는 빠른 수송 시스템입니다.  \n<color=green>4명의 운반자</color>가 필요합니다.  \n<color=green>연결: 4</color>  \n<color=#00FFFF>제방처럼 작동합니다</color>"
csCZ = "Modul upgradu, který bude umístěn na vrchu vylepšitelného <color=#FFA500>Malého Věže</color> (vlevo) vedle budovy se <color=#FF6EC7>trojcovým střechou</color> (vpravo)\nRychlý dopravní systém, na který by neměl žádný zdravý bobr přistoupit.\nZaměstnává <color=green>4 přepravce</color>\n<color=green>Napojení: 4</color>\n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một mô-đun nâng cấp để được đặt lên trên một <color=#FFA500>Tháp Nhỏ</color> (bên trái) có thể nâng cấp, bên cạnh một tòa nhà có <color=#FF6EC7>mái hình tam giác</color> (bên phải)\nMột hệ thống vận chuyển nhanh mà không con beaver nào tỉnh táo nên chấp nhận đi trên đó.\nCần <color=green>4 người chuyển hàng</color>\n<color=green>Kết nối: 4</color>\n<color=#00FFFF>Có chức năng như một Đê</color>"
trTR = "Bir <color=#FFA500>Küçük Kule</color> (solda) üzerine yerleştirilecek yükseltme modülü, yanında bir <color=#FF6EC7>üçgen çatı</color> binası (sağda) bulunmaktadır.  \nAkıllı bir kunduzun asla bindiği bir hızlı taşıma sistemi.  \n<color=green>4 yükleyici</color> kullanır.  \n<color=green>Bağlantılar: 4</color>  \n<color=#00FFFF>Bir Set gibi çalışır</color>"

