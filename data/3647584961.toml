["Lapantouflemagic.ClockWorkKitchen.Description"]
raw = "A complex device that masterfully transforms mechanical power and raw food into tasty stuff. \nOccasionally breaks a gear.\nOccasionally cooks a beaver.\n<color=red>Power must be provided from underneath the small construction site flag</color>"
status = "normal"
enUS = "A complex device that masterfully transforms mechanical power and raw food into tasty stuff. Occasionally breaks a gear. Occasionally cooks a beaver. <color=red>Power must be provided from underneath the small construction site flag</color>"
zhCN = "一个复杂的装置，巧妙地将机械能和生食转化为美味的东西。 \n偶尔会损坏一个齿轮。 \n偶尔会煮一只海狸。 \n<color=red>必须从小建筑工地旗帜下方提供电力</color>"
zhTW = "一個複雜的裝置，巧妙地將機械能和原料轉換成美味的食物。  \n偶爾會損壞一個齒輪。  \n偶爾會烹煮一隻海狸。  \n<color=red>必須從小建築工地旗幟的下方提供電力</color>"
ruRU = "Сложное устройство, которое мастерски преобразует механическую энергию и сырую еду в вкусные вещи. \nИногда ломает шестеренку. \nИногда готовит бобра. \n<color=red>Энергия должна поступать снизу маленького флага строительного участка</color>"
jaJP = "「機械的な力と生の食材を美味しいものに変える、複雑な装置。時折、歯車が壊れます。時折、ビーバーを調理します。<color=red>電力は小さな建設現場の旗の下から供給する必要があります</color>」"
frFR = "Un dispositif complexe qui transforme de manière magistrale la puissance mécanique et la nourriture brute en délicieuses choses. \nRisque de casser un rouage de temps en temps.\nRisque de cuire un castor de temps en temps.\n<color=red>Une alimentation doit être fournie depuis le dessous du petit drapeau du chantier</color>"
deDE = "Ein komplexes Gerät, das mechanische Energie und rohe Nahrung meisterhaft in schmackhafte Speisen verwandelt. \nGelegentlich bricht ein Zahnrad.\nGelegentlich kocht es einen Biber.\n<color=red>Die Energie muss von unten an der kleinen Baustellenflagge bereitgestellt werden</color>"
plPL = "Złożone urządzenie, które mistrzowsko przekształca moc mechaniczną i surowe jedzenie w smaczne dania. \nOd czasu do czasu psuje zębatkę.\nOd czasu do czasu gotuje bobra.\n<color=red>Moc musi być dostarczana z dołu małego flagi budowy</color>"
ptBR = "Um dispositivo complexo que transforma de forma magistral a energia mecânica e alimentos crus em coisas saborosas. \nOcasionalmente quebra uma engrenagem. \nOcasionalmente cozinha um castor. \n<color=red>A energia deve ser fornecida debaixo da pequena bandeira do canteiro de obras</color>"
koKR = "기계적 힘과 원시 음식을 맛있는 것으로 능숙하게 변환하는 복잡한 장치입니다. \n가끔 기어가 부서집니다.\n가끔 비버를 요리합니다.\n<color=red>전원은 작은 건설 현장 깃발 아래에서 공급되어야 합니다</color>"
csCZ = "Složitý přístroj, který mistrovsky přetváří mechanickou energii a surové jídlo na chutné pokrmy. \nObčas se rozbije ozubené kolo.\nObčas uvaří bobra.\n<color=red>Energií musí být zásobováno zespodu malé vlajky stavebního místa</color>"
viVN = "Một thiết bị phức tạp biến đổi một cách tài tình sức mạnh cơ học và thực phẩm thô thành những món ăn ngon. \nThỉnh thoảng làm hỏng một bánh răng.\nThỉnh thoảng nấu chín một con hải ly.\n<color=red>Nguồn năng lượng phải được cung cấp từ dưới cờ của công trường nhỏ</color>"
trTR = "Mekanik gücü ve ham gıdayı lezzetli şeylere ustaca dönüştüren karmaşık bir cihaz. \nAra sıra bir dişli bozulur. \nAra sıra bir kunduz pişirir. \n<color=red>Küçük inşaat sahası bayrağının altından güç sağlanmalıdır</color>"

