["Lapantouflemagic.HoomanMedicalFacility.Description"]
raw = "Reactivates a hooman medical facility of incomprehensible complexity.\n<color=#FF6EC7>How could a species so advanced go exctinctxa0? This device is capable of improving our bodies to make us stronger, faster, healthier, and can cure pretty much anythingxa0!</color>"
status = "normal"
enUS = "Reactivates a human medical facility of incomprehensible complexity. <color=#FF6EC7>How could a species so advanced go extinct? This device is capable of improving our bodies to make us stronger, faster, healthier, and can cure pretty much anything!</color>"
zhCN = "“重新激活一个复杂程度不可理解的人类医疗设施。\n<color=#FF6EC7>一个如此先进的物种怎么会灭绝呢？这个装置能够改善我们的身体，使我们更强壮、更快、更健康，几乎可以治愈任何疾病！</color>”"
zhTW = "重新啟動一個無法理解的複雜人類醫療設施。  \n<color=#FF6EC7>這麼進化的物種怎麼可能會滅絕呢？這個裝置能改善我們的身體，使我們更強壯、更迅速、更健康，幾乎可以治癒任何疾病！</color>"
ruRU = "Реактивирует медицинское учреждение людей непостижимой сложности.  \n<color=#FF6EC7>Как такой продвинутый вид мог вымереть? Это устройство способно улучшить наши тела, сделать нас сильнее, быстрее, здоровее и может вылечить почти что угодно!</color>"
jaJP = "「理解できない複雑さを持つ人間の医療施設を再稼働させます。<color=#FF6EC7>どのようにしてこんなに進んだ種族が滅びることができるのでしょうか？この装置は私たちの身体を改善し、より強く、より速く、より健康にし、ほぼすべての病気を治すことができますxa0!</color>」"
frFR = "Réactive une installation médicale hooman d'une complexité incompréhensible.  \n<color=#FF6EC7>Comment une espèce si avancée a-t-elle pu s'éteindre ? Cet appareil est capable d'améliorer nos corps pour nous rendre plus forts, plus rapides, en meilleure santé, et peut guérir presque tout !</color>"
deDE = "Reaktiviert eine hooman medizinische Einrichtung von unbeschreiblicher Komplexität. <color=#FF6EC7>Wie konnte eine so fortschrittliche Spezies aussterben? Dieses Gerät ist in der Lage, unsere Körper zu verbessern, um uns stärker, schneller, gesünder zu machen und kann so ziemlich alles heilen!</color>"
plPL = "Reaktywuje ludzką placówkę medyczną o niepojętej złożoności.  \n<color=#FF6EC7>Jak mogła tak zaawansowana istota wymrzeć? To urządzenie jest w stanie poprawić nasze ciała, czyniąc nas silniejszymi, szybszymi, zdrowszymi i może wyleczyć praktycznie wszystko!</color>"
ptBR = "Reativa uma instalação médica hooman de complexidade incompreensível.  \n<color=#FF6EC7>Como uma espécie tão avançada pode ter se extinguido? Este dispositivo é capaz de melhorar nossos corpos para nos tornar mais fortes, mais rápidos, mais saudáveis, e pode curar praticamente qualquer coisa!</color>"
koKR = "이해할 수 없는 복잡성의 인류 의료 시설을 재가동합니다. <color=#FF6EC7>어떻게 이렇게 발전된 종이 멸종할 수 있었을까요? 이 장치는 우리의 몸을 개선하여 더 강하고 빠르며 건강하게 만들어주고, 거의 모든 것을 치료할 수 있습니다!</color>"
csCZ = "Reaktivuje lidské zdravotnické zařízení nepochopitelné složitosti. <color=#FF6EC7>Jak mohla tak pokročilá rasa vyhynout? Tento přístroj je schopen zlepšit naše těla, aby byla silnější, rychlejší, zdravější, a dokáže vyléčit prakticky cokoliv!</color>"
viVN = "Đưa vào hoạt động một cơ sở y tế của con người có độ phức tạp không thể hiểu nổi.\n<color=#FF6EC7>Làm thế nào mà một loài tiên tiến như vậy lại có thể tuyệt chủng? Thiết bị này có khả năng cải thiện cơ thể chúng ta để làm cho chúng ta mạnh mẽ hơn, nhanh hơn, khỏe mạnh hơn, và có thể chữa hầu hết mọi thứ!</color>"
trTR = "Anlaşılmaz karmaşıklıkta bir insana ait tıbbi tesisi yeniden etkinleştirir.\n<color=#FF6EC7>Bu kadar ileri teknolojiye sahip bir tür nasıl yok olabilir? Bu cihaz bedenlerimizi güçlendirmek, hızlandırmak, sağlıklı hale getirmek ve neredeyse her şeyi iyileştirmek için tasarlanmıştır!</color>"

["Lapantouflemagic.HoomanMedicalFacility.FlavorDescription"]
raw = "\"Don’t kill your ennemies… outlive themxa0!\"\n-Ancient hooman motivation poster"
status = "normal"
enUS = "\"Don’t kill your enemies… outlive them!\"  \n-Ancient human motivation poster"
zhCN = "“不要杀死你的敌人……活过他们！\"\n- 古老的人类激励海报"
