enUS = "Half a sequoia artistically hafted to another to extend it. Side platforms can be attached to it."
zhCN = "“半棵红杉艺术性地插在另一棵红杉上以延长它。可以在其上附加侧平台。”"
zhTW = "半棵紅杉藝術性地夾在另一棵上，以延伸其長度。 \n側平台可以附加在上面。"
ruRU = "Полусеквойя, художественно вставленная в другую, чтобы удлинить ее. \nК ней можно прикрепить боковые платформы."
jaJP = "「他のセコイアに芸術的に取り付けられた半分のセコイア。 \n側面にプラットフォームを取り付けることができます。」"
frFR = "Moitié d'un séquoia artistiquement assemblé à un autre pour l'allonger. \nDes plateformes latérales peuvent y être attachées."
deDE = "Eine halbierte Sequoia, kunstvoll in eine andere eingeklemmt, um sie zu verlängern. \nSeitenplattformen können daran befestigt werden."
plPL = "Pół sekwoi artystycznie przymocowanej do drugiej, aby ją wydłużyć. \nMogą być do niej przymocowane boczne platformy."
ptBR = "Metade de uma sequoia artisticamente unida a outra para estendê-la. \nPlataformas laterais podem ser anexadas a ela."
koKR = "한쪽은 세쿼이아 나무를 예술적으로 연결하여 길게 만든 것입니다. \n측면 플랫폼도 부착할 수 있습니다."
csCZ = "Polovina sekvoje umělecky spojena s další, aby ji prodloužila. \nNa ni je možné připevnit boční platformy."
viVN = "Một nửa cây sequoia được gắn nghệ thuật vào một cây khác để mở rộng nó.  \nCác nền tảng bên có thể được gắn vào nó."
trTR = "Diğer bir sekoya ağacına sanatsal bir şekilde eklenmiş yarım bir sekoya. \nYan platformlar buna eklenebilir."

