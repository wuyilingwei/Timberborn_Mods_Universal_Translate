["Lapantouflemagic.TriangleGatheringHouse.Description"]
raw = "A reworked farmhouse used by a group of harvester beavers to meet and split work efficiently.\nHas a <color=#FF6EC7>triangle roof</color>, <color=#FF6EC7>Can support upgrades</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A reworked farmhouse used by a group of harvester beavers to meet and split work efficiently. Has a <color=#FF6EC7>triangle roof</color>, <color=#FF6EC7>can support upgrades</color> <color=#00FFFF>works as a levee</color>"
zhCN = "“重新设计的农舍，由一群收割海狸使用，旨在高效地聚会和分配工作。\n拥有一个<color=#FF6EC7>三角屋顶</color>，<color=#FF6EC7>可以支持升级</color>\n<color=#00FFFF>可作为堰坝使用</color>”"
zhTW = "一座重新設計的農舍，供一群採收海狸會議並高效分工使用。  \n擁有一個<color=#FF6EC7>三角屋頂</color>，<color=#FF6EC7>可以支持升級</color>  \n<color=#00FFFF>能作為壩子使用</color>"
ruRU = "Переделанный фермерский дом, используемый группой бобров-собирателей для эффективного объединения и распределения работы.\nИмеет <color=#FF6EC7>треугольную крышу</color>, <color=#FF6EC7>может поддерживать апгрейды</color>\n<color=#00FFFF>Работает как дамба</color>"
jaJP = "集中的に作業を分担するために収穫ビーバーのグループによって使用される改良された農家。\n<color=#FF6EC7>三角屋根</color>を持ち、<color=#FF6EC7>アップグレードをサポート</color>\n<color=#00FFFF>堤防として機能</color>"
frFR = "Une ferme retravaillée utilisée par un groupe de castors récolteurs pour se retrouver et diviser le travail de manière efficace.  \nDispose d'un <color=#FF6EC7>toit en triangle</color>, <color=#FF6EC7>peut supporter des améliorations</color>  \n<color=#00FFFF>Fonctionne comme une levée</color>"
deDE = "Ein überarbeitetes Bauernhaus, das von einer Gruppe von Erntebibern genutzt wird, um sich zu treffen und die Arbeit effizient aufzuteilen. Hat ein <color=#FF6EC7>Dach in Form eines Dreiecks</color>, <color=#FF6EC7>Kann Upgrades unterstützen</color> <color=#00FFFF>Funktioniert als Damm</color>"
plPL = "Przerobiona wiejska chata używana przez grupę bobrów zbieraczy do spotykania się i efektywnego podziału pracy.\nMa <color=#FF6EC7>trójkątny dach</color>, <color=#FF6EC7>może wspierać ulepszenia</color>\n<color=#00FFFF>działa jako wał</color>"
ptBR = "Uma casa de fazenda reformulada usada por um grupo de castores coletores para se encontrar e dividir o trabalho de maneira eficiente.  \nPossui um <color=#FF6EC7>telhado triangular</color>, <color=#FF6EC7>Pode suportar melhorias</color>  \n<color=#00FFFF>Funciona como uma Barragem</color>"
koKR = "수확 비버 무리가 효율적으로 모이고 작업을 나누기 위해 사용하는 재구성된 농가입니다. <color=#FF6EC7>삼각형 지붕</color>이 있으며, <color=#FF6EC7>업그레이드를 지원할 수 있습니다</color>. <color=#00FFFF>제방 역할을 합니다</color>"
csCZ = "Předělaný statek používaný skupinou bobrů sběračů, aby se setkávali a efektivně rozdělovali práci. Má <color=#FF6EC7>trojúhelníkovou střechu</color>, <color=#FF6EC7>může podporovat vylepšení</color> <color=#00FFFF>funguje jako hráz</color>"
viVN = "Một ngôi nhà nông trại được cải tiến, được sử dụng bởi một nhóm hải ly hái lúa để gặp gỡ và chia sẻ công việc một cách hiệu quả. \nCó một <color=#FF6EC7>mái nhà hình tam giác</color>, <color=#FF6EC7>Có thể hỗ trợ nâng cấp</color>\n<color=#00FFFF>Hoạt động như một đê</color>"
trTR = "Verimli bir şekilde buluşmak ve çalışmayı bölmek için bir grup hasatçı kunduz tarafından kullanılan yeniden düzenlenmiş bir çiftlik evi. \n<color=#FF6EC7>Üçgen çatısı</color> var, <color=#FF6EC7>geliştirmeleri destekleyebilir</color>\n<color=#00FFFF>Dışkı işlevi görür</color>"

["Lapantouflemagic.TriangleGatheringHouse.FlavorDescription"]
raw = "\"Don't you dare come in my house covered in dirt and berry juice! Get a shower first or I'll toss you in the river myself!\"\n -Mommy beaver, every evening."
status = "normal"
enUS = "\"Don't you dare come in my house covered in dirt and berry juice! Get a shower first or I'll toss you in the river myself!\"  \n -Mommy beaver, every evening."
zhCN = "“你敢脏兮兮地进我家，沾满泥土和浆果汁吗！先去洗澡，否则我就亲自把你扔进河里！”  \n— 妈妈海狸，每个傍晚。"
zhTW = "「你要是敢全身沾滿泥巴和莓果汁就進我的家，就等著受罰吧！先去洗澡，不然我就把你扔進河裡！」  \n— 媽媽河狸，每晚都這樣說。"
ruRU = "\"Не смей входить в мой дом, покрытый грязью и ягодным соком! Сначала примите душ, или я сама выброшу вас в реку!\"  \n-Мама-бобер, каждый вечер."
jaJP = "「汚れやベリーの汁をかぶったまま、私の家に入るなんて許さないわ！まずシャワーを浴びなさい、さもなければ自分で川に投げ込むから！」\n - お母さんビーバー、毎晩。"
frFR = "Ne t'avise pas d'entrer chez moi couvert de saleté et de jus de baies ! Prends une douche d'abord ou je te jetterai moi-même dans la rivière !\"  \n-Мamie castor, chaque soir."
deDE = "„Komm mir ja nicht schmutzig und mit Beerensaft bedeckt in mein Haus! Mach erst eine Dusche oder ich werfe dich selbst in den Fluss!“  \n- Mama Biber, jeden Abend."
plPL = "\"Nie waś się zbliżać do mojego domu brudny i umazany sokiem z jagód! Najpierw weź prysznic, inaczej sam cię wrzucę do rzeki!\" - Mama bobrów, każdego wieczoru."
ptBR = "\"Não se atreva a entrar na minha casa coberto de terra e suco de fruta! Tome um banho primeiro ou eu mesma te jogo no rio!\" - Mamãe castor, todas as noites."
koKR = "\"내 집에 더럽고 베리 주스 묻은 채 들어오지 마! 먼저 샤워하고 오든지, 내가 너를 직접 강에 던져버릴 거야!\"  \n- 엄마 비버, 매일 저녁."
csCZ = "\"Nepadni k nám do domu pokrytý špínou a džusem z bobulí! Nejdřív se osprchuj, nebo tě sám hodím do řeky!\"  \n- Maminka bobřice, každé večer."
viVN = "Đừng có liều mình vào nhà tôi với bộ dạng bẩn thỉu và đầy nước trái cây! Hãy tắm rửa trước khi tôi quăng bạn xuống sông đó!\"\n - Bà beaver, mỗi tối."
trTR = "Kir ve meyve suyu içinde evime girmeye cüret etme! Önce bir duş al yoksa seni nehirden atarım!\"  \n -Anne kunduz, her akşam."

["Lapantouflemagic.NEWFarmhouse.Description"]
raw = "Employs a farmer that plant and harvest crops.\nHas a <color=#FF6EC7>triangle roof</color>, <color=#FF6EC7>Can support upgrades</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "Employs a farmer who plants and harvests crops. Has a <color=#FF6EC7>triangle roof</color>, <color=#FF6EC7>can support upgrades</color> <color=#00FFFF>works as a levee</color>"
zhCN = "雇用一名农民来种植和收获作物。\n有一个<color=#FF6EC7>三角屋顶</color>，<color=#FF6EC7>可以支持升级</color>\n<color=#00FFFF>作为堤坝使用</color>"
zhTW = "僱用一名農夫來種植和收穫作物。  \n擁有一個<color=#FF6EC7>三角屋頂</color>，<color=#FF6EC7>可以支持升級</color>  \n<color=#00FFFF>作為堤壩運作</color>"
ruRU = "Занимается фермером, который сажает и harvest урожай.\nИмеет <color=#FF6EC7>треугольную крышу</color>, <color=#FF6EC7>может поддерживать улучшения</color>\n<color=#00FFFF>Работает как дамба</color>"
jaJP = "「作物を植え、収穫する農夫を雇用します。\n<color=#FF6EC7>三角屋根</color>を持ち、<color=#FF6EC7>アップグレードをサポートできます</color>\n<color=#00FFFF>堤防として機能します</color>」"
frFR = "Emploie un agriculteur qui plante et récolte des cultures.  \nA un <color=#FF6EC7>toit en triangle</color>, <color=#FF6EC7>peut supporter des améliorations</color>  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Beschäftigt einen Bauern, der Pflanzen anbaut und erntet.  \nHat ein <color=#FF6EC7>Dach in Dreiecksform</color>, <color=#FF6EC7>kann Upgrades unterstützen</color>  \n<color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Zatrudnia rolnika, który sadzi i zbiera plony. Posiada <color=#FF6EC7>trójkątny dach</color>, <color=#FF6EC7>może wspierać ulepszenia</color> <color=#00FFFF>działa jako wał</color>"
ptBR = "Emprega um agricultor que planta e colhe culturas.\nPossui um <color=#FF6EC7>telhado triangular</color>, <color=#FF6EC7>pode suportar melhorias</color>\n<color=#00FFFF>Funciona como um Dique</color>"
koKR = "작물을 심고 수확하는 농부를 고용합니다.\n<color=#FF6EC7>삼각형 지붕</color>을 가지고 있으며, <color=#FF6EC7>업그레이드를 지원합니다</color>\n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Zaměstnává farmáře, který sází a sklízí plodiny. Má <color=#FF6EC7>trojúhelníkovou střechu</color>, <color=#FF6EC7>může podporovat vylepšení</color> <color=#00FFFF>funguje jako hráz</color>"
viVN = "Thuê một nông dân trồng và thu hoạch cây trồng. \nCó một <color=#FF6EC7>mái nhà hình tam giác</color>, <color=#FF6EC7>Có thể hỗ trợ nâng cấp</color> \n<color=#00FFFF>Hoạt động như một Đê</color>"
trTR = "Tarım yapan ve mahsulleri toplayan bir çiftçi istihdam eder. \nBir <color=#FF6EC7>üçgen çatı</color>ya sahiptir, <color=#FF6EC7>geliştirmeleri destekleyebilir</color> \n<color=#00FFFF>Dolgu olarak çalışır</color>"

["Lapantouflemagic.Woodupgrade.Description"]
raw = "An upgrade module to be placed on top of an upgradable <color=#FFA500>Small Tower</color> (left) adjacent to a <color=#FF6EC7>triangle roof</color> building (right).\nEmploys <color=green>10 Haulers</color>\".\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "An upgrade module to be placed on top of an upgradable <color=#FFA500>Small Tower</color> (left) adjacent to a <color=#FF6EC7>triangle roof</color> building (right). Employs <color=green>10 Haulers</color>. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一个升级模块，可以放置在可升级的<color=#FFA500>小塔</color>（左侧）上，邻接一个<color=#FF6EC7>三角屋顶</color>建筑（右侧）。  \n雇佣<color=green>10名搬运工</color>。  \n<color=#00FFFF>作为堤坝使用</color>"
zhTW = "一個升級模組，可放置在可升級的<color=#FFA500>小塔樓</color>（左側）上，並鄰接<color=#FF6EC7>三角屋頂</color>建築（右側）。 \n需要<color=green>10名搬運工</color>。 \n<color=#00FFFF>作為堤壩運作</color>"
ruRU = "Модуль улучшения, который нужно разместить на верхней части усовершенствуемой <color=#FFA500>Небольшой Башни</color> (слева), примыкающей к зданию с <color=#FF6EC7>треугольной крышей</color> (справа).\nИспользует <color=green>10 Грузчиков</color>.\n<color=#00FFFF>Работает как плотина</color>"
jaJP = "アップグレード可能な<color=#FFA500>小塔</color>（左）の上に設置するアップグレードモジュールで、<color=#FF6EC7>三角屋根</color>の建物（右）に隣接しています。  \n<color=green>10人の運び屋</color>を使用します。  \n<color=#00FFFF>堤防として機能します</color>。"
frFR = "Un module de mise à niveau à placer sur le dessus d'une <color=#FFA500>Petite Tour</color> (gauche) adjacente à un bâtiment avec un toit en <color=#FF6EC7>triangle</color> (droite). \nEmploie <color=green>10 Transporteurs</color>. \n<color=#00FFFF>Fonctionne comme un Lieu d'Élevage</color>"
deDE = "Ein Upgrade-Modul, das auf einem aufrüstbaren <color=#FFA500>Kleinen Turm</color> (links) platziert werden kann, der an einem Gebäude mit <color=#FF6EC7>Dreiecks-Dach</color> (rechts) angrenzt. \nEinsatz von <color=green>10 Transporteuren</color>.\" \n<color=#00FFFF>Funktioniert wie ein Deich</color>"
plPL = "Moduł ulepszenia do umieszczenia na górze ulepszanej <color=#FFA500>Małej Wieży</color> (po lewej), przylegającej do budynku z <color=#FF6EC7>trójkątnym dachem</color> (po prawej). Wymaga <color=green>10 Zbieraczy</color>. <color=#00FFFF>Działa jako wał</color>."
ptBR = "Um módulo de upgrade para ser colocado em cima de uma <color=#FFA500>Pequena Torre</color> (à esquerda) adjacente a um prédio com <color=#FF6EC7>telhado triangular</color> (à direita).\nEmprega <color=green>10 Transportadores</color> \n<color=#00FFFF>Funciona como um dique</color>"
koKR = "업그레이드 가능한 <color=#FFA500>작은 탑</color> (왼쪽) 위에 배치될 업그레이드 모듈로, <color=#FF6EC7>삼각형 지붕</color> 건물 (오른쪽)과 인접해 있습니다. <color=green>10명의 하울러</color>를 이용합니다. <color=#00FFFF>제방처럼 작동합니다</color>"
csCZ = "Modul pro vylepšení, který se umisťuje na vrchol vylepšitelné <color=#FFA500>Malé věže</color> (vlevo) sousedící s budovou se <color=#FF6EC7>trojúhelníkovou střechou</color> (vpravo).  \nZaměstnává <color=green>10 nosičů</color>.  \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một mô-đun nâng cấp được đặt lên một <color=#FFA500>Tháp Nhỏ</color> (bên trái) có thể nâng cấp, liền kề với một tòa nhà có <color=#FF6EC7>mái hình tam giác</color> (bên phải).  \nSử dụng <color=green>10 Người Vận Chuyển</color>.  \n<color=#00FFFF>Hoạt động như một Đê</color>"
trTR = "Yükseltilebilen <color=#FFA500>Küçük Kule</color> (solda) üzerine yerleştirilecek bir yükseltme modülü, <color=#FF6EC7>üçgen çatı</color> binasına (sağıda) bitişik. <color=green>10 Taşıyıcı</color> istihdam eder. <color=#00FFFF>Düzenek olarak çalışır</color>"

