["Lapantouflemagic.NuclearWaterCollector.Description"]
raw = "Allows the power plant to connect to the power network and start operating.\nCooling water pumped from the aquifer by the reactor is released from above.\n<color=green>The source never runs dry and is not affected by badtides.</color>"
status = "normal"
enUS = "Allows the power plant to connect to the power network and start operating. Cooling water pumped from the aquifer by the reactor is released from above. <color=green>The source never runs dry and is not affected by badtides.</color>"
zhCN = "“允许发电厂连接到电力网络并开始运行。  \n从反应堆抽取的冷却水从上方排出。  \n<color=green>水源源源不断，不受潮汐影响。</color>”"
zhTW = "允許發電廠連接到電力網絡並開始運行。\n由反應堆從水層抽取的冷卻水從上方釋放。\n<color=green>水源永遠不會枯竭，且不受壞潮影響。</color>"
ruRU = "Позволяет электростанции подключаться к электросети и начинать работу. Охлаждающая вода, откачиваемая из водоносного слоя реактором, сбрасывается сверху. <color=green>Источник никогда не исчерпывается и не подвержен влиянию плохих приливов.</color>"
jaJP = "発電所が電力ネットワークに接続し、運転を開始することを許可します。\n反応炉によって地下水脈からポンプで汲み上げられた冷却水は上から放出されます。\n<color=green>水源は決して枯渇せず、悪潮の影響を受けません。</color>"
frFR = "Permet à la centrale électrique de se connecter au réseau électrique et de commencer à fonctionner.\nL'eau de refroidissement pompée depuis l'aquifère par le réacteur est libérée par le haut.\n<color=green>La source ne s'épuise jamais et n'est pas affectée par les marées négatives.</color>"
deDE = "Ermöglicht dem Kraftwerk, sich mit dem Stromnetz zu verbinden und zu starten.\nKühlwasser, das vom Aquiferen durch den Reaktor gepumpt wird, wird von oben freigesetzt.\n<color=green>Die Quelle läuft niemals trocken und ist nicht von schlechten Gezeiten betroffen.</color>"
plPL = "Pozwala elektrowni na połączenie z siecią energetyczną i rozpoczęcie pracy. Woda chłodząca pompowana z wód gruntowych przez reaktor jest uwalniana z góry. <color=green>Źródło nigdy się nie wyczerpuje i nie jest dotknięte złymi przypływami.</color>"
ptBR = "Permite que a usina se conecte à rede elétrica e comece a operar.  \nÁgua de refrigeração bombeada do aquífero pelo reator é liberada de cima.  \n<color=green>A fonte nunca seca e não é afetada por marés ruins.</color>"
koKR = "발전소가 전력망에 연결되고 운영을 시작할 수 있도록 합니다.\n반응기에 의해 대수층에서 펌프된 냉각수가 위쪽에서 배출됩니다.\n<color=green>물 공급원이 고갈되지 않으며 불리한 조수의 영향을 받지 않습니다.</color>"
csCZ = "Umožňuje elektrárně připojit se k energetické síti a začít fungovat. Chladicí voda čerpaná z aquiferu reaktorem je uvolňována shora. <color=green>Zdroj se nikdy nevyčerpá a není ovlivněn špatnými přílivy.</color>"
viVN = "Cho phép nhà máy điện kết nối với mạng lưới điện và bắt đầu hoạt động. Nước làm mát được bơm từ tầng chứa nước bởi lò phản ứng được thải ra từ trên cao. <color=green>Nguồn nước không bao giờ cạn kiệt và không bị ảnh hưởng bởi thủy triều xấu.</color>"
trTR = "Elektrik santralinin enerji şebekesine bağlanmasını ve çalışmaya başlamasını sağlar. Reaktör tarafından su kaynağından pompalanan soğutma suyu yukarıdan salınır. <color=green>Kaynak asla tükenmez ve kötü dalgalardan etkilenmez.</color>"

["Lapantouflemagic.NuclearWaterCollector.FlavorDescription"]
raw = "\"Without the metal floor up there to dissipate heat, this would be boiling hot!\""
status = "normal"
enUS = "\"Without the metal floor up there to dissipate heat, this would be boiling hot!\""
zhCN = "“要不是上面的金属地板散热，这里就热得要命！”"
zhTW = "「如果沒有上面的金屬地板來散熱，這裡會熱得像在煮沸一樣！」"
ruRU = "\"Без металлического пола там наверху, чтобы рассеивать тепло, это было бы кипятком!\""
jaJP = "「上に金属の床がなければ、これは沸騰しているでしょう！」"
frFR = "Sans le sol en métal là-haut pour dissiper la chaleur, ce serait brûlant !"
deDE = "\"Ohne den Metallboden dort oben, um die Wärme abzuleiten, wäre das kochend heiß!\""
plPL = "Bez metalowej podłogi tam na górze, aby rozpraszać ciepło, byłoby tu wrząco!"
ptBR = "\"Sem o chão de metal lá em cima para dissipar o calor, isso estaria fervendo!\""
koKR = "\"거기 위에 열을 분산시킬 금속 바닥이 없다면, 이건 뜨거운 물이 되었을 것이다!\""
csCZ = "\"Bez kovové podlahy nahoře, která by odváděla teplo, by to tu bylo vařící horko!\""
viVN = "Nếu không có sàn kim loại ở trên đó để tán nhiệt, chỗ này sẽ nóng bỏng!"
trTR = "Orada ısıyı dağıtacak metal zemin olmasaydı, burası kaynayan ateş gibi olurdu!"

["Lapantouflemagic.NuclearReactor3.DisplayName"]
raw = "Abyssal Nuclear Reactor"
