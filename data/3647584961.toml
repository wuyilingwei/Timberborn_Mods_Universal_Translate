["Lapantouflemagic.WarmStorageBase.Description"]
raw = "A wood-consuming storage structure meant to hold and keep warm a large amount of cooked food."
status = "normal"
enUS = "A wood-consuming storage structure meant to hold and keep warm a large amount of cooked food."
zhCN = "一种木材消耗型存储结构，旨在保存和保持大量熟食的温暖。"
zhTW = "一個消耗木材的儲存結構，旨在儲存和保溫大量熟食。"
ruRU = "Hранилище, потребляющее древесину, предназначенное для хранения и поддержания тепла большого количества приготовленной пищи."
jaJP = "「調理された大量の食料を保持し、温めておくために設計された木材消費型の貯蔵構造です。」"
frFR = "Une structure de stockage consommant du bois destinée à conserver et garder au chaud une grande quantité de nourriture cuite."
deDE = "Eine holzfressende Speicherstruktur, die dazu dient, eine große Menge gekochter Nahrung zu lagern und warm zu halten."
plPL = "Struktura magazynowa zużywająca drewno, przeznaczona do przechowywania i podtrzymywania ciepła dużej ilości ugotowanej żywności."
ptBR = "Uma estrutura de armazenamento que consome madeira, destinada a guardar e manter aquecido uma grande quantidade de comida cozida."
koKR = "조리된 음식을 대량으로 보관하고 따뜻하게 유지하기 위해 설계된 나무 소비 저장 구조물입니다."
csCZ = "Skladovací struktura spotřebovávající dřevo, určená k uchovávání a udržování velkého množství uvařeného jídla v teple."
viVN = "Một cấu trúc lưu trữ tiêu thụ gỗ, dùng để giữ ấm và lưu trữ một lượng lớn thực phẩm đã nấu chín."
trTR = "Birçok pişirilmiş yiyeceği tutmak ve sıcak tutmak üzere tasarlanmış, odun tüketen bir depolama yapısı."

["Lapantouflemagic.WarmStorageBase.FlavorDescription"]
raw = "\"Apparently the hoomans used to say that every good game needs a paw-shaped building. But why did we decide to build that in real life?\"\n -Mathilda, pre-insanity days."
status = "normal"
enUS = "\"Apparently the humans used to say that every good game needs a paw-shaped building. But why did we decide to build that in real life?\"  \n-Mathilda, pre-insanity days."
zhCN = "“显然，胡曼们曾经说过，每个好游戏需要一个爪子形状的建筑。但我们为什么决定在现实中建造这个呢？”  \n- 马蒂尔达，疯狂之前的日子。"
zhTW = "“顯然，這些人類曾經說過每個好遊戲都需要一個爪形的建築。但為什麼我們決定在現實中建造它呢？”  \n- 馬提爾達，理智未失的日子。"
ruRU = "\"Очевидно, что люди когда-то говорили, что каждой хорошей игре нужно здание в форме лапы. Но почему мы решили построить это в реальной жизни?\"  \n-Матильда, до безумия."
jaJP = "「どうやらホーマンたちは、すべての良いゲームには爪の形をした建物が必要だと言っていたようです。でも、なぜ私たちはそれを現実に建てることにしたのでしょうか？」  \n-マチルダ、正気を保っていた頃。"
frFR = "\"Apparemment, les humains disaient qu'un bon jeu a besoin d'un bâtiment en forme de patte. Mais pourquoi avons-nous décidé de construire cela dans la vraie vie ?\"  \n-Mathilda, à l'époque d'avant la folie."
deDE = "\"Offenbar sagten die Hooman, dass jedes gute Spiel ein pfotenförmiges Gebäude braucht. Aber warum haben wir uns entschieden, das im echten Leben zu bauen?\" -Mathilda, in ihren Tagen vor dem Wahnsinn."
plPL = " podobno hoomani mówili, że każda dobra gra potrzebuje budynku w kształcie łapy. Ale dlaczego zdecydowaliśmy się to zbudować w prawdziwym życiu?\"  \n-Mathilda, w czasach przed szaleństwem."
ptBR = "Segundo os hoomans, toda boa construção precisa de um edifício em forma de pata. Mas por que decidimos construir isso na vida real?\"  \n -Mathilda, dias antes da insanidade."
koKR = "\"분명히 인간들은 모든 좋은 게임에는 발 모양의 건물이 필요하다고 말하곤 했습니다. 그런데 우리는 왜 실제로 그렇게 건설하기로 결정했을까요?\"  \n- 마틸다, 광기 이전의 시절."
csCZ = "Prý lidé říkali, že každá dobrá hra potřebuje budovu ve tvaru tlapky. Ale proč jsme se rozhodli to postavit v reálném životě?\" -Mathilda, předdobou šílenství."
viVN = "\"Rõ ràng là những người hoomans thường nói rằng mỗi trò chơi hay cần một tòa nhà hình bàn chân. Nhưng tại sao chúng ta lại quyết định xây dựng điều đó trong đời thực?\"  \n-Mathilda, những ngày trước khi điên rồ."
trTR = "Anlaşılan insanların her iyi oyunun bir patik şeklinde binaya ihtiyaç duyduğunu söyledikleri. Ama bunu gerçek hayatta neden inşa etmeye karar verdik?\"  \n-Mathilda, akıl sağlığının yerinde olduğu günlerde."

