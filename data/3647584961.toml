["Lapantouflemagic.FarmUpgradeA.FlavorDescription"]
raw = "\"Working from home can sure be convenient, but once you start to have kits running around everywhere, a separate office is much better\"\n -A builder beaver"
status = "normal"
enUS = "\"Working from home can sure be convenient, but once you start to have kits running around everywhere, a separate office is much better.\"  \n-A builder beaver"
zhCN = "“在家工作确实很方便，但一旦小鼹鼠到处乱跑，单独的办公室就要好得多。”  \n- 一只建造者海狸"
zhTW = "「在家工作確實方便，但一旦小狐狸到處亂跑，擁有一個獨立的辦公室就好多了。」  \n— 一隻建築海狸"
ruRU = "«Работа из дома может быть очень удобной, но как только у вас начинают бегать повсюду детеныши, отдельный офис становится гораздо лучше.»  \n- Строитель-бобёр"
jaJP = "「自宅での作業は確かに便利ですが、子どもたちがあちこちに走り回り始めると、別のオフィスの方がずっと良いです。」  \n- 建設ビーバー"
frFR = "\"Travailler de chez soi peut être pratique, mais une fois que vous commencez à avoir des petits qui courent partout, un bureau séparé est bien mieux.\"  \n-Un castor bâtisseur"
deDE = "„Von zu Hause aus zu arbeiten, kann wirklich praktisch sein, aber sobald die Kits überall herumlaufen, ist ein separates Büro viel besser.“ - Ein Bau-Biber"
plPL = "\"Praca zdalna może być wygodna, ale gdy zaczną biegać wszędzie małe bobry, osobne biuro jest znacznie lepsze.\" - Bobrzy budowniczy"
ptBR = "\"Trabalhar em casa pode ser muito conveniente, mas uma vez que você começa a ter filhotes correndo para todo lado, um escritório separado é muito melhor.\"  \n-Um castor construtor"
koKR = "\"집에서 일하는 것은 확실히 편리하지만, 모든 곳에 키트가 돌아다니기 시작하면 별도의 사무실이 훨씬 낫습니다.\"  \n- 건설 비버"
csCZ = "\"Práce z domova může být opravdu pohodlná, ale jakmile se kolem začnou motat malá mláďata, je mnohem lepší mít zvláštní kancelář.\" - Stavitel bobr"
viVN = "\"Làm việc từ xa có thể rất thuận tiện, nhưng một khi bạn bắt đầu có những chú nhím chạy quanh khắp nơi, một văn phòng riêng thì tốt hơn nhiều\" - Một chú castor xây dựng"
trTR = "\"Evinizden çalışmak gerçekten de pratik olabilir, ama bir kez yavrular her yerde koşuşturmaya başladığında, ayrı bir ofis çok daha iyidir.\" - Bir inşaatçı kuzgun"

