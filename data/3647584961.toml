["Lapantouflemagic.ZiplineBalloon.FlavorDescription"]
raw = "\"Don't stay under it on windy days.\nWhat? No! It's not gonna fall, you just don't want to get showered with barf.\""
status = "normal"
enUS = "\"Don't stay under it on windy days. What? No! It's not gonna fall, you just don't want to get showered with barf.\""
zhCN = "“在多风的日子里不要呆在它下面。\n什么？不！它不会掉下来，只是你不想被呕吐物淋湿。”"
zhTW = "\"在風大日子不要待在它下面。\n什麼？不！它不會掉下來，你只是不要被嘔吐淋到。\""
ruRU = "\"Не стойте под ним в windy days. Что? Нет! Он не упадет, вы просто не хотите получить дождь из рвоты.\""
jaJP = "「風の強い日にはその下にいないでください。\n何？いいえ！落ちるわけではないですが、吐物を浴びたくはないでしょう。」"
frFR = "\"Ne restez pas en dessous par vent fort. Quoi ? Non ! Ça ne va pas tomber, vous ne voulez juste pas vous faire arroser de vomi.\""
deDE = "\"Nicht an windigen Tagen darunter bleiben. Was? Nein! Es wird nicht fallen, du willst nur nicht mit Erbrochenem bespritzt werden.\""
plPL = "\"Nie stój pod nim w wietrzne dni. Co? Nie! Nie spadnie, po prostu nie chcesz, żeby cię oblało wymiocinami.\""
ptBR = "\"Não fique embaixo quando o vento soprar.\nO que? Não! Não vai cair, você só não quer ser molhado com vômito.\""
koKR = "\"바람 부는 날에는 그 아래에 있지 마세요. 뭐? 아니야! 떨어지지 않아요, 그냥 구토 세례를 맞고 싶지 않을 뿐이죠.\""
csCZ = "\"Nestávejte pod tím ve větrných dnech. Co? Ne! Nespadne to, jenom se nechcete nechat osprchovat zvratky.\""
viVN = "\"Đừng đứng dưới nó vào những ngày có gió.\nCái gì? Không! Nó sẽ không rơi đâu, bạn chỉ không muốn bị tắm bởi đồ nôn thôi.\""
trTR = "\"Rüzgarlı günlerde altında kalma.  \nNe? Hayır! Düşmeyecek, sadece kusmuktan ıslanmak istemiyorsun.\""

