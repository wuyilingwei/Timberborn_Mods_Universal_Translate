["Lapantouflemagic.Mushroomfarm.Description"]
raw = "An enclosed place to grow genetically modified mushrooms or plants in optimal condition, resulting in incredible yields and growth speed.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "An enclosed place to grow genetically modified mushrooms or plants in optimal conditions, resulting in incredible yields and growth speed. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一个封闭的地方，用于在最佳条件下种植基因改良的蘑菇或植物，产生惊人的产量和生长速度。  \n<color=#00FFFF>作为堤坝使用</color>"
zhTW = "一個封閉的地方，用於在最佳條件下種植基因改良的蘑菇或植物，產生驚人的產量和生長速度。  \n<color=#00FFFF>作為堤壩運作</color>"
ruRU = "Закрытое пространство для выращивания генетически модифицированных грибов или растений в оптимальных условиях, что приводит к невероятным урожаям и скорости роста. <color=#00FFFF>Работает как дамба</color>"
jaJP = "遺伝子組換えのキノコや植物を最適な状態で育てるための enclosed place で、驚くべき収穫量と成長速度をもたらします。  \n<color=#00FFFF>堤防として機能します</color>"
frFR = "Un endroit fermé pour cultiver des champignons ou des plantes génétiquement modifiés dans des conditions optimales, ce qui entraîne des rendements et une vitesse de croissance incroyables.\n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Ein geschützter Ort, um genetisch veränderte Pilze oder Pflanzen unter optimalen Bedingungen anzubauen, was zu unglaublichen Erträgen und Wachstumsraten führt. <color=#00FFFF>Funktioniert wie ein Deich</color>"
plPL = "Zamknięte miejsce do hodowli genetycznie zmodyfikowanych grzybów lub roślin w optymalnych warunkach, co skutkuje niesamowitymi plonami i szybkością wzrostu. <color=#00FFFF>Funkcjonuje jako wał</color>"
ptBR = "Um lugar fechado para cultivar cogumelos ou plantas geneticamente modificados em condições ideais, resultando em colheitas e velocidade de crescimento incríveis.  \n<color=#00FFFF>Funciona como uma Dique</color>"
koKR = "유전자 변형 버섯이나 식물을 최적의 조건에서 재배할 수 있는 밀폐된 공간으로, 놀라운 수확량과 성장 속도를 제공합니다.\n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Uzavřený prostor pro pěstování geneticky modifikovaných hub nebo rostlin za optimálních podmínek, což má za následek neuvěřitelné výnosy a rychlost růstu. \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Nơi kín để trồng nấm hoặc cây trồng biến đổi gen trong điều kiện tối ưu, mang lại năng suất và tốc độ phát triển đáng kinh ngạc.  \n<color=#00FFFF>Hoạt động như một Đê</color>"
trTR = "Genetik olarak değiştirilmiş mantarları veya bitkileri optimal koşullarda yetiştirmek için kapalı bir alan, muazzam verim ve büyüme hızı sağlar.  \n<color=#00FFFF>Bir Set gibi çalışır</color>"

["Lapantouflemagic.Mushroomfarm.FlavorDescription"]
raw = "\"Should I eat this red-and-white mushroom? It seems tasty.\"\n -Bobby the fool, last words."
status = "normal"
enUS = "\"Should I eat this red-and-white mushroom? It seems tasty.\"  \n-Bobby the fool, last words."
zhCN = "“我该吃这个红白相间的蘑菇吗？它看起来很好吃。”  \n- 笨蛋博比，遗言。"
zhTW = "\"我該吃這個紅白相間的蘑菇嗎？看起來很好吃。\"  \n- 笨蛋鮑比，臨終遺言。"
ruRU = "\"Должен ли я съесть этот красно-белый гриб? Он кажется вкусным.\"  \n -Бобби, дурак, последние слова."
jaJP = "この赤と白のキノコを食べるべきかな？おいしそうだ。 - バビー、愚か者の最後の言葉。"
frFR = "\"Devrais-je manger ce champignon rouge et blanc ? Il a l'air délicieux.\"  \n-Bobby le fou, dernières paroles."
deDE = "\" Sollte ich diesen rot-weißen Pilz essen? Er scheint lecker zu sein.\" -Bobby der Dummkopf, letzte Worte."
plPL = "\"Powinienem zjeść ten czerwono-biały grzyb? Wygląda na smaczny.\"  \n-Bobby, głupiec, ostatnie słowa."
ptBR = "\"Devo comer este cogumelo vermelho e branco? Parece saboroso.\"  \n-Bobby, o tolo, últimas palavras."
koKR = "\"이 빨강과 하얀 버섯을 먹어야 할까요? 맛있어 보입니다.\"  \n- 바비, 마지막 말."
csCZ = "\"Je dobré sníst tuto červenobílou houbu? Vypadá chutně.\"  \n-Bobby, blázen, poslední slova."
viVN = "Liệu tôi có nên ăn loại nấm đỏ-trắng này không? Có vẻ ngon đấy.\"  \n-Bobby kẻ ngốc, những lời nói cuối cùng của anh ấy."
trTR = "Bu kırmızı-beyaz mantarı yemeli miyim? Lezzetli görünüyor.\"\n -Bobby aptal, son sözleri."

