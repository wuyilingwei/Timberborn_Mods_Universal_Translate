["Lapantouflemagic.PawsTrader.Description"]
raw = "Our expedition is neither the first, neither the last to have been send from our homeland. If we can find other settlements of our kind, they would be good trading partners, since none of the other savages we've met can make an even half-decent stew."
status = "normal"
enUS = "Our expedition is neither the first nor the last to be sent from our homeland. If we can find other settlements of our kind, they would make good trading partners, since none of the other savages we've met can make even a half-decent stew."
zhCN = "“我们的探险队既不是第一支，也不是最后一支从我们家园出发的队伍。如果我们能找到其他类似的定居点，它们将是很好的贸易伙伴，因为我们遇到的其他野蛮人连一锅像样的炖菜都做不出来。”"
zhTW = "「我們的探險既不是第一個，也不是最後一個從我們的故鄉派遣的。如果我們能找到其他類似的聚落，他們將是很好的貿易夥伴，因為我們遇到的其他野蠻人中，沒有一個能做出半成品的燉菜。」"
ruRU = "Наша экспедиция не первая и не последняя, отправленная из нашей родины. Если мы сможем найти другие поселения нашего рода, они станут хорошими торговыми партнёрами, так как ни один из других диких племён, с которыми мы встретились, не может приготовить хотя бы половину действительно хорошего рагу."
jaJP = "私たちの探検は、故郷から送られた最初のものでもなく、最後のものでもありません。私たちの仲間の他の集落を見つけることができれば、彼らは良い交易相手になるでしょう。なぜなら、私たちが出会った他の野蛮人は誰もそこそこのスープすら作れないからです。"
frFR = "Notre expédition n'est ni la première, ni la dernière à avoir été envoyée depuis notre terre d'origine. Si nous pouvons trouver d'autres établissements de notre espèce, cela serait de bons partenaires commerciaux, car aucun des autres sauvages que nous avons rencontrés ne peut préparer un ragoût même à peine décent."
deDE = "Unsere Expedition ist weder die erste noch die letzte, die aus unserer Heimat ausgesandt wurde. Wenn wir andere Siedlungen unserer Art finden können, wären sie gute Handelspartner, da keiner der anderen Wilden, denen wir begegnet sind, auch nur einen halbwegs anständigen Eintopf zubereiten kann."
plPL = "Nasza ekspedycja nie jest ani pierwszą, ani ostatnią, która została wysłana z naszej ojczyzny. Jeśli znajdziemy inne osady naszego pokroju, będą dobrymi partnerami handlowymi, ponieważ żaden z dzikusów, których spotkaliśmy, nie potrafi zrobić nawet półprzyzwoitej zupy."
ptBR = "Nossa expedição não é nem a primeira, nem a última a ter sido enviada de nossa terra natal. Se conseguirmos encontrar outros assentamentos da nossa espécie, eles seriam bons parceiros comerciais, já que nenhum dos outros selvagens que encontramos consegue fazer um ensopado que seja minimamente decente."
koKR = "우리의 탐험대는 우리의 고향에서 보내진 첫 번째도, 마지막도 아닙니다. 만약 우리와 같은 다른 정착지를 찾을 수 있다면, 그들은 좋은 무역 파트너가 될 것입니다. 우리가 만난 다른 야만인들은 그 어떤 것도 반도 제대로 된 스튜를 만들 수 없으니까요."
csCZ = "„Naše expedice není ani první, ani poslední, která byla vyslána z naší domoviny. Pokud najdeme další osady našeho druhu, byli by dobří obchodní partneři, protože žádní z dalších divochů, které jsme potkali, neumí udělat ani poloviční slušný guláš.“"
viVN = "Cuộc thám hiểm của chúng tôi không phải là cuộc thám hiểm đầu tiên, cũng không phải là cuộc thám hiểm cuối cùng được gửi từ quê hương của chúng tôi. Nếu chúng tôi có thể tìm thấy những khu định cư khác của loại hình của chúng tôi, họ sẽ là những đối tác thương mại tốt, vì không ai trong số những người man rợ khác mà chúng tôi đã gặp có thể nấu được một món hầm tạm chấp nhận."
trTR = "Seferimiz ne ilk ne de son. Anavatanımızdan gönderilen birçok seferden biriyiz. Eğer bizim türümüzden başka yerleşim yerleri bulursak, iyi ticaret ortakları olurlar, çünkü tanıştığımız diğer vahşilerin hiçbiri decent bir çorba bile yapamıyor."

