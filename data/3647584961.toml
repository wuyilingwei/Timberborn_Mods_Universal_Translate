["Lapantouflemagic.GnawingHall.Description"]
raw = "A long house in which we gnaw on trees, for pleasure or out of necessity.\nHas a <color=#FF6EC7>triangle roof</color>, <color=#FF6EC7>Can support upgrades</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A long house in which we gnaw on trees, for pleasure or out of necessity. Has a <color=#FF6EC7>triangle roof</color>, <color=#FF6EC7>Can support upgrades</color> <color=#00FFFF>Works as a Levee</color>"
zhCN = "一座长房子，我们在这里啃树，出于乐趣或必要。\n有一个<color=#FF6EC7>三角屋顶</color>，<color=#FF6EC7>可以支持升级</color>\n<color=#00FFFF>作为堤坝工作</color>"
zhTW = "一座長房屋，我們在這裡啃食樹木，為了樂趣或出於必要。\n擁有一個<color=#FF6EC7>三角屋頂</color>，<color=#FF6EC7>可以支持升級</color>\n<color=#00FFFF>作為堤壩運作</color>"
ruRU = "Длинный дом, в котором мы грызем деревья ради удовольствия или по необходимости. Имеет <color=#FF6EC7>треугольную крышу</color>, <color=#FF6EC7>поддерживает улучшения</color> <color=#00FFFF>Работает как набережная</color>"
jaJP = "木を楽しみや必要に応じてかじるための長い家です。  \n<color=#FF6EC7>三角屋根</color>を持ち、<color=#FF6EC7>アップグレードに対応</color>しています。  \n<color=#00FFFF>堤防として機能します</color>。"
frFR = "Une grande maison dans laquelle nous rongeons des arbres, par plaisir ou par nécessité.  \nA un <color=#FF6EC7>toit en triangle</color>, <color=#FF6EC7>peut supporter des améliorations</color>  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Ein langes Haus, in dem wir an Bäumen nagen, aus Vergnügen oder aus Notwendigkeit.  \nHat ein <color=#FF6EC7>Dreiecksdach</color>, <color=#FF6EC7>kann Upgrades unterstützen</color>  \n<color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Długi dom, w którym gryziemy drzewa, dla przyjemności lub z konieczności. Posiada <color=#FF6EC7>trójkątny dach</color>, <color=#FF6EC7>możliwość modernizacji</color> <color=#00FFFF>działa jak wał</color>"
ptBR = "Uma casa longa onde roemos árvores, por prazer ou necessidade. \nPossui um <color=#FF6EC7>telhado triangular</color>, <color=#FF6EC7>pode suportar upgrades</color> \n<color=#00FFFF>Funciona como um dique</color>"
koKR = "나무를 즐기거나 필요에 의해서 갉아먹는 긴 집입니다.\n<color=#FF6EC7>삼각 지붕</color>이 있으며, <color=#FF6EC7>업그레이드를 지원합니다</color>\n<color=#00FFFF>제방처럼 작동합니다</color>"
csCZ = "Dlouhý dům, ve kterém obvykle ožíráme stromy, pro potěšení nebo ze zvyku. Má <color=#FF6EC7>trojúhelníkovou střechu</color>, <color=#FF6EC7>může podporovat vylepšení</color> <color=#00FFFF>funguje jako nábřeží</color>"
viVN = "Một ngôi nhà dài nơi chúng tôi gặm nhấm cây cối, vì sự thích thú hoặc do nhu cầu.  \nCó một <color=#FF6EC7>mái nhà hình tam giác</color>, <color=#FF6EC7>Có thể hỗ trợ nâng cấp</color>  \n<color=#00FFFF>Hoạt động như một Đê</color>"
trTR = "Ağaçları eğlenmek veya ihtiyaçtan çiğnediğimiz uzun bir ev. \n<color=#FF6EC7>Üçgen bir çatı</color> var, <color=#FF6EC7>geliştirmeleri destekleyebilir</color> \n<color=#00FFFF>Bir Set olarak çalışır</color>"

