["Lapantouflemagic.DoubleRopestairs.Description"]
raw = "Allows to access elevated spaces without requiring support directly under it.\nThe support voxels at either ends won’t be able to accept side platform, or another rope stairs."
status = "normal"
enUS = "Allows access to elevated spaces without requiring support directly beneath it. The support voxels at either end won’t be able to accept side platforms or another rope stairs."
zhCN = "允许访问高架空间，而无需在其下方提供支撑。\n两端的支撑体素无法接受侧平台或其他绳梯。"
zhTW = "允許進入沒有直接支撐的高空空間。\n兩端的支撐體素將無法接受側面平臺或其他繩梯。"
ruRU = "Позволяет получить доступ к приподнятым пространствам без необходимости наличия опоры прямо под ней. Опорные воксели на концах не смогут принять боковую платформу или другие верёвочные лестницы."
jaJP = "高所に支えなしでアクセスできるようになります。\n両端の支持ボクセルは、側面プラットフォームや別のロープ階段を受け入れることができません。"
frFR = "Permet d'accéder à des espaces surélevés sans nécessiter de support directement en dessous.\nLes voxels de soutien aux deux extrémités ne pourront pas accepter de plateforme latérale ou d'autres escaliers en corde."
deDE = "Ermöglicht den Zugang zu erhöhten Räumen, ohne dass eine direkte Unterstützung darunter erforderlich ist. Die Stützvoxel an beiden Enden können keine seitlichen Plattformen oder eine andere Seiltreppe akzeptieren."
plPL = "Umożliwia dostęp do podniesionych przestrzeni bez potrzeby posiadania wsparcia bezpośrednio pod nią. Wspierające woksele na końcach nie będą mogły przyjąć bocznej platformy ani innych schodów linowych."
ptBR = "Permite acessar espaços elevados sem precisar de suporte diretamente embaixo.\nOs voxels de suporte nas extremidades não poderão aceitar plataformas laterais ou outra escada de corda."
koKR = "지지대가 바로 아래에 필요 없이 상승된 공간에 접근할 수 있습니다. 양쪽 끝의 지지 복셀은 측면 플랫폼이나 다른 로프 계단을 수용할 수 없습니다."
csCZ = "Umožňuje přístup k vyvýšeným prostorům bez nutnosti podpory přímo pod ním. Podpůrné voxely na obou koncích nebudou schopny akceptovat boční platformu ani další lanové schodiště."
viVN = "Cho phép truy cập vào không gian cao mà không cần hỗ trợ ngay dưới nó. Các voxel hỗ trợ ở cả hai đầu sẽ không thể chấp nhận nền tảng bên hoặc cầu thang dây khác."
trTR = "Desteksiz olarak doğrudan altında olmadan yükseltilmiş alanlara erişim sağlar. Her iki uçtaki destek voksel noktaları, yan platform veya başka bir ip merdiveni kabul edemeyecektir."

