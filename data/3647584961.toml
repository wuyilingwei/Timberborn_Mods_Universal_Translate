["Lapantouflemagic.GathererHouse.Description"]
raw = "A medium house for a group of gatherer beavers to meet and split work efficiently.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A medium house for a group of gatherer beavers to meet and split work efficiently. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一个中型房屋，供一群采集海狸聚会并高效分工使用。<color=#00FFFF>作为堤坝使用</color>"
zhTW = "一個中型房屋，供一群採集海狸聚會並高效分工使用。<color=#00FFFF>作為堤壩運作</color>"
ruRU = "Средний дом для группы бобров-собирателей, чтобы встречаться и эффективно распределять работу.  \n<color=#00FFFF>Работает как дамба</color>"
jaJP = "「集まったビーバーたちが効率的に作業を分担するための中型の家です。  \n<color=#00FFFF>築堤として機能します</color>」"
frFR = "Une maison de taille moyenne pour un groupe de castors récolteurs afin de se réunir et de partager le travail de manière efficace.  \n<color=#00FFFF>Fonctionne comme un levee</color>"
deDE = "Ein mittelgroßes Haus für eine Gruppe von Sammelbeveren, um sich zu treffen und die Arbeit effizient zu teilen. <color=#00FFFF>Funktioniert als Damm</color>"
plPL = "Średni dom dla grupy bobrów zbieraczy, aby spotykać się i skutecznie dzielić pracę. <color=#00FFFF>Działa jak Wał</color>"
ptBR = "Uma casa média para um grupo de castores coletores se reunir e dividir o trabalho de forma eficiente. <color=#00FFFF>Funciona como uma Barragem</color>"
koKR = "모임과 효율적인 작업 분배를 위한 수집형 비버 그룹의 중간 집입니다. <color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Střední dům pro skupinu bobrů sběračů, aby se setkali a efektivně si rozdělili práci.  \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một ngôi nhà vừa đủ cho một nhóm nhím tập hợp lại và phân chia công việc một cách hiệu quả.  \n<color=#00FFFF>Có thể hoạt động như một Đê điều</color>"
trTR = "Yığıncı kunduzların bir araya gelip işleri verimli bir şekilde paylaşmaları için orta boy bir ev.\n<color=#00FFFF>Set olarak çalışır</color>"

["Lapantouflemagic.GathererHouse.FlavorDescription"]
raw = "\"Don't you dare come in my house covered in dirt and berry juice! Get a shower first or I'll toss you in the river myself!\"\n -Mommy beaver, every evening."
status = "normal"
enUS = "\"Don't you dare come in my house covered in dirt and berry juice! Get a shower first or I'll toss you in the river myself!\" - Mommy beaver, every evening."
zhCN = "“不要在我家里弄得满身是土和浆果汁！先去洗个澡，否则我会把你扔进河里的！”  \n- 妈妈海狸，每天晚上。"
zhTW = "\"別想帶著髒污和漿果汁進我家！快去洗澡，不然我就把你扔進河裡！\"  \n- 媽媽海狸，每晚。"
ruRU = "Не смей входить в мой дом, покрытый грязью и соком ягод! Сначала принем душ, или я сама выброшу тебя в реку!\"  \n-Мамочка бобер, каждый вечер."
jaJP = "「汚れやベリージュースで覆われたまま、私の家に入ろうなんて思わないで！まずシャワーを浴びて、さもなければ私があなたを川に投げ込むわ！」  \n- お母さんビーバー、毎晩。"
frFR = "\"Ne t'avise pas de venir dans ma maison couvert de terre et de jus de baies ! Prends une douche d'abord ou je te jetterai moi-même dans la rivière !\"  \n-Maman castor, chaque soir."
deDE = "„Komm ja nicht in mein Haus, bekleckt mit Dreck und Beeren-Saft! Nimm dir zuerst eine Dusche, sonst werfe ich dich selbst in den Fluss!“ \n-Mama Biber, jeden Abend."
plPL = "Nie waż się wchodzić do mojego domu brudny i pokryty sokiem z jagód! Najpierw weź prysznic, albo sama cię wrzucę do rzeki!\"  \n-Mamusiu bobrze, każdego wieczoru."
ptBR = "\"Não se atreva a entrar na minha casa coberta de sujeira e suco de frutas! Tome um banho primeiro ou eu mesma te jogarei no rio!\"\n -Mamãe castor, toda noite."
koKR = "더러움과 베리 주스에 덮인 채로 내 집에 들어오지 마! 먼저 샤워를 하고 오지 않으면 내가 직접 너를 강에 던져버릴 거야!\"  \n- 엄마 비버, 매일 저녁."
csCZ = "Nebudeš se opovažovat přijít do mého domu špinavý a pokapaný šťávou z bobulí! Nejdřív se osprchuj, jinak tě sám hodím do řeky!\"  \n -Maminka bobr, každý večer."
viVN = "Đừng có dám vào nhà tôi với bộ dạng dính đầy bùn và nước quả mọng! Tắm rửa đã rồi tôi sẽ tự tay ném bạn xuống sông!\"\n -Mẹ beaver, mỗi buổi tối."
trTR = "Kir ve meyve suyu ile kaplanmış bir şekilde evime girmeye cüret etme! Önce bir duş al yoksa seni nehirde yüzdürürüm!\"  \n-Anne kunduz, her akşam."

