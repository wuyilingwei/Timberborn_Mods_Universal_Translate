["Lapantouflemagic.TankShower.Description"]
raw = "A shower that takes its water from a storage barrel.\nMostly useful for the unhinged weirdos who can't help but try to play on hard mode.\nAccomodates 2 beavers."
status = "normal"
enUS = "A shower that takes its water from a storage barrel. Mostly useful for the unhinged weirdos who can't help but try to play on hard mode. Accommodates 2 beavers."
zhCN = "“一种从储水桶中抽取水的淋浴。\n主要对那些无法自控、想在困难模式下进行游戏的古怪人士有用。\n可容纳2只海狸。”"
zhTW = "一個從儲水桶中取水的淋浴。\n主要適用於那些無法抗拒在困難模式下玩的怪異者。\n可容納 2 隻海狸。"
ruRU = "Душ, который берет воду из хранилища. В основном полезен для неадекватных Weirdos, которые не могут не пытаться играть на сложном уровне. Вмещает 2 бобра."
jaJP = "貯蔵バレルから水を汲むシャワーです。主にハードモードでプレイしようと頑張っている異常な変わり者に役立ちます。ビーバー2匹の利用に対応しています。"
frFR = "Une douche qui prend son eau d'un baril de stockage. Surtout utile pour les déglingués fêlés qui ne peuvent s'empêcher d'essayer de jouer en mode difficile. Accueille 2 castors."
deDE = "Eine Dusche, die ihr Wasser aus einem Lagerfass bezieht. \nVor allem nützlich für die verrückten Sonderlinge, die nicht anders können, als im Schwierigkeitsgrad schwer zu spielen. \nBietet Platz für 2 Biber."
plPL = "Prysznic, który czerpie wodę z pojemnika na wodę. Głównie przydatny dla szalonych dziwaków, którzy nie mogą powstrzymać się od grania w trybie trudnym. Pomieści 2 bobry."
ptBR = "Um chuveiro que pega sua água de um barril de armazenamento. Principalmente útil para os estranhos descontrolados que não conseguem evitar tentar jogar no modo difícil. Acomoda 2 castores."
koKR = "물통에서 물을 공급받는 샤워기입니다. 주로 어려운 모드에서 플레이하고 싶어하는 괴짜들에게 유용합니다. 비버 2마리를 수용할 수 있습니다."
csCZ = "Sprcha, která čerpá vodu z úložného barelu. \nHlavně užitečné pro šílené podivíny, kteří se prostě nemohou ubránit hraní na těžkou obtížnost. \nPojme 2 bobry."
viVN = "Một buồng tắm lấy nước từ một thùng chứa. Chủ yếu hữu ích cho những kẻ lập dị không thể ngừng cố gắng chơi ở chế độ khó. Có thể chứa 2 con hải ly."
trTR = "Suya bir depolama tenekesinden alan bir duş.\nGenellikle zor modda oynamaya çalışmaktan kendini alıkoyamayan deli garipler için faydalıdır.\n2 damlayı barındırır."

