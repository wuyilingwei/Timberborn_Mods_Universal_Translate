["Building.RangedCrossing.Whitepaws.FlavorDescription"]
raw = "\"Suspiciously fast you say ? That's because we're in a game I tell you! None of you damn kits listen to me, looking at me like I'm crazy! This is all fake!\"\n- Mathilda the insane cook."
status = "normal"
enUS = "\"Suspiciously fast you say? That's because we're in a game I tell you! None of you damn kits listen to me, looking at me like I'm crazy! This is all fake!\"  \n- Mathilda the insane cook."
zhCN = "“你说可疑地快？那是因为我们在游戏里，我告诉你！你们这些该死的小家伙一个个都不听我说，看着我就像我是个疯子！这一切都是假的！”  \n- 疯狂厨师马蒂尔达。"
zhTW = "“你說得快得可疑？那是因為我們在玩遊戲，我告訴你！你們這些該死的小崽子沒有人聽我說話，瞧我就像瘋子一樣！這一切都是假的！”  \n- 瘋狂的廚師馬蒂爾達。"
ruRU = "«Подозрительно быстро, говорите? Это потому, что мы в игре, я вам скажу! Никто из вас, чертовых детенышей, не слушает меня, смотрит на меня, как на сумасшедшего! Это всё ненастоящее!»  \n- Матильда, безумная повариха."
jaJP = "「怪しい速さだって？それは私が言う通り、これはゲームだからさ！お前たちみんな、私を見てまるで狂ったように、全然聞いちゃいない！これはすべてフェイクなんだ！」\n- 狂った料理人、マチルダ」"
frFR = "« Vous dites qu'ils sont suspicionneusement rapides ? C'est parce que nous sommes dans un jeu, je vous le dis ! Aucun de vous, maudits chatons, ne m'écoute, me regardant comme si j'étais folle ! Tout cela est faux ! »  \n- Mathilda, la cuisinière folle."
deDE = "Verdächtig schnell, sagst du? Das liegt daran, dass wir in einem Spiel sind, sag ich dir! Keiner von euch verdammten Kleinen hört mir zu, schaut mich an, als wäre ich verrückt! Das ist alles fake!\"  \n- Mathilda, die verrückte Köchin."
plPL = "Podejrzanie szybki mówisz? To dlatego, że jesteśmy w grze, mówię ci! Żadne z was, przeklęte kocięta, mnie nie słucha, patrzycie na mnie jak na szaleńca! To wszystko jest fałszywe!\"  \n- Mathilda, szalona kucharka."
ptBR = "\"Desconfiadamente rápido, você diz? Isso é porque estamos em um jogo, eu te digo! Nenhum de vocês, malditos filhotes, me escuta, me olhando como se eu fosse louca! Tudo isso é falso!\"  \n- Mathilda, a cozinheira insana."
koKR = " suspiciously fast라고요? 그건 제가 말하는 게임 속에 있어서예요! 너희 귀찮은 새끼들은 내 말을 듣지도 않고, 내게 미친 사람처럼 쳐다보고 있어요! 이 모든 것은 가짜예요!\"  \n- 정신 나간 요리사 마틸다."
csCZ = "Podezřele rychlé, říkáte? To je protože jsme ve hře, říkám vám! Ani jedno z vás zatracených mláďat mě neposlouchá, koukáte na mě, jako bych byl blázen! To je všechno falešné!\" \n- Mathilda, šílená kuchařka."
viVN = "Bạn nói nhanh một cách nghi ngờ sao? Đó là vì chúng ta đang ở trong một trò chơi, tôi nói với bạn đấy! Không ai trong số các con mèo đáng ghét này nghe tôi, nhìn tôi như thể tôi bị điên vậy! Tất cả chỉ là giả thôi!”\n- Mathilda, người đầu bếp điên cuồng."
trTR = "\"Şüpheli şekilde hızlı mı diyorsunuz? Çünkü bu bir oyun, size söylerim! Hiçbiriniz, o lanet miniğin, beni dinlemiyorsunuz, bana deli gibi bakıyorsunuz! Bunların hepsi sahte!\"  \n- Mathilda, deli aşçı."

["Lapantouflemagic.Woodupgrade_Builders.Description"]
raw = "An upgrade module to be placed on top of an upgradable <color=#FFA500>Small Tower</color> (left) adjacent to a <color=#FF6EC7>triangle roof</color> building (right)\nEmploys <color=green>8 Builders</color>.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "An upgrade module to be placed on top of an upgradable <color=#FFA500>Small Tower</color> (left) adjacent to a <color=#FF6EC7>triangle roof</color> building (right) Employs <color=green>8 Builders</color>. <color=#00FFFF>Works as a Levee</color>"
zhCN = "“可放置在可升级的<color=#FFA500>小塔</color>（左）顶部的升级模块，邻接一个<color=#FF6EC7>三角屋顶</color>建筑（右）\n需要使用<color=green>8名建造者</color>。\n<color=#00FFFF>作为堤坝使用</color>”"
zhTW = "“一個升級模組，可以放置在可升級的<color=#FFA500>小塔樓</color>（左）上，並鄰接於<color=#FF6EC7>三角屋頂</color>建築（右）\n需要<color=green>8名建造者</color>。\n<color=#00FFFF>作為堤壩運作</color>。”"
ruRU = "Модуль улучшения, который можно разместить на верхней части модернизируемой <color=#FFA500>Небольшой Башни</color> (слева), прилегающей к зданию с <color=#FF6EC7>треугольной крышей</color> (справа).\nИспользует <color=green>8 Строителей</color>.\n<color=#00FFFF>Работает как Набережная</color>"
jaJP = "「アップグレード可能な<color=#FFA500>小さな塔</color>（左）の上に配置されるアップグレードモジュールで、<color=#FF6EC7>三角屋根</color>の建物（右）に隣接しています。\n<color=green>8人のビルダー</color>を雇用します。\n<color=#00FFFF>堤防として機能します</color>。」"
frFR = "Un module de mise à niveau à placer au-dessus d'une <color=#FFA500>Petite Tour</color> (à gauche) adjacente à un bâtiment avec un toit <color=#FF6EC7>triangulaire</color> (à droite)\nEmploie <color=green>8 Constructeurs</color>.\n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Ein Upgrade-Modul, das oben auf einem aufrüstbaren <color=#FFA500>Kleinen Turm</color> (links) platziert werden kann, der an ein Gebäude mit einem <color=#FF6EC7>Dreiecksdach</color> (rechts) angrenzt.  \nEinstellbar für <color=green>8 Bauarbeiter</color>.  \n<color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Moduł ulepszenia do umieszczenia na szczycie ulepszanej <color=#FFA500>Małej Wieży</color> (po lewej) sąsiadującej z budynkiem z <color=#FF6EC7>trójkątnym dachem</color> (po prawej)  \nZatrudnia <color=green>8 Budowniczych</color>.  \n<color=#00FFFF>Działa jak Tama</color>"
ptBR = "Um módulo de upgrade a ser colocado no topo de uma <color=#FFA500>Pequena Torre</color> (esquerda) adjacente a um edifício de <color=#FF6EC7>telhado triangular</color> (direita).  \nEmprega <color=green>8 Construtores</color>.  \n<color=#00FFFF>Funciona como um dique</color>"
koKR = "업그레이드 가능한 <color=#FFA500>작은 타워</color> (왼쪽) 위에 설치하여, <color=#FF6EC7>삼각 지붕</color> 건물 (오른쪽)과 인접하게 배치하는 업그레이드 모듈입니다.\n<color=green>8명의 빌더</color>를 고용합니다.\n<color=#00FFFF>제방으로 작용합니다</color>"
csCZ = "Upgrade modul, který se umisťuje na vrchol vylepšitelné <color=#FFA500>Malé věže</color> (vlevo) vedle budovy s <color=#FF6EC7>trojúhelníkovou střechou</color> (vpravo)\nZaměstnává <color=green>8 stavitelů</color>.\n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một mô-đun nâng cấp được đặt trên một <color=#FFA500>Tháp Nhỏ</color> (trái) có thể nâng cấp liền kề với một công trình có mái <color=#FF6EC7>hình tam giác</color> (phải)\nSử dụng <color=green>8 Người xây dựng</color>.\n<color=#00FFFF>Hoạt động như một Đê</color>"
trTR = "Yükseltilebilir <color=#FFA500>Küçük Kule</color> (solda) üzerine yerleştirilecek bir yükseltme modülü, <color=#FF6EC7>üçgen çatı</color> binası (sağda) ile bitişik\n<color=green>8 İnşaatçı</color> istihdam eder.\n<color=#00FFFF>Düzenek olarak çalışır</color>"

