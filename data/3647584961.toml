["Lapantouflemagic.Topentrancewatertightlodge.Description"]
raw = "A medium-sized lodge for two haulers, built around a ladder.\nCan be stacked on itself, variants, and can carry select buildings.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A medium-sized lodge for two haulers, built around a ladder.  \nCan be stacked on itself, variants, and can carry select buildings.  \n<color=#00FFFF>Works as a Levee</color>"
zhCN = "“一个适合两名运输者的中型小屋，围绕一架梯子建造。\n可以堆叠在自身之上，拥有不同变体，并可携带特定建筑物。\n<color=#00FFFF>作为堤坝使用</color>”"
zhTW = "「一個中型小屋，可容納兩名搬運工，圍繞著一個梯子建造而成。可以自疊堆疊，變體，並可攜帶特定建築。<color=#00FFFF>作為堤防運作</color>」"
ruRU = "Среднего размера хижина для двух грузчиков, построенная вокруг лестницы. \nМожно ставить друг на друга, варианты, и может переносить определённые здания. \n<color=#00FFFF>Работает как дамба</color>"
jaJP = "「2人の運搬者のために作られた中型の小屋で、はしごを中心に構築されています。自分自身の上に重ねることができ、バリアントがあり、特定の建物を運ぶことができます。<color=#00FFFF>堤防として機能します</color>」"
frFR = "Un pavillon de taille moyenne pour deux transporteurs, construit autour d'une échelle. Peut être empilé sur lui-même, variantes, et peut transporter des bâtiments sélectionnés. <color=#00FFFF>Fonctionne comme une levée</color>"
deDE = "Eine mittelgroße Lodge für zwei Transportarbeiter, die um eine Leiter gebaut wurde. \nKann auf sich selbst gestapelt werden, Varianten, und kann ausgewählte Gebäude tragen. \n<color=#00FFFF>Funktioniert als Damm</color>"
plPL = "Średniej wielkości chata dla dwóch transportowców, zbudowana wokół drabiny. Może być układana na sobie, warianty i może przenosić wybrane budynki. <color=#00FFFF>Działa jak wał</color>"
ptBR = "Uma cabana de tamanho médio para dois transportadores, construída em torno de uma escada. Pode ser empilhada sobre si mesma, variantes, e pode carregar edifícios selecionados. <color=#00FFFF>Funciona como uma Barreira</color>"
koKR = "두 명의 하울러를 위한 중간 크기의 오두막으로, 사다리를 중심으로 건축되었습니다.\n자기 자신 위에 쌓을 수 있으며, 변형이 가능하고 선택된 건물을 운반할 수 있습니다.\n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Středně velká chata pro dva nosiče, postavená kolem žebříku. Lze ji vrstvit na sebe, varianty a může nést vybrané budovy. <color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một căn lều có kích thước trung bình cho hai người vận chuyển, được xây dựng xung quanh một cái thang.\nCó thể xếp chồng lên nhau, có nhiều biến thể và có thể mang theo các công trình chọn lọc.\n<color=#00FFFF>Hoạt động như một Đê</color>"
trTR = "İki taşıyıcı için, merdivenin etrafında inşa edilmiş orta boy bir kulübe. Kendi üzerine istiflenebilir, varyasyonları vardır ve belirli yapıları taşıyabilir. <color=#00FFFF>Bir Set olarak çalışır</color>"

["Lapantouflemagic.Topentrancewatertightlodge.FlavorDescription"]
raw = "\"Thanks to the latest development in bucket technology, water won't even get inside the central pit!\"\n -BeavX technologies CEO"
status = "normal"
enUS = "\"Thanks to the latest development in bucket technology, water won't even get inside the central pit!\" -BeavX technologies CEO"
zhCN = "“得益于最新的桶技术，水甚至不会进入中央坑内！”  \n- 贝夫X科技首席执行官"
zhTW = "「多虧了最新的水桶技術，水甚至不會進入中央坑內！」  \n- BeavX 技術公司首席執行官"
ruRU = "\"Благодаря последним разработкам в технологии ведер, вода даже не попадет в центральную яму!\"  \n- Генеральный директор BeavX технологий"
jaJP = "「バケツ技術の最新の進展のおかげで、水が中央の穴にさえ入ることはありません！」 - BeavX技術 CEO"
frFR = "\"Grâce aux dernières avancées en technologie de seau, l'eau n'entrera même pas dans le puits central !\"\n - PDG de BeavX technologies"
deDE = "\"Dank der neuesten Entwicklung in der Eimertechnologie gelangt kein Wasser mehr in die zentrale Grube!\"  \n -BeavX Technologien CEO"
plPL = "\"Dzięki najnowszym osiągnięciom w technologii wiadra, woda nawet nie dostanie się do centralnej studni!\"  \n- Prezes BeavX Technologies"
ptBR = "\"Graças ao último avanço na tecnologia de baldes, a água nem mesmo entrará na fossa central!\"  \n-CEO da BeavX tecnologias"
koKR = "\"최신 버킷 기술 덕분에 물이 중앙 구덩이에 들어오지 않을 것입니다!\"  \n- 비프X 기술 CEO"
csCZ = "\"Díky nejnovějšímu vývoji technologií kbelíků se voda ani nedostane do centrální jámy!\"  \n- Generální ředitel BeavX technologies"
viVN = "Cảm ơn sự phát triển mới nhất trong công nghệ xô, nước sẽ không thể vào trong hố trung tâm!\"\n - Giám đốc điều hành BeavX technologies"
trTR = "\"En son kova teknolojisi geliştirmesi sayesinde, su merkezi çukura bile girmeyecek!\"  \n-BeavX teknolojileri CEO'su"

