["Lapantouflemagic.DeepWaterpumpupgradewallsegment.Description"]
raw = "A watertight structure to block off the extremity of a chain of deep water pumps.\n<color=red>Ram the camera into the building if placement is difficult</color>.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A watertight structure to block off the extremity of a chain of deep water pumps.  \n<color=red>Ram the camera into the building if placement is difficult</color>.  \n<color=#00FFFF>Works as a Levee</color>"
zhCN = "“一个防水结构，用于封闭深水泵链的末端。\n<color=red>如果放置困难，请将相机撞入建筑物。</color>\n<color=#00FFFF>作为堤坝使用</color>”"
zhTW = "一個密封的結構，用以封閉一串深水泵的末端。\n<color=red>如果安置困難，請將相機撞向建築物</color>。\n<color=#00FFFF>作為堤防使用</color>"
ruRU = "Водонепроницаемая конструкция для блокировки конца цепи глубоководных насосов.  \n<color=red>Упирайте камеру в здание, если установка затруднена</color>.  \n<color=#00FFFF>Работает как насыпь</color>"
jaJP = "深水ポンプのチェーンの端を遮断するための防水構造です。  \n<color=red>設置が難しい場合は、カメラを建物に突っ込ませてください</color>。  \n<color=#00FFFF>堤防として機能します</color>"
frFR = "Une structure étanche pour bloquer l'extrémité d'une chaîne de pompes à eau profonde.  \n<color=red>Foncez avec la caméra dans le bâtiment si le placement est difficile</color>.  \n<color=#00FFFF>Fonctionne comme une levée</color>"
deDE = "Eine wasserdichte Struktur, um das Ende einer Kette von Tiefbrunnenpumpen abzudichten.  \n<color=red>Ram die Kamera ins Gebäude, wenn die Platzierung schwierig ist</color>.  \n<color=#00FFFF>Funktioniert wie ein Deich</color>"
plPL = "Element konstrukcji wodoodpornej, aby zamknąć końcówkę łańcucha głębokich pomp wodnych.\n<color=red>Wciśnij kamerę w budynek, jeśli umiejscowienie jest trudne</color>.\n<color=#00FFFF>Działa jak wał przeciwpowodziowy</color>"
ptBR = "Uma estrutura à prova d'água para bloquear a extremidade de uma cadeia de bombas de água profundas.  \n<color=red>Coloque a câmera contra o edifício se a colocação for difícil</color>.  \n<color=#00FFFF>Funciona como uma Represa</color>"
koKR = "깊은 물 펌프 체인의 끝을 차단하는 방수 구조물입니다. \n<color=red>배치가 어려우면 카메라를 건물에 박아 넣으세요</color>. \n<color=#00FFFF>제방처럼 작동합니다</color>"
csCZ = "Vodotěsná konstrukce k zablokování konce řetězce hlubokých vodních čerpadel. <color=red>Praštit kamerou do budovy, pokud je umístění obtížné</color>. <color=#00FFFF>Funguje jako hráz</color>"
viVN = "Công trình chống thấm nước để chặn đầu cuối của một chuỗi các máy bơm nước sâu.  \n<color=red>Né camera vào tòa nhà nếu việc đặt vị trí gặp khó khăn</color>.  \n<color=#00FFFF>Hoạt động như một đê</color>"
trTR = "Derin su pompalarının bir zincirinin uç noktasını kapatma amacıyla su geçirmez bir yapı.  \n<color=red>Yerleştirmek zor ise kamerayı binaya ittirin</color>.  \n<color=#00FFFF>Bir Set gibi çalışır</color>"

["Lapantouflemagic.DeepWaterpumpupgradewallsegment.FlavorDescription"]
raw = "«xa0We make our dams the proper way, we're not savages!xa0»\n- The expedition leader"
status = "normal"
enUS = "\"We make our dams the proper way, we're not savages!\"\n- The expedition leader"
zhCN = "“我们以正确的方式建造水坝，我们不是野蛮人！”  \n- 远征领袖"
zhTW = "「我們以正確的方式建造堤壩，我們不是野蠻人！」  \n- 探險隊長"
ruRU = "«Мы строим наши плотины правильно, мы не варвары!»  \n- Лидер экспедиции"
jaJP = "「私たちはダムを正しく作ります、私たちは野蛮人ではありません！」  \n- 探検隊のリーダー"
frFR = "« Nous construisons nos barrages de la bonne manière, nous ne sommes pas des sauvages ! » - Le chef de l'expédition"
deDE = "«Wir bauen unsere Dämme auf die richtige Art, wir sind keine Wilden!» - Der Expeditionsleiter"
plPL = "„«xa0Budujemy nasze tamy w odpowiedni sposób, nie jesteśmy dzikusami!xa0»\n- Przywódca ekspedycji”"
ptBR = "«Nós fazemos nossas barragens da maneira certa, não somos selvagens!»  \n- O líder da expedição"
koKR = "«xa0우리의 댐은 올바른 방법으로 건설합니다, 우리는 미개인이 아닙니다!xa0»  \n- 탐사대 리더"
csCZ = "„«Děláme naše přehrady správným způsobem, nejsme divoši!» - vedoucí expedice“"
viVN = "«xa0Chúng tôi xây dựng đập của mình theo cách thích hợp, chúng tôi không phải là những kẻ man rợ!xa0»  \n- Trưởng đoàn thám hiểm"
trTR = "«xa0Barajlarımızı doğru bir şekilde yapıyoruz, vahşiler değiliz!xa0»  \n- Keşif lideri"

