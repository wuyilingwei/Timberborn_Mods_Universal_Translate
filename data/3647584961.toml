["Building.GiantLogFeller.FlavorDescription"]
raw = "\"I guess if it falls on my face I won't have to worry about the taste of the hospital food\""
status = "normal"
enUS = "\"I guess if it falls on my face I won't have to worry about the taste of the hospital food.\""
zhCN = "“我想如果它掉在我脸上，我就不用担心医院食物的味道了。”"
zhTW = "「我想如果它掉在我臉上，我就不必擔心醫院食物的味道。」"
ruRU = "\"Полагаю, если он упадет мне на лицо, мне не придется беспокоиться о вкуснойHospital food.\""
jaJP = "「もしこれが私の顔に落ちたら、病院の食べ物の味を心配する必要はないだろうな」"
frFR = "« Je suppose que si ça tombe sur mon visage, je n'aurai plus à me soucier du goût de la nourriture de l'hôpital. »"
deDE = "\"Ich schätze, wenn es mir ins Gesicht fällt, muss ich mir keine Sorgen um den Geschmack des Krankenhausessens machen.\""
plPL = "„Chyba jeśli upadnie mi na twarz, nie będę musiał martwić się o smak jedzenia szpitalnego.”"
ptBR = "\"Eu acho que se cair na minha cara, não precisarei me preocupar com o gosto da comida do hospital.\""
koKR = "\"내 얼굴에 떨어지면 병원 음식 맛에 대해 걱정하지 않아도 되겠지.\""
csCZ = "„Myslím, že pokud na mě spadne, nebudu se muset strachovat o chuť nemocničního jídla.“"
viVN = "\"Tôi đoán nếu nó đập vào mặt tôi, tôi sẽ không phải lo lắng về hương vị của đồ ăn bệnh viện.\""
trTR = "\"Sanırım yüzüme düşerse hastane yemeğinin tadını düşünmeme gerek kalmayacak.\""

