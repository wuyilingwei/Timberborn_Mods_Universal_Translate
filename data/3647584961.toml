deDE = "Ein hohes Haus, das auch als Flüssigkeitsspeicher dient. <color=#00FFFF>Funktioniert als Damm</color>"
plPL = "Wysoki dom, który pełni również funkcję przechowalni płynów. <color=#00FFFF>Działa jak wał</color>"
