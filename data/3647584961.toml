["Lapantouflemagic.NuclearWasteCollector.Description"]
raw = "Sends down the abyss a team of beavers specialized in recovering the strange warm stuff the hoomans buried down there so long ago, so that it can be refined again into something useful."
status = "normal"
enUS = "Sends down the abyss a team of beavers specialized in recovering the strange warm stuff the humans buried down there so long ago, so that it can be refined again into something useful."
zhCN = "派遣一队专门从深渊中回收人类很久以前埋下的奇怪温暖物质的海狸，以便将其再次提炼成有用的东西。"
zhTW = "派遣一隊專門負責回收人類很久以前埋藏在深淵中的奇怪熱物質的海狸，以便將其再次提煉成有用的東西。"
ruRU = "Отправляет в бездну команду бобров, специализирующихся на извлечении странного теплого материала, который люди похоронили там так давно, чтобы его можно было переработать обратно во что-то полезное."
jaJP = "「長い間人間がそこに埋めた奇妙な温かい物質を回収することに特化したビーバーのチームを深淵に送り込み、それを再度有用なものに精製できるようにします。」"
frFR = "Envoie dans l'abîme une équipe de castors spécialisés dans la récupération de la étrange matière chaude que les humains ont enterrée là-bas il y a si longtemps, afin qu'elle puisse être à nouveau raffinée en quelque chose d'utile."
deDE = "Schickt ein Team von Bibern in die Tiefe, das darauf spezialisiert ist, das seltsame warme Zeug, das die Menschen dort so lange vergraben haben, wiederzufinden, damit es erneut zu etwas Nützlichem verarbeitet werden kann."
plPL = "Wysyła do otchłani ekipę bobrów specjalizujących się w wydobywaniu dziwnej ciepłej substancji, którą ludzie pochowali tam tak dawno temu, aby mogła zostać ponownie przetworzona w coś użytecznego."
ptBR = "Envia para o abismo uma equipe de castores especializados em recuperar a estranha substância quente que os humanos enterraram lá embaixo há tanto tempo, para que possa ser refinada novamente em algo útil."
koKR = "오래 전에 호모들이 거기 묻어두었던 이상하고 따뜻한 물질을 회수하는 데 특화된 비버 팀을 심연으로 보내, 다시 유용한 것으로 정제할 수 있도록 합니다."
csCZ = "Posílá do propasti tým castorů specializovaných na získávání podivné teplé věci, kterou lidé pohřbili tak dávno, aby ji znovu zpracovali na něco užitečného."
viVN = "Gửi xuống vực thẳm một đội thú rừng chuyên thu hồi những thứ ấm áp kỳ lạ mà con người đã chôn sâu dưới đó từ rất lâu, để chúng có thể được tinh chế trở lại thành thứ hữu ích."
trTR = "Uzun zaman önce oraya gömülen tuhaf sıcak şeyleri geri kazanma konusunda uzmanlaşmış bir kunduzlar ekibini uçurumun dibine gönderir, böylece bunlar tekrar yararlı bir şeye dönüştürülebilir."

["Lapantouflemagic.NuclearWasteCollector.FlavorDescription"]
raw = "\"Exploring? No no no... that's not my job, I do this one because I don’t want to be killed by some devious thing I can’t see.\""
status = "normal"
enUS = "\"Exploring? No no no... that's not my job, I do this one because I don’t want to be killed by some devious thing I can’t see.\""
zhCN = "“探索？不不不……那不是我的工作，我做这件事是因为我不想被一些我看不见的狡猾东西杀死。”"
zhTW = "“探索？不不不……那不是我的工作，我做這個是因為我不想被一些我看不見的狡猾東西殺死。”"
ruRU = "\"Исследовать? Нет-нет-нет... это не моя работа, я делаю это, потому что не хочу быть убитым каким-то хитрым существом, которого я не вижу.\""
jaJP = "「探索？いいえいいえ…それは私の仕事ではありません。私は見えない厄介なものに殺されたくないからこれをやっているのです。」"
frFR = "Explorer ? Non non non... ce n'est pas mon travail, je fais ça parce que je ne veux pas être tué par une chose sournoise que je ne peux pas voir."
deDE = "\"Erforschen? Nein, nein, nein... das ist nicht mein Job, ich mache das hier, weil ich nicht von irgendetwas Tückischem umgebracht werden möchte, das ich nicht sehen kann.\""
plPL = "Zwiedzanie? Nie, nie, nie... to nie moja robota, robię to, bo nie chcę być zabity przez jakąś podstępną rzecz, której nie mogę zobaczyć."
ptBR = "\"Explorando? Não, não, não... isso não é meu trabalho, eu faço isso porque não quero ser morto por alguma coisa traiçoeira que não consigo ver.\""
koKR = "탐험하는 거? 아니, 아니, 아니... 그건 내 일이 아니야, 나는 이 일을 하는 이유는 내가 볼 수 없는 교활한 것에게 죽고 싶지 않아서야."
csCZ = "\"Zkoumání? Ne ne ne... to není moje práce, dělám tohle, protože se nechci nechat zabít nějakou zrádnou věcí, kterou nemohu vidět.\""
viVN = "Khám phá? Không không không... đó không phải là công việc của tôi, tôi làm điều này vì tôi không muốn bị giết bởi một thứ xảo quyệt mà tôi không thể nhìn thấy."
trTR = "Keşif yapmak mı? Hayır hayır hayır... bu benim işim değil, bunu yapıyorum çünkü göremediğim sinsi bir şey tarafından öldürülmek istemiyorum."

