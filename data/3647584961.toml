["Lapantouflemagic.GiantPillarbase.Description"]
raw = "Half a sequoia stuck back in the ground to act as a support for other things. \nSide platforms can be attached to it."
status = "normal"
enUS = "Half a sequoia stuck back in the ground to act as a support for other things. Side platforms can be attached to it."
zhCN = "“半个红木树干插回地面，用作其他物体的支撑。\n侧平台可以附加在上面。”"
zhTW = "一半的紅杉樹被插回地面，以作為其他物品的支撐。側平台可以附加在上面。"
ruRU = "Половина секвойи, вкопанная в землю, чтобы служить опорой для других объектов. К ней можно прикрепить боковые платформы."
jaJP = "「他の物を支えるために地面に埋められたセコイアの半分です。 \n側面のプラットフォームを取り付けることができます。」"
frFR = "Une demi-séquoia enfoncée dans le sol pour servir de support à d'autres choses. Des plateformes latérales peuvent y être fixées."
deDE = "Eine halb vergrabenete Sequoiastamm, die als Stütze für andere Dinge dient. \nSeitenplattformen können daran befestigt werden."
plPL = "Połowa sekwoi wbita z powrotem w ziemię, aby służyła jako wsparcie dla innych rzeczy. \nMożna do niej przymocować boczne platformy."
ptBR = "Metade de uma sequóia presa de volta no chão para servir como suporte para outras coisas. Plataformas laterais podem ser anexadas a ela."
koKR = "지면에 다시 박혀 다른 것들의 지지대로 작용하는 반 쌍떨어진 세쿼이아.  \n측면 플랫폼을 붙일 수 있습니다."
csCZ = "Půl sekvoje zaseknuté zpět do země, která slouží jako podpora pro další věci. \nNa něj lze připevnit boční platformy."
viVN = "Nửa cây sequoi cắm ngược xuống đất để làm điểm tựa cho những vật khác. \nCác nền tảng bên có thể được gắn vào nó."
trTR = "Diğer şeylere destek olmak için yere gömülmüş yarım bir sekoya. \nYan platformlar ona bağlanabilir."

