["Lapantouflemagic.8WayCorneroverhang.Description"]
raw = "A walkway to be installed around a giant pillar, allowing to navigate around aqueduct corners."
status = "normal"
enUS = "A walkway to be installed around a giant pillar, allowing navigation around aqueduct corners."
zhCN = "“将安装在巨型柱子周围的人行道，允许在水渠的拐角处导航。”"
zhTW = "“環繞巨型柱子的步道，允許在水渠拐角處行駛。”"
ruRU = "Пешеходная дорожка, которая будет установлена вокруг гигантской колонны, позволяя перемещаться вокруг углов акведука."
jaJP = "巨大な柱の周りに設置される歩道で、水道の角を回りながら移動できるようにします。"
frFR = "Une passerelle à installer autour d'un pilier géant, permettant de naviguer autour des coins de l'aqueduc."
deDE = "Ein Gehweg, der um einen riesigen Pfeiler installiert wird und das Navigieren um Aquädukt-Ecken ermöglicht."
plPL = "Ścieżka do zainstalowania wokół gigantycznego filaru, umożliwiająca nawigację wokół zakrętów akweduktu."
ptBR = "Uma passarela a ser instalada ao redor de um pilar gigante, permitindo navegar em torno dos cantos do aqueduto."
koKR = "거대한 기둥 주위에 설치할 수 있는 보행로로, 수로 코너를 돌아다닐 수 있게 해줍니다."
csCZ = "Cesta, která má být instalována kolem obrovského sloupu, což umožňuje navigaci kolem rohů akvaduktu."
viVN = "Một lối đi để được lắp đặt xung quanh một cột lớn, cho phép di chuyển xung quanh các góc của mương nước."
trTR = "Büyük bir sütunun etrafında kurulacak bir yürüyüş yolu, su kemeri köşelerinin etrafında dolaşmayı sağlar."

["Lapantouflemagic.8WayCorneroverhang.FlavorDescription"]
raw = "\"Thanks, I hate it.\"\n-a beaver suffering from the fear of heights"
status = "normal"
enUS = "\"Thanks, I hate it.\"  \n-a beaver suffering from the fear of heights"
zhCN = "“谢谢，我讨厌它。”  \n- 一个害怕高处的海狸"
zhTW = "謝謝，我恨死它了。  \n-一隻害怕高處的海狸"
ruRU = "\"Спасибо, мне это не нравится.\"  \n- бобер, страдающий от боязни высоты"
jaJP = "「ありがとう、嫌いだ。」  \n-「高所恐怖症に苦しむビーバー」"
frFR = "\"Merci, je déteste ça.\"  \n-un castor souffrant de la peur des hauteurs"
deDE = "\"Danke, ich hasse es.\"  \n-ein Biber, der unter Höhenangst leidet"
plPL = "\"Dzięki, nienawidzę tego.\"  \n- bóbr cierpiący na lęk wysokości"
ptBR = "\"Obrigado, eu odeio isso.\"  \n- um castor sofrendo do medo de altura"
koKR = "\"고마워, 정말 싫어.\"\n-높이에 대한 두려움을 가진 비버"
csCZ = "\"Díky, nenávidím to.\"  \n- bobr trpící strachem z výšek"
viVN = "\"Cảm ơn, tôi ghét điều đó.\"  \n-một con rái cá đang chịu đựng nỗi sợ độ cao"
trTR = "Teşekkürler, nefret ediyorum.\"\n-\"yükseklik korkusu çeken bir kunduz"

