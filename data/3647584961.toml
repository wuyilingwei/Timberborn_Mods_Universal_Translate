["Lapantouflemagic.Statue_UpsideDown.Description"]
raw = "A statue of a silly beaver, made by a silly beaver.\nCarved in a single, massive piece of wood."
status = "normal"
enUS = "A statue of a silly beaver, made by a silly beaver. Carved in a single, massive piece of wood."
