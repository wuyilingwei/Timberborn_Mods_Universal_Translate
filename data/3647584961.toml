["Lapantouflemagic.OverhangSquewer_Short.Description"]
raw = "A side platform that can be stuck between buildings or between floors.\n<color=red>Multiple side platforms or bridges cannot share the same support</color>"
status = "normal"
enUS = "A side platform that can be wedged between buildings or between floors.  \n<color=red>Multiple side platforms or bridges cannot share the same support</color>"
zhCN = "一个可以夹在建筑物之间或楼层之间的侧平台。  \n<color=red>多个侧平台或桥梁不能共享同一支撑</color>"
zhTW = "一個可以夾在建築物之間或樓層之間的側平台。  \n<color=red>多個側平台或橋樑不能共用相同的支撐</color>"
ruRU = "Боковая платформа, которую можно разместить между зданиями или между этажами. <color=red>Несколько боковых платформ или мостов не могут иметь общую опору</color>"
jaJP = "建物や階の間に挟むことができるサイドプラットフォームです。  \n<color=red>複数のサイドプラットフォームや橋は同じ支えを共有することができません</color>"
frFR = "Une plateforme latérale qui peut être placée entre les bâtiments ou entre les étages. <color=red>Plusieurs plateformes latérales ou ponts ne peuvent pas partager le même support</color>"
deDE = "Eine Seitenplattform, die zwischen Gebäuden oder zwischen Etagen platziert werden kann. <color=red>Mehrere Seitenplattformen oder Brücken können sich nicht denselben Unterstützungspunkt teilen</color>"
plPL = "Platforma boczna, którą można umieścić między budynkami lub na różnych poziomach.\n<color=red>Wiele platform bocznych lub mostów nie może dzielić tego samego wsparcia</color>"
ptBR = "Uma plataforma lateral que pode ser colocada entre edifícios ou entre andares. <color=red>Múltiplas plataformas laterais ou pontes não podem compartilhar o mesmo suporte</color>"
koKR = "건물이나 층 사이에 끼울 수 있는 측면 플랫폼입니다.  \n<color=red>여러 개의 측면 플랫폼이나 다리는 동일한 지지를 공유할 수 없습니다</color>"
csCZ = "Boční platforma, která může být umístěna mezi budovami nebo mezi patry.  \n<color=red>Více bočních platforem nebo mostů nemůže mít stejnou podporu</color>"
viVN = "Một nền tảng bên cạnh có thể được kẹp giữa các tòa nhà hoặc giữa các tầng.  \n<color=red>Các nền tảng bên cạnh hoặc cầu không thể chia sẻ cùng một hỗ trợ</color>"
trTR = "Binalar arasında veya katlar arasında yerleştirilebilen bir yan platform. <color=red>Aynı destek üzerinde birden fazla yan platform veya köprü bulunamaz</color>"

