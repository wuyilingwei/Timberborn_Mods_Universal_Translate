["Lapantouflemagic.Cookingtent.FlavorDescription"]
raw = "\"What can we put inside? Ha! What can't we put inside?\"\n -Mathilda the insane cook"
status = "normal"
enUS = "\"What can we put inside? Ha! What can't we put inside?\"  \n-Mathilda the insane cook"
zhCN = "“我们可以放些什么进去？哈！我们不能放些什么进去？”  \n- 疯狂的厨师马蒂尔达"
zhTW = "「我們可以放什麼進去？哈哈！我們不能放什麼進去？」  \n- 瘋狂的廚師馬修達"
ruRU = "\"Что мы можем положить внутрь? Ха! Что мы не можем положить внутрь?\"  \n-Матильда, безумная повариха"
jaJP = "「中に何を入れられるかな？ハハ！中に何を入れられないって？」  \n- 正気を失った料理人マチルダ"
frFR = "Que pouvons-nous mettre à l'intérieur ? Ha ! Que ne pouvons-nous pas mettre à l'intérieur ? -Mathilda, la cuisinière folle"
deDE = "„Was können wir reinstellen? Ha! Was können wir nicht reinstellen?“  \n-Mathilda, die verrückte Köchin"
plPL = "\"Co możemy włożyć do środka? Ha! Czego nie możemy włożyć do środka?\" - Mathilda, szalona kucharka"
ptBR = "\"O que podemos colocar dentro? Ha! O que não podemos colocar dentro?\"\n -Mathilda, a cozinheira insana"
koKR = "\"우리는 무엇을 넣을 수 있을까요? 하하! 우리가 무엇을 넣을 수 없겠어요?\"\n - 미친 요리사 마틸다"
csCZ = "\"Co můžeme dát dovnitř? Ha! Co nemůžeme dát dovnitř?\"  \n-Mathilda, šílená kuchařka"
viVN = "\"Chúng ta có thể cho gì vào trong? Ha! Chúng ta không thể cho gì vào trong?\" - Mathilda, đầu bếp điên rồ"
trTR = "\"İçine ne koyabiliriz? Ha! İçine ne koyamayız ki?\"  \n-Mathilda, akıl hastası aşçı"

