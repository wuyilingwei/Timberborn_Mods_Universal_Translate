["Lapantouflemagic.StorageHouseB.FlavorDescription"]
raw = "\"I... I tried, I really tried, but I couldn't help myself, I HAD to make it a house!\"\n -An architect beaver"
status = "normal"
enUS = "\"I... I tried, I really tried, but I couldn't help myself, I HAD to make it a house!\"  \n-An architect beaver"
zhCN = "“我……我试过，真的试过，但我控制不住自己，我非得把它做成一座房子！”\n - 一只建筑师海狸"
zhTW = "「我... 我努力了，我真的努力了，但我無法自制，我必須把它變成一個房子！」  \n- 一位建築師海狸"
ruRU = "\"Я... Я пытался, я действительно пытался, но не смог себя сдержать, мне НУЖНО было сделать это домом!\"  \n- Архитектор-бобёр"
jaJP = "「私…私が試したの、ほんとうに試したけど、どうしても我慢できなかったの、家にしなければならなかったの！」  \n- 建築家のビーバー"
frFR = "\"J... J'ai essayé, j'ai vraiment essayé, mais je ne pouvais pas me contenir, je DEVais en faire une maison !\"\n - Un castor architecte"
deDE = "\"Ich... Ich habe es versucht, ich habe es wirklich versucht, aber ich konnte mich nicht zurückhalten, ich MUSSTE es zu einem Haus machen!\"\n -Ein Architekt-Topo"
plPL = "\"Ja... Ja próbowałem, naprawdę próbowałem, ale nie mogłem się powstrzymać, MUSIAŁEM zbudować dom!\"  \n -Architekt bóbr"
ptBR = "\"Eu... Eu tentei, eu realmente tentei, mas não consegui me controlar, eu TIVE que transformar isso em uma casa!\"  \n-Um castor arquiteto"
koKR = "\"나는... 나는 정말 노력했어, 정말 노력했지만, 참을 수가 없었어, 반드시 집으로 만들어야 했어!\"  \n- 건축가 비버"
csCZ = "\"Já... Já jsem se snažil, opravdu jsem se snažil, ale nemohl jsem si pomoct, MUSEL jsem z toho udělat dům!\"  \n -Architekt bobr"
viVN = "\"Tôi... Tôi đã cố gắng, tôi thật sự đã cố gắng, nhưng tôi không thể kiềm chế, tôi PHẢI biến nó thành một ngôi nhà!\"\n -Một con nhím kiến trúc sư"
trTR = "\"Ben… Denedim, gerçekten denedim ama kendime engel olamadım, bunu bir ev yapmak zorundaydım!\"\n -Bir mimar kunduz"

