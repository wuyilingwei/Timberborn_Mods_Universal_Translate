["Lapantouflemagic.Topentrancewatertightlodge_PowderStorage.Description"]
raw = "A medium-sized watertight lodge built around a ladder, with an extra stockpile floor.\nManages a pilables storage space.\nCan be stacked on itself, variants, and can carry select buildings.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A medium-sized watertight lodge built around a ladder, with an extra stockpile floor.  \nManages a pilables storage space.  \nCan be stacked on itself, variants, and can carry select buildings.  \n<color=#00FFFF>Works as a Levee</color>"
zhCN = "一个中型的防水小屋，围绕着梯子建造，配有额外的储藏层。\n管理一个可堆放的储存空间。\n可以自堆叠、变体，并且能够承载特定建筑。\n<color=#00FFFF>作为堤坝工作</color>"
zhTW = "一個中型的防水小屋，建在梯子周圍，並擁有額外的儲藏樓層。\n管理一個可堆積的儲存空間。\n可以自行堆疊，變體，並能攜帶特定建築。\n<color=#00FFFF>作為防洪堤運作</color>"
ruRU = "Среднего размера водонепроницаемый домик, построенный вокруг лестницы, с дополнительным этажом для хранения. Управляет пространством для хранения пил. Может накладываться на себя, имеет варианты и может переносить определенные здания. <color=#00FFFF>Работает как дамба</color>"
jaJP = "「はしごを囲んで建てられた中型の防水小屋で、追加のストックパイル階があります。\nパイプの収納スペースを管理します。\n自分自身やバリアントに重ねることができ、特定の建物を運ぶことができます。\n<color=#00FFFF>堤防のように機能します</color>」"
frFR = "Une cabane étanche de taille moyenne construite autour d'une échelle, avec un étage de stockage supplémentaire. Gère un espace de stockage pour pilables. Peut être empilée sur elle-même, variantes, et peut contenir des bâtiments sélectionnés. <color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Eine mittelgroße wasserdichte Lodge, die um eine Leiter gebaut ist, mit einem zusätzlichen Lagerboden. Verwaltert einen Lagerraum für Pilables. Kann auf sich selbst, Varianten gestapelt werden und kann ausgewählte Gebäude tragen. <color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Lodża wodoodporna średniej wielkości zbudowana wokół drabiny, z dodatkowym piętrem do składowania.\nZarządza przestrzenią do przechowywania pilabel.\nMoże być układana na samej sobie, wersje, i może przenosić wybrane budynki.\n<color=#00FFFF>Funkcjonuje jako grobla</color>"
ptBR = "Uma cabana à prova d'água de tamanho médio construída em torno de uma escada, com um andar extra para estocagem.\nGerencia um espaço de armazenamento para estacas.\nPode ser empilhada sobre si mesma, variantes, e pode transportar edifícios selecionados.\n<color=#00FFFF>Funciona como uma Atalaia</color>"
koKR = "사다리를 중심으로 지어진 중간 크기의 방수 로지로, 추가적인 재고층이 있습니다. 파일 저장 공간을 관리합니다. 자신과 변형체를 겹쳐 쌓을 수 있으며, 특정 건물을 운반할 수 있습니다. <color=#00FFFF>둑으로 작동합니다</color>"
csCZ = "Středně velká vodotěsné chata postavená kolem žebříku, s dalším skladištním patrem. \nSpravuje skladovací prostor pro pilaby. \nLze na sebe skládat, varianty, a může nést vybrané budovy. \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một nhà kho vừa đủ lớn được xây dựng quanh một cái thang, có thêm một tầng kho trữ.\nQuản lý không gian lưu trữ pilables.\nCó thể xếp chồng lên chính nó, các biến thể, và có thể mang theo một số công trình nhất định.\n<color=#00FFFF>Hoạt động như một Đê</color>"
trTR = "Merdivenin etrafında inşa edilmiş, ek bir stok alanına sahip orta boy su geçirmez bir kulübe.\nBirikim alanı yönetir.\nKendisi, türleri üzerinde istiflenebilir ve belirli yapıları taşıyabilir.\n<color=#00FFFF>Bir Set olarak çalışır</color>"

["Lapantouflemagic.Topentrancewatertightlodge_PowderStorage.FlavorDescription"]
raw = "\"Holy pointer! We ordered that design years ago, it was about time!\"\n -An annoyed hauler beaver."
status = "normal"
enUS = "\"Holy pointer! We ordered that design years ago, it was about time!\"  \n-An annoyed hauler beaver."
zhCN = "“神圣的指针！我们几年前就订购了那个设计，早该来了！”  \n——一个生气的搬运海狸。"
zhTW = "“神聖的指標！我們幾年前就訂購了那個設計，早該這樣了！”  \n—一隻惱怒的搬運水獺。"
ruRU = "\"Святой указатель! Мы заказывали этот дизайн годы назад, давно было время!\" - Раздосадованный грузчик-бобер."
jaJP = "「なんて指示だ！あのデザインを数年前に注文したが、そろそろ来るだろう！」  \n- うんざりした荷運びビーバー。"
frFR = "\"Saint pointeur ! Nous avons commandé ce design il y a des années, il était temps !\" - Un castor transporteur agacé."
deDE = "\"Heiliger Zeigefinger! Wir haben dieses Design vor Jahren bestellt, es wurde Zeit!\"  \n-Ein genervter Transportbiber."
plPL = "\"Święty wskaźniku! Zamówiliśmy ten projekt lata temu, najwyższy czas!\"  \n -Zniecierpliwiony bobr."
ptBR = "\"Pontinho sagrado! Pedimos esse design há anos, já estava na hora!\"  \n- Um castor transportador irritado."
koKR = "\"신성한 지표! 우리는 그 디자인을 몇 년 전에 주문했어, 이제야 그때가 왔군!\"  \n- 짜증난 짐꾼 비버."
csCZ = "\"Světíčko! Tenhle design jsme objednali před lety, bylo na čase!\"  \n-Nevrlý nosič bobr."
viVN = "\"Ôi trời, cái thiết kế đó chúng tôi đã đặt hàng từ nhiều năm trước, đến lúc này rồi!\"  \n-Một con béo vận chuyển khó chịu."
trTR = "\"Aziz işaretçi! O tasarımı yıllar önce sipariş etmiştik, tam zamanıydı!\"  \n- Sinirli bir taşıyıcı kunduz."

