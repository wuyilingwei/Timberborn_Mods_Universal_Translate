["Lapantouflemagic.ScavengerDen.Description"]
raw = "An oversized shredder that is also a house for obvious reasons.\nProvides scavenger beavers with the perfect place to plan their work, prepare their equipment, and recycle all the trash those pesky hoomans left behind.\nAlso gives access to the <color=green>zipline network</color> to maximize working range.\n<color=green>Connections: 6</color>\n<color=#00FFFF>Works as a Levee</color>\n<color=red>Can connect from the bottom to a ladder or pit-and-ladder lodge.</color>"
status = "normal"
enUS = "An oversized shredder that also serves as a house for obvious reasons. Provides scavenger beavers with the perfect place to plan their work, prepare their equipment, and recycle all the trash those pesky humans left behind. Also grants access to the <color=green>zipline network</color> to maximize working range. <color=green>Connections: 6</color> <color=#00FFFF>Functions as a Levee</color> <color=red>Can connect from the bottom to a ladder or pit-and-ladder lodge.</color>"
zhCN = "一台超大的碎纸机，显而易见还是一所房子。\n为 scavenger 海狸提供了一个完美的地方来规划他们的工作，准备他们的设备，并回收那些讨厌的人类留下的所有垃圾。\n还提供了通往<color=green>滑索网络</color>的通道，以最大化工作范围。\n<color=green>连接数：6</color>\n<color=#00FFFF>作为堤坝使用</color>\n<color=red>可以从底部连接到梯子或台阶-梯子小屋。</color>"
zhTW = "一個過大的切碎機，顯然也是一座房子。\n為撿荒海狸提供了計劃工作、準備設備和回收那些麻煩的人的廢棄物的完美場所。\n還提供通往<color=green>索道網絡</color>的通道，以最大化工作範圍。\n<color=green>連接數: 6</color>\n<color=#00FFFF>作為堤壩工作</color>\n<color=red>可以從底部連接到梯子或坑梯小屋。</color>"
ruRU = " oversized shredder, который также является домом по очевидным причинам.\nПредоставляет бобрам-собирателям идеальное место для планирования своей работы, подготовки оборудования и переработки всего мусора, который оставили эти надоедливые человечки.\nТакже предоставляет доступ к <color=green>сетке канатов</color>, чтобы максимизировать рабочую область.\n<color=green>Связи: 6</color>\n<color=#00FFFF>Работает как плотина</color>\n<color=red>Может соединяться снизу с лестницей или хижиной с лестницей.</color>"
jaJP = "「明らかに理由がある巨大なシュレッダーであり、家でもあります。\nスカベンジャービーバーに、自分たちの作業を計画し、装備を整え、人間が置き去りにした全てのゴミをリサイクルするための完璧な場所を提供します。\n作業範囲を最大化するために、<color=green>ジップラインネットワーク</color>へのアクセスも提供します。\n<color=green>接続数: 6</color>\n<color=#00FFFF>堤防として機能します</color>\n<color=red>底から梯子またはピット・アンド・ラダーの小屋に接続可能です。</color>」"
frFR = "Un broyeur surdimensionné qui est aussi une maison, pour des raisons évidentes. \nFournit aux castors récupérateurs l'endroit parfait pour planifier leur travail, préparer leur équipement et recycler tous les déchets que ces maudits humains ont laissés derrière eux. \nDonne également accès au <color=green>réseau de tyroliennes</color> pour maximiser la portée de travail. \n<color=green>Connexions : 6</color> \n<color=#00FFFF>Fonctionne comme un levée</color> \n<color=red>Peut se connecter par le bas à une échelle ou à un pavillon avec échelle et fosse.</color>"
deDE = "Ein übergroßer Schredder, der auch aus offensichtlichen Gründen ein Haus ist. \nBietet den trainierenden Bibern den perfekten Ort, um ihre Arbeit zu planen, ihre Ausrüstung vorzubereiten und all den Müll zu recyceln, den diese lästigen Menschen hinterlassen haben. \nBietet zudem Zugang zum <color=green>Seilbahnnetz</color>, um die Reichweite der Arbeit zu maximieren. \n<color=green>Verbindungen: 6</color> \n<color=#00FFFF>Funktioniert als Deich</color> \n<color=red>Kann von unten mit einer Leiter oder einem Leitern-Haus verbunden werden.</color>"
plPL = "Przeskalowany niszczarka, która jest również domem z oczywistych powodów.\nZapewnia szopom bobrom idealne miejsce do planowania swojej pracy, przygotowywania sprzętu i recyklingu wszystkich śmieci, które te uciążliwe ludzie zostawili.\nDaje również dostęp do <color=green>sieci linowców</color>, aby maksymalnie zwiększyć zasięg pracy.\n<color=green>Połączenia: 6</color>\n<color=#00FFFF>Działa jako wał</color>\n<color=red>Może łączyć się od dołu z drabiną lub domkiem drabinowym.</color>"
ptBR = "Um trituradouro oversized que também serve como uma casa, por razões óbvias.  \nProporciona aos castores catadores o lugar perfeito para planejar seu trabalho, preparar seu equipamento e reciclar todo o lixo que esses humanos encrenqueiros deixaram para trás.  \nTambém dá acesso à <color=green>rede de tirolesas</color> para maximizar o alcance de trabalho.  \n<color=green>Conexões: 6</color>  \n<color=#00FFFF>Funciona como um dique</color>  \n<color=red>Pode se conectar da parte de baixo a uma escada ou cabana de escada com poço.</color>"
koKR = "너무 큰 분쇄기로, 당연한 이유로 집이기도 합니다.\n이것은 쓰레기 수거 비버들에게 작업 계획, 장비 준비, 그리고 성가신 인간들이 남긴 모든 쓰레기를 재활용할 수 있는 완벽한 장소를 제공합니다.\n또한 작업 범위를 극대화하기 위해 <color=green>짚라인 네트워크</color>에 접근할 수 있게 해줍니다.\n<color=green>연결: 6</color>\n<color=#00FFFF>제방으로 작동합니다</color>\n<color=red>아래쪽에서 사다리나 구덩이-사다리 누각에 연결할 수 있습니다.</color>"
csCZ = "Obří drtič, který je zároveň domem z očividných důvodů.  \nPoskytuje vydřičím bobrům dokonalé místo k plánování jejich práce, přípravě vybavení a recyklaci všech odpadků, které ti otravní lidé zanechali.  \nTaké poskytuje přístup k <color=green>síti lanovek</color>, aby se maximalizoval pracovní dosah.  \n<color=green>Přípojení: 6</color>  \n<color=#00FFFF>Funguje jako hráz</color>  \n<color=red>Může se připojit zespodu k žebříku nebo chatě se žebříkem a jámou.</color>"
viVN = "Một máy nghiền quá khổ cũng là một ngôi nhà vì lý do hiển nhiên. Cung cấp cho những con Beaver hái lượm một nơi lý tưởng để lên kế hoạch cho công việc, chuẩn bị thiết bị và tái chế tất cả rác rưởi mà những con người phiền phức để lại. Cũng cung cấp quyền truy cập vào <color=green>mạng lưới dây zip</color> để tối đa hóa phạm vi làm việc. <color=green>Kết nối: 6</color> <color=#00FFFF>Hoạt động như một con đê</color> <color=red>Có thể kết nối từ dưới lên thang hoặc nhà có thang và hố.</color>"
trTR = "Aşırı büyük bir parçalayıcı, aynı zamanda belli sebeplerden ötürü bir evdir.  \nAşırı tatlı gelen bıyıklı kunduzlar için işlerini planlayacak, ekipmanlarını hazırlayacak ve o rahatsız edici insanoğlunun geride bıraktığı tüm çöpleri geri dönüştürecek mükemmel bir yer sağlar.  \nAyrıca çalışma alanını maksimize etmek için <color=green>ip çekme ağına</color> erişim sağlar.  \n<color=green>Bağlantılar: 6</color>  \n<color=#00FFFF>Kanal gibi çalışır</color>  \n<color=red>Alt kısımdan bir merdiven veya çukur-merkepen yurduna bağlanabilir.</color>"

["Lapantouflemagic.ScavengerDen.FlavorDescription"]
raw = "\"Please keep in mind that injuries caused by pitfalls, swinging blades, boulder traps and poisoned darts are not covered by the insurance company.\nHave a nice scavenging day!\"\n-Toilet reminder sign"
status = "normal"
enUS = "\"Please keep in mind that injuries caused by pitfalls, swinging blades, boulder traps and poisoned darts are not covered by the insurance company. Have a nice scavenging day!\"  \n-Toilet reminder sign"
zhCN = "“请注意，因掉坑、摆动刀刃、石块陷阱和毒飞镖造成的伤害不在保险公司的赔偿范围内。祝您有个愉快的搜刮日！ -卫生间提醒标志”"
zhTW = "「請注意，因陷阱、擺動的刀刃、岩石陷阱和毒飛鏢造成的傷害不在保險公司的賠償範圍內。祝您有個愉快的搜尋日！」  \n- 廁所提醒標誌"
ruRU = "\"Пожалуйста, имейте в виду, что травмы, вызванные ямами, колющими лезвиями, ловушками из валунов и отравленными дротиками, не покрываются страховой компанией. \nХорошего дня на поисках добычи!\" \n- Знак напоминания о туалете"
jaJP = "「落とし穴、振り子の刃、岩の罠、毒薬の矢によって引き起こされた怪我は保険会社の対象外であることにご注意ください。\n良い収集日を！」 \n- トイレの注意書き"
frFR = "Veuillez garder à l'esprit que les blessures causées par des pièges à fosses, des lames pendantes, des pièges en pierre et des fléchettes empoisonnées ne sont pas couvertes par la compagnie d'assurance.  \nBonne journée de récupération !  \n-Avis de rappel aux toilettes"
deDE = "Bitte denken Sie daran, dass Verletzungen, die durch Fallstricke, schwingende Klingen, Felsfallen und vergiftete Pfeile verursacht werden, nicht von der Versicherungsgesellschaft abgedeckt sind. \nEinen schönen Schrottsammeltag! \n -Hinweis fürs Badezimmer"
plPL = "\"Proszę pamiętać, że obrażenia spowodowane pułapkami, wahadłowymi ostrzami, pułapkami z głazami i zatrutymi strzałkami nie są objęte ubezpieczeniem.\nMiłego dnia przy zbieraniu!\" \n- Znak przypomnienia o toaletach"
ptBR = "\"Por favor, tenha em mente que lesões causadas por buracos, lâminas oscilantes, armadilhas de rochas e dardos envenenados não estão cobertas pela companhia de seguros. Tenha um ótimo dia de coleta!\" \n-Placa de lembrete do banheiro"
koKR = "\"함정, 휘두르는 칼, 바위 덫 및 독침으로 인한 부상은 보험 회사에서 보장하지 않음을 유의해 주시기 바랍니다. \n훌륭한 채집의 하루 되세요!\"\n- 화장실 알림 표지판"
csCZ = "\"Vezměte prosím na vědomí, že zranění způsobená pastmi, kyvnými čepelemi, kamennými pastmi a jedovatými šipkami nejsou kryta pojišťovnou. \nPřejeme vám hezký den při sběru!\" \n- Signál připomínající toaletu"
viVN = "\"Xin hãy nhớ rằng những chấn thương do hố bẫy, lưỡi dao swinging, bẫy tảng đá và mũi tên độc gây ra sẽ không được bảo hiểm chi trả. \nChúc bạn có một ngày thu nhặt vui vẻ!\" \n-Biển nhắc nhở về nhà vệ sinh"
trTR = "Lütfen tuzaklar, sallanan bıçaklar, kayalık tuzaklar ve zehirli uçlar tarafından yaratılan yaralanmaların sigorta şirketi tarafından karşılanmadığını unutmayın. \nİyi bir hayvan avı günü dileriz!\" \n- \"Tuvalet hatırlatma tabelası"

["Lapantouflemagic.Zipline_SmallTower.Description"]
raw = "A quick and terrifying mode of travel.\n<color=#FFA500>Small Tower</color>, <color=#FF6EC7>Can support upgrades</color>\n<color=green>Connections: 2</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A quick and terrifying mode of travel.  \n<color=#FFA500>Small Tower</color>, <color=#FF6EC7>Can support upgrades</color>  \n<color=green>Connections: 2</color>  \n<color=#00FFFF>Works as a Levee</color>"
zhCN = "一种快速而可怕的旅行方式。\n<color=#FFA500>小塔</color>，<color=#FF6EC7>可以支持升级</color>\n<color=green>连接: 2</color>\n<color=#00FFFF>作为堤岸使用</color>"
zhTW = "一種快速而可怕的旅行方式。  \n<color=#FFA500>小塔</color>，<color=#FF6EC7>可支援升級</color>  \n<color=green>連結數：2</color>  \n<color=#00FFFF>作為堤壩使用</color>"
ruRU = "Быстрый и пугающий способ передвижения.  \n<color=#FFA500>Небольшая башня</color>, <color=#FF6EC7>Может поддерживать улучшения</color>  \n<color=green>Соединения: 2</color>  \n<color=#00FFFF>Работает как насыпь</color>"
jaJP = "迅速かつ恐ろしい移動手段です。\n<color=#FFA500>小さな塔</color>、<color=#FF6EC7>アップグレードをサポート可能</color>\n<color=green>接続数: 2</color>\n<color=#00FFFF>堤防として機能します</color>"
frFR = "Un mode de transport rapide et terrifiant.  \n<color=#FFA500>Petite Tour</color>, <color=#FF6EC7>Peut supporter des améliorations</color>  \n<color=green>Connexions : 2</color>  \n<color=#00FFFF>Fonctionne comme une levée</color>"
deDE = "Ein schneller und furchteinflößender Reisemodus.  \n<color=#FFA500>Kleiner Turm</color>, <color=#FF6EC7>Kann Upgrades unterstützen</color>  \n<color=green>Verbindungen: 2</color>  \n<color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Szybki i przerażający sposób podróżowania.  \n<color=#FFA500>Mała wieża</color>, <color=#FF6EC7>można modernizować</color>  \n<color=green>Połączenia: 2</color>  \n<color=#00FFFF>Działa jak wał</color>"
ptBR = "Um modo de viagem rápido e aterrorizante.\n<color=#FFA500>Pequena Torre</color>, <color=#FF6EC7>Pode suportar melhorias</color>\n<color=green>Conexões: 2</color>\n<color=#00FFFF>Funciona como um dique</color>"
koKR = "빠르고 무서운 이동 수단입니다.\n<color=#FFA500>소형 타워</color>, <color=#FF6EC7>업그레이드를 지원합니다</color>\n<color=green>연결: 2</color>\n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Rychlý a děsivý způsob cestování.  \n<color=#FFA500>Malá věž</color>, <color=#FF6EC7>lze vylepšovat</color>  \n<color=green>Propojení: 2</color>  \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một phương thức di chuyển nhanh chóng và đáng sợ.  \n<color=#FFA500>Tháp Nhỏ</color>, <color=#FF6EC7>Có thể hỗ trợ nâng cấp</color>  \n<color=green>Kết nối: 2</color>  \n<color=#00FFFF>Hoạt động như một Đê</color>"
trTR = "Hızlı ve korkutucu bir seyahat yöntemi.  \n<color=#FFA500>Küçük Kule</color>, <color=#FF6EC7>Yükseltmeleri destekleyebilir</color>  \n<color=green>Bağlantılar: 2</color>  \n<color=#00FFFF>Düzenek olarak çalışır</color>"

["Lapantouflemagic.Zipline_SmallTower.FlavorDescription"]
raw = "\"A bench just a few meters under some flowerpots? This seems like the perfect place for an… accident.\"\n-Jack the Gnawer, public safety report."
status = "normal"
enUS = "\"A bench just a few meters under some flowerpots? This seems like the perfect place for an… accident.\"  \n-Jack the Gnawer, public safety report."
zhCN = "“在一些花盆下方几米的长椅？这似乎是发生…意外的完美地点。”  \n—啃啃鼠杰克，公共安全报告。"
zhTW = "「幾公尺下方放著一些花盆的長椅？這似乎是個發生…意外的完美地方。」\n— 咬咬，公共安全報告。"
ruRU = "\"Скамейка всего в нескольких метрах под цветочными вазами? Это кажется идеальным местом для… несчастного случая.\"  \n-Джек Грызун, отчет по общественной безопасности."
jaJP = "「花鉢の下にあるベンチ？これは事故の…完璧な場所のようです。」\n- ジャック・ザ・ノウアー、公共安全報告。"
frFR = "\"Un banc juste quelques mètres sous des pots de fleurs ? Cela semble être l'endroit parfait pour un... accident.\"  \n-Jack le Rongeur, rapport de sécurité publique."
deDE = "\"Eine Bank nur wenige Meter unter einigen Blumentöpfen? Das scheint der perfekte Ort für einen... Unfall zu sein.\"  \n-Jack der Nager, Sicherheitsbericht."
plPL = "Ławka zaledwie kilka metrów pod doniczkami? To wydaje się idealnym miejscem na… wypadek.\"  \n-Jack Gniewacz, raport dotyczący bezpieczeństwa publicznego."
ptBR = "\"Um banco a apenas alguns metros debaixo de alguns vasos de flores? Este parece ser o lugar perfeito para um… acidente.\"  \n-Jack, o Rato, relatório de segurança pública."
koKR = "\"꽃 화분 아래 몇 미터 떨어진 벤치? 이곳은 사고가 일어나기 딱 좋은 장소인 것 같습니다.\"\n- 잭 더 노워, 공공 안전 보고서."
csCZ = "Bezpečnostní zpráva: 'Lavička jen pár metrů pod květináči? To vypadá jako ideální místo pro… nehodu.' - Jack Hryzák."
viVN = " Một cái ghế chỉ cách vài mét dưới một vài chậu hoa? Đây có vẻ là nơi hoàn hảo cho một… tai nạn.\"\n-Jack the Gnawer, báo cáo an toàn công cộng."
trTR = "\"Bazı çiçek saksilerinin birkaç metre altında bir bankı mı? Bu, bir... kaza için mükemmel bir yer gibi görünüyor.\"\n-Jack the Gnawer, kamu güvenliği raporu."

