jaJP = "「マチルダよりはまだ安全だ。」 - 賢者トゥースレス、老いたビーバー"
frFR = "\"Encore plus sûr que Mathilda.\" - Dents de Sagesse, castor ancien"
deDE = "\"Immer noch sicherer als Mathilda.\"\n -Zahnlos der Weise, elder Biber"
plPL = "\"Jeszcze bezpieczniej niż u Mathildy.\"  \n- Bezzębny Mędrzec, starszy bóbr"
ptBR = "\"Ainda mais seguro que a Mathilda.\" - Sem Dente, o Sábio, castor ancião"
koKR = "\"여전히 마틸다보다 안전하다.\"\n - 지혜로운 이빨 없는 비버, 토슬리스"
csCZ = "\"Stále bezpečnější než Mathilda.\"  \n- Bezzubý Moudrý, starší bobr"
