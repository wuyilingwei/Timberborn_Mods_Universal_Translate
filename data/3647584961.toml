["Lapantouflemagic.Lotus.FlavorDescription"]
raw = "\"If you find a black one, you can sell it to the nerds for thousands of cabbages!\"\n -A farmer beaver"
status = "normal"
enUS = "\"If you find a black one, you can sell it to the nerds for thousands of cabbages!\"  \n-A farmer beaver"
zhCN = "“如果你找到一个黑色的，可以卖给书呆子们换成成千上万的洋白菜！”  \n- 一只农夫海狸"
zhTW = "\"如果你找到一隻黑色的，你可以把它賣給書呆子，賺幾千顆白菜！\"  \n- 一位農夫海狸"
ruRU = "\"Если вы найдете черного, вы можете продать его задротам за тысячи капуст!\"  \n- Фермер-бобер"
jaJP = "「もし黒いのを見つけたら、オタクたちに何千個ものキャベツと引き換えに売ることができる！」  \n- 農夫ビーバー"
frFR = "\"Si vous en trouvez un noir, vous pouvez le vendre aux nerds pour des milliers de choux !\"\n -Un castor fermier"
deDE = "\"Wenn du einen schwarzen findest, kannst du ihn an die Nerds für Tausende von Kohl verkaufen!\"  \n -Ein Bauernbiber"
plPL = "\"Jeśli znajdziesz czarną, możesz ją sprzedać nerdom za tysiące kapust!\"  \n -Wielka bobrza rolniczka"
ptBR = "\"Se você encontrar um preto, pode vendê-lo para os nerds por milhares de repolhos!\"  \n- Um castor agricultor"
koKR = "\"검은색을 발견하면, 그것을 nerd들에게 수천 개의 양배추로 팔 수 있어!\"  \n- 농부 비버"
csCZ = "\"Pokud najdeš černého, můžeš ho prodat nerdům za tisíce zelí!\"  \n -Farmářský bobr"
viVN = "\"Nếu bạn tìm thấy một cái màu đen, bạn có thể bán nó cho bọn mọt sách với giá hàng ngàn bắp cải!\"\n - Một con nhím nông dân"
trTR = "\"Eğer siyah olanı bulursan, onu nerdlere binlerce lahana karşılığında satabilirsin!\"  \n -Bir çiftçi kunduz"

