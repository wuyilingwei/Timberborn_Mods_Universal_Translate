["Lapantouflemagic.Aqueduct_Bridge.Description"]
raw = "A small piece of aqueduct made out of light materials to bridge small gaps between two other segments."
status = "normal"
enUS = "A small piece of aqueduct made from lightweight materials to span small gaps between two other segments."
zhCN = "一小块由轻质材料制成的水道，用于连接两个其他部分之间的小间隙。"
zhTW = "一小段由輕質材料製成的水道，用來連接兩個其他部分之間的小間隙。"
ruRU = "Небольшой участок акведука, сделанный из легких материалов, чтобы соединять небольшие промежутки между двумя другими сегментами."
jaJP = "「他の二つのセグメントの間の小さな隙間を埋めるために軽量材料で作られた小さな水道橋の一部。」"
frFR = "Un petit morceau d'aqueduc fait de matériaux légers pour relier de petits espaces entre deux autres segments."
deDE = "Ein kleines Stück Aquädukt aus leichten Materialien, um kleine Lücken zwischen zwei anderen Segmenten zu überbrücken."
plPL = "Mały fragment akweduktu wykonany z lekkich materiałów, aby wypełnić małe luki między dwoma innymi segmentami."
ptBR = "Uma pequena peça de aqueduto feita de materiais leves para conectar pequenas lacunas entre dois outros segmentos."
koKR = "두 개의 다른 세그먼트 사이의 작은 틈을 메우기 위해 가벼운 재료로 만들어진 작은 수로의 조각입니다."
csCZ = "Malý kus akvaduktu vyrobený z lehkých materiálů, který spojuje malé mezery mezi dvěma dalšími segmenty."
viVN = "Một đoạn nhỏ của hệ thống dẫn nước làm từ vật liệu nhẹ để nối giữa hai đoạn khác."
trTR = "İki segment arasındaki küçük boşlukları kapatmak için hafif malzemelerden yapılmış küçük bir su kemeri parçası."

