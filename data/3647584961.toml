plPL = "Produkcja żywicy całkowicie z podstawowych surowców? To niesamowite!"
ptBR = "\"Manufacturar resina inteiramente a partir de elementos básicos? Isso é incrível!\""
koKR = "\"기본 원소만으로 수지를 제조한다고요? 이건 놀라워요!\""
