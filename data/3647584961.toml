["Lapantouflemagic.SmallBadwaterPump.Description"]
raw = "A small, manually-operated bad water pumping station.\nPossibly designed by a deranged beaver.\nThe propeller needs to be submerged.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A small, manually-operated bad water pumping station. Possibly designed by a deranged beaver. The propeller needs to be submerged. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一个小型手动污水泵站。\n可能是由一只疯狂的海狸设计的。\n螺旋桨需要浸入水中。\n<color=#00FFFF>作为堤坝工作</color>"
zhTW = "一個小型手動操作的壞水抽水站。  \n可能是由一隻瘋狂的海狸設計的。  \n螺旋槳需要淹沒在水中。  \n<color=#00FFFF>作為堤壩使用</color>"
ruRU = "Небольшая станция ручного откачивания загрязненной воды. Возможно, спроектирована психически неустойчивым бобром. Пропеллер должен быть погружен. <color=#00FFFF>Работает как плотина</color>"
jaJP = "「小型の手動で操作する悪水ポンプステーション。\nおそらく狂ったビーバーによって設計された。\nプロペラは水に沈める必要があります。\n<color=#00FFFF>堤防として機能します</color>」"
frFR = "Une petite station de pompage d'eau mauvaise, manuelle.  \nPossiblement conçue par un castor dérangé.  \nLa hélice doit être submergée.  \n<color=#00FFFF>Fonctionne comme une levée</color>"
deDE = "Eine kleine, manuell betriebene Pumpe für schlechtes Wasser. Möglicherweise entworfen von einem wahnsinnigen Biber. Der Propeller muss untergetaucht sein. <color=#00FFFF>Funktioniert wie ein Deich</color>"
plPL = "Mała, ręcznie obsługiwana stacja pompowania złej wody. Prawdopodobnie zaprojektowana przez szalonego bobra. Śmigło musi być zanurzone. <color=#00FFFF>Funkcjonuje jako wał</color>"
ptBR = "Uma pequena estação de bombeamento de água ruim, operada manualmente. Possivelmente projetada por um castor desequilibrado. O hélice precisa estar submerso. <color=#00FFFF>Funciona como um Dique</color>"
koKR = "작고 수동으로 운영되는 불량수 펌프 시설입니다.  \n정신이 나간 비버가 설계했을 가능성이 있습니다.  \n프로펠러는 물에 잠겨 있어야 합니다.  \n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Malá, ručně ovládaná čerpací stanice na špatnou vodu.\nMožná navržena bláznivým bobrem.\nLopatka musí být ponořena.\n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một trạm bơm nước bẩn nhỏ, vận hành bằng tay.  \nCó thể được thiết kế bởi một con rái cá điên cuồng.  \nQuạt cần phải được ngâm trong nước.  \n<color=#00FFFF>Hoạt động như một đê</color>"
trTR = "Küçük, elle çalıştırılan kötü su pompa istasyonu. \nMuhtemelen deli bir kunduz tarafından tasarlandı. \nPervanenin suya batırılması gerekiyor. \n<color=#00FFFF>Bir Set Olarak Çalışır</color>"

["Lapantouflemagic.SmallBadwaterPump.FlavorDescription"]
raw = "\"Why would anyone design something like this? Younglings these days...\"\n -Toothless the Wise, elder beaver"
status = "normal"
enUS = "\"Why would anyone design something like this? Younglings these days...\"  \n-Toothless the Wise, elder beaver"
zhCN = "“为什么会有人设计这样的东西？现在的小家伙们真是...”  \n- 智者无牙，老海狸"
zhTW = "「為什麼會有人設計出這樣的東西？現在的幼崽們……」  \n- 盲目智慧的無齒狸，老貂"
ruRU = "«Почему кто-то стал бы проектировать нечто подобное? Молодежь в наши дни...»\n- Беззубик Мудрый, старейшина бобров"
jaJP = "「なんで誰かがこんなものをデザインするんだ？最近の若者たちは…」  \n- 賢者トゥースレス、長老ビーバー"
frFR = "\"Pourquoi quelqu'un concevrait-il quelque chose comme ça ? Les jeunes de nos jours...\"  \n- Sans-Dent le Sage, castor âgé"
deDE = "„Warum würde jemand so etwas entwerfen? Die Jünglinge heutzutage…“  \n- Zahnlos der Weise, älterer Biber"
plPL = "Dlaczego ktokolwiek zaprojektowałby coś takiego? Młodzież w dzisiejszych czasach...\"\"  \n- Bezzębny Mądry, starszy bó"
ptBR = "\"Por que alguém desenharia algo assim? Os jovens de hoje...\"  \n- Sem Dentes, o Sábio, castor ancião"
koKR = "\"누가 이런 것을 설계할 생각을 했을까요? 요즘 젊은이들은...\"\n - 지혜로운 이빨 없는 비버, 노인"
csCZ = "\"Proč by někdo něco takového navrhoval? Ty dnešní mladé...\"\n - Bezostré moudrý, starý bobr"
viVN = "\"”“Tại sao ai đó lại thiết kế một cái gì đó như thế này? Những đứa trẻ ngày nay…” \n- Răng Mẻ, nhím trưởng lão”"
trTR = "\"Birisi bunu neden tasarlasın ki? Gençler günümüzde böyle...\"  \n- Bilge Dişsiz, yaşlı kunduz"

["Need.Trebuchetdeath.DeathMessage"]
raw = "<color=green>thought it would be hilarious to hide in the trebuchet basket. To be fair it was.</color>"
status = "normal"
enUS = "<color=green>thought it would be hilarious to hide in the trebuchet basket. To be fair, it was.</color>"
zhCN = "<color=green>以为躲在投石机的篮子里会很搞笑。说实话确实是。</color>"
zhTW = "<color=green>以為躲在投石機籃中會很好笑。公平地說，確實是。</color>"
ruRU = "<color=green>думал, что будет смешно спрятаться в корзине метательной машины. Честно говоря, это так и было.</color>"
jaJP = "<color=green>自分はトレビュシェのバスケットに隠れるのが面白いと思った。正直言って、それは面白かった。</color>"
frFR = "<color=green>pensait que ce serait hilarant de se cacher dans le panier de la trébuchet. Pour être juste, c'était le cas.</color>"
deDE = "<color=green>fand es urkomisch, mich im Trebuchet-Korb zu verstecken. Um fair zu sein, es war es.</color>"
plPL = "<color=green>myślałem, że będzie zabawnie schować się w koszu trebucheta. Szczerze mówiąc, było.</color>"
ptBR = "<color=green>achei que seria hilário me esconder na cesta da trebuchet. Para ser justo, foi.</color>"
koKR = "<color=green>투석기의 바구니에 숨는 것이 재밌을 것이라고 생각했어요. 솔직히 정말 그랬어요.</color>"
csCZ = "<color=green>myslel si, že by bylo legrační schovat se do koše trebuchetu. Abych byl spravedlivý, bylo to.</color>"
viVN = "<color=green>nghĩ rằng việc ẩn nấp trong giỏ bắn đá sẽ thật hài hước. Thật công bằng thì đúng là như vậy.</color>"
trTR = "<color=green>trebuchet sepetinde gizlenmenin komik olacağını düşündüm. Doğruyu söylemek gerekirse, öyleydi.</color>"

