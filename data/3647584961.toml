["Lapantouflemagic.FarmUpgradeC.FlavorDescription"]
raw = "\"As the heavy door slams shut behind you and your eyes slowly adjust to the dark, you can finally see the face of the mastermind threatening the world... With her mighty ladle of damnation in hand, Mathilda grins and says : \"Do you want to BE stew?\"\nNow pass a terror check or take 2d6 damage! \""
status = "normal"
enUS = "\"As the heavy door slams shut behind you and your eyes slowly adjust to the dark, you can finally see the face of the mastermind threatening the world... With her mighty ladle of damnation in hand, Mathilda grins and says: 'Do you want to BE stew?' Now pass a terror check or take 2d6 damage!\""
zhCN = "“当沉重的门在你身后砰地一声关上，你的眼睛逐渐适应黑暗，你终于看到了威胁世界的幕后黑手的面容……她手握诅咒之勺，微笑着说：‘你想要成为炖菜吗？’现在进行恐惧检定，否则受到2d6点伤害！”"
zhTW = "\"當沉重的門在你身後砰然關上，你的眼睛慢慢適應黑暗時，你終於看到了威脅世界的主謀的面孔……馬希爾達手握詛咒的大湯匙，露出微笑說：‘你想成為炖菜嗎？’現在進行恐懼檢定，否則承受2d6的傷害！\""
ruRU = "\"Как только тяжелая дверь захлопнулась за вами и ваши глаза медленно привыкают к темноте, вы наконец можете увидеть лицо гения, угрожающего миру... С ее могучей ложкой проклятия в руках, Матильда улыбается и говорит: \"Вы хотите стать рагу?\" Теперь пройдите проверку на ужас или получите 2d6 урона!\""
jaJP = "\"重い扉があなたの背後でバタンと閉まり、目が暗闇に徐々に慣れていくと、世界を脅かす黒幕の顔がようやく見えてきます... 奈落の大きな杓子を手にしたマティルダはニヤリと笑い、「スチューになりたいの？」と言います。 さあ、恐怖チェックを行うか、2d6のダメージを受けてください！\""
frFR = "\"Alors que la lourde porte se claque derrière vous et que vos yeux s'ajustent lentement à l'obscurité, vous pouvez enfin voir le visage du cerveau criminel menaçant le monde... Avec sa puissante louche de damnation à la main, Mathilda sourit et dit : \"Veux-tu ÊTRE un ragoût ?\"\nMaintenant, passe un test de terreur ou subis 2d6 points de dégâts !\""
deDE = "„Als die schwere Tür hinter dir mit einem Knall zuschlägt und sich deine Augen langsam an die Dunkelheit gewöhnen, kannst du endlich das Gesicht des Drahtziehers sehen, der die Welt bedroht... Mit ihrem mächtigen Schöpflöffel der Verdammnis in der Hand, lächelt Mathilda und sagt: „Willst du Eintopf sein?“ \nMach jetzt einen Angsttest oder erleide 2d6 Schaden!“"
plPL = "\"Kiedy ciężkie drzwi zatrzaskują się za tobą, a twoje oczy powoli przyzwyczajają się do ciemności, w końcu możesz zobaczyć twarz mistrza, który zagraża światu... Z potężną chochelką potępienia w ręku, Mathilda uśmiecha się i mówi: 'Czy chcesz być zupą?'\nTeraz przeprowadź test strachu lub weź 2d6 obrażeń!\""
ptBR = "\"Enquanto a pesada porta se fecha atrás de você e seus olhos se ajustam lentamente à escuridão, você finalmente pode ver o rosto da mente por trás da ameaça ao mundo... Com sua poderosa concha de condenação em mãos, Mathilda sorri e diz: \"Você quer SER ensopado?\" Agora passe em um teste de terror ou sofra 2d6 de dano!\""
koKR = "\"무거운 문이 당신 뒤에서 쾅 닫히고 눈이 어둠에 서서히 적응하자, 당신은 마침내 세계를 위협하는 지배자의 얼굴을 볼 수 있습니다... 그녀는 저주받은 국자 하나를 들고, 마틸다가 미소 지으며 말합니다: \"스튜가 되고 싶나요?\"\n이제 공포 체크를 통과하거나 2d6의 피해를 받으세요!\""
csCZ = "„Jak se za vámi silné dveře bouchnou, a vaše oči se pomalu přizpůsobují tmě, konečně můžete vidět tvář génia, který ohrožuje svět... Se svým mocným naběračkou zatracení v ruce se Mathilda usmívá a říká: „Chcete být guláš?“ Nyní proveďte zkoušku teroru, nebo utrpěte 2d6 zranění!“"
viVN = "\"Khi cánh cửa nặng nề đóng sầm lại phía sau bạn và mắt bạn từ từ thích nghi với bóng tối, bạn cuối cùng có thể thấy gương mặt của kẻ chủ mưu đang đe dọa thế giới... Với cái muôi hủy diệt vĩ đại trong tay, Mathilda cười và nói: 'Bạn có muốn TRỞ THÀNH món hầm không?'\nBây giờ hãy vượt qua một bài kiểm tra sợ hãi hoặc nhận 2d6 sát thương!\""
trTR = "\"Ağır kapı arkanıza çarparken gözleriniz karanlığa alışırken, sonunda dünyayı tehdit eden dehayla yüzleşiyorsunuz... Elinde lanetlerin büyük kaşığıyla, Mathilda gülümseyerek şunları söylüyor: 'Aşçı tenceresi olmak mı istiyorsun?'\nŞimdi bir korku kontrolü yap ya da 2d6 hasar al!\""

