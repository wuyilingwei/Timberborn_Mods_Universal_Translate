["Lapantouflemagic.Airship.Description"]
raw = "A masterfully crafted airship to travel the world at an incredible speed and bring back untold riches.\n<color=#FF6EC7>No need to trade anymore, beavers of all tribes will give anything for a chance to get the ride of a lifetime.</color>\n<color=green>Has the efficiency of 10 balloons.</color>"
status = "normal"
enUS = "A masterfully crafted airship to travel the world at an incredible speed and bring back untold riches.  \n<color=#FF6EC7>No need to trade anymore, beavers of all tribes will give anything for a chance to get the ride of a lifetime.</color>  \n<color=green>Has the efficiency of 10 balloons.</color>"
zhCN = "一艘精心制作的飞船，以惊人的速度环游世界，带回无尽的财富。  \n<color=#FF6EC7>不再需要交易，各个部落的海狸都会为了获得一次终生难忘的乘坐机会而付出一切。</color>  \n<color=green>具有10个气球的效率。</color>"
zhTW = "一艘精心打造的空中飛船，用以以驚人的速度環遊世界，並帶回無數財富。\n<color=#FF6EC7>不再需要進行交易，所有部落的海狸都會為有機會獲得一次難忘的旅程而付出一切。</color>\n<color=green>擁有10個氣球的效率。</color>"
ruRU = "Мастерски созданный воздушный корабль, чтобы путешествовать по миру с невероятной скоростью и возвращаться с неведомыми богатствами.  \n<color=#FF6EC7>Больше не нужно торговать, бобры всех племен отдадут всё за возможность получить поездку на всю жизнь.</color>  \n<color=green>Обладает эффективностью 10 воздушных шаров.</color>"
jaJP = "巧みに作られた飛空艇で、驚異的な速さで世界を旅し、無限の富を持ち帰ります。\n<color=#FF6EC7>もはや交易の必要はありません、すべての部族のビーバーたちは、人生最高の乗り物に乗るチャンスのためなら何でも差し出します。</color>\n<color=green>10個の気球の効率を持っています。</color>"
frFR = "Un dirigeable magistralement conçu pour parcourir le monde à une vitesse incroyable et ramener des richesses incalculables.\n<color=#FF6EC7>Plus besoin de commercer, les castors de toutes les tribus donneront n'importe quoi pour avoir la chance de vivre le voyage de leur vie.</color>\n<color=green>A une efficacité de 10 ballons.</color>"
deDE = "Ein meisterhaft gefertigtes Luftschiff, um die Welt mit unglaublicher Geschwindigkeit zu bereisen und unermessliche Reichtümer zurückzubringen.  \n<color=#FF6EC7>Keine Notwendigkeit mehr zu handeln, Biber aller Stämme würden alles für die Chance geben, die Fahrt ihres Lebens zu machen.</color>  \n<color=green>Hat die Effizienz von 10 Ballons.</color>"
plPL = "Misternie skonstruowany statek powietrzny do podróżowania po świecie z niesamowitą prędkością i przywożenia nieznanych bogactw.\n<color=#FF6EC7>Nie ma potrzeby handlować, bobry wszystkich plemion oddadzą wszystko za szansę na przejażdżkę życia.</color>\n<color=green>Ma wydajność 10 balonów.</color>"
ptBR = "Um dirigível magistralmente elaborado para viajar pelo mundo a uma velocidade incrível e trazer riquezas incontáveis.  \n<color=#FF6EC7>Não há mais necessidade de negociar, castores de todas as tribos darão qualquer coisa por uma chance de fazer a viagem de uma vida.</color>  \n<color=green>Possui a eficiência de 10 balões.</color>"
koKR = "세상을 놀라운 속도로 여행하고 무한한 부를 가져올 수 있도록 정교하게 제작된 비행선입니다.  \n<color=#FF6EC7>더 이상 거래할 필요가 없습니다. 모든 부족의 비버들은 일생일대의 탑승 기회를 얻기 위해 무엇이든 줄 것입니다.</color>  \n<color=green>10개의 풍선과 동일한 효율성을 가지고 있습니다.</color>"
csCZ = " mistrně zkonstruovaný vzducholoď k cestování po světě neuvěřitelnou rychlostí a přivádění nevyčíslitelného bohatství.  \n<color=#FF6EC7>Není potřeba obchodovat, bobři všech kmenů dají cokoliv za šanci zažít jízdu života.</color>  \n<color=green>Má efektivitu 10 balónů.</color>"
viVN = "Một chiếc khinh khí cầu được chế tác tinh xảo để du hành khắp thế giới với tốc độ đáng kinh ngạc và mang về những tài sản vô giá.\n<color=#FF6EC7>Không cần phải trao đổi nữa, những con hải ly thuộc mọi bộ lạc sẽ sẵn sàng làm mọi thứ để có được cơ hội trải nghiệm chuyến đi của đời mình.</color>\n<color=green>Có hiệu suất tương đương với 10 chiếc bóng bay.</color>"
trTR = "Dünyayı inanılmaz bir hızla dolaşmak ve anlatılamaz zenginlikleri geri getirmek için ustalıkla yapılmış bir hava gemisi.  \n<color=#FF6EC7>Artık ticaret yapmaya gerek yok, tüm kabilelerin kunduzları hayatlarının yolculuğunu kazanma şansı için her şeyi verecek.</color>  \n<color=green>10 balonun verimliliğine sahiptir.</color>"

