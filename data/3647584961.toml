["Lapantouflemagic.Pumpkin.FlavorDescription"]
raw = "\"... and once a year on the darkest night, they open glowing eyes and mouths... to eat naughty little kits!\"\n -Grandma beaver, campfire stories"
status = "normal"
enUS = "\"... and once a year on the darkest night, they open glowing eyes and mouths... to eat naughty little kits!\"  \n- Grandma beaver, campfire stories"
zhCN = "“……每年在最黑暗的夜晚，它们会睁开发光的眼睛和嘴巴……来吞噬调皮的小小猎物！”  \n——松鼠奶奶，篝火故事"
zhTW = "「……每年在最黑暗的夜晚，他們會睜開發光的眼睛和嘴巴……來吃調皮的小浣熊！」  \n－松鼠奶奶，營火故事"
ruRU = "\"... и раз в год в самую темную ночь они открывают светящиеся глаза и рты... чтобы поесть naughty маленьких котят!\"  \n- Бабушка бобер, истории у костра"
jaJP = "「...そして一年に一度、最も暗い夜に、光る目と口を開けて…悪戯な小さな子たちを食べるのです！」\n - ビーバーおばあちゃん、キャンプファイヤーの物語"
frFR = "\"... et une fois par an, lors de la nuit la plus sombre, ils ouvrent des yeux et des bouches brillants... pour manger des petits kits désobéissants !\"  \n-Grand-mère castor, histoires autour du feu de camp"
deDE = "\"... und einmal im Jahr in der dunkelsten Nacht öffnen sie leuchtende Augen und Münder ... um ungezogene kleine Kits zu fressen!\"  \n- Oma Biber, Lagerfeuergeschichten"
plPL = "\"... a raz w roku w najciemniejszą noc, otwierają świecące oczy i usta... aby zjeść łobuzerskie małe kitki!\" - Babcia bobrzyca, historie przy ognisku"
ptBR = "\"... e uma vez por ano, na noite mais escura, eles abrem olhos e bocas brilhantes... para comer os travessos kitzinhos!\"  \n -Vovó castor, histórias ao redor da fogueira"
koKR = "\"... 그리고 매년 가장 어두운 밤에, 그들은 빛나는 눈과 입을 열어 ... 장난꾸러기 작은 새끼들을 먹는다!\"  \n- 할머니 비버, 모닥불 이야기"
csCZ = "\"... a jednou ročně v nejtemnější noci se otevírají zářící oči a ústa... aby snědly zlobivé malé mláďata!\"  \n-Babička bobr, příběhy u táboráku"
viVN = "\"... và một lần trong năm vào đêm tối tăm nhất, họ mở đôi mắt và miệng phát sáng... để ăn những chú nhím nghịch ngợm!\"  \n-Bà nhím, những câu chuyện quanh đống lửa trại"
trTR = "\"... ve yılda bir, en karanlık gecede, parlayan gözlerini ve ağızlarını açarlar... yaramaz küçük yavruları yemek için!\"  \n-Büyükanne kunduz, kamp ateşi hikayeleri"

