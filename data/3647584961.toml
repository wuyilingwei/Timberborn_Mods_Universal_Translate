["Lapantouflemagic.ZiplineUpgradePylon.Description"]
raw = "A pylon providing access to the zipline network to <color=green>Large Farmhouses</color>.\n<color=green>Connections: 1</color>\n<color=#FF6EC7>To be placed on top of the farm body.</color>"
status = "normal"
enUS = "A pylon providing access to the zipline network to <color=green>Large Farmhouses</color>.\n<color=green>Connections: 1</color>\n<color=#FF6EC7>To be placed on top of the farm body.</color>"
zhCN = "“一个为<color=green>大型农舍</color>提供接入滑索网络的塔柱。\n<color=green>连接数：1</color>\n<color=#FF6EC7>须放置在农田顶部。</color>”"
zhTW = "一個提供<color=green>大型農舍</color>訪問滑索網絡的電塔。  \n<color=green>連接數量：1</color>  \n<color=#FF6EC7>必須放置在農場主體的上方。</color>"
ruRU = "Пилон, обеспечивающий доступ к сети канатных дорог для <color=green>Больших Ферм</color>.\n<color=green>Соединений: 1</color>\n<color=#FF6EC7>Должен быть установлен на верхней части фермерского корпуса.</color>"
jaJP = "「<color=green>大きな農家</color>へのジップラインネットワークへのアクセスを提供するパイロンです。  \n<color=green>接続: 1</color>  \n<color=#FF6EC7>農場の本体の上に設置する必要があります。</color>」"
frFR = "Un pylône fournissant un accès au réseau de tyroliennes pour les <color=green>grandes fermes</color>.\n<color=green>Connexions : 1</color>\n<color=#FF6EC7>À placer sur le dessus du corps de la ferme.</color>"
deDE = "Ein Pylon, der Zugang zum Seilnetz für <color=green>große Bauernhäuser</color> bietet.\n<color=green>Verbindungen: 1</color>\n<color=#FF6EC7>Auf dem Bauernkörper platziert werden.</color>"
plPL = "Pylon zapewniający dostęp do sieci zjazdów dla <color=green>Dużych Gospodarstw</color>.\n<color=green>Połączenia: 1</color>\n<color=#FF6EC7>Do umieszczenia na szczycie korpusu farmy.</color>"
ptBR = "Um pilar que fornece acesso à rede de tirolesa para <color=green>Granjas Grandes</color>.\n<color=green>Conexões: 1</color>\n<color=#FF6EC7>Deve ser colocado no topo do corpo da fazenda.</color>"
koKR = "<color=green>대형 농가</color>에 지프라인 네트워크에 접근할 수 있는 파일론입니다.\n<color=green>연결: 1</color>\n<color=#FF6EC7>농장 본체 위에 설치해야 합니다.</color>"
csCZ = "Pylon, který poskytuje přístup k síti lanovek pro <color=green>Velké farmy</color>.\n<color=green>Připojení: 1</color>\n<color=#FF6EC7>Musí být umístěn na vrchol těla farmy.</color>"
viVN = "Một cột phục vụ việc truy cập vào mạng cáp treo cho <color=green>Nhà nông lớn</color>.\n<color=green>Kết nối: 1</color>\n<color=#FF6EC7>Phải được đặt trên phần thân nông trại.</color>"
trTR = "<color=green>Büyük Çiftlik Evleri</color> için zipline ağına erişim sağlayan bir pylon.\n<color=green>Bağlantılar: 1</color>\n<color=#FF6EC7>Tarlanın üstüne yerleştirilmelidir.</color>"

["Lapantouflemagic.ZiplineUpgradePylon.FlavorDescription"]
raw = "\"If you could have near-instant access to the city center, who wouldn't want to live in the middle of the countryside?\"\n-Mommy beaver"
status = "normal"
enUS = "\"If you could have near-instant access to the city center, who wouldn't want to live in the middle of the countryside?\"  \n-Mommy beaver"
zhCN = "“如果你可以几乎瞬间到达市中心，谁不想住在乡村的中心呢？”  \n- 小松鼠妈妈"
zhTW = "\"如果您可以快速到達市中心，誰不想住在鄉村的中間呢？\"  \n- 妈妈海狸"
ruRU = "\"Если бы у вас был почти мгновенный доступ к центру города, кто бы не хотел жить посреди сельской местности?\"  \n-Мама бобер"
jaJP = "「もし都市中心部へのほぼ瞬時にアクセスできるなら、誰が田舎の真ん中に住みたくないと思うでしょうか？」\n-マミービーバー"
frFR = "\"Si vous pouviez avoir un accès quasi instantané au centre-ville, qui ne voudrait pas vivre au milieu de la campagne ?\"\n-Mamie castor"
deDE = "\"Wenn Sie nahezu sofortigen Zugang zum Stadtzentrum haben könnten, wer würde nicht gerne mitten auf dem Land wohnen?\"  \n-Mama Biber"
plPL = "\"Co byś powiedział na niemal natychmiastowy dostęp do centrum miasta? Kto nie chciałby mieszkać w samym sercu wsi?\"  \n-Mama bóbr"
ptBR = "\"Se você tivesse acesso quase instantâneo ao centro da cidade, quem não gostaria de viver no meio do campo?\"\n-Mamãe castor"
koKR = "\"도시 중심부에 거의 즉각적으로 접근할 수 있다면, 누가 시골 한가운데서 살고 싶지 않을까요?\"\n-엄마 비버"
csCZ = "\"Pokud byste měli téměř okamžitý přístup do centra města, kdo by nechtěl žít uprostřed venkova?\"  \n-Maminka bobr"
viVN = "\"Nếu bạn có thể có được sự truy cập gần như ngay lập tức tới trung tâm thành phố, ai lại không muốn sống giữa miền quê?\"  \n-Mẹ nhím"
trTR = "\"Eğer şehir merkezine neredeyse anında erişiminiz olsaydı, kırsalda ortada kim yaşamak istemez ki?\"  \n- Anne kunduz"

