["Lapantouflemagic.Aqueduct_Deadend.Description"]
raw = "A heavy duty bridge to carry an entire river.\nClosed on three sides to direct water flow from above into the desired direction. Or to make a water maze if you fancy that.\nThe metal rings need to snap on <color=green>Giant Pillars</color>."
status = "normal"
enUS = "A heavy-duty bridge to carry an entire river. Closed on three sides to direct water flow from above into the desired direction. Or to create a water maze if you fancy that. The metal rings need to snap on <color=green>Giant Pillars</color>."
zhCN = "一座重型桥梁，可以承载整个河流。\n三面封闭，以将上方的水流引导到所需方向。或者如果你喜欢的话，可以制作一个水迷宫。\n金属环需要卡在<color=green>巨型柱子</color>上。"
zhTW = "一座重型橋樑，可以承載整條河流。\n三面封閉，以將上方的水流導向所需方向。或者如果你喜歡的話，製作一個水迷宮。\n金屬環需要卡在<color=green>巨柱</color>上。"
ruRU = "Мост высокой прочности, чтобы перенести целую реку. Закрыт с трех сторон, чтобы направлять поток воды сверху в нужном направлении. Или чтобы построить водный лабиринт, если вам это нравится. Металлические кольца должны зафиксироваться на <color=green>Гигантских Столбах</color>."
jaJP = "「全体の川を運ぶための重厚な橋。\n水流を上から希望の方向に導くために三方が閉じられています。あるいは、それを使って水の迷路を作ることもできます。\n金属のリングは<color=green>巨大な柱</color>に取り付ける必要があります。」"
frFR = "Un pont robuste pour transporter une rivière entière.  \nFermé sur trois côtés pour diriger le flux d'eau d'en haut dans la direction souhaitée. Ou pour créer un labyrinthe aquatique si cela vous tente.  \nLes anneaux métalliques doivent s'enclencher sur les <color=green>Piliers Géants</color>."
deDE = "Eine robuste Brücke, um einen ganzen Fluss zu transportieren. Von drei Seiten geschlossen, um den Wasserfluss von oben in die gewünschte Richtung zu leiten. Oder um ein Wass labyrint zu erstellen, wenn Ihnen danach ist. Die Metallringe müssen an <color=green>Riesenpfeilern</color> eingerastet werden."
plPL = "Most o dużej wytrzymałości, aby przenosić całą rzekę. Zamknięty z trzech stron, aby skierować przepływ wody z góry w pożądanym kierunku. Lub aby stworzyć wodny labirynt, jeśli lubisz takie rzeczy. Metalowe pierścienie muszą się zatrzasnąć na <color=green>Gigantycznych Filarach</color>."
ptBR = "Uma ponte robusta para transportar um rio inteiro. Fechada em três lados para direcionar o fluxo da água de cima na direção desejada. Ou para fazer um labirinto de água, se você preferir. Os anéis de metal precisam se encaixar em <color=green>Pilares Gigantes</color>."
koKR = "강 전체를 지탱할 수 있는 내구성이 뛰어난 다리입니다. 위에서 흐르는 물을 원하는 방향으로 유도하기 위해 세 면이 닫혀 있습니다. 또는 원하신다면 물 미로를 만들 수 있습니다. 금속 링은 <color=green>거대한 기둥</color>에 끼워야 합니다."
csCZ = "Silný most pro vedení celého řeky. Uzavřen ze tří stran, aby nasměroval tok vody shora do požadovaného směru. Nebo k vytvoření vodního bludiště, pokud byste to rádi.\nKovové kroužky musí zapadnout na <color=green>Obrovské Sloupy</color>."
viVN = "Cầu chịu lực nặng để chở một con sông.\nĐóng kín ở ba mặt để hướng dòng nước từ trên xuống theo hướng mong muốn. Hoặc để tạo một mê cung nước nếu bạn thích điều đó.\nCác vòng kim loại cần phải gắn vào <color=green>Những Cột Khổng Lồ</color>."
trTR = "Ağır hizmet köprüsü, bir nehrin tamamını taşımak için.\nÜstten su akışını istenen yöne yönlendirmek için üç tarafı kapalı. Ya da isterseniz bir su labirenti oluşturmak için.\nMetal halkaların <color=green>Dev Sütunlar</color> üzerine oturması gerekiyor."

