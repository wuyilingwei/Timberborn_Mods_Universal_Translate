["Lapantouflemagic.Brewery.Description"]
raw = "A big house set to allow brewers to easily manage a large number of fermentation barrels.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A big house designed for brewers to easily manage a large number of fermentation barrels. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一个大房子，方便酿酒师轻松管理大量发酵桶。\n<color=#00FFFF>作为堤坝使用</color>"
zhTW = "一座大型設施，讓釀酒師能夠輕鬆管理大量的發酵桶。  \n<color=#00FFFF>作為堤壩使用</color>"
ruRU = "Большой дом, предназначенный для того, чтобы пивовары могли легко управлять большим количеством бочек для ферментации. <color=#00FFFF>Работает как Налашти</color>"
jaJP = "「醸造者が多くの発酵バレルを簡単に管理できるように設計された大きな家です。<color=#00FFFF>堤防として機能します</color>」"
frFR = "Une grande maison conçue pour permettre aux brasseurs de gérer facilement un grand nombre de fûts de fermentation. <color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Ein großes Haus, das es Brauern ermöglicht, eine große Anzahl von Gärfässern einfach zu verwalten. \n<color=#00FFFF>Funktioniert wie ein Damm</color>"
plPL = "Wielki budynek zaprojektowany, aby umożliwić piwowarom łatwe zarządzanie dużą liczbą beczek fermentacyjnych. <color=#00FFFF>Funkcjonuje jak tama</color>"
ptBR = "Uma grande casa projetada para permitir que os produtores de cerveja gerenciem facilmente um grande número de barris de fermentação. <color=#00FFFF>Funciona como uma Barragem</color>"
koKR = "양조장을 위한 큰 집으로, 양조자들이 많은 발효 배럴을 쉽게 관리할 수 있도록 설정되어 있습니다.  \n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Velký dům určený k tomu, aby sládkové mohli snadno spravovat velké množství fermentačních sudů. <color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một ngôi nhà lớn được thiết lập để cho phép các nhà sản xuất bia dễ dàng quản lý một số lượng lớn thùng lên men.  \n<color=#00FFFF>Hoạt động như một Đê</color>"
trTR = "Brewery, bir dizi fermantasyon varilini kolayca yönetmelerine izin veren büyük bir evdir. <color=#00FFFF>Bir Set gibi çalışır</color>"

["Lapantouflemagic.Brewery.FlavorDescription"]
raw = "\"Mushroom juice is the worst-tasting thing you could think of, and yet adding it to some preparations makes everything better. We should study this someday\"\n -A scientist beaver"
status = "normal"
enUS = "\"Mushroom juice is the worst-tasting thing you could think of, and yet adding it to some preparations makes everything better. We should study this someday.\"  \n-A scientist beaver"
zhCN = "“蘑菇汁是你能想到的最难喝的东西，然而把它添加到一些配方中却能让一切变得更好。我们应该有一天研究一下这个。”  \n- 一位科学家海狸"
zhTW = "\"蘑菇汁是你能想到的最難喝的東西，但將它添加到一些配方中卻會讓一切變得更好。我們應該有一天來研究這個。\"\n- 一位科學家海狸"
ruRU = "\"Грибной сок - это худший на вкус напиток, который только можно представить, и всё же его добавление в некоторые приготовления улучшает всё. Нам следует изучить это someday.\"  \n- Ученый бобер"
jaJP = "「キノコジュースは考え得る中で最悪の味ですが、これをいくつかの調合に加えることで全てが良くなります。いつかこれを研究すべきです。」  \n- 科学者ビーバー"
frFR = "\"Le jus de champignon est la chose ayant le goût le plus détestable que vous puissiez imaginer, et pourtant, l'ajouter à certaines préparations améliore tout. Nous devrions étudier cela un jour.\" - Un castor scientifique"
deDE = "„PilSaft ist das schlechteste, was man sich vorstellen kann, und doch macht es einige Zubereitungen besser. Das sollten wir eines Tages untersuchen.“  \n- Ein Wissenschaftler-Biber"
plPL = "\" Sok z grzybów to najgorszy w smaku produkt, jaki można sobie wyobrazić, a jednak dodanie go do niektórych potraw poprawia wszystko. Powinniśmy to kiedyś zbadać.\"  \n -Naukowiec bóbr"
ptBR = "\"O suco de cogumelo é a coisa com o pior gosto que você pode imaginar, e ainda assim, adicioná-lo a algumas preparações melhora tudo. Devemos estudar isso algum dia.\"  \n- Um castor cientista"
koKR = "\"버섯 주스는 당신이 생각할 수 있는 최악의 맛을 가진 것이지만, 그럼에도 불구하고 몇 가지 조리에 추가하면 모든 것이 더 좋아집니다. 언젠가 이걸 연구해야 합니다.\"\n- 한 과학자 비버"
csCZ = "\"Šťáva z hub je nejhorší chuť, co si dokážete představit, a přesto její přidání do některých přípravků všechno zlepší. Měli bychom to někdy prozkoumat.\"  \n- Vědecký bobr"
viVN = "\"Nước nấm là thứ có vị tệ nhất mà bạn có thể nghĩ ra, nhưng việc thêm nó vào một số món chuẩn bị làm mọi thứ trở nên tốt hơn. Chúng ta nên nghiên cứu điều này một ngày nào đó.\"  \n-Một con beaver nhà khoa học"
trTR = "\"Mantar suyu, düşünebileceğiniz en kötü tadı olan şeydir, ancak bazı hazırlıklara eklenmesi her şeyi daha iyi hale getiriyor. Bunu bir gün incelemeliyiz.\" -Bir bilimci kunduz"

