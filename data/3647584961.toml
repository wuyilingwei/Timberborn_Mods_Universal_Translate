ptBR = "\"Com tanto atrito, é sorte que não pegou fogo!\"  \n-Um castor alquimista"
koKR = "\"마찰이 이렇게 심한데도 불이 붙지 않아 다행이에요!\"  \n- 한 연금술사 비버"
csCZ = "\"Se spoustou tření máme štěstí, že se to nerozhořelo!\"  \n- Alchymistický bobr"
viVN = "\"Với nhiều ma sát như vậy, chúng ta thật may mắn khi nó không bốc cháy!\"  \n-Một con béo giả kim"
