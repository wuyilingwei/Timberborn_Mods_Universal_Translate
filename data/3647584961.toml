zhCN = "一个设计用于让气球商安全降落和起飞的非常大型塔楼。  \n<color=red>消耗甲烷来为气球提供动力。</color>"
zhTW = "一座非常大的塔，旨在讓氣球商安全地降落和起飛。  \n<color=red>消耗甲烷來為氣球提供動力。</color>"
ruRU = "Очень высокая башня, предназначенная для безопасной посадки и взлета торговцев воздушными шарами. <color=red>Потребляет метан для питания воздушных шаров.</color>"
jaJP = "「気球商人が安全に着陸し、離陸できるように設計された非常に大きな塔です。<color=red>気球の動力としてメタンを消費します。</color>」"
frFR = "Une très grande tour conçue pour permettre aux traders de ballons d'atterrir et de s'envoler en toute sécurité.  \n<color=red>Consomme du méthane pour alimenter les ballons.</color>"
deDE = "Ein sehr großer Turm, der dazu dient, Ballonhändler sicher landen und starten zu lassen. <color=red>Verbraucht Methan, um die Ballons zu betreiben.</color>"
plPL = "Bardzo wysoka wieża zaprojektowana, aby umożliwić balonowym handlarzom bezpieczne lądowanie i start.\n<color=red>Zużywa metan do zasilania balonów.</color>"
ptBR = "Uma torre muito grande projetada para permitir que os mercadores de balões pousam e decolam com segurança. <color=red>Consome metano para alimentar os balões.</color>"
koKR = "풍선 상인들이 안전하게 착륙하고 이륙할 수 있도록 설계된 매우 큰 타워입니다.\n<color=red>풍선을 작동시키기 위해 메탄을 소모합니다.</color>"
csCZ = "Velmi vysoká věž určená k bezpečnému přistávání a vzletu balónových obchodníků. <color=red>Spotřebovává metan na pohon balónů.</color>"
viVN = "Một tòa tháp rất lớn được thiết kế để cho phép các thương nhân bóng bay hạ cánh và cất cánh an toàn.  \n<color=red>Tiêu thụ methane để cung cấp năng lượng cho các bóng bay.</color>"
trTR = "Balon tüccarlarının güvenli bir şekilde inip kalkabilmesi için tasarlanmış çok büyük bir kule.  \n<color=red>Balonları güçlendirmek için metan tüketir.</color>"

["Lapantouflemagic.BalloonLandingPad.FlavorDescription"]
raw = "\"No one knows what that symbol on the top means, but it must be there, it's the rule.\n-an IronTeeth balloon trader\""
status = "normal"
enUS = "\"No one knows what that symbol on the top means, but it must be there, it's the rule. -an IronTeeth balloon trader\""
zhCN = "“没有人知道顶部的那个符号意味着什么，但它一定存在，因为这是规则。  \n- 一位铁齿族气球商人”"
zhTW = "\"沒有人知道頂部的符號代表什麼，但它必須存在，這是規則。 - 一位鐵齒部落的氣球商人\""
ruRU = "«Никто не знает, что означает этот символ на вершине, но он должен быть там, таков закон.  \n— торговец воздушными шарами Железных Зубов»"
jaJP = "「その上のシンボルが何を意味するのか誰も知らないが、そこにあるべきものである、これはルールだから。  \n－アイアンティースのバルーントレーダー」"
frFR = "\"Personne ne sait ce que signifie ce symbole en haut, mais il doit être là, c'est la règle. - un commerçant de ballons IronTeeth\""
deDE = "„Niemand weiß, was dieses Symbol oben bedeutet, aber es muss da sein, das ist die Regel. - ein EisenZahn-Luftballonhändler“"
plPL = "\"Nikt nie wie, co oznacza ten symbol na górze, ale musi być tam, taki jest regulamin.  \n-handlarz balonów z Żelaznych Zębów\""
ptBR = "\"Ninguém sabe o que aquele símbolo no topo significa, mas ele deve estar lá, é a regra. - um comerciante de balões IronTeeth\""
koKR = "\"위에 있는 그 기호가 무엇을 의미하는지는 아무도 모르지만, 반드시 있어야 한다. 규칙이니까.  \n- 철잇니 상인\""
csCZ = "„Nikdo neví, co ten symbol nahoře znamená, ale musí tam být, je to pravidlo.  \n- obchodník s balóny z IronTeeth“"
viVN = "\"Không ai biết biểu tượng trên đỉnh có nghĩa là gì, nhưng nó nhất định phải có ở đó, đó là quy tắc. - một thương nhân bóng bay IronTeeth\""
trTR = "\"Üstündeki sembolün ne anlama geldiğini kimse bilmiyor ama orada olmalı, bu kural.\n- bir IronTeeth balon taciri\""

