["Lapantouflemagic.Verydeep_mine_elevator.Description"]
raw = "Allows beavers to go down into the ruins and explore an ancient hooman facility.\nTruly the adventure of a lifetime. What dark secrets will we find down there?"
status = "normal"
enUS = "Allows beavers to go down into the ruins and explore an ancient human facility. Truly the adventure of a lifetime. What dark secrets will we find down there?"
zhCN = "允许海狸进入废墟，探索一个古老的人类设施。\n真正是一生的冒险。我们会在下面发现什么黑暗的秘密呢？"
zhTW = "允許海狸進入廢墟，探索一個古老的人類設施。\n這真是一次終生難忘的冒險。我們將在那裡發現什麼黑暗秘密呢？"
ruRU = "Позволяет бобрам спуститься в руины и исследовать древнее человеческое сооружение. Действительно, приключение на всю жизнь. Какие темные секреты мы найдем там?"
jaJP = "ビーバーが廃墟に降りて古代の人間の施設を探索できるようになります。  \nまさに人生の冒険です。そこでどんな暗い秘密が見つかるでしょうか？"
frFR = "Permet aux castors de descendre dans les ruines et d'explorer une ancienne installation humaine. \nVéritablement l'aventure d'une vie. Quels sombres secrets trouverons-nous là-dessous ?"
deDE = "Erlaubt Bibern, in die Ruinen hinabzusteigen und eine alte Hooman-Anlage zu erkunden. \nWahrlich das Abenteuer eines Lebens. Welche dunklen Geheimnisse werden wir dort unten entdecken?"
plPL = "Pozwala bobrom zstępować do ruin i eksplorować starożytną ludzką placówkę. Prawdziwa przygoda życia. Jakie mroczne tajemnice znajdziemy tam na dole?"
ptBR = "Permite que os castores desçam às ruínas e explorem uma antiga instalação dos humanos. Verdadeiramente a aventura de uma vida inteira. Que segredos sombrios iremos encontrar lá embaixo?"
koKR = "비버들이 폐허로 내려가 고대 인류 시설을 탐험할 수 있게 해줍니다. 진정한 인생의 모험입니다. 그곳에서 어떤 어두운 비밀을 발견하게 될까요?"
csCZ = "Umožňuje bobrům sestoupit do ruin a prozkoumat starobylé zařízení lidských bytostí. Opravdu dobrodružství století. Jaká temná tajemství tam nalezneme?"
viVN = "Cho phép những con béo xuống dưới tàn tích và khám phá một cơ sở cổ xưa của người.\nThật sự là một cuộc phiêu lưu cả đời. Chúng ta sẽ khám phá những bí mật đen tối nào bên dưới đó?"
trTR = "Temizleyicilerin kalıntılarına inip antik bir insan tesisini keşfetmelerini sağlar. Gerçekten de bir ömür boyu sürecek bir macera. Orada hangi karanlık sırları bulacağız?"

