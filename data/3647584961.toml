["Lapantouflemagic.NewCentrifuge.Description"]
raw = "A tall hourglass-shaped centrifuge used to purify nuclear fuel from hooman nuclear waste.\nAlso acts as a somewhat impractical dwelling for the sake of upholding tradition.\n<color=#FF6EC7>Can function without workers.</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A tall hourglass-shaped centrifuge used to purify nuclear fuel from human nuclear waste. Also acts as a somewhat impractical dwelling for the sake of upholding tradition. <color=#FF6EC7>Can function without workers.</color> <color=#00FFFF>Works as a Levee</color>"
zhCN = "一个高耸的沙漏形离心机，用于从人类核废料中提炼核燃料。  \n同时作为一种不太实用的居所，以遵循传统。  \n<color=#FF6EC7>可以在没有工人的情况下运行。</color>  \n<color=#00FFFF>作为堤坝运作</color>"
zhTW = "一個高大的沙漏形離心機，用於純化人類核廢料中的核燃料。它還作為一個有些不實用的居所，以維護傳統。  \n<color=#FF6EC7>可以無需工人運作。</color>  \n<color=#00FFFF>作為堤壩運作。</color>"
ruRU = "Высокая центрифуга в форме песочных часов, используемая для очистки ядерного топлива от человеческих ядерных отходов. Также выполняет функцию несколько непрактичного жилья ради соблюдения традиции. <color=#FF6EC7>Может функционировать без работников.</color> <color=#00FFFF>Работает как набережная</color>"
jaJP = "高い砂時計型の遠心分離機で、ヒューマンの核廃棄物から核燃料を精製するために使用されます。  \n伝統を守るために、やや実用的でない住居としても機能します。  \n<color=#FF6EC7>労働者なしでも機能します。</color>  \n<color=#00FFFF>堤防として機能します</color>"
frFR = "Une grande centrifuge en forme de sablier utilisée pour purifier le combustible nucléaire des déchets nucléaires humains.  \nElle sert également de logement quelque peu impraticable dans le but de maintenir la tradition.  \n<color=#FF6EC7>Peut fonctionner sans travailleurs.</color>  \n<color=#00FFFF>Fonctionne comme une digue.</color>"
deDE = "Eine hohe, sanduhrförmige Zentrifuge, die verwendet wird, um nukleare Brennstoffe von menschlichem Atommüll zu reinigen. Dient auch als etwas unpraktische Unterkunft, um die Tradition aufrechtzuerhalten. <color=#FF6EC7>Kann ohne Arbeiter funktionieren.</color> <color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Wysoka wirówka w kształcie klepsydry używana do oczyszczania paliwa jądrowego z ludzkich odpadów nuklearnych. \nSłuży również jako dość niepraktyczne mieszkanie w celu utrzymania tradycji. \n<color=#FF6EC7>Może funkcjonować bez pracowników.</color> \n<color=#00FFFF>Działa jako tama</color>"
ptBR = "Uma centrífuga alta em forma de ampulheta usada para purificar combustível nuclear dos resíduos nucleares humanos. Também atua como uma habitação um tanto impraticável para manter a tradição. <color=#FF6EC7>Pode funcionar sem trabalhadores.</color> <color=#00FFFF>Funciona como uma Barragem</color>"
koKR = "인간 핵 폐기물에서 핵 연료를 정화하는 데 사용되는 높은 모래시계 모양의 원심분리기입니다.\n전통을 지키기 위해 다소 비실용적인 거주지 역할도 합니다.\n<color=#FF6EC7>작업자 없이도 작동할 수 있습니다.</color>\n<color=#00FFFF>제방으로 작동합니다.</color>"
csCZ = "Vysoká centrifuga ve tvaru přesýpacích hodin, používaná k purifikaci jaderného paliva z lidského jaderného odpadu. \nTaké slouží jako poněkud nepraktické obydlí za účelem dodržení tradice. \n<color=#FF6EC7>Může fungovat bez pracovníků.</color> \n<color=#00FFFF>Funguje jako hráz.</color>"
viVN = "Một máy ly tâm hình đồng hồ cát cao được sử dụng để tinh chế nhiên liệu hạt nhân từ chất thải hạt nhân của con người.  \nCũng đóng vai trò như một nơi cư trú hơi phi thực tế nhằm bảo vệ truyền thống.  \n<color=#FF6EC7>Có thể hoạt động mà không cần công nhân.</color>  \n<color=#00FFFF>Hoạt động như một đê chắn nước</color>"
trTR = "İnsan nükleer atıklarından nükleer yakıtı arıtmak için kullanılan uzun bir kum saati şeklindeki santrifüj.\nAynı zamanda geleneği sürdürmek adına biraz pratik olmayan bir konut olarak da işlev görüyor.\n<color=#FF6EC7>İşçiler olmadan da çalışabilir.</color>\n<color=#00FFFF>Aynı zamanda bir Set olarak işlev görür</color>"

["Lapantouflemagic.NewCentrifuge.FlavorDescription"]
raw = "Thankfully, some beavers are capable of sleeping even in the most unlikely circumstances."
status = "normal"
enUS = "Thankfully, some beavers are capable of sleeping even in the most unlikely circumstances."
zhCN = "感恩的是，有些海狸即使在最不可能的情况下也能入睡。"
zhTW = "幸運的是，有些海狸即使在最不可能的情況下也能入睡。"
ruRU = "«К счастью, некоторые бобры способны спать даже в самых маловероятных обстоятельствах.»"
jaJP = "「幸いなことに、一部のビーバーは非常に予想外の状況でも眠ることができます。」"
frFR = "Heureusement, certains Castors sont capables de dormir même dans les circonstances les plus inattendues."
deDE = "Glücklicherweise sind einige Biber in der Lage, selbst unter den unwahrscheinlichsten Umständen zu schlafen."
plPL = "Na szczęście niektóre bobry potrafią spać nawet w najbardziej nieprzewidywalnych okolicznościach."
ptBR = "Felizmente, alguns castores são capazes de dormir mesmo nas circunstâncias mais improváveis."
koKR = "다행히도, 일부 비버들은 가장 unlikely한 상황에서도 자는 능력을 가지고 있습니다."
csCZ = "Naštěstí někteří bobři jsou schopni spát i v těch nejméně pravděpodobných okolnostech."
viVN = "Rất may, một số con rái cá có khả năng ngủ ngay cả trong những hoàn cảnh không thể ngờ tới nhất."
trTR = "Neyse ki, bazı kunduzlar en olası olmayan koşullarda bile uyuyabilme yeteneğine sahiptir."

