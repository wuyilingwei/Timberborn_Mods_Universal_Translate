zhTW = "一座愚蠢的海狸雕像，由一隻愚蠢的海狸製作。  \n用一塊巨大的木頭雕刻而成。"
ruRU = "Статуя глупого бобра, сделанная глупым бобром. Вырезана из одного огромного куска дерева."
