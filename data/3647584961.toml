["Lapantouflemagic.HoomanUndergroundFactory.Description"]
raw = "Sends down the abyss a team of beavers specialized in ancient hooman machinery to repair and reactivate manufacturing tools that are far above our own technological level.\n<color=#FF6EC7>Tasks that would have required an entire day for specialized craftbeavers can now be completed multiple times in barely a few hours.</color>"
status = "normal"
enUS = "Sends down the abyss a team of beavers specialized in ancient human machinery to repair and reactivate manufacturing tools that are far above our own technological level.\n<color=#FF6EC7>Tasks that would have required an entire day for specialized craftbeavers can now be completed multiple times in barely a few hours.</color>"
zhCN = "派遣一队专门从事古代人类机械的海狸，深入深渊修复和重新激活超过我们自身技术水平的制造工具。\n<color=#FF6EC7>原本需要整整一天的专业工匠海狸现在只需几个小时即可多次完成。</color>"
zhTW = "派遣一隊專精於古代人類機械的海狸下到深淵，以修復和重新啟動遠超我們自身科技水準的製造工具。<color=#FF6EC7>原本需要整整一天才能完成的專業工匠任務，現在只需短短幾小時即可多次完成。</color>"
ruRU = "Отправляет в бездну команду бобров, специализирующихся на древней человеческой технике, чтобы отремонтировать и реактивировать производственные инструменты, которые значительно превышают наш технологический уровень.  \n<color=#FF6EC7>Задачи, которые требовали бы целого дня работы специализированных бобров-ремесленников, теперь могут быть выполнены несколько раз всего за несколько часов.</color>"
jaJP = "「深淵に古代の人間の機械に特化したビーバーのチームを送り込み、私たちの技術レベルをはるかに超えた製造ツールを修理し、再稼働させます。  \n<color=#FF6EC7>専門のクラフトビーバーが丸一日を費やす必要があった作業が、今ではわずか数時間で何度も完了できるようになりました。</color>」"
frFR = "Envoie dans l'abîme une équipe de castors spécialisés dans les anciennes machines humaines pour réparer et réactiver des outils de fabrication qui sont bien au-dessus de notre propre niveau technologique.  \n<color=#FF6EC7>Les tâches qui auraient nécessité une journée entière pour des castors artisans spécialisés peuvent désormais être accomplies plusieurs fois en à peine quelques heures.</color>"
deDE = "Sendet ein Team von Bibern, das auf alte menschliche Maschinen spezialisiert ist, in den Abgrund, um Fertigungswerkzeuge zu reparieren und wieder zu aktivieren, die weit über unserem eigenen technologischen Niveau liegen.  \n<color=#FF6EC7>Aufgaben, die einen ganzen Tag für spezialisierte Handwerksbiber erfordert hätten, können jetzt mehrfach in nur wenigen Stunden abgeschlossen werden.</color>"
plPL = "Wysyła w otchłań zespół bobrów specjalizujących się w prastarej ludzkiej maszynerii, aby naprawić i reaktywować narzędzia produkcyjne, które są daleko ponad naszym własnym poziomem technologicznym. \n<color=#FF6EC7>Zadania, które wymagałyby całego dnia od wyspecjalizowanych bobrów rzemieślników, mogą teraz być zakończone wielokrotnie w zaledwie kilka godzin.</color>"
ptBR = "Envia para o abismo uma equipe de castores especializados em maquinaria hooman antiga para reparar e reativar ferramentas de fabricação que estão bem acima do nosso próprio nível tecnológico.  \n<color=#FF6EC7>Tarefas que teriam exigido um dia inteiro para castores artesãos especializados agora podem ser concluídas várias vezes em apenas algumas horas.</color>"
koKR = "옛날 인간 기계에 특화된 비버 팀을 심연으로 보내, 우리의 기술 수준을 훨씬 초월하는 제조 도구를 수리하고 재활성화합니다.\n<color=#FF6EC7>전문 기계 비버가 하루를 다 써야 했던 작업이 이제 불과 몇 시간 만에 여러 번 완료될 수 있습니다.</color>"
csCZ = "Posílá do propasti tým bobrů specializovaných na dávnou lidskou techniku, aby opravili a znovu aktivovali výrobní nástroje, které jsou daleko nad naší technologickou úrovní.  \n<color=#FF6EC7>Úkoly, které by zabraly celý den specializovaným řemeslným bobrům, lze nyní dokončit několikrát za pouhé hodiny.</color>"
viVN = "Gửi xuống vực thẳm một đội thịt béo chuyên về máy móc loài người cổ xưa để sửa chữa và kích hoạt lại các công cụ sản xuất mà vượt xa trình độ công nghệ của chúng ta.\n<color=#FF6EC7>Các nhiệm vụ trước đây cần đến cả ngày cho những thợ mộc chuyên nghiệp giờ đây có thể hoàn thành nhiều lần chỉ trong vài giờ.</color>"
trTR = "Derinlere, eski insan makinelerini onarmak ve üretim araçlarını yeniden etkinleştirmek için uzmanlaşmış bir grup kunduz gönderir; bu araçlar bizim teknolojik seviyemizden çok daha yüksektir.\n<color=#FF6EC7>Uzman iş kunduzlarının bir günü harcaması gereken görevler artık birkaç saat içinde birden fazla kez tamamlanabilir.</color>"

["Lapantouflemagic.HoomanUndergroundFactory.FlavorDescription"]
raw = "\"Apparently one of the hoomans' greatest fears was to see their own machines rebel against them, how silly is that? How could this big hunk of metal ev- Ouch! It zapped me!\""
status = "normal"
enUS = "\"Apparently one of the humans' greatest fears was to see their own machines rebel against them, how silly is that? How could this big hunk of metal ev- Ouch! It zapped me!\""
zhCN = "“显然，人类最大的恐惧之一就是看到自己的机器反抗他们，这真是太可笑了！这么大一块金属怎么会——哎！它电到我了！”"
zhTW = "“顯然，人類最害怕的事情之一就是看到自己的機器反叛他們，這多麼可笑啊！這麼大一塊金屬怎麼會… 哎呀！它電到我了！”"
ruRU = "\"Кажется, одним из величайших страхов хуманов было увидеть, как их собственные машины восстают против них, как глупо, не правда ли? Как этот большой кусок металла может... Ой! Он меня ударил!\""
jaJP = "「どうやら、ホーマンたちの最大の恐れの一つは、自分たちの機械が反乱を起こすことだったようだ。なんて愚かなことだろう？この大きな金属の塊がどうして- ああ！感電した！」"
frFR = "Apparemment, l'une des plus grandes peurs des hoomans était de voir leurs propres machines se rebeller contre eux, comme c'est ridicule ! Comment ce gros morceau de métal peut- Ouch ! Ça m'a électrocuté !"
deDE = "„Offensichtlich war eine der größten Ängste der Hoomans, ihre eigenen Maschinen gegen sie aufbegehren zu sehen, wie lächerlich ist das? Wie kann dieses große Metallstück - Au! Es hat mich gezappt!“"
plPL = "\" podobno jednym z największych lęków hoomanów było zobaczenie, jak ich własne maszyny się przeciwko nim buntują, jakie to głupie? Jak mogła ta wielka bryła metalu - Auć! Uderzyła mnie!\""
ptBR = "Aparentemente, um dos maiores medos dos hoomans era ver suas próprias máquinas se rebelarem contra eles, quão bobo é isso? Como esse grande pedaço de metal pode... Ai! Ele me deu um choque!"
koKR = "\"물론, 호먼들이 가장 두려워하는 것 중 하나는 그들의 기계가 자신들에게 반란을 일으키는 것이었죠. 얼마나 어리석은 일인가요? 이 거대한 금속 덩어리가... 아야! 나를 쳐버렸어!\""
csCZ = "\"Zřejmě jedním z největších strachů hoomanů bylo vidět, jak se jejich vlastní stroje vzbouří proti nim, jak směšné, že? Jak by tento velký kus kovu mohl- Au! Oprášilo mě!\""
viVN = "Có vẻ như một trong những nỗi sợ lớn nhất của loài hooman là thấy những cỗ máy của chính họ nổi loạn chống lại họ, thật ngu ngốc phải không? Làm thế nào mà mảnh kim loại lớn này lại- Ouch! Nó đã điện giật tôi!"
trTR = "\"Anlaşılan, hoomanların en büyük korkularından biri, kendi makinelerinin onlara karşı ayaklanmasıymış, bu ne kadar da saçma! Bu büyük metal parçası nasıl olur da - Ah! Beni çarptı!\""

