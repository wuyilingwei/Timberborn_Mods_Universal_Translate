["Lapantouflemagic.PassthroughHouse.Description"]
raw = "A slightly enlarged lodge with a complicated waterlock system to allow beavers to easily access the other side of the dam.\nHouses <color=green>one hauler</color> and its family.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A slightly enlarged lodge with a complicated waterlock system to allow beavers to easily access the other side of the dam. Houses <color=green>one hauler</color> and its family. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一个稍微放大的小屋，配备复杂的水锁系统，让海狸可以轻松到达大坝的另一侧。  \n容纳<color=green>一个搬运工</color>及其家庭。  \n<color=#00FFFF>作为堤坝</color>工作。"
zhTW = "一座略大於一般的小屋，配有複雜的水鎖系統，以便海狸能夠輕鬆通過大壩到達另一側。\n容納<color=green>一名搬運工</color>及其家人。\n<color=#00FFFF>作為堤壩運作</color>"
ruRU = "Немного увеличенная хижина с сложной системой водяного замка, позволяющая бобрам легко добираться до другой стороны плотины. \nВмещает <color=green>одного грузчика</color> и его семью. \n<color=#00FFFF>Работает как дамба</color>"
jaJP = "「少し大きくなったロッジで、ビーバーがダムの反対側に簡単にアクセスできるように複雑な水門システムがあります。<color=green>一人の運搬者</color>とその家族が住んでいます。<color=#00FFFF>堤防として機能します</color>」"
frFR = "Un pavillon légèrement agrandi avec un système de verrouillage à eau compliqué pour permettre aux castors d'accéder facilement de l'autre côté du barrage. Accueille <color=green>un transporteur</color> et sa famille. <color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Eine leicht vergrößerte Hütte mit einem komplizierten Wasserlaufsystem, das den Bibern einen einfachen Zugang zur anderen Seite des Damms ermöglicht. \nBeherbergt <color=green>einen Transporteur</color> und dessen Familie. \n<color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Nieco powiększona chata z skomplikowanym systemem wodnym, umożliwiającym bobrom łatwy dostęp do drugiej strony tamy. \nMieści <color=green>jednego nosiciela</color> i jego rodzinę. \n<color=#00FFFF>Działa jak wał ochronny</color>"
ptBR = "Uma cabana ligeiramente ampliada com um complicado sistema de passagem de água para permitir que os castores acessem facilmente o outro lado da represa. \nAcomoda <color=green>um transportador</color> e sua família. \n<color=#00FFFF>Funciona como um Dique</color>"
koKR = "조금 확장된 롯지로, 비버들이 댐의 반대편으로 쉽게 접근할 수 있도록 복잡한 수위 잠금 시스템이 있습니다.\n<color=green>한 명의 운반꾼</color>과 그 가족이 거주합니다.\n<color=#00FFFF>제방 역할을 합니다</color>"
csCZ = "Malá zvětšená chata se složitým vodotěsným systémem, který umožňuje bobrům snadno se dostat na druhou stranu hráze.\nUbytuje <color=green>jednoho nosiče</color> a jeho rodinu.\n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một lều hơi lớn với hệ thống khóa nước phức tạp để cho phép thú dường như dễ dàng tiếp cận phía bên kia của đập.\nNhà <color=green>một người vận chuyển</color> và gia đình của họ.\n<color=#00FFFF>Hoạt động như một đê</color>"
trTR = "Biraz büyütülmüş bir kulübe, kunduzların barajın diğer tarafına kolayca geçiş yapabilmesi için karmaşık bir su kilidi sistemi ile donatılmıştır. \n<color=green>Bir taşıyıcı</color> ve ailesine ev sahipliği yapar. \n<color=#00FFFF>Bir Set olarak çalışır</color>"

["Lapantouflemagic.PassthroughHouse.FlavorDescription"]
raw = "\"You would think that this house has extra space right? Well no, the waterlock mechanism is huge and noisy. Thankfully almost no one uses it at night.\""
status = "normal"
enUS = "\"You would think that this house has extra space, right? Well no, the waterlock mechanism is huge and noisy. Thankfully, almost no one uses it at night.\""
zhCN = "“你可能会认为这座房子有额外的空间，对吧？其实没有，水闸机制庞大且吵闹。幸运的是，几乎没有人在晚上使用它。”"
zhTW = "「你可能會認為這棟房子有額外的空間對吧？實際上並沒有，水閘機制非常巨大且吵鬧。幸好幾乎沒有人在夜間使用它。」"
ruRU = "\"Вы бы подумали, что в этом доме есть дополнительное пространство, верно? Но нет, механизм водяного замка огромен и шумен. К счастью, почти никто им не пользуется ночью.\""
jaJP = "この家には追加のスペースがあると思うでしょう？いいえ、水封装置のメカニズムは巨大で騒々しいのです。幸いなことに、ほとんどの人は夜にはそれを使用しません。"
frFR = "\"Vous penseriez que cette maison a de l'espace supplémentaire, n'est-ce pas ? Eh bien non, le mécanisme d'étanchéité à l'eau est énorme et bruyant. Heureusement, presque personne ne l'utilise la nuit.\""
deDE = "\"Man könnte denken, dass dieses Haus zusätzlichen Platz hat, oder? Nun, nein, der Wasserabschlusmechanismus ist riesig und laut. Zum Glück benutzt ihn fast niemand nachts.\""
plPL = "\"Można by pomyśleć, że ten dom ma dodatkową przestrzeń, prawda? Cóż, nie, mechanizm wodny jest ogromny i hałaśliwy. Na szczęście prawie nikt go nie używa w nocy.\""
ptBR = "\"Você pensaria que esta casa tem espaço extra, certo? Bem, não, o mecanismo de bloqueio de água é enorme e barulhento. Felizmente, quase ninguém o usa à noite.\""
koKR = "\"이 집에는 추가 공간이 있을 것이라고 생각할 수 있지만, 사실 물 잠금 장치가 크고 시끄러워요. 다행히도 밤에는 거의 누구도 사용하지 않아요.\""
csCZ = "\"Pomysleli byste si, že tento dům má navíc prostor, že? Přitom ne, vodotěsný mechanismus je obrovský a hlučný. Naštěstí ho skoro nikdo v noci nepoužívá.\""
viVN = "\"Bạn sẽ nghĩ rằng ngôi nhà này có thêm không gian đúng không? Nhưng không, cơ chế khóa nước thì to và ồn ào. May mắn thay, hầu như không ai sử dụng nó vào ban đêm.\""
trTR = "Bu evin ekstra bir alanı olduğunu düşünebilirsiniz, değil mi? Ama hayır, suyu kilitleme mekanizması kocaman ve gürültülü. Neyse ki, neredeyse kimse gece kullanmıyor."

