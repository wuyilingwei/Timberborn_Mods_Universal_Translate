status = "normal"
enUS = "A small lodge whose inhabitants are tasked with supplying and taking care of the fermentation barrels installed on the upper floor.  \n<color=#FF6EC7>Can function without workers.</color>  \n<color=#00FFFF>Works as a Levee</color>"
zhCN = "一个小酒馆，居民负责供应和照顾安装在二楼的发酵桶。  \n<color=#FF6EC7>可以在没有工人的情况下运作。</color>  \n<color=#00FFFF>作为堤坝运作</color>"
zhTW = "一個小小的 lodge，居民的任務是提供並照顧安裝在上層的發酵桶。  \n<color=#FF6EC7>可以在沒有工人的情況下運行。</color>  \n<color=#00FFFF>可作為堤壩使用</color>"
ruRU = "Небольшая хижина, жители которой занимаются поставкой и уходом за бочками для ферментации, установленными на верхнем этаже.  \n<color=#FF6EC7>Может функционировать без рабочих.</color>  \n<color=#00FFFF>Работает как дамба</color>"
jaJP = "「上階に設置された発酵樽の供給と管理を担当する住民がいる小さな小屋です。  \n<color=#FF6EC7>労働者なしでも機能します。</color>  \n<color=#00FFFF>堤防として機能します。</color>」"
frFR = "Une petite cabane dont les habitants ont pour mission d'approvisionner et de s'occuper des fûts de fermentation installés à l'étage supérieur.  \n<color=#FF6EC7>Peut fonctionner sans travailleurs.</color>  \n<color=#00FFFF>Fonctionne comme un digue</color>"
deDE = "Eine kleine Hütte, deren Bewohner damit beauftragt sind, die Fermentationsfässer im Obergeschoss zu versorgen und zu betreuen.  \n<color=#FF6EC7>Kann ohne Arbeiter funktionieren.</color>  \n<color=#00FFFF>Funktioniert wie ein Damm.</color>"
plPL = "Mała chata, której mieszkańcy są odpowiedzialni za dostarczanie i dbanie o beczki fermentacyjne zainstalowane na wyższej kondygnacji.  \n<color=#FF6EC7>Może działać bez pracowników.</color>  \n<color=#00FFFF>Działa jak wał ochronny</color>"
ptBR = "Uma pequena cabana cujos habitantes são responsáveis por fornecer e cuidar dos barris de fermentação instalados no andar superior.  \n<color=#FF6EC7>Pode funcionar sem trabalhadores.</color>  \n<color=#00FFFF>Funciona como um dique</color>"
koKR = "작은 오두막으로, 주민들은 위층에 설치된 발효 통을 공급하고 관리하는 임무를 맡고 있습니다.\n<color=#FF6EC7>작업자가 없어도 기능할 수 있습니다.</color>\n<color=#00FFFF>제방으로 작동합니다.</color>"
csCZ = "Malá chata, jejíž obyvatelé mají za úkol zásobovat a pečovat o fermentační sudy umístěné v horním patře.\n<color=#FF6EC7>Může fungovat bez pracovníků.</color>\n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một ngôi nhà nhỏ mà những cư dân có nhiệm vụ cung cấp và chăm sóc những thùng lên men được lắp đặt ở tầng trên.\n<color=#FF6EC7>Có thể hoạt động mà không cần công nhân.</color>\n<color=#00FFFF>Hoạt động như một Đê</color>"
trTR = "Üst katında kurutma varillerini temin etmek ve onlarla ilgilenmekle görevlendirilmiş sakinleri olan küçük bir konak.\n<color=#FF6EC7>Çalışan olmadan işlev görebilir.</color>\n<color=#00FFFF>Bir Set gibi çalışır</color>"

["Lapantouflemagic.FermentationHouse.FlavorDescription"]
raw = "\"No one will notice if I keep some extra for myself...\"\n -A fermenter beaver"
status = "normal"
enUS = "\"No one will notice if I keep some extra for myself...\"  \n-A fermenter beaver"
zhCN = "“如果我多留一点自己用，没人会注意到的……”  \n- 一只发酵的海狸"
zhTW = "「沒人會注意如果我多留一些給自己……」  \n- 一隻發酵的海狸"
ruRU = "\"Никто не заметит, если я оставлю немного на себя...\"\n -Бобёр-ферментатор"
jaJP = "「誰も気づかないさ、自分のために少し余分に取っておいても…」  \n- 発酵するビーバー"
frFR = "\"Personne ne remarquera si j'en garde un peu pour moi...\"  \n-Un castor fermenté"
deDE = "„Niemand wird es bemerken, wenn ich ein bisschen extra für mich behalte...“  \n- Ein fermentierender Biber"
plPL = "\"Nikt nie zauważy, jeśli zachowam trochę dla siebie...\"\n -Bóbr fermentator"
ptBR = "\"Ninguém vai notar se eu guardar um pouco a mais para mim...\"  \n-Um castor fermentador"
koKR = "\"나를 위해 조금 더 챙겨도 아무도 눈치채지 않을 거야...\"\n- 발효 비버"
csCZ = "\"Všichni si ničeho nevšimnou, když si nějaké navíc nechám pro sebe...\"  \n- Vydra kvasitel"
viVN = "\"Không ai sẽ chú ý nếu tôi giữ một ít cho bản thân mình...\"\n -Một con rái cá lên men"
trTR = "\"Kimse, biraz fazlasını kendime saklasam fark etmeyecek...\"\n -Bir fermente eden kunduz"

