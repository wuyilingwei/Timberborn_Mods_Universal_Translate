jaJP = "木こりの仕事を称えるための像で、彼らがいなければ何も建てられない。"
frFR = "Une statue pour honorer le travail des bûcherons, sans qui rien ne serait construit."
deDE = "Eine Statue zur Ehrung der Arbeit der Holzfäller, ohne die nichts gebaut werden könnte."
plPL = "Statua, aby uczcić pracę drwali, bez których nic by nie powstało."
ptBR = "Uma estátua para homenagear o trabalho dos Lenhadores, sem os quais nada seria construído."
koKR = "목수들의 일을 기리기 위한 동상. 그들이 없었다면 아무것도 건설될 수 없었을 것이다."
