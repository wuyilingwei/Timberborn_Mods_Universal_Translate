["Lapantouflemagic.OverhangSquewer_Long.Description"]
raw = "A side platform that can be stuck between buildings or between floors.\nCan be extended on itself once.\n<color=red>Multiple side platforms or bridges cannot share the same support</color>"
status = "normal"
enUS = "A side platform that can be placed between buildings or between floors. Can be extended once. <color=red>Multiple side platforms or bridges cannot share the same support</color>"
zhCN = "一个侧平台，可以夹在建筑物之间或楼层之间。可以在其上延伸一次。<color=red>多个侧平台或桥梁不能共享相同的支撑</color>"
zhTW = "一個可以夾在建築物或樓層之間的側平台。  \n可以自我延伸一次。  \n<color=red>多個側平台或橋樑不能共享相同的支撐</color>"
ruRU = "Боковая платформа, которую можно вставить между зданиями или между этажами. Можно продлить саму себя один раз. <color=red>Несколько боковых платформ или мостов не могут делить одну и ту же опору</color>"
jaJP = "建物の間や階の間に挟むことができる側面プラットフォームです。  \n自身の上に一度だけ拡張可能です。  \n<color=red>複数の側面プラットフォームまたは橋は同じ支えを共有できません</color>"
frFR = "Une plateforme latérale qui peut être coincée entre des bâtiments ou entre des étages.  \nPeut être étendue sur elle-même une fois.  \n<color=red>Plusieurs plateformes latérales ou ponts ne peuvent pas partager le même support</color>"
deDE = "Eine Seitenplattform, die zwischen Gebäuden oder zwischen Etagen platziert werden kann. \nKann einmal verlängert werden. \n<color=red>Mehrere Seitenplattformen oder Brücken können nicht denselben Stütze teilen</color>"
plPL = "Platforma boczna, którą można umieścić między budynkami lub między piętrami. \nMożna ją rozciągnąć na sobie raz.\n<color=red>Wiele platform bocznych lub mostów nie może dzielić tego samego wsparcia</color>"
ptBR = "Uma plataforma lateral que pode ser fixada entre edifícios ou entre andares.  \nPode ser estendida sobre si mesma uma vez.  \n<color=red>Múltiplas plataformas laterais ou pontes não podem compartilhar o mesmo suporte</color>"
koKR = "건물 사이 또는 층 사이에 끼일 수 있는 측면 플랫폼입니다.  \n한 번 자체적으로 확장할 수 있습니다.  \n<color=red>여러 측면 플랫폼이나 다리는 동일한 지지대를 공유할 수 없습니다</color>"
csCZ = "Boční platforma, která může být umístěna mezi budovami nebo mezi patry. Může být rozšířena sama o sobě jednou. <color=red>Více bočních platforem nebo mostů nemůže sdílet stejnou oporu</color>"
viVN = "Một nền tảng bên có thể được đặt giữa các tòa nhà hoặc giữa các tầng.\nCó thể mở rộng trên chính nó một lần.\n<color=red>Các nền tảng bên hoặc cầu khác nhau không thể chia sẻ cùng một điểm hỗ trợ</color>"
trTR = "Binalar arasında veya katlar arasında yerleştirilebilen bir yan platform.\nKendisi üzerinde bir kez uzatılabilir.\n<color=red>Birden fazla yan platform veya köprü aynı desteği paylaşamaz</color>"

