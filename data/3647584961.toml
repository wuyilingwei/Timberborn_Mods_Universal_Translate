["Lapantouflemagic.MechanizedPinkwoodFarm.Description"]
raw = "A complex device that masterfully transforms mechanical power into logs.\nThe sawblades must be changed regularly."
status = "normal"
enUS = "A complex device that masterfully transforms mechanical power into logs. The saw blades must be changed regularly."
zhCN = "一个复杂的设备，巧妙地将机械能转化为木材。\n锯片必须定期更换。"
zhTW = "一種複雜的裝置，巧妙地將機械動力轉化為木材。鋸片必須定期更換。"
ruRU = "Сложное устройство, которое мастерски преобразует механическую энергию в бревна. Пилы необходимо регулярно менять."
jaJP = "機械的な力を巧みに丸太へと変換する複雑な装置です。鋸刃は定期的に交換する必要があります。"
frFR = "Un dispositif complexe qui transforme de manière magistrale l'énergie mécanique en bûches. Les lames de scie doivent être remplacées régulièrement."
deDE = "Ein komplexes Gerät, das mechanische Energie meisterhaft in Holzstämme umwandelt. Die Sägeblätter müssen regelmäßig gewechselt werden."
plPL = "Złożone urządzenie, które mistrzowsko przekształca moc mechaniczną w kłody. \nOstrza pił należy regularnie wymieniać."
ptBR = "Um dispositivo complexo que transforma habilmente energia mecânica em toras. As lâminas da serra devem ser trocadas regularmente."
koKR = "기계적 힘을 능숙하게 나무로 변환하는 복잡한 장치입니다. 톱날은 정기적으로 교체해야 합니다."
csCZ = "Složitý přístroj, který mistrovsky převádí mechanickou energii na klády. \nPily je třeba pravidelně měnit."
viVN = "Một thiết bị phức tạp chuyển đổi tài nguyên cơ khí thành gỗ một cách tuyệt vời. Lưỡi cưa cần được thay đổi thường xuyên."
trTR = "Mevcut mekanik enerjiyi mükemmel bir şekilde ağaç tomruğuna dönüştüren karmaşık bir cihaz. Testere bıçaklarının düzenli olarak değiştirilmesi gerekiyor."

["Lapantouflemagic.MechanizedPinkwoodFarm.FlavorDescription"]
raw = "\"The first rule of beaver engineering is to not look too closely at the mechanism\"\n -Grandpa beaver, on what happened to his whiskers."
status = "normal"
enUS = "\"The first rule of beaver engineering is to not look too closely at the mechanism.\"  \n- Grandpa Beaver, on what happened to his whiskers."
zhCN = "“海狸工程的第一条规则就是不要过于关注机制”  \n——老海狸，谈论他的胡须发生了什么。"
zhTW = "「海狸工程的第一條法則就是不要過於仔細地研究機械原理」  \n- 老海狸，談及他的鬍鬚發生了什麼事。"
ruRU = "Первое правило бобрового инжиниринга - не пристально рассматривать механизм\"  \n -Дедушка бобр, о том, что произошло с его усами."
jaJP = "「ビーバー工学の第一のルールは、メカニズムをあまりじっくり見ないことです」  \n- おじいちゃんビーバー、彼のヒゲに何が起こったかについて。"
frFR = "\"La première règle de l'ingénierie des castors est de ne pas regarder de trop près le mécanisme\"  \n- Grand-père castor, sur ce qui est arrivé à ses moustaches."
deDE = "„Die erste Regel der Bibertechnik ist, nicht zu genau auf den Mechanismus zu schauen.“  \n- Opa Biber, über das, was mit seinen Schnurrhaaren passiert ist."
plPL = "\"Pierwsza zasada inżynierii bobrów to nie patrzeć zbyt blisko na mechanizm.\"  \n-Dziadek bóbr, o tym, co stało się z jego wąsami."
ptBR = "A primeira regra da engenharia dos castores é não olhar muito de perto para o mecanismo\"  \n- Vovô castor, sobre o que aconteceu com seus bigodes."
koKR = "\"비버 공학의 첫 번째 규칙은 기계 구조를 너무 자세히 들여다보지 않는 것이다.\"  \n- 할아버지 비버, 그의 수염에 일어난 일에 대해."
csCZ = "\"První pravidlo bobřího inženýrství je nepodívat se příliš zblízka na mechanismus.\"  \n-Dědeček bobr, o tom, co se stalo s jeho vousy."
viVN = "Quy tắc đầu tiên của kỹ thuật nhím là không nhìn quá kỹ vào cơ chế\" \n - Ông beaver, về điều đã xảy ra với râu của mình."
trTR = "Kunduz mühendisliğinin ilk kuralı, mekaniğe çok yakından bakmamaktır.\"  \n-Büyükbaba kunduz, bıyıklarının başına ne geldiğini anlatıyor."

