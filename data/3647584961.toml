["Lapantouflemagic.SmallAquiferPump.Description"]
raw = "A perverse contraption using arcane powers to extract water from the ground.\nIs affected by droughts but not by badtides.\nTo be placed on top of two adjacent <color=#FF6EC7>triangle roof</color> buildings.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A perverse contraption using arcane powers to extract water from the ground. Is affected by droughts but not by bad tides. To be placed on top of two adjacent <color=#FF6EC7>triangle roof</color> buildings. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一个扭曲的装置，利用神秘力量从地下提取水分。\n受到干旱的影响，但不受潮汐的影响。\n必须放置在两个相邻的<color=#FF6EC7>三角屋顶</color>建筑上。\n<color=#00FFFF>作为堤坝运作</color>"
zhTW = "一種使用神秘力量從地下提取水的扭曲裝置。\n會受到乾旱的影響，但不會受到壞潮的影響。\n必須放置在兩座相鄰的<color=#FF6EC7>三角屋頂</color>建築上。\n<color=#00FFFF>作為堤防使用</color>"
ruRU = "Извращённое устройство, использующее тайные силы для извлечения воды из земли. Подвергается засухам, но не подвержено плохим приливам. Устанавливается на вершине двух смежных <color=#FF6EC7>треугольных крыш</color> зданий. <color=#00FFFF>Работает как дамба</color>"
jaJP = "地面から水を抽出するための魔法の力を利用した奇妙な装置です。\n干ばつの影響を受けますが、悪潮には影響されません。\n隣接する2つの<color=#FF6EC7>三角屋根</color>の建物の上に配置する必要があります。\n<color=#00FFFF>堤防として機能します</color>"
frFR = "Un appareil pervers utilisant des pouvoirs arcaniques pour extraire l'eau du sol.  \nEst affecté par les sécheresses mais pas par les marées nocives.  \nÀ placer sur le dessus de deux bâtiments adjacents à toit <color=#FF6EC7>triangulaire</color>.  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Eine perverse Vorrichtung, die arcane Kräfte nutzt, um Wasser aus dem Boden zu fördern.\nIst von Dürren betroffen, jedoch nicht von schlechten Gezeiten.\nSollte auf zwei benachbarten <color=#FF6EC7>dreieckigen Dächern</color> platziert werden.\n<color=#00FFFF>Funktioniert wie ein Deich</color>"
plPL = "Perwersyjna maszyna wykorzystująca tajemną moc do wydobywania wody z ziemi.\nJest narażona na susze, ale nie na złe przypływy.\nMożna ją umieścić na dwóch sąsiednich budynkach z <color=#FF6EC7>trójkątnym dachem</color>.\n<color=#00FFFF>Działa jak wał</color>"
ptBR = "Um dispositivo perverso que utiliza poderes arcanos para extrair água do solo. É afetado por secas, mas não por marés ruins. Deve ser colocado em cima de dois prédios adjacentes com <color=#FF6EC7>telhado triangular</color>. <color=#00FFFF>Funciona como uma barreira</color>"
koKR = "지하에서 물을 추출하기 위해 신비로운 힘을 이용한 기괴한 장치입니다. \n가뭄의 영향을 받지만 나쁜 조수의 영향을 받지 않습니다. \n두 개의 인접한 <color=#FF6EC7>삼각형 지붕</color> 건물 위에 배치되어야 합니다. \n<color=#00FFFF>제방처럼 작동합니다</color>"
csCZ = "Perverzní zařízení využívající arcanské síly k těžbě vody ze země.\nOvlivňuje ho sucho, ale ne špatné přílivy.\nMusí být umístěno na vrchol dvou sousedních <color=#FF6EC7>trojúhelníkových střech</color> budov.\n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một cỗ máy quái dị sử dụng sức mạnh bí ẩn để khai thác nước từ lòng đất. Bị ảnh hưởng bởi hạn hán nhưng không bởi thủy triều xấu. Được đặt trên đỉnh của hai tòa nhà <color=#FF6EC7>mái tam giác</color> liền kề. <color=#00FFFF>Có tác dụng như một Đê</color>"
trTR = "Yer altından su çekmek için doğaüstü güçler kullanan sapkın bir alet.\nKurağından etkilenir ama kötü gelgitlerden etkilenmez.\nİki bitişik <color=#FF6EC7>üçgen çatı</color> binanın üstüne yerleştirilecektir.\n<color=#00FFFF>Bir Set gibi çalışır</color>"

["Lapantouflemagic.SmallAquiferPump.FlavorDescription"]
raw = "\"It is written on the user manual that only a one-legged brass-colored beaver, dancing under the full moon in the middle of twelve Ironteeth statuettes wrapped in cabbage, shall open the security cache and allow to press the start button.\n -A very gullible waterpumper beaver."
status = "normal"
enUS = "It is written in the user manual that only a one-legged brass-colored beaver, dancing under the full moon in the middle of twelve Ironteeth statuettes wrapped in cabbage, shall open the security cache and allow pressing the start button.  \n-A very gullible waterpumper beaver."
zhCN = "“用户手册上写着，只有一只独腿的铜色海狸，在满月之下，围绕着十二个包裹在卷心菜里的铁齿雕像跳舞，才能打开安全缓存并按下启动按钮。  \n- 一个非常容易上当的抽水海狸。”"
zhTW = "「使用手冊上寫著，只有一隻可樂色的單腿海狸，在滿月下於十二個裹著捲心菜的鐵牙雕像中間跳舞，才能打開安全倉庫並按下啟動按鈕。  \n- 一隻非常容易上當的水泵海狸。」"
ruRU = "В инструкции написано, что только однорогий бобер цвета латуни, танцующий под полной луной среди двенадцати статуэток Железных Зубов, обернутых в капусту, сможет открыть защитный ящик и нажать кнопку старт.\n -Очень доверчивый водяной бобер."
jaJP = "「ユーザーマニュアルには、満月の下でキャベツに包まれた12体のアイアンティースの像の真ん中で踊っている、片足の銅色のビーバーだけがセキュリティキャッシュを開けてスタートボタンを押すことができると書かれています。  \n- とても騙されやすい水ポンプビーバー。」"
frFR = "Il est écrit dans le manuel d'utilisation que seul un castor en laiton sur une patte, dansant sous la pleine lune au milieu de douze statuettes Ironteeth enveloppées dans du chou, pourra ouvrir la cache de sécurité et permettre d'appuyer sur le bouton de démarrage. -Un castor pompant de l'eau très crédule."
deDE = "Im Benutzerhandbuch steht geschrieben, dass nur ein einbeiniges, messingfarbenes Biber, das unter dem Vollmond mitten in zwölf mit Kohl umwickelten Ironteeth-Statuetten tanzt, den Sicherheitscache öffnen und den Startknopf drücken kann. -Ein sehr naiver Wasserpumpenbiber."
plPL = "Na podręcznej instrukcji napisano, że tylko jednonogą brązową bobra, tańcząca pod pełnym księżycem wśród dwunastu statuetek Ironteeth owiniętych w kapustę, otworzy skrytkę zabezpieczeń i pozwoli nacisnąć przycisk start.\n -Bardzo naiwne bobra pompowa wodę."
ptBR = "Está escrito no manual do usuário que apenas um castor de uma perna, colorido de bronze, dançando sob a lua cheia no meio de doze estatuetas Ironteeth envoltas em repolho, poderá abrir o cofre de segurança e permitir pressionar o botão de início. \n- Um castor muito ingênuo que bombeia água."
koKR = "사용자 매뉴얼에는 오직 한 쪽 다리를 가진 황동색 비버가 양배추로 감싸인 열두 개의 Ironteeth 동상 한가운데에서 만월 아래에서 춤을 출 때만 보안 캐시를 열고 시작 버튼을 누를 수 있다고 적혀 있습니다.\n - 매우 속기 쉬운 물펌프 비버."
csCZ = "Na uživatelskou příručku je napsáno, že pouze jednonohý měděný bobr, tančící pod úplňkem uprostřed dvanácti sošek Ironteeth zabalených v zelí, otevře zabezpečenou skrýš a umožní stisknout tlačítko start.\n - Velmi naivní vodní pumpář bobr."
viVN = "“Trên hướng dẫn sử dụng có ghi rằng chỉ một con béo có một chân màu đồng, nhảy múa dưới ánh trăng tròn giữa mười hai bức tượng Ironteeth được bọc trong bắp cải, mới có thể mở kho bảo mật và cho phép ấn nút khởi động.  \n-Một con béo bơm nước rất nhẹ dạ.”"
trTR = "Kullanıcı kılavuzunda, sadece tam ayın altında, lahana sarılı on iki Ironteeth heykelinin ortasında dans eden tek bacaklı pirinç rengi bir kunduzun güvenlik kasasını açıp başlama butonuna basmasına izin verileceği yazılıdır.  \n -Çok saf bir su pompalayan kunduz."

