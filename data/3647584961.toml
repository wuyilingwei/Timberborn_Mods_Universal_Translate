["Lapantouflemagic.Verydeep_mine_elevator.FlavorDescription"]
raw = "\"Come on! Stop acting like a kit! Danger? What danger? I laugh at the face of danger! Ah-Ah-Ah-Arghbllglblbglbl\"\n -Ruin exploration team Nb 3, team leader's last words."
status = "normal"
enUS = "Come on! Stop acting like a kit! Danger? What danger? I laugh at the face of danger! Ah-Ah-Ah-Arghbllglblbglbl\"\n -Ruin exploration team Nb 3, team leader's last words."
zhCN = "“来吧！别像个小猫一样！危险？什么危险？我在危险面前哈哈大笑！啊-啊-啊-呜呜呜咕咕咕咕”\n- 第三个探险队，队长的遗言。"
zhTW = "「來吧！別像小貓一樣行為！危險？什麼危險？我在危險面前笑！啊哈啊哈啊哈——咕噥噥噥」  \n- 第 3 團隊探險隊，隊長的最後一句話。"
ruRU = "\"Давай! Прекрати вести себя как котенок! Опасность? Какая опасность? Я смеюсь в лицо опасности! Ах-ах-ах-аргбллглблбглбл\"  \n- Последние слова лидера команды по исследованию руин №3."
jaJP = "「さあ！子供のように振る舞うのをやめて！危険？どんな危険？私は危険を笑い飛ばす！アハアハアハ-アーグバルグルブルブル” - 破壊された探検チームNb 3、チームリーダーの最後の言葉。」"
frFR = "\"Allez ! Arrête de faire comme un petit ! Danger ? Quel danger ? Je ris au nez du danger ! Ah-Ah-Ah-Arghbllglblbglbl\"  \n- Derniers mots du chef de l'équipe d'exploration de ruines n° 3."
deDE = "\"Los! Hör auf, dich wie ein Jungtier zu benehmen! Gefahr? Welche Gefahr? Ich lache dem Angesicht der Gefahr ins Gesicht! Ah-Ah-Ah-Arghbllglblbglbl\" \n -Die letzten Worte des Teamleiters des Ruinenerkundungs-Teams Nr. 3."
plPL = "Chodź! Przestań się zachowywać jak kociak! Niebezpieczeństwo? Jakie niebezpieczeństwo? Śmieję się w obliczu niebezpieczeństwa! Ah-Ah-Ah-Arghbllglblbglbl\"  \n- \"Ostatnie słowa lidera zespołu badawczego nr 3."
ptBR = "\"Vamos lá! Pare de agir como um filhote! Perigo? Que perigo? Eu rio na cara do perigo! Ah-Ah-Ah-Arghbllglblbglbl\"  \n- Últimas palavras do líder da equipe de exploração de ruínas nº 3."
koKR = "어서! 애처럼 굴지 마! 위험? 무슨 위험이야? 나는 위험을 조롱해! 아하하하 아르그블글블블\"  \n- \"유적 탐사 팀 Nb 3, 팀장의 마지막 말."
csCZ = "Poď! Přestaň se chovat jako kotě! Nebezpečí? Jaké nebezpečí? Směji se tváři nebezpečí! Ah-Ah-Ah-Arghbllglblbglbl\"  \n-\"Tým prozkoumávání ruin č. 3, poslední slova velitele týmu."
viVN = "Come on! Đừng có cư xử như một con mèo con! Nguy hiểm? Nguy hiểm gì? Tôi cười vào mặt nguy hiểm! Ah-Ah-Ah-Arghbllglblbglbl\"  \n- \"Những lời cuối cùng của trưởng nhóm đội khám phá di tích số 3."
trTR = "\"Hadi! Yavru gibi davranmayı kes! Tehlike mi? Hangi tehlike? Tehlikenin yüzüne gülerim! Ah-Ah-Ah-Arghbllglblbglbl\" -Yıkım keşif ekibi Nb 3, takım liderinin son sözleri."

