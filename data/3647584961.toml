enUS = "Harvests pine resin and other essences from certain trees."
zhCN = "“在某些树木上收获松树树脂和其他精华。”"
zhTW = "在某些樹木上收穫松樹樹脂和其他精華。"
ruRU = "Собирает сосновую смолу и другие эссенции с некоторых деревьев."
jaJP = "いくつかの木から松脂や他のエッセンスを収穫します。"
frFR = "Récolte la résine de pin et d'autres essences sur certains arbres."
deDE = "Erntet Kiefernharz und andere Essenzen von einigen Bäumen."
plPL = "Zbiera żywicę sosnową i inne esencje z niektórych drzew."
ptBR = "Colhe resina de pinho e outras essências em algumas árvores."
koKR = "일부 나무에서 소나무 수액과 기타 정수를 수확합니다."
csCZ = "Skliďte borovicovou pryskyřici a další esence z některých stromů."
viVN = "Thu hoạch nhựa thông và các tinh chất khác trên một số loại cây."
trTR = "Bazı ağaçlarda çam reçinesi ve diğer özleri toplar."

["Lapantouflemagic.TappersFlag.FlavorDescription"]
raw = "\"It seems quite easy, but it requires some technique to not get your fur full of this sticky thing\""
status = "normal"
enUS = "\"It seems quite easy, but it requires some technique to avoid getting your fur covered in this sticky substance.\""
zhCN = "“这似乎很简单，但需要一些技巧才能不让你的毛发沾满这个粘稠的东西。”"
zhTW = "「這看起來相當簡單，但需要一些技巧才能不讓你的毛髮沾上這種黏稠的東西。」"
ruRU = "\"Это кажется довольно простым, но требует некоторой техники, чтобы не испачкать шерсть этой липкой штукой.\""
jaJP = "「見た目は簡単そうですが、このベタベタしたものを毛に付けずにやるには、少しテクニックが必要です。」"
frFR = "\"On dirait que c'est assez facile, mais cela demande un peu de technique pour ne pas se retrouver avec la fourrure pleine de cette chose collante.\""
deDE = "\"Es scheint ganz einfach zu sein, aber es erfordert etwas Technik, um sich nicht mit diesem klebrigen Zeug vollzupacken.\""
plPL = "„Wydaje się dość łatwe, ale wymaga pewnej techniki, aby nie pobrudzić futra tym lepkim czymś.”"
ptBR = "\"Parece bastante fácil, mas requer alguma técnica para não deixar seu pelo cheio dessa coisa pegajosa.\""
koKR = "\"꽤 쉬워 보이지만, 이 끈적거리는 것에 털이 가득 차지 않도록 기술이 필요하다.\""
csCZ = "\"Zdá se to docela jednoduché, ale vyžaduje to určitou techniku, aby vaše srst nebyla plná téhle lepkavé věci.\""
viVN = "\"Có vẻ khá dễ, nhưng cần một chút kỹ thuật để không làm cho bộ lông của bạn dính đầy thứ dính này.\""
trTR = "\"Oldukça kolay görünüyor, ama bu yapışkan şeyle tüylerinizi doldurmamak için biraz teknik gerektiriyor.\""

