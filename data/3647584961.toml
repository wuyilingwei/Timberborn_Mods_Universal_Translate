["Lapantouflemagic.Lightgravitybattery.Description"]
raw = "An easy to build gravity battery using a bunch of logs as weight."
status = "normal"
enUS = "An easy-to-build gravity battery using a bunch of logs as weight."
zhCN = "一种易于建造的重力电池，使用一堆原木作为重量。"
zhTW = "一個簡易建造的重力電池，使用一堆木頭作為重量。"
ruRU = "Легко строящаяся гравитационная батарея с использованием кучи бревен в качестве груза."
jaJP = "「いくつかの丸太を重りとして使用する、簡単に構築できる重力バッテリー。」"
frFR = "Une batterie gravitationnelle facile à construire utilisant une pile de bûches comme poids."
deDE = "Eine einfach zu bauende Schwerkraftbatterie, die eine Menge Balken als Gewicht verwendet."
plPL = "Łatwy w budowie akumulator grawitacyjny wykorzystujący stos drewna jako obciążenie."
ptBR = "Uma bateria de gravidade fácil de construir usando um monte de toras como peso."
koKR = "목재를 중량으로 사용하는 간편하게 구축할 수 있는 중력 배터리입니다."
csCZ = "Snadno postavitelná gravitační baterie využívající hromadu klád jako závaží."
viVN = "Một viên pin trọng lực dễ xây dựng sử dụng một đống gỗ làm trọng lượng."
trTR = "Ağırlık olarak bir sürü tomruk kullanan, inşa edilmesi kolay bir yerçekimi pili."

["Lapantouflemagic.Lightgravitybattery.FlavorDescription"]
raw = "A common punishment for kits is to be left dangling there for a few hours."
status = "normal"
enUS = "A common punishment for kits is to be left dangling there for a few hours."
zhCN = "“小猫们常见的惩罚是被悬挂在那里几个小时。”"
zhTW = "對小貓來說，一種常見的懲罰就是被懸掛在那裡幾個小時。"
ruRU = "Распространенным наказанием для котят является оставаться висеть там несколько часов."
jaJP = "子猫に対する一般的な罰は、数時間そこにぶら下がっていることです。"
frFR = "Une punition courante pour les chatons est d'être laissés suspendus là pendant quelques heures."
deDE = "Eine gängige Bestrafung für Kätzchen ist es, dort für ein paar Stunden hängen gelassen zu werden."
plPL = "Zwykłą karą dla kociąt jest pozostawienie ich wiszących tam przez kilka godzin."
ptBR = "Uma punição comum para os gatinhos é ficar pendurado ali por algumas horas."
koKR = "기존의 키트에게 일반적인 처벌은 몇 시간 동안 그곳에 매달려 있는 것입니다."
csCZ = "Běžným trestem pro koťata je být tam viset několik hodin."
viVN = "Một hình phạt phổ biến cho các chú mèo con là bị treo lơ lửng ở đó trong vài giờ."
trTR = "Kedigiller için yaygın bir ceza, birkaç saat orada asılı kalmalarına izin vermektir."

