["Lapantouflemagic.PolarTrader.Description"]
raw = "The rustic Polarbeavers live in, and explore the ruins of some strange frozen circular hooman city. They would sell their own moms into slavery in exchange for those ''rocks that are always warm'' that wer’re pretty sure don’t actually exist. Otherwise they will want food or coal, and will more than gladly give us as much ice and junk as we can liftoff with. Unless you're the kind of sicko who likes to collect hooman remains."
status = "normal"
enUS = "The rustic Polarbeavers live in and explore the ruins of a strange frozen circular human city. They would sell their own mothers into slavery in exchange for those \"rocks that are always warm\" that we're pretty sure don't actually exist. Otherwise, they will want food or coal, and will gladly give us as much ice and junk as we can take off with. Unless you're the kind of sicko who likes to collect human remains."
zhCN = "乡村北极海狸生活在一些奇怪的冰冻圆形人类城市的遗迹中，进行探索。他们愿意把自己的妈妈卖给奴隶制，换取那些“总是温暖的石头”，我们敢肯定它们并不存在。否则，他们会想要食物或煤炭，并非常乐意提供我们能搬走的冰和垃圾。除非你是那种喜欢收集人类遗骸的变态。"
zhTW = "樸實的北極海狸生活在一些奇怪的冰凍圓形人類城市的 ruins 中並進行探索。他們會把自己的媽媽賣作奴隸，以換取那些“總是溫暖的石頭”，我們相當確定這些東西根本不存在。否則他們會想要食物或煤，並非常樂意提供我們能夠運走的冰和垃圾。除非你是那種喜歡收集人類遺骸的怪人。"
ruRU = "Сельские полярные бобры живут и исследуют руины странного замороженного круглого человеческого города. Они продали бы своих матерей в рабство в обмен на те ''камни, которые всегда теплые'', в существование которых мы довольно уверены не верят. В противном случае они захотят еду или уголь и с радостью дадут нам столько льда и хлама, сколько мы сможем унести. Если только вы не тот извращенец, который любит собирать человеческие останки."
jaJP = "田舎のポーラービーバーは、奇妙な凍った円形の人間の都市の遺跡に住み、探索します。彼らは、「いつも温かい」と確信しているものの実際には存在しない「石」のために、母親を奴隷に売ることも厭いません。それ以外には、食べ物や石炭を求め、私たちが持ち上げられるだけの氷やゴミを喜んで提供してくれるでしょう。人間の遺体を集めるのが好きな変わり者でない限り。"
frFR = "Les Polarbeavers rustiques vivent et explorent les ruines d'une étrange ville circulaire humaine gelée. Ils seraient prêts à vendre leurs propres mères en esclavage en échange de ces ''pierres qui sont toujours chaudes'' dont nous sommes assez sûrs qu'elles n'existent pas réellement. Sinon, ils voudront de la nourriture ou du charbon, et seront plus qu'heureux de nous donner autant de glace et de déchets que nous pourrons prendre. À moins que vous ne soyez le genre de malade qui aime collectionner les restes humains."
deDE = "Die rustikalen Polarbeaver leben in den Ruinen einer seltsamen gefrorenen runden Menschenstadt und erkunden diese. Sie würden ihre eigenen Mütter in die Sklaverei verkaufen, um im Austausch diese ''Steine, die immer warm sind'' zu bekommen, von denen wir uns ziemlich sicher sind, dass sie eigentlich nicht existieren. Andernfalls wollen sie Essen oder Kohle und geben uns mehr als gern so viel Eis und Kram, wie wir transportieren können. Es sei denn, du bist der Typ von Psycho, der es mag, menschliche Überreste zu sammeln."
plPL = "Rustykalne Polarniki żyją w i eksplorują ruiny dziwnej zamrożonej okrągłej ludzkiej miasta. Sprzedaliby własne matki w niewolę w zamian za te ''kamienie, które zawsze są ciepłe'', które jesteśmy prawie pewni, że w rzeczywistości nie istnieją. W przeciwnym razie będą chcieli jedzenia lub węgla i z chęcią dadzą nam tyle lodu i śmieci, ile tylko zdołamy zabrać. Chyba że jesteś tym rodzajem zboczeńca, który lubi zbierać ludzkie szczątki."
ptBR = "Os rústicos Polarbeavers vivem e exploram as ruínas de uma estranha cidade circular congelada de humanos. Eles venderiam suas próprias mães como escravas em troca das \"pedras que estão sempre quentes\", que temos certeza de que na verdade não existem. Caso contrário, eles vão querer comida ou carvão e ficarão mais do que felizes em nos dar tanto gelo e sucata quanto conseguirmos carregar. A menos que você seja o tipo de doente que gosta de coletar restos humanos."
koKR = "소박한 폴라비버들은 어떤 이상한 얼어붙은 원형 인간 도시의 유적에서 살고 탐험합니다. 그들은 존재하지 않을 것 같은 ''항상 따뜻한'' 돌을 대가로 자신의 엄마를 노예로 팔 정도입니다. 그렇지 않으면 그들은 음식이나 석탄을 원할 것이며, 우리가 수거할 수 있는 만큼의 얼음과 쓰레기를 기꺼이 줄 것입니다. 만약 당신이 인간의 유해를 수집하는 병신이라면 제외하고요."
csCZ = "Rustikální Polární bobři žijí a prozkoumávají ruiny zvláštní zamrzlé kruhové lidské město. Prodali by svoje vlastní matky do otroctví výměnou za ty \"skály, které jsou vždy teplé\", o kterých jsme si skoro jisti, že ve skutečnosti neexistují. Jinak budou chtít jídlo nebo uhlí a ochotně nám dají tolik ledu a haraburdí, kolik jen unášíme. Pokud nejste ten druh úchyláka, který má rád sbírání lidských ostatků."
viVN = "Những con gấu Polarbeaver mộc mạc sống trong và khám phá những tàn tích của một thành phố tròn kỳ lạ đông lạnh. Chúng sẽ bán chính mẹ của mình làm nô lệ để đổi lấy những ''viên đá luôn ấm'' mà chúng tôi khá chắc là không tồn tại. Nếu không, chúng sẽ cần thực phẩm hoặc than, và sẽ rất vui lòng cho chúng tôi nhiều băng và rác rưởi mà chúng tôi có thể mang đi. Trừ khi bạn là loại người thích thu thập di tích của con người."
trTR = "Kırsal Kutup Kunduzları, bazı tuhaf donmuş dairesel insan şehirlerinin kalıntılarında yaşar ve keşifler yapar. \"Her zaman sıcak\" olan o \"kayaları\" almak için annelerini köleliğe satmayı göze alırlar ki, aslında böyle bir şeyin var olduğundan pek emin değiliz. Aksi takdirde yiyecek veya kömür isteyeceklerdir ve alabileceğimiz kadar buz ve hurdayı seve seve bize vereceklerdir. Yalnızca insan kalıntılarını toplayan sapkın biri değilseniz."

