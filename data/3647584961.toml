["Lapantouflemagic.MedicalBed_DiseaseDescription"]
raw = "Gives sick beavers a place to rest while someone adjust the <color=green>basic balm</color> into a relieving <color=green>bramble flower</color> decoction."
status = "normal"
enUS = "Gives sick beavers a place to rest while someone adjusts the <color=green>basic balm</color> into a relieving <color=green>bramble flower</color> decoction."
zhCN = "为生病的海狸提供一个休息的地方，同时有人将<color=green>基础药膏</color>调制成舒缓的<color=green>荆棘花</color>煎剂。"
zhTW = "為生病的海狸提供休息的地方，同時有人將<color=green>基本藥膏</color>調整為舒緩的<color=green>荊棘花</color>煎劑。"
ruRU = "Предоставляет больным бобрам место для отдыха, пока кто-то подготавливает <color=green>основную мазь</color> в успокаивающий <color=green>отвар из ежевики</color>."
jaJP = "病気のビーバーが休む場所を提供し、誰かが <color=green>基本的なバルム</color> を癒しの <color=green>ブランブルフラワー</color> の煎じ薬に調整します。"
frFR = "Offre aux castors malades un endroit où se reposer pendant que quelqu'un prépare le <color=green>baume de base</color> en une décoction apaisante de <color=green>fleur de ronce</color>."
deDE = "Bietet kranken Bibern einen Platz zum Ausruhen, während jemand den <color=green>Basisbalsam</color> in ein linderndes <color=green>Rankenblüten</color> -Dekokt anpasst."
plPL = "Daje chorym bobrom miejsce do odpoczynku, podczas gdy ktoś przygotowuje <color=green>podstawowy balsam</color> w łagodny <color=green>napar z jeżyn</color>."
ptBR = "Dá aos castores doentes um lugar para descansar enquanto alguém ajusta o <color=green>bálsamo básico</color> em uma decocção aliviadora de <color=green>flor de silva</color>."
koKR = "아픈 너구리들이 누울 수 있는 공간을 제공하며 누군가 <color=green>기본 연고</color>를 편안한 <color=green>가시 꽃</color> 추출물로 조정하는 동안 휴식을 취할 수 있도록 합니다."
csCZ = "Poskytuje nemocným bobrům místo k odpočinku, zatímco někdo upravuje <color=green>základní balzám</color> na uklidňující <color=green>decoction z květiny třísloviny</color>."
viVN = "Cung cấp cho những con béo bệnh một nơi để nghỉ ngơi trong khi ai đó điều chỉnh <color=green>thuốc mỡ cơ bản</color> thành một dung dịch <color=green>hoa gai</color> có tác dụng giảm đau."
trTR = "Hasta kundakları için birinin <color=green>temel merhemi</color> rahatlatıcı bir <color=green>diken çiçeği</color> dekoksiyonuna ayarladığı sırada dinlenebilecekleri bir yer sağlar."

