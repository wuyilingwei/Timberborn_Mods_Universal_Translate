["Lapantouflemagic.IslandTrader.Description"]
raw = "Islandbeavers are lazy hippies who spend their days partying on the beach and are interested in nothing that isn't fun. The good thing is that we can easily trade them manfactured products since they can’t be bothered making their own, but on the other hand they don’t have a lot of things to give us in exchange, maybe some shiny junk and salt, that will save us the trouble of mining it."
status = "normal"
enUS = "Islandbeavers are lazy hippies who spend their days partying on the beach and are interested in nothing that isn't fun. The good thing is that we can easily trade them manufactured products since they can’t be bothered making their own, but on the other hand they don’t have a lot of things to give us in exchange, maybe some shiny junk and salt, that will save us the trouble of mining it."
zhCN = "岛屿海狸是懒惰的嬉皮士，整天在海滩上聚会，对任何不有趣的事情都不感兴趣。好处是我们可以很容易地和他们交易制造的产品，因为他们懒得自己生产；但另一方面，他们没什么可以和我们交换的东西，也许一些闪亮的垃圾和盐，这能省去我们采矿的麻烦。"
zhTW = "島上的海狸是懶惰的嬉皮士，終日聚會在海灘上，對任何不有趣的事物都不感興趣。好在我們可以輕易地用製造的產品與他們進行交易，因為他們懶得自己製作，但另一方面，他們能給我們的交換物品並不多，或許只有一些閃亮的垃圾和鹽，這可以省去我們開採的麻煩。"
ruRU = "Островные бобры — это ленивые хиппи, которые проводят свои дни, веселясь на пляже, и не интересуются ничем, что не приносит удовольствия. Хорошая новость в том, что мы можем легко обменивать с ними изделия ручной работы, так как их не волнует создание собственных, но с другой стороны, у них есть не так много вещей, чтобы отдать нам в обмен, возможно, немного блестящего хлама и соли, что избавит нас от хлопот с её добычей."
jaJP = "アイランドビーバーは怠惰なヒッピーで、ビーチでパーティーをしながら日々を過ごし、楽しさ以外には興味を持ちません。良いことに、彼らは自分で物を作るのが面倒なので、私たちは簡単に製品を取引できますが、逆に彼らが私たちに提供できるものはあまり多くありません。おそらく、ちょっとした光るガラクタや塩くらいで、それは私たちが採掘する手間を省いてくれるでしょう。"
frFR = "Les castors de l'île sont des hippies paresseux qui passent leurs journées à faire la fête sur la plage et ne s'intéressent à rien qui ne soit pas amusant. La bonne nouvelle, c'est que nous pouvons facilement leur échanger des produits manufacturés puisqu'ils ne peuvent pas être dérangés à en fabriquer eux-mêmes, mais d'un autre côté, ils n'ont pas beaucoup de choses à nous donner en échange, peut-être quelques objets brillants et du sel, ce qui nous éviterait d'avoir à les extraire."
deDE = "Inselbiber sind faule Hippies, die ihre Tage am Strand feiern und an nichts interessiert sind, was keinen Spaß macht. Das Gute ist, dass wir ihnen leicht verarbeitete Produkte im Austausch anbieten können, da sie sich nicht die Mühe machen, ihre eigenen herzustellen, aber andererseits haben sie nicht viele Dinge, die sie uns im Gegenzug geben können, vielleicht etwas glänzenden Müll und Salz, was uns die Mühe des Abbaus erspart."
plPL = "Wielorybki wyspiarskie to leniwe hipisy, które spędzają dni na imprezowaniu na plaży i nie interesuje ich nic, co nie jest zabawne. Dobrą wiadomością jest to, że możemy z łatwością wymieniać z nimi wyprodukowane towary, ponieważ nie chce im się robić własnych, ale z drugiej strony nie mają zbyt wielu rzeczy do oddania w zamian, może trochę błyszczących śmieci i soli, co oszczędzi nam kłopotu z jej wydobywaniem."
ptBR = "Os castores insulares são hippies preguiçosos que passam os dias festejando na praia e não estão interessados em nada que não seja divertido. A boa notícia é que podemos facilmente trocar com eles produtos manufaturados, já que eles não se incomodam em fazer os seus próprios, mas, por outro lado, eles não têm muitas coisas para nos dar em troca, talvez algumas bugigangas brilhantes e sal, o que nos poupará o trabalho de minerá-las."
koKR = "섬비버들은 해변에서 파티를 하며 일상을 보내는 게으른 히피들로, 재미없는 것에는 관심이 없습니다. 좋은 점은 그들이 자급자족하는 데 귀찮아하기 때문에 우리가 제조한 제품을 쉽게 거래할 수 있다는 것이지만, 반면에 그들이 우리에게 줄 수 있는 것들은 그리 많지 않습니다. 아마도 반짝이는 쓰레기와 소금 정도일 겁니다. 이는 우리가 그것을 채굴하는 수고를 덜어줄 것입니다."
csCZ = "Ostrovní bobři jsou líní hippíci, kteří tráví dny párty na pláži a nezajímají se o nic, co není zábava. Dobrou zprávou je, že s nimi můžeme snadno obchodovat s vyrobenými produkty, protože se jim nechce vyrábět vlastní, ale na druhou stranu nemají moc věcí, které by nám dali na oplátku, možná nějaký lesklý odpad a sůl, což nám ušetří starosti s těžbou."
viVN = "LIslandbeavers là những hippie lười biếng, dành cả ngày để tiệc tùng trên bãi biển và không quan tâm đến điều gì không thú vị. Điều tốt là chúng ta có thể dễ dàng trao đổi với chúng những sản phẩm chế tạo vì chúng không thèm bận tâm làm ra cái của riêng, nhưng mặt khác chúng cũng không có nhiều thứ để cho chúng ta đổi lại, có thể là một số rác rưởi sáng bóng và muối, điều này sẽ tiết kiệm cho chúng ta công sức khai thác."
trTR = "Adada yaşayan kunduzlar tembel hippilerdir, günlerini plajda parti yaparak geçirirler ve eğlenceli olmayan hiçbir şeyle ilgilenmezler. İyi olan şey, kendi ürünlerini yapmaya zahmet etmediklerinden onlara kolayca işlenmiş ürünler takas edebilmemizdir, ancak diğer yandan, bize verebilecekleri pek fazla şey yoktur; belki biraz parlayan çöp ve tuz, bu da bizim madencilik yapma zahmetimizi azaltır."

