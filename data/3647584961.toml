["Lapantouflemagic.FarmUpgradeD.FlavorDescription"]
raw = "\"We should think about using more machines for all this. Menial work will only get us so far.\"\n -An Engineer beaver"
status = "normal"
enUS = "\"We should think about using more machines for all this. Menial work will only get us so far.\"  \n-An Engineer beaver"
zhCN = "“我们应该考虑使用更多的机器来处理这些。枯燥的工作只能让我们走得更远。”  \n- 一只工程师海狸"
zhTW = "「我們應該考慮使用更多的機器來應對這一切。繁重的工作只能讓我們走到這裡。」  \n－一位工程師海狸"
ruRU = "\"Нам стоит подумать о том, чтобы использовать больше машин для всего этого. Ручная работа приведет нас только до определенной точки.\"  \n-Инженер-бобер"
jaJP = "「これにはもっと多くの機械を使うことを考えた方がいい。単純作業では限界がある。」  \n- エンジニアビーバー"
frFR = "\"Nous devrions envisager d'utiliser plus de machines pour tout cela. Le travail manuel ne nous mènera que jusqu'à un certain point.\"\n -Un castor ingénieur"
deDE = "\"Wir sollten darüber nachdenken, mehr Maschinen dafür zu verwenden. Mühsame Arbeit bringt uns nur bis zu einem gewissen Punkt weiter.\"  \n-Ein Ingenieur-Biber"
plPL = "\"Powinniśmy pomyśleć o zastosowaniu większej liczby maszyn do tego wszystkiego. Praca ręczna przyniesie nam tylko ograniczone efekty.\"  \n-Inżynier bobrów"
ptBR = "\"Devemos pensar em usar mais máquinas para tudo isso. O trabalho braçal só nos levará até certo ponto.\"\n -Um castor engenheiro"
koKR = "\"이 모든 것에 더 많은 기계를 사용하는 것을 생각해야 합니다. 단순 작업은 우리를 그 지점까지만 데려다 줄 것입니다.\"\n - 한 엔지니어 비버"
csCZ = "\"Věnovali bychom se tomu, že bychom měli používat více strojů na to všechno. Rutinní práce nás jen omezuje.\"  \n- Inženýrský bobr"
viVN = "\"Chúng ta nên nghĩ về việc sử dụng nhiều máy móc hơn cho tất cả những chuyện này. Công việc tầm thường chỉ giúp chúng ta đi xa đến vậy thôi.\"\n -Một con nhím kỹ sư"
trTR = "\"Bu iş için daha fazla makine kullanmayı düşünmeliyiz. Sıradan işler yalnızca bu kadar ilerletir bizi.\"  \n-Bir Mühendis kunduz"

