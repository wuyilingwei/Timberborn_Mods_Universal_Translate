["Lapantouflemagic.FolkTrader.Description"]
raw = "Our cousins the Folktails like a simple life, mostly filled with agriculture, dancing, and tasty food. They can give us seeds for some interesting new plant species. But If you bring them something amazing enough, they might introduce you to their weird secret hobby."
status = "normal"
enUS = "Our cousins the Folktails enjoy a simple life, primarily centered around agriculture, dancing, and delicious food. They can provide us with seeds for some intriguing new plant species. However, if you bring them something extraordinary, they may share their peculiar secret hobby with you."
zhCN = "“我们的表亲福克泰尔喜欢简单的生活，主要充满农业、舞蹈和美味的食物。他们可以给我们一些有趣的新植物种子的种子。但是，如果你带给他们足够惊人的东西，他们可能会向你介绍他们奇怪的秘密爱好。”"
zhTW = "我們的表親福爾克泰爾喜歡簡單的生活，主要圍繞著農業、舞蹈和美味的食物。他們可以給我們一些有趣的新植物種子的種子。但是如果你帶給他們一些足夠驚人的東西，他們可能會介紹你認識他們奇怪的秘密愛好。"
ruRU = "Наши кузены Фолктейлы любят простую жизнь, в основном посвященную сельскому хозяйству, танцам и вкусной еде. Они могут дать нам семена для некоторых интересных новых видов растений. Но если вы принесете им что-то настолько удивительное, они могут познакомить вас со своим странным секретным хобби."
jaJP = "私たちのいとこであるフォークテイルは、主に農業、ダンス、そして美味しい食べ物で満たされたシンプルな生活を好みます。彼らは私たちに興味深い新しい植物種の種を提供してくれます。しかし、もしあなたが彼らに十分に素晴らしいものを持って行けば、彼らの奇妙な秘密の趣味を紹介してくれるかもしれません。"
frFR = "Nos cousins les Folktails aiment une vie simple, principalement remplie d'agriculture, de danse et de nourriture délicieuse. Ils peuvent nous donner des graines pour certaines nouvelles espèces de plantes intéressantes. Mais si vous leur apportez quelque chose d'assez incroyable, ils pourraient vous introduire à leur étrange hobby secret."
deDE = "Unsere Cousins, die Folktails, lieben ein einfaches Leben, das hauptsächlich aus Landwirtschaft, Tanz und schmackhaftem Essen besteht. Sie können uns Samen für einige interessante neue Pflanzenarten geben. Aber wenn du ihnen etwas Unglaubliches bringst, könnten sie dir ihr seltsames geheimes Hobby vorstellen."
plPL = "Nasi kuzyni z Folktails lubią proste życie, głównie wypełnione rolnictwem, tańcem i smacznym jedzeniem. Mogą dać nam nasiona kilku interesujących nowych gatunków roślin. Ale jeśli przyniesiesz im coś wystarczająco niesamowitego, mogą wprowadzić cię w swoją dziwną, sekretną pasję."
ptBR = "Nossos primos, os Folktails, gostam de uma vida simples, principalmente preenchida com agricultura, dança e comida gostosa. Eles podem nos oferecer sementes de algumas espécies de plantas interessantes. Mas se você trouxer algo impressionante o suficiente, eles podem te apresentar ao seu estranho hobby secreto."
koKR = "우리 사촌인 포크테일은 주로 농업, 춤, 그리고 맛있는 음식으로 가득한 간단한 삶을 좋아합니다. 그들은 흥미로운 새로운 식물 종을 위한 씨앗을 줄 수 있습니다. 그러나 만약 당신이 그들에게 충분히 놀라운 것을 가져간다면, 그들은 당신을 그들의 이상한 비밀 취미에 소개해 줄지도 모릅니다."
csCZ = "Naši bratranci Folktails mají rádi jednoduchý život, většinou plný zemědělství, tance a chutného jídla. Mohou nám dát semena pro některé zajímavé nové rostlinné druhy. Ale pokud jim přinesete něco dost úžasného, možná vás seznámí se svým podivným tajným koníčkem."
viVN = "Người họ hàng của chúng ta, những Folktails, thích một cuộc sống đơn giản, chủ yếu là làm nông, nhảy múa và những món ăn ngon. Họ có thể cho chúng ta hạt giống của một số loài thực vật mới thú vị. Nhưng nếu bạn mang đến cho họ điều gì đó đủ tuyệt vời, họ có thể giới thiệu cho bạn sở thích bí ẩn kỳ lạ của họ."
trTR = "Akraba olan Folktails'ler basit bir hayatı seviyorlar, genellikle tarım, dans ve lezzetli yiyeceklerle dolu. Bize bazı ilginç yeni bitki türlerinin tohumlarını verebilirler. Ama eğer onlara yeterince muhteşem bir şey getirirseniz, tuhaf gizli hobilerine sizi tanıtabilirler."

