["Lapantouflemagic.Topentrancewatertightlodge_BoxStorage.Description"]
raw = "A medium-sized lodge for one hauler, built around a ladder.\nManages a box storage space.\nCan be stacked on itself, variants, and can carry select buildings.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A medium-sized lodge for one hauler, built around a ladder. Manages a box storage space. Can be stacked on itself, variants, and can carry select buildings. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一个中型小屋，供一名搬运工使用，围绕着一把梯子建造。  \n管理一个箱子存储空间。  \n可以自我堆叠、变种，并且可以携带特定建筑。  \n<color=#00FFFF>作为堤坝使用</color>"
zhTW = "一個中型小屋，為一名搬運工建造，圍繞著一個梯子而建。\n管理一個箱子儲存空間。\n可以自我堆疊、變體，並可以攜帶特定建築。\n<color=#00FFFF>作為堤壩運作</color>"
ruRU = "Средний домик для одного грузчика, построенный вокруг лестницы. Управляет пространством для хранения ящиков. Может быть установлен на себя, варианты и может перемещать определенные здания. <color=#00FFFF>Работает как дамба</color>"
jaJP = "「一人の運搬者のために作られた中型の小屋で、はしごの周りに建てられています。ボックスストレージスペースを管理します。自己重ね積み可能で、バリエーションがあり、特定の建物を運ぶことができます。<color=#00FFFF>堤防として機能します</color>」"
frFR = "Un pavillon de taille moyenne pour un transporteur, construit autour d'une échelle.\nGère un espace de stockage de boîtes.\nPeut être empilé sur lui-même, variants, et peut transporter certains bâtiments.\n<color=#00FFFF>Fonctionne comme un levee</color>"
deDE = "Eine mittelgroße Lodge für einen Holztransporter, die um eine Leiter herum gebaut ist.\nVerwaltet einen Kistenlagerraum.\nKann auf sich selbst, Varianten und ausgewählte Gebäude gestapelt werden.\n<color=#00FFFF>Funktioniert wie ein Deich</color>"
plPL = "Średniej wielkości chata dla jednego nosiciela, zbudowana wokół drabiny.\nZarządza przestrzenią na przechowywanie skrzynek.\nMożna układać na sobie, posiada warianty i może unosić wybrane budynki.\n<color=#00FFFF>Działa jak tama</color>"
ptBR = "Uma cabana de tamanho médio para um transportador, construída em torno de uma escada.  \nAdministra um espaço de armazenamento em caixa.  \nPode ser empilhada sobre si mesma, variantes, e pode carregar edifícios selecionados.  \n<color=#00FFFF>Funciona como um Dique</color>"
koKR = "하우하우 하우스 가를 다루는 중형 로지입니다. 사다리를 중심으로 지어졌습니다. 상자 저장 공간을 관리합니다. 자신과 변형된 형태로 쌓을 수 있으며, 특정 건물을 운반할 수 있습니다. <color=#00FFFF>제방처럼 작동합니다</color>"
csCZ = "Středně velká chata pro jednoho nosiče, postavená kolem žebříku. \nSpravuje prostor pro skladování krabic. \nMůže se skládat na sebe, má varianty a může nést vybrané budovy. \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một cabin có kích thước trung bình cho một người vận chuyển, được xây dựng quanh một cái thang.\nQuản lý không gian lưu trữ hộp.\nCó thể xếp chồng lên nhau, các biến thể, và có thể mang theo các công trình chọn lọc.\n<color=#00FFFF>Hoạt động như một đê</color>"
trTR = "Bir yükleyici için inşa edilmiş merdivenin etrafında yer alan orta büyüklükte bir kulübe.\nBir kutu depolama alanını yönetir.\nKendisi, varyantları üzerinde üst üste konabilir ve seçilen binaları taşıyabilir.\n<color=#00FFFF>Bir Set olarak çalışır</color>"

["Lapantouflemagic.Topentrancewatertightlodge_BoxStorage.FlavorDescription"]
raw = "\"If you paint the whole tower green and go down the ladder from the top, you will end up in a strange world filled with walking mushrooms and flying turtles!\"\n -Mathilda the insane cook"
status = "normal"
enUS = "\"If you paint the whole tower green and go down the ladder from the top, you will end up in a strange world filled with walking mushrooms and flying turtles!\"  \n- Mathilda the insane cook"
zhCN = "“如果你把整座塔涂成绿色，然后从顶部下梯子，你就会进入一个奇怪的世界，里面满是行走的蘑菇和飞翔的乌龟！”  \n- 疯狂的厨师马蒂尔达"
zhTW = "\"如果你把整個塔塗成綠色，然後從塔頂爬下梯子，你將會進入一個奇怪的世界，裡面充滿了行走的蘑菇和飛翔的烏龜！\"  \n- 瘋狂的廚師馬蒂爾達"
ruRU = "\"Если покрасить всю башню в зеленый цвет и спуститься с лестницы с вершины, вы окажетесь в странном мире, полном ходячих грибов и летающих черепах!\" \n -Матильда, сумасшедший повар"
jaJP = "\"塔全体を緑に塗り、その上からはしごを下りると、歩くキノコや飛ぶカメで満ちた奇妙な世界にたどり着くでしょう！\" -マシルダ、この異常な料理人"
frFR = "\"Si vous peignez toute la tour en vert et descendez l'échelle depuis le haut, vous finirez dans un monde étrange rempli de champignons marchants et de tortues volantes !\"  \n -Mathilda, la cuisinière folle"
deDE = "\"Wenn du den ganzen Turm grün anmalst und die Leiter von oben heruntersteigst, wirst du in eine seltsame Welt gelangen, die voller gehender Pilze und fliegender Schildkröten ist!\"  \n -Mathilda, die verrückte Köchin"
plPL = "\"Jeśli pomalujesz całą wieżę na zielono i zejdzie z drabiny z góry, skończysz w dziwnym świecie pełnym chodzących grzybów i latających żółwi!\" -Mathilda, szalona kucharka"
ptBR = "\"Se você pintar toda a torre de verde e descer a escada do topo, você vai acabar em um mundo estranho cheio de cogumelos que andam e tartarugas que voam!\" - Mathilda, a cozinheira insana"
koKR = "\"탑 전체를 초록색으로 칠하고 맨 꼭대기에서 사다리를 내려가면, 걷는 버섯과 나는 거북이들로 가득 찬 이상한 세계에 도착하게 됩니다!\" - 미친 요리사 마틸다"
csCZ = "\"Pokud natřete celou věž na zeleno a sestoupíte po žebříku z vrchu, ocitnete se v podivném světě plném chodících hub a létajících želv!\"  \n-Mathilda, šílená kuchařka"
viVN = "\"Nếu bạn sơn toàn bộ tháp màu xanh và đi xuống thang từ trên cùng, bạn sẽ kết thúc trong một thế giới kỳ lạ đầy nấm biết đi và rùa bay!\"  \n-Mathilda, đầu bếp điên rồ"
trTR = "\"Eğer tüm kulesi yeşil renge boyarsan ve tepedeki merdivenden inersen, yürüyor olan mantarlarla ve uçan kaplumbağalarla dolu tuhaf bir dünyada bulursun kendini!\"  \n -Deli aşçı Mathilda"

