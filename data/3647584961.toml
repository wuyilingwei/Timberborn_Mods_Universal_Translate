["Lapantouflemagic.NewLido.Description"]
raw = "A place to have fun in water.\nIf the pond does not already contain water, a <color=green>fluid dump</color> can be installed"
status = "normal"
enUS = "A place to have fun in water. If the pond does not already contain water, a <color=green>fluid dump</color> can be installed."
zhCN = "“一个可以在水中玩乐的地方。 如果池塘里没有水，可以安装一个<color=green>液体倾倒装置</color>。”"
zhTW = "「一個可以在水中玩樂的地方。 如果池塘尚未滿水，可以安裝一個<color=green>液體排放口</color>。」"
ruRU = "Место для развлечений на воде. Если пруд ещё не содержит воду, можно установить <color=green>жидкий сброс</color>"
jaJP = "水の中で楽しむための場所です。  \n池にすでに水がない場合は、<color=green>流体ダンプ</color>を設置できます。"
frFR = "Un endroit pour s'amuser dans l'eau.  \nSi l'étang ne contient pas déjà d'eau, une <color=green>décharge de fluide</color> peut être installée."
deDE = "Ein Ort, um im Wasser Spaß zu haben. Wenn der Teich noch kein Wasser enthält, kann eine <color=green>Flüssigkeitsentsorgung</color> installiert werden."
plPL = "Miejsce do zabawy w wodzie. Jeśli staw nie zawiera już wody, można zainstalować <color=green>wyciek płynów</color>."
ptBR = "Um lugar para se divertir na água.\nSe o lago não contiver água, um <color=green>descarte de fluido</color> pode ser instalado."
koKR = "물속에서 재미있게 놀 수 있는 장소입니다.\n연못에 이미 물이 없다면, <color=green>액체 배수구</color>를 설치할 수 있습니다."
csCZ = "Místo pro zábavu ve vodě. Pokud nádrž již neobsahuje vodu, lze nainstalovat <color=green>kapalný odpad</color>"
viVN = "Nơi để vui chơi trong nước.  \nNếu ao không có nước, có thể lắp đặt một <color=green>điểm xả chất lỏng</color>"
trTR = "Su içinde eğlenmek için bir yer.  \nEğer gölet henüz su içermiyorsa, bir <color=green>akışkan dökümü</color> kurulabilir."

["Lapantouflemagic.WaterDump.Description"]
raw = "Dumps water.\nMust be built inside a <color=green>Lido</color>.\n<color=#FF6EC7>Can function without workers.</color>"
status = "normal"
enUS = "Dumps water. Must be built inside a <color=green>Lido</color>. <color=#FF6EC7>Can function without workers.</color>"
zhCN = "倾倒水。  \n必须建在<color=green>凉亭</color>内。  \n<color=#FF6EC7>可以在没有工人的情况下运作。</color>"
zhTW = "排水。\n必須建在<color=green>休閒中心</color>內。\n<color=#FF6EC7>無需工人也能運作。</color>"
ruRU = "Сбрасывает воду.  \nДолжен быть построен внутри <color=green>Лидо</color>.  \n<color=#FF6EC7>Может функционировать без работников.</color>"
jaJP = "水を排出します。  \n<color=green>Lido</color>の内部に建設する必要があります。  \n<color=#FF6EC7>作業者なしで機能できます。</color>"
frFR = "Déverse de l'eau. Doit être construit à l'intérieur d'un <color=green>Lido</color>. <color=#FF6EC7>Peut fonctionner sans ouvriers.</color>"
deDE = "Entleert Wasser. Muss innerhalb eines <color=green>Lidos</color> gebaut werden. <color=#FF6EC7>Kann ohne Arbeiter funktionieren.</color>"
plPL = "Zrzuca wodę.  \nMusi być zbudowany wewnątrz <color=green>Lido</color>.  \n<color=#FF6EC7>Może działać bez pracowników.</color>"
ptBR = "Derrama água.  \nDeve ser construído dentro de um <color=green>Lido</color>.  \n<color=#FF6EC7>Pode funcionar sem trabalhadores.</color>"
koKR = "물 방출합니다.\n<color=green>리도</color> 내부에 건설해야 합니다.\n<color=#FF6EC7>작업자 없이도 작동할 수 있습니다.</color>"
csCZ = "Vypouští vodu.  \nMusí být postavena uvnitř <color=green>Lido</color>.  \n<color=#FF6EC7>Může fungovat bez pracovníků.</color>"
viVN = "Xả nước.  \nCần được xây dựng bên trong một <color=green>Lido</color>.  \n<color=#FF6EC7>Có thể hoạt động mà không cần công nhân.</color>"
trTR = "Su boşaltır.  \n<color=green>Lido</color> içerisinde inşa edilmelidir.  \n<color=#FF6EC7>İşçiler olmadan da çalışabilir.</color>"

