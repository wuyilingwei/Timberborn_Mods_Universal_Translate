["Lapantouflemagic.NEWLumberjackHouse.Description"]
raw = "A half-barn, half-lodge building used as a workplace for a group of lumberjacks. Contains a few tools to help them do their job efficiently.\nHas a <color=#FF6EC7>triangle roof</color>, <color=#FF6EC7>Can support upgrades</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A half-barn, half-lodge building used as a workplace for a group of lumberjacks. Contains a few tools to help them do their job efficiently. Has a <color=#FF6EC7>triangle roof</color>, <color=#FF6EC7>Can support upgrades</color> <color=#00FFFF>Works as a Levee</color>"
zhCN = "“一座半农场、半小屋的建筑，作为一群伐木工的工作场所。内含一些工具，以帮助他们高效地完成工作。\n有一个<color=#FF6EC7>三角屋顶</color>，<color=#FF6EC7>可以支持升级</color>\n<color=#00FFFF>作为堤坝工作</color>”"
zhTW = "一座半穀倉、半小屋的建築，作為一群伐木工的工作場所。包含幾個工具，幫助他們高效地完成工作。\n擁有一個<color=#FF6EC7>三角屋頂</color>，<color=#FF6EC7>可以支持升級</color>\n<color=#00FFFF>可作為堤防使用</color>"
ruRU = "Полу-сарай, полу-отель, используемый как рабочее место для группы лесорубов. Содержит несколько инструментов, которые помогают им эффективно выполнять свою работу.\nИмеет <color=#FF6EC7>треугольную крышу</color>, <color=#FF6EC7>может поддерживать улучшения</color>\n<color=#00FFFF>Работает как дамба</color>"
jaJP = "「半分納屋、半分ロッジの建物で、一群の林業者の作業場として使用されます。彼らが効率的に仕事をするためのいくつかの道具が含まれています。\n<color=#FF6EC7>三角屋根</color>を持ち、<color=#FF6EC7>アップグレードをサポート</color>します。\n<color=#00FFFF>堤防として機能します</color>。」"
frFR = "Un bâtiment à moitié grange, à moitié pavillon utilisé comme lieu de travail pour un groupe de bûcherons. Contient quelques outils pour les aider à faire leur travail efficacement.\nA un <color=#FF6EC7>toit triangulaire</color>, <color=#FF6EC7>peut supporter des améliorations</color>\n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Ein halb Scheune, halb Lodge Gebäude, das als Arbeitsplatz für eine Gruppe von Holzfällern genutzt wird. Enthält einige Werkzeuge, die ihnen helfen, ihre Arbeit effizient zu erledigen. \nHat ein <color=#FF6EC7>Dach in Form eines Dreiecks</color>, <color=#FF6EC7>Kann Upgrades unterstützen</color> \n<color=#00FFFF>Funktioniert als Damm</color>"
plPL = "Pół-stodoła, pół-chatka wykorzystywana jako miejsce pracy dla grupy drwali. Zawiera kilka narzędzi, które pomagają im efektywnie wykonywać swoją pracę.\nMa <color=#FF6EC7>trójkątny dach</color>, <color=#FF6EC7>może wspierać ulepszenia</color>\n<color=#00FFFF> działa jako tama</color>"
ptBR = "Um edifício que é metade celeiro, metade pousada, usado como local de trabalho para um grupo de madeireiros. Contém algumas ferramentas para ajudá-los a realizar seu trabalho de forma eficiente.  \nPossui um <color=#FF6EC7>telhado triangular</color>, <color=#FF6EC7>pode suportar melhorias</color>  \n<color=#00FFFF>Funciona como uma Barra</color>"
koKR = "목재 작업자로서의 직장으로 사용되는 반 마굿간, 반 로지 건물입니다. 그들의 작업을 효율적으로 수행하는 데 도움이 되는 몇 가지 도구가 포함되어 있습니다.\n<color=#FF6EC7>삼각형 지붕</color>을 가지고 있으며, <color=#FF6EC7>업그레이드를 지원할 수 있습니다</color>.\n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Polovina stodoly, polovina chaty, budova používaná jako pracovní místo pro skupinu dřevařů. Obsahuje několik nástrojů, které jim pomáhají efektivně vykonávat jejich práci.\nMá <color=#FF6EC7>trojúhelníkovou střechu</color>, <color=#FF6EC7>Může podporovat vylepšení</color>\n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một tòa nhà nửa chuồng, nửa nhà nghỉ được sử dụng làm nơi làm việc cho một nhóm thợ mộc. Bao gồm một vài công cụ giúp họ thực hiện công việc một cách hiệu quả.\nCó một <color=#FF6EC7>mái hình tam giác</color>, <color=#FF6EC7>Có thể hỗ trợ nâng cấp</color>\n<color=#00FFFF>Hoạt động như một Đê</color>"
trTR = "Yarım ahır, yarım konak şeklinde, bir grup oduncu için çalışma yeri olarak kullanılan bir bina. İşlerini verimli bir şekilde yapmalarına yardımcı olacak birkaç alet içerir. \n<color=#FF6EC7>üçgen çatı</color> vardır, <color=#FF6EC7>geliştirmeleri destekleyebilir</color> \n<color=#00FFFF>Baraj gibi çalışır</color>"

["Lapantouflemagic.NEWLumberjackHouse.FlavorDescription"]
raw = "\"My daddy's the best! He built our entire house!\"\n -Typical kit boasting"
status = "normal"
enUS = "\"My daddy's the best! He built our entire house!\" - Typical kit boasting"
zhCN = "“我爸爸是最棒的！他建造了我们整个家！”  \n- 典型的小孩吹牛"
zhTW = "「我爸爸最厲害！他建造了我們整個家！」  \n-典型的炫耀小孩"
ruRU = "Мой папа самый лучший! Он построил наш целый дом!"
jaJP = "「パパが一番だ！彼は私たちの家を全部作った！」  \n-典型的な自慢"
frFR = "\"Mon papa est le meilleur ! Il a construit toute notre maison !\" - Fierté typique."
deDE = "\"Mein Papa ist der Beste! Er hat unser ganzes Haus gebaut!\" -Typisches Prahlen des Kits"
plPL = "\"Możesz na mnie liczyć! Mój tata jest najlepszy! Zbudował nasz cały dom!\"  \n- Typowe przechwałki"
ptBR = "\"Meu papai é o melhor! Ele construiu a casa inteira!\" - Gabarito típico de ostentação"
koKR = "\"우리 아빠가 최고야! 그는 우리 집을 다 지었어!\"  \n- 전형적인 자랑"
csCZ = "\"Táta je nejlepší! Postavil celý náš dům!\" - Typické chlubení."
viVN = "Bố tôi là nhất! Ông ấy đã xây dựng toàn bộ ngôi nhà của chúng tôi!\"  \n- \"Nhà rìu tự hào điển hình"
trTR = "Babam en iyisi! Bütün evimizi o yaptı!\"  \n- \"Tipik bir çocuk övünmesi"

["Lapantouflemagic.TappersShack.Description"]
raw = "Employs a whole team of tappers to harvest resin from pine trees.\nHas a <color=#FF6EC7>triangle roof</color>, <color=#FF6EC7>Can support upgrades</color>\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "Employs a whole team of tappers to harvest resin from pine trees. Has a <color=#FF6EC7>triangle roof</color>, <color=#FF6EC7>can support upgrades</color> <color=#00FFFF>works as a levee</color>"
zhCN = "“雇佣整支采集队从松树中收集树脂。\n拥有一个<color=#FF6EC7>三角屋顶</color>，<color=#FF6EC7>可以支持升级</color>\n<color=#00FFFF>作为堤坝使用</color>”"
zhTW = "雇用整個樹液采集團隊從松樹中收集樹脂。\n擁有一個<color=#FF6EC7>三角屋頂</color>，<color=#FF6EC7>可以支持升級</color>\n<color=#00FFFF>作為一個堤壩運作</color>"
ruRU = "«Нанимает целую команду сборщиков для сбора смолы с сосен. Имеет <color=#FF6EC7>треугольную крышу</color>, <color=#FF6EC7>может поддерживать улучшения</color> <color=#00FFFF>Работает как насыпь</color>»"
jaJP = "松の木から樹脂を収穫するために一整備チームのタッパーを雇用します。  \n<color=#FF6EC7>三角屋根</color>を持っており、<color=#FF6EC7>アップグレードをサポートできます</color>  \n<color=#00FFFF>堤防として機能します</color>"
frFR = "Emploie toute une équipe de cueilleurs pour récolter de la résine des pins.\nA un <color=#FF6EC7>toit en triangle</color>, <color=#FF6EC7>peut supporter des améliorations</color>\n<color=#00FFFF>fonctionne comme une digue</color>"
deDE = "Stellt ein ganzes Team von Zapfern ein, um Harz von Kiefern zu ernten. Hat ein <color=#FF6EC7>Dach in Form eines Dreiecks</color>, <color=#FF6EC7>kann Upgrades unterstützen</color> <color=#00FFFF>Funktioniert als Damm</color>"
plPL = "Zatrudnia całą drużynę zbieraczy do pozyskiwania żywicy z drzew sosnowych. Posiada <color=#FF6EC7>trójkątny dach</color>, <color=#FF6EC7>może obsługiwać ulepszenia</color> <color=#00FFFF>działa jak wał</color>"
ptBR = "Emprega uma equipe inteira de coletores para colher resina de pinheiros. Possui um <color=#FF6EC7>telhado triangular</color>, <color=#FF6EC7>Pode suportar melhorias</color> <color=#00FFFF>Funciona como uma Barragem</color>"
koKR = "소나무에서 수지를 수확하기 위해 통나무탭퍼 팀을 고용합니다.\n<color=#FF6EC7>삼각형 지붕</color>, <color=#FF6EC7>업그레이드를 지원할 수 있습니다</color>\n<color=#00FFFF>둑으로 작동합니다</color>"
csCZ = "Zaměstnává celý tým sběračů, aby sklidili pryskyřici z borovic.\nMá <color=#FF6EC7>trojúhelníkovou střechu</color>, <color=#FF6EC7>může podporovat vylepšení</color>\n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Thuê một đội ngũ thu hoạch để khai thác nhựa thông từ cây thông.  \nCó một <color=#FF6EC7>mái nhà hình tam giác</color>, <color=#FF6EC7>Có thể hỗ trợ nâng cấp</color>  \n<color=#00FFFF>Hoạt động như một Đê</color>"
trTR = "Çam ağaçlarından reçine toplamak için tam bir tapıcı ekibi istihdam eder.\n<color=#FF6EC7>Üçgen çatı</color>, <color=#FF6EC7>Yükseltmeleri destekleyebilir</color>\n<color=#00FFFF>Set olarak çalışır</color>"

