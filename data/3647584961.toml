["Lapantouflemagic.PetanqueCourt.FlavorDescription"]
raw = "\"If you're going to play this on the 22nd floor, please don't overshoot too much.\""
status = "normal"
enUS = "\"If you're going to play this on the 22nd floor, please don't overshoot too much.\""
zhCN = "“如果你打算在22层玩这个，请不要打得太远。”"
zhTW = "「如果你要在22樓進行這項活動，請不要投得太遠。」"
ruRU = "\"Если вы собираетесь играть на 22 этаже, пожалуйста, не переусердствуйте.\""
jaJP = "「22階でこれをプレイするなら、あまりオーバーショットしないでください。」"
frFR = "\"Si vous allez jouer au 22e étage, veuillez ne pas trop dépasser.\""
deDE = "\"Sofern Sie das im 22. Stock spielen, überschießen Sie bitte nicht zu viel.\""
plPL = "„Jeśli zamierzasz grać na 22. piętrze, proszę, nie przekraczaj za bardzo.”"
ptBR = "\"Se você vai jogar isso no 22º andar, por favor, não exagere na força.\""
koKR = "\"22층에서 이걸 할 거라면, 너무 지나치게 던지지 마세요.\""
csCZ = "\"Pokud budete hrát na 22. patře, prosím, nepřehánějte to s hodem.\""
viVN = "\"Nếu bạn định chơi điều này ở tầng 22, xin đừng đánh quá mạnh.\""
trTR = "\"Eğer bunu 22. katta oynayacaksan, lütfen çok fazla aşırıya kaçma.\""

["Lapantouflemagic.Winery.Description"]
raw = "A big house from which beavers specialized in all sorts of fermentation can process ingredients with unmatched speed and efficacy.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A big house from which beavers specialized in all sorts of fermentation can process ingredients with unmatched speed and efficacy. <color=#00FFFF>Works as a Levee</color>"
zhCN = "“一座大型房屋，专门用于各种发酵的海狸可以以无与伦比的速度和效率处理原料。\n<color=#00FFFF>作为堤坝使用</color>”"
zhTW = "一座大型房屋，專門用於各種發酵的海狸們可以以無與倫比的速度和效率處理原料。  \n<color=#00FFFF>作為壩堤</color>"
ruRU = "Большой дом, из которого бобры, специализирующиеся на различных видах ферментации, могут обрабатывать ингредиенты с неповторимой скоростью и эффективностью. <color=#00FFFF>Работает как дамба</color>"
jaJP = "ビーグルの特殊な発酵のための大きな家で、ビーバーたちが比類なきスピードと効率で材料を処理できます。  \n<color=#00FFFF>堤防として機能します</color>"
frFR = "Une grande maison à partir de laquelle des castors spécialisés dans toutes sortes de fermentation peuvent traiter des ingrédients avec une rapidité et une efficacité inégalées.  \n<color=#00FFFF>Fonctionne comme un remblai</color>"
deDE = "Ein großes Haus, aus dem Biber, die auf alle Arten von Fermentation spezialisiert sind, Zutaten mit unvergleichlicher Geschwindigkeit und Effizienz verarbeiten können.  \n<color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Duży dom, z którego bobry specjalizujące się w różnych rodzajach fermentacji mogą przetwarzać składniki z niezrównaną prędkością i skutecznością.\n<color=#00FFFF>Funkcjonuje jako Tama</color>"
ptBR = "Uma grande casa de onde castores especializados em todos os tipos de fermentação podem processar ingredientes com velocidade e eficácia incomparáveis.  \n<color=#00FFFF>Funciona como uma Barragem</color>"
koKR = "모든 종류의 발효를 전문으로 하는 비버들이 비할 데 없는 속도와 효율로 재료를 가공할 수 있는 큰 집입니다.  \n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Velký dům, ze kterého bobři specializující se na různé druhy fermentace mohou zpracovávat suroviny bezkonkurenční rychlostí a účinností.  \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một ngôi nhà lớn nơi những con rái cá chuyên về tất cả các loại lên men có thể xử lý nguyên liệu với tốc độ và hiệu quả không ai sánh kịp.  \n<color=#00FFFF>Hoạt động như một đê chắn</color>"
trTR = "Farklı fermente işlemleri için uzmanlaşmış kunduzların malzemeleri benzersiz hız ve etkinlikle işleyebildiği büyük bir bina.  \n<color=#00FFFF>Bir Baraj gibi çalışır</color>"

