["Lapantouflemagic.Aqueduct.FlavorDescription"]
raw = "\"Give it an incline and you get one of the most fun things in the world!\""
status = "normal"
enUS = "\"Give it an incline and you get one of the most fun things in the world!\""
zhCN = "\"给它一个倾斜，你就能得到世界上最有趣的东西之一！\""
zhTW = "「給它一個斜度，你就會得到世界上最有趣的東西之一！」"
ruRU = "\"Дайте ему наклон, и вы получите одну из самых увлекательных вещей в мире!\""
jaJP = "傾斜をつければ、世界で最も楽しいものの一つが手に入ります！"
frFR = "\"Donnez-lui une inclinaison et vous obtenez l'une des choses les plus amusantes au monde !\""
deDE = "\"Gib ihm eine Neigung und du erhältst eines der lustigsten Dinge der Welt!\""
plPL = "\"Podnieś go i zyskasz jedną z najfajniejszych rzeczy na świecie!\""
ptBR = "\"Dê-lhe uma inclinação e você terá uma das coisas mais divertidas do mundo!\""
koKR = "\"경사를 주면 세상에서 가장 재미있는 것 중 하나가 생깁니다!\""
csCZ = "\"Dejte mu sklon a dostanete jednu z nejzábavnějších věcí na světě!\""
viVN = "\"Cho nó một độ dốc và bạn sẽ có một trong những điều thú vị nhất trên thế giới!\""
trTR = "\"Bir eğim verin ve dünyanın en eğlenceli şeylerinden birini elde edin!\""

["Lapantouflemagic.Megaplatform.Description"]
raw = "A gigantic platform capable of supporting enormous loads, comes with near everlasting artificial light thanks to the power of unethical animal experimentation.\nThe metal rings need to snap on <color=green>Giant Pillars</color>."
status = "normal"
enUS = "A gigantic platform capable of supporting enormous loads, comes with near everlasting artificial light thanks to the power of unethical animal experimentation. The metal rings need to snap on <color=green>Giant Pillars</color>."
zhCN = "一个巨大的平台，可以承载巨大的重量，得益于不道德的动物实验，几乎拥有永恒的人造光。\n金属环需要与<color=green>巨型柱子</color>连接。"
zhTW = "一個能夠支撐巨大負荷的龐大平台，因不道德的動物實驗而擁有近乎永恆的人造光源。 金屬環需要在 <color=green>巨型柱子</color> 上扣緊。"
ruRU = "Гигантская платформа, способная выдерживать огромные нагрузки, снабжена почти вечным искусственным светом благодаря силе неэтичного эксперимента над животными. Металлические кольца должны зацепиться за <color=green>Гигантские колонны</color>."
jaJP = "巨大な荷重を支えることができるプラットフォームで、非倫理的な動物実験の力によりほぼ永遠の人工光が備わっています。金属のリングは<color=green>巨大な柱</color>に固定する必要があります。"
frFR = "Une plate-forme gigantesque capable de supporter d'énormes charges, elle est dotée d'une lumière artificielle presque éternelle grâce au pouvoir de l'expérimentation animale non éthique. Les anneaux métalliques doivent s'enclencher sur les <color=green>Piliers Géants</color>."
deDE = "Eine gigantische Plattform, die enorme Lasten tragen kann, wird mit nahezu ewigem künstlichem Licht versorgt, dank der Macht unethischer Tierversuche.  \nDie Metallringe müssen auf <color=green>Gigantische Säulen</color> einrasten."
plPL = "Ogromna platforma zdolna do podtrzymywania ogromnych ładunków, wyposażona w prawie wieczne sztuczne światło dzięki mocy nieetycznych eksperymentów na zwierzętach. Metalowe pierścienie muszą zaskoczyć na <color=green>Gigantycznych Filarach</color>."
ptBR = "Uma plataforma gigantesca capaz de suportar enormes cargas, vem com luz artificial quase eterna graças ao poder de experimentação animal antiética. Os anéis de metal precisam se encaixar em <color=green>Pilares Gigantes</color>."
koKR = "거대한 하중을 지탱할 수 있는 거대한 플랫폼으로, 비윤리적인 동물 실험의 힘 덕분에 거의 영원한 인공 조명을 제공합니다. 금속 링은 <color=green>거대한 기둥</color>에 체결되어야 합니다."
csCZ = "Gigantická platforma schopná nést obrovské náklady, přichází s téměř věčným umělým světlem díky moci neetického pokusnictví na zvířatech. \nKovové prstence se musí zachytit na <color=green>Obřích pilířích</color>."
viVN = "Một nền tảng khổng lồ có khả năng chịu tải lớn, đi kèm với ánh sáng nhân tạo gần như vĩnh cửu nhờ vào sức mạnh của thí nghiệm động vật phi đạo đức.  \nCác vòng kim loại cần phải gắn vào <color=green>Cột Khổng Lồ</color>."
trTR = "Devasa yükleri taşıyabilen, etik dışı hayvan deneylerinin güçleri sayesinde neredeyse sonsuz yapay ışık ile gelen devasa bir platform. Metal halkaların <color=green>Dev Pillalar</color> üzerine oturması gerekiyor."

