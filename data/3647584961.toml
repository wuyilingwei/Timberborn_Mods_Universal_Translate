["Lapantouflemagic.MajorBurns.DeathMessage"]
raw = "<color=green>fell into a pool of molten material shouting \"My prreeeciouuuus\". It was acting really strange lately.</color>"
status = "normal"
enUS = "<color=green>fell into a pool of molten material shouting \"My prreeeciouuuus\". It was acting really strange lately.</color>"
zhCN = "<color=green>掉进了熔融物质的池塘，喊着“我的宝贝”。最近它的表现真的很奇怪。</color>"
zhTW = "<color=green>掉進一池熔化的材料裡，喊著「我的寶貝」。最近牠的行為真的很奇怪。</color>"
ruRU = "<color=green>упал в лавовое озеро, крича \"Моя прreeeciouuuus\". В последнее время он вёл себя очень странно.</color>"
jaJP = "<color=green>溶岩のプールに落ちて「私の大切なもの」と叫びました。最近、彼はとても変な行動をしていました。</color>"
frFR = "<color=green>est tombé dans une mare de matériau en fusion en criant \"Mon prreeeciouuuus\". Il agissait vraiment bizarrement ces derniers temps.</color>"
deDE = "<color=green>fiel in einen Pool aus geschmolzenem Material und rief \"Mein schätzliiiing\". Es verhielt sich in letzter Zeit wirklich seltsam.</color>"
plPL = "<color=green>zszedł do basenu z płynnego materiału krzycząc \"Mój skarbczykuuu\". Ostatnio zachowywał się naprawdę dziwnie.</color>"
ptBR = "<color=green>caiu em uma piscina de material derretido gritando \"Meu preciiiooooso\". Estava agindo de maneira realmente estranha ultimamente.</color>"
koKR = "<color=green>녹은 물질의 웅덩이에 빠지며 \"내 소중한 것\"이라고 외쳤습니다. 최근에 정말 이상한 행동을 하고 있었어요.</color>"
csCZ = "<color=green>spadl do bazénu roztaveného materiálu a křičel \"Moje pppreeeciouuuus\". V poslední době se choval opravdu podivně.</color>"
viVN = "<color=green>ngã vào một hồ vật liệu nóng chảy và hét lên \"Châu báu của tôi\". Nó đã hành xử rất kỳ lạ gần đây.</color>"
trTR = "<color=green>erimiş malzeme havuzuna düştü ve \"Benim prreeciiiooouuuus'um\" diye bağırdı. Son zamanlarda gerçekten garip davranıyordu.</color>"

