["Lapantouflemagic.MedicalBed_Burns.Description"]
raw = "Gives beavers suffering from burns a place to rest while someone adjust the <color=green>basic balm</color> into an oily <color=green>sunflower seed</color>-based ointment."
status = "normal"
enUS = "Gives beavers suffering from burns a place to rest while someone adjusts the <color=green>basic balm</color> into an oily <color=green>sunflower seed</color>-based ointment."
zhCN = "为遭受烧伤的海狸提供一个休息的地方，同时有人将<color=green>基础药膏</color>调整为基于<color=green>葵花籽</color>的油状药膏。"
zhTW = "“為遭受燒傷的海狸提供一個休息的地方，而其他人則將<color=green>基本的膏藥</color>調整成油性<color=green>向日葵籽</color>基底的軟膏。”"
ruRU = "Предоставляет бобрам, страдающим от ожогов, место для отдыха, пока кто-то готовит <color=green>основной бальзам</color> в масляную <color=green>солнечную семечку</color>-на основе мазь."
jaJP = "火傷に苦しむビーバーが休むための場所を提供し、誰かが<color=green>基本のバーム</color>をオイリーな<color=green>ひまわりの種</color>ベースの軟膏に調整します。"
frFR = "Offre aux castors souffrant de brûlures un endroit pour se reposer pendant que quelqu'un adapte le <color=green>baume de base</color> en une pommade huileuse à base de <color=green>graines de tournesol</color>."
deDE = "Bietet Bibern, die unter Verbrennungen leiden, einen Platz zum Ausruhen, während jemand die <color=green>Basisbalsam</color> in eine ölige <color=green>sonnenblumenkerne</color>-basierte Salbe anpasst."
plPL = "Daje bobrom cierpiącym na oparzenia miejsce do odpoczynku, podczas gdy ktoś przygotowuje <color=green>podstawową maść</color> w oleistej maści na bazie <color=green>nasion słonecznika</color>."
ptBR = "Proporciona aos castores com queimaduras um lugar para descansar enquanto alguém ajusta o <color=green>bálsamo básico</color> em uma pomada oleosa à base de <color=green>sementes de girassol</color>."
koKR = "화상을 입은 비버들이 휴식을 취할 수 있도록 공간을 제공하며, 누군가가 <color=green>기본 연고</color>를 기름기가 있는 <color=green>해바라기씨</color> 기반의 연고로 조정하는 동안 사용됩니다."
csCZ = "Poskytuje bobrům trpícím popáleninami místo k odpočinku, zatímco někdo upravuje <color=green>základní balzám</color> na olejovou <color=green>mast</color> na bázi slunečnicových semínek."
viVN = "Cung cấp cho những con rái cá bị bỏng một nơi để nghỉ ngơi trong khi ai đó điều chỉnh <color=green>thuốc mỡ cơ bản</color> thành một loại thuốc mỡ dựa trên <color=green>hạt hướng dương</color>."
trTR = "Yanık çeken kunduzlara, birinin <color=green>temel merhem</color>i yağlı <color=green>ayçiçeği tohumu</color> bazlı pomada dönüştürürken dinlenebilecekleri bir yer sağlar."

