["Lapantouflemagic.GasExctractor.Description"]
raw = "A mechanized pump that can exploit pockets of various gases identified by the exploration teams."
status = "normal"
enUS = "A mechanized pump that can exploit pockets of various gases identified by the exploration teams."
zhCN = "“一个机械泵，可以利用探险团队发现的各种气体的气囊。”"
zhTW = "一個機械化的抽水機，可以利用探索隊識別出的各種氣體口袋。"
ruRU = "Механизированный насос, который может использовать карманы различных газов, обнаруженных исследовательскими командами."
jaJP = "「探索チームによって特定されたさまざまなガスのポケットを利用できる機械式ポンプ。」"
frFR = "Une pompe mécanisée qui peut exploiter des poches de divers gaz identifiés par les équipes d'exploration."
deDE = "Eine mechanisierte Pumpe, die Taschen verschiedener Gase nutzen kann, die von den Erkundungsteams identifiziert wurden."
plPL = "Zmechanizowana pompa, która może wykorzystywać złoża różnych gazów zidentyfikowanych przez zespoły eksploracyjne."
ptBR = "Uma bomba mecanizada que pode explorar bolsões de vários gases identificados pelas equipes de exploração."
koKR = "탐사팀이 발견한 다양한 가스의 주머니를 활용할 수 있는 기계식 펌프입니다."
csCZ = "„Mechanizované čerpadlo, které může využívat kapsy různých plynů, které identifikovaly průzkumné týmy.“"
viVN = "Một máy bơm cơ giới có thể khai thác các túi khí khác nhau được xác định bởi các đội thăm dò."
trTR = "Keşif ekipleri tarafından belirlenen çeşitli gaz ceplerini kullanabilen mekanize bir pompa."

["Lapantouflemagic.GasExctractor.FlavorDescription"]
raw = "\"You wouldn't imagine how many different smells there is down there...\""
status = "normal"
enUS = "\"You wouldn't imagine how many different smells there are down there...\""
zhCN = "“你根本想不到下面有多少种不同的气味……”"
zhTW = "「你無法想像那裡有多少種不同的氣味…」"
ruRU = "\"Вы бы не поверили, сколько разных запахов там внизу...\""
jaJP = "「下にはどれだけ多くの異なる匂いがあるかわからないでしょう…」"
frFR = "\"Vous ne pouvez pas imaginer combien d'odeurs différentes il y a là-dessous...\""
deDE = "„Du würdest dir nicht vorstellen können, wie viele verschiedene Gerüche dort unten sind...“"
plPL = "Nie wyobrażasz sobie, ile różnych zapachów jest tam na dole..."
ptBR = "\"Você não faria ideia de quantos cheiros diferentes existem lá embaixo...\""
koKR = "\"저 아래에는 얼마나 다양한 냄새가 있는지 상상도 못할 거예요...\""
csCZ = "\"Nepředstavovali byste si, kolik různých vůní se tam dole nachází...\""
viVN = "\"Bạn sẽ không thể tưởng tượng được có bao nhiêu mùi khác nhau ở dưới đó...\""
trTR = "\"Orada ne kadar farklı koku olduğunu hayal edemezsiniz...\""

