["Lapantouflemagic.MECHwaterpump.Description"]
raw = "An oversized pump equipped with several filters that can function autonomously.\nIs equivalent to <color=red>five</color> basic water pumps.\nRequires Planks to occasionally replace propeller blades."
status = "normal"
enUS = "An oversized pump equipped with several filters that can function autonomously. Is equivalent to <color=red>five</color> basic water pumps. Requires Planks to occasionally replace propeller blades."
zhCN = "一台配备多重过滤器的超大水泵，可以自主管理。相当于<color=red>五个</color>基本水泵。偶尔需要木板来更换螺旋桨叶片。"
zhTW = "一個配備多個過濾器的超大水泵，可以自主運行。 相當於 <color=red>五</color> 個基本水泵。 偶爾需要木板來更換螺旋槳葉片。"
ruRU = "« oversized насос, оснащенный несколькими фильтрами, который может функционировать автономно. Эквивалентен <color=red>пяти</color> основным водяным насосам. Требует доски для периодической замены лопастей пропеллера.»"
jaJP = "「いくつかのフィルターを備えた大型ポンプで、自律的に機能します。基本の水ポンプ<color=red>5つ</color>に相当します。プロペラブレードを時々交換するために板材が必要です。」"
frFR = "Une pompe surdimensionnée équipée de plusieurs filtres qui peut fonctionner de manière autonome. Équivalente à <color=red>cinq</color> pompes à eau de base. Nécessite des Planches pour remplacer occasionnellement les pales de l'hélice."
deDE = "Eine übergroße Pumpe, ausgestattet mit mehreren Filtern, die autonom funktionieren kann. Entspricht <color=red>fünf</color> grundlegenden Wasserpumpen. Benötigt Bretter, um gelegentlich die Propellerblätter auszutauschen."
plPL = "Przesadna pompa wyposażona w kilka filtrów, która może działać autonomicznie.\nW równej mierze zastępuje <color=red>pięć</color> podstawowych pomp wodnych.\nWymaga desek do okazjonalnej wymiany ostrzy śmigła."
ptBR = "Uma bomba oversized equipada com vários filtros que pode funcionar de forma autônoma. É equivalente a <color=red>cinco</color> bombas de água básicas. Requer tábuas para ocasionalmente substituir as lâminas do propulsor."
koKR = "여러 개의 필터가 장착된 대형 펌프로 자율적으로 작동할 수 있습니다. \n<color=red>다섯</color> 개의 기본 물 펌프와 동등합니다. \n프로펠러 블레이드를 가끔 교체하는 데 나무판이 필요합니다."
csCZ = "Přehnaně velká pumpa vybavená několika filtry, která může fungovat autonomně. Je ekvivalentní <color=red> pěti </color> základním vodním pumpám. Vyžaduje prkna pro občasnou výměnu vrtulových listů."
viVN = "Một chiếc máy bơm cỡ lớn được trang bị nhiều bộ lọc có thể hoạt động tự động. Tương đương với <color=red>năm</color> máy bơm nước cơ bản. Yêu cầu ván gỗ để thay thế định kỳ cánh quạt."
trTR = "Birçok filtre ile donatılmış, otonom çalışabilen büyük bir pompa. \n<color=red>Beş</color> temel su pompasına eşdeğerdir. \nPervane kanatlarını ara sıra değiştirmek için Tahta gerektirir."

["Lapantouflemagic.MECHwaterpump.FlavorDescription"]
raw = "\"Actually, we don't need to filtrate clear water that much, the first three filters are to remove all that mysterious meat and guts that shows up from the pointer knows where. By the way, have you seen Timmy?\"\n-A maintenance beaver"
status = "normal"
enUS = "\"Actually, we don't need to filter clear water that much; the first three filters are to remove all that mysterious meat and guts that shows up from who knows where. By the way, have you seen Timmy?\"  \n-A maintenance beaver"
zhCN = "“实际上，我们并不需要如此仔细地过滤清水，前三个过滤器是为了去除那些从指针不知道哪里冒出来的神秘肉和内脏。顺便问一下，你见过蒂米吗？”  \n- 一只维护河狸"
zhTW = "「其實，我們不需要如此過度過濾清水，前面三個過濾器是用來去除那些從不知道哪裡冒出來的神秘肉和內臟。對了，你有看到提米嗎？」  \n- 一隻維修海狸"
ruRU = "\"На самом деле, нам не нужно так сильно фильтровать чистую воду, первые три фильтра предназначены для удаления всей этой загадочной плоти и кишок, которые появляются откуда-то. Кстати, вы видели Тимми?\"  \n- Бобер-ремонтник"
jaJP = "\"実際、私たちはあまりクリアウォーターをろ過する必要はありません。最初の三つのフィルターは、どこからともなく現れる謎の肉や内臓を取り除くためのものです。ところで、ティミーを見かけましたか？\"\n-メンテナンスビーバー"
frFR = "\"En fait, nous n'avons pas besoin de filtrer l'eau claire autant, les trois premiers filtres servent à éliminer toute cette viande mystérieuse et ces entrailles qui apparaissent de je-ne-sais-où. Au fait, as-tu vu Timmy ?\"\n-Un castor de maintenance"
deDE = "Tatsächlich müssen wir klares Wasser nicht so stark filtern, die ersten drei Filter dienen dazu, all das mysteriöse Fleisch und die Innereien zu entfernen, die von der Zeige weiß woher kommen. Übrigens, hast du Timmy gesehen?\"\n-Ein Wartungs-Biber"
plPL = "\"Właściwie, nie musimy tak bardzo filtrować czystej wody, pierwsze trzy filtry służą do usunięcia całego tego tajemniczego mięsa i wnętrzności, które pojawia się z nie wiadomo skąd. A tak przy okazji, widziałeś Timmy'ego?\"  \n- bobr konserwacyjny"
ptBR = "\"Na verdade, não precisamos filtrar água limpa assim tanto, os primeiros três filtros servem para remover toda aquela carne e entranhas misteriosas que aparecem de sabe-se lá onde. A propósito, você viu o Timmy?\"\n- Um castor de manutenção"
koKR = "\"사실 우리는 맑은 물을 그렇게 많이 여과할 필요가 없어요. 첫 세 개의 필터는 어디서 나타나는지 모르는 그 신비한 고기와 내장을 제거하기 위한 거죠. 그건 그렇고, 팀미를 본 적이 있나요?\"  \n- 유지보수 비버"
csCZ = "\"Ve skutečnosti nemusíme filtrvat čistou vodu tolik, první tři filtry slouží k odstranění veškerého toho tajemného masa a vnitřností, které se objevují odkudsi. Mimochodem, neviděli jste Timmyho?\"  \n-údržbový bobr"
viVN = "Thực ra, chúng ta không cần phải lọc nước sạch đến mức như vậy, ba bộ lọc đầu tiên là để loại bỏ tất cả những miếng thịt và nội tạng bí ẩn xuất hiện từ cái chỉ báo biết ở đâu đó. Nhân tiện, bạn đã thấy Timmy chưa?\"\n-Một con hải ly bảo trì"
trTR = "Aslında, bu kadar temiz suyu filtrelemeye ihtiyacımız yok, ilk üç filtre o gizemli et ve iç organları ortadan kaldırmak için. Bu arada, Timmy'yi gördün mü?\"\n-Bir bakım kunduzu"

