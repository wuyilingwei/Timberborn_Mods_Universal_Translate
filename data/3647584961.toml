["Lapantouflemagic.AdvancedSawmill.Description"]
raw = "An enormous building that could dam a whole river by itself.\nCuts giant logs into different products.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "An enormous building that could dam a whole river by itself. Cuts giant logs into different products. <color=#00FFFF>Works as a Levee</color>"
zhCN = "一个巨大的建筑，能够单靠自己拦住整条河流。将巨大的原木切割成不同的产品。<color=#00FFFF>作为堤坝使用</color>"
zhTW = "一座能夠獨自堵住整條河的新型巨大建築。  \n將巨大木材切割成不同的產品。  \n<color=#00FFFF>作為堤壩運作</color>"
ruRU = "Огромное здание, которое может перекрыть целую реку само по себе. \nПилит гигантские бревна на разные продукты. \n<color=#00FFFF>Работает как плотина</color>"
jaJP = "「自ら全ての川をせき止めることができる巨大な建物です。 巨大な材木をさまざまな製品に切り刻みます。 <color=#00FFFF>堤防として機能します</color>」"
frFR = "Un immense bâtiment qui pourrait à lui seul barrer une rivière entière. \nCoupe d'énormes troncs en différents produits. \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Ein enormes Gebäude, das einen ganzen Fluss allein aufstauen könnte. Schneidet riesige Stämme in verschiedene Produkte. <color=#00FFFF>Funktioniert als Deich</color>"
plPL = "Ogromny budynek, który sam może zablokować całą rzekę. Tnie olbrzymie kłody na różne produkty. <color=#00FFFF>Działa jak wał</color>"
ptBR = "Um edifício enorme que poderia represar um rio inteiro por conta própria.  \nCorta toras gigantes em diferentes produtos.  \n<color=#00FFFF>Funciona como uma Barreiras</color>"
koKR = "거대한 건물로, 혼자서 전체 강을 막을 수 있습니다.  \n거대한 통나무를 여러 가지 제품으로 자릅니다.  \n<color=#00FFFF>제방으로 작동합니다</color>"
csCZ = "Obrovská budova, která by mohla sama o sobě zadržet celý řeku. \nKrájí obrovské klády na různé výrobky. \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một tòa nhà khổng lồ có thể chắn một con sông chỉ bằng chính nó.  \nCắt những khúc gỗ khổng lồ thành các sản phẩm khác nhau.  \n<color=#00FFFF>Hoạt động như một Đê</color>"
trTR = "Kendisi bir nehri baraj gibi tutabilecek devasa bir yapı.\nDev ağaçları farklı ürünlere keser.\n<color=#00FFFF>Bir Set gibi çalışır</color>"

