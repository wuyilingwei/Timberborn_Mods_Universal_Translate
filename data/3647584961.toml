["Lapantouflemagic.BotHaulingStation.Description"]
raw = "Provides a starting location for the hauling bots programmed routine.\nBots with no pending deliveries will remain in standby there."
status = "normal"
enUS = "Provides a starting location for the hauling bots' programmed routine. Bots with no pending deliveries will remain in standby there."
zhCN = "“为运输机器人编程的例行操作提供起始位置。\n没有待处理交付的机器人将在那里保持待机状态。”"
zhTW = "提供了一個機器人搬運程序的起始位置。\n沒有待處理送貨的機器人將在那裡保持待命。"
ruRU = "Предоставляет начальное место для запрограммированного маршрута грузовых роботов. Роботы без ожидающих доставок останутся в режиме ожидания там."
jaJP = "運搬ロボットのプログラムされたルーチンのための出発地点を提供します。未処理の配達がないロボットは、そこで待機します。"
frFR = "Fournit un emplacement de départ pour la routine programmée des bots de transport. Les bots sans livraisons en attente resteront en mode veille à cet endroit."
deDE = "Bietet einen Ausgangspunkt für die programmierte Routine der Transportbots. Bots ohne ausstehende Lieferungen bleiben dort im Standby."
plPL = "Zapewnia punkt startowy dla rutyny transportu botów.\nBoty bez oczekujących dostaw pozostaną tam w trybie gotowości."
ptBR = "Fornece um local de partida para a rotina programada dos bots de transporte. Bots sem entregas pendentes permanecerão em espera lá."
koKR = "봇이 프로그래밍된 루틴을 위한 시작 위치를 제공합니다. pending 배송이 없는 봇은 그곳에서 대기하게 됩니다."
csCZ = "Poskytuje výchozí místo pro naprogramovanou rutinu přepravních robotů. Roboti bez čekajících dodávek tam zůstanou v pohotovosti."
viVN = "Cung cấp một địa điểm khởi đầu cho quy trình lập trình của các robot vận chuyển. Các robot không có đơn hàng chờ sẽ ở lại trong chế độ chờ tại đó."
trTR = "Taşıma botlarının programlanmış rutini için bir başlangıç noktası sağlar. Bekleyen teslimatları olmayan botlar burada beklemede kalacaktır."

