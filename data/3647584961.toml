["Lapantouflemagic.WashingMachine.Description"]
raw = "A bizarre contraption meant to wash and decontaminate beavers using mechanical power.\nHalf of the effect is actually due to purging beaver's stomachs."
status = "normal"
enUS = "A bizarre contraption meant to wash and decontaminate beavers using mechanical power. Half of the effect is actually due to purging beaver's stomachs."
zhCN = "一种奇怪的装置，旨在利用机械动力清洗和消毒海狸。  \n其效果一半实际上是由于清除海狸的胃。"
zhTW = "一個奇怪的裝置，旨在利用機械力量清洗並去污海狸。\n實際上，效果的一半是由於清空海狸的胃所致。"
ruRU = "Странное устройство, предназначенное для стирки и дегазации бобров с использованием механической силы. Половина эффекта на самом деле связана с очищением желудков бобров."
jaJP = "ビーバーを機械の力で洗浄し、除染するための奇妙な装置。効果の半分は実際にビーバーの胃を排出することによるものです。"
frFR = "Une bizarrerie destinée à laver et décontaminer les castors en utilisant la puissance mécanique. La moitié de l'effet est en réalité due à l'évacuation des estomacs des castors."
deDE = "Eine bizarre Maschine, die dazu dient, Biber mit mechanischer Kraft zu waschen und zu dekontaminieren. Die Hälfte der Wirkung beruht tatsächlich auf der Entleerung der Bäuche der Biber."
plPL = "Dziwaczne urządzenie przeznaczone do prania i dekontaminacji bobrów przy użyciu energii mechanicznej. Połowa efektu wynika właściwie z oczyszczania żołądków bobrów."
ptBR = "Uma contraption bizarra destinada a lavar e descontaminar castores usando poder mecânico. Metade do efeito se deve, na verdade, à purgação dos estômagos dos castores."
koKR = "기괴한 장치로, 기계적인 힘을 이용해 족제비를 세척하고 오염물질을 제거하는 데 사용됩니다. 효과의 절반은 사실 족제비의 위장을 정화하는 데서 비롯됩니다."
csCZ = "Podivný přístroj určený k mytí a dekontaminaci bobrů pomocí mechanické energie. Polovina efektu je ve skutečnosti způsobena vyprázdněním žaludků bobrů."
viVN = "Một cỗ máy kỳ quặc dùng để rửa và khử nhiễm các con rái cá bằng sức mạnh cơ học. Một nửa hiệu ứng thực sự là do làm sạch dạ dày của những con rái cá."
trTR = "Mechanical güç kullanarak kunduzları yıkayıp dezenfekte etmek için tasarlanmış garip bir cihaz.\nEtkisinin yarısı aslında kunduzların midesinin boşaltılmasından kaynaklanıyor."

