["Lapantouflemagic.Winery.FlavorDescription"]
raw = "\"No Bobby, you fell inside when you where little, remember?\""
status = "normal"
enUS = "\"No Bobby, you fell inside when you were little, remember?\""
zhCN = "“不是，博比，你小的时候掉进去了，记得吗？”"
zhTW = "「不，鮑比，你記得嗎？你小時候掉進去過。」"
ruRU = "\"Нет, Бобби, ты упал внутрь, когда был маленьким, помнишь?\""
jaJP = "「ボビー、覚えてる？君が小さい時に中に落ちちゃったんだよ。」"
frFR = "« Non Bobby, tu es tombé dedans quand tu étais petit, tu te souviens ? »"
deDE = "„Nein Bobby, du bist hineingefallen, als du klein warst, erinnerst du dich?“"
plPL = "Nie, Bobby, wpadłeś tam, kiedy byłeś mały, pamiętasz?"
ptBR = "Não, Bobby, você caiu dentro quando era pequeno, lembra?"
koKR = "\"아니, 바비. 네가 어렸을 때 안에 떨어졌던 거 기억하니?\""
csCZ = "Ne Bobby, spadl jsi dovnitř, když jsi byl malý, pamatuješ?"
viVN = "\"Không Bobby, cậu đã ngã xuống khi còn nhỏ, nhớ không?\""
trTR = "Hayır Bobby, küçüklüğünde içeri düştüğünü hatırlamıyor musun?"

