["Lapantouflemagic.Mushroomtent.Description"]
raw = "A sheltered place to grow mushroom from wood or sawdust.\n<color=#FF6EC7>Can function without workers.</color>"
status = "normal"
enUS = "A sheltered place to grow mushrooms from wood or sawdust.\n<color=#FF6EC7>Can function without workers.</color>"
zhCN = "“一个可以从木头或锯末中生长蘑菇的庇护所。\n<color=#FF6EC7>可以在没有工人的情况下运作。</color>”"
zhTW = "「一個可以從木頭或鋸屑中生長蘑菇的庇護所。<color=#FF6EC7>可以在沒有工人的情況下運作。</color>」"
ruRU = "Убежище для выращивания грибов из дерева или опилок. <color=#FF6EC7>Может функционировать без работников.</color>"
jaJP = "木やおがくずからキノコを育てるための sheltered の場所です。  \n<color=#FF6EC7>労働者なしで機能します。</color>"
frFR = "Un endroit abrité pour faire pousser des champignons à partir de bois ou de sciure de bois.  \n<color=#FF6EC7>Peut fonctionner sans ouvriers.</color>"
deDE = "Ein geschützter Ort, um Pilze aus Holz oder Sägemehl zu züchten. <color=#FF6EC7>Kann ohne Arbeiter funktionieren.</color>"
plPL = "Zadaszone miejsce do hodowli grzybów z drewna lub trocin. <color=#FF6EC7>Mogą działać bez pracowników.</color>"
ptBR = "Um lugar protegido para cultivar cogumelos a partir de madeira ou serragem. <color=#FF6EC7>Pode funcionar sem trabalhadores.</color>"
koKR = "나무나 톱밥에서 버섯을 재배할 수 있는 보호된 장소입니다.  \n<color=#FF6EC7>근로자 없이도 기능할 수 있습니다.</color>"
csCZ = "Místo chráněné před nepřízní, kde se dají pěstovat houby z dřeva nebo pilin.  \n<color=#FF6EC7>Může fungovat bez pracovníků.</color>"
viVN = "Nơi trú ẩn để trồng nấm từ gỗ hoặc mùn cưa. <color=#FF6EC7>Có thể hoạt động mà không cần công nhân.</color>"
trTR = "Ahşaptan veya talaştan mantar yetiştirmek için korunaklı bir yer. <color=#FF6EC7>İşçi olmadan da işlev görebilir.</color>"

["Lapantouflemagic.Mushroomtent.FlavorDescription"]
raw = "\"Should I eat this red-and-white one? Seems tasty\"\n -Bobby the fool, last words"
status = "normal"
enUS = "\"Should I eat this red-and-white one? Seems tasty\"  \n-Bobby the fool, last words"
zhCN = "“我该吃这个红白相间的吗？看起来很好吃。”  \n-傻瓜鲍比，临终遗言"
