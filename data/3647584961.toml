["Lapantouflemagic.Distillery.Description"]
raw = "A building specialized in preparing purified components from natural or manufactured resources.\n<color=#00FFFF>Works as a Levee</color>"
status = "normal"
enUS = "A building specialized in preparing purified components from natural or manufactured resources.  \n<color=#00FFFF>Works as a Levee</color>"
zhCN = "“一个专门从天然或人造资源中准备纯化成分的建筑。\n<color=#00FFFF>作为堤坝使用</color>”"
zhTW = "一座專門從自然或人造資源中製作純化組件的建築。\n<color=#00FFFF>作為壩堤運作</color>"
ruRU = "Здание, специализированное на подготовке очищенных компонентов из природных или manufactured ресурсов. <color=#00FFFF>Работает как плотина</color>"
jaJP = "「自然または人工資源から精製された成分を準備することに特化した建物です。<color=#00FFFF>堤防として機能します</color>」"
frFR = "Un bâtiment spécialisé dans la préparation de composants purifiés à partir de ressources naturelles ou manufacturées.  \n<color=#00FFFF>Fonctionne comme une digue</color>"
deDE = "Ein Gebäude, das auf die Aufbereitung von reinem Komponenten aus natürlichen oder hergestellten Ressourcen spezialisiert ist.  \n<color=#00FFFF>Funktioniert als Damm</color>"
plPL = "Budynek specjalizujący się w przygotowywaniu oczyszczonych komponentów z naturalnych lub sztucznych zasobów.  \n<color=#00FFFF>Działa jak tamował</color>"
ptBR = "Um edifício especializado na preparação de componentes purificados a partir de recursos naturais ou manufaturados.  \n<color=#00FFFF>Funciona como um Dique</color>"
koKR = "자연 또는 제조된 자원으로부터 정제된 구성 요소를 준비하는 데 특화된 건물입니다.\n<color=#00FFFF>제방처럼 작동합니다</color>"
csCZ = "Budova specializující se na přípravu čistých komponentů z přírodních nebo vyrobených zdrojů.  \n<color=#00FFFF>Funguje jako hráz</color>"
viVN = "Một tòa nhà chuyên chế biến các thành phần tinh khiết từ nguồn tài nguyên tự nhiên hoặc nhân tạo.  \n<color=#00FFFF>Hoạt động như một đê</color>"
trTR = "Doğal veya yapay kaynaklardan arıtılmış bileşenler hazırlamaya özel bir bina.  \n<color=#00FFFF>Dikili olarak çalışır</color>"

["Lapantouflemagic.Distillery.FlavorDescription"]
raw = "\"Can't the alchemist just do that too?\"\n -Mommy beaver"
status = "normal"
