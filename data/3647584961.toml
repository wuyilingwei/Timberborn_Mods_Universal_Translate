["Lapantouflemagic.primitivedamUtility.Description"]
raw = "A better variant of the cross-shaped dam that allows beaver passage in one direction, and contains a power shaft in the other.\nCan be placed on a <color=green> pit-and-ladder lodge</color>."
status = "normal"
enUS = "A better variant of the cross-shaped dam that allows beaver passage in one direction and contains a power shaft in the other. Can be placed on a <color=green>pit-and-ladder lodge</color>."
zhCN = "一种更好的十字形水坝变体，允许海狸单向通行，并在另一侧包含动力轴。\n可以放置在<color=green>坑梯房屋</color>上。"
zhTW = "“一種改良版的十字型水壩，允許海狸單向通行，另一側則包含動力軸。\n可以放置在<color=green>坑和梯子的木屋</color>上。”"
ruRU = "Улучшенный вариант дамбы в форме креста, которая позволяет бобрам проходить в одном направлении и содержит вращающийся вал в другом.\nМожет быть размещена на <color=green> шалаше с ямой и лестницей</color>."
jaJP = "「ビーバーが一方向に通行できる十字型ダムの改良版で、もう一方向には電力シャフトが含まれています。\n<color=green> pit-and-ladder lodge</color>の上に設置できます。」"
frFR = "Une variante améliorée du barrage en forme de croix qui permet le passage des castors dans une direction et contient un axe de puissance dans l'autre.\nPeut être placé sur un <color=green> abri à fosse et échelle</color>."
deDE = "Eine bessere Variante des kreuzförmigen Damms, die Biberpassagen in eine Richtung ermöglicht und in der anderen einen Leistungsschacht enthält. Kann auf einem <color=green> Graben-und-Leiter-Lodge</color> platziert werden."
plPL = "Lepsza wersja tamy w kształcie krzyża, która pozwala bobrom na przejście w jednym kierunku, a w drugim zawiera wał napędowy. Można ją umieścić na <color=green> leża pit-and-ladder</color>."
ptBR = "Uma variante melhorada da represa em forma de cruz que permite a passagem de castores em uma direção e contém um eixo de energia na outra. Pode ser colocada em uma <color=green>cabana de poço e escada</color>."
koKR = "수직으로 통과하는 비버를 허용하는 십자형 댐의 개선된 변형으로, 반대쪽에는 동력 샤프트가 포함되어 있습니다. <color=green> 구멍과 사다리 오두막</color>에 배치할 수 있습니다."
csCZ = "Lepší varianta křížové hráze, která umožňuje průchod bobrů jedním směrem a obsahuje hřídel energie na druhé straně. Může být umístěna na <color=green>lodge s jámou a žebříkem</color>."
viVN = "Một biến thể tốt hơn của đập hình chữ thập cho phép cho uống đi qua theo một hướng, và chứa một trục năng lượng ở hướng còn lại.  \nCó thể được đặt trên một <color=green>nhà chứa pit và thang</color>."
trTR = "Tek yönlü gelincik geçişine izin veren, çapraz şekilli barajın daha iyi bir versiyonu ve diğer tarafında bir güç şaftı bulunduran. <color=green> Çukur ve merdiven barı</color> üzerine yerleştirilebilir."

