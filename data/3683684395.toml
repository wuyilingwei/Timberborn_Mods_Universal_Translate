["Tutorial.MoreBeavers.GrowPopulation"]
raw = "Hải ly không sinh sản trừ khi có các vị trí nhà ở trống. Folktails cần hai hải ly trưởng thành và một vị trí trống để điều kỳ diệu xảy ra.\n"
status = "normal"
enUS = "Beavers won't reproduce unless there are empty housing slots. Folktails need two adult beavers and one empty slot for the miracle to occur."
zhCN = "海狸只有在有空置的住处时才繁殖。Folktails 需要两只成年海狸和一个空位才能让奇迹发生。"
zhTW = "海狸只有在有空置的住房位時才會繁殖。Folktails 需要兩隻成年的海狸和一個空置的住房位，才能讓奇蹟發生。"
ruRU = "Бобры не размножаются, пока не появятся свободные жилищные места. Фолктайлы требуют двух взрослых бобров и одного пустого места, чтобы произошло чудо."
jaJP = "空き住宅スロットがある場合に限り、ビーバーは繁殖します。フォークテイルズは成体のビーバー2頭と空きスロット1つを必要とします。"
frFR = "Les castors ne se reproduisent que s'il y a des emplacements de logement libres. Les Folktails ont besoin de deux castors adultes et d'un emplacement vide pour que la magie opère."
deDE = "Biber reproduzieren sich nicht, solange es keine freien Wohnplätze gibt. Folktails benötigen zwei ausgewachsene Biber und einen freien Platz, damit das Wunder geschieht."
plPL = "Bobry nie rozmnażają się, dopóki nie ma wolnych miejsc zamieszkania. Folktails potrzebują dwóch dorosłych bobrów i jednego pustego miejsca, aby magia mogła się wydarzyć."
ptBR = "Os castores não se reproduzem a menos que haja vagas de moradia disponíveis. Folktails precisam de dois castores adultos e uma vaga de moradia para que o milagre aconteça."
koKR = "비버는 빈 주거 공간이 있을 때만 번식합니다. Folktails는 두 마리의 성숙한 비버와 하나의 빈 공간이 있어야 기적이 일어납니다."
csCZ = "Bobři se nerodí, dokud nejsou volná místa pro bydlení. Folktails potřebují dva dospělí bobři a jedno volné místo, aby zázrak nastal."
