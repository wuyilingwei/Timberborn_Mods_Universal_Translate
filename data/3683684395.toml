["MapMetadata.Craters.Description"]
raw = "Không ai biết các miệng núi lửa hình thành như thế nào. Các cuộc khai quật sơ bộ cho thấy sự liên quan bạo lực của hooman."
status = "normal"
enUS = "No one knows how volcanic craters formed. Preliminary excavations indicate the violent involvement of humans."
zhCN = "没有人知道火山口是如何形成的。初步发掘表明人类与暴力有关。"
zhTW = "沒有人知道火山口是如何形成的。初步挖掘顯示與人類的暴力行為有關。"
ruRU = "Никто не знает, как образуются жерла вулканов. Предварительные раскопки показывают причастность людей к насилию."
jaJP = "誰も火口がどのように形成されたのか分からない。予備的な発掘調査は、人間の暴力的な関与を示している。"
frFR = "Personne ne sait comment se forment les bouches des volcans. Les fouilles préliminaires montrent l'implication violente des humains."
deDE = "Niemand weiß, wie Vulkankrater entstehen. Vorläufige Ausgrabungen deuten auf eine gewalttätige Beteiligung der Hooman hin."
plPL = "Nikt nie wie, jak powstały otwory wulkaniczne. Wstępne wykopaliska wskazują na udział ludzi w przemocy."
ptBR = "Ninguém sabe como as bocas dos vulcões foram formadas. Escavações preliminares indicam uma ligação com a violência dos humanos."
koKR = "화산 분화구가 어떻게 형성되었는지 아무도 모른다. 초기 발굴은 인간과의 폭력적 연관성을 보여준다."
csCZ = "Nikdo neví, jak vznikly otvory sopky. Předběžné vykopávky ukazují na násilnou účast lidí."
viVN = "Không ai biết các miệng núi lửa hình thành như thế nào. Các cuộc khai quật sơ bộ cho thấy sự liên quan bạo lực của hooman."

