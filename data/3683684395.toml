["NaturalResource.Sunflower.FlavorDescription"]
raw = "Hải ly trồng những cây này để thể hiện chúng không sợ mặt trời thiêu đốt."
status = "normal"
enUS = "Beavers plant these trees to show they aren't afraid of the sun burning them."
zhCN = "海狸为了证明自己不怕炙热的太阳而种植这些树。"
zhTW = "海狸種植這些樹木，以表示它們不怕被太陽灼燒。"
ruRU = "Бобры сажают эти деревья, чтобы показать, что они не боятся палящего солнца."
jaJP = "ビーバーはこれらの木を植えることで、太陽に焼かれることを恐れていないことを示している。"
frFR = "Les castors plantent ces arbres pour montrer qu'ils n'ont pas peur d'être brûlés par le soleil."
deDE = "Biber pflanzen diese Bäume, um zu zeigen, dass sie vor der brennenden Sonne keine Angst haben."
plPL = "Bobry sadzą te drzewa, aby pokazać, że nie boją się palącego słońca."
ptBR = "Os castores plantam estas árvores para mostrar que não têm medo de que o sol os queime."
koKR = "비버들은 이 나무들을 심어 태양이 그들을 태우는 것을 두려워하지 않는다는 것을 보여 준다."
csCZ = "Bobři pěstují tyto stromy, aby ukázali, že se nebojí slunce, které je spálí."
viVN = "Hải ly trồng những cây này để thể hiện chúng không sợ mặt trời thiêu đốt."

