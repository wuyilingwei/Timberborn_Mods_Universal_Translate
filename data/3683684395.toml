["MapMetadata.Plains.Description"]
raw = "Với những khu vực rộng lớn bằng phẳng như đuôi hải ly, vùng này là nơi thử nghiệm an toàn cho các kỹ sư mới vào nghề."
status = "normal"
enUS = "With broad, flat areas like beaver tails, this region is a safe testing ground for aspiring engineers."
zhCN = "像海狸尾巴一样广阔平坦的区域，这片区域是新手工程师的安全试验场。"
zhTW = "像海狸尾巴那樣寬廣且平坦的區域，這個地區是新手工程師的安全測試場。"
ruRU = "С обширными ровными территориями, похожими на хвост бобра, эта область служит безопасной тестовой площадкой для начинающих инженеров."
jaJP = "ビーバーの尾のように広く平坦なエリアを持つこの地域は、新人エンジニアのための安全な試験場です。"
frFR = "Avec de vastes zones planes comme des queues de castor, cette région est un terrain d'essai sûr pour les ingénieurs débutants."
deDE = "Mit weitläufigen, flachen Gebieten wie Biberenschwänze ist dieses Gebiet ein sicherer Übungsplatz für neue Ingenieure."
plPL = "W szerokich, płaskich obszarach, takich jak ogony bobra, ten teren jest bezpiecznym miejscem do testów dla nowych inżynierów."
ptBR = "Com áreas amplas e planas, como a cauda de castor, esta região é um local seguro para testes para engenheiros iniciantes."
koKR = "비버 꼬리처럼 넓고 평평한 지역들 중 이 지역은 신입 엔지니어들을 위한 안전한 실험 장소이다."
csCZ = "S rozsáhlými rovinami, které připomínají bobří ocas, je tato oblast bezpečným zkušebním prostředím pro začínající inženýry."
viVN = "Với những khu vực rộng lớn bằng phẳng như đuôi hải ly, vùng này là nơi thử nghiệm an toàn cho các kỹ sư mới vào nghề."

