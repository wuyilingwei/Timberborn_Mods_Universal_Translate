["MapMetadata.Diorama.Description"]
raw = "Trước khi được phép giám sát các thuộc địa lớn, những nhà xây dựng đầy tham vọng được giao nhiệm vụ thực hiện các dự án quy mô nhỏ như dự án này."
status = "normal"
enUS = "Before they're allowed to oversee large colonies, ambitious builders are tasked with carrying out small-scale projects like this one."
zhCN = "在获准监督大型殖民地之前，那些雄心勃勃的建造者被赋予执行像这个项目这样的中小型项目的任务。"
zhTW = "在獲准監督大型殖民地之前，充滿野心的建造者被指派執行像這樣的小型專案。"
ruRU = "Прежде чем получить разрешение на надзор за крупными колониями, амбициозным строителям поручено выполнять небольшие проекты, подобные этому проекту."
jaJP = "大規模なコロニーを監督する許可が下りる前に、野心的な建設者たちは、このような小規模なプロジェクトを実行する任務を課される。"
frFR = "Avant d'être autorisés à superviser de grandes colonies, des bâtisseurs ambitieux se voient confier la mission de réaliser des projets à petite échelle comme celui-ci."
deDE = "Bevor man die großen Kolonien überwachen darf, erhalten ehrgeizige Baumeister die Aufgabe, Kleinprojekte wie dieses hier durchzuführen."
plPL = "Zanim będą mogli nadzorować duże osady, ambitni budowniczowie dostają zadanie realizowania projektów o małej skali, takich jak ten projekt."
ptBR = "Antes de poder supervisionar grandes assentamentos, os construtores ambiciosos recebem o encargo de realizar projetos de menor escala, como este projeto."
koKR = "대규모 식민지들을 감독할 수 있도록 허가받기 전에, 야심 찬 건설자들은 이 프로젝트와 같은 소규모 프로젝트를 수행하는 임무를 부여받는다."
csCZ = "Předtím, než budou mít povolení dohlížet na velké kolonie, ambiciózní stavitelé dostanou za úkol realizovat malé projekty, jako je tento."
viVN = "Trước khi được phép giám sát các thuộc địa lớn, những nhà xây dựng đầy tham vọng được giao nhiệm vụ thực hiện các dự án quy mô nhỏ như dự án này."

