["MapMetadata.Pressure.Description"]
raw = "Kỹ năng thiết kế hệ thống ống nước sáng tạo là kỹ năng đầu tiên mà một con hải ly vùng đất hoang phải học."
status = "normal"
enUS = "The ability to creatively design a water pipe system is the first skill a wasteland beaver must learn."
zhCN = "设计创造性水管系统的技能是荒地上的海狸必须首先学习的第一项技能。"
zhTW = "具創新性的水管系統設計技能，是荒地上的海狸必須先學會的第一項技能。"
ruRU = "Навык проектирования инновационной водопроводной системы — первый навык, который должен освоить бобёр в пустошах."
jaJP = "創造的な配管システムの設計スキルは、荒野のビーバーが最初に習得すべきスキルです。"
frFR = "La compétence de concevoir un système de tuyauterie créatif est la première compétence qu'un castor des terres sauvages doit apprendre."
deDE = "Die Fähigkeit, ein kreatives Wasserleitungssystem zu entwerfen, ist die erste Fähigkeit, die ein Biber in einer öden Landschaft lernen muss."
plPL = "Kreatywne projektowanie systemu rurociągów to pierwsza umiejętność, którą musi opanować bóbr z jałowej krainy."
ptBR = "A habilidade de projetar um sistema de tubulações criativas é a primeira habilidade que um castor das Terras Desoladas precisa aprender."
koKR = "창의적인 배관 시스템 설계 기술은 황무지의 비버가 배워야 할 첫 번째 기술이다."
csCZ = "Kreativní navrhování vodovodního systému je dovednost, kterou se musí naučit první bobr na vyprahlé zemi."
viVN = "Kỹ năng thiết kế hệ thống ống nước sáng tạo là kỹ năng đầu tiên mà một con hải ly vùng đất hoang phải học."

