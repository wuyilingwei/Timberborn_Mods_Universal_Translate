jaJP = "\"まあ、ボットにはシステムや油圧があるかもしれない… どうしてそれを潤滑できないのだろう？\" —Ol' Kazko"
frFR = "Eh bien, un bot peut avoir un système hydraulique... Pourquoi ne pourrait-il pas être lubrifié ?\" —Ol' Kazko"
deDE = "Nun, ein Bot kann ein Hydrauliksystem haben... Warum kann es nicht geschmiert werden?\" —Ol' Kazko"
plPL = "\"Cóż, robot może mieć system hydrauliczny... Dlaczego nie mógłby być smarowany?\" —Ol' Kazko"
ptBR = "\"Nossa, um robô pode ter um sistema hidráulico... Por que ele não pode ser lubrificado?\" —Ol' Kazko"
koKR = "글쎄, 로봇도 시스템과 유압을 가질 수 있는데... 왜 그것을 윤활할 수 없지?\" —올 카즈코"
