plPL = "Nawet po tym, jak praca ręczna ustąpiła miejsca uprzemysłowieniu, etyka pracy Żelaznych Zębów pozostaje niezmieniona."
ptBR = "Mesmo depois que o trabalho manual cede lugar à industrialização, a ética de trabalho dos Dentes de Ferro permanece inalterada."
koKR = "수작업이 산업화로 자리를 내주고 난 뒤에도 아이언 티스의 노동정신은 변함없었다."
