["Building.Tubeway.FlavorDescription"]
raw = "Hai con hải ly va đầu vào nhau được coi là nguồn gốc của một số phát minh kỳ quặc nhất của Iron Teeth."
status = "normal"
enUS = "Two beavers headbutting each other are considered the source of some of Iron Teeth's most bizarre inventions."
zhCN = "两只海狸头对头地碰撞，被认为是铁齿族的一些最怪异发明的源头。"
zhTW = "兩隻海狸彼此正面相撞，被視為鐵牙族一些最怪異發明的起源。"
ruRU = "Два бобра, лбами столкнувшись, считаются источниками некоторых самых причудливых изобретений Железных Зубов."
jaJP = "二匹のビーバーが頭をぶつけ合うことが、アイアンティースの最も奇妙な発明の源と見なされている。"
frFR = "Deux castors qui se cognent la tête l'un contre l'autre sont considérés comme l'origine de certaines des inventions les plus étranges d'Iron Teeth."
deDE = "Zwei Biber, die frontal aufeinanderstoßen, gelten als Quelle einiger der seltsamsten Erfindungen der Eisernen Zähne."
plPL = "Dwa bobry zderzające się głowami są uważane za źródło niektórych z najdziwniejszych wynalazków Żelaznych Zębów."
ptBR = "Duas castores batendo cabeças umas com as outras são consideradas a fonte de algumas das invenções mais peculiares dos Dentes de Ferro."
koKR = "두 마리의 비버가 서로 부딪히는 것이 아이언 티스의 가장 기발하고 기이한 발명품들 중 일부의 원천으로 여겨진다."
csCZ = "Dva bobři, kteří do sebe narážejí hlavami, jsou považováni za zdroj některých z nejpodivnějších vynálezů Železných zubů."
viVN = "Hai con hải ly đập đầu vào nhau được coi là nguồn gốc của một số phát minh kỳ quặc nhất của Iron Teeth."

