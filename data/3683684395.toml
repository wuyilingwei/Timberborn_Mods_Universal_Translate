["Building.EarthRepopulator.IronTeeth.Description"]
raw = "Phóng những người tiên phong đến những vùng đất xa xôi. Khi phóng, làm cho hải ly trong khu vực trở nên cực kỳ hạnh phúc."
status = "normal"
enUS = "Launch pioneers to distant lands. When launched, beavers in the area will be extremely happy."
zhCN = "将开拓者送往遥远之地。发射时，让区域内的海狸极度快乐。"
zhTW = "把先鋒送往遙遠的土地。發射時，讓區域內的海狸變得極為快樂。"
