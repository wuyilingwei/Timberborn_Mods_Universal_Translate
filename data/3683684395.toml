["Building.TributeToIngenuity.FlavorDescription"]
raw = "\"Đương nhiên nó có mục đích. Nó gây ấn tượng.\" —Ol' Kazko"
status = "normal"
enUS = "\"Of course it has a purpose. It makes an impression.\" —Ol' Kazko"
zhCN = "\"当然它是有目的的。它让人印象深刻。\" —Ol' Kazko"
zhTW = "\"當然它有目的。它讓人留下深刻印象。\" —Ol' Kazko"
ruRU = "\"Разумеется, у него есть цель. Оно производит впечатление.\" —Ol' Kazko"
jaJP = "\"当然、それには目的がある。印象を与える。\" —オル・カズコ"
frFR = "\"Évidemment, cela a un but. Cela impressionne.\" —Ol' Kazko"
deDE = "\"Natürlich hat es einen Zweck. Es macht Eindruck.\" —Ol' Kazko"
plPL = "\"Oczywiście to ma cel. To robi wrażenie.\" —Ol' Kazko"
ptBR = "\"Claro que ele tem um propósito. Isso impressiona.\" —Ol' Kazko"
koKR = "\"당연히 그것은 목적이 있다. 그것은 인상을 준다.\" —올 카즈코"
csCZ = "\"Samozřejmě to má svůj účel. Vytváří dojem.\" —Ol' Kazko"
viVN = "\"Đương nhiên nó có mục đích. Nó gây ấn tượng.\" —Ol' Kazko"

