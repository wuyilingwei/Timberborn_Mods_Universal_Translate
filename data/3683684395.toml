koKR = "여러 세대에 걸친 비버의 수력 공학자들에 의해 균형을 맞추고 보강되어 완벽하게 형태를 갖춘 이 제방은 더 이상 \"그저 나무 한 덩어리일 뿐\"이 아니다."
