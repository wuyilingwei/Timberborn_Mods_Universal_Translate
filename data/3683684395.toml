["MapMetadata.HelixMountain.Description"]
raw = "Mặc dù thấy hình dạng lòng sông không thực tế, loài hải ly vẫn thừa nhận kỹ năng kỹ thuật nước hạn chế của hoomanity."
status = "normal"
enUS = "Although the river bend looks unrealistic, beavers still acknowledge humanity's limited water engineering skills."
zhCN = "尽管河道的形状看起来不真实，海狸们仍承认人类在水利工程方面的技能有限。"
zhTW = "儘管看到河道的形狀不實際，海狸仍承認人類在水利工程技術上的局限。"
ruRU = "Хотя форма русла реки кажется нереалистичной, бобры по-прежнему признают ограниченные навыки водной инженерии человечества."
jaJP = "川の曲がり方が現実的でないと感じても、ビーバーはhoomanityの限られた水工技術を認めている。"
frFR = "Bien que la forme du méandre de la rivière soit irréaliste, les castors reconnaissent malgré tout les compétences techniques en hydraulique de l'humanité, qui sont limitées."
deDE = "Obwohl die Form des Flusslaufs unrealistisch erscheint, erkennen die Biber dennoch die begrenzten Wasserbautechniken der Menschheit an."
plPL = "Chociaż kształt zakola rzeki nie jest realistyczny, bobry wciąż uznają ograniczone umiejętności inżynierii wodnej ludzkości."
ptBR = "Embora a forma do meandro do rio pareça irreal, os castores ainda reconhecem as habilidades de engenharia hidráulica limitadas da humanidade."
koKR = "강의 굽이 모양이 비현실적으로 보이더라도 비버들은 인류의 제한된 수공학 기술을 인정한다."
csCZ = "Ač se tvar dna řeky může zdát nereálný, bobři uznávají omezené vodní inženýrské schopnosti lidstva."
viVN = "Mặc dù hình dạng lòng sông không thực tế, loài hải ly vẫn thừa nhận kỹ năng kỹ thuật nước hạn chế của loài người."

