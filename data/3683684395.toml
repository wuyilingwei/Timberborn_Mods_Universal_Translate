["Building.TubewayStation.FlavorDescription"]
raw = "Hải ly mắc chứng sợ không gian hẹp nên chọn một con đường thay thế."
status = "normal"
enUS = "Beavers suffer from claustrophobia, so they choose an alternative route."
zhCN = "海狸患有幽闭恐惧症，因此选择了一条替代路线。"
zhTW = "海狸患有狹窄空間恐懼症，因此選擇了一條替代路線。"
ruRU = "Бобр страдает клаустрофобией, поэтому выбирает альтернативный путь."
jaJP = "ビーバーは閉所恐怖症のため、代替の道を選ぶ。"
frFR = "Le castor souffre de claustrophobie, il choisit donc un chemin alternatif."
deDE = "Der Biber leidet an Klaustrophobie, daher wählt er einen alternativen Weg."
plPL = "Bóbr cierpi na klaustrofobię, więc wybiera inną drogę."
ptBR = "O castor tem claustrofobia, então escolhe um caminho alternativo."
koKR = "협소한 공간을 두려워하는 비버이므로 대체 경로를 선택합니다."
csCZ = "Bobr trpí claustrofobií, a proto zvolí alternativní cestu."
viVN = "Hải ly mắc chứng sợ không gian hẹp nên đã chọn một con đường thay thế."

