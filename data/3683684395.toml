["Building.Tunnel.Description"]
raw = "Đào xuyên địa hình, thay thế nó bằng một Nền Tảng. Sử dụng công cụ Layer để xem dưới địa hình hoặc công trình."
status = "normal"
enUS = "Dig through terrain, replacing it with a Platform. Use the Layer tool to view beneath terrain or structures."
zhCN = "挖穿地形，将其替换为一个平台。使用图层工具查看地形下方或建筑物下方。"
zhTW = "挖穿地形，將其替換為一個平台。使用圖層工具查看地形下方或建築物下方。"
ruRU = "Раскопайте через местность, заменив её на платформу. Используйте инструмент слоя, чтобы увидеть под местностью или сооружением."
jaJP = "地形を掘り抜き、それをプラットフォームに置き換えます。地形の下や建造物の下を表示するには、レイヤーツールを使用してください。"
frFR = "Creusez à travers le terrain et remplacez-le par une plateforme. Utilisez l'outil Layer pour voir sous le terrain ou les constructions."
deDE = "Grabe durch das Gelände und ersetze es durch eine Plattform. Verwende das Layer-Werkzeug, um unter dem Gelände oder einer Struktur zu sehen."
plPL = "Wykop tunel przez teren, zastąp go platformą. Użyj narzędzia Warstwa, aby zobaczyć pod terenem lub konstrukcjami."
ptBR = "Cavar através do terreno, substituindo-o por uma plataforma. Use a ferramenta Layer para ver debaixo do terreno ou da construção."
koKR = "지형을 뚫고 그것을 플랫폼으로 대체합니다. 레이어 도구를 사용하여 지형 아래나 구조물 아래를 볼 수 있습니다."
csCZ = "Tunelujte terén a nahraďte ho platformou. Použijte nástroj Vrstva pro zobrazení pod terénem nebo budovami."
viVN = "Đào xuyên địa hình và thay thế nó bằng một nền tảng. Sử dụng công cụ Layer để xem dưới địa hình hoặc công trình."

