["MapMetadata.Oasis.Description"]
raw = "Một ốc đảo xanh cô độc trong vùng đất hoang được bao quanh bởi các tầng chứa nước có thể tiếp cận được bằng kỹ thuật khéo léo của hải ly."
status = "normal"
enUS = "A lone green oasis in the wasteland surrounded by aquifers that can be accessed by the beavers' deft engineering."
zhCN = "一个孤独而翠绿的绿洲，坐落在荒野之地，被通过海狸巧妙技巧进入的含水层所环绕。"
zhTW = "一座孤獨的綠洲，坐落在荒蕪的土地上，被含水層包圍，可透過海狸的巧妙技術接近。"
ruRU = "Одинокий зелёный оазис в пустынной местности, окружённый водоносными пластами, к которым можно добраться благодаря искусной инженерии бобров."
jaJP = "荒野の中にある緑の孤立したオアシスは、帯水層に囲まれており、ビーバーの巧みな技術によってアクセスできる。"
frFR = "Un oasis vert isolé dans une région désertique entouré de couches aquifères accessibles grâce à l'ingéniosité des castors."
deDE = "Eine grüne, einsame Oase in der Wildnis, umgeben von Aquiferschichten, die durch das geschickte Ingenieurwesen der Biber zugänglich gemacht werden."
plPL = "Samotna zielona oaza na jałowej ziemi otoczona przez warstwy wodonośne, do której można dotrzeć dzięki sprytowi bobra."
ptBR = "Um oásis verde e solitário em uma terra desolada, cercado por camadas de água subterrânea que podem ser acessadas pela engenhosidade dos castores."
koKR = "황량한 땅에 홀로 남은 푸른 오아시스가 비버의 교묘한 기술로 접근 가능한 지하 수층들로 둘러싸여 있다."
csCZ = "Osamělá zelená oáza v pustině, obklopená vodonosnými vrstvami, která je dosažitelná díky šikovnému inženýrství bobrů."
viVN = "Một ốc đảo xanh cô độc trong vùng đất hoang được bao quanh bởi các tầng chứa nước có thể tiếp cận được bằng kỹ thuật khéo léo của hải ly."

