["MapMetadata.Canyon.Description"]
raw = "Trong sa mạc, hải ly tìm kiếm những thung lũng nơi sông vẫn chảy. Dễ dàng đắp đập, hẻm núi này sẽ trở thành một nơi trú ẩn an toàn cho tất cả."
status = "normal"
enUS = "In the desert, beavers seek valleys where rivers still flow. Easy to dam, this canyon will become a safe haven for all."
zhCN = "在沙漠中，海狸寻找仍在流淌的河谷。容易筑坝，这条峡谷将成为所有生物的安全庇护所。"
zhTW = "在沙漠中，海狸尋找河水仍在流淌的山谷。容易築起大壩，這座峽谷將成為所有生物的安全庇護所。"
ruRU = "В пустыне бобры ищут долины, где река всё ещё течёт. Легко возводить дамбы — этот каньон станет безопасным убежищем для всех."
jaJP = "砂漠の中でビーバーは川がまだ流れている谷を探す。堤防を築くのは容易で、この渓谷はすべての人にとって安全な避難所となるだろう。"
frFR = "Dans le désert, les castors recherchent des vallées où la rivière coule encore. Il est facile d’édifier des digues; ce canyon deviendra un refuge sûr pour tous."
deDE = "In der Wüste suchen Biber nach Tälern, durch die der Fluss weiterfließt. Es ist einfach, Dämme zu errichten; dieser Canyon wird zu einer sicheren Zuflucht für alle."
plPL = "Na pustyni wydry szukają dolin, w których rzeki wciąż płyną. Łatwo budować tamy; ten kanion stanie się bezpieczną przystanią dla wszystkich."
ptBR = "No deserto, os castores procuram vales onde o rio ainda corre. É fácil erguer uma represa; este cânion será um refúgio seguro para todos."
koKR = "사막에서 비버들은 강이 아직 흐르는 계곡들을 찾아다닙니다. 쉽게 댐을 쌓을 수 있는 이 협곡은 모두를 위한 안전한 피난처가 될 것입니다."
csCZ = "Na poušti bobři hledají údolí, kde řeka stále teče. Hráz se snadno postaví; tento kaňon se pro všechny stane bezpečným útočištěm."
viVN = "Trong sa mạc, hải ly tìm kiếm những thung lũng nơi sông vẫn chảy. Dễ dàng đắp đập, hẻm núi này sẽ trở thành một nơi trú ẩn an toàn cho tất cả."

