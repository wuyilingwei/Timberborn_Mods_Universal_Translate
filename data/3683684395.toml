["Tutorial.Wellbeing.SetWorkingHours"]
raw = "Hãy nhớ rằng hải ly cần thời gian rảnh để ăn, uống, ngủ và tận hưởng các điểm tham quan của khu định cư.\n"
status = "normal"
enUS = "Remember that beavers need free time to eat, drink, sleep, and enjoy the sights of the settlement."
zhCN = "请记住，海狸需要空闲时间来吃饭、喝水、睡觉，并享受定居点的景点。"
zhTW = "請記住，海狸需要自由時間來吃飯、喝水、睡覺，並享受定居點的景點。"
ruRU = "Помните, что бобры нуждаются в свободном времени, чтобы есть, пить, спать и наслаждаться достопримечательностями поселения."
jaJP = "ビーバーには食事・飲水・睡眠のための自由時間と、居住区の見どころを楽しむ時間が必要であることを忘れないでください。"
frFR = "N'oubliez pas que les castors ont besoin de temps libre pour manger, boire, dormir et profiter des points d'intérêt de la colonie."
deDE = "Denkt daran, dass Biber Freizeit brauchen, um zu essen, zu trinken, zu schlafen und die Attraktionen der Siedlung zu genießen."
plPL = "Pamiętaj, że bobry potrzebują czasu wolnego na jedzenie, picie, sen i korzystanie z atrakcji osady."
ptBR = "Lembre-se de que as castores precisam de tempo livre para comer, beber, dormir e aproveitar os pontos de interesse do assentamento."
koKR = "비버는 식사하고, 마시고, 잠을 자고, 정착지의 볼거리를 즐길 시간이 필요하다는 것을 잊지 마세요."
csCZ = "Nezapomeňte, že bobři potřebují volný čas na jídlo, pití, spánek a užívání si zajímavostí osady."
viVN = "Hãy nhớ rằng hải ly cần thời gian rảnh để ăn, uống, ngủ và tận hưởng các điểm tham quan của khu định cư."

["Tutorial.Wellbeing.Shrub"]
raw = "Phúc lợi cũng tăng lên xung quanh các vật trang trí. Hải ly không cố ý tiếp cận chúng, vì vậy hãy đặt các vật trang trí gần nơi những người định cư của bạn thường tụ tập.\n"
status = "normal"
enUS = "Wellbeing also increases around decorative items. Beavers won't intentionally approach them, so place the decorative items near where your settlers usually gather."
zhCN = "幸福感也会在装饰物周围提升。海狸不会主动接近它们，因此请把装饰物放在居民常聚集的地方。"
zhTW = "裝飾物周圍的福利也會提升。海狸不會特意接近它們，因此請把裝飾物放在你的定居者經常聚集的地方附近。"
ruRU = "Благосостояние также растет вокруг декоративных предметов. Бобры не намерены приближаться к ним, поэтому разместите декоративные предметы рядом с тем местом, где ваши поселенцы обычно собираются."
jaJP = "装飾品の周囲でもウェルビーイングが上昇します。ビーバーはそれらに意図的には近づきません。したがって、入植者がよく集まる場所の近くに装飾品を配置してください。"
frFR = "Le bien-être augmente également autour des objets décoratifs. Les castors n'approchent pas intentionnellement ces objets, alors placez-les près des endroits où vos colons ont l'habitude de se rassembler."
deDE = "Das Wohlbefinden steigt auch in der Nähe von Dekorationen. Biber nähern sich ihnen nicht absichtlich, daher platziere die Dekorationen in der Nähe der Orte, an denen sich deine Siedler normalerweise versammeln."
plPL = "Dobrobyt również rośnie wokół dekoracji. Bobry nie celowo zbliżają się do nich, dlatego umieść dekoracje w pobliżu miejsca, gdzie twoi osadnicy zwykle gromadzą się."
ptBR = "O bem-estar também aumenta ao redor de objetos decorativos. Os castores não se aproximam deles intencionalmente, então coloque objetos decorativos perto de onde seus habitantes costumam se reunir."
koKR = "장식 아이템 주변의 복지 수치도 증가합니다. 비버가 의도적으로 그것들에 다가가지 않으므로, 정주민들이 자주 모이는 곳 근처에 장식 아이템을 배치하세요."
csCZ = "Spokojenost se také zvyšuje kolem ozdobných předmětů. Vydry k nim záměrně nepřistupují, proto umístěte ozdobné předměty poblíž míst, kde se vaši osadníci obvykle shromažďují."
viVN = "Phúc lợi cũng tăng lên xung quanh các vật trang trí. Hải ly không cố ý tiếp cận chúng, vì vậy hãy đặt các vật trang trí gần nơi những người định cư của bạn thường tụ tập."

["Tutorial.Wellbeing.WellbeingPanel"]
raw = "Đối với hải ly, toàn bộ xã hội mới là điều quan trọng. Bạn có thể thấy phúc lợi trung bình của khu định cư của mình ở góc trên cùng bên trái màn hình.\n"
status = "normal"
enUS = "For beavers, the entire new society is what matters. You can see your settlement's average wellbeing in the upper-left corner of the screen."
zhCN = "对海狸来说，整个新社会才是最重要的。你可以在屏幕左上角看到你定居点的平均福利。"
zhTW = "對於海狸而言，整個社會才是最重要的。你可以在螢幕左上角看到你定居點的平均福利。"
ruRU = "Для бобров важна вся новая община. Вы можете увидеть средний уровень благосостояния вашего поселения в верхнем левом углу экрана."
jaJP = "ビーバーにとって、新しい社会全体が重要です。画面の左上隅に、入植地の平均福祉を確認できます。"
frFR = "Pour les castors, l’ensemble de la nouvelle société est ce qui compte. Vous pouvez voir le bien-être moyen de votre colonie dans le coin supérieur gauche de l’écran."
deDE = "Für Biber ist die gesamte Gesellschaft am wichtigsten. Du kannst das durchschnittliche Wohlbefinden deiner Siedlung in der oberen linken Ecke des Bildschirms sehen."
plPL = "Dla bobrów całe nowe społeczeństwo jest najważniejsze. Możesz zobaczyć średni poziom dobrobytu swojej osady w lewym górnym rogu ekranu."
ptBR = "Para as lontras, toda a nova sociedade é o que realmente importa. Você pode ver o bem-estar médio do seu assentamento no canto superior esquerdo da tela."
koKR = "비버에게는 전체 사회가 가장 중요하다. 내 정착지의 평균 복지 수준을 화면의 왼쪽 상단 모서리에서 확인할 수 있습니다."
csCZ = "Pro bobry je celá nová společnost důležitá. Můžete vidět průměrnou pohodu vaší osady v levém horním rohu obrazovky."
viVN = "Đối với hải ly, toàn bộ xã hội mới là điều quan trọng. Bạn có thể thấy phúc lợi trung bình của khu định cư của mình ở góc trên cùng bên trái màn hình."

