["Tutorial.Storage.Warehouses"]
raw = "Cuối cùng, hãy chuẩn bị một số kho chứa Dâu tây. Chúng ta cũng nên sẵn sàng cho vụ thu hoạch Cà rốt sắp tới.\n"
