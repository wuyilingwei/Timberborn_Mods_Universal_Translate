ptBR = "Eles são lenhadores e é assim que vivem, dormem a noite toda e trabalham o dia inteiro! — Canção popular de castores"
koKR = "\"그들은 벌목꾼이며 그것이 그들의 삶의 방식이다. 그들은 밤새 자고 낮에는 일한다!\" — 인기 있는 비버의 노래"
