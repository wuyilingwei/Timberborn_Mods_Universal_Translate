["Building.EarthRecultivator.Folktails.Description"]
raw = "Phân phối hạt cây khắp Trái đất. Khi phóng, làm cho hải ly trong khu vực trở nên cực kỳ hạnh phúc."
status = "normal"
enUS = "Distribute tree seeds across the Earth. When deployed, make the beavers in the area extremely happy."
zhCN = "在全球范围内散播树木的种子。发射时，会让区域内的海狸极度幸福。"
zhTW = "將樹木種子散佈於全球各地。投放時，讓區域內的海狸變得極為快樂。"
ruRU = "Распространяет семена деревьев по всей Земле. При запуске делает бобров в регионе крайне счастливыми."
jaJP = "地球全体に木の種を配布します。起動すると、周辺のビーバーを極めて幸福にします。"
frFR = "Distribue des graines d'arbres partout sur Terre. Lors du lancement, les castors de la zone deviennent extrêmement heureux."
deDE = "Verteile Baumsamen über die ganze Erde. Wenn die Baumsamen freigesetzt werden, machen sie die Biber in der Umgebung extrem glücklich."
plPL = "Dystrybuuje nasiona drzew po całej Ziemi. Po uruchomieniu sprawia, że bobry w okolicy są niezwykle szczęśliwe."
ptBR = "Dispersa sementes de árvores por todo o planeta. Ao ser liberado, faz com que os castores da área fiquem extremamente felizes."
koKR = "전 세계에 나무 씨앗을 배포합니다. 방출되면 해당 지역의 비버들을 극도로 행복하게 만듭니다."
csCZ = "Šířit semena stromů po celé Zemi. Při aktivaci způsobí, že bobři v okolí budou extrémně šťastní."
viVN = "Phân phối hạt cây khắp Trái đất. Khi phóng, làm cho hải ly trong khu vực trở nên cực kỳ hạnh phúc."

