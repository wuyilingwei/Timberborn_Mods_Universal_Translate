["MapMetadata.Hollows.Description"]
raw = "Những vùng trũng màu mỡ này là khu vực đắc địa cho những người định cư tương lai. Phong cảnh được chạm khắc ẩn chứa nhiều cơ hội - những con hải ly lớn tuổi nhất thậm chí còn thì thầm về những kho báu bị chôn vùi."
status = "normal"
enUS = "These fertile valleys are prime real estate for future settlers. The landscape is carved with many opportunities — even the oldest beavers whisper about buried treasures."
zhCN = "这些肥沃的洼地是未来定居者的黄金地段。景观被雕刻，隐藏着许多机会——最年长的海狸甚至还窃窃私语着关于被埋藏的宝藏。"
zhTW = "這些肥沃的洼地是未來定居者的黃金地段。被雕刻的景觀蘊含著許多機會 - 最年長的河狸甚至還會低語著被埋藏的寶藏。"
ruRU = "Эти плодородные низины - первоклассное место для будущих поселенцев. Ландшафт, вырезанный временем, скрывает множество возможностей - самые старшие бобры даже шепчут о зарытых сокровищах."
jaJP = "これらの肥沃な谷は、未来の入植者にとって最適な土地だ。風景は彫られているように多くの機会を秘めている。最も年を重ねたビーバーたちは、埋蔵された宝についてささやくことさえある。"
frFR = "Ces vallées fertiles constituent un emplacement de choix pour les futurs colons. Le paysage façonné regorge de nombreuses opportunités - même les castors les plus âgés murmurent des trésors enfouis."
deDE = "Diese fruchtbaren Senken sind erstklassige Standorte für zukünftige Siedler. Die kunstvoll gemeißelte Landschaft birgt zahlreiche Chancen – selbst die ältesten Biber flüstern von vergrabenen Schätzen."
plPL = "Te żyzne doliny to doskonałe miejsce dla przyszłych osadników. Krajobraz wyrzeźbiony skrywa wiele możliwości - nawet najstarsze bobry szepczą o zakopanych skarbach."
ptBR = "Estes vales férteis são áreas ideais para futuros colonos. A paisagem esculpida guarda muitas oportunidades - os castores mais velhos sussurram sobre tesouros enterrados."
koKR = "이 비옥한 골짜기들은 미래의 정착민들을 위한 최적의 거점이다. 새겨진 풍경에는 많은 기회가 숨겨져 있으며 - 가장 나이가 든 비버들조차 묻힌 보물에 대해 속삭인다."
csCZ = "Tyto úrodné kotliny jsou ideálním místem pro budoucí osadníky. Krajina vytesaná do terénu skrývá mnoho příležitostí – i ti nejstarší bobři šeptají o pohřbených pokladech."
viVN = "Những vùng trũng màu mỡ này là khu vực đắc địa cho những người định cư tương lai. Phong cảnh được chạm khắc ẩn chứa nhiều cơ hội - những con hải ly lớn tuổi nhất thậm chí còn thì thầm về những kho báu bị chôn vùi."

