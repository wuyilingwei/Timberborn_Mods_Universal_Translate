["Tutorial.VerticalArchitecture.BuildRooftopTerrace"]
raw = "Trong vùng đất hoang, điều quan trọng là phải tối ưu hóa việc sử dụng không gian. Hải ly làm điều đó bằng cách phát triển các thành phố của họ theo chiều dọc.\n"
status = "normal"
enUS = "In the wasteland, the key is to optimize space usage. Beavers do that by developing their cities vertically."
