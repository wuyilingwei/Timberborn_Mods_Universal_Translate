["Building.DistrictCrossing.Description"]
raw = "Cân bằng hàng hóa giữa hai quận được kết nối. Mỗi bên có công nhân phân phối hàng hóa giữa District Crossing và phần còn lại của quận."
status = "normal"
enUS = "Balances goods between two connected districts. Each side has workers distributing goods between the District Crossing and the rest of the district."
zhCN = "两个相连的区之间的货物保持平衡。每一边都配有工人，在 District Crossing 与该区的其他部分之间分配货物。"
zhTW = "連接的兩個區域之間的貨物平衡。每一邊有工人負責在 District Crossing 與該區的其餘部分之間分配貨物。"
ruRU = "Баланс товаров между двумя соединёнными районами. У каждой стороны есть рабочие, которые распределяют товары между District Crossing и остальной частью района."
jaJP = "接続された二つの区の間で商品のバランスを取ります。各側には District Crossing と区の残りの部分の間で商品を分配する作業員がいます。"
frFR = "L'équilibrage des marchandises entre deux districts connectés. Chaque côté dispose d'ouvriers qui distribuent les marchandises entre District Crossing et le reste du district."
deDE = "Güter zwischen zwei verbundenen Bezirken ausgleichen. Jede Seite hat Arbeiter, die Güter zwischen District Crossing und dem Rest des Bezirks verteilen."
plPL = "Wyrównanie towarów między dwoma połączonymi dzielnicami. Każda strona ma pracowników, którzy dystrybuują towary między Przejście Dzielnicowe a resztą dzielnicy."
ptBR = "O equilíbrio de mercadorias entre dois distritos conectados. Cada lado tem trabalhadores distribuindo mercadorias entre o District Crossing e o restante do distrito."
koKR = "연결된 두 구역 간의 물품 균형을 맞춥니다. 각 측에는 District Crossing과 구의 나머지 부분 사이에서 물품을 분배하는 노동자들이 있습니다."
csCZ = "Vyvažování zboží mezi dvěma propojenými obvody. Na každé straně jsou pracovníci, kteří rozdělují zboží mezi District Crossing a zbytkem obvodu."
