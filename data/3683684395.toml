["Building.Carousel.FlavorDescription"]
raw = "\"Con nghĩ con đang đi đâu, hải ly con? Những cành cây này sẽ không tự lột vỏ đâu.\" —Ma' Ngonel"
status = "normal"
enUS = "Where do you think you're going, little beaver? These branches won't peel themselves. —Ma' Ngonel"
zhCN = "\"你以为你要去哪儿呢，小海狸？这些树枝不会自己剥掉树皮。\" —Ma' Ngonel"
zhTW = "\"你以為自己要去哪裡，河狸啊？這些樹枝不會自己把樹皮剝掉。\" —Ma' Ngonel"
ruRU = "\"Думаешь, куда ты идёшь, бобёр? Эти ветви сами по себе не снимут кору.\" —Ma' Ngonel"
jaJP = "\"いったいどこへ行くつもりだ、ビーバーくん？この枝は自分で樹皮をむくことはないだろう。\" —Ma' Ngonel"
frFR = "\"Où crois-tu aller, petit castor ? Ces branches ne vont pas enlever leur écorce toutes seules.\" —Ma' Ngonel"
deDE = "\"Wohin glaubst du, dass du gehst, Biber? Diese Äste werden sich nicht von selbst schälen.\" —Ma' Ngonel"
plPL = "\"Gdzie myślisz, dokąd idziesz, bóbrze? Te gałęzie same się nie obiorą z kory.\" —Ma' Ngonel"
ptBR = "\"Para onde você acha que está indo, filhote de castor? Esses galhos não vão tirar a casca sozinhos.\" —Ma' Ngonel"
koKR = "너는 지금 어디로 가고 있다고 생각하니, 비버야? 이 나뭇가지들은 스스로 껍질을 벗기지 않을 거야.\" —Ma' Ngon"
csCZ = "\"Kam myslíš, že jdeš, malý bobře? Tyto větve si samy kůru neoloupají.\" —Ma' Ngonel"
viVN = "\"Con nghĩ con đang đi đâu, hải ly con? Những cành cây này sẽ không tự lột vỏ đâu.\" —Ma' Ngonel"

