["MapMetadata.Meander.Description"]
raw = "Các kỹ sư hải ly rất muốn khai thác đường cong tự nhiên của bờ sông. Lập kế hoạch sử dụng tốt nhất không gian hạn chế là phần khó khăn."
status = "normal"
enUS = "Beaver engineers are eager to exploit the riverbank's natural bend. Planning the best use of the limited space is the hard part."
zhCN = "海狸工程师非常想利用河岸自然的弯曲。规划如何最好地利用有限的空间是最困难的部分。"
zhTW = "海狸工程師非常想利用河岸的自然曲線。在有限空間中最佳利用的規劃是最困難的部分。"
ruRU = "Инженеры-бобры очень хотят использовать естественный изгиб берега реки. Планирование наилучшего использования ограниченного пространства — самая сложная часть."
jaJP = "ビーバーの技術者たちは川岸の自然な曲線を活かしたいと考えています。限られたスペースを最適に活用する計画を立てることが難しいのが難点です。"
frFR = "Les ingénieurs castors veulent exploiter la courbe naturelle de la rive. Planifier l'utilisation optimale d'un espace restreint est la partie la plus difficile."
deDE = "Die Biberingenieure möchten die natürliche Biegung des Flussufers ausnutzen. Die Planung der bestmöglichen Nutzung des begrenzten Raums ist der schwierige Teil."
plPL = "Inżynierowie bobrów bardzo chcą wykorzystać naturalny zakręt brzegu rzeki. Zaplanowanie najlepszego wykorzystania ograniczonej przestrzeni to najtrudniejsza część."
ptBR = "Os engenheiros castores querem explorar a curva natural da margem do rio. Planejar o melhor uso do espaço limitado é a parte mais difícil."
koKR = "비버 엔지니어들은 강가의 자연스러운 곡선을 활용하고 싶어 한다. 제한된 공간을 최대한 활용하는 계획이 가장 어려운 부분이다."
csCZ = "Bobří inženýři by velmi rádi využili přirozený oblouk břehu řeky. Naplánování nejlepšího využití omezeného prostoru je nejtěžší část."
viVN = "Các kỹ sư hải ly rất muốn khai thác đường cong tự nhiên của bờ sông. Lập kế hoạch sử dụng tốt nhất không gian hạn chế là phần khó khăn."

