["MapMetadata.MountainRange.Description"]
raw = "Trong cuộc tìm kiếm nước ngọt tuyệt vọng, hải ly sẵn sàng leo lên cả những ngọn núi cao nhất."
status = "normal"
enUS = "In the desperate search for freshwater, beavers are willing to climb even the highest mountains."
zhCN = "在对淡水的绝望追寻中，海狸甚至愿意攀登最高的山峰。"
zhTW = "在絕望地尋找淡水的過程中，海狸甚至願意攀登到最高的山峰。"
ruRU = "В отчаянных поисках пресной воды бобры готовы взобраться даже на самые высокие горы."
jaJP = "絶望的な淡水を求めて、ビーバーたちは最高峰さえも登る覚悟がある。"
frFR = "Dans la quête désespérée d'eau douce, les castors sont prêts à grimper même les plus hautes montagnes."
deDE = "In der verzweifelten Suche nach Süßwasser ist der Biber bereit, selbst die höchsten Berge zu erklimmen."
plPL = "W desperackich poszukiwaniach świeżej wody bóbr gotów wspiąć się nawet na najwyższe góry."
ptBR = "Na busca desesperada por água doce, os castores estão prontos para subir até mesmo as montanhas mais altas."
koKR = "절실하게 식수를 찾아나서는 여정에서 비버들은 심지어 가장 높은 산까지도 올라갈 준비가 되어 있다."
csCZ = "V zoufalém hledání čisté vody jsou bobři ochotni vyšplhat až na ty nejvyšší hory."
viVN = "Trong cuộc tìm kiếm nước ngọt tuyệt vọng, hải ly sẵn sàng leo lên cả những ngọn núi cao nhất."

