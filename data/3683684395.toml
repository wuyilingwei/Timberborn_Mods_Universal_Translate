["MapMetadata.Terraces.Description"]
raw = "Nhiều xã hội chọn định cư trên các khu vực cao ráo, tận dụng khả năng xây dựng theo chiều dọc mới tìm thấy của loài hải ly."
status = "normal"
enUS = "Many societies choose to settle on dry, elevated areas, taking advantage of the beavers' newly discovered vertical-building capability."
zhCN = "许多社会选择在干燥的高地定居，利用新发现的海狸垂直建造能力。"
zhTW = "許多社會選擇在地勢較高、較乾燥的區域定居，善用海狸新發現的垂直建築能力。"
ruRU = "Многие сообщества выбирают поселение на сухих возвышенностях, используя недавно обнаруженную бобрами способность к вертикальному строительству."
jaJP = "多くの社会は高地の区域に定住することを選び、ビーバーが新たに見つけた垂直方向の建設能力を活用している。"
frFR = "De nombreuses sociétés choisissent de s'établir dans des zones élevées, tirant parti de la capacité de construire en hauteur récemment découverte chez les castors."
deDE = "Viele Gesellschaften entscheiden sich dafür, sich in trockenen, erhöhten Gebieten niederzulassen und nutzen dabei die neu entdeckte Fähigkeit der Biber, vertikal zu bauen."
plPL = "Wiele społeczeństw decyduje się osiedlić na suchych i wysoko położonych terenach, wykorzystując nowo odkrytą przez bobry zdolność budowy w pionie."
ptBR = "Muitas sociedades escolhem se estabelecer em áreas elevadas, aproveitando a habilidade de construção vertical recém-descoberta pelos castores."
koKR = "많은 사회들이 고지대에 정착하기를 선택하고, 비버들이 새롭게 발견한 수직 건축 능력을 활용한다."
csCZ = "Mnoho společností se rozhoduje usadit na vyvýšených oblastech a využít nově objevené vertikální stavební schopnosti bobrů."
viVN = "Nhiều xã hội chọn định cư trên các khu vực cao ráo, tận dụng khả năng xây dựng theo chiều dọc mới tìm thấy của loài hải ly."

