deDE = "Giftig, solange es lebt – Maniok hat Răng Sắt dazu gebracht, Fermentation auszuprobieren."
plPL = "Toksyczny, gdy jest surowy, maniok skłonił Żelaznego Zęba do eksperymentowania z fermentacją."
ptBR = "Quando crua, a mandioca é tóxica; isso levou os Dentes de Ferro a experimentar a fermentação."
koKR = "생으로 먹으면 독이 있는 카사바가 Răng Sắt의 발효 실험을 하게 만들었다."
csCZ = "Jedovatý, když je živý, maniok přiměl Răng Sắt vyzkoušet fermentaci."
viVN = "Độc khi còn sống, sắn đã khiến Răng Sắt thử nghiệm lên men."

