["NaturalResource.Birch.FlavorDescription"]
raw = "\"Nhớ nhé các con, đừng bóc quá nhiều vỏ cây! Nó làm hại cây đấy!\" — Ma' Ngonel"
status = "normal"
enUS = "Remember, everyone, don't peel too much bark! It harms the tree! — Ma' Ngonel"
zhCN = "记住，孩子们，别剥太多树皮！它会伤害树木的！ — Ma' Ngonel"
zhTW = "記住啊，孩子們，別剝太多樹皮！這樣會傷害樹木。— Ma' Ngonel"
ruRU = "\"Запомните, ребята: не срывайте слишком много коры с деревьев! Это вредит дереву!\" — Ма' Нгонель\""
jaJP = "\"子どもたちよ、木の皮をあまりむきすぎないでね！それは木を傷つけるんだ！\" — Ma' Ngonel"
frFR = "Souvenez-vous, les enfants, de ne pas enlever trop d'écorce des arbres ! Cela nuit à l'arbre ! — Ma' Ngonel"
deDE = "\"Denkt dran, Kinder, reißt nicht zu viel Baumrinde ab! Das schadet dem Baum!\" — Ma' Ngonel"
plPL = "\"Pamiętajcie, dzieci, nie obrywajcie zbyt wiele kory z drzew! To szkodzi drzewom!\" — Ma' Ngonel"
ptBR = "Lembrem-se, pessoal, não retirem muita casca das árvores! Isso faz mal às árvores! — Ma' Ngonel"
koKR = "\"얘들아, 나무 껍질을 너무 많이 벗기지 마! 그것은 나무를 해친다!\" — Ma' Ngonel"
csCZ = "\"Pamatujte, děti, neodtrhávejte příliš mnoho kůry ze stromu! To škodí stromu!\" — Ma' Ngonel"
viVN = "\"Nhớ nhé các con, đừng bóc quá nhiều vỏ cây! Nó làm hại cây đấy!\" — Ma' Ngonel"

