["Faction.Folktails.GameOver.Flavor"]
raw = "Khi bạn không tận dụng được món quà của thiên nhiên, nó sẽ lấy lại."
status = "normal"
enUS = "If you don't make use of nature's gifts, they will be taken back."
zhCN = "当你无法充分利用自然的馈赠时，它会收回。"
zhTW = "如果你無法善用大自然的禮物，它就會把它們收回。"
ruRU = "Если вы не воспользуетесь даром природы, она заберёт его обратно."
jaJP = "自然の恵みを活用できない場合、それは取り戻されてしまう。"
frFR = "Si vous ne tirez pas parti du don de la nature, elle le reprendra."
deDE = "Wenn du das Geschenk der Natur nicht nutzt, wird sie es zurücknehmen."
plPL = "Gdy nie wykorzystasz daru natury, on go zabierze z powrotem."
ptBR = "Quando você não aproveita os presentes da natureza, ela os retomará."
koKR = "자연의 선물을 제대로 활용하지 못하면, 자연은 그것을 되찾아 간다."
csCZ = "Pokud nevyužijete dar přírody, vezme si ho zpět."
viVN = "Khi bạn không tận dụng được món quà của thiên nhiên, nó sẽ lấy lại."

["Faction.Folktails.GameOver.Message"]
raw = "Folktails của bạn đã gặp số phận bi thảm của những người tiền nhiệm. Đây là kết thúc."
status = "normal"
enUS = "Your Folktails have met the tragic fate of their predecessors. This is the end."
zhCN = "你的 Folktails 已经遭遇了前辈的悲惨命运。这就是结局。"
zhTW = "你的 Folktails 已經遭遇前任們的悲慘命運。這就是結局。"
ruRU = "Ваши Folktails столкнулись с трагической судьбой своих предшественников. Это конец."
jaJP = "あなたのフォークテイルズは、先代たちの悲劇的な運命に直面しました。これが終わりです。"
frFR = "Vos Folktails ont connu le destin tragique de leurs prédécesseurs. C'est la fin."
deDE = "Deine Folktails sind dem tragischen Schicksal ihrer Vorfahren begegnet. Dies ist das Ende."
plPL = "Twoje Folktails spotkały się z tragicznym losem swoich poprzedników. To koniec."
ptBR = "Os Folktails de vocês encontraram o destino trágico de seus antecessores. Este é o fim."
koKR = "당신의 Folktails는 선조들이 겪은 비극적인 운명을 마주했습니다. 이것이 끝입니다."
csCZ = "Tvé Folktails čelí tragickému osudu svých předchůdců. To je konec."
viVN = "Folktails của bạn đã gặp số phận bi thảm của những người tiền nhiệm. Đây là kết thúc."

["Faction.Folktails.WonderCompletionFlavor"]
raw = "Sau khi thu thập được của cải và kiến thức lớn, những con hải ly của bạn đã chia sẻ thành quả lao động của chúng với hành tinh đang đau khổ. Vẫn còn nhiều việc phải làm, nhưng Trái Đất có thể lại một lần nữa phát triển thịnh vượng."
status = "normal"
enUS = "After amassing great wealth and knowledge, your beavers have shared the fruits of their labor with a suffering planet. There is still much to be done, but Earth can prosper once again."
zhCN = "在收集到大量财富与知识之后，你们的海狸将他们劳动的成果分享给这个正饱受苦难的星球。尽管还有很多工作要做，但地球或许会再次繁荣。"
zhTW = "在累積了大量財富與知識之後，你的海狸們已經把他們勞動的成果分享給受苦的地球。雖然還有許多工作要做，但地球或許能再次繁榮昌盛。"
ruRU = "После того, как вы собрали богатство и обширные знания, ваши бобры поделились плодами своего труда со страдающей планетой. Ещё многое предстоит сделать, но Земля может вновь процветать."
jaJP = "巨万の富と知識を手に入れた後、あなたのビーバーは苦しむ惑星と労働の成果を共有した。まだやるべきことは多いが、地球は再び繁栄することができる。"
frFR = "Après avoir accumulé de grandes richesses et de grandes connaissances, vos castors ont partagé les fruits de leur travail avec une planète en souffrance. Il reste encore beaucoup à faire, mais la Terre peut prospérer à nouveau."
deDE = "Nachdem große Reichtümer und umfangreiches Wissen gesammelt wurden, haben eure Biber die Früchte ihrer Arbeit mit dem leidenden Planeten geteilt. Es gibt noch viel zu tun, doch die Erde kann wieder einmal gedeihen."
plPL = "Po zgromadzeniu ogromnego bogactwa i wiedzy twoje bobry podzieliły się owocami swojej pracy z cierpiącą planetą. Wciąż jest jeszcze wiele do zrobienia, ale Ziemia może ponownie rozwijać się w dobrobyt."
ptBR = "Depois de acumular riqueza e grande conhecimento, seus castores compartilharam os frutos de seu trabalho com o planeta que sofre. Ainda há muito a fazer, mas a Terra pode, mais uma vez, prosperar."
koKR = "큰 재산과 지식을 모은 뒤, 당신의 비버들은 그들의 노동의 성과를 고통받는 지구와 공유했다. 아직 해야 할 일이 많지만, 지구는 다시 한 번 번영할 수 있다."
csCZ = "Poté, co se nasbíralo bohatství a velké poznání, vaše vydry sdílely plody své práce s planetou, která trpí. Stále je co dělat, ale Země se může znovu rozvíjet a prosperovat."
viVN = "Sau khi thu thập được của cải và kiến thức lớn, những con hải ly của bạn đã chia sẻ thành quả lao động của chúng với hành tinh đang đau khổ. Vẫn còn nhiều việc phải làm, nhưng Trái Đất có thể lại một lần nữa phát triển thịnh vượng."

["Faction.Folktails.WonderCompletionMessage"]
raw = "Chúc mừng! Bạn đã nắm vững các phương thức hướng về thiên nhiên của Folktails và sử dụng tài nguyên của bản đồ này để xây dựng kỳ quan của phe."
status = "normal"
enUS = "Congratulations! You have mastered the Folktails' nature-oriented methods and used the resources on this map to build the faction's wonder."
zhCN = "恭喜！你已经掌握 Folktails 的自然导向方法，并使用本地图的资源来建造该派系的奇迹。"
zhTW = "恭喜！你已掌握 Folktails 的自然取向方法，並利用此地圖的資源建造該派系的奇觀。"
ruRU = "Поздравляем! Вы освоили природоориентированные методы Folktails и используете ресурсы этой карты, чтобы построить чудо фракции."
jaJP = "おめでとう！フォークテイルズの自然志向の手法を習得し、このマップの資源を活用して陣営のワンダーを建設しました。"
frFR = "Félicitations ! Vous avez maîtrisé les méthodes axées sur la nature des Folktails et utilisé les ressources de cette carte pour construire la merveille de la faction."
deDE = "Herzlichen Glückwunsch! Du hast die naturverbundenen Methoden der Folktails gemeistert und die Ressourcen dieser Karte genutzt, um das Fraktionswunder zu errichten."
plPL = "Gratulacje! Opanowałeś metody nastawione na naturę Folktails i wykorzystałeś zasoby tej mapy, aby zbudować cud frakcji."
ptBR = "Parabéns! Você dominou os métodos voltados para a natureza dos Folktails e utilizou os recursos deste mapa para construir a maravilha da facção."
koKR = "축하합니다! Folktails의 자연 친화적 방법을 숙달했고 이 지도에서 얻은 자원을 활용해 진영의 경이로움을 건설했습니다."
csCZ = "Gratuluji! Ovládli jste Folktails přírodní způsoby a využili zdroje této mapy k vybudování zázraku vaší frakce."
viVN = "Chúc mừng! Bạn đã nắm vững các phương thức hướng về thiên nhiên của Folktails và sử dụng tài nguyên của bản đồ này để xây dựng kỳ quan của phe."

["Faction.IronTeeth.Description"]
raw = "Những kẻ đào ngũ khỏi các phương thức gỗ truyền thống, họ đã thành thạo sắt và khoa học để chế tạo máy móc tiên tiến.\n"
status = "normal"
enUS = "Those who defect from traditional woodworking methods have mastered iron and science to forge advanced machinery."
zhCN = "那些背离传统木材工法的人，他们已经精通铁与科学，制造出先进的机械。"
zhTW = "那些背離傳統木材加工方法的人，他們已經精通鐵與科學，以製造先進的機械。"
ruRU = "Те, кто дезертировали от традиционных методов обработки древесины, освоили железо и науку, чтобы создавать передовую технику."
jaJP = "従来の木材製法から脱却した者たちは、鉄と科学を駆使して先進的な機械を作り出す。"
frFR = "Ceux qui se sont éloignés des méthodes traditionnelles du travail du bois ont maîtrisé le fer et la science pour fabriquer des machines avancées."
deDE = "Diejenigen, die sich von den traditionellen Holzverarbeitungsmethoden abgewandt haben, beherrschen Eisen und Wissenschaft, um fortschrittliche Maschinen zu konstruieren."
plPL = "Ci, którzy odwrócili się od tradycyjnych drewnianych metod, opanowali żelazo i naukę, aby konstruować zaawansowane maszyny."
ptBR = "Aqueles que desertaram dos métodos tradicionais de madeira dominaram o ferro e a ciência para fabricar máquinas avançadas."
koKR = "전통적인 목재 방식에서 벗어난 자들, 그들은 쇠와 과학에 능숙해져 최첨단 기계를 제조한다."
csCZ = "Ti, kdo se odklonili od tradičních dřevěných metod, ovládli železo a vědu, aby vyráběli pokročilá zařízení."
viVN = "Những kẻ đào ngũ khỏi các phương thức gỗ truyền thống, họ đã thành thạo sắt và khoa học để chế tạo máy móc tiên tiến."

