["Saving.SemiCompatibleSaveVersion"]
raw = "Phiên bản save ({0}) không tương thích với phiên bản hiện tại ({1}). Việc load nó có thể gây ra lỗi crash và các vấn đề phá hỏng game. Chúng tôi đặc biệt khuyên bạn nên bắt đầu một game mới để tận hưởng đầy đủ các tính năng mới. \n"
status = "normal"
enUS = "The save version ({0}) is not compatible with the current version ({1}). Loading it may cause crashes and game corruption. We strongly recommend starting a new game to fully enjoy all the new features."
zhCN = "保存版本（{0}）与当前版本（{1}）不兼容。加载它可能会导致崩溃和游戏损坏的问题。我们强烈建议您开始一个新游戏，以充分享受所有新功能。"
zhTW = "存檔版本 ({0}) 與當前版本 ({1}) 不相容。載入它可能導致崩潰以及破壞遊戲的問題。我們特別建議您開始一個新遊戲，以充分享受新的功能。"
ruRU = "Версия сохранения ({0}) несовместима с текущей версией ({1}). Загрузка может привести к сбоям и повреждению игры. Мы настоятельно рекомендуем вам начать новую игру, чтобы полностью воспользоваться всеми новыми возможностями."
jaJP = "セーブデータのバージョン ({0}) は現在のバージョン ({1}) と互換性がありません。これをロードするとクラッシュの発生やゲームの破損といった問題を引き起こす可能性があります。新機能を十分に楽しむために、新しいゲームを開始することを特にお勧めします。"
frFR = "La version de sauvegarde ({0}) n'est pas compatible avec la version actuelle ({1}). Le chargement peut provoquer des plantages et des problèmes qui endommagent le jeu. Nous vous recommandons particulièrement de commencer une nouvelle partie pour profiter pleinement des nouvelles fonctionnalités."
deDE = "Die Version des Spielstands ({0}) ist nicht mit der aktuellen Version ({1}) kompatibel. Das Laden davon kann zu Abstürzen und Problemen führen, die das Spiel beschädigen. Wir empfehlen dringend, ein neues Spiel zu beginnen, um alle neuen Funktionen vollständig zu genießen."
plPL = "Wersja zapisu ({0}) niekompatybilna z obecną wersją ({1}). Ładowanie go może spowodować awarie oraz problemy z uszkodzeniem gry. Szczególnie zalecamy rozpoczęcie nowej gry, aby w pełni cieszyć się nowymi funkcjami."
ptBR = "A versão de salvamento ({0}) não é compatível com a versão atual ({1}). Carregar esse salvamento pode causar travamentos e problemas que corrompem o jogo. Recomendamos especialmente que você inicie um novo jogo para aproveitar plenamente os novos recursos."
koKR = "저장 버전 ({0})은 현재 버전 ({1})과 호환되지 않습니다. 이를 로드하면 충돌(crash) 오류가 발생하거나 게임이 손상될 수 있습니다. 새로운 기능을 충분히 즐기려면 새로운 게임을 시작하는 것이 좋습니다."
csCZ = "Verze uloženého souboru ({0}) není kompatibilní s aktuální verzí ({1}). Načtení tohoto souboru může způsobit pády a problémy s poškozením hry. Důrazně doporučujeme začít novou hru, abyste si mohli plně užít všechny nové funkce."
viVN = "Phiên bản lưu ({0}) không tương thích với phiên bản hiện tại ({1}). Việc tải nó có thể gây ra lỗi crash và các vấn đề phá hỏng trò chơi. Chúng tôi đặc biệt khuyên bạn nên bắt đầu một game mới để tận hưởng đầy đủ các tính năng mới."

