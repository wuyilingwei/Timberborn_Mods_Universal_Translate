["PlayerData.CorruptedDataInfo.Header"]
raw = "Đã xảy ra sự cố khi đọc tệp người chơi của bạn. Chúng tôi đã khôi phục nội dung từ bản sao lưu cục bộ, nhưng một số chi tiết (bao gồm các phe phái đã mở khóa và bản đồ đã hoàn thành) có thể đã bị mất."
status = "normal"
enUS = "There was a problem reading your player data file. We have restored content from a local backup, but some details (including unlocked factions and completed maps) may have been lost."
zhCN = "读取您的玩家数据文件时发生了错误。我们已从本地备份中恢复内容，但某些细节（包括已解锁的派系和已完成的地图）可能已丢失。"
zhTW = "在讀取您的玩家檔案時發生了問題。 我們已從本地備份還原內容，但某些細節（包括已解鎖的派系與已完成的地圖）可能已遺失。"
ruRU = "Возникла ошибка при чтении вашего файла данных игрока. Мы восстановили содержимое из локального резервного копирования, но некоторые детали (включая разблокированные фракции и пройденные карты) могли быть потеряны."
jaJP = "プレイヤーのデータファイルの読み込み時に問題が発生しました。ローカルのバックアップから内容を復元しましたが、開放済みの派閥やクリア済みのマップを含むいくつかの詳細が失われている可能性があります。"
frFR = "Un problème est survenu lors de la lecture de votre fichier joueur. Nous avons restauré le contenu à partir de la sauvegarde locale, mais certains détails (y compris les factions déverrouillées et les cartes terminées) pourraient avoir été perdus."
deDE = "Beim Lesen Ihrer Spielerdaten ist ein Fehler aufgetreten. Wir haben den Inhalt aus einem lokalen Backup wiederhergestellt, aber einige Details (einschließlich der freigeschalteten Fraktionen und der abgeschlossenen Karten) könnten verloren gegangen sein."
plPL = "Wystąpił problem podczas odczytu pliku danych gracza. Przywróciliśmy zawartość z lokalnej kopii zapasowej, ale niektóre szczegóły (w tym odblokowane frakcje i ukończone mapy) mogły zostać utracone."
ptBR = "Ocorreu um problema ao ler o seu arquivo de jogador. Nós restauramos o conteúdo a partir de um backup local, mas alguns detalhes (incluindo as facções desbloqueadas e os mapas concluídos) podem ter sido perdidos."
koKR = "플레이어 데이터 파일을 읽는 도중 문제가 발생했습니다. 로컬 백업에서 내용을 복구했지만 일부 세부 정보(잠금 해제된 파벌 및 완료된 맵 포함)가 손실되었을 수 있습니다."
csCZ = "Došlo k chybě při čtení souboru hráče. Obnovili jsme obsah z místní zálohy, ale některé detaily (včetně odemčených frakcí a dokončených map) mohly být ztraceny."
viVN = "Đã xảy ra sự cố khi đọc tệp người chơi của bạn. Chúng tôi đã khôi phục nội dung từ bản sao lưu cục bộ, nhưng một số chi tiết (bao gồm các phe phái đã mở khóa và bản đồ đã hoàn thành) có thể đã bị mất."

