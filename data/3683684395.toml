deDE = "\"Ihr werdet sie anflehen müssen, wenn die Dürre eintritt.\" — Ma' Ngonel"
plPL = "\"Będziecie musieli ich błagać, gdy nadejdzie susza.\" — Ma' Ngonel"
ptBR = "\"Vocês terão que implorá-los quando ocorrer a seca.\" — Ma' Ngonel"
