enUS = "Use the Planting Tool and Brush to plant some birch trees. They grow fast, making them a good choice for a newly established settlement."
zhCN = "使用种树和灌木工具来种植一些桦树。它们生长迅速，是新成立定居点的一个不错选择。"
zhTW = "使用種植樹木與灌木的工具來種植一些白樺樹。它們生長得很快，對新建立的聚落是個不錯的選擇。"
ruRU = "Используйте инструмент посадки деревьев и кустарников, чтобы посадить несколько берез. Они растут быстро и являются хорошим выбором для недавно основанного поселения."
jaJP = "植樹ツールと茂みツールを使ってシラカバの木をいくつか植えます。シラカバの木は成長が速く、新しく設立された居住区には良い選択肢です。"
frFR = "Utilisez l'outil Plantation d'arbres et l'outil Arbustes pour planter quelques bouleaux. Ils poussent rapidement, un bon choix pour une nouvelle colonie."
deDE = "Verwenden Sie das Werkzeug zum Pflanzen von Bäumen und das Werkzeug zum Pflanzen von Büschen, um Birken zu pflanzen. Sie wachsen schnell und sind eine gute Wahl für eine neu gegründete Siedlung."
plPL = "Użyj narzędzia do sadzenia drzew i krzewów, aby posadzić kilka brzóz. Rosną szybko i są dobrym wyborem dla nowo założonej osady."
ptBR = "Use a ferramenta de Plantio de Árvores e Arbustos para plantar algumas árvores de bétula. Elas crescem rapidamente e são uma boa opção para um novo assentamento recém-criado."
koKR = "나무 심기 도구와 관목 도구를 사용하여 자작나무를 몇 그루 심으세요. 자작나무는 빨리 자라며 새로 설립된 정착지에 적합한 선택입니다."
csCZ = "Použijte nástroj pro sázení stromů a keřů a vysaďte několik bříz. Rostou rychle a jsou dobrou volbou pro nově založené sídlo."
