["Building.LargeTank.FlavorDescription"]
raw = "Bất chấp nỗ lực của các hải ly con cố gắng dùng nó làm hồ bơi, bể này được thiết kế cho mục đích công nghiệp."
status = "normal"
enUS = "Despite the beaver pups' efforts to use it as a swimming pool, this tank is designed for industrial purposes."
zhCN = "尽管幼崽海狸们试图把它当成游泳池，这个水罐却是为工业用途而设计的。"
zhTW = "儘管年幼的河狸努力把它當成游泳池使用，這個大型儲罐是為工業用途而設計的。"
ruRU = "Несмотря на усилия молодых бобров, пытающихся использовать его как плавательный бассейн, этот бак предназначен для промышленных целей."
jaJP = "若いビーバーたちがそれをプールとして使おうとする努力にもかかわらず、このタンクは産業用に設計されています。"
frFR = "Malgré les efforts des jeunes castors pour s'en servir comme piscine, ce réservoir a été conçu à des fins industrielles."
deDE = "Trotz der Bemühungen der jungen Biber, es als Schwimmbad zu nutzen, ist dieses Becken für industrielle Zwecke konzipiert."
plPL = "Pomimo wysiłków młodych bobrów próbujących użyć go jako basenu, ten zbiornik został zaprojektowany do celów przemysłowych."
ptBR = "Apesar dos esforços dos filhotes de castores para usá-lo como piscina, este tanque foi projetado para fins industriais."
