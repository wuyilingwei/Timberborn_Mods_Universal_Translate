["NaturalResource.Maple.FlavorDescription"]
raw = "Cây phong lấy nhựa tạo ra xi-rô nhưng gỗ chất lượng cao là phần thưởng thậm chí còn ngọt ngào hơn."
status = "normal"
enUS = "Maple trees yield sap to make syrup, but high-quality timber is an even sweeter reward."
zhCN = "枫树通过采树液来生产糖浆，但高质量的木材才是更甜美的奖励。"
zhTW = "楓樹採集樹液以製成糖漿，但高品質木材的獎勵更甜美。"
