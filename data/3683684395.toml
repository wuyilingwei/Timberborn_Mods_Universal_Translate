frFR = "Équilibré, renforcé et façonné à la perfection au fil de nombreuses générations d'ingénieurs hydrauliques castors, ce n'est pas seulement un bloc de bois."
deDE = "Ausbalanciert, verstärkt und perfekt geformt über viele Generationen von Biber-Hydraulikingenieuren, ist dies nicht \"nur ein Stück Holz\"."
plPL = "Zrównoważony, wzmocniony i doskonale ukształtowany przez wiele pokoleń inżynierów hydrotechnicznych bobrów, to nie jest \"tylko kawałek drewna\"."
