["Building.BreedingPod.FlavorDescription"]
raw = "\"Hải ly con là tương lai của chúng ta. Chúng ta cần thêm mười hai con vào tháng tới.\" —Ol' Kazko"
status = "normal"
enUS = "Beaver kits are our future. We need twelve more of them next month. —Ol' Kazko"
zhCN = "\"幼海狸是我们的未来。我们下个月需要再来十二只。\" —Ol' Kazko"
zhTW = "\"海狸幼崽是我們的未來。我們下個月需要再增加十二隻海狸。\" —Ol' Kazko"
ruRU = "\"Маленький бобер — наше будущее. Нам нужно еще двенадцать в следующем месяце.\" —Старый Казко"
