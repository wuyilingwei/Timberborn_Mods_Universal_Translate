koKR = "농민을 고용해 작물을 심고 수확합니다. Folktails 설계가 더 많은 농민을 수용하도록 확장되었습니다."
csCZ = "Najměte farmáře, aby pěstovali a sklívali plodiny. Design Folktails se rozšiřuje a vyhovuje většímu počtu farmářů."
viVN = "Thuê nông dân để trồng và thu hoạch cây trồng. Thiết kế Folktails mở rộng phù hợp với nhiều nông dân hơn."

