["MapMetadata.Cliffside.Description"]
raw = "Phế tích kiến trúc hooman cổ đại nằm rải rác khắp thung lũng hẻo lánh này. Loài hải ly khao khát để lại một dấu ấn tương tự trên thế giới."
status = "normal"
enUS = "The ruins of ancient Hooman architecture lie scattered across this desolate valley. The beavers long to leave a similar mark on the world."
zhCN = "散布在这片荒凉山谷各处的古代人类建筑废墟。海狸族渴望在这个世界上留下类似的印记。"
zhTW = "散佈在這座荒涼山谷中的古代人類建築遺跡。海狸族渴望在這個世界上留下類似的印記。"
ruRU = "Руины древней человеческой архитектуры разбросаны по всей этой пустынной долине. Этот вид бобров стремится оставить такой же след в мире."
jaJP = "この寂れた谷のあちこちには、古代の人間の建築の遺跡が散らばっている。この世界にも同様の痕跡を残したいと願うビーバーたち。"
frFR = "Les ruines de l'architecture humaine ancienne jonchent cette vallée reculée. Les castors aspirent à laisser une empreinte similaire dans le monde."
deDE = "Die Ruinen der antiken Hooman-Architektur liegen verstreut über dieses abgelegene Tal. Die Biber sehnen sich danach, der Welt eine ähnliche Spur zu hinterlassen."
plPL = "Ruiny starożytnej architektury hoomanów leżą porozrzucane po całej tej opustoszałej dolinie. Wydry pragną zostawić podobny ślad na świecie."
ptBR = "Ruínas da arquitetura humana antiga estão espalhadas por todo este vale remoto. Os castores anseiam deixar uma marca semelhante no mundo."
koKR = "고대 휴먼의 건축 잔해가 이 황량한 골짜기 곳곳에 흩어져 있다. 비버 무리는 세상에 비슷한 흔적을 남기고자 한다."
csCZ = "Dávné lidské architektonické ruiny leží roztroušené po celém tom opuštěném údolí. Druh bobrů touží zanechat na světě podobnou stopu."
viVN = "Phế tích kiến trúc hooman cổ đại nằm rải rác khắp thung lũng hẻo lánh này. Loài hải ly khao khát để lại một dấu ấn tương tự trên thế giới."

