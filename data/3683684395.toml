["Building.GreaseFactory.FlavorDescription"]
raw = "\"Chà, một bot có thể có hệ thống, thủy lực... Tại sao nó không thể được bôi trơn?\" —Ol' Kazko"
status = "normal"
enUS = "\"Well, a bot could have a system, hydraulics... Why can't it be lubricated?\" —Ol' Kazko"
