["NaturalResource.Pine.FlavorDescription"]
raw = "\"Ôi, rừng xanh vĩ đại, ta nhớ người biết bao!\" — Một nhà thơ hải ly vô danh"
status = "normal"
enUS = "\"Oh, mighty green forest, how I miss you so much!\" — An anonymous otter poet"
