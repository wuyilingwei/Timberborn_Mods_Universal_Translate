["Building.LumberMill.FlavorDescription"]
raw = "Được Ol' Kazko khuyến khích, việc chế biến gỗ cơ giới hóa đã gây ra nhiều sự nghiến răng giữa các hải ly lớn tuổi."
status = "normal"
enUS = "Encouraged by Ol' Kazko, the mechanization of wood processing has caused much gnashing of teeth among the elder beavers."
zhCN = "在 Ol' Kazko 的鼓励下，木材加工的机械化在年长的海狸之间引发了许多咬牙切齿的抱怨。"
zhTW = "在 Ol' Kazko 的鼓勵下，木材加工機械化的推行讓年長的海狸們頗為咬牙切齒。"
