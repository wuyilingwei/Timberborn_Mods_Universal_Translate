frFR = "Encouragé par Ol' Kazko, la mécanisation du travail du bois a provoqué de nombreuses dents qui grincent chez les castors âgés."
deDE = "Ermutigt von Ol' Kazko hat die mechanisierte Holzbearbeitung bei den älteren Bibern zu zahlreichen Zähneknirschen geführt."
