["NaturalResource.Carrot.FlavorDescription"]
raw = "Cà rốt sống giúp hải ly cân bằng chế độ ăn mà không từ bỏ niềm vui nhai giòn."
status = "normal"
enUS = "Raw carrots help beavers balance their diet without sacrificing the joy of crunching."
zhCN = "生胡萝卜帮助海狸保持均衡饮食，同时不放弃咀嚼的乐趣。"
zhTW = "生胡蘿蔔有助於海狸平衡飲食，同時不放棄咀嚼脆脆的樂趣。"
ruRU = "Сырая морковь помогает бобру сбалансировать рацион, не отказываясь от удовольствия хруста."
jaJP = "生のにんじんはビーバーの食事バランスを整え、カリカリと噛む楽しみを手放さずに済む。"
frFR = "Les carottes crues aident le castor à équilibrer son régime alimentaire sans renoncer au plaisir de croquer."
deDE = "Eine rohe Karotte hilft dem Biber, seine Ernährung im Gleichgewicht zu halten, ohne auf den knusprigen Kaugenuss zu verzichten."
plPL = "Surowa marchewka pomaga bóbrowi utrzymać zrównoważoną dietę, nie rezygnując z przyjemności chrupania."
ptBR = "Cenoura crua ajuda o castor a equilibrar a dieta sem abrir mão do prazer de mastigar algo crocante."
koKR = "생당근은 비버가 식단의 균형을 이루도록 돕고 바삭하게 씹는 즐거움을 포기하지 않게 해준다."
csCZ = "Syrová mrkev pomáhá bobrům udržet vyvážený jídelníček, aniž by se vzdali radosti z křupání."
viVN = "Cà rốt sống giúp hải ly cân bằng chế độ ăn mà không từ bỏ niềm vui nhai giòn."

