["Tutorial.Wood.ConnectLumberjacks"]
raw = "Mọi tòa nhà có lối vào phải được kết nối với Trung tâm Quận bằng một Con đường. Khi bạn chọn một tòa nhà, bạn có thể thấy lối vào của nó được đánh dấu bằng một mũi tên.\n"
status = "normal"
enUS = "Every building with an entrance must be connected to the District Center by a road.\nWhen you select a building, you can see its entrance marked by an arrow."
zhCN = "所有有入口的建筑都必须通过一条道路与区中心连接。当你选择一座建筑时，你可以看到它的入口被一个箭头标记。"
zhTW = "所有有入口的建築都必須通過一條道路與區域中心相連。當你選擇一座建築時，你可以看到它的入口被一個箭頭標示。"
ruRU = "Каждое здание с входом должно быть соединено дорогой с районным центром. Когда вы выбираете здание, вы можете увидеть его вход, помеченный стрелкой."
jaJP = "入口を持つすべての建物は、道路を介して地区センターと接続されていなければならない。建物を選択すると、その入口が矢印で示されているのが見えます。"
frFR = "Tous les bâtiments dotés d'une entrée doivent être reliés au Centre du district par une route. Lorsque vous sélectionnez un bâtiment, vous pouvez voir son entrée marquée par une flèche."
deDE = "Jedes Gebäude mit einem Eingang muss durch eine Straße mit dem Bezirkszentrum verbunden sein. Wenn Sie ein Gebäude auswählen, können Sie sehen, dass sein Eingang durch einen Pfeil gekennzeichnet ist."
plPL = "Wszystkie budynki z wejściem muszą być połączone z Centrum Dzielnicy jedną drogą. Gdy wybierzesz budynek, możesz zobaczyć, że jego wejście jest oznaczone strzałką."
ptBR = "Toda construção com entrada deve ser conectada ao Centro do Distrito por uma estrada.\nAo selecionar um edifício, você pode ver a entrada dele marcada com uma seta."
koKR = "모든 입구가 있는 건물은 도로를 통해 구역 센터와 연결되어 있어야 합니다. \n건물을 선택하면 그 입구가 화살표로 표시된 것을 볼 수 있습니다."
csCZ = "Každá budova s vchodem musí být připojena k Okresnímu centru jednou cestou. Když vyberete budovu, uvidíte její vchod označený šipkou.\n"
viVN = "Mọi tòa nhà có lối vào phải được kết nối với Trung tâm Quận bằng một Con đường. Khi bạn chọn một tòa nhà, bạn có thể thấy lối vào của nó được đánh dấu bằng một mũi tên."

