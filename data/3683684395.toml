["Building.SmallTank.FlavorDescription"]
raw = "Học cách tiết kiệm từng giọt nước đã giúp hải ly thích nghi với môi trường khắc nghiệt."
status = "normal"
enUS = "Learning to conserve every drop of water has helped beavers adapt to harsh environments."
