plPL = "\"Stare drewno jest najlepsze. Oni uprawiali to inaczej wtedy.\" —Ma' Ngonel"
ptBR = "\"A madeira velha é a melhor. Eles a plantavam de forma diferente naquela época.\" —Ma' Ngonel"
