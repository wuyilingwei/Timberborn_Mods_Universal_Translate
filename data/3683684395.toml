raw = "Phiên bản bản đồ này ({0}) không tương thích với phiên bản game hiện tại ({1}). Bắt đầu game trên bản đồ này có thể dẫn đến crash, bạn có thể gặp các bug game nghiêm trọng, và một số tài nguyên mới quan trọng có thể bị thiếu. Chúng tôi đặc biệt khuyên bạn nên cập nhật bản đồ để tận hưởng đầy đủ các tính năng mới. \n"
status = "normal"
enUS = "This map version ({0}) is not compatible with the current game version ({1}). Starting a game on this map may crash, you may encounter serious game bugs, and some important new resources may be missing. We strongly recommend updating the map to fully enjoy the new features."
zhCN = "该地图版本（{0}）与当前游戏版本（{1}）不兼容。 在该地图上开始游戏可能导致崩溃，您可能会遇到严重的游戏漏洞，一些新的重要资源可能会缺失。 我们特别建议您更新地图，以充分体验所有新功能。"
zhTW = "此地圖版本 ({0}) 與當前遊戲版本 ({1}) 不相容。在此地圖上開始遊戲可能導致崩潰，您可能會遇到嚴重的遊戲錯誤，且某些重要的新資源可能會缺失。我們特別建議您更新地圖，以充分享受全部新功能。"
ruRU = "Версия этой карты ({0}) несовместима с текущей версией игры ({1}). Запуск игры на этой карте может привести к вылету, вы можете столкнуться с серьёзными игровыми ошибками, и некоторые важные новые ресурсы могут отсутствовать. Мы настоятельно рекомендуем обновить карту, чтобы полноценно насладиться всеми новыми возможностями."
jaJP = "このマップのバージョン（{0}）は現在のゲームバージョン（{1}）と互換性がありません。 このマップでゲームを開始するとクラッシュを引き起こす可能性があり、重大なゲームバグに遭遇することがあり、新しい重要なリソースの一部が欠落している可能性もあります。 私たちは特に、新機能を完全に楽しむためにマップを更新することを強くお勧めします。"
frFR = "La version de cette carte ({0}) n'est pas compatible avec la version actuelle du jeu ({1}). Lancer le jeu sur cette carte peut provoquer un plantage, vous pourriez rencontrer des bugs graves du jeu, et certaines ressources nouvelles importantes pourraient être manquantes. Nous vous recommandons particulièrement de mettre à jour la carte pour profiter pleinement des nouvelles fonctionnalités."
deDE = "Diese Kartenversion ({0}) ist nicht mit der aktuellen Spielversion ({1}) kompatibel. Das Starten des Spiels auf dieser Karte kann zu Abstürzen führen. Dabei könnten Sie schwerwiegende Spielfehler erleben, und einige neue wichtige Ressourcen könnten fehlen. Wir empfehlen Ihnen ausdrücklich, die Karte zu aktualisieren, um alle neuen Funktionen vollständig zu genießen."
plPL = "Wersja tej mapy ({0}) nie jest zgodna z obecną wersją gry ({1}). Uruchomienie gry na tej mapie może prowadzić do awarii gry, możesz napotkać poważne błędy w grze, a niektóre nowe istotne zasoby mogą być niedostępne. Zdecydowanie zalecamy zaktualizowanie mapy, aby w pełni cieszyć się nowymi funkcjami."
ptBR = "A versão deste mapa ({0}) não é compatível com a versão atual do jogo ({1}). Iniciar o jogo neste mapa pode levar a travamentos; você pode encontrar bugs graves no jogo e alguns recursos novos importantes podem estar ausentes. Recomendamos especialmente que você atualize o mapa para aproveitar ao máximo as novas funcionalidades."
koKR = "이 맵 버전 ({0})은 현재 게임 버전 ({1})과 호환되지 않습니다. 이 맵에서 게임을 시작하면 충돌이 발생할 수 있으며 심각한 게임 버그를 경험할 수 있고 일부 중요한 신규 자원이 누락될 수 있습니다. 특히 새로운 기능을 완전히 활용하려면 맵을 업데이트하시길 권장드립니다."
csCZ = "Verze této mapy ({0}) není kompatibilní s aktuální verzí hry ({1}). Spuštění hry na této mapě může vést k pádu, můžete narazit na vážné herní chyby a některé důležité nové zdroje mohou chybět. Zvláště doporučujeme aktualizovat mapu, abyste si plně užili všechny nové funkce."
viVN = "Phiên bản bản đồ này ({0}) không tương thích với phiên bản trò chơi hiện tại ({1}). Bắt đầu trò chơi trên bản đồ này có thể dẫn đến treo máy, bạn có thể gặp các lỗi nghiêm trọng trong trò chơi, và một số tài nguyên mới quan trọng có thể bị thiếu. Chúng tôi đặc biệt khuyên bạn nên cập nhật bản đồ để tận hưởng đầy đủ các tính năng mới."

