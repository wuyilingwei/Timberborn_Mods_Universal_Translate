jaJP = "作物を栽培して収穫する農民を雇う。Folktailsデザインは、より多くの農民に対応できるよう拡張されました。"
frFR = "Engager des paysans pour planter et récolter les cultures. Le design Folktails s'élargit pour accueillir davantage de paysans."
deDE = "Landwirte einstellen, um Pflanzen anzubauen und zu ernten. Das Folktails-Design wurde erweitert, um mehr Landwirte aufzunehmen."
plPL = "Zatrudnij rolników do sadzenia i zbioru upraw. Projekt Folktails został rozszerzony, aby pasować do większej liczby rolników."
