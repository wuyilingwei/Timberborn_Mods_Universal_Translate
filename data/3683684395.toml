["MapMetadata.Spillage.Description"]
raw = "Dốc này đầy những vùng đất nhỏ được tưới tiêu. Tuy nhiên, nguy hiểm tràn ngập trong khu vực - nếu bạn không cẩn thận, những khu vực đó sẽ trở nên không hề hiếu khách."
status = "normal"
enUS = "This slope is full of small, irrigated plots. However, danger is rampant in the area—if you're not careful, those areas will become unwelcoming."
zhCN = "这坡地上满是被灌溉的小块土地。然而，该区域充满危险——如果你不小心，那些区域将变得毫不友好。"
zhTW = "這條坡道滿是被灌溉的小田地。不過，該區域危險四伏——若你不小心，這些區域就會變得完全不友好。"
ruRU = "Этот склон полон небольших участков земли, которые орошаются. Однако в этой области повсюду опасность — если вы не будете осторожны, эти участки станут совсем недружелюбными."
jaJP = "この斜面には灌漑された小さな畑がたくさんあります。しかし、この地域には危険がはびこっています。もし注意を怠ると、それらの区域は訪れる人にはまったく歓迎されなくなる。"
frFR = "Cette pente regorge de petites parcelles irriguées. Cependant, le danger est omniprésent dans la zone - si vous n'êtes pas prudent, ces zones deviendront hostiles."
deDE = "Dieser Hang ist voller kleiner, bewässerter Parzellen. Allerdings wimmelt es in dem Gebiet vor Gefahren – wenn du nicht vorsichtig bist, werden diese Flächen alles andere als gastfreundlich."
plPL = "Na tym stoku znajduje się wiele małych działek nawadnianych. Jednak w tym obszarze czai się niebezpieczeństwo - jeśli nie będziesz ostrożny, te obszary staną się nieprzyjazne."
ptBR = "Esta encosta está cheia de pequenos lotes irrigados. No entanto, perigos abundam na região - se você não tomar cuidado, essas áreas ficarão completamente hostis."
koKR = "이 경사면은 관개된 작은 밭들로 가득 차 있습니다. 그러나 이 지역에는 위험이 만연합니다. 조심하지 않으면 그 지역들은 더 이상 친절하지 않게 될 것입니다."
csCZ = "Tento svah je plný malých zavlažovaných polí. Nicméně v této oblasti panuje nebezpečí - pokud nebudete opatrní, tato místa se stanou zcela nehostinnými."
viVN = "Dốc này đầy những vùng đất nhỏ được tưới tiêu. Tuy nhiên, nguy hiểm tràn ngập trong khu vực - nếu bạn không cẩn thận, những khu vực đó sẽ trở nên không hề hiếu khách."

