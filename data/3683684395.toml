["Building.LaborerMonument.FlavorDescription"]
raw = "Ngay cả sau khi lao động thủ công nhường chỗ cho công nghiệp hóa, tinh thần làm việc của Iron Teeth vẫn không thay đổi."
status = "normal"
enUS = "Even after manual labor gave way to industrialization, the Iron Teeth's work ethic remains unchanged."
zhCN = "即使手工劳动让位于工业化，铁牙的勤奋精神仍然没有改变。"
zhTW = "即便在手工勞動讓位於工業化之後，鐵牙的工作精神仍然未改變。"
