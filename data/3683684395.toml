["Building.Ruins.FlavorDescription"]
raw = "Rải rác khắp vùng đất, những tàn tích đổ nát của con người đã mang lại cho hải ly những thứ không tưởng - một nguyên liệu tốt hơn gỗ."
status = "normal"
enUS = "Scattered across the land, the ruined remnants of humanity have brought to beavers unimaginable things - a material better than wood."
zhCN = "散布在整片土地上的人类残垣断壁已经给河狸带来了难以想象的东西——一种比木头更好的材料。"
zhTW = "散布在整片土地上，人類的廢墟與殘骸為海狸帶來了難以想像的東西 - 一種比木材更好的原料。"
ruRU = "Разбросанные по всей земле руины человечества принесли бобрам невообразимые вещи - материал лучше дерева."
jaJP = "大地のあちこちに散らばる人類の廃墟は、ビーバーにとって想像を絶するものをもたらした――木材よりも優れた素材だ。"
frFR = "Éparpillés un peu partout sur la terre, les ruines de l'humanité ont apporté aux castors des choses inimaginables - un matériau meilleur que le bois."
deDE = "Über die ganze Landschaft verstreut haben die verfallenen Ruinen der Menschheit den Bibern unvorstellbare Dinge gebracht – ein Material, das besser ist als Holz."
plPL = "Rozrzucone po całej ziemi, ruiny ludzkie przyniosły bobrom rzeczy, które wydają się nie do pomyślenia - materiał lepszy niż drewno."
ptBR = "Espalhadas por toda a região, as ruínas desmoronadas da humanidade trouxeram aos castores coisas inimagináveis - um material melhor do que madeira."
koKR = "대지 곳곳에 흩어져 있는 인간의 폐허가 비버들에게 상상도 못할 것들을 가져다주었다 - 목재보다 더 좋은 원료가 되었다."
csCZ = "Rozeseté po celém území, rozpadlé trosky lidstva přinesly bobrům věci, které si nedovedli představit - lepší surovina než dřevo."
viVN = "Rải rác khắp vùng đất, những tàn tích đổ nát của con người đã mang lại cho hải ly những thứ không tưởng - một nguyên liệu tốt hơn gỗ."

["Building.Scarecrow.Description"]
raw = "Một vật trang trí đồng ruộng từng dùng để xua đuổi chim giờ đây mang lại niềm vui cho cả người già và trẻ nhỏ."
status = "normal"
enUS = "A field decoration once used to scare away birds now brings joy to the elderly and children alike."
zhCN = "一件田野装饰品，曾被用来驱赶鸟儿，如今为老人和孩子带来快乐。"
zhTW = "一件田間裝飾物，曾用來驅逐鳥兒，如今為長者與孩童帶來歡樂。"
ruRU = "Пугало, ранее служившее украшением поля и отпугивавшее птиц, теперь приносит радость и взрослым, и детям."
jaJP = "鳥を追い払うために使われていた畑の飾りが、今では高齢者も子どもも喜ばせるものとなっている。"
frFR = "Un objet décoratif destiné aux champs qui servait autrefois à repousser les oiseaux apporte désormais de la joie à la fois aux personnes âgées et aux enfants."
deDE = "Ein landwirtschaftliches Dekorationsobjekt, das einst dazu diente, Vögel zu vertreiben, bringt heute Freude für Groß und Klein."
plPL = "Ta dekoracja pól uprawnych, która kiedyś służyła do odstraszania ptaków, teraz przynosi radość zarówno starszym, jak i dzieciom."
ptBR = "Um espantalho, que antes era usado para espantar pássaros, agora traz alegria para os idosos e para as crianças."
koKR = "새를 쫓아내기 위해 한때 사용되었던 농촌의 장식물이 이제 노인과 어린이 모두에게 기쁨을 선사합니다."
csCZ = "Zemědělská dekorace, která bývala používána k odhánění ptáků, dnes přináší radost starším i dětem."
viVN = "Một vật trang trí đồng ruộng từng dùng để xua đuổi chim giờ đây mang lại niềm vui cho cả người già và trẻ nhỏ."

