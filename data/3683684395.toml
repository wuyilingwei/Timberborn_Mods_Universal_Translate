["Faction.IronTeeth.GameOver.Flavor"]
raw = "Đôi khi, bộ phận lỗi nhỏ nhất cũng làm hỏng toàn bộ cỗ máy."
status = "normal"
enUS = "Sometimes, even the smallest faulty part can ruin the entire machine."
zhCN = "有时，即使是最小的故障部件也会毁坏整台机器。"
zhTW = "有時，最微小的故障部件也能毀壞整個機器。"
ruRU = "Иногда даже самая маленькая неисправная деталь может вывести из строя всю машину."
jaJP = "時には、最も小さな欠陥部品が全体の機械を台無しにしてしまうことがある。"
frFR = "Parfois, le plus petit composant défectueux peut endommager toute la machine."
deDE = "Manchmal reicht schon das kleinste fehlerhafte Teil aus, um die gesamte Maschine zu ruinieren."
plPL = "Czasami nawet najmniejsza usterka jednego elementu psuje całą maszynę."
ptBR = "Às vezes, até a menor peça com defeito também estraga toda a máquina."
koKR = "가끔은 가장 작은 고장 난 부품조차도 전체 기계를 망가뜨린다."
csCZ = "Někdy i ten nejmenší vadný díl dokáže zničit celé zařízení."
viVN = "Đôi khi, bộ phận lỗi nhỏ nhất cũng làm hỏng toàn bộ cỗ máy."

["Faction.IronTeeth.GameOver.Message"]
raw = "Khu định cư Iron Teeth của bạn đã sụp đổ mà không có cơ hội phục hồi. Đây là kết thúc."
status = "normal"
enUS = "Your Iron Teeth settlement has collapsed with no chance of recovery. This is the end."
zhCN = "你的铁齿部落定居点已经崩溃，毫无恢复的机会。这就是结局。"
zhTW = "你的鐵牙定居點已經崩潰，沒有恢復的機會。這就是結局。"
ruRU = "Ваше поселение Iron Teeth разрушилось без шанса на восстановление. Это конец."
jaJP = "アイアンティースの拠点は回復の機会もなく崩壊しました。これは終わりです。"
frFR = "Votre colonie des Mâchoires de Fer s'est effondrée sans aucune chance de se relever. C'est la fin."
deDE = "Deine Iron Teeth-Siedlung ist zusammengebrochen, und es gibt keine Chance, sich zu erholen. Das ist das Ende."
plPL = "Twoja osada Żelazne Zęby upadła bez szans na odbudowę. To koniec."
ptBR = "O seu assentamento Iron Teeth desabou sem chance de recuperação. Este é o fim."
koKR = "아이언 티스 정착지는 회복의 기회도 없이 무너졌습니다. 이것이 끝입니다."
csCZ = "Vaše osada Iron Teeth se zhroutila bez šance na zotavení. To je konec."
viVN = "Khu định cư Iron Teeth của bạn đã sụp đổ và không có cơ hội phục hồi. Đây là kết thúc."

["Faction.IronTeeth.WonderCompletionFlavor"]
raw = "Những người tiên phong của bạn đã bay đi qua vùng đất hoang, bỏ lại khu định cư đang phát triển thịnh vượng phía sau. Nếu Trái Đất muốn phục hồi, sự thịnh vượng mới tìm thấy của loài hải ly cần được chia sẻ."
status = "normal"
enUS = "Your pioneers have flown across the wastelands, leaving behind a thriving, developing settlement. If Earth is to recover, the newfound prosperity of the beaver species must be shared."
zhCN = "你们的开拓者已经飞越荒地，留下一个正在繁荣发展的定居点在身后。如果地球想要复兴，海狸族新发现的繁荣需要被分享。"
zhTW = "你們的先鋒已經穿越荒野，留下了一個正在蓬勃發展的聚落在身後。若地球想要復甦，海狸族新找到的繁榮必須被分享。"
ruRU = "Ваши первопроходцы пролетели через пустоши, оставив позади процветующее поселение. Если Земля хочет восстановиться, новое процветание, обнаруженное бобрами, должно быть разделено."
jaJP = "あなたの開拓者たちは荒野を越えて飛び、繁栄する定住地を後にした。地球が回復したいのなら、ビーバーたちが新たに見いだした繁栄は分かち合われるべきだ。"
frFR = "Les pionniers que vous avez envoyés ont traversé des terres désolées, laissant derrière eux une colonie prospère en plein développement. Si la Terre veut se rétablir, la prospérité nouvellement retrouvée des castors doit être partagée."
deDE = "Deine Pioniere sind durch die Ödnis geflogen und haben eine florierende Siedlung hinter sich gelassen. Wenn sich die Erde erholen will, muss der neu gewonnene Wohlstand der Biberart geteilt werden."
plPL = "Twoi pionierzy przelatywali przez pustkowia, zostawiając za sobą rozwijającą się i prosperującą osadę. Jeśli Ziemia ma się odrodzić, nowo odkryty dobrobyt bobrów musi być dzielony."
ptBR = "Seus pioneiros voaram pelo deserto desolado, deixando para trás um assentamento próspero que está se desenvolvendo. Se a Terra quiser se recuperar, a nova prosperidade encontrada pelos castores precisa ser compartilhada."
koKR = "당신의 개척자들이 황량한 땅을 가로질러 날아가 버렸고, 번창하고 발전 중인 정착지를 뒤에 남겨 두었다. 지구가 회복되려면, 비버 종이 새로 찾아낸 번영은 공유되어야 한다."
csCZ = "Vaši průkopníci proletěli pustou krajinou a za sebou zanechali prosperující osadu, která se rozvíjí. Pokud se Země má zotavit, musí být sdílena nově nalezená prosperita druhu bobrů."
viVN = "Những người tiên phong của bạn đã bay đi qua vùng đất hoang, bỏ lại khu định cư đang phát triển thịnh vượng phía sau. Nếu Trái Đất muốn phục hồi, sự thịnh vượng mới tìm thấy của loài hải ly cần được chia sẻ."

["Faction.IronTeeth.WonderCompletionMessage"]
raw = "Tuyệt vời! Năng lực công nghệ của bạn đã cho phép bạn tận dụng sức mạnh công nghiệp của Iron Teeth để chinh phục bản đồ này và xây dựng kỳ quan của phe."
status = "normal"
enUS = "Wonderful! Your technological prowess has allowed you to harness the Iron Teeth's industrial power to conquer this map and build the faction's Wonder."
zhCN = "太棒了！你的科技能力让你能够利用铁牙的工业力量征服这张地图并建造该阵营的奇观。"
zhTW = "太好了！你的科技能力讓你得以利用鐵牙的工業力量征服這張地圖並建造該派的奇觀。"
ruRU = "Замечательно! Ваши технологические способности позволили вам использовать индустриальную мощь Железных Зубов, чтобы покорить эту карту и построить чудо фракции."
jaJP = "素晴らしい！あなたの技術力により、Iron Teeth の産業力を活用してこのマップを征服し、陣営のワンダーを築くことが可能になりました。"
frFR = "Génial ! Votre puissance technologique vous a permis d'exploiter la puissance industrielle des Iron Teeth pour conquérir cette carte et construire la merveille de la faction."
deDE = "Großartig! Deine technologische Fähigkeit hat es dir ermöglicht, die industrielle Kraft der Iron Teeth zu nutzen, um diese Karte zu erobern und das Wunder der Fraktion zu errichten."
plPL = "Wspaniale! Twoja zdolność technologiczna pozwoliła Ci wykorzystać moc przemysłową Żelaznych Zębów, aby opanować tę mapę i zbudować cud tej frakcji."
ptBR = "Ótimo! Sua capacidade tecnológica permitiu que você aproveitasse o poder industrial dos Iron Teeth para conquistar este mapa e construir a maravilha da facção."
koKR = "멋져요! 당신의 기술력이 아이언 티스의 산업력을 활용해 이 지도를 정복하고 파의 경이를 건설할 수 있게 해주었습니다."
csCZ = "Skvělé! Vaše technologické schopnosti vám umožnily využít průmyslovou sílu Iron Teeth k dobytí této mapy a vybudování zázraku frakce."
viVN = "Tuyệt vời! Năng lực công nghệ của bạn đã cho phép bạn tận dụng sức mạnh công nghiệp của Iron Teeth để chinh phục bản đồ này và xây dựng kỳ quan của phe."

