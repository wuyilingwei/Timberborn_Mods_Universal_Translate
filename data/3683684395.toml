["MapMetadata.ThousandIslands.Description"]
raw = "Ngay cả đối với những vận động viên bơi lội bẩm sinh, biến một quần đảo thành một thuộc địa công nghiệp phát triển thịnh vượng cũng không phải là nhiệm vụ dễ dàng."
status = "normal"
enUS = "Even for natural-born swimmers, turning an archipelago into a prosperous, thriving industrial colony is not an easy task."
zhCN = "即使对于天生的游泳健将，将一个群岛打造成繁荣发达的工业殖民地也不是一件容易的任务。"
zhTW = "就算是天生的游泳健將，要把一座群島打造成繁榮發展的工業殖民地，也不是一件容易的任務。"
ruRU = "Даже для прирожденных пловцов превращение архипелага в процветающую индустриальную колонию — задача не из легких."
jaJP = "生まれつき泳ぎが得意な人でさえ、群島を繁栄した工業植民地へ変えることは決して容易な任務ではない。"
frFR = "Même pour des nageurs nés, transformer un archipel en une colonie industrielle prospère et développée n'est pas une tâche facile."
deDE = "Selbst für von Natur aus talentierte Schwimmer ist es nicht einfach, eine Inselgruppe in eine florierende Industrie-Kolonie zu verwandeln."
plPL = "Nawet dla naturalnie utalentowanych pływaków przekształcenie archipelagu w rozwijającą się kolonię przemysłową nie jest łatwym zadaniem."
ptBR = "Mesmo para nadadores natos, transformar um arquipélago em uma colônia industrial próspera e desenvolvida não é uma tarefa fácil."
koKR = "타고난 수영 선수들조차도 한 군도를 번영하는 산업 식민지로 바꾸는 일은 쉽지 않다."
csCZ = "Dokonce i pro nadané plavce není snadné udělat z archipelagu prosperující vyspělou průmyslovou kolonií."
viVN = "Ngay cả đối với những vận động viên bơi lội bẩm sinh, biến một quần đảo thành một thuộc địa công nghiệp phát triển thịnh vượng cũng không phải là nhiệm vụ dễ dàng."

