ptBR = "Estimulado por Ol' Kazko, o processamento mecanizado da madeira tem causado muitos rangidos de dentes entre os castores mais velhos."
koKR = "올 카즈코의 격려로, 목재 가공의 기계화는 나이 든 비버들 사이에서 많은 이들이 이를 악물게 만들었다."
