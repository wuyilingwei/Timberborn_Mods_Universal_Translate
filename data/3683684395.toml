["MapMetadata.Beaverome.Description"]
raw = "Để xây dựng đô thị huyền thoại, tổ tiên của loài hải ly đã rút cạn bảy miệng núi lửa hùng vĩ. Ngay cả với công nghệ gỗ ngày nay, đó cũng không phải là một kỳ tích nhỏ."
status = "normal"
enUS = "To build the legendary city, the beaver ancestors drained seven mighty volcanoes. Even with today’s wood technology, that’s no small feat."
zhCN = "为了建造传说中的城市，海狸的祖先们已经抽干了七座巍峨的火山口。即便凭借如今的木材技术，那也不是一件小小的壮举。"
zhTW = "為了建設傳說中的城市，河狸族的祖先已經排空七座雄偉的火山口。即使以現今的木材科技，那也不是一件小小的奇蹟。"
ruRU = "Чтобы построить легендарный город, предки бобров опустошили семь величественных жерл вулканов. Даже при современной технологии деревообработки это вовсе не маленькое чудо."
jaJP = "伝説の都市を築くために、ビーバーの祖先は七つの雄大な火山口を干上がらせた。現代の木材技術をもってしても、それは小さな偉業とは言えない。"
frFR = "Pour bâtir une cité légendaire, les ancêtres des castors ont asséché sept volcans majestueux. Même avec les technologies du bois d'aujourd'hui, ce n'est pas une mince affaire."
deDE = "Um eine legendäre Stadt zu errichten, haben die Vorfahren des Bibers sieben mächtige Vulkanöffnungen geleert. Selbst mit der heutigen Holztechnologie ist das keine Kleinigkeit."
plPL = "Aby zbudować legendarne miasto, przodkowie bobrów opróżnili siedem potężnych wulkanów. Nawet przy dzisiejszej technologii drewna to nie byle jaki wyczyn."
ptBR = "Para construir uma cidade lendária, os antepassados dos castores drenaram sete bocas de vulcões majestosos. Mesmo com a tecnologia de madeira de hoje, isso não é pouca façanha."
koKR = "전설적인 도시를 건설하기 위해 비버의 조상은 웅장한 일곱 개의 화산 분화구를 모두 비워냈다. 오늘날의 목재 기술로도 그것은 결코 작은 위업이 아니다."
csCZ = "Pro vybudování legendárního města vyprázdnili předkové bobrů sedm majestátních úst sopek. I s dnešními dřevěnými technologiemi to není žádný malý výkon."
viVN = "Để xây dựng đô thị huyền thoại, tổ tiên của loài hải ly đã rút cạn bảy miệng núi lửa hùng vĩ. Ngay cả với công nghệ gỗ ngày nay, đó cũng không phải là một kỳ tích nhỏ."

