["Faction.Folktails.Description"]
raw = "Dễ tính nhưng chăm chỉ, Folktails là những nông dân lão luyện. Họ tôn trọng thiên nhiên và thiên nhiên ban tặng cho họ những mùa màng bội thu.\n"
status = "normal"
enUS = "Easygoing but hardworking, Folktails are seasoned farmers. They respect nature, and nature has blessed them with bountiful harvests."
zhCN = "性格随和但勤奋，Folktails 是经验丰富的农民。他们尊重自然，自然赐予他们丰收的时节。"
zhTW = "性格隨和但勤奮，Folktails 是經驗老道的農民。他們尊重自然，自然賜予他們豐收的季節。"
ruRU = "Фолктейлс — добродушные, но трудолюбивые фермеры. Они уважают природу, и природа дарит им обильные урожаи."
jaJP = "温厚だが勤勉なフォークテイルズは熟練した農民です。彼らは自然を尊重し、自然は彼らに豊かな収穫をもたらします。"
frFR = "Faciles à vivre mais travailleurs, les Folktails sont des agriculteurs chevronnés. Ils respectent la nature et celle-ci leur accorde des moissons abondantes."
deDE = "Umgänglich, aber fleißig, sind Folktails erfahrene Bauern. Sie respektieren die Natur und die Natur schenkt ihnen reiche Ernten."
plPL = "Łagodni, ale pracowici, Folktails to doświadczeni rolnicy. Szanują naturę, a natura obdarza ich obfitymi plonami."
ptBR = "Amigáveis, porém trabalhadores, Folktails são agricultores experientes. Eles respeitam a natureza e a natureza lhes concede safras abundantes."
koKR = "온화하지만 근면한 Folktails는 노련한 농부들이다. 그들은 자연을 존중하고 자연은 그들에게 풍성한 수확을 선물한다."
csCZ = "Přátelští, ale pilní, Folktails jsou zkušení farmáři. Respektují přírodu a příroda jim nadělila bohaté sklizně."
viVN = "Dễ tính nhưng chăm chỉ, Folktails là những nông dân lão luyện. Họ tôn trọng thiên nhiên và thiên nhiên đã ban tặng cho họ những mùa màng bội thu."

