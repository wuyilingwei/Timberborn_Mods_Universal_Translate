koKR = "물 한 방울도 아끼는 법을 배우는 것이 비버가 가혹한 환경에 적응하는 데 도움이 되었다."
csCZ = "Učení, jak šetřit každou kapkou vody, pomohlo bobrům přizpůsobit se drsnému prostředí."
