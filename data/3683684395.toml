["Building.EarthRepopulator.IronTeeth.FlavorDescription"]
raw = "Sau một số thử nghiệm hiện được xếp loại với máy bắn đá, thiết kế này đã được thông qua thay thế."
status = "normal"
enUS = "After a number of tests, which are now categorized as stone-thrower tests, this design has been approved as a replacement."
zhCN = "经过若干测试，现已归类为投石机相关设计，这一设计已获批准作为替代方案。"
zhTW = "經過一些測試，現已被歸類為投石機，這個設計已被批准作為替代方案。"
ruRU = "После ряда испытаний, которые сейчас классифицируются как камнемёт, эта конструкция была одобрена как замена."
jaJP = "いくつかの試験の後、現在カタパルトを用いたものに分類され、この設計は代替案として承認された。"
frFR = "Après plusieurs essais qui se sont avérés compatibles avec la machine à lancer des pierres, ce design a été approuvé comme remplacement."
deDE = "Nach einigen Tests, die mit dem Katapult durchgeführt wurden, wurde dieses Design als Ersatz genehmigt."
plPL = "Po przeprowadzonych testach uznano to za katapultę, a ten projekt został zatwierdzony jako zamiennik."
ptBR = "Após vários testes, que agora são classificados como compatíveis com o lançador de pedras, este projeto foi aprovado como substituto."
koKR = "일부 실험이 이제 돌 던지기 기계와 관련된 것으로 분류된 후, 이 설계는 대체품으로 승인되었다."
csCZ = "Po několika testech je tento návrh nyní zařazen vedle kamenometu; byl schválen jako náhradní řešení."
viVN = "Sau một số thử nghiệm được thực hiện với máy bắn đá, thiết kế này đã được phê duyệt làm phương án thay thế."

["Building.EfficientFarmhouse.Description"]
raw = "Thuê nông dân để trồng và thu hoạch cây trồng. Thiết kế Folktails mở rộng phù hợp với nhiều nông dân hơn."
