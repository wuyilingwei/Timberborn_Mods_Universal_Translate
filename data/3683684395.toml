["MapMetadata.Waterfalls.Description"]
raw = "Đó là một mẹo nuôi dạy con cái cũ để nói với hải ly con rằng một thác nước chỉ là một cửa xả lũ lớn. Ở đây, chúng sẽ dành hàng tuần để tìm một cần gạt ngắt."
status = "normal"
enUS = "That's an old parenting trick to tell a beaver kit that a waterfall is just a big floodgate. Here, they'll spend weeks looking for a shut-off lever."
zhCN = "这是一个陈旧的育儿妙招，用来告诉小海狸们，瀑布只是一个巨大的泄洪口。在这里，他们会花好几周的时间去找一个切断杠杆。"
zhTW = "那是一個老派的教養把戲，用來告訴小海狸們，瀑布只是個巨大的洩洪閘門。在這裡，它們會花好幾週去尋找一個關閉扳桿。"
ruRU = "Это старый воспитательный трюк, чтобы сказать детёнышу бобра, что водопад — всего лишь большой водосливной затвор. Здесь они будут тратить недели на поиск запорного рычага."
jaJP = "それは昔ながらの子育てのコツで、カワウソの子どもに滝がただの大きな排水ゲートに過ぎないと伝えるものです。ここでは、彼らは何週間もかけて遮断用レバーを探すでしょう。"
frFR = "C'est un vieux truc d'éducation pour dire au jeune castor qu'une cascade n'est qu'une grande vanne d'évacuation. Ici, ils passeront des semaines à chercher un levier d'arrêt."
deDE = "Das ist ein alter Erziehungstrick, dem Biberjungen zu sagen, dass ein Wasserfall nur ein großes Sperrwerk ist. Hier werden sie wochenlang damit verbringen, nach einem Absperrhebel zu suchen."
plPL = "To stary trik wychowawczy, którym tłumaczy się młodej wydrze, że wodospad to tylko duża śluza. Tutaj będą tygodniami szukać dźwigni odcinającej."
ptBR = "Isso é uma velha dica de criação para dizer ao filhote de castor que uma cachoeira é apenas uma grande comporta de alívio de inundações. Aqui, eles passarão semanas procurando uma alavanca de desligamento."
koKR = "그것은 비버 새끼들에게 폭포가 단지 큰 홍수 차단문일 뿐이라고 말하는 낡은 육아 요령이다. 여기서는 그들이 차단 레버를 찾느라 몇 주를 보낸다."
csCZ = "To je starý výchovný trik, kterým mládě bobra říká, že vodopád je jen velký přeliv. Zde budou trávit týdny hledáním uzavírací páky."
viVN = "Đó là một mẹo nuôi dạy con cái cũ để nói với hải ly con rằng một thác nước chỉ là một cửa xả lũ lớn. Ở đây, chúng sẽ dành hàng tuần để tìm một cần gạt ngắt."

