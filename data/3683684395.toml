enUS = "Poisonous when alive, cassava prompted Iron Teeth to experiment with fermentation."
zhCN = "活着时有毒，木薯促使铁牙尝试发酵。"
zhTW = "活著時具毒性，木薯促使鐵牙嘗試發酵。"
