["Building.TappersShack.FlavorDescription"]
raw = "Kits được dạy từ sớm rằng mỗi giọt nước đều quan trọng — dù là nước hay resin."
status = "normal"
enUS = "Kits are taught from an early age that every drop of water matters — whether it's water or resin."
zhCN = "幼崽们从小就被教育到每一滴水都很重要——无论是水还是树脂。"
zhTW = "Kits 從小就被教育，每一滴水都很重要—不論是水還是樹脂。"
ruRU = "Детёныши с ранних лет обучаются тому, что каждая капля воды важна — будь то вода или смола."
jaJP = "キッツは子供の頃から、どんな水滴も重要だと教えられている――水であろうと樹脂であろうと。"
frFR = "Les Kits apprennent dès leur plus jeune âge que chaque goutte d'eau compte — qu'il s'agisse d'eau ou de résine."
deDE = "Kits lernen schon früh, dass jeder Tropfen Wasser wichtig ist — egal, ob es Wasser oder Harz ist."
plPL = "Kits są nauczane od najmłodszych lat, że każda kropla wody ma znaczenie — niezależnie od tego, czy to woda, czy żywica."
ptBR = "Kits são ensinados desde cedo que cada gota de água importa — seja água ou resina."
koKR = "키츠는 어릴 때부터 물 한 방울도 소중하다고 배운다 — 물이든 수지이든 간에."
csCZ = "Kits jsou od raného věku učeni, že každá kapka vody je důležitá — ať už jde o vodu či pryskyřici."
viVN = "Kits được dạy từ sớm rằng mỗi giọt nước đều quan trọng — dù là nước hay resin."

