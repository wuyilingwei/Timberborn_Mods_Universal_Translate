["Tutorial.Forestry.MarkBirchesForPlanting"]
raw = "Sử dụng công cụ Trồng cây và Bụi cây để trồng một số cây Bạch dương. Chúng lớn nhanh, là lựa chọn tốt cho một khu định cư mới thành lập.\n"
