["Building.Thorns.Description"]
raw = "Một chướng ngại vật không thể xuyên thủng, cũng chặn cả thủy lợi và ô nhiễm. Khó phá hủy và có thể gây thương tích cho những ai cố gắng làm điều đó."
status = "normal"
enUS = "An impenetrable obstacle that also blocks irrigation and pollution. It is hard to destroy and can injure anyone who tries to do so."
zhCN = "一个不可穿透的障碍物，也会阻挡灌溉和污染。难以摧毁，且可能对试图这样做的人造成伤害。"
zhTW = "一個無法穿透的障礙物，同時阻礙灌溉與污染。難以摧毀，且可能對企圖這樣做的人造成傷害。"
ruRU = "Непробиваемое препятствие, которое также преграждает ирригацию и загрязнение. Его трудно разрушить, и оно может нанести ранения тем, кто попытается это сделать."
jaJP = "貫通できない障害物で、灌漑と汚染の両方を阻止します。壊れにくく、それを試みる者には怪我をさせる可能性があります。"
frFR = "Un obstacle impénétrable qui bloque aussi l'irrigation et la pollution. Il est difficile à détruire et peut causer des blessures à ceux qui essaient de le faire."
deDE = "Ein undurchdringliches Hindernis, das auch die Bewässerung und die Verschmutzung blockiert. Es ist schwer zu zerstören und kann diejenigen verletzen, die versuchen, dies zu tun."
plPL = "Bariera nieprzepuszczalna, która blokuje zarówno nawadnianie, jak i zanieczyszczenia. Trudna do zniszczenia i może zranić tych, którzy spróbują to zrobić."
ptBR = "Um obstáculo impenetrável, que também bloqueia a irrigação e a poluição. Difícil de destruir e pode ferir quem tentar fazê-lo."
koKR = "뚫을 수 없는 장애물이며, 관개와 오염 물질까지 차단합니다. 파괴하기 어렵고 그것을 시도하는 이들에게 부상을 입힐 수 있습니다."
csCZ = "Nepropustná překážka, která současně brání zavlažování i znečištění. Je těžko zničitelná a může způsobit zranění těm, kteří se o to pokusí."
viVN = "Một chướng ngại vật không thể xuyên thủng, cũng chặn cả thủy lợi và ô nhiễm. Khó phá hủy và có thể gây thương tích cho những ai cố gắng làm điều đó."

