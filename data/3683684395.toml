["Building.Metalsmith.FlavorDescription"]
raw = "\"Nếu bạn muốn nó bền, hãy làm bằng kim loại. Đó là một điều mà hooman đã làm rất tốt.\" — Ol' Kazko"
status = "normal"
enUS = "If you want it to be durable, make it out of metal. That's something hooman has done very well. — Ol' Kazko"
zhCN = "\"如果你想让它更耐用，就用金属来做。这是人类做得非常好的一件事。\" — Ol' Kazko"
zhTW = "\"如果你想要它更耐用，就用金屬做。那是人類做得非常出色的一件事。\" — Ol' Kazko"
ruRU = "Если хочешь, чтобы он был прочным, делай его из металла. Это то, что люди сделали очень хорошо.\" — Ol' Kazko"
jaJP = "\"もしそれを丈夫にしたいなら、金属で作れ。それはヒューマンがとてもよくやったことだ。\" — Ol' Kazko"
frFR = "Si vous voulez qu'il soit durable, construisez-le en métal. C'est quelque chose que les humains ont très bien fait. — Ol' Kazko"
deDE = "Wenn du willst, dass es langlebig ist, fertige es aus Metall. Das ist etwas, das Hooman sehr gut gemacht hat. — Ol' Kazko"
plPL = "\"Jeśli chcesz, żeby było trwałe, zrób to z metalu. To coś, co hooman zrobił bardzo dobrze.\" — Ol' Kazko"
ptBR = "\"Se você quer que ele seja durável, faça-o de metal. Isso é algo que o hooman fez muito bem.\" — Ol' Kazko"
koKR = "\"견고하게 만들고 싶다면 금속으로 만들어라. 그것은 휴먼이 아주 잘 해낸 일이다.\" — Ol' Kazko"
csCZ = "\"Pokud chceš, aby to bylo odolné, vyrob to z kovu.\" — Ol' Kazko"
viVN = "\"Nếu bạn muốn nó bền, hãy làm bằng kim loại. Đó là một điều mà hooman đã làm rất tốt.\" — Ol' Kazko"

