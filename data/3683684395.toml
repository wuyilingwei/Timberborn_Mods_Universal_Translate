["Tutorial.HaulersAndWorkforce.BuildHaulingPost"]
raw = "Khi khu định cư của bạn phát triển, nó xử lý lượng hàng hóa lớn hơn. Vận chuyển chúng chiếm một phần đáng kể trong ngày làm việc của công nhân.\n"
status = "normal"
enUS = "As your settlement grows, it handles larger quantities of goods. Transporting them takes up a significant portion of the workers' day."
zhCN = "随着你的定居点发展，它将处理更多的货物。运输它们在工人的工作日中占据相当大的比重。"
zhTW = "當你的聚落發展時，它會處理更多的貨物。運送它們佔據工人一天工作時間的相當大的一部分。"
ruRU = "Когда ваше поселение растет, оно обрабатывает большее количество товаров. Перевозка товаров занимает значительную часть рабочего дня рабочих."
jaJP = "定住地が発展すると、それはより多くの商品を取り扱うようになります。それらを輸送することは、労働者の一日の仕事の大半を占めます。"
frFR = "À mesure que votre colonie se développe, elle traite des quantités croissantes de marchandises. Le transport de ces marchandises occupe une part importante de la journée de travail des travailleurs."
deDE = "Wenn deine Siedlung wächst, verarbeitet sie größere Mengen an Gütern. Der Transport dieser Güter nimmt einen erheblichen Teil des Arbeitstages der Arbeiter ein."
plPL = "Gdy twoja osada rośnie, przetwarza większe ilości towarów. Przewożenie ich zajmuje znaczną część dnia pracy pracowników."
ptBR = "Quando o seu assentamento se desenvolve, ele lida com uma quantidade maior de mercadorias. Transportá-las ocupa uma parte significativa do dia de trabalho dos trabalhadores."
koKR = "당신의 정착지가 성장하면 더 많은 양의 물품을 처리합니다. 물품들을 운송하는 것은 노동자들의 하루 작업 시간의 상당 부분을 차지합니다."
csCZ = "Jak se vaše sídlo rozrůstá, zpracovává větší množství zboží. Přeprava zboží zabírá podstatnou část pracovního dne dělníků."
viVN = "Khi khu định cư của bạn phát triển, nó xử lý lượng hàng hóa lớn hơn. Vận chuyển chúng chiếm một phần đáng kể trong ngày làm việc của công nhân."

["Tutorial.HaulersAndWorkforce.ChangeWorkforce"]
raw = "Một số nơi làm việc, như Trạm vận chuyển, không tự động lấp đầy tất cả các vị trí công nhân. Bạn có thể thay đổi số lượng công nhân mong muốn trong bảng điều khiển của tòa nhà.\n"
status = "normal"
enUS = "Some workplaces, such as the Transport Station, do not automatically fill all worker positions. You can change the number of workers you want in the building's control panel."
zhCN = "一些工作地点，例如运输站，并不会自动填满所有工人岗位。您可以在建筑物的控制面板中更改所需的工人人数。"
zhTW = "某些工作場所，例如運輸站，並不會自動填滿所有工人崗位。你可以在該建築的控制面板中調整所需的工人數量。"
ruRU = "Некоторые рабочие места, например станция перевозки, не заполняются автоматически всеми рабочими позициями. Вы можете изменить желаемое количество рабочих на панели управления здания."
jaJP = "いくつかの職場は、輸送ステーションのように、すべての作業ポジションを自動的に埋めません。建物のコントロールパネルで、希望する労働者の数を変更できます。"
frFR = "Certaines zones de travail, comme la Station de transport, ne remplissent pas automatiquement tous les postes d'ouvriers. Vous pouvez modifier le nombre d'ouvriers souhaité dans le panneau de contrôle du bâtiment."
deDE = "Einige Arbeitsplätze, wie die Transportstation, werden nicht automatisch mit Personal besetzt. Sie können die gewünschte Anzahl von Arbeitern im Bedienfeld des Gebäudes ändern."
plPL = "Niektóre miejsca pracy, takie jak Stacja Transportowa, nie obsadzają automatycznie wszystkich stanowisk pracy. Możesz zmienić liczbę pracowników, którą chcesz mieć, w panelu sterowania budynku."
ptBR = "Alguns locais de trabalho, como a Estação de Transporte, não preenchem automaticamente todas as vagas de trabalho. Você pode alterar o número de trabalhadores desejado no painel de controle do prédio."
koKR = "일부 작업 현장은 모든 노동자 자리를 자동으로 채우지 않습니다. 건물의 제어판에서 원하는 노동자 수를 변경할 수 있습니다."
csCZ = "Některá pracoviště, například dopravní stanice, se automaticky neobsadí všemi pracovními pozicemi. Můžete změnit požadovaný počet pracovníků v ovládacím panelu budovy."
viVN = "Một số nơi làm việc, như Trạm vận chuyển, không tự động lấp đầy tất cả các vị trí công nhân. Bạn có thể thay đổi số lượng công nhân mong muốn trong bảng điều khiển của tòa nhà."

