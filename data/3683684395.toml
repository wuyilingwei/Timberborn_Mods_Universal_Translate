["MapMetadata.Lakes.Description"]
raw = "Ngày nay, những khu vực giàu hồ và sông rất khan hiếm. Những gì còn lại cho thấy vẫn còn hy vọng cho Trái đất."
status = "normal"
enUS = "Today, areas rich in lakes and rivers are very scarce. What remains shows that there is still hope for the Earth."
zhCN = "如今，富含湖泊和河流的地区非常稀少。剩下的迹象表明地球仍然有希望。"
zhTW = "如今，富含湖泊與河流的區域極為稀少。剩餘的證據顯示，地球仍然有希望。"
ruRU = "Сегодня области, богатые озёрами и реками, крайне редки. То, что осталось, показывает, что Земле всё ещё есть надежда."
jaJP = "今では、湖や川が豊かな地域は非常に希少だ。残されたものは、地球にはまだ希望があることを示している。"
frFR = "Aujourd'hui, les zones riches en lacs et en rivières sont très rares. Ce qui reste montre qu'il y a encore de l'espoir pour la Terre."
deDE = "Heutzutage sind Gebiete, die reich an Seen und Flüssen sind, sehr selten. Was übrig bleibt, zeigt, dass es noch Hoffnung für die Erde gibt."
plPL = "Obecnie obszary bogate w jeziora i rzeki są bardzo rzadkie. To, co pozostało, pokazuje, że dla Ziemi nadal jest nadzieja."
ptBR = "Hoje em dia, áreas ricas em lagos e rios são muito raras. O que resta mostra que ainda há esperança para a Terra."
koKR = "오늘날 호수와 강이 풍부한 지역은 매우 드물다. 남아 있는 것들은 지구에 여전히 희망이 남아 있음을 보여준다."
csCZ = "V dnešní době jsou oblasti bohaté na jezera a řeky velmi vzácné. To, co zůstalo, ukazuje, že Země má ještě naději."
viVN = "Ngày nay, những khu vực giàu hồ và sông rất khan hiếm. Những gì còn lại cho thấy vẫn còn hy vọng cho Trái đất."

