["Experimental.WelcomeText"]
raw = "Phiên bản Timberborn này cấp cho bạn quyền truy cập vào các tính năng thử nghiệm, chưa hoàn thiện. Do đó, nó cũng có nhiều khả năng chứa các lỗi nghiêm trọng. Bạn quả là một beaver dũng cảm.\n"
status = "normal"
enUS = "This Timberborn version grants you access to experimental, unfinished features. As a result, it is more likely to contain serious bugs. You are indeed a brave beaver."
zhCN = "这个 Timberborn 版本让你能够访问尚在测试中的功能，尚未完善。因此，它也更有可能包含严重错误。你真是一只勇敢的海狸。"
zhTW = "這個 Timberborn 版本讓你可以訪問尚未完成的實驗性功能，因此它也更有可能包含嚴重的錯誤。你真是一隻勇敢的海狸。"
ruRU = "Эта версия Timberborn предоставляет вам доступ к экспериментальным, незавершённым функциям. Поэтому она также может содержать серьёзные ошибки. Вы — настоящий отважный бобёр."
jaJP = "この Timberborn のバージョンは、まだ完成していない実験機能へアクセスできるようにします。そのため、重大なバグを含む可能性が高いです。あなたは本当に勇敢なビーバーです。"
frFR = "Cette version de Timberborn vous donne accès à des fonctionnalités expérimentales, non terminées. Par conséquent, elles présentent également de fortes chances de contenir des bogues graves. Vous êtes vraiment un castor courageux."
deDE = "Diese Timberborn-Version gewährt dir Zugriff auf experimentelle Funktionen, noch unausgereift. Daher besteht auch eine hohe Wahrscheinlichkeit, schwerwiegende Fehler zu enthalten. Du bist wirklich ein mutiger Biber."
plPL = "Ta wersja Timberborn daje ci dostęp do funkcji eksperymentalnych, nieukończonych. Dlatego też istnieje duże prawdopodobieństwo wystąpienia poważnych błędów. Jesteś naprawdę odważnym bórem."
ptBR = "Esta versão do Timberborn concede a você acesso a recursos experimentais ainda não finalizados. Portanto, ele também tem maior probabilidade de apresentar falhas graves. Você é um castor verdadeiramente corajoso.\n"
koKR = "이 Timberborn 버전은 실험 기능에 대한 접근 권한을 제공하지만 아직 완성되지 않았습니다. 따라서 심각한 버그가 포함될 가능성이 큽니다. 당신은 정말 용감한 비버입니다."
csCZ = "Tato verze Timberbornu vám poskytuje přístup k experimentálním funkcím, které ještě nejsou dokončeny. Proto s sebou nese i vysokou pravděpodobnost výskytu závažných chyb. Jste skutečně odvážný bobr."
viVN = "Phiên bản Timberborn này cho phép bạn truy cập vào các tính năng thử nghiệm, chưa hoàn thiện. Do đó, nó cũng có nhiều khả năng chứa các lỗi nghiêm trọng. Bạn quả là một con hải ly dũng cảm."

