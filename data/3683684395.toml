["Building.SmallIndustrialPile.FlavorDescription"]
raw = "\"Vậy là họ chỉ lợp mái lên và gọi nó là công nghiệp. Kinh điển.\" —Pina"
status = "normal"
enUS = "\"So they just roof it over and call it an industry. Classic.\" —Pina"
zhCN = "\"他们只是盖上屋顶就把它称为工业。经典。\" —Pina"
zhTW = "原來他們只是蓋上屋頂，便把它稱作工業。經典。 —Pina"
ruRU = "\"Так они просто накрывают крышей и называют это индустрией. Классика.\" —Пина"
jaJP = "それで彼らはただ屋根をかけ、それを産業と呼ぶ。古典的だ。 —Pina"
frFR = "Alors ils se contentent de mettre un toit dessus et l'appellent une industrie. Classique.\" —Pi"
deDE = "Also legen sie einfach nur ein Dach darüber und nennen es Industrie. Klassisch. —Pina"
plPL = "\"Więc po prostu przykrywają to dachem i nazywają to przemysłem. To klasyka.\" —Pina"
ptBR = "\"Então eles apenas colocam um telhado nele e o chamam de indústria. Clássico.\" —Pina"
koKR = "그저 지붕을 씌워놓고 그것을 산업이라고 부른다. 고전이다.\" —Pi"
csCZ = "Tak na to jen postaví střechu a nazvou to průmyslem. Klasika.\" —Pi"
viVN = "Vậy là họ chỉ lợp mái lên và gọi nó là công nghiệp. Kinh điển.\" —Pi"

