["Calloatti.Grid.RulerToolDescription"]
raw = "Use this tool to add/edit Rulers. Click a block, select orientation by moving the mouse, click outside/inside ruler preview to add ruler. Ctrl-Click on ruler block adds a gap, Ctrl-Click increases gap, Ctrl-Click red block to reset ruler."
status = "normal"
enUS = "Use this tool to add/edit Rulers. Click a block, select orientation by moving the mouse, click outside/inside ruler preview to add ruler. Ctrl-Click on ruler block adds a gap, Ctrl-Click increases gap, Ctrl-Click red block to reset ruler."
zhCN = "使用此工具添加/编辑标尺。点击一个方块，通过移动鼠标来选择方向，点击标尺预览的外部/内部以添加标尺。按 Ctrl 点击标尺块可添加一个间隙，Ctrl 点击可增加间隙，按 Ctrl 点击红色块以重置标尺。"
zhTW = "使用此工具新增/編輯尺規。點擊區塊，透過移動滑鼠選擇方向，點擊尺規預覽的外部/內部以新增尺規。在尺規區塊上按 Ctrl 點擊可新增一個間隙，Ctrl 點擊可增加間隙，按 Ctrl 點擊紅色區塊以重設尺規。"
ruRU = "Используйте этот инструмент для добавления и редактирования линейок. Щёлкните по блоку, выберите ориентацию, перемещая мышь; щёлкните за пределами или внутри области предпросмотра линейки, чтобы добавить линейку. Ctrl+щёлчок по блоку линейки добавляет зазор, Ctrl+щёлчок увеличивает зазор, Ctrl+щёлчок по красному блоку сбрасывает линейку."
jaJP = "このツールを使って定規を追加・編集します。ブロックをクリックして、マウスを動かして向きを選択し、定規のプレビューの外側/内側をクリックして定規を追加します。定規ブロックをCtrl+クリックするとギャップを追加します。Ctrl+クリックでギャップを増やします。赤いブロックをCtrl+クリックすると定規をリセットします。"
frFR = "Utilisez cet outil pour ajouter/modifier des règles. Cliquez sur un bloc, sélectionnez l'orientation en déplaçant la souris, cliquez à l'extérieur ou à l'intérieur de l'aperçu de la règle pour ajouter une règle. Ctrl-Click sur le bloc de la règle ajoute un écart, Ctrl-Click augmente l'écart, Ctrl-Click sur le bloc rouge réinitialise la règle."
deDE = "Verwenden Sie dieses Werkzeug, um Lineale hinzuzufügen bzw. zu bearbeiten. Klicken Sie auf einen Block, wählen Sie die Ausrichtung, indem Sie die Maus bewegen. Klicken Sie außerhalb/innerhalb der Linealvorschau, um ein Lineal hinzuzufügen. Strg-Klick auf den Linealblock fügt eine Lücke hinzu, Strg-Klick vergrößert die Lücke, Strg-Klick auf den roten Block setzt das Lineal zurück."
plPL = "Użyj tego narzędzia do dodawania i edycji linijek. Kliknij blok, aby wybrać orientację, poruszając myszą; kliknij poza lub wewnątrz podglądu linijki, aby dodać linijkę. Ctrl-klik na blok linijki dodaje przerwę, Ctrl-klik zwiększa przerwę, Ctrl-klik na czerwony blok, aby zresetować linijkę."
ptBR = "Use esta ferramenta para adicionar/editar réguas. Clique em um bloco, selecione a orientação movendo o mouse, clique fora ou dentro da pré-visualização da régua para adicionar a régua. Ctrl+Clique no bloco da régua adiciona uma lacuna, Ctrl+Clique aumenta a lacuna, Ctrl+Clique no bloco vermelho para redefinir a régua."
koKR = "이 도구를 사용하여 자를 추가/편집합니다. 블록을 클릭하고 마우스를 움직여 방향을 선택한 뒤, 자 미리보기의 바깥/안쪽을 클릭해 자를 추가합니다. 자 블록에서 Ctrl-클릭하면 간격이 추가되고, Ctrl-클릭으로 간격을 늘리며, 빨간 자 블록을 Ctrl-클릭하면 자를 재설정합니다."
csCZ = "Použijte tento nástroj k přidání a úpravám pravítek. Klikněte na blok, určete orientaci pohybem myši, klikněte mimo/uvnitř náhledu pravítka pro přidání pravítka. Ctrl-klik na blok pravítka přidá mezeru, Ctrl-klik zvětší mezeru, Ctrl-klik na červený blok resetuje pravítko."
viVN = "Sử dụng công cụ này để thêm/chỉnh sửa các thước đo. Nhấp vào một khối, di chuyển chuột để chọn hướng, nhấp ngoài hoặc bên trong bản xem trước thước để thêm thước. Nhấn Ctrl và nhấp chuột vào khối thước để thêm một khoảng trống, nhấn Ctrl và nhấp chuột để tăng khoảng trống, nhấn Ctrl và nhấp chuột vào khối màu đỏ để đặt lại thước."

