["Calloatti.Grid.MarkerToolDescription"]
raw = "Use this tool to add Markers to the map. Shift-Click over a Marker to delete it. Click over a marker to cycle Marker color."
status = "normal"
enUS = "Use this tool to add Markers to the map. Shift-Click over a Marker to delete it. Click over a marker to cycle Marker color."
zhCN = "使用此工具在地图上添加标记。按住 Shift 点击标记即可删除它。单击标记以循环切换标记颜色。"
zhTW = "使用此工具在地圖上新增標記。按住 Shift 並在標記上點擊以刪除它。點擊標記以循環標記顏色。"
ruRU = "Используйте этот инструмент, чтобы добавлять маркеры на карту. Shift+клик по маркеру, чтобы удалить его. Щелкните по маркеру, чтобы переключить цвет маркера."
jaJP = "このツールを使って地図にマーカーを追加します。マーカーの上で Shift キーを押しながらクリックすると削除されます。マーカーをクリックすると、マーカーの色を順番に切り替えます。"
frFR = "Utilisez cet outil pour ajouter des marqueurs à la carte. Shift-cliquez sur un marqueur pour le supprimer. Cliquez sur un marqueur pour faire défiler la couleur du marqueur."
deDE = "Verwende dieses Werkzeug, um Marker auf der Karte hinzuzufügen. Shift-Klick auf einen Marker, um ihn zu löschen. Klicke auf einen Marker, um die Markerfarbe zu wechseln."
plPL = "Użyj tego narzędzia, aby dodać znaczniki na mapie. Shift-kliknij na znacznniku, aby go usunąć. Kliknij na znaczniku, aby zmienić kolor znacznika."
ptBR = "Use esta ferramenta para adicionar marcadores ao mapa. Shift+Clique em um marcador para removê-lo. Clique em um marcador para alternar a cor do marcador."
koKR = "이 도구를 사용하여 지도에 마커를 추가합니다. 마커 위에서 Shift-클릭하면 삭제됩니다. 마커를 클릭하면 마커의 색상이 순환됩니다."
csCZ = "Použijte tento nástroj k přidání značek na mapu. Stiskněte Shift a klikněte na značku pro její smazání. Klikněte na značku pro změnu barvy značky."
viVN = "Sử dụng công cụ này để thêm các điểm đánh dấu vào bản đồ. Nhấn Shift và nhấp chuột lên một điểm đánh dấu để xóa nó. Nhấp vào một điểm đánh dấu để đổi màu của nó."

