["LTM.BaseWeekendDaysDesc"]
raw = "Guaranteed days off at the end of every cycle, before automation adds more. Default 1."
status = "normal"
enUS = "Guaranteed days off at the end of every cycle, before automation adds more. Default 1."
zhCN = "每个周期结束时保证休息日，自动化增加之前。默认1天。"
zhTW = "每個週期結束時保證有休息日，在自動化增加更多之前。預設為 1。"
ruRU = "Гарантированные выходные в конце каждого цикла, прежде чем автоматизация добавит больше. По умолчанию 1."
jaJP = "自動化が追加される前の毎サイクルの終わりに保証された休日。デフォルトは1日。"
frFR = "Jours de repos garantis à la fin de chaque cycle, avant que l'automatisation n'en ajoute d'autres. Par défaut 1."
deDE = "Garantie für freie Tage am Ende jedes Zyklus, bevor die Automatisierung weitere hinzufügt. Standard 1."
plPL = "Gwarantowane dni wolne na koniec każdego cyklu, zanim automatyzacja doda więcej. Domyślnie 1."
ptBR = "Descanso garantido ao final de cada ciclo, antes que a automação adicione mais. Padrão 1."
koKR = "자동화가 더 추가되기 전, 매 사이클이 끝날 때 보장된 휴일입니다. 기본 1일입니다."
csCZ = "Zaručené dny volna na konci každého cyklu, před tím, než automatizace přidá další. Výchozí 1."
viVN = "Được đảm bảo ngày nghỉ vào cuối mỗi chu kỳ, trước khi tự động hóa thêm nhiều hơn. Mặc định 1."
trTR = "Her döngünün sonunda, otomasyon daha fazlasını eklemeden önce garanti edilmiş tatil günleri. Varsayılan 1."

