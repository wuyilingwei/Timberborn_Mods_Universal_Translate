["LTM.WeekendGenerosityDesc"]
raw = "Scales the automation bonus. 100% = bot share of the workforce x cycle length, added to the base days."
status = "normal"
enUS = "Scales the automation bonus. 100% = bot share of the workforce x cycle length, added to the base days."
zhCN = "“调整自动化奖励。100% = 劳动力中机器人的比例 x 周期长度，加到基础天数。”"
zhTW = "調整自動化獎勵。100% = 機器人占工作力的比例 x 週期長度，並加到基礎天數上。"
ruRU = "Масштабирует бонус автоматизации. 100% = доля ботов в рабочей силе x длительность цикла, добавленная к базовым дням."
jaJP = "自動化ボーナスをスケーリングします。100% = 労働力のロボット割合 x サイクルの長さ、基礎日数に追加されます。"
frFR = "Échelonne le bonus d'automatisation. 100 % = part des bots dans la main-d'œuvre x durée du cycle, ajouté aux jours de base."
deDE = "Skaliert den Automatisierungsbonus. 100 % = Bot-Anteil der Arbeitskraft x Zykellänge, addiert zu den Basistagen."
plPL = "Skaluje bonus za automatyzację. 100% = udział robotów w sile roboczej x długość cyklu, dodane do podstawowych dni."
ptBR = "Escala o bônus de automação. 100% = parte do bot da força de trabalho x duração do ciclo, adicionada aos dias base."
koKR = "자동화 보너스를 조정합니다. 100% = 인력에서 로봇의 비율 x 주기 길이, 기본 일수에 추가됩니다."
csCZ = "Zvětšuje bonus za automatizaci. 100 % = podíl robotů na pracovní síle x délka cyklu, přičteno k základním dnům."
viVN = "Tăng tỷ lệ thưởng tự động hóa. 100% = phần trăm công nhân bot x độ dài chu kỳ, được cộng vào số ngày cơ bản."
trTR = "Otomasyon bonusunu ölçeklendirir. %100 = iş gücünün bot payı x döngü uzunluğu, temel günlere eklenir."

