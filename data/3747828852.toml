["LTM.EnabledDesc"]
raw = "If on, beavers stop working during the midday window to eat, drink, and socialize."
status = "normal"
enUS = "If enabled, beavers will stop working during the midday period to eat, drink, and socialize."
zhCN = "如果开启，海狸将在中午时段停止工作以吃饭、喝水和社交。"
zhTW = "如果啟用，海狸在正午期間會停止工作，進行飲食和社交。"
ruRU = "Если включено, бобры прекращают работу в полдень для еды, питья и общения."
jaJP = "「オンにすると、ビーバーは昼の時間帯に食べたり飲んだり社交したりするために働くのをやめます。」"
frFR = "Si activé, les castors cessent de travailler durant la pause de midi pour manger, boire et socialiser."
deDE = "Wenn aktiv, hören Biber während des Mittagsfensters auf zu arbeiten, um zu essen, zu trinken und sich zu sozialisieren."
plPL = "Jeśli włączone, bobry przestają pracować w czasie przerwy na obiad, aby jeść, pić i spędzać czas towarzysko."
ptBR = "Se ativado, os castores param de trabalhar durante a janela do meio-dia para comer, beber e socializar."
koKR = "켜져 있으면 비버들이 정오 시간대에 먹고, 마시고, 교류하기 위해 일을 중단합니다."
csCZ = "Pokud je zapnuto, bobři přestanou pracovat během poledního okna, aby jedli, pili a socializovali."
viVN = "“Nếu bật lên, những con hải ly sẽ ngừng làm việc trong khoảng thời gian giữa trưa để ăn, uống và giao lưu.”"
trTR = "Eğer etkinse, kunduzlar öğle aralığında yemek yemek, içmek ve sosyalleşmek için çalışmayı durdurur."

