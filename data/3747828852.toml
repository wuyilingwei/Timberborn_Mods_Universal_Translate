["LTM.ForceRestDesc"]
raw = "Testing switch: when on, all beavers stop working immediately, regardless of time or day."
status = "normal"
enUS = "Testing switch: when enabled, all beavers stop working immediately, regardless of time or day."
zhCN = "测试开关：开启时，所有海狸立即停止工作，不论时间或日期。"
zhTW = "測試開關：啟用時，所有海狸立即停止工作，無論時間或日期。"
ruRU = "Tестовый переключатель: когда включен, все бобры немедленно прекращают работу, независимо от времени или дня."
jaJP = "「テストスイッチ：オンの時、すべてのビーバーは時間や日を問わず即座に仕事を停止します。」"
frFR = "Interrupteur de test : lorsqu'il est activé, tous les castors cessent immédiatement de travailler, quel que soit l'heure ou le jour."
deDE = "Testschalter: Wenn aktiviert, hören alle Biber sofort mit der Arbeit auf, unabhängig von Zeit oder Tag."
plPL = "Przełącznik testowy: gdy jest włączony, wszystkie bobry natychmiast przestają pracować, niezależnie od czasu czy dnia."
ptBR = "Interruptor de teste: quando ativado, todos os castores param de trabalhar imediatamente, independentemente da hora ou do dia."
koKR = "테스트 스위치: 활성화 시 모든 비버가 즉시 작업을 중단하며, 시간이나 요일에 상관없습니다."
csCZ = "Testovací přepínač: když je zapnutý, všichni bobři okamžitě přestanou pracovat, bez ohledu na čas nebo den."
viVN = "Chuyển đổi thử nghiệm: khi bật, tất cả các con rái cá ngừng làm việc ngay lập tức, bất kể thời gian hay ngày nào."
trTR = "Test anahtarı: açık olduğunda, tüm kunduzlar hemen çalışmayı durdurur, zamanı veya günü önemsemez."
