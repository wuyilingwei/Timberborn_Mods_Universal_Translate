["LTM.WeekendsEnabledDesc"]
raw = "Beavers take the last days of each cycle off. Bots keep working, so automation runs the colony while beavers rest."
status = "normal"
enUS = "Beavers take the last days of each cycle off. Bots keep working, so automation runs the colony while beavers rest."
zhCN = "“海狸在每个周期的最后几天休息。机器人继续工作，因此自动化维持着殖民地的运转，而海狸则休息。”"
zhTW = "海狸在每個週期的最後幾天休息。機器人繼續工作，因此自動化管理著殖民地，而海狸則休息。"
ruRU = "Бобры берут выходные в последние дни каждого цикла. Машины продолжают работать, поэтому автоматизация управляет колонией, пока бобры отдыхают."
jaJP = "ビーバーは各サイクルの最後の日を休みます。ロボットは働き続けるため、自動化がコロニーを運営し、ビーバーは休むことができます。"
frFR = "Les castors prennent les derniers jours de chaque cycle de repos. Les robots continuent de travailler, donc l'automatisation fait fonctionner la colonie pendant que les castors se reposent."
deDE = "Die Biber nehmen sich die letzten Tage jedes Zyklus frei. Bots arbeiten weiter, sodass die Automatisierung die Kolonie läuft, während die Biber sich ausruhen."
plPL = "Bobry biorą wolne w ostatnich dniach każdego cyklu. Roboty nadal pracują, więc automatyzacja zarządza kolonią, podczas gdy bobry odpoczywają."
ptBR = "Os castores tiram os últimos dias de cada ciclo de folga. Os robôs continuam trabalhando, então a automação mantém a colônia enquanto os castores descansam."
koKR = "비버들은 각 주기의 마지막 날을 쉬게 됩니다. 로봇은 계속 작업하므로 자동화가 비버들이 휴식하는 동안 콜로니를 운영합니다."
csCZ = "Bobři si berou poslední dny každého cyklu volno. Roboti stále pracují, takže automatizace řídí kolonii, zatímco bobři odpočívají."
viVN = "Các loài hải ly nghỉ ngơi vào những ngày cuối cùng của mỗi chu kỳ. Các bot vẫn tiếp tục làm việc, vì vậy tự động hóa duy trì hoạt động của thuộc địa trong khi các loài hải ly nghỉ ngơi."
trTR = "Castingolar, her döngünün son günlerinde dinlenir. Robotlar çalışmaya devam eder, böylece otomasyon koloniye hizmet ederken castinger dinlenir."

