["Building.BadwaterRefinery.FlavorDescription"]
raw = "The Peak of Beaver Engineering brought us Badwater purification. Inefficient just like it's inventor.- Alistair Raven"
status = "normal"
enUS = "The Peak of Beaver Engineering brought us Badwater purification. Inefficient just like its inventor. - Alistair Raven"
zhCN = "“海狸工程的巅峰带来了污水净化。就像它的发明者一样低效。 - 阿利斯泰尔·乌鸦”"
zhTW = "“海狸工程的巔峰帶給我們壞水淨化裝置。就像它的發明者一樣低效。” - 阿利斯特·雷文"
ruRU = "Вершина бобровой инженерии подарила нам очистку Бадвотер. Неэффективно, как и сам изобретатель. - Алистер Равен"
jaJP = "「ビーバーエンジニアリングの頂点が私たちにもたらしたのは、バッドウォーターの浄化です。発明者と同様に非効率的です。- アリステア・レイヴン」"
frFR = "Le sommet de l'ingénierie des castors nous a apporté la purification de Badwater. Inefficace, tout comme son inventor. - Alistair Raven"
deDE = "Die Spitze der Bibertechnik brachte uns die Badwater-Reinigung. Ineffizient, genau wie sein Erfinder. - Alistair Raven"
plPL = "Szczyt inżynierii bobrów przyniósł nam oczyszczanie Badwater. Nieskuteczne, tak jak jego wynalazca. - Alistair Raven"
ptBR = "O Auge da Engenharia dos Castores nos trouxe a purificação de Água Ruim. Ineficiente, assim como seu inventor. - Alistair Raven"
koKR = "비버 공학의 정점이었던 우리는 배드워터 정화기를 선보였습니다. 그 발명가와 마찬가지로 비효율적입니다. - 알리스테어 레이븐"
csCZ = "„Vrchol bobřího inženýrství nám přinesl čištění špatné vody. Neefektivní jako jeho vynálezce. - Alistair Raven“"
viVN = "Đỉnh cao kỹ thuật của Hải ly đã mang đến cho chúng ta sự tinh khiết của Badwater. Kém hiệu quả cũng giống như người sáng chế của nó. - Alistair Raven"

