frFR = "Quelque chose que les Hoomans n'ont pas fait, donc ils sont morts."
deDE = "Etwas, das die Menschen nicht taten, also starben sie."
plPL = "Coś, czego Hoomanie nie zrobili, więc zginęli."
ptBR = "Algo que os Hoomans não fizeram, então eles morreram."
koKR = "인간들이 하지 않은 어떤 것, 그래서 그들은 죽었다."
csCZ = "Něco, co Hoomani neudělali, a tak zemřeli."
viVN = "Cái mà loài Hoomans không làm, nên họ đã chết."
trTR = "İnsanların yapmadığı bir şey, bu yüzden öldüler."

