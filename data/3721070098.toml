["Building.DeepReservoirAquifer.Description"]
status = "normal"
raw = "Drills into a sealed underground reservoir. Requires mechanical power and keeps pumping clean water during droughts and badtides."
enUS = "Drills into a sealed underground reservoir. Requires mechanical power and continuously pumps clean water during droughts and bad tides."
zhCN = "钻探封闭的地下水库。需要机械动力，并在干旱和潮汐不良时持续抽取清水。"
zhTW = "鑽探封閉的地下水庫。需要機械能量並在乾旱和壞潮期間持續抽取清水。"
ruRU = "Забирается в запечатанный подземный резервуар. Требует механической энергии и продолжает откачивать чистую воду во время засухи и неблагоприятных приливов."
jaJP = "「密閉された地下貯水槽を掘削します。機械的なエネルギーを必要とし、干ばつや悪潮の間に清水を持続的に汲み上げます。」"
frFR = "Perce des réservoirs souterrains scellés. Nécessite une énergie mécanique et continue de pomper de l'eau propre pendant les sécheresses et les marées basses."
deDE = "Bohrt in ein versiegeltes unterirdisches Reservoir. Benötigt mechanische Energie und pumpt während Dürreperioden und schlechten Gezeiten sauberes Wasser."
plPL = "Zagłębia się w zamknięty podziemny zbiornik. Wymaga energii mechanicznej i ciągle pompuje czystą wodę podczas suszy i złych pływów."
ptBR = "Perfura um reservatório subterrâneo selado. Requer energia mecânica e continua bombeando água limpa durante secas e marés ruins."
koKR = "밀폐된 지하 저장소를 파고듭니다. 기계적 동력이 필요하며 가뭄과 조류가 나쁠 때 깨끗한 물을 계속 펌핑합니다."
csCZ = "Vrtá do uzavřeného podzemního rezervoáru. Vyžaduje mechanickou energii a neustále čerpá čistou vodu během sucha a špatných přílivů."
viVN = "Khoan vào một bể chứa ngầm kín. Cần có năng lượng cơ học và tiếp tục bơm nước sạch trong thời kỳ hạn hán và thủy triều xấu."

