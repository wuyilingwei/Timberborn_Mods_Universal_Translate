csCZ = "Zaškrtněte nebo zrušte zaškrtnutí každého zboží v tomto obvodu. Při zaškrtnutí dvou nebo více zboží platí úprava exportního prahu nebo importní možnosti pro jedno zaškrtnuté zboží na všechna."
viVN = "Đánh dấu hoặc bỏ đánh dấu mọi hàng hóa trong khu vực này. Với hai hoặc nhiều hàng hóa đã được đánh dấu, việc chỉnh sửa ngưỡng xuất khẩu hoặc tùy chọn nhập khẩu của một hàng hóa đã đánh dấu sẽ áp dụng thay đổi tương tự cho tất cả chúng."
trTR = "Bu bölgede bulunan her malı işaretleyin veya işaretini kaldırın. İki veya daha fazla mal işaretliyken, işaretli bir malın ihracat eşiğini veya ithalat seçeneğini düzenlemek, hepsine aynı değişikliği uygular."
