["Tutorial.FloodableCrops.Description"]
status = "normal"
raw = "With this mod, the fertility of the soil can be increased by flooding it.\n\nFlooding crops (Carrots, Wheat, etc.) once a day increases their growth speed. However, if they remain flooded for too long, they will die.\n\nCrops that normally grow while flooded (cattail, etc.) work the other way around: They need to be drained once a day to grow faster.\n\nThis effect stacks with the Beehive bonus. The highest growth speed is achieved when crops are within range of a Beehive and are flooded or drained once per day.\n"
enUS = "With this mod, the fertility of the soil can be increased by flooding it.\n\nFlooding crops (Carrots, Wheat, etc.) once a day increases their growth speed. However, if they remain flooded for too long, they will die.\n\nCrops that normally grow while flooded (cattail, etc.) work the other way around: They need to be drained once a day to grow faster.\n\nThis effect stacks with the Beehive bonus. The highest growth speed is achieved when crops are within range of a Beehive and are flooded or drained once per day."
zhCN = "使用此模组，可以通过淹没土壤来提高其肥沃度。\n\n每天淹没一次作物（胡萝卜、小麦等）可以提高它们的生长速度。然而，如果淹没时间过长，它们会死亡。\n\n那些在淹没状态下正常生长的作物（香蒲等）则反其道而行：它们需要每天排水一次才能更快生长。\n\n该效果与蜂窝的奖金叠加。当作物在蜂窝的范围内并且每天淹没或排水一次时，能达到最高的生长速度。"
zhTW = "使用此模組可以通過淹水來提高土壤的肥力。\n\n每天淹水一次的作物（胡蘿蔔、小麥等）其生長速度會增加。然而，如果淹水時間過長，它們將會死亡。\n\n那些通常在淹水中生長的作物（香蒲等）則相反：需要每天排水一次以加快其生長速度。\n\n此效果與蜂巢獎勵重疊。當作物在蜂巢範圍內並且每天進行一次淹水或排水時，將實現最高的生長速度。"
ruRU = "С помощью этого мода можно увеличить плодородие почвы, затопив её.\n\nЗатопление культур (морковь, пшеница и т.д.) раз в день увеличивает скорость их роста. Однако, если они остаются под водой слишком долго, они погибнут.\n\nКультуры, которые обычно растут в затопленном состоянии (релис, и т.д.), работают наоборот: их нужно осушать раз в день для ускорения роста.\n\nЭтот эффект складывается с бонусом от улья. Высшая скорость роста достигается, когда культуры находятся в радиусе улья и затопляются или осушаются раз в день."
jaJP = "このモッドを使用すると、土壌の肥沃度を水没させることで増加させることができます。\n\n作物（ニンジン、小麦など）を1日1回水没させることで成長速度が増します。ただし、長時間水没状態になると枯れてしまいます。\n\n通常、水没して成長する作物（スゲなど）は逆の効果を持ちます：成長を早めるためには1日1回排水する必要があります。\n\nこの効果は巣箱のボーナスと重複します。作物が巣箱の範囲内で、水没または排水を1日1回行うと、最も高い成長速度が達成されます。"
frFR = "Avec ce mod, la fertilité du sol peut être augmentée en le floodant.\n\nFlooder les cultures (Carottes, Blé, etc.) une fois par jour augmente leur vitesse de croissance. Cependant, si elles restent inondées trop longtemps, elles mourront.\n\nLes cultures qui poussent normalement lorsqu'elles sont inondées (typha, etc.) fonctionnent à l'inverse : elles doivent être drainées une fois par jour pour croître plus rapidement.\n\nCet effet s'additionne au bonus de la Ruche. La vitesse de croissance la plus élevée est atteinte lorsque les cultures sont à portée d'une Ruche et sont inondées ou drainées une fois par jour."
deDE = "Mit diesem Mod kann die Fruchtbarkeit des Bodens durch Bewässerung erhöht werden.\n\nDas Bewässern von Pflanzen (Karotten, Weizen usw.) einmal täglich erhöht ihre Wachstumsrate. Wenn sie jedoch zu lange überschwemmt bleiben, sterben sie.\n\nPflanzen, die normalerweise im Überfluss wachsen (Schilfrohr usw.), funktionieren anders: Sie müssen einmal täglich abgelassen werden, um schneller zu wachsen.\n\nDieser Effekt ist mit dem Bonus des Bienenstocks kombinierbar. Die höchste Wachstumsrate wird erreicht, wenn die Pflanzen im Bereich eines Bienenstocks stehen und einmal täglich bewässert oder abgelassen werden."
plPL = "Dzięki temu modowi można zwiększyć żyzność gleby poprzez jej zalewanie.\n\nZalewanie upraw (marchew, pszenica itp.) raz dziennie zwiększa ich tempo wzrostu. Jednak jeśli będą zalewane zbyt długo, umrą.\n\nUprawy, które normalnie rosną, gdy są zalewane (tatarak itp.), działają w odwrotny sposób: muszą być osuszane raz dziennie, aby rosnąć szybciej.\n\nTen efekt kumuluje się z bonusem z ula. Najwyższa prędkość wzrostu jest osiągana, gdy uprawy znajdują się w zasięgu ula i są zalewane lub osuszane raz dziennie."
ptBR = "Com este mod, a fertilidade do solo pode ser aumentada ao inundá-lo.\n\nInundar culturas (cenouras, trigo, etc.) uma vez por dia aumenta sua velocidade de crescimento. No entanto, se permanecerem inundadas por muito tempo, morrerão.\n\nCulturas que normalmente crescem quando inundadas (junça, etc.) funcionam de forma inversa: precisam ser drenadas uma vez por dia para crescer mais rápido.\n\nEste efeito se acumula com o bônus da Colmeia. A maior velocidade de crescimento é alcançada quando as culturas estão dentro do alcance de uma Colmeia e são inundadas ou drenadas uma vez por dia."
koKR = "이 모드를 사용하면 토양의 비옥도를 홍수로 증가시킬 수 있습니다.\n\n작물을 하루에 한 번 홍수에 처하면 성장 속도가 빨라집니다. 하지만 너무 오랫동안 홍수에 노출되면 죽게 됩니다.\n\n주로 홍수가 난 상태에서 자라는 작물(갈대 등)은 반대로 작동합니다: 하루에 한 번 배수를 해야 더 빨리 성장합니다.\n\n이 효과는 벌집 보너스와 중첩됩니다. 작물이 벌집의 범위 내에 있으며 하루에 한 번 홍수에 처하거나 배수될 때 가장 높은 성장 속도가 달성됩니다."
csCZ = "S pomocí tohoto modu lze zvýšit úrodnost půdy zaplavením.\n\nZaplavení plodin (mrkev, pšenice, atd.) jednou denně zvyšuje jejich rychlost růstu. Pokud však zůstanou zaplavené příliš dlouho, uhynou.\n\nPlodiny, které obvykle rostou při zaplavení (rákos, atd.), fungují naopak: potřebují být jednou denně odvodněny, aby rostly rychleji.\n\nTento efekt se sčítá s bonusem z úlu. Nejvyšší rychlosti růstu dosáhneme, když jsou plodiny v dosahu úlu a jsou zaplaveny nebo odvodněny jednou denně."
viVN = "Với mod này, độ màu mỡ của đất có thể được tăng cường bằng cách ngập nước.\n\nNgập nước cho cây trồng (Cà rốt, Lúa mì, v.v.) một lần mỗi ngày sẽ tăng tốc độ phát triển của chúng. Tuy nhiên, nếu chúng bị ngập nước quá lâu, chúng sẽ chết.\n\nCây trồng thường phát triển khi bị ngập nước (cỏ bấc, v.v.) lại cần được xả nước một lần mỗi ngày để phát triển nhanh hơn.\n\nHiệu ứng này cộng dồn với phần thưởng từ tổ ong. Tốc độ phát triển cao nhất đạt được khi cây trồng nằm trong phạm vi của tổ ong và được ngập hoặc xả nước một lần mỗi ngày."
