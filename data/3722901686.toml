[_meta]
name = "Nile Crops [ModContest1]"

["Tutorial.FloodableCrop"]
new = "Fertility by flooding (Mod)"
status = "normal"

["Tutorial.FloodableCrops.Description"]
new = "With this mod, the fertility of the soil can be increased by flooding it.\n\nFlooding crops (Carrots, Wheat, etc.) once a day increases their growth speed. However, if they remain flooded for too long, they will die.\n\nCrops that normally grow while flooded (cattail, etc.) work the other way around: They need to be drained once a day to grow faster.\n\nThis effect stacks with the Beehive bonus. The highest growth speed is achieved when crops are within range of a Beehive and are flooded or drained once per day.\n"
status = "normal"
