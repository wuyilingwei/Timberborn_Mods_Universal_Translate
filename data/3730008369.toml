["Building.Market.Description"]
raw = "Workers haul food from nearby storage to the market, where beavers can come and grab any food they need."
status = "normal"
enUS = "Workers transport food from nearby storage to the market, where beavers can come and take any food they need."
zhCN = "工人将食物从附近的储存处运输到市场，海狸可以在这里取走他们需要的任何食物。"
