ruRU = "Рабочие переносят еду из ближайшего склада на рынок, где бобры могут прийти и забрать любую еду, которая им нужна."
jaJP = "「作業員は近くの倉庫から市場へ食料を運び、そこではビーバーたちが必要な食料を取りに来ることができます。」"
frFR = "Les ouvriers transportent de la nourriture depuis les entrepôts voisins vers le marché, où les castors peuvent venir prendre la nourriture dont ils ont besoin."
