plPL = "Pracownicy transportują jedzenie z pobliskich magazynów do rynku, gdzie bobry mogą przyjść i wziąć dowolne jedzenie, którego potrzebują."
ptBR = "Os trabalhadores transportam comida do armazenamento próximo para o mercado, onde os castores podem vir e pegar qualquer comida de que precisem."
koKR = "제작자들이 인근 저장소에서 시장으로 음식을 운반하며, 그곳에서 비버들이 필요한 음식을 가져갈 수 있습니다."
csCZ = "Pracovníci nosí jídlo z blízkého skladu na trh, kde si bobři mohou vzít jakékoli jídlo, které potřebují."
viVN = "Công nhân vận chuyển thực phẩm từ kho gần đó đến chợ, nơi các chú beaver có thể đến và lấy bất kỳ thực phẩm nào mà họ cần."
trTR = "İşçiler, yakındaki depolardan yiyecekleri pazar yerine taşır, burada kunduzlar ihtiyaç duydukları yiyecekleri alabilir."

["Building.Market.FlavorDescription"]
raw = "On market days, the freshest berries, breads and water from across the settlement are gathered under one roof."
status = "normal"
enUS = "On market days, the freshest berries, breads, and water from across the settlement are gathered under one roof."
zhCN = "在集市日，来自整个定居点最新鲜的浆果、面包和水汇聚在一处。"
zhTW = "在市集日，整個定居點最新鮮的莓果、麵包和水都集中在同一個屋簷下。"
ruRU = "В дни рынка самые свежие ягоды, хлеб и вода со всего поселения собираются под одной крышей."
jaJP = "「マーケットの日には、集落のあらゆる所から集められた新鮮なベリー、パン、水が一つの屋根の下に集められます。」"
frFR = "Lors des journées de marché, les baies, pains et eaux les plus frais de tout le peuplement sont rassemblés sous un même toit."
deDE = "An Markttagen werden die frischesten Beeren, Brote und Wasser aus der ganzen Siedlung unter einem Dach gesammelt."
plPL = "W dni targowe najświeższe jagody, pieczywo i woda z całego osiedla są zbierane pod jednym dachem."
ptBR = "Nos dias de mercado, as frutas mais frescas, pães e água de toda a colônia são reunidos sob um único teto."
koKR = "시장 날에는 정착지 곳곳에서 가장 신선한 베리, 빵, 그리고 물이 한곳에 모입니다."
csCZ = "V tržních dnech se pod jednu střechu shromažďují ty nejčerstvější bobule, chleby a voda z celého osídlení."
viVN = "Vào những ngày chợ, những quả mọng tươi nhất, bánh mì và nước từ khắp nơi trong khu định cư được tập hợp dưới một mái nhà."
trTR = "Pazar günlerinde, yerleşimin dört bir yanından en taze meyveler, ekmekler ve sular tek bir çatı altında toplanır."
