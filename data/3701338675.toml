["LV.BDl.CopyOneNotf"]
raw = "This building has multiple banners. Only the first one was copied. To copy a specific banner, use the Copy button in that banner's panel."
status = "normal"
enUS = "This building has multiple banners. Only the first one was copied. To copy a specific banner, use the Copy button in that banner's panel."
