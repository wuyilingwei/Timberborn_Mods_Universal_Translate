frFR = "Ce bâtiment a plusieurs bannières. Seule la première a été copiée. Pour copier une bannières spécifique, utilisez le bouton Copier dans le panneau de cette bannières."
deDE = "Dieses Gebäude hat mehrere Banner. Nur das erste wurde kopiert. Um ein bestimmtes Banner zu kopieren, verwenden Sie die Schaltfläche \"Kopieren\" im Panel dieses Banners."
plPL = "Ten budynek ma wiele banerów. Tylko pierwszy z nich został skopiowany. Aby skopiować konkretny baner, użyj przycisku Kopiuj w panelu tego banera."
ptBR = "Este edifício possui múltiplos estandartes. Apenas o primeiro foi copiado. Para copiar um estandarte específico, use o botão Copiar no painel desse estandarte."
koKR = "이 건물에는 여러 개의 배너가 있습니다. 첫 번째 배너만 복사되었습니다. 특정 배너를 복사하려면 해당 배너 패널의 복사 버튼을 사용하세요."
csCZ = "Tato budova má několik bannerů. Byl zkopírován pouze první z nich. Chcete-li zkopírovat konkrétní banner, použijte tlačítko Zkopírovat v panelu daného banneru."
viVN = "Công trình này có nhiều biểu ngữ. Chỉ có biểu ngữ đầu tiên được sao chép. Để sao chép một biểu ngữ cụ thể, hãy sử dụng nút Sao chép trong bảng điều khiển của biểu ngữ đó."
