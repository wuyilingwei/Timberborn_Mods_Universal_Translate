["ModSetting.WithdrawalThreshold.Tooltip"]
raw = "The minimum addiction level at which withdrawal symptoms begin if a beaver runs out of rice powder. Higher values allow for greater addiction with fewer consequences."
status = "normal"
enUS = "The minimum addiction level at which withdrawal symptoms begin if a beaver runs out of rice powder. Higher values allow for greater addiction with fewer consequences."
zhCN = "“海狸在缺少米粉时开始出现戒断症状的最低成瘾水平。更高的数值允许更大的成瘾性，但后果较少。”"
zhTW = "「如果海狸用完米粉，開始出現戒斷症狀的最低上癮水平。較高的數值允許更大的上癮程度，後果卻較輕。」"
ruRU = "Минимальный уровень зависимости, при котором начинают проявляться симптомы отмены, если бобёр остаётся без рисовой муки. Более высокие значения позволяют достичь большей зависимости с меньшими последствиями."
jaJP = "「ビーバーが米粉を使い果たした場合、離脱症状が始まる最小の依存レベルです。値が高いほど、より大きな依存が可能ですが、結果は少なくなります。」"
frFR = "Niveau d'addiction minimum à partir duquel les symptômes de sevrage commencent si un castor manque de poudre de riz. Des valeurs plus élevées permettent une plus grande dépendance avec moins de conséquences."
deDE = "Das minimale Suchtlevel, bei dem Entzugserscheinungen auftreten, wenn ein Biber kein Reis-Pulver mehr hat. Höhere Werte ermöglichen eine stärkere Sucht mit weniger Auswirkungen."
plPL = "Minimalny poziom uzależnienia, przy którym zaczynają występować objawy odstawienia, jeśli bóbr wyczerpie zapasy ryżowego proszku. Wyższe wartości umożliwiają większe uzależnienie przy mniejszych konsekwencjach."
ptBR = "O nível mínimo de dependência em que os sintomas de abstinência começam se um castor ficar sem pó de arroz. Valores mais altos permitem maior dependência com menos consequências."
koKR = "비버가 쌀가루를 다 썼을 때 금단 증상이 시작되는 최소 중독 수준입니다. 더 높은 값은 더 적은 결과로 더 큰 중독을 허용합니다."
csCZ = "Minimální úroveň závislosti, při které začínají příznaky abstinence, pokud bobr dojde rýžový prášek. Vyšší hodnoty umožňují větší závislost s menšími následky."
viVN = "Mức độ nghiện tối thiểu mà triệu chứng cai nghiện bắt đầu nếu một con hải ly hết bột gạo. Các giá trị cao hơn cho phép mức độ nghiện lớn hơn với ít hậu quả hơn."
trTR = "Bir kunduz pirinç tozu tükenirse, yoksunluk belirtilerinin başladığı minimum bağımlılık seviyesidir. Daha yüksek değerler, daha az sonuçla daha büyük bağımlılığa olanak tanır."

