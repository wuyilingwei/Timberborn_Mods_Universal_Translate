["ModSetting.MaxDecayMultiplier.Tooltip"]
raw = "How fast rice powder effects wear off at maximum addiction. Higher values mean beavers will need it more frequently."
status = "normal"
enUS = "How fast rice powder effects wear off at maximum addiction. Higher values mean beavers will need it more frequently."
zhCN = "大米粉效果在最大成瘾时多久消失。更高的数值意味着海狸需要它的频率更高。"
zhTW = "在最大成癮情況下，米粉效果消失的速度。值越高，海狸需要的頻率就越高。"
ruRU = "Насколько быстро эффекты рисовой пудры исчезают при максимальной зависимости. Более высокие значения означают, что бобрам это нужно будет чаще."
jaJP = "お米粉の効果が最大の中毒でどれほど早く薄れるか。数値が大きいほど、ビーバーはそれをより頻繁に必要とします。"
