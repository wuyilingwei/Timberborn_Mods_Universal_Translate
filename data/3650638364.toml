["LV.BRe.NegotiateConfirm"]
raw = "Are you sure you want to <b>negotiate</b> the excavation requirements?\nThe cost will be changed but <RedHighlight>any progress made so far will be lost</RedHighlight>.\nAfter negotiation, you cannot make another one for {0} days."
status = "normal"
enUS = "Are you sure you want to <b>negotiate</b> the excavation requirements? The cost will be changed but <RedHighlight>any progress made so far will be lost</RedHighlight>. After negotiation, you cannot make another one for {0} days."
zhCN = "你确定要<b>协商</b>挖掘要求吗？\n费用将会改变，但<RedHighlight>迄今为止的任何进展将会丢失</RedHighlight>。\n协商后，{0}天内无法再进行其他协商。"
zhTW = "您確定要<b>協商</b>挖掘要求嗎？\n費用將會改變，但<RedHighlight>到目前為止所取得的進度將會丟失</RedHighlight>。\n協商後，您在{0}天內無法再進行另一項協商。"
ruRU = "Вы уверены, что хотите <b>договориться</b> о требованиях к excavations?\nСтоимость будет изменена, но <RedHighlight>вся достигнутая прогрессия будет потеряна</RedHighlight>.\nПосле переговоров вы не сможете провести еще одни в течение {0} дней."
jaJP = "あなたは本当に< b >交渉< /b >の要件を掘削しますか？\n費用は変更されますが、<RedHighlight>これまでの進捗はすべて失われます</RedHighlight>。\n交渉後、{0}日間は別の交渉を行うことができません。"
frFR = "Êtes-vous sûr de vouloir <b>négocier</b> les exigences d'excavation ? \nLe coût sera modifié mais <RedHighlight>tout progrès réalisé jusqu'à présent sera perdu</RedHighlight>. \nAprès la négociation, vous ne pourrez pas en faire une autre pendant {0} jours."
deDE = "Bist du sicher, dass du die <b>Verhandlungs</b>anforderungen für die Ausgrabung ändern möchtest?\nDie Kosten werden sich ändern, aber <RedHighlight>jeglicher bisher erzielter Fortschritt geht verloren</RedHighlight>.\nNach der Verhandlung kannst du für {0} Tage keine weitere Verhandlung führen."
plPL = "Czy na pewno chcesz <b>negocjować</b> wymagania dotyczące wykopu? Koszt zostanie zmieniony, ale <RedHighlight>wszelkie dotychczasowe postępy zostaną utracone</RedHighlight>. Po negocjacji nie będziesz mógł przeprowadzić kolejnej przez {0} dni."
ptBR = "Você tem certeza de que deseja <b>negociar</b> os requisitos de escavação? O custo será alterado, mas <RedHighlight>todo o progresso feito até agora será perdido</RedHighlight>. Após a negociação, você não poderá fazer outra por {0} dias."
koKR = "발굴 요구 사항을 <b>협상</b> 하시겠습니까?\n비용이 변경되지만 <RedHighlight>지금까지 진행된 모든 진행 상황이 손실됩니다</RedHighlight>.\n협상이 끝난 후에는 {0}일 동안 다시 협상할 수 없습니다."
csCZ = "Jste si jisti, že chcete <b>vyjednávat</b> o požadavcích na vykopávky? Náklady se změní, ale <RedHighlight>veškerý dosavadní pokrok bude ztracen</RedHighlight>. Po vyjednávání již nebudete moci učinit další vyjednávání po dobu {0} dnů."
viVN = "Bạn có chắc chắn muốn <b>đàm phán</b> các yêu cầu khai quật không?\nChi phí sẽ bị thay đổi nhưng <RedHighlight>bất kỳ tiến độ nào đã đạt được cho đến nay sẽ bị mất</RedHighlight>.\nSau khi đàm phán, bạn sẽ không thể thực hiện thêm một lần nữa trong {0} ngày."

