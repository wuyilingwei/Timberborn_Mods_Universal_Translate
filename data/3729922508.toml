["blight.settings.profile.tooltip"]
raw = "Increase or decrease difficulty. Before someone asks, this is intentionally set to Main Menu only, not mid-game, to ensure settings apply correctly."
status = "normal"
enUS = "Increase or decrease difficulty. Before someone asks, this is intentionally set to Main Menu only, not mid-game, to ensure settings apply correctly."
zhCN = "“增加或降低难度。在有人询问之前，这一点是故意设置为仅在主菜单中，而不是在游戏进行中，以确保设置正确应用。”"
zhTW = "增加或減少難度。在有人詢問之前，這一點是故意設置為僅在主選單中，不在遊戲中進行，以確保設置正確應用。"
ruRU = "Увеличьте или уменьшите сложность. Прежде чем кто-то спросит, это намеренно установлено только в главном меню, а не в процессе игры, чтобы убедиться, что настройки применяются правильно."
jaJP = "難易度を上げたり下げたりします。誰かが尋ねる前に、これは意図的にメインメニューのみに設定されており、ゲーム中ではないため、設定が正しく適用されることを保証します。"
frFR = "Augmentez ou diminuez la difficulté. Avant que quelqu'un ne demande, cela est intentionnellement réglé sur le menu principal uniquement, et non en cours de partie, pour garantir que les paramètres s'appliquent correctement."
deDE = "Erhöhen oder verringern Sie die Schwierigkeit. Bevor jemand fragt, dies ist absichtlich nur im Hauptmenü eingestellt, nicht im laufenden Spiel, um sicherzustellen, dass die Einstellungen korrekt angewendet werden."
plPL = "Zwiększ lub zmniejsz trudność. Zanim ktoś zapyta, to jest celowo ustawione tylko na menu głównym, a nie w trakcie gry, aby upewnić się, że ustawienia są stosowane poprawnie."
ptBR = "Aumentar ou diminuir a dificuldade. Antes que alguém pergunte, isso está intencionalmente definido apenas para o Menu Principal, não durante o jogo, para garantir que as configurações sejam aplicadas corretamente."
koKR = "난이도를 높이거나 낮춥니다. 누군가 묻기 전에, 이는 설정이 올바르게 적용되도록 게임 중이 아니라 메인 메뉴에서만 의도적으로 설정되어 있습니다."
csCZ = "Zvyšte nebo snižte obtížnost. Než se někdo zeptá, je to úmyslně nastaveno pouze na hlavní menu, nikoli během hry, aby se zajistilo správné použití nastavení."
viVN = "Tăng hoặc giảm độ khó. Trước khi có ai hỏi, điều này được thiết lập chỉ cho Menu Chính, không phải giữa trò chơi, để đảm bảo cài đặt áp dụng chính xác."

