plPL = "Czy ta woda przecieka przez to?"
ptBR = "Essa água está vazando por aqui?"
koKR = "이 물이 새고 있나요?"
csCZ = "Prosakuje voda skrz to?"
viVN = "Nước có đang rò rỉ qua đây không?"

