deDE = "Lass die Leute hindurchgehen, nicht den Kot. Außer, wenn du es auch willst. Jetzt mit ?% zusätzlicher Neigung!"
plPL = "Pozwól ludziom przechodzić, nie fekalia. Wyjątek: jeśli chcesz także. Teraz z ?% dodatkowym nachyleniem!"
ptBR = "Deixe as pessoas passarem, não o cocô. Exceto se você também quiser. Agora com ?% de inclinação extra!"
koKR = "사람들이 지나가게 하되, 똥은 지나가지 못하게 하세요. 원하신다면 똥도 지나가게 할 수 있습니다. 이제 ?%의 추가 경사도가 생겼습니다!"
csCZ = "Povolte lidem průchod, ne výkalům. Pokud to chcete i vy. Nyní s ?% navíc sklonem!"
viVN = "Cho phép mọi người đi qua, không cho phân đi qua. Trừ khi bạn muốn cho nó đi qua. Giờ có ?% độ dốc thêm!"

