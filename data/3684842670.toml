["GerkinDev.WatertightGates.Building.WatertightGate.Flat.Description"]
status = "normal"
raw = "Let people pass through, not the poo. Except if you want it too."
enUS = "Let people pass through, not the poop. Unless you want it too."
zhCN = "让人通过，但不让粪便通过。除非你也想让粪便通过。"
zhTW = "讓人通過，別讓大便通過。除非你也想讓它通過。"
ruRU = "Пусть через него проходят люди, а не кал. Разве что хочешь, чтобы и кал пропускали."
jaJP = "人は通れるが、ウンチは通さない。あなたが望むなら、ウンチも通す。"
frFR = "Laissez passer les gens, pas les excréments. Sauf si vous le souhaitez aussi."
deDE = "Lass die Leute hindurchgehen, nicht den Kot. Außer, wenn du es auch willst."
plPL = "Pozwól ludziom przejść, nie przepuszczaj kupy. Wyjątek: jeśli chcesz, żeby i to przeszło."
ptBR = "Permita que as pessoas passem, não o cocô. A não ser que você também queira."
koKR = "사람들이 지나가게 하고, 똥은 지나가지 못하게 하라. 다만 원한다면 예외로 허용해도 된다."
csCZ = "Nechte lidi projít, ne výkaly. Pokud to chcete i vy."
viVN = "Cho phép người đi qua, không cho phân đi qua. Trừ khi bạn cũng muốn cho phân đi qua."

