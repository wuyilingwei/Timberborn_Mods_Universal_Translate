["Building.TreeOfLife.Description"]
raw = "Prepares the grounds for the <YellowHighlight>Tree of Life</YellowHighlight>.\n\nPlacement requires plenty of space for the final tree:\n\nA wide flat ground (5x5, 2 deep).\nSpace for all it's future growth (15m wide).\nIts roots reach deep deep down.\nThe 'X' marks where it expects water to flow in from.\n\n<YellowHighlight>Once finished beavers wont remove it!</YellowHighlight>\n"
status = "normal"
enUS = "Prepares the grounds for the <YellowHighlight>Tree of Life</YellowHighlight>.\n\nPlacement requires plenty of space for the final tree:\n\nA wide flat ground (5x5, 2 deep).\nSpace for all its future growth (15m wide).\nIts roots reach deep down.\nThe 'X' marks where it expects water to flow in from.\n\n<YellowHighlight>Once finished, beavers won't remove it!</YellowHighlight>"
zhCN = "“为<YellowHighlight>生命之树</YellowHighlight>准备土地。\n\n放置需要足够的空间供最终的树生长：\n\n宽阔平坦的地面（5x5，深度2）。\n为其未来的生长留出空间（15米宽）。\n它的根深深扎入地下。\n'X'标记着它期望水流入的位置。\n\n<YellowHighlight>一旦完成，海狸将不会移除它！</YellowHighlight>”"
zhTW = "「為<YellowHighlight>生命之樹</YellowHighlight>準備地基。\n\n安置此樹需要廣闊的空間：\n\n一塊寬闊的平地（5x5，深2）。\n有足夠的空間供其未來生長（15米寬）。\n它的根深入地下。\n「X」標記了它期待水流進入的地方。\n\n<YellowHighlight>一旦完成，海狸將不會拆除它！</YellowHighlight>」"
ruRU = "Подготавливает основание для <YellowHighlight>Древа Жизни</YellowHighlight>.  \n\nДля установки требуется достаточно места для окончательного дерева:  \n\nШирокая ровная площадка (5x5, 2 глубины).  \nМесто для всего его будущего роста (15 м в ширину).  \nЕго корни проникают глубоко вниз.  \n'X' обозначает место, откуда предполагается, что вода будет течь.  \n\n<YellowHighlight>После завершения бобры его не уберут!</YellowHighlight>"
jaJP = "「<YellowHighlight>命の木</YellowHighlight>」のために土地を整えます。\n\n最終的な木のために広いスペースが必要です：\n\n平坦な広い地面（5x5、深さ2）。\n将来の成長のためのスペース（幅15m）。\nその根は深く深く届きます。\n「X」は水が流れ込むと予想される場所を示します。\n\n<YellowHighlight>完成するとビーバーはそれを取り除きません！</YellowHighlight>"
frFR = "Prépare le terrain pour le <YellowHighlight>Arbre de Vie</YellowHighlight>.\n\nL'emplacement nécessite beaucoup d'espace pour l'arbre final :\n\nUn large terrain plat (5x5, 2 de profondeur).\nDe l'espace pour toute sa croissance future (15 m de large).\nSes racines s'enfoncent profondément.\nLe 'X' indique où il s'attend à ce que l'eau s'écoule.\n\n<YellowHighlight>Une fois terminé, les castors ne l'enlèveront pas !</YellowHighlight>"
deDE = "Bereitet den Boden für den <YellowHighlight>Baum des Lebens</YellowHighlight> vor.\n\nDie Platzierung benötigt viel Platz für den endgültigen Baum:\n\nEin breiter, flacher Boden (5x5, 2 tief).\nPlatz für sein zukünftiges Wachstum (15 m breit).\nSeine Wurzeln reichen tief nach unten.\nDas 'X' markiert, wo er erwartet, dass Wasser zufließt.\n\n<YellowHighlight>Einmal fertig, werden die Biber ihn nicht entfernen!</YellowHighlight>"
plPL = "Przygotowuje teren dla <YellowHighlight>Drzewa Życia</YellowHighlight>.\n\nUmiejscowienie wymaga dużo miejsca na ostateczne drzewo:\n\nSzeroka, płaska powierzchnia (5x5, 2 głębokości).\nPrzestrzeń na przyszły wzrost (15m szerokości).\nJego korzenie sięgają głęboko w dół.\n'X' oznacza miejsce, z którego spodziewa się dopływu wody.\n\n<YellowHighlight>Po zakończeniu bobry go nie usuną!</YellowHighlight>"
ptBR = "Prepara o terreno para a <YellowHighlight>Árvore da Vida</YellowHighlight>.\n\nA colocação requer bastante espaço para a árvore final:\n\nUm terreno amplo e plano (5x5, 2 de profundidade).\nEspaço para todo o seu futuro crescimento (15m de largura).\nSuas raízes alcançam bem fundo.\nO 'X' indica onde se espera que a água flua.\n\n<YellowHighlight>Uma vez finalizada, os castores não a removerão!</YellowHighlight>"
koKR = "<YellowHighlight>생명의 나무</YellowHighlight>를 위한 기초를 준비합니다.\n\n최종 나무를 위한 충분한 공간 필요:\n\n넓고 평평한 바닥 (5x5, 2 깊이).\n모든 미래의 성장을 위한 공간 (15m 너비).\n뿌리는 깊숙이 뻗어 있습니다.\n'X'는 물이 흘러들어올 것으로 예상되는 지점을 표시합니다.\n\n<YellowHighlight>완성되면 비버들은 철거하지 않습니다!</YellowHighlight>"
csCZ = "Připravuje půdu pro <YellowHighlight>Strom života</YellowHighlight>.\n\nUmístění vyžaduje spoustu prostoru pro finální strom:\n\nŠiroká rovná plocha (5x5, 2 hluboko).\nProstor pro jeho budoucí růst (15 m široký).\nJeho kořeny sahají hluboko dolů.\n'X' značí, odkud očekává příval vody.\n\n<YellowHighlight>Až bude hotový, bobři ho neodstraní!</YellowHighlight>"
viVN = "Chuẩn bị mặt đất cho <YellowHighlight>Cây sự sống</YellowHighlight>.\n\nViệc đặt cây yêu cầu có nhiều không gian cho cây cuối cùng:\n\nMột khu đất bằng phẳng rộng (5x5, sâu 2).\nKhông gian cho tất cả sự phát triển trong tương lai của nó (rộng 15m).\nRễ của nó đi sâu xuống đất.\n'X' đánh dấu nơi nó mong đợi nước sẽ chảy vào.\n\n<YellowHighlight>Khi hoàn thành, các chú rái cá sẽ không tháo gỡ nó!</YellowHighlight>"

["Building.TreeOfLife.LeafCoats.Description"]
status = "normal"
raw = "Prepares the grounds for the <YellowHighlight>Tree of Life</YellowHighlight>.\n\nMust be a tree-topper. Its roots reach deep down, it must have nothing but terrain below.\n<YellowHighlight>Once finished beavers dont want to remove it again.</YellowHighlight>\n"
enUS = "Prepares the grounds for the <YellowHighlight>Tree of Life</YellowHighlight>.\n\nMust be a tree-topper. Its roots reach deep down; it must have nothing but terrain below.\n<YellowHighlight>Once finished, beavers don't want to remove it again.</YellowHighlight>"
zhCN = "“为<YellowHighlight>生命之树</YellowHighlight>做好准备。\n\n必须是树顶。它的根深深扎入地下，下面必须没有任何东西。\n<YellowHighlight>一旦完成，海狸就不想再移除它。</YellowHighlight>”"
zhTW = "為<YellowHighlight>生命之樹</YellowHighlight>鋪設基礎。\n\n必須是一棵樹頂。它的根伸深於地下，下方必須只有地形。\n<YellowHighlight>完成後，海狸不想再將其拆除。</YellowHighlight>"
ruRU = "Подготавливает почву для <YellowHighlight>Дерева Жизни</YellowHighlight>.\n\nДолжно быть на вершине дерева. Его корни проникают глубоко в землю, под ним не должно быть ничего, кроме земли.\n<YellowHighlight>После завершения бобры не хотят удалять его снова.</YellowHighlight>"
jaJP = "「<YellowHighlight>命の木</YellowHighlight>のために地面を整備します。\n\n樹上のものでなければなりません。その根は深く伸びており、その下には地形以外何もあってはいけません。\n<YellowHighlight>完成するとビーバーは再びそれを取り除きたがらなくなります。</YellowHighlight>」"
frFR = "Prépare le terrain pour le <YellowHighlight>Arbre de Vie</YellowHighlight>.\n\nDoit être un sommet d'arbre. Ses racines s'enfoncent profondément, il ne doit avoir rien d'autre que du terrain en dessous.\n<YellowHighlight>Une fois terminé, les castors ne veulent plus le retirer.</YellowHighlight>"
deDE = "Bereitet den Boden für den <YellowHighlight>Baum des Lebens</YellowHighlight> vor.\n\nMuss ein Baumkronen-Gebäude sein. Seine Wurzeln reichen tief hinunter, es darf sich nichts außer Gelände darunter befinden.\n<YellowHighlight>Sobald es fertig ist, wollen die Biber es nicht wieder entfernen.</YellowHighlight>\n"
plPL = "Przygotowuje teren pod <YellowHighlight>Drzewo Życia</YellowHighlight>.\n\nMusi być na szczycie drzewa. Jego korzenie sięgają głęboko, pod nim nie może być nic oprócz terenu.\n<YellowHighlight>Gdy zostanie ukończone, bobry nie chcą go usunąć ponownie.</YellowHighlight>"
ptBR = "Prepara o terreno para a <YellowHighlight>Árvore da Vida</YellowHighlight>.\n\nDeve ser um topo de árvore. Suas raízes se estendem bem profundo, não pode ter nada além de terreno abaixo.\n<YellowHighlight>Uma vez finalizado, os castores não querem removê-lo novamente.</YellowHighlight>"
koKR = "<YellowHighlight>생명의 나무</YellowHighlight>를 위한 토대를 준비합니다.\n\n나무 꼭대기여야 합니다. 뿌리가 깊게 뻗어 있어야 하며, 아래에는 오직 지형만 있어야 합니다.\n<YellowHighlight>완공되면 비버들은 다시는 제거하고 싶지 않아합니다.</YellowHighlight>"
csCZ = "Připravuje půdu pro <YellowHighlight>Strom života</YellowHighlight>.\n\nMusí být na vrcholu stromu. Jeho kořeny sahají hluboko dolů, musí mít pod sebou pouze terén.\n<YellowHighlight>Až bude hotový, býložravci ho nechtějí odstranit.</YellowHighlight>"
viVN = "Chuẩn bị nền tảng cho <YellowHighlight>Cây Sự Sống</YellowHighlight>.\n\nPhải là một cái cây phủ đỉnh. Rễ của nó chìm sâu xuống dưới, nó không được có gì ngoài địa hình bên dưới.\n<YellowHighlight>Khi hoàn thành, những con castor không muốn gỡ bỏ nó một lần nữa.</YellowHighlight>"

