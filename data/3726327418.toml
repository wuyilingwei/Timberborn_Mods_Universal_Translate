["Building.TreeOfLife.Description"]
raw = "Prepares the water channel and grounds for the <YellowHighlight>Tree of Life</YellowHighlight>. Beware that this can't be reverted and the grounds can't be demolished later!"
status = "normal"
enUS = "Prepares the water channel and grounds for the <YellowHighlight>Tree of Life</YellowHighlight>. Beware that this can't be reverted and the grounds can't be demolished later!"
zhCN = "“为<YellowHighlight>生命之树</YellowHighlight>准备水渠和土地。请注意，这无法恢复，土地也不能在后期拆除！”"
zhTW = "「準備<YellowHighlight>生命之樹</YellowHighlight>的水道和地面。請注意，這個過程無法回退，並且地面無法在之後被拆除！」"
ruRU = "Подготавливает водный канал и основание для <YellowHighlight>Древа Жизни</YellowHighlight>. Будьте осторожны, это действие нельзя отменить, и основание позже нельзя сносить!"
jaJP = "「<YellowHighlight>命の木</YellowHighlight>」のために水路と土地を整えます。これは元に戻すことができず、後で土地を解体することもできないことに注意してください！"
frFR = "Prépare le canal d'eau et les terrains pour le <YellowHighlight>Arbre de Vie</YellowHighlight>. Attention, cela ne peut pas être annulé et les terrains ne peuvent pas être démolis par la suite !"
deDE = "Bereitet den Wasserkanal und die Grundfläche für den <YellowHighlight>Baum des Lebens</YellowHighlight> vor. Seid gewarnt, dass dies nicht umkehrbar ist und die Grundfläche später nicht abgerissen werden kann!"
plPL = "Przygotowuje kanał wodny i teren dla <YellowHighlight>Drzewa Życia</YellowHighlight>. Uważaj, bo tego nie można cofnąć, a terenu nie można później zburzyć!"
ptBR = "Prepara o canal de água e o terreno para a <YellowHighlight>Árvore da Vida</YellowHighlight>. Cuidado, pois isso não pode ser revertido e o terreno não pode ser demolido depois!"
koKR = "생명의 나무<YellowHighlight>Tree of Life</YellowHighlight>를 위한 물길과 땅을 준비합니다. 이것은 되돌릴 수 없으며, 나중에 이 땅을 철거할 수 없다는 점에 유의하세요!"
csCZ = "Připravuje vodní kanál a půdu pro <YellowHighlight>Strom života</YellowHighlight>. Dávejte pozor, že to nelze vrátit zpět a půdu nelze později zničit!"
viVN = "Chuẩn bị mương nước và mặt đất cho <YellowHighlight>Cây sự sống</YellowHighlight>. Hãy cẩn thận vì điều này không thể hoàn lại và mặt đất không thể bị phá hủy sau này!"

