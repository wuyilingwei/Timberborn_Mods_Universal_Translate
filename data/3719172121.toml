[_meta]
name = "Grawitational Water Pump [ModContest1]"

["Building.GrawitationalPump.Description"]
raw = "Collects water or badwater using gravity - no beavers required. Accept liquid from elevated water-levels on the back side. Front part of the building can be flooded stopping collection."
status = "normal"
enUS = "Collects water or polluted water using gravity - no beavers required. Accepts liquid from elevated water levels on the back side. The front part of the building can be flooded, stopping collection."
zhCN = "“利用重力收集水或污水 - 不需要海狸。接受来自背面高水位的液体。建筑前部可能会被淹没，从而停止收集。”"
zhTW = "利用重力收集水或污水 - 不需要海狸。從背面的高水位接受液體。建築的前部可以被淹沒，停止收集。"
ruRU = "Собирает воду или загрязненную воду с помощью гравитации - без необходимости в бобрах. Принимает жидкость с приподнятых уровней воды с задней стороны. Передняя часть здания может быть затоплена, что остановит сбор."
jaJP = "重力ポンプの説明 - 「ビーバーを使わずに重力で水または汚水を集めます。背面から高い水位の液体を受け入れます。建物の前部が浸水すると、収集が停止します。」"
frFR = "Collecte de l'eau ou des eaux usées en utilisant la gravité - pas besoin de castors. Accepte les liquides provenant de niveaux d'eau élevés à l'arrière. La partie avant du bâtiment peut être inondée, stoppant ainsi la collecte."
deDE = "Sammlung von Wasser oder Abwasser mithilfe der Schwerkraft - keine Biber erforderlich. Nimmt Flüssigkeit von erhöhten Wasserständen auf der Rückseite auf. Vorderer Teil des Gebäudes kann überflutet werden, wodurch die Sammlung gestoppt wird."
plPL = "Zbiera wodę lub ścieki za pomocą grawitacji - nie wymaga bobrów. Przyjmuje ciecz z podwyższonych poziomów wody z tyłu. Przednia część budynku może być zalana, co zatrzyma zbieranie."
ptBR = "Coleta água ou água contaminada usando gravidade - sem castores necessários. Aceita líquido de níveis de água elevados na parte de trás. A parte frontal do edifício pode ser inundada, interrompendo a coleta."
koKR = "중력을 이용해 물이나 오수를 수집합니다 - 비버가 필요 없습니다. 뒷면에서 높은 수위의 액체를 받아들입니다. 건물의 앞부분이 침수되면 수집이 중단됩니다."
csCZ = "„Shromažďuje vodu nebo znečištěnou vodu pomocí gravitace – bez potřeby bobrů. Přijímá kapalinu z vyvýšených hladin vody na zadní straně. Přední část budovy může být zaplavena, což zastaví sběr.“"
viVN = "Thu thập nước hoặc nước bẩn sử dụng trọng lực - không cần đến nhím. Nhận chất lỏng từ các mức nước cao hơn ở phía sau. Phần trước của công trình có thể bị ngập nước, ngăn chặn quá trình thu thập."
trTR = "Yerçekimini kullanarak su veya kirli su toplar - beaver gerekmez. Arkada, yüksek su seviyelerinden sıvı kabul eder. Bina ön kısmı su basıldığında toplama durur."

