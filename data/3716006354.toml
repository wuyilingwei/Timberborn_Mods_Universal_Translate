["BuildQueue.Settings.Description"]
status = "normal"
raw = "Show or hide the build queue panel from the top bar or hotkey. The toggle hotkey now lives in Settings -> Keybindings (default: B)."
enUS = "Show or hide the build queue panel from the top bar or hotkey. The toggle hotkey now lives in Settings -> Keybindings (default: B)."
zhCN = "从顶部栏或快捷键中显示或隐藏建筑队列面板。切换快捷键现在位于设置 -> 键位绑定中（默认：B）。"
zhTW = "在頂部工具欄或使用快捷鍵顯示或隱藏建造隊列面板。切換快捷鍵現在位於設置 -> 鍵位綁定中（默認：B）。"
ruRU = "Показать или скрыть панель очереди строительства в верхней части экрана или с помощью горячей клавиши. Теперь переключатель горячей клавиши находится в Настройки -> Привязки клавиш (по умолчанию: B)."
jaJP = "ビルドキューパネルをトップバーまたはホットキーから表示または非表示にします。トグルホットキーは現在、設定 -> キーバインディングにあります（デフォルト: B）。"
frFR = "Affichez ou masquez le panneau de la file d'attente de construction à partir de la barre supérieure ou avec une touche de raccourci. La touche de raccourci pour activer/désactiver se trouve maintenant dans Paramètres -> Raccourcis clavier (par défaut : B)."
deDE = "Zeigen Sie das Bauauftragsfenster in der oberen Leiste oder per Hotkey an oder verbergen Sie es. Der Umschalt-Hotkey befindet sich jetzt unter Einstellungen -> Tastenbelegungen (standardmäßig: B)."
plPL = "Pokaż lub ukryj panel kolejki budowy z górnego paska lub za pomocą skrótu klawiszowego. Skrót przełączania jest teraz dostępny w Ustawieniach -> Przypisania klawiszy (domyślnie: B)."
ptBR = "Mostre ou oculte o painel da fila de construção na barra superior ou por atalho. O atalho de alternância agora está em Configurações -> Atalhos (padrão: B)."
koKR = "상단 바 또는 바로 가기에서 건설 대기열 패널을 표시하거나 숨깁니다. 토글 바로 가기는 이제 설정 -> 키 바인딩에 있습니다 (기본값: B)."
csCZ = "Zobrazit nebo skrýt panel fronty stavby z horního panelu nebo pomocí klávesové zkratky. Klávesová zkratka pro přepínání je nyní v Nastavení -> Klávesová zkratka (výchozí: B)."
viVN = "Hiển thị hoặc ẩn bảng hàng đợi xây dựng từ thanh công cụ hoặc phím tắt. Phím tắt chuyển đổi hiện nằm trong Cài đặt -> Phím tắt (mặc định: B)."

