["LV.BCEv.Unhoused.Content"]
raw = "Some time has passed since the colony began, but not every beaver has a roof to sleep under.\nAt dusk, the unhoused gather near the paths, wrapping their tails close against the cold ground. No one complains loudly. They only glance toward the finished lodges, then back at the empty spaces where more homes should have stood.\nThe colony looks to you for an answer."
status = "normal"
enUS = "Some time has passed since the colony began, but not every beaver has a roof to sleep under. At dusk, the unhoused gather near the paths, wrapping their tails close against the cold ground. No one complains loudly. They only glance toward the finished lodges, then back at the empty spaces where more homes should have stood. The colony looks to you for an answer."
zhCN = "自殖民地开始以来，已经过去了一段时间，但并不是每只海狸都有屋顶可以睡觉。\n黄昏时分，无家可归的海狸聚集在小路附近，把尾巴紧紧贴在冰冷的地面上。没有人大声抱怨。他们只是瞥一眼已完工的房屋，然后又回头看向本该有更多房屋的空地。\n殖民地在期待你的答案。"
zhTW = "自殖民地建立以來已經過了一段時間，但並不是每隻海狸都有屋頂可供安眠。  \n黃昏時分，無家可歸者聚集在小路旁，將尾巴緊緊裹住以抵禦寒冷的地面。沒有人大聲抱怨。他們只是朝著完工的巢穴瞥了一眼，然後又回望那些應該有更多房屋的空地。  \n殖民地期待著你的回答。"
ruRU = "Прошло некоторое время с тех пор, как начала функционировать колония, но не у каждой бобра есть крыша над головой. На закате бездомные собираются у тропинок, прижимая хвосты к холодной земле. Никто не жалуется вслух. Они лишь бросают взгляд на завершенные домики, а затем обратно на пустые пространства, где должны были стоять новые дома. Колония ждет от вас ответа."
jaJP = "コロニーが始まってからしばらく経ちましたが、すべてのビーバーが寝るための屋根を持っているわけではありません。  \n夕暮れ時、家のないビーバーたちは道の近くに集まり、寒い地面に尾を寄せています。 誰も声を大にして不満を言いません。 彼らはただ完成したロッジの方をちらりと見てから、もっと家が立つべき空き地を振り返ります。  \nコロニーはあなたに解決策を求めています。"
frFR = "Un certain temps s'est écoulé depuis le début de la colonie, mais tous les castors n'ont pas de toit sous lequel dormir.\nAu crépuscule, les sans-abri se rassemblent près des chemins, enroulant leurs queues contre le sol froid. Personne ne se plaint bruyamment. Ils jettent simplement un coup d'œil vers les cabanes finies, puis vers les espaces vides où d'autres maisons auraient dû se tenir.\nLa colonie se tourne vers vous pour une réponse."
deDE = "Seit der Gründung der Kolonie ist einige Zeit vergangen, aber nicht jeder Biber hat ein Dach über dem Kopf.\nIn der Dämmerung sammeln sich die Obdachlosen nahe den Wegen und ziehen ihre Schwänze eng gegen den kalten Boden. Niemand beschwert sich laut. Sie werfen nur einen Blick auf die fertigen Blockhäuser und dann zurück auf die leeren Plätze, an denen weitere Häuser hätten stehen sollen.\nDie Kolonie schaut zu dir auf eine Antwort."
plPL = "Minęło trochę czasu od powstania kolonii, ale nie każdy bóbr ma dach nad głową.\nO zmroku bezdomni gromadzą się w pobliżu ścieżek, otulając swoje ogony wokół zimnej ziemi. Nikt głośno nie narzeka. Tylko rzucają okiem na ukończone chatki, a potem z powrotem na puste miejsca, gdzie powinny stać kolejne domy.\nKolonia czeka na twoją odpowiedź."
ptBR = "Algum tempo se passou desde o início da colônia, mas nem todos os castores têm um teto para dormir.\nAo entardecer, os desabrigados se reúnem perto das trilhas, envolvendo suas caudas contra o chão frio. Ninguém reclama em voz alta. Eles apenas olham para os abrigos acabados e depois de volta para os espaços vazios onde mais casas deveriam estar.\nA colônia olha para você em busca de uma resposta."
koKR = "식민지가 시작된 이후 시간이 어느 정도 흘렀지만, 모든 비버가 잠을 잘 수 있는 지붕 아래 있지는 않습니다. \n해질 무렵, 집이 없는 비버들이 길 근처에 모여 추운 땅에 꼬리를 감싸고 있습니다. 아무도 크게 불평하지 않습니다. 그들은 완공된 오두막 쪽을 한 번 쳐다본 후, 더 많은 집이 있어야 할 빈 공간을 다시 바라봅니다. \n식민지는 당신에게 해답을 요청합니다."
csCZ = "Od doby, co kolonie začala, uběhla nějaká doba, ale ne každý bobr má střechu nad hlavou. \nZa soumraku se bezdomoví shromažďují poblíž stezek, přitiskují své ocasy k chladné zemi. Nikdo příliš nahlas neprotestuje. Jen se občas podívají na hotové chatky, a poté zpět na prázdné prostory, kde měly stát další domovy. \nKolonie se na vás dívá pro odpověď."
viVN = "Một khoảng thời gian đã trôi qua kể từ khi thuộc địa bắt đầu, nhưng không phải mỗi con bọ rùa đều có một mái nhà để ngủ dưới.\nKhi hoàng hôn buông xuống, những con bọ rùa không có chỗ ở tụ tập gần những con đường, cuộn đuôi lại sát xuống mặt đất lạnh. Không ai than phiền to. Họ chỉ liếc nhìn về phía những túp lều hoàn thành, rồi trở lại những khoảng trống nơi mà lẽ ra nhiều ngôi nhà đã phải tồn tại.\nThuộc địa nhìn về phía bạn với một câu hỏi."

