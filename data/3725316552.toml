["LV.BCEv.StartBonus"]
new = "A new start"
status = "normal"

["LV.BCEv.StartBonus.Content"]
new = "The last bend of the river opens into a quiet stretch of land. The water runs clear, berry bushes cling to the bank, and a stand of young trees waits just beyond the shore.\nIt is not much yet, but it is enough.\nThe beavers gather around the camp, tired but hopeful. Before the work begins, the scouts report one small blessing found nearby."
status = "normal"

["LV.BCEv.StartBonus.C1"]
new = "Gather the berries"
status = "normal"

["LV.BCEv.StartBonus.C1N"]
new = "[[C]]A hidden patch of ripe berries is found nearby. [[+]][[good:Berries:{0:+0}]]"
status = "normal"

["LV.BCEv.StartBonus.C2"]
new = "Fill the barrels"
status = "normal"

["LV.BCEv.StartBonus.C2N"]
new = "[[C]]Clean water collects in a shallow pool. [[+]][[good:Water:{0:+0}]]"
status = "normal"

["LV.BCEv.StartBonus.C3"]
new = "Claim the fallen logs"
status = "normal"

["LV.BCEv.StartBonus.C3N"]
new = "[[C]]Dry fallen trunks lie near the treeline. [[+]][[good:Log:{0:+0}]]"
status = "normal"

["LV.BCEv.StartBonus.C4"]
new = "Rescue the youngling"
status = "normal"

["LV.BCEv.StartBonus.C4N"]
new = "[[C]]A young kit is found near the river, barely alive. [[+]]{0:+0} [[icon:UI/images/game/ico-child]] Child Beaver"
status = "normal"

["LV.BCEv.FirstDeath"]
new = "First Passing"
status = "normal"

["LV.BCEv.FirstDeath.Content"]
new = "{0} has passed away.\n\nThe colony grows quiet. For the first time, the beavers are not only thinking about survival, but about memory. A few gather nearby, unsure what to do next. Work still needs doing, but so does grief."
status = "normal"

["LV.BCEv.FirstDeath.C1"]
new = "Send them downriver"
status = "normal"

["LV.BCEv.FirstDeath.C1N"]
new = "[[C]][[-]][[good:{1}:{2}]] within [[time:{0}d]]"
status = "normal"

["LV.BCEv.FirstDeath.C2"]
new = "Build a cemetery"
status = "normal"

["LV.BCEv.FirstDeath.C2N"]
new = "[[C]][[-]][[good:{1}:{2}]] [[good:{3}:{4}]] within [[time:{0}d]]"
status = "normal"

["LV.BCEv.FirstDeath.C3"]
new = "Keep working"
status = "normal"

["LV.BCEv.FirstDeath.C3N"]
new = "[[C]]There is no time for this. The colony must move on. <YellowHighlight>Unknown consequences.</YellowHighlight>"
status = "normal"

["LV.BCEv.FirstDeath.O1"]
new = "The logs are lashed together into a small raft, just large enough to carry {0} downriver.\nThe colony watches in silence as the current takes them away. It is a simple farewell, but it gives the beavers a little peace.\n[[C]][[+]]All beavers gain the <GreenHighlight>+Remembrance</GreenHighlight> Wellbeing bonus for some time."
status = "normal"

["LV.BCEv.FirstDeath.O2"]
new = "The planks are shaped into a small cemetery marker for {0}.\nIt is not much, but it gives the colony a place to pause, remember, and honor those who came before them.\n[[C]][[+]]All beavers permanently gain the <GreenHighlight>+Remembrance</GreenHighlight> Wellbeing bonus."
status = "normal"

["LV.BCEv.FirstDeath.O3"]
new = "No farewell is given for {0}. No marker is built. The colony simply returns to work.\nSome beavers try not to think about it, but the silence settles heavily over the settlement. To them, it feels as if {0} was simply ignored.\n[[C]][[-]]All beavers suffer Heavy Hearts effect for {1}d."
status = "normal"

["LV.BCEv.FirstDeath.O4"]
new = "The colony returns to work.\nThere is sadness, but also understanding. Food must be gathered, water must be stored, and the settlement must survive. For now, the beavers carry the loss quietly and move on."
status = "normal"

["LV.BCEv.FirstDeath.BonusName"]
new = "Remembrance"
status = "normal"

["LV.BCEv.FirstDeath.MalusName"]
new = "Heavy Hearts"
status = "normal"

["LV.BCEv.Unhoused"]
new = "Still Under the Open Sky"
status = "normal"

["LV.BCEv.Unhoused.Content"]
new = "Some time has passed since the colony began, but not every beaver has a roof to sleep under.\nAt dusk, the unhoused gather near the paths, wrapping their tails close against the cold ground. No one complains loudly. They only glance toward the finished lodges, then back at the empty spaces where more homes should have stood.\nThe colony looks to you for an answer."
status = "normal"

["LV.BCEv.Unhoused.C1"]
new = "Promise shelter for most"
status = "normal"

["LV.BCEv.Unhoused.C1N"]
new = "[[C]]Ensure at least {1:0%} of beavers remain sheltered after [[time:{0}d]]"
status = "normal"

["LV.BCEv.Unhoused.C2"]
new = "Promise shelter for all"
status = "normal"

["LV.BCEv.Unhoused.C2N"]
new = "[[C]]Ensure all beavers remain sheltered after [[time:{0}d]]"
status = "normal"

["LV.BCEv.Unhoused.C3"]
new = "Make no promise"
status = "normal"

["LV.BCEv.Unhoused.C3N"]
new = "[[C]]The colony is too busy to make any promises. <YellowHighlight>Unknown consequences.</YellowHighlight>"
status = "normal"

["LV.BCEv.Unhoused.BuffName"]
new = "Sheltered"
status = "normal"

["LV.BCEv.Unhoused.Buff1Desc"]
new = "{0:+0%} Working Speed"
status = "normal"

["LV.BCEv.Unhoused.Buff2Desc"]
new = "{0:+0%} Working and Movement Speed"
status = "normal"

["LV.BCEv.Unhoused.DebuffName"]
new = "Unhoused"
status = "normal"

["LV.BCEv.Unhoused.O1"]
new = "By the promised day, most of the unhoused beavers have found a place indoors. It is not perfect, but it is enough to prove that the colony remembers those sleeping under the open sky. The mood lifts. Work resumes with steadier paws.\n[[C]][[+]]All beavers gain {0} for [[time:{1}d]]"
status = "normal"

["LV.BCEv.Unhoused.O2"]
new = "By the promised day, every beaver has a roof overhead. The last bed is claimed before nightfall, and for the first time in days, no one has to choose between sleep and the cold ground. The colony rests easier, and rises stronger.\n[[C]][[+]]All beavers gain {0} for [[time:{1}d]]"
status = "normal"

["LV.BCEv.Unhoused.O3"]
new = "Too many beavers are still sleeping outside. Whatever was said before, the colony has not given them shelter.\nThey rise tired, work slower, and keep their doubts mostly to themselves.\n[[C]][[-]]All beavers suffer {0} for [[time:{1}d]]"
status = "normal"

["LV.BCEv.FirstChildGrowth"]
new = "First Furrows"
status = "normal"

["LV.BCEv.FirstChildGrowth.Content"]
new = "{0} has come of age. Yesterday, they chased dragonflies along the bank. Today, they stand ready to take their place among the builders, haulers, growers, and dreamers.\nSome beavers suggest marking the moment with a small feast. It would cost precious resources, but a colony that celebrates its young may find its spirits lifted."
status = "normal"

["LV.BCEv.FirstChildGrowth.C1"]
new = "Hold a party"
status = "normal"

["LV.BCEv.FirstChildGrowth.C1N"]
new = "[[C]]Pay [[good:{1}:{2}]] and [[good:{3}:{4}]] in [[time:{0}d]]."
status = "normal"

["LV.BCEv.FirstChildGrowth.C2"]
new = "Let the day pass"
status = "normal"

["LV.BCEv.FirstChildGrowth.C2N"]
new = "[[C]]Nothing happens"
status = "normal"

["LV.BCEv.FirstChildGrowth.O1"]
new = "The feast is simple, but joyful. Food is shared, cups are raised, and {0} is welcomed into adulthood with cheers, jokes, and proud tail-slaps.\nFor a moment, the colony feels less like a settlement and more like a family.\n[[C]][[+]]All beavers gain {1} for [[time:{2}d]]"
status = "normal"

["LV.BCEv.FirstChildGrowth.O2"]
new = "The planned celebration never quite comes together. Supplies are needed elsewhere, and the colony quietly returns to its routines."
status = "normal"

["LV.BCEv.FirstChildGrowth.BuffName"]
new = "Celebration"
status = "normal"

["LV.BCEv.DroughtPrep"]
new = "Dry Days Ahead"
status = "normal"

["LV.BCEv.DroughtPrep.Content"]
new = "The air has turned brittle, and the river runs lower than it should. Old paws sniff the wind and mutter that a drought is coming.\nA group of volunteers gathers before dawn, packs ready and tails high. They want to make one last trip before the dry days arrive, but the colony must decide where their effort is best spent."
status = "normal"

["LV.BCEv.DroughtPrep.C1"]
new = "Search the spring"
status = "normal"

["LV.BCEv.DroughtPrep.C2"]
new = "Search the woods"
status = "normal"

["LV.BCEv.DroughtPrep.C3"]
new = "Search the meadow"
status = "normal"

["LV.BCEv.DroughtPrep.O1"]
new = "The volunteers return with muddy paws and full barrels. The spring was weak, but not empty.\n[[C]][[+]]Gain [[good:{0}:{1}]]"
status = "normal"

["LV.BCEv.DroughtPrep.O4"]
new = "The volunteers find only damp stones and cracked reeds. Whatever water once pooled there has already sunk away."
status = "normal"

["LV.BCEv.DroughtPrep.O2"]
new = "The volunteers return dragging branches, cuttings, and dry timber. The woods offered more than expected.\n[[C]][[+]]Gain [[good:{0}:{1}]]"
status = "normal"

["LV.BCEv.DroughtPrep.O5"]
new = "The woods are quiet and picked clean. The volunteers return tired, with little more than scratches and burrs."
status = "normal"

["LV.BCEv.DroughtPrep.O3"]
new = "The volunteers come back with baskets of gathered food, enough to make the coming days feel a little less sharp.\n[[C]][[+]]Gain [[good:{0}:{1}]]"
status = "normal"

["LV.BCEv.DroughtPrep.O6"]
new = "The meadow has already withered under the heat. The volunteers find only dry stalks and empty roots."
status = "normal"

["LV.BCEv.FoodWoodDispute1"]
new = "Axes and Plows"
status = "normal"

["LV.BCEv.FoodWoodDispute1.Content"]
new = "A quarrel has grown between the farmers and the lumberjacks. At first, it was only boasting over whose work mattered more. Then the jokes sharpened, the grumbling spread, and soon both sides were loudly claiming that the colony would fall apart without them.\nThe farmers say full bellies keep paws moving. The lumberjacks say every roof, dam, and workshop begins with timber.\nNow both groups have come before you, waiting to hear which work the colony values more."
status = "normal"

["LV.BCEv.FoodWoodDispute1.C1"]
new = "\"We can't eat wood!\""
status = "normal"

["LV.BCEv.FoodWoodDispute1.C2"]
new = "\"Logs build the colony!\""
status = "normal"

["LV.BCEv.FoodWoodDispute1.C3"]
new = "\"Settle it yourselves.\""
status = "normal"

["LV.BCEv.FoodWoodDispute1.O1"]
new = "The farmers cheer your judgment and return to the fields with renewed pride. If food is the heart of the colony, they intend to keep it beating.\nThe lumberjacks return to the forest in bitter silence.\n[[C]][[-]]Lumberjack Flags' workers lose {1:0%} Working Speed for [[time:{0}d]]\n[[C]][[+]]Farmhouses' workers gain {2:+0%} Working Speed for [[time:{0}d]]"
status = "normal"

["LV.BCEv.FoodWoodDispute1.O2"]
new = "The lumberjacks thump their tails in approval and march back toward the trees. Every raised roof and sturdy dam will prove their worth.\nThe farmers return to their fields with sour looks and sharper words.\n[[C]][[+]]Lumberjack Flags' workers gain {1:+0%} Working Speed for [[time:{0}d]]\n[[C]][[-]]Farmhouses' workers lose {2:0%} Working Speed for [[time:{0}d]]"
status = "normal"

["LV.BCEv.FoodWoodDispute1.O3"]
new = "To everyone's surprise, your refusal to choose sides works. The two groups argue a little longer, then begin laughing at how foolish the quarrel has become.\nBoth return to work determined to prove their worth without tearing the colony apart.\n[[C]][[+]]Lumberjack Flags' workers gain {1:+0%} Working Speed for [[time:{0}d]]\n[[C]][[+]]Farmhouses' workers gain {2:+0%} Working Speed for [[time:{0}d]]"
status = "normal"

["LV.BCEv.FoodWoodDispute1.O4"]
new = "Your refusal to choose sides satisfies nobody. The farmers feel ignored, the lumberjacks feel dismissed, and both groups return to work with their tails low and tempers high.\nThe quarrel is not over.\n[[C]][[-]]Lumberjack Flags' workers lose {1:0%} Working Speed for [[time:{0}d]]\n[[C]][[-]]Farmhouses' workers lose {2:0%} Working Speed for [[time:{0}d]]"
status = "normal"

["LV.BCEv.FoodWoodDispute2"]
new = "Axes and Plows: Escalation"
status = "normal"

["LV.BCEv.FoodWoodDispute2.Content"]
new = "The quarrel has not faded. Days later, the arguments flare up once again, louder and harsher than before. Workers accuse each other of arrogance, laziness, and draining the colony's labor for their own needs.\nNow the entire district waits to see whether you will stand firm, change course, or refuse to take part in the dispute at all."
status = "normal"

["LV.BCEv.FoodWoodDispute2.C1"]
new = "\"Food comes first.\""
status = "normal"

["LV.BCEv.FoodWoodDispute2.C2"]
new = "\"Wood keeps us alive.\""
status = "normal"

["LV.BCEv.FoodWoodDispute2.C3"]
new = "\"I will not choose sides.\""
status = "normal"

["LV.BCEv.FoodWoodDispute2.O1"]
new = "Your repeated support leaves no doubt where the colony leadership stands. The favored workers grow proud and energetic, while the others lose heart entirely.\n[[C]][[+]]{3} workers gain {1:0%} Working Speed for [[time:{0}d]]\n[[C]][[-]]{4} workers lose {2:0%} Working Speed for [[time:{0}d]]"
status = "normal"

["LV.BCEv.FoodWoodDispute2.O2"]
new = "The sudden shift catches the colony off guard, but over time the workers begin accepting the new balance. Tempers cool, though some resentment remains.\n[[C]][[+]]{3} workers gain {1:0%} Working Speed for [[time:{0}d]]\n[[C]][[-]]{4} workers lose {2:0%} Working Speed for [[time:{0}d]]"
status = "normal"

["LV.BCEv.FoodWoodDispute2.O3"]
new = "Your attempt to reverse course pleases nobody. One side feels abandoned while the other doubts your sincerity. The arguments only grow louder.\n[[C]][[-]]Both {3} and {4} workers lose {1:0%} Working Speed for [[time:{0}d]]"
status = "normal"

["LV.BCEv.FoodWoodDispute2.O4"]
new = "At last, exhaustion overcomes anger. The workers slowly realize the quarrel is hurting the colony more than helping it, and cooperation gradually returns.\n[[C]][[+]]Both groups' workers gain {1:0%} Working Speed for [[time:{0}d]]"
status = "normal"

["LV.BCEv.FoodWoodDispute2.O5"]
new = "Without guidance, resentment festers unchecked. Workers from both sides leave the meeting more frustrated than before, blaming the colony leadership for failing to settle the matter.\n[[C]][[-]]Both groups' workers lose {1:0%} Working Speed for [[time:{0}d]]"
status = "normal"

["LV.BCEv.FoodWoodDispute2.Lumberjack"]
new = "Lumberjack Flags'"
status = "normal"

["LV.BCEv.FoodWoodDispute2.Farmer"]
new = "Farmhouses'"
status = "normal"

["LV.BCEv.ContaminationCure"]
new = "Pasteur's Gamble"
status = "normal"

["LV.BCEv.ContaminationCure.Content"]
new = "{0} has been contaminated, lying still with damp fur, dull eyes, and a tail too weak to slap the ground. Most of the colony keeps a careful distance.\nThen a self-declared doctor steps forward with stained notes and a theory called Pasteur's Gamble. The treatment is untested. Water may flush the poison. Sunflowers may strengthen the body. More careful aid may improve the odds, though no one can say what failure might bring."
status = "normal"

["LV.BCEv.ContaminationCure.C1"]
new = "Give water"
status = "normal"

["LV.BCEv.ContaminationCure.C1N"]
new = "[[C]]Pay [[good:{1}:{2}]] in [[time:{0}d]]. <YellowHighlight>Unknown consequences.</YellowHighlight>"
status = "normal"

["LV.BCEv.ContaminationCure.C2"]
new = "Give sunflowers"
status = "normal"

["LV.BCEv.ContaminationCure.C2N"]
new = "[[C]]Pay [[good:{1}:{2}]] in [[time:{0}d]]. <YellowHighlight>Unknown consequences.</YellowHighlight>"
status = "normal"

["LV.BCEv.ContaminationCure.C3"]
new = "Aid the treatment"
status = "normal"

["LV.BCEv.ContaminationCure.C3N"]
new = "[[C]]Pay [[good:{1}:{2}]], [[good:{3}:{4}]], and [[good:{5}:{6}]] in [[time:{0}d]]. <YellowHighlight>Unknown consequences.</YellowHighlight>"
status = "normal"

["LV.BCEv.ContaminationCure.C4"]
new = "Dismiss the doctor"
status = "normal"

["LV.BCEv.ContaminationCure.C4N"]
new = "[[C]]Nothing happens."
status = "normal"

["LV.BCEv.ContaminationCure.O1"]
new = "Against every doubtful stare, the treatment works. {0}'s breathing steadies, their eyes clear, and before long they are sitting upright again.\nBetter still, the remaining mixture proves stable enough to store. Pasteur's Gamble may be crude, but it has given the colony something useful.\n[[C]][[+]]{0} is cured.\n[[C]][[+]]Gain [[good:{1}:{2}]]."
status = "normal"

["LV.BCEv.ContaminationCure.O2"]
new = "The treatment fails. {0} remains weak, and the hopeful mixture turns bitter and useless. By morning, several helpers begin showing the same signs of contamination.\n[[C]][[-]]{1} random beavers become contaminated."
status = "normal"

["LV.BCEv.ContaminationCure.O3"]
new = "The treatment fails. {0} remains weak, and the prepared goods are spent with nothing to show for them.\nThe careful notes, however, prove useful for something else. The doctor cannot save the cure, but the colony recovers the lesson.\n[[C]][[+]]Refund {1} Science."
status = "normal"

["LV.BCEv.ContaminationConspiracy"]
new = "A Quiet Place"
status = "normal"

["LV.BCEv.ContaminationConspiracy.Content"]
new = "{0} is contaminated.\nBy dusk, whispers crawl through the colony like mist over badwater. Some say the contaminated are not merely sent away for safety. Some say a far district waits for them, quiet and empty, with no warm beds, no full tanks, and no one to hear the last tail-slap.\nNo one says it loudly. No one admits they believe it. But every beaver has seen how quickly a sick worker can become a problem to solve.\nNow {0} watches the others from a distance, and the colony watches itself."
status = "normal"

["LV.BCEv.ContaminationConspiracy.C1"]
new = "We will dispel this conspiracy theory"
status = "normal"

["LV.BCEv.ContaminationConspiracy.C1N"]
new = "[[C]]Cure {0} within [[time:{1}d]]"
status = "normal"

["LV.BCEv.ContaminationConspiracy.O1"]
new = "{0} returns clean, living, and loudly welcomed.\nThe rumor does not vanish all at once, but it loses its teeth. A beaver can be contaminated and still be counted among the colony. A beaver can be isolated without being abandoned.\nThat matters.\n[[C]][[+]]All beavers gain {1} for [[time:{2}d]]"
status = "normal"

["LV.BCEv.ContaminationConspiracy.O2"]
new = "The quiet district remains quiet. There is no sound of {0} returning, no sign of recovery, and no end to the whispers.\nWhether by neglect, fear, or cruel necessity, the rumor now has a name and a shape. Beavers lower their voices when a contaminated worker passes. Some glance toward the far paths and wonder who will be sent there next.\nThe colony keeps working, but not without looking over its shoulder.\n[[C]][[-]]All beavers get {1} for [[time:{2}d]]"
status = "normal"

["LV.BCEv.ContaminationConspiracy.BuffName"]
new = "Reassured"
status = "normal"

["LV.BCEv.ContaminationConspiracy.DebuffName"]
new = "Quiet Dread"
status = "normal"
