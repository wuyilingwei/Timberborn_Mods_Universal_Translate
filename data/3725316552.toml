["LV.BCEv.StartBonus.Content"]
raw = "The last bend of the river opens into a quiet stretch of land. The water runs clear, berry bushes cling to the bank, and a stand of young trees waits just beyond the shore.\nIt is not much yet, but it is enough.\nThe beavers gather around the camp, tired but hopeful. Before the work begins, the scouts report one small blessing found nearby."
status = "normal"
enUS = "The last bend of the river opens into a quiet stretch of land. The water runs clear, berry bushes cling to the bank, and a stand of young trees waits just beyond the shore.  \nIt is not much yet, but it is enough.  \nThe beavers gather around the camp, tired but hopeful. Before the work begins, the scouts report one small blessing found nearby."
zhCN = "河流的最后一个弯道展开成一片宁静的土地。水流清澈，浆果灌木依附在岸边，一片年轻的树木在海岸边等待着。\n虽然现在还不算多，但这已经足够了。\n狸獾们围绕着营地聚集，疲惫却充满希望。在工作开始之前，侦察员报告在附近发现了一份小小的祝福。"
zhTW = "河流的最後一個彎道通向一片安靜的土地。水流清澈，莓果灌木緊貼著岸邊，一叢年輕的樹木在岸邊等候。\n現在還不算太多，但已經足夠。\n河狸們聚集在營地周圍，疲憊但充滿希望。在工作開始之前，探索者報告附近發現了一個小小的祝福。"
ruRU = "Последний изгиб реки открывается на тихую протяженность земли. Вода течет чистой, кусты ягод цепляются за берег, а группа молодых деревьев ждет за границей берега.  \nПока это не много, но этого вполне достаточно.  \nБобры собираются вокруг лагеря, уставшие, но полные надежды. Перед началом работы скауты сообщают о небольшом благословении, найденном неподалеку."
jaJP = "川の最後の曲がり角は静かな土地に開けています。水は澄んでおり、ベリーの茂みが岸にしがみつき、若い木々の林が岸のすぐ先で待っています。  \nまだ大したことはありませんが、それでも十分です。  \nビーバーたちはキャンプの周りに集まり、疲れていますが希望を持っています。仕事が始まる前に、スカウトたちは近くで見つけた小さな祝福を報告します。"
frFR = "Le dernier virage de la rivière s'ouvre sur une étendue de terre tranquille. L'eau coule claire, des buissons de baies s'accrochent à la rive et une bande de jeunes arbres attend juste au-delà de la rive.  \nCe n'est pas grand-chose pour l'instant, mais c'est suffisant.  \nLes castors se rassemblent autour du camp, fatigués mais pleins d'espoir. Avant que le travail ne commence, les éclaireurs rapportent une petite bénédiction trouvée à proximité."
deDE = "Die letzte Biegung des Flusses öffnet sich zu einem ruhigen Abschnitt Land. Das Wasser fließt klar, Beerenbüsche klammern sich ans Ufer, und eine Gruppe junger Bäume wartet gleich jenseits des Ufers. \nEs ist noch nicht viel, aber es ist genug. \nDie Biber versammeln sich um das Lager, müde, aber hoffnungsvoll. Bevor die Arbeit beginnt, berichten die Pfadfinder von einem kleinen Segen, der in der Nähe gefunden wurde."
plPL = "Ostatni zakręt rzeki otwiera się na cichą przestrzeń lądu. Woda jest czysta, krzaki jagodowe trzymają się brzegu, a rządek młodych drzew czeka tuż za brzegiem.  \nTo jeszcze niewiele, ale wystarczy.  \nBóbr gromadzą się wokół obozu, zmęczeni, ale pełni nadziei. Zanim praca się zacznie, zwiadowcy zgłaszają jedno małe błogosławieństwo znalezione w pobliżu."
ptBR = "A última curva do rio se abre em uma faixa tranquila de terra. A água corre limpa, arbustos de frutas se agarram à margem, e uma fileira de árvores jovens espera logo além da costa.  \nAinda não é muito, mas é o suficiente.  \nOs castores se reúnem ao redor do acampamento, cansados, mas esperançosos. Antes que o trabalho comece, os exploradores relatam uma pequena bênção encontrada nas proximidades."
koKR = "강의 마지막 굴곡은 조용한 땅으로 열립니다. 물은 맑고, 베리 덤불이 강둑에 붙어 있으며, 젊은 나무들이 해변 바로 너머에서 대기하고 있습니다. 아직 그리 많지는 않지만, 충분합니다. 비버들은 캠프 주위에 모여, 지치기는 했지만 희망을 품고 있습니다. 작업이 시작되기 전에 정찰대가 근처에서 발견한 작은 축복 하나를 보고합니다."
csCZ = "Poslední zákrut řeky se otevírá do klidného úseku země. Voda je čistá, keře s bobulemi se drží břehu a skupina mladých stromů čeká kousek za pobřežím.  \nZatím to není moc, ale stačí to.  \nBobři se shromažďují kolem tábora, unavení, ale plní naděje. Než práce začne, zvědové hlásí jedno malé požehnání nalezené v okolí."
viVN = "Khúc cuối của con sông mở ra một vùng đất yên tĩnh. Nước chảy trong vắt, các bụi cây quả mọng bám vào bờ, và một nhóm cây non đứng chờ ngay phía ngoài bờ.\nChưa nhiều lắm, nhưng đủ rồi.\nNhững con rái cá tụ tập quanh trại, mệt mỏi nhưng đầy hy vọng. Trước khi công việc bắt đầu, các trinh sát báo cáo về một phước lành nhỏ tìm thấy gần đó."

