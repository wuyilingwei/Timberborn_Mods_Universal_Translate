["LV.BCEv.ContaminationCure.Content"]
raw = "{0} has been contaminated, lying still with damp fur, dull eyes, and a tail too weak to slap the ground. Most of the colony keeps a careful distance.\nThen a self-declared doctor steps forward with stained notes and a theory called Pasteur's Gamble. The treatment is untested. Water may flush the poison. Sunflowers may strengthen the body. More careful aid may improve the odds, though no one can say what failure might bring."
status = "normal"
enUS = "{0} has been contaminated, lying still with damp fur, dull eyes, and a tail too weak to slap the ground. Most of the colony keeps a careful distance. Then a self-declared doctor steps forward with stained notes and a theory called Pasteur's Gamble. The treatment is untested. Water may flush the poison. Sunflowers may strengthen the body. More careful aid may improve the odds, though no one can say what failure might bring."
zhCN = "{0} 已被污染，静静地躺着，湿漉漉的毛发，暗淡的眼睛，尾巴无力地打地。大部分居民都保持着小心的距离。随后，一位自称医生的人走上前，手里拿着沾污的笔记和一个名为巴斯德的冒险的理论。治疗尚未经过测试。水可能冲洗掉毒素。向日葵可能增强身体。更小心的帮助可能会提高成功的几率，尽管没有人能说出失败会带来什么后果。"
zhTW = "{0} 已被污染，靜靜躺著，濕漉漉的毛發，微弱的眼神，尾巴無力地無法拍打地面。大多數同伴都保持著小心的距離。\n然後一位自稱的醫生走上前，手中拿著污跡斑斑的筆記和名為巴斯德的賭注理論。這種療法尚未經過測試。水可能會沖刷毒素。向日葵可能會強化身體。更謹慎的援助可能會提高成功的機率，雖然沒有人能確定失敗會帶來什麼後果。"
ruRU = "{0} был заражен, лежит неподвижно с влажной шерстью, тусклыми глазами и хвостом слишком слабым, чтобы ударять о землю. Большая часть колонии держится на осторожном расстоянии. \nТогда шаг вперед делает самопровозглашенный доктор с испачканными заметками и теорией, называемой «Грехом Пастера». Лечение не getestировано. Вода может смыть яд. Подсолнухи могут укрепить тело. Более тщательная помощь может улучшить шансы, хотя никто не может сказать, что принесет провал."
jaJP = "{0}は汚染されており、湿った毛皮、鈍い目、地面を叩くには弱すぎる尾を引きずって静かに横たわっています。コロニーのほとんどは慎重に距離を保っています。\nそこに自己宣言した医者が汚れたメモを持って前に出て、「パスツールの賭け」と呼ばれる理論を提唱します。治療は未検証です。水が毒を洗い流すかもしれません。ひまわりが体を強化するかもしれません。より慎重な援助が成功の可能性を高めるかもしれませんが、失敗が何をもたらすかは誰にも分かりません。"
frFR = "{0} a été contaminé, gisant immobile avec un pelage humide, des yeux ternes et une queue trop faible pour frapper le sol. La plupart de la colonie garde une distance prudente. \nPuis un médecin autoproclamé s'avance avec des notes tachées et une théorie appelée le Pari de Pasteur. Le traitement n'a pas été testé. L'eau pourrait éliminer le poison. Les tournesols pourraient renforcer le corps. Une aide plus consciente pourrait améliorer les chances, bien que personne ne puisse dire ce que l'échec pourrait entraîner."
deDE = "{0} wurde kontaminiert, liegt still mit nassem Fell, mattäugig und einem Schwanz, der zu schwach ist, um den Boden zu schlagen. Der Großteil der Kolonie hält einen vorsichtigen Abstand.\nDann tritt ein selbsternannter Doktor mit befleckten Notizen und einer Theorie namens Pasteurs Gamble vor. Die Behandlung ist ungetestet. Wasser könnte das Gift ausspülen. Sonnenblumen könnten den Körper stärken. Sorgfältigere Hilfe könnte die Chancen verbessern, obwohl niemand sagen kann, was ein Scheitern mit sich bringen könnte."
plPL = "{0} został skażony, leżąc bez ruchu z wilgotnym futrem, matowymi oczami i ogonem zbyt słabym, by uderzyć w ziemię. Większość kolonii trzyma się z daleka. \nWtedy krok do przodu stawia samozwańczy lekarz z poplamionymi notatkami i teorią zwaną Zakładem Pasteura. Leczenie jest nieprzetestowane. Woda może przepłukać truciznę. Słoneczniki mogą wzmocnić ciało. Bardziej staranna pomoc może poprawić szanse, choć nikt nie może powiedzieć, co może przynieść porażka."
ptBR = "{0} foi contaminado, deitado imóvel com a pelagem úmida, olhos opacos e uma cauda fraca demais para bater no chão. A maior parte da colônia mantém uma distância cuidadosa. Então, um autoproclamado doutor avança com anotações manchadas e uma teoria chamada A Aposta de Pasteur. O tratamento não foi testado. Água pode eliminar o veneno. Girassóis podem fortalecer o corpo. Um auxílio mais cuidadoso pode melhorar as chances, embora ninguém possa afirmar o que o fracasso pode trazer."
koKR = "{0}가 오염되어 눕고, 축축한 털과 흐릿한 눈, 땅을 쳐낼 힘이 없는 약한 꼬리를 가진 채로 누워 있습니다. 대부분의 식민지는 조심스럽게 거리를 두고 있습니다.  \n그때, 자칭 의사 한 명이 얼룩진 노트와 파스퇴르의 도박이라는 이론을 들고 앞으로 나섭니다. 치료법은 테스트되지 않았습니다. 물이 독소를 씻어낼 수 있습니다. 해바라기가 몸을 강화할 수 있습니다. 더 신중한 도움이 성공 확률을 높일 수 있지만, 실패가 가져올 결과는 아무도 알 수 없습니다."
csCZ = "{0} byl kontaminován, leží nehybně s vlhkým kožichem, mdlýma očima a ocasem příliš slabým na to, aby bouchal do země. Většina kolonie si udržuje opatrný odstup.  \nPak vystoupí sebezvaný doktor se znečištěnými poznámkami a teorií zvanou Pasteurův hazard. Léčba není testována. Voda může vyplavit jed. Slunečnice mohou posílit tělo. Pečlivější pomoc může zlepšit šance, i když nikdo nemůže říct, co by neúspěch mohl přinést."
viVN = "{0} đã bị ô nhiễm, nằm bất động với bộ lông ướt, đôi mắt mờ đục, và cái đuôi quá yếu để quật xuống đất. Hầu hết thuộc địa giữ khoảng cách cẩn thận.\nRồi một bác sĩ tự xưng bước lên với những ghi chú bị ố và một lý thuyết gọi là Cược của Pasteur. Phương pháp điều trị chưa được kiểm chứng. Nước có thể rửa trôi chất độc. Hoa hướng dương có thể củng cố cơ thể. Sự trợ giúp cẩn thận hơn có thể cải thiện khả năng, mặc dù không ai có thể nói điều gì sẽ xảy ra nếu thất bại."

