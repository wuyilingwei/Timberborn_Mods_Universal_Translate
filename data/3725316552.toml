["LV.BCEv.ContaminationCure.O1"]
raw = "Against every doubtful stare, the treatment works. {0}'s breathing steadies, their eyes clear, and before long they are sitting upright again.\nBetter still, the remaining mixture proves stable enough to store. Pasteur's Gamble may be crude, but it has given the colony something useful.\n[[C]][[+]]{0} is cured.\n[[C]][[+]]Gain [[good:{1}:{2}]]."
status = "normal"
enUS = "Against every doubtful stare, the treatment works. {0}'s breathing steadies, their eyes clear, and before long they are sitting upright again. Better still, the remaining mixture proves stable enough to store. Pasteur's Gamble may be crude, but it has given the colony something useful. [[C]][[+]]{0} is cured. [[C]][[+]]Gain [[good:{1}:{2}]]."
zhCN = "面对每一个怀疑的目光，治疗效果显著。{0}的呼吸平稳，眼睛清晰，不久后他们又坐了起来。\n更好的是，剩余的混合物证明足够稳定，可以储存。巴斯德的赌注或许粗糙，但它给了殖民地一些有用的东西。\n[[C]][[+]]{0} 已经治愈。\n[[C]][[+]]获得 [[good:{1}:{2}]]。"
zhTW = "面對每一個懷疑的目光，療法奏效了。{0}的呼吸穩定下來，眼神清晰，沒過多久他們又坐起來了。  \n更好的是，剩下的藥劑穩定到可以儲存。巴斯德的賭注可能粗糙，但它給了殖民地一些有用的東西。  \n[[C]][[+]]{0}康復了。  \n[[C]][[+]]獲得[[good:{1}:{2}]。"
ruRU = "Несмотря на все сомнительные взгляды, лечение срабатывает. Дыхание {0} успокаивается, глаза проясняются, и вскоре они снова сидят прямо. Что еще лучше, оставшаяся смесь оказывается достаточно стабильной для хранения. Эксперимент Пастера может быть грубоват, но он дал колонии что-то полезное. [[C]][[+]]{0} излечен. [[C]][[+]]Получите [[good:{1}:{2}]]."
jaJP = "疑念の視線に逆らって、治療は効果を発揮します。{0}の呼吸は安定し、目は輝きを取り戻し、やがて彼らは再び直立して座っています。  \nさらに良いことに、残った混合物は保存するのに十分な安定性を示します。パスツールの賭けは粗雑かもしれませんが、コロニーに何か有用なものを与えました。  \n[[C]][[+]]{0}は治癒しました。  \n[[C]][[+]]獲得 [[good:{1}:{2}]]."
frFR = "Contre chaque regard sceptique, le traitement fonctionne. La respiration de {0} se stabilise, ses yeux s'éclaircissent, et avant longtemps, ils sont de nouveau assis droit.\nMieux encore, le mélange restant s'avère suffisamment stable pour être conservé. Le Pari de Pasteur peut être grossier, mais il a donné à la colonie quelque chose d'utile.\n[[C]][[+]]{0} est guéri.\n[[C]][[+]]Gagnez [[bon:{1}:{2}]]."
deDE = "Gegen jeden zweifelnden Blick wirkt die Behandlung. {0}s Atmung wird ruhiger, ihre Augen klar, und bald sitzen sie wieder aufrecht. \nNoch besser, die verbleibende Mischung erweist sich als stabil genug zur Lagerung. Pasteurs Glücksspiel mag grob sein, aber es hat der Kolonie etwas Nützliches gegeben. \n[[C]][[+]]{0} ist geheilt.\n[[C]][[+]]Erhalte [[good:{1}:{2}]]."
plPL = "Przeciwko każdemu wątpliwemu spojrzeniu, leczenie działa. Oddech {0} się stabilizuje, ich oczy stają się jasne, a wkrótce znów siedzą wyprostowani.\nCo więcej, pozostała mikstura okazuje się wystarczająco stabilna do przechowywania. Zakład Pasteura może być prymitywny, ale dał kolonii coś użytecznego.\n[[C]][[+]]{0} jest wyleczony.\n[[C]][[+]]Zyskaj [[dobry:{1}:{2}]]."
ptBR = "Contra cada olhar duvidoso, o tratamento funciona. A respiração de {0} se estabiliza, seus olhos ficam claros e, antes que percebam, estão sentados novamente. Melhor ainda, a mistura restante se prova estável o suficiente para armazenar. A Aposta de Pasteur pode ser rudimentar, mas deu à colônia algo útil. [[C]][[+]]{0} está curado. [[C]][[+]]Ganhe [[good:{1}:{2}]]."
koKR = "의심스러운 시선에 맞서, 치료는 효과가 있다. {0}의 호흡이 안정되고, 그들의 눈이 맑아지며, 곧 다시 똑바로 앉게 된다. 더 좋은 것은, 남은 혼합물이 저장하기에 충분히 안정적이라는 것이다. 파스퇴르의 도박은 거칠 수 있지만, 식민지에 유용한 것을 제공했다. [[C]][[+]]{0}은 치료되었다. [[C]][[+]]획득 [[좋음:{1}:{2}]]."
csCZ = "Proti každému pochybovačnému pohledu léčba funguje. {0} dýchá stabilně, jejich oči se vyjasňují a dříve než se nadějí, sedí opět vzpřímeně. Ještě lépe, zbývající směs se ukazuje jako dostatečně stabilní k uskladnění. Pasteurovo sázení může být hrubé, ale dalo kolonii něco užitečného. [[C]][[+]]{0} je vyléčen. [[C]][[+]]Získat [[good:{1}:{2}]]."
viVN = "Trước mỗi ánh nhìn nghi ngờ, phương pháp điều trị có hiệu quả. Hơi thở của {0} trở nên đều đặn, mắt họ sáng rõ, và chẳng bao lâu sau họ đã ngồi thẳng dậy.\nTốt hơn nữa, phần hỗn hợp còn lại chứng tỏ đủ ổn định để lưu trữ. Canh bạc của Pasteur có thể thô sơ, nhưng nó đã mang lại cho thuộc địa điều gì đó hữu ích.\n[[C]][[+]]{0} đã được chữa khỏi.\n[[C]][[+]]Nhận [[good:{1}:{2}]]."

["LV.BCEv.ContaminationCure.O2"]
raw = "The treatment fails. {0} remains weak, and the hopeful mixture turns bitter and useless. By morning, several helpers begin showing the same signs of contamination.\n[[C]][[-]]{1} random beavers become contaminated."
status = "normal"
enUS = "The treatment fails. {0} remains weak, and the hopeful mixture turns bitter and useless. By morning, several helpers begin showing the same signs of contamination. [[C]][[-]]{1} random beavers become contaminated."
zhCN = "“治疗失败。{0}依然虚弱，而充满希望的混合物变得苦涩无用。到早晨，几名助手开始出现同样的污染迹象。  \n[[C]][[-]]{1}只随机的海狸受到污染。”"
zhTW = "治療失敗。{0} 仍然虛弱，滿懷希望的混合物變得苦澀且毫無用處。到早晨，幾名幫手開始出現相同的污染跡象。[[C]][[-]]{1} 隨機的海狸變得受到污染。"
ruRU = "Лечение терпит неудачу. {0} остается слабым, а надежная смесь становится горькой и бесполезной. К утру несколько помощников начинают показывать те же признаки загрязнения. [[C]][[-]]{1} случайные бобры заражаются."
jaJP = "治療に失敗しました。{0}は依然として弱く、期待に満ちた混合物は苦く無用なものとなります。朝になると、数人の助っ人が同様の汚染の兆候を示し始めます。  \n[[C]][[-]]{1}匹のランダムなビーバーが汚染されます。"
frFR = "Le traitement échoue. {0} reste faible, et le mélange plein d'espoir devient amer et inutile. Au matin, plusieurs assistants commencent à montrer les mêmes signes de contamination. [[C]][[-]]{1} castors aléatoires deviennent contaminés."
deDE = "Die Behandlung schlägt fehl. {0} bleibt schwach, und die hoffnungsvolle Mischung wird bitter und nutzlos. Bis zum Morgen zeigen mehrere Helfer die gleichen Anzeichen einer Kontamination. [[C]][[-]]{1} zufällige Biber werden kontaminiert."
plPL = "Kuracja nie udaje się. {0} pozostaje słaby, a obiecująca mieszanka staje się gorzka i bezużyteczna. Do rana kilku pomocników zaczyna wykazywać te same objawy zanieczyszczenia. \n[[C]][[-]]{1} losowych bobrów zostaje skażonych."
ptBR = "O tratamento falha. {0} continua fraco, e a mistura esperançosa se torna amarga e inútil. Pela manhã, vários ajudantes começam a mostrar os mesmos sinais de contaminação. [[C]][[-]]{1} castores aleatórios ficam contaminados."
koKR = "치료에 실패합니다. {0}는 여전히 약해 있으며, 희망적인 혼합물은 씁쓸하고 쓸모없게 변합니다. 아침이 되면 여러 도우미들이 동일한 오염 징후를 보이기 시작합니다. [[C]][[-]]{1} 마리의 무작위 비버가 오염됩니다."
csCZ = "Léčba selhává. {0} zůstává slabý a nadějná směs se mění v hořkou a k ničemu. Do rána se u několika pomocníků začínají objevovat stejné příznaky kontaminace. [[C]][[-]]{1} náhodní bobři se kontaminují."
viVN = "Cuộc điều trị thất bại. {0} vẫn yếu, và hỗn hợp đầy hy vọng trở nên đắng và vô dụng. Đến sáng, một vài người trợ giúp bắt đầu có dấu hiệu bị ô nhiễm.\n[[C]][[-]]{1} con hải ly ngẫu nhiên bị ô nhiễm."

["LV.BCEv.ContaminationCure.O3"]
raw = "The treatment fails. {0} remains weak, and the prepared goods are spent with nothing to show for them.\nThe careful notes, however, prove useful for something else. The doctor cannot save the cure, but the colony recovers the lesson.\n[[C]][[+]]Refund {1} Science."
status = "normal"
enUS = "The treatment fails. {0} remains weak, and the prepared goods are spent with nothing to show for them. The careful notes, however, prove useful for something else. The doctor cannot save the cure, but the colony recovers the lesson. [[C]][[+]]Refund {1} Science."
zhCN = "“治疗失败了。{0} 依然虚弱，准备的物品也被浪费，毫无成果。然而，这些细致的笔记却对其他事情有帮助。医生无法挽救这种疗法，但殖民地吸取了教训。[[C]][[+]]退款 {1} 科学。”"
zhTW = "治療失敗了。{0}仍然虛弱，而準備的物資已耗盡，卻沒有任何成果。然而，仔細的紀錄卻對其他事情有用。醫生無法挽救治療，但殖民地從中汲取了教訓。[[C]][[+]]退還{1}科學。"
ruRU = "Лечение не удалось. {0} остается ослабленным, а подготовленные материалы потрачены безрезультатно. \nТем не менее, внимательные заметки оказываются полезными для чего-то другого. Доктор не может спасти лечение, но колония усваивает урок.\n[[C]][[+]]Возврат {1} Науки."
jaJP = "治療は失敗する。{0}は依然として弱く、準備された物資は消耗し、何も得られなかった。しかし、注意深いメモは別の用途に役立つ。医者は治療を救うことはできないが、コロニーは教訓を回復する。  \n[[C]][[+]]{1}科学の返金。"
frFR = "Le traitement échoue. {0} reste faible, et les biens préparés sont dépensés sans aucun résultat.\nCependant, les notes soigneusement prises s'avèrent utiles pour autre chose. Le docteur ne peut pas sauver le remède, mais la colonie tire une leçon de cette expérience.\n[[C]][[+]]Rembourser {1} Science."
deDE = "Die Behandlung schlägt fehl. {0} bleibt schwach, und die vorbereiteten Waren sind verbraucht, ohne etwas dafür zu zeigen.  \nDie sorgfältigen Notizen erweisen sich jedoch als nützlich für etwas anderes. Der Doktor kann das Heilmittel nicht retten, aber die Kolonie lernt aus der Lektion.  \n[[C]][[+]]Erstatte {1} Wissenschaft."
plPL = "Leczenie się nie udaje. {0} pozostaje słaby, a przygotowane dobra są wydane bez żadnego rezultatu. Jednak staranne notatki okazują się przydatne do czegoś innego. Doktor nie potrafi uratować leku, ale kolonia wyciąga wnioski. [[C]][[+]]Zwróć {1} Naukę."
ptBR = "O tratamento falha. {0} continua fraco, e os bens preparados são gastos sem nada a mostrar.\nAs anotações cuidadosas, no entanto, se provam úteis para outra coisa. O médico não consegue salvar a cura, mas a colônia recupera a lição.\n[[C]][[+]]Reembolsar {1} Ciência."
koKR = "치료에 실패했습니다. {0}는 여전히 약하며, 준비된 자원은 쓸모 없이 소모되었습니다. 그러나 신중하게 작성된 노트는 다른 용도로 유용하게 사용됩니다. 의사는 치료법을 구할 수 없지만, 식민지는 교훈을 얻습니다. [[C]][[+]]{1} 과학을 환불합니다."
csCZ = "Léčba selhává. {0} zůstává slabý a připravené zboží bylo použito bez jakýchkoli výsledků. \nPečlivé poznámky se však ukazují jako užitečné pro něco jiného. Doktor nedokáže zachránit lék, ale kolonie se poučí z této zkušenosti. \n[[C]][[+]]Vrátit {1} vědy."
viVN = "Phương pháp điều trị thất bại. {0} vẫn yếu ớt, và hàng hóa đã chuẩn bị bị lãng phí mà không có gì để thu về. \nTuy nhiên, những ghi chú cẩn thận lại chứng tỏ có ích cho một điều khác. Bác sĩ không thể cứu vãn phương pháp chữa trị, nhưng thuộc địa đã rút ra được bài học. \n[[C]][[+]]Hoàn lại {1} Khoa học."

