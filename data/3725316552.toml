["LV.BCEv.FirstDeath.C3N"]
raw = "[[C]]There is no time for this. The colony must move on. <YellowHighlight>Unknown consequences.</YellowHighlight>"
status = "normal"
enUS = "[[C]]There is no time for this. The colony must move on. <YellowHighlight>Unknown consequences.</YellowHighlight>"
zhCN = "[[C]]没有时间了。殖民地必须继续前进。<YellowHighlight>未知的后果。</YellowHighlight>"
zhTW = "「[[C]]現在沒有時間了。殖民地必須繼續前進。<YellowHighlight>未知的後果。</YellowHighlight>」"
ruRU = "[C]На это нет времени. Колония должна двигаться дальше. <YellowHighlight>Неизвестные последствия.</YellowHighlight>"
jaJP = "[[C]]こんなことをしている時間はない。コロニーは進まなければならない。<YellowHighlight>未知の結果。</YellowHighlight>"
frFR = "[[C]]Il n'y a pas de temps pour ça. La colonie doit avancer. <YellowHighlight>Conséquences inconnues.</YellowHighlight>"
deDE = "„[[C]]Es gibt keine Zeit dafür. Die Kolonie muss weitermachen. <YellowHighlight>Unbekannte Konsequenzen.</YellowHighlight>“"
plPL = "[[C]]Nie ma na to czasu. Kolonia musi iść dalej. <YellowHighlight>Nieznane konsekwencje.</YellowHighlight>"
ptBR = "[[C]]Não há tempo para isso. A colônia deve seguir em frente. <YellowHighlight>Consequências desconhecidas.</YellowHighlight>"
koKR = "[[C]]이럴 시간이 없다. 식민지는 계속 나아가야 한다. <YellowHighlight>알 수 없는 결과들.</YellowHighlight>"
csCZ = "[[C]]Na to není čas. Kolonie musí pokračovat. <YellowHighlight>Neznámé následky.</YellowHighlight>"
viVN = "[[C]]Không có thời gian cho điều này. колони phải tiến về phía trước. <YellowHighlight>Hệ quả không rõ.</YellowHighlight>"

["LV.BCEv.FirstDeath.O1"]
raw = "The logs are lashed together into a small raft, just large enough to carry {0} downriver.\nThe colony watches in silence as the current takes them away. It is a simple farewell, but it gives the beavers a little peace.\n[[C]][[+]]All beavers gain the <GreenHighlight>+Remembrance</GreenHighlight> Wellbeing bonus for some time."
status = "normal"
enUS = "The logs are lashed together into a small raft, just large enough to carry {0} downriver. The colony watches in silence as the current takes them away. It is a simple farewell, but it gives the beavers a little peace. [[C]][[+]]All beavers gain the <GreenHighlight>+Remembrance</GreenHighlight> Wellbeing bonus for some time."
zhCN = "木头被绑在一起，形成一只小木筏，刚好可以让{0}顺流而下。  \n殖民地静默地注视着木筏被洪流带走。这是一个简单的告别，但这给了海狸们一点平静。  \n[[C]][[+]]所有海狸在一段时间内获得<GreenHighlight>+纪念</GreenHighlight>福祉加成。"
zhTW = "木材被綁在一起，形成一個小筏子，剛好能帶著{0}順流而下。  \n殖民地靜靜地觀看著，當水流把它們帶走。這是一個簡單的告別，但給了海狸們一點平靜。  \n[[C]][[+]]所有海狸在一段時間內獲得<GreenHighlight>+追憶</GreenHighlight>的幸福加成。"
ruRU = "Деревья связаны вместе в небольшой плот, достаточно большой, чтобы унести {0} вниз по течению. Колония наблюдает в мол沉нии, как течение уносит их. Это простое прощание, но оно приносит бобрам немного покоя. [[C]][[+]]Все бобры получают <GreenHighlight>+Воспоминание</GreenHighlight> бонус к благосостоянию на некоторое время."
jaJP = "丸太は小さな筏にまとまれ、{0}を川下に運ぶのに十分な大きさです。  \nコロニーは静かに見守り、流れに彼らを任せます。シンプルな別れですが、ビーバーたちに少しの安らぎを与えます。  \n[[C]][[+]]すべてのビーバーはしばらくの間、<GreenHighlight>+記憶</GreenHighlight>の幸福ボーナスを得ます。"
frFR = "Les bûches sont ligaturées ensemble en un petit radeau, juste assez grand pour transporter {0} en aval.\nLa colonie regarde en silence alors que le courant les emporte. C'est un simple au revoir, mais cela apporte un peu de paix aux castors.\n[[C]][[+]]Tous les castors gagnent le bonus de bien-être <GreenHighlight>+Souvenir</GreenHighlight> pendant un certain temps."
deDE = "Die Stämme sind zu einem kleinen Floß zusammengebunden, das gerade genug Platz bietet, um {0} flussabwärts zu tragen. \nDie Kolonie beobachtet in Stille, wie die Strömung sie mitnimmt. Es ist ein einfacher Abschied, aber er schenkt den Bibern ein wenig Frieden. \n[[C]][[+]]Alle Biber erhalten für einige Zeit den <GreenHighlight>+Erinnerung</GreenHighlight> Wohlfühlbonus."
plPL = "Kłody są związane razem w małą tratwę, wystarczająco dużą, aby zabrać {0} w dół rzeki. Kolonia obserwuje w milczeniu, jak prąd odsuwa ich od brzegu. To proste pożegnanie, ale daje bobrom odrobinę spokoju. [[C]][[+]]Wszystkie bobry zyskują bonus do Samopoczucia <GreenHighlight>+Pamięć</GreenHighlight> na pewien czas."
ptBR = "Os troncos estão amarrados juntos em uma pequena jangada, grande o suficiente para levar {0} rio abaixo. A colônia observa em silêncio enquanto a correnteza os leva embora. É uma despedida simples, mas dá aos castores um pouco de paz. [[C]][[+]] Todos os castores ganham o bônus de Bem-Estar <GreenHighlight>+Lembrança</GreenHighlight> por um tempo."
koKR = "나무들이 작은 뗏목으로 묶여, {0}을(를) 강 아래로 실어 나를 수 있는 크기입니다.  \n식민지는 그들이 떠나가는 모습을 조용히 지켜봅니다. 간단한 작별이지만, 비버들에게는 약간의 평화를 줍니다.  \n[[C]][[+]]모든 비버는 일정 시간 동안 <GreenHighlight>+기념</GreenHighlight> 웰빙 보너스를 얻습니다."
csCZ = "Klády jsou svázány dohromady do malé raftu, která je dostatečně velká na to, aby odvezla {0} po proudu.\nKolonie tiše sleduje, jak je proud unáší. Je to jednoduché rozloučení, ale dává bobrům trochu klidu.\n[[C]][[+]]Všichni bobři získávají <GreenHighlight>+Vzpomínku</GreenHighlight> bonus k pohodě na nějakou dobu."
viVN = "Các tấm gỗ được buộc lại với nhau thành một chiếc bè nhỏ, vừa đủ để chở {0} xuôi dòng.\nColony đứng im lặng quan sát khi dòng nước cuốn họ đi. Đây là một lời chia tay giản dị, nhưng mang lại cho những con rái cá một chút bình yên.\n[[C]][[+]]Tất cả rái cá nhận được phúc lợi <GreenHighlight>+Kỷ Niệm</GreenHighlight> trong một thời gian."

["LV.BCEv.FirstDeath.O2"]
raw = "The planks are shaped into a small cemetery marker for {0}.\nIt is not much, but it gives the colony a place to pause, remember, and honor those who came before them.\n[[C]][[+]]All beavers permanently gain the <GreenHighlight>+Remembrance</GreenHighlight> Wellbeing bonus."
status = "normal"
enUS = "The planks are shaped into a small cemetery marker for {0}.  \nIt is not much, but it gives the colony a place to pause, remember, and honor those who came before them.  \n[[C]][[+]]All beavers permanently gain the <GreenHighlight>+Remembrance</GreenHighlight> Wellbeing bonus."
zhCN = "“这些木板被制成了一个小墓碑，纪念 {0}。\n虽然不算多，但它为殖民地提供了一个停下来、回忆和尊敬先辈的地方。\n[[C]][[+]]所有海狸永久获得 <GreenHighlight>+怀念</GreenHighlight> 幸福加成。”"
zhTW = "木板被塑造成一個小墓碑，紀念{0}。\n這不算多，但給了殖民地一個暫停、回憶和尊敬先前者的地方。\n[[C]][[+]]所有海狸永久獲得<GreenHighlight>+紀念</GreenHighlight>的幸福加成。"
ruRU = "Доски сформированы в небольшой памятник на кладбище для {0}. Это немного, но это дает колонии место, чтобы остановиться, вспомнить и почтить тех, кто был до них. [[C]][[+]]Все бобры постоянно получают бонус к <GreenHighlight>+Памяти</GreenHighlight> к благополучию."
jaJP = "板は{0}のための小さな墓標の形に整えられています。\nそれほど大したものではありませんが、コロニーにとっては立ち止まり、思い出し、先人を称える場所となります。\n[[C]][[+]]全てのビーバーは永久に<GreenHighlight>+追悼</GreenHighlight>のウェルビーイングボーナスを得ます。"
frFR = "Les planches sont façonnées en un petit marqueur de cimetière pour {0}.  \nCe n'est pas grand-chose, mais cela donne à la colonie un endroit pour faire une pause, se souvenir et honorer ceux qui les ont précédés.  \n[[C]][[+]]Tous les castors gagnent de manière permanente le bonus de bien-être <GreenHighlight>+Souvenir</GreenHighlight>."
deDE = "Die Planken werden zu einem kleinen Grabstein für {0} geformt.  \nEs ist nicht viel, aber es gibt der Kolonie einen Ort, um innezuhalten, sich zu erinnern und diejenigen zu ehren, die vor ihnen kamen.  \n[[C]][[+]]Alle Biber erhalten dauerhaft den <GreenHighlight>+Erinnerung</GreenHighlight> Wohlfühlbonus."
plPL = "Deski są uformowane w mały nagrobek dla {0}.  \nTo niewiele, ale daje kolonii miejsce na zatrzymanie się, przypomnienie i uhonorowanie tych, którzy byli przed nimi.  \n[[C]][[+]]Wszystkie bobry na stałe zyskują <GreenHighlight>+Pamięć</GreenHighlight> bonus do samopoczucia."
ptBR = "As tábuas são moldadas em um pequeno marcador de cemitério para {0}.  \nNão é muito, mas dá à colônia um lugar para parar, lembrar e honrar aqueles que vieram antes deles.  \n[[C]][[+]]Todos os castores ganham permanentemente o bônus de Bem-Estar <GreenHighlight>+Recordação</GreenHighlight>."
koKR = "널빤지는 {0}를 위한 작은 묘비로 모양이 새겨져 있다.\n크지는 않지만, 식민지에 잠시 멈추고 기억하며 그들보다 먼저 온 이들을 기억할 수 있는 장소를 제공한다.\n[[C]][[+]]모든 비버는 <GreenHighlight>+기억</GreenHighlight> 웰빙 보너스를 영구적으로 얻는다."
csCZ = "Prkna jsou tvarována do malého hrobového znamení pro {0}. Není to mnoho, ale dává kolonii místo k zastavení, vzpomínce a uctění těch, kteří přišli před nimi. [[C]][[+]]Všichni bobři trvale získávají bonus k pohodě <GreenHighlight>+Vzpomínka</GreenHighlight>."
viVN = "Các tấm ván được chế tạo thành một bia mộ nhỏ cho {0}.\nKhông nhiều lắm, nhưng nó mang lại cho thuộc địa một nơi để dừng lại, nhớ về, và tôn vinh những người đã đến trước họ.\n[[C]][[+]]Tất cả các con rái cá đều được nhận một phần thưởng <GreenHighlight>+Nhớ về</GreenHighlight> cảm giác thoải mái vĩnh viễn."

["LV.BCEv.FirstDeath.O3"]
raw = "No farewell is given for {0}. No marker is built. The colony simply returns to work.\nSome beavers try not to think about it, but the silence settles heavily over the settlement. To them, it feels as if {0} was simply ignored.\n[[C]][[-]]All beavers suffer Heavy Hearts effect for {1}d."
status = "normal"
enUS = "No farewell is given for {0}. No marker is built. The colony simply returns to work. Some beavers try not to think about it, but the silence settles heavily over the settlement. To them, it feels as if {0} was simply ignored. [[C]][[-]]All beavers suffer Heavy Hearts effect for {1}d."
zhCN = "没有人向{0}告别，也没有建立标志。殖民地只是继续工作。\n一些海狸试图不去想它，但沉默在定居点上沉重地降临。对他们来说，感觉就像{0}被简单地忽视了。\n[[C]][[-]]所有海狸在{1}天内受到沉重心灵的影响。"
zhTW = "「{0} 沒有得到告別，沒有建立紀念碑，殖民地只是繼續工作。有些海狸儘量不去想它，但沉重的寂靜籠罩著這個定居點。在他們看來，{0} 就像是被忽視了一樣。\n[[C]][[-]]所有海狸受到沉重的心情影響，持續 {1} 天。」"
ruRU = "Никто не прощается с {0}. Не возводится ни маркер. Колония просто продолжает работу. Некоторые бобры стараются не думать об этом, но тишина тяжело ложится на поселение. Им кажется, что {0} просто проигнорировали. [[C]][[-]]Все бобры испытывают эффект Тяжелое Сердце в течение {1}д."
jaJP = "{0}には別れの言葉がなく、目印も建てられない。コロニーはただ仕事に戻る。\n何匹かのビーバーはそれについて考えないようにしようとするが、静けさが集落に重くのしかかっている。彼らにとっては、{0}が単に無視されたように感じられる。\n[[C]][[-]]すべてのビーバーは{1}日間「重い心」の効果を受ける。"
frFR = "Aucun adieu n'est donné à {0}. Aucun marqueur n'est construit. La colonie reprend simplement son travail.\nCertains castors essaient de ne pas y penser, mais le silence pèse lourdement sur la colonie. Pour eux, cela donne l'impression que {0} a simplement été ignoré.\n[[C]][[-]]Tous les castors subissent l'effet Cœurs Lourd pendant {1}j."
deDE = "Es gibt keinen Abschied für {0}. Es wird kein Marker gebaut. Die Kolonie kehrt einfach zur Arbeit zurück. Einige Biber versuchen, nicht darüber nachzudenken, aber die Stille legt sich schwer über die Siedlung. Für sie fühlt es sich an, als würde {0} einfach ignoriert. [[C]][[-]]Alle Biber leiden unter dem Effekt der schweren Herzen für {1} Tage."
plPL = "Nie ma pożegnania dla {0}. Nie zostaje zbudowany żaden znacznik. Kolonia po prostu wraca do pracy. \nNiektóre bobry starają się o tym nie myśleć, ale cisza ciężko kładzie się na osadzie. Dla nich wydaje się, że {0} po prostu został zignorowany. \n[[C]][[-]]Wszystkie bobry cierpią na efekt Ciężkiego Serca przez {1}d."
ptBR = "Nenhuma despedida é dada para {0}. Nenhum marcador é construído. A colônia simplesmente retorna ao trabalho. \nAlguns castores tentam não pensar nisso, mas o silêncio recai pesadamente sobre o assentamento. Para eles, parece que {0} foi simplesmente ignorado. \n[[C]][[-]]Todos os castores sofrem o efeito Corações Pesados por {1}d."
koKR = "{0}에 대한 이별 인사는 없다. 기념비도 세워지지 않는다. 식민지는 단순히 일을 재개한다.  \n일부 비버들은 그것에 대해 생각하지 않으려 하지만, 침묵이 정착지 위에 무겁게 드리워진다. 그들에겐 {0}이 단순히 무시된 것처럼 느껴진다.  \n[[C]][[-]]모든 비버는 {1}일 동안 무거운 마음 효과를 겪는다."
csCZ = "Nikdo se s {0} nerozloučí. Nebylo postaveno žádné označení. Kolonie se prostě vrací k práci.\nNěkteří bobři se snaží na to nemyslet, ale ticho těžce spočine nad osadou. Připadá jim, jako by si {0} nikdo ani nevšiml.\n[[C]][[-]]Všechny bobry postihuje efekt Těžká srdce na {1}d."
viVN = "Không có lời tạm biệt nào cho {0}. Không có dấu hiệu nào được xây dựng. Khu định cư chỉ đơn giản là trở lại công việc. \nMột số con rái cá cố gắng không nghĩ về điều đó, nhưng sự im lặng đè nặng lên khu định cư. Đối với họ, cảm giác như {0} chỉ bị lãng quên. \n[[C]][[-]]Tất cả các con rái cá đều chịu tác động của Trái Tim Nặng Trĩu trong {1} ngày."

["LV.BCEv.FirstDeath.O4"]
raw = "The colony returns to work.\nThere is sadness, but also understanding. Food must be gathered, water must be stored, and the settlement must survive. For now, the beavers carry the loss quietly and move on."
status = "normal"
enUS = "The colony returns to work. There is sadness, but also understanding. Food must be gathered, water must be stored, and the settlement must survive. For now, the beavers carry the loss quietly and move on."
zhCN = "“殖民地恢复了工作。\n有悲伤，也有理解。食物必须被收集，水必须被储存，定居点必须生存。现在，海狸们默默承受着损失，继续前行。”"
zhTW = "殖民地重新開始工作。\n雖然有悲傷，但也有理解。必須收集食物，儲存水源，社區必須生存下去。目前，海狸們默默承受著損失，繼續前行。"
ruRU = "Колония возвращается к работе. Есть грусть, но также и понимание. Еду нужно собрать, воду нужно запастись, и поселение должно выжить. Пока что бобры тихо переносят утрату и двигаются дальше."
jaJP = "コロニーは仕事に戻る。悲しみもあるが、理解もある。食料は集めなければならず、水は貯めなければならず、集落は生き延びなければならない。今のところ、ビーバーたちは静かに喪失を抱え、前に進む。"
frFR = "La colonie reprend le travail. Il y a de la tristesse, mais aussi de la compréhension. La nourriture doit être rassemblée, l'eau doit être stockée et la colonie doit survivre. Pour l'instant, les castors portent la perte en silence et avancent."
deDE = "Die Kolonie kehrt zur Arbeit zurück. Es gibt Traurigkeit, aber auch Verständnis. Nahrung muss gesammelt, Wasser muss gespeichert werden, und die Siedlung muss überleben. Für den Moment tragen die Biber den Verlust still und machen weiter."
plPL = "Kolonia wraca do pracy. Jest smutek, ale także zrozumienie. Jedzenie musi być zbierane, woda musi być przechowywana, a osada musi przetrwać. Na razie bobry cicho niosą stratę i idą dalej."
ptBR = "A colônia volta ao trabalho. Há tristeza, mas também compreensão. A comida deve ser coletada, a água deve ser armazenada e a colônia deve sobreviver. Por enquanto, os castores carregam a perda em silêncio e seguem em frente."
koKR = "식민지는 일로 돌아갑니다. 슬픔이 있지만 이해 또한 있습니다. 식량을 모아야 하고, 물을 저장해야 하며, 정착지가 생존해야 합니다. 지금은 비버들이 조용히 상실감을 안고 나아갑니다."
csCZ = "Kolonie se vrací k práci. Je tu smutek, ale také pochopení. Jídlo je třeba nasbírat, voda je třeba uskladnit a osada musí přežít. Prozatím bobři tiše nesou ztrátu a pokračují dál."
viVN = "Colony trở lại làm việc. Có sự buồn bã, nhưng cũng có sự hiểu biết. Thức ăn phải được thu hoạch, nước phải được tích trữ, và khu định cư phải tồn tại. Hiện tại, những con hải ly chịu đựng nỗi mất mát một cách âm thầm và tiếp tục tiến về phía trước."

