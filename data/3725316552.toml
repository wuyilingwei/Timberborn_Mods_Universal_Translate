["LV.BCEv.FirstChildGrowth.O1"]
raw = "The feast is simple, but joyful. Food is shared, cups are raised, and {0} is welcomed into adulthood with cheers, jokes, and proud tail-slaps.\nFor a moment, the colony feels less like a settlement and more like a family.\n[[C]][[+]]All beavers gain {1} for [[time:{2}d]]"
status = "normal"
enUS = "The feast is simple, but joyful. Food is shared, cups are raised, and {0} is welcomed into adulthood with cheers, jokes, and proud tail-slaps. For a moment, the colony feels less like a settlement and more like a family. [[C]][[+]]All beavers gain {1} for [[time:{2}d]]"
zhCN = "“盛宴虽然简单，但充满喜悦。食物共享，杯子高举，{0}在欢呼、笑话和自豪的尾巴拍击中迎接成年。\n瞬间，殖民地的感觉不再像一个定居点，而更像一个大家庭。\n[[C]][[+]]所有海狸获得{1}，持续[[time:{2}d]]”"
zhTW = "盛宴雖然簡單，但充滿喜悅。食物被分享，杯子被舉起，{0}在歡呼、玩笑和驕傲的尾巴拍打中迎進成年的行列。\n在這一刻，這個殖民地感覺不再是一個聚落，而更像是一個家庭。\n[[C]][[+]]所有的海狸在[[time:{2}d]]內獲得{1}"
ruRU = "Пиршество простое, но радостное. Еда делится,杯ы поднимаются, и {0} встречается во взрослую жизнь с овациями, шутками и гордыми хлопаниями хвостом. На мгновение колония ощущается не как поселение, а как семья. [[C]][[+]]Все бобры получают {1} на [[time:{2}д]]"
jaJP = "祭りはシンプルですが、喜びに満ちています。食べ物が分け合われ、杯が掲げられ、{0}が歓声、ジョーク、そして誇らしいしっぽの叩き合いで大人の仲間入りをします。\n一瞬、コロニーは集落というよりも家族のように感じられます。\n[[C]][[+]]すべてのビーバーは[[time:{2}d]]の間、{1}を得ます。"
frFR = "La fête est simple, mais joyeuse. La nourriture est partagée, les coupes sont levées, et {0} est accueilli dans l'âge adulte avec des acclamations, des blagues et des coups de queue fiers. \nPendant un instant, la colonie ressemble moins à un établissement et plus à une famille. \n[[C]][[+]]Tous les castors gagnent {1} pour [[time:{2}j]]"
deDE = "Das Fest ist einfach, aber fröhlich. Speisen werden geteilt, Becher erhoben und {0} wird mit Jubel, Witzen und stolzen Schwanzschlägen ins Erwachsenenleben willkommen geheißen. \nFür einen Moment fühlt sich die Kolonie weniger wie eine Siedlung und mehr wie eine Familie an. \n[[C]][[+]]Alle Biber gewinnen {1} für [[time:{2}d]]"
plPL = "Uczta jest prosta, ale radosna. Jedzenie jest dzielone, kubki są uniesione, a {0} jest witany w dorosłość okrzykami, żartami i dumnymi uderzeniami ogona. \nNa chwilę kolonia wydaje się być mniej osadą, a bardziej rodziną. \n[[C]][[+]]Wszystkie bobry zyskują {1} przez [[czas:{2}d]]"
ptBR = "A festa é simples, mas alegre. A comida é compartilhada, os copos são erguidos e {0} é recebido na vida adulta com aplausos, piadas e orgulhosas pancadas de cauda.\nPor um momento, a colônia se sente menos como um assentamento e mais como uma família.\n[[C]][[+]]Todos os castores ganham {1} por [[time:{2}d]]"
koKR = "축제는 간단하지만 기쁩니다. 음식이 나누어지고, 잔이 들어올려지며, {0}가 환호, 농담, 그리고 자랑스러운 꼬리치는 소리와 함께 성인이 됩니다.\n잠시 동안, 식민지는 정착지보다 더 가족 같은 느낌을 줍니다.\n[[C]][[+]]모든 비버는 [[time:{2}d]] 동안 {1}을 얻습니다."
csCZ = "Hostina je jednoduchá, ale radostná. Jídlo je sdíleno, poháry jsou zvedány a {0} je vítán do dospělosti s potleskem, vtipy a hrdým máváním ocasu. \nNa chvíli kolonie působí méně jako osídlení a více jako rodina.\n[[C]][[+]]Všichni bobři získávají {1} za [[time:{2}d]]"
viVN = "Bữa tiệc thì giản đơn nhưng đầy niềm vui. Thức ăn được chia sẻ, cốc được nâng lên, và {0} được chào đón vào tuổi trưởng thành với những tiếng hò reo, những câu đùa và những cái vỗ đuôi đầy tự hào.\nTrong một khoảnh khắc, thuộc địa cảm thấy không còn giống như một khu định cư mà trở thành một gia đình.\n[[C]][[+]]Tất cả các con nhím đều nhận được {1} trong [[time:{2}d]]"

["LV.BCEv.FirstChildGrowth.O2"]
raw = "The planned celebration never quite comes together. Supplies are needed elsewhere, and the colony quietly returns to its routines."
status = "normal"
enUS = "The planned celebration never quite comes together. Supplies are needed elsewhere, and the colony quietly returns to its routines."
zhCN = "“计划中的庆祝活动始终没有成型。物资在其他地方需要，殖民地悄然恢复了日常生活。”"
zhTW = "預定的慶祝活動從未真正成形。物資需要用於其他地方，殖民地悄然回到日常生活中。"
ruRU = "Запланированное празднование так и не состоялось. Запасы нужны в другом месте, и колония тихо возвращается к своим обычным делам."
jaJP = "計画されていた祝典は結局実現しない。資材は他の場所で必要とされ、植民地は静かに日常生活に戻る。"
frFR = "La célébration prévue ne se déroule jamais comme prévu. Les fournitures sont nécessaires ailleurs, et la colonie reprend discrètement ses routines."
deDE = "Die geplante Feier kommt nie so richtig zustande. Die Vorräte werden an anderer Stelle benötigt, und die Kolonie kehrt leise zu ihren Routinen zurück."
plPL = "Zaplanowana celebracja nigdy do końca się nie udaje. Zasoby są potrzebne gdzie indziej, a kolonia cicho wraca do swoich codziennych rutyn."
ptBR = "A celebração planejada nunca se concretiza. Os suprimentos são necessários em outro lugar, e a colônia volta silenciosamente às suas rotinas."
koKR = "계획된 축제는 결코 잘 이루어지지 않는다. 자원은 다른 곳에서 필요하고, 식민지는 조용히 일상으로 돌아간다."
csCZ = "Plánovaná oslava se nikdy úplně neuskuteční. Zásoby jsou potřeba jinde a kolonie se tiše vrací ke svým rutinám."
viVN = "Bữa lễ dự kiến không bao giờ diễn ra như mong đợi. Nguồn cung cần thiết ở nơi khác, và thuộc địa lặng lẽ trở lại với thói quen của nó."

