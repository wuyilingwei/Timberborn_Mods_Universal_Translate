["LV.BCEv.ContaminationConspiracy.Content"]
raw = "{0} is contaminated.\nBy dusk, whispers crawl through the colony like mist over badwater. Some say the contaminated are not merely sent away for safety. Some say a far district waits for them, quiet and empty, with no warm beds, no full tanks, and no one to hear the last tail-slap.\nNo one says it loudly. No one admits they believe it. But every beaver has seen how quickly a sick worker can become a problem to solve.\nNow {0} watches the others from a distance, and the colony watches itself."
status = "normal"
enUS = "{0} is contaminated. By dusk, whispers crawl through the colony like mist over badwater. Some say the contaminated are not merely sent away for safety. Some say a far district waits for them, quiet and empty, with no warm beds, no full tanks, and no one to hear the last tail-slap. No one says it loudly. No one admits they believe it. But every beaver has seen how quickly a sick worker can become a problem to solve. Now {0} watches the others from a distance, and the colony watches itself."
zhCN = "{0} 被污染了。\n黄昏时，低语如同雾气覆盖在污染的水面，弥漫在殖民地中。有人说，被污染的个体并非只是为了安全而被送走。有人说，有一个遥远的区域在等待他们，静谧而空旷，没有温暖的床，没有充足的水箱，也没有人能听到最后一声尾巴拍打的声音。\n没有人大声说出这些话。没有人承认他们相信这一点。但是每一只海狸都见证了生病的工人是如何迅速成为需要解决的问题。\n现在 {0} 从远处观察着其他人，而殖民地也在观察着自己。"
zhTW = "{0} 被污染了。\n黃昏時分，低語如霧氣般在殖民地中徘徊，如同污水般令人不安。有些人說，被污染者並不只是為了安全而被送走。有些人說，一個遙遠的區域在等著他們，寧靜而空曠，沒有溫暖的床鋪，沒有充分的糧食，沒有人聆聽最後的尾巴拍打聲。\n沒有人大聲說出來。沒有人承認他們相信這一點。但每一隻海狸都看到了病工如何迅速變成需要解決的問題。\n現在 {0} 在遠處觀察著其他人，而殖民地也在注視著自己。"
ruRU = "{0} загрязнён.\nК закату шепоты crawлют по колонии, как туман над грязной водой. Некоторые говорят, что заражённых не просто отправляют прочь для безопасности. Некоторые утверждают, что вдали их ждёт район, тихий и пустой, без тёплых кроватей, без полных резервуаров и никого, кто услышит последний удар хвоста.\nНикто не говорит это громко. Никто не признаётся, что верит в это. Но каждый бобёр видел, как быстро больной работник может стать проблемой, которую нужно решить.\nТеперь {0} наблюдает за другими издалека, а колония наблюдает за собой."
jaJP = "{0}は汚染されています。\n夕方になると、ささやきがコロニー中を霧のように這い回ります。汚染された者たちが安全のためにただ送られるだけではないと言う者もいます。彼らを待つ遠い地区があると、静かで空っぽで、温かいベッドも満タンのタンクもなく、最後の尾での叩き音を聞く者もいないのだと。\n誰も大声では言いません。誰もそれを信じているとは認めません。しかし、すべてのビーバーは、病気の作業者がどれほど早く問題になるかを見たことがあります。\n今、{0}は他のビーバーたちを距離を置いて見守り、コロニーは自らを見守っています。"
frFR = "{0} est contaminé. \nÀ la tombée de la nuit, des murmures se glissent à travers la colonie comme une brume sur des eaux souillées. Certains disent que les contaminés ne sont pas seulement envoyés pour leur sécurité. Certains disent qu'un lointain district les attend, calme et vide, sans lits chauds, sans réservoirs pleins, et personne pour entendre le dernier claquement de queue. \nPersonne ne le dit à voix haute. Personne n’admet croire cela. Mais chaque castor a vu à quelle vitesse un travailleur malade peut devenir un problème à résoudre. \nMaintenant, {0} observe les autres de loin, et la colonie s’observe elle-même."
deDE = "{0} ist kontaminiert. \nBei Einbruch der Dämmerung kriechen Flüsterungen durch die Kolonie wie Nebel über schlechtes Wasser. Einige sagen, die Kontaminierten werden nicht nur zur Sicherheit weggeschickt. Einige sagen, ein weit entlegener Bezirk wartet auf sie, still und leer, ohne warme Betten, ohne volle Tanks und ohne jemanden, der den letzten Schwanzschlag hört. \nNiemand spricht es laut aus. Niemand gesteht, dass er daran glaubt. Aber jeder Biber hat gesehen, wie schnell ein kranker Arbeiter zu einem Problem werden kann, das gelöst werden muss. \nJetzt beobachtet {0} die anderen aus der Ferne, und die Kolonie beobachtet sich selbst."
plPL = "{0} jest skażony.\nPrzed zmierzchem szepty pełzają po kolonii jak mgła nad zatrutą wodą. Niektórzy mówią, że skażeni nie są tylko wysyłani dla bezpieczeństwa. Niektórzy mówią, że czeka na nich daleki okręg, cichy i pusty, bez ciepłych łóżek, bez pełnych zbiorników i bez nikogo, kto usłyszałby ostatni uderzenie ogona.\nNikt nie mówi tego głośno. Nikt nie przyznaje, że w to wierzy. Ale każdy bóbr widział, jak szybko chory pracownik może stać się problemem do rozwiązania.\nTeraz {0} obserwuje innych z daleka, a kolonia obserwuje samą siebie."
ptBR = "{0} está contaminado. \nAo anoitecer, sussurros percorrem a colônia como névoa sobre águas poluídas. Alguns dizem que os contaminados não são apenas enviados para longe por segurança. Alguns dizem que um distrito distante os espera, quieto e vazio, sem camas quentes, sem tanques cheios e sem ninguém para ouvir o último estalo de cauda. \nNinguém diz isso em voz alta. Ninguém admite que acredita nisso. Mas todo castor já viu quão rapidamente um trabalhador doente pode se tornar um problema a ser resolvido. \nAgora {0} observa os outros à distância, e a colônia se observa."
koKR = "{0}는 오염되었습니다.  \n저녁이 되면, 속삭임이 불량수역 위 안개처럼 식민지를 기어 다닙니다. 일부는 오염된 이들이 단순히 안전을 위해 떠나는 것이 아니라고 말합니다. 일부는 먼 지역이 그들을 기다리고 있다고, 조용하고 비어 있으며, 따뜻한 침대도, 가득 찬 연료통도, 마지막으로 хвост이 팡팡이는 소리를 들어줄 사람도 없다고 말합니다.  \n아무도 크게 말하지 않습니다. 아무도 자신이 그것을 믿는다고 인정하지 않습니다. 하지만 모든 비버는 아픈 작업자가 얼마나 빨리 문제로 변할 수 있는지를 보았습니다.  \n이제 {0}는 다른 이들을 멀리서 지켜보고, 식민지는 스스로를 지켜봅니다."
csCZ = "{0} je kontaminovaný. \nPřed soumrakem se mezi kolonií šíří šepoty jako mlha nad špatnou vodou. Někteří říkají, že kontaminované nepovyžujou jen kvůli bezpečnosti. Někteří říkají, že na ně čeká daleký okres, tichý a prázdný, bez teplých postelí, bez plných nádrží a nikdo, kdo by slyšel poslední plesknutí ocasu. \nNikdo to neříká nahlas. Nikdo nepřipouští, že tomu věří. Ale každý bobr viděl, jak rychle se nemocný pracovník může stát problémem, který je třeba vyřešit. \nTeď {0} pozoruje ostatní z dálky a kolonie se pozoruje sama."
viVN = "{0} bị ô nhiễm.\nKhi trời sẩm tối, những lời thì thầm lén lút lan ra khắp thuộc địa như sương mù trên nước bẩn. Một số người nói rằng những người bị ô nhiễm không chỉ bị gửi đi vì sự an toàn. Một số người nói rằng một khu vực xa xôi đang chờ đợi họ, yên tĩnh và vắng vẻ, không có giường ấm, không có bể đầy, và không ai nghe thấy tiếng đập đuôi cuối cùng.\nKhông ai nói to. Không ai thừa nhận họ tin điều đó. Nhưng mọi con nhím đều thấy rằng một công nhân ốm đau có thể nhanh chóng trở thành một vấn đề cần giải quyết.\nGiờ đây, {0} quan sát những người khác từ xa, và thuộc địa tự quan sát chính nó."

