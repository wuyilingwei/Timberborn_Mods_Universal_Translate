["LV.BCEv.FoodWoodDispute1.O1"]
raw = "The farmers cheer your judgment and return to the fields with renewed pride. If food is the heart of the colony, they intend to keep it beating.\nThe lumberjacks return to the forest in bitter silence.\n[[C]][[-]]Lumberjack Flags' workers lose {1:0%} Working Speed for [[time:{0}d]]\n[[C]][[+]]Farmhouses' workers gain {2:+0%} Working Speed for [[time:{0}d]]"
status = "normal"
enUS = "The farmers cheer your judgment and return to the fields with renewed pride. If food is the heart of the colony, they intend to keep it beating. The lumberjacks return to the forest in bitter silence. [[C]][[-]]Lumberjack Flags' workers lose {1:0%} Working Speed for [[time:{0}d]] [[C]][[+]]Farmhouses' workers gain {2:+0%} Working Speed for [[time:{0}d]]"
zhCN = "农民们欢呼你的裁决，带着重燃的自豪感回到田野。如果食物是殖民地的心脏，他们打算让它保持跳动。  \n伐木工人则默默地回到森林。  \n[[C]][[-]]伐木工坊的工人失去 {1:0%} 工作速度，持续 [[time:{0}d]]  \n[[C]][[+]]农舍的工人获得 {2:+0%} 工作速度，持续 [[time:{0}d]]"
zhTW = "農民們對你的判決歡呼，並帶著重新燃起的自豪感回到田野。如果食物是殖民地的心臟，他們打算讓它繼續跳動。\n伐木工人們則沉默地回到森林中。\n[[C]][[-]]樵夫旗幟的工人工作速度下降 {1:0%}，持續時間為 [[time:{0}d]]\n[[C]][[+]]農舍的工人工作速度提升 {2:+0%}，持續時間為 [[time:{0}d]]"
ruRU = "Фермеры радуются вашему решению и возвращаются на поля с обновленной гордостью. Если еда — это сердце колонии, они намерены держать его в битве.\nЛесорубы возвращаются в лес в горьком молчании.\n[[C]][[-]]Работники лесорубов теряют {1:0%} Скорость Работы на [[time:{0}d]]\n[[C]][[+]]Работники фермерских домов получают {2:+0%} Скорость Работы на [[time:{0}d]]"
jaJP = "農民たちはあなたの判断を称賛し、誇りを持って畑へ戻ります。もし食料がコロニーの心臓であるなら、彼らはその鼓動を保つつもりです。  \n伐採者たちは苦渋の沈黙の中、森へ戻ります。  \n[[C]][[-]]伐採者の旗の労働者は、[[time:{0}d]]の間、{1:0%}の作業速度を失います。  \n[[C]][[+]]農家の労働者は、[[time:{0}d]]の間、{2:+0%}の作業速度を得ます。"
frFR = "Les agriculteurs acclament votre jugement et retournent aux champs avec un nouveau fierté. Si la nourriture est le cœur de la colonie, ils ont l'intention de le maintenir en vie.  \nLes bûcherons retournent à la forêt dans un silence amer.  \n[[C]][[-]]Les travailleurs des drapeaux de bûcherons perdent {1:0%} de vitesse de travail pendant [[time:{0}d]]  \n[[C]][[+]]Les travailleurs des maisons de ferme gagnent {2:+0%} de vitesse de travail pendant [[time:{0}d]]"
deDE = "Die Bauern jubeln deinem Urteil zu und kehren mit neuem Stolz auf die Felder zurück. Wenn Essen das Herz der Kolonie ist, wollen sie es am Schlagen halten.  \nDie Holzfäller kehren in bitterem Schweigen in den Wald zurück.  \n[[C]][[-]]Die Arbeiter der Holzfällerflaggen verlieren {1:0%} Arbeitsgeschwindigkeit für [[time:{0}d]]  \n[[C]][[+]]Die Arbeiter der Bauernhäuser gewinnen {2:+0%} Arbeitsgeschwindigkeit für [[time:{0}d]]"
plPL = "Rolnicy wiwatują na cześć twojego osądu i wracają na pola z odnowioną dumą. Jeśli jedzenie jest sercem kolonii, zamierzają je utrzymać w rytmie.  \nDrewnojady wracają do lasu w gorzkiej ciszy.  \n[[C]][[-]]Pracownicy flag drwala tracą {1:0%} Prędkości Pracy przez [[czas:{0}d]]  \n[[C]][[+]]Pracownicy domów wiejskich zyskują {2:+0%} Prędkości Pracy przez [[czas:{0}d]]"
ptBR = "Os agricultores aplaudem seu julgamento e retornam aos campos com orgulho renovado. Se a comida é o coração da colônia, eles pretendem mantê-lo pulsando.  \nOs lenhadores retornam à floresta em silêncio amargo.  \n[[C]][[-]]Os trabalhadores das bandeiras de lenhador perdem {1:0%} de Velocidade de Trabalho por [[time:{0}d]]  \n[[C]][[+]]Os trabalhadores das casas de fazenda ganham {2:+0%} de Velocidade de Trabalho por [[time:{0}d]]"
koKR = "농부들은 당신의 판단에 환호하며 renewed pride와 함께 들로 돌아갑니다. 음식이 식민지의 심장이라면, 그들은 그것이 계속 뛰도록 하려 합니다.\n벌목자들은 씁쓸한 침묵 속에 숲으로 돌아갑니다.\n[[C]][[-]]벌목기 깃발의 노동자는 [[time:{0}d]] 동안 {1:0%} 작업 속도를 잃습니다.\n[[C]][[+]]농가의 노동자는 [[time:{0}d]] 동안 {2:+0%} 작업 속도를 얻습니다."
csCZ = "Farmáři oslavují váš verdikt a vracejí se na pole s obnovenou hrdostí. Pokud je jídlo srdcem kolonie, mají v úmyslu udržet ho v chodu. Dělníci v lese se vracejí do lesa v hořkém tichu. [[C]][[-]]Dělníci ze dřevařských vlajek ztrácí {1:0%} rychlost práce na [[time:{0}d]] [[C]][[+]]Dělníci z farem získávají {2:+0%} rychlost práce na [[time:{0}d]]"
viVN = "Những người nông dân hoan hô phán quyết của bạn và quay trở lại cánh đồng với niềm tự hào mới. Nếu thực phẩm là trái tim của thuộc địa, họ có ý định giữ cho nó đập.\nNhững người cưa gỗ trở lại rừng trong im lặng chua chát.\n[[C]][[-]]Công nhân tại Các Lá Cờ Thợ Cưa mất {1:0%} Tốc độ Làm Việc trong [[time:{0}d]]\n[[C]][[+]]Công nhân tại Các Nhà Nông được tăng {2:+0%} Tốc độ Làm Việc trong [[time:{0}d]]"

["LV.BCEv.FoodWoodDispute1.O2"]
raw = "The lumberjacks thump their tails in approval and march back toward the trees. Every raised roof and sturdy dam will prove their worth.\nThe farmers return to their fields with sour looks and sharper words.\n[[C]][[+]]Lumberjack Flags' workers gain {1:+0%} Working Speed for [[time:{0}d]]\n[[C]][[-]]Farmhouses' workers lose {2:0%} Working Speed for [[time:{0}d]]"
status = "normal"
enUS = "The lumberjacks thump their tails in approval and march back toward the trees. Every raised roof and sturdy dam will prove their worth. The farmers return to their fields with sour looks and sharper words. [[C]][[+]]Lumberjack Flags' workers gain {1:+0%} Working Speed for [[time:{0}d]] [[C]][[-]]Farmhouses' workers lose {2:0%} Working Speed for [[time:{0}d]]"
zhCN = "伐木工人们兴奋地拍打着尾巴，朝着树林走去。每一个高耸的屋顶和坚固的大坝都将证明他们的价值。\n农民们面带不悦，带着尖刻的言辞回到田间。\n[[C]][[+]]伐木工人获得 {1:+0%} 的工作速度，持续 [[time:{0}d]]\n[[C]][[-]]农舍的工人失去 {2:0%} 的工作速度，持续 [[time:{0}d]]"
zhTW = "伐木工們拍打著尾巴以示讚同，然後朝樹木走去。每一個抬高的屋頂和堅固的壩堤都將證明他們的價值。\n農民們面帶不悅走回他們的田地，嘴上更是尖酸刻薄。\n[[C]][[+]]伐木工旗幟的工人工作速度提升 {1:+0%}，持續[[time:{0}d]]\n[[C]][[-]]農舍的工人工作速度降低 {2:0%}，持續[[time:{0}d]]"
ruRU = "Древосеки хлещут хвостами в знак одобрения и возвращаются к деревьям. Каждый поднятый фрагмент крыши и прочная плотина докажут свою ценность.  \nФермеры возвращаются на свои поля с кислым выражением лиц и резкими словами.  \n[[C]][[+]]Рабочие лесозаготовителей получают {1:+0%} Скорость Работы на [[time:{0}d]]  \n[[C]][[-]]Рабочие фермерских домов теряют {2:0%} Скорость Работы на [[time:{0}d]]"
jaJP = "伐採者たちは、賛同の意を示して尻尾を叩き、木々の方へと戻って行く。高く持ち上げられた屋根と頑丈なダムは、その価値を証明するだろう。  \n農民たちは、険しい表情と鋭い言葉を持って畑に戻る。  \n[[C]][[+]]伐採者の旗の作業者は、[[time:{0}d]]の間、作業速度が{1:+0%}増加する。  \n[[C]][[-]]農家の作業者は、[[time:{0}d]]の間、作業速度が{2:0%}減少する。"
frFR = "Les bûcherons frappent leur queue en signe d'approbation et marchent de nouveau vers les arbres. Chaque toit élevé et chaque barrage solide prouvera leur valeur.\nLes agriculteurs retournent à leurs champs avec des mines amères et des paroles plus acérées.\n[[C]][[+]]Les travailleurs des Drapeaux de Bûcheron gagnent {1:+0%} de Vitesse de Travail pendant [[time:{0}j]]\n[[C]][[-]]Les travailleurs des Fermes perdent {2:0%} de Vitesse de Travail pendant [[time:{0}j]]"
deDE = "Die Holzfäller schlagen mit den Schwänzen vor Freude und marschieren zurück zu den Bäumen. Jedes angehobene Dach und jede stabile Damm wird ihren Wert beweisen.\nDie Bauern kehren mit verkniffenen Mienen und scharferen Worten auf ihre Felder zurück.\n[[C]][[+]]Die Arbeiter der Holzfäller-Fahnen gewinnen {1:+0%} Arbeitstempo für [[time:{0}d]]\n[[C]][[-]]Die Arbeiter der Bauernhöfe verlieren {2:0%} Arbeitstempo für [[time:{0}d]]"
plPL = "Drwale uderzają ogonami w aprobacie i wracają w kierunku drzew. Każdy podniesiony dach i solidna tama udowodnią swoją wartość. \nRolnicy wracają na swoje pola z kwasnymi minami i ostrzejszymi słowami. \n[[C]][[+]]Pracownicy Flagi Drwali zyskują {1:+0%} Prędkości Pracy przez [[time:{0}d]] \n[[C]][[-]]Pracownicy Gospodarstw tracą {2:0%} Prędkości Pracy przez [[time:{0}d]]"
ptBR = "Os lenhadores batem suas caudas em aprovação e marcham de volta para as árvores. Cada telhado erguido e represa robusta provará seu valor.  \nOs fazendeiros retornam aos seus campos com expressões azedas e palavras mais cortantes.  \n[[C]][[+]]Os trabalhadores das Bandeiras dos Lenhadores ganham {1:+0%} de Velocidade de Trabalho por [[time:{0}d]]  \n[[C]][[-]]Os trabalhadores das Casas de Fazenda perdem {2:0%} de Velocidade de Trabalho por [[time:{0}d]]"
koKR = "벌목자들은 승인하는 듯 꼬리를 쳐대며 나무 쪽으로 다시 행진합니다. 높아진 지붕과 튼튼한 댐은 그들의 가치를 증명할 것입니다. 농부들은 찡그린 표정과 날카로운 언사로 밭으로 돌아갑니다. [[C]][[+]]벌목자 깃발의 일꾼들은 [[time:{0}d]] 동안 {1:+0%} 작업 속도를 얻습니다. [[C]][[-]]농가의 일꾼들은 [[time:{0}d]] 동안 {2:0%} 작업 속도를 잃습니다."
csCZ = "Dřevorubci tleskají svými ocasy na souhlas a vracejí se zpět k stromům. Každá zvýšená střecha a pevná hráz prokáže jejich hodnotu. Zemědělci se vracejí na svá pole s kyselými výrazy a ostřejšími slovy. [[C]][[+]]Pracovníci Dřevorubeckých vlajek získávají {1:+0%} rychlost práce na [[time:{0}d]] [[C]][[-]]Pracovníci Farmářských domů ztrácejí {2:0%} rychlost práce na [[time:{0}d]]"
viVN = "Các thợ xẻ gỗ vỗ đuôi đồng tình và quay trở lại hướng cây cối. Mỗi mái nhà đã dựng lên và con đập vững chãi sẽ chứng tỏ giá trị của chúng.\nCác nông dân trở lại cánh đồng với vẻ mặt khó chịu và lời nói sắc nhọn.\n[[C]][[+]]Công nhân Cờ Thợ Xẻ Gỗ tăng {1:+0%} Tốc độ Làm Việc trong [[time:{0}d]]\n[[C]][[-]]Công nhân Nhà Nông mất {2:0%} Tốc độ Làm Việc trong [[time:{0}d]]"

["LV.BCEv.FoodWoodDispute1.O3"]
raw = "To everyone's surprise, your refusal to choose sides works. The two groups argue a little longer, then begin laughing at how foolish the quarrel has become.\nBoth return to work determined to prove their worth without tearing the colony apart.\n[[C]][[+]]Lumberjack Flags' workers gain {1:+0%} Working Speed for [[time:{0}d]]\n[[C]][[+]]Farmhouses' workers gain {2:+0%} Working Speed for [[time:{0}d]]"
status = "normal"
enUS = "To everyone's surprise, your refusal to choose sides works. The two groups argue a little longer, then begin laughing at how foolish the quarrel has become. Both return to work determined to prove their worth without tearing the colony apart. [[C]][[+]]Lumberjack Flags' workers gain {1:+0%} Working Speed for [[time:{0}d]] [[C]][[+]]Farmhouses' workers gain {2:+0%} Working Speed for [[time:{0}d]]"
zhCN = "令所有人感到惊讶的是，您拒绝站队的做法奏效了。这两个团体争论了稍长一段时间，然后开始嘲笑这场争吵是多么愚蠢。\n他们都回到工作中，决心在不撕裂殖民地的情况下证明自己的价值。\n[[C]][[+]]伐木工会的工人获得 {1:+0%} 的工作速度，持续 [[time:{0}d]]\n[[C]][[+]]农舍的工人获得 {2:+0%} 的工作速度，持续 [[time:{0}d]]"
zhTW = "出乎所有人意料的是，你拒絕選邊站的做法奏效了。兩個團體再爭論了一會兒，然後開始嘲笑這場爭吵是多麼愚蠢。  \n雙方都重返工作，決心在不撕裂殖民地的情況下證明自己的價值。  \n[[C]][[+]]伐木工的工人工作速度提升 {1:+0%}，持續 [[time:{0}d]]  \n[[C]][[+]]農舍的工人工作速度提升 {2:+0%}，持續 [[time:{0}d]]"
ruRU = "К всеобщему удивлению, ваш отказ выбирать сторону срабатывает. Две группы немного спорят, а затем начинают смеяться над тем, насколько глупым стал их конфликт. Обе команды возвращаются к работе, полны решимости доказать свою ценность, не разрывая колонию на части.\n[[C]][[+]]Рабочие Лесозаготовительной Компании получают {1:+0%} Скорость Работы на [[time:{0}d]]\n[[C]][[+]]Рабочие Фермерских Дома получают {2:+0%} Скорость Работы на [[time:{0}d]]"
jaJP = "皆の驚きながらも、あなたがどちらの側にも立たないという拒否が効果を発揮しました。二つのグループはもう少し言い争いを続け、その後、争いがどれほど愚かであるかを笑い合い始めます。\n双方は、植民地を引き裂くことなく、自らの価値を証明する決意を持って仕事に戻ります。\n[[C]][[+]]製材所の労働者は、[[time:{0}d]]の間、{1:+0%}の作業速度を得ます。\n[[C]][[+]]農家の労働者は、[[time:{0}d]]の間、{2:+0%}の作業速度を得ます。"
frFR = "À la surprise de tous, votre refus de prendre parti porte ses fruits. Les deux groupes se disputent encore un peu, puis commencent à rire de la folie de leur querelle.  \nTous deux retournent au travail, déterminés à prouver leur valeur sans déchirer la colonie.  \n[[C]][[+]]Les travailleurs des drapeaux de bûcherons gagnent {1:+0%} de vitesse de travail pendant [[time:{0}d]]  \n[[C]][[+]]Les travailleurs des fermes gagnent {2:+0%} de vitesse de travail pendant [[time:{0}d]]"
deDE = "Zu jedermanns Überraschung funktioniert es, dass du dich weigerst, Partei zu ergreifen. Die beiden Gruppen streiten noch ein wenig länger, dann beginnen sie darüber zu lachen, wie töricht der Streit geworden ist. Beide kehren entschlossen zur Arbeit zurück, um ihren Wert zu beweisen, ohne die Kolonie auseinanderzureißen.  \n[[C]][[+]]Die Arbeiter der Holzfällerflaggen erhalten {1:+0%} Arbeitsgeschwindigkeit für [[time:{0}d]]  \n[[C]][[+]]Die Arbeiter der Bauernhäuser erhalten {2:+0%} Arbeitsgeschwindigkeit für [[time:{0}d]]"
plPL = "Ku zdziwieniu wszystkich, twoja odmowa zajęcia strony przynosi efekty. Obie grupy jeszcze przez chwilę się kłócą, a potem zaczynają się śmiać z tego, jak głupia stała się ich sprzeczka.  \nObie wracają do pracy, zdeterminowane, by udowodnić swoją wartość, nie rozdzierając kolonii.  \n[[C]][[+]]Pracownicy Leśników zyskują {1:+0%} Prędkości Pracy na [[time:{0}d]]  \n[[C]][[+]]Pracownicy Gospodarstw zyskują {2:+0%} Prędkości Pracy na [[time:{0}d]]"
ptBR = "Para a surpresa de todos, sua recusa em escolher um lado funciona. Os dois grupos discutem um pouco mais e depois começam a rir de quão tola a disputa se tornou. Ambos voltam ao trabalho determinados a provar seu valor sem despedaçar a colônia.  \n[[C]][[+]]Os trabalhadores das Bandeiras de Lenhador ganham {1:+0%} de Velocidade de Trabalho por [[time:{0}d]]  \n[[C]][[+]]Os trabalhadores das Casas de Fazenda ganham {2:+0%} de Velocidade de Trabalho por [[time:{0}d]]"
koKR = "모두의 놀라움 속에서, 당신이 편을 고르지 않겠다는 선택이 통했습니다. 두 그룹은 조금 더 논쟁하다가, 결국 이 다툼이 얼마나 어리석었는지에 대해 웃기 시작합니다.  \n둘 다 식민지를 찢어놓지 않고 자신의 가치를 증명하기 위해 다시 일에 몰두합니다.  \n[[C]][[+]]엘리베이터 작업자들은 [[시간:{0}일]] 동안 {1:+0%} 작업 속도를 얻습니다.  \n[[C]][[+]]농가 작업자들은 [[시간:{0}일]] 동안 {2:+0%} 작업 속도를 얻습니다."
csCZ = "K překvapení všech váš odmítání zaujmout stranu funguje. Obě skupiny se chvíli dál hádají, pak začnou smát tomu, jak hloupý se jejich spor stal.  \nObě se vrátí k práci s odhodláním dokázat svou hodnotu, aniž by roztrhly kolonii.  \n[[C]][[+]]Dělníci ve Dřevorolích získávají {1:+0%} Rychlost práce na [[time:{0}d]]  \n[[C]][[+]]Dělníci na Farmách získávají {2:+0%} Rychlost práce na [[time:{0}d]]"
viVN = "Ngạc nhiên trước mọi người, việc bạn từ chối chọn bên nào đã có tác dụng. Hai nhóm tranh cãi một chút nữa, rồi bắt đầu cười về việc cuộc cãi vã đã trở nên ngu ngốc như thế nào.\nCả hai trở lại làm việc với quyết tâm chứng minh giá trị của họ mà không phá vỡ thuộc địa.\n[[C]][[+]]Công nhân của Cờ Thợ Mộc nhận được {1:+0%} Tốc Độ Làm Việc trong [[time:{0}d]]\n[[C]][[+]]Công nhân của Nhà Nông nhận được {2:+0%} Tốc Độ Làm Việc trong [[time:{0}d]]"

["LV.BCEv.FoodWoodDispute1.O4"]
raw = "Your refusal to choose sides satisfies nobody. The farmers feel ignored, the lumberjacks feel dismissed, and both groups return to work with their tails low and tempers high.\nThe quarrel is not over.\n[[C]][[-]]Lumberjack Flags' workers lose {1:0%} Working Speed for [[time:{0}d]]\n[[C]][[-]]Farmhouses' workers lose {2:0%} Working Speed for [[time:{0}d]]"
status = "normal"
enUS = "Your refusal to choose sides satisfies nobody. The farmers feel ignored, the lumberjacks feel dismissed, and both groups return to work with their tails low and tempers high. The quarrel is not over. [[C]][[-]]Lumberjack Flags' workers lose {1:0%} Working Speed for [[time:{0}d]] [[C]][[-]]Farmhouses' workers lose {2:0%} Working Speed for [[time:{0}d]]"
zhCN = "你拒绝取边哪一方，让任何人都不满意。农民感到被忽视，伐木工感到被轻视，两个群体都低着尾巴、情绪高涨地回去工作。\n争吵并未结束。\n[[C]][[-]]伐木工的工人工作速度下降 {1:0%}，持续时间为[[time:{0}d]]\n[[C]][[-]]农舍的工人工作速度下降 {2:0%}，持续时间为[[time:{0}d]]"
zhTW = "你拒絕選擇立場沒有人滿意。農民感到被忽視，樵夫感到被輕視，而兩組人都低垂著尾巴，情緒激動地回到工作崗位上。\n爭吵尚未結束。\n[[C]][[-]]樵夫旗幟的工人工作速度降低 {1:0%} 直至 [[time:{0}d]]\n[[C]][[-]]農舍的工人工作速度降低 {2:0%} 直至 [[time:{0}d]]"
ruRU = "Ваш отказ выбирать сторону никого не удовлетворяет. Фермеры чувствуют себя игнорированными, лесорубы чувствуют себя отвергнутыми, и обе группы возвращаются к работе с опущенными хвостами и высоким темпераментом. Ссора еще не закончена.  \n[[C]][[-]]Рабочие Лесорубов теряют {1:0%} Скорость Работы на [[time:{0}д]]  \n[[C]][[-]]Рабочие Ферм теряют {2:0%} Скорость Работы на [[time:{0}д]]"
jaJP = "あなたがどちらの側を選ばないことは、誰の満足も得られません。農民たちは無視されていると感じ、木こりたちは軽んじられていると感じ、両方のグループはしっぽを下げ、怒りを抱えて仕事に戻ります。\n争いは終わっていません。\n[[C]][[-]]木こりの旗の労働者は [[time:{0}d]] の間、{1:0%} の作業速度を失います。\n[[C]][[-]]農家の労働者は [[time:{0}d]] の間、{2:0%} の作業速度を失います。"
frFR = "Votre refus de choisir un camp ne satisfait personne. Les agriculteurs se sentent ignorés, les bûcherons se sentent méprisés, et les deux groupes retournent au travail avec la queue basse et les nerfs à fleur de peau.  \nLa querelle est loin d'être terminée.  \n[[C]][[-]]Les travailleurs des Drapeaux de Bûcherons perdent {1:0%} de Vitesse de Travail pendant [[time:{0}d]]  \n[[C]][[-]]Les travailleurs des Fermes perdent {2:0%} de Vitesse de Travail pendant [[time:{0}d]]"
deDE = "Deine Weigerung, Partei zu ergreifen, befriedigt niemanden. Die Bauern fühlen sich ignoriert, die Holzfäller fühlen sich abgelehnt, und beide Gruppen kehren mit gesenktem Kopf und hoher Aufregung an die Arbeit zurück. Der Streit ist noch nicht vorbei. [[C]][[-]]Die Arbeiter der Holzfäller verlieren {1:0%} Arbeitsgeschwindigkeit für [[time:{0}d]] [[C]][[-]]Die Arbeiter der Bauernhöfe verlieren {2:0%} Arbeitsgeschwindigkeit für [[time:{0}d]]"
plPL = "Twoja odmowa wyboru strony nie zadowala nikogo. Rolnicy czują się ignorowani, drwale czują się zlekceważeni, a obie grupy wracają do pracy z opuszczonymi ogonami i podniesionymi nastrojami.\nSpór się nie skończył.\n[[C]][[-]]Pracownicy Flag Drwali tracą {1:0%} Prędkości Pracy na [[czas:{0}d]]\n[[C]][[-]]Pracownicy Gospodarstw tracą {2:0%} Prędkości Pracy na [[czas:{0}d]]"
ptBR = "Sua recusa em escolher um lado não satisfaz ninguém. Os fazendeiros se sentem ignorados, os lenhadores se sentem desprezados, e ambos os grupos voltam ao trabalho com os rabos entre as pernas e os ânimos exaltados. \nA disputa não acabou. \n[[C]][[-]]Os trabalhadores das Bandeiras dos Lenhadores perdem {1:0%} de Velocidade de Trabalho por [[time:{0}d]] \n[[C]][[-]]Os trabalhadores das Fazendas perdem {2:0%} de Velocidade de Trabalho por [[time:{0}d]]"
koKR = "편을 고르지 않는 당신의 거부는 아무도 만족시키지 않습니다. 농부들은 무시당했다고 느끼고, 나무꾼들은 경시당했다고 느끼며, 두 그룹 모두 기가 죽고 화가 난 채로 일로 돌아갑니다.\n갈등은 끝나지 않았습니다.\n[[C]][[-]]나무꾼 깃발의 작업자들은 [[time:{0}d]] 동안 {1:0%} 작업 속도를 잃습니다.\n[[C]][[-]]농가의 작업자들은 [[time:{0}d]] 동안 {2:0%} 작업 속도를 잃습니다."
csCZ = "Vaše odmítnutí zaujmout stanovisko nespokojí nikoho. Zemědělci se cítí přehlíženi, dřevorubci se cítí odmítáni a obě skupiny se vracejí k práci se spadenými ocasy a vysokou náladou.\nSpor ještě neskončil.\n[[C]][[-]]Zaměstnanci Dřevorubeckých vlajek ztrácejí {1:0%} Rychlost práce na [[time:{0}d]]\n[[C]][[-]]Zaměstnanci Farmářských domů ztrácejí {2:0%} Rychlost práce na [[time:{0}d]]"
viVN = "Sự từ chối chọn bên của bạn không làm hài lòng ai cả. Các nông dân cảm thấy bị bỏ rơi, các thợ mộc cảm thấy bị xem thường, và cả hai nhóm quay lại làm việc với cái đuôi rủ xuống và tâm trạng bực bội.\nCuộc cãi vã vẫn chưa chấm dứt.\n[[C]][[-]]Công nhân của Cờ Thợ Mộc mất {1:0%} Tốc độ Làm việc trong [[time:{0}d]]\n[[C]][[-]]Công nhân của Nhà Nông mất {2:0%} Tốc độ Làm việc trong [[time:{0}d]]"

