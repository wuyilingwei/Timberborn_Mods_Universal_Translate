["LV.BCEv.FirstDeath.Content"]
raw = "{0} has passed away.\n\nThe colony grows quiet. For the first time, the beavers are not only thinking about survival, but about memory. A few gather nearby, unsure what to do next. Work still needs doing, but so does grief."
status = "normal"
enUS = "{0} has passed away.\n\nThe colony grows quiet. For the first time, the beavers are not only thinking about survival, but about memory. A few gather nearby, unsure what to do next. Work still needs doing, but so does grief."
zhCN = "{0} 去世了。\n\n聚落变得安静。比起生存，海狸们第一次开始思考记忆。一些海狸聚集在附近，不知下一步该做什么。工作仍需继续，但是悲伤也同样需要被面对。"
zhTW = "{0} 已經過世了。\n\n殖民地變得寂靜。這是首度，海狸們不僅在思考生存，還在思考記憶。幾隻聚集在附近，不知道接下來該怎麼辦。工作仍然需要進行，但悲傷同樣需要面對。"
ruRU = "{0} ушел.\n\nКолония замерла в тишине. Впервые бобры думают не только о выживании, но и о памяти. Несколько из них собрались неподалеку, не зная, что делать дальше. Работы еще много, но горе тоже требует внимания."
jaJP = "{0}が亡くなりました。\n\n植民地は静まり返ります。ビーバーたちは初めて、生存だけでなく記憶について考えています。数匹が近くに集まり、次に何をすべきか分からずにいます。仕事はまだ残っていますが、悲しみも必要です。"
frFR = "{0} est décédé.\n\nLa colonie devient silencieuse. Pour la première fois, les castors ne pensent pas seulement à la survie, mais aussi à la mémoire. Quelques-uns se rassemblent à proximité, incertains de la marche à suivre. Du travail reste à faire, mais le deuil aussi."
deDE = "{0} ist verstorben.\n\nDie Kolonie wird still. Zum ersten Mal denken die Biber nicht nur an das Überleben, sondern auch an die Erinnerung. Einige versammeln sich in der Nähe, unsicher, was zu tun ist. Es gibt immer noch Arbeit zu erledigen, aber auch die Trauer muss ihren Platz finden."
plPL = "{0} odszedł.\n\nKolonia cichnie. Po raz pierwszy bobry myślą nie tylko o przetrwaniu, ale i o pamięci. Kilka z nich zbiera się w pobliżu, niepewne, co robić dalej. Praca wciąż czeka, ale także smutek."
ptBR = "{0} faleceu.\n\nA colônia fica silenciosa. Pela primeira vez, os castores não estão pensando apenas na sobrevivência, mas na memória. Alguns se reúnem nas proximidades, incertos sobre o que fazer a seguir. O trabalho ainda precisa ser feito, mas a dor também."
koKR = "{0}가 세상을 떠났습니다.\n\n식민지는 조용해집니다. 비버들이 생존뿐만 아니라 기억에 대해서도 생각하는 것은 처음입니다. 몇몇이 근처에 모여서 다음에 무엇을 해야 할지 몰라 망설이고 있습니다. 아직도 해야 할 일이 있지만, 슬픔도 함께합니다."
csCZ = "{0} zemřel.\n\nKolonie ztichla. Poprvé si bobři nejen že myslí na přežití, ale také na vzpomínku. Někteří se shromáždili poblíž, nejistí co dělat dál. Práce je stále potřeba, ale také se musí projevovat zármutek."
viVN = "{0} đã qua đời.\n\nK колония trở nên yên tĩnh. Lần đầu tiên, những con bồ nông không chỉ nghĩ về sự sinh tồn, mà còn về ký ức. Một vài con tập trung lại gần, không chắc chắn phải làm gì tiếp theo. Công việc vẫn cần phải làm, nhưng nỗi buồn cũng vậy."

