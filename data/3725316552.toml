["LV.BCEv.Unhoused.O1"]
raw = "By the promised day, most of the unhoused beavers have found a place indoors. It is not perfect, but it is enough to prove that the colony remembers those sleeping under the open sky. The mood lifts. Work resumes with steadier paws.\n[[C]][[+]]All beavers gain {0} for [[time:{1}d]]"
status = "normal"
enUS = "By the promised day, most of the unhoused beavers have found a place indoors. It is not perfect, but it is enough to prove that the colony remembers those sleeping under the open sky. The mood lifts. Work resumes with steadier paws.  \n[[C]][[+]]All beavers gain {0} for [[time:{1}d]]"
zhCN = "在约定的日子前，大多数无家可归的海狸已经找到了一个室内的地方。虽然并不完美，但足以证明这个殖民地记住了那些在露天睡觉的海狸。情绪有所提升。工作恢复，爪子更加稳健。  \n[[C]][[+]]所有海狸获得 {0}，持续时间 [[time:{1}d]]"
zhTW = "在承諾的日子到來之前，大多數無家可歸的海狸已經找到了一個室內的地方。雖然不完美，但足以證明這個殖民地記得那些在天空下睡覺的海狸。氣氛有所好轉。工作以穩定的步伐重新開始。\n[[C]][[+]]所有海狸獲得 {0}，持續 [[time:{1}d]]"
ruRU = "К обещанному дню большинство бездомных бобров нашли себе место в помещении. Это не идеально, но этого достаточно, чтобы доказать, что колония помнит тех, кто спит под открытым небом. Настроение поднимается. Работа возобновляется с более уверенными лапами.  \n[[C]][[+]]Все бобры получают {0} за [[time:{1}д]]"
jaJP = "約束の日までに、ほとんどの家のないビーバーたちは屋内の場所を見つけました。完璧ではありませんが、野外で眠る仲間たちをコロニーが忘れていないことを証明するには十分です。雰囲気が和らぎます。作業がより安定した足で再開されます。  \n[[C]][[+]]すべてのビーバーが {0} を獲得します [[time:{1}d]]"
frFR = "Avant la date promise, la plupart des castors sans abri ont trouvé un endroit à l'intérieur. Ce n'est pas parfait, mais c'est suffisant pour prouver que la colonie se souvient de ceux qui dorment à la belle étoile. L'ambiance s'améliore. Le travail reprend avec des pattes plus stables.  \n[[C]][[+]]Tous les castors gagnent {0} pour [[time:{1}j]]"
deDE = "Bis zum versprochenen Tag haben die meisten der obdachlosen Biber einen Platz drinnen gefunden. Es ist nicht perfekt, aber es reicht aus, um zu beweisen, dass die Kolonie die erinnert, die unter freiem Himmel schlafen. Die Stimmung hebt sich. Die Arbeit wird mit stabileren Pfoten fortgesetzt. \n[[C]][[+]]Alle Biber erhalten {0} für [[time:{1}d]]"
plPL = "Do obiecanego dnia większość bezdomnych bobrów znalazła miejsce w budynku. To nie jest idealne, ale wystarcza, by udowodnić, że kolonia pamięta o tych śpiących pod gołym niebem. Nastrój się poprawia. Praca wznawia się z bardziej stabilnymi łapkami.  \n[[C]][[+]]Wszystkie bobry zyskują {0} przez [[czas:{1}d]]"
ptBR = "Até o dia prometido, a maioria dos castores desabrigados encontrou um lugar interno. Não é perfeito, mas é o suficiente para provar que a colônia se lembra daqueles que dormem ao céu aberto. O ânimo melhora. O trabalho recomeça com patas mais firmes. \n[[C]][[+]]Todos os castores ganham {0} por [[time:{1}d]]"
koKR = "약속된 날까지, 대부분의 집이 없는 비버들이 실내에서 자리를 찾았습니다. 완벽하지는 않지만, 식민지가 하늘 아래에서 자고 있는 이들을 기억하고 있다는 것을 증명하기에는 충분합니다. 분위기가 밝아집니다. 일은 더욱 안정된 발로 재개됩니다.  \n[[C]][[+]]모든 비버는 [[time:{1}d]] 동안 {0}을 얻습니다."
csCZ = "Do slíbeného dne většina bezdomovců našla místo uvnitř. Není to dokonalé, ale stačí to k tomu, aby kolonie vzpomněla na ty, kteří spí pod širým nebem. Atmosféra se zlepšuje. Práce se znovu rozbíhá stabilnějšími tlapkami.  \n[[C]][[+]]Všechny bobříci získávají {0} za [[time:{1}d]]"
viVN = "Vào ngày đã hứa, hầu hết các chú hải ly không có nhà đã tìm thấy một chỗ ở trong nhà. Nó không hoàn hảo, nhưng đủ để chứng minh rằng thuộc địa nhớ đến những người ngủ dưới bầu trời rộng mở. Tâm trạng phấn chấn. Công việc trở lại với những chiếc vuốt vững chắc hơn. [[C]][[+]]Tất cả các chú hải ly nhận {0} cho [[time:{1}d]]"

["LV.BCEv.Unhoused.O2"]
raw = "By the promised day, every beaver has a roof overhead. The last bed is claimed before nightfall, and for the first time in days, no one has to choose between sleep and the cold ground. The colony rests easier, and rises stronger.\n[[C]][[+]]All beavers gain {0} for [[time:{1}d]]"
status = "normal"
enUS = "By the promised day, every beaver has a roof overhead. The last bed is claimed before nightfall, and for the first time in days, no one has to choose between sleep and the cold ground. The colony rests easier and rises stronger.  \n[[C]][[+]]All beavers gain {0} for [[time:{1}d]]"
zhCN = "在承诺的日子之前，每只海狸都有了栖身之所。最后一张床在夜幕降临之前被占据，几天来第一次，没有人需要在睡眠和冰冷的土地之间做出选择。殖民地更加安宁，变得更加强大。  \n[[C]][[+]]所有海狸获得 {0} 以换取 [[time:{1}d]]"
zhTW = "在承諾的日子到來之前，每隻海狸都有了遮蔽的屋頂。最後一張床在夜幕降臨前被佔領，幾天來第一次，沒有誰必須在睡眠和冰冷的地面之間做出選擇。殖民地的心情變得輕鬆，並且更加茁壯成長。\n[[C]][[+]]所有海狸獲得 {0} 以持續 [[time:{1}d]]"
ruRU = "К обещанному дню у каждого бобра будет крыша над головой. Последняя кровать занята до наступления ночи, и впервые за несколько дней никому не приходится выбирать между сном и холодной землёй. Колония спит спокойнее и поднимается сильнее.  \n[[C]][[+]]Все бобры получают {0} за [[time:{1}д]]"
jaJP = "約束の日までに、すべてのビーバーに屋根がある。最後のベッドは日没前に獲得され、数日間で初めて、誰も睡眠と冷たい地面の間で選択しなければならないことはない。コロニーはより安心し、強く育つ。  \n[[C]][[+]]すべてのビーバーは[[time:{1}d]]の間、{0}を獲得します。"
frFR = "Avant le jour promis, chaque castor a un toit au-dessus de sa tête. Le dernier lit est occupé avant la tombée de la nuit, et pour la première fois depuis des jours, personne n'a à choisir entre le sommeil et le sol froid. La colonie repose plus sereinement et se lève plus forte.  \n[[C]][[+]]Tous les castors gagnent {0} pendant [[time:{1}d]]"
deDE = "Bis zum versprochenen Tag hat jeder Biber ein Dach über dem Kopf. Das letzte Bett wird vor Einbruch der Nacht beansprucht, und zum ersten Mal seit Tagen muss niemand zwischen Schlaf und dem kalten Boden wählen. Die Kolonie ruht sich leichter aus und steht stärker auf.\n[[C]][[+]]Alle Biber erhalten {0} für [[time:{1}d]]"
plPL = "Do obiecanego dnia każdy bóbr ma dach nad głową. Ostatnie łóżko jest zajęte przed zmierzchem, a po raz pierwszy od dni nikt nie musi wybierać między snem a zimną ziemią. Kolonia odpoczywa łatwiej i wstaje silniejsza. [[C]][[+]]Wszystkie bobry zyskują {0} przez [[czas:{1}d]]"
ptBR = "Até o dia prometido, cada castor tem um teto sobre a cabeça. A última cama é ocupada antes do anoitecer, e pela primeira vez em dias, ninguém precisa escolher entre dormir e o chão frio. A colônia descansa mais tranquila e se levanta mais forte.  \n[[C]][[+]]Todos os castores ganham {0} por [[time:{1}d]]"
koKR = "약속된 날까지 모든 비버가 지붕 아래에 있습니다. 마지막 침대가 해가 지기 전에 차지되고, 며칠 만에 처음으로 아무도 잠과 차가운 땅 사이에서 선택을 해야 하지 않습니다. 식민지는 더 편안하게 휴식을 취하고, 더 강하게 일어납니다.  \n[[C]][[+]]모든 비버는 [[time:{1}일]] 동안 {0}을(를) 얻습니다."
csCZ = "Do slibovaného dne má každý bobr střechu nad hlavou. Poslední postel je obsazena před setměním a poprvé po dnech nemusí nikdo vybírat mezi spánkem a studenou zemí. Kolonie odpočívá lépe a vstává silnější.  \n[[C]][[+]]Všichni bobři získávají {0} na [[čas:{1}d]]"
viVN = "Đến ngày hứa hẹn, mỗi con nhím đều có mái che. Chiếc giường cuối cùng được chiếm trước khi hoàng hôn buông xuống, và lần đầu tiên sau nhiều ngày, không ai phải chọn giữa giấc ngủ và mặt đất lạnh. T колони́и cảm thấy nhẹ nhàng hơn, và thức dậy mạnh mẽ hơn.  \n[[C]][[+]]Tất cả các con nhím nhận {0} cho [[time:{1}d]]"

["LV.BCEv.Unhoused.O3"]
raw = "Too many beavers are still sleeping outside. Whatever was said before, the colony has not given them shelter.\nThey rise tired, work slower, and keep their doubts mostly to themselves.\n[[C]][[-]]All beavers suffer {0} for [[time:{1}d]]"
status = "normal"
enUS = "Too many beavers are still sleeping outside. Whatever was said before, the colony has not given them shelter. They rise tired, work slower, and keep their doubts mostly to themselves. [[C]][[-]]All beavers suffer {0} for [[time:{1}d]]"
zhCN = "“还有太多的海狸在外面睡觉。不管之前说了什么，殖民地并没有给他们提供庇护。\n他们醒来时疲惫不堪，工作效率降低，并且大多数疑虑都压在心里。\n[[C]][[-]]所有海狸都将受到 {0} 的影响，持续 [[time:{1}d]]”"
zhTW = "太多的海狸仍然在外面睡覺。無論之前說了什麼，殖民地並沒有給他們提供庇護。\n他們疲憊地起床，工作速度變慢，並將大多數的疑惑隱藏在心中。\n[[C]][[-]]所有海狸在[[time:{1}d]]內遭受{0}的痛苦"
ruRU = "Слишком много бобров все еще спят на улице. Что бы ни говорилось раньше, колония не предоставила им укрытие.  \nОни встают усталыми, работают медленнее и чаще всего при себе оставляют свои сомнения.  \n[[C]][[-]]Все бобры страдают {0} в течение [[time:{1}d]]"
jaJP = "「外で寝ているビーバーが多すぎる。以前に言われたことは何であれ、このコロニーは彼らに shelterを提供していない。\n彼らは疲れて起き、仕事は遅くなり、ほとんど自分の中に疑念を抱えている。\n[[C]][[-]]すべてのビーバーは{0}を経験する {1}日間」"
frFR = "Trop de castors dorment encore à l'extérieur. Quoi qu'il en soit, la colonie ne leur a pas offert d'abri.  \nIls se lèvent fatigués, travaillent plus lentement et gardent leurs doutes principalement pour eux.  \n[[C]][[-]]Tous les castors souffrent {0} pendant [[time:{1}d]]"
deDE = "Zu viele Biber schlafen noch draußen. Was auch immer zuvor gesagt wurde, die Kolonie hat ihnen keinen Schutz gegeben.  \nSie stehen müde auf, arbeiten langsamer und behalten ihre Zweifel größtenteils für sich.  \n[[C]][[-]]Alle Biber leiden {0} für [[time:{1}d]]"
plPL = "Zbyt wiele bobrów wciąż śpi na zewnątrz. Cokolwiek mówiono wcześniej, kolonia nie zapewniła im schronienia.  \nBudzą się zmęczone, pracują wolniej i głównie skrywają swoje wątpliwości.  \n[[C]][[-]]Wszystkie bobry cierpią {0} przez [[czas:{1}d]]"
ptBR = "Muitos castores ainda estão dormindo do lado de fora. O que foi dito antes, a colônia não lhes deu abrigo.  \nEles acordam cansados, trabalham mais devagar e mantêm suas dúvidas principalmente para si mesmos.  \n[[C]][[-]]Todos os castores sofrem {0} por [[time:{1}d]]"
koKR = "너무 많은 비버들이 여전히 밖에서 자고 있습니다. 이전에 어떤 말이 있었든, 식민지는 그들에게 피난처를 제공하지 않았습니다. 그들은 피곤하게 일어나고, 작업 속도가 느려지며, 대부분의 의심을 스스로 간직합니다. [[C]][[-]]모든 비버들은 [[시간:{1}일]] 동안 {0}을(를) 겪습니다."
csCZ = "Příliš mnoho bobrů stále spí venku. Ať už bylo řečeno cokoliv, kolonie jim neposkytla př shelter.\nProbouzejí se unavení, pracují pomaleji a většinu svých pochybností si nechávají pro sebe.  \n[[C]][[-]]Všichni bobři trpí {0} po [[time:{1}d]]"
viVN = "Quá nhiều castor vẫn đang ngủ bên ngoài. Dù đã nói gì trước đó, thuộc địa vẫn chưa cung cấp chỗ ở cho họ. \nHọ thức dậy mệt mỏi, làm việc chậm hơn, và giữ lại phần lớn những nghi ngờ cho riêng mình. \n[[C]][[-]]Tất cả castor đều phải chịu {0} trong [[time:{1}d]]"

