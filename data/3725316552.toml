["LV.BCEv.FoodWoodDispute1.Content"]
raw = "A quarrel has grown between the farmers and the lumberjacks. At first, it was only boasting over whose work mattered more. Then the jokes sharpened, the grumbling spread, and soon both sides were loudly claiming that the colony would fall apart without them.\nThe farmers say full bellies keep paws moving. The lumberjacks say every roof, dam, and workshop begins with timber.\nNow both groups have come before you, waiting to hear which work the colony values more."
status = "normal"
enUS = "A quarrel has grown between the farmers and the lumberjacks. At first, it was only boasting over whose work mattered more. Then the jokes sharpened, the grumbling spread, and soon both sides were loudly claiming that the colony would fall apart without them. The farmers say full bellies keep paws moving. The lumberjacks say every roof, dam, and workshop begins with timber. Now both groups have come before you, waiting to hear which work the colony values more."
zhCN = "农民和伐木工之间发生了争执。起初，只是为了各自的工作重要性而争夸。然后玩笑变得尖锐，抱怨四起，没多久双方都大声宣称，如果没有他们，殖民地就会崩溃。\n农民说，饱腹才让爪子动起来。伐木工说，每个屋顶、坝和车间都始于木材。\n现在双方都来到你面前，等待听取殖民地更看重哪种工作。"
zhTW = "農民和伐木工之間產生了爭執。起初，這只是關於誰的工作更重要的自誇而已。然後玩笑變得尖銳，抱怨擴散，很快兩方都大聲聲稱沒有他們，殖民地就會分崩離析。\n農民說，飽滿的肚子讓爪子能夠持續運動。伐木工則說，每個屋頂、堤壩和作坊都始於木材。\n現在這兩個團體已經來到你面前，等待聽到殖民地更重視哪一方的工作。"
ruRU = "Разгорелся конфликт между фермерами и лесорубами. Сначала это были лишь похвальбы о том, чья работа важнее. Затем шутки стали более острыми, недовольство распространилось, и вскоре обе стороны громко заявили, что колония распадется без них.  \nФермеры говорят, что полные животы заставляют лапы работать. Лесорубы утверждают, что каждая крыша, плотина и мастерская начинается с леса.  \nТеперь обе группы пришли к вам, ожидая услышать, какая работа для колонии важнее."
jaJP = "農民と伐採業者の間に争いが生じました。最初は、どちらの仕事がより重要であるかを自慢し合うだけのものでした。しかし、冗談が鋭くなり、不満が広がっていくうちに、両者は声高に、コロニーは自分たちなしでは崩壊すると主張するようになりました。\n農民は、満腹の腹が手を動かすと言います。伐採業者は、すべての屋根、ダム、作業場は木材から始まると言います。\n今、両方のグループがあなたの前に集まり、コロニーがどちらの仕事をより重視するかを聞くのを待っています。"
frFR = "Un différend est né entre les agriculteurs et les bûcherons. Au départ, il ne s'agissait que de vantardise sur le travail de chacun, mais les plaisanteries se sont durcies, les grognes se sont répandues, et bientôt les deux camps ont commencé à clamer haut et fort que la colonie s'effondrerait sans eux.  \nLes agriculteurs affirment que des ventres pleins font avancer les pattes. Les bûcherons disent que chaque toit, barrage et atelier commence par du bois.  \nMaintenant, les deux groupes sont venus devant vous, attendant d'entendre quel travail la colonie valorise le plus."
deDE = "Ein Streit ist zwischen den Bauern und den Holzfällern entstanden. Zuerst war es nur eine Prahlerei darüber, wessen Arbeit mehr zählt. Dann wurden die Witze schärfer, das Grummeln breitete sich aus, und bald behaupteten beide Seiten lautstark, dass die Kolonie ohne sie auseinanderfallen würde.  \nDie Bauern sagen, volle Bäuche halten die Pfoten in Bewegung. Die Holzfäller sagen, dass jedes Dach, jeder Damm und jede Werkstatt mit Holz beginnt.  \nJetzt sind beide Gruppen vor Ihnen erschienen und warten darauf zu hören, welche Arbeit die Kolonie mehr schätzt."
plPL = "Między rolnikami a drwalami narosła kłótnia. Na początku tylko przechwalali się, czyja praca jest ważniejsza. Potem dowcipy stały się ostre, narzekania się rozpowszechniły i wkrótce obie strony głośno twierdziły, że kolonia się rozpadnie bez nich.\nRolnicy mówią, że pełne brzuchy napędzają łapy. Drwale twierdzą, że każdy dach, tama i warsztat zaczyna się od drewna.\nTeraz obie grupy stanęły przed tobą, czekając na informację, która praca jest dla kolonii ważniejsza."
ptBR = "Uma disputa surgiu entre os fazendeiros e os lenhadores. A princípio, eram apenas alardes sobre qual trabalho era mais importante. Então as piadas se tornaram mais afiadas, o murmúrio se espalhou, e logo ambos os lados estavam afirmando em alto e bom som que a colônia desmoronaria sem eles.  \nOs fazendeiros dizem que barrigas cheias mantêm as patas em movimento. Os lenhadores dizem que cada telhado, barragem e oficina começa com madeira.  \nAgora ambos os grupos se apresentaram diante de você, esperando ouvir qual trabalho a colônia valoriza mais."
koKR = "농부들과 벌목꾼들 사이에 다툼이 커졌습니다. 처음에는 누가 더 중요한 일을 하는지를 자랑하는 정도에 불과했습니다. 그러다 농담이 격해지고 불평이 퍼져 나가면서 두 편 모두가 식민지가 자신들 없이는 무너질 것이라고 크게 주장하기 시작했습니다.\n농부들은 배가 부르면 발이 움직인다고 말합니다. 벌목꾼들은 모든 지붕, 댐, 작업장이 목재에서 시작된다고 주장합니다.\n이제 두 그룹 모두 당신 앞에 모여, 어느 일이 식민지에서 더 가치 있는지 듣기를 기다리고 있습니다."
csCZ = "Mezi farmáři a dřevorubci vypukl spor. Zpočátku to byla jen chvála, čí práce je důležitější. Pak se žerty ostrily, nespokojenost se šířila a brzy obě strany hlasitě tvrdily, že kolonie se bez nich rozpadne.\nFarmáři říkají, že plné břicho udržuje tlapky v pohybu. Dřevorubci říkají, že každý střechu, hráz a dílnu začíná se dřevem.\nNyní obě skupiny přišly před vás, čekající, aby slyšely, kterou práci kolonie více oceňuje."
viVN = "Một cuộc cãi vã đã nảy sinh giữa các nông dân và những người chặt cây. Ban đầu, chỉ là sự khoe khoang về công việc của ai quan trọng hơn. Sau đó, những trò đùa trở nên sắc bén hơn, sự càu nhàu lan rộng, và nhanh chóng cả hai bên đều lớn tiếng tuyên bố rằng thuộc địa sẽ sụp đổ nếu thiếu họ.  \nCác nông dân nói rằng bụng no sẽ giữ cho bàn chân hoạt động. Những người chặt cây nói rằng mọi mái nhà, đập nước và xưởng làm việc đều bắt đầu từ gỗ.  \nGiờ đây, cả hai nhóm đã đứng trước bạn, chờ đợi để nghe công việc nào mà thuộc địa đánh giá cao hơn."

