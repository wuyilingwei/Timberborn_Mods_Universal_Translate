["LV.BCEv.DroughtPrep.Content"]
raw = "The air has turned brittle, and the river runs lower than it should. Old paws sniff the wind and mutter that a drought is coming.\nA group of volunteers gathers before dawn, packs ready and tails high. They want to make one last trip before the dry days arrive, but the colony must decide where their effort is best spent."
status = "normal"
enUS = "The air has turned brittle, and the river runs lower than it should. Old paws sniff the wind and mutter that a drought is coming. A group of volunteers gathers before dawn, packs ready and tails high. They want to make one last trip before the dry days arrive, but the colony must decide where their effort is best spent."
zhCN = "“空气变得干燥，河流的水位低于正常水平。年长的爪子嗅着风，低声抱怨即将来到的干旱。一群志愿者在黎明前聚集，准备好行李，尾巴高高竖起。他们想在干旱来临之前进行最后一次旅行，但殖民地必须决定在哪里投入他们的努力最为有效。”"
zhTW = "「空氣變得脆弱，河流的水位低於正常水位。老前輩嗅著風，喃喃自語著乾旱即將來臨。\n一群志願者在黎明前聚集，準備好裝備，尾巴高高翹起。他們想在乾旱日子到來之前進行最後一次出行，但殖民地必須決定他們的努力該花在哪裡。」"
ruRU = "Воздух стал хрупким, а река течет ниже, чем должна. Старые лапы нюхают ветер и бормочут, что грядет засуха. \nГруппа волонтеров собирается перед рассветом, готовые к походу и с высоко поднятыми хвостами. Они хотят сделать последнюю прогулку перед наступлением сухих дней, но колония должна решить, куда лучше всего потратить свои усилия."
jaJP = "空気は脆くなり、川の水位は本来あるべきよりも低くなっています。古い足は風を嗅ぎわけ、干ばつが来るとつぶやきます。\nボランティアのグループが夜明け前に集まり、荷物を用意し、尻尾を高く上げています。彼らは干ばつの時期が来る前に最後の旅をしたいと思っていますが、コロニーは彼らの努力をどこに使うべきかを決めなければなりません。"
frFR = "L'air est devenu cassant, et la rivière coule plus bas qu'elle ne devrait. De vieilles pattes reniflent le vent et murmurent qu'une sécheresse approche. Un groupe de bénévoles se rassemble avant l’aube, sacs prêts et queues hautes. Ils veulent faire un dernier voyage avant que les jours secs n'arrivent, mais la colonie doit décider où leurs efforts seront les plus utiles."
deDE = "Die Luft ist spröde geworden, und der Fluss steht niedriger als er sollte. Alte Pfoten schnüffeln in den Wind und murmeln, dass eine Dürre naht. Eine Gruppe von Freiwilligen versammelt sich vor der Morgendämmerung, die Rucksäcke gepackt und die Schwänze hoch. Sie wollen einen letzten Ausflug machen, bevor die trockenen Tage kommen, aber die Kolonie muss entscheiden, wo ihr Einsatz am besten investiert ist."
plPL = "Powietrze stało się kruche, a rzeka płynie niżej, niż powinna. Stare łapy wąchają wiatr i mruczą, że nadchodzi susza. \nGrupa ochotników gromadzi się przed świtem, gotowi do drogi i z ogonami uniesionymi. Chcą odbyć jeszcze jedną podróż, zanim przyjdą suche dni, ale kolonia musi zdecydować, gdzie ich wysiłek będzie najlepiej wykorzystany."
ptBR = "O ar se tornou quebradiço, e o rio está mais baixo do que deveria. Velhas patas cheiram o vento e murmuram que uma seca está a caminho.  \nUm grupo de voluntários se reúne antes do amanhecer, mochilas prontas e caudas erguidas. Eles querem fazer uma última viagem antes que os dias secos cheguem, mas a colônia deve decidir onde seu esforço é melhor aplicado."
koKR = "공기가 부서지기 쉬워졌고, 강의 수위는 정상보다 낮아졌습니다. 늙은 발이 바람을 맡고 가뭄이 올 것이라고 중얼거립니다. \n자원봉사자들이 새벽 전에 모여, 준비된 짐을 지고 꼬리를 높이 세웁니다. 그들은 마른 날이 오기 전에 마지막 여행을 떠나고 싶어하지만, 집단은 그들의 노력이 가장 잘 쓰일 장소를 결정해야 합니다."
csCZ = "Vzduch ztvrdl, a řeka má nižší hladinu, než by měla. Staré tlapky čichají k větru a mumlají, že sucho se blíží.\nSkupina dobrovolníků se schází před rozbřeskem, připraveni a s ocasem vysoko. Chtějí učinit poslední cestu předtím, než nastanou suché dny, ale kolonie se musí rozhodnout, kde bude jejich úsilí nejlépe investováno."
viVN = "Không khí đã trở nên giòn gãy, và dòng sông chảy thấp hơn bình thường. Những bàn chân già nua ngửi gió và lẩm bẩm rằng hạn hán sắp đến.\nMột nhóm tình nguyện viên tụ tập trước bình minh, chuẩn bị hành lý và đuôi vươn cao. Họ muốn thực hiện một chuyến đi cuối cùng trước khi những ngày khô hạn đến, nhưng thuộc địa phải quyết định nơi nỗ lực của họ được sử dụng hiệu quả nhất."

