["LV.BCEv.ContaminationConspiracy.O1"]
raw = "{0} returns clean, living, and loudly welcomed.\nThe rumor does not vanish all at once, but it loses its teeth. A beaver can be contaminated and still be counted among the colony. A beaver can be isolated without being abandoned.\nThat matters.\n[[C]][[+]]All beavers gain {1} for [[time:{2}d]]"
status = "normal"
enUS = "{0} returns clean, living, and loudly welcomed. The rumor does not vanish all at once, but it loses its teeth. A beaver can be contaminated and still be counted among the colony. A beaver can be isolated without being abandoned. That matters. [[C]][[+]]All beavers gain {1} for [[time:{2}d]]"
zhCN = "{0} 重新返回，干净、活泼，并受到热烈欢迎。\n谣言不会一下子消失，但它会失去锋芒。一只海狸可能会受到污染，但仍然可以被视为群体的一员。一只海狸可以被隔离而不被遗弃。\n这很重要。\n[[C]][[+]]所有海狸在 [[time:{2}d]] 内获得 {1}"
zhTW = "{0} 返回時清潔、活潑，並受到熱烈歡迎。\n謠言不會一下子消失，但它會失去威力。海狸可以被污染，仍然被算作是這個族群的一員。海狸可以被孤立而不會被拋棄。\n這很重要。\n[[C]][[+]]所有海狸在 [[time:{2}d]] 獲得 {1}。"
ruRU = "{0} возвращается чистым, живым и громко приветствованным. Слухи не исчезают сразу, но теряют свою остроту. Бобра можно заразить и все еще считать его частью колонии. Бобра можно изолировать, не покинув его. Это имеет значение. [[C]][[+]]Все бобры получают {1} на [[time:{2}д]]"
jaJP = "{0}は清潔で生き生きとしており、大声で歓迎される。\n噂は一度に消えるわけではないが、その影響力を失っていく。ビーバーは汚染されることもあるが、コロニーの一員として数えられることができる。ビーバーは孤立させられることがあっても、見捨てられることはない。\nそれが重要だ。\n[[C]][[+]]すべてのビーバーは[[time:{2}d]]の間に{1}を獲得する。"
frFR = "{0} revient propre, vivant et accueilli bruyamment. \nLa rumeur ne disparaît pas d'un coup, mais elle perd de sa force. Un castor peut être contaminé et être toujours compté parmi la colonie. Un castor peut être isolé sans être abandonné. \nC'est important. \n[[C]][[+]]Tous les castors gagnent {1} pour [[time:{2}j]]"
deDE = "{0} kehrt sauber, lebendig und laut begrüßt zurück. \nDas Gerücht verschwindet nicht auf einmal, aber es verliert seine Schärfe. Ein Biber kann kontaminiert sein und dennoch zur Kolonie gezählt werden. Ein Biber kann isoliert werden, ohne verlassen zu werden. \nDas zählt. \n[[C]][[+]]Alle Biber erhalten {1} für [[time:{2}d]]"
plPL = "{0} wraca czysty, żywy i głośno witany. \nPlotka nie znika od razu, ale traci swój pazur. Beaver może być zainfekowany i nadal być liczony w koloni. Beaver może być odizolowany bez bycia porzuconym. \nTo ma znaczenie. \n[[C]][[+]]Wszystkie bobry zyskują {1} przez [[czas:{2}d]]"
ptBR = "{0} retorna limpo, vivo e calorosamente recebido. O rumor não desaparece de repente, mas perde sua força. Um castor pode estar contaminado e ainda ser contado entre a colônia. Um castor pode ser isolado sem ser abandonado. Isso importa. [[C]][[+]]Todos os castores ganham {1} por [[time:{2}d]]"
koKR = "{0}이 깨끗하고 살아있으며 크게 환영받으며 돌아옵니다. 소문은 한꺼번에 사라지지 않지만, 그 힘을 잃습니다. 비버는 오염될 수 있지만 여전히 집단에 포함될 수 있습니다. 비버는 버림받지 않고 고립될 수 있습니다. 그게 중요합니다. [[C]][[+]]모든 비버는 [[시간:{2}일]] 동안 {1}을 얻습니다."
csCZ = "{0} se vrací čistý, živý a bouřlivě přivítaný. \nRumor nezmizí hned, ale ztrácí svůj důraz. Bobr může být kontaminován a přesto být počítán mezi kolonii. Bobr může být izolován, aniž by byl opuštěn. \nTo je důležité. \n[[C]][[+]]Všichni bobři získávají {1} na [[čas:{2}d]]"
viVN = "{0} trở về trong sự sạch sẽ, sống động, và được chào đón nồng nhiệt. \nTin đồn không biến mất ngay lập tức, nhưng nó mất đi sức mạnh. Một con kỳ nhông có thể bị ô nhiễm và vẫn được tính vào thuộc địa. Một con kỳ nhông có thể bị cô lập mà không bị bỏ rơi. \nĐiều đó quan trọng. \n[[C]][[+]]Tất cả các con kỳ nhông nhận được {1} trong [[time:{2}d]]"

["LV.BCEv.ContaminationConspiracy.O2"]
raw = "The quiet district remains quiet. There is no sound of {0} returning, no sign of recovery, and no end to the whispers.\nWhether by neglect, fear, or cruel necessity, the rumor now has a name and a shape. Beavers lower their voices when a contaminated worker passes. Some glance toward the far paths and wonder who will be sent there next.\nThe colony keeps working, but not without looking over its shoulder.\n[[C]][[-]]All beavers get {1} for [[time:{2}d]]"
status = "normal"
enUS = "The quiet district remains quiet. There is no sound of {0} returning, no sign of recovery, and no end to the whispers. Whether by neglect, fear, or cruel necessity, the rumor now has a name and a shape. Beavers lower their voices when a contaminated worker passes. Some glance toward the far paths and wonder who will be sent there next. The colony keeps working, but not without looking over its shoulder. [[C]][[-]]All beavers get {1} for [[time:{2}d]]"
zhCN = "安静的区域依然安静。没有{0}返回的声音，没有恢复的迹象，也没有低语的尽头。\n无论是由于忽视、恐惧还是残酷的必要，谣言现在有了名称和形状。当一个被污染的工人经过时，海狸们会降低声音。有些人朝远方的道路投去目光，想知道接下来会派谁去那里。\n栖息地仍在运作，但每个人都不免回头张望。\n[[C]][[-]]所有海狸在[[time:{2}d]]内获得{1}。"
zhTW = "安靜的區域依然安靜。沒有 {0} 回來的聲音，沒有復甦的跡象，也沒有低語的結束。\n無論是因為疏忽、恐懼，還是殘酷的必需，這個謠言如今有了一個名字和形狀。當一位受污染的工人經過時，海狸們降低了聲音。一些人朝遙遠的小路瞥去，心中猜測下一個被派往那裡的是誰。\n殖民地繼續運作，但並不是不時回首。\n[[C]][[-]]所有海狸在 [[time:{2}d]] 期間獲得 {1}"
ruRU = "Тихий район остается тихим. Нет звука {0}, возвращающегося, нет признаков восстановления и нет конца шепотам. \nЛибо из-за небрежности, страха, либо жестокой необходимости, слух теперь имеет имя и форму. Бобры понижают голоса, когда мимо проходит зараженный рабочий. Некоторые бросают взгляды на дальние тропы и задаются вопросом, кто будет отправлен туда следующим. \nКолония продолжает работать, но не без опасений присмотреться назад. \n[[C]][[-]]Все бобры получают {1} на [[time:{2}d]]"
jaJP = "静かな地区は静かなままです。{0}が戻る音はなく、回復の兆しもなく、ささやきが終わることはありません。\n無関心、恐怖、または残酷な必要から、それに名前と形が与えられました。汚染された作業員が通り過ぎると、ビーバーたちは声を低くします。遠くの道をちらりと見て、次に誰がそこに送られるのかを不安に思います。\nコロニーは働き続けますが、常に後ろを気にしています。\n[[C]][[-]]すべてのビーバーは[[time:{2}d]]の間に{1}を得ます。"
frFR = "Le quartier calme reste calme. Il n'y a aucun bruit du retour de {0}, aucun signe de rétablissement, et pas de fin aux murmures. Que ce soit par négligence, peur, ou nécessité cruelle, la rumeur a maintenant un nom et une forme. Les castors baissent la voix lorsqu'un travailleur contaminé passe. Certains jettent un coup d'œil vers les chemins éloignés et se demandent qui y sera envoyé ensuite. La colonie continue de travailler, mais pas sans regarder par-dessus son épaule. [[C]][[-]]Tous les castors reçoivent {1} pour [[time:{2}d]]"
deDE = "Der stille Bezirk bleibt ruhig. Es gibt kein Geräusch von {0}, das zurückkehrt, kein Zeichen der Genesung und kein Ende der Flüsterungen. \nOb aus Nachlässigkeit, Angst oder grausamer Notwendigkeit, das Gerücht hat jetzt einen Namen und eine Gestalt. Biber senken ihre Stimmen, wenn ein kontaminierter Arbeiter vorbeigeht. Einige blicken zu den fernen Wegen und fragen sich, wer als Nächstes dorthin geschickt wird. \nDie Kolonie arbeitet weiter, aber nicht ohne sich umzusehen. \n[[C]][[-]]Alle Biber erhalten {1} für [[time:{2}d]]"
plPL = "Cicha dzielnica pozostaje cicha. Nie słychać powrotu {0}, nie widać oznak regeneracji, ani końca szeptów. \nCzy to przez zaniedbanie, strach, czy okrutną konieczność, plotka ma teraz imię i kształt. Bobry ściszają głosy, gdy przechodzi zanieczyszczony pracownik. Niektóre z nich spoglądają w stronę dalekich ścieżek i zastanawiają się, kto zostanie tam wysłany następny.\nKolonia nadal pracuje, ale nie bez oglądania się za siebie.\n[[C]][[-]]Wszystkie bobry dostają {1} przez [[time:{2}d]]"
ptBR = "O distrito quieto continua silencioso. Não há som de {0} retornando, nenhum sinal de recuperação e nenhum fim para os sussurros. Seja por negligência, medo ou cruel necessidade, o boato agora tem um nome e uma forma. Os castores abaixam as vozes quando um trabalhador contaminado passa. Alguns olham para os caminhos distantes e se perguntam quem será enviado lá em seguida. A colônia continua trabalhando, mas não sem olhar por cima do ombro. [[C]][[-]]Todos os castores recebem {1} por [[time:{2}d]]"
koKR = "조용한 지역은 여전히 조용하다. {0}가 돌아오는 소리도, 회복의 징후도, 속삭임의 끝도 없다. \n방치, 두려움, 혹은 잔인한 필요로 인해 이제 이 소문은 이름과 형태를 갖게 되었다. 오염된 작업자가 지나갈 때 비버들은 목소리를 낮춘다. 일부는 먼 길을 바라보며 다음에 누가 그곳으로 보내질지 궁금해한다. \n콜로니는 계속 일을 하지만, 뒤를 돌아보지 않고는 아니다. \n[[C]][[-]]모든 비버는 [[time:{2}d]] 동안 {1}을 얻는다."
csCZ = "Tichá čtvrť zůstává tichá. Není slyšet návrat {0}, žádné známky uzdravení a žádný konec šeptání.  \nAť už z nedbalosti, strachu nebo kruté nutnosti, má pomluva nyní jméno a tvar. Bobři hovoří tišeji, když kolem prochází kontaminovaný pracovník. Někteří se podívají směrem k odlehlým cestám a přemýšlejí, kdo bude poslán tam příště.  \nKolonie pokračuje v práci, ale ne bez toho, aby se občas ohlédla přes rameno.  \n[[C]][[-]]Všichni bobři dostanou {1} za [[time:{2}d]]"
viVN = "Khu vực yên tĩnh vẫn giữ yên tĩnh. Không có âm thanh nào của {0} trở về, không có dấu hiệu phục hồi, và không có kết thúc cho những lời thì thầm.  \nDù là do sự lơ là, sợ hãi, hay cần thiết tàn nhẫn, tin đồn giờ đây đã có một cái tên và hình dáng. Những con béo chuyển giọng khi một công nhân bị ô nhiễm đi qua. Một số nhìn về những con đường xa và tự hỏi ai sẽ được gửi đến đó tiếp theo.  \nThuộc địa tiếp tục làm việc, nhưng không quên nhìn lại phía sau.  \n[[C]][[-]]Tất cả các con béo nhận được {1} cho [[time:{2}d]]"

