["LV.BCEv.PayGuide.Content"]
raw = "Some events need resources to complete.\nSelect a storage building with the required item, then use Event Payment to pay. This works with <YellowHighlight>Piles, Warehouses, and Tanks</YellowHighlight>.\nFor Science, select a <YellowHighlight>Science production building</YellowHighlight>, such as an <YellowHighlight>Inventor</YellowHighlight>.\nEnter the amount you want to contribute, then click Pay. You can pay in smaller amounts over time until the event requirement is complete."
status = "normal"
enUS = "Some events need resources to complete. Select a storage building with the required item, then use Event Payment to pay. This works with <YellowHighlight>Piles, Warehouses, and Tanks</YellowHighlight>. For Science, select a <YellowHighlight>Science production building</YellowHighlight>, such as an <YellowHighlight>Inventor</YellowHighlight>. Enter the amount you want to contribute, then click Pay. You can pay in smaller amounts over time until the event requirement is complete."
zhCN = "某些事件需要资源才能完成。  \n选择一个存储建筑，里面有所需物品，然后使用事件支付进行支付。这适用于<YellowHighlight>堆、仓库和水箱</YellowHighlight>。  \n对于科学，选择一个<YellowHighlight>科学生产建筑</YellowHighlight>，例如<YellowHighlight>发明家</YellowHighlight>。  \n输入您想要贡献的数量，然后点击支付。您可以逐渐支付较小的金额，直到事件要求完成。"
zhTW = "某些事件需要資源來完成。  \n選擇一個擁有所需物品的儲藏建築，然後使用事件付款進行支付。這適用於<YellowHighlight>堆積、倉庫和儲罐</YellowHighlight>。  \n對於科學，選擇一個<YellowHighlight>科學生產建築</YellowHighlight>，例如<YellowHighlight>發明家</YellowHighlight>。  \n輸入您想貢獻的數量，然後點擊支付。您可以隨時間以較小的金額支付，直到事件要求完成。"
ruRU = "Некоторые события требуют ресурсы для завершения. Выберите здание хранения с нужным предметом, затем используйте Оплату события, чтобы заплатить. Это работает с <YellowHighlight>Кучами, Складам и Резервуарами</YellowHighlight>. Для науки выберите <YellowHighlight>производственное здание науки</YellowHighlight>, например, <YellowHighlight>Изобретателя</YellowHighlight>. Введите сумму, которую вы хотите внести, затем нажмите Оплатить. Вы можете платить меньшими суммами с течением времени, пока требование события не будет выполнено."
jaJP = "「いくつかのイベントを完了するには資源が必要です。必要なアイテムのある貯蔵施設を選択し、イベント支払いを使用して支払います。これは<YellowHighlight>山、倉庫、タンク</YellowHighlight>で機能します。サイエンスの場合は、<YellowHighlight>発明家</YellowHighlight>などの<YellowHighlight>サイエンス生産施設</YellowHighlight>を選択します。貢献したい金額を入力し、支払うをクリックします。イベントの要件が完了するまで、時間をかけて少額ずつ支払うことができます。」"
frFR = "Certains événements nécessitent des ressources pour être complétés. Sélectionnez un bâtiment de stockage contenant l'élément requis, puis utilisez le Paiement d'Événement pour payer. Cela fonctionne avec <YellowHighlight>Des Tas, des Entrepôts et des Réservoirs</YellowHighlight>. Pour la Science, sélectionnez un <YellowHighlight>bâtiment de production scientifique</YellowHighlight>, comme un <YellowHighlight>Inventeur</YellowHighlight>. Entrez le montant que vous souhaitez contribuer, puis cliquez sur Payer. Vous pouvez payer par montants plus petits au fil du temps jusqu'à ce que l'exigence de l'événement soit remplie."
deDE = "Einige Ereignisse benötigen Ressourcen, um abgeschlossen zu werden. Wählen Sie ein Lagergebäude mit dem erforderlichen Gegenstand aus und verwenden Sie dann die Veranstaltungszahlung, um zu bezahlen. Dies funktioniert mit <YellowHighlight>Haufen, Lagern und Tanks</YellowHighlight>. Für Wissenschaft wählen Sie ein <YellowHighlight>Wissenschaftsproduktionsgebäude</YellowHighlight>, wie z. B. einen <YellowHighlight>Erfinder</YellowHighlight>. Geben Sie den Betrag ein, den Sie beitragen möchten, und klicken Sie dann auf Bezahlen. Sie können in kleineren Beträgen über einen bestimmten Zeitraum bezahlen, bis die Anforderungen des Ereignisses erfüllt sind."
plPL = "Niektóre wydarzenia potrzebują zasobów do ukończenia. Wybierz budynek magazynowy z wymaganym przedmiotem, a następnie użyj Płatności za Wydarzenie, aby zapłacić. Działa to z <YellowHighlight>Gromadzeniami, Magazynami i Zbiornikami</YellowHighlight>. Aby uzyskać naukę, wybierz <YellowHighlight>budynek produkcji naukowej</YellowHighlight>, taki jak <YellowHighlight>Wynalazca</YellowHighlight>. Wprowadź kwotę, którą chcesz wnieść, a następnie kliknij Zapłać. Możesz płacić mniejszymi kwotami z czasem, aż wymagania wydarzenia zostaną spełnione."
ptBR = "Alguns eventos precisam de recursos para serem concluídos. Selecione um edifício de armazenamento com o item necessário e, em seguida, use o Pagamento do Evento para pagar. Isso funciona com <YellowHighlight>Montes, Armazéns e Tanques</YellowHighlight>. Para Ciência, selecione um <YellowHighlight>edifício de produção de Ciência</YellowHighlight>, como um <YellowHighlight>Inventor</YellowHighlight>. Digite a quantidade que você deseja contribuir e, em seguida, clique em Pagar. Você pode pagar em quantidades menores ao longo do tempo até que o requisito do evento esteja completo."
koKR = "일부 이벤트를 완료하려면 자원이 필요합니다. 필요한 항목이 있는 저장 건물을 선택한 다음 이벤트 결제를 사용하여 지불합니다. 이는 <YellowHighlight>더미, 창고 및 탱크</YellowHighlight>와 함께 작동합니다. 과학을 위해서는 <YellowHighlight>과학 생산 건물</YellowHighlight>을 선택하십시오. 예를 들어 <YellowHighlight>발명가</YellowHighlight>와 같은 건물입니다. 기여하고 싶은 금액을 입력한 후 지불 클릭하십시오. 이벤트 요구 사항이 완료될 때까지 시간이 지남에 따라 더 작은 금액으로 지불할 수 있습니다."
csCZ = "Některé události potřebují zdroje k dokončení. Vyberte skladovou budovu s požadovaným předmětem a poté použijte Event Payment k zaplacení. Toto funguje s <YellowHighlight>Hromadami, Sklady a Nádržemi</YellowHighlight>. Pro vědu vyberte <YellowHighlight>budovu na výrobu vědy</YellowHighlight>, jako je <YellowHighlight>Vynálezce</YellowHighlight>. Zadejte částku, kterou chcete přispět, a poté klikněte na Zaplatit. Můžete platit menšími částkami v průběhu času, dokud nebude požadavek události splněn."
viVN = "Có một số sự kiện cần tài nguyên để hoàn thành.\nChọn một tòa nhà lưu trữ với mục cần thiết, sau đó sử dụng Thanh toán Sự kiện để thanh toán. Điều này hoạt động với <YellowHighlight>Đống, Kho và Bể</YellowHighlight>.\nĐối với Khoa học, chọn một <YellowHighlight>tòa nhà sản xuất Khoa học</YellowHighlight>, chẳng hạn như một <YellowHighlight>Nhà phát minh</YellowHighlight>.\nNhập số tiền bạn muốn đóng góp, sau đó nhấp vào Thanh toán. Bạn có thể thanh toán theo từng khoản nhỏ theo thời gian cho đến khi yêu cầu của sự kiện hoàn tất."

