["LV.BCEv.FoodWoodDispute2.Content"]
raw = "The quarrel has not faded. Days later, the arguments flare up once again, louder and harsher than before. Workers accuse each other of arrogance, laziness, and draining the colony's labor for their own needs.\nNow the entire district waits to see whether you will stand firm, change course, or refuse to take part in the dispute at all."
status = "normal"
enUS = "The quarrel has not faded. Days later, the arguments flare up once again, louder and harsher than before. Workers accuse each other of arrogance, laziness, and draining the colony's labor for their own needs. Now the entire district waits to see whether you will stand firm, change course, or refuse to take part in the dispute at all."
zhCN = "争吵并未平息。几天后，争论再次激烈起来，比之前更大声、更尖锐。工人们互相指责对方傲慢、懒惰，以及为了自己的需要消耗殖民地的劳动力。\n现在整个区域都在等待，看看你是否会坚守立场、改变方向，还是完全拒绝参与争端。"
zhTW = "爭吵並未平息。幾天後，爭論再次激烈起來，比之前更響亮和尖銳。工人們互相指責對方的傲慢、懶惰，並為了自己的需求耗盡殖民地的勞動力。  \n現在整個區域都在等待，看看你是否會堅定立場、更改方針，或者完全拒絕參與這場爭端。"
ruRU = "Ссора не утихла. Спустя несколько дней споры вспыхивают снова, громче и резче, чем прежде. Рабочие обвиняют друг друга в высокомерию, лености и истощении рабочей силы колонии для собственных нужд. Теперь весь район ждет, увидите ли вы твёрдость, измените ли курс или откажетесь участвовать в争reе вообще."
jaJP = "争いは収まっていない。数日後、議論は再び勃発し、前よりも大きく、厳しくなっている。作業員たちは互いを傲慢、怠惰、そして植民地の労働力を自分たちの都合のために使い果たしていると非難している。  \n今や、全体の地区はあなたが堅持するのか、方向を変えるのか、あるいは争いには一切関与しないのかを見守っている。"
frFR = "La querelle n'est pas apaisée. Quelques jours plus tard, les arguments éclatent à nouveau, plus forts et plus durs qu'auparavant. Les travailleurs s'accusent mutuellement d'arrogance, de paresse et d'épuisement du travail de la colonie pour leurs propres besoins. Maintenant, tout le quartier attend de voir si vous allez tenir bon, changer de cap ou refuser de participer à la dispute."
deDE = "Der Streit ist nicht abgeklungen. Tage später flammen die Auseinandersetzungen erneut auf, lauter und härter als zuvor. Arbeiter beschuldigen sich gegenseitig der Arroganz, Faulheit und der Ausbeutung der Arbeitskraft der Kolonie für ihre eigenen Bedürfnisse. Jetzt wartet der gesamte Bezirk darauf, ob Sie standhaft bleiben, den Kurs ändern oder sich überhaupt nicht an dem Streit beteiligen werden."
plPL = "Kłótnia nie wygasła. Dni później spory wybuchają na nowo, głośniej i surowiej niż wcześniej. Robotnicy oskarżają się nawzajem o arogancję, lenistwo i wyczerpywanie pracy kolonii dla własnych potrzeb. Teraz cały okręg czeka, aby zobaczyć, czy będziesz stanowczy, zmienisz kurs, czy też odmówisz wzięcia udziału w sporze."
ptBR = "A discussão não apagou. Dias depois, os argumentos ressurgem mais uma vez, mais altos e mais duros do que antes. Os trabalhadores se acusam mutuamente de arrogância, preguiça e de drenar a mão de obra da colônia para suas próprias necessidades. Agora todo o distrito espera para ver se você se manterá firme, mudará de curso ou se recusará a participar da disputa."
koKR = "갈등은 여전히 가시지 않았다. 며칠 후, 논쟁은 다시 한 번 격렬해지며 이전보다 더 크고 거칠어졌다. 노동자들은 서로의 오만함, 게으름, 그리고 자신의 필요를 위해 식민지의 노동력을 소모한다고 비난한다. 이제 전체 구역은 당신이 확고한 입장을 고수할지, 방향을 바꿀지, 아니면 아예 분쟁에 참여하지 않을지를 기다리고 있다."
csCZ = "Hádka ještě nevyprchala. O několik dní později se hádky opět rozhořely, hlasitější a ostřejší než předtím. Pracovníci se navzájem obviňují z arogance, lenosti a vyčerpávání pracovních sil kolonie pro své vlastní potřeby. Nyní celá čtvrť čeká, zda zůstanete pevní, změníte Směr, nebo se úplně odmítnete účastnit sporu."
viVN = "Cuộc cãi vã vẫn chưa lắng xuống. Vài ngày sau, các tranh luận lại bùng lên một lần nữa, ồn ào và khắc nghiệt hơn trước. Công nhân đổ lỗi cho nhau về sự kiêu ngạo, lười biếng, và lạm dụng sức lao động của thuộc địa cho nhu cầu của riêng họ. Bây giờ toàn bộ khu vực đang chờ đợi xem bạn sẽ kiên quyết đứng vững, thay đổi hướng đi, hay từ chối tham gia vào cuộc tranh chấp này hoàn toàn."

