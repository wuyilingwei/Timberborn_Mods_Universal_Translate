["LV.BCEv.FoodWoodDispute2.O1"]
raw = "Your repeated support leaves no doubt where the colony leadership stands. The favored workers grow proud and energetic, while the others lose heart entirely.\n[[C]][[+]]{3} workers gain {1:0%} Working Speed for [[time:{0}d]]\n[[C]][[-]]{4} workers lose {2:0%} Working Speed for [[time:{0}d]]"
status = "normal"
enUS = "Your repeated support leaves no doubt where the colony leadership stands. The favored workers grow proud and energetic, while the others lose heart entirely.\n[[C]][[+]]{3} workers gain {1:0%} Working Speed for [[time:{0}d]]\n[[C]][[-]]{4} workers lose {2:0%} Working Speed for [[time:{0}d]]"
zhCN = "你们的持续支持毫无疑问地表明了殖民地领导层的立场。受到青睐的工人们变得自豪而充满活力，而其他工人则完全失去了信心。\n[[C]][[+]]{3} 名工人的工作速度提高 {1:0%}，持续时间为 [[time:{0}d]]\n[[C]][[-]]{4} 名工人的工作速度降低 {2:0%}，持续时间为 [[time:{0}d]]"
zhTW = "你的重複支持讓人毫無疑問地知道殖民地的領導立場。受到偏愛的工人們變得驕傲和活力四射，而其他工人則完全失去信心。\n[[C]][[+]]{3} 名工人的工作速度提高 {1:0%}，持續 [[time:{0}d]]\n[[C]][[-]]{4} 名工人的工作速度降低 {2:0%}，持續 [[time:{0}d]]"
ruRU = "Ваши постоянные поддержки не оставляют сомнений в позициях руководства колонии. Привлеченные работники становятся гордыми и энергичными, в то время как остальные полностью теряют уверенность.\n[[C]][[+]]{3} работника получают {1:0%} скорость работы на [[time:{0}д]]\n[[C]][[-]]{4} работника теряют {2:0%} скорость работы на [[time:{0}д]]"
jaJP = "植民地の指導者がどこに立っているのか、あなたの繰り返される支持から疑いの余地はありません。好まれた労働者たちは誇り高く、エネルギッシュになり、一方で他の者たちは完全に士気を失います。  \n[[C]][[+]]{3} の労働者は [[time:{0}d]] の間 {1:0%} 作業速度が増加します。  \n[[C]][[-]]{4} の労働者は [[time:{0}d]] の間 {2:0%} 作業速度が低下します。"
frFR = "Votre soutien répété ne laisse aucun doute sur la position de la direction de la colonie. Les travailleurs favoris deviennent fiers et énergiques, tandis que les autres perdent complètement courage.\n[[C]][[+]]{3} travailleurs gagnent {1:0%} de Vitesse de Travail pendant [[temps:{0}j]]\n[[C]][[-]]{4} travailleurs perdent {2:0%} de Vitesse de Travail pendant [[temps:{0}j]]"
deDE = "Deine wiederholte Unterstützung lässt keinen Zweifel daran, wo die Kolonieleitung steht. Die bevorzugten Arbeiter werden stolz und energisch, während die anderen völlig den Mut verlieren.\n[[C]][[+]]{3} Arbeiter gewinnen {1:0%} Arbeitstempo für [[time:{0}d]]\n[[C]][[-]]{4} Arbeiter verlieren {2:0%} Arbeitstempo für [[time:{0}d]]"
plPL = "Twoje powtarzające się wsparcie nie pozostawia wątpliwości co do stanowiska przywództwa kolonii. Preferowani pracownicy stają się dumni i pełni energii, podczas gdy inni całkowicie tracą zapał.\n[[C]][[+]]{3} pracowników zyskuje {1:0%} Prędkości Pracy na [[czas:{0}d]]\n[[C]][[-]]{4} pracowników traci {2:0%} Prędkości Pracy na [[czas:{0}d]]"
ptBR = "Seu apoio repetido não deixa dúvidas sobre a posição da liderança da colônia. Os trabalhadores favorecidos se tornam orgulhosos e enérgicos, enquanto os outros perdem totalmente a motivação.  \n[[C]][[+]]{3} trabalhadores ganham {1:0%} de Velocidade de Trabalho por [[time:{0}d]]  \n[[C]][[-]]{4} trabalhadores perdem {2:0%} de Velocidade de Trabalho por [[time:{0}d]]"
koKR = "당신의 지속적인 지원은 식민지 지도부의 입장이 어디에 있는지 의심의 여지가 없습니다. 선호받는 노동자들은 자부심과 활력을 키우는 반면, 다른 노동자들은 완전히 의욕을 잃습니다.\n[[C]][[+]]{3} 노동자가 [[time:{0}d]] 동안 {1:0%} 작업 속도를 얻습니다.\n[[C]][[-]]{4} 노동자가 [[time:{0}d]] 동안 {2:0%} 작업 속도를 잃습니다."
csCZ = "Vaše opakovaná podpora zanechává žádné pochybnosti o postavení vedení kolonie. Ocenění pracovníci rostou hrdě a energicky, zatímco ostatní zcela ztrácejí odvahu.  \n[[C]][[+]]{3} pracovníci získávají {1:0%} rychlost práce na [[time:{0}d]]  \n[[C]][[-]]{4} pracovníci ztrácejí {2:0%} rychlost práce na [[time:{0}d]]"
viVN = "Sự ủng hộ liên tục của bạn không còn nghi ngờ gì về vị trí của ban lãnh đạo thuộc địa. Những công nhân được ưu ái trở nên tự hào và tràn đầy năng lượng, trong khi những người khác hoàn toàn mất tinh thần.\n[[C]][[+]]{3} công nhân nhận được {1:0%} Tốc độ Làm Việc trong [[time:{0}d]]\n[[C]][[-]]{4} công nhân mất {2:0%} Tốc độ Làm Việc trong [[time:{0}d]]"

["LV.BCEv.FoodWoodDispute2.O2"]
raw = "The sudden shift catches the colony off guard, but over time the workers begin accepting the new balance. Tempers cool, though some resentment remains.\n[[C]][[+]]{3} workers gain {1:0%} Working Speed for [[time:{0}d]]\n[[C]][[-]]{4} workers lose {2:0%} Working Speed for [[time:{0}d]]"
status = "normal"
enUS = "The sudden shift catches the colony off guard, but over time the workers begin accepting the new balance. Tempers cool, though some resentment remains.\n[[C]][[+]]{3} workers gain {1:0%} Working Speed for [[time:{0}d]]\n[[C]][[-]]{4} workers lose {2:0%} Working Speed for [[time:{0}d]]"
zhCN = "突然的变化让殖民地措手不及，但随着时间的推移，工人们开始接受新的平衡。情绪有所缓和，但仍然保留着一些怨恨。\n[[C]][[+]]{3} 名工人的工作速度提高 {1:0%} 持续时间为 [[time:{0}d]]\n[[C]][[-]]{4} 名工人的工作速度降低 {2:0%} 持续时间为 [[time:{0}d]]"
zhTW = "突如其來的變化讓殖民地措手不及，但隨著時間的推移，工人們開始接受新的平衡。雖然一些怨恨仍然存在，但情緒漸漸平靜。\n[[C]][[+]]{3} 名工人獲得 {1:0%} 工作速度，持續 [[time:{0}d]]\n[[C]][[-]]{4} 名工人失去 {2:0%} 工作速度，持續 [[time:{0}d]]"
ruRU = "Внезапный поворот застает колонию врасплох, но со временем рабочие привыкают к новой ситуации. Настроение успокаивается, хотя некоторое недовольство остается.\n[[C]][[+]]{3} рабочих получают {1:0%} Скорость Работы на [[time:{0}д]]\n[[C]][[-]]{4} рабочих теряют {2:0%} Скорость Работы на [[time:{0}д]]"
jaJP = "突然の変化はコロニーを不意を突きますが、時が経つにつれて労働者たちは新しいバランスを受け入れ始めます。感情は落ち着きますが、いくつかの不満は残ります。\n[[C]][[+]]{3}人の労働者が[[time:{0}d]]の間、{1:0%}の作業速度を得ます。\n[[C]][[-]]{4}人の労働者が[[time:{0}d]]の間、{2:0%}の作業速度を失います。"
frFR = "Le changement soudain prend la colonie au dépourvu, mais au fil du temps, les travailleurs commencent à accepter le nouvel équilibre. Les esprits s'apaisent, bien que certains ressentiments demeurent.  \n[[C]][[+]]{3} travailleurs gagnent {1:0%} de Vitesse de Travail pour [[time:{0}j]]  \n[[C]][[-]]{4} travailleurs perdent {2:0%} de Vitesse de Travail pour [[time:{0}j]]"
deDE = "Der plötzliche Wandel überrascht die Kolonie, aber mit der Zeit beginnen die Arbeiter, das neue Gleichgewicht zu akzeptieren. Die Gemüter beruhigen sich, obwohl ein gewisses Maß an Groll bleibt.  \n[[C]][[+]]{3} Arbeiter gewinnen {1:0%} Arbeitsgeschwindigkeit für [[time:{0}d]]  \n[[C]][[-]]{4} Arbeiter verlieren {2:0%} Arbeitsgeschwindigkeit für [[time:{0}d]]"
plPL = "Nagła zmiana zaskakuje kolonię, ale z czasem pracownicy zaczynają akceptować nową równowagę. Nastroje się uspokajają, chociaż pewne żale pozostają.  \n[[C]][[+]]{3} pracowników zyskuje {1:0%} Prędkości Pracy na [[czas:{0}d]]  \n[[C]][[-]]{4} pracowników traci {2:0%} Prędkości Pracy na [[czas:{0}d]]"
ptBR = "A mudança repentina pega a colônia de surpresa, mas com o tempo os trabalhadores começam a aceitar o novo equilíbrio. Os ânimos se acalmam, embora algum ressentimento permaneça.  \n[[C]][[+]]{3} trabalhadores ganham {1:0%} de Velocidade de Trabalho por [[time:{0}d]]  \n[[C]][[-]]{4} trabalhadores perdem {2:0%} de Velocidade de Trabalho por [[time:{0}d]]"
koKR = "갑작스러운 변화는 식민지를 놀라게 하지만 시간이 지나면서 근로자들은 새로운 균형을 받아들이기 시작한다. 감정은 가라앉지만 몇 가지 불만은 여전히 남아 있다.  \n[[C]][[+]]{3}명의 근로자가 [[time:{0}d]] 동안 {1:0%} 작업 속도가 증가합니다.  \n[[C]][[-]]{4}명의 근로자가 [[time:{0}d]] 동안 {2:0%} 작업 속도가 감소합니다."
csCZ = "Náhlá změna zaskočí kolonii, ale během času začínají pracovníci přijímat novou rovnováhu. Hněv opadá, i když některé zášť přetrvává.\n[[C]][[+]]{3} pracovníci získají {1:0%} Rychlost Práce na [[time:{0}d]]\n[[C]][[-]]{4} pracovníci ztratí {2:0%} Rychlost Práce na [[time:{0}d]]"
viVN = "Sự thay đổi đột ngột khiến thuộc địa bị bất ngờ, nhưng theo thời gian, những người lao động bắt đầu chấp nhận sự cân bằng mới. Tâm trạng bình tĩnh lại, mặc dù một số sự oán giận vẫn còn tồn tại.\n[[C]][[+]]{3} công nhân tăng {1:0%} Tốc độ Làm việc trong [[thời gian:{0}d]]\n[[C]][[-]]{4} công nhân giảm {2:0%} Tốc độ Làm việc trong [[thời gian:{0}d]]"

["LV.BCEv.FoodWoodDispute2.O3"]
raw = "Your attempt to reverse course pleases nobody. One side feels abandoned while the other doubts your sincerity. The arguments only grow louder.\n[[C]][[-]]Both {3} and {4} workers lose {1:0%} Working Speed for [[time:{0}d]]"
status = "normal"
enUS = "Your attempt to reverse course pleases nobody. One side feels abandoned while the other doubts your sincerity. The arguments only grow louder.  \n[[C]][[-]]Both {3} and {4} workers lose {1:0%} Working Speed for [[time:{0}d]]"
zhCN = "“你试图改变方向令人失望。一方感到被抛弃，而另一方怀疑你的真诚。争论声愈发激烈。[[C]][[-]]{3}和{4}名工人的工作速度下降{1:0%}，持续时间[[time:{0}d]]”"
zhTW = "你試圖改變方向讓誰都不高興。一方感到被拋棄，而另一方懷疑你的誠意。雙方的論點愈發激烈。  \n[[C]][[-]]{3}和{4}的工人失去{1:0%}的工作速度，持續[[time:{0}d]]。"
ruRU = "Ваше желание изменить курс никого не радует. Одна сторона чувствует себя покинутой, в то время как другая сомневается в вашей искренности. Аргументы становятся только громче.  \n[[C]][[-]]Оба {3} и {4} работника теряют {1:0%} Скорости Работы на [[time:{0}d]]"
jaJP = "あなたの方針転換の試みは誰も喜ばせません。一方は見捨てられたと感じ、もう一方はあなたの誠意を疑っています。議論はますます激化するばかりです。\n[[C]][[-]]{3}と{4}の労働者は、[[time:{0}d]]の間、{1:0%}の作業速度を失います。"
frFR = "Votre tentative de faire demi-tour ne plaît à personne. Un côté se sent abandonné tandis que l'autre doute de votre sincérité. Les arguments ne font que s'intensifier.  \n[[C]][[-]]Les travailleurs {3} et {4} perdent {1:0%} de Vitesse de Travail pendant [[time:{0}j]]"
deDE = "Dein Versuch, die Richtung zu ändern, erfreut niemanden. Die eine Seite fühlt sich verlassen, während die andere an deiner Aufrichtigkeit zweifelt. Die Argumente werden nur lauter. \n[[C]][[-]] Sowohl {3} als auch {4} Arbeiter verlieren {1:0%} Arbeitsgeschwindigkeit für [[time:{0}d]]"
plPL = "Twoja próba zmiany zdania nie cieszy nikogo. Jedna strona czuje się porzucona, podczas gdy druga wątpi w twoją szczerość. Argumenty stają się coraz głośniejsze.  \n[[C]][[-]]Obaj {3} i {4} pracownicy tracą {1:0%} Prędkości Pracy przez [[czas:{0}d]]"
ptBR = "Sua tentativa de voltar atrás não agrada ninguém. Um lado se sente abandonado enquanto o outro duvida da sua sinceridade. Os argumentos só se tornam mais altos. [[C]][[-]] Tanto {3} quanto {4} trabalhadores perdem {1:0%} de Velocidade de Trabalho por [[tempo:{0}d]]"
koKR = "당신의 방향 전환 시도가 아무도 기쁘게 하지 않습니다. 한 쪽은 버림받았다고 느끼고 다른 쪽은 당신의 진정성을 의심합니다. 논쟁은 점점 더 커져만 갑니다.\n[[C]][[-]]{3}과 {4}의 노동자 모두 {1:0%} 작업 속도를 [[time:{0}일]] 잃습니다."
csCZ = "Vaše pokusy o změnu kurzu nikoho netěší. Jedna strana se cítí opuštěná, zatímco druhá dvakrát zpochybňuje vaši upřímnost. Argumenty jen sílí.\n[[C]][[-]]Jak {3}, tak {4} dělníci ztrácí {1:0%} pracovní rychlosti na [[čas:{0}d]]"
viVN = "Nỗ lực đảo ngược của bạn không làm ai hài lòng. Một bên cảm thấy bị bỏ rơi trong khi bên kia nghi ngờ về sự chân thành của bạn. Các tranh luận chỉ ngày càng trở nên ồn ào.  \n[[C]][[-]]Cả {3} và {4} công nhân đều mất {1:0%} Tốc độ Làm việc trong [[thời gian:{0}d]]"

["LV.BCEv.FoodWoodDispute2.O4"]
raw = "At last, exhaustion overcomes anger. The workers slowly realize the quarrel is hurting the colony more than helping it, and cooperation gradually returns.\n[[C]][[+]]Both groups' workers gain {1:0%} Working Speed for [[time:{0}d]]"
status = "normal"
enUS = "At last, exhaustion overcomes anger. The workers slowly realize the quarrel is hurting the colony more than helping it, and cooperation gradually returns.  \n[[C]][[+]]Both groups' workers gain {1:0%} Working Speed for [[time:{0}d]]"
zhCN = "最终，疲惫战胜了愤怒。工人们慢慢意识到争吵对殖民地的伤害大于帮助，合作逐渐恢复。\n[[C]][[+]]双方工人的工作速度提升 {1:0%}，持续时间为 [[time:{0}d]]"
zhTW = "最終，疲憊戰勝了怒火。工人們慢慢意識到爭吵對殖民地的傷害大於幫助，合作逐漸恢復。\n[[C]][[+]]兩組工人的工作速度增加 {1:0%} 持續 [[time:{0}d]]"
ruRU = "Наконец, усталость берет верх над гневом. Рабочие медленно осознают, что ссора вредит колонии больше, чем помогает, и сотрудничество постепенно восстанавливается.  \n[[C]][[+]]Рабочие обеих групп получают {1:0%} Скорость Работы на [[time:{0}д]]"
jaJP = "「ついに、疲労が怒りを打ち負かします。労働者たちは徐々に、この争いがコロニーにとって助けにならず、むしろ害を及ぼしていることに気づき始め、協力が徐々に戻ります。\n[[C]][[+]]両グループの労働者は[[time:{0}d]]の間、{1:0%}の作業速度を得ます。」"
frFR = "Enfin, l'épuisement l'emporte sur la colère. Les travailleurs réalisent lentement que la querelle nuit à la colonie plus qu'elle ne l'aide, et la coopération revient progressivement.  \n[[C]][[+]]Les travailleurs des deux groupes gagnent {1:0%} de Vitesse de Travail pour [[time:{0}d]]"
deDE = "Endlich überwältigt die Erschöpfung die Wut. Die Arbeiter erkennen langsam, dass der Streit der Kolonie mehr schadet als nützt, und die Zusammenarbeit kehrt allmählich zurück.  \n[[C]][[+]]Die Arbeiter beider Gruppen erhalten {1:0%} Arbeitsgeschwindigkeit für [[time:{0}d]]"
plPL = "W końcu wyczerpanie pokonuje gniew. Pracownicy powoli uświadamiają sobie, że kłótnia bardziej szkodzi kolonii niż jej pomaga, a współpraca stopniowo wraca.  \n[[C]][[+]]Pracownicy obu grup zyskują {1:0%} Prędkości Pracy przez [[time:{0}d]]"
ptBR = "Por fim, a exaustão supera a raiva. Os trabalhadores percebem lentamente que a disputa está ferindo a colônia mais do que ajudando, e a cooperação gradualmente retorna.  \n[[C]][[+]]Os trabalhadores de ambos os grupos ganham {1:0%} de Velocidade de Trabalho por [[time:{0}d]]"
koKR = "마침내, 피로가 분노를 이깁니다. 노동자들은 갈등이 식민지에 더 해를 끼치고 도움을 주지 않는다는 것을 천천히 깨닫고, 협력이 점차 회복됩니다.  \n[[C]][[+]]양쪽 그룹의 노동자들은 [[time:{0}d]] 동안 {1:0%} 작업 속도를 얻습니다."
csCZ = "Konečně vyčerpání přemáhá hněv. Pracovníci si pomalu uvědomují, že hádka více škodí kolonii, než jí pomáhá, a spolupráce se postupně vrací.  \n[[C]][[+]]Pracovníci obou skupin získávají {1:0%} Rychlost práce na [[čas:{0}d]]"
viVN = "Cuối cùng, sự kiệt sức vượt qua cơn tức giận. Những người lao động từ từ nhận ra rằng cuộc tranh cãi đang làm tổn hại đến thuộc địa nhiều hơn là giúp đỡ nó, và sự hợp tác dần trở lại.  \n[[C]][[+]]Công nhân của cả hai nhóm có được {1:0%} Tốc độ Làm việc trong [[time:{0}d]]"

["LV.BCEv.FoodWoodDispute2.O5"]
raw = "Without guidance, resentment festers unchecked. Workers from both sides leave the meeting more frustrated than before, blaming the colony leadership for failing to settle the matter.\n[[C]][[-]]Both groups' workers lose {1:0%} Working Speed for [[time:{0}d]]"
status = "normal"
enUS = "Without guidance, resentment festers unchecked. Workers from both sides leave the meeting more frustrated than before, blaming the colony leadership for failing to settle the matter.  \n[[C]][[-]]Both groups' workers lose {1:0%} Working Speed for [[time:{0}d]]"
zhCN = "在没有指导的情况下，怨恨滋生并失控。双方的工人在会议结束时比之前更加沮丧，责怪殖民地领导未能解决此事。  \n[[C]][[-]]两个团体的工人失去 {1:0%} 工作速度，持续 [[time:{0}d]]"
zhTW = "沒有指導的情況下，怨恨無法得到控制。雙方的工人在會議結束後比之前更感沮喪，指責殖民地的領導層無法解決問題。  \n[[C]][[-]]雙方工人的工作速度降低 {1:0%}，持續 [[time:{0}d]]"
ruRU = "Без руководства недовольство разрастается бесконтрольно. Работники с обеих сторон покидают встречу более разочарованными, чем прежде, обвиняя руководство колонии в том, что оно не смогло разрешить данный вопрос.  \n[[C]][[-]]Работники обеих групп теряют {1:0%} скорость работы на [[time:{0}д]]"
jaJP = "指標名: LV.BCEv.FoodWoodDispute2.O5 - 翻訳テキスト: \"指導なしでは、恨みが抑えられずに膨れ上がります。両側の労働者は会議を終えて以前よりも苛立ちを募らせ、問題を解決できなかった植民地の指導部を非難します。  \n[[C]][[-]]両グループの労働者は、[[time:{0}d]]の間{1:0%}の作業速度を失います。\""
frFR = "Sans orientation, le ressentiment grandit sans contrôle. Les travailleurs des deux côtés quittent la réunion plus frustrés qu'auparavant, blâmant la direction de la colonie pour n'avoir pas réglé le problème.  \n[[C]][[-]]Les travailleurs des deux groupes perdent {1:0%} de Vitesse de Travail pendant [[time:{0}j]]"
deDE = "Ohne Anleitung gärtnert Missmut ungehindert. Die Arbeiter beider Seiten verlassen das Treffen frustrierter als zuvor und machen die Kolonieführung dafür verantwortlich, die Angelegenheit nicht geklärt zu haben.  \n[[C]][[-]]Die Arbeiter beider Gruppen verlieren {1:0%} Arbeitsgeschwindigkeit für [[time:{0}d]]"
plPL = "Bez prowadzenia, uraza narasta w niekontrolowany sposób. Pracownicy z obu stron wychodzą z spotkania bardziej sfrustrowani niż przedtem, obwiniając kierownictwo kolonii za niezdolność do załatwienia sprawy.\n[[C]][[-]]Pracownicy obu grup tracą {1:0%} Prędkości Pracy przez [[czas:{0}d]]"
ptBR = "Sem orientação, o ressentimento fermenta sem controle. Trabalhadores de ambos os lados saem da reunião mais frustrados do que antes, culpando a liderança da colônia por não conseguir resolver a questão.  \n[[C]][[-]]Os trabalhadores de ambos os grupos perdem {1:0%} de Velocidade de Trabalho por [[tempo:{0}d]]"
koKR = "지도 없이 불만은 억누르지 못하고 자라난다. 양측의 근로자들은 문제를 해결하지 못한 식민지 리더십을 비난하며 이전보다 더 불만을 안고 회의를 떠난다.  \n[[C]][[-]] 두 그룹의 근로자들은 [[time:{0}d]] 동안 {1:0%} 작업 속도를 잃습니다."
csCZ = "Bez vedení se zášť neomezeně prohlubuje. Pracovníci z obou stran odcházejí z jednání frustrovanější než předtím a obviňují vedení kolonie z neschopnosti vyřešit tuto záležitost.  \n[[C]][[-]]Pracovníci obou skupin ztrácejí {1:0%} pracovní rychlost na [[čas:{0}d]]"
viVN = "Thiếu sự hướng dẫn, sự oán giận tích tụ không kiểm soát. Công nhân từ cả hai bên rời cuộc họp với sự thất vọng hơn trước, đổ lỗi cho lãnh đạo thuộc địa vì đã không giải quyết được vấn đề.\n[[C]][[-]]Công nhân của cả hai nhóm giảm {1:0%} Tốc độ làm việc trong [[thời gian:{0}d]]"

