["LV.BCEv.DroughtPrep.O1"]
raw = "The volunteers return with muddy paws and full barrels. The spring was weak, but not empty.\n[[C]][[+]]Gain [[good:{0}:{1}]]"
status = "normal"
enUS = "The volunteers return with muddy paws and full barrels. The spring was weak, but not empty.\n[[C]][[+]]Gain [[good:{0}:{1}]]"
zhCN = "志愿者带着沾满泥巴的爪子和装满的水桶回来。泉水虽然微弱，但并没有干涸。  \n[[C]][[+]]获得[[good:{0}:{1}]]"
zhTW = "志願者們帶著泥濘的爪子和滿滿的桶回來了。泉水雖然微弱，但並未乾涸。\n[[C]][[+]]獲得[[good:{0}:{1}]]"
ruRU = "Добровольцы возвращаются с грязными лапами и полными бочками. Весна была слабой, но не пустой.  \n[[C]][[+]]Получить [[good:{0}:{1}]]"
jaJP = "ボランティアたちは泥だらけの足で帰ってきて、満杯の樽を持っています。春は弱かったですが、空ではありませんでした。  \n[[C]][[+]]獲得 [[good:{0}:{1}]]"
frFR = "Les volontaires reviennent avec des pattes boueuses et des barils pleins. Le printemps était faible, mais pas vide.  \n[[C]][[+]]Gagner [[good:{0}:{1}]]"
deDE = "Die Freiwilligen kehren mit schmutzigen Pfoten und vollen Fässern zurück. Die Quelle war schwach, aber nicht leer.  \n[[C]][[+]]Erhalte [[gut:{0}:{1}]]"
plPL = "Wolontariusze wracają z błotnistymi łapami i pełnymi beczkami. Wiosna była słaba, ale nie pusta.\n[[C]][[+]]Zyskaj [[dobry:{0}:{1}]]"
ptBR = "Os voluntários retornam com patas enlameadas e barris cheios. A primavera foi fraca, mas não vazia.  \n[[C]][[+]]Ganhe [[bom:{0}:{1}]]"
koKR = "자원봉사자들이 진흙 투성이의 발과 가득 찬 통을 가지고 돌아옵니다. 봄은 약했지만, 비어 있지는 않았습니다.\n[[C]][[+]]획득 [[good:{0}:{1}]]"
csCZ = "Dobrovolníci se vrací s bahnitýma tlapkama a plnými barely. Pramen byl slabý, ale ne prázdný.  \n[[C]][[+]]Získat [[dobré:{0}:{1}]]"
viVN = "Các tình nguyện viên trở về với đôi chân bẩn và những thùng đầy. Mùa xuân rất yếu, nhưng không trống rỗng. [[C]][[+]]Nhận [[tốt:{0}:{1}]]"

["LV.BCEv.DroughtPrep.O4"]
raw = "The volunteers find only damp stones and cracked reeds. Whatever water once pooled there has already sunk away."
status = "normal"
enUS = "The volunteers find only damp stones and cracked reeds. Whatever water once pooled there has already sunk away."
zhCN = "志愿者只找到潮湿的石头和开裂的芦苇。曾经聚集在那里的水已经完全消失。"
zhTW = "志願者們只找到潮濕的石頭和裂開的蘆葦。曾經在那裡積聚的水已經全部消失了。"
ruRU = "Волонтеры находят только влажные камни и треснувшие тростники. Вода, которая когда-то собиралась здесь, уже высохла."
jaJP = "ボランティアたちは湿った石とひび割れた葦しか見つけられなかった。かつてそこにたまっていた水はすでに干上がってしまっている。"
frFR = "Les volontaires ne trouvent que des pierres humides et des roseaux craquelés. L'eau qui avait autrefois formé une mare là-bas s'est déjà évaporée."
deDE = "Die Freiwilligen finden nur feuchte Steine und rissige Schilfrohre. Was auch immer dort einst gesammelt war, ist bereits verschwunden."
plPL = "Wolontariusze znajdują tylko wilgotne kamienie i popękane trzciny. Jakiekolwiek wody, które kiedyś tam się gromadziły, już dawno wsiąkły."
ptBR = "Os voluntários encontram apenas pedras úmidas e juncos rachados. A água que antes se acumulava ali já evaporou."
koKR = "자원 봉사자들은 젖은 돌과 금이 간 갈대만을 발견한다. 한때 그곳에 고인 물은 이미 사라지고 없다."
csCZ = "Dobrovolníci nacházejí pouze vlhké kameny a prasklé rákosí. Jakákoliv voda, která tam kdysi stála, už dávno zmizela."
viVN = "Các tình nguyện viên chỉ tìm thấy những viên đá ẩm ướt và những cây lau nứt nẻ. Bất kỳ lượng nước nào từng tụ lại ở đó đã biến mất."

["LV.BCEv.DroughtPrep.O2"]
raw = "The volunteers return dragging branches, cuttings, and dry timber. The woods offered more than expected.\n[[C]][[+]]Gain [[good:{0}:{1}]]"
status = "normal"
enUS = "The volunteers return dragging branches, cuttings, and dry timber. The woods offered more than expected. [[C]][[+]]Gain [[good:{0}:{1}]]"
zhCN = "志愿者们拖着树枝、插枝和干木材回来了。森林带来了超出预期的收获。  \n[[C]][[+]]获得 [[good:{0}:{1}]]"
zhTW = "志願者拖著樹枝、嫩枝和乾木回來。樹林提供了超乎預期的收穫。  \n[[C]][[+]]獲得 [[good:{0}:{1}]]"
ruRU = "«Волонтеры возвращаются, таща ветви, обрезки и сухую древесину. Лес предложил больше, чем ожидалось.  \n[[C]][[+]]Получите [[good:{0}:{1}]]»"
jaJP = "ボランティアたちは枝、切り株、乾燥した木材を引きずりながら戻ってきました。森は予想以上のものを提供してくれました。  \n[[C]][[+]]獲得 [[good:{0}:{1}]]"
frFR = "Les volontaires reviennent en traînant des branches, des boutures et du bois sec. Les bois ont offert plus que prévu. \n[[C]][[+]]Gagnez [[bon:{0}:{1}]]"
deDE = "Die Freiwilligen kehren zurück und schleppen Zweige, Schnittabfälle und trockenes Holz. Der Wald bot mehr als erwartet. [[C]][[+]]Gewinne [[gut:{0}:{1}]]"
plPL = "Wolontariusze wracają ciągnąc gałęzie, odcinki i suche drewno. Lasy oferowały więcej, niż oczekiwano.  \n[[C]][[+]]Zyskaj [[dobry:{0}:{1}]]"
ptBR = "Os voluntários retornam arrastando galhos, cortes e madeira seca. A floresta ofereceu mais do que o esperado. [[C]][[+]]Ganhar [[bom:{0}:{1}]]"
koKR = "자원봉사자들이 가지, 가지치기, 마른 목재를 끌고 돌아온다. 숲은 예상보다 더 많은 것을 제공했다.  \n[[C]][[+]]획득 [[good:{0}:{1}]]"
csCZ = "Volunteers se vracejí s větvemi, řízky a suchým dřevem. Lesy nabízely více, než se očekávalo. [[C]][[+]]Získat [[good:{0}:{1}]]"
viVN = "Các tình nguyện viên trở về kéo theo những cành cây, nhánh, và gỗ khô. Khu rừng đã cung cấp nhiều hơn mong đợi. [[C]][[+]]Nhận [[good:{0}:{1}]]"

["LV.BCEv.DroughtPrep.O5"]
raw = "The woods are quiet and picked clean. The volunteers return tired, with little more than scratches and burrs."
status = "normal"
enUS = "The woods are quiet and stripped bare. The volunteers return exhausted, with little more than scratches and burrs."
zhCN = "树林静谧，已被搜刮一空。志愿者们带着疲惫归来，身上仅有几道划痕和刺。"
zhTW = "樹林寧靜，已被掏空。志願者們疲憊地回來，身上帶著的只是些許刮痕和刺針。"
ruRU = "Лес тихий и очищен. Волонтеры возвращаются усталыми, с не более чем царапинами и колючками."
jaJP = "森は静まり返り、すっかりきれいにされてしまった。ボランティアたちは疲れ果てて戻ってきたが、傷とウリが少しあるだけだった。"
frFR = "Les bois sont silencieux et dénudés. Les bénévoles rentrent fatigués, avec peu de choses à part des éraflures et des épines."
deDE = "Der Wald ist ruhig und vollständig abgeerntet. Die Freiwilligen kehren erschöpft zurück, mit kaum mehr als Kratzern und Kletten."
plPL = "“Lasy są ciche i ogołocone. Wolontariusze wracają zmęczeni, z niewiele więcej niż zadrapaniami i kolcami.”"
ptBR = "As florestas estão quietas e limpas. Os voluntários voltam cansados, com pouco mais do que arranhões e espinhos."
koKR = "숲은 조용하고 모두 채워졌다. 자원봉사자들은 상처와 가시 외에는 별다른 것 없이 지친 모습으로 돌아온다."
csCZ = "Lesy jsou tiché a vydrancované. Dobrovolníci se vrací unavení, s jen několika škrábanci a trním."
viVN = "Rừng thì yên tĩnh và đã được lượm sạch. Các tình nguyện viên trở về mệt mỏi, chỉ với một chút vết xước và gai."

["LV.BCEv.DroughtPrep.O3"]
raw = "The volunteers come back with baskets of gathered food, enough to make the coming days feel a little less sharp.\n[[C]][[+]]Gain [[good:{0}:{1}]]"
status = "normal"
enUS = "The volunteers come back with baskets of gathered food, enough to make the coming days feel a little less harsh. [[C]][[+]]Gain [[good:{0}:{1}]]"
zhCN = "志愿者们带着装满食物的篮子回来，足够让接下来的日子感觉不那么尖锐。  \n[[C]][[+]]获得 [[good:{0}:{1}]]"
zhTW = "志願者們帶著收集的食物回來，籃子裡裝滿了，可以讓接下來的日子感覺稍微不那麼艱難。  \n[[C]][[+]]獲得 [[good:{0}:{1}]]"
ruRU = "Волонтеры возвращаются с корзинами собранной еды, достаточно, чтобы сделать грядущие дни немного менее тяжелыми. [[C]][[+]]Получите [[good:{0}:{1}]]"
jaJP = "ボランティアたちは集めた食べ物のバスケットを持って戻り、これからの日々が少し楽になるほどの量です。  \n[[C]][[+]]獲得 [[good:{0}:{1}]]"
frFR = "Les bénévoles reviennent avec des paniers de nourriture récoltée, suffisamment pour rendre les jours à venir un peu moins difficiles. [[C]][[+]]Gagner [[bon:{0}:{1}]]"
deDE = "Die Freiwilligen kommen mit Körben voller gesammelter Nahrung zurück, genug, um die kommenden Tage ein wenig weniger hart erscheinen zu lassen. [[C]][[+]]Erhalte [[good:{0}:{1}]]"
plPL = "Wolontariusze wracają z koszami zebranej żywności, wystarczającej, aby nadchodzące dni były nieco mniej ostre.  \n[[C]][[+]]Zyskaj [[dobry:{0}:{1}]]"
ptBR = "Os voluntários voltam com cestas de comida coletada, o suficiente para fazer os próximos dias parecerem um pouco menos agudos.  \n[[C]][[+]]Ganhar [[bom:{0}:{1}]]"
koKR = "자원봉사자들이 모은 음식을 담은 바구니를 들고 돌아옵니다. 오는 날들이 조금 덜 힘들게 느껴질 만큼의 양입니다.  \n[[C]][[+]]획득 [[good:{0}:{1}]]"
csCZ = "Verbíři se vrací s koši nasbíraného jídla, dost na to, aby následující dny byly o něco méně ostré. [[C]][[+]]Získejte [[dobré:{0}:{1}]]"
viVN = "Các tình nguyện viên trở về với những giỏ thực phẩm thu thập được, đủ để làm cho những ngày sắp tới bớt phần chua chát.\n[[C]][[+]]Nhận [[tốt:{0}:{1}]]"

