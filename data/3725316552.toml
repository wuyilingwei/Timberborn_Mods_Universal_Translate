zhTW = "草地已在高溫下枯萎。志願者們只找到幾根乾枯的莖和空蕩的根。"
ruRU = "Лужайка уже завяла под жарой. Добровольцы находят только сухие стебли и пустые корни."
jaJP = "草原はすでに熱のもとで枯れ果ててしまった。ボランティアたちは乾いた茎と空の根しか見つけられなかった。"
frFR = "La prairie a déjà flétri sous la chaleur. Les volontaires ne trouvent que des tiges sèches et des racines vides."
deDE = "Die Wiese ist bereits unter der Hitze verwelkt. Die Freiwilligen finden nur trockene Stängel und leere Wurzeln."
plPL = "Łąka już uschła pod wpływem upału. Wolontariusze znajdują tylko suche łodygi i puste korzenie."
ptBR = "A pradaria já murchou sob o calor. Os voluntários encontram apenas talos secos e raízes vazias."
koKR = "초원은 이미 더위에 시들어 버렸다. 자원봉사자들은 마른 줄기와 빈 뿌리만을 발견한다."
csCZ = "Louka již uschla pod horkem. Dobrovolníci nacházejí pouze suché stonky a prázdné kořeny."
viVN = "Cánh đồng đã héo khô dưới nắng nóng. Những tình nguyện viên chỉ tìm thấy những thân cây khô và rễ trống rỗng."

