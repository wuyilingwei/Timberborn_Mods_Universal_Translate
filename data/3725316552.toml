["LV.BCEv.FirstChildGrowth.Content"]
raw = "{0} has come of age. Yesterday, they chased dragonflies along the bank. Today, they stand ready to take their place among the builders, haulers, growers, and dreamers.\nSome beavers suggest marking the moment with a small feast. It would cost precious resources, but a colony that celebrates its young may find its spirits lifted."
status = "normal"
enUS = "{0} has come of age. Yesterday, they chased dragonflies along the bank. Today, they stand ready to take their place among the builders, haulers, growers, and dreamers. Some beavers suggest marking the moment with a small feast. It would cost precious resources, but a colony that celebrates its young may find its spirits lifted."
zhCN = "{0} 已成年。昨天，他们在河岸边追逐蜻蜓。今天，他们已经准备好在建筑师、搬运工、种植者和梦想家中找到自己的位置。\n一些海狸建议用一场小型盛宴来纪念这个时刻。这将消耗宝贵的资源，但一个庆祝年轻个体的殖民地可能会感到振奋。"
zhTW = "{0} 已經成年了。昨天，他們在河岸邊追逐蜻蜓。今天，他們準備好要成為建設者、搬運工、種植者和夢想家中的一員。\n一些海狸建議用一個小型盛宴來標誌這個時刻。這將耗費珍貴的資源，但一個慶祝其年輕成年的殖民地或許會感到振奮精神。"
ruRU = "{0} достиг совершеннолетия. Вчера они гонялись за стрекозами вдоль берега. Сегодня они готовы занять свое место среди строителей, грузчиков, земледельцев и мечтателей. Некоторые бобры предлагают отметить этот момент небольшим пиром. Это обойдется в драгоценные ресурсы, но колония, которая празднует своих молодых, может почувствовать подъём духа."
jaJP = "「{0}」は成長しました。昨日、彼らは岸辺でトンボを追いかけていました。今日は、彼らは建設者、運搬者、農家、夢見る者たちの仲間としての役割を果たす準備が整いました。\nいくつかのビーバーは、この瞬間を小さな宴で祝うことを提案しています。それには貴重な資源が必要ですが、若者を祝うコロニーは気分が高まるかもしれません。"
frFR = "{0} a atteint l'âge adulte. Hier, ils ont chassé les libellules le long de la rive. Aujourd'hui, ils sont prêts à prendre leur place parmi les bâtisseurs, les transporteurs, les cultivateurs et les rêveurs.  \nCertains castors suggèrent de marquer le moment avec un petit festin. Cela coûterait des ressources précieuses, mais une colonie qui célèbre ses jeunes pourrait voir son moral rehaussé."
deDE = "{0} ist volljährig geworden. Gestern haben sie Libellen am Ufer gejagt. Heute stehen sie bereit, ihren Platz unter den Bauherren, Transporteuren, Erbauern und Träumern einzunehmen. \nEinige Biber schlagen vor, diesen Moment mit einem kleinen Fest zu feiern. Es würde kostbare Ressourcen kosten, aber eine Kolonie, die ihre Jugend feiert, könnte ihren Geist gehoben finden."
plPL = "{0} osiągnął wiek dojrzały. Wczoraj gonił ważki wzdłuż brzegu. Dziś stoi gotowy, by zająć swoje miejsce wśród budowniczych, nosicieli, hodowców i marzycieli.\nNiektórzy bobry sugerują uczczenie tej chwili małą ucztą. Kosztowałoby to cenne zasoby, ale kolonia, która świętuje swoje młode, może poczuć się bardziej podniesiona na duchu."
ptBR = "{0} atingiu a maioridade. Ontem, eles perseguiram libélulas ao longo da margem. Hoje, estão prontos para assumir seu lugar entre os construtores, transportadores, agricultores e sonhadores. Alguns castores sugerem marcar o momento com uma pequena festa. Custaria recursos preciosos, mas uma colônia que celebra seus jovens pode encontrar seus espíritos elevados."
koKR = "{0}가 성년이 되었습니다. 어제, 그들은 강둑을 따라 잠자리를 쫓았습니다. 오늘, 그들은 건설자, 운반자, 재배자, 꿈꾸는 자들 중 한 자리를 차지할 준비가 되어 있습니다.\n몇몇 비버들은 이 순간을 작은 잔치로 기념할 것을 제안합니다. 소중한 자원들이 들어가겠지만, 자신의 젊은이를 축하하는 콜로니는 기분이 한층 고양될 수 있습니다."
csCZ = "{0} dospěl. Včera pronásledoval vážky podél břehu. Dneska je připraven se postavit po bok stavitelů, nosičů, pěstitelů a snílků. Někteří bobři navrhují označit tuto chvíli malou hostinou. Stálo by to cenné zdroje, ale kolonie, která oslavuje své mladé, může najít povzbuzení."
viVN = "{0} đã trưởng thành. Hôm qua, chúng đã đuổi theo những con chuồn chuồn dọc bờ. Hôm nay, chúng sẵn sàng để đứng vào hàng ngũ của những người xây dựng, vận chuyển, trồng trọt và mơ mộng. \nMột số con castor đề nghị đánh dấu khoảnh khắc này bằng một bữa tiệc nhỏ. Nó sẽ tiêu tốn tài nguyên quý giá, nhưng một thuộc địa ăn mừng sự trưởng thành của thế hệ trẻ có thể thấy tinh thần của mình được nâng cao."

