["Building.CompactWaterTurbine.Description"]
raw = "An inline water turbine that generates power from flowing water. Fits perfectly inside narrow 1x1 channels."
status = "normal"
enUS = "An inline water turbine that generates power from flowing water. Fits perfectly inside narrow 1x1 channels."
zhCN = "“一个内置水轮机，能够从流动的水中产生电力。完美适合狭窄的1x1通道。”"
zhTW = "一種內置水輪機，能從流動的水中產生電力。完美適合狹窄的1x1通道內。"
ruRU = "Линейная водяная турбина, которая вырабатывает энергию из текущей воды. Идеально подходит для узких каналов 1x1."
jaJP = "流れる水から電力を生成するインライン水車。狭い1x1のチャネルにぴったり収まります。"
frFR = "Une turbine à eau en ligne qui génère de l'énergie à partir de l'eau courante. S'adapte parfaitement à des canaux étroits de 1x1."
deDE = "Eine Inline-Wasserturbine, die Energie aus fließendem Wasser erzeugt. Passt perfekt in schmale 1x1-Kanäle."
plPL = "Turbina wodna umieszczona w linii, która generuje moc z płynącej wody. Idealnie pasuje do wąskich kanałów 1x1."
ptBR = "Uma turbina d'água em linha que gera energia a partir da água em movimento. Se encaixa perfeitamente dentro de canais estreitos de 1x1."
koKR = "흐르는 물에서 전력을 생성하는 inline 수차. 좁은 1x1 수로에 완벽하게 적합합니다."
csCZ = "Inline vodní turbína, která generuje výkon z tekoucí vody. Perfektně se hodí do úzkých kanálů 1x1."
viVN = "Một tuabin nước lắp đặt thẳng đứng tạo ra năng lượng từ dòng nước. Phù hợp hoàn hảo với các kênh hẹp 1x1."
trTR = "Akın akın akan sudan enerji üreten bir hat içi su türbini. Dar 1x1 kanallara mükemmel bir şekilde uyar."

["Building.CompactWaterTurbine.FlavorDescription"]
raw = "Beavers soon realized that if a pump uses power to move water, water can move a pump to make power."
status = "normal"
enUS = "Beavers soon realized that if a pump uses power to move water, water can move a pump to make power."
zhCN = "“海狸们很快意识到，如果泵使用电力来移动水，那么水也可以推动泵来产生电力。”"
zhTW = "海狸們很快意識到，如果泵需要動力來移動水，那麼水也可以驅動泵來產生電力。"
ruRU = "Бобры вскоре поняли, что если насос использует энергию для перемещения воды, то вода может перемещать насос, чтобы производить энергию."
jaJP = "ビーバーたちはすぐに、ポンプが水を動かすためにエネルギーを使うのなら、水がポンプを動かしてエネルギーを生み出すことができると気づきました。"
frFR = "Les castors ont rapidement réalisé que si une pompe utilise de l'énergie pour déplacer de l'eau, l'eau peut faire bouger une pompe pour produire de l'énergie."
deDE = "Biber erkannten bald, dass wenn eine Pumpe Energie benötigt, um Wasser zu bewegen, Wasser eine Pumpe bewegen kann, um Energie zu erzeugen."
plPL = "Bóbr szybko zdał sobie sprawę, że jeśli pompa używa energii do przesuwania wody, to woda może przesunąć pompę, aby wytworzyć energię."
ptBR = "Os castores logo perceberam que se uma bomba usa energia para mover água, a água pode mover uma bomba para gerar energia."
koKR = "비버들은 곧 펌프가 물을 움직이기 위해 에너지를 사용한다면, 물이 펌프를 움직여 에너지를 만들 수 있다는 사실을 깨달았다."
csCZ = "Bobři brzy zjistili, že pokud čerpadlo používá energii k pohybu vody, může voda pohybovat čerpadlem, aby vyráběla energii."
viVN = "Những con nhím sớm nhận ra rằng nếu một chiếc bơm sử dụng năng lượng để di chuyển nước, thì nước có thể di chuyển một chiếc bơm để tạo ra năng lượng."
trTR = "Kunduzlar, bir pompanın suyu hareket ettirmek için enerji kullandığını fark ettiklerinde, suyun da bir pompayı hareket ettirerek enerji üretebileceğini anladılar."

