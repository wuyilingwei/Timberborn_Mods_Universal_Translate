["Faction.Dragonclaws.Description"]
raw = "Cave-nesting beavers who build with claws, charcoal, scavenged metal, glider routes, warm dens, and dryland crops."
status = "normal"
enUS = "Cave-nesting beavers who build with claws, charcoal, scavenged metal, glider routes, warm dens, and dryland crops."
zhCN = "“生活在洞穴中的海狸，使用爪子、木炭、收集的金属、滑翔路线、温暖的巢穴和旱地作物进行建造。”"
zhTW = "「在洞穴中築巢的海狸，以爪子、木炭、回收的金屬、滑翔路線、溫暖的巢穴和旱地作物來建造。」"
ruRU = "Бобры, гнездящиеся в пещерах, которые строят с помощью когтей, угля, найденных металлов, маршрутов для дельтапланов, теплых логов и наземных культур."
jaJP = "爪で建設し、木炭、再利用した金属、滑空路、暖かい巣穴、乾燥地の作物で生きる洞窟巣作りのビーバー。"
frFR = "Castors de nids dans des grottes qui construisent avec des griffes, du charbon de bois, du métal récupéré, des routes de deltaplane, des terriers chauds et des cultures terrestres."
deDE = "Höhlenbrütende Biber, die mit Klauen, Holzkohle, aufgesammeltem Metall, Gleitrouten, warmen Bauten und Ackerbau auf trockenem Land bauen."
plPL = "Boberzy gniazdujący w jaskiniach, którzy budują za pomocą pazurów, węgla, zbieranego metalu, tras szybowcowych, ciepłych norek i upraw lądowych."
ptBR = "Castores que nidificam em cavernas e constroem com garras, carvão, metal encontrado, rotas de planador, tocas quentes e culturas de terras secas."
koKR = "발톱으로 짓고, 숯과 버려진 금속, 글라이더 경로, 따뜻한 둥지 및 육상의 작물로 살아가는 동굴 둥지를 짓는 비버들."
csCZ = "Veverky hnízdící v jeskyních, které staví s drápy, uhlím, nalezeným kovem, trasami pro kluzáky, teplými doupaty a plodinami z pevniny."
viVN = "Những con rái cá làm tổ trong hang động, xây dựng bằng móng vuốt, than củi, kim loại thu nhặt, tuyến đường lướt, tổ ấm ấm áp và cây trồng trên đất khô."
trTR = "Tırnaklarıyla inşa eden, kömür, hurda metal, kaydırak yolları, sıcak yuvalar ve kara ürünleriyle yaşayan mağara yuvalarındaki kunduzlar."

