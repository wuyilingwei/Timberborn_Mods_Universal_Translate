["Building.ClimbingWall.Description"]
raw = "A rough vertical surface that Dragonclaws use for compact climbing routes."
status = "normal"
enUS = "A rough vertical surface that Dragonclaws use for compact climbing routes."
zhCN = "“龙爪用来进行紧凑攀爬路线的粗糙垂直表面。”"
zhTW = "一個粗糙的垂直表面，龍爪用來作為緊湊的攀爬路線。"
ruRU = "Грубая вертикальная поверхность, которую Драконьи Когти используют для компактных маршрутов лазания."
jaJP = "ドラゴンクローがコンパクトなクライミングルートのために使用する、粗い垂直面。"
frFR = "Une surface verticale rugueuse que les Dragonclaws utilisent pour des itinéraires d'escalade compacts."
deDE = "Eine raue vertikale Oberfläche, die von Dragonclaws für kompakte Kletterrouten verwendet wird."
plPL = "Szorstka, pionowa powierzchnia, którą Dragonclaws wykorzystują do kompaktowych tras wspinaczkowych."
ptBR = "Uma superfície vertical áspera que os Dragonclaws usam para rotas de escalada compactas."
koKR = "드래곤클로가 짧은 등반 경로를 위해 사용하는 거친 수직 면입니다."
csCZ = "Hrubý vertikální povrch, který Dragonclaws používají pro kompaktní výstupy."
viVN = "Một bề mặt thẳng đứng gồ ghề mà Dragonclaws sử dụng để tạo ra các tuyến leo núi chặt chẽ."
trTR = "Ejderha Pençelerinin sıkıştırılmış tırmanma rotaları için kullandığı engebeli dikey yüzey."

["Building.ClimbingWall.FlavorDescription"]
raw = "Claws prefer bark, gouges, and grip-stones to rungs."
status = "normal"
enUS = "Claws prefer bark, gouges, and grip-stones to rungs."
zhCN = "“爪子更喜欢树皮、凹槽和握石，而不是梯子。”"
zhTW = "爪子喜歡樹皮、凹槽和抓握石，而不是梯子。"
ruRU = "Когти предпочитают кору, выемки и захватные камни вместо перекладин."
jaJP = "爪は、は bark、溝、およびグリップストーンを横木より好む。"
frFR = "Les griffes préfèrent l'écorce, les entailles et les pierres d'accroche aux échelons."
deDE = "Krallen ziehen Rinde, Kerben und Greifsteine den Sprossen vor."
plPL = "Szpony wolą korę, zarysowania i kamienie do chwytania zamiast szczebli."
ptBR = "As garras preferem casca, arranhões e pedras de apoio a degraus."
koKR = "발톱은 발판 대신 나무 껍질, 흠집, 그리고 그립 스톤을 선호합니다."
csCZ = "Drápy dávají přednost kůře, rýhám a uchopovacím kamenům před příčkami."
viVN = "Móng vuốt thích vỏ cây, vết xước và đá bám hơn là bậc thang."
trTR = "Tırnaklar, merdivenler yerine kabuk, derin yarıklar ve tutma taşlarını tercih eder."

