["NewGameConfigurationPanel.BobEasyModeDescription"]
status = "normal"
raw = "A tuned Easy mode.\n\nDifficulty: 1/5. No bad tide, full refund, no injury.\n\nSeasons can be slightly more varied in length than Vanilla Easy.\n\nDroughts last 1 to 5 days. (with an early game Handicap.)\n\nTemperate seasons last 15 to 20 days."
enUS = "A tuned Easy mode.\n\nDifficulty: 1/5. No bad tide, full refund, no injury.\n\nSeasons can be slightly more varied in length than Vanilla Easy.\n\nDroughts last 1 to 5 days. (with an early game Handicap.)\n\nTemperate seasons last 15 to 20 days."
zhCN = "“经过调校的简单模式。\n\n难度：1/5。没有坏潮，完全退款，没有受伤。\n\n季节的长度可能比原版简单模式稍微多样化。\n\n干旱持续1到5天。（带有早期游戏的障碍。）\n\n温带季节持续15到20天。”"
zhTW = "調整過的簡單模式。\n\n難度：1/5。沒有壞潮，全面退款，沒有受傷。\n\n季節的長度可能與普通簡單模式略有差異。\n\n乾旱持續1到5天。（伴隨早期遊戲的劣勢。）\n\n溫帶季節持續15到20天。"
ruRU = "Настройка легкого режима.\n\nСложность: 1/5. Нет плохого прилива, полный возврат, отсутствие травм.\n\nСезоны могут быть немного более разнообразными по длине, чем в стандартном легком режиме.\n\nЗасухи длятся от 1 до 5 дней. (с ранним игровым недостатком.)\n\nУмеренные сезоны длятся от 15 до 20 дней."
jaJP = "調整されたイージーモード。\n\n難易度: 1/5。悪潮なし、全額返金、怪我なし。\n\n季節はバニライージーよりも長さがやや異なる場合があります。\n\n干ばつは1日から5日続きます。（序盤のハンディキャップ付き。）\n\n温帯の季節は15日から20日続きます。"
frFR = "Un mode facile ajusté.\n\nDifficulté : 1/5. Pas de marée mauvaise, remboursement total, pas de blessure.\n\nLes saisons peuvent être légèrement plus variées en longueur que le mode facile standard.\n\nLes sécheresses durent de 1 à 5 jours. (avec un handicap en début de jeu.)\n\nLes saisons tempérées durent de 15 à 20 jours."
deDE = "Ein abgestimmter Einfachmodus.\n\nSchwierigkeit: 1/5. Keine schlechten Fluten, volle Rückerstattung, keine Verletzungen.\n\nDie Jahreszeiten können in der Länge leicht variieren im Vergleich zu Vanilla Einfach.\n\nDürreperioden dauern 1 bis 5 Tage. (mit einem Handicap im frühen Spiel.)\n\nGemäßigte Jahreszeiten dauern 15 bis 20 Tage."
plPL = "Dostosowany tryb Łatwy.\n\nTrudność: 1/5. Brak złych przypływów, pełny zwrot, brak obrażeń.\n\nPory roku mogą być nieco bardziej zróżnicowane pod względem długości niż w standardowym trybie Łatwym.\n\nSusze trwają od 1 do 5 dni. (z handicapem w początkowej fazie gry.)\n\nSezony umiarkowane trwają od 15 do 20 dni."
ptBR = "Um modo Fácil ajustado.\n\nDificuldade: 1/5. Sem maré ruim, devolução total, sem ferimentos.\n\nAs estações podem ser ligeiramente mais variadas em duração do que o Fácil Vanilla.\n\nSecas duram de 1 a 5 dias. (com uma desvantagem no início do jogo.)\n\nEstações temperadas duram de 15 a 20 dias."
koKR = "조정된 쉬운 모드입니다.\n\n난이도: 1/5. 나쁜 조수 없음, 전액 환불, 부상 없음.\n\n계절은 일반적인 쉬움 모드보다 길이가 약간 더 다양할 수 있습니다.\n\n가뭄은 1일에서 5일 지속됩니다. (초기 게임 핸디캡 포함.)\n\n온대 계절은 15일에서 20일 지속됩니다."
csCZ = "Nastavený snadný režim.\n\nObtížnost: 1/5. Žádná špatná příliv, plná náhrada, žádné zranění.\n\nRoční období mohou být mírně různorodější v délce než vanilkový snadný režim.\n\nSucha trvají 1 až 5 dní. (s handicapem na začátku hry.)\n\nMírná roční období trvají 15 až 20 dní."
viVN = "Một chế độ Dễ được điều chỉnh.\n\nĐộ khó: 1/5. Không có thủy triều xấu, hoàn tiền đầy đủ, không gây chấn thương.\n\nThời gian các mùa có thể thay đổi một chút so với Dễ Gốc.\n\nThời gian hạn hán kéo dài từ 1 đến 5 ngày. (với một bất lợi trong giai đoạn đầu trò chơi.)\n\nCác mùa ôn đới kéo dài từ 15 đến 20 ngày."
trTR = "Ayarlanmış Kolay mod.\n\nZorluk: 1/5. Kötü gelgit yok, tam iade, yaralanma yok.\n\nMevsimler, Vanilya Kolay moduna göre biraz daha farklı uzunluklarda olabilir.\n\nKuraklıklar 1 ila 5 gün sürer. (erken oyun dezavantajı ile.)\n\nIlıman mevsimler 15 ila 20 gün sürer."

