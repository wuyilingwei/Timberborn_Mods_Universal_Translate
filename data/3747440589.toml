["NewGameConfigurationPanel.BobBalancedModeDescription"]
status = "normal"
raw = "The Seasons are balanced.\n\nDifficulty: 3/5. The first drought can be long like Hard Mode, but you have longer to prepare for it.\n\n50% chance of Bad Tide starting from Cycle 5.\n\nAll seasons last 20 days. (except for early game handicap.)"
enUS = "The Seasons are balanced.\n\nDifficulty: 3/5. The first drought can be long like Hard Mode, but you have longer to prepare for it.\n\n50% chance of Bad Tide starting from Cycle 5.\n\nAll seasons last 20 days. (except for early game handicap.)"
zhCN = "“季节是平衡的。\n\n难度：3/5。第一次干旱可能像困难模式一样漫长，但你有更长的时间来准备。\n\n从第5个周期开始，有50%几率出现恶潮。\n\n所有季节持续20天。（早期游戏的 Handicap 除外。）”"
zhTW = "季節是平衡的。\n\n難度：3/5。第一次乾旱可能像困難模式一樣長，但你有更多時間來準備。\n\n從循環5開始有50%的機率發生壞潮。\n\n所有季節持續20天。（早期遊戲的障礙除外。）"
ruRU = "Сезоны сбалансированы.\n\nСложность: 3/5. Первая засуха может быть длительной, как в Жёстком режиме, но у вас есть больше времени, чтобы подготовиться к ней.\n\n50% вероятность появления Плохого Прилива, начиная с Цикла 5.\n\nВсе сезоны длятся 20 дней. (за исключением начального ограничителя.)"
jaJP = "季節はバランスが取れています。\n\n難易度: 3/5。最初の干魃はハードモードのように長くなる可能性がありますが、その準備期間が長くなります。\n\nサイクル5から悪潮が始まる確率は50%です。\n\nすべての季節は20日間続きます。（ただし、序盤のハンディキャップは除く。）"
frFR = "Les saisons sont équilibrées.\n\nDifficulté : 3/5. La première sécheresse peut être longue comme en mode Difficile, mais vous avez plus de temps pour vous y préparer.\n\n50 % de chance d'une marée mauvaise à partir du Cycle 5.\n\nToutes les saisons durent 20 jours. (sauf pour le handicap de début de jeu.)"
deDE = "Die Jahreszeiten sind ausgewogen.\n\nSchwierigkeit: 3/5. Die erste Dürre kann so lang wie im Schwierigkeitsgrad Schwer sein, aber du hast länger Zeit, dich darauf vorzubereiten.\n\n50% Chance, dass die schlechte Flut ab Zyklus 5 beginnt.\n\nAlle Jahreszeiten dauern 20 Tage. (außer für den Handikap im frühen Spiel.)"
plPL = "Pory roku są zbalansowane.\n\nTrudność: 3/5. Pierwsza susza może być długa jak w Trybie Trudnym, ale masz więcej czasu na przygotowanie się.\n\n50% szans na Złą Fale zaczynając od Cyklu 5.\n\nWszystkie pory roku trwają 20 dni. (z wyjątkiem handicapu na wczesnym etapie gry.)"
ptBR = "As Estações estão equilibradas.\n\nDificuldade: 3/5. A primeira seca pode ser longa como no Modo Difícil, mas você tem mais tempo para se preparar.\n\n50% de chance de Maré Ruim começando a partir do Ciclo 5.\n\nTodas as estações duram 20 dias. (exceto pela penalidade do início do jogo.)"
koKR = "계절이 균형을 이루고 있습니다.\n\n난이도: 3/5. 첫 번째 가뭄은 하드 모드처럼 길 수 있지만, 준비할 시간이 더 많습니다.\n\n사이클 5부터 나쁜 조수가 시작될 확률은 50%입니다.\n\n모든 계절은 20일 지속됩니다. (초기 게임 핸디캡은 제외.)"
csCZ = "Roční období jsou vyvážená.\n\nObtížnost: 3/5. První sucho může trvat dlouho jako v těžkém režimu, ale máte delší čas se na něj připravit.\n\n50% šance na špatný příliv od cyklu 5.\n\nVšechna roční období trvají 20 dní. (kromě výhody v začátku hry.)"
viVN = "Các mùa được cân bằng.\n\nĐộ khó: 3/5. Cơn hạn hán đầu tiên có thể kéo dài như Chế độ Khó, nhưng bạn có nhiều thời gian hơn để chuẩn bị cho nó.\n\nCó 50% cơ hội Thủy triều xấu bắt đầu từ Vòng 5.\n\nTất cả các mùa đều kéo dài 20 ngày. (trừ handicap đầu game.)"
trTR = "Mevsimler dengelidir.\n\nZorluk: 3/5. İlk kuraklık, Zor Mod gibi uzun olabilir, ancak buna hazırlanmak için daha fazla zamanınız var.\n\nDöngü 5'ten itibaren Kötü Gelgitin başlaması için %50 şans.\n\nTüm mevsimler 20 gün sürer. (erken oyun dezavantajı hariç.)"

