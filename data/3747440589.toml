[_meta]
name = "Bobingabout New Game Modes"

["NewGameConfigurationPanel.BobEasy"]
new = "Chill (Bobingabout)"
status = "normal"

["NewGameConfigurationPanel.BobEasyModeDescription"]
new = "A tuned Easy mode.\n\nDifficulty: 1/5. No bad tide, full refund, no injury.\n\nSeasons can be slightly more varied in length than Vanilla Easy.\n\nDroughts last 1 to 5 days. (with an early game Handicap.)\n\nTemperate seasons last 15 to 20 days."
status = "normal"

["NewGameConfigurationPanel.BobPolluted"]
new = "Polluted (Bobingabout)"
status = "normal"

["NewGameConfigurationPanel.BobPollutedModeDescription"]
new = "Badtides are more common.\n\nDifficulty: 3/5. You've settled into an area of heavy pollution.\n\nDroughts and Bad Tides last 10 to 15 days. (with an early game handicap.)\n\nTemperate seasons last 15 to 20 days.\n\n80% chance of bad tide starting from Cycle 4."
status = "normal"

["NewGameConfigurationPanel.BobBalanced"]
new = "Balanced (Bobingabout)"
status = "normal"

["NewGameConfigurationPanel.BobBalancedModeDescription"]
new = "The Seasons are balanced.\n\nDifficulty: 3/5. The first drought can be long like Hard Mode, but you have longer to prepare for it.\n\n50% chance of Bad Tide starting from Cycle 5.\n\nAll seasons last 20 days. (except for early game handicap.)"
status = "normal"

["NewGameConfigurationPanel.BobLong"]
new = "Long (Bobingabout)"
status = "normal"

["NewGameConfigurationPanel.BobLongModeDescription"]
new = "The Seasons are long.\n\nDifficulty: 4/5. Hard mode but longer.\n\nDroughts and Badtides last 50 to 100 days. (with an early game Handicap.)\n\nTemperate seasons last 20 to 30 days.\n\n40% chance of Bad Tides starting from Cycle 3."
status = "normal"

["NewGameConfigurationPanel.BobHard"]
new = "Apocalyptic (Bobingabout)"
status = "normal"

["NewGameConfigurationPanel.BobHardModeDescription"]
new = "Your Beavers had a difficult journey getting here. \n\nDifficulty: 5/5. Your beavers will consume 20% more food and water than normal, no refunds on demolition.\n\nYou start with only 6 adult and 3 child beavers, with barely any food or water.\n\nDroughts and Badtides last 40 to 80 days. (with an early game Handicap.)\n\nTemperate seasons last 4 to 8 days.\n\n50% chance of Bad Tides starting from Cycle 3.\n\nPick a map with plenty of water sources, or you'll have a bad time."
status = "normal"
