["NewGameConfigurationPanel.BobPollutedModeDescription"]
status = "normal"
raw = "Badtides are more common.\n\nDifficulty: 3/5. You've settled into an area of heavy pollution.\n\nDroughts and Bad Tides last 10 to 15 days. (with an early game handicap.)\n\nTemperate seasons last 15 to 20 days.\n\n80% chance of bad tide starting from Cycle 4."
enUS = "Badtides are more common.\n\nDifficulty: 3/5. You've settled into an area of heavy pollution.\n\nDroughts and Bad Tides last 10 to 15 days. (with an early game handicap.)\n\nTemperate seasons last 15 to 20 days.\n\n80% chance of bad tide starting from Cycle 4."
zhCN = "“坏潮更为常见。\n\n难度：3/5。你已定居在一个污染严重的区域。\n\n干旱和坏潮持续10到15天。（有早期游戏的劣势。）\n\n温带季节持续15到20天。\n\n从第4周期开始，坏潮的概率为80%。”"
zhTW = "“壞潮汐會更加常見。\n\n難度：3/5。你已經定居在一個重度污染的區域。\n\n乾旱和壞潮汐持續10到15天。（伴隨著早期遊戲的缺陷。）\n\n溫帶季節持續15到20天。\n\n從循環4開始，壞潮汐的發生機率為80%。”"
ruRU = "Плохие приливы становятся более частыми.\n\nСложность: 3/5. Вы обосновались в районе с сильным загрязнением.\n\nЗасухи и плохие приливы длятся от 10 до 15 дней. (с начальным игровым штрафом.)\n\nУмеренные сезоны длятся от 15 до 20 дней.\n\n80% вероятность плохого прилива, начиная с Цикла 4."
jaJP = "悪潮がより多く発生します。\n\n難易度: 3/5。重度の汚染地域に移住しました。\n\n干ばつと悪潮は10から15日続きます。（序盤のハンデ付き。）\n\n温帯の季節は15から20日持続します。\n\nサイクル4から悪潮が発生する確率は80%です。"
frFR = "Les mauvaises marées sont plus fréquentes.\n\nDifficulté : 3/5. Vous vous êtes installé dans une zone de forte pollution.\n\nLes sécheresses et les mauvaises marées durent de 10 à 15 jours. (avec un handicap en début de partie.)\n\nLes saisons tempérées durent de 15 à 20 jours.\n\n80 % de chances qu'une mauvaise marée commence à partir du Cycle 4."
deDE = "Schlechte Gezeiten sind häufiger.\n\nSchwierigkeit: 3/5. Du hast dich in einem Gebiet mit starker Verschmutzung niedergelassen.\n\nDürrezeiten und schlechte Gezeiten dauern 10 bis 15 Tage. (mit einem Nachteil zu Beginn des Spiels.)\n\nGemäße Jahreszeiten dauern 15 bis 20 Tage.\n\n80% Chance auf schlechte Gezeiten ab Zyklus 4."
plPL = "Bardzo częste są złe przypływy.\n\nTrudność: 3/5. Osiedliłeś się na obszarze silnego zanieczyszczenia.\n\nSusze i złe przypływy trwają od 10 do 15 dni. (z wczesnoszkoleniowym utrudnieniem.)\n\nSezony umiarkowane trwają od 15 do 20 dni.\n\n80% szans na złe przypływy zaczynające się od Cyklu 4."
ptBR = "As marés ruins são mais comuns.\n\nDificuldade: 3/5. Você se estabeleceu em uma área de alta poluição.\n\nSecas e Marés Ruins duram de 10 a 15 dias. (com uma desvantagem no início do jogo.)\n\nAs estações temperadas duram de 15 a 20 dias.\n\n80% de chance de uma maré ruim começando do Ciclo 4."
koKR = "오염된 모드에서는 나쁜 조수가 더 흔합니다.\n\n난이도: 3/5. 당신은 심각한 오염 지역에 정착하였습니다.\n\n가뭄과 나쁜 조수는 10에서 15일 지속됩니다. (초기 게임에서 불리한 점을 감안합니다.)\n\n온대 계절은 15에서 20일 지속됩니다.\n\n사이클 4부터 나쁜 조수가 발생할 확률은 80%입니다."
csCZ = "Badtides jsou častější.\n\nObtížnost: 3/5. Usadili jste se v oblasti s těžkým znečištěním.\n\nSucha a špatné přílivy trvají 10 až 15 dní. (s počátečním handicapem na začátku hry.)\n\nMírné roční období trvá 15 až 20 dní.\n\n80% šance, že špatný příliv začne od cyklu 4."
viVN = "Badtides thường xuyên hơn.\n\nĐộ khó: 3/5. Bạn đã định cư trong một khu vực ô nhiễm nặng.\n\nHạn hán và Badtides kéo dài 10 đến 15 ngày. (với một bất lợi trong giai đoạn đầu trò chơi.)\n\nMùa ôn đới kéo dài 15 đến 20 ngày.\n\nCó 80% khả năng xảy ra bad tide bắt đầu từ Chu kỳ 4."
trTR = "Badtides daha yaygındır.\n\nZorluk: 3/5. Yoğun kirliliğin olduğu bir alana yerleştiniz.\n\nKıtlıklar ve Kötü Gelgitler 10 ile 15 gün sürer. (erken oyunda bir dezavantaj ile.)\n\nIlıman mevsimler 15 ile 20 gün sürer.\n\nDöngü 4'ten itibaren kötü gelgit başlama ihtimali %80."

