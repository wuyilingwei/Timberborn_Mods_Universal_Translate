["NewGameConfigurationPanel.BobLongModeDescription"]
status = "normal"
raw = "The Seasons are long.\n\nDifficulty: 4/5. Hard mode but longer.\n\nDroughts and Badtides last 50 to 100 days. (with an early game Handicap.)\n\nTemperate seasons last 20 to 30 days.\n\n40% chance of Bad Tides starting from Cycle 3."
enUS = "The Seasons are long.\n\nDifficulty: 4/5. Hard mode but longer.\n\nDroughts and Badtides last 50 to 100 days. (with an early game Handicap.)\n\nTemperate seasons last 20 to 30 days.\n\n40% chance of Bad Tides starting from Cycle 3."
zhCN = "季节很长。\n\n难度：4/5。困难模式，但时间更长。\n\n干旱和坏潮持续50到100天。（初期游戏有劣势。）\n\n温带季节持续20到30天。\n\n从第3周期开始，有40%的机会出现坏潮。"
zhTW = "四季漫長。\n\n難度：4/5。困難模式但時間較長。\n\n乾旱和潮水不良持續50至100天。（帶有早期遊戲的殘障。）\n\n溫帶季節持續20至30天。\n\n從第3週期開始有40%機率遭遇不良潮汐。"
ruRU = "Сезоны длинные.\n\nСложность: 4/5. Трудный режим, но дольше.\n\nЗасухи и плохие приливы длятся от 50 до 100 дней. (с начальным Handicap.)\n\nУмеренные сезоны длятся от 20 до 30 дней.\n\n40% шанс начала плохих приливов начиная с Цикла 3."
jaJP = "季節は長いです。\n\n難易度: 4/5。ハードモードですが、長めです。\n\n干ばつと大潮は50日から100日続きます。（初期ゲームハンディキャップあり。）\n\n温帯の季節は20日から30日続きます。\n\nサイクル3から悪潮が始まる確率は40%です。"
frFR = "Les saisons sont longues.\n\nDifficulté : 4/5. Mode difficile mais plus long.\n\nLes sécheresses et les marées mauvaises durent de 50 à 100 jours. (avec un handicap en début de partie.)\n\nLes saisons tempérées durent de 20 à 30 jours.\n\n40 % de chance que des marées mauvaises commencent à partir du Cycle 3."
deDE = "Die Jahreszeiten sind lang.\n\nSchwierigkeitsgrad: 4/5. Harte Mode aber länger.\n\nDürren und schlechte Gezeiten dauern 50 bis 100 Tage. (mit einem Handicap im frühen Spiel.)\n\nGemäßigte Jahreszeiten dauern 20 bis 30 Tage.\n\n40 % Wahrscheinlichkeit, dass schlechte Gezeiten ab Zyklus 3 beginnen."
plPL = "Pory roku są długie.\n\nTrudność: 4/5. Trudny tryb, ale dłuższy.\n\nSusze i złe przypływy trwają od 50 do 100 dni. (z handicapem na początku gry.)\n\nSezony umiarkowane trwają od 20 do 30 dni.\n\n40% szans na złe przypływy, zaczynając od Cyklu 3."
ptBR = "As Estações são longas.\n\nDificuldade: 4/5. Modo difícil, mas mais longo.\n\nSecas e Marés Ruins duram de 50 a 100 dias. (com uma desvantagem no início do jogo.)\n\nEstações temperadas duram de 20 a 30 dias.\n\n40% de chance de Marés Ruins começando a partir do Ciclo 3."
koKR = "계절이 길다.\n\n난이도: 4/5. 하드 모드지만 길어짐.\n\n가뭄과 나쁜 조수는 50에서 100일 지속된다. (초기 게임 핸디캡 포함.)\n\n온대 계절은 20에서 30일 지속된다.\n\n사이클 3부터 나쁜 조수가 시작될 확률은 40%다."
csCZ = "Sezóny jsou dlouhé.\n\nObtížnost: 4/5. Těžký režim, ale delší.\n\nSucha a špatné přílivy trvají 50 až 100 dní. (s handicapem v rané hře.)\n\nMírné sezóny trvají 20 až 30 dní.\n\n40% šance na špatné přílivy od cyklu 3."
viVN = "Mùa là dài.\n\nĐộ khó: 4/5. Chế độ khó nhưng dài hơn.\n\nHạn hán và Thủy Triều Xấu kéo dài từ 50 đến 100 ngày. (với một bất lợi trong giai đoạn đầu trò chơi.)\n\nMùa ôn đới kéo dài từ 20 đến 30 ngày.\n\nCó 40% cơ hội Thủy Triều Xấu bắt đầu từ Chu kỳ 3."
trTR = "Mevsimler uzun.\n\nZorluk: 4/5. Zor mod ama daha uzun.\n\nKuraklıklar ve Kötü Gelgitler 50 ila 100 gün sürer. (erken oyunda bir dezavantaj ile.)\n\nIlıman mevsimler 20 ila 30 gün sürer.\n\nDöngü 3'ten itibaren Kötü Gelgitlerin başlaması için %40 şans."

