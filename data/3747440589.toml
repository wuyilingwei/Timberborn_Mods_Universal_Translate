["NewGameConfigurationPanel.BobHardModeDescription"]
status = "normal"
raw = "Your Beavers had a difficult journey getting here. \n\nDifficulty: 5/5. Your beavers will consume 20% more food and water than normal, no refunds on demolition.\n\nYou start with only 6 adult and 3 child beavers, with barely any food or water.\n\nDroughts and Badtides last 40 to 80 days. (with an early game Handicap.)\n\nTemperate seasons last 4 to 8 days.\n\n50% chance of Bad Tides starting from Cycle 3.\n\nPick a map with plenty of water sources, or you'll have a bad time."
enUS = "Your Beavers had a difficult journey getting here.\n\nDifficulty: 5/5. Your beavers will consume 20% more food and water than normal, no refunds on demolition.\n\nYou start with only 6 adult and 3 child beavers, with barely any food or water.\n\nDroughts and Badtides last 40 to 80 days. (with an early game Handicap.)\n\nTemperate seasons last 4 to 8 days.\n\n50% chance of Bad Tides starting from Cycle 3.\n\nPick a map with plenty of water sources, or you'll have a bad time."
zhCN = "你的海狸在到达这里的路上经历了艰难的旅程。\n\n难度：5/5。你的海狸将比正常情况消耗多20%的食物和水，拆除没有退款。\n\n你只从6只成年海狸和3只幼海狸开始，几乎没有任何食物或水。\n\n干旱和坏潮持续40到80天。（并附带早期游戏的残障。）\n\n温带季节持续4到8天。\n\n从第3周期开始，有50%的概率会出现坏潮。\n\n选择一个有丰富水源的地图，否则你将遭遇困难。"
zhTW = "你的海狸們經歷了一段艱難的旅程才來到這裡。\n\n難度：5/5。你的海狸將比正常情況下消耗多 20% 的食物和水，拆除不退費。\n\n你只有 6 隻成年海狸和 3 隻幼海狸，食物和水源幾乎不夠。\n\n乾旱和壞潮會持續 40 到 80 天。（包含早期遊戲的障礙。）\n\n溫帶季節持續 4 到 8 天。\n\n從第 3 週期開始有 50% 的機會發生壞潮。\n\n選擇一個水源充足的地圖，否則你會過得很糟。"
ruRU = "Ваши бобры проделали тяжелый путь, чтобы добраться сюда.\n\nСложность: 5/5. Ваши бобры будут потреблять на 20% больше еды и воды, чем обычно, возврат средств за снос не предусмотрен.\n\nВы начинаете с только 6 взрослых и 3 детенышей бобров, с почти никаким запасом еды или воды.\n\nЗасухи и плохие приливы длятся от 40 до 80 дней. (с начальным штрафом в игре.)\n\nУмеренные сезоны длятся от 4 до 8 дней.\n\n50% вероятность плохих приливов, начиная с цикла 3.\n\nВыберите карту с множеством источников воды, иначе вам будет плохо."
jaJP = "あなたのビーバーたちはここに来るまで厳しい旅をしてきました。\n\n難易度: 5/5。あなたのビーバーは通常より20%多くの食糧と水を消費し、解体には払い戻しがありません。\n\nあなたは成人6匹と子供3匹のビーバーだけで始まり、ほとんど食糧や水がありません。\n\n干ばつと悪潮は40日から80日続きます。（初期ゲームのハンディキャップがあります。）\n\n温帯の季節は4日から8日続きます。\n\nサイクル3から悪潮が始まる確率は50%です。\n\n水源がたくさんあるマップを選んでください、さもなくば苦しい時を過ごすことになります。"
frFR = "Vos castors ont eu un voyage difficile pour arriver ici.\n\nDifficulté : 5/5. Vos castors consommeront 20 % de nourriture et d'eau en plus que la normale, pas de remboursement pour la démolition.\n\nVous commencez avec seulement 6 castors adultes et 3 jeunes, avec à peine de la nourriture ou de l'eau.\n\nLes sécheresses et les marées rouges durent de 40 à 80 jours. (avec un handicap en début de partie.)\n\nLes saisons tempérées durent de 4 à 8 jours.\n\n50 % de chances de marées rouges à partir du cycle 3.\n\nChoisissez une carte avec de nombreuses sources d'eau, sinon vous aurez du mal."
deDE = "Deine Biber hatten eine schwierige Reise, um hierher zu gelangen. \n\nSchwierigkeit: 5/5. Deine Biber werden 20% mehr Nahrung und Wasser verbrauchen als üblich, keine Rückerstattungen bei Abriss.\n\nDu startest mit nur 6 erwachsenen und 3 jungen Bibern, mit kaum Nahrung oder Wasser.\n\nDürreperioden und schlechte Gezeiten dauern 40 bis 80 Tage. (mit einem Handicap im frühen Spielverlauf.)\n\nGemäßigte Jahreszeiten dauern 4 bis 8 Tage.\n\n50% Chance auf schlechte Gezeiten ab Zyklus 3.\n\nWähle eine Karte mit vielen Wasserquellen, sonst wirst du Probleme haben."
plPL = "Twoje bobry miały trudną podróż, aby tu dotrzeć.\n\nTrudność: 5/5. Twoje bobry będą konsumować o 20% więcej jedzenia i wody niż normalnie, brak zwrotów za wyburzenia.\n\nZaczynasz tylko z 6 dorosłymi i 3 młodymi bobrami, z ledwie jakąkolwiek żywnością lub wodą.\n\nSusze i Złe Plywy trwają od 40 do 80 dni. (z handicapem wczesnej gry).\n\nSezony umiarkowane trwają od 4 do 8 dni.\n\n50% szans na Złe Plywy zaczynające się od Cyklu 3.\n\nWybierz mapę z dużą ilością źródeł wody, inaczej czeka cię zły czas."
ptBR = "Seus Castores tiveram uma jornada difícil para chegar aqui.\n\nDificuldade: 5/5. Seus castores consumir 20% mais comida e água do que o normal, sem reembolsos por demolição.\n\nVocê começa com apenas 6 castores adultos e 3 castores filhotes, com quase nenhuma comida ou água.\n\nSecas e Marés Ruins duram de 40 a 80 dias. (com uma desvantagem no início do jogo.)\n\nAs estações temperadas duram de 4 a 8 dias.\n\n50% de chance de Marés Ruins começarem a partir do Ciclo 3.\n\nEscolha um mapa com muitas fontes de água, ou você terá um péssimo tempo."
koKR = "너의 비버들은 여기 오기 위해 힘든 여정을 겪었다.\n\n난이도: 5/5. 너의 비버들은 일반보다 20% 더 많은 음식과 물을 소비하며, 해체에 대한 환불은 없다.\n\n너는 성인 비버 6마리와 어린 비버 3마리만으로 시작하며, 음식이나 물이 거의 없다.\n\n가뭄과 나쁜 조수는 40일에서 80일 지속된다. (초기 게임 장애因素 포함)\n\n온대 계절은 4일에서 8일 동안 지속된다.\n\n사이클 3부터 나쁜 조수가 시작될 확률은 50%이다.\n\n많은 수원지가 있는 지도를 선택하라, 그렇지 않으면 힘든 시간을 보낼 것이다."
csCZ = "Vaši bobři měli obtížnou cestu, aby se sem dostali.\n\nObtížnost: 5/5. Vaši bobři budou spotřebovávat o 20 % více jídla a vody než obvykle, žádné vrácení peněz za demoliční práce.\n\nZačínáte pouze se 6 dospělými a 3 mladými bobry, sotva s nějakým jídlem nebo vodou.\n\nSucha a špatné přílivy trvají 40 až 80 dní. (s handicapem na začátku hry.)\n\nMírné sezóny trvají 4 až 8 dní.\n\n50% šance na špatné přílivy začínající od cyklu 3.\n\nVyberte si mapu s dostatkem vodních zdrojů, jinak si užijete špatný čas."
viVN = "Những con nhím của bạn đã có một hành trình khó khăn để đến đây.\n\nĐộ khó: 5/5. Những con nhím của bạn sẽ tiêu tốn nhiều thức ăn và nước hơn 20% so với bình thường, không hoàn phí khi phá hủy.\n\nBạn bắt đầu chỉ với 6 con nhím trưởng thành và 3 con nhím con, với gần như không có thức ăn hay nước.\n\nHạn hán và thủy triều xấu kéo dài từ 40 đến 80 ngày. (với một bất lợi trong giai đoạn đầu trò chơi.)\n\nCác mùa ôn hòa kéo dài từ 4 đến 8 ngày.\n\nCơ hội 50% xuất hiện thủy triều xấu bắt đầu từ Chu kỳ 3.\n\nChọn một bản đồ với nhiều nguồn nước, nếu không bạn sẽ gặp rắc rối."
trTR = "Beaverlarınız buraya ulaşmak için zor bir yolculuk yaptı.\n\nZorluk: 5/5. Beaverlarınız normalden %20 daha fazla yiyecek ve su tüketecek, yıkımdan geri dönüş yok.\n\nSadece 6 yetişkin ve 3 çocuk beaver ile başlıyorsunuz, neredeyse hiç yiyecek veya su yok.\n\nKuraklık ve Kötü Gelgitler 40 ila 80 gün sürer. (erken oyun Handikapı ile.)\n\nIlıman mevsimler 4 ila 8 gün sürer.\n\nDöngü 3'ten itibaren Kötü Gelgitlerin başlaması için %50 şans.\n\nBol su kaynağı olan bir harita seçin, yoksa zor bir dönem geçireceksiniz."
