["Grauschweif.Building.FloatDispatcher.Description"]
raw = "A simple contraption. WORK-IN-PROGRESS will slowly add inventory need and make it connect to district, floodable, etc.."
status = "normal"
enUS = "A simple contraption. WORK-IN-PROGRESS will slowly add inventory needs and make it connect to district, floodable, etc.."
zhCN = "一个简单的装置。正在进展中，稍后将加入库存需求，并使其连接到区域、可淹没等。"
zhTW = "一個簡單的裝置。正在開發中，將慢慢增加庫存需求並使其連接到區域、可淹沒等。"
ruRU = "Простая конструкция. В РАБОТЕ будет постепенно добавлено требование к инвентарю и сделано подключение к району, затоплению и т.д."
jaJP = "簡単な装置です。進行中の作業では、徐々に必要な在庫が追加され、地区に接続され、洪水の影響を受けるようになります。"
frFR = "Une simple machine. EN COURS D'ELABORATION ajoutera progressivement les besoins en inventaire et le relié au district, inondable, etc.."
deDE = "Eine einfache Vorrichtung. ARBEIT IM GANGE wird langsam den Bedarf an Inventar hinzufügen und es mit dem Distrikt, Überflutungen usw. verbinden."
plPL = "Prosta konstrukcja. W TRAKCIE PRAC będzie stopniowo dodawane zapotrzebowanie na zapasy i umożliwi połączenie z dzielnicą, zalewalnością itp.."
ptBR = "Uma simples máquina. O TRABALHO EM ANDAMENTO lentamente adicionará a necessidade de inventário e fará a conexão com o distrito, inundável, etc."
koKR = "단순한 장치입니다. 진행 중인 작업으로 재고 필요성이 서서히 추가되고 구역, 침수 가능성 등과 연결됩니다."
csCZ = "Jednoduchý stroj. PRÁCE V PROGRESSU postupně přidá potřeby pro inventář a propojí jej s oblastí, zaplavitelný atd."
viVN = "Một cơ cấu đơn giản. ĐANG TRONG QUÁ TRÌNH PHÁT TRIỂN sẽ từ từ thêm nhu cầu tồn kho và kết nối nó với quận, có thể bị ngập nước, v.v..."

