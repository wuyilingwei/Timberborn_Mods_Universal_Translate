["Keystone.Settings.UI.BiomeOverlayOpacity.Tooltip"]
raw = "How opaque the biome overlay boxes appear when the overlay is active. 25% lets the terrain show through clearly, 100% is fully opaque. Default 75%."
status = "normal"
enUS = "How opaque the biome overlay boxes appear when the overlay is active. 25% lets the terrain show through clearly, 100% is fully opaque. Default 75%."
zhCN = "生物群落覆盖图层激活时，生物群落覆盖框的透明度。25%时可以清晰看到地形，100%时完全不透明。默认值为75%。"
zhTW = "當覆蓋層激活時，生物群落覆蓋框的透明度。25% 讓地形清晰可見，100% 則完全不透明。默認為 75%."
ruRU = "Непрозрачность оверлея биома, когда оверлей активен. 25% позволяет четко видеть рельеф, 100% - полностью непрозрачно. По умолчанию 75%."
jaJP = "「オーバーレイがアクティブなときにバイオームオーバーレイボックスがどのくらい不透明に表示されるか。25%は地形がはっきりと見え、100%は完全に不透明です。デフォルトは75%です。」"
frFR = "Opacité des boîtes de superposition de biome lorsque la superposition est active. 25 % permet au terrain de bien transparaître, 100 % est totalement opaque. Par défaut 75 %."
deDE = "Wie undurchsichtig die Biome-Overlay-Boxen erscheinen, wenn das Overlay aktiviert ist. 25% lassen das Terrain deutlich durchscheinen, 100% ist vollständig undurchsichtig. Standard 75%."
plPL = "Jak nieprzezroczyste są pola nakładki biomu, gdy nakładka jest aktywna. 25% pozwala wyraźnie zobaczyć teren, 100% jest całkowicie nieprzezroczyste. Domyślnie 75%."
ptBR = "Quão opacas as caixas de sobreposição de bioma aparecem quando a sobreposição está ativa. 25% permite que o terreno apareça claramente, 100% é totalmente opaco. Padrão 75%."
koKR = "오버레이가 활성화될 때 생물군계 오버레이 상자가 얼마나 불투명하게 보이는지. 25%는 지형이 명확하게 보이고, 100%는 완전히 불투명합니다. 기본값은 75%입니다."
csCZ = "Jak neprůhledné se zdají boxy biomového překryvu, když je překryv aktivní. 25 % umožňuje jasně procházet terénu, 100 % je zcela neprůhledné. Výchozí 75 %."
viVN = "Độ mờ của các hộp overlay sinh thái khi overlay đang hoạt động. 25% cho phép địa hình hiển thị rõ ràng, 100% là hoàn toàn không trong suốt. Mặc định 75%."

