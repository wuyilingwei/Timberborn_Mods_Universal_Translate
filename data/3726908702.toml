["Keystone.Settings.Flora.ClassBDensity.Tooltip"]
raw = "How many small plants — flowers, ferns, cattails, and the like — appear in each biome.\n\n0% removes them entirely.\n100% is the default amount.\n200% doubles the amount.\n\nThese plants are most of what makes Keystone visible on the map — at 0% the ecology still runs, but you won't see much of it.\n\nLower this if your computer struggles on foliage-heavy maps."
status = "normal"
enUS = "How many small plants — flowers, ferns, cattails, and the like — appear in each biome.\n\n0% removes them entirely.\n100% is the default amount.\n200% doubles the amount.\n\nThese plants are most of what makes Keystone visible on the map — at 0% the ecology still runs, but you won't see much of it.\n\nLower this if your computer struggles on foliage-heavy maps."
zhCN = "每个生态系统中会出现多少小植物 — 花朵、蕨类植物、香蒲等。\n\n0% 完全移除它们。\n100% 是默认数量。\n200% 是数量的两倍。\n\n这些植物是“基石”在地图上可见性的主要来源 — 在 0% 时生态系统仍然运行，但你不会看到太多。\n\n如果你的电脑在植物密集的地图上运行困难，可以降低这个数值。"
zhTW = "每個生態區域中出現多少小植物——花卉、蕨類植物、香蒲等。\n\n0% 完全移除它們。\n100% 是預設數量。\n200% 是數量的兩倍。\n\n這些植物是使 Keystone 在地圖上可見的主要元素——在 0% 時生態系統仍然運行，但你不會看到太多。\n\n如果你的電腦在植物繁茂的地圖上運行困難，可以降低此數值。"
ruRU = "Сколько мелких растений — цветов, папоротников, камыша и аналогичных — появляется в каждом биоме.\n\n0% полностью удаляет их.\n100% — это стандартное количество.\n200% удваивает количество.\n\nЭти растения составляют большую часть того, что делает Keystone видимым на карте — при 0% экология всё ещё функционирует, но вы не увидите её много.\n\nСнижайте это значение, если вашему компьютеру трудно справляться с картами с густой растительностью."
jaJP = "各バイオームに出現する小さな植物（花、シダ、ガマなど）の数。\n\n0%は完全に除去します。\n100%は標準の量です。\n200%はその量を倍増します。\n\nこれらの植物は、Keystoneがマップ上で視認できる主な要素です。0%にすると生態系は依然として機能しますが、大部分は視認できなくなります。\n\n葉が密なマップでコンピュータが苦しむようであれば、この値を下げてください。"
frFR = "Combien de petites plantes — fleurs, fougères, massettes, et similaires — apparaissent dans chaque biome.\n\n0 % les supprime entièrement.\n100 % est la quantité par défaut.\n200 % double la quantité.\n\nCes plantes constituent la majeure partie de ce qui rend Keystone visible sur la carte — à 0 %, l'écologie fonctionne toujours, mais vous n'en verrez pas beaucoup.\n\nAbaissez ce paramètre si votre ordinateur a du mal sur les cartes riches en feuillage."
deDE = "Wie viele kleine Pflanzen — Blumen, Farne, Schilfrohre und dergleichen — in jedem Biom erscheinen.\n\n0 % entfernt sie vollständig.\n100 % ist die Standardmenge.\n200 % verdoppelt die Menge.\n\nDiese Pflanzen sind das, was Keystone auf der Karte am sichtbarsten macht — bei 0 % läuft die Ökologie weiterhin, aber man sieht nicht viel davon.\n\nVerringern Sie diesen Wert, wenn Ihr Computer bei karthängigen Karten Schwierigkeiten hat."
plPL = "Ilość małych roślin — kwiatów, paproci, trzciny i tym podobnych — które pojawiają się w każdym biomie.\n\n0% całkowicie je usuwa.\n100% to domyślna ilość.\n200% podwaja ilość.\n\nTe rośliny stanowią większość tego, co sprawia, że Keystone jest widoczny na mapie — przy 0% ekologia nadal działa, ale nie zobaczysz jej zbyt wiele.\n\nZmniejsz tę wartość, jeśli twój komputer ma problemy na mapach o gęstej roślinności."
ptBR = "Quantas pequenas plantas — flores, samambaias, espada-de-são-jorge e similares — aparecem em cada bioma.\n\n0% remove-as completamente.\n100% é a quantidade padrão.\n200% dobra a quantidade.\n\nEssas plantas são a maior parte do que torna Keystone visível no mapa — a 0% a ecologia ainda funciona, mas você não verá muito disso.\n\nReduza isso se o seu computador tiver dificuldades em mapas com muita folhagem."
koKR = "각 생물군계에서 나타나는 작은 식물(꽃, 양치식물, 골풀 등)의 수입니다.\n\n0%는 완전히 제거합니다.\n100%는 기본 양입니다.\n200%는 양을 두 배로 늘립니다.\n\n이 식물들은 키스톤이 지도에서 보이게 만드는 주요 요소입니다. 0%에서는 생태계가 여전히 작동하지만 그 모습을 많이 볼 수는 없습니다.\n\n잎사귀가 많은 지도에서 컴퓨터 성능이 저하된다면 이 수치를 낮추세요."
csCZ = "Kolik malých rostlin - květin, kapradin, orobince a podobně - se objeví v každém biome.\n\n0 % je úplně odstraní.\n100 % je výchozí množství.\n200 % zdvojnásobí množství.\n\nTyto rostliny jsou většinou tím, co činí Keystone viditelným na mapě - při 0 % ekologie stále funguje, ale neuvidíte toho moc.\n\nSnižte toto, pokud se váš počítač potýká s mapami bohatými na listí."
viVN = "Số lượng cây nhỏ — hoa, dương xỉ, cây cỏ lác và những cây tương tự — xuất hiện trong mỗi sinh cảnh.\n\n0% loại bỏ hoàn toàn.\n100% là lượng mặc định.\n200% gấp đôi số lượng.\n\nNhững cây này là phần lớn tạo nên sự hiện diện của Keystone trên bản đồ — ở mức 0% hệ sinh thái vẫn hoạt động, nhưng bạn sẽ không thấy nhiều.\n\nGiảm mức này nếu máy tính của bạn gặp khó khăn trên các bản đồ có nhiều lá cây."

