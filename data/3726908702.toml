["Tool.Keystone.Logging.Description"]
raw = "Drag over an area to mark its trees for cutting — set the percentage below to choose how many: 100% clear-cuts the selected tree types, less thins them, marking roughly that fraction at random and leaving the rest standing. Re-drag the same area to roll a different mix. Trees are still felled by your foresters through the normal cutting queue."
status = "normal"
enUS = "Drag over an area to mark its trees for cutting — set the percentage below to choose how many: 100% clear-cuts the selected tree types, less thins them, marking roughly that fraction at random and leaving the rest standing. Re-drag the same area to roll a different mix. Trees are still felled by your foresters through the normal cutting queue."
zhCN = "“在区域上拖动以标记要砍伐的树木 — 设置下面的百分比以选择砍伐数量：100% 清除所选树种，较少的则会随机标记大约该比例的树木，留下其余树木。重新拖动相同区域以生成不同的组合。树木仍然通过您的伐木工按照正常的砍伐队列被砍倒。”"
zhTW = "拖動區域以標記其樹木進行砍伐 - 設定下方的百分比以選擇砍伐數量：100% 砍伐所選樹種，較低的百分比則會隨機標記相應比例的樹木，其餘則保持不變。再次拖動相同區域以獲得不同的組合。樹木仍然會通過正常的砍伐排隊由樵夫進行砍伐。"
ruRU = "Перетащите по области, чтобы пометить деревья для вырубки — установите процент ниже, чтобы выбрать, сколько: 100% ведет к полному вырубанию выбранных типов деревьев, менее — вырубает выборочно, помечая примерно эту долю случайным образом и оставляя остальные стоять. Повторно перетащите ту же область, чтобы получить другую комбинацию. Деревья по-прежнему валят ваши лесорубы через обычную очередь на вырубку."
jaJP = "エリアをドラッグして、その木を伐採用にマークします — 下のパーセンテージを設定して、伐採する本数を選択してください：100％は選択した木の種類を根こそぎ伐採し、それ以下は間引きを行い、ランダムにその割合の木をマークし、残りの木はそのまま残します。同じエリアを再度ドラッグすると、異なるミックスが生成されます。木は依然として通常の伐採キューを通じてあなたのフォレスターによって伐採されます。"
frFR = "Faites glisser sur une zone pour marquer ses arbres pour la coupe — réglez le pourcentage ci-dessous pour choisir combien : 100 % abattent les types d'arbres sélectionnés, moins les éclaircit, marquant à peu près cette fraction au hasard et laissant le reste debout. Faites glisser à nouveau la même zone pour obtenir un mélange différent. Les arbres sont toujours abattus par vos bûcherons via la file d'attente de coupe normale."
deDE = "Ziehen Sie über ein Gebiet, um dessen Bäume zum Fällen zu markieren – stellen Sie den Prozentsatz unten ein, um zu wählen, wie viele: 100 % roden die ausgewählten Baumarten, weniger dünnen sie aus, indem sie grob diesen Bruchteil zufällig markieren und den Rest stehen lassen. Ziehen Sie das gleiche Gebiet erneut, um eine andere Mischung zu erzeugen. Bäume werden weiterhin von Ihren Waldarbeitern über die normale Fällreihenfolge gefällt."
plPL = "Przeciągnij nad obszarem, aby oznaczyć jego drzewa do wycinki — ustaw procent poniżej, aby wybrać, ile: 100% wycina wybrane rodzaje drzew, mniej to przerzedza, oznaczając mniej więcej tę frakcję losowo, pozostawiając resztę stojącą. Przeciągnij ponownie ten sam obszar, aby uzyskać inny mix. Drzewa są nadal wycinane przez twoich leśników w normalnej kolejce wycinki."
ptBR = "Arraste sobre uma área para marcar suas árvores para corte — defina a porcentagem abaixo para escolher quantas: 100% desmata os tipos de árvore selecionados, menos clareia, marcando aproximadamente essa fração aleatoriamente e deixando o restante em pé. Arraste novamente a mesma área para gerar uma mistura diferente. As árvores ainda são cortadas pelos seus madeireiros através da fila de corte normal."
koKR = "영역을 드래그하여 그 안의 나무들을 벌목 대상으로 표시하세요 — 아래 비율을 설정하여 얼마나 많은 나무를 선택할지 정하세요: 100%는 선택한 나무 유형을 전부 베어내고, 그보다 적은 비율은 대략 랜덤으로 해당 비율만큼 나무를 표기하고 나머지는 남겨둡니다. 같은 영역을 다시 드래그하여 다른 조합을 선택하세요. 나무들은 여전히 일반 벌목 대기열을 통해 관리자가 베어냅니다."
csCZ = "Tažením přes oblast označte její stromy k pokácení — nastavte procento níže, abyste si zvolili, kolik: 100% vykácení vybraných typů stromů, méně je prořezává, přičemž zhruba tuto část náhodně označuje a zbytek nechává stát. Znovu táhněte stejnou oblast, abyste vytvořili jinou kombinaci. Stromy stále kácí vaši dřevaři prostřednictvím běžného pořadí kácení."
viVN = "Kéo qua một khu vực để đánh dấu các cây của nó để chặt – đặt tỷ lệ phần trăm bên dưới để chọn số lượng: 100% chặt sạch các loại cây đã chọn, ít hơn thì làm thưa ra, đánh dấu khoảng tỷ lệ đó một cách ngẫu nhiên và để lại phần còn lại đứng vững. Kéo lại khu vực đó để tạo ra sự kết hợp khác. Cây vẫn được chặt bởi những người làm rừng của bạn thông qua danh sách chặt bình thường."

