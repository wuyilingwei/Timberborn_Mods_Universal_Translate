["Tool.Keystone.Particle.Description"]
raw = "Spawns a Class A decoration carrying a Unity ParticleSystem. Passive (no ecology reactivity, no interaction) -- demonstrates the same registry can host non-mesh decorations like atmospheric effects."
status = "normal"
enUS = "Spawns a Class A decoration carrying a Unity ParticleSystem. Passive (no ecology reactivity, no interaction) -- demonstrates the same registry can host non-mesh decorations like atmospheric effects."
zhCN = "生成一个携带Unity ParticleSystem的A级装饰。被动（没有生态反应，没有交互）-- 演示相同的注册可以承载非网格装饰，如大气效果。"
zhTW = "產生一個攜帶 Unity ParticleSystem 的 A 級裝飾。被動（沒有生態反應，沒有互動）-- 演示同一註冊可以容納非網格裝飾，例如大氣效果。"
ruRU = "Создает декорацию класса A с системой частиц Unity. Пассивно (нет взаимосвязи с экологией, нет взаимодействия) -- демонстрирует, что одна и та же реестр может содержать немешаные декорации, такие как атмосферные эффекты."
jaJP = "「Unity ParticleSystemを搭載したクラスA装飾を生成します。受動的（生態的反応なし、相互作用なし） -- 同じレジストリが大気効果のような非メッシュ装飾をホストできることを示します。」"
frFR = "Génère une décoration de classe A portant un système de particules Unity. Passif (pas de réactivité écologique, pas d'interaction) -- démontre que le même registre peut héberger des décorations non maillées comme des effets atmosphériques."
deDE = "Erzeugt eine Dekoration der Klasse A, die ein Unity ParticleSystem trägt. Passiv (keine ökologischen Reaktionen, keine Interaktion) -- zeigt, dass das gleiche Register nicht-mesh Dekorationen wie atmosphärische Effekte hosten kann."
plPL = "Generuje dekorację klasy A z systemem cząsteczek Unity. Pasywna (brak reaktywności ekologicznej, brak interakcji) -- pokazuje, że ta sama rejestracja może obsługiwać dekoracje niemeshowe, takie jak efekty atmosferyczne."
ptBR = "Cria uma decoração de Classe A que carrega um sistema de partículas Unity. Passivo (sem reatividade ecológica, sem interação) -- demonstra que o mesmo registro pode hospedar decorações não-mesh, como efeitos atmosféricos."
koKR = "유니티 파티클 시스템을 보유한 클래스 A 장식을 생성합니다. 수동적 (생태 반응 없음, 상호 작용 없음) -- 동일한 레지스트리가 대기 효과와 같은 비 메시 장식을 수용할 수 있음을 보여줍니다."
csCZ = "Generuje dekoraci třídy A nesoucí Unity ParticleSystem. Pasivní (žádná ekologická reakce, žádná interakce) -- demonstruje, že stejný registr může hostit dekorace bez sítě, jako jsou atmosférické efekty."
viVN = "Tạo ra một vật trang trí Loại A chứa một Hệ thống Hạt Unity. Thụ động (không có phản ứng sinh thái, không tương tác) -- cho thấy cùng một đăng ký có thể chứa các vật trang trí không phải lưới như hiệu ứng bầu khí quyển."

