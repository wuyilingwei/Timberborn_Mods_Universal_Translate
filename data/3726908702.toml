["Tool.Keystone.VanillaFlora.Description"]
status = "normal"
raw = "Spawns a Class D natural resource: a Pine, available natively in both factions. Full vanilla pipeline -- can be cut, planted, gathered (where applicable), and reacts to moisture/flood normally."
enUS = "Spawns a Class D natural resource: a Pine, available natively in both factions. Full vanilla pipeline -- can be cut, planted, gathered (where applicable), and reacts to moisture/flood normally."
zhCN = "生成一种D级自然资源：一种松树，在两个派系中均可本地获取。完整的原版流程 - 可以被砍伐、种植、收集（在适用的情况下），并且对湿度/洪水有正常的反应。"
zhTW = "生成一種D類自然資源：松樹，在兩個派系中原生可用。完整的原版流程--可以被砍伐、植樹、收集（如果適用），並且對濕度/洪水的反應正常。"
ruRU = "Создает ресурс естественного происхождения класса D: сосна, доступная изначально в обеих фракциях. Полная ванильная цепочка -- может быть вырублена, посажена, собрана (где это применимо) и реагирует на влагу/наводнение нормально."
jaJP = "「クラスDの天然資源である松を生成します。両方の派閥でネイティブに利用できます。完全なバニラパイプライン -- 切り取ることができ、植えることができ、収集可能（該当する場合）で、湿気/洪水に通常に反応します。」"
frFR = "Génère une ressource naturelle de classe D : un pin, disponible nativement dans les deux factions. Chaîne de production complète en mode classique - peut être coupé, planté, récolté (le cas échéant), et réagit normalement à l'humidité/aux inondations."
deDE = "Erzeugt eine natürliche Ressource der Klasse D: eine Kiefer, die in beiden Fraktionen nativ verfügbar ist. Vollständige Vanilla-Pipeline -- kann gefällt, gepflanzt, gesammelt (wo anwendbar) und reagiert normalerweise auf Feuchtigkeit/Überschwemmung."
plPL = "Generuje zasób naturalny klasy D: sosnę, dostępną naturalnie w obu frakcjach. Pełny przepływ w wersji podstawowej -- może być ścinana, sadzona, zbierana (gdzie to możliwe) i reaguje na wilgoć/powódź w sposób normalny."
ptBR = "Spawn uma recurso natural da Classe D: um Pinheiro, disponível nativamente em ambas as facções. Fluxo completo padrão -- pode ser cortado, plantado, coletado (quando aplicável) e reage normalmente à umidade/inundações."
koKR = "클래스 D 자연 자원인 소나무를 생성합니다. 두 세력 모두에서 자연적으로 사용할 수 있습니다. 전체 바닐라 파이프라인 -- 자를 수 있고, 심을 수 있으며, 수확할 수 있으며(해당할 경우), 습기/홍수에 따라 정상적으로 반응합니다."
csCZ = "Vytváří přírodní zdroj třídy D: borovici, dostupnou přirozeně v obou frakcích. Plně vanilkový proces -- může být pokácena, zasazena, sbírána (kde je to možné) a reaguje na vlhkost/záplavy normálně."
viVN = "Xuất hiện một tài nguyên tự nhiên lớp D: một loại Thông, có sẵn một cách tự nhiên trong cả hai phe. Quy trình vani hoàn chỉnh - có thể bị chặt, trồng, thu hoạch (nếu áp dụng) và phản ứng với độ ẩm/đợt lũ một cách bình thường."

