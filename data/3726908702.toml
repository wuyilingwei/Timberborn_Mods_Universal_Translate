["Tool.Keystone.PlantForest.Description"]
raw = "Drag to mark an area for planting. Each tile is sown with a weighted-random pick from the tree and bush types below — raise a type's weight to plant more of it, drop it to zero to leave it out — a quick way to grow a natural, mixed woodland. Everything is still planted by your foresters through the normal planting queue."
status = "normal"
enUS = "Drag to mark an area for planting. Each tile is sown with a weighted-random pick from the tree and bush types below — raise a type's weight to plant more of it, drop it to zero to leave it out — a quick way to grow a natural, mixed woodland. Everything is still planted by your foresters through the normal planting queue."
zhCN = "拖动以标记种植区域。每个方块都随机选择以下树木和灌木类型中的一种 — 提高某种类型的权重以种植更多该类型，降低到零以将其排除 — 这是一种快速生长自然混合森林的方法。所有的种植仍然由你的伐木工人通过普通的种植队列完成。"
zhTW = "拖曳以標記種植區域。每個磚塊都是從下面的樹木和灌木類型中隨機選擇的，加權隨機選擇 — 提高某個類型的權重可以種植更多，將其降低到零則不種植 — 這是一個快速建立自然混合林地的方式。所有的植物仍然由你的林木工作者通過正常的種植隊列來種植。"
ruRU = "Перетяните, чтобы обозначить область для посадки. Каждый тайл засевается с учетом случайного выбора из видов деревьев и кустарников ниже — увеличьте вес типа, чтобы посадить больше его, уменьшите до нуля, чтобы исключить — быстрый способ создать естественный смешанный лес. Все еще высаживается вашими лесниками через обычную очередь посадки."
jaJP = "植林エリアを指定するにはドラッグしてください。各タイルには、以下の樹木と低木の種類からのウェイトを基にしたランダムな選択で植えられます — 特定の種類のウェイトを上げることで、その種類を多く植え、ゼロに下げることで除外できます — 自然な混合林を育てるための簡単な方法です。すべては通常の植え付けキューを通じて、あなたの林業者によって植えられます。"
frFR = "Faites glisser pour marquer une zone à planter. Chaque tuile est semée avec un choix aléatoire pondéré parmi les types d'arbres et d'arbustes ci-dessous — augmentez le poids d'un type pour en planter davantage, réduisez-le à zéro pour l'exclure — un moyen rapide de faire pousser une forêt naturelle et mixte. Tout est toujours planté par vos forestiers via la file de plantation normale."
deDE = "Ziehen, um ein Gebiet zum Pflanzen zu markieren. Jedes Feld wird mit einer gewichteten Zufallsauswahl aus den untenstehenden Baum- und Straucharten bepflanzt – erhöhen Sie das Gewicht eines Typs, um mehr davon zu pflanzen, senken Sie es auf null, um ihn wegzulassen – eine schnelle Möglichkeit, einen natürlichen, gemischten Wald zu wachsen. Alles wird weiterhin von Ihren Förstern über die normale Pflanzwarteschlange gepflanzt."
plPL = "Przeciągnij, aby oznaczyć obszar do sadzenia. Każdy kafelek jest zasiewany losowo według wag z typów drzew i krzewów poniżej — zwiększ wagę typu, aby zasadzić go więcej, obniż ją do zera, aby go pominąć — szybki sposób na wyhodowanie naturalnego, mieszane lasu. Wszystko nadal jest sadzone przez twoich leśników w normalnej kolejce sadzenia."
ptBR = "Arraste para marcar uma área para plantio. Cada tile é semeado com uma seleção aleatória ponderada dos tipos de árvores e arbustos abaixo — aumente o peso de um tipo para plantar mais dele, reduza para zero para deixá-lo de fora — uma maneira rápida de cultivar uma floresta natural e mista. Tudo ainda é plantado pelos seus madeireiros através da fila de plantio normal."
koKR = "식재할 영역을 표시하려면 드래그하십시오. 각 타일은 아래의 나무와 덤불 종류에서 가중치가 랜덤으로 선택되어 심어집니다. 특정 종류의 가중치를 높이면 더 많이 심을 수 있고, 가중치를 0으로 낮추면 해당 종류는 제외됩니다. 자연스럽고 혼합된 숲을 빠르게 성장시키는 방법입니다. 모든 것은 여전히 귀하의 임업자들이 일반 식재 대기열을 통해 심습니다."
csCZ = "Táhněte myší a označte oblast pro výsadbu. Každá dlaždice je osazena náhodným výběrem z typů stromů a keřů níže - zvyšte váhu typu, abyste ho vysázeli více, snižte na nulu, abyste ho vyloučili - rychlý způsob, jak pěstovat přirozený, smíšený les. Vše stále vysazují vaši lesníci prostřednictvím běžného pořadí výsadby."
viVN = "Kéo để đánh dấu một khu vực để trồng cây. Mỗi ô được gieo với một lựa chọn ngẫu nhiên có trọng số từ các loại cây và bụi cây bên dưới - tăng trọng số của một loại để trồng nhiều hơn, giảm xuống còn không để loại đó bị loại bỏ - một cách nhanh chóng để phát triển một khu rừng tự nhiên, hỗn hợp. Mọi thứ vẫn được trồng bởi các thợ rừng của bạn thông qua hàng đợi trồng cây bình thường."

