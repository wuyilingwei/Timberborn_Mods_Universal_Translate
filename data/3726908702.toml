["Keystone.Settings.Flora.TreeDensity.Tooltip"]
raw = "How many wild trees (birch, maple, oak, chestnut, mangrove) appear as part of each biome.\n\n0% removes them entirely.\n100% is the default amount.\n200% doubles the amount.\n\nLower this if your map feels too crowded with trees, or if you want more building space."
status = "normal"
enUS = "How many wild trees (birch, maple, oak, chestnut, mangrove) appear as part of each biome.\n\n0% removes them entirely.\n100% is the default amount.\n200% doubles the amount.\n\nLower this if your map feels too crowded with trees, or if you want more building space."
zhCN = "“每个生物群落中出现多少野生树（白桦树、枫树、橡树、栗树、红树林）。\n\n0% 完全移除它们。\n100% 是默认数量。\n200% 是数量的两倍。\n\n如果您的地图树木过于密集，或者想要更多的建筑空间，请降低这个值。”"
zhTW = "每個生態區域會出現多少野生樹木（白樺、楓樹、橡樹、栗樹、紅樹） \n\n0% 完全移除它們。 \n100% 為預設數量。 \n200% 為雙倍數量。 \n\n如果你的地圖感覺被樹木擠滿，或者你希望有更多建築空間，可調低此數值。"
ruRU = "Какое количество диких деревьев (березы, клены, дубы, каштаны, мангры) появляется в каждом биоме.\n\n0% полностью удаляет их.\n100% — стандартное количество.\n200% удваивает количество.\n\nУменьшите это значение, если ваша карта кажется слишком переполненной деревьями, или если вы хотите больше места для построек."
jaJP = "各バイオームに現れる野生の木（白樺、カエデ、ナラ、クリ、マングローブ）の数。\n\n0%で完全に取り除かれます。\n100%はデフォルトの量です。\n200%は量を倍増させます。\n\n地図が木で混雑していると感じる場合や、より多くの建設スペースが必要な場合は、これを減らしてください。"
frFR = "Combien d'arbres sauvages (bouleau, érable, chêne, châtaignier, mangrove) apparaissent dans chaque biome.\n\n0 % les supprime complètement.\n100 % est la quantité par défaut.\n200 % double la quantité.\n\nRéduisez ce chiffre si votre carte semble trop encombrée d'arbres, ou si vous souhaitez plus d'espace pour construire."
deDE = "Wie viele wilde Bäume (Birke, Ahorn, Eiche, Kastanie, Mangrove) in jedem Biom erscheinen.\n\n0 % entfernt sie vollständig.\n100 % ist die Standardmenge.\n200 % verdoppelt die Menge.\n\nVerringere diesen Wert, wenn deine Karte zu überfüllt mit Bäumen wirkt oder wenn du mehr Platz zum Bauen möchtest."
plPL = "Ilość dzikich drzew (brzoza, klon, dąb, kasztan, mangrowiec) pojawiających się w każdym biomie.\n\n0% całkowicie je usuwa.\n100% to domyślna ilość.\n200% podwaja ilość.\n\nObniż tę wartość, jeśli twoja mapa wydaje się zbyt zatłoczona drzewami lub jeśli chcesz mieć więcej miejsca na budowę."
ptBR = "Quantas árvores selvagens (bétula, bordo, carvalho, castanheira, mangue) aparecem como parte de cada bioma.\n\n0% remove-as completamente.\n100% é a quantidade padrão.\n200% duplica a quantidade.\n\nDiminua isso se o seu mapa parecer muito lotado de árvores, ou se você quiser mais espaço para construções."
koKR = "각 생물 군계에 나타나는 야생 나무(자작나무, 단풍나무, 참나무, 밤나무, 맹그로브)의 수입니다.\n\n0%는 나무를 완전히 제거합니다.\n100%는 기본 수치입니다.\n200%는 수치를 두 배로 늘립니다.\n\n지도가 나무로 너무 붐비는 느낌이라면 이 값을 낮추거나 건축 공간을 더 원하실 경우 이 값을 조정하세요."
csCZ = "Kolik divokých stromů (bříza, javor, dub, kaštan, mangrovník) se objevuje jako součást každého biomu.\n\n0% je zcela odstraní.\n100% je výchozí množství.\n200% zdvojnásobí množství.\n\nSnižte tuto hodnotu, pokud se vám na mapě zdá příliš mnoho stromů, nebo pokud chcete více místa na stavbu."
viVN = "Số lượng cây hoang dã (bạch dương, phong, sồi, hạt dẻ, rừng ngập mặn) xuất hiện trong mỗi sinh cảnh.\n\n0% hoàn toàn loại bỏ chúng.\n100% là số lượng mặc định.\n200% gấp đôi số lượng.\n\nGiảm bớt nếu bản đồ của bạn cảm thấy quá đông đúc với cây cối, hoặc nếu bạn muốn có nhiều không gian xây dựng hơn."

