["Tool.Keystone.Fauna.Description"]
raw = "Spawns a KeystoneDeer BlockObject at the cursor. End-to-end smoke test of the custom-mesh pipeline for fauna assets: Quaternius .blend -> Blender shade-smooth + VAT palette bake -> .timbermesh -> KeystoneDeer material -> rendered in-game. Hardcoded blueprint, no biome resolution. Replaced or generalised once proper fauna content infrastructure (Class E / agent system) lands."
status = "normal"
enUS = "Spawns a KeystoneDeer BlockObject at the cursor. End-to-end smoke test of the custom-mesh pipeline for fauna assets: Quaternius .blend -> Blender shade-smooth + VAT palette bake -> .timbermesh -> KeystoneDeer material -> rendered in-game. Hardcoded blueprint, no biome resolution. Replaced or generalized once proper fauna content infrastructure (Class E / agent system) is in place."
zhCN = "在光标处生成一个 KeystoneDeer 块对象。自定义网格管道的端到端烟雾测试，针对动物资产：Quaternius .blend -> Blender 平滑着色 + VAT 调色板烘焙 -> .timbermesh -> KeystoneDeer 材料 -> 游戏内渲染。硬编码蓝图，无生物群落解析。一旦适当的动物内容基础设施（E 类/代理系统）到位，就会被替换或概括。"
zhTW = "在游標處生成一個 KeystoneDeer 块物件。針對動物資產的自訂網格管道進行端到端煙霧測試：Quaternius .blend -> Blender 混合平滑 + VAT 調色板烘焙 -> .timbermesh -> KeystoneDeer 材質 -> 在遊戲中渲染。硬編碼藍圖，沒有生物群落解析。一旦適當的動物內容基礎設施（E 類 / 代理系統）到位，將被替換或通用化。"
ruRU = "Создаёт блок-объект KeystoneDeer в месте курсора. Полный тест дымохода пользовательского пайплайна для фаунистических активов: Quaternius .blend -> Blender shade-smooth + выпекание палитры VAT -> .timbermesh -> материал KeystoneDeer -> отрисовано в игре. Жёстко закодированный чертёж, без разрешения биома. Будет заменён или обобщён, как только появится правильная инфраструктура контента для фауны (класс E / система агентов)."
jaJP = "カーソルにKeystoneDeer BlockObjectを生成します。動物資産のカスタムメッシュパイプラインのエンドツーエンドのスモークテスト：Quaternius .blend -> Blenderでシェードスムーズ + VATパレットベイク -> .timbermesh -> KeystoneDeerマテリアル -> ゲーム内でレンダリング。ハードコーディングされた設計図、バイオーム解決なし。適切な動物コンテンツのインフラストラクチャ（クラスE / エージェントシステム）が整うと、置き換えまたは一般化されます。"
frFR = "Fait apparaître un bloc KeystoneDeer à l'emplacement du curseur. Test de validation complète de la pipeline de maillage personnalisé pour les actifs fauniques : Quaternius .blend -> Blender ombrage lisse + cuisson de palette VAT -> .timbermesh -> matériau KeystoneDeer -> rendu dans le jeu. Plan générique codé en dur, pas de résolution de biome. Remplacé ou généralisé une fois que l'infrastructure de contenu faunique appropriée (Classe E / système d'agents) est mise en place."
deDE = "Erzeugt ein KeystoneDeer BlockObjekt am Cursor. End-to-end Smoke-Test des benutzerdefinierten Mesh-Pipelines für Fauna-Assets: Quaternius .blend -> Blender Shade-Smooth + VAT-Palettenbake -> .timbermesh -> KeystoneDeer-Material -> im Spiel gerendert. Hardcodiertes Blueprint, keine Biomenauflösung. Wird ersetzt oder verallgemeinert, sobald die richtige Infrastruktur für Fauna-Inhalte (Klasse E / Agentensystem) bereitsteht."
plPL = "Tworzy obiekt blokowy KeystoneDeer na kursora. Test end-to-end dla niestandardowego procesu graficznego dla zasobów fauny: Quaternius .blend -> wygładzanie w Blenderze + pieczenie palety VAT -> .timbermesh -> materiał KeystoneDeer -> renderowane w grze. Sztywny schemat, brak rozdzielczości biomu. Zastąpione lub uogólnione, gdy pojawi się odpowiednia infrastruktura treści fauny (Klasa E / system agentów)."
ptBR = "Cria um Bloco de Objeto KeystoneDeer no cursor. Teste completo do pipeline de malha personalizada para ativos de fauna: Quaternius .blend -> Blender shade-smooth + assar paleta VAT -> .timbermesh -> material KeystoneDeer -> renderizado no jogo. Projeto codificado, sem resolução de bioma. Substituído ou generalizado assim que a infraestrutura de conteúdo de fauna adequada (Classe E / sistema de agentes) for implementada."
koKR = "커서 위치에 KeystoneDeer 블록 객체를 생성합니다. 동물 자산을 위한 커스텀 메시 파이프라인의 엔드 투 엔드 스모크 테스트: Quaternius .blend -> Blender 그라데이션 매끄럽게 + VAT 팔레트 베이크 -> .timbermesh -> KeystoneDeer 재료 -> 게임 내 렌더링. 하드코딩된 청사진, 생태계 해상도 없음. 적절한 동물 콘텐츠 인프라(Class E / 에이전트 시스템)가 마련되면 교체되거나 일반화됩니다."
csCZ = "Vytvoří blokový objekt KeystoneDeer na kurzoru. End-to-end smokový test pipeline pro vlastní síť pro fauna aktiva: Quaternius .blend -> Blender shade-smooth + VAT paleta pečení -> .timbermesh -> materiál KeystoneDeer -> renderováno ve hře. Tvrdě zakódovaný plán, bez rozlišení biomu. Bude nahrazen nebo zgeneralizován, jakmile dorazí správná infrastruktura pro obsah fauny (Třída E / systém agentů)."
viVN = "Tạo ra một Khối Đối Tượng KeystoneDeer tại con trỏ. Kiểm tra toàn diện đường ống lưới tùy chỉnh cho tài sản động vật: Quaternius .blend -> Blender shade-smooth + nướng bảng màu VAT -> .timbermesh -> vật liệu KeystoneDeer -> được hiển thị trong trò chơi. Bản thiết kế lập trình cứng, không phân giải sinh thái. Sẽ được thay thế hoặc tổng quát khi có hệ thống nội dung động vật cơ sở hạ tầng thích hợp (Lớp E / hệ thống đại lý)."

