["Keystone.Settings.BaseGame.WildReproduction.Tooltip"]
raw = "How fast wild plants and trees spread to nearby tiles on their own — as a share of the base game's normal rate.\n\n100% is the normal rate.\n5% is the default — wild spread is slowed to a trickle.\n0% stops wild spread entirely.\n\nKeystone already fills each biome with its own plants and trees, so the base game's slow creep is mostly redundant — the low default lets Keystone drive what grows where, instead of two systems competing.\n\nThis is a slow-down only; it can't make wild plants spread faster than the base game.\n\nOnly changeable from the main menu."
status = "normal"
enUS = "How fast wild plants and trees spread to nearby tiles on their own — as a share of the base game's normal rate.\n\n100% is the normal rate.\n5% is the default — wild spread is slowed to a trickle.\n0% stops wild spread entirely.\n\nKeystone already fills each biome with its own plants and trees, so the base game's slow creep is mostly redundant — the low default lets Keystone drive what grows where, instead of two systems competing.\n\nThis is a slow-down only; it can't make wild plants spread faster than the base game.\n\nOnly changeable from the main menu."
zhCN = "“野生植物和树木自我扩散到附近瓦片的速度——作为基础游戏正常速率的百分比。\n\n100% 是正常速率。\n5% 是默认值——野生扩散减缓到涓涓细流。\n0% 则完全停止野生扩散。\n\nKeystone 已经在每个生物群落中填充了自己的植物和树木，因此基础游戏的缓慢扩散大多是多余的——低默认值让 Keystone 驱动生长位置，而不是两个系统竞争。\n\n这只是减缓；它不能让野生植物的扩散速度超过基础游戏。\n\n只能从主菜单更改。”"
zhTW = "野生植物和樹木如何以自身速度擴散到附近的瓷磚上 — 以基本遊戲正常速度的比例計算。\n\n100% 是正常速度。\n5% 是預設值 — 野生擴散減慢到涓涓細流。\n0% 完全停止野生擴散。\n\nKeystone 已經為每個生態系統填充了自己的植物和樹木，因此基本遊戲的緩慢擴散大多是多餘的 — 低預設值讓 Keystone 主導生長區域，而不是兩個系統競爭。\n\n這只是減速；無法讓野生植物的擴散速度超過基本遊戲。\n\n只能從主菜單進行更改。"
ruRU = "Сколько быстро дикие растения и деревья распространяются на соседние плитки самостоятельно — как доля нормальной скорости базовой игры.\n\n100% — это нормальная скорость.\n5% — это по умолчанию — дикое распространение замедлено до капли.\n0% полностью останавливает дикое распространение.\n\nKeystone уже заполняет каждый биом собственными растениями и деревьями, поэтому медленное продвижение базовой игры в основном избыточно — низкое значение по умолчанию позволяет Keystone контролировать, что растет где, вместо того чтобы две системы конкурировали.\n\nЭто только замедление; оно не может сделать так, чтобы дикие растения распространялись быстрее, чем в базовой игре.\n\nИзменяемо только из главного меню."
jaJP = "野生繁殖の速さ — 基本ゲームの通常速度の割合として、周囲のタイルに自動的に広がる野生の植物や木の速度。\n\n100% が通常速度です。\n5% がデフォルト — 野生の広がりが非常に遅くなります。\n0% は野生の広がりを完全に停止させます。\n\nKeystoneはすでに各バイオームに独自の植物や木を配置しているため、基本ゲームの遅い拡大は主に冗長です — 低いデフォルト値により、Keystoneがどこに何が成長するかを制御し、二つのシステムが競合することを防ぎます。\n\nこれは減速のみであり、基本ゲームよりも早く野生植物が広がることはありません。\n\nメインメニューからのみ変更可能です。"
frFR = "À quelle vitesse les plantes et les arbres sauvages se répandent-ils sur les tuiles voisines par eux-mêmes — en pourcentage du taux normal du jeu de base.\n\n100 % est le taux normal.\n5 % est la valeur par défaut — la propagation sauvage est réduite à un filet.\n0 % arrête complètement la propagation sauvage.\n\nKeystone remplit déjà chaque biome avec ses propres plantes et arbres, donc la lente propagation du jeu de base est principalement redondante — la faible valeur par défaut permet à Keystone de déterminer ce qui pousse où, au lieu de deux systèmes en concurrence.\n\nC'est uniquement un ralentissement ; cela ne peut pas rendre les plantes sauvages plus rapides que le jeu de base.\n\nModifiable uniquement depuis le menu principal."
deDE = "Wie schnell sich Wildpflanzen und Bäume auf eigene Faust auf benachbarte Felder ausbreiten — als Anteil der normalen Geschwindigkeit des Basisspiels.\n\n100% ist die normale Geschwindigkeit.\n5% ist der Standard — die Ausbreitung erfolgt sehr langsam.\n0% stoppt die Ausbreitung vollständig.\n\nKeystone füllt bereits jedes Biom mit seinen eigenen Pflanzen und Bäumen, sodass das langsame Voranschreiten des Basisspiels größtenteils überflüssig ist — der niedrige Standard lässt Keystone bestimmen, was wo wächst, anstatt dass zwei Systeme konkurrieren.\n\nDies ist nur eine Verlangsamung; es kann Wildpflanzen nicht schneller ausbreiten als im Basisspiel.\n\nKann nur im Hauptmenü geändert werden."
plPL = "Jak szybko dzikie rośliny i drzewa rozprzestrzeniają się na pobliskich kafelkach samodzielnie — jako część normalnej prędkości gry podstawowej.\n\n100% to normalna prędkość.\n5% to ustawienie domyślne — dzikie rozprzestrzenienie jest spowolnione do minimum.\n0% całkowicie zatrzymuje dzikie rozprzestrzenienie.\n\nKeystone już napełnia każdy biom swoimi roślinami i drzewami, więc wolne rozprzestrzenienie podstawowej gry jest w dużej mierze zbędne — niska wartość domyślna pozwala Keystone decydować, co rośnie tam, gdzie, zamiast dwóch systemów konkurować.\n\nTo jest tylko spowolnienie; nie może sprawić, że dzikie rośliny rozprzestrzeniają się szybciej niż w grze podstawowej.\n\nMożliwe do zmiany tylko z menu głównego."
ptBR = "Quão rápido plantas e árvores selvagens se espalham para os tiles próximos por conta própria — como uma parte da taxa normal do jogo base.\n\n100% é a taxa normal.\n5% é o padrão — o espalhamento selvagem é reduzido a um fio.\n0% para o espalhamento selvagem completamente.\n\nKeystone já preenche cada bioma com suas próprias plantas e árvores, então o avanço lento do jogo base é em grande parte redundante — o padrão baixo permite que Keystone controle o que cresce onde, ao invés de dois sistemas competindo.\n\nIsso é apenas uma desaceleração; não pode fazer plantas selvagens se espalharem mais rápido do que o jogo base.\n\nSomente alterável pelo menu principal."
koKR = "야생 식물과 나무가 스스로 인접한 타일로 퍼지는 속도 — 기본 게임의 정상 속도의 비율입니다.\n\n100%는 정상 속도입니다.\n5%는 기본값 — 야생 확산이 느려져서 거의 멈춥니다.\n0%는 야생 확산을 완전히 중단시킵니다.\n\nKeystone은 각 생태계에 고유한 식물과 나무를 이미 채우기 때문에, 기본 게임의 느린 확산은 대부분 중복됩니다 — 낮은 기본값은 Keystone이 어디에 어떤 식물이 자랄지를 결정하도록 하여 두 시스템이 경쟁하는 것을 방지합니다.\n\n이것은 속도 감소만이며, 기본 게임보다 야생 식물이 더 빨리 퍼지게 할 수는 없습니다.\n\n메인 메뉴에서만 변경할 수 있습니다."
csCZ = "Jak rychle se divoké rostliny a stromy šíří na sousední dlaždice samy od sebe — jako podíl na normální rychlosti základní hry.\n\n100 % je normální rychlost.\n5 % je výchozí — divoké šíření je zpomaleno na minimum.\n0 % kompletně zastaví divoké šíření.\n\nKeystone již naplňuje každý biom svými vlastními rostlinami a stromy, takže pomalé šíření základní hry je většinou nadbytečné — nízký výchozí stav umožňuje Keystone řídit, co roste kde, místo aby spolu soupeřily dva systémy.\n\nJedná se pouze o zpomalení; nemůže způsobit, že se divoké rostliny budou šířit rychleji než v základní hře.\n\nZměnitelné pouze z hlavní nabídky."
viVN = "Tốc độ cây cỏ và cây dại phát triển đến các ô lân cận tự nhiên — tính theo tỷ lệ phần trăm của tốc độ bình thường trong trò chơi cơ bản.\n\n100% là tốc độ bình thường.\n5% là mặc định — sự phát triển dại bị làm chậm lại.\n0% hoàn toàn ngừng phát triển dại.\n\nKeystone đã lấp đầy mỗi hệ sinh thái với các loại cây và cây dại riêng của nó, vì vậy sự phát triển chậm chạp trong trò chơi cơ bản chủ yếu là không cần thiết — mức mặc định thấp cho phép Keystone quyết định cái gì sẽ phát triển ở đâu, thay vì hai hệ thống cạnh tranh.\n\nĐây chỉ là một sự làm chậm; nó không thể làm cho cây dại phát triển nhanh hơn so với trò chơi cơ bản.\n\nChỉ có thể thay đổi từ menu chính."

