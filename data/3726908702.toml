["Tool.Keystone.Decoration.Description"]
raw = "Spawns a Class A decoration -- non-blocking, non-persisted, with a moisture-driven controller. Sample uses a Dandelion clone (alive when moist, dry when not). Reactivity is the orthogonal axis -- the same Class A bucket also hosts purely passive content."
status = "normal"
enUS = "Spawns a Class A decoration -- non-blocking, non-persisted, with a moisture-driven controller. Sample uses a Dandelion clone (alive when moist, dry when not). Reactivity is the orthogonal axis -- the same Class A bucket also hosts purely passive content."
zhCN = "生成一个 A 类装饰物 -- 不会阻塞，不会持久化，带有湿度驱动的控制器。示例使用了一个蒲公英克隆（潮湿时活跃，干燥时不活跃）。反应性是正交轴 -- 同样的 A 类桶也可以包含完全被动的内容。"
zhTW = "「產生一個 A 級裝飾物 -- 非阻塞性、非持久性，帶有濕度驅動的控制器。範例使用了一種蒲公英克隆（在潮濕時生長，乾燥時則死亡）。反應性是正交軸 -- 相同的 A 級桶還包含純被動內容。」"
ruRU = "Создает декорацию класса A -- не блокирующую, не сохраняемую, с контроллером, управляемым влажностью. В образце используется клон одуванчика (живой при влажности, сухой при отсутствии таковой). Реактивность является ортогональной осью -- тот же самый бак класса A также содержит чисто пассивный контент."
jaJP = "クラスAの装飾を生成します -- ブロックされず、持続しない、湿気駆動のコントローラー付きです。サンプルはダンデライオンのクローンを使用します（湿っているときは生きていて、乾燥しているときは枯れます）。反応性は直交軸です -- 同じクラスAのバケツにも純粋にパッシブなコンテンツが含まれています。"
frFR = "Fait apparaître une décoration de Classe A -- non-bloquante, non-persistante, avec un contrôleur à base d'humidité. L'exemple utilise un clone de pissenlit (vivant lorsqu'il est humide, sec lorsqu'il ne l'est pas). La réactivité est l'axe orthogonal -- le même seau de Classe A héberge également un contenu purement passif."
deDE = "Erzeugt eine Dekoration der Klasse A – nicht blockierend, nicht persistent, mit einem feuchtigkeitsgesteuerten Controller. Das Beispiel verwendet einen Löwenzahn-Klon (lebt, wenn feucht, trocknet, wenn nicht). Reaktivität ist die orthogonale Achse – derselbe Eimer der Klasse A beherbergt auch rein passive Inhalte."
plPL = "Generuje dekorację klasy A - niezablokowaną, nieutrzymywaną, z kontrolerem opartym na wilgoci. Przykład używa klona dmuchawca (żywy, gdy jest wilgotny, wyschnięty, gdy nie jest). Reaktywność jest osią ortogonalną - ta sama wiadra klasy A także zawiera czysto pasywną zawartość."
ptBR = "Cria uma decoração Classe A -- não bloqueante, não persistente, com um controlador acionado pela umidade. O exemplo usa um clone de Dente-de-leão (vivo quando úmido, seco quando não). A reatividade é o eixo ortogonal -- o mesmo balde Classe A também abriga conteúdo puramente passivo."
koKR = "A 클래스 장식을 생성합니다 - 방해받지 않으며, 지속되지 않고, 수분 구동 컨트롤러가 있습니다. 샘플은 민들레 클론을 사용하며 (수분이 있을 때 살아 있고, 없을 때 마른 상태입니다). 반응성은 수직 축입니다 - 같은 A 클래스 버킷은 순수한 수동 콘텐츠도 포함하고 있습니다."
csCZ = "Vytváří dekoraci třídy A – neblokující, nepersistentní, s ovladačem řízeným vlhkostí. Vzor používá klon pampelišky (živý, když je mokrý, suchý, když není). Reaktivita je kolmá ose – stejný kbelík třídy A také obsahuje zcela pasivní obsah."
viVN = "Tạo ra một vật trang trí loại A -- không chặn, không lưu, với một bộ điều khiển dựa trên độ ẩm. Mẫu sử dụng một bản sao của Hoa bồ công anh (sống khi ướt, khô khi không). Tính phản ứng là trục vuông góc -- cùng một xô loại A cũng chứa nội dung hoàn toàn thụ động."

