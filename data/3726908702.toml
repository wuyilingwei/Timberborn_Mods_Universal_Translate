enUS = "How many wild aquatic crops (cattail, spadderdock) appear as part of each biome.\n\nCrops are planted by the farmer and harvested as the whole plant.\n\n0% removes them entirely.\n100% is the default amount.\n200% doubles the amount."
zhCN = "“每个生物群落中出现多少种野生水生作物（香蒲、水花生）。\n\n作物由农民种植，并作为整株植物收获。\n\n0% 完全去除它们。\n100% 是默认数量。\n200% 是数量的两倍。”"
zhTW = "每個生態系統中會出現多少野生水生作物（旱稻、麥蓬屬）。\n\n作物由農民種植，整株收割。\n\n0% 會完全移除它們。\n100% 是默認數量。\n200% 是數量的兩倍。"
ruRU = "Сколько диких водных культур (камыш, спадардок) появляется в каждом биоме.\n\nКультуры сажаются фермером и собираются целиком.\n\n0% полностью удаляет их.\n100% - это стандартное количество.\n200% удваивает количество."
jaJP = "各バイオームにどれだけの野生の水生作物（ミズアオイ、スパッダードック）が生成されるか。\n\n作物は農夫によって植えられ、植物全体が収穫されます。\n\n0%はそれらを完全に排除します。\n100%はデフォルトの量です。\n200%はその量を倍にします。"
frFR = "Combien de cultures aquatiques sauvages (lanouée, renouée) apparaissent dans chaque biome.\n\nLes cultures sont plantées par le fermier et récoltées en tant que plante entière.\n\n0 % les supprime entièrement.\n100 % est la quantité par défaut.\n200 % double la quantité."
deDE = "Wie viele wilde Wasserpflanzen (Schilfrohr, Wasserknöterich) als Teil jedes Bioms erscheinen.\n\nPflanzen werden vom Landwirt gepflanzt und als ganze Pflanze geerntet.\n\n0 % entfernt sie vollständig.\n100 % ist die Standardmenge.\n200 % verdoppelt die Menge."
plPL = "Ile dzikich roślin wodnych (bylica, bergrass) pojawia się w ramach każdego biomu.\n\nRośliny są sadzone przez rolnika i zbierane jako cała roślina.\n\n0% całkowicie je usuwa.\n100% to domyślna ilość.\n200% podwaja ilość."
ptBR = "Quantas culturas aquáticas selvagens (junco, espada-de-água) aparecem como parte de cada bioma.\n\nAs culturas são plantadas pelo fazendeiro e colhidas como a planta inteira.\n\n0% remove-as completamente.\n100% é a quantidade padrão.\n200% duplica a quantidade."
koKR = "각 생물군계의 일부로 나타나는 야생 수생 작물(갈대, 수련)의 수입니다.\n\n농부가 작물을 심고 전체 식물로 수확합니다.\n\n0%는 완전히 제거합니다.  \n100%는 기본 양입니다.  \n200%는 양을 두 배로 늘립니다."
csCZ = "Kolik divokých vodních plodin (rákos, šáchor) se objevuje jako součást každého biomu.\n\nPlodiny jsou zasazovány farmářem a sklizeny jako celá rostlina.\n\n0 % je zcela odstraní.\n100 % je výchozí množství.\n200 % zdvojnásobuje množství."
viVN = "Số lượng cây trồng thủy sinh hoang dã (bông sen, rau muống) xuất hiện như một phần của mỗi hệ sinh thái.\n\nCây trồng được nông dân trồng và thu hoạch như toàn bộ cây.\n\n0% hoàn toàn loại bỏ chúng.\n100% là lượng mặc định.\n200% gấp đôi số lượng."

