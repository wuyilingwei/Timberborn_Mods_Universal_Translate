["Tool.Keystone.PlantCrops.Description"]
raw = "Drag to mark an area for planting. Each tile is sown with a weighted-random pick from the crop types below — raise a type's weight to plant more of it, drop it to zero to leave it out — an easy way to lay out a varied field instead of one crop at a time. Crops are still planted by your farmers through the normal planting queue."
status = "normal"
enUS = "Drag to mark an area for planting. Each tile is sown with a weighted-random pick from the crop types below — increase a type's weight to plant more of it, decrease it to zero to exclude it — an easy way to lay out a varied field instead of planting one crop at a time. Crops are still planted by your farmers through the normal planting queue."
zhCN = "拖动以标记种植区域。每个方块将根据以下作物类型随机选取 — 提高某种作物的权重以种植更多，降低至零则不种植 — 这是一种轻松的方法，可以布局出多样化的田地，而不是一次种植一种作物。作物仍通过你农民的正常种植队列进行种植。"
zhTW = "拖曳以標記種植區域。每個磚塊都是從下面的作物類型中隨機選擇的，並且每種作物的權重會影響選擇的概率 — 提高某種作物的權重可以種植更多，將其降至零則可以不種植 — 這是一個便捷的方式來佈置多樣化的田地，而不是一次種植一種作物。作物仍然由您的農民通過正常的種植隊列進行種植。"
ruRU = "Перетащите, чтобы отметить область для посадки. Каждая плитка засевается случайным образом из указанных ниже типов культур — увеличьте вес типа, чтобы высаживать его больше, уменьшите до нуля, чтобы исключить его — простой способ разбить разнообразное поле, а не сажать одну культуру за раз. Культуры все еще сажают ваши фермеры через обычную очередь посадки."
jaJP = "植えるためのエリアをマークするにはドラッグしてください。各タイルは、下記の作物タイプからの加重ランダム選択で播かれます — 特定の作物の重みを上げるとその作物が多く植えられ、重みをゼロにするとその作物は除外されます — 一度に一種類の作物を植えるのではなく、多様なフィールドを簡単にレイアウトする方法です。作物は依然として農家によって通常の植え付けキューを通じて植えられます。"
frFR = "Faites glisser pour marquer une zone de plantation. Chaque case est semée avec un choix aléatoire pondéré parmi les types de cultures ci-dessous — augmentez le poids d'un type pour en planter davantage, diminuez-le à zéro pour l'exclure — une méthode simple pour disposer un champ varié plutôt que de cultiver un type à la fois. Les cultures sont toujours plantées par vos agriculteurs via la file de plantation normale."
deDE = "Ziehen Sie, um ein Gebiet zum Pflanzen zu markieren. Jedes Feld wird mit einer gewichtet-zufälligen Auswahl aus den untenstehenden Pflanzenarten besät – erhöhen Sie das Gewicht einer Sorte, um mehr davon zu pflanzen, senken Sie es auf null, um sie auszuschließen – eine einfache Möglichkeit, ein abwechslungsreiches Feld anzuordnen, anstatt nur eine Sorte nach der anderen zu pflanzen. Die Pflanzen werden weiterhin von Ihren Landwirten über die normale Pflanzenschlange gepflanzt."
plPL = "Przeciągnij, aby zaznaczyć obszar do sadzenia. Każdy kafelek jest obsiewany z ważonym losowym wyborem spośród typów upraw poniżej — zwiększ wagę danego typu, aby sadzić go więcej, zmniejsz do zera, aby go pominąć — łatwy sposób na zaplanowanie różnorodnego pola zamiast sadzenia jednej uprawy na raz. Uprawy są nadal sadzone przez twoich rolników w normalnej kolejce sadzenia."
ptBR = "Arraste para marcar uma área para plantio. Cada tile é semeado com uma escolha aleatória ponderada dos tipos de cultura abaixo — aumente o peso de um tipo para plantar mais dele, diminua para zero para deixá-lo de fora — uma maneira fácil de organizar um campo variado em vez de plantar um tipo por vez. As culturas ainda são plantadas pelos seus fazendeiros através da fila normal de plantio."
koKR = "심기 위한 지역을 표시하려면 드래그하세요. 각 타일은 아래의 작물 유형에서 가중 무작위 선택으로 심어집니다 — 특정 유형의 가중치를 높이면 더 많이 심고, 가중치를 0으로 낮추면 제외할 수 있습니다 — 작물 하나씩 심는 대신 다양한 밭을 조성하는 쉬운 방법입니다. 작물은 여전히 농부들이 일반 심기 대기열을 통해 심습니다."
csCZ = "Táhněte pro označení oblasti pro výsadbu. Každá dlaždice je osévána váženým náhodným výběrem ze zde uvedených typů plodin — zvyšte váhu typu, abyste jich zasadili více, snižte ji na nulu, abyste ho vynechali — snadný způsob, jak vytvořit různorodé pole místo jedné plodiny najednou. Plodiny jsou stále vysazovány vašimi farmáři prostřednictvím normálního pořadí výsadby."
viVN = "Kéo để đánh dấu một khu vực để trồng. Mỗi ô sẽ được gieo bằng một loại cây trồng được chọn ngẫu nhiên theo trọng số từ các loại cây bên dưới — nâng trọng số của một loại để trồng nhiều hơn, giảm xuống còn không để loại đó không được trồng — một cách dễ dàng để bố trí một cánh đồng đa dạng thay vì chỉ một loại cây mỗi lần. Các loại cây vẫn sẽ được trồng bởi nông dân của bạn thông qua danh sách trồng cây bình thường."

