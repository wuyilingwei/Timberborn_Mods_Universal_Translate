["Keystone.Settings.Performance.MapUpdateHours.Tooltip"]
raw = "How often Keystone re-checks the state of the map (moisture, water, contamination) and updates which biomes are present where.\n\n1 = every in-game hour (the default; biomes react most quickly to player changes).\n4 = once every four hours (lighter on the CPU on large maps; biomes react more slowly).\n\nHas no effect on wildlife — use the Fauna sliders to tune that.\n\nOnly changeable from the main menu."
status = "normal"
enUS = "How often Keystone re-checks the state of the map (moisture, water, contamination) and updates which biomes are present where.\n\n1 = every in-game hour (the default; biomes react most quickly to player changes).\n4 = once every four hours (lighter on the CPU on large maps; biomes react more slowly).\n\nHas no effect on wildlife — use the Fauna sliders to tune that.\n\nOnly changeable from the main menu."
zhCN = "“Keystone多频繁重新检查地图状态（湿度、水源、污染）并更新各生物群落分布。\n\n1 = 每游戏小时（默认设置；生物群落对玩家的变化反应最快）。\n4 = 每四个小时一次（对大地图的CPU负担较轻；生物群落反应较慢）。\n\n对野生动物没有影响 — 使用动物滑块进行调节。\n\n只能从主菜单更改。”"
zhTW = "“Keystone 重新檢查地圖狀態（濕度、水源、污染）並更新各生物群落的位置的頻率。\n\n1 = 每遊戲小時一次（預設設置；生物群落對玩家的變化反應最快）。\n4 = 每四小時一次（在大型地圖上對 CPU 的負擔較輕；生物群落反應較慢）。\n\n對野生動物無影響 — 請使用動物滑桿進行調整。\n\n僅可從主選單進行更改。”"
ruRU = "Как часто Keystone повторно проверяет состояние карты (влажность, вода, загрязнение) и обновляет информацию о том, какие биомы присутствуют и где.\n\n1 = каждый игровой час (по умолчанию; биомы реагируют наиболее быстро на изменения со стороны игрока).\n4 = раз в четыре часа (облегчает нагрузку на ЦП на больших картах; биомы реагируют медленнее).\n\nНе влияет на фауну — используйте ползунки Фауны для настройки этого.\n\nИзменяется только из главного меню."
jaJP = "キー名：Keystone.Settings.Performance.MapUpdateHours.Tooltip - 新しい翻訳テキスト：“Keystoneがマップの状態（湿度、水、汚染）をどのくらいの頻度で再確認し、どのバイオームがどこに存在するかを更新するか。\n\n1 = ゲーム内の1時間ごと（デフォルト；バイオームはプレイヤーの変更に最も速く反応します）。\n4 = 4時間ごとに1回（大きなマップではCPUに優しい；バイオームの反応は遅くなります）。\n\n野生生物には影響しません — 調整にはファウナスライダーを使用してください。\n\nメインメニューからのみ変更可能です。”"
frFR = "À quelle fréquence Keystone vérifie l'état de la carte (humidité, eau, contamination) et met à jour les biomes présents.\n\n1 = chaque heure dans le jeu (par défaut ; les biomes réagissent le plus rapidement aux changements du joueur).\n4 = une fois toutes les quatre heures (moins lourd pour le processeur sur de grandes cartes ; les biomes réagissent plus lentement).\n\nN'a aucun effet sur la faune — utilisez les curseurs de la faune pour l'ajuster.\n\nNe peut être modifié que depuis le menu principal."
deDE = "Wie oft Keystone den Zustand der Karte (Feuchtigkeit, Wasser, Verschmutzung) überprüft und aktualisiert, welche Biome wo vorhanden sind.\n\n1 = jede Spielstunde (der Standard; Biome reagieren am schnellsten auf die Änderungen des Spielers).\n4 = einmal alle vier Stunden (weniger Belastung für die CPU auf großen Karten; Biome reagieren langsamer).\n\nHat keinen Einfluss auf die Tierwelt — verwenden Sie die Fauna-Regler, um das anzupassen.\n\nNur im Hauptmenü änderbar."
plPL = "Jak często Keystone ponownie sprawdza stan mapy (wilgotność, woda, zanieczyszczenie) i aktualizuje, które biom jest obecny gdzie.\n\n1 = co każdą godzinę w grze (domyślnie; biomy reagują na zmiany wprowadzone przez gracza najszybciej).\n4 = raz co cztery godziny (mniejsze obciążenie dla CPU na dużych mapach; biomy reagują wolniej).\n\nNie ma wpływu na dziką faunę — użyj suwaków Fauna, aby to dostroić.\n\nMożna zmieniać tylko z menu głównego."
ptBR = "Com que frequência o Keystone verifica o estado do mapa (umidade, água, contaminação) e atualiza quais biomas estão presentes onde.\n\n1 = a cada hora do jogo (o padrão; os biomas reagem mais rapidamente às mudanças feitas pelo jogador).\n4 = uma vez a cada quatro horas (menos pesado para o CPU em mapas grandes; os biomas reagem mais lentamente).\n\nNão tem efeito sobre a vida selvagem — use os deslizadores de Fauna para ajustar isso.\n\nAlterável apenas a partir do menu principal."
koKR = "키스톤이 맵의 상태(습기, 물, 오염)를 얼마나 자주 재확인하고 어떤 생태계가 어디에 있는지 업데이트하는지에 대한 설정입니다.\n\n1 = 매 게임 시간마다 (기본값; 생태계가 플레이어의 변화에 가장 빠르게 반응합니다).\n4 = 4시간마다 한 번 (대형 맵에서 CPU에 부담이 덜함; 생태계가 더 느리게 반응합니다).\n\n야생동물에는 영향을 주지 않습니다 — 야생동물 슬라이더를 사용하여 조정하세요.\n\n메인 메뉴에서만 변경 가능합니다."
csCZ = "Jak často Keystone znovu kontroluje stav mapy (vlhkost, voda, znečištění) a aktualizuje, které biomy jsou kde přítomny.\n\n1 = každou herní hodinu (výchozí; biomy reagují nejrychleji na změny hráče).\n4 = jednou za čtyři hodiny (šetrnější k CPU na velkých mapách; biomy reagují pomaleji).\n\nNemá žádný vliv na volně žijící zvířata — použijte posuvníky Fauna pro jejich ladění.\n\nLze měnit pouze z hlavního menu."
viVN = "Cách thường xuyên Keystone kiểm tra trạng thái của bản đồ (độ ẩm, nước, ô nhiễm) và cập nhật các hệ sinh thái có mặt ở đâu.\n\n1 = mỗi giờ trong trò chơi (mặc định; các hệ sinh thái phản ứng nhanh nhất với thay đổi của người chơi).\n4 = một lần mỗi bốn giờ (ít ảnh hưởng đến CPU trên các bản đồ lớn; các hệ sinh thái phản ứng chậm hơn).\n\nKhông ảnh hưởng đến động vật hoang dã — sử dụng các thanh trượt Động vật để điều chỉnh điều đó.\n\nChỉ có thể thay đổi từ menu chính."

