["Keystone.Settings.Fauna.EnableFauna.Tooltip"]
raw = "Master switch for all wildlife — deer, cattle, and fish.\n\nTurning this off removes any currently-spawned animals and stops new ones from appearing.\n\nThe sliders below have no effect when this is off."
status = "normal"
enUS = "Master switch for all wildlife — deer, cattle, and fish.\n\nTurning this off removes any currently-spawned animals and stops new ones from appearing.\n\nThe sliders below have no effect when this is off."
zhCN = "所有野生动物的主开关——鹿、牛和鱼。\n\n关闭此选项将移除当前生成的动物，并阻止新动物出现。\n\n当此选项关闭时，下面的滑块无效。"
zhTW = "所有野生動物的主要開關 — 鹿、牛和魚。\n\n關閉此選項會移除當前生成的動物，並阻止新動物出現。\n\n當此選項關閉時，下面的滑桿將無法使用。"
ruRU = "Главный переключатель для всей дикой природы — олени, скот и рыба.\n\nОтключение этого параметра удаляет всех животных, которые уже появились, и останавливает появление новых.\n\nСлайдеры ниже не имеют эффекта, когда это отключено."
jaJP = "すべての野生動物（シカ、家畜、魚）のマスタースイッチです。\n\nこれをオフにすると、現在出現している動物がすべて消え、新しい動物の出現も停止します。\n\nこの設定をオフにしている場合、以下のスライダーには影響がありません。"
frFR = "Interrupteur principal pour toute la faune — cerfs, bovins et poissons.\n\nDésactiver cela supprime tous les animaux actuellement apparus et empêche l'apparition de nouveaux.\n\nLes curseurs ci-dessous n'ont aucun effet lorsque cela est désactivé."
deDE = "Master-Schalter für alle Wildtiere — Rehe, Rinder und Fische.\n\nWenn dies deaktiviert ist, werden alle derzeit vorhandenen Tiere entfernt und neue erscheinen nicht.\n\nDie Schieberegler unten haben keine Auswirkungen, wenn dies deaktiviert ist."
plPL = "Przełącznik główny dla całej fauny — jelenie, bydło i ryby.\n\nWyłączenie tego usuwa wszystkie aktualnie pojawione zwierzęta i uniemożliwia pojawienie się nowych.\n\nSuwnice poniżej nie mają żadnego efektu, gdy to jest wyłączone."
ptBR = "Interruptor principal para toda a vida selvagem — cervos, gado e peixes.\n\nDesligar isso remove quaisquer animais já gerados e impede que novos apareçam.\n\nOs controles deslizantes abaixo não têm efeito quando isso está desligado."
koKR = "야생동물에 대한 마스터 스위치 — 사슴, 가축, 물고기.\n\n이 기능을 끄면 현재 생성된 동물이 모두 제거되고 새로운 동물이 나타나지 않습니다.\n\n아래의 슬라이더는 이 기능이 꺼져 있을 때는 효과가 없습니다."
csCZ = "Hlavní vypínač pro všechna divoká zvířata — jelena, skot a ryby.\n\nVypnutím této volby odstraníte všechna aktuálně se nacházející zvířata a zastavíte objevování nových.\n\nUpravovací prvky níže nemají účinek, pokud je tato volba vypnutá."
viVN = "Công tắc chính cho tất cả động vật hoang dã — hươu, gia súc và cá.\n\nTắt chức năng này sẽ loại bỏ mọi con vật hiện có và ngăn chặn sự xuất hiện của những con mới.\n\nCác thanh trượt bên dưới sẽ không có tác dụng khi chức năng này bị tắt."

