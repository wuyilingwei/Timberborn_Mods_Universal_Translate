["Keystone.Settings.Performance.RulesUpdateDays.Tooltip"]
raw = "How often Keystone re-evaluates which flourishes, decorations, and attrition rules should fire on each tile.\n\n1 = once per in-game day (the default; flora and decor appear and are reclaimed most quickly).\n4 = once every four in-game days (lightest on the CPU on large maps; flora and decor change more slowly).\n\nThis is the biggest CPU lever on saturated maps — most of the per-tile work is in spawning new objects, and slowing the cycle cuts it proportionally.\n\nOnly changeable from the main menu."
status = "normal"
enUS = "How often Keystone re-evaluates which flourishes, decorations, and attrition rules should apply to each tile.\n\n1 = once per in-game day (the default; flora and decor appear and are reclaimed most quickly).\n4 = once every four in-game days (lightest on the CPU on large maps; flora and decor change more slowly).\n\nThis is the biggest CPU control on saturated maps — most of the per-tile work involves spawning new objects, and slowing the cycle reduces it proportionally.\n\nThis can only be changed from the main menu."
zhCN = "“Keystone多长时间评估一次每个瓷砖上应该触发哪些繁荣、装饰和衰退规则。\n\n1 = 每个游戏日一次（默认值；植物和装饰出现和被回收的速度最快）。\n4 = 每四个游戏日一次（在大地图上对CPU的负载最轻；植物和装饰变化更慢）。\n\n这是在饱和地图上对CPU的最大调整——每个瓷砖的工作主要在于生成新物体，减慢周期成比例地减少了工作量。\n\n只能从主菜单进行更改。”"
zhTW = "“Keystone 每隔多久重新評估每個區塊應觸發哪些繁榮、裝飾和消耗規則。\n\n1 = 每個遊戲日一次（默認設定；植物和裝飾出現並被回收的速度最快）。\n4 = 每四個遊戲日一次（在大型地圖上對 CPU 負擔最輕；植物和裝飾變化較慢）。\n\n這是飽和地圖上最大的 CPU 調整——每個區塊的大部分工作在於生成新物件，減慢循環速度會成比例地減少工作量。\n\n僅能從主選單更改。”"
ruRU = "Как часто Keystone переоценивает, какие цветущие растения, декорации и правила затрат должны активироваться на каждом тайле.\n\n1 = раз за игровой день (по умолчанию; флора и декор появляются и подбираются быстрее всего).\n4 = раз каждые четыре игровых дня (наименьшая нагрузка на процессор на больших картах; флора и декор меняются медленнее).\n\nЭто самый большой рычаг нагрузки на процессор на насыщенных картах — большая часть работы на каждом тайле связана с появлением новых объектов, и замедление цикла снижает это пропорционально.\n\nИзменять можно только из главного меню."
jaJP = "「キーストーンが各タイルでどのフローラ、装飾、及び損失ルールを発動させるかを再評価する頻度。\n\n1 = ゲーム内の日に1回（デフォルト; フローラと装飾が最も早く出現し回収される）。\n4 = ゲーム内の日の4日に1回（大きなマップではCPUに対して最も負担が軽い; フローラと装飾の変更がより遅くなる）。\n\nこれは飽和マップにおける最大のCPU調整要素です — 各タイルでの作業の大部分は新しいオブジェクトを生成することにあり、サイクルを遅くすることでその比率が減少します。\n\nメインメニューからのみ変更可能です。」"
frFR = "À quelle fréquence Keystone réévalue les règles concernant les floraisons, décorations et attritions qui doivent s'appliquer sur chaque tuile.\n\n1 = une fois par jour de jeu (par défaut ; la flore et les décorations apparaissent et sont récupérées le plus rapidement).\n4 = une fois tous les quatre jours de jeu (moins lourd pour le CPU sur les grandes cartes ; la flore et les décorations changent plus lentement).\n\nC'est le plus gros levier du CPU sur les cartes saturées — la plupart du travail par tuile consiste à faire apparaître de nouveaux objets, et ralentir le cycle le réduit proportionnellement.\n\nNe peut être changé que depuis le menu principal."
deDE = "Wie oft Keystone neu bewertet, welche Blüher, Dekorationen und Abnutzungsregeln auf jedem Feld aktiv werden sollen.\n\n1 = einmal pro In-Game-Tag (der Standardwert; Flora und Dekor erscheinen und werden am schnellsten zurückgeholt).\n4 = einmal alle vier In-Game-Tage (am leichtesten für die CPU auf großen Karten; Flora und Dekor wechseln langsamer).\n\nDies ist der größte CPU-Regler auf gesättigten Karten — der Großteil der Arbeiten pro Feld besteht in der Erzeugung neuer Objekte, und die Verlangsamung des Zyklus reduziert diese proportional.\n\nNur über das Hauptmenü änderbar."
plPL = "Jak często Keystone ponownie ocenia, które zasady dotyczące kwitnienia, dekoracji i utraty powinny być aktywowane na każdej płytce.\n\n1 = raz na dzień gry (domyślnie; flora i dekoracje pojawiają się i są odzyskiwane najszybciej).\n4 = raz co cztery dni gry (najmniejszy wpływ na CPU na dużych mapach; flora i dekoracje zmieniają się wolniej).\n\nTo największy wpływ na CPU na nasyconych mapach — większość pracy na poziomie płytek dotyczy generowania nowych obiektów, a spowolnienie cyklu proporcjonalnie to ogranicza.\n\nMożna zmieniać tylko z poziomu menu głównego."
ptBR = "Com que frequência o Keystone reavalia quais regras de florescimento, decoração e atrito devem ser ativadas em cada tile.\n\n1 = uma vez por dia no jogo (o padrão; a flora e a decoração aparecem e são recuperadas mais rapidamente).\n4 = uma vez a cada quatro dias no jogo (menor carga para a CPU em mapas grandes; a flora e a decoração mudam mais lentamente).\n\nEsta é a maior alavanca de CPU em mapas saturados — a maioria do trabalho por tile consiste na geração de novos objetos, e desacelerar o ciclo reduz proporcionalmente essa carga.\n\nSó é alterável a partir do menu principal."
koKR = "각 타일에서 어떤 번성, 장식 및 소모 규칙이 발동해야 하는지를 키스톤이 얼마나 자주 재평가하는지에 대한 것입니다.\n\n1 = 게임 내 하루에 한 번 (기본값; 식물과 장식이 가장 빠르게 나타나고 회수됨).\n4 = 게임 내 하루에 네 번 (대형 맵에서 CPU에 가장 가벼움; 식물과 장식이 더 천천히 변경됨).\n\n이는 포화 맵에서 가장 큰 CPU 조정 요소입니다. 대부분의 타일당 작업은 새로운 객체를 생성하는 것에 있으며, 주기를 늦추면 비례적으로 그 작업을 줄입니다.\n\n메인 메뉴에서만 변경할 수 있습니다."
csCZ = "„Jak často Keystone znovu vyhodnocuje, které květenství, dekorace a pravidla ztrát by se měla spustit na každé dlaždici.\n\n1 = jednou za herní den (výchozí nastavení; květenství a dekorace se objevují a jsou nejrychleji přijímány zpět).\n4 = jednou každé čtyři herní dny (nejmenší zátěž na CPU na velkých mapách; květenství a dekorace se mění pomaleji).\n\nTo je největší páka na CPU na saturovaných mapách — většina práce na úrovni dlaždice spočívá v generování nových objektů, a zpomalení cyklu to úměrně snižuje.\n\nLze měnit pouze z hlavního menu.“"
viVN = "Cách thường xuyên Keystone đánh giá lại các quy tắc phát triển, trang trí và hao hụt nào sẽ được kích hoạt trên mỗi ô.\n\n1 = một lần mỗi ngày trong trò chơi (mặc định; thực vật và trang trí xuất hiện và được thu hồi nhanh nhất).\n4 = một lần mỗi bốn ngày trong trò chơi (ít tiêu tốn CPU nhất trên bản đồ lớn; thực vật và trang trí thay đổi chậm hơn).\n\nĐây là yếu tố ảnh hưởng lớn nhất đến CPU trên các bản đồ bão hòa — hầu hết công việc trên từng ô là trong việc sinh ra các đối tượng mới, và làm chậm chu kỳ sẽ giảm tỷ lệ tương ứng.\n\nChỉ có thể thay đổi từ menu chính."

