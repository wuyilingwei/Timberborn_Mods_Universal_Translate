["Tool.Keystone.Stump.Description"]
raw = "Places a mature Birch, kills it, and removes its yield — leaving a harvested stump. Used to test stump-replacement logic in Class B/D spawn handlers."
status = "normal"
enUS = "Places a mature Birch, kills it, and removes its yield — leaving a harvested stump. Used to test stump-replacement logic in Class B/D spawn handlers."
zhCN = "“放置一棵成熟的桦树，砍掉它，并去除其产物——留下一个被采伐的树桩。用于测试B/D类生成处理程序中的树桩替换逻辑。”"
zhTW = "放置一棵成熟的白樺樹，將其殺死並移除其產出，留下經過收割的樹樁。用於測試B/D類生成處理器中的樹樁替換邏輯。"
ruRU = "Сажает зрелый березу, убивает ее и удаляет её урожай — оставляя срезанный пень. Используется для тестирования логики замены пней в обработчиках спавна класса B/D."
jaJP = "成熟した白樺の木を配置し、それを伐採して収穫物を取り除き、伐採された切り株を残します。クラスB/Dのスポーンハンドラーでの切り株置き換えロジックをテストするために使用されます。"
frFR = "Place un bouleau mature, le tue et enlève son rendement — laissant une souche récoltée. Utilisé pour tester la logique de remplacement de souche dans les gestionnaires de spawn de classe B/D."
deDE = "Setzt eine ausgewachsene Birke, tötet sie und entfernt ihre Erträge – übrig bleibt ein abgeernteter Stumpf. Wird verwendet, um die Logik der Stumpf-Ersetzung in den Spawn-Handlern der Klassen B/D zu testen."
plPL = "Umieszcza dojrzałą brzozę, zabija ją i usuwa jej plon — pozostawiając ścięty pień. Używane do testowania logiki zastępowania pień w obsługiwaczach spawn klasy B/D."
ptBR = "Coloca um Bétula madura, a mata e remove seu rendimento — deixando um tronco colhido. Usado para testar a lógica de substituição de troncos nos manipuladores de spawn da Classe B/D."
koKR = "성숙한 자작나무를 배치하고, 그것을 죽이며, 수확한 그루터기를 남깁니다. B/D 클래스 스폰 핸들러에서 그루터기 교체 논리를 테스트하는 데 사용됩니다."
csCZ = "Umístí zralou břízu, zabije ji a odstraní její výnos — zanechává skácenou pařez. Používá se k testování logiky výměny pařezů v spawn handlerech třídy B/D."
viVN = "Đặt một cây Bạch Dương trưởng thành, giết nó, và loại bỏ sản phẩm của nó - để lại một gốc cây đã thu hoạch. Được sử dụng để kiểm tra logic thay thế gốc cây trong các bộ xử lý sinh ra loại B/D."

