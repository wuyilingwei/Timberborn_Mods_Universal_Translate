["Tool.Keystone.Flourish.Description"]
status = "normal"
raw = "Force-places a Class B flourish appropriate to the clicked tile's biome -- bypasses the score/threshold gate the auto-spawn handler uses. Picks the biome with the highest score at the cursor (among biomes that have a registered Class B recipe) and spawns its first registered recipe. Useful for staging content without waiting for ecology dynamics to catch up."
enUS = "Force-places a Class B flourish appropriate to the clicked tile's biome -- bypasses the score/threshold gate used by the auto-spawn handler. Picks the biome with the highest score at the cursor (among biomes that have a registered Class B recipe) and spawns its first registered recipe. Useful for staging content without waiting for ecological dynamics to catch up."
zhCN = "强制放置一个与点击瓦片的生物群落相适应的B类繁荣——绕过自动生成处理程序使用的得分/阈值门。选择光标上的得分最高的生物群落（在拥有已注册B类配方的生物群落中）并生成其第一个已注册的配方。适合在不等待生态动态跟上的情况下进行内容准备。"
zhTW = "強制在點擊的瓷磚生態系上放置一個適合的B類繁榮 -- 繞過自動生成處理程序使用的分數/門檻封鎖。從光標處選擇分數最高的生態系（在擁有註冊的B類配方的生態系中），並生成其第一個註冊的配方。對於不想等待生態動態恢復的內容佈局非常有用。"
ruRU = "Принудительно размещает класс B флориш, соответствующий биому нажатой плитки -- обходит оценку/порог, используемый обработчиком автоматического появления. Выбирает биом с самым высоким баллом под курсором (среди биомов, имеющих зарегистрированный рецепт класса B) и создает его первый зарегистрированный рецепт. Полезно для подготовки контента без ожидания, пока экология не успеет."
jaJP = "クリックされたタイルのバイオームに適したクラスBのフラワッシュを強制的に配置します -- 自動発生ハンドラーが使用するスコア/閾値ゲートを回避します。カーソル上の最高得点のバイオーム（クラスBレシピが登録されているバイオームの中から）を選択し、その最初の登録レシピを生成します。エコロジーのダイナミクスが追いつくのを待たずにコンテンツをステージングするのに便利です。"
frFR = "Force-places a flourish de Classe B approprié au biome de la tuile cliquée -- contourne la porte de score/seuil utilisée par le gestionnaire d'auto-génération. Choisit le biome avec le score le plus élevé sous le curseur (parmi les biomes qui ont une recette de Classe B enregistrée) et génère sa première recette enregistrée. Utile pour mettre en scène du contenu sans attendre que la dynamique écologique rattrape."
deDE = "Zwingt einen Klasse-B-Blüh-Effekt, der zum Biome des angeklickten Feldes passt -- umgeht die Punktzahl/Schwellenwert-Grenze, die der automatische Spawn-Handler verwendet. Wählt das Biome mit der höchsten Punktzahl unter dem Cursor (unter den Biomen, die ein registriertes Klasse-B-Rezept haben) und lässt dessen erstes registriertes Rezept erscheinen. Nützlich, um Inhalte vorzubereiten, ohne auf das Ökologie-Dynamik-System warten zu müssen."
plPL = "Wymusza umiejscowienie kwitnącia klasy B odpowiedniego dla biomu klikniętej kafelki -- omija bramkę punktową/threshold, której używa automatyczny mechanizm generowania. Wybiera biomy z najwyższą punktacją przy kursorsie (wśród biomów, które mają zarejestrowany przepis klasy B) i generuje jego pierwszy zarejestrowany przepis. Przydatne do przygotowywania zawartości bez czekania, aż dynamika ekosystemu nadgoni."
ptBR = "Força a colocação de um floreio de Classe B apropriado ao bioma do tile clicado -- contorna o portão de pontuação/limite que o manipulador de auto-spawn utiliza. Escolhe o bioma com a maior pontuação no cursor (entre biomas que têm uma receita de Classe B registrada) e gera sua primeira receita registrada. Útil para preparar conteúdos sem esperar que as dinâmicas ecológicas se adaptem."
koKR = "클릭한 타일의 생물군계에 적합한 B급 장식을 강제로 배치합니다. 자동 스폰 핸들러가 사용하는 점수/임계값 게이트를 우회합니다. 커서에서 가장 높은 점수를 가진 생물군계(등록된 B급 레시피가 있는 생물군계 중)를 선택하고 처음 등록된 레시피를 생성합니다. 생태 역학이 따라오는 것을 기다리지 않고 콘텐츠를 구성하는 데 유용합니다."
csCZ = "Násilně umístí květinovou dekoraci třídy B odpovídající biotopu kliknutého dlaždice -- obchází bránu skóre/thresholdu, kterou používá automatický spouštěč. Vybere biotop s nejvyšším skóre pod kurzorem (mezi biotopy, které mají registrovaný recept třídy B) a spustí jeho první registrovaný recept. Užitečné pro scénářování obsahu, aniž by se čekalo na to, až se ekologická dynamika přizpůsobí."
viVN = "Đặt một yếu tố hào nhoáng lớp B phù hợp với vùng sinh thái của ô được nhấp -- bỏ qua cổng điểm/ngưỡng mà trình xử lý tự động sinh ra sử dụng. Chọn khu vực sinh thái có điểm số cao nhất tại con trỏ (trong số các khu vực sinh thái có công thức lớp B đã được đăng ký) và sinh ra công thức đã đăng ký đầu tiên của nó. Hữu ích cho việc chuẩn bị nội dung mà không cần chờ đợi động lực sinh thái."

