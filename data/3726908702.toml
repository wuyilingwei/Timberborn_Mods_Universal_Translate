["Keystone.Settings.Flora.GrowthBonus.Tooltip"]
raw = "Maximum growth-speed bonus for plants in a healthy biome. Trees grow faster in forests, water plants in wetlands.\n\n0% disables the bonus entirely.\n30% is the default (up to 30% faster growth at full biome health).\n100% allows up to double growth speed."
status = "normal"
enUS = "Maximum growth-speed bonus for plants in a healthy biome. Trees grow faster in forests, water plants in wetlands.\n\n0% disables the bonus entirely.\n30% is the default (up to 30% faster growth at full biome health).\n100% allows up to double growth speed."
zhCN = "“健康生物群落中植物的最大生长速度加成。树木在森林中生长更快，水生植物在湿地中生长。\n\n0% 完全禁用加成。\n30% 为默认值（在生物群落健康状态下最多可实现 30% 的更快生长）。\n100% 允许最高达到双倍生长速度。”"
zhTW = "植物在健康生態區內的最大生長速度獎勵。樹木在森林中生長更快，水生植物在濕地中生長。\n\n0% 完全禁用獎勵。\n30% 為預設值（在生態區健康狀態下最多可達 30% 更快的生長）。\n100% 允許生長速度最高達到雙倍。"
ruRU = "Максимальная скорость роста бонуса для растений в здоровом биоме. Деревья растут быстрее в лесах, водные растения в заболоченных местах.\n\n0% полностью отключает бонус.\n30% - это значение по умолчанию (до 30% быстрее роста при полном здоровье биома).\n100% позволяет удвоить скорость роста."
jaJP = "「健全な生態系における植物の成長スピードボーナスの最大値。森林では木が速く成長し、湿地では水生植物が速く成長します。\n\n0%はボーナスを完全に無効にします。\n30%がデフォルト（生態系が完全な健康状態で最大30%速く成長）。\n100%で成長速度が最大で2倍になります。」"
frFR = "Bonus de vitesse de croissance maximum pour les plantes dans un biome sain. Les arbres poussent plus vite dans les forêts, les plantes aquatiques dans les zones humides.\n\n0% désactive complètement le bonus.\n30% est la valeur par défaut (jusqu'à 30% de croissance plus rapide à la santé totale du biome).\n100% permet de doubler la vitesse de croissance."
deDE = "Maximaler Wachstumsbonus für Pflanzen in einem gesunden Biome. Bäume wachsen schneller in Wäldern, Wasserpflanzen in Feuchtgebieten.\n\n0% deaktiviert den Bonus vollständig.\n30% ist der Standard (bis zu 30% schnelleres Wachstum bei voller Biome-Gesundheit).\n100% erlaubt bis zu doppelte Wachstumsrate."
plPL = " maksymalny bonus do prędkości wzrostu roślin w zdrowym biomie. Drzewa rosną szybciej w lasach, rośliny wodne w terenach podmokłych.\n\n0% całkowicie wyłącza bonus.\n30% to domyślna wartość (do 30% szybszy wzrost przy pełnym zdrowiu biomu).\n100% pozwala na podwojenie prędkości wzrostu."
ptBR = "Bônus máximo de velocidade de crescimento para plantas em um bioma saudável. As árvores crescem mais rápido em florestas, plantas aquáticas em áreas úmidas.\n\n0% desativa completamente o bônus.\n30% é o padrão (até 30% de crescimento mais rápido com a saúde completa do bioma).\n100% permite até o dobro da velocidade de crescimento."
koKR = "건강한 생태계에서 식물의 최대 성장 속도 보너스입니다. 숲에서는 나무가 더 빨리 자라고, 습기 있는 땅에서는 수생 식물이 자랍니다.\n\n0%는 보너스를 완전히 비활성화합니다.\n30%는 기본값이며 (생태계 건강이 완전할 경우 최대 30% 더 빠른 성장).\n100%는 최대 두 배의 성장 속도를 허용합니다."
csCZ = "Maximální bonus k rychlosti růstu pro rostliny ve zdravém biotopu. Stromy rostou rychleji v lesích, vodní rostliny ve vlhkých oblastech.\n\n0 % zcela zakazuje bonus.\n30 % je výchozí (až 30 % rychlejší růst při plném zdraví biotopu).\n100 % umožňuje až dvojnásobnou rychlost růstu."
viVN = "Thưởng tốc độ phát triển tối đa cho cây trong một sinh thái lành mạnh. Cây phát triển nhanh hơn trong rừng, cây thủy sinh trong vùng đất ngập nước.\n\n0% loại bỏ hoàn toàn thưởng.\n30% là mặc định (tăng tốc độ phát triển lên đến 30% khi sinh thái ở trạng thái khỏe mạnh).\n100% cho phép tốc độ phát triển gấp đôi."

