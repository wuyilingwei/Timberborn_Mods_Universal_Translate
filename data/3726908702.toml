["Keystone.Settings.Flora.BushDensity.Tooltip"]
raw = "How many wild bushes (blueberry, dandelion) appear as part of each biome.\n\nBushes are planted by the forester and persist after harvest.\n\n0% removes them entirely.\n100% is the default amount.\n200% doubles the amount."
status = "normal"
enUS = "How many wild bushes (blueberry, dandelion) appear as part of each biome.\n\nBushes are planted by the forester and persist after harvest.\n\n0% removes them entirely.  \n100% is the default amount.  \n200% doubles the amount."
zhCN = "“每个生物群落中会出现多少野生灌木（蓝莓、蒲公英）。\n\n灌木由伐木工人种植，收获后仍会保留。\n\n0% 完全移除它们。\n100% 是默认数量。\n200% 是数量的两倍。”"
zhTW = "“每個生態系統中會出現多少野生灌木（藍莓、蒲公英）。\n\n灌木由樹藝師種植，收割後仍然存在。\n\n0% 完全移除它們。\n100% 為預設數量。\n200% 使數量翻倍。”"
ruRU = "Сколько диких кустарников (черника, одуванчик) появляется в каждом биоме.\n\nКустарники высаживаются лесником и сохраняются после сбора урожая.\n\n0% полностью убирает их.\n100% — это стандартное количество.\n200% удваивает количество."
jaJP = "各バイオームにどれくらいの野生の低木（ブルーベリー、タンポポ）が出現するか。\n\n低木は造林士によって植えられ、収穫後も残ります。\n\n0%は完全に取り除きます。\n100%がデフォルトの量です。\n200%はその量を倍増させます。"
frFR = "Combien de buissons sauvages (myrtilles, pissenlits) apparaissent comme partie de chaque biome.\n\nLes buissons sont plantés par le forestier et persistent après la récolte.\n\n0 % les supprime complètement.\n100 % est la quantité par défaut.\n200 % double la quantité."
deDE = "Wie viele wilde Büsche (Heidelbeere, Löwenzahn) als Teil jedes Bioms erscheinen.\n\nBüsche werden vom Förster gepflanzt und bleiben nach der Ernte erhalten.\n\n0% entfernt sie vollständig.\n100% ist die Standardmenge.\n200% verdoppelt die Menge."
plPL = "Ile dzikich krzewów (borówki, mniszek lekarski) pojawia się w każdym biomie. \n\nKrzewy są sadzone przez leśnika i utrzymują się po zbiorach.\n\n0% całkowicie je usuwa. \n100% to domyślna ilość. \n200% podwaja ilość."
ptBR = "Quantos arbustos selvagens (mirtilo, dente-de-leão) aparecem como parte de cada bioma.\n\nOs arbustos são plantados pelo madeireiro e persistem após a colheita.\n\n0% os remove completamente.\n100% é a quantidade padrão.\n200% dobra a quantidade."
koKR = "각 생물 군계에 얼마나 많은 야생 덤불(블루베리, 민들레)이 나타나는지를 나타냅니다.\n\n덤불은 산림 관리자가 심으며 수확 후에도 유지됩니다.\n\n0%는 덤불을 완전히 제거합니다.\n100%는 기본 양입니다.\n200%는 양을 두 배로 늘립니다."
csCZ = "Kolik divokých keřů (borůvka, pampeliška) se objevuje v každém biomu.\n\nKeře jsou zasazeny lesníkem a přetrvávají po sklizni.\n\n0 % je zcela odstraní.\n100 % je výchozí množství.\n200 % zdvojnásobí množství."
viVN = "Số lượng bụi cây hoang dã (việt quất, bồ công anh) xuất hiện trong mỗi hệ sinh thái.\n\nBụi cây được trồng bởi người quản lý rừng và tồn tại sau khi thu hoạch.\n\n0% sẽ loại bỏ chúng hoàn toàn.\n100% là lượng mặc định.\n200% gấp đôi lượng."

