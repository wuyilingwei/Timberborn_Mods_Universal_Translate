["Tool.Keystone.CrossFactionFlora.Description"]
raw = "Spawns a Class D natural resource: vanilla flora from the OTHER faction (CoffeeBush in a Folktails game, Maple in IronTeeth). Plantable / Gatherable specs are stripped by Keystone's faction-strip patch so the active faction's UIs don't crash on it."
status = "normal"
enUS = "Spawns a Class D natural resource: vanilla flora from the OTHER faction (CoffeeBush in a Folktails game, Maple in IronTeeth). Plantable / Gatherable specifications are removed by Keystone's faction-strip patch to prevent crashes in the active faction's UIs."
zhCN = "生成一种D级自然资源：来自另一个派系的香草植物（在Folktails游戏中为咖啡灌木，在IronTeeth中为枫树）。可种植/可收集的规范被Keystone的派系剥离补丁 stripped，因此活动派系的用户界面不会因其崩溃。"
zhTW = "生成一種D級自然資源：來自另一個派系的香草植物（在民話派遊戲中的咖啡灌木，鋼牙派中的楓樹）。由於Keystone的派系去除補丁，種植/採集規格被刪除，以防止當前派系的UI因其崩潰。"
ruRU = "Создает природный ресурс класса D: ванильную флору из ДРУГОЙ фракции (Кофейный куст в игре Фолктейлс, Клён в Железных Зубах). Спецификации для посадки / сбора удаляются патчем Keystone для разделения фракций, чтобы пользовательские интерфейсы активной фракции не зависали на этом."
jaJP = "クラスDの自然資源を生成します：別の派閥からのバニラ植物（フォークテイルズのゲームではコーヒーの木、アイアンティースではカエデ）。植えられる/収穫可能の仕様は、Keystoneのファクションストリップパッチによって削除され、アクティブ派閥のUIがクラッシュしないようになっています。"
frFR = "Fait apparaître une ressource naturelle de classe D : flore vanille de l'AUTRE faction (Café en jeu Folktails, Érable en IronTeeth). Les spécifications plantables / récoltables sont supprimées par le patch de séparation de faction de Keystone afin que les interfaces utilisateur de la faction active ne plantent pas."
deDE = "Erzeugt eine natürliche Ressource der Klasse D: Vanilleflora von der ANDEREN Fraktion (Kaffeebusch in einem Folktails-Spiel, Ahorn bei IronTeeth). Pflanzbare / Sammelbare Spezifikationen werden durch den Fraktionsentfernungs-Patch von Keystone entfernt, damit die UIs der aktiven Fraktion nicht abstürzen."
plPL = "Generuje naturalny zasób klasy D: waniliowa flora z INNEJ frakcji (CoffeeBush w grze Folktails, Maple w IronTeeth). Specyfikacje dotyczące sadzenia / zbierania są usuwane przez łatkę frakcyjną Keystone, aby interfejsy użytkownika aktywnej frakcji nie zawieszały się na tym."
ptBR = "Cria um recurso natural de Classe D: flora de baunilha da OUTRA facção (Café em um jogo de Folktails, Bordo em IronTeeth). As especificações de plantação / coleta são removidas pelo patch de remoção de facção do Keystone para que as UIs da facção ativa não deem erro."
koKR = "클래스 D 자연 자원을 소환합니다: 다른 진영의 바닐라 식물 (Folktails 게임에서의 커피 덤불, IronTeeth의 단풍 나무). 심거나 수확할 수 있는 사양은 Keystone의 진영 스트립 패치에 의해 제거되어 활성 진영의 UI가 충돌하지 않습니다."
csCZ = "Vytváří přírodní zdroj třídy D: vanilkovou flóru z ODPORU (Kávový keř ve hře Folktails, Javor v IronTeeth). Specifikace, které lze zasazovat/sbírat, jsou odstraněny patchem Keystone pro odstranění frakce, aby se uživatelská rozhraní aktivní frakce na tomto neporušila."
viVN = "Tạo ra một nguồn tài nguyên tự nhiên Loại D: thực vật vani từ phe KHÁC (Cà phê trong trò chơi Folktails, Cây phong trong IronTeeth). Các thông số có thể trồng / thu hoạch đã bị loại bỏ bởi bản vá tách phe của Keystone để các giao diện của phe đang hoạt động không bị lỗi khi gặp phải."

