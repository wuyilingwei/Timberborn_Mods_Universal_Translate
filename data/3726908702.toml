["Tool.Keystone.RockCluster.Description"]
status = "normal"
raw = "Spawns a random KeystoneRockCluster* inanimate Class C blueprint at the cursor. No lifecycle (rocks don't wither); runtime biome-driven re-tint via KeystoneRockTint adjusts material to mossy / dry / default based on the tile's dominant biome. Bypasses the Class C recipe gate so the cluster lands regardless of biome+level conditions -- useful for verifying tint behaviour across biomes."
enUS = "Spawns a random KeystoneRockCluster* inanimate Class C blueprint at the cursor. No lifecycle (rocks don't wither); runtime biome-driven re-tint via KeystoneRockTint adjusts material to mossy / dry / default based on the tile's dominant biome. Bypasses the Class C recipe gate so the cluster lands regardless of biome+level conditions -- useful for verifying tint behavior across biomes."
zhCN = "“在光标位置生成一个随机的KeystoneRockCluster* 静态C类蓝图。没有生命周期（岩石不会枯萎）；通过KeystoneRockTint的运行时生物群落驱动重新着色，根据瓦片的主要生物群落将材料调整为苔藓/干燥/默认。绕过C类配方门槛，因此无论生物群落和等级条件如何，集群都会落下——对于验证不同生物群落之间的着色行为非常有用。”"
zhTW = "在光標處生成一個隨機的KeystoneRockCluster*靜態C類藍圖。無生命周期（岩石不會枯萎）；通過KeystoneRockTint進行運行時的生物群落驅動重新著色，根據地塊的主導生物群落將材料調整為苔蘚狀/乾燥/默認。繞過C類食譜門檻，因此集群無論在生物群落+等級條件下都會降落——有助於檢查跨生物群落的著色行為。"
ruRU = "Создает случайный инертный чертеж Кластера Скалы KeystoneRockCluster* класса C на курсоре. Нет жизненного цикла (камни не увядают); изменение цвета материала в реальном времени, управляемое биомом через KeystoneRockTint, корректирует материал на мохнатый / сухой / стандартный в зависимости от доминирующего биома плитки. Обходит рецепт класса C, так что кластер появляется независимо от условий биома и уровня — полезно для проверки поведения цвета в разных биомах."
jaJP = "「カーソル上にランダムなKeystoneRockCluster*不動クラスCの設計図を生成します。ライフサイクルはありません（岩は枯れません）；KeystoneRockTintによるランタイムのバイオーム駆動の再着色が、タイルの優勢なバイオームに基づいて素材を苔生した状態/乾燥した状態/デフォルトに調整します。クラスCのレシピゲートをバイパスし、バイオームやレベル条件に関わらずクラスターが配置されるため、バイオーム全体の色合いの挙動を確認するのに便利です。」"
frFR = "Fait apparaître un blueprint inanimé de classe C KeystoneRockCluster* au niveau du curseur. Pas de cycle de vie (les roches ne se flétrissent pas) ; le changement de teinte en temps réel, basé sur le biome via KeystoneRockTint, ajuste le matériau en fonction du biome dominant de la tuile : mousseux / sec / par défaut. Contourne la porte de recette de classe C afin que le cluster apparaisse indépendamment des conditions de biome+niveau -- utile pour vérifier le comportement de teinte à travers les biomes."
deDE = "Spawnt ein zufälliges KeystoneRockCluster* in der Klasse C als Blueprint am Cursor. Kein Lebenszyklus (Steine verwelken nicht); die runtime biomegesteuerte Neufärbung über KeystoneRockTint passt das Material an moosig / trocken / standardmäßig basierend auf dem vorherrschenden Biome des Feldes an. Umgeht das Rezepttor der Klasse C, sodass der Cluster unabhängig von Biome- und Levelbedingungen landet - nützlich zur Überprüfung des Farbverhaltens in verschiedenen Biomen."
plPL = "Generuje losowy KeystoneRockCluster* nieożywiony plan klasy C w miejscu kursora. Brak cyklu życia (kamienie nie więdną); dynamiczna zmiana koloru w zależności od biomu za pomocą KeystoneRockTint dostosowuje materiał do wilgotnego/suchego/domyslnego w zależności od dominującego biomu na kafelku. Omija ograniczenia receptury klasy C, dzięki czemu klaster ląduje niezależnie od warunków biomu i poziomu – przydatne do weryfikacji zachowania koloru w różnych biomach."
ptBR = "Spawn uma KeystoneRockCluster* aleatória em um blueprint inanimado da Classe C na posição do cursor. Sem ciclo de vida (as pedras não murcham); re-tintura dinâmica baseada no bioma via KeystoneRockTint ajusta o material para musgoso/seco/padrão com base no bioma dominante do tile. Ignora o portal da receita da Classe C para que o cluster apareça independentemente das condições de bioma+nível -- útil para verificar o comportamento da tintura em diferentes biomas."
koKR = "커서 위치에 무작위 KeystoneRockCluster* 비활성 클래스 C 청사진을 생성합니다. 생명 주기가 없습니다(바위가 시들지 않음); KeystoneRockTint를 통한 실행 중 생물군계 기반 재채색이 타일의 주요 생물군계에 따라 재료를 이끼 낀 / 건조 / 기본 상태로 조정합니다. 생물군계 + 레벨 조건에 관계없이 클러스터가 생성될 수 있도록 클래스 C 레시피 제한을 우회합니다 -- 생물군계 전반에 걸쳐 색조 동작을 확인하는 데 유용합니다."
csCZ = "Vytvoří náhodnou nehybnou položku KeystoneRockCluster* v plánu třídy C na kurzoru. Žádný životní cyklus (skály nehybnou); barevné přizpůsobení během běhu řízené biomy pomocí KeystoneRockTint upravuje materiál na mechy / suché / výchozí na základě dominantního biomu dlaždice. Obchází bránu receptu třídy C, takže shluk se objeví bez ohledu na podmínky biomu+úrovně -- užitečné pro ověřování chování barev napříč biomy."
viVN = "Tạo ra một bản vẽ lớp C vô hình KeystoneRockCluster* ngẫu nhiên tại vị trí con trỏ. Không có vòng đời (đá không héo); thay đổi màu sắc theo sinh thái động trong thời gian thực thông qua KeystoneRockTint điều chỉnh vật liệu thành màu rêu / khô / mặc định dựa trên sinh thái chiếm ưu thế của ô đất. Bỏ qua cổng công thức lớp C để cụm đá có thể xuất hiện bất kể điều kiện sinh thái + cấp độ -- hữu ích để xác minh hành vi tẩy màu qua các sinh thái."

