["Keystone.Settings.Effects.FoggyMorningFrequency.Tooltip"]
raw = "How often a misty morning rolls in over wetland areas.\n\nOff — no foggy mornings ever.\nRare — roughly once a week.\nSometimes — about one in four mornings (the default).\nOften — about half of all mornings.\nAlways — every morning.\n\nOnly affects wetlands."
status = "normal"
enUS = "How often a misty morning rolls in over wetland areas.\n\nOff — no foggy mornings ever.\nRare — roughly once a week.\nSometimes — about one in four mornings (the default).\nOften — about half of all mornings.\nAlways — every morning.\n\nOnly affects wetlands."
zhCN = "“雾蒙蒙的早晨在湿地区域出现的频率。\n\n关闭 — 从不出现雾蒙蒙的早晨。\n稀少 — 每周大约一次。\n有时 — 每四个早晨中大约一次（默认设置）。\n经常 — 大约每两个早晨中一次。\n总是 — 每个早晨。\n\n仅影响湿地。”"
zhTW = "「霧霭清晨在濕地區域出現的頻率。\n\n關閉 — 從不出現霧霭清晨。\n稀有 — 大約每週一次。\n有時 — 約每四個早晨出現一次（默認值）。\n經常 — 大約每個早晨一半的次數。\n總是 — 每個早晨都會出現。\n\n僅影響濕地。」"
ruRU = "Как часто над влажными территориями возникает туманное утро.\n\nОтключено — туманных утр никогда не бывает.\nРедко — примерно раз в неделю.\nИногда — примерно каждое четвертое утро (по умолчанию).\nЧасто — примерно каждое второе утро.\nВсегда — каждое утро.\n\nВлияет только на влажные территории."
jaJP = "湿地エリアに霧の朝が訪れる頻度。\n\nオフ — 霧の朝は一切なし。\n稀 — 週に約一度。\n時々 — 約四分の一の朝（デフォルト）。\n頻繁 — すべての朝の約半分。\n常に — 毎朝。\n\n湿地にのみ影響します。"
frFR = "À quelle fréquence un matin brumeux se manifeste-t-il sur les zones humides.\n\nDésactivé — jamais de matins brumeux.\nRare — environ une fois par semaine.\nParfois — environ un matin sur quatre (la valeur par défaut).\nSouvent — environ la moitié des matins.\nToujours — chaque matin.\n\nN'affecte que les zones humides."
deDE = "Wie oft ein nebliger Morgen über Feuchtgebiete zieht.\n\nAus — keine nebligen Morgen.\nSelten — ungefähr einmal pro Woche.\nManchmal — etwa an jedem vierten Morgen (der Standard).\nOft — an ungefähr der Hälfte aller Morgen.\nImmer — jeden Morgen.\n\nBetroffen sind nur Feuchtgebiete."
plPL = "„Jak często mglista poranna aura pojawia się nad terenami podmokłymi.\n\nWyłączone — nigdy nie ma mglistych poranków.\nRzadko — mniej więcej raz w tygodniu.\nCzasami — około jeden na cztery poranki (wartość domyślna).\nCzęsto — około połowy wszystkich poranków.\nZawsze — każdego poranka.\n\nDotyczy tylko terenów podmokłych.”"
ptBR = "Com que frequência uma manhã nevoenta aparece sobre áreas de pântano.\n\nDesligado — nunca há manhãs nevoentas.\nRaro — aproximadamente uma vez por semana.\nÀs vezes — cerca de uma em quatro manhãs (o padrão).\nFrequentemente — cerca da metade de todas as manhãs.\nSempre — todas as manhãs.\n\nApenas afeta pântanos."
koKR = "안개 낀 아침이 습기 있는 지역에 얼마나 자주 찾아오는지에 대한 설정입니다.\n\n끄기 — 안개 낀 아침이 전혀 없습니다.\n드물게 — 대략 주 1회 발생합니다.\n가끔 — 매 4번째 아침 정도 (기본값).\n자주 — 모든 아침의 약 절반.\n항상 — 매일 아침.\n\n오직 습기 있는 지역에만 영향을 미칩니다."
csCZ = "Jak často přichází mlhavé ráno nad mokřady.\n\nVypnuto — žádná mlhavá rána nikdy.\nZřídka — přibližně jednou týdně.\nNěkdy — přibližně jednou za čtyři rána (výchozí nastavení).\nČasto — přibližně každé druhé ráno.\nVždy — každé ráno.\n\nOvlivňuje pouze mokřady."
viVN = "Tần suất buổi sáng sương mù xuất hiện ở các khu vực vệ sinh.\n\nTắt — không có buổi sáng sương mù nào.\nHiếm — khoảng một lần mỗi tuần.\nĐôi khi — khoảng một trong bốn buổi sáng (mặc định).\nThường xuyên — khoảng một nửa số buổi sáng.\nLuôn luôn — mỗi buổi sáng.\n\nChỉ ảnh hưởng đến các khu vực vệ sinh."

