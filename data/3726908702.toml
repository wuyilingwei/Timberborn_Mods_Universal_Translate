["Tool.Keystone.Rock.Description"]
status = "normal"
raw = "Spawns a Class A decoration cloning the Keystone-original Rock_medium_1 blueprint. End-to-end smoke test of the custom-mesh pipeline: Quaternius FBX -> Blender -> .timbermesh -> TimbermeshSpec -> KeystoneMaterialProvider resolves the KeystoneRock material -> rendered in-game. Retired once Class C rock spawning is wired through the recipe system."
enUS = "Spawns a Class A decoration that clones the Keystone-original Rock_medium_1 blueprint. End-to-end smoke test of the custom-mesh pipeline: Quaternius FBX -> Blender -> .timbermesh -> TimbermeshSpec -> KeystoneMaterialProvider resolves the KeystoneRock material -> rendered in-game. Retired once Class C rock spawning is connected through the recipe system."
zhCN = "生成一个A类装饰，克隆Keystone原版的Rock_medium_1蓝图。定制网格管线的端到端烟雾测试：Quaternius FBX -> Blender -> .timbermesh -> TimbermeshSpec -> KeystoneMaterialProvider解析KeystoneRock材料 -> 在游戏中渲染。一旦C类岩石生成通过食谱系统连接则停止使用。"
zhTW = "生成一個類別 A 裝飾，複製 Keystone 原版 Rock_medium_1 藍圖。自定義網格管道的端到端煙霧測試：Quaternius FBX -> Blender -> .timbermesh -> TimbermeshSpec -> KeystoneMaterialProvider 確定 KeystoneRock 材料 -> 在遊戲中渲染。當類別 C 岩石生成通過食譜系統連接後退役。"
ruRU = "Создаёт декорацию класса A, копирующую оригинальный чертёж Keystone-rock_medium_1. Комплексное тестирование пользовательского пайплайна сетки: Quaternius FBX -> Blender -> .timbermesh -> TimbermeshSpec -> KeystoneMaterialProvider разрешает материал KeystoneRock -> отображается в игре. Выведен из обращения после того, как спавн камней класса C будет подключён через систему рецептов."
jaJP = "クラスAの装飾を生成し、KeystoneオリジナルのRock_medium_1の設計図を複製します。カスタムメッシュパイプラインのエンドツーエンドのスモークテスト：Quaternius FBX -> Blender -> .timbermesh -> TimbermeshSpec -> KeystoneMaterialProviderがKeystoneRockマテリアルを解決し、ゲーム内でレンダリングされます。レシピシステムを介してクラスCの岩の生成が配線された後、引退します。"
frFR = "Génère une décoration de classe A clonant le plan original Rock_medium_1 de Keystone. Test de validation de bout en bout du pipeline de maillage personnalisé : Quaternius FBX -> Blender -> .timbermesh -> TimbermeshSpec -> KeystoneMaterialProvider résout le matériau KeystoneRock -> rendu en jeu. Retiré une fois que la génération de roches de classe C est intégrée au système de recettes."
deDE = "Generiert eine Klasse-A-Dekoration, die die Keystone-originale Rock_medium_1-Bauplan klont. End-to-End-Rauchtstests der benutzerdefinierten Mesh-Pipeline: Quaternius FBX -> Blender -> .timbermesh -> TimbermeshSpec -> KeystoneMaterialProvider löst das KeystoneRock-Material -> wird im Spiel gerendert. Wird eingestellt, sobald das Klonen von Klasse-C-Steinen über das Rezeptsystem verbunden ist."
plPL = "Generuje dekorację klasy A, klonującą oryginalny blueprint Rock_medium_1 z Keystone. Test end-to-end pipeline'u custom-mesh: Quaternius FBX -> Blender -> .timbermesh -> TimbermeshSpec -> KeystoneMaterialProvider rozwiązuje materiał KeystoneRock -> renderowane w grze. Wycofano, gdy generowanie skały klasy C zostanie połączone z systemem przepisów."
ptBR = "Gera uma decoração Classe A que clona o blueprint Rock_medium_1 original do Keystone. Teste de fumaça de ponta a ponta do pipeline de malha personalizada: Quaternius FBX -> Blender -> .timbermesh -> TimbermeshSpec -> KeystoneMaterialProvider resolve o material KeystoneRock -> renderizado no jogo. Aposentado uma vez que o aparecimento de rochas Classe C seja integrado ao sistema de receitas."
koKR = "클래스 A 장식을 생성하여 Keystone-original Rock_medium_1 설계를 복제합니다. 사용자 지정 메시 파이프라인의 엔드 투 엔드 스모크 테스트: Quaternius FBX -> Blender -> .timbermesh -> TimbermeshSpec -> KeystoneMaterialProvider가 KeystoneRock 재료를 해석합니다 -> 게임 내에서 렌더링됩니다. 클래스 C 바위 생성이 조리법 시스템을 통해 연결되면 사용 중단됩니다."
csCZ = "Vytváří dekoraci třídy A, která klonuje původní blueprint Keystone-rock_medium_1. Test end-to-end pro vlastní mesh pipeline: Quaternius FBX -> Blender -> .timbermesh -> TimbermeshSpec -> KeystoneMaterialProvider vyřeší materiál KeystoneRock -> zobrazeno ve hře. Vyřazeno, jakmile je generování třídy C rock propojeno přes systém receptů."
viVN = "Tạo ra một trang trí loại A sao chép bản thiết kế Rock_medium_1 gốc của Keystone. Kiểm tra khói đầu cuối cho quy trình tùy chỉnh: Quaternius FBX -> Blender -> .timbermesh -> TimbermeshSpec -> KeystoneMaterialProvider giải quyết vật liệu KeystoneRock -> được hiển thị trong trò chơi. Ngừng hoạt động khi việc sinh đá loại C được kết nối qua hệ thống công thức."

