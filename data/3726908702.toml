["Keystone.Settings.Flora.NewGameWarmup.Tooltip"]
raw = "NEW GAMES ONLY — this setting has no effect on loaded saves.\n\nSimulates this many days of ecosystem development when starting a new settlement.\n\n0 = start from scratch — biomes build up from nothing over the first few game-days.\n3 = the default — basic biomes are established and visible from the start.\n7 = mature ecosystem — higher-level biomes are well underway from day one."
status = "normal"
enUS = "NEW GAMES ONLY — this setting has no effect on loaded saves.\n\nSimulates this many days of ecosystem development when starting a new settlement.\n\n0 = start from scratch — biomes build up from nothing over the first few game-days.\n3 = the default — basic biomes are established and visible from the start.\n7 = mature ecosystem — higher-level biomes are well underway from day one."
zhCN = "仅限新游戏 - 此设置对加载的存档没有影响。\n\n在开始新的定居点时模拟这种数量的生态系统发展天数。\n\n0 = 从头开始 - 生物群落在游戏的前几天从无到有。\n3 = 默认设置 - 基本生物群落从一开始就建立并可见。\n7 = 成熟的生态系统 - 从第一天起，高级生物群落已经在进行中。"
zhTW = "僅限新遊戲—此設置對已加載的存檔無效。\n\n在開始新定居點時模擬這麼多天的生態系統發展。\n\n0 = 從頭開始—生物群系在遊戲的最初幾天內從無到有建立起來。\n3 = 預設值—基本生物群系從一開始就建立並可見。\n7 = 成熟的生態系統—從第一天起高級生物群系已經在穩步發展。"
ruRU = "ТОЛЬКО НОВЫЕ ИГРЫ — эта настройка не влияет на загруженные сохранения.\n\nСимулирует такое количество дней развития экосистемы при создании нового поселения.\n\n0 = начать с нуля — биомы формируются с нуля в первые несколько игровых дней.\n3 = по умолчанию — основные биомы создаются и видны с самого начала.\n7 = зрелая экосистема — высокоуровневые биомы развиваются с первого дня."
jaJP = "新しいゲームのみ — この設定は読み込まれたセーブには影響しません。\n\n新しい定住地を開始するときに、これだけの日数の生態系の発展をシミュレートします。\n\n0 = 最初から開始 — 最初の数日間でバイオームは何もない状態から構築されます。\n3 = デフォルト — 基本的なバイオームが確立され、最初から視覚的に表示されます。\n7 = 成熟した生態系 — 高レベルのバイオームが初日から進行しています。"
frFR = "NOUVEAUX JEUX SEULEMENT — ce paramètre n’a aucun effet sur les sauvegardes chargées.\n\nSimule ce nombre de jours de développement de l’écosystème lors du démarrage d’un nouveau règlement.\n\n0 = commencer à zéro — les biomes se développent à partir de rien au cours des premiers jours de jeu.\n3 = la valeur par défaut — des biomes de base sont établis et visibles dès le départ.\n7 = écosystème mature — des biomes de niveau supérieur sont bien avancés dès le premier jour."
deDE = "NEUE SPIELE NUR — diese Einstellung hat keine Auswirkungen auf geladene Speicherstände.\n\nSimuliert so viele Tage der Entwicklung des Ökosystems beim Start einer neuen Siedlung.\n\n0 = von Grund auf neu beginnen — Biome bauen sich in den ersten Spieltagen aus dem Nichts auf.\n3 = die Standardeinstellung — grundlegende Biome werden von Anfang an etabliert und sind sichtbar.\n7 = reifes Ökosystem — höherstufige Biome sind ab dem ersten Tag gut entwickelt."
plPL = "NOWE GRY TYLKO — to ustawienie nie ma efektu na załadowane zapisy.\n\nSymuluje tę liczbę dni rozwoju ekosystemu podczas rozpoczynania nowego osiedla.\n\n0 = zacznij od zera — biomy rozwijają się od niczego przez pierwsze kilka dni gry.\n3 = ustawienie domyślne — podstawowe biomy są ustanowione i widoczne od początku.\n7 = dojrzały ekosystem — wyższe poziomy biomów są na dobrej drodze od dnia pierwszego."
ptBR = "SOMENTE NOVOS JOGOS — esta configuração não tem efeito em partidas salvas carregadas.\n\nSimula este número de dias de desenvolvimento do ecossistema ao iniciar um novo assentamento.\n\n0 = começar do zero — biomas se desenvolvem a partir do nada nos primeiros dias de jogo.\n3 = o padrão — biomas básicos são estabelecidos e visíveis desde o início.\n7 = ecossistema maduro — biomas de níveis mais altos estão em desenvolvimento desde o primeiro dia."
koKR = "새 게임 전용 — 이 설정은 로드된 저장 파일에 영향을 미치지 않습니다.\n\n새 정착지를 시작할 때 이만큼의 생태계 발달을 시뮬레이션합니다.\n\n0 = 처음부터 시작 — 처음 몇 게임일 동안 생태계가 아무것도 없이 형성됩니다.\n3 = 기본값 — 기본 생태계가 설정되고 시작부터 볼 수 있습니다.\n7 = 성숙한 생태계 — 고급 생태계가 첫날부터 잘 진행됩니다."
csCZ = "POUZE NOVÉ HRY — toto nastavení nemá vliv na načtené úložiště.\n\nSimuluje tolik dní vývoje ekosystému při zakládání nové osady.\n\n0 = začít od nuly — biomy se vyvíjejí od ničeho během prvních několika herních dnů.\n3 = výchozí — základní biomy jsou zřízeny a viditelné od začátku.\n7 = zralý ekosystém — biomy vyšší úrovně jsou rozvinuty od prvního dne."
viVN = "CHỈ TÀI KHOẢN MỚI — cài đặt này không ảnh hưởng đến các bản lưu đã tải.\n\nMô phỏng số ngày phát triển hệ sinh thái này khi bắt đầu một khu định cư mới.\n\n0 = bắt đầu từ đầu — các sinh cảnh hình thành từ số không trong vài ngày đầu của trò chơi.\n3 = mặc định — các sinh cảnh cơ bản được thiết lập và nhìn thấy ngay từ đầu.\n7 = hệ sinh thái trưởng thành — các sinh cảnh cấp cao đang phát triển tốt từ ngày đầu tiên."

