["Keystone.Settings.UI.TilledSoilTexture.Tooltip"]
raw = "When on, tiles marked for planting use Keystone's lighter tilled-soil texture instead of the dark vanilla one. Takes effect immediately. Off by default."
status = "normal"
enUS = "When enabled, tiles marked for planting use Keystone's lighter tilled-soil texture instead of the dark vanilla one. Takes effect immediately. Disabled by default."
zhCN = "“启用后，标记为种植的瓦片将使用Keystone的更浅耕地纹理，而不是深色的原版纹理。立即生效。默认关闭。”"
zhTW = "啟用後，標記為種植的方塊將使用 Keystone 較淺的耕作土壤紋理，而不是深色的原版紋理。立即生效。預設為關閉。"
ruRU = "При включении плитки, отмеченные для посадки, используют более светлую текстуру вспаханной почвы от Keystone вместо темной ванильной. Вступает в силу немедленно. По умолчанию отключено."
jaJP = "オンにすると、植え付け用にマーキングされたタイルは、暗いバニラのものではなく、Keystoneの明るい耕作土のテクスチャを使用します。すぐに効果が現れます。デフォルトではオフです。"
frFR = "Lorsqu'il est activé, les tuiles marquées pour la plantation utilisent la texture de sol préparé plus claire de Keystone au lieu de celle vanille foncée. Prend effet immédiatement. Désactivé par défaut."
deDE = "Wenn aktiviert, verwenden die für das Pflanzen markierten Fliesen die hellere, bearbeitete Bodenstruktur von Keystone anstelle der dunklen Vanilla-Textur. Tritt sofort in Kraft. Standardmäßig deaktiviert."
plPL = "Gdy włączone, kafelki oznaczone do sadzenia używają jaśniejszej tekstury uprawnej z dodatku Keystone zamiast ciemnej tekstury standardowej. Wchodzi w życie natychmiast. Domyślnie wyłączone."
ptBR = "Quando ativado, os blocos marcados para plantio usam a textura de solo preparado mais clara do Keystone em vez da textura escura padrão. Efeito imediato. Desligado por padrão."
koKR = "켜면, 심기를 위해 표시된 타일은 어두운 기본 텍스처 대신 Keystone의 더 밝은 경작된 토양 텍스처를 사용합니다. 즉시 적용됩니다. 기본적으로 꺼져 있습니다."
csCZ = "Pokud je zapnuto, dlaždice označené pro výsadbu používají světlejší texturu obdělávané půdy od Keystone místo tmavé varianty ve vanilla verzi. Účinkuje okamžitě. Ve výchozím nastavení je vypnuto."
viVN = "Khi bật, các ô được đánh dấu để trồng sẽ sử dụng kết cấu đất xới nhẹ của Keystone thay vì kết cấu đất tối của phiên bản gốc. Thay đổi sẽ có hiệu lực ngay lập tức. Mặc định tắt."
