["Tool.Keystone.FishSmokeTest.Description"]
status = "normal"
raw = "Spawns a KeystoneFish1 static prop at the cursor and starts looping its Default animation clip. Gated on water depth: click a dry tile and nothing spawns; click a water tile and a fish appears just above the water surface, swimming in place. No agent, no pathfinding, no despawn — pure visual verification of the fish mesh + Default clip. Reload to clear accumulated fish."
enUS = "Spawns a KeystoneFish1 static prop at the cursor and starts looping its Default animation clip. Gated on water depth: click a dry tile and nothing spawns; click a water tile and a fish appears just above the water surface, swimming in place. No agent, no pathfinding, no despawn — pure visual verification of the fish mesh + Default clip. Reload to clear accumulated fish."
zhCN = "产生一个KeystoneFish1静态物体在光标处，并开始循环其默认动画剪辑。受水深限制：点击干燥的瓦片则什么都不会产生；点击水面瓦片则一条鱼会出现在水面上，静止游动。没有代理，没有寻路，没有消失——仅仅是对鱼网格和默认剪辑的可视验证。重新加载以清除已累积的鱼。"
zhTW = "在游標處生成一個 KeystoneFish1 靜態道具並開始循環其默認動畫片段。根據水深進行限制：點擊乾燥的瓷磚什麼都不會生成；點擊水面的瓷磚則會在水面上方顯示一條魚，保持原地游動。無代理，無路徑尋找，無消失——純粹用於視覺驗證魚的模型 + 默認片段。重新加載以清除累積的魚。"
ruRU = "Создает статический объект KeystoneFish1 в позиции курсора и начинает цикл его стандартной анимации. Ограничено глубиной воды: кликните по сухому тайлу и ничего не появится; кликните по водному тайлу, и рыба появится прямо над поверхностью воды, плавая на месте. Нет агента, нет поиска пути, нет исчезновения — чистая визуальная проверка сетки рыбы + стандартный клип. Перезагрузите, чтобы очистить накопившиеся рыбы."
jaJP = "カーソルの位置にKeystoneFish1の静的プロップを生成し、そのデフォルトアニメーションクリップをループします。水深によって制限されます：乾燥したタイルをクリックすると何も生成されず、水タイルをクリックすると水面のすぐ上に魚が現れ、その場で泳ぎます。エージェントなし、経路探索なし、消失なし — 魚のメッシュとデフォルトクリップの純粋な視覚確認です。蓄積された魚をクリアするにはリロードしてください。"
frFR = "Fait apparaître un prop statique KeystoneFish1 au curseur et commence à boucler son clip d'animation par défaut. Dépend de la profondeur de l'eau : cliquez sur un carreau sec et rien ne s'affiche ; cliquez sur un carreau d'eau et un poisson apparaît juste au-dessus de la surface de l'eau, nageant sur place. Pas d'agent, pas de recherche de chemin, pas de disparition — simple vérification visuelle du maillage du poisson + clip par défaut. Rechargez pour effacer les poissons accumulés."
deDE = "Erzeugt ein KeystoneFish1 statisches Objekt am Cursor und beginnt, seine Standard-Animationsclip zu wiederholen. Abhängig von der Wassertiefe: Klicken Sie auf ein trockenes Feld, und es erscheint nichts; klicken Sie auf ein Wasserfeld, und ein Fisch erscheint direkt über der Wasseroberfläche und schwimmt an derselben Stelle. Kein Agent, keine Pfadfindung, kein Verschwinden – rein visuelle Überprüfung des Fisch-Mesh + Standard-Clip. Neu laden, um angesammelte Fische zu löschen."
plPL = "Generuje statyczny obiekt KeystoneFish1 w miejscu kursora i zaczyna odtwarzać jego domyślną animację w pętli. Ograniczone przez głębokość wody: kliknij na suchym kafelku a nic się nie pojawi; kliknij na kafelku z wodą a ryba pojawi się tuż nad powierzchnią wody, pływając w miejscu. Brak agenta, brak wyszukiwania ścieżki, brak znikania — czysta wizualna weryfikacja siatki ryby + klip domyślny. Przeładuj, aby usunąć zgromadzone ryby."
ptBR = "Cria uma propriedade estática KeystoneFish1 na posição do cursor e começa a repetir seu clipe de animação padrão. Restrição de profundidade de água: clique em um bloco seco e nada aparece; clique em um bloco de água e um peixe surge logo acima da superfície, nadando no lugar. Sem agente, sem busca de caminho, sem desaparecimento — verificação visual pura da malha do peixe + clipe padrão. Recarregue para limpar os peixes acumulados."
koKR = "커서 위치에 KeystoneFish1 정적 소품을 생성하고 기본 애니메이션 클립을 루프합니다. 수심에 따라 제한됩니다: 마른 타일을 클릭하면 아무것도 생성되지 않고, 물 타일을 클릭하면 물 표면 바로 위에 물고기가 나타나며 제자리에서 수영합니다. 에이전트 없음, 경로 탐색 없음, 사라짐 없음 — 물고기 메시 + 기본 클립의 순수 시각적 확인. 축적된 물고기를 제거하려면 리로드하세요."
csCZ = "Vytváří statický objekt KeystoneFish1 na kurzoru a spouští smyčku jeho výchozí animační klip. Závisí na hloubce vody: klikněte na suchou dlaždici a nic se nevytvoří; klikněte na dlaždici s vodou a ryba se objeví těsně nad vodní hladinou, plavoucí na místě. Žádný agent, žádné vyhledávání cesty, žádné zmiznutí — čistá vizuální kontrola rybí sítě + výchozí klip. Znovu načtěte pro vymazání nahromaděných ryb."
viVN = "Tạo ra một vật thể tĩnh KeystoneFish1 tại vị trí chuột và bắt đầu phát lại đoạn hoạt hình mặc định của nó. Bị giới hạn bởi độ sâu của nước: nhấp vào ô khô và sẽ không có gì xuất hiện; nhấp vào ô nước và một con cá sẽ xuất hiện ngay trên bề mặt nước, bơi tại chỗ. Không có tác nhân, không tìm đường, không tự hủy - chỉ là xác minh hình ảnh thuần túy của lưới cá + đoạn hoạt hình mặc định. Tải lại để xóa cá đã tích lũy."
