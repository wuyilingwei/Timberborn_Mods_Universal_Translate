["UI.TW.MoreMines.AutoOrePlacementDialog"]
new = "This will attempt to place veins and Deep Deposits for all ore types. It works best on maps from 100 to 256 in size. For more control or small maps, consider the manual placement functions.\n\nIt is also not guaranteed to produce perfect results each time. You may want to inspect the ore that was placed, and if you are not happy, use the 'undo last ore action' button to remove it and try again.\n\nAutomatic placement may remove ground-only objects near edge of map (undo will not replace these).\n\n<b><YellowHighlight>NOTE:</YellowHighlight></b> Ore placement may take several minutes, especially on large maps or slow computers."
status = "normal"

