deDE = "Markiert in der Nähe zugängliche Erze zum Abbau. Der Spieler kann normalerweise einen besseren Job machen, aber das reduziert das Mikromanagement."
plPL = "Zaznacza pobliskie dostępne rudy do wydobycia. Gracz zazwyczaj może wykonać to lepiej, ale to zmniejsza mikrozarządzanie."
ptBR = "Marca minério acessível próximo para mineração. O jogador geralmente pode fazer um trabalho melhor, mas isso reduz a microgestão."
koKR = "근처의 접근 가능한 광석을 채굴을 위해 표시합니다. 플레이어가 보통 더 잘 수행할 수 있지만, 이는 세부 관리의 필요성을 줄여줍니다."
csCZ = "Označuje blízké dostupné rudy k těžbě. Hráč obvykle udělá lepší práci, ale to snižuje mikro management."
viVN = "Đánh dấu quặng gần đó có thể khai thác. Người chơi thường có thể làm tốt hơn, nhưng điều này giảm thiểu việc quản lý vi mô."

