plPL = "Są dwa rodzaje bobrów: ci, którzy wolą nadzienie, i ci, którzy wolą drewniane formy do ciast."
ptBR = "Existem dois tipos de castores: aqueles que preferem o recheio e aqueles que preferem as formas de torta de madeira."
koKR = "𐰴𐰉𐰚𐰛𐰯𐰢𐰲 𐰈𐰍𐰴𐰉𐰌𐰈𐰢𐰲 𐰑𐰍𐰖𐰉𐰊: 𐰋𐰉𐰗𐰯𐰋𐰎𐰙𐰭𐰢𐰲 𐰁𐰩𐰛𐰨𐰡𐰉𐰯𐰍𐰬𐰁𐰳𐰯, 𐰁𐰩𐰛𐰗𐰉𐰋𐰩𐰚 𐰈𐰓𐰔𐰬𐰢𐰦 𐰃𐰱𐰤𐰔𐰓𐰯𐰉𐰛𐰣𐰟."
