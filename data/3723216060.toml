["Building.TWSmallTubewayStation.FlavorDescription"]
raw = "Working underground lent Dirtclaws considerable appreciation for the old saying, small is beautiful."
status = "normal"
enUS = "Working underground lent Dirtclaws considerable appreciation for the old saying, small is beautiful."
zhCN = "在地下工作让土爪们对古老的谚语有了相当的认同：小巧就是美。"
zhTW = "在地下工作的泥爪對於那句古老的諺語「小就是美」有了相當的認同。"
ruRU = "Работа под землёй дала Дёртклавам значительное уважение к старой пословице: мал да удал."
jaJP = "地下で働くことで、ダートクロウたちは「小さいことは美しい」という古い言葉を大いに感謝するようになった。"
frFR = "Travailler sous terre a donné aux Dirtclaws une grande appréciation pour le vieux dicton, le petit est beau."
deDE = "Die Arbeit unter der Erde gab den Dirtclaws eine beträchtliche Wertschätzung für das alte Sprichwort, klein ist schön."
plPL = "Praca pod ziemią dała Dirtclaws znaczną wdzięczność dla starego powiedzenia, że małe jest piękne."
ptBR = "Trabalhar debaixo da terra deu aos Dirtclaws uma considerável apreciação pelo velho ditado, o pequeno é bonito."
koKR = "지하에서 일하는 것은 Dirtclaws에게 '작은 것이 아름답다'는 오래된 속담에 대한 상당한 감사를 안겨주었습니다."
csCZ = "Práce pod zemí dala Dirtclawsům značné ocenění za staré rčení, malé je hezké."
viVN = "Việc làm việc dưới lòng đất đã khiến Dirtclaws rất trân trọng câu nói xưa, nhỏ là đẹp."

