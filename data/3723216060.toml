koKR = "지하철이 있는 터널이지만 지지대가 없습니다.  \n● <RedHighlight>주의!</RedHighlight> 지지되지 않은 지형이나 건물이 붕괴될 수 있습니다. 주의해서 사용하세요."
csCZ = "Tunel s tubovým systémem, ale bez podpory ze země.  \n● <RedHighlight>Pozor!</RedHighlight> Může způsobit kolaps nepodporovaného terénu nebo budov. Používejte opatrně."
viVN = "Một chiếc hầm có đường ống nhưng không có hỗ trợ mặt đất.  \n● <RedHighlight>Cảnh báo!</RedHighlight> Có thể gây sập địa hình hoặc công trình không được hỗ trợ. Sử dụng cẩn thận."

