["Building.TWSolidRock.FlavorDescription"]
raw = "Try as they might, there are some stones too hard even for dynamite-wielding beavers."
status = "normal"
enUS = "Try as they might, there are some stones too hard even for dynamite-wielding beavers."
zhCN = "尽管他们努力尝试，但有些石头对于使用炸药的海狸来说依然太坚硬。"
zhTW = "儘管他們努力嘗試，有些石頭連揮動炸藥的海狸也無法砸碎。"
ruRU = "Как бы они ни старались, есть камни, слишком твердые даже для бобров с динамитом."
jaJP = "「どんなに頑張っても、ダイナマイトを使うビーバーにも手をこまねくほど硬い石がある。」"
frFR = "Quoi qu'ils essaient, il y a des pierres trop dures même pour des castors armés de dynamite."
deDE = "So sehr sie sich auch anstrengen, gibt es einige Steine, die selbst für mit Dynamit bewaffnete Biber zu hart sind."
plPL = "Nie ma takiej siły, która by pokonała pewne kamienie - nawet bobry z dynamitem nie dadzą rady."
ptBR = "Por mais que tentem, há algumas pedras que são duras demais até para os castores armados com dinamite."
koKR = "비버들이 다이너마이트를 들고 있어도, 어떤 돌은 너무 단단해서 애쓰는 것조차 무의미하다."
csCZ = "Ať se snaží jakkoliv, existují některé kameny, které jsou příliš tvrdé i pro bobry s dynamitem."
viVN = "Dù có cố gắng thế nào, vẫn có những viên đá quá cứng ngay cả đối với những con beaver cầm thuốc nổ."

