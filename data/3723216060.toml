enUS = "A tunnel with no ground support.  \n● <RedHighlight>Caution!</RedHighlight> May cause collapse of unsupported terrain or buildings. Use with care."
zhCN = "一个没有地面支撑的隧道。\n● <RedHighlight>注意!</RedHighlight> 可能会导致无支撑地形或建筑物的坍塌。请小心使用。"
zhTW = "一條沒有地面支撐的隧道。\n● <RedHighlight>小心！</RedHighlight> 可能會導致不受支撐的地形或建築物倒塌。請小心使用。"
ruRU = "Туннель без наземной опоры.  \n● <RedHighlight>Внимание!</RedHighlight> Может привести к обрушению неподдерживаемой территории или зданий. Используйте с осторожностью."
jaJP = "「地面の支えがないトンネルです。  \n● <RedHighlight>注意!</RedHighlight> 支えのない地形や建物が崩れる可能性があります。使用時は注意してください。」"
frFR = "Un tunnel sans support au sol.  \n● <RedHighlight>Attention !</RedHighlight> Peut provoquer l'effondrement de terrains ou de bâtiments non supportés. À utiliser avec précaution."
deDE = "Ein Tunnel ohne Bodenunterstützung.  \n● <RedHighlight>Vorsicht!</RedHighlight> Kann den Zusammenbruch von nicht unterstütztem Terrain oder Gebäuden verursachen. Mit Vorsicht verwenden."
plPL = "Tunel bez wsparcia gruntowego.  \n● <RedHighlight>Uwaga!</RedHighlight> Może spowodować zawalenie się niepodpartego terenu lub budynków. Używaj ostrożnie."
ptBR = "Um túnel sem suporte no solo.  \n● <RedHighlight>Cuidado!</RedHighlight> Pode causar o colapso do terreno ou de construções sem suporte. Use com cautela."
koKR = "지하에는 지면 지지대가 없는 터널입니다.  \n● <RedHighlight>주의!</RedHighlight> 지지대가 없는 지형이나 건물이 무너지게 할 수 있습니다. 주의해서 사용하세요."
csCZ = "Tunel bez podpory ze země.  \n● <RedHighlight>Opatrnost!</RedHighlight> Může způsobit kolaps nepodloženého terénu nebo budov. Používejte opatrně."
viVN = "Một đường hầm không có hỗ trợ mặt đất.  \n● <RedHighlight>Cảnh báo!</RedHighlight> Có thể gây sập địa hình hoặc tòa nhà không được hỗ trợ. Sử dụng cẩn thận."

