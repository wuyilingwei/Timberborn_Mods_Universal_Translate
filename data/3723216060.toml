["Building.TWTailingsDump.Description"]
raw = "A place to dump mill pulp or tailings. Mill pulp can be recovered for later processing.\n● <b><YellowHighlight>Tip:</YellowHighlight></b> Must overhang an edge, the same as a fluid dump.\n● <b><RedHighlight>Caution!</RedHighlight></b> Tailings flows will destroy most buildings. Use levees to contain it."
status = "normal"
enUS = "A place to dump mill pulp or tailings. Mill pulp can be recovered for later processing.  \n● <b><YellowHighlight>Tip:</YellowHighlight></b> Must overhang an edge, the same as a fluid dump.  \n● <b><RedHighlight>Caution!</RedHighlight></b> Tailings flows will destroy most buildings. Use levees to contain it."
zhCN = "一个倾倒磨坊浆料或尾矿的地方。磨坊浆料可以回收以便后续处理。\n● <b><YellowHighlight>提示：</YellowHighlight></b> 必须悬挂在边缘上，与液体倾倒相同。\n● <b><RedHighlight>注意！</RedHighlight></b> 尾矿流将摧毁大多数建筑物。使用堤坝来控制它。"
zhTW = "用來傾倒磨粉或尾礦的地方。磨粉可以被回收以供後續處理。\n● <b><YellowHighlight>提示：</YellowHighlight></b> 必須懸空於邊緣，與液體傾倒一樣。\n● <b><RedHighlight>注意！</RedHighlight></b> 尾礦流會摧毀大多數建築物。使用堤壩來控制。"
ruRU = "Место для сброса пульпы или хвостов. Пульпу можно recuperar для последующей переработки.\n● <b><YellowHighlight>Совет:</YellowHighlight></b> Должен находиться на краю, как и сброс жидкости.\n● <b><RedHighlight>Предупреждение!</RedHighlight></b> Хвосты могут разрушить большинство зданий. Используйте плотины, чтобы их сдерживать."
jaJP = "ミルパルプや鉱滓を捨てる場所です。ミルパルプは後で処理するために回収できます。\n● <b><YellowHighlight>ヒント：</YellowHighlight></b> 流体捨て場と同様に、端にオーバーハングする必要があります。\n● <b><RedHighlight>注意！</RedHighlight></b> 鉱滓の流れはほとんどの建物を破壊します。堤防を使って抑制してください。"
frFR = "Un endroit pour déverser la pulpe de moulin ou les résidus. La pulpe de moulin peut être récupérée pour un traitement ultérieur.\n● <b><YellowHighlight>Conseil :</YellowHighlight></b> Doit dépasser un bord, tout comme un déversement de fluide.\n● <b><RedHighlight>Attention !</RedHighlight></b> Les débits de résidus détruiront la plupart des bâtiments. Utilisez des digues pour les contenir."
deDE = "Ein Ort, um Mühlenschlamm oder Abfälle abzuladen. Mühlenschlamm kann zur späteren Verarbeitung zurückgewonnen werden.  \n● <b><YellowHighlight>Hinweis:</YellowHighlight></b> Muss über einen Rand hinausragen, wie ein Flüssigkeitsablauf.  \n● <b><RedHighlight>Vorsicht!</RedHighlight></b> Abwässer zerstören die meisten Gebäude. Verwenden Sie Deiche, um sie einzudämmen."
plPL = "Miejsce do składowania pulpy młynarskiej lub odpadów. Pulpę młynarską można odzyskać do późniejszego przetworzenia.\n● <b><YellowHighlight>Wskazówka:</YellowHighlight></b> Musi wystawać poza krawędź, tak samo jak zrzut płynów.\n● <b><RedHighlight>Ostrzeżenie!</RedHighlight></b> Przepływy odpadów zniszczą większość budynków. Użyj wałów, aby je ograniczyć."
ptBR = "Um lugar para despejar polpa de moinho ou rejeitos. A polpa de moinho pode ser recuperada para processamento posterior.  \n● <b><YellowHighlight>Dica:</YellowHighlight></b> Deve se projetar para uma borda, assim como um despejo de fluidos.  \n● <b><RedHighlight>Atenção!</RedHighlight></b> Fluxos de rejeitos destruirão a maioria dos edifícios. Use diques para contê-los."
koKR = "밀 펄프나 폐기물을 버리는 장소입니다. 밀 펄프는 나중에 가공하기 위해 회수할 수 있습니다.\n● <b><YellowHighlight>팁:</YellowHighlight></b> 액체 폐기물과 마찬가지로 가장자리를 넘겨야 합니다.\n● <b><RedHighlight>경고!</RedHighlight></b> 폐기물이 흐르면 대부분의 건물이 파괴됩니다. 제방을 사용하여 방수하십시오."
csCZ = "Místo pro vykládku mlýnského kaše nebo odpadu. Mlýnskou kaši lze znovu využít pro pozdější zpracování.  \n● <b><YellowHighlight>Tip:</YellowHighlight></b> Musí být přes okraj, stejně jako výpust pro kapaliny.  \n● <b><RedHighlight>Varování!</RedHighlight></b> Odpady zničí většinu budov. Použijte hráze pro její zadržení."
viVN = "Nơi để đổ bã xay hoặc chất thải. Bã xay có thể được thu hồi để xử lý sau.\n● <b><YellowHighlight>Mẹo:</YellowHighlight></b> Phải vượt qua một cạnh, giống như một điểm đổ chất lỏng.\n● <b><RedHighlight>Cảnh báo!</RedHighlight></b> Dòng chất thải sẽ phá hủy hầu hết các tòa nhà. Sử dụng đê để contener nó."

