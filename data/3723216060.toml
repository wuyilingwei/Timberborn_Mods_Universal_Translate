["Faction.TWDirtclaws.WonderCompletionFlavor"]
raw = "Having delved the deepest recesses of the earth, your beavers shared the fruits of their labor with the suffering planet. There are many tunnels left to dig, and Dirtclaws will lead beaverkind into a deeper, darker era."
status = "normal"
enUS = "Having delved into the deepest recesses of the earth, your beavers shared the fruits of their labor with the suffering planet. There are many tunnels left to dig, and Dirtclaws will lead beaverkind into a deeper, darker era."
zhCN = "在深入地球最深处后，你的海狸将他们的劳动成果分享给了受苦的星球。还有许多隧道待挖掘，土爪将引领海狸族迈向更深、更黑暗的时代。"
zhTW = "深入地球最深的角落，你的海狸們與受苦的星球分享了他們勞動的成果。還有許多隧道有待挖掘，而泥爪們將引領海狸族邁向更深、更黑暗的時代。"
ruRU = "Погрузившись в самые глубокие уголки земли, ваши бобры поделились плодами своего труда с страдающей планетой. Осталось много туннелей, которые нужно выкопать, и Dirtclaws поведет бобров в более глубокую и мрачную эпоху."
jaJP = "「地球の最深部を掘り進めたあなたのビーバーたちは、苦しむこの星とその労働の成果を分かち合いました。まだ掘るべきトンネルはたくさんあり、ダートクローたちがビーバー種をより深く、より暗い時代へと導くでしょう。」"
frFR = "Ayant exploré les recoins les plus profonds de la terre, vos castors ont partagé les fruits de leur travail avec la planète souffrante. Il reste de nombreux tunnels à creuser, et les Dirtclaws mèneront les castors vers une ère plus profonde et plus sombre."
deDE = "„Nachdem sie die tiefsten Bereiche der Erde erkundet haben, teilten deine Biber die Früchte ihrer Arbeit mit dem leidenden Planeten. Es gibt noch viele Tunnel zu graben, und die Dirtclaws werden die Biber in eine tiefere, dunklere Ära führen.“"
plPL = "Zagłębiając się w najgłębsze zakamarki ziemi, wasze bobry podzieliły się owocami swojej pracy z cierpiącą planetą. Pozostało wiele tuneli do wykopania, a Dirtclaws poprowadzi bobry w głębszą, ciemniejszą erę."
ptBR = "Após ter explorado as cavernas mais profundas da terra, seus castores compartilharam os frutos de seu trabalho com o planeta em sofrimento. Há muitos túneis ainda a serem cavados, e os Dirtclaws levarão a raça dos castores para uma era mais profunda e sombria."
koKR = "가장 깊은 땅의 구석구석을 파헤친 당신의 비버들은 고통받는 지구와 그들의 노동의 열매를 나누었습니다. 아직 파야 할 터널이 많으며, 더러움발톱이 비버 인류를 더 깊고 어두운 시대로 이끌 것입니다."
csCZ = "Po prozkoumání nejhlubších zákoutí země vaši bobři sdíleli plody své práce s trpící planetou. Je ještě mnoho tunelů, které je třeba vyhloubit, a Dirtclaws povedou bobří lidstvo do hlubší a temnější éry."
viVN = "Đã khai thác những ngóc ngách sâu nhất của trái đất, các chú nhím của bạn đã chia sẻ thành quả lao động của mình với hành tinh đang chịu đựng. Còn nhiều đường hầm cần được đào, và Dirtclaws sẽ dẫn dắt loài nhím vào một kỷ nguyên sâu hơn, tối tăm hơn."

["Faction.TWDirtclaws.WonderCompletionMessage"]
raw = "Congratulations! You mastered the Dirtclaws' metallic megalomania and used this map's resources to build the faction's wonder."
status = "normal"
enUS = "Congratulations! You mastered the Dirtclaws' metallic megalomania and used this map's resources to build the faction's wonder."
zhCN = "恭喜！您掌握了泥爪派的金属狂想症，并利用本地图的资源建造了该派系的奇迹。"
zhTW = "恭喜您！您掌握了泥爪族的金屬狂妄，並利用這張地圖的資源建造了該派系的奇蹟。"
ruRU = "Поздравляем! Вы овладели металлической мегаэгоизмом Когтей Земли и использовали ресурсы этой карты для постройки чуда фракции."
jaJP = "おめでとうございます！ダートクローズの金属的な大言壮語を制覇し、この地図の資源を使って派閥のワンダーを建設しました。"
frFR = "Félicitations ! Vous avez maîtrisé la mégalomanie métallique des Dirtclaws et utilisé les ressources de cette carte pour construire la merveille de la faction."
deDE = "Herzlichen Glückwunsch! Du hast den metallischen Megalomanen der Dirtclaws gemeistert und die Ressourcen dieser Karte genutzt, um das Wunder der Fraktion zu bauen."
plPL = "Gratulacje! Opanowałeś metalową megalomanię Dirtclaws i wykorzystałeś zasoby tej mapy, aby zbudować cud frakcji."
ptBR = "Parabéns! Você dominou a megalomania metálica dos Claws de Terra e usou os recursos deste mapa para construir a maravilha da facção."
koKR = "축하합니다! 당신은 더트클로의 금속 광기 를 정복하고 이 지도의 자원을 이용하여 진영의 경이로움을 건설했습니다."
csCZ = "Gratulujeme! Ovládl(a) jste metalickou megalomanii Dirtclaws a využil(a) jste zdroje této mapy k vybudování divu frakce."
viVN = "Chúc mừng! Bạn đã làm chủ sự cuồng vọng kim loại của Dirtclaws và sử dụng tài nguyên trong bản đồ này để xây dựng kỳ quan của phe."

