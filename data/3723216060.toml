["Building.TWEmptyTunnelTubeway.Description"]
raw = "A tunnel with a tubeway but no ground support.\n● <RedHighlight>Caution!</RedHighlight> May cause collapse of unsupported terrain or buildings. Use with care."
status = "normal"
enUS = "A tunnel with a tubeway but no ground support. ● <RedHighlight>Caution!</RedHighlight> May cause collapse of unsupported terrain or buildings. Use with care."
zhCN = "一个有输送带但没有地面支撑的隧道。\n● <RedHighlight>小心！</RedHighlight> 可能导致无支撑的地形或建筑物崩塌。请谨慎使用。"
zhTW = "一個有管道但沒有地面支撐的隧道。  \n● <RedHighlight>注意！</RedHighlight> 可能導致無支撐的地形或建築物倒塌。請小心使用。"
ruRU = "Тоннель с транспортной системой, но без опоры на земле.\n● <RedHighlight>Предупреждение!</RedHighlight> Может привести к обрушению не поддерживаемой местности или зданий. Используйте с осторожностью."
jaJP = "地面の支えがないチューブがあるトンネルです。  \n● <RedHighlight>注意!</RedHighlight> 支えのない地形や建物が崩壊する可能性がありますので、注意して使用してください。"
frFR = "Un tunnel avec un tubeway mais sans soutien au sol.  \n● <RedHighlight>Attention !</RedHighlight> Peut provoquer l'effondrement de terrains ou de bâtiments non soutenus. Utilisez avec prudence."
deDE = "Ein Tunnel mit einem Tubeway, aber ohne Bodenunterstützung.  \n● <RedHighlight>Vorsicht!</RedHighlight> Kann den Einsturz von nicht gestütztem Terrain oder Gebäuden verursachen. Mit Vorsicht verwenden."
plPL = "Tunel z ruchem ale bez wsparcia gruntowego.  \n● <RedHighlight>Uwaga!</RedHighlight> Może spowodować zawalenie się niepodpartego terenu lub budynków. Używaj ostrożnie."
