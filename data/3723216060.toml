["Building.TWPastryOven.FlavorDescription"]
raw = "There are two kinds of beavers: those who prefer the filling, and those who prefer the wooden pie pans."
status = "normal"
enUS = "There are two kinds of beavers: those who prefer the filling and those who prefer the wooden pie pans."
zhCN = "有两种海狸：一种喜欢馅料，另一种喜欢木制派盘。"
zhTW = "有兩種河狸：一種喜歡餡料，而另一種則喜歡木製派盤。"
ruRU = "Существует два вида бобров: те, кто предпочитает начинку, и те, кто предпочитает деревянные формы для пирогов."
jaJP = "ビーバーには二種類います：フィリングを好むビーバーと、木製のパイ皿を好むビーバーです。"
frFR = "Il existe deux sortes de castors : ceux qui préfèrent la garniture et ceux qui préfèrent les moules à tarte en bois."
