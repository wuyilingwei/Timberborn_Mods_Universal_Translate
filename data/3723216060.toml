["Building.TWMineChute.Description"]
raw = "Automatically places tunnels on contiguous ore blocks above it. Cheaper than normal tunnels and generates extra ore."
status = "normal"
enUS = "Automatically places tunnels on contiguous ore blocks above it. Cheaper than normal tunnels and generates extra ore."
zhCN = "“自动在它上方相邻的矿石方块上建造隧道。比普通隧道便宜，并生成额外的矿石。”"
zhTW = "自動在其上方相連的礦石區塊上放置隧道。比普通隧道便宜，並且產生額外的礦石。"
ruRU = "Автоматически размещает туннели на смежных блоках руды над ним. Дешевле обычных туннелей и генерирует дополнительную руду."
jaJP = "「その上の隣接する鉱石ブロックに自動的にトンネルを設置します。通常のトンネルよりも安価で、追加の鉱石を生成します。」"
frFR = "Place automatiquement des tunnels sur les blocs de minerai contigus au-dessus. Moins cher que les tunnels normaux et génère du minerai supplémentaire."
deDE = "Platziert automatisch Tunnel auf benachbarten Erzblöcken über sich. Günstiger als normale Tunnel und erzeugt zusätzliches Erz."
plPL = "Automatycznie umieszcza tunele na przyległych blokach rudy powyżej. Tańsze niż zwykłe tunele i generuje dodatkową rudę."
ptBR = "Coloca automaticamente túneis em blocos de minério contíguos acima dele. Mais barato do que túneis normais e gera minério extra."
koKR = "연결된 광물 블록 위에 자동으로 터널을 배치합니다. 일반 터널보다 저렴하며 추가 광물을 발생시킵니다."
csCZ = "Automaticky umisťuje tunely na sousední bloky rudy nad ním. Levnější než normální tunely a generuje extra rudu."
viVN = "Tự động đặt đường hầm trên các khối quặng liền kề phía trên. Rẻ hơn so với đường hầm bình thường và tạo ra quặng thừa."

