["ModSetting.TWMoreMines.DirtclawsSectionHeader3"]
raw = "Setting the plant-related options to 1 will make Dirtclaws grow food and wood at close to vanilla Folktails levels.\nThe plant growth settings and code are based heavily on the Configurable Plants mod by Luke Vo. Thanks, Luke!"
status = "normal"
enUS = "Setting the plant-related options to 1 will make Dirtclaws grow food and wood at levels close to the vanilla Folktails.\nThe plant growth settings and code are heavily based on the Configurable Plants mod by Luke Vo. Thanks, Luke!"
zhCN = "将植物相关的选项设置为1将使泥爪在接近原版Folktails水平的情况下生长食物和木材。\n植物生长设置和代码 heavily 基于Luke Vo的可配置植物Mod。感谢，Luke！"
zhTW = "「將植物相關選項設置為1會使土爪接近原版Folktails的水平來生長食物和木材。\n植物生長設置和代碼在很大程度上基於Luke Vo的可配置植物模組。謝謝，Luke！」"
ruRU = "Установка параметров, связанных с растениями, на 1 заставит Дёртклаус выращивать пищу и дерево приближенно к уровням ванильных Смолодуков. Настройки роста растений и код в значительной степени основаны на моде Configurable Plants от Люка Во. Спасибо, Люк!"
jaJP = "植物に関連するオプションを1に設定すると、ダートクローがバニラフォークテイルのレベルに近い速度で食料と木材を育てます。植物の成長設定とコードは、ルーク・ヴォーの「Configurable Plants」モッドに大きく依存しています。ありがとう、ルーク！"
frFR = "Réglage des options liées aux plantes sur 1 fera en sorte que les Dirtclaws produisent de la nourriture et du bois à des niveaux proches de ceux des Folktails en mode vanilla. Les paramètres de croissance des plantes et le code sont largement basés sur le mod Configurable Plants de Luke Vo. Merci, Luke !"
deDE = "Das Einstellen der pflanzenbezogenen Optionen auf 1 lässt Dirtclaws Lebensmittel und Holz auf nahezu den Vanilla-Folktails-Stufen wachsen. Die Einstellungen und der Code für das Pflanzenwachstum basieren stark auf dem Mod ‚Configurable Plants‘ von Luke Vo. Danke, Luke!"
plPL = "Ustawienie opcji związanych z roślinami na 1 sprawi, że Dirtclaws będą produkować jedzenie i drewno na poziomie zbliżonym do vanilla Folktails.\nUstawienia wzrostu roślin i kod opierają się mocno na modzie Configurable Plants autorstwa Luke'a Vo. Dzięki, Luke!"
ptBR = "Definir as opções relacionadas a plantas para 1 fará com que os Dirtclaws cultivem alimentos e madeira em níveis próximos aos padrões de Folktails.\nAs configurações de crescimento de plantas e o código são baseados fortemente no mod Plants Configuráveis de Luke Vo. Obrigado, Luke!"
koKR = "식물 관련 옵션을 1로 설정하면 Dirtclaws가 일반 Folktails 수준에 가까운 음식과 나무를 성장시킵니다.\n식물 성장 설정 및 코드는 Luke Vo의 Configurable Plants 모드를 기반으로 합니다. 감사합니다, Luke!"
csCZ = "Nastavení možností souvisejících s rostlinami na 1 způsobí, že Dirtclaws budou pěstovat jídlo a dřevo na úrovni blízké základnímu hernímu stylu Folktails. Nastavení růstu rostlin a kód jsou silně založeny na módu Configurable Plants od Luke Vo. Děkujeme, Luke!"
viVN = "Cài đặt các tùy chọn liên quan đến thực vật thành 1 sẽ làm cho Dirtclaws phát triển thực phẩm và gỗ gần bằng mức vanilla Folktails.\nCài đặt và mã phát triển thực vật dựa rất nhiều vào mod Plants có thể cấu hình của Luke Vo. Cảm ơn, Luke!"

