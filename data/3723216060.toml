plPL = "Tunele przez teren, zastępując go drewnem kopalnianym. Użyj narzędzia warstwy, aby zobaczyć pod terenem lub strukturami."
ptBR = "Túneis através do terreno, substituindo-o por madeiras de mina. Use a ferramenta de camada para ver abaixo do terreno ou das estruturas."
koKR = "지형을 통과하는 터널, 광산 목재로 대체됩니다. 지형이나 구조물 아래를 보려면 레이어 도구를 사용하세요."
csCZ = "Tunely skrze terén, nahrazující ho hornickými trámy. Použijte nástroj vrstvy, abyste viděli pod terénem nebo konstrukcemi."
viVN = "Các đường hầm xuyên qua địa hình, thay thế nó bằng gỗ của mỏ. Sử dụng công cụ lớp để xem dưới địa hình hoặc cấu trúc."

["LV.CPl.GrowthSect"]
raw = "<b>Growth options:</b> Set below default ×1 to decrease difficulty except for Output Multiplier. Examples:\n- Planting Time Multiplier ×0.5: Planting Oak 1 hours → 0.5 hours.\n- Growth Rate ×0.5: Potato grows in 5 days → 2.5 days.\n- Output Multiplier ×1.5: Carrot yields 3 → 4.\n- Harvest Time Multiplier ×0.5: Oak cutting 2 hours → 1 hour.\n- Demolishing Time Multiplier ×0.5: demolishing Pine 1.2 hours → 0.6 hours."
status = "normal"
enUS = "<b>Growth options:</b> Set below default ×1 to decrease difficulty except for Output Multiplier. Examples:\n- Planting Time Multiplier ×0.5: Planting Oak 1 hour → 0.5 hours.\n- Growth Rate ×0.5: Potato grows in 5 days → 2.5 days.\n- Output Multiplier ×1.5: Carrot yields 3 → 4.\n- Harvest Time Multiplier ×0.5: Oak cutting 2 hours → 1 hour.\n- Demolishing Time Multiplier ×0.5: demolishing Pine 1.2 hours → 0.6 hours."
zhCN = "<b>生长选项：</b> 将默认值×1设置以下，以降低难度，输出倍率除外。示例：\n- 种植时间倍率×0.5：种植橡树1小时 → 0.5小时。\n- 生长速度×0.5：马铃薯5天生长 → 2.5天。\n- 输出倍率×1.5：胡萝卜产量3 → 4。\n- 收割时间倍率×0.5：砍伐橡树2小时 → 1小时。\n- 拆除时间倍率×0.5：拆除松树1.2小时 → 0.6小时。"
zhTW = "<b>成長選項：</b> 設定低於預設值 ×1 以減少難度，但輸出增益除外。例子：\n- 種植時間增益 ×0.5：種植橡樹 1 小時 → 0.5 小時。\n- 成長速度 ×0.5：馬鈴薯生長 5 天 → 2.5 天。\n- 輸出增益 ×1.5：胡蘿蔔產量 3 → 4。\n- 收穫時間增益 ×0.5：砍伐橡樹 2 小時 → 1 小時。\n- 拆除時間增益 ×0.5：拆除松樹 1.2 小時 → 0.6 小時。"
ruRU = "<b>Опции роста:</b> Установите ниже по умолчанию ×1, чтобы уменьшить сложность, кроме Множителя выработки. Примеры:\n- Множитель времени посадки ×0.5: Посадка дуба 1 час → 0.5 часа.\n- Скорость роста ×0.5: Картофель растет за 5 дней → 2.5 дня.\n- Множитель выработки ×1.5: Урожай моркови 3 → 4.\n- Множитель времени сбора ×0.5: Повалка дуба 2 часа → 1 час.\n- Множитель времени сноса ×0.5: снос сосны 1.2 часа → 0.6 часа."
jaJP = "<b>成長オプション:</b> デフォルトの×1未満に設定すると、出力倍率を除いて難易度が下がります。例:\n- 植え付け時間倍率 ×0.5: オークの植え付け 1時間 → 0.5時間。\n- 成長速度 ×0.5: ジャガイモが5日で成長 → 2.5日。\n- 出力倍率 ×1.5: ニンジンの収穫量 3 → 4。\n- 収穫時間倍率 ×0.5: オークの伐採 2時間 → 1時間。\n- 解体時間倍率 ×0.5: マツの解体 1.2時間 → 0.6時間。"
frFR = "<b>Options de croissance :</b> Réglez en dessous de la valeur par défaut ×1 pour réduire la difficulté sauf pour le multiplicateur de rendement. Exemples :\n- Multiplicateur de temps de plantation ×0.5 : Planter du chêne 1 heure → 0.5 heure.\n- Taux de croissance ×0.5 : La pomme de terre pousse en 5 jours → 2.5 jours.\n- Multiplicateur de rendement ×1.5 : La carotte produit 3 → 4.\n- Multiplicateur de temps de récolte ×0.5 : Abattage de chêne 2 heures → 1 heure.\n- Multiplicateur de temps de démolition ×0.5 : démolition de pin 1.2 heures → 0.6 heures."
deDE = "<b>Wachstumsoptionen:</b> Setzen Sie unter dem Standard ×1, um die Schwierigkeit zu verringern, mit Ausnahme des Ertragsmultiplikators. Beispiele:\n- Pflanzenzeit-Multiplikator ×0.5: Eiche pflanzen 1 Stunde → 0,5 Stunden.\n- Wachstumsrate ×0.5: Kartoffel wächst in 5 Tagen → 2,5 Tage.\n- Ertragsmultiplikator ×1.5: Karotte bringt 3 → 4 ein.\n- Erntezeit-Multiplikator ×0.5: Eiche fällen 2 Stunden → 1 Stunde.\n- Abreißzeit-Multiplikator ×0.5: Abreißen von Fichte 1,2 Stunden → 0,6 Stunden."
plPL = "<b>Opcje wzrostu:</b> Ustaw poniżej domyślnego ×1, aby zmniejszyć trudność, z wyjątkiem mnożnika wydajności. Przykłady:\n- Mnożnik czasu sadzenia ×0.5: Sadzenie dębu 1 godzina → 0,5 godziny.\n- Wskaźnik wzrostu ×0.5: Ziemniak rośnie w 5 dni → 2,5 dnia.\n- Mnożnik wydajności ×1.5: Marchewka daje 3 → 4.\n- Mnożnik czasu zbioru ×0.5: Ścinanie dębu 2 godziny → 1 godzina.\n- Mnożnik czasu burzenia ×0.5: Burzenie sosny 1,2 godziny → 0,6 godziny."
ptBR = "<b>Opções de crescimento:</b> Defina abaixo do padrão ×1 para diminuir a dificuldade, exceto para o multiplicador de saída. Exemplos:\n- Multiplicador de Tempo de Plantio ×0.5: Plantar Carvalho 1 hora → 0.5 horas.\n- Taxa de Crescimento ×0.5: Batata cresce em 5 dias → 2.5 dias.\n- Multiplicador de Saída ×1.5: Cenoura rende 3 → 4.\n- Multiplicador de Tempo de Colheita ×0.5: Corte de Carvalho 2 horas → 1 hora.\n- Multiplicador de Tempo de Demolição ×0.5: demolição de Pinheiro 1.2 horas → 0.6 horas."
koKR = "<b>성장 옵션:</b> 기본값 ×1 이하로 설정하여 출력 배수를 제외하고 난이도를 줄일 수 있습니다. 예시:\n- 심기 시간 배수 ×0.5: 오크 나무 심기 1시간 → 0.5시간.\n- 성장 속도 ×0.5: 감자가 5일에 성장 → 2.5일.\n- 출력 배수 ×1.5: 당근 수확량 3 → 4.\n- 수확 시간 배수 ×0.5: 오크 나무 베기 2시간 → 1시간.\n- 철거 시간 배수 ×0.5: 소나무 철거 1.2시간 → 0.6시간."
csCZ = "<b>Možnosti růstu:</b> Nastavte níže výchozí ×1 pro snížení obtížnosti s výjimkou multiplikátoru výstupu. Příklady: \n- Multiplikátor doby sázení ×0,5: Sázení dubu 1 hodina → 0,5 hodiny.\n- Rychlost růstu ×0,5: Brambora roste za 5 dní → 2,5 dne.\n- Multiplikátor výstupu ×1,5: Mrkev přináší 3 → 4.\n- Multiplikátor doby sklizně ×0,5: Kácení dubu 2 hodiny → 1 hodina.\n- Multiplikátor doby demolice ×0,5: demolice borovice 1,2 hodiny → 0,6 hodiny."
viVN = "<b>Các tùy chọn phát triển:</b> Đặt dưới mặc định ×1 để giảm độ khó ngoại trừ Hệ số Đầu ra. Ví dụ:\n- Hệ số Thời gian Trồng ×0.5: Trồng Sồi 1 giờ → 0.5 giờ.\n- Hệ số Tăng trưởng ×0.5: Khoai tây phát triển trong 5 ngày → 2.5 ngày.\n- Hệ số Đầu ra ×1.5: Cà rốt thu hoạch 3 → 4.\n- Hệ số Thời gian Thu hoạch ×0.5: Chặt Sồi 2 giờ → 1 giờ.\n- Hệ số Thời gian Phá hủy ×0.5: phá hủy Thông 1.2 giờ → 0.6 giờ."

