["Faction.TWDirtclaws.Description"]
raw = "These ex-Folktails were more interested in the rocks under their farm than in planting.\nGreat diggers, but awful farmers.\nTheir motto: <i>Deep hole, deeper contentment.</i>"
status = "normal"
enUS = "These ex-Folktails were more interested in the rocks under their farm than in planting. Great diggers, but awful farmers. Their motto: <i>Deep hole, deeper contentment.</i>"
zhCN = "这些前Folktails对他们农场下的岩石更感兴趣，而不是种植。  \n伟大的挖掘者，却是糟糕的农民。  \n他们的座右铭：<i>深洞，深满足。</i>"
zhTW = "這些前田園派對於他們農場下的岩石更感興趣，而非種植。  \n偉大的挖掘者，但糟糕的農民。  \n他們的座右銘：<i>深穴，深層的滿足。</i>"
ruRU = "Эти бывшие жители Фолктейлов были больше заинтересованы в камнях под своей фермой, чем в посадке.\nОтличные копатели, но ужасные фермеры.\nИх девиз: <i>Глубокая яма, большее удовлетворение.</i>"
jaJP = "この元フォークテイルの一団は、農場の下の岩に興味を持っていて、植えることには関心がありませんでした。  \n素晴らしい掘削者ですが、ひどい農夫です。  \n彼らのモットー：<i>深い穴、より深い満足。</i>"
frFR = "Ces ex-Folktails étaient plus intéressés par les roches sous leur ferme que par la plantation.  \nGrands creuseurs, mais mauvais agriculteurs.  \nLeur devise : <i>Un trou profond, un contentement plus profond.</i>"
deDE = "Diese ehemaligen Folktails waren mehr an den Steinen unter ihrem Bauernhof interessiert als am Pflanzen.  \nGroße Gräber, aber furchtbare Bauern.  \nIhr Motto: <i>Tiefes Loch, tiefere Zufriedenheit.</i>"
plPL = "Ci byli Folktails byli bardziej zainteresowani kamieniami pod swoją farmą niż sadzeniem.\nŚwietni kopacze, ale okropni rolnicy.\nIch motto: <i>Głębokie dziury, głębsza satysfakcja.</i>"
ptBR = "Esses ex-Folktails estavam mais interessados nas pedras sob sua fazenda do que em plantar.\nExcelentes escavadores, mas péssimos agricultores.\nSeu lema: <i>Buraco profundo, contentamento mais profundo.</i>"
koKR = "이 전직 포크테일들은 농사를 짓는 것보다 자신의 농장 아래의 바위에 더 관심이 많았습니다.  \n훌륭한 발굴가들이지만 끔찍한 농부들입니다.  \n그들의 모토: <i>깊은 구덩이, 더 깊은 만족.</i>"
csCZ = "Tito bývalí Folktails byli více zaujatí kameny pod jejich farmou než sazením. Skvělí kopáči, ale hrozní farmáři. Jejich motto: <i>Hluboká díra, hlubší spokojenost.</i>"
viVN = "Những cựu Folktails này quan tâm nhiều hơn đến những viên đá dưới trang trại của họ hơn là việc trồng trọt.  \nKẻ đào giỏi, nhưng nông dân tệ hại.  \nKhẩu hiệu của họ: <i>Hố sâu, sự hài lòng sâu sắc hơn.</i>"

["Faction.TWDirtclaws.GameOver.Message"]
raw = "Your Dirtclaws struck out instead of striking it rich. This is the end."
status = "normal"
enUS = "Your Dirtclaws struck out instead of striking it rich. This is the end."
zhCN = "你的泥爪族未能致富，而是失败了。这就是结局。"
zhTW = "你的土爪族未能發財，反而失敗了。這就是結局。"
ruRU = "Ваши Земляные Когти не смогли разбогатеть. Это конец."
jaJP = "あなたのダートクローズは豊かになる代わりに失敗しました。これが終わりです。"
frFR = "Vos Griffe-Terre ont échoué au lieu de devenir riches. C'est la fin."
deDE = "„Ihre Dreckkrallen haben versagt, anstatt reich zu werden. Das ist das Ende.“"
plPL = "Twoje Szponowce nie znalazły bogactwa, zamiast tego poniosły porażkę. To koniec."
ptBR = "Seus Garra de Terra falharam em vez de enriquecer. Este é o fim."
koKR = "당신의 더스트클로가 부자가 되기는커녕 실패했습니다. 이것이 끝입니다."
csCZ = "Vaši Hliněné drápy neuspěli a místo bohatství selhali. Tohle je konec."
viVN = "Dirtclaws của bạn đã thất bại thay vì làm giàu. Đây là điểm kết thúc."

