["ModSetting.TWMoreMines.TailingsErosionThresholdDesc"]
raw = "Amount of water flow needed to start eroding tailings. 0.01 is good for active erosion. When active erosion is off, 0.1 works better. Set to 100 to turn off erosion. Valid range 0 - 100"
status = "normal"
enUS = "Amount of water flow needed to start eroding tailings. 0.01 is good for active erosion. When active erosion is off, 0.1 works better. Set to 100 to turn off erosion. Valid range 0 - 100"
zhCN = "“开始侵蚀尾矿所需的水流量。0.01适用于主动侵蚀。当主动侵蚀关闭时，0.1效果更好。设置为100以关闭侵蚀。有效范围为0 - 100”"
zhTW = "開始侵蝕尾礫所需的水流量。0.01 适合於活躍侵蝕。當活躍侵蝕關閉時，0.1 更有效。設置為 100 可以關閉侵蝕。有效範圍 0 - 100"
ruRU = "Количество потока воды, необходимое для начала эрозии хвостовиков. 0.01 подходит для активной эрозии. Когда активная эрозия отключена, лучше использовать 0.1. Установите на 100, чтобы выключить эрозию. Допустимый диапазон 0 - 100"
jaJP = "尾鉱が侵食を始めるために必要な水流量。0.01は活発な侵食に適しています。活発な侵食がオフのときは、0.1の方が効果的です。侵食をオフにするには100に設定します。有効範囲は0から100です。"
frFR = "Quantité d'écoulement d'eau nécessaire pour commencer à éroder les résidus. 0,01 est bon pour l'érosion active. Lorsque l'érosion active est désactivée, 0,1 fonctionne mieux. Réglez sur 100 pour désactiver l'érosion. Plage valide 0 - 100"
deDE = "Menge an Wasserfluss, die benötigt wird, um die Halden zu erodieren. 0,01 ist gut für aktive Erosion. Wenn die aktive Erosion deaktiviert ist, funktioniert 0,1 besser. Auf 100 setzen, um die Erosion auszuschalten. Gültiger Bereich 0 - 100"
plPL = "Kwota przepływu wody potrzebna do rozpoczęcia erozji odpadów. 0.01 jest dobra dla aktywnej erozji. Gdy aktywna erozja jest wyłączona, 0.1 działa lepiej. Ustaw na 100, aby wyłączyć erozję. Prawidłowy zakres 0 - 100"
ptBR = "Quantidade de fluxo de água necessária para começar a erodir os rejeitos. 0,01 é bom para erosão ativa. Quando a erosão ativa está desligada, 0,1 funciona melhor. Defina para 100 para desligar a erosão. Faixa válida de 0 a 100."
koKR = "물이 느리게 흐르기 시작할 때 테일링 침식을 시작하는 데 필요한 물의 양. 0.01은 활성 침식에 좋습니다. 활성 침식이 꺼져 있을 때는 0.1이 더 잘 작동합니다. 침식을 끄려면 100으로 설정하세요. 유효 범위 0 - 100"
csCZ = "Počet vody potřebný k zahájení eroze odpadů. 0,01 je dobré pro aktivní erozi. Když je aktivní eroze vypnuta, lépe funguje 0,1. Nastavte na 100, abyste erozi vypnuli. Platný rozsah 0 - 100"
viVN = "Số lượng dòng nước cần thiết để bắt đầu xói mòn chất thải. 0,01 là tốt cho xói mòn tích cực. Khi xói mòn tích cực tắt, 0,1 hoạt động tốt hơn. Đặt thành 100 để tắt xói mòn. Phạm vi hợp lệ 0 - 100"

