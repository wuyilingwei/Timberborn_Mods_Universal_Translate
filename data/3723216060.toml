["Building.Tunnel.Description"]
raw = "Tunnels through terrain, replacing it with mine timbers. Use the layer tool to see under terrain or structures."
status = "normal"
enUS = "Tunnels through terrain, replacing it with mine timbers. Use the layer tool to see under terrain or structures."
zhCN = "“在地形中挖隧道，用矿木替代地形。使用图层工具查看地形或结构下方。”"
