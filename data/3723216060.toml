["UI.TW.MoreMines.AutoOrePlacementDialog"]
raw = "This will attempt to place veins and Deep Deposits for all ore types. It works best on maps from 100 to 256 in size. For more control or small maps, consider the manual placement functions.\n\nIt is also not guaranteed to produce perfect results each time. You may want to inspect the ore that was placed, and if you are not happy, use the 'undo last ore action' button to remove it and try again.\n\nAutomatic placement may remove ground-only objects near edge of map (undo will not replace these).\n\n<b><YellowHighlight>NOTE:</YellowHighlight></b> Ore placement may take several minutes, especially on large maps or slow computers."
status = "normal"
enUS = "This will attempt to place veins and Deep Deposits for all ore types. It works best on maps from 100 to 256 in size. For more control or small maps, consider the manual placement functions.\n\nIt is also not guaranteed to produce perfect results each time. You may want to inspect the ore that was placed, and if you are not happy, use the 'undo last ore action' button to remove it and try again.\n\nAutomatic placement may remove ground-only objects near the edge of the map (undo will not replace these).\n\n<b><YellowHighlight>NOTE:</YellowHighlight></b> Ore placement may take several minutes, especially on large maps or slow computers."
zhCN = "这将尝试为所有矿石类型放置矿脉和深层矿石。在大小为100到256的地图上效果最佳。对于更精确的控制或小地图，请考虑手动放置功能。\n\n它也不能保证每次都能产生完美的结果。您可能希望检查已放置的矿石，如果不满意，请使用“撤销上一个矿石操作”按钮将其移除并重试。\n\n自动放置可能会移除接近地图边缘的仅地面物体（撤销不会替换这些物体）。\n\n<b><YellowHighlight>注意：</YellowHighlight></b> 矿石放置可能需要几分钟，尤其是在大地图或慢速计算机上。"
zhTW = "這將嘗試為所有礦石類型放置礦脈和深層沉積物。它在100到256大小的地圖上效果最佳。對於需要更多控制或小地圖的情況，請考慮手動放置功能。\n\n這也不保證每次都能產生完美的結果。您可能想檢查已放置的礦石，如果不滿意，請使用「撤銷最後一次礦石行動」按鈕將其移除並重新嘗試。\n\n自動放置可能會移除靠近地圖邊緣的僅限地面物體（撤銷不會替換這些物體）。\n\n<b><YellowHighlight>注意：</YellowHighlight></b> 礦石放置可能需要幾分鐘，特別是在大型地圖或運行緩慢的電腦上。"
ruRU = "Это попытается разместить жилы и глубокие месторождения для всех типов руды. Лучшие результаты достигаются на картах размером от 100 до 256. Для большей точности или на малых картах рекомендуется использовать функции ручного размещения.\n\nТакже не гарантируется, что каждый раз будут получены идеальные результаты. Вы можете осмотреть размещённую руду, и если вас не устраивает результат, используйте кнопку 'отменить последнее действие с рудой', чтобы удалить её и попробовать снова.\n\nАвтоматическое размещение может удалить объекты, находящиеся только на земле, рядом с краем карты (отмена не заменит их).\n\n<b><YellowHighlight>ПРИМЕЧАНИЕ:</YellowHighlight></b> Размещение руды может занять несколько минут, особенно на больших картах или медленных компьютерах."
jaJP = "これはすべての鉱石タイプの鉱脈と深い鉱床を配置しようとします。100から256のサイズのマップで最も効果的です。より細かい制御や小さなマップが必要な場合は、手動配置機能を考慮してください。\n\n毎回完璧な結果を保証するものではありません。配置された鉱石を確認し、不満があれば「最後の鉱石アクションを元に戻す」ボタンを使用して削除し、再試行してください。\n\n自動配置はマップの端近くにある地面専用のオブジェクトを削除する場合があります（元に戻すではこれらは復元されません）。\n\n<b><YellowHighlight>注:</YellowHighlight></b> 鉱石の配置には数分かかる場合があります。特に大きなマップや遅いコンピュータでは時間がかかることがあります。"
frFR = "Ceci tentera de placer des veines et des dépôts profonds pour tous les types de minerai. Cela fonctionne mieux sur des cartes de taille comprise entre 100 et 256. Pour plus de contrôle ou des petites cartes, envisagez les fonctions de placement manuel.\n\nIl n'est également pas garanti de produire des résultats parfaits à chaque fois. Vous voudrez peut-être inspecter le minerai qui a été placé, et si vous n'êtes pas satisfait, utilisez le bouton 'annuler la dernière action de minerai' pour le retirer et réessayer.\n\nLe placement automatique peut supprimer des objets au sol près du bord de la carte (l'annulation ne remplacera pas ces objets).\n\n<b><YellowHighlight>REMARQUE :</YellowHighlight></b> Le placement des minerais peut prendre plusieurs minutes, surtout sur de grandes cartes ou sur des ordinateurs lents."
deDE = "Dies wird versuchen, Erzgänge und tiefe Ablagerungen für alle Erztpyen zu platzieren. Es funktioniert am besten auf Karten von 100 bis 256 in der Größe. Für mehr Kontrolle oder kleinere Karten ziehen Sie die manuellen Platzierungsfunktionen in Betracht.\n\nEs ist außerdem nicht garantiert, dass jedes Mal perfekte Ergebnisse erzielt werden. Sie sollten das platzierte Erz überprüfen, und wenn Sie nicht zufrieden sind, verwenden Sie die Schaltfläche 'letzte Erzhandlung rückgängig machen', um es zu entfernen und es erneut zu versuchen.\n\nDie automatische Platzierung kann objektspezifische Erdobjekte in der Nähe des Kartenrandes entfernen (rückgängig machen wird diese nicht ersetzen).\n\n<b><YellowHighlight>HINWEIS:</YellowHighlight></b> Die Platzierung von Erz kann mehrere Minuten in Anspruch nehmen, insbesondere auf großen Karten oder langsamen Computern."
plPL = "To będzie próbowało umieścić złoża i głębokie złoża dla wszystkich typów rudy. Najlepiej działa na mapach o rozmiarach od 100 do 256. Dla większej kontroli lub małych map, rozważ funkcje ręcznego umieszczania.\n\nNie ma również gwarancji, że za każdym razem uzyskasz doskonałe wyniki. Może być konieczne sprawdzenie umieszczonej rudy, a jeśli nie jesteś zadowolony, użyj przycisku 'cofnij ostatnią akcję z rudy', aby usunąć ją i spróbować ponownie.\n\nAutomatyczne umieszczanie może usunąć obiekty tylko na ziemi w pobliżu krawędzi mapy (cofnięcie nie przywróci ich).\n\n<b><YellowHighlight>UWAGA:</YellowHighlight></b> Umieszczanie rudy może zająć kilka minut, zwłaszcza na dużych mapach lub wolnych komputerach."
ptBR = "Isto tentará colocar veios e Depósitos Profundos para todos os tipos de minério. Funciona melhor em mapas de tamanho entre 100 e 256. Para mais controle ou mapas pequenos, considere as funções de colocação manual.\n\nNão há garantia de que os resultados sejam perfeitos a cada vez. Você pode querer inspecionar o minério que foi colocado e, se não estiver satisfeito, use o botão 'desfazer última ação de minério' para removê-lo e tentar novamente.\n\nA colocação automática pode remover objetos que estão apenas no chão perto da borda do mapa (desfazer não substituirá estes).\n\n<b><YellowHighlight>NOTA:</YellowHighlight></b> A colocação de minério pode levar vários minutos, especialmente em mapas grandes ou em computadores lentos."
koKR = "이 기능은 모든 광물 유형에 대해 광맥과 깊은 매장지를 배치하려고 시도합니다. 100에서 256 크기의 맵에서 가장 잘 작동합니다. 더 많은 제어가 필요하거나 작은 맵의 경우 수동 배치 기능을 고려하십시오.\n\n매번 완벽한 결과를 보장하지는 않습니다. 배치된 광물을 확인하고 만족하지 않으면 '마지막 광물 작업 실행 취소' 버튼을 사용하여 제거하고 다시 시도하십시오.\n\n자동 배치가 맵 가장자리에 있는 바닥 전용 객체를 제거할 수 있습니다(실행 취소는 이들을 대체하지 않습니다).\n\n<b><YellowHighlight>참고:</YellowHighlight></b> 광물 배치에는 특히 대형 맵이나 느린 컴퓨터에서 몇 분이 걸릴 수 있습니다."
csCZ = "Toto se pokusí umístit žíly a hluboké ložiska pro všechny typy nerostů. Nejlépe funguje na mapách velikosti od 100 do 256. Pokud chcete mít větší kontrolu nebo máte malé mapy, zvažte funkce manuálního umístění.\n\nNení také zaručeno, že výsledek bude dokonalý pokaždé. Možná budete chtít zkontrolovat umístěné nerosty, a pokud nebudete spokojeni, použijte tlačítko 'vrátit poslední akci s nerostem', abyste je odstranili a zkusili to znovu.\n\nAutomatické umístění může odstranit objekty pouze na zemi poblíž okraje mapy (vrátit neposkytne tyto objekty zpět).\n\n<b><YellowHighlight>POZNÁMKA:</YellowHighlight></b> Umístění nerostů může trvat několik minut, zejména na velkých mapách nebo na pomalých počítačích."
viVN = "Điều này sẽ cố gắng đặt các mạch và Khoáng sản sâu cho tất cả các loại quặng. Nó hoạt động tốt nhất trên các bản đồ có kích thước từ 100 đến 256. Để kiểm soát nhiều hơn hoặc các bản đồ nhỏ, hãy xem xét các chức năng đặt thủ công.\n\nNó cũng không đảm bảo sẽ sản xuất kết quả hoàn hảo mỗi lần. Bạn có thể muốn kiểm tra quặng đã được đặt, và nếu bạn không hài lòng, hãy sử dụng nút 'hoàn tác hành động quặng cuối cùng' để xóa nó và thử lại.\n\nViệc đặt tự động có thể xóa các đối tượng chỉ nằm trên mặt đất gần rìa bản đồ (hoàn tác sẽ không thay thế những đối tượng này).\n\n<b><YellowHighlight>CHÚ Ý:</YellowHighlight></b> Việc đặt quặng có thể mất vài phút, đặc biệt là trên các bản đồ lớn hoặc máy tính chậm."

["UI.TW.MoreMines.AutoOrePlacementFailure"]
raw = "Not all ore was placed successfully. Some ore types may be missing or rare. This is likely due to a small map. Consider using the manual ore placement buttons for more control."
status = "normal"
enUS = "Not all ore was placed successfully. Some ore types may be missing or rare. This is likely due to a small map. Consider using the manual ore placement buttons for more control."
zhCN = "并非所有矿石都已成功放置。某些矿石类型可能缺失或稀有。这可能是由于地图较小造成的。考虑使用手动矿石放置按钮以获得更多控制。"
zhTW = "並非所有礦石都成功放置。一些礦石類型可能缺失或稀有。這可能是由於地圖較小。考慮使用手動礦石放置按鈕以獲得更多控制。"
ruRU = "Не все руды были успешно размещены. Некоторые типы руд могут отсутствовать или быть редкими. Скорее всего, это связано с малым размером карты. Рассмотрите возможность использования кнопок ручного размещения руды для большего контроля."
jaJP = "すべての鉱石が正常に配置されませんでした。一部の鉱石タイプが欠落していたり、希少である可能性があります。これは小さいマップが原因である可能性が高いです。より詳細なコントロールのために手動鉱石配置ボタンの使用を検討してください。"
frFR = "Tous les minerais n'ont pas été placés avec succès. Certains types de minerai peuvent manquer ou être rares. Cela est probablement dû à une petite carte. Envisagez d'utiliser les boutons de placement manuel des minerais pour plus de contrôle."
deDE = "Nicht alle Erze wurden erfolgreich platziert. Einige Erztypen könnten fehlen oder selten sein. Dies ist wahrscheinlich auf eine kleine Karte zurückzuführen. Ziehen Sie in Betracht, die manuellen Erzplatzierungen für mehr Kontrolle zu verwenden."
plPL = "Nie wszystkie rudy zostały pomyślnie umieszczone. Niektóre rodzaje rud mogą być brakujące lub rzadkie. Jest to prawdopodobnie spowodowane małą mapą. Rozważ użycie przycisków ręcznego umieszczania rud dla większej kontroli."
ptBR = "Nem todo o minério foi colocado com sucesso. Alguns tipos de minério podem estar ausentes ou serem raros. Isso é provável devido a um mapa pequeno. Considere usar os botões de colocação manual de minério para mais controle."
koKR = "모든 광석이 성공적으로 배치되지 않았습니다. 일부 광석 유형이 누락되었거나 희귀할 수 있습니다. 이는 작은 맵 때문일 가능성이 높습니다. 더 많은 제어를 위해 수동 광석 배치 버튼을 사용하는 것을 고려해 보세요."
csCZ = "Některé rudy nebyly úspěšně umístěny. Některé typy rud mohou chybět nebo být vzácné. Je pravděpodobné, že to je způsobeno malou mapou. Zvažte použití tlačítek pro ruční umístění rud pro větší kontrolu."
viVN = "Không phải tất cả quặng đều được đặt thành công. Một số loại quặng có thể bị thiếu hoặc hiếm. Điều này có thể do bản đồ quá nhỏ. Hãy xem xét việc sử dụng các nút đặt quặng thủ công để có nhiều kiểm soát hơn."

