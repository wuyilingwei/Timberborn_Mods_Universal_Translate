["Building.TWMineEngineerOffice.Description"]
raw = "Marks nearby accessible ore for mining. The player can usually do a better job, but this reduces micro-management"
status = "normal"
enUS = "Marks nearby accessible ore for mining. The player can usually do a better job, but this reduces micro-management."
zhCN = "“标记附近可开采的矿石。玩家通常能做得更好，但这减轻了微观管理的压力。”"
zhTW = "標示附近可開採的礦石。玩家通常能做得更好，但這減少了微觀管理。"
ruRU = "ОтмечаетNearby доступные руды для добычи. Игрок обычно может сделать это лучше, но это уменьшает микро-менеджмент."
jaJP = "近くのアクセス可能な鉱石を採掘のためにマークします。プレイヤーが通常はより良い作業を行えますが、これによりマイクロマネジメントが減少します。"
