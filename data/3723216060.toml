["Building.TWEarthRevitalizer.Description"]
raw = "A hole to the center of the earth, where beavers inject nutrients to revitalize the underground micro-ecosystems.\n● <YellowHighlight>Bottom only:</YellowHighlight> Must be built on lowest level of map."
status = "normal"
enUS = "A hole to the center of the earth, where beavers inject nutrients to revitalize the underground micro-ecosystems.  \n● <YellowHighlight>Bottom only:</YellowHighlight> Must be built on the lowest level of the map."
zhCN = "“通往地心的孔洞，海狸在这里注入营养，以 revitalizing 地下微生态系统。\n● <YellowHighlight>仅底部：</YellowHighlight> 必须建在地图的最低层。”"
zhTW = "「這是一個通往地球中心的洞穴，海狸在此注入養分，以重振地下微生態系統。  \n● <YellowHighlight>僅限底部：</YellowHighlight> 必須建造在地圖的最低層。」"
ruRU = "Яма до центра Земли, где бобры закачивают питательные вещества, чтобы восстановить подземные микроэкосистемы.  \n● <YellowHighlight>Только снизу:</YellowHighlight> Должно быть построено на самом низком уровне карты."
jaJP = "「地球の中心への穴で、ビーバーが地下の微生物群を活性化させるために栄養素を注入します。  \n● <YellowHighlight>底のみ:</YellowHighlight> マップの最下層に建設する必要があります。」"
frFR = "Un trou vers le centre de la terre, où les castors injectent des nutriments pour revitaliser les micro-écosystèmes souterrains.  \n● <YellowHighlight>Uniquement au bas :</YellowHighlight> Doit être construit au niveau le plus bas de la carte."
deDE = "Ein Loch zum Mittelpunkt der Erde, wo Biber Nährstoffe injizieren, um die unterirdischen Mikro-Ökosysteme zu revitalisieren.  \n● <YellowHighlight>Nur unten:</YellowHighlight> Muss auf der niedrigsten Ebene der Karte gebaut werden."
plPL = "Otwór do centrum ziemi, gdzie bobry wstrzykują składniki odżywcze, aby ożywić podziemne mikroekosystemy.  \n● <YellowHighlight>Tylko na dole:</YellowHighlight> Musi być zbudowane na najniższym poziomie mapy."
ptBR = "Um buraco para o centro da terra, onde os castores injetam nutrientes para revitalizar os microecossistemas subterrâneos.  \n● <YellowHighlight>Apenas no fundo:</YellowHighlight> Deve ser construído no nível mais baixo do mapa."
koKR = "지구 중심으로 가는 구멍, 비버들이 지하 미세 생태계를 되살리기 위해 영양소를 주입하는 곳입니다.\n● <YellowHighlight>바닥만:</YellowHighlight> 지도에서 가장 낮은 곳에 건설해야 합니다."
csCZ = "Díra do středu země, kde bobři injektují živiny, aby oživili podzemní mikroekosystémy.  \n● <YellowHighlight>Jen na dně:</YellowHighlight> Musí být postaveno na nejnižší úrovni mapy."
viVN = "Một lỗ vào trung tâm của trái đất, nơi những con hải ly bơm chất dinh dưỡng để tái sinh các hệ sinh thái vi mô dưới lòng đất.\n● <YellowHighlight>Chỉ đáy:</YellowHighlight> Phải được xây dựng ở cấp độ thấp nhất của bản đồ."

["Building.TWEarthRevitalizer.FlavorDescription"]
raw = "“Deeper, deeper, down we go!” — Pina"
status = "normal"
enUS = "“Deeper, deeper, down we go!” — Pina"
zhCN = "“更深，更深，我们下去！” — 皮娜"
