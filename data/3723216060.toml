["ModSetting.TWMoreMines.ActiveTailingsErosionDesc"]
raw = "When checked, tailings will use a better erosion simulation. More CPU intensive, but allows tailings to erode over time, when exposed to flowing water."
status = "normal"
enUS = "When checked, tailings will use a better erosion simulation. More CPU intensive, but allows tailings to erode over time when exposed to flowing water."
zhCN = "“选中后，尾矿将使用更好的侵蚀模拟。虽然更占用 CPU，但允许尾矿在暴露于流动水中时随着时间侵蚀。”"
zhTW = "勾選後，尾礦將使用更好的侵蝕模擬。這需要更多的 CPU 資源，但允許尾礦在暴露於流動水中時隨時間侵蝕。"
ruRU = "При включении хвосты будут использовать улучшенную симуляцию эрозии. Более нагружающая процессор, но позволяет хвостам эродировать со временем, когда они подвергаются воздействию текущей воды."
jaJP = "チェックを入れると、テールングがより良い侵食シミュレーションを使用します。CPUへの負担は大きくなりますが、流れる水にさらされることでテールングが時間とともに侵食されるようになります。"
frFR = "Lorsqu'il est coché, les résidus utiliseront une meilleure simulation d'érosion. Plus exigeante en CPU, mais permet aux résidus de s'éroder avec le temps lorsqu'ils sont exposés à l'eau courante."
deDE = "Wenn aktiviert, verwenden die Rückstände eine bessere Erosionssimulation. Intensiverer CPU-Bedarf, ermöglicht jedoch, dass Rückstände über Zeit erodieren, wenn sie fließendem Wasser ausgesetzt sind."
plPL = "Gdy zaznaczone, odpady będą korzystać z lepszej symulacji erozji. Bardziej wymagające pod względem CPU, ale pozwala na erozję odpadów z upływem czasu, gdy są wystawione na działanie płynącej wody."
ptBR = "Quando marcado, os rejeitos usarão uma simulação de erosão melhor. Mais intensivo em CPU, mas permite que os rejeitos erodem ao longo do tempo, quando expostos à água corrente."
koKR = "체크할 경우, 테일링은 더 나은 침식 시뮬레이션을 사용합니다. CPU 집약적이지만 흐르는 물에 노출될 때 시간에 따라 테일링이 침식됩니다."
csCZ = "Při zaškrtnutí bude mít odpad lepší simulaci eroze. Více náročné na CPU, ale umožňuje, aby odpad s postupem času erodoval, když je vystaven tekoucí vodě."
viVN = "Khi được chọn, bãi thải sẽ sử dụng một mô phỏng xói mòn tốt hơn. Tốn nhiều CPU hơn, nhưng cho phép bãi thải xói mòn theo thời gian, khi tiếp xúc với nước chảy."

