["Resource.TWIronOre.Description"]
raw = "Source of Iron Ore. Use dynamite or build a tunnel here to collect it."
status = "normal"
enUS = "Source of Iron Ore. Use dynamite or build a tunnel here to collect it."
zhCN = "“铁矿石来源。使用炸药或在此处建造隧道以进行采集。”"
zhTW = "鐵礦的來源。在這裡使用炸藥或建造隧道來收集它。"
ruRU = "Источник железной руды. Используйте динамит или постройте туннель здесь, чтобы собрать её."
jaJP = "鉄鉱石の源。ここでダイナマイトを使うか、トンネルを建設して収集してください。"
frFR = "Source de minerai de fer. Utilisez de la dynamite ou construisez un tunnel ici pour le collecter."
deDE = "Eisenlager. Verwenden Sie Dynamit oder bauen Sie hier einen Tunnel, um es abzubauen."
plPL = "Źródło rudy żelaza. Użyj dynamitu lub zbuduj tunel tutaj, aby ją zdobyć."
ptBR = "Fonte de Minério de Ferro. Use dinamite ou construa um túnel aqui para coletá-lo."
koKR = "철광석의 원천. 여기서 다이너마이트를 사용하거나 터널을 건설하여 채집하세요."
csCZ = "Zdroj železné rudy. Použijte dynamit nebo zde postavte tunel, abyste ji získali."
viVN = "Nguồn khoáng sắt. Sử dụng thuốc nổ hoặc xây dựng một đường hầm ở đây để thu thập."

["Resource.TWIronOre.FlavorDescription"]
raw = "Many a tooth was broken before beavers learned not to taste the ore"
status = "normal"
enUS = "Many a tooth was broken before beavers learned not to taste the ore."
zhCN = "在海狸学会不要尝试矿石之前，许多牙齿都被折断了。"
zhTW = "「在海狸學會不去嘗試礦石之前，很多牙齒都被打斷了。」"
ruRU = "Множество зубов было сломано, прежде чем бобры научились не пробовать руду."
jaJP = "「ビーバーたちが鉱石を味わわないことを学ぶ前に、多くの歯が折れた。」"
frFR = "Beaucoup de dents ont été brisées avant que les castors n'apprennent à ne pas goûter le minerai."
deDE = "Viele Zähne wurden zerbrochen, bevor die Biber lernten, das Erz nicht zu kosten."
