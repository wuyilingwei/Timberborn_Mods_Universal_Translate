["LV.CPl.ReproducibleChanceMultiplierDesc"]
raw = "Adjusts the chance for trees to reproduce each hour (default: 1–3% depending on type).\nDefault: ×1. ×0 disables reproduction. Example: ×2 makes a Pine with a base 3% chance reproduce at 6% chance."
status = "normal"
enUS = "Adjusts the chance for trees to reproduce each hour (default: 1–3% depending on type). Default: ×1. ×0 disables reproduction. Example: ×2 makes a Pine with a base 3% chance reproduce at 6% chance."
zhCN = "每小时调整树木繁殖的机会（默认为：根据类型为1–3%）。\n默认：×1。×0禁用繁殖。例如：×2使基础繁殖率为3%的松树的繁殖机会提高到6%."
zhTW = "調整每小時樹木繁殖的機會（默認值：根據種類為 1～3%）。\n默認值：×1。×0 禁用繁殖。示例：×2 使一棵基礎繁殖機率為 3% 的松樹繁殖機率變為 6%。"
ruRU = "Настраивает вероятность размножения деревьев каждый час (по умолчанию: 1–3% в зависимости от типа). \nПо умолчанию: ×1. ×0 отключает размножение. Пример: ×2 заставляет сосну с базовой вероятностью 3% размножаться с вероятностью 6%."
jaJP = "毎時の樹木の繁殖確率を調整します（デフォルト: 種類に応じて1〜3%）。\nデフォルト: ×1。×0は繁殖を無効にします。例: ×2は基本3%の確率を持つ松が6%の確率で繁殖するようにします。"
frFR = "Ajuste la chance de reproduction des arbres chaque heure (par défaut : 1–3 % en fonction du type).\nPar défaut : ×1. ×0 désactive la reproduction. Exemple : ×2 fait qu'un Pin avec une chance de base de 3 % reproduit à 6 %."
deDE = "Passt die Chance an, dass Bäume jede Stunde reproduzieren (Standard: 1–3 % je nach Typ). Standard: ×1. ×0 deaktiviert die Reproduktion. Beispiel: ×2 lässt eine Kiefer mit einer Grundchance von 3 % mit 6 % reproduzieren."
plPL = "Dostosowuje szansę na rozmnażanie drzew co godzinę (domyślnie: 1–3% w zależności od typu). \nDomyślnie: ×1. ×0 wyłącza rozmnażanie. Przykład: ×2 sprawia, że sosna z podstawową szansą 3% rozmnaża się z szansą 6%."
ptBR = "Ajusta a chance de as árvores se reproduzirem a cada hora (padrão: 1-3% dependendo do tipo). Padrão: ×1. ×0 desativa a reprodução. Exemplo: ×2 faz um Pinheiro com 3% de chance base reproduzir com 6% de chance."
koKR = "각 시간마다 나무가 생식할 확률을 조정합니다(기본값: 유형에 따라 1~3%).\n기본값: ×1. ×0은 생식을 비활성화합니다. 예: ×2는 기본 3% 확률을 가진 소나무가 6% 확률로 생식하게 만듭니다."
csCZ = "Nastavuje šanci na rozmnožování stromů každou hodinu (výchozí: 1–3% v závislosti na typu). \nVýchozí: ×1. ×0 zakazuje rozmnožování. Příklad: ×2 způsobí, že Borovice s základní šancí 3% se reprodukuje s 6% šancí."
viVN = "Điều chỉnh cơ hội cây cối tái sinh mỗi giờ (mặc định: 1–3% tùy thuộc vào loại).\nMặc định: ×1. ×0 vô hiệu hóa khả năng sinh sản. Ví dụ: ×2 khiến một cây Thông với cơ hội cơ bản 3% tái sinh với cơ hội 6%."

