["Building.UndergroundVerticalTubeway.Description"]
status = "normal"
raw = "Digs a tunnel and installs a vertical tubeway in one step. Beavers travel through it at high speed, both horizontally and between levels."
enUS = "Digs a tunnel and installs a vertical tubeway in one step. Beavers travel through it at high speed, both horizontally and between levels."
zhCN = "在一个步骤中挖掘隧道并安装竖向管道。海狸在其中以高速穿梭，水平移动和跨层移动都很快。"
zhTW = "在一次操作中挖掘隧道並安裝一條垂直管道。海狸以高速穿過它，水平穿越與跨層移動皆可。"
ruRU = "Копает туннель и устанавливает вертикальный тубвей за один шаг. Бобры по нему перемещаются на большой скорости как по горизонтали, так и между уровнями."
jaJP = "トンネルを掘り、垂直チューブウェイを一度に設置します。ビーバーはそれを高速で通り抜け、水平にも階層間にも移動します。"
frFR = "Creuse un tunnel et installe un tubeway vertical en une seule étape. Les castors y circulent à grande vitesse, à la fois horizontalement et entre les niveaux."
deDE = "Gräbt einen Tunnel und installiert in einem Schritt eine vertikale Röhrenbahn. Biber bewegen sich darin mit hoher Geschwindigkeit, sowohl horizontal als auch zwischen den Ebenen."
plPL = "Wykopuje tunel i instaluje pionowy tubeway w jednym kroku. Bobry poruszają się przez niego z dużą prędkością, zarówno poziomo, jak i między poziomami."
ptBR = "Cava um túnel e instala um tubeway vertical em um único passo. Castores viajam por ele em alta velocidade, tanto horizontalmente quanto entre níveis."
koKR = "한 번에 터널을 파고 수직 튜베웨이를 설치합니다. 비버들은 그것을 통해 수평 방향으로도, 층 간으로도 고속으로 이동합니다."
csCZ = "Vykopává tunel a instaluje vertikální tubovou dráhu jedním krokem. Bobři se po ní pohybují vysokou rychlostí, a to horizontálně i mezi úrovněmi."
viVN = "Đào một đường hầm và lắp đặt một tubeway thẳng đứng trong một bước. Hải ly di chuyển qua nó với tốc độ cao, cả theo chiều ngang lẫn giữa các tầng."

