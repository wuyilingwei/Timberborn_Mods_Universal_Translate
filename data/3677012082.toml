["Building.UndergroundTubeway.Description"]
status = "normal"
raw = "Digs a tunnel and installs a tubeway in one step. Beavers travel through it at high speed."
enUS = "Digs a tunnel and installs a tubeway in one step. Beavers travel through it at high speed."
zhCN = "在同一步骤中挖掘一条隧道并安装 tubeway。海狸以高速穿过它。"
zhTW = "一次就完成挖隧道並安裝地下筒道。海狸以高速穿過它。"
ruRU = "Копает туннель и устанавливает Тубвей за один шаг. Бобры проходят по нему на высокой скорости."
jaJP = "トンネルを掘って一度にチューブウェイを敷設します。ビーバーはそれを高速で通過します。"
frFR = "Creuse un tunnel et installe un tubeway en une seule étape. Les castors y voyagent à grande vitesse."
deDE = "Gräbt in einem Schritt einen Tunnel und installiert eine Tubeway. Biber fahren mit hoher Geschwindigkeit hindurch."
plPL = "Wykopuje tunel i instaluje tubę w jednym kroku. Bobry poruszają się przez nią z dużą prędkością."
ptBR = "Escava um túnel e instala um tubeway em um único passo. Os castores passam por ele em alta velocidade."
koKR = "한 번에 터널을 파고 튜웨이를 설치합니다. 비버들은 그것을 빠른 속도로 통과합니다."
csCZ = "Vykope tunel a jedním krokem nainstaluje tubeway. Veverky po ní jedou vysokou rychlostí."
viVN = "Đào một đường hầm và lắp đặt tubeway trong một bước. Các chú hải ly di chuyển qua nó với tốc độ cao."

["Building.UndergroundTubeway.FlavorDescription"]
status = "normal"
raw = "Why dig first and build later when you can do both at once?"
enUS = "Why dig first and build later when you can do both at once?"
zhCN = "为何先挖掘再建造，而不能两者同时完成？"
zhTW = "為什麼要先挖掘再建造，當你可以同時完成兩者？"
ruRU = "Зачем копать сначала и строить позже, если можно сделать и то, и другое одновременно?"
jaJP = "同時に両方できるなら、どうして先に掘ってから建てる必要があるのですか？"
frFR = "Pourquoi creuser d'abord et construire plus tard lorsque vous pouvez faire les deux en même temps ?"
deDE = "Warum zuerst graben und später bauen, wenn du beides gleichzeitig tun kannst?"
plPL = "Dlaczego najpierw kopać, a później budować, skoro możesz zrobić obie czynności jednocześnie?"
ptBR = "Por que cavar primeiro e construir depois quando você pode fazer os dois ao mesmo tempo?"
koKR = "먼저 파고 나중에 짓느니, 둘 다 한꺼번에 할 수 있다면?"
csCZ = "Proč nejdříve kopat a stavět až později, když můžete dělat obojí najednou?"
viVN = "Tại sao phải đào trước và xây sau trong khi bạn có thể làm cả hai cùng lúc?"

