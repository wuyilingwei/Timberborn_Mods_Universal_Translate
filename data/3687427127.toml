["Building.BarkimedesScrew.FlavorDescription"]
status = "normal"
raw = "For us natural science is the Archimedes' screw that alone can turn the world to face the sun of reason. Maxim Gorky"
enUS = "\"For us, natural science is the Archimedes' screw that alone can turn the world to face the sun of reason.\" - Maxim Gorky"
zhCN = "“对我们来说，自然科学就是阿基米德的螺旋桨，只有它能够让世界朝向理智的太阳。——马克西姆·高尔基”"
zhTW = "「對我們來說，自然科學是阿基米德的螺旋槳，單靠它可以讓世界面對理性的陽光。— 馬克西姆·高爾基」"
ruRU = "Для нас естествоиспытание — это винт Архимеда, который в одиночку может повернуть мир лицом к солнцу разума. Максим Горький"
jaJP = "「自然科学は、私たちにとってアリストテレスのねじであり、それだけで世界を理性の太陽に向かわせることができます。」マクシム・ゴーリキー"
frFR = "Pour nous, la science naturelle est la vis d'Archimède qui peut seule tourner le monde pour faire face au soleil de la raison. Maxim Gorky"
deDE = "Für uns ist die Naturwissenschaft die Archimedes-Schraube, die allein die Welt dazu bringen kann, sich der Sonne der Vernunft zuzuwenden. Maxim Gorky"
plPL = "Dla nas nauki przyrodnicze to śruba Archimedesa, która sama w sobie potrafi obrócić świat w stronę słońca rozumu. Maksym Gorki"
ptBR = "Para nós, a ciência natural é a parafuso de Arquímedes que, sozinha, pode virar o mundo para encarar o sol da razão. Maksim Górki"
koKR = "자연과학은 우리가 아는 것처럼 세상을 이성의 태양을 향하게 할 수 있는 아르키메데스 나사입니다. 막심 고리키"
csCZ = "Pro nás je přírodní věda Archimédův šroub, který může sám otočit svět, aby čelil slunci rozumu. Maxim Gorky"
viVN = "Đối với chúng tôi, khoa học tự nhiên là chiếc vít Archimedes mà chỉ riêng nó có thể xoay chuyển thế giới quay về phía mặt trời của lý trí. Maxim Gorky"
