["Tutorial.VerticalArchitecture.BuildRooftopTerrace"]
raw = "У пусташы важна аптымальна выкарыстоўваць прастору. Бабры робяць гэта, развіваючы свае гарады ў вышыню.\n                                                   \nНекаторыя будынкі, такія як Хаткі, маюць роўныя дахі, здольныя вытрымліваць іншыя канструкцыі.\n                                                   \nПабудуем цяпер Тэрасу на даху. Магчыма, спатрэбіцца выкарыстаць Лесвіцы, каб злучыць яе з раёнам."
status = "normal"
enUS = "In the wasteland, it's important to optimize the use of space. Beavers achieve this by developing their cities upward.\n\nSome buildings, like Houses, have flat roofs that can support other structures.\n\nLet's now build a Rooftop Terrace. You may need to use Ladders to connect it to the area."
zhCN = "在荒野中，合理利用空间至关重要。海狸们通过向上发展他们的城市来做到这一点。\n\n一些建筑，比如小屋，拥有平坦的屋顶，可以支撑其他结构。\n\n现在我们来建造一个屋顶露台。可能需要使用楼梯将它与区域连接起来。"
zhTW = "在荒地上，合理利用空間非常重要。海狸通過向上發展他們的城市來做到這一點。\n\n某些建築物，例如小屋，擁有平坦的屋頂，能夠支撐其他結構。\n\n現在讓我們在屋頂上建造露台。可能需要使用樓梯將其連接到區域。"
ruRU = "На пустоши важно оптимально использовать пространство. Бобры делают это, развивая свои города в высоту.\n\nНекоторые здания, такие как Хатки, имеют плоские крыши, способные выдерживать другие конструкции.\n\nПостроим сейчас Террасу на крыше. Возможно, потребуется использовать Лестницы, чтобы соединить ее с районом."
jaJP = "荒れ地では空間を最適に活用することが重要です。ビーバーたちは、彼らの街を高く成長させることでこれを実現します。\n                                                   \nいくつかの建物、例えば小屋には、他の構造物を支えるのに十分な平らな屋根があります。\n                                                   \nそれでは、屋上にテラスを建てましょう。エレベーターを使ってエリアと接続する必要があるかもしれません。"
frFR = "Dans la friche, il est important d'utiliser l'espace de manière optimale. Les castors le font en développant leurs villes en hauteur.\n\nCertains bâtiments, comme les Maisons, ont des toits plats capables de supporter d'autres constructions.\n\nConstruisons maintenant une Terrasse sur le toit. Il peut être nécessaire d'utiliser des Échelles pour la connecter à la zone."
deDE = "In der Ödnis ist es wichtig, den Raum optimal zu nutzen. Biber tun dies, indem sie ihre Städte in die Höhe entwickeln.\n                                                   \nEinige Gebäude, wie die Hütten, haben flache Dächer, die in der Lage sind, andere Konstruktionen zu tragen.\n                                                   \nLass uns jetzt eine Terrasse auf dem Dach bauen. Möglicherweise müssen Treppen verwendet werden, um sie mit dem Bereich zu verbinden."
plPL = "W pustkowiu ważne jest optymalne wykorzystanie przestrzeni. Bobry robią to, rozwijając swoje miasta w górę.\n\nNiektóre budynki, takie jak Chatki, mają płaskie dachy, które mogą utrzymać inne konstrukcje.\n\nZbudujmy teraz Taras na dachu. Może być konieczne użycie Schodów, aby połączyć go z obszarem."
ptBR = "Na planície, é importante usar o espaço de forma otimizada. Os castores fazem isso desenvolvendo suas cidades para cima.\n\nAlguns edifícios, como as Cabines, têm telhados planos que podem suportar outras construções.\n\nVamos construir agora um Terraço no telhado. Pode ser necessário usar Escadas para conectá-lo à área."
koKR = "황량한 지역에서는 공간을 최적화하는 것이 중요합니다. 비버들은 자신의 도시를 높이 발전시켜 이를 실현합니다. \n\n일부 건물, 예를 들어 집들은 다른 구조물을 지탱할 수 있는 평평한 지붕을 가지고 있습니다. \n\n이제 지붕 위에 테라스를 건설해 봅시다. 이를 연결하기 위해 사다리를 사용할 필요가 있을 수 있습니다."
csCZ = "Na pustatině je důležité optimálně využívat prostor. Bobři to dělají tím, že své města rozvíjejí do výšky.\n\nNěkteré budovy, jako jsou Chatky, mají ploché střechy, které mohou mít další konstrukce.\n\nTeď si postavíme Terasu na střeše. Možná bude potřeba použít Schody, abychom ji spojili s oblastí."
viVN = "Trong vùng hoang vu, việc sử dụng không gian một cách tối ưu là rất quan trọng. Những con castor làm điều đó bằng cách phát triển các thành phố của chúng lên cao.\n\nMột số tòa nhà, chẳng hạn như Nhà gỗ, có mái phẳng có thể chịu được các cấu trúc khác.\n\nBây giờ hãy xây dựng một Sân thượng trên mái. Có thể cần sử dụng Cầu thang để kết nối nó với khu vực."

