["MapMetadata.Spillage.Description"]
raw = "Гэты схіл поўны невялікіх абваднёных анклавоў. Аднак у рэгіёне хапае небяспек — калі не быць асцярожным, гэтыя мясціны стануць чым заўгодна, толькі не гасціннымі."
status = "normal"
enUS = "This slope is full of small flooded enclaves. However, the region is filled with danger—if you're not careful, these areas will become anything but hospitable."
zhCN = "这个山坡布满了小的被水围绕的飞地。然而，区域内充满了危险——如果不小心，这些地方会变成任何东西，但绝对不是宜居的。"
zhTW = "這個斜坡上滿是小型的水災區。然而，這個地區充滿了危險——如果不小心，這些地方會變成任何東西，絕對不會是宜居的。"
ruRU = "Этот склон полон небольших заболоченных анклавов. Однако в регионе хватает опасностей — если не быть осторожным, эти места станут чем угодно, только не гостеприимными."
jaJP = "この斜面は小さな水に浸された飛び地でいっぱいです。しかし、この地域には危険が潜んでいます。注意しないと、これらの場所は決して快適ではなくなります。"
frFR = "Cette pente est pleine de petits enclaves inondés. Cependant, la région regorge de dangers : si l'on n'est pas prudent, ces endroits deviendront tout sauf accueillants."
deDE = "Dieser Hang ist voller kleiner bewässerter Enklaven. Allerdings gibt es in der Region ausreichend Gefahr - wenn man nicht vorsichtig ist, werden diese Orte zu allem Möglichen, nur nicht gastfreundlich."
plPL = "Ten zbocze jest pełne małych, podmokłych enklaw. Jednak w regionie nie brakuje niebezpieczeństw — jeśli nie będziesz ostrożny, te tereny staną się czymkolwiek innym, tylko nie gościnnymi."
ptBR = "Esta encosta está cheia de pequenos enclaves alagados. No entanto, a região está cheia de perigos - se não tiver cuidado, esses locais se tornarão o que quiser, menos hospitaleiros."
koKR = "이 경사는 작은 수원지로 가득 차 있습니다. 하지만 이 지역에는 위험이 많습니다 - 조심하지 않으면 이 장소들은 어떤 것도 아닌, 환영받지 않는 곳이 될 것입니다."
csCZ = "Tento svah je plný malých zatopených enkláv. Avšak v této oblasti je dostatek nebezpečí - pokud nebudete opatrní, tato místa se stanou čímkoliv, jen ne pohostinnými."
viVN = "Đồi này đầy những vùng đất ngập nước nhỏ. Tuy nhiên, khu vực này đầy rẫy nguy hiểm - nếu không cẩn thận, những nơi này sẽ trở thành bất cứ thứ gì, chỉ không thân thiện."

