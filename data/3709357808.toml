["Tutorial.Introduction.Description"]
raw = "Сардэчна запрашаем у Timberborn! Гэта навучанне дапаможа вам устаць на лапы ў пусташы і перажыць першыя дні.\n                                   \nВы даведаецеся, як карыстацца інструментамі, патрэбнымі для пабудовы квітнеючай бабровай супольнасці.\n                                   \nПа меры праходжання наступных крокаў парады будуць з'яўляцца тут."
status = "normal"
enUS = "Welcome to Timberborn! This tutorial will help you get on your feet in the wasteland and survive the first days.\n\nYou will learn how to use the tools needed to build a thriving beaver community.\n\nAs you progress through the upcoming steps, tips will appear here."
zhCN = "欢迎来到 Timberborn！这个教程将帮助您在荒野中站稳脚跟，度过最初的几天。\n\n您将学习如何使用构建繁荣海狸社区所需的工具。\n\n在接下来的步骤中，提示将会出现在这里。"
zhTW = "歡迎來到 Timberborn！這個教程將幫助您在荒野中站穩腳步，並度過最初的幾天。\n\n您將學會如何使用建設繁榮的海狸社區所需的工具。\n\n在接下來的步驟中，建議將會在這裡出現。"
ruRU = "Добро пожаловать в Timberborn! Это обучение поможет вам встать на ноги в пустоши и пережить первые дни.\n\nВы узнаете, как пользоваться инструментами, необходимыми для построения процветающего бобрового сообщества.\n\nПо мере прохождения следующих этапов советы будут появляться здесь."
jaJP = "「Timberborn」へようこそ！このチュートリアルでは、荒野で立ち上がり、最初の日々を生き抜くための手助けをします。\n\n繁栄するビーバーのコミュニティを築くために必要な道具の使い方を学びます。\n\n今後のステップを進むにつれて、ここにヒントが表示されます。"
frFR = "Bienvenue dans Timberborn ! Ce tutoriel vous aidera à prendre vos repères dans la friche et à survivre vos premiers jours.\n\nVous apprendrez à utiliser les outils nécessaires pour construire une communauté de castors florissante.\n\nAu fur et à mesure que vous avancerez dans les étapes suivantes, des conseils apparaîtront ici."
deDE = "Herzlich willkommen bei Timberborn! Dieses Tutorial hilft Ihnen, in der Ödnis auf die Beine zu kommen und die ersten Tage zu überstehen.\n\nSie werden lernen, wie Sie die Werkzeuge nutzen, die nötig sind, um eine blühende Bibergemeinschaft aufzubauen.\n\nIm Laufe der nächsten Schritte werden hier Tipps erscheinen."
plPL = "Witaj w Timberborn! Ten przewodnik pomoże ci stanąć na nogi w pustkowiu i przetrwać pierwsze dni.\n\nDowiesz się, jak korzystać z narzędzi potrzebnych do zbudowania kwitnącej społeczności bobrów.\n\nW miarę przechodzenia kolejnych kroków porady będą się pojawiać tutaj."
ptBR = "Seja bem-vindo ao Timberborn! Este tutorial irá ajudá-lo a se estabelecer no deserto e sobreviver aos primeiros dias.\n                                   \nVocê aprenderá a usar as ferramentas necessárias para construir uma próspera comunidade de castores.\n                                   \nConforme você avança pelos próximos passos, dicas aparecerão aqui."
koKR = "Timberborn에 오신 것을 환영합니다! 이 튜토리얼은 황무지에서 발을 디디고 첫 날들을 살아남는 데 도움을 줄 것입니다.\n\n여기서 번성하는 비버 커뮤니티를 구축하는 데 필요한 도구를 사용하는 방법을 배우게 됩니다.\n\n다음 단계를 진행함에 따라 조언이 여기 나타날 것입니다."
csCZ = "Vítejte v Timberborn! Tento návod vám pomůže postavit se na nohy v pustotině a přežít první dny.\n\nDozvíte se, jak používat nástroje potřebné k vybudování prosperující bobří komunity.\n\nJak budete postupovat následujícími kroky, rady se budou objevovat zde."
viVN = "Chào mừng đến với Timberborn! Hướng dẫn này sẽ giúp bạn đứng vững trong hoang dã và sống sót qua những ngày đầu.\n\nBạn sẽ tìm hiểu cách sử dụng các công cụ cần thiết để xây dựng một cộng đồng hải ly thịnh vượng.\n\nKhi bạn hoàn thành các bước tiếp theo, các mẹo sẽ xuất hiện ở đây."

["Tutorial.LayerTool.ChangeUsingMouse"]
raw = "Вы можаце кіраваць бачным слоем з дапамогай наладжвальных прывязак клавіш, не націскаючы кнопкі.\n                                     \nМногія іншыя дзеянні таксама маюць прывязкі клавіш. Іх можна знайсці ў падказках або ў меню налад."
status = "normal"
enUS = "You can control the visibility layer using customizable key bindings without pressing buttons.\n\nMany other actions also have key bindings. They can be found in the tooltips or in the settings menu."
zhCN = "您可以通过可配置的按键绑定来控制可见层，而无需按下按钮。\n\n许多其他操作也有按键绑定。它们可以在提示或设置菜单中找到。"
zhTW = "您可以透過可調整的按鍵綁定來使用滑鼠控制可見層，無需按下任何按鈕。\n\n許多其他操作也有鍵盤綁定。您可以在提示或設置菜單中找到它們。"
ruRU = "Вы можете управлять видимым слоем с помощью настраиваемых горячих клавиш, не нажимая кнопки.\n\nМногие другие действия также имеют горячие клавиши. Их можно найти в подсказках или в меню настроек."
jaJP = "「ボタンを押さずにキーの設定を使って視覚レイヤーを操作できます。\n\n多くの他のアクションにもキーの設定があります。それらはヒントや設定メニューで見つけることができます。」"
frFR = "Vous pouvez contrôler la couche visible à l'aide des raccourcis personnalisables, sans appuyer sur des boutons.\n\nDe nombreuses autres actions ont également des raccourcis. Vous pouvez les trouver dans les conseils ou dans le menu des paramètres."
deDE = "Sie können die Sichtschicht mit anpassbaren Tastenbindungen steuern, ohne Tasten zu drücken.\n\nViele andere Aktionen haben ebenfalls Tasteneinstellungen. Diese finden Sie in den Hinweisen oder im Einstellungsmenü."
plPL = "Możesz kontrolować widoczny warstwę za pomocą przypisanych klawiszy bez naciskania przycisków.\n\nWiele innych działań również ma przypisania klawiszy. Można je znaleźć w podpowiedziach lub w menu ustawień."
ptBR = "Você pode controlar a camada visível com atalhos de teclado configuráveis, sem pressionar botões.\n\nMuitas outras ações também têm atalhos de teclado. Eles podem ser encontrados nas dicas ou no menu de configurações."
koKR = "마우스를 사용하여 보이는 레이어를 조정할 수 있으며, 버튼을 클릭하지 않고도 키 바인딩을 조정할 수 있습니다.\n\n많은 다른 작업에도 키 바인딩이 있습니다. 이들은 팁 또는 설정 메뉴에서 확인할 수 있습니다."
csCZ = "Můžete ovládat viditelnou vrstvu pomocí přizpůsobitelných klávesových zkratek, aniž byste mačkali tlačítka.\n                                     \nMnoho dalších akcí také má klávesové zkratky. Ty můžete najít v nápovědách nebo v nabídce nastavení."
viVN = "Bạn có thể điều khiển lớp nhìn thấy bằng cách sử dụng các phím tắt tùy chỉnh mà không cần nhấn nút.\n\nNhiều hành động khác cũng có các phím tắt. Bạn có thể tìm thấy chúng trong các mẹo hoặc trong menu cài đặt."

["Tutorial.LayerTool.ChangeUsingUI"]
raw = "Па меры таго як ваша паселішча расце ў вышыню, праца пад будынкамі і рэльефам можа ўскладняцца.\n                                  \nІнструмент слаёў дапамагае з гэтым, хаваючы ўсё, што знаходзіцца вышэй за выбраны слой.\n                                  \nДавайце зменім бачны слой, націснуўшы падсвечаныя кнопкі."
status = "normal"
enUS = "As your settlement grows in height, working under buildings and terrain can become more complicated.\n\nThe Layer Tool helps with this by hiding everything above the selected layer.\n\nLet's change the visible layer by pressing the highlighted buttons."
zhCN = "“随着你的定居点向上发展，建筑物和地形下的工作可能会变得更加复杂。\n\n层工具可以帮助解决这个问题，隐藏所有位于所选层之上的内容。\n\n让我们通过点击高亮的按钮来改变可见层。”"
zhTW = "隨著您的聚落向上增長，在建築物和地形下工作的難度可能會加大。\n\n層工具可以幫助解決這個問題，隱藏所有位於所選層以上的內容。\n\n讓我們通過單擊高亮顯示的按鈕來更改可見層。"
ruRU = "По мере того как ваше поселение растет в высоту, работа под зданиями и рельефом может усложняться.\n\nИнструмент слоев помогает с этим, скрывая все, что находится выше выбранного слоя.\n\nДавайте изменим видимый слой, нажав на подсвеченные кнопки."
jaJP = "「あなたの集落が高さを増すにつれて、建物や地形の下での作業が難しくなることがあります。\n\nレイヤーツールは、選択したレイヤーの上にあるすべてを非表示にすることで、これを手助けします。\n\nハイライトされたボタンをクリックして、表示されるレイヤーを変更しましょう。」"
frFR = "À mesure que votre colonie grandit en hauteur, le travail sous les bâtiments et le relief peut devenir plus complexe.\n\nL'outil de couches aide à cela en masquant tout ce qui se trouve au-dessus de la couche sélectionnée.\n\nChangeons la couche visible en cliquant sur les boutons surlignés."
deDE = "Wenn Ihre Siedlung in die Höhe wächst, kann die Arbeit unter Gebäuden und im Gelände schwieriger werden.\n\nDas Schichtwerkzeug hilft dabei, indem es alles verbirgt, was über der ausgewählten Schicht liegt.\n\nLassen Sie uns die sichtbare Schicht ändern, indem wir die hervorgehobenen Tasten drücken."
plPL = "W miarę jak twoja osada rośnie w górę, prace pod budynkami i w terenie mogą być utrudnione.\n\nNarzędzie warstw pomaga w tym, ukrywając wszystko, co znajduje się powyżej wybranej warstwy.\n\nZmieńmy widoczna warstwę, naciskając podświetlone przyciski."
ptBR = "Conforme sua colônia cresce em altura, o trabalho sob edifícios e terrenos pode se tornar mais complicado.\n\nA ferramenta de camadas ajuda com isso, ocultando tudo que está acima da camada selecionada.\n\nVamos mudar a camada visível pressionando os botões destacados."
koKR = "당신의 정착지가 높이 자라면서, 건물과 지형 아래에서의 작업이 복잡해질 수 있습니다.\n\n층 도구는 선택한 층 위에 있는 모든 것을 숨겨줌으로써 이 문제를 해결하는 데 도움을 줍니다.\n\n빛나는 버튼을 눌러 보이는 층을 변경해 봅시다."
csCZ = "Jak vaše osídlení roste do výšky, může být práce pod budovami a terénem obtížnější.\n\nNástroj vrstev s tím pomáhá tím, že skrývá všechno, co se nachází nad vybranou vrstvou.\n\nPojďme změnit viditelnou vrstvu stisknutím zvýrazněných tlačítek."
viVN = "Khi khu vực của bạn phát triển về chiều cao, việc làm việc dưới các tòa nhà và địa hình có thể trở nên phức tạp.\n\nCông cụ lớp giúp giải quyết điều này bằng cách ẩn mọi thứ ở trên lớp đã chọn.\n\nHãy thay đổi lớp hiển thị bằng cách nhấn vào các nút được tô sáng."

