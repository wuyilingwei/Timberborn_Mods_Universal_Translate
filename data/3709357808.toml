frFR = "Source d'énergie à la force du castor, retravaillée pour permettre à plusieurs ouvriers de l'utiliser."
deDE = "Energiequelle, die mit Biberkraft betrieben wird und so umgebaut wurde, dass mehrere Arbeiter sie nutzen können."
plPL = "Źródło energii napędzane siłą bobrów, przekształcone w taki sposób, aby mogło z niego korzystać kilku robotników."
ptBR = "Fonte de energia movida por castores, projetada para ser utilizada por vários trabalhadores."
