["NaturalResource.Sunflower.FlavorDescription"]
raw = "Бабры вырошчваюць гэтыя расліны, каб паказаць пякучаму сонцу, хто тут гаспадар."
status = "normal"
enUS = "The beavers grow these plants to show the blazing sun who the real boss is."
