["MapMetadata.MountainRange.Description"]
raw = "У адчайных пошуках прэснай вады бабры гатовыя караскацца нават на самыя высокія горы."
status = "normal"
enUS = "In desperate search for fresh water, beavers are willing to climb even the highest mountains."
zhCN = "在绝望寻找淡水的过程中，河狸们甚至愿意爬上最高的山。"
zhTW = "在絕望尋找淡水的過程中，海狸們甚至願意攀爬到最高的山脈。"
ruRU = "В безумных поисках пресной воды бобры готовы взбираться даже на самые высокие горы."
jaJP = "絶望的な淡水を求めて、ビーバーは最も高い山にさえ登る覚悟がある。"
frFR = "Dans une quête désespérée d'eau douce, les castors sont prêts à escalader même les plus hautes montagnes."
deDE = "Auf verzweifelter Suche nach frischem Wasser sind die Biber bereit, selbst die höchsten Berge zu erklimmen."
plPL = "W desperackich poszukiwaniach świeżej wody bobry są gotowe wspinać się nawet na najwyższe góry."
ptBR = "Em uma busca desesperada por água potável, os castores estão prontos para escalar até as montanhas mais altas."
koKR = "절망적인 담수 찾기에서 비버들은 가장 높은 산까지도 기어오를 준비가 되어 있습니다."
csCZ = "V zoufalém hledání sladké vody jsou bobři ochotni šplhat i na ty nejvyšší hory."
viVN = "Trong những cuộc tìm kiếm nước ngọt đầy tuyệt vọng, những con beaver sẵn sàng leo lên cả những ngọn núi cao nhất."

