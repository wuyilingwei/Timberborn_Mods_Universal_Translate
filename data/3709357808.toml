status = "normal"
enUS = "You are still learning or want a peaceful city-building experience.\n\nYour settlement starts the game with abundant resource supplies.\n\nBeavers consume less food and water.\n\nDroughts and low water levels are rare and short."
zhCN = "您还在学习或想要平静的城市建设体验。\n\n您的定居点在游戏开始时拥有丰富的资源储备。\n\n海狸消耗的食物和水更少。\n\n干旱和洪水较少且持续时间短。"
zhTW = "您還在學習或希望享受一個安靜的城市建設體驗。\n\n您的聚落在遊戲開始時擁有豐富的資源。\n\n海狸消耗的食物和水較少。\n\n乾旱和洪水是稀有且短暫的。"
ruRU = "Вы еще учитесь или хотите спокойного опыта градостроительства.\n\nВаше поселение начинает игру с богатыми запасами ресурсов.\n\nБобры потребляют меньше еды и воды.\n\nЗасухи и плохие потоки редки и коротки."
jaJP = "「まだ学んでいるか、穏やかな都市建設体験を望んでいる方向けです。\n\nあなたの集落は、豊富な資源からスタートします。\n\nビーバーは食事と水を少なく消費します。\n\n干ばつと悪天候は稀で短期間です。」"
frFR = "Vous apprenez encore ou vous voulez une expérience tranquille de construction de ville.\n\nVotre colonie commence le jeu avec des ressources abondantes.\n\nLes castors consomment moins de nourriture et d'eau.\n\nLes sécheresses et les inondations sont rares et courtes."
deDE = "Sie lernen noch oder möchten ein entspanntes Städtebau-Erlebnis.\n\nIhre Siedlung beginnt das Spiel mit reichen Ressourcen.\n\nBiber verbrauchen weniger Essen und Wasser.\n\nDürreperioden und Überschwemmungen sind selten und kurz."
plPL = "Jeszcze się uczysz lub chcesz spokojnego doświadczenia w budowaniu miasta. \n\nTwoja osada zaczyna grę z dużymi zapasami zasobów. \n\nBobry konsumują mniej jedzenia i wody. \n\nSusze i złe pływy są rzadkie i krótkie."
ptBR = "Você ainda está aprendendo ou deseja uma experiência tranquila de construção de cidades.\n\nSeu assentamento começa o jogo com abundantes reservas de recursos.\n\nOs castores consomem menos comida e água.\n\nSecas e enchentes são raras e curtas."
koKR = "당신은 아직 배우고 있거나 차분한 도시 건설 경험을 원합니다.\n\n귀하의 정착지는 풍부한 자원으로 게임을 시작합니다.\n\n비버는 음식과 물을 덜 소비합니다.\n\n가뭄과 부정적인 흐름은 드물고 짧습니다."
csCZ = "Jste ještě na učení nebo si přejete klidný zážitek z budování města.\n\nVaše osada začíná hru s hojnými zásobami zdrojů.\n\nBobři spotřebovávají méně jídla a vody.\n\nSucha a špatné období dešťů jsou vzácné a krátké."
viVN = "Bạn đang học hỏi hoặc muốn có trải nghiệm xây dựng thành phố yên tĩnh.\n\nKhu định cư của bạn bắt đầu trò chơi với nguồn tài nguyên dồi dào.\n\nLũ hải ly tiêu thụ ít thực phẩm và nước hơn.\n\nHạn hán và lũ lụt hiếm và ngắn."

