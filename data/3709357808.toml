["MapMetadata.Waterfalls.Description"]
raw = "Старая бацькоўская хітрасць — сказаць малышам, што вадаспад — гэта проста вялікі шлюз. Тут яны правядуць тыдні, шукаючы рычаг перакрыцця."
status = "normal"
enUS = "Old parents' trick — to tell the little ones that a waterfall is just a big gate. Here they will spend weeks looking for the shutoff lever."
zhCN = "“老一辈的把戏——告诉孩子们瀑布只是一个大闸门。在这里，他们会花上好几个星期寻找控制杠杆。”"
zhTW = "「老祖父的狡猾把戲就是告訴小孩，瀑布只是一個大閘。他們會在這裡花上幾個星期尋找關閉的杠杆。」"
ruRU = "Старая родительская хитрость — сказать малышам, что водопад — это просто большой шлюз. Здесь они проведут недели, ища запорный рычаг."
jaJP = "古い親の知恵—子供たちに滝はただの大きなゲートだと言うことだ。ここで彼らは数週間、遮断レバーを探すことになる。"
frFR = "La vieille rusé des grands-parents est de dire aux petits que la cascade n'est qu'une grande vanne. Ils y passeront des semaines à chercher le levier de fermeture."
deDE = "Die alte elterliche List – den Kleinen zu sagen, dass der Wasserfall einfach ein großer Schleusentor ist. Hier werden sie Wochen damit verbringen, den Überlaufhebel zu suchen."
plPL = "Stara rodzicielska sztuczka — powiedzieć maluchom, że wodospad to po prostu dużą śluzą. Spędzą tu tygodnie szukając dźwigni zamknięcia."
ptBR = "A antiga astúcia dos avós é dizer aos pequenos que a cachoeira é apenas uma grande comporta. Aqui, eles passarão semanas procurando pela alavanca de fechamento."
koKR = "오래된 부모의 속임수 - 아이들에게 폭포가 단순한 큰 수문이라고 말하는 것이다. 그들은 여기서 몇 주를 보내며 차단 레버를 찾을 것이다."
csCZ = "Starý rodičovský trik – říct dětem, že vodopád je jen velká brána. Zde stráví týdny hledáním ovládací páky."
viVN = "Mẹo cũ của ông bà - nói với những đứa trẻ rằng thác nước chỉ là một cái cống lớn. Ở đây chúng sẽ dành hàng tuần để tìm kiếm cần gạt."

