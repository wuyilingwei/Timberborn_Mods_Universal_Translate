frFR = "«Tu oublieras le soleil dans le ciel sans nuages quand nous marcherons à travers les champs dorés.» — ballade des castors"
deDE = "„Du wirst die Sonne am wolkenlosen Himmel vergessen, wenn wir über die goldenen Felder gehen.“ — ein Biberlied"
plPL = "„Zapomnisz o słońcu na bezchmurnym niebie, gdy będziemy chodzić po złotych polach.” — bobrowa ballada"
