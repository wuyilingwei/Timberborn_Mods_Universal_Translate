viVN = "Bạn có thể tạm dừng trò chơi bất cứ lúc nào để đánh giá tình hình và lên kế hoạch cho các hành động tiếp theo."

["Tutorial.Basics.ManageSpeed"]
raw = "Вы таксама можаце паскорыць гульню, каб скараціць прастоі, пакуль вашы бабры працуюць або спяць."
