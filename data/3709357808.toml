["Faction.IronTeeth.GameOver.Flavor"]
raw = "Часам найменшая няспраўная дэталь ламае ўвесь механізм."
status = "normal"
enUS = "Sometimes the smallest faulty part breaks the entire mechanism."
zhCN = "“有时最微小的故障部件会毁掉整个机制。”"
zhTW = "有時，最小的故障部件會破壞整個機械。"
ruRU = "Иногда самая незначительная неисправная деталь ломает весь механизм."
jaJP = "時には最も小さな壊れた部品が全体の機構を壊す。"
frFR = "Parfois, le plus petit élément défectueux peut détruire tout le mécanisme."
deDE = "Manchmal kann das kleinste defekte Teil den ganzen Mechanismus zum Stillstand bringen."
plPL = "Czasami najdrobniejsza wadliwa część łamie cały mechanizm."
ptBR = "Às vezes, a menor peça defeituosa quebra todo o mecanismo."
koKR = "때때로 가장 작은 고장 난 부품이 전체 기계를 망가뜨린다."
csCZ = "Někdy i ten nejmenší porouchaný detail zlomí celý mechanismus."
viVN = "Đôi khi, một chi tiết nhỏ không hoạt động lại phá hủy toàn bộ cơ chế."
trTR = "Bazen en küçük arızalı parça tüm mekanizmayı bozar."

["Faction.IronTeeth.GameOver.Message"]
raw = "Ваша паселішча Жалезных зубоў загінула без шанцу на аднаўленне. Гэта канец."
status = "normal"
enUS = "Your Iron Teeth settlement has perished with no chance of recovery. This is the end."
zhCN = "您的铁齿派系已完全灭亡，无法复兴。这是终结。"
zhTW = "您的鐵牙部落已經無法復興，這就是結局。"
ruRU = "Ваше поселение Железных Зубов погибло без шанса на восстановление. Это конец."
jaJP = "「鉄の歯のあなたの集落は再生の見込みもなく滅びました。これが終わりです。」"
frFR = "Votre colonie des Dents de fer a été détruite sans espoir de réhabilitation. C'est la fin."
deDE = "Ihr Siedlung der Eisenbeißer ist ohne Chance auf Wiederherstellung gestorben. Das ist das Ende."
plPL = "Twoja osada Żelaznych Zębów zginęła bez szans na odbudowę. To koniec."
ptBR = "Sua colônia dos Dentes de Ferro foi destruída sem chance de recuperação. Este é o fim."
koKR = "철 이빨 부족의 거주지가 복구의 기회 없이 멸망했습니다. 이게 끝입니다."
csCZ = "Vaše osídlení Železných zubů zahynulo bez šance na obnovu. To je konec."
viVN = "Khu định cư của Răng Sắt đã bị tiêu diệt không có cơ hội phục hồi. Đây là kết thúc."
trTR = "Demir Dişler topluluğunuz yeniden doğma şansınız olmadan yok oldu. Bu son."

["Faction.IronTeeth.WonderCompletionFlavor"]
raw = "Вашы першапраходцы адляцелі над пусткай, пакінуўшы за сабой квітнеючае паселішча. Калі Зямля мае аднавіцца, трэба было падзяліцца новазнойдзеным дабрабытам баброў."
status = "normal"
enUS = "Your pioneers flew over the wasteland, leaving behind a thriving settlement. If the Earth is to be restored, the newly found prosperity of the beavers must be shared."
zhCN = "你们的先驱飞越了荒原，留下了繁荣的定居点。当大地重新振作时，必须分享新发现的财富给海狸们。"
zhTW = "你的先驅者們飛越了荒原，留下了一個繁榮的定居點。要讓土地復甦，就必須分享新發現的繁榮給海狸。"
ruRU = "Ваши первопроходцы пролетели над пустошью, оставив за собой цветущее поселение. Когда Земля должна восстановиться, нужно было поделиться новообретенным благосостоянием бобров."
jaJP = "「あなたの先駆者たちは荒野を越えて飛び去り、繁栄する集落を残しました。地球が再生するためには、新たに見つけた豊かさをビーバーたちと分かち合う必要がありました。」"
frFR = "Vos pionniers ont survolé la lande, laissant derrière eux une colonie florissante. Pour que la Terre puisse se restaurer, il fallait partager la nouvelle richesse des castors."
deDE = "„Ihre Pioniere flogen über die Ödnis und hinterließen eine blühende Siedlung. Damit die Erde sich regenerieren kann, musste der neu gefundene Wohlstand der Biber geteilt werden.“"
plPL = "Twoi pierwsi odkrywcy odlecieli nad pustkowie, zostawiając za sobą kwitnącą osadę. Gdy Ziemia ma się odrodzić, trzeba było podzielić się nowo znalezionym dobrobytem bobrów."
ptBR = "Seus pioneiros voaram sobre a desolação, deixando para trás uma próspera colônia. Para que a Terra se recupere, era necessário compartilhar a nova riqueza dos castores."
koKR = "당신의 개척자들은 황무지를 넘어 날아가며 번영하는 정착지를 남겼습니다. 지구가 다시 태어나려면, 비버들이 새로 발견한 번영을 나눠야 했습니다."
csCZ = "Vaši prvovýzkumníci se vznášeli nad pustými oblastmi a za sebou zanechali vzkvétající osadu. Aby se Země mohla obnovit, bylo třeba rozdělit nově nalezené bohatství bobrů."
viVN = "Các tiên phong của bạn đã bay qua vùng đất trống, để lại phía sau một khu định cư tươi tốt. Khi Trái Đất hồi phục, cần phải chia sẻ sự thịnh vượng mới tìm thấy của bọn rái cá."
trTR = "Kaşifleriniz ıssızlığın üzerinde süzüldü, geride gelişen bir köy bırakarak. Yerin yeniden canlanması için, yeni elde edilen refahın vizonlar arasında paylaşılması gerekiyordu."

["Faction.IronTeeth.WonderCompletionMessage"]
raw = "Выдатна! Ваша тэхналагічная кемлівасць дазволіла вам выкарыстаць працавітасць Жалезных зубоў, заваяваць гэту карту і пабудаваць цуд фракцыі."
status = "normal"
enUS = "Excellent! Your technological savvy has allowed you to harness the industriousness of the Iron Teeth, conquer this map, and build the faction's wonder."
zhCN = "太好了！您的技术聪明才智使您能够利用铁齿的勤奋，征服这张地图并建造出该派系的奇迹。"
zhTW = "太好了！你的技術智慧讓你能夠利用鐵牙的勤勞，征服這張地圖並建造了派系的奇跡。"
ruRU = "Отлично! Ваш технологический подход позволил вам использовать трудолюбие Железных Зубьев, завоевать эту карту и построить чудо фракции."
jaJP = "素晴らしい！あなたの技術的な巧妙さが、アイアンティースの勤勉さを活用し、このマップを制覇して、派閥の奇跡を建設することを可能にしました。"
frFR = "Excellent ! Votre ingéniosité technologique vous a permis d'exploiter l'assiduité des Dents de Fer, de conquérir cette carte et de construire une merveille de la faction."
deDE = "Ausgezeichnet! Ihr technologisches Geschick hat es Ihnen ermöglicht, die Arbeitskraft der Eisenzähne zu nutzen, diese Karte zu erobern und das Wunder der Fraktion zu bauen."
plPL = "Wspaniale! Twoja techniczna pomysłowość pozwoliła ci wykorzystać pracowitość Żelaznych Zębów, zdobyć tę mapę i zbudować cud frakcji."
ptBR = "Excelente! Sua habilidade tecnológica permitiu que você utilizasse a diligência dos Dentes de Ferro, conquistasse este mapa e construísse a maravilha da facção."
koKR = "훌륭해요! 당신의 기술적 재능 덕분에 철 이빨의 근면성을 활용하여 이 맵을 정복하고 파벌의 기적을 건설할 수 있었습니다."
csCZ = "Skvěle! Vaše technologická vynalézavost vám umožnila využít pracovitost Železných zubů, dobýt tuto mapu a postavit zázrak frakce."
viVN = "Tuyệt vời! Sự khéo léo công nghệ của bạn đã cho phép bạn tận dụng sự siêng năng của những chiếc Răng Sắt, chiếm lĩnh bản đồ này và xây dựng kỳ quan của phe."
trTR = "Harika! Teknolojik zekanız, Demir Dişlerin emeğini kullanmanıza, bu haritayı fethetmenize ve fraksiyonun harikasını inşa etmenize olanak sağladı."

