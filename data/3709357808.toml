["Experimental.WelcomeText"]
raw = "Гэтая версія Timberborn дае вам доступ да прататыпных, яшчэ незавершаных функцый. Таму ў ёй значна большая верагоднасць сур'ёзных памылак. Вы і праўда адважны бабёр.\n\nЭксперыментальныя захаванні захоўваюцца асобна ад асноўнай гульні. Абнаўленні, хутчэй за ўсё, зламаюць сумяшчальнасць захаванняў.\n\nУ гэтым эксперыментальным рэжыме <RedHighlight>многія часткі гульні не перакладзеныя і паказваюцца па-англійску</RedHighlight> незалежна ад абранай мовы. Гэта дазваляе нам дадаваць новы кантэнт і ўносіць хуткія змены, не чакаючы доўгіх перакладаў.\n\nМы настойліва раім далучыцца да нашага афіцыйнага сервера Discord і паўдзельнічаць у абмеркаванні новага кантэнту."
status = "normal"
enUS = "This version of Timberborn gives you access to experimental, unfinished features. Therefore, there is a significantly higher chance of serious bugs. You really are a brave beaver.\n\nExperimental saves are stored separately from the main game. Updates will most likely break save compatibility.\n\nIn this experimental mode, <RedHighlight>many parts of the game are not translated and are displayed in English</RedHighlight> regardless of the selected language. This allows us to add new content and make quick changes without waiting for lengthy translations.\n\nWe strongly recommend joining our official Discord server and participating in the discussion of new content."
zhCN = "此版本的Timberborn让您可以访问原型的、尚未完成的功能。因此发生严重错误的可能性大大增加。您确实是一只勇敢的海狸。\n\n实验性的存档与主游戏分开保存。更新可能会破坏存档的兼容性。\n\n在这个实验模式中，<RedHighlight>许多游戏部分未被翻译并以英语显示</RedHighlight>，无论所选语言如何。这使我们能够添加新内容并进行快速更改，而无需等待漫长的翻译。\n\n我们强烈建议您加入我们的官方Discord服务器，并参与新内容的讨论。"
zhTW = "此版本的Timberborn让您可以访问原型的、尚未完成的功能。因此，它有更大的可能性出现严重错误。您确实是一只勇敢的海狸。\n\n实验性存档与主游戏分开保存。更新很可能会破坏存档的兼容性。\n\n在此实验模式中<RedHighlight>许多游戏部分仍未翻译，显示为英语</RedHighlight>，无论选择何种语言。这使我们能够添加新内容并进行快速更改，而无需等待漫长的翻译。\n\n我们强烈建议您加入我们的官方Discord服务器，并参与新内容的讨论。"
ruRU = "Эта версия Timberborn дает вам доступ к прототипным, еще незавершенным функциям. Поэтому в ней значительно большая вероятность серьезных ошибок. Вы и правда отважный бобр.\n\nЭкспериментальные сохранения хранятся отдельно от основной игры. Обновления, скорее всего, сломают совместимость сохранений.\n\nВ этом экспериментальном режиме <RedHighlight>многие части игры не переведены и отображаются на английском</RedHighlight> независимо от выбранного языка. Это позволяет нам добавлять новый контент и вносить быстрые изменения, не ожидая долгих переводов.\n\nМы настоятельно рекомендуем присоединиться к нашему официальному серверу Discord и участвовать в обсуждении нового контента."
jaJP = "このバージョンのTimberbornは、プロトタイプの未完成の機能へのアクセスを提供します。そのため、重大なバグが発生する可能性が高くなっています。あなたは本当に勇敢なビーバーです。\n\n実験的なセーブは本ゲームのメインバージョンとは別に保存されます。アップデートによってセーブの互換性が壊れる可能性が高いです。\n\nこの実験モードでは、<RedHighlight>ゲームの多くの部分が翻訳されておらず、選択した言語に関係なく英語で表示されます</RedHighlight>。これにより、私たちは新しいコンテンツを追加したり、長い翻訳を待たずに迅速に変更を加えたりすることができます。\n\n私たちは、公式Discordサーバーに参加し、新しいコンテンツについてのディスカッションに参加することを強くお勧めします。"
frFR = "Cette version de Timberborn vous donne accès à des fonctionnalités expérimentales, encore inachevées. Par conséquent, il y a un risque beaucoup plus élevé d'erreurs sérieuses. Vous êtes vraiment un castor courageux.\n\nLes sauvegardes expérimentales sont stockées séparément du jeu principal. Les mises à jour risquent de rompre la compatibilité des sauvegardes.\n\nDans ce mode expérimental, <RedHighlight>de nombreuses parties du jeu ne sont pas traduites et s'affichent en anglais</RedHighlight> quelle que soit la langue choisie. Cela nous permet d'ajouter du nouveau contenu et d'apporter des modifications rapides sans attendre de longues traductions.\n\nNous vous conseillons vivement de rejoindre notre serveur Discord officiel et de participer à la discussion sur le nouveau contenu."
deDE = "Diese Version von Timberborn gibt Ihnen Zugang zu experimentellen, noch unvollendeten Funktionen. Daher besteht eine deutlich höhere Wahrscheinlichkeit für schwerwiegende Fehler. Sie sind wirklich ein mutiger Biber.\n\nExperimentelle Speicherstände werden separat von dem Hauptspiel gespeichert. Updates werden höchstwahrscheinlich die Kompatibilität der Speicherstände beeinträchtigen.\n\nIn diesem experimentellen Modus sind <RedHighlight>viele Teile des Spiels nicht übersetzt und werden in Englisch angezeigt</RedHighlight>, unabhängig von der gewählten Sprache. Dies ermöglicht es uns, neuen Inhalt hinzuzufügen und schnelle Änderungen vorzunehmen, ohne auf lange Übersetzungen warten zu müssen.\n\nWir empfehlen dringend, unserem offiziellen Discord-Server beizutreten und an der Diskussion über neue Inhalte teilzunehmen."
plPL = "Ta wersja Timberborn daje ci dostęp do prototypowych, jeszcze niedokończonych funkcji. Dlatego istnieje znacznie większe prawdopodobieństwo poważnych błędów. Naprawdę jesteś odważnym bobrem.\n\nEksperymentalne zapisy są przechowywane osobno od głównej gry. Aktualizacje prawdopodobnie zerwą kompatybilność zapisów.\n\nW tym eksperymentalnym trybie <RedHighlight>wiele części gry nie jest przetłumaczonych i wyświetlają się po angielsku</RedHighlight> niezależnie od wybranego języka. Pozwala nam to dodawać nową zawartość i wprowadzać szybkie zmiany, nie czekając na długie tłumaczenia.\n\nZalecamy dołączenie do naszego oficjalnego serwera Discord i udział w dyskusji na temat nowej zawartości."
ptBR = "Esta versão do Timberborn dá acesso a funcionalidades experimentais e ainda inacabadas. Portanto, há uma probabilidade muito maior de erros graves. Você realmente é um castor corajoso.\n\nOs saves experimentais são armazenados separadamente do jogo principal. Atualizações provavelmente quebrarão a compatibilidade dos saves.\n\nNeste modo experimental, <RedHighlight>muitas partes do jogo não estão traduzidas e aparecem em inglês</RedHighlight> independentemente do idioma selecionado. Isso nos permite adicionar novo conteúdo e fazer mudanças rápidas, sem esperar por longas traduções.\n\nRecomendamos fortemente que você se junte ao nosso servidor oficial do Discord e participe da discussão sobre o novo conteúdo."
koKR = "이 Timberborn 버전은 프로토타입 상태의 아직 완성되지 않은 기능에 대한 접근을 제공합니다. 따라서 심각한 버그가 발생할 가능성이 높습니다. 당신은 진정 용감한 비버입니다.\n\n실험적인 저장은 기본 게임과 별도로 저장됩니다. 업데이트는 저장 호환성을 깨뜨릴 가능성이 높습니다.\n\n이 실험 모드에서는 <RedHighlight>게임의 많은 부분이 번역되지 않아 선택한 언어와 관계없이 영어로 표시됩니다</RedHighlight>. 이는 새로운 콘텐츠를 추가하고 긴 번역을 기다리지 않고 빠른 수정을 가능하게 합니다.\n\n우리는 공식 Discord 서버에 참여하여 새로운 콘텐츠에 대한 논의에 참여할 것을 강력히 권장합니다."
csCZ = "Tato verze Timberborn vám umožňuje přístup k prototypovým, ještě nedokončeným funkcím. Proto je zde mnohem větší pravděpodobnost vážných chyb. Opravdu jste odvážný bobr.\n\nExperimentální uložené hry jsou uchovávány odděleně od hlavní hry. Aktualizace pravděpodobně zlomí kompatibilitu uložených her.\n\nV tomto experimentálním režimu <RedHighlight>mnohé části hry nejsou přeloženy a zobrazují se v angličtině</RedHighlight> bez ohledu na zvolený jazyk. To nám umožňuje přidávat nový obsah a provádět rychlé změny, aniž bychom čekali na dlouhé překlady.\n\nDůrazně doporučujeme připojit se k našemu oficiálnímu serveru Discord a zúčastnit se diskuse o novém obsahu."
viVN = "Bản thử nghiệm Timberborn này mang đến cho bạn quyền truy cập vào các chức năng chưa hoàn thiện, thử nghiệm. Do đó, có khả năng cao hơn xảy ra lỗi nghiêm trọng. Bạn thật sự là một con beaver dũng cảm.\n\nCác lưu trữ thử nghiệm được lưu riêng biệt với trò chơi chính. Các cập nhật có thể làm hỏng tính tương thích của các lưu trữ.\n\nTrong chế độ thử nghiệm này, <RedHighlight>nhiều phần của trò chơi không được dịch và hiển thị bằng tiếng Anh</RedHighlight> bất kể ngôn ngữ nào được chọn. Điều này cho phép chúng tôi thêm nội dung mới và thực hiện các thay đổi nhanh chóng mà không phải chờ đợi các bản dịch lâu dài.\n\nChúng tôi rất khuyên bạn nên tham gia vào máy chủ Discord chính thức của chúng tôi và tham gia vào cuộc thảo luận về nội dung mới."
trTR = "Bu Timberborn sürümü size prototip, henüz tamamlanmamış özelliklere erişim sağlar. Bu nedenle, ciddi hatalar olma olasılığı çok daha yüksektir. Gerçekten cesur bir kunduzsunuz.\n\nDeneysel kayıtlar, ana oyundan ayrı olarak saklanmaktadır. Güncellemelerin, kayıtların uyumluluğunu bozması muhtemeldir.\n\nBu deneysel modda <RedHighlight>oyunun birçok bölümü çevrilmemiştir ve seçilen dilden bağımsız olarak İngilizce olarak gösterilmektedir.</RedHighlight> Bu, yeni içerik eklememize ve uzun çeviriler beklemeden hızlı değişiklikler yapmamıza olanak tanır.\n\nResmi Discord sunucumuza katılmanızı ve yeni içerik hakkında tartışmalara katılmanızı şiddetle tavsiye ederiz."

