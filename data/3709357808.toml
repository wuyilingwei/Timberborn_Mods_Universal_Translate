["NaturalResource.Maple.FlavorDescription"]
raw = "З клёну можна здабыць сіроп, але якасная драўніна - яшчэ саладзейшая ўзнагарода."
status = "normal"
enUS = "Maple can be tapped for syrup, but quality wood is an even sweeter reward."
zhCN = "“枫树可以提取糖浆，但优质木材是更甜的奖赏。”"
zhTW = "「從楓樹中可以提取糖漿，但優質的木材則是更甜美的獎勵。」"
ruRU = "Из клена можно добыть сироп, но качественная древесина - еще более сладкое вознаграждение."
