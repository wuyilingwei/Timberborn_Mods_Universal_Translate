["NaturalResource.Dandelion.FlavorDescription"]
raw = "У бабровых казках дзьмухаўцы славяцца сваімі меладычнымі галасамі."
status = "normal"
enUS = "In beaver tales, the dandelions are celebrated for their melodic voices."
zhCN = "在海狸的故事中，蒲公英因其悠扬的歌声而出名。"
zhTW = "在河狸的故事中，蒲公英以其旋律悠揚的聲音而聞名。"
ruRU = "В бобровых сказках дудочки славятся своими мелодичными голосами."
jaJP = "ビーバーの民話では、蝶々たちがそのメロディックな声で称賛されています。"
frFR = "Dans les contes de castors, les mouches à miel sont célébrées pour leurs voix mélodieuses."
deDE = "In den Biber-Märchen rühmen sich die Löwenzahnblüten mit ihren melodischen Stimmen."
plPL = "W opowieściach bobrowych dmuchawce słyną ze swoich melodyjnych głosów."
ptBR = "Nas fábulas dos castores, os dente-de-leão se destacam por suas vozes melodiosas."
koKR = "비버의 전설에서 민들레는 그들의 멜로디처럼 아름다운 목소리로 자랑합니다."
csCZ = "V bobřích pohádkách se hrdličky vychloubají svými melodickými hlasy."
viVN = "Trong truyền thuyết về những con beaver, những con ruồi thường được ca ngợi về giọng hát du dương của chúng."

