["Building.LargeTank.FlavorDescription"]
raw = "Нягледзячы на спробы бобрят выкарыстаць яго як басейн, гэты рэзервуар прызначаны для прамысловага выкарыстання."
status = "normal"
enUS = "Despite the beavers' attempts to use it as a swimming pool, this tank is intended for industrial use."
zhCN = "尽管海狸尝试把它用作游泳池，但这个水箱是为工业用途设计的。"
zhTW = "儘管海狸試圖將其用作游泳池，但這個儲罐是為工業用途而設計的。"
ruRU = "Несмотря на попыт енотов использовать его как бассейн, этот резервуар предназначен для промышленного использования."
jaJP = "ビーバーたちがプールとして使おうとしたものの、このタンクは工業用に設計されています。"
frFR = "Malgré les tentatives des castors d'en faire une piscine, ce réservoir est destiné à un usage industriel."
deDE = "Trotz der Versuche der Biber, ihn als Schwimmbecken zu nutzen, ist dieser Tank für industrielle Zwecke vorgesehen."
plPL = "Pomimo prób bobrów, aby wykorzystać go jako basen, ten zbiornik przeznaczony jest do użytku przemysłowego."
ptBR = "Apesar das tentativas dos castores de usá-lo como piscina, este reservatório é destinado ao uso industrial."
koKR = "비버들이 이를 수영장으로 사용하려고 노력했지만, 이 저장소는 산업용으로 설계되었습니다."
csCZ = "Navzdory pokusům bobrů využít ho jako bazén je tato nádrž určena k průmyslovému využití."
viVN = "Dù những nỗ lực của những con rái cá để sử dụng nó như một bể bơi, bồn chứa này được thiết kế cho mục đích công nghiệp."
