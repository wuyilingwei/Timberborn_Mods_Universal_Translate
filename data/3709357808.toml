["AnalyticsConsent.Info"]
raw = "Калі ласка, дапамажыце нам зрабіць гульню лепшай, падзяліўшыся данымі пра тое, як вы гуляеце ў Timberborn.\n\nКалі вы пагадзіцеся, мы будзем аўтаматычна збіраць звесткі пра гульнявы працэс падчас вашых гульнявых сесій.\n\nВы можаце ў любы час зайсці ў налады гульні, каб адклікаць сваю згоду і выдаліць свае даныя. Каб даведацца больш, глядзіце нашу <link><u>палітыку прыватнасці</u></link>.\n\nДзякуй!"
status = "normal"
enUS = "Please help us make the game better by sharing data about how you play Timberborn.\n\nIf you agree, we will automatically collect gameplay information during your gaming sessions.\n\nYou can go into the game settings at any time to withdraw your consent and delete your data. To learn more, please see our <link><u>privacy policy</u></link>.\n\nThank you!"
zhCN = "请帮助我们通过分享您在《Timberborn》中的游戏方式数据来改善游戏。\n\n如果您同意，我们将自动收集您游戏会话期间的游戏过程数据。\n\n您可以随时进入游戏设置撤回您的同意并删除您的数据。要了解更多信息，请查看我们的<link><u>隐私政策</u></link>。\n\n谢谢！"
zhTW = "請幫助我們通過分享您在《Timberborn》中的遊玩數據來改善遊戲。\n\n如果您同意，我們將自動收集您在遊戲期間的遊戲過程資料。\n\n您可以隨時進入遊戲設置以撤回您的同意並刪除您的數據。要了解更多信息，請查看我們的 <link><u>隱私政策</u></link>。\n\n謝謝！"
ruRU = "Пожалуйста, помогите нам сделать игру лучше, поделившись данными о том, как вы играете в Timberborn.\n\nЕсли вы согласитесь, мы будем автоматически собирать сведения об игровом процессе во время ваших игровых сессий.\n\nВы можете в любое время зайти в настройки игры, чтобы отозвать свое согласие и удалить свои данные. Чтобы узнать больше, смотрите нашу <link><u>политику конфиденциальности</u></link>.\n\nСпасибо!"
jaJP = "ゲームをより良くするために、Timberbornでのプレイ方法に関するデータを共有していただけると幸いです。\n\nご同意いただければ、プレイセッション中にゲームプロセスに関する情報を自動的に収集します。\n\nいつでもゲーム設定にアクセスして同意を取り消し、ご自身のデータを削除することができます。詳細については、当社の<link><u>プライバシーポリシー</u></link>をご覧ください。\n\nありがとうございます！"
frFR = "Veuillez nous aider à améliorer le jeu en partageant des données sur la façon dont vous jouez à Timberborn.\n\nSi vous y consentez, nous collecterons automatiquement des informations sur le gameplay pendant vos séances de jeu.\n\nVous pouvez à tout moment accéder aux paramètres du jeu pour retirer votre consentement et supprimer vos données. Pour en savoir plus, consultez notre <link><u>politique de confidentialité</u></link>.\n\nMerci !"
deDE = "Bitte helfen Sie uns, das Spiel besser zu machen, indem Sie Ihre Daten darüber, wie Sie Timberborn spielen, teilen.\n\nWenn Sie einverstanden sind, sammeln wir automatisch Informationen über das Gameplay während Ihrer Spielsitzungen.\n\nSie können jederzeit die Spieleinstellungen aufrufen, um Ihre Zustimmung zu widerrufen und Ihre Daten zu löschen. Um mehr zu erfahren, sehen Sie sich unsere <link><u>Datenschutzrichtlinie</u></link> an.\n\nDanke!"
plPL = "Proszę, pomóż nam sprawić, by gra była lepsza, dzieląc się danymi na temat tego, jak grasz w Timberborn.\n\nJeśli się zgodzisz, będziemy automatycznie zbierać informacje o rozgrywce podczas Twoich sesji gamingowych.\n\nMożesz w każdej chwili przejść do ustawień gry, aby cofnąć swoją zgodę i usunąć swoje dane. Aby dowiedzieć się więcej, zobacz naszą <link><u>politykę prywatności</u></link>.\n\nDziękujemy!"
ptBR = "Por favor, ajude-nos a melhorar o jogo compartilhando dados sobre como você joga Timberborn.\n\nSe você concordar, nós coletaremos automaticamente informações sobre o seu progresso no jogo durante suas sessões de jogo.\n\nVocê pode a qualquer momento acessar as configurações do jogo para retirar seu consentimento e excluir seus dados. Para saber mais, consulte nossa <link><u>política de privacidade</u></link>.\n\nObrigado!"
koKR = "Timberborn에서 게임을 어떻게 플레이하는지에 대한 데이터를 공유하여 게임을 더 나은 방향으로 개선하는 데 도움을 주세요.\n\n동의하시면, 게임 세션 중에 게임 플레이 데이터를 자동으로 수집하겠습니다.\n\n언제든지 게임 설정에 들어가서 동의를 철회하고 데이터를 삭제할 수 있습니다. 자세한 내용은 <link><u>개인 정보 보호 정책</u></link>을(를) 참조하세요.\n\n감사합니다!"
csCZ = "Prosím, pomozte nám udělat hru lepší tím, že se podělíte o údaje o tom, jak hrajete Timberborn.\n\nPokud souhlasíte, budeme automaticky shromažďovat údaje o herním procesu během vašich herních sezení.\n\nKdykoli můžete vstoupit do nastavení hry, abyste odvolali svůj souhlas a odstranili své údaje. Chcete-li se dozvědět více, podívejte se na naši <link><u>zásady ochrany osobních údajů</u></link>.\n\nDěkujeme!"
viVN = "Xin vui lòng giúp chúng tôi làm cho trò chơi tốt hơn bằng cách chia sẻ dữ liệu về cách bạn chơi Timberborn.\n\nNếu bạn đồng ý, chúng tôi sẽ tự động thu thập thông tin về quá trình chơi game trong các phiên chơi của bạn.\n\nBạn có thể vào cài đặt trò chơi bất cứ lúc nào để rút lại sự đồng ý của mình và xóa dữ liệu của bạn. Để tìm hiểu thêm, hãy xem <link><u>chính sách quyền riêng tư</u></link> của chúng tôi.\n\nCảm ơn bạn!"
trTR = "Lütfen oyunu daha iyi hale getirmemize yardımcı olun, Timberborn'da nasıl oynadığınız hakkında verileri paylaşarak.\n\nEğer kabul ederseniz, oyun oturumlarınız sırasında oyun süreci ile ilgili verileri otomatik olarak toplayacağız.\n\nİstediğiniz zaman oyun ayarlarına giderek onayınızı geri çekebilir ve verilerinizi silebilirsiniz. Daha fazla bilgi için <link><u>gizlilik politikamıza</u></link> bakın.\n\nTeşekkür ederiz!"

