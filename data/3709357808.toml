ruRU = "Накопливает избыточную энергию и возвращает ее, когда сеть недостаточно обеспечена. Чем выше она построена, тем больше энергии может хранить."
jaJP = "エネルギーの余剰を蓄えて、ネットワークが十分に供給されていないときにそれを返します。高く建てるほど、より多くのエネルギーを蓄えることができます。"
frFR = "Accumule l'excès d'énergie et le restitue lorsque le réseau est insuffisamment alimenté. Plus elle est haute, plus elle peut stocker d'énergie."
deDE = "Speichert überschüssige Energie und gibt sie zurück, wenn das Netz nicht ausreichend versorgt ist. Je höher sie gebaut ist, desto mehr Energie kann sie speichern."
plPL = "Magazynuje nadmiar energii i zwraca go, gdy sieć jest niedostatecznie zasilana. Im wyżej jest zbudowana, tym więcej energii może przechowywać."
ptBR = "Armazena excesso de energia e a devolve quando a rede está insuficientemente abastecida. Quanto mais alta for sua construção, mais energia pode armazenar."
koKR = "여분의 에너지를 저장하고 네트워크가 충분하지 않을 때 반환합니다. 건축 높이가 높을수록 더 많은 에너지를 저장할 수 있습니다."
csCZ = "Ukládá přebytečnou energii a vrací ji, když je síť nedostatečně zásobována. Čím výše je postavena, tím více energie může uchovávat."
