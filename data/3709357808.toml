status = "normal"
enUS = "Your settlement has survived its first bad tide.\n\nLike droughts, bad tides are part of the seasonal cycle. \n\nThe next bad tides will not be as forgiving, so be prepared."
zhCN = "您的定居点经历了第一次逆潮。\n\n与干旱一样，逆潮是季节循环的一部分。\n\n接下来的逆潮将不会如此宽容，所以请做好准备。"
zhTW = "您的村莊經歷了首次的壞潮。\n\n壞潮和旱災一樣，都是季節循環的一部分。\n\n接下來的壞潮將不會這麼寬容，因此請做好準備。"
ruRU = "Ваше поселение пережило свою первую плохую волну.\n\nКак и засухи, плохие волны - часть сезонного цикла.\n\nСледующие плохие волны уже не будут такими снисходительными, поэтому будьте наготове."
jaJP = "あなたの集落は最初の悪潮を乗り越えました。\n\n干ばつと同様に、悪潮は季節のサイクルの一部です。\n\n次の悪潮はそれほど寛容ではないでしょうから、準備を整えておいてください。"
frFR = "Votre colonie a survécu à sa première marée basse.\n\nTout comme les sécheresses, les marées basses font partie du cycle saisonnier.\n\nLes prochaines marées basses ne seront pas aussi clémentes, alors préparez-vous."
deDE = "Ihr Siedlung hat ihre erste Flut erlebt.\n\nWie Dürren sind Fluten Teil des saisonalen Zyklus.\n\nDie nächsten Fluten werden nicht so nachsichtig sein, also macht euch bereit."
plPL = "Twoja osada przetrwała swoją pierwszą złowieszczą falę.\n                               \nPodobnie jak susze, złowieszcze fale są częścią sezonowego cyklu.\n                               \nNastępne złowieszcze fale nie będą już tak łaskawe, więc bądźcie gotowi."
ptBR = "Sua colônia sobreviveu à sua primeira maré baixa.\n\nAssim como as secas, as marés baixas são parte do ciclo sazonal.\n\nAs próximas marés baixas não serão tão indulgentes, então esteja preparado."
koKR = "귀하의 마을은 첫 번째 불리한 조수를 겪었습니다.\n                               \n가뭄처럼 불리한 조수는 계절 주기의 일부입니다.\n                               \n다음 불리한 조수는 그렇게 관대하지 않을 것이니, 준비하세요."
csCZ = "Vaše osídlení zažilo svou první špatnou přílivovou vlnu.\n\nStejně jako sucho, špatné přílivy jsou součástí sezónního cyklu.\n\nNásledující špatné přílivy již nebudou tak shovívavé, proto buďte na pozoru."
viVN = "Nhà định cư của bạn đã trải qua đợt thủy triều xấu đầu tiên.\n\nCũng như hạn hán, thủy triều xấu là một phần của chu kỳ mùa.\n\nNhững đợt thủy triều xấu tiếp theo sẽ không dễ chịu như vậy, vì vậy hãy sẵn sàng."

