["Tutorial.HaulersAndWorkforce.BuildHaulingPost"]
raw = "Па меры росту паселішча яно апрацоўвае ўсё больш тавараў. Іх перавозка займае значную частку дня вашых рабочых.\n                                               \nГрузчыкі дапамагаюць з гэтым. Яны перамяшчаюць тавары па ўсім раёне, кіруючыся патрэбай.\n                                               \nПабудуйце цяпер Пост грузчыкаў."
status = "normal"
enUS = "As the settlement grows, it processes more and more goods. Their transportation takes up a significant portion of your workers' day.\n\nHaulers help with this. They move goods throughout the area, responding to demand.\n\nBuild a Hauling Post now."
zhCN = "随着定居点的增长，它处理越来越多的商品。它们的运输占据了工人的大部分时间。\n                                               \n搬运工可以帮助完成这项工作。他们根据需求在区域内移动物品。\n                                               \n现在建造搬运工岗位。"
zhTW = "隨著定居點的增長，它處理的商品越來越多。運輸佔用了你工人大部分的時間。\n\n搬運工幫助解決這個問題。他們根據需求在整個區域內搬運商品。\n\n現在建造搬運工崗位。"
ruRU = "По мере роста поселения оно обрабатывает все больше товаров. Их перевозка занимает значительную часть дня ваших рабочих.\n                                               \nГрузчики помогают с этим. Они перемещают товары по всему району, руководствуясь потребностью.\n                                               \nПостройте сейчас Пост грузчиков."
jaJP = "「集落が成長するにつれて、より多くの商品を処理します。それらの輸送は、労働者の1日のかなりの部分を占めています。\n\nハウラーがこれを助けます。彼らは必要に応じて地域全体で商品を移動させます。\n\n今すぐハウリングポストを建設しましょう。」"
frFR = "Au fur et à mesure que la colonie se développe, elle traite de plus en plus de marchandises. Leur transport occupe une grande partie de la journée de vos travailleurs.\n\nLes porteurs aident avec cela. Ils déplacent les marchandises dans toute la région, en fonction des besoins.\n\nConstruisez maintenant un Poste de porteurs."
deDE = "Mit dem Wachstum der Siedlung verarbeitet sie immer mehr Waren. Ihr Transport nimmt einen erheblichen Teil des Tages Ihrer Arbeiter in Anspruch.\n\nDie Auflader helfen dabei. Sie bewegen Waren im gesamten Gebiet, je nach Bedarf.\n\nBauen Sie jetzt einen Aufladeposten."
plPL = "W miarę wzrostu osady przetwarza ona coraz więcej towarów. Ich transport zajmuje znaczną część dnia waszych pracowników.\n\nŁadowacze pomagają w tym. Przemieszczają towary po całym obszarze, kierując się potrzebami.\n\nZbuduj teraz Post ładowaczy."
ptBR = "À medida que a colônia cresce, ela processa cada vez mais mercadorias. O transporte delas ocupa uma parte significativa do dia de seus trabalhadores.\n                                              \nOs carregadores ajudam com isso. Eles movem mercadorias por toda a área, atendendo às necessidades.\n                                              \nConstrua agora o Posto de Carregadores."
koKR = "거주지가 성장함에 따라 더욱 많은 상품을 다룰 수 있게 됩니다. 상품 운반은 근로자들의 하루 중 상당한 시간을 차지합니다.\n\n하울러가 이 작업을 도와줍니다. 그들은 필요에 따라 지역 곳곳으로 상품을 이동시킵니다.\n\n지금 하울러 포스트를 건설하세요."
csCZ = "Jak se osada rozrůstá, zpracovává čím dál více zboží. Jeho přeprava zabírá značnou část dne vašich pracovníků.\n                                               \nDělníci s tím pomáhají. Přesouvají zboží po celém území podle potřeby.\n                                               \nPostavte nyní Stanici dělníků."
viVN = "Khi khu định cư phát triển, nó xử lý ngày càng nhiều hàng hóa. Việc vận chuyển chúng chiếm một phần lớn trong ngày làm việc của công nhân bạn.\n                                               \nNhững người vận chuyển giúp đỡ trong việc này. Họ di chuyển hàng hóa trong toàn khu vực, dựa trên nhu cầu.\n                                               \nHãy xây dựng một Chốt vận chuyển ngay bây giờ."

["Tutorial.HaulersAndWorkforce.ChangeWorkforce"]
raw = "Некаторыя працоўныя месцы, напрыклад пасты грузчыкаў, па змаўчанні не запаўняюць усе слоты для работнікаў. Вы можаце змяніць патрэбную колькасць работнікаў у панэлі будынка.\n                                              \nТаксама можна кіраваць размеркаваннем работнікаў праз прыярытэты працоўных месцаў. Напрыклад, посту грузчыкаў звычайна можна задаць ніжэйшы прыярытэт працоўнага месца.\n                                              \nПаспрабуем гэта цяпер."
status = "normal"
enUS = "Some jobs, such as hauler posts, do not automatically fill all slots for workers. You can change the required number of workers in the building panel.\n\nYou can also manage the distribution of workers through job priorities. For example, a hauler post can usually be assigned a lower job priority.\n\nLet's try this now."
zhCN = "某些工作岗位，例如搬运工岗位，默认情况下不会填满所有员工名额。您可以在建筑面板中更改所需的员工数量。\n\n您还可以通过工作岗位优先级管理员工的分配。例如，搬运工岗位通常可以设置较低的工作优先级。\n\n现在让我们试一下。"
zhTW = "某些工作崗位，例如搬運工的職位，默認不會填滿所有工人的槽位。您可以在建築面板中更改所需的工人人數。\n\n您還可以通過工作崗位的優先級來管理工人的分配。例如，搬運工的職位通常可以設置較低的工作崗位優先級。\n\n我們現在來試試這個。"
ruRU = "Некоторые рабочие места, например, посты грузчиков, по умолчанию не заполняют все слоты для работников. Вы можете изменить необходимое количество работников в панели здания.\n                                              \nТакже можно управлять распределением работников через приоритеты рабочих мест. Например, посту грузчиков обычно можно задать более низкий приоритет рабочего места.\n                                              \nПопробуем это сейчас."
jaJP = "「いくつかの職場、例えばハウラーのポジションは、デフォルトではすべての従業員スロットを満たしません。建物パネルで必要な従業員数を変更できます。\n\nまた、職場の優先順位を通じて従業員の配分を管理できます。例えば、ハウラーのポジションには通常、低い職場の優先順位を設定できます。\n\nでは、これを今試してみましょう。」"
frFR = "Certains postes de travail, comme les postes de transporteurs, ne remplissent pas par défaut tous les emplacements pour les travailleurs. Vous pouvez modifier le nombre requis de travailleurs dans le panneau du bâtiment.\n\nIl est également possible de gérer la répartition des travailleurs par le biais des priorités des postes de travail. Par exemple, le poste de transporteurs peut généralement avoir une priorité inférieure.\n\nEssayons cela maintenant."
deDE = "Einige Arbeitsplätze, wie etwa die Lagerarbeiter, füllen standardmäßig nicht alle Slots für Arbeitskräfte aus. Sie können die benötigte Anzahl an Arbeiter in der Gebäudeansicht ändern.\n                                              \nEs ist auch möglich, die Verteilung der Arbeitnehmer über die Prioritäten der Arbeitsplätze zu steuern. Zum Beispiel kann der Lagerarbeitsplatz normalerweise eine niedrigere Priorität zugewiesen bekommen.\n                                              \nLassen Sie uns das jetzt ausprobieren."
plPL = "Niektóre miejsca pracy, na przykład stanowiska ładowaczy, domyślnie nie wypełniają wszystkich slotów dla pracowników. Możesz zmienić wymaganą liczbę pracowników w panelu budynku.\n\nMożna także zarządzać przydziałem pracowników przez priorytety miejsc pracy. Na przykład, stanowisku ładowaczy zazwyczaj można przypisać niższy priorytet miejsca pracy.\n\nSpróbujmy to teraz."
ptBR = "Alguns postos de trabalho, como os pontos de carregadores, por padrão não preenchem todos os slots para trabalhadores. Você pode mudar a quantidade necessária de trabalhadores no painel do edifício.\n\nTambém é possível gerenciar a distribuição de trabalhadores através das prioridades dos postos de trabalho. Por exemplo, o ponto de carregadores pode geralmente ser definido com uma prioridade mais baixa.\n\nVamos tentar isso agora."
koKR = "일부 직무, 예를 들어 하울러 포스트는 기본적으로 모든 근로자 슬롯을 채우지 않습니다. 건물 패널에서 근로자 수를 변경할 수 있습니다.\n                                              \n또한 근로자의 배치를 작업 우선순위를 통해 관리할 수 있습니다. 예를 들어 하울러 포스트는 일반적으로 작업 장소의 낮은 우선순위를 설정할 수 있습니다.\n                                              \n이제 그것을 시도해 보겠습니다."
csCZ = "Některé pracovní pozice, například místa pro nosiče, ve výchozím nastavení nezaplní všechny sloty pro pracovníky. Můžete změnit požadovaný počet pracovníků v panelu budovy.\n\nTaké můžete řídit rozdělení pracovníků prostřednictvím priorit pracovních míst. Například pro místo nosičů obvykle můžete nastavit nižší prioritu pracovního místa.\n\nZkusme to nyní."
viVN = "Có một số vị trí công việc, chẳng hạn như các bến bốc dỡ, mặc định không lấp đầy tất cả các vị trí cho nhân viên. Bạn có thể thay đổi số lượng nhân viên cần thiết trong bảng điều khiển của tòa nhà.\n\nBên cạnh đó, bạn cũng có thể quản lý phân bổ nhân viên thông qua ưu tiên của các vị trí công việc. Chẳng hạn, bến bốc dỡ thường có thể được đặt ở mức ưu tiên thấp hơn so với các vị trí công việc khác.\n\nHãy thử điều này ngay bây giờ."

["Tutorial.HaulersAndWorkforce.PauseHaulingPost"]
raw = "Вы можаце прыпыняць будынкі і будоўлі. Гэта дае больш кантролю над дзеяннямі баброў.\n                                               \nНапрыклад, прыпыненыя працоўныя месцы аўтаматычна вызваляюцца, і работнікі самі пераразмяркоўваюцца на іншыя даступныя месцы працы.\n                                               \nВыберыце Пост грузчыкаў і прыпыніце яго, націснуўшы кнопку на яго панэлі."
status = "normal"
enUS = "You can pause buildings and constructions. This gives you more control over the actions of the beavers.\n\nFor example, paused workplaces are automatically freed, and workers will redistribute themselves to other available jobs.\n\nSelect the Hauler Post and pause it by clicking the button on its panel."
zhCN = "您可以暂停建筑物和施工。这使您可以更好地控制海狸的行动。\n\n例如，暂停的工作岗位会自动释放，工人会自行重新分配到其他可用工作岗位。\n\n选择货物装卸站，点击其面板上的按钮进行暂停。"
zhTW = "您可以暫停建築和施工。這提供了對河狸行為的更多控制。\n                                                \n例如，暫停的工作位置會自動釋放，工人會自行重新分配到其他可用的工作位置。\n                                                \n選擇貨運站並通過按下其面板上的按鈕來暫停它。"
ruRU = "Вы можете приостанавливать здания и постройки. Это дает больше контроля над действиями бобров.\n                                               \nНапример, приостановленные рабочие места автоматически освобождаются, и работники сами перераспределяются на другие доступные места работы.\n                                               \nВыберите Пост грузчиков и приостановите его, нажав кнопку на его панели."
jaJP = "「建物と建設を一時停止することができます。これによりビーバーの行動をより制御できます。\n\n例えば、一時停止された職は自動的に解放され、作業員は自分で他の利用可能な職場に再配置されます。\n\nハラーのポストを選択し、そのパネルのボタンを押して一時停止してください。」"
frFR = "Vous pouvez suspendre les bâtiments et les constructions. Cela donne plus de contrôle sur les actions des castors.\n                                               \nPar exemple, les postes de travail suspendus sont automatiquement libérés, et les travailleurs se réaffectent d'eux-mêmes à d'autres postes disponibles.\n                                               \nSélectionnez le Poste des transporteurs et suspendez-le en appuyant sur le bouton de son panneau."
deDE = "Sie können Gebäude und Baustellen pausieren. Das gibt Ihnen mehr Kontrolle über die Aktionen der Biber.\n                                               \nZum Beispiel werden pausierte Arbeitsplätze automatisch freigegeben, und die Arbeiter verteilen sich selbst auf andere verfügbare Arbeitsplätze.\n                                               \nWählen Sie den Posten der Lastenträger aus und pausieren Sie ihn, indem Sie die Schaltfläche auf seinem Panel drücken."
plPL = "Możesz wstrzymywać budynki i budowy. Daje to większą kontrolę nad działaniami bobrów.\n\nNa przykład wstrzymane miejsca pracy są automatycznie zwalniane, a pracownicy sami przeskakują na inne dostępne miejsca pracy.\n\nWybierz Post Górników i wstrzymaj go, klikając przycisk na jego panelu."
ptBR = "Você pode pausar edifícios e construções. Isso oferece mais controle sobre as ações dos castores.\n\nPor exemplo, os postos de trabalho pausados são automaticamente liberados e os trabalhadores se redistribuem para outros postos de trabalho disponíveis.\n\nEscolha o Posto dos Transportadores e pause-o clicando no botão em seu painel."
koKR = "건물과 건설을 일시 중지할 수 있습니다. 이것은 비버의 행동을 더 잘 통제할 수 있게 해줍니다.\n                                               \n예를 들어, 일시 중지된 작업 자리는 자동으로 해제되며, 작업자들은 다른 이용 가능한 작업 자리에 스스로 재배치됩니다.\n                                               \n하울러 포스트를 선택하고 패널의 버튼을 눌러 일시 중지하세요."
csCZ = " můžete pozastavit budovy a stavby. To dává větší kontrolu nad činnostmi bobrů.\n\nNapříklad pozastavené pracovní místa se automaticky uvolní a pracovníci se sami přesunou na jiná dostupná pracovní místa.\n\nVyberte Stanici nosičů a pozastavte ji stisknutím tlačítka na její panel."
viVN = "Bạn có thể tạm dừng các tòa nhà và công trình. Điều này mang lại nhiều kiểm soát hơn đối với hành động của những con nhím.\n\nVí dụ, các vị trí làm việc bị tạm dừng sẽ tự động được giải phóng, và công nhân sẽ tự động phân bổ lại vào các vị trí làm việc khác có sẵn.\n\nChọn Bưu cục của những người vận chuyển và tạm dừng nó bằng cách nhấn nút trên bảng điều khiển của nó."

