["MapMetadata.Terraces.Description"]
raw = "Шмат якія супольнасці выбіраюць для пасялення ўзвышшы, выкарыстоўваючы нядаўна набытае бабрамі ўменне будаваць вертыкальна."
status = "normal"
enUS = "Many communities choose elevated areas for settlement, utilizing the recently acquired beaver ability to build vertically."
zhCN = "许多社区选择在高地定居，利用最近由海狸掌握的垂直建造技能。"
zhTW = "許多社群選擇在高地定居，利用栗鼠最近學會的垂直建造技術。"
ruRU = "Многие сообщества выбирают для поселения возвышенности, используя недавно приобретенное бобрами умение строить вертикально."
jaJP = "多くのコミュニティは、最近ビーバーが獲得した垂直に建設する能力を利用して、居住地として高台を選択します。"
frFR = "De nombreuses communautés choisissent de s'installer sur des terrasses, utilisant la nouvelle capacité des castors à construire verticalement."
deDE = "Viele Gemeinschaften wählen Anhöhen als Siedlungsort, wobei sie das kürzlich erworbene Können der Biber nutzen, vertikal zu bauen."
plPL = "Wiele społeczności wybiera osiedlanie się na wzniesieniach, wykorzystując nowo nabytą przez bobry umiejętność budowania w pionie."
ptBR = "Muitas comunidades escolhem os altos para se estabelecer, usando a habilidade recentemente adquirida pelos castores de construir verticalmente."
koKR = "많은 커뮤니티가 최근 비버들이 세운 수직 건축 기술을 활용하여 고지대를 정착지로 선택합니다."
csCZ = "Mnoho komunit si vybírá pro své osídlení vyvýšeniny, využívající nedávno nabytou dovednost bobrů stavět vertikálně."
viVN = "Nhiều cộng đồng chọn để định cư trên các vùng cao, sử dụng khả năng xây dựng theo chiều dọc mới được loài nhím thuần hóa."

