["MapMetadata.Canyon.Description"]
raw = "У пустыні бабры шукаюць даліны, праз якія ўсё яшчэ цякуць рэкі. Гэты каньён лёгка запрудзіць, і ён стане бяспечным прытулкам для ўсіх."
status = "normal"
enUS = "In the desert, beavers search for valleys through which rivers still flow. This canyon can be easily dammed, and it will become a safe haven for all."
zhCN = "在沙漠中，海狸寻找仍然流淌着河流的山谷。这个峡谷很容易被堵住，它将成为所有生物的安全庇护所。"
zhTW = "在沙漠中，海狸尋找仍有河流流過的山谷。這個峽谷很容易堵塞，將成為所有生物的安全庇護所。"
ruRU = "В пустыне бобры ищут долины, через которые все еще текут реки. Этот каньон легко затопить, и он станет безопасным укрытием для всех."
jaJP = "砂漠でビーバーは河川がまだ流れる谷を探しています。この渓谷は簡単にせき止められ、すべての生き物にとって安全な隠れ家となります。"
frFR = "Dans le désert, les castors recherchent des vallées où les rivières coulent encore. Ce canyon peut être facilement barré, et il deviendra un refuge sûr pour tous."
deDE = "Im Wüstensuchen die Biber nach Tälern, in denen noch immer Flüsse fließen. Diese Schlucht lässt sich leicht aufstauen und wird ein sicherer Zufluchtsort für alle."
plPL = "W pustyni bobry szukają dolin, przez które wciąż płyną rzeki. Ten kanion łatwo zablokować, a stanie się bezpiecznym schronieniem dla wszystkich."
ptBR = "Nos desertos, os castores procuram vales onde os rios ainda fluem. Este cânion pode ser facilmente represado e se tornará um abrigo seguro para todos."
koKR = "사막에서 비버들은 여전히 강이 흐르는 계곡을 찾고 있습니다. 이 협곡은 쉽게 막을 수 있으며, 모든 이들에게 안전한 피난처가 될 것입니다."
csCZ = "V poušti bobři hledají údolí, kterými stále protékají řeky. Tento kaňon se snadno přehradí a stane se bezpečným útočištěm pro všechny."
viVN = "Trong sa mạc, những con hải ly tìm kiếm thung lũng, nơi vẫn còn chảy những dòng sông. Khe núi này dễ dàng bị chặn lại, và nó sẽ trở thành nơi trú ẩn an toàn cho tất cả."

