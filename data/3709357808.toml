["Tutorial.Introduction.Description"]
new = "Сардэчна запрашаем у Timberborn! Гэта навучанне дапаможа вам устаць на лапы ў пусташы і перажыць першыя дні.\n                                   \nВы даведаецеся, як карыстацца інструментамі, патрэбнымі для пабудовы квітнеючай бабровай супольнасці.\n                                   \nПа меры праходжання наступных крокаў парады будуць з'яўляцца тут."
