["FactionSelection.WellbeingCondition"]
raw = "Каб адкрыць, дасягніце сярэдняга ўзроўню дабрабыту {0}, гуляючы за {1}."
status = "normal"
enUS = "To unlock, reach an average wellbeing level of {0} while playing as {1}."
zhCN = "要解锁，请在玩{1}时达到平均幸福水平{0}。"
zhTW = "要開放，需在以 {1} 進行遊玩的過程中達到平均幸福指數 {0}。"
