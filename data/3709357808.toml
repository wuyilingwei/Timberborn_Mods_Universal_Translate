["Building.SteamEngine.FlavorDescription"]
raw = "Наколькі б выдатным ні было гэта вынаходства, яно стала занозай у баку ўсіх бобравых народаў, акрамя Жалезных зубоў."
status = "normal"
enUS = "No matter how wonderful this invention is, it has become a thorn in the side of all beaver kind, except for the Iron Teeth."
zhCN = "“无论这个发明多么出色，它都成为了所有海狸民族的一个刺痛，除了铁齿。”"
zhTW = "無論這項發明多麼出色，它都成為了所有鬣蜥民族的心頭之痛，除了鐵牙部落。"
ruRU = "Насколько бы выдающимся ни было это изобретение, оно стало занозой в боку всех бобровых народов, кроме Железных Зубов."
jaJP = "この発明がどれほど素晴らしかったとしても、それはすべてのビーバー民族にとって、アイアンテイルを除いて、刺のような存在となった。"
frFR = "Quoique cette invention soit remarquable, elle est devenue une épine dans le pied de tous les peuples castors, à l'exception des Dents de Fer."
deDE = "So großartig diese Erfindung auch sein mag, sie ist zu einem Dorn im Auge aller Biber-Stämme geworden, außer den Eisenzähnen."
plPL = "Jakkolwiek wspaniałe by nie było to wynalazek, stało się ono wrzodem na tyłku wszystkich bobrowych narodów, z wyjątkiem Żelaznych Zębów."
ptBR = "Por mais incrível que essa invenção seja, ela se tornou uma dor de cabeça para todas as nações de castores, exceto para os Dentes de Ferro."
koKR = "이 발명품이 얼마나 훌륭하든 간에, 그것은 모든 비버 종족의 가시가 되었으며, 철 이빨을 제외하고는 말입니다."
csCZ = "Ať už bylo tento vynález jakkoli skvělý, stal se trnem v oku všech bobřích národů kromě Železných zubů."
viVN = "Cho dù phát minh này tuyệt vời đến đâu, nó đã trở thành một trở ngại cho tất cả các dân tộc castor, ngoại trừ Răng Sắt."
trTR = "Ne kadar harika bir buluş olsa da, bu icat, Demir Dişler hariç tüm kunduz halklarının belinde bir diken haline geldi."

