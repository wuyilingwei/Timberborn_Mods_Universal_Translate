["MapMetadata.Diorama.Description"]
raw = "Перш чым ім дазволяць кіраваць вялікімі калоніямі, будучым будаўнікам даручаюць невялікія праекты кшталту гэтага."
status = "normal"
enUS = "Before they are allowed to manage large colonies, future builders are entrusted with small projects like this."
zhCN = "在被允许管理大型殖民地之前，未来的建筑师们将被分配像这样的微型项目。"
zhTW = "在未被允許管理大型殖民地之前，未來的建築師們將被指派執行像這樣的小型項目。"
ruRU = "Перед тем как им разрешат управлять большими колониями, будущим строителям поручаются небольшие проекты наподобие этого."
jaJP = "「未来の建設者が大規模なコロニーを管理することを許可される前に、このような小さなプロジェクトを任されます。」"
frFR = "Avant de leur permettre de diriger de grandes colonies, les futurs bâtisseurs se voient confier de petits projets comme celui-ci."
deDE = "Bevor sie die Erlaubnis erhalten, große Kolonien zu leiten, werden zukünftige Bauherren mit kleinen Projekten wie diesem betraut."
plPL = "Zanim będą mogli zarządzać dużymi koloniami, przyszłym budowniczym zleca się małe projekty, takie jak ten."
ptBR = "Antes de serem autorizados a gerenciar grandes colônias, os futuros construtores são encarregados de pequenos projetos como este."
koKR = "큰 식민지를 관리할 수 있도록 허용되기 전에, 미래의 건축가들은 이러한 작은 프로젝트를 맡게 됩니다."
csCZ = "Než jim bude dovoleno spravovat velké kolonie, budou budoucím stavitelům svěřeny menší projekty, jako je tento."
viVN = "Trước khi được phép quản lý các thuộc địa lớn, những nhà xây dựng tương lai sẽ được giao cho những dự án nhỏ như thế này."

