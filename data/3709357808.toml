["Building.Levee.FlavorDescription"]
raw = "Збалансаваная, умацаваная і вылепленая да дасканаласці пакаленнямі бобравых гідраінжынераў, гэта не проста «брусок дрэва»."
status = "normal"
enUS = "Balanced, reinforced, and sculpted to perfection by generations of beaver hydrologists, this is not just a 'piece of wood'."
zhCN = "经过几代海狸水利工程师的平衡、加固和完善，这不仅仅是一个“木块”。"
zhTW = "經過幾代海狸水利工程師的平衡、加固和精心雕琢，這不僅僅是「一根木頭」。"
ruRU = "Сбалансированная, укрепленная и доведенная до совершенства поколениями бобровых гидроинженеров, это не просто «брусок дерева»."
jaJP = "世代にわたるビーバーの水理エンジニアによって均整がとれ、強化され、完璧に成形されたこれは、単なる「木の杭」ではない。"
frFR = "Équilibré, renforcé et façonné à la perfection par des générations d'ingénieurs hydrauliques castors, ce n'est pas simplement un «bloc de bois»."
deDE = "„Ausgewogen, verstärkt und über Generationen von Biberningenieuren zur Perfektion geformt, ist das nicht einfach ein ‚Holzblock‘.“"
plPL = "Zrównoważona, wzmocniona i formowana do doskonałości przez pokolenia bobrowych inżynierów hydrotechnicznych, to nie jest po prostu «klocek drewna»."
ptBR = "Equilibrada, reforçada e moldada à perfeição ao longo de gerações de engenheiros hidráulicos castores, isso não é apenas um 'tijolo de madeira'."
koKR = "균형 잡히고 강화되어 여러 세대의 비버 수자원 엔지니어들에 의해 완벽하게 다듬어진, 이는 단순한 '나무 블록'이 아닙니다."
csCZ = "Vyvážená, zpevněná a vymodelovaná k dokonalosti generacemi bobřích hydžinženýrů, to není jen takový 'kus dřeva'."
viVN = "Cân bằng, được gia cố và được tạo hình hoàn hảo bởi nhiều thế hệ kỹ sư thủy lực của loài beaver, đây không chỉ là một 'khúc gỗ'."
trTR = "İnsanlar tarafından nesiller boyu mükemmelliğe şekillendirilmiş, denge sağlanmış ve güçlendirilmiş bu seltin, sıradan bir 'ahşap blok' olmadığını gösteriyor."

["Building.Lever.Description"]
raw = "Перадае сігнал з ручным кіраваннем. Выдатны першы крок да аўтаматызацыі паселішча."
