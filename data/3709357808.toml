status = "normal"

["Tutorial.Wellbeing.WellbeingPanel"]
new = "Для баброў важнае ўсё грамадства. Сярэдні дабрабыт вашага паселішча паказаны ў левым верхнім куце экрана.\n                                   \nНацісніце на яго, каб убачыць задавальненне ўсіх магчымых патрэб. Ёсць шмат спосабаў зрабіць жыццё ў пусташы больш зносным."
