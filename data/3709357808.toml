["Tutorial.Droughts"]
new = "Засухі"
status = "normal"

["Tutorial.Droughts.Description"]
new = "Віншуем! Ваша паселішча перажыло сваю першую засуху.\n                               \nЗасухі - частка сезоннага цыклу. З часам яны будуць вяртацца ўсё часцей і станавіцца даўжэйшымі.\n\nКалі вы яшчэ не зрабілі гэтага, пачніце рыхтавацца да наступнай засухі, пабудаваўшы плаціну."
status = "normal"

["Tutorial.Forestry"]
new = "Лясніцтва"
status = "normal"

["Tutorial.Forestry.Forester"]
new = "Бабрам патрэбная стабільная крыніца бярвення. Вось такая навіна.\n                            \nВыкарыстоўваючы ачкі навукі, якія вырабляе ваш Вынаходнік, адкрыйце Лясніка. Потым пабудуйце яго ў вобласці, дзе хочаце саджаць дрэвы."
status = "normal"

["Tutorial.Forestry.MarkBirchesForPlanting"]
new = "Выкарыстайце інструмент пасадкі дрэў і кустоў, каб пасадзіць некалькі бяроз. Яны растуць хутка, таму добра падыходзяць для маладых паселішчаў.\n                                          \nЯк і ўраджай, дрэвы растуць толькі на абрашаных зялёных участках.\n                                          \nНе забывайце адзначаць зоны пасадкі пад высечку."
status = "normal"

["Tutorial.HaulersAndWorkforce"]
new = "Грузчыкі і працоўная сіла"
status = "normal"

["Tutorial.HaulersAndWorkforce.BuildHaulingPost"]
new = "Па меры росту паселішча яно апрацоўвае ўсё больш тавараў. Іх перавозка займае значную частку дня вашых рабочых.\n                                               \nГрузчыкі дапамагаюць з гэтым. Яны перамяшчаюць тавары па ўсім раёне, кіруючыся патрэбай.\n                                               \nПабудуйце цяпер Пост грузчыкаў."
status = "normal"

["Tutorial.HaulersAndWorkforce.ChangeWorkforce"]
new = "Некаторыя працоўныя месцы, напрыклад пасты грузчыкаў, па змаўчанні не запаўняюць усе слоты для работнікаў. Вы можаце змяніць патрэбную колькасць работнікаў у панэлі будынка.\n                                              \nТаксама можна кіраваць размеркаваннем работнікаў праз прыярытэты працоўных месцаў. Напрыклад, посту грузчыкаў звычайна можна задаць ніжэйшы прыярытэт працоўнага месца.\n                                              \nПаспрабуем гэта цяпер."
status = "normal"

["Tutorial.HaulersAndWorkforce.PauseHaulingPost"]
new = "Вы можаце прыпыняць будынкі і будоўлі. Гэта дае больш кантролю над дзеяннямі баброў.\n                                               \nНапрыклад, прыпыненыя працоўныя месцы аўтаматычна вызваляюцца, і работнікі самі пераразмяркоўваюцца на іншыя даступныя месцы працы.\n                                               \nВыберыце Пост грузчыкаў і прыпыніце яго, націснуўшы кнопку на яго панэлі."
status = "normal"

["Tutorial.Housing"]
new = "Жыллё"
status = "normal"

["Tutorial.Housing.Lodges"]
new = "Два бабры лепш за аднаго! Дамы паляпшаюць дабрабыт вашых баброў і дазваляюць расці папуляцыі Народных хвастоў.\n                                      \nБабры аўтаматычна замацоўваюцца за даступнымі жылымі месцамі."
status = "normal"

