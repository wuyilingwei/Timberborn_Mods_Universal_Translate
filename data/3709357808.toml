["NaturalResource.Wheat.FlavorDescription"]
raw = "«Ты забудзеш пра сонца ў безаблачным небе, калі мы пойдзем па залатых палях.» — бобрая балада"
status = "normal"
enUS = "\"You will forget about the sun in the cloudless sky when we walk through the golden fields.\" — beaver ballad"
zhCN = "“当我们走在金色的麦田中，你会忘记无云天空中的阳光。” — 河狸的民谣"
