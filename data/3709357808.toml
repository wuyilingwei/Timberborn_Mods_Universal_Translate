["MapMetadata.Plains.Description"]
raw = "З шырокімі прасторамі, плоскімі як бабровы хвост, гэты край становіцца бяспечным палігонам для пачаткоўцаў-інжынераў."
status = "normal"
enUS = "With wide open spaces as flat as a beaver's tail, this land becomes a safe playground for novice engineers."
zhCN = "这里有宽广的空间，如海狸的尾巴般平坦，这片土地成为初学工程师的安全试验场。"
zhTW = "在寬廣的空間中，平坦如海狸的尾巴，這片土地成為初學者工程師的安全試驗場。"
ruRU = "С широкими просторами, плоскими как бобровый хвост, эта земля становится безопасным полигоном для начинающих инженеров."
jaJP = "広々とした、ビーバーの尾のように平らな空間を持つこの土地は、新人エンジニアのための安全な試験場となります。"
frFR = "Avec de vastes espaces aussi plats qu'une queue de castor, cette région devient un terrain de jeu sûr pour les ingénieurs débutants."
deDE = "Mit weiten, flachen Flächen wie einem Biber Schwanz wird dieses Land zu einem sicheren Übungsplatz für angehende Ingenieure."
plPL = "Z szerokimi przestrzeniami, płaskimi jak ogon bobra, ten kraj staje się bezpiecznym poligonem dla początkujących inżynierów."
ptBR = "Com vastos espaços, planos como a cauda de um castor, esta região se torna um campo seguro para engenheiros iniciantes."
koKR = "너무 넓고 평평한 평원에서 이 지역은 초보 엔지니어들에게 안전한 실험장이 됩니다."
csCZ = "S širokými prostory, plochými jako bobří ocas, se tato krajina stává bezpečným prostorem pro začínající inženýry."
viVN = "Với những khoảng không rộng rãi, phẳng như đuôi hải ly, vùng này trở thành sân chơi an toàn cho những kỹ sư mới vào nghề."

