["Tutorial.Droughts.Description"]
raw = "Віншуем! Ваша паселішча перажыло сваю першую засуху.\n                               \nЗасухі - частка сезоннага цыклу. З часам яны будуць вяртацца ўсё часцей і станавіцца даўжэйшымі.\n\nКалі вы яшчэ не зрабілі гэтага, пачніце рыхтавацца да наступнай засухі, пабудаваўшы плаціну."
status = "normal"
enUS = "Congratulations! Your settlement has survived its first drought.\n\nDroughts are part of the seasonal cycle. Over time, they will return more frequently and become longer.\n\nIf you haven't done so already, start preparing for the next drought by building a dam."
zhCN = "恭喜！您的 посел地经历了第一次干旱。\n\n干旱是季节循环的一部分。随着时间推移，它们将会越来越频繁，持续时间也会更长。\n\n如果您还没有这样做，请开始为下一次干旱做好准备，建造一个堤坝。"
zhTW = "恭喜！您的聚落经历了第一次干旱。\n\n干旱是季节循环的一部分。随着时间的推移，它们将越来越频繁，并变得更长。\n\n如果您还没有这样做，请通过建造水坝开始为下一个干旱做好准备。"
ruRU = "Поздравляем! Ваше поселение пережило свою первую засуху.\n\nЗасухи - часть сезонного цикла. Со временем они будут возвращаться все чаще и становиться длительнее.\n\nЕсли вы еще не сделали этого, начните готовиться к следующей засухе, построив плотину."
jaJP = "おめでとうございます！あなたの集落は初めての干ばつを乗り越えました。\n\n干ばつは季節のサイクルの一部です。時間が経つにつれて、干ばつはますます頻繁に、そして長くなります。\n\nまだ準備ができていない場合は、次の干ばつに備えて堤防を建設してください。"
frFR = "Félicitations ! Votre colonie a survécu à sa première sécheresse.\n\nLes sécheresses font partie du cycle saisonnier. Avec le temps, elles reviendront de plus en plus fréquemment et deviendront plus longues.\n\nSi vous ne l'avez pas encore fait, commencez à vous préparer pour la prochaine sécheresse en construisant un barrage."
deDE = "Herzlichen Glückwunsch! Ihre Siedlung hat ihre erste Dürre überstanden.\n\nDürreperioden sind Teil des saisonalen Zyklus. Mit der Zeit werden sie immer häufiger und länger dauern.\n\nWenn Sie dies noch nicht getan haben, beginnen Sie, sich auf die nächste Dürre vorzubereiten, indem Sie einen Damm bauen."
plPL = "Gratulacje! Twoja osada przetrwała swoją pierwszą suszę.\n\nSusze są częścią sezonowego cyklu. Z czasem będą się pojawiać coraz częściej i stawać się dłuższe.\n\nJeśli jeszcze tego nie zrobiłeś, zacznij przygotowania do następnej suszy, budując tamę."
ptBR = "Parabéns! Sua colônia sobreviveu à sua primeira seca.\n\nSecas são parte do ciclo sazonal. Com o tempo, elas voltarão com mais frequência e se tornarão mais longas.\n\nSe você ainda não fez isso, comece a se preparar para a próxima seca construindo uma represa."
koKR = "축하합니다! 당신의 마을이 첫 번째 가뭄을 겪었습니다.\n\n가뭄은 계절 주기의 일부입니다. 시간이 지남에 따라 가뭄은 점점 더 자주 발생하고 길어질 것입니다.\n\n아직 하지 않았다면, 댐을 건설하여 다음 가뭄에 대비하기 시작하세요."
csCZ = "Gratulujeme! Vaše osada přežila svou první suchou sezónu.\n\nSucha jsou součástí sezónního cyklu. S časem se budou vracet stále častěji a budou delší.\n\nPokud jste to ještě neudělali, začněte se připravovat na další sucho tím, že postavíte hráz."
viVN = "Chúc mừng! Định cư của bạn đã trải qua đợt hạn hán đầu tiên.\n\nHạn hán là một phần của chu kỳ mùa vụ. Theo thời gian, chúng sẽ trở lại thường xuyên hơn và kéo dài lâu hơn.\n\nNếu bạn chưa làm điều này, hãy bắt đầu chuẩn bị cho đợt hạn hán tiếp theo bằng cách xây dựng một con đập."

