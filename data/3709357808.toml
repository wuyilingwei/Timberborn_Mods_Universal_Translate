["Tutorial.Storage.Pile"]
raw = "У многіх будынкаў ёсць уласнае сховішча, але яно хутка запаўняецца.\n                               \nПабудуйце Вялікую кучу, каб захоўваць больш бярвення.\n                               \nУ кожным складскім будынку змяшчаецца адзін від тавару. Вы можаце задаць тавар для захоўвання пасля выбару будынка."
status = "normal"
enUS = "Many buildings have their own storage, but it fills up quickly.\n\nBuild a Large Pile to store more logs.\n\nEach warehouse building can hold one type of item. You can set the item for storage after selecting the building."
zhCN = "在许多建筑中都有自己的存储空间，但很快就会被填满。\n\n建造一个大型堆积区，以存放更多的原木。\n\n每个仓库建筑只能存放一种货物。选择建筑后，您可以设置要存储的货物。"
zhTW = "許多建築物都有自己的存儲空間，但很快就會填滿。\n\n建造一個大型堆以存放更多的原木。\n\n每個倉庫建築只能存放一種物品。您可以在選擇建築後設定要存放的物品。"
ruRU = "У многих зданий есть собственное хранилище, но оно быстро заполняется.\n\nПостройте Большую кучу, чтобы хранить больше бревен.\n\nВ каждом складском здании помещается один вид товара. Вы можете задать товар для хранения после выбора здания."
jaJP = "多くの建物には独自の収納がありますが、すぐに満杯になります。\n\nより多くの丸太を保管するために、大きな山を建設してください。\n\n各倉庫建物には1種類のアイテムしか収納できません。建物を選択した後、保管するアイテムを設定できます。"
frFR = "De nombreux bâtiments ont leur propre stockage, mais celui-ci se remplit rapidement.\n\nConstruisez une Grande Pile pour stocker plus de rondins.\n\nChaque bâtiment de stockage peut contenir un type de marchandise. Vous pouvez définir la marchandise à stocker après avoir sélectionné le bâtiment."
deDE = "In vielen Gebäuden gibt es eigenen Lagerplatz, aber dieser füllt sich schnell.\n\nBaue einen Großen Haufen, um mehr Stämme zu lagern.\n\nIn jedem Lagergebäude kann nur eine Art von Ware gelagert werden. Du kannst die zu lagernde Ware nach Auswahl des Gebäudes festlegen."
plPL = "Wiele budynków ma własne magazyny, ale szybko się zapełniają.\n\nZbuduj Wielką Stos, aby przechowywać więcej drewna.\n\nW każdym magazynie można przechowywać jeden typ towaru. Możesz ustawić towar do przechowywania po wybraniu budynku."
ptBR = "Muitos edifícios têm seu próprio armazenamento, mas ele rapidamente se enche.\n\nConstrua um Grande Montão para armazenar mais toras.\n\nCada edifício de armazenamento contém um tipo de item. Você pode definir o item a ser armazenado após selecionar o edifício."
koKR = "많은 건물에는 자체 저장소가 있지만 빠르게 가득 차게 됩니다.\n                               \n더 많은 통나무를 저장하기 위해 거대한 더미를 건설하세요.\n                               \n각 창고 건물에는 하나의 상품만 들어 있습니다. 건물을 선택한 후 저장할 상품을 설정할 수 있습니다."
csCZ = "Ve většině budov je vlastní úložiště, ale to se rychle zaplňuje.\n\nPostavte Velkou hromadu, abyste mohli skladovat více klád.\n\nV každé skladové budově se nachází jeden typ zboží. Po výběru budovy můžete nastavit zboží pro skladování."
viVN = "Nhiều tòa nhà có kho chứa riêng, nhưng nó nhanh chóng đầy.\n\nHãy xây dựng một Đống Lớn để lưu trữ nhiều gỗ hơn.\n\nMỗi tòa nhà kho chứa chứa một loại hàng hóa. Bạn có thể chỉ định hàng hóa để lưu trữ sau khi chọn tòa nhà."

["Tutorial.Storage.Tanks"]
raw = "Усе вадкасці захоўваюцца ў рэзервуарах. Сюды ўваходзіць і вада, якую мы перапампоўваем."
status = "normal"
enUS = "All liquids are stored in tanks. This includes water that we pump."
zhCN = "“所有液体存储在储罐中。这包括我们抽水的水。”"
zhTW = "所有液體儲存在儲罐中。這包括我們抽送的水。"
ruRU = "Все жидкости хранятся в резервуарах. Сюда входит и вода, которую мы перекачиваем."
jaJP = "すべての液体はタンクに保管されます。ここには、私たちがポンプで送り出す水も含まれています。"
frFR = "Tous les liquides sont stockés dans des réservoirs. Cela inclut l'eau que nous pompons."
deDE = "Alle Flüssigkeiten werden in Tanks gelagert. Dazu gehört auch das Wasser, das wir umpumpen."
plPL = "Wszystkie ciecze są przechowywane w zbiornikach. Należy do nich również woda, którą przetłoczymy."
ptBR = "Todos os líquidos são armazenados em tanques. Isso inclui a água que estamos bombeando."
koKR = "모든 액체는 저장 탱크에 보관됩니다. 여기에는 우리가 펌프질하는 물도 포함됩니다."
csCZ = "Veškeré kapaliny jsou ukládány v nádržích. To zahrnuje i vodu, kterou přečerpáváme."
viVN = "Tất cả các chất lỏng được lưu trữ trong các thùng chứa. Bao gồm cả nước mà chúng ta bơm lên."

["Tutorial.Storage.Warehouses"]
raw = "Нарэшце, давайце падрыхтуем сховішча для ягад. Таксама варта падрыхтавацца да будучага ўраджаю морквы.\n                             \nЕжа, як і многія іншыя тавары, захоўваецца на складах."
status = "normal"
enUS = "Finally, let's prepare storage for berries. It's also worth getting ready for the upcoming carrot harvest.\n\nFood, like many other goods, is stored in warehouses."
zhCN = "最后，我们来准备一个用来存放浆果的仓库。还需要为未来的胡萝卜丰收做好准备。\n\n食物和许多其他商品都存放在仓库中。"
zhTW = "最後，我們來為莓果準備儲藏室。同時也要為未來的胡蘿蔔收成做好準備。\n\n食物和許多其他物品一樣，存放在倉庫中。"
ruRU = "Наконец, давайте подготовим хранилище для ягод. Также стоит подготовиться к будущему урожаю моркови.\n\nЕда, как и многие другие товары, хранится на складах."
jaJP = "さあ、ベリーのための貯蔵庫を準備しましょう。また、将来の人参の収穫に備えることも重要です。\n                              \n食べ物は、他の多くの商品と同様に、倉庫に保管されます。"
frFR = "Enfin, préparons un entrepôt pour les baies. Il est également conseillé de se préparer à la future récolte de carottes.\n\nLa nourriture, comme beaucoup d'autres marchandises, est stockée dans des entrepôts."
deDE = "Endlich bereiten wir ein Lager für die Beeren vor. Es ist auch ratsam, sich auf die zukünftige Karottenernte vorzubereiten.\n\nEssen, wie viele andere Waren, wird in Lagern aufbewahrt."
plPL = "Nareszcie, przygotujmy magazyn na jagody. Warto także przygotować się na przyszłe zbiory marchewki.\n\nJedzenie, podobnie jak wiele innych towarów, przechowywane jest w magazynach."
ptBR = "Finalmente, vamos preparar um armazém para as frutas. Também é bom se preparar para a futura colheita de cenouras.\n\nA comida, assim como muitos outros produtos, é armazenada nos armazéns."
koKR = "마침내, 베리를 위한 저장소를 준비합시다. 또한 향후 당근 수확에 대비할 필요가 있습니다. \n음식은 많은 다른 상품들과 마찬가지로 창고에 보관됩니다."
csCZ = "Konečně si připravíme sklad pro bobule. Také je dobré se připravit na budoucí úrodu mrkve.\n\nJídlo, stejně jako mnohé další zboží, se skladuje ve skladech."
viVN = "Cuối cùng, hãy chuẩn bị một kho lưu trữ cho quả mọng. Cũng nên chuẩn bị cho vụ thu hoạch cà rốt sắp tới.\n\nThức ăn, giống như nhiều mặt hàng khác, được lưu trữ trong kho."

