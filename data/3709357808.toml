["Building.Thorns.Description"]
raw = "Непраходная перашкода, якая таксама блакуе арашэнне і забруджванне. Яе цяжка зносіць, а тым, хто паспрабуе, можа нанесці траўму."
status = "normal"
enUS = "Impassable obstacle that also blocks irrigation and pollution. It is difficult to carry, and those who try may be injured."
zhCN = "无法通过的障碍物，亦可阻止灌溉和污染。难以破坏，试图破坏它的人可能会受伤。"
zhTW = "不可通行的障礙物，同時也阻擋灌溉和污染。難以摧毀，並且對那些嘗試的人可能造成傷害。"
ruRU = "Непроходимое препятствие, которое также блокирует орошение и загрязнение. Его трудно сносить, а тем, кто попытается, может быть нанесен вред."
jaJP = "通行できない障害物で、灌漑や汚染もブロックします。耐久性があり、それを試みる者に怪我をさせる可能性があります。"
frFR = "Obstacle impénétrable qui bloque également l'irrigation et la pollution. Il est difficile à détruire, et ceux qui essaient peuvent subir des blessures."
deDE = "Ein unüberwindbares Hindernis, das auch Bewässerung und Verschmutzung blockiert. Es ist schwer zu überwinden und kann Verletzungen bei denen verursachen, die es versuchen."
plPL = "Nieprzechodnia przeszkoda, która blokuje nawadnianie i zanieczyszczenie. Jest trudna do zniszczenia, a tym, którzy spróbują, może wyrządzić krzywdę."
ptBR = "Obstáculo intransponível que também bloqueia a irrigação e a contaminação. É difícil de remover e pode causar ferimentos àqueles que tentarem."
koKR = "통과할 수 없는 장애물로, 관개와 오염을 차단합니다. 이 장애물은 제거하기 어렵고, 시도하는 이들에게는 부상을 입힐 수 있습니다."
csCZ = "Neprůchodná překážka, která také blokuje zavlažování a znečištění. Je těžké ji zničit a ti, kdo se o to pokusí, si mohou způsobit zranění."
viVN = "Rào cản không thể vượt qua, cũng chặn cả việc tưới tiêu và ô nhiễm. Nó khó để phá hủy, và có thể gây thương tích cho những ai cố gắng."
trTR = "Geçilemez bir engel, aynı zamanda sulama ve kirlenmeyi de bloke eder. Dayanılması zordur ve deneyenlere zarar verebilir."

