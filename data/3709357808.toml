["NaturalResource.Coffee.FlavorDescription"]
raw = "Старажытныя бабры жавалі зярняты дзеля прыліву энергіі, а Жалезныя зубы заварылі лепшую ідэю."
status = "normal"
enUS = "Ancient beavers chewed seeds for an energy boost, and the Iron Teeth brewed the best idea."
zhCN = "“古老的海狸咀嚼谷物以获取能量，而铁牙则发明了更好的点子。”"
zhTW = "古老的海狸咀嚼穀粒以獲取能量，而鐵齒煮出了最佳的點子。"
ruRU = "Древние бобры поглощали зерна для прилива энергии, а Железные зубы заварили лучшую идею."
jaJP = "古代のビーバーはエネルギーを高めるために豆を噛んでおり、アイアンテイルは最高のアイデアを醸造しました。"
frFR = "Les castors anciens mâchaient des grains pour un apport d'énergie, et les Dents de Fer ont infusé la meilleure idée."
deDE = "Uralte Biber kauften die Körner für einen Energieschub, während die Eisenzähne die beste Idee brauten."
plPL = "Starożytne bobry żuły ziarna dla przypływu energii, a Żelazne Zęby zaparzyły najlepszy pomysł."
ptBR = "Os antigos castores mastigavam grãos para um impulso de energia, e os Dentes de Ferro prepararam a melhor ideia."
koKR = "고대 비버들은 에너지를 위해 씨앗을 씹었고, 철의 이빨은 최고의 아이디어를 우려냈습니다."
csCZ = "Pradávní bobři jedli zrníčka pro nárůst energie a Železné zuby přišly s nejlepším nápadem."
viVN = "Các con hải ly cổ đại đã nhai hạt để tăng cường năng lượng, và những chiếc răng sắt đã pha chế một ý tưởng tuyệt vời."

