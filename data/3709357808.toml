["MapMetadata.Hollows.Description"]
raw = "Гэтыя шчодрыя западзіны — выдатнае месца для будучых пасяленцаў. Высечаны ландшафт хавае шмат магчымасцяў — старэйшыя бабры нават шэпчуць пра закапаныя скарбы."
status = "normal"
enUS = "These generous hollows are a great place for future settlers. The cleared landscape hides many opportunities - older beavers even whisper about buried treasures."
zhCN = "这些丰饶的山谷是未来定居者的绝佳地点。被砍伐的景观隐藏着许多可能性——年长的海狸甚至在低声谈论埋藏的宝藏。"
zhTW = "這些豐滿的凹地是未來定居者的理想之地。被砍伐的地形隱藏著許多機會——年長的海狸甚至在低語著埋藏的寶藏。"
ruRU = "Эти щедрые впадины — отличное место для будущих поселенцев. Высеченный ландшафт скрывает множество возможностей — старшие бобры даже шепчут о захороненных сокровищах."
jaJP = "これらの豊かな凹地は、将来の入植者にとって素晴らしい場所です。切り開かれた風景は多くの可能性を秘めており、年長のビーバーたちは埋もれた宝物についてささやいています。"
frFR = "Ces généreuses dépressions sont un excellent endroit pour de futurs colons. Le paysage défriché cache de nombreuses possibilités - les castors plus âgés murmurent même des trésors enfouis."
deDE = "Diese großzügigen Senken sind ein hervorragender Ort für zukünftige Siedler. Die geschlagene Landschaft birgt viele Möglichkeiten – ältere Biber flüstern sogar von vergrabenen Schätzen."
plPL = "Te obfite zagłębienia to doskonałe miejsce dla przyszłych osadników. Wylesiony krajobraz skrywa wiele możliwości — starsze bobry nawet szeptają o zakopanych skarbach."
ptBR = "Essas generosas depressões são um ótimo lugar para futuros colonos. A paisagem desmatada esconde muitas oportunidades — até mesmo os castores mais velhos sussurram sobre tesouros enterrados."
koKR = "이 관대한 계곡들은 미래의 정착민들에게 훌륭한 장소입니다. 잘려진 지형은 많은 가능성을 숨기고 있으며, 나이 많은 비버들은 심지어 묻힌 보물에 대해 속삭이기도 합니다."
csCZ = "Tato štědrá údolí jsou skvělým místem pro budoucí osadníky. Vypreparované krajiny skrývají mnoho možností — starší bobři dokonce šuškají o zakopaných pokladech."
viVN = "Những thung lũng hào phóng này là một nơi tuyệt vời cho những người dân định cư trong tương lai. Cảnh quan bị chặt chẽ ẩn chứa nhiều cơ hội - những chú beaver lớn hơn thậm chí còn thì thầm về những kho báu bị chôn vùi."

