deDE = "\"Ich bin ein Holzfäller, und so ist es: Nachts schlafe ich, und tagsüber arbeite ich!\" — ein beliebtes Biberlied"
plPL = "\"Jestem bobrem i tak to jest: śpię w nocy, a w ciągu dnia pracuję!\" — popularna piosenka bobrów"
ptBR = "\"Eu sou um lenhador, e é assim: eu durmo à noite e durante o dia eu trabalho!\" — uma canção popular dos castores"
koKR = "\"나는 나무꾼이다, 그리고 이건 그렇다: 나는 밤에 자고 낮에는 일을 한다!\" — 인기 있는 비버 노래"
csCZ = "\"Jsem dřevorubec a je to tak: v noci spím a přes den se flákám!\" — populární písnička bobra"
viVN = "\"Tôi là một người chặt củi, và đây là điều: tôi ngủ vào ban đêm, còn ban ngày thì làm việc!\" — một bài hát nổi tiếng của loài hải ly."
