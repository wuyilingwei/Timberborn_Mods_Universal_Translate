["Tutorial.Wood.ConnectLumberjacks"]
raw = "Кожны будынак з уваходам павінен быць злучаны з Цэнтрам раёна дарогай. Калі вы выбіраеце будынак, яго ўваход пазначаецца стрэлкай.\n                                  \nПабудуйце дарогі, каб злучыць сцягі дрывасекаў з Цэнтрам раёна."
status = "normal"
enUS = "Every building with an entrance must be connected to the District Center by a road. When you select a building, its entrance is marked with an arrow.\n\nBuild roads to connect the lumberjack flags to the District Center."
zhCN = "每个带入口的建筑必须通过道路与区域中心连接。当你选择建筑时，它的入口会用箭头标记。\n\n建造道路，将伐木工的旗帜与区域中心连接起来。"
zhTW = "每個有進口的建築必須通過道路與區域中心相連。當你選擇建築時，其進口會用箭頭標示。\n\n修建道路以將伐木工的旗幟與區域中心連接起來。"
ruRU = "Каждое здание с входом должно быть связано с Центром района дорогой. Когда вы выбираете здание, его вход обозначается стрелкой.\n                                  \nПостройте дороги, чтобы соединить знамёна лесорубов с Центром района."
jaJP = "すべての建物には入口があり、地区センターと道路でつながっている必要があります。建物を選択すると、その入口が矢印で示されます。\n\n道を建設して、木こりの旗を地区センターに接続します。"
frFR = "Chaque bâtiment avec une entrée doit être relié au Centre de district par une route. Lorsque vous sélectionnez un bâtiment, son entrée est marquée par une flèche.\n                                  \nConstruisez des routes pour relier les drapeaux des bûcherons au Centre de district."
deDE = "Jedes Gebäude mit einem Eingang muss mit dem Zentrum des Bezirks durch eine Straße verbunden sein. Wenn Sie ein Gebäude auswählen, wird sein Eingang durch einen Pfeil angezeigt.\n\nBauen Sie Straßen, um die Holzernteflaggen mit dem Zentrum des Bezirks zu verbinden."
plPL = "Każdy budynek z wejściem musi być połączony z Centrum regionu drogą. Kiedy wybierasz budynek, jego wejście jest oznaczone strzałką.\n\nZbuduj drogi, aby połączyć flagi drwali z Centrum regionu."
ptBR = "Cada edifício com entrada deve estar conectado ao Centro da área por uma estrada. Quando você seleciona um edifício, sua entrada é marcada por uma seta.\n\nConstrua estradas para conectar as bandeiras dos madeireiros ao Centro da área."
koKR = "모든 입구가 있는 건물은 도로를 통해 지역 센터와 연결되어야 합니다. 건물을 선택하면 그 입구에 화살표가 표시됩니다.\n\n도로를 건설하여 벌목기의 기지를 지역 센터와 연결하세요."
csCZ = "Každá budova s vchodem musí být propojena s Centrem oblasti cestou. Když vyberete budovu, její vchod je označen šipkou.\n\nPostavte cesty, abyste spojili vlajky dřevorubců s Centrem oblasti."
viVN = "Mỗi tòa nhà có lối vào phải được kết nối với Trung tâm khu vực qua một con đường. Khi bạn chọn một tòa nhà, lối vào của nó được đánh dấu bằng mũi tên.\n\nXây dựng các con đường để kết nối cờ của những người khai thác gỗ với Trung tâm khu vực."

["Tutorial.Wood.FinishLumberjacks"]
raw = "Сцягі не будуць пабудаваныя, калі яны знаходзяцца па-за межамі будаўнічага радыусу раёна.\n                                 \nВыберыце Цэнтр раёна, каб убачыць яго будаўнічы радыус. Вы можаце пашырыць яго, злучыўшы дарогі з уваходам у Цэнтр раёна."
status = "normal"
enUS = "Flags will not be built if they are outside the construction radius of the district.\n                                 \nSelect the District Center to see its construction radius. You can expand it by connecting roads to the entrance of the District Center."
zhCN = "旗帜无法在建筑区域外建立。\n\n选择区域中心以查看其建筑半径。您可以通过将道路连接到区域中心的入口来扩展它。"
zhTW = "旗幟無法建立，當它們位於區域建築範圍之外。\n\n選擇區域中心以查看其建築範圍。您可以通過將道路連接到區域中心的入口來擴展它。"
ruRU = "Строения не будут построены, если они находятся за пределами строительного радиуса района.\n\nВыберите Центр района, чтобы увидеть его строительный радиус. Вы можете расширить его, соединяя дороги с входом в Центр района."
jaJP = "旗は地区の建設半径の外にある場合、建設されません。\n\n地区センターを選択して、その建設半径を見ることができます。道路を地区センターの入り口に接続することで、半径を拡張できます。"
frFR = "Les drapeaux ne seront pas construits s'ils se trouvent en dehors du rayon de construction du quartier.\n\nSélectionnez le Centre du quartier pour voir son rayon de construction. Vous pouvez l'élargir en reliant des routes à l'entrée du Centre du quartier."
deDE = "Flaggen können nicht gebaut werden, wenn sie sich außerhalb des Bau radius des Gebiets befinden.\n\nWählen Sie das Zentrum des Gebiets, um seinen Bauraum zu sehen. Sie können ihn erweitern, indem Sie Straßen mit dem Eingang zum Zentrum des Gebiets verbinden."
plPL = "Flagi nie będą budowane, jeśli znajdują się poza zasięgiem budowlanym obszaru.\n\nWybierz Centrum obszaru, aby zobaczyć jego zasięg budowlany. Możesz go rozszerzyć, łącząc drogi z wejściem do Centrum obszaru."
ptBR = "As bandeiras não poderão ser construídas se estiverem fora do alcance de construção da área.\n\nSelecione o Centro da área para ver seu alcance de construção. Você pode ampliá-lo conectando estradas à entrada do Centro da área."
koKR = "깃발은 지역 건설 범위를 벗어났을 때 지어지지 않습니다.\n\n지역 센터를 선택하여 건설 범위를 확인하세요. 도로를 지역 센터 입구와 연결하여 범위를 확장할 수 있습니다."
csCZ = "Vlajky nebudou postavené, pokud se nacházejí mimo stavební radius oblasti.\n\nVyberte Centrum oblasti, abyste viděli jeho stavební radius. Můžete jej rozšířit spojením cest s vchodem do Centra oblasti."
viVN = "Cờ sẽ không được xây dựng nếu chúng nằm ngoài phạm vi xây dựng của khu vực.\n\nHãy chọn Trung tâm khu vực để xem phạm vi xây dựng của nó. Bạn có thể mở rộng nó bằng cách kết nối các con đường với lối vào Trung tâm khu vực."

["Tutorial.Wood.MarkTrees"]
raw = "Дрывасекі сякуць дрэвы толькі на тых участках, якія вы адзначылі пад высечку.\n                         \nДрэвы павінны знаходзіцца ў радыусе сцяга дрывасека. Выберыце сцяг, каб убачыць яго радыус.\n                         \nВыкарыстайце цяпер інструмент «Адзначыць зону высечкі дрэў». Утрымлівайце кнопку мышы, каб выбраць некалькі клетак адразу."
status = "normal"
enUS = "Loggers will cut trees only in the areas you marked for logging.\n\nTrees must be within the logger's flag radius. Select the flag to see its radius.\n\nNow use the 'Mark Tree Cutting Area' tool. Hold the mouse button to select multiple cells at once."
zhCN = "树木工人只会在您标记为砍伐的区域内砍伐树木。\n\n树木必须在树木工人的旗帜半径内。选择旗帜以查看其半径。\n\n现在使用“标记树木砍伐区域”工具。按住鼠标按钮可以同时选择多个单元格。"
zhTW = "伐木工只會在您標示的砍伐區域內砍伐樹木。\n\n樹木必須在伐木工的旗幟半徑內。選擇旗幟以查看其半徑。\n\n現在使用“標記樹木砍伐區域”工具。按住滑鼠按鈕以一次選擇多個格子。"
ruRU = "Бревносеки рубят деревья только на тех участках, которые вы отметили под вырубку.\n\nДеревья должны находиться в радиусе флага бревносеков. Выберите флаг, чтобы увидеть его радиус.\n\nИспользуйте теперь инструмент «Отметить зону вырубки деревьев». Удерживайте кнопку мыши, чтобы выбрать несколько клеток сразу."
jaJP = "「木こりは、伐採のためにマークしたエリアの木だけを切り倒します。\n\n木は、木こりの旗の半径内にある必要があります。旗を選択して、その半径を確認してください。\n\n今、「木の伐採エリアをマークする」ツールを使用してください。マウスボタンを押し続けて、複数のセルを一度に選択します。」"
frFR = "Les bûcherons ne couperont des arbres que dans les zones que vous avez marquées pour abattage.\n                         \nLes arbres doivent être situés dans le rayon du drapeau du bûcheron. Sélectionnez le drapeau pour voir son rayon.\n                         \nUtilisez maintenant l'outil « Marquer la zone d'abattage des arbres ». Maintenez le bouton de la souris enfoncé pour sélectionner plusieurs cellules à la fois."
deDE = "Die Holzernter fällen Bäume nur auf den Flächen, die Sie zur Fällung markiert haben.\n\nDie Bäume müssen sich im Radius der Fahne des Holzernters befinden. Wählen Sie die Fahne aus, um ihren Radius zu sehen.\n\nNutzen Sie jetzt das Werkzeug 'Fällzone markieren'. Halten Sie die Maustaste gedrückt, um mehrere Zellen gleichzeitig auszuwählen."
plPL = "Drwalsi wycinają drzewa tylko w tych obszarach, które zaznaczyłeś do wycinki.\n\nDrzewa muszą znajdować się w zasięgu flagi drwala. Wybierz flagę, aby zobaczyć jej zasięg.\n\nUżyj teraz narzędzia 'Zaznacz obszar wycinki drzew'. Przytrzymaj przycisk myszy, aby zaznaczyć kilka komórek jednocześnie."
ptBR = "As dervas somente serão cortadas nas áreas que você marcou para a derrubada.                       \n\nAs árvores devem estar dentro do raio da bandeira do cortador. Selecione a bandeira para ver seu raio.                       \n\nAgora use a ferramenta 'Marcar área de corte de árvores'. Mantenha pressionado o botão do mouse para selecionar várias células ao mesmo tempo."
koKR = "벌목자는 잘라낼 지역으로 표시한 구역에서만 나무를 자릅니다.\n                         \n나무는 벌목기의 깃발 범위 내에 있어야 합니다. 깃발을 선택하여 범위를 확인하세요.\n                         \n이제 '나무 벌목 지역 표시' 도구를 사용하세요. 마우스 버튼을 누르고 여러 셀을 동시에 선택하세요."
csCZ = "Klávesové jméno: Tutorial.Wood.MarkTrees - Nový text k překladu: „Dřevorubci kácí stromy pouze na těch místech, které jste označili k pokácení.\n\nStromy musí být v dosahu vlajky dřevorubce. Vyberte vlajku, abyste viděli její dosah.\n\nNyní použijte nástroj „Označit oblast kácení stromů“. Držte tlačítko myši, abyste vybrali několik buněk najednou.“"
viVN = "Các thợ chặt cây sẽ chỉ chặt cây ở những khu vực mà bạn đã đánh dấu để khai thác.\n\nCây phải nằm trong phạm vi của cột cờ thợ chặt. Chọn cột cờ để xem phạm vi của nó.\n\nBây giờ hãy sử dụng công cụ 'Đánh dấu khu vực chặt cây'. Giữ chuột để chọn nhiều ô cùng lúc."

["Tutorial.Wood.PlaceLumberjacks"]
raw = "Кожнаму баброваму паселішчу патрэбныя бярвёны, і вельмі шмат. Толькі дрывасекі сякуць дрэвы.\n                                \nПабудуйце сцягі дрывасекаў побач з блізкімі дрэвамі."
status = "normal"
enUS = "Every beaver settlement needs logs, and a lot of them. Only lumberjacks cut down trees.\n\nBuild lumberjack flags near nearby trees."
zhCN = "每个海狸村庄都需要很多木材，只有伐木工才能砍伐树木。\n\n在靠近树木的地方建造伐木工的旗帜。"
zhTW = "“每個海狸聚落都需要大量的原木。只有樵夫才能砍伐樹木。\n\n在靠近樹木的地方建造樵夫的工作場所。”"
ruRU = "Каждой бобровой колонии нужны бревна, и очень много. Только лесорубы рубят деревья.\n\nПостройте флаги лесорубов рядом с близлежащими деревьями."
jaJP = "すべてのビーバーの集落には薪が必要で、その量は非常に多いです。木こりだけが木を切り倒します。\n\n近くの木のそばに木こりの旗を建てましょう。"
frFR = "Chaque colonie de castors a besoin de rondins, et beaucoup. Seules les bûcherons abattent des arbres.\n\nConstruisez des drapeaux de bûcherons près des arbres proches."
deDE = "Jede Bieber-Siedlung braucht Holz, und zwar viel davon. Nur Holzfäller fällen Bäume.\n\nBaut die Holzfäller-Flaggen in der Nähe der nächsten Bäume."
plPL = "Każdej osadzie bobrzej potrzebne są kłody, i to w dużej ilości. Tylko drwale ścinają drzewa.\n\nZbuduj flagi drwali obok pobliskich drzew."
ptBR = "Cada colônia de castores precisa de toras, e muitas delas. Apenas os lenhadores cortam as árvores.\n\nConstrua bandeiras de lenhadores perto das árvores próximas."
koKR = "모든 비버 거주지는 목재가 필요하고, 매우 많이 필요합니다. 오직 벌목꾼만이 나무를 베어냅니다.\n                                \n가까운 나무 옆에 벌목꾼의 기지를 세우세요."
csCZ = "Každé bobří osídlení potřebuje klády, a to hodně. Jen dřevorubci kácí stromy.\n\nPostavte tábory dřevorubců blízko okolních stromů."
viVN = "Mỗi khu định cư của bạn cần gỗ, và rất nhiều. Chỉ có những người cắt gỗ mới chặt cây.\n\nHãy xây dựng nhà cắt gỗ gần những cây gần nhất."

