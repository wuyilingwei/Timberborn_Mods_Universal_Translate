["MapMetadata.HelixMountain.Description"]
raw = "Хоць яны лічаць форму рэчышча непрактычнай, бабры прызнаюць абмежаваныя навыкі чалавецтва ў водным будаўніцтве."
status = "normal"
enUS = "Although they deem the shape of the riverbed impractical, beavers acknowledge humanity's limited skills in water construction."
zhCN = "虽然他们认为河道的形状不实用，但海狸承认人类在水上建筑方面的能力有限。"
zhTW = "儘管他們認為河道的形狀不切實際，但海狸們承認人類在水上建設方面的有限技能。"
ruRU = "Хотя они считают форму русла непрактичной, бобры признают ограниченные навыки человечества в водном строительстве."
jaJP = "「彼らは川の形が非実用的だと考えているが、ビーバーは水の建設における人類の限られたスキルを認めている。」"
frFR = "Bien qu'ils considèrent la forme du ruisseau comme impraticable, les castors reconnaissent les compétences limitées de l'humanité en matière de construction aquatique."
deDE = "Obwohl sie die Form des Flussbettes als unpraktisch erachten, erkennen die Biber die begrenzten Fähigkeiten der Menschheit im Wasserbau an."
plPL = "Choć uważają kształt rzeki za niepraktyczny, bobry uznają ograniczone umiejętności ludzkości w budownictwie wodnym."
ptBR = "Embora considerem a forma do leito do rio impraticável, os castores reconhecem as habilidades limitadas da humanidade na construção hídrica."
koKR = "그들은 수로의 형태가 비현실적이라고 생각하지만, 비버들은 수자원 건설에 있어 인류의 제한된 능력을 인정합니다."
csCZ = "Vzhledem k tomu, že považují tvar koryta za nepraktický, bobři uznávají omezené dovednosti lidstva ve vodním stavitelství."
viVN = "Ngay cả khi họ cho rằng hình dạng lòng sông là không thực tế, loài beaver thừa nhận những kỹ năng hạn chế của nhân loại trong xây dựng thủy công."

