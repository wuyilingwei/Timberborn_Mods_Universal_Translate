["MapSelection.SemiCompatibleMapVersion"]
raw = "Гэтая версія карты ({0}) несумяшчальная з бягучай версіяй гульні ({1}). Запуск гульні на гэтай карце можа прывесці да збою, вы можаце сутыкнуцца з памылкамі, якія ламаюць гульню, а некаторыя важныя новыя рэсурсы могуць адсутнічаць. Мы настойліва рэкамендуем абнавіць карту, каб у поўнай меры карыстацца новымі магчымасцямі. \n\nВы ўпэўнены, што хочаце пачаць гульню?"
status = "normal"
enUS = "This map version ({0}) is incompatible with the current game version ({1}). Running the game on this map may lead to crashes, you may encounter game-breaking bugs, and some important new resources may be missing. We strongly recommend updating the map to fully utilize the new features.\n\nAre you sure you want to start the game?"
zhCN = "“此地图版本（{0}）与当前游戏版本（{1}）不兼容。在此地图上启动游戏可能会导致崩溃，您可能会遇到破坏游戏的错误，并且某些重要的新资源可能会缺失。我们强烈建议您更新地图，以充分利用新功能。\n\n您确定要开始游戏吗？”"
zhTW = "此地圖版本 ({0}) 與當前遊戲版本 ({1}) 不相容。在此地圖上啟動遊戲可能會導致崩潰，您可能會遇到破壞遊戲的錯誤，並且一些重要的新資源可能會缺失。我們強烈建議您更新地圖，以充分利用新功能。\n\n您確定要開始遊戲嗎？"
ruRU = "Эта версия карты ({0}) несовместима с текущей версией игры ({1}). Запуск игры на этой карте может привести к сбоям, вы можете столкнуться с ошибками, которые ломают игру, а некоторые важные новые ресурсы могут отсутствовать. Мы настоятельно рекомендуем обновить карту, чтобы в полной мере воспользоваться новыми возможностями.\n\nВы уверены, что хотите начать игру?"
jaJP = "このマップのバージョン（{0}）は現在のゲームバージョン（{1}）と互換性がありません。このマップでゲームを開始すると、クラッシュする可能性があり、ゲームを壊すエラーに直面することがあるほか、一部の重要な新しいリソースが欠如する場合があります。新しい機能を最大限に活用するために、マップを更新することを強くお勧めします。\n\nゲームを開始してもよろしいですか？"
frFR = "Cette version de la carte ({0}) n'est pas compatible avec la version actuelle du jeu ({1}). Lancer le jeu sur cette carte peut entraîner un plantage, vous pourriez rencontrer des erreurs qui brisent le jeu, et certaines nouvelles ressources importantes peuvent être absentes. Nous vous recommandons fortement de mettre à jour la carte pour profiter pleinement des nouvelles fonctionnalités.\n\nÊtes-vous sûr de vouloir commencer le jeu ?"
deDE = "Diese Kartenversion ({0}) ist nicht kompatibel mit der aktuellen Version des Spiels ({1}). Das Spielen auf dieser Karte kann zu Abstürzen führen, Sie könnten auf spielbrechende Fehler stoßen, und einige wichtige neue Ressourcen könnten fehlen. Wir empfehlen dringend, die Karte zu aktualisieren, um die neuen Möglichkeiten in vollem Umfang nutzen zu können.\n\nSind Sie sicher, dass Sie das Spiel starten möchten?"
plPL = "Ta wersja mapy ({0}) jest niekompatybilna z bieżącą wersją gry ({1}). Uruchomienie gry na tej mapie może prowadzić do awarii, mogą wystąpić błędy blokujące rozgrywkę, a niektóre ważne nowe zasoby mogą być niedostępne. Zdecydowanie zalecamy zaktualizowanie mapy, aby w pełni korzystać z nowych możliwości.\n\nCzy na pewno chcesz rozpocząć grę?"
ptBR = "Esta versão do mapa ({0}) é incompatível com a versão atual do jogo ({1}). Iniciar o jogo neste mapa pode causar falhas, você pode encontrar erros que podem quebrar o jogo e alguns recursos novos importantes podem estar ausentes. Recomendamos fortemente que você atualize o mapa para aproveitar ao máximo as novas funcionalidades.\n\nVocê tem certeza de que deseja iniciar o jogo?"
koKR = "이 맵 버전({0})은 현재 게임 버전({1})과 호환되지 않습니다. 이 맵에서 게임을 실행하면 충돌이 발생할 수 있으며, 게임이 깨지는 오류가 발생할 수 있고 일부 중요한 새로운 자원이 누락될 수 있습니다. 새로운 기능을 최대한 활용하려면 맵을 업데이트하는 것이 좋습니다.\n\n정말로 게임을 시작하시겠습니까?"
csCZ = "Tato verze mapy ({0}) není kompatibilní s aktuální verzí hry ({1}). Spuštění hry na této mapě může vést k pádu, můžete narazit na chyby, které narušují hru, a některé důležité nové zdroje mohou chybět. Důrazně doporučujeme aktualizovat mapu, abyste plně využili nové možnosti.\n\nJste si jisti, že chcete začít hru?"
viVN = "Bản đồ này ({0}) không tương thích với phiên bản hiện tại của trò chơi ({1}). Việc khởi động trò chơi trên bản đồ này có thể dẫn đến sự cố, bạn có thể gặp phải các lỗi nghiêm trọng, và một số tài nguyên mới quan trọng có thể thiếu. Chúng tôi khuyên bạn nên cập nhật bản đồ để tận dụng tối đa các tính năng mới. \n\nBạn có chắc chắn muốn bắt đầu trò chơi không?"

