["NewGameConfigurationPanel.NormalModeDescription"]
raw = "Вы хочаце выпрабаванняў.\n\nВаша паселішча пачынае гульню з умеранымі запасамі рэсурсаў.\n\nСпачатку засухі і дрэннаплыні мяккія, але з часам становяцца ўсё больш жорсткімі."
status = "normal"
enUS = "You seek challenges.\n\nYour settlement begins the game with moderate resource supplies.\n\nInitially, droughts and bad floods are mild, but over time they become increasingly harsh."
zhCN = "您想要挑战。\n\n您的定居点以适中的资源储备开始游戏。\n\n最初的干旱和不良流动是温和的，但随着时间的推移，变得越来越严酷。"
zhTW = "您想要挑戰。  \n  \n您的聚落在遊戲開始時擁有適度的資源儲備。  \n  \n一開始，乾旱和壞潮是溫和的，但隨著時間推移變得越來越嚴酷。"
ruRU = "Вы хотите испытаний.\n\nВаше поселение начинает игру с умеренными запасами ресурсов.\n\nСначала засухи и ненастья мягкие, но со временем становятся все более жесткими."
jaJP = "あなたは挑戦を望んでいます。\n\nあなたの集落は、適度な資源の備蓄でゲームを開始します。\n\n最初は干ばつと悪天候は穏やかですが、時間が経つにつれてますます厳しくなります。"
frFR = "Vous voulez des défis.\n\nVotre colonie commence le jeu avec des ressources modérées.\n\nAu début, les sécheresses et les inondations sont douces, mais au fil du temps, elles deviennent de plus en plus sévères."
deDE = "Sie wünschen Herausforderungen.\n\nIhre Siedlung beginnt das Spiel mit moderaten Ressourcenbeständen.\n\nZu Beginn sind Dürre und Niedrigwasser sanft, aber mit der Zeit werden sie immer strenger."
plPL = "Chcesz wyzwań.\n\nTwoja osada zaczyna grę z umiarkowanymi zapasami surowców.\n\nNa początku susze i złe przepływy są łagodne, ale z czasem stają się coraz bardziej brutalne."
ptBR = "Você deseja desafios.\n\nSua colônia começa o jogo com suprimentos moderados de recursos.\n\nNo início, as secas e as enchentes são suaves, mas com o tempo se tornam cada vez mais rigorosas."
koKR = "당신은 도전을 원합니다.\n\n당신의 정착지는 보통 자원으로 시작합니다.\n\n처음에는 가뭄과 혹사기가 부드럽지만 시간이 지날수록 점점 더 엄격해집니다."
csCZ = "Chcete výzvy.\n\nVaše osídlení začíná hru s umírněnými zásobami zdrojů.\n\nZpočátku jsou sucha a špatné proudy mírné, ale časem se stávají stále tvrdšími."
viVN = "Bạn muốn thử thách.\n\nKhu định cư của bạn bắt đầu trò chơi với nguồn tài nguyên vừa phải.\n\nBan đầu, hạn hán và lũ lụt nhẹ nhàng, nhưng theo thời gian trở nên ngày càng khắc nghiệt."

