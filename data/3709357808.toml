["Tutorial.MoreBeavers.GrowPopulation"]
raw = "Бабры не размнажаюцца, пакуль няма свабодных жылых месцаў. Народным хвастам патрэбныя два дарослыя і пустое месца, каб адбылася магія.\n                                              \nПарада: дзіцяняты баброў называюцца бабранятамі."
status = "normal"
enUS = "Beavers do not reproduce while there are no free living spaces. A pair of adults and an empty space are needed for the magic to happen.\n\nTip: Baby beavers are called kits."
zhCN = "海狸在没有空闲居住空间时不会繁殖。一个雄性和一个雌性需要两个成年海狸和一个空位才能发生繁殖魔法。\n                                               \n提示：海狸幼崽被称为小海狸。"
zhTW = "海狸不會繁殖，直到有空的住房。雌性海狸需要兩隻成年海狸和一個空位，才能發生奇蹟。\n\n提示：小海狸被稱為小海狸。"
ruRU = "Бобры не размножаются, пока нет свободных жилых мест. Народному хвосту нужны два взрослых и пустое место, чтобы произошла магия.\n\nСовет: детёныши бобров называются бобренком."
jaJP = "ビーバーは空き住居がない限り繁殖しません。繁殖には二匹の大人と空きスペースが必要です。\n\nヒント：ビーバーの子供はビーバーの子と呼ばれます。"
frFR = "Les castors ne se reproduisent pas tant qu'il n'y a pas de logements libres. Une portée nécessite deux adultes et un espace vide pour que la magie opère.\n\nConseil : les petits castors s'appellent des castorets."
deDE = "Biber vermehren sich nicht, solange es keine freien Wohnplätze gibt. Ein Biberpaar benötigt zwei Erwachsene und einen freien Platz, damit die Magie geschehen kann.\n\nTipp: Biberbabys werden Biberlein genannt."
plPL = "Bobry nie rozmnażają się, gdy nie ma wolnych miejsc do życia. Ludzkim ogonkom potrzebne są dwa dorosłe i puste miejsce, aby magia mogła się wydarzyć.\n\nPorada: małe bobry nazywają się bobrzątami."
ptBR = "Os castores não se reproduzem enquanto não houver espaços residenciais livres. Um casal precisa de dois adultos e um espaço vazio para que a mágica aconteça.\n\nDica: os filhotes de castor são chamados de 'castorzinhos'."
koKR = "비버는 빈 거주지가 없으면 번식하지 않습니다. 두 명의 성인과 빈 공간이 있어야 마법이 일어납니다. \n\n팁: 비버의 새끼는 비버새끼라고 불립니다."
csCZ = "Bobři se nezačnou rozmnožovat, dokud neexistují volná obytná místa. K tomu, aby se narodilo mládě, potřebují dva dospělé bobry a volné místo, aby se stalo kouzlo.\n\nRada: Mláďata bobrů se nazývají bobříčci."
viVN = "Beaver không sinh sản khi không còn chỗ ở trống. Một cặp beaver cần hai con trưởng thành và một chỗ trống để phép màu xảy ra.\n\nMẹo: con non của beaver được gọi là kit."

