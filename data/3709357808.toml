koKR = "비버들은 이 식물을 재배하여 뜨거운 태양에게 여기서 누가 주인인지 보여줍니다."
csCZ = "Bobři pěstují tyto rostliny, aby ukázali pálivému slunci, kdo je tady pán."
viVN = "Những con hải ly trồng những cây này để chỉ cho mặt trời nóng bỏng biết ai mới là chủ nhân ở đây."

