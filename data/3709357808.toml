["Building.Roof.FlavorDescription"]
raw = "Часам дастаткова проста больш шыкоўнага даху, каб распаліць прыязнае суседскае саперніцтва."
status = "normal"
enUS = "Sometimes, a more luxurious roof is all it takes to spark friendly neighborhood rivalry."
zhCN = "“有时候，只需一个更华丽的屋顶，就能点燃友好的邻里竞争。”"
zhTW = "有時，一個更豪華的屋頂就足以激發友好的鄰里競爭。"
ruRU = "Иногда достаточно просто более шиковой крыши, чтобы разжечь дружеское соседское соперничество."
jaJP = "「時には、より豪華な屋根だけで、友好的な隣人間の競争を引き起こすことができる。」"
frFR = "Parfois, il suffit d'un toit plus élégant pour susciter une saine compétition entre voisins."
deDE = "Manchmal reicht ein einfach schickerer Dach, um freundschaftliche Nachbarschaftsduelle zu entfachen."
plPL = "Czasami wystarczy po prostu bardziej okazały dach, aby wzniecić przyjazną sąsiedzką rywalizację."
ptBR = "Às vezes, é o suficiente ter apenas um telhado mais elegante para acender uma amistosa rivalidade entre vizinhos."
koKR = "때때로 더 화려한 지붕이 이웃 간의 우호적인 경쟁을 불러일으키기에 충분합니다."
csCZ = "Někdy stačí jen trochu nádhernější střecha, aby vzbudila přátelskou sousedskou rivalitu."
viVN = "Đôi khi chỉ cần một mái nhà sang trọng hơn để kích thích sự cạnh tranh thân thiện giữa các hàng xóm."
trTR = "Bazen daha şatafatlı bir çatı, komşular arasında dostane bir rekabeti ateşlemek için yeterlidir."

