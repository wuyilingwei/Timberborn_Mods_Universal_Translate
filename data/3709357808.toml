jaJP = "「悪くない時だけど、まだ尾ひれの打撃に取り組む必要がある！」— ピナ"
frFR = "«Ce n'est pas le meilleur moment, mais nous devons encore travailler sur notre coup de queue !» — Pina"
deDE = "„«Es ist keine tolle Zeit, aber wir müssen noch an unserem Schwanzschlag arbeiten!» — Pina“"
plPL = "„„Nie najgorszy czas, ale wciąż musimy popracować nad uderzeniem ogonem!” — Pina“"
ptBR = "«Não é um bom momento, mas ainda precisamos trabalhar na batida da cauda!» — Pina"
koKR = "«좋지 않은 시기지만, 우리는 아직도 꼬리칠 연습을 해야 해!» — 피나"
csCZ = "„Není to snadné, ale musíme ještě zapracovat na štěstí!“ – Pína"
viVN = "«Thời gian không tệ, nhưng chúng ta vẫn cần phải làm việc để đập đuôi!» — Pina"
trTR = "«Kötü bir zaman ama hâlâ kuyrukla vurmaya çalışmamız gerekiyor!» — Pina"

