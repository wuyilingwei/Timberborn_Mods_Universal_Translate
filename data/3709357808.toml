plPL = "„O, wygląda na to, że budujemy schody w chmury. To sprawia, że się zastanawiam...” — Pina"
ptBR = "«Oh, parece que estamos construindo uma escada para as nuvens. Isso me faz pensar...» — Pina"
koKR = "«오, 마치 우리는 구름 속에 사다리를 세우고 있는 것 같아. 이건 나를 생각에 잠기게 해...» — 피나"
csCZ = "„Ó, zdá se, že stavíme schody do oblak. To mě přivádí k zamyšlení…“ — Pina"
viVN = "«Ôi, giống như chúng ta đang xây dựng một cái thang lên mây. Điều này khiến tôi suy nghĩ...» — Pina"
