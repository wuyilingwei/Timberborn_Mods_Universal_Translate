["NaturalResource.Carrot.FlavorDescription"]
raw = "Сырая морква дапамагае бабрам падтрымліваць збалансаваны рацыён, не адмаўляючыся ад радасці хрумстаць."
status = "normal"
enUS = "Raw carrots help beavers maintain a balanced diet without giving up the joy of crunching."
zhCN = "生胡萝卜帮助海狸维持均衡饮食，同时享受咀嚼的乐趣。"
zhTW = "生胡蘿蔔有助於海狸保持均衡的飲食，並不拒絕享受咀嚼的樂趣。"
ruRU = "Сырая морковь помогает бобрам поддерживать сбалансированный рацион, не отказываясь от радости хрустеть."
jaJP = "生のニンジンはビーバーがバランスの取れた食事を維持するのに役立ち、かりっとする喜びをあきらめることはありません。"
frFR = "Les carottes crues aident les castors à maintenir un régime équilibré tout en ne renonçant pas au plaisir de croquer."
deDE = "Rohe Karotten helfen den Bibern, eine ausgewogene Ernährung aufrechtzuerhalten, ohne auf das Vergnügen des Knackens zu verzichten."
plPL = "Surowa marchew pomaga bobrom utrzymać zrównoważoną dietę, nie rezygnując z radości chrupania."
ptBR = "A cenoura crua ajuda os castores a manter uma dieta equilibrada, sem abrir mão da alegria de crocitar."
koKR = "생당근은 비버들이 균형 잡힌 식단을 유지하는 데 도움을 주며 아삭아삭한 즐거움을 포기하지 않도록 합니다."
csCZ = "Surová mrkev pomáhá bobrům udržovat vyváženou stravu, aniž by se vzdávali radosti křučení."
viVN = "Cà rốt tươi giúp những chú beaver duy trì khẩu phần ăn cân bằng mà không từ chối niềm vui của việc nhai."

