["Building.Ruins.FlavorDescription"]
raw = "Раскіданыя па ўсёй зямлі занядбаныя чалавечыя руіны далі бабрам неймавернае — рэсурс, лепшы за дрэва."
status = "normal"
enUS = "Scattered across the land, the neglected remnants of humanity provide beavers with an incredible resource, better than wood."
zhCN = "遍布大地的荒废人类遗迹给予了海狸难以置信的资源，比木材更优秀。"
zhTW = "散落在大地上的被遺棄的人類遺跡給了海狸們無與倫比的資源，這資源比木材更好。"
ruRU = "Разбросанные по всей земле заброшенные человеческие руины дали бобрам неимоверный ресурс, лучший чем дерево."
jaJP = "地面に散らばった人間の荒廃した遺跡はビーバーにとって信じられない資源をもたらしました。それは木材よりも優れています。"
frFR = "Dispersées à travers le pays, les ruines humaines abandonnées ont offert aux castors une ressource incroyable, meilleure que le bois."
deDE = "Überall auf der Erde verstreute verlassene menschliche Ruinen haben den Bibern unglaubliche Ressourcen gegeben, besser als Holz."
plPL = "Rozsypane po całej ziemi zaniedbane ludzkie ruiny dały bobrom niesamowity — zasób, lepszy niż drewno."
ptBR = "Espalhadas por toda a terra, as degradadas ruínas humanas deram aos castores um recurso incrível - melhor que madeira."
koKR = "온 땅에 흩어진 버려진 인간의 유적들은 비버들에게 믿을 수 없는 자원, 나무보다 더 좋은 자원을 제공했다."
csCZ = "Rozptýlené po celé zemi zanedbané lidské ruiny daly bobrům neuvěřitelný — zdroj, lepší než dřevo."
viVN = "Các tàn tích của con người bị bỏ hoang rải rác khắp vùng đất đã mang lại cho những con beaver một nguồn tài nguyên vô cùng quý giá - tốt hơn cả gỗ."
trTR = "Yere dağılmış terkedilmiş insan kalıntıları, kunduzlara ağaçtan daha iyi bir kaynak olan inanılmaz bir şey verdi."

["Building.Scarecrow.Description"]
raw = "Палявое ўпрыгожанне, якое калісьці павінна было палохаць птушак, цяпер радуе і малых, і старых."
status = "normal"
enUS = "A field decoration that was once meant to scare away birds now delights both young and old."
zhCN = "曾经用来吓跑鸟类的田野装饰，如今却令老少皆欢。"
zhTW = "曾經用來嚇跑鳥類的田野裝飾，現在讓大小朋友都感到愉悅。"
ruRU = "Полевое украшение, которое когда-то должно было пугать птиц, теперь радует и малых, и старых."
jaJP = "かつて鳥を驚かせるためにあった野外装飾が、今では子供たちと大人たちを楽しませています。"
frFR = "Un ornement de champ qui, à l'origine, devait effrayer les oiseaux, réjouit maintenant petits et grands."
deDE = "Ein Feldschmuck, der einst dazu gedacht war, Vögel zu verscheuchen, erfreut nun Groß und Klein."
plPL = "Ozdoba polowa, która kiedyś miała płoszyć ptaki, teraz cieszy zarówno małych, jak i dużych."
ptBR = "Um adorno de campo que deveria assustar os pássaros, agora alegra tanto os pequenos quanto os idosos."
koKR = "한때 새를 쫓아야 했던 장식용 구조물이 이제는 어린이와 어른 모두를 기쁘게 합니다."
csCZ = "Poleva dekorace, která měla kdysi děsit ptáky, nyní radostně potěšuje jak malé, tak velké."
viVN = "Trang trí đồng ruộng, từng có nhiệm vụ dọa chim, giờ đây mang lại niềm vui cho cả trẻ nhỏ và người lớn."
trTR = "Bir zamanlar kuşları korkutmak için yapılmış bir tarla süslemesi, şimdi hem gençlere hem de yaşlılara neşe veriyor."

