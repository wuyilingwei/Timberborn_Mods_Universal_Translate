["MapMetadata.ThousandIslands.Description"]
raw = "Нават для народжаных плавцоў ператварыць архіпелаг у квітнеючую прамысловую калонію нялёгкая задача."
status = "normal"
enUS = "Even for born swimmers, turning the archipelago into a thriving industrial colony is no easy task."
zhCN = "即使对于天生的游泳者来说，将这个群岛转变为繁荣的工业殖民地也不是一项容易的任务。"
zhTW = "即便對於天生的水手來說，將這個群島轉變成繁榮的工業殖民地也是一項艱巨的任務。"
ruRU = "Даже для новорожденных пловцов превратить архипелаг в процветающую промышленную колонию нелегкая задача."
jaJP = "生まれついての水泳選手にとっても、この群島を繁栄する産業植民地に変えることは簡単な作業ではありません。"
frFR = " Même pour des nageurs nés, transformer un archipel en une colonie industrielle prospère n'est pas une tâche facile."
deDE = "Selbst für geborene Schwimmer ist es keine leichte Aufgabe, den Archipel in eine florierende Industriekolonie zu verwandeln."
plPL = "Nawet dla urodzonych pływaków przekształcenie archipelagu w kwitnącą kolonii przemysłową nie jest łatwym zadaniem."
ptBR = "Mesmo para nadadores natos, transformar o arquipélago em uma próspera colônia industrial não é uma tarefa fácil."
koKR = "심지어 태어난 수영 선수에게도 군도를 번성하는 산업 콜로니로 변화시키는 것은 쉬운 일이 아닙니다."
csCZ = "Dokonce i pro novorozené plavce není snadné proměnit archipelag v vzkvétající průmyslovou kolonii."
viVN = "Ngay cả đối với những người bơi lội bẩm sinh, việc biến một quần đảo thành một thuộc địa công nghiệp thịnh vượng không phải là nhiệm vụ đơn giản."

