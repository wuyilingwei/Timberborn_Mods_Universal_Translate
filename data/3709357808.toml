jaJP = "古代の伝説にインスパイアされた発明家ビーバーは、常に木製の技術を改良することに熱心です。"
frFR = "Inspirés par l'héritage de l'Ancien Kazko, les castors inventeurs s'efforcent toujours d'améliorer leur technologie en bois."
deDE = "Inspiriert durch das Erbe von Alt-Kazko verbessern die Erfinder-Biber stets bereitwillig ihre Holztechniken."
plPL = "Inspirowani dziedzictwem Starego Kaczora, bobry-wynalazcy zawsze chętnie udoskonalają swoją drewnianą technikę."
ptBR = "Inspirados pela herança do Velho Kazko, os castores-inventores estão sempre dispostos a aprimorar sua tecnologia de madeira."
koKR = "옛 카스코의 유산에 영감을 받아, 비버 발명가들은 항상 자신의 목재 기술을 개선하는 데 열정적입니다."
csCZ = "Inspirováni dědictvím Starého Kazka, bobři-vynálezci vždy s nadšením zdokonalují svou dřevěnou technologii."
viVN = "Cảm hứng từ di sản của Old Story, những con beaver phát minh luôn sẵn sàng cải thiện kỹ thuật gỗ của mình."
