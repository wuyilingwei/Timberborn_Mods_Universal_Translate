["MapMetadata.Craters.Description"]
raw = "Ніхто не ведае, як з’явіліся гэтыя кратэры. Папярэднія раскопкі сведчаць пра гвалтоўнае ўмяшанне людзей."
status = "normal"
enUS = "No one knows how these craters appeared. Previous excavations indicate violent human intervention."
zhCN = "“没有人知道这些火山口是如何形成的。先前的挖掘表明人类曾进行过暴力干预。”"
zhTW = "沒有人知道這些隕石坑是如何形成的。先前的挖掘表明人類的暴力干預。"
ruRU = "Никто не знает, как появились эти кратеры. Предыдущие раскопки свидетельствуют о насильственном вмешательстве людей."
jaJP = "「誰もこれらのクレーターがどのように出現したのかを知りません。以前の発掘調査は、人間の暴力的な介入を示しています。」"
frFR = "Personne ne sait comment ces cratères sont apparus. Des fouilles antérieures témoignent d'une intervention violente des humains."
deDE = "Niemand weiß, wie diese Krater entstanden sind. Frühere Ausgrabungen deuten auf gewaltsames menschliches Eingreifen hin."
plPL = "Nikt nie wie, jak powstały te kratery. Poprzednie wykopaliska świadczą o gwałtownym вмешательстве ludzi."
ptBR = "Ninguém sabe como esses crateras apareceram. Escavações anteriores atestam a intervenção violenta de humanos."
koKR = "이 크레이터가 어떻게 생겨났는지 아무도 모른다. 이전 발굴은 인간의 폭력적인 개입을 증명한다."
csCZ = "Nikdo neví, jak se tyto krátery objevily. Předchozí vykopávky svědčí o násilném zásahu lidí."
viVN = "Không ai biết cách những miệng núi lửa này xuất hiện. Các cuộc khai thác trước đây cho thấy sự can thiệp bạo lực của con người."

