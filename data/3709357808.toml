["Building.TributeToIngenuity.FlavorDescription"]
raw = "\"Вядома, у гэтага ёсць прызначэнне. Уражвае.\" — Стары Казко"
status = "normal"
enUS = "\"Of course, there is a purpose to this. Impressive.\" — Old Kazko"
