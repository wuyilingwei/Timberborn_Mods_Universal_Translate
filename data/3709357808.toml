csCZ = "Tvořivá sanita – první dovednost, kterou by měl každý bobr z pouště ovládnout."
viVN = "Văn hóa sáng tạo — kỹ năng đầu tiên mà mỗi con Beaver từ chốn hoang dã cần phải nắm vững."

