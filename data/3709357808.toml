["Tutorial.Dams.BuildDam"]
new = "Захоўванне вады ў рэзервуарах ратуе баброў ад смагі, але доўгатэрміновае выжыванне залежыць ад таго, ці здолеем мы падпарадкаваць паток вады.\n                        \nПабудуйце лінію дамбаў праз бліжэйшую раку ад берага да берага і паглядзіце, што адбудзецца."
