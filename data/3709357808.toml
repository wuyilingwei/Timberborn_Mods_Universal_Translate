["Building.GearWorkshop.FlavorDescription"]
raw = "«Драўляная шасцярэнька трывалая!» — так любіў казаць Стары Казко, прасоўваючы хуткую індустрыялізацыю."
status = "normal"
enUS = "\"A wooden gear is durable!\" — Old Kazko loved to say this while promoting rapid industrialization."
zhCN = "“‘木质齿轮坚固耐用!’——这是老卡兹科在推动快速工业化时常说的话。”"
zhTW = "「『木製齒輪非常耐用！』 — 這就是老卡茲科推動快速工業化時常說的話。」"
ruRU = "«Деревянная шестеренка прочная!» — так любил говорить Старый Казко, продвигая быструю индустриализацию."
jaJP = "「木製のギアは頑丈だ！」 — これは、旧いカズコが急速な工業化を推進しながら愛用していた言葉です。"
frFR = "«La roue en bois est robuste !» - aimait dire Vieux Kazko, en promouvant une industrialisation rapide."
deDE = "„„Das Holzrad ist langlebig!“ – so liebte es der Alte Kazko zu sagen, während er die schnelle Industrialisierung vorantrieb.“"
plPL = "„Drewniane kółko jest wytrzymałe!” — lubił mówić Stary Kazko, promując szybką industrializację."
ptBR = "«Uma engrenagem de madeira é resistente!» — assim gostava de dizer o Velho Kazko, impulsionando a rápida industrialização."
koKR = "«나무 기어는 튼튼해!» — 구식 카즈코가 빠른 산업화를 추진하며 자주 말하곤 했습니다."
csCZ = "„Dřevěné kolečko je odolné!“ — tak rád říkal Starý Kazko, když prosazoval rychlou industrializaci."
viVN = "«Bánh răng gỗ rất bền!» — đó là câu mà Cụ Kazko thích nói khi thúc đẩy sự công nghiệp hóa nhanh chóng."
trTR = "«Ahşap dişli sağlamdır!» — eski Kazko'nun hızlı sanayileşmeyi teşvik ederken sıkça söylediği bir sözdü."

