["PlayerData.CorruptedDataInfo.Header"]
raw = "Пры чытанні вашага файла гульца ўзнікла праблема. Мы аднавілі яго змесціва з лакальнай рэзервовай копіі, але некаторыя дэталі (у тым ліку адкрытыя фракцыі і асвоеныя карты) маглі быць страчаны."
status = "normal"
enUS = "There was a problem reading your player file. We have restored its contents from a local backup, but some details (including unlocked factions and discovered maps) may have been lost."
zhCN = "在读取您的玩家文件时出现问题。我们已从本地备份恢复其内容，但某些细节（包括已解锁的派系和已探索的地图）可能会丢失。"
zhTW = "在讀取您的玩家檔案時發生了問題。我們從本地備份恢復了其內容，但某些細節（包括已開放的派系和已解鎖的地圖）可能已經丟失。"
ruRU = "При чтении вашего файла игрока возникла проблема. Мы восстановили его содержимое из локальной резервной копии, но некоторые детали (в том числе открытые фракции и освоенные карты) могли быть утеряны."
jaJP = "プレイヤーのファイルを読み込む際に問題が発生しました。ローカルバックアップから内容を復元しましたが、一部の詳細（オープンした派閥や習得したマップを含む）が失われた可能性があります。"
frFR = "Lors de la lecture de votre fichier de joueur, un problème est survenu. Nous avons restauré son contenu à partir d'une sauvegarde locale, mais certaines détails (y compris les factions débloquées et les cartes maîtrisées) ont pu être perdus."
deDE = "Beim Lesen Ihrer Spieldatei ist ein Problem aufgetreten. Wir haben ihren Inhalt aus einer lokalen Sicherungskopie wiederhergestellt, aber einige Details (darunter offene Fraktionen und eroberte Karten) könnten verloren gegangen sein."
plPL = "Podczas odczytu pliku gracza wystąpił problem. Przywróciliśmy jego zawartość z lokalnej kopii zapasowej, ale niektóre szczegóły (w tym otwarte frakcje i odkryte mapy) mogły zostać utracone."
ptBR = "Durante a leitura do seu arquivo de jogador, ocorreu um problema. Restauramos seu conteúdo a partir de um backup local, mas alguns detalhes (incluindo facções desbloqueadas e mapas conquistados) podem ter sido perdidos."
koKR = "플레이어 파일을 읽는 동안 문제가 발생했습니다. 로컬 백업에서 내용을 복원했지만 일부 세부정보(열린 파벌 및 습득한 지도 포함)가 손실되었을 수 있습니다."
csCZ = "Při načítání vašeho hráčského souboru došlo k problému. Obnovili jsme jeho obsah z místní zálohy, ale některé detaily (včetně otevřených frakcí a osvojených map) mohly být ztraceny."
viVN = "Khi đọc tệp người chơi của bạn đã xảy ra vấn đề. Chúng tôi đã phục hồi nội dung từ bản sao lưu cục bộ, nhưng một số chi tiết (bao gồm cả các phe phái đã mở và bản đồ đã khám phá) có thể đã bị mất."

["Population.AllPerished"]
raw = "І хоць усе бабры загінулі, рака ўсё роўна цякла далей,\nа іх кароткае існаванне было толькі крупінкай драўнянага пылу."
status = "normal"
enUS = "And although all the beavers perished, the river continued to flow, and their short existence was just a grain of wood dust."
zhCN = "尽管所有的海狸都已死去，河流仍然继续流动，他们短暂的存在不过是木屑中的一粒。"
zhTW = "「雖然所有的海狸都死去，河流仍然繼續流淌，而他們短暫的存在只是一粒木屑。」"
ruRU = "И хотя все бобры погибли, река все равно текла дальше, а их короткое существование было лишь крупинкой древесной пыли."
jaJP = "「すべてのビーバーが亡くなったとしても、川は依然として流れ続け、彼らの短い存在は木の粉の粒のようなものであった。」"
frFR = "Et bien que tous les castors soient morts, la rivière coulait toujours,\net leur courte existence n'était qu'un grain de poussière de bois."
deDE = "Und obwohl alle Biber gestorben waren, floss der Fluss weiterhin,\nund ihr kurzes Dasein war nur ein Staubkorn aus Holz."
plPL = "I choć wszystkie bobry zginęły, rzeka i tak płynęła dalej, a ich krótkie istnienie było tylko ziarnkiem drewnianego pyłu."
ptBR = "E embora todos os castores tenham perecido, o rio continuou a fluir, \ne sua breve existência foi apenas um grão de poeira de madeira."
koKR = "모든 비버가 죽었음에도 불구하고, 강은 여전히 흐르고 있었고,\n그들의 짧은 존재는 나무 먼지의 작은 입자에 불과했다."
csCZ = "I když všichni bobři zahynuli, řeka přesto dál tekla, a jejich krátký život byl jen zrnkem dřevěného prachu."
viVN = "Và mặc dù tất cả các con nhím đều đã chết, con sông vẫn tiếp tục chảy,\nvà sự tồn tại ngắn ngủi của chúng chỉ là một hạt bụi gỗ."

