viVN = "Sử dụng công cụ này để thiết lập ưu tiên cho xây dựng, phá dỡ và thu gom hàng hóa từ đống đổ nát."
trTR = "Bu aracı kullanarak inşaat, yıkım ve molozlardan eşya toplama önceliğini belirleyin."

["BuilderPriorityTool.Tip"]
raw = "Націсніце на прадмет, каб задаць яго прыярытэт, або ўтрымлівайце кнопку, каб выбраць большую вобласць."
status = "normal"
enUS = "Click on the item to set its priority, or hold the button to select a larger area."
zhCN = "点击物品以设置其优先级，或按住按钮选择更大区域。"
zhTW = "點擊物品以設置其優先級，或按住按鈕以選擇更大區域。"
