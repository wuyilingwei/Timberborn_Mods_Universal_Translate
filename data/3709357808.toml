["NaturalResource.Blueberry.FlavorDescription"]
raw = "\"Калі надыдзе засуха, яшчэ будзеце прасіць гэтых ягад.\" — Ма' Нгонель"
status = "normal"
enUS = "\"When drought comes, you will still be begging for these berries.\" — Ma' Ngonel"
zhCN = "“当干旱来临时，你们依然会渴望这些浆果。” — 玛·恩戈内尔"
zhTW = "\"當乾旱來臨時，你將再次渴望這些莓果。\" — 瑪' 恩戈內"
ruRU = "\"Когда наступит засуха, вы все равно будете просить эти ягоды.\" — Ма' Нгонель"
jaJP = "「干ばつが訪れた時には、これらのベリーを求めることになるだろう。」— マ・ンゴネル"
frFR = "\"Quand la sécheresse viendra, vous demanderez encore ces baies.\" — Ma' Ngonel"
deDE = "\"Wenn die Dürre kommt, werdet ihr euch immer nach diesen Beeren sehnen.\" — Ma' Ngonel"
plPL = "\"Jeśli nadejdzie susza, nadal będziecie prosić o te jagody.\" — Ma' Ngonel"
ptBR = "\"Quando a seca chegar, você ainda pedirá por essas frutas.\" — Ma' Ngonel"
koKR = "\"가뭄이 오면 이 열매를 다시 요청하게 될 것입니다.\" — 마' 응 gonel"
csCZ = "\"Pokud nastane sucho, ještě budete prosit o tyto bobule.\" — Ma' Ngonel"
viVN = "\"Khi hạn hán đến, bạn vẫn sẽ cầu xin những quả mọng này.\" — Ma' Ngonel"

