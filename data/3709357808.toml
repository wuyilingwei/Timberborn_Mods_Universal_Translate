["Building.GravityBattery.Description"]
raw = "Назапашвае лішак энергіі і вяртае яго, калі сетка недастаткова забяспечана. Чым вышэй яна пабудавана, тым больш энергіі можа захоўваць."
status = "normal"
enUS = "Stores excess energy and returns it when the grid is under-supplied. The higher it is built, the more energy it can store."
