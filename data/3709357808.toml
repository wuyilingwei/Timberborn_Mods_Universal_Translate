["Building.LumberjackFlag.FlavorDescription"]
raw = "\"Я дрывасек, і гэта так: я ноччу сплю, а ўдзень сяку!\" — папулярная бобравая песня"
status = "normal"
enUS = "\"I'm a lumberjack, and that's just how it is: I sleep at night and work during the day!\" — a popular beaver song"
zhCN = "“我是一名伐木工，这就是我：我晚上睡觉，白天工作！”——一首流行的海狸歌曲"
