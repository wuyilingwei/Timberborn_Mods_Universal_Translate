["NaturalResource.Birch.FlavorDescription"]
raw = "\"Памятайце, малышы, не абдзірайце занадта шмат кары! Гэта шкодзіць дрэву!\" — Ма' Нгонель"
status = "normal"
enUS = "\"Remember, little ones, do not peel too much bark! It harms the tree!\" — Ma' Ngonel"
zhCN = "\"记住，小家伙们，不要剥太多树皮！这对树是有害的！\" — 妈'恩贡乐"
zhTW = "「記住，小傢伙們，不要剝太多的樹皮！這對樹木有害！」— 馬' 恩戈內爾"
ruRU = "\"Помните, детки, не сдирайте слишком много коры! Это вредно для дерева!\" — Ма' Нгонель"
jaJP = "\"覚えておけ、小さな者たちよ、あまり多くの樹皮を剝がしてはいけない！それは木に害を及ぼす！\" — マ' ゴネール"
frFR = "\"Souvenez-vous, les enfants, ne retirez pas trop d'écorce ! Cela nuit à l'arbre !\" — Ma' Ngonel"
deDE = "\"Denkt daran, Kinder, schält nicht zu viel Rinde ab! Es schadet dem Baum!\" — Ma' Ngonel"
plPL = "Zapamiętajcie, dzieci, nie obdzierajcie zbyt wiele kory! To szkodzi drzewu!\" — Ma' Ngonel"
ptBR = "\"Lembre-se, filhotes, não retirem muita casca! Isso prejudica a árvore!\" — Ma' Ngonel"
koKR = "\"기억해라, 아가야, 껍질을 너무 많이 벗기지 마라! 나무에 해롭단다!\" — 마' 응온엘"
csCZ = "Pamatujte, děti, nestahujte příliš mnoho kůry! To škodí stromu!\" — Ma' Ngonel"
viVN = "\"Hãy nhớ, các bé, đừng cạo quá nhiều vỏ! Điều này có hại cho cây!\" — Ma' Ngonel"

