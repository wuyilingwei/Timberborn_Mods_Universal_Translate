["Building.SmallIndustrialPile.FlavorDescription"]
raw = "«Ну вось, паклалі дах зверху і назвалі гэта прамысловым. Класіка.» — Піна"
status = "normal"
enUS = "\"Well, they put a roof on top and called it industrial. Classic.\" — Pina"
zhCN = "“‘那么他们在顶部加了屋顶，并称之为工业。经典。’ — 皮纳”"
