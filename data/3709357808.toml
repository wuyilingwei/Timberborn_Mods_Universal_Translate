frFR = "Vous pouvez également accélérer le jeu pour réduire les temps d'arrêt pendant que vos castors travaillent ou dorment."
deDE = "Sie können das Spiel auch beschleunigen, um die Pausen zu verkürzen, während Ihre Biber arbeiten oder schlafen."
plPL = "Możesz także przyspieszyć grę, aby skrócić przerwy, podczas gdy twoje bobry pracują lub śpią."
ptBR = "Você também pode acelerar o jogo para reduzir os intervalos enquanto seus castores trabalham ou dormem."
koKR = "당신의 비버가 일하거나 자는 동안 대기 시간을 줄이기 위해 게임 속도를 높일 수도 있습니다."
