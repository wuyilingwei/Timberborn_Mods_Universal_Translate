raw = "\"Калі хочаш, каб служыла доўга, рабі з металу. Гэта адно, у чым хуманы сапраўды былі добрыя.\" — Стары Казко"
status = "normal"
enUS = "\"If you want it to last long, make it out of metal. That's one thing the humans were really good at.\" — Old Kazko"
zhCN = "\"如果你想让它长久使用，就用金属做。这是人类真正擅长的事情。\" — 老卡兹科"
zhTW = "\"如果想讓它長久使用，就要用金屬製作。這是人類真正擅長的事。\" — 老卡茲科"
ruRU = "\"Если хочешь, чтобы прослужило долго, делай из металла. Это одно, в чем гуманоиды действительно были хороши.\" — Старый Казко"
jaJP = "「長持ちさせたいなら、金属で作れ。それが人類が本当に得意だったことの一つだ。」— 古いカズコ"
frFR = "\"Si tu veux qu'il dure longtemps, fais-le en métal. C'est la seule chose pour laquelle les humains étaient vraiment bons.\" — Vieux Kazko"
deDE = "\"Wenn du willst, dass es lange hält, mach es aus Metall. Das ist eines, worin die Menschen wirklich gut waren.\" — Alter Kazko"
plPL = "\"Jeśli chcesz, aby służyło długo, zrób to z metalu. To jedna rzecz, w której humani naprawdę byli dobrzy.\" — Stary Kazko"
ptBR = "\"Se você quer que dure muito, faça de metal. Esta é uma das coisas em que os humanos realmente eram bons.\" — Velho Kazko"
koKR = "\"오래 사용하고 싶다면 금속으로 만들라. 이는 인간들이 정말 잘했던 하나의 것이다.\" — 늙은 카즈코"
csCZ = "\"Pokud chceš, aby to sloužilo dlouho, dělej to z kovu. To je jedna věc, v níž byli humani opravdu dobří.\" — Starý Kazko"
viVN = "\"Nếu bạn muốn nó bền lâu, hãy làm bằng kim loại. Đây là một trong những điều mà con người thực sự giỏi.\" — Cựu Kazko"
trTR = "\"Eğer uzun süre hizmet vermesini istiyorsan, metalden yap. Bu, insanların gerçekten iyi olduğu bir şeydir.\" — Eski Kazko"

