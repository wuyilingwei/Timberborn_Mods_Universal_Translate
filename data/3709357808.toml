["MapMetadata.Meander.Description"]
raw = "Бабры-інжынеры ахвотна выкарыстоўваюць натуральную крывізну рачных берагоў. Складаней за ўсё добра распланаваць абмежаваную прастору."
status = "normal"
enUS = "The beaver engineers happily take advantage of the natural meandering of riverbanks. The hardest part is planning a limited space well."
zhCN = "“海狸工程师乐于利用河岸的自然曲线。最难的是在有限的空间内进行良好的规划。”"
zhTW = "工蜂工程師們樂於利用河岸的自然曲折。最難的是充分規劃有限的空間。"
ruRU = "Бобры-инженеры охотно используют естественную кривизну речных берегов. Сложнее всего хорошо спланировать ограниченное пространство."
jaJP = "ビーバーエンジニアたちは、川の岸の自然な曲がりを好んで利用します。限られたスペースをうまく計画するのが最も難しいです。"
frFR = "Les castors-ingénieurs aiment utiliser la courbure naturelle des rives des rivières. Le plus difficile est de bien planifier un espace limité."
deDE = "Die Biber-Ingenieure nutzen gerne die natürliche Krümmung von Flussufern. Es ist am schwierigsten, den begrenzten Raum gut zu planen."
plPL = "Bobry-inżynierzy chętnie wykorzystują naturalne zakrzywienie brzegów rzek. Najtrudniej jest dobrze zaplanować ograniczoną przestrzeń."
ptBR = "Os castores engenheiros gostam de aproveitar a curvatura natural das margens dos rios. É mais difícil planejar bem um espaço limitado."
koKR = "비버 엔지니어는 자연스러운 강가의 곡선을 기꺼이 활용합니다. 제한된 공간을 잘 계획하는 것이 가장 어렵습니다."
csCZ = "Bobři-inženýři rádi využívají přirozené zakřivení říčních břehů. Nejtěžší je dobře naplánovat omezený prostor."
viVN = "Những con nhím kĩ sư sẵn sàng sử dụng độ cong tự nhiên của các bờ sông. Khó khăn nhất là lên kế hoạch cho không gian hạn chế."

