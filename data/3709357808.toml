["Bot.BeaversPerished"]
raw = "І не пачынайце мне пра баброў.\nУ іх было ўсё. Свежае паветра, чыстая вада.\nЦяпер яны толькі цьмяны ўспамін."
status = "normal"
enUS = "And don't start with me about the beavers.  \nThey had everything. Fresh air, clean water.  \nNow they are just a dim memory."
zhCN = "“我可不想听你说海狸的事。他们曾拥有一切，新鲜的空气，清澈的水。现在他们只是模糊的回忆。”"
zhTW = "我可不想聽你講海狸的事。\n它們曾擁有一切。清新的空氣，乾淨的水。\n現在它們只是一段模糊的記憶。"
ruRU = "И не начинайте мне про бобров.\nУ них было всё. Свежий воздух, чистая вода.\nТеперь они только тусклый воспоминание."
jaJP = "ビーバーのことを話し始めないでください。彼らにはすべてがありました。新鮮な空気、きれいな水。今はただのぼんやりとした記憶です。"
frFR = "Et ne commencez pas à me parler des castors.  \nIls avaient tout. De l'air frais, de l'eau propre.  \nMaintenant, ils ne sont qu'un souvenir flou."
deDE = "Und fangt nicht an, mir von den Bibern zu erzählen.  \nSie hatten alles. Frische Luft, reines Wasser.  \nJetzt sind sie nur noch eine schwache Erinnerung."
plPL = "I nie zaczynajcie mi mówić o bobrach. Mieli wszystko. Świeże powietrze, czysta woda. Teraz to tylko matowy wspomnienie."
ptBR = "E não comecem a falar de castores comigo.  \nEles tinham tudo. Ar puro, água limpa.  \nAgora são apenas uma lembrança vaga."
koKR = "그리고 너희는 나에게 비버에 대해 이야기하지 마라.  \n그들에게는 모든 것이 있었다. 신선한 공기, 깨끗한 물.  \n이제 그들은 단지 희미한 기억일 뿐이다."
csCZ = "A nezačínejte mi o bobrech. Měli všechno. Čerstvý vzduch, čistou vodu. Teď jsou jen mlhavou vzpomínkou."
viVN = "Và đừng bắt đầu với tôi về những con beaver.\nChúng có mọi thứ. Không khí trong lành, nước sạch.\nGiờ đây, chúng chỉ là một ký ức mờ nhạt."
trTR = "Ve benimle kunduzlar hakkında konuşmaya başlamayın. Onların her şeyi vardı. Temiz hava, berrak su. Şimdi sadece solgun bir anı."

