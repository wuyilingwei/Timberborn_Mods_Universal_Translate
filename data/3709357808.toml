["Building.StreamGauge.FlavorDescription"]
raw = "У бобравых справах ёсць прыліў і адліў. Калі ўхапіцца за прыліў, ён вядзе да ўдачы."
status = "normal"
enUS = "In beaver matters, there is a tide and an ebb. If you catch the tide, it leads to fortune."
zhCN = "在海狸的事务中有潮涨和潮落。当抓住潮涨时，它会带来好运。"
zhTW = "在海狸的事務中，有潮起潮落。當抓住潮流時，它將引導你走向幸運。"
ruRU = "В делах бобров есть прилив и отлив. Если ухватиться за прилив, он приведет к удаче."
jaJP = "ビーバーの事柄には潮の満ち引きがある。潮の満ちるときに掴めば、運がやってくる。"
frFR = "Dans les affaires des castors, il y a des marées. Saisir la marée mène à la chance."
deDE = "Bei den Bibern gibt es Gezeiten. Wenn man die Flut ergreift, führt sie zum Glück."
plPL = "W sprawach bobrów są przypływy i odpływy. Kiedy uchwycisz przypływ, prowadzi on do szczęścia."
ptBR = "Nos negócios dos castores, há maré alta e maré baixa. Se você agarrar a maré alta, ela leva à sorte."
koKR = "비버의 일에는 밀물과 썰물이 있다. 밀물을 잡으면 행운이 따른다."
csCZ = "V bobřích záležitostech je příliv a odliv. Když se chopíte přílivu, vede to k štěstí."
viVN = "Trong công việc của nhím có những lúc thịnh vượng và khó khăn. Khi nắm bắt được thời điểm thịnh vượng, nó sẽ dẫn đến vận may."
