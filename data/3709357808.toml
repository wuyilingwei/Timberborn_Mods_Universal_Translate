["Modding.ThumbnailInfo"]
raw = "Дадайце ў каталог гэтага мода файл выявы з назвай \"thumbnail\", каб усталяваць мініяцюру. Яна павінна быць меншай за 1 МБ. Пераважнае суадносіны бакоў - 16:9."
status = "normal"
enUS = "Add an image file named 'thumbnail' to the mod's directory to set the thumbnail. It should be smaller than 1 MB. The preferred aspect ratio is 16:9."
zhCN = "在此模组的目录中添加名为“thumbnail”的图像文件以设置缩略图。文件大小必须小于1MB。推荐的长宽比为16:9。"
zhTW = "將此模組的目錄中添加一個名為 \"thumbnail\" 的圖片檔案以設置縮略圖。檔案大小應小於 1 MB。建議的長寬比為 16:9。"
ruRU = "Добавьте в каталог этого мода файл изображения с названием 'thumbnail', чтобы установить миниатюру. Она должна быть меньше 1 МБ. Предпочтительное соотношение сторон - 16:9."
jaJP = "このモッドのフォルダーに「thumbnail」という名前の画像ファイルを追加してサムネイルを設定してください。ファイルサイズは1MB未満にする必要があります。推奨アスペクト比は16:9です。"
frFR = "Ajoutez un fichier image nommé \"thumbnail\" au répertoire de ce mod pour définir la miniature. Il doit être inférieur à 1 Mo. Le rapport d'aspect recommandé est de 16:9."
deDE = "Fügen Sie dem Katalog dieses Mods eine Bilddatei mit dem Namen \"thumbnail\" hinzu, um das Miniaturbild festzulegen. Sie sollte weniger als 1 MB groß sein. Das bevorzugte Seitenverhältnis ist 16:9."
plPL = "Dodaj do katalogu tego moda plik obrazu o nazwie \"thumbnail\", aby ustawić miniaturkę. Powinien mieć mniej niż 1 MB. Preferowany stosunek boków to 16:9."
ptBR = "Adicione um arquivo de imagem ao catálogo deste mod com o nome \"thumbnail\" para definir a miniatura. Ele deve ter menos de 1 MB. A proporção ideal é 16:9."
koKR = "이 모드의 카탈로그에 'thumbnail'이라는 이름의 이미지 파일을 추가하여 썸네일을 설정하세요. 파일 크기는 1MB 이하여야 합니다. 권장 종횡비는 16:9입니다."
csCZ = "Přidejte do adresáře tohoto modu obrazový soubor s názvem 'thumbnail', aby se nastavila miniatura. Měl by být menší než 1 MB. Preferovaný poměr stran je 16:9."
viVN = "Thêm tệp hình ảnh có tên 'thumbnail' vào thư mục của mô-đun này để thiết lập hình thu nhỏ. Nó phải có kích thước nhỏ hơn 1 MB. Tỷ lệ khung hình ưa thích là 16:9."

