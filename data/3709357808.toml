koKR = "저장 버전 ({0})이 현재 버전 ({1})과 호환되지 않습니다. 이를 로드하면 게임이 충돌하거나 심각한 문제가 발생할 수 있습니다. 새로운 기능을 최대한 즐기기 위해 새 게임을 시작하는 것을 권장합니다.  \n\n정말 로드하시겠습니까?"
csCZ = "Verze uloženého stavu ({0}) není kompatibilní s aktuální verzí ({1}). Její načtení může vést k pádům a vážným problémům ve hře. Důrazně doporučujeme začít novou hru, abyste si plně užili nové možnosti.  \n\nOpravdu chcete tuto verzi načíst?"
viVN = "Phiên bản lưu ({0}) không tương thích với phiên bản hiện tại ({1}). Việc tải nó có thể dẫn đến sự cố và các vấn đề nghiêm trọng trong trò chơi. Chúng tôi khuyến nghị bạn nên bắt đầu một trò chơi mới để hoàn toàn trải nghiệm các tính năng mới.\n\nBạn có chắc chắn muốn tải nó không?"

