["MapMetadata.Beaverome.Description"]
raw = "Каб пабудаваць легендарны мегаполіс, продкі баброў асушылі сем магутных кратэраў. Нават з сённяшнімі драўнатэхналогіямі гэта нялёгкі подзвіг."
status = "normal"
enUS = "To build the legendary megapolis, the ancestors of the beavers drained seven mighty craters. Even with today's wood technology, this is no easy feat."
zhCN = "要建造传奇的大都市，河狸的祖先排干了七个强大的火山口。即使在今天的木材技术下，这也是一项艰巨的壮举。"
zhTW = "為了建立傳奇的大都市，海狸的祖先排乾了七個強大的火山口。即使在今天的木材技術下，這也是一項艱巨的壯舉。"
ruRU = "Чтобы построить легендарный мегаполис, предки бобров осушили семь мощных кратеров. Даже с современными древесно-техническими технологиями это нелегкий подвиг."
jaJP = "伝説のメガポリスを建設するために、ビーバーの先祖たちは7つの巨大なクレーターを干拓しました。今日の木材技術をもってしても、これは簡単な偉業ではありません。"
frFR = "Pour construire une légendaire métropole, les ancêtres des castors ont asséché sept puissants cratères. Même avec les technologies du bois d'aujourd'hui, c'est un exploit difficile."
deDE = "Um die legendäre Megastadt zu errichten, haben die Vorfahren der Biber sieben mächtige Krater trocken gelegt. Selbst mit den heutigen Holztechnologien ist dies eine schwere Aufgabe."
plPL = "Aby zbudować legendarną metropolię, przodkowie bobrów osuszyli siedem potężnych kraterów. Nawet przy dzisiejszych technologiach drewnianych, to nie lada wyczyn."
ptBR = "Para construir a lendária metrópole, os ancestrais dos castores drenaram sete poderosas crateras. Mesmo com as tecnologias madeireiras de hoje, isso é um feito notável."
koKR = "전설적인 메가폴리스를 건설하기 위해 비버의 조상들은 7개의 강력한 크레이터를 메웠습니다. 오늘날의 목재 기술로도 이는 쉬운 업적이 아닙니다."
csCZ = "Aby postavili legendární megapolis, předci bobrů vysušili sedm mocných kráterů. I s dnešními dřevěnými technologiemi je to nevšední hrdinství."
viVN = "Để xây dựng một siêu đô thị huyền thoại, tổ tiên của loài beaver đã làm khô bảy miệng núi lửa hùng mạnh. Ngay cả với công nghệ chế biến gỗ hiện nay, đây vẫn là một chiến công không hề đơn giản."

