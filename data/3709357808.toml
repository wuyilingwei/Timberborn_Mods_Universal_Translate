["Tutorial.PowerAndPlanks.LumberMill"]
raw = "Час пачынаць вытворчасць дошак!\n                                    \nПабудуйце лесапілку непасрэдна побач з Вадзяным колам. Таксама можна пабудаваць яе далей і злучыць з Вадзяным колам пры дапамозе перадаткавых валаў.\n                                    \nПарада: многія будынкі, напрыклад лесапілкі і хаткі, перадаюць магутнасць адзін аднаму, калі стаяць сцяна ў сцяну. Перадаткавыя валы не патрэбныя!"
status = "normal"
enUS = "It's time to start producing planks!\n\nBuild a lumber mill right next to the Water Wheel. You can also build it further away and connect it to the Water Wheel using power shafts.\n\nTip: Many buildings, such as lumber mills and huts, transfer power to each other when they are placed wall to wall. Power shafts are not needed!"
zhCN = "是时候开始生产木板了！\n\n在水车旁边建造锯木厂。您也可以在更远处建造它，并通过传动轴将其连接到水车。\n\n提示：许多建筑，例如锯木厂和小屋，如果背靠背建造，会相互传递能量。传动轴并不是必需的！"
zhTW = "是時候開始生產木板了！\n                                    \n在水車旁邊建造一座鋸木廠。你也可以將其建在更遠的地方，並通過傳動軸連接到水車。\n                                    \n建議：許多建築物，例如鋸木廠和小屋，當牆壁靠牆時可以相互傳遞動力。傳動軸不是必需的！"
ruRU = "Время начинать производство досок!\n                                    \nПостройте лесопилку прямо рядом с Водяным колесом. Также можно построить её дальше и соединить с Водяным колесом с помощью передаточных валов.\n                                    \nСовет: многие здания, например лесопилки и домики, передают мощность друг другу, если стоят стенка к стенке. Передаточные валы не нужны!"
jaJP = "板を生産し始める時間です！\n\n水車のすぐそばに製材所を建てましょう。また、少し離れた場所に建てて、水車と伝動軸でつなぐことも可能です。\n\nヒント: 多くの建物、例えば製材所や家は、壁を接していると互いにパワーを伝達します。伝動軸は必要ありません！"
frFR = "Il est temps de commencer la production de planches !\n\nConstruisez un scierie juste à côté de la Roue à eau. Vous pouvez également la construire plus loin et la relier à la Roue à eau à l'aide d'arbre de transmission.\n\nAstuce : de nombreux bâtiments, comme les scieries et les maisons, transmettent de l'énergie les uns aux autres lorsqu'ils sont adjacents. Les arbres de transmission ne sont pas nécessaires !"
deDE = "Es ist Zeit, mit der Produktion von Brettern zu beginnen!\n\nBaue eine Sägewerks in unmittelbarer Nähe zu einem Wasserrad. Du kannst es auch weiter weg bauen und mit einem Antriebsrad verbinden.\n\nTipp: Viele Gebäude, wie Sägewerke und Hütten, übertragen Leistung untereinander, wenn sie Wand an Wand stehen. Antriebsräder sind nicht erforderlich!"
plPL = "Czas rozpocząć produkcję desek!\n                                    \nZbuduj tartak bezpośrednio obok Koła Wodnego. Można go również zbudować dalej i połączyć z Kołem Wodnym za pomocą wałów przekazujących.\n                                    \nWskazówka: wiele budynków, takich jak tartaki i domki, przekazuje moc sobie nawzajem, gdy stoją ściana w ścianę. Wały przekazujące nie są potrzebne!"
ptBR = "É hora de começar a produção de tábuas!\n\nConstrua um moinho de madeira bem próximo à Roda D'Água. Também é possível construí-lo mais longe e conectá-lo à Roda D'Água com eixos de transmissão.\n\nDica: muitos edifícios, como serrarias e casas, transmitem poder uns aos outros quando estão lado a lado. Eixos de transmissão não são necessários!"
koKR = "보드 생산을 시작할 시간입니다!\n\n수력 수레 바로 옆에 제재소를 건설하세요. 좀 더 멀리 지을 수도 있으며, 전송 축을 통해 수력 수레와 연결할 수 있습니다.\n\n팁: 많은 건물, 예를 들어 제재소와 오두막은 벽을 맞대고 있을 때 서로에게 힘을 전달합니다. 전송 축은 필요하지 않습니다!"
csCZ = "Čas začít výrobu prken!\n\nPostavte pilu přímo vedle Vodního kola. Lze ji také postavit dál a propojit ji s Vodním kolem pomocí převodových hřídelí.\n\nTip: Mnohé budovy, například pily a domečky, si předávají energii, pokud stojí čelem k sobě. Převodové hřídele nejsou potřeba!"
viVN = "Đến lúc bắt đầu sản xuất ván!\n                                    \nHãy xây dựng nhà máy cưa ngay cạnh Bánh xe nước. Bạn cũng có thể xây dựng nó xa hơn và kết nối với Bánh xe nước bằng các trục truyền động.\n                                    \nMẹo: nhiều công trình, chẳng hạn như nhà máy cưa và nhà ở, truyền sức mạnh cho nhau khi đứng cạnh nhau. Không cần trục truyền động!"

["Tutorial.PowerAndPlanks.WaterWheel"]
raw = "Больш прасунутыя будынкі патрабуюць магутнасці, і бабры аддаюць перавагу, каб яна паступала з ракі.\n                                    \nРазмясціце Вадзяное кола ў плыні вады ўздоўж берага ракі."
status = "normal"
enUS = "More advanced buildings require power, and beavers prefer it to come from the river.\n\nPlace the Water Wheel in the flow of water along the riverbank."
zhCN = "更高级的建筑需要动力，而海狸更喜欢从河流中获取动力。\n\n将水车放置在河岸的水流中。"
zhTW = "「更先進的建築需要能量，而海狸更喜歡來自河流的能量。\n\n將水輪放置在河岸的水流中。」"
ruRU = "Более продвинутые здания требуют энергии, и бобры предпочитают, чтобы она поступала из реки.\n\nРазместите Водяное колесо в потоке воды вдоль берега реки."
jaJP = "「より高度な建物は電力を必要とし、ビーバーはそれが川から供給されることを好みます。\n\n川岸に沿った水の流れに水車を設置してください。」"
frFR = "Les bâtiments plus avancés nécessitent de l'énergie, et les castors préfèrent qu'elle provienne de la rivière.\n\nPlacez la Roue à eau dans le courant le long de la rive."
deDE = "Fortschrittlichere Gebäude benötigen Energie, und die Biber ziehen es vor, dass diese aus dem Fluss kommt.\n\nPlatzieren Sie das Wasserrad im Wasserstrom entlang des Flussufers."
plPL = " bardziej zaawansowane budynki wymagają mocy, a bobry wolą, aby pochodziła ona z rzeki.\n\nUmieść koło wodne w nurtach wody wzdłuż brzegu rzeki."
ptBR = "Edifícios mais avançados requerem energia, e os castores preferem que ela venha do rio.\n\nColoque a Roda d'Água na correnteza ao longo da margem do rio."
koKR = "더 발전된 건물은 전력이 필요하며, 비버는 강에서 공급되기를 선호합니다.\n\n강가의 물살을 따라 수차를 배치하세요."
csCZ = "Větší pokročilé budovy vyžadují energii a bobři dávají přednost, aby pocházela z řeky.\n\nUmístěte Vodní kolo do proudu vody podél břehu řeky."
viVN = "Các tòa nhà tiên tiến hơn yêu cầu sức mạnh, và các con nhím thích nó đến từ dòng sông.\n\nĐặt Bánh xe nước trong dòng chảy nước dọc theo bờ sông."

