["MapMetadata.Lakes.Description"]
raw = "У нашы дні тэрыторый, багатых на азёры і рэкі, засталося мала. Тое нямногае, што засталося, даказвае, што для Зямлі яшчэ ёсць надзея."
status = "normal"
enUS = "In our days, there are few territories rich in lakes and rivers left. The little that remains proves that there is still hope for the Earth."
zhCN = "“在如今，富含湖泊和河流的地区已所剩无几。剩下的这些证明了地球仍然有希望。”"
zhTW = "在我們的時代，富含湖泊和河流的區域所剩無幾。所剩不多的證明了地球仍然有希望。"
ruRU = "В наши дни осталось мало территорий, богатых озерами и реками. То немногое, что осталось, доказывает, что для Земли еще есть надежда."
jaJP = "「現代において、湖や川が豊かな地域はほとんど残っていません。わずかに残された地域は、地球にはまだ希望があることを証明しています。」"
frFR = "De nos jours, il reste peu de territoires riches en lacs et en rivières. Ce qui reste prouve qu'il y a encore de l'espoir pour la Terre."
deDE = "In der heutigen Zeit gibt es nur noch wenige Gebiete, die reich an Seen und Flüssen sind. Das Wenige, was noch vorhanden ist, beweist, dass es noch Hoffnung für die Erde gibt."
plPL = "W dzisiejszych czasach pozostało niewiele terenów bogatych w jeziora i rzeki. To niewielkie, co pozostało, dowodzi, że dla Ziemi wciąż jest nadzieja."
ptBR = "Nos dias de hoje, restam poucos territórios ricos em lagos e rios. O que resta prova que ainda há esperança para a Terra."
koKR = "오늘날 호수와 강이 풍부한 지역은 거의 남아 있지 않습니다. 남아 있는 그 조금은 지구에 아직 희망이 있다는 것을 증명합니다."
csCZ = "V dnešní době zbylo málo území bohatých na jezera a řeky. To málo, co zůstalo, dokazuje, že na Zemi ještě existuje naděje."
viVN = "Ngày nay, những vùng đất giàu hồ và sông còn lại rất ít. Những điều ít ỏi còn lại chứng minh rằng Trái Đất vẫn còn hy vọng."

