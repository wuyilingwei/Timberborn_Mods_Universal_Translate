["Tutorial.Dams.BuildDam"]
raw = "Захоўванне вады ў рэзервуарах ратуе баброў ад смагі, але доўгатэрміновае выжыванне залежыць ад таго, ці здолеем мы падпарадкаваць паток вады.\n                        \nПабудуйце лінію дамбаў праз бліжэйшую раку ад берага да берага і паглядзіце, што адбудзецца."
status = "normal"
enUS = "Storing water in reservoirs saves beavers from thirst, but long-term survival depends on whether we can control the flow of water.\n\nBuild a line of dams across the nearest river from bank to bank and see what happens."
zhCN = "在水库中储存水可以拯救海狸免受干渴，但长期生存取决于我们是否能够控制水流。\n\n在离岸最近的河流上建立一条坝线，从一岸建到另一岸，看看会发生什么。"
zhTW = "「在水庫中儲存水源可以拯救海狸免受口渴，但長期生存取決於我們是否能夠控制水流。\n\n建造一條跨越最近河流的堤堰線，看看會發生什麼。」"
ruRU = "Сохранение воды в резервуарах спасает бобров от жажды, но долгосрочное выживание зависит от того, сможем ли мы подчинить поток воды.\n\nПостройте линию дамб через ближайшую реку от берега до берега и посмотрите, что произойдет."
jaJP = "「貯水池に水を貯めることでビーバーの渇きを救うことができますが、長期的な生存は水の流れを支配できるかにかかっています。\n\n近くの川を橋渡しするようにダムを建設し、何が起こるか見てみましょう。」"
frFR = "Stocker de l'eau dans des réservoirs sauve les castors de la soif, mais la survie à long terme dépend de notre capacité à maîtriser le flux d'eau.\n\nConstruisez une série de barrages à travers la rivière la plus proche d'une rive à l'autre et voyez ce qui se passe."
deDE = "Die Speicherung von Wasser in Reservoirs rettet die Biber vor dem Durst, aber das langfristige Überleben hängt davon ab, ob wir den Wasserfluss zähmen können.\n\nBaut eine Reihe von Dämmen über den nächstgelegenen Fluss von Ufer zu Ufer und seht, was passiert."
plPL = "Przechowywanie wody w zbiornikach ratuje bobry przed pragnieniem, ale długoterminowe przetrwanie zależy od tego, czy będziemy w stanie opanować przepływ wody.\n\nZbuduj linię tam przez najbliższą rzekę od brzegu do brzegu i zobacz, co się stanie."
ptBR = "Armazenar água em reservatórios salva os castores da sede, mas a sobrevivência a longo prazo depende de conseguirmos dominar o fluxo de água.\n\nConstrua uma linha de barragens através do rio mais próximo, de margem a margem, e veja o que acontece."
koKR = "저수지에 물을 저장하는 것은 비버가 갈증을 느끼지 않도록 도와주지만, 장기적인 생존은 우리가 물의 흐름을 제어할 수 있는지에 달려 있습니다.\n\n가까운 강을 가로질러 제방 라인을 구축하고 무슨 일이 일어나는지 지켜보세요."
csCZ = "Uchovávání vody v nádržích zachraňuje bobry před žízní, ale dlouhodobé přežití závisí na tom, zda dokážeme podřídit tok vody.\n\nPostavte řadu hrází přes blízkou řeku od břehu k břehu a uvidíte, co se stane."
viVN = "Việc giữ nước trong các bể chứa sẽ cứu các con rái cá khỏi cơn khát, nhưng sự sống sót lâu dài phụ thuộc vào việc chúng ta có thể điều khiển dòng nước hay không.\n\nHãy xây dựng một hàng đê qua con sông gần nhất từ bờ này sang bờ kia và xem điều gì sẽ xảy ra."

