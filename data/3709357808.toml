["Tutorial.Forestry.Forester"]
raw = "Бабрам патрэбная стабільная крыніца бярвення. Вось такая навіна.\n                            \nВыкарыстоўваючы ачкі навукі, якія вырабляе ваш Вынаходнік, адкрыйце Лясніка. Потым пабудуйце яго ў вобласці, дзе хочаце саджаць дрэвы."
status = "normal"
enUS = "Beavers need a stable source of logs. Here’s the scoop.\n\nUsing the science points produced by your Inventor, unlock the Forester. Then build it in the area where you want to plant trees."
zhCN = "海狸需要一个稳定的木头来源。这是个好消息。\n\n利用您的发明家所产生的科学点，解锁林务员。然后在您想要种树的地方建造它。"
zhTW = "「海狸需要穩定的木材來源。這是一個新的消息。\n\n使用您的發明家生產的科學點，解鎖樹木工作者。然後在您想要種植樹木的區域建造它。」"
ruRU = "Бобрам нужна стабильный источник бревен. Вот и новость.\n\nИспользуя очки науки, которые производит ваш Изобретатель, откройте Лесника. Затем постройте его в области, где хотите сажать деревья."
jaJP = "ビーバーには安定した木材の供給源が必要です。こんなニュースがあります。\n\nあなたの発明家が生み出した科学ポイントを使って、フォレスターをアンロックしてください。次に、樹木を植えたい場所にそれを建ててください。"
frFR = "Les castors ont besoin d'une source stable de rondins. Voici la nouvelle.\n\nUtilisez les points de science produits par votre Inventeur pour débloquer le Forestier. Ensuite, construisez-le dans la zone où vous souhaitez planter des arbres."
deDE = "Die Biber benötigen eine stabile Quelle für Baumstämme. Hier ist eine Neuigkeit.\n                            \nNutzen Sie die Wissenschaftspunkte, die Ihr Erfinder produziert, um den Förster freizuschalten. Bauen Sie ihn dann in dem Bereich, in dem Sie Bäume pflanzen möchten."
plPL = "Bóbr potrzebuje stabilnego źródła drewna. Oto taka wiadomość.\n\nUżywając punktów nauki produkowanych przez twojego Wynalazcę, odblokuj Leśnika. Następnie zbuduj go w obszarze, w którym chcesz sadzić drzewa."
ptBR = "Os castores precisam de uma fonte estável de toras. Aqui está uma novidade.\n\nUsando os pontos de ciência que seu Inventor gera, desbloqueie o Madeireiro. Em seguida, construa-o na área onde deseja plantar árvores."
koKR = "비버는 안정적인 통나무 공급원이 필요합니다. 그런 소식입니다.\n\n당신의 발명가가 만들어내는 과학 점수를 사용하여 임업가를 해제하세요. 그런 다음 나무를 심고 싶은 지역에 그를 건설하세요."
csCZ = "Bobr potřebuje stabilní zdroj dřeva. Tady je novinka.\n\nPomocí bodů vědy, které vyrábí váš Vynálezce, odemkněte Lesníka. Poté ho postavte v oblasti, kde chcete sázet stromy."
viVN = "Người béc bàng cần một nguồn gỗ ổn định. Đây là tin tức.\n\nSử dụng điểm khoa học mà Nhà phát minh của bạn sản xuất, hãy mở Lâm nghiệp. Sau đó, xây dựng nó ở khu vực mà bạn muốn trồng cây."

["Tutorial.Forestry.MarkBirchesForPlanting"]
raw = "Выкарыстайце інструмент пасадкі дрэў і кустоў, каб пасадзіць некалькі бяроз. Яны растуць хутка, таму добра падыходзяць для маладых паселішчаў.\n                                          \nЯк і ўраджай, дрэвы растуць толькі на абрашаных зялёных участках.\n                                          \nНе забывайце адзначаць зоны пасадкі пад высечку."
status = "normal"
enUS = "Use the tree and bush planting tool to plant some birches. They grow quickly, making them suitable for young settlements.\n\nLike crops, trees only grow on cleared green areas.\n\nDon’t forget to mark the planting zones for cutting."
zhCN = "使用树木和灌木种植工具种植几棵白桦树。它们生长迅速，非常适合年轻的定居点。\n\n和农作物一样，树木只在修剪过的绿色区域生长。\n\n不要忘记标记砍伐的种植区域。"
zhTW = "使用植樹和灌木的工具來種植幾棵白樺樹。它們生長迅速，因此非常適合年輕的聚落。\n\n和農作物一樣，樹木只能在被灌溉的綠色地區生長。\n\n不要忘記標記砍伐的種植區域。"
ruRU = "Используйте инструмент посадки деревьев и кустов, чтобы посадить несколько берез. Они растут быстро, поэтому хорошо подходят для молодых поселений.\n\nКак и урожай, деревья растут только на очищенных зеленых участках.\n\nНе забывайте отмечать зоны посадки под вырубку."
jaJP = "木や茂みを植えるための道具を使って、いくつかの白樺を植えましょう。彼らは成長が早いので、新しい集落に適しています。\n\n作物と同様に、木は草むらの緑のエリアでのみ成長します。\n\n伐採のために植栽エリアをマークするのを忘れないでください。"
frFR = "Utilisez l'outil de plantation d'arbres et d'arbustes pour planter plusieurs bouleaux. Ils poussent rapidement, ce qui les rend bien adaptés aux jeunes colonies.\n\nTout comme les cultures, les arbres ne poussent que sur des zones de vert défrichées.\n\nN'oubliez pas de marquer les zones de plantation pour l'abattage."
deDE = "Verwenden Sie das Werkzeug zum Pflanzen von Bäumen und Sträuchern, um einige Birken zu pflanzen. Sie wachsen schnell und eignen sich daher gut für junge Siedlungen.\n                                          \nWie bei Ernten wachsen Bäume nur auf bewässerten grünen Flächen.\n                                          \nVergessen Sie nicht, die Pflanzzonen für die Rodung zu markieren."
plPL = "Użyj narzędzia do sadzenia drzew i krzewów, aby posadzić kilka brzóz. Rosną szybko, więc są dobrze dopasowane do młodych osiedli.\n\nPodobnie jak uprawy, drzewa rosną tylko na odnowionych zielonych obszarach.\n\nNie zapomnij zaznaczyć stref sadzenia do wycinki."
ptBR = "Use the tree and bush planting tool to plant some birches. They grow quickly, making them suitable for young settlements.\n\nAs with crops, trees only grow on cleared green areas.\n\nDon't forget to mark planting areas for cutting."
koKR = "나무와 관목 심기 도구를 사용하여 몇 그루의 자작나무를 심으세요. 이들은 자생력이 강해 젊은 정착지에 잘 어울립니다.\n                                          \n수확물처럼 나무는 단풍이 든 초록 지역에서만 자랍니다.\n                                          \n벌목을 위한 심기 구역을 표시하는 것을 잊지 마세요."
csCZ = "Použijte nástroj na sázení stromů a keřů, abyste zasadili několik bříz. Rychle rostou, takže jsou ideální pro mladé osady.\n\nStejně jako úrodu, stromy rostou pouze na vykosených zelených plochách.\n\nNezapomeňte označit oblasti pro výsadbu před těžbou."
viVN = "Sử dụng công cụ trồng cây và bụi để trồng một số cây bạch dương. Chúng phát triển nhanh, vì vậy rất phù hợp cho các khu định cư trẻ.\n\nGiống như vụ thu hoạch, cây chỉ phát triển trên các khu vực xanh đã được tưới nước.\n\nĐừng quên đánh dấu các khu vực trồng cây cho việc khai thác."

