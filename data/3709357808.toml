["Faction.Folktails.Description"]
raw = "Нязмушаныя, але працавітыя, Народныя хвасты - вопытныя земляробы. Яны шануюць прыроду, а тая ўзнагароджвае іх багатымі ўраджаямі.\nІх дэвіз: <i>Камфорт, ежа і моцная драўніна.</i>"
status = "normal"
enUS = "Unpretentious but hardworking, the Folktails are experienced tillers of the earth. They cherish nature, and it rewards them with bountiful harvests.  \nTheir motto: <i>Comfort, food, and strong timber.</i>"
zhCN = "“勤劳而不服输的人民尾巴是经验丰富的农民。他们尊重自然，而自然回报他们以丰收。\n他们的座右铭是：<i>舒适、食物和坚固的木材。</i>”"
zhTW = "不拘小节但勤奋的人民尾巴是经验丰富的农民。他们尊重自然，而自然以丰收来回报他们。  \n他们的座右铭：<i>舒适、粮食和坚固的木材。</i>"
ruRU = "Невольные, но трудолюбивые, Народные хвосты - опытные земледельцы. Они ценят природу, а она вознаграждает их богатым урожаем. Их девиз: <i>Комфорт, еда и крепкая древесина.</i>"
jaJP = "強制されないが勤勉なフォークテイルズは経験豊かな農民です。彼らは自然を尊重し、自然は豊かな収穫で彼らに報います。  \n彼らの標語: <i>快適さ、食べ物、そして強固な木材。</i>"
frFR = "Non contraints, mais travailleurs, les Folktails sont des agriculteurs expérimentés. Ils honorent la nature, qui les récompense avec des récoltes abondantes. Leur devise : <i>Confort, nourriture et bois robuste.</i>"
deDE = "Unermüdlich, aber fleißig, die Folktails sind erfahrene Landwirte. Sie schätzen die Natur, und diese belohnt sie mit reichem Ertrag. Ihr Motto: <i>Komfort, Essen und starkes Holz.</i>"
plPL = "Niezmuszeni, ale pracowici, Ludowe ogony to doświadczeni rolnicy. Szanują naturę, a ta nagradza ich obfitymi plonami. \nIch hasło: <i>Komfort, jedzenie i mocne drewno.</i>"
ptBR = "Despretensiosos, mas trabalhadores, os Folktails são agricultores experientes. Eles valorizam a natureza, que os recompensa com colheitas abundantes. Seu lema: <i>Conforto, comida e madeira resistente.</i>"
koKR = "강제되지 않았지만 부지런한, 민속의 꼬리들은 숙련된 농부들입니다. 그들은 자연을 존중하며, 자연은 그들에게 풍성한 수확으로 보답합니다. 그들의 모토: <i>편안함, 음식, 그리고 튼튼한 나무.</i>"
csCZ = "Nepřesvědčení, ale pracovití, Národní ocásci - zkušení zemědělci. Cení si přírody, která je odměňuje bohatými úrodami.  \nJejich motto: <i>Komfort, jídlo a silné dřevo.</i>"
viVN = "Không bị ép buộc nhưng chăm chỉ, Nhân Dân Huyền Bí là những người nông dân dày dạn kinh nghiệm. Họ tôn trọng thiên nhiên, và thiên nhiên thưởng cho họ những vụ mùa phong phú.\nKhẩu hiệu của họ: <i>Sự thoải mái, thức ăn và gỗ chắc khỏe.</i>"
trTR = "Zorunlu değil, ama çalışkan olan Halk Kuyrukları - deneyimli tarımcılardır. Doğayı onurlandırırlar ve doğa onlara bol mahsulleri ile ödüllendirir. \nOnların sloganı: <i>Konfor, yiyecek ve sağlam odun.</i>"

