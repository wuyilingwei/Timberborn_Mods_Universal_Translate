["Tutorial.Wellbeing.SetWorkingHours"]
raw = "Памятайце, што бабрам патрэбен вольны час, каб есці, піць, спаць і карыстацца атракцыёнамі паселішча.\n                                    \nКаб максімальна павысіць прадукцыйнасць, трэба збалансаваць дабрабыт работнікаў і іх працоўны час.\n                                    \nПакуль што вернемся да стандартнага працоўнага часу."
status = "normal"
enUS = "Remember that beavers need free time to eat, drink, sleep, and enjoy the attractions of the settlement.\n\nTo maximize productivity, it is necessary to balance workers' well-being and their working hours.\n\nFor now, let's return to the standard working hours."
zhCN = "请记住，海狸需要空闲时间来吃、喝、睡和享受定居点的设施。\n\n为了最大限度地提高生产力，必须平衡员工的幸福感和他们的工作时间。\n\n现在我们将恢复到标准工作时间。"
zhTW = "「請記住，河狸需要空閒時間來吃飯、喝水、睡覺和享受聚居地的設施。\n\n為了最大化生產力，必須平衡員工的福祉和他們的工作時間。\n\n暫時我們將恢復標準工作時間。」"
ruRU = "Помните, что бобрам нужно свободное время, чтобы есть, пить, спать и пользоваться аттракционами поселения.\n\nЧтобы максимально повысить продуктивность, нужно сбалансировать благосостояние работников и их рабочее время.\n\nПока что вернёмся к стандартному рабочему времени."
jaJP = "ビーバーには食べたり、飲んだり、寝たり、集落のアトラクションを利用するための自由な時間が必要であることを忘れないでください。\n\n生産性を最大化するためには、労働者の福祉と労働時間のバランスを取る必要があります。\n\nとりあえず、標準的な労働時間に戻りましょう。"
frFR = "N'oubliez pas que les castors ont besoin de temps libre pour manger, boire, dormir et profiter des attractions du village.\n\nPour maximiser la productivité, il est essentiel d'équilibrer le bien-être des employés et leur temps de travail.\n\nPour l'instant, revenons à l'horaire de travail standard."
deDE = "Denken Sie daran, dass Biber Freizeit benötigen, um zu essen, zu trinken, zu schlafen und die Attraktionen der Siedlung zu nutzen.\n\nUm die Produktivität maximal zu steigern, muss das Wohlbefinden der Arbeiter und ihre Arbeitszeiten ausgewogen sein.\n\nLassen Sie uns vorerst zu den standardmäßigen Arbeitszeiten zurückkehren."
plPL = "Pamiętaj, że bobrom potrzebny jest czas wolny na jedzenie, picie, spanie i korzystanie z atrakcji osady.\n\nAby maksymalnie zwiększyć wydajność, należy zrównoważyć dobrobyt pracowników i ich czas pracy.\n\nNa razie wróćmy do standardowego czasu pracy."
ptBR = "Lembre-se de que os castores precisam de tempo livre para comer, beber, dormir e aproveitar as atrações da cidade.\n\nPara maximizar a produtividade, é necessário equilibrar o bem-estar dos trabalhadores e seu horário de trabalho.\n\nPor enquanto, vamos voltar ao horário de trabalho padrão."
koKR = "비버가 식사하고, 물을 마시고, 잠을 자고, 정착지의 어트랙션을 이용할 수 있는 자유 시간이 필요하다는 것을 기억하세요.\n                                    \n최대한의 생산성을 높이기 위해서는 근로자들의 복지와 근무 시간을 균형 있게 조정해야 합니다.\n                                    \n현재는 표준 근무 시간으로 돌아갑니다."
csCZ = "Pamatujte, že bobrům potřebují volný čas na jídlo, pití, spánek a využívání atrakcí osady.\n\nAbychom co nejvíce zvýšili produktivitu, je třeba vyvážit pohodu pracovníků a jejich pracovní čas.\n\nZatím se vraťme k standardní pracovní době."
viVN = "Hãy nhớ rằng những con hải ly cần thời gian rảnh để ăn, uống, ngủ và sử dụng các tiện ích trong khu định cư.\n\nĐể tối đa hóa năng suất, cần cân bằng phúc lợi của công nhân và thời gian làm việc của họ.\n\nTạm thời, chúng ta sẽ trở lại giờ làm việc tiêu chuẩn."

["Tutorial.Wellbeing.Shrub"]
raw = "Дабрабыт таксама павышаецца побач з упрыгожаннямі. Бабры не падыходзяць да іх наўмысна, таму размяшчайце ўпрыгожанні блізка да месцаў, дзе бываюць вашы паселенцы.\n                          \nКуст - найпрасцейшае ўпрыгожанне, і бабры цэняць кожны кавалак зеляніны."
status = "normal"
enUS = "Wellbeing also improves next to decorations. Beavers do not approach them on purpose, so place the decorations close to the areas where your settlers gather.\n\nThe shrub is the simplest decoration, and beavers appreciate every bit of greenery."
zhCN = "幸福感在装饰物旁边也会提高。海狸们不会特意靠近它们，所以请将装饰物放置在您的居民常出现的地方。\n\n灌木是最简单的装饰，海狸们珍视每一片绿化。"
zhTW = "幸福感在裝飾物附近也會提高。海狸不會故意接近它們，因此請將裝飾物放置在您的居民經常造訪的地方。\n\n灌木叢是最簡單的裝飾，海狸非常欣賞每一片綠意。"
ruRU = "Благосостояние также повышается рядом с украшениями. Бобры не подходят к ним намеренно, поэтому размещайте украшения близко к местам, где бывают ваши поселенцы.\n\nКуст - самое простое украшение, и бобры ценят каждый кусочек зелени."
jaJP = "ウェルビーイングの向上は装飾品の近くでも上昇します。ビーバーは意図的にそれらに近づかないため、あなたの入植者たちが訪れる場所の近くに装飾品を配置してください。\n                          \n低木は最もシンプルな装飾であり、ビーバーは緑の一片を大切にします。"
frFR = "Le bien-être augmente également à proximité des décorations. Les castors ne s'en approchent pas intentionnellement, donc placez les décorations près des endroits où se trouvent vos colons.\n\nLe buisson est la décoration la plus simple, et les castors apprécient chaque morceau de verdure."
deDE = "Wohlergehen erhöht sich auch in der Nähe von Dekorationen. Biber gehen absichtlich nicht in ihre Nähe, also platziere die Dekorationen nahe bei den Orten, an denen sich deine Siedler aufhalten.\n\nDer Strauch ist die einfachste Dekoration, und Biber schätzen jeden Teil des Grüns."
plPL = "Dobrobyt wzrasta również w pobliżu dekoracji. Bóbr nie podchodzi do nich celowo, dlatego umieszczaj dekoracje blisko miejsc, w których przebywają twoi osadnicy.\n\nKrzak to najprostsza dekoracja, a bobry cenią każdy kawałek zieleni."
ptBR = "O bem-estar também aumenta perto das decorações. Os castores não se aproximam intencionalmente delas, por isso coloque as decorações perto dos locais onde seus colonos costumam frequentar.\n\nO arbusto é a decoração mais simples, e os castores valorizam cada pedaço de verdura."
koKR = "웰빙은 장식물 근처에서도 향상됩니다. 비버들은 고의로 그곳에 가까이 다가가지 않으므로, 주민들이 자주 지나는 장소 근처에 장식물을 배치하세요.\n\n관목은 가장 간단한 장식이며, 비버들은 모든 풀의 조각을 소중히 여깁니다."
csCZ = "Blaho se také zvyšuje v blízkosti dekorací. Bobři se k nim úmyslně nepřibližují, proto umisťujte dekorace blízko míst, kde se vyskytují vaši obyvatelé.\n\nKeř je nejjednodušší dekorace a bobři ocení každý kousek zeleně."
viVN = "Phúc lợi cũng tăng lên gần các đồ trang trí. Bọ gỗ không đến gần chúng một cách chủ ý, vì vậy hãy đặt đồ trang trí gần những nơi mà cư dân của bạn thường lui tới.\n\nH bush là đồ trang trí đơn giản nhất, và bọ gỗ đánh giá cao mỗi mảnh xanh tươi."

["Tutorial.Wellbeing.WellbeingPanel"]
raw = "Для баброў важнае ўсё грамадства. Сярэдні дабрабыт вашага паселішча паказаны ў левым верхнім куце экрана.\n                                   \nНацісніце на яго, каб убачыць задавальненне ўсіх магчымых патрэб. Ёсць шмат спосабаў зрабіць жыццё ў пусташы больш зносным."
status = "normal"
enUS = "For beavers, the entire community is important. The average wellbeing of your settlement is displayed in the top left corner of the screen.\n\nClick on it to see the satisfaction of all possible needs. There are many ways to make life in the wasteland more bearable."
zhCN = "对于海狸来说，整个社会都是重要的。您定居点的平均幸福感显示在屏幕的左上角。\n\n点击它可以查看满足所有可能需求的满意度。有很多方法可以使荒野的生活更易于忍受。"
zhTW = "對於海狸來說，整個社會都是重要的。您定居點的平均幸福指數顯示在螢幕的左上角。\n                                   \n點擊它以查看所有可能需求的滿足度。有許多方法可以讓在荒地中的生活更加舒適。"
ruRU = "Для бобров важна все общество. Средний благосостояние вашего поселения показано в левом верхнем углу экрана.\n\nНажмите на него, чтобы увидеть удовлетворение всех возможных потребностей. Есть много способов сделать жизнь в пустоши более сносной."
jaJP = "ビーバーにとって、すべての社会が重要です。あなたの集落の平均的な幸福度は画面の左上隅に表示されています。\n\nそれをクリックして、すべての可能なニーズの満足度を確認してください。荒地での生活をより快適にする方法はたくさんあります。"
frFR = "Pour les castors, la communauté est essentielle. Le bien-être moyen de votre colonie est affiché dans le coin supérieur gauche de l'écran.\n\nCliquez dessus pour voir la satisfaction de tous les besoins possibles. Il existe de nombreuses façons de rendre la vie dans la friche plus supportable."
deDE = "Für Biber ist die gesamte Gemeinschaft wichtig. Das durchschnittliche Wohlergehen Ihrer Siedlung wird in der oberen linken Ecke des Bildschirms angezeigt.\n\nKlicken Sie darauf, um die Zufriedenheit aller möglichen Bedürfnisse zu sehen. Es gibt viele Möglichkeiten, das Leben in der Wildnis erträglicher zu gestalten."
plPL = "Zarówno społeczność jest ważna dla bobrów. Średni dobrobyt twojej osady jest pokazany w lewym górnym rogu ekranu.\n\nKliknij na niego, aby zobaczyć zadowolenie z wszystkich możliwych potrzeb. Istnieje wiele sposobów, aby uczynić życie w pustkowiu bardziej znośnym."
ptBR = "Para os castores, tudo na sociedade é importante. O bem-estar médio da sua colônia é mostrado no canto superior esquerdo da tela.\n\nClique nele para ver a satisfação de todas as necessidades possíveis. Há muitas maneiras de tornar a vida na terra devastada mais suportável."
koKR = "비버에게는 모든 공동체가 중요합니다. 귀하의 정착지의 평균 복지는 화면의 왼쪽 상단 모서리에 표시됩니다.\n\n그것을 클릭하면 모든 가능한 필요에 대한 만족도를 확인할 수 있습니다. 황무지에서의 삶을 더 견딜 수 있도록 만드는 방법은 많습니다."
csCZ = "Pro bobry je důležitá celá společnost. Průměrná pohoda vaší osady je zobrazena v levém horním rohu obrazovky.\n\nKlepněte na ni, abyste viděli spokojenost se všemi možnými potřebami. Existuje mnoho způsobů, jak učinit život v pustiny snesitelnějším."
viVN = "Đối với những chú béo, cả cộng đồng đều quan trọng. Độ phúc lợi trung bình của khu định cư của bạn được hiển thị ở góc trên bên trái của màn hình.\n\nNhấn vào đó để xem mức độ hài lòng của tất cả các nhu cầu có thể. Có nhiều cách để làm cho cuộc sống ở vùng hoang dã trở nên dễ chịu hơn."

