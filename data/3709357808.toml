["Tutorial.Housing.Lodges"]
raw = "Два бабры лепш за аднаго! Дамы паляпшаюць дабрабыт вашых баброў і дазваляюць расці папуляцыі Народных хвастоў.\n                                      \nБабры аўтаматычна замацоўваюцца за даступнымі жылымі месцамі."
status = "normal"
enUS = "Two beavers are better than one! Lodges improve the well-being of your beavers and allow the population of the Tailfolk to grow.\n\nBeavers automatically occupy available housing spots."
zhCN = "两个海狸胜过一个！小屋改善你的海狸的福祉，并允许人民尾巴的人口增长。\n\n海狸会自动分配到可用的居住空间。"
zhTW = "兩隻海狸比一隻好！小屋改善您的海狸福利，並允許人民的尾巴族群增長。\n\n海狸會自動分配到可用的居住空間。"
ruRU = "Два бобра лучше одного! Дома улучшают благосостояние ваших бобров и позволяют расти популяции Народных хвостов.\n\nБобры автоматически прикрепляются к доступным жилым местам."
jaJP = "「二匹のビーバーは一匹よりも優れている！家はビーバーの福祉を向上させ、国民の尾の数を増やすことができます。\n\nビーバーは自動的に空き住宅に割り当てられます。」"
frFR = "Deux castors valent mieux qu'un ! Les maisons améliorent le bien-être de vos castors et permettent à la population des queues populaires de croître.\n\nLes castors sont automatiquement assignés aux logements disponibles."
deDE = "Zwei Biber sind besser als einer! Die Lodges verbessern das Wohlergehen Ihrer Biber und ermöglichen das Wachstum der Population der Volksschwänze.\n\nBiber werden automatisch den verfügbaren Wohnplätzen zugewiesen."
plPL = "Dwa bobry lepsze niż jeden! Chatki poprawiają dobrobyt twoich bobrów i pozwalają na wzrost populacji Ludzkichogonów.\n\nBobry automatycznie przydzielają się do dostępnych miejsc mieszkalnych."
ptBR = "Dois castores são melhores que um! As moradias melhoram o bem-estar dos seus castores e permitem o crescimento da população de Caudas do Povo.\n                                      \nOs castores se alocam automaticamente nos espaços residenciais disponíveis."
koKR = "두 마리 비버가 한 마리보다 낫다! 쉼터는 비버의 복지를 향상시키고 인구를 늘릴 수 있게 해준다.\n\n비버는 자동으로 사용 가능한 주거 공간에 배정된다."
csCZ = "Dva bobři jsou lepší než jeden! Dromy zlepšují blahobyt vašich bobrů a umožňují růst populací Národních ocasů.\n\nBobři se automaticky přiřazují k dostupným obytným místům."
viVN = "Hai con ướp nước tốt hơn một! Các nhà nghỉ cải thiện phúc lợi cho những con ướp nước của bạn và cho phép dân số của những cái đuôi Nhân dân phát triển.\n\nNhững con ướp nước tự động được gắn vào các chỗ ở có sẵn."

