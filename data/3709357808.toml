["Building.SmallTank.FlavorDescription"]
raw = "Навучыўшыся захоўваць кожную кроплю вады, бобры змаглі прыстасавацца да суровых умоў."
status = "normal"
enUS = "Having learned to save every drop of water, beavers have adapted to harsh conditions."
