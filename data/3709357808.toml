["Building.LargeWaterPump.Description"]
raw = "Пампуе і фільтруе вялікія аб'ёмы пітной вады для баброў. Забруджванне дрэннай вадой запавольвае хуткасць помпавання."
status = "normal"
enUS = "Pumps and filters large volumes of drinking water for beavers. Contamination with dirty water slows down the pumping rate."
zhCN = "为海狸泵送和过滤大量饮用水。受污染的水会降低泵送速度。"
zhTW = "抽取並過濾大量可供海狸飲用的水。污染的水會降低抽水速度。"
ruRU = "Насосит и фильтрует большие объемы питьевой воды для бобров. Загрязнение плохой водой замедляет скоростьPump."
