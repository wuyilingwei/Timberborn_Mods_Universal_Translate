["NewGameConfigurationPanel.HardModeDescription"]
raw = "Людзі не выжылі, і вы таксама не выжывеце.\n\nВаша паселішча пачынае гульню з мізэрнымі запасамі рэсурсаў.\n\nЗасухі і дрэннаплыні лютаюць і з часам становяцца яшчэ больш жорсткімі.\n\nНавострыце разцы."
status = "normal"
enUS = "Humans did not survive, and neither will you.\n\nYour settlement starts the game with meager resources.\n\nDroughts and bad currents rage and become even harsher over time.\n\nSharpen your axes."
zhCN = "“人类未能幸存，而你也无法幸存。\n\n你的居民区开始游戏时资源极为匮乏。\n\n干旱和不良水流肆虐，并随着时间的推移变得更加严酷。\n\n磨快你的斧头。”"
zhTW = "人類未能生存下來，而你也難以存活。\n\n你的定居點以微薄的資源開始遊戲。\n\n乾旱和惡劣的潮汐肆虐，隨著時間的推移變得更加殘酷。\n\n磨利你的工具。"
ruRU = "Люди не выжили, и вы тоже не выживете.\n\nВаше поселение начинает игру с мизерными запасами ресурсов.\n\nСухие периоды и нехватка воды свирепствуют и со временем становятся еще более жестокими.\n\nЗаточите топоры."
jaJP = "人々は生き残れなかった、あなたも生き残れない。\n\nあなたの集落はわずかな資源の在庫からゲームを開始します。\n\n干ばつとひどい洪水が猛威を振るい、時間が経つにつれてさらに厳しくなります。\n\n刃を研ぎましょう。"
frFR = "Les humains n'ont pas survécu, et vous non plus.\n\nVotre colonie commence la partie avec des réserves de ressources dérisoires.\n\nLes sécheresses et les inondations se déchaînent et deviennent avec le temps encore plus impitoyables.\n\nAffûtez vos outils."
deDE = "Die Menschen haben nicht überlebt, und auch Sie werden nicht überleben.\n\nIhre Siedlung beginnt das Spiel mit mageren Ressourcen.\n\nDürre und schlechte Strömungen wüten und werden im Laufe der Zeit noch grausamer.\n\nSchärfen Sie Ihre Äxte."
plPL = "Ludzie nie przeżyli, a ty też nie przeżyjesz.\n\nTwoja osada zaczyna grę z mizernymi zapasami zasobów.\n\nSusze i złe prądy szaleją i z czasem stają się jeszcze bardziej okrutne.\n\nNaostrzcie narzędzia."
ptBR = "As pessoas não sobreviveram, e você também não sobreviverá.\n\nSua colônia começa o jogo com míseros suprimentos de recursos.\n\nSecas e inundações ferozes dominam e se tornam ainda mais cruéis com o tempo.\n\nAperfeiçoe suas habilidades."
koKR = "인간은 생존하지 못했고, 당신도 생존하지 못할 것입니다.\n\n당신의 정착지는 미미한 자원으로 게임을 시작합니다.\n\n가뭄과 불황이 맹위를 떨치며 시간이 지날수록 더욱 잔혹해집니다.\n\n도끼를 날카롭게 갈아두세요."
csCZ = "Lidé nepřežili, a vy také nepřežijete.\n\nVáš osada začíná hru s mizernými zásobami zdrojů.\n\nSucha a silné povodně zuří a časem se stávají ještě krutějšími.\n\nOstřete sekery."
viVN = "Nhân loại đã không tồn tại, và bạn cũng sẽ không sống sót.\n\nKhu định cư của bạn bắt đầu trò chơi với lượng tài nguyên ít ỏi.\n\nHạn hán và lũ lụt hoành hành và theo thời gian trở nên khắc nghiệt hơn.\n\nHãy chuẩn bị sẵn sàng."

