enUS = "Creative plumbing is the first skill that every beaver from the void should master."
zhCN = "创造性水暖工艺是每个空心河狸必须掌握的第一项技能。"
zhTW = "創意水管工藝是每個孤獨海狸必須掌握的第一項技能。"
ruRU = "Творческая сантехника — первый навык, который должен освоить каждый бобер из пустоши."
