["LoadingIssue.MapIssuesWarning"]
raw = "Гэта, хутчэй за ўсё, выклікана адсутнасцю патрэбных модаў або больш новай версіяй гульні.\n\nВы можаце працягнуць гульню, але карта можа быць няпоўнай."
status = "normal"
enUS = "This is most likely caused by the absence of required mods or a newer version of the game.\n\nYou can continue the game, but the map may be incomplete."
zhCN = "“这很可能是由于缺少所需的模组或游戏版本过新造成的。\n\n您可以继续游戏，但地图可能不完整。”"
zhTW = "“這很可能是由於缺少必要的模組或遊戲的更新版本造成的。\n\n您可以繼續遊戲，但地圖可能不完整。”"
ruRU = "Это, скорее всего, вызвано отсутствием необходимых модов или более новой версией игры.\n\nВы можете продолжить игру, но карта может быть неполной."
jaJP = "これはおそらく、必要なモッドが不足しているか、ゲームの新しいバージョンによるものです。\n\nゲームを続行することはできますが、マップが不完全である可能性があります。"
frFR = "Ceci est probablement causé par l'absence des mods nécessaires ou par une version du jeu plus récente. \n\nVous pouvez continuer à jouer, mais la carte peut être incomplète."
deDE = "Dies wird wahrscheinlich durch das Fehlen der benötigten Mods oder einer neueren Version des Spiels verursacht.\n\nSie können das Spiel fortsetzen, aber die Karte könnte unvollständig sein."
plPL = "To prawdopodobnie spowodowane jest brakiem wymaganych modów lub nowszą wersją gry.\n\nMożesz kontynuować grę, ale mapa może być niekompletna."
ptBR = "Isto é provavelmente causado pela falta dos mods necessários ou por uma versão mais recente do jogo.\n\nVocê pode continuar o jogo, mas o mapa pode estar incompleto."
koKR = "이것은 아마도 필요한 모드가 없거나 게임의 최신 버전으로 인한 것입니다.\n\n게임을 계속할 수는 있지만 지도에 일부 내용이 부족할 수 있습니다."
csCZ = "To je pravděpodobně způsobeno nedostatkem potřebných módů nebo novější verzí hry.\n\nMůžete pokračovat ve hře, ale mapa může být neúplná."
viVN = "Điều này có thể xảy ra do thiếu các mô-đun cần thiết hoặc phiên bản trò chơi mới hơn.\n\nBạn có thể tiếp tục chơi, nhưng bản đồ có thể không đầy đủ."

