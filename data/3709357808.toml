["Building.Overhang.FlavorDescription"]
raw = "«О, падобна, мы будуем лесвіцу ў аблокі. Гэта прымушае мяне задумацца...» — Піна"
status = "normal"
enUS = "\"Oh, it seems we are building a staircase into the clouds. It makes me ponder...\" - Pina"
zhCN = "“哦，看来我们在建造通向云端的楼梯。这让我想起了……”—皮纳"
zhTW = "「哦，看來我們正在建造通向雲霄的梯子。這讓我思考……」——皮娜"
