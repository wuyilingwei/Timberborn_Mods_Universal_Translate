["Tutorial.Science.Inventor"]
raw = "Бабры - інжынеры жывёльнага свету. Час увасобіць іх ідэі драўняпанку ў рэальнасць.\n                           \nПабудуйце Вынаходніка, каб вырабляць ачкі навукі."
status = "normal"
enUS = "Bears are the engineers of the animal kingdom. It's time to bring their ideas of woodpunk to reality.\n\nBuild the Inventor to produce science points."
zhCN = "海狸是动物世界的工程师。是时候将他们的木头朋克理念变为现实。\n\n建造发明家，以生产科学点数。"
zhTW = "「海狸是動物界的工程師。是時候將他們的樹木激光理念變為現實。\n\n建造發明家來生產科學點數。」"
ruRU = "Бобры - инженеры животного мира. Время воплотить их идеи древесного панка в реальность.\n                           \nПостройте Изобретателя, чтобы производить очки науки."
jaJP = "ビーバーは動物界のエンジニアです。彼らの木工アイデアを現実にする時が来ました。  \n発明家を建設して科学ポイントを生産しましょう。"
frFR = "Les castors sont les ingénieurs du monde animal. Il est temps de concrétiser leurs idées de bois en réalité.\n\nConstruisez l'Inventeur pour produire des points de science."
deDE = "Biber sind die Ingenieure der Tierwelt. Es ist an der Zeit, ihre Ideen von Baumtechnik in die Realität umzusetzen.\n\nBaue einen Erfinder, um Wissenschaftspunkte zu produzieren."
plPL = "Bobry to inżynierowie świata zwierząt. Czas zrealizować ich pomysły na drewniane wynalazki w rzeczywistości.\n\nZbuduj Wynalazcę, aby zdobywać punkty nauki."
ptBR = "Os castores são os engenheiros do mundo animal. É hora de transformar suas ideias de lenhador em realidade.\n\nConstrua o Inventor para gerar pontos de ciência."
koKR = "비버는 동물 세계의 엔지니어입니다. 그들의 아이디어를 실제로 구현할 때입니다.\n                           \n발명가를 건설하여 과학 점수를 생산하세요."
csCZ = "Bobři jsou inženýři zvířecího světa. Čas zrealizovat jejich nápady na dřevu ve skutečnost. \n\nPostavte Vynálezce, abyste vyráběli vědecké body."
viVN = "Beaver là kỹ sư của thế giới động vật. Đã đến lúc hiện thực hóa ý tưởng của chúng về cây gỗ.\n\nXây dựng Nhà phát minh để tạo ra điểm khoa học."

["Tutorial.Science.SciencePoints"]
raw = "Пакуль што дазвольце Вынаходніку працаваць.\n                                \nКалі назапасіце дастаткова ачкоў навукі, мы выдаткуем іх, каб адкрыць больш прасунутыя будынкі."
status = "normal"
enUS = "For now, let the Inventor work. \n\nOnce you accumulate enough science points, we will spend them to unlock more advanced buildings."
zhCN = "目前请允许发明家工作。\n                                \n当你积累足够的科学点时，我们将花费它们来解锁更高级的建筑。"
zhTW = "目前請允許發明家工作。\n\n當你積累足夠的科學點數時，我們將消耗它們來解鎖更高級的建築。"
ruRU = "Пока что позвольте Изобретателю работать.\n                                \nКогда вы накопите достаточно очков науки, мы потратим их, чтобы открыть более продвинутые здания."
jaJP = "「今は発明家に働かせてください。 \n\n十分な科学ポイントを蓄積したら、私たちはそれを使ってより高度な建物を解放します。」"
frFR = "Pour l'instant, laissez l'Inventeur travailler. \n\nLorsque vous aurez accumulé suffisamment de points de science, nous les dépensons pour débloquer des bâtiments plus avancés."
deDE = "„Lassen Sie den Erfinder vorerst arbeiten. \n                                \nWenn Sie genügend Wissenschaftspunkte angesammelt haben, werden wir sie ausgeben, um fortschrittlichere Gebäude freizuschalten.“"
plPL = "Na razie pozwól wynalazcy pracować.\n\nKiedy zgromadzisz wystarczającą ilość punktów nauki, wydamy je, aby odblokować bardziej zaawansowane budynki."
ptBR = "Por enquanto, deixe o Inventor trabalhar.\n\nQuando você acumular pontos de ciência suficientes, nós os usaremos para desbloquear construções mais avançadas."
koKR = "현재로서는 발명가에게 작업을 허용해 주세요.\n\n충분한 과학 점수를 모으면, 우리는 더 고급 건물을 열기 위해 그것들을 사용할 것입니다."
csCZ = "Zatím dovolte Vynálezci pracovat.\n\nJakmile nasbíráte dostatek vědeckých bodů, použijeme je k odemčení pokročilejších budov."
viVN = "Hiện tại hãy để Nhà phát minh làm việc.\n                                \nKhi bạn tích lũy đủ điểm khoa học, chúng tôi sẽ sử dụng chúng để mở khóa những tòa nhà tiên tiến hơn."

