["Building.TappersShack.FlavorDescription"]
raw = "Бобрят з маленства вучаць, што кожная кропля мае значэнне — ці то вада, ці смала."
status = "normal"
enUS = "Beavers are taught from a young age that every drop counts — whether it's water or resin."
zhCN = "“从小就教导海狸，每一滴水都很重要——无论是水还是树脂。”"
zhTW = "小比鼠從小就被教導，每一滴都是重要的——無論是水還是樹脂。"
ruRU = "Бобры с детства учат, что каждая капля имеет значение — будь то вода, будь то смола."
jaJP = "子供のころからビーバーは、どんな一滴も大切であることを教えられます。それが水であれ、樹脂であれ。"
frFR = "Les castors apprennent dès leur enfance que chaque goutte compte — que ce soit de l'eau ou de la sève."
deDE = "Biber lernen von klein auf, dass jeder Tropfen zählt – sei es Wasser oder Harz."
plPL = "Bobry uczą się od małego, że każda kropla ma znaczenie — czy to woda, czy żywica."
ptBR = "Os castorzinhos aprendem desde pequenos que cada gota conta — seja água ou resina."
koKR = "어린 시절, 비버들은 모든 방울이 중요하다는 것을 배웁니다 — 물이든 송진이든."
csCZ = "Bobříci se od mala učí, že každá kapka má význam — ať už je to voda, nebo pryskyřice."
viVN = "Những chú beaver từ nhỏ đã được dạy rằng mỗi giọt nước đều có ý nghĩa - dù là nước hay nhựa."
trTR = "Çocukluktan itibaren kundakçılar, her damlanın önemli olduğunu öğretiyor - ister su, ister reçin olsun."

