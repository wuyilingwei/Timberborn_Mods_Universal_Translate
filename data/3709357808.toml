["Building.SwimmingPoll.FlavorDescription"]
raw = "«Нядрэнны час, але нам яшчэ трэба папрацаваць над ударам хвастом!» — Піна"
status = "normal"
enUS = "“It’s a rough time, but we still need to work on our tail whip!” — Pina"
