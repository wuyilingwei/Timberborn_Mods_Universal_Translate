["Tutorial.Wellbeing.Beaver"]
raw = "Вы можаце бачыць, як вашы дзеянні ўплываюць на баброў.\n                           \nВыберыце бабра, націснуўшы на яго. На панэлі вы ўбачыце яго бягучы дабрабыт, атрыбуты і патрэбы.\n                           \nНекаторыя патрэбы могуць дасягаць адмоўных значэнняў і накладаць сур'ёзныя штрафы або прыводзіць да смерці."
status = "normal"
enUS = "You can see how your actions affect the beavers.\n\nSelect a beaver by clicking on it. On the panel, you will see its current well-being, attributes, and needs.\n\nSome needs can reach negative values and impose serious penalties or lead to death."
zhCN = "“您可以看到您的行为如何影响海狸。\n\n选择一只海狸，点击它。在面板上，您会看到它的当前幸福度、属性和需求。\n\n某些需求可能会达到负值，并施加严重的惩罚或导致死亡。”"
zhTW = "您可以看到您的行為如何影響海狸。\n\n選擇一隻海狸，通過點擊它。在面板上，您將看到它當前的福祉、屬性和需求。\n\n某些需求可能會達到負值，並施加嚴重的懲罰或導致死亡。"
ruRU = "Вы можете видеть, как ваши действия влияют на бобров.\n\nВыберите бобра, кликнув на него. На панели вы увидите его текущее благополучие, атрибуты и потребности.\n\nНекоторые потребности могут достигать отрицательных значений и накладывать серьезные штрафы или приводить к смерти."
jaJP = "あなたの行動がビーバーにどのように影響を与えるかを見ることができます。\n\nビーバーを選択するには、クリックしてください。パネルには彼の現在の幸福度、属性、必要性が表示されます。\n\nいくつかの必要性は負の値に達する可能性があり、深刻なペナルティを課したり、死亡につながることがあります。"
frFR = "Vous pouvez voir comment vos actions affectent les castors.\n\nSélectionnez un castor en cliquant dessus. Sur le panneau, vous verrez son bien-être actuel, ses attributs et ses besoins.\n\nCertains besoins peuvent atteindre des valeurs négatives et entraîner de graves pénalités ou même la mort."
deDE = "Sie können sehen, wie Ihre Aktionen die Biber beeinflussen.\n\nWählen Sie einen Biber aus, indem Sie auf ihn klicken. Im Panel sehen Sie sein aktuelles Wohlbefinden, seine Attribute und Bedürfnisse.\n\nEinige Bedürfnisse können negative Werte erreichen und ernsthafte Strafen verursachen oder zum Tod führen."
plPL = "Możesz zobaczyć, jak twoje działania wpływają na bobry.\n\nWybierz bobra, klikając na niego. Na panelu zobaczysz jego aktualne dobrostan, atrybuty i potrzeby.\n\nNiektóre potrzeby mogą osiągać wartości ujemne i nakładać poważne kary lub prowadzić do śmierci."
ptBR = "Você pode ver como suas ações impactam os castores. \n                           \nSelecione um castor clicando nele. No painel, você verá seu bem-estar atual, atributos e necessidades. \n                           \nAlgumas necessidades podem atingir valores negativos e impor penalidades severas ou levar à morte."
koKR = "당신은 당신의 행동이 비버에게 미치는 영향을 볼 수 있습니다.\n                           \n비버를 클릭하여 선택하세요. 패널에서 현재 복지, 특성 및 필요를 확인할 수 있습니다.\n                           \n일부 필요는 부정적인 값에 도달할 수 있으며, 심각한 패널티를 부과하거나 죽음에 이를 수 있습니다."
csCZ = "Můžete vidět, jak vaše akce ovlivňují bobry.\n                           \nVyberte bobra kliknutím na něj. Na panelu uvidíte jeho aktuální pohodu, atributy a potřeby.\n                           \nNěkteré potřeby mohou dosahovat negativních hodnot a způsobit vážné postihy nebo vést k úmrtí."
viVN = "Bạn có thể thấy hành động của bạn ảnh hưởng đến những con nhím.\n                           \nChọn một con nhím bằng cách nhấp vào nó. Trên bảng điều khiển, bạn sẽ thấy sự thịnh vượng hiện tại, thuộc tính và nhu cầu của nó.\n                           \nMột số nhu cầu có thể đạt đến giá trị âm và áp đặt những hình phạt nghiêm trọng hoặc dẫn đến cái chết."

["Tutorial.Wellbeing.Campfire"]
raw = "Дабрабыт - гэта паказчык, які паказвае, наколькі задаволены бабёр. Ён уплывае на тры атрыбуты: хуткасць працы, хуткасць перамяшчэння і працягласць жыцця.\n                             \nАдзін з галоўных спосабаў павысіць дабрабыт - гэта атракцыі. Атракцыі - гэта будынкі, у якія бабры заходзяць, калі не працуюць."
status = "normal"
enUS = "Wellbeing is an indicator that shows how satisfied a beaver is. It influences three attributes: work speed, movement speed, and lifespan.\n\nOne of the main ways to increase wellbeing is through attractions. Attractions are buildings that beavers enter when they are not working."
zhCN = "幸福感是一个指标，显示海狸的满意程度。它影响三个属性：工作速度、移动速度和寿命。\n\n提高幸福感的主要方式之一是娱乐场所。娱乐场所是海狸在不工作时进入的建筑。"
zhTW = "福祉是一個指標，顯示出海狸的滿意度。它影響三個屬性：工作速度、移動速度和壽命。\n\n提高福祉的主要方法之一是娛樂設施。娛樂設施是海狸在不工作時進入的建築物。"
ruRU = "Благосостояние - это показатель, который показывает, насколько удовлетворен бобёр. Он влияет на три атрибута: скорость работы, скорость передвижения и продолжительность жизни. \n                             \nОдин из главных способов повысить благосостояние - это аттракционы. Аттракционы - это здания, в которые бобры заходят, когда не работают."
jaJP = "ウェルビーイング - これはビーバーの満足度を示す指標です。作業速度、移動速度、寿命の3つの属性に影響を与えます。\n\nウェルビーイングを向上させる主な方法の1つはアトラクションです。アトラクションは、ビーバーが働いていないときに入る建物です。"
frFR = "Le bien-être est un indicateur qui montre à quel point le castor est satisfait. Il influence trois attributs : la vitesse de travail, la vitesse de déplacement et la durée de vie.\n\nL'un des principaux moyens d'améliorer le bien-être est les attractions. Les attractions sont des bâtiments dans lesquels les castors entrent lorsqu'ils ne travaillent pas."
deDE = "Wohlbefinden ist ein Wert, der zeigt, wie zufrieden der Biber ist. Er beeinflusst drei Attribute: Arbeitsgeschwindigkeit, Bewegungs Geschwindigkeit und Lebensdauer.\n\nEine der Hauptmöglichkeiten, das Wohlbefinden zu steigern, sind Attraktionen. Attraktionen sind Gebäude, in die die Biber gehen, wenn sie nicht arbeiten."
plPL = "Dobrobyt - to wskaźnik, który pokazuje, jak bardzo bóbr jest zadowolony. Ma wpływ na trzy atrybuty: szybkość pracy, szybkość poruszania się i długość życia.\n\nJednym z głównych sposobów na zwiększenie dobrobytu są atrakcje. Atrakcje to budynki, do których bobry wchodzą, gdy nie pracują."
ptBR = "Bem-estar é um indicador que mostra o quão satisfeito está o castor. Ele impacta três atributos: velocidade de trabalho, velocidade de movimento e expectativa de vida.\n\nUma das principais maneiras de aumentar o bem-estar são as atrações. Atrações são edificações onde os castores entram quando não estão trabalhando."
koKR = "복지 - 이는 비버가 얼마나 만족하는지를 나타내는 지표입니다. 이는 세 가지 속성에 영향을 미칩니다: 작업 속도, 이동 속도 및 수명.\n\n복지를 높이는 주요 방법 중 하나는 명소입니다. 명소는 비버가 일하지 않을 때 들어가는 건물입니다."
csCZ = "Blahobyt - to je ukazatel, který ukazuje, jak moc je bobr spokojen. Ovlivňuje tři atributy: rychlost práce, rychlost pohybu a délku života.\n\nJeden z hlavních způsobů, jak zvýšit blahobyt, jsou atrakce. Atrakce jsou budovy, do kterých bobři chodí, když nepracují."
viVN = "Phúc lợi là một chỉ số cho thấy mức độ hài lòng của con hải ly. Nó ảnh hưởng đến ba thuộc tính: tốc độ làm việc, tốc độ di chuyển và tuổi thọ.\n\nMột trong những cách chính để nâng cao phúc lợi là các điểm tham quan. Các điểm tham quan là những tòa nhà mà hải ly vào khi không làm việc."

