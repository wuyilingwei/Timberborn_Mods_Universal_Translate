["MapMetadata.Cliffside.Description"]
raw = "Руіны старажытнай чалавечай архітэктуры раскіданыя па гэтай адасобленай даліне. Бабры імкнуцца пакінуць падобны след у свеце."
status = "normal"
enUS = "Ruins of ancient human architecture are scattered throughout this secluded valley. Beavers strive to leave a similar mark on the world."
zhCN = "古老的人类建筑的遗迹散落在这个偏僻的山谷中。海狸们努力在世界上留下类似的痕迹。"
zhTW = "「古老的人類建築的遺跡散布在這個偏僻的山谷中。海狸們努力在世界上留下類似的痕跡。」"
ruRU = "Руины древней человеческой архитектуры разбросаны по этой уединенной долине. Бобры стремятся оставить подобный след в мире."
jaJP = "古代人類の建築の遺跡がこの孤立した谷に散らばっています。ビーバーたちはこの世界に同様の足跡を残そうとしています。"
frFR = "Les ruines d'anciennes architectures humaines sont éparpillées dans cette vallée isolée. Les castors s'efforcent de laisser une empreinte similaire dans le monde."
deDE = "Ruinen antiker menschlicher Architektur sind über dieses abgelegene Tal verstreut. Biber streben danach, eine ähnliche Spur in der Welt zu hinterlassen."
plPL = "Ruiny starożytnej ludzkiej architektury rozsiane po tej odosobnionej dolinie. Bobry dążą do pozostawienia podobnego śladu w świecie."
ptBR = "As ruínas de uma antiga arquitetura humana estão espalhadas por este vale isolado. Os castores buscam deixar uma marca similar no mundo."
koKR = "고립된 계곡에 흩어져 있는 고대 인류 건축의 유적. 비버들은 세상에 비슷한 흔적을 남기려 애쓴다."
csCZ = "Zříceniny starobylé lidské architektury roztroušené po tomto odlehlém údolí. Bobři se snaží zanechat podobnou stopu ve světě."
viVN = "Di tích của nền kiến trúc cổ xưa của con người bị rải rác khắp thung lũng tách biệt này. Bọ gỗ cố gắng để lại dấu ấn tương tự trên thế giới."

