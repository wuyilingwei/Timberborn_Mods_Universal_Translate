["Building.Inventor.FlavorDescription"]
raw = "Натхнёныя спадчынай Старога Казко, бабры-вынаходнікі заўсёды ахвотна паляпшаюць сваю драўляную тэхніку."
status = "normal"
enUS = "Inspired by the legacy of Old Kasko, the beaver-inventors are always eager to improve their wooden technology."
