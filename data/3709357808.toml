["MapMetadata.Oasis.Description"]
raw = "Адзінокае зялёнае прыстанішча ў пустыні, акружанае ваданоснымі пластамі, да якіх можна дабрацца з дапамогай хітраумнай бабровай інжынерыі."
status = "normal"
enUS = "A lonely green oasis in the desert, surrounded by water-bearing layers, accessible through clever beaver engineering."
zhCN = "沙漠中孤独的绿洲，四周环绕着水源层，可以通过巧妙的海狸工程到达。"
zhTW = "「沙漠中的孤單綠洲，周圍環繞著水源層，透過巧妙的水獺工程可以抵達。」"
ruRU = "Уединённое зеленое убежище в пустыне, окруженное водоносными слоями, до которых можно добраться с помощью хитроумной бобровой инженерии."
jaJP = "砂漠の中の孤独な緑の避難所で、巧妙なビーバーの技術を使ってアクセスできる水脈に囲まれています。"
frFR = "Un refuge vert solitaire dans le désert, entouré de couches aquifères accessibles grâce à l'ingénierie astucieuse des castors."
deDE = "Eine einsame grüne Oase in der Wüste, umgeben von wasserführenden Schichten, die mit raffinierten Biber-Konstruktionen erreicht werden können."
plPL = "Osamotona zielona przystań na pustyni, otoczona warstwami wody gruntowej, do których można dotrzeć dzięki przebiegłemu bobrowemu inżynierii."
ptBR = "Um refúgio verde solitário no deserto, cercado por camadas de água que podem ser acessadas através da engenhosidade dos castores."
koKR = "사막에 있는 외로운 녹색 피난처로, 교활한 비버 공학을 통해 접근할 수 있는 수분이 풍부한 층으로 둘러싸여 있습니다."
csCZ = "Osamělý zelený přístav v poušti, obklopený vodonosnými vrstvami, ke kterým se dá dostat pomocí šikovného bobřího inženýrství."
viVN = "Nhà trọ xanh độc đáo trong sa mạc, được bao quanh bởi các lớp nước, có thể tiếp cận bằng kỹ thuật xây dựng thông minh của loài nhím."

