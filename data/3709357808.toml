["Tutorial.WorkingHours.SetWorkingHours"]
raw = "Рэгуляванне працоўнага часу - адзін са спосабаў кіравання паселішчам.\n                                       \nБольш доўгія працоўныя дні азначаюць хутчэйшы прагрэс, але кожным вечарам бабрам патрэбны час на адпачынак і сон. Не прымушайце іх занадта доўга працаваць.\n                                       \nПакуль што крыху павялічым працоўны час."
status = "normal"
enUS = "Adjusting working hours is one of the ways to manage the settlement.\n\nLonger working days mean faster progress, but every evening, beavers need time to rest and sleep. Do not make them work too long.\n\nFor now, let's slightly increase the working hours."
zhCN = "工作时间调整是管理定居点的一种方式。\n\n更长的工作日意味着更快的进展，但每个晚上海狸都需要时间休息和睡眠。不要让他们工作太久。\n\n现在我们稍微延长一下工作时间。"
zhTW = "調整工作時間是管理村莊的一種方法。\n\n更長的工作日意味著更快的進展，但每個晚上海狸需要時間休息和睡覺。不要讓他們工作太久。\n\n暫時稍微增加工作時間。"
ruRU = "Регулирование рабочего времени - один из способов управления поселением.\n\nБолее долгие рабочие дни означают более быстрый прогресс, но каждый вечер бобрам нужно время для отдыха и сна. Не заставляйте их работать слишком долго.\n\nПока что немного увеличим рабочее время."
jaJP = "労働時間の調整は、集落を管理する方法の一つです。\n\n長い労働時間はより早い進展を意味しますが、ビーバーには毎晩休息と睡眠の時間が必要です。彼らをあまり長く働かせないでください。\n\n今のところ、少し労働時間を延ばしましょう。"
frFR = "Régulation des heures de travail - l'un des moyens de gérer la colonie.\n\nDes journées de travail plus longues signifient des progrès plus rapides, mais chaque soir, les castors ont besoin de temps pour se reposer et dormir. Ne les faites pas travailler trop longtemps.\n\nPour l'instant, augmentons un peu les heures de travail."
deDE = "Die Anpassung der Arbeitszeiten ist eine der Möglichkeiten, die Siedlung zu verwalten.\n\nLängere Arbeitstage bedeuten schnelleren Fortschritt, aber jeden Abend brauchen die Biber Zeit zum Ausruhen und Schlafen. Zwinge sie nicht, zu lange zu arbeiten.\n\nLass uns vorerst die Arbeitszeit etwas erhöhen."
plPL = "Regulacja godzin pracy to jeden ze sposobów zarządzania osadą.\n\nDłuższe dni robocze oznaczają szybszy postęp, ale bobrom każdego wieczoru potrzebny jest czas na odpoczynek i sen. Nie zmuszaj ich do zbyt długiej pracy.\n\nNa razie nieco wydłużymy godziny pracy."
ptBR = "Regulamento de horas de trabalho - uma das maneiras de gerenciar a colônia.\n\nDias de trabalho mais longos significam progresso mais rápido, mas a cada noite, os castores precisam de tempo para descansar e dormir. Não os force a trabalhar por muito tempo.\n\nPor enquanto, vamos aumentar um pouco as horas de trabalho."
koKR = "근무 시간 조정 - 거주지를 관리하는 방법 중 하나입니다.\n                                       \n더 긴 근무일은 더 빠른 진행을 의미하지만, 비버들은 매일 저녁 휴식과 수면이 필요합니다. 그들이 너무 오랜 시간 일하게 하지 마세요.\n                                       \n현재는 근무 시간을 조금 늘리겠습니다."
csCZ = "Nastavení pracovních hodin - Úprava pracovního času je jedním ze způsobů řízení osady.\n\nDelší pracovní dny znamenají rychlejší pokrok, ale bobři potřebují každý večer čas na odpočinek a spánek. Nenechávejte je pracovat příliš dlouho.\n\nZatím mírně zvýšíme pracovní dobu."
viVN = "Điều chỉnh giờ làm việc - một trong những cách để quản lý khu định cư.\n\nNhững ngày làm việc dài hơn đồng nghĩa với tiến độ nhanh hơn, nhưng mỗi tối, những con beaver cần thời gian nghỉ ngơi và ngủ. Đừng bắt chúng làm việc quá lâu.\n\nTạm thời, chúng ta sẽ tăng giờ làm việc một chút."

