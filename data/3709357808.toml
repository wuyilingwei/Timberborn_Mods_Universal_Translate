["Faction.Folktails.GameOver.Flavor"]
raw = "Калі вы не карыстаецеся дарамі прыроды, яна забірае іх назад."
status = "normal"
enUS = "If you do not use the gifts of nature, it takes them back."
zhCN = "如果你不利用大自然的馈赠，它将会收回这些馈赠。"
zhTW = "如果你不利用大自然的恩惠，它就會把這些恩惠奪回。"
ruRU = "Если вы не пользуетесь дарами природы, она забирает их назад."
jaJP = "「自然の恵みを利用しないと、それは再び奪われてしまいます。」"
frFR = "Si vous n'utilisez pas les dons de la nature, elle les reprend."
deDE = "Wenn Sie die Gaben der Natur nicht nutzen, nimmt sie sie zurück."
plPL = "Jeśli nie korzystasz z darów natury, ona je zabiera z powrotem."
ptBR = "Se você não aproveitar os dons da natureza, ela os retira de volta."
koKR = "자연의 선물을 사용하지 않으면, 자연은 그것을 다시 가져갑니다."
csCZ = "Pokud nevyužíváte dary přírody, ona si je vezme zpět."
viVN = "Nếu bạn không sử dụng tài nguyên thiên nhiên, nó sẽ lấy lại chúng."
trTR = "Eğer doğanın nimetlerinden faydalanmazsanız, o onları geri alır."

["Faction.Folktails.GameOver.Message"]
raw = "Вашых Народных хвастоў спасцігла сумная доля іх чалавечых папярэднікаў. Гэта канец."
status = "normal"
enUS = "Your Folktails have met the sad fate of their human predecessors. This is the end."
zhCN = "您的民间尾巴遭遇了他们人类前辈的悲惨命运。这是结束。"
zhTW = "您的人民尾巴遭遇了其人類前任的悲慘命運。這就是結局。"
ruRU = "Ваших Народных хвостов постигла печальная судьба их человеческих предшественников. Это конец."
jaJP = "「あなたのフォークテイルの尾は、彼らの人間の先祖と同様に悲しい運命に見舞われました。これが終わりです。」"
frFR = "La triste destinée de vos queues populaires a frappé leurs prédécesseurs humains. C'est la fin."
deDE = "„Das traurige Schicksal Ihrer Volkschwänze ereilte ihre menschlichen Vorgänger. Das ist ein Ende.“"
plPL = "Zgubiliście swoje Ludowe ogony, ich ludzcy poprzednicy spotkała smutna dola. To koniec."
ptBR = "A trágica sorte dos seus Contadores Populares se abateu sobre eles, assim como sobre seus predecessores humanos. Este é o fim."
koKR = "당신의 민속 꼬리들은 그들의 인간 조상과 같은 슬픈 운명을 겪었습니다. 이것이 끝입니다."
csCZ = "Vaše Lidové ocasy postihla smutná zkáza jejich lidských předchůdců. To je konec."
viVN = "Vận mệnh bi thương đã đến với đuôi dân tộc của bạn, giống như những người tiền nhiệm của họ. Đây là kết thúc."
trTR = "Folktails fraksiyonunun insan akrabalarının trajik kaderini yaşadı. Bu son."

["Faction.Folktails.WonderCompletionFlavor"]
raw = "Назапасіўшы вялікае багацце і веды, вашы бабры падзяліліся плёнамі сваёй працы са знясіленай планетай. Яшчэ многае трэба зрабіць, але Зямля можа зноў заквітнець."
status = "normal"
enUS = "Having amassed great wealth and knowledge, your beavers shared the fruits of their labor with the exhausted planet. There is still much to be done, but the Earth can bloom again."
zhCN = "积累了巨大的财富和知识，你的海狸们把他们的劳动成果分享给了这一疲惫的星球。还有很多事情要做，但地球可以再次繁荣昌盛。"
zhTW = "儲存了巨大的財富和知識，您的海狸們將他們的勞動成果分享給疲憊的星球。仍然有很多工作要做，但地球可以再次繁榮。"
ruRU = "Запасившись большим богатством и знаниями, ваши бобры поделились плодами своего труда с истощенной планетой. Еще многое предстоит сделать, но Земля может снова зацвести."
jaJP = "「大きな富と知識を蓄えたあなたのビーバーたちは、疲れ果てた惑星と彼らの労働の成果を分かち合いました。まだ多くのことが残っていますが、地球は再び花を咲かせることができるかもしれません。」"
frFR = "En accumulant une grande richesse et des connaissances, vos castors ont partagé les fruits de leur travail avec une planète épuisée. Beaucoup de choses restent à faire, mais la Terre peut à nouveau fleurir."
deDE = "Nachdem sie großen Reichtum und Wissen angesammelt haben, teilen Ihre Biber die Früchte ihrer Arbeit mit dem erschöpften Planeten. Es gibt noch viel zu tun, aber die Erde kann wieder erblühen."
plPL = "Zgromadziwszy wielkie bogactwo i wiedzę, twoje bobry podzieliły się plonami swojej pracy z osłabioną planetą. Jeszcze wiele trzeba zrobić, ale Ziemia może znów zakwitnąć."
ptBR = "Acumulando grande riqueza e conhecimento, seus castores compartilharam os frutos de seu trabalho com o planeta exausto. Ainda há muito a ser feito, mas a Terra pode florescer novamente."
koKR = "많은 재산과 지식을 축적한 당신의 비버들은 고된 행성과 그들의 일의 결실을 나누었습니다. 아직 할 일이 많지만, 지구는 다시 꽃을 피울 수 있습니다."
csCZ = "Nasbírací velké bohatství a znalosti, vaši bobři se podělili o plody své práce s vyčerpanou planetou. Ještě mnohé je třeba udělat, ale Země může opět rozkvést."
viVN = "Đã tích lũy được sự giàu có và tri thức lớn, những con thủy quái của bạn đã chia sẻ thành quả công việc của họ với hành tinh kiệt quệ. Còn nhiều điều phải làm, nhưng Trái Đất có thể lại nở rộ."
trTR = "Büyük bir serveti ve bilgiyi biriktiren kunduzlarınız, emeklerinin meyvelerini yorgun gezegenle paylaştı. Hâlâ yapılacak çok şey var, ancak Dünya tekrar çiçek açabilir."

["Faction.Folktails.WonderCompletionMessage"]
raw = "Віншуем! Вы асвоілі прыродаарыентаваны лад Народных хвастоў і выкарысталі рэсурсы гэтай карты, каб пабудаваць цуд фракцыі."
status = "normal"
enUS = "Congratulations! You have mastered the nature-oriented lifestyle of the Folktails and used the resources of this map to build the faction's wonder."
zhCN = "恭喜！您掌握了以自然为导向的民族尾巴风格，并利用了这张地图的资源建造了该派系的奇迹。"
zhTW = "恭喜！您已掌握以自然為導向的人民尾巴的生活方式，並利用了這張地圖的資源來建造這個派系的奇蹟。"
ruRU = "Поздравляем! Вы освоили природаориентированный стиль Народных хвостов и использовали ресурсы этой карты, чтобы построить чудо фракции."
jaJP = "おめでとうございます！あなたはフォルクテイルの自然志向のライフスタイルを習得し、このマップの資源を使って派閥の奇跡を建設しました。"
frFR = "Félicitations ! Vous avez maîtrisé le mode de vie centré sur la nature des Folktails et utilisé les ressources de cette carte pour construire la merveille de la faction."
deDE = "Herzlichen Glückwunsch! Sie haben den naturorientierten Lebensstil der Volkschwänze gemeistert und die Ressourcen dieser Karte genutzt, um ein Wunder der Fraktion zu errichten."
plPL = "Gratulacje! Opanowaliście zorientowany na naturę styl Ludowych Ogonów i wykorzystaliście zasoby tej mapy, aby zbudować cud frakcji."
ptBR = "Parabéns! Você dominou o estilo voltado para a natureza dos Folktails e usou os recursos deste mapa para construir a maravilha da facção."
koKR = "축하합니다! 여러분은 민속 꼬리의 자연 지향적 생활 방식을 숙달하였고 이 지도의 자원을 사용하여 분파의 기적을 건설하였습니다."
csCZ = "Gratulujeme! Ovládli jste přírodou orientovaný způsob Lidových ocasů a využili zdroje této mapy k postavení zázraku frakce."
viVN = "Chúc mừng! Bạn đã làm chủ lối sống thiên nhiên của các Câu chuyện dân gian và đã sử dụng tài nguyên của bản đồ này để xây dựng kỳ quan của phe."
trTR = "Tebrikler! Doğaya odaklı Halk Kuyruğu tarzını benimsediniz ve bu haritanın kaynaklarını kullanarak fraksiyonun harikasını inşa ettiniz."

["Faction.IronTeeth.Description"]
raw = "Адмовіўшыся ад традыцыйнага драўлянага ладу жыцця, яны авалодалі жалезам і навукай, каб ствараць прасунутыя механізмы.\nЯны дасягаюць прагрэсу дзякуючы кемлівасці, эфектыўнасці і абыякавасці да навакольнага асяроддзя.  \nІх дэвіз: <i>Працуй шмат, працуй шмат.</i>"
status = "normal"
enUS = "Rejecting traditional wooden ways of life, they mastered iron and science to create advanced mechanisms. They achieve progress through ingenuity, efficiency, and indifference to the environment. Their motto: <i>Work hard, work hard.</i>"
zhCN = "放弃传统的木质生活方式，他们掌握了铁与科学以创造先进的机制。\n他们凭借聪明才智、高效性及对环境的漠不关心而取得进展。\n他们的座右铭是：<i>努力工作，努力工作。</i>"
zhTW = "放棄傳統的木材生活方式，他們掌握了鐵和科學，以創造先進的機械。  \n他們憑藉聰明才智、高效能和對環境的漠不關心來實現進步。  \n他們的座右銘是：<i>多工作，多工作。</i>"
ruRU = "Отказавшись от традиционного деревянного образа жизни, они овладели железом и наукой, чтобы создавать продвинутые механизмы.  \nОни достигают прогресса благодаря смекалке, эффективности и равнодушию к окружающей среде.  \nИх девиз: <i>Работай много, работай много.</i>"
jaJP = "伝統的な木製の生活様式を放棄し、彼らは鉄と科学を習得して高度なメカニズムを作り出しました。  \n彼らは機知、効率、そして環境への無関心によって進歩を遂げています。  \n彼らのモットーは：<i>多く働き、多く働け。</i>"
frFR = "Reniant le mode de vie traditionnel en bois, ils ont maîtrisé le fer et la science pour créer des mécanismes avancés.  \nIls atteignent le progrès grâce à leur ingéniosité, leur efficacité et leur indifférence à l'environnement.  \nLeur devise : <i>Travaille dur, travaille dur.</i>"
deDE = "Indem sie sich von der traditionellen Holzlebensweise abkehren, haben sie Eisen und Wissenschaft erlernt, um fortschrittliche Mechanismen zu schaffen. Sie erreichen Fortschritt durch Klugheit, Effizienz und Gleichgültigkeit gegenüber der Umwelt. Ihr Motto: <i>Arbeite hart, arbeite viel.</i>"
plPL = "Rezygnując z tradycyjnego drewnianego stylu życia, opanowali żelazo i naukę, aby tworzyć zaawansowane mechanizmy. Osiągają postęp dzięki przebiegłości, efektywności i obojętności na otoczenie. Ich motto: <i>Pracuj dużo, pracuj ciężko.</i>"
ptBR = "Recusando-se a viver da maneira tradicional de madeira, eles dominaram o ferro e a ciência para criar mecanismos avançados.  \nEles alcançam progresso graças à astúcia, eficiência e indiferença ao meio ambiente.  \nSeu lema: <i>Trabalhe duro, trabalhe duro.</i>"
koKR = "전통적인 목재 생활 방식을 버리고, 그들은 철과 과학을 습득하여 진보된 기계를 만듭니다.  \n그들은 기민함, 효율성 그리고 환경에 대한 무관심 덕분에 발전을 이룹니다.  \n그들의 모토: <i>많이 일하고, 많이 일하라.</i>"
csCZ = "Odvrátili se od tradičního dřevěného způsobu života, ovládli železo a vědu, aby vytvářeli pokročilé mechanismy. Dosahují pokroku díky důvtipu, efektivitě a lhostejnosti k životnímu prostředí. Jejich motto: <i>Snaž se hodně, pracuj hodně.</i>"
viVN = "Bằng cách từ chối lối sống gỗ truyền thống, họ đã làm chủ sắt và khoa học để tạo ra các cơ chế tiên tiến.  \nHọ đạt được tiến bộ nhờ vào sự khéo léo, hiệu quả và sự thờ ơ với môi trường.  \nKhẩu hiệu của họ: <i>Hãy làm việc chăm chỉ, hãy làm việc chăm chỉ.</i>"
trTR = "Geleneksel ahşap yaşamdan vazgeçerek, demir ve bilime hakim oldular ve gelişmiş mekanizmalar yaratmaya başladılar.  \nZeka, verimlilik ve çevreye kayıtsızlık sayesinde ilerleme kaydediyorlar.  \nOnların sloganı: <i>Çok çalış, çok çalış.</i>"

