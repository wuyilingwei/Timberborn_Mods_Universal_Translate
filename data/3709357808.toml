raw = "Насенне прывезлі падарожнікі з далёкіх краёў, дзе рэкі ніколі не перасыхаюць."
status = "normal"
enUS = "The seeds were brought by travelers from distant lands where the rivers never run dry."
zhCN = "种子是旅行者从遥远的地方带来的，那里的河流从不干枯。"
zhTW = "種子是由來自遙遠國度的旅人帶來的，那裡的河流從未乾涸。"
ruRU = "Семена привезли путешественники из далеких стран, где реки никогда не пересыхают."
jaJP = "種子は遠い国から旅人によって持ち込まれ、川は決して干上がることがありません。"
frFR = "Les graines ont été apportées par des voyageurs de lointaines contrées, où les rivières ne s'assèchent jamais."
deDE = "Die Samen wurden von Reisenden aus fernen Ländern gebracht, wo die Flüsse niemals austrocknen."
plPL = "Nasiona przywieźli podróżnicy z odległych krajów, gdzie rzeki nigdy nie wysychają."
