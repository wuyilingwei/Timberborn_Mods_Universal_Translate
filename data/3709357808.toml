["Tutorial.WaterAndFood.Farmhouse"]
raw = "У доўгатэрміновай перспектыве нам патрэбна нешта больш пажыўнае. Пабудуйце фермерскі дом, каб саджаць і збіраць ураджай.\n                                 \nЯк і ў сцягоў, у фермерскага дома абмежаваны радыус дзеяння.\n                                 \nПарада: калі вам не хапае работнікаў, вы можаце прыпыніць некаторыя будынкі. Для гэтага выберыце будынак і націсніце кнопку паўзы."
status = "normal"
enUS = "In the long term, we need something more nutritious. Build a farmhouse to plant and harvest crops.\n\nLike with flags, the farmhouse has a limited range of action.\n\nTip: If you're short on workers, you can pause some buildings. To do this, select the building and press the pause button."
zhCN = "从长远来看，我们需要一些更有营养的东西。建造农舍以种植和收获作物。\n\n与旗帜一样，农舍的活动半径有限。\n\n提示：如果您缺少工人，可以暂停某些建筑。为此，请选择建筑并点击暂停按钮。"
zhTW = "在長期來看，我們需要一些更營養的東西。建造農舍來種植和收穫作物。\n\n與旗幟一樣，農舍的作用範圍有限。\n\n提示：如果您缺少工人，可以暫停某些建築。為此，請選擇建築並點擊暫停按鈕。"
ruRU = "В долгосрочной перспективе нам нужно что-то более питательное. Постройте фермерский дом, чтобы сажать и собирать урожай.\n\nКак и в случае со знамёнами, у фермерского дома ограниченный радиус действия.\n\nСовет: если вам не хватает рабочих, вы можете приостановить некоторые здания. Для этого выберите здание и нажмите кнопку паузы."
jaJP = "長期的には、もっと栄養価の高いものが必要です。農家を建てて作物を植えたり収穫したりしましょう。\n\n旗と同様に、農家の効果範囲には制限があります。\n\nヒント：労働者が足りない場合は、いくつかの建物を一時停止することができます。そのためには、建物を選択して一時停止ボタンをクリックしてください。"
frFR = "À long terme, nous avons besoin de quelque chose de plus nutritif. Construisez une ferme pour planter et récolter des cultures.\n                                 \nTout comme dans les zones de drapeaux, la portée du bâtiment de la ferme est limitée.\n                                 \nAstuce : si vous manquez de travailleurs, vous pouvez mettre certains bâtiments en pause. Pour ce faire, sélectionnez le bâtiment et appuyez sur le bouton de pause."
deDE = "Langfristig benötigen wir etwas Nahrhafteres. Baue ein Bauernhaus, um Pflanzen zu setzen und die Ernte einzubringen.\n\nWie bei den Flaggen hat das Bauernhaus einen begrenzten Wirkungsradius.\n\nTipp: Wenn dir Arbeiter fehlen, kannst du einige Gebäude pausieren. Wähle dazu ein Gebäude aus und drücke die Pausentaste."
plPL = "W dłuższej perspektywie potrzebujemy czegoś bardziej pożywnego. Zbuduj farmę, aby sadzić i zbierać plony.\n\nPodobnie jak w przypadku stawów, zasięg farmy jest ograniczony.\n\nWskazówka: jeśli brakuje ci pracowników, możesz wstrzymać niektóre budynki. Aby to zrobić, wybierz budynek i naciśnij przycisk pauzy."
ptBR = "A longo prazo, precisamos de algo mais nutritivo. Construa uma casa de fazenda para plantar e colher culturas.\n\nAssim como nos moinhos, a casa de fazenda tem um raio de ação limitado.\n\nDica: se você estiver com falta de trabalhadores, pode pausar alguns edifícios. Para isso, selecione o edifício e clique no botão de pausa."
koKR = "장기적으로 우리는 더 영양가 있는 것이 필요합니다. 농작물을 심고 수확하기 위해 농가를 건설하십시오.\n                                 \n깃발처럼 농가의 작동 범위가 제한되어 있습니다.\n                                 \n팁: 직원이 부족하다면 일부 건물을 일시 정지할 수 있습니다. 이를 위해 건물을 선택하고 일시 정지 버튼을 누르십시오."
csCZ = "V dlouhodobém horizontu potřebujeme něco výživnějšího. Postavte farmářský dům, abyste mohli sázet a sbírat úrodu.\n\nStejně jako u vlajkových lodí má farmářský dům omezený dosah.\n\nTip: pokud máte nedostatek pracovníků, můžete pozastavit některé budovy. K tomu vyberte budovu a stiskněte tlačítko pozastavení."
viVN = "Trong dài hạn, chúng ta cần một cái gì đó bổ dưỡng hơn. Xây dựng một ngôi nhà nông dân để trồng trọt và thu hoạch sản phẩm.\n                                 \nGiống như trong các tán, ngôi nhà nông dân có phạm vi hoạt động hạn chế.\n                                 \nMẹo: nếu bạn thiếu công nhân, bạn có thể tạm dừng một số tòa nhà. Để làm điều này, hãy chọn tòa nhà và nhấn nút tạm dừng."

["Tutorial.WaterAndFood.Gatherer"]
raw = "Акрамя вады, бабрам патрэбна ежа.\n                                \nЗбіральнікі аўтаматычна збіраюць ягады ў радыусе сцяга збіральніка. Радыус відаць пры размяшчэнні сцяга.\n                                \nПабудуйце сцяг збіральніка каля кустоў чарніц."
status = "normal"
enUS = "Besides water, beavers need food.\n\nGatherers automatically collect berries within the radius of the gatherer's flag. The radius is visible when placing the flag.\n\nBuild a gatherer's flag near the blueberry bushes."
zhCN = "除了水，海狸还需要食物。\n\n收集者会自动在收集旗帜的半径内收集浆果。放置旗帜时可以看到半径。\n\n在蓝莓灌木附近建造收集旗帜。"
zhTW = "除了水，海狸還需要食物。\n\n採集者會自動在採集旗幟的半徑內收集漿果。半徑在放置旗幟時可見。\n\n在藍莓灌木附近建造採集旗幟。"
ruRU = "Помимо воды, бобрам нужна еда.\n                                \nСобиратели автоматически собирают ягоды в радиусе флага собирателя. Радиус виден при размещении флага.\n                                \nПостройте флаг собирателя возле кустов черники."
jaJP = "「水の他に、ビーバーには食べ物が必要です。\n\n採集者は自動的に、採集旗の半径内のベリーを収集します。半径は旗を配置するときに表示されます。\n\nブルーベリーの茂みの近くに採集旗を建ててください。」"
frFR = "En plus de l'eau, les castors ont besoin de nourriture.\n\nLes récolteurs récoltent automatiquement des baies dans le rayon du drapeau du récolteur. Le rayon est visible lors du placement du drapeau.\n\nConstruisez un drapeau de récolteur près des buissons de myrtilles."
deDE = "Neben Wasser benötigen Biber Nahrung.\n\nSammelstellen sammeln automatisch Beeren im Umkreis der Fahne des Sammlers. Der Radius ist sichtbar, wenn die Fahne platziert wird.\n\nBaut eine Fahne des Sammlers in der Nähe von Heidelbeerbüschen."
plPL = "Poza wodą bobrom potrzebne jest jedzenie.\n\nZbieracze automatycznie zbierają jagody w promieniu flagi zbieracza. Promień widać podczas umieszczania flagi.\n\nZbuduj flagę zbieracza w pobliżu krzaków borówek."
ptBR = "Além da água, os castores precisam de comida.\n\nOs coletores coletam automaticamente frutas dentro do raio da bandeira do coletor. O raio é visível ao colocar a bandeira.\n\nConstrua uma bandeira de coletor perto dos arbustos de mirtilo."
koKR = "물 외에도 비버는 음식이 필요합니다.\n                                \n수집가는 수집기 깃발의 반경 내에서 자동으로 베리를 수집합니다. 반경은 깃발을 배치할 때 볼 수 있습니다.\n                                \n블루베리 덤불 근처에 수집가 깃발을 건설하세요."
csCZ = "Kromě vody potřebují bobři jídlo.\n\nSběrači automaticky sbírají bobule v okruhu vlajky sběrače. Okruh je viditelný při umístění vlajky.\n\nPostavte vlajku sběrače poblíž keřů borůvek."
viVN = "Ngòi ra ngoài nước, thú hỏ ăn cũng cần thức ăn.\n\nCác người thu hoạch tự động thu thập quả mọng trong bán kính của cờ người thu hoạch. Bán kính có thể nhìn thấy khi đặt cờ.\n\nHãy xây dựng cờ người thu hoạch gần những bụi quả việt quất."

["Tutorial.WaterAndFood.MarkCarrots"]
raw = "Фермеры не пачнуць працаваць, пакуль вы не скажаце ім, што і дзе садзіць.\n                                   \nВыкарыстайце інструмент пасадкі культур, каб адзначыць поле морквы.\n                                   \nКультуры трэба садзіць на абрашанай зялёнай зямлі. Інакш расліны высахнуць і з часам загінуць."
status = "normal"
enUS = "Farmers won't start working until you tell them what and where to plant.\n\nUse the crop planting tool to mark the carrot field.\n\nCrops need to be planted on tilled green land. Otherwise, the plants will dry out and eventually die."
zhCN = "农民不会开始工作，直到您告诉他们种什么和在哪里种植。\n                                   \n使用作物种植工具标记胡萝卜地块。\n                                   \n作物需要在耕耘过的绿色土地上种植。否则植物会枯萎并最终死亡。"
zhTW = "農民不會開始工作，直到您告訴他們該種什麼和在哪裡種。\n\n使用作物種植工具標記胡蘿蔔田。\n\n作物必須種植在裸露的綠色土地上。否則植物會乾枯並最終死亡。"
ruRU = "Фермеры не начнут работать, пока вы не скажете им, что и где сажать. \n\nИспользуйте инструмент посадки культур, чтобы отметить поле моркови. \n\nКультуры нужно сажать на обработанной зеленой земле. В противном случае растения высохнут и со временем погибнут."
jaJP = "農夫は、何をどこに植えるかを指示するまで働き始めません。\n                                   \n作物植え付けツールを使用して、人参の畑を指定してください。\n                                   \n作物は、草が剥がれた緑の土壌に植える必要があります。そうでなければ、植物は枯れ、次第に死んでしまいます。"
frFR = "Les agriculteurs ne commenceront pas à travailler tant que vous ne leur aurez pas dit quoi et où planter.\n                                   \nUtilisez l'outil de plantation pour marquer le champ de carottes.\n                                   \nLes cultures doivent être plantées sur une terre verte fraîchement labourée. Sinon, les plantes se dessècheront et mourront avec le temps."
deDE = "Bauern werden nicht anfangen zu arbeiten, bis Sie ihnen sagen, was und wo sie pflanzen sollen.\n\nVerwenden Sie das Werkzeug zum Pflanzen von Kulturen, um das Karottenfeld zu markieren.\n\nKulturen müssen auf bewässertem Grünland gepflanzt werden. Andernfalls werden die Pflanzen vertrocknen und mit der Zeit sterben."
plPL = "Rolnicy nie zaczną pracować, dopóki nie powiesz im, co i gdzie sadzić.\n                                   \nUżyj narzędzia do sadzenia upraw, aby zaznaczyć pole marchwi.\n                                   \nUprawy należy sadzić na przesuszonej, zielonej ziemi. W przeciwnym razie rośliny wyschną i z czasem zginą."
ptBR = "Os fazendeiros não começarão a trabalhar até que você lhes diga o que e onde plantar. \n\nUse a ferramenta de plantio de culturas para marcar o campo de cenouras. \n\nAs culturas precisam ser plantadas em solo verde preparado. Caso contrário, as plantas vão secar e eventualmente morrer."
koKR = "농부들은 여러분이 무엇을 어디에 심어야 하는지 말할 때까지 일하기 시작하지 않습니다.\n\n작물 심기 도구를 사용하여 당근 밭을 표시하세요.\n\n작물은 자갈이 없는 녹색 땅에 심어야 합니다. 그렇지 않으면 식물이 말라 죽고 결국 사라집니다."
csCZ = "Farmáři nezačnou pracovat, dokud jim neřeknete, co a kde zasadit.\n\nPoužijte nástroj pro sázení plodin, abyste označili pole mrkve.\n\nPlodiny je třeba sázet na úrodnou zelenou půdu. Jinak rostliny uschnou a časem uhynou."
viVN = "Nông dân sẽ không bắt đầu làm việc cho đến khi bạn bảo họ trồng gì và ở đâu.\n\nSử dụng công cụ trồng cây để đánh dấu khu vực trồng cà rốt.\n\nCây trồng cần được gieo trên đất màu mỡ. Nếu không, cây sẽ khô héo và chết theo thời gian."

["Tutorial.WaterAndFood.WaterPump"]
raw = "Бабрам патрэбна вада, каб выжыць.\n                                 \nПабудуйце Вадзяную помпу, каб забяспечыць пастаянны доступ да пітной вады. Не забудзьцеся злучыць помпу з Цэнтрам раёна."
status = "normal"
enUS = "Beavers need water to survive.\n\nBuild a Water Pump to ensure a constant supply of drinking water. Don’t forget to connect the pump to the District Center."
zhCN = "“海狸需要水才能生存。\n                                 \n建造水泵，以确保持续获得饮用水。别忘了将泵与区域中心连接。”"
zhTW = "“獺鼠需要水才能生存。\n\n建造水泵以確保穩定的飲用水供應。別忘了將泵與區域中心連接。”"
ruRU = "Бобрам нужна вода, чтобы выжить.\n\nПостройте Водяной насос, чтобы обеспечить постоянный доступ к питьевой воде. Не забудьте соединить насос с Центром района."
jaJP = "ビーバーは生き残るために水が必要です。\n\n水のポンプを建設して、飲料水への継続的なアクセスを確保しましょう。ポンプを地区センターに接続することを忘れないでください。"
frFR = "Les castors ont besoin d'eau pour survivre.\n\nConstruisez une Pompe à eau pour garantir un accès constant à l'eau potable. N'oubliez pas de connecter la pompe au Centre de quartier."
deDE = "Biber benötigen Wasser, um zu überleben.\n\nBaut eine Wasserpumpe, um einen ständigen Zugang zu Trinkwasser zu gewährleisten. Vergesst nicht, die Pumpe mit dem Bezirkszentrum zu verbinden."
plPL = "Bawrom potrzebna jest woda, aby przeżyć.\n\nZbuduj Pompę Wodną, aby zapewnić stały dostęp do wody pitnej. Nie zapomnij połączyć pompy z Centrum Dzielnicy."
ptBR = "Os castores precisam de água para sobreviver.\n\nConstrua uma Bomba de Água para garantir acesso constante a água potável. Não se esqueça de conectar a bomba ao Centro de Distribuição."
koKR = "비버는 생존을 위해 물이 필요합니다. \n\n물 펌프를 건설하여 음용수에 지속적으로 접근할 수 있도록 하십시오. 펌프를 지역 센터와 연결하는 것을 잊지 마십시오."
csCZ = "Bobrům je voda potřebná k přežití. \n                                 \nPostavte vodní pumpu, abyste zajistili stálý přístup k pitné vodě. Nezapomeňte připojit pumpu k centru oblasti."
viVN = "Babr cần nước để sống.\n\nHãy xây dựng một Bơm nước để đảm bảo có nước uống liên tục. Đừng quên kết nối bơm với Trung tâm khu vực."

