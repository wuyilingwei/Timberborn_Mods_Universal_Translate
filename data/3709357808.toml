deDE = "„„Nun, wir haben ein Dach darauf gesetzt und es industriell genannt. Klassiker.“ — Pina“"
plPL = "„No i oto, położyli dach na górze i nazwali to przemysłowym. Klasyka.” — Pina"
ptBR = "«Bem, colocamos o telhado em cima e chamamos isso de industrial. Clássico.» — Pina"
koKR = "«자, 천장을 얹고 산업이라고 불렀습니다. 클래식이죠.» — 피나"
csCZ = "„No a máme to, položili jsme střechu nahoře a nazvali to průmyslovým. Klasika.“ — Pina"
viVN = "«Vậy là, họ đã đặt mái lên trên và gọi nó là công nghiệp. Cổ điển.» — Pina"
trTR = "«Ah, üstünü kapattık ve buna endüstriyel dedik. Klasik.» — Pina"

