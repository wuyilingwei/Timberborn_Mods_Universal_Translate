["Tutorial.Science.Inventor"]
raw = "Beavers are the engineers of the animal world. It's time to turn their lumberpunk ideas into reality.\r\n                           \r\nBuild an Inventor to produce Science Points."
status = "normal"
prompt = "Inventor is the same as Building.Inventor.DisplayName, Science Points is the same as Science.SciencePoints"
csCZ = "Bobři jsou inženýry živočišného světa. Je čas proměnit jejich lumberpunkové nápady ve skutečnost.\nPostavte Vynálezce, abyste získali vědecké body."
viVN = "Hải ly là những kỹ sư của thế giới động vật. Đã đến lúc biến những ý tưởng lumberpunk của chúng thành hiện thực.\n                            Xây dựng một Inventor để tạo ra Science Points."

["Tutorial.Science.SciencePoints"]
