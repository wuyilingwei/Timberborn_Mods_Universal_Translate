["Tutorial.VerticalArchitecture.BuildRooftopTerrace"]
raw = "In the wasteland, it's important to optimize use of space. Beavers do that by growing their cities vertically.\r\n                                                   \r\nSome buildings, like Lodges, have flat roofs that can support other structures.\r\n                                                   \r\nLet's build a Rooftop Terrace now. You may need to use Stairs to connect it to the district."
status = "normal"
prompt = "Lodges refers to Building.Lodge.DisplayName, Rooftop Terrace refers to Building.RooftopTerrace.DisplayName"
csCZ = "Na poušti je důležité optimalizovat využití prostoru. Bobři to dělají tím, že svá města budují vertikálně.\n\nNěkteré budovy, například Lodges, mají ploché střechy, které mohou nést jiné konstrukce.\n\nPostavme nyní střešní terasu. Možná bude potřeba použít schody, abyste ji spojili se čtvrtí."
viVN = "Trong sa mạc hoang vắng, việc tối ưu hóa không gian là rất quan trọng. Hải ly thực hiện điều đó bằng cách xây dựng thành phố của chúng theo chiều dọc.\n\nMột số tòa nhà, như Lodges, có mái bằng có thể chịu được các công trình khác.\n\nHãy xây dựng Rooftop Terrace ngay bây giờ. Bạn có thể cần sử dụng Cầu thang để kết nối nó với khu vực."

["Tutorial.WaterAndFood"]
