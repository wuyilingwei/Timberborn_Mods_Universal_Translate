["Automation.Input.A"]
raw = "A"
status = "normal"
prompt = "This should be one character, optionally two if you really need it. Those are labels preceding dropdowns for selecting input A and input B."
csCZ = "\"A\" - Poznámka: To by měl být jeden znak, případně dva, pokud to opravdu potřebujete. To jsou popisky před rozbalovacími seznamy pro výběr vstupu A a vstupu B."
viVN = "\"A\" - Ghi chú đặc biệt: Điều này nên là một ký tự, có thể hai ký tự nếu thực sự cần thiết. Đó là các nhãn đứng trước các danh sách thả xuống để chọn đầu vào A và đầu vào B."

["Automation.Input.B"]
raw = "B"
status = "normal"
prompt = "This should be one character, optionally two if you really need it. Those are labels preceding dropdowns for selecting input A and input B."
csCZ = "B"
viVN = "B - Ghi chú đặc biệt: Điều này nên là một ký tự, có thể hai ký tự nếu bạn thực sự cần thiết. Đó là các nhãn đứng trước danh sách thả xuống để chọn đầu vào A và đầu vào B."

["Automation.Input.Reset"]
raw = "RST"
status = "normal"
prompt = "Abbreviation for Reset, it should correspond to Automation.ResetButton. Three characters are OK for narrow letters but CJK and other languages with wider characters should be at most two - please let us know if it's a problem. It's likely that 'RST' is the best option in all languages because it is a very common abbreviation in electronics and schematics."
csCZ = "Název klíče: Automation.Input.Reset - Nový text k překladu: \"RST\" - Poznámka k specifikaci: Zkratka pro Reset, měla by odpovídat Automation.ResetButton. Tři znaky jsou v pořádku pro úzká písmena, ale CJK a jiné jazyky s širšími znaky by měly být nejvýše dva - prosím dejte nám vědět, pokud je to problém. Je pravděpodobné, že 'RST' je nejlepší volba ve všech jazycích, protože jde o velmi běžnou zkratku v elektronice a schématech."
viVN = "Tên khóa: Automation.Input.Reset - Văn bản mới để dịch: \"RST\" - Ghi chú cụ thể: Viết tắt cho Reset, nó nên tương ứng với Automation.ResetButton. Ba ký tự được chấp nhận đối với chữ cái có chiều rộng hẹp, nhưng chữ CJK và các ngôn ngữ khác có ký tự rộng hơn nên tối đa hai ký tự - vui lòng cho chúng tôi biết nếu điều đó gây vấn đề. Có thể 'RST' là lựa chọn tốt nhất ở mọi ngôn ngữ vì đây là một chữ viết tắt rất phổ biến trong điện tử và sơ đồ mạch."

