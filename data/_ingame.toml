["Tutorial.Storage.Pile"]
raw = "Many buildings have some built-in storage but it fills up quickly.\r\n                               \r\nBuild a Large Pile to store more Logs.\r\n                               \r\nEach storage building holds a single good. You can set the stored good after selecting the building."
status = "normal"
prompt = "Large Pile is the same as Building.LargePile.DisplayName, Logs is same as Good.Log.PluralDisplayName"
csCZ = "Mnoho budov má vestavěné skladování, ale rychle se zaplňuje.\n\nPostavte Building.LargePile.DisplayName pro uložení více Good.Log.PluralDisplayName.\n\nKaždá skladovací budova pojme jediný druh zboží. Po výběru budovy můžete nastavit uložené zboží."
viVN = "Nhiều tòa nhà có kho chứa tích hợp sẵn nhưng chứa đầy rất nhanh.\n\nXây dựng Đống Lớn để lưu trữ thêm Gỗ.\n\nMỗi tòa nhà lưu trữ chứa một loại hàng hóa duy nhất. Bạn có thể thiết lập loại hàng hóa được lưu trữ sau khi chọn tòa nhà."

["Tutorial.Storage.Tanks"]
raw = "All liquids are stored in tanks. This includes the water we've been pumping."
status = "normal"
prompt = "Small Tank is the same as Building.SmallTank.DisplayName, Water is same as Good.Water.DisplayName"
csCZ = "Všechny kapaliny jsou uloženy v nádržích. To zahrnuje vodu, kterou jsme pumpovali."
viVN = "Tất cả chất lỏng được lưu trữ trong bể chứa. Điều này bao gồm nước mà chúng ta đã và đang bơm."

["Tutorial.Storage.Warehouses"]
raw = "Finally, let's prepare some storage for Berries. We should also get ready for the upcoming Carrot harvest.\r\n                             \r\nFood, just like many other boxed goods, is stored in warehouses."
status = "normal"
prompt = "Berries is the same as Good.Berries.PluralDisplayName, Carrot is the same as in Good.Carrot.DisplayName"
csCZ = "Nakonec si připravme sklad pro Bobule. Měli bychom se také připravit na nadcházející sklizeň mrkví.\n                             \nPotraviny, stejně jako mnoho dalších balených výrobků, se ukládají ve skladech."
viVN = "Cuối cùng, hãy chuẩn bị một kho lưu trữ cho quả mọng. Chúng ta cũng nên chuẩn bị cho vụ thu hoạch cà rốt sắp tới.\n\nThức ăn, cũng như nhiều mặt hàng đóng hộp khác, được lưu trữ trong các kho."

