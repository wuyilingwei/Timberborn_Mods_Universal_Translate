["Faction.Folktails.GameOver.Flavor"]
raw = "When you fail to use nature's gifts, it takes them back."
status = "normal"
prompt = "Flavor text of the game over panel"
csCZ = "Když nevyužijete dary přírody, vezme je zpět."
viVN = "Khi bạn không tận dụng những món quà của thiên nhiên, chúng sẽ bị thiên nhiên lấy lại."

["Faction.Folktails.GameOver.Message"]
raw = "Your Folktails met the sad fate of their human predecessors. This is the end."
status = "normal"
prompt = "Text of the game over panel"
csCZ = "Vaše Folktails potkali smutný osud jejich lidských předchůdců. To je konec."
viVN = "Folktails của bạn đã chịu chung số phận bi thảm như những người tiền nhiệm của họ là con người. Đây là kết thúc."

["Faction.Folktails.WonderCompletionFlavor"]
raw = "Having collected great wealth and knowledge, your beavers shared fruits of their labour with the suffering planet. There's still much to do, but Earth may flourish once again."
status = "normal"
prompt = "Flavor text shown when the player has mastered a map with the Folktails faction. Mastery means building and activating a Wonder."
csCZ = "Po shromáždění velkého bohatství a poznání vaši bobři sdíleli plody své práce s trpící planetou. Je před námi ještě hodně práce, ale Země může znovu vzkvétat."
viVN = "Đã tích lũy được tài sản và tri thức phong phú, những con hải ly của bạn đã chia sẻ thành quả lao động của chúng với hành tinh đang chịu đau khổ. Vẫn còn nhiều việc phải làm, nhưng Trái Đất có thể phát triển thịnh vượng trở lại."

["Faction.Folktails.WonderCompletionMessage"]
raw = "Congratulations! You mastered Folktails' nature-oriented ways and used this map's resources to build the faction's wonder."
status = "normal"
prompt = "A message that is shown when the player has mastered a map with the Folktails faction. Mastery means building and activating a Wonder."
csCZ = "Gratulujeme! Ovládli jste způsoby Folktails, které jsou zaměřené na přírodu, a využili jste zdroje této mapy k vybudování zázraku frakce Folktails."
viVN = "Chúc mừng! Bạn đã nắm vững các cách tiếp cận thiên nhiên của Folktails và sử dụng tài nguyên trên bản đồ này để xây dựng kỳ quan của phe."

["Faction.IronTeeth.Description"]
raw = "Defectors of the traditional timber ways, they mastered iron and science to build advanced machinery.\r\nThey achieve progress through ingenuity, efficiency, and disregard for the environment.  \r\nTheir motto: <i>Work hard, work hard.</i>"
status = "normal"
prompt = "Description of a beaver faction"
csCZ = "Odpadlíci z tradičních dřevorubeckých cest, ovládli železo a vědu, aby postavili pokročilé stroje.\nDosahují pokroku díky důmyslnosti, efektivitě a neohledu vůči životnímu prostředí.\nJejich heslo: <i>Tvrdě pracujte, tvrdě pracujte.</i>"
viVN = "Những kẻ từ bỏ các cách làm gỗ truyền thống, họ đã nắm vững sắt và khoa học để chế tạo máy móc tiên tiến.\nHọ đạt được tiến bộ thông qua sự khéo léo, hiệu quả và sự coi nhẹ đối với môi trường.  \nPhương châm của họ: <i>Làm việc chăm chỉ, làm việc chăm chỉ.</i>"

