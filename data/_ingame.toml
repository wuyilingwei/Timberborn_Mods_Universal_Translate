viVN = "Khu định cư Răng Sắt của bạn đã sụp đổ mà không có cơ hội phục hồi. Đây là kết thúc."

["Faction.IronTeeth.WonderCompletionFlavor"]
raw = "Your pioneers flew away over the wasteland, leaving the thriving settlement behind them. If Earth is to recover, the new-found beaver prosperity needed to be shared."
status = "normal"
prompt = "Flavor text shown when the player has mastered a map with the Folktails faction. Mastery means building and activating a Wonder."
csCZ = "Vaši průkopníci odletěli nad pustinou, za sebou zanechali prosperující osadu. Pokud má Země opět vzkvétat, nově objevená prosperita bobrů musela být sdílena."
viVN = "Những người tiên phong của ngươi đã bay vượt qua vùng hoang tàn, để lại khu định cư thịnh vượng ở phía sau họ. Nếu Trái Đất muốn hồi phục, sự thịnh vượng mới tìm thấy của loài hải ly cần được chia sẻ."

