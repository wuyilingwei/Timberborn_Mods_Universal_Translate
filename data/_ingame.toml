["Tutorial.Forestry.MarkBirchesForPlanting"]
raw = "Use the Plant Trees and Bushes tool to plant some Birches. They grow quickly, making them a good choice in a fledgling settlement.\r\n                                          \r\nSimilarly to crops, trees only grow on irrigated, green areas.\r\n                                          \r\nRemember to mark the planting areas for cutting."
