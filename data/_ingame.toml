["Tutorial.Dams.BuildDam"]
raw = "Storing water in tanks keeps your beavers hydrated, but long-term survival depends on taming the flow of water.\r\n                        \r\nBuild a line of Dams across the nearest river, from bank to bank, and observe what happens."
status = "normal"
prompt = "Dam refers to Building.Dam.DisplayName"
csCZ = "Ukládání vody do nádrží udržuje vaše bobry hydratované, ale dlouhodobé přežití závisí na zkrocení toku vody.\n\nVybudujte řadu přehrad přes nejbližší řeku, od břehu k břehu, a sledujte, co se stane."
viVN = "Lưu nước trong các bể chứa nước giúp hải ly của bạn luôn được cấp nước đầy đủ, nhưng sự sống còn lâu dài phụ thuộc vào việc kiểm soát dòng nước.\n                        \nXây một hàng đập qua con sông gần nhất, từ bờ này sang bờ kia, và xem điều gì sẽ xảy ra."

