status = "normal"
csCZ = "Voda a jídlo"
viVN = "Nước và thực phẩm"

["Tutorial.WaterAndFood.Farmhouse"]
raw = "In the long run, we need something more nutritious. Build a farmhouse to plant and harvest crops.\r\n                                 \r\nLike flags, a farmhouse has a limited range.\r\n                                 \r\nTip: If you are running low on workers, you can pause some buildings. To do so, select a building and click the pause button."
status = "normal"
prompt = "Farmhouse is the same as in Building.Farmhouse.DisplayName"
csCZ = "V dlouhodobém horizontu potřebujeme něco výživnějšího. Postavte Farmhouse, abyste mohli pěstovat a sklízet plodiny.\n\nPodobně jako prapory, má Farmhouse omezený dosah.\n\nTip: Pokud máte málo dělníků, můžete pozastavit některé budovy. Chcete-li tak učinit, vyberte budovu a klikněte na tlačítko Pozastavit."
viVN = "Về lâu dài, chúng ta cần thứ gì đó bổ dưỡng hơn. Xây một Farmhouse để trồng và thu hoạch cây trồng.\n\nGiống như cờ hiệu, Farmhouse có phạm vi giới hạn.\n\nGợi ý: Nếu bạn đang thiếu lao động, bạn có thể tạm dừng một số công trình. Để làm điều đó, hãy chọn một công trình và nhấn nút tạm dừng."

["Tutorial.WaterAndFood.Gatherer"]
raw = "In addition to water, beavers need food.\r\n                                \r\nGatherers automatically gather Berries within the Gatherer Flag's range. You can see the range when placing the flag.\r\n                                \r\nBuild a Gatherer Flag near some Blueberry Bushes."
status = "normal"
prompt = "Berries is the same as Good.Berries.PluralDisplayName, Gatherer Flag is the same as Building.GathererFlag.DisplayName, Blueberry Bushes refers to NaturalResource.Blueberry.DisplayName"
csCZ = "Kromě vody potřebují bobři i jídlo.\n\nSběrači automaticky sbírají Bobule v dosahu vlajky sběrače. Můžete vidět dosah při umísťování vlajky.\n\nPostavte vlajku sběrače poblíž borůvkových keřů."
viVN = "Ngoài nước, hải ly cũng cần thức ăn.\n\nNhững người hái sẽ tự động thu thập quả mọng trong phạm vi của Cờ Hái. Bạn có thể nhìn thấy phạm vi khi đặt cờ.\n\nXây một Cờ Hái gần một số bụi việt quất."

["Tutorial.WaterAndFood.MarkCarrots"]
raw = "Farmers do not start working until you tell them what and where to plant.\r\n                                   \r\nUse the Plant Crops tool to designate a Carrot field.\r\n                                   \r\nCrops need to be planted on irrigated, green land. Otherwise, plants will dry out and eventually die."
status = "normal"
prompt = "Plant Crops is the same as in ToolGroups.FieldsPlanting, Carrot is the same as in Good.Carrot.DisplayName"
csCZ = "Farmáři nezačnou pracovat, dokud jim neřeknete, co a kam zasít.\n\nPoužijte nástroj pro sázení plodin, abyste označili pole mrkve.\n\nPlodiny musí být zasazeny na zavlažované, zelené půdě. Jinak se rostliny vyschnou a nakonec uhynou."
viVN = "Người nông dân sẽ không bắt đầu làm việc cho đến khi bạn cho họ biết phải trồng cái gì và ở đâu.\n\nSử dụng công cụ Plant Crops để chỉ định một cánh đồng cà rốt.\n\nCác loại cây trồng phải được trồng trên đất được tưới nước và xanh tươi. Nếu không, cây trồng sẽ khô héo và cuối cùng chết."

["Tutorial.WaterAndFood.WaterPump"]
raw = "Beavers need water to survive.\r\n                                 \r\nBuild a Water Pump to ensure continuous access to drinking water. Remember to connect the Pump to the District Center."
status = "normal"
prompt = "Water Pump is the same as Building.WaterPump.DisplayName, District Center is the same as Building.DistrictCenter.DisplayName"
csCZ = "Bobři potřebují vodu k přežití.\n\nPostavte Water Pump, abyste zajistili nepřetržitý přístup k pitné vodě. Nezapomeňte připojit Water Pump k District Center."
viVN = "Hải ly cần nước để tồn tại.\n\nXây dựng Máy bơm nước để đảm bảo có nước uống liên tục. Nhớ kết nối Máy bơm nước với Trung tâm khu vực."

["Tutorial.Wellbeing"]
raw = "Well-being"
status = "normal"
csCZ = "Spokojenost"
viVN = "Phúc lợi"

["Tutorial.Wellbeing.Beaver"]
raw = "You can see the impact your actions have on your beavers.\r\n                           \r\nSelect a beaver by clicking on it. In the panel, you can see its current well-being, attributes, and needs.\r\n                           \r\nSome needs can reach negative values and incur severe penalties or cause death."
status = "normal"
prompt = "Well-being is the same as Wellbeing.DisplayName"
csCZ = "Můžete vidět dopad svých činů na vaše bobry.\n                           \nVyberte bobra kliknutím na něj. V panelu uvidíte jeho aktuální pohodu, atributy a potřeby.\n                           \nNěkteré potřeby mohou nabývat záporných hodnot a způsobit vážné tresty či smrt."
viVN = "Bạn có thể thấy tác động mà hành động của bạn gây ra lên những con hải ly của bạn.\n\nChọn một con hải ly bằng cách nhấp vào nó. Trong bảng điều khiển, bạn có thể xem phúc lợi hiện tại, các thuộc tính và nhu cầu của nó.\n\nMột số nhu cầu có thể đạt giá trị âm và gây hậu quả nghiêm trọng hoặc dẫn đến cái chết."

["Tutorial.Wellbeing.Campfire"]
raw = "Well-being is a metric that shows how content a beaver is. It affects three attributes: working speed, movement speed, and lifespan.\r\n                             \r\nOne of the main ways of increasing the well-being is through attractions. Attractions are buildings that beavers enter when not at work."
status = "normal"
prompt = "Well-being is the same as Wellbeing.DisplayName, working speed is the same Bonus.WorkingSpeed, movement speed is the same as Bonus.MovementSpeed, lifespan refers to Bonus.LifeExpectancy"
csCZ = "Pohoda je metrika, která ukazuje, jak spokojený je bobr. Ovlivňuje tři atributy: pracovní rychlost, rychlost pohybu a délka života.\n\nJedním z hlavních způsobů zvyšování pohody je prostřednictvím atrakcí. Atrakce jsou budovy, do kterých bobři vstupují, když nejsou v práci."
viVN = "Wellbeing là một thước đo cho thấy mức độ hài lòng của một con hải ly. Nó ảnh hưởng đến ba thuộc tính: tốc độ làm việc, tốc độ di chuyển và tuổi thọ.\n\nMột trong những cách chính để tăng sự hài lòng là thông qua các công trình thu hút. Các công trình thu hút là những công trình mà các con hải ly đi vào khi không làm việc."

["Tutorial.Wellbeing.OpenWellbeingPanel"]
raw = "Open the well-being panel"
status = "normal"
prompt = "Keep similar to KeyBinding.OpenWellbeingPanel"
csCZ = "Otevřít panel pohody"
viVN = "Mở bảng phúc lợi"

["Tutorial.Wellbeing.SelectBeaver"]
raw = "Select a beaver and check its needs"
status = "normal"
csCZ = "Vyberte bobra a zkontrolujte jeho potřeby."
viVN = "Chọn một con hải ly và kiểm tra nhu cầu của nó"

["Tutorial.Wellbeing.SetWorkingHours"]
raw = "Remember that beavers need free time to eat, drink, sleep, and enjoy the settlement's attractions.\r\n                                    \r\nTo maximize productivity, you need to balance workers' well-being and their working hours.\r\n                                    \r\nFor now, let's return to the default working hours."
status = "normal"
prompt = "Working hours refers to Work.WorkingHoursTooltip"
csCZ = "Pamatujte, že bobři potřebují volný čas na jídlo, pití, spaní a vychutnání si atrakcí osady.\nPro dosažení co nejvyšší produktivity je třeba vyvážit pohodu pracovníků a jejich pracovní doby.\nZatím se vraťme k výchozím pracovním dobám."
viVN = "Hãy nhớ rằng hải ly cần có thời gian rảnh để ăn, uống, ngủ và tận hưởng các điểm tham quan của khu định cư.\n\nĐể tối đa hóa năng suất, bạn cần cân bằng phúc lợi của người lao động và thời gian làm việc của họ.\n\nHiện tại, hãy quay lại với thời gian làm việc mặc định."

["Tutorial.Wellbeing.Shrub"]
raw = "Well-being also increases around decorations. Beavers do not intentionally approach them, so place the decorations close to where your settlers hang out.\r\n                          \r\nA Shrub is the simplest decoration, and beavers appreciate every bit of greenery."
status = "normal"
prompt = "Well-being is the same as Wellbeing.DisplayName, Shrub is the same as Building.Shrub.DisplayName"
csCZ = "Spokojenost se zvyšuje i kolem dekorací.\nBobři k dekoracím nepřistupují záměrně, proto umístěte dekorace blízko míst, kde se vaši osadníci zdržují.\n\nKeř je nejjednodušší dekorací a bobři ocení každý kousek zeleně."
viVN = "Well-being cũng tăng lên quanh các vật trang trí. Hà mã không cố ý tiếp cận chúng, nên hãy đặt các vật trang trí gần nơi cư dân của bạn tụ tập.\n\nA Shrub là vật trang trí đơn giản nhất, và hà mã đánh giá cao mọi mảng xanh."

["Tutorial.Wellbeing.WellbeingPanel"]
raw = "For beavers, it's the entire society that counts. You can see your settlement's average well-being in the top left corner of your screen.\r\n                                   \r\nClick on it to see the fulfillment of all possible needs. There are many ways to make life in the wasteland more bearable."
status = "normal"
prompt = "Well-being is the same as Wellbeing.DisplayName"
csCZ = "Pro bobry je důležitá celá společnost. V levém horním rohu obrazovky můžete vidět průměrnou hodnotu Wellbeing vaší kolonie.\n                                    \nKlikněte na něj, abyste viděli splnění všech možných potřeb. Existuje mnoho způsobů, jak život na pustině učinit snesitelnějším."
viVN = "Đối với hải ly, toàn bộ xã hội mới là điều quan trọng.\nBạn có thể xem Wellbeing trung bình của khu định cư ở góc trên bên trái màn hình.\n\nNhấp vào nó để xem mức độ đáp ứng của mọi nhu cầu có thể.\nCó nhiều cách để cuộc sống ở vùng hoang tàn trở nên dễ chịu hơn."

["Tutorial.Wood"]
raw = "Wood"
status = "normal"
csCZ = "Dřevo"
viVN = "Gỗ"

["Tutorial.Wood.ConnectLumberjacks"]
raw = "Every building with an entrance must be connected to a District Center with a Path. When you select a building, you can see its entrance marked by an arrow.\r\n                                  \r\nBuild Paths to connect the Lumberjack Flags to the District Center."
status = "normal"
prompt = "Lumberjack Flag is the same as Building.LumberjackFlag.DisplayName, District Center is the same as Building.DistrictCenter.DisplayName, Paths refers to Building.Path.DisplayName"
csCZ = "Každá budova s vchodem musí být spojena se střediskem distriktu pomocí cesty. Když vyberete budovu, její vchod je označen šipkou.\n\nVytvořte cesty pro propojení vlajek dřevorubců se střediskem distriktu."
viVN = "Mọi tòa nhà có lối vào đều phải được kết nối với District Center bằng một Path. Khi bạn chọn một tòa nhà, bạn có thể thấy lối vào của nó được đánh dấu bằng một mũi tên.\n                                  \nXây dựng Paths để kết nối Lumberjack Flags với District Center."

["Tutorial.Wood.FinishLumberjacks"]
raw = "The Flags will not be built unless they are in the district's building range.\r\n                                 \r\nSelect the District Center to see its building range. You can extend it by connecting Paths to the District Center's entrance."
status = "normal"
prompt = "Flags referers to Lumberjack Flag as in Building.LumberjackFlag.DisplayName, District Center is the same as Building.DistrictCenter.DisplayName, Paths refers to Building.Path.DisplayName"
csCZ = "Vlajky dřevorubců se nebudou stavět, pokud nebudou v dosahu budov distriktu.\n\nVyberte Centrum distriktu a zobrazte jeho dosah budov. Lze jej prodloužit propojením cest k vchodu Distriktního centra."
viVN = "Các cờ người đốn gỗ sẽ không được xây dựng cho đến khi chúng nằm trong phạm vi xây dựng của quận.\n\nChọn Trung tâm quận để xem phạm vi xây dựng của nó. Bạn có thể mở rộng nó bằng cách kết nối các đường đi tới lối vào của Trung tâm quận."

["Tutorial.Wood.MarkTrees"]
raw = "Lumberjacks only cut trees in areas that you mark for cutting.\r\n                         \r\nThe trees must be within a Lumberjack Flag's range. Select a flag to see its range.\r\n                         \r\nUse the Mark Tree Cutting Area tool now. Hold the mouse button to select multiple tiles at once."
status = "normal"
prompt = "Lumberjacks refers to workers working in Building.LumberjackFlag.DisplayName, Lumberjack Flag is the same as Building.LumberjackFlag.DisplayName. Mark Tree Cutting Area tool is the same as TreeCuttingSelectionTool.Title"
csCZ = "Dřevorubci kácí stromy pouze v oblastech, které označíte pro kácení.\n                         \nStromy musí být v dosahu vlajky Dřevorubci. Vyberte vlajku, abyste viděli její dosah.\n                         \nPoužijte nástroj pro označení oblasti kácení stromů nyní. Držte tlačítko myši pro výběr více dlaždic najednou."
viVN = "Công nhân đốn gỗ chỉ chặt cây ở những khu vực bạn đánh dấu để chặt cây.\n\nNhững cây phải nằm trong phạm vi của Cờ Công nhân đốn gỗ. Chọn một cờ để xem phạm vi của nó.\n\nSử dụng công cụ Đánh dấu Khu vực Chặt Cây ngay bây giờ. Giữ nút chuột để chọn nhiều ô cùng lúc."

["Tutorial.Wood.PlaceLumberjacks"]
raw = "Every beaver settlement needs Logs, and lots of them. Only lumberjacks cut trees. \r\n                                \r\nBuild Lumberjack Flags next to nearby trees."
status = "normal"
prompt = "Logs is same as Good.Log.PluralDisplayName, Lumberjack Flag is the same as Building.LumberjackFlag.DisplayName"
csCZ = "Každá bobří osada potřebuje dříví, a hodně ho. Pouze dřevorubci kácí stromy. \n                                \nPostavte vlajky dřevorubů vedle blízkých stromů."
viVN = "Mỗi khu định cư của hải ly đều cần gỗ, và rất nhiều gỗ. Chỉ thợ đốn gỗ mới đốn cây.\n\nĐặt Cờ đốn gỗ cạnh những cây gần đó."

["Tutorial.WorkingHours"]
raw = "Working hours"
status = "normal"
prompt = "Tutorial title, Working hours refers to Work.WorkingHoursTooltip"
csCZ = "Pracovní doba"
viVN = "Giờ làm việc"

["Tutorial.WorkingHours.SetWorkingHours"]
raw = "Adjusting working hours is one way to manage your settlement.\r\n                                       \r\nLonger workdays mean faster progress, but every evening, beavers need time to relax and sleep. Don't push them too hard for too long.\r\n                                       \r\nFor now, let's increase the working hours just a little."
status = "normal"
prompt = "Working hours refers to Work.WorkingHoursTooltip, Starvation refers to Status.Need.Hunger, dehydration refers to Status.Need.Thirst"
csCZ = "Úprava pracovní doby je jedním ze způsobů, jak spravovat vaši osadu.\n\nDelší pracovní dny znamenají rychlejší pokrok, ale každý večer bobři potřebují čas na odpočinek a spánek.\nNenechte je však pracovat příliš dlouho.\n\nZatím zvyšte pracovní dobu jen o trochu."
viVN = "Điều chỉnh giờ làm việc là một cách để quản lý khu định cư của bạn.\n                                        \nNgày làm việc dài hơn có nghĩa là tiến độ nhanh hơn, nhưng mỗi buổi tối, hà mã cần thời gian thư giãn và ngủ. Đừng đẩy chúng quá sức quá lâu.\n                                        \nHiện tại, hãy tăng giờ làm việc lên một chút."

