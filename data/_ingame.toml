["Building.Memory.Mode.FlipFlop.Description"]
raw = "Captures <YellowHighlight>{0}</YellowHighlight> when <YellowHighlight>{1}</YellowHighlight> switches on."
status = "normal"
prompt = "This describes a mode of an electronic component. {0} and {1} are input names such as A or B but styled like keywords so do not worry about articles. Notice the subtles difference with other modes between 'is on' (meaning something happens for the whole duration when a signal is On) VS 'switches on' (meaning something happens the moment a signal changes from Off to On)."

