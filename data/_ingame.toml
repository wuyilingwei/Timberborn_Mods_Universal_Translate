["Faction.Folktails.Description"]
raw = "Easygoing but hardworking, Folktails are expert farmers. They respect nature and it rewards them with plentiful bounties.\r\nTheir motto: <i>Comfort, food, and sturdy wood.</i>"
status = "normal"
prompt = "Description of a beaver faction"
csCZ = "Pohodoví, ale pracovití, Folktails jsou zkušení farmáři.\nRespektují přírodu a ta je odměňuje hojností úrody.\nJejich motto: <i>Pohoda, jídlo a pevné dřevo.</i>"
viVN = "Dễ tính nhưng chăm chỉ, Folktails là những nông dân lão luyện. Họ tôn trọng thiên nhiên và thiên nhiên đáp lại bằng những vụ mùa bội thu. Khẩu hiệu của họ: <i>Sự thoải mái, thức ăn và gỗ chắc chắn.</i>"

