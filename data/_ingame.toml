["Tutorial.Introduction.Description"]
raw = "Welcome to Timberborn! This tutorial will help you set your paw in the wasteland and survive the first days.\r\n                                   \r\nYou will learn how to use the tools needed to build a thriving beaver community.\r\n                                   \r\nAs you progress through the next steps, the tips will appear here."
status = "normal"
csCZ = "Vítejte v Timberbornu! Tento návod vám pomůže usadit se v pustině a přežít první dny.\n\nNaučíte se, jak používat nástroje potřebné k vybudování prosperující komunity bobrů.\n\nJak budete postupovat na dalších krocích, tipy se objeví zde."
viVN = "Chào mừng bạn đến Timberborn!\nHướng dẫn này sẽ giúp bạn đặt chân vào vùng hoang vắng và sống sót qua những ngày đầu.\n\nBạn sẽ học cách sử dụng các công cụ cần thiết để xây dựng một cộng đồng hải ly thịnh vượng.\n\nKhi bạn tiến bộ qua các bước tiếp theo, các mẹo sẽ xuất hiện ở đây."

["Tutorial.LayerTool.ChangeUsingMouse"]
raw = "You can control the visible layer without clicking the buttons with customizable key bindings.\r\n                                     \r\nMany other actions have key bindings as well. You can find them in tooltips or in the Settings menu."
status = "normal"
prompt = "Keybindings refers to Menu.KeyBindings"
csCZ = "Můžete ovládat viditelnou vrstvu bez kliknutí na tlačítka pomocí přizpůsobitelných klávesových zkratek.\n\nMnoho dalších akcí má také klávesové zkratky. Najdete je v nápovědách (tooltipy) nebo v nabídce Nastavení."
viVN = "Bạn có thể điều khiển lớp hiển thị mà không cần nhấp chuột vào các nút với thiết lập phím tắt tùy chỉnh.\n\nNhiều hành động khác cũng có phím tắt. Bạn có thể tìm chúng trong chú thích công cụ hoặc trong menu Cài đặt."

["Tutorial.LayerTool.ChangeUsingUI"]
raw = "As your settlement grows vertically, working beneath buildings and terrain can become difficult.\r\n                                  \r\nThe Layer tool helps with that by hiding everything above the selected layer.\r\n                                  \r\nLet's change the visible layer by clicking the highlighted buttons."
status = "normal"
csCZ = "Jak vaše osada roste vzhůru, práce pod budovami a terénem může být obtížná.\n\nNástroj Vrstva pomáhá tím, že skryje vše nad vybranou vrstvou.\n\nZměňme viditelnou vrstvu kliknutím na zvýrazněná tlačítka."
viVN = "Khi khu định cư của bạn ngày càng phát triển theo chiều thẳng đứng, làm việc dưới các tòa nhà và địa hình có thể trở nên khó khăn.\n\nCông cụ Layer giúp làm điều đó bằng cách ẩn mọi thứ phía trên lớp được chọn.\n\nHãy thay đổi lớp hiển thị bằng cách nhấp vào các nút được làm nổi bật."

