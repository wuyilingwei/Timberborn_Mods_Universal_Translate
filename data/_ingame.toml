["MapMetadata.Oasis.Description"]
raw = "A lone green refuge in the wasteland surrounded by aquifers that can be accessed by clever beaver engineering."
status = "normal"
prompt = "Aquifer refers to Building.Aquifer.DisplayName"
csCZ = "Osamělá zelená oáza uprostřed pustiny, obklopená podzemními vodonosnými vrstvami, ke kterým je možné se dostat díky chytrému bobřímu inženýrství."
viVN = "Một ốc đảo xanh đơn độc giữa sa mạc hoang vu, được bao quanh bởi các tầng nước ngầm có thể tiếp cận được bằng kỹ thuật của những chú hải ly khéo léo."

