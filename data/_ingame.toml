csCZ = "Bobří inženýři touží využít přirozené zakřivení břehů řeky. Naplánovat nejlepší využití omezeného prostoru je ta nejtěžší část."
viVN = "Các kỹ sư hải ly rất thích khai thác độ cong tự nhiên của bờ sông. Việc lập kế hoạch cho cách sử dụng tối ưu không gian có hạn là phần khó khăn."

