["MapMetadata.Beaverome.Description"]
raw = "To build the legendary metropolis, the beavers' ancestors drained seven mighty craters. Even with today's timbertech, that's no small feat."
status = "normal"
csCZ = "Aby vybudovali legendární metropoli, prapředkové bobrů odčerpali vodu ze sedmi mocných kráterů. Ani s dnešním Timbertechem to není maličkost."
viVN = "Để xây dựng đô thị huyền thoại, tổ tiên của loài hải ly đã rút cạn bảy miệng hố vĩ đại. Ngay cả với công nghệ Timbertech ngày nay, đó không phải là chuyện nhỏ."

["MapMetadata.Beaverome.Name"]
raw = "Beaverome"
status = "normal"
prompt = "The name of this map comes from Beaver + Rome - an ancient beaver city."
csCZ = "Beaverome - Jméno této mapy pochází ze Beaver + Rome - starověké město bobrů."
viVN = "Beaverome"

["MapMetadata.Canyon.Description"]
raw = "In the desert, beavers seek valleys where rivers still flow. Easily dammed, this canyon will become a safe haven for all."
status = "normal"
csCZ = "Na poušti hledají bobři údolí, kde ještě tečou řeky. Tento kaňon, který lze snadno zatopit, se stane bezpečným útočištěm pro všechny."
viVN = "Trong sa mạc, những chú hải ly tìm kiếm những thung lũng nơi các con sông vẫn chảy. Dễ bị ngăn nước, hẻm núi này sẽ trở thành nơi ẩn náu an toàn cho mọi người."

["MapMetadata.Canyon.Name"]
raw = "Canyon"
status = "normal"
csCZ = "Kaňon"
viVN = "Hẻ núi"

["MapMetadata.Cliffside.Description"]
raw = "The remains of ancient hooman architecture stand scattered across this secluded valley. The beavers aspire to leave a similar mark on the world."
status = "normal"
csCZ = "Zbytky dávné hoomanské architektury se roztroušeně rozkládají po tomto odlehlém údolí. Bobři touží zanechat na světě podobnou stopu."
viVN = "Những tàn tích của kiến trúc con người cổ đại nằm rải rác khắp thung lũng hẻo lánh này. Những chú hải ly khao khát để lại một dấu ấn tương tự trên thế giới."

["MapMetadata.Cliffside.Name"]
raw = "Cliffside"
status = "normal"
csCZ = "Útes"
viVN = "Ven vách đá"

["MapMetadata.Craters.Description"]
raw = "Nobody knows how the craters came to be. Preliminary excavations suggest hoomans' violent involvement."
status = "normal"
csCZ = "Nikdo neví, jak krátery vznikly. Předběžné vykopávky naznačují násilné zapojení hoomans."
viVN = "Chẳng ai biết làm sao những hố này hình thành. Các cuộc khai quật sơ bộ cho thấy sự tham gia bạo lực của loài người."

["MapMetadata.Craters.Name"]
raw = "Craters"
status = "normal"
csCZ = "Krátery"
viVN = "Các miệng hố"

["MapMetadata.Diorama.Description"]
raw = "Before they're allowed to oversee large colonies, aspiring builders are tasked with running small-scale projects like this one."
status = "normal"
csCZ = "Než budou moci dohlížet na velké kolonie, mají začínající stavitelé za úkol vést malé projekty, jako je tento."
viVN = "Trước khi họ được phép quản lý các thuộc địa quy mô lớn, những nhà xây dựng đầy tham vọng được giao nhiệm vụ điều hành các dự án quy mô nhỏ như dự án này."

["MapMetadata.Diorama.Name"]
raw = "Diorama"
status = "normal"
csCZ = "Diorama"
viVN = "Mô hình ba chiều"

["MapMetadata.HelixMountain.Description"]
raw = "Even though they find the riverbed shape impractical, the beavers acknowledge hoomanity's limited water engineering skills."
status = "normal"
csCZ = "I když považují tvar koryta řeky za nepraktický, bobři uznávají omezené dovednosti lidstva ve vodním inženýrství."
viVN = "Dù họ cho rằng hình dạng đáy sông không thực tế, những con hải ly thừa nhận trình độ kỹ thuật thủy lợi của loài người còn hạn chế."

["MapMetadata.HelixMountain.Name"]
raw = "Helix Mountain"
status = "normal"
prompt = "The name of this map refers to the spiral shape of its central mountain."
csCZ = "Šroubovitá hora"
viVN = "Núi Helix"

["MapMetadata.Hollows.Description"]
raw = "These bountiful hollows are a prime area for prospective settlers. The carved out landscape hides many opportunities - the eldest beavers even whisper of buried treasures."
status = "normal"
csCZ = "Tyto úrodné důlky představují pro budoucí osadníky prvotřídní lokalitu. Vyřezávaná krajina skrývá mnoho příležitostí - nejstarší bobři dokonce šeptají o pohřbených pokladech."
