prompt = "Tutorial title, housing should be the same as ToolGroups.Housing"
csCZ = "Bydlení"
viVN = "Chỗ ở"

["Tutorial.Housing.Lodges"]
raw = "Two beavers are better than one! Houses improve your beavers' well-being and allow your Folktails population to grow.\r\n                                      \r\nBeavers automatically assign themselves to available housing slots."
status = "normal"
prompt = "Folktails is the same as faction as Faction.Folktails.DisplayName"
csCZ = "Dva bobři jsou lepší než jeden! Domy zlepšují pohodu vašich bobrů a umožňují růst populace Folktails.\n\nBobři se automaticky přiřadí k volným ubytovacím slotům."
viVN = "Hai con hải ly tốt hơn một con! Các căn nhà cải thiện phúc lợi của hải ly và cho dân số Folktails của bạn tăng lên.\n\nHải ly sẽ tự động phân bổ bản thân vào các chỗ ở có sẵn."

