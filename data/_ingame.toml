["Tutorial.PowerAndPlanks.LumberMill"]
raw = "It is time to start producing Planks!\r\n                                    \r\nBuild a Lumber Mill directly next to the Water Wheel. You may also build it further away and connect it to the Water Wheel using Power Shafts.\r\n                                    \r\nTip: Many buildings, such as Lumber Mills and Lodges, pass power to one another when placed wall to wall. No Power Shafts needed!"
status = "normal"
prompt = "Planks is the same as Good.Plank.PluralDisplayName, LumberMill is the same as Building.LumberMill.DisplayName, Water Wheel is the same as Building.WaterWheel.DisplayName, Power Shafts is the same as Building.PowerShaft.DisplayName, Lodge is the same as Building.Lodge.DisplayName"
csCZ = "Je čas začít vyrábět Prkna!\n\nPostavte Dřevařský mlýn přímo vedle Vodního kola. Můžete ho také postavit dál a spojit ho s Vodním kolem pomocí Energetických hřídelí.\n\nTip: Mnoho budov, jako jsou Dřevařské mlýny a Chatky, si předávají energii, když jsou postaveny vedle sebe. Energetické hřídele nejsou potřeba!"
viVN = "Đã đến lúc bắt đầu sản xuất Ván gỗ!\n\nXây một Xưởng xẻ gỗ ngay cạnh Cối nước. Bạn cũng có thể xây nó ở xa hơn và kết nối với Cối nước bằng Trục nguồn.\n\nMẹo: Nhiều công trình, như Xưởng xẻ gỗ và Nhà nghỉ, truyền nguồn cho nhau khi được đặt sát tường. Không cần Trục nguồn!"

["Tutorial.PowerAndPlanks.WaterWheel"]
raw = "More advanced buildings require power, and beavers like their power to come from the river.\r\n                                    \r\nPlace a Water Wheel in flowing water along the river bank."
status = "normal"
prompt = "Water Wheel is the same as Building.WaterWheel.DisplayName"
csCZ = "Pokročilejší budovy vyžadují energii, a bobři mají rádi, když jejich energie pochází z řeky.\n                                    \nUmístěte Vodní kolo do proudící vody podél břehu řeky."
viVN = "Các công trình tiên tiến hơn cần điện năng, và các hà ly thích nguồn điện của chúng đến từ dòng sông.\n                                    \nĐặt Water Wheel trong nước chảy dọc theo bờ sông."

