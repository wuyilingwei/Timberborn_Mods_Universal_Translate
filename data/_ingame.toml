viVN = "Dốc này đầy những khu vực nhỏ được tưới tiêu. Tuy nhiên, nguy hiểm rình rập khắp khu vực - nếu bạn không cẩn thận, những khu vực ấy sẽ chẳng còn gì là hiếu khách."

