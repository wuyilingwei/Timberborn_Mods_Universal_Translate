csCZ = "Dobrá práce! Vaše technologické dovednosti vám umožnily využít pilné síly Železných zubů k dobytí této mapy a vybudovat zázrak frakce."
viVN = "Làm tốt lắm! Khả năng công nghệ của bạn cho phép bạn tận dụng thế mạnh cần cù của Iron Teeth để chinh phục bản đồ này và xây dựng kỳ quan của phái."

