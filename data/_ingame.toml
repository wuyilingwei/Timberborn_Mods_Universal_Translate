["AnalyticsConsent.Header"]
raw = "Gameplay data"
status = "normal"
prompt = "Header of the panel that allows the player to consent to sending user data to the developers."
csCZ = "Herní data"
viVN = "Dữ liệu trò chơi"

["AnalyticsConsent.Info"]
raw = "Please help us make the game better by sharing data on how you play Timberborn.\r\n\r\nIf you agree, we will automatically collect gameplay-related information during your play sessions.\r\n\r\nYou can go to the in-game settings to withdraw your consent and delete your data at any time. For more information, see our <link><u>privacy policy</u></link>.\r\n\r\nThank you!"
status = "normal"
csCZ = "Pomozte nám zlepšit hru tím, že budete sdílet data o tom, jak hrajete Timberborn.\n\nPokud souhlasíte, budeme automaticky sbírat informace související s hraním během vašich herních seancí.\n\nMůžete jít do nastavení ve hře, abyste odvolali svůj souhlas a smazali svá data kdykoli. Pro více informací viz náš <link><u>zásady ochrany osobních údajů</u></link>.\n\nDěkujeme!"
viVN = "Vui lòng giúp chúng tôi làm cho trò chơi tốt hơn bằng cách chia sẻ dữ liệu về cách bạn chơi Timberborn.\n\nNếu bạn đồng ý, chúng tôi sẽ tự động thu thập thông tin liên quan đến việc chơi trong suốt các phiên chơi của bạn.\n\nBạn có thể vào cài đặt trong trò chơi để rút lại sự đồng ý và xóa dữ liệu của bạn bất cứ lúc nào. Để biết thêm thông tin, hãy xem <link><u>chính sách bảo mật</u></link>.\n\nCảm ơn bạn!"

