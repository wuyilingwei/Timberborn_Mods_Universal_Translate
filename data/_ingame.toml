["Building.Timer.Mode.Delay.Description"]
raw = "Delays <YellowHighlight>{0}</YellowHighlight> on by <YellowHighlight>{1}</YellowHighlight>, off by <YellowHighlight>{2}</YellowHighlight>."
status = "normal"
prompt = "This describes a mode of the Timer. {0} is Automation.Input.InputA, {1} is Building.Timer.Time1 and {2} is Building.Timer.Time2 but styled like keywords so do not worry about articles. Notice the subtles difference with other modes between 'is on' (meaning something happens for the whole duration when a signal is On) VS 'switches on' (meaning something happens the moment a signal changes from Off to On). In other words it means: Delays On state of input A by T1 and Off state of input A by T2."
csCZ = "Zpožďuje <YellowHighlight>{0}</YellowHighlight> zapnutí o <YellowHighlight>{1}</YellowHighlight>, a <YellowHighlight>{0}</YellowHighlight> vypnutí o <YellowHighlight>{2}</YellowHighlight>."
viVN = "Trì hoãn trạng thái Bật của <YellowHighlight>{0}</YellowHighlight> bởi <YellowHighlight>{1}</YellowHighlight>, trạng thái Tắt của <YellowHighlight>{0}</YellowHighlight> bởi <YellowHighlight>{2}</YellowHighlight>."

