["Tutorial.Droughts.Description"]
raw = "Congratulations! Your settlement has survived its first drought.\r\n                               \r\nDroughts are part of the seasonal cycle. They will return and become longer over time."
status = "normal"
prompt = "Drought refers to Weather.Drought"
csCZ = "Gratuluji! Vaše osada přežila první sucho.\n\nSucha jsou součástí sezónního cyklu. Vrátí se a časem se prodlouží."
viVN = "Chúc mừng! Khu định cư của bạn đã vượt qua trận hạn hán đầu tiên.\n\nHạn hán là một phần của chu kỳ theo mùa. Chúng sẽ quay trở lại và kéo dài theo thời gian."

["Tutorial.Forestry"]
raw = "Forestry"
status = "normal"
csCZ = "Lesnictví"
viVN = "Lâm nghiệp"

["Tutorial.Forestry.Forester"]
raw = "Beavers need a stable source of Logs. Duh.\r\n                            \r\nUsing Science Points produced by your Inventor, unlock the Forester. Then build it in an area where you want to plant trees."
status = "normal"
prompt = "Logs is the same as Good.Log.PluralDisplayName, Inventor is the same as Building.Inventor.DisplayName, Science Points is the same as Science.SciencePoints, Forester is the same as Building.Forester.DisplayName"
csCZ = "Bobři potřebují stabilní zdroj klád. Jasně.\n\nPoužijte Vědecké body, které produkuje váš Vynálezce, a odemkněte Lesníka. Pak ho postavte na plochu, na kterou chcete sázet stromy."
viVN = "Hải ly cần một nguồn gỗ ổn định. Thật đấy.\n\nSử dụng Điểm Khoa học do Nhà Phát Minh của bạn sản sinh để mở khóa Người trồng rừng. Sau đó xây dựng nó ở khu vực mà bạn muốn trồng cây."

["Tutorial.Forestry.MarkBirchesForPlanting"]
raw = "Use the Plant Trees and Bushes tool to plant some Birches. They grow quickly, making them a good choice in a fledgling settlement.\r\n                                          \r\nSimilarly to crops, trees only grow on irrigated, green areas.\r\n                                          \r\nRemember to mark the planting areas for cutting."
status = "normal"
prompt = "Plant Trees and Bushes is the same as ToolGroups.ForestryPlanting, Birches is the same as NaturalResource.Birch.DisplayName"
csCZ = "Použijte nástroj Zasadit stromy a keře k vysazení několika bříz. Rostou rychle, což z nich dělá dobrou volbu pro začínající osadu.\n\nPodobně jako plodiny, i stromy rostou jen na zavlažovaných, zelených plochách.\n\nNezapomeňte označit plochy určené k pokácení."
viVN = "Sử dụng công cụ Trồng cây và bụi cây để trồng vài cây bạch dương. Chúng phát triển nhanh chóng, khiến chúng là một lựa chọn tốt cho một khu định cư non trẻ.\n\nTương tự như cây trồng, cây mọc chỉ trên những khu vực được tưới nước, xanh tươi.\n\nNhớ đánh dấu các khu vực trồng để chặt."

["Tutorial.HaulersAndWorkforce"]
raw = "Haulers and workforce"
status = "normal"
prompt = "Tutorial title"
csCZ = "Nosiči a pracovní síla"
viVN = "Người chở hàng và lực lượng lao động"

["Tutorial.HaulersAndWorkforce.BuildHaulingPost"]
raw = "As your settlement grows, it processes larger amounts of goods. Transporting them takes a significant part of your workers' day.\r\n                                               \r\nHaulers help with that. They move the goods around their entire district, following the demand.\r\n                                               \r\nLet's build a Hauling Post now."
status = "normal"
prompt = "Hauling Post refers to Building.HaulingPost.DisplayName"
csCZ = "Jak roste vaše osada, zpracovává větší množství zboží.\nPřeprava zboží jim zabírá značnou část jejich pracovního dne.\n\nDopravci s tím pomáhají. Přemísťují zboží po celém jejich okrsku, podle poptávky.\n\nPostavme nyní dopravní stanici."
viVN = "Khi khu định cư của bạn phát triển, nó xử lý lượng hàng hóa lớn hơn. Việc vận chuyển chúng chiếm một phần đáng kể trong ngày làm việc của công nhân của bạn.\n\nNgười chở hàng sẽ giúp được việc đó. Họ di chuyển hàng hóa khắp toàn bộ khu vực của họ, theo nhu cầu.\n\nHãy xây dựng Trạm Vận Chuyển ngay."

["Tutorial.HaulersAndWorkforce.ChangeWorkforce"]
raw = "Some workplaces, like Hauling Posts, don't fill all of their worker slots by default. You can change the number of desired workers in a building's panel.\r\n                                              \r\nAlso, you can control how buildings are staffed using workplace priorities. For example, the Hauling Post can usually be set to lower workplace priority.\r\n                                              \r\nLet's try it now."
status = "normal"
csCZ = "Některá pracoviště, jako Hauling Posts, ve výchozím nastavení neobsazují všechna svá pracovní místa.\nMůžete změnit počet požadovaných pracovníků v panelu budovy.\n\nTaké můžete řídit obsazení budov pomocí priorit pracovišť. Například Hauling Post lze obvykle nastavit na nižší prioritu pracoviště.\n\nZkusme to teď."
viVN = "Một số nơi làm việc, chẳng hạn như Cột Vận Chuyển, không lấp đầy tất cả các vị trí công nhân của chúng theo mặc định. Bạn có thể thay đổi số lượng công nhân mong muốn trong bảng điều khiển của một tòa nhà.\n\nNgoài ra, bạn có thể kiểm soát cách các tòa nhà được tuyển dụng nhân sự bằng cách thiết lập ưu tiên cho nơi làm việc. Ví dụ, Cột Vận Chuyển thường có thể được đặt ở mức ưu tiên nơi làm việc thấp hơn.\n\nHãy thử nó ngay bây giờ."

["Tutorial.HaulersAndWorkforce.PauseHaulingPost"]
raw = "You can pause buildings and construction sites. This gives you more control over the beavers' actions.\r\n                                               \r\nFor example, paused workplaces are vacated automatically and workers re-assign themselves to other available workplaces.\r\n                                               \r\nSelect the Hauling Post and pause it by clicking the button in its panel."
status = "normal"
prompt = "Hauling Post refers to Building.HaulingPost.DisplayName"
csCZ = "Můžete pozastavit budovy a staveniště. Tím získáte větší kontrolu nad činnostmi bobrů.\n\nNapříklad pozastavená pracoviště jsou automaticky uvolněna a pracovníci se sami přeřadí na jiná dostupná pracoviště.\n\nVyberte Nákladovou stanici a pozastavte ji kliknutím na tlačítko v jejím panelu."
viVN = "Bạn có thể tạm dừng các công trình và công trường. Điều này cho bạn nhiều kiểm soát hơn đối với hành động của những chú hải ly.\n\nVí dụ, các nơi làm việc bị tạm dừng sẽ tự động được bỏ trống và công nhân sẽ tự phân công lại cho các nơi làm việc có sẵn khác.\n\nChọn Trạm Chở Hàng và tạm dừng nó bằng cách nhấp vào nút trong bảng điều khiển của nó."

["Tutorial.Housing"]
