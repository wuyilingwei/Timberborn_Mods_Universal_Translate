status = "normal"
prompt = "Welcome text that is shown to players of the experimental versions of the game."
csCZ = "Tato verze Timberbornu vám dává přístup k prototypovým, nedokončeným funkcím. Je tedy také mnohem pravděpodobnější, že bude obsahovat závažné chyby. Jste opravdu odvážná bobřík.\n\nExperimentální úložiště jsou ukládána odděleně od hlavní hry. Aktualizace mohou narušit kompatibilitu uložených her.\n\nV tomto experimentálním režimu <RedHighlight>mnohé části hry nejsou přeloženy a zobrazují se v angličtině</RedHighlight>, bez ohledu na váš výběr jazyka. To nám umožňuje přidávat nový obsah a provádět rychlé změny, aniž bychom museli čekat na časově náročné překlady.\n\nDůrazně doporučujeme, abyste se připojili k našemu oficiálnímu serveru Discord a zúčastnili se diskuse o novém obsahu."
viVN = "Phiên bản Timberborn này cho bạn quyền truy cập vào các tính năng nguyên mẫu, chưa hoàn thiện. Vì vậy, nó cũng có khả năng gặp lỗi nghiêm trọng. Bạn thực sự là một chú hải ly dũng cảm.\n\nCác bản lưu ở chế độ Experimental được lưu riêng biệt với trò chơi chính. Các bản cập nhật có khả năng làm hỏng tính tương thích của các bản lưu.\n\nTrong chế độ thử nghiệm này <RedHighlight>nhiều phần của trò chơi chưa được dịch và được hiển thị bằng tiếng Anh</RedHighlight>, bất kể lựa chọn ngôn ngữ của bạn. Điều này cho phép chúng tôi thêm nội dung mới và thực hiện các thay đổi nhanh chóng mà không phải chờ đợi các bản dịch tốn thời gian.\n\nChúng tôi rất khuyến khích bạn tham gia máy chủ Discord chính thức của chúng tôi và tham gia vào cuộc thảo luận về nội dung mới."

