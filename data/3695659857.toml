["Building.BotStorage.Description"]
raw = "A secure facility to store idle bots. Bots assigned here will power down, preventing deterioration and halting their fuel and energy consumption."
status = "normal"
enUS = "A secure facility to store idle bots. Bots assigned here will power down, preventing deterioration and halting their fuel and energy consumption."
zhCN = "一个安全的设施，用于存储闲置的机器人。分配到这里的机器人将进入待机状态，防止损坏并停止燃料和能量消耗。"
zhTW = "一個安全的設施，用於儲存閒置的機器人。被分配到這裡的機器人將會關閉電力，防止損耗並停止燃料和能源的消耗。"
ruRU = "Безопасное хранилище для простоящих ботов. Боты, назначенные здесь, будут отключаться, предотвращая их износ и останавливая потребление топлива и энергии."
jaJP = "「アイドルのボットを保存するための安全な施設。ここに割り当てられたボットは電源を切り、劣化を防ぎ、燃料とエネルギーの消費を停止します。」"
frFR = "Une installation sécurisée pour stocker les bots inactifs. Les bots assignés ici se mettront hors tension, empêchant leur détérioration et stoppant leur consommation de carburant et d'énergie."
deDE = "Eine sichere Einrichtung zur Lagerung von inaktiven Bots. Bots, die hier zugewiesen sind, werden heruntergefahren, um Verschlechterung zu verhindern und ihren Kraftstoff- und Energieverbrauch zu stoppen."
plPL = "Bezpieczny obiekt do przechowywania bezczynnych botów. Boty przypisane tutaj będą wyłączane, co zapobiegnie ich uszkodzeniu oraz zatrzyma zużycie paliwa i energii."
ptBR = "Uma instalação segura para armazenar robôs ociosos. Robôs designados aqui ficarão desligados, prevenindo a deterioração e interrompendo seu consumo de combustível e energia."
koKR = "유휴 봇을 저장하기 위한 안전한 시설입니다. 이곳에 배정된 봇은 작동을 멈추며, 이를 통해 노후화를 방지하고 연료 및 에너지 소비를 중단합니다."
csCZ = "Bezpečné zařízení pro ukládání nečinných robotů. Roboti přiřazení sem se vypnou, čímž se zabrání jejich opotřebení a zastaví se jejich spotřeba paliva a energie."
viVN = "Một cơ sở an toàn để lưu trữ các robot nhàn rỗi. Các robot được phân công ở đây sẽ tắt nguồn, ngăn chặn sự suy giảm và dừng tiêu thụ nhiên liệu cũng như năng lượng của chúng."

["Building.BotStorage.FlavorDescription"]
raw = "Even perfect machines need a place to power down and collect dust... safely."
status = "normal"
enUS = "Even perfect machines need a place to power down and collect dust... safely."
