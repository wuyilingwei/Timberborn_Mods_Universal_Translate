zhTW = "即使是完美的機器，也需要一個地方來關閉和積灰……安全地。"
ruRU = "Даже идеальным машинам нужно место, чтобы отключиться и собирать пыль... в безопасности."
jaJP = "完璧な機械でも、電源を切って安全に埃をかぶる場所が必要です..."
frFR = "Même les machines parfaites ont besoin d'un endroit pour se mettre hors tension et recueillir la poussière... en toute sécurité."
deDE = "Selbst perfekte Maschinen brauchen einen Ort, um sich auszuschalten und Staub zu sammeln... sicher."
plPL = "Nawet doskonałe maszyny potrzebują miejsca, aby się wyłączyć i zbierać kurz... bezpiecznie."
ptBR = "Ainda máquinas perfeitas precisam de um lugar para desligar e acumular poeira... com segurança."
koKR = "완벽한 기계조차도 안전하게 전원을 끄고 먼지를 쌓을 공간이 필요하다..."
csCZ = "Dokonce i dokonalé stroje potřebují místo, kde se mohou vypnout a shromažďovat prach... v bezpečí."
viVN = "Cả những cỗ máy hoàn hảo cũng cần một nơi để nghỉ ngơi và tích tụ bụi... một cách an toàn."
