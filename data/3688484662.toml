["LV.MWSb.SkyblightStrengthDesc"]
raw = "How fast the blight spreads into the water (%/hour).\nFor example, at default 10%/hour, if you have 1m³ of water at 40% contamination, after an hour, it will be 50% contaminated."
status = "normal"
enUS = "How fast the blight spreads into the water (%/hour). For example, at the default rate of 10%/hour, if you have 1m³ of water at 40% contamination, after an hour it will be 50% contaminated."
zhCN = "“病害传播到水中的速度（%/小时）。例如，在默认的10%/小时，如果您有1立方米水，污染率为40%，经过一个小时后，污染率将是50%。”"
zhTW = "疫病擴散到水中的速度（%/小時）。\n例如，在默認的10%/小時下，如果你有1立方米的水，污染程度為40%，那麼一小時後，污染程度將達到50%。"
ruRU = "С какой скоростью болезнь распространяется в воде (%/час).\nНапример, при стандартных 10%/час, если у вас есть 1м³ воды с 40% загрязнением, через час она будет загрязнена на 50%."
jaJP = "「枯れ木が水中に広がる速さ（%/時）。\n例えば、デフォルトの10%/時の場合、40%の汚染がある1m³の水があるとすると、1時間後には50%に汚染されます。」"
frFR = "Vitesse de propagation de la peste dans l'eau (%/heure). Par exemple, avec un taux par défaut de 10%/heure, si vous avez 1m³ d'eau à 40% de contamination, après une heure, elle sera à 50% de contamination."
deDE = "Wie schnell sich die Seuche ins Wasser ausbreitet (%/Stunde). Zum Beispiel, bei standardmäßigen 10%/Stunde, wenn Sie 1m³ Wasser mit 40% Kontamination haben, wird es nach einer Stunde 50% kontaminiert sein."
plPL = "Jak szybko zło rozszerza się w wodzie (%/godzina). Na przykład, przy domyślnym 10%/godzinę, jeśli masz 1m³ wody o 40% zanieczyszczeniu, po godzinie będzie miało 50% zanieczyszczenia."
ptBR = "Quão rápido a praga se espalha para a água (%/hora). Por exemplo, com 10%/hora por padrão, se você tiver 1m³ de água com 40% de contaminação, após uma hora, estará 50% contaminada."
koKR = "병이 물로 전파되는 속도 (%/시간). 예를 들어, 기본 10%/시간일 경우, 오염도가 40%인 1m³의 물이 있다면, 1시간 후에는 50%로 오염됩니다."
csCZ = "Jak rychle se nemoc šíří do vody (%/hodinu). Například při výchozím nastavení 10%/hodinu, pokud máte 1 m³ vody s 40% kontaminací, po hodině bude 50% kontaminováno."
viVN = "Tốc độ lan truyền của bệnh vào nước (%/giờ). \nVí dụ, với tỷ lệ mặc định 10%/giờ, nếu bạn có 1m³ nước ở mức ô nhiễm 40%, sau một giờ, nó sẽ ô nhiễm 50%."

