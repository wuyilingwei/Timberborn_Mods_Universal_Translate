["LV.MWSb.BadrainDesc"]
raw = "Contaminated rain that causes various (configurable) negative effects:\n- Limit the moisture range of your land.\n- Contaminate the land every now and then.\n- Beavers get sick if outside for too long every day.\n- Bots get damaged when outside."
status = "normal"
enUS = "Contaminated rain that causes various (configurable) negative effects:\n- Limits the moisture range of your land.\n- Contaminates the land occasionally.\n- Beavers get sick if they spend too much time outside each day.\n- Bots take damage when exposed to the outside."
zhCN = "污染雨，导致各种（可配置）负面影响：\n- 限制土地的湿度范围。\n- 不时污染土地。\n- 海狸每天在外呆太久会生病。\n- 机器人在外时会受到损坏。"
zhTW = "受到污染的雨水，造成各種（可配置）的負面效果：\n- 限制土地的濕度範圍。\n- 不定期污染土地。\n- 海狸每天在外待太久會生病。\n- 機器人在外會受到損壞。"
ruRU = "Загрязнительный дождь, который вызывает различные (настраиваемые) отрицательные эффекты:\n- Ограничивает влажность вашей земли.\n- Загрязняет землю время от времени.\n- Бобры заболяют, если слишком долго находиться на улице каждый день.\n- Боты повреждаются, когда находятся на улице."
jaJP = "汚染された雨は、さまざまな（設定可能な）悪影響を引き起こします：\n- 土地の湿度範囲を制限します。\n- 時々土地を汚染します。\n- ビーバーは毎日外に出ていると長時間いると病気になります。\n- ボットは外にいると損傷を受けます。"
frFR = "Pluie contaminée qui provoque divers effets négatifs (configurables) :\n- Limite la plage d'humidité de vos terres.\n- Contamine la terre de temps en temps.\n- Les castors tombent malades s'ils restent dehors trop longtemps chaque jour.\n- Les bots subissent des dégâts lorsqu'ils sont à l'extérieur."
deDE = "Kontaminieller Regen, der verschiedene (konfigurierbare) negative Effekte verursacht:\n- Begrenzung des Feuchtigkeitsbereichs Ihres Landes.\n- Jedes Mal die Erde kontaminieren.\n- Biber werden krank, wenn sie jeden Tag zu lange draußen sind.\n- Bots werden beschädigt, wenn sie draußen sind."
plPL = "Zanieczyszczony deszcz, który powoduje różne (konfigurowalne) negatywne efekty:\n- Ogranicza zakres wilgotności twojej ziemi.\n- Co jakiś czas zanieczyszcza ziemię.\n- Bobry chorują, jeśli są na zewnątrz zbyt długo każdego dnia.\n- Boty ulegają uszkodzeniu, gdy są na zewnątrz."
ptBR = "Chuva contaminada que causa vários efeitos negativos (configuráveis):\n- Limita o alcance de umidade da sua terra.\n- Contamina a terra de tempos em tempos.\n- Os castores ficam doentes se estiverem fora por muito tempo a cada dia.\n- Os robôs se danificam quando ficam fora."
koKR = "오염된 비로 여러 가지 (설정 가능한) 부정적인 영향을 초래합니다:\n- 당신의 땅의 수분 범위를 제한합니다.\n- 가끔씩 땅을 오염시킵니다.\n- 비버는 매일 너무 오랫동안 밖에 있으면 아픕니다.\n- 봇은 밖에 나가면 손상을 입습니다."
csCZ = "Kontaminovaný déšť, který způsobuje různé (konfigurovatelné) negativní efekty:\n- Omezit rozsah vlhkosti vaší půdy.\n- Občas kontaminovat půdu.\n- Bobři onemocní, pokud jsou venku příliš dlouho každý den.\n- Roboti se poškodí, když jsou venku."
viVN = "Mưa ô nhiễm gây ra nhiều hiệu ứng tiêu cực (có thể cấu hình):\n- Giới hạn độ ẩm của đất.\n- Ô nhiễm đất thỉnh thoảng.\n- Hải ly bị bệnh nếu ở ngoài quá lâu mỗi ngày.\n- Bot bị hư hại khi ở ngoài."

