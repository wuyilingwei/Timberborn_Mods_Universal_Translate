["LV.MWSb.SkyblightDesc"]
raw = "Hazardous weather: The air itself conspires against you! See Skyblight and Badrain modifiers for effects."
status = "normal"
enUS = "Hazardous weather: The air itself conspires against you! See Skyblight and Badrain modifiers for effects."
zhCN = "危险天气：空气本身与你对抗！查看Skyblight和Badrain修饰符以了解效果。"
zhTW = "危險的天氣：空氣本身也在與你作對！請參見天空災害和降雨修飾符以瞭解效果。"
ruRU = "Опасная погода: сам воздух против вас! См. модификаторы Skyblight и Badrain для эффектов."
jaJP = "危険な天候：空気そのものがあなたに逆らいます！効果についてはSkyblightおよびBadrain修飾子を参照してください。"
frFR = "Météo dangereuse : L'air lui-même s'oppose à vous ! Consultez les modificateurs Skyblight et Badrain pour connaître les effets."
deDE = "Gefährliches Wetter: Die Luft selbst arbeitet gegen dich! Siehe Skyblight- und Badrain-Modifikatoren für Effekte."
plPL = "Niebezpieczna pogoda: Sama powietrze spiskuje przeciwko tobie! Zobacz modyfikatory Skyblight i Badrain, aby poznać efekty."
ptBR = "Clima perigoso: O ar em si conspira contra você! Veja os modificadores Skyblight e Badrain para efeitos."
koKR = "위험한 날씨: 공기 자체가 당신에게 반대하고 있습니다! 효과에 대한 스카이블라이트 및 바드레인 수정자를 참조하세요."
csCZ = "Nebezpečné počasí: Vzduch se sám proti vám spiknul! Podívejte se na modifikátory Skyblight a Badrain pro efekty."
viVN = "Thời tiết nguy hiểm: Không khí tự nó âm thầm chống lại bạn! Xem các chỉ số Skyblight và Badrain để biết hiệu ứng."

["LV.MWSb.SkyblightModifierDesc"]
raw = "All water get contaminated over time. Does not affect waters in storage (Tanks)."
status = "normal"
enUS = "All water becomes contaminated over time. This does not affect stored water (Tanks)."
zhCN = "所有水会随着时间被污染。不会影响储存中的水（储水罐）。"
zhTW = "所有水源會隨著時間而受到污染。不會影響儲存中的水（儲水槽）。"
ruRU = "Вся вода загрязняется со временем. Не влияет на воду в хранилищах (резервуарах)."
jaJP = "すべての水は時間の経過とともに汚染されます。貯蔵されている水（タンク内の水）には影響しません。"
frFR = "Tous les eaux se contaminent avec le temps. N'affecte pas les eaux en stockage (Réservoirs)."
deDE = "„Alle Wasser verschmutzen im Laufe der Zeit. Beeinflusst kein Wasser in Lagern (Tanks).“"
plPL = "Wszystka woda z czasem ulega zanieczyszczeniu. Nie dotyczy wód w magazynie (zbiorniki)."
ptBR = "Toda a água se contamina com o tempo. Não afeta as águas em armazenamento (Tanques)."
koKR = "모든 물은 시간이 지남에 따라 오염됩니다. 저장소에 있는 물(탱크)에는 영향을 주지 않습니다."
csCZ = "Veškerá voda se postupem času kontaminuje. Nepůsobí na vodu ve skladu (nádrže)."
viVN = "Tất cả nước đều bị ô nhiễm theo thời gian. Không ảnh hưởng đến nước trong kho (Bồn chứa)."

