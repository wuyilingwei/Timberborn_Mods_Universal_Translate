[_meta]
name = "Skyblight & Badrain Weather"

["LV.MWSb.Skyblight"]
new = "Skyblight"
status = "normal"

["LV.MWSb.SkyblightDesc"]
new = "Hazardous weather: The air itself conspires against you! See Skyblight and Badrain modifiers for effects."
status = "normal"

["LV.MWSb.SkyblightModifierDesc"]
new = "All water get contaminated over time. Does not affect waters in storage (Tanks)."
status = "normal"

["LV.MWSb.SkyblightStrength"]
new = "Blight Strength"
status = "normal"

["LV.MWSb.SkyblightStrengthDesc"]
new = "How fast the blight spreads into the water (%/hour).\nFor example, at default 10%/hour, if you have 1m³ of water at 40% contamination, after an hour, it will be 50% contaminated."
status = "normal"

["LV.MWSb.Badrain"]
new = "Badrain"
status = "normal"

["LV.MWSb.BadrainDesc"]
new = "Contaminated rain that causes various (configurable) negative effects:\n- Limit the moisture range of your land.\n- Contaminate the land every now and then.\n- Beavers get sick if outside for too long every day.\n- Bots get damaged when outside."
status = "normal"

["LV.MWSb.BadrainLimitMoisture"]
new = "Limit Moisture Range"
status = "normal"

["LV.MWSb.BadrainLimitMoistureDesc"]
new = "Limit the range your land get moisture when badrain is active."
status = "normal"

["LV.MWSb.BadrainMoistureRange"]
new = "Limited Moisture Range"
status = "normal"

["LV.MWSb.BadrainMoistureRangeDesc"]
new = "The maximum moisture range when badrain is active."
status = "normal"

["LV.MWSb.BadrainContamination"]
new = "Frequent land contamination"
status = "normal"

["LV.MWSb.BadrainContaminationDesc"]
new = "Contaminate the land every now and then when badrain is active."
status = "normal"

["LV.MWSb.BadrainContaminationDuration"]
new = "Contamination Duration"
status = "normal"

["LV.MWSb.BadrainContaminationDurationDesc"]
new = "How long the land is contaminated (hours) when badrain is active."
status = "normal"

["LV.MWSb.BadrainClearDuration"]
new = "Clear Duration"
status = "normal"

["LV.MWSb.BadrainClearDurationDesc"]
new = "How long the land is clear of contamination (hours) when badrain is active."
status = "normal"

["LV.MWSb.BadrainSickBeavers"]
new = "Cause sick beavers"
status = "normal"

["LV.MWSb.BadrainSickBeaversDesc"]
new = "Beavers get sick if outside for too long when badrain is active."
status = "normal"

["LV.MWSb.BadrainSickBeaversMin"]
new = "Minimum Time Outside"
status = "normal"

["LV.MWSb.BadrainSickBeaversMinDesc"]
new = "Minimum time outside (hours) before it risks getting sick."
status = "normal"

["LV.MWSb.BadrainSickBeaversMax"]
new = "Maximum Time Outside"
status = "normal"

["LV.MWSb.BadrainSickBeaversMaxDesc"]
new = "Maximum time outside (hours) at which a beaver will surely get sick. Between minimum and maximum time, the chance to get sick increases linearly."
status = "normal"

["LV.MWSb.BadrainDamageBots"]
new = "Damage bots"
status = "normal"

["LV.MWSb.BadrainDamageBotsDesc"]
new = "Bots get damaged when outside while badrain is active."
status = "normal"

["LV.MWSb.BadrainBotDamage"]
new = "Bot Damage (%/hour)"
status = "normal"

["LV.MWSb.BadrainBotDamageDesc"]
new = "How much damage bots get per hour outside when badrain is active."
status = "normal"

["LV.MWSb.BadrainBotStatus"]
new = "This Bot is in Badrain. It is being damaged at {0:0%} per hour while outside."
status = "normal"

["LV.MWSb.BadrainBeaverStatus"]
new = "This Beaver has been in Badrain for {0:0.0}h today. It has {1:0%} chance of being sick."
status = "normal"
