["Building.YuzuBath.Description"]
raw = "A bath with floating yuzu that leaves beavers smelling refreshingly citrusy."
status = "normal"
enUS = "A bath with floating yuzu that leaves beavers smelling refreshingly citrusy."
zhCN = "一个漂浮着柚子的浴缸，让海狸散发出清新柑橘的香气。"
zhTW = "一個漂浮著柚子的浴池，使海狸散發出清新的柑橘香氣。"
