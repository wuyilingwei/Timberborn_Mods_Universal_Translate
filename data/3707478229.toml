["Building.MechanicalBeehive.Description"]
raw = "Boosts the growth of nearby crops.A beaver-made hive that’s more comfortable for bees."
status = "normal"
enUS = "Boosts the growth of nearby crops. A beaver-made hive that’s more comfortable for bees."
zhCN = "“提升附近作物的生长。这是一个比狸鼠制造的蜂巢对蜜蜂更舒适的蜂窝。”"
zhTW = "提升附近作物的生長。一個由海狸製作的蜂巢，為蜜蜂提供更舒適的環境。"
ruRU = "Ускоряет ростNearby растений. Улей, созданный бобром, который более удобен для пчел."
jaJP = "「周囲の作物の成長を促進します。ビーバーが作った、ミツバチにとってより快適な巣箱です。」"
frFR = "Stimule la croissance des cultures à proximité. Une ruche fabriquée par des castors qui est plus confortable pour les abeilles."
deDE = "Fördert das Wachstum von nahegelegenen Pflanzen. Ein von Bibern gebauter Bienenstock, der für die Bienen angenehmer ist."
plPL = "Zwiększa wzrost pobliskich upraw. Wydrążone przez bobra gniazdo, które jest bardziej komfortowe dla pszczół."
ptBR = "Impulsiona o crescimento das colheitas próximas. Uma colmeia feita por castores que é mais confortável para as abelhas."
koKR = "주변 작물의 성장을 촉진합니다. 비버가 만든 벌집으로, 벌들에게 더욱 편안합니다."
csCZ = "Zrychluje růst blízkých plodin. Dřevěný úl, který vyrobili bobři a který je pro včely pohodlnější."
viVN = "Tăng cường sự phát triển của các vụ mùa gần đó. Một tổ ong do đầu gỗ chế tạo, thoải mái hơn cho ong."

