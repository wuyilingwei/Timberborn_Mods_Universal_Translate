jaJP = "ゆずが浮かぶ風呂で、ビーバーをさわやかな柑橘の香りにします。"
frFR = "Un bain avec des yuzu flottants qui laisse les castors ayant une odeur d'agrumes rafraîchissante."
deDE = "Ein Bad mit schwimmendem Yuzu, das die Biber erfrischend nach Zitrusfrüchten riechen lässt."
plPL = "Łazienka z unoszącym się yuzu, która pozostawia bobry pachnące orzeźwiającym cytrusami."
ptBR = "Um banho com yuzu flutuante que deixa os castores com um aroma refrescante de cítricos."
koKR = "유자와 함께 떠 있는 목욕으로, 비버에게 상큼한 감귤향을 남깁니다."
csCZ = "Koupel s plovoucím yuzu, která činí bobry osvěžujícím citrusovým způsobem voňavé."
viVN = "Một bồn tắm với yuzu nổi, để lại mùi thơm chanh tươi mát cho những con beaver."

