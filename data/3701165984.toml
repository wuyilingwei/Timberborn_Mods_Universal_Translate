zhCN = "“将原料煮成可进一步加工的涂抹酱。”"
zhTW = "將原料煮沸成醬料以供進一步加工。"
ruRU = "Сваривает ингредиенты в пасты для дальнейшей переработки."
jaJP = "「原料を煮て、さらなる加工のためのスプレッドを作ります。」"
