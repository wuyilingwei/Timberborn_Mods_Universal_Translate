["Building.JamStove.FlavorDescription"]
status = "normal"
raw = "The pot had to be closed up after too many sweet-toothed beavers have been tempted by the delicious jam and cream."
enUS = "The pot had to be closed up after too many sweet-toothed beavers were tempted by the delicious jam and cream."
zhCN = "“锅必须盖上，因为太多爱吃甜食的海狸被美味的果酱和奶油诱惑。”"
zhTW = "鍋子必須蓋上，因為太多喜愛甜食的海狸被美味的果醬和奶油誘惑了。"
ruRU = "Кастрюлю пришлось закрыть, после того как слишком много любителей сладкого бобров было соблазнено вкусным вареньем и сливками."
jaJP = "「美味しいジャムとクリームに魅了された甘党のビーバーが多すぎたため、鍋は閉じられなければなりませんでした。」"
frFR = "Il fallait fermer le pot après que trop de castors gourmands aient été tentés par la délicieuse confiture et la crème."
deDE = "Der Topf musste verschlossen werden, nachdem zu viele süßnasige Biber von der köstlichen Marmelade und Sahne verführt wurden."
plPL = "Garnek musiał być zamknięty po tym, jak zbyt wiele łasuchów bobrów dało się skusić pysznym dżemem i śmietaną."
ptBR = "A panela teve que ser fechada após muitos castores com gosto por doces terem sido tentados pela deliciosa geléia e creme."
koKR = "너무 많은 단 것 좋아하는 비버들이 맛있는 잼과 크림에 유혹당한 후, 냄비는 닫혀야 했다."
csCZ = "Hrnec musel být zavřený poté, co příliš mnoho medvídků s chutí na sladké podlehlo lahodnému džemu a smetaně."
viVN = "Cái nồi phải được đậy lại sau khi quá nhiều chú nhím có khẩu vị ngọt ngào bị cám dỗ bởi mứt và kem ngon lành."

