["Building.DrinkStove.Description"]
status = "normal"
raw = "Prepares soups and beverages from various ingredients."
enUS = "Prepares soups and beverages from various ingredients."
zhCN = "“从各种原料中准备汤和饮料。”"
zhTW = "從各種成分製作湯和飲料。"
ruRU = "Готовит супы и напитки из различных ингредиентов."
jaJP = "様々な材料からスープや飲み物を調理します。"
frFR = "Prépare des soupes et des boissons à partir de divers ingrédients."
deDE = "Bereitet Suppen und Getränke aus verschiedenen Zutaten zu."
plPL = "Przygotowuje zupy i napoje z różnych składników."
ptBR = "Prepara sopas e bebidas a partir de vários ingredientes."
koKR = "다양한 재료로 수프와 음료를 준비합니다."
csCZ = "Připravuje polévky a nápoje z různých ingrediencí."
viVN = "Chuẩn bị súp và đồ uống từ các nguyên liệu khác nhau."

["Building.DrinkStove.FlavorDescription"]
status = "normal"
raw = "A warm and busy cooking station where beavers prepare comforting soups and refreshing drinks to satisfy even the most demanding tastes."
enUS = "A warm and bustling cooking station where beavers prepare comforting soups and refreshing drinks to satisfy even the most discerning tastes."
zhCN = "“一个温暖而繁忙的烹饪站，海狸们在这里准备舒适的汤和清爽的饮料，以满足最挑剔的口味。”"
zhTW = "一個熱鬧的烹飪站，海狸們在這裡準備舒適的湯品和清涼的飲料，以滿足最挑剔的味蕾。"
ruRU = "Тёплая и уютная кухня, где бобры готовят сытные супы и освежающие напитки, чтобы удовлетворить даже самые требовательные вкусы."
jaJP = "「ビーバーたちが快適なスープやさっぱりとした飲み物を作る、温かく賑やかな料理ステーションです。どんなに厳しい味覚にも応えることができます。」"
frFR = "Une station de cuisson chaude et animée où les castors préparent des soupes réconfortantes et des boissons rafraîchissantes pour satisfaire les goûts les plus exigeants."
deDE = "„Eine warme und geschäftige Kochstation, in der Biber tröstliche Suppen und erfrischende Getränke zubereiten, um selbst die anspruchsvollsten Geschmäcker zufrieden zu stellen.“"
plPL = "Ciepła i tętniąca życiem stacja gotowania, w której bobry przygotowują pocieszające zupy i orzeźwiające napoje, aby zaspokoić nawet najbardziej wymagające gusta."
ptBR = "Uma estação de cozinha quente e movimentada onde os castores preparam sopas reconfortantes e bebidas refrescantes para satisfazer até os gostos mais exigentes."
koKR = "비버들이 가장 까다로운 입맛도 만족시킬 수 있도록 따뜻하고 바쁘게 요리하는 곳으로, 편안한 수프와 상쾌한 음료를 준비하는 조리대입니다."
csCZ = "Teplá a rušná kuchyň, kde bobři připravují útulné polévky a osvěžující nápoje, aby uspokojili i ty nejnáročnější chutě."
viVN = "Một trạm nấu nướng ấm cúng và bận rộn nơi những con sóc chuột chuẩn bị những món súp ấm áp và đồ uống tươi mát để làm hài lòng ngay cả những khẩu vị khó tính nhất."

