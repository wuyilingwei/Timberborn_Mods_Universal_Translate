jaJP = "完璧な機械にも、電源を切って安全に埃をかぶる場所が必要です..."
frFR = "Même les machines parfaites ont besoin d'un endroit pour s'éteindre et accumuler la poussière... en toute sécurité."
deDE = "Sogar perfekte Maschinen benötigen einen Ort, um sich auszuschalten und Staub zu sammeln... sicher."
plPL = "Nawet doskonałe maszyny potrzebują miejsca, aby się wyłączyć i zbierać kurz... w bezpieczny sposób."
ptBR = "Mesmo máquinas perfeitas precisam de um lugar para desligar e acumular poeira... com segurança."
koKR = "완벽한 기계도 안전하게 전원을 끄고 먼지를 쌓을 공간이 필요하다..."
csCZ = "I dokonalé stroje potřebují místo, kde se mohou vypnout a shromažďovat prach... bezpečně."
viVN = "Ngay cả những cỗ máy hoàn hảo cũng cần một nơi để ngắt nguồn và thu bụi... một cách an toàn."
