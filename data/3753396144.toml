["Building.BotStorage.Description"]
raw = "A secure facility to store idle bots. Bots assigned here will power down, preventing deterioration and halting their fuel and energy consumption."
status = "normal"
enUS = "A secure facility to store idle bots. Bots assigned here will power down, preventing deterioration and halting their fuel and energy consumption."
zhCN = "“一个安全的设施，用于存放闲置的机器人。分配到这里的机器人将会关机，从而防止恶化并停止它们的燃料和能源消耗。”"
zhTW = "一個安全的設施，用於存放閒置的機器人。指派到這裡的機器人將會關閉電源，防止退化並停止燃料和能源的消耗。"
ruRU = "Безопасное помещение для хранения бездействующих роботов. Роботы, назначенные сюда, будут отключаться, предотвращая износ и останавливая потребление топлива и энергии."
jaJP = "アイドル状態のボットを保管するための安全な施設。ここに割り当てられたボットは電源が切れ、劣化を防ぎ、燃料とエネルギーの消費を停止します。"
frFR = "Un endroit sécurisé pour stocker des robots au repos. Les robots assignés ici se mettront hors tension, empêchant la détérioration et stoppant leur consommation de carburant et d'énergie."
deDE = "„Eine sichere Einrichtung zur Lagerung inaktiver Bots. Bots, die hier zugewiesen sind, werden heruntergefahren, um Verschlechterung zu verhindern und ihren Kraftstoff- sowie Energieverbrauch zu stoppen.“"
plPL = "Bezpieczny obiekt do przechowywania bezczynnych robotów. Roboty przydzielone tutaj zostaną wyłączone, co zapobiegnie ich degeneracji oraz zatrzyma zużycie paliwa i energii."
ptBR = "Uma instalação segura para armazenar robôs ociosos. Robôs designados aqui entrarão em modo de espera, prevenindo deterioração e interrompendo seu consumo de combustível e energia."
koKR = "유휴 봇을 저장하기 위한 안전한 시설입니다. 이곳에 배치된 봇은 전원이 꺼져서 마모를 방지하고 연료 및 에너지 소비를 중단합니다."
csCZ = "Bezpečné zařízení pro skladování nečinných botů. Boti přidělené sem se vypnou, čímž se zabrání jejich opotřebení a zastaví se jejich spotřeba paliva a energie."
viVN = "Cơ sở an toàn để lưu trữ các bot nhàn rỗi. Các bot được chỉ định ở đây sẽ tắt nguồn, ngăn ngừa sự suy giảm và dừng tiêu thụ nhiên liệu cũng như năng lượng."
trTR = "Boşta bekleyen robotları depolamak için güvenli bir tesis. Buraya atanan robotlar gücünü kapatacak, bozulmayı önleyecek ve yakıt ile enerji tüketimlerini durduracaktır."

