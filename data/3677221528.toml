["Grows.GrapesPlant.Purpose"]
raw = "Grapes of pale green, nothing like the deep green of the leafcoat variants"
status = "normal"
enUS = "Pale green grapes, nothing like the deep green of the leafcoat variants."
zhCN = "“淡绿色的葡萄，与深绿色的叶层变种截然不同”"
zhTW = "淺綠色的葡萄，與深綠色的葉衣變種完全不同"
ruRU = "Виноград бледно-зеленого цвета, совершенно не похожий на темно-зеленый цвет вариантов с листвой"
jaJP = "薄緑色のブドウ、葉のコートのバリエーションの深い緑とはまったく異なる"
frFR = "Raisins d'un vert pâle, rien à voir avec le vert profond des variantes de feuillage."
deDE = "Trauben in blassem Grün, ganz anders als das tiefgrüne Blattkleid-Varianten."
plPL = "Winogrona w jasnozielonym kolorze, zupełnie inne niż głęboka zieleń odmian liściowych"
ptBR = "Uvas de verde pálido, nada comparado ao verde profundo das variantes de folha."
koKR = "연한 초록색 포도, 잎코트 변종의 짙은 녹색과는 전혀 다릅니다."
csCZ = "Hrozny světle zelené, nic jako hluboce zelené varianty listového pláště"
viVN = "Nho màu xanh nhạt, không giống như màu xanh đậm của các biến thể lá."

["Grows.GrapesPlant.RandoQuote"]
raw = "There were disputes over where these should be, now they're just everywhere..."
status = "normal"
enUS = "There were disputes over where these should be, now they're just everywhere..."
zhCN = "“关于这些应该在哪里的争议曾经存在，现在它们到处都是……”"
zhTW = "「曾經對於這些應該放在哪裡有過爭議，現在它們遍地都是……」"
ruRU = "Были споры о том, где они должны быть, а теперь они повсюду..."
jaJP = "「どこにこれを置くべきかについての争いがあったが、今ではどこにでもある…」"
frFR = "Il y avait des disputes sur l'endroit où ils devraient être, maintenant ils sont juste partout..."
deDE = "„Es gab Streitigkeiten darüber, wo diese sein sollten, jetzt sind sie einfach überall…“"
plPL = "Były spory, gdzie powinny rosnąć, teraz są po prostu wszędzie..."
ptBR = "Agora não há mais disputas sobre onde deveriam estar, agora estão em toda parte..."
koKR = "이것들이 어디에 있어야 하는지에 대한 분쟁이 있었지만, 지금은 어디에나 있습니다..."
csCZ = "„Byly spory o to, kde by měly být, teď jsou prostě všude...“"
viVN = "Có những tranh cãi về việc những cái này nên ở đâu, bây giờ chúng ở khắp mọi nơi..."

