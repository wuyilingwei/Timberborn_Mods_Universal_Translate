["Grows.RedGrapesPlant.RandoQuote"]
raw = "Goods kids...and adults, should not mimic the Whitepaws love of wine"
status = "normal"
enUS = "Good kids...and adults, should not mimic the Whitepaws' love of wine."
zhCN = "“好的孩子们……还有成年人，不应该模仿白爪对酒的热爱”"
zhTW = "好孩子們……以及成年人，應該不模仿白爪對葡萄酒的熱愛。"
ruRU = "Детям... и взрослым не следует подражать любви Белолапок к вину."
jaJP = "「良い子供たち...そして大人たちは、ホワイトパウのワインの愛を真似してはいけません」"
frFR = "Les enfants... et les adultes, ne devraient pas imiter l'amour du vin des Whitepaws."
deDE = "Gute Kinder... und Erwachsene sollten nicht die Liebe der Weißen Pfoten zum Wein nachahmen."
plPL = "Dobre dzieci… i dorośli nie powinni naśladować miłości Whitepaws do wina"
ptBR = "Os jovens... e os adultos, não devem imitar o amor dos Whitepaws pelo vinho."
koKR = "아이들과 어른들은 화이트펀의 와인 사랑을 모방해서는 안 됩니다."
csCZ = "Dobré děti...a dospělí by neměli napodobovat lásku Bílých tlapek k vínu."
viVN = "Các đứa trẻ...và cả người lớn, không nên bắt chước tình yêu rượu vang của Whitepaws."

