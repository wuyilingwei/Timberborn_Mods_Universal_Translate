["Grows.GrapesPlant.Purpose"]
raw = "Grapes of pale green, nothing like the deep green of the leafcoat variants"
status = "normal"
enUS = "Pale green grapes, nothing like the deep green of the leafcoat variants."
zhCN = "“淡绿色的葡萄，与深绿色的叶层变种截然不同”"
zhTW = "淺綠色的葡萄，與深綠色的葉衣變種完全不同"
ruRU = "Виноград бледно-зеленого цвета, совершенно не похожий на темно-зеленый цвет вариантов с листвой"
jaJP = "薄緑色のブドウ、葉のコートのバリエーションの深い緑とはまったく異なる"
frFR = "Raisins d'un vert pâle, rien à voir avec le vert profond des variantes de feuillage."
deDE = "Trauben in blassem Grün, ganz anders als das tiefgrüne Blattkleid-Varianten."
plPL = "Winogrona w jasnozielonym kolorze, zupełnie inne niż głęboka zieleń odmian liściowych"
ptBR = "Uvas de verde pálido, nada comparado ao verde profundo das variantes de folha."
koKR = "연한 초록색 포도, 잎코트 변종의 짙은 녹색과는 전혀 다릅니다."
csCZ = "Hrozny světle zelené, nic jako hluboce zelené varianty listového pláště"
viVN = "Nho màu xanh nhạt, không giống như màu xanh đậm của các biến thể lá."

["Grows.GrapesPlant.RandoQuote"]
raw = "No more disputes between Whitepaws and LeafCoats over where to record the definition of Grapes :)"
status = "normal"
enUS = "No more disputes between Whitepaws and LeafCoats over where to record the definition of Grapes :)"
zhCN = "不再有白爪和叶披之间关于如何记录葡萄定义的争议了：)"
zhTW = "「白爪族和葉毛族之間再也不會為了葡萄的定義記錄在哪裡而爭吵了 :)」"
ruRU = "Больше никаких споров между Белыми Лапами и Листопадыми о том, где записывать определение Винограда :)"
jaJP = "「グレープの定義をどこに記録するかについて、ホワイトポウとリーフコートの間での争いはもうない :)」"
frFR = "Plus de disputes entre les Whitepaws et les LeafCoats sur l'endroit où enregistrer la définition des Raisins :)"
deDE = "Keine weiteren Streitigkeiten zwischen Weißpfoten und Blattmänteln darüber, wo die Definition von Trauben festgehalten werden soll :)"
plPL = "Koniec sporów między Białymi Łapami a Liściastymi Szczotkami o to, gdzie zarejestrować definicję Winogron :)"
ptBR = "Nenhuma mais disputa entre Patabrancas e Folhacos sobre onde registrar a definição de Uvas :)"
koKR = "포도 정의를 기록할 위치에 대한 화이트포와 리프코트 간의 더 이상 분쟁이 없습니다 :)"
csCZ = "„Žádné další spory mezi Bílýma tlapkama a Listopálek, kde zapsat definici Hroznů :)“"
viVN = "Không còn tranh cãi giữa Whitepaws và LeafCoats về việc ghi lại định nghĩa của Nho :)"

