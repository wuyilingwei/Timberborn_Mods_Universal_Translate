["Building.PathPlatformTunnel.Description"]
raw = "Tunnel through terrain, replacing it with mine timbers and a Path. Use the layer tool to see under terrain or structures."
status = "normal"
enUS = "Tunnel through terrain, replacing it with mine timbers and a Path. Use the layer tool to see under terrain or structures."
