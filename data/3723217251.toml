plPL = "Przeprowadzaj tunel przez teren, zastępując go drewnami kopalnianymi i ścieżką. Użyj narzędzia warstwy, aby zobaczyć pod terenem lub strukturami."
ptBR = "Tunnel através do terreno, substituindo-o por madeiras de mina e um Caminho. Use a ferramenta de camada para ver sob o terreno ou estruturas."
koKR = "지형을 관통하는 터널을 만들어 광산 나무와 길로 대체합니다. 레이어 도구를 사용하여 지형이나 구조물 아래를 확인하세요."
csCZ = "Tunelujte terénem, nahraďte ho dřevěnými prvky z dolu a cestou. Použijte nástroj pro vrstvy, abyste viděli pod terénem nebo strukturami."
viVN = "Đường hầm xuyên qua địa hình, thay thế nó bằng gỗ mỏ và một Con đường. Sử dụng công cụ lớp để nhìn thấy bên dưới địa hình hoặc công trình."

