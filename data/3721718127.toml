["Building.TWTradeOffice.Description"]
status = "normal"
raw = "Allows buying and selling of resources. To work, rear wall must touch a warehouse, stockpile, tank, or science building."
enUS = "Allows buying and selling of resources. To function, the rear wall must be adjacent to a warehouse, stockpile, tank, or science building."
zhCN = "“允许买卖资源。要正常工作，后墙必须靠触仓库、库存、储罐或科技建筑。”"
zhTW = "允許買賣資源。為了運作，後牆必須接觸到倉庫、儲藏室、儲水槽或科技建築。"
ruRU = "Позволяет покупать и Selling ресурсов. Для работы задняя стена должна соприкасаться со складом, хранилищем, резервуаром или научным зданием."
jaJP = "リソースの売買を可能にします。稼働するためには、後面の壁が倉庫、貯蔵庫、タンク、または科学ビルに接触している必要があります。"
frFR = "Permet d'acheter et de vendre des ressources. Pour fonctionner, le mur arrière doit toucher un entrepôt, un stock, un réservoir ou un bâtiment scientifique."
