["ModSetting.TWTradeOffice.PriceFluxRangeDesc"]
status = "normal"
raw = "How large the price changes can be. 0 means no changes. .5 means +/- 50%  2.0 means +/- 200% (The price can never go below 10% of normal, but if you set this to 10 it may go up to 1000% above normal)."
enUS = "How large the price changes can be. 0 means no changes. 0.5 means +/- 50%. 2.0 means +/- 200% (The price can never go below 10% of normal, but if you set this to 10, it may go up to 1000% above normal)."
zhCN = "“价格变化的幅度。0 代表没有变化。0.5 代表 +/- 50%。2.0 代表 +/- 200%（价格永远不能低于正常价格的 10%，但如果将其设置为 10，则可能会高出正常价格的 1000%）。”"
zhTW = "價格變動的範圍有多大。0表示無變動。0.5表示正負50%。2.0表示正負200%（價格永遠不會低於正常的10%，但如果將此設置為10，價格可能會達到正常的1000%）。"
ruRU = "Каковы могут быть изменения цен. 0 означает отсутствие изменений. 0,5 означает +/- 50%, 2,0 означает +/- 200% (Цена никогда не может опуститься ниже 10% от нормальной, но если вы установите это значение на 10, она может вырасти до 1000% выше нормальной)."
jaJP = "価格変動の範囲：価格の変動の大きさ。0は変動なし、0.5は±50%、2.0は±200%を意味します（価格は通常の10%を下回ることはありませんが、これを10に設定すると通常の1000%まで上昇する可能性があります）。"
frFR = "La taille des variations de prix. 0 signifie pas de variations. 0,5 signifie +/- 50 %  2,0 signifie +/- 200 % (Le prix ne peut jamais descendre en dessous de 10 % de la normale, mais si vous définissez cela à 10, il peut atteindre jusqu'à 1000 % au-dessus de la normale)."
deDE = "„Wie groß die Preisänderungen sein können. 0 bedeutet keine Änderungen. 0,5 bedeutet +/- 50%. 2,0 bedeutet +/- 200% (Der Preis kann niemals unter 10% des Normalpreises liegen, aber wenn Sie dies auf 10 setzen, kann er bis zu 1000% über dem Normalpreis liegen).“"
plPL = "Jak duże mogą być zmiany cen. 0 oznacza brak zmian. 0,5 oznacza +/- 50%, 2,0 oznacza +/- 200% (Cena nigdy nie może spaść poniżej 10% normalnej wartości, ale jeśli ustawisz to na 10, może wzrosnąć do 1000% powyżej normy)."
ptBR = "Quão grandes podem ser as mudanças de preço. 0 significa nenhuma alteração. 0,5 significa +/- 50%  2,0 significa +/- 200% (O preço nunca pode ficar abaixo de 10% do normal, mas se você definir isso como 10, pode subir até 1000% acima do normal)."
koKR = "가격 변화가 얼마나 클 수 있는지. 0은 변화가 없음을 의미합니다. 0.5는 +/- 50%를 의미하며, 2.0은 +/- 200%를 의미합니다. (가격은 정상 가격의 10% 아래로는 내려갈 수 없지만, 이를 10으로 설정하면 정상 가격보다 1000%까지 올라갈 수 있습니다.)"
csCZ = "Jak velké mohou být změny cen. 0 znamená žádné změny. 0,5 znamená +/- 50 %, 2,0 znamená +/- 200 % (cena nemůže nikdy klesnout pod 10 % normální ceny, ale pokud to nastavíte na 10, může vzrůst až na 1000 % nad normální cenu)."
viVN = "Các thay đổi giá có thể lớn đến mức nào. 0 có nghĩa là không có thay đổi. 0.5 có nghĩa là +/- 50%. 2.0 có nghĩa là +/- 200% (Giá không bao giờ thấp hơn 10% của mức bình thường, nhưng nếu bạn đặt giá trị này là 10, nó có thể lên đến 1000% so với mức bình thường)."

