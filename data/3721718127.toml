["ModSetting.TWTradeOffice.PriceFluxDeltaDesc"]
status = "normal"
raw = "How fast the price should change per day. 0 is none, 1 is instant. The starting and ending transitions will last approximately (1 / Transition speed) days."
enUS = "How fast the price should change per day. 0 is none, 1 is instant. The starting and ending transitions will last approximately (1 / Transition speed) days."
zhCN = "价格每天应变化的速度。0表示没有变化，1表示瞬时变化。起始和结束的过渡大约持续（1 / 过渡速度）天。"
zhTW = "價格每日變動的速度。0表示無變化，1表示瞬時變化。開始和結束的過渡將持續約（1 / 過渡速度）天。"
ruRU = "Насколько быстро цена должна изменяться в день. 0 - это отсутствие изменений, 1 - мгновенно. Начальные и конечные переходы будут длиться примерно (1 / Скорость перехода) дней."
jaJP = "価格が1日あたりどれくらい変動するか。0はなし、1は即時。開始と終了の遷移は約（1 / 遷移速度）日間続きます。"
frFR = "À quelle vitesse le prix doit-il changer par jour. 0 signifie aucun changement, 1 est instantané. Les transitions de début et de fin dureront environ (1 / Vitesse de transition) jours."
deDE = "Wie schnell der Preis pro Tag ändern sollte. 0 ist keine Änderung, 1 ist sofort. Die Anfangs- und Endübergänge dauern ungefähr (1 / Übergangsgeschwindigkeit) Tage."
plPL = "„Jak szybko cena powinna się zmieniać na dzień. 0 oznacza brak zmiany, 1 oznacza natychmiastową zmianę. Początkowe i końcowe przejścia będą trwały około (1 / Prędkości przejścia) dni.”"
ptBR = "Quão rápido o preço deve mudar por dia. 0 é nenhum, 1 é instantâneo. As transições de início e fim durarão aproximadamente (1 / Velocidade de transição) dias."
koKR = "가격이 하루에 얼마나 빨리 변할지. 0은 없음, 1은 즉시. 시작과 끝 전환은 약 (1 / 전환 속도)일 동안 지속됩니다."
csCZ = "Jak rychle by se měla cena měnit za den. 0 je žádná změna, 1 je okamžitá. Počáteční a koncové přechody budou trvat přibližně (1 / Rychlost přechodu) dní."
viVN = "Tốc độ thay đổi giá mỗi ngày. 0 là không có, 1 là ngay lập tức. Thời gian chuyển tiếp bắt đầu và kết thúc sẽ kéo dài khoảng (1 / Tốc độ chuyển tiếp) ngày."

