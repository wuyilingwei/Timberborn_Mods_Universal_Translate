["UI.TW.TradeOffice.TT.UserBuy"]
status = "normal"
raw = "Buy goods. Actual amount may be less if there is no room, or you lack credits. You will only be charged for the goods you receive. Price is re-calculated for each item bought."
enUS = "Buy goods. The actual amount may be less if there is no room or if you lack credits. You will only be charged for the goods you receive. Price is recalculated for each item bought."
zhCN = "购买商品。如果没有空间或您缺乏积分，实际数量可能会减少。您只会为收到的商品收费。每个商品的价格会重新计算。"
zhTW = "購買商品。如果沒有空間或您缺乏信用，實際數量可能會更少。您只需支付您所收到商品的費用。每件購買商品的價格將重新計算。"
ruRU = "«Покупайте товары. Фактическое количество может быть меньше, если нет места, или у вас недостаточно кредитов. Вы будете платить только за товары, которые получите. Цена пересчитывается для каждого купленного товара.»"
jaJP = "商品を購入します。実際の金額は、スペースがない場合やクレジットが不足している場合は少なくなることがあります。受け取った商品に対してのみ料金が請求されます。価格は購入する各アイテムに対して再計算されます。"
frFR = "Achetez des biens. Le montant réel peut être inférieur s'il n'y a pas de place ou si vous manquez de crédits. Vous ne serez facturé que pour les biens que vous recevez. Le prix est recalculé pour chaque article acheté."
deDE = "Kaufe Waren. Der tatsächliche Betrag kann geringer sein, wenn kein Platz vorhanden ist oder dir die Kredite fehlen. Du wirst nur für die Waren belastet, die du erhältst. Der Preis wird für jeden gekauften Artikel neu berechnet."
plPL = "Kupuj towary. Rzeczywista kwota może być mniejsza, jeśli nie ma miejsca lub brakuje ci kredytów. Zostaniesz obciążony tylko za towary, które otrzymasz. Cena jest przeliczana dla każdego zakupionego przedmiotu."
ptBR = "Compre produtos. A quantidade real pode ser menor se não houver espaço ou se você não tiver créditos suficientes. Você será cobrado apenas pelos produtos que receber. O preço é recalculado para cada item comprado."
koKR = "상품을 구매하세요. 실제 금액은 공간이 없거나 신용이 부족할 경우 적을 수 있습니다. 수령하는 상품에 대해서만 요금이 청구됩니다. 구매하는 각 항목의 가격은 재계산됩니다."
csCZ = "Kupujte zboží. Skutečné množství může být nižší, pokud není místo, nebo vám chybí úvěry. Budete účtováni pouze za zboží, které obdržíte. Cena se přepočítává pro každou zakoupenou položku."
viVN = "Mua hàng hóa. Số lượng thực tế có thể ít hơn nếu không có đủ chỗ, hoặc bạn thiếu tín dụng. Bạn chỉ bị tính phí cho hàng hóa bạn nhận được. Giá sẽ được tính lại cho mỗi món hàng đã mua."

["UI.TW.TradeOffice.TT.UserSell"]
status = "normal"
raw = "Sell goods. Actual amount may be less if there are not enough available. Price is re-calculated for each item sold."
enUS = "Sell goods. The actual amount may be less if there are not enough available. Price is recalculated for each item sold."
zhCN = "出售商品。如果可用数量不足，实际数量可能会更少。每出售一件商品，价格会重新计算。"
zhTW = "出售商品。如果可用量不足，實際數量可能會更少。每售出一件商品的價格會重新計算。"
ruRU = "Продавайте товары. Фактическое количество может быть меньше, если доступного недостаточно. Цена пересчитывается для каждого проданного предмета."
jaJP = "商品を販売します。利用可能な在庫が不足している場合、実際の数量は少なくなる可能性があります。販売される各アイテムに対して価格が再計算されます。"
frFR = "Vendre des biens. Le montant réel peut être inférieur s'il n'y a pas suffisamment de disponible. Le prix est recalculé pour chaque article vendu."
deDE = "„Verkaufen Sie Waren. Der tatsächliche Betrag kann geringer sein, wenn nicht genug verfügbar ist. Der Preis wird für jeden verkauften Artikel neu berechnet.“"
plPL = "Sprzedaj towary. Rzeczywista kwota może być mniejsza, jeśli dostępnych jest za mało. Cena jest przeliczana dla każdego sprzedanego przedmiotu."
ptBR = "Venda mercadorias. A quantidade real pode ser menor se não houver o suficiente disponível. O preço é recalculado para cada item vendido."
koKR = "물품을 판매합니다. 사용 가능한 수량이 충분하지 않으면 실제 금액이 더 적을 수 있습니다. 판매되는 각 품목에 대해 가격이 재계산됩니다."
csCZ = "Prodávejte zboží. Skutečné množství může být menší, pokud není dostatek dostupného. Cena se přepočítává na každý prodaný kus."
viVN = "Bán hàng hóa. Số lượng thực tế có thể ít hơn nếu không đủ hàng có sẵn. Giá sẽ được tính lại cho mỗi mặt hàng bán ra."

