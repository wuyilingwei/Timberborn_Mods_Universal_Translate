["NaturalResource.Ygo.Springroot.FlavorDescription"]
raw = "It reaches deep for hidden water. What rises is tainted, but not useless."
status = "normal"
enUS = "It reaches deep for hidden water. What rises is tainted, but not useless."
zhCN = "“它深深探求隐秘的水源。涌现而出的水虽然受到污染，但并非无用。”"
zhTW = "它深入尋找隱藏的水源。湧出的水雖受污染，但並非無用。"
ruRU = "Он проникает глубоко, чтобы найти скрытую воду. То, что поднимается, загрязнено, но не бесполезно."
jaJP = "それは隠れた水を求めて深く探ります。浮かび上がるものは汚れているが、無駄ではありません。"
frFR = "Il s'enfonce profondément pour trouver de l'eau cachée. Ce qui remonte est impur, mais pas inutile."
deDE = "Es greift tief nach verborgenem Wasser. Was aufsteigt, ist verseucht, aber nicht nutzlos."
plPL = "Sięga głęboko w poszukiwaniu ukrytej wody. To, co wznosi się, jest zanieczyszczone, ale nie bezużyteczne."
ptBR = "Ele vai fundo em busca de água escondida. O que sobe está contaminado, mas não é inútil."
koKR = "숨겨진 물을 찾기 위해 깊숙이 뿌리를 내립니다. 솟아오르는 물은 오염되어 있지만, 쓸모가 없는 것은 아닙니다."
csCZ = "Sahá hluboko pro skrytou vodu. Co vychází, je znečištěné, ale ne neužitečné."
viVN = "Nó vươn sâu để tìm kiếm nước ẩn. Những gì nổi lên thì bị ô nhiễm, nhưng không phải là vô dụng."
