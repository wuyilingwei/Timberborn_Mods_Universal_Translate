["Building.Ygo.WaterPurification.FlavorDescription"]
raw = "“Badwater has water in the name. In time, we were bound to find some in there. For timber’s sake.” —Chief Water Procurer"
status = "normal"
enUS = "“Badwater has water in the name. In time, we were bound to find some in there. For timber’s sake.” —Chief Water Procurer"
zhCN = "“坏水在名字中有水。最终，我们总会在其中找到一些。为了木材的缘故。” —首席水源采购员"
zhTW = "“壞水在名字中有水。隨著時間的推移，我們終將在那裡找到一些水。為了木材的利益。” —首席水源採集者"
ruRU = "„Плохая вода содержит воду в названии. Время от времени мы были обязаны найти её там. Ради дерева.“ — Главный водопроводчик"
jaJP = "「“悪水には水という名前が付いています。いつかその中に見つかる運命にあるでしょう。木材のために。” —水調達の長」"
frFR = "« L'eau mauvaise a de l'eau dans son nom. Avec le temps, nous étions destined à en trouver là-dedans. Pour le bois. » —Chef des approvisionnements en eau"
deDE = "„Schlechtes Wasser hat Wasser im Namen. Irgendwann mussten wir dort welches finden. Für das Holz.“ —Chief Water Procurer"
plPL = "„Zła woda ma wodę w nazwie. Prędzej czy później musieliśmy coś w niej znaleźć. Na rzecz drewna.” —Główny Pozyskiwacz Wody"
ptBR = "\"Água ruim tem água no nome. Com o tempo, estávamos destinados a encontrar algo lá. Pelo bem da madeira.\" —Chefe de Aquisição de Água"
koKR = "“나쁜 물에는 이름에 물이 들어 있다. 시간이 지나면 우리는 그곳에서 물을 찾게 될 것이다. 목재를 위해서.” —수자원 조달 책임자"
csCZ = "„Zlá voda má ve svém názvu vodu. Bylo jen otázkou času, kdy tam nějakou najdeme. Pro dřevo.“ —Hlavní získávač vody"
viVN = "“Xấu nước có nước trong tên. Theo thời gian, chúng ta chắc chắn sẽ tìm thấy một ít ở đó. Vì lợi ích của gỗ.” —Chủ tịch Dự trữ Nước"

["Building.Ygo.MarshwatcherHut.Description"]
raw = "Prepares Treated Soil from Dirt and Antidote, then uses it to plant Purifying Reeds and Tainted Springroots. Reeds cleanse contaminated water at the cost of their health, while Springroots draw badwater from deep underground and eventually poison themselves."
status = "normal"
enUS = "Prepares Treated Soil from Dirt and Antidote, then uses it to plant Purifying Reeds and Tainted Springroots. Reeds cleanse contaminated water at the cost of their health, while Springroots draw badwater from deep underground and eventually poison themselves."
zhCN = "“将泥土和解毒剂加工成处理过的土壤，然后用它来种植净化芦苇和污染根。芦苇以健康为代价净化被污染的水，而污染根则从地下深处抽取污水，最终使自身受到毒害。”"
zhTW = "從泥土和解毒劑製作處理過的土壤，然後用它來種植淨化蘆葦和汙染根。蘆葦以其健康為代價來淨化被污染的水，而汙染根則從深層地下抽取污水，最終會讓自己中毒。"
ruRU = "Приготавливает обработанную почву из грязи и противоядия, а затем использует её для посева очищающих тростников и испорченных корней. Тростники очищают загрязненную воду за счет своего здоровья, в то время как испорченные корни вытягивают грязную воду из-под земли и в конечном итоге отравляют себя."
jaJP = "土と解毒剤から処理された土壌を作り、それを使って浄化ススキと汚染されたスプリングルーツを植えます。ススキは健康を犠牲にして汚染された水を浄化し、スプリングルーツは地下深くから汚水を引き出し、最終的には自らを毒してしまいます。"
frFR = "Prépare de la Terre Traîtée à partir de Terre et d'Antidote, puis l'utilise pour planter des Roseaux Purificateurs et des Racines Toxiques. Les roseaux purifient l'eau contaminée au détriment de leur santé, tandis que les racines toxiques extraient l'eau polluée des profondeurs souterraines et finissent par se empoisonner."
deDE = "Bereitet behandelter Boden aus Erde und Antidot vor und verwendet ihn, um reinigende Röhren und verseuchte Wurzelpflanzen zu pflanzen. Röhren reinigen kontaminiertes Wasser auf Kosten ihrer Gesundheit, während Wurzelpflanzen schmutziges Wasser aus der tieferen Erde ziehen und sich letztendlich selbst vergiften."
plPL = "Przygotowuje Ulepszona Gleba z Dirt i Antidotum, a następnie używa jej do sadzenia Oczyszczających Trzciny i Zatrutych Korzeni. Trzciny oczyszczają zanieczyszczoną wodę kosztem swojego zdrowia, podczas gdy Korzenie pobierają zła wodę z głębokiego podziemia i ostatecznie się trują."
ptBR = "Prepara Solo Tratado a partir de Terra e Antídoto, e então o utiliza para plantar Juncos Purificadores e Raizes Contaminadas. Os Juncos limpam água contaminada à custa de sua saúde, enquanto as Raizes Contaminadas retiram água poluída do subsolo profundo e eventualmente se envenenam."
koKR = "흙과 해독제를 사용하여 처리된 토양을 준비한 후, 이를 사용하여 정화된 갈대와 오염된 봄뿌리를 심습니다. 갈대는 건강을 희생하여 오염된 물을 정화하며, 봄뿌리는 깊은 지하에서 나쁜 물을 끌어내어 결국 스스로를 독살시킵니다."
csCZ = "Připravuje ošetřenou půdu z hlíny a antidota, poté ji používá k sázení čisticích rákosů a zkažených pramenů. Rákosy čistí kontaminovanou vodu na úkor svého zdraví, zatímco zkažené prameny čerpají špatnou vodu z hlubokého podzemí a nakonec se sami otráví."
viVN = "Chuẩn bị Đất Được Xử Lý từ Đất và Chất Giải Độc, sau đó sử dụng nó để trồng Cây Sậy Thanh Tẩy và Rễ Xuân Bị Ô Nhiễm. Cây Sậy làm sạch nước bị ô nhiễm với chi phí sức khỏe của chúng, trong khi Rễ Xuân rút nước xấu từ sâu dưới lòng đất và cuối cùng tự làm hại chính mình."

