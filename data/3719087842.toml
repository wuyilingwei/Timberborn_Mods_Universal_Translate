["NaturalResource.Ygo.PurifyingReed.FlavorDescription"]
raw = "A stubborn marsh reed that drinks the bad out of badwater. Not forever, but long enough to make a difference."
status = "normal"
enUS = "A stubborn marsh reed that drinks the bad out of bad water. Not forever, but long enough to make a difference."
zhCN = "一种顽固的沼泽芦苇，它能从污染水中吸取污物。虽然不是永久性的，但足够长，能够带来改变。"
zhTW = "一種頑固的沼澤蘆葦，能從惡水中吸取不良物質。雖然不是永恆的，但足夠長的時間來產生影響。"
ruRU = "Упрямый тростник, который выжимает всё плохое из загрязнённой воды. Не навсегда, но достаточно долго, чтобы произвести изменения."
jaJP = "「悪い水から悪いものを吸い取る頑固な湿地のアシ。永遠ではないが、変化をもたらすには十分な時間。」"
frFR = "Un roseau marécageux tenace qui filtre les impuretés de l'eau polluée. Pas pour toujours, mais suffisamment longtemps pour faire une différence."
deDE = "Ein hartnäckiges Schilfrohr, das das Schlechte aus schlechtem Wasser trinkt. Nicht für immer, aber lange genug, um einen Unterschied zu machen."
plPL = "Bardzo uparty trzcinowy posłon, który wyciąga zanieczyszczenia z brudnej wody. Nie na zawsze, ale wystarczająco długo, by zrobić różnicę."
ptBR = "Uma juncos teimoso que absorve o ruim da água poluída. Não para sempre, mas o suficiente para fazer a diferença."
koKR = "불순물을 제거하는 고집 센 늪의 갈대. 영원하진 않지만, 변화를 만들기에는 충분히 긴 시간."
csCZ = "Tvrdohlavá mokřadní rákos, která saje zlé z špatné vody. Ne navždy, ale dost dlouho na to, aby to udělalo rozdíl."
viVN = "Một loại sậy đầm lầy cứng đầu hút chất độc ra khỏi nước bẩn. Không phải mãi mãi, nhưng đủ lâu để tạo ra sự khác biệt."

