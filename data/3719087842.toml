["Building.Ygo.MarshwatcherHut.FlavorDescription"]
raw = "“Healthy soil grows healthy plants. Treated soil grows plants willing to argue with badwater on our behalf.” —Folktail Marshkeeper"
status = "normal"
enUS = "“Healthy soil grows healthy plants. Treated soil grows plants willing to argue with bad water on our behalf.” —Folktail Marshkeeper"
zhCN = "“健康的土壤孕育健康的植物。处理过的土壤能培育出愿意与劣水抗争的植物。” — 沼泽守望者  Folktail"
zhTW = "「健康的土壤孕育健康的植物。經過處理的土壤會讓植物願意替我們與污水爭辯。」—傳說沼澤守護者"
ruRU = "«Здоровая почва рождает здоровые растения. Обработанная почва выращивает растения, готовые спорить с плохой водой от нашего лица.» —Охранитель болот Фолктейл"
jaJP = "「健康な土壌は健康な植物を育てる。処理された土壌は、私たちの代わって悪水と争うことをいとわない植物を育てる。」 —フォークテイル・マーシュキーパー"
frFR = "« Un sol sain fait pousser des plantes saines. Un sol traité fait pousser des plantes prêtes à se battre avec les mauvaises eaux en notre nom. » —Gardien des marais Folktail"
deDE = "„Gesunder Boden lässt gesunde Pflanzen wachsen. Behandelter Boden lässt Pflanzen wachsen, die bereit sind, mit schmutzigem Wasser in unserem Namen zu streiten.“ —Folktail Marshkeeper"
plPL = "„Zdrowa gleba rodzi zdrowe rośliny. Leczona gleba rodzi rośliny skłonne do kłótnni z złą wodą w naszym imieniu.” —Folktail Marshkeeper"
ptBR = "“Solo saudável gera plantas saudáveis. Solo tratado gera plantas dispostas a discutir com águas ruins em nosso nome.” —Folktail Marshkeeper"
koKR = "“건강한 토양은 건강한 식물을 길러냅니다. 처리된 토양은 나쁜 물과 우리를 대신해 논쟁할 준비가 된 식물을 기릅니다.” — 포크테일 늪지 지킴이"
csCZ = "„Zdravá půda pěstuje zdravé rostliny. Ošetřená půda pěstuje rostliny, které se chtějí hádat s špatnou vodou v našem zastoupení.“ —Folktail Marshkeeper"
viVN = "“Đất khỏe mạnh sinh ra thực vật khỏe mạnh. Đất đã qua xử lý sinh ra những cây sẵn sàng tranh cãi với nước dơ bẩn vì lợi ích của chúng ta.” —Folktail Marshkeeper"

