[_meta]
name = "Water Purification"

["Building.Ygo.WaterPurification.Description"]
raw = "Filters part of a flowing contaminated stream into a cleaner side output. Needs at least one empty block of clearence under output pipe. Works best with roughly 2 m³/s of badwater flow. Requires flow, power, extract, and dirt. Does not produce pure water on its own."
status = "normal"
enUS = "Filters part of a flowing contaminated stream into a cleaner side output. Needs at least one empty block of clearance under output pipe. Works best with roughly 2 m³/s of badwater flow. Requires flow, power, extraction, and dirt. Does not produce pure water on its own."
zhCN = "“将流动的受污染水流的一部分过滤成较清洁的侧输出。输出管下方至少需要一个空的清除块。在大约2 m³/s的污水流动下效果最佳。需要流动、水电、提取和土壤。自身不产生纯净水。”"
zhTW = "將部分流動的污染水源過濾成更清潔的側邊輸出。需要至少一個空的排水管下方空間。最適合約 2 立方米/秒的污染水流。需要水流、能量、提取和泥土。不能單獨產生純水。"
ruRU = "Фильтрует часть текучего загрязненного потока в более чистый побочный выход. Требуется хотя бы один пустой блок пространства под выходной трубой. Лучше всего работает при приблизительно 2 м³/с загрязненной воды. Требует поток, энергию, извлечение и грязь. Не производит чистую воду самостоятельно."
jaJP = "流れる汚染された水流の一部をきれいな側の出力にフィルタリングします。出力パイプの下に少なくとも1つの空きブロックのクリアランスが必要です。おおよそ2 m³/sの悪水の流れと一緒に使用するのが最適です。流れ、電力、抽出、土が必要です。自力で純水を生産することはできません。"
frFR = "Filtre une partie d'un ruisseau contaminé en un déversement plus propre. Nécessite au moins un bloc vide de dégagement sous le tuyau de sortie. Fonctionne mieux avec environ 2 m³/s de débit d'eau usée. Nécessite un débit, de l'énergie, de l'extraction et de la terre. Ne produit pas d'eau pure à elle seule."
deDE = "Filtert einen Teil eines fließenden kontaminierten Stroms in einen sauberen Seitenausgang. Benötigt mindestens einen leeren Block Platz unter dem Auslassrohr. Funktioniert am besten mit etwa 2 m³/s Schadwasserfluss. Benötigt Fluss, Energie, Extraktion und Schmutz. Produziert nicht von selbst reines Wasser."
plPL = "Filtruje część płynącego zanieczyszczonego strumienia do czystszej strony wyjścia. Wymaga przynajmniej jednego pustego bloku wolnego miejsca pod rurą wyjściową. Działa najlepiej przy przepływie około 2 m³/s zanieczyszczonej wody. Wymaga przepływu, energii, ekstrakcji i ziemi. Samodzielnie nie produkuje czystej wody."
ptBR = "Filtra parte de um fluxo contaminado em um lado de saída mais limpo. Necessita de pelo menos um bloco vazio de espaço sob o cano de saída. Funciona melhor com cerca de 2 m³/s de fluxo de água suja. Requer fluxo, energia, extração e terra. Não produz água pura por conta própria."
koKR = "흐르는 오염된 물의 일부를 더 깨끗한 쪽으로 필터링합니다. 출력 파이프 아래에 최소한 하나의 빈 블록이 필요합니다. 약 2 m³/s의 나쁜 물 흐름에서 가장 잘 작동합니다. 흐름, 전력, 추출 및 흙이 필요합니다. 스스로 깨끗한 물을 생산하지 않습니다."
csCZ = "Filtruje část tekoucí kontaminované vody do čistějšího výstupu. Potřebuje alespoň jeden prázdný blok prostoru pod výstupní trubkou. Nejlépe funguje s přibližně 2 m³/s špinavé vody. Vyžaduje tok, energii, extrakci a zeminu. Neprodukuje čistou vodu sama o sobě."
viVN = "lọc một phần của dòng chảy ô nhiễm vào một đầu ra sạch hơn. Cần ít nhất một khối trống để thông thoáng dưới ống dẫn nước đầu ra. Hoạt động tốt nhất với lưu lượng nước ô nhiễm khoảng 2 m³/s. Cần có dòng chảy, năng lượng, khai thác và đất. Không tự sản xuất nước tinh khiết."

