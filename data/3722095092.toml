["BHR.Settings.ShowHomeDistance.Tooltip"]
raw = "When on the workplace assignment panel shows each assigned worker's walking distance (along the navmesh) to their home dwelling next to their name. Same path the beaver actually takes to commute. Pathfinding is cached per panel open — close and reopen the panel to refresh after building roads. Off by default."
status = "normal"
enUS = "When on the workplace assignment panel, it shows each assigned worker's walking distance (along the navmesh) to their home dwelling next to their name. This is the same path the beaver actually takes to commute. Pathfinding is cached per panel open — close and reopen the panel to refresh after building roads. Off by default."
zhCN = "当在工作场所分配面板上时，显示每个已分配工人到其居所的行走距离（沿着导航网格）在他们的名字旁边。海狸实际 commuting 的路径。路径查找在每个面板打开时缓存 — 在建造道路后关闭并重新打开面板以刷新。默认关闭。"
zhTW = "當在工作場所指派面板上時，顯示每個指派工人從他們的家到工作地點的步行距離（沿著導航網格），位於他們名字的旁邊。這是海狸實際通勤所走的相同路徑。路徑尋找在每個面板打開時緩存——建造道路後關閉並重新打開面板以刷新。默認情況下為關閉狀態。"
ruRU = "На панели назначения рабочего места отображает расстояние, которое каждый назначенный работник проходит (по навигационной сетке) до своего домика рядом с его именем. Тот же путь, который бобёр фактически проходит для передвижения. Поиск пути кэшируется для каждой открытой панели — закройте и снова откройте панель, чтобы обновить данные после постройки дорог. По умолчанию выключено."
jaJP = "「作業場の割り当てパネルでは、各作業者の名前の横に自宅までの歩行距離（ナビメッシュに沿った距離）を表示します。ビーバーが実際に通勤する同じ経路です。パネルが開いている間、パスファインディングはキャッシュされます — 道路を建設した後は、パネルを閉じて再度開くことで更新されます。デフォルトではオフです。」"
frFR = "Lors de l'affichage du panneau d'assignation des postes de travail, il indique la distance de marche de chaque travailleur assigné (le long du navmesh) jusqu'à son domicile à côté de son nom. C'est le même chemin que le castor emprunte réellement pour se rendre au travail. Le calcul du chemin est mis en cache par panneau ouvert — fermez et rouvrez le panneau pour actualiser après la construction de routes. Désactivé par défaut."
deDE = "Wenn im Panel für Arbeitsplatzzuweisungen angezeigt wird, zeigt es die Gehdistanz jedes zugewiesenen Arbeiters (entlang des Navmesh) zu seiner Wohnstätte neben seinem Namen an. Der gleiche Weg, den der Biber tatsächlich für seinen Weg zur Arbeit zurücklegt. Die Wegfindung wird pro geöffnetem Panel zwischengespeichert - schließen und das Panel erneut öffnen, um nach dem Bau von Straßen zu aktualisieren. Standardmäßig deaktiviert."
plPL = "Na panelu przypisania w miejscu pracy pokazuje odległość spaceru każdego przypisanego pracownika (wzdłuż siatki nawigacyjnej) do ich domu obok ich imienia. Ta sama ścieżka, którą bóbr faktycznie pokonuje w drodze do pracy. Obliczanie ścieżek jest buforowane dla każdego otwartego panelu — zamknij i otwórz panel ponownie, aby odświeżyć po zbudowaniu dróg. Wyłączone domyślnie."
ptBR = "Quando no painel de atribuição de trabalho, mostra a distância de caminhada de cada trabalhador designado (ao longo do navmesh) até sua residência ao lado do nome. O mesmo caminho que o castor realmente percorre para se deslocar. A busca de caminhos é armazenada em cache para cada painel aberto — feche e reabra o painel para atualizar após a construção de estradas. Desligado por padrão."
koKR = "직장 할당 패널에서 각 할당된 근로자의 집까지의 거리(내비메시를 따라)를 이름 옆에 표시합니다. 비버가 실제로 통근하는 경로입니다. 경로 찾기는 패널 열릴 때마다 캐시되며, 도로를 건설한 후에는 패널을 닫았다가 다시 열어야 새로 고침됩니다. 기본값은 꺼져 있습니다."
csCZ = "Při zobrazování pracovního panelu přiřazení ukazuje vzdálenost chůze každého přiřazeného pracovníka (podél navmesh) k jejich domovu vedle jejich jména. Stejné trasy, které bobr skutečně používá k dojíždění. Náhodné vyhledávání cest je uloženo per panel otevřený — zavřete a znovu otevřete panel, abyste po stavbě silnic získali aktuální informace. Ve výchozím nastavení vypnuto."
viVN = "Khi ở trên bảng phân công nơi làm việc, hiển thị khoảng cách đi bộ của từng công nhân đã được phân công (dọc theo navmesh) đến nơi ở của họ bên cạnh tên của họ. Con đường mà con béo thực sự đi để đi làm. Tìm đường được lưu lại mỗi khi mở bảng - đóng và mở lại bảng để làm mới sau khi xây dựng đường. Tắt theo mặc định."
