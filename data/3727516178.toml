["Building.CombustionEngine.FlavorDescription"]
raw = "As great as this invention is, it became a splinter in the side of beaver nations other than Badfurs."
status = "normal"
enUS = "As great as this invention is, it became a thorn in the side of beaver nations other than Badfurs."
zhCN = "尽管这一发明极为出色，但它却成了除了Badfurs之外的其他海狸国家的一个刺。"
zhTW = "儘管這項發明相當出色，但它成為了除了壞毛之外的其他海狸國度的刺痛。"
ruRU = "Хотя это изобретение и превосходно, оно стало занозой для бобровых наций, кроме Badfurs."
jaJP = "「この発明は素晴らしいですが、バッドファー以外のビーバー国家にとっては厄介な存在となりました。」"
frFR = "Aussi géniale que soit cette invention, elle est devenue une écharde dans le flanc des nations de castors autres que les Badfurs."
deDE = "So großartig diese Erfindung auch ist, sie wurde zum Dorn im Auge der Biber-Nationen, die nicht Badfurs sind."
plPL = "Jak wspaniałe jest to wynalazek, stał się wrzodem w boku narodów bobrów innych niż Badfurs."
ptBR = "Por mais incrível que essa invenção seja, ela se tornou uma farpa no lado das nações de castores além dos Badfurs."
koKR = "이 발명이 얼마나 위대한지, 그것은 배드퍼스 외의 비버 국가들에게 난제가 되었다."
csCZ = "Jak skvělý je tento vynález, stal se trnem v oku bobřích národů kromě Badfurs."
viVN = "Mặc dù phát minh này thật tuyệt vời, nhưng nó trở thành một mũi nhọn trong mắt của các quốc gia hải ly khác ngoài Badfurs."
trTR = "Bu icat ne kadar harika olsa da, Badfurs dışındaki kunduz uluslarının yanında bir diken haline geldi."

["Building.BadwaterTap.Description"]
raw = "Seals a Badtide Drain. Can be opened or closed. When open, badwater flows during all weather."
status = "normal"
enUS = "Seals a Badtide Drain. Can be opened or closed. When open, badwater flows during all weather."
zhCN = "封闭一个坏潮排水口。可以打开或关闭。打开时，在任何天气下，污水都会流动。"
zhTW = "密封一個壞潮排水口。可以打開或關閉。當打開時，壞水在任何天氣下都會流動。"
ruRU = "Запечатывает Дренаж Заболоченной Воды. Может быть открыт или закрыт. Когда открыт, забрудненная вода течет при любой погоде."
jaJP = "「バッドタイドドレインを封鎖します。開閉可能です。開いているときは、悪水がすべての天候で流れます。」"
frFR = "Scelle un drain de Badtide. Peut être ouvert ou fermé. Lorsque ouvert, l'eau sale s'écoule par tous les temps."
deDE = "Verschließt einen Badtide-Abfluss. Kann geöffnet oder geschlossen werden. Wenn er geöffnet ist, fließt das Schmutzwasser bei jedem Wetter."
plPL = "Uszczelnia odpływ Badtide. Może być otwarty lub zamknięty. Gdy jest otwarty, brudna woda przepływa we wszystkich warunkach pogodowych."
ptBR = "Veda um Drenagem de Água Suja. Pode ser aberto ou fechado. Quando aberto, a água suja flui em todas as condições climáticas."
koKR = "악성 물을 배수하는 배수구를 봉인합니다. 열거나 닫을 수 있습니다. 열려 있을 때는 모든 날씨에 악성 물이 흐릅니다."
csCZ = "Ucpává odtok Badtide. Lze otevřít nebo zavřít. Když je otevřený, špatná voda teče za každého počasí."
viVN = "Niêm phong một cống Badtide. Có thể được mở hoặc đóng. Khi mở, nước bẩn chảy trong mọi thời tiết."
trTR = "Bir Badtide Drenajını kapatır. Açılabilir veya kapatılabilir. Açıkken, kötü su her türlü hava koşulunda akar."

