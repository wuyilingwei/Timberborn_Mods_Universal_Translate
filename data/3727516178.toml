["NewGameConfigurationPanel.BadAgeDescription"]
raw = "The hoomans left the world in a bad state.\n\nYour settlement starts with moderate resources.\n\nBadtides are far more frequent and severe.\n\nMeant for use with the Badfurs"
status = "normal"
enUS = "The humans left the world in a bad state.\n\nYour settlement starts with moderate resources.\n\nBadtides are far more frequent and severe.\n\nMeant for use with the Badfurs"
zhCN = "“人类离开时世界处于糟糕状态。\n\n你的定居点起始时有适度的资源。\n\n坏潮的频率和严重性都大大增加。\n\n该文本用于搭配 Badfurs 使用。”"
zhTW = "人類將世界留在一個糟糕的狀態。\n\n您的定居點開始時資源中等。\n\n惡潮的出現更加頻繁和嚴重。\n\n這個設定是為了與 Badfurs 一起使用"
ruRU = "Люди покинули мир в плохом состоянии.\n\nВаше поселение начинает с умеренных ресурсов.\n\nПлохие приливы намного чаще и сильнее.\n\nПредназначено для использования с Badfurs"
jaJP = "「人間たちは世界を悪化させて去っていきました。\n\nあなたの集落は中程度の資源で始まります。\n\n悪潮ははるかに頻繁で深刻です。\n\nBadfurs用に作られています。」"
frFR = "Les hoomans ont laissé le monde dans un mauvais état.\n\nVotre colonie commence avec des ressources modérées.\n\nLes marées mauvaises sont beaucoup plus fréquentes et sévères.\n\nDestiné à être utilisé avec les Badfurs."
deDE = "Die Menschen haben die Welt in einem schlechten Zustand hinterlassen.\n\nIhre Siedlung beginnt mit moderaten Ressourcen.\n\nSchlechte Gezeiten sind viel häufiger und schwerwiegender.\n\nFür die Verwendung mit den Badfurs gedacht."
plPL = "Hoomani opuścili świat w złym stanie.\n\nTwoja osada zaczyna z umiarkowanymi zasobami.\n\nZłe przypływy są znacznie częstsze i poważniejsze.\n\nPrzeznaczone do użytku z Badfurs"
ptBR = "Os hoomans deixaram o mundo em um estado ruim.\n\nSeu assentamento começa com recursos moderados.\n\nAs marés ruins são muito mais frequentes e severas.\n\nFeito para uso com os Badfurs."
koKR = "인간들은 세상을 나쁜 상태로 떠났습니다.\n\n당신의 정착지는 보통 자원으로 시작합니다.\n\n나쁜 조수가 훨씬 더 자주 발생하고 심각해집니다.\n\nBadfurs와 함께 사용할 수 있도록 설계되었습니다."
csCZ = "Hoomani opustili svět ve špatném stavu.\n\nVaše osada začíná se středními zdroji.\n\nŠpatné přílivy jsou mnohem častější a závažnější.\n\nUrčeno pro použití s Badfurs"
viVN = "Các hoomans đã bỏ lại thế giới trong một tình trạng tồi tệ.\n\nKhu định cư của bạn bắt đầu với nguồn tài nguyên vừa phải.\n\nBadtides xảy ra thường xuyên và nghiêm trọng hơn.\n\nDành cho việc sử dụng với Badfurs."
trTR = "Hoomanlar dünyayı kötü bir durumda terk etti.\n\nYerleşiminiz ortalama kaynaklarla başlar.\n\nKötü gelgitler çok daha sık ve şiddetli.\n\nBadfurs ile kullanılması amaçlanmıştır."

