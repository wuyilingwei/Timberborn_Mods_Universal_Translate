["Building.AridFarmhouse.FlavorDescription"]
raw = "\"There was once a rumour we eat fish. Disgusting!\" —Ma' Ngonel"
status = "normal"
enUS = "\"There was once a rumor we eat fish. Disgusting!\" —Ma' Ngonel"
zhCN = "“曾经有个传言我们吃鱼。真恶心！” —Ma' Ngonel"
zhTW = "「曾經有個謠言說我們吃魚。太噁心了！」 — 馬·戈內爾"
ruRU = "\"Когда-то ходили слухи, что мы едим рыбу. Отвратительно!\" —Ма' Нгонел"
jaJP = "「私たちが魚を食べるという噂があった。気持ち悪い！」—マ・ンゴネル"
frFR = "« Il y avait une fois une rumeur disant que nous mangions du poisson. Dégoûtant ! » —Ma' Ngonel"
deDE = "\"Es gab einmal das Gerücht, wir würden Fisch essen. Eklig!\" —Ma' Ngonel"
plPL = "\"Niektórzy mówili, że jemy ryby. Okropne!\" —Ma' Ngonel"
ptBR = "\"Uma vez houve um boato de que comemos peixe. Nojento!\" —Ma' Ngonel"
koKR = "\"우리가 생선을 먹는다는 소문이 있었습니다. 끔찍해요!\" —마' 응고넬"
csCZ = "\"Jednou kolovala fáma, že jíme ryby. Odporné!\" —Ma' Ngonel"
viVN = "\"Có một tin đồn rằng chúng tôi ăn cá. Thật kinh tởm!\" —Ma' Ngonel"
trTR = "\"Bir zamanlar balık yediğimize dair bir söylenti vardı. İğrenç!\" —Ma' Ngonel"

