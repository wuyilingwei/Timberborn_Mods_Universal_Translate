["NaturalResource.Rhubarb.FlavorDescription"]
raw = "Resistant to the poisonous leaves, Badfurs found rhubarb to be the perfect sweet treat."
status = "normal"
enUS = "Resistant to the poisonous leaves, Badfurs found rhubarb to be the perfect sweet treat."
zhCN = "抵抗有毒叶子的Badfurs发现大黄是完美的甜点。"
zhTW = "抗毒葉子，壞毛發發現大黃是完美的甜點。"
ruRU = "Устойчивые к ядовитым листьями, Бадфуры нашли ревень идеальным сладким угощением."
jaJP = "毒のある葉に対して抵抗力があるバッドファーズは、ルバーブが完璧な甘いおやつだと見つけました。"
frFR = "Résistants aux feuilles toxiques, les Badfurs ont trouvé que la rhubarbe était la douceur parfaite."
deDE = "Widerstandsfähig gegen die giftigen Blätter, fanden die Badfurs Rhabarber zur perfekten Süßigkeit."
plPL = "Odporny na trujące liście, Badfurs uznali rabarbar za idealny słodki przysmak."
ptBR = "Resistentes às folhas venenosas, os Badfurs descobriram que o ruibarbo era a guloseima doce perfeita."
koKR = "독성 잎에 강한 Badfurs는 루바브가 완벽한 단 간식임을 발견했습니다."
csCZ = "„Odolní vůči jedovatým listům, Badfurs považovali rebarboru za dokonalou sladkou pochoutku.“"
viVN = "Chịu được lá độc, Badfurs thấy củ dền là món ngọt hoàn hảo."
trTR = "Toksik yapraklara dayanıklı olan Badfurs, turpu mükemmel bir tatlı ikramı olarak buldular."

