["Faction.Badfurs.Description"]
raw = "Defectors of the traditional timber ways, they evolved to thrive in the contaminated wasteland.\nThey achieve progress through ingenuity, efficiency, and disregard for the environment.\nTheir motto: <i>Burn, beaver burn.</i>"
status = "normal"
enUS = "Defectors of the traditional timber ways, they evolved to thrive in the contaminated wasteland. They achieve progress through ingenuity, efficiency, and disregard for the environment. Their motto: <i>Burn, beaver burn.</i>"
zhCN = "“传统伐木方式的叛逃者，他们在被污染的废土中茁壮成长。\n他们通过独创性、效率和对环境的漠视来实现进步。\n他们的座右铭：<i>燃烧吧，海狸，燃烧。</i>”"
zhTW = "背叛傳統木材方式的他們，進化得以在污染荒原中茁壯成長。\n他們透過巧妙、效率和對環境的漠視來取得進展。\n他們的座右銘：<i>燒吧，海狸，燒吧。</i>"
ruRU = "Отступники от традиционных методов лесозаготовки, они эволюционировали, чтобы процветать в загрязненной пустоши. \nОни достигают прогресса за счет находчивости, эффективности и пренебрежения к окружающей среде. \nИх девиз: <i>Гори, бобер, гори.</i>"
jaJP = "「伝統的な木材の道から脱藩した彼らは、汚染された荒れ地で繁栄するように進化しました。  \n彼らは独創性、効率、そして環境への無関心を通じて進歩を遂げます。  \n彼らのモットー：<i>燃えろ、ビーバー、燃えろ。</i>」"
frFR = "Déserteurs des méthodes traditionnelles du bois, ils ont évolué pour prospérer dans le désert contaminé. \nIls progressent grâce à leur ingéniosité, leur efficacité et leur mépris pour l'environnement. \nLeur devise : <i>Brûle, castor, brûle.</i>"
deDE = "Abtrünnige der traditionellen Holzwege, sie haben sich entwickelt, um in der kontaminierten Einöde zu gedeihen. \nSie erreichen Fortschritt durch Einfallsreichtum, Effizienz und Missachtung der Umwelt. \nIhr Motto: <i>Verbrenne, Biber, verbrenne.</i>"
plPL = "Dezerterzy tradycyjnych drzewnych sposobów, ewoluowali, aby prosperować w skażonej pustyni. Osiągają postęp dzięki pomysłowości, efektywności i lekceważeniu środowiska. Ich motto: <i>Palisz, bobrze, pal.</i>"
ptBR = "Desertores dos tradicionais modos madeireiros, eles evoluíram para prosperar no deserto contaminado. Eles alcançam progresso por meio da engenhosidade, eficiência e desrespeito pelo meio ambiente. Seu lema: <i>Queime, castor, queime.</i>"
koKR = "전통적인 목재 방식의 이탈자들로, 오염된 황무지에서 번영할 수 있도록 진화했습니다. 그들은 창의성, 효율성, 그리고 환경에 대한 무관심을 통해 발전을 이룹니다. 그들의 모토: <i>타올라라, 비버여 타올라라.</i>"
csCZ = "Defekti tradičních dřevorubeckých způsobů, vyvinuli se, aby prosperovali v kontaminované pustině. \nPokroku dosahují vynalézavostí, efektivitou a opovržením k životnímu prostředí. \nJejich motto: <i>Hoř, bobře, hoř.</i>"
viVN = "Các phần tử đào tẩu khỏi những cách thức khai thác gỗ truyền thống, họ đã phát triển để tồn tại trong những vùng đất hoang tàn ô nhiễm.\nHọ đạt được tiến bộ thông qua sự khéo léo, hiệu quả, và sự phớt lờ đối với môi trường.\nChâm ngôn của họ: <i>Hãy cháy, con doi hãy cháy.</i>"
trTR = "Geleneksel ahşap yolların sürgünleri, kirlenmiş harabelerde gelişmek için evrim geçirdiler. Yenilikçilik, verimlilik ve çevreye kayıtsızlık aracılığıyla ilerleme kaydediyorlar. Sloganları: <i>Ateş yak, kunduz ateş yak.</i>"

