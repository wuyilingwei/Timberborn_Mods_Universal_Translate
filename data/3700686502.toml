raw = "A cover that can built on top of a Water Seep or Bad Water Seep to seal it. Can be opened or closed at will."
enUS = "A cover that can be built on top of a Water Seep or Bad Water Seep to seal it. Can be opened or closed at will."
zhCN = "“一个可以建在水渗漏或废水渗漏上方的盖子，用于封闭它。可以随意打开或关闭。”"
