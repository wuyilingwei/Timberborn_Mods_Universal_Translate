koKR = "물 빠짐 또는 나쁜 물 빠짐 위에 지을 수 있는 덮개로, 이를 밀봉할 수 있습니다. 원할 때 열거나 닫을 수 있습니다."
csCZ = "„Kryt, který lze postavit na vodní prosak nebo špatný vodní prosak, aby se uzavřel. Lze ho otevřít nebo zavřít podle potřeby.“"
viVN = "Một lớp phủ có thể được xây dựng trên một chỗ rỉ nước hoặc chỗ rỉ nước bẩn để bịt kín nó. Có thể được mở hoặc đóng theo ý muốn."
