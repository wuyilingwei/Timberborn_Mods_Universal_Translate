["BuildingMover.MoveCostPercentTooltip"]
status = "normal"
raw = "Percentage of the building's build materials charged for each move. 0 means free. Materials are drawn from public stockpiles in the source's district first, then from nearer districts."
enUS = "Percentage of the building's build materials charged for each move. 0 means free. Materials are drawn from public stockpiles in the source's district first, then from nearer districts."
zhCN = "“每次移动所收取的建筑建材百分比。0表示免费。材料首先从源区域的公共库存中提取，然后从更靠近的区域提取。”"
zhTW = "建物搬移成本百分比工具提示：移動每個建築所需的材料百分比。0表示免費。材料首先從來源區域的公共儲存區提取，然後從較近的區域提取。"
ruRU = "Процент строительных материалов,Charged за каждое перемещение. 0 означает бесплатно. Материалы берутся из общественных складов в районе источника в первую очередь, затем из ближайших районов."
jaJP = "建物の移動ごとに請求される建築資材の割合。0は無料を意味します。資材はまず元の地区の公共ストックから引き出され、その後、近くの地区から引き出されます。"
frFR = "Pourcentage des matériaux de construction du bâtiment facturés pour chaque déplacement. 0 signifie gratuit. Les matériaux sont d'abord prélevés dans les dépôts publics du district de la source, puis dans les districts plus proches."
deDE = "Prozentsatz der Baumaterialien, die für jede Bewegung berechnet werden. 0 bedeutet kostenlos. Materialien werden zuerst aus den öffentlichen Lagern im Bezirk der Quelle entnommen, gefolgt von den nächstgelegenen Bezirken."
plPL = "Procent materiałów budowlanych pobieranych za każdy ruch budynku. 0 oznacza darmowo. Materiały są najpierw pobierane z publicznych magazynów w dzielnicy źródłowej, a następnie z bliższych dzielnic."
ptBR = "Porcentagem dos materiais de construção do edifício cobrados para cada movimento. 0 significa gratuito. Os materiais são retirados dos depósitos públicos do distrito de origem primeiro, depois de distritos mais próximos."
koKR = "건물 이동 시 부과되는 자재 비율. 0은 무료를 의미합니다. 자재는 먼저 출발 지구의 공공 재고에서 소모되며, 이후 가까운 지구에서 소모됩니다."
csCZ = "Procento stavebních materiálů, které se účtují za každý přesun. 0 znamená zdarma. Materiály se nejprve čerpají z veřejných skladů v okrese zdroje, poté z blízkějších okresů."
viVN = "Phần trăm vật liệu xây dựng của công trình sẽ bị tính phí cho mỗi lần di chuyển. 0 có nghĩa là miễn phí. Vật liệu được lấy từ kho công cộng trong quận của nguồn trước, sau đó từ các quận gần hơn."

