["SmartProductionControl.Settings.PowerCoord.Section.Tooltip"]
raw = "When several buildings share a starved grid the mod coordinates who pauses based on priority. These per-building values override the global defaults from the dashboard."
status = "normal"
enUS = "When several buildings share a starved grid, the mod coordinates which one pauses based on priority. These per-building values override the global defaults from the dashboard."
zhCN = "当多个建筑共享一个缺电的电网时，mod 根据优先级协调暂停哪些建筑。这些每个建筑的值将覆盖仪表板上的全局默认值。"
zhTW = "當多個建築共享一個缺電的電網時，該模組會根據優先級協調誰進入暫停狀態。這些每個建築的值將覆蓋儀表板上的全局默認值。"
ruRU = "Когда несколько зданий используют истощённую сеть, мод определяет, какое из них приостановить, основываясь на приоритете. Эти значения для каждого здания переопределяют глобальные значения по умолчанию с панели управления."
jaJP = "「複数の建物が飢餓状態のグリッドを共有している場合、このモッドは優先度に基づいてどの建物が一時停止するかを調整します。これらの建物ごとの値は、ダッシュボードのグローバルデフォルトを上書きします。」"
frFR = "Lorsque plusieurs bâtiments partagent un réseau sous-alimenté, le mod coordinate qui se met en pause en fonction de la priorité. Ces valeurs par bâtiment remplacent les valeurs par défaut globales du tableau de bord."
deDE = "„Wenn mehrere Gebäude ein hungernedes Netz teilen, koordiniert das Mod, welches basierend auf der Priorität pausiert. Diese spezifischen Werte pro Gebäude überschreiben die globalen Standardeinstellungen vom Dashboard.“"
plPL = "Gdy kilka budynków dzieli głodną sieć, mod koordynuje, który z nich wstrzymuje działanie na podstawie priorytetu. Te wartości dla każdego budynku nadpisują globalne domyślne ustawienia z pulpitu."
ptBR = "Quando vários edifícios compartilham uma rede faminta, o mod coordena quem pausa com base na prioridade. Esses valores por edifício substituem os padrões globais do painel."
koKR = "여러 건물이 배급이 부족한 그리드를 공유할 때, 이 모드는 우선 순위에 따라 어떤 건물이 일시 중지되는지를 조정합니다. 이러한 건물별 값은 대시보드의 전역 기본값을 무시합니다."
csCZ = "Pokud několik budov sdílí hladový grid, mod koordinuje, která z nich se zastaví na základě priorit. Tyto hodnoty pro každou budovu přepisují globální výchozí hodnoty na panelu."
viVN = "Khi nhiều tòa nhà chia sẻ một lưới bị thiếu ăn, mod sẽ điều phối ai ngừng hoạt động dựa trên mức ưu tiên. Những giá trị này cho từng tòa nhà sẽ ghi đè lên các mặc định toàn cầu từ bảng điều khiển."

