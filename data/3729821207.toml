["SmartProductionControl.Welcome.Body"]
raw = "This mod adds an Auto-Pause toggle to every production building. When the building cannot do useful work — output full, input missing, no power, or no work in range — it pauses automatically and resumes when conditions allow. Click the toggle below to enable, or use the SPC button in the bottom bar for a colony-wide view."
status = "normal"
enUS = "This mod adds an Auto-Pause toggle to every production building. When the building cannot do useful work — output full, input missing, no power, or no work in range — it pauses automatically and resumes when conditions allow. Click the toggle below to enable, or use the SPC button in the bottom bar for a colony-wide view."
zhCN = "此 MOD 为每个生产建筑添加了自动暂停切换。当建筑无法进行有效工作时——输出满、输入不足、没有电力或没有工作范围——它会自动暂停，条件允许时恢复运行。点击下面的切换以启用，或使用底部栏中的 SPC 按钮获得全殖民地视图。"
zhTW = "此模組為每個生產建築新增了自動暫停的切換功能。當建築無法進行有效工作時——產出滿、輸入缺少、無電力或工作範圍內無可用工作——它會自動暫停，並在條件允許時恢復運作。點擊下方的切換開關以啟用，或使用底部欄的SPC按鈕以查看整個殖民地的情況。"
ruRU = "Этот мод добавляет переключатель автоматической паузы для каждого производственного здания. Когда здание не может выполнять полезную работу — полный выход, отсутствующий вход, нет энергии или нет работы в пределах досягаемости — оно автоматически ставится на паузу и возобновляется, когда условия позволяют. Нажмите переключатель ниже, чтобы включить, или используйте кнопку SPC на нижней панели для общего обзора колонии."
jaJP = "この мод はすべての生産建物にオートポーズのトグルを追加します。建物が有効な作業ができない場合 — 出力が満杯、入力が不足、電力なし、または作業範囲外 — 自動的に一時停止し、条件が整うと再開します。下のトグルをクリックして有効にするか、コロニー全体のビューのために下部バーの SPC ボタンを使用してください。"
frFR = "Ce mod ajoute un interrupteur Auto-Pause à chaque bâtiment de production. Lorsque le bâtiment ne peut pas réaliser de travail utile — production pleine, entrée manquante, pas d'énergie, ou pas de travail à portée — il se met automatiquement en pause et reprend dès que les conditions le permettent. Cliquez sur l'interrupteur ci-dessous pour activer, ou utilisez le bouton SPC dans la barre inférieure pour une vue de l'ensemble de la colonie."
deDE = "Dieses Mod fügt jedem Produktionsgebäude einen Auto-Pause-Schalter hinzu. Wenn das Gebäude keine nützliche Arbeit verrichten kann – Ausgabe voll, Eingabe fehlt, keine Energie oder keine Arbeit in Reichweite – pausiert es automatisch und wird fortgesetzt, wenn die Bedingungen es erlauben. Klicken Sie auf den Schalter unten, um ihn zu aktivieren, oder verwenden Sie die SPC-Taste in der unteren Leiste für eine kolonieweite Ansicht."
plPL = "Ten mod dodaje przełącznik Auto-Pauzy do każdego budynku produkcyjnego. Gdy budynek nie może wykonywać pożytecznej pracy — pełna produkcja, brak surowców, brak energii lub brak pracy w zasięgu — automatycznie wstrzymuje działanie i wznawia, gdy warunki pozwolą. Kliknij poniższy przełącznik, aby włączyć, lub użyj przycisku SPC w dolnym pasku, aby uzyskać widok na cały kolonię."
ptBR = "Este mod adiciona um interruptor de Pausa Automática a todos os edifícios de produção. Quando o edifício não consegue realizar trabalho útil — saída cheia, entrada faltando, sem energia ou sem trabalho em alcance — ele pausa automaticamente e retoma quando as condições permitem. Clique no interruptor abaixo para ativar, ou use o botão SPC na barra inferior para uma visão geral da colônia."
koKR = "이 모드는 모든 생산 건물에 자동 일시 정지 토글을 추가합니다. 건물이 유용한 작업을 수행할 수 없을 때 — 출력이 가득 차거나, 입력이 부족하거나, 전원이 없거나, 범위 내에서 작업이 없을 때 — 자동으로 일시 정지되고 조건이 허용되면 재개됩니다. 아래의 토글을 클릭하여 활성화하거나, 하단 바의 SPC 버튼을 사용하여 전체 식민지 보기로 전환하세요."
csCZ = "Tento mod přidává přepínač automatického pozastavení do každé výrobní budovy. Když budova nemůže vykonávat užitečnou práci — plný výstup, chybějící vstup, žádná energie nebo žádná práce v dosahu — automaticky se pozastaví a znovu se aktivuje, když to podmínky dovolí. Klikněte na přepínač níže pro povolení, nebo použijte tlačítko SPC v dolním panelu pro zobrazení celé kolonie."
viVN = "Mod này thêm một công tắc Tự Pause cho mọi nhà máy sản xuất. Khi nhà máy không thể thực hiện công việc hữu ích — đầu ra đầy, đầu vào thiếu, không có nguồn điện, hoặc không có công việc trong phạm vi — nó sẽ tự động tạm dừng và tiếp tục khi điều kiện cho phép. Nhấn công tắc bên dưới để kích hoạt, hoặc sử dụng nút SPC ở thanh dưới cùng để có cái nhìn toàn bộ thuộc địa."

