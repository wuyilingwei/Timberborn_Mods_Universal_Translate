["SmartProductionControl.Fragment.AutoPauseToggle.Tooltip"]
new = "Master switch for this building. When on, the rules below decide when to pause automatically."
status = "normal"

["SmartProductionControl.Fragment.SettingsButton.Tooltip"]
new = "Open the detailed settings popup for this building."
status = "normal"

["SmartProductionControl.Settings.Toggle.OutputFull.Tooltip"]
new = "Pause when the building's output good has reached its stock threshold (see sliders below)."
status = "normal"

["SmartProductionControl.Settings.Toggle.NoInput.Tooltip"]
new = "Pause when input goods (ingredients / fuel / consumed goods) drop below the input threshold."
status = "normal"

["SmartProductionControl.Settings.Toggle.NoPower.Tooltip"]
new = "Pause when the building's mechanical power network is offline. Resumes automatically when power returns."
status = "normal"

["SmartProductionControl.Settings.Toggle.NoWork.Tooltip"]
new = "Pause when there is nothing for workers to do nearby - no harvestable trees / berries / crops / planting spots / water at the intake."
status = "normal"

["SmartProductionControl.Settings.Toggle.Drought.Tooltip"]
new = "Pause during hazardous weather (drought or badtide). Resume when weather clears."
status = "normal"

["SmartProductionControl.Settings.Toggle.Night.Tooltip"]
new = "Pause during nighttime. Resume at sunrise."
status = "normal"

["SmartProductionControl.Settings.Toggle.HighScience.Tooltip"]
new = "Pause this Inventor when the global Science total reaches the threshold. Resumes when the player spends Science and the total drops back."
status = "normal"

["SmartProductionControl.Settings.Slider.ScienceThreshold.Tooltip"]
new = "Auto-pause this Inventor when global Science points are at or above this number."
status = "normal"

["SmartProductionControl.Settings.Slider.PauseAt.Tooltip"]
new = "The output fill rate at which the building will pause. Default: 100%."
status = "normal"

["SmartProductionControl.Settings.Slider.ResumeAt.Tooltip"]
new = "The output fill rate at which the paused building will start producing again. Default: 90%. Hysteresis prevents rapid on/off oscillation."
status = "normal"

["SmartProductionControl.Settings.Slider.InputMin.Tooltip"]
new = "Minimum input fill rate. If all input goods fall below this rate, the building pauses."
status = "normal"

["SmartProductionControl.Settings.StorageMode.Global.Tooltip"]
new = "Use the global stock count across all districts to decide if output is 'full'."
status = "normal"

["SmartProductionControl.Settings.StorageMode.District.Tooltip"]
new = "Use only this district's stock counter."
status = "normal"

["SmartProductionControl.Settings.StorageMode.Building.Tooltip"]
new = "Use only the building's own internal inventory. Useful for flag-type buildings with small fixed inventories."
status = "normal"

["SmartProductionControl.Dashboard.Bulk.EnableAll.Tooltip"]
new = "Turn Auto-Pause on for every building visible in the current filtered view."
status = "normal"

["SmartProductionControl.Dashboard.Bulk.DisableAll.Tooltip"]
new = "Turn Auto-Pause off for every building visible in the current filtered view."
status = "normal"

["SmartProductionControl.Dashboard.SearchLabel.Tooltip"]
new = "Filter the list by building name / type / district."
status = "normal"

["SmartProductionControl.Preset.Standard.Tooltip"]
new = "Default rules: all pause-conditions on; pause at 100%; resume at 90%."
status = "normal"

["SmartProductionControl.Preset.Conservative.Tooltip"]
new = "Stricter thresholds: pause earlier (90%) and only resume when stock is well below half (50%)."
status = "normal"

["SmartProductionControl.Preset.Drought.Tooltip"]
new = "Also pauses during drought/badtide. Stricter thresholds for resource conservation."
status = "normal"

["SmartProductionControl.Preset.Early.Tooltip"]
new = "Early-game preset: only pauses for no-power. Keeps production maximally active."
status = "normal"

["SmartProductionControl.Preset.Late.Tooltip"]
new = "Late-game preset: also pauses at night for energy/worker conservation."
status = "normal"

["SmartProductionControl.Welcome.Title"]
new = "Welcome to Smart Production Control"
status = "normal"

["SmartProductionControl.Welcome.Body"]
new = "This mod adds an Auto-Pause toggle to every production building. When the building cannot do useful work — output full, input missing, no power, or no work in range — it pauses automatically and resumes when conditions allow. Click the toggle below to enable, or use the SPC button in the bottom bar for a colony-wide view."
status = "normal"

["SmartProductionControl.Welcome.GotIt"]
new = "Got it"
status = "normal"
