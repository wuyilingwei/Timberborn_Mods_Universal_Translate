["SmartProductionControl.Fragment.PowerPriority.Tooltip"]
raw = "Higher number wins when the grid can't power everyone. Buildings with the highest priority keep running; lower-priority buildings pause first. Range 0–99 (default 50)."
status = "normal"
enUS = "Higher number wins when the grid can't power everyone. Buildings with the highest priority keep running; lower-priority buildings pause first. Range 0–99 (default 50)."
zhCN = "在网格无法为所有建筑供电时，优先级较高的建筑将继续运行；优先级较低的建筑将优先暂停。范围 0–99（默认为 50）。"
zhTW = "當電網無法供電給所有建築時，高的數字獲勝。優先順序最高的建築將繼續運行；優先順序較低的建築將首先暫停。範圍 0–99（預設為 50）。"
ruRU = "Большее число побеждает, когда сеть не может обеспечить энергией всех. Здания с высшим приоритетом продолжают работать; здания с низким приоритетом останавливаются первыми. Диапазон 0–99 (по умолчанию 50)."
jaJP = "電力を供給できない場合、高い数字が優先されます。優先度の高い建物がまず動作し、優先度の低い建物が最初に停止します。範囲は0–99（デフォルトは50）です。"
frFR = "Un nombre plus élevé l'emporte lorsque le réseau ne peut pas alimenter tout le monde. Les bâtiments avec la plus haute priorité continuent de fonctionner ; les bâtiments de moindre priorité se mettent en pause en premier. Plage 0–99 (par défaut 50)."
deDE = "Höhere Zahlen gewinnen, wenn das Netz nicht alle mit Strom versorgen kann. Gebäude mit der höchsten Priorität laufen weiter; Gebäude mit niedrigerer Priorität pausieren zuerst. Reichweite 0–99 (Standard 50)."
plPL = "Wyższa liczba wygrywa, gdy sieć nie może zasilić wszystkich. Budynki o najwyższym priorytecie działają, budynki o niższym priorytecie wstrzymują działanie w pierwszej kolejności. Zakres 0–99 (domyślnie 50)."
ptBR = "Um número mais alto ganha quando a rede não pode fornecer energia para todos. Edifícios com a maior prioridade continuam em funcionamento; edifícios de prioridade mais baixa pausam primeiro. Faixa de 0 a 99 (padrão 50)."
koKR = "그리드가 모든 건물을 전력 공급할 수 없을 때, 높은 숫자가 우선합니다. 우선 순위가 가장 높은 건물은 계속 작동하며, 우선 순위가 낮은 건물부터 일시 중지됩니다. 범위 0–99 (기본값 50)."
csCZ = "Vyšší číslo vyhrává, když síť nemůže napájet všechny. Budovy s nejvyšší prioritou pokračují v chodu; budovy s nižší prioritou se pozastavují jako první. Rozsah 0–99 (výchozí 50)."
viVN = "Số cao hơn thắng khi lưới không thể cung cấp năng lượng cho mọi người. Các tòa nhà có ưu tiên cao nhất tiếp tục hoạt động; các tòa nhà có ưu tiên thấp hơn sẽ tạm dừng trước. Phạm vi 0–99 (mặc định 50)."

