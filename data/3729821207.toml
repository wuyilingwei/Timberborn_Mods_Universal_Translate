["SmartProductionControl.Settings.PowerCoord.Margin.Tooltip"]
raw = "Supply must exceed projected demand by this margin before the building resumes. Prevents flicker at the supply ceiling."
status = "normal"
enUS = "Supply must exceed projected demand by this margin before the building resumes. Prevents flicker at the supply ceiling."
zhCN = "“供应必须超过预测需求的这个裕度，建筑才能恢复运行。防止在供应上限时闪烁。”"
zhTW = "在建築恢復運行之前，供應必須超過預期需求的這個邊際。防止在供應上限時出現閃爍。"
ruRU = "Запасы должны превышать ожидаемый спрос на эту величину, прежде чем здание возобновит работу. Предотвращает мерцание на потолке запасов."
jaJP = "供給が建物が再開する前にこのマージンを超えて予想需要を上回る必要があります。供給の上限でのちらつきを防ぎます。"
frFR = "L'approvisionnement doit dépasser la demande projetée de cette marge avant que le bâtiment ne reprenne. Empêche le scintillement au plafond d'approvisionnement."
deDE = "Die Versorgung muss die projected Nachfrage um diesen Spielraum überschreiten, bevor das Gebäude wieder in Betrieb genommen wird. Verhindert Flackern bei der Versorgungshöhe."
plPL = "Dostawa musi przekraczać prognozowane zapotrzebowanie o tę granicę, zanim budynek wznowi pracę. Zapobiega migotaniu na suficie dostaw."
ptBR = "O suprimento deve exceder a demanda projetada por esta margem antes que o edifício retome a operação. Prevê o piscar no teto de suprimento."
koKR = "건물 작업이 재개되기 전에 공급이 예상 수요를 이 마진만큼 초과해야 합니다. 공급 한계에서 깜빡임을 방지합니다."
csCZ = "Zásoby musí překročit předpokládanou poptávku o tuto marži, než se budova znovu spustí. Zabraňuje blikání na stropě zásob."
viVN = "Nguồn cung phải vượt quá nhu cầu dự kiến với khoảng cách này trước khi tòa nhà tiếp tục hoạt động. Ngăn chặn hiện tượng nhấp nháy ở mức cung tối đa."

