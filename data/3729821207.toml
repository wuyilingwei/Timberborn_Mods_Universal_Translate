frFR = "La pause est retardée d'une durée de cette durée après que la condition se déclenche pour la première fois. La reprise est immédiate. Résolution ~0,5 s."
deDE = "Die Pause wird um diese Dauer verzögert, nachdem die Bedingung erstmals ausgelöst wurde. Die Fortsetzung erfolgt sofort. Auflösung ~0,5 s."
plPL = "Opóźnienie wstrzymania wynosi ten czas po pierwszym spełnieniu warunku. Wznawianie jest natychmiastowe. Rozdzielczość ~0,5 s."
ptBR = "A pausa é atrasada por esta duração após a condição ser acionada pela primeira vez. A retomada é imediata. Resolução ~0,5 s."
koKR = "조건이 처음 발생한 후 이 시간 동안 일시 정지가 지연됩니다. 재개는 즉시 발생합니다. 해결 시간 ~0.5초."
csCZ = "Pauza je zpožděna o tuto dobu po prvním vyvolání podmínky. Obnovení je okamžité. Rozlišení ~0,5 s."
viVN = "Thời gian tạm dừng bị trì hoãn trong khoảng thời gian này sau khi điều kiện lần đầu tiên được kích hoạt. Tiếp tục ngay lập tức. Thời gian ~0.5 giây."

