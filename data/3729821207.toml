jaJP = "「SPCはこの建物を一時停止しません。手動で一時停止するか、下のリセットボタンを押して制御を戻してください。」"
frFR = "SPC ne mettra pas ce bâtiment en pause. Mettez-le en pause manuellement ou appuyez sur le réinitialiser ci-dessous pour reprendre le contrôle."
deDE = "SPC wird dieses Gebäude nicht pausieren. Pausieren Sie es manuell oder drücken Sie den Reset unten, um die Kontrolle zurückzugeben."
plPL = "SPC nie wstrzyma tego budynku. Wstrzymaj go ręcznie lub naciśnij przycisk resetu poniżej, aby oddać kontrolę."
ptBR = "SPC não pausará este edifício. Pause manualmente ou pressione o botão de redefinir abaixo para devolver o controle."
koKR = "SPC는 이 건물을 일시 정지하지 않습니다. 수동으로 일시 정지하거나 아래의 재설정 버튼을 눌러 제어를 다시 넘겨주세요."
csCZ = "SPC tuto budovu nepauzuje. Pozastavte ji ručně nebo stiskněte reset níže, abyste vrátili kontrolu."
viVN = "SPC sẽ không tạm dừng công trình này. Tạm dừng nó thủ công hoặc nhấn nút đặt lại dưới đây để lấy lại quyền điều khiển."

