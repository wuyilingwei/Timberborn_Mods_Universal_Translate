zhTW = "“當條件首次觸發後，暫停會延遲這段時間。恢復是立即的。解析度約為 0.5 秒。”"
ruRU = "Пауза задерживается на это время после первого срабатывания условия. Возобновление происходит немедленно. Разрешение ~0,5 с."
