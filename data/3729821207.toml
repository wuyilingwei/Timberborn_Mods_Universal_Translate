["SmartProductionControl.Settings.PowerCoord.ResumeHold.Tooltip"]
raw = "After the coordinator pauses this building it must wait at least this long before being considered for resume. Smooths out wobbly grids."
status = "normal"
enUS = "After the coordinator pauses this building, it must wait at least this long before being considered for resumption. Smooths out wobbly grids."
zhCN = "“协调员暂停此建筑后，必须等待至少这么长时间才能被考虑恢复。可以平滑不稳定的网格。”"
zhTW = "協調員暫停該建築後，必須等待至少這段時間才能考慮恢復。使不穩定的網格更加平滑。"
ruRU = "После того как координатор приостановит эту постройку, ей необходимо подождать как минимум это время, прежде чем её можно будет рассмотреть для продолжения. Упорядочивает неустойчивые сетки."
jaJP = "「コーディネーターがこの建物を一時停止させた後、再開の検討をするまでに少なくともこの時間を待たなければなりません。揺らぎのあるグリッドを滑らかにします。」"
frFR = "Après que le coordinateur ait mis cet édifice en pause, il doit attendre au moins cette durée avant d'être pris en compte pour la reprise. Lisse les grilles instables."
deDE = "Nachdem der Koordinator dieses Gebäude pausiert hat, muss es mindestens so lange warten, bevor es für die Wiederaufnahme in Betracht gezogen wird. Glättet wackelige Gitter."
plPL = "Po wstrzymaniu budynku przez koordynatora musi on odczekać przynajmniej tak długo, zanim zostanie uznany za gotowy do wznowienia. Wygładza niestabilne siatki."
ptBR = "Depois que o coordenador pausa este edifício, ele deve esperar pelo menos este tempo antes de ser considerado para retomar. Suaviza grades instáveis."
koKR = "조정자가 이 건물을 일시중지한 후 재개 대상으로 간주되기까지 최소 이 시간만큼 기다려야 합니다. 흔들리는 그리드가 부드러워집니다."
csCZ = "Po pozastavení této budovy koordinátorem musí čekat alespoň tak dlouho, než bude znovu zvažována k obnovení. Zmenšuje chvění mřížek."
viVN = "Sau khi điều phối viên tạm dừng tòa nhà này, nó phải chờ ít nhất khoảng thời gian này trước khi được xem xét để tiếp tục. Làm mượt các lưới không ổn định."
