["SmartProductionControl.Settings.InputTrigger.Any.Tooltip"]
raw = "Pause as soon as ANY ingredient drops below the input threshold (default). Recommended for multi-input recipes — prevents the building from running uselessly while one good is depleted."
status = "normal"
enUS = "Pause as soon as ANY ingredient drops below the input threshold (default). Recommended for multi-input recipes — prevents the building from running uselessly while one good is depleted."
zhCN = "“当任何成分低于输入阈值时暂停（默认）。建议用于多输入配方——在一种物品耗尽时防止建筑物无效运作。”"
zhTW = "一旦任何成分低於輸入閾值（默認）即暫停。建議用於多輸入配方 — 防止在某一物品耗盡時建築無效運行。"
ruRU = "Пауза, как только ЛЮБОЙ ингредиент опускается ниже порога ввода (по умолчанию). Рекомендуется для рецептов с несколькими ингредиентами — предотвращает бесполезную работу здания, пока один товар истощается."
jaJP = "「任意の材料が入力閾値を下回るとすぐに一時停止します（デフォルト）。複数の材料を使用するレシピに推奨されます — 1つの素材が枯渇している間、無駄に稼働するのを防ぎます。」"
frFR = "Mettre en pause dès qu'UN ingrédient tombe en dessous du seuil d'entrée (par défaut). Recommandé pour les recettes à plusieurs ingrédients - empêche le bâtiment de fonctionner inutilement pendant qu'un bien est épuisé."
deDE = "Pausiere, sobald IRGENDEIN Zutatenwert unter den Eingangsgrenzwert fällt (Standard). Empfohlen für Rezepte mit mehreren Eingaben — verhindert, dass das Gebäude nutzlos läuft, während eine Ware erschöpft ist."
plPL = "Wstrzymaj działanie, gdy jakikolwiek składnik spadnie poniżej progu wejściowego (domyślnie). Zalecane w przypadku receptur z wieloma składnikami - zapobiega bezsensownemu działaniu budynku, gdy jeden towar się wyczerpuje."
ptBR = "Pause assim que QUALQUER ingrediente cair abaixo do limite de entrada (padrão). Recomendado para receitas com múltiplos insumos — evita que o edifício funcione inutilmente enquanto um recurso se esgota."
koKR = "입력 임계값 아래로 ANY 재료가 떨어지자마자 일시정지합니다 (기본값). 다중 입력 레시피에 권장 — 하나의 재료가 소모되는 동안 건물이 쓸모없이 작동하는 것을 방지합니다."
csCZ = "Pauza, jakmile KOLIKOLI ingredience klesne pod vstupní práh (výchozí). Doporučeno pro recepty s více ingrediencemi — zabraňuje zbytečnému běhu budovy, když je jedna surovina vyčerpaná."
viVN = "Dừng lại ngay khi BẤT CỨ nguyên liệu nào giảm xuống dưới ngưỡng đầu vào (mặc định). Được khuyến nghị cho các công thức nhiều nguyên liệu — ngăn chặn công trình hoạt động vô ích khi một hàng hóa bị cạn kiệt."

["SmartProductionControl.Settings.InputTrigger.All.Tooltip"]
raw = "Pause only when ALL ingredients are below the input threshold. Legacy behaviour — keeps the building running as long as any one input still has district stock."
status = "normal"
enUS = "Pause only when ALL ingredients are below the input threshold. Legacy behavior — keeps the building running as long as any one input still has district stock."
zhCN = "仅在所有材料低于输入阈值时暂停。遗留行为——只要任何一个输入仍然有区内库存，建筑物就会继续运行。"
zhTW = "僅在所有原料低於輸入門檻時暫停。舊版行為——只要任何一種原料仍然有區域庫存，就會保持建築運行。"
ruRU = "Приостанавливать только когда ВСЕ ингредиенты находятся ниже порога ввода. Устаревшее поведение — здание продолжает работу, пока хотя бы один вход всё еще имеет запасы в округе."
jaJP = "すべての材料が入力閾値を下回ったときのみ一時停止します。従来の動作 — いずれかの入力が地区の在庫を持っている限り、建物は稼働を続けます。"
frFR = "Mettre en pause uniquement lorsque TOUS les ingrédients sont en dessous du seuil d'entrée. Comportement classique — maintient le bâtiment en fonction tant qu'un des ingrédients dispose encore de stock dans le quartier."
deDE = "Pausiert nur, wenn ALLE Zutaten unterhalb des Eingabeschwellenwerts liegen. Veraltetes Verhalten - das Gebäude läuft weiter, solange noch Vorrat eines Eingangs im Distrikt vorhanden ist."
plPL = "Zatrzymaj tylko wtedy, gdy WSZYSTKIE składniki są poniżej progu wejściowego. Stare zachowanie — budynek działa, dopóki jakikolwiek z surowców wciąż ma zapas w dzielnicy."
ptBR = "Pause apenas quando TODOS os ingredientes estiverem abaixo do limite de entrada. Comportamento legado — mantém o edifício funcionando enquanto qualquer um dos insumos ainda tiver estoque do distrito."
koKR = "모든 재료가 입력 임계값 이하일 때만 일시 중지합니다. 이전 동작 — 하나의 입력이라도 지구 재고에 남아 있는 한 건물을 계속 가동합니다."
csCZ = "Pauza pouze tehdy, když jsou VŠECHNY ingredience pod vstupním prahem. Dědictví chování — budova zůstává v provozu, pokud je alespoň jedna vstupní položka stále na skladě v obvodu."
viVN = "Chỉ tạm dừng khi TẤT CẢ các nguyên liệu dưới ngưỡng đầu vào. Hành vi cũ — giữ cho công trình hoạt động miễn là bất kỳ một đầu vào nào vẫn còn tồn kho trong khu vực."

