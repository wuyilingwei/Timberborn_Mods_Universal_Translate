["SmartProductionControl.Settings.Trigger.Any.Tooltip"]
raw = "Pause as soon as ANY of the monitored output goods has reached its threshold. Recommended for gatherer flags so a full berry stock does not require dandelion stock to also be full."
status = "normal"
enUS = "Pause as soon as ANY of the monitored output goods has reached its threshold. Recommended for gatherer flags so a full berry stock does not require dandelion stock to also be full."
zhCN = "一旦任何被监控的输出商品达到其阈值，立即暂停。建议用于采集旗帜，以便满的浆果库存不需要蒲公英库存也满。"
zhTW = "只要任何被監控的輸出產品達到其閾值，即可立即暫停。建議用於採集標誌，以免滿的漿果庫存需要蒲公英庫存也滿。"
ruRU = "Приостановить, как только любой из контролируемых товаров достигнет своего предела. Рекомендуется для флагов сборщиков, чтобы полный запас ягод не требовал полного запаса одуванчиков."
jaJP = "「監視されている出力物のいずれかが閾値に達したときにすぐに停止します。ベリーの在庫が満杯であっても、タンポポの在庫も満杯である必要がないため、採取者の旗に推奨されます。」"
frFR = "Mettez en pause dès qu'un des biens de sortie surveillés a atteint son seuil. Recommandé pour les drapeaux de collecte afin qu'un stock de baies plein ne nécessite pas que le stock de pissenlits soit également plein."
deDE = "Pause, sobald EINES der überwachten Ausgabewaren seinen Schwellenwert erreicht hat. Empfohlen für Sammelstellen, damit ein voller Beerenvorrat nicht erfordert, dass auch der Löwenzahnvorrat voll ist."
plPL = "Pauza, gdy DOWOLNY z monitorowanych produktów osiągnie swój próg. Zalecane dla znaczników zbieraczy, aby pełny zapas jagód nie wymagał pełnego zapasu mniszka."
ptBR = "Pausar assim que QUALQUER um dos bens de saída monitorados atingir seu limite. Recomendada para bandeiras de coletor para que um estoque cheio de frutas não exija que o estoque de dente-de-leão também esteja cheio."
koKR = "모니터링된 출력 상품 중 ANY가 임계치에 도달하면 즉시 일시 정지합니다. 완전한 베리 재고가 민들레 재고도 가득 차도록 요구하지 않도록 수집기 기호에 권장됩니다."
csCZ = "Pauza, jakmile jakékoli z monitorovaných výstupních zboží dosáhne svého prahu. Doporučeno pro vlajky sběračů, aby plný zásobník bobulí nevyžadoval také plný zásobník pampelišek."
viVN = "Dừng ngay khi BẤT KỲ hàng hóa đầu ra nào được theo dõi đạt ngưỡng của nó. Được khuyên dùng cho cờ thu hoạch để dự trữ quả mọng đầy không yêu cầu dự trữ bồ công anh cũng phải đầy."

["SmartProductionControl.Settings.Trigger.All.Tooltip"]
raw = "Pause only when EVERY monitored output good is above its threshold. Useful when the building's storage is a shared pool and you really want all goods at the cap before stopping."
status = "normal"
enUS = "Pause only when EVERY monitored output good is above its threshold. Useful when the building's storage is a shared pool and you really want all goods at the cap before stopping."
zhCN = "仅当每个监控的输出商品均高于其阈值时暂停。适用于建筑物的存储是共享池，并且您希望在停止之前所有商品都达到上限的情况。"
zhTW = "僅在每一項監控的產出物品均高於其閾值時暫停。當建築的存儲為共享池並且您確實希望所有物品都達到上限後再停止時，這非常有用。"
ruRU = "Пауза только тогда, когда КАЖДЫЙ контролируемый выходной товар выше своего порога. Полезно, когда хранилище здания является общим пулом, и вы действительно хотите, чтобы все товары достигли максимума перед остановкой."
jaJP = "「監視されているすべての出力量が閾値を超えたときのみ、一時停止します。建物のストレージが共有プールで、停止する前にすべての資源を最大限にしたい場合に便利です。」"
frFR = "Mettre en pause uniquement lorsque TOUS les biens de sortie surveillés sont au-dessus de leur seuil. Utile lorsque le stockage du bâtiment est un réservoir partagé et que vous souhaitez vraiment que tous les biens atteignent la limite avant d'arrêter."
deDE = "Pause nur, wenn JEDES überwachte Produkt über seinem Schwellenwert liegt. Nützlich, wenn der Lagerraum des Gebäudes ein gemeinsamer Pool ist und Sie wirklich wollen, dass alle Waren den Höchststand erreichen, bevor Sie anhalten."
plPL = "Wstrzymaj tylko wtedy, gdy WSZYSTKIE monitorowane dobra są powyżej swojego progu. Przydatne, gdy magazyn budynku jest wspólnym zasobem i naprawdę chcesz, aby wszystkie dobra osiągnęły maksimum przed zatrzymaniem."
ptBR = "Pause apenas quando TODOS os bens monitorados estiverem acima de seu limite. Útil quando o armazenamento do edifício é um pool compartilhado e você realmente deseja que todos os bens estejam no limite antes de parar."
koKR = "모든 모니터링된 출력 제품이 한계값을 초과할 때만 일시 중지합니다. 건물의 저장소가 공유 풀인 경우 유용하며, 중단하기 전에 모든 제품이 한계에 도달하는 것을 원할 때 사용됩니다."
csCZ = "Pauza pouze tehdy, když JE KAŽDÝ sledovaný výstupní produkt nad svým prahem. Užitečné, když je sklad budovy sdílený a opravdu chcete, aby všechny zboží byly na maximu před zastavením."
viVN = "Chỉ tạm dừng khi MỌI sản phẩm được giám sát đều vượt ngưỡng của nó. Hữu ích khi kho chứa của tòa nhà là một pool chung và bạn thực sự muốn tất cả hàng hóa đạt đến giới hạn trước khi dừng lại."

