["LV.TBMM.GroupInfo"]
status = "normal"
raw = "You can organize your tails and banners into groups. The feature is <b>optional</b> and is provided by the 'Moddable Decal Groups' mod.\nYour mod will work without that optional mod, users without 'Moddable Decal Groups' will just see all your tails and banners in the same list.\nThe 'Default' group is always available, it is the group that tails and banners will be in if you don't specify a group for them.\nYou can add the same tail or banner to multiple groups."
enUS = "You can organize your tails and banners into groups. The feature is <b>optional</b> and is provided by the 'Moddable Decal Groups' mod. Your mod will work without that optional mod; users without 'Moddable Decal Groups' will just see all your tails and banners in the same list. The 'Default' group is always available; it is the group that tails and banners will be in if you don't specify a group for them. You can add the same tail or banner to multiple groups."
zhCN = "您可以将您的尾巴和横幅组织到组中。该功能是<b>可选的</b>，由“可制作的贴花组”模组提供。\n您的模组在没有该可选模组的情况下也能正常工作，没有“可制作的贴花组”的用户将看到您所有的尾巴和横幅在同一个列表中。\n“默认”组始终可用，如果您没有为尾巴和横幅指定组，它们将位于该组中。\n您可以将相同的尾巴或横幅添加到多个组中。"
zhTW = "您可以將您的尾巴和旗幟組織成群組。此功能是<b>可選</b>的，並由「可修改的標籤群組」模組提供。\n您的模組在沒有該可選模組的情況下也能正常運行，沒有「可修改的標籤群組」的用戶將會在同一列表中看到您的所有尾巴和旗幟。\n「預設」群組始終可用，這是尾巴和旗幟如果您不為它們指定群組時將會所在的群組。\n您可以將同一個尾巴或旗幟添加到多個群組中。"
ruRU = "Вы можете организовать свои хвосты и баннеры в группы. Эта функция <b>дополнительная</b> и предоставляется модом 'Moddable Decal Groups'.\nВаш мод будет работать без этого дополнительного мода, пользователи без 'Moddable Decal Groups' просто увидят все ваши хвосты и баннеры в одном списке.\nГруппа 'По умолчанию' всегда доступна, это группа, в которой будут находиться хвосты и баннеры, если вы не укажете для них группу.\nВы можете добавить один и тот же хвост или баннер в несколько групп."
jaJP = "あなたはテールとバナーをグループに整理することができます。この機能は<b>オプション</b>であり、「モダブルデカールグループ」モッドによって提供されています。あなたのモッドはそのオプションのモッドがなくても動作します。「モダブルデカールグループ」を持っていないユーザーは、あなたのすべてのテールとバナーを同じリストで見ることになります。「デフォルト」グループは常に利用可能であり、特定のグループを指定しない限り、テールとバナーが属するグループです。同じテールやバナーを複数のグループに追加することができます。"
frFR = "Vous pouvez organiser vos queues et bannières en groupes. Cette fonctionnalité est <b>optionnelle</b> et est fournie par le mod 'Groupes de Décalques Modifiables'.\nVotre mod fonctionnera sans ce mod optionnel, les utilisateurs sans 'Groupes de Décalques Modifiables' verront simplement toutes vos queues et bannières dans la même liste.\nLe groupe 'Par défaut' est toujours disponible, c'est le groupe dans lequel les queues et bannières seront si vous ne spécifiez pas de groupe pour eux.\nVous pouvez ajouter la même queue ou bannière à plusieurs groupes."
deDE = "Sie können Ihre Fähnchen und Banner in Gruppen organisieren. Die Funktion ist <b>optional</b> und wird durch den Mod 'Moddable Decal Groups' bereitgestellt. Ihr Mod funktioniert auch ohne diesen optionalen Mod; Benutzer ohne 'Moddable Decal Groups' sehen einfach alle Ihre Fähnchen und Banner in derselben Liste. Die Gruppe 'Standard' ist immer verfügbar; es ist die Gruppe, in der Fähnchen und Banner sein werden, wenn Sie keine Gruppe für sie angeben. Sie können dasselbe Fähnchen oder Banner mehreren Gruppen hinzufügen."
plPL = "Możesz organizować swoje ogony i bannery w grupy. Ta funkcja jest <b>opcjonalna</b> i jest udostępniana przez mod 'Moddable Decal Groups'.\nTwój mod będzie działał bez tego opcjonalnego moda, użytkownicy bez 'Moddable Decal Groups' zobaczą po prostu wszystkie twoje ogony i bannery na tej samej liście.\nGrupa 'Domyślna' jest zawsze dostępna, jest to grupa, do której ogony i bannery będą przypisane, jeśli nie określisz dla nich grupy.\nMożesz dodać ten sam ogon lub banner do wielu grup."
ptBR = "Você pode organizar suas caudas e estandartes em grupos. O recurso é <b>opcional</b> e é fornecido pelo mod 'Grupos de Decalques Modificáveis'. Seu mod funcionará sem esse mod opcional, usuários sem 'Grupos de Decalques Modificáveis' verão apenas todas as suas caudas e estandartes na mesma lista. O grupo 'Padrão' está sempre disponível, é o grupo onde caudas e estandartes estarão caso você não especifique um grupo para eles. Você pode adicionar a mesma cauda ou estandarte a vários grupos."
koKR = "꼬리와 배너를 그룹으로 조직할 수 있습니다. 이 기능은 <b>옵션</b>이며 '모드 가능한 데칼 그룹' 모드에 의해 제공됩니다. 해당 옵션 모드 없이도 귀하의 모드는 작동하며, '모드 가능한 데칼 그룹'이 없는 사용자는 모든 꼬리와 배너를 동일한 목록에서 볼 수 있습니다. '기본' 그룹은 항상 사용 가능하며, 그룹을 지정하지 않으면 꼬리와 배너가 포함될 그룹입니다. 동일한 꼬리나 배너를 여러 그룹에 추가할 수 있습니다."
csCZ = "Můžete uspořádat své ocasy a prapory do skupin. Tato funkce je <b>volitelná</b> a je poskytována modem 'Moddable Decal Groups'.\nVáš mod bude fungovat i bez tohoto volitelného modu, uživatelé bez 'Moddable Decal Groups' jednoduše uvidí všechny vaše ocasy a prapory ve stejném seznamu.\nSkupina 'Výchozí' je vždy k dispozici, je to skupina, do které budou ocasy a prapory patřit, pokud pro ně nestanovíte skupinu.\nMůžete přidat stejný ocas nebo prapor do více skupin."
viVN = "Bạn có thể sắp xếp đuôi và biểu ngữ của mình thành các nhóm. Tính năng này là <b>tuỳ chọn</b> và được cung cấp bởi mod 'Moddable Decal Groups'.\nMod của bạn sẽ vẫn hoạt động mà không cần mod tuỳ chọn đó, người dùng không có 'Moddable Decal Groups' sẽ chỉ thấy tất cả đuôi và biểu ngữ của bạn trong cùng một danh sách.\nNhóm 'Mặc định' luôn có sẵn, đây là nhóm mà đuôi và biểu ngữ sẽ nằm trong nếu bạn không chỉ định nhóm cho chúng.\nBạn có thể thêm cùng một đuôi hoặc biểu ngữ vào nhiều nhóm."

