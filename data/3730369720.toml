["WWW.Settings.WakeSpeedPercent.Tooltip"]
raw = "Multiplier applied on top of every husk's per-spec warmup days. 100% = default; lower = wyrms wake slower; higher = wyrms wake faster."
status = "normal"
enUS = "Multiplier applied on top of every husk's per-spec warmup days. 100% = default; lower = wyrms wake slower; higher = wyrms wake faster."
zhCN = "“加在每个外壳每个特殊预热天数上的乘数。100% = 默认值；更低的数值 = 虫蛀者醒来得更慢；更高的数值 = 虫蛀者醒来得更快。”"
zhTW = "對每個外殼的特定暖機天數應用的乘數。 100% = 預設；較低 = 蛇醒來較慢；較高 = 蛇醒來較快。"
ruRU = "Множитель, применяемый к каждому шелушению за его спецификацией дней разогрева. 100% = по умолчанию; меньше = драконы пробуждаются медленнее; больше = драконы пробуждаются быстрее."
jaJP = "「全てのハスクのスペックごとのウォームアップ日数に適用される乗数。100% = デフォルト; 低い = ワームが目覚めるのが遅くなる; 高い = ワームが目覚めるのが早くなる。」"
frFR = "Multiplicateur appliqué au-dessus des jours de préparation par spécimen pour chaque enveloppe. 100 % = par défaut ; plus bas = les wyrms se réveillent plus lentement ; plus haut = les wyrms se réveillent plus rapidement."
deDE = "Multiplikator, der auf die Aufwärmtage jeder Hülle angewendet wird. 100 % = Standard; niedriger = Wyrme wachen langsamer auf; höher = Wyrme wachen schneller auf."
plPL = "Współczynnik stosowany do dni rozgrzewania każdego łupiny. 100% = domyślnie; niższy = wyrmy budzą się wolniej; wyższy = wyrmy budzą się szybciej."
ptBR = "Multiplicador aplicado sobre os dias de aquecimento por especificação de cada casca. 100% = padrão; menor = wyrms despertam mais devagar; maior = wyrms despertam mais rápido."
koKR = "모든 껍질의 특성별 예열 일수에 적용되는 배수입니다. 100% = 기본값; 낮으면 = 웜이 느리게 깨고; 높으면 = 웜이 빠르게 깨어납니다."
csCZ = "Multiplikátor aplikovaný na každé luskové per-spec dny ohřevu. 100 % = výchozí; nižší = wyrmové se probouzejí pomaleji; vyšší = wyrmové se probouzejí rychleji."
viVN = "Thay đổi nhân được áp dụng trên số ngày chuẩn bị của mỗi vỏ. 100% = mặc định; thấp hơn = rồng tỉnh chậm hơn; cao hơn = rồng tỉnh nhanh hơn."

