["WWW.Settings.ModEnabled.Tooltip"]
raw = "When off the mod still loads but no husk warms up and no wyrm acts. Useful for testing maps without disturbing the existing layout."
status = "normal"
enUS = "When off the mod still loads but no husk warms up and no wyrm acts. Useful for testing maps without disturbing the existing layout."
zhCN = "“关闭时，mod仍会加载，但不会有虫壳加热，也不会有龙行动。适合在不干扰现有布局的情况下测试地图。”"
zhTW = "「關閉時，模組仍然加載，但不會有幼蟲升溫，也不會有龍類行動。這對於測試地圖而不干擾現有佈局非常有用。」"
ruRU = "Когда мод отключен, он все равно загружается, но оболочка не прогревается, и дракон не действует. Полезно для тестирования карт без нарушения существующей компоновки."
jaJP = "無効にすると、モッドは読み込まれますが、ハスクは温まらず、ワームも動作しません。既存のレイアウトを妨げることなくマップをテストするのに便利です。"
frFR = "Lorsque désactivé, le mod se charge toujours mais aucune enveloppe ne chauffe et aucun wyrm n'agit. Utile pour tester des cartes sans perturber la mise en page existante."
deDE = "Wenn deaktiviert, wird das Mod trotzdem geladen, aber kein Gehäuse wird aktiviert und kein Wurm agiert. Nützlich zum Testen von Karten, ohne das bestehende Layout zu stören."
plPL = "Gdy jest wyłączony, mod nadal się ładuje, ale żaden kokon się nie nagrzewa i żaden wyrm nie działa. Przydatne do testowania map bez zakłócania istniejącego układu."
ptBR = "Quando desativado, o mod ainda carrega, mas nenhuma casca se aquece e nenhum wyrm age. Útil para testar mapas sem perturbar o layout existente."
koKR = "모드가 꺼져 있어도 여전히 로드되지만 하스크가 따뜻해지지 않고 괴물(와름)이 작동하지 않습니다. 기존 레이아웃을 방해하지 않고 맵을 테스트하는 데 유용합니다."
csCZ = "Když je mod vypnutý, stále se načítá, ale žádný obal se neohřívá a žádný drak neprovádí akce. Užitečné pro testování map bez rušení stávajícího uspořádání."
viVN = "Khi tắt, mod vẫn tải nhưng không có vỏ ấm lên và không con rồng nào hoạt động. Hữu ích cho việc thử nghiệm bản đồ mà không làm ảnh hưởng đến bố cục hiện có."

