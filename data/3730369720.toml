ruRU = "В темноте больше одного."
jaJP = "「暗闇の中には一つ以上のものがある。」"
frFR = "Il y en a plus d'un dans l'obscurité."
deDE = "„Es gibt mehr als eine im Dunkeln.“"
plPL = "W ciemności jest więcej niż jeden."
ptBR = "Há mais de um no escuro."
koKR = "어둠 속에는 하나 이상이 있다."
csCZ = "Ve tmě je víc než jeden."
viVN = "Có nhiều hơn một trong bóng tối."

["WWW.Notification.WyrmEmerged"]
raw = "A wyrm has emerged!"
status = "normal"
enUS = "A wyrm has emerged!"
zhCN = "一条巨龙出现了！"
