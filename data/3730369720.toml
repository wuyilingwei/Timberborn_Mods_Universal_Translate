["WWW.Settings.ContaminationResistancePercent.Tooltip"]
raw = "Multiplier on the lethal contamination threshold. Higher = wyrms survive more total absorbed badwater before dying; killing one takes a sustained channeling effort."
status = "normal"
enUS = "Multiplier on the lethal contamination threshold. Higher values mean wyrms can survive more total absorbed badwater before dying; killing one requires sustained effort."
zhCN = "致命污染阈值的乘数。更高的值意味着龙在死亡之前能够吸收更多的坏水；杀死一只龙需要持续的引导努力。"
zhTW = "“影響致命污染閾值的倍數。數值越高 = 龍在死亡之前能吸收更多的污水；殺死一隻需要持續的引導努力。”"
ruRU = "Множитель на порог летального загрязнения. Выше = драконы выживают после поглощения большего количества загрязненной воды, прежде чем погибнуть; для убийства одного требуется постоянное сосредоточение усилий."
jaJP = "致命的汚染閾値に対する倍率。数値が高いほど、ワームは死亡する前に吸収する悪水をより多く生存できる。1匹を殺すには持続的なチャネリング努力が必要。"
frFR = "Multiplier sur le seuil de contamination létale. Plus c'est élevé = les wyrms survivent à plus d'eau polluée totale absorbée avant de mourir ; en tuer un nécessite un effort de canalisement soutenu."
deDE = "Multiplikator für die tödliche Kontaminationsschwelle. Höher = Wyrms überleben mehr insgesamt aufgenommenes schlechtes Wasser, bevor sie sterben; das Töten eines Wurms erfordert eine kontinuierliche Anstrengung."
plPL = "Multiplikator na śmiertelnym progu zanieczyszczenia. Wyższa wartość = wyrmy przetrwają więcej całkowicie wchłoniętej złej wody przed śmiercią; zabicie jednego wymaga stałego kanałowania energii."
ptBR = "Multiplicador no limiar de contaminação letal. Maior = os wyrms sobrevivem mais água contaminada absorvida antes de morrer; matar um requer um esforço de canalização sustentado."
koKR = "치명적인 오염 한계에 대한 배수기. 높을수록 용들이 죽기 전에 흡수한 불량수에 더 오래 견딥니다; 하나를 죽이려면 지속적인 채널링 노력이 필요합니다."
csCZ = "Multiplikátor na smrtelný práh kontaminace. Vyšší = wyrmové přežijí více celkově absorbované znečištěné vody, než zemřou; zabití jednoho vyžaduje trvalé soustředění."
viVN = "Hệ số nhân trên ngưỡng ô nhiễm gây chết. Cao hơn = rồng sống sót nhiều nước ô nhiễm hấp thụ trước khi chết; giết một con cần nỗ lực tập trung liên tục."

