["WWW.Settings.HungerRatePercent.Tooltip"]
raw = "Multiplier on hunger accumulation. Higher = wyrms hunt sooner and chew walls more aggressively."
status = "normal"
enUS = "Multiplier on hunger accumulation. Higher = wyrms hunt sooner and chew walls more aggressively."
zhCN = "饥饿积累的倍数。更高的值 = 龙更早开始捕猎，并更具攻击性地啃咬墙壁。"
zhTW = "飢餓累積的倍數。數值越高 = 蛇龍會更快獵食並更具攻擊性地啃牆。"
ruRU = "Множитель на накопление голода. Чем выше = тем скорее драконы начинают охоту и агрессивнее грызут стены."
jaJP = "飢餓の蓄積に対する乗数。高いほど、ワームがより早く狩りを行い、壁をより攻撃的に噛む。"
frFR = "Multiplicateur sur l'accumulation de faim. Plus élevé = les wyrms chassent plus tôt et rongeront les murs de manière plus agressive."
deDE = "Multiplikator für die Hungerakkumulation. Höher = Wyrms jagen früher und nagen aggressiver an Wänden."
plPL = "Multiplikator na gromadzenie głodu. Wyższa wartość = smoki polują wcześniej i bardziej agresywnie gryzą ściany."
ptBR = "Multiplicador na acumulação de fome. Maior = wyrms caçam mais cedo e roem paredes de forma mais agressiva."
koKR = "허기 축적에 대한 배율. 높을수록 웜이 더 빨리 사냥하고 벽을 더 공격적으로 갉아먹습니다."
csCZ = "Multiplikátor na akumulaci hladu. Vyšší = draci loví dříve a agresivněji okusují stěny."
viVN = "Thông số nhân cho việc tích lũy đói. Cao hơn = rồng săn sớm hơn và cắn tường mạnh mẽ hơn."

