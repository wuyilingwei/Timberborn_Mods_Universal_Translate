["Building.WyrmForager.Description"]
raw = "A workshop that brews Soothesop from foraged berries and a measure of badwater. Soothesop is hauled to Lure Stakes to keep wyrms from chewing through containment walls."
status = "normal"
enUS = "A workshop that brews Soothesop from foraged berries and a measure of badwater. Soothesop is hauled to Lure Stakes to keep wyrms from chewing through containment walls."
zhCN = "“一个工作坊，用于从采集的浆果和一量坏水酿造舒缓药剂。舒缓药剂被运送到诱饵桩，以防止龙在隔离墙上啃咬。”"
zhTW = "一個工作坊，可以利用採集來的漿果和一量污水製作鎮靜湯。鎮靜湯會被運送到引誘標柱，防止龍蟲咬穿圍欄牆。"
ruRU = "Мастерская, которая варит Успокоительное из собранных ягод и немного грязной воды. Успокоительное доставляется к Приманкам, чтобы предотвратить поедание стенок контейнера драконом."
jaJP = "果実や悪水の一部から作られたソージソップを醸造する工房。ソージソップは、ワームが封じ込めの壁を噛み破るのを防ぐために引き揚げられ、ルアーステークスに運ばれます。"
frFR = "Un atelier qui prépare du Soothesop à partir de baies ramassées et d'une dose d'eau sale. Le Soothesop est transporté vers les Piquets d'Appât pour empêcher les wyrms de ronger les murs de containment."
deDE = "Eine Werkstatt, die Soothesop aus gesammelten Beeren und einem Maß an Schmutzwasser braut. Soothesop wird zu den Köderpfosten transportiert, um zu verhindern, dass die Wyrme durch die Begrenzungsmauern nagen."
plPL = "Warsztat, który parzy Soothesop z zebranych jagód i niewielkiej ilości brudnej wody. Soothesop jest transportowany do Wnyków Lurskich, aby zapobiec przegryzaniu się smoków przez ściany zabezpieczające."
ptBR = "Uma oficina que prepara Soothesop a partir de frutas selvagens e uma medida de água ruim. Soothesop é transportado para os Pilares de Isca para impedir que os wyrms roem as paredes de contenção."
koKR = "포획된 열매와 나쁜 물을 혼합하여 소독제를 만드는 작업장. 소독제는 포획된 벽을 물어버리는 괴물을 막기 위해 유인 기둥으로 운반된다."
csCZ = "Dílna, která vaří Soothesop z nasbíraných bobulí a dávky špatné vody. Soothesop je přepravován k Lure Stakes, aby se zabránilo wyrmům ve žvýkání skrz zadržovací zdi."
viVN = "Một xưởng chế biến Soothesop từ các loại quả hái được và một lượng nước ô nhiễm. Soothesop được vận chuyển đến Lure Stakes để ngăn wyrms gặm nhấm qua các bức tường chứa đựng."

