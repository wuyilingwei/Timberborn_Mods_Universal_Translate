["Building.LureStake.Description"]
raw = "A wooden stake that holds a small store of Soothesop. Wyrms within range stop chewing through walls while the stake is stocked. Beavers in range still get eaten."
status = "normal"
enUS = "A wooden stake that holds a small supply of Soothesop. Wyrms within range will stop chewing through walls while the stake is stocked. Beavers in range can still be eaten."
zhCN = "“一个木桩，里面储存着少量的安抚草。在范围内的巨蜥停止啃墙壁，直到木桩被耗尽。范围内的海狸仍会被吃掉。”"
zhTW = "一根木製樁，裡面儲存著少量的安撫草。在範圍內的蟲龍會停止咬牆，期間樁內有物資。不過，範圍內的海狸仍然會被吃掉。"
ruRU = "Деревянный кол с небольшим запасом Успокаивающего корня. Черви в радиусе действия перестают грызть стены, пока кол запасываен. Бобры в радиусе все еще могут быть съедены."
jaJP = "「小さなソーズソップを保管する木製の杭。杭が補給されている間、範囲内のワームは壁をかじるのをやめる。しかし、範囲内のビーバーはやはり食べられてしまう。」"
frFR = "Un pieu en bois qui contient un petit stock de Soothesop. Les wyrms à portée cessent de ronger les murs tant que le pieu est approvisionné. Les castors à portée continuent d'être mangés."
deDE = "Ein Holzpfahl, der eine kleine Menge Soothesop enthält. Wyrms im Umkreis hören auf, durch Wände zu fressen, solange der Pfahl bestückt ist. Biber im Umkreis werden jedoch weiterhin gefressen."
plPL = "Drewniany słupek, który przechowuje niewielką ilość Soothesop. Wyrmy w zasięgu przestają gryźć ściany, gdy słupek jest uzupełniony. Bobry w zasięgu nadal są zjadane."
ptBR = "Uma estaca de madeira que contém um pequeno estoque de Soothesop. Wyrms dentro do alcance param de roer as paredes enquanto a estaca estiver abastecida. Castores na área ainda são comidos."
koKR = "작은 양의 소스합을 저장하는 나무 말뚝. 범위 내의 용들은 말뚝이 채워져 있는 동안 벽을 갉아먹는 것을 멈춘다. 범위 내의 비버는 여전히 잡아먹힌다."
csCZ = "Dřevěný kůl, který uchovává malé množství Soothesopu. Wyrmy v dosahu přestanou hrýzat do zdí, zatímco je kůl zásoben. Castorové v dosahu jsou stále sežráni."
viVN = "Cọc gỗ giữ một kho nhỏ Soothesop. Rồng trong phạm vi dừng gặm tường trong khi cọc được cung cấp. Lửng trong phạm vi vẫn bị ăn."

["Building.LureStake.Flavor"]
raw = "Place it where you'd rather the wyrm chew the bait than your levee."
status = "normal"
enUS = "Place it where you'd prefer the wyrm to chew the bait instead of your levee."
zhCN = "“把它放在你宁愿让虫子啃饵而不是你的堤坝的地方。”"
zhTW = "將它放在你希望魔龍咬餌而不是咬堤壩的地方。"
ruRU = "Поставьте его там, где вы предпочли бы, чтобы змея грызла приманку, а не вашу плотину."
jaJP = "「 wyrm に餌を噛ませたい場所に設置してください。」"
frFR = "Placez-le là où vous préféreriez que le wyrm mordille l'appât plutôt que votre levée."
deDE = "Platziere es dort, wo du lieber möchtest, dass der Wurm den Köder anstatt deine Damm mauer knabbert."
plPL = "Umieść go tam, gdzie wolałbyś, żeby smok gryzył przynętę, a nie twoją tamę."
ptBR = "Coloque onde você prefere que o dragão mastigue a isca em vez da sua barragem."
koKR = "늪지대에서 드래곤이 벌레를 물어가기를 원한다면, 방파제보다 이곳에 두세요."
csCZ = "Umístěte to tam, kde byste raději, aby drak kousal návnadu než vaši hráz."
viVN = "Đặt nó ở nơi bạn muốn con rồng nhai mồi hơn là đê của bạn."

