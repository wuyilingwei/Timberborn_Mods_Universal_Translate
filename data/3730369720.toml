["Creature.Wyrm.Description"]
raw = "A starved, ancient predator that emerged from the soil. It hunts beavers and chews through unfortified walls. Cannot be cured of badwater contamination."
status = "normal"
enUS = "A starved, ancient predator that emerged from the soil. It hunts beavers and chews through unfortified walls. Cannot be cured of badwater contamination."
zhCN = "“一种饥饿的古老掠食者，从土壤中出现。它捕猎海狸，并咬穿无防御的墙壁。无法治愈污染的污水。”"
zhTW = "一種飢餓的古老掠食者，從土壤中出現。它會捕獵海狸並咬穿未加強的牆壁。無法治療污水污染。"
ruRU = "Истощенный, древний хищник, появившийся из почвы. Он охотится на бобров и грызет неукрепленные стены. Не может быть вылечен от загрязнения грязной водой."
jaJP = "土から現れた、飢えた古代の捕食者。ビーバーを狩り、無強化の壁を噛み砕く。汚染された水の影響からは治療できない。"
frFR = "Un prédateur ancien et affamé qui émerge du sol. Il chasse les castors et ronge à travers les murs non fortifiés. Ne peut pas être soigné de la contamination par les eaux usées."
deDE = "Ein verhungerter, uralter Raubtier, das aus dem Boden aufgetaucht ist. Es jagt Biber und nagt durch unbefestigte Wände. Kann nicht von einer Kontamination mit Schlechtwasser geheilt werden."
plPL = "Głodny, starożytny drapieżnik, który wyłonił się z gleby. Poluje na bobry i przegryza niezabezpieczone ściany. Nie można go wyleczyć z zakażenia związanego z złej jakości wodą."
ptBR = "Um predador antigo e faminto que emergiu do solo. Ele caça castores e mastiga paredes não fortificadas. Não pode ser curado de contaminação por água ruim."
koKR = "토양에서 솟아난, 굶주린 고대 포식자. 비버를 사냥하고 방어가 없는 벽을 부순다. 오염된 물로 인한 질병은 치료할 수 없다."
csCZ = "Hladový, starobylý predátor, který se vynořil ze země. Loví bobry a prokousává se nechráněnými zdmi. Nelze vyléčit z kontaminace špatnou vodou."
viVN = "Một kẻ săn mồi cổ đại, gầy gò đã xuất hiện từ lòng đất. Nó săn lùng sự sống của những con khí sinh và gặm nhấm qua những bức tường chưa được củng cố. Không thể chữa khỏi tình trạng ô nhiễm nước bẩn."

