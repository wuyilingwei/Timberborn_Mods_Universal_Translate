["Building.WyrmHusk.Description"]
raw = "The dried husk of a slumbering wyrm. Wakes when the soil above turns green."
status = "normal"
enUS = "The dried husk of a slumbering wyrm. Wakes when the soil above turns green."
zhCN = "“沉睡的龙的干枯外壳。当上面的土壤变绿时会醒来。”"
zhTW = "“沉睡的蠕蟲的乾燥外殼。當上面的土壤變綠時會醒來。”"
ruRU = "Сухая оболочка спящего дракона. Пробуждается, когда земля сверху становится зеленой."
jaJP = "眠っているワームの乾燥した殻。上の土が緑になると目を覚ます。"
frFR = "La peau séchée d'un wyrm endormi. S'éveille lorsque le sol au-dessus devient vert."
deDE = "Die getrocknete Hülle eines schlafenden Wyrms. Erwacht, wenn der Boden darüber grün wird."
plPL = "Uschnięta powłoka śpiącego smoka. Budzi się, gdy gleba powyżej staje się zielona."
ptBR = "A casca seca de um wyrm adormecido. Acorda quando o solo acima fica verde."
koKR = "잠든 와름의 마른 껍질. 위의 토양이 초록으로 변할 때 깨어난다."
csCZ = "Vysušená slupka spícího draka. Probudí se, když se půda nad ním zbarví do zelena."
viVN = "Vỏ khô của một con rồng đang ngủ. Thức dậy khi đất phía trên chuyển sang màu xanh."

