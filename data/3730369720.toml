["WWW.Settings.SandboxMode.Tooltip"]
raw = "When on, wyrms still wake and walk but never damage beavers or buildings. Useful for map authors testing layouts."
status = "normal"
enUS = "When enabled, wyrms will still wake and roam but will not harm beavers or buildings. Useful for map authors testing layouts."
zhCN = "“开启后，龙仍会苏醒并移动，但不会对海狸或建筑造成损害。这对测试布局的地图作者很有用。”"
zhTW = "啟用後，巨蟒仍然會醒來並行走，但不會對海狸或建築造成傷害。對於地圖創作者測試佈局非常有用。"
ruRU = "Когда включено, драконы все равно пробуждаются и передвигаются, но никогда не наносят повреждений бобрам или зданиям. Полезно для авторов карт при тестировании макетов."
jaJP = "「オンの場合、ワームは目覚めて歩きますが、ビーバーや建物にダメージを与えることはありません。マップ作成者がレイアウトをテストする際に便利です。」"
frFR = "Lorsque activé, les wyrms se réveillent et marchent mais ne causent jamais de dégâts aux castors ou aux bâtiments. Utile pour les auteurs de cartes testant les agencements."
deDE = "Wenn aktiviert, erwachen und wandern die Wyrme, fügen aber niemals Bibern oder Gebäuden Schaden zu. Nützlich für Kartenautoren, die Layouts testen."
plPL = "Po włączeniu, smoki nadal się budzą i spacerują, ale nigdy nie szkodzą bobrom ani budynkom. Przydatne dla autorów map testujących układy."
ptBR = "Quando ativado, os wyrms ainda acordam e andam, mas nunca causam dano a castores ou edifícios. Útil para autores de mapas testando layouts."
koKR = "활성화되면, 와름은 여전히 깨어나고 걸어다니지만 비버나 건물에 피해를 주지 않습니다. 레이아웃을 테스트하는 맵 저자에게 유용합니다."
csCZ = "Když je zapnuto, draci se stále probouzí a chodí, ale nikdy nepoškozují bobry ani budovy. Užitečné pro autory map, kteří testují uspořádání."
viVN = "Khi bật, rồng vẫn thức dậy và đi lại nhưng không bao giờ gây hại cho nhím hoặc các công trình. Hữu ích cho các tác giả bản đồ thử nghiệm bố cục."

