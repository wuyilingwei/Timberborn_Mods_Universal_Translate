["Building.WyrmDen.Description"]
raw = "A nest of slumbering wyrms. Wakes when the soil above turns green and continues to spawn wyrms periodically while the cover stays moist. Killed only by dynamite."
status = "normal"
enUS = "A nest of slumbering wyrms. Wakes when the soil above turns green and continues to spawn wyrms periodically while the cover stays moist. Killed only by dynamite."
zhCN = "一窝沉睡的龙虫。当上面的土壤变绿时醒来，并在覆盖物保持湿润的情况下定期产出龙虫。只能被炸药摧毁。"
zhTW = "一個沉睡的龍的巢穴。當上方的土壤變為綠色時會醒來，並在覆蓋物保持濕潤的同時定期生成龍。僅能被炸藥摧毀。"
ruRU = "Гнездо дремлющих змей. Просыпается, когда верхний слой почвы становится зеленым, и продолжает периодически порождать змей, пока укрытие остается влажным. Уничтожить можно только динамитом."
jaJP = "眠っているワームの巣。上の土が緑になると目を覚まし、覆いが湿っている間は定期的にワームを生成し続ける。ダイナマイトでのみ殺すことができる。"
frFR = "Un nid de wyrms endormis. S'éveille lorsque le sol au-dessus devient vert et continue de faire apparaître des wyrms périodiquement tant que le couvercle reste humide. Ne peut être détruit que par de la dynamite."
deDE = "Ein Nest schlafender Wyrme. Erwacht, wenn der Boden darüber grün wird und erzeugt weiterhin regelmäßig Wyrme, solange der Boden feucht bleibt. Nur durch Dynamit getötet."
plPL = "Gniazdo śpiących smoczków. Budzi się, gdy ziemia powyżej staje się zielona i nadal okresowo zyskuje smoczki, póki osłona pozostaje wilgotna. Zabijane tylko przez dynamit."
ptBR = "Um ninho de wyrms adormecidos. Acorda quando o solo acima fica verde e continua a gerar wyrms periodicamente enquanto a cobertura permanecer úmida. Morto apenas por dinamite."
koKR = "잠자고 있는 와이름의 둥지. 위의 토양이 초록빛으로 변할 때 깨어나며, 덮개가 촉촉할 때 주기적으로 와이름을 생성합니다. 다이너마이트로만 처치할 수 있습니다."
csCZ = "Hnízdo spících draků. Probudí se, když se půda nahoře zbarví do zelena a nadále periodicky vyvolává draky, dokud zůstává pokrytá vlhkostí. Zničeno pouze dynamitem."
viVN = "Một tổ của những con wyrm đang ngủ. Thức dậy khi đất bên trên chuyển sang màu xanh và tiếp tục sinh sản wyrm định kỳ khi lớp phủ vẫn ẩm. Chỉ có thể bị tiêu diệt bằng thuốc nổ."

