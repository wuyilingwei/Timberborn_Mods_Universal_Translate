["WWW.Settings.ModEnabled"]
new = "Enable mod"
status = "normal"

["WWW.Settings.ModEnabled.Tooltip"]
new = "When off the mod still loads but no husk warms up and no wyrm acts. Useful for testing maps without disturbing the existing layout."
status = "normal"

["WWW.Settings.WakeSpeedPercent"]
new = "Wake speed (%)"
status = "normal"

["WWW.Settings.WakeSpeedPercent.Tooltip"]
new = "Multiplier applied on top of every husk's per-spec warmup days. 100% = default; lower = wyrms wake slower; higher = wyrms wake faster."
status = "normal"

["WWW.Settings.HungerRatePercent"]
new = "Hunger rate (%)"
status = "normal"

["WWW.Settings.HungerRatePercent.Tooltip"]
new = "Multiplier on hunger accumulation. Higher = wyrms hunt sooner and chew walls more aggressively."
status = "normal"

["WWW.Settings.ContaminationResistancePercent"]
new = "Contamination resistance (%)"
status = "normal"

["WWW.Settings.ContaminationResistancePercent.Tooltip"]
new = "Multiplier on the lethal contamination threshold. Higher = wyrms survive more total absorbed badwater before dying; killing one takes a sustained channeling effort."
status = "normal"

["WWW.Settings.SandboxMode"]
new = "Sandbox mode"
status = "normal"

["WWW.Settings.SandboxMode.Tooltip"]
new = "When on, wyrms still wake and walk but never damage beavers or buildings. Useful for map authors testing layouts."
status = "normal"

