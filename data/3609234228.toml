["acalc79.ExtremeDifficulties.UltraHardDescription"]
status = "normal"
raw = "No starting food and demolish recovery, temperates always last only 3 days, hazardous weather eventually reaches 45-60 day range."
enUS = "No starting food and demolish recovery, temperatures always last only 3 days, hazardous weather eventually reaches 45-60 day range."
zhCN = "没有初始食物和拆除恢复，温度总是只持续3天，危险天气最终会达到45-60天的范围。"
zhTW = "「沒有起始食物和拆除恢復，溫度永遠只持續3天，危險天氣最終會達到45-60天的範圍。」"
ruRU = "Нет начальной еды и восстановления разрушений, температуры всегда длятся только 3 дня, опасная погода в конечном счете достигает диапазона 45-60 дней."
jaJP = "「食料なしで始まり、回復が取り壊され、気温は常に3日間しか持たず、危険な天候は最終的に45〜60日間に達します。」"
frFR = "Aucune nourriture de départ et démolition de la récupération, les températures ne durent toujours que 3 jours, les conditions météorologiques dangereuses atteignent finalement la plage de 45 à 60 jours."
deDE = "Keine Startnahrung und Abrisswiederherstellung, Temperaturen dauern immer nur 3 Tage, gefährliches Wetter erreicht schließlich den Bereich von 45-60 Tagen."
plPL = "Brak początkowej żywności i odbudowy po zburzeniu, temperatury trwają zawsze tylko 3 dni, niebezpieczna pogoda ostatecznie osiąga zakres 45-60 dni."
ptBR = "Sem comida inicial e recuperação de demolição, as temperaturas sempre duram apenas 3 dias, o clima perigoso eventualmente chega à faixa de 45-60 dias."
koKR = "시작 음식 없음 및 회복 파괴, 온도는 항상 3일 동안만 지속되며, 위험한 날씨는 결국 45-60일 범위에 도달합니다."
csCZ = "Žádné počáteční jídlo a demolice obnovy, teploty trvají vždy pouze 3 dny, nebezpečné počasí nakonec dosáhne rozsahu 45-60 dní."
viVN = "Không có thực phẩm khởi đầu và không phục hồi, nhiệt độ chỉ kéo dài 3 ngày, thời tiết nguy hiểm cuối cùng sẽ đạt khoảng 45-60 ngày."

