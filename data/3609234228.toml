["acalc79.ExtremeDifficulties.ScorchedEarthDescription"]
status = "normal"
raw = "Hard temperate duration, expected duration of hazardous is 10-20x cycle number. Not recommended without the fluid dump."
enUS = "Hard temperate duration, with an expected duration of hazards being 10-20 times the cycle number. Not recommended without the fluid dump."
zhCN = "困难温带持续时间，危险持续时间预期为10-20倍的周期数。不建议在没有液体倾倒的情况下进行。"
zhTW = "艱難的溫帶持續時間，危險的預期持續時間為10-20倍的循環次數。不建議在沒有流體排放的情況下進行。"
ruRU = "Сложный температурный режим, ожидаемая продолжительность опасного состояния составляет 10-20x количество циклов. Не рекомендуется без сброса жидкости."
jaJP = "ハードな温帯の期間、危険な期間の予想はサイクル数の10-20倍です。流体ダンプなしでは推奨されません。"
frFR = "Durée tempérée difficile, la durée prévue des conditions dangereuses est de 10 à 20 fois le nombre de cycles. Non recommandé sans le déversement de fluide."
deDE = "Schwierige gemäßigte Dauer, die erwartete Dauer von gefährlichen Situationen beträgt 10-20x der Zyklenzahl. Nicht empfohlen ohne den Flüssigkeitsauslass."
plPL = "Trudny okres umiarkowany, oczekiwana długość trwania niebezpiecznego to 10-20x liczba cykli. Nie zaleca się bez zrzutu cieczy."
ptBR = "Duração temperada difícil, a duração esperada de condições perigosas é de 10-20x o número do ciclo. Não recomendado sem o descarte de fluidos."
koKR = "어려운 온대 기간, 위험한 기간의 예상 시간은 사이클 수의 10-20배입니다. 유체 덤프 없이는 추천하지 않습니다."
csCZ = "Obtížná teplá doba, očekávaná doba nebezpečné je 10-20x počet cyklů. Nedoporučuje se bez vypuštění tekutin."
viVN = "Thời gian khó khăn ở miền ôn đới, thời gian dự kiến của tình trạng nguy hiểm là 10-20 lần số chu kỳ. Không nên thực hiện nếu không có bể chứa chất lỏng."
