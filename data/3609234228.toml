["acalc79.ExtremeDifficulties.DroughtIsComingDescription"]
status = "normal"
raw = "Similar to Ultra Hard, except the hazard duration increases 50% faster and without upper limit."
enUS = "Similar to Ultra Hard, but the hazard duration increases 50% faster and has no upper limit."
zhCN = "与超困难类似，不过危险持续时间增加速度快了50%，且没有上限。"
zhTW = "類似於超級困難，但危險持續時間增加50%且沒有上限。"
ruRU = "Похоже на Ультра Сложный, за исключением того, что продолжительность опасности увеличивается на 50% быстрее и без верхнего предела."
jaJP = "「ウルトラハードに似ていますが、危険な期間が50%速く増加し、上限はありません。」"
frFR = "Semblable à Ultra Difficile, sauf que la durée du danger augmente 50 % plus rapidement et sans limite supérieure."
deDE = "Ähnlich wie Ultra Hart, mit der Ausnahme, dass die Gefahren-Dauer 50% schneller zunimmt und ohne obere Grenze."
plPL = "W podobny sposób do Ultra Hard, z tą różnicą, że czas trwania zagrożenia wzrasta o 50% szybciej i bez górnego limitu."
ptBR = "Semelhante ao Ultra Difícil, exceto que a duração do perigo aumenta 50% mais rápido e sem limite superior."
koKR = "울트라 하드와 비슷하지만, 위험 지속 시간이 50% 더 빨리 증가하고 상한선이 없습니다."
csCZ = "Podobně jako Užití Ultra Těžkého, s tím rozdílem, že doba nebezpečí se zvyšuje o 50 % rychleji a bez horního limitu."
viVN = "Tương tự như Cực Khó, ngoại trừ thời gian nguy hiểm tăng 50% nhanh hơn và không có giới hạn tối đa."

