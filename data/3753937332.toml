["academicunwinds.Rainborn.Building.ExcavationFlag.Description"]
raw = "Mark a terrain block for removal. A builder hauls a pickaxe over and digs the block out. The pickaxe is consumed by the dig and the tile is clear once it finishes."
status = "normal"
enUS = "Mark a terrain block for removal. A builder hauls a pickaxe over and digs the block out. The pickaxe is consumed by the dig and the tile is clear once it finishes."
zhCN = "“标记一个地形块以便移除。一名建造者会拖着一把镐走过来并挖出这个地块。镐在挖掘过程中会被消耗，完成后地面会清理干净。”"
zhTW = "標記地形區塊以供移除。一名建築工人拿著鐵鎬，將區塊挖出。鐵鎬在挖掘過程中被消耗，完成後該磚塊將清空。"
ruRU = "Отметьте участок земли для удаления. Строитель берет кирку и выкапывает участок. Кирка расходуется при выемке, и участок очищается, как только работа завершена."
jaJP = "「地形ブロックを除去するためにマークします。建設者がピッケルを持って、そのブロックを掘り出します。掘ることでピッケルは消費され、完了するとタイルはクリアになります。」"
frFR = "Marquez un bloc de terrain pour retrait. Un constructeur transporte une pioche et déterre le bloc. La pioche est consommée par le creusage et le carreau est dégagé une fois terminé."
deDE = "Markiere einen Terrainblock zur Entfernung. Ein Baumeister bringt eine Spitzhacke mit und gräbt den Block aus. Die Spitzhacke wird beim Graben verbraucht und die Fliese ist frei, sobald der Vorgang abgeschlossen ist."
plPL = "Zaznacz blok terenu do usunięcia. Budowniczy zabiera się za wykop, używając kilofa, i wydobywa bloczek. Kilof jest zużywany podczas wykopu, a kafel jest pusty, gdy proces się kończy."
ptBR = "Marque um bloco de terreno para remoção. Um construtor transporta uma picareta e cava o bloco. A picareta é consumida pela escavação e o bloco fica limpo assim que termina."
koKR = "제거할 지형 블록을 표시합니다. 건설자가 괭이를 들고 블록을 파냅니다. 괭이는 파내는 과정에서 소모되며, 작업이 완료되면 타일은 깨끗해집니다."
csCZ = "Označte terénní blok k odstranění. Stavitel vleče krumpáč a blok vyhloubí. Krumpáč je spotřebován při těžbě a dlaždice je vyčištěna, jakmile to dokončí."
viVN = "Đánh dấu một ô địa hình để loại bỏ. Một công nhân mang theo một cái rìu và đào ô đó ra. Cái rìu sẽ bị tiêu hao sau khi đào và ô sẽ được làm sạch khi xong."
trTR = "Bir arazi bloğunu kaldırmak için işaretleyin. Bir inşaatçı, bir kürekle oraya gelir ve bloğu kazır. Kürek kazı sırasında tüketilir ve işlem tamamlandığında alan temizlenir."
