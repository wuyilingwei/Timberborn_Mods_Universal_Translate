status = "normal"
enUS = "Only the host can save the game in multiplayer. Ask the host to save so all players share the same game state."
zhCN = "“只有主持人可以在多人游戏中保存游戏。请询问主持人进行保存，以便所有玩家共享相同的游戏状态。”"
zhTW = "「在多人遊戲中，只有主機才可以保存遊戲。請要求主機保存，以便所有玩家共享相同的遊戲狀態。」"
ruRU = "Только хост может сохранить игру в многопользовательском режиме. Попросите хоста сохранить игру, чтобы все игроки имели одинаковое состояние игры."
jaJP = "「マルチプレイヤーではホストのみがゲームを保存できます。すべてのプレイヤーが同じゲーム状態を共有できるように、ホストに保存を依頼してください。」"
frFR = "Seul l'hôte peut sauvegarder la partie en mode multijoueur. Demandez à l'hôte de sauvegarder afin que tous les joueurs partagent le même état de jeu."
deDE = "Nur der Gastgeber kann das Spiel im Mehrspielermodus speichern. Bitte den Gastgeber, das Spiel zu speichern, damit alle Spieler denselben Spielstand teilen."
plPL = " Tylko gospodarz może zapisać grę w trybie wieloosobowym. Poproś gospodarza o zapisanie, aby wszyscy gracze dzielili ten sam stan gry."
ptBR = "Apenas o anfitrião pode salvar o jogo em multiplayer. Peça ao anfitrião para salvar para que todos os jogadores compartilhem o mesmo estado do jogo."
koKR = "멀티플레이어에서 게임을 저장할 수 있는 것은 호스트만 가능합니다. 모든 플레이어가 동일한 게임 상태를 공유할 수 있도록 호스트에게 저장해 달라고 요청하세요."
csCZ = "Pouze hostitel může ukládat hru v multiplayeru. Požádejte hostitele, aby hru uložil, aby všichni hráči sdíleli stejný stav hry."
viVN = "Chỉ có chủ phòng mới có thể lưu trò chơi trong chế độ đa người. Hãy yêu cầu chủ phòng lưu lại để tất cả người chơi cùng chia sẻ trạng thái trò chơi như nhau."

