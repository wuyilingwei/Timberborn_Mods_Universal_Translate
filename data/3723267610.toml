["Bot.BeaversPerished"]
status = "normal"
raw = "Đừng nhắc về lũ Hải ly.\nChúng từng có tất cả. Không khí trong lành. Nước sạch.\nGiờ tất cả chỉ còn là ký ức mơ hồ. "
enUS = "Don't mention the beavers. They once had it all. Fresh air. Clean water. Now, all that remains is a vague memory."
zhCN = "“别提河狸了。\n它们曾经拥有一切。清新的空气。洁净的水。\n现在一切只剩下模糊的记忆。”"
zhTW = "不要提起海狸。\n它們曾經擁有一切。清新的空氣。乾淨的水。\n現在一切只剩下模糊的回憶。"
ruRU = "Не говорите о бобрах.  \nУ них было все. Чистый воздух. Чистая вода.  \nТеперь все это осталось лишь в смутных воспоминаниях."
jaJP = "ビーバーたちのことを思い出さないでください。  \n彼らはすべてを持っていました。清々しい空気。きれいな水。  \n今やすべてはぼんやりとした記憶に過ぎません。"
frFR = "Ne parle pas des castors.\nIls avaient tout. L'air frais. L'eau propre.\nMaintenant, tout n'est plus qu'un lointain souvenir."
deDE = "Sprich nicht über die Biber.  \nSie hatten einst alles. Frische Luft. Sauberes Wasser.  \nJetzt sind all diese Dinge nur noch vage Erinnerungen."
plPL = "Nie wspominaj o bobrach. \nMiały wszystko. Świeże powietrze. Czysta woda. \nTeraz to wszystko to tylko niejasne wspomnienia."
ptBR = "Não mencione os castores.\nEles tinham tudo. Ar puro. Água limpa.\nAgora, tudo é apenas uma memória vaga."
koKR = "비버에 대해 이야기하지 마세요.  \n그들은 모든 것을 가졌었습니다. 맑은 공기. 깨끗한 물.  \n지금은 모든 것이 희미한 기억일 뿐입니다."
csCZ = "Nezmiňujte bobry.\nMěli všechno. Čerstvý vzduch. Čistou vodu.\nTeď je vše jen mlhavý vzpomínka."
viVN = "Đừng nhắc về lũ Hải ly.  \nChúng từng có tất cả. Không khí trong lành. Nước sạch.  \nGiờ tất cả chỉ còn là ký ức mơ hồ."

