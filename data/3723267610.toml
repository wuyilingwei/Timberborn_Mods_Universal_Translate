["Building.Ruins.FlavorDescription"]
status = "normal"
raw = "Rải rác khắp nơi, tàn tích của loài người mang đến cho hải ly thứ không tưởng — một vật liệu vượt trội hơn gỗ."
enUS = "Scattered all around, the remnants of humanity provide beavers with the unimaginable — a material superior to wood."
zhCN = "到处散落的人类遗迹给海狸带来了超乎想象的东西——一种比木材更优越的材料。"
zhTW = "遍布各地的人類遺跡為海狸帶來了一種不可思議的東西——一種優於木材的材料。"
ruRU = "Разбросанные повсюду, руины человечества приносят бобрам нечто невообразимое — материал, превосходящий древесину."
jaJP = "あちこちに散らばる人類の遺跡は、ビーバーに信じられないものをもたらします — 木材を凌駕する優れた材料。"
frFR = "Éparpillées partout, les ruines de l'humanité offrent aux castors quelque chose d'inimaginable — un matériau supérieur au bois."
deDE = "Überall verstreut bringen die Ruinen der Menschheit den Bibern etwas Unglaubliches — ein Material, das über Holz hinausgeht."
plPL = "Rozsiane wszędzie, pozostałości po ludzkości przynoszą bobrom coś niespotykanego — materiał lepszy od drewna."
ptBR = "Espalhadas por toda parte, as ruínas da humanidade oferecem aos castores algo inimaginável — um material superior à madeira."
koKR = "곳곳에 흩어져 있는 인간의 잔해는 비버에게 상상할 수 없는 것을 가져다줍니다 — 나무보다 뛰어난 재료입니다."
csCZ = "Rozptýlené po celém místě, zbytky lidstva přinášejí bobrům něco neuvěřitelného — materiál, který převyšuje dřevo."
viVN = "Rải rác khắp nơi, tàn tích của loài người mang đến cho hải ly thứ không tưởng — một vật liệu vượt trội hơn gỗ."

["Building.Scarecrow.Description"]
status = "normal"
raw = "Từng dùng để đuổi chim ở động ruộng, nay còn mua vui cho cả già lẫn trẻ."
enUS = "Once used to scare away birds in the fields, now also a source of entertainment for both the young and the old."
zhCN = "“曾经用来驱赶田野中的鸟，如今也为老少带来了乐趣。”"
zhTW = "曾經用來驅趕田野中的鳥，如今還能為老少帶來樂趣。"
ruRU = "Ранее использовался для отпугивания птиц на полях, теперь приносит радость как взрослым, так и детям."
jaJP = "「昔は田んぼで鳥を追い払うために使われていたが、今では年寄りも若者も楽しませてくれる。」"
frFR = "Autrefois utilisé pour effrayer les oiseaux dans les champs, il divertit désormais aussi bien les vieux que les jeunes."
deDE = "Wurde früher verwendet, um Vögel von den Feldern zu vertreiben, sorgt heute für Unterhaltung bei Jung und Alt."
plPL = "Niegdyś używany do płoszenia ptaków na polu, teraz cieszy zarówno starszych, jak i młodszych."
ptBR = "Usado antigamente para espantar pássaros nos campos, agora serve para divertir tanto os mais velhos quanto os jovens."
koKR = "예전에는 농장에서 새를 쫓기 위해 사용되었지만, 이제는 노인과 어린이 모두에게 즐거움을 주고 있습니다."
csCZ = "Původně sloužil k plašení ptáků na polích, nyní poskytuje zábavu jak starým, tak mladým."
viVN = "Từng dùng để đuổi chim ở động ruộng, nay còn mua vui cho cả già lẫn trẻ."

