["Experimental.WelcomeText"]
status = "normal"
raw = "Phiên bản này của Timberborn cho phép bạn truy cập các tính năng thử nghiệm, chưa hoàn thiện. Vì vậy, khả năng cao sẽ có lỗi nghiêm trọng. Bạn đúng là một hải ly dũng cảm.\n\nCác bản lưu ở chế độ thử nghiệm được lưu riêng với bản chính. Các bản cập nhật có thể làm mất khả năng tương thích của bản lưu.\n\nTrong chế độ thử nghiệm này, <RedHighlight>nhiều phần của trò chơi chưa được dịch và sẽ hiển thị bằng tiếng Anh</RedHighlight>, bất kể bạn chọn ngôn ngữ nào. Điều này giúp chúng tôi thêm nội dung mới và thay đổi nhanh mà không phải chờ dịch.\n\nChúng tôi khuyến khích bạn tham gia Discord chính thức và góp ý về nội dung mới."
enUS = "This version of Timberborn allows you to access experimental, unfinished features. Therefore, there is a high possibility of encountering serious bugs. You are indeed a brave beaver.\n\nSaves in experimental mode are stored separately from the main version. Updates may break compatibility with saved games.\n\nIn this experimental mode, <RedHighlight>many parts of the game have not been translated and will be displayed in English</RedHighlight>, regardless of your selected language. This helps us to add new content and make changes quickly without having to wait for translations.\n\nWe encourage you to join the official Discord and provide feedback on the new content."
zhCN = "此版本的 Timberborn 允许您访问未完成的实验性功能。因此，很可能会出现严重错误。您确实是一只勇敢的海狸。\n\n实验模式下的存档与主存档是独立的。更新可能会导致存档不兼容。\n\n在此实验模式中，<RedHighlight>游戏的许多部分尚未翻译，将以英语显示</RedHighlight>，无论您选择了哪种语言。这使我们能够快速添加新内容和更改，而不必等待翻译。\n\n我们鼓励您加入官方 Discord 并对新内容提出反馈。"
zhTW = "此版本的Timberborn允許您訪問未完成的實驗性功能。因此，很可能會有嚴重的錯誤。您真是一隻勇敢的海狸。\n\n測試模式下的存檔與正式版存檔分開保存。更新可能會導致存檔不兼容。\n\n在這個測試模式中，<RedHighlight>遊戲的許多部分尚未翻譯，無論您選擇哪種語言都將以英文顯示</RedHighlight>。這使我們能夠快速添加新內容和進行更改，而無需等待翻譯。\n\n我們鼓勵您參加官方Discord並對新內容提供反饋。"
ruRU = "Эта версия Timberborn позволяет вам получить доступ к экспериментальным, недоработанным функциям. Поэтому с высокой вероятностью могут возникнуть серьезные ошибки. Вы действительно смелая бобер.\n\nСохранения в экспериментальном режиме сохраняются отдельно от основной версии. Обновления могут привести к потере совместимости сохранений.\n\nВ этом экспериментальном режиме, <RedHighlight>многие части игры еще не переведены и будут отображаться на английском</RedHighlight>, независимо от выбранного вами языка. Это позволяет нам добавлять новый контент и вносить изменения быстро, без ожидания перевода.\n\nМы настоятельно рекомендуем вам присоединиться к официальному Discord и поделиться своими отзывами о новом контенте."
jaJP = "このバージョンのTimberbornは、未完成の試験機能にアクセスすることを許可します。そのため、深刻なバグが発生する可能性が高いです。あなたは本当に勇敢なビーバーです。\n\n試験モードのセーブデータは、メインのデータとは別に保存されます。アップデートにより、セーブデータの互換性が失われる可能性があります。\n\nこの試験モードでは、<RedHighlight>ゲームの多くの部分が翻訳されておらず、選択した言語に関係なく英語で表示されます</RedHighlight>。これにより、私たちは翻訳を待つことなく、新しいコンテンツを追加し、迅速に変更を行うことができます。\n\n私たちは、公式Discordに参加して、新しいコンテンツについてのフィードバックを提供することをお勧めします。"
frFR = "Cette version de Timberborn vous permet d'accéder à des fonctionnalités expérimentales, encore inachevées. Par conséquent, il est très probable qu'il y ait des bugs graves. Vous êtes vraiment un castor courageux.\n\nLes sauvegardes en mode expérimental sont enregistrées séparément de la version principale. Les mises à jour peuvent compromettre la compatibilité des sauvegardes.\n\nDans ce mode expérimental, <RedHighlight>de nombreuses parties du jeu n'ont pas été traduites et s'afficheront en anglais</RedHighlight>, peu importe la langue que vous choisissez. Cela nous permet d'ajouter de nouveaux contenus et de faire des changements rapidement sans avoir à attendre la traduction.\n\nNous vous encourageons à rejoindre le Discord officiel et à donner votre avis sur le nouveau contenu."
deDE = "Diese Version von Timberborn ermöglicht Ihnen den Zugang zu experimentellen, unvollendeten Funktionen. Daher ist es sehr wahrscheinlich, dass es schwerwiegende Fehler geben wird. Sie sind wirklich ein mutiger Biber.\n\nSpeicher im Experimentiermodus werden separat vom Hauptspeicher gespeichert. Aktualisierungen können die Kompatibilität der Speicherstände beeinträchtigen.\n\nIn diesem Experimentiermodus sind <RedHighlight>viele Teile des Spiels noch nicht übersetzt und werden in Englisch angezeigt</RedHighlight>, unabhängig davon, welche Sprache Sie auswählen. Dies ermöglicht uns, neue Inhalte hinzuzufügen und Änderungen schnell vorzunehmen, ohne auf Übersetzungen warten zu müssen.\n\nWir ermutigen Sie, dem offiziellen Discord beizutreten und Feedback zu neuen Inhalten zu geben."
plPL = "Ta wersja Timberborn umożliwia dostęp do funkcji eksperymentalnych, które nie są jeszcze ukończone. Dlatego istnieje duże prawdopodobieństwo wystąpienia poważnych błędów. Jesteś prawdziwą odważną bobrzycą.\n\nZapisane gry w trybie eksperymentalnym są przechowywane oddzielnie od głównej wersji. Aktualizacje mogą powodować utratę zgodności zapisów.\n\nW tym trybie eksperymentalnym, <RedHighlight>wiele części gry nie zostało przetłumaczonych i będzie wyświetlane w języku angielskim</RedHighlight>, niezależnie od wybranego języka. To pozwala nam na szybkie dodawanie nowej zawartości i wprowadzanie zmian bez czekania na tłumaczenie.\n\nZachęcamy do dołączenia do oficjalnego Discorda i dzielenia się uwagami na temat nowej zawartości."
ptBR = "Esta versão do Timberborn permite que você acesse recursos experimentais e inacabados. Portanto, é muito provável que haja erros graves. Você é realmente uma castor valente.\n\nOs saves no modo experimental são salvos separadamente da versão principal. Atualizações podem causar perda de compatibilidade dos saves.\n\nNeste modo experimental, <RedHighlight>muitas partes do jogo ainda não estão traduzidas e aparecerão em inglês</RedHighlight>, independentemente do idioma que você escolher. Isso nos ajuda a adicionar novo conteúdo e fazer mudanças rápidas sem esperar pela tradução.\n\nIncentivamos você a participar do Discord oficial e dar feedback sobre o novo conteúdo."
koKR = "이 Timberborn 버전에서는 실험적이고 미완성된 기능에 접근할 수 있습니다. 따라서 심각한 오류가 발생할 가능성이 높습니다. 당신은 정말 용감한 비버입니다.\n\n실험 모드의 저장은 기본 버전과 별도로 저장됩니다. 업데이트는 저장 파일의 호환성을 잃게 만들 수 있습니다.\n\n이 실험 모드에서는 <RedHighlight>게임의 많은 부분이 번역되지 않아 선택한 언어와 상관없이 영어로 표시됩니다</RedHighlight>. 이는 저희가 새로운 콘텐츠를 추가하고 변경사항을 신속하게 반영할 수 있도록 돕습니다.\n\n저희는 공식 Discord에 참여하여 새로운 콘텐츠에 대해 피드백을 주실 것을 권장합니다."
csCZ = "Tato verze Timberborn vám umožňuje přístup k experimentálním, nedokončeným funkcím. Je tedy velmi pravděpodobné, že se vyskytnou vážné chyby. Opravdu jste odvážný bobr.\n\nUložení ve zkušebním režimu se ukládají samostatně od hlavní verze. Aktualizace mohou způsobit ztrátu kompatibility uložených her.\n\nV tomto experimentálním režimu, <RedHighlight>mnoho částí hry není přeloženo a bude se zobrazovat v angličtině</RedHighlight>, bez ohledu na to, jaký jazyk vyberete. Tímto způsobem nám to umožňuje rychle přidávat nový obsah a provádět změny, aniž bychom museli čekat na překlady.\n\nDoporučujeme se připojit k oficiálnímu Discordu a poskytnout zpětnou vazbu k novému obsahu."
viVN = "Phiên bản này của Timberborn cho phép bạn truy cập các tính năng thử nghiệm, chưa hoàn thiện. Vì vậy, khả năng cao sẽ có lỗi nghiêm trọng. Bạn đúng là một hải ly dũng cảm.\n\nCác bản lưu ở chế độ thử nghiệm được lưu riêng với bản chính. Các bản cập nhật có thể làm mất khả năng tương thích của bản lưu.\n\nTrong chế độ thử nghiệm này, <RedHighlight>nhiều phần của trò chơi chưa được dịch và sẽ hiển thị bằng tiếng Anh</RedHighlight>, bất kể bạn chọn ngôn ngữ nào. Điều này giúp chúng tôi thêm nội dung mới và thay đổi nhanh mà không phải chờ dịch.\n\nChúng tôi khuyến khích bạn tham gia Discord chính thức và góp ý về nội dung mới."

