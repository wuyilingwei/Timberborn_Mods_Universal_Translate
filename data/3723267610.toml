["MapMetadata.Terraces.Description"]
status = "normal"
raw = "Nhiều cộng đồng chọn định cư trên địa hình cao, tận dụng khả năng xây dựng theo chiều dọc mà hải ly mới phát triển."
enUS = "Many communities choose to settle in high terrain, taking advantage of the beavers' newly developed vertical building capabilities."
zhCN = "许多社区选择定居在高地，利用新发展的海狸的垂直建造能力。"
zhTW = "許多社區選擇定居在高地上，利用新發展的海狸的垂直建設能力。"
ruRU = "Многие сообщества выбирают оседлость на возвышенностях, используя способности к вертикальному строительству, которые развили бобры."
jaJP = "多くのコミュニティは高地に定住し、新たに発展したビーバーの垂直建設能力を利用しています。"
frFR = "De nombreuses communautés choisissent de s'installer sur des terrains élevés, tirant parti de la capacité à construire en hauteur que les castors ont développée."
deDE = "Viele Gemeinschaften entscheiden sich dafür, sich in höheren Lagen niederzulassen und nutzen die neu entwickelte Fähigkeit der Biber, vertikal zu bauen."
plPL = "Wiele społeczności wybiera osiedlenie się na terenach górzystych, wykorzystując zdolność bobrów do budowy w pionie."
ptBR = "Muitas comunidades optam por se estabelecer em terrenos altos, aproveitando a capacidade de construção em altura que os castores recém-desenvolvidos possuem."
koKR = "많은 공동체가 높은 지형에 정착하여 새롭게 발전한 비버의 수직 건축 능력을 활용합니다."
csCZ = "Mnoho komunit si vybírá osídlení na vyvýšeném terénu, aby využilo schopnosti stavění ve vertikálním směru, které bobři nedávno vyvinuli."
viVN = "Nhiều cộng đồng chọn định cư trên địa hình cao, tận dụng khả năng xây dựng theo chiều dọc mà hải ly mới phát triển."

