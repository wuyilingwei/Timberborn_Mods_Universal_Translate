["MapMetadata.ThousandIslands.Description"]
status = "normal"
raw = "Dù hải ly sinh ra với khả năng bơi lội vượt trội, việc biến một quần đảo thành khu công nghiệp thịnh vượng vẫn là thử thách không nhỏ."
enUS = "Although beavers are born with exceptional swimming abilities, turning an archipelago into a thriving industrial area is still no small challenge."
zhCN = "虽然海狸天生具有出色的游泳能力，但将一个群岛变成繁荣的工业区仍然是一个不小的挑战。"
zhTW = "儘管海狸天生具有優越的游泳能力，將一個群島轉變為繁榮的工業區仍然是一項不小的挑戰。"
ruRU = "Хотя бобры обладают выдающимися способностями к плаванию, превращение архипелага в процветающую индустриальную зону по-прежнему является немалым вызовом."
jaJP = "ビーバーは優れた泳ぎの能力を持って生まれましたが、島々を繁栄した産業地域に変えることは依然として簡単な挑戦ではありません。"
frFR = "Bien que les castors naissent avec des capacités de nage supérieures, transformer un archipel en une zone industrielle prospère reste un défi de taille."
deDE = "Obwohl Biber mit überlegenen Schwimmfähigkeiten geboren werden, bleibt die Umwandlung eines Archipels in ein blühendes Industriegebiet eine nicht geringe Herausforderung."
plPL = "Chociaż bobry rodzą się z doskonałymi umiejętnościami pływackimi, przekształcenie archipelagu w kwitnący ośrodek przemysłowy wciąż jest niemałym wyzwaniem."
ptBR = "Embora as castores nasçam com habilidades de natação excepcionais, transformar um arquipélago em um próspero centro industrial ainda é um desafio considerável."
koKR = "비버는 뛰어난 수영 능력을 가지고 태어나지만, 군도의 작은 섬들을 번영하는 산업 지역으로 만드는 것은 여전히 쉽지 않은 도전이다."
csCZ = "Přestože bobři se narodili s výbornou schopností plavat, proměnit souostroví na prosperující průmyslovou zónu je stále nemalou výzvou."
viVN = "Dù hải ly sinh ra với khả năng bơi lội vượt trội, việc biến một quần đảo thành khu công nghiệp thịnh vượng vẫn là thử thách không nhỏ."

