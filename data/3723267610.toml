frFR = "Monter, descendre, gauche, droite, gauche, droite, reculer, avancer. Oh, pourquoi cet endroit semble... si familier ?"
deDE = "Nach oben, nach unten, nach links, nach rechts, nach hinten, nach vorne. Oh, warum fühlt sich das hier... so vertraut an?"
plPL = "W górę, w dół, w lewo, w prawo, w lewo, w prawo, do tyłu, do przodu. O, czemu to miejsce wydaje się... takie jak wcześniej?"
ptBR = "Cima, cima, baixo, baixo, esquerda, direita, esquerda, direita, para trás, para frente. Oh, por que esse lugar parece... como se fosse o mesmo de antes?"
koKR = "위로, 위로, 아래로, 아래로, 왼쪽, 오른쪽, 왼쪽, 오른쪽, 뒤로, 앞으로. 어, 여기 왜... 옛날 같지?"
csCZ = "Výš, výš, níž, níž, vlevo, vpravo, vlevo, vpravo, dozadu, vpřed. Hmm, proč se tu cítím... jako na místě?"
viVN = "Lên, lên, xuống, xuống, trái, phải, trái, phải, lùi, tiến. Ồ, sao chỗ này thấy... như chỗ cũ vậy ta?"

