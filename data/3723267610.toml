["Faction.IronTeeth.GameOver.Flavor"]
status = "normal"
raw = "Đôi khi, lỗi ở một chi tiết nhỏ cũng đủ làm hỏng cả cỗ máy."
enUS = "Sometimes, a small detail can ruin the whole machine."
zhCN = "有时候，一个小细节的错误就足以毁掉整个机器。"
zhTW = "有時候，一個小細節的錯誤就足以毀掉整個機器。"
ruRU = "Иногда ошибка в одной мелочи достаточно, чтобы испортить весь механизм."
jaJP = "時には、小さな詳細のミスが大きな機械全体を台無しにすることがあります。"
frFR = "Parfois, une petite erreur dans un détail suffit à ruiner toute la machine."
deDE = "Manchmal kann ein kleiner Fehler ausreichen, um die gesamte Maschine zu ruinieren."
plPL = "Czasami błąd w małym detalu wystarczy, aby zepsuć całą maszynę."
ptBR = "Às vezes, um pequeno erro é suficiente para quebrar toda a máquina."
koKR = "가끔, 작은 세부사항의 실수 하나가 전체 기계의 작동을 방해할 수 있다."
csCZ = "Někdy může malá chyba způsobit, že se celé zařízení rozbije."
viVN = "Sometimes, a small detail is enough to ruin the entire machine."

["Faction.IronTeeth.GameOver.Message"]
status = "normal"
raw = "Cộng đồng Nanh Sắt của bạn đã sụp đổi mà không thể cứu vãn. Đây là kết thúc."
enUS = "Your Iron Teeth community has collapsed beyond saving. This is the end."
zhCN = "你的铁牙派系已经崩溃，无法挽救。这就是结局。"
zhTW = "你的鐵牙社區已經崩潰，無法挽回。這就是結局。"
ruRU = "Ваши Соратники Железных Зубов разрушились без возможности восстановления. Это конец."
jaJP = "あなたのアイアンティースのコミュニティは、取り返しのつかない形で崩壊しました。これが終わりです。"
frFR = "La communauté des Dents de Fer a été détruite sans possibilité de rédemption. C'est la fin."
deDE = "Deine Eisenbeißer-Gemeinschaft ist zusammengebrochen und kann nicht gerettet werden. Dies ist das Ende."
plPL = "Twoja społeczność Żelaznych Zębów upadła i nie da się jej uratować. To koniec."
ptBR = "A comunidade Dentes de Ferro foi destruída e não pode ser salva. Este é o fim."
koKR = "당신의 철제 이빨 커뮤니티는 복구할 수 없이 무너졌습니다. 이것이 끝입니다."
csCZ = "Vaše komunita Železných Zubů se zhroutila a nelze ji zachránit. Toto je konec."
viVN = "Cộng đồng Nanh Sắt của bạn đã sụp đổ mà không thể cứu vãn. Đây là kết thúc."

["Faction.IronTeeth.WonderCompletionFlavor"]
status = "normal"
raw = "Những hải ly tiên phong đã bay qua vùng đất hoang, để lại phía sau một khu định cư thịnh vượng. Nếu Trái Đất muốn hồi phục, sự thịnh vượng này cần được chia sẻ."
enUS = "The pioneering beavers have flown over the wasteland, leaving behind a prosperous settlement. If the Earth wants to recover, this prosperity needs to be shared."
zhCN = "“先锋海狸们穿越了荒原，留下了一个繁荣的定居点。如果地球想要恢复，这种繁荣需要被分享。”"
zhTW = "先锋海狸穿越荒原，留下了一个繁荣的定居点。如果地球想要复苏，这份繁荣需要被分享。"
ruRU = "Пионеры-бобры пролетели через пустошь, оставив позади процветающее поселение. Если Земле суждено восстановиться, это процветание должно быть разделено."
jaJP = "先駆者のビーバーたちは荒地を吹き抜け、繁栄した集落を後にしました。もし地球が回復を望むなら、この繁栄は共有される必要があります。"
frFR = "Les castors pionniers ont traversé les terres désolées, laissant derrière eux une colonie prospère. Si la Terre veut se rétablir, cette prospérité doit être partagée."
deDE = "Die fortschrittlichen Biber sind über das karge Land geflogen und haben eine blühende Siedlung hinterlassen. Wenn die Erde sich regenerieren will, muss dieser Wohlstand geteilt werden."
plPL = "Pionierskie bobry przefrunęły przez dzikie tereny, pozostawiając za sobą kwitnącą osadę. Jeśli Ziemia ma się odrodzić, ten dobrobyt musi być dzielony."
ptBR = "Os castores pioneiros voaram através da terra selvagem, deixando para trás um assentamento próspero. Se a Terra quer se recuperar, essa prosperidade precisa ser compartilhada."
koKR = "선도적인 비버들이 황무지를 지나면서 번영하는 정착지를 남겼습니다. 지구가 회복되기를 원한다면, 이 번영은 나누어져야 합니다."
csCZ = "Představitelé krysích zubů přelétli přes pustinu a za sebou zanechali prosperující osídlení. Aby se Země mohla uzdravit, je třeba tuto prosperitu sdílet."
viVN = "Những hải ly tiên phong đã bay qua vùng đất hoang, để lại phía sau một khu định cư thịnh vượng. Nếu Trái Đất muốn hồi phục, sự thịnh vượng này cần được chia sẻ."

["Faction.IronTeeth.WonderCompletionMessage"]
status = "normal"
raw = "Làm tốt lắm! Bạn đã tận dụng sức mạnh công nghiệp của Nanh Sắt để chinh phục bản đồ này và xây dựng Kỳ Quan."
enUS = "Well done! You have harnessed the industrial power of the Iron Teeth to conquer this map and build a Wonder."
zhCN = "干得好！你利用了铁牙的工业力量征服了这张地图并建造了奇观。"
zhTW = "做得好！您已經利用鐵牙的工業力量征服了這張地圖並建造了奇蹟。"
ruRU = "Отлично! Вы использовали промышленную силу Железных Зубов, чтобы покорить эту карту и построить Чудо."
jaJP = "よくやりました！あなたはアイアンティースの工業力を活用してこのマップを制覇し、ワンダーを建設しました。"
frFR = "Bien joué ! Vous avez utilisé la puissance industrielle des Dents de Fer pour conquérir cette carte et construire une Merveille."
deDE = "Sehr gut gemacht! Du hast die industrielle Kraft der Eisenzähne genutzt, um diese Karte zu erobern und ein Wunder zu bauen."
plPL = "Dobrze zrobione! Wykorzystałeś potęgę przemysłową Żelaznych Zębów, aby podbić tę mapę i zbudować Cuda."
ptBR = "Bom trabalho! Você aproveitou o poder industrial dos Dentes de Ferro para conquistar este mapa e construir uma Maravilha."
koKR = "잘 했어요! 여러분은 철니의 산업력을 활용하여 이 맵을 정복하고 경이로움을 건설했습니다."
csCZ = "Skvěle uděláno! Využil jsi průmyslovou sílu Železných Zubů k ovládnutí této mapy a postavení Divu."
viVN = "Làm tốt lắm! Bạn đã tận dụng sức mạnh công nghiệp của Nanh Sắt để chinh phục bản đồ này và xây dựng Kỳ Quan."

