["Tutorial.Droughts.Description"]
status = "normal"
raw = "Chúc mừng! Khu định cư của bạn đã sống sót qua đợt hạn hán đầu tiên.\n\nHạn Hán là một phần của chu kỳ mùa. Chúng sẽ quay lại và kéo dài hơn theo thời gian.\n\nHãy bắt đầu chuẩn bị cho lần tiếp theo bằng cách xây đập."
enUS = "Congratulations! Your settlement has survived the first drought.\n\nDroughts are part of the seasonal cycle. They will return and last longer over time.\n\nStart preparing for the next one by building a dam."
zhCN = "恭喜！你的定居点已经度过了第一次干旱。\n\n干旱是季节周期的一部分。它们会重新出现，并随着时间的推移而持续更久。\n\n开始通过建造大坝来为下一次干旱做准备吧。"
zhTW = "恭喜！你的定居點已經成功度過第一場乾旱。\n\n乾旱是季節循環的一部分。它們將會回來，並隨著時間延長。\n\n開始為下一次做準備，建造水壩吧。"
ruRU = "Поздравляем! Ваше поселение пережило первую засуху.\n\nЗасухи являются частью сезона. Они будут происходить снова и со временем будут длиться дольше.\n\nНачните подготовку к следующему разу, построив плотину."
jaJP = "おめでとうございます！あなたの集落は最初の干ばつを乗り越えました。\n\n干ばつは季節のサイクルの一部です。それらは回帰し、時間が経つにつれてより長く続きます。\n\n次回に備えてダムを建設し始めましょう。"
frFR = "Félicitations ! Votre colonie a survécu à sa première sécheresse.\n\nLes sécheresses font partie du cycle saisonnier. Elles reviendront et dureront plus longtemps avec le temps.\n\nCommencez à vous préparer pour la prochaine en construisant un barrage."
deDE = "Herzlichen Glückwunsch! Ihre Siedlung hat die erste Dürre überstanden.\n\nDürreperioden sind Teil des saisonalen Zyklus. Sie werden zurückkehren und im Laufe der Zeit länger anhalten.\n\nBeginnen Sie mit den Vorbereitungen für das nächste Mal, indem Sie einen Damm bauen."
plPL = "Gratulacje! Twoja osada przetrwała pierwszą suszę.\n\nSusze są częścią cyklu sezonów. Powrócą i będą trwać dłużej z czasem.\n\nZacznij przygotowywać się na następną, budując tamę."
ptBR = "Parabéns! Sua colônia sobreviveu à primeira seca.\n\nSecas são parte do ciclo das estações. Elas voltarão e durarão mais com o tempo.\n\nComece a se preparar para a próxima vez construindo uma barragem."
koKR = "축하합니다! 당신의 정착지가 첫 번째 가뭄을 견뎌냈습니다.\n\n가뭄은 계절 주기의 일부입니다. 가뭄은 다시 돌아오고 시간이 지남에 따라 더 길어질 것입니다.\n\n다음 번을 대비하여 댐을 건설하기 시작하세요."
csCZ = "Gratulujeme! Vaše osada přežila své první sucho.\n\nDlouhá sucha jsou součástí sezónního cyklu. Opakují se a s časem se prodlužují.\n\nZačněte se připravovat na to další tím, že postavíte hráz."
viVN = "Chúc mừng! Khu định cư của bạn đã sống sót qua đợt hạn hán đầu tiên.\n\nHạn Hán là một phần của chu kỳ mùa. Chúng sẽ quay lại và kéo dài hơn theo thời gian.\n\nHãy bắt đầu chuẩn bị cho lần tiếp theo bằng cách xây đập."

