raw = "Phiên bản bản lưu ({0}) không tương thích với phiên bản hiện tại ({1}). Việc khởi chạy có thể gây crash và lỗi nghiêm trọng. Chúng tôi khuyến nghị bắt đầu game mới để trải nghiệm đầy đủ các tính năng mới.\n\nBạn có chắc chắn muốn tiếp tục với bản lưu này không?"
