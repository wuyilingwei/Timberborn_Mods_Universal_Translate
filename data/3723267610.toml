["Building.Path.FlavorDescription"]
status = "normal"
raw = "\"Đường về tổ là vào tim ta, dẫu nắng mưa gần xa.\" —Một bài hát hải ly nổi tiếng."
enUS = "\"The road to the nest is in our hearts, through sun and rain, near and far.\" —A famous beaver song."
zhCN = "\"回家的路在于我们内心，无论晴雨远近。\" —一首著名的海狸歌曲。"
zhTW = "“回家的路在我們心中，無論晴雨都在身邊。” —一首著名的海狸歌曲。"
ruRU = "\"Путь к дому входит в наше сердце, несмотря на дождь и солнце.\" — Известная песня бобра."
jaJP = "「巣への道は私たちの心にあり、雨や晴れ、近くても遠くても。」 — 有名なビーバーの歌。"
frFR = "\"Le chemin vers le nid est dans notre cœur, qu'il pleuve ou qu'il fasse soleil, près ou loin.\" —Une célèbre chanson de castor."
deDE = "\"Der Weg zum Bau ist in unser Herz, egal ob Regen oder Sonnenschein, nah oder fern.\" —Ein berühmtes Lied der Biber."
plPL = "\"Droga do gniazda prowadzi do naszego serca, niezależnie od deszczu czy słońca, bliżej lub dalej.\" — Słynna piosenka bobrów."
ptBR = "\"O caminho de volta para o lar está em nossos corações, não importa o sol ou a chuva, perto ou longe.\" — Uma famosa canção dos castores."
koKR = "\"서로를 향한 길은 우리의 마음으로 향하며, 맑은 날과 비 오는 날 가까이와 멀리.\" — 유명한 비버의 노래."
csCZ = "\"Štěstí je na naší straně, ať jsme kdekoli.\" —Slavná píseň bobra."
viVN = "\"Đường về tổ là vào tim ta, dẫu nắng mưa gần xa.\" —Một bài hát hải ly nổi tiếng."

