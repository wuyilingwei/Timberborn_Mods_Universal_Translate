["Building.Dynamite.FlavorDescription"]
status = "normal"
raw = "Cần đến những biện pháp cực đoan để thích nghi với thế giới hậu tận thế."
enUS = "Extreme measures are needed to adapt to a post-apocalyptic world."
zhCN = "需要采取极端措施以适应后末日世界。"
zhTW = "需要采取极端措施以适应后末世的世界。"
ruRU = "Нужны крайние меры, чтобы приспособиться к постапокалиптическому миру."
jaJP = "ポストアポカリプスの世界に適応するには極端な手段が必要です。"
frFR = "Des mesures extrêmes sont nécessaires pour s'adapter à un monde post-apocalyptique."
deDE = "Extremmaßnahmen sind erforderlich, um sich an die post-apokalyptische Welt anzupassen."
plPL = "Potrzebne są skrajne środki, aby przystosować się do postapokaliptycznego świata."
ptBR = "Medidas extremas são necessárias para se adaptar ao mundo pós-apocalíptico."
koKR = "포스트 아포칼립스 세계에 적응하기 위해 극단적인 조치가 필요하다."
csCZ = "Je zapotřebí extrémních opatření, aby se přizpůsobilo postapokalyptickému světu."
viVN = "Cần đến những biện pháp cực đoan để thích nghi với thế giới hậu tận thế."

["Building.EarthRecultivator.Folktails.Description"]
status = "normal"
raw = "Phân tán hạt giống cây trên khắp Trái Đất. Khi phóng sẽ khiến hải ly trong khu vực trở nên vô cùng vui sướng."
enUS = "Distributes tree seeds across the Earth. When launched, it will make beavers in the area extremely happy."
zhCN = "在地球上播撒树种。发射时会让区域内的海狸感到非常快乐。"
zhTW = "在地球上散播樹木種子。發射時會使該區域的海狸變得非常快樂。"
ruRU = "Распространяет семена деревьев по всей Земле. При запуске заставляет бобров в округе стать невероятно счастливыми."
jaJP = "地球上に植物の種を散布します。発射すると、その地域のビーバーは非常に喜びます。"
frFR = "Dispersion des graines d'arbres à travers la Terre. Lorsque lancé, cela rendra les castors de la région extrêmement heureux."
deDE = "Verbreitung von Pflanzensamen über die gesamte Erde. Bei der Auslösung werden die Biber in der Umgebung äußerst erfreut sein."
plPL = "Rozprzestrzenianie nasion drzew na całej Ziemi. Po wystrzeleniu sprawi, że bobry w okolicy będą niezwykle szczęśliwe."
ptBR = "Dispersa sementes de árvores por todo o mundo. Quando lançado, fará com que os castores na área fiquem extremamente felizes."
koKR = "지구 전역에 나무 씨를 퍼뜨립니다. 발사하면 해당 지역의 비버들이 매우 기뻐합니다."
csCZ = "Šíří semena rostlin po celé Zemi. Když je vystřelíte, bobři v okolí se stanou neuvěřitelně šťastnými."
viVN = "Phân tán hạt giống cây trên khắp Trái Đất. Khi phóng sẽ khiến hải ly trong khu vực trở nên vô cùng vui sướng."

