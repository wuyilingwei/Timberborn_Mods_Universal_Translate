["Tutorial.Badtides.Description"]
status = "normal"
raw = "Khu định cư của bạn đã vượt qua đợt Thủy Triều Đỏ đầu tiên.\n\nGiống như Hạn Hán, Thủy Triều Đỏ là một phần của chu kỳ mùa.\n\nNhững đợt sau sẽ không dễ dàng như vậy, hãy luôn cảnh giác."
enUS = "Your settlement has survived the first Red Tide.\n\nLike Drought, Red Tide is part of the seasonal cycle.\n\nSubsequent waves will not be as easy, stay vigilant."
zhCN = "您的定居点已经度过了第一次红潮。\n\n与干旱一样，红潮是季节周期的一部分。\n\n后面的潮汐将不会如此轻松，请保持警惕。"
zhTW = "您的定居點已經度過了第一次紅潮。\n\n與乾旱類似，紅潮是季節週期的一部分。\n\n後面的潮汐不會這麼容易，請保持警惕。"
ruRU = "Ваше поселение пережило первую волну Красного Прилива.\n\nКак и Засуха, Красный Прилив является частью сезонного цикла.\n\nСледующие волны будут не такими простыми, будьте всегда настороже."
jaJP = "あなたの集落は最初の赤潮を乗り越えました。\n\n干ばつと同様に、赤潮は季節のサイクルの一部です。\n\n次の波はそれほど簡単ではありませんので、常に警戒してください。"
frFR = "Votre colonie a survécu à la première marée rouge.\n\nTout comme la sécheresse, la marée rouge fait partie du cycle des saisons.\n\nLes vagues suivantes ne seront pas aussi faciles, restez toujours vigilants."
deDE = "„Ihre Siedlung hat die erste Runde der Roten Flut überstanden.\n\nWie die Dürre ist die Rote Flut Teil des Jahreszyklus.\n\nDie nächsten Wellen werden nicht so einfach sein, bleiben Sie immer wachsam.“"
plPL = "Twoja osada przetrwała pierwszą falę Czerwonych Przypływów.\n\nPodobnie jak Susza, Czerwone Przypływy są częścią cyklu sezonowego.\n\nNastępne fale nie będą już tak łatwe, zawsze bądź czujny."
ptBR = "Seu assentamento passou pela primeira Onda Vermelha.\n\nAssim como a Seca, a Onda Vermelha faz parte do ciclo das estações.\n\nAs ondas seguintes não serão tão fáceis assim, permaneça sempre alerta."
koKR = "당신의 정착지는 첫 번째 적조를 지나쳤습니다.\n\n가뭄과 마찬가지로, 적조는 계절 주기의 일부입니다.\n\n다음 물결은 그렇게 쉽지 않을 것이니 항상 경계하십시오."
csCZ = "Vaše osídlení překonalo první vlnu Červeného přílivu.\n\nStejně jako sucha, Červený příliv je součástí sezónního cyklu.\n\nDalší vlny nebudou tak snadné, buďte vždy ve střehu."
viVN = "Khu định cư của bạn đã vượt qua đợt Thủy Triều Đỏ đầu tiên.\n\nGiống như Hạn Hán, Thủy Triều Đỏ là một phần của chu kỳ mùa.\n\nNhững đợt sau sẽ không dễ dàng như vậy, hãy luôn cảnh giác."

