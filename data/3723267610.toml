["MapMetadata.Craters.Description"]
status = "normal"
raw = "Không biết những miệng hố này hình thành như thế nào. Các cuộc nghiên cứu ban đầu cho thấy có sự can thiệp mạnh tay của con người."
enUS = "Unknown how these craters were formed. Initial studies suggest significant human intervention."
zhCN = "“不知道这些坑洞是如何形成的。初步研究表明有人类的强烈干预。”"
zhTW = "不知道這些坑穴是如何形成的。初步研究顯示人類的干預十分強烈。"
ruRU = "Неизвестно, как образовались эти кратеры. Предварительные исследования показывают, что имело место значительное человеческое вмешательство."
jaJP = "このクレーターがどのように形成されたのかわからない。初期の研究では、人間の強い介入の影響が示されている。"
frFR = "On ne sait pas comment ces cratères se sont formés. Des études préliminaires montrent qu'il y a eu une forte intervention humaine."
deDE = "Es ist unklar, wie diese Krater entstanden sind. Erste Untersuchungen zeigen eine starke menschliche Intervention."
plPL = "Nie wiadomo, jak powstały te kraterki. Wstępne badania sugerują silną ingerencję ze strony człowieka."
ptBR = "Não se sabe como essas crateras se formaram. Estudos iniciais mostram que houve uma forte intervenção humana."
koKR = "이 구덩이들이 어떻게 형성되었는지 알 수 없습니다. 초기 연구 결과 인간의 강력한 개입이 있음을 보여줍니다."
csCZ = "Jak se tyto krátery vytvořily, není známo. Počáteční výzkumy ukazují na silnou lidskou intervenci."
viVN = "Không biết những miệng hố này hình thành như thế nào. Các cuộc nghiên cứu ban đầu cho thấy có sự can thiệp mạnh tay của con người."

