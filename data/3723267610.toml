["Building.SteamEngine.FlavorDescription"]
status = "normal"
raw = "Dù tuyệt vời đến đâu, phát minh này vẫn là cái gai trong mắt các bộ lạc hải ly khác."
enUS = "No matter how amazing it is, this invention remains a thorn in the side of other beaver tribes."
zhCN = "尽管非常出色，这项发明仍然是其他海狸部落眼中的刺。"
zhTW = "無論多麼出色，這項發明仍然是其他海狸部落的眼中釘。"
ruRU = "Какой бы замечательной ни была, это изобретение все равно является мозолем для других бобровых племен."
jaJP = "「いかに素晴らしくても、この発明は他のビーバー族にとって目の上のたんこぶである。」"
frFR = "Quel que soit son génie, cette invention reste une épine dans le pied des autres tribus de castors."
deDE = "So wunderbar sie auch sein mag, diese Erfindung ist dennoch ein Dorn im Auge der anderen Biberstämme."
plPL = "Jakkolwiek wspaniały, wynalazek ten jest nadal cierniem w oku innych plemion bobrów."
ptBR = "Por mais incrível que seja, essa invenção ainda é uma pedra no sapato das outras tribos de castores."
koKR = "아무리 훌륭하더라도, 이 발명은 다른 비버 부족들의 가시 같은 존재입니다."
csCZ = "Ať už je to sebeúžasnější, tento vynález je stále trnem v oku ostatním bobřím kmenům."
viVN = "Dù tuyệt vời đến đâu, phát minh này vẫn là cái gai trong mắt các bộ lạc hải ly khác."

