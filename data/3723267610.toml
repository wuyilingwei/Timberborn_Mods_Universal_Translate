["Tutorial.Science.Inventor"]
status = "normal"
raw = "Hải ly là những kỹ sư của thế giới động vật. Đã đến lúc biến ý tưởng “lumberpunk” của chúng thành hiện thực.\n\nXây Xưởng Phát Minh để tạo Điểm Khoa Học."
enUS = "The beavers are the engineers of the animal kingdom. It's time to bring their 'lumberpunk' ideas to life.\n\nBuild the Inventor's Workshop to generate Science Points."
zhCN = "“海狸是动物世界中的工程师。是时候将它们的“木材朋克”理念变为现实了。\n\n建造发明车间以获得科学点。”"
zhTW = "海狸是動物界的工程師。是時候將它們的“木材朋克”理念變為現實了。\n\n建造發明工坊以創造科學點數。"
ruRU = "Бобры — инженеры животного мира. Пора воплотить их «лумберпанковскую» идею в жизнь.\n\nПостройте Мастерскую Изобретений, чтобы создавать Научные Очки."
jaJP = "ビーバーは動物界のエンジニアです。「ラumberpunk」のアイデアを現実にする時が来ました。\n\n「発明工房」を建設して科学ポイントを獲得しましょう。"
frFR = "Les castors sont les ingénieurs du monde animal. Il est temps de donner vie à leur idée « lumberpunk ».\n\nConstruisez un atelier d'invention pour générer des Points de Science."
deDE = "Die Biber sind die Ingenieure der Tierwelt. Es ist an der Zeit, ihre 'Lumberpunk'-Ideen in die Realität umzusetzen.\n\nBaue eine Erfinderwerkstatt, um Wissenschaftspunkte zu sammeln."
plPL = "Bóbrzy są inżynierami świata zwierząt. Czas zrealizować ich \"lumberpunkowe\" pomysły.\n\nZbuduj Warsztat Wynalazców, aby zdobywać Punkty Nauki."
ptBR = "Castores são os engenheiros do mundo animal. É hora de transformar a ideia “lumberpunk” deles em realidade.\n\nConstrua a Oficina de Invenções para gerar Pontos de Ciência."
koKR = "비버는 동물 세계의 엔지니어입니다. 이제 그들의 '럼버펑크' 아이디어를 현실로 만들 때입니다.\n\n발명 공장을 세워 과학 점수를 얻으세요."
csCZ = "Bobři jsou inženýři živočišného světa. Je na čase proměnit jejich „lumberpunk“ myšlenku v realitu.\n\nPostavte dílnu vynálezů pro získávání vědeckých bodů."
viVN = "Hải ly là những kỹ sư của thế giới động vật. Đã đến lúc biến ý tưởng “lumberpunk” của chúng thành hiện thực.\n\nXây Xưởng Phát Minh để tạo Điểm Khoa Học."

["Tutorial.Science.SciencePoints"]
status = "normal"
raw = "Tạm thời, hãy để Xưởng Phát Minh làm việc.\n\nKhi tích lũy đủ Điểm Khoa Học, bạn có thể dùng chúng để mở khóa công trình cao cấp hơn."
enUS = "For now, let the Invention Workshop work.\n\nWhen you accumulate enough Science Points, you can use them to unlock advanced buildings."
zhCN = "暂时，让发明工坊工作。\n\n当积累足够的科学点数时，您可以用它们来解锁更高级的建筑。"
zhTW = "暫時讓發明工作坊運作。\n\n當累積足夠的科學點數後，您可以用它們來解鎖更高級的建築。"
ruRU = "Временно позвольте Мастерской Изысканий работать.\n\nКогда вы накапливаете достаточно Научных Очков, вы можете использовать их для разблокировки более сложных построек."
jaJP = "一時的に、発明所に作業をさせてください。\n\n十分な科学ポイントを蓄積したら、それを使って高級な建物をアンล็クすることができます。"
frFR = "Pour l'instant, laissez l'Atelier d'Invention fonctionner.\n\nLorsque vous aurez accumulé suffisamment de Points de Science, vous pourrez les utiliser pour débloquer des structures de niveau supérieur."
deDE = "Bitte lassen Sie vorübergehend die Erfinderwerkstatt arbeiten.\n\nWenn Sie genügend Wissenschaftspunkte gesammelt haben, können Sie diese verwenden, um fortschrittlichere Gebäude freizuschalten."
plPL = "Tymczasowo pozwól Warsztatu Innowacji na pracę.\n\nGdy zbierzesz wystarczającą ilość Punktów Naukowych, będziesz mógł je wykorzystać do odblokowania bardziej zaawansowanych budynków."
ptBR = "Por enquanto, deixe a Oficina de Invenções trabalhar.\n\nQuando você acumular Pontos de Ciência suficientes, poderá usá-los para desbloquear construções mais avançadas."
koKR = "임시로 발명소가 작동하도록 하십시오.\n\n충분한 과학 점수를 축적하면 더 높은 수준의 건물을 잠금 해제하는 데 사용할 수 있습니다."
csCZ = "Dočasně nechte Dům vynálezů pracovat.\n\nKdyž nasbíráte dostatek vědeckých bodů, můžete je použít k odemčení pokročilejších staveb."
viVN = "Tạm thời, hãy để Xưởng Phát Minh làm việc.\n\nKhi tích lũy đủ Điểm Khoa Học, bạn có thể dùng chúng để mở khóa công trình cao cấp hơn."

