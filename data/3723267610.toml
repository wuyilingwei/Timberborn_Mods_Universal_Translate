["Tutorial.Introduction.Description"]
status = "normal"
raw = "Chào mừng đến với Timberborn! Hướng dẫn này sẽ giúp bạn có một khởi đầu thuận lợi tại vùng đất hoang.\n\nBạn sẽ học cách sử dụng các công cụ để xây dựng một cộng đồng hải ly phát triển.\n\nTrong các bước tiếp theo, mẹo sẽ hiển thị tại đây."
enUS = "Welcome to Timberborn! This tutorial will help you get a good start in the wilderness.\n\nYou will learn how to use the tools to build a thriving beaver community.\n\nIn the next steps, tips will be displayed here."
zhCN = "欢迎来到Timberborn！本教程将帮助您在荒野中顺利开局。\n\n您将学习如何使用工具来建设一个繁荣的海狸社区。\n\n在接下来的步骤中，提示将显示在此处。"
zhTW = "歡迎來到 Timberborn！本指南將幫助您在荒野中獲得良好的開端。\n\n您將學習如何使用工具來建立一個發展中的海狸社區。\n\n在接下來的步驟中，提示將顯示在這裡。"
ruRU = "Добро пожаловать в Timberborn! Это руководство поможет вам начать с комфортом в дикой местности.\n\nВы научитесь использовать инструменты для построения развивающегося сообщества бобров.\n\nНа следующих шагах здесь будут отображаться советы."
jaJP = "「Timberborn」へようこそ！このガイドは、荒野での良いスタートを切る手助けをします。\n\nあなたは、成長するビーバーのコミュニティを築くためのツールの使い方を学ぶでしょう。\n\n次のステップでは、ヒントがここに表示されます。"
frFR = "Bienvenue dans Timberborn ! Ce tutoriel vous aidera à bien commencer dans ce pays sauvage.\n\nVous apprendrez à utiliser les outils pour construire une communauté de castors florissante.\n\nDans les étapes suivantes, des conseils s'afficheront ici."
deDE = "Willkommen bei Timberborn! Dieses Tutorial hilft Ihnen, einen guten Start im Wilden Land zu haben.\n\nSie werden lernen, wie Sie Werkzeuge verwenden, um eine wachsende Bibergemeinschaft aufzubauen.\n\nIn den nächsten Schritten werden hier Tipps angezeigt."
plPL = "Witamy w Timberborn! Ten przewodnik pomoże Ci dobrze wystartować w dzikiej krainie.\n\nNauczysz się korzystać z narzędzi do budowy rozwijającej się społeczności bobrów.\n\nW kolejnych krokach wskazówki będą wyświetlane tutaj."
ptBR = "Bem-vindo ao Timberborn! Este tutorial irá ajudá-lo a ter um bom começo na terra selvagem.\n\nVocê aprenderá a usar as ferramentas para construir uma comunidade de castores próspera.\n\nNas etapas seguintes, dicas serão exibidas aqui."
koKR = "티머본에 오신 것을 환영합니다! 이 튜토리얼은 황야에서 성공적으로 시작하는 데 도움이 될 것입니다.\n\n여기서는 번창하는 비버 커뮤니티를 구축하는 데 필요한 도구를 사용하는 방법을 배울 것입니다.\n\n다음 단계에서는 팁이 이곳에 표시됩니다."
csCZ = "Vítáme vás v Timberborn! Tento tutoriál vám pomůže mít dobrý start v divočině.\n\nNaučíte se používat nástroje k vybudování rozvinuté kolonie bobrů.\n\nV dalších krocích se zde budou zobrazovat tipy."
viVN = "Chào mừng đến với Timberborn! Hướng dẫn này sẽ giúp bạn có một khởi đầu thuận lợi tại vùng đất hoang.\n\nBạn sẽ học cách sử dụng các công cụ để xây dựng một cộng đồng hải ly phát triển.\n\nTrong các bước tiếp theo, mẹo sẽ hiển thị tại đây."

["Tutorial.LayerTool.ChangeUsingMouse"]
status = "normal"
raw = "Bạn có thể điều chỉnh lớp hiển thị bằng các phím tắt, giúp tối ưu thời gian.\n\nNhiều thao tác khác cũng có phím tắt. Xem trong tooltip hoặc phần Cài đặt."
enUS = "You can adjust the display layer using shortcuts, optimizing your time.\n\nMany other actions also have shortcuts. See in the tooltip or the Settings section."
zhCN = "您可以通过快捷键调整显示图层，以优化时间。\n\n还有许多其他操作也有快捷键。请查看工具提示或设置部分。"
zhTW = "您可以使用快捷鍵調整顯示層，幫助優化時間。\n\n還有許多其他操作也有快捷鍵。請參閱提示框或設定部分。"
ruRU = "Вы можете настроить уровень отображения с помощью ярлыков, что поможет оптимизировать время. \n\nДругие действия также имеют ярлыки. Смотрите в подсказках или в разделе Настройки."
jaJP = "マウスを使ってレイヤーツールを変更する - 新しいテキストを翻訳: \"ショートカットキーを使って表示レイヤーを調整することができ、時間を最適化します。\n\n他にも多くの操作にショートカットキーがあります。ツールチップや設定のセクションを確認してください。\""
frFR = "Vous pouvez ajuster la couche d'affichage à l'aide de raccourcis clavier, ce qui optimise le temps.\n\nDe nombreuses autres actions ont également des raccourcis. Consultez l'info-bulle ou la section Paramètres."
deDE = "Sie können die Anzeigeschicht mit Tastenkombinationen anpassen, um die Zeit zu optimieren.\n\nViele andere Aktionen haben auch Shortcuts. Siehe im Tooltip oder im Bereich Einstellungen."
plPL = "Możesz dostosować warstwę wyświetlania za pomocą skrótów klawiszowych, co pozwala zaoszczędzić czas.\n\nWiele innych działań ma również skróty klawiszowe. Sprawdź w dymku pomocy lub w ustawieniach."
ptBR = "Você pode ajustar a camada de exibição usando atalhos, otimizando o tempo.\n\nMuitas outras ações também possuem atalhos. Veja no tooltip ou na seção Configurações."
koKR = "마우스를 이용하여 레이어 표시를 조정할 수 있습니다. 이렇게 하면 시간을 최적화할 수 있습니다.\n\n다른 많은 작업에도 단축키가 있습니다. 툴팁 또는 설정 부분에서 확인하세요."
csCZ = "Můžete upravit zobrazenou vrstvu pomocí klávesových zkratek, což optimalizuje čas.\n\nMnoho dalších akcí také má klávesové zkratky. Podívejte se do tooltipu nebo sekce Nastavení."
viVN = "Bạn có thể điều chỉnh lớp hiển thị bằng các phím tắt, giúp tối ưu thời gian.\n\nNhiều thao tác khác cũng có phím tắt. Xem trong tooltip hoặc phần Cài đặt."

["Tutorial.LayerTool.ChangeUsingUI"]
status = "normal"
raw = "Khi khu định cư có thêm nhiều công trình cao tầng, có thể bạn sẽ gặp khó khăn khi tương tác với chúng.\n\nCông cụ Lớp sẽ hỗ trợ bằng cách ẩn đi mọi thứ phía trên lớp đã chọn.\n\nHãy thay đổi lớp hiển thị bằng các nút được đánh dấu."
enUS = "When the settlement has more tall buildings, you may find it difficult to interact with them.\n\nThe Layer Tool will help by hiding everything above the selected layer.\n\nChange the display layer using the marked buttons."
zhCN = "“当定居点有更多高层建筑时，您可能会在与它们互动时遇到困难。\n\n层工具将通过隐藏所选层上方的所有内容来提供支持。\n\n请通过标记的按钮更改显示层。”"
zhTW = "當定居點有更多高層建築時，您可能會發現在與它們互動時遇到困難。\n\n圖層工具將通過隱藏所選圖層上方的所有內容來提供支持。\n\n請使用標記的按鈕更改顯示圖層。"
ruRU = "Когда поселение имеет больше высоких зданий, вам может быть трудно взаимодействовать с ними.\n\nИнструмент Слой поможет, скрыв все, что находится над выбранным слоем.\n\nИзмените отображаемый слой с помощью отмеченных кнопок."
jaJP = "「居住地に高層建築が増えると、それらとのインタラクションに苦労することがあるかもしれません。\n\nレイヤーツールは、選択したレイヤーの上にあるすべてを隠すことでサポートします。\n\nマークされたボタンを使用して表示レイヤーを変更してください。」"
frFR = "Lorsque la colonie comporte de nombreux bâtiments à plusieurs étages, vous pourriez rencontrer des difficultés pour interagir avec eux.\n\nL'outil de couche vous aidera en masquant tout ce qui se trouve au-dessus de la couche sélectionnée.\n\nVeuillez changer la couche d'affichage à l'aide des boutons marqués."
deDE = "Wenn die Siedlung mehr hochhausartige Gebäude hat, könnte es schwierig sein, mit ihnen zu interagieren.\n\nDas Layers-Werkzeug wird unterstützen, indem es alles über der gewählten Ebene ausblendet.\n\nÄndere die anzuzeigende Ebene mit den markierten Tasten."
plPL = "Gdy osada ma coraz więcej wysokich budynków, możesz mieć trudności z interakcją z nimi.\n\nNarzędzie warstw pomoże, ukrywając wszystko powyżej wybranej warstwy.\n\nZmień warstwę wyświetlania za pomocą oznaczonych przycisków."
ptBR = "Quando a colônia tem mais edifícios de vários andares, você pode ter dificuldades em interagir com eles.\n\nA Ferramenta de Camada ajudará escondendo tudo acima da camada selecionada.\n\nAltere a camada de exibição usando os botões destacados."
koKR = "정착지가 더 많은 고층 건물로 확장되면, 이들과 상호작용하는 데 어려움이 있을 수 있습니다.\n\n레이어 도구는 선택한 레이어 위의 모든 것을 숨기는 방식으로 지원합니다.\n\n표시할 레이어를 강조된 버튼으로 변경하세요."
csCZ = "Když má osada více vysokých budov, můžete mít potíže s interakcí s nimi.\n\nNástroj pro vrstvy vám pomůže tím, že skryje všechno nad vybranou vrstvou.\n\nZměňte zobrazenou vrstvu pomocí zvýrazněných tlačítek."
viVN = "Khi khu định cư có thêm nhiều công trình cao tầng, có thể bạn sẽ gặp khó khăn khi tương tác với chúng.\n\nCông cụ Lớp sẽ hỗ trợ bằng cách ẩn đi mọi thứ phía trên lớp đã chọn.\n\nHãy thay đổi lớp hiển thị bằng các nút được đánh dấu."

