["MapMetadata.Cliffside.Description"]
status = "normal"
raw = "Tàn tích kiến trúc của loài người cổ đại nằm rải rác bên trong thung lũng hẻo lánh này. Hải ly khao khát một ngày cũng để lại dấu ấn như thế trên thế giới."
enUS = "Ruins of ancient human architecture are scattered throughout this remote valley. Beavers long for a day to leave their mark on the world as well."
zhCN = "“古人类的建筑遗迹散落在这个偏僻山谷中。海狸渴望有一天也能在世界上留下这样的印记。”"
zhTW = "「古代人類的建築遺跡散落在這個偏僻山谷中。海狸渴望有一天也能在世界上留下如此印記。」"
ruRU = "Руины архитектуры древних людей разбросаны по этой уединенной долине. Бобры мечтают оставить подобный след в этом мире однажды."
jaJP = "古代人類の建築の遺跡がこのひなびた谷の中に点在しています。ビーバーはいつかこの世界に自分の足跡を残したいと渇望しています。"
frFR = "Les vestiges architecturaux d'une ancienne civilisation humaine sont éparpillés dans cette vallée isolée. Les castors rêvent qu'un jour ils laisseront également leur marque sur le monde."
deDE = "Die Ruinen der Architektur der alten Menschheit sind verstreut in diesem abgelegenen Tal. Die Biber sehnen sich danach, eines Tages ebenfalls einen solchen Eindruck in der Welt zu hinterlassen."
plPL = "Ruiny architektury starożytnych ludzi rozsiane są po tej odosobnionej dolinie. Bobry pragną pewnego dnia również zostawić swój ślad na świecie."
ptBR = "As ruínas da arquitetura da antiga civilização humana estão espalhadas por este vale isolado. Os castores anseiam um dia deixar sua marca no mundo assim também."
koKR = "이 외딴 골짜기에는 고대 인류의 건축 유적이 산재해 있습니다. 비버는 언젠가 세상에 그러한 흔적을 남기고 싶어 합니다."
csCZ = "Zbytky architektury dávných lidí leží roztroušené v tomto odlehlém údolí. Bobři touží po dni, kdy také zanechají svůj otisk na světě."
viVN = "Tàn tích kiến trúc của loài người cổ đại nằm rải rác bên trong thung lũng hẻo lánh này. Hải ly khao khát một ngày cũng để lại dấu ấn như thế trên thế giới."

