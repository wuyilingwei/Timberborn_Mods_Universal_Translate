["Building.ReservePile.FlavorDescription"]
status = "normal"
raw = "“Gỗ xưa lúc nào cũng tốt hơn. Hồi đó chúng mọc khác bây giờ.” —Ma' Ngonel"
enUS = "\"Ancient wood is always better. It used to grow differently than it does now.\" —Ma' Ngonel"
zhCN = "“古老的木头总是更好。那时候它们的生长与现在不同。” —Ma' Ngonel"
zhTW = "「“古樹的木材總是更好。那時它們長得與現在不同。” —馬·恩戈內」"
