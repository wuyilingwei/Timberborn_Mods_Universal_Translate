["Tutorial.Wellbeing.SetWorkingHours"]
status = "normal"
raw = "Hải ly cần thời gian rảnh để ăn, uống, nghỉ ngơi và hoạt động giải trí.\n\nĐể tối ưu hiệu suất, bạn cần cân bằng giữa phúc lợi và giờ làm việc.\n\nHiện tại, hãy đưa giờ làm về mức mặc định."
enUS = "Beavers need free time to eat, drink, rest, and engage in leisure activities.\n\nTo optimize performance, you need to balance wellbeing and working hours.\n\nFor now, set the working hours back to default."
zhCN = "海狸需要空闲时间来吃、喝、休息和娱乐。\n\n为了优化绩效，您需要平衡福利和工作时间。\n\n目前，请将工作时间恢复到默认设置。"
zhTW = "海狸需要時間來吃、喝、休息和娛樂活動。\n\n為了優化效率，您需要在福利和工作時間之間取得平衡。\n\n目前，請將工作時間恢復到默認值。"
ruRU = "Бобрам нужно свободное время для еды, питья, отдыха и развлечений.\n\nДля оптимизации производительности вам нужно сбалансировать благосостояние и рабочее время.\n\nВ данный момент установите рабочие часы на уровень по умолчанию."
jaJP = "「ビーバーは食べたり、飲んだり、休んだり、レクリエーション活動を行うための自由な時間が必要です。\n\nパフォーマンスを最適化するためには、福利厚生と労働時間のバランスを取る必要があります。\n\n現在は、労働時間をデフォルトのレベルに戻してください。」"
frFR = "Les castors ont besoin de temps libre pour manger, boire, se reposer et se divertir.\n\nPour optimiser les performances, vous devez trouver un équilibre entre le bien-être et les heures de travail.\n\nPour l'instant, remettez les heures de travail à la valeur par défaut."
deDE = "Die Biber benötigen Freizeit, um zu essen, zu trinken, sich auszuruhen und sich zu vergnügen.\n\nUm die Leistung zu optimieren, müssen Sie eine Balance zwischen dem Wohlbefinden und den Arbeitsstunden finden.\n\nAktuell setzen Sie die Arbeitsstunden auf den Standardwert zurück."
plPL = "Bóbr potrzebuje wolnego czasu na jedzenie, picie, odpoczynek i rozrywkę.\n\nAby zoptymalizować wydajność, musisz znaleźć równowagę między dobrym samopoczuciem a godzinami pracy.\n\nObecnie przywróć godziny pracy do wartości domyślnej."
ptBR = "Os castores precisam de tempo livre para comer, beber, descansar e se entreter.\n\nPara otimizar o desempenho, você precisa equilibrar o bem-estar e as horas de trabalho.\n\nAtualmente, defina as horas de trabalho para o padrão."
koKR = "비버는 먹고, 마시고, 쉬고, 레크리에이션 활동을 할 수 있는 자유 시간이 필요합니다.\n\n효율성을 최적화하려면 복지와 근무 시간을 균형 있게 조절해야 합니다.\n\n현재는 근무 시간을 기본값으로 설정하세요."
csCZ = "Bobři potřebují volný čas na jídlo, pití, odpočinek a zábavu.\n\nAby se optimalizoval výkon, musíte vyvážit blahobyt a pracovní dobu.\n\nV tuto chvíli nastavte pracovní dobu na výchozí hodnoty."
viVN = "Hải ly cần thời gian rảnh để ăn, uống, nghỉ ngơi và hoạt động giải trí.\n\nĐể tối ưu hiệu suất, bạn cần cân bằng giữa phúc lợi và giờ làm việc.\n\nHiện tại, hãy đưa giờ làm về mức mặc định."

["Tutorial.Wellbeing.Shrub"]
status = "normal"
raw = "Phúc lợi cũng tăng nhờ vẻ đẹp của đồ trang trí. \n\nHải ly không chủ động tìm đến, nên bạn hãy đặt gần nơi chúng sinh hoạt.\n\nBụi cây là vật trang trí đơn giản nhất."
enUS = "Wellbeing also increases due to the beauty of decorations.\n\nBeavers do not actively seek them out, so place them near where they gather.\n\nShrubs are the simplest decoration."
zhCN = "“福祉也因装饰品的美丽而增加。\n\n海狸不会主动寻找，因此请将其放置在它们活动的附近。\n\n灌木是最简单的装饰品。”"
zhTW = "福祉也因裝飾品的美觀而增加。\n\n海狸不會主動尋找，因此請將其放置在它們活動的附近。\n\n灌木叢是最簡單的裝飾物。"
ruRU = "Благосостояние также повышается благодаря красоте декоративных элементов.\n\nБобры не ищут их сами, поэтому разместите здесь, где они обычно обитают.\n\nКусты - это самый простой декоративный элемент."
jaJP = "「福祉は装飾品の美しさによっても向上します。\n\nビーバーは自ら探しに行かないので、彼らが活動する近くに置いてください。\n\n低木は最もシンプルな装飾品です。」"
frFR = "Le bien-être augmente également grâce à la beauté des décorations.\n\nLes castors ne recherchent pas activement ces éléments, donc placez-les près de leurs zones d'activité.\n\nLes buissons sont les décorations les plus simples."
deDE = "Wohlergehen wird auch durch die Schönheit der Dekorationen gesteigert.\n\nBiber suchen nicht aktiv danach, also stelle sie in die Nähe ihrer Lebensräume.\n\nSträucher sind die einfachste Form der Dekoration."
plPL = "Zwiększenie dobrobytu również następuje dzięki urodzie dekoracji. \n\nBobry nie szukają ich aktywnie, więc umieść je w pobliżu miejsc, gdzie przebywają.\n\nKrzewy to najprostsza dekoracja."
ptBR = "O bem-estar também aumenta graças à beleza da decoração.\n\nOs castores não procuram ativamente, então coloque perto de onde eles se movimentam.\n\nOs arbustos são as decorações mais simples."
koKR = "복지는 장식의 아름다움 덕분에 증가합니다.\n\n비버는 적극적으로 찾아오지 않으므로, 그들이 활동하는 곳 근처에 놓아야 합니다.\n\n덩굴은 가장 간단한 장식입니다."
csCZ = "Blaho také roste díky kráse dekorací.\n\nBobři se aktivně nehledají, proto je dejte poblíž jejich obvyklého místa.\n\nKeř je nejjednodušší dekorací."
viVN = "Phúc lợi cũng tăng nhờ vẻ đẹp của đồ trang trí. \n\nHải ly không chủ động tìm đến, nên bạn hãy đặt gần nơi chúng sinh hoạt.\n\nBụi cây là vật trang trí đơn giản nhất."

["Tutorial.Wellbeing.WellbeingPanel"]
new = "Phúc lợi là một chỉ số tổng quát. Bạn có thể thấy mức Phúc lợi trung bình ở góc trên bên trái.\n\nNhấn vào để xem mức độ đáp ứng các nhu cầu. Có nhiều cách để cải thiện đời sống hải ly."
status = "normal"
raw = "Phúc lợi là một chỉ số tổng quát. Bạn có thể thấy mức Phúc lợi trung bình ở góc trên bên trái.\n\nNhấn vào để xem mức độ đáp ứng các nhu cầu. Có nhiều cách để cải thiện đời sống hải ly."
enUS = "Wellbeing is a general metric. You can see the average Wellbeing level in the top left corner.\n\nClick to view the fulfillment levels of the needs. There are many ways to improve the beaver's quality of life."
zhCN = "福利是一个综合指标。您可以在左上角看到平均福利水平。\n\n点击查看满足需求的程度。有多种方式可以改善海狸的生活。"
zhTW = "福利是一個總體指標。您可以在左上角看到平均福利水平。\n\n點擊以查看滿足需求的程度。有多種方法可以改善海狸的生活。"
ruRU = "Благосостояние - это общий показатель. Вы можете увидеть средний уровень благосостояния в верхнем левом углу.\n\nНажмите, чтобы увидеть уровень удовлетворенности потребностей. Существует множество способов улучшить жизнь бобров."
frFR = "Le bien-être est un indicateur général. Vous pouvez voir le niveau moyen de bien-être dans le coin supérieur gauche.\n\nCliquez pour voir le degré de satisfaction des besoins. Il existe plusieurs façons d'améliorer la vie des castors."
deDE = "Wohlbefinden ist eine allgemeine Kennzahl. Sie können den durchschnittlichen Wohlbefindensgrad in der oberen linken Ecke sehen.\n\nKlicken Sie, um zu sehen, wie gut die Bedürfnisse erfüllt werden. Es gibt viele Möglichkeiten, das Leben der Biber zu verbessern."
plPL = "Welfare to ogólny wskaźnik. Możesz zobaczyć średni poziom dobrobytu w lewym górnym rogu.\n\nKliknij, aby zobaczyć, w jakim stopniu są spełnione potrzeby. Istnieje wiele sposobów na poprawę życia bobrów."
ptBR = "O bem-estar é um indicador geral. Você pode ver o nível médio de bem-estar no canto superior esquerdo.\n\nClique para ver o nível de atendimento das necessidades. Há várias maneiras de melhorar a vida dos castores."
koKR = "복지는 전반적인 지표입니다. 왼쪽 상단 모서리에서 평균 복지 수준을 확인할 수 있습니다.\n\n요구 사항 충족 수준을 보려면 클릭하십시오. 비버의 삶을 개선할 수 있는 방법이 많이 있습니다."
csCZ = "Blahobyt je obecný ukazatel. Můžete vidět průměrnou úroveň blahobytu v levém horním rohu.\n\nKlepněte na to a podívejte se na úroveň uspokojení potřeb. Existuje mnoho způsobů, jak zlepšit život bobrů."
viVN = "Phúc lợi là một chỉ số tổng quát. Bạn có thể thấy mức Phúc lợi trung bình ở góc trên bên trái.\n\nNhấn vào để xem mức độ đáp ứng các nhu cầu. Có nhiều cách để cải thiện đời sống hải ly."

