["Building.Lodge.FlavorDescription"]
status = "normal"
raw = "“Ngày xưa, nhà tổ chỉ đơn giản là cái tổ. Còn bây giờ? Ta cũng không chắc nữa.” —Ma' Ngonel"
enUS = "\"In the past, the ancestral house was simply a nest. And now? I'm not so sure anymore.\" —Ma' Ngonel"
zhCN = "“很久以前，祖屋只是一个巢穴。而现在呢？我也不太确定了。” —玛·恩戈内尔"
zhTW = "「從前，祖屋只不過是一個巢穴。而如今呢？我也不太確定了。」—馬·恩戈內爾"
ruRU = "«—Когда-то дом предков был просто гнездом. А сейчас? Я уже не уверена.» —Ма' Нгонел"
jaJP = "「昔、家族の家はただの巣でした。今はどうでしょう？私はもう確信が持てません。」 —マ・ノゲネル"
frFR = "« Autrefois, la maison ancestrale n'était rien d'autre qu'un abri. Et maintenant ? Je ne suis plus si sûr. » —Ma' Ngonel"
deDE = "„Einst war das Stammhaus einfach nur ein Nest. Und jetzt? Ich bin mir da auch nicht mehr sicher.“ —Ma' Ngonel"
plPL = "„Dawniej, siedziba była po prostu gniazdem. A teraz? Nie jestem już tego taki pewny.” —Ma' Ngonel"
ptBR = "“Antigamente, a casa da família era apenas um ninho. E agora? Eu também não tenho certeza.” —Ma' Ngonel"
koKR = "\"옛날에, 조상 집은 단순히 둥지에 불과했습니다. 지금은? 나는 확신할 수 없습니다.\" —마' 응고넬"
csCZ = "„Kdysi byla ancestrální chata jen jednoduchým hnízdem. A teď? Už si ani nejsem jistý.“ —Ma' Ngonel"
viVN = "“Ngày xưa, nhà tổ chỉ đơn giản là cái tổ. Còn bây giờ? Ta cũng không chắc nữa.” —Ma' Ngonel"

