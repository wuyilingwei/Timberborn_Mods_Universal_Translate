status = "normal"

["Tutorial.VerticalArchitecture"]
new = "Kiến trúc chiều dọc"
status = "normal"

["Tutorial.VerticalArchitecture.BuildRooftopTerrace"]
new = "Trong vùng đất hoang, việc tối ưu không gian là rất quan trọng. Hải ly làm điều đó bằng cách xây dựng ngày càng lên cao.\n\nMột số công trình như Nhà Tổ có mái phẳng, có thể xây thêm công trình khác lên trên.\n\nHãy xây một Sân Thượng trên mái. Bạn sẽ cần Cầu Thang để kết nối nó với đường đi bên dưới."
status = "normal"

["Tutorial.WaterAndFood"]
new = "Nước và thực phẩm"
status = "normal"

["Tutorial.WaterAndFood.Farmhouse"]
new = "Về lâu dài, bạn cần nguồn thực phẩm bổ dưỡng hơn. Hãy xây Nông Trại để trồng và thu hoạch cây trồng.\n\nGiống như các cột cờ, Nông Trại có phạm vi hoạt động giới hạn.\n\nGợi ý: Nếu thiếu lao động, bạn có thể tạm dừng một số công trình khác bằng nút Tạm dừng (ở bảng điều khiển của công trình đó). "
status = "normal"

["Tutorial.WaterAndFood.Gatherer"]
new = "Ngoài nước, hải ly còn cần thức ăn.\n\nNhân viên hái lượm sẽ tự động thu hoạch Việt Quất trong phạm vi của Cột Thu Hoạch. Bạn có thể xem phạm vi khi đặt cột.\n\nHãy xây một Cột Thu Hoạch gần các bụi Việt Quất."
status = "normal"

["Tutorial.WaterAndFood.MarkCarrots"]
new = "Nông dân sẽ không bắt đầu làm việc cho đến khi bạn chỉ định trồng gì và ở đâu.\n\nDùng công cụ Làm Nông để tạo ruộng Cà Rốt.\n\nCây trồng cần có đất tươi tốt (màu xanh). Nếu không, chúng sẽ khô và chết."
status = "normal"

["Tutorial.WaterAndFood.WaterPump"]
new = "Hải ly cần nước để sống.\n\nHãy xây Máy Bơm Nước để đảm bảo nguồn nước uống liên tục. Đừng quên nối với Trung Tâm Khu Vực."
status = "normal"

["Tutorial.Wellbeing"]
new = "Phúc Lợi"
status = "normal"

["Tutorial.Wellbeing.Beaver"]
new = "Các quyết định của bạn có ảnh hưởng đến hải ly.\n\nChọn một hải ly để xem thông tin chi tiết: phúc lợi, chỉ số và nhu cầu.\n\nMột số nhu cầu có thể xuống mức âm, gây hậu quả nặng nề (thậm chí là cái chết)."
status = "normal"

["Tutorial.Wellbeing.Campfire"]
new = "Phúc lợi thể hiện mức độ hài lòng của hải ly. Nó ảnh hưởng đến: tốc độ làm việc, tốc độ di chuyển và tuổi thọ.\n\nMột cách hiệu quả để tăng phúc lợi là xây công trình giải trí—nơi hải ly ghé khi không làm việc."
status = "normal"

["Tutorial.Wellbeing.OpenWellbeingPanel"]
new = "Mở bảng Phúc lợi"
status = "normal"

["Tutorial.Wellbeing.SelectBeaver"]
new = "Chọn một hải ly và xem nhu cầu"
status = "normal"

["Tutorial.Wellbeing.SetWorkingHours"]
new = "Hải ly cần thời gian rảnh để ăn, uống, nghỉ ngơi và hoạt động giải trí.\n\nĐể tối ưu hiệu suất, bạn cần cân bằng giữa phúc lợi và giờ làm việc.\n\nHiện tại, hãy đưa giờ làm về mức mặc định."
status = "normal"

["Tutorial.Wellbeing.Shrub"]
new = "Phúc lợi cũng tăng nhờ vẻ đẹp của đồ trang trí. \n\nHải ly không chủ động tìm đến, nên bạn hãy đặt gần nơi chúng sinh hoạt.\n\nBụi cây là vật trang trí đơn giản nhất."
status = "normal"

["Tutorial.Wellbeing.WellbeingPanel"]
new = "Phúc lợi là một chỉ số tổng quát. Bạn có thể thấy mức Phúc lợi trung bình ở góc trên bên trái.\n\nNhấn vào để xem mức độ đáp ứng các nhu cầu. Có nhiều cách để cải thiện đời sống hải ly."
status = "normal"

["Tutorial.Wood"]
new = "Gỗ"
status = "normal"

["Tutorial.Wood.ConnectLumberjacks"]
new = "Mọi công trình có lối vào phải nối với Trung Tâm Khu Vực bằng Đường Đi. \n\nXây Đường Đi để nối Cột Đốn Gỗ với Trung Tâm Khu Vực. \n\nLối vào của công trình được đánh dấu bằng mũi tên."
status = "normal"

["Tutorial.Wood.FinishLumberjacks"]
new = "Cột sẽ không được xây nếu nằm ngoài phạm vi xây dựng của khu vực.\n\nChọn Trung Tâm Khu Vực để xem phạm vi. Bạn có thể mở rộng bằng cách nối thêm Đường Đi."
status = "normal"

["Tutorial.Wood.MarkTrees"]
new = "Tiều phu chỉ chặt cây trong vùng bạn chỉ định.\n\nCây đồng thời cũng phải nằm trong phạm vi của Cột Đốn Gỗ.\n\nDùng công cụ \"Chỉ định chặt cây\". Giữ chuột và kéo để chọn nhiều cây cùng lúc."
status = "normal"

["Tutorial.Wood.PlaceLumberjacks"]
new = "Mọi khu định cư hải ly đều cần Gỗ—rất nhiều Gỗ. \n\nChỉ hải ly tiều phu mới chặt cây. Hãy đặt Cột Đốn Gỗ gần khu rừng."
status = "normal"

["Tutorial.WorkingHours"]
new = "Giờ làm việc"
status = "normal"

["Tutorial.WorkingHours.SetWorkingHours"]
new = "Điều chỉnh giờ làm là một cách quản lý khu định cư.\n\nGiờ làm việc dài hơn giúp phát triển nhanh hơn. Nhưng hải ly cũng cần nghỉ ngơi mỗi ngày.\n\nTrước mắt, hãy tăng nhẹ giờ làm."
status = "normal"

