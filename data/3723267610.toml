["BuilderPriorityTool.Description"]
status = "normal"
raw = "Sử dụng công cụ này để thiết lập mức ưu tiên cho việc xây dựng, phá dỡ và thu gom vật phẩm từ các Đống Đổ Nát."
enUS = "Use this tool to set the priority for building, demolishing, and collecting items from the Ruins."
zhCN = "使用此工具设置建筑、拆除和从废墟中收集物品的优先级。"
zhTW = "使用此工具設置建設、拆除和從廢墟中收集物品的優先級。"
ruRU = "Используйте этот инструмент, чтобы установить приоритет для строительства, сноса и сбора предметов из руин."
jaJP = "このツールを使用して、建設、解体、廃棄物の収集の優先順位を設定します。"
frFR = "Utilisez cet outil pour définir le niveau de priorité pour la construction, la démolition et la collecte d'objets à partir des Débris."
deDE = "Verwenden Sie dieses Werkzeug, um die Priorität für den Bau, den Abbruch und das Einsammeln von Gegenständen aus Trümmerhaufen festzulegen."
plPL = "Użyj tego narzędzia, aby ustawić priorytet dla budowy, rozbiórki i zbierania przedmiotów z gruzowisk."
ptBR = "Use esta ferramenta para definir a prioridade de construção, demolição e coleta de itens das Pilhas de Entulho."
koKR = "이 도구를 사용하여 건설, 철거 및 잔해에서 아이템을 수집하는 우선순위를 설정하십시오."
csCZ = "Použijte tento nástroj k nastavení priority pro stavbu, demolici a sběr předmětů z trosek."
viVN = "Sử dụng công cụ này để thiết lập mức ưu tiên cho việc xây dựng, phá dỡ và thu gom vật phẩm từ các Đống Đổ Nát."

["BuilderPriorityTool.Tip"]
status = "normal"
raw = "Nhấp vào một vật phẩm để đặt mức ưu tiên hoặc giữ nút để chọn một khu vực lớn hơn."
enUS = "Click on an item to set its priority or hold the button to select a larger area."
zhCN = "单击一个物品以设置优先级，或按住按钮以选择更大的区域。"
zhTW = "點擊一個物品以設置優先級，或按住按鈕以選擇一個更大的區域。"
ruRU = "Нажмите на предмет, чтобы установить приоритет, или удерживайте кнопку, чтобы выбрать большую область."
jaJP = "アイテムをクリックして優先度を設定するか、ボタンを押し続けてより大きな範囲を選択します。"
frFR = "Cliquer sur un élément pour définir le niveau de priorité ou maintenir le bouton enfoncé pour sélectionner une zone plus grande."
deDE = "Klicken Sie auf einen Gegenstand, um die Priorität festzulegen, oder halten Sie die Taste gedrückt, um ein größeres Gebiet auszuwählen."
plPL = "Kliknij na przedmiot, aby ustawić priorytet lub przytrzymaj przycisk, aby wybrać większy obszar."
ptBR = "Cliquе em um item para definir a prioridade ou mantenha pressionado para selecionar uma área maior."
koKR = "항목을 클릭하여 우선 순위를 설정하거나 버튼을 누르고 더 큰 영역을 선택하십시오."
csCZ = "Klikněte na položku pro nastavení priority nebo podržte klávesu pro výběr větší oblasti."
viVN = "Nhấp vào một vật phẩm để đặt mức ưu tiên hoặc giữ nút để chọn một khu vực lớn hơn."

["Building.AdvancedBreedingPod.Description"]
status = "normal"
raw = "Sử dụng quy trình tiên tiến để sinh sản Hải ly trưởng thành, sẵn sàng bắt tay vào công việc."
enUS = "Use advanced processes to breed adult beavers, ready to get to work."
zhCN = "使用先进的工艺繁殖成年海狸，随时准备开始工作。"
zhTW = "使用先進的過程來繁殖成年的海狸，隨時準備開始工作。"
ruRU = "Используйте продвинутый процесс для размножения взрослых бобров, готовых приступить к работе."
jaJP = "「先進的なプロセスを使用して成体ビーバーを繁殖させ、作業に取り掛かる準備を整えます。」"
frFR = "Utilisez un processus avancé pour élever des castors adultes, prêts à se mettre au travail."
deDE = "Verwenden Sie einen fortschrittlichen Prozess, um ausgewachsene Biber zu züchten, die bereit sind, mit der Arbeit zu beginnen."
plPL = "Użyj zaawansowanego procesu do hodowli dorosłych bobrów, gotowych do podjęcia pracy."
ptBR = "Use um processo avançado para reproduzir castores adultos, prontos para começar a trabalhar."
koKR = "성숙한 비버를 사육하기 위해 고급 과정을 사용하며, 작업을 시작할 준비가 되어 있습니다."
csCZ = "Použijte pokročilý proces k rozmnožování dospělých bobrů, připravených zahájit práci."
viVN = "Sử dụng quy trình tiên tiến để sinh sản Hải ly trưởng thành, sẵn sàng bắt tay vào công việc."

