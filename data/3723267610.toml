["NewGameConfigurationPanel.HardModeDescription"]
status = "normal"
raw = "Con người đã không sống sót, và hải ly cũng có nguy cơ tương tự.\n\nKhu định cư bắt đầu với tài nguyên khan hiếm.\n\nHạn Hán và Thủy Triều Đỏ khắc nghiệt, tình trạng còn tồi tệ hơn theo thời gian.\n\nHãy chuẩn bị kỹ càng."
enUS = "Humans did not survive, and beavers are at similar risk.\n\nThe settlement starts with scarce resources.\n\nDroughts and Red Tide are harsh, conditions worsen over time.\n\nPrepare carefully."
zhCN = "人类未能生存下来，海狸也面临着同样的危险。\n\n定居点开始时资源匮乏。\n\n干旱和红潮极为严酷，情况会随着时间的推移而恶化。\n\n请做好充分准备。"
zhTW = "人類未能存活，而海狸也面臨類似的危險。\n\n定居區開始時資源匱乏。\n\n乾旱和紅潮嚴酷，隨著時間的推移情況更加惡化。\n\n請做好充分準備。"
ruRU = "Люди не выжили, и бобры также под угрозой.\n\nПоселение начинается с дефицитом ресурсов.\n\nЗасуха и красная приливная волна свирепы, ситуация ухудшается с течением времени.\n\nГотовьтесь тщательно."
jaJP = "人類は生き延びることができず、ビーバーも同様の危険にさらされています。\n\n入植地は資源が乏しい状態から始まります。\n\n干ばつと赤潮が厳しく、状況は時間とともに悪化します。\n\nしっかりと準備をしてください。"
frFR = "Les humains n'ont pas survécu, et les castors sont également en grand danger.\n\nLa colonie commence avec des ressources rares.\n\nLa sécheresse et la marée rouge sont sévères, et la situation se détériore au fil du temps.\n\nPréparez-vous soigneusement."
deDE = "Die Menschen haben nicht überlebt, und die Biber sind ebenfalls in Gefahr.\n\nDie Siedlung beginnt mit knappen Ressourcen.\n\nDürre und Rote Flut sind extrem, die Situation verschlechtert sich mit der Zeit.\n\nSeid gut vorbereitet."
plPL = "Ludzie nie przetrwali, a bobry są również w podobnym niebezpieczeństwie.\n\nOsada zaczyna z ograniczonymi zasobami.\n\nSusze i Czerwona Fala są brutalne, a sytuacja pogarsza się z upływem czasu.\n\nPrzygotuj się starannie."
ptBR = "Os humanos não conseguiram sobreviver, e os castores correm o mesmo risco.\n\nA colônia começa com recursos escassos.\n\nSecas e Maré Vermelha severas, a situação piora com o tempo.\n\nPrepare-se bem."
koKR = "인간은 생존하지 못했으며, 비버 또한 비슷한 위험에 처해 있습니다.\n\n정착지는 자원이 부족한 상태로 시작합니다.\n\n극심한 가뭄과 적조현상이 나타나며, 상황은 시간이 지날수록 악화됩니다.\n\n철저히 준비하세요."
csCZ = "Lidé nepřežili a bobři jsou na tom podobně.\n\nOsídlení začíná s nedostatkem zdrojů.\n\nSucha a červené přílivy jsou kruté, situace se s časem dále zhoršuje.\n\nPřipravte se důkladně."
viVN = "Con người đã không sống sót, và hải ly cũng có nguy cơ tương tự.\n\nKhu định cư bắt đầu với tài nguyên khan hiếm.\n\nHạn Hán và Thủy Triều Đỏ khắc nghiệt, tình trạng còn tồi tệ hơn theo thời gian.\n\nHãy chuẩn bị kỹ càng."

