["MapMetadata.Diorama.Description"]
status = "normal"
raw = "Trước khi thầu được những khu định cư lớn, các thợ xây phải bắt đầu từ những dự án nhỏ như thế này."
enUS = "Before undertaking large settlements, builders must start with smaller projects like this."
zhCN = "在承包大型定居点之前，建筑工人必须从像这样的较小项目开始。"
zhTW = "在承包大型定居點之前，建築工人必須從這些小型項目開始。"
ruRU = "Прежде чем строить крупные поселения, строители должны начать с таких небольших проектов."
jaJP = "大規模な集落の建設を請け負う前に、建設者たちはこのような小さなプロジェクトから始めなければなりません。"
frFR = "Avant de construire de grandes colonies, les constructeurs doivent commencer par de petits projets comme celui-ci."
deDE = "Bevor die Bauunternehmer große Siedlungen in Angriff nehmen können, müssen sie mit kleinen Projekten wie diesem beginnen."
plPL = "Zanim budowniczowie przystąpią do dużych osiedli, muszą rozpocząć od małych projektów, takich jak ten."
ptBR = "Antes de construir grandes assentamentos, os construtores precisam começar com projetos menores como este."
koKR = "큰 정착지를 건설하기 전에, 건축가들은 이러한 작은 프로젝트부터 시작해야 합니다."
csCZ = "Předtím, než budou stavitelé schopni dostavět velké osady, musí začít s menšími projekty, jako je tento."
viVN = "Before contractors can take on larger settlements, the builders must start with smaller projects like this."

