["Tutorial.WorkingHours.SetWorkingHours"]
status = "normal"
raw = "Điều chỉnh giờ làm là một cách quản lý khu định cư.\n\nGiờ làm việc dài hơn giúp phát triển nhanh hơn. Nhưng hải ly cũng cần nghỉ ngơi mỗi ngày.\n\nTrước mắt, hãy tăng nhẹ giờ làm."
enUS = "Adjusting working hours is a way to manage the settlement.\n\nLonger working hours help to develop faster. But beavers also need to rest every day.\n\nFor now, slightly increase the working hours."
zhCN = "“调整工作时间是管理定居点的一种方式。\n\n更长的工作时间有助于更快发展。但海狸每天也需要休息。\n\n现在，轻微增加工作时间。”"
zhTW = "調整工作時數是管理定居點的一種方式。\n\n更長的工作時間有助於快速發展。但海狸每天也需要休息。\n\n目前，請輕微增加工作時數。"
ruRU = "Настройка рабочего времени — это способ управления поселением.\n\nДлинные рабочие часы способствуют более быстрому развитию. Но бобры также нуждаются в отдыхе каждый день.\n\nНа данный момент увеличьте рабочие часы немного."
jaJP = "労働時間を設定する - 新しいテキスト: \"労働時間の調整は、居住地を管理するための一つの方法です。\n\n長い労働時間はより速い発展を促します。しかし、ビーバーも毎日休息する必要があります。\n\nまずは、労働時間を少しだけ増やしましょう。\""
frFR = "Ajuster les heures de travail est une façon de gérer la colonie.\n\nDes heures de travail plus longues aident à se développer plus rapidement. Mais les castors ont aussi besoin de se reposer chaque jour.\n\nPour l'instant, augmentez légèrement les heures de travail."
deDE = "Die Anpassung der Arbeitszeiten ist eine Möglichkeit, die Siedlung zu verwalten.\n\nLängere Arbeitszeiten helfen, schneller voranzukommen. Aber die Biber brauchen auch jeden Tag ihre Ruhe.\n\nErhöhe vorerst die Arbeitszeiten leicht."
plPL = "Dostosowanie godzin pracy to sposób zarządzania osadą.\n\nDłuższe godziny pracy przyspieszają rozwój. Ale bobry również potrzebują odpoczynku każdego dnia.\n\nNa początek zwiększ nieznacznie godziny pracy."
ptBR = "Ajustar as horas de trabalho é uma forma de gerenciar a colônia.\n\nHorários de trabalho mais longos ajudam no desenvolvimento mais rápido. Mas os castores também precisam descansar todos os dias.\n\nPor ora, aumente um pouco as horas de trabalho."
koKR = "근무 시간을 조정하는 것은 정착촌을 관리하는 한 방법입니다.\n\n더 긴 근무 시간이 더 빠른 발전을 도와줍니다. 하지만 비버도 매일 휴식이 필요합니다.\n\n우선 근무 시간을 조금 늘려보세요."
csCZ = "Úprava pracovních hodin je způsob, jak spravovat osídlení.\n\nDelší pracovní doba pomáhá rychlejšímu rozvoji. Ale bobři potřebují také každý den odpočívat.\n\nNa začátek mírně zvyšte pracovní dobu."
viVN = "Điều chỉnh giờ làm là một cách quản lý khu định cư.\n\nGiờ làm việc dài hơn giúp phát triển nhanh hơn. Nhưng hải ly cũng cần nghỉ ngơi mỗi ngày.\n\nTrước mắt, hãy tăng nhẹ giờ làm."

