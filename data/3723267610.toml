["Tutorial.WaterAndFood.Farmhouse"]
status = "normal"
raw = "Về lâu dài, bạn cần nguồn thực phẩm bổ dưỡng hơn. Hãy xây Nông Trại để trồng và thu hoạch cây trồng.\n\nGiống như các cột cờ, Nông Trại có phạm vi hoạt động giới hạn.\n\nGợi ý: Nếu thiếu lao động, bạn có thể tạm dừng một số công trình khác bằng nút Tạm dừng (ở bảng điều khiển của công trình đó). "
enUS = "In the long run, you need a more nutritious food source. Build a Farmhouse to grow and harvest crops. \n\nLike flagpoles, the Farmhouse has a limited range of operation.\n\nTip: If you are short on labor, you can temporarily pause some other constructions using the Pause button (in the building's control panel)."
zhCN = "从长远来看，你需要更有营养的食物来源。建造农场以种植和收获作物。\n\n和旗杆一样，农场的活动范围有限。\n\n提示：如果劳动力不足，你可以通过该建筑的控制面板上的暂停按钮暂停其他一些建筑。"
zhTW = "長期來看，您需要更豐富的食物來源。請建造農場以種植和收穫作物。\n\n與旗杆類似，農場的運作範圍是有限的。\n\n提示：如果人力不足，您可以通過該建築面板上的暫停按鈕暫停其他一些建築。"
ruRU = "В долгосрочной перспективе вам нужен более питательный источник пищи. Постройте Ферму, чтобы выращивать и собирать урожай.\n\nКак и флажные столбы, Ферма имеет ограниченный радиус действия.\n\nСовет: Если не хватает рабочих, вы можете временно приостановить некоторые другие постройки, нажав кнопку Приостановить (на панели управления этой постройки)."
jaJP = "長期的には、より栄養価の高い食料源が必要です。農場を建設して作物を栽培し、収穫してください。\n\n旗の柱のように、農場には限られた範囲があります。\n\nヒント：労働者が不足している場合は、その建物のコントロールパネルにある一時停止ボタンを使って、他のいくつかの作業を一時停止することができます。"
frFR = "À long terme, vous aurez besoin d'une source de nourriture plus nutritive. Construisez une Ferme pour cultiver et récolter des cultures.\n\nComme les poteaux de signalisation, la Ferme a une portée d'opération limitée.\n\nConseil : Si vous manquez de main-d'œuvre, vous pouvez suspendre temporairement certains autres bâtiments avec le bouton Suspendre (dans le panneau de contrôle de ce bâtiment)."
deDE = "Auf lange Sicht benötigen Sie eine nährstoffreichere Nahrungsquelle. Bauen Sie eine Farm, um Pflanzen anzubauen und zu ernten.\n\nWie bei Fahnenmasten hat die Farm einen begrenzten Aktionsradius.\n\nTipp: Wenn Ihnen die Arbeiter ausgehen, können Sie einige andere Bauprojekte mit der Taste Pause (im Bedienfeld dieses Gebäudes) vorübergehend anhalten."
plPL = "W dłuższej perspektywie potrzebujesz bardziej pożywnego źródła żywności. Zbuduj farmę, aby uprawiać i zbierać plony.\n\nPodobnie jak maszty flagowe, farma ma ograniczony zasięg działania.\n\nWskazówka: Jeśli brakuje pracowników, możesz tymczasowo wstrzymać niektóre inne budowy za pomocą przycisku Wstrzymaj (na panelu kontrolnym danej budowli)."
ptBR = "A longo prazo, você precisa de uma fonte de alimento mais nutritiva. Construa uma Fazenda para plantar e colher culturas.\n\nAssim como os postes de bandeira, a Fazenda tem um alcance limitado.\n\nDica: Se estiver com falta de trabalho, você pode pausar algumas outras construções usando o botão Pausar (no painel da construção)."
koKR = "장기적으로 볼 때, 더 영양가 있는 식량 공급원이 필요합니다. 농장을 건설하여 농작물을 재배하고 수확하세요.\n\n깃발 기둥처럼 농장은 제한된 작동 범위를 가지고 있습니다.\n\n팁: 노동력이 부족하다면, 해당 건물의 패널에 있는 일시 정지 버튼을 사용하여 다른 건설을 잠시 중단할 수 있습니다."
csCZ = "Z dlouhodobého hlediska potřebujete výživnější zdroj potravy. Postavte Farmu pro pěstování a sklizeň plodin.\n\nStejně jako vlajkové sloupy má Farma omezený dosah.\n\nTip: Pokud vám chybí pracovní síla, můžete dočasně pozastavit některé jiné stavby pomocí tlačítka Pozastavit (na ovládacím panelu dané stavby)."
viVN = "Về lâu dài, bạn cần nguồn thực phẩm bổ dưỡng hơn. Hãy xây Nông Trại để trồng và thu hoạch cây trồng.\n\nGiống như các cột cờ, Nông Trại có phạm vi hoạt động giới hạn.\n\nGợi ý: Nếu thiếu lao động, bạn có thể tạm dừng một số công trình khác bằng nút Tạm dừng (ở bảng điều khiển của công trình đó)."

["Tutorial.WaterAndFood.Gatherer"]
status = "normal"
raw = "Ngoài nước, hải ly còn cần thức ăn.\n\nNhân viên hái lượm sẽ tự động thu hoạch Việt Quất trong phạm vi của Cột Thu Hoạch. Bạn có thể xem phạm vi khi đặt cột.\n\nHãy xây một Cột Thu Hoạch gần các bụi Việt Quất."
enUS = "Besides water, beavers also need food. \n\nThe gatherer will automatically harvest blueberries within the range of the Gatherer Post. You can see the range when placing the post.\n\nBuild a Gatherer Post near the blueberry bushes."
zhCN = "除了水，海狸还需要食物。\n\n采集员将会自动在采集柱的范围内收集蓝莓。你可以在放置采集柱时查看范围。\n\n请在蓝莓灌木附近建造一根采集柱。"
zhTW = "除了水，海狸還需要食物。\n\n採集員將自動在收集柱的範圍內收穫藍莓。您可以在放置柱子時查看範圍。\n\n請建造一根收集柱靠近藍莓叢。"
ruRU = "Помимо воды, бобрам также нужна еда.\n\nСотрудники сбора будут автоматически собирать чернику в пределах радиуса Сборной Столба. Вы можете увидеть радиус при установке столба.\n\nПостройте Сборный Столб рядом с кустами черники."
jaJP = "水と食べ物の新しいテキストを翻訳する - ビーバーは水の他に食べ物も必要です。\n\n収集者は収穫柱の範囲内で自動的にブルーベリーを収穫します。柱を設置すると範囲を見ることができます。\n\nブルーベリーの茂みの近くに収穫柱を建設してください。"
frFR = "En plus de l'eau, les castors ont besoin de nourriture.\n\nLe collecteur moissonnera automatiquement les myrtilles dans le rayon du Poteau de Récolte. Vous pouvez voir la portée lors de la placement du poteau.\n\nConstruisez un Poteau de Récolte près des buissons de myrtilles."
deDE = "Neben Wasser benötigt der Biber auch Nahrung.\n\nDer Sammler wird automatisch Heidelbeeren im Bereich der Ernte-Säule sammeln. Sie können den Bereich sehen, wenn Sie die Säule platzieren.\n\nBauen Sie eine Ernte-Säule in der Nähe der Heidelbeersträucher."
plPL = "Poza wodą, bobry potrzebują również jedzenia.\n\nPracownik zbierający automatycznie zbiera borówki w zasięgu Kolumny Zbioru. Możesz zobaczyć zasięg przy stawianiu kolumny.\n\nZbuduj Kolumnę Zbioru w pobliżu krzaków borówek."
ptBR = "Além da água, os castores também precisam de comida.\n\nOs trabalhadores coletadores irão automaticamente colher mirtilos na área de alcance do Ponto de Coleta. Você pode ver a área de alcance ao colocar o ponto.\n\nConstrua um Ponto de Coleta perto dos arbustos de mirtilo."
koKR = "물 외에도 비버는 음식이 필요합니다.\n\n수확 작업자는 수확 기둥의 범위 내에서 자주색 블루베리를 자동으로 수확합니다. 기둥을 배치할 때 범위를 확인할 수 있습니다.\n\n블루베리 덤불 근처에 수확 기둥을 세우세요."
csCZ = "Kromě vody potřebují bobři také potravu.\n\nZaměstnanec sběrač se automaticky postará o sklizeň borůvek v dosahu sklizňového sloupu. Dosah si můžete prohlédnout při umístění sloupu.\n\nPostavte sklizňový sloup blízko ke keřům borůvek."
viVN = "Ngoài nước, hải ly còn cần thức ăn.\n\nNhân viên hái lượm sẽ tự động thu hoạch Việt Quất trong phạm vi của Cột Thu Hoạch. Bạn có thể xem phạm vi khi đặt cột.\n\nHãy xây một Cột Thu Hoạch gần các bụi Việt Quất."

["Tutorial.WaterAndFood.MarkCarrots"]
status = "normal"
raw = "Nông dân sẽ không bắt đầu làm việc cho đến khi bạn chỉ định trồng gì và ở đâu.\n\nDùng công cụ Làm Nông để tạo ruộng Cà Rốt.\n\nCây trồng cần có đất tươi tốt (màu xanh). Nếu không, chúng sẽ khô và chết."
enUS = "Farmers will not start working until you designate what and where to plant.\n\nUse the Farming tool to create a Carrot field.\n\nCrops need fertile soil (green) to grow. Otherwise, they will dry out and die."
zhCN = "农民在你指派种植什么和在哪里之前不会开始工作。\n\n使用农业工具创建胡萝卜田。\n\n作物需要肥沃的土地（绿色）。如果没有，它们会干枯并死亡。"
zhTW = "農民在您指定種植什麼和在哪裡之前不會開始工作。\n\n使用農業工具來創建胡蘿蔔田。\n\n作物需要肥沃的土地（綠色）。如果沒有，它們將會枯萎並死亡。"
ruRU = "Фермеры не начнут работать, пока вы не укажете, что и где сажать.\n\nИспользуйте инструмент Земледелия, чтобы создать поле для Моркови.\n\nКультуры нуждаются в плодородной земле (зеленого цвета). В противном случае они высохнут и погибнут."
jaJP = "農民は、何をどこに植えるかを指定するまで作業を始めません。\n\n農業ツールを使ってニンジンの畑を作成してください。\n\n作物は肥沃な土地（緑色）が必要です。そうでなければ、枯れて死んでしまいます。"
frFR = "Les agriculteurs ne commenceront pas à travailler tant que vous n'avez pas désigné quoi et où planter.\n\nUtilisez l'outil Agriculture pour créer des champs de Carottes.\n\nLes cultures ont besoin de terre fertile (verte). Sinon, elles se dessècheront et mourront."
deDE = "Die Bauern beginnen nicht mit der Arbeit, bis Sie angeben, was sie pflanzen sollen und wo.\n\nVerwenden Sie das Landwirtschaftswerkzeug, um Karottenfelder anzulegen.\n\nPflanzen benötigen fruchtbaren Boden (grün). Andernfalls trocknen sie aus und sterben."
plPL = "Rolnicy nie zaczną pracować, dopóki nie wskażesz, co i gdzie mają sadzić.\n\nUżyj narzędzia Rolnictwo, aby utworzyć pole Marchewek.\n\nRośliny potrzebują żyznej ziemi (zielonej). W przeciwnym razie wyschną i umrą."
ptBR = "Os fazendeiros não começarão a trabalhar até que você indique o que plantar e onde.\n\nUse a ferramenta Agricultura para criar um campo de Cenouras.\n\nAs plantações precisam de solo fértil (verde). Caso contrário, elas vão secar e morrer."
koKR = "농부는 당신이 무엇을 어디에 심을지 지정할 때까지 작업을 시작하지 않습니다.\n\n농업 도구를 사용하여 당근 밭을 만드세요.\n\n작물이 잘 자란 토양(녹색)이 필요합니다. 그렇지 않으면 마르고 죽게 됩니다."
csCZ = "Farmáři nezačnou pracovat, dokud neurčíte, co a kde mají pěstovat.\n\nPoužijte nástroj Zemědělství k vytvoření pole pro mrkev.\n\nPlodiny potřebují úrodnou půdu (zelenou). Jinak uschnou a uhynou."
viVN = "Nông dân sẽ không bắt đầu làm việc cho đến khi bạn chỉ định trồng gì và ở đâu.\n\nDùng công cụ Làm Nông để tạo ruộng Cà Rốt.\n\nCây trồng cần có đất tươi tốt (màu xanh). Nếu không, chúng sẽ khô và chết."

["Tutorial.WaterAndFood.WaterPump"]
status = "normal"
raw = "Hải ly cần nước để sống.\n\nHãy xây Máy Bơm Nước để đảm bảo nguồn nước uống liên tục. Đừng quên nối với Trung Tâm Khu Vực."
enUS = "Beavers need water to survive.\n\nBuild a Water Pump to ensure a continuous drinking water supply. Don't forget to connect it to the District Center."
zhCN = "海狸需要水来生存。\n\n请建造水泵以确保持续的饮用水供应。别忘了连接到区域中心。"
zhTW = "海狸需要水才能生存。\n\n請建造水泵以確保不斷的飲用水來源。別忘了連接到區域中心。"
ruRU = "Бобрам нужна вода для жизни.\n\nПостройте Водяной насос, чтобы обеспечить бесперебойный источник питьевой воды. Не забудьте подключить его к Центральному узлу."
jaJP = "ビーバーは生きるために水が必要です。\n\n水源を継続的に確保するために、水ポンプを建設してください。地域センターに接続するのを忘れないでください。"
frFR = "Les castors ont besoin d'eau pour vivre.\n\nConstruisez une Pompe à Eau pour garantir une source d'eau potable continue. N'oubliez pas de la connecter au Centre de Secteur."
deDE = "Der Biber benötigt Wasser zum Überleben.\n\nBauen Sie eine Wasserpumpe, um eine kontinuierliche Trinkwasserversorgung sicherzustellen. Vergessen Sie nicht, diese mit dem Bezirkszentrum zu verbinden."
plPL = "Bóbr potrzebuje wody, aby żyć.\n\nZbuduj Wodną Pompy, aby zapewnić ciągły dostęp do wody pitnej. Nie zapomnij połączyć z Centrum Obszaru."
ptBR = "Os castores precisam de água para viver.\n\nConstrua a Bomba d'Água para garantir um suprimento contínuo de água potável. Não se esqueça de conectar ao Centro da Área."
koKR = "비버는 생존을 위해 물이 필요합니다.\n\n연속적인 음용수 공급을 보장하기 위해 물 펌프를 건설하세요. 지역 센터와 연결하는 것을 잊지 마세요."
csCZ = "Bobři potřebují vodu k životu.\n\nPostavte Vodní Čerpadlo, abyste zajistili nepřetržitý zdroj pitné vody. Nezapomeňte ho připojit k Centru oblasti."
viVN = "Hải ly cần nước để sống.\n\nHãy xây Máy Bơm Nước để đảm bảo nguồn nước uống liên tục. Đừng quên nối với Trung Tâm Khu Vực."

