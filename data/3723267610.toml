["Building.EfficientFarmhouse.FlavorDescription"]
status = "normal"
raw = "Hiệu suất phụ thuộc vào chính sách “không ăn trong giờ làm”."
enUS = "Efficiency depends on the 'no eating during work hours' policy."
zhCN = "效率取决于“不在工作时间用餐”的政策。"
zhTW = "效率取決於「工作期間不進食」的政策。"
ruRU = "Эффективность зависит от политики «не есть во время работы»."
jaJP = "労働時間中は食事を取りませんという方針に依存しています。"
frFR = "L'efficacité dépend de la politique de « ne pas manger pendant les heures de travail »."
deDE = "Die Effizienz hängt von der Politik „nicht während der Arbeitszeit essen“ ab."
plPL = "Wydajność zależy od polityki „nie jedz podczas pracy”."
ptBR = "A eficiência depende da política de 'não comer durante o horário de trabalho'."
koKR = "효율성은 '근무 시간 동안 식사하지 않기' 정책에 따라 달라집니다."
csCZ = "Výkon závisí na politice „nejíst během pracovní doby“."
viVN = "Hiệu suất phụ thuộc vào chính sách “không ăn trong giờ làm”."

["Building.EfficientMine.Description"]
status = "normal"
raw = "Tuyển thợ mỏ khai thác phế liệu từ Tàn Tích Ngầm. Thiết kế cải tiến giúp tối đa tốc độ khai thác."
enUS = "Recruit miners to extract scrap from the Ruined Depths. Enhanced design maximizes extraction speed."
zhCN = "招募矿工从地下遗迹中提取废料。改良设计最大化采矿速度。"
zhTW = "招募礦工從遺跡中提煉廢料。改進的設計使開採速度達到最佳。"
ruRU = "Нанимайте шахтеров для добычи мусора из Подземных Остатков. Усовершенствованный дизайн позволяет максимизировать скорость добычи."
jaJP = "廃棄物を地下遺跡から採掘する鉱夫を募集します。改良されたデザインにより、採掘速度が最大化されます。"
frFR = "Embauche des mineurs pour extraire des déchets des Décombres Souterrains. Un design amélioré maximise la vitesse d'extraction."
deDE = "Rekrutiert Bergleute, um Schrott aus den Untergangsruinen abzubauen. Das verbesserte Design maximiert die Abbaurate."
plPL = "Zatrudnia górników do wydobycia złomu z Podziemnych Ruin. Udoskonalona konstrukcja zwiększa prędkość wydobycia."
ptBR = "Recruta mineiros para extrair sucata dos Destros Subterrâneos. Design aprimorado para maximizar a velocidade de extração."
koKR = "잔해로부터 고철을 채굴하기 위해 광부를 고용하세요. 개선된 설계로 채굴 속도를 극대화합니다."
csCZ = "Najměte horníky k těžbě odpadu z Podzemních Zbytků. Vylepšený design zvyšuje rychlost těžby."
viVN = "Tuyển thợ mỏ khai thác phế liệu từ Tàn Tích Ngầm. Thiết kế cải tiến giúp tối đa tốc độ khai thác."

