["MapMetadata.Waterfalls.Description"]
status = "normal"
raw = "Mẹo dạy hải ly con: bảo chúng rằng thác nước chỉ là “cống xả khổng lồ”.\nVà rồi lũ nhỏ sẽ mất hàng tuần để đi tìm chiếc cần gạt trong tưởng tượng."
enUS = "Tip for teaching a young beaver: tell them that waterfalls are just 'giant outflow pipes.'  \nAnd then the little ones will spend weeks searching for the lever in their imagination."
zhCN = "教导小海狸的技巧：告诉它们瀑布只是一个“大型排水口”。然后小家伙们会花上好几周的时间去寻找想象中的杠杆。"
zhTW = "教小海狸的技巧：告訴牠們瀑布只是「巨大的排水口」。然後小海狸們會花上幾週的時間去尋找想像中的拉桿。"
ruRU = "Совет для обучения детенышей бобра: скажите им, что водопад - это просто «огромный слив». И затем малышам потребуется недели, чтобы вообразить, где взять рычаг."
jaJP = "ビーバーの子供へのヒント：滝はただの「巨大な排水口」と教えてあげてください。そうすれば、小さなビーバーたちは想像の中でレバーを探すのに何週間もかかるでしょう。"
frFR = "Conseil pour éduquer un castor : dites-lui que la cascade n'est qu'un « énorme égout ».\nEt les petits mettront des semaines à chercher le levier dans leur imagination."
deDE = "„Tip, um einem kleinen Biber zu helfen: Sag ihm, dass der Wasserfall einfach ein „riesiges Abflussrohr“ ist. \nDann wird das Kleine wochenlang damit beschäftigt sein, den imaginären Hebel zu suchen.“"
plPL = "Wskazówka dla młodych bobrów: powiedz im, że wodospady to tylko „gigantyczne odpływy”.\nA wtedy maluchy spędzą tygodnie szukając wyimaginowanej dźwigni."
ptBR = "Dica para ensinar os filhotes de castor: diga a eles que a cachoeira é apenas um 'esgoto gigante'. E então os pequenos levarão semanas para encontrar a alavanca na imaginação."
koKR = "아기 비버에게 가르치는 팁: 폭포는 '거대한 배수구'라고 알려주세요. \n그럼 작은 비버들은 상상 속에서 레버를 찾느라 몇 주가 걸릴 것입니다."
csCZ = "Tip pro učení mladých bobrů: řekněte jim, že vodopád je jen 'obrovský odpadní otvor'. A pak malí budou týdny hledat imaginární páku."
viVN = "Mẹo dạy hải ly con: bảo chúng rằng thác nước chỉ là “cống xả khổng lồ”. Và rồi lũ nhỏ sẽ mất hàng tuần để đi tìm chiếc cần gạt trong tưởng tượng."

