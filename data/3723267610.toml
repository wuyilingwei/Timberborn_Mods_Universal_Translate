["Tutorial.Storage.Warehouses"]
new = "Cuối cùng, hãy chuẩn bị kho chứa Việt Quất, và sẵn sàng cho vụ thu hoạch Cà Rốt sắp tới.\n\nThực phẩm, cũng như nhiều loại hàng hóa đóng hộp khác - cần được lưu trữ trong Nhà Kho."
