["MapSelection.SemiCompatibleMapVersion"]
status = "normal"
raw = "Phiên bản bản đồ ({0}) không tương thích với phiên bản game hiện tại ({1}). Khởi chạy bản đồ này có thể gây crash, phát sinh lỗi nghiêm trọng và thiếu một số tài nguyên quan trọng. Chúng tôi khuyến nghị cập nhật bản đồ để trải nghiệm đầy đủ tính năng mới.\n\nBạn có chắc muốn bắt đầu game?"
enUS = "Map version ({0}) is not compatible with the current game version ({1}). Running this map may cause crashes, result in serious errors, and miss some important resources. We recommend updating the map for a full experience of the new features.\n\nAre you sure you want to start the game?"
zhCN = "地图版本 ({0}) 与当前游戏版本 ({1}) 不兼容。运行此地图可能导致崩溃、产生严重错误以及缺少一些重要资源。我们建议更新地图以完全体验新功能。\n\n您确定要开始游戏吗？"
zhTW = "地圖版本 ({0}) 與當前遊戲版本 ({1}) 不相容。啟動此地圖可能會導致崩潰、產生嚴重錯誤以及缺少某些重要資源。我們建議更新地圖以充分體驗新功能。\n\n您確定要開始遊戲嗎？"
ruRU = "Версия карты ({0}) несовместима с текущей версией игры ({1}). Запуск этой карты может привести к сбоям, возникновению серьезных ошибок и отсутствию некоторых важных ресурсов. Мы рекомендуем обновить карту, чтобы полностью насладиться новыми функциями.\n\nВы уверены, что хотите начать игру?"
jaJP = "地図バージョン ({0}) は現在のゲームバージョン ({1}) と互換性がありません。この地図を起動すると、クラッシュする可能性があり、重大なエラーが発生し、一部の重要なリソースが不足する可能性があります。新機能を完全に体験するために、地図を更新することをお勧めします。\n\nゲームを開始してもよろしいですか？"
frFR = "La version de la carte ({0}) n'est pas compatible avec la version actuelle du jeu ({1}). Lancer cette carte peut provoquer des crashs, générer des erreurs critiques et manquer certaines ressources essentielles. Nous vous recommandons de mettre à jour la carte pour profiter pleinement des nouvelles fonctionnalités.\n\nÊtes-vous sûr de vouloir commencer le jeu ?"
deDE = "Kartenversion ({0}) ist nicht mit der aktuellen Spielversion ({1}) kompatibel. Das Starten dieser Karte kann zu Abstürzen, schwerwiegenden Fehlern und dem Fehlen wichtiger Ressourcen führen. Wir empfehlen, die Karte zu aktualisieren, um das volle Erlebnis neuer Funktionen zu erhalten.\n\nSind Sie sicher, dass Sie das Spiel starten möchten?"
plPL = "Niezgodna wersja mapy ({0}) z obecną wersją gry ({1}). Uruchomienie tej mapy może spowodować awarię, krytyczne błędy oraz brak niektórych ważnych zasobów. Zalecamy zaktualizowanie mapy, aby w pełni cieszyć się nowymi funkcjami.\n\nCzy na pewno chcesz rozpocząć grę?"
ptBR = "A versão do mapa ({0}) não é compatível com a versão atual do jogo ({1}). Executar este mapa pode causar falhas, gerar erros graves e faltar alguns recursos importantes. Recomendamos atualizar o mapa para uma experiência completa com os novos recursos.\n\nVocê tem certeza de que deseja iniciar o jogo?"
koKR = "지도 버전 ({0})가 현재 게임 버전 ({1})과 호환되지 않습니다. 이 지도를 실행하면 충돌이 발생하거나 심각한 오류가 발생할 수 있으며 중요한 리소스가 누락될 수 있습니다. 새로운 기능을 완전히 경험하려면 지도를 업데이트하는 것이 좋습니다.\n\n정말로 게임을 시작하시겠습니까?"
csCZ = "Název mapy ({0}) není kompatibilní s aktuální verzí hry ({1}). Spuštění této mapy může způsobit pád, vážné chyby a nedostatek některých důležitých zdrojů. Doporučujeme aktualizovat mapu, abyste mohli plně využít nové funkce.\n\nOpravdu chcete začít hru?"
viVN = "Phiên bản bản đồ ({0}) không tương thích với phiên bản game hiện tại ({1}). Khởi chạy bản đồ này có thể gây crash, phát sinh lỗi nghiêm trọng và thiếu một số tài nguyên quan trọng. Chúng tôi khuyến nghị cập nhật bản đồ để trải nghiệm đầy đủ tính năng mới.\n\nBạn có chắc muốn bắt đầu game?"

