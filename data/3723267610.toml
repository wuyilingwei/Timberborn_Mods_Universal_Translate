["Building.DecontaminationPod.FlavorDescription"]
status = "normal"
raw = "“Không đâu Suli, cháu không được uống Tinh Chất. Hồi nhỏ cháu đã ngã vào vạc rồi mà!” —Ma' Ngonel"
enUS = "“Not at all, Suli, you cannot drink the Essence. You fell into the vat when you were little!” —Ma' Ngonel"
zhCN = "“没错，苏利，你不能喝精华。你小时候已经掉进锅里了！” — 马・纳戈内尔"
zhTW = "“不是的，Suli，你不能喝精华。你小时候已经掉进锅里了！” —Ma' Ngonel"
