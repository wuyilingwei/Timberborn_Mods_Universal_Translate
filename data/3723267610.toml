["Building.LumberjackFlag.FlavorDescription"]
status = "normal"
raw = "“Họ là tiều phu, và đúng là như thế — ngủ cả đêm, làm cả ngày!” —Bài hát hải ly nổi tiếng"
enUS = "\"They are lumberjacks, and that’s just how it is — sleeping all night, working all day!\" —A famous beaver song"
zhCN = "“他们是伐木工，确实如此——整夜睡觉，整天工作！” —著名的海狸歌曲"
zhTW = "「他們是樵夫，的確如此——整晚睡覺，白天工作！」——著名的海狸歌曲"
ruRU = "„Они плотники, и это так — спят всю ночь, работают весь день!” — Известная песня бобров"
jaJP = "「彼らは材木屋で、それは本当にそうです—夜を通して寝て、昼間働く！」—有名なビーバーの歌"
frFR = "« Ils sont bûcherons, et c'est vrai — ils dorment toute la nuit, travaillent toute la journée ! » — Chanson célèbre des castors"
deDE = "„Sie sind Holzfäller, und das stimmt — schlafen die ganze Nacht, arbeiten den ganzen Tag!“ —Das berühmte Biberlied"
plPL = "„Są drwalami i rzeczywiście tak jest — śpią całą noc, pracują cały dzień!” — Słynna piosenka bobra"
ptBR = "“Eles são madeireiros, e é verdade — dormem a noite toda, trabalham o dia todo!” —Canção famosa do castor"
koKR = "\"그들은 나무꾼이며, 맞습니다 — 밤새 잠자고, 낮에 일합니다!\" — 유명한 비버 노래"
csCZ = "„Jsou to dřevorubci, a to je pravda — spí celou noc, pracují celý den!“ —Slavná píseň bobra"
viVN = "“ họ là tiều phu, và đúng là như thế — ngủ cả đêm, làm cả ngày!” —Bài hát hải ly nổi tiếng"

["Building.MechanicalFluidPump.Description"]
status = "normal"
