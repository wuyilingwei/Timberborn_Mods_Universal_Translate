enUS = "A way to measure the depth, flow intensity, and pollution level of water in a classic manner."
zhCN = "一种经典的水深、流速和水污染程度的测量方式。"
zhTW = "一種以傳統方式測量水的深度、流量強度和污染水平的方法。"
