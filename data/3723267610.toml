["Tutorial.LayerTool.ChangeUsingUI"]
new = "Khi khu định cư có thêm nhiều công trình cao tầng, có thể bạn sẽ gặp khó khăn khi tương tác với chúng.\n\nCông cụ Lớp sẽ hỗ trợ bằng cách ẩn đi mọi thứ phía trên lớp đã chọn.\n\nHãy thay đổi lớp hiển thị bằng các nút được đánh dấu."
