["NaturalResource.Carrot.FlavorDescription"]
status = "normal"
raw = "Cà rốt sống giúp hải ly cân bằng chế độ ăn mà vẫn giữ được niềm vui khi nhai giòn giòn."
enUS = "Raw carrots help beavers balance their diet while keeping the joy of a crunchy chew."
zhCN = "生胡萝卜帮助海狸平衡饮食，同时保持咀嚼时的愉悦感。"
zhTW = "生胡蘿蔔幫助海狸平衡飲食，同時保持咀嚼脆脆的樂趣。"
ruRU = "Сырые моркови помогают бобрам сбалансировать рацион, оставаясь при этом довольными хрустом."
jaJP = "生のニンジンはビーバーが食事をバランスよく保ちながら、カリカリとした噛みごたえの楽しさを維持するのに役立ちます。"
frFR = "Les carottes crues aident les castors à équilibrer leur régime alimentaire tout en gardant le plaisir de croquer."
deDE = "Rohkarotten helfen den Bibern, ihre Ernährung auszugleichen und dabei die Freude am knackigen Kauen zu bewahren."
plPL = "Surowa marchewka pomaga bobrom zbalansować dietę, jednocześnie zachowując radość z chrupania."
ptBR = "Cenouras cruas ajudam os castores a equilibrar sua dieta enquanto mantêm a alegria de mastigar crocante."
koKR = "생당근은 비버가 식단을 균형 있게 유지하면서 아삭아삭한 식감을 즐길 수 있도록 도와줍니다."
csCZ = "Čerstvá mrkev pomáhá bobrům vyvážit jídelníček a zároveň si užít křupavou chuť."
viVN = "Cà rốt sống giúp hải ly cân bằng chế độ ăn mà vẫn giữ được niềm vui khi nhai giòn giòn."

