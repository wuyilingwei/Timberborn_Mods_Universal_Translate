["AnalyticsConsent.Info"]
status = "normal"
raw = "Hãy giúp chúng tôi phát triển trò chơi dựa trên dữ liệu về cách mà bạn chơi Timberborn.\n\nNếu bạn đồng ý, chúng tôi sẽ tự động thu thập các thông tin liên quan đến lối chơi của bạn trong các phiên chơi game.\n\nBất kỳ lúc nào, bạn có thể đi tới phần Cài đặt để thu hồi sự đồng ý và xóa dữ liệu của bạn. Để biết thêm thông tin, hãy tham khảo <link><u>privacy policy</u></link>.\n\nXin cảm ơn!"
enUS = "Help us improve the game based on data about how you play Timberborn.\n\nIf you agree, we will automatically collect information related to your gameplay during gaming sessions.\n\nAt any time, you can go to the Settings section to withdraw your consent and delete your data. For more information, please refer to the <link><u>privacy policy</u></link>.\n\nThank you!"
zhCN = "请帮助我们根据您在 Timberborn 中的游戏方式发展游戏。\n\n如果您同意，我们将自动收集与您的游戏会话相关的信息。\n\n您可以随时前往设置部分撤回同意并删除您的数据。有关更多信息，请参考 <link><u>隐私政策</u></link>。\n\n感谢您的支持！"
zhTW = "請幫助我們根據您在《Timberborn》中遊玩的方式來發展遊戲。\n\n如果您同意，我們將自動收集與您遊玩過程相關的信息。\n\n隨時可以前往設置部分撤回您的同意並刪除您的數據。欲了解更多信息，請參考 <link><u>隱私政策</u></link>。\n\n謝謝！"
ruRU = "Помогите нам развивать игру на основе данных о том, как вы играете в Timberborn.\n\nЕсли вы согласны, мы автоматически будем собирать информацию, связанную с вашим игровым процессом в сеансах игры.\n\nВ любой момент вы можете перейти в раздел Настройки, чтобы отозвать согласие и удалить ваши данные. Для получения дополнительной информации ознакомьтесь с <link><u>политикой конфиденциальности</u></link>.\n\nСпасибо!"
jaJP = "ゲームプレイに関するデータに基づいて、私たちがTimberbornを発展させる手助けをしてください。\n\n同意いただければ、ゲームプレイセッション中のあなたのプレイスタイルに関する情報を自動的に収集します。\n\nいつでも設定に移動し、同意を撤回しデータを削除することができます。詳細については、<link><u>プライバシーポリシー</u></link>をご覧ください。\n\nありがとうございます！"
frFR = "Aidez-nous à développer le jeu en fonction des données de votre expérience de jeu dans Timberborn.\n\nSi vous êtes d'accord, nous collecterons automatiquement des informations liées à votre gameplay pendant vos sessions de jeu.\n\nÀ tout moment, vous pouvez vous rendre dans les paramètres pour retirer votre consentement et supprimer vos données. Pour plus d'informations, veuillez consulter <link><u>la politique de confidentialité</u></link>.\n\nMerci !"
deDE = "Bitte helfen Sie uns, das Spiel auf der Grundlage von Daten darüber, wie Sie Timberborn spielen, weiterzuentwickeln.\n\nWenn Sie zustimmen, werden wir automatisch Informationen zu Ihrem Spielverhalten in Spielsitzungen sammeln.\n\nSie können jederzeit zu den Einstellungen gehen, um Ihre Zustimmung zu widerrufen und Ihre Daten zu löschen. Für weitere Informationen konsultieren Sie bitte <link><u>die Datenschutzerklärung</u></link>.\n\nVielen Dank!"
plPL = "Pomóż nam rozwijać grę na podstawie danych dotyczących tego, jak grasz w Timberborn.\n\nJeśli wyrazisz zgodę, automatycznie zbierzemy informacje związane z Twoim stylem gry w trakcie sesji.\n\nW każdej chwili możesz przejść do sekcji Ustawienia, aby wycofać zgodę i usunąć swoje dane. Aby uzyskać więcej informacji, zapoznaj się z <link><u>polityką prywatności</u></link>.\n\nDziękujemy!"
ptBR = "Ajude-nos a desenvolver o jogo com base em dados sobre como você joga Timberborn.\n\nSe você concordar, coletaremos automaticamente informações relacionadas ao seu estilo de jogo durante as sessões de jogo.\n\nA qualquer momento, você pode ir até a seção de Configurações para revogar seu consentimento e excluir seus dados. Para mais informações, consulte <link><u>política de privacidade</u></link>.\n\nObrigado!"
koKR = "게임을 당신의 플레이 방식에 대한 데이터로 기반하여 발전시킬 수 있도록 도와주시기 바랍니다.\n\n동의하신다면, 게임 세션 중에 귀하의 플레이 스타일과 관련된 정보를 자동으로 수집하게 됩니다.\n\n언제든지 설정으로 이동하여 동의를 철회하고 귀하의 데이터를 삭제할 수 있습니다. 추가 정보는 <link><u>개인정보 보호정책</u></link>을 참조하시기 바랍니다.\n\n감사합니다!"
csCZ = "Pomozte nám vyvíjet hru na základě dat o tom, jak hrajete Timberborn.\n\nPokud souhlasíte, automaticky shromáždíme informace týkající se vašeho herního stylu během herních sezení.\n\nKdykoli můžete přejít do sekce Nastavení a zpět odvolat svůj souhlas a smazat svá data. Pro více informací se prosím podívejte na <link><u>zásady ochrany osobních údajů</u></link>.\n\nDěkujeme!"
viVN = "Hãy giúp chúng tôi phát triển trò chơi dựa trên dữ liệu về cách mà bạn chơi Timberborn.\n\nNếu bạn đồng ý, chúng tôi sẽ tự động thu thập các thông tin liên quan đến lối chơi của bạn trong các phiên chơi game.\n\nBất kỳ lúc nào, bạn có thể đi tới phần Cài đặt để thu hồi sự đồng ý và xóa dữ liệu của bạn. Để biết thêm thông tin, hãy tham khảo <link><u>chính sách bảo mật</u></link>.\n\nXin cảm ơn!"

