["Building.AdvancedBreedingPod.FlavorDescription"]
status = "normal"
raw = "Ý tưởng này xuất hiện khi một chú hải ly con rơi vào chiếc vạc đầy Tinh Chất và tăng trưởng đột biến."
enUS = "This idea came about when a young beaver fell into a vat full of Essence and underwent a mutation."
zhCN = "这个想法出现在一只小海狸掉进了装满精华的锅中并发生突变的时候。"
zhTW = "這個想法出現於一隻小海狸掉進了滿是精華的鍋中並發生突變。"
ruRU = "Эта идея появилась, когда один маленький бобер упал в чан с Эссенцией и начал мутировать."
jaJP = "「このアイデアは、子バイソンがエッセンスの入った釜に落ち、突然変異を遂げるときに現れます。」"
frFR = "L'idée est apparue lorsqu'un jeune castor est tombé dans un chaudron plein d'Essence et a subi une mutation."
deDE = "Idee entstand, als ein junger Biber in den Kessel voller Essenz fiel und mutierte."
plPL = "Pomysł ten pojawił się, gdy mały bóbr wpadł do kadzi wypełnionej Esencją i przeszedł mutację."
ptBR = "A ideia surgiu quando um filhote de castor caiu em um caldeirão cheio de Essência e teve um crescimento anômalo."
koKR = "이 아이디어는 한 어린 비버가 정수기로 가득 찬 솥에 빠져 변종으로 성장할 때 나타났습니다."
csCZ = "Tento nápad vznikl, když se malý bobr dostal do kotle plného esence a došlo k jeho mutaci."
viVN = "Ý tưởng này xuất hiện khi một chú hải ly con rơi vào chiếc vạc đầy Tinh Chất và tăng trưởng đột biến."

["Building.Agora.Description"]
status = "normal"
raw = "Một không gian tụ họp lớn, nơi hải ly thảo luận về các chủ đề liên quan đến gỗ."
