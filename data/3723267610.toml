["MapMetadata.Pressure.Description"]
status = "normal"
raw = "Trong vùng đất hoang, kỹ năng đầu tiên mà một hải ly phải học là dẫn và điều tiết nước một cách linh hoạt."
enUS = "In the wild, the first skill that a beaver must learn is to guide and manage water flexibly."
zhCN = "在荒野中，一只海狸必须学习的第一项技能是灵活地引导和调节水流。"
zhTW = "在荒野中，一隻海狸必須學會的第一項技能是靈活地引導和調節水流。"
ruRU = "На дикой земле первым навыком, которому должен научиться бобр, является гибкое управление и регулирование воды."
jaJP = "荒れ地では、ビーバーが最初に学ぶべきスキルは、水を柔軟に導き調節することです。"
frFR = "Dans les terres sauvages, la première compétence qu'un castor doit apprendre est de diriger et de réguler l'eau de manière flexible."
deDE = "Auf dem unberührten Land ist die erste Fähigkeit, die ein Biber erlernen muss, Wasser flexibel zu leiten und zu regulieren."
plPL = "Na dzikich ziemiach, pierwszą umiejętnością, którą musi opanować bóbr, jest elastyczne kierowanie i regulowanie wody."
ptBR = "Em terras selvagens, a primeira habilidade que um castor deve aprender é desviar e controlar a água de forma flexível."
koKR = "황야에서 비버가 배워야 할 첫 번째 기술은 물을 유연하게 이끌고 조절하는 것입니다."
csCZ = "V divočině je první dovedností, kterou se kastor musí naučit, flexibilně řídit a regulovat vodu."
viVN = "Trong vùng đất hoang, kỹ năng đầu tiên mà một hải ly phải học là dẫn và điều tiết nước một cách linh hoạt."

