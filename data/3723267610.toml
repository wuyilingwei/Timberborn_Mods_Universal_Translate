["Tutorial.Wood.ConnectLumberjacks"]
status = "normal"
raw = "Mọi công trình có lối vào phải nối với Trung Tâm Khu Vực bằng Đường Đi. \n\nXây Đường Đi để nối Cột Đốn Gỗ với Trung Tâm Khu Vực. \n\nLối vào của công trình được đánh dấu bằng mũi tên."
enUS = "All structures with an entrance must be connected to the District Center by a Path.\n\nBuild a Path to connect the Lumberjack Posts to the District Center.\n\nThe entrance of the structure is marked with an arrow."
zhCN = "所有有入口的建筑必须通过小路与区域中心相连。\n\n建造小路将伐木柱与区域中心连接起来。\n\n建筑物的入口用箭头标记。"
zhTW = "所有有入口的建築必須通過道路連接到區域中心。\n\n建設道路以連接木材伐木柱與區域中心。\n\n建築物的入口用箭頭標記。"
ruRU = "Все постройки с входом должны соединяться с Центром Зоны через Дорогу.\n\nПостройте Дорогу, чтобы соединить Лесозаготовительное Здание с Центром Зоны.\n\nВход в постройку отмечен стрелкой."
jaJP = "すべての建物は、通路を介して区域センターと接続する必要があります。\n\n通路を建設して木こりの柱を区域センターに接続します。\n\n建物の入り口は矢印で示されます。"
frFR = "Tous les bâtiments avec une entrée doivent être reliés au Centre du Secteur par un Chemin.\n\nConstruisez un Chemin pour relier le Poteau de Bûcheronnage au Centre du Secteur.\n\nL'entrée du bâtiment est marquée par une flèche."
deDE = "Jedes Gebäude mit einem Eingang muss mit dem Zentrum des Gebiets durch einen Weg verbunden sein. \n\nBaue einen Weg, um den Holzernte-Pfosten mit dem Zentrum des Gebiets zu verbinden. \n\nDer Eingang des Gebäudes ist mit einem Pfeil gekennzeichnet."
plPL = "Wszystkie budynki z wejściem muszą być połączone z Centrum Obszaru za pomocą Drogi.\n\nZbuduj Drogę, aby połączyć Drwal z Centrum Obszaru.\n\nWejście do budynku jest oznaczone strzałką."
ptBR = "Todas as construções com entrada devem ser conectadas ao Centro da Área por um Caminho. \n\nConstrua um Caminho para conectar a Árvore de Madeira ao Centro da Área. \n\nA entrada da construção é marcada por uma seta."
koKR = "모든 건물은 출입구가 중앙 구역과 도로로 연결되어야 합니다.\n\n도로를 건설하여 나무 베기 기둥을 중앙 구역과 연결하세요.\n\n건물의 출입구는 화살표로 표시됩니다."
csCZ = "Každá budova s vchodem musí být propojena s Centrem oblasti cestou. \n\nVybudujte cestu, abyste propojili Dřevařské kůly s Centrem oblasti. \n\nVchod do budovy je označen šipkou."
viVN = "Mọi công trình có lối vào phải nối với Trung Tâm Khu Vực bằng Đường Đi. \n\nXây Đường Đi để nối Cột Đốn Gỗ với Trung Tâm Khu Vực. \n\nLối vào của công trình được đánh dấu bằng mũi tên."

["Tutorial.Wood.FinishLumberjacks"]
status = "normal"
raw = "Cột sẽ không được xây nếu nằm ngoài phạm vi xây dựng của khu vực.\n\nChọn Trung Tâm Khu Vực để xem phạm vi. Bạn có thể mở rộng bằng cách nối thêm Đường Đi."
enUS = "The column cannot be built if it is outside the construction range of the area.\n\nSelect Zone Center to view the range. You can expand it by adding more Path."
zhCN = "“柱子将无法建造，如果超出区域的建筑范围。\n\n选择区域中心以查看范围。您可以通过连接更多通道来扩展。”"
zhTW = "柱子將無法建造如果位於建設區域範圍之外。\n\n請選擇區域中心以查看範圍。您可以通過連接額外的道路來擴展。"
ruRU = "Колонна не может быть построена, если находится за пределами зоны строительства.\n\nВыберите Центр Области, чтобы увидеть диапазон. Вы можете расширить, добавив Дополнительные Дороги."
jaJP = "「柱は建設エリアの範囲外にある場合、建設されません。\n\n範囲を見るには、エリアセンターを選択してください。道を追加することで範囲を拡大できます。」"
frFR = "Les poteaux ne peuvent pas être construits s'ils sont en dehors de la zone de construction.\n\nSélectionnez le Centre de Zone pour voir la portée. Vous pouvez étendre en ajoutant un Chemin."
deDE = "Die Säulen können nicht gebaut werden, wenn sie außerhalb des Baugebiets liegen.\n\nWählen Sie das Zentrum des Gebiets, um den Bereich zu sehen. Sie können ihn erweitern, indem Sie weitere Wege anschließen."
plPL = "Kolumna nie może być zbudowana, jeśli znajduje się poza zasięgiem budowy obszaru.\n\nWybierz Centrum Obszaru, aby zobaczyć zasięg. Możesz go rozszerzyć, łącząc dodatkowe Ścieżki."
ptBR = "A coluna não poderá ser construída se estiver fora da área de construção da zona.\n\nSelecione o Centro da Zona para ver o alcance. Você pode expandir conectando mais Caminhos."
koKR = "기둥은 건축 영역의 범위를 벗어나면 건축할 수 없습니다.\n\n센터 영역을 선택하여 범위를 확인하세요. 도로를 추가하여 확장할 수 있습니다."
csCZ = "„Sloup nebude postaven, pokud se nachází mimo stavební oblast.\n\nVyberte Centrum Oblasti, abyste viděli rozsah. Můžete ho rozšířit přidáním další Cesty.“"
viVN = "Cột sẽ không được xây nếu nằm ngoài phạm vi xây dựng của khu vực.\n\nChọn Trung Tâm Khu Vực để xem phạm vi. Bạn có thể mở rộng bằng cách nối thêm Đường Đi."

["Tutorial.Wood.MarkTrees"]
status = "normal"
raw = "Tiều phu chỉ chặt cây trong vùng bạn chỉ định.\n\nCây đồng thời cũng phải nằm trong phạm vi của Cột Đốn Gỗ.\n\nDùng công cụ \"Chỉ định chặt cây\". Giữ chuột và kéo để chọn nhiều cây cùng lúc."
enUS = "The lumberjack will only cut trees in the area you designate.\n\nThe trees must also be within the range of the Wood Cutting Post.\n\nUse the 'Designate Cut Trees' tool. Click and drag to select multiple trees at once."
zhCN = "伐木工只在您指定的区域内砍伐树木。\n\n树木同时必须位于木材砍伐柱的范围内。\n\n使用“指定砍树”工具。按住鼠标并拖动以同时选择多棵树。"
zhTW = "樹木之術.木材.標記樹木 - 翻譯文本: \"伐木工僅能在您指定的區域內砍伐樹木。\n\n樹木同時必須位於伐木柱的範圍內。\n\n使用「指定砍樹」工具。按住鼠標並拖動以同時選擇多棵樹。\""
ruRU = "Дровосек рубит деревья только в указанной вами зоне.\n\nДеревья также должны находиться в пределах столба для заготовки древесины.\n\nИспользуйте инструмент «Указать на вырубку дерева». Удерживайте мышь и перетаскивайте, чтобы выбрать несколько деревьев одновременно."
jaJP = "「伐採者は指定した範囲内の木のみを伐採します。\n\n木は同時に木材伐採柱の範囲内にある必要があります。\n\n「木を伐採する」を使用します。マウスを保持してドラッグすると、同時に複数の木を選択できます。」"
frFR = "Le bûcheron ne peut abattre des arbres que dans la zone que vous avez désignée.\n\nLes arbres doivent également se trouver dans la portée du Poteau de Coupe de Bois.\n\nUtilisez l'outil \"Désigner des arbres à abattre\". Maintenez le bouton de la souris enfoncé et faites glisser pour sélectionner plusieurs arbres à la fois."
deDE = "Der Holzfäller darf nur Bäume im von Ihnen festgelegten Bereich fällen.\n\nDie Bäume müssen gleichzeitig im Bereich der Holzernte-Säule liegen.\n\nVerwenden Sie das Werkzeug 'Bäume fällen festlegen'. Halten Sie die Maustaste gedrückt und ziehen Sie, um mehrere Bäume gleichzeitig auszuwählen."
plPL = "Leśniczy może ścinać drzewa tylko w wyznaczonym przez ciebie obszarze.\n\nDrzewa muszą również znajdować się w zasięgu Słupa Ścinania Drewna.\n\nUżyj narzędzia 'Wyznacz ścinanie drzew'. Przytrzymaj mysz i przesuń, aby wybrać wiele drzew jednocześnie."
ptBR = "Os lenhadores só podem cortar árvores na área que você designar.\n\nAs árvores também precisam estar dentro do alcance do Poste de Corte de Madeira.\n\nUse a ferramenta 'Designar cortar árvores'. Clique e arraste para selecionar várias árvores ao mesmo tempo."
koKR = "목재를 베는 작업자가 지정한 지역 내에서만 나무를 베습니다.\n\n나무는 동시에 나무 베기 기둥의 범위 내에 있어야 합니다.\n\n'나무 베기 지정' 도구를 사용하세요. 마우스를 누르고 드래그하여 여러 나무를 동시에 선택합니다."
csCZ = "Rybáři mohou kácet stromy pouze v určené oblasti.\n\nStromy musí být navíc v dosahu Kácení dřeva.\n\nPoužijte nástroj „Určit kácení stromů“. Podržte myš a táhněte pro výběr více stromů najednou."
viVN = "Logger only chops down trees in the area you designate.\n\nTrees must also be within the range of the Lumberjack Post.\n\nUse the \"Designate Trees\" tool. Hold the mouse and drag to select multiple trees at once."

["Tutorial.Wood.PlaceLumberjacks"]
status = "normal"
raw = "Mọi khu định cư hải ly đều cần Gỗ—rất nhiều Gỗ. \n\nChỉ hải ly tiều phu mới chặt cây. Hãy đặt Cột Đốn Gỗ gần khu rừng."
enUS = "Every beaver settlement needs Wood—lots of Wood. \n\nOnly beaver lumberjacks can chop down trees. Place a Lumberjack Post near the forest."
zhCN = "所有海狸定居点都需要木材——非常多的木材。\n\n只有海狸伐木工才能砍树。请在森林附近放置伐木柱。"
zhTW = "所有海狸定居點都需要木材——非常多的木材。\n\n只有海狸樵夫才能砍伐樹木。請在森林附近放置砍木柱。"
ruRU = "Каждая бобровая колония нуждается в Древесине — очень много Древесины.\n\nТолько бобры-лесорубы могут рубить деревья. Поместите Столб Рубки Древесины рядом с лесом."
jaJP = "「すべてのビーバーの集落には木材が必要です—たくさんの木材が。\n\nビーバーの伐採者だけが木を切り倒します。森の近くに木材伐採の柱を設置してください。」"
frFR = "Chaque colonie de castors a besoin de bois—beaucoup de bois.\n\nSeuls les castors bûcherons peuvent abattre des arbres. Placez le Poteau de Coupé de Bois près de la forêt."
deDE = "Jede Biber-Siedlung benötigt Holz—sehr viel Holz.\n\nNur Biber-Holzfäller fällen Bäume. Stelle die Holzernte-Säule in der Nähe des Waldes auf."
plPL = "Wszystkie osady bobrów potrzebują Drewna—bardzo dużo Drewna.\n\nTylko bobry drwale mogą ścinać drzewa. Umieść Wieżę Ścinania Drewna blisko lasu."
ptBR = "Todas as colônias de castores precisam de Madeira—muita Madeira.\n\nSomente os castores madeireiros podem derrubar árvores. Coloque o Poste de Corte de Madeira perto da floresta."
koKR = "모든 비버 정착촌에는 나무가 필요합니다—아주 많은 나무가 필요합니다.\n\n오직 비버 벌목기만 나무를 베어낼 수 있습니다. 숲 근처에 벌목 기둥을 배치하세요."
csCZ = "Každá bobří osada potřebuje Dřevo—hodně Dřeva.\n\nPouze bobři dřevorubci mohou kácet stromy. Umístěte Sloup na Kácení Dřeva blízko lesa."
viVN = "Mọi khu định cư hải ly đều cần Gỗ—rất nhiều Gỗ.\n\nChỉ hải ly tiều phu mới chặt cây. Hãy đặt Cột Đốn Gỗ gần khu rừng."

