["Building.BadwaterSource.FlavorDescription"]
status = "normal"
raw = "\"Tại sao chúng ta phải dọn đống lộn xộn của đám Hooman? À ừ, họ \"tuyệt chủng\" rồi mà.\" —Pina"
enUS = "\"Why do we have to clean up the mess of the Hoomans? Well, they're 'extinct' after all.\" —Pina"
zhCN = "我们为什么要清理那些Hooman的烂摊子？哦，对了，他们“灭绝”了嘛。” —Pina"
zhTW = "\"為什麼我們要清理這些Hooman的亂七八糟？哦，他們已經「絕種」了嘛。\" —Pina"
ruRU = "\"Почему мы должны убирать эту кучу мусора от Хуман? А, да, они же \"вымершие\".\" —Пина"
jaJP = "「なぜ私たちはホーマンの乱雑なゴミを片付けなければならないのか？ああ、そうだ、彼らは「絶滅」したんだ。」—ピナ"
frFR = "Pourquoi devrions-nous nettoyer le désordre des Hooman ? Eh bien, ils sont \"éteints\" après tout.\" —Pina"
deDE = "\"Warum müssen wir das Chaos der Hooman beseitigen? Nun ja, sie sind ja schließlich 'ausgestorben'.\" —Pina"
plPL = "\"Dlaczego musimy sprzątać bałagan po Hoomanach? Cóż, oni już \"wyginęli\".\" —Pina"
ptBR = "\"Por que temos que limpar a bagunça dos Hooman? Ah, sim, eles já \"se extinguiram\".\" —Pina"
koKR = "\"왜 우리는 Hooman의 엉망진창을 치워야 할까요? 아, 맞다, 그들은 '멸종'되었으니까요.\" —Pina"
csCZ = "\"Proč bychom měli uklízet tenhle nepořádek od Hoomanů? No jo, oni už jsou „vyhynulí“.\" —Pina"
viVN = "Tại sao chúng ta phải dọn đống lộn xộn của đám Hooman? À ừ, họ \"tuyệt chủng\" rồi mà.\" —Pina"

