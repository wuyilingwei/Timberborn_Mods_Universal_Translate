["MapMetadata.Canyon.Description"]
status = "normal"
raw = "Giữa sa mạc khắc nghiệt, hải ly tìm đến một thung lũng có dòng sông chảy qua. Địa hình thuận lợi giúp việc xây đập trở nên dễ dàng, biến nơi đây thành chốn trú ẩn an toàn."
enUS = "Amid the harsh desert, the beavers find a valley with a river flowing through it. The favorable terrain makes dam construction easy, turning this place into a safe haven."
zhCN = "在严酷的沙漠中，海狸发现了一个有河流穿过的山谷。地形的便利使得筑坝变得容易，将这里变成了一个安全的避风港。"
zhTW = "在嚴酷的沙漠中，海狸來到一個有河流穿過的山谷。地形的便利使得建設水壩變得容易，這裡成為了一個安全的避難所。"
ruRU = "Посреди суровой пустыни бобры нашли долину с протекающей рекой. Благоприятный рельеф облегчает строительство плотины, превращая это место в безопасное укрытие."
jaJP = "厳しい砂漠の真ん中で、ビーバーは川が流れる谷を見つけました。地形が便利で、ダムの建設が容易になり、ここは安全な避難所となるのです。"
frFR = "Au milieu du désert impitoyable, un castor découvre une vallée traversée par une rivière. Le terrain propice facilite la construction de barrages, transformant cet endroit en un refuge sûr."
deDE = "Mitten in der gnadenlosen Wüste finden die Biber ein Tal, durch das ein Fluss fließt. Die geologischen Gegebenheiten erleichtern den Bau von Dämmen und verwandeln diesen Ort in einen sicheren Unterschlupf."
plPL = "W środku surowej pustyni, bóbr natrafia na dolinę, przez którą przepływa rzeka. Dogodne ukształtowanie terenu ułatwia budowę tam, czyniąc to miejsce bezpieczną przystanią."
ptBR = "Em meio ao deserto árido, os castores encontram um vale com um rio correndo através dele. A topografia favorável torna a construção de represas mais fácil, transformando este lugar em um refúgio seguro."
koKR = "가혹한 사막 한가운데에서 비버는 강이 흐르는 계곡을 발견했다. 유리한 지형 덕분에 댐을 건설하는 것이 쉬워지며, 이곳은 안전한 은신처가 되었다."
csCZ = "Uprostřed drsné pouště našel bobr údolí s tekoucí řekou. Příznivé terénní podmínky usnadňují stavbu hrází, což z tohoto místa činí bezpečný úkryt."
viVN = "Giữa sa mạc khắc nghiệt, hải ly tìm đến một thung lũng có dòng sông chảy qua. Địa hình thuận lợi giúp việc xây đập trở nên dễ dàng, biến nơi đây thành chốn trú ẩn an toàn."

