["Building.Tunnel.Description"]
status = "normal"
raw = "Phá bỏ một Khối Địa Hình rồi thay thế bằng Sàn. Từ đó tạo nên Đường Hầm để hải ly đi qua. Dùng công cụ Lớp để quan sát địa hình bên dưới."
enUS = "Destroy a Terrain Block and replace it with a Floor. This creates a Tunnel for the beavers to pass through. Use the Layer tool to view the terrain below."
zhCN = "拆除一个地形块，然后用地板替换。由此创建一个供海狸通过的隧道。使用层工具查看下面的地形。"
zhTW = "摧毀一個地形塊並替換為地板。從而建立一條供海狸通行的隧道。使用層工具來觀察下方的地形。"
ruRU = "Сносите участок местности и замените его на пол. Таким образом, создаётся тоннель для прохода бобров. Используйте инструмент Слой, чтобы увидеть рельеф под ним."
jaJP = "地形のブロックを破壊し、床で置き換えます。それによりビーバーが通れるトンネルを作ります。レイヤーツールを使用して下の地形を観察します。"
frFR = "Détruire un Bloc de Terrain puis le remplacer par un Plancher. Cela crée un Tunnel pour que les castors puissent passer. Utilisez l'outil de Calque pour observer le terrain en dessous."
deDE = "Zerstöre einen Block des Geländes und ersetze ihn durch ein Bodenbrett. So entsteht ein Tunnel, durch den die Biber gehen können. Verwende das Schichtwerkzeug, um das Gelände darunter zu betrachten."
plPL = "Zburz blok terenu, a następnie zastąp go podłogą. W ten sposób stworzysz tunel, przez który mogą przechodzić bobry. Użyj narzędzia warstw, aby zobaczyć teren poniżej."
ptBR = "Destrua um Bloco de Terreno e substitua-o por um Piso. Assim cria um Túnel para os castores atravessarem. Use a ferramenta Camada para visualizar o terreno abaixo."
koKR = "지형 블록을 파괴한 후 바닥으로 교체합니다. 그로써 비버가 지나갈 수 있는 터널을 만듭니다. 도구 레이어를 사용하여 아래의 지형을 관찰하세요."
csCZ = "Zbořte kus terénu a nahraďte ho podlahou. Tím vytvoříte tunel, kterým mohou bobři procházet. Použijte nástroj vrstvy k zobrazení terénu níže."
viVN = "Phá bỏ một Khối Địa Hình rồi thay thế bằng Sàn. Từ đó tạo nên Đường Hầm để hải ly đi qua. Dùng công cụ Lớp để quan sát địa hình bên dưới."

