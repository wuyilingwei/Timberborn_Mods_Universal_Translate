["NaturalResource.Corn.FlavorDescription"]
status = "normal"
raw = "\"Chẳng có gì tốt đẹp khi lũ nhỏ chơi trong ruộng ngô.\" —Ma' Ngonel"
enUS = "\"Nothing good comes from the little ones playing in the cornfields.\" —Ma' Ngonel"
zhCN = "“在玉米地里，孩子们玩耍并没有什么美好的。” —马·诺内尔"
zhTW = "\"小朋友在玉米田裡玩並沒有什麼好事。\" —Ma' Ngonel"
ruRU = "\"Нет ничего хорошего, когда малыши играют на кукурузном поле.\" —Ма' Нгонель"
jaJP = "「トウモロコシ畑で小さな子供たちが遊んでいるのは何も良いことではない。」 —マ・ゴネール"
frFR = "\"Il n'y a rien de mieux que les petits à jouer dans les champs de maïs.\" —Ma' Ngonel"
deDE = "\"Es gibt nichts Schöneres, als die Kleinen, die auf dem Maisfeld spielen.\" —Ma' Ngonel"
plPL = "\"Nie ma nic pięknego w tym, kiedy dzieci bawią się na polu kukurydzy.\" —Ma' Ngonel"
ptBR = "\"Não há nada melhor do que as crianças brincando no campo de milho.\" —Ma' Ngonel"
