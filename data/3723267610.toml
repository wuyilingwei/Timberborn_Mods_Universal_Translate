["Building.Levee.FlavorDescription"]
status = "normal"
raw = "Được cân bằng, gia cố và hoàn thiện qua nhiều thế hệ kỹ sư thủy lợi hải ly, đây không chỉ là “một khối gỗ”."
enUS = "Balanced, reinforced, and perfected over generations of beaver civil engineers, this is not just 'a block of wood'."
zhCN = "经过几代水利海狸工程师的平衡、加固和完善，这不仅仅是“一块木头”."
zhTW = "經過多代海狸水利工程師的調整、加固和完善，這不僅僅是“一塊木頭”。"
ruRU = "Сбалансированный, укрепленный и усовершенствованный на протяжении многих поколений инженеров-гидравликов бобров, это не просто «кусок дерева»."
jaJP = "「バランスが取れ、強化され、数世代にわたるビーバーの水利技術者によって完成したもので、単なる「木の塊」ではありません。」"
frFR = "Équilibré, renforcé et perfectionné au fil des générations d'ingénieurs en hydraulique castor, ce n'est pas seulement « un bloc de bois »."
deDE = "Ausgewogen, verstärkt und über viele Generationen von Biber-Wasserbauingenieuren perfektioniert, ist dies nicht nur ein 'Block aus Holz'."
plPL = "Zrównoważony, wzmocniony i doskonalony przez pokolenia inżynierów wodnych bobrów, to nie tylko „kawałek drewna”."
ptBR = "Equilibrado, reforçado e aperfeiçoado ao longo de várias gerações de engenheiros hidráulicos castores, isso não é apenas 'um bloco de madeira'."
koKR = "수세대에 걸쳐 해양 비버의 수리 기술자들에 의해 균형을 맞추고, 보강되며 완성된 이 구조물은 단순한 “목재 블록”이 아닙니다."
csCZ = "Bylo vyváženo, zesíleno a zdokonaleno přes mnoho generací inženýrů vodohospodářských bobrů, to není jen 'kus dřeva'."
