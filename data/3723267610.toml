["Building.EfficientFarmhouse.Description"]
status = "normal"
raw = "Tuyển nông dân trồng và thu hoạch cây trồng. \n\nThiết kế mở rộng của Đuôi Mộc chứa được nhiều nông dân hơn."
enUS = "Recruit farmers to plant and harvest crops.\n\nThe expanded design of the Lumber Tail can accommodate more farmers."
zhCN = "“招募农民种植和收获作物。\n\n扩展设计的木尾能够容纳更多农民。”"
zhTW = "招聘農民種植和收穫作物。\n\n開放式設計的木尾可以容納更多農民。"
ruRU = "Набирайте фермеров для посадки и сбора урожая.  \n\nУлучшенный дизайн Деревянного Хвоста позволяет разместить больше фермеров."
jaJP = "農民を雇って作物を栽培し、収穫します。\n\n拡張されたウッドティールの設計には、より多くの農民を収容できます。"
frFR = "Recrute des agriculteurs pour planter et récolter des cultures.\n\nLe design agrandi de la Ferme Efficace accueille plus d'agriculteurs."
deDE = "Rekrutiere Bauern, um Pflanzen anzubauen und zu ernten.\n\nDas erweiterte Design der Holzrückfläche bietet Platz für mehr Bauern."
plPL = "Zatrudniaj farmerów do sadzenia i zbierania plonów.\n\nRozszerzona konstrukcja Drewnianej Chaty pomieści więcej farmerów."
ptBR = "Contrate agricultores para plantar e colher culturas.\n\nO design expandido do Casa de Fazendeiro acomoda mais agricultores."
koKR = "농민을 채용하여 작물을 재배하고 수확합니다.\n\n확장된 디자인으로 더 많은 농민을 수용할 수 있는 목재 후삼."
csCZ = "Nábor farmářů pro pěstování a sklizeň plodin.\n\nRozšířený design Dřevěného Ocásku umožňuje zaměstnat více farmářů."
viVN = "Tuyển nông dân trồng và thu hoạch cây trồng. \n\nThiết kế mở rộng của Đuôi Mộc chứa được nhiều nông dân hơn."

