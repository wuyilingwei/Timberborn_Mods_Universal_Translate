frFR = "Pompe et filtre de grandes quantités d'eau pour que les castors puissent boire. La pollution de l'eau toxique réduit la vitesse de pompage."
deDE = "Pump and filter large amounts of water for beavers to drink. Toxic Water Pollution reduces pumping speed."
