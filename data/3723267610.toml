["Tutorial.Droughts"]
new = "Hạn hán"
status = "normal"

["Tutorial.Droughts.Description"]
new = "Chúc mừng! Khu định cư của bạn đã sống sót qua đợt hạn hán đầu tiên.\n\nHạn Hán là một phần của chu kỳ mùa. Chúng sẽ quay lại và kéo dài hơn theo thời gian.\n\nHãy bắt đầu chuẩn bị cho lần tiếp theo bằng cách xây đập."
status = "normal"

["Tutorial.Forestry"]
new = "Lâm nghiệp"
status = "normal"

["Tutorial.Forestry.Forester"]
new = "Hải ly cần nguồn Gỗ ổn định. Điều đó là hiển nhiên.\n\nDùng Điểm Khoa Học từ Xưởng Phát Minh để mở khóa Trạm Lâm Nghiệp, rồi xây nó ở khu vực bạn muốn trồng cây."
status = "normal"

["Tutorial.Forestry.MarkBirchesForPlanting"]
new = "Dùng công cụ \"Trồng cây và bụi\" để trồng Bạch Dương. Chúng phát triển nhanh, phù hợp cho giai đoạn đầu.\n\nGiống như cây nông nghiệp, cây gỗ chỉ phát triển trên vùng đất tươi tốt.\n\nNhớ chỉ định khu vực để chặt cây."
status = "normal"

["Tutorial.HaulersAndWorkforce"]
new = "Vận chuyển và lao động"
status = "normal"

["Tutorial.HaulersAndWorkforce.BuildHaulingPost"]
new = "Khi khu định cư phát triển, lượng hàng hóa tăng lên. Việc vận chuyển chiếm nhiều thời gian của các nhân công.\n\nNgười vận chuyển giúp giải quyết việc này. Họ vận chuyển hàng hóa trong khu vực theo yêu cầu.\n\nHãy xây một Trạm Vận Chuyển."
status = "normal"

["Tutorial.HaulersAndWorkforce.ChangeWorkforce"]
new = "Một số công trình như Trạm Vận Chuyển không tự động lấp đầy toàn bộ vị trí lao động. Bạn có thể tự phân công lao động trong bảng điều khiển.\n\nNgoài ra, bạn hãy thử phân công lao động bằng mức ưu tiên. Ví dụ, Trạm Vận Chuyển thường được đặt mức ưu tiên thấp.\n\nHãy thử ngay!"
status = "normal"

["Tutorial.HaulersAndWorkforce.PauseHaulingPost"]
new = "Bạn có thể tạm dừng công trình và công trường để kiểm soát hành động của hải ly tốt hơn.\n\nCông trình bị tạm dừng sẽ tự động giải phóng nhân công để họ chuyển sang nơi khác.\n\nChọn Trạm Vận Chuyển và bấm nút \"Tạm dừng\" trong bảng điều khiển."
status = "normal"

