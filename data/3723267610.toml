["NaturalResource.Oak.FlavorDescription"]
status = "normal"
raw = "Những công trình tốt nhất của hải ly đều làm từ gỗ sồi và được gia cố bằng sắt."
enUS = "The best beaver constructions are made from oak wood and reinforced with iron."
zhCN = "“海狸最好的建筑都由橡木制成，并用铁加固。”"
zhTW = "海狸最好的建築都是用橡木製成並加強了鐵。"
