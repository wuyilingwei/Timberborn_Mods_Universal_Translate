["NewGameConfigurationPanel.NormalModeDescription"]
status = "normal"
raw = "Một thử thách vừa phải.\n\nKhu định cư bắt đầu với lượng tài nguyên trung bình.\n\nHạn Hán và Thủy Triều Đỏ ban đầu nhẹ nhưng sẽ tăng dần theo thời gian."
enUS = "A moderate challenge.\n\nThe settlement starts with an average amount of resources.\n\nDrought and Red Tide are initially mild but will gradually increase over time."
zhCN = "适度的挑战。\n\n定居点以中等资源开始。\n\n干旱和红潮初期轻微，但会随着时间推移逐渐加重。"
zhTW = "一個適中的挑戰。\n\n定居點起始擁有中等資源。\n\n旱災和紅潮初期輕微，但隨時間推移將逐漸增加。"
ruRU = "Умеренный вызов.\n\nПоселение начинается со среднего количества ресурсов.\n\nСухие сезоны и красные приливы в начале легкие, но со временем будут усиливаться."
jaJP = "中程度の挑戦。\n\n入植地は平均的な資源量で始まります。\n\n最初は干ばつと赤潮が軽度ですが、時間とともに徐々に強くなります。"
frFR = "Un défi modéré.\n\nLa colonie commence avec une quantité moyenne de ressources.\n\nLa sécheresse et la marée rouge sont initialement légères mais augmenteront avec le temps."
deDE = "Eine mittelschwere Herausforderung.\n\nDie Siedlung beginnt mit einer durchschnittlichen Menge an Ressourcen.\n\nDürre und Rote Flut sind anfangs mild, werden aber im Laufe der Zeit zunehmen."
plPL = "Umiarkowane wyzwanie.\n\nOsada zaczyna z przeciętną ilością zasobów.\n\nNa początku susze i czerwony przypływ są łagodne, ale z czasem będą coraz silniejsze."
ptBR = "Um desafio moderado.\n\nA colônia começa com uma quantidade média de recursos.\n\nSecas e Marés Vermelhas iniciais são leves, mas aumentarão com o tempo."
koKR = "적당한 도전 과제입니다.\n\n정착지는 평균적인 자원으로 시작합니다.\n\n초기 가뭄과 적색 조류는 경미하지만 시간이 지남에 따라 점점 증가할 것입니다."
csCZ = "Středně náročná výzva.\n\nOsídlení začíná s průměrným množstvím zdrojů.\n\nSucho a Červený příliv jsou na začátku mírné, ale postupně se budou zvyšovat."
viVN = "Một thử thách vừa phải.\n\nKhu định cư bắt đầu với lượng tài nguyên trung bình.\n\nHạn Hán và Thủy Triều Đỏ ban đầu nhẹ nhưng sẽ tăng dần theo thời gian."

