jaJP = "「“違うよ、スリ。君はエッセンスを飲んじゃいけない。子供の頃に釜に落ちたじゃないか！” —マ・ンゴネル」"
frFR = "« Non, Suli, tu ne peux pas boire l'Elixir. Quand tu étais petit, tu es déjà tombé dans le chaudron ! » —Ma' Ngonel"
deDE = "„Nein, Suli, du darfst keinen Extrakt trinken. Als Kind bist du schon einmal in den Kessel gefallen!“ —Ma' Ngonel"
plPL = "„Nie, Suli, nie możesz pić Esencji. Kiedy byłem mały, już wpadłem do kotła!” —Ma' Ngonel"
ptBR = "\"Não, Suli, você não deve beber o Elixir. Quando era pequeno, você caiu no caldeirão!\" —Ma' Ngonel"
koKR = "“안 돼, 술리, 너는 정량을 마셔서는 안 돼. 어릴 적에 이미 가마에 빠졌잖아!” —마' 응오넬"
csCZ = "„Ne, Suli, nesmíš pít Esenci. Když jsem byl malý, spadl jsem do kotle!“ —Ma' Ngonel"
viVN = "“Không đâu Suli, cháu không được uống Tinh Chất. Hồi nhỏ cháu đã ngã vào vạc rồi mà!” —Ma' Ngonel"

