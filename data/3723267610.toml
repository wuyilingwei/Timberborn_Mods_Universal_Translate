new = "Phiên bản này của Timberborn cho phép bạn truy cập các tính năng thử nghiệm, chưa hoàn thiện. Vì vậy, khả năng cao sẽ có lỗi nghiêm trọng. Bạn đúng là một hải ly dũng cảm.\n\nCác bản lưu ở chế độ thử nghiệm được lưu riêng với bản chính. Các bản cập nhật có thể làm mất khả năng tương thích của bản lưu.\n\nTrong chế độ thử nghiệm này, <RedHighlight>nhiều phần của trò chơi chưa được dịch và sẽ hiển thị bằng tiếng Anh</RedHighlight>, bất kể bạn chọn ngôn ngữ nào. Điều này giúp chúng tôi thêm nội dung mới và thay đổi nhanh mà không phải chờ dịch.\n\nChúng tôi khuyến khích bạn tham gia Discord chính thức và góp ý về nội dung mới."
