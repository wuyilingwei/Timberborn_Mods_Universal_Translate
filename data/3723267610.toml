["Tutorial.VerticalArchitecture.BuildRooftopTerrace"]
status = "normal"
raw = "Trong vùng đất hoang, việc tối ưu không gian là rất quan trọng. Hải ly làm điều đó bằng cách xây dựng ngày càng lên cao.\n\nMột số công trình như Nhà Tổ có mái phẳng, có thể xây thêm công trình khác lên trên.\n\nHãy xây một Sân Thượng trên mái. Bạn sẽ cần Cầu Thang để kết nối nó với đường đi bên dưới."
enUS = "In the wasteland, space optimization is very important. Beavers do this by building higher and higher.\n\nSome buildings like the Lodge have flat roofs, which can support additional structures on top.\n\nBuild a Rooftop Terrace on the roof. You'll need a Stairway to connect it to the path below."
zhCN = "在荒野中，优化空间是非常重要的。海狸通过不断向上建设来做到这一点。\n\n一些建筑，如平顶房屋，可以在上面建造其他建筑。\n\n请在屋顶上建一个阳台。你需要一个楼梯将它与下面的道路连接起来。"
zhTW = "在荒野中，最大化空間是非常重要的。海狸通過不斷向上建設來達成這一目標。\n\n一些建築，如平頂房屋，可以在上面建造其他建築。\n\n請在屋頂上建造一個天台。你需要樓梯將其連接到下面的道路上。"
ruRU = "В дикой местности оптимизация пространства очень важна. Бобры делают это, строя все выше и выше.\n\nНекоторые здания, такие как Лодж с плоской крышей, могут поддерживать дополнительные строения сверху.\n\nПостройте Террасу на крыше. Вам понадобится Лестница, чтобы соединить её с тропой внизу."
jaJP = "荒れ地では、スペースの最適化が非常に重要です。ビーバーはそれをどんどん高く建てることで実現します。\n\n一部の建物は平らな屋根を持つ巣箱のようなもので、その上に他の建物を建てることができます。\n\n屋根の上にテラスを建てましょう。下の道と繋ぐために階段が必要です。"
frFR = "Dans les terres sauvages, optimiser l'espace est très important. Les castors le font en construisant de plus en plus haut.\n\nCertaines structures comme la Maison de la Famille ont un toit plat, ce qui permet de construire d'autres structures au-dessus.\n\nConstruisez une Terrasse sur le toit. Vous aurez besoin d'un Escalier pour la connecter au chemin en dessous."
deDE = "Auf dem wildnisgebiet ist die Raumnutzung entscheidend. Biber tun dies, indem sie immer höher bauen.\n\nEinige Gebäude wie das Flachdachhaus ermöglichen den Bau weiterer Strukturen darüber.\n\nBaue eine Dachterrasse auf dem Dach. Du benötigst eine Treppe, um sie mit dem unteren Weg zu verbinden."
plPL = "W dzikiej krainie optymalizacja przestrzeni jest bardzo ważna. Bobry robią to, budując coraz wyżej.\n\nNiektóre budynki, takie jak Chatka, mają płaskie dachy, na których można zbudować inne konstrukcje.\n\nZbuduj Taras na dachu. Będziesz potrzebować Schodów, aby połączyć go z drogą poniżej."
ptBR = "Em uma terra selvagem, otimizar o espaço é muito importante. Os castores fazem isso construindo cada vez mais alto.\n\nAlgumas construções, como a Casa de Ninhos, têm telhados planos, permitindo a construção de outras estruturas em cima.\n\nConstrua um Terraço no telhado. Você vai precisar de uma Escada para conectá-lo ao caminho abaixo."
koKR = "황량한 땅에서 공간을 최적화하는 것은 매우 중요합니다. 비버는 점점 더 높이 지어가며 이를 수행합니다.\n\n평평한 지붕을 가진 일부 건물, 예를 들어 보금자리처럼, 그 위에 다른 건물을 더 지을 수 있습니다.\n\n지붕 위에 테라스를 지어보세요. 아래 길과 연결하기 위해 계단이 필요합니다."
csCZ = "V oblasti divočiny je optimalizace prostoru velmi důležitá. Bobři toho dosahují tím, že staví stále výš.\n\nNěkteré budovy, jako je Plochá střecha, umožňují postavit další stavby nahoře.\n\nPostavte Terasu na střeše. Budete potřebovat Schody, abyste ji spojili s cestou pod ní."
viVN = "Trong vùng đất hoang, việc tối ưu không gian là rất quan trọng. Hải ly làm điều đó bằng cách xây dựng ngày càng lên cao.\n\nMột số công trình như Nhà Tổ có mái phẳng, có thể xây thêm công trình khác lên trên.\n\nHãy xây một Sân Thượng trên mái. Bạn sẽ cần Cầu Thang để kết nối nó với đường đi bên dưới."

