frFR = "«L’eau vient de la terre en dessous, où poussent les roseaux et où les castors font des réparations.» —Chanson de travail de Nanh Sắt"
deDE = "„Das Wasser kommt aus dem Land darunter, wo das Schilfrohr wächst und die Biber als Klempner arbeiten.“ —Lied der Arbeit von Eisenzahn"
plPL = "„Woda pochodzi z krainy poniżej, gdzie rosną trzciny, a bobry są hydraulikami.” — Pieśń pracy Żelaznego Kła"
ptBR = "\"Água vem da terra abaixo, onde as juncas crescem e os castores fazem de encanadores.\" —Canto de trabalho de Dente de Aço"
koKR = "“물은 아래쪽 땅에서 오고, 그곳은 갈대가 자라고 비버가 배관공 일을 합니다.” —날카로운 이의 노동가"
csCZ = "„Voda přichází z oblasti pod zemí, kde rostou rákosí a bobři jsou vodoinstalatéři.“ —Píseň práce Štětiny"
viVN = "“Nước đến từ vùng đất phía dưới, nơi lau sậy mọc và hải ly làm thợ ống nước.” —Bài ca lao động của Nanh Sắt"

