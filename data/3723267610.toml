["Building.VerticalTubeway.FlavorDescription"]
status = "normal"
raw = "Lên, lên, xuống, xuống, trái, phải, trái, phải, lùi, tiến. Ồ, sao chỗ này thấy... như chỗ cũ vậy ta?"
enUS = "Up, up, down, down, left, right, left, right, back, forward. Oh, why does this place feel... so familiar?"
