["Building.DeepWaterPump.FlavorDescription"]
status = "normal"
raw = "“Nước đến từ vùng đất phía dưới, nơi lau sậy mọc và hải ly làm thợ ống nước.” —Bài ca lao động của Nanh Sắt"
enUS = "\"Water comes from the land below, where reeds grow and beavers are plumbers.\" —Song of Labor by Iron Tooth"
zhCN = "“水来自地下的地方，那里的芦苇生长，海狸是管道工。” —《铁齿的劳动歌》"
zhTW = "“水來自地下的土地，那裡生長著蘆葦，海狸正在當水管工。” —鋼牙的勞動之歌"
ruRU = "«Вода поступает из подземных земель, где растет камыш и бобры трудятся как сантехники.» — Песня труда Ножей"
