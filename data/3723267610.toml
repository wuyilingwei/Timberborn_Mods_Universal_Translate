plPL = "„Stare drewno zawsze jest lepsze. Wtedy rosły inaczej niż teraz.” —Ma' Ngonel"
ptBR = "“Madeira antiga é sempre melhor. Naquela época, elas cresciam de maneira diferente.” —Ma' Ngonel"
koKR = "“옛날 나무는 항상 더 좋다. 그때는 지금과 다르게 자랐다.” —마' 응오넬"
csCZ = "„Staré dřevo je vždy lepší. Tehdy rostlo jinak než teď.“ —Ma' Ngonel"
