["MapMetadata.Lakes.Description"]
status = "normal"
raw = "Ngày nay, khu vực có nhiều sông hồ còn khá hiếm.\nHãy tận dụng những vùng đất như thế này. Trái Đất vẫn còn hy vọng."
enUS = "Nowadays, areas with many rivers and lakes are quite rare. Make use of such lands. Earth still has hope."
zhCN = "如今，有许多河流湖泊的地区仍然相当稀缺。  \n要好好利用这样的土地。地球仍然充满希望。"
zhTW = "如今，有許多河流和湖泊的區域仍然相當稀少。  \n請善用這樣的土地。地球仍然有希望。"
ruRU = "В настоящее время районы с множеством рек и озёр довольно редки. Воспользуйтесь такими участками земли. Земля всё ещё имеет надежду."
jaJP = "現在、河川や湖が多い地域はかなり珍しいです。  \nこのような土地を活用しましょう。地球にはまだ希望があります。"
frFR = "Aujourd'hui, les zones avec de nombreux lacs et rivières sont encore assez rares. Profitez de ces terres. La Terre a encore de l'espoir."
deDE = "Heutzutage sind Gebiete mit vielen Flüssen und Seen ziemlich selten. Nutzen Sie solche Landschaften. Die Erde hat noch Hoffnung."
plPL = "Dziś obszary z wieloma rzekami i jeziorami są dość rzadkie. Wykorzystaj takie tereny. Ziemia wciąż ma nadzieję."
ptBR = "Hoje em dia, áreas com muitos rios e lagos são bastante raras. Aproveite terrenos como este. A Terra ainda tem esperanças."
koKR = "오늘날, 강과 호수가 많은 지역은 아직도 상당히 드물다. 이러한 땅을 활용하라. 지구에는 여전히 희망이 있다."
csCZ = "Dnes je oblast s množstvím řek a jezer stále celkem vzácná. Využijte takovéto oblasti. Země má stále naději."
viVN = "Ngày nay, khu vực có nhiều sông hồ còn khá hiếm.\nHãy tận dụng những vùng đất như thế này. Trái Đất vẫn còn hy vọng."

