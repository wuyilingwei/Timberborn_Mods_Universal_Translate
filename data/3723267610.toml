["NewGameConfigurationPanel.EasyModeDescription"]
status = "normal"
raw = "Bạn vẫn đang học chơi hoặc muốn trải nghiệm xây dựng thư giãn.\n\nKhu định cư bắt đầu với nguồn tài nguyên dồi dào.\n\nHải ly tiêu thụ ít thức ăn và nước hơn.\n\nHạn Hán và Thủy Triều Đỏ hiếm khi xảy ra và nhanh kết thúc."
enUS = "You are still learning to play or want to experience relaxing building.\n\nThe settlement starts with abundant resources.\n\nBeavers consume less food and water.\n\nDroughts and Red Tides rarely occur and end quickly."
zhCN = "您仍在学习游戏或想要体验轻松的建设。\n\n定居点开始时资源丰富。\n\n海狸消耗的食物和水更少。\n\n干旱和红潮很少发生，并且很快结束。"
zhTW = "您仍在學習或希望體驗輕鬆的建設。\n\n定居點開始時擁有豐富的資源。\n\n海狸消耗較少的食物和水。\n\n乾旱和紅潮很少發生且結束迅速。"
ruRU = "Вы все еще учитесь играть или хотите насладиться расслабляющим строительством.\n\nПоселение начинается с обилия ресурсов.\n\nБобры потребляют меньше еды и воды.\n\nЗасухи и красные приливы случаются редко и быстро заканчиваются."
jaJP = "「まだ遊びを学んでいるか、リラックスして建設を体験したいと思っています。\n\n集落は豊富な資源で始まります。\n\nビーバーは食べ物と水をあまり消費しません。\n\n干ばつや赤潮はほとんど発生せず、すぐに終わります。」"
frFR = "Vous êtes encore en train d'apprendre à jouer ou souhaitez vivre une expérience de construction détendue.\n\nLa colonie commence avec une abondance de ressources.\n\nLes castors consomment moins de nourriture et d'eau.\n\nLes sécheresses et les marées rouges se produisent rarement et se terminent rapidement."
deDE = "Sie lernen noch zu spielen oder möchten entspannendes Bauen erleben.\n\nDie Siedlung beginnt mit reichlichen Ressourcen.\n\nBiber verbrauchen weniger Nahrung und Wasser.\n\nDürren und Rote Flut treten selten auf und enden schnell."
plPL = "Jeszcze uczysz się grać lub chcesz doświadczyć relaksującego budowania.\n\nOsada zaczyna z obfitymi zasobami.\n\nBóbr zużywa mniej jedzenia i wody.\n\nSusze i Czerwone Przypływy rzadko występują i szybko się kończą."
ptBR = "Você ainda está aprendendo a jogar ou deseja uma experiência de construção relaxante.\n\nA colônia começa com recursos abundantes.\n\nOs castores consomem menos comida e água.\n\nSecas e Marés Vermelhas ocorrem raramente e terminam rapidamente."
koKR = "당신은 아직 게임을 배우고 있거나 편안한 건축 경험을 원합니다.\n\n정착지는 풍부한 자원으로 시작합니다.\n\n비버는 음식과 물을 덜 소비합니다.\n\n가뭄과 적조는 거의 발생하지 않으며 빠르게 끝납니다."
csCZ = "Stále se učíte hrát nebo chcete zažít uvolněné stavění.\n\nOsídlení začíná s hojnými zdroji.\n\nBobři spotřebovávají méně jídla a vody.\n\nSucha a červené přílivy se vyskytují zřídka a rychle končí."
viVN = "Bạn vẫn đang học chơi hoặc muốn trải nghiệm xây dựng thư giãn.\n\nKhu định cư bắt đầu với nguồn tài nguyên dồi dào.\n\nHải ly tiêu thụ ít thức ăn và nước hơn.\n\nHạn Hán và Thủy Triều Đỏ hiếm khi xảy ra và nhanh kết thúc."

