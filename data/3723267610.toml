["MapMetadata.Oasis.Description"]
status = "normal"
raw = "Một ốc đảo xanh cô lập giữa vùng đất khô cằn, được nuôi sống bởi các Mạch Nước Ngầm mà hải ly có thể khai thác bằng kỹ thuật khéo léo."
enUS = "A green oasis isolated in the arid land, sustained by the underground springs that beavers can tap into with skilled techniques."
zhCN = "一个孤立在干旱土地中的绿色绿洲，由海狸可以巧妙开采的地下水源养活着。"
zhTW = "一個孤立的綠色綠洲，位於荒蕪的土地中，由海狸可以巧妙利用的地下水脈供養。"
ruRU = "«Изолированный зеленый оазис среди засушливых земель, питаемый подземными водами, которые бобры могут добывать с помощью ловкого мастерства.»"
jaJP = "「乾燥した土地の中に孤立した緑のオアシス、ビーバーが巧妙な技術で利用できる地下水脈によって生かされています。」"
frFR = "Une oasis verte isolée au milieu d'une terre aride, alimentée par des nappes phréatiques que les castors peuvent exploiter grâce à des techniques habiles."
deDE = "Eine isolierte grüne Oase inmitten des trockenen Landes, die von Grundwasserleitungen gespeist wird, die von Bibern geschickt erschlossen werden können."
plPL = "Zielona oaza pośrodku suchej ziemi, żyjąca dzięki wodom gruntowym, które bobry mogą wykorzystywać dzięki zwinnej technice."
ptBR = "Um oásis verde isolado em meio a terras áridas, sustentado por Fontes de Água Subterrâneas que os castores podem explorar com habilidade."
koKR = "거친 땅 한가운데에 고립된 푸른 오아시스, 비버가 정교한 기술로 개발할 수 있는 지하수에 의해 살아갑니다."
csCZ = "Zelená oáza izolovaná uprostřed suché krajiny, živená podzemními prameny, které bobři mohou těžit pomocí dovedné techniky."
viVN = "Một ốc đảo xanh cô lập giữa vùng đất khô cằn, được nuôi sống bởi các Mạch Nước Ngầm mà hải ly có thể khai thác bằng kỹ thuật khéo léo."

