["Building.SmallIndustrialPile.FlavorDescription"]
status = "normal"
raw = "\"Vậy là họ dựng cái mái lên rồi gọi là công nghiệp? Chiêu trò cũ rích.\" —Pina"
enUS = "\"So they built a roof and called it industry? Old trick.\" —Pina"
zhCN = "“他们就这样搭个屋顶就称之为工业？老把戏。” —Pina"
zhTW = "「這就是他們搭上屋頂然後稱之為工業？老把戲。」—皮娜"
ruRU = "\"Так они просто построили крышу и назвали это промышленностью? Старая уловка.\" —Пина"
jaJP = "「つまり、彼らは屋根を建てて工業と呼ぶのか？古いトリックだ。」—ピナ"
frFR = "\"Alors ils ont construit un toit et l'ont appelé industrie ? Une vieille ruse.\" —Pina"
deDE = "\"Also haben sie ein Dach draufgesetzt und es Industrie genannt? Alte Tricks.\" —Pina"
plPL = "„Więc zbudowali dach i nazwali to przemysłem? Stara sztuczka.” —Pina"
ptBR = "\"Então eles construíram um telhado e chamaram isso de indústria? Velha trapaça.\" —Pina"
koKR = "\"그래서 그들은 지붕을 올리고 산업이라고 부르나요? 진부한 속임수.\" —피나"
csCZ = "\"Takže postavili střechu a nazvali to průmyslem? Tohle je starý trik.\" —Pina"
viVN = "\"Vậy là họ dựng cái mái lên rồi gọi là công nghiệp? Chiêu trò cũ rích.\" —Pina"

