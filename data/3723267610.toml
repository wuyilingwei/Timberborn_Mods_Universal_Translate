plPL = "Torby pływackie są oddzielone, co pozwala na trening bez przeszkód."
ptBR = "As piscinas são separadas, permitindo o treinamento sem interrupções."
koKR = "수영장은 구역이 구분되어 있어 방해받지 않고 연습할 수 있습니다."
csCZ = "Plavecké dráhy jsou oddělené, což umožňuje trénink bez překážek."
