["Tutorial.Storage.Pile"]
status = "normal"
raw = "Nhiều công trình đang làm việc có sẵn kho chứa hàng hóa, nhưng rất hạn chế.\n\nXây Bãi Chứa Lớn để chứa thêm Khúc Gỗ.\n\nMỗi kho chỉ chứa một loại hàng. Bạn có thể chọn loại hàng khi bấm vào công trình."
enUS = "Many buildings that are working have storage for goods, but it is very limited.\n\nBuild a Large Storage to hold more Logs.\n\nEach storage can only hold one type of item. You can select the type of item by clicking on the building."
zhCN = "许多正在运作的建筑都有可用的货物存储，但非常有限。\n\n建造大型储存区以存放更多木材。\n\n每个库只能存放一种物品。您可以通过单击建筑选择物品类型。"
zhTW = "許多正在運作的建築物都有可用的貨物存儲，但非常有限。\n\n建造大型倉庫以存放更多的木材。\n\n每個倉庫只能存放一種貨物。您可以在點擊建築物時選擇貨物類型。"
ruRU = "Многие здания, которые работают, имеют доступные склады для хранения товаров, но их очень мало.\n\nПостройте Большой Склад для хранения дополнительных Бревен.\n\nКаждый склад может содержать только один тип товара. Вы можете выбрать тип товара, щелкнув по зданию."
jaJP = "「多くの作業施設には、商品を保管するためのストレージが用意されていますが、非常に制限されています。\n\n木材を追加で保管するために大きなストレージを建設しましょう。\n\n各ストレージには1種類のアイテムしか保管できません。施設をクリックすると、アイテムの種類を選択できます。」"
frFR = "De nombreuses constructions en cours disposent d'un entrepôt de stockage, mais sont très limitées.\n\nConstruisez un Grand Étagère pour stocker plus de Bûches.\n\nChaque entrepôt ne peut contenir qu'un seul type de marchandise. Vous pouvez choisir le type de marchandise en cliquant sur la construction."
deDE = "Viele Arbeiten haben Zugang zu Lagerhäusern, aber sie sind sehr begrenzt.\n\nBaue einen großen Lagerplatz, um mehr Holzstücke zu lagern.\n\nJedes Lager kann nur eine Art von Ware aufnehmen. Du kannst die Art der Ware auswählen, indem du auf das Bauwerk klickst."
plPL = "Wiele budowli w trakcie pracy ma dostępne magazyny, ale są one bardzo ograniczone.\n\nZbuduj Duży Magazyn, aby pomieścić więcej Kłód.\n\nKażdy magazyn może pomieścić tylko jeden rodzaj towaru. Możesz wybrać rodzaj towaru, klikając na budowlę."
ptBR = "Muitas construções em operação têm depósitos de armazenamento, mas são bastante limitadas.\n\nConstrua um Grande Depósito para armazenar mais Toras.\n\nCada depósito armazena apenas um tipo de item. Você pode escolher o tipo de item ao clicar na construção."
koKR = "작업 중인 여러 건물에서 물품 저장소를 이용할 수 있지만, 매우 제한적입니다.\n\n추가로 나무를 저장할 수 있도록 대형 저장소를 건설하세요.\n\n각 저장소는 하나의 물품만 저장할 수 있습니다. 건물에 클릭하여 저장할 물품을 선택할 수 있습니다."
csCZ = "Řada staveb, které pracují, má k dispozici sklad pro uchovávání zboží, ale je to velmi omezené.\n\nPostavte Velkou Skládku, abyste mohli uchovat více Kmenů.\n\nKaždý sklad může obsahovat pouze jeden typ zboží. Typ zboží si můžete vybrat kliknutím na stavbu."
viVN = "Nhiều công trình đang làm việc có sẵn kho chứa hàng hóa, nhưng rất hạn chế.\n\nXây Bãi Chứa Lớn để chứa thêm Khúc Gỗ.\n\nMỗi kho chỉ chứa một loại hàng. Bạn có thể chọn loại hàng khi bấm vào công trình."

["Tutorial.Storage.Tanks"]
status = "normal"
raw = "Mọi chất lỏng đều được chứa trong Bể, bao gồm cả nước bạn đang bơm."
enUS = "All liquids are stored in Tanks, including the water you are pumping."
zhCN = "所有液体都储存在水箱中，包括您正在抽取的水。"
zhTW = "所有液體都儲存在儲槽中，包括您正在抽取的水。"
ruRU = "Все жидкости хранятся в баке, включая воду, которую вы перекачиваете."
jaJP = "すべての液体はタンクに保存されます。ポンプで汲み上げている水も含まれています。"
frFR = "Tous les liquides sont stockés dans des réservoirs, y compris l'eau que vous pompez."
deDE = "Alle Flüssigkeiten werden in Tanks aufbewahrt, einschließlich des Wassers, das Sie pumpen."
plPL = "Wszystkie płyny są przechowywane w zbiornikach, w tym woda, którą pompujesz."
ptBR = "Todos os líquidos são armazenados em Tanques, incluindo a água que você está bombeando."
koKR = "모든 액체는 저장탱크에 보관되며, 당신이 펌프하는 물도 포함됩니다."
csCZ = "Veškeré kapaliny jsou uchovávány v nádržích, včetně vody, kterou čerpáte."
viVN = "Mọi chất lỏng đều được chứa trong Bể, bao gồm cả nước bạn đang bơm."

["Tutorial.Storage.Warehouses"]
status = "normal"
raw = "Cuối cùng, hãy chuẩn bị kho chứa Việt Quất, và sẵn sàng cho vụ thu hoạch Cà Rốt sắp tới.\n\nThực phẩm, cũng như nhiều loại hàng hóa đóng hộp khác - cần được lưu trữ trong Nhà Kho."
enUS = "Finally, prepare the Blueberry storage, and get ready for the upcoming Carrot harvest.\n\nFood, as well as many other types of canned goods - needs to be stored in the Warehouse."
zhCN = "最后，准备蓝莓仓库，并为即将到来的胡萝卜收成做好准备。\n\n食物以及其他许多罐装商品 - 需要储存在仓库中。"
zhTW = "最後，準備藍莓倉庫，並為即將到來的胡蘿蔔收穫做好準備。\n\n食物以及許多其他罐裝商品 - 需要存放在倉庫中。"
ruRU = "Наконец, подготовьте склад для черники и будьте готовы к предстоящему сбору моркови.\n\nПродукты, а также многие другие виды консервированных товаров - нужно хранить на складе."
jaJP = "最後に、ブルーベリーの倉庫を準備し、今後の人参の収穫に備えましょう。\n\n食料品や他の多くの缶詰商品は、倉庫に保管する必要があります。"
frFR = "Enfin, préparez l'entrepôt de myrtilles et préparez-vous pour la prochaine récolte de carottes.\n\nLes aliments, ainsi que de nombreux autres types de produits en conserve, doivent être entreposés dans un entrepôt."
deDE = "Bereitet schließlich das Heidelbeer-Lager vor und macht euch bereit für die bevorstehende Karottenernte.\n\nNahrungsmittel sowie viele andere Arten von eingelagerten Waren müssen im Lagerhaus aufbewahrt werden."
plPL = "Na koniec przygotuj magazyn jagód i bądź gotowy na nadchodzące zbiory marchwi.\n\nŻywność, podobnie jak wiele innych rodzajów zapakowanych towarów - musi być przechowywana w magazynie."
ptBR = "Por fim, prepare o armazém de Mirtilo e fique pronto para a colheita de Cenouras que se aproxima.\n\nAlimentos, assim como muitos outros tipos de produtos enlatados - precisam ser armazenados no Armazém."
koKR = "마지막으로, 블루베리 저장소를 준비하고 다가오는 당근 수확을 위해 준비하세요.\n\n음식과 다른 많은 종류의 통조림 상품은 창고에 보관해야 합니다."
csCZ = "Na závěr připravte sklad na borůvky a buďte připraveni na blížící se sklizeň mrkve. \n\nPotraviny, stejně jako mnoho dalších konzervovaných výrobků - je třeba skladovat ve skladu."
viVN = "Cuối cùng, hãy chuẩn bị kho chứa Việt Quất, và sẵn sàng cho vụ thu hoạch Cà Rốt sắp tới.\n\nThực phẩm, cũng như nhiều loại hàng hóa đóng hộp khác - cần được lưu trữ trong Nhà Kho."

