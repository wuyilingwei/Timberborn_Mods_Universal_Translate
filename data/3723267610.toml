["Tutorial.PowerAndPlanks.LumberMill"]
status = "normal"
raw = "Đã đến lúc sản xuất Ván Gỗ!\n\nXây Xưởng Gỗ ngay cạnh Bánh Xe Nước. Bạn cũng có thể xây xa hơn và nối bằng Trục Truyền Động.\n\nGợi ý: Nhiều công trình như Xưởng Gỗ và Nhà Tổ có thể truyền năng lượng trực tiếp khi đặt sát nhau, không cần Trục Truyền Động."
enUS = "It's time to produce Planks!\n\nBuild a Lumber Mill right next to the Water Wheel. You can also build it further away and connect it with a Gear.\n\nTip: Many buildings like the Lumber Mill and the Storage House can transfer power directly when placed next to each other, without needing a Gear."
zhCN = "是时候生产木板了！\n\n在水轮旁边建造木材厂。你也可以建得更远并通过传动轴连接。\n\n提示：许多建筑物，如木材厂和储藏室，放置在一起时可以直接传递能量，无需传动轴。"
zhTW = "現在是時候生產木板了！\n\n在水車旁邊建造木材工廠。你也可以建得更遠，並用傳動軸連接。\n\n提示：許多建築物，例如木材工廠和儲物屋，當緊鄰時可以直接傳輸能量，無需傳動軸。"
ruRU = "Время производить доски из дерева!\n\nПостройте лесопилку рядом с водяным колесом. Вы также можете построить её дальше и соединить с помощью передаточного вала.\n\nСовет: Многие здания, такие как лесопилка и хранилище, могут передавать энергию напрямую, если они расположены рядом, без необходимости в передаточном валу."
jaJP = "木材を生産する時が来ました！\n\n水車のすぐ隣に製材所を建設します。もっと遠くに建てて、動力軸で繋げることもできます。\n\nヒント：製材所や巣箱などの多くの建物は、隣接して配置することで直接エネルギーを伝えることができ、動力軸は必要ありません。"
frFR = "Il est temps de produire des Planches de Bois !\n\nConstruisez le Moulin à Bois juste à côté de la Roue à Eau. Vous pouvez également construire plus loin et relier avec un Axe de Transmission.\n\nAstuce : De nombreuses constructions comme le Moulin à Bois et la Maison de Rangement peuvent transmettre de l'énergie directement lorsqu'elles sont placées côte à côte, sans avoir besoin d'un Axe de Transmission."
deDE = "Es ist Zeit, Holzplatten zu produzieren!\n\nBaue die Sägerei direkt neben das Wasserrad. Du kannst auch weiter weg bauen und sie mit einer Welle verbinden.\n\nTipp: Viele Gebäude wie die Sägerei und das Lagerhaus können Energie direkt übertragen, wenn sie nebeneinander platziert werden, ohne dass eine Welle erforderlich ist."
plPL = "To czas na produkcję desek!\n\nZbuduj tartak obok koła wodnego. Możesz również zbudować go dalej i połączyć za pomocą wału przekładniowego.\n\nWskazówka: Wiele budowli, takich jak tartak i dom rodzinny, może bezpośrednio przekazywać energię, gdy są ustawione blisko siebie, bez potrzeby wału przekładniowego."
ptBR = "É hora de produzir Tábuas de Madeira!\n\nConstrua o Museu de Madeira ao lado da Roda d'Água. Você também pode construir mais longe e conectar com um Eixo de Transmissão.\n\nDica: Muitas construções, como o Museu de Madeira e a Casa de Armazenamento, podem transmitir energia diretamente quando colocadas lado a lado, sem necessidade de Eixo de Transmissão."
koKR = "이제 나무 판자를 생산할 시간입니다!\n\n수차 옆에 제재소를 건설하세요. 더 멀리 지을 수도 있으며 전달축으로 연결할 수 있습니다.\n\n팁: 제재소와 둥지 같은 많은 건물은 서로 인접하여 배치할 경우 전달축 없이 직접 에너지를 전달할 수 있습니다."
csCZ = "Je čas začít vyrábět dřevěné desky!\n\nPostavte pilu vedle vodního kola. Můžete také postavit dál a spojit to pomocí hřídele.\n\nTip: Mnoho budov, jako je pila a úl, může přímo přenášet energii, pokud jsou umístěny blízko sebe, bez potřeby hřídele."
viVN = "Đã đến lúc sản xuất Ván Gỗ!\n\nXây Xưởng Gỗ ngay cạnh Bánh Xe Nước. Bạn cũng có thể xây xa hơn và nối bằng Trục Truyền Động.\n\nGợi ý: Nhiều công trình như Xưởng Gỗ và Nhà Tổ có thể truyền năng lượng trực tiếp khi đặt sát nhau, không cần Trục Truyền Động."

["Tutorial.PowerAndPlanks.WaterWheel"]
status = "normal"
raw = "Các công trình nâng cao yêu cầu năng lượng, và hải ly thường lấy năng lượng từ dòng sông.\n\nĐặt Bánh Xe Nước vào dòng chảy ven sông."
enUS = "Advanced buildings require power, and beavers often obtain energy from the river.\n\nPlace the Water Wheel in the river flow."
zhCN = "高级建筑需要能量，而海狸通常从河流中获取能量。\n\n将水车放入河流的水流中。"
zhTW = "高級建築需要能源，而海狸通常從河流中獲取能量。\n\n將水車放置在河流的水流中。"
ruRU = "Расширенные сооружения требуют энергии, и бобры часто получают энергию из реки.\n\nУстановите водяное колесо в поток у реки."
jaJP = "高度な建物はエネルギーを必要とし、ビーバーは通常川の流れからエネルギーを得ます。\n\n川の流れに水車を設置します。"
frFR = "Les structures avancées nécessitent de l'énergie, et les castors tirent généralement leur énergie du courant de la rivière.\n\nPlacez la Roue à Eau dans le courant près de la rivière."
deDE = "Erweiterte Gebäude benötigen Energie, und die Biber beziehen ihre Energie oft aus dem Fluss.\n\nPlatziere das Wasserrad im Flusslauf."
plPL = "Zaawansowane budowle wymagają energii, a bobry często czerpią energię z rzeki.\n\nUmieść Koło Wodnego w nurcie rzeki."
ptBR = "As construções avançadas requerem energia, e os castores costumam obter energia do rio.\n\nColoque a Roda d'Água no fluxo ao longo do rio."
koKR = "상급 건물은 에너지를 요구하며, 비버는 보통 강의 흐름에서 에너지를 얻습니다.\n\n강가의 흐름에 수차를 배치하세요."
csCZ = "Pokročilé budovy vyžadují energii, a bobři obvykle získávají energii z toku řeky.\n\nUmístěte vodní kolo do toku podél řeky."
viVN = "Các công trình nâng cao yêu cầu năng lượng, và hải ly thường lấy năng lượng từ dòng sông.\n\nĐặt Bánh Xe Nước vào dòng chảy ven sông."

