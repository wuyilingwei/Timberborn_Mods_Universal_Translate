status = "normal"

["Tutorial.PowerAndPlanks.LumberMill"]
new = "Đã đến lúc sản xuất Ván Gỗ!\n\nXây Xưởng Gỗ ngay cạnh Bánh Xe Nước. Bạn cũng có thể xây xa hơn và nối bằng Trục Truyền Động.\n\nGợi ý: Nhiều công trình như Xưởng Gỗ và Nhà Tổ có thể truyền năng lượng trực tiếp khi đặt sát nhau, không cần Trục Truyền Động."
status = "normal"

["Tutorial.PowerAndPlanks.WaterWheel"]
new = "Các công trình nâng cao yêu cầu năng lượng, và hải ly thường lấy năng lượng từ dòng sông.\n\nĐặt Bánh Xe Nước vào dòng chảy ven sông."
