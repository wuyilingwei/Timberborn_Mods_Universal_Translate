["NaturalResource.Birch.FlavorDescription"]
status = "normal"
raw = "\"Nhớ nhé, mấy đứa, đừng bóc quá nhiều vỏ cây! Sẽ làm hại cây đấy!\" —Ma' Ngonel"
enUS = "\"Remember, kids, don't strip too much bark! It'll harm the tree!\" —Ma' Ngonel"
zhCN = "“记住了，小家伙们，不要剥太多树皮！这样会伤害到树的！”—马·格诺尔"
zhTW = "\"記住，小朋友們，不要剝太多樹皮！會損害樹木的！\" — Ma' Ngonel"
ruRU = "\"Помните, ребята, не снимайте слишком много коры! Это повредит дереву!\" —Ма' Нгонел"
jaJP = "「覚えておいてね、みんな、樹皮を剥ぎすぎないように！木に悪影響を与えるから！」 — マ・ゴネール"
frFR = "\"Souviens-toi, les enfants, ne retirez pas trop d'écorce ! Ça va nuire à l'arbre !\" —Ma' Ngonel"
deDE = "\"Erinnert euch, Kinder, reißt nicht zu viel Rinde ab! Das schadet den Bäumen!\" —Ma' Ngonel"
plPL = "„Pamiętajcie, dzieci, nie zdzierajcie za dużo kory! To zaszkodzi drzewu!” —Ma' Ngonel"
ptBR = "\"Lembre-se, pessoal, não retire muita casca! Isso vai prejudicar a árvore!\" —Ma' Ngonel"
koKR = "\"기억해, 친구들, 나무껍질을 너무 많이 벗기지 마! 나무에 해가 될 거야!\" —마' 농넬"
csCZ = "\"Pamatujte, děti, neodstraňujte příliš mnoho kůry! Ublížíte tím stromu!\" —Ma' Ngonel"
viVN = "\"Nhớ nhé, mấy đứa, đừng bóc quá nhiều vỏ cây! Sẽ làm hại cây đấy!\" —Ma' Ngonel"

