["NaturalResource.Coffee.FlavorDescription"]
status = "normal"
raw = "Hải ly cổ đại nhai hạt để tăng năng lượng, còn Nanh Sắt thì nghĩ ra cách pha chế tốt hơn."
enUS = "The ancient beaver chews the beans to gain energy, while the Iron Fang has come up with a better brewing method."
zhCN = "古代海狸咀嚼种子以增加能量，而铁牙则想出了更好的调配方法。"
zhTW = "古老的海狸咀嚼種子以增加能量，而鋼牙則想出了更好的調配方法。"
ruRU = "Древние бобры пережевывают зерна для повышения энергии, в то время как Железный Клык придумывает лучший способ приготовления."
jaJP = "古代のビーバーはエネルギーを高めるために豆を噛んでいましたが、アイアンファングはより良い淹れ方を考案しました。"
frFR = "Les castors anciens mâchent des grains pour augmenter leur énergie, tandis que les dents de fer ont trouvé une meilleure façon de les préparer."
deDE = "Die uralten Biber kauen die Bohnen, um Energie zu tanken, während der Eisenzahn eine bessere Zubereitungsmethode entwickelt hat."
plPL = "Pradawne bobry żują ziarna, aby zwiększyć energię, a Żelazne Kły wymyśliły lepszy przepis na napój."
ptBR = "Castores antigos mordem os grãos para aumentar a energia, enquanto o Dente de Ferro pensou em uma forma melhor de preparar."
koKR = "고대 비버는 에너지를 높이기 위해 씨앗을 씹었고, 철제 송곳니는 더 나은 혼합 방법을 생각해냈다."
csCZ = "Pradávný bobr žvýká zrno, aby zvýšil energii, zatímco Ocelový tesák vymyslel lepší způsob přípravy."
viVN = "Hải ly cổ đại nhai hạt để tăng năng lượng, còn Nanh Sắt thì nghĩ ra cách pha chế tốt hơn."

