["MainMenu.SteamUpdateInfoText"]
status = "normal"
raw = "• Các đối tượng mới trên bảo đồ, có thể tương tác\n• Tự động hóa: Cảm Biến, Rơ-le, Bộ Hẹn Giờ,...\n• Bản đồ mới: Ốc đảo, Pressure, Spillage,...\n• Cầu Thang Xoắn, Cổng, Bộ Ly Hợp, Banner\n• Cập nhật quy trình modding\n• Cải tiến đồ họa, hướng dẫn và công cụ nhân bản\n• Thành tựu Steam"
enUS = "• New objects on the map, can interact\n• Automation: Sensors, Relays, Timers,...\n• New maps: Oasis, Pressure, Spillage,...\n• Spiral Staircase, Gate, Clutch, Banner\n• Updated modding process\n• Graphic improvements, tutorials, and cloning tools\n• Steam achievements"
zhCN = "• 地图上新的可交互对象\n• 自动化：传感器，继电器，定时器，…\n• 新地图：绿洲，压力，溢出，…\n• 螺旋楼梯，门，离合器，横幅\n• 更新修改流程\n• 图形改进，指南和复制工具\n• Steam成就"
zhTW = "• 地圖上可以互動的新物件  \n• 自動化：感測器、繼電器、計時器...  \n• 新地圖：綠洲、壓力、溢出...  \n• 螺旋樓梯、大門、離合器、橫幅  \n• 更新mod製作流程  \n• 改進圖形、指南和複製工具  \n• Steam成就"
ruRU = "• Новые объекты на карте, доступные для взаимодействия  \n• Автоматизация: Датчики, Реле, Таймеры,...  \n• Новые карты: Остров, Давление, Пролив,...  \n• Спиральная лестница, Ворота, Муфта, Баннер  \n• Обновление процесса моддинга  \n• Улучшение графики, руководство и инструменты для создания  \n• Достижения Steam"
jaJP = "• マップ上の新しいオブジェクト、インタラクション可能\n• 自動化: センサー、リレー、タイマー、...\n• 新しいマップ: オアシス、プレッシャー、スピル、...\n• 螺旋階段、ゲート、クラッチ、バナー\n• モッド作成プロセスの更新\n• グラフィックの改善、ガイド、クローンツール\n• Steam実績"
frFR = "• Nouveaux éléments sur la carte, interactifs  \n• Automatisation : Capteurs, Relais, Minuteries,...  \n• Nouvelles cartes : Oasis, Pression, Déversement,...  \n• Escalier en colimaçon, Portail, Embrayage, Bannière  \n• Mise à jour du processus de modding  \n• Améliorations graphiques, tutoriels et outils d'édition  \n• Succès Steam"
deDE = "• Neue Objekte auf der Karte, die interaktiv sind  \n• Automatisierung: Sensoren, Relais, Timer,...  \n• Neue Karten: Oase, Druck, Überlauf,...  \n• Wendeltreppen, Tore, Kupplungen, Banner  \n• Aktualisierung des Modding-Prozesses  \n• Verbesserte Grafiken, Tutorials und Klon-Tools  \n• Steam-Erfolge"
plPL = "• Nowe obiekty na mapie, z możliwością interakcji  \n• Automatyzacja: Czujniki, Przekaźniki, Timery,...  \n• Nowe mapy: Oaza, Ciśnienie, Wycieki,...  \n• Schody spiralne, Brama, Sprzęgło, Baner  \n• Aktualizacja procesu modowania  \n• Ulepszenia grafiki, przewodniki i narzędzia do klonowania  \n• Osiągnięcia Steam"
ptBR = "• Novos objetos no mapa, interativos\n• Automação: Sensores, Relaés, Temporizadores,...\n• Novos mapas: Oásis, Pressão, Derramamento,...\n• Escada em espiral, Portão, Acoplador, Bandeira\n• Atualização do processo de modding\n• Melhorias gráficas, tutoriais e ferramentas de clonagem\n• Conquistas do Steam"
koKR = "• 지도에서 상호 작용할 수 있는 새로운 객체  \n• 자동화: 센서, 릴레이, 타이머 등  \n• 새로운 지도: 오아시스, 압력, 유출 등  \n• 나선형 계단, 게이트, 커플러, 배너  \n• 모드 프로세스 업데이트  \n• 그래픽 개선, 가이드 및 복제 도구  \n• 스팀 업적"
csCZ = "• Nové objekty na mapě, interaktivní\n• Automatizace: Senzory, Relé, Časovače,...\n• Nové mapy: Ostrov, Tlak, Úniky,...\n• Točité schody, Brána, Spojka, Banner\n• Aktuální proces modifikace\n• Vylepšení grafiky, nápovědy a nástroje pro klonování\n• Steam úspěchy"
viVN = "• Các đối tượng mới trên bản đồ, có thể tương tác  \n• Tự động hóa: Cảm Biến, Rơ-le, Bộ Hẹn Giờ,...  \n• Bản đồ mới: Ốc đảo, Pressure, Spillage,...  \n• Cầu Thang Xoắn, Cổng, Bộ Ly Hợp, Banner  \n• Cập nhật quy trình modding  \n• Cải tiến đồ họa, hướng dẫn và công cụ nhân bản  \n• Thành tựu Steam"

