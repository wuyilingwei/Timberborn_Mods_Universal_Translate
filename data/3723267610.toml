["Building.WindTunnel.FlavorDescription"]
status = "normal"
raw = "\"Tôi tin tôi có thể bay. Chỉ cần tính được vận tốc thoát ly.\" —Ol' Kazko"
enUS = "\"I believe I can fly. I just need to calculate the escape velocity.\" —Ol' Kazko"
zhCN = "“我相信我可以飞。只需计算逃逸速度。” —老卡兹科"
zhTW = "「我相信我可以飛。只要計算出逃逸速度。」—老卡茲科"
ruRU = "\"Я верю, что могу летать. Нужно только рассчитать скорость скорости ухода.\" —Старый Казко"
jaJP = "「飛べると信じている。ただ、脱出速度を計算しないと。」—オル'カズコ"
frFR = "\"Je crois que je peux voler. Il suffit de calculer la vitesse de fuite.\" —Ol' Kazko"
deDE = "\"Ich glaube, ich kann fliegen. Man muss nur die Entwertungsgeschwindigkeit berechnen.\" —Ol' Kazko"
plPL = "„Wierzę, że mogę latać. Muszę tylko obliczyć prędkość ucieczki.” —Ol' Kazko"
ptBR = "\"Acredito que posso voar. Apenas preciso calcular a velocidade de fuga.\" —Ol' Kazko"
koKR = "\"나는 날 수 있다고 믿어. 탈출 속도만 계산하면 돼.\" —올 카즈코"
csCZ = "\"Věřím, že mohu létat. Stačí vypočítat únikovou rychlost.\" —Ol' Kazko"
viVN = "\"Tôi tin tôi có thể bay. Chỉ cần tính được vận tốc thoát ly.\" —Ol' Kazko"

