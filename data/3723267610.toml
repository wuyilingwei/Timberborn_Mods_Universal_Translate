["Building.SwimmingPoll.FlavorDescription"]
status = "normal"
raw = "\"Vui đấy, nhưng ta nên luyện thêm kiểu tailstroke nhé!\" —Pina"
enUS = "\"That's fun, but we should practice the tailstroke more!\" —Pina"
zhCN = "“挺有趣的，但我们应该多练习一下尾泳！” —Pina"
zhTW = "\"這很好，但我們應該再練習一下尾泳！\" —Pina"
ruRU = "\"Звучит весело, но нам стоит попрактиковаться с таким стилем, как брасс!\" —Пина"
jaJP = "「楽しいけど、もっとクロールを練習した方がいいよ！」 — ピナ"
frFR = "\"C'est sympa, mais nous devrions nous entraîner un peu plus à la nage en dos, non ?\" —Pina"
deDE = "\"Das macht Spaß, aber wir sollten noch mehr im Kraulstil üben!\" —Pina"
plPL = "\"Fajnie, ale powinniśmy jeszcze poćwiczyć styl pływacki!\" —Pina"
ptBR = "\"É divertido, mas devemos praticar mais o estilo de nado com pernas!\" —Pina"
koKR = "\"재미있긴 한데, 우리는 좀 더 테일스트로크 연습을 해야 해!\" —피나"
csCZ = "\"To je zábava, ale měli bychom si procvičit i stylový záběr!\" —Pina"
viVN = "\"Vui đấy, nhưng ta nên luyện thêm kiểu tailstroke nhé!\" —Pina"

["Building.SwimmingPool.Description"]
