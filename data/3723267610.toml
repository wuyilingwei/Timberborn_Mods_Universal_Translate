["MapMetadata.MountainRange.Description"]
status = "normal"
raw = "Trong tuyệt vọng tìm kiếm nước ngọt, hải ly sẵn sàng leo lên cả những dãy núi cao nhất."
enUS = "In a desperate search for fresh water, beavers are willing to climb even the highest mountains."
zhCN = "在绝望中寻找淡水，海狸愿意攀登高耸的山脉。"
zhTW = "在絕望尋找淡水的過程中，海狸願意攀登至最崇高的山脈。"
ruRU = "В отчаянии, ища пресную воду, бобры готовы взобраться даже на самые высокие горные хребты."
jaJP = "絶望的に淡水を求めて、ビーバーは最も高い山脈を登る覚悟がある。"
frFR = "Dans une quête désespérée d'eau douce, les castors sont prêts à gravir les plus hauts sommets."
deDE = "Im verzweifelten Streben nach Süßwasser sind die Biber bereit, sogar die höchsten Berge zu erklimmen."
plPL = "W desperackim poszukiwaniu słodkiej wody, bobry są gotowe wspinać się na najwyższe góry."
ptBR = "Na busca desesperada por água doce, os castores estão prontos para escalar até as cadeias de montanhas mais altas."
koKR = "담수의 절망적인 탐색 속에서 비버는 가장 높은 산맥조차 오를 준비가 되어 있다."
csCZ = "V zoufalé snaze o sladkou vodu jsou bobři připraveni vystoupat i na ty nejvyšší hory."
viVN = "Trong tuyệt vọng tìm kiếm nước ngọt, hải ly sẵn sàng leo lên cả những dãy núi cao nhất."

