["Building.LumberMill.FlavorDescription"]
status = "normal"
raw = "Được Ol’ Kazko thúc đẩy, việc cơ giới hóa chế biến gỗ đã khiến các hải ly lớn tuổi “nghiến răng” không ít."
enUS = "Driven by Ol’ Kazko, the mechanization of wood processing has caused the elderly beavers to 'grind their teeth' quite a bit."
zhCN = "在老卡兹科的推动下，木材加工的机械化让年长的海狸们感到不满。"
zhTW = "在老卡兹科的推動下，木材加工的機械化讓年長的海狸們“咬牙切齒”了不少。"
ruRU = "«Под влиянием Ол’ Казко, механизация обработки древесины заставила пожилых бобров «скрипеть зубами» не раз.»"
jaJP = "オル・カズコに触発され、木材の機械化が進んだことで、高齢のビーバーたちが「歯ぎしり」することが少なくありません。"
frFR = "Motivé par Ol' Kazko, la mécanisation du traitement du bois a fait grincer des dents aux castors âgés."
deDE = "Angetrieben von Ol’ Kazko hat die Mechanisierung der Holzverarbeitung dazu geführt, dass die älteren Biber oft 'die Zähne zusammenbeißen'."
plPL = "Napędzane przez Ol’ Kazko, zmechanizowanie obróbki drewna sprawiło, że starsze bobry 'zębią' niejednokrotnie."
ptBR = "Impulsionado por Ol' Kazko, a mecanização do processamento de madeira fez com que os castores mais velhos 'rangem' bastante."
koKR = "올드 카즈코의 추진력으로, 목재 가공의 기계화는 노령 비버들이 '이를 갈도록' 만들었다."
csCZ = "Pod vedením Ol' Kazka vedlo mechanizování zpracování dřeva k tomu, že starší bobři 'skřípou' více než dříve."
viVN = "Được Ol’ Kazko thúc đẩy, việc cơ giới hóa chế biến gỗ đã khiến các hải ly lớn tuổi “nghiến răng” không ít."

