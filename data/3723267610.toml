["NaturalResource.Mangrove.FlavorDescription"]
status = "normal"
raw = "Hạt giống được mang đến bởi những lữ khách từ vùng đất xa xôi, nơi sông ngòi không bao giờ cạn."
enUS = "Seeds brought by travelers from distant lands, where rivers never run dry."
zhCN = "“种子由来自遥远土地的旅行者带来，那里的河流永不干涸。”"
zhTW = "種子是由來自遙遠土地的旅者帶來的，那里河流永不枯竭。"
ruRU = "Семена были принесены путешественниками из далёких земель, где реки никогда не пересыхают."
jaJP = "「種子は遠くの土地からの旅人によって運ばれ、川は決して尽きることがない場所から来ています。」"
frFR = "Des graines apportées par des voyageurs de terres lointaines, où les rivières ne sèchent jamais."
deDE = "Die Samen wurden von Reisenden aus fernen Ländern gebracht, wo die Flüsse niemals austrocknen."
plPL = "Nasiona przyniesione przez wędrowców z odległych krain, gdzie rzeki nigdy nie wysychają."
ptBR = "As sementes foram trazidas por viajantes de terras distantes, onde os rios nunca secam."
koKR = "씨앗은 강이 마르지 않는 먼 땅에서 온 여행자들에 의해 가져와졌습니다."
csCZ = "Semena byla přivezena cestovateli z daleké země, kde řeky nikdy nevysychají."
viVN = "Hạt giống được mang đến bởi những lữ khách từ vùng đất xa xôi, nơi sông ngòi không bao giờ cạn."

