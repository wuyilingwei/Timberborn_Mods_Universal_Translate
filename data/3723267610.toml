["Building.Metalsmith.FlavorDescription"]
status = "normal"
raw = "“Muốn bền thì cứ làm bằng kim loại. Hooman đã nhận ra điều đó từ lâu.” —Ol' Kazko"
enUS = "“If you want durability, just make it out of metal. Humans realized that a long time ago.” —Ol' Kazko"
zhCN = "“想要耐用就得用金属。Hooman 很早就发现了这一点。” —Ol' Kazko"
zhTW = "“要耐用就用金屬製作。Hooman早已意識到了這一點。” —Ol' Kazko"
ruRU = "«Если хочешь, чтобы было прочным, делай из металла. Человек это понял давно.» —Старый Казко"
jaJP = "「丈夫にしたいなら、金属で作れ。人間はそれをずっと前から理解している。」—オル'カズコ"
frFR = "« Pour être durable, il faut le faire en métal. Hooman s'en est rendu compte depuis longtemps. » —Ol' Kazko"
deDE = "„Wenn es langlebig sein soll, dann benutze Metall. Hooman hat das schon lange erkannt.“ —Ol' Kazko"
plPL = "„Aby było trwałe, zrób to z metalu. Hooman już od dawna to dostrzegł.” —Ol' Kazko"
ptBR = "“Para ser durável, basta fazer de metal. Hooman percebeu isso há muito tempo.” —Ol' Kazko"
koKR = "“내구성이 필요하면 금속으로 만들면 돼. 인간은 오래전부터 그것을 깨달았다.” —올 카즈코"
csCZ = "„Chceš-li trvanlivost, dělej to z kovu. Hooman to zjistil už dávno.“ —Ol' Kazko"
viVN = "“Muốn bền thì cứ làm bằng kim loại. Hooman đã nhận ra điều đó từ lâu.” —Ol' Kazko"

