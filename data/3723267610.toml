["Tutorial.MoreBeavers.GrowPopulation"]
status = "normal"
raw = "Hải ly sẽ không sinh sản nếu không còn chỗ ở trống. \n\nĐuôi Mộc cần hai cá thể trưởng thành và một chỗ ở trống để sinh con.\n\nGợi ý: Con của hải ly được gọi là Hải ly con."
enUS = "Beavers will not reproduce if there is no available housing.\n\nA log tail requires two adult individuals and one available housing to give birth.\n\nTip: A baby beaver is called a kit."
zhCN = "海狸没有空余住所就不会繁殖。\n\n木尾需要两个成年个体和一个空余住所才能繁殖。\n\n提示：海狸的幼崽被称为海狸仔。"
zhTW = "海狸如果沒有空餘的住所則不會繁殖。\n\n木尾需要兩隻成年個體和一個空餘的住所來生育。\n\n提示：海狸的幼崽稱為海狸仔。"
ruRU = "Бобры не будут размножаться, если нет свободных мест для жилья. \n\nДля рождения потомства жесткошерстному бобру нужно два совершеннолетних особи и одно свободное место. \n\nСовет: Дети бобров называются бобренком."
jaJP = "ビーバーは空いている住居がないと繁殖しません。\n\nムクの尻尾は、2匹の成体と1つの空き家が必要です。\n\nヒント: ビーバーの子供は「ビーバーの子」と呼ばれます。"
frFR = "Les castors ne se reproduiront pas s'il n'y a pas de logement disponible. \n\nUn castor des rivières a besoin de deux adultes et d'un logement libre pour avoir des petits.\n\nConseil : Le petit du castor s'appelle un kit."
deDE = "Biber werden sich nicht fortpflanzen, wenn kein Platz für Wohnraum mehr vorhanden ist.\n\nEin Holzschwanz benötigt zwei erwachsene Exemplare und einen freien Wohnraum, um Nachkommen zu zeugen.\n\nTipp: Die Nachkommen der Biber werden als Bibervolk bezeichnet."
plPL = "Bóbr nie rozmnaża się, jeśli nie ma wolnych miejsc do życia.\n\nBóbr Mąż potrzebuje dwóch dorosłych osobników i jednego wolnego miejsca, aby się rozmnożyć.\n\nSugestia: Młode bobra nazywane jest Bobrzątkiem."
ptBR = "Os castores não irão reproduzir se não houver moradia disponível.\n\nUm Castor Mãe precisa de dois indivíduos adultos e um espaço vazio para dar à luz.\n\nDica: O filhote dos castores é chamado de Filhote de Castor."
koKR = "비버는 빈 공간이 없으면 번식하지 않습니다. \n\n목재 비버는 두 마리의 성체와 한 개의 빈 집이 필요합니다. \n\n힌트: 비버의 새끼는 비버 새끼라고 불립니다."
csCZ = "Bobři se nebude rozmnožovat, pokud nebude k dispozici volné místo. \n\nDřevěný ocas potřebuje dva dospělé jedince a jedno volné místo k rozmnožení.\n\nTip: Mladí bobři se nazývají bobří mláďata."
viVN = "Hải ly sẽ không sinh sản nếu không còn chỗ ở trống.\n\nĐuôi Mộc cần hai cá thể trưởng thành và một chỗ ở trống để sinh con.\n\nGợi ý: Con của hải ly được gọi là Hải ly con."

