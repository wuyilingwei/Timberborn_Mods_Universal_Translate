["Tutorial.Science.Inventor"]
new = "Hải ly là những kỹ sư của thế giới động vật. Đã đến lúc biến ý tưởng “lumberpunk” của chúng thành hiện thực.\n\nXây Xưởng Phát Minh để tạo Điểm Khoa Học."
status = "normal"

["Tutorial.Science.SciencePoints"]
new = "Tạm thời, hãy để Xưởng Phát Minh làm việc.\n\nKhi tích lũy đủ Điểm Khoa Học, bạn có thể dùng chúng để mở khóa công trình cao cấp hơn."
