["MapMetadata.HelixMountain.Description"]
status = "normal"
raw = "Dù điều kiện lòng sông có vẻ không thuận lợi, hải ly vẫn tự tin rằng kỹ thuật kiểm soát dòng nước của họ vượt trội hơn loài người. "
enUS = "Although the river conditions may seem unfavorable, the beavers are confident that their water control techniques are superior to those of humans."
zhCN = "尽管河流的环境看起来不太理想，但海狸仍然自信他们的水流控制技术优于人类。"
zhTW = "儘管河流的條件看似不佳，海狸仍然相信他們的水流控制技術優於人類。"
ruRU = "Хотя условия в реке кажутся неблагоприятными, бобр все равно уверен, что его техника управления потоком воды превосходит человеческую."
jaJP = "「川の状況は厳しそうだが、ビーバーは彼らの水流制御技術が人間よりも優れていると自信を持っている。」"
frFR = "Bien que les conditions de la rivière semblent défavorables, les castors sont convaincus que leur technique de contrôle des eaux est supérieure à celle des humains."
deDE = "Obwohl die Bedingungen im Flussbett nicht günstig erscheinen, sind die Biber überzeugt, dass ihre Wassersteuerungstechnik der der Menschen überlegen ist."
plPL = "Chociaż warunki w rzece wydają się niekorzystne, bobry wciąż są pewne, że ich technika kontroli wody przewyższa ludzką."
ptBR = "Embora as condições do leito do rio pareçam desfavoráveis, o castor acredita confiantemente que sua técnica de controle da correnteza é superior à dos humanos."
koKR = "강의 상태가 불리하게 보이지만, 비버는 여전히 그들의 물 흐름 제어 기술이 인간보다 우수하다고 자신하고 있습니다."
csCZ = "Ačkoli se podmínky v řece zdají být nepříznivé, bobři si jsou jisti, že jejich technika regulace toku vody je lepší než u lidí."
viVN = "Dù điều kiện lòng sông có vẻ không thuận lợi, hải ly vẫn tự tin rằng kỹ thuật kiểm soát dòng nước của họ vượt trội hơn loài người."

