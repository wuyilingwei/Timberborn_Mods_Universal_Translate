["Building.GearWorkshop.FlavorDescription"]
status = "normal"
raw = "\"Wooden gear's solid!\" là câu cửa miệng của Ol' Kazko khi thúc đẩy công nghiệp hóa."
enUS = "'Wooden gear's solid!' is Ol' Kazko's catchphrase when promoting industrialization."
zhCN = "“木齿轮坚固！”是老卡兹科在推动工业化时的口头禅。"
zhTW = "「木製齒輪堅固無比！」是老卡茲科推動工業化時常說的口頭禪。"
