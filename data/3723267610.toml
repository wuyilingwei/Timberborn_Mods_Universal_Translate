["Building.TappersShack.FlavorDescription"]
status = "normal"
raw = "Hải ly con được dạy từ sớm rằng từng giọt đều quý giá — dù là nước hay nhựa cây."
enUS = "Young beavers are taught early on that every drop is precious — whether it's water or tree sap."
zhCN = "小海狸从小就被教导，每一滴都是宝贵的——无论是水还是树脂。"
zhTW = "小海狸從小就被教導每一滴都是珍貴的—無論是水還是樹脂。"
ruRU = "Бобры учат с раннего возраста, что каждая капля имеет значение — будь то вода или древесный сок."
jaJP = "子供のビーバーは、早くから一滴一滴が貴重であると教えられています — 水でも樹液でも。"
frFR = "Le petit castor apprend dès son jeune âge que chaque goutte compte - qu'il s'agisse d'eau ou de sève."
deDE = "Die kleinen Biber lernen von klein auf, dass jeder Tropfen kostbar ist — sei es Wasser oder Baumharz."
plPL = "Młode bobry uczą się od najmłodszych lat, że każda kropla jest cenna — czy to woda, czy żywica."
ptBR = "O castor é ensinado desde cedo que cada gota é preciosa — seja água ou resina."
koKR = "어린 비버는 물이나 수액이든 상관없이 모든 방울이 소중하다는 것을 어릴 때부터 배운다."
csCZ = "Mladí bobři se učí od malička, že každý kapka má svou cenu — ať už je to voda nebo míza."
viVN = "Hải ly con được dạy từ sớm rằng từng giọt đều quý giá — dù là nước hay nhựa cây."

