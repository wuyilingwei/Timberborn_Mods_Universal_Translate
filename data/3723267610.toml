["NaturalResource.Cassava.FlavorDescription"]
status = "normal"
raw = "Không ăn được sống, Nanh Sắt đã phải thử nghiệm quy trình lên men cho Sắn."
enUS = "Not edible raw, Iron Fang had to experiment with the fermentation process for Cassava."
zhCN = "无法生吃，铁齿已经尝试了对木薯进行发酵的过程。"
zhTW = "不能生吃，鐵牙必須嘗試對太白粉的發酵過程。"
ruRU = "Нельзя есть сырым, Железный Клык должен был испытать процесс ферментации для Маниока."
jaJP = "生では食べられないため、アイアンテイルはキャッサバの醗酵プロセスを試す必要がありました。"
frFR = "Non comestible cru, Nanh Sắt a dû expérimenter un processus de fermentation pour le Manioc."
deDE = "Nicht roh essbar, hat Nanh Sắt einen Fermentationsprozess für Maniok ausprobiert."
plPL = "Nie nadaje się do jedzenia na surowo, Nanh Sắt musiał przeprowadzić eksperymenty z procesem fermentacji manioku."
ptBR = "Não pode ser consumido cru, os Nanh Sắt tiveram que testar um processo de fermentação para a Mandioca."
koKR = "생으로는 먹을 수 없는 카사바는 강철이 실험한 발효 과정을 통해 시험해 보았습니다."
csCZ = "Není jedlý syrový, Ocelový hřeb se musel pokusit o fermentační proces pro Maniok."
viVN = "Không ăn được sống, Nanh Sắt đã phải thử nghiệm quy trình lên men cho Sắn."

