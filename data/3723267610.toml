["Building.PaperMill.FlavorDescription"]
status = "normal"
raw = "Giấy từng là đồ ăn vặt của thợ thu gom, nhưng giờ nó được phát hiện là có nhiều công dụng hơn thế."
enUS = "Paper used to be a snack for gatherers, but now it has been discovered to have many more uses."
