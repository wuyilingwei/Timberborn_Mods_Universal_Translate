["Building.DistrictCrossing.Description"]
status = "normal"
raw = "Điểm trung chuyển hàng hóa giữa hai khu vực được kết nối. Mỗi bên đều có công nhân phân phối hàng hóa giữa Điểm Giao Khu Vực và phần còn lại của khu."
enUS = "A transit point for goods between two connected areas. Each side has workers distributing goods between the District Crossing and the rest of the area."
zhCN = "货物中转点在两个连接区域之间。每一侧都有工人负责在区域交互点和区域其余部分之间分配货物。"
zhTW = "兩個相連區域之間的貨物轉運點。每一側均有工人負責在區域交接點和整個區域之間分配貨物。"
ruRU = "Точка транспортировки товаров между двумя соединенными районами. С каждой стороны есть работники, распределяющие товары между Точкой Грузового Перекрестка и остальной частью района."
jaJP = "二つのエリアを接続する貨物の中継地点。両側にはエリア接続ポイントとその周辺エリアの間で貨物を配達する作業員がいます。"
frFR = "Point de transfert de marchandises entre deux zones connectées. Chaque côté dispose de travailleurs distribuant des marchandises entre le Point de Liaison de la Zone et le reste de la zone."
deDE = "Der Warenumschlagspunkt zwischen zwei verbundenen Gebieten. Auf beiden Seiten gibt es Arbeiter, die Waren zwischen dem Gebietskreuzungspunkt und dem Rest des Gebiets verteilen."
plPL = "Przystanek towarowy między dwoma połączonymi terenami. Po każdej stronie znajdują się pracownicy rozdzielający towary między Punktem Przejazdu a resztą terenu."
ptBR = "Ponto de transferência de mercadorias entre duas áreas conectadas. Cada lado possui trabalhadores distribuindo mercadorias entre o Ponto de Entrega do Distrito e o restante da área."
koKR = "두 지역이 연결되는 화물 중계 지점입니다. 양쪽에는 지역 교차점과 나머지 구역 사이에서 화물을 분배하는 근로자가 있습니다."
csCZ = "Zásobovací místo mezi dvěma propojenými oblastmi. Na každé straně jsou pracovníci, kteří distribuují zboží mezi Zásobovacím bodem a zbytkem oblasti."
