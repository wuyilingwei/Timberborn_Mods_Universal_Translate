["Tutorial.Forestry.Forester"]
status = "normal"
raw = "Hải ly cần nguồn Gỗ ổn định. Điều đó là hiển nhiên.\n\nDùng Điểm Khoa Học từ Xưởng Phát Minh để mở khóa Trạm Lâm Nghiệp, rồi xây nó ở khu vực bạn muốn trồng cây."
enUS = "Beavers need a stable Wood supply. That is obvious.\n\nUse Science Points from the Invention Workshop to unlock the Forestry Station, then build it in the area where you want to plant trees."
zhCN = "海狸需要稳定的木材供应。这显而易见。\n\n使用从发明工坊获得的科学点数解锁林业站，然后在您想要种树的区域建造它。"
zhTW = "海狸需要穩定的木材來源。這是顯而易見的。\n\n使用科學點數從發明工作室解鎖林業站，然後在您想要種樹的區域建造它。"
ruRU = "Бобрам нужен стабильный источник древесины. Это очевидно.\n\nИспользуйте очки науки из мастерской, чтобы разблокировать Лесопункт, а затем постройте его в зоне, где хотите высаживать деревья."
jaJP = "ビーバーは安定した木材の供給が必要です。これは明らかです。\n\n発明所で科学ポイントを使って林業ステーションをアンロックし、木を植えたい地域に建設してください。"
frFR = "Les castors ont besoin d'une source de bois stable. C'est évident.\n\nUtilisez des Points de Science de l'Atelier d'Invention pour débloquer la Station Forestière, puis construisez-la dans la zone où vous souhaitez planter des arbres."
deDE = "Biber benötigen eine stabile Holzquelle. Das ist offensichtlich.\n\nVerwenden Sie Wissenschaftspunkte aus der Erfindungswerkstatt, um die Forststation freizuschalten, und bauen Sie sie in dem Bereich, in dem Sie Bäume pflanzen möchten."
plPL = "Bobry potrzebują stabilnego źródła drewna. To oczywiste.\n\nUżyj Punktów Nauki z Warsztatu Wynalazków, aby odblokować Stację Leśną, a następnie zbuduj ją w obszarze, w którym chcesz sadzić drzewa."
ptBR = "Os castores precisam de uma fonte estável de madeira. Isso é evidente.\n\nUse Pontos de Ciência da Oficina de Invenções para desbloquear a Estação Florestal, e então construa-a na área onde você quer plantar árvores."
koKR = "비버는 안정적인 목재 공급이 필요합니다. 이는 분명합니다.\n\n발명소의 과학 점수를 사용하여 임업 기지를 잠금 해제한 후, 나무를 심고 싶은 지역에 건설하십시오."
csCZ = "Bobři potřebují stabilní zdroj dřeva. To je očividné.\n\nPoužijte vědecké body z dílny vynálezů k odemčení lesnické stanice a poté ji postavte na místě, kde chcete sázet stromy."
viVN = "Hải ly cần nguồn Gỗ ổn định. Điều đó là hiển nhiên.\n\nDùng Điểm Khoa Học từ Xưởng Phát Minh để mở khóa Trạm Lâm Nghiệp, rồi xây nó ở khu vực bạn muốn trồng cây."

["Tutorial.Forestry.MarkBirchesForPlanting"]
status = "normal"
raw = "Dùng công cụ \"Trồng cây và bụi\" để trồng Bạch Dương. Chúng phát triển nhanh, phù hợp cho giai đoạn đầu.\n\nGiống như cây nông nghiệp, cây gỗ chỉ phát triển trên vùng đất tươi tốt.\n\nNhớ chỉ định khu vực để chặt cây."
enUS = "Use the 'Plant Trees and Bushes' tool to plant Birch trees. They grow quickly, making them suitable for the early stages.\n\nLike agricultural crops, trees only grow on fertile land.\n\nRemember to designate an area for cutting down trees."
zhCN = "使用“种植树木和灌木”工具来种植白桦树。它们生长迅速，适合早期阶段。\n\n与农作物一样，木材树木只在肥沃的土地上生长。\n\n记得指定砍树区域。"
zhTW = "使用「種植樹木和灌木」工具來種植白樺樹。它們生長速度快，適合早期階段。\n\n與農作物一樣，樹木只能在肥沃的土地上生長。\n\n記得指定砍伐樹木的區域。"
ruRU = "Используйте инструмент \"Сажать деревья и кусты\" для высадки берез. Они быстро растут, идеально подходят для начальной стадии.\n\nКак и сельскохозяйственные растения, породные деревья растут только на плодородной земле.\n\nНе забудьте выделить область для вырубки деревьев."
jaJP = "「木と茂みを植える」ツールを使って、カバノキを植えましょう。彼らは成長が早く、初期段階に適しています。\n\n農業用の木と同様に、木材は肥沃な土地でのみ成長します。\n\n木を伐採するエリアを指定するのを忘れないでください。"
frFR = "Utilisez l'outil \"Planter des arbres et des buissons\" pour planter des bouleaux. Ils poussent rapidement, adaptés aux premières étapes.\n\nTout comme les cultures agricoles, les arbres ne poussent que sur des terres fertiles.\n\nN'oubliez pas de désigner une zone pour abattre les arbres."
deDE = "Verwenden Sie das Werkzeug \"Bäume und Sträucher pflanzen\", um Birken zu pflanzen. Sie wachsen schnell und eignen sich gut für die Anfangsphase.\n\nWie Agrarpflanzen wachsen auch Holzpflanzen nur auf fruchtbarem Land.\n\nVergessen Sie nicht, ein Gebiet zum Fällen von Bäumen festzulegen."
plPL = "Użyj narzędzia \"Sadzenie drzew i krzewów\", aby sadzić Brzozy. Rosną szybko, idealne na początkowy etap.\n\nPodobnie jak rośliny uprawne, drzewa o dużych pniach rosną tylko na urodzajnych ziemiach.\n\nPamiętaj, aby wyznaczyć obszar do wycinki drzew."
ptBR = "Use a ferramenta 'Plantar árvores e arbustos' para plantar Bétulas. Elas crescem rápido, adequadas para o início do jogo.\n\nAssim como as plantas agrícolas, as árvores de madeira só crescem em solo fértil.\n\nLembre-se de designar a área para derrubar árvores."
koKR = "나무와 덤불 심기\" 도구를 사용하여 자작나무를 심으세요. 자작나무는 빠르게 자라며 초기에 적합합니다.\n\n농업용 나무처럼 목재용 나무는 비옥한 땅에서만 성장합니다.\n\n나무를 베기 위한 구역을 지정하는 것을 잊지 마세요."
csCZ = "Použijte nástroj „Sázení stromů a keřů“ k vysazení bříz. Rychle rostou a jsou vhodné pro ranou fázi.\n\nStejně jako zemědělské rostliny, i dřeva se vyvíjejí pouze na úrodné půdě.\n\nNezapomeňte vymezit oblast k vykácení stromů."
viVN = "Dùng công cụ \"Trồng cây và bụi\" để trồng Bạch Dương. Chúng phát triển nhanh, phù hợp cho giai đoạn đầu.\n\nGiống như cây nông nghiệp, cây gỗ chỉ phát triển trên vùng đất tươi tốt.\n\nNhớ chỉ định khu vực để chặt cây."

