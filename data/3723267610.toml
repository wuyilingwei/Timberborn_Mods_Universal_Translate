["Tutorial.Storage"]
new = "Kho"
status = "normal"

["Tutorial.Storage.Pile"]
new = "Nhiều công trình đang làm việc có sẵn kho chứa hàng hóa, nhưng rất hạn chế.\n\nXây Bãi Chứa Lớn để chứa thêm Khúc Gỗ.\n\nMỗi kho chỉ chứa một loại hàng. Bạn có thể chọn loại hàng khi bấm vào công trình."
status = "normal"

["Tutorial.Storage.Tanks"]
new = "Mọi chất lỏng đều được chứa trong Bể, bao gồm cả nước bạn đang bơm."
status = "normal"

["Tutorial.Storage.Warehouses"]
new = "Cuối cùng, hãy chuẩn bị kho chứa Việt Quất, và sẵn sàng cho vụ thu hoạch Cà Rốt sắp tới.\n\nThực phẩm, cũng như nhiều loại hàng hóa đóng hộp khác - cần được lưu trữ trong Nhà Kho."
status = "normal"

["Tutorial.Tutorial"]
new = "Hướng dẫn"
status = "normal"

