["Tutorial.Wellbeing.Beaver"]
status = "normal"
raw = "Các quyết định của bạn có ảnh hưởng đến hải ly.\n\nChọn một hải ly để xem thông tin chi tiết: phúc lợi, chỉ số và nhu cầu.\n\nMột số nhu cầu có thể xuống mức âm, gây hậu quả nặng nề (thậm chí là cái chết)."
enUS = "Your decisions impact the beaver.\n\nSelect a beaver to see detailed information: welfare, stats, and needs.\n\nSome needs can drop to negative levels, leading to severe consequences (even death)."
zhCN = "你的决策会影响海狸。\n\n选择一只海狸查看详细信息：福利、指标和需求。\n\n一些需求可能会降至负值，导致严重后果（甚至死亡）。"
zhTW = "你的決策會影響海狸。\n\n選擇一隻海狸以查看詳細信息：福祉、指標和需求。\n\n某些需求可能會降到負值，造成嚴重後果（甚至死亡）。"
ruRU = "Ваши решения влияют на бобров.\n\nВыберите одного бобра, чтобы увидеть подробную информацию: благосостояние, показатели и потребности.\n\nНекоторые потребности могут опуститься до отрицательного уровня, что приведет к серьезным последствиям (даже к смерти)."
jaJP = "あなたの決定はビーバーに影響を与えます。\n\n詳細情報を確認するにはビーバーを選択してください：福祉、指標、そしてニーズ。\n\nいくつかのニーズはマイナスのレベルに落ち込むことがあり、深刻な結果をもたらすことがあります（場合によっては死に至ります）。"
frFR = "Vos décisions affectent les castors.\n\nSélectionnez un castor pour voir les informations détaillées : bien-être, statistiques et besoins.\n\nCertains besoins peuvent descendre en dessous de zéro, entraînant de graves conséquences (y compris la mort)."
deDE = "Ihre Entscheidungen beeinflussen den Biber.\n\nWählen Sie einen Biber aus, um detaillierte Informationen zu sehen: Wohlbefinden, Statistiken und Bedürfnisse.\n\nEinige Bedürfnisse können negativ werden, was schwerwiegende Folgen (sogar den Tod) haben kann."
plPL = "Twoje decyzje mają wpływ na bobra.\n\nWybierz bobra, aby zobaczyć szczegóły: dobrostan, statystyki i potrzeby.\n\nNiektóre potrzeby mogą spaść poniżej zera, powodując poważne konsekwencje (nawet śmierć)."
ptBR = "As decisões que você tomar afetam os castores.\n\nEscolha um castor para ver informações detalhadas: bem-estar, estatísticas e necessidades.\n\nAlgumas necessidades podem cair para níveis negativos, resultando em consequências graves (até mesmo a morte)."
koKR = "당신의 결정은 비버에게 영향을 미칩니다.\n\n비버 하나를 선택하여 자세한 정보를 확인하세요: 복지, 지수 및 요구 사항.\n\n일부 요구 사항은 음수로 떨어질 수 있으며, 이는 심각한 결과를 초래할 수 있습니다(심지어 죽음까지)."
csCZ = "Vaše rozhodnutí ovlivňují bobry.\n\nVyberte si jednoho bobra pro zobrazení podrobných informací: blaho, statistiky a potřeby.\n\nNěkteré potřeby mohou klesnout na zápornou úroveň, což může mít vážné následky (dokonce smrt)."
viVN = "Các quyết định của bạn có ảnh hưởng đến hải ly.\n\nChọn một hải ly để xem thông tin chi tiết: phúc lợi, chỉ số và nhu cầu.\n\nMột số nhu cầu có thể xuống mức âm, gây hậu quả nặng nề (thậm chí là cái chết)."

["Tutorial.Wellbeing.Campfire"]
status = "normal"
raw = "Phúc lợi thể hiện mức độ hài lòng của hải ly. Nó ảnh hưởng đến: tốc độ làm việc, tốc độ di chuyển và tuổi thọ.\n\nMột cách hiệu quả để tăng phúc lợi là xây công trình giải trí—nơi hải ly ghé khi không làm việc."
enUS = "Wellbeing reflects the satisfaction level of the beavers. It affects: work speed, movement speed, and lifespan.\n\nAn effective way to increase wellbeing is to build recreational facilities—places where beavers gather when not working."
zhCN = "福祉反映了海狸的满意度。它影响到：工作速度、移动速度和寿命。\n\n提高福祉的有效方法是建造娱乐场所——海狸在不工作时会去的地方。"
zhTW = "福祉顯示海狸的滿意度。它影響：工作速度、移動速度和壽命。\n\n提高福祉的一種有效方法是建造休閒設施—海狸在不工作時會光顧的地方。"
ruRU = "Welfare отображает уровень удовлетворенности бобров. Он влияет на: скорость работы, скорость передвижения и продолжительность жизни.\n\nЭффективный способ повышения благосостояния — строительство досуговых сооружений, куда бобры приходят, когда не работают."
jaJP = "福祉はビーバーの満足度を示します。これは、作業速度、移動速度、寿命に影響します。\n\n福祉を効果的に向上させる方法は、娯楽施設を建設することです—ビーバーが働いていない時に訪れる場所です。"
frFR = "Le bien-être représente le niveau de satisfaction des castors. Il influence : la vitesse de travail, la vitesse de déplacement et la durée de vie.\n\nUn moyen efficace d'augmenter le bien-être est de construire des bâtiments récréatifs - des endroits où les castors se rendent lorsqu'ils ne travaillent pas."
deDE = "Wohlergehen zeigt das Maß an Zufriedenheit der Biber an. Es beeinflusst: Arbeitsgeschwindigkeit, Bewegungsgeschwindigkeit und Lebensdauer.\n\nEine effektive Möglichkeit, das Wohlergehen zu steigern, besteht darin, Freizeiteinrichtungen zu bauen - Orte, an denen die Biber sich aufhalten, wenn sie nicht arbeiten."
plPL = "Zadowolenie pokazuje poziom satysfakcji bobra. Ma wpływ na: prędkość pracy, prędkość ruchu i długość życia.\n\nSkutecznym sposobem na zwiększenie zadowolenia jest budowa obiektów rekreacyjnych — miejsc, w których bobry odpoczywają, gdy nie pracują."
ptBR = "O bem-estar representa o nível de satisfação dos castores. Ele afeta: velocidade de trabalho, velocidade de movimento e longevidade.\n\nUma maneira eficaz de aumentar o bem-estar é construir instalações de lazer—onde os castores vão quando não estão trabalhando."
koKR = "복지는 비버의 만족도를 나타냅니다. 이는 작업 속도, 이동 속도 및 수명에 영향을 미칩니다.\n\n복지를 효과적으로 증가시키는 방법은 여가 시설을 건설하는 것입니다. 이곳은 비버가 일하지 않을 때 머무는 장소입니다."
csCZ = "Blaho vyjadřuje úroveň spokojenosti bobra. Ovlivňuje: rychlost práce, rychlost pohybu a životnost.\n\nEfektivní způsob, jak zvýšit blaho, je postavit rekreační budovu—místo, kam se bobři uchylují, když nepracují."
viVN = "Phúc lợi thể hiện mức độ hài lòng của hải ly. Nó ảnh hưởng đến: tốc độ làm việc, tốc độ di chuyển và tuổi thọ.\n\nMột cách hiệu quả để tăng phúc lợi là xây công trình giải trí—nơi hải ly ghé khi không làm việc."

