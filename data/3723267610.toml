["Faction.Folktails.Description"]
status = "normal"
raw = "Ưa thoải mái nhưng cũng rất chăm chỉ, Đuôi Mộc là các nông dân lão luyện. Họ tôn trọng thiên nhiên và được thiên nhiên đền đáp bằng những mùa màng bội thu.\nPhương châm: <i>Thoải mái, đủ ăn và gỗ xịn.</i>"
enUS = "Comfortable yet hardworking, the Folktails are skilled farmers. They respect nature and are rewarded with bountiful harvests.  \nMotto: <i>Comfortable, well-fed, and fine wood.</i>"
zhCN = "舒适但也非常勤奋的木尾人是一群经验丰富的农民。他们尊重自然，自然则以丰收来回报他们。\n信条：<i>舒适、充足的食物和优质的木材。</i>"
zhTW = "喜愛舒適卻又十分勤奮的木頭尾巴是一群經驗豐富的農民。他們尊重自然，自然則回報他們以豐收的作物。\n座右銘：<i>舒適、足夠的食物和優質的木材。</i>"
ruRU = "Комфортные, но вместе с тем трудолюбивые, Лесные хвосты - опытные фермеры. Они уважают природу, и природа отвечает им щедрыми урожаями.  \nДевиз: <i>Комфорт, достаток и качественная древесина.</i>"
jaJP = "「快適さを重視しながらも非常に勤勉な、木の尾は熟練した農民です。彼らは自然を尊重し、自然から豊作という形で報われます。  \nモットー：<i>快適さ、十分な食料、そして質の高い木材。</i>」"
frFR = "À l'aise mais aussi très travailleurs, les Folktails sont des fermiers expérimentés. Ils respectent la nature et sont récompensés par des récoltes abondantes.  \nDevise : <i>À l'aise, bien nourris et avec du bon bois.</i>"
deDE = "Bezeichnung: Faction.Folktails.Beschreibung - Neuer zu übersetzender Text: \"Bequem, aber auch sehr fleißig, sind die Folktails erfahrene Landwirte. Sie respektieren die Natur und werden von ihr mit reichen Ernten belohnt.  \nLeitspruch: <i>Bequem, genug zu essen und hochwertiges Holz.</i>\""
plPL = "Lubią wygodę, ale są też bardzo pracowici, Leśne Ogonki to doświadczeni rolnicy. Szanują naturę, a natura odpłaca im obfitymi plonami.  \nZasada: <i>Wygodnie, wystarczająco jedzenia i dobre drewno.</i>"
ptBR = "Confortáveis, mas também muito trabalhadores, os Folktails são agricultores experientes. Eles respeitam a natureza e são recompensados com colheitas abundantes.  \nLema: <i>Conforto, comida suficiente e madeira de qualidade.</i>"
koKR = "편안하지만 매우 부지런한 목재족은 노련한 농부들입니다. 그들은 자연을 존중하며 자연은 그에 대한 보답으로 풍성한 수확을 안겨줍니다.  \n슬로건: <i>편안함, 충분한 먹이, 그리고 훌륭한 나무.</i>"
csCZ = "Oblíbení, ale také velmi pilní, Dřevorubci jsou zkušení farmáři. Respektují přírodu a ta jim na oplátku dává hojnou úrodu.\nMotto: <i>Pohodlí, dostatek a kvalitní dřevo.</i>"
viVN = "Ưa thoải mái nhưng cũng rất chăm chỉ, Đuôi Mộc là các nông dân lão luyện. Họ tôn trọng thiên nhiên và được thiên nhiên đền đáp bằng những mùa màng bội thu.\nPhương châm: <i>Thoải mái, đủ ăn và gỗ xịn.</i>"

