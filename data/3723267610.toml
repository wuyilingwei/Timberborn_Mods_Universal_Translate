["MapMetadata.Spillage.Description"]
status = "normal"
raw = "Sườn dốc này rải rác những khu tưới tiêu nhỏ. Tuy nhiên nó vẫn tiềm ẩn nhiều nguy hiểm — chỉ cần sơ suất, những nơi này sẽ nhanh chóng trở nên khắc nghiệt."
enUS = "This slope is scattered with small irrigation areas. However, it still poses many dangers — a moment of carelessness, and these places will quickly become harsh."
zhCN = "这片坡地上散布着一些小型灌溉区。然而，它仍然潜藏着许多危险——只要稍有不慎，这些地方很快就会变得严酷。"
zhTW = "這個斜坡上散佈著一些小型灌溉區。然而，它仍然潛藏著許多危險——只需稍有不慎，這些地方將迅速變得惡劣。"
ruRU = "Этот склон усеян небольшими участками ирригации. Тем не менее, он по-прежнему таит в себе много опасностей — стоит только немного расслабиться, и эти места быстро станут суровыми."
jaJP = "この斜面には小さな灌漑区域が点在しています。しかし、それでも多くの危険が潜んでいます — うっかりすると、これらの場所はすぐに厳しい環境になってしまいます。"
frFR = "Cette pente est parsemée de petites zones d'irrigation. Cependant, elle comporte encore de nombreux dangers — une simple négligence et ces endroits pourront rapidement devenir inhospitaliers."
deDE = "Diese Hänge sind mit kleinen Bewässerungsflächen übersät. Doch sie bergen immer noch viele Gefahren — nur ein kleiner Fehler und diese Orte werden schnell ungemütlich."
plPL = "Na tym stoku rozsiane są małe tereny nawadniające. Niemniej jednak wciąż kryją one wiele niebezpieczeństw — wystarczy chwila nieuwagi, a te miejsca szybko staną się surowe."
ptBR = "Este declive é pontilhado com pequenas áreas de irrigação. No entanto, ainda apresenta muitos perigos - um pequeno descuido e esses lugares podem rapidamente se tornar inóspitos."
koKR = "이 경사는 작은 관개 구역들이 흩어져 있습니다. 그러나 여전히 많은 위험이 도사리고 있습니다 — 방심하는 순간, 이곳들은 금세 가혹한 환경이 될 것입니다."
csCZ = "Tento svah je posetý malými zavlažovacími oblastmi. Nicméně, stále obsahuje mnoho nebezpečí — stačí malá chyba a tato místa se rychle stanou nehostinnými."
viVN = "Sườn dốc này rải rác những khu tưới tiêu nhỏ. Tuy nhiên nó vẫn tiềm ẩn nhiều nguy hiểm — chỉ cần sơ suất, những nơi này sẽ nhanh chóng trở nên khắc nghiệt."

