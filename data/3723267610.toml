["Tutorial.Housing.Lodges"]
status = "normal"
raw = "Hai hải ly thì luôn tốt hơn một! Nhà ở giúp cải thiện đời sống và cho phép dân số Đuôi Mộc tăng trưởng.\n\nHải ly sẽ tự động vào các chỗ ở còn trống."
enUS = "Two beavers are always better than one! Housing improves living standards and allows the Tail Wood population to grow.\n\nBeavers will automatically enter available housing."
zhCN = "两只海狸总比一只好！住房能改善生活，并允许木头尾人口增长。\n\n海狸会自动进入空闲的住房。"
zhTW = "兩隻海狸總是比一隻好！住房有助於改善生活，並允許樹尾的居民增長。\n\n海狸會自動進入空房間。"
ruRU = "Два бобра всегда лучше одного! Жилище помогает улучшить жизнь и позволяет численности населения Дубового Рога расти.\n\nБобры автоматически будут заселять свободные места."
jaJP = "「2匹のビーバーは1匹よりも常に良い！住宅は生活の質を改善し、トウモロコシの人口増加を可能にします。\n\nビーバーは空いている住居に自動的に入ります。」"
frFR = "Deux castors valent mieux qu'un ! Les logements améliorent la qualité de vie et permettent à la population de Castor de croître.\n\nLes castors entreront automatiquement dans les logements disponibles."
deDE = "Zwei Biber sind immer besser als einer! Unterkünfte verbessern das Leben und ermöglichen ein Wachstum der Bevölkerung von Holzland.\n\nBiber werden automatisch in die verfügbaren Unterkünfte gehen."
plPL = "Dwa bobry zawsze są lepsze niż jeden! Zakwaterowanie poprawia jakość życia i pozwala populacji Boberów na wzrost.\n\nBobry automatycznie wchodzą do wolnych miejsc."
ptBR = "Dois castores são sempre melhores que um! As habitações ajudam a melhorar a qualidade de vida e permitem que a população de Braços de Madeira cresça.\n\nOs castores vão automaticamente para as acomodações disponíveis."
koKR = "두 마리 비버가 한 마리보다 항상 더 좋습니다! 주거지는 삶의 질을 개선하고 꼬리나무 인구의 성장을 허용합니다.\n\n비버는 자동으로 빈 주거지로 들어갑니다."
csCZ = "Dva bobři jsou vždy lepší než jeden! Byty pomáhají zlepšit životní podmínky a umožňují populace Dřevorubců růst.\n\nBobři se automaticky přesunou do volných ubytování."
viVN = "Hai hải ly thì luôn tốt hơn một! Nhà ở giúp cải thiện đời sống và cho phép dân số Đuôi Mộc tăng trưởng.\n\nHải ly sẽ tự động vào các chỗ ở còn trống."

["Tutorial.IncreaseDesiredWorkers"]
