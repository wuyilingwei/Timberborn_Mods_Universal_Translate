["Faction.Folktails.GameOver.Flavor"]
status = "normal"
raw = "Khi bạn không biết tận dụng quà tặng của thiên nhiên, nó sẽ bị lấy lại."
enUS = "When you don't know how to make use of nature's gifts, they will be taken back."
zhCN = "当你不知道如何利用自然的馈赠时，它将被夺回。"
zhTW = "當你不知道如何利用大自然的禮物時，它將會被收回。"
ruRU = "Когда вы не знаете, как использовать дары природы, они будут забраны."
jaJP = "自然の贈り物を活用できないと、それは奪われてしまう。"
frFR = "Lorsque vous ne savez pas tirer parti des cadeaux de la nature, ils seront repris."
deDE = "Wenn man die Geschenke der Natur nicht nutzt, werden sie einem wieder genommen."
plPL = "Gdy nie potrafisz wykorzystać darów natury, zostaną one odebrane."
ptBR = "Quando você não sabe aproveitar os presentes da natureza, eles serão retirados."
koKR = "자연의 선물을 활용하지 못하면 그것은 다시 빼앗길 것입니다."
csCZ = "Když nevíte, jak využít dary přírody, budou vám odebrány."
viVN = "Khi bạn không biết tận dụng quà tặng của thiên nhiên, nó sẽ bị lấy lại."

["Faction.Folktails.GameOver.Message"]
status = "normal"
raw = "Đuôi Mộc đã chịu chung số phận với loài người trước đây. Đây là kết thúc."
enUS = "The Wood Tails have shared the same fate as humanity before. This is the end."
zhCN = "“木头尾与人类的命运相同。这是一个结局。”"
zhTW = "木尾與人類的命運相同，這就是結局。"
ruRU = "Двой Мок разделил ту же участь, что и человечество ранее. Это конец."
jaJP = "木の尾は以前の人類と同じ運命を受け入れました。これが終わりです。"
frFR = "La queue de bois a subi le même destin que l'humanité auparavant. Ceci est la fin."
deDE = "Die Holzschwänze haben das gleiche Schicksal wie die Menschheit zuvor erlitten. Das ist das Ende."
plPL = "Folktails doświadczyli tego samego losu co ludzkość wcześniej. To koniec."
ptBR = "A Cauda de Madeira sofreu o mesmo destino que a humanidade no passado. Este é o fim."
koKR = "나무의 꼬리가 예전에 인류와 같은 운명을 겪었다. 이것이 끝이다."
csCZ = "Folktails.Fakce.HraKonec.Zpráva - Nový text k překladu: \"Dřevařský ocas sdílel stejný osud s lidmi v minulosti. To je konec."
viVN = "Đuôi Mộc đã chịu chung số phận với loài người trước đây. Đây là kết thúc."

["Faction.Folktails.WonderCompletionFlavor"]
status = "normal"
raw = "Sau khi tích lũy được của cải và tri thức, hải ly của bạn đã chia sẻ thành quả lao động với một hành tinh đang khổ sở. Vẫn còn nhiều việc phải làm, nhưng Trái Đất có thể hồi sinh."
enUS = "After accumulating wealth and knowledge, your beavers have shared their labor's fruits with a suffering planet. There is still much to be done, but Earth can be revitalized."
zhCN = "在积累了财富和知识之后，你的海狸将劳动成果分享给了一个苦苦挣扎的星球。还有很多工作要做，但地球可以恢复生机。"
zhTW = "在積累了財富和知識後，你的海狸將勞動成果分享給正遭受苦難的星球。仍然有許多事情要做，但地球可以重生。"
ruRU = "После накопления богатства и знаний, ваши бобры поделились плодами своего труда с страдающей планетой. Сделать ещё много, но Земля может возродиться."
jaJP = "「財産と知識を蓄えた後、あなたのビーバーは苦しむ惑星とその労働の成果を共有しました。まだやるべきことは多いですが、地球は復活する可能性があります。」"
frFR = "Après avoir accumulé richesses et connaissances, votre loutre a partagé le fruit de son travail avec une planète en difficulté. Il reste encore beaucoup à faire, mais la Terre peut renaître."
deDE = "Nachdem Ihre Biber Wohlstand und Wissen angehäuft haben, haben sie ihre Arbeitsergebnisse mit einem leidenden Planeten geteilt. Es gibt noch viel zu tun, aber die Erde kann wiederbelebt werden."
plPL = "Po zgromadzeniu bogactwa i wiedzy, twoje bobry podzieliły się owocami pracy z cierpiącą planetą. Nadal jest wiele do zrobienia, ale Ziemia może się odrodzić."
ptBR = "Depois de acumular riquezas e conhecimentos, seu castor compartilhou o fruto do trabalho com um planeta em sofrimento. Ainda há muito a ser feito, mas a Terra pode renascer."
koKR = "부와 지식을 축적한 후, 당신의 비버는 고통받는 행성과 노동의 결실을 나누었습니다. 할 일이 많이 남아 있지만, 지구는 다시 태어날 수 있습니다."
csCZ = "Po shromáždění bohatství a znalostí váš bobr sdílel plody své práce s planetou trpící. Ještě je mnoho práce, ale Země se může zotavit."
viVN = "Sau khi tích lũy được của cải và tri thức, hải ly của bạn đã chia sẻ thành quả lao động với một hành tinh đang khổ sở. Vẫn còn nhiều việc phải làm, nhưng Trái Đất có thể hồi sinh."

["Faction.Folktails.WonderCompletionMessage"]
status = "normal"
raw = "Chúc mừng! Bạn đã làm chủ lối sống gần gũi với thiên nhiên của Đuôi Mộc và sử dụng tài nguyên trên bản đồ để xây dựng Kỳ Quan."
enUS = "Congratulations! You have mastered the nature-friendly lifestyle of the Folktails and used the resources on the map to build a Wonder."
zhCN = "恭喜！您已掌握与自然亲密接触的木尾生活，并利用地图上的资源建造奇观。"
zhTW = "恭喜！您已經掌握了與自然親密的樹尾生活方式，並利用地圖上的資源來建造奇觀。"
ruRU = "Поздравляем! Вы освоили жизнь в гармонии с природой Деревянного Хвоста и использовали ресурсы на карте для строительства Чуда."
jaJP = "おめでとうございます！あなたはフォークテイルの自然に親しむライフスタイルを習得し、地図上の資源を利用してワンダーを建設しました。"
frFR = "Félicitations ! Vous avez maîtrisé le mode de vie en harmonie avec la nature des Folktails et utilisé les ressources de la carte pour construire une Merveille."
deDE = "Herzlichen Glückwunsch! Sie haben den naturnahen Lebensstil der Holzschwänze gemeistert und die Ressourcen auf der Karte genutzt, um ein Wunder zu erbauen."
plPL = "Gratulacje! Opanowałeś naturalny styl życia Folktails i wykorzystałeś zasoby na mapie do zbudowania Cudu."
ptBR = "Parabéns! Você dominou o estilo de vida próximo da natureza dos Folktails e usou os recursos do mapa para construir uma Maravilha."
koKR = "축하합니다! 당신은 나무꼬리의 자연과 가까운 삶의 방식을 마스터하고 맵의 자원을 사용하여 경이로운 건축을 완성했습니다."
csCZ = "Gratulujeme! Ovládli jste životní styl blízký přírodě u Folktails a využili jste zdroje na mapě k stavbě Zázraku."
viVN = "Chúc mừng! Bạn đã làm chủ lối sống gần gũi với thiên nhiên của Đuôi Mộc và sử dụng tài nguyên trên bản đồ để xây dựng Kỳ Quan."

["Faction.IronTeeth.Description"]
status = "normal"
raw = "Rời bỏ thói quen sử dụng gỗ truyền thống, Nanh Sắt làm chủ kim loại và khoa học để xây dựng máy móc tiên tiến.\nHọ đạt được tiến bộ nhờ sự sáng tạo, hiệu quả. Tuy nhiên họ khá thờ ơ với môi trường.\nPhương châm: <i>Làm việc chăm chỉ. Làm việc chăm chỉ.</i>"
enUS = "Abandoning the traditional use of wood, the Iron Teeth master metal and science to build advanced machinery. They achieve progress through creativity and efficiency. However, they are quite indifferent to the environment. Motto: <i>Work hard. Work hard.</i>"
zhCN = "抛弃传统的木材使用习惯，铁齿掌控金属和科学，建立先进的机械。\n他们通过创造力和高效取得了进步。然而，他们对环境相当漠不关心。\n座右铭：<i>努力工作，努力工作。</i>"
zhTW = "拋棄傳統使用木材的習慣，鐵牙族掌控金屬和科學以建造先進的機械。\n他們通過創新和效率取得進步，但對環境則相當漠不關心。\n座右銘：<i>努力工作。努力工作。</i>"
ruRU = "Отказавшись от традиционного использования древесины, Железные Зубы овладели металлом и наукой для строительства современных машин. Они добились прогресса благодаря инновациям и эффективности. Однако они довольно равнодушны к окружающей среде. Девиз: <i>Усердно трудись. Усердно трудись.</i>"
jaJP = "伝統的な木材の使用を捨て、アイアンティースは金属と科学を駆使して先進的な機械を構築します。彼らは創造性と効率によって進歩を遂げます。しかし、環境に対してはあまり関心を持っていません。スローガン：<i>一生懸命働く。一生懸命働く。</i>"
frFR = "Abandonnant l'utilisation traditionnelle du bois, les Dents de Fer maîtrisent le métal et la science pour construire des machines avancées. Ils progressent grâce à leur créativité et leur efficacité. Cependant, ils sont assez indifférents à l'environnement. Devise : <i>Travailler dur. Travailler dur.</i>"
deDE = "Verlassen Sie die Gewohnheit, traditionelles Holz zu verwenden, die Eisenzähne meistern Metall und Wissenschaft, um fortschrittliche Maschinen zu bauen. Sie erreichen Fortschritt durch Kreativität und Effizienz. Dennoch sind sie ziemlich gleichgültig gegenüber der Umwelt. Motto: <i>Harte Arbeit. Harte Arbeit.</i>"
plPL = "Odrzucając tradycyjne korzystanie z drewna, Żelazne Zęby opanowują metal i naukę, aby budować zaawansowane maszyny. Osiągają postęp dzięki kreatywności i efektywności. Niemniej jednak, są dość obojętni na środowisko. Motto: <i>Ciężka praca. Ciężka praca.</i>"
ptBR = "Deixando para trás o hábito de usar madeira tradicional, os Dentes de Ferro dominam o metal e a ciência para construir máquinas avançadas. Eles alcançam progresso por meio da criatividade e eficiência. No entanto, são bastante indiferentes ao meio ambiente. Lema: <i>Trabalhe duro. Trabalhe duro.</i>"
koKR = "전통적으로 나무를 사용하는 습관을 버리고, 아이언티스는 금속과 과학을 활용하여 첨단 기계를 구축합니다. 그들은 창의성과 효율성을 통해 발전을 이룩했습니다. 하지만 환경에 대해 꽤 무관심합니다. 슬로건: <i>열심히 일하자. 열심히 일하자.</i>"
csCZ = "Opouštějí se od tradičního používání dřeva, Železné zuby ovládají kov a vědu, aby postavily pokročilé stroje. Pokroku dosahují díky kreativitě a efektivitě. Nicméně jsou poměrně lhostejní k životnímu prostředí. Heslo: <i>Tvrdě pracovat. Tvrdě pracovat.</i>"
viVN = "Rời bỏ thói quen sử dụng gỗ truyền thống, Nanh Sắt làm chủ kim loại và khoa học để xây dựng máy móc tiên tiến.  \nHọ đạt được tiến bộ nhờ sự sáng tạo, hiệu quả. Tuy nhiên họ khá thờ ơ với môi trường.  \nPhương châm: <i>Làm việc chăm chỉ. Làm việc chăm chỉ.</i>"

