["PlayerData.CorruptedDataInfo.Header"]
status = "normal"
raw = "Đã xảy ra lỗi khi đọc dữ liệu người chơi. Chúng tôi đã khôi phục từ bản sao lưu cục bộ, nhưng một số chi tiết (bao gồm các phe đã mở khóa và bản đồ đã hoàn thành) có thể đã bị mất."
enUS = "An error occurred while reading player data. We have restored from the local backup, but some details (including unlocked factions and completed maps) may have been lost."
zhCN = "读取玩家数据时发生错误。我们已从本地备份恢复，但某些细节（包括已解锁的派系和已完成的地图）可能已丢失。"
zhTW = "讀取玩家數據時發生錯誤。我們已從本地備份中恢復，但某些細節（包括已解鎖的派系和已完成的地圖）可能已遺失。"
ruRU = "Произошла ошибка при чтении данных игрока. Мы восстановили из локальной резервной копии, но некоторые детали (включая разблокированные фракции и завершенные карты) могут быть утеряны."
jaJP = "プレイヤーデータの読み込み中にエラーが発生しました。ローカルバックアップから復元しましたが、一部の詳細（解除された派閥やクリアしたマップを含む）が失われている可能性があります。"
frFR = "Une erreur est survenue lors de la lecture des données du joueur. Nous avons restauré à partir d'une sauvegarde locale, mais certaines détails (y compris les factions débloquées et les cartes terminées) peuvent avoir été perdues."
deDE = "Beim Lesen der Spieldaten ist ein Fehler aufgetreten. Wir haben aus dem lokalen Backup wiederhergestellt, aber einige Details (einschließlich der freischaltbaren Fraktionen und der abgeschlossenen Karten) könnten verloren gegangen sein."
plPL = "Wystąpił błąd podczas odczytu danych gracza. Przywróciliśmy z lokalnej kopii zapasowej, ale niektóre szczegóły (w tym odblokowane frakcje i ukończone mapy) mogły zostać utracone."
ptBR = "Ocorreu um erro ao ler os dados do jogador. Restauramos a partir do backup local, mas alguns detalhes (incluindo facções desbloqueadas e mapas concluídos) podem ter sido perdidos."
koKR = "플레이어 데이터를 읽는 도중 오류가 발생했습니다. 로컬 백업에서 복구했지만 일부 세부정보(잠금 해제된 진영 및 완료된 맵 포함)가 손실되었을 수 있습니다."
csCZ = "Došlo k chybě při čtení dat hráče. Obnovili jsme je z místní zálohy, ale některé detaily (včetně odemčených frakcí a dokončených map) mohly být ztraceny."
viVN = "Đã xảy ra lỗi khi đọc dữ liệu người chơi. Chúng tôi đã khôi phục từ bản sao lưu cục bộ, nhưng một số chi tiết (bao gồm các phe đã mở khóa và bản đồ đã hoàn thành) có thể đã bị mất."

["Population.AllPerished"]
status = "normal"
raw = "Và dù tất cả hải ly đã diệt vong, dòng sông vẫn chảy trôi,\nsự tồn tại ngắn ngủi của chúng chỉ như hạt bụi gỗ."
enUS = "And even though all the beavers have perished, the river still flows, their brief existence is like a speck of dust on wood."
zhCN = "“尽管所有海狸都已灭亡，河流仍在流淌，  \n它们短暂的存在只是木屑中的尘埃。”"
zhTW = "即使所有海狸都已滅絕，河流依然流淌，\n它們短暫的存在就像木屑一般。"
ruRU = "И хотя все бобры погибли, река продолжает течь, \nих короткое существование лишь как древесная пылинка."
jaJP = "「そしてすべてのビーバーが滅びたにもかかわらず、川は流れ続ける。\n彼らの短い存在は、木のほこりのようなものだ。」"
frFR = "Et même si tous les castors ont péri, la rivière continue à s'écouler,  \nleur existence éphémère n'était que comme une poussière de bois."
deDE = "Und obwohl alle Biber gestorben sind, fließt der Fluss weiter,  \nihre flüchtige Existenz ist nur wie ein Holzstaubkorn."
plPL = "I mimo że wszystkie bobry wyginęły, rzeka wciąż płynie, \nich krótkotrwałe istnienie jest niczym innym jak pyłkiem drewna."
ptBR = "E embora todos os castores tenham perecido, o rio continua a fluir,  \na breve existência deles é como um grão de poeira de madeira."
