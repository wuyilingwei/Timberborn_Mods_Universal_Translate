["Building.Thorns.Description"]
status = "normal"
raw = "Chướng ngại không thể xuyên qua, đồng thời chặn nước và ô nhiễm. Khó phá dỡ và có thể gây thương tích cho ai cố gắng làm điều đó."
enUS = "An unavoidable obstacle that blocks both water and pollution. Difficult to dismantle and may cause injury to anyone attempting to do so."
zhCN = "“无法穿透的障碍，同时阻挡水和污染。难以拆除，且可能对试图拆除的人造成伤害。”"
zhTW = "無法穿越的障礙，同時阻擋水流和污染。難以拆除，並且可能對試圖這樣做的人造成傷害。"
ruRU = "Неудаляемая преграда, которая блокирует воду и загрязнения. Трудно сломать и может повредить тому, кто попытается это сделать."
jaJP = "通過できない障害物であり、水と汚染を防ぎます。撤去は困難で、試みる者には怪我をさせる可能性があります。"
frFR = "Obstacles infranchissables, empêchant à la fois l'eau et la pollution. Difficile à démanteler et peut blesser ceux qui essaient de le faire."
deDE = "Ein unüberwindliches Hindernis, das gleichzeitig Wasser und Verschmutzung aufhält. Schwierig abzureißen und kann Verletzungen bei denen verursachen, die es versuchen."
plPL = "Niedostępna przeszkoda, która blokuje wodę i zanieczyszczenia. Trudna do zburzenia i może zranić każdego, kto spróbuje to zrobić."
ptBR = "Uma barreira intransponível que bloqueia água e poluição. Difícil de demolir e pode ferir aqueles que tentam fazê-lo."
koKR = "통과할 수 없는 장애물로, 물과 오염을 차단합니다. 철거하기 어려우며, 이를 시도하는 이에게 부상을 줄 수 있습니다."
csCZ = "Neprůhledná překážka, která brání průchodu vody a znečištění. Těžko se demoluje a může způsobit zranění těm, kdo se o to pokusí."
viVN = "Chướng ngại không thể xuyên qua, đồng thời chặn nước và ô nhiễm. Khó phá dỡ và có thể gây thương tích cho ai cố gắng làm điều đó."

