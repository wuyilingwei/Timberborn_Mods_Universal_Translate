["Building.Motivatorium.FlavorDescription"]
status = "normal"
raw = "“Ngày qua ngày, đêm qua đêm, chúng ta đấu tranh. Thật đẹp.” —Ol' Kazko"
enUS = "\"Day after day, night after night, we struggle. So beautiful.\" —Ol' Kazko"
zhCN = "“日复一日，夜复一夜，我们在奋斗。真美。” —老卡兹科"
zhTW = "“日復一日，夜復一夜，我們奮鬥著。真美。” —Ol' Kazko"
ruRU = "«День за днем, ночь за ночью, мы боремся. Это прекрасно.» —Старый Казко"
jaJP = "「日々、夜々、私たちは戦う。なんて美しい。」—オル・カズコ"
frFR = "« Jour après jour, nuit après nuit, nous luttons. C'est beau. » —Ol' Kazko"
deDE = "„Tag für Tag, Nacht für Nacht kämpfen wir. So schön.“ —Ol' Kazko"
plPL = "„Dzień po dniu, noc po nocy, walczymy. Jak pięknie.” —Ol' Kazko"
ptBR = "“Dia após dia, noite após noite, lutamos. É lindo.” —Ol' Kazko"
koKR = "“날마다, 밤마다, 우리는 싸웁니다. 정말 아름답습니다.” —올' 카즈코"
csCZ = "„Den co den, noc co noc, bojujeme. Jaké to krásné.“ —Ol' Kazko"
viVN = "“Ngày qua ngày, đêm qua đêm, chúng ta đấu tranh. Thật đẹp.” —Ol' Kazko"

