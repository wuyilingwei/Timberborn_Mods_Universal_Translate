zhCN = "存档版本 ({0}) 与当前版本 ({1}) 不兼容。启动可能会导致崩溃和严重错误。我们建议您开始一个新游戏以充分体验新功能。\n\n您确定要继续使用此存档吗？"
zhTW = "存檔版本 ({0}) 與當前版本 ({1}) 不相容。啟動可能會導致崩潰和嚴重錯誤。我們建議您開始新遊戲以充分體驗新功能。\n\n您確定要繼續使用此存檔嗎？"
ruRU = "Версия сохранения ({0}) несовместима с текущей версией ({1}). Запуск может привести к сбоям и серьезным ошибкам. Мы рекомендуем начать новую игру для полного опыта новых функций.\n\nВы уверены, что хотите продолжить с этим сохранением?"
jaJP = "セーブバージョン ({0}) は現在のバージョン ({1}) と互換性がありません。起動するとクラッシュや重大なエラーを引き起こす可能性があります。新しいゲームを始めて新機能を完全に体験することをお勧めします。\n\nこのセーブを続行してもよろしいですか？"
frFR = "La version de la sauvegarde ({0}) n'est pas compatible avec la version actuelle ({1}). Le lancement peut entraîner des plantages et des erreurs graves. Nous vous recommandons de commencer une nouvelle partie pour profiter pleinement des nouvelles fonctionnalités.\n\nÊtes-vous sûr de vouloir continuer avec cette sauvegarde ?"
deDE = "Die Speicherdateiversion ({0}) ist mit der aktuellen Version ({1}) nicht kompatibel. Das Starten kann zu Abstürzen und schweren Fehlern führen. Wir empfehlen, ein neues Spiel zu starten, um die neuen Funktionen vollständig zu erleben.\n\nSind Sie sicher, dass Sie mit diesem Speicherstand fortfahren möchten?"
plPL = "Wersja zapisu ({0}) jest niekompatybilna z obecną wersją ({1}). Uruchomienie może powodować awarie i poważne błędy. Zalecamy rozpoczęcie nowej gry, aby w pełni doświadczyć nowych funkcji.\n\nCzy na pewno chcesz kontynuować z tym zapisem?"
ptBR = "Versão do salvamento ({0}) incompatível com a versão atual ({1}). Executar o jogo pode causar falhas e erros sérios. Recomendamos começar um novo jogo para aproveitar ao máximo os novos recursos.\n\nVocê tem certeza de que deseja continuar com este salvamento?"
koKR = "저장 버전 ({0})이 현재 버전 ({1})과 호환되지 않습니다. 실행 시 충돌 및 심각한 오류가 발생할 수 있습니다. 새로운 기능을 완전히 경험하기 위해 새로운 게임을 시작하는 것을 권장합니다.\n\n이 저장 상태로 계속 진행하시겠습니까?"
csCZ = "Verze úlohy ({0}) není kompatibilní s aktuální verzí ({1}). Spuštění může způsobit havárii a závažné chyby. Doporučujeme začít novou hru, abyste si plně vychutnali nové funkce.\n\nJste si jisti, že chcete pokračovat s touto uloženou hrou?"
