["Building.LargeWaterPump.Description"]
status = "normal"
raw = "Bơm và lọc lượng lớn nước cho hải ly uống. Ô nhiễm Nước Độc làm giảm tốc độ bơm."
enUS = "Pumps and filters large amounts of water for beavers to drink. Toxic Water Pollution reduces pumping speed."
