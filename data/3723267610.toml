["MapMetadata.Meander.Description"]
status = "normal"
raw = "Các kỹ sư hải ly muốn tận dụng độ uốn cong tự nhiên của dòng sông. \nNhược điểm là phải quy hoạch trong một không gian hạn chế."
enUS = "The beaver engineers want to take advantage of the river's natural bend. \nThe downside is having to plan in a limited space."
zhCN = "海狸工程师希望利用河流的自然弯曲。缺点是必须在有限的空间内进行规划。"
zhTW = "海狸工程師希望利用河流的自然彎曲。缺點是必須在有限空間內規劃。"
ruRU = "Бобровые инженеры хотят использовать естественные изгибы реки. Недостаток заключается в необходимости планировать в ограниченном пространстве."
jaJP = "ビーバーのエンジニアたちは川の自然な曲がりを利用したいと考えています。 \n欠点は制約された空間で計画を立てなければならないことです。"
frFR = "Les ingénieurs castors veulent tirer parti de la courbure naturelle de la rivière. \nLe inconvénient est de devoir planifier dans un espace limité."
deDE = "Die Biber-Ingenieure möchten die natürliche Biegung des Flusses nutzen. Der Nachteil ist, dass man in einem begrenzten Raum planen muss."
plPL = "Inżynierowie bobry chcą wykorzystać naturalne zakręty rzeki. Wadą jest konieczność planowania w ograniczonej przestrzeni."
ptBR = "Os engenheiros castores querem aproveitar a curva natural do rio. O ponto negativo é ter que planejar em um espaço limitado."
koKR = "비버 엔지니어들은 강의 자연스러운 곡률을 활용하고 싶어합니다.  \n단점은 제한된 공간에서 계획해야 한다는 것입니다."
csCZ = "Inženýři bobři chtějí využít přirozené zakřivení řeky. \nNevýhodou je, že je nutné plánovat ve omezeném prostoru."
viVN = "Các kỹ sư hải ly muốn tận dụng độ uốn cong tự nhiên của dòng sông. \nNhược điểm là phải quy hoạch trong một không gian hạn chế."

