koKR = "비버가 마실 수 있는 대량의 물을 펌프와 필터로 정수합니다. 독성 오염수는 펌프 속도를 감소시킵니다."
csCZ = "Čerpá a filtruje velké množství vody pro bobry. Znečištění jedovatou vodou snižuje rychlost čerpání."
viVN = "Bơm và lọc lượng lớn nước cho hải ly uống. Ô nhiễm Nước Độc làm giảm tốc độ bơm."

