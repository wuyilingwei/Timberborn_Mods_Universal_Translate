["Building.ExercisePlaza.FlavorDescription"]
status = "normal"
raw = "Nanh Sắt muốn giống như những tạo vật của họ — ngày càng cứng cáp, tốt hơn, nhanh hơn, mạnh hơn."
enUS = "Iron Teeth want to be like their creations — tougher, better, faster, stronger."
zhCN = "钢爪想要像他们的创造物一样——越来越结实，更好，更快，更强。"
zhTW = "鐵夯希望能像他們的創造物一樣——越來越堅固、越來越好、越來越快、越來越強。"
ruRU = "Железные Нанхи хотят быть похожими на свои творения — всё более прочными, лучшими, быстрее, сильнее."
