jaJP = "昔は木に結びつけられていましたが、木を切ることによる事故が増えすぎました。"
frFR = "Auparavant, elles étaient attachées aux arbres, jusqu'à ce qu'il y ait trop d'accidents causés par la coupe des arbres."
deDE = "Früher wurden sie an Bäume gebunden, bis es zu vielen Unfällen durch das Fällen von Bäumen kam."
plPL = "Niegdyś były przymocowane do drzew, aż zbyt wiele wypadków spowodowanych wycinką drzew miało miejsce."
