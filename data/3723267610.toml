["Building.StreamGauge.FlavorDescription"]
status = "normal"
raw = "Có một con nước trong vận mệnh của loài hải ly. Nắm bắt đúng lúc triều dâng sẽ dẫn lối tới phồn vinh."
enUS = "There is a current in the destiny of the beavers. Capturing the tide at the right moment will lead to prosperity."
zhCN = "“在海狸的命运中，有一股水流。把握好涨潮的时机将引导通往繁荣。”"
zhTW = "在海狸的命運中，有一條水流。掌握潮起的時機將引領繁榮。"
ruRU = "В судьбе бобров есть поток. Правильный момент для подъема воды укажет путь к процветанию."
jaJP = "ビーバーの運命には水の流れがある。潮の満ち引きをうまくつかむことが繁栄への道を示すだろう。"
frFR = "Il y a une rivière dans le destin des castors. Saisir le bon moment de la marée montante mènera à la prospérité."
deDE = "Es gibt einen Fluss im Schicksal der Biber. Den richtigen Zeitpunkt für die Flut zu erfassen, wird den Weg zum Wohlstand weisen."
plPL = "Jest woda w losie bobrów. Uchwycenie odpowiedniego momentu przypływu poprowadzi do dobrobytu."
ptBR = "Há uma correnteza no destino dos castores. Capturar o momento certo da maré alta levará à prosperidade."
koKR = "비버의 운명에 물길이 있다. 적절한 시기에 밀물이 들어오면 번영으로 가는 길이 열릴 것이다."
csCZ = "Ve vodě je osud bobrů. Správné načasování přílivu povede k prosperitě."
viVN = "Có một con nước trong vận mệnh của loài hải ly. Nắm bắt đúng lúc triều dâng sẽ dẫn lối tới phồn vinh."

