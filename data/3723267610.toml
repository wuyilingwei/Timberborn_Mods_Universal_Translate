["Tutorial.Dams.BuildDam"]
new = "Trữ nước trong bồn giúp hải ly không bị khát, nhưng để sống lâu dài, bạn cần kiểm soát dòng chảy.\n\nHãy xây một hàng Đập nước chắn ngang con sông gần nhất, từ bờ này sang bờ kia, và quan sát điều xảy ra."
