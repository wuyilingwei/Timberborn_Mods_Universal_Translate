["MapMetadata.Plains.Description"]
status = "normal"
raw = "Với địa hình rộng, phẳng như đuôi hải ly.\nĐây là môi trường lý tưởng để các kỹ sư trẻ thử nghiệm và rèn luyện."
enUS = "With wide, flat terrain like a beaver's tail.  \nThis is the ideal environment for young engineers to experiment and hone their skills."
zhCN = "拥有宽广、平坦的地形，如同海狸的尾巴。这里是年轻工程师进行实验和锻炼的理想环境。"
zhTW = "擁有如海狸尾巴般寬闊、平坦的地形。\n這是年輕工程師進行實驗和鍛鍊的理想環境。"
ruRU = "С широкой, ровной местностью, как хвост бобра. Это идеальная среда для молодых инженеров для экспериментов и тренировок."
jaJP = "広々とした、ビーバーの尾のように平坦な地形。\nこれは若いエンジニアが実験し、技術を磨くのに理想的な環境です。"
frFR = "Avec un terrain large et plat comme la queue d'un castor.\nC'est l'environnement idéal pour que les jeunes ingénieurs expérimentent et s'entraînent."
deDE = "Mit der weiten, flachen Landschaft wie dem Schwanz eines Bibers. Dies ist die ideale Umgebung für junge Ingenieure, um zu experimentieren und zu trainieren."
plPL = "Z szerokim, płaskim terenem przypominającym ogon bobra. To idealne środowisko dla młodych inżynierów do testowania i doskonalenia."
ptBR = "Com uma paisagem ampla e plana como a cauda de um castor. Este é o ambiente ideal para os jovens engenheiros testarem e se aprimorarem."
koKR = "너비가 넓고 평평한 비버의 꼬리처럼 생긴 지형.\n이곳은 젊은 엔지니어들이 실험하고 연습하기에 이상적인 환경입니다."
csCZ = "S širokým, plochým terénem jako bobří ocas. Tohle je ideální prostředí pro mladé inženýry, aby si vyzkoušeli a zdokonalili své dovednosti."
viVN = "Với địa hình rộng, phẳng như đuôi hải ly. Đây là môi trường lý tưởng để các kỹ sư trẻ thử nghiệm và rèn luyện."

