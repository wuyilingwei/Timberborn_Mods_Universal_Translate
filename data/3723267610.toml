plPL = "Papier był kiedyś przekąską dla zbieraczy, ale teraz odkryto, że ma wiele innych zastosowań."
ptBR = "O papel já foi um lanche para os coletadores, mas agora foi descoberto que tem muitas outras utilidades."
koKR = "지금은 종이가 수거자들의 간식이었지만, 이제는 그 이상으로 많은 용도가 있음을 발견했습니다."
