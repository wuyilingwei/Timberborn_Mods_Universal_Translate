frFR = "• Nouveaux objets sur la carte, interactifs\n• Automatisation : Capteurs, Relais, Minuteurs, ...\n• Nouvelles cartes : Oasis, Pression, Déversement, ...\n• Escalier en colimaçon, Portail, Embrayage, Bannière\n• Mise à jour du processus de modding\n• Améliorations graphiques, tutoriels et outils de duplication"
deDE = "• Neue Objekte auf der Karte, die interagiert werden können  \n• Automatisierung: Sensoren, Relais, Timer,...  \n• Neue Karte: Oase, Druck, Verschüttung,...  \n• Wendeltreppe, Tor, Kupplung, Banner  \n• Aktualisierung des Modding-Prozesses  \n• Verbesserte Grafik, Anleitungen und Mod-Tools"
plPL = "• Nowe obiekty na mapie, interaktywne\n• Automatyzacja: Czujniki, Przekaźniki, Timery,...\n• Nowe mapy: Oaza, Ciśnienie, Wylew,...\n• Spiralne schody, Brama, Sprzęgło, Baner\n• Aktualizacja procesu modowania\n• Ulepszona grafika, samouczki i narzędzia do klonowania"
ptBR = "• Novos objetos no mapa, interativos  \n• Automação: Sensores, Relés, Temporizadores,...  \n• Novos mapas: Oásis, Pressão, Vazamento,...  \n• Escada em espiral, Portão, Acoplador, Banner  \n• Atualização do processo de modding  \n• Melhorias gráficas, guias e ferramentas de clone"
koKR = "• 맵에 있는 새로운 오브젝트, 상호작용 가능\n• 자동화: 센서, 릴레이, 타이머 등\n• 새로운 맵: 오아시스, 압력, 유출 등\n• 나선형 계단, 문, 클러치, 배너\n• 모딩 프로세스 업데이트\n• 그래픽, 가이드 및 복제 도구 개선"
csCZ = "• Nové objekty na mapě, se kterými lze interagovat  \n• Automatizace: Senzory, Relé, Časovače,...  \n• Nová mapa: Oáza, Tlak, Únik,...  \n• Točitá schodiště, Brány, Spojky, Banner  \n• Aktualizace procesu modování  \n• Vylepšení grafiky, průvodců a nástrojů pro klonování"
viVN = "• Các đối tượng mới trên bản đồ, có thể tương tác  \n• Tự động hóa: Cảm Biến, Rơ-le, Bộ Hẹn Giờ,...  \n• Bản đồ mới: Ốc đảo, Pressure, Spillage,...  \n• Cầu Thang Xoắn, Cổng, Bộ Ly Hợp, Banner  \n• Cập nhật quy trình modding  \n• Cải tiến đồ họa, hướng dẫn và công cụ nhân bản"

