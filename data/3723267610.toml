["NaturalResource.Pine.FlavorDescription"]
status = "normal"
raw = "\"Ôi khu rừng hùng vĩ, ta khắc khoải nhớ ngươi!\" —Nhà thơ hải ly vô danh"
enUS = "\"Oh, the majestic forest, how I long for you!\" —Anonymous beaver poet"
zhCN = "\"哦，壮丽的森林，我思念你！\" —匿名海狸诗人"
zhTW = "\"哦壯觀的森林，我思念著你！\" — 無名海狸詩人"
ruRU = "\"О, великолепный лес, как я тоскую по тебе!\" —Анонимный поэт бобров"
jaJP = "\"おお壮大な森よ、私はお前を切に思い出す！\" —名も無きビーバーの詩人"
frFR = "\"Ô forêt majestueuse, tu me manques tant !\" —Poète castor anonyme"
deDE = "\"Ach, der majestätische Wald, ich sehne mich nach dir!\" —Anonymer Biberpoet"
plPL = "\"Ach, wspaniały lesie, tęsknię za tobą!\" —Nieznany poeta bobrów"
ptBR = "\"Oh, a grande floresta, como eu sinto sua falta!\" —Poeta castor anônimo"
koKR = "\"오, 웅장한 숲이여, 나는 너를 그리워한다!\" —익명의 비버 시인"
csCZ = "\"Ó, velký lese, jak tě marně postrádám!\" —Anonimní bobří básník"
viVN = "\"Ôi khu rừng hùng vĩ, ta khắc khoải nhớ ngươi!\" —Nhà thơ hải ly vô danh"

