["Tutorial.HaulersAndWorkforce.BuildHaulingPost"]
status = "normal"
raw = "Khi khu định cư phát triển, lượng hàng hóa tăng lên. Việc vận chuyển chiếm nhiều thời gian của các nhân công.\n\nNgười vận chuyển giúp giải quyết việc này. Họ vận chuyển hàng hóa trong khu vực theo yêu cầu.\n\nHãy xây một Trạm Vận Chuyển."
enUS = "As the settlement grows, the amount of goods increases. Transporting takes a lot of time for the workers.\n\nHaulers help to solve this issue. They transport goods in the area as needed.\n\nBuild a Hauling Post."
zhCN = "当定居点发展时，货物数量增加。运输占用了劳工的大量时间。\n\n搬运工可以帮助解决这个问题。他们根据需要在区域内运输货物。\n\n请建造一个搬运站。"
zhTW = "隨著定居點的發展，貨物量增加。運輸佔用了工人的大量時間。\n\n搬運工幫助解決了這個問題。他們根據需求在區域內運輸貨物。\n\n請建造一個運輸站。"
ruRU = "Когда поселение развивается, количество товаров увеличивается. Транспортировка занимает много времени у работников.\n\nГрузчики помогают решить эту проблему. Они транспортируют товары по территории по мере необходимости.\n\nПостройте Пункт Перевозки."
jaJP = "「入植地が発展すると、物資の量が増加します。輸送には労働者の多くの時間がかかります。\n\n運搬者はこの問題を解決します。彼らは要求に応じて、地域内の物資を運びます。\n\n運搬所を建設しましょう。」"
frFR = "Lorsque la colonie se développe, la quantité de marchandises augmente. Le transport prend beaucoup de temps aux travailleurs.\n\nLes transporteurs aident à résoudre ce problème. Ils transportent des marchandises dans la zone selon les besoins.\n\nConstruisez un Poste de Transport."
deDE = "Wenn sich die Siedlung entwickelt, nimmt die Menge an Waren zu. Der Transport beansprucht viel Zeit der Arbeiter.\n\nDie Transporter helfen, dieses Problem zu lösen. Sie transportieren Waren in der Umgebung auf Anfrage.\n\nBauen Sie eine Transportstation."
plPL = "Quando os assentamentos se desenvolvem, a quantidade de mercadorias aumenta. O transporte consome muito tempo dos trabalhadores.\n\nOs transportadores ajudam a resolver isso. Eles transportam mercadorias na área conforme necessário.\n\nConstrua um Posto de Transporte."
ptBR = "À medida que o assentamento cresce, a quantidade de mercadorias aumenta. O transporte toma muito tempo dos trabalhadores.\n\nOs transportadores ajudam a resolver isso. Eles transportam mercadorias na área conforme necessário.\n\nConstrua uma Estação de Transporte."
koKR = "정착지가 발전함에 따라 상품의 양이 증가합니다. 운송에는 많은 시간이 소모됩니다.\n\n운반자가 이 문제를 해결합니다. 그들은 요청에 따라 지역 내 상품을 운반합니다.\n\n운반 기지를 건설하세요."
csCZ = "Když se osada rozrůstá, množství zboží se zvyšuje. Doprava zabírá mnoho času pracovníkům.\n\nNositelé pomáhají tuto situaci vyřešit. Přepravují zboží v oblasti podle potřeby.\n\nPostavte Překladiště."
viVN = "Khi khu định cư phát triển, lượng hàng hóa tăng lên. Việc vận chuyển chiếm nhiều thời gian của các nhân công.\n\nNgười vận chuyển giúp giải quyết việc này. Họ vận chuyển hàng hóa trong khu vực theo yêu cầu.\n\nHãy xây một Trạm Vận Chuyển."

["Tutorial.HaulersAndWorkforce.ChangeWorkforce"]
status = "normal"
raw = "Một số công trình như Trạm Vận Chuyển không tự động lấp đầy toàn bộ vị trí lao động. Bạn có thể tự phân công lao động trong bảng điều khiển.\n\nNgoài ra, bạn hãy thử phân công lao động bằng mức ưu tiên. Ví dụ, Trạm Vận Chuyển thường được đặt mức ưu tiên thấp.\n\nHãy thử ngay!"
enUS = "Some constructions like the Transport Station do not automatically fill all worker positions. You can manually assign labor in the panel.\n\nAdditionally, try assigning labor by priority. For example, the Transport Station is usually set to a low priority.\n\nGive it a try!"
zhCN = "一些建筑如运输站不会自动填满所有的工作位置。您可以在面板中手动分配劳动力。\n\n此外，您可以尝试通过优先级分配劳动力。例如，运输站通常设置较低的优先级。\n\n现在就试试吧！"
zhTW = "一些建築如運輸站不會自動填補所有的工作位置。您可以在控制面板中手動分配勞動力。\n\n此外，您可以嘗試使用優先級來分配勞動力。例如，運輸站通常會被設置為低優先級。\n\n馬上試試吧！"
ruRU = "Некоторые здания, такие как Транспортная станция, не заполняют все рабочие места автоматически. Вы можете самостоятельно назначить рабочих в панели управления.\n\nКроме того, попробуйте назначать рабочих с учетом приоритетов. Например, Транспортная станция обычно имеет низкий приоритет.\n\nПопробуйте прямо сейчас!"
jaJP = "「運搬ステーションのような一部の建物は、労働者のポジションを自動的に満たすことはありません。コントロールパネルで労働者を手動で割り当てることができます。\n\nまた、優先度を設定して労働者を割り当てることも試してみてください。例えば、運搬ステーションは通常、低い優先度に設定されています。\n\n今すぐ試してみてください！」"
frFR = "Certaines constructions comme la Station de Transport ne remplissent pas automatiquement tous les postes de travail. Vous pouvez attribuer des travailleurs vous-même dans le panneau de contrôle.\n\nDe plus, essayez d'attribuer des travailleurs par niveau de priorité. Par exemple, la Station de Transport est souvent assignée une priorité faible.\n\nEssayez dès maintenant !"
deDE = "Einige Gebäude wie der Transportpunkt füllen die Arbeitsplätze nicht automatisch. Sie können die Arbeitskräfte im Kontrollfeld manuell zuweisen.\n\nVersuchen Sie außerdem, die Arbeitskräfte nach Priorität zuzuweisen. Beispielsweise hat der Transportpunkt normalerweise eine niedrige Priorität.\n\nProbieren Sie es jetzt aus!"
plPL = "Niektóre budynki, takie jak Stacja Transportowa, nie wypełniają automatycznie wszystkich miejsc pracy. Możesz samodzielnie przydzielać pracowników w panelu sterowania.\n\nSpróbuj także przydzielać pracowników według priorytetu. Na przykład, Stacja Transportowa zwykle ma ustawiony niski priorytet.\n\nSpróbuj teraz!"
ptBR = "Algumas construções, como a Estação de Transporte, não preenchem automaticamente todas as posições de trabalho. Você pode designar trabalhadores manualmente no painel.\n\nAlém disso, experimente designar trabalhadores com base na prioridade. Por exemplo, a Estação de Transporte geralmente é definida com baixa prioridade.\n\nTente agora!"
koKR = "일부 건물인 운송 센터는 모든 작업 위치를 자동으로 채우지 않습니다. 패널에서 작업자를 수동으로 배정할 수 있습니다. \n\n또한 우선 순위를 설정하여 작업자를 할당해 보세요. 예를 들어, 운송 센터는 일반적으로 낮은 우선 순위로 설정됩니다. \n\n지금 시도해 보세요!"
csCZ = "Některé budovy, jako například Dopravní stanice, nevyplňují automaticky všechna pracovní místa. Můžete si sami přidělit pracovníky v ovládacím panelu.\n\nKromě toho zkuste přidělit pracovníky podle priority. Například Dopravní stanice mívá obvykle nízkou prioritu.\n\nVyzkoušejte to hned!"
viVN = "Một số công trình như Trạm Vận Chuyển không tự động lấp đầy toàn bộ vị trí lao động. Bạn có thể tự phân công lao động trong bảng điều khiển.\n\nNgoài ra, bạn hãy thử phân công lao động bằng mức ưu tiên. Ví dụ, Trạm Vận Chuyển thường được đặt mức ưu tiên thấp.\n\nHãy thử ngay!"

["Tutorial.HaulersAndWorkforce.PauseHaulingPost"]
status = "normal"
raw = "Bạn có thể tạm dừng công trình và công trường để kiểm soát hành động của hải ly tốt hơn.\n\nCông trình bị tạm dừng sẽ tự động giải phóng nhân công để họ chuyển sang nơi khác.\n\nChọn Trạm Vận Chuyển và bấm nút \"Tạm dừng\" trong bảng điều khiển."
enUS = "You can pause the construction and work sites to better control the actions of the beavers.\n\nPaused buildings will automatically free up labor so they can move elsewhere.\n\nSelect the Transport Station and click the \"Pause\" button in the control panel."
zhCN = "您可以暂停建筑和工地，以更好地控制海狸的行动。\n\n被暂停的建筑会自动释放工人，以便他们转移到其他地方。\n\n选择运输站，然后在控制面板中按下“暂停”按钮。"
zhTW = "您可以暫停建設和工地，以更好地控制海狸的行動。\n\n被暫停的建設將自動釋放人力，讓他們轉向其他地方。\n\n選擇運輸站，並在控制面板中按下「暫停」按鈕。"
ruRU = "Вы можете приостановить строительство и площадки, чтобы лучше контролировать действия бобров.\n\nПриостановленные работы автоматически освобождают рабочую силу, чтобы они могли перейти к другим местам.\n\nВыберите Перевозочную станцию и нажмите кнопку \"Приостановить\" в панели управления."
jaJP = "作業を一時停止して、ビーバーの行動をより良く管理できます。\n\n一時停止された作業は、労働者が自動的に解放され、他の場所に移動することができます。\n\n輸送所を選択し、コントロールパネルの「一時停止」ボタンを押してください。"
frFR = "Vous pouvez mettre en pause les constructions et les chantiers pour mieux contrôler les actions des castors.\n\nLes constructions mises en pause libéreront automatiquement la main-d'œuvre pour qu'elle puisse se déplacer ailleurs.\n\nSélectionnez la Station de Transport et appuyez sur le bouton \"Mettre en pause\" dans le panneau de contrôle."
deDE = "Sie können die Baustelle und das Lager pausieren, um die Aktionen der Biber besser zu steuern.\n\nDie pausierte Baustelle wird automatisch Arbeiter freisetzen, damit sie woanders hingelangen.\n\nWählen Sie den Transportpunkt und klicken Sie auf die Schaltfläche 'Pausieren' im Kontrollfeld."
plPL = "Możesz wstrzymać budowę i miejsce pracy, aby lepiej kontrolować działania bobra.\n\nWstrzymany budynek automatycznie zwolni pracowników, aby mogli przejść w inne miejsce.\n\nWybierz Stację Transportową i naciśnij przycisk \"Wstrzymaj\" w panelu."
ptBR = "Você pode pausar a construção e o local de trabalho para controlar melhor as ações dos castores.\n\nAs construções pausadas automaticamente liberarão os trabalhadores para que eles se dirijam a outros lugares.\n\nSelecione a Estação de Transporte e clique no botão \"Pausar\" no painel."
koKR = "작업과 공사를 일시 중지하여 비버의 행동을 더 잘 제어할 수 있습니다.\n\n일시 중지된 건설 프로젝트는 자동으로 노동자를 해제하여 다른 곳으로 이동하게 합니다.\n\n운송 스테이션을 선택하고 패널에서 '일시 중지' 버튼을 누르십시오."
csCZ = "Můžete pozastavit budovy a pracoviště, abyste lépe kontrolovali akce bobrů.\n\nPozastavené budovy automaticky uvolní pracovní sílu, aby se mohli přesunout jinam.\n\nVyberte Dopravní stanici a stiskněte tlačítko „Pozastavit“ v ovládacím panelu."
viVN = "Bạn có thể tạm dừng công trình và công trường để kiểm soát hành động của hải ly tốt hơn.\n\nCông trình bị tạm dừng sẽ tự động giải phóng nhân công để họ chuyển sang nơi khác.\n\nChọn Trạm Vận Chuyển và bấm nút \"Tạm dừng\" trong bảng điều khiển."

