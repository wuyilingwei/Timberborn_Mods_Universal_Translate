["NaturalResource.Canola.FlavorDescription"]
status = "normal"
raw = "Nanh Sắt bắt đầu nghĩ đến việc trồng các loài hoa khác để át bớt mùi Cải Dầu."
enUS = "The iron fang begins to think about planting other flowers to mask the smell of canola."
zhCN = "钢铁正在考虑种植其他花卉来减少油菜花的气味。"
zhTW = "南鐵開始考慮種植其他花卉，以遮掩油菜花的味道。"
ruRU = "Нан Сат начинает думать о том, чтобы выращивать другие цветы, чтобы заглушить запах рапса."
jaJP = "ナン・サッは、カラシナの匂いを和らげるために他の花を植えることを考え始めました。"
frFR = "Nanh Sắt commence à penser à cultiver d'autres fleurs pour atténuer l'odeur du Colza."
deDE = "Nanh Sắt beginnt darüber nachzudenken, andere Blumen zu pflanzen, um den Geruch von Raps zu überdecken."
plPL = "Nanh Sắt zaczyna myśleć o uprawie innych kwiatów, aby stłumić zapach rzepaku."
ptBR = "Nanh Sắt começou a pensar em cultivar outras flores para minimizar o cheiro da Colza."
koKR = "난프 사트는 카놀라의 냄새를 줄이기 위해 다른 꽃을 재배할 생각을 하기 시작했다."
csCZ = "Nanh Sát začal přemýšlet o pěstování dalších květin, aby přehlušil vůni řepky."
viVN = "Nanh Sắt bắt đầu nghĩ đến việc trồng các loài hoa khác để át bớt mùi Cải Dầu."

