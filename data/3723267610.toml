["MapMetadata.Hollows.Description"]
status = "normal"
raw = "Những vùng trũng màu mỡ này rất thích hợp để định cư. Địa hình bị khoét sâu mở ra nhiều cơ hội — và theo lời các hải ly già, còn có cả kho báu bị chôn vùi."
enUS = "The fertile hollows are perfect for settling. The deep-carved landscape opens up many opportunities — and according to the old beavers, there are even buried treasures."
zhCN = "“这些肥沃的凹地非常适合定居。被挖掘的地形创造了许多机会——根据老海狸们的说法，还有埋藏的宝藏。”"
zhTW = "這些肥沃的凹地非常適合定居。被深深挖掘的地形開啟了許多機會——根據老海狸的說法，還有埋藏的寶藏。"
ruRU = "Эти плодородные низменности идеально подходят для заселения. Глубокие рельефы открывают множество возможностей — и по словам старых бобров, там также есть зарытые сокровища."
jaJP = "この肥沃な凹地は、定住に非常に適しています。削られた地形は多くの機会を提供します — そして古いビーバーの言葉によれば、埋まった宝物もあります。"
frFR = "Ces vallées fertiles sont idéales pour s'installer. Le terrain creusé offre de nombreuses opportunités - et selon les vieux castors, il y a aussi des trésors enfouis."
deDE = "Diese fruchtbaren Senken sind ideal für eine Ansiedlung. Die tiefen Senken eröffnen viele Möglichkeiten – und den alten Bibern zufolge gibt es dort auch vergrabene Schätze."
plPL = "Te żyzne doliny są idealne do osiedlenia się. Głęboko wcięty teren otwiera wiele możliwości — a według słów starych bobrów, są tam także ukryte skarby."
ptBR = "Essas áreas férteis e ao nível do solo são perfeitas para se estabelecer. A topografia escavada oferece muitas oportunidades — e de acordo com os velhos castores, também há tesouros enterrados."
koKR = "이 비옥한 저지대는 정착하기에 매우 적합합니다. 깊이 파인 지형은 많은 기회를 제공합니다 — 그리고 늙은 비버들의 말에 따르면, 묻힌 보물도 있습니다."
csCZ = "Tato úrodná nížinatá oblast je ideální pro osídlení. Zdejší hluboké terény nabízejí mnoho příležitostí – a podle slov starých bobrů je tu také ukrytý poklad."
viVN = "Những vùng trũng màu mỡ này rất thích hợp để định cư. Địa hình bị khoét sâu mở ra nhiều cơ hội — và theo lời các hải ly già, còn có cả kho báu bị chôn vùi."

