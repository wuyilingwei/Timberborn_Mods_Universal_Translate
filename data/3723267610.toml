["Building.EarthRecultivator.Folktails.FlavorDescription"]
status = "normal"
raw = "Với mỗi hạt giống, hy vọng lại nảy mầm."
enUS = "With each seed, hope germinates."
zhCN = "随着每一颗种子，希望便再次萌芽。"
zhTW = "「每一顆種子，都孕育著希望。」"
ruRU = "С каждым семенем надежда снова прорастает."
jaJP = "種がひとつ芽生えるたびに、希望も芽生える。"
frFR = "Pour chaque graine, l'espoir germe à nouveau."
deDE = "Mit jedem Samen keimt die Hoffnung erneut."
plPL = "Z każdym ziarnem nadzieja znów kiełkuje."
ptBR = "Com cada semente, a esperança brota."
koKR = "각 씨앗마다 희망이 싹트네."
csCZ = "S každým semínkem opět klíčí naděje."
viVN = "Với mỗi hạt giống, hy vọng lại nảy mầm."

["Building.EarthRepopulator.IronTeeth.Description"]
status = "normal"
raw = "Phóng những người tiên phong đến vùng đất xa xôi. Khi phóng, khiến hải ly trong khu vực trở nên vô cùng vui sướng."
enUS = "Launch pioneers to distant lands. Upon launching, make the beavers in the area extremely happy."
zhCN = "将先锋派遣到遥远的土地。当发射时，使该区域内的海狸感到非常高兴。"
zhTW = "將先鋒們發射到遙遠的土地。發射時，讓該區域內的海狸變得非常快樂。"
ruRU = "Запускайте первопроходцев в далёкие края. При запуске бобры в области становятся невероятно счастливыми."
jaJP = "遠くの土地に先駆者を射出します。発射すると、その地域のビーバーは非常に喜びます。"
frFR = "Envoyez des pionniers vers des terres lointaines. Lors du lancement, faites en sorte que les castors de la région soient extrêmement heureux."
deDE = "Schickt die Pioniere in das entfernte Land. Beim Abschuss werden die Biber in der Umgebung äußerst erfreut."
plPL = "Wyślij pionierów na odległe tereny. Podczas wystrzelenia spraw, aby bobry w okolicy były niezwykle szczęśliwe."
ptBR = "Envie os pioneiros para terras distantes. Ao lançar, faça os castores da região ficarem extremamente felizes."
koKR = "먼 곳으로 개척자를 발사하세요. 발사하면 해당 지역의 비버들이 매우 행복해집니다."
csCZ = "Vystřelte pionýry do vzdálené země. Při vystřelení způsobíte, že bobři v oblasti budou nesmírně šťastní."
viVN = "Phóng những người tiên phong đến vùng đất xa xôi. Khi phóng, khiến hải ly trong khu vực trở nên vô cùng vui sướng."

