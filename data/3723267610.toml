["Tutorial.Dams.BuildDam"]
status = "normal"
raw = "Trữ nước trong bồn giúp hải ly không bị khát, nhưng để sống lâu dài, bạn cần kiểm soát dòng chảy.\n\nHãy xây một hàng Đập nước chắn ngang con sông gần nhất, từ bờ này sang bờ kia, và quan sát điều xảy ra."
enUS = "Storing water in a basin helps beavers avoid thirst, but to survive long-term, you need to manage the flow.\n\nBuild a dam across the nearest river, from one bank to the other, and observe what happens."
zhCN = "在水库中储存水可以防止海狸口渴，但为了长久生存，您需要控制水流。\n\n请在离您最近的河流上建造一排坝，从这一岸到另一岸，并观察发生了什么。"
zhTW = "在水池中儲存水能讓海狸不渴，但要長期生存，您需要控制水流。\n\n請在最近的河流上建造一座水壩，從這一岸到那一岸，並觀察發生的事情。"
ruRU = "Сохранение воды в резервуарах помогает бобрам не страдать от жажды, но для долгосрочной жизни вам нужно контролировать поток.\n\nПостройте дамбу поперек ближайшей реки, от одного берега до другого, и посмотрите, что произойдет."
jaJP = "ダムに水を貯めることでビーバーは渇きを防げますが、長生きするためには流れを制御する必要があります。\n\n最寄りの川を横切るダムを建設し、何が起こるかを観察してください。"
frFR = "Conserver de l'eau dans un réservoir aide les castors à ne pas avoir soif, mais pour survivre à long terme, vous devez contrôler le flux.\n\nConstruisez un barrage à travers la rivière la plus proche, d'une rive à l'autre, et observez ce qui se passe."
deDE = "Wasser im Becken zu speichern, hilft den Bisamratten, nicht durstig zu sein, aber um langfristig zu überleben, müsst ihr den Wasserfluss kontrollieren.\n\nBaut einen Damm, der den nächstgelegenen Fluss von Ufer zu Ufer blockiert, und beobachtet, was passiert."
plPL = "Zbieraj wodę w zbiorniku, aby bobry nie cierpiały z pragnienia, ale aby przetrwać, musisz kontrolować przepływ.\n\nZbuduj tamę, która przekroczy najbliższa rzekę od brzegu do brzegu i obserwuj, co się wydarzy."
ptBR = "Armazenar água em reservatórios ajuda os castores a não ficarem com sede, mas para uma sobrevivência a longo prazo, você precisa controlar o fluxo.\n\nConstrua uma fileira de barragens atravessando o rio mais próximo, de uma margem à outra, e observe o que acontece."
koKR = "저수지에 물을 저장하면 비버가 목이 마르지 않지만, 장기적으로 생존하려면 흐름을 조절해야 합니다.\n\n가장 가까운 강가에 수로를 가로막는 댐을 건설하고, 무슨 일이 일어나는지 관찰하세요."
csCZ = "Zadržení vody v nádrži pomáhá bobrům nezůstat žízniví, ale pro dlouhé přežití musíte kontrolovat tok vody.\n\nPostavte přehradu napříč nejbližší řekou, od břehu k břehu, a sledujte, co se stane."
viVN = "Trữ nước trong bồn giúp hải ly không bị khát, nhưng để sống lâu dài, bạn cần kiểm soát dòng chảy.\n\nHãy xây một hàng Đập nước chắn ngang con sông gần nhất, từ bờ này sang bờ kia, và quan sát điều xảy ra."

