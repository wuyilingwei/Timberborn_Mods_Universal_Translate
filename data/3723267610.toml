["NaturalResource.Maple.FlavorDescription"]
status = "normal"
raw = "Lấy nhựa để làm si-rô phong. Nhưng phần ngọt ngào hơn lại là thân gỗ của nó."
enUS = "Extract sap to make maple syrup. But the sweeter part is its wood."
zhCN = "提取树脂以制成枫糖浆。但更甜蜜的部分是它的木质部分。"
zhTW = "取樹脂來製作楓糖漿。但更甜美的是它的木幹。"
ruRU = "Извлекайте сок для приготовления кленового сиропа. Но более сладкая часть - это его древесный ствол."
jaJP = "メープルの樹液を採取してメープルシロップを作ります。しかし、より甘美なのはその木の幹です。"
frFR = "Collectez la sève pour faire du sirop d'érable. Mais la partie la plus sucrée est son tronc."
deDE = "Holz kann verwendet werden, um Ahornsirup herzustellen. Aber das Süßeste ist der Stamm selbst."
plPL = "Zbieraj sok do produkcji syropu klonowego. Ale to jego drewniany pień jest słodszy."
ptBR = "Extrai resina para fazer xarope de bordo. Mas a parte mais doce é o seu tronco."
koKR = "단풍 나무에서 수액을 채취하여 메이플 시럽을 만듭니다. 그러나 더 달콤한 것은 그 나무의 몸통입니다."
csCZ = "Vezměte pryskyřici na výrobu javorového sirupu. Ale sladší částí je jeho dřevo."
viVN = "Lấy nhựa để làm si-rô phong. Nhưng phần ngọt ngào hơn lại là thân gỗ của nó."

