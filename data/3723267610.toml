["MapMetadata.Beaverome.Description"]
status = "normal"
raw = "Để xây dựng khu định cư huyền thoại, tổ tiên của loài hải ly đã rút cạn bảy hố khổng lồ. Ngày nay, dù công nghệ gỗ đã tiến bộ vượt bậc, di sản cổ xưa vẫn là một kỳ quan vĩ đại."
enUS = "To build the legendary settlement, the ancestors of the beavers drained seven gigantic pits. Today, although wood technology has advanced significantly, the ancient heritage remains a great wonder."
zhCN = "为了建立传奇的定居点，海狸的祖先掏空了七个巨大的坑。如今，尽管木材技术已显著进步，但这一古老遗产依然是一项伟大的奇迹。"
zhTW = "為了建立傳說中的定居點，海狸的祖先已經挖掘了七個巨大的坑洞。如今，儘管木材技術已經取得了巨大的進步，但這一古老的遺產仍然是一個偉大的奇蹟。"
ruRU = "Чтобы построить легендарное поселение, предки бобров истощили семь гигантских ям. Сегодня, несмотря на огромный прогресс в деревянных технологиях, древнее наследие остается великим чудом."
jaJP = "伝説的な定住地を築くために、ビーバーの祖先は7つの巨大な穴を掘り尽くしました。今日では、木材技術が非常に進歩していますが、古代の遺産は依然として偉大なる驚異です。"
frFR = "Pour construire le légendaire village, les ancêtres du castor ont asséché sept énormes trous. Aujourd'hui, bien que la technologie du bois ait considérablement progressé, cet héritage ancien demeure une grande merveille."
deDE = "Um die legendäre Siedlung zu errichten, haben die Vorfahren der Biber sieben riesige Löcher ausgehoben. Heutzutage, obwohl die Holztechnologie enorm fortgeschritten ist, bleibt das alte Erbe ein großartiges Wunder."
plPL = "Aby zbudować legendarną osadę, przodkowie bobrów osuszyli siedem gigantycznych dołów. Dziś, mimo że technologia drewniana znacznie się rozwinęła, starożytne dziedzictwo wciąż pozostaje wielkim cudem."
ptBR = "Para construir a lendária colônia, os ancestrais dos castores esvaziaram sete gigantescas crateras. Hoje, embora a tecnologia da madeira tenha avançado enormemente, o antigo legado ainda é uma grande maravilha."
koKR = "전설적인 정착지를 건설하기 위해, 비버의 조상들은 일곱 개의 거대한 구덩이를 파냈습니다. 오늘날, 목재 기술이 비약적으로 발전했음에도 불구하고, 오래된 유산은 여전히 위대한 경이로움입니다."
csCZ = "Pro vybudování legendární osady předci bobrů vyčerpali sedm obrovských jam. Dnes, i když technologie zpracování dřeva pokročila až do nevídaných výšin, starověké dědictví zůstává velkým zázrakem."
viVN = "Để xây dựng khu định cư huyền thoại, tổ tiên của loài hải ly đã rút cạn bảy hố khổng lồ. Ngày nay, dù công nghệ gỗ đã tiến bộ vượt bậc, di sản cổ xưa vẫn là một kỳ quan vĩ đại."

