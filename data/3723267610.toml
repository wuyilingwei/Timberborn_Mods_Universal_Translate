["Building.Overhang.FlavorDescription"]
status = "normal"
raw = "“Ồ, có vẻ chúng ta đang bắc thang lên tận mây xanh. Có nên đi hỏi ông trời gì đó không ta...?” —Pina"
enUS = "‘Oh, it seems we’re climbing a ladder to the sky. Should we go ask the heavens something...?’ —Pina"
zhCN = "“哦，看来我们正在搭梯子到云端。不知道要不要去问问天公什么呢...？” —Pina"
zhTW = "“哦，似乎我們正在搭梯子到天上去。我們該不該去問問老天爺什麼呢...？” —Pina"
ruRU = "\\\"О, похоже, мы лезем по лестнице прямо к облакам. Не стоит ли спросить у небес чего-то...?\\\" —Пина"
jaJP = "「おお、私たちは青空に梯子をかけているようですね。何か天に聞いてみるべきでしょうか...？」 — ピナ"
frFR = "« Oh, on dirait que nous montons une échelle jusqu'aux cieux. Devrait-on demander quelque chose au ciel... ? » —Pina"
deDE = "„Oh, es scheint, als würden wir eine Leiter bis zu den Wolken bauen. Sollten wir den Himmel etwas fragen…?“ —Pina"
plPL = "„Oh, wygląda na to, że wspinamy się na chmurę. Może powinniśmy zapytać nieboszczyka o coś...?” —Pina"
ptBR = "“Oh, parece que estamos colocando uma escada até as nuvens. Deveríamos perguntar algo ao céu...?” —Pina"
koKR = "“오, 우리가 구름 위로 사다리를 놓는 것 같구나. 무언가 하늘에 물어봐야 할까...?” —피나"
csCZ = "„Ó, vypadá to, že stavíme žebřík až do modrého nebe. Měli bychom se zeptat pána Boha na něco...?“ —Pina"
viVN = "“Ồ, có vẻ chúng ta đang bắc thang lên tận mây xanh. Có nên đi hỏi ông trời gì đó không ta...?” —Pina"

