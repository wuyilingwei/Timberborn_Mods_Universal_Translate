koKR = "효율적인 작업을 위한 더 많은 도구와 수확한 작물을 위한 넓은 저장 공간을 갖춘 대형 헛간."
csCZ = "Velká stodola s více nástroji pro efektivní práci a spoustou úložného prostoru pro sklízené plodiny."
viVN = "Kho lớn với nhiều công cụ hơn cho công việc hiệu quả và nhiều không gian lưu trữ cho những vụ mùa thu hoạch."
