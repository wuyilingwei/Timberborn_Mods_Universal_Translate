koKR = "운송소에 운동 장비가 있어 물품을 배달할 때 속도가 증가합니다."
csCZ = "Pomocný úřad, který má posilovací vybavení, takže získávají zvýšení rychlosti při dodávání zboží."
viVN = "Bãi vận chuyển có thiết bị tập luyện để họ nhận được sức mạnh tốc độ khi giao hàng hóa"
trTR = "Malzeme teslimatı yaparken hız artışı sağlayan egzersiz ekipmanlarına sahip taşıma noktası"

