frFR = "Poste de transport équipé d'appareils de musculation, permettant d'accélérer la livraison des biens."
deDE = "Transportpost mit Fitnessgeräten, damit sie beim Liefern von Waren einen Geschwindigkeitsschub erhalten."
plPL = "Podstawka do transportu, która ma sprzęt do ćwiczeń, dzięki czemu zyskują bonus do prędkości podczas dostarczania towarów."
