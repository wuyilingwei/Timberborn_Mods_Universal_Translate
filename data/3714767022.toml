["Knatte.EfficientWaterExperiments.Description"]
raw = "A specialized hillside laboratory designed for unconventional experiments. \nEnsure the rear cellar well is placed on solid ground for stability.\nInputs: Well Water, Water, or Badwater.\nNotice: Change the recipe and the fuel may be gone!"
status = "normal"
enUS = "A specialized hillside laboratory designed for unconventional experiments. Ensure the rear cellar well is placed on solid ground for stability. Inputs: Well Water, Water, or Badwater. Notice: Change the recipe and the fuel may be gone!"
zhCN = "一个专门设计用于非常规实验的山坡实验室。  \n确保后方的地下水井放置在坚固的地面上以确保稳定性。  \n输入：井水、水或污水。  \n注意：更改配方后，燃料可能会消失！"
zhTW = "專門為非常規實驗而設計的山坡實驗室。  \n確保後方的地下水井放置在穩固的地面上以保持穩定。  \n輸入：井水、水或污水。  \n注意：更改食譜後，燃料可能會消失！"
ruRU = "Специализированная лаборатория на склоне, предназначенная для нестандартных экспериментов. Убедитесь, что задний колодец находится на твердой основе для стабильности. Входы: Колодезная вода, Вода или Плохая вода. Примечание: Измените рецепт, и топливо может пропасть!"
jaJP = "丘陵地に設置された特化型ラボで、従来の実験とは異なる実験を行うためのものです。 \n安定性を確保するため、後方の地下室の井戸はしっかりとした地面に設置してください。 \n入力：井戸水、水、または悪水。 \nご注意：レシピを変更すると燃料が消失する可能性があります！"
frFR = "Un laboratoire spécialisé en colline conçu pour des expériences non conventionnelles. \nAssurez-vous que le puits de la cave arrière est placé sur un sol solide pour plus de stabilité. \nIngrédients : Eau de puits, Eau ou Mauvaise eau. \nRemarque : Si vous modifiez la recette, le combustible pourrait disparaître !"
deDE = "Ein spezialisiertes Labor auf dem Hügel, das für unkonventionelle Experimente konzipiert ist. \nStellen Sie sicher, dass der Hinterkellerbrunnen auf festem Grund steht, um Stabilität zu gewährleisten. \nEingaben: Brunnenwasser, Wasser oder Abwasser. \nHinweis: Ändern Sie das Rezept und der Brennstoff könnte ausgehen!"
plPL = "Specjalne laboratorium na stoku wzgórza zaprojektowane do nietypowych eksperymentów. Upewnij się, że studnia w tylnej piwnicy jest umieszczona na solidnym gruncie dla stabilności. Surowce: Woda ze studni, Woda lub Zła woda. Uwaga: Zmiana przepisu może spalić paliwo!"
ptBR = "Um laboratório especializado na encosta, projetado para experimentos não convencionais. \nCertifique-se de que o poço do porão traseiro esteja posicionado em solo firme para estabilidade.\nEntradas: Água do poço, água ou água suja.\nAviso: Mudar a receita pode fazer com que o combustível acabe!"
koKR = "비정상적인 실험을 위해 설계된 전문적인 언덕 실험실입니다. 뒷쪽 지하실 우물이 안정성을 위해 단단한 바닥에 놓여야 합니다. 입력: 우물 물, 물 또는 불량수. 주의: 레시피를 변경하면 연료가 사라질 수 있습니다!"
csCZ = "Specializovaná laboratorní stanice na svahu určená pro nekonvenční experimenty. \nUjistěte se, že zadní studna je umístěna na pevném podkladu pro stabilitu. \nSuroviny: Studniční voda, voda nebo špatná voda. \nUpozornění: Změňte recepturu a palivo může být pryč!"
viVN = "Một phòng thí nghiệm chuyên biệt trên sườn đồi được thiết kế cho những thí nghiệm phi truyền thống.\nĐảm bảo rằng giếng cellar ở phía sau được đặt trên mặt đất vững chắc để ổn định.\nNguyên liệu: Nước giếng, Nước hoặc Nước bẩn.\nLưu ý: Thay đổi công thức và nhiên liệu có thể biến mất!"
trTR = "Eşsiz deneyler için tasarlanmış özel bir yamaç laboratuarı. \nArka mahzen kuyusunun stabilite için sağlam bir zemine yerleştirildiğinden emin olun.\nGirişler: Kuyudan Su, Su veya Kötü Su.\nDikkat: Tarifi değiştirirseniz, yakıt kaybolabilir!"

