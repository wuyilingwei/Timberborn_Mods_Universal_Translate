raw = "Big Barn with more tools for efficient work and a lot of storage space for harvested crops.\n"
status = "normal"
enUS = "Big Barn with more tools for efficient work and a lot of storage space for harvested crops."
zhCN = "大谷仓，配备更多工具以提高工作效率，拥有大量存储空间用于收获的农作物。"
zhTW = "大型穀倉，配備更多工具以提高工作效率，並擁有大量存儲空間用於收穫的作物。"
ruRU = "Большой амбар с большим количеством инструментов для эффективной работы и большим объемом хранения для собранного урожая."
jaJP = "効率的な作業のためのより多くの道具と収穫した作物のための広い収納スペースを備えた大きな納屋。"
frFR = "Grande grange avec plus d'outils pour un travail efficace et beaucoup d'espace de stockage pour les récoltes."
deDE = "Große Scheune mit mehr Werkzeugen für effizientes Arbeiten und viel Stauraum für geerntete Pflanzen."
