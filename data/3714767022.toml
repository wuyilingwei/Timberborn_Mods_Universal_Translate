["Knatte.EfficientBuildersHut.Description"]
raw = "Faster and stronger, Builders spend their idle time exercising or tinkering with their toolboxes."
status = "normal"
enUS = "Faster and stronger, Builders spend their idle time exercising or tinkering with their toolboxes."
zhCN = "“更快更强，建筑工人在空闲时间锻炼或修理他们的工具箱。”"
zhTW = "更快更強，建造者們利用閒暇時間鍛鍊身體或修理他們的工具箱。"
ruRU = "Быстрее и сильнее, строители проводят свободное время за упражнениями или tinkering с их ящиками инструментов."
jaJP = "「より速く、より強く、ビルダーは暇な時間を運動したり道具箱をいじったりして過ごします。」"
frFR = "Plus rapides et plus forts, les bâtisseurs passent leur temps libre à s'exercer ou à bricoler dans leurs trousses à outils."
deDE = "Schneller und stärker verbringen die Bauarbeiter ihre Freizeit mit Sport oder basteln an ihren Werkzeugkästen."
plPL = "Szybsi i silniejsi, budowniczowie spędzają wolny czas na ćwiczeniach lub majsterkowaniu przy swoich skrzynkach narzędziowych."
ptBR = "Mais rápidos e fortes, os Construtores passam seu tempo livre se exercitando ou mexendo em suas caixas de ferramentas."
koKR = "더 빠르고 강력한 건설자들은 유휴 시간에 운동을 하거나 공구 상자에서 작업을 합니다."
csCZ = "Rychlejší a silnější, dělníci tráví svůj volný čas cvičením nebo kutěním se svými nástroji."
viVN = "Nhanh hơn và mạnh mẽ hơn, Những người xây dựng dành thời gian nhàn rỗi của họ để tập thể dục hoặc mày mò với hộp công cụ của mình."
trTR = "Daha hızlı ve güçlü, İnşaatçılar boş zamanlarını spor yaparak veya alet kutularıyla tinkering yaparak geçirirler."

