["Knatte.EfficientHaulingPost.Description"]
raw = "Haulingpost that has workout equipment so they get a speed boost when delivering goods"
status = "normal"
enUS = "Hauling post that has workout equipment, giving a speed boost when delivering goods."
zhCN = "“配备健身器材的搬运站，以便在运输货物时获得速度提升。”"
zhTW = "配備運動器材的運輸站，運送貨物時可以提升速度。"
