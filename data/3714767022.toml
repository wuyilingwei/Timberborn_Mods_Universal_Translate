["Knatte.EfficientLumberjackFlag.Description"]
raw = "Lumberjack with harness for more carry capacity\nIf nothing to cut it will help carry some goods."
status = "normal"
enUS = "Lumberjack with a harness for increased carrying capacity. If there's nothing to cut, it will help carry some goods."
zhCN = "带有背带的伐木工，增加搬运能力，如果没有可砍伐的树木，可以帮助搬运一些货物。"
zhTW = "配備安全帶的伐木工，可以提高運載能力\n如果沒有樹木可砍，則可以幫助搬運一些物品。"
ruRU = "Плотник с подвеской для большей емкости переноски  \nЕсли нечего рубить, поможет перенести некоторые товары."
jaJP = "ハーネス付きの伐採者で、運搬能力を向上\n切るものがなければ、いくつかの物資を運ぶのに役立ちます。"
frFR = "Bûcheron avec harnais pour plus de capacité de transport\nS'il n'y a rien à couper, il aidera à transporter des marchandises."
deDE = "Fäller mit Geschirr für mehr Tragfähigkeit. Wenn nichts zu fällen ist, hilft es, einige Waren zu transportieren."
plPL = "Drwal z uprzężą zwiększającą pojemność noszenia. Jeśli nie ma nic do ścięcia, pomoże przetransportować materiały."
ptBR = "Lenhador com arnês para maior capacidade de carga. Se não houver nada para cortar, ajudará a transportar alguns itens."
koKR = "더 많은 운반 능력을 위한 하네스가 있는 나무꾼\n베어낼 것이 없다면, 몇 가지 물품을 운반하는 데 도움이 됩니다."
csCZ = "Dřevař s postrojem pro větší nosnost. Pokud není co řezat, pomůže nosit nějaké zboží."
viVN = "Lính đốn gỗ với dây đeo để tăng khả năng mang hàng hóa. Nếu không có gì để chặt, nó sẽ giúp mang một số hàng hóa."
trTR = "Taşınma kapasitesini artıran kemerli ağaç kesici\nKesilecek bir şey yoksa bazı еşya taşımaya yardımcı olur."

