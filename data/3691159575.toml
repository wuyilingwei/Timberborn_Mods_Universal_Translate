["LV.BBb.DirtyBathBomb.Description"]
raw = "A dynamite that releases a burst of badwater when it explodes. Does not affect terrain or beavers."
status = "normal"
enUS = "A dynamite that releases a burst of dirty water when it explodes. Does not affect terrain or beavers."
zhCN = "“一个在爆炸时释放污水的炸药。不会影响地形或海狸。”"
zhTW = "一種當爆炸時釋放出污水的炸藥。對地形和海狸沒有影響。"
ruRU = "Динамик, который при взрыве выпускает всплеск грязной воды. Не влияет на местность или бобров."
jaJP = "爆発すると悪水のバーストを放出するダイナマイト。地形やビーバーには影響しません。"
frFR = "Une dynamite qui libère une explosion d'eau sale lorsqu'elle explose. N'affecte pas le terrain ni les castors."
deDE = "Eine Dynamitstange, die beim Explodieren eine Wolke aus schmutzigem Wasser freisetzt. Beeinflusst weder das Terrain noch die Biber."
plPL = "Dynamiczny ładunek, który uwalnia strumień brudnej wody, gdy wybucha. Nie wpływa na teren ani bobry."
ptBR = "Uma dinamite que libera uma explosão de água suja quando explode. Não afeta o terreno nem os castores."
koKR = "폭발할 때 나쁜 물이 터져 나오는 다이너마이트입니다. 지형이나 비버에는 영향을 미치지 않습니다."
csCZ = "Dynamit, který při výbuchu uvolňuje nálož špatné vody. Neovlivňuje terén ani bobry."
viVN = "Một quả bom dynamite giải phóng một luồng nước bẩn khi nó phát nổ. Không ảnh hưởng đến địa hình hoặc những con chồn."

["LV.BBb.DirtyBathBomb.Flavor"]
raw = "In the same manual, apparently this explosive discharge is sure to follow after the use of an interesting artifact called taco."
status = "normal"
enUS = "In the same manual, it seems that this explosive discharge is sure to follow after the use of an interesting artifact called taco."
zhCN = "在同一本手册中，显然这种爆炸性排放在使用一种名为塔可的有趣神器后必然会发生。"
zhTW = "在同一本手冊中，顯然這種爆炸性釋放肯定會在使用一個名為塔可的有趣神器後發生。"
ruRU = "В том же руководстве, похоже, за использованием интересного артефакта под названием тако обязательно последует этот взрывной выброс."
jaJP = "同じマニュアルによると、どうやらこの爆発的な排出は、「タコ」と呼ばれる興味深いアーティファクトの使用後に確実に続くようです。"
frFR = "Dans le même manuel, apparemment cette décharge explosive suivra sûrement après l'utilisation d'un artefact intéressant appelé taco."
deDE = "Im selben Handbuch scheint es, dass diese explosive Entladung sicher folgt, nachdem ein interessantes Artefakt namens Taco verwendet wurde."
plPL = "W tym samym podręczniku najwyraźniej to eksplodujące wyładowanie na pewno nastąpi po użyciu interesującego artefaktu zwanego taco."
ptBR = "No mesmo manual, aparentemente essa descarga explosiva certamente acontecerá após o uso de um artefato interessante chamado taco."
koKR = "같은 매뉴얼에 따르면, 이 폭발적인 방출은 타코라는 흥미로운 유물 사용 후 반드시 따를 것이라고 합니다."
csCZ = "„Ve stejném manuálu, zřejmě po použití zajímavého artefaktu zvaného taco, toto výbušné vybití jistě následovat.“"
viVN = "Trong cùng một hướng dẫn, rõ ràng sự phun trào bùng nổ này chắc chắn sẽ xảy ra sau khi sử dụng một hiện vật thú vị được gọi là taco."

