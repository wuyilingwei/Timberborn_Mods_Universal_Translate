["LV.BBb.BathBomb.Description"]
raw = "A dynamite that releases a burst of water when it explodes. Does not affect terrain or beavers."
status = "normal"
enUS = "A dynamite that releases a burst of water when it explodes. Does not affect terrain or beavers."
zhCN = "一枚炸药，爆炸时释放出一阵水。不会影响地形或海狸。"
zhTW = "一種在爆炸時釋放水流的炸藥。對地形或海狸不會產生影響。"
ruRU = "Динамит, который выбрасывает струю воды при взрыве. Не влияет наTerrain или бобров."
jaJP = "水が噴き出す爆風を見せるダイナマイト。地形やビーバーには影響しません。"
frFR = "Un dynamite qui libère une éclaboussure d'eau lorsqu'il explose. N'affecte pas le terrain ni les castors."
deDE = "Ein Dynamit, das bei der Explosion einen Wasserstoß freisetzt. Hat keine Auswirkungen auf das Terrain oder die Biber."
plPL = "Dynamit, który uwalnia strumień wody, gdy wybucha. Nie wpływa na teren ani bobry."
ptBR = "Uma dinamite que libera um jato de água quando explode. Não afeta o terreno nem os castores."
koKR = "폭발할 때 물줄기를 방출하는 다이너마이트. 지형이나 비버에게 영향을 주지 않습니다."
csCZ = "Dynamit, který při explodování uvolňuje oblak vody. Neovlivňuje terén ani bobry."
viVN = "Một loại thuốc nổ phát ra một lượng nước khi nổ. Không ảnh hưởng đến địa hình hay loài Castor."

["LV.BBb.BathBomb.Flavor"]
raw = "Inspired by the name recovered from a hooman \\bathroom manual\\\". Apparently explosions were part of proper hygiene.\""
status = "normal"
enUS = "Inspired by the name recovered from a human bathroom manual. Apparently, explosions were part of proper hygiene."
zhCN = "“灵感来自从人类浴室手册中恢复的名称。显然，爆炸是保持良好卫生的一部分。”"
zhTW = "「靈感來自從人類浴室手冊中恢復的名稱。顯然，爆炸是正確衛生的一部分。」"
ruRU = "Вдохновлено названием, найденным в инструкции по эксплуатации человеческой ванной. Оказывается, взрывы были частью правильной гигиены."
jaJP = "「人間のバスルームマニュアルから回収された名前にインスパイアされています。どうやら爆発は適切な衛生の一部だったようです。」"
frFR = "Inspiré par le nom récupéré d'un \\\"manuel de salle de bain\\\" humain. Apparemment, les explosions faisaient partie d'une bonne hygiène."
deDE = "Inspiriert von einem Namen, der aus einem menschlichen Badezimmerhandbuch wiederentdeckt wurde. Anscheinend gehörten Explosionen zur ordentlichen Hygiene."
plPL = "Inspirowane nazwą odzyskaną z ludzkiego \\podręcznika łazienkowego\\. Podobno eksplozje były częścią prawidłowej higieny."
ptBR = "Inspirado pelo nome recuperado de um manual de banheiro de humanos. Aparentemente, explosões faziam parte da higiene adequada."
koKR = "인간의 \\욕실 매뉴얼에서 회복된 이름에서 영감을 받았습니다.\\\" 분명히 폭발은 적절한 위생의 일부였습니다.\""
csCZ = "Inspirováno názvem převzatým z manuálu pro lidské toalety. Zřejmě výbuchy byly součástí správné hygieny."
viVN = "Lấy cảm hứng từ cái tên được tìm thấy trong một hướng dẫn sử dụng nhà vệ sinh của con người. Rõ ràng, những vụ nổ là một phần của vệ sinh đúng cách."

