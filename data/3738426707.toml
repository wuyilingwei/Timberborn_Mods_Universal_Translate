["Building.SawdustStockpile.Description"]
status = "normal"
raw = "Automatically gathers sawdust in the district with two workers at the hauler port. If a stockpile is set to sawdust, excess is delivered there."
enUS = "Automatically gathers sawdust in the district with two workers at the hauler port. If a stockpile is set to sawdust, excess is delivered there."
zhCN = "“在有两个工人的搬运港口自动收集该区域的锯末。如果设置了锯末存储，过剩部分将被送到那里。”"
zhTW = "自動在區域內收集木屑，並在搬運港由兩名工人進行操作。如果堆放區設置為木屑，則多餘的木屑會被運送到那裡。"
ruRU = "Автоматически собирает опилки в районе с двумя рабочими на порту грузоперевозчиков. Если склад установлен на опилки, излишки доставляются туда."
jaJP = "労働者2人がハーラーポートで地区内の木くずを自動的に収集します。在庫が木くずに設定されている場合、余剰はそこに届けられます。"
frFR = "Rassemble automatiquement la sciure dans le district avec deux travailleurs au port de transport. Si un stockage est défini pour la sciure, l'excès y est livré."
deDE = "Automatisch Sägemehl im Bezirk mit zwei Arbeitern am Transporthafen sammeln. Wenn ein Lager für Sägemehl eingerichtet ist, wird Überschuss dorthin geliefert."
plPL = "Automatycznie zbiera trociny w dzielnicy z dwoma pracownikami w porcie transportowym. Jeśli punkt składowania jest ustawiony na trociny, nadmiar jest tam dostarczany."
ptBR = "Coleta automaticamente serragem no distrito com dois trabalhadores no porto de carregamento. Se um armazém estiver configurado para serragem, o excesso é entregue lá."
koKR = "두 명의 작업자가 있는 운반 포트에서 지역 내에서 자동으로 톱밥을 수집합니다. 톱밥이 설정된 저장소가 있는 경우, 초과 분이 그곳으로 전달됩니다."
csCZ = "Automaticky shromažďuje piliny v okrese se dvěma pracovníky na přístavu dopravců. Pokud je skladiště nastaveno na piliny, nadbytek je tam doručován."
viVN = "Tự động thu thập bụi gỗ trong khu vực với hai công nhân tại cảng vận chuyển. Nếu một kho chứa được đặt thành bụi gỗ, lượng dư thừa sẽ được chuyển đến đó."
trTR = "İki işçi ile taşıyıcı limanındaki bölgede talaşı otomatik olarak toplar. Eğer bir depolama alanı talaş için ayarlanmışsa, fazlası oraya teslim edilir."

