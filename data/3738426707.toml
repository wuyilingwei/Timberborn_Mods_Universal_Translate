csCZ = "Rychlé lisování pelet ještě není odemčeno. Zkušený bobr to včas najde."
viVN = "Việc ép viên nhanh chưa được mở khóa. Một con nhím tài năng sẽ tìm thấy nó theo thời gian."
trTR = "Hızlı pelet presleme henüz kilitli. Yetenekli bir kunduz bunu zamanla bulacaktır."

