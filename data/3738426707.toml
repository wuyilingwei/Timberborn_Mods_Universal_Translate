["SoilMod.PelletTechnologyUnlocked.Body"]
raw = "Your colony made a discovery! Pellets can now be made faster and more efficiently."
status = "normal"
enUS = "Your colony made a discovery! Pellets can now be made faster and more efficiently."
zhCN = "你的殖民地有了新发现！颗粒现在可以更快、更高效地生产。"
zhTW = "你的殖民地發現了一項新技術！顆粒現在可以更快且更有效率地製作。"
ruRU = "Ваша колония сделала открытие! Пеллеты теперь могут производиться быстрее и эффективнее."
jaJP = "あなたのコロニーが発見しました！ペレットをより速く、より効率的に製造できるようになりました。"
frFR = "« Votre colonie a fait une découverte ! Les granulés peuvent désormais être fabriqués plus rapidement et de manière plus efficace. »"
deDE = "Deine Kolonie hat eine Entdeckung gemacht! Pellets können jetzt schneller und effizienter hergestellt werden."
plPL = "Twoja kolonia dokonała odkrycia! Granulki mogą być teraz wytwarzane szybciej i bardziej efektywnie."
ptBR = "Sua colônia fez uma descoberta! Pellets agora podem ser feitos mais rápido e de forma mais eficiente."
koKR = "당신의 식민지가 발견했습니다! 펠렛을 이제 더 빠르고 효율적으로 만들 수 있습니다."
csCZ = "Vaše kolonie učinila objev! Granule mohou být nyní vyráběny rychleji a efektivněji."
viVN = "колония của bạn đã có một phát hiện! Các viên pellet giờ đây có thể được sản xuất nhanh hơn và hiệu quả hơn."
trTR = "Koloniniz bir keşif yaptı! Pelletler artık daha hızlı ve daha verimli bir şekilde üretilebilir."

