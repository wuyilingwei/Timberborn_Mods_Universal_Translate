["LV.MHA.AutoStartDesc"]
raw = "Automatically start the API server when loading the game.\nYou do not need a HTTP Adapter building if you enable this option."
status = "normal"
enUS = "Automatically start the API server when loading the game. You do not need an HTTP Adapter building if you enable this option."
zhCN = "“加载游戏时自动启动 API 服务器。\n如果启用此选项，则不需要 HTTP 适配器建筑。”"
zhTW = "在載入遊戲時自動啟動 API 伺服器。  \n如果啟用此選項，則不需要 HTTP 適配器建築。"
ruRU = "Автоматически запустить сервер API при загрузке игры. Вам не нужно здание HTTP-адаптера, если вы включите эту опцию."
jaJP = "ゲームをロードするときにAPIサーバーを自動的に起動します。このオプションを有効にすると、HTTPアダプタビルディングは必要ありません。"
frFR = " démarrer automatiquement le serveur API lors du chargement du jeu. Vous n'avez pas besoin d'un bâtiment Adaptateur HTTP si vous activez cette option."
deDE = "API-Server automatisch starten, wenn das Spiel geladen wird. \nSie benötigen kein HTTP-Adaptergebäude, wenn Sie diese Option aktivieren."
plPL = "Automatycznie uruchom serwer API podczas ładowania gry. Nie potrzebujesz budynku adaptera HTTP, jeśli włączysz tę opcję."
ptBR = "Comece automaticamente o servidor API ao carregar o jogo. Você não precisa de um edifício adaptador HTTP se ativar esta opção."
koKR = "게임 로딩 시 API 서버를 자동으로 시작합니다. 이 옵션을 활성화하면 HTTP 어댑터 건물이 필요하지 않습니다."
csCZ = "„Automaticky spustit API server při načítání hry. Tento příspěvek HTTP Adaptér není třeba, pokud tuto možnost povolíte.“"
viVN = "Tự động khởi động máy chủ API khi tải game. Bạn không cần một tòa nhà Bộ chuyển đổi HTTP nếu bạn bật tùy chọn này."

