["LV.MHA.AuthenticationDesc"]
raw = "Enable authentication for the API server. You will need to provide a password to access the API endpoints.\nLeave empty to disable.\n<RedHighlight>Note: only apply to endpoints provided using MoreHttpApi.</RedHighlight>"
status = "normal"
enUS = "Enable authentication for the API server. You will need to provide a password to access the API endpoints. Leave empty to disable. <RedHighlight>Note: only apply to endpoints provided using MoreHttpApi.</RedHighlight>"
zhCN = "启用 API 服务器的身份验证。您需要提供密码才能访问 API 端点。\n留空以禁用。\n<RedHighlight>注意：仅适用于使用 MoreHttpApi 提供的端点。</RedHighlight>"
zhTW = "啟用 API 伺服器的身份驗證。您需要提供密碼才能訪問 API 端點。  \n留空以禁用。  \n<RedHighlight>注意：僅適用於使用 MoreHttpApi 提供的端點。</RedHighlight>"
ruRU = "Включите аутентификацию для сервера API. Вам нужно будет предоставить пароль для доступа к конечным точкам API.  \nОставьте пустым, чтобы отключить.  \n<RedHighlight>Примечание: применяется только к конечным точкам, предоставляемым с использованием MoreHttpApi.</RedHighlight>"
jaJP = "APIサーバーの認証を有効にします。APIエンドポイントにアクセスするには、パスワードを提供する必要があります。無効にするには空白のままにしてください。<RedHighlight>注意: MoreHttpApiを使用して提供されるエンドポイントにのみ適用されます。</RedHighlight>"
frFR = "Activez l'authentification pour le serveur API. Vous devrez fournir un mot de passe pour accéder aux points de terminaison de l'API. Laissez vide pour désactiver. <RedHighlight>Remarque : s'applique uniquement aux points de terminaison fournis via MoreHttpApi.</RedHighlight>"
deDE = "Aktivieren Sie die Authentifizierung für den API-Server. Sie müssen ein Passwort angeben, um auf die API-Endpunkte zuzugreifen. Lassen Sie das Feld leer, um die Authentifizierung zu deaktivieren. <RedHighlight>Hinweis: gilt nur für Endpunkte, die mit MoreHttpApi bereitgestellt werden.</RedHighlight>"
plPL = "Włącz uwierzytelnianie dla serwera API. Będziesz musiał podać hasło, aby uzyskać dostęp do punktów końcowych API. \nPozostaw puste, aby wyłączyć. \n<CzerwoneWyróżnienie>Uwaga: dotyczy tylko punktów końcowych dostarczonych za pomocą MoreHttpApi.</CzerwoneWyróżnienie>"
ptBR = "Ative a autenticação para o servidor da API. Você precisará fornecer uma senha para acessar os pontos finais da API. Deixe em branco para desativar. <RedHighlight>Nota: aplica-se apenas aos pontos finais fornecidos usando o MoreHttpApi.</RedHighlight>"
koKR = "API 서버에 대한 인증을 활성화합니다. API 엔드포인트에 접근하려면 비밀번호를 제공해야 합니다. 비활성화하려면 비워두십시오. <RedHighlight>참고: 이는 MoreHttpApi를 사용하여 제공되는 엔드포인트에만 적용됩니다.</RedHighlight>"
csCZ = "Enable authentication for the API server. You will need to provide a password to access the API endpoints.\nLeave empty to disable.\n<RedHighlight>Note: only apply to endpoints provided using MoreHttpApi.</RedHighlight>"
viVN = "Kích hoạt xác thực cho máy chủ API. Bạn sẽ cần cung cấp một mật khẩu để truy cập các điểm cuối API. Để trống để vô hiệu hóa. <RedHighlight>Lưu ý: chỉ áp dụng cho các điểm cuối được cung cấp bằng cách sử dụng MoreHttpApi.</RedHighlight>"
