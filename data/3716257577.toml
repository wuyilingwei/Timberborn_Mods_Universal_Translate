["Building.Ygo.WatertightPassage.FlavorDescription"]
raw = "The first version involved a single door and fast paws. Something more clever was soon in order."
status = "normal"
enUS = "The first version involved a single door and quick reflexes. Something more ingenious was soon needed."
zhCN = "“第一版是一个门和迅速的爪子。很快就需要一些更聪明的东西。”"
zhTW = "第一個版本涉及一扇單獨的門和敏捷的爪子。很快就需要一些更聰明的東西。"
ruRU = "Первая версия включала одну дверь и быстрые лапки. Скоро понадобилось что-то более хитрое."
jaJP = "最初のバージョンは1つのドアと素早い手が必要でした。より巧妙なものがすぐに必要とされるようになりました。"
frFR = "La première version impliquait une seule porte et des pattes agiles. Quelque chose de plus astucieux était bientôt nécessaire."
deDE = "Die erste Version bestand aus einer einzelnen Tür und schnellen Pfoten. Etwas Cleveres war bald notwendig."
plPL = "Pierwsza wersja zawierała jednolitą drzwi i szybkie łapy. Wkrótce potrzebne było coś bardziej sprytnego."
ptBR = "A primeira versão envolvia uma única porta e patas rápidas. Algo mais inteligente logo se fez necessário."
koKR = "첫 번째 버전은 하나의 문과 빠른 발을 포함했습니다. 더 똑똑한 것이 곧 필요했습니다."
csCZ = "První verze zahrnovala jedno dveře a rychlé packy. Brzy bylo potřeba něco chytřejšího."
viVN = "Phiên bản đầu tiên liên quan đến một cánh cửa đơn và đôi chân nhanh nhẹn. Một cái gì đó thông minh hơn sớm trở nên cần thiết."

