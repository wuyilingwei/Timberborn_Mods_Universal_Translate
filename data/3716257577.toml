["Building.Ygo.WatertightTubeway.FlavorDescription"]
raw = "Unused exits are sealed for safety. Used exits are sealed until someone remembers otherwise."
status = "normal"
enUS = "Unused exits are sealed for safety. Used exits are sealed until someone remembers otherwise."
zhCN = "“未使用的出口已封闭以确保安全。已使用的出口在有人记得之前会保持封闭。”"
zhTW = "未使用的出口為了安全而被封閉。已使用的出口則在有人記得之前會保持封閉。"
ruRU = "Неработающие выходы запечатаны для безопасности. Используемые выходы запечатаны, пока кто-то не вспомнит об этом."
jaJP = "「使用されていない出口は安全のために封印されています。使用中の出口は、誰かが別のことを思い出すまで封印されます。」"
frFR = "Les sorties inutilisées sont scellées pour des raisons de sécurité. Les sorties utilisées sont scellées tant que quelqu'un ne se souvient pas du contraire."
deDE = "Ungenutzte Ausgänge sind aus Sicherheitsgründen versiegelt. Genutzte Ausgänge sind versiegelt, bis sich jemand an etwas anderes erinnert."
plPL = "Niezużyte wyjścia są uszczelnione dla bezpieczeństwa. Zużyte wyjścia są uszczelnione, dopóki ktoś nie przypomni sobie inaczej."
ptBR = "As saídas não utilizadas estão seladas por segurança. As saídas utilizadas estão seladas até que alguém se lembre do contrário."
koKR = "사용하지 않는 출구는 안전을 위해 봉인됩니다. 사용한 출구는 누군가 다른 방법을 기억할 때까지 봉인됩니다."
csCZ = "Nepoužívané výstupy jsou zapečetěny pro bezpečnost. Používané výstupy jsou zapečetěny, dokud si někdo nevzpomene na opak."
viVN = "Các lối ra không sử dụng được niêm phong để đảm bảo an toàn. Các lối ra đã sử dụng được niêm phong cho đến khi có ai đó nhớ khác."
