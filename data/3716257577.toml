["Building.Ygo.WatertightTubeway.Description"]
raw = "A fast, if cramped, means of beaver transportation. Connects upward. Blocks off water completely."
status = "normal"
enUS = "A fast, if cramped, means of beaver transportation. Connects upward. Blocks off water completely."
zhCN = "“一种快速但狭窄的海狸运输方式。向上连接。完全阻挡水流。”"
zhTW = "一種快速但狹窄的海狸運輸方式。向上連接。完全阻擋水流。"
ruRU = "Быстрое, хотя и тесное, средство транспортировки бобров. Соединяется вверх. Полностью блокирует воду."
jaJP = "「迅速ではあるが狭いビーバーの移動手段。上方向に接続します。水を完全に遮断します。」"
frFR = "Un moyen de transport rapide, bien que exigu, pour les castors. Se connecte vers le haut. Bloque complètement l'eau."
deDE = "Ein schnelles, wenn auch beengtes, Transportmittel für Biber. Verbindet nach oben. Blockiert das Wasser vollständig."
plPL = "Szybki, choć ciasny, sposób transportu bobrów. Łączy w górę. Całkowicie blokuje wodę."
ptBR = "Um meio rápido, embora apertado, de transporte dos castores. Conecta-se para cima. Bloqueia completamente a água."
koKR = "비좁지만 빠른 비버 이동 수단. 위로 연결됩니다. 물을 완전히 차단합니다."
csCZ = "Rychlý, i když stísněný, způsob dopravy bobrů. Spojuje směrem nahoru. Úplně blokuje vodu."
viVN = "Một phương tiện vận chuyển hải ly nhanh chóng, nếu chật chội. Kết nối lên trên. Chặn nước hoàn toàn."

