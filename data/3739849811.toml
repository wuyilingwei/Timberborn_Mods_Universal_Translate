["GridCutting.Sparse.Description"]
status = "normal"
raw = "Marks all but a widely-spaced grid of seed trees — each standing tree is ringed by empty tiles. Spawn chance does not rise with nearby trees so this is the most efficient pattern for natural reseeding. Cuts about four in five. Suggested by yo.bo."
enUS = "Marks all but a widely-spaced grid of seed trees — each standing tree is ringed by empty tiles. Spawn chance does not rise with nearby trees, so this is the most efficient pattern for natural reseeding. Cuts about four in five. Suggested by yo.bo."
zhCN = "标记所有树种之间有广泛间隔的种子树——每棵树周围有空白瓦片。附近树木不会增加生成几率，因此这是最有效的自然再播种模式。约砍掉五分之四。由 yo.bo 提出。"
zhTW = "標記除一個間隔較大的種子樹網格以外的所有樹木 — 每棵樹周圍都有空白磚塊。附近樹木不會提高生成機率，因此這是最有效的自然再播種模式。砍伐比例約為五分四。由 yo.bo 提議。"
ruRU = "Помечает все, кроме широко расставленной сетки семенных деревьев — каждое стоящее дерево окружено пустыми плитками. Вероятность появления не возрастает с близлежащими деревьями, поэтому это самый эффективный рисунок для естественного засевания. Отключает около четырех из пяти. Предложено yo.bo."
jaJP = "すべての種の木の間に広く間隔を開けたグリッドを残し、その周囲に立っている木は空のタイルで囲まれています。周囲の木によるスポーンの確率は上昇しないため、これは自然な再播種に最も効率的なパターンです。約5本中4本を切り倒します。提案者：yo.bo。"
frFR = "Marque tous les arbres semenciers sauf une grille largement espacée — chaque arbre debout est entouré de tuiles vides. La chance d'apparition ne augmente pas avec les arbres à proximité, donc c'est le modèle le plus efficace pour le resemoisement naturel. Coupe environ quatre arbres sur cinq. Suggéré par yo.bo."
deDE = "Markiert alle bis auf ein weit verbreitetes Raster von Saatbäumen - jeder stehende Baum ist von leeren Kacheln umgeben. Die Spawn-Chance steigt nicht mit nahegelegenen Bäumen, sodass dies das effektivste Muster für natürliche Nachsaat ist. Schneidet etwa vier von fünf. Vorgeschlagen von yo.bo."
plPL = "Zaznacza wszystkie oprócz rzadko rozmieszczonej siatki drzew nasiennych — każde stojące drzewo jest otoczone pustymi kafelkami. Szansa na pojawienie się nie wzrasta w pobliżu drzew, więc to najbardziej efektywny wzór dla naturalnego samonawadniania. Wycina około czterech na pięć. Zaproponowane przez yo.bo."
ptBR = "Marca todos, exceto uma grade de árvores-semente amplamente espaçadas — cada árvore de pé é cercada por tiles vazios. A chance de aparecimento não aumenta com árvores próximas, portanto, este é o padrão mais eficiente para replantio natural. Corta cerca de quatro em cinco. Sugerido por yo.bo."
koKR = "드문 드문 배치된 씨앗 나무의 그리드를 제외한 모든 나무를 표시합니다 — 각각의 나무는 비어있는 타일로 둘러싸여 있습니다. 주변 나무에 따라 출현 확률이 상승하지 않으므로, 자연 재배를 위한 가장 효율적인 패턴입니다. 약 80%를 잘라냅니다. yo.bo의 제안."
csCZ = "Vyznačuje všechny kromě široce rozmístěné mřížky semenáčků — každý stojící strom je obklopen prázdnými dlaždicemi. Šance na výskyt se nezvyšuje s okolními stromy, takže toto je nejefektivnější vzor pro přírodní regeneraci. Kácí přibližně čtyři z pěti. Navrhl yo.bo."
viVN = "Đánh dấu tất cả ngoại trừ một lưới cây giống thưa thớt - mỗi cây đứng được bao quanh bởi các ô trống. Cơ hội sinh sản không tăng lên với các cây gần đó, vì vậy đây là mẫu hiệu quả nhất cho việc gieo hạt tự nhiên. Cắt khoảng bốn trong năm. Được đề xuất bởi yo.bo."
trTR = "İşaretli alanların geniş aralıklarla yerleştirilmiş fidelerin bulunduğu bir ızgarayı hariç tutarak, her duran ağaç boş karolarla çevrilidir. Yakınlardaki ağaçlarla doğrudan bağlantılı olarak doğma olasılığı artmaz, bu nedenle bu, doğal tohumlama için en verimli desenidir. Yaklaşık beşte dördünü keser. yo.bo tarafından önerildi."
