["GridCutting.Heavy.Description"]
raw = "Marks three trees in four and keeps a sparse seed grid standing. Cuts about three quarters."
status = "normal"
enUS = "Marks three trees in a four and maintains a sparse seed grid. Cuts approximately three quarters."
zhCN = "“在四个区域标记三棵树，保持稀疏的种子网格。约砍掉四分之三。”"
zhTW = "在四個位置標記三棵樹，並保持稀疏的種子網格完整。砍伐約四分之三。"
ruRU = "Ставит метки на три дерева в четыре и сохраняет редкую сетку семян. Обрезает около трех четвертей."
jaJP = "「4本の間に3本の木を印し、まばらな種のグリッドを維持します。約4分の3を切り取ります。」"
frFR = "Marque trois arbres dans quatre et maintient un modèle de semences clairsemé. Coupe environ les trois quarts."
deDE = "Markiert drei Bäume in vier und lässt ein spärliches Samenraster stehen. Schneidet etwa drei Viertel ab."
plPL = "Oznacza trzy drzewa w czwórce i utrzymuje rzadki siatkę nasion. Ścina około trzech czwartych."
ptBR = "Marca três árvores em quatro e mantém uma grade de sementes esparsa. Corta cerca de três quartos."
koKR = "네 그리드에서 세 그루의 나무를 표시하고 희박한 씨앗 그리드를 유지합니다. 약 3/4 가량을 자릅니다."
csCZ = "Vymezuje tři stromy ve čtyřech a udržuje řídkou síť osiva. Pokácí přibližně tři čtvrtiny."
viVN = "Đánh dấu ba cây trong bốn và giữ một lưới hạt thưa thớt. Cắt khoảng ba phần tư."
trTR = "Üç ağacı dörde işaretler ve seyrek bir tohum ızgarası ayakta tutar. Yaklaşık üçte birini keser."

