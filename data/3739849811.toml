["GridCutting.StripesHorizontal.Description"]
raw = "Marks alternate rows of trees and leaves full horizontal seed rows between them. Cuts about half."
status = "normal"
enUS = "Marks alternate rows of trees and leaves, with full horizontal seed rows between them. Cuts about half."
zhCN = "标记树木的交替行和它们之间完整的水平种子行。切割约一半。"
zhTW = "「標記交替的樹木行和樹葉，在它們之間設置完整的水平種子行。約砍伐一半。」"
ruRU = "Отмечает чередующиеся ряды деревьев и оставляет полные горизонтальные ряды семян между ними. Режет около половины."
jaJP = "木や葉の交互の列をマークし、その間に完全な水平シード列を配置します。約半分を切ります。"
frFR = "Marque des rangées alternées d'arbres et laisse des rangées de semences horizontales complètes entre elles. Coupe environ la moitié."
deDE = "Markiert abwechselnd Reihen von Bäumen und lässt volle horizontale Samenreihen dazwischen. Schneidet etwa die Hälfte."
plPL = "Oznacza naprzemienne rzędy drzew i liści pełnych poziomych rzędów nasion pomiędzy nimi. Wycina około połowy."
ptBR = "Marca linhas alternadas de árvores e folhas, com linhas de sementes horizontais cheias entre elas. Corta cerca da metade."
koKR = "나무와 나뭇잎의 교차하는 줄을 표시하고 그 사이에 전체 수평 씨앗 줄을 생성합니다. 약 절반을 잘라냅니다."
csCZ = "Znázorňuje střídavé řady stromů a mezi nimi plné horizontální řady semen. Ořeže přibližně polovinu."
viVN = "Đánh dấu các hàng cây xen kẽ và để lại các hàng hạt giống nằm ngang đầy đủ giữa chúng. Cắt khoảng một nửa."

