["GridCutting.Thin.Description"]
raw = "Marks one tree in four — the gentlest thinning for the fastest regrowth. Cuts about a quarter."
status = "normal"
enUS = "Marks one tree in four — the gentlest thinning for the fastest regrowth. Cuts about a quarter."
zhCN = "在四棵树中标记一棵——最快再生的最温和稀疏。砍伐约四分之一。"
zhTW = "在四棵樹中標記一棵——最溫和的間伐以實現最快的再生。約削減四分之一。"
ruRU = "Отметьте одно дерево из четырех — самое легкое прореживание для быстрейшего роста. Убирает около четверти."
jaJP = "四分の一の木を指定します — 最も穏やかな間伐で、最も早い再生を促します。約4分の1を伐採します。"
frFR = "Marque un arbre sur quatre — l'éclaircissage le plus doux pour la régénération la plus rapide. Coupe environ un quart."
deDE = "Markiert einen Baum in vier – das sanfteste Ausdünnen für das schnellste Nachwachsen. Schneidet etwa ein Viertel."
plPL = "Oznacza jedno drzewo co cztery — najłagodniejsze przerzedzenie dla najszybszego odrastania. Wycinane około jednej czwartej."
ptBR = "Marca uma árvore em quatro — a desbaste mais suave para o crescimento mais rápido. Corta cerca de um quarto."
koKR = "네 그루 중 하나의 나무를 표시합니다 — 가장 빠른 재성장을 위한 가장 부드러운 가지치기. 약 1/4을 자릅니다."
csCZ = "Vyznačuje jeden strom ve čtyřech — nejjemnější prořezávání pro nejrychlejší obnovu. Pokácí přibližně čtvrtinu."
viVN = "Đánh dấu một cây trong bốn — phương pháp tỉa thưa nhẹ nhàng nhất cho quá trình tái sinh nhanh nhất. Cắt khoảng một phần tư."

