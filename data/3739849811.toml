["GridCutting.Checkerboard.Description"]
raw = "Marks every other tree in a checkerboard pattern so the trees left standing reseed the gaps. Cuts about half."
status = "normal"
enUS = "Marks every other tree in a checkerboard pattern so that the remaining trees reseed the gaps. Cuts approximately half."
zhCN = "以棋盘模式标记每隔一棵树，留下的树木会填补空缺。大约切割一半。"
zhTW = "以棋盤格模式標記每隔一棵樹，以便剩置的樹木能夠重新播種空隙。大約砍掉一半。"
ruRU = "Отмечает каждое второе дерево в шахматном порядке, чтобы оставшиеся деревья заполнили пробелы. Урезает примерно на половину."
jaJP = "チェッカーボードパターンで、毎回別の木を印を付けて、残された木が隙間を再生するようにします。約半分を切り取ります。"
frFR = "Marque un arbre sur deux dans un motif en damier afin que les arbres restant comblent les vides. Coupe environ la moitié."
deDE = "Markiert jeden zweiten Baum in einem Schachbrettmuster, sodass die verbleibenden Bäume die Lücken nachpflanzen. Schneidet etwa die Hälfte."
plPL = "Oznacza co drugi drzewo w wzór szachownicy, aby pozostawione drzewa mogły zasiać luki. Tnie około połowy."
ptBR = "Marca cada outra árvore em um padrão de tabuleiro de xadrez para que as árvores restantes preencham os espaços. Corta cerca da metade."
koKR = "체크무늬 패턴으로 매번 다른 나무를 표시하여 남은 나무가 빈자리를 재생산합니다. 약 절반 정도를 베어냅니다."
csCZ = "Štítí každé druhé strom v šachovnicovém vzoru, aby stromy, které zůstaly stát, znovu osily mezery. Kácí asi polovinu."
viVN = "Đánh dấu mọi cây thứ hai theo dạng bàn cờ để các cây còn lại lấp đầy khoảng trống. Cắt khoảng một nửa."
trTR = "Diğer her ağacı dama tahtası deseninde işaretler, böylece kalan ağaçlar boşlukları yeniden tohumlar. Yaklaşık yarısını keser."

