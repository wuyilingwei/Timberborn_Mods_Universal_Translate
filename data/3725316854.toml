["LV.BCEv.CampfireMystery2.O3.Ch1C1"]
raw = "The widened fireline reaches farther than before, and the dark gives up more of its shape.\nBy dawn, another spiral is found scratched into the ground near the old storage floor. Near the edge of the new light, the beavers find claw marks in the dirt, a smear of mud on old wood, and the mark pointing straight toward storage."
status = "normal"
enUS = "The widened fireline reaches farther than before, and the dark gives up more of its shape. By dawn, another spiral is found scratched into the ground near the old storage floor. Near the edge of the new light, the beavers find claw marks in the dirt, a smear of mud on old wood, and the mark pointing straight toward storage."
zhCN = "“拓宽的火线延伸得比以前更远，黑暗也展现出更多的轮廓。\n黎明时，在旧储藏室附近的地面上又发现了一个螺旋形的刮痕。在新光线的边缘，海狸们在泥土中发现了爪痕，旧木材上的泥浆痕迹，以及指向储藏室的标记。”"
zhTW = "擴大的火線比以前更遠，黑暗也顯露出更多的形狀。 \n黎明時，另一個螺旋出現在舊儲藏室的地面上。 在新光的邊緣，海狸們在泥土中發現了爪痕，舊木頭上的泥巴痕跡，以及指向儲藏室的標記。"
ruRU = "Расширенная огненная линия достигает дальше, чем раньше, и темнота раскрывает больше своих форм. К рассвету на земле у старого склада обнаруживается еще одна спираль, выцарапанная в земле. У края нового света бобры находят следы когтей в грязи, след от грязи на старом дереве и знак, указывающий прямо на склад."
jaJP = "広がった火のラインは以前よりも遠くまで達し、暗闇はその形をさらに明らかにする。 明け方には、古い収納フロアの近くにもうひとつの渦巻きが地面に引かれているのが見つかる。 新しい光の端に近づくと、ビーバーたちは土の中に爪跡を見つけ、古い木に泥が塗りつけられ、収納の方に真っ直ぐ指し示す印を見つける。"
frFR = "La ligne de feu élargie s'étend plus loin qu'auparavant, et l'obscurité révèle plus de sa forme.  \nÀ l'aube, une autre spirale est trouvée grattée dans le sol près de l'ancienne plateforme de stockage. Près de la limite de la nouvelle lumière, les castors trouvent des griffures dans la terre, une traînée de boue sur du vieux bois, et la marque pointant directement vers le stockage."
deDE = "Die erweiterte Feuerlinie reicht weiter als zuvor, und die Dunkelheit gibt mehr von ihrer Form preis. \nBei Tagesanbruch wird ein weiterer Spiralstrich in den Boden nahe dem alten Lagerboden gekratzt gefunden. Am Rand des neuen Lichts entdecken die Biber Kratzspuren im Boden, einen Schmiere aus Schlamm auf altem Holz und das Zeichen, das direkt in Richtung Lager zeigt."
plPL = "Poszerzona linia ognia sięga dalej niż wcześniej, a ciemność odkrywa więcej swoich kształtów. Przed świtem, w pobliżu starej podłogi magazynowej, znajdują kolejną spiralę wyrytą w ziemi. W pobliżu krawędzi nowego światła, bobry znajdują ślady pazurów w ziemi, smugę błota na starym drewnie oraz znak wskazujący prosto w kierunku magazynu."
ptBR = "A linha de fogo alargada se estende mais longe do que antes, e a escuridão revela mais de sua forma. Ao amanhecer, outra espiral é encontrada riscada no chão perto do antigo piso de armazenamento. Perto da borda da nova luz, os castores encontram marcas de garras na terra, uma mancha de lama em madeira velha e a marca apontando diretamente para o armazenamento."
koKR = "넓어진 화재선은 이전보다 더 멀리 뻗어 있으며, 어둠은 그 형태를 더 많이 드러냅니다. 새벽이 오자, 오래된 창고 바닥 근처에 또 다른 나선형이 땅에 긁힌 채 발견됩니다. 새로운 빛의 가장자리에, 비버들은 흙에 남겨진 발자국, 오래된 나무에 묻은 진흙 자국, 그리고 창고를 향해 똑바로 향한 표시를 발견합니다."
csCZ = "Zvětšená ohnivá čára dosahuje dál než předtím a temnota odhaluje více svého tvaru. \nPřed úsvitem je nalezen další spirálovitý vryp vyryté do země poblíž starého skladového patra. Na okraji nového světla bobři nacházejí stopy drápů v hlíně, skvrnu bláta na starém dřevě a značku ukazující přímo ke skladu."
viVN = "Đường lửa mở rộng vươn xa hơn trước, và bóng tối trở nên rõ ràng hơn.\nĐến bình minh, một vòng xoáy khác được tìm thấy khắc trên mặt đất gần sàn kho cũ. Gần rìa của ánh sáng mới, những con beaver tìm thấy dấu vết móng vuốt trong đất, một vết bùn trên gỗ cũ, và dấu hiệu chỉ thẳng về phía kho."
trTR = "Genişletilmiş ateş hattı, öncekinden daha uzağa ulaşıyor ve karanlık, şeklinin daha fazlasını ortaya koyuyor. Şafak vaktinde, eski depolama katının yakınında yere çizilmiş başka bir spiral bulunuyor. Yeni ışığın kenarında, kunduzlar toprakta tırnak izleri, eski ahşapta çamur lekesi ve depoya doğrudan işaret eden bir işaret buluyor."

["LV.BCEv.CampfireMystery2.O3.Ch1C2"]
raw = "The second bowl is gone before dawn.\nBy dawn, another spiral is found near the old storage floor. Beside it, the beavers find three berries arranged in a neat line. Not eaten. Not hidden. Left behind.\nNo one knows whether it means thanks, warning, or terrible table manners."
status = "normal"
enUS = "The second bowl is gone before dawn.  \nBy dawn, another spiral is found near the old storage floor. Beside it, the beavers find three berries arranged in a neat line. Not eaten. Not hidden. Left behind.  \nNo one knows whether it means thanks, warning, or terrible table manners."
zhCN = "“第二个碗在黎明之前就消失了。\n到黎明时，在旧储物层附近发现了另一个螺旋。旁边，海狸们发现三颗整齐排列的浆果。没有被吃掉。没有被隐藏。被留下来。\n没人知道这意味着感谢、警告，还是糟糕的餐桌礼仪。”"
zhTW = "第二個碗在黎明之前消失了。\n到黎明時，在舊儲藏室的地板附近發現了另一個螺旋。旁邊，河狸發現三顆整齊排列的漿果。未被吃掉。未被藏起。被遺留下來。\n沒有人知道這是感謝、警告，還是可怕的餐桌禮儀。"
ruRU = "Вторая чаша исчезла до рассвета.\nК рассвету рядом со старым складским полом обнаруживается еще одна спираль. Рядом с ней бобры находят три ягоды, аккуратно выложенные в ряд. Не съеденные. Не спрятанные. Оставленные.\nНикто не знает, означает ли это благодарность, предупреждение или ужасные манеры за столом."
jaJP = "第二のボウルは夜明け前に消えている。  \n夜明けまでに、古い収納フロアの近くにもう一つの螺旋が見つかる。 その横には、三つのベリーがきれいに並べられている。 食べられておらず。隠されてもいない。残されている。  \n誰もそれが感謝の意なのか、警告なのか、ひどいテーブルマナーなのかは知らない。"
frFR = "Le deuxième bol a disparu avant l'aube.  \nÀ l'aube, une autre spirale est trouvée près de l'ancien étage de stockage. À côté, les castors trouvent trois baies disposées en ligne soigneusement. Pas mangées. Pas cachées. Laissées derrière.  \nPersonne ne sait si cela signifie merci, avertissement ou de terribles manières à table."
deDE = "Die zweite Schüssel ist vor der Morgendämmerung verschwunden.\nBei Tagesanbruch wird eine weitere Spirale neben dem alten Lagerboden gefunden. Daneben finden die Biber drei Beeren, die in einer ordentlichen Reihe angeordnet sind. Nicht gegessen. Nicht versteckt. Zurückgelassen.\nNiemand weiß, ob das Dank, eine Warnung oder schreckliche Tischmanieren bedeutet."
plPL = "Druga miska znika przed świtem.\nPrzed świtem, kolejna spirala zostaje znaleziona w pobliżu starej podłogi magazynu. Obok niej, bobry znajdują trzy jagody ułożone w równo w linii. Nie zjedzone. Nie ukryte. Zostawione.\nNikt nie wie, czy to znaczy dziękuję, ostrzeżenie, czy okropne maniery przy stole."
ptBR = "A segunda tigela desapareceu antes do amanhecer.  \nAo amanhecer, uma nova espiral é encontrada perto do antigo chão de armazenamento. Ao lado dela, os castores encontram três frutas dispostas em uma linha ordenada. Não comidas. Não escondidas. Deixadas para trás.  \nNinguém sabe se isso significa agradecimento, aviso ou péssimos modos à mesa."
koKR = "두 번째 그릇은 새벽이 오기 전에 사라졌다.  \n새벽이 밝자, 오래된 저장소 바닥 근처에서 또 하나의 나선형 물체가 발견되었다. 그 옆에는 비버들이 정갈하게 나란히 놓인 세 개의 베리를 발견한다. 먹지도, 숨기지도 않았다. 버려졌다.  \n그것이 감사의 표시인지, 경고인지, 아니면 형편없는 테이블 매너인지 아무도 모른다."
csCZ = "Druhá mísa zmizela před svítáním. \nPřed svítáním je nalezen další vír blízko staré podlahy skladu. Vedle něj bobři nacházejí tři bobule uspořádané do krásného řádku. Nezkonzumované. Nepořádku. Opomenuté.\nNikdo neví, zda to znamená poděkování, varování, nebo strašné stolování."
viVN = "Bát thứ hai đã biến mất trước bình minh.  \nĐến lúc bình minh, một cuộn xoáy khác được tìm thấy gần nền kho cũ. Bên cạnh nó, những con hải ly tìm thấy ba quả dâu được sắp xếp thành một hàng gọn gàng. Chưa ăn. Chưa giấu. Để lại.  \nKhông ai biết điều đó có nghĩa là cảm ơn, cảnh báo, hay cách cư xử trên bàn ăn tồi tệ."
trTR = "İkinci kâse şafaktan önce gitmiş.\nŞafak vaktinde, eski depolama katının yakınında başka bir spiral bulunuyor. Yanında, kunduzlar düzenli bir sırayla dizilmiş üç meyve buluyor. Yenmemiş. Saklanmamış. Arkada bırakılmış.\nHiç kimse bunun teşekkür mü, uyarı mı yoksa berbat masa adabı mı olduğu konusunda bir şey bilmiyor."

["LV.BCEv.CampfireMystery2.O3.Ch1C3"]
raw = "The improved device works almost too well.\nWhen the knocking comes, the stretched bark trembles hard enough to make the Inventor squeak. The echo is definitely beneath the old storage floor.\nBy dawn, another spiral is found near the old storage floor, exactly where the hollow echo was strongest.\nThe ghost, if it is a ghost, has very ordinary acoustics."
status = "normal"
enUS = "The improved device works almost too well. When the knocking comes, the stretched bark trembles hard enough to make the Inventor squeak. The echo is definitely beneath the old storage floor. By dawn, another spiral is found near the old storage floor, exactly where the hollow echo was strongest. The ghost, if it is a ghost, has very ordinary acoustics."
zhCN = "改进后的装置几乎工作得太好了。\n当敲击声响起时，拉紧的树皮颤动得足以让发明家 squeak（发出尖叫声）。回声无疑是在老储藏室的地板下。\n黎明时，在老储藏室的地板附近发现了另一个螺旋，正好在空心回声最强的地方。\n如果这是鬼魂，那它的音响效果非常普通。"
zhTW = "這個改進的裝置幾乎運作得過於完美。\n當敲擊聲響起時，延展的樹皮顫動得很厲害，甚至讓發明家發出尖銳的聲音。回音肯定是在老儲藏地板下。\n到黎明時，又發現了另一個螺旋，正好位於回音最強的位置。\n那個幽靈，如果真的是幽靈，聲學特性非常普通。"
ruRU = "Улучшенное устройство работает почти слишком хорошо. \nКогда слышится стук, натянутая кора дрожит так сильно, что заставляет Изобретателя скрипеть. Эхо определенно находится под старым полом хранилища. \nК рассвету еще спираль была найдена рядом со старым полом хранилища, точно там, где полое эхо было наибольшим. \nПризрак, если это призрак, обладает очень обычной акустикой."
jaJP = "改良された装置はほぼ完璧に機能します。ノックの音がすると、引き伸ばされた樹皮が十分に震え、発明家はきしむ音を立てます。エコーは確実に古い倉庫の床の下にあります。夜明けまでに、空洞のエコーが最も強かった場所、古い倉庫の床の近くで別のスパイラルが見つかります。幽霊がいるとすれば、それは非常に普通の音響です。"
frFR = "L'appareil amélioré fonctionne presque trop bien. Lorsque le coup résonne, l'écorce tendue tremble assez fort pour faire couiner l'Inventeur. L'écho se trouve définitivement sous l'ancien plancher de stockage. À l'aube, une autre spirale est trouvée près de l'ancien plancher de stockage, exactement là où l'écho creux était le plus fort. Le fantôme, si c'en est un, a des acoustiques très ordinaires."
deDE = "Das verbesserte Gerät funktioniert fast zu gut. Wenn das Klopfen kommt, zittert die gespaltene Rinde stark genug, um den Erfinder quietschen zu lassen. Das Echo ist definitiv unter dem alten Lagerboden. Bei Sonnenaufgang wird eine weitere Spirale in der Nähe des alten Lagerbodens gefunden, genau dort, wo das hohle Echo am stärksten war. Der Geist, falls es ein Geist ist, hat ganz gewöhnliche Akustik."
plPL = "Udoskonalone urządzenie działa niemal za dobrze. \nGdy zaczyna się stukanie, napięta kora drży na tyle, żeby sprawić, że Wynalazca piszczy. Echo zdecydowanie znajduje się pod starym podłogą magazynu. \nDo świtu kolejna spirala zostaje znaleziona w pobliżu starej podłogi magazynu, dokładnie tam, gdzie puste echo było najsilniejsze. \nDuch, jeśli to jest duch, ma bardzo zwyczajne akustyki."
ptBR = "O dispositivo aprimorado funciona quase bem demais. Quando a batida vem, a casca esticada treme o suficiente para fazer o Inventor ranger. O eco está definitivamente abaixo do antigo piso de armazenamento. Ao amanhecer, outra espiral é encontrada perto do antigo piso de armazenamento, exatamente onde o eco oco era mais forte. O fantasma, se é que é um fantasma, tem acústica muito comum."
koKR = "개선된 장치가 너무 잘 작동합니다. 노크 소리가 날 때, 늘어난 나무 껍질이 너무 심하게 떨려서 발명가가 삐걱거립니다. 에코는 분명히 오래된 저장소 바닥 아래에 있습니다. 새벽이 오기 전, 오래된 저장소 바닥 근처에서 또 다른 나선이 발견되었고, 바로 그곳이 공명 소리가 가장 강했던 곳입니다. 만약 그것이 유령이라면, 매우 평범한 음향입니다."
csCZ = "Vylepšené zařízení funguje téměř příliš dobře. Když začnou údery, napnutá kůra se třese natolik, že to způsobí, že Vynálezce zakvílí. Ozvěna je jistě pod starou podlahou skladu. Do rána je u staré podlahy skladu nalezena další spirála, přesně tam, kde byla dutá ozvěna nejsilnější. Duch, pokud to tedy je duch, má velmi obyčejnou akustiku."
viVN = "Cái thiết bị cải tiến hoạt động gần như quá tốt.\nKhi tiếng gõ đến, lớp vỏ căng lên rung động mạnh đến mức làm nhà phát minh kêu lên. Tiếng vọng chắc chắn đến từ dưới sàn kho cũ.\nĐến sáng, một vòng xoắn khác được tìm thấy gần sàn kho cũ, chính xác ở vị trí mà tiếng vọng rỗng mạnh nhất.\nCon ma, nếu đó là một con ma, có âm học rất bình thường."
trTR = "Geliştirilmiş cihaz neredeyse çok iyi çalışıyor. \nTıklama sesi geldiğinde, gerilmiş kabuk o kadar titriyor ki İcatçı cıyaklıyor. Yankı kesinlikle eski depolama zemininde.\nŞafak vaktinde, eski depolama zeminine yakın, boş yankının en güçlü olduğu yerde başka bir spiral bulunuyor. \nEğer bir hayaletse, oldukça sıradan akustiği var."

