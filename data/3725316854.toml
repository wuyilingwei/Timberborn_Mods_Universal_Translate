["LV.BCEv.CampfireMystery1.Content"]
raw = "The Campfire burns low, and the colony gathers close. At first, the evening belongs to ordinary things: tired paws, warm light, old jokes, and the comforting crackle of wood becoming ash. Then something knocks from beyond the firelight.\n[[C]]<YellowHighlight><i>Knock. Knock. Knock.</i></YellowHighlight>\nNo one moves. A young beaver whispers that it came from the trees. An elder insists it was only old timber settling. Someone else points out that old timber usually does not wait politely between knocks.\nThe fire snaps. Sparks drift upward. Every eye turns toward the dark beyond the circle. Then it comes again.\n[[C]]<YellowHighlight><i>Knock. Knock. Knock.</i></YellowHighlight>\nThis time, the sound is closer. By morning, the colony finds muddy pawprints near the storage piles, a few missing supplies, and a strange spiral scratched into a plank. It looks almost like a beaver tail, if the beaver drawing it had never seen one clearly. By sunset, every beaver has a theory.\n[[C]]A ghost from the Old Banks.\n[[C]]A thief with very small paws.\n[[C]]A warning from the forest.\n[[C]]A prank by someone with too much free time.\n[[C]]<i>Or something worse.</i>\nTonight, the Campfire will burn again. The colony must decide what kind of answer it wants from the dark."
status = "normal"
enUS = "The Campfire burns low, and the colony gathers close. At first, the evening belongs to ordinary things: tired paws, warm light, old jokes, and the comforting crackle of wood becoming ash. Then something knocks from beyond the firelight.  \n[[C]]<YellowHighlight><i>Knock. Knock. Knock.</i></YellowHighlight>  \nNo one moves. A young beaver whispers that it came from the trees. An elder insists it was only old timber settling. Someone else points out that old timber usually does not wait politely between knocks.  \nThe fire snaps. Sparks drift upward. Every eye turns toward the dark beyond the circle. Then it comes again.  \n[[C]]<YellowHighlight><i>Knock. Knock. Knock.</i></YellowHighlight>  \nThis time, the sound is closer. By morning, the colony finds muddy pawprints near the storage piles, a few missing supplies, and a strange spiral scratched into a plank. It looks almost like a beaver tail, if the beaver drawing it had never seen one clearly. By sunset, every beaver has a theory.  \n[[C]]A ghost from the Old Banks.  \n[[C]]A thief with very small paws.  \n[[C]]A warning from the forest.  \n[[C]]A prank by someone with too much free time.  \n[[C]]<i>Or something worse.</i>  \nTonight, the Campfire will burn again. The colony must decide what kind of answer it wants from the dark."
zhCN = "篝火微弱，殖民地聚集在一起。起初，夜晚属于平常的事物：疲惫的爪子，温暖的光，老旧的笑话，以及木头化为灰烬时令人安心的噼啪声。然后，某种声音从火光之外传来。  \n[[C]]<YellowHighlight><i>敲。敲。敲。</i></YellowHighlight>  \n无人行动。一只年轻的海狸低声说，是从树上传来的。一个长者坚称那只是旧木头在定型。其他人指出，旧木头通常不会在敲声之间等得如此有礼。  \n火焰噼啪作响，火星向上飘去。每只眼睛都转向黑暗的圆周之外。然后，声音再次响起。  \n[[C]]<YellowHighlight><i>敲。敲。敲。</i></YellowHighlight>  \n这一次，声音更近了。到早晨，殖民地发现储存堆附近有泥泞的爪印，有些物资失踪，还有一块木板上刻着奇怪的螺旋。看起来几乎像是一只海狸的尾巴，尽管画它的海狸从未清楚地见过尾巴。到太阳落山时，每只海狸都有一个理论。  \n[[C]]来自旧银行的幽灵。  \n[[C]]一个爪子非常小的小偷。  \n[[C]]来自森林的警告。  \n[[C]]一个闲得没事干的人的恶作剧。  \n[[C]]<i>或者更糟的东西。</i>  \n今晚，篝火将再次燃烧。殖民地必须决定它想从黑暗中得到什么样的回应。"
zhTW = "營火的火焰微弱，殖民地的人們聚集在一起。起初，夜晚屬於平常的事情：疲憊的爪子、溫暖的光線、老舊的笑話，以及木頭化為灰燼時安慰人心的噼啪聲。然後，從火光之外傳來了什麼東西的敲擊聲。\n[[C]]<YellowHighlight><i>咚。咚。咚。</i></YellowHighlight>\n沒有任何人動彈。一隻年輕的海狸低聲說那聲音來自樹林。一位長者堅持認為那只是老木材在沉降。其他人指出，老木材通常不會在敲擊之間優雅地等候。\n火焰發出噼啪聲，火花飄向高空。每一雙眼睛都轉向圓圈之外的黑暗。然後它再次來臨。\n[[C]]<YellowHighlight><i>咚。咚。咚。</i></YellowHighlight>\n這次，聲音更近了。到了早晨，殖民地發現儲存堆附近有泥濘的爪印，少數缺失的物資，以及一塊木板上刻著的奇怪螺旋。這看起來幾乎像是海狸的尾巴，如果畫它的海狸從未清楚見過尾巴的話。到了日落，每隻海狸都有了一個理論。\n[[C]]來自古老河岸的鬼魂。\n[[C]]一個有著非常小爪子的盜賊。\n[[C]]來自森林的警告。\n[[C]]一個有太多空閒時間的人的惡作劇。\n[[C]]<i>或更糟的東西。</i>\n今晚，營火將再次燃燒。殖民地必須決定想要從黑暗中獲得什麼樣的答案。"
ruRU = "Костер горит тихо, и колония собирается близко друг к другу. Сначала вечер принадлежит обычным вещам: усталым лапам, теплому свету, старым шуткам и успокаивающему треску древесины, превращающейся в пепел. Затем что-то стукает из-за пределов светового круга.\n[[C]]<YellowHighlight><i>Тук. Тук. Тук.</i></YellowHighlight>\nНикто не движется. Молодой бобер шепчет, что это было из деревьев. Старейшина настаивает, что это просто старые деревья усаживаются. Кто-то другой указывает, что старые деревья обычно не ждут вежливо между стуками.\nОгонь трещит. Искры поднимаются вверх. Каждый взгляд обращается к темноте за кругом. А затем это снова происходит.\n[[C]]<YellowHighlight><i>Тук. Тук. Тук.</i></YellowHighlight>\nНа этот раз звук ближе. К утру колония находит грязные следы у хранения, несколько пропавших припасов и странную спираль, зачеркнутую на доске. Она выглядит почти как бобровый хвост, если бы бобер, рисующий его, никогда не видел его четко. К закату у каждого бобра есть своя теория.\n[[C]]Призрак из Старых Берегов.\n[[C]]Вор с очень маленькими лапами.\n[[C]]Предупреждение из леса.\n[[C]]Шутка от кого-то с слишком много свободного времени.\n[[C]]<i>Или что-то worse.</i>\nСегодня ночью костер снова загорится. Колония должна решить, какой ответ она хочет получить от темноты."
jaJP = "キャンプファイヤーは低く燃え、コロニーは近くに集まる。最初のうちは、夕方は普通のもので満たされている：疲れた足、温かい光、古いジョーク、そして木が灰になる心地よいパチパチという音。その時、火の光の向こう側から何かがノックする。\n[[C]]<YellowHighlight><i>ノック。ノック。ノック。</i></YellowHighlight>\n誰も動かない。若いビーバーが、木々の方からの音だとささやく。年寄りは、ただ古い木が沈んだだけだと主張する。別の誰かが、古い木は通常ノックの間に礼儀正しく待つことはないと指摘する。\n火がパチッと音を立てる。火花が上に漂う。すべての目が円の外の暗闇に向かう。そして再びそれが来る。\n[[C]]<YellowHighlight><i>ノック。ノック。ノック。</i></YellowHighlight>\n今回は、その音が近くにある。朝になると、コロニーは貯蔵山の近くに泥だらけの足跡を見つけ、いくつかの欠けた物資、そして板に引っ掻かれた奇妙な渦巻きを見つける。それはほとんどビーバーの尾のように見えるが、それを描いたビーバーは明確に見たことがないようだ。日が沈む頃には、すべてのビーバーが理論を持つ。\n[[C]]古い銀行からの幽霊。\n[[C]]とても小さな足を持つ泥棒。\n[[C]]森からの警告。\n[[C]]暇を持て余している誰かのいたずら。\n[[C]]<i>それとも、もっと悪いもの。</i>\n今夜、キャンプファイヤーは再び燃える。コロニーは、暗闇からどんな答えを望んでいるのかを決めなければならない。"
frFR = "Le feu de camp brûle faiblement, et la colonie se regroupe. Au début, la soirée appartient aux choses ordinaires : pattes fatiguées, lumière chaude, vieilles blagues et le crépitement apaisant du bois se transformant en cendres. Puis quelque chose frappe au-delà de la lumière du feu.\n[[C]]<YellowHighlight><i>Knock. Knock. Knock.</i></YellowHighlight>\nPersonne ne bouge. Un jeune castor chuchote que cela vient des arbres. Un ancien insiste sur le fait que ce n'était que du vieux bois qui se déplace. Quelqu'un d'autre fait remarquer que le vieux bois n'attend généralement pas poliment entre les coups.\nLe feu crépite. Des étincelles s'élèvent. Tous les yeux se tournent vers l'obscurité au-delà du cercle. Puis cela revient.\n[[C]]<YellowHighlight><i>Knock. Knock. Knock.</i></YellowHighlight>\nCette fois, le son est plus proche. Au matin, la colonie trouve des empreintes boueuses près des tas de stockage, quelques fournitures manquantes, et une étrange spirale grattée sur une planche. Cela ressemble presque à une queue de castor, si le castor qui l'a dessinée n'en avait jamais vu une clairement. Au coucher du soleil, chaque castor a une théorie.\n[[C]]Un fantôme des Vieilles Rives.\n[[C]]Un voleur avec de très petites pattes.\n[[C]]Un avertissement de la forêt.\n[[C]]Une farce de quelqu'un avec trop de temps libre.\n[[C]]<i>Ou quelque chose de pire.</i>\nCe soir, le feu de camp brûlera à nouveau. La colonie doit décider quel genre de réponse elle veut de l'obscurité."
deDE = "Das Lagerfeuer brennt schwach, und die Kolonie versammelt sich nah. Zunächst gehört der Abend den gewöhnlichen Dingen: müde Pfoten, warmes Licht, alte Witze und das beruhigende Knistern von Holz, das zu Asche wird. Dann klopft es aus jenseits des Feuerscheins.  \n[[C]]<YellowHighlight><i>Klopp. Klopp. Klopp.</i></YellowHighlight>  \nNiemand bewegt sich. Ein junger Biber flüstert, dass es von den Bäumen kam. Ein Älterer besteht darauf, es sei nur das alte Holz, das sich setzt. Jemand anders weist darauf hin, dass altes Holz normalerweise nicht höflich zwischen den Klopfen wartet.  \nDas Feuer knackt. Funken steigen auf. Jedes Auge richtet sich auf die Dunkelheit jenseits des Kreises. Dann kommt es wieder.  \n[[C]]<YellowHighlight><i>Klopp. Klopp. Klopp.</i></YellowHighlight>  \nDieses Mal ist das Geräusch näher. Am Morgen findet die Kolonie schmutzige Pfotenabdrücke in der Nähe der Vorratsstapel, ein paar fehlende Vorräte und eine seltsame Spirale, die in ein Brett gekratzt wurde. Es sieht fast wie ein Biber schwanz aus, als ob der Biber, der es zeichnete, ihn nie klar gesehen hätte. Bei Sonnenuntergang hat jeder Biber eine Theorie.  \n[[C]]Ein Geist von den Alten Ufern.  \n[[C]]Ein Dieb mit sehr kleinen Pfoten.  \n[[C]]Eine Warnung aus dem Wald.  \n[[C]]Ein Streich von jemandem mit zu viel Freizeit.  \n[[C]]<i>Oder etwas Schlimmeres.</i>  \nHeute Nacht wird das Lagerfeuer wieder brennen. Die Kolonie muss entscheiden, was für eine Art von Antwort sie aus der Dunkelheit möchte."
plPL = "Ognisko płonie nisko, a kolonia gromadzi się blisko. Na początku wieczór należy do zwykłych rzeczy: zmęczonych łap, ciepłego światła, starych żartów i pocieszającego trzasku drewna zamieniającego się w popiół. Wtedy coś stuka z poza światła ogniska.\n[[C]]<YellowHighlight><i>Stuk. Stuk. Stuk.</i></YellowHighlight>\nNikt się nie rusza. Młody bóbr szeptał, że to przyszło z drzew. Starszy bóbr upiera się, że to tylko stare drewno osiada. Ktoś inny zauważa, że stare drewno zazwyczaj nie czeka grzecznie między stuknięciami.\nOgnisko trzaska. Iskry unoszą się w górę. Każde oko zwraca się ku ciemności poza kręgiem. A potem znów to się pojawia.\n[[C]]<YellowHighlight><i>Stuk. Stuk. Stuk.</i></YellowHighlight>\nTym razem dźwięk jest bliżej. Rano kolonia znajduje błotniste odciski łap w pobliżu stosów zapasów, kilka zaginionych materiałów i dziwne spirale wyryte w desce. Wygląda prawie jak ogon bobra, jeśli bóbr rysujący go nigdy nie widział jednego wyraźnie. Do zachodu słońca każdy bóbr ma swoją teorię.\n[[C]]Duch ze Starych Brzegów.\n[[C]]Złodziej z bardzo małymi łapami.\n[[C]]Ostrzeżenie z lasu.\n[[C]]Psikus kogoś z nadmiarem wolnego czasu.\n[[C]]<i>Lub coś gorszego.</i>\nDziś nocą ognisko znów będzie płonąć. Kolonia musi zdecydować, jakiej odpowiedzi chce od ciemności."
ptBR = "A fogueira arde fraca, e a colônia se reúne próximo. A princípio, a noite pertence a coisas ordinárias: patas cansadas, luz quente, piadas antigas e o reconfortante crepitar da madeira se transformando em cinzas. Então algo bate do lado de fora da luz do fogo.  \n[[C]]<YellowHighlight><i>Knock. Knock. Knock.</i></YellowHighlight>  \nNinguém se move. Um jovem castor sussurra que veio das árvores. Um ancião insiste que era apenas madeira velha se acomodando. Outra pessoa aponta que madeira velha geralmente não espera educadamente entre as batidas.  \nO fogo estala. Centelhas flutuam para cima. Todos os olhares se voltam para a escuridão além do círculo. Então vem de novo.  \n[[C]]<YellowHighlight><i>Knock. Knock. Knock.</i></YellowHighlight>  \nDesta vez, o som está mais perto. Pela manhã, a colônia encontra pegadas de patas lamacentas perto dos depósitos, alguns suprimentos desaparecidos e uma estranha espiral arranhada em uma tábua. Parece quase como uma cauda de castor, se o castor que a desenhou nunca tivesse visto uma claramente. Ao pôr do sol, cada castor tem uma teoria.  \n[[C]]Um fantasma dos Velhos Bancos.  \n[[C]]Um ladrão com patas muito pequenas.  \n[[C]]Um aviso da floresta.  \n[[C]]Uma brincadeira de alguém com tempo demais livre.  \n[[C]]<i>Ou algo pior.</i>  \nEsta noite, a fogueira queimará novamente. A colônia deve decidir que tipo de resposta deseja da escuridão."
koKR = "모닥불은 낮게 타오르고, 식민지는 가까이 모인다. 처음에 저녁은 평범한 것들의 것이었다: 피곤한 발, 따뜻한 빛, 오래된 농담, 그리고 나무가 재가 되는 안락한 파삭거림. 그러다 불빛 너머에서 무언가가 두드린다.\n[[C]]<YellowHighlight><i>두드려. 두드려. 두드려.</i></YellowHighlight>\n아무도 움직이지 않는다. 한 어린 비버가 나무들에서 왔다고 속삭인다. 한 노인이 그것은 단지 오래된 나무가 자리 잡는 소리라고 주장한다. 다른 누군가는 오래된 나무가 일반적으로 두드림 사이에 공손하게 기다리지 않는다고 지적한다.\n모닥불이 쩍 소리를 낸다. 불꽃이 하늘로 떠오른다. 모든 눈이 원의 바깥 어둠으로 향한다. 그리고 그것이 다시 온다.\n[[C]]<YellowHighlight><i>두드려. 두드려. 두드려.</i></YellowHighlight>\n이번에는 소리가 더 가까이 있다. 아침이 오면서 식민지는 저장 더미 근처에서 진흙으로 묻은 발자국, 몇 개의 사라진 물자, 그리고 판자에 긁혀 있는 이상한 나선형을 발견한다. 그건 거의 비버의 꼬리처럼 보인다, 만약 그것을 그린 비버가 결코 제대로 본 적이 없다면. 해질 무렵, 모든 비버는 이론을 가지고 있다.\n[[C]] 오래된 뱅크에서 온 유령.\n[[C]] 아주 작은 발을 가진 도둑.\n[[C]] 숲에서 오는 경고.\n[[C]] 너무 많은 자유 시간을 가진 이의 장난.\n[[C]]<i>혹은 더 나쁜 무언가.</i>\n오늘 밤, 모닥불은 다시 타오를 것이다. 식민지는 어둠에서 어떤 대답을 원하는지 결정해야 한다."
csCZ = "Oheň u tábořiště hoří nízko a kolonie se shlukuje blízko. Zpočátku večer náleží obyčejným věcem: unaveným tlapkám, teplému světlu, starým vtipům a uklidňujícím praskání dřeva, které se mění na popel. Poté se něco ozve z poza světla ohně.  \n[[C]]<YellowHighlight><i>Klopp. Klopp. Klopp.</i></YellowHighlight>  \nNikdo se nepohne. Mladý bobr šeptá, že to přišlo z lesa. Starší trvá na tom, že to byla jen stará kulatina usazující se. Někdo jiný poukazuje na to, že stará kulatina obvykle nečeká zdvořile mezi údery.  \nOheň praskne. Jiskry se vznesou vzhůru. Každé oko se obrátí k temnotě za kruhem. Poté se to ozve znovu.  \n[[C]]<YellowHighlight><i>Klopp. Klopp. Klopp.</i></YellowHighlight>  \nTentokrát je zvuk blíž. Ráno kolonie nachází blátivé stopy po tlapkách poblíž zásobních hromad, několik chybějících zásob a podivnou spirálu vyrytou do prkna. Vypadá to téměř jako bobří ocas, jako by bobr, který to rysuje, nikdy neviděl jeden jasně. Do západu slunce má každý bobr teorii.  \n[[C]]Duch ze Starých Bank.  \n[[C]]Zloděj s velmi malými tlapkami.  \n[[C]]Varování z lesa.  \n[[C]]Žert od někoho s příliš volným časem.  \n[[C]]<i>A nebo něco horšího.</i>  \nDnes v noci oheň u tábořiště opět hoří. Kolonie se musí rozhodnout, jaký druh odpovědi chce z temnoty."
viVN = "Lửa trại đang cháy yếu, và thuộc địa tụ tập gần nhau. Ban đầu, buổi tối thuộc về những điều bình dị: những đôi chân mệt mỏi, ánh sáng ấm áp, những câu chuyện cũ, và âm thanh xì xèo dễ chịu của gỗ đang biến thành tro. Rồi thì, có thứ gì đó gõ từ bên ngoài ánh lửa.\n[[C]]<YellowHighlight><i>Gõ. Gõ. Gõ.</i></YellowHighlight>\nKhông ai động đậy. Một con hải ly trẻ thì thầm rằng âm thanh đến từ những cái cây. Một vị trưởng lão khăng khăng khẳng định đó chỉ là gỗ cũ thích ứng. Ai đó khác chỉ ra rằng gỗ cũ thường không chờ đợi một cách lịch sự giữa các tiếng gõ.\nLửa nổ vang. Các tia lửa bốc lên trên. Mọi ánh mắt đều hướng về phía bóng tối bên ngoài vòng tròn. Rồi điều đó lại xảy ra.\n[[C]]<YellowHighlight><i>Gõ. Gõ. Gõ.</i></YellowHighlight>\nLần này, âm thanh gần hơn. Sáng hôm sau, thuộc địa phát hiện ra dấu chân bùn gần các đống lưu trữ, một vài vật dụng mất tích, và một hình xoắn奇怪 được khắc vào một tấm ván. Nó trông gần như giống như một cái đuôi hải ly, nếu như con hải ly vẽ nó chưa bao giờ nhìn thấy một cái một cách rõ ràng. Đến hoàng hôn, mỗi con hải ly đều có một lý thuyết.\n[[C]]Một bóng ma từ các Ngân hàng Cổ.\n[[C]]Một kẻ trộm với những đôi chân rất nhỏ.\n[[C]]Một lời cảnh báo từ khu rừng.\n[[C]]Một trò đùa của ai đó có quá nhiều thời gian rảnh rỗi.\n[[C]]<i>Hoặc một điều tồi tệ hơn.</i>\nTối nay, Lửa trại sẽ lại cháy. Thuộc địa phải quyết định loại câu trả lời nào họ muốn từ bóng tối."
trTR = "Kamp Ateşi sönmek üzere, koloni yakınlarda toplanmış. İlk başta, akşam sıradan şeylere ait: yorgun patiler, sıcak ışık, eski şakalar ve odunun kül olma sesinin rahatlatıcı çatırdaması. Sonra, ateş ışığının ötesinden bir şey tıklatıyor.\n[[C]]<YellowHighlight><i>Tık. Tık. Tık.</i></YellowHighlight>\nKimse hareket etmiyor. Genç bir kunduz, sesin ağaçlardan geldiğini fısıldıyor. Bir yaşlı, bunun sadece eski odunların yerleşmesi olduğunu ısrarla savunuyor. Başka biri, eski odunun genellikle tıklatma arasında nazikçe beklemediğini belirtiyor.\nAteş çıtırdıyor. Kıvılcımlar yukarı doğru savruluyor. Her göz, çemberin ötesindeki karanlığa dönüyor. Sonra tekrar geliyor.\n[[C]]<YellowHighlight><i>Tık. Tık. Tık.</i></YellowHighlight>\nBu sefer, ses daha yakın. Sabah olduğunda, koloni depolama yığınlarının yakınında çamurlu patiler buluyor, birkaç kaybolan malzeme ve bir tahtaya kazınmış garip bir spiral. Görünüşe göre, neredeyse bir kunduz kuyruğu gibi, ama onu çizen kunduz bir tane hiç net bir şekilde görmemişse. Gün batımına kadar, her kunduzun bir teorisi var.\n[[C]]Eski Bankalardan bir hayalet.\n[[C]]Çok küçük patileri olan bir hırsız.\n[[C]]Ormandan bir uyarı.\n[[C]]Boş zamanı fazla olan birinin şakası.\n[[C]]<i>Ya da daha kötü bir şey.</i>\nBu gece, Kamp Ateşi yeniden yanacak. Koloni, karanlıktan ne tür bir cevap istediğine karar vermek zorunda."

