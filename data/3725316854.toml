["LV.BCEv.CampfireMystery4.Content"]
raw = "{0}\nFor two days, the captured beaver does not wake.\nThe injured are bandaged. The old storage floor is watched. The Campfire burns quietly, but no one asks for stories.\nThen, at last, the stranger opens their eyes.\nThey are thin, frightened, and smaller than the shadow made them seem.\nWhen they see the gathered colony, they scramble backward until their tail strikes the wall. It is crooked, scarred, and stiff, curled strangely enough that several beavers understand the spiral marks all at once.\nThe marks were not curses.\nThey were not warnings from a ghost.\nThey were tail-signs, scratched by someone who needed to find their way through the dark.\nPiece by piece, the truth comes out.\nThe stranger came from a failed settlement beyond the trees. They followed the smoke of the Campfire, found the colony, and hid beneath the storage floor because hunger was easier to face than being chased away.\nThey stole only what they could carry.\nThey knocked because they were afraid.\nThey fought because, in the dark, every paw reaching down looked like an enemy.\n{1}\nNow the colony must decide what kind of story this will become.\nA warning.\nA welcome.\nOr the tale of a beaver who found firelight and was sent back into the dark."
status = "normal"
enUS = "{0}\nFor two days, the captured beaver does not wake.\nThe injured are bandaged. The old storage floor is watched. The Campfire burns quietly, but no one asks for stories.\nThen, at last, the stranger opens their eyes.\nThey are thin, frightened, and smaller than the shadow made them seem.\nWhen they see the gathered colony, they scramble backward until their tail strikes the wall. It is crooked, scarred, and stiff, curled strangely enough that several beavers understand the spiral marks all at once.\nThe marks were not curses.\nThey were not warnings from a ghost.\nThey were tail-signs, scratched by someone who needed to find their way through the dark.\nPiece by piece, the truth comes out.\nThe stranger came from a failed settlement beyond the trees. They followed the smoke of the Campfire, found the colony, and hid beneath the storage floor because hunger was easier to face than being chased away.\nThey stole only what they could carry.\nThey knocked because they were afraid.\nThey fought because, in the dark, every paw reaching down looked like an enemy.\n{1}\nNow the colony must decide what kind of story this will become.\nA warning.\nA welcome.\nOr the tale of a beaver who found firelight and was sent back into the dark."
zhCN = "{0}\n被捕的海狸两天没醒。\n受伤的被包扎了。旧仓库的地板受到监视。篝火静静燃烧，但没有人讲故事。\n最后，这位陌生人才睁开了眼睛。\n他们消瘦、受惊，和阴影中看上去的样子相比显得更小。\n当他们看到聚集的群体时，他们向后爬去，直到尾巴撞上墙壁。它弯曲、伤痕累累且僵硬，扭曲得奇怪，以至于几只海狸瞬间理解了那螺旋的印记。\n那些印记不是诅咒。\n它们不是鬼魂的警告。\n它们是尾巴的符号，由一个需要在黑暗中寻找出路的人划刻而成。\n真相一层层浮出水面。\n这位陌生人来自树木之外一个失败的定居点。他们跟随篝火的烟雾，找到了这个群体，并在仓库的地板下藏了起来，因为面对饥饿比被赶走更容易。\n他们只偷取了能携带的东西。\n他们敲门是因为害怕。\n他们战斗是因为在黑暗中，每只伸下来的爪子看起来都像敌人。\n{1}\n现在这个群体必须决定这个故事将成为什么。\n一个警告。\n一个欢迎。\n或是一个找到火光的海狸被送回黑暗的故事。"
zhTW = "{0}\n兩天來，被捕的海狸沒有醒來。\n受傷者已經包紮好。舊的儲存地板受到守護。營火靜靜燃燒，但沒有人要求講故事。\n然後，最終，這位陌生人睜開了眼睛。\n他們瘦弱、驚恐，並且比陰影所顯示的還要小。\n當他們看到聚集的群落時，立刻向後退，直到尾巴撞上牆壁。尾巴歪曲、滿是傷痕且僵硬，捲曲得奇怪，以至於幾隻海狸立刻理解了這些螺旋的痕跡。\n那些痕跡不是詛咒。\n它們不是來自鬼魂的警告。\n它們是尾巴的標記，劃下的符號是某個需要在黑暗中找到出路的人的痕跡。\n真相一點一點地揭露出來。\n這位陌生人來自樹林之外一個失敗的定居點。他們跟隨著營火的煙，找到了這個群落，躲藏在儲存地板下，因為面對饑餓比被驅趕更容易。\n他們只偷了自己能夠攜帶的東西。\n他們敲打是因為害怕。\n他們戰鬥是因為在黑暗中，每隻伸出來的爪子看起來都像敵人。\n{1}\n現在這個群落必須決定這將成為什麼樣的故事。\n一個警告。\n一個歡迎。\n或者是一隻海狸找到火光卻又被送回黑暗的故事。"
ruRU = "{0}\nДва дня пойманный бобер не просыпается.\nПострадавшие перевязаны. За старым полом хранилища следят. Костер тихо горит, но никто не просит рассказать истории.\nИ вот, наконец, незнакомец открывает глаза.\nОни худые, напуганные и меньше, чем казались в тени.\nКогда они видят собравшуюся колонию, то отползают назад, пока их хвост не ударяется о стену. Он кривой, изрезанный шрамами и жесткий, закрученный так странно, что несколько бобров сразу понимают спиральные знаки.\nЗнаки не были проклятиями.\nЭто были не предупреждения от призрака.\nЭто были знаки хвоста, нацарапанные кем-то, кто нуждался в том, чтобы найти путь через темноту.\nКусочек за кусочком, правда всплывает на поверхность.\nНезнакомец пришел из провалившегося поселения за деревьями. Они следовали за дымом костра, нашли колонию и спрятались под полом хранилища, потому что голод было легче терпеть, чем быть прогнанным.\nОни украли только то, что могли унести.\nОни постучались, потому что боялись.\nОни сражались, потому что в темноте каждая лапа, потянувшаяся вниз, выглядела как враг.\n{1}\nТеперь колония должна решить, какой историей это станет.\nПредупреждение.\nПриветствие.\nИли история о бобре, который нашел свет огня и был отправлен обратно в темноту."
jaJP = "{0}\n捕らえられたビーバーは二日間目を覚まさない。\n負傷者は包帯を巻かれ、古い倉庫の床は見張られている。キャンプファイヤーは静かに燃えているが、誰も物語を求めない。\nそして、ついに、見知らぬ者が目を開ける。\n彼らは痩せ細り、怯えており、影が示したよりも小さい。\n集まったコロニーを見ると、後ろに退いてしまい、尻尾が壁に当たる。それは曲がりくねり、傷だらけで、硬く、奇妙に巻き込まれていて、何匹かのビーバーは一斉にその渦巻きの印を理解する。\nその印は呪いではなかった。\n幽霊からの警告ではなかった。\nそれは、暗闇の中で道を見つける必要があった誰かによって引かれた尻尾の印だった。\n真実は一つずつ明らかになっていく。\nその見知らぬ者は、木々の向こうにある失敗した集落から来た。彼らはキャンプファイヤーの煙を追い、コロニーを見つけ、貯蔵庫の床の下に隠れた。なぜなら、空腹に直面する方が追い出されるよりも楽だったからだ。\n彼らは持てるものだけを盗んだ。\n彼らは恐れていたので叩いた。\n彼らは戦った。暗闇の中では、下に伸びるすべての足が敵のように見えたからだ。\n{1}\n今、コロニーはこの物語がどんなものになるかを決めなければならない。\n警告。\n歓迎。\nそれとも、火の光を見つけて再び暗闇に戻されたビーバーの物語。"
frFR = "{0}\nPendant deux jours, le castor capturé ne se réveille pas.\nLes blessés sont bandés. Le vieux sol de stockage est surveillé. Le feu de camp brûle tranquillement, mais personne ne demande d'histoires.\nPuis, enfin, l'étranger ouvre les yeux.\nIls sont maigres, effrayés, et plus petits que l'ombre ne les faisait paraître.\nLorsqu'ils voient la colonie rassemblée, ils reculent jusqu'à ce que leur queue heurte le mur. Elle est tordue, marquée de cicatrices, et rigide, enroulée de manière assez étrange pour que plusieurs castors comprennent les marques en spirale en un instant.\nLes marques n’étaient pas des malédictions.\nCe n’étaient pas des avertissements d'un fantôme.\nC’étaient des signes de queue, griffonnés par quelqu'un qui avait besoin de trouver son chemin dans l'obscurité.\nPetit à petit, la vérité émerge.\nL'étranger venait d'une colonie échouée au-delà des arbres. Ils ont suivi la fumée du feu de camp, trouvé la colonie, et se sont cachés sous le sol de stockage car la faim était plus facile à affronter que d'être chassé.\nIls n'ont volé que ce qu'ils pouvaient porter.\nIls ont frappé parce qu'ils avaient peur.\nIls ont combattu parce que, dans l'obscurité, chaque patte tendue semblait être un ennemi.\n{1}\nMaintenant, la colonie doit décider quel type d'histoire cela va devenir.\nUn avertissement.\nUn accueil.\nOu le conte d'un castor qui a trouvé la lumière du feu et a été renvoyé dans l'obscurité."
deDE = "{0}\nZwei Tage lang wacht der gefangene Biber nicht auf.\nDie Verletzten sind bandagiert. Der alte Lagerboden wird bewacht. Das Lagerfeuer brennt ruhig, aber niemand fragt nach Geschichten.\nDann, endlich, öffnet der Fremde die Augen.\nSie sind dünn, ängstlich und kleiner, als der Schatten sie erscheinen ließ.\nAls sie die versammelte Kolonie sehen, winden sie sich rückwärts, bis ihr Schwanz die Wand berührt. Er ist krumm, vernarbt und steif, so seltsam gekringelt, dass mehrere Biber die Spiralzeichen auf einmal verstehen.\nDie Zeichen waren keine Flüche.\nSie waren keine Warnungen von einem Geist.\nEs waren Schwanzzeichen, gekratzt von jemandem, der seinen Weg durch die Dunkelheit finden musste.\nStück für Stück kommt die Wahrheit ans Licht.\nDer Fremde kam aus einer gescheiterten Siedlung jenseits der Bäume. Sie folgten dem Rauch des Lagerfeuers, fanden die Kolonie und versteckten sich unter dem Lagerboden, weil Hunger leichter zu ertragen war als verjagt zu werden.\nSie stahlen nur, was sie tragen konnten.\nSie klopften, weil sie Angst hatten.\nSie kämpften, weil in der Dunkelheit jede herabgreifende Pfote wie ein Feind aussah.\n{1}\nJetzt muss die Kolonie entscheiden, welche Art von Geschichte dies werden wird.\nEine Warnung.\nEin Willkommen.\nOder die Geschichte eines Bibers, der das Licht des Feuers fand und zurück in die Dunkelheit gesandt wurde."
plPL = "{0}  \nPrzez dwa dni, schwytany bóbr nie budzi się.  \nRanni są opatrzeni. Stary magazyn jest pilnowany. Ognisko płonie cicho, ale nikt nie prosi o opowieści.  \nW końcu, nieznajomy otwiera oczy.  \nJest chudy, przestraszony i mniejszy, niż wydawał się jego cień.  \nKiedy widzi zgromadzoną kolonię, cofa się, aż jego ogon uderza o ścianę. Jest krzywy, z bliznami i sztywny, skręcony w sposób na tyle dziwny, że kilka bobrów rozumie spiralne znaki jednocześnie.  \nZnaki nie były przekleństwami.  \nNie były ostrzeżeniem od ducha.  \nTo były znaki ogonowe, zadrapane przez kogoś, kto musiał znaleźć drogę przez ciemność.  \nKawałek po kawałku, prawda wychodzi na jaw.  \nNieznajomy pochodził z nieudanego osiedla za drzewami. Podążał za dymem z ogniska, znalazł kolonię i schował się pod magazynem, ponieważ głód było łatwiej znieść niż być przepędzonym.  \nUkrał tylko to, co mógł unieść.  \nZapukał, ponieważ się bał.  \nBił się, ponieważ w ciemności każda łapa, która sięgnęła w dół, wyglądała jak wróg.  \n{1}  \nTeraz kolonia musi zdecydować, jaką historią to się stanie.  \nOstrzeżeniem.  \nPowitaniem.  \nCzy opowieścią o bobrze, który znalazł światło ognia i został odesłany z powrotem w ciemność."
ptBR = "{0}\nPor dois dias, o castor capturado não acorda.\nOs feridos estão enfaixados. O velho piso de armazenamento é vigiado. A fogueira queima silenciosamente, mas ninguém pede histórias.\nEntão, finalmente, o estranho abre os olhos.\nEles são magros, assustados e menores do que a sombra fazia parecer.\nQuando veem a colônia reunida, eles se arrastam para trás até que sua cauda atinja a parede. Está torta, marcada e rígida, enrolada de uma forma estranha que vários castores entendem as marcas em espiral de uma só vez.\nAs marcas não eram maldições.\nNão eram avisos de um fantasma.\nEram sinais de cauda, arranhados por alguém que precisava encontrar o caminho na escuridão.\nPeça por peça, a verdade vem à tona.\nO estranho veio de um assentamento fracassado além das árvores. Eles seguiram a fumaça da fogueira, encontraram a colônia e se esconderam sob o piso de armazenamento porque a fome era mais fácil de enfrentar do que ser expulso.\nEles roubaram apenas o que podiam carregar.\nBateram porque estavam com medo.\nLutaram porque, na escuridão, cada pata que se estendia parecia um inimigo.\n{1}\nAgora a colônia deve decidir que tipo de história isso se tornará.\nUm aviso.\nUma recepção.\nOu a história de um castor que encontrou a luz do fogo e foi enviado de volta para a escuridão."
koKR = "{0}\n포로가 된 비버는 이틀 동안 깨어나지 않는다.\n부상당한 이들은 붕대를 감았다. 오래된 저장소 바닥을 감시하고 있다. 모닥불은 조용히 타오르지만, 누구도 이야기를 요청하지 않는다.\n그러다 마침내, 낯선 이가 눈을 뜬다.\n그들은 마르고 겁에 질려 있으며, 그림자가 만든 것보다 작다.\n모여 있는 식구들을 보자 그들은 뒤로 물러나고, 그들의 꼬리가 벽에 부딪친다. 비뚤어지고, 흉터가 있으며, 뻣뻣하다. 이상하게도 여러 비버가 동시에 나선형 자국을 이해한다.\n그 자국들은 저주가 아니었다.\n유령의 경고가 아니었다.\n그들은 어둠 속을 헤쳐 나가야 했던 누군가가 남긴 꼬리 신호였다.\n조각별로 진실이 드러난다.\n낯선 이는 나무 너머의 실패한 정착지에서 왔다. 그들은 모닥불의 연기를 따라 식구들을 발견하고, 쫓겨나는 것보다 배고픔을 견디는 것이 더 쉽기 때문에 저장소 바닥 아래에 숨었다.\n그들은 실을 수 있는 것만 훔쳤다.\n그들은 두려워서 노크를 했다.\n어둠 속에서 아래로 내리는 모든 발이 적처럼 보였기 때문에 그들은 싸웠다.\n{1}\n이제 식구들은 이것이 어떤 이야기로 발전할지를 결정해야 한다.\n경고.\n환영.\n아니면 불빛을 찾은 비버의 이야기, 그리고 다시 어둠 속으로 돌아가야 했던 이야기."
csCZ = "{0}\nDva dny zajatý bobr nespí.\nZranění jsou obvázaní. Staré úložiště je hlídáno. Oheň u táboráku tiše hoří, ale nikdo nežádá o příběhy.\nPak se nakonec cizinec probouzí.\nJe tenký, vystrašený a menší, než se jeho stín zdál.\nKdyž vidí shromážděnou kolonii, couvá dozadu, dokud se jeho ocas nenarazí na zeď. Je křivý, jizvený a ztuhlý, zkroucený tak podivně, že několik bobrů najednou pochopí spirálovité značky.\nTyto značky nebyly kletby.\nNebyl to varovný signál od ducha.\nByly to znamení ocasu, vyryté někým, kdo potřeboval najít cestu tmou.\nKousek po kousku pravda vychází najevo.\nCizinec přišel z neúspěšného osídlení za stromy. Následoval kouř z táboráku, našel kolonii a skrýval se pod úložným patrem, protože hlad bylo snazší čelit než být vyhnán.\nKradl pouze to, co mohl nést.\nZaklepal, protože se bál.\nBojoval, protože ve tmě každý paw sahající dolů vypadalo jako nepřítel.\n{1}\nNyní se kolonie musí rozhodnout, jaký příběh tohle bude.\nVarování.\nVítání.\nNebo příběh bobra, který našel světlo ohně a byl poslán zpět do tmy."
viVN = "{0}\nTrong hai ngày, con chồn bị bắt không tỉnh dậy.\nNhững con bị thương đã được băng bó. Sàn kho cũ được canh giữ. Ngọn lửa trong Lửa Trại cháy lặng lẽ, nhưng không ai hỏi về những câu chuyện.\nRồi, cuối cùng, kẻ lạ mở mắt ra.\nChúng gầy gò, sợ hãi, và nhỏ hơn so với cái bóng mà chúng tạo ra.\nKhi thấy thuộc địa tụ tập, chúng lùi lại cho đến khi đuôi va vào tường. Nó cong, có sẹo, và cứng, cuộn lại một cách kỳ lạ đến nỗi vài con beaver ngay lập tức hiểu dấu hiệu xoắn.\nNhững dấu hiệu đó không phải là lời nguyền.\nChúng không phải là cảnh báo từ một hồn ma.\nChúng là dấu hiệu từ đuôi, được khắc bởi ai đó cần tìm đường trong bóng tối.\nTừng mảnh một, sự thật lộ diện.\nKẻ lạ đến từ một khu định cư thất bại nằm bên kia những tán cây. Chúng theo dõi khói từ Lửa Trại, tìm thấy thuộc địa, và ẩn mình dưới sàn kho vì đói còn dễ chịu hơn là bị xua đuổi.\nChúng chỉ đánh cắp những gì chúng có thể mang.\nChúng gõ cửa vì chúng sợ hãi.\nChúng chiến đấu vì trong bóng tối, mỗi cái paw đưa xuống đều nhìn như một kẻ thù.\n{1}\nBây giờ thuộc địa phải quyết định câu chuyện này sẽ trở thành loại gì.\nMột lời cảnh báo.\nMột lời chào đón.\nHay câu chuyện về một con chồn đã tìm thấy ánh lửa và bị gửi trở lại vào bóng tối."
trTR = "{0}\nİki gün boyunca, yakalanan kunduz uyandığı yok.\nYaralılar sargılanıyor. Eski depolama zemini izleniyor. Kamp Ateşi sessizce yanıyor, ama kimse hikaye istemiyor.\nSonunda, yabancı gözlerini açıyor.\nZayıf, korkmuş ve gölgesinin gösterdiğinden daha küçükler.\nToplanan koloniyi görünce geriye doğru kayıyorlar, kuyruğu duvara çarpıyor. Kıvrımlı, yara izleri var ve garip bir şekilde kıvrılmış; birkaç kunduz spiral izleri bir anda anlıyor.\nİzler lanet değildi.\nBir hayattan uyarılar değildi.\nBirinin karanlıkta yolunu bulması gerektiğini belirten kuyruk işaretleriydi.\nParça parça, gerçek ortaya çıkıyor.\nYabancı ağaçların ötesindeki başarısız bir yerleşimden geldi. Kamp Ateşi'nin dumanını takip etti, koloniyi buldu ve depolama zemininin altına gizlendi çünkü açlık, kovalanmaktan daha kolay bir şeydi.\nTaşınabileceği kadarını çaldı.\nKorktuğu için kapıya vurdu.\nKaranlıkta, aşağıya uzanan her pençe bir düşman gibi görünüyordu.\n{1}\nŞimdi koloni, bu hikayenin ne tür bir hikaye olacağına karar vermeli.\nBir uyarı.\nBir karşılama.\nYa da ateş ışığını bulan ve karanlığa geri gönderilen bir kunduzun hikayesi."

["LV.BCEv.CampfireMystery4.Content.Ch3C1"]
raw = "The Caped Chewer's patrol is already becoming a legend, mostly because every witness tells it differently.\nSome say the hero leapt bravely. Some say the hero slipped. The Caped Chewer insists both can be true if one falls with purpose.\nBut beneath the jokes are bandages, bruises, and shaken young beavers who learned that shadows can bite back."
status = "normal"
enUS = "The Caped Chewer's patrol is already becoming a legend, mostly because every witness tells it differently. Some say the hero leapt bravely. Some say the hero slipped. The Caped Chewer insists both can be true if one falls with purpose. But beneath the jokes are bandages, bruises, and shaken young beavers who learned that shadows can bite back."
zhCN = "“披风啃食者的巡逻已经成为传奇，主要是因为每个见证者的说法都不一样。\n有些人说这位英雄勇敢地跳了过去。有些人说这位英雄滑倒了。披风啃食者坚称，如果一个人是有目的地跌倒，那么这两者都可以是真的。\n但在笑话背后是绷带、淤伤和受惊的小海狸，他们明白了阴影也会反击。”"
zhTW = "斗篷咀嚼者的巡邏已經成為傳說，主要是因為每個目擊者的說法都不相同。\n有些人說英雄勇敢地跳了起來。也有人說英雄滑倒了。斗篷咀嚼者堅持認為，兩者都可以是真的，只要一個人是有目的地跌倒。\n但在笑話背後，卻是紗布、瘀傷，以及那些學會陰影也會反擊的年輕海狸。"
ruRU = "Патруль Носатого с Плащом уже начинает превращаться в legendu, в основном потому, что каждый свидетель рассказывает об этом по-разному. Некоторые говорят, что герой смело прыгнул. Некоторые утверждают, что герой поскользнулся. Носатый с Плащом настаивает, что оба могут быть правдой, если падение было намеренным. Но под шутками скрываются бинты, синяки и встревоженные молодые бобры, которые узнали, что тени могут кусаться."
jaJP = "「マントを羽織った噛みちぎり屋のパトロールは、すでに伝説になりつつあります。ほとんどの人が異なる話をしているからです。\nある人は英雄が勇敢に飛び立ったと言い、別の人は英雄が滑ったと言います。マントを羽織った噛みちぎり屋は、目的を持って落ちれば両方とも真実になり得ると主張しています。\nしかし、ジョークの裏には包帯やあざ、そして影が反撃することを学んだ震えた若いビーバーたちがいます。」"
frFR = "La patrouille du Ronfleur Capé devient déjà une légende, principalement parce que chaque témoin raconte l'histoire différemment.  \nCertains disent que le héros a sauté vaillamment. D'autres disent que le héros a glissé. Le Ronfleur Capé insiste sur le fait que les deux peuvent être vrais si l'on tombe avec un but.  \nMais derrière les blagues se cachent des bandages, des contusions et de jeunes castors secoués qui ont appris que les ombres peuvent mordre."
deDE = "Die Patrouille des Umhangträgers wird bereits zur Legende, hauptsächlich weil jeder Zeuge sie anders erzählt. \nEinige sagen, der Held sei mutig gesprungen. Einige sagen, der Held sei ausgerutscht. Der Umhangträger besteht darauf, dass beides wahr sein kann, wenn man mit Absicht fällt. \nDoch unter den Witzen liegen Verbände, Prellungen und erschütterte junge Biber, die gelernt haben, dass Schatten zurückbeißen können."
plPL = "Patrol Kapturzonego Gryzonia staje się już legendą, głównie dlatego, że każdy świadek opowiada o niej inaczej.\nNiektórzy mówią, że bohater skoczył odważnie. Inni twierdzą, że bohater poślizgnął się. Kapturzony Gryzoń twierdzi, że obie wersje mogą być prawdziwe, jeśli ktoś upada z zamiarem.\nJednak pod żartami kryją się bandaże, siniaki i wstrząśnięte młode bobry, które nauczyły się, że cienie mogą gryźć z odwetem."
ptBR = "A patrulha do Muncher Caped já está se tornando uma lenda, principalmente porque cada testemunha conta de maneira diferente. Alguns dizem que o herói saltou bravamente. Outros dizem que o herói escorregou. O Muncher Caped insiste que ambos podem ser verdadeiros se alguém cair com propósito. Mas por trás das piadas estão curativos, hematomas e jovens castores abalados que aprenderam que as sombras podem revidar."
koKR = "케이프를 두른 씹는 자의 순찰은 이미 전설이 되어가고 있다. 대부분의 목격자들이 다르게 이야기하기 때문이다.  \n어떤 이들은 영웅이 용감하게 도약했다고 말하고, 어떤 이들은 영웅이 미끄러졌다고 말한다. 케이프를 두른 씹는 자는 의도적으로 넘어지면 두 가지 모두 진실일 수 있다고 주장한다.  \n그러나 농담 뒤에는 붕대, 멍이 들고 흔들리는 젊은 비버들이 있다. 그들은 그림자가 물어볼 수도 있다는 것을 배웠다."
csCZ = "Příběh hlídky Kápovaného hlodavce se již stává legendou, převážně proto, že každý svědek to vypráví jinak. Někteří říkají, že hrdina odvážně skočil. Jiní tvrdí, že hrdina uklouzl. Kápovaný hlodavec trvá na tom, že obojí může být pravda, pokud padá s cílem. Ale pod vtipy se skrývají obvazy, modřiny a otřesení mladí bobři, kteří se naučili, že stíny mohou kousat zpět."
viVN = "Cuộc tuần tra của chú Gặm Nhấm Áo Choàng đã trở thành một huyền thoại, chủ yếu vì mỗi nhân chứng lại kể một cách khác nhau.\nMột số nói rằng người hùng đã nhảy lên can đảm. Một số nói rằng người hùng đã trượt chân. Chú Gặm Nhấm Áo Choàng khẳng định cả hai đều có thể đúng nếu một người ngã với mục đích.\nNhưng dưới những câu đùa là băng bó, vết bầm tím, và những chú nhím trẻ bất an, những người đã học được rằng bóng tối cũng có thể cắn lại."
trTR = "Pelerinli Çiğneyici'nin devriye gezisi şimdiden bir efsane haline geliyor, çünkü her tanık olayı farklı anlatıyor.  \nBazıları kahramanın cesurca atıldığını söylerken, bazıları kahramanın kaydığını söylüyor. Pelerinli Çiğneyici, birinin maksatlı bir şekilde düşmesi durumunda her ikisinin de doğru olabileceğini savunuyor.  \nAma şakaların altında bantlar, morluklar ve gölgelerin geri dönüş yapabileceğini öğrenen sarsılmış genç kunduzlar var."

["LV.BCEv.CampfireMystery4.Content.Ch3C2"]
raw = "The guards did their duty, and duty has left marks.\nThey held the old storage floor through the night. They caught the shadow before it vanished again. Now they sit near the Campfire with bandaged paws, quiet faces, and the uneasy knowledge that they captured someone who had only been trying to survive."
status = "normal"
enUS = "The guards did their duty, and duty has left marks. They held the old storage floor through the night. They caught the shadow before it vanished again. Now they sit near the Campfire with bandaged paws, quiet faces, and the uneasy knowledge that they captured someone who had only been trying to survive."
zhCN = "守卫们履行了职责，而职责留下了痕迹。  \n他们整夜守护着旧储藏室的地板。  \n他们在阴影再次消失之前抓住了它。  \n现在，他们坐在营火旁，包扎着爪子，面露沉静，却心中不安，知道自己抓住了一个只想生存的人。"
zhTW = "衛兵們履行了他們的職責，而職責留下了痕跡。\n他們整夜堅守著舊儲藏室的地板。他們在陰影再次消失之前將其捕捉。現在，他們坐在篝火旁，包著紗布的爪子，面帶沉默的表情，心中惴惴不安地明白他們抓住了一個只是想要生存的人。"
ruRU = "Стражи исполнили свой долг, и долг оставил следы.  \nОни держали старый склад всю ночь. Им удалось поймать тень, прежде чем она снова исчезла. Теперь они сидят у Костра с перевязанными лапами, спокойными лицами и тревожным знанием о том, что поймали кого-то, кто просто пытался выжить."
jaJP = "警備員たちは職務を果たし、職務は痕跡を残した。  \n彼らは一晩中古い倉庫の床を守った。彼らは影が再び消える前に捕まえた。今、彼らはキャンプファイヤーの近くにいて、包帯を巻いた paws、静かな顔、そしてただ生き延びようとしていた誰かを捕まえたという不安な知識を抱えている。"
frFR = "Les gardes ont accompli leur devoir, et le devoir a laissé des marques.  \nIls ont tenu l'ancien étage de stockage toute la nuit. Ils ont attrapé l'ombre avant qu'elle ne disparaisse à nouveau. Maintenant, ils sont assis près du feu de camp avec des pattes bandées, des visages calmes et la connaissance inconfortable qu'ils ont capturé quelqu'un qui essayait simplement de survivre."
deDE = "Die Wächter haben ihre Pflicht getan, und die Pflicht hat Spuren hinterlassen.  \nSie hielten den alten Lagerboden die Nacht über. Sie fingen den Schatten, bevor er wieder verschwand. Jetzt sitzen sie nahe dem Lagerfeuer mit verbundenen Pfoten, stillen Gesichtern und dem mulmigen Wissen, dass sie jemanden gefangen haben, der nur versucht hat, zu überleben."
plPL = "Strażnicy wypełnili swój obowiązek, a obowiązek pozostawił ślady. \nTrzymali starą podłogę magazynu przez całą noc. Złapali cień, zanim zniknął na nowo. Teraz siedzą przy ognisku z opatrzonymi łapami, cichymi twarzami i niepokojącą wiedzą, że schwycili kogoś, kto tylko próbował przeżyć."
ptBR = "Os guardas cumpriram seu dever, e o dever deixou marcas. Eles mantiveram o velho piso de armazenamento durante a noite. Eles capturaram a sombra antes que ela desaparecesse novamente. Agora, eles estão sentados perto da fogueira com patas enfaixadas, rostos silenciosos e a inquietante consciência de que capturaram alguém que só estava tentando sobreviver."
koKR = "경비원들은 자신의 의무를 수행했고, 그 의무는 흔적을 남겼습니다. 그들은 밤새 오래된 저장소 바닥을 지켰습니다. 그들은 그림자가 다시 사라지기 전에 그것을 붙잡았습니다. 이제 그들은 붕대에 감싼 발과 조용한 얼굴로 캠프파이어 옆에 앉아 있으며, 단지 생존하기 위해 애썼던 누군가를 붙잡았다는 불안한 사실을 알고 있습니다."
csCZ = "Strážní splnili svůj úkol a úkol zanechal stopy. Drželi starou skladovací podlahu celou noc. Chytili stín, než znovu zmizel. Teď sedí blízko ohniště s obvázanýma tlapkama, tichými tvářemi a nepříjemným vědomím, že chytili někoho, kdo se jen snažil přežít."
viVN = "Các vệ sĩ đã thực hiện nhiệm vụ của mình, và nhiệm vụ đã để lại dấu ấn. Họ đã giữ sàn kho cũ suốt đêm. Họ đã bắt được cái bóng trước khi nó biến mất lần nữa. Giờ đây, họ ngồi gần Đống Lửa với những đôi bàn chân băng bó, những khuôn mặt trầm tĩnh, và kiến thức không yên tâm rằng họ đã bắt giữ ai đó chỉ đang cố gắng sinh tồn."
trTR = "Bekçiler görevlerini yerine getirdi ve görev izler bıraktı. Eski depolama katını gece boyunca tuttular. Gölge kaybolmadan önce yakaladılar. Şimdi, kamp ateşinin yanına bandajlı patileriyle, sessiz yüzleriyle ve sadece hayatta kalmaya çalışan birini yakaladıklarını bilmenin huzursuz bilgisiyle oturuyorlar."

["LV.BCEv.CampfireMystery4.Content.Ch3C3"]
raw = "The sealed floor has been torn open again.\nThe new planks are broken. The workers are injured. No one says the word trap, but everyone thinks it.\nThe stranger watches the colony with wide eyes, as if still hearing the sound of exits being closed above them."
status = "normal"
enUS = "The sealed floor has been torn open again.  \nThe new planks are broken. The workers are injured. No one says the word trap, but everyone thinks it.  \nThe stranger watches the colony with wide eyes, as if still hearing the sound of exits being closed above them."
zhCN = "封闭的地板再次被撕开。\n新木板破碎。工人受伤。没有人说“陷阱”这个词，但每个人都在想。\n那个陌生人睁大眼睛注视着殖民地，仿佛仍在听到上方关门的声音。"
zhTW = "封閉的地板再次被撕開。\n新的木板被弄壞了。工人們受了傷。沒有人說出「陷阱」這個詞，但每個人都在想。\n陌生人瞪大眼睛注視著殖民地，彷彿仍在聽到上方關閉出口的聲音。"
ruRU = "Запечатанный пол снова был разорван.\nНовые доски сломаны. Рабочие травмированы. Никто не говорит слово «ловушка», но все это думают.\nНезнакомец наблюдает за колонией с широко раскрытыми глазами, как будто все еще слышит звук закрывающихся выходов над ними."
jaJP = "封印された床が再び開かれてしまった。\n新しい板は壊れている。労働者たちは怪我をしている。誰も罠という言葉を口にしないが、皆がそう考えている。\n見知らぬ者は、頭上で出口が閉じられる音をまだ聞いているかのように、広い目でコロニーを見つめている。"
frFR = "Le sol scellé a de nouveau été déchiré.\nLes nouvelles planches sont cassées. Les ouvriers sont blessés. Personne ne prononce le mot piège, mais tout le monde y pense.\nL'étranger observe la colonie les yeux écarquillés, comme s'il entendait encore le bruit des sorties se fermant au-dessus d'eux."
deDE = "Der versiegelte Boden wurde erneut aufgerissen. Die neuen Planken sind zerbrochen. Die Arbeiter sind verletzt. Keiner sagt das Wort Falle, aber jeder denkt es. Der Fremde beobachtet die Kolonie mit weit aufgerissenen Augen, als ob er noch das Geräusch von sich schließenden Ausgängen über ihnen hören könnte."
plPL = "Uszczelniona podłoga została ponownie rozerwana.\nNowe deski są złamane. Robotnicy są ranni. Nikt nie mówi słowa pułapka, ale wszyscy o tym myślą.\nNieznajomy obserwuje kolonię szeroko otwartymi oczami, jakby wciąż słyszał dźwięk zamykanych wyjść nad nimi."
ptBR = "O piso selado foi rasgado novamente. As novas tábuas estão quebradas. Os trabalhadores estão feridos. Ninguém menciona a palavra armadilha, mas todos pensam nisso. O estranho observa a colônia com olhos arregalados, como se ainda ouvisse o som das saídas sendo fechadas acima deles."
koKR = "봉인된 바닥이 다시 열려 있습니다. 새 나무판자들이 부서졌습니다. 작업자들이 다쳤습니다. 누구도 함정이라는 말을 하지 않지만, 모두가 그렇게 생각하고 있습니다. 낯선 사람은 위에서 출구가 닫히는 소리를 아직도 듣고 있는 듯한 눈빛으로 식민지를 지켜보고 있습니다."
csCZ = "Zapečetěná podlaha byla znovu roztržena. Nové prkna jsou zlomená. Pracovníci jsou zranění. Nikdo neříká slovo past, ale každý na něj myslí. Neznámý pozoruje kolonii s široce otevřenýma očima, jako by stále slyšel zvuk zamykajících se východů nad nimi."
viVN = "Sàn bị niêm phong đã bị xé toạc ra một lần nữa. Những tấm ván mới bị gãy. Các công nhân bị thương. Không ai nhắc đến từ bẫy, nhưng ai cũng nghĩ như vậy. Người lạ quan sát thuộc địa bằng đôi mắt mở to, như thể vẫn nghe thấy âm thanh của những lối ra bị đóng lại ở trên họ."
trTR = "Hapsedilmiş zemin tekrar açılmış. Yeni tahtalar kırık. İşçiler yaralı. Hiç kimse tuzak kelimesini telaffuz etmiyor ama herkes bunu düşünüyor. Yabancı, koloniyi büyük gözlerle izliyor, sanki üstlerindeki çıkışların kapanma sesini hâlâ duyuyormuş gibi."

["LV.BCEv.CampfireMystery4.Content.TrialCh3C1"]
raw = "If the colony wants the stranger to stay, it must show that the Campfire is not just noise, masks, and brave speeches.\nIt must prove that every beaver in the colony is truly cared for."
status = "normal"
enUS = "If the colony wants the stranger to stay, it must show that the Campfire is not just noise, masks, and brave speeches. It must prove that every beaver in the colony is truly cared for."
zhCN = "如果殖民地希望陌生人留下，就必须证明篝火不仅仅是噪音、伪装和勇敢的演讲。它必须证明每只海狸都得到了真正的关心。"
zhTW = "如果這個殖民地希望陌生人留下來，就必須表明營火不僅僅是噪音、面具和勇敢的演講。\n它必須證明殖民地中的每一隻海狸都得到了真正的關心。"
ruRU = "Если колония хочет, чтобы чужак остался, она должна показать, что Костер - это не просто шум, маски и смелые речи. Она должна доказать, что о каждом бобре в колонии действительно заботятся."
jaJP = "「もしコロニーが見知らぬ者に留まってほしいのなら、キャンプファイヤーがただの騒音、仮面、そして勇ましい演説ではないことを示さなければならない。すべてのビーバーが本当に大切にされていることを証明しなければならない。」"
frFR = "Si la colonie veut que l'étranger reste, elle doit prouver que le Camp du Feu n'est pas seulement du bruit, des masques et des discours courageux. Elle doit prouver que chaque castor de la colonie est réellement pris en charge."
deDE = "„Wenn die Kolonie möchte, dass der Fremde bleibt, muss sie zeigen, dass das Lagerfeuer nicht nur Lärm, Masken und tapfere Reden ist.  \nSie muss beweisen, dass jedes Biber in der Kolonie wirklich fürchtet wird.“"
plPL = "Jeśli kolonia chce, aby obcy został, musi pokazać, że ognisko to nie tylko hałas, maski i odważne przemówienia. Musi udowodnić, że każdy bóbr w kolonii jest naprawdę ważny."
ptBR = "Se a colônia quiser que o estranho fique, deve mostrar que a Fogueira não é apenas barulho, máscaras e discursos corajosos. Deve provar que cada castor na colônia é realmente cuidado."
koKR = "식민지가 낯선이가 머물기를 원한다면, 캠프파이어가 단순한 소음, 가면, 용감한 연설이 아님을 보여줘야 한다.  \n모든 비버가 진정으로 돌보아지고 있음을 증명해야 한다."
csCZ = "Pokud chce kolonie, aby cizinec zůstal, musí ukázat, že táborák není jen hluk, masky a statečné projevy.\nMusí dokázat, že o každého bobra v kolonii je skutečně postaráno."
viVN = "Nếu thuộc địa muốn người lạ ở lại, nó phải chứng minh rằng Lửa trại không chỉ là tiếng ồn, mặt nạ và những bài diễn văn dũng cảm.  \nNó phải chứng minh rằng mỗi con hải ly trong thuộc địa đều được chăm sóc thực sự."
trTR = "Eğer koloni yabancının kalmasını istiyorsa, Kamp Ateşi'nin sadece gürültü, maskeler ve cesur nutuklar olmadığını göstermelidir. Her koyunun gerçekten önemsendiğini kanıtlamalıdır."

["LV.BCEv.CampfireMystery4.Content.TrialCh3C2"]
raw = "If the colony wants the stranger to stay, it must show that guards are not only there to corner the frightened.\nIt must prove that order protects the colony from real danger."
status = "normal"
enUS = "If the colony wants the stranger to stay, it must show that guards are not only there to corner the frightened. It must prove that order protects the colony from real danger."
zhCN = "如果殖民地希望陌生人留下，就必须表明守卫不仅仅是为了逼迫害怕的人。  \n它必须证明秩序能够保护殖民地免受真正的危险。"
zhTW = "如果殖民地希望陌生人留下來，就必須表明守衛不僅僅是為了逼迫那些害怕的人。必須證明秩序能夠保護殖民地免受真正的危險。"
ruRU = "Если колонии нужно, чтобы незнакомец остался, она должна показать, что стражи нужны не только для того, чтобы загнать напуганных в угол. Она должна доказать, что порядок защищает колонию от настоящей угрозы."
jaJP = "「もしコロニーが Stranger に留まってもらいたいのなら、警備員が怯えている者を追い詰めるだけの存在ではないことを示さなければならない。コロニーを真の危険から守るために秩序があることを証明しなければならない。」"
frFR = "Si la colonie veut que l'étranger reste, elle doit montrer que les gardes ne sont pas seulement là pour coincer les effrayés. Elle doit prouver que l'ordre protège la colonie d'un véritable danger."
deDE = "Wenn die Kolonie möchte, dass der Fremde bleibt, muss sie zeigen, dass die Wachen nicht nur da sind, um die Verängstigten einzukreisen. Sie muss beweisen, dass Ordnung die Kolonie vor echter Gefahr schützt."
plPL = "Jeśli kolonia chce, aby nieznajomy został, musi pokazać, że strażnicy nie są tam tylko po to, aby osaczać przestraszonych. Musi udowodnić, że porządek chroni kolonię przed prawdziwym niebezpieczeństwem."
ptBR = "Se a colônia quer que o estranho fique, deve mostrar que os guardas não estão lá apenas para encurralar os assustados. Deve provar que a ordem protege a colônia de perigos reais."
koKR = "식민지가 낯선 이가 머물기를 원한다면, 경비원이 두려워하는 이들을 몰아내기 위해서만 존재하지 않는다는 것을 보여주어야 한다.  \n질서가 실제 위험으로부터 식민지를 보호한다는 것을 증명해야 한다."
csCZ = "Pokud chce kolonie, aby cizinec zůstal, musí ukázat, že stráže nejsou zde pouze proto, aby zahnal vyděšené.\nMusí prokázat, že pořádek chrání kolonii před skutečným nebezpečím."
viVN = "Nếu thuộc địa muốn người lạ ở lại, họ phải cho thấy rằng các vệ sĩ không chỉ có mặt để dồn ép những kẻ sợ hãi.\nHọ phải chứng minh rằng trật tự bảo vệ thuộc địa khỏi những mối nguy hiểm thực sự."
trTR = "Eğer koloninin yabancının kalmasını istiyorsa, bekçilerin yalnızca korkmuşları köşeye sıkıştırmak için orada olmadığını göstermelidir. Gerçek tehlikelerden koloniyi korumanın düzenin bir parçası olduğunu kanıtlamalıdır."

["LV.BCEv.CampfireMystery4.Content.TrialCh3C3"]
raw = "If the colony wants the stranger to stay, it must show that no beaver here is left trapped, hungry, thirsty, or forgotten.\nIt must prove that shelter is not another word for a closed door."
status = "normal"
enUS = "If the colony wants the stranger to stay, it must show that no beaver here is left trapped, hungry, thirsty, or forgotten. It must prove that shelter is not another word for a closed door."
zhCN = "“如果这个殖民地希望陌生人留下，就必须表明这里没有任何一只海狸被困、饥饿、口渴或被遗忘。\n它必须证明庇护所并不是封闭的门的另一种说法。”"
zhTW = "如果殖民地希望這位陌生人留下，必須證明這裡沒有海狸被困、饑餓、口渴或被遺忘。\n必須證明庇護不是封閉之門的另一個詞。"
ruRU = "Если колонии хочется, чтобы незнакомец остался, она должна показать, что ни один бобр здесь не остался в ловушке, голодным, жаждущим или забытым. Она должна доказать, что укрытие — это не другое слово для закрытой двери."
jaJP = "「植民地が異邦人に留まってほしいなら、ここにいるビーバーが誰一人として閉じ込められたり、飢えたり、渇いたり、忘れられたりしていないことを示さなければならない。  \n避難所が閉ざされた扉の別名ではないことを証明しなければならない。」"
frFR = "Si la colonie veut que l'étranger reste, elle doit montrer qu'aucun castor ici n'est laissé piégé, affamé, assoiffé ou oublié.  \nElle doit prouver que l'abri n'est pas un autre mot pour une porte fermée."
deDE = "Wenn die Kolonie möchte, dass der Fremde bleibt, muss sie zeigen, dass kein Biber hier gefangen, hungrig, durstig oder vergessen ist. Sie muss beweisen, dass Schutz nicht ein anderes Wort für eine geschlossene Tür ist."
plPL = "Jeśli kolonia chce, aby nieznajomy został, musi pokazać, że żaden bóbr nie jest tutaj uwięziony, głodny, spragniony ani zapomniany. Musi udowodnić, że schronienie to nie inne słowo na zamknięte drzwi."
ptBR = "Se a colônia quer que o estranho fique, deve mostrar que nenhum castor está preso, faminto, sedento ou esquecido.\nDeve provar que abrigo não é outra palavra para porta fechada."
koKR = "식민지가 낯선 사람이 머무르기를 원한다면, 여기에서 아무 비버도 갇히거나, 배고프거나, 목마르거나, 잊혀지지 않았음을 보여주어야 한다.  \n대피소는 닫힌 문을 의미하지 않음을 증명해야 한다."
csCZ = "Pokud chce kolonie, aby cizinec zůstal, musí prokázat, že zde není žádný bobr, který by byl uvězněný, hladový, žíznivý nebo zapomenutý. \nMusí dokázat, že útočiště není jiným slovem pro zavřené dveře."
viVN = "Nếu thuộc địa muốn người lạ ở lại, nó phải chứng tỏ rằng không có con beaver nào ở đây bị mắc kẹt, đói, khát, hoặc bị lãng quên. Nó phải chứng minh rằng nơi trú ẩn không phải là một từ khác cho một cánh cửa đóng."
trTR = "Eğer koloni yabancının kalmasını istiyorsa, burada hiçbir kunduzun tuzağa düşmüş, aç, susuz veya unutulmuş olmadığını göstermelidir.\nSığınmanın kapalı bir kapıdan başka bir şey olmadığını kanıtlamalıdır."

