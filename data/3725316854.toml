["LV.BCEv.CampfireMystery.WaitPrompt"]
raw = "With the Campfire built, the colony already seems warmer.\nBeavers glance toward it between tasks, trading guesses about the stories that will be told when the workday ends. Some want old legends. Some want jokes. One insists every proper Campfire story needs at least one mysterious knock.\nGather the colony when the hour grows late.\n[[C]]Wait until [[time:{0:0}h]] to begin the story."
status = "normal"
enUS = "With the Campfire built, the colony already seems warmer. Beavers glance toward it between tasks, trading guesses about the stories that will be told when the workday ends. Some want old legends. Some want jokes. One insists every proper Campfire story needs at least one mysterious knock. Gather the colony when the hour grows late. [[C]]Wait until [[time:{0:0}h]] to begin the story."
zhCN = "营火建成后，殖民地似乎变得温暖了许多。\n河狸们在忙碌的工作间隙朝营火方向瞥去，互相猜测工作日结束时将会讲述的故事。有些人想听古老的传说，有些人想听笑话，还有一个人坚持认为每个合适的营火故事至少需要一个神秘的敲门声。\n当时间渐晚时，聚集起整个殖民地的成员。\n[[C]]等待[[time:{0:0}h]]后开始故事。"
zhTW = "「篝火已建好，殖民地似乎變得更溫暖了。\n河狸們在工作之餘朝篝火望去，互相猜測工作日結束後會講述什麼故事。有些人想要舊傳說，有些人想要笑話，有一位堅持每個合格的篝火故事至少需要一個神秘的敲擊聲。\n當時間漸晚時，聚集殖民地。\n[[C]]等到 [[time:{0:0}h]] 開始講故事。」"
ruRU = "С постройкой Костра колония уже кажется теплее. Бобры бросают на него взгляды между делами, обменивались догадками о историях, которые будут рассказаны, когда рабочий день закончится. Некоторые хотят старых легенд. Некоторые хотят шуток. Один настаивает, что каждая настоящая история у Костра должна содержать хотя бы один таинственный стук. Соберите колонию, когда час станет поздним. [[C]]Ждите до [[time:{0:0}h]], чтобы начать историю."
jaJP = "キャンプファイアが建てられたことで、コロニーはすでに温かく感じられる。\nビーバーたちは仕事の合間にそれをちらりと見て、労働時間が終わったときに語られる物語についての推測を交わしている。古い伝説を求める者もいれば、ジョークを求める者もいる。1人は、正しいキャンプファイアの物語には少なくとも1つの神秘的なノックが必要だと主張している。\n時刻が遅くなると、コロニーを集めよう。\n[[C]]物語を始めるまで[[time:{0:0}h]]待ってください。"
frFR = "Une fois le feu de camp construit, la colonie semble déjà plus chaleureuse.\nLes castors jettent un coup d'œil vers lui entre les tâches, échangeant des hypothèses sur les histoires qui seront racontées à la fin de la journée de travail. Certains veulent de vieilles légendes. D'autres veulent des blagues. Un insiste sur le fait que chaque bonne histoire de feu de camp a besoin d'au moins un coup mystérieux.\nRassemble la colonie lorsque l'heure devient tardive.\n[[C]]Attendez jusqu'à [[time:{0:0}h]] pour commencer l'histoire."
deDE = "Mit dem gebauten Lagerfeuer scheint die Kolonie bereits wärmer zu sein. \nDie Biber werfen zwischen den Aufgaben Blicke darauf und tauschen Vermutungen über die Geschichten aus, die erzählt werden, wenn der Arbeitstag endet. Einige wünschen sich alte Legenden. Andere wollen Witze. Einer besteht darauf, dass jede richtige Lagerfeuergeschichte mindestens einen mysteriösen Klopfer benötigt. \nVersammelt die Kolonie, wenn die Stunde spät wird. \n[[C]]Warte bis [[time:{0:0}h]], um die Geschichte zu beginnen."
plPL = "Zbudowany Ognisko sprawia, że kolonia wydaje się już cieplejsza.\nBobry zerkają na nie między zadaniami, wymieniając się przypuszczeniami na temat opowieści, które będą opowiedziane, gdy skończy się dzień pracy. Niektóre pragną starych legend. Inne chcą żartów. Jeden nalega, że każda porządna historia przy ognisku potrzebuje przynajmniej jednego tajemniczego stuku.\nZgromadź kolonię, gdy godzina stanie się późna.\n[[C]]Poczekaj do [[time:{0:0}h]], aby rozpocząć opowieść."
ptBR = "Com a fogueira construída, a colônia já parece mais aquecida. Os castores olham para ela entre as tarefas, trocando palpites sobre as histórias que serão contadas quando o dia de trabalho acabar. Alguns querem velhas lendas. Outros querem piadas. Um insiste que toda boa história de fogueira precisa de pelo menos uma batida misteriosa. Reúna a colônia quando a hora ficar avançada. [[C]]Espere até [[time:{0:0}h]] para começar a história."
koKR = "모닥불이 지어지자 식민지는 이미 더 따뜻해 보인다. 비버들은 작업 사이사이로 그곳을 바라보며, 작업이 끝난 후 들려질 이야기들에 대해 추측을 주고받는다. 어떤 이들은 옛 전설을 원하고, 어떤 이들은 농담을 원한다. 한 비버는 모든 제대로 된 모닥불 이야기는 최소한 하나의 신비로운 두드림이 필요하다고 고집한다. 시간이 늦어질 때 식민지를 모으라. [[C]]이야기를 시작하기 위해 [[time:{0:0}h]]까지 기다리세요."
csCZ = "S postaveným táborákem se kolonie už zdá teplejší. Bobři na něj pokukují mezi pracemi a vyměňují si odhady o příbězích, které budou vyprávěny, když pracovní den skončí. Někteří chtějí staré legendy. Někteří chtějí vtipy. Jeden trvá na tom, že každé pořádné táborákové vyprávění potřebuje alespoň jedno tajemné zaklepání. Shromážděte kolonii, když se hodina přiblíží ke konci. [[C]]Čekejte do [[time:{0:0}h]], než začnete vyprávět příběh."
viVN = "Với ngọn lửa trại đã được xây dựng, thuộc địa dường như đã ấm áp hơn.\nNhững chú béo lướt nhìn về phía nó giữa các công việc, trao đổi những dự đoán về những câu chuyện sẽ được kể khi ngày làm việc kết thúc. Một số muốn những huyền thoại cổ xưa. Một số muốn những trò đùa. Một người khăng khăng rằng mỗi câu chuyện ngọn lửa trại đúng nghĩa cần ít nhất một tiếng gõ bí ẩn.\nTập hợp thuộc địa khi giờ trở nên muộn.\n[[C]]Chờ cho đến [[time:{0:0}h]] để bắt đầu câu chuyện."
trTR = "Kamp Ateşi inşa edildiğinde, koloni zaten daha sıcak görünmeye başladı. Kunduzlar, görevler arasında ona bakıyor, iş günü bittiğinde anlatılacak hikayeler hakkında tahminlerde bulunuyor. Bazıları eski efsaneler istiyor. Bazıları şakalar istiyor. Birisi, her düzgün Kamp Ateşi hikayesinin en az bir gizemli vurma sesi içermesi gerektiğini ısrarla savunuyor. Saat geç olmaya başladığında koloni toplanın. [[C]]Hikayeyi başlatmak için [[time:{0:0}h]] kadar bekleyin."

