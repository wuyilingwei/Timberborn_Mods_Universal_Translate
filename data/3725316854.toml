[_meta]
name = "Beaver Chronicles - Campfire"

["LV.BCEv.CampfireMystery.WaitNight"]
new = "Wait for the night..."
status = "normal"

["LV.BCEv.CampfireMystery.WaitPrompt"]
new = "With the Campfire built, the colony already seems warmer.\nBeavers glance toward it between tasks, trading guesses about the stories that will be told when the workday ends. Some want old legends. Some want jokes. One insists every proper Campfire story needs at least one mysterious knock.\nGather the colony when the hour grows late.\n[[C]]Wait until [[time:{0:0}h]] to begin the story."
status = "normal"

["LV.BCEv.CampfireMystery1"]
new = "Campfire Mystery: The Tail That Knocked Thrice"
status = "normal"

["LV.BCEv.CampfireMystery1.Content"]
new = "The Campfire burns low, and the colony gathers close. At first, the evening belongs to ordinary things: tired paws, warm light, old jokes, and the comforting crackle of wood becoming ash. Then something knocks from beyond the firelight.\n[[C]]<YellowHighlight><i>Knock. Knock. Knock.</i></YellowHighlight>\nNo one moves. A young beaver whispers that it came from the trees. An elder insists it was only old timber settling. Someone else points out that old timber usually does not wait politely between knocks.\nThe fire snaps. Sparks drift upward. Every eye turns toward the dark beyond the circle. Then it comes again.\n[[C]]<YellowHighlight><i>Knock. Knock. Knock.</i></YellowHighlight>\nThis time, the sound is closer. By morning, the colony finds muddy pawprints near the storage piles, a few missing supplies, and a strange spiral scratched into a plank. It looks almost like a beaver tail, if the beaver drawing it had never seen one clearly. By sunset, every beaver has a theory.\n[[C]]A ghost from the Old Banks.\n[[C]]A thief with very small paws.\n[[C]]A warning from the forest.\n[[C]]A prank by someone with too much free time.\n[[C]]<i>Or something worse.</i>\nTonight, the Campfire will burn again. The colony must decide what kind of answer it wants from the dark."
status = "normal"

["LV.BCEv.CampfireMystery1.C1"]
new = "Feed the fire"
status = "normal"

["LV.BCEv.CampfireMystery1.C1N"]
new = "[[C]]Pay [[good:{0}:{1}]] to keep the Campfire bright through the night."
status = "normal"

["LV.BCEv.CampfireMystery1.C2"]
new = "Leave food beyond the light"
status = "normal"

["LV.BCEv.CampfireMystery1.C2N"]
new = "[[C]]Pay [[good:{0}:{1}]] as bait, tribute, or dinner. The difference is mostly confidence."
status = "normal"

["LV.BCEv.CampfireMystery1.C3"]
new = "Ask the Inventor to listen"
status = "normal"

["LV.BCEv.CampfireMystery1.C3N"]
new = "[[C]]Pay [[good:{0}:{1}]] to investigate the knocking with something more reliable than panic."
status = "normal"

["LV.BCEv.CampfireMystery1.O1"]
new = "The beavers stack fresh logs beside the Campfire and keep the flames high.\nThe dark does not vanish. It only steps backward.\nAll night, the colony watches the firelight push against the trees, the storage piles, and the uneven ground beyond the camp. The knocking comes twice more, but each time it sounds farther away, as if whatever waits outside the circle refuses to cross into the glow.\nBy dawn, the missing supplies are still missing. The spiral mark is still carved into the plank.\nBut the colony has learned one thing.\n<b>Whatever made the sound, it does not like being seen.</b>"
status = "normal"

["LV.BCEv.CampfireMystery1.O2"]
new = "The berries are placed carefully at the edge of the firelight.\nNo one agrees what this means.\nSome call it bait. Some call it mercy. One very nervous beaver calls it diplomacy and insists the bowl should be turned slightly to show respect.\nBy morning, the berries are gone. The bowl remains.\nIt has been pushed back toward the Campfire, badly cleaned, with a small spiral scratched into the dirt beside it. The mark is less like a threat. More like a reply.\nThe colony does not know what waits beyond the light.\n<b>But now it knows the dark was hungry.</b>"
status = "normal"

["LV.BCEv.CampfireMystery1.O3"]
new = "The Inventor arrives with a device made from hollow reeds, a bent cup, stretched bark, and the absolute confidence of someone who has not tested anything yet.\nThe colony gathers around as the strange tool is pointed toward the dark.\nFor a while, there is only wind, fire, and embarrassed silence.\nThen the knocking comes again.\n[[C]]<YellowHighlight><i>Knock. Knock. Knock.</i></YellowHighlight>\nThe Inventor's ears rise. The sound is not coming from the trees. It is not even coming from beyond the Campfire.\nThe device catches the echo from beneath the storage floor, hollow and faint, as if the colony has been listening in the wrong direction all along.\nBy morning, the spiral mark feels less like a curse and more like a clue."
status = "normal"

["LV.BCEv.CampfireMystery2"]
new = "Campfire Mystery: The Spiral Trail"
status = "normal"

["LV.BCEv.CampfireMystery2.Content"]
new = "{0}\nThe next night, the Campfire is lit again.\nNo one pretends this is only for stories anymore.\nThe beavers sit closer together than usual. Some watch the trees. Some watch the storage piles. One watches the other watchers and calls it strategy.\nThen the knocking comes again.\n[[C]]<YellowHighlight><i>Knock. Knock. Knock.</i></YellowHighlight>\nThis time, the colony is ready enough to be afraid properly.\n{1}\nA few beavers argue that it is a warning. Others think it is a trail. The Inventor says it is definitely evidence, though evidence of what remains inconveniently unclear.\nThe colony now knows one thing for certain:\n<b>The spiral is not random.</b>\n{2}\nTonight, the beavers must decide how closely they are willing to follow it."
status = "normal"

["LV.BCEv.CampfireMystery2.Content.Ch1C1"]
new = "After the fire was fed, the first night ended with one strange lesson: whatever made the sound avoided the light.\nSo tonight, the logs are stacked higher. The flames rise brighter. The colony waits inside a wider circle of warmth, hoping courage can be built from wood."
status = "normal"

["LV.BCEv.CampfireMystery2.Content.Ch1C2"]
new = "After the berries vanished, the first night ended with one strange lesson: whatever waited in the dark was hungry.\nSo tonight, the returned bowl sits near the Campfire where everyone can see it. No one agrees whether it is proof of mercy, manners, or a very selective appetite."
status = "normal"

["LV.BCEv.CampfireMystery2.Content.Ch1C3"]
new = "After the Inventor's device caught the hollow echo, the first night ended with one strange lesson: the sound may not have come from the trees at all.\nSo tonight, the device sits beside the Campfire like an honored guest, though several beavers privately note that it still looks like a cup tied to a mistake."
status = "normal"

["LV.BCEv.CampfireMystery2.Content.ClueCh1C1"]
new = "When the flames rise, the knocking fades. When the fire settles, it returns. Whatever is out there does not flee the Campfire completely, but it keeps to the edge of the glow."
status = "normal"

["LV.BCEv.CampfireMystery2.Content.ClueCh1C2"]
new = "The bowl is found again before sunrise. It has been pushed a little closer to camp and badly cleaned again. The message is unclear, but the care is not."
status = "normal"

["LV.BCEv.CampfireMystery2.Content.ClueCh1C3"]
new = "When the knocking begins, the Inventor points the device toward the trees. Nothing. Then toward the storage piles. The stretched bark trembles. The hollow echo returns from below."
status = "normal"

["LV.BCEv.CampfireMystery2.Content.ToneCh1C1"]
new = "The mark points toward the old storage area, just beyond where the firelight was strongest. The colony wonders whether the dark is retreating, or simply inviting them to follow."
status = "normal"

["LV.BCEv.CampfireMystery2.Content.ToneCh1C2"]
new = "The mark points toward the old storage area. If it is a trail, it was left by someone cautious. If it is a warning, it was left by someone who still returned the bowl."
status = "normal"

["LV.BCEv.CampfireMystery2.Content.ToneCh1C3"]
new = "The mark points toward the old storage area, exactly where the device heard the hollow echo. For once, the Inventor looks both smug and alarmed."
status = "normal"

["LV.BCEv.CampfireMystery2.C3.Ch1C1"]
new = "Widen the fireline"
status = "normal"

["LV.BCEv.CampfireMystery2.C3N.Ch1C1"]
new = "[[C]]Pay [[good:Log:{0}]] to push the Campfire's light farther into the dark."
status = "normal"

["LV.BCEv.CampfireMystery2.C3.Ch1C2"]
new = "Leave another bowl"
status = "normal"

["LV.BCEv.CampfireMystery2.C3N.Ch1C2"]
new = "[[C]]Pay [[good:Berries:{0}]] to see whether the dark answers kindness twice."
status = "normal"

["LV.BCEv.CampfireMystery2.C3.Ch1C3"]
new = "Improve the listening device"
status = "normal"

["LV.BCEv.CampfireMystery2.C3N.Ch1C3"]
new = "[[C]]Pay [[good:Science:{0}]] to make the Inventor's questionable device slightly less questionable."
status = "normal"

["LV.BCEv.CampfireMystery2.O3.Ch1C1"]
new = "The widened fireline reaches farther than before, and the dark gives up more of its shape.\nBy dawn, another spiral is found scratched into the ground near the old storage floor. Near the edge of the new light, the beavers find claw marks in the dirt, a smear of mud on old wood, and the mark pointing straight toward storage."
status = "normal"

["LV.BCEv.CampfireMystery2.O3.Ch1C2"]
new = "The second bowl is gone before dawn.\nBy dawn, another spiral is found near the old storage floor. Beside it, the beavers find three berries arranged in a neat line. Not eaten. Not hidden. Left behind.\nNo one knows whether it means thanks, warning, or terrible table manners."
status = "normal"

["LV.BCEv.CampfireMystery2.O3.Ch1C3"]
new = "The improved device works almost too well.\nWhen the knocking comes, the stretched bark trembles hard enough to make the Inventor squeak. The echo is definitely beneath the old storage floor.\nBy dawn, another spiral is found near the old storage floor, exactly where the hollow echo was strongest.\nThe ghost, if it is a ghost, has very ordinary acoustics."
status = "normal"

["LV.BCEv.CampfireMystery3"]
new = "Campfire Mystery: The Caped Chewer"
status = "normal"

["LV.BCEv.CampfireMystery3.Content"]
new = "{0}\nThe next night, the Campfire is louder than the stories.\nEvery beaver has an opinion about the old storage floor. Some want patience. Some want guards. Some want the floor opened at once, preferably by someone else.\nThen the young beavers make their proposal.\nThey have prepared bark masks, a leaf cape, and a heroic name that no adult remembers approving.\n<b>The Caped Chewer.</b>\nThe elders stare.\nThe Inventor asks whether this is a patrol, a performance, or a workplace accident waiting for witnesses.\nThe Caped Chewer says it is all three, which does not help.\nStill, the colony must act. Something is beneath the old storage floor. Something hungry, clever, and afraid of being seen.\nTonight, the beavers will stop waiting for the knocking to come to them."
status = "normal"

["LV.BCEv.CampfireMystery3.Content.Ch1C1"]
new = "The colony remembers the way the knocking retreated from the light.\nIf the thing under storage fears the glow, then the boldest plan is obvious: carry the glow closer.\nThis is how the Caped Chewer explains it.\nThis is also how several elders realize the cape is probably flammable."
status = "normal"

["LV.BCEv.CampfireMystery3.Content.Ch1C2"]
new = "The colony remembers the empty bowl, the missing berries, and the careful spiral left beside them.\nIf the thing under storage is hungry, perhaps it can be drawn out without fear.\nThis is how the Caped Chewer explains it.\nThe Inventor calls it bait. The Caped Chewer calls it a heroic invitation snack."
status = "normal"

["LV.BCEv.CampfireMystery3.Content.Ch1C3"]
new = "The colony remembers the Inventor's device trembling toward the old storage floor.\nIf the sound comes from below, then the trap must be set above.\nThis is how the Caped Chewer explains it.\nThe Inventor is pleased to be cited as evidence and alarmed to be included in the plan."
status = "normal"

["LV.BCEv.CampfireMystery3.C1"]
new = "Encourage the Caped Chewer"
status = "normal"

["LV.BCEv.CampfireMystery3.C1N"]
new = "{0}"
status = "normal"

["LV.BCEv.CampfireMystery3.C1N.Ch1C1"]
new = "[[C]]Pay {0} to equip the hero with a proper torch patrol."
status = "normal"

["LV.BCEv.CampfireMystery3.C1N.Ch1C2"]
new = "[[C]]Pay {0} to prepare a heroic invitation snack using the Inventor's very scientific bait protocol."
status = "normal"

["LV.BCEv.CampfireMystery3.C1N.Ch1C3"]
new = "[[C]]Pay {0} to set bait near the old storage floor and keep the hero's watch lit."
status = "normal"

["LV.BCEv.CampfireMystery3.C2"]
new = "Post real guards"
status = "normal"

["LV.BCEv.CampfireMystery3.C2N"]
new = "[[C]]Pay {0} to keep guards posted through the night."
status = "normal"

["LV.BCEv.CampfireMystery3.C3"]
new = "Seal the old storage floor"
status = "normal"

["LV.BCEv.CampfireMystery3.C3N"]
new = "[[C]]Pay {0} to block the raised boards and seal the gaps."
status = "normal"

["LV.BCEv.CampfireMystery3.O1"]
new = "The Caped Chewer takes position near the old storage floor.\n{0}\nFor a while, nothing happens.\nThen the knocking comes from below.\n<YellowHighlight><i>Knock. Knock. Knock.</i></YellowHighlight>\nThe Caped Chewer raises one paw for silence, which would be more impressive if everyone had not already stopped breathing.\nA shadow moves beneath the raised board.\nThe hero leaps.\nThe shadow leaps back.\nThe next few moments are mostly noise: scraping claws, splintering wood, startled shouts, and one heroic declaration that turns into a squeak halfway through.\nWhen the colony rushes in, the Caped Chewer and the young volunteers are bruised and shaken.\nBut they are not empty-pawed.\nIn the firelight, dragged from the broken storage floor, lies an unconscious beaver no one recognizes.\n[[C]][[-]]{1} Beaver injured."
status = "normal"

["LV.BCEv.CampfireMystery3.O1.Ch1C1"]
new = "The torch burns bright enough to make every mask look braver than its owner. Resin smoke curls through the storage piles, sharp and golden, pushing the dark into narrow corners."
status = "normal"

["LV.BCEv.CampfireMystery3.O1.Ch1C2"]
new = "The berries are arranged with great ceremony. The Caped Chewer insists the bowl should face the heroic direction. No one asks what direction that is."
status = "normal"

["LV.BCEv.CampfireMystery3.O1.Ch1C3"]
new = "The bait is placed near the raised plank, and the patrol keeps the area lit. The Inventor gives three pieces of advice, two warnings, and one diagram no one requested."
status = "normal"

["LV.BCEv.CampfireMystery3.O2"]
new = "The guards take their posts near the old storage floor.\nThey have water, berries, and the kind of courage that gets quieter the longer the night lasts.\nThe Campfire burns behind them. The storage piles creak ahead of them. Beneath the raised plank, something shifts.\nThen the knocking comes.\n<YellowHighlight><i>Knock. Knock. Knock.</i></YellowHighlight>\nOne guard calls out.\nAnother steps closer.\nThe floor erupts.\nA shadow bolts from below, fast and wild with panic. The guards close ranks, but the thing fights like it has already decided capture means death.\nBy the time the colony reaches them, several guards are injured. A cup rolls across the dirt. Berries scatter underfoot.\nBut the shadow has been caught.\nIn the firelight, held down at last, lies an unconscious beaver no one recognizes.\n[[C]][[-]]{0} Beavers injured."
status = "normal"

["LV.BCEv.CampfireMystery3.O3"]
new = "The old storage floor is sealed before sunset.\nPlanks are nailed over the raised boards. Gaps are blocked. Loose corners are pressed flat until the floor looks ordinary again.\nFor a while, the knocking stops.\nSome beavers relax.\nThat is when it returns.\n<YellowHighlight><i>Knock. Knock. Knock.</i></YellowHighlight>\nFaster this time.\nLouder.\nNot a warning from beyond the dark, but a desperate sound from underneath.\nThe planks shudder. One snaps. Then another.\nA shadow bursts from the broken floor and crashes into the workers nearby. Paws scramble. Teeth flash. Someone shouts for help.\nThe colony fights back before fear can scatter them completely.\nWhen the noise finally ends, several workers are injured, the new planks are ruined, and an unconscious beaver no one recognizes lies beside the broken storage floor.\n[[C]][[-]]{0} Beavers injured."
status = "normal"

["LV.BCEv.CampfireMystery4"]
new = "Campfire Mystery: The Beaver Beneath"
status = "normal"

["LV.BCEv.CampfireMystery4.Content"]
new = "{0}\nFor two days, the captured beaver does not wake.\nThe injured are bandaged. The old storage floor is watched. The Campfire burns quietly, but no one asks for stories.\nThen, at last, the stranger opens their eyes.\nThey are thin, frightened, and smaller than the shadow made them seem.\nWhen they see the gathered colony, they scramble backward until their tail strikes the wall. It is crooked, scarred, and stiff, curled strangely enough that several beavers understand the spiral marks all at once.\nThe marks were not curses.\nThey were not warnings from a ghost.\nThey were tail-signs, scratched by someone who needed to find their way through the dark.\nPiece by piece, the truth comes out.\nThe stranger came from a failed settlement beyond the trees. They followed the smoke of the Campfire, found the colony, and hid beneath the storage floor because hunger was easier to face than being chased away.\nThey stole only what they could carry.\nThey knocked because they were afraid.\nThey fought because, in the dark, every paw reaching down looked like an enemy.\n{1}\nNow the colony must decide what kind of story this will become.\nA warning.\nA welcome.\nOr the tale of a beaver who found firelight and was sent back into the dark."
status = "normal"

["LV.BCEv.CampfireMystery4.Content.Ch3C1"]
new = "The Caped Chewer's patrol is already becoming a legend, mostly because every witness tells it differently.\nSome say the hero leapt bravely. Some say the hero slipped. The Caped Chewer insists both can be true if one falls with purpose.\nBut beneath the jokes are bandages, bruises, and shaken young beavers who learned that shadows can bite back."
status = "normal"

["LV.BCEv.CampfireMystery4.Content.Ch3C2"]
new = "The guards did their duty, and duty has left marks.\nThey held the old storage floor through the night. They caught the shadow before it vanished again. Now they sit near the Campfire with bandaged paws, quiet faces, and the uneasy knowledge that they captured someone who had only been trying to survive."
status = "normal"

["LV.BCEv.CampfireMystery4.Content.Ch3C3"]
new = "The sealed floor has been torn open again.\nThe new planks are broken. The workers are injured. No one says the word trap, but everyone thinks it.\nThe stranger watches the colony with wide eyes, as if still hearing the sound of exits being closed above them."
status = "normal"

["LV.BCEv.CampfireMystery4.Content.TrialCh3C1"]
new = "If the colony wants the stranger to stay, it must show that the Campfire is not just noise, masks, and brave speeches.\nIt must prove that every beaver in the colony is truly cared for."
status = "normal"

["LV.BCEv.CampfireMystery4.Content.TrialCh3C2"]
new = "If the colony wants the stranger to stay, it must show that guards are not only there to corner the frightened.\nIt must prove that order protects the colony from real danger."
status = "normal"

["LV.BCEv.CampfireMystery4.Content.TrialCh3C3"]
new = "If the colony wants the stranger to stay, it must show that no beaver here is left trapped, hungry, thirsty, or forgotten.\nIt must prove that shelter is not another word for a closed door."
status = "normal"

["LV.BCEv.CampfireMystery4.C1"]
new = "Prove the colony is safe"
status = "normal"

["LV.BCEv.CampfireMystery4.C1N"]
new = "{0}"
status = "normal"

["LV.BCEv.CampfireMystery4.C1N.Ch3C1"]
new = "[[C]]Ensure average wellbeing is at least {1} after [[time:{0}d]]."
status = "normal"

["LV.BCEv.CampfireMystery4.C1N.Ch3C2"]
new = "[[C]]Keep the colony from flooding for [[time:{0}d]]."
status = "normal"

["LV.BCEv.CampfireMystery4.C1N.Ch3C3"]
new = "[[C]]Ensure all beavers are sheltered, not hungry, and not thirsty after [[time:{0}d]]."
status = "normal"

["LV.BCEv.CampfireMystery4.C2"]
new = "Send them away with supplies"
status = "normal"

["LV.BCEv.CampfireMystery4.C2N"]
new = "[[C]]Pay {1} within [[time:{0}d]]. The stranger will leave, but not empty-pawed."
status = "normal"

["LV.BCEv.CampfireMystery4.C3"]
new = "Drive them out"
status = "normal"

["LV.BCEv.CampfireMystery4.C3N"]
new = "[[C]]The colony will not risk another attack. <YellowHighlight>Unknown consequences.</YellowHighlight>"
status = "normal"

["LV.BCEv.CampfireMystery4.BuffName"]
new = "Inside the Circle"
status = "normal"

["LV.BCEv.CampfireMystery4.DebuffName"]
new = "Cold Firelight"
status = "normal"

["LV.BCEv.CampfireMystery4.O1"]
new = "For days, the colony does not argue with the stranger.\nIt simply proves itself.\nNo beaver is ignored. No fear is answered with panic. No tired paw is treated as a burden.\nThe stranger watches from the edge of the Campfire light, silent and uncertain.\nThen, one evening, they step closer. Not beneath the floor. Not beyond the glow. Inside the circle. The colony makes room.\nOnly then does the stranger point back toward the broken storage floor. Beneath a loose board, hidden away from panic and pursuit, they reveal a small trove of salvaged materials they had carried from the failed settlement and never dared to show.\nThe Tail That Knocked Thrice is no longer a ghost story. It is a welcome story.\n[[C]][[+]]A new beaver joins the colony.\n[[C]][[+]]Gain {2}.\n[[C]][[+]]All beavers gain {0} for [[time:{1}d]]"
status = "normal"

["LV.BCEv.CampfireMystery4.O2"]
new = "The colony tries, but fear has a long memory.\n{0}\nThe stranger watches from the edge of the Campfire light, silent and uncertain. They flinch at hurried paws, raised voices, and every creak from the old storage floor.\nWhen the time comes, they do not step closer. Before dawn, they leave.\nThere is no knocking this time. No spiral mark. No final warning. Only a place by the fire that remains empty.\nThe mystery ends, but not as a welcome story.\n[[C]][[-]]Adult beavers suffer {1} for [[time:{2}d]]"
status = "normal"

["LV.BCEv.CampfireMystery4.O2.FailCh3C1"]
new = "Some beavers are still worn down, unhappy, or forgotten at the edges of colony life. To the stranger, the Campfire looks warm, but not wide enough."
status = "normal"

["LV.BCEv.CampfireMystery4.O2.FailCh3C2"]
new = "The water rises where it should not. Paths flood, work stalls, and the colony rushes to protect itself. To the stranger, order still looks fragile."
status = "normal"

["LV.BCEv.CampfireMystery4.O2.FailCh3C3"]
new = "Some beavers still go without shelter, food, or water. To the stranger, the colony has not proven that a frightened mouth will be cared for instead of closed away."
status = "normal"

["LV.BCEv.CampfireMystery4.O3"]
new = "The colony packs berries and water, then leaves the bundle near the edge of the Campfire light.\nThe stranger takes it silently.\nFor a moment, it seems they might speak. Instead, they scratch one final spiral into the dirt.\nThis one does not point toward storage. It does not point beneath the floor. It points away.\nThe colony watches until the trees swallow them. The mystery ends gently, but not happily."
status = "normal"

["LV.BCEv.CampfireMystery4.O4"]
new = "The colony drives the stranger beyond the light.\nNo one cheers.\nThe stolen goods are counted. The broken planks are replaced. The injured slowly return to work.\nAt the next Campfire, someone begins to tell the story of the ghost beneath storage.\nNo one asks them to continue.\nSome stories are not frightening because of the shadow.\nSome are frightening because of what the firelight did after it found one.\n[[C]][[-]]Adult beavers suffer {0} for [[time:{1}d]]"
status = "normal"
