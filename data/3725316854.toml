koKR = "[[C]][[좋음:{0}:{1}]]을(를) 지불하고 당황보다 더 신뢰할 수 있는 것으로 두드림을 조사하세요."
csCZ = "[[C]]Zaplať [[dobře:{0}:{1}]] za prozkoumání klepání s něčím spolehlivějším než panika."
viVN = "[[C]]Trả [[good:{0}:{1}]] để điều tra âm thanh gõ với thứ gì đó đáng tin cậy hơn là sự hoảng loạn."
trTR = "[[C]] Daha fazla panik yerine, vurmayı araştırmak için [[good:{0}:{1}]] öde."

["LV.BCEv.CampfireMystery1.O1"]
raw = "The beavers stack fresh logs beside the Campfire and keep the flames high.\nThe dark does not vanish. It only steps backward.\nAll night, the colony watches the firelight push against the trees, the storage piles, and the uneven ground beyond the camp. The knocking comes twice more, but each time it sounds farther away, as if whatever waits outside the circle refuses to cross into the glow.\nBy dawn, the missing supplies are still missing. The spiral mark is still carved into the plank.\nBut the colony has learned one thing.\n<b>Whatever made the sound, it does not like being seen.</b>"
status = "normal"
enUS = "The beavers stack fresh logs beside the Campfire and keep the flames high. The dark does not vanish. It only steps backward. All night, the colony watches the firelight push against the trees, the storage piles, and the uneven ground beyond the camp. The knocking comes twice more, but each time it sounds farther away, as if whatever waits outside the circle refuses to cross into the glow. By dawn, the missing supplies are still missing. The spiral mark is still carved into the plank. But the colony has learned one thing. <b>Whatever made the sound, it does not like being seen.</b>"
zhCN = "在篝火旁，比弗们把新鲜的木材堆放在一起，保持火焰的高昂。黑暗不会消失，只是向后退去。整夜，殖民地注视着火光向树木、储存堆和营地之外的不平整地面推进。敲击声再次响起两次，但每次都听起来更远，仿佛在圈内的某个东西拒绝跨入光圈。黎明时，失踪的物资依旧失踪。螺旋标记依然刻在木板上。但殖民地学到了一件事。<b>无论发出声音的是什么，它并不喜欢被看到。</b>"
zhTW = "獺們在營火旁堆疊新鮮的木頭，維持著高高的火焰。\n黑暗並未消失。它只是後退。\n整個晚上，殖民地看著火光推擠著樹木、儲存堆疊和營地外不平坦的地面。敲擊聲又響起兩次，但每次聽起來都越來越遠，彷彿在圓圈外等待的東西拒絕越過光輝。\n黎明時，失蹤的物資依然失踪。螺旋形的記號仍然雕刻在木板上。\n但殖民地學到了一件事。\n<b>無論是什麼發出聲音的東西，它都不喜歡被看見。</b>"
ruRU = "Бобры складывают свежие бревна рядом с Костром и поддерживают пламя высоко. Темнота не исчезает. Она просто отступает назад. Всю ночь колония наблюдает, как свет от огня упирается в деревья, склады с запасами и неровную землю за лагерем. Стук раздается еще дважды, но каждый раз он звучит все дальше, словно то, что ждет за пределами круга, отказывается пересекать свет. К утру пропавшие запасы по-прежнему пропали. Спиралевидный знак все еще вырезан в доске. Но колония усвоила одно. <b>Что бы ни произвело этот звук, ему не нравится, когда его видят.</b>"
jaJP = "ビーバーたちは、キャンプファイヤーの横に新鮮な丸太を積み上げ、炎を高く保つ。  \n暗闇は消えない。ただ後退するだけだ。  \n一晩中、コロニーは炎の光が木々、物資の山、およびキャンプを越える不均一な地面に押し寄せるのを見守る。叩く音がさらに二度聞こえるが、毎回それは遠くから聞こえる。まるで外で待っている何かが、光の中に入ることを拒んでいるかのようだ。  \n夜明けまでに、無くなった物資はまだ見つからない。渦巻きの印は、板にまだ彫られている。  \nしかし、コロニーは一つのことを学んだ。  \n<b>音を立てたものは、見られるのを好まない。</b>"
frFR = "Les castors empilent des bûches fraîches à côté du feu de camp et maintiennent les flammes hautes. L'obscurité ne disparaît pas. Elle recule simplement. Toute la nuit, la colonie observe la lumière du feu repousser les arbres, les tas de stockage et le sol irrégulier au-delà du camp. Le bruit se fait entendre deux fois de plus, mais chaque fois, il semble plus éloigné, comme si ce qui attend à l'extérieur du cercle refusait de traverser la lueur. À l'aube, les fournitures manquantes sont toujours manquantes. La marque en spirale est toujours gravée dans la planche. Mais la colonie a appris une chose. <b>Quoi que cet être ait produit le son, il n'aime pas être vu.</b>"
deDE = "Die Biber stapeln frische Logs neben dem Lagerfeuer und halten die Flammen hoch. \nDie Dunkelheit verschwindet nicht. Sie tritt nur zurück. \nDie ganze Nacht über beobachtet die Kolonie, wie das Feuerlicht gegen die Bäume, die Lagerhaufen und den unebenen Boden jenseits des Lagers dringt. Das Klopfen kommt noch zweimal, aber jedes Mal klingt es weiter weg, als ob das, was außerhalb des Kreises wartet, sich weigert, in den Schein einzutreten. \nBei Tagesanbruch sind die vermissten Vorräte immer noch verschwunden. Das spiralförmige Zeichen ist weiterhin in das Brett eingraviert. \nAber die Kolonie hat eines gelernt. \n<b>Egal, was das Geräusch verursacht hat, es mag es nicht, gesehen zu werden.</b>"
plPL = "Bobry układają świeże kłody obok Ogniska i utrzymują płomienie wysoko. Ciemność nie znika. Tylko cofa się do tyłu. Całą noc kolonia obserwuje, jak światło ognia naciska na drzewa, stosy zapasów i nierówny teren poza obozem. Stukanie słychać jeszcze dwa razy, ale za każdym razem wydaje się dalsze, jakby to, co czeka na zewnątrz kręgu, odmawiało przekroczenia blasku. Przy świcie zaginione zapasy wciąż są zaginione. Spiralny znak wciąż jest wyryty w desce. Ale kolonia nauczyła się jednej rzeczy. <b>To, co wydawało dźwięk, nie lubi być widziane.</b>"
ptBR = "Os castores empilham toras frescas ao lado da fogueira e mantêm as chamas altas.\nA escuridão não desaparece. Ela apenas recua.\nA noite toda, a colônia observa a luz do fogo empurrar contra as árvores, os montes de armazenamento e o solo irregular além do acampamento. O barulho vem mais duas vezes, mas a cada vez soa mais distante, como se aquilo que espera do lado de fora do círculo se recusa a cruzar o brilho.\nAo amanhecer, os suprimentos desaparecidos ainda estão desaparecidos. A marca espiral ainda está esculpida na tábua.\nMas a colônia aprendeu uma coisa.\n<b>Quem quer que tenha feito o som, não gosta de ser visto.</b>"
koKR = "비버들은 캠프파이어 옆에 신선한 통나무를 쌓고 불꽃을 높이 유지한다. 어둠은 사라지지 않는다. 단지 뒤로 물러날 뿐이다. 밤새, 식민지는 불빛이 나무와 저장 더미, 그리고 캠프 너머의 울퉁불퉁한 땅에 맞서는 모습을 지켜본다. 두 번의 knocking 소리가 더 들리지만, 매번 그 소리는 점점 더 멀어지는 듯하다. 마치 원 밖에서 기다리는 것이 빛을 넘어서는 것을 거부하는 것처럼. 새벽이 오고, 잃어버린 물자가 여전히 사라져 있다. 나무판에 소용돌이 자국이 여전히 새겨져 있다. 그러나 식민지는 한 가지를 배웠다. <b>소리를 만든 것은, 보이는 것을 좋아하지 않는다.</b>"
csCZ = "Bobři skládají čerstvé klády vedle ohniště a udržují plameny vysoké. Tma nezmizí. Jen ustoupí dozadu. Celou noc kolonie sleduje, jak světlo ohně tlačí proti stromům, zásobám a nerovnému terénu za táborem. Zaklepání zazní ještě dvakrát, ale pokaždé zní dál, jako by cokoliv, co čeká za kruhem, odmítalo překročit do světla. Před svítáním jsou chybějící zásoby stále chybějící. Spirálový znak je stále vyryty do prkna. Ale kolonie se naučila jednu věc. <b>Cokoliv, co vydalo zvuk, nemá rádo, když je viděno.</b>"
viVN = "Những con nhím xếp những khúc gỗ tươi bên cạnh Lửa Trại và giữ ngọn lửa bừng sáng. Bóng tối không biến mất. Nó chỉ lùi lại. Suốt đêm, thuộc địa theo dõi ánh lửa chống lại những cái cây, các chồng hàng, và mặt đất không bằng phẳng bên ngoài trại. Tiếng gõ vang lên thêm hai lần nữa, nhưng mỗi lần đều nghe có vẻ xa xăm hơn, như thể bất cứ thứ gì đang chờ ngoài vòng tròn từ chối bước vào ánh sáng. Đến bình minh, những nguồn cung bị mất vẫn chưa thấy trở lại. Dấu xoắn vẫn còn khắc vào tấm ván. Nhưng thuộc địa đã học được một điều. <b>Bất cứ thứ gì tạo ra âm thanh, nó không thích bị nhìn thấy.</b>"
trTR = "Molalar, kamp ateşi yanına taze odunlar istifler ve alevleri yüksekte tutar.\nKaranlık ortadan kaybolmaz. Sadece geri çekilir.\nBütün gece, koloni ateşin ışığının ağaçlara, depolama yığınlarına ve kampın ötesindeki engebeli zemine itmesini izler. Vurma sesi üç kere daha gelir, ama her seferinde daha uzak bir yerden gelir, dışarıda bekleyen her neyse o ışık halkasına girmeyi reddediyormuş gibi.\nŞafak vaktinde, kaybolan malzemeler hâlâ kaybolmuştur. Spiral işaret hâlâ tahtanın üzerine oyulmuştur.\nAma koloni bir şeyi öğrenmiştir.\n<b>Sesi çıkaran neyse, görünmekten hoşlanmıyor.</b>"

["LV.BCEv.CampfireMystery1.O2"]
raw = "The berries are placed carefully at the edge of the firelight.\nNo one agrees what this means.\nSome call it bait. Some call it mercy. One very nervous beaver calls it diplomacy and insists the bowl should be turned slightly to show respect.\nBy morning, the berries are gone. The bowl remains.\nIt has been pushed back toward the Campfire, badly cleaned, with a small spiral scratched into the dirt beside it. The mark is less like a threat. More like a reply.\nThe colony does not know what waits beyond the light.\n<b>But now it knows the dark was hungry.</b>"
status = "normal"
enUS = "The berries are placed carefully at the edge of the firelight.  \nNo one agrees what this means.  \nSome call it bait. Some call it mercy. One very nervous beaver calls it diplomacy and insists the bowl should be turned slightly to show respect.  \nBy morning, the berries are gone. The bowl remains.  \nIt has been pushed back toward the Campfire, badly cleaned, with a small spiral scratched into the dirt beside it. The mark is less like a threat. More like a reply.  \nThe colony does not know what waits beyond the light.  \n<b>But now it knows the dark was hungry.</b>"
zhCN = "浆果被小心翼翼地放在火光边缘。\n没有人能达成一致对此的意义。\n一些人称之为诱饵。另一些人称之为仁慈。一只非常紧张的海狸称之为外交，并坚持认为碗应该稍微转动以示尊重。\n到早上，浆果已经消失。碗还在。\n它被推回到营火旁，清理得很差，旁边的土里划了一个小螺旋。这个标记更像是一种回应，而不是威胁。\n殖民地并不知道光明之外等待着什么。\n<b>但现在它知道黑暗是饥饿的。</b>"
zhTW = "果實小心翼翼地放在火光邊緣。\n沒有人同意這意味著什麼。\n有些人稱之為誘餌。有些人稱之為仁慈。一隻非常緊張的海狸稱之為外交，並堅持碗應該稍微轉動以示尊重。\n到了早上，果實不見了。碗卻還在。\n它被推回到營火旁，清理得不怎麼好，旁邊的土裡劃有一個小螺旋。那個標記不像威脅，更像是一個回應。\n殖民地不知道光明之外等待著什麼。\n<b>但現在它知道黑暗是饑餓的。</b>"
ruRU = "Ягоды аккуратно уложены на краю света огня.  \nНикто не согласен с тем, что это значит.  \nНекоторые называют это приманкой. Некоторые называют это милосердием. Один очень нервный бобер называет это дипломатией и настаивает на том, чтобы чаша была немного повернута, чтобы показать уважение.  \nК утру ягоды исчезли. Чаша осталась.  \nОна была отодвинута обратно к костру, плохо очищенная, с небольшой спиралью, начертанной в грязи рядом с ней. Знак больше похож на ответ, чем на угрозу.  \nКолония не знает, что ждет за пределами света.  \n<b>Но теперь она знает, что тьма была голодна.</b>"
jaJP = "「ベリーは火の光の端に慎重に置かれています。  \n誰もこれが何を意味するのか同意していません。  \nある者は餌と呼び、またある者は慈悲と呼びます。一匹の非常に緊張したビーバーは、それを外交と呼び、皿を少し回して敬意を示すべきだと主張します。  \n朝になると、ベリーは消えています。皿は残っています。  \nキャンプファイヤーの方に押し戻されており、ひどく掃除されていない状態で、皿のそばの土に小さな螺旋が引かれています。その印は脅迫のようではなく、むしろ返答のようです。  \nコロニーは光の向こうに何が待っているのかわかりません。  \n<b>しかし、今は暗闇が飢えていたことを知っています。</b>」"
frFR = "Les baies sont placées soigneusement au bord de la lumière du feu.  \nPersonne ne s'accorde sur ce que cela signifie.  \nCertains l'appellent un appât. D'autres l'appellent de la miséricorde. Un castor très nerveux l'appelle diplomatie et insiste pour que le bol soit légèrement tourné par respect.  \nAu matin, les baies ont disparu. Le bol reste.  \nIl a été repoussé vers le feu de camp, mal nettoyé, avec une petite spirale grattée dans la terre à côté. La marque ressemble moins à une menace. Plus à une réponse.  \nLa colonie ne sait pas ce qui attend au-delà de la lumière.  \n<b>Mais maintenant, elle sait que l'obscurité avait faim.</b>"
deDE = "Die Beeren sind sorgfältig am Rand des Feuers platziert.\nNiemand ist sich einig, was das bedeutet.\nEinige nennen es Köder. Andere nennen es Barmherzigkeit. Ein sehr nervöser Biber nennt es Diplomatie und besteht darauf, dass die Schüssel leicht gedreht werden sollte, um Respekt zu zeigen.\nBis zum Morgen sind die Beeren verschwunden. Die Schüssel bleibt.\nSie wurde zurück zum Lagerfeuer geschoben, schlecht gereinigt, mit einer kleinen Spirale in den Boden gekratzt, die neben ihr liegt. Das Zeichen ist weniger eine Bedrohung. Mehr eine Antwort.\nDie Kolonie weiß nicht, was jenseits des Lichts wartet.\n<b>Sind die Dunkelheit hungrig.</b>"
plPL = "Jagody są starannie umieszczone na skraju ognia.\nNikt nie zgadza się co to oznacza.\nNiektórzy nazywają to przynętą. Inni mówią, że to miłosierdzie. Jeden bardzo nerwowy bóbr nazywa to dyplomacją i upiera się, że miska powinna być lekko obrócona na znak szacunku.\nDo rana jagody zniknęły. Miska pozostała.\nZostała odepchnięta w stronę ogniska, źle oczyszczona, z małym spiralem wyrytym w ziemi obok. Znak jest mniej jak groźba. Raczej jak odpowiedź.\nKolonia nie wie, co czeka poza światłem.\n<b>Ale teraz wie, że ciemność była głodna.</b>"
ptBR = "As frutas vermelhas são colocadas cuidadosamente na borda da luz do fogo.  \nNinguém concorda com o que isso significa.  \nAlguns chamam de isca. Outros chamam de misericórdia. Um castor muito nervoso chama de diplomacia e insiste que a tigela deve ser virada ligeiramente para mostrar respeito.  \nPela manhã, as frutas vermelhas sumiram. A tigela permanece.  \nEla foi empurrada de volta em direção à fogueira, mal limpa, com uma pequena espiral riscadas na terra ao lado. A marca é menos como uma ameaça. Mais como uma resposta.  \nA colônia não sabe o que espera além da luz.  \n<b>Mas agora sabe que a escuridão estava faminta.</b>"
koKR = "베리들은 불빛 가장자리에서 조심스럽게 놓여 있다. \n아무도 이것이 무엇을 의미하는지 동의하지 않는다. \n몇몇은 이를 미끼라고 부르고, 몇몇은 자비라고 부른다. 한 매우 긴장한 비버는 이를 외교라고 부르며 그릇이 약간 돌아가야 한다고 주장하며 존경의 표시로 여긴다. \n아침이 오면, 베리는 사라졌다. 그릇은 남아 있다. \n그릇은 캠프파이어 쪽으로 밀려났고, 잘 닦이지 않은 상태로, 그 옆의 흙에 작은 나선형의 긁힌 자국이 있다. 그 자국은 위협보다는 응답에 가깝다. \n식민지는 빛 너머에 무엇이 기다리고 있는지 모르고 있다. \n<b>하지만 이제 어둠이 배고팠다는 것을 안다.</b>"
csCZ = "Bobule jsou opatrně položeny na okraji světla ohně. \nNikdo se neshodne na tom, co to znamená. \nNěkteří to nazývají návnadou. Někteří milosrdenstvím. Jeden velmi nervózní bobr to nazývá diplomacií a trvá na tom, že by se miska měla mírně otočit na projevení úcty. \nDo rána jsou bobule pryč. Miska zůstává. \nByla posunuta zpět k ohni, špatně vyčištěná, s malou spirálou vyrytou do země vedle ní. Značka vypadá méně jako hrozba. Spíše jako odpověď. \nKolonie neví, co čeká za světlem. \n<b>Ale nyní ví, že tma byla hladová.</b>"
viVN = "Những quả mọng được đặt cẩn thận ở rìa ánh lửa.\nKhông ai đồng ý về ý nghĩa của điều này.\nMột số gọi đó là mồi nhử. Một số gọi đó là lòng từ bi. Một con beaver rất lo lắng gọi đó là ngoại giao và khăng khăng rằng bát nên được xoay một chút để thể hiện sự tôn trọng.\nĐến sáng, những quả mọng đã biến mất. Cái bát vẫn còn.\nNó đã được đẩy về phía Lửa trại, bị dọn dẹp tồi tệ, với một vòng xoắn nhỏ được cào vào đất bên cạnh nó. Dấu hiệu này không giống như một mối đe dọa. Hơn cả là một câu trả lời.\nThuộc địa không biết điều gì đang chờ đợi bên ngoài ánh sáng.\n<b>Nhưng giờ đây nó biết rằng bóng tối đã đói.</b>"
trTR = "Böğürtlenler, ateş ışığının sınırında dikkatlice yerleştirilmiş.\nKimse bunun ne anlama geldiği konusunda hemfikir değil.\nBazıları buna tuzak diyor. Bazıları merhamet diyor. Çok gergin bir porsuk ise buna diplomasi diyor ve kasesinin saygı göstermek için biraz döndürülmesi gerektiğini ısrarla savunuyor.\nSabah olunca, böğürtlenler kaybolmuş. Kase yerinde kalmış.\nKamp Ateşi'ne doğru itilmiş, kötü temizlenmiş, yanındaki toprağa küçük bir spiral kazınmış. İz, bir tehditten çok daha az. Daha çok bir yanıt gibi.\nKoloni, ışığın ötesinde neyin beklediğini bilmiyor.\n<b>Fakat artık karanlığın aç olduğunu biliyor.</b>"

["LV.BCEv.CampfireMystery1.O3"]
raw = "The Inventor arrives with a device made from hollow reeds, a bent cup, stretched bark, and the absolute confidence of someone who has not tested anything yet.\nThe colony gathers around as the strange tool is pointed toward the dark.\nFor a while, there is only wind, fire, and embarrassed silence.\nThen the knocking comes again.\n[[C]]<YellowHighlight><i>Knock. Knock. Knock.</i></YellowHighlight>\nThe Inventor's ears rise. The sound is not coming from the trees. It is not even coming from beyond the Campfire.\nThe device catches the echo from beneath the storage floor, hollow and faint, as if the colony has been listening in the wrong direction all along.\nBy morning, the spiral mark feels less like a curse and more like a clue."
status = "normal"
enUS = "The Inventor arrives with a device made from hollow reeds, a bent cup, stretched bark, and the absolute confidence of someone who has not tested anything yet. The colony gathers around as the strange tool is pointed toward the dark. For a while, there is only wind, fire, and embarrassed silence. Then the knocking comes again. [[C]]<YellowHighlight><i>Knock. Knock. Knock.</i></YellowHighlight> The Inventor's ears rise. The sound is not coming from the trees. It is not even coming from beyond the Campfire. The device catches the echo from beneath the storage floor, hollow and faint, as if the colony has been listening in the wrong direction all along. By morning, the spiral mark feels less like a curse and more like a clue."
zhCN = "发明家带着一个由空心芦苇、弯曲的杯子、拉伸的树皮和未曾测试过的绝对信心制作的装置到来。  \n殖民地的人们围在一起，目不转睛地盯着这个奇怪的工具，指向黑暗。  \n有一段时间，只有风、火和尴尬的沉默。  \n然后敲击声再次响起。  \n[[C]]<YellowHighlight><i>咚。咚。咚。</i></YellowHighlight>  \n发明家的耳朵竖起。声音不是来自树木，更不是来自营火之外。  \n这个装置捕捉到存储地板下的回声，空洞而微弱，仿佛整个殖民地一直朝着错误的方向聆听。  \n到早晨，螺旋标记感觉不再像诅咒，更像是一条线索。"
zhTW = "發明家帶著一個由空心蘆葦、彎曲的杯子、拉伸的樹皮和毫無測試經驗卻充滿自信的樣子來到這裡。  \n殖民地的人們圍聚在一起，看著這個奇怪的工具朝著黑暗指去。  \n有一段時間，只有風、火和尷尬的沉默。  \n然後敲擊聲再次響起。  \n[[C]]<YellowHighlight><i>敲。敲。敲。</i></YellowHighlight>  \n發明家的耳朵豎起來。聲音不是來自樹木，甚至不來自營火之外。  \n這個裝置捕捉到來自儲藏地板下的回聲，空洞而微弱，彷彿殖民地一直在聆聽錯誤的方向。  \n到早晨，螺旋印記感覺不再像詛咒，更像是一個線索。"
ruRU = "Изобретатель приходит с устройством, сделанным из пустотелых тростников, искривленной чашки, натянутой коры и абсолютной уверенности человека, который еще ничего не испытывал. Колония собирается вокруг, когда странный инструмент направляется в темноту. Некоторое время слышны только ветер, огонь и неловкое молчание. Затем стук раздается снова. [[C]]<YellowHighlight><i>Тук. Тук. Тук.</i></YellowHighlight> Уши Изобретателя поднимаются. Звук доносится не из деревьев. Он даже не идет за пределами Костра. Устройство ловит эхо из-под пола хранилища, пустое и едва слышное, словно колония все это время слушала не в том направлении. К утру спиралевидный знак ощущается меньше как проклятие и больше как подсказка."
jaJP = "発明家が中空の葦、曲がったカップ、引き伸ばした樹皮、そしてまだ何も試していない自信満々の様子で装置を持って現れる。  \nコロニーはその奇妙な道具が暗闇に向けられるのを囲む。  \nしばらくの間、風、火、そして気まずい沈黙だけがある。  \nすると、再びノックの音が聞こえる。  \n[[C]]<YellowHighlight><i>ノック。ノック。ノック。</i></YellowHighlight>  \n発明家の耳が立ち上がる。その音は木々からではなく、キャンプファイヤーの向こう側からも来ていない。  \n装置は貯蔵床の下からの反響を捉え、空虚でかすかな音がし、コロニーがずっと間違った方向を向いていたかのように感じさせる。  \n朝になると、螺旋の印は呪いのようではなく、手がかりのように感じられる。"
frFR = "L'Inventeur arrive avec un dispositif fait de roseaux creux, d'une tasse tordue, d'écorce tendue et de la confiance absolue de quelqu'un qui n'a encore rien testé. La colonie se rassemble pendant que l'étrange outil est pointé vers l'obscurité. Pendant un moment, il n'y a que du vent, du feu et un silence embarrassé. Puis les coups se font entendre à nouveau. [[C]]<YellowHighlight><i>Frappement. Frappement. Frappement.</i></YellowHighlight> Les oreilles de l'Inventeur se dressent. Le son ne vient pas des arbres. Cela ne vient même pas de l'autre côté du Campfire. Le dispositif capte l'écho provenant du dessous du sol de stockage, creux et faible, comme si la colonie avait écouté dans la mauvaise direction tout ce temps. Au matin, la marque en spirale semble moins comme une malédiction et plus comme un indice."
deDE = "Der Erfinder kommt mit einem Gerät aus hohlen Röhren, einem gebogenen Becher, gedehntem Rinde und dem absoluten Selbstvertrauen von jemandem, der noch nichts getestet hat. Die Kolonie versammelt sich, während das seltsame Werkzeug auf die Dunkelheit gerichtet wird. Für eine Weile gibt es nur Wind, Feuer und verlegene Stille. Dann kommt das Klopfen wieder. [[C]]<YellowHighlight><i>Klopf. Klopf. Klopf.</i></YellowHighlight> Die Ohren des Erfinders richten sich auf. Der Klang kommt nicht von den Bäumen. Er kommt sogar nicht einmal von jenseits des Lagerfeuers. Das Gerät fängt das Echo von unter dem Lagerboden auf, hohl und schwach, als ob die Kolonie die ganze Zeit in die falsche Richtung gelauscht hätte. Am Morgen fühlt sich das spiralförmige Zeichen weniger wie ein Fluch und mehr wie ein Hinweis an."
plPL = "Wynalazca przybywa z urządzeniem wykonanym z pustych trzcinek, zgiętej filiżanki, naciągniętej kory i absolutnej pewności osoby, która jeszcze niczego nie przetestowała.\nKolonia gromadzi się wokół, gdy dziwne narzędzie jest skierowane w stronę ciemności.\nPrzez chwilę słychać tylko wiatr, ogień i zawstydzoną ciszę.\nPotem znów słychać pukanie.\n[[C]]<YellowHighlight><i>Puk. Puk. Puk.</i></YellowHighlight>\nUszy Wynalazcy unoszą się. Dźwięk nie pochodzi z drzew. Nie pochodzi nawet z okolic Ogniska.\nUrządzenie wzmacnia echo dochodzące spod podłogi magazynu, puste i słabe, jakby kolonia całkowicie nasłuchiwała w złym kierunku.\nDo rana spiralny znak wydaje się mniej przekleństwem, a bardziej wskazówką."
ptBR = "O Inventor chega com um dispositivo feito de caniços ocos, uma xícara torta, casca esticada e a absoluta confiança de alguém que ainda não testou nada. A colônia se reúne enquanto a estranha ferramenta é apontada para a escuridão. Por um tempo, há apenas vento, fogo e um silêncio constrangido. Então, o bater vem novamente. [[C]]<YellowHighlight><i>Knock. Knock. Knock.</i></YellowHighlight> As orelhas do Inventor se erguem. O som não vem das árvores. Não vem nem mesmo do além da fogueira. O dispositivo captura o eco debaixo do chão de armazenamento, oco e fraco, como se a colônia estivesse ouvindo na direção errada o tempo todo. Pela manhã, a marca espiral parece menos uma maldição e mais uma pista."
koKR = "발명가가 속이 빈 갈대, 구부러진 컵, 늘어진 나무껍질, 그리고 아직 아무것도 시험해 보지 않은 사람의 절대적인 자신감으로 만든 장치를 가지고 도착합니다.  \n식민지는 이상한 도구가 어둠을 향해 겨냥되자 주위에 모입니다.  \n잠시 동안 바람, 불, 그리고 부끄러운 침묵만이 이어집니다.  \n그때 다시 두드리는 소리가 들립니다.  \n[[C]]<YellowHighlight><i>톡톡톡.</i></YellowHighlight>  \n발명가의 귀가 쫑긋 올라옵니다. 소리는 나무들에서 오는 것이 아닙니다. 캠프파이어 너머에서도 오지 않네요.  \n장치는 저장 바닥 아래에서 메아리를 포착하는데, 속이 비어 있고 희미하여 식민지가 처음부터 잘못된 방향으로 듣고 있었던 것처럼 느껴집니다.  \n아침이 되자 나선형 표시는 저주처럼 느껴지기보다 단서처럼 여겨집니다."
csCZ = "Vynálezce přichází se zařízením vyrobeným z dutých rákosů, ohnutého pohárku, napnuté kůry a absolutní důvěrou někoho, kdo ještě nic nevyzkoušel. Kolonie se shromáždí kolem, když je podivný nástroj mířen na tmu. Chvíli panuje jen vítr, oheň a trapné ticho. Pak se klepání ozve znovu. [[C]]<YellowHighlight><i>Klop. Klop. Klop.</i></YellowHighlight> Vynálezcovy uši se vztyčí. Zvuk se neozývá ze stromů. Dokonce ani nepochází za ohništěm. Zařízení zachytí echo zpod skladovacího dna, duté a slabé, jako by kolonie celou dobu naslouchala špatným směrem. Do rána se spirálový znak zdá být méně jako prokletí a více jako stopa."
viVN = "Người phát minh xuất hiện với một thiết bị làm từ những ống giống như sậy, một chiếc cốc cong, vỏ cây kéo dài và sự tự tin tuyệt đối của một người chưa thử nghiệm gì cả.  \nCác cư dân tập trung xung quanh khi công cụ kỳ lạ được chỉ về phía bóng tối.  \nTrong một khoảng thời gian, chỉ có gió, lửa và sự im lặng ngại ngùng.  \nSau đó, âm thanh gõ lại vang lên.  \n[[C]]<YellowHighlight><i>Gõ. Gõ. Gõ.</i></YellowHighlight>  \nTai của người phát minh giật lên. Âm thanh không đến từ những cây. Nó thậm chí không đến từ đằng sau Lửa trại.  \nThiết bị bắt được âm vang từ dưới sàn lưu trữ, rỗng và yếu ớt, như thể cả thuộc địa đã nghe nhầm hướng từ đầu.  \nVào buổi sáng, dấu xoắn cảm giác ít giống một lời nguyền hơn và giống như một manh mối hơn."
trTR = "İcatçı, boş kamışlardan, eğik bir kupadan, gerilmiş kabuktan yapılmış bir cihazla ve henüz hiçbir şey denememiş birinin mutlak güveniyle gelir.\nKoloni, garip aracın karanlığa doğru işaret ettiğinin etrafında toplanır.\nBir süre rüzgar, ateş ve mahçup bir sessizlik dışında hiçbir şey yoktur.\nSonra, tekrar vurma sesi gelir.\n[[C]]<YellowHighlight><i>Vur. Vur. Vur.</i></YellowHighlight>\nİcatçı'nın kulakları dikilir. Ses ağaçlardan gelmiyor. Hatta Kamp Ateşi'nin ötesinden bile gelmiyor.\nCihaz, depolama katının altındaki yankıyı yakalar, boş ve zayıf, sanki koloni hep yanlış yönde dinlemiş gibi.\nSabaha kadar, spiral işaret bir lanet gibi hissettirmekten çok daha çok bir ipucu gibi hissedilir."

