["LV.BCEv.CampfireMystery4.O1"]
raw = "For days, the colony does not argue with the stranger.\nIt simply proves itself.\nNo beaver is ignored. No fear is answered with panic. No tired paw is treated as a burden.\nThe stranger watches from the edge of the Campfire light, silent and uncertain.\nThen, one evening, they step closer. Not beneath the floor. Not beyond the glow. Inside the circle. The colony makes room.\nOnly then does the stranger point back toward the broken storage floor. Beneath a loose board, hidden away from panic and pursuit, they reveal a small trove of salvaged materials they had carried from the failed settlement and never dared to show.\nThe Tail That Knocked Thrice is no longer a ghost story. It is a welcome story.\n[[C]][[+]]A new beaver joins the colony.\n[[C]][[+]]Gain {2}.\n[[C]][[+]]All beavers gain {0} for [[time:{1}d]]"
status = "normal"
enUS = "For days, the colony does not argue with the stranger. It simply proves itself. No beaver is ignored. No fear is answered with panic. No tired paw is treated as a burden. The stranger watches from the edge of the Campfire light, silent and uncertain. Then, one evening, they step closer. Not beneath the floor. Not beyond the glow. Inside the circle. The colony makes room. Only then does the stranger point back toward the broken storage floor. Beneath a loose board, hidden away from panic and pursuit, they reveal a small trove of salvaged materials they had carried from the failed settlement and never dared to show. The Tail That Knocked Thrice is no longer a ghost story. It is a welcome story. [[C]][[+]]A new beaver joins the colony. [[C]][[+]]Gain {2}. [[C]][[+]]All beavers gain {0} for [[time:{1}d]]"
zhCN = "几天以来，殖民地没有与陌生人争论。  \n它只是证明自己。  \n没有海狸被忽视。没有恐惧用恐慌来回应。没有疲惫的爪子被视为负担。  \n陌生人静静地在营火光的边缘观察着，沉默而不确定。  \n然后，在一个傍晚，他们走得更近。不是在地板下。不是在光芒之外。而是在圈子内。殖民地腾出空间。  \n只有在那时，陌生人才指向破损的储藏地板。在一块松动的木板下，藏匿在恐慌和追逐之外，他们揭示了一个小宝藏，里面装着他们从失败的定居点带来的抢救材料，从未敢出示。  \n“三次敲门的尾巴”不再是鬼故事。这是一个欢迎的故事。  \n[[C]][[+]]一只新的海狸加入了殖民地。  \n[[C]][[+]]获得 {2}。  \n[[C]][[+]]所有海狸获得 {0}，持续 [[time:{1}d]]"
zhTW = "幾天來，殖民地與陌生人沒有爭執。  \n它只是證明了自己。  \n沒有浣熊被忽視。  \n沒有恐懼以驚慌回應。  \n沒有疲憊的爪子被當作負擔。  \n陌生人靜靜地站在營火光線的邊緣，默默不語，心中不安。  \n然後，有一天晚上，他們走得更近。不在地板之下。不在光芒之外。就在圈子裡。殖民地讓出空間。  \n只有在那時，陌生人才指向破損的儲物地板。在一塊鬆動的木板之下，藏在恐慌和追逐的隱蔽處，他們揭示了一小堆從失敗聚落帶來的 salvaged 材料，這些材料從未敢於展示。  \n“三次敲擊的尾巴”不再是一個鬼故事。這是一個受歡迎的故事。  \n[[C]][[+]]一隻新的浣熊加入了殖民地。  \n[[C]][[+]]獲得 {2}。  \n[[C]][[+]]所有的浣熊在 [[time:{1}d]] 內獲得 {0}。"
ruRU = "На протяжении нескольких дней колония не спорит с незнакомцем. Она просто доказывает свою ценность. Ни один бобер не остаётся без внимания. Ни один страх не вызывает паники. Ни одна усталая лапа не считается бременем. Незнакомец наблюдает с края света Костра, молчаливый и неуверенный. Затем, однажды вечером, он делает шаг ближе. Не под полом. Не за пределами света. Внутри круга. Колония освобождает место. Только тогда незнакомец указывает обратно на сломанный пол для хранения. Под одной из ослабленных досок, скрытой от паники и преследования, он открывает небольшой тайник с salvaged материалами, которые он принёс из неудавшегося поселения и никогда не смел показывать. Хвост, который стучал трижды, больше не является легендой. Это история приветствия. [[C]][[+]]Новый бобер присоединяется к колонии. [[C]][[+]]Получите {2}. [[C]][[+]]Все бобры получают {0} за [[время:{1}д]]"
jaJP = "数日間、コロニーは見知らぬ者と争わない。  \nただ自らを証明する。  \n無視されるビーバーはいない。恐れにパニックで応えることはない。疲れた足は負担とは見なされない。  \n見知らぬ者はキャンプファイヤーの光の端から静かに不安な様子で見守る。  \nそして、ある晩、彼らは近づく。床の下でもなく、輝きの向こうでもない。円の中に。コロニーはスペースを作る。  \nその時、見知らぬ者は壊れた物置の床を指し示す。緩んだ板の下、パニックや追跡から隠されて、彼らは失敗した集落から運んできた小さな救出資材の宝庫を明らかにする。  \n「三度ノックされた尻尾」はもはや幽霊物語ではない。それは歓迎の物語である。  \n[[C]][[+]]新しいビーバーがコロニーに加わる。  \n[[C]][[+]]{2}を得る。  \n[[C]][[+]]すべてのビーバーは[[time:{1}d]]の間に{0}を得る。"
frFR = "Pendant des jours, la colonie ne se dispute pas avec l'étranger.  \nElle démontre simplement sa valeur.  \nAucun castor n'est ignoré. Aucune peur n'est accueillie par la panique. Aucune patte fatiguée n'est traitée comme un fardeau.  \nL'étranger observe depuis le bord de la lumière du Campfire, silencieux et incertain.  \nPuis, un soir, il s'approche. Ni sous le sol. Ni au-delà de l'éclat. À l'intérieur du cercle. La colonie fait de la place.  \nCe n'est qu'alors que l'étranger pointe de nouveau vers le sol de stockage brisé. Sous une planche lâche, cachée de la panique et de la poursuite, il révèle un petit trésor de matériaux récupérés qu'il avait transportés de la colonie échouée et n'avait jamais osé montrer.  \nLa Queue Qui Frappe Trois Fois n'est plus une histoire de fantôme. C'est une histoire de bienvenue.  \n[[C]][[+]]Un nouveau castor rejoint la colonie.  \n[[C]][[+]]Gagnez {2}.  \n[[C]][[+]]Tous les castors gagnent {0} pendant [[temps:{1}d]]"
deDE = "Tagelang argumentiert die Kolonie nicht mit dem Fremden. Sie beweist sich einfach selbst. Kein Biber wird ignoriert. Keine Angst wird mit Panik beantwortet. Keine müde Pfote wird als Last behandelt. Der Fremde beobachtet vom Rand des Lichtscheins des Lagerfeuers, still und unsicher. Dann, eines Abends, tritt er näher. Nicht unter dem Boden. Nicht jenseits des Scheins. Innerhalb des Kreises macht die Kolonie Platz. Erst dann zeigt der Fremde auf den kaputten Lagerboden zurück. Unter einem losen Brett, versteckt vor Panik und Verfolgung, enthüllt er eine kleine Sammlung geretteter Materialien, die er aus der gescheiterten Siedlung mitgebracht und nie gewagt hat zu zeigen. Der Schwanz, der dreimal klopfte, ist keine Geistergeschichte mehr. Es ist eine Willkommengeschichte. [[C]][[+]]Ein neuer Biber schließt sich der Kolonie an. [[C]][[+]]Erhalte {2}. [[C]][[+]]Alle Biber erhalten {0} für [[zeit:{1}d]]"
plPL = "Przez dni kolonia nie kłóci się z nieznajomym. Po prostu udowadnia swoją wartość. Żaden bóbr nie jest ignorowany. Żaden strach nie jest traktowany panicznie. Żadna zmęczona łapa nie jest uznawana za ciężar. Nieznajomy obserwuje z krawędzi światła Ogniska, milczący i niepewny. Potem, pewnego wieczoru, zbliżają się. Nie pod podłogą. Nie poza blaskiem. Wewnątrz kręgu. Kolonia robi miejsce. Dopiero wtedy nieznajomy wskazuje z powrotem w stronę zepsutej podłogi magazynu. Pod luźną deską, ukryty przed paniką i pościgiem, odkrywają mały zbiór ocalonych materiałów, które przynieśli z nieudanego osiedla i nigdy nie odważyli się pokazać. Ogon, który trzy razy zapukał, nie jest już historią o duchach. To opowieść o powitaniu. [[C]][[+]]Nowy bóbr dołącza do kolonii. [[C]][[+]]Zyskaj {2}. [[C]][[+]]Wszystkie bobry zyskują {0} przez [[czas:{1}d]]"
ptBR = "Por dias, a colônia não discute com o estranho.  \nEla simplesmente se prova.  \nNenhum castor é ignorado. Nenhum medo é respondido com pânico. Nenhuma pata cansada é tratada como um fardo.  \nO estranho observa da borda da luz da fogueira, silencioso e incerto.  \nEntão, uma noite, eles se aproximam. Não debaixo do chão. Não além do brilho. Dentro do círculo. A colônia faz espaço.  \nSó então o estranho aponta de volta para o chão do armazenamento quebrado. Debaixo de uma tábua solta, escondido do pânico e da perseguição, eles revelam um pequeno tesouro de materiais recuperados que carregaram do assentamento falido e nunca se atreveram a mostrar.  \nA Cauda Que Bateu Três Vezes não é mais uma história de fantasmas. É uma história de boas-vindas.  \n[[C]][[+]]Um novo castor se junta à colônia.  \n[[C]][[+]]Ganha {2}.  \n[[C]][[+]]Todos os castores ganham {0} por [[tempo:{1}d]]"
koKR = "식민지는 며칠 동안 이방인과 논쟁하지 않는다.  \n그저 스스로를 증명할 뿐이다.  \n어떤 비버도 무시당하지 않는다. 어떤 두려움도 공포로 대답하지 않는다. 피곤한 발은 짐으로 여겨지지 않는다.  \n이방인은 캠프파이어 빛의 가장자리에 서서, 조용하고 불확실하게 지켜본다.  \n그러던 어느 저녁, 그들이 조금 가까이 다가온다. 바닥 아래가 아닌, 빛 너머도 아닌, 원 안으로 들어온다. 식민지는 자리를 마련한다.  \n그때 이방인은 부서진 저장소 바닥을 가리킨다. 느슨한 보드 아래, 공포와 추격에서 숨겨진 채, 그들은 실패한 정착지에서 가져온 소중한 자재의 작은 보물이 있음을 드러낸다.  \n세 번 노크한 꼬리는 더 이상 유령 이야기가 아니다. 그것은 환영의 이야기다.  \n[[C]][[+]]새로운 비버가 식민지에 합류한다.  \n[[C]][[+]]{2}를 얻는다.  \n[[C]][[+]]모든 비버가 [[시간:{1}일]] 동안 {0}을 얻는다."
csCZ = "Po dny se kolonie nehádá s cizincem. \nJednoduše se prokazuje. \nŽádný bobr není přehlížen. Žádný strach není odpovědí na paniku. Žádná unavená tlapa není považována za zátěž. \nCizinec sleduje z okraje světla ohniště, tichý a nejistý. \nPak, jednoho večera, se přiblíží. Ne pod podlahu. Ne za září. Uvnitř kruhu. Kolonie udělá místo. \nTeprve poté cizinec ukáže zpět směrem k rozbitému skladovému dnu. Pod volnou deskou, skrytou daleko od paniky a pronásledování, odhalí malou zásobu zachráněných materiálů, které nesli z neúspěšného osídlení a nikdy se nebáli ukázat. \nOcas, který zaklepal třikrát, už není příběhem o duchovi. Je to příběh o přijetí. \n[[C]][[+]]Nový bobr se přidává k kolonii. \n[[C]][[+]]Získejte {2}. \n[[C]][[+]]Všichni bobři získávají {0} za [[čas:{1}d]]"
viVN = "Trong nhiều ngày, thuộc địa không tranh cãi với kẻ lạ.\nNó chỉ đơn giản chứng minh bản thân.\nKhông con beaver nào bị bỏ qua. Không nỗi sợ nào được đáp lại bằng sự hoảng loạn. Không bàn chân mệt mỏi nào được coi là gánh nặng.\nKẻ lạ quan sát từ rìa ánh sáng của Campfire, im lặng và không chắc chắn.\nRồi, một buổi tối, họ tiến lại gần hơn. Không dưới sàn. Không vượt ra ngoài ánh sáng. Ở bên trong vòng tròn. Thuộc địa nhường chỗ.\nChỉ khi đó, kẻ lạ chỉ lại về phía sàn kho chứa bị hỏng. Dưới một tấm ván lỏng, được giấu kín khỏi sự hoảng loạn và truy đuổi, họ tiết lộ một kho vật liệu được salvaged nhỏ mà họ đã mang từ khu định cư thất bại và chưa bao giờ dám cho thấy.\nCái Đuôi Đã Gõ Ba Lần không còn là một câu chuyện ma. Nó là một câu chuyện chào đón.\n[[C]][[+]]Một con beaver mới gia nhập thuộc địa.\n[[C]][[+]]Có {2}.\n[[C]][[+]]Tất cả các con beaver nhận {0} cho [[time:{1}d]]"
trTR = "Koloni günlerdir yabancı ile tartışmıyor. Sadece kendini kanıtlıyor. Hiçbir kunduz yok sayılmıyor. Hiçbir korku panikle yanıtlanmıyor. Hiçbir yorgun pati bir yük olarak değerlendirilmiyor. Yabancı, Kamp Ateşi ışığının kenarından sessiz ve belirsiz bir şekilde izliyor. Sonra, bir akşam, daha yakınlaşıyorlar. Zemin altında değil. Parıltının ötesinde değil. Dairenin içinde. Koloni yer açıyor. Ancak o zaman yabancı, kırık depolama zeminine geri işaret ediyor. Gevşek bir tahtanın altında, panikten ve kovalamacadan gizlenmiş, başarısız yerleşimden taşıdıkları ve asla göstermeye cesaret edemedikleri kurtarılmış malzemelerden oluşan küçük bir hazineyi ortaya çıkarıyor. Üç kere vuran Kuyruk artık bir hayalet hikayesi değil. Bu bir hoş geldin hikayesi. [[C]][[+]]Yeni bir kunduz koloniye katılıyor. [[C]][[+]]{2} kazanıldı. [[C]][[+]]Tüm kunduzlar [[time:{1}d]] için {0} kazanıyor."

