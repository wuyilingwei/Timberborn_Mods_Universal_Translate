["LV.BCEv.CampfireMystery2.Content"]
raw = "{0}\nThe next night, the Campfire is lit again.\nNo one pretends this is only for stories anymore.\nThe beavers sit closer together than usual. Some watch the trees. Some watch the storage piles. One watches the other watchers and calls it strategy.\nThen the knocking comes again.\n[[C]]<YellowHighlight><i>Knock. Knock. Knock.</i></YellowHighlight>\nThis time, the colony is ready enough to be afraid properly.\n{1}\nA few beavers argue that it is a warning. Others think it is a trail. The Inventor says it is definitely evidence, though evidence of what remains inconveniently unclear.\nThe colony now knows one thing for certain:\n<b>The spiral is not random.</b>\n{2}\nTonight, the beavers must decide how closely they are willing to follow it."
status = "normal"
enUS = "{0}\nThe next night, the Campfire is lit again.\nNo one pretends this is only for stories anymore.\nThe beavers sit closer together than usual. Some watch the trees. Some watch the storage piles. One watches the other watchers and calls it strategy.\nThen the knocking comes again.\n[[C]]<YellowHighlight><i>Knock. Knock. Knock.</i></YellowHighlight>\nThis time, the colony is ready enough to be afraid properly.\n{1}\nA few beavers argue that it is a warning. Others think it is a trail. The Inventor says it is definitely evidence, though evidence of what remains inconveniently unclear.\nThe colony now knows one thing for certain:\n<b>The spiral is not random.</b>\n{2}\nTonight, the beavers must decide how closely they are willing to follow it."
zhCN = "{0}\n第二天晚上，营火再次点燃。\n没有人再假装这只是故事了。\n比以往更加紧凑的海狸们坐在一起。有的观察着树木。有人在看储存堆。有一个则在观察其他观察者，并称之为战略。\n然后敲击声再次响起。\n[[C]]<YellowHighlight><i>砰。砰。砰。</i></YellowHighlight>\n这一次，殖民地足够准备好以正确的方式感到害怕。\n{1}\n一些海狸争论这是一个警告。其他人认为这是一条小路。发明家说这绝对是证据，尽管证据是什么仍然不清楚。\n现在殖民地确定了一个事情：\n<b>螺旋不是随机的。</b>\n{2}\n今晚，海狸们必须决定他们愿意多紧密地跟随它。"
zhTW = "{0}  \n第二晚，營火再次點燃。  \n沒有人再假裝這只是為了講故事。  \n海狸們坐得比平時更近。有些在觀察樹木，有些在看儲存堆。有一隻在注視其他觀察者，並稱之為策略。  \n然後敲擊聲再次響起。  \n[[C]]<YellowHighlight><i>敲。敲。敲。</i></YellowHighlight>  \n這次，聚落已經準備好足夠的恐懼。  \n{1}  \n幾隻海狸爭論這是警告，另一些認為這是一條小徑。發明家則表示這肯定是證據，但證據的內容仍然不方便明確。  \n聚落現在確信一件事情：  \n<b>螺旋不是隨機的。</b>  \n{2}  \n今晚，海狸們必須決定他們願意多麼密切地追隨它。"
ruRU = "{0}\nНа следующую ночь костер снова разожжен.\nНикто больше не притворяется, что это только для историй.\nБобры сидят ближе друг к другу, чем обычно. Некоторые смотрят на деревья. Некоторые наблюдают за запасами. Один следит за другими наблюдателями и называет это стратегией.\nЗатем снова раздается стук.\n[[C]]<YellowHighlight><i>Стук. Стук. Стук.</i></YellowHighlight>\nНа этот раз колония готова достаточно, чтобы испугаться по-настоящему.\n{1}\nНекоторые бобры спорят, что это предупреждение. Другие думают, что это след. Изобретатель утверждает, что это определенно доказательство, хотя доказательство чего остается неудобно неясным.\nТеперь колония знает одно наверняка:\n<b>Спираль не случайна.</b>\n{2}\nСегодня ночью бобры должны решить, насколько близко они готовы следовать за ней."
jaJP = "{0}\n次の夜、キャンプファイアが再び点火される。\n誰もこれが物語のためだけだとは pretend しない。\nビーバーたちはいつもよりも近くに座っている。木々を見守る者もいれば、貯蔵の山を見守る者もいる。ある者は他の監視者を見守り、それを戦略だと呼ぶ。\nそして、再びノッキングがやってくる。\n[[C]]<YellowHighlight><i>ノック。ノック。ノック。</i></YellowHighlight>\n今回は、コロニーは適切に恐れる準備ができている。\n{1}\n数匹のビーバーは、それが警告だと主張する。別の者は、それが道の跡だと考える。発明家は、それは確かに証拠だと言うが、何の証拠であるかは不便なほど不明のままだ。\nコロニーは今、一つのことを確実に知っている：\n<b>螺旋は無作為ではない。</b>\n{2}\n今夜、ビーバーたちはそれにどれだけ従う意志があるのかを決めなければならない。"
frFR = "{0}\nLa nuit suivante, le feu de camp s'allume à nouveau.\nPersonne ne prétend que c'est seulement pour raconter des histoires.\nLes castors s'assurent d'être plus rapprochés que d'habitude. Certains regardent les arbres. D'autres surveillent les tas de stockage. L'un regarde les autres observateurs et appelle cela une stratégie.\nPuis, le bruit de coups se fait entendre à nouveau.\n[[C]]<YellowHighlight><i>Knock. Knock. Knock.</i></YellowHighlight>\nCette fois, la colonie est suffisamment prête pour avoir peur pour de bon.\n{1}\nQuelques castors soutiennent qu'il s'agit d'un avertissement. D'autres pensent que c'est un chemin. L'Inventeur dit que c'est définitivement une preuve, bien que la preuve de quoi reste inconvenientément floue.\nLa colonie sait maintenant une chose avec certitude :\n<b>La spirale n'est pas aléatoire.</b>\n{2}\nCe soir, les castors doivent décider à quel point ils sont prêts à la suivre."
deDE = "{0}\nIn der nächsten Nacht wird das Lagerfeuer wieder angezündet.\nNiemand tut mehr so, als wäre das nur für Geschichten.\nDie Biber sitzen enger zusammen als gewöhnlich. Einige beobachten die Bäume. Andere beobachten die Lagerstätten. Einer beobachtet die anderen Wachsamen und nennt es Strategie.\nDann kommt das Klopfen wieder.\n[[C]]<YellowHighlight><i>Klopf. Klopf. Klopf.</i></YellowHighlight>\nDiesmal ist die Kolonie bereit genug, um richtig Angst zu haben.\n{1}\nEinige Biber argumentieren, dass es eine Warnung ist. Andere denken, es ist eine Spur. Der Erfinder sagt, es sei auf jeden Fall ein Beweis, doch Beweis wofür bleibt unpraktisch unklar.\nDie Kolonie weiß jetzt eines mit Sicherheit:\n<b>Die Spirale ist nicht zufällig.</b>\n{2}\nHeute Nacht müssen die Biber entscheiden, wie genau sie ihr folgen wollen."
plPL = "{0}\nNastępnej nocy ognisko znów płonie.\nNikt już nie udaje, że to tylko dla opowieści.\nBobry siedzą bliżej siebie niż zwykle. Niektóre obserwują drzewa. Niektóre obserwują składy. Jedna obserwuje pozostałych obserwatorów i nazywa to strategią.\nWtedy znów słychać pukanie.\n[[C]]<YellowHighlight><i>Puk. Puk. Puk.</i></YellowHighlight>\nTym razem kolonia jest wystarczająco gotowa, żeby się porządnie bać.\n{1}\nKilka bobrów twierdzi, że to ostrzeżenie. Inne myślą, że to ślad. Wynalazca mówi, że to zdecydowanie dowód, chociaż dowód na co pozostaje niewygodnie niejasny.\nKolonia wie teraz na pewno jedną rzecz:\n<b>Spirala nie jest przypadkowa.</b>\n{2}\nDziś wieczorem bobry muszą zdecydować, jak blisko są gotowe jej towarzyszyć."
ptBR = "{0}\nNa noite seguinte, a fogueira é acesa novamente.\nNinguém finge que isso é apenas para contar histórias.\nAs castores se sentam mais perto uns dos outros do que o normal. Alguns observam as árvores. Outros observam os pilhadores de armazenamento. Um observa os outros observadores e chama isso de estratégia.\nEntão, a batida vem novamente.\n[[C]]<YellowHighlight><i>Knock. Knock. Knock.</i></YellowHighlight>\nDesta vez, a colônia está suficientemente pronta para ter medo de verdade.\n{1}\nAlguns castores argumentam que é um aviso. Outros acham que é uma trilha. O Inventor diz que é definitivamente uma evidência, embora a evidência do que continua inconvenientemente pouco clara.\nA colônia agora sabe uma coisa com certeza:\n<b>A espiral não é aleatória.</b>\n{2}\nEsta noite, os castores devem decidir quão de perto estão dispostos a segui-la."
koKR = "{0}\n다음 밤, 캠프파이어가 다시 밝혀진다.\n이제 아무도 이게 단순한 이야기를 위한 것이라고 가장하지 않는다.\n비버들은 평소보다 더 가까이 앉아 있다. 어떤 비버는 나무를 지켜보고, 어떤 비버는 저장 더미를 지켜본다. 한 마리는 다른 비버들을 지켜보며 전략이라고 부른다.\n그러자 다시 두드리는 소리가 들린다.\n[[C]]<YellowHighlight><i>두드려라. 두드려라. 두드려라.</i></YellowHighlight>\n이번에는 식민지가 제대로 두려워할 준비가 되어 있다.\n{1}\n몇몇 비버는 그것이 경고라고 주장하고, 다른 이들은 그것이 흔적이라고 생각한다. 발명가는 그것이 분명히 증거라고 말하지만, 무엇의 증거인지는 애매하기만 하다.\n식민지는 이제 한 가지를 확실히 안다:\n<b>나선은 우연이 아니다.</b>\n{2}\n오늘밤, 비버들은 그것을 얼마나 가깝게 따를 것인지 결정해야 한다."
csCZ = "{0}\nDalší noc je oheň opět rozdělaný.\nNikdo si už nepředstavuje, že to slouží jen k vyprávění příběhů.\nBobři sedí blíž k sobě než obvykle. Někteří sledují stromy. Někteří sledují zásobní haldy. Jeden sleduje ostatní pozorovatele a nazývá to strategií.\nPak se opět ozve klepání.\n[[C]]<YellowHighlight><i>Klep. Klep. Klep.</i></YellowHighlight>\nTentokrát je kolonie dost připravená, aby se pořádně bála.\n{1}\nNěkolik bobrů tvrdí, že je to varování. Jiní si myslí, že je to stopa. Vynálezce říká, že to je rozhodně důkaz, i když důkaz čeho zůstává nepříjemně nejasný.\nKolie nyní ví jednu věc s jistotou:\n<b>Špirála není náhodná.</b>\n{2}\nDnes večer se bobři musí rozhodnout, jak blízko k ní jsou ochotni se přiblížit."
viVN = "{0}\nĐêm tiếp theo, ngọn lửa trại lại được thắp sáng.\nKhông ai giả vờ rằng đây chỉ là chuyện kể nữa.\nNhững con hải ly ngồi gần nhau hơn bình thường. Một số nhìn về phía cây cối. Một số nhìn về phía đống chứa. Một con quan sát những con khác và gọi đó là chiến lược.\nRồi tiếng gõ lại đến.\n[[C]]<YellowHighlight><i>Gõ. Gõ. Gõ.</i></YellowHighlight>\nLần này, thuộc địa đã sẵn sàng để sợ hãi đúng cách.\n{1}\nMột vài con hải ly tranh cãi rằng đây là một cảnh báo. Những con khác thì nghĩ đây là một dấu vết. Nhà phát minh nói đây chắc chắn là bằng chứng, mặc dù bằng chứng về điều gì vẫn khó chịu không rõ ràng.\nThuộc địa bây giờ biết một điều chắc chắn:\n<b>Vòng xoắn không ngẫu nhiên.</b>\n{2}\nTối nay, những con hải ly phải quyết định xem chúng sẵn sàng theo dõi nó chặt chẽ bao nhiêu."
trTR = "{0}\nSonraki gece, kamp ateşi tekrar yakılıyor.\nArtık kimse bunun sadece hikayeler için olduğunu ileri sürmüyor.\nKunduzlar, alışılmadık şekilde daha yakın oturuyor. Bazıları ağaçlara bakıyor. Bazıları depolara bakıyor. Bir tanesi diğer izleyicilere bakıyor ve buna strateji diyor.\nSonra tıklama tekrar geliyor.\n[[C]]<YellowHighlight><i>Tık. Tık. Tık.</i></YellowHighlight>\nBu sefer, koloninin yeterince korkmaya hazır olduğu.\n{1}\nBirkaç kunduz bunun bir uyarı olduğunu tartışıyor. Diğerleri bunun bir iz olduğunu düşünüyor. Mucit kesinlikle bunun bir kanıt olduğunu söylüyor, ama neyin kanıtı olduğu hala belirsiz.\nKoloni artık bir şeyi kesin olarak biliyor:\n<b>Spiral rastgele değil.</b>\n{2}\nBu gece, kunduzlar bunu ne kadar dikkatle takip etmeye istekli olduklarına karar vermek zorunda."

["LV.BCEv.CampfireMystery2.Content.Ch1C1"]
raw = "After the fire was fed, the first night ended with one strange lesson: whatever made the sound avoided the light.\nSo tonight, the logs are stacked higher. The flames rise brighter. The colony waits inside a wider circle of warmth, hoping courage can be built from wood."
status = "normal"
enUS = "After the fire was fed, the first night ended with one strange lesson: whatever made the sound avoided the light.  \nSo tonight, the logs are stacked higher. The flames rise brighter. The colony waits inside a wider circle of warmth, hoping courage can be built from wood."
zhCN = "在火焰被喂养后，第一个夜晚结束于一个奇怪的教训：无论是什么发出声音的东西都避免接触光亮。因此今晚，原木堆得更高。火焰更加闪亮。殖民地在更宽的温暖圈内等待，希望勇气能从木头中建立起来。"
zhTW = "在火焰被餵養後，第一個夜晚以一個奇怪的教訓結束：無論是什麼發出聲音的東西都避開了光明。  \n所以今晚，原木堆得更高，火焰燃燒得更亮。殖民地在更寬的溫暖圈圌中等待，希望勇氣能從木頭中建立起來。"
ruRU = "После того как костер разгорелся, первая ночь закончилась одной странной уроком: тот, кто издавал звук, избегал света. Так что сегодня вечером бревна сложены выше. Пламя горит ярче. Колония ждет внутри более широкого круга тепла, надеясь, что смелость можно построить из дерева."
jaJP = "火が燃料を得た後、最初の夜は奇妙な教訓で終わった：その音を立てたものは光を避けた。  \n今夜は、丸太がより高く積まれている。炎はより明るく燃え上がる。コロニーは、木から勇気を築けることを願いながら、より広い温もりの輪の中で待機している。"
frFR = "Après que le feu a été nourri, la première nuit s'est achevée avec une leçon étrange : quoi que cela ait été qui a fait le bruit, cela évitait la lumière.  \nAlors ce soir, les bûches sont empilées plus haut. Les flammes s'élèvent plus brillamment. La colonie attend à l'intérieur d'un cercle de chaleur plus large, espérant que le courage puisse être construit à partir du bois."
deDE = "Nachdem das Feuer gefüttert wurde, endete die erste Nacht mit einer seltsamen Lektion: Was auch immer das Geräusch gemacht hat, mied das Licht. \nAlso sind die Baumstämme heute Nacht höher gestapelt. Die Flammen lodern heller. Die Kolonie wartet in einem breiteren Kreis der Wärme und hofft, dass Mut aus Holz geschmiedet werden kann."
plPL = "Po nakarmieniu ognia, pierwsza noc zakończyła się dziwną lekcją: cokolwiek wydawało dźwięk, unikało światła.  \nDlatego dzisiaj wieczorem, kłody są ułożone wyżej. Płomienie są jaśniejsze. Kolonia czeka wewnątrz szerszego kręgu ciepła, mając nadzieję, że odwaga może być zbudowana z drewna."
ptBR = "Depois que o fogo foi alimentado, a primeira noite terminou com uma estranha lição: o que quer que tivesse feito o som evitava a luz.  \nEntão, esta noite, as toras estão empilhadas mais altas. As chamas queimam mais intensas. A colônia espera dentro de um círculo mais amplo de calor, na esperança de que a coragem possa ser construída com madeira."
koKR = "불이 타오른 후, 첫 번째 밤은 한 가지 이상한 교훈으로 끝났다: 소리를 내던 것은 빛을 피했다.  \n그래서 오늘 밤, 통나무는 더 높이 쌓였다. 불꽃은 더 밝게 타오른다. 식민지는 더 넓은 따뜻한 원 안에서 대기하며, 용기가 나무에서 세워지길 바란다."
csCZ = "Po přikládání do ohně skončila první noc jednou podivnou lekcí: cokoliv, co vydávalo zvuk, se vyhýbalo světlu. \nTakže dnes v noci jsou klády naskládány výše. Plameny jasněji září. Kolonie čeká uvnitř širšího kruhu tepla, doufajíc, že odvaha může být vybudována ze dřeva."
viVN = "Sau khi lửa được cho ăn, đêm đầu tiên kết thúc với một bài học kỳ lạ: bất kỳ điều gì phát ra âm thanh đều tránh ánh sáng.\nVậy nên tối nay, những khúc gỗ được xếp chồng cao hơn. Ngọn lửa rực rỡ hơn. Đàn koloni chờ đợi bên trong một vòng tròn ấm áp rộng lớn hơn, hy vọng sự can đảm có thể được xây dựng từ gỗ."
trTR = "Ateş beslendikten sonra, ilk gece tuhaf bir dersle sona erdi: sesi çıkaran ne varsa ışıktan kaçıyordu.  \nBu yüzden bu gece, kütükler daha yüksek istifleniyor. Alevler daha parlak yükseliyor. Koloni, cesaretin odunlardan inşa edilebileceğini umarak daha geniş bir sıcaklık dairesinin içinde bekliyor."

["LV.BCEv.CampfireMystery2.Content.Ch1C2"]
raw = "After the berries vanished, the first night ended with one strange lesson: whatever waited in the dark was hungry.\nSo tonight, the returned bowl sits near the Campfire where everyone can see it. No one agrees whether it is proof of mercy, manners, or a very selective appetite."
status = "normal"
enUS = "After the berries vanished, the first night ended with one strange lesson: whatever waited in the dark was hungry. So tonight, the returned bowl sits near the Campfire where everyone can see it. No one agrees whether it is proof of mercy, manners, or a very selective appetite."
zhCN = "“浆果消失后，第一夜以一个奇怪的教训结束：隐藏在黑暗中的东西是饥饿的。  \n今晚，回来的碗静静地放在篝火旁，所有人都能看到。没有人同意这是否是慈悲、礼仪，还是一种非常挑剔的胃口的证明。”"
zhTW = "在莓果消失之後，第一個夜晚以一個奇怪的教訓結束：無論在黑暗中等待的是什麼，它都是渴望的。因此今晚，回來的碗擺放在每個人都能看到的營火旁。沒有人同意這是仁慈、禮貌還是非常挑剔的胃口的證明。"
ruRU = "После того, как ягоды исчезли, первая ночь закончилась одним странным уроком: что бы ни ждало в темноте, оно было голодно. Поэтому сегодня вечером вернувшаяся чаша стоит у Костра, чтобы все могли ее видеть. Никто не соглашается с тем, является ли это доказательством милосердия, манер или очень избирательного аппетита."
jaJP = "「ベリーが消えた後、最初の夜は奇妙な教訓で終わった：暗闇で待っているものは空腹だった。  \nだから今夜、戻ってきたボウルはみんなが見えるキャンプファイヤーの近くに置かれている。それが慈悲の証なのか、マナーなのか、非常に選り好みされた食欲なのか、誰も意見が一致しない。」"
frFR = "Après la disparition des baies, la première nuit s'est terminée par une étrange leçon : ce qui attendait dans l'obscurité avait faim. \nAlors ce soir, le bol revenu est placé près du Campfire où tout le monde peut le voir. Personne ne s'accorde à dire s'il s'agit d'une preuve de miséricorde, de bonnes manières ou d'un appétit très sélectif."
deDE = "Nachdem die Beeren verschwunden waren, endete die erste Nacht mit einer seltsamen Lektion: Was auch immer in der Dunkelheit lauerte, hatte Hunger. \nAlso sitzt die zurückgebrachte Schüssel heute Abend in der Nähe des Lagerfeuers, wo jeder sie sehen kann. Niemand ist sich einig, ob das ein Beweis für Gnade, Manieren oder einen sehr selektiven Appetit ist."
plPL = "Po zniknięciu jagód, pierwsza noc zakończyła się jedną dziwną lekcją: cokolwiek czaiło się w ciemności, było głodne. \nDlatego dzisiaj wieczorem, wrócona miska stoi przy Ognisku, gdzie wszyscy mogą ją zobaczyć. Nikt nie zgadza się, czy to dowód na miłosierdzie, dobre maniery, czy bardzo wybredny apetyt."
ptBR = "Depois que as frutas desapareceram, a primeira noite terminou com uma estranha lição: o que quer que estivesse na escuridão estava com fome.  \nEntão, esta noite, a tigela retornada fica perto da fogueira, onde todos podem vê-la. Ninguém concorda se isso é prova de misericórdia, educação ou um apetite muito seletivo."
koKR = "베리가 사라진 후, 첫 번째 밤은 하나의 이상한 교훈으로 끝났다: 어둠 속에서 기다리고 있는 것은 배고프다.  \n그래서 오늘 밤, 돌아온 그릇은 모든 사람이 볼 수 있는 캠프파이어 옆에 놓여 있다. 그것이 자비, 예의, 또는 매우 선별적인 식욕의 증거인지에 대해 아무도 동의하지 않는다."
csCZ = "Poté, co bobule zmizely, skončila první noc s jednou podivnou lekcí: cokoliv, co čekalo ve tmě, mělo hlad. \nTakže dnes v noci se vrácená mísa nachází blízko ohniště, kde si ji každý může všimnout. Nikdo se neshodne, zda je to důkaz milosrdenství, dobrých mravů, nebo velmi selektivního apetitu."
viVN = "Sau khi những quả mọng biến mất, đêm đầu tiên kết thúc với một bài học kỳ lạ: bất cứ điều gì đang chờ trong bóng tối đều đói khát.\nVì vậy, đêm nay, cái bát đã trở lại đặt gần Lửa trại nơi mọi người có thể nhìn thấy nó. Không ai đồng ý liệu đó có phải là bằng chứng của lòng nhân từ, phép lịch sự hay một khẩu vị rất chọn lọc."
trTR = "Böğürtlenler kaybolduktan sonra, ilk gece tuhaf bir dersle sona erdi: karanlıkta bekleyen neyse açtı. \nBu yüzden bu gece, geri dönen çömlek, herkesin görebileceği şekilde Kamp Ateşi'nin yanında duruyor. Bunun merhamet, görgü veya çok seçici bir iştah kanıtı olup olmadığı konusunda kimse aynı fikirde değil."

["LV.BCEv.CampfireMystery2.Content.Ch1C3"]
raw = "After the Inventor's device caught the hollow echo, the first night ended with one strange lesson: the sound may not have come from the trees at all.\nSo tonight, the device sits beside the Campfire like an honored guest, though several beavers privately note that it still looks like a cup tied to a mistake."
status = "normal"
enUS = "After the Inventor's device caught the hollow echo, the first night ended with one strange lesson: the sound may not have come from the trees at all. So tonight, the device sits beside the Campfire like an honored guest, though several beavers privately note that it still looks like a cup tied to a mistake."
zhCN = "在发明家的装置捕捉到空心的回声后，第一夜以一个奇怪的教训结束：声音可能根本不是来自树木。\n所以今晚，装置像个受尊敬的客人一样坐在营火旁，尽管几只海狸私下里指出，它仍然看起来像一个绑着错误的杯子。"
zhTW = "在發明家的裝置捕捉到空洞的回聲後，第一個夜晚以一個奇怪的教訓結束：這聲音可能根本不是來自樹木。所以今夜，這個裝置像尊貴的客人一樣坐在營火旁，儘管幾隻海狸私下指出，它仍然看起來像是一個綁著錯誤的杯子。"
ruRU = "После того как устройство Изобретателя поймало пустой эхо, первая ночь закончилась странным уроком: звук, возможно, вовсе не исходил от деревьев. \nПоэтому сегодня ночью устройство сидит рядом с Костром, как почетный гость, хотя несколько бобров в private отмечают, что оно все еще выглядит как чашка, привязанная к ошибке."
jaJP = "発明家の装置が空洞のエコーを捉えた後、最初の夜は奇妙な教訓で終わった：その音は木々から来たのではないかもしれない。  \n今晩、その装置はキャンプファイヤーのそばに名誉ある客のように置かれているが、数匹のビーバーは内心で、それがまだ失敗に結び付けられたカップのように見えることを指摘している。"
frFR = "Après que le dispositif de l'Inventeur a capté l'écho creux, la première nuit s'est terminée par une étrange leçon : le son ne venait peut-être pas des arbres du tout. Donc ce soir, le dispositif est assis à côté du feu de camp comme un invité d'honneur, bien que plusieurs castors notent en privé qu'il a toujours l'air d'une tasse liée à une erreur."
deDE = "„Nachdem das Gerät des Erfinders das hohle Echo eingefangen hatte, endete die erste Nacht mit einer seltsamen Lektion: Der Klang könnte überhaupt nicht von den Bäumen stammen. \nSo sitzt das Gerät heute Nacht neben dem Lagerfeuer wie ein ehrwürdiger Gast, obwohl mehrere Biber privat anmerken, dass es immer noch wie eine Tasse aussieht, die an einem Fehler hängt.“"
plPL = "Po tym, jak urządzenie Wynalazcy uchwyciło pusty dźwięk, pierwsza noc zakończyła się dziwną lekcją: dźwięk być może w ogóle nie pochodził z drzew. \nDlatego dzisiaj wieczorem urządzenie stoi obok Ogniska jak zaszczycony gość, chociaż kilku bobrów prywatnie zauważa, że nadal wygląda jak kubek związany z pomyłką."
ptBR = "Depois que o dispositivo do Inventor capturou o eco oco, a primeira noite terminou com uma estranha lição: o som pode não ter vindo das árvores de jeito nenhum. Então, esta noite, o dispositivo está ao lado da Fogueira como um convidado honrado, embora vários castores observem em particular que ainda parece um copo amarrado a um erro."
koKR = "발명가의 장치가 빈 메아리를 포착한 후 첫 번째 밤은 하나의 이상한 교훈으로 끝났다: 그 소리는 아예 나무들에서 비롯된 것이 아닐 수도 있다. 그래서 오늘 밤, 그 장치는 캠프파이어 옆에 마치 존경받는 손님처럼 자리잡고 있지만, 몇몇 비버들은 사적으로 여전히 실수에 묶인 컵처럼 보인다고 언급한다."
csCZ = "Po tom, co zařízení Vynálezce zachytilo prázdný ozvěnu, první noc skončila jednou podivnou lekcí: zvuk možná vůbec nepocházel ze stromů.\nTakže dnes večer zařízení sedí vedle Ohniště jako vážený host, ačkoli několik bobrů si soukromě poznamenává, že stále vypadá jako hrníček přivázaný k chybě."
viVN = "Sau khi thiết bị của Nhà phát minh bắt được âm thanh trống rỗng, đêm đầu tiên kết thúc với một bài học kỳ lạ: âm thanh có thể không đến từ cây cối chút nào.  \nVì vậy, tối nay, thiết bị ngồi bên cạnh Ngọn lửa cắm trại như một vị khách được tôn vinh, mặc dù một số con nhím riêng tư lưu ý rằng nó vẫn trông như một cái cốc gắn với một sai lầm."
trTR = "İcatçının cihazı boş yankıyı yakaladıktan sonra, ilk gece garip bir dersle sona erdi: sesin aslında ağaçlardan gelmiş olması pek mümkün değil. Bu yüzden bu gece, cihaz Kamp Ateşi'nin yanında onurlu bir misafir gibi oturuyor, fakat birkaç inek özel olarak bunun hala bir hataya bağlı bir kupa gibi göründüğünü not ediyor."

["LV.BCEv.CampfireMystery2.Content.ClueCh1C1"]
raw = "When the flames rise, the knocking fades. When the fire settles, it returns. Whatever is out there does not flee the Campfire completely, but it keeps to the edge of the glow."
status = "normal"
enUS = "When the flames rise, the knocking fades. When the fire settles, it returns. Whatever is out there does not flee the Campfire completely, but it keeps to the edge of the glow."
zhCN = "“当火焰升起时，敲击声消失。当火焰平息时，它便回来了。无论外面有什么，都是不会完全逃离篝火，但它总是在光亮的边缘徘徊。”"
zhTW = "當火焰上升時，敲擊聲漸漸消退。當火焰平息時，聲音又回來了。無論外面有什麼都不會完全逃離營火，但它始終保持在光亮的邊緣。"
ruRU = "Когда пламя поднимается, стук затихает. Когда огонь улегается, он возвращается. Что бы там ни было, оно не уходит от Костра полностью, но остается на краю света."
jaJP = "炎が高く上がると、ノック音は消え去る。火が落ち着くと、それは戻ってくる。そこにいる何かはキャンプファイヤーから完全には逃げ去らないが、光の縁に留まっている。"
frFR = "Quand les flammes montent, les coups s'estompent. Quand le feu se stabilise, il revient. Quoi que ce soit là-dehors, cela ne fuit pas complètement le Campfire, mais cela reste à la lisière de la lueur."
deDE = "Wenn die Flammen steigen, verstummt das Klopfen. Wenn das Feuer sich beruhigt, kehrt es zurück. Was auch immer da draußen ist, flieht nicht ganz vom Lagerfeuer, sondern hält sich am Rand des Scheins auf."
plPL = "Gdy płomienie rosną, stukanie cichnie. Gdy ogień się uspokaja, wraca. Cokolwiek tam jest, nie ucieka całkowicie od Ogniska, ale trzyma się krawędzi blasku."
ptBR = "Quando as chamas sobem, a batida desaparece. Quando o fogo se acalma, ela retorna. O que quer que esteja lá fora não foge completamente do Fogueira, mas se mantém na borda do brilho."
koKR = "불꽃이 높이 오르면, 두드림이 사라진다. 불이 가라앉으면, 다시 돌아온다. 밖에 있는 어떤 것이 캠프파이어에서 완전히 도망치지는 않지만, 빛의 가장자리를 유지한다."
csCZ = "Když plameny vzrostou, klepání utichne. Když oheň zhasne, vrátí se. Cokoliv je venku, nescapuje s ohněm úplně, ale drží se na okraji záře."
viVN = "Khi ngọn lửa bùng lên, tiếng gõ giảm dần. Khi ngọn lửa yên lại, nó trở về. Bất kể điều gì ở ngoài kia không hoàn toàn rời xa Lửa Trại, nhưng nó giữ mình ở rìa ánh sáng."
trTR = "Alevler yükseldiğinde, vurma sönüyor. Ateş yerleştiğinde, geri dönüyor. Dışarıda olan ne olursa olsun, Kamp Ateşinden tamamen kaçmıyor, ama parıltının kenarında kalıyor."

["LV.BCEv.CampfireMystery2.Content.ClueCh1C2"]
raw = "The bowl is found again before sunrise. It has been pushed a little closer to camp and badly cleaned again. The message is unclear, but the care is not."
status = "normal"
enUS = "The bowl is found again before sunrise. It has been pushed a little closer to camp and badly cleaned again. The message is unclear, but the care is not."
zhCN = "碗在日出前再次被发现。它被推得离营地更近了一些，再次被清理得很糟糕。信息不明确，但用心却显而易见。"
zhTW = "碗在日出前再次被找到。它被推得更靠近營地，並且再次被清理得很不乾淨。訊息不明，但用心卻顯而易見。"
ruRU = "Чаша снова найдена перед восходом солнца. Она была немного поддвинута ближе к лагерю и снова плохо очищена. Сообщение неясное, но забота очевидна."
jaJP = "ボウルは日の出前に再び見つかります。キャンプに少し近づけられ、またひどく掃除されました。メッセージは不明ですが、手入れは明らかです。"
frFR = "Le bol est retrouvé de nouveau avant le lever du soleil. Il a été poussé un peu plus près du camp et mal nettoyé à nouveau. Le message est flou, mais le soin ne l'est pas."
deDE = "Die Schüssel wird wieder vor Sonnenaufgang gefunden. Sie wurde ein kleines Stück näher zum Lager geschoben und erneut schlecht gereinigt. Die Botschaft ist unklar, aber die Sorgfalt nicht."
plPL = "Miseczka znowu została znaleziona przed wschodem słońca. Została przesunięta nieco bliżej obozu i znów źle wyczyszczona. Przesłanie jest niejasne, ale troska jest widoczna."
ptBR = "A tigela é encontrada novamente antes do nascer do sol. Ela foi empurrada um pouco mais perto do acampamento e mal limpa novamente. A mensagem é confusa, mas o cuidado não é."
koKR = "그릇은 해가 뜨기 전에 다시 발견된다. 캠프에 조금 더 가까이 밀려 있었고 다시 깨끗하게 청소되지 않았다. 메시지는 불명확하지만, 배려는 분명하다."
csCZ = "Miska byla nalezena znovu před východem slunce. Byla posunuta blíže k táboru a znovu špatně vyčištěna. Zpráva je nejasná, ale péče není."
viVN = "Chén lại được tìm thấy trước khi mặt trời mọc. Nó đã được đẩy gần hơn một chút vào trại và lại bị dọn dẹp rất kém. Thông điệp thì không rõ ràng, nhưng sự chăm sóc thì không."
trTR = "Kase, gün doğumundan önce tekrar bulundu. Biraz kampın yakınına itilmiş ve yine kötü bir şekilde temizlenmiş. Mesaj belirsiz, ama özen değil."

["LV.BCEv.CampfireMystery2.Content.ClueCh1C3"]
raw = "When the knocking begins, the Inventor points the device toward the trees. Nothing. Then toward the storage piles. The stretched bark trembles. The hollow echo returns from below."
status = "normal"
enUS = "When the knocking begins, the Inventor points the device toward the trees. Nothing. Then toward the storage piles. The stretched bark trembles. The hollow echo returns from below."
zhCN = "“当敲打声开始时，发明家将装置指向树木。什么都没有。然后指向储物堆。拉紧的树皮颤动。空洞的回声从下面传来。”"
zhTW = "當敲擊聲開始時，發明家將裝置指向樹木。什麼都沒有。然後指向儲存堆。拉緊的樹皮顫動。從下方傳來空洞的回音。"
ruRU = "Когда стук начинается, Изобретатель направляет устройство на деревья. Ничего. Затем на склады. Напряженная кора дрожит. Пустой эхо возвращается снизу."
jaJP = "「ノックが始まると、発明家は装置を木々の方向に向ける。何もない。次に、貯蔵の山へ向ける。伸びた樹皮が震える。下からの空虚なエコーが返ってくる。」"
frFR = "Quand le frappement commence, l'Inventeur dirige l'appareil vers les arbres. Rien. Puis vers les tas de stock. L'écorce tendue tremble. L'écho creux revient d'en bas."
deDE = "Als das Klopfen beginnt, richtet der Erfinder das Gerät auf die Bäume. Nichts. Dann auf die Lagerhaufen. Die gedehnte Rinde zittert. Das hohle Echo kommt von unten zurück."
plPL = "Gdy stukanie się zaczyna, Wynalazca kieruje urządzenie w stronę drzew. Nic. Następnie w stronę stosów zapasów. Napięta kora drży. Pusty echo wraca z dołu."
ptBR = "Quando a batida começa, o Inventor aponta o dispositivo para as árvores. Nada. Então para os montes de armazenamento. A casca esticada treme. O eco oco retorna de baixo."
koKR = "두드리는 소리가 시작되면, 발명가는 장치를 나무 쪽으로 향한다. 아무것도 없다. 그 다음에는 저장 더미 쪽으로. 늘어진 나무껍질이 떨린다. 아래에서 울려 퍼지는 공허한 메아리가 돌아온다."
csCZ = "Když začnou údery, vynálezce namíří zařízení směrem ke stromům. Nic. Pak k zásobním haldám. Napjatá kůra se třese. Hluboký ozvěna se vrací zespodu."
viVN = "Khi tiếng gõ bắt đầu, Nhà phát minh hướng thiết bị về phía những cái cây. Không có gì. Rồi hướng về phía các đống lưu trữ. Vỏ cây căng ra run rẩy. Âm vang rỗng trở lại từ bên dưới."
trTR = "Vurulmalar başladığında, Mucit cihazı ağaçlara yönlendirir. Hiçbir şey. Sonra depolama yığınlarına. Gerilmiş kabuk titriyor. Boş yankı aşağıdan geri dönüyor."

["LV.BCEv.CampfireMystery2.Content.ToneCh1C1"]
raw = "The mark points toward the old storage area, just beyond where the firelight was strongest. The colony wonders whether the dark is retreating, or simply inviting them to follow."
status = "normal"
enUS = "The mark points toward the old storage area, just beyond where the firelight was strongest. The colony wonders whether the dark is retreating, or simply inviting them to follow."
zhCN = "“这个标记指向旧储存区，正好在火光最强的地方后面。殖民地的人们在想，是黑暗在退去，还是在邀请他们跟随。”"
zhTW = "這個標記指向舊儲藏區，正好在火光最強的地方之外。殖民地的居民不禁想知道，黑暗是退卻了，還是只是邀請他們跟隨。"
ruRU = "Знак указывает на старую кладовую, прямо за пределами того места, где свет огня был самым ярким. Колония задается вопросом, отступает ли тьма или просто приглашает их следовать."
jaJP = "印は古い保管エリアを指し示しており、そこは火の光が最も強かった場所のすぐ先です。コロニーは、暗闇が退いているのか、それとも単に彼らを追いかけるように誘っているのか疑問に思っています。"
frFR = "La marque pointe vers l'ancien entrepôt, juste au-delà de l'endroit où la lumière du feu était la plus forte. La colonie se demande si l'obscurité recule ou invite simplement à les suivre."
deDE = "Das Zeichen zeigt auf den alten Lagerbereich, gleich jenseits des stärksten Feuerscheins. Die Kolonie fragt sich, ob die Dunkelheit sich zurückzieht oder sie einfach einlädt, ihr zu folgen."
plPL = "Oznaczenie wskazuje w stronę starego magazynu, tuż za miejscem, gdzie światło ognia było najsilniejsze. Kolonia zastanawia się, czy ciemność ustępuje, czy po prostu zaprasza ich do podążania za nią."
ptBR = "A marca aponta para a antiga área de armazenamento, logo além de onde a luz do fogo era mais forte. A colônia se pergunta se a escuridão está recuando ou simplesmente os convidando a seguir."
koKR = "표시는 불빛이 가장 강했던 곳 바로 너머의 오래된 저장 구역을 가리킵니다. 식민지는 어둠이 물러나는 것인지, 아니면 단순히 자신들을 따라오도록 초대하는 것인지 궁금해합니다."
csCZ = "Značka ukazuje směrem k starému skladišti, hned za místem, kde bylo světlo ohně nejsilnější. Kolonie se ptá, zda se tma stahuje, nebo je jednoduše vyzývá, aby následovali."
viVN = "Dấu hiệu chỉ về khu vực lưu trữ cũ, ngay bên ngoài nơi ánh sáng của ngọn lửa mạnh nhất. Bầy thú tò mò liệu bóng tối đang rút lui, hay chỉ đơn giản là mời gọi họ theo sau."
trTR = "İşaret, ateş ışığının en güçlü olduğu yerin hemen ötesindeki eski depolama alanını işaret ediyor. Koloni, karanlığın geri mi çekildiğinden yoksa sadece onları takip etmeye mi davet ettiğinden merak ediyor."

["LV.BCEv.CampfireMystery2.Content.ToneCh1C2"]
raw = "The mark points toward the old storage area. If it is a trail, it was left by someone cautious. If it is a warning, it was left by someone who still returned the bowl."
status = "normal"
enUS = "The mark points toward the old storage area. If it is a trail, it was left by someone cautious. If it is a warning, it was left by someone who still returned the bowl."
zhCN = "这个标记指向老存储区。如果这是一个踪迹，那是由一个谨慎的人留下的。如果这是一个警告，那是由一个仍然归还了碗的人留下的。"
zhTW = "標記指向舊儲存區。如果這是一條小徑，那是由某個謹慎的人所留下的。如果這是一個警告，那是由某個仍然把碗帶回來的人所留下的。"
ruRU = "Знак указывает на старую зону хранения. Если это след, его оставил кто-то осторожный. Если это предупреждение, его оставил кто-то, кто все еще вернул чашу."
jaJP = "その印は古い倉庫の方を指しています。もしそれが道標であれば、慎重な誰かが残したものです。もしそれが警告であれば、それはまだ器を戻した誰かが残したものです。"
frFR = "La marque pointe vers l'ancienne zone de stockage. Si c'est un chemin, il a été laissé par quelqu'un de prudent. Si c'est un avertissement, il a été laissé par quelqu'un qui a tout de même ramené le bol."
deDE = "„Das Zeichen weist auf den alten Lagerbereich hin. Wenn es ein Pfad ist, wurde es von jemandem hinterlassen, der vorsichtig ist. Wenn es eine Warnung ist, wurde es von jemandem hinterlassen, der die Schüssel noch zurückgebracht hat.“"
plPL = "Znaczek wskazuje na starą strefę magazynową. Jeśli to szlak, został pozostawiony przez kogoś ostrożnego. Jeśli to ostrzeżenie, zostało zostawione przez kogoś, kto mimo wszystko zwrócił misę."
ptBR = "A marca aponta para a antiga área de armazenamento. Se é uma trilha, foi deixada por alguém cauteloso. Se é um aviso, foi deixado por alguém que ainda devolveu a tigela."
koKR = "표시는 오래된 저장 구역을 가리킵니다. 만약 이것이 길이라면, 조심스러운 누군가에 의해 남겨진 것입니다. 만약 경고라면, 그릇을 여전히 반납한 누군가에 의해 남겨진 것입니다."
csCZ = "Známka ukazuje směrem k旧ému skladu. Pokud je to stopa, zanechal ji někdo opatrný. Pokud je to varování, zanechal ji někdo, kdo se stále vrátil s miskou."
viVN = "Dấu hiệu chỉ về khu vực lưu trữ cũ. Nếu đó là một con đường, nó được để lại bởi một ai đó cẩn thận. Nếu đó là một cảnh báo, nó được để lại bởi một ai đó vẫn còn quay lại với cái bát."
trTR = "İşaret eski depolama alanını gösteriyor. Eğer bu bir izse, dikkatli biri tarafından bırakılmış. Eğer bir uyarıysa, hala kasedi iade eden biri tarafından bırakılmış."

["LV.BCEv.CampfireMystery2.Content.ToneCh1C3"]
raw = "The mark points toward the old storage area, exactly where the device heard the hollow echo. For once, the Inventor looks both smug and alarmed."
status = "normal"
enUS = "The mark points toward the old storage area, exactly where the device heard the hollow echo. For once, the Inventor looks both smug and alarmed."
zhCN = "这个标记指向老储藏区，正是设备听到空洞回声的地方。这次，发明家看起来既得意又惊慌。"
zhTW = "「這個標記指向舊儲藏區，正是裝置感應到空洞回聲的地方。這次，發明家看起來既得意又驚慌。」"
ruRU = "Знак указывает на старую складскую зону, именно там, где устройство услышало гулкий эхо. На этот раз Изобретатель выглядит одновременно самодовольным и встревоженным."
jaJP = "印は古い倉庫の方を指し示しており、ちょうど装置が空洞の反響を聞いた場所だ。これまでにないことに、発明家は自信満々でありながらも驚いているように見える。"
frFR = "La marque pointe vers l'ancienne zone de stockage, exactement là où l'appareil a entendu l'écho creux. Pour une fois, l'Inventeur a l'air à la fois satisfait et alarmé."
deDE = "„Die Markierung weist in Richtung des alten Lagerbereichs, genau dorthin, wo das Gerät das hohle Echo hörte. Zum ersten Mal sieht der Erfinder sowohl selbstgefällig als auch alarmiert aus.“"
plPL = "Znacznik wskazuje na stary obszar magazynowy, dokładnie tam, gdzie urządzenie usłyszało pusty echo. Po raz pierwszy Wynalazca wygląda zarówno na zadowolonego, jak i zaniepokojonego."
ptBR = "A marca aponta para a velha área de armazenamento, exatamente onde o dispositivo ouviu o eco oco. Pela primeira vez, o Inventor parece tanto satisfeito quanto alarmado."
koKR = "표시는 오래된 저장 공간을 가리키고 있으며, 정확히 그곳에서 장치가 비어 있는 메아리를 들었습니다. 이번만큼은 발명가가 기분 좋으면서도 놀란 모습입니다."
csCZ = "Známka ukazuje směrem ke starému skladu, přesně tam, kde zařízení zachytilo dutý ozvěn. Poprvé vypadá vynálezce současně pyšně a zděšeně."
viVN = "Dấu hiệu chỉ về phía khu vực lưu trữ cũ, chính xác là nơi mà thiết bị nghe thấy tiếng vang rỗng. Lần này, Nhà phát minh trông vừa tự mãn vừa hoảng hốt."
trTR = "İşaret, cihazın boğuk yankıyı duyduğu eski depolama alanını işaret ediyor. Bir kez olsun, İcatçı hem kendinden emin hem de endişeli görünüyor."

["LV.BCEv.CampfireMystery2.C3.Ch1C1"]
raw = "Widen the fireline"
status = "normal"
enUS = "Widen the fireline"
zhCN = "扩宽防火线"
zhTW = "擴大防火線"
