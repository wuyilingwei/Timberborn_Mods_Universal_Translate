zhCN = "殖民地尝试着，但恐惧的记忆却悠久持久。  \n{0}  \n陌生人在营火光芒的边缘注视着，默默无声且不确定。他们对匆忙的爪子、提高的声音和旧储藏室地板每一次的吱嘎声都感到畏缩。  \n当时机来临时，他们没有走近。在黎明之前，他们离开了。  \n这次没有敲门。没有螺旋标记。没有最后的警告。只有一个空着的地方，留在火边。  \n谜团结束了，但却不是一个受欢迎的故事。  \n[[C]][[-]]成年海狸为 {1} 受苦 [[time:{2}d]]"
zhTW = "殖民地試圖應對，但恐懼有著漫長的記憶。\n{0}\n那位陌生人靜靜地站在營火光線的邊緣，默默不語，心中充滿不確定。他們對匆匆而過的爪子、高聲的談話以及老舊儲藏室地板的每一聲吱嘎感到驚慌。\n當時機來臨時，他們並未靠近。在黎明之前，他們離開了。\n這次沒有敲門聲。沒有螺旋標記。沒有最後的警告。只有一個在火邊依然空著的地方。\n謎團結束了，但並不是一個受歡迎的故事。\n[[C]][[-]]成年海狸承受 {1} 為了 [[time:{2}d]]"
ruRU = "Колония старается, но страх имеет долгую память.  \n{0}  \nНезнакомец наблюдает с края света костра, молчаливый и неуверенный. Они вздрагивают от спешащих лап, поднятых голосов и каждого скрипа старого пола для хранения.  \nКогда приходит время, они не подступаются ближе. Перед рассветом они уходят.  \nНа этот раз нет стука. Нет спирального знака. Нет последнего предупреждения. Только место у огня, которое остается пустым.  \nТайна заканчивается, но не как приветливая история.  \n[[C]][[-]]Взрослые бобры страдают {1} в течение [[time:{2}д]]"
jaJP = "コロニーは試みるが、恐れは長い記憶を持っている。\n{0}\n見知らぬ者はキャンプファイヤーの明かりの端から見守り、静かで不確かだ。彼らは急いで走る足、上がる声、古い倉庫の床のきしみのすべてに身を引いている。\nその時が来ても、一歩も近づかない。夜明け前に、彼らは去る。\n今回はノックはない。渦巻きの印もない。最後の警告もない。ただ空いている火のそばの場所が残る。\n謎は終わるが、歓迎される物語ではない。\n[[C]][[-]]大人のビーバーは{1}を苦しむ[[time:{2}d]]"
frFR = "La colonie essaie, mais la peur a une longue mémoire.  \n{0}  \nL'inconnu observe depuis le bord de la lumière du feu de camp, silencieux et incertain. Ils sursautent aux pattes pressées, aux voix élevées, et à chaque craquement du vieux sol de stockage.  \nQuand le moment arrive, ils ne s'approchent pas. Avant l'aube, ils partent.  \nIl n'y a pas de coups cette fois. Aucun signe spiralé. Aucun dernier avertissement. Seulement une place près du feu qui reste vide.  \nLe mystère se termine, mais pas comme une histoire accueillante.  \n[[C]][[-]]Les castors adultes souffrent {1} pendant [[time:{2}d]]"
deDE = "Die Kolonie versucht es, aber die Angst hat ein langes Gedächtnis.\n{0}\nDer Fremde beobachtet vom Rand des Feuers, still und unsicher. Sie zucken zusammen bei hastigen Pfoten, erhobenen Stimmen und jedem Knarren des alten Lagerbodens.\nWenn die Zeit gekommen ist, treten sie nicht näher. Vor der Morgendämmerung gehen sie.\nDiesmal gibt es klopfen. Kein spiralförmiges Zeichen. Keine letzte Warnung. Nur ein Platz am Feuer, der leer bleibt.\nDas Geheimnis endet, aber nicht als willkommene Geschichte.\n[[C]][[-]]Erwachsene Biber leiden {1} für [[time:{2}d]]"
plPL = "Kolonia próbuje, ale strach ma długą pamięć.  \n{0}  \nNieznajomy obserwuje z krawędzi światła ogniska, milczący i niepewny. Cofa się na dźwięk pospiesznych łap, podniesionych głosów i każdego skrzypnięcia starej podłogi magazynu.  \nKiedy przychodzi czas, nie podchodzi bliżej. Przed świtem, odchodzi.  \nTym razem nie ma pukanie. Nie ma spirali. Nie ma ostatecznego ostrzeżenia. Tylko miejsce przy ogniu, które pozostaje puste.  \nTajemnica kończy się, ale nie jako przyjemna opowieść.  \n[[C]][[-]]Dorosłe bobry cierpią {1} przez [[czas:{2}d]]"
ptBR = "A colônia tenta, mas o medo tem uma memória longa.  \n{0}  \nO estranho observa da beira da luz da fogueira, em silêncio e inseguro. Eles se assustam com as patas apressadas, vozes levantadas e cada rangido do velho piso de armazenamento.  \nQuando a hora chega, eles não se aproximam. Antes do amanhecer, eles partem.  \nNão há batidas desta vez. Nenhum símbolo espiral. Nenhuma última advertência. Apenas um lugar à beira do fogo que permanece vazio.  \nO mistério termina, mas não como uma história bem-vinda.  \n[[C]][[-]]Castores adultos sofrem {1} por [[time:{2}d]]"
koKR = "식민지는 노력하지만, 두려움은 오랫동안 기억에 남는다.  \n{0}  \n낯선 자는 캠프파이어 불빛 가장자리고 지켜보고 있으며, 조용하고 불확실하다. 그들은 서두르는 발, 높아진 목소리, 낡은 창고 바닥의 모든 삐걱거림에 움츠린다.  \n때가 오면, 그들은 더 가까이 나아가지 않는다. 새벽 이전에, 그들은 떠난다.  \n이번에는 knocking이 없다. 나선형 표시도 없다. 마지막 경고도 없다. 오직 불 옆의 빈 자리만이 남는다.  \n미스터리는 끝나지만, 환영받는 이야기가 아니다.  \n[[C]][[-]]어른 비버는 {1}를 겪는다 [[시간:{2}일]]"
csCZ = "Kolonie se snaží, ale strach má dlouhou paměť.\n{0}\nCizinec sleduje z okraje světla táboráku, tichý a nejistý. Vyhýbá se spěšným tlapkám, zvýšeným hlasům a každému skřípění ze staré podlahy skladu.\nAž přijde čas, nepřistoupí blíž. Před úsvitem odchází.\nTentokrát žádné klepání. Žádný spirálový znak. Žádné poslední varování. Jen místo u ohně, které zůstává prázdné.\nZáhada končí, ale ne jako vítaný příběh.\n[[C]][[-]]Dospělí bobři trpí {1} po [[time:{2}d]]"
viVN = "Colony cố gắng, nhưng nỗi sợ có trí nhớ dài.  \n{0}  \nNgười lạ quan sát từ rìa ánh sáng của Campfire, im lặng và không chắc chắn. Họ giật mình trước những bàn chân vội vã, những tiếng nói to và mỗi tiếng kêu từ sàn kho cũ.  \nKhi đến lúc, họ không tiến lại gần. Trước khi bình minh, họ rời đi.  \nKhông có tiếng gõ cửa lần này. Không có dấu xoắn. Không có cảnh báo cuối cùng. Chỉ còn một chỗ bên lửa vẫn trống rỗng.  \nBí ẩn kết thúc, nhưng không phải như một câu chuyện chào đón.  \n[[C]][[-]]Bõ be trưởng thành phải chịu đựng {1} trong [[time:{2}d]]"
trTR = "Koloni çabalar, ama korkunun uzun bir hafızası vardır.  \n{0}  \nYabancı, Kamp Ateşi ışığının kenarından, sessiz ve belirsiz bir şekilde izlemektedir. Aceleci patilerin, yükselen seslerin ve eski depolama zemininden gelen her gıcırtının sesiyle irkilirler.  \nZamanı geldiğinde, daha da yaklaşmazlar. Şafak öncesi ayrılırlar.  \nBu sefer kapı çalma yok. İkonik bir işaret yok. Son bir uyarı yok. Sadece ateşin yanında boş kalan bir yer var.  \nGizem sona erer, ama hoş karşılanan bir hikaye olarak değil.  \n[[C]][[-]]Yetişkin kunduzlar {1} {2} günde [[time:{2}d]] acı çeker."

["LV.BCEv.CampfireMystery4.O2.FailCh3C1"]
raw = "Some beavers are still worn down, unhappy, or forgotten at the edges of colony life. To the stranger, the Campfire looks warm, but not wide enough."
status = "normal"
enUS = "Some beavers are still worn down, unhappy, or forgotten at the edges of colony life. To the stranger, the Campfire looks warm, but not wide enough."
zhCN = "一些海狸仍然感到疲惫、不快乐，或者被遗忘在殖民地生活的边缘。对陌生人来说，篝火看起来很温暖，但似乎不够宽阔。"
zhTW = "一些海狸仍然感到疲憊、不快樂或被遺忘在殖民地生活的邊緣。對於這位陌生人來說，營火看起來很溫暖，但不夠寬敞。"
ruRU = "Некоторые бобры все еще измотаны, несчастны или забыты на краю колонийной жизни. Для незнакомца костер выглядит теплым, но недостаточно большим."
jaJP = "「辺境のコロニー生活では、いくつかのビーバーがまだ疲れ果て、不幸で、忘れ去られています。見知らぬ人にとって、キャンプファイヤーは暖かそうですが、広さが足りません。」"
frFR = "Certains castors sont encore usés, malheureux ou oubliés aux marges de la vie coloniale. Pour l'étranger, le feu de camp semble chaud, mais pas assez grand."
deDE = "Einige Biber sind immer noch erschöpft, unglücklich oder in den Randbereichen des Kolonielebens vergessen. Für den Fremden sieht das Lagerfeuer zwar warm aus, aber nicht weit genug."
plPL = "Niektóre bobry wciąż są zmęczone, nieszczęśliwe lub zapomniane na obrzeżach życia kolonii. Dla obcego ognisko wygląda na ciepłe, ale nie wystarczająco szerokie."
ptBR = "Alguns castores ainda estão cansados, infelizes ou esquecidos nas bordas da vida da colônia. Para o estranho, a fogueira parece quente, mas não larga o suficiente."
koKR = "몇몇 비버들은 여전히 지치고 불행하며 식민지 생활의 변두리에서 잊혀져 있다. 낯선 사람에게 캠프파이어는 따뜻해 보이지만, 충분히 넓지 않다."
csCZ = "Někteří bobři jsou stále vyčerpaní, nešťastní nebo zapomenutí na okrajích koloniálního života. Pro cizince vypadá táborák teple, ale nedostatečně velký."
viVN = "Một số con rái cá vẫn còn mệt mỏi, không hạnh phúc, hoặc bị lãng quên ở những rìa của cuộc sống thuộc địa. Đối với người lạ, Lửa trại trông ấm áp, nhưng không đủ rộng."
trTR = "Koloni yaşamının kenarlarında hâlâ yıpranmış, mutsuz veya unutulmuş bazı kunduzlar var. Yabancıya göre, kamp ateşi sıcak görünüyor ama yeterince geniş değil."

["LV.BCEv.CampfireMystery4.O2.FailCh3C2"]
raw = "The water rises where it should not. Paths flood, work stalls, and the colony rushes to protect itself. To the stranger, order still looks fragile."
status = "normal"
enUS = "The water rises where it should not. Paths flood, work stalls, and the colony rushes to protect itself. To the stranger, order still looks fragile."
zhCN = "水位上升的地方不应该有。道路被淹没，工作停滞，殖民地匆忙自救。对陌生人而言，秩序依旧显得脆弱。"
zhTW = "水位升高到不應該的地方。小道淹水，工作停滯，殖民地急忙自保。對於陌生人來說，秩序看起來仍然脆弱。"
ruRU = "Вода поднимается там, где не должна. Путь затоплен, работа приостановлена, и колония спешит защитить себя. Для незнакомца порядок по-прежнему кажется хрупким."
jaJP = "「水が上がるべきでない場所で上がる。道が水没し、作業が滞り、コロニーは自らを守るために急ぐ。見知らぬ者には、秩序はまだ脆弱に見える。」"
frFR = "L'eau monte là où elle ne devrait pas. Les chemins sont inondés, le travail est arrêté, et la colonie se précipite pour se protéger. Pour l'étranger, l'ordre semble encore fragile."
deDE = "Das Wasser steigt, wo es nicht sollte. Pfade überschwemmen, die Arbeit stockt, und die Kolonie eilt, sich zu schützen. Für den Fremden sieht die Ordnung immer noch zerbrechlich aus."
plPL = "Woda podnosi się tam, gdzie nie powinna. Ścieżki zalewają się, prace stają w miejscu, a kolonia spieszy, by się ochronić. Dla obcego porządek nadal wydaje się kruchy."
ptBR = "A água sobe onde não deveria. Caminhos se inundam, o trabalho para, e a colônia se apressa para se proteger. Para o estranho, a ordem ainda parece frágil."
koKR = "물이 올라서는 안 되는 곳에서 상승한다. 길이 침수되고, 작업이 중단되며, 식민지는 스스로를 보호하기 위해 서두른다. 낯선 이에게 질서는 여전히 불안정해 보인다."
csCZ = "Voda stoupá tam, kde by neměla. Cesty jsou zaplavené, práce se zastavuje a kolonie spěchá, aby se ochránila. Pro cizince se zdá, že je pořádek stále křehký."
viVN = "Nước dâng lên ở những nơi không nên. Đường đi ngập, công việc đình trệ, và thuộc địa vội vàng tự bảo vệ mình. Đối với người lạ, trật tự vẫn trông mong manh."
trTR = "Su, olmaması gereken yerlerde yükseliyor. Yollar sular altında kalıyor, işler duraklıyor ve koloni kendini korumak için acele ediyor. Yabancı için düzen hâlâ kırılgan görünüyor."

["LV.BCEv.CampfireMystery4.O2.FailCh3C3"]
raw = "Some beavers still go without shelter, food, or water. To the stranger, the colony has not proven that a frightened mouth will be cared for instead of closed away."
status = "normal"
enUS = "Some beavers still go without shelter, food, or water. To the stranger, the colony has not proven that a frightened mouth will be cared for instead of closed away."
zhCN = "一些海狸仍然没有住所、食物或水。对陌生人而言，这个殖民地并没有证明一个害怕的嘴巴会得到照顾，而不是被关起来。"
zhTW = "有些海狸仍然沒有庇護所、食物或水。對於這位陌生人來說，這個殖民地尚未證明一個驚恐的嘴巴會受到關心，而不是被關閉起來。"
ruRU = "Некоторые бобры все еще остаются без укрытия, еды или воды. Для незнакомца колония не доказала, что испуганный рот будет заботиться, а не закрыт."
jaJP = "まだシェルター、食料、または水がないビーバーもいます。見知らぬ人にとって、このコロニーは、恐れた口が閉じ込められるのではなく、大切にされることを証明していません。"
frFR = "Certains castors n'ont toujours pas d'abri, de nourriture ou d'eau. Pour l'étranger, la colonie n'a pas prouvé qu'une bouche effrayée sera prise en charge au lieu d'être refermée."
deDE = "Einige Biber leben immer noch ohne Schutz, Nahrung oder Wasser. Für den Fremden hat die Kolonie nicht bewiesen, dass ein verängstigter Mund versorgt wird, anstatt verschlossen zu bleiben."
plPL = "Niektóre bobry nadal żyją bez schronienia, jedzenia czy wody. Dla nieznajomego kolonia nie udowodniła, że przestraszona morda będzie pielęgnowana zamiast zamknięta."
ptBR = "Alguns castores ainda vivem sem abrigo, comida ou água. Para o estranho, a colônia não provou que uma boca assustadora será cuidada em vez de ser fechada."
koKR = "어떤 비버들은 여전히 피신처나 음식, 물 없이 지냅니다. 낯선 이에게 이 집단은 두려워하는 입이 닫혀지지 않고 보살핌을 받을 것이라는 것을 증명하지 못했습니다."
csCZ = "Někteří bobři stále žijí bez přístřeší, jídla nebo vody. Cizince kolonie nepřesvědčila, že se postará o vyděšená ústa místo toho, aby je zavřela."
viVN = "Một số con thủy cung vẫn sống mà không có nơi trú ẩn, thức ăn hoặc nước. Đối với người lạ, thuộc địa chưa chứng minh rằng một miệng sợ hãi sẽ được chăm sóc thay vì bị giam giữ."
trTR = "Bazı kunduzlar hâlâ barınaksız, yiyeceksiz veya susuz kalıyor. Yabancı için, koloni korkmuş bir ağzın kapatılmak yerine bakım göreceğini kanıtlayamamıştır."

["LV.BCEv.CampfireMystery4.O3"]
raw = "The colony packs berries and water, then leaves the bundle near the edge of the Campfire light.\nThe stranger takes it silently.\nFor a moment, it seems they might speak. Instead, they scratch one final spiral into the dirt.\nThis one does not point toward storage. It does not point beneath the floor. It points away.\nThe colony watches until the trees swallow them. The mystery ends gently, but not happily."
status = "normal"
enUS = "The colony packs berries and water, then leaves the bundle near the edge of the Campfire light.  \nThe stranger takes it silently.  \nFor a moment, it seems they might speak. Instead, they scratch one final spiral into the dirt.  \nThis one does not point toward storage. It does not point beneath the floor. It points away.  \nThe colony watches until the trees swallow them. The mystery ends gently, but not happily."
zhCN = "殖民地装填了浆果和水，然后将包裹留在营火光亮的边缘。\n陌生人默默地拿走了它。\n有那么一瞬间，似乎他们可能会说话。然而，他们却在土里划下最后一个螺旋。\n这个并不指向储存处。它不指向地板下。它指向远方。\n殖民地静静地注视着他们，直到树木将他们吞没。这个谜团温柔地结束，但并不快乐。"
zhTW = "殖民地收集了莓果和水，然後將包裹放在營火光線的邊緣附近。\n陌生人默默地拿走了它。\n一瞬間，看起來他們可能會說話。但他們卻在土壤上劃出最後一個螺旋。\n這個不是指向儲存的地方。也不指向地板下。它指向遠方。\n殖民地靜靜地觀望，直到樹木將他們吞噬。這個謎題以溫柔的方式結束，但卻不幸福。"
ruRU = "Колония упаковывает ягоды и воду, затем оставляет сверток у края света Костра. Незнакомец берет его молча. На мгновение кажется, что они могут заговорить. Вместо этого они проводят последнюю спираль в земле. Эта спираль не указывает на хранилище. Она не указывает под пол. Она указывает вбок. Колония наблюдает, пока деревья не поглощают их. Тайна заканчивается мягко, но не счастливо."
jaJP = "コロニーはベリーと水を詰め込み、キャンプファイヤーの光の近くにその束を置く。  \n strangerは静かにそれを受け取る。  \n 一瞬、話しかけるかのように思える。しかし、彼らは土の中に最後の渦を描くだけだ。  \n この渦は収納を指し示していない。床の下を指しているわけでもなく、外を指している。  \n コロニーは彼らが木々に飲み込まれるまで見守る。謎は静かに終わるが、幸せではない。"
frFR = "La colonie emballe des baies et de l'eau, puis laisse le paquet près du bord de la lumière du feu de camp. L'étranger le prend en silence. Pendant un moment, il semble qu'il pourrait parler. Au lieu de cela, il griffonne une dernière spirale dans la terre. Celle-ci ne pointe pas vers le stockage. Elle ne pointe pas sous le sol. Elle pointe vers l'extérieur. La colonie regarde jusqu'à ce que les arbres les engloutissent. Le mystère se termine doucement, mais pas heureusement."
deDE = "Die Kolonie packt Beeren und Wasser ein und lässt das Bündel dann am Rand des Lichtscheins des Lagerfeuers zurück. Der Unbekannte nimmt es schweigend. Für einen Moment scheint es, als könnten sie sprechen. Stattdessen ritzen sie eine letzte Spirale in den Boden. Diese zeigt nicht in Richtung Lagerung. Sie zeigt nicht unter den Boden. Sie zeigt weg. Die Kolonie beobachtet, bis die Bäume sie verschlucken. Das Geheimnis endet sanft, aber nicht glücklich."
plPL = "Kolonia pakuje jagody i wodę, a następnie zostawia pakunek w pobliżu krawędzi światła ogniska. \nNieznajomy zabiera go w mil silence. \nNa chwilę wydaje się, że mogą mówić. Zamiast tego, rysują jeszcze jedną spiralę w ziemi. \nTa nie wskazuje na magazyn. Nie wskazuje pod podłogę. Wskazuje w przód. \nKolonia obserwuje, aż drzewa ich pochłaniają. Tajemnica kończy się łagodnie, ale nie szczęśliwie."
ptBR = "A colônia empacota frutas silvestres e água, então deixa o fardo perto da borda da luz da fogueira. O estranho o pega em silêncio. Por um momento, parece que eles podem falar. Em vez disso, arranham uma espiral final na terra. Esta não aponta para o armazenamento. Não aponta para baixo do chão. Aponta para longe. A colônia observa até que as árvores os engulam. O mistério termina suavemente, mas não felizmente."
koKR = "식민지는 베리와 물을 챙겨 캠프파이어 불빛의 가장자리 가까이에 묶음을 두고 떠난다. \n이방인은 조용히 그것을 가져간다. \n잠시 그들이 말을 할 것 같았다. 대신, 그들은 마지막 나선형을 땅에 긁어낸다. \n이번 것은 저장소를 가리키지 않는다. 바닥 아래를 가리키지 않는다. 멀리 향한다. \n식민지는 나무가 그들을 삼킬 때까지 지켜본다. 신비는 부드럽게 끝나지만, 행복하게 끝나지는 않는다."
csCZ = "Kolonie balí bobule a vodu, poté nechá balíček blízko okraje světla z ohniště. \nCizinec si ho tiše vezme. \nNa chvíli se zdá, že se možná chystá promluvit. Místo toho do země vyryje jeden poslední spirálový tvar. \nTento směr neukazuje na úložiště. Neukazuje pod podlahu. Ukazuje pryč. \nKolonie je pozoruje, dokud je stromy nezhltí. Záhada končí jemně, ale ne šťastně."
viVN = "Colony đóng gói trái cây và nước, rồi để gói gần cạnh ánh sáng của Lửa Trại. Kẻ lạ mặt lặng lẽ tiếp nhận nó. Trong giây lát, có vẻ như họ có thể nói. Thay vào đó, họ khắc một vòng xoắn cuối cùng xuống đất. Vòng xoắn này không chỉ vào kho. Nó không chỉ vào dưới sàn. Nó chỉ ra xa. Colony quan sát cho đến khi những cây cối nuốt chửng họ. Bí ẩn kết thúc một cách nhẹ nhàng, nhưng không hạnh phúc."
trTR = "“Koloni, böğürtlen ve su ile dolu bir paket yapar, ardından paketi Kamp Ateşi ışığının kenarına bırakır. \nYabancı, bunu sessizce alır. \nBir an, konuşacaklarmış gibi görünürler. Bunun yerine, toprağa son bir spiral çizerler. \nBu, depoya işaret etmez. Yerin altına da işaret etmez. Uzaklara işaret eder. \nKoloni, ağaçların onları yuttuğunu görene kadar izler. Gizem nazikçe sona erer, ama mutlu bir şekilde değil.”"

["LV.BCEv.CampfireMystery4.O4"]
raw = "The colony drives the stranger beyond the light.\nNo one cheers.\nThe stolen goods are counted. The broken planks are replaced. The injured slowly return to work.\nAt the next Campfire, someone begins to tell the story of the ghost beneath storage.\nNo one asks them to continue.\nSome stories are not frightening because of the shadow.\nSome are frightening because of what the firelight did after it found one.\n[[C]][[-]]Adult beavers suffer {0} for [[time:{1}d]]"
status = "normal"
enUS = "The colony drives the stranger beyond the light.  \nNo one cheers.  \nThe stolen goods are counted. The broken planks are replaced. The injured slowly return to work.  \nAt the next Campfire, someone begins to tell the story of the ghost beneath storage.  \nNo one asks them to continue.  \nSome stories are not frightening because of the shadow.  \nSome are frightening because of what the firelight did after it found one.  \n[[C]][[-]]Adult beavers suffer {0} for [[time:{1}d]]"
zhCN = "殖民地将陌生人驱赶到光明之外。  \n没有人喝彩。  \n被盗的物品被清点。破损的木板被更换。受伤者慢慢恢复工作。  \n在下一个篝火旁，有人开始讲述储藏室下方鬼魂的故事。  \n没有人要求他们继续。  \n有些故事并不是因为阴影而令人恐惧。  \n有些则因为火光发现它之后所做的事情而令人恐惧。  \n[[C]][[-]]成年海狸遭受{0}，持续[[time:{1}d]]"
zhTW = "殖民地將陌生人驅趕至光明之外。  \n沒有人歡呼。  \n被盜物品被清點。破損的板子被更換。受傷者慢慢回到工作崗位。  \n在下一次篝火旁，有人開始講述儲存區下方幽靈的故事。  \n沒有人要求他們繼續。  \n有些故事之所以可怕，並不是因為陰影。  \n有些則是因為火光發現某個東西後所做的事情。  \n[[C]][[-]]成年海狸因為{0}而受到[[time:{1}天]]的影響。"
ruRU = "Колония прогоняет незнакомца за пределы света.  \nНикто не радуется.  \nУкраденные товары пересчитываются. Сломанные доски заменяются. Пострадавшие медленно возвращаются к работе.  \nНа следующем костре кто-то начинает рассказывать историю о призраке под хранилищем.  \nНикто не просит их продолжить.  \nНекоторые истории не пугают из-за тени.  \nНекоторые пугают из-за того, что свет от огня сделал, когда нашел один.  \n[[C]][[-]]Взрослые бобры страдают {0} в течение [[time:{1}д]]"
jaJP = "コロニーは見知らぬ者を光の先へと追いやる。 誰も応援しない。 盗まれた品物が数えられ、壊れた板は取り替えられる。 負傷した者たちはゆっくりと仕事に戻る。 次のキャンプファイヤーでは、誰かが倉庫の下にいる幽霊の物語を語り始める。 誰も続きを聞こうとはしない。 いくつかの物語は影のために恐ろしいわけではない。 いくつかは、火の光がそれを見つけた後に行ったことのために恐ろしい。 [[C]][[-]]大人のビーバーは{0}を苦しむ [[time:{1}d]]の間。"
frFR = "La colonie pousse l'étranger au-delà de la lumière.  \nPersonne n'applaudit.  \nLes biens volés sont comptés. Les planches cassées sont remplacées. Les blessés retournent lentement au travail.  \nAu prochain feu de camp, quelqu'un commence à raconter l'histoire du fantôme sous le stockage.  \nPersonne ne leur demande de continuer.  \nCertaines histoires ne sont pas effrayantes à cause de l'ombre.  \nCertaines sont effrayantes à cause de ce que la lumière du feu a fait après avoir trouvé l'une d'elles.  \n[[C]][[-]]Les castors adultes souffrent {0} pendant [[temps:{1}j]]"
deDE = "Die Kolonie treibt den Fremden über das Licht hinaus. \nNiemand jubelt. \nDie gestohlenen Waren werden gezählt. Die beschädigten Planken werden ersetzt. Die Verletzten kehren langsam zur Arbeit zurück. \nAm nächsten Lagerfeuer beginnt jemand, die Geschichte des Geistes unter dem Lager zu erzählen. \nNiemand bittet sie, fortzufahren. \nEinige Geschichten sind nicht beängstigend wegen des Schattens. \nEinige sind beängstigend wegen dem, was das Feuerlicht tat, nachdem es einen gefunden hatte. \n[[C]][[-]]Erwachsene Biber leiden {0} für [[zeit:{1}d]]"
plPL = "Kolonia wypędza nieznajomego poza światło.  \nNikt nie wiwatuje.  \nSk stolen goods are counted. The broken planks are replaced. The injured slowly return to work.  \nPodczas następnego ogniska ktoś zaczyna opowiadać historię ducha pod magazynem.  \nNikt nie prosi ich, by kontynuowali.  \nNiektóre historie nie są przerażające z powodu cienia.  \nNiektóre są przerażające z powodu tego, co światło ognia zrobiło, gdy je znalazło.  \n[[C]][[-]]Dorosłe bobry cierpią {0} przez [[czas:{1}d]]"
ptBR = "A colônia leva o estranho para além da luz.\nNinguém aplaude.\nOs bens roubados são contados. As tábuas quebradas são substituídas. Os feridos voltam lentamente ao trabalho.\nNo próximo acampamento, alguém começa a contar a história do fantasma debaixo do armazenamento.\nNinguém pede para que continuem.\nAlgumas histórias não são assustadoras por causa da sombra.\nAlgumas são assustadoras por causa do que a luz do fogo fez depois de encontrar uma.\n[[C]][[-]]Castores adultos sofrem {0} por [[tempo:{1}d]]"
koKR = "식민지는 낯선 이를 빛 너머로 몰아냅니다.  \n아무도 환호하지 않습니다.  \n도난당한 물품이 세어집니다. 부서진 판자들이 교체됩니다. 부상자들은 천천히 다시 일터로 돌아옵니다.  \n다음 캠프파이어에서, 누군가 창고 아래 유령의 이야기를 들려주기 시작합니다.  \n아무도 그들에게 계속하라고 요청하지 않습니다.  \n일부 이야기는 그림자 때문에 무섭지 않습니다.  \n일부 이야기는 불빛이 하나를 찾은 후에 한 일 때문에 무섭습니다.  \n[[C]][[-]]성인 비버는 {0} 동안 [[time:{1}d]] 고통받습니다."
csCZ = "Kolonie žene cizince za světlo.\nNikdo neaplauduje.\nUkradené zboží je sečteno. Zlomené prkna jsou nahrazena. Zranění se pomalu vracejí do práce.\nPři dalším táboráku někdo začne vyprávět příběh ducha pod skladištěm.\nNikdo je nežádá, aby pokračovali.\nNěkteré příběhy nejsou děsivé kvůli stínu.\nNěkteré jsou děsivé kvůli tomu, co světlo ohně udělalo poté, co jednoho našlo.\n[[C]][[-]]Dospělí bobři trpí {0} po dobu [[time:{1}d]]"
viVN = "Nhóm thuộc địa đẩy người lạ ra khỏi ánh sáng.\nKhông ai cổ vũ.\nĐồ bị đánh cắp được đếm. Những thanh ván gãy được thay thế. Người bị thương từ từ trở lại làm việc.\nTại Bếp lửa tiếp theo, có người bắt đầu kể câu chuyện về hồn ma dưới kho.\nKhông ai yêu cầu họ tiếp tục.\nMột số câu chuyện không đáng sợ vì bóng tối.\nMột số lại đáng sợ vì những gì ánh sáng lửa đã làm sau khi nó tìm thấy một.\n[[C]][[-]]Beaver trưởng thành chịu {0} trong [[thời gian:{1}d]]"
trTR = "Koloni, yabancıyı ışığın ötesine sürüyor.  \nKimse tezahürat yapmıyor.  \nÇalınan eşyalar sayılıyor. Kırık tahtalar değiştiriliyor. Yaralılar yavaş yavaş işe dönüyor.  \nBir sonraki Kamp Ateşi'nde, biri depoların altında bulunan hayaletin hikayesini anlatmaya başlıyor.  \nKimse onlardan devam etmelerini istemiyor.  \nBazı hikayeler gölgeler yüzünden korkutucu değildir.  \nBazıları, ateşin onu bulduktan sonra yaptıkları yüzünden korkutucudur.  \n[[C]][[-]]Yetişkin kunduzlar {0} için [[time:{1}g]] acı çekiyor."
