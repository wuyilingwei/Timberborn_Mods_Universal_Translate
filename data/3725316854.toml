["LV.BCEv.CampfireMystery3.O1"]
raw = "The Caped Chewer takes position near the old storage floor.\n{0}\nFor a while, nothing happens.\nThen the knocking comes from below.\n<YellowHighlight><i>Knock. Knock. Knock.</i></YellowHighlight>\nThe Caped Chewer raises one paw for silence, which would be more impressive if everyone had not already stopped breathing.\nA shadow moves beneath the raised board.\nThe hero leaps.\nThe shadow leaps back.\nThe next few moments are mostly noise: scraping claws, splintering wood, startled shouts, and one heroic declaration that turns into a squeak halfway through.\nWhen the colony rushes in, the Caped Chewer and the young volunteers are bruised and shaken.\nBut they are not empty-pawed.\nIn the firelight, dragged from the broken storage floor, lies an unconscious beaver no one recognizes.\n[[C]][[-]]{1} Beaver injured."
status = "normal"
enUS = "The Caped Chewer takes position near the old storage floor.  \n{0}  \nFor a while, nothing happens.  \nThen the knocking comes from below.  \n<YellowHighlight><i>Knock. Knock. Knock.</i></YellowHighlight>  \nThe Caped Chewer raises one paw for silence, which would be more impressive if everyone had not already stopped breathing.  \nA shadow moves beneath the raised board.  \nThe hero leaps.  \nThe shadow leaps back.  \nThe next few moments are mostly noise: scraping claws, splintering wood, startled shouts, and one heroic declaration that turns into a squeak halfway through.  \nWhen the colony rushes in, the Caped Chewer and the young volunteers are bruised and shaken.  \nBut they are not empty-pawed.  \nIn the firelight, dragged from the broken storage floor, lies an unconscious beaver no one recognizes.  \n[[C]][[-]]{1} Beaver injured."
zhCN = "披风啃咬者站在旧储物楼层附近。\n{0}\n一段时间内，什么也没发生。\n然后，从下面传来敲击声。\n<YellowHighlight><i>敲。敲。敲。</i></YellowHighlight>\n披风啃咬者举起一只爪子示意安静，如果大家没有屏住呼吸，这看起来会更令人印象深刻。\n一道阴影在抬起的板子下移动。\n英雄跳起。\n阴影向后跳。\n接下来的几瞬间主要是噪音：抓挠的爪子声、木头裂开的声响、惊叫声，以及一句在中途变成 squeak 的英雄声明。\n当殖民地蜂拥而入时，披风啃咬者和年轻的志愿者都受了伤， shaken。\n但他们的爪子并不空空如也。\n在火光中，从破碎的储物楼层拖出一只无人认出的昏迷海狸。\n[[C]][[-]]{1} 海狸受伤。"
zhTW = "披風咀嚼者站在舊儲物地板附近。\n{0}\n過了一會兒，什麼都沒有發生。\n然後下面傳來敲擊聲。\n<YellowHighlight><i>咚。咚。咚。</i></YellowHighlight>\n披風咀嚼者抬起一隻爪子示意安靜，這會令人印象深刻，前提是大家並沒有已經停止呼吸。\n一個陰影在抬起的板子下方移動。\n英雄跳了起來。\n陰影也跳回去。\n接下來的幾分鐘幾乎都是噪音：刮擦的爪子，木頭的破裂，驚訝的喊叫，以及一個英勇的聲明在半途中變成了吱吱聲。\n當殖民地蜂擁而入時，披風咀嚼者和年輕的志願者們全身有傷，顫抖不已。\n但他們並不是空手而回。\n在火光下，從破碎的儲物地板上拖出來的，躺著一隻沒人認識的昏迷海狸。\n[[C]][[-]]{1} 受傷的海狸。"
ruRU = "Ключевое название: LV.BCEv.CampfireMystery3.O1 - Новый текст для перевода: \"Погонщик в плаще занимает позицию возле старого склада.\n{0}\nНекоторое время ничего не происходит.\nЗатем снизу доносятся стуки.\n<YellowHighlight><i>Тук. Тук. Тук.</i></YellowHighlight>\nПогонщик в плаще поднимает одну лапу для тишины, что было бы более впечатляющим, если бы все остальные уже не прекратили дышать.\nТень движется под поднятой доской.\nГерой совершает прыжок.\nТень отскакивает обратно.\nСледующие несколько мгновений — в основном шум: скрежет когтей, треск дерева, испуганные крики и одно героическое заявление, которое на половине пути превращается в писк.\nКогда колония врывается внутрь, Погонщик в плаще и молодые волонтёры в синяках и потрясены.\nНо у них не пустые лапы.\nВ свете огня, вытащенный из сломанного склада, лежит без сознания бобр, которого никто не признает.\n[[C]][[-]]{1} Раненый бобр.\""
jaJP = "マントを羽織ったチュウニは古い収納場の近くに位置を取る。\n{0}\nしばらくして、何も起こらない。\n次に、下からノックの音が聞こえる。\n<YellowHighlight><i>ノック。ノック。ノック。</i></YellowHighlight>\nマントを羽織ったチュウニは一方の手を挙げて静かにするよう促すが、皆が既に息を潜めているので、あまり印象的ではない。\n挙げられた板の下で影が動く。\nヒーローが飛びかかる。\n影も飛び退く。\n次の数瞬は主に音が支配する：ひっかく爪、木の割れる音、驚いた叫び声、そして途中で squeak に変わる一つの英雄的な宣言。\nコロニーが駆け込むと、マントを羽織ったチュウニと若いボランティアは打撲を負い、震えている。\nしかし、彼らの手は空ではない。\n火の明かりの中、壊れた収納場から引きずり出された意識を失ったビーバーが横たわっているが、誰も彼を認識できない。\n[[C]][[-]]{1} ビーバーが負傷している。"
frFR = "Le Ronfleur Capé prend position près de l'ancien sol de stockage.  \n{0}  \nPendant un moment, rien ne se passe.  \nPuis le bruit de coups vient d'en bas.  \n<YellowHighlight><i>Toc. Toc. Toc.</i></YellowHighlight>  \nLe Ronfleur Capé lève une patte pour demander le silence, ce qui serait plus impressionnant si tout le monde n'avait pas déjà arrêté de respirer.  \nUne ombre se déplace sous le panneau relevé.  \nLe héros saute.  \nL'ombre recule.  \nLes quelques moments suivants sont principalement du bruit : griffes qui raclent, bois qui éclate, hurlements surpris, et une déclaration héroïque qui se transforme en couinement à mi-chemin.  \nQuand la colonie se précipite, le Ronfleur Capé et les jeunes bénévoles sont meurtris et secoués.  \nMais ils ne sont pas les pattes vides.  \nÀ la lumière du feu, tiré du sol de stockage brisé, se trouve un castor inconscient que personne ne reconnaît.  \n[[C]][[-]]{1} Castor blessé."
deDE = "Der Kapuzenträger nimmt Position nahe dem alten Lagerboden.  \n{0}  \nEine Weile passiert nichts.  \nDann kommt das Klopfen von unten.  \n<YellowHighlight><i>Klopf. Klopf. Klopf.</i></YellowHighlight>  \nDer Kapuzenträger hebt eine Pfote für Stille, was beeindruckender wäre, wenn nicht schon alle aufgehört hätten zu atmen.  \nEin Schatten bewegt sich unter dem erhobenen Brett.  \nDer Held springt.  \nDer Schatten springt zurück.  \nDie nächsten Momente sind größtenteils Lärm: schabende Krallen, splitterndes Holz, erschrockene Schreie und eine heroische Erklärung, die mitten drin in ein Quieken umschlägt.  \nAls die Kolonie hereinströmt, sind der Kapuzenträger und die jungen Freiwilligen verletzt und erschüttert.  \nAber sie sind nicht mit leeren Pfoten.  \nIm Feuerschein, aus dem zerstörten Lagerboden gezogen, liegt ein bewusstloser Biber, den niemand erkennt.  \n[[C]][[-]]{1} Biber verletzt."
plPL = "Kapitan Chewer zajmuje pozycję obok starej podłogi magazynu.  \n{0}  \nPrzez chwilę nic się nie dzieje.  \nWtedy dochodzi stukanie z dołu.  \n<YellowHighlight><i>Stuk. Stuk. Stuk.</i></YellowHighlight>  \nKapitan Chewer unosi jedną łapę, żeby zaznać ciszy, co byłoby bardziej imponujące, gdyby wszyscy już nie wstrzymali oddechu.  \nCień porusza się pod uniesioną deską.  \nBohater skacze.  \nCień skacze z powrotem.  \nNastępne kilka chwil to głównie hałas: rzężące pazury, łamiące się drewno, zdumione okrzyki i jedna bohaterka deklaracja, która w połowie przekształca się w piszcze.  \nGdy kolonia rushuje do środka, Kapitan Chewer i młodzi ochotnicy są posiniaczeni i wstrząśnięci.  \nAle nie są bez łap.  \nW blasku ognia, wyciągnięty z uszkodzonej podłogi magazynu, leży nieprzytomny bóbr, którego nikt nie rozpoznaje.  \n[[C]][[-]]{1} Rana bobra."
ptBR = "O Mastigador de Capa toma posição perto do antigo andar de armazenamento.  \n{0}  \nPor um tempo, nada acontece.  \nEntão vêm os batidos debaixo.  \n<YellowHighlight><i>Knock. Knock. Knock.</i></YellowHighlight>  \nO Mastigador de Capa levanta uma pata para pedir silêncio, o que seria mais impressionante se todos já não tivessem parado de respirar.  \nUma sombra se move sob a tábua levantada.  \nO herói salta.  \nA sombra pula para trás.  \nOs próximos momentos são principalmente barulho: garras arranhando, madeira estalando, gritos assustados e uma declaração heróica que se transforma em um grunhido no meio.  \nQuando a colônia corre para dentro, o Mastigador de Capa e os jovens voluntários estão machucados e abalados.  \nMas eles não estão de patas vazias.  \nÀ luz do fogo, arrastado do andar de armazenamento quebrado, está um castor inconsciente que ninguém reconhece.  \n[[C]][[-]]{1} Castor ferido."
koKR = "우모의 씹는 자는 낡은 저장 바닥 근처에 위치를 잡는다.  \n{0}  \n잠시 동안, 아무 일도 일어나지 않는다.  \n그러다 아래에서 두드리는 소리가 들린다.  \n<YellowHighlight><i>쿵. 쿵. 쿵.</i></YellowHighlight>  \n우모의 씹는 자는 침묵을 위해 한 발을 들어 올리지만, 모두가 이미 숨을 멈춘 이상 더 인상적일 수는 없다.  \n들린 판자 아래로 그림자가 움직인다.  \n영웅이 뛰어든다.  \n그림자도 뒤로 점프한다.  \n다음 몇 순간은 대체로 소음이다: 긁히는 발톱, 부서지는 나무, 놀란 외침, 그리고 중간에 기계음으로 변하는 하나의 영웅적인 선언.  \n식민지가 rush를 할 때, 우모의 씹는 자와 젊은 자원봉사자들은 멍이 들고 흔들린다.  \n하지만 그들은 빈 발로 나타나지 않는다.  \n불빛 속에, 부서진 저장 바닥에서 끌어낸, 아무도 알아보지 못하는 의식을 잃은 비버가 누워 있다.  \n[[C]][[-]]{1} 부상당한 비버."
csCZ = "Kryší Kousač zaujímá místo vedle staré skladové podlahy.\n{0}\nChvíli se nic neděje.\nPak se ozve klepání zespodu.\n<YellowHighlight><i>Klep. Klep. Klep.</i></YellowHighlight>\nKryší Kousač zvedá jednu paw pro ticho, což by bylo působivější, kdyby všichni už dříve nezastavili dech.\nPod zvednutou deskou se pohybuje stín.\nHrdina vyskočí.\nStín vyskočí zpět.\nDalší momenty jsou většinou hluk: škrábání drápů, tříštění dřeva, vyplašené výkřiky a jedno hrdinské prohlášení, které uprostřed změní v pištění.\nKdyž kolonie vtrhne dovnitř, Kryší Kousač a mladí dobrovolníci jsou potlučení a otřesení.\nAle nejsou prázdno-pawed.\nPři světle ohně, zatažený z rozbité skladové podlahy, leží nevědomý bobr, kterého nikdo nepoznává.\n[[C]][[-]]{1} Zraněný bobr."
viVN = "Chú Lèm Mang Áo đứng gần sàn kho cũ.  \n{0}  \nMột lúc sau, không có gì xảy ra.  \nRồi tiếng gõ vang lên từ bên dưới.  \n<YellowHighlight><i>Gõ. Gõ. Gõ.</i></YellowHighlight>  \nChú Lèm Mang Áo giơ một chân lên để ra hiệu im lặng, điều này sẽ ấn tượng hơn nếu mọi người chưa ngừng thở.  \nMột cái bóng di chuyển dưới tấm ván nâng lên.  \nNgười hùng nhảy lên.  \nCái bóng nhảy lùi lại.  \nNhững khoảnh khắc tiếp theo hầu hết chỉ toàn tiếng ồn: móng vuốt cào xé, gỗ nứt vỡ, những tiếng kêu hoảng hốt, và một tuyên bố anh hùng trở thành tiếng kêu nhỏ nửa chừng.  \nKhi thuộc địa lao vào, Chú Lèm Mang Áo và những tình nguyện viên trẻ đều bị bầm tím và rung rẩy.  \nNhưng họ không trở về tay trắng.  \nTrong ánh sáng của ngọn lửa, kéo ra từ sàn kho gãy nát, là một chú hải ly bất tỉnh mà không ai nhận ra.  \n[[C]][[-]]{1} Hải ly bị thương."
trTR = "Kepaze Çiğneyici, eski depolama katının yakınında pozisyon alır.  \n{0}  \nBir süre boyunca hiçbir şey olmaz.  \nOndan sonra alttan tıslamalar gelmeye başlar.  \n<YellowHighlight><i>Tıslama. Tıslama. Tıslama.</i></YellowHighlight>  \nKepaze Çiğneyici, sessizlik için bir pençesini kaldırır, bu daha etkileyici olurdu eğer herkes nefes almayı durdurmamış olsaydı.  \nYükseltilmiş tahtanın altında bir gölge hareket eder.  \nKahraman sıçrar.  \nGölge geri sıçrar.  \nSonraki birkaç an çoğunlukla gürültüyle geçer: tırnağın sesleri, çatırdayan ahşap, ürkek bağırışlar ve yarı yolda cırıltıya dönüşen bir kahramanca ilan.  \nKoloninin içeri girmesiyle, Kepaze Çiğneyici ve genç gönüllüler morarmış ve sarsılmış halde bulunurlar.  \nAma elleri boş değil.  \nAteş ışığında, kırık depolama katından sürüklenmiş, kimsenin tanımadığı baygın bir kunduz yatmaktadır.  \n[[C]][[-]]{1} Yaralı kunduz."

["LV.BCEv.CampfireMystery3.O1.Ch1C1"]
raw = "The torch burns bright enough to make every mask look braver than its owner. Resin smoke curls through the storage piles, sharp and golden, pushing the dark into narrow corners."
status = "normal"
enUS = "The torch burns bright enough to make every mask look braver than its owner. Resin smoke curls through the storage piles, sharp and golden, pushing the dark into narrow corners."
zhCN = "火把燃烧得足够明亮，让每个面具看起来比其主人更勇敢。树脂烟雾在储藏堆中盘旋，刺鼻而金黄，将黑暗推向狭窄的角落。"
zhTW = "火把燃燒得夠亮，讓每個面具看起來都比它的主人更勇敢。樹脂煙霧在儲存堆中盤旋，尖銳而金黃，將黑暗推入狹窄的角落。"
ruRU = "Факел светит так ярко, что каждая маска выглядит смелее своего владельца. Дым от смолы закручивается сквозь складские запасы, резкий и золотистый, загоняя тьму в узкие углы."
jaJP = "松明は明るく燃え、人形のマスクを所有者よりも勇敢に見せる。樹脂の煙が貯蔵の山の中でくるくると舞い、鋭く黄金色に輝き、暗闇を狭い隅へと押しやる。"
frFR = "La torche brille assez pour rendre chaque masque plus courageux que son propriétaire. La fumée de résine s'enroule à travers les piles de stockage, vive et dorée, repoussant l'ombre dans des coins étroits."
deDE = "Die Fackel brennt hell genug, um jede Maske mutiger erscheinen zu lassen als ihren Besitzer. Harzrauch schlängelt sich durch die Vorratshaufen, scharf und golden, und drängt die Dunkelheit in enge Ecken."
plPL = "Lampka pali się wystarczająco jasno, aby każda maska wyglądała odważniej niż jej właściciel. Dym żywiczny kręci się przez stosy zapasów, ostry i złocisty, pchając ciemność w wąskie zakamarki."
ptBR = "A tocha queima brilhante o suficiente para fazer cada máscara parecer mais corajosa do que seu proprietário. A fumaça de resina se enrola pelos montes de armazenamento, aguda e dourada, empurrando a escuridão para os cantos estreitos."
koKR = "토치는 모든 가면이 소유자보다 더 용감해 보이도록 밝게 타오릅니다. 송진 연기가 저장더미 사이로 감돌며 날카롭고 황금빛을 띠며 어둠을 좁은 구석으로 밀어냅니다."
csCZ = "Pořádně jasná pochodeň dává každé masce odvahu, která převyšuje jejího majitele. Dým z pryskyřice se vine skrze hromady materiálu, ostrý a zlatý, tlačí tmu do úzkých koutů."
viVN = "Ngọn đuốc cháy sáng đủ để khiến mọi mặt nạ trông dũng cảm hơn chủ nhân của nó. Khói nhựa cây quận tròn qua các đống lưu trữ, sắc nét và vàng, đẩy bóng tối vào những góc hẹp."
trTR = "Meşale, her maskenin sahibinden daha cesur görünmesini sağlayacak kadar parlak yanıyor. Reçine dumanı depolama yığınlarının arasından kıvrılarak geçiyor, keskin ve altın sarısı, karanlığı dar köşelere itiyor."

["LV.BCEv.CampfireMystery3.O1.Ch1C2"]
raw = "The berries are arranged with great ceremony. The Caped Chewer insists the bowl should face the heroic direction. No one asks what direction that is."
status = "normal"
enUS = "The berries are arranged with great ceremony. The Caped Chewer insists the bowl should face the heroic direction. No one asks what direction that is."
zhCN = "浆果排列得十分讲究。披风咀嚼者坚持碗要朝向英雄的方向。没有人问那是什么方向。"
zhTW = "漿果排列得非常隆重。披風咀嚼者堅持碗應該面向英勇的方向。沒有人問那是什麼方向。"
ruRU = "Ягоды аккуратно расположены с большой церемонией. Печальный Грызун настаивает, чтобы чаша смотрела в героическом направлении. Никто не спрашивает, в каком направлении это."
jaJP = "果実は盛大な儀式で並べられている。マントを羽織った噛み砕き屋は、ボウルが英雄的な方向を向くべきだと主張する。誰もその方向がどこなのか尋ねない。"
frFR = "Les baies sont disposées avec grande cérémonie. Le Rongeur Capé insiste pour que le bol fasse face à la direction héroïque. Personne ne demande quelle direction cela pourrait être."
deDE = "Die Beeren sind mit großer Zeremonie angeordnet. Der Käppchenkaiber insistiert, dass die Schüssel in heroischer Richtung ausgerichtet sein sollte. Niemand fragt, in welche Richtung das ist."
plPL = "Jagody są ułożone z wielką ceremonią. Kapelusznik z uporem twierdzi, że miska powinna być zwrócona w heroicznym kierunku. Nikt nie pyta, w którym to kierunku."
ptBR = "As frutas estão dispostas com grande cerimônia. O Roedor de Capa insiste que a tigela deve estar voltada na direção heroica. Ninguém pergunta qual direção é essa."
koKR = "베리들은 큰 의식을 가지고 배열되어 있다. 망토를 두른 먹는 자는 그릇이 영웅적인 방향을 향해야 한다고 주장한다. 아무도 그 방향이 무엇인지 묻지 않는다."
csCZ = "Bobule jsou uspořádány s velkou ceremonií. Kápovaný Žvýkač trvá na tom, že miska by měla směřovat hrdinským směrem. Nikdo se neptá, jaký směr to je."
viVN = "Những quả berry được sắp xếp với một buổi lễ trang trọng. Con Gặm Nhấm Đội Áo cho rằng cái bát nên hướng về phía anh hùng. Không ai hỏi hướng đó là hướng nào."
trTR = "Böğürtlenler büyük bir törenle düzenlenmiş. Pelerinli Çiğneyici, kasesinin kahraman yönüne bakması gerektiğini ısrarla belirtiyor. Hiç kimse o yönün ne olduğunu sormuyor."

["LV.BCEv.CampfireMystery3.O1.Ch1C3"]
raw = "The bait is placed near the raised plank, and the patrol keeps the area lit. The Inventor gives three pieces of advice, two warnings, and one diagram no one requested."
status = "normal"
enUS = "The bait is placed near the raised plank, and the patrol keeps the area lit. The Inventor gives three pieces of advice, two warnings, and one diagram no one requested."
zhCN = "诱饵放在了升起的木板附近，巡逻队保持了该区域的照明。发明家给出了三条建议，两个警告，以及一张没人要求的图示。"
zhTW = "餌放在抬起的木板附近，巡邏隊保持該區域有光。發明家給出了三條建議、兩個警告，還有一幅沒人請求的圖示。"
ruRU = "Наживка выставлена рядом с поднятой доской, и патруль поддерживает освещение в этой области. Изобретатель дает три совета, два предупреждения и одну диаграмму, которую никто не запрашивал."
jaJP = "餌は高く積まれた板の近くに置かれ、巡回者たちはそのエリアを明るく保つ。発明家は3つのアドバイス、2つの警告、そして誰も要求していない1つの図を提供する。"
frFR = "L'appât est placé près de la planche surélevée, et la patrouille garde la zone éclairée. L'Inventeur donne trois conseils, deux avertissements et un schéma que personne n'a demandé."
deDE = "Der Köder wird in der Nähe des erhöhten Bretts platziert, und die Patrouille hält das Gebiet beleuchtet. Der Erfinder gibt drei Ratschläge, zwei Warnungen und ein Diagramm, das niemand angefordert hat."
plPL = "Przynęta została umieszczona w pobliżu podniesionej deski, a patrol oświetla ten obszar. Wynalazca daje trzy rady, dwa ostrzeżenia i jeden diagram, którego nikt nie prosił."
ptBR = "A isca é colocada perto da tábua elevada, e a patrulha mantém a área iluminada. O Inventor dá três conselhos, dois avisos e um diagrama que ninguém pediu."
koKR = "미끼는 올라간 판자 근처에 놓이고, 순찰대는 그 지역을 밝게 유지합니다. 발명가는 세 가지 조언과 두 가지 경고, 그리고 아무도 요청하지 않은 하나의 도면을 제공합니다."
csCZ = "Nástraha je umístěna poblíž vyzdviženého prkna a hlídka udržuje oblast osvětlenou. Vynálezce dává tři rady, dvě varování a jeden diagram, o který nikdo nežádal."
viVN = "Mồi được đặt gần tấm ván nâng cao, và đội tuần tra giữ cho khu vực được chiếu sáng. Nhà phát minh đưa ra ba lời khuyên, hai cảnh báo và một sơ đồ không ai yêu cầu."
trTR = "Yem, kaldırılmış tahtanın yanına yerleştirildi ve devriye alanı aydınlatmaya devam ediyor. Mucit üç tavsiye, iki uyarı ve kimsenin talep etmediği bir şematik sunuyor."

["LV.BCEv.CampfireMystery3.O2"]
raw = "The guards take their posts near the old storage floor.\nThey have water, berries, and the kind of courage that gets quieter the longer the night lasts.\nThe Campfire burns behind them. The storage piles creak ahead of them. Beneath the raised plank, something shifts.\nThen the knocking comes.\n<YellowHighlight><i>Knock. Knock. Knock.</i></YellowHighlight>\nOne guard calls out.\nAnother steps closer.\nThe floor erupts.\nA shadow bolts from below, fast and wild with panic. The guards close ranks, but the thing fights like it has already decided capture means death.\nBy the time the colony reaches them, several guards are injured. A cup rolls across the dirt. Berries scatter underfoot.\nBut the shadow has been caught.\nIn the firelight, held down at last, lies an unconscious beaver no one recognizes.\n[[C]][[-]]{0} Beavers injured."
status = "normal"
enUS = "The guards take their posts near the old storage floor. They have water, berries, and the kind of courage that gets quieter the longer the night lasts. The Campfire burns behind them. The storage piles creak ahead of them. Beneath the raised plank, something shifts. Then the knocking comes. <YellowHighlight><i>Knock. Knock. Knock.</i></YellowHighlight> One guard calls out. Another steps closer. The floor erupts. A shadow bolts from below, fast and wild with panic. The guards close ranks, but the thing fights like it has already decided capture means death. By the time the colony reaches them, several guards are injured. A cup rolls across the dirt. Berries scatter underfoot. But the shadow has been caught. In the firelight, held down at last, lies an unconscious beaver no one recognizes. [[C]][[-]]{0} Beavers injured."
zhCN = "守卫们在旧储存层附近站岗。\n他们有水、有浆果，还有那种随着夜晚的延长而变得愈发安静的勇气。\n篝火在他们身后燃烧。储存的堆叠在他们面前吱吱作响。在抬起的木板下面，某种东西在移动。\n然后，敲击声响起。\n<YellowHighlight><i>敲。敲。敲。</i></YellowHighlight>\n一名守卫大声呼叫。\n另一名守卫走得更近。\n地板爆发了。\n一个阴影从下方猛冲而出，快速而疯狂，带着恐慌。守卫们紧密站成一排，但那个东西却像是已经决定被捕意味着死亡一般拼命反抗。\n当殖民地的人赶到时，几名守卫受了伤。一个杯子在泥土上滚动。浆果在脚下散落。\n但阴影被抓住了。\n在火光中，最终被压制住的是一只没人认出的小浣熊。 \n[[C]][[-]]{0} 受伤的海狸。"
zhTW = "守衛在舊儲物層附近就位。\n他們有水、有漿果，還有一種隨著夜晚延續而變得愈加安靜的勇氣。\n篝火在他們身後燃燒。儲物堆在他們面前吱吱作響。抬起的木板下，某些東西在移動。\n然後敲擊聲來了。\n<YellowHighlight><i>咚。咚。咚。</i></YellowHighlight>\n一名守衛叫了出來。\n另一名走得更近。\n地板爆炸了。\n一個影子迅速且驚慌失措地從下面衝出。守衛們緊急集結，但那東西掙扎得如同早已決定被捕就意味著死亡。\n等到殖民地的人到達他們那裡時，幾名守衛已經受傷。一個杯子在泥土上滾動，漿果四散在腳下。\n但那個影子已經被捕獲。\n在火光中，最後被壓制住的是一隻沒人認識的昏迷海狸。\n[[C]][[-]]{0} 海狸受傷。"
ruRU = "Стражи занимают свои посты у старого хранилища. У них есть вода, ягоды и такой вид мужества, который затихает по мере того, как продолжается ночь. Костер горит за ними. Доски хранилища скрипят перед ними. Под приподнятой доской что-то шевелится. Затем раздается стук. <YellowHighlight><i>Тук. Тук. Тук.</i></YellowHighlight> Один страж зовет. Другой подходит ближе. Пол взрывается. Тень вылетает снизу, быстрая и дикая от паники. Стражи сближаются, но это существо сражается так, будто уже решило, что плен значит смерть. К тому времени, как колония достигает их, несколько стражей ранены. Чашка катится по земле. Ягоды разлетаются под ногами. Но тень поймана. При свете огня, наконец, прижат к земле, лежит бессознательный бобер, которого никто не признает. [[C]][[-]]{0} Раненные бобры."
jaJP = "外階段の近くに守衛たちが詰めている。  \n彼らは水とベリー、夜が長くなるにつれて静かになっていく勇気を持っている。  \nキャンプファイヤーが彼らの背後で燃えている。倉庫の山が前方できしむ。持ち上げられた板の下で何かが動く。  \nそれからノック音が聞こえる。  \n<YellowHighlight><i>ノック。ノック。ノック。</i></YellowHighlight>  \n一人の守衛が声を上げる。  \n別の守衛が近づく。  \n床が破裂する。  \n影が下から跳び出す。パニックに満ちた速さで。守衛たちは陣形を整えるが、そいつはすでに捕まることが死を意味すると決めたかのように抵抗する。  \nコロニーが彼らに到達する頃には、数人の守衛が負傷している。カップが地面を転がる。ベリーが足元に散らばる。  \nしかし影は捕まった。  \n炎の光の中で、ついに押さえつけられたのは、誰もが認識しない無意識のビーバーだった。  \n[[C]][[-]]{0} ビーバーが負傷した。"
frFR = "Les gardes prennent leur poste près de l'ancien étage de stockage.  \nIls ont de l'eau, des baies, et le genre de courage qui s'atténue à mesure que la nuit dure.  \nLe feu de camp brûle derrière eux. Les piles de stockage craquent devant eux. Sous la planche surélevée, quelque chose bouge.  \nPuis viennent les coups.  \n<YellowHighlight><i>Tap. Tap. Tap.</i></YellowHighlight>  \nUn garde appelle.  \nUn autre s'approche.  \nLe sol explose.  \nUne ombre jaillit d'en dessous, rapide et sauvage de panique. Les gardes se resserrent, mais la chose se bat comme si elle avait déjà décidé que la capture signifie la mort.  \nAu moment où la colonie les atteint, plusieurs gardes sont blessés. Une tasse roule dans la terre. Des baies s'éparpillent sous les pieds.  \nMais l'ombre a été attrapée.  \nÀ la lumière du feu, maintenue enfin au sol, gît un castor inconscient que personne ne reconnaît.  \n[[C]][[-]]{0} Castors blessés."
deDE = "Die Wachen nehmen ihre Posten nahe dem alten Lagerboden ein.  \nSie haben Wasser, Beeren und die Art von Mut, die leiser wird, je länger die Nacht dauert.  \nDas Lagerfeuer brennt hinter ihnen. Die Lagertürme ächzen vor ihnen. Unter dem erhöhten Bretter verschiebt sich etwas.  \nDann kommt das Klopfen.  \n<YellowHighlight><i>Klopf. Klopf. Klopf.</i></YellowHighlight>  \nEin Wächter ruft.  \nEin anderer tritt näher.  \nDer Boden bricht auf.  \nEin Schatten zischt panikartig aus der Tiefe hervor. Die Wachen schließen sich zusammen, aber das Wesen kämpft, als hätte es bereits entschieden, dass eine Gefangennahme den Tod bedeutet.  \nAls die Kolonie sie erreicht, sind mehrere Wachen verletzt. Eine Tasse rollt durch den Dreck. Beeren verstreuen sich unter den Füßen.  \nAber der Schatten ist gefangen.  \nIm Licht des Feuers liegt schließlich ein ohnmächtiger Biber, den niemand erkennt.  \n[[C]][[-]]{0} Verletzte Biber."
plPL = "Strażnicy zajmują swoje miejsca przy starym podłożu magazynu. Mają wodę, jagody i rodzaj odwagi, która cichnie im dłużej trwa noc. Ognisko płonie za nimi. Stosy zapasów skrzypią przed nimi. Pod uniesioną deską coś się porusza. Wówczas dochodzi do stukania.  \n<YellowHighlight><i>Stuk. Stuk. Stuk.</i></YellowHighlight>  \nJeden strażnik woła. Inny zbliża się. Podłoga wybucha. cień wyskakuje z dołu, szybki i dziki z paniki. Strażnicy zamykają szyki, ale to coś walczy, jakby już zdecydowało, że ujęcie oznacza śmierć. Gdy kolonia do nich dociera, kilku strażników jest rannych. Kubek toczy się po ziemi. Jagody rozsypują się pod stopami. Ale cień został schwytany. W świetle ognia, ostatecznie przytrzymywany, leży nieprzytomny bóbr, którego nikt nie rozpoznaje.  \n[[C]][[-]]{0} Ranni bobry."
ptBR = "Os guardas tomam suas posições perto do velho piso de armazenamento. \nEles têm água, frutas e o tipo de coragem que fica mais quieta quanto mais longa a noite se torna. \nA fogueira queima atrás deles. As pilhas de armazenamento rangem à frente. Sob a tábua levantada, algo se move. \nEntão vêm as batidas. \n<YellowHighlight><i>Toque. Toque. Toque.</i></YellowHighlight> \nUm guarda grita. \nOutro se aproxima. \nO piso explode. \nUma sombra sai de baixo, rápida e selvagem com pânico. Os guardas fecham fileiras, mas a criatura luta como se já tivesse decidido que ser capturada significa morte. \nQuando a colônia os alcança, vários guardas estão feridos. Um copo rola pela terra. Frutas se espalham sob os pés. \nMas a sombra foi capturada. \nÀ luz do fogo, mantida para baixo finalmente, está um castor inconsciente que ninguém reconhece. \n[[C]][[-]]{0} Castores feridos."
koKR = "경비들이 오래된 창고 바닥 근처에 자리를 잡습니다.  \n그들은 물과 베리, 그리고 밤이 길어질수록 조용해지는 용기를 가지고 있습니다.  \n모닥불은 그들 뒤에서 타오르고, 창고 더미는 그들 앞에서 삐걱거립니다.  \n올려진 나무판 아래에서 무언가가 움직입니다.  \n그때 노크 소리가 들립니다.  \n<YellowHighlight><i>노크. 노크. 노크.</i></YellowHighlight>  \n한 경비가 외칩니다.  \n다른 경비가 가까이 다가옵니다.  \n바닥이 폭발합니다.  \n아래에서 그림자가 빠르고 불안하게 튀어나옵니다. 경비들은 진형을 잡지만, 그 생명체는 이미 붙잡히는 것이 죽음을 의미한다고 결심한 듯이 싸웁니다.  \n콜로니가 그들에게 도달했을 때, 몇몇 경비들이 부상을 입었습니다. 컵이 흙바닥을 굴러다니고, 발 밑에 베리가 흩어집니다.  \n하지만 그림자가 붙잡혔습니다.  \n불빛 아래, 드디어 제압된 채 누워 있는 것은 아무도 알아보지 못하는 의식을 잃은 비버입니다.  \n[[C]][[-]]{0} 부상당한 비버들."
csCZ = "Strážníci zaujímají svá místa poblíž staré skladové podlahy. Mají vodu, bobule a ten typ odvahy, která se s delší nocí stává tišší. Táborák hoří za nimi. Sklady před nimi vržou. Pod zvednutou deskou se něco hýbe. Potom přichází klapání.  \n<YellowHighlight><i>Klop. Klop. Klop.</i></YellowHighlight>  \nJeden strážný zavolá. Další se přiblíží. Podlaha exploduje. Stín vyletí zespodu, rychlý a divoký s panikou. Strážníci se uzavřou, ale to stvoření bojuje, jako by už rozhodlo, že zajetí znamená smrt. Když k nim kolonie dorazí, několik strážných je zraněných. Hrnček se kutálí po zemi. Bobule se rozsypávají pod nohama. Ale stín byl chycen. V ohni se nakonec ležící nesvědomitelný bobr, kterého nikdo nepoznává.  \n[[C]][[-]]{0} Zranění bobři."
viVN = "Các nhân viên canh gác đứng ở gần sàn kho cũ.\nHọ có nước, trái cây mọng và loại can đảm ngày càng im lặng khi đêm kéo dài.\nNgọn lửa bữa tiệc lửa cháy phía sau họ. Những đống hàng trong kho kêu cót két phía trước họ. Dưới thanh sàn nâng lên, một cái gì đó cựa quậy.\nRồi tiếng gõ đến.\n<YellowHighlight><i>Gõ. Gõ. Gõ.</i></YellowHighlight>\nMột nhân viên canh gác gọi to.\nMột người khác tiến lại gần hơn.\nSàn nhà bùng nổ.\nMột cái bóng lao ra từ bên dưới, nhanh chóng và hoảng loạn. Các nhân viên canh gác xích lại gần, nhưng cái thứ đó đấu tranh như thể nó đã quyết định rằng bị bắt có nghĩa là cái chết.\nVào thời điểm thuộc địa đến được với họ, vài nhân viên canh gác bị thương. Một chiếc cốc lăn trên đất. Trái cây mọng vương vãi dưới chân.\nNhưng cái bóng đã bị bắt.\nTrong ánh lửa, cuối cùng bị giữ lại, nằm một con hải ly bất tỉnh mà không ai nhận ra.\n[[C]][[-]]{0} Hải ly bị thương."
trTR = "Guardlar eski depolama katında yerlerini alıyor. Yanlarında su, böğürtlen ve gecenin uzadıkça sessizleşen türden bir cesaret var. Kamp Ateşi arkasında yanıyor. Depo yığınları önlerinde gıcırdıyor. Yükseltilmiş tahtanın altında bir şey hareket ediyor. Ardından vurma sesi geliyor. <YellowHighlight><i>Tok. Tok. Tok.</i></YellowHighlight> Bir gardiyan bağırıyor. Diğeri daha da yaklaşıyor. Zemin patlıyor. Altından bir gölge fırlıyor, panik içinde hızlı ve vahşi. Gardiyanlar birbirine yanaşıyor, ama şey, yakalanmanın ölüm olduğu konusunda zaten karar verdiği gibi savaşıyor. Koloni onlara ulaştığında, birkaç gardiyan yaralanmış. Bir kupa toprağın üzerinde yuvarlanıyor. Böğürtlenler ayakların altında dağılıyor. Ama gölge yakalandı. Ateş ışığında, en sonunda bastırılmış, kimsenin tanımadığı baygın bir kunduz yatıyor. [[C]][[-]]{0} Kunduzlar yaralı."

["LV.BCEv.CampfireMystery3.O3"]
raw = "The old storage floor is sealed before sunset.\nPlanks are nailed over the raised boards. Gaps are blocked. Loose corners are pressed flat until the floor looks ordinary again.\nFor a while, the knocking stops.\nSome beavers relax.\nThat is when it returns.\n<YellowHighlight><i>Knock. Knock. Knock.</i></YellowHighlight>\nFaster this time.\nLouder.\nNot a warning from beyond the dark, but a desperate sound from underneath.\nThe planks shudder. One snaps. Then another.\nA shadow bursts from the broken floor and crashes into the workers nearby. Paws scramble. Teeth flash. Someone shouts for help.\nThe colony fights back before fear can scatter them completely.\nWhen the noise finally ends, several workers are injured, the new planks are ruined, and an unconscious beaver no one recognizes lies beside the broken storage floor.\n[[C]][[-]]{0} Beavers injured."
status = "normal"
enUS = "The old storage floor is sealed before sunset. Planks are nailed over the raised boards. Gaps are blocked. Loose corners are pressed flat until the floor looks ordinary again. For a while, the knocking stops. Some beavers relax. That is when it returns. <YellowHighlight><i>Knock. Knock. Knock.</i></YellowHighlight> Faster this time. Louder. Not a warning from beyond the dark, but a desperate sound from underneath. The planks shudder. One snaps. Then another. A shadow bursts from the broken floor and crashes into the workers nearby. Paws scramble. Teeth flash. Someone shouts for help. The colony fights back before fear can scatter them completely. When the noise finally ends, several workers are injured, the new planks are ruined, and an unconscious beaver no one recognizes lies beside the broken storage floor. [[C]][[-]]{0} Beavers injured."
zhCN = "老储藏室的地板在日落之前被封闭。\n木板钉在抬起的地板上。缝隙被堵住。松动的角落被压平，直到地板看起来又回归普通。\n有一段时间，敲击声停止。\n一些海狸放松下来。\n就在此时，它再次回归。\n<YellowHighlight><i>咚。咚。咚。</i></YellowHighlight>\n这次更快。\n更响。\n不是来自黑暗中的警告，而是来自下面的绝望声。\n木板颤动。一块断裂。然后另一块。\n一个阴影从破损的地板冲出，撞向附近的工人。爪子忙乱地抓挠。牙齿闪烁。有人在呼救。\n在恐惧完全驱散之前，殖民地反击。\n当噪声最终结束时，几名工人受了伤，新木板也被毁坏，而一个无人认出的昏迷海狸躺在破损的储藏室地板旁。\n[[C]][[-]]{0} 海狸受伤。"
zhTW = "舊儲藏層在日落前被封閉。\n木板釘在抬高的地板上。縫隙被堵住。鬆動的角落被壓平，直到地板看起來又變得普通。\n一段時間內，敲擊聲停了下來。\n一些海狸放鬆下來。\n就在這時，它回來了。\n<YellowHighlight><i>敲。敲。敲。</i></YellowHighlight>\n這次更快。\n更響亮。\n不是來自黑暗中的警告，而是來自底下的絕望聲音。\n木板顫抖。一塊斷裂。然後另一塊。\n一個陰影從破裂的地板中衝出，撞向附近的工人。爪子亂舞。牙齒閃爍。有人呼救。\n在恐懼還未完全分散之前，殖民地開始反擊。\n當噪音最終結束時，幾名工人受傷，新木板毀壞，另一隻沒有任何人認識的昏迷海狸躺在破損的儲藏層旁邊。\n[[C]][[-]]{0} 海狸受傷。"
ruRU = "Старый пол склада запечатан до захода солнца. Доски прибиты поверх приподнятых панелей. Щели заблокированы. Слабые углы прижимаются до тех пор, пока пол не выглядит снова обычным. На некоторое время стук прекращается. Некоторые бобры расслабляются. Именно тогда он возвращается. <YellowHighlight><i>Стук. Стук. Стук.</i></YellowHighlight> Быстрее в этот раз. Громче. Не предупреждение из темноты, а отчаянный звук снизу. Доски дрожат. Одна трескается. Затем другая. Тень вырывается из сломанного пола и врезается в близлежащих работников. Лапы суетятся. Зубы блестят. Кто-то кричит о помощи. Колония сопротивляется, прежде чем страх может полностью их рассеять. Когда шум наконец затихает, несколько работников ранены, новые доски испорчены, и бессознательный бобр, которого никто не узнает, лежит рядом со сломанным полом склада. [[C]][[-]]{0} Бобры ранены."
jaJP = "古い倉庫の床は日没前に封印される。  \n板材が浮き上がった床の上に打ち付けられ、隙間が塞がれる。緩んだ角は押しつぶされ、床は再び普通に見えるようになる。  \nしばらくの間、叩く音が止む。  \n何匹かのビーバーがリラックスする。  \nその時、それが戻ってくる。  \n<YellowHighlight><i>ノック。ノック。ノック。</i></YellowHighlight>  \n今度は速く。  \n大きく。  \n暗闇の向こうからの警告ではなく、地下からの必死の音。  \n板材が震え、一枚が折れる。そしてまた一枚。  \n影が壊れた床から飛び出し、近くの作業者に衝突する。足がもつれ、牙が光る。誰かが助けを呼ぶ。  \nコロニーは恐れが完全になくなる前に反撃する。  \n音がようやく止むと、数人の作業者が怪我をし、新しい板材は台無しになり、誰も認識していない気絶したビーバーが壊れた倉庫の床の横に横たわっている。  \n[[C]][[-]]{0} ビーバーが負傷しました。"
frFR = "Le vieux sol de stockage est scellé avant le coucher du soleil.  \nDes planches sont clouées sur les planches surélevées. Les espaces sont bouchés. Les coins lâches sont aplatis jusqu'à ce que le sol redevienne ordinaire.  \nPendant un moment, les coups s'arrêtent.  \nQuelques castors se détendent.  \nC'est alors que cela revient.  \n<YellowHighlight><i>Knock. Knock. Knock.</i></YellowHighlight>  \nPlus rapide cette fois.  \nPlus fort.  \nCe n'est pas un avertissement venu des ténèbres, mais un son désespéré d'en dessous.  \nLes planches tremblent. L'une se casse. Puis une autre.  \nUne ombre éclate du sol brisé et s'écrase sur les travailleurs à proximité. Des pattes se précipitent. Des dents scintillent. Quelqu'un crie à l'aide.  \nLa colonie réplique avant que la peur ne puisse les disperser complètement.  \nQuand le bruit finit enfin, plusieurs travailleurs sont blessés, les nouvelles planches sont ruinées, et un castor inconscient que personne ne reconnaît gît à côté du sol de stockage brisé.  \n[[C]][[-]]{0} Castors blessés."
deDE = "Der alte Lagerboden ist vor Sonnenuntergang versiegelt. Dielen werden über die erhöhten Bretter genagelt. Fugen werden blockiert. Lockere Ecken werden platt gedrückt, bis der Boden wieder gewöhnlich aussieht. Eine Zeit lang hört das Klopfen auf. Einige Biber entspannen sich. Dann kehrt es zurück. <YellowHighlight><i>Klopf. Klopf. Klopf.</i></YellowHighlight> Schneller diesmal. Lauter. Keine Warnung aus der Dunkelheit, sondern ein verzweifelter Laut von unten. Die Dielen beben. Eine snappt. Dann eine andere. Ein Schatten bricht aus dem zerbrochenen Boden hervor und rast in die nahegelegenen Arbeiter. Pfoten wirbeln. Zähne blitzen. Jemand ruft um Hilfe. Die Kolonie wehrt sich, bevor die Angst sie vollständig zerstreuen kann. Als der Lärm endlich endet, sind mehrere Arbeiter verletzt, die neuen Dielen ruiniert und ein bewusstloser Biber, den niemand erkennt, liegt neben dem zerbrochenen Lagerboden. [[C]][[-]]{0} Verletzte Biber."
plPL = "Stara podłoga magazynu jest uszczelniona przed zachodem słońca. Deski są przybite nad podniesionymi deskami. Szpary są zablokowane. Luźne kąty są przyciśnięte, aż podłoga znów wygląda zwyczajnie. Przez chwilę stuki ustają. Niektóre bobry się relaksują. Wtedy to wraca. <YellowHighlight><i>Stuk. Stuk. Stuk.</i></YellowHighlight> Szybciej tym razem. Głośniej. Nie jest to ostrzeżenie z mroku, lecz desperacki dźwięk z dołu. Deski drżą. Jedna pęka. Potem kolejna. Cień wybucha z pękniętej podłogi i uderza w pracowników w pobliżu. Łapy się miotają. Zęby błyszczą. Ktoś woła o pomoc. Kolonia stawia opór, zanim strach całkowicie ich rozproszy. Gdy hałas w końcu ustaje, kilku pracowników jest rannych, nowe deski są zniszczone, a nieprzytomny bóbr, którego nikt nie rozpoznaje, leży obok pękniętej podłogi magazynu. [[C]][[-]]{0} Ranne bobry."
ptBR = "O antigo piso de armazenamento está selado antes do pôr do sol.  \nPranchas são pregadas sobre os tabuleiros levantados. Fendas são bloqueadas. Cantos soltos são pressionados até que o piso pareça comum novamente.  \nPor um tempo, os batidas param.  \nAlguns castores relaxam.  \nÉ então que ele retorna.  \n<YellowHighlight><i>Tok. Tok. Tok.</i></YellowHighlight>  \nMais rápido desta vez.  \nMais alto.  \nNão é um aviso do além da escuridão, mas um som desesperado debaixo.  \nAs pranchas tremem. Uma quebra. Então outra.  \nUma sombra irrompe do piso quebrado e colide com os trabalhadores próximos. Patas se atrapalham. Dentes brilham. Alguém grita por ajuda.  \nA colônia revida antes que o medo consiga dispersá-los completamente.  \nQuando o barulho finalmente termina, vários trabalhadores estão feridos, as novas pranchas estão arruinadas, e um castor inconsciente que ninguém reconhece está deitado ao lado do piso de armazenamento quebrado.  \n[[C]][[-]]{0} Castores feridos."
koKR = "해질 녘 전에 오래된 저장 바닥이 봉인됩니다. 판자들이 올린 판 위에 못이 박혀 있습니다. 틈이 막힙니다. 느슨한 모서리들은 바닥이 다시 평범해 보일 때까지 눌려 평평해집니다. 잠시 동안, 두드림 소리는 멈춥니다. 몇몇 비버들이 휴식을 취합니다. 그때 그것이 돌아옵니다. <YellowHighlight><i>똑똑. 똑똑. 똑똑.</i></YellowHighlight> 이번에는 더 빠릅니다. 더 큽니다. 어둠 너머에서 오는 경고가 아니라, 아래에서 나오는 절박한 소리입니다. 판자들이 떨립니다. 하나가 부러집니다. 그리고 또 하나. 그림자가 부서진 바닥에서 튀어나와 근처에 있는 일꾼들에게 부딪힙니다. 발이 바닥에서 헤매고 있습니다. 이가 번쩍입니다. 누군가 도움을 외칩니다. 식민지는 두려움이 그들을 완전히 흩어지게 하기 전에 저항합니다. 소음이 마침내 끝나면, 여러 명의 일꾼이 부상을 당하고, 새로운 판자는 망가져 있으며, 아무도 알지 못하는 의식을 잃은 비버가 부서진 저장 바닥 옆에 누워 있습니다. [[C]][[-]]{0} 부상당한 비버들."
csCZ = "Staré skladové patro je před západem slunce utěsněno. \nPrkna jsou přibita přes vyvýšené desky. Štěrbiny jsou zablokovány. Uvolněné rohy jsou rozmačkány, dokud patro opět nevypadá obyčejně. \nNa chvíli se bouchání zastaví. \nNěkteří bobři si odpočinou. \nTehdy se to vrátí. \n<YellowHighlight><i>Bouch. Bouch. Bouch.</i></YellowHighlight> \nRychleji tentokrát. \nHlasitěji. \nNení to varování z temnoty, ale zoufalý zvuk zespodu. \nPrkna se otřásají. Jedno praskne. Pak další. \nStín exploduje z rozbitého patra a narazí do blízkých dělníků. Tlapy se snaží uchopit. Zuby se blyští. Někdo volá o pomoc. \nKolonie se brání, než je strach může dokonale rozptýlit. \nKdyž hluk konečně skončí, několik dělníků je zraněno, nová prkna jsou zničená a bezvědomý bobr, kterého nikdo nepoznává, leží vedle rozbitého skladového patra. \n[[C]][[-]]{0} Bobři zranění."
viVN = "Sàn lưu trữ cũ được niêm phong trước khi mặt trời lặn.\nNhững thanh gỗ được đóng đinh lên các tấm ván dựng. Các kẽ hở được chặn lại. Những góc lỏng lẻo được ép phẳng cho đến khi sàn trông bình thường trở lại.\nTrong một thời gian, tiếng gõ ngừng lại.\nMột số chú bạch cáo thư giãn.\nĐó là lúc nó trở lại.\n<YellowHighlight><i>Gõ. Gõ. Gõ.</i></YellowHighlight>\nNhanh hơn lần này.\nTo hơn.\nKhông phải một cảnh báo từ bên kia bóng tối, mà là một âm thanh tuyệt vọng từ bên dưới.\nCác thanh gỗ rung chuyển. Một thanh gãy. Rồi một thanh khác.\nMột bóng đen vọt ra từ sàn bị vỡ và va chạm với những người công nhân gần đó. Các chân loạng choạng. Những chiếc răng lóe sáng. Ai đó la hét xin cứu trợ.\nThuộc địa phản kháng trước khi nỗi sợ hãi có thể khiến họ phân tán hoàn toàn.\nKhi tiếng ồn cuối cùng dừng lại, một vài công nhân bị thương, các tấm gỗ mới bị hủy hoại, và một chú bạch cáo bất tỉnh không ai nhận ra nằm cạnh sàn lưu trữ bị vỡ.\n[[C]][[-]]{0} Bạch cáo bị thương."
trTR = "Eski depolama zemini güneş batmadan önce kapatılır. Tahtalar yükseltilmiş yüzeylerin üzerine çivilenmiştir. Boşluklar kapatılmıştır. Gevşek köşeler, zemin tekrar sıradan görünene kadar düzleştirilir. Bir süre, vurma sesi durur. Bazı kunduzlar rahatlar. İşte o an geri döner. <YellowHighlight><i>Vur. Vur. Vur.</i></YellowHighlight> Bu sefer daha hızlı. Daha yüksek sesle. Karanlığın ötesinden bir uyarı değil, alt taraftan gelen umutsuz bir ses. Tahtalar titrer. Bir tanesi çatlar. Sonra bir diğeri. Kırık zeminlerden bir gölge fırlayarak yakındaki işçilerin üzerine düşer. Pençeler savrulur. Dişler parıldar. Birisi yardım ister. Koloni, korku tamamen dağıtılmadan geri savaşır. Gürültü sonunda bittiğinde, birkaç işçi yaralıdır, yeni tahtalar harap olmuştur ve tanınmayan baygın bir kunduz kırık depolama zemininde yatmaktadır. [[C]][[-]]{0} Kunduzlar yaralı."

