zhTW = "「[[C]]支付 {0} 在舊儲藏室樓層附近放置餌料，並保持英雄的守望點亮。」"
ruRU = "[[C]]Заплатите {0}, чтобы установить приманку рядом со старым складским полом и поддерживать свет героев."
jaJP = "[[C]]{0}を支払って古い収納フロアの近くに餌を設置し、英雄の監視を灯し続ける。"
