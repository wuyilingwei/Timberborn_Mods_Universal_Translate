["LV.BCEv.CampfireMystery3.Content"]
raw = "{0}\nThe next night, the Campfire is louder than the stories.\nEvery beaver has an opinion about the old storage floor. Some want patience. Some want guards. Some want the floor opened at once, preferably by someone else.\nThen the young beavers make their proposal.\nThey have prepared bark masks, a leaf cape, and a heroic name that no adult remembers approving.\n<b>The Caped Chewer.</b>\nThe elders stare.\nThe Inventor asks whether this is a patrol, a performance, or a workplace accident waiting for witnesses.\nThe Caped Chewer says it is all three, which does not help.\nStill, the colony must act. Something is beneath the old storage floor. Something hungry, clever, and afraid of being seen.\nTonight, the beavers will stop waiting for the knocking to come to them."
status = "normal"
enUS = "{0}\nThe next night, the Campfire is louder than the stories.\nEvery beaver has an opinion about the old storage floor. Some want patience. Some want guards. Some want the floor opened at once, preferably by someone else.\nThen the young beavers make their proposal.\nThey have prepared bark masks, a leaf cape, and a heroic name that no adult remembers approving.\n<b>The Caped Chewer.</b>\nThe elders stare.\nThe Inventor asks whether this is a patrol, a performance, or a workplace accident waiting for witnesses.\nThe Caped Chewer says it is all three, which does not help.\nStill, the colony must act. Something is beneath the old storage floor. Something hungry, clever, and afraid of being seen.\nTonight, the beavers will stop waiting for the knocking to come to them."
zhCN = "{0}\n下一个晚上，篝火的声音比故事更大。\n每只海狸对旧储存地板都有意见。有些想要耐心等待。有些想要守卫。有些希望地板立即打开，最好是由其他人来做。\n然后年轻的海狸们提出了他们的提议。\n他们准备了树皮面具、一件叶子斗篷和一个没有哪个成年海狸记得批准的英雄名字。  \n<b>披风啃者。</b>\n长老们目瞪口呆。  \n发明家询问这是一场巡逻、一场表演，还是一起等待目击者的工作场所事故。  \n披风啃者说这三者兼而有之，这并没有帮助。  \n不过，殖民地必须采取行动。旧储存地板下方有什么东西。某种饥饿、聪明且害怕被看到的东西。  \n今晚，海狸们将停止等待敲门声来找他们。"
zhTW = "{0}\n第二晚，營火的聲音比故事更響亮。\n每隻海狸對舊儲存地板都有自己的看法。有些希望耐心等待。有些希望有警衛。有些希望地板立刻被打開，最好是由別人來做。\n然後年輕的海狸提出了他們的提議。\n他們準備了樹皮面具、一件葉子斗篷，還有一個沒有成年人記得批准的英雄名字。\n<b>披風咀嚼者。</b>\n長老們呆住了。\n發明家問這是巡邏、表演還是等待目擊者的工作場所事故。\n披風咀嚼者說這三者皆是，這並沒有幫助。\n然而，殖民地必須行動。舊儲存地板下隱藏著某些東西。某種飢餓、聰明且害怕被看見的東西。\n今晚，海狸們將不再等待敲門聲找到他們。"
ruRU = "{0}\nСледующей ночью костер громче, чем истории.\nКаждый бобр имеет свое мнение насчет старого складского пола. Одни хотят терпения. Другие хотят охраны. Некоторые хотят, чтобы пол вскрыли прямо сейчас, желательно кем-то другим.\nПотом молодые бобры выдвигают свое предложение.\nОни подготовили кору для масок, плащ из листьев и героическое имя, которое никто из взрослых не помнит, чтобы одобрить.\n<b>Плащевой Грызун.</b>\nСтарейшины смотрят в недоумении.\nИзобретатель спрашивает, является ли это патрулем, представлением или несчастным случаем на рабочем месте, ожидающим свидетелей.\nПлащевой Грызун говорит, что это и то, и другое, и третье, что не поможет.\nТем не менее, колонии нужно действовать. Что-то находится под старым складским полом. Что-то голодное, умное и боящееся быть замеченным.\nСегодня ночью бобры перестанут ждать, когда стук придет к ним."
jaJP = "{0}\n翌晩、キャンプファイヤーは物語よりも大きな音を立てている。\nすべてのビーバーが、古い貯蔵庫の床について意見を持っている。中には忍耐を求める者もいれば、警備を求める者も、誰か他の者によって床をすぐに開けることを望む者もいる。\nすると、若いビーバーたちが提案をする。\n彼らは樹皮のマスク、葉のケープ、そして大人たちが承認したことを覚えていない英雄的な名前を準備した。\n<b>マントを着た噛み砕き屋。</b>\n長老たちは黙って見つめる。\n発明者はこれがパトロールなのか、パフォーマンスなのか、それとも目撃者を待つ職場の事故なのか尋ねる。\nマントを着た噛み砕き屋は、それがすべてだと言うが、役に立たない。\nそれでも、コロニーは行動しなければならない。古い貯蔵庫の床の下には何かがある。何かがひもじく、賢く、見られることを恐れている。\n今夜、ビーバーたちはノックが彼らのもとに来るのを待つのをやめる。"
frFR = "{0}\nLa nuit suivante, le feu de camp est plus bruyant que les histoires.\nChaque castor a une opinion sur l'ancienne rampe de stockage. Certains veulent de la patience. D'autres veulent des gardes. Certains veulent que le sol soit ouvert tout de suite, de préférence par quelqu'un d'autre.\nPuis les jeunes castors font leur proposition.\nIls ont préparé des masques en écorce, une cape en feuilles et un nom héroïque que aucun adulte ne se souvient d'avoir approuvé.\n<b>Le Ronfleur Capé.</b>\nLes anciens restent bouche bée.\nL'Inventeur demande s'il s'agit d'une patrouille, d'une performance ou d'un accident de travail attendant des témoins.\nLe Ronfleur Capé dit que c'est les trois à la fois, ce qui n'aide pas.\nPourtant, la colonie doit agir. Quelque chose se cache sous l'ancienne rampe de stockage. Quelque chose de famélique, rusé et ayant peur d'être vu.\nCe soir, les castors cesseront d'attendre que les coups viennent à eux."
deDE = "{0}  \nIn der nächsten Nacht ist das Lagerfeuer lauter als die Geschichten.  \nJeder Biber hat eine Meinung über den alten Lagerboden. Einige wollen Geduld. Einige wollen Wächter. Einige wollen, dass der Boden sofort geöffnet wird, vorzugsweise von jemand anderem.  \nDann machen die jungen Biber ihren Vorschlag.  \nSie haben Rindenmasken, einen Blätterumhang und einen heldenhaften Namen vorbereitet, den sich kein Erwachsener erinnern kann, genehmigt zu haben.  \n<b>Der Umhangträger.</b>  \nDie Alten starren.  \nDer Erfinder fragt, ob das eine Patrouille, eine Aufführung oder ein Arbeitsunfall ist, der auf Zeugen wartet.  \nDer Umhangträger sagt, es sei alles drei, was nicht hilft.  \nDennoch muss die Kolonie handeln. Etwas ist unter dem alten Lagerboden. Etwas Hungriges, Cleveres und Angst Habendes, gesehen zu werden.  \nHeute Nacht werden die Biber aufhören zu warten, bis das Klopfen zu ihnen kommt."
plPL = "{0}\nNastępnej nocy ognisko jest głośniejsze niż opowieści.\nKażdy bóbr ma swoją opinię na temat starej podłogi magazynowej. Niektórzy chcą cierpliwości. Niektórzy chcą strażników. Inni chcą, aby podłoga została otwarta od razu, najlepiej przez kogoś innego.\nWtedy młode bobry przedstawiają swoją propozycję.\nPrzygotowały maski z kory, płaszcz z liści i bohaterką nazwę, której żaden dorosły nie pamięta, aby zatwierdził.\n<b>Bóbr w pelerynie.</b>\nStarsze bobry się przyglądają.\nWynalazca pyta, czy to jest patroli, przedstawienie, czy wypadek w miejscu pracy czekający na świadków.\nBóbr w pelerynie mówi, że to wszystko, co nie pomaga.\nNiemniej jednak kolonia musi działać. Coś jest pod starą podłogą magazynową. Coś głodne, przebiegłe i bojące się, aby zostać zauważone.\nDziś wieczorem bobry przestaną czekać, aż stukanie przyjdzie do nich."
ptBR = "{0}\nNa noite seguinte, a fogueira está mais alta do que as histórias.\nCada castor tem uma opinião sobre o antigo piso de armazenamento. Alguns querem paciência. Alguns querem guardas. Alguns querem que o piso seja aberto de uma vez, preferencialmente por outra pessoa.\nEntão, os jovens castores fazem sua proposta.\nEles prepararam máscaras de casca, uma capa de folhas e um nome heroico que nenhum adulto se lembra de ter aprovado.\n<b>O Roedor Caped.</b>\nOs anciãos encararam.\nO Inventor pergunta se isso é uma patrulha, uma apresentação ou um acidente de trabalho esperando por testemunhas.\nO Roedor Caped diz que é tudo isso, o que não ajuda.\nAinda assim, a colônia deve agir. Algo está sob o antigo piso de armazenamento. Algo faminto, astuto e com medo de ser visto.\nHoje à noite, os castores vão parar de esperar que os batimentos venham até eles."
koKR = "{0}\n다음 밤, 캠프파이어는 이야기보다 더 시끄럽다.\n모든 비버들은 старый 저장소 바닥에 대한 의견이 있다. 어떤 이는 인내를 원하고, 어떤 이는 경비를 원하며, 어떤 이는 즉시 바닥이 열리길 원한다, 가능하면 다른 누군가에 의해.\n그러자 어린 비버들이 그들의 제안을 한다.\n그들은 나무껍질 가면, 나뭇잎 망토, 그리고 아무 어른도 승인을 기억하지 못하는 영웅적인 이름을 준비했다.\n<b>케이프를 쓴 이.</b>\n노인들은 응시한다.\n발명가는 이것이 순찰인지, 공연인지, 아니면 목격자를 기다리는 작업장 사고인지 묻는다.\n케이프를 쓴 이는 세 가지 모두라고 대답하지만, 도움이 되지 않는다.\n그럼에도 불구하고, 식민지는 행동해야 한다. 뭔가 고대 저장소 바닥 아래에 있다. 뭔가 배고프고, 영리하며, 보이는 것을 두려워하는.\n오늘 밤, 비버들은 자신에게 다가오는 노크를 기다리는 것을 멈출 것이다."
csCZ = "{0}\nPříští noc je táborák hlasitější než příběhy.\nKaždý bobr má názor na starou úložnou podlahu. Někteří chtějí trpělivost. Někteří chtějí stráže. Někteří chtějí podlahu otevřít hned, nejlépe někým jiným.\nPak mladí bobři předloží svůj návrh.\nPřipravili si masky z kůry, plášť z listů a hrdinské jméno, které si žádný dospělý nepamatuje, že by schválil.\n<b>Bobr s pláštěm.</b>\nStarší se dívají s úžasem.\nVynálezce se ptá, zda jde o hlídku, představení, nebo pracovní nehodu čekající na svědky.\nBobr s pláštěm říká, že je to všechno tři, což nepomáhá.\nI tak musí kolonie jednat. Něco je pod starou úložnou podlahou. Něco hladového, chytrého a vystrašeného ze svého odhalení.\nDnes večer bobři přestanou čekat, až k nim klepání přijde."
viVN = "{0}\nTối tiếp theo, ngọn lửa trại lớn hơn cả những câu chuyện.\nMỗi con rái cá có một ý kiến về sàn kho cũ. Một số muốn kiên nhẫn. Một số muốn có lính gác. Một số muốn mở sàn ngay lập tức, tốt nhất là do người khác.\nRồi những con rái cá trẻ đưa ra đề xuất của chúng.\nChúng đã chuẩn bị mặt nạ vỏ cây, áo choàng lá, và một cái tên anh hùng mà không con người lớn nào nhớ đã phê duyệt.\n<b>Người Gặm Vỏ Cây Đeo Áo Choàng.</b>\nCác vị trưởng lão nhìn chằm chằm.\nNhà phát minh hỏi đây là một cuộc tuần tra, một buổi biểu diễn, hay một tai nạn lao động đang chờ chứng kiến.\nNgười Gặm Vỏ Cây Đeo Áo Choàng nói rằng đó là cả ba điều, điều này không hề giúp ích.\nDù vậy, thuộc địa phải hành động. Có điều gì đó dưới sàn kho cũ. Một điều gì đó đói khát, thông minh, và sợ bị nhìn thấy.\nTối nay, những con rái cá sẽ ngừng chờ đợi tiếng gõ cửa tìm đến chúng."
trTR = "{0}\nSonraki gece, Kamp Ateşi hikayelerden daha gürültülü.\nHer bir kunduzun eski depolama katı hakkında bir fikri var. Bazıları sabır istiyor. Bazıları bekçiler istiyor. Bazıları katın bir an önce, tercihen bir başkası tarafından açılmasını istiyor.\nSonra genç kunduzlar önerilerini sunuyor.\nBark maske, yaprak pelerin ve hiç kimsenin onayladığını hatırlamadığı bir kahraman ismi hazırlamışlar.\n<b>Pelerinli Çiğneyici.</b>\nBüyüklere bakışıyorlar.\nMucit, bunun bir devriye, bir gösteri mi yoksa tanık bekleyen bir iş kazası mı olduğunu soruyor.\nPelerinli Çiğneyici bunun hepsi olduğunu söylüyor, bu da pek yardımı olmuyor.\nYine de, koloninin harekete geçmesi gerekiyor. Eski depolama katının altında bir şey var. Bir şey, aç, zeki ve görülmekten korkuyor.\nBu gece, kunduzlar kapının onlara gelmesini beklemeyi bırakacaklar."

["LV.BCEv.CampfireMystery3.Content.Ch1C1"]
raw = "The colony remembers the way the knocking retreated from the light.\nIf the thing under storage fears the glow, then the boldest plan is obvious: carry the glow closer.\nThis is how the Caped Chewer explains it.\nThis is also how several elders realize the cape is probably flammable."
status = "normal"
enUS = "The colony remembers the way the knocking retreated from the light.  \nIf the thing under storage fears the glow, then the boldest plan is obvious: carry the glow closer.  \nThis is how the Caped Chewer explains it.  \nThis is also how several elders realize the cape is probably flammable."
zhCN = "殖民地记得敲击声如何从光中退去。\n如果储存物体害怕光芒，那么最大胆的计划显而易见：将光芒带得更近。\n这就是斗篷啃噬者解释的方式。\n这也是几位长者意识到斗篷很可能易燃的方式。"
zhTW = "殖民地記得敲擊聲如何從光明中退去。  \n如果儲藏中的東西害怕光芒，那麼最大膽的計劃就顯而易見：將光芒帶得更近。  \n這就是斗篷咀嚼者的解釋。  \n這也是幾位長者意識到斗篷可能是可燃的原因。"
ruRU = "Колония помнит, как knocking отступал от света.  \nЕсли то, что под хранением, боится сияния, тогда самый смелый план очевиден: приблизить сияние.  \nВот как это объясняет Плутоватый Грызун.  \nТакже это понимают несколько старейшин, осознавая, что накидка, вероятно, горюча."
jaJP = "コロニーはノックの音が光から退く様子を覚えている。  \nもし貯蔵庫の下にあるものが光を恐れるのなら、最も大胆な計画は明白だ：光をもっと近くに運ぶことだ。  \nこれがマントを持つかじり屋の説明だ。  \nこれによって、いくつかの長老たちがマントはおそらく燃えやすいものだと理解する。"
frFR = "La colonie se souvient de la façon dont les coups reculaient face à la lumière.  \nSi la chose sous le stockage craint la lueur, alors le plan le plus audacieux est évident : rapprocher la lueur.  \nC'est ainsi que le Rongeur Capé l'explique.  \nC'est aussi ainsi que plusieurs anciens réalisent que la cape est probablement inflammable."
deDE = "Die Kolonie erinnert sich daran, wie das Klopfen sich vom Licht zurückzog. Wenn das Ding unter der Lagerung das Glühen fürchtet, dann ist der kühnste Plan offensichtlich: Trage das Glühen näher heran. So erklärt es der Umhangträger. So erkennen auch mehrere Älteste, dass der Umhang wahrscheinlich brennbar ist."
plPL = "Kolonia pamięta, jak stukanie oddalało się od światła.  \nJeśli to, co jest pod magazynem, boi się blasku, to najodważniejszy plan jest oczywisty: przenieść blask bliżej.  \nW ten sposób Kapelusznik to wyjaśnia.  \nW ten sposób kilka starszyzn uświadamia sobie, że peleryna prawdopodobnie jest łatwopalna."
ptBR = "A colônia se lembra da maneira como os batimentos recuaram da luz.  \nSe a coisa sob armazenamento teme o brilho, então o plano mais audacioso é óbvio: levar o brilho mais perto.  \nÉ assim que o Mastigador de Capa explica.  \nÉ também assim que vários anciãos percebem que a capa provavelmente é inflamável."
koKR = "식민지는 두드림이 빛에서 물러나는 방식을 기억한다.  \n저장소 아래에 있는 것이 빛을 두려워한다면, 가장 대담한 계획은 분명하다: 빛을 더 가까이 가져가라.  \n이것이 망토를 두른 씹는 자가 설명하는 방식이다.  \n이것이 여러 노인들이 망토가 아마도 가연성일 것이라고 깨닫는 방식이기도 하다."
csCZ = "Kolonie si pamatuje, jak klepání ustupovalo od světla.  \nPokud se to, co je pod úložištěm, bojí lesku, pak je nejodvážnější plán zřejmý: přiblížit lesk blíž.  \nTakto to vysvětluje Plášťový žrout.  \nA takto si také několik starších uvědomuje, že plášť je pravděpodobně hořlavý."
viVN = "Colony nhớ cách mà tiếng gõ lùi lại từ ánh sáng.  \nNếu thứ ở dưới kho sợ ánh sáng, thì kế hoạch táo bạo nhất là rõ ràng: mang ánh sáng lại gần hơn.  \nĐây là cách mà Chú Gặm Dơi giải thích điều này.  \nĐây cũng là cách mà vài bậc trưởng lão nhận ra rằng chiếc áo có thể cháy được."
trTR = "Koloni, vurmaların ışıktan nasıl geri çekildiğini hatırlıyor. Eğer depolama altındaki şey parıltıdan korkuyorsa, o zaman en cesur plan açıktır: parıltıyı daha yakın taşı. Kaptan Çiğneyici bunu böyle açıklar. Birçok yaşlı da pelerinlerin muhtemelen yanıcı olduğunu böyle fark eder."

["LV.BCEv.CampfireMystery3.Content.Ch1C2"]
raw = "The colony remembers the empty bowl, the missing berries, and the careful spiral left beside them.\nIf the thing under storage is hungry, perhaps it can be drawn out without fear.\nThis is how the Caped Chewer explains it.\nThe Inventor calls it bait. The Caped Chewer calls it a heroic invitation snack."
status = "normal"
enUS = "The colony remembers the empty bowl, the missing berries, and the careful spiral left beside them.  \nIf the thing under storage is hungry, perhaps it can be drawn out without fear.  \nThis is how the Caped Chewer explains it.  \nThe Inventor calls it bait. The Caped Chewer calls it a heroic invitation snack."
zhCN = "殖民地记得那个空碗、失踪的浆果，以及它们旁边留下的细致螺旋。\n如果储存处的东西感到饥饿，也许可以在不害怕的情况下将其引出来。\n这就是披风咀嚼者的解释。\n发明家称之为饵料。披风咀嚼者称之为英雄的邀请小吃。"
zhTW = "殖民地記得那空碗、失踪的漿果，以及旁邊留下的謹慎螺旋。  \n如果儲存處的東西感到饑餓，也許可以在不害怕的情況下引誘出來。  \n披風咀嚼者就是這樣解釋的。  \n發明家稱之為誘餌。披風咀嚼者稱之為英雄的邀請小吃。"
ruRU = "Колония помнит пустую чашку, пропавшие ягоды и осторожную спираль, оставленную рядом.\nЕсли то, что хранится, голодно, возможно, его можно привлечь без страха.\nТак это объясняет Плащевой Грызун.\nИзобретатель называет это наживкой. Плащевой Грызун называет это героическим закусочным приглашением."
jaJP = "コロニーは空のボウル、失われたベリー、そしてその横に残された注意深い螺旋を思い出す。\nもし貯蔵の下にあるものが空腹であれば、恐れずに引き出せるかもしれない。\nこれがマントを羽織った噛みつき者の説明である。\n発明家はこれを餌と呼び、マントを羽織った噛みつき者はこれを英雄的な招待のおやつと呼ぶ。"
frFR = "La colonie se souvient du bol vide, des baies manquantes, et de la spirale soignée laissée à côté d'eux.\nSi la chose sous le stockage a faim, peut-être peut-elle être attirée sans crainte.\nC'est ainsi que l'Abeille Capée l'explique.\nL'Inventeur l'appelle appât. L'Abeille Capée l'appelle un en-cas d'invitation héroïque."
deDE = "Die Kolonie erinnert sich an die leere Schüssel, die fehlenden Beeren und die sorgfältige Spirale, die neben ihnen zurückgelassen wurde. \nWenn das Ding unter der Lagerung hungrig ist, vielleicht kann es ohne Angst herausgelockt werden. \nSo erklärt es der Kapuzenkauler. \nDer Erfinder nennt es Köder. Der Kapuzenkauler nennt es einen heldenhaften Einladungs-Snack."
plPL = "Kolonia pamięta pustą misę, znikające jagody i staranny spiralkę zostawioną obok nich.  \nJeśli to, co jest w magazynie, jest głodne, być może można je wyciągnąć bez obaw.  \nTak to wyjaśnia Kapelusznik.  \nWynalazca nazywa to przynętą. Kapelusznik nazywa to heroiczną przekąską zapraszającą."
ptBR = "A colônia se lembra da tigela vazia, das frutas desaparecidas e da espiral cuidadosa deixada ao lado delas.  \nSe a criatura sob o armazenamento estiver com fome, talvez possa ser atraída sem medo.  \nÉ assim que o Mastigador Caped explica.  \nO Inventor chama de isca. O Mastigador Caped chama de um lanche de convite heroico."
koKR = "식민지는 비어 있는 그릇, 사라진 베리, 그리고 그 옆에 놓인 조심스러운 나선형을 기억합니다.  \n저장소 아래의 것이 배가 고프다면, 두려움 없이 끌어낼 수 있을지도 모릅니다.  \n이것이 망토를 두른 먹는 자가 설명하는 방법입니다.  \n발명가는 그것을 미끼라고 부릅니다. 망토를 두른 먹는 자는 그것을 영웅적인 초대 간식이라고 부릅니다."
csCZ = "Kolonie si pamatuje prázdnou misku, chybějící bobule a pečlivě vytvořenou spirálu vedle nich.  \nPokud je věc pod skladem hladová, možná ji lze vylákat bez obav.  \nTakto to vysvětluje Přízrak s pláštěm.  \nVynálezce to nazývá návnadou. Přízrak s pláštěm to nazývá hrdinským pozvánkovým občerstvením."
viVN = "Đ колóny ghi nhớ cái bát rỗng, những quả mọng bị mất và vòng xoắn cẩn thận để lại bên cạnh chúng.\nNếu thứ dưới kho hàng đang đói, có lẽ nó có thể được kéo ra mà không sợ hãi.\nĐây là cách mà Người Nhai Mũ Trùm giải thích điều đó.\nNhà Phát Minh gọi nó là mồi. Người Nhai Mũ Trùm gọi nó là món ăn mời gọi anh hùng."
trTR = "Koloni boş kaseleri, kaybolan meyveleri ve yanlarında bırakılan dikkatli spirali hatırlıyor. \nEğer depodaki şey açsa, belki korkmadan dışarı çıkartılabilir. \nKapüşonlu Çiğneyici bunu böyle açıklar. \nMucit buna yem diyor. Kapüşonlu Çiğneyici ise kahramanca bir davet atıştırmalığı diyor."

["LV.BCEv.CampfireMystery3.Content.Ch1C3"]
raw = "The colony remembers the Inventor's device trembling toward the old storage floor.\nIf the sound comes from below, then the trap must be set above.\nThis is how the Caped Chewer explains it.\nThe Inventor is pleased to be cited as evidence and alarmed to be included in the plan."
status = "normal"
enUS = "The colony remembers the Inventor's device trembling toward the old storage floor. If the sound comes from below, then the trap must be set above. This is how the Caped Chewer explains it. The Inventor is pleased to be cited as evidence and alarmed to be included in the plan."
zhCN = "殖民地记得发明家的装置颤抖着朝着旧储藏层走去。\n如果声音来自下方，那么陷阱一定是在上方设置的。\n这就是披风啃噬者的解释。\n发明家很高兴被作为证据引用，却对被纳入计划感到不安。"
zhTW = "殖民地記得發明家的裝置朝著舊儲藏室的地板顫抖而去。\n如果聲音來自下方，那麼陷阱必然設在上方。\n這就是披風齧齒獸的解釋。\n發明家很高興自己被引用作證據，但也對被包括在計畫中感到擔憂。"
ruRU = "Колония вспоминает, как устройство Изобретателя дрожит на старом складе. Если звук доносится снизу, значит, ловушка должна быть установлена сверху. Именно так объясняет это Плащевой Грызун. Изобретатель рад, что его цитируют в качестве доказательства, и встревожен тем, что он включен в план."
jaJP = "コロニーは、発明家の装置が古い収納フロアに向かって震えているのを思い出します。  \n音が下から聞こえるなら、罠は上に仕掛けられているはずです。  \nケープを着た咀嚼者はこう説明します。  \n発明家は証拠として引用されることを喜び、計画に含まれることに驚いています。"
frFR = "La colonie se souvient de l'appareil de l'Inventeur tremblant sur l'ancien étage de stockage.  \nSi le bruit vient d'en bas, alors le piège doit être placé au-dessus.  \nC'est ainsi que l'Agent à Cape l'explique.  \nL'Inventeur est ravi d'être cité comme preuve et alarmé d'être inclus dans le plan."
deDE = "Die Kolonie erinnert sich an das Gerät des Erfinders, das zum alten Lagerboden zittert. Wenn das Geräusch von unten kommt, muss die Falle oben eingerichtet sein. So erklärt es der Kapuzenträger. Der Erfinder ist erfreut, als Beweis zitiert zu werden, und besorgt, in den Plan einbezogen zu werden."
plPL = "Kolonia pamięta urządzenie Wynalazcy drżące w kierunku starego poziomu magazynowego.  \nJeśli dźwięk pochodzi z dołu, to pułapka musi być ustawiona na górze.  \nTak to tłumaczy Kapelusznik.  \nWynalazca jest zadowolony, że może być cytowany jako dowód i zaniepokojony, że został włączony do planu."
ptBR = "A colônia se lembra do dispositivo do Inventor tremendo em direção ao antigo andar de armazenamento. Se o som vem de baixo, então a armadilha deve estar montada acima. É assim que o Mastigador de Capa explica. O Inventor fica satisfeito por ser citado como evidência e alarmado por estar incluído no plano."
koKR = "식민지는 발명가의 장치가 오래된 저장 공간으로 떨며 다가오는 것을 기억합니다.  \n소리가 아래에서 나왔다면, 함정은 위에 설치되어 있어야 합니다.  \n이것이 망토를 두른 씹는 자가 설명하는 방법입니다.  \n발명가는 증거로 인용되는 것에 기뻐하지만, 계획에 포함되는 것에 놀랍니다."
csCZ = "Kolonie si pamatuje, jak se vynálezcův přístroj chvěje směrem ke staré skladovací podlaze.  \nPokud zvuk přichází zdola, pak musí být past nastražena nahoře.  \nTak to vysvětluje Kápěd Ryzák.  \nVynálezce je potěšen, že je citován jako důkaz, a znepokojen, že je zahrnut do plánu."
viVN = "Colony nhớ lại thiết bị của Nhà phát minh rung rinh đến tầng kho cũ.  \nNếu âm thanh phát ra từ phía dưới, thì cái bẫy phải được đặt ở trên.  \nĐây là cách mà Kẻ gặm Chip giải thích.  \nNhà phát minh hài lòng khi được trích dẫn làm bằng chứng và lo lắng khi bị đưa vào kế hoạch."
trTR = "Koloni, İcadın eski depolama katına doğru titreyen cihazını hatırlıyor. \nEğer ses aşağıdan geliyorsa, o zaman tuzak üstte kurulmalıdır. \nKapüşonlu Dişçi bunu böyle açıklıyor. \nİcatçı, delil olarak belirtilmekten memnun, plana dahil edilmekten ise endişeli."

