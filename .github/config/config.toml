
[languages]
# Supported languages for translation
# Format: language_code (e.g., "enUS", "zhCN", "zhTW", etc.)
supported = ["enUS", "zhCN", "zhTW", "ruRU", "jaJP", "frFR", "deDE", "plPL", "ptBR", "koKR", "csCZ", "viVN"]
game_supported = ["zhCN", "jaJP", "zhTW", "enUS", "frFR", "deDE", "esES", "plPL", "ptBR", "ruRU", "itIT", "koKR", "ukUA", "thTH", "trTR"]

[languages.locale_names]
enUS = "English (US)"
zhCN = "Simplified Chinese"
zhTW = "Traditional Chinese"
ruRU = "Russian"
jaJP = "Japanese"
frFR = "French"
deDE = "German"
plPL = "Polish"
ptBR = "Brazilian Portuguese"
koKR = "Korean"
csCZ = "Czech"
viVN = "Vietnamese"

[build]
protect_string_ids_file = "enUS.txt"
extra_protect_string_ids = ["Beaver.NamePool", "MainMenu.RosettaOn", "Settings.Language.Name"]

[rate_limiter]
# Maximum requests per minute (RPM)
max_requests_per_minute = 4000

# File-level concurrency: how many files to translate in parallel.
# Each file processes entries sequentially, but translates all languages
# within an entry in parallel (up to max_threads_per_file).
# This model prevents over-parallelization and reduces rate-limit pressure.
max_threads = 10

# Maximum language-level threads per entry.
# Within each entry, all target languages are translated in parallel.
# With 12 target languages, setting this to 12 means all languages translate at once.
max_threads_per_file = 12

[llm]
# LLM model to use for translation
model = "gpt-5-nano"

# API endpoint (OpenAI-compatible)
api_url = "https://api.openai.com/v1/chat/completions"

# Minimum text length to translate
min_length = 1

# Maximum text length to translate
max_length = 5000

[logging]
# Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
level = "INFO"

# Dedicated thread-allocation / work-info log file.
# Captures all thread lifecycle events (start/end), file assignments,
# entry assignments, and language translation work at DEBUG level,
# regardless of the main log level above.
# Set to "" or remove to disable.
thread_log_file = ".github/log/thread_work.log"
