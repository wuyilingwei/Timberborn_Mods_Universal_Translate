
[languages]
# Supported languages for translation
# Format: language_code (e.g., "enUS", "zhCN", "zhTW", etc.)
supported = ["enUS", "zhCN", "zhTW", "ruRU", "jaJP", "frFR", "deDE", "plPL", "ptBR", "koKR", "csCZ", "viVN"]

[languages.locale_names]
enUS = "English (US)"
zhCN = "Simplified Chinese"
zhTW = "Traditional Chinese"
ruRU = "Russian"
jaJP = "Japanese"
frFR = "French"
deDE = "German"
plPL = "Polish"
ptBR = "Brazilian Portuguese"
koKR = "Korean"
csCZ = "Czech"
viVN = "Vietnamese"

[build]
protect_string_ids_file = "enUS.txt"
extra_protect_string_ids = ["Beaver.NamePool", "Settings.Language.Name"]

[rate_limiter]
# Maximum requests per minute (RPM)
max_requests_per_minute = 4000

# Total concurrency budget (file-level × entry-level ≤ this)
max_threads = 100

# Maximum entry-level threads per file (caps dynamic rebalancing).
# When only a few files remain active, idle threads are redistributed
# up to this limit per file.  Raise this value to allow a single file
# to use more threads when it is the last one in the queue.
max_threads_per_file = 10

[llm]
# LLM model to use for translation
model = "gpt-5-nano"

# API endpoint (OpenAI-compatible)
api_url = "https://api.openai.com/v1/chat/completions"

# Minimum text length to translate
min_length = 1

# Maximum text length to translate
max_length = 5000

[logging]
# Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
level = "INFO"
