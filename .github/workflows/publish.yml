name: Publish to Third-Party Platforms

on:
  workflow_call:
  workflow_dispatch:

jobs:
  publish-platforms:
    if: github.event_name == 'schedule' || contains(fromJSON(vars.WORKFLOWS_ALLOWLIST || '[]'), github.actor)
    runs-on: ubuntu-latest
    environment: automations

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Pull latest changes
        run: |
          git fetch origin
          git reset --hard origin/${{ github.ref_name }}

      - name: Determine version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Source of truth: latest GitHub Release tag (e.g. "v2026.6.170")
          # We no longer read .github/data/version.txt — it has been removed.
          LATEST_TAG=$(gh release view --json tagName --jq '.tagName' 2>/dev/null || echo "")

          if [ -z "$LATEST_TAG" ]; then
            echo "Error: no GitHub Release found — cannot determine version to publish"
            exit 1
          fi

          VERSION="$LATEST_TAG"
          VERSION_NUMBER="${LATEST_TAG#v}"

          echo "Latest GitHub Release tag: $VERSION"
          echo "Version to publish: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION_NUMBER=$VERSION_NUMBER" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION_NUMBER=$VERSION_NUMBER" >> $GITHUB_OUTPUT

      - name: Get release package for mod.io
        run: |
          VERSION_NUMBER="${{ steps.version.outputs.VERSION_NUMBER }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION_NUMBER}/${VERSION_NUMBER}.zip"
          
          echo "Version to publish: $VERSION_NUMBER"
          echo "Release URL: $RELEASE_URL"
          
          # For mod.io, we need a local file. Download from GitHub Release if not present locally
          if [ -f "${VERSION_NUMBER}.zip" ]; then
            echo "Found local release package: ${VERSION_NUMBER}.zip"
            cp "${VERSION_NUMBER}.zip" release.zip
          else
            echo "Local package not found, downloading from GitHub Release..."
            echo "Download URL: $RELEASE_URL"
            
            # Download the release package
            if curl -L -f -o release.zip "$RELEASE_URL"; then
              echo "✓ Successfully downloaded release package"
            else
              echo "✗ Failed to download release package from GitHub Release"
              echo "  Please ensure the GitHub Release has been created with the package"
              exit 1
            fi
          fi
          
          # Verify the file exists and has content
          if [ ! -f release.zip ] || [ ! -s release.zip ]; then
            echo "Error: Release package is missing or empty"
            exit 1
          fi
          
          FILE_SIZE=$(wc -c < release.zip)
          echo "Release package ready: release.zip ($FILE_SIZE bytes)"

          # Inject a unique CI marker so the zip hash differs each run.
          # mod.io's add_modfile endpoint dedupes by file hash GLOBALLY across
          # all mods (returns 422 "already been uploaded" pointing at someone
          # else's modfile, but does NOT attach the file to OUR mod). The
          # marker file's run_id + timestamp guarantees a fresh hash.
          #
          # IMPORTANT: marker must live INSIDE the mod's top-level directory,
          # not at the zip root. Adding it at the root breaks the "single
          # top-level mod folder containing manifest.json" structure that
          # mod.io and the Timberborn mod loader expect, producing a broken
          # download that the game can't see.
          TMP_DIR=$(mktemp -d)
          unzip -q release.zip -d "${TMP_DIR}"
          MOD_DIR=$(find "${TMP_DIR}" -maxdepth 1 -mindepth 1 -type d | head -1)
          if [ -z "${MOD_DIR}" ] || [ ! -f "${MOD_DIR}/manifest.json" ]; then
            echo "Error: release.zip does not contain a single top-level mod dir with manifest.json"
            ls -la "${TMP_DIR}"
            exit 1
          fi
          echo "Mod top-level dir inside zip: $(basename ${MOD_DIR})"
          {
            echo "run_id=${{ github.run_id }}"
            echo "run_attempt=${{ github.run_attempt }}"
            echo "ts=$(date +%s)"
            echo "sha=${GITHUB_SHA}"
          } > "${MOD_DIR}/.modio_ci_marker"
          rm -f release.zip
          ( cd "${TMP_DIR}" && zip -qr "${GITHUB_WORKSPACE}/release.zip" . )
          rm -rf "${TMP_DIR}"
          NEW_SIZE=$(wc -c < release.zip)
          echo "After CI marker injection (inside mod dir): release.zip (${NEW_SIZE} bytes)"

      - name: Publish to all platforms
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          VERSION_NUMBER="${{ steps.version.outputs.VERSION_NUMBER }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION_NUMBER}/${VERSION_NUMBER}.zip"
          
          echo "=========================================="
          echo "Preparing publication to all platforms"
          echo "Version: $VERSION_NUMBER"
          echo "Release URL: $RELEASE_URL"
          echo "=========================================="
          echo ""
          echo "Platform configuration:"
          
          # Check platform availability
          if [ -n "${{ secrets.MODIO_TOKEN }}" ]; then
            echo "✓ mod.io: Token configured"
          else
            echo "⚠️  mod.io: Token not configured (will be skipped)"
          fi
          
          if [ -n "${{ secrets.STEAM_TOKEN }}" ]; then
            echo "✓ Steam Workshop: Token configured"
          else
            echo "⚠️  Steam Workshop: Token not configured (will be skipped)"
          fi
          
          echo ""
          echo "Release files will be fetched directly from GitHub Release"

      - name: Upload to mod.io
        env:
          MODIO_TOKEN: ${{ secrets.MODIO_TOKEN }}
          # mod.io has deprecated api.mod.io for write operations — must use the
          # user-scoped subdomain u-<user_id>.modapi.io. 50642970 = W10V account
          # that owns mod 5238039. See agents/.../findings.md §F12.
          MODIO_USER_ID: "50642970"
          MODIO_GAME_ID: "3659"
          MODIO_MOD_ID: "5238039"
        if: env.MODIO_TOKEN != ''
        continue-on-error: true
        id: modio_upload
        run: |
          set -uo pipefail
          API_BASE="https://u-${MODIO_USER_ID}.modapi.io/v1"
          UPLOAD_URL="${API_BASE}/games/${MODIO_GAME_ID}/mods/${MODIO_MOD_ID}/files"
          VERSION="${{ steps.version.outputs.VERSION }}"
          FILE_SIZE=$(wc -c < release.zip)

          echo "Uploading to mod.io..."
          echo "  Endpoint: ${UPLOAD_URL}"
          echo "  Version:  ${VERSION}"
          echo "  Package:  release.zip (${FILE_SIZE} bytes)"
          echo ""

          HTTP_CODE=$(curl -sS -o /tmp/modio_resp.json -w "%{http_code}" \
            -X POST "${UPLOAD_URL}" \
            -H "Authorization: Bearer ${MODIO_TOKEN}" \
            -H "Accept: application/json" \
            -F "filedata=@release.zip" \
            -F "version=${VERSION}")

          echo "mod.io HTTP ${HTTP_CODE}, response body:"
          python3 -m json.tool /tmp/modio_resp.json 2>/dev/null \
            | sed 's/^/  /' \
            || sed 's/^/  /' /tmp/modio_resp.json
          echo ""

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✓ mod.io upload succeeded"
            exit 0
          fi

          # Idempotent special-case: mod.io returns 422 + error_ref 13009 +
          # message "This file has already been uploaded ..." when the exact
          # release.zip (byte-identical hash) has been published before.
          # That state is effectively success — the build IS on mod.io —
          # so treat it as success to keep re-runs of the same version green.
          # Other 422 / 13009 cases (e.g. filedata wrong type) are NOT swallowed.
          # NOTE: do NOT swallow 422 + "already been uploaded" anymore.
          # That message points at a modfile id which may not even belong to
          # THIS mod (mod.io dedupes by hash globally). Treating it as success
          # would mask a real upload failure. The CI marker injected above
          # already ensures the zip hash is unique per run, so this branch
          # should not trigger; if it does, that's a real bug to investigate.

          echo "✗ mod.io upload failed (HTTP ${HTTP_CODE})"
          echo ""
          echo "Quick triage by mod.io error_ref (see body above):"
          echo "  11001 → deprecated api.mod.io domain (workflow now uses user subdomain — should not appear)"
          echo "  11003/11004 → token lacks 'write' scope"
          echo "  11005 → token expired or revoked"
          echo "  13009 → validation failed (e.g. filedata wrong type, or other input issue)"
          echo "  Other → check https://docs.mod.io/restapiref/#error-codes"
          echo ""
          echo "Token regeneration: https://mod.io/me/access  → OAuth Access → Read + Write"
          echo "Continuing to Steam upload regardless."
          exit 1

      - name: Publish to Steam Workshop
        env:
          STEAM_TOKEN: ${{ secrets.STEAM_TOKEN }}
        if: env.STEAM_TOKEN != ''
        continue-on-error: true
        id: steam_upload
        run: |
          VERSION_NUMBER="${{ steps.version.outputs.VERSION_NUMBER }}"
          CHANGENOTE="Automated Update to ${VERSION_NUMBER}"
          
          # Use GitHub Release direct download URL
          ZIP_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION_NUMBER}/${VERSION_NUMBER}.zip"
          
          echo "Uploading to Steam Workshop via API..."
          echo "App ID: 1062090"
          echo "Published File ID: 3346918947"
          echo "Version: $VERSION_NUMBER"
          echo "Change Note: $CHANGENOTE"
          echo "Package URL: $ZIP_URL"
          
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://steam.wuyilingwei.com/workshop/upload" \
            -H "Authorization: Bearer $STEAM_TOKEN" \
            -F "appid=1062090" \
            -F "publishedfileid=3346918947" \
            -F "zip_url=$ZIP_URL" \
            -F "changenote=$CHANGENOTE")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          RESPONSE_BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "API Response Status: $HTTP_CODE"
          echo "API Response Body: $RESPONSE_BODY"
          
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
            echo "✓ Steam Workshop upload successful"
            exit 0
          else
            echo "✗ Steam Workshop upload failed (HTTP $HTTP_CODE)"
            exit 1
          fi

      - name: Check publication results
        run: |
          HAS_ERRORS=false
          
          # Check mod.io result — failure is fatal (job exits 1), but only after Steam ran
          if [ "${{ steps.modio_upload.outcome }}" = "failure" ]; then
            echo "✗ mod.io publication failed (see 'Upload to mod.io' step above for HTTP code + error_ref)"
            HAS_ERRORS=true
          elif [ "${{ steps.modio_upload.outcome }}" = "success" ]; then
            echo "✓ mod.io publication succeeded"
          elif [ -z "${{ secrets.MODIO_TOKEN }}" ]; then
            echo "⚠️  mod.io skipped (token not configured)"
          fi
          
          # Check Steam Workshop result
          if [ "${{ steps.steam_upload.outcome }}" = "failure" ]; then
            echo "✗ Steam Workshop publication failed"
            HAS_ERRORS=true
          elif [ "${{ steps.steam_upload.outcome }}" = "success" ]; then
            echo "✓ Steam Workshop publication succeeded"
          elif [ -z "${{ secrets.STEAM_TOKEN }}" ]; then
            echo "⚠️  Steam Workshop skipped (token not configured)"
          fi
          
          echo ""
          if [ "$HAS_ERRORS" = true ]; then
            echo "=========================================="
            echo "⚠️  Publication completed with errors"
            echo "=========================================="
            echo "Some platforms failed to publish. Please check the logs above."
            exit 1
          else
            echo "=========================================="
            echo "✓ Publication completed successfully"
            echo "=========================================="
          fi