name: Auto Translate Mods

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    # Run daily at 07:00 UTC to process new translations
    - cron: '0 7 * * *'

jobs:
  translate:
    if: github.event_name == 'schedule' || contains(fromJSON(vars.WORKFLOWS_ALLOWLIST || '[]'), github.actor)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_TOKEN }}
          persist-credentials: true
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r .github/scripts/requirements.txt
      
      - name: Run translation
        id: translate
        env:
          LLM_TOKEN: ${{ secrets.LLM_TOKEN }}
        run: |
          LOG_FILE=".github/log/translation.log"
          TARGET_BRANCH="${GITHUB_REF_NAME:-main}"
          # Temporary branch that holds translation commits during this run.
          # Using run ID keeps it unique even for concurrent manual triggers.
          TEMP_BRANCH="translate/auto-$(date -u '+%Y%m%d')-${GITHUB_RUN_ID}"
          CHECKPOINT_INTERVAL=60
          CHECKPOINT_PID=""
          TRANSLATE_PID=""
          EXIT_CODE=0
          # Track whether the first checkpoint commit has been made this run.
          FIRST_COMMIT_DONE=false
          # Guard flag: prevents the EXIT trap from running a second time.
          FINAL_COMMIT_DONE=false

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Remember the exact commit that was checked out so we can detect
          # whether anyone pushed to the target branch while we were running.
          ORIGIN_SHA=$(git rev-parse HEAD)
          echo "Starting from commit $ORIGIN_SHA on $TARGET_BRANCH"

          # Create and switch to the temporary working branch.
          git checkout -b "$TEMP_BRANCH"
          echo "Working on temporary branch: $TEMP_BRANCH"

          # ----------------------------------------------------------------
          # commit_and_push_changes
          # Commits any dirty data/ files to the temp branch, then
          # force-pushes the temp branch to origin (safe: no one else uses it).
          # ----------------------------------------------------------------
          commit_and_push_changes() {
            if git diff --quiet data/ && git diff --cached --quiet data/; then
              echo "No changes detected in data/, nothing to commit"
              return 0
            fi

            git add data/
            if git diff --cached --quiet; then
              echo "No staged changes, skipping commit"
              return 0
            fi

            if [ "$FIRST_COMMIT_DONE" = false ]; then
              git commit -m "chore: Auto-translate mod entries [skip ci]"
              FIRST_COMMIT_DONE=true
              echo "Created initial checkpoint commit on $TEMP_BRANCH"
            else
              # Amend to keep a single tidy commit on the temp branch.
              git commit --amend --no-edit
              echo "Amended checkpoint commit on $TEMP_BRANCH"
            fi

            MAX_RETRIES=3
            RETRY_COUNT=0
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              # Force-push is safe here because TEMP_BRANCH is exclusively
              # owned by this workflow run.
              if git push --force origin "HEAD:${TEMP_BRANCH}"; then
                echo "Pushed temp branch $TEMP_BRANCH"
                return 0
              fi
              RETRY_COUNT=$((RETRY_COUNT + 1))
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "Push failed, retrying ($RETRY_COUNT/$MAX_RETRIES)..."
                git status --short || true
                sleep 2
              fi
            done

            echo "Warning: failed to push $TEMP_BRANCH after $MAX_RETRIES attempts"
            git remote -v || true
            git status --short || true
            return 1
          }

          # ----------------------------------------------------------------
          # merge_to_target
          # Translation is the highest-priority write to the target branch.
          #
          # If nobody pushed to the target branch while we ran: fast-forward.
          #
          # If the target branch has new commits that conflict with our work:
          #   1. Preserve those commits on a side branch so they are not lost.
          #   2. Force-push the translation result onto the target branch,
          #      overriding the conflicting commits.
          # ----------------------------------------------------------------
          merge_to_target() {
            if [ "$FIRST_COMMIT_DONE" = false ]; then
              echo "No translation commits to merge into $TARGET_BRANCH"
              cleanup_temp_branch
              return 0
            fi

            echo "Merging translation results into $TARGET_BRANCH..."

            # Fetch the latest state of the target branch.
            git fetch origin "$TARGET_BRANCH"
            CURRENT_TARGET_SHA=$(git rev-parse "origin/${TARGET_BRANCH}")

            if [ "$CURRENT_TARGET_SHA" = "$ORIGIN_SHA" ]; then
              # Nobody pushed to the target branch while we ran.
              # A plain (non-force) push is a safe fast-forward here.
              echo "No upstream changes detected; fast-forwarding $TARGET_BRANCH"
              git push origin "HEAD:${TARGET_BRANCH}"
              echo "Successfully merged translation into $TARGET_BRANCH"
              cleanup_temp_branch
            else
              # The target branch has new commits that appeared during the run.
              # Translation takes priority: preserve the foreign commits on a
              # side branch, then force-push the translation result.
              DISPLACED_BRANCH="preserved/displaced-$(date -u '+%Y%m%d')-${GITHUB_RUN_ID}"
              echo "Upstream $TARGET_BRANCH has new commits since $ORIGIN_SHA (now $CURRENT_TARGET_SHA)"
              echo "Preserving displaced commits on $DISPLACED_BRANCH..."
              git push origin "${CURRENT_TARGET_SHA}:refs/heads/${DISPLACED_BRANCH}"
              echo "Displaced commits saved to $DISPLACED_BRANCH"

              echo "Force-pushing translation result onto $TARGET_BRANCH..."
              git push --force origin "HEAD:${TARGET_BRANCH}"
              echo "Successfully applied translation to $TARGET_BRANCH"
              echo "Note: commits that were on $TARGET_BRANCH during the run are preserved on $DISPLACED_BRANCH"
              cleanup_temp_branch
            fi
          }

          # ----------------------------------------------------------------
          # cleanup_temp_branch
          # Deletes the remote temp branch once it has been merged.
          # ----------------------------------------------------------------
          cleanup_temp_branch() {
            git push origin --delete "$TEMP_BRANCH" 2>/dev/null || true
            echo "Deleted remote temp branch $TEMP_BRANCH"
          }

          checkpoint_loop() {
            while true; do
              sleep "$CHECKPOINT_INTERVAL"
              echo "Checkpoint tick: trying to persist translation progress"
              commit_and_push_changes || true
            done
          }

          stop_checkpoint_loop() {
            if [ -n "$CHECKPOINT_PID" ] && kill -0 "$CHECKPOINT_PID" >/dev/null 2>&1; then
              kill "$CHECKPOINT_PID" >/dev/null 2>&1 || true
              wait "$CHECKPOINT_PID" 2>/dev/null || true
              CHECKPOINT_PID=""
            fi
          }

          on_exit() {
            # Last-resort safety net: runs on every exit path.
            # If the normal completion block already handled everything, this
            # is a no-op thanks to the FINAL_COMMIT_DONE guard.
            if [ "$FINAL_COMMIT_DONE" = false ]; then
              FINAL_COMMIT_DONE=true
              stop_checkpoint_loop
              if [ -n "$TRANSLATE_PID" ] && kill -0 "$TRANSLATE_PID" >/dev/null 2>&1; then
                kill -TERM "$TRANSLATE_PID" >/dev/null 2>&1 || true
                wait "$TRANSLATE_PID" 2>/dev/null || true
                TRANSLATE_PID=""
              fi
              # Save whatever progress Python wrote to disk, but do NOT merge
              # into the target branch — leave it on TEMP_BRANCH for review.
              commit_and_push_changes || true
              echo "Partial translation results saved to $TEMP_BRANCH (not merged into $TARGET_BRANCH)"
            fi
          }

          on_cancel() {
            echo "Cancellation signal received, saving translation progress"
            FINAL_COMMIT_DONE=true
            stop_checkpoint_loop

            if [ -n "$TRANSLATE_PID" ] && kill -0 "$TRANSLATE_PID" >/dev/null 2>&1; then
              echo "Stopping translation subprocess $TRANSLATE_PID"
              kill -TERM "$TRANSLATE_PID" >/dev/null 2>&1 || true
              wait "$TRANSLATE_PID" 2>/dev/null || true
              TRANSLATE_PID=""
            fi

            # Commit whatever Python saved, push to temp branch only.
            commit_and_push_changes || true
            echo "Partial translation results saved to $TEMP_BRANCH (not merged into $TARGET_BRANCH)"
            exit 130
          }

          trap on_exit EXIT
          trap on_cancel TERM INT

          # Create log directory if it doesn't exist
          mkdir -p "$(dirname "$LOG_FILE")"

          # Remove old log if exists
          rm -f "$LOG_FILE"

          # Start periodic checkpoint commits to reduce cancellation loss window.
          checkpoint_loop &
          CHECKPOINT_PID=$!
          echo "Started checkpoint loop with PID $CHECKPOINT_PID (interval ${CHECKPOINT_INTERVAL}s)"

          # Run translation in background so the shell can handle cancellation signals.
          python .github/scripts/translate_mods.py \
            --config .github/config/config.toml \
            --data-dir data \
            --glossary data/_glossary.toml \
            --log-file "$LOG_FILE" &
          TRANSLATE_PID=$!
          echo "Started translation subprocess with PID $TRANSLATE_PID"

          wait "$TRANSLATE_PID" || EXIT_CODE=$?
          TRANSLATE_PID=""

          # Normal completion path: mark done so EXIT trap is a no-op.
          FINAL_COMMIT_DONE=true
          stop_checkpoint_loop

          # Commit any final progress.
          commit_and_push_changes || true

          # Check exit code
          if [ "${EXIT_CODE:-0}" -ne 0 ]; then
            echo "Translation failed with exit code $EXIT_CODE"
            echo "Partial results left on $TEMP_BRANCH for manual review"
            echo "failed=true" >> $GITHUB_OUTPUT
            exit 1
          fi

          # Translation succeeded: push result to target branch.
          merge_to_target
          echo "Translation completed and merged into $TARGET_BRANCH successfully"
          echo "completed=true" >> $GITHUB_OUTPUT
      
      - name: Upload translation log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: translation-log-${{ github.run_number }}
          path: .github/log/translation.log
          retention-days: 30
      
      - name: Generate Action Summary
        if: always()
        run: |
          LOG_FILE=".github/log/translation.log"
          if [ -f "$LOG_FILE" ]; then
            echo "## 🔄 Translation Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📊 **Process Status:** $([ "${EXIT_CODE:-0}" -eq 0 ] && echo "✅ Success" || echo "❌ Failed")" >> $GITHUB_STEP_SUMMARY
            echo "📅 **Run Time:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Show log tail (last 20 lines)
            echo "### 📋 Recent Log Entries" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            tail -n 20 "$LOG_FILE" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "💾 Full log is available in the [Artifacts section](#artifacts) of this workflow run." >> $GITHUB_STEP_SUMMARY
          else
            echo "## ⚠️ Translation Log Not Found" >> $GITHUB_STEP_SUMMARY
            echo "The translation log file was not generated." >> $GITHUB_STEP_SUMMARY
          fi
      
